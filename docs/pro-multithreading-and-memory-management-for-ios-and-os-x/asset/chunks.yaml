    \ 的状态。结果如下所示：\n\n```\nobjc[14481]: ##############\nobjc[14481]: AUTORELEASE POOLS\
    \ for thread 0xad0892c0\nobjc[14481]: 14 releases pending.\nobjc[14481]: [0x6a85000]\
    \  ................  PAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]  ################\
    \  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]         0x6719e40  __NSCFString\n\
    objc[14481]: [0x6a85030]  ################  POOL 0x6a85030\nobjc[14481]: [0x6a85034]\
    \         0x7608100  __NSArrayI\nobjc[14481]: [0x6a85038]         0x7609a60  __NSCFData\n\
    objc[14481]: [0x6a8503c]  ################  POOL 0x6a8503c\nobjc[14481]: [0x6a85040]\
    \         0x8808df0  __NSCFDictionary\nobjc[14481]: [0x6a85044]         0x760ab50\
    \  NSConcreteValue\nobjc[14481]: [0x6a85048]         0x760afe0  NSConcreteValue\n\
    objc[14481]: [0x6a8504c]         0x760b280  NSConcreteValue\nobjc[14481]: [0x6a85050]\
    \         0x760b2f0  __NSCFNumber\nobjc[14481]: [0x6a851a8]  ################\
    \  POOL 0x6a851a8\nobjc[14481]: [0x6a851ac]         0x741d1e0  Test\nobjc[14481]:\
    \ [0x6a851b0]         0x671c660  NSObject\nobjc[14481]: ##############\n```\n\n\
    了解某些对象是否已被 `autorelease` 是非常有用的，如下面的侧边栏所述。\n\n**将 AUTORELEASE 发送给 NSAUTORELEASEPOOL\
    \ 对象**\n\n问题：如果对 `NSAutoreleasePool` 对象调用 `autorelease` 会发生什么？\n\n```\nNSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n[pool autorelease];\n```\n\n答案：应用程序将会被终止。\n\
    \n```\n*** Terminating app due to uncaught exception 'NSInvalidArgumentException'\n\
    reason: '*** -[NSAutoreleasePool autorelease]:\nCannot autorelease an autorelease\
    \ pool'\n```\n\n当在 Foundation 框架中使用 Objective-C 调用 `autorelease` 时，绝大多数情况下会调用\
    \ `NSObject` 的实例方法。然而，`NSAutoreleasePool` 类重写了 `autorelease` 方法，以便在自动释放池对象上调用\
    \ `autorelease` 时显示一个错误。\n\n### 小结\n\n在本章中，你已经学习了以下内容。\n\n*   引用计数内存管理的概念\n* \
    \  `alloc`、`retain`、`release` 和 `dealloc` 方法是如何实现的\n*   `autorelease` 的机制及其实现\n\
    \n这些内容非常重要，即使引入了 ARC，它们仍然适用。在下一章中，我们将学习情况将发生怎样的变化。\n\n## 第 2 章\n\n## ARC 规则\n\n\
    在上一章中，我们回顾了非 ARC 环境中 Objective-C 的内存管理。但是当启用 ARC 时会发生什么呢？本章探讨了采用 ARC 时所引发的变化。在第\
    \ 1 章中简要介绍了自动引用计数，但苹果公司自己的表述最能概括其精髓：\n\n> *Objective-C 中的自动引用计数（ARC）将内存管理变成了编译器的工作。通过启用新的\
    \ Apple LLVM 编译器中的 ARC，你将永远不需要再输入 `retain` 或 `release`，从而极大地简化了开发过程，同时减少了崩溃和内存泄漏。编译器能够完全理解你的对象，并在每个对象不再被使用时立即释放它，因此应用程序能以一如既往的速度运行，并具有可预测且流畅的性能表现。^(1)*\n\
    \n首先，我们将展示引用计数规则与 ARC 的关系，同时我们将逐一学习 ARC 新引入的所有权修饰符。此外，ARC 还为我们带来了新的属性。最重要的是，我们将学习使你的代码符合\
    \ ARC 规范的规则：只需遵循这些规则，你就能有信心地编写 ARC 代码。\n\n### 概述\n\n实际上，引用计数仍然是 ARC 的基础，但是当你遵循本章中解释的规则时，ARC\
    \ 会帮助引用计数机制自动运行。\n\n事实上，我们可以为每个可编译单元启用或禁用 ARC。例如，如图图 2–1 所示，我们可以为每个源文件启用或禁用 ARC。\n\
    \n__________\n\n¹ Apple, “iOS 5 for developers,” [`http://developer.apple.com/technologies/ios5/`](http://developer.apple.com/technologies/ios5/)\n\
    \n![images](img/9781430241164_Fig02-01.jpg)\n\n**图 2–1.** *在一个应用程序中针对每个源文件启用或禁用\
    \ ARC*\n\n总而言之，ARC 最重要的部分在于，作为开发者的你不再需要调用 `retain` 或 `release`。在以下条件下，你的源代码将会在启用\
    \ ARC 的情况下自动编译：\n\n*   `clang` (LLVM 编译器) 3.0 及更新版本\n*   编译选项 `-fobjc-arc`\n\n\
    Clang 是默认的编译器，并且在 Xcode 4.2 中 `-fobjc-arc` 选项被设置为默认选项。因此，当你在 Xcode 4.2 中工作时，不需要做任何特殊操作。\n\
    \n从现在开始，所有的源代码都适用于启用了 ARC 的环境。如果源代码是用于非 ARC 环境的，我们将添加注释 `/* non-ARC */`。在下一节中，我们将展示当启用\
    \ ARC 时，引用计数机制是如何改变的。\n"
- fmt: "### Reference Counting Mechanism Changes\n\nAs we described previously, the\
    \ rules of reference counting are as follows.\n\n- You have ownership of any objects\
    \ you create.\n- You can take ownership of an object using `retain`.\n- When you\
    \ no longer need it, you must relinquish ownership of an object of which you have\
    \ ownership.\n- You must not relinquish ownership of an object of which you don’t\
    \ have ownership.\n\nEven when ARC is enabled, these rules are still applicable.\
    \ But you need some modification to source codes. To do so, you first need to\
    \ understand ownership qualifiers, which are newly introduced for ARC.\n\n###\
    \ Ownership Qualifiers\n\nIn Objective-C, `id` or each object type is used for\
    \ object variable types.\n\nObject types are pointer types of Objective-C classes,\
    \ such as `NSObject *`. `id` type is used to hide its class name. `id` is equivalent\
    \ to `void*` in the C language.\n\nWith ARC, `id` and object type variables must\
    \ have one of the following four ownership qualifiers:\n\n- `__strong`\n- `__weak`\n\
    - `__unsafe_unretained`\n- `__autoreleasing`\n\nYou should decide which ownership\
    \ qualifier is to be used for all the `id` and object type variables in your source\
    \ code. In this chapter, I explain how you should choose each qualifier one by\
    \ one.\n\n#### `__strong` Ownership Qualifier\n\nThe `__strong` ownership qualifier\
    \ is used as the default for `id` and object types. It means that the variable\
    \ `obj` in the following source code is `__strong` qualified implicitly.\n\n```\n\
    id obj = [[NSObject alloc] init];\n```\n\nWithout being explicitly qualified,\
    \ `id` or objects are treated as `__strong`. The above code is the same as\n\n\
    ```\nid __strong obj = [[NSObject alloc] init];\n```\n\nThe following is the same\
    \ source code for a non-ARC environment.\n\n```\n/* non-ARC */\nid obj = [[NSObject\
    \ alloc] init];\n```\n\nThere is no difference thus far. Let’s see the next example.\n\
    \n```\n{\n    id __strong obj = [[NSObject alloc] init];\n}\n```\n\nLocal variable\
    \ scope is added intentionally. The non-ARC version for this source code is:\n\
    \n```\n/* non-ARC */\n{\n    id obj = [[NSObject alloc] init];\n    [obj release];\n\
    }\n```\n\nThis means the `release` method is automatically added on an ARC environment\
    \ to release the created object with ownership. When the control flow leaves the\
    \ scope of the variable `obj`, the `release` method is called for the variable\
    \ because the variable `obj` is qualified with `__strong`.\n\nAs it is named `__strong`,\
    \ this ownership qualifier indicates a strong reference for the object. When the\
    \ control flow leaves the variable scope, the strong reference disappears and\
    \ the assigned object is released. Let’s find ownership status in the source code.\n\
    \n```\n{\n    id __strong obj = [[NSObject alloc] init];\n}\n```\n\nThis code\
    \ creates an object and has ownership of it. We add comments on the ownership\
    \ status.\n\n```\n{\n     /*\n      * You create an object and have ownership.\n\
    \      */\n\n    id __strong obj = [[NSObject alloc] init];\n\n      /*\n    \
    \   * The variable obj is qualified with __strong.\n       * Which means, it has\
    \ ownership of the object.\n       */\n\n}\n\n  /*\n   * Leaving the scope of\
    \ variable obj, its strong reference disappears.\n   * The object is released\
    \ automatically.\n   * Because no one has ownership, the object is disposed of.\n\
    \   */\n```\n\n##### Assigning to `__strong` Ownership Qualified Variables\n\n\
    The ownership and lifetime of the object are very clear. Next, we see what happens\
    \ when you obtain an object without creating it yourself or having ownership.\n\
    \n```\n{\n    id __strong obj = [NSMutableArray array];\n}\n```\n\nIt calls the\
    \ class method `array` of `NSMutableArray` to obtain an object without creating\
    \ it yourself or having ownership.\n\n```\n{\n     /*\n      * Obtain an object\
    \ without creating it yourself or having ownership\n      */\n\n    id __strong\
    \ obj = [NSMutableArray array];\n\n     /*\n      * The variable obj is qualified\
    \ with __strong.\n      * Which means, it has ownership of the object.\n     \
    \ */\n\n}\n /*\n  * Leaving the scope of variable obj, its strong reference disappears.\n\
    \  * The object is released automatically.\n  */\n```\n\nOwnership and lifetime\
    \ of the object are very clear in this case as well. And, of course, you can exchange\
    \ values between variables qualified with `__strong` as follows.\n\n```\nid __strong\
    \ obj0 = [[NSObject alloc] init];\nid __strong obj1 = [[NSObject alloc] init];\n\
    id __strong obj2 = nil;\nobj0 = obj1;\nobj2 = obj0;\nobj1 = nil;\n\nobj0 = nil;\n\
    obj2 = nil;\n```"
  raw: '### Reference Counting Mechanism Changes


    As we described previously, the rules of reference counting are as follows.


    *   You have ownership of any objects you create.

    *   You can take ownership of an object using retain.

    *   When you no longer need it, you must relinquish ownership of an object of
    which you have ownership.

    *   You must not relinquish ownership of an object of which you don’t have ownership.


    Even when ARC is enabled, these rules are still applicable. But you need some
    modification to source codes. To do so, you first need to understand ownership
    qualifiers, which are newly introduced for ARC.


    ### Ownership qualifiers


    In Objective-C, ‘id’ or each object type is used for object variable types.


    Object types are pointer types of Objective-C classes, such as NSObject *. ‘id’
    type is used to hide its class name. ‘id’ is equivalent to void* in the C language.


    With ARC, ‘id’ and object type variables must have one of the following four ownership
    qualifiers:


    *   __strong

    *   __weak

    *   __unsafe_unretained

    *   __autoreleasing


    You should decide which ownership qualifier is to be used for all the ‘id’ and
    object type variables in your source code. In this chapter, I explain how you
    should choose each qualifier one by one.


    #### __strong ownership qualifier


    The __strong ownership qualifier is used as the default for ‘id’ and object types.
    It means that the variable obj in the following source code is __strong qualified
    implicitly.


    `id obj = [[NSObject alloc] init];`


    Without being explicitly qualified, ‘id’ or objects are treated as __strong. The
    above code is the same as


    `id __strong obj = [[NSObject alloc] init];`


    The following is the same source code for a non-ARC environment.


    `/* non-ARC */`

    `id obj = [[NSObject alloc] init];`


    There is no difference thus far. Let’s see the next example.


    `{`

    `    id __strong obj = [[NSObject alloc] init];`

    `}`


    Local variable scope is added intentionally. The non-ARC version for this source
    code is:


    `/* non-ARC */`

    `{`

    `    id obj = [[NSObject alloc] init];`

    `    [obj release];`

    `}`


    This means the “release” method is automatically added on an ARC environment to
    release the created object with ownership. When the control flow leaves the scope
    of the variable obj, the release method is called for the variable because the
    variable obj is qualified with __strong.


    As it is named __strong, this ownership qualifier indicates a strong reference
    for the object. When the control flow leaves the variable scope, the strong reference
    disappears and the assigned object is released. Let’s find ownership status in
    the source code.


    `{`

    `    id __strong obj = [[NSObject alloc] init];`

    `}`


    This code creates an object and has ownership of it. We add comments on the ownership
    status.


    `{`

    `     /*`

    `      * You create an object and have ownership.`

    `      */`


    `    id __strong obj = [[NSObject alloc] init];`


    `      /*`

    `       * The variable obj is qualified with __strong.`

    `       * Which means, it has ownership of the object.`

    `       */`


    `}`


    `  /*`

    `   * Leaving the scope of variable obj, its strong reference disappears.`

    `   * The object is released automatically.`

    `   * Because no one has ownership, the object is disposed of.`

    `   */`


    ##### Assigning to __strong ownership qualified variables


    The ownership and lifetime of the object are very clear. Next, we see what happens
    when you obtain an object without creating it yourself or having ownership.


    `{`

    `    id __strong obj = [NSMutableArray array];`

    `}`


    It calls the class method “array” of NSMutableArray to obtain an object without
    creating it yourself or having ownership.


    `{`

    `     /*`

    `      * Obtain an object without creating it yourself or having ownership`

    `      */`


    `    id __strong obj = [NSMutableArray array];`


    `     /*`

    `      * The variable obj is qualified with __strong.`

    `      * Which means, it has ownership of the object.`

    `      */`


    `}`

    ` /*`

    `  * Leaving the scope of variable obj, its strong reference disappears.`

    `  * The object is released automatically.`

    `  */`


    Ownership and lifetime of the object are very clear in this case as well. And,
    of course, you can exchange values between variables qualified with __strong as
    follows.


    `id __strong obj0 = [[NSObject alloc] init];`

    `id __strong obj1 = [[NSObject alloc] init];`

    `id __strong obj2 = nil;`

    `obj0 = obj1;`

    `obj2 = obj0;`

    `obj1 = nil;`


    `obj0 = nil;`

    `obj2 = nil;`'
  trans: "\n### 引用计数机制的变更\n\n如前所述，引用计数规则如下：\n\n-   你对你创建的任何对象拥有所有权。\n-   你可以使用 `retain`\
    \ 获取一个对象的所有权。\n-   当你不再需要某个对象时，必须放弃你对其拥有的所有权。\n-   你绝不能放弃你不拥有所有权的某个对象。\n\n即便在启用\
    \ ARC 的情况下，这些规则仍然适用。但你需要对源代码进行一些修改。为此，你首先需要理解 ARC 中新增的所有权修饰符。\n\n### 所有权修饰符\n\n\
    在 Objective-C 中，`id` 或每个对象类型都用于表示对象变量类型。\n\n对象类型是 Objective-C 类的指针类型，例如 `NSObject\
    \ *`。`id` 类型用于隐藏其类名。`id` 等价于 C 语言中的 `void*`。\n\n使用 ARC 时，`id` 和对象类型变量必须具有以下四个所有权修饰符之一：\n\
    \n-   `__strong`\n-   `__weak`\n-   `__unsafe_unretained`\n-   `__autoreleasing`\n\
    \n你需要决定源代码中所有 `id` 和对象类型变量使用哪个所有权修饰符。在本章中，我将逐一解释应如何选择每个修饰符。\n\n#### `__strong`\
    \ 所有权修饰符\n\n`__strong` 所有权修饰符是 `id` 和对象类型的默认修饰符。这意味着以下源代码中的变量 `obj` 被隐式地修饰为 `__strong`。\n\
    \n```\nid obj = [[NSObject alloc] init];\n```\n\n在没有显式修饰的情况下，`id` 或对象被视为 `__strong`。上述代码等同于：\n\
    \n```\nid __strong obj = [[NSObject alloc] init];\n```\n\n以下是非 ARC 环境下的相同源代码：\n\
    \n```\n/* non-ARC */\nid obj = [[NSObject alloc] init];\n```\n\n到目前为止，两者没有区别。让我们看下一个例子：\n\
    \n```\n{\n    id __strong obj = [[NSObject alloc] init];\n}\n```\n\n这里有意添加了局部变量的作用域。该源代码的非\
    \ ARC 版本是：\n\n```\n/* non-ARC */\n{\n    id obj = [[NSObject alloc] init];\n \
    \   [obj release];\n}\n```\n\n这意味着在 ARC 环境下，`release` 方法会被自动添加，用于释放创建的对象及其所有权。当控制流离开变量\
    \ `obj` 的作用域时，由于变量 `obj` 被 `__strong` 修饰，`release` 方法会被调用。\n\n顾名思义，`__strong`\
    \ 这个所有权修饰符表示对对象的强引用。当控制流离开变量作用域时，强引用消失，所分配的对象被释放。让我们在源代码中找出所有权状态：\n\n```\n{\n\
    \    id __strong obj = [[NSObject alloc] init];\n}\n```\n\n这段代码创建了一个对象并拥有其所有权。我们在所有权状态上添加注释：\n\
    \n```\n{\n     /*\n      * 你创建了一个对象并拥有所有权。\n      */\n\n    id __strong obj =\
    \ [[NSObject alloc] init];\n\n      /*\n       * 变量 obj 被 __strong 修饰。\n     \
    \  * 这意味着它拥有该对象的所有权。\n       */\n\n}\n\n  /*\n   * 离开变量 obj 的作用域，其强引用消失。\n   *\
    \ 该对象被自动释放。\n   * 因为没有人拥有所有权，所以该对象被销毁。\n   */\n```\n\n##### 赋值给 `__strong` 修饰的变量\n\
    \n对象的所有权和生命周期非常清晰。接下来，我们看看当你并非自己创建或尚未拥有所有权时获取一个对象会发生什么：\n\n```\n{\n    id __strong\
    \ obj = [NSMutableArray array];\n}\n```\n\n它调用了 `NSMutableArray` 的类方法 `array`\
    \ 来获取一个对象，但并不是自己创建或拥有其所有权。\n\n```\n{\n     /*\n      * 获取一个对象，并非自己创建或拥有所有权\n \
    \     */\n\n    id __strong obj = [NSMutableArray array];\n\n     /*\n      *\
    \ 变量 obj 被 __strong 修饰。\n      * 这意味着它拥有该对象的所有权。\n      */\n\n}\n /*\n  * 离开变量\
    \ obj 的作用域，其强引用消失。\n  * 该对象被自动释放。\n  */\n```\n\n在这种情况下，对象的所有权和生命周期也非常清晰。当然，你可以在\
    \ `__strong` 修饰的变量之间交换值，如下所示：\n\n```\nid __strong obj0 = [[NSObject alloc] init];\n\
    id __strong obj1 = [[NSObject alloc] init];\nid __strong obj2 = nil;\nobj0 = obj1;\n\
    obj2 = obj0;\nobj1 = nil;\n\nobj0 = nil;\nobj2 = nil;\n```\n"
- fmt: "### How the strong reference works\n\nWe investigate the example with comments\
    \ to understand how the strong reference works as in [Listing 2–1](#Chapter02.html#list_2_1).\n\
    \n**Listing 2–1.** *How the strong reference works*\n\n```\nid __strong obj0 =\
    \ [[NSObject alloc] init];  /* object A */\n/*\n * obj0 has a strong reference\
    \ to object A\n */\n\nid __strong obj1 = [[NSObject alloc] init];  /* object B\
    \ */\n/*\n * obj1 has a strong reference to object B\n */\n\nid __strong obj2\
    \ = nil;\n/*\n * obj2 has no reference\n */\n\nobj0 = obj1;\n/*\n *Obj0 has a\
    \ strong reference to object B, which has been assigned from obj1.\n * So, obj0\
    \ does not have a strong reference to object A anymore.\n * Object A is disposed\
    \ of because no one has ownership of it.\n *\n * At this moment, both obj0 and\
    \ obj1 have strong references to object B.\n */\n\nobj2 = obj0;\n/*\n * Through\
    \ obj0, obj2 has a strong reference to object B.\n *\n * At this moment, obj0,\
    \ obj1 and obj2 have strong references to object B.\n */\n\nobj1 = nil;\n/*\n\
    \ * Because nil is assigned to obj1, strong references to object B disappear.\n\
    \ *\n * At this moment, obj0 and obj2 have strong references to object B.\n */\n\
    \nobj0 = nil;\n/*\n * Because nil is assigned to obj0, a strong reference to object\
    \ B disappears.\n *\n * At this moment, obj2 has a strong reference to object\
    \ B.\n */\n\nobj2 = nil;\n/*\n * Because nil is assigned to obj2, a strong reference\
    \ to object B disappears.\n * Object B is disposed of because no one has ownership\
    \ of it\n */\n```\n\nAs in the example ([Listing 2–1](#Chapter02.html#list_2_1)),\
    \ ownership is properly managed not only by variable scope, but also by assignments\
    \ between variables, which are qualified with `__strong`. Of course, a `__strong`\
    \ qualifier can be used as a member variable of Objective-C class or any argument\
    \ of methods as in [Listing 2–2](#Chapter02.html#list_2_2).\n\n**Listing 2–2.**\
    \ *Strong qualifiers for member variable and method’s argument*\n\n```\n@interface\
    \ Test : NSObject\n{\n    id __strong obj_;\n}\n- (void)setObject:(id __strong)obj;\n\
    @end\n\n@implementation Test\n- (id)init\n{\n    self = [super init];\n    return\
    \ self;\n}\n\n- (void)setObject:(id __strong)obj\n{\n    obj_ = obj;\n}\n@end\n\
    ```\n\nLet’s see how we can use the class.\n\n```\n{\n    id __strong test = [[Test\
    \ alloc] init];\n    [test setObject:[[NSObject alloc] init]];\n}\n```\n\nAs usual,\
    \ let’s investigate line by line with some comments ([Listing 2–3](#Chapter02.html#list_2_3)).\n\
    \n**Listing 2–3.** *Strong qualifiers for member variable and method’s argument\
    \ with comments*\n\n```\n{\n    id __strong test = [[Test alloc] init];\n\n/*\n\
    \ * test has a strong reference to a Test Object\n */\n\n[test setObject:[[NSObject\
    \ alloc] init]];\n\n /*\n * The member obj_ of the object\n * has a strong reference\
    \ to a NSObject instance.\n */\n\n}\n /*\n * Leaving the scope of variable test,\
    \ its strong reference disappears.\n * The Test object is released.\n * It is\
    \ disposed of because no one has ownership.\n *\n * When it is disposed of,\n\
    \ * The strong reference by its member obj_ disappears as well.\n * The object\
    \ of NSObject is released.\n * It is disposed of because no one has ownership\
    \ as well.\n */\n```\n\nAs the example above shows, it is very easy to use a `__strong`\
    \ ownership qualifier for a class member and an argument of a method. In a later\
    \ section, I explain how it can be used for a class property.\n\nBy the way, any\
    \ variables that are qualified with `__strong`, `__weak`, and `__autoreleasing`,\
    \ are initialized with `nil`. Let’s see it with an example.\n\n```\nid __strong\
    \ obj0;\nid __weak obj1;\nid __autoreleasing obj2;\n```\n\nThe above source code\
    \ is equivalent to the following.\n\n```\nid __strong obj0 = nil;\nid __weak obj1\
    \ = nil;\nid __autoreleasing obj2 = nil;\n```\n\nAs we saw earlier, Apple says\
    \ that you don’t need to type `retain` or `release` any more. Please note that\
    \ the following rules for reference counting are still fulfilled.\n\n* You have\
    \ ownership of any objects you create.\n* You can take ownership of an object\
    \ using `retain`.\n* When you no longer need it, you must relinquish ownership\
    \ of an object of which you have ownership.\n* You must not relinquish ownership\
    \ of an object of which you don’t have ownership.\n\nThe first two rules are achieved\
    \ by assigning to a `__strong` variable. The third rule is achieved automatically\
    \ by leaving variable scope, by assigning to variables, or when objects having\
    \ a member variable are discarded. The last rule is very clear because `release`\
    \ s are never typed. So all the rules are still fulfilled.\n\nYou don’t even need\
    \ to type `__strong` because it is the default for `id` and object types. By just\
    \ enabling ARC, the rules are fulfilled automatically.\n\n### `__weak` ownership\
    \ qualifier\n\nIt may appear that the compiler can perform memory management with\
    \ only the `__strong` ownership qualifier. Unfortunately, that’s not the case\
    \ because one big problem can’t be solved: circular reference [[Figure 2–2](#Chapter02.html#fig_2_2)].\
    \ The following describes how circular reference occurs.\n\n![images](images/9781430241164_Fig02-02.jpg)\n\
    \n**Figure 2–2.** *Circular reference*"
  raw: '##### How the strong reference works


    We investigate the example with comments to understand how the strong reference
    works as in [Listing 2–1](#Chapter02.html#list_2_1).


    **Listing 2–1.** *How the strong reference works*


    `id __strong obj0 = [[NSObject alloc] init];  /* object A */`


    ` /*`

    `  * obj0 has a strong reference to object A`

    `  */`


    `id __strong obj1 = [[NSObject alloc] init];  /* object B */`


    ` /*`

    `  * obj1 has a strong reference to object B`

    `  */`


    `id __strong obj2 = nil;`


    ` /*`

    `  * obj2 has no reference`

    `  */`


    `obj0 = obj1;`


    ` /*`

    `  *Obj0 has a strong reference to object B, which has been assigned from obj1.`

    `  * So, obj0 does not have a strong reference to object A anymore.`

    `  * Object A is disposed of because no one has ownership of it.`

    `  *`

    `  * At this moment, both obj0 and obj1 have strong references to object B.`

    `  */`


    `obj2 = obj0;`


    ` /*`

    `  * Through obj0, obj2 has a strong reference to object B.`

    `  *`

    `  * At this moment, obj0, obj1 and obj2 have strong references to object B.`

    `  */`


    `obj1 = nil;`


    ` /*`

    `  * Because nil is assigned to obj1, strong references to object B disappear.`

    `  *`

    `  * At this moment, obj0 and obj2 have strong references to object B.`

    `  */`


    `obj0 = nil;`


    ` /*`

    `  * Because nil is assigned to obj0, a strong reference to object B disappears.`

    `  *`

    `  * At this moment, obj2 has a strong reference to object B.`

    `  */`


    `obj2 = nil;`


    ` /*`

    `  * Because nil is assigned to obj2, a strong reference to object B disappears.`

    `  * Object B is disposed of because no one has ownership of it`

    `  */`


    As in the example ([Listing 2–1](#Chapter02.html#list_2_1)), ownership is properly
    managed not only by variable scope, but also by assignments between variables,
    which are qualified with __strong. Of course, a __strong qualifier can be used
    as a member variable of Objective-C class or any argument of methods as in [Listing
    2–2](#Chapter02.html#list_2_2).


    **Listing 2–2.** *_Strong qualifiers for member variable and method’s argument*


    `@interface Test : NSObject`

    `{`

    `    id __strong obj_;`

    `}`

    `- (void)setObject:(id __strong)obj;`

    `@end`


    `@implementation Test`

    `- (id)init`

    `{`

    `    self = [super init];`

    `    return self;`

    `}`


    `- (void)setObject:(id __strong)obj`

    `{`

    `    obj_ = obj;`

    `}`

    `@end`


    Let’s see how we can use the class.


    `{`

    `    id __strong test = [[Test alloc] init];`

    `    [test setObject:[[NSObject alloc] init]];`

    `}`


    As usual, let’s investigate line by line with some comments ([Listing 2–3](#Chapter02.html#list_2_3)).


    **Listing 2–3.** *_Strong qualifiers for member variable and method’s argument
    with comments*


    `{`

    `    id __strong test = [[Test alloc] init];`


    `/*`

    `  * test has a strong reference to a Test Object`

    `  */`


    `[test setObject:[[NSObject alloc] init]];`


    ` /*`

    `  * The member obj_ of the object`

    `  * has a strong reference to a NSObject instance.`

    `  */`


    `}`

    ` /*`

    `  * Leaving the scope of variable test, its strong reference disappears.`

    `  * The Test object is released.`

    `  * It is disposed of because no one has ownership.`

    `  *`

    `  * When it is disposed of,`

    `  * The strong reference by its member obj_ disappears as well.`

    `  * The object of NSObject is released.`

    `  * It is disposed of because no one has ownership as well.`

    `  */`


    As the example above shows, it is very easy to use a __strong ownership qualifier
    for a class member and an argument of a method. In a later section, I explain
    how it can be used for a class property.


    By the way, any variables that are qualified with __strong, __weak, and __autoreleasing,
    are initialized with nil. Let’s see it with an example.


    `id __strong obj0;`

    `id __weak obj1;`

    `id __autoreleasing obj2;`


    The above source code is equivalent to the following.


    `id __strong obj0 = nil;`

    `id __weak obj1 = nil;`

    `id __autoreleasing obj2 = nil;`


    As we saw earlier, Apple says that you don’t need to type retain or release any
    more. Please note that the following rules for reference counting are still fulfilled.


    *   You have ownership of any objects you create.

    *   You can take ownership of an object using retain.

    *   When you no longer need it, you must relinquish ownership of an object of
    which you have ownership.

    *   You must not relinquish ownership of an object of which you don’t have ownership.


    The first two rules are achieved by assigning to a __strong variable. The third
    rule is achieved automatically by leaving variable scope, by assigning to variables,
    or when objects having a member variable are discarded. The last rule is very
    clear because releases are never typed. So all the rules are still fulfilled.


    You don’t even need to type __strong because it is the default for ‘id’ and object
    types. By just enabling ARC, the rules are fulfilled automatically.


    #### __weak ownership qualifier


    It may appear that the compiler can perform memory management with only the __strong
    ownership qualifier. Unfortunately, that’s not the case because one big problem
    can’t be solved: circular reference [[Figure 2–2](#Chapter02.html#fig_2_2)]. The
    following describes how circular reference occurs.


    ![images](images/9781430241164_Fig02-02.jpg)


    **Figure 2–2.** *Circular reference*'
  trans: "\n### 强引用的工作原理\n\n我们通过带注释的示例来理解强引用的工作原理，如代码清单 2-1 所示。\n\n**代码清单 2-1.** *强引用的工作原理*\n\
    \n```\nid __strong obj0 = [[NSObject alloc] init];  /* 对象 A */\n/*\n * obj0 持有对对象\
    \ A 的强引用\n */\n\nid __strong obj1 = [[NSObject alloc] init];  /* 对象 B */\n/*\n\
    \ * obj1 持有对对象 B 的强引用\n */\n\nid __strong obj2 = nil;\n/*\n * obj2 不持有任何引用\n */\n\
    \nobj0 = obj1;\n/*\n * obj0 持有对对象 B 的强引用，该引用是从 obj1 赋值而来的。\n * 因此，obj0 不再持有对对象\
    \ A 的强引用。\n * 由于没有任何对象拥有对象 A 的所有权，对象 A 被销毁。\n *\n * 此时，obj0 和 obj1 都持有对对象 B 的强引用。\n\
    \ */\n\nobj2 = obj0;\n/*\n * 通过 obj0，obj2 持有对对象 B 的强引用。\n *\n * 此时，obj0、obj1 和\
    \ obj2 都持有对对象 B 的强引用。\n */\n\nobj1 = nil;\n/*\n * 由于 nil 被赋值给 obj1，对对象 B 的强引用消失。\n\
    \ *\n * 此时，obj0 和 obj2 持有对对象 B 的强引用。\n */\n\nobj0 = nil;\n/*\n * 由于 nil 被赋值给 obj0，对对象\
    \ B 的强引用消失。\n *\n * 此时，obj2 持有对对象 B 的强引用。\n */\n\nobj2 = nil;\n/*\n * 由于 nil 被赋值给\
    \ obj2，对对象 B 的强引用消失。\n * 由于没有任何对象拥有对象 B 的所有权，对象 B 被销毁。\n */\n```\n\n如示例（代码清单 2-1）所示，所有权不仅通过变量作用域来妥善管理，还通过变量之间的赋值来管理，这些变量都使用\
    \ `__strong` 修饰。当然，`__strong` 修饰符也可以用作 Objective-C 类的成员变量或方法的任意参数，如代码清单 2-2 所示。\n\
    \n**代码清单 2-2.** *成员变量和方法参数的强引用修饰符*\n\n```\n@interface Test : NSObject\n{\n   \
    \ id __strong obj_;\n}\n- (void)setObject:(id __strong)obj;\n@end\n\n@implementation\
    \ Test\n- (id)init\n{\n    self = [super init];\n    return self;\n}\n\n- (void)setObject:(id\
    \ __strong)obj\n{\n    obj_ = obj;\n}\n@end\n```\n\n让我们看看如何使用这个类。\n\n```\n{\n\
    \    id __strong test = [[Test alloc] init];\n    [test setObject:[[NSObject alloc]\
    \ init]];\n}\n```\n\n像往常一样，我们逐行分析并添加一些注释（代码清单 2-3）。\n\n**代码清单 2-3.** *带注释的成员变量和方法参数的强引用修饰符*\n\
    \n```\n{\n    id __strong test = [[Test alloc] init];\n\n/*\n * test 持有对 Test\
    \ 对象的强引用\n */\n\n[test setObject:[[NSObject alloc] init]];\n\n /*\n * 对象的成员变量\
    \ obj_\n * 持有对 NSObject 实例的强引用\n */\n\n}\n /*\n * 离开变量 test 的作用域后，其强引用消失。\n *\
    \ Test 对象被释放。\n * 由于没有任何对象拥有其所有权，它被销毁。\n *\n * 当它被销毁时，\n * 其成员变量 obj_ 所持有的强引用也一并消失。\n\
    \ * NSObject 对象被释放。\n * 同样因为没有对象拥有其所有权，它被销毁。\n */\n```\n\n如上例所示，在类成员和方法参数中使用 `__strong`\
    \ 所有权修饰符非常方便。在后面的章节中，我将解释如何将其用于类属性。\n\n顺便提一下，所有使用 `__strong`、`__weak` 和 `__autoreleasing`\
    \ 修饰的变量，都会被初始化为 `nil`。我们通过一个示例来看一下。\n\n```\nid __strong obj0;\nid __weak obj1;\n\
    id __autoreleasing obj2;\n```\n\n上述源代码等价于以下代码。\n\n```\nid __strong obj0 = nil;\n\
    id __weak obj1 = nil;\nid __autoreleasing obj2 = nil;\n```\n\n正如我们之前所见，Apple 表示你不再需要手动输入\
    \ `retain` 或 `release`。请注意，以下关于引用计数的规则仍然适用。\n\n* 你拥有你创建的任何对象的所有权。\n* 你可以通过 `retain`\
    \ 获取对象的所有权。\n* 当你不再需要某个对象时，你必须放弃你拥有的该对象的所有权。\n* 你绝不能放弃你不拥有所有权的对象的所有权。\n\n前两条规则通过将值赋给\
    \ `__strong` 变量来实现。第三条规则通过离开变量作用域、给变量赋值或丢弃包含成员变量的对象来自动实现。最后一条规则非常明确，因为从来不需要手动输入\
    \ `release`。因此，所有规则仍然得到满足。\n\n你甚至不需要输入 `__strong`，因为它对于 `id` 和对象类型来说是默认的。只需启用\
    \ ARC，这些规则就会自动得到满足。\n\n### `__weak` 所有权修饰符\n\n似乎编译器仅使用 `__strong` 所有权修饰符就能执行内存管理。遗憾的是，情况并非如此，因为有一个大问题无法解决：循环引用\
    \ [图 2-2]。以下描述了循环引用是如何发生的。\n\n![图片](img/9781430241164_Fig02-02.jpg)\n\n**图 2-2.**\
    \ *循环引用*\n"
- fmt: "### Circular Reference\n\nExamples in this section show how a circular reference\
    \ occurs. For instance, it occurs when a member variable of a class has a reference\
    \ to an object. Assume that we have a class as in [Listing 2–4](#Chapter02.html#list_2_4).\n\
    \n**Listing 2–4.** *A class that may cause circular reference*\n\n```\n@interface\
    \ Test : NSObject\n{\n    id __strong obj_;\n}\n- (void)setObject:(id __strong)obj;\n\
    @end\n\n@implementation Test\n- (id)init\n{\n    self = [super init];\n    return\
    \ self;\n}\n\n- (void)setObject:(id __strong)obj\n{\n    obj_ = obj;\n}\n@end\n\
    ```\n\nWe can easily produce a circular reference problem with the class as in\
    \ [Listing 2–5](#Chapter02.html#list_2_5).\n\n**Listing 2–5.** *Produces circular\
    \ reference*\n\n```\n{\n    id test0 = [[Test alloc] init];\n\n    id test1 =\
    \ [[Test alloc] init];\n    [test0 setObject:test1];\n    [test1 setObject:test0];\n\
    }\n```\n\nAdding a few comments opens this example up a little bit ([Listing 2–6](#Chapter02.html#list_2_6)).\n\
    \n**Listing 2–6.** *Produces circular reference with comments*\n\n```\n{\n   \
    \ id test0 = [[Test alloc] init]; /* object A */\n\n     /*\n      * test0 has\
    \ a strong reference to object A\n      */\n\n    id test1 = [[Test alloc] init];\
    \ /* object B */\n\n     /*\n      * test1 has a strong reference to object B\n\
    \      */\n\n    [test0 setObject:test1];\n\n     /*\n      * The member variable\
    \ obj_ of object A has a strong reference to object B.\n      *\n      * At this\
    \ moment, obj_ of object A and test1 have strong references to object B.\n   \
    \  */\n\n    [test1 setObject:test0];\n\n     /*\n      * The member variable\
    \ obj_ of object B has a strong reference to objectA\n      *\n      * At this\
    \ moment, obj_ of object B and test0 have strong references to objectA.\n    \
    \  */\n\n}\n /*\n  * Leaving the scope of variable test0, its strong reference\
    \ disappears.\n  * object A is released automatically.\n  *\n  * Leaving the scope\
    \ of variable test1, its strong reference disappears.\n  * object B is released\
    \ automatically.\n  *\n  * At this moment, obj_ of object B has a strong reference\
    \ to object A.\n  *\n  * At this moment, obj_ of object A has a strong reference\
    \ to object B.\n  *\n  * memory leaked!!\n  */\n```\n\n[Figure 2–3](#Chapter02.html#fig_2_3)\
    \ illustrates this situation.\n\n![images](images/9781430241164_Fig02-03.jpg)\n\
    \n**Figure 2–3.** *Circular reference with class member variables*\n\nWith circular\
    \ reference, memory leaks happen very often. A memory leak means that some objects\
    \ still remain in memory even after they are thought to be discarded.\n\nIn the\
    \ example, when the control flow leaves the variable scope of `test0` and `test1`,\
    \ object A and object B were planned to be discarded. At this point, they should\
    \ be disposed of because no one has an entry point to the objects. But because\
    \ of circular reference, they remain.\n\n### Self Reference\n\nThe next example\
    \ shows that even one object can produce a circular reference by referencing the\
    \ object itself. It is sometimes called “self reference” as shown in [Figure 2–4](#Chapter02.html#fig_2_4).\n\
    \n```\nid test = [[Test alloc] init];\n[test setObject:test];\n```\n\n![images](images/9781430241164_Fig02-04.jpg)\n\
    \n**Figure 2–4.** *Self reference*\n\nHow can we avoid this situation? As we have\
    \ a `__strong` ownership qualifier, you might have noticed there is a `__weak`\
    \ ownership qualifier. By using a `__weak` ownership qualifier, we can avoid a\
    \ circular reference as shown in [Figure 2–5](#Chapter02.html#fig_2_5).\n\nA `__weak`\
    \ ownership qualifier provides a weak reference. A weak reference does not have\
    \ ownership of the object. Let’s see the next example.\n\n```\nid __weak obj =\
    \ [[NSObject alloc] init];\n```\n\nThe variable `obj` is qualified with `__weak`.\
    \ When the source code is compiled, the compiler shows a warning message.\n\n\
    ```\nwarning: assigning retained obj to weak variable; obj will be\n         \
    \ released after assignment [-Warc-unsafe-retained-assign]\n            id __weak\
    \ obj = [[NSObject alloc] init];\n                      ^     ~~~~~~~~~~~~~~~~~~~~~~~\n\
    ```\n\nIn the example, a created object is assigned to a variable `obj`, which\
    \ has been qualified with `__weak`. So, the variable `obj` has a weak reference\
    \ to the object, which means the variable doesn’t have ownership. Because no one\
    \ can take ownership of the created object, the object will be released just after\
    \ creation. The compiler warns about that case. If you assign the object to a\
    \ `__strong` variable at first, the warning will disappear as follows.\n\n```\n\
    {\n    id __strong obj0 = [[NSObject alloc] init];\n    id __weak obj1 = obj0;\n\
    }\n```\n\nLet’s see the source code with comments on ownership status.\n\n```\n\
    {\n     /*\n      * You create an object and have ownership.\n      */\n\n   \
    \ id __strong obj0 = [[NSObject alloc] init];\n\n     /*\n      * The variable\
    \ obj0 is qualified with __strong.\n      * Which means, it has ownership of the\
    \ object.\n      */\n\n    id __weak obj1 = obj0;\n\n     /*\n      * variable\
    \ obj1 has a weak reference of the created object\n      */\n\n}\n /*\n  * Leaving\
    \ the scope of variable obj0, its strong reference disappears.\n  * The object\
    \ is released automatically.\n  * Because no one has ownership, the object is\
    \ discarded.\n  */\n```\n\nBecause a `__weak` reference does not have ownership,\
    \ the object is disposed of when the control flow leaves the variable scope. Now\
    \ we’ve learned that we should use the `__weak` ownership qualifier to avoid cyclic\
    \ reference. We can rewrite the previous example as follows.\n\n```\n@interface\
    \ Test : NSObject\n{\n    id __weak obj_;\n}\n- (void)setObject:(id __strong)obj;\n\
    @end\n```\n\n![images](images/9781430241164_Fig02-05.jpg)\n\n**Figure 2–5.** *Avoid\
    \ circular reference with the __weak ownership qualifier*\n\n### Weak Reference\
    \ Disappears\n\nAnd, there is one more thing you should know about the `__weak`\
    \ ownership qualifier. When a variable has a reference to an object and the object\
    \ is discarded, the weak reference also disappears automatically, which means\
    \ that the variable is assigned to `nil`. Let’s check it with an example ([Listing\
    \ 2–7](#Chapter02.html#list_2_7)).\n\n**Listing 2–7.** *Weak reference disappears*\n\
    \n```\nid __weak obj1 = nil;\n{\n    id __strong obj0 = [[NSObject alloc] init];\n\
    \n    obj1 = obj0;\n\n    NSLog(@\"A: %@\", obj1);\n}\n\nNSLog(@\"B: %@\", obj1);\n\
    ```\n\nThe result is:\n\n```\nA: <NSObject: 0x753e180>\nB: (null)\n```\n\nLet’s\
    \ see the source code again with comments on ownership status ([Listing 2–8](#Chapter02.html#list_2_8)).\n\
    \n**Listing 2–8.** *Weak reference disappears with comments*\n\n```\nid __weak\
    \ obj1 = nil;\n\n{\n     /*\n      * You create an object and have ownership.\n\
    \      */\n\n    id __strong obj0 = [[NSObject alloc] init];\n\n     /*\n    \
    \  * The variable obj0 is qualified with __strong.\n      * Which means, it has\
    \ ownership of the object.\n      */\n\n    obj1 = obj0;\n\n     /*\n      * variable\
    \ obj1 has a weak reference of the object\n      */\n\n    NSLog(@\"A: %@\", obj0);\n\
    \n     /*\n      * The object, to which the variable obj0 has a strong reference,\
    \ is displayed\n      */\n\n}\n /*\n  * Leaving the scope of variable obj0, its\
    \ strong reference disappears.\n  * The object is released.\n  * It is disposed\
    \ of because no one has ownership.\n  *\n  * When it is disposed of,\n  * weak\
    \ reference is destroyed and nil is assigned to the obj1.\n  */\n\nNSLog(@\"B:\
    \ %@\", obj1);\n\n /*\n  * The value of obj1, nil is displayed\n  */\n```\n\n\
    With the `__weak` ownership qualifier, we can avoid cyclic reference. Also by\
    \ checking if the `__weak` variable is `nil`, we can know if the object still\
    \ exists or is already discarded.\n\nUnfortunately the `__weak` ownership qualifier\
    \ is usable only for applications targeting iOS5 (or later) or OSX Lion (or later).\
    \ For applications targeting older environments, `__unsafe_unretained` must be\
    \ used instead."
