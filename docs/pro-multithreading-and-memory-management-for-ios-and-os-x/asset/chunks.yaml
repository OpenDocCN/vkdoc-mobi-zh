- fmt: '# 自动引用计数的前世今生


    OSX Lion 和 iOS5 现在提供了一种名为自动引用计数（Automatic Reference Counting，ARC）的应用程序内存管理机制。简而言之，`ARC`将内存管理工作从程序员转移给了编译器，这通常会显著提升性能。


    在第[2](%23Chapter02.html#ch2)章和第[3](%23Chapter03.html#ch3)章中，您将了解到`ARC`的强大之处。但在进入这个理想世界之前，最好先回顾一下非`ARC`环境下内存管理的基础知识。通过这样做，您将更深入地理解`ARC`所提供的便利，并在接下来两章深入探讨`ARC`时打下更坚实的基础。


    我们从内存管理及其概念的概述开始，然后介绍诸如`alloc`、`dealloc`和`autorelease`等功能的实现。


    ## 引用计数内存管理概述


    在`Objective-C`的许多情况下，我们可以将“内存管理”重新表述为“引用计数”。内存管理意味着程序员在程序需要时分配一块内存区域，并在程序不再需要时释放它。未被正确释放的不需要的内存区域会浪费资源，也可能导致应用程序崩溃。引用计数由乔治·E·柯林斯（George
    E. Collins）于1960年发明，用于简化内存管理。


    为了说明什么是引用计数，让我们以办公室里的灯为例进行类比（[图1–1](#Chapter01.html#fig_1_1)）。


    ![images](images/9781430241164_Fig01-01.jpg)


    **图1–1.** *办公室里的灯*


    假设办公室里只有一盏灯。早上，当有人进入办公室时，他因为需要而打开灯。当他离开办公室时，他不再需要灯，所以关掉它。如果多个人在进出时都开关灯会发生什么？每当有人离开时，他就关掉灯，这意味着即使其他人还在工作，办公室也会变暗（[图1–2](#Chapter01.html#fig_1_2)）。


    ![images](images/9781430241164_Fig01-02.jpg)


    **图1–2.** *灯的问题*


    为了解决这个问题，我们需要一些规则来确保当有一个人或多个人在场时灯是亮着的，只有当没人在场时灯才关闭。


    1.  当有人进入空办公室时，她打开灯。

    2.  随后进入房间的人也要使用这盏灯。

    3.  当有人离开时，此人不再需要这盏灯。

    4.  当最后一个人离开时，他关掉灯。


    为了遵守这些规则，我们引入一个计数器来了解有多少人。让我们看看它是如何工作的。


    1.  当有人进入空办公室时，计数器 +1。它从零变成一。于是灯打开。

    2.  当另一个人进入时，计数器 +1；例如，它从一变成二。

    3.  当有人离开时，计数器 –1；例如，它从二变成一。

    4.  当最后一个人离开时，计数器变为零，因此灯关闭。


    如[图1–3](#Chapter01.html#fig_1_3)所示，通过计数器我们可以正确控制灯。只有在所有人都离开时灯才关闭。


    ![images](images/9781430241164_Fig01-03.jpg)


    **图1–3.** *管理办公室的灯*


    让我们看看这个比喻如何帮助我们理解内存管理。在`Objective-C`中，灯对应于一个对象。虽然办公室只有一盏灯，但在`Objective-C`中我们可以拥有许多对象，直至计算机资源的限制。


    每个人对应于`Objective-C`的每个上下文。上下文用于表示一段程序代码、一个变量、一个变量作用域或一个对象。它意味着某种处理目标对象的东西。[表1–1](#Chapter01.html#tab_1_1)
    突出了办公室灯与`Objective-C`中对象的关系。


    ![images](images/t0101.jpg)


    正如我们可以用计数器管理灯一样，我们可以在`Objective-C`中管理应用程序内存。换句话说，我们可以通过引用计数来管理`Objective-C`的对象，如[图1–4](#Chapter01.html#fig_1_4)所示。


    ![images](images/9781430241164_Fig01-04.jpg)


    **图1–4.** *使用引用计数进行内存管理*


