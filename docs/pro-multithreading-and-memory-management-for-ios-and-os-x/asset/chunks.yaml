    \ Block 类型的变量。\n\n```\nint (^blk1)(int) = blk;\nint (^blk2)(int);\nblk2 = blk1;\n\
    ```\n\n函数可以接受 Block 类型的参数。\n\n```\nvoid func(int (^blk)(int))\n{\n```\n\n同样，函数也可以返回一个\
