- fmt: '#### How a CPU Executes an Application


    As we saw, the source code is converted to CPU bytecodes. Applications package
    such bytecode inside in addition to data to be installed on a Mac or iPhone. When
    a user starts the application on operating systems such as OSX for Mac or iOS
    for iPhone, the bytecodes are allocated on the memory, and, the CPU executes the
    bytecodes one by one, starting with an address that is specified in the application.


    In the example, an instruction `push` on the initial address `1ac` is executed
    first. Then, it goes to the next address. The next instruction `movw` on the address
    `1ae` is executed, then the instruction on `1b2`, and so on.


    The executing address can jump to a distant address by control statements such
    as `if`, `for`, or function calls in Objective-C. One CPU can still execute one
    instruction at the same moment. The execution never splits to run two instructions
    concurrently. Sometimes, an analogy of a path is used to explain the execution
    on the CPU.


    A thread is equivalent to a path of the CPU execution. These days, some CPUs have
    64 CPU cores; others work as two virtual CPUs. It is very common for one computer
    to have multiple CPU cores. But one CPU core still runs only one path. Multithread
    means that an application has many paths. The multithreaded applications can execute
    multiple paths concurrently as shown in [Figure 6–2](#Chapter06.html#fig_6_2).


    ![images](images/9781430241164_Fig06-02.jpg)


    **Figure 6–2.** *CPU executes bytecodes on multithread*


    There are many CPU-related technologies and they evolve rapidly, still one CPU
    core can execute just one CPU bytecode. How can multithreaded applications execute
    bytecodes on multiple paths?


    The XNU kernel that is a core part of OS X and iOS switches between the paths
    at regular time intervals and when it get an OS event, such as system calls, an
    executing state for a path, including CPU registers, is stored in one of the memory
    blocks assigned to each path. And the other executing state is copied back from
    a memory block to the CPU registers, and so on; that is, the CPU continues executing
    on this path. This mechanism is called a *context switch*. A multithreaded program
    repeats context switches over and over. Because of that, one CPU can virtually
    execute multiple threads. When there are multiple CPU cores, each core can run
    a thread in parallel. In this case, the number of threads equals the number of
    CPU cores that can really run in parallel. Programming techniques for multithreading
    are called *multithreaded programming*.


    #### Advantages and Disadvantages of Multithreaded Programming


    Multithreaded programming causes many problems. For example, when multiple threads
    compete to update the same resource, it causes inconsistent data (called a *race
    condition*). When multiple threads await an event at the same time (*deadlock*),
    these threads stack. When too many threads are used, the application memory becomes
    short, and so on ([Figure 6–3](#Chapter06.html#fig_6_3)).


    ![images](images/9781430241164_Fig06-03.jpg)


    **Figure 6–3.** *Problems of multi threaded programming*


    Of course there are many methods to avoid these problems, but the source code
    rapidly becomes too complex. With all of these problems, why is multithreaded
    programming still used?


    The reason is to make the application highly responsive. In an application, a
    thread is started just after the application is launched. The thread draws user
    interfaces, handles events from a touch panel, and so on. This thread is called
    the *main thread*. If the main thread executes a time-consuming task, such as
    image processing for AR or database access, the task blocks all the other tasks
    on the main thread. On OSX and iOS, the main loop, called RunLoop on the main
    thread, should not be blocked because only the main thread can update user interfaces.
    When it is blocked, user interfaces aren’t updated and the same still image is
    displayed for quite a long time. To avoid such a situation, time-consuming tasks
    should be executed on the other threads as shown in [Figure 6–4](#Chapter06.html#fig_6_4).


    ![images](images/9781430241164_Fig06-04.jpg)


    **Figure 6–4.** *Multithreaded programming advantages*


    In a multithreaded application, the user interface can still be responsive while
    the time-consuming task is running. GCD also makes multithreaded programming very
    elegant. In the next chapter, we show how to use GCD API.


    ### Summary


    In this chapter, we learned what multithreaded programming is and its advantages
    and disadvantages. In the next chapter, we learn the basic mechanism of GCD and
    GCD APIs. We also show how GCD is better than traditional multithreaded programming.


    ## Chapter 7


    ## GCD Basics


    In this chapter, we show how to use GCD. At first, we start with a dispatch queue
    that is a core concept of GCD and show how to add tasks to the queues. After that,
    we design an API to control queues and tasks. Finally, we also show how to dispatch
    I/O to control files using GCD.


    ### Dispatch Queues


    A dispatch queue is, as its name suggests, a queue to store tasks to be executed.
    Application programmers can write tasks as Block literals and add them to a dispatch
    queue by a `dispatch_async` function, and the like. Then the dispatch queue executes
    the tasks in the added order, first-in-first-out (FIFO), as shown in [Figure 7–1](#Chapter07.html#fig_7_1).


    ![images](images/9781430241164_Fig07-01.jpg)


    **Figure 7–1.** *Execution on a dispatch queue*


    As shown in [Figure 7–2](#Chapter07.html#fig_7_2), there are two kinds of dispatch
    queues. One is a serial dispatch queue, which waits until the current running
    task finishes before starting another task. The other is a concurrent dispatch
    queue, which doesn’t wait.


    ![images](images/9781430241164_Fig07-02.jpg)


    **Figure 7–2.** *Serial Dispatch Queue and Concurrent Dispatch Queue*


    #### Two Types of Dispatch Queue


    Let’s compare the two types of dispatch queues. The following source code adds
    tasks to the dispatch queue using the `dispatch_async` function.


    ```

    dispatch_async(queue, blk0);

    dispatch_async(queue, blk1);

    dispatch_async(queue, blk2);

    dispatch_async(queue, blk3);

    dispatch_async(queue, blk4);

    dispatch_async(queue, blk5);

    dispatch_async(queue, blk6);

    dispatch_async(queue, blk7);

    ```


    Let’s take a look at how it works when the variable `queue` is a serial dispatch
    queue that waits until the current running task is finished.


    #### Serial Dispatch Queue


    Firstly, `blk0` is started. Next, `blk1` is started after `blk0` is finished.
    Then `blk2` is started when `blk1` is finished, and so on. Only one task runs
    at a time, which means that the result is always the same. The blocks are executed
    as:


    ```

    blk0

    blk1

    blk2

    blk3

    blk4

    blk5

    blk6

    blk7

    ```


    Next, let’s see how it works when the variable `queue` is a concurrent dispatch
    queue that doesn’t wait for the running tasks to complete.'
