    \ 和 `CFRelease` 是 Objective-C 在非 ARC 环境下 `retain` 和 `release` 的等效函数。\n\nCore Foundation\
    \ 对象和 Objective-C 对象之间的差异非常小。或多或少只在于创建方式的不同：要么是使用 Objective-C 的 Foundation 框架（Cocoa）创建，要么是使用\
    \ Core Foundation 框架创建。创建之后，它可以透明地在两种框架的方式下使用。例如，即使一个对象是用 Foundation 框架 API 创建的，它也可以用\
    \ Core Foundation 框架 API 释放，反之亦然。\n\n实际上，Core Foundation 对象本身和 Objective-C 对象本身之间没有区别。因此，在非\
    \ ARC 环境下转换对象时，仅使用 C 语言风格的转型就足够了。这种转换被称为“无缝桥接”（Toll-Free Bridge），因为仅进行转型对 CPU\
    \ 来说没有开销。\n\n你可以在以下文档中查看无缝桥接类的列表。\n\nToll-Free Bridged Types\n[`http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html`](http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html)\n\
    \n对于启用了 ARC 的环境，为了在 Objective-C 和 Core Foundation 之间转换对象，换句话说，为了进行无缝桥接转型，提供了以下函数。\n\
    \n```\nCFTypeRef CFBridgingRetain(id X) {\n    return (__bridge_retained CFTypeRef)X;\n\
    }\n\nid CFBridgingRelease(CFTypeRef X) {\n    return (__bridge_transfer id)X;\n\
    }\n```\n\n让我们看看如何使用这些函数。\n\n# `CFBridgingRetain` 函数\n\n清单 2-11 创建了一个具备所有权的 `NSMutableArray`\
    \ 对象，并将该对象用作 Core Foundation 对象。\n\n**清单 2-11.** *CFBridgingRetain*\n\n```\nCFMutableArrayRef\
    \ cfObject = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n    cfObject\
    \ = CFBridgingRetain(obj);\n    CFShow(cfObject);\n    printf(\"retain count =\
    \ %d\\n\", CFGetRetainCount(cfObject));\n}\nprintf(\"retain count after the scope\
    \ = %d\\n\", CFGetRetainCount(cfObject));\nCFRelease(cfObject);\n```\n\n结果如下所示。`()`\
    \ 表示一个空数组。\n\n```\n()\nretain count = 2\nretain count after the scope = 1\n```\n\
    \n现在我们已经了解到，Foundation 框架中的 Objective-C 对象可以用作 Core Foundation 对象。此外，该对象也可以使用\
    \ `CFRelease` 来释放。在示例中，你也可以使用 `__bridge_retained` 转型来代替 `CFBridgingRetain`，如下所示。选择你喜欢的任意一种方式即可。\n\
    \n```\nCFMutableArrayRef cfObject = (__bridge_retained CFMutableArrayRef)obj;\n\
    ```\n\n让我们看看带有所有权状态注释和 `CFGetRetainCount` 值的源代码（清单 2-12）。\n\n**清单 2-12.** *带有注释的\
    \ CFBridgingRetain*\n\n```\nCFMutableArrayRef cfObject = NULL;\n{\n    id obj\
    \ = [[NSMutableArray alloc] init];\n\n     /*\n      * 变量 obj 持有对该对象的强引用\n   \
    \   */\n    cfObject = CFBridgingRetain(obj);\n\n     /*\n      * CFBridgingRetain\
    \ 的作用等同于调用了 CFRetain，\n      * 并且该对象被赋值给变量 cfObject\n      */\n\n    CFShow(cfObject);\n\
    \    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\n     /*\n\
    \      * 引用计数为 2。一个来自变量 obj 的强引用，\n      * 另一个来自 CFBridgingRetain。\n      */\n\
    }\n\n /*\n  * 离开变量 obj 的作用域，其强引用消失。\n  * 引用计数为 1。\n  */\n\nprintf(\"retain count\
    \ after the scope = %d\\n\", CFGetRetainCount(cfObject));\nCFRelease(cfObject);\n\
    \n/*\n* 由于 CFRelease，引用计数变为 0。\n* 因此，该对象被丢弃。\n*/\n```\n\n接下来，让我们看看如果使用 `__bridge`\
    \ 转型而不是 `CFBridgingRetain` 或 `__bridge_retained` 转型会发生什么（清单 2-13）。\n\n**清单 2-13.**\
    \ *使用 `__bridge` 转型代替 `__bridge_retained` 转型*\n\n```\nCFMutableArrayRef cfObject\
    \ = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n\n     /*\n      *\
    \ 变量 obj 持有对该对象的强引用\n      */\n\n    cfObject = (__bridge CFMutableArrayRef)obj;\n\
    \    CFShow(cfObject);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
    \n     /*\n      * __bridge 转型不涉及所有权状态的变化。\n      * 引用计数为 1，来自变量 obj 的强引用。\n \
    \     */\n}\n\n /*\n  * 离开变量 obj 的作用域，其强引用消失。\n  * 该对象被自动释放。\n  * 由于没有任何人拥有所有权，该对象被丢弃。\n\
    \  */\n\n /*\n  * 从此处开始，对该对象的任何访问都是无效的！（悬垂指针）\n  */\n\nprintf(\"retain count after\
    \ the scope = %d\\n\", CFGetRetainCount(cfObject));\nCFRelease(cfObject);\n```\n\
    \n现在，我们理解了为什么需要 `CFBridgingRetain` 或 `__bridge_retained` 转型。\n"
- fmt: "# CFBridgingRelease function\n\n[Listing 2–14](#Chapter02.html#list_2_14)\
    \ shows how to create an `NSMutableArray` object with a Core Foundation API in\
    \ an opposite manner. It uses the `CFBridgingRelease` function.\n\n**Listing 2–14.**\
    \ Creating `NSMutableArray` object\n\n```\n{\n    CFMutableArrayRef cfObject =\n\
    \        CFArrayCreateMutable(kCFAllocatorDefault, 0, NULL);\n    printf(\"retain\
    \ count = %d\\n\", CFGetRetainCount(cfObject));\n    id obj = CFBridgingRelease(cfObject);\n\
    \    printf(\"retain count after the cast = %d\\n\", CFGetRetainCount(cfObject));\n\
    \    NSLog(@\"class=%@\", obj);\n}\n```\n\nYou can see that the object is created\
    \ with ownership by the Core Foundation Framework API. As the opposite of the\
    \ previous example, the object is used as an Objective-C object. The result is\
    \ as follows.\n\n```\nretain count = 1\nretain count after the cast = 1\n```\n\
    \nOf course you can use `bridge_transfer` instead of `CFBridgingRelease`.\n\n\
    ```\nid obj = (__bridge_transfer id)cfObject;\n```\n\nAnd, let’s see the source\
    \ code with comments on ownership status as usual ([Listing 2–15](#Chapter02.html#list_2_15)).\n\
    \n**Listing 2–15.** Creating `NSMutableArray` object with comments\n\n```\n{\n\
    \    CFMutableArrayRef cfObject =\n    CFArrayCreateMutable(kCFAllocatorDefault,\
    \ 0, NULL);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
    \n     /*\n      * The object is created with ownership by Core Foundation Framework\
    \ API.\n      * The retain count is one.\n      */\n\n    id obj = CFBridgingRelease(cfObject);\n\
    \n     /*\n      * By assignment  after CFBridgingRelease,\n      * variable obj\
    \ has a strong reference and then\n      * the object is released by CFRelease.\n\
    \      */\n\n    printf(\"retain count after the cast = %d\\n\", CFGetRetainCount(cfObject));\n\
    \n     /*\n      * Only the variable obj has a strong reference to\n      * the\
    \ object, so the retain count is one.\n      *\n      * And, after being cast\
    \ by CFBridgingRelease,\n      * pointer stored in variable cfObject is still\
    \ valid.\n      */\n\n    NSLog(@\"class=%@\", obj);\n}\n\n /*\n  * Leaving the\
    \ scope of variable obj, its strong reference disappears.\n  * The object is released\
    \ automatically.\n  * Because no one has ownership, the object is discarded.\n\
    \  */\n```\n\nLet’s see what happens when `__bridge` cast is used instead of `CFBridgingRelease`\
    \ or `__bridge_transfer` cast ([Listing 2–16](#Chapter02.html#list_2_16)).\n\n\
    **Listing 2–16.** `__bridge` cast is used instead of `__bridge_transfer` cast\n\
    \n```\n{\n    CFMutableArrayRef cfObject =\n    CFArrayCreateMutable(kCFAllocatorDefault,\
    \ 0, NULL);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
    \n     /*\n      * The object is created with ownership by Core Foundation Framework\
    \ API.\n      * The retain count is one.\n      */\n\n    id obj = (__bridge id)cfObject;\n\
    \n     /*\n      * variable obj has a strong reference because it is qualified\
    \ with __strong.\n      */\n\n    printf(\"retain count after the cast = %d\\\
    n\", CFGetRetainCount(cfObject));\n\n     /*\n      * Because variable obj has\
    \ a strong reference and\n      * CFRelease is not called,\n      * retain count\
    \ is two.\n      */\n\n    NSLog(@\"class=%@\", obj);\n}\n\n /*\n  * Leaving the\
    \ scope of variable obj, its strong reference disappears.\n  * The object is released.\n\
    \  */\n\n /*\n  * Because the reference count is one, it is not discarded. Memory\
    \ leak!\n  */\n```\n\nAs shown in the above example, you have to use `CFBridgingRetain`/`CFBridgingRelease`\
    \ or `__bridge_retained`/`__bridge_transfer` cast properly. When you need to assign\
    \ Objective-C objects to variables of C type, such as `void*`, you have to implement\
    \ it with the utmost care.\n\n## Property\n\nWith ARC, new modifiers are introduced\
    \ for the Objective-C class property as follows.\n\n```\n@property (nonatomic,\
    \ strong) NSString *name;\n```\n\nAs a property modifier, you can use the qualifiers\
    \ listed in [Table 2–1](#Chapter02.html#tab_2_1) in an ARC-enabled environment.\n\
    \n![images](images/t0201.jpg)\n\nAssigning to a property is the same as assigning\
    \ to a variable with a corresponding ownership qualifier. A copy modifier is not\
    \ just an assignment. It copies the object by using `NSCopying` protocol `copyWithZone:`\
    \ method and then assigning it.\n\nWhen you manually declare an instance variable\
    \ for the property as well, it has to have the same ownership qualifier as the\
    \ property. Let’s see it with an example.\n\n```\n@interface SomeObject : NSObject\
    \ {\n    id obj;\n}\n@end\n```\n\nThe member variable `obj` is declared as an\
    \ `id` type. At the same time, if the property is declared with a weak ownership\
    \ qualifier as:\n\n```\n@property (nonatomic, weak) id obj;\n```\n\nit causes\
    \ a compile error.\n\n```\nerror: existing ivar 'obj' for __weak property 'obj'\
    \ must be __weak\n    @synthesize obj;\n                ^\n    note: property\
    \ declared here\n    @property (nonatomic, weak) id obj;\n                   \
    \                ^\n```\n\nIn this case, the member variable must be qualified\
    \ with `__weak`.\n\n```\n@interface SomeObject : NSObject {\n    id _weak obj;\n\
    } @end\n```\n\nOr, the property has to have the modifier \"strong\".\n\n```\n\
    @property (nonatomic, strong) id obj;\n```\n\nNext, let’s see what you should\
    \ know when using an array with ARC."
  raw: '##### CFBridgingRelease function


    [Listing 2–14](#Chapter02.html#list_2_14) shows how to create an NSMutableArray
    object with a Core Foundation API in an opposite manner. It uses the CFBridgingRelease
    function.


    **Listing 2–14.** *Creating NSMutableArray object*


    `{`

    `    CFMutableArrayRef cfObject =`

    `        CFArrayCreateMutable(kCFAllocatorDefault, 0, NULL);`

    `    printf("retain count = %d\n", CFGetRetainCount(cfObject));`

    `    id obj = CFBridgingRelease(cfObject);`

    `    printf("retain count after the cast = %d\n", CFGetRetainCount(cfObject));`

    `    NSLog(@"class=%@", obj);`

    `}`


    You can see that the object is created with ownership by the Core Foundation Framework
    API. As the opposite of the previous example, the object is used as an Objective-C
    object, The result is as follows.


    `retain count = 1`

    `retain count after the cast = 1`


    Of course you can use bridge_transfer instead of CFBridgingRelease.


    `id obj = (__bridge_transfer id)cfObject;`


    And, let’s see the source code with comments on ownership status as usual ([Listing
    2–15](#Chapter02.html#list_2_15)).


    **Listing 2–15.** *Creating NSMutableArray object with comments*


    `{`

    `    CFMutableArrayRef cfObject =`

    `    CFArrayCreateMutable(kCFAllocatorDefault, 0, NULL);`

    `    printf("retain count = %d\n", CFGetRetainCount(cfObject));`


    `     /*`

    `      * The object is created with ownership by Core Foundation Framework API.`

    `      * The retain count is one.`

    `      */`


    `    id obj = CFBridgingRelease(cfObject);`


    `     /*`

    `      * By assignment  after CFBridgingRelease,`

    `      * variable obj has a strong reference and then`

    `      * the object is released by CFRelease.`

    `      */`


    `    printf("retain count after the cast = %d\n", CFGetRetainCount(cfObject));`


    `     /*`

    `      * Only the variable obj has a strong reference to`

    `      * the object, so the retain count is one.`

    `      *`

    `      * And, after being cast by CFBridgingRelease,`

    `      * pointer stored in variable cfObject is still valid.`

    `      */`


    `    NSLog(@"class=%@", obj);`

    `}`


    ` /*`

    `  * Leaving the scope of variable obj, its strong reference disappears.`

    `  * The object is released automatically.`

    `  * Because no one has ownership, the object is discarded.`

    `  */`


    Let’s see what happens when __bridge cast is used instead of CFBridgingRelease
    or __bridge_transfer cast ([Listing 2–16](#Chapter02.html#list_2_16)).


    **Listing 2–16.** *__bridge cast is used instead of __bridge_transfer cast*


    `{`

    `    CFMutableArrayRef cfObject =`

    `    CFArrayCreateMutable(kCFAllocatorDefault, 0, NULL);`

    `    printf("retain count = %d\n", CFGetRetainCount(cfObject));`


    `     /*`

    `      * The object is created with ownership by Core Foundation Framework API.`

    `      * The retain count is one.`

    `      */`


    `    id obj = (__bridge id)cfObject;`


    `     /*`

    `      * variable obj has a strong reference because it is qualified with __strong.`

    `      */`


    `    printf("retain count after the cast = %d\n", CFGetRetainCount(cfObject));`


    `     /*`

    `      * Because variable obj has a strong reference and`

    `      * CFRelease is not called,`

    `      * retain count is two.`

    `      */`


    `    NSLog(@"class=%@", obj);`

    `}`


    ` /*`

    `  * Leaving the scope of variable obj, its strong reference disappears.`

    `  * The object is released.`

    `  */`


    ` /*`

    `  * Because the reference count is one, it is not discarded. Memory leak!`

    `  */`


    As shown in the above example, you have to use CFBridgingRetain/CFBridgingRelease
    or __bridge_retained/__bridge_transfer cast properly. When you need to assign
    Objective-C objects to variables of C type, such as void*, you have to implement
    it with the utmost care.


    ### Property


    With ARC, new modifiers are introduced for the Objective-C class property as follows.


    `@property (nonatomic, strong) NSString *name;`


    As a property modifier, you can use the qualifiers listed in [Table 2–1](#Chapter02.html#tab_2_1)
    in an ARC-enabled environment.


    ![images](images/t0201.jpg)


    Assigning to a property is the same as assigning to a variable with a corresponding
    ownership qualifier. A copy modifier is not just an assignment. It copies the
    object by using NSCopying protocol copyWithZone: method and then assigning it.


    When you manually declare an instance variable for the property as well, it has
    to have the same ownership qualifier as the property. Let’s see it with an example.


    `i`

    `@interface SomeObject : NSObject {`

    `    id obj;`

    `}`

    `@end`


    The member variable obj is declared as an ‘id’ type. At the same time, if the
    property is declared with a weak ownership qualifier as:


    `@property (nonatomic, weak) id obj;`


    it causes a compile error.


    `error: existing ivar ''obj'' for __weak property ''obj'' must be __weak`

    `    @synthesize obj;`

    `                ^`

    `    note: property declared here`

    `    @property (nonatomic, weak) id obj;`

    `                                   ^`


    In this case, the member variable must be qualified with __weak.


    `@interface SomeObject : NSObject {`

    `    id _weak obj;`

    `} @end`


    Or, the property has to have the modifier “strong”.


    `@property (nonatomic, strong) id obj;`


    Next, let’s see what you should know when using an array with ARC.'
