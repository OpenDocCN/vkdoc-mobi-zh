  raw: '#### Coping Blocks Manually


    I’ve stated that “in many cases, the compiler automatically detects.” When it
    doesn’t detect, you have to copy the Block from the stack to the heap manually.
    To do that, you use an instance method “copy”. The “copy” method, which we’ve
    seen many times in Part I, is in the alloc/new/copy/mutableCopy method group.
    In what situation can’t the compiler detect it?


    The answer is:


    *   When a Block is passed as an argument for methods or functions


    But if the method or the function copies the argument inside, the caller doesn’t
    need to copy it manually as


    *   Cocoa Framework methods, the name of which includes “usingBlock”

    *   Grand Central Dispatch API


    For example, you don’t need to copy when you use the NSArray instance method “enumerateOb-
    jectsUsingBlock” or “dispatch_async” function. On the contrary, you need to copy
    a Block when you pass it to an NSArray class instance method “initWithObjects”.
    Let’s see that with an example.


    `- (id) getBlockArray`

    `{`

    `    int val = 10;`


    `    return [[NSArray alloc] initWithObjects:`

    `        ^{NSLog(@"blk0:%d", val);},`

    `        ^{NSLog(@"blk1:%d", val);}, nil];`

    `}`


    The “getBlockArray” method creates two Blocks on the stack and it passes them
    to the NSArray class instance method “initWithObjects”. What happens when the
    Block is executed in the caller after the Block is obtained from the NSArray object?


    `id obj = getBlockArray();`


    `typedef void (^blk_t)(void);`


    `blk_t blk = (blk_t)[obj objectAtIndex:0];`


    `blk();`


    The application crashes where “blk()” is executed. In other words, Block execution
    throws an exception. After returning from the getBlockArray function, the Block
    on the stack has been destroyed. In this case, unfortunately, the compiler can’t
    detect whether a copy is needed. Although the compiler could copy all the Blocks
    every time without detecting if a copy is needed, it consumes too many CPU resources
    when a Block is copied from the stack to the heap. If a Block on the stack is
    enough and still copied to the heap, CPU power is just being used for nothing.
    So, the compiler doesn’t do that. But, instead, sometimes you have to copy a Block
    manually.


    The source code will work after some modifications as follows.


    `- (id) getBlockArray`

    `{`

    `    int val = 10;`


    `    return [[NSArray alloc] initWithObjects:`

    `        [^{NSLog(@"blk0:%d", val);} copy],`

    `        [^{NSLog(@"blk1:%d", val);} copy], nil];`

    `}`


    It looks a bit strange, but the “copy” method can be called on a Block literal
    directly. Of course you can call the “copy” method through a Block type variable.


    `typedef int (^blk_t)(int);`


    `blk_t blk = ^(int count){return rate * count;};`


    `blk = [blk copy];`


    By the way, what will happen if the “copy” method is called on a Block on the
    heap or on a data section? [Table 5–2](#Chapter05.html#tab_5_2) summarizes them.


    ![images](images/t0502.jpg)


    No matter where the Block is stored, nothing bad happens by calling the copy method.
    If you are not sure if you have to copy, it is safe just to call “copy” on the
    Block.


    But, is it all right to call “copy” multiple times? With ARC, we can’t call release,
    however.


    #### Copying Block Multiple Times


    `blk = [[[[blk copy] copy] copy] copy];`


    This can be rewritten as follows.


    `{`

    `    blk_t tmp = [blk copy];`

    `    blk = tmp;`

    `}`

    `{`

    `    blk_t tmp = [blk copy];`

    `    blk = tmp;`

    `}`

    `{`

    `    blk_t tmp = [blk copy];`

    `    blk = tmp;`

    `}`

    `{`

    `    blk_t tmp = [blk copy];`

    `    blk = tmp;`

    `}`


    Let’s check the source code with comments as shown in [Listing 5–6](#Chapter05.html#list_5_6).


    **Listing 5–6.** *Copying multiple times with comments*


    `     /*`

    `      * Assume that a Block on the stack was assigned to the variable ''blk''`

    `      */`


    `    blk_t tmp = [blk copy];`


    `     /*`

    `      * A Block on the heap is assigned to the variable ''tmp''.`

    `      * ''tmp'' has ownership of it because of its strong reference.`

    `      */`


    `    blk = tmp;`


    `     /*`

    `      * The Block in the variable ''tmp'' is assigned to the variable ''blk''.`

    `      * ''blk'' has ownership of it because of its strong reference.`

    `      *`

    `      * The Block, which was originally assigned to ''blk'',`

    `      * is not affected by this assignment, because it is on the stack.`

    `      *`

    `      * At this moment, the variables ''blk'' and ''tmp'' have ownership of the
    Block.`

    `      */`


    `}`

    `     /*`

    `      * Leaving the variable scope ''tmp'',`

    `      * and its strong reference disappears and the Block is released.`

    `      *`

    `      * Because the variable ''blk'' has ownership of it, the Block isn''t disposed
    of.`

    `      */`

    `{`

    `     /*`

    `      * The variable ''blk'' has the Block on the heap.`

    `      * ''blk'' has ownership of it because of its strong reference.`

    `      */`


    `    blk_t tmp = [blk copy];`


    `     /*`

    `      * A Block on the heap is assigned to the variable ''tmp''.`

    `      * ''tmp'' has ownership of it because of its strong reference.`

    `      */`


    `    blk = tmp;`


    `     /*`

    `      * Because the different value is assigned to the variable ''blk'',`

    `      * The strong reference to the Block, which was assigned in the variable
    ''blk'',`

    `disappears`

    `      * and the Block is released.`

    `      *`

    `      * The variable ''tmp'' has ownership of the Block,`

    `      * The Block isn''t disposed of.`

    `      *`

    `      * The Block in the variable ''tmp'' is assigned to the variable ''blk''.`

    `      * The variable ''blk'' has ownership because of the strong reference.`

    `      *`

    `      * At this moment, the variables ''blk'' and ''tmp'' have ownership of the
    Block.`

    `      */`


    `}`

    `     /*`

    `      * Leaving the variable scope ''tmp'',`

    `      * and its strong reference disappears and the Block is released.`

    `      *`

    `      * Because the variable ''blk'' has ownership of it, the Block isn''t disposed
    of.`

    `      */`


    `     /*`

    `      * repeating ...`

    `      */`


    With ARC, it works with no problem.'
  trans: "\n### 手动管理 Block\n\n我提到过“在多数情况下，编译器会自动检测”。但当编译器未能检测到时，你就需要手动将 Block 从栈复制到堆。为此，你可以使用实例方法\
    \ `copy`。我们在第一部分多次见过的 `copy` 方法，属于 alloc/new/copy/mutableCopy 方法组。那么，编译器在什么情况下无法检测到呢？\n\
    \n答案是：\n\n- 当 Block 作为参数传递给方法或函数时\n\n但如果方法或函数在内部复制了该参数，则调用者无需手动复制，例如：\n\n- Cocoa\
    \ 框架中名称包含 `usingBlock` 的方法\n- Grand Central Dispatch API\n\n例如，在使用 `NSArray` 实例方法\
    \ `enumerateObjectsUsingBlock` 或 `dispatch_async` 函数时，你无需进行复制。相反，当你将 Block 传递给\
    \ `NSArray` 类实例方法 `initWithObjects` 时，则需要复制 Block。下面通过示例来说明。\n\n```\n- (id) getBlockArray\n\
    {\n    int val = 10;\n\n    return [[NSArray alloc] initWithObjects:\n       \
    \ ^{NSLog(@\"blk0:%d\", val);},\n        ^{NSLog(@\"blk1:%d\", val);}, nil];\n\
    }\n```\n\n`getBlockArray` 方法在栈上创建了两个 Block，并将它们传递给 `NSArray` 类实例方法 `initWithObjects`。当从\
    \ `NSArray` 对象获取 Block 并在调用者中执行时，会发生什么？\n\n```\nid obj = getBlockArray();\n\n\
    typedef void (^blk_t)(void);\n\nblk_t blk = (blk_t)[obj objectAtIndex:0];\n\n\
    blk();\n```\n\n应用会在执行 `blk()` 时崩溃。换句话说，Block 的执行会抛出异常。从 `getBlockArray` 函数返回后，栈上的\
    \ Block 已被销毁。不幸的是，在这种情况下，编译器无法检测是否需要复制。虽然编译器可以在不检测是否需要复制的情况下每次都复制所有 Block，但当 Block\
    \ 从栈复制到堆时会消耗过多的 CPU 资源。如果栈上的 Block 已经足够用，却仍然被复制到堆上，CPU 性能就被白白浪费了。因此，编译器不会这样做。但反过来，有时你就需要手动复制\
    \ Block。\n\n修改后的源码如下，可以正常工作。\n\n```\n- (id) getBlockArray\n{\n    int val = 10;\n\
    \n    return [[NSArray alloc] initWithObjects:\n        [^{NSLog(@\"blk0:%d\"\
    , val);} copy],\n        [^{NSLog(@\"blk1:%d\", val);} copy], nil];\n}\n```\n\n\
    看起来有点奇怪，但可以直接对 Block 字面量调用 `copy` 方法。当然，你也可以通过 Block 类型的变量来调用 `copy` 方法。\n\n```\n\
    typedef int (^blk_t)(int);\n\nblk_t blk = ^(int count){return rate * count;};\n\
    \nblk = [blk copy];\n```\n\n顺便问一下，如果对堆上或数据段中的 Block 调用 `copy` 方法，会发生什么？表 5-2 总结了这些情况。\n\
    \n![images](img/t0502.jpg)\n\n无论 Block 存储在何处，调用 `copy` 方法都不会产生不良后果。如果你不确定是否需要复制，那么直接对\
    \ Block 调用 `copy` 是安全的选择。\n\n但是，多次调用 `copy` 可以吗？因为在 ARC 下，我们不能调用 `release`。\n\n\
    #### 多次复制 Block\n\n```\nblk = [[[[blk copy] copy] copy] copy];\n```\n\n这可以重写为如下形式。\n\
    \n```\n{\n    blk_t tmp = [blk copy];\n    blk = tmp;\n}\n{\n    blk_t tmp = [blk\
    \ copy];\n    blk = tmp;\n}\n{\n    blk_t tmp = [blk copy];\n    blk = tmp;\n\
    }\n{\n    blk_t tmp = [blk copy];\n    blk = tmp;\n}\n```\n\n让我们用 代码清单 5-6 中带注释的源码来检查一下。\n\
    \n**代码清单 5-6.** *带注释的多次复制*\n\n```\n     /*\n      * 假设一个栈上的 Block 已被赋值给变量 'blk'\n\
    \      */\n\n    blk_t tmp = [blk copy];\n\n     /*\n      * 一个堆上的 Block 被赋值给变量\
    \ 'tmp'。\n      * 由于强引用，'tmp' 拥有该 Block 的所有权。\n      */\n\n    blk = tmp;\n\n\
    \     /*\n      * 变量 'tmp' 中的 Block 被赋值给变量 'blk'。\n      * 由于强引用，'blk' 拥有该 Block\
    \ 的所有权。\n      *\n      * 最初赋值给 'blk' 的那个 Block 不受此赋值影响，因为它位于栈上。\n      *\n  \
    \    * 此时，变量 'blk' 和 'tmp' 都拥有该 Block 的所有权。\n      */\n\n}\n     /*\n      * 离开变量作用域\
    \ 'tmp'，\n      * 其强引用消失，Block 被释放。\n      *\n      * 由于变量 'blk' 拥有该 Block 的所有权，因此该\
    \ Block 不会被销毁。\n      */\n{\n     /*\n      * 变量 'blk' 持有一个堆上的 Block。\n      *\
    \ 由于强引用，'blk' 拥有该 Block 的所有权。\n      */\n\n    blk_t tmp = [blk copy];\n\n   \
    \  /*\n      * 一个堆上的 Block 被赋值给变量 'tmp'。\n      * 由于强引用，'tmp' 拥有该 Block 的所有权。\n\
    \      */\n\n    blk = tmp;\n\n     /*\n      * 由于不同的值被赋值给变量 'blk'，\n      * 对之前赋值给变量\
    \ 'blk' 的 Block 的强引用消失，\n      * 该 Block 被释放。\n      *\n      * 变量 'tmp' 拥有该 Block\
    \ 的所有权，\n      * 因此该 Block 不会被销毁。\n      *\n      * 变量 'tmp' 中的 Block 被赋值给变量 'blk'。\n\
    \      * 由于强引用，变量 'blk' 拥有了所有权。\n      *\n      * 此时，变量 'blk' 和 'tmp' 都拥有该 Block\
    \ 的所有权。\n      */\n\n}\n     /*\n      * 离开变量作用域 'tmp'，\n      * 其强引用消失，Block\
    \ 被释放。\n      *\n      * 由于变量 'blk' 拥有该 Block 的所有权，因此该 Block 不会被销毁。\n      */\n\
    \n     /*\n      * 重复 ...\n      */\n```\n\n在 ARC 下，这可以正常工作，没有问题。\n"
- fmt: '### Memory Segments for __block Variables


    In the previous section, we’ve learned only about Blocks. How about `__block`
    variables? When a Block uses a `__block` variable and is copied from the stack
    to the heap, the `__block` variable is affected. [Table 5–3](#Chapter05.html#tab_5_3)
    summarizes that.


    ![images](images/t0503.jpg)


    When a Block is copied from the stack to the heap and it uses `__block` variables
    and the `__block` variables aren’t used in the other Blocks, the `__block` variables
    must be on the stack. And, at the moment, all the `__block` variables are also
    copied from the stack to the heap and the Block has ownership of the `__block`
    variables as shown in [Figure 5–6](#Chapter05.html#fig_5_6).


    When the Block on the heap is copied again, the `__block` variables will not be
    affected.


    ![images](images/9781430241164_Fig05-06.jpg)


    **Figure 5–6.** *A Block uses __block variables*


    What will happen if `__block` variables are used from more than one Block? At
    the beginning, all the Blocks and the `__block` variables are on the stack. When
    one of the Blocks is copied from the stack to the heap, the `__block` variables
    are copied from the stack to the heap. And the Block has ownership of the variables.
    When another Block is copied from the stack to the heap, the copied Block has
    ownership of the `__block` variables ([Figure 5–7](#Chapter05.html#fig_5_7)).
    In other words, the reference count of the `__block` variables is +1.


    ![images](images/9781430241164_Fig05-07.jpg)


    **Figure 5–7.** *Multiple Blocks uses a __block variable*


    When a Block on the heap is disposed of, `__block` variables, which are used in
    the Block, are released as shown in [Figure 5–8](#Chapter05.html#fig_5_8).


    ![images](images/9781430241164_Fig05-08.jpg)


    **Figure 5–8.** *Block is disposed of and __block variable is released*


    This concept is exactly the same as memory management with reference counting
    in Objective-C. The Block has ownership of the `__block` variables when the Block
    uses it. When the Block is disposed of, the ownership disappears and the `__block`
    variables are released.


    Now we’ve learned how `__block` variables are stored on application memory. Let’s
    move on to `_forwarding`.


    ### `__forwarding`


    `__forwarding` is used to access `__block` variables properly as I explained in
    the section, "Memory Segments for Blocks." Next, let’s check how it works when
    a Block is copied to the heap.


    I’ve explained that the member variable "`__forwarding`" of the instance on the
    stack has the pointer to the instance on the heap so that the variable is accessed
    properly no matter where it is on the stack or on the heap.


    A `__block` variable is copied from the stack to the heap when a Block is copied
    as well. In this situation, both the `__block` variables on the stack and on the
    heap might be accessed at the same time. Let’s see the following example.


    ```

    __block int val = 0;


    void (^blk)(void) = [^{++val;} copy];


    ++val;


    blk();


    NSLog(@"%d", val);

    ```


    When the Block using a `__block` variable is copied by the "copy" method, not
    only the Block but also the `__block` variable is copied from the stack to the
    heap.


    Let’s see where the `__block` variable is used. After it is initialized, it is
    used inside the Block literal.


    ```

    ^{++val;}

    ```


    After the Block literal, it is used outside the Block as well:


    ```

    ++val;

    ```


    Both source codes are converted in the same way as follows.


    ```

    ++(val.__forwarding->val);

    ```


    In the function, which is converted from the Block literal, the variable "val"
    is an instance of the struct for `__block` variable on the heap. The other variable
    "val" outside the Block is on the stack. When the `__block` variable is copied
    from the stack to the heap, the member variable "`__forwarding`" of the instance
    on the stack is modified to the address of the copied instance on the heap as
    shown in [Figure 5–9](#Chapter05.html#fig_5_9).


    ![images](images/9781430241164_Fig05-09.jpg)


    **Figure 5–9.** *Copying a __block variable*


    With this mechanism, we can access the same `__block` variable from anywhere,
    inside the Block literal or outside Block literal, no matter where the `__block`
    variable is on the stack or on the heap.'
