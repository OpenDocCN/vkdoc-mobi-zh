    after a Block is added by the dispatch_async function. Does it work safely?


    It works just fine. When a Block is added to a dispatch queue by a dispatch_async
    function, say, the Block has ownership of the dispatch queue by the dispatch_retain
    function. It is the same for both a serial and a concurrent dispatch queue. Then,
    when it finishes the execution of the Block, the Block releases the dispatch queue
    by the dispatch_release function.


    Even if a dispatch queue is released just after a Block is added to the dispatch
    queue by the dispatch_async function, the dispatch queue still isn’t disposed
    of and the Block can be executed. After the Block is finished, the Block releases
    the dispatch queue and it is discarded. The dispatch_retain and dispatch_release
    functions are not only for dispatch queues. From now on, we will see many GCD
    APIs that contain “create” in their names. When you get something from these APIs,
    you have to release them with the dispatch_release function when you don’t need
    them anymore. When you get them via some other method, you have to take ownership
    by the dispatch_retain function and you have to release them by the dispatch_release
    function.


    #### Main Dispatch Queue/Global Dispatch Queue


    The other way to obtain a dispatch queue is to get a dispatch queue that the system
    has already provided. Actually, the system has dispatch queues that you don’t
    create: the main dispatch and global dispatch queues.


    The main dispatch queue is, as “main” is in its name, a queue to execute tasks
    on the main thread. As there exists only one main thread, the main dispatch queue
    is a serial dispatch queue. Tasks in the main dispatch queue are executed in RunLoop
    on the main thread as shown in [Figure 7–7](#Chapter07.html#fig_7_7). Because
    they are executed on the main thread, you should use it for tasks that must be
    done on the main thread such as updating the user interface, and the like. It
    is just like the performSelectorOnMainThread instance method of the NSObject class.


    ![images](images/9781430241164_Fig07-07.jpg)


    **Figure 7–7.** *Main Dispatch Queue*


    The other queues that the system provides are called global dispatch queues. They
    are concurrent dispatch queues that are usable anywhere in the application. If
    you don’t have any specific reason, as explained later, you don’t need to create
    a concurrent dispatch queue by the dispatch_queue_create function in most cases.
    You can just obtain a global dispatch queue and use it. There are four global
    dispatch queues and they each have a different priority: high, default, low, and
    background. The XNU kernel manages threads for the global dispatch queues and
    the threads have priorities corresponding to each priority of the global dispatch
    queues. When you add tasks to a global dispatch queue, you should choose a global
    dispatch queue having the appropriate priority. The XNU kernel doesn’t assure
    the realtimeness for threads. So, the priorities can be used just as a guide.
    For example, you should use a background priority when you don’t much care if
    a task is executed. Let’s see what types of dispatch queues are provided in the
    system in [Table 7–2](#Chapter07.html#tab_7_2).


    ![images](images/t0702.jpg)


    Each dispatch queue can be obtained as shown in [Listing 7–1](#Chapter07.html#list_7_1).


    **Listing 7–1.** *Obtaining dispatch queues*


    ` /*`

    `  * How to get the main dispatch queue`

    `  */`

    `dispatch_queue_t mainDispatchQueue = dispatch_get_main_queue();`


    ` /*`

    `  * How to get a global dispatch queue of high priority`

    `  */`

    `dispatch_queue_t globalDispatchQueueHigh =`

    `        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0);`


    ` /*`

    `  * How to get a global dispatch queue of default priority`

    `  */`

    `dispatch_queue_t globalDispatchQueueDefault =`

    `        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`


    ` /*`

    `  * How to get a global dispatch queue of low priority`

    `  */`

    `dispatch_queue_t globalDispatchQueueLow =`

    `        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_LOW, 0);`


    ` /*`

    `  * How to get a global dispatch queue of background priority`

    `  */`

    `dispatch_queue_t globalDispatchQueueBackground =`

    `        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);`


    By the way, if you call the dispatch_retain or dispatch_release function on the
    main dispatch queue or on a global dispatch queue, nothing happens. No problem.
    That is why it is easier to obtain and use a global dispatch queue than to create,
    use, and release a concurrent dispatch queue yourself. Of course, depending on
    your source code, if it is easier for the dispatch queue to be treated as it is
    created by the dispatch_queue_create function, you can follow the concept of reference
    counting rules and call the dispatch_retain or dispatch_release function even
    for the main dispatch queue or a global dispatch queue.


    At the end of this section, there is an example of how to use the main dispatch
    queue and global dispatch queues as shown in [Listing 7–2](#Chapter07.html#list_7_2).


    **Listing 7–2.** *Executing tasks*


    ` /*`

    `  * Execute a Block on a global dispatch queue of default priority.`

    `  */`

    `dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),
    ^{`


    `     /*`

    `      * some tasks here to be executed concurrently`

    `      */`


    `     /*`

    `      * Then, execute a Block on the main dispatch queue`

    `      */`


    `    dispatch_async(dispatch_get_main_queue(), ^{`


    `         /*`

    `          * Here, some tasks that can work only on the main thread.`

    `          */`

    `    });`


    `});`


    We’ve learned the basics of GCD for making tasks run in parallel. In the following
    section, I explain APIs to control the queues to make them more useful.


    ### Controlling Dispatch Queues


    GCD also provides many useful APIs to control the tasks in the dispatch queues.
    Let’s see the APIs one by one to explore how GCD is so powerful.'
  trans: "\n遗憾的是，尽管编译器拥有出色的自动内存管理机制 ARC，但应用程序开发者必须手动释放创建的调度队列，因为调度队列与 Block 不同，它不被视为\
    \ Objective-C 对象。当你不再需要它时，必须调用 `dispatch_release` 函数来释放由 `dispatch_queue_create`\
    \ 函数创建的调度队列。\n\n`dispatch_release(mySerialDispatchQueue);`\n\n既然名字中包含 “release”，自然也存在\
    \ `dispatch_retain` 函数。\n\n`dispatch_retain(myConcurrentDispatchQueue);`\n\n这意味着，调度队列必须通过\
    \ `dispatch_retain` 和 `dispatch_release` 函数，采用与 Objective-C 对象类似的引用计数技术进行管理。在之前的源代码中，由\
    \ `dispatch_queue_create` 函数创建并赋值给变量 `myConcurrentDispatchQueue` 的并发调度队列，必须被释放。\n\
    \n```\ndispatch_queue_t myConcurrentDispatchQueue = dispatch_queue_create(\n \
    \   \"com.example.gcd.MyConcurrentDispatchQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
    \ndispatch_async(myConcurrentDispatchQueue,\n    ^{NSLog(@\"block on myConcurrentDispatchQueue\"\
    );});\n\ndispatch_release(myConcurrentDispatchQueue);\n```\n\n并发调度队列使用多个线程来执行任务。在这个例子中，就在通过\
    \ `dispatch_async` 函数添加 Block 之后，并发调度队列就被 `dispatch_release` 函数释放了。这样操作安全吗？\n\n\
    这是完全安全的。当一个 Block 通过 `dispatch_async` 函数被添加到调度队列时，可以说，Block 通过 `dispatch_retain`\
    \ 函数拥有了该调度队列的所有权。这对于串行调度队列和并发调度队列都是一样的。然后，当 Block 执行完毕后，它会通过 `dispatch_release`\
    \ 函数释放该调度队列。\n\n即使在通过 `dispatch_async` 函数将 Block 添加到调度队列之后立即释放了该调度队列，这个调度队列也不会被销毁，Block\
    \ 依然可以执行。Block 执行完后，它会释放调度队列，调度队列随即被丢弃。`dispatch_retain` 和 `dispatch_release`\
    \ 函数不仅适用于调度队列。从今往后，我们会看到许多名称中包含 “create” 的 GCD API。当你通过这些 API 获取到某些对象后，在不再需要它们时，必须使用\
    \ `dispatch_release` 函数进行释放。如果你通过其他方式获取它们，则必须通过 `dispatch_retain` 函数获取所有权，并在之后通过\
    \ `dispatch_release` 函数释放。\n\n## 主调度队列 / 全局调度队列\n\n获取调度队列的另一种方式是直接获取系统已经提供的调度队列。实际上，系统提供了一些你无需创建的调度队列：主调度队列和全局调度队列。\n\
    \n主调度队列，正如其名中的 “main” 所示，是用于在主线程上执行任务的队列。由于只有一个主线程，因此主调度队列是一个串行调度队列。主调度队列中的任务会在主线程的\
    \ RunLoop 中执行，如图 [Figure 7–7]（#Chapter07.html#fig_7_7）所示。由于它们是在主线程上执行的，你应该将其用于必须在主线程上完成的任务，例如更新用户界面等。它类似于\
    \ `NSObject` 类的 `performSelectorOnMainThread` 实例方法。\n\n![图片](img/9781430241164_Fig07-07.jpg)\n\
    \n**Figure 7–7.** *主调度队列*\n\n系统提供的其他队列称为全局调度队列。它们是并发调度队列，可以在应用程序的任何位置使用。除非有特殊原因（稍后会解释），在大多数情况下，你不需要通过\
    \ `dispatch_queue_create` 函数自行创建并发调度队列。你只需获取一个全局调度队列并使用即可。共有四个全局调度队列，它们各自具有不同的优先级：高、默认、低和后台。XNU\
    \ 内核管理着全局调度队列的线程，并且这些线程具有与每个全局调度队列优先级相对应的优先级。当你向全局调度队列添加任务时，应该选择一个具有适当优先级的全局调度队列。XNU\
    \ 内核并不保证线程的实时性。因此，这些优先级仅作为参考。例如，当你不太关心任务是否立即执行时，应该使用后台优先级。让我们通过 [Table 7–2]（#Chapter07.html#tab_7_2）来看看系统中提供了哪些类型的调度队列。\n\
    \n![图片](img/t0702.jpg)\n\n获取每个调度队列的方法如 [Listing 7–1]（#Chapter07.html#list_7_1）所示。\n\
    \n**Listing 7–1.** *获取调度队列*\n\n```\n /*\n  * 如何获取主调度队列\n  */\ndispatch_queue_t\
    \ mainDispatchQueue = dispatch_get_main_queue();\n\n /*\n  * 如何获取高优先级的全局调度队列\n\
    \  */\ndispatch_queue_t globalDispatchQueueHigh =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH,\
    \ 0);\n\n /*\n  * 如何获取默认优先级的全局调度队列\n  */\ndispatch_queue_t globalDispatchQueueDefault\
    \ =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\n\
    \ /*\n  * 如何获取低优先级的全局调度队列\n  */\ndispatch_queue_t globalDispatchQueueLow =\n \
    \       dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_LOW, 0);\n\n /*\n  *\
    \ 如何获取后台优先级的全局调度队列\n  */\ndispatch_queue_t globalDispatchQueueBackground =\n \
    \       dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n```\n\
    \n顺便提一下，如果在主调度队列或全局调度队列上调用 `dispatch_retain` 或 `dispatch_release` 函数，不会有任何效果，也不会出现问题。这就是为什么获取并使用一个全局调度队列，比自己创建、使用然后释放一个并发调度队列要容易得多。当然，取决于你的源代码，如果将该调度队列视为由\
    \ `dispatch_queue_create` 函数创建的那样处理更方便，你也可以遵循引用计数的规则，即使是对于主调度队列或全局调度队列，也调用 `dispatch_retain`\
    \ 或 `dispatch_release` 函数。\n\n在本节末尾，有一个如何使用主调度队列和全局调度队列的示例，如 [Listing 7–2]（#Chapter07.html#list_7_2）所示。\n\
    \n**Listing 7–2.** *执行任务*\n\n```\n /*\n  * 在默认优先级的全局调度队列上执行一个 Block。\n  */\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n\n     /*\n      * 这里是一些需要并发执行的任务\n      */\n\n     /*\n      * 然后，在主调度队列上执行一个\
    \ Block\n      */\n\n    dispatch_async(dispatch_get_main_queue(), ^{\n\n    \
    \     /*\n          * 这里是一些只能在主线程上执行的任务。\n          */\n    });\n\n});\n```\n\n\
    我们已经学习了使用 GCD 使任务并行执行的基础知识。在下一节中，我将解释用于控制队列以使它们更加有用的 API。\n\n## 控制调度队列\n\nGCD\
    \ 还提供了许多有用的 API 来控制调度队列中的任务。让我们逐一查看这些 API，探索 GCD 的强大之处。\n"
- fmt: "# `dispatch_set_target_queue`\n\n`dispatch_set_target_queue`函数用于设置一个“目标”队列。这主要用于为新创建的队列设置优先级。对于串行和并发调度队列，当通过`dispatch_queue_create`函数创建调度队列时，线程的优先级与默认优先级的全局调度队列相同。要修改创建后的调度队列的优先级，可以使用此函数进行修改。以下源代码展示了如何让一个串行调度队列在后台优先级上执行。\n\
    \n```\ndispatch_queue_t mySerialDispatchQueue =\n    dispatch_queue_create(\"\
    com.example.gcd.MySerialDispatchQueue\", NULL);\n\ndispatch_queue_t globalDispatchQueueBackground\
    \ =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n\n\
    dispatch_set_target_queue(mySerialDispatchQueue, globalDispatchQueueBackground);\n\
    ```\n\n在源代码中，将调度队列作为`dispatch_set_target_queue`函数的第一个参数传递，以更改该调度队列的优先级。第二个参数则传入一个全局调度队列作为其目标。其机制稍后会解释，但结果是将该调度队列的优先级更改为与目标队列相同的优先级。当将主队列或系统提供的全局调度队列作为第一个参数传递时，其行为是未定义的，因此不应这样做。使用`dispatch_set_target_queue`函数，不仅可以更改优先级，还可以创建如图\
    \ 7–8 所示的调度队列层级结构。当将多个并发执行的串行调度队列通过`dispatch_set_target_queue`函数设置为同一个目标串行队列时，同时只有一个队列会在该目标串行队列上执行。\n\
    \n![images](images/9781430241164_Fig07-08.jpg)\n\n**Figure 7–8.** *Dispatch Queue\
    \ execution hierarchy*\n\n通过这样做，如果你有一些不允许并发执行的任务，并且它们必须被添加到不同的串行调度队列中，你可以防止这些任务并发执行。不过，实际上我并不知道有这样的场景。\n\
    \n## `dispatch_after`\n\n`dispatch_after`用于设置在队列中启动任务的时机。有时你可能希望在三秒后执行一个任务。当你想在指定时间过去后执行一个任务时，可以使用`dispatch_after`函数。例如，以下源代码将指定的\
    \ Block 在三秒后添加到主调度队列中。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW,\
    \ 3ull * NSEC_PER_SEC);\n\ndispatch_after(time, dispatch_get_main_queue(), ^{\n\
    \        NSLog(@\"waited at least three seconds.\");\n});\n```\n\n在源代码中，“ull”是\
    \ C 语言中用于指定类型的字面量。“ull”代表“unsigned long long”类型。请注意，`dispatch_after`函数并不会在指定时间后立即执行任务。它是在指定时间过后将任务添加到调度队列中，这意味着此源代码的效果等同于在三秒后通过`dispatch_async`函数将该\
    \ Block 添加到主调度队列。主调度队列在主线程的 RunLoop 中执行。因此，例如，如果 RunLoop 以每秒 1/60 秒的间隔执行，则该 Block\
    \ 会在三秒后到三秒加 1/60 秒之间的某个时刻执行。如果主调度队列中添加了许多任务，或者主线程被延迟了，执行可能会滞后。因此，将其用作精确的计时器是有问题的，但如果你只是想大致延迟一个任务，这个函数非常有用。第二个参数指定一个要添加任务的调度队列，第三个参数是要执行的\
    \ Block。\n\n第一个参数是`dispatch_time_t`类型的值，用于指定时间。该值由`dispatch_time`或`dispatch_walltime`函数创建。`dispatch_time`函数创建一个时间值，表示在`dispatch_time_t`类型的起始时间（第一个参数）之后经过的纳秒数（第二个参数）。如示例所示，`DISPATCH_TIME_NOW`通常用作第一个参数，以指定当前时间。在以下源代码中，你可以获取一个`dispatch_time_t`类型的变量，用于表示从现在开始的一秒后。\n\
    \n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);\n\
    ```\n\n数值与`NSEC_PER_SEC`的乘积会生成以纳秒为单位的时间。使用`NSEC_PER_MSEC`，你可以生成毫秒单位的值。以下源代码展示了如何获取从现在开始的\
    \ 150 毫秒后的时间。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW,\
    \ 150ull * NSEC_PER_MSEC);\n```\n\n`dispatch_walltime`函数从 POSIX 中使用的`struct timespec`类型的时间创建一个`dispatch_time_t`类型的时间。`dispatch_time`函数主要用于创建相对时间。相比之下，`dispatch_walltime`函数用于创建绝对时间。例如，你可以使用`dispatch_walltime`来获取一个绝对时间，比如\
    \ 2011 年 11 月 11 日 11:11:11，用于`dispatch_after`函数。你可以用它来创建一个闹钟，但它的精度较低。如清单 7–3\
    \ 所示，`struct timespec`类型的时间可以轻松地从`NSDate`类对象创建。\n\n**Listing 7–3**. *dispatch_time_t\
    \ from NSDate*\n\n```\ndispatch_time_t getDispatchTimeByDate(NSDate *date)\n{\n\
    \    NSTimeInterval interval;\n    double second, subsecond;\n    struct timespec\
    \ time;\n    dispatch_time_t milestone;\n\n    interval = [date timeIntervalSince1970];\n\
    \    subsecond = modf(interval, &second);\n    time.tv_sec = second;\n    time.tv_nsec\
    \ = subsecond * NSEC_PER_SEC;\n    milestone = dispatch_walltime(&time, 0);\n\n\
    \    return milestone;\n}\n```\n\n在源代码中，从`NSDate`类对象创建了一个`dispatch_time_t`类型的值，并将其传递给`dispatch_after`函数。"
  raw: '#### dispatch_set_target_queue


    The dispatch_set_target_queue function is for setting a “target” queue. This is
    mainly used to set the priority to a newly created queue. For both serial and
    concurrent dispatch queues, when a dispatch queue is created by the dispatch_queue_create
    function, the priority of the thread is the same as that of a global dispatch
    queue of default priority. To modify the priority of a dispatch queue after it
    is created, you can use this function to modify it. The following source code
    shows how to get a serial dispatch queue to be executed on the background priority.


    `dispatch_queue_t mySerialDispatchQueue =`

    `    dispatch_queue_create("com.example.gcd.MySerialDispatchQueue", NULL);`


    `dispatch_queue_t globalDispatchQueueBackground =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);`


    `dispatch_set_target_queue(mySerialDispatchQueue, globalDispatchQueueBackground);`


    In the source code, the dispatch queue is passed as the first argument for the
    dispatch_set_target_queue function to change the priority of the dispatch queue.
    As the second argument, a global dispatch queue is passed as its target. The mechanism
    is explained later, though, The result is that the priority of the dispatch queue
    is changed to the same priority as that of the target queue. The behavior is undefined
    when you pass the main or the global dispatch queues that are provided by the
    system as the first argument. So you shouldn’t do that. Using the dispatch_set_target_queue
    function, you can not only change the priority, but you can also create a hierarchy
    of dispatch queues as shown in [Figure 7–8](#Chapter07.html#fig_7_8). When a serial
    dispatch queue is set as the target for multiple serial dispatch queues that will
    be executed concurrently for the dispatch_set_target_queue function, only one
    queue is executed on the target serial dispatch queue at a time.


    ![images](images/9781430241164_Fig07-08.jpg)


    **Figure 7–8.** *Dispatch Queue execution hierarchy*


    By doing that, you can prevent the tasks executing concurrently if you have tasks
    that shouldn’t be executed concurrently and they must be added to different serial
    dispatch queues. Actually, I have no idea of such a situation, though.


    #### dispatch_after


    dispatch _after is for setting the timing to start tasks in the queue. Sometimes
    you may want to execute a task three seconds later, for instance. When you want
    to execute a task after some specified time has passed, you can use the dispatch_after
    function. For example, the following source code adds the specified Block to the
    main dispatch queue after three seconds.


    `dispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 3ull * NSEC_PER_SEC);`


    `dispatch_after(time, dispatch_get_main_queue(), ^{`


    `        NSLog(@"waited at least three seconds.");`


    `});`


    In the source code, “ull” is a C language literal specifying a type. “ull” is
    for “unsigned long long” type. Please note that the dispatch_after function doesn’t
    execute the task after the specified time. After the time, it adds the task to
    the dispatch queue, meaning that this source code works the same as if you added
    the Block to the main dispatch queue by the dispatch_async function three seconds
    later. The main dispatch queue is executed in RunLoop on the main thread. So,
    for example, if the RunLoop is executed at a 1/60 second interval, the Block will
    be executed between after three seconds and after three + 1/60 seconds. If many
    tasks are added in the main dispatch queue, or if the main thread is delayed,
    it could get behind. Therefore, it is problematic to use it as an accurate timer,
    but if you just want to delay a task roughly, this function is very useful. The
    second argument specifies a dispatch queue to add a task, and the third argument
    is a Block to be executed. The first argument is a value of dispatch_time_t type
    to specify the time. This value is created by the dispatch_time or dispatch_walltime
    function. The dispatch_time function creates a time value, the nanoseconds (the
    second argument) that have elapsed after a time (the first argument) in dispatch_time_t
    type. As in the example, DISPATCH_TIME_NOW is mostly used for the first argument
    to specify the current time. In the following source code, you can get a time
    in a dispatch_time_t type variable to specify one second from now.


    `dispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);`


    The product of the number and NSEC_PER_SEC makes a time in units of nanoseconds.
    With NSEC_PER_MSEC, you can make millisecond unit values. The next source code
    shows how to get a time of 150 milliseconds from now.


    `dispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 150ull * NSEC_PER_MSEC);`


    The dispatch_walltime function creates a time in a dispatch_time_t type from a
    time of struct “timespec” that is used in POSIX. The dispatch_time function is
    used mainly to create a relative time. In contrast, the dispatch_walltime function
    is used to create an absolute time. For example, you can use dispatch_walltime
    to get an absolute time such as 11:11:11 on November 11, 2011 for the dispatch_after
    function. You can create an alarm clock with that, but it is low precision. A
    time of timespec struct type is created easily from the NSDate class object as
    shown in [Listing 7–3](#Chapter07.html#list_7_3).


    **Listing 7–3**. *dispatch_time_t from NSDate*


    `dispatch_time_t getDispatchTimeByDate(NSDate *date)`

    `{`

    `    NSTimeInterval interval;`

    `    double second, subsecond;`

    `    struct timespec time;`

    `    dispatch_time_t milestone;`


    `    interval = [date timeIntervalSince1970];`

    `    subsecond = modf(interval, &second);`

    `    time.tv_sec = second;`

    `    time.tv_nsec = subsecond * NSEC_PER_SEC;`

    `    milestone = dispatch_walltime(&time, 0);`


    `    return milestone;`

    `}`


    In the source code, a value of dispatch_time_t type is created from the NSDate
    class object and it is passed to the dispatch_after function.'
  trans: "\n# `dispatch_set_target_queue`\n\n`dispatch_set_target_queue`函数用于设置一个“目标”队列。这主要用于为新创建的队列设置优先级。对于串行和并发调度队列，当通过`dispatch_queue_create`函数创建调度队列时，线程的优先级与默认优先级的全局调度队列相同。要修改创建后的调度队列的优先级，可以使用此函数进行修改。以下源代码展示了如何让一个串行调度队列在后台优先级上执行。\n\
    \n```\ndispatch_queue_t mySerialDispatchQueue =\n    dispatch_queue_create(\"\
    com.example.gcd.MySerialDispatchQueue\", NULL);\n\ndispatch_queue_t globalDispatchQueueBackground\
    \ =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0);\n\n\
    dispatch_set_target_queue(mySerialDispatchQueue, globalDispatchQueueBackground);\n\
    ```\n\n在源代码中，将调度队列作为`dispatch_set_target_queue`函数的第一个参数传递，以更改该调度队列的优先级。第二个参数则传入一个全局调度队列作为其目标。其机制稍后会解释，但结果是将该调度队列的优先级更改为与目标队列相同的优先级。当将主队列或系统提供的全局调度队列作为第一个参数传递时，其行为是未定义的，因此不应这样做。使用`dispatch_set_target_queue`函数，不仅可以更改优先级，还可以创建如图\
    \ 7–8 所示的调度队列层级结构。当将多个并发执行的串行调度队列通过`dispatch_set_target_queue`函数设置为同一个目标串行队列时，同时只有一个队列会在该目标串行队列上执行。\n\
    \n![images](img/9781430241164_Fig07-08.jpg)\n\n**图 7–8.** *调度队列执行层级结构*\n\n通过这样做，如果你有一些不允许并发执行的任务，并且它们必须被添加到不同的串行调度队列中，你可以防止这些任务并发执行。不过，实际上我并不知道有这样的场景。\n\
    \n## `dispatch_after`\n\n`dispatch_after`用于设置在队列中启动任务的时机。有时你可能希望在三秒后执行一个任务。当你想在指定时间过去后执行一个任务时，可以使用`dispatch_after`函数。例如，以下源代码将指定的\
    \ Block 在三秒后添加到主调度队列中。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW,\
    \ 3ull * NSEC_PER_SEC);\n\ndispatch_after(time, dispatch_get_main_queue(), ^{\n\
    \        NSLog(@\"waited at least three seconds.\");\n});\n```\n\n在源代码中，“ull”是\
    \ C 语言中用于指定类型的字面量。“ull”代表“unsigned long long”类型。请注意，`dispatch_after`函数并不会在指定时间后立即执行任务。它是在指定时间过后将任务添加到调度队列中，这意味着此源代码的效果等同于在三秒后通过`dispatch_async`函数将该\
    \ Block 添加到主调度队列。主调度队列在主线程的 RunLoop 中执行。因此，例如，如果 RunLoop 以每秒 1/60 秒的间隔执行，则该 Block\
    \ 会在三秒后到三秒加 1/60 秒之间的某个时刻执行。如果主调度队列中添加了许多任务，或者主线程被延迟了，执行可能会滞后。因此，将其用作精确的计时器是有问题的，但如果你只是想大致延迟一个任务，这个函数非常有用。第二个参数指定一个要添加任务的调度队列，第三个参数是要执行的\
    \ Block。\n\n第一个参数是`dispatch_time_t`类型的值，用于指定时间。该值由`dispatch_time`或`dispatch_walltime`函数创建。`dispatch_time`函数创建一个时间值，表示在`dispatch_time_t`类型的起始时间（第一个参数）之后经过的纳秒数（第二个参数）。如示例所示，`DISPATCH_TIME_NOW`通常用作第一个参数，以指定当前时间。在以下源代码中，你可以获取一个`dispatch_time_t`类型的变量，用于表示从现在开始的一秒后。\n\
    \n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);\n\
    ```\n\n数值与`NSEC_PER_SEC`的乘积会生成以纳秒为单位的时间。使用`NSEC_PER_MSEC`，你可以生成毫秒单位的值。以下源代码展示了如何获取从现在开始的\
    \ 150 毫秒后的时间。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW,\
    \ 150ull * NSEC_PER_MSEC);\n```\n\n`dispatch_walltime`函数从 POSIX 中使用的`struct timespec`类型的时间创建一个`dispatch_time_t`类型的时间。`dispatch_time`函数主要用于创建相对时间。相比之下，`dispatch_walltime`函数用于创建绝对时间。例如，你可以使用`dispatch_walltime`来获取一个绝对时间，比如\
    \ 2011 年 11 月 11 日 11:11:11，用于`dispatch_after`函数。你可以用它来创建一个闹钟，但它的精度较低。如清单 7–3\
    \ 所示，`struct timespec`类型的时间可以轻松地从`NSDate`类对象创建。\n\n**清单 7–3**. *从 NSDate 创建 dispatch_time_t*\n\
    \n```\ndispatch_time_t getDispatchTimeByDate(NSDate *date)\n{\n    NSTimeInterval\
    \ interval;\n    double second, subsecond;\n    struct timespec time;\n    dispatch_time_t\
    \ milestone;\n\n    interval = [date timeIntervalSince1970];\n    subsecond =\
    \ modf(interval, &second);\n    time.tv_sec = second;\n    time.tv_nsec = subsecond\
    \ * NSEC_PER_SEC;\n    milestone = dispatch_walltime(&time, 0);\n\n    return\
    \ milestone;\n}\n```\n\n在源代码中，从`NSDate`类对象创建了一个`dispatch_time_t`类型的值，并将其传递给`dispatch_after`函数。\n"
- fmt: "### Dispatch Group\n\nDispatch group is used to make a group of queues. You\
    \ may want to start a task to finalize something after all the tasks in the dispatch\
    \ queues are finished. When all the tasks are in one serial dispatch queue, you\
    \ can just add a finalizing task to the end of the queue. It seems complex when\
    \ you use a concurrent dispatch queue or multiple dispatch queues. In these cases,\
    \ you can use a dispatch group. The following source code is to add three Blocks\
    \ to a global dispatch queue and when all the Blocks are finished, a Block for\
    \ finalization will be executed on the main dispatch queue.\n\n```\ndispatch_queue_t\
    \ queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\
    dispatch_group_t group = dispatch_group_create();\n\ndispatch_group_async(group,\
    \ queue, ^{NSLog(@\"blk0\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"\
    blk1\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"blk2\");});\n\ndispatch_group_notify(group,\n\
    \    dispatch_get_main_queue(), ^{NSLog(@\"done\");});\ndispatch_release(group);\n\
    ```\n\nThe result will be like:\n\n```\nblk1\nblk2\nblk0\ndone\n```\n\nThe execution\
    \ order of the tasks is not constant because they are in a global dispatch queue\
    \ that is a concurrent dispatch queue; that is, the tasks are executed on multiple\
    \ threads concurrently. The execution timing is not constant. Still, “done” must\
    \ be displayed at the end every time. A dispatch group can monitor tasks to be\
    \ finished no matter in which type of dispatch queues they are. When it detects\
    \ that all the tasks are finished, the finalizing task is added to the dispatch\
    \ queue. This is how the dispatch group is used. At first, a dispatch group that\
    \ is of type `dispatch_group_t` is created by the `dispatch_group_create` function.\
    \ As the function name contains “create”, the dispatch group has to be released\
    \ when you don’t need it anymore. You should use the `dispatch_release` function\
    \ as you use it for a dispatch queue. The `dispatch_group_async` function adds\
    \ a Block to the specified dispatch queue as does the `dispatch_async` function.\
    \ The difference from the `dispatch_async` function is that a created dispatch\
    \ group is passed to its first argument. When the `dispatch_group_async` function\
    \ is called, the specified Block is associated with the dispatch group. When a\
    \ Block is associated with a dispatch group, the Block has ownership of the dispatch\
    \ group by the `dispatch_retain` function as if a Block were added to the dispatch\
    \ queue. When the Block is finished, the Block releases the dispatch group by\
    \ the `dispatch_release` function. When you don’t need the dispatch group anymore,\
    \ you should just call `dispatch_release` to release the dispatch group. You don’t\
    \ need to care how the Blocks that are associated with the dispatch group are\
    \ executed.\n\nAs in the example, the `dispatch_group_notify` function specifies\
    \ a Block to be added to a dispatch queue. The Block will be executed when all\
    \ the tasks in the dispatch group are finished. The first argument is a dispatch\
    \ group to be monitored. When all the tasks associated with the group are finished,\
    \ the Block (the third argument) will be added to the dispatch queue (the second\
    \ argument). Regardless of the type of dispatch queue passed for the `dispatch_group_notify`\
    \ function, when the Block is added, all the tasks associated with the dispatch\
    \ group must be finished.\n\nIn addition, you can simply wait to finish all the\
    \ tasks with a dispatch group. You can use the `dispatch_group_wait` function\
    \ as shown in [Listing 7–4](#Chapter07.html#list_7_4).\n\n**Listing 7–4.** *dispatch_group_wait*\n\
    \n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\ndispatch_group_t group = dispatch_group_create();\n\ndispatch_group_async(group,\
    \ queue, ^{NSLog(@\"blk0\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"\
    blk1\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"blk2\");});\n\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\ndispatch_release(group);\n```\n\nThe second argument\
    \ for the `dispatch_group_wait` function is a timeout to specify how long it waits.\
    \ The variable is `dispatch_time_t` type. This example uses `DISPATCH_TIME_FOREVER`\
    \ to wait forever. It waits forever until all the tasks associated with the dispatch\
    \ group are finished. You can’t cancel it in the middle.\n\nAs we’ve learned with\
    \ the `dispatch_after` function, you can wait one second in the following source\
    \ code.\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull *\
    \ NSEC_PER_SEC);\n\nlong result = dispatch_group_wait(group, time);\n\nif (result\
    \ == 0) {\n\n     /*\n      * All the tasks that are associated with the dispatch\
    \ group are finished\n      */\n\n} else {\n\n     /*\n      * some tasks that\
    \ are associated with the dispatch group are still running.\n      */\n}\n```\n\
    \nWhen the `dispatch_group_wait` function didn’t return zero, some tasks that\
    \ are associated with the dispatch group were still running even after the specified\
    \ time had passed. When it returned zero, all the tasks were finished. The `dispatch_group_wait`\
    \ function returns zero if `DISPATCH_TIME_FOREVER` is used because all the tasks\
    \ must be finished.\n\nBy the way, what does “wait” mean? It means that when the\
    \ `dispatch_group_wait` function is called, it doesn’t return from the function.\
    \ The current thread that is executing the `dispatch_group_wait` function stops.\
    \ While the time that is specified to the `dispatch_group_wait` function passes,\
    \ or until all the tasks that are associated with the dispatch group are finished,\
    \ the thread that is executing the `dispatch_group_wait` function stops.\n\nWhen\
    \ `DISPATCH_TIME_NOW` is used, you can check if the tasks that are associated\
    \ with the dispatch group are finished.\n\n```\nlong result = dispatch_group_wait(group,\
    \ DISPATCH_TIME_NOW);\n```\n\nFor example, you can check if the tasks are finished\
    \ in each loop of the RunLoop on the main thread without any delay. Although it\
    \ is possible, I recommend using `dispatch_group_notify` to add some finalizing\
    \ task to the main dispatch queue instead. Your source code becomes elegant. Still\
    \ there are many useful functions in GCD. I explain them in the following sections.\
    \ Let’s start with `dispatch_barrier_async`."
  raw: '#### Dispatch Group


    Dispatch group is used to make a group of queues. You may want to start a task
    to finalize something after all the tasks in the dispatch queues are finished.
    When all the tasks are in one serial dispatch queue, you can just add a finalizing
    task to the end of the queue. It seems complex when you use a concurrent dispatch
    queue or multiple dispatch queues. In these cases, you can use a dispatch group.
    The following source code is to add three Blocks to a global dispatch queue and
    when all the Blocks are finished, a Block for finalization will be executed on
    the main dispatch queue.


    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`

    `dispatch_group_t group = dispatch_group_create();`


    `dispatch_group_async(group, queue, ^{NSLog(@"blk0");});`

    `dispatch_group_async(group, queue, ^{NSLog(@"blk1");});`

    `dispatch_group_async(group, queue, ^{NSLog(@"blk2");});`


    `dispatch_group_notify(group,`

    `    dispatch_get_main_queue(), ^{NSLog(@"done");});`

    `dispatch_release(group);`


    The result will be like:


    `blk1`

    `blk2`

    `blk0`

    `done`


    The execution order of the tasks is not constant because they are in a global
    dispatch queue that is a concurrent dispatch queue; that is, the tasks are executed
    on multiple threads concurrently. The execution timing is not constant. Still,
    “done” must be displayed at the end every time. A dispatch group can monitor tasks
    to be finished no matter in which type of dispatch queues they are. When it detects
    that all the tasks are finished, the finalizing task is added to the dispatch
    queue. This is how the dispatch group is used. At first, a dispatch group that
    is of type dispatch_group_t is created by the dispatch_group_create function.
    As the function name contains “create”, the dispatch group has to be released
    when you don’t need it anymore. You should use the dispatch_release function as
    you use it for a dispatch queue. The dispatch_group_async function adds a Block
    to the specified dispatch queue as does the dispatch_async function. The difference
    from the dispatch_async function is that a created dispatch group is passed to
    its first argument. When the dispatch_group_async function is called, the specified
    Block is associated with the dispatch group. When a Block is associated with a
    dispatch group, the Block has ownership of the dispatch group by the dispatch_retain
    function as if a Block were added to the dispatch queue. When the Block is finished,
    the Block releases the dispatch group by the dispatch_release function. When you
    don’t need the dispatch group anymore, you should just call dispatch_release to
    release the dispatch group. You don’t need to care how the Blocks that are associated
    with the dispatch group are executed.


    As in the example, the dispatch_group_notify function specifies a Block to be
    added to a dispatch queue. The Block will be executed when all the tasks in the
    dispatch group are finished. The first argument is a dispatch group to be monitored.
    When all the tasks associated with the group are finished, the Block (the third
    argument) will be added to the dispatch queue (the second argument). Regardless
    of the type of dispatch queue passed for the dispatch_group_notify function, when
    the Block is added, all the tasks associated with the dispatch group must be finished.


    In addition, you can simply wait to finish all the tasks with a dispatch group.
    You can use the dispatch_group_wait function as shown in [Listing 7–4](#Chapter07.html#list_7_4).


    **Listing 7–4.** *dispatch_group_wait*


    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`

    `dispatch_group_t group = dispatch_group_create();`


    `dispatch_group_async(group, queue, ^{NSLog(@"blk0");});`

    `dispatch_group_async(group, queue, ^{NSLog(@"blk1");});`

    `dispatch_group_async(group, queue, ^{NSLog(@"blk2");});`


    `dispatch_group_wait(group, DISPATCH_TIME_FOREVER);`

    `dispatch_release(group);`


    The second argument for the dispatch_group_wait function is a timeout to specify
    how long it waits. The variable is dispatch_time_t type. This example uses DISPATCH_TIME_FOREVER
    to wait forever. It waits forever until all the tasks associated with the dispatch
    group are finished. You can’t cancel it in the middle.


    As we’ve learned with the dispatch_after function, you can wait one second in
    the following source code.


    `dispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);`


    `long result = dispatch_group_wait(group, time);`


    `if (result == 0) {`


    `     /*`

    `      * All the tasks that are associated with the dispatch group are finished`

    `      */`


    `} else {`


    `     /*`

    `      * some tasks that are associated with the dispatch group are still running.`

    `      */`

    `}`


    When the dispatch_group_wait function didn’t return zero, some tasks that are
    associated with the dispatch group were still running even after the specified
    time had passed. When it returned zero, all the tasks were finished. The dispatch_group_wait
    function returns zero if DISPATCH_TIME_FOREVER is used because all the tasks must
    be finished.


    By the way, what does “wait” mean? It means that when the dispatch_group_wait
    function is called, it doesn’t return from the function. The current thread that
    is executing the dispatch_group_wait function stops. While the time that is specified
    to the dispatch_group_wait function passes, or until all the tasks that are associated
    with the dispatch group are finished, the thread that is executing the dispatch_group_wait
    function stops.


    When DISPATCH_TIME_NOW is used, you can check if the tasks that are associated
    with the dispatch group are finished.


    `long result = dispatch_group_wait(group, DISPATCH_TIME_NOW);`


    For example, you can check if the tasks are finished in each loop of the RunLoop
    on the main thread without any delay. Although it is possible, I recommend using
    dispatch_group_notify to add some finalizing task to the main dispatch queue instead.
    Your source code becomes elegant. Still there are many useful functions in GCD.
    I explain them in the following sections. Let’s start with dispatch_barrier_async.'
  trans: "\n### Dispatch Group（调度组）\n\nDispatch Group 用于创建一个队列组。你可能希望在调度队列中的所有任务完成后，启动一个任务来完成某些收尾工作。当所有任务都在一个串行调度队列中时，你只需将一个收尾任务添加到该队列的末尾即可。但当使用并发调度队列或多个调度队列时，情况就会变得复杂。在这种情况下，你可以使用调度组。以下源代码展示了如何将三个\
    \ Block 添加到一个全局调度队列中，当所有 Block 都执行完毕后，一个用于收尾的 Block 将在主调度队列上执行。\n\n```\ndispatch_queue_t\
    \ queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\
    dispatch_group_t group = dispatch_group_create();\n\ndispatch_group_async(group,\
    \ queue, ^{NSLog(@\"blk0\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"\
    blk1\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"blk2\");});\n\ndispatch_group_notify(group,\n\
    \    dispatch_get_main_queue(), ^{NSLog(@\"done\");});\ndispatch_release(group);\n\
    ```\n\n结果将类似于：\n\n```\nblk1\nblk2\nblk0\ndone\n```\n\n任务的执行顺序并不固定，因为它们处于一个全局调度队列（这是一个并发调度队列）中；也就是说，这些任务会在多个线程上并发执行。其执行时机是不确定的。尽管如此，每次执行结束时，都会显示\
    \ “done”。调度组可以监控任务的完成情况，无论这些任务位于何种类型的调度队列中。当它检测到所有任务都已完成时，会将收尾任务添加到调度队列中。这就是调度组的用法。首先，通过\
    \ `dispatch_group_create` 函数创建一个类型为 `dispatch_group_t` 的调度组。由于函数名包含 “create”，因此当不再需要该调度组时，必须释放它。你应该像处理调度队列一样，使用\
    \ `dispatch_release` 函数进行释放。`dispatch_group_async` 函数与 `dispatch_async` 函数一样，将一个\
    \ Block 添加到指定的调度队列中。它与 `dispatch_async` 函数的不同之处在于，其第一个参数传入的是已创建的调度组。当调用 `dispatch_group_async`\
    \ 函数时，指定的 Block 会与该调度组关联起来。当一个 Block 与一个调度组关联时，该 Block 会通过 `dispatch_retain` 函数拥有该调度组的所有权，就像\
    \ Block 被添加到调度队列中一样。当 Block 执行完毕时，它会通过 `dispatch_release` 函数释放该调度组。当你不再需要该调度组时，只需调用\
    \ `dispatch_release` 来释放它即可。你无需关心与该调度组关联的 Block 是如何执行的。\n\n如示例所示，`dispatch_group_notify`\
    \ 函数指定了一个要添加到调度队列中的 Block。当调度组内的所有任务都完成时，该 Block 将被执行。第一个参数是要监控的调度组。当与该组关联的所有任务都完成时，Block（第三个参数）将被添加到调度队列（第二个参数）中。无论传递给\
    \ `dispatch_group_notify` 函数的是何种类型的调度队列，当该 Block 被添加时，与该调度组关联的所有任务都必须已经完成。\n\n\
    此外，你也可以简单地使用调度组来等待所有任务完成。你可以使用 `dispatch_group_wait` 函数，如代码清单 7–4 所示。\n\n**代码清单\
    \ 7–4.** *dispatch_group_wait*\n\n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\ndispatch_group_t group = dispatch_group_create();\n\ndispatch_group_async(group,\
    \ queue, ^{NSLog(@\"blk0\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"\
    blk1\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"blk2\");});\n\ndispatch_group_wait(group,\
    \ DISPATCH_TIME_FOREVER);\ndispatch_release(group);\n```\n\n`dispatch_group_wait`\
    \ 函数的第二个参数是一个超时时间，用于指定等待时长。该变量是 `dispatch_time_t` 类型。此示例使用了 `DISPATCH_TIME_FOREVER`\
    \ 来永久等待。它会一直等待，直到与该调度组关联的所有任务都完成。你无法中途取消等待。\n\n正如我们在学习 `dispatch_after` 函数时了解到的，你可以通过以下源代码等待\
    \ 1 秒。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull *\
    \ NSEC_PER_SEC);\n\nlong result = dispatch_group_wait(group, time);\n\nif (result\
    \ == 0) {\n\n     /*\n      * 所有与该调度组关联的任务都已完成\n      */\n\n} else {\n\n     /*\n\
    \      * 仍有部分与该调度组关联的任务正在运行。\n      */\n}\n```\n\n当 `dispatch_group_wait` 函数返回值不为\
    \ 0 时，表示即使指定的时间已过，仍有部分与该调度组关联的任务正在运行。当它返回 0 时，表示所有任务都已完成。如果使用 `DISPATCH_TIME_FOREVER`，`dispatch_group_wait`\
    \ 函数将返回 0，因为所有任务必定已经完成。\n\n顺便一提，“等待”是什么意思？它意味着当调用 `dispatch_group_wait` 函数时，该函数不会立即返回。执行\
    \ `dispatch_group_wait` 函数的当前线程将会停止。在传递给 `dispatch_group_wait` 函数的时间到期之前，或者在与该调度组关联的所有任务完成之前，执行该函数的线程会一直处于停止状态。\n\
    \n当使用 `DISPATCH_TIME_NOW` 时，你可以检查与该调度组关联的任务是否已经完成。\n\n```\nlong result = dispatch_group_wait(group,\
    \ DISPATCH_TIME_NOW);\n```\n\n例如，你可以在主线程的 RunLoop 的每个循环中检查任务是否已经完成，而无需任何延迟。尽管这是可行的，但我建议改用\
    \ `dispatch_group_notify` 将收尾任务添加到主调度队列中。这样你的代码会更优雅。GCD 中仍然有许多有用的函数。我将在后续章节中进行讲解。让我们从\
    \ `dispatch_barrier_async` 开始。\n"
- fmt: "## dispatch_barrier_async\n\n`dispatch_barrier_async` is a function for waiting\
    \ for other tasks in a queue. As explained, when you access a database or a file,\
    \ you can use serial dispatch queues to avoid inconsistent data. Actually, updating\
    \ data shouldn’t be executed at the same time as other updating tasks or reading\
    \ tasks. Reading data might be able to run concurrently with the other reading\
    \ tasks, meaning to access the data effectively, the reading tasks should be added\
    \ to concurrent dispatch queues and only the updating tasks have to be in a serial\
    \ dispatch queue while no updating task is running. You have to make sure that\
    \ the reading tasks don’t start until the updating tasks are finished. You might\
    \ be able to implement it with the `dispatch group` and `dispatch_set_target_queue`\
    \ functions, but it seems to be complex. GCD offers a better solution, the `dispatch_barrier_async`\
    \ function. This function is used with a concurrent dispatch queue created by\
    \ the `dispatch_queue_create` function. The following source code creates a concurrent\
    \ dispatch queue by the `dispatch_queue_create` function, and some reading tasks\
    \ are added by `dispatch_async`.\n\n```\ndispatch_queue_t queue = dispatch_queue_create(\n\
    \    \"com.example.gcd.ForBarrier\", DISPATCH_QUEUE_CONCURRENT);\n\ndispatch_async(queue,\
    \ blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\ndispatch_async(queue,\
    \ blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\ndispatch_async(queue,\
    \ blk4_for_reading);\ndispatch_async(queue, blk5_for_reading);\ndispatch_async(queue,\
    \ blk6_for_reading);\ndispatch_async(queue, blk7_for_reading);\n\ndispatch_release(queue);\n\
    ```\n\nNext, for example, think about writing data between the `blk3_for_reading`\
    \ and `blk4_for_reading`, and `blk4_for_reading` and later tasks should read the\
    \ updated data.\n\n```\ndispatch_async(queue, blk0_for_reading);\ndispatch_async(queue,\
    \ blk1_for_reading);\ndispatch_async(queue, blk2_for_reading);\ndispatch_async(queue,\
    \ blk3_for_reading);\n\n /*\n  * Writing data\n  *\n  * From now on, all the tasks\
    \ should read the updated data.\n  */\n\ndispatch_async(queue, blk4_for_reading);\n\
    dispatch_async(queue, blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\n\
    dispatch_async(queue, blk7_for_reading);\n```\n\nIf we just put the writing task\
    \ with the `dispatch_async` function, as in the next source code, even the tasks\
    \ that are added before the writing task might read the updated data unexpectedly.\
    \ The application might even crash because of its invalid access. This is the\
    \ nature of the concurrent dispatch queue. Furthermore if you add writing tasks,\
    \ it will cause inconsistent data and many more problems will occur.\n\n```\n\
    dispatch_async(queue, blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\n\
    dispatch_async(queue, blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\n\
    dispatch_async(queue, blk_for_writing);\ndispatch_async(queue, blk4_for_reading);\n\
    dispatch_async(queue, blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\n\
    dispatch_async(queue, blk7_for_reading);\n```\n\nHere is the `dispatch_barrier_async`\
    \ function. Using the `dispatch_barrier_async` function, you can add a task to\
    \ a concurrent dispatch queue at the time all the tasks in the queue are finished.\
    \ When the task added by the `dispatch_barrier_async` function is finished, the\
    \ concurrent dispatch queue will be back to normal, which means that it executes\
    \ the tasks concurrently as usual as shown in [Figure 7–9](#Chapter07.html#fig_7_9).\n\
    \n```\ndispatch_async(queue, blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\n\
    dispatch_async(queue, blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\n\
    dispatch_barrier_async(queue, blk_for_writing);\ndispatch_async(queue, blk4_for_reading);\n\
    dispatch_async(queue, blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\n\
    dispatch_async(queue, blk7_for_reading);\n```\n\nAs you see, it is very simple.\
    \ Just use the `dispatch_barrier_async` function instead of the `dispatch_async`\
    \ function. That’s all.\n\n![images](images/9781430241164_Fig07-09.jpg)\n\n**Figure\
    \ 7–9.** *Execution with the dispatch_barrier_async function*\n\nPlease use a\
    \ concurrent dispatch queue and the `dispatch_barrier_async` function to implement\
    \ an effective database or file access. Next, let’s see a `dispatch_sync` function\
    \ that is similar to the `dispatch_async` function.\n\n## dispatch_sync\n\n`dispatch_sync`\
    \ is a function similar to `dispatch_async`, but is waiting for the task to be\
    \ added. “async” in the name of the `dispatch_async` function means asynchronous.\
    \ Thus it adds a Block to a dispatch queue and the task is executed asynchronously.\
    \ The `dispatch_async` function doesn’t wait for anything as shown in [Figure\
    \ 7–10](#Chapter07.html#fig_7_10).\n\n![images](images/9781430241164_Fig07-10.jpg)\n\
    \n**Figure 7–10.** *Behavior of dispatch_async function*\n\nThere is also a synchronous\
    \ version, the `dispatch_sync` function, as well. It adds the Block to the dispatch\
    \ queue synchronously. The `dispatch_sync` function waits for the added Block\
    \ to be finished as shown in [Figure 7–11](#Chapter07.html#fig_7_11).\n\n![images](images/9781430241164_Fig07-11.jpg)\n\
    \n**Figure 7–11.** *Behavior of dispatch_sync function*\n\nAs I explained about\
    \ the `dispatch_group_wait` function in the “Dispatch Group” section, “wait” means\
    \ that the current thread stops. For example, on the main dispatch queue, you\
    \ might want to use a result of a task that was executed on a global dispatch\
    \ queue on the other thread. In such a situation, you can use the `dispatch_sync`\
    \ function.\n\n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n\ndispatch_sync(queue, ^{/* a task */});\n```\n\nAfter the `dispatch_sync`\
    \ function is called, the function doesn’t return until the specified task is\
    \ finished. It is like a brief version of the `dispatch_group_wait` function.\
    \ As you see, the source code is very simple. You can use the `dispatch_sync`\
    \ function very easily although it can produce a problem called deadlock. For\
    \ example, when the following source code is executed on the main thread, it causes\
    \ a deadlock.\n\n```\ndispatch_queue_t queue = dispatch_get_main_queue();\ndispatch_sync(queue,\
    \ ^{NSLog(@\"Hello?\");});\n```\n\nThis source code adds a Block to the main dispatch\
    \ queue; that is, the Block will be executed on the main thread. At the same time,\
    \ it waits for the block to be finished. Because it is running on the main thread,\
    \ the Block in the main dispatch queue is never executed. Let’s see the other\
    \ example:\n\n```\ndispatch_queue_t queue = dispatch_get_main_queue();\ndispatch_async(queue,\
    \ ^{\n    dispatch_sync(queue, ^{NSLog(@\"Hello?\");});\n});\n```\n\nThe Block\
    \ that is running on the main dispatch queue is waiting for the other Block to\
    \ be finished, which will run on the main dispatch queue as well. It causes deadlock.\n\
    \nOf course the same thing happens with a serial dispatch queue.\n\n```\ndispatch_queue_t\
    \ queue =\n    dispatch_queue_create(\"com.example.gcd.MySerialDispatchQueue\"\
    , NULL);\ndispatch_async(queue, ^{\n    dispatch_sync(queue, ^{NSLog(@\"Hello?\"\
    );});\n});\n```\n\nAs the name of the `dispatch_barrier_async` function contains\
    \ “async”, there is a sync version as well, `dispatch_barrier_sync`. After all\
    \ the tasks in a dispatch queue are finished, the specified task is added to the\
    \ dispatch queue as a `dispatch_barrier_async` function. It waits for the specified\
    \ task to be finished like the `dispatch_sync` function. When you use synchronous\
    \ APIs, such as `dispatch_sync`, that wait for a task to be finished, you have\
    \ to ask why you are using the API. You don’t want to deadlock the application,\
    \ do you?"
  raw: '#### dispatch_barrier_async


    The dispatch_barrier_async is a function for waiting for other tasks in a queue.
    As explained, when you access a database or a file, you can use serial dispatch
    queues to avoid inconsistent data. Actually, updating data shouldn’t be executed
    at the same time as other updating tasks or reading tasks. Reading data might
    be able to run concurrently with the other reading tasks, meaning to access the
    data effectively, the reading tasks should be added to concurrent dispatch queues
    and only the updating tasks have to be in a serial dispatch queue while no updating
    task is running. You have to make sure that the reading tasks don’t start until
    the updating tasks are finished. You might be able to implement it with the dispatch
    group and dispatch_set_target_queue functions, but it seems to be complex. GCD
    offers a better solution, the dispatch_barrier_async function. This function is
    used with a concurrent dispatch queue created by the dispatch_queue_create function.
    The following source code creates a concurrent dispatch queue by the dispatch_queue_create
    function, and some reading tasks are added by dispatch_async.


    `dispatch_queue_t queue = dispatch_queue_create(`

    `    "com.example.gcd.ForBarrier", DISPATCH_QUEUE_CONCURRENT);`


    `dispatch_async(queue, blk0_for_reading);`

    `dispatch_async(queue, blk1_for_reading);`

    `dispatch_async(queue, blk2_for_reading);`

    `dispatch_async(queue, blk3_for_reading);`

    `dispatch_async(queue, blk4_for_reading);`

    `dispatch_async(queue, blk5_for_reading);`

    `dispatch_async(queue, blk6_for_reading);`

    `dispatch_async(queue, blk7_for_reading);`


    `dispatch_release(queue);`


    Next, for example, think about writing data between the blk3_for_reading and blk4_for_reading,
    and blk4_for_reading and later tasks should read the updated data.


    `dispatch_async(queue, blk0_for_reading);`

    `dispatch_async(queue, blk1_for_reading);`

    `dispatch_async(queue, blk2_for_reading);`

    `dispatch_async(queue, blk3_for_reading);`


    ` /*`

    `  * Writing data`

    `  *`

    `  * From now on, all the tasks should read the updated data.`

    `  */`


    `dispatch_async(queue, blk4_for_reading);`

    `dispatch_async(queue, blk5_for_reading);`

    `dispatch_async(queue, blk6_for_reading);`

    `dispatch_async(queue, blk7_for_reading);`


    If we just put the writing task with the dispatch_async function, as in the next
    source code, even the tasks that are added before the writing task might read
    the updated data unexpectedly. The application might even crash because of its
    invalid access. This is the nature of the concurrent dispatch queue. Furthermore
    if you add writing tasks, it will cause inconsistent data and many more problems
    will occur.


    `dispatch_async(queue, blk0_for_reading);`

    `dispatch_async(queue, blk1_for_reading);`

    `dispatch_async(queue, blk2_for_reading);`

    `dispatch_async(queue, blk3_for_reading);`

    `dispatch_async(queue, blk_for_writing);`

    `dispatch_async(queue, blk4_for_reading);`

    `dispatch_async(queue, blk5_for_reading);`

    `dispatch_async(queue, blk6_for_reading);`

    `dispatch_async(queue, blk7_for_reading);`


    Here is the dispatch_barrier_async function. Using the dispatch_barrier_async
    function, you can add a task to a concurrent dispatch queue at the time all the
    tasks in the queue are finished. When the task added by the dispatch_barrier_async
    function is finished, the concurrent dispatch queue will be back to normal, which
    means that it executes the tasks concurrently as usual as shown in [Figure 7–9](#Chapter07.html#fig_7_9).


    `dispatch_async(queue, blk0_for_reading);`

    `dispatch_async(queue, blk1_for_reading);`

    `dispatch_async(queue, blk2_for_reading);`

    `dispatch_async(queue, blk3_for_reading);`

    `dispatch_barrier_async(queue, blk_for_writing);`

    `dispatch_async(queue, blk4_for_reading);`

    `dispatch_async(queue, blk5_for_reading);`

    `dispatch_async(queue, blk6_for_reading);`

    `dispatch_async(queue, blk7_for_reading);`


    As you see, it is very simple. Just usethe dispatch_barrier_async function instead
    of the dispatch_async function. That’s all.


    ![images](images/9781430241164_Fig07-09.jpg)


    **Figure 7–9.** *Execution with the dispatch_barrier_async function*


    Please use a concurrent dispatch queue and the dispatch_barrier_async function
    to implement an effective database or file access. Next, let’s see a dispatch_sync
    function that is similar to the dispatch_async function.


    #### dispatch_sync


    dispatch_sync is a function similar to dispatch_async, but is waiting for the
    task to be added. “async” in the name of the dispatch_async function means asynchronous.
    Thus it adds a Block to a dispatch queue and the task is executed asynchronously.
    The dispatch_async function doesn’t wait for anything as shown in [Figure 7–10](#Chapter07.html#fig_7_10).


    ![images](images/9781430241164_Fig07-10.jpg)


    **Figure 7–10.** *Behavior of dispatch_async function*


    There is also a synchronous version, the dispatch_sync function, as well. It adds
    the Block to the dispatch queue synchronously. The dispatch_sync function waits
    for the added Block to be finished as shown in [Figure 7–11](#Chapter07.html#fig_7_11).


    ![images](images/9781430241164_Fig07-11.jpg)


    **Figure 7–11.** *Behavior of dispatch_sync function*


    As I explained about the dispatch_group_wait function in the “Dispatch Group”
    section, “wait” means that the current thread stops. For example, on the main
    dispatch queue, you might want to use a result of a task that was executed on
    a global dispatch queue on the other thread. In such a situation, you can use
    the dispatch_sync function.


    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`


    `dispatch_sync(queue, ^{/* a task */});`


    After the dispatch_sync function is called, the function doesn’t return until
    the specified task is finished. It is like a brief version of the dispatch_group_wait
    function. As you see, the source code is very simple. You can use the dispatch_sync
    function very easily although it can produce a problem called deadlock. For example,
    when the following source code is executed on the main thread, it causes a deadlock.


    `dispatch_queue_t queue = dispatch_get_main_queue();`

    `dispatch_sync(queue, ^{NSLog(@"Hello?");});`


    This source code adds a Block to the main dispatch queue; that is, the Block will
    be executed on the main thread. At the same time, it waits for the block to be
    finished. Because it is running on the main thread, the Block in the main dispatch
    queue is never executed. Let’s see the other example:


    `dispatch_queue_t queue = dispatch_get_main_queue();`

    `dispatch_async(queue, ^{`

    `    dispatch_sync(queue, ^{NSLog(@"Hello?");});`

    `});`


    The Block that is running on the main dispatch queue is waiting for the other
    Block to be finished, which will run on the main dispatch queue as well. It causes
    deadlock.


    Of course the same thing happens with a serial dispatch queue.


    `dispatch_queue_t queue =`

    `    dispatch_queue_create("com.example.gcd.MySerialDispatchQueue", NULL);`

    `dispatch_async(queue, ^{`

    `    dispatch_sync(queue, ^{NSLog(@"Hello?");});`

    `});`


    As the name of the dispatch_barrier_async function contains “async”, there is
    a sync version as well, dispatch_barrier_sync. After all the tasks in a dispatch
    queue are finished, the specified task is added to the dispatch queue as a dispatch_barrier_async
    function. It waits for the specified task to be finished like the dispatch_sync
    function. When you use synchronous APIs, such as dispatch_sync, that wait for
    a task to be finished, you have to ask why you are using the API. You don’t want
    to deadlock the application, do you?'
  trans: "\n## dispatch_barrier_async\n\n`dispatch_barrier_async` 是一个用于等待队列中其他任务完成的函数。如前所述，当你访问数据库或文件时，可以使用串行调度队列来避免数据不一致。实际上，数据更新任务不应与其他更新任务或读取任务同时执行。而读取任务则可能可以与其他读取任务并发执行，这意味着为了高效访问数据，应将读取任务添加到并发调度队列中，只有更新任务需要在没有其他更新任务运行时，置于串行调度队列中。你必须确保在更新任务完成之前，读取任务不会开始。虽然你可以使用\
    \ `dispatch group` 和 `dispatch_set_target_queue` 函数来实现这一功能，但这似乎很复杂。GCD 提供了一个更好的解决方案——`dispatch_barrier_async`\
    \ 函数。该函数与通过 `dispatch_queue_create` 函数创建的并发调度队列一起使用。以下源代码使用 `dispatch_queue_create`\
    \ 函数创建了一个并发调度队列，并通过 `dispatch_async` 添加了一些读取任务。\n\n```\ndispatch_queue_t queue\
    \ = dispatch_queue_create(\n    \"com.example.gcd.ForBarrier\", DISPATCH_QUEUE_CONCURRENT);\n\
    \ndispatch_async(queue, blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\n\
    dispatch_async(queue, blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\n\
    dispatch_async(queue, blk4_for_reading);\ndispatch_async(queue, blk5_for_reading);\n\
    dispatch_async(queue, blk6_for_reading);\ndispatch_async(queue, blk7_for_reading);\n\
    \ndispatch_release(queue);\n```\n\n接下来，例如，考虑在 `blk3_for_reading` 和 `blk4_for_reading`\
    \ 之间写入数据，并且 `blk4_for_reading` 及之后的任务应读取更新后的数据。\n\n```\ndispatch_async(queue,\
    \ blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\ndispatch_async(queue,\
    \ blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\n\n /*\n  * 写入数据\n\
    \  *\n  * 从现在开始，所有任务都应读取更新后的数据。\n  */\n\ndispatch_async(queue, blk4_for_reading);\n\
    dispatch_async(queue, blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\n\
    dispatch_async(queue, blk7_for_reading);\n```\n\n如果我们仅使用 `dispatch_async` 函数放置写入任务，如下一个源代码所示，即使是写入任务之前添加的任务，也可能意外地读取到更新后的数据。应用程序甚至可能因为无效访问而崩溃。这就是并发调度队列的特性。此外，如果你添加多个写入任务，将导致数据不一致，并引发更多问题。\n\
    \n```\ndispatch_async(queue, blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\n\
    dispatch_async(queue, blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\n\
    dispatch_async(queue, blk_for_writing);\ndispatch_async(queue, blk4_for_reading);\n\
    dispatch_async(queue, blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\n\
    dispatch_async(queue, blk7_for_reading);\n```\n\n这时就轮到 `dispatch_barrier_async`\
    \ 函数登场了。使用 `dispatch_barrier_async` 函数，你可以在并发调度队列中所有现有任务都完成时，向该队列添加一个任务。当通过 `dispatch_barrier_async`\
    \ 函数添加的任务完成时，并发调度队列将恢复正常，即如同往常一样并发执行任务，如图 7–9 所示。\n\n```\ndispatch_async(queue,\
    \ blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\ndispatch_async(queue,\
    \ blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\ndispatch_barrier_async(queue,\
    \ blk_for_writing);\ndispatch_async(queue, blk4_for_reading);\ndispatch_async(queue,\
    \ blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\ndispatch_async(queue,\
    \ blk7_for_reading);\n```\n\n如你所见，这非常简单。只需将 `dispatch_async` 函数替换为 `dispatch_barrier_async`\
    \ 函数即可。仅此而已。\n\n![images](img/9781430241164_Fig07-09.jpg)\n\n**图 7–9.** *使用 dispatch_barrier_async\
    \ 函数的执行过程*\n\n请使用并发调度队列和 `dispatch_barrier_async` 函数来实现高效的数据库或文件访问。接下来，让我们看看与\
    \ `dispatch_async` 函数相似的 `dispatch_sync` 函数。\n\n## dispatch_sync\n\n`dispatch_sync`\
    \ 是一个与 `dispatch_async` 类似的函数，但它会等待任务被添加完成。`dispatch_async` 函数名称中的“async”代表异步。因此，它会将一个\
    \ Block 添加到调度队列中，并且该任务会异步执行。`dispatch_async` 函数不会等待任何东西，如图 7–10 所示。\n\n![images](img/9781430241164_Fig07-10.jpg)\n\
    \n**图 7–10.** *dispatch_async 函数的行为*\n\n当然也存在同步版本——`dispatch_sync` 函数。它会同步地将 Block\
    \ 添加到调度队列中。`dispatch_sync` 函数会等待添加的 Block 执行完毕，如图 7–11 所示。\n\n![images](img/9781430241164_Fig07-11.jpg)\n\
    \n**图 7–11.** *dispatch_sync 函数的行为*\n\n就像我在“调度组”部分解释 `dispatch_group_wait` 函数时所说的，“等待”意味着当前线程停止。例如，在主调度队列上，你可能希望使用另一个线程上的全局调度队列中某个任务的执行结果。在这种情形下，你可以使用\
    \ `dispatch_sync` 函数。\n\n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n\ndispatch_sync(queue, ^{/* 一个任务 */});\n```\n\n在调用 `dispatch_sync` 函数后，该函数会一直等待，直到指定的任务完成。它类似于一个简略版的\
    \ `dispatch_group_wait` 函数。如你所见，源代码非常简单。你可以非常容易地使用 `dispatch_sync` 函数，尽管它可能引发一个称为死锁的问题。例如，当以下源代码在主线程上执行时，会导致死锁。\n\
    \n```\ndispatch_queue_t queue = dispatch_get_main_queue();\ndispatch_sync(queue,\
    \ ^{NSLog(@\"Hello?\");});\n```\n\n这段源代码将一个 Block 添加到了主调度队列；也就是说，该 Block 将在主线程上执行。与此同时，它又在等待该\
    \ Block 完成。由于代码本身就在主线程上运行，因此主调度队列中的这个 Block 永远得不到执行。让我们再看另一个例子：\n\n```\ndispatch_queue_t\
    \ queue = dispatch_get_main_queue();\ndispatch_async(queue, ^{\n    dispatch_sync(queue,\
    \ ^{NSLog(@\"Hello?\");});\n});\n```\n\n这个正在主调度队列上运行的 Block 正在等待另一个也将要在主调度队列上运行的\
    \ Block 完成，这会导致死锁。\n\n当然，在串行调度队列上也会发生同样的情况。\n\n```\ndispatch_queue_t queue =\n\
    \    dispatch_queue_create(\"com.example.gcd.MySerialDispatchQueue\", NULL);\n\
    dispatch_async(queue, ^{\n    dispatch_sync(queue, ^{NSLog(@\"Hello?\");});\n\
    });\n```\n\n与 `dispatch_barrier_async` 函数名称中包含“async”类似，也存在一个同步版本 `dispatch_barrier_sync`。当调度队列中的所有任务都完成时，指定的任务会像\
    \ `dispatch_barrier_async` 函数那样被添加到队列中。它类似于 `dispatch_sync` 函数，会等待指定的任务执行完毕。当你使用诸如\
    \ `dispatch_sync` 这类等待任务完成的同步 API 时，你必须问自己为什么要使用这个 API。你肯定不希望你的应用程序发生死锁，对吧？\n"
- fmt: "### `dispatch_apply`\n\n`dispatch_apply`是一个与`dispatch_sync`函数和调度组相关的函数。`dispatch_apply`函数用于向调度队列多次添加一个Block，然后等待直到所有任务完成。\n\
    \n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\ndispatch_apply(10, queue, ^(size_t index) {\n    NSLog(@\"%zu\", index);\n\
    });\nNSLog(@\"done\");\n```\n\n结果类似于：\n\n```\n4\n1\n0\n3\n5\n2\n6\n8\n9\n7\ndone\n\
    ```\n\n因为它是在全局调度队列上执行的，每个任务的执行时机并不固定。`done`一定是最后一个输出的，因为`dispatch_apply`函数会等待所有任务完成。\n\
    \n第一个参数是重复次数，第二个参数是目标调度队列，第三个参数是要添加到队列中的任务。在这个例子中，第三个参数中的Block接受一个参数来区分每个Block，因为Block被添加了多次。例如，当你想要对`NSArray`类对象中的每个条目执行某个操作时，你不需要编写`for`循环。请看下面的源代码，它假设`NSArray`类对象被赋值给了一个名为“array”的变量。\n\
    \n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\ndispatch_apply([array count], queue, ^(size_t index) {\n    NSLog(@\"%zu:\
    \ %@\", index, [array objectAtIndex:index]);\n});\n```\n\n在全局调度队列上为数组中的所有条目执行Block非常容易。`dispatch_apply`函数会等待所有任务的执行，就像`dispatch_sync`函数所做的那样。我建议将`dispatch_apply`函数与`dispatch_async`函数一起使用，以异步方式运行它，如[列表7-5](#Chapter07.html#list_7_5)所示。\n\
    \n**列表7-5.** `dispatch_apply`\n\n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n\n /*\n  * 在全局调度队列上异步执行\n  */\n\ndispatch_async(queue, ^{\n\n     /*\n\
    \      * 在全局调度队列上，dispatch_apply函数会等待所有任务完成。\n      */\n\n    dispatch_apply([array\
    \ count], queue, ^(size_t index) {\n\n         /*\n          * 与NSArray对象中的所有对象并发执行某些操作\n\
    \          */\n\n        NSLog(@\"%zu: %@\", index, [array objectAtIndex:index]);\n\
    \n    });\n\n     /*\n      * dispatch_apply函数的所有任务已完成。\n      */\n\n     /*\n\
    \      * 在主调度队列上异步执行\n      */\n\n    dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n\n         /*\n          * 在主调度队列上执行。\n          * 例如更新用户界面等。\n        \
    \  */\n\n        NSLog(@\"done\");\n\n    });\n});\n```\n\n接下来，让我们看看控制已添加任务执行的`dispatch_suspend`和`dispatch_resume`函数。\n\
    \n### `dispatch_suspend` / `dispatch_resume`\n\n这些函数用于暂停或恢复队列的执行。当你向调度队列添加许多任务时，有时你可能希望在完成添加所有任务之前不执行这些任务。当某个Block捕获了可能受其他任务影响的值时，你可能需要这样做。你可以暂停一个调度队列，稍后如果你希望执行它，再恢复它。调度队列可以通过`dispatch_suspend`函数暂停：\n\
    \n```\ndispatch_suspend(queue);\n```\n\n它可以通过`dispatch_resume`函数恢复：\n\n```\ndispatch_resume(queue);\n\
    ```\n\n这不会影响任何正在运行的任务。它只会阻止启动调度队列中尚未开始的任务。当它们被恢复后，这些任务将会执行。\n\n### 调度信号量\n\n如果你需要对源代码中粒度比串行调度队列或`dispatch_barrier_async`函数更小的部分进行并发控制，调度信号量会很有用。\n\
    \n正如前面所解释的，如果数据被并发更新，可能会导致数据不一致或应用程序崩溃。你可以通过使用串行调度队列或`dispatch_barrier_async`函数来避免这种情况。但有时并发控制需要在更小的粒度上进行。让我们看一个示例，演示当顺序不重要时如何将所有数据添加到一个`NSMutableArray`中，如[列表7-6](#Chapter07.html#list_7_6)所示。\n\
    \n**列表7-6.** 向`NSMutableArray`添加数据\n\n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n\nNSMutableArray *array = [[NSMutableArray alloc] init];\n\nfor (int i\
    \ = 0; i < 100000; ++i) {\n    dispatch_async(queue, ^{\n\n        [array addObject:[NSNumber\
    \ numberWithInt:i]];\n\n    });\n}\n```\n\n在这段源代码中，`NSMutableArray`类的对象在全局调度队列上被更新，这意味着该对象被多个线程同时更新。因为`NSMutableArray`类不支持多线程，当从多个线程更新该对象时，它会被损坏。应用程序可能会因为内存相关问题而崩溃。这是一个竞态条件。在这种情况下，我们可以使用调度信号量。尽管调度信号量应该用于更小的粒度，但我们使用这个例子来解释如何使用调度信号量。调度信号量是一个带有计数器的信号量，在多线程编程中被称为计数信号量。信号量得名于使用旗帜进行交通管制。当可以通行时，旗帜升起；当不能通行时，旗帜降下。调度信号量有一个计数器来模拟这个旗帜。当计数器为零时，执行会等待。当计数器大于零时，它在递减计数器后继续执行。让我们看看如何使用调度信号量。下面的源代码使用`dispatch_semaphore_create`函数创建了一个调度信号量。\n\
    \n```\ndispatch_semaphore_t semaphore = dispatch_semaphore_create(1);\n```\n\n\
    参数是计数器的初始值。在示例中，计数器被初始化为1。正如其名称中包含“create”一样，你必须像对待调度队列或调度组一样，使用`dispatch_release`函数来释放它。你也可以通过调用`dispatch_retain`函数来获得所有权。\n\
    \n```\ndispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);\n```\n\n`dispatch_semaphore_wait`函数会等待，直到调度信号量的计数器变为1或更大。当计数器为1或更大时，或者当它在等待过程中计数器变为1或更大时，它会减小计数器并从`dispatch_semaphore_wait`函数返回。第二个参数以`dispatch_time_t`类型指定等待时间。在此示例中，它会永远等待。`dispatch_semaphore_wait`函数的返回值与`dispatch_group_wait`函数的返回值相同。你可以根据返回值切换行为，如[列表7-7](#Chapter07.html#list_7_7)所示。\n\
    \n**列表7-7.** `dispatch_semaphore_wait`\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW,\
    \ 1ull * NSEC_PER_SEC);\n\nlong result = dispatch_semaphore_wait(semaphore, time);\n\
    \nif (result == 0) {\n\n     /*\n      * 调度信号量的计数器大于一。\n      * 或者在指定超时时间前它变为一或更大。\n\
    \      * 计数器会自动减一。\n      *\n      * 在这里，你可以执行需要并发控制的任务。\n      */\n\n} else {\n\
    \n     /*\n      * 因为调度信号量的计数器为零，\n      * 它一直等待到指定的超时时间。\n      */\n\n}\n```"
  raw: '#### dispatch_apply


    dispatch_apply is a function that relates to the dispatch_sync function and dispatch
    groups. The dispatch_apply function is used to add a Block to a dispatch queue
    for a number of times, and then it waits until all the tasks are finished.


    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`

    `dispatch_apply(10, queue, ^(size_t index) {`

    `    NSLog(@"%zu", index);`

    `});`

    `NSLog(@"done");`


    The result is something like:


    `4`

    `1`

    `0`

    `3`

    `5`

    `2`

    `6`

    `8`

    `9`

    `7`

    `done`


    Because it is executed on the global dispatch queue, the executing timing of each
    task isn’t constant. “done” must always be last because the dispatch_apply function
    waits for all the tasks to be finished.


    The first argument is the number of times, the second is the target dispatch queue,
    and the third is the task to be added to the queue. In this example, the Block
    in the third argument takes an argument to distinguish each Block because the
    Block is added multiple times. For example, when you want to do something for
    each entry in an NSArray class object, you don’t need to write a for-loop. Let’s
    see the following source code. It assumes that an NSArray class object is assigned
    to a variable “array”.


    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`

    `dispatch_apply([array count], queue, ^(size_t index) {`

    `    NSLog(@"%zu: %@", index, [array objectAtIndex:index]);`

    `});`


    It is very easy to execute a Block for all the entries in an array on a global
    dispatch queue. The dispatch_apply function waits for the execution of all the
    tasks as the dispatch_sync function does. I recommend using the dispatch_apply
    function with the dispatch_async function to run it asynchronously as shown in
    [Listing 7–5](#Chapter07.html#list_7_5).


    **Listing 7–5.** *dispatch_apply*


    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`


    ` /*`

    `  * Executing on a global dispatch queue asynchronously`

    `  */`


    `dispatch_async(queue, ^{`


    `     /*`

    `      * On the global dispatch queue, dispatch_apply function waitsfor all the
    tasks to`

    `be finished.`

    `      */`


    `    dispatch_apply([array count], queue, ^(size_t index) {`


    `         /*`

    `          * do something concurrently with all the objects in the NSArray object`

    `          */`


    `        NSLog(@"%zu: %@", index, [array objectAtIndex:index]);`


    `    });`


    `     /*`

    `      * All the tasks by dispatch_apply function are finished.`

    `      */`


    `     /*`

    `      * Execute on the main dispatch queue asynchronously`

    `      */`


    `    dispatch_async(dispatch_get_main_queue(), ^{`


    `         /*`

    `          * Executed on the main dispatch queue.`

    `          * Something like updating userface, etc.`

    `          */`


    `        NSLog(@"done");`


    `    });`

    `});`


    Next, let’s see the dispatch_suspend and dispatch_resume functions that control
    the execution of the added tasks.


    #### dispatch_suspend/dispatch_resume


    These functions suspend or resume the execution of the queue. When you add many
    tasks to a dispatch queue, sometimes you don’t want to execute the tasks until
    you finish adding all of them. You may want to do that when a Block captures some
    values that are affected by other tasks. You can suspend a dispatch queue and
    resume it later if you would like to execute it then. A dispatch queue can be
    suspended by the dispatch_suspend function:


    `dispatch_suspend(queue);`


    It can be resumed by the dispatch_resume function:


    ` dispatch_resume(queue);`


    It doesn’t affect any tasks that are already running. It just prevents starting
    tasks that are in the dispatch queue but not yet begun. After they are resumed,
    these tasks will be executed.


    #### Dispatch Semaphore


    A dispatch semaphore is useful if you need a concurrency control for a small portion
    of the source code that has smaller granularity than a serial dispatch queue or
    dispatch_barrier_async function.


    As explained, if data are updated concurrently, inconsistent data might occur
    or the application might crash. You can avoid that by using a serial dispatch
    queue or the dispatch_barrier_async function. But sometimes concurrency control
    has to be done in smaller granularity. Let’s see an example to show how to add
    all the data to an NSMutableArray when the order is unimportant, as shown in [Listing
    7–6](#Chapter07.html#list_7_6).


    **Listing 7–6.** *Adding data to NSMutableArray*


    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`


    `NSMutableArray *array = [[NSMutableArray alloc] init];`


    `for (int i = 0; i < 100000; ++i) {`

    `    dispatch_async(queue, ^{`


    `        [array addObject:[NSNumber numberWithInt:i]];`


    `    });`

    `}`


    In this source code, the object of the NSMutableArray class is updated on a global
    dispatch queue, which means that the object is updated by multiple threads at
    the same time. Because the NSMutableArray class doesn’t support multithreading,
    when the object is updated from many threads, it will be corrupted. The application
    probably crashes because of a memory-related problem. This is a race condition.
    We can use a dispatch semaphore in this case. A dispatch semaphore should be used
    for smaller granularity though; we use this example to explain how to use a dispatch
    semaphore. A dispatch semaphore is a semaphore with a counter, which is called
    a counting semaphore in multithreaded programming. A semaphore is named after
    a traffic control with flags. A flag is up when you can go, and the flag is down
    when you can’t. A dispatch semaphore has a counter to simulate the flag. When
    the counter is zero, the execution waits. When the counter is more than zero,
    it keeps going after it decrements the counter. Let’s see how to use a dispatch
    semaphore. The following source code is creating a dispatch semaphore with the
    dispatch_semaphore_create function.


    `dispatch_semaphore_t semaphore = dispatch_semaphore_create(1);`


    The argument is an initial value of the counter. In the example, the counter is
    initialized as one. As its name includes “create”, you have to release it with
    the dispatch_release function as for a dispatch queue or a dispatch group. You
    can have ownership by calling the dispatch_retain function as well.


    `dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);`


    A dispatch_semaphore_wait function waits until the counter of the dispatch semaphore
    becomes one and more. When the counter is one and more, or the counter becomes
    one and more while it is waiting, it decreases the counter and returns from the
    dispatch_semaphore_wait function. The second argument specifies how long it waits
    in dispatch_time_t type. In this example, it waits forever. The return value of
    the dispatch_semaphore_wait function is the same as that of the dispatch_group_wait
    function. You can switch the behavior by the return value as shown in [Listing
    7–7](#Chapter07.html#list_7_7).


    **Listing 7–7.** *dispatch_semaphore_wait*


    `dispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);`


    `long result = dispatch_semaphore_wait(semaphore, time);`


    `if (result == 0) {`


    `     /*`

    `      * The counter of the dispatch semaphore was more than one.`

    `      * Or it became one and more before the specified timeout.`

    `      * The counter is automatically decreased by one.`

    `      *`

    `      * Here, you can execute a task that needs a concurrency control.`

    `      */`


    `} else {`


    `     /*`

    `      * Because the counter of the dispatch semaphore was zero,`

    `      * it has waited until the specified timeout.`

    `      */`


    `}`'
