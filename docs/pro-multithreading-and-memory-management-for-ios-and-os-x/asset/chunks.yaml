    \ Block 捕获了可能受其他任务影响的值时，你可能需要这样做。你可以暂停一个调度队列，稍后如果你希望执行它，再恢复它。调度队列可以通过`dispatch_suspend`函数暂停：\n\
    \n```\ndispatch_suspend(queue);\n```\n\n它可以通过`dispatch_resume`函数恢复：\n\n```\ndispatch_resume(queue);\n\
    ```\n\n这不会影响任何正在运行的任务。它只会阻止启动调度队列中尚未开始的任务。当它们被恢复后，这些任务将会执行。\n\n### 调度信号量\n\n如果你需要对源代码中粒度比串行调度队列或`dispatch_barrier_async`函数更小的部分进行并发控制，调度信号量会很有用。\n\
    \n正如前面所解释的，如果数据被并发更新，可能会导致数据不一致或应用程序崩溃。你可以通过使用串行调度队列或`dispatch_barrier_async`函数来避免这种情况。但有时并发控制需要在更小的粒度上进行。让我们看一个示例，演示当顺序不重要时如何将所有数据添加到一个`NSMutableArray`中，如列表\
    \ 7-6 所示。\n\n**列表 7-6.** 向`NSMutableArray`添加数据\n\n```\ndispatch_queue_t queue\
    \ =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\nNSMutableArray\
    \ *array = [[NSMutableArray alloc] init];\n\nfor (int i = 0; i < 100000; ++i)\
    \ {\n    dispatch_async(queue, ^{\n\n        [array addObject:[NSNumber numberWithInt:i]];\n\
    \n    });\n}\n```\n\n在这段源代码中，`NSMutableArray`类的对象在全局调度队列上被更新，这意味着该对象被多个线程同时更新。因为`NSMutableArray`类不支持多线程，当从多个线程更新该对象时，它会被损坏。应用程序可能会因为内存相关问题而崩溃。这是一个竞态条件。在这种情况下，我们可以使用调度信号量。尽管调度信号量应该用于更小的粒度，但我们使用这个例子来解释如何使用调度信号量。调度信号量是一个带有计数器的信号量，在多线程编程中被称为计数信号量。信号量得名于使用旗帜进行交通管制。当可以通行时，旗帜升起；当不能通行时，旗帜降下。调度信号量有一个计数器来模拟这个旗帜。当计数器为零时，执行会等待。当计数器大于零时，它在递减计数器后继续执行。让我们看看如何使用调度信号量。下面的源代码使用`dispatch_semaphore_create`函数创建了一个调度信号量。\n\
    \n```\ndispatch_semaphore_t semaphore = dispatch_semaphore_create(1);\n```\n\n\
    参数是计数器的初始值。在示例中，计数器被初始化为 1。正如其名称中包含“create”一样，你必须像对待调度队列或调度组一样，使用`dispatch_release`函数来释放它。你也可以通过调用`dispatch_retain`函数来获得所有权。\n\
    \n```\ndispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);\n```\n\n`dispatch_semaphore_wait`函数会等待，直到调度信号量的计数器变为\
    \ 1 或更大。当计数器为 1 或更大时，或者当它在等待过程中计数器变为 1 或更大时，它会减小计数器并从`dispatch_semaphore_wait`函数返回。第二个参数以`dispatch_time_t`类型指定等待时间。在此示例中，它会永远等待。`dispatch_semaphore_wait`函数的返回值与`dispatch_group_wait`函数的返回值相同。你可以根据返回值切换行为，如列表\
    \ 7-7 所示。\n\n**列表 7-7.** `dispatch_semaphore_wait`\n\n```\ndispatch_time_t time\
    \ = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);\n\nlong result = dispatch_semaphore_wait(semaphore,\
    \ time);\n\nif (result == 0) {\n\n     /*\n      * 调度信号量的计数器大于一。\n      * 或者在指定超时时间前它变为一或更大。\n\
    \      * 计数器会自动减一。\n      *\n      * 在这里，你可以执行需要并发控制的任务。\n      */\n\n} else {\n\
    \n     /*\n      * 因为调度信号量的计数器为零，\n      * 它一直等待到指定的超时时间。\n      */\n\n}\n```\n"
- fmt: "## 排版后\n\nWhen a `dispatch_semaphore_wait` function returns zero, a task that\
    \ needs a concurrency control can be executed safely. After you finish the task,\
    \ you have to call the `dispatch_semaphore_signal` function to increase the counter\
    \ of the dispatch semaphore by one. [Listing 7–8](#Chapter07.html#list_7_8) shows\
    \ how to use a dispatch semaphore for the previous source code ([Listing 7–6](#Chapter07.html#list_7_6)).\n\
    \n**Listing 7–8.** *Adding data to* `NSMutableArray` *using dispatch semaphore*\n\
    \n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n\n /*\n  * Create a dispatch semaphore\n  *\n  * Set the initial value\
    \ 1 for the counter of the dispatch semaphore\n  * to assure that only one thread\
    \ will access the object of\n  * NSMutableArray class at the same time.\n  */\n\
    \ndispatch_semaphore_t semaphore = dispatch_semaphore_create(1);\n\nNSMutableArray\
    \ *array = [[NSMutableArray alloc] init];\n\nfor (int i = 0; i < 100000; ++i)\
    \ {\n    dispatch_async(queue, ^{\n\n             /*\n              * Wait for\
    \ the dispatch semaphore\n              *\n              * Wait forever until\
    \ the counter of the dispatch semaphore is one and more.\n              */\n\n\
    \            dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);\n\n  \
    \           /*\n              * Because the counter of the dispatch semaphore\
    \ is one and more,\n              * the counter is decreased by one and the program\
    \ flow has returned from\n              * the dispatch_semaphore_wait function.\n\
    \              *\n              * The counter of the dispatch semaphore is always\
    \ zero here.\n              *\n              * Because only one thread can access\
    \ the object of the NSMutableArray class\n              * at the same time, you\
    \ can update the object safely.\n              */\n\n            [array addObject:[NSNumber\
    \ numberWithInt:i]];\n\n             /*\n              * Because a task that needs\
    \ concurrency control is done,\n              * you have to call the dispatch_semaphore_signal\
    \ function\n              * to increase the counter of the dispatch semaphore.\n\
    \              *\n              * If some threads are waiting for the counter\
    \ of the dispatch_semaphore\n              * incremented on dispatch_semaphore_wait,\
    \ the first thread will be started.\n              */\n\n            dispatch_semaphore_signal(semaphore);\n\
    \    });\n}\n\n /*\n  * Originally, because the dispatch semaphore isn’t needed\
    \ any more,\n  * you have to release the dispatch semaphore.\n  *\n  * dispatch_release(semaphore);\n\
    \  */\n```\n\nNext, let’s see the `dispatch_once` function.\n\n#### `dispatch_once`\n\
    \nThe `dispatch_once` function is used to ensure that the specified task will\
    \ be executed only once during the application’s lifetime. Following is a typical\
    \ source code to initialize something. It could be made elegant by using the `dispatch_once`\
    \ function.\n\n```\nstatic int initialized = NO;\n\nif (initialized == NO)\n{\n\
    \n     /*\n      * Initializing\n      */\n\n    initialized = YES;\n}\n```\n\n\
    With the `dispatch_once` function, it will be modified as follows.\n\n```\nstatic\
    \ dispatch_once_t pred;\n\ndispatch_once(&pred, ^{\n\n     /*\n      * Initializing\n\
    \      */\n\n});\n```\n\nThere is not much difference between the two source codes.\
    \ With the `dispatch_once` function, it works safely even in a multithreaded environment.\
    \ The former source code is also safe in most cases. But on a multicore CPU, there\
    \ is a slight chance that the `initialized` variable might be read at the same\
    \ time the value is overwritten. This will cause the initialization to be executed\
    \ many times. However, no need to worry if you implemented it with the `dispatch_once`\
    \ function. A `dispatch_once` function is useful to create a singleton object\
    \ for a so-called “singleton pattern.”\n\n### Dispatch I/O\n\nTo load a huge file,\
    \ you might think it is faster if it is loaded as small blocks concurrently with\
    \ using a global dispatch queue rather than in a normal way. With I/O hardware\
    \ these days, it might be true. It might be faster if loaded concurrently than\
    \ if loaded on one thread. To make it possible, you can use dispatch I/O and Dispatch\
    \ Data. When you read or write a file with Dispatch I/O, one file is split into\
    \ a certain size to be accessed on a global dispatch queue.\n\n```\ndispatch_async(queue,\
    \ ^{/* loading the file from between 0 to 8191 byte. */});\ndispatch_async(queue,\
    \ ^{/*  loading the file from between 8192 to 16383 byte */});\ndispatch_async(queue,\
    \ ^{/* loading the file from between 16384 to 24575 byte */});\ndispatch_async(queue,\
    \ ^{/* loading the file from between 24576 to 32767 byte */});\ndispatch_async(queue,\
    \ ^{/* loading the file from between 32768 to 40959 byte */});\ndispatch_async(queue,\
    \ ^{/* loading the file from between 40960 to 49151 byte */});\ndispatch_async(queue,\
    \ ^{/* loading the file from between 49152 to 57343 byte */});\ndispatch_async(queue,\
    \ ^{/* loading the file from between 57344 to 65535 byte */});\n```\n\nLike the\
    \ source code, loading will be done on each split block. Dispatch data can merge\
    \ (or split) the loaded data more easily than doing it yourself. Let’s see an\
    \ example of a dispatch I/O and dispatch data by Apple as shown in [Listing 7–9](#Chapter07.html#list_7_9).\n\
    \n**Listing 7–9.** *Dispatch I/O*\n\n```\npipe_q = dispatch_queue_create(\"PipeQ\"\
    , NULL);\npipe_channel = dispatch_io_create(DISPATCH_IO_STREAM, fd, pipe_q, ^(int\
    \ err){\n        close(fd);\n});\n\n*out_fd = fdpair[1];\n\ndispatch_io_set_low_water(pipe_channel,\
    \ SIZE_MAX);\n\ndispatch_io_read(pipe_channel, 0, SIZE_MAX, pipe_q,\n        ^(bool\
    \ done, dispatch_data_t pipedata, int err){\n    if (err == 0)\n    {\n      \
    \  size_t len = dispatch_data_get_size(pipedata);\n        if (len > 0)\n    \
    \    {\n            const char *bytes = NULL;\n            char *encoded;\n\n\
    \            dispatch_data_t md = dispatch_data_create_map(\n                pipedata,\
    \ (const void **)&bytes, &len);\n            encoded = asl_core_encode_buffer(bytes,\
    \ len);\n            asl_set((aslmsg)merged_msg, ASL_KEY_AUX_DATA, encoded);\n\
    \            free(encoded);\n            _asl_send_message(NULL, merged_msg, -1,\
    \ NULL);\n            asl_msg_release(merged_msg);\n            dispatch_release(md);\n\
    \        }\n    }\n\n    if (done)\n    {\n        dispatch_semaphore_signal(sem);\n\
    \        dispatch_release(pipe_channel);\n        dispatch_release(pipe_q);\n\
    \    }\n});\n```\n\nThis is taken from an Apple System Log API (Libc-763.11 gen/asl.c)\
    \ source code. The `dispatch_io_create` function creates a dispatch I/O. It specifies\
    \ a Block that is executed when an error occurs and a dispatch queue that executes\
    \ the Block. A `dispatch_io_set_low_water` function sets the size of each reading\
    \ (the data are split into this size). The `dispatch_io_read` function starts\
    \ reading on the global dispatch queue. Whenever one of the split data blocks\
    \ is read, the dispatch data are passed as the parameter of the Block that is\
    \ set as the callback for reading finished in `dispatch_io_read`. So, the Block\
    \ can scan or merge the dispatch data. If you want to read files bit faster than\
    \ the normal way, try to use a dispatch I/O.\n\n### Summary\n\nIn this chapter,\
    \ we learned how to use GCD API in detail. And we also learned:\n\n*   The relationship\
    \ of the dispatch queue and thread\n*   How to execute a synchronized or asynchronized\
    \ Block\n*   How to avoid a race condition\n\nIn the next chapter, we show the\
    \ implementation of GCD giving us a deeper understanding of it.\n\n# Chapter 8\n\
    \n# GCD Implementation\n\nIn this chapter, I explain how GCD is implemented in\
    \ order to give you a better understanding of how it works. And then I explain\
    \ one functionality of GCD called “data source,” which relates to the XNU kernel\
    \ event.\n\n### Dispatch Queue\n\nThis section shows how GCD is implemented. We\
    \ especially look at the GCD structure and then see how a Block is executed on\
    \ the dispatch queue."
