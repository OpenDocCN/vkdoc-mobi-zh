    blk([[NSObject alloc] init]);\n```\n\n由于变量 `array` 的强引用消失，赋给变量 `array` 的 `NSMutableArray`\
    \ 类对象理应被释放并销毁。但结果显示它运行无误。\n\n```\narray count = 1\narray count = 2\narray count\
    \ = 3\n```\n\n这意味着，在源代码执行 Block 的最后部分时，即使变量作用域已经结束，赋给变量 `array` 的 `NSMutableArray`\
    \ 类对象仍然存在。源代码的转换结果如代码清单 5-8 所示。\n\n**代码清单 5-8.** *代码清单 5-7 的转换后源代码*\n\n```\n/*\
    \ Block 的结构体和相关函数 */\n\nstruct __main_block_impl_0 {\n    struct __block_impl\
    \ impl;\n    struct __main_block_desc_0* Desc;\n    id __strong array;\n    __main_block_impl_0(void\
