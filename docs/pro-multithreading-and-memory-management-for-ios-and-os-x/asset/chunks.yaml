  trans: '

    #### CPU 如何执行应用程序


    如我们所见，源代码会被转换成 CPU 字节码。应用程序将这些字节码连同数据打包在一起，安装到 Mac 或 iPhone 上。当用户在 Mac 的 OSX 或
    iPhone 的 iOS 等操作系统上启动应用程序时，字节码会被分配到内存中，CPU 从应用程序指定的起始地址开始，逐条执行这些字节码。


    在示例中，首先执行起始地址 `1ac` 处的指令 `push`。接着，执行指针移动到下一个地址。地址 `1ae` 处的下一条指令 `movw` 被执行，然后是地址
    `1b2` 处的指令，依此类推。


    通过诸如 `if`、`for` 等控制语句或 Objective-C 中的函数调用，执行地址可以跳转到一个较远的地址。一个 CPU 在同一个时刻只能执行一条指令。执行过程不会分裂成两条并发的指令。有时会用路径的类比来解释
    CPU 上的执行过程。


    线程相当于 CPU 执行的一条路径。如今，有些 CPU 拥有 64 个 CPU 核心；有些则作为两个虚拟 CPU 工作。一台计算机拥有多个 CPU 核心是非常普遍的情况。但一个
    CPU 核心仍然只运行一条路径。多线程是指一个应用程序拥有多条路径。如图 Figure 6–2 所示，多线程应用程序可以并发地执行多条路径。


    ![images](img/9781430241164_Fig06-02.jpg)


    **图 6–2.** *CPU 在多线程上执行字节码*


    与 CPU 相关的技术很多，而且发展迅速，但一个 CPU 核心一次仍然只能执行一条 CPU 字节码。多线程应用程序是如何在多个路径上执行字节码的呢？


    作为 OS X 和 iOS 核心部分的 XNU 内核会在固定的时间间隔以及收到系统调用等操作系统事件时，在这些路径之间进行切换。一条路径的执行状态（包括 CPU
    寄存器）会被存储到分配给每条路径的内存块之一。然后，另一条路径的执行状态会从另一个内存块复制回 CPU 寄存器，如此反复；也就是说，CPU 会继续在这个新路径上执行。这种机制被称为*上下文切换*。多线程程序会反复不断地进行上下文切换。正因为如此，一个
    CPU 可以虚拟地执行多个线程。当存在多个 CPU 核心时，每个核心可以并行运行一个线程。在这种情况下，真正能并行运行的线程数就等于 CPU 核心数。针对多线程的编程技术被称为*多线程编程*。


    #### 多线程编程的优缺点


    多线程编程会引发许多问题。例如，当多个线程竞争更新同一资源时，会导致数据不一致（称为*竞态条件*）。当多个线程同时等待某个事件时（*死锁*），这些线程会堆积起来。当使用过多线程时，应用程序的内存会变得紧张，等等（图
    6–3）。


    ![images](img/9781430241164_Fig06-03.jpg)


    **图 6–3.** *多线程编程的问题*


    当然，有许多方法可以避免这些问题，但源代码会迅速变得过于复杂。既然存在这些问题，为什么还要使用多线程编程呢？


    原因是为了让应用程序具有高响应性。在一个应用程序中，启动后就会立即启动一个线程。这个线程负责绘制用户界面、处理触摸面板的事件等。这个线程被称为*主线程*。如果主线程执行一个耗时的任务，比如增强现实的图像处理或数据库访问，那么这个任务会阻塞主线程上的所有其他任务。在
    OSX 和 iOS 上，主线程上的主循环（称为 RunLoop）不应被阻塞，因为只有主线程才能更新用户界面。一旦被阻塞，用户界面将无法更新，并且同一张静态图片会显示相当长的时间。为了避免这种情况，耗时的任务应该在其他线程上执行，如图
    Figure 6–4 所示。


    ![images](img/9781430241164_Fig06-04.jpg)


    **图 6–4.** *多线程编程的优点*


    在多线程应用程序中，当耗时任务正在运行时，用户界面仍然可以保持响应。GCD 也让多线程编程变得非常优雅。在下一章中，我们将展示如何使用 GCD API。


    ### 总结


    在本章中，我们学习了什么是多线程编程以及它的优缺点。在下一章中，我们将学习 GCD 的基本机制和 GCD API。我们还将展示 GCD 相比传统多线程编程的优势所在。


    ## 第 7 章


    ## GCD 基础


    在本章中，我们将展示如何使用 GCD。首先，我们从 GCD 的核心概念——调度队列开始，并展示如何向队列中添加任务。之后，我们将设计一个 API 来控制队列和任务。最后，我们还将展示如何使用
    GCD 调度 I/O 来控制文件。


    ### 调度队列


    顾名思义，调度队列是一个用于存储待执行任务的队列。应用程序开发者可以将任务编写成块字面量，并通过 `dispatch_async` 函数等将其添加到调度队列中。然后，调度队列会按照添加的顺序，即先进先出（FIFO）的方式执行这些任务，如图
    Figure 7–1 所示。


    ![images](img/9781430241164_Fig07-01.jpg)


    **图 7–1.** *调度队列上的执行过程*


    如图 Figure 7–2 所示，有两种类型的调度队列。一种是串行调度队列，它会等待当前运行的任务完成后再启动另一个任务。另一种是并发调度队列，它不会等待。


    ![images](img/9781430241164_Fig07-02.jpg)


    **图 7–2.** *串行调度队列与并发调度队列*


    #### 两种类型的调度队列


    让我们来比较这两种类型的调度队列。下面的源代码使用 `dispatch_async` 函数将任务添加到调度队列。


    ```

    dispatch_async(queue, blk0);

    dispatch_async(queue, blk1);

    dispatch_async(queue, blk2);

    dispatch_async(queue, blk3);

    dispatch_async(queue, blk4);

    dispatch_async(queue, blk5);

    dispatch_async(queue, blk6);

    dispatch_async(queue, blk7);

    ```


    让我们来看看当变量 `queue` 是一个串行调度队列（它会等待当前运行的任务完成）时，它是如何工作的。


    #### 串行调度队列


    首先，`blk0` 启动。接着，`blk0` 完成后，`blk1` 启动。然后 `blk1` 完成后，`blk2` 启动，依此类推。每次只运行一个任务，这意味着结果总是相同的。这些块将按如下顺序执行：


    ```

    blk0

    blk1

    blk2

    blk3

    blk4

    blk5

    blk6

    blk7

    ```


    接下来，让我们看看当变量 `queue` 是一个并发调度队列（它不会等待正在运行的任务完成）时，它是如何工作的。

    '
- fmt: "#### Concurrent Dispatch Queue\n\nFirstly, `blk0` is started, and whether\
    \ it finishes or not, `blk1` is started, then regardless of whether `blk1` is\
    \ finished, `blk2` is started, and so on. It doesn't wait until the tasks are\
    \ finished and multiple tasks run concurrently, but please note that the number\
    \ of tasks running concurrently depends on the status of the current system; that\
    \ is, iOS or OS X decides the number based on the current system status, such\
    \ as how many tasks are in the dispatch queue, the number of CPU cores, or the\
    \ CPU usage level. The multiple tasks can run concurrently by using multiple threads\
    \ under the hood as shown in [Figure 7–3](#Chapter07.html#fig_7_3).\n\n![images](images/9781430241164_Fig07-03.jpg)\n\
    \n**Figure 7–3.** *Relationship of Serial Dispatch Queue, Concurrent Dispatch\
    \ Queue, and threads*\n\nThe XNU kernel, which is a core part of iOS and OS X,\
    \ decides the number of threads. It also creates threads to execute the tasks.\
    \ When a task is finished and the number of running tasks is decreased, the XNU\
    \ kernel terminates an unneeded thread. Just by using a concurrent dispatch queue,\
    \ the XNU kernel manages multiple threads perfectly to run tasks concurrently.\
    \ For instance, the source code is executed on multiple threads as in shown in\
    \ [Table 7–1](#Chapter07.html#tab_7_1).\n\n![images](images/t0701.jpg)\n\nLet's\
    \ assume that four threads are prepared for the concurrent dispatch queue. At\
    \ first, `blk0` is started on `thread0`. Next, `blk1` is started on `thread1`,\
    \ `blk2` on `thread2`, and `blk3` on `thread3`. Then, `blk4` is started on `thread0`\
    \ because `blk0` is finished. Next, `blk5` is started on `thread2` because `blk1`\
    \ is still running on `thread1` and `blk2` is finished on `thread2`.\n\nIn that\
    \ manner, when a concurrent dispatch queue is used, the execution order depends\
    \ on the tasks themselves, the system status, and so on. The order of the tasks\
    \ isn't constant as with a serial dispatch queue. You should use the serial dispatch\
    \ queue when the order is important or the tasks shouldn't be running concurrently.\n\
    \nNow we know that there are two types of dispatch queues, a serial dispatch queue\
    \ and a concurrent dispatch queue. How can we obtain these queues? You're about\
    \ to find out.\n\n### Obtaining Dispatch Queues\n\nThere are two ways to do that,\
    \ with `dispatch_queue_create` and `main dispatch queue` / `global dispatch queue`.\
    \ The following sections discuss both of these.\n\n#### dispatch_queue_create\n\
    \nThe `dispatch_queue_create` is a function for creating a dispatch queue. You\
    \ can obtain a new dispatch queue with this function. Next, the source code shows\
    \ how to create a serial dispatch queue. You can also create a concurrent dispatch\
    \ queue as well. I explain it later in this section.\n\n```\ndispatch_queue_t\
    \ mySerialDispatchQueue =\ndispatch_queue_create(\"com.example.gcd.MySerialDispatchQueue\"\
    , NULL);\n```\n\nWhen you create a serial dispatch queue, it is independent of\
