    “val” outside the Block is on the stack. When the __block variable is copied from
    the stack to the heap, the member variable “__forwarding” of the instance on the
    stack is modified to the address of the copied instance on the heap as shown in
    [Figure 5–9](#Chapter05.html#fig_5_9).


    ![images](images/9781430241164_Fig05-09.jpg)


    **Figure 5–9.** *Copying a __block variable*


    With this mechanism, we can access the same __block variable from anywhere, inside
    the Block literal or outside Block literal, no matter where the __block variable
    is on the stack or on the heap.'
  trans: '

    ### `__block` 变量的内存段


    在上一节中，我们只学习了 Block。那么 `__block` 变量呢？当 Block 使用了 `__block` 变量并从栈复制到堆时，`__block`
    变量会受到影响。表 5-3 对此进行了总结。


    ![images](img/t0503.jpg)


    当 Block 从栈复制到堆，并且它使用了 `__block` 变量，但其他 Block 未使用这些 `__block` 变量时，这些 `__block`
    变量必须在栈上。此时，所有 `__block` 变量也会从栈复制到堆，并且该 Block 拥有这些 `__block` 变量的所有权，如图 5-6 所示。


    当堆上的 Block 再次被复制时，`__block` 变量不会受到影响。


    ![images](img/9781430241164_Fig05-06.jpg)


    **图 5-6.** *一个 Block 使用 __block 变量*


    如果 `__block` 变量被多个 Block 使用会发生什么？起初，所有 Block 和 `__block` 变量都在栈上。当其中一个 Block 从栈复制到堆时，`__block`
    变量也会从栈复制到堆。并且该 Block 拥有这些变量的所有权。当另一个 Block 从栈复制到堆时，被复制的 Block 拥有这些 `__block` 变量的所有权（图
    5-7）。换句话说，`__block` 变量的引用计数会增加 1。


    ![images](img/9781430241164_Fig05-07.jpg)


    **图 5-7.** *多个 Block 使用一个 __block 变量*


    当堆上的 Block 被释放时，Block 中使用的 `__block` 变量也会被释放，如图 5-8 所示。


    ![images](img/9781430241164_Fig05-08.jpg)


    **图 5-8.** *Block 被释放，__block 变量也被释放*


    这个概念与 Objective-C 中基于引用计数的内存管理完全一致。当 Block 使用 `__block` 变量时，Block 拥有该变量的所有权。当
    Block 被释放时，所有权消失，`__block` 变量也被释放。


    现在我们已经了解了 `__block` 变量如何存储在应用程序内存中。接下来，让我们学习 `__forwarding`。


    ### `__forwarding`


    `__forwarding` 用于正确访问 `__block` 变量，正如我在“Block 的内存段”一节中所解释的。接下来，让我们检查当 Block 被复制到堆时它是如何工作的。


    我已经解释过，栈上实例的成员变量“`__forwarding`”会指向堆上实例的指针，这样无论变量在栈上还是堆上，都能被正确访问。


    当 Block 被复制时，`__block` 变量也会从栈复制到堆。在这种情况下，栈上和堆上的 `__block` 变量可能同时被访问。让我们看看下面的例子。


    ```

    __block int val = 0;


    void (^blk)(void) = [^{++val;} copy];


    ++val;


    blk();


    NSLog(@"%d", val);

    ```


    当使用 `__block` 变量的 Block 通过“copy”方法复制时，不仅 Block，`__block` 变量也会从栈复制到堆。


    让我们看看 `__block` 变量是在哪里使用的。初始化之后，它在 Block 字面量内部被使用。


    ```

    ^{++val;}

    ```


    在 Block 字面量之后，它也在 Block 外部被使用：


    ```

    ++val;

    ```


    这两个源代码都会被转换成如下形式。


    ```

    ++(val.__forwarding->val);

    ```


    在从 Block 字面量转换而来的函数中，变量“val”是堆上用于 `__block` 变量的结构体实例。Block 外部的另一个变量“val”则在栈上。当
    `__block` 变量从栈复制到堆时，栈上实例的成员变量“`__forwarding`”会被修改为堆上复制实例的地址，如图 5-9 所示。


    ![images](img/9781430241164_Fig05-09.jpg)


    **图 5-9.** *复制 __block 变量*


    通过这种机制，无论 `__block` 变量是在栈上还是堆上，我们都可以从任何地方（Block 字面量内部或 Block 字面量外部）访问同一个 `__block`
    变量。

