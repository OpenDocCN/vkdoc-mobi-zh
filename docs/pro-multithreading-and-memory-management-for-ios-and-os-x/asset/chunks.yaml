    \ size to store the object */\n    id new = NSZoneMalloc(zone, size);\n    memset(new,\
    \ 0, size);\n    new = (id)&((struct obj_layout *)new)[1];\n}\n```\n\n`NSAllocateObject`函数调用`NSZoneMalloc`来分配一个内存区域。之后，该区域被填充为零，并返回该区域的指针。\n\
    \n**注意：** 最初，`NSZone`用于防止内存碎片化（[Figure 1–7]）。通过在不同情况下切换区域，内存分配可以更有效。\n\n但如今，正如你在“Transition\
    \ to ARC Release Notes”中所看到的，Objective-C 运行时只是忽略了区域。因为近期的运行时内存管理算法已经足够有效，由于复杂性，使用区域被认为没有意义或不值得。\n\
