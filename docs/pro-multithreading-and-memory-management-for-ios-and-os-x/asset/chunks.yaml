    We can see Apple’s implementation of autorelease in runtime/objc-arr.mm in the
    objc4 library. The source code is shown in [Listing 1–13](#Chapter01.html#list_1_13).


    **Listing 1–13.** *objc4/runtime/objc-arr.mm class AutoreleasePoolPage*


    `class AutoreleasePoolPage`

    `{`

    `    static inline void *push()`

    `    {`

    `        /* It corresponds to creation and ownership of an NSAutoreleasePool object
    */`

    `    }`


    `    static inline void pop(void *token)`

    `    {`

    `        /* It corresponds to disposal of an NSAutoreleasePool object */`

    `        releaseAll();`

    `    }`


    `    static inline id autorelease(id obj)`

    `    {`

    `        /* It corresponds to NSAutoreleasePool class method addObject. */`

    `        AutoreleasePoolPage *autoreleasePoolPage = /* getting active AutoreleasePoolPage`

    `object */`

    `        autoreleasePoolPage->add(obj);`

    `    }`


    `    id *add(id obj)`

    `    {`

    `        /* add the obj to an internal array; */`

    `    }`


    `    void releaseAll()`

    `    {`

    `        /* calls release for all the objects in the internal array */`

    `    }`

    `};`


    `void *objc_autoreleasePoolPush(void)`

    `{`

    `    return AutoreleasePoolPage::push();`

    `}`


    `void objc_autoreleasePoolPop(void *ctxt)`

    `{`

    `    AutoreleasePoolPage::pop(ctxt);`

    `}`


    `id objc_autorelease(id obj)`

    `{`

    `    return AutoreleasePoolPage::autorelease(obj);`

    `}`


    The functions and the AutoreleasePoolPage class are implemented using a C++ class
    and a dynamic array. The functions seem to work the same as in GNUstep. As we
    did previously with the debugger, we investigate what functions are called in
    the autorelease and NSAutoreleasePool class methods. These methods will call objc4
    functions, which are related to autorelease:


    `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`

    `/* equivalent to objc_autoreleasePoolPush() */`


    `id obj = [[NSObject alloc] init];`


    `[obj autorelease];`

    `/* equivalent to objc_autorelease(obj)  */`


    `[pool drain];`

    `/* equivalent to objc_autoreleasePoolPop(pool) */`


    By the way, in iOS, the NSAutoreleasePool class has a method to check the status
    of autoreleased objects. The method, showPools, displays the current status of
    NSAutoreleasePool to the console. It can be used only for debugging purposes because
    it is a private method. You can use it as


    `[NSAutoreleasePool showPools];`


    With the latest Objective-C runtime, instead of the “showPools” method, `_objc_autoreleasePoolPrint()`
    is provided because “showPools” works in iOS only, This method is also a private
    method so you can use it for debugging purposes only.


    `/* declare function */`

    `extern void _objc_autoreleasePoolPrint();`


    `/* display autoreleasepool status for debug. */`

    `_objc_autoreleasePoolPrint();`


    Then you can see the status of AutoreleasePoolPage. The result is as follows.


    `objc[14481]: ##############`

    `objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0`

    `objc[14481]: 14 releases pending.`

    `objc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)`

    `objc[14481]: [0x6a85028]  ################  POOL 0x6a85028`

    `objc[14481]: [0x6a8502c]         0x6719e40  __NSCFString`

    `objc[14481]: [0x6a85030]  ################  POOL 0x6a85030`

    `objc[14481]: [0x6a85034]         0x7608100  __NSArrayI`

    `objc[14481]: [0x6a85038]         0x7609a60  __NSCFData`

    `objc[14481]: [0x6a8503c]  ################  POOL 0x6a8503c`

    `objc[14481]: [0x6a85040]         0x8808df0  __NSCFDictionary`

    `objc[14481]: [0x6a85044]         0x760ab50  NSConcreteValue`

    `objc[14481]: [0x6a85048]         0x760afe0  NSConcreteValue`

    `objc[14481]: [0x6a8504c]         0x760b280  NSConcreteValue`

    `objc[14481]: [0x6a85050]         0x760b2f0  __NSCFNumber`

    `objc[14481]: [0x6a851a8]  ################  POOL 0x6a851a8`

    `objc[14481]: [0x6a851ac]         0x741d1e0  Test`

    `objc[14481]: [0x6a851b0]         0x671c660  NSObject`

    `objc[14481]: ##############`


    It is very useful to know if some objects are autoreleased or not, as noted in
    the following sidebar.


    **AUTORELEASE NSAUTORELEASEPOOL OBJECT**


    Question: What will happen if “autorelease” is called on an NSAutoreleasePool
    object?


    `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`

    `[pool autorelease];`


    Answer: The application will be terminated.


    `*** Terminating app due to uncaught exception ''NSInvalidArgumentException''`

    `reason: ''*** -[NSAutoreleasePool autorelease]:`

    `Cannot autorelease an autorelease pool''`


    When autorelease is called in Objective-C with the Foundation framework, an NSObject
    instance method is called for in almost all the cases. However, the NSAutoreleasePool
    class overrides autorelease to show an error when autorelease is called on autoreleasepool.


    ### Summary


    You’ve learned the following in this chapter.


    *   The concept of memory management with reference counting

    *   How alloc, retain, release, and dealloc methods are implemented

    *   The mechanism of autorelease and its implementation


    These items are important and still applicable even if ARC is introduced. In the
    next chapter we learn how the situation will be change


    ## Chapter 2


    ## ARC Rules


    In the previous chapter, we reviewed memory management in Objective-C for a non-ARC
    environment. But what happens when ARC is enabled? This chapter explores the changes
    incurred when ARC is employed. Automatic Reference Counting was briefly explained
    in [Chapter 1](#Chapter01.html#ch1), but it is really best summarized in Apple’s
    own words:


    > *Automatic Reference Counting (ARC) in Objective-C makes memory management the
    job of the compiler. By enabling ARC with the new Apple LLVM compiler, you will
    never need to type retain or release again, dramatically simplifying the development
    process, while reducing crashes and memory leaks. The compiler has a complete
    understanding of your objects, and releases each object the instant it is no longer
    used, so apps run as fast as ever, with predictable, smooth performance.^([1](#Chapter02.html#CHP-2-FN-1))*


    First, we show the relationship of the reference counting rules with ARC, and
    we also learn the ownership specifiers one by one, which are newly introduced
    by ARC. Also ARC brings us new properties. And most important, we learn the rules
    to make your code ARC-friendly: by simply following the rules, you can write code
    for ARC with confidence.


    ### Overview


    Actually, reference counting is still used as the basis of ARC, but ARC helps
    the reference counting mechanism work automatically when you follow the rules
    that are explained in this chapter.


    In fact, we can enable or disable ARC for each compilable unit. For example, we
    can enable or disable ARC for each source file as shown in [Figure 2–1](#Chapter02.html#fig_2_1).


    __________


    ¹ Apple, “iOS 5 for developers,” [`http://developer.apple.com/technologies/ios5/`](http://developer.apple.com/technologies/ios5/)


    ![images](images/9781430241164_Fig02-01.jpg)


    **Figure 2–1.** *Enabling or disabling ARC for each source file in one application*


    In summary, the most important part of ARC is that you, the programmer, no longer
    need to call “retain” or “release.” Under the following conditions, your source
    code will be automatically compiled with ARC enabled:


    *   clang(LLVM compiler) 3.0 and newer

    *   Compile option –fobjc-arc


    Clang is the default compiler and the –fobjc-arc option is set as the default
    in Xcode 4.2\. Therefore, when you work in Xcode 4.2, you don’t need to do anything
    special.


    From here, all the source codes are for an ARC-enabled environment. We have the
    comment `/* non-ARC */` if the source code is for a non-ARC environment. In the
    next section, we show how the reference counting mechanism is changed when ARC
    is enabled.'
