    and “dispose”, which are added in __main_block_desc_0 struct.


    ### Memory Segments for Blocks


    In the previous sections, we’ve learned that a Block is implemented as an automatic
    variable of a struct, and the struct is generated for the Block. Also __block
    variable is implemented as an automatic variable of a struct, and the struct is
    generated for the __block variable. Because they are implemented as automatic
    variables of a struct, the instances are created on the stack as shown in [Table
    5–1](#Chapter05.html#tab_5_1).


    ![images](images/t0501.jpg)


    Also, in previous sections, we’ve learned that a Block is an Objective-C object
    as well. If we see a Block as an object of Objective-C, its class is _NSConcreteStackBlock.
    Although not covered earlier, there are similar classes to the _NSConcreteStackBlock:


    *   _NSConcreteStackBlock

    *   _NSConcreteGlobalBlock

    *   _NSConcreteMallocBlock


    At first, you might notice that the _NSConcreteStackBlock class has “stack” in
    its name, meaning that objects of this class exist on the stack. Also, objects
    of the _NSConcreteGlobalBlock class are, as the class name “global” shows, stored
    in the data section as are global variables as shown in [Figure 5–3](#Chapter05.html#fig_5_3).


    Objects of the _NSConcreteMallocBlock class are, as you can guess from the name,
    stored on the heap, like memory blocks, which are allocated by the “malloc” function.


    ![images](images/9781430241164_Fig05-03.jpg)


    **Figure 5–3.** *Memory segments for Blocks*'
  trans: "\n# 排版后的文档\n\n如我们在初始化部分所见，结构体 `\"val\"` 中的最后一个成员变量，如其名所示，存储了原始的自动变量。\n\n\
    `__block` 变量的赋值是如何工作的？\n\n```\n^{val = 1;}\n```\n\n这段源代码被转换如下：\n\n```\nstatic\
    \ void __main_block_func_0(struct __main_block_impl_0 *__cself)\n{\n    __Block_byref_val_0\
    \ *val = __cself->val;\n    (val->__forwarding->val) = 1;\n}\n```\n\n如我们所学，要从\
    \ Block 中赋值给静态变量，需要使用指向该静态变量的指针。然而，赋值给 `__block` 变量则更为复杂。用于 Block 的 `__main_block_impl_0`\
    \ 结构体实例包含一个指针，指向用于 `__block` 变量的 `__Block_byref_val_0` 结构体实例。\n\n`__Block_byref_val_0`\
    \ 结构体的实例在成员变量 `\"__forwarding\"` 中保存了一个指向自身结构体实例的指针。通过该 `\"__forwarding\"` 成员变量，可以访问到与原始自动变量对应的成员变量\
    \ `\"val\"`（见图 5-2）。\n\n![images](img/9781430241164_Fig05-02.jpg)\n\n**图 5-2.**\
    \ *访问 __block 变量*\n\n我们稍后会回到 `\"forwarding\"` 这个话题。它将在接下来的两节——“Block 的内存段”和“`__block`\
    \ 变量的内存段”中进一步解释。现在，我们先来看一下 `__Block_byref_val_0` 结构体中那些不在 `__main_block_impl_0`\
    \ 结构体里的成员变量。`__Block_byref_val_0` 结构体被分离出来的原因是为了让 `__block` 变量能被多个 Block 使用。请看下面的例子：\n\
    \n```\n__block int val = 10;\n\nvoid (^blk0)(void) = ^{val = 0;};\n\nvoid (^blk1)(void)\
    \ = ^{val = 1;};\n```\n\nBlock 类型的变量 `\"blk0\"` 和 `\"blk1\"` 都访问了 `__block` 变量\
    \ `\"val\"`。它被转换为：\n\n```\n__Block_byref_val_0 val = {0, &val, 0, sizeof(__Block_byref_val_0),\
    \ 10};\n\nblk0 = &__main_block_impl_0(\n    __main_block_func_0, &__main_block_desc_0_DATA,\
    \ &val, 0x22000000);\n\nblk1 = &__main_block_impl_1(\n    __main_block_func_1,\
    \ &__main_block_desc_1_DATA, &val, 0x22000000);\n```\n\n两个 Block 都使用了指向同一个 `__Block_byref_val_0`\
    \ 结构体实例 `\"val\"` 的指针，这意味着多个 Block 可以共享同一个 `__block` 变量。另一方面，一个 Block 也可以共享多个\
    \ `__block` 变量。多个 `__block` 变量可以通过在 Block 的结构体中添加成员变量，并在构造函数中增加参数来实现。\n\n至此，我们几乎已经学习了关于\
    \ `__block` 变量的全部内容。在下一节中，我们将学习之前跳过的话题：\n\n- 为什么 Block 不能超越其变量作用域而存在？\n- 用于 `__block`\
    \ 变量的结构体中的 `\"__forwarding\"` 成员变量存在的目的是什么？\n\n另外，在“捕获对象”一节中，我将解释 `__main_block_desc_0`\
    \ 结构体中新增的成员变量 `\"copy\"` 和 `\"dispose\"`。\n\n### Block 的内存段\n\n在前面的小节中，我们了解到 Block\
    \ 被实现为结构体的自动变量，并且会为该 Block 生成相应的结构体。同样，`__block` 变量也被实现为结构体的自动变量，并会为该 `__block`\
    \ 变量生成相应的结构体。由于它们都被实现为结构体的自动变量，其实例创建在栈上，如表 5-1 所示。\n\n![images](img/t0501.jpg)\n\
    \n此外，在前面的小节中，我们还了解到 Block 本身也是一个 Objective-C 对象。如果将 Block 视为 Objective-C 的对象，它的类是\
    \ `_NSConcreteStackBlock`。虽然之前没有提到，但还有几个与 `_NSConcreteStackBlock` 类似的类：\n\n- `_NSConcreteStackBlock`\n\
    - `_NSConcreteGlobalBlock`\n- `_NSConcreteMallocBlock`\n\n首先你可能会注意到 `_NSConcreteStackBlock`\
    \ 类名中带有“stack”（栈），这意味着该类的对象存在于栈上。同时，`_NSConcreteGlobalBlock` 类的对象，如其类名中的“global”（全局）所示，与全局变量一样存储在数据段中，如图\
    \ 5-3 所示。\n\n`_NSConcreteMallocBlock` 类的对象，你可以从其名称猜出，存储在堆上，就像通过 `\"malloc\"` 函数分配的内存块一样。\n\
    \n![images](img/9781430241164_Fig05-03.jpg)\n\n**图 5-3.** *Block 的内存段*\n"
- fmt: "### A Block as `NSConcreteGlobalBlock` Class Object\n\nThe `_NSConcreteStackBlock`\
    \ class is used for all the Blocks in the previous examples; that is, all the\
    \ Blocks are stored on a stack. In the following I explain how the other class\
    \ types are used.\n\nFirst, when a Block literal is written where a global variable\
    \ is, the Block is created as a `_NSConcreteGlobalBlock` class object. Let’s see\
    \ an example.\n\n```\nvoid (^blk)(void) = ^{printf(\"Global Block\\n\");};\n```\n\
    \n```\nint main()\n{\n```\n\nIn this source code, the Block literal is written\
    \ with a global variable declaration. When it is converted, it becomes similar\
    \ to the previous example in the section, “Under the Block’s Hood,” except that\
    \ a member variable `isa` in the struct for the Block is initialized as follows.\n\
    \n```\nimpl.isa = &_NSConcreteGlobalBlock;\n```\n\nSo, the class of this Block\
    \ is `_NSConcreteGlobalBlock`, which means that an instance of a struct for the\
    \ Block is stored in the data section. Because automatic variables can’t exist\
    \ where the global variables are declared, capturing never happens. In other words,\
    \ the member variables of the instance for the Block don’t rely on the execution\
    \ context. One instance is enough in one application and the instance is stored\
    \ in the data section as are global variables.\n\nAn instance of the struct for\
    \ a Block is modified only when it captures automatic variables. For instance,\
    \ in the following source code, a Block is used many times, but the automatic\
    \ variable is changed and captured in every for-loop.\n\n```\ntypedef int (^blk_t)(int);\n\
    \nfor (int rate = 0; rate < 10; ++rate) {\n    blk_t blk = ^(int count){return\
    \ rate * count;};\n}\n```\n\nThe instances of the struct for the Block are different\
    \ for each for-loop because they capture the automatic variable. But, if the Block\
    \ doesn’t capture any variables, the instance of the struct for the Block is the\
    \ same:\n\n```\ntypedef int (^blk_t)(int);\n\nfor (int rate = 0; rate < 10; ++rate)\
    \ {\n    blk_t blk = ^(int count){return count;};\n}\n```\n\nThe instance of the\
    \ struct for the Block is stored in the data section of the program not only when\
    \ Block is used where there are global variables, but also when a Block literal\
    \ is inside a function and doesn’t capture any automatic variables.\n\nIn the\
    \ converted source code with clang, `_NSConcreteStackBlock` class is always used,\
    \ but the implementation is different. We can summarize it as follows.\n\n- When\
    \ a Block literal is written where there are global variables\n- When the syntax\
    \ in a Block literal doesn’t use any automatic variables to be captured\n\nIn\
    \ these cases, the Block will be a `_NSConcreteGlobalBlock` class object and is\
    \ stored in the data section. Any Block created by another kind of Block literal\
    \ will be an object of the `_NSConcreteStackBlock` class, and be stored on the\
    \ stack.\n\nWhen is the `_NSConcreteMallocBlock` class used and the Block stored\
    \ on the heap? This is the exact answer for the questions in the previous section.\n\
    \n- Why can’t a Block exist beyond a variable scope?\n- Why does a member variable\
    \ `__forwarding` of a struct for `__block` variables exist?\n\nA Block, which\
    \ is stored in the data section like global variables, can be accessed safely\
    \ via pointers outside any variable scopes. But the other Blocks, which are stored\
    \ on the stack, will be disposed of after the scope of the Block is left. And\
    \ `__block` variables are stored on the stack as well, so the `__block` variables\
    \ will be disposed of when the scope is left (Figure 5–4).\n\n![images](images/9781430241164_Fig05-04.jpg)\n\
    \n**Figure 5–4.** *A Block and a `__block` variable on the stack*\n\nTo solve\
    \ this problem, Blocks provides a functionality to copy a Block or a `__block`\
    \ variable from the stack to the heap. Next, we learn how a Block is copied to\
    \ the heap.\n\n### Block on the Heap\n\nAs we’ve learned, a Block can be copied\
    \ to the heap. By copying the Block, the copied Block on the heap can exist even\
    \ after the scope is left as shown in Figure 5–5. Let’s see what tricks there\
    \ are to having the Block work properly.\n\n![images](images/9781430241164_Fig05-05.jpg)\n\
    \n**Figure 5–5.** *A Block and `__block` copied from the stack to the heap*\n\n\
    The member variable `isa` of the struct for the copied Block on the heap is overwritten\
    \ so that the Block becomes a `_NSConcreteMallocBlock` class object.\n\n```\n\
    impl.isa = &_NSConcreteMallocBlock;\n```\n\nMeanwhile, a `__block` variable must\
    \ be accessed properly no matter where it is on the stack or the heap. The member\
    \ variable `__forwarding` in the struct for a `__block` variable is used for that.\n\
    \nEven if a `__block` variable has been copied to the heap, the `__block` variable\
    \ on the stack is still accessed in some cases. Because the member variable `__forwarding`\
    \ of the instance on the stack points to the instance on the heap, regardless\
    \ of where the `__block` variable is on the stack or heap, it is accessed properly.\
    \ I explain this again in the section, “Memory Segments for __Block Variables.”\n\
    \n### Copying Blocks Automatically\n\nBy the way, how do Blocks offer copy functionality?\
    \ To tell the truth, when ARC-enabled, in many cases the compiler automatically\
    \ detects and copies the Block from the stack to the heap. Let’s see the next\
    \ example, which calls a function returning a Block.\n\n```\ntypedef int (^blk_t)(int);\n\
    \nblk_t func(int rate)\n{\n    return ^(int count){return rate * count;};\n}\n\
    ```\n\nA function returns a Block, which is stored on the stack; that is, when\
    \ the control flow returns to the caller, the variable scope is left and the Block\
    \ on the stack is disposed of. It looks problematic. Let’s check how it is converted\
    \ when ARC is enabled.\n\n```\nblk_t func(int rate)\n{\n    blk_t tmp = &__func_block_impl_0(\n\
    \        __func_block_func_0, &__func_block_desc_0_DATA, rate);\n\n    tmp = objc_retainBlock(tmp);\n\
    \n    return objc_autoreleaseReturnValue(tmp);\n}\n```\n\nBecause ARC is enabled,\
    \ `blk_ttmp` is same as `blk_t __strong tmp`, which means the variable is qualified\
    \ with `__strong`.\n\nIf you’d read the source code `runtime/objc-arr.mm` in the\
    \ objc4 runtime library, you saw that `objc_retainBlock` function is equivalent\
    \ to `_Block_copy` function. So, the above source code is equivalent to:\n\n```\n\
    tmp = _Block_copy(tmp);\nreturn objc_autoreleaseReturnValue(tmp);\n```\n\nLet’s\
    \ see what happens with comments:\n\n```\n/*\n * a Block is assigned from a Block\
    \ literal to a variable 'tmp',\n * which means, the variable has the instance\
    \ of struct for the Block on the stack.\n * Block_copy function copies the Block\
    \ from the stack to the heap.\n * After it is copied, its address on the heap\
    \ is assigned to the variable 'tmp'.\n */\n\ntmp = _Block_copy(tmp);\n\n/*\n *\
    \ Then, the Block on the heap is registered to an autoreleasepool as an Objective-C\n\
    \ * object.\n * After that, the Block is returned.\n */\n\nreturn objc_autoreleaseReturnValue(tmp);\n\
    ```\n\nThis means when the function returns the Block, the compiler automatically\
    \ copies it to the heap."
  raw: '#### A Block as NSConcreteGlobalBlock Class Object


    The _NSConcreteStackBlock class is used for all the Blocks in the previous examples;
    that is, all the Blocks are stored on a stack. In the following I explain how
    the other class types are used.


    First, when a Block literal is written where a global variable is, the Block is
    created as a _NSConcreteGlobalBlock class object. Let’s see an example.


    `void (^blk)(void) = ^{printf("Global Block\n");};`


    `int main()`

    `{`


    In this source code, the Block literal is written with a global variable declaration.
    When it is converted, it becomes similar to the previous example in the section,
    “Under the Block’s Hood,” except that a member variable “isa” in the struct for
    the Block is initialized as follows.


    `impl.isa = &_NSConcreteGlobalBlock;`


    So, the class of this Block is _NSConcreteGlobalBlock, which means that an instance
    of a struct for the Block is stored in the data section. Because automatic variables
    can’t exist where the global variables are declared, capturing never happens.
    In other words, the member variables of the instance for the Block don’t rely
    on the execution context. One instance is enough in one application and the instance
    is stored in the data section as are global variables.


    An instance of the struct for a Block is modified only when it captures automatic
    variables. For instance, in the following source code, a Block is used many times,
    but the automatic variable is changed and captured in every for-loop.


    `typedef int (^blk_t)(int);`


    `for (int rate = 0; rate < 10; ++rate) {`

    `    blk_t blk = ^(int count){return rate * count;};`

    `}`


    The instances of the struct for the Block are different for each for-loop because
    they capture the automatic variable. But, if the Block doesn’t capture any variables,
    the instance of the struct for the Block is the same:


    `typedef int (^blk_t)(int);`


    `for (int rate = 0; rate < 10; ++rate) {`

    `    blk_t blk = ^(int count){return count;};`

    `}`


    The instance of the struct for the Block is stored in the data section of the
    program not only when Block is used where there are global variables, but also
    when a Block literal is inside a function and doesn’t capture any automatic variables.


    In the converted source code with clang, _NSConcreteStackBlock class is always
    used, but the implementation is different. We can summarize it as follows.


    *   When a Block literal is written where there are global variables

    *   When the syntax in a Block literal doesn’t use any automatic variables to
    be captured


    In these cases, the Block will be a _NSConcreteGlobalBlock class object and is
    stored in the data section. Any Block created by another kind of Block literal
    will be an object of the _NSConcreteStackBlock class, and be stored on the stack.


    When is the _NSConcreteMallocBlock class used and the Block stored on the heap?
    This is the exact answer for the questions in the previous section.


    *   Why can’t a Block exist beyond a variable scope?

    *   Why does a member variable “__forwarding” of a struct for __block variables
    exist?


    A Block, which is stored in the data section like global variables, can be accessed
    safely via pointers outside any variable scopes. But the other Blocks, which are
    stored on the stack, will be disposed of after the scope of the Block is left.
    And __block variables are stored on the stack as well, so the __block variables
    will be disposed of when the scope is left ([Figure 5–4](#Chapter05.html#fig_5_4)).


    ![images](images/9781430241164_Fig05-04.jpg)


    **Figure 5–4.** *A Block and a __block variable on the stack*


    To solve this problem, Blocks provides a functionality to copy a Block or a __block
    variable from the stack to the heap. Next, we learn how a Block is copied to the
    heap.


    #### Block on the Heap


    As we’ve learned, a Block can be copied to the heap. By copying the Block, the
    copied Block on the heap can exist even after the scope is left as shown in [Figure
    5–5](#Chapter05.html#fig_5_5). Let’s see what tricks there are to having the Block
    work properly.


    ![images](images/9781430241164_Fig05-05.jpg)


    **Figure 5–5.** *A Block and __block copied from the stack to the heap*


    The member variable “isa” of the struct for the copied Block on the heap is overwritten
    so that the Block becomes a _NSConcreteMallocBlock class object.


    `impl.isa = &_NSConcreteMallocBlock;`


    Meanwhile, a __block variable must be accessed properly no matter where it is
    on the stack or the heap. The member variable “__forwarding” in the struct for
    a __block variable is used for that.


    Even if a __block variable has been copied to the heap, the __block variable on
    the stack is still accessed in some cases. Because the member variable “__forwarding”
    of the instance on the stack points to the instance on the heap, regardless of
    where the __block variable is on the stack or heap, it is accessed properly. I
    explain this again in the section, “Memory Segments for __Block Variables.”


    #### Copying Blocks Automatically


    By the way, how do Blocks offer copy functionality? To tell the truth, when ARC-enabled,
    in many cases the compiler automatically detects and copies the Block from the
    stack to the heap. Let’s see the next example, which calls a function returning
    a Block.


    `typedef int (^blk_t)(int);`


    `blk_t func(int rate)`

    `{`

    `    return ^(int count){return rate * count;};`

    `}`


    A function returns a Block, which is stored on the stack; that is, when the control
    flow returns to the caller, the variable scope is left and the Block on the stack
    is disposed of. It looks problematic. Let’s check how it is converted when ARC
    is enabled.


    `blk_t func(int rate)`

    `{`

    `    blk_t tmp = &__func_block_impl_0(`

    `        __func_block_func_0, &__func_block_desc_0_DATA, rate);`


    `    tmp = objc_retainBlock(tmp);`


    `    return objc_autoreleaseReturnValue(tmp);`

    `}`


    Because ARC is enabled, “blk_ttmp” is same as “blk_t __strong tmp”, which means
    the variable is qualified with __strong.


    If you’d read the source code runtime/objc-arr.mm in the objc4 runtime library,
    you saw that objc_retainBlock function is equivalent to _Block_copy function.
    So, the above source code is equivalent to:


    `tmp = _Block_copy(tmp);`


    `return objc_autoreleaseReturnValue(tmp);`


    Let’s see what happens with comments:


    ` /*`

    `  * a Block is assigned from a Block literal to a variable ''tmp'',`

    `  * which means, the variable has the instance of struct for the Block on the
    stack.`

    `  * Block_copy function copies the Block from the stack to the heap.`

    `  * After it is copied, its address on the heap is assigned to the variable ''tmp''.`

    `  */`


    `tmp = _Block_copy(tmp);`


    ` /*`

    `  * Then, the Block on the heap is registered to an autoreleasepool as an Objective-C`

    `object.`

    `  * After that, the Block is returned.`

    `  */`


    `return objc_autoreleaseReturnValue(tmp);`


    This means when the function returns the Block, the compiler automatically copies
    it to the heap.'
  trans: "\n### 作为 `NSConcreteGlobalBlock` 类对象的块\n\n前述示例中的块均使用了 `_NSConcreteStackBlock`\
    \ 类；也就是说，所有块都存储在栈上。接下来，我将说明其他类类型的使用方式。\n\n首先，当块字面量写在全局变量位置时，该块会被创建为 `_NSConcreteGlobalBlock`\
    \ 类对象。来看一个示例。\n\n```\nvoid (^blk)(void) = ^{printf(\"Global Block\\n\");};\n```\n\
    \n```\nint main()\n{\n```\n\n在这段源代码中，块字面量是作为全局变量声明编写的。当它被转换时，其处理方式类似于“揭开块的面纱”一节中的示例，唯一的区别是块结构体中的成员变量\
    \ `isa` 会按如下方式初始化。\n\n```\nimpl.isa = &_NSConcreteGlobalBlock;\n```\n\n因此，这个块的类是\
    \ `_NSConcreteGlobalBlock`，这意味着块的结构体实例存储在数据段中。由于全局变量声明处不可能存在自动变量，所以不会发生捕获。换句话说，块实例的成员变量不依赖于执行上下文。一个应用程序中只需一个实例，该实例与全局变量一样存储在数据段中。\n\
    \n块的结构体实例仅在捕获自动变量时才会被修改。例如，下面的源代码多次使用了同一个块，但在每次 for 循环中自动变量都会被改变并被捕获。\n\n```\n\
    typedef int (^blk_t)(int);\n\nfor (int rate = 0; rate < 10; ++rate) {\n    blk_t\
    \ blk = ^(int count){return rate * count;};\n}\n```\n\n由于每次 for 循环捕获的自动变量不同，块的结构体实例也各不相同。但如果块不捕获任何变量，块的结构体实例则是相同的：\n\
    \n```\ntypedef int (^blk_t)(int);\n\nfor (int rate = 0; rate < 10; ++rate) {\n\
    \    blk_t blk = ^(int count){return count;};\n}\n```\n\n不仅当块位于全局变量处时，其结构体实例存储在程序的数据段中；当块字面量位于函数内部且不捕获任何自动变量时，也是如此。\n\
    \n在使用 clang 转换的源代码中，虽然总是使用 `_NSConcreteStackBlock` 类，但具体实现有所不同。我们可以总结如下。\n\n-\
    \ 当块字面量写在全局变量处时\n- 当块字面量中的语法未使用任何需要捕获的自动变量时\n\n在这两种情况下，该块将是 `_NSConcreteGlobalBlock`\
    \ 类对象，并存储在数据段中。任何由其他类型的块字面量创建的块都将是 `_NSConcreteStackBlock` 类的对象，并存储在栈上。\n\n`_NSConcreteMallocBlock`\
    \ 类在何时使用，块又在何时存储在堆上？这正好回答了前一节提出的问题。\n\n- 为什么块不能存在于变量作用域之外？\n- 为什么 `__block` 变量的结构体中存在成员变量\
    \ `__forwarding`？\n\n像全局变量一样存储在数据段中的块，可以在任何变量作用域之外通过指针安全地访问。但其他存储在栈上的块，在离开块的作用域后就会被销毁。同样，`__block`\
    \ 变量也存储在栈上，因此当离开作用域时，`__block` 变量也会被销毁（图 5-4）。\n\n![images](img/9781430241164_Fig05-04.jpg)\n\
    \n**图 5–4.** *栈上的块和 `__block` 变量*\n\n为了解决这个问题，块提供了一种将块或 `__block` 变量从栈复制到堆的功能。接下来，我们将学习块是如何被复制到堆上的。\n\
    \n### 堆上的块\n\n正如我们所学，块可以被复制到堆上。通过复制块，复制到堆上的块即使在离开作用域后也能继续存在，如图 5-5 所示。让我们看看让块正常工作的技巧是什么。\n\
    \n![images](img/9781430241164_Fig05-05.jpg)\n\n**图 5–5.** *从栈复制到堆的块和 `__block`\
    \ 变量*\n\n复制到堆上的块的结构体中的成员变量 `isa` 会被重写，使得该块成为 `_NSConcreteMallocBlock` 类对象。\n\n\
    ```\nimpl.isa = &_NSConcreteMallocBlock;\n```\n\n同时，无论 `__block` 变量位于栈还是堆上，都必须能被正确访问。这用到了\
    \ `__block` 变量结构体中的成员变量 `__forwarding`。\n\n即使 `__block` 变量已被复制到堆上，在某些情况下仍可能访问栈上的\
    \ `__block` 变量。由于栈上实例的成员变量 `__forwarding` 指向堆上的实例，因此无论 `__block` 变量位于栈还是堆上，都能被正确访问。我将在“`__Block`\
    \ 变量的内存段”一节中再次解释这一点。\n\n### 自动复制块\n\n那么，块是如何提供复制功能的呢？事实上，在启用 ARC 的情况下，编译器在许多情况下会自动检测并将块从栈复制到堆。来看下一个示例，该示例调用了一个返回块的函数。\n\
    \n```\ntypedef int (^blk_t)(int);\n\nblk_t func(int rate)\n{\n    return ^(int\
    \ count){return rate * count;};\n}\n```\n\n函数返回一个存储在栈上的块；也就是说，当控制流返回给调用者时，变量作用域被离开，栈上的块被销毁。这看起来有问题。让我们检查一下在启用\
    \ ARC 时它是如何被转换的。\n\n```\nblk_t func(int rate)\n{\n    blk_t tmp = &__func_block_impl_0(\n\
    \        __func_block_func_0, &__func_block_desc_0_DATA, rate);\n\n    tmp = objc_retainBlock(tmp);\n\
    \n    return objc_autoreleaseReturnValue(tmp);\n}\n```\n\n由于启用了 ARC，`blk_ttmp`\
    \ 等同于 `blk_t __strong tmp`，这意味着该变量被 `__strong` 修饰。\n\n如果你阅读过 objc4 运行时库中的源代码 `runtime/objc-arr.mm`，你会发现\
    \ `objc_retainBlock` 函数等同于 `_Block_copy` 函数。因此，上述源代码等同于：\n\n```\ntmp = _Block_copy(tmp);\n\
    return objc_autoreleaseReturnValue(tmp);\n```\n\n让我们通过注释来了解发生了什么：\n\n```\n/*\n\
    \ * 将块从字面量赋值给变量 'tmp'，\n * 这意味着该变量持有栈上块的结构体实例。\n * Block_copy 函数将块从栈复制到堆。\n *\
    \ 复制后，堆上的地址被赋值给变量 'tmp'。\n */\n\ntmp = _Block_copy(tmp);\n\n/*\n * 然后，堆上的块作为 Objective-C\
    \ 对象注册到自动释放池中。\n * 之后，该块被返回。\n */\n\nreturn objc_autoreleaseReturnValue(tmp);\n\
    ```\n\n这意味着当函数返回块时，编译器会自动将其复制到堆上。\n"
- fmt: "### Coping Blocks Manually\n\nI’ve stated that “in many cases, the compiler\
    \ automatically detects.” When it doesn’t detect, you have to copy the Block from\
    \ the stack to the heap manually. To do that, you use an instance method `copy`.\
    \ The `copy` method, which we’ve seen many times in Part I, is in the alloc/new/copy/mutableCopy\
    \ method group. In what situation can’t the compiler detect it?\n\nThe answer\
    \ is:\n\n- When a Block is passed as an argument for methods or functions\n\n\
    But if the method or the function copies the argument inside, the caller doesn’t\
    \ need to copy it manually as\n\n- Cocoa Framework methods, the name of which\
    \ includes `usingBlock`\n- Grand Central Dispatch API\n\nFor example, you don’t\
    \ need to copy when you use the `NSArray` instance method `enumerateObjectsUsingBlock`\
    \ or `dispatch_async` function. On the contrary, you need to copy a Block when\
    \ you pass it to an `NSArray` class instance method `initWithObjects`. Let’s see\
    \ that with an example.\n\n```\n- (id) getBlockArray\n{\n    int val = 10;\n\n\
    \    return [[NSArray alloc] initWithObjects:\n        ^{NSLog(@\"blk0:%d\", val);},\n\
    \        ^{NSLog(@\"blk1:%d\", val);}, nil];\n}\n```\n\nThe `getBlockArray` method\
    \ creates two Blocks on the stack and it passes them to the `NSArray` class instance\
    \ method `initWithObjects`. What happens when the Block is executed in the caller\
    \ after the Block is obtained from the `NSArray` object?\n\n```\nid obj = getBlockArray();\n\
    \ntypedef void (^blk_t)(void);\n\nblk_t blk = (blk_t)[obj objectAtIndex:0];\n\n\
    blk();\n```\n\nThe application crashes where `blk()` is executed. In other words,\
    \ Block execution throws an exception. After returning from the `getBlockArray`\
    \ function, the Block on the stack has been destroyed. In this case, unfortunately,\
    \ the compiler can’t detect whether a copy is needed. Although the compiler could\
    \ copy all the Blocks every time without detecting if a copy is needed, it consumes\
    \ too many CPU resources when a Block is copied from the stack to the heap. If\
    \ a Block on the stack is enough and still copied to the heap, CPU power is just\
    \ being used for nothing. So, the compiler doesn’t do that. But, instead, sometimes\
    \ you have to copy a Block manually.\n\nThe source code will work after some modifications\
    \ as follows.\n\n```\n- (id) getBlockArray\n{\n    int val = 10;\n\n    return\
    \ [[NSArray alloc] initWithObjects:\n        [^{NSLog(@\"blk0:%d\", val);} copy],\n\
    \        [^{NSLog(@\"blk1:%d\", val);} copy], nil];\n}\n```\n\nIt looks a bit\
    \ strange, but the `copy` method can be called on a Block literal directly. Of\
    \ course you can call the `copy` method through a Block type variable.\n\n```\n\
    typedef int (^blk_t)(int);\n\nblk_t blk = ^(int count){return rate * count;};\n\
    \nblk = [blk copy];\n```\n\nBy the way, what will happen if the `copy` method\
    \ is called on a Block on the heap or on a data section? [Table 5–2](#Chapter05.html#tab_5_2)\
    \ summarizes them.\n\n![images](images/t0502.jpg)\n\nNo matter where the Block\
    \ is stored, nothing bad happens by calling the `copy` method. If you are not\
