    \ same time, would start executing simultaneously as shown in [Figure 7–4](#Chapter07.html#fig_7_4).\n\
    \n![images](images/9781430241164_Fig07-04.jpg)\n\n**Figure 7–4.** *Multiple Serial\
    \ Dispatch Queues*\n\nWe must know one thing related to that. When a serial dispatch\
