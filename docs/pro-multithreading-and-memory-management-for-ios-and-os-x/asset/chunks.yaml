- fmt: "### Capturing Objects\n\nWe saw examples using integer variables. Next, let’s\
    \ see what will happen when an object is used from a Block. In the next source\
    \ code, an object of the `NSMutableArray` class is created and the assigned variable\
    \ has ownership of it. Because the scope of the variable, which qualified with\
    \ `__strong`, is left immediately, the object is released and discarded.\n\n```\n\
    {\n    id array = [[NSMutableArray alloc] init];\n}\n```\n\n[Listing 5–7](#Chapter05.html#list_5_7)\
    \ uses the variable `array` in a Block literal.\n\n**Listing 5–7.** *Capturing\
    \ an object*\n\n```\nblk_t blk;\n{\n    id array = [[NSMutableArray alloc] init];\n\
    \    blk = [^(id obj) {\n        [array addObject:obj];\n        NSLog(@\"array\
    \ count = %ld\", [array count]);\n    } copy];\n}\nblk([[NSObject alloc] init]);\n\
    blk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\n```\n\nBecause the\
    \ strong reference of variable `array` disappears, the `NSMutableArray` class\
    \ object, which is assigned to the variable `array`, must be released and discarded.\
    \ But the result shows that it works without any problem.\n\n```\narray count\
    \ = 1\narray count = 2\narray count = 3\n```\n\nThis means that in the last part\
    \ of the source code, where the Block is executed, the object of `NSMutableArray`\
    \ class, which is assigned to the variable `array`, exists even after the variable\
    \ scope is finished. The source code is converted as shown in [Listing 5–8](#Chapter05.html#list_5_8).\n\
    \n**Listing 5–8.** *Converted source code of [Listing 5–7](#Chapter05.html#list_5_7)*\n\
    \n```\n/* a struct for the Block and some functions */\n\nstruct __main_block_impl_0\
    \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n  \
    \  id __strong array;\n    __main_block_impl_0(void *fp, struct __main_block_desc_0\
    \ *desc,\n    id __strong _array, int flags=0) : array(_array) {\n        impl.isa\
    \ = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n        impl.FuncPtr\
    \ = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself, id obj)\n{\n    id __strong array = __cself->array;\n\
    \    [array addObject:obj];\n    NSLog(@\"array count = %ld\", [array count]);\n\
    }\n\nstatic void __main_block_copy_0(struct __main_block_impl_0 *dst,        \
    \ struct\n__main_block_impl_0 *src)\n{\n    _Block_object_assign(&dst->array,\
    \ src->array, BLOCK_FIELD_IS_OBJECT);\n}\n\nstatic void __main_block_dispose_0(struct\
    \ __main_block_impl_0 *src)\n{\n    _Block_object_dispose(src->array, BLOCK_FIELD_IS_OBJECT);\n\
    }\n\nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned\
    \ long Block_size;\n    void (*copy)(struct __main_block_impl_0*, struct __main_block_impl_0*);\n\
    \    void (*dispose)(struct __main_block_impl_0*);\n} __main_block_desc_0_DATA\
    \ = {\n    0,\n    sizeof(struct __main_block_impl_0),\n    __main_block_copy_0,\n\
    \    __main_block_dispose_0\n};\n\n/* Block literal and executing the Block */\n\
    \nblk_t blk;\n{\n    id __strong array = [[NSMutableArray alloc] init];\n\n  \
    \  blk = &__main_block_impl_0(\n        __main_block_func_0, &__main_block_desc_0_DATA,\
    \ array, 0x22000000);\n    blk = [blk copy];\n}\n\n(*blk->impl.FuncPtr)(blk, [[NSObject\
    \ alloc] init]);\n(*blk->impl.FuncPtr)(blk, [[NSObject alloc] init]);\n(*blk->impl.FuncPtr)(blk,\
    \ [[NSObject alloc] init]);\n```\n\nPlease pay attention to the captured automatic\
    \ variable `array` which stores the object of the `NSMutableArray` class. You\
    \ can see that the struct for the Block has a member variable `array` with `__strong`\
    \ ownership qualifier.\n\n```\nstruct __main_block_impl_0 {\n    struct __block_impl\
    \ impl;\n    struct __main_block_desc_0* Desc;\n    id __strong array;\n};\n```\n\
    \nIn Objective-C, the C struct cannot have member variables that are qualified\
    \ with `__strong` as we learned in [Chapter 2](#Chapter02.html#ch2). The reason\
    \ is that the compiler can’t detect when the C struct is initialized or discarded\
    \ in order to do proper memory management.\n\nHowever, the Objective-C runtime\
    \ library can detect when a Block is copied from the stack to the heap, and when\
    \ a Block on the heap is destroyed. So, if the struct for Block has variables\
    \ that are qualified with `__strong` or `__weak`, the compiler can initialize\
    \ and dispose of them properly. For that, the member variables in `struct __main_block_desc_0`\
    \ `copy` and `dispose` are added and functions `__main_block_copy_0` and `__main_block_dispose_0`\
    \ are assigned to them.\n\nIn the source code, the struct for the Block has an\
    \ object type variable `array`, which is qualified with `__strong`. Because the\
    \ compiler has to manage the object in the variable `array` properly, the `__main_block_copy_0`\
    \ function calls the `_Block_object_assign` function to assign the target object\
    \ to the member variable `array` and to take ownership of it.\n\n```\nstatic void\
    \ __main_block_copy_0(struct __main_block_impl_0 *dst,\n        struct __main_block_impl_0\
    \ *src)\n{\n     _Block_object_assign(&dst->array, src->array, BLOCK_FIELD_IS_OBJECT);\n\
    }\n```\n\nThe `_Block_object_assign` function assigns the object to the member\
    \ variable and calls a function, which is equivalent to the `retain` method.\n\
    \nAlso, the `__main_block_dispose_0` function calls the `_Block_object_dispose`\
    \ function to release the object, which is assigned to the member variable `array`\
    \ in the struct for the Block.\n\n```\nstatic void __main_block_dispose_0(struct\
    \ __main_block_impl_0 *src)\n{\n_Block_object_dispose(src->array, BLOCK_FIELD_IS_OBJECT);\n\
    }\n```\n\nThe `_Block_object_dispose` function calls a function, which is equivalent\
    \ to the instance method `release`, on the object in the target member variable\
    \ of the struct.\n\nBy the way, the `__main_block_copy_0` function (referred to\
    \ as \"copy function\" in the rest of this book) and the `__main_block_dispose_0`\
    \ function (dispose function) are assigned to the member variables `copy` and\
    \ `dispose` in the `__main_block_desc_0` struct. But in the converted source code,\
    \ none of these functions are called at all, including through the pointers. How\
    \ are the functions used?\n\nThese functions are called when the Block is copied\
    \ from the stack to the heap, and when the Block on the heap is disposed of (see\
    \ [Table 5–4](#Chapter05.html#tab_5_4)).\n\n![images](images/t0504.jpg)\n\nWhen\
    \ is the Block on the stack copied to the heap?\n\n*   When the instance method\
    \ `copy` is called on the Block\n*   When the Block is returned from a function\n\
    *   When the Block is assigned to a member variable of `id` or the Block type\
    \ class, with `__strong` qualifier\n*   When the Block is passed to a method,\
    \ including `usingBlock` in the Cocoa Framework, or a Grand Central Dispatch API\n\
    \n\"When the instance method `copy` is called on the Block,\" if the Block is\
    \ on the stack, the Block is copied to the heap. \"When the Block is returned\
    \ from a function\" or \"When the Block is assigned to a member variable of `id`\
    \ or the Block type class, with `__strong` qualifier,\" the compiler automatically\
    \ calls the `_Block_copy` function with the target Block as an argument, which\
    \ is equivalent to calling a `copy` instance method on the Block. \"When the Block\
    \ is passed to a method, including `usingBlock` in the Cocoa Framework, or a Grand\
    \ Central Dispatch API,\" the instance method `copy` is called on the Block or\
    \ the `_Block_copy` function is called with the Block as the argument inside the\
    \ method or function.\n\nA Block on the stack will be copied that way in the various\
    \ situations, but, in a sense, all the situations are just the same. Actually,\
    \ a Block is copied only when the `_Block_copy` function is called."
  raw: '### Capturing Objects


    We saw examples using integer variables. Next, let’s see what will happen when
    an object is used from a Block. In the next source code, an object of the NSMutableArray
    class is created and the assigned variable has ownership of it. Because the scope
    of the variable, which qualified with __strong, is left immediately, the object
    is released and discarded.


    `{`

    `    id array = [[NSMutableArray alloc] init];`

    `}`


    [Listing 5–7](#Chapter05.html#list_5_7) uses the variable “array” in a Block literal.


    **Listing 5–7.** *Capturing an object*


    `blk_t blk;`

    `{`

    `    id array = [[NSMutableArray alloc] init];`

    `    blk = [^(id obj) {`

    `        [array addObject:obj];`

    `        NSLog(@"array count = %ld", [array count]);`

    `    } copy];`

    `}`

    `blk([[NSObject alloc] init]);`

    `blk([[NSObject alloc] init]);`


    `blk([[NSObject alloc] init]);`


    Because the strong reference of variable “array” disappears, the NSMutableArray
    class object, which is assigned to the variable “array”, must be released and
    discarded. But the result shows that it works without any problem.


    `array count = 1`

    `array count = 2`

    `array count = 3`


    This means that in the last part of the source code, where the Block is executed,
    the object of NSMutableArray class, which is assigned to the variable “array”,
    exists even after the variable scope is finished. The source code is converted
    as shown in [Listing 5–8](#Chapter05.html#list_5_8).


    **Listing 5–8.** *Converted source code of [Listing 5–7](#Chapter05.html#list_5_7)*


    `/* a struct for the Block and some functions */`


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`

    `    id __strong array;`

    `    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,`

    `    id __strong _array, int flags=0) : array(_array) {`

    `        impl.isa = &_NSConcreteStackBlock;`

    `        impl.Flags = flags;`

    `        impl.FuncPtr = fp;`

    `        Desc = desc;`

    `    }`

    `};`


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself, id obj)`

    `{`

    `    id __strong array = __cself->array;`

    `    [array addObject:obj];`

    `    NSLog(@"array count = %ld", [array count]);`

    `}`


    `static void __main_block_copy_0(struct __main_block_impl_0 *dst,         struct`

    `__main_block_impl_0 *src)`

    `{`

    `    _Block_object_assign(&dst->array, src->array, BLOCK_FIELD_IS_OBJECT);`

    `}`


    `static void __main_block_dispose_0(struct __main_block_impl_0 *src)`

    `{`

    `    _Block_object_dispose(src->array, BLOCK_FIELD_IS_OBJECT);`

    `}`


    `static struct __main_block_desc_0 {`

    `    unsigned long reserved;`

    `    unsigned long Block_size;`

    `    void (*copy)(struct __main_block_impl_0*, struct __main_block_impl_0*);`

    `    void (*dispose)(struct __main_block_impl_0*);`

    `} __main_block_desc_0_DATA = {`

    `    0,`

    `    sizeof(struct __main_block_impl_0),`

    `    __main_block_copy_0,`

    `    __main_block_dispose_0`

    `};`


    `/* Block literal and executing the Block */`


    `blk_t blk;`

    `{`

    `    id __strong array = [[NSMutableArray alloc] init];`


    `    blk = &__main_block_impl_0(`

    `        __main_block_func_0, &__main_block_desc_0_DATA, array, 0x22000000);`

    `    blk = [blk copy];`

    `}`


    `(*blk->impl.FuncPtr)(blk, [[NSObject alloc] init]);`

    `(*blk->impl.FuncPtr)(blk, [[NSObject alloc] init]);`

    `(*blk->impl.FuncPtr)(blk, [[NSObject alloc] init]);`


    Please pay attention to the captured automatic variable “array” which stores the
    object of the NSMutableArray class. You can see that the struct for the Block
    has a member variable “array” with __strong ownership qualifier.


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`

    `    id __strong array;`

    `};`


    In Objective-C, the C struct cannot have member variables that are qualified with
    __strong as we learned in [Chapter 2](#Chapter02.html#ch2). The reason is that
    the compiler can’t detect when the C struct is initialized or discarded in order
    to do proper memory management.


    However, the Objective-C runtime library can detect when a Block is copied from
    the stack to the heap, and when a Block on the heap is destroyed. So, if the struct
    for Block has variables that are qualified with __strong or __weak, the compiler
    can initialize and dispose of them properly. For that, the member variables in
    struct __main_block_desc_0 “copy” and “dispose” are added and functions __main_block_copy_0
    and __main_block_dispose_0 are assigned to them.


    In the source code, the struct for the Block has an object type variable “array”,
    which is qualified with __strong. Because the compiler has to manage the object
    in the variable “array” properly, the __main_block_copy_0 function calls the _Block_object_assign
    function to assign the target object to the member variable “array” and to take
    ownership of it.


    `static void __main_block_copy_0(struct __main_block_impl_0 *dst,`

    `        struct __main_block_impl_0 *src)`

    `{`

    `     _Block_object_assign(&dst->array, src->array, BLOCK_FIELD_IS_OBJECT);`

    `}`


    The _Block_object_assign function assigns the object to the member variable and
    calls a function, which is equivalent to the retain method.


    Also, the __main_block_dispose_0 function calls the _Block_object_dispose function
    to release the object, which is assigned to the member variable “array” in the
    struct for the Block.


    `static void __main_block_dispose_0(struct __main_block_impl_0 *src)`

    `{`

    `_Block_object_dispose(src->array, BLOCK_FIELD_IS_OBJECT);`

    `}`


    The _Block_object_dispose function calls a function, which is equivalent to the
    instance method “release”, on the object in the target member variable of the
    struct.


    By the way, the __main_block_copy_0 function (referred to as “copy function” in
    the rest of this book) and the __main_block_dispose_0 function (dispose function)
    are assigned to the member variables “copy” and “dispose” in the __main_block_desc_0
    struct. But in the converted source code, none of these functions are called at
    all, including through the pointers. How are the functions used?


    These functions are called when the Block is copied from the stack to the heap,
    and when the Block on the heap is disposed of (see [Table 5–4](#Chapter05.html#tab_5_4)).


    ![images](images/t0504.jpg)


    When is the Block on the stack copied to the heap?


    *   When the instance method “copy” is called on the Block

    *   When the Block is returned from a function

    *   When the Block is assigned to a member variable of id or the Block type class,
    with __strong qualifier

    *   When the Block is passed to a method, including “usingBlock” in the Cocoa
    Framework, or a Grand Central Dispatch API


    “When the instance method ’copy’ is called on the Block,” if the Block is on the
    stack, the Block is copied to the heap. “When the Block is returned from a function”
    or “When the Block is assigned to a member variable of id or the Block type class,
    with __strong qualifier,” the compiler automatically calls the _Block_copy function
    with the target Block as an argument, which is equivalent to calling a “copy”
    instance method on the Block. “When the Block is passed to a method, including
    ’usingBlock’ in the Cocoa Framework, or a Grand Central Dispatch API,” the instance
    method “copy” is called on the Block or the _Block_copy function is called with
    the Block as the argument inside the method or function.


    A Block on the stack will be copied that way in the various situations, but, in
    a sense, all the situations are just the same. Actually, a Block is copied only
    when the _Block_copy function is called.'
  trans: "\n### 捕获对象\n\n前面我们看到了使用整型变量的例子。接下来，让我们看看在 Block 中使用对象时会发生什么。在下面的源代码中，创建了一个\
