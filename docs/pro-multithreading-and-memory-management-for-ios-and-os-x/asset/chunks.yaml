    \ `__OBJC2__` 的环境）都会忽略 zones。\n\n### C 语言的 struct 或 union 中的成员变量不能是对象类型\n\n当你向\
    \ C 语言的 `struct` 或 `union` 添加 Objective-C 对象类型的成员变量时，会导致编译错误。\n\n```\nstruct Data\
    \ {\n    NSMutableArray *array;\n};\n```\n\n```\nerror: ARC forbids Objective-C\
    \ objs in structs or unions\n    NSMutableArray *array;\n                    ^\n\
    ```\n\n即使使用 LLVM 编译器 3.0，由于 C 语言规范的限制，也无法管理 C `struct` 的生命周期。^(3) 使用 ARC 时，编译器需要了解并管理对象的生命周期才能执行内存管理。例如，自动变量（局部变量）可以被管理，因为编译器可以将生命周期视为变量的作用域。由于\
    \ C `struct` 成员没有此类信息，编译器无法为 C `struct` 执行内存管理。如果你仍然想向 C `struct` 放入一个对象，可以通过将对象转换为\
    \ `void *`（参见下一节）或使用 `__unsafe_unretained` 所有权修饰符（参见“所有权修饰符”一节）来实现。\n\n__________\n\
    \n³ LLVM.org “4.3.5. Ownership-qualified fields of structs and unions,” [`http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records`](http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records)\n\
    \n```\nstruct Data {\n        NSMutableArray __unsafe_unretained *array;\n   \
    \ };\n```\n\n如前所述，编译器不会管理带有 `__unsafe_unretained` 所有权修饰符的变量。你必须自己管理所有权以避免内存泄漏，否则应用程序会崩溃。\n\
    \n### `id` 和 `void*` 必须显式转换\n\n在非 ARC 环境中，从 `id` 转换为 `void*` 可以正常工作，如下所示。\n\n\
    ```\n/* non-ARC */\nid obj = [[NSObject alloc] init];\nvoid *p = obj;\n```\n\n\
    同样，通过从 `void*` 赋值回来的 `id` 变量调用方法也没有问题，如下所示。\n\n```\n/* non-ARC */\nid o = p;\n\
    [o release];\n```\n\n但这些源代码在 ARC 下会导致编译错误。\n\n```\nerror: implicit conversion\
    \ of an Objective-C pointer\n    to 'void *' is disallowed with ARC\n        void\
    \ *p = obj;\n                  ^\n\n    error: implicit conversion of a non-Objective-C\
    \ pointer\n        type 'void *' to 'id' is disallowed with ARC\n        id o\
    \ = p;\n                ^\n```\n\n要在 `id` 或对象类型与 `void*` 之间进行转换，你必须使用一种特殊的转换。仅用于赋值时，你可以使用\
    \ `__bridge` 转换。\n\n#### `__bridge` 转换\n\n你可以这样使用 `__bridge` 转换：\n\n```\nid obj\
    \ = [[NSObject alloc] init];\n\nvoid *p = (__bridge void *)obj;\n\nid o = (__bridge\
    \ id)p;\n```\n\n使用 `__bridge` 转换，你可以将 `id` 转换为 `void*`，反之亦然。但是，将 `__bridge` 转换为\
    \ `void*` 甚至比 `__unsafe_unretained` 限定的变量更危险。你必须小心地自己管理对象的所有权，否则会因为悬空指针而崩溃。此外，还有另外两种转换：`__bridge_retained`\
    \ 和 `__bridge_transfer`。\n"
- fmt: "# `__bridge_retained` Cast\n\n`__bridge_retained` cast works as if the assigned\
    \ variable has ownership of the object.\n\n```\nid obj = [[NSObject alloc] init];\n\
    void *p = (__bridge_retained void *)obj;\n```\n\nThe above source code can be\
    \ rewritten for a non-ARC environment as follows.\n\n```\n/* non-ARC */\n\nid\
    \ obj = [[NSObject alloc] init];\n\nvoid *p = obj;\n[(id)p retain];\n```\n\n`__bridge_retained`\
    \ cast has been replaced by `retain`. The variables `obj` and `p` have ownership\
    \ of the object. Let's see other examples.\n\n```\nvoid *p = 0;\n\n{\n    id obj\
    \ = [[NSObject alloc] init];\n    p = (__bridge_retained void *)obj;\n}\n\nNSLog(@\"\
    class=%@\", [(__bridge id)p class]);\n```\n\nWhen leaving the scope of variable\
    \ `obj`, its strong reference disappears and the object is released. Because variable\
    \ `p` also has ownership, the object is not discarded. Let's rewrite it for a\
    \ non-ARC environment as usual.\n\n```\n/* non-ARC */\n\nvoid *p = 0;\n\n{\n \
    \   id obj = [[NSObject alloc] init];\n    /* [obj retainCount] -> 1 */\n\n  \
    \  p = [obj retain];\n    /* [obj retainCount] -> 2 */\n\n    [obj release];\n\
    \    /* [obj retainCount] -> 1 */\n}\n\n     /*\n      * [(id)p retainCount] ->\
    \ 1\n      * which means,\n      * [obj retainCount] -> 1\n      * So, the object\
    \ still exists.\n      */\n\nNSLog(@\"class=%@\", [(__bridge id)p class]);\n```\n\
    \nConversely, `__bridge_transfer` cast will release the object just after the\
    \ assignment is done.\n\n# `__bridge_transfer` Cast\n\nYou can use `__bridge_transfer`\
    \ cast as\n\n```\nid obj = (__bridge_transfer id)p;\n```\n\nThis source code can\
    \ be rewritten for a non-ARC environment.\n\n```\n/* non-ARC */\nid obj = (id)p;\n\
    [obj retain];\n[(id)p release];\n```\n\nAs `__bridge_retained` cast is replaced\
    \ with `retain`, `__bridge_transfer` cast is replaced with `release`. The variable\
    \ `obj` is retained because it is qualified with `__strong`. With these two casts,\
    \ you can create, own, and release any objects without using `id` or object type\
    \ variables. But it is not recommended. Please be careful when you use them. Let's\
    \ see one more example.\n\n```\nvoid *p = (__bridge_retained void *)[[NSObject\
    \ alloc] init];\nNSLog(@\"class=%@\", [(__bridge id)p class]);\n(void)(__bridge_transfer\
    \ id)p;\n```\n\nThis source code can be rewritten for a non-ARC environment as\
    \ follows.\n\n```\n/* non-ARC */\n\nid p = [[NSObject alloc] init];\nNSLog(@\"\
    class=%@\", [p class]);\n[p release];\n```\n\nThese casts are used frequently\
    \ to convert Objective-C objects and Core Foundation objects.\n\n# Objective-C\
    \ Object and Core Foundation Object\n\nA Core Foundation object is an object used\
    \ with the Core Foundation Framework. It is mainly written in C and has a reference\
    \ count. In the Core Foundation framework, `CFRetain` and `CFRelease` are the\
    \ equivalent functions to `retain` and `release` in Objective-C in a non-ARC environment.\n\
    \nThe difference between a Core Foundation object and an Objective-C object is\
    \ very small. It is more or less how it is created, either with Foundation framework\
    \ (Cocoa) in Objective-C or with Core Foundation framework. After being created,\
    \ it can be used transparently in both frameworks' manner. For instance, even\
    \ when an object is created with the Foundation Framework API, it can be released\
    \ with the Core Foundation Framework API or vice versa.\n\nActually there is no\
    \ difference between a Core Foundation object itself and an Objective-C object\
    \ itself. So, to cast the object, in a non-ARC environment, just using a C language\
    \ style cast is enough. This conversion is called a Toll-Free Bridge because just\
    \ casting has no cost for the CPU.\n\nYou can see the list of Toll-Free Bridge\
    \ classes in the following document.\n\nToll-Free Bridged Types\n[`http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html`](http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html)\n\
    \nFor an ARC-enabled environment, to convert an object between Objective-C and\
    \ Core Foundation, in other words, for a Toll-Free Bridge cast, the following\
    \ functions are provided.\n\n```\nCFTypeRef CFBridgingRetain(id X) {\n    return\
    \ (__bridge_retained CFTypeRef)X;\n}\n\nid CFBridgingRelease(CFTypeRef X) {\n\
    \    return (__bridge_transfer id)X;\n}\n```\n\nLet's see how we can use these\
    \ functions.\n\n# `CFBridgingRetain` Function\n\n[Listing 2–11](#Chapter02.html#list_2_11)\
    \ creates an `NSMutableArray` object with ownership and uses the object as a Core\
    \ Foundation object.\n\n**Listing 2–11.** *CFBridgingRetain*\n\n```\nCFMutableArrayRef\
    \ cfObject = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n    cfObject\
    \ = CFBridgingRetain(obj);\n    CFShow(cfObject);\n    printf(\"retain count =\
    \ %d\\n\", CFGetRetainCount(cfObject));\n}\nprintf(\"retain count after the scope\
    \ = %d\\n\", CFGetRetainCount(cfObject));\nCFRelease(cfObject);\n```\n\nThe result\
    \ is as follows. `()` means an empty array.\n\n```\n()\nretain count = 2\nretain\
    \ count after the scope = 1\n```\n\nNow we've learned that an Objective-C object\
    \ in the Foundation Framework can be used as a Core Foundation object. Also the\
    \ object can be released with `CFRelease`. In the example, you can also use `__bridge_retained`\
    \ cast instead of `CFBridgingRetain` as follows. Just choose whichever you like.\n\
    \n```\nCFMutableArrayRef cfObject = (__bridge_retained CFMutableArrayRef)obj;\n\
    ```\n\nLet's see the source code with comments on ownership status and the value\
    \ of `CFGetRetainCount` ([Listing 2–12](#Chapter02.html#list_2_12)).\n\n**Listing\
    \ 2–12.** *CFBridgingRetain with comments*\n\n```\nCFMutableArrayRef cfObject\
    \ = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n\n     /*\n      *\
    \ variable obj has a strong reference to the object\n      */\n    cfObject =\
    \ CFBridgingRetain(obj);\n\n     /*\n      * CFBridgingRetain works as if CFRetain\
    \ is called and\n      * the object is assigned to variable cfObject\n      */\n\
    \n    CFShow(cfObject);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
    \n     /*\n      * Reference count is two.  One is for strong reference of variable\
    \ obj,\n      * The other is by CFBridgingRetain.\n      */\n}\n\n /*\n  * Leaving\
    \ the scope of variable obj, its strong reference disappears.\n  * Reference count\
    \ is one.\n  */\n\nprintf(\"retain count after the scope = %d\\n\", CFGetRetainCount(cfObject));\n\
    CFRelease(cfObject);\n\n/*\n* Reference count is zero because of CFRelease.\n\
    * So, the object is discarded.\n*/\n```\n\nNext, let's see what will happen if\
    \ `__bridge` cast is used instead of `CFBridgingRetain` or `__bridge_retained`\
    \ cast ([Listing 2–13](#Chapter02.html#list_2_13)).\n\n**Listing 2–13.** *`__bridge`\
    \ cast is used instead of `__bridge_retained` cast*\n\n```\nCFMutableArrayRef\
    \ cfObject = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n\n     /*\n\
    \      * variable obj has a strong reference to the object\n      */\n\n    cfObject\
    \ = (__bridge CFMutableArrayRef)obj;\n    CFShow(cfObject);\n    printf(\"retain\
    \ count = %d\\n\", CFGetRetainCount(cfObject));\n\n     /*\n      * __bridge cast\
    \ does not touch ownership status.\n      * Reference count is one because of\
    \ variable obj's strong reference.\n      */\n}\n\n /*\n  * Leaving the scope\
    \ of variable obj, its strong reference disappears.\n  * The object is released\
    \ automatically.\n  * Because no one has ownership, the object is discarded.\n\
    \  */\n\n /*\n  * From here, any access to the object is invalid! (dangling pointer)\n\
    \  */\n\nprintf(\"retain count after the scope = %d\\n\", CFGetRetainCount(cfObject));\n\
    CFRelease(cfObject);\n```\n\nNow, we understand why `CFBridgingRetain` or `__bridge_retained`\
    \ cast is needed."
  raw: '##### __bridge_retained cast


    __bridge_retained cast works as if the assigned variable has ownership of the
    object.


    `id obj = [[NSObject alloc] init];`

    `void *p = (__bridge_retained void *)obj;`


    The above source code can be rewritten for a non-ARC environment as follows.


    `/* non-ARC */`


    `id obj = [[NSObject alloc] init];`


    `void *p = obj;`

    `[(id)p retain];`


    _bridge_retained cast has been replaced by retain. The variables “obj” and “p”
    have ownership of the object. Let’s see other examples.


    `void *p = 0;`


    `{`

    `    id obj = [[NSObject alloc] init];`

    `    p = (__bridge_retained void *)obj;`

    `}`


    `NSLog(@"class=%@", [(__bridge id)p class]);`


    When leaving the scope of variable obj, its strong reference disappears and the
    object is released. Because variable p also has ownership, the object is not discarded.
    Let’s rewrite it for a non-ARC environment as usual.


    `/* non-ARC */`


    `void *p = 0;`


    `{`

    `    id obj = [[NSObject alloc] init];`

    `    /* [obj retainCount] -> 1 */`


    `    p = [obj retain];`

    `    /* [obj retainCount] -> 2 */`


    `    [obj release];`

    `    /* [obj retainCount] -> 1 */}`


    `     /*`

    `      * [(id)p retainCount] -> 1`

    `      * which means,`

    `      * [obj retainCount] -> 1`

    `      * So, the object still exists.`

    `      */`


    `NSLog(@"class=%@", [(__bridge id)p class]);`


    Conversely, __bridge_transfer cast will release the object just after the assignment
    is done.


    ##### __bridge_transfer cast


    You can use __bridge_transfer cast as


    `id obj = (__bridge_transfer id)p;`


    This source code can be rewritten for a non-ARC environment.


    `/* non-ARC */`

    `id obj = (id)p;`

    `[obj retain];`

    `[(id)p release];`


    As __bridge_retained cast is replaced with retain, __bridge_transfer cast is replaced
    with release. The variable obj is retained because it is qualified with __strong.
    With these two casts, you can create, own, and release any objects without using
    ‘id’ or object type variables. But it is not recommended. Please be careful when
    you use them. Let’s see one more example.


    `void *p = (__bridge_retained void *)[[NSObject alloc] init];`

    `NSLog(@"class=%@", [(__bridge id)p class]);`

    `(void)(__bridge_transfer id)p;`


    This source code can be rewritten for a non-ARC environment as follows.


    `/* non-ARC */`


    `id p = [[NSObject alloc] init];`

    `NSLog(@"class=%@", [p class]);`

    `[p release];`


    These casts are used frequently to convert Objective-C objects and Core Foundation
    objects.


    **OBJECTIVE-C OBJECT AND CORE FOUNDATION OBJECT**


    A Core Foundation object is an object used with the Core Foundation Framework.
    It is mainly written in C and has a reference count. In the Core Foundation framework,
    CFRetain and CFRelease are the equivalent functions to retain and release in Objective-C
    in a non-ARC environment.


    The difference between a Core Foundation object and an Objective-C object is very
    small. It is more or less how it is created, either with Foundation framework
    (Cocoa) in Objective-C or with Core Foundation framework. After being created,
    it can be used transparently in both frameworks’ manner. For instance, even when
    an object is created with the Foundation Framework API, it can be released with
    the Core Foundation Framework API or vice versa.


    Actually there is no difference between a Core Foundation object itself and an
    Objective-C object itself. So, to cast the object, in a non-ARC environment, just
    using a C language style cast is enough. This conversion is called a Toll-Free
    Bridge because just casting has no cost for the CPU.


    You can see the list of Toll-Free Bridge classes in the following document.


    Toll-Free Bridged Types

    [`http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html`](http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html)


    For an ARC-enabled environment, to convert an object between Objective-C and Core
    Foundation, in other words, for a Toll-Free Bridge cast, the following functions
    are provided.


    `CFTypeRef CFBridgingRetain(id X) {`

    `    return (__bridge_retained CFTypeRef)X;`

    `}`


    `id CFBridgingRelease(CFTypeRef X) {`

    `    return (__bridge_transfer id)X;`

    `}`


    Let’s see how we can use these functions.


    ##### CFBridgingRetain function


    [Listing 2–11](#Chapter02.html#list_2_11) creates an NSMutableArray object with
    ownership and uses the object as a Core Foundation object.


    **Listing 2–11.** *CFBridgingRetain*


    `CFMutableArrayRef cfObject = NULL;`

    `{`

    `    id obj = [[NSMutableArray alloc] init];`

    `    cfObject = CFBridgingRetain(obj);`

    `    CFShow(cfObject);`

    `    printf("retain count = %d\n", CFGetRetainCount(cfObject));`

    `}`

    `printf("retain count after the scope = %d\n", CFGetRetainCount(cfObject));`

    `CFRelease(cfObject);`


    The result is as follows. () means an empty array.


    `()`

    `retain count = 2`

    `retain count after the scope = 1`


    Now we’ve learned that an Objective-C object in the Foundation Framework can be
    used as a Core Foundation object. Also the object can be released with CFRelease.
    In the example, you can also use __bridge_retained cast instead of CFBridgingRetain
    as follows. Just choose whichever you like.


    `CFMutableArrayRef cfObject = (__bridge_retained CFMutableArrayRef)obj;`


    Let’s see the source code with comments on ownership status and the value of CFGetRetainCount
    ([Listing 2–12](#Chapter02.html#list_2_12)).


    **Listing 2–12.** *CFBridgingRetain with comments*


    `CFMutableArrayRef cfObject = NULL;`

    `{`

    `    id obj = [[NSMutableArray alloc] init];`


    `     /*`

    `      * variable obj has a strong reference to the object`

    `      */`

    `    cfObject = CFBridgingRetain(obj);`


    `     /*`

    `      * CFBridgingRetain works as if CFRetain is called and`

    `      * the object is assigned to variable cfObject`

    `      */`


    `    CFShow(cfObject);`

    `    printf("retain count = %d\n", CFGetRetainCount(cfObject));`


    `     /*`

    `      * Reference count is two.  One is for strong reference of variable obj,`

    `      * The other is by CFBridgingRetain.`

    `      */`

    `}`


    ` /*`

    `  * Leaving the scope of variable obj, its strong reference disappears.`

    `  * Reference count is one.`

    `  */`


    `printf("retain count after the scope = %d\n", CFGetRetainCount(cfObject));`

    `CFRelease(cfObject);`


    `/*`

    `* Reference count is zero because of CFRelease.`

    `* So, the object is discarded.`

    `*/`


    Next, let’s see what will happen if __bridge cast is used instead of CFBridgingRetain
    or __bridge_retained cast ([Listing 2–13](#Chapter02.html#list_2_13)).


    **Listing 2–13.** *__bridge cast is used instead of __bridge_retained cast*


    `CFMutableArrayRef cfObject = NULL;`

    `{`

    `    id obj = [[NSMutableArray alloc] init];`


    `     /*`

    `      * variable obj has a strong reference to the object`

    `      */`


    `    cfObject = (__bridge CFMutableArrayRef)obj;`

    `    CFShow(cfObject);`

    `    printf("retain count = %d\n", CFGetRetainCount(cfObject));`


    `     /*`

    `      * __bridge cast does not touch ownership status.`

    `      * Reference count is one because of variable obj''s strong reference.`

    `      */`

    `}`


    ` /*`

    `  * Leaving the scope of variable obj, its strong reference disappears.`

    `  * The object is released automatically.`

    `  * Because no one has ownership, the object is discarded.`

    `  */`


    ` /*`

    `  * From here, any access to the object is invalid! (dangling pointer)`

    `  */`


    `printf("retain count after the scope = %d\n", CFGetRetainCount(cfObject));`

    `CFRelease(cfObject);`


    Now, we understand why CFBridgingRetain or __bridge_retained cast is needed.'
