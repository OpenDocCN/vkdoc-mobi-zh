    \   id __strong array = __cself->array;\n    [array addObject:obj];\n    NSLog(@\"\
    array count = %ld\", [array count]);\n}\n\nstatic void __main_block_copy_0(struct\
    \ __main_block_impl_0 *dst,         struct\n__main_block_impl_0 *src)\n{\n   \
    \ _Block_object_assign(&dst->array, src->array, BLOCK_FIELD_IS_OBJECT);\n}\n\n\
    static void __main_block_dispose_0(struct __main_block_impl_0 *src)\n{\n    _Block_object_dispose(src->array,\
    \ BLOCK_FIELD_IS_OBJECT);\n}\n\nstatic struct __main_block_desc_0 {\n    unsigned\
    \ long reserved;\n    unsigned long Block_size;\n    void (*copy)(struct __main_block_impl_0*,\
    \ struct __main_block_impl_0*);\n    void (*dispose)(struct __main_block_impl_0*);\n\
    } __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct __main_block_impl_0),\n\
    \    __main_block_copy_0,\n    __main_block_dispose_0\n};\n\n/* Block 字面量及执行 Block\
    \ */\n\nblk_t blk;\n{\n    id __strong array = [[NSMutableArray alloc] init];\n\
    \n    blk = &__main_block_impl_0(\n        __main_block_func_0, &__main_block_desc_0_DATA,\
    \ array, 0x22000000);\n    blk = [blk copy];\n}\n\n(*blk->impl.FuncPtr)(blk, [[NSObject\
    \ alloc] init]);\n(*blk->impl.FuncPtr)(blk, [[NSObject alloc] init]);\n(*blk->impl.FuncPtr)(blk,\
    \ [[NSObject alloc] init]);\n```\n\n请特别注意捕获的自动变量 `array`，它存储了 `NSMutableArray`\
    \ 类的对象。你可以看到，用于 Block 的结构体包含了一个拥有 `__strong` 所有权修饰符的成员变量 `array`。\n\n```\nstruct\
    \ __main_block_impl_0 {\n    struct __block_impl impl;\n    struct __main_block_desc_0*\
    \ Desc;\n    id __strong array;\n};\n```\n\n在 Objective-C 中，正如我们在第 2 章中学到的，C 结构体不能包含使用\
    \ `__strong` 修饰的成员变量。原因在于编译器无法检测 C 结构体何时被初始化或销毁，从而无法进行正确的内存管理。\n\n然而，Objective-C\
    \ 运行时库可以检测到 Block 何时从栈复制到堆，以及堆上的 Block 何时被销毁。因此，如果 Block 的结构体包含使用 `__strong` 或\
    \ `__weak` 修饰的变量，编译器就可以正确地初始化和销毁它们。为此，`struct __main_block_desc_0` 中添加了 `copy`\
    \ 和 `dispose` 成员变量，并为其分配了 `__main_block_copy_0` 和 `__main_block_dispose_0` 函数。\n\
    \n在源代码中，Block 的结构体包含一个使用 `__strong` 修饰的对象类型变量 `array`。由于编译器需要正确管理变量 `array` 中的对象，`__main_block_copy_0`\
    \ 函数会调用 `_Block_object_assign` 函数，将目标对象赋值给成员变量 `array` 并获取其所有权。\n\n```\nstatic\
    \ void __main_block_copy_0(struct __main_block_impl_0 *dst,\n        struct __main_block_impl_0\
    \ *src)\n{\n     _Block_object_assign(&dst->array, src->array, BLOCK_FIELD_IS_OBJECT);\n\
    }\n```\n\n`_Block_object_assign` 函数将对象赋值给成员变量，并调用一个相当于 `retain` 方法的函数。\n\n同样，`__main_block_dispose_0`\
    \ 函数会调用 `_Block_object_dispose` 函数，以释放 Block 结构体中赋值给成员变量 `array` 的对象。\n\n```\n\
    static void __main_block_dispose_0(struct __main_block_impl_0 *src)\n{\n_Block_object_dispose(src->array,\
    \ BLOCK_FIELD_IS_OBJECT);\n}\n```\n\n`_Block_object_dispose` 函数会在结构体目标成员变量中的对象上调用一个相当于实例方法\
    \ `release` 的函数。\n\n顺便提一下，`__main_block_copy_0` 函数（本书后续简称“copy 函数”）和 `__main_block_dispose_0`\
    \ 函数（本书后续简称“dispose 函数”）被赋值给了 `__main_block_desc_0` 结构体中的 `copy` 和 `dispose` 成员变量。但在转换后的源代码中，包括通过指针调用在内，这些函数完全没有被调用。那么这些函数是如何被使用的呢？\n\
    \n这些函数会在 Block 从栈复制到堆时，以及堆上的 Block 被销毁时被调用（参见表 5-4）。\n\n![images](img/t0504.jpg)\n\
    \n栈上的 Block 何时会被复制到堆上？\n\n*   当在 Block 上调用实例方法 `copy` 时\n*   当 Block 作为函数返回值时\n\
    *   当 Block 被赋值给使用 `__strong` 修饰的 `id` 类型或 Block 类型的类成员变量时\n*   当 Block 被传递给方法（包括\
    \ Cocoa 框架中的 `usingBlock` 方法或 Grand Central Dispatch API）时\n\n“当在 Block 上调用实例方法\
    \ `copy` 时”，如果 Block 在栈上，则会被复制到堆上。“当 Block 作为函数返回值时”或“当 Block 被赋值给使用 `__strong`\
    \ 修饰的 `id` 类型或 Block 类型的类成员变量时”，编译器会自动调用以目标 Block 为参数的 `_Block_copy` 函数，这相当于在\
    \ Block 上调用 `copy` 实例方法。“当 Block 被传递给方法（包括 Cocoa 框架中的 `usingBlock` 方法或 Grand Central\
    \ Dispatch API）时”，会在方法或函数内部调用 Block 的实例方法 `copy`，或以 Block 为参数调用 `_Block_copy`\
    \ 函数。\n\n栈上的 Block 会以这种方式在各种情况下被复制，但从某种意义上说，所有这些情况其实都是相同的。实际上，Block 只会在调用 `_Block_copy`\
    \ 函数时被复制。\n"
- fmt: "On the contrary, the `dispose` function is called when a Block on the heap\
    \ is released and disposed of because no one has ownership of it. It is equivalent\
    \ to the `dealloc` method of objects. With this mechanism, the object, which is\
    \ captured by a Block, can exist beyond the variable scope by assigning to an\
    \ automatic variable with a `__strong` qualifier. Although we skipped it in the\
    \ section “`__block` specifier,” this mechanism with `copy` and `dispose` functions\
    \ is used for `__block` variables as well.\n\n```\nstatic void __main_block_copy_0(\n\
    \    struct __main_block_impl_0*dst, struct __main_block_impl_0*src)\n{\n    _Block_object_assign(&dst->val,\
    \ src->val, BLOCK_FIELD_IS_BYREF);\n}\n\nstatic void __main_block_dispose_0(struct\
    \ __main_block_impl_0*src) {\n    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);\n\
    }\n```\n\nIn the converted source code, a portion related to the struct for the\
    \ Block is almost the same except for the difference listed in [Table 5–5](#Chapter05.html#tab_5_5).\n\
    \n![images](images/t0505.jpg)\n\nThe argument `BLOCK_FIELD_IS_OBJECT` and `BLOCK_FIELD_IS_BYREF`\
    \ switches the target of `copy` and `dispose` functions over the object or the\
    \ `__block` variable.\n\nThe same way it takes ownership of the captured object\
    \ by the `copy` function and the ownership is released by the `dispose` function,\
    \ it takes ownership of the `__block` variable by the `copy` function and the\
    \ ownership is released by the `dispose` function.\n\nNow we’ve learned that when\
    \ an object is assigned to automatic variables with `__strong`, the object can\
    \ exist beyond the variable scope, and when a `__block` variable is copied to\
    \ the heap and a Block on the heap has ownership of it, it can exist beyond the\
    \ variable scope.\n\n### When You Should Call the “copy” Method\n\nBy the way,\
    \ in the previous source code, what will happen when the instance method `copy`\
    \ isn’t called on the Block?\n\n```\nblk_t blk;\n\n{\n    id array = [[NSMutableArray\
    \ alloc] init];\n    blk = ^(id obj) {\n        [array addObject:obj];\n     \
    \   NSLog(@\"array count = %ld\", [array count]);\n    };\n}\n\nblk([[NSObject\
    \ alloc] init]);\nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\n\
    ```\n\nAs the result, the application is terminated.\n\nOnly when the `_Block_copy`\
    \ function is called, is ownership of the captured object type automatic variable\
    \ with a `__strong` qualifier taken. So, as an example, if the `_Block_copy` function\
    \ isn’t called, the object is disposed of even if the object is captured. Therefore,\
    \ when you use an automatic variable of an object type inside a Block, you should\
    \ call the instance method `copy` on the Block, except in the following situations.\n\
    \n* When the Block is returned from a function\n* When the Block is assigned to\
    \ a member variable of `id` or the Block type class, with a `__strong` qualifier\n\
    * When the Block is passed to a method, including `usingBlock` in the Cocoa Framework,\
    \ or a Grand Central Dispatch API\n\nNext, let’s see what happens when an object\
    \ is stored in a `__block` variable.\n\n### `__block` Variables and Objects\n\n\
    The `__block` specifier can be used for any type of automatic variable. Let’s\
    \ see how it is used for an `id`-type automatic variable to assign an Objective-C\
    \ object.\n\n```\n__block id obj = [[NSObject alloc] init];\n```\n\nThis is equivalent\
    \ to:\n\n```\n__block id __strong obj = [[NSObject alloc] init];\n```\n\nWhen\
    \ ARC is enabled, variables of `id` or an object type always have ownership qualifiers,\
    \ and `__strong` is used as its default. It is converted by clang as follows.\n\
    \n```\n/* struct for __block variable */\n\nstruct __Block_byref_obj_0 {\n   \
    \ void *__isa;\n    __Block_byref_obj_0 *__forwarding;\n    int __flags;\n   \
    \ int __size;\n    void (*__Block_byref_id_object_copy)(void*, void*);\n    void\
    \ (*__Block_byref_id_object_dispose)(void*);\n    __strong id obj;\n};\n\nstatic\
    \ void __Block_byref_id_object_copy_131(void *dst, void *src) {\n    _Block_object_assign((char*)dst\
    \ + 40, *(void * *) ((char*)src + 40), 131);\n}\n\nstatic void __Block_byref_id_object_dispose_131(void\
    \ *src) {\n    _Block_object_dispose(*(void * *) ((char*)src + 40), 131);\n}\n\
    \n/* __block variable declaration */\n\n __Block_byref_obj_0 obj = {\n    0,\n\
    \    &obj,\n    0x2000000,\n    sizeof(__Block_byref_obj_0),\n    __Block_byref_id_object_copy_131,\n\
    \    __Block_byref_id_object_dispose_131,\n    [[NSObject alloc] init]\n};\n```\n\
    \n`_Block_object_assign` and `_Block_object_dispose` functions, which are explained\
    \ in the previous section, are used.\n\nWhen an automatic variable of `id` or\
    \ object type is captured for a Block and the Block is copied from the stack to\
    \ the heap, the `_Block_object_assign` function is called so that the Block takes\
    \ ownership of the captured object. When the block on the heap is disposed of,\
    \ the `_Block_object_dispose` function is called to release the captured object.\n\
    \nWhen an automatic variable of `id` or object type with a `__strong` qualifier\
    \ has a `__block` specifier, the same thing happens. When the `__block` variable\
    \ is copied from the stack to the heap, a `_Block_object_assign` function is called\
    \ so that the Block takes ownership of the `__block` variable. When the `__block`\
    \ variable on the heap is disposed of, the `_Block_object_dispose` function is\
    \ called to release the object in the `__block` variable.\n\nNow we understand\
    \ that as long as the object type `__block` variable with a `__strong` qualifier\
    \ exists on the heap, the object, which is assigned to the `__block` variable,\
    \ exists as well and ownership of it is managed properly. It is just like an object,\
    \ which is assigned to the object type automatic variable with a `__strong` qualifier,\
    \ is used inside a Block.\n\nBy the way, for now, we’ve learned only about automatic\
    \ variables of `id` or object type with a `__strong` qualifier. How about other\
    \ ownership qualifiers? What will happen with `__weak` ownership qualifiers? The\
    \ next source code is about `id` type variables with a `__weak` qualifier.\n\n\
    ```\nblk_t blk;\n\n{\n    id array = [[NSMutableArray alloc] init];\n    id __weak\
    \ array2 = array;\n    blk = [^(id obj) {\n\n        [array2 addObject:obj];\n\
    \n        NSLog(@\"array2 count = %ld\", [array2 count]);\n\n    } copy];\n}\n\
    \nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\nblk([[NSObject\
    \ alloc] init]);\n```\n\nThe result is different from the result in the section,\
    \ “Capturing Objects.”\n\n```\narray2 count = 0\narray2 count = 0\narray2 count\
    \ = 0\n```\n\nThis is because the variable `array` is released and discarded when\
    \ the variable scope is left, and `nil` is assigned to the variable `array2`.\
    \ It just works as expected.\n\nWhat will happen when the `__block` specifier\
    \ and `__weak` ownership qualifier are used at the same time?\n\n```\nblk_t blk;\n\
    \n{\n    id array = [[NSMutableArray alloc] init];\n    __block id __weak array2\
    \ = array;\n\n    blk = [^(id obj) {\n\n        [array2 addObject:obj];\n\n  \
    \      NSLog(@\"array2 count = %ld\", [array2 count]);\n    } copy];\n}\n\nblk([[NSObject\
    \ alloc] init]);\nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\n\
    ```\n\nThe result is same as the previous one.\n\n```\narray2 count = 0\narray2\
    \ count = 0\narray2 count = 0\n```"
  raw: 'On the contrary, the dispose function is called when a Block on the heap is
    released and disposed of because no one has ownership of it. It is equivalent
    to the dealloc method of objects. With this mechanism, the object, which is captured
    by a Block, can exist beyond the variable scope by assigning to an automatic variable
    with a __strong qualifier. Although we skipped it in the section “__block specifier,”
    this mechanism with copy and dispose functions is used for __block variables as
    well.


    `static void __main_block_copy_0(`

    `    struct __main_block_impl_0*dst, struct __main_block_impl_0*src)`

    `{`

    `    _Block_object_assign(&dst->val, src->val, BLOCK_FIELD_IS_BYREF);`

    `}`


    `static void __main_block_dispose_0(struct __main_block_impl_0*src) {`

    `    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);`

    `}`


    In the converted source code, a portion related to the struct for the Block is
    almost the same except for the difference listed in [Table 5–5](#Chapter05.html#tab_5_5).


    ![images](images/t0505.jpg)


    The argument BLOCK_FIELD_IS_OBJECT and BLOCK_FIELD_IS_BYREF switches the target
    of copy and dispose functions over the object or the __block variable.


    The same way it takes ownership of the captured object by the copy function and
    the ownership is released by the dispose function, it takes ownership of the __block
    variable by the copy function and the ownership is released by the dispose function.


    Now we’ve learned that when an object is assigned to automatic variables with
    __strong, the object can exist beyond the variable scope, and when a __block variable
    is copied to the heap and a Block on the heap has ownership of it, it can exist
    beyond the variable scope.


    #### When You Should Call the “copy” Method


    By the way, in the previous source code, what will happen when the instance method
    “copy” isn’t called on the Block?


    `blk_t blk;`


    `{`

    `    id array = [[NSMutableArray alloc] init];`

    `    blk = ^(id obj) {`

    `        [array addObject:obj];`

    `        NSLog(@"array count = %ld", [array count]);`

    `    };`

    `}`


    `blk([[NSObject alloc] init]);`

    `blk([[NSObject alloc] init]);`

    `blk([[NSObject alloc] init]);`


    As the result, the application is terminated.


    Only when the _Block_copy function is called, is ownership of the captured object
    type automatic variable with a __strong qualifier taken. So, as an example, if
    the _Block_copy function isn’t called, the object is disposed of even if the object
    is captured. Therefore, when you use an automatic variable of an object type inside
    a Block, you should call the instance method “copy” on the Block, except in the
    following situations.


    *   When the Block is returned from a function

    *   When the Block is assigned to a member variable of id or the Block type class,
    with a __strong qualifier

    *   When the Block is passed to a method, including “usingBlock” in the Cocoa
    Framework, or a Grand Central Dispatch API


    Next, let’s see what happens when an object is stored in a __block variable.


    ### __block Variables and Objects


    The __block specifier can be used for any type of automatic variable. Let’s see
    how it is used for an id-type automatic variable to assign an Objective-C object.


    `__block id obj = [[NSObject alloc] init];`


    This is equivalent to:


    `__block id __strong obj = [[NSObject alloc] init];`


    When ARC is enabled, variables of id or an object type always have ownership qualifiers,
    and __strong is used as its default. It is converted by clang as follows.


    `/* struct for __block variable */`


    `struct __Block_byref_obj_0 {`

    `    void *__isa;`

    `    __Block_byref_obj_0 *__forwarding;`

    `    int __flags;`

    `    int __size;`

    `    void (*__Block_byref_id_object_copy)(void*, void*);`

    `    void (*__Block_byref_id_object_dispose)(void*);`

    `    __strong id obj;`

    `};`


    `static void __Block_byref_id_object_copy_131(void *dst, void *src) {`

    `    _Block_object_assign((char*)dst + 40, *(void * *) ((char*)src + 40), 131);`

    `}`


    `static void __Block_byref_id_object_dispose_131(void *src) {`

    `    _Block_object_dispose(*(void * *) ((char*)src + 40), 131);`

    `}`


    `/* __block variable declaration */`


    ` __Block_byref_obj_0 obj = {`

    `    0,`

    `    &obj,`

    `    0x2000000,`

    `    sizeof(__Block_byref_obj_0),`

    `    __Block_byref_id_object_copy_131,`

    `    __Block_byref_id_object_dispose_131,`

    `    [[NSObject alloc] init]`

    `};`


    _Block_object_assign and _Block_object_dispose functions, which are explained
    in the previous section, are used.


    When an automatic variable of id or object type is captured for a Block and the
    Block is copied from the stack to the heap, the _Block_object_assign function
    is called so that the Block takes ownership of the captured object. When the block
    on the heap is disposed of, the _Block_object_dispose function is called to release
    the captured object.


    When an automatic variable of id or object type with a __strong qualifier has
    a __block specifier, the same thing happens. When the __block variable is copied
    from the stack to the heap, a _Block_object_assign function is called so that
    the Block takes ownership of the __block variable. When the __block variable on
    the heap is disposed of, the _Block_object_dispose function is called to release
    the object in the __block variable.


    Now we understand that as long as the object type __block variable with a __strong
    qualifier exists on the heap, the object, which is assigned to the __block variable,
    exists as well and ownership of it is managed properly. It is just like an object,
    which is assigned to the object type automatic variable with a __strong qualifier,
    is used inside a Block.


    By the way, for now, we’ve learned only about automatic variables of id or object
    type with a __strong qualifier. How about other ownership qualifiers? What will
    happen with __weak ownership qualifiers? The next source code is about id type
    variables with a __weak qualifier.


    `blk_t blk;`


    `{`

    `    id array = [[NSMutableArray alloc] init];`

    `    id __weak array2 = array;`

    `    blk = [^(id obj) {`


    `        [array2 addObject:obj];`


    `        NSLog(@"array2 count = %ld", [array2 count]);`


    `    } copy];`

    `}`


    `blk([[NSObject alloc] init]);`

    `blk([[NSObject alloc] init]);`

    `blk([[NSObject alloc] init]);`


    The result is different from the result in the section, "“Capturing Objects.”


    `array2 count = 0`

    `array2 count = 0`

    `array2 count = 0`


    This is because the variable “array” is released and discarded when the variable
    scope is left, and nil is assigned to the variable “array2”. It just works as
    expected.


    What will happen when the __block specifier and __weak ownership qualifier are
    used at the same time?


    `blk_t blk;`


    `{`

    `    id array = [[NSMutableArray alloc] init];`

    `    __block id __weak array2 = array;`


    `    blk = [^(id obj) {`


    `        [array2 addObject:obj];`


    `        NSLog(@"array2 count = %ld", [array2 count]);`

    `    } copy];`

    `}`


    `blk([[NSObject alloc] init]);`

    `blk([[NSObject alloc] init]);`

    `blk([[NSObject alloc] init]);`


    The result is same as the previous one.


    `array2 count = 0`

    `array2 count = 0`

    `array2 count = 0`'
  trans: "\n相反，当堆上的 Block 因无人拥有所有权而被释放和销毁时，会调用 `dispose` 函数。它相当于对象的 `dealloc` 方法。通过这种机制，Block\
    \ 捕获的对象可以通过赋值给带有 `__strong` 限定符的自动变量，从而在变量作用域之外继续存在。虽然我们在“`__block` 说明符”一节中跳过了这部分内容，但这种包含\
    \ `copy` 和 `dispose` 函数的机制同样适用于 `__block` 变量。\n\n```\nstatic void __main_block_copy_0(\n\
    \    struct __main_block_impl_0*dst, struct __main_block_impl_0*src)\n{\n    _Block_object_assign(&dst->val,\
    \ src->val, BLOCK_FIELD_IS_BYREF);\n}\n\nstatic void __main_block_dispose_0(struct\
    \ __main_block_impl_0*src) {\n    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);\n\
    }\n```\n\n在转换后的源代码中，与 Block 结构体相关的部分几乎相同，唯一的区别列在表 5-5 中。\n\n![images](img/t0505.jpg)\n\
    \n参数 `BLOCK_FIELD_IS_OBJECT` 和 `BLOCK_FIELD_IS_BYREF` 用于切换 `copy` 和 `dispose`\
    \ 函数的目标是对象还是 `__block` 变量。\n\n与通过 `copy` 函数获取捕获对象的所有权、通过 `dispose` 函数释放所有权的方式相同，Block\
    \ 也通过 `copy` 函数获取 `__block` 变量的所有权，并通过 `dispose` 函数释放所有权。\n\n现在我们已经了解到，当对象被赋值给带有\
    \ `__strong` 的自动变量时，该对象可以在变量作用域之外继续存在；而当 `__block` 变量被复制到堆上，并且堆上的 Block 拥有其所有权时，它也可以在变量作用域之外继续存在。\n\
    \n### 何时应调用“copy”方法\n\n顺便问一下，在前面的源代码中，如果没有对 Block 调用实例方法 `copy`，会发生什么？\n\n```\n\
    blk_t blk;\n\n{\n    id array = [[NSMutableArray alloc] init];\n    blk = ^(id\
    \ obj) {\n        [array addObject:obj];\n        NSLog(@\"array count = %ld\"\
    , [array count]);\n    };\n}\n\nblk([[NSObject alloc] init]);\nblk([[NSObject\
    \ alloc] init]);\nblk([[NSObject alloc] init]);\n```\n\n结果是应用程序终止。\n\n只有当调用了 `_Block_copy`\
    \ 函数时，才会获取被捕获的、带有 `__strong` 限定符的对象类型自动变量的所有权。因此，举个例子，如果没有调用 `_Block_copy` 函数，即使对象被捕获，它也会被销毁。所以，当你在\
    \ Block 内部使用对象类型的自动变量时，应该对 Block 调用实例方法 `copy`，但以下情况除外。\n\n* 当 Block 从函数返回时\n\
    * 当 Block 被赋值给 `id` 类型或 Block 类型类的成员变量，且该变量带有 `__strong` 限定符时\n* 当 Block 被传递给\
    \ Cocoa 框架中包含 `usingBlock` 的方法，或 Grand Central Dispatch API 时\n\n接下来，让我们看看当对象存储在\
    \ `__block` 变量中时会发生什么。\n\n### `__block` 变量与对象\n\n`__block` 说明符可用于任何类型的自动变量。接下来看看如何使用它来将一个\
    \ Objective-C 对象赋值给一个 `id` 类型的自动变量。\n\n```\n__block id obj = [[NSObject alloc]\
    \ init];\n```\n\n这等价于：\n\n```\n__block id __strong obj = [[NSObject alloc] init];\n\
    ```\n\n当启用 ARC 时，`id` 或对象类型的变量总是带有所有权限定符，并且其默认值是 `__strong`。clang 会按如下方式进行转换。\n\
    \n```\n/* __block 变量的结构体 */\n\nstruct __Block_byref_obj_0 {\n    void *__isa;\n\
    \    __Block_byref_obj_0 *__forwarding;\n    int __flags;\n    int __size;\n \
    \   void (*__Block_byref_id_object_copy)(void*, void*);\n    void (*__Block_byref_id_object_dispose)(void*);\n\
    \    __strong id obj;\n};\n\nstatic void __Block_byref_id_object_copy_131(void\
    \ *dst, void *src) {\n    _Block_object_assign((char*)dst + 40, *(void * *) ((char*)src\
    \ + 40), 131);\n}\n\nstatic void __Block_byref_id_object_dispose_131(void *src)\
    \ {\n    _Block_object_dispose(*(void * *) ((char*)src + 40), 131);\n}\n\n/* __block\
    \ 变量声明 */\n\n __Block_byref_obj_0 obj = {\n    0,\n    &obj,\n    0x2000000,\n\
    \    sizeof(__Block_byref_obj_0),\n    __Block_byref_id_object_copy_131,\n   \
    \ __Block_byref_id_object_dispose_131,\n    [[NSObject alloc] init]\n};\n```\n\
    \n这里使用了上一节中解释过的 `_Block_object_assign` 和 `_Block_object_dispose` 函数。\n\n当一个 `id`\
    \ 或对象类型的自动变量被 Block 捕获，并且 Block 从栈复制到堆时，会调用 `_Block_object_assign` 函数，以便 Block\
    \ 获取被捕获对象的所有权。当堆上的 Block 被销毁时，会调用 `_Block_object_dispose` 函数来释放被捕获的对象。\n\n当带有\
    \ `__strong` 限定符的 `id` 或对象类型的自动变量同时具有 `__block` 说明符时，也会发生同样的情况。当 `__block` 变量从栈复制到堆时，会调用\
    \ `_Block_object_assign` 函数，以便 Block 获取 `__block` 变量的所有权。当堆上的 `__block` 变量被销毁时，会调用\
    \ `_Block_object_dispose` 函数来释放 `__block` 变量中的对象。\n\n现在我们明白了，只要带有 `__strong` 限定符的对象类型\
    \ `__block` 变量存在于堆上，赋值给该 `__block` 变量的对象同样会存在，并且其所有权得到妥善管理。这就好比一个被赋值给带有 `__strong`\
    \ 限定符的对象类型自动变量的对象，在 Block 内部被使用一样。\n\n顺便提一下，到目前为止，我们只学习了带有 `__strong` 限定符的 `id`\
    \ 或对象类型的自动变量。其他所有权限定符的情况又如何呢？使用 `__weak` 所有权限定符会发生什么？下面的源代码是关于带有 `__weak` 限定符的\
    \ `id` 类型变量。\n\n```\nblk_t blk;\n\n{\n    id array = [[NSMutableArray alloc] init];\n\
    \    id __weak array2 = array;\n    blk = [^(id obj) {\n\n        [array2 addObject:obj];\n\
    \n        NSLog(@\"array2 count = %ld\", [array2 count]);\n\n    } copy];\n}\n\
    \nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\nblk([[NSObject\
    \ alloc] init]);\n```\n\n结果与“捕获对象”一节中的结果不同。\n\n```\narray2 count = 0\narray2 count\
    \ = 0\narray2 count = 0\n```\n\n这是因为当离开变量作用域时，变量 `array` 被释放并丢弃，并且将 `nil` 赋值给了变量\
    \ `array2`。这正如所预期的那样工作。\n\n如果同时使用 `__block` 说明符和 `__weak` 所有权限定符，会发生什么？\n\n```\n\
    blk_t blk;\n\n{\n    id array = [[NSMutableArray alloc] init];\n    __block id\
    \ __weak array2 = array;\n\n    blk = [^(id obj) {\n\n        [array2 addObject:obj];\n\
    \n        NSLog(@\"array2 count = %ld\", [array2 count]);\n    } copy];\n}\n\n\
    blk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\nblk([[NSObject alloc]\
    \ init]);\n```\n\n结果与上一个相同。\n\n```\narray2 count = 0\narray2 count = 0\narray2\
    \ count = 0\n```\n"
- fmt: "即使带有`__block`说明符，当变量作用域结束，具有`__strong`修饰符的变量“array”会被释放并丢弃，然后因为“array2”被`__weak`修饰，`nil`会被赋值给变量“array2”。\n\
    \n具有`__unsafe_unretained`修饰符的变量就像一个简单的指针。无论它如何在Block内部使用或带有`__block`说明符，`__strong`或`__weak`修饰符的机制都不会起作用。因此，当你使用具有`__unsafe_unretained`修饰符的变量时，请注意不要通过悬垂指针访问已丢弃的对象。请参见[第2章](#Chapter02.html#ch2)，“`__unsafe_unretained`所有权修饰符”一节。\n\
    \n`__autoreleasing`修饰符假定不与Block一起使用，因此不应使用它。如果你将其与`__block`说明符一起使用，会发生编译错误。\n\n\
    ```\n__block id __autoreleasing obj = [[NSObject alloc] init];\n```\n\n因为对变量“obj”同时使用了`__autoreleasing`所有权修饰符和`__block`说明符，会发生编译错误：\n\
    \n```\nerror: __block variables cannot have __autoreleasing ownership\n    __block\
    \ id __autoreleasing obj = [[NSObject alloc] init];\n                        \
    \                               ^\n```\n\n### Blocks的循环引用\n\n如果Block使用了具有`__strong`修饰符的对象类型的自动变量，当Block从栈复制到堆时，Block将拥有该对象的所有权。这很容易导致循环引用。让我们看下面的例子。\n\
    \n```\ntypedef void (^blk_t)(void);\n\n@interface MyObject : NSObject\n{\n   \
    \ blk_t blk_;\n}\n@end\n\n@implementation MyObject\n\n- (id)init\n{\n    self\
    \ = [super init];\n    blk_ = ^{NSLog(@\"self = %@\", self);};\n    return self;\n\
    }\n\n- (void)dealloc\n{\n    NSLog(@\"dealloc\");\n}\n@end\n\nint main()\n{\n\
    \    id o = [[MyObject alloc] init];\n    NSLog(@\"%@\", o);\n    return 0;\n\
    }\n```\n\n在这个例子中，`MyObject`类的实例方法“dealloc”永远不会被调用。\n\n`MyObject`类的对象强引用了Block，该Block被赋值给Block类型成员变量“blk_”，这意味着`MyObject`类的对象拥有该Block的所有权。Block字面量在实例方法“init”中执行，并且它使用了具有`__strong`修饰符的`id`类型变量“self”。当Block字面量被赋值给成员变量“blk_”时，由该字面量生成的Block从栈被复制到堆。因为Block使用了“self”，所以Block拥有“self”的所有权。\n\
    \n因此，“self”拥有Block的所有权，Block也拥有“self”的所有权。这就形成了如图[5-10](#Chapter05.html#fig_5_10)所示的循环引用。\n\
    \n![images](images/9781430241164_Fig05-10.jpg)\n\n**图 5–10.** *Block成员变量的循环引用*\n\
    \n在这种情况下，编译器可以检测到循环引用。警告消息会正确显示。\n\n```\nwarning: capturing 'self' strongly in\
    \ this block is likely to lead\n        to a retain cycle [-Warc-retain-cycles]\n\
    \            blk_ = ^{NSLog(@\"self = %@\", self);};\n                       \
    \                  ^~~~\n\nnote: Block will be retained by an object strongly\
    \ retained by the\n        captured object\n            blk_ = ^{NSLog(@\"self\
    \ = %@\", self);};\n            ^~~~\n```\n\n为了避免循环引用，例如，你可以使用`__weak`修饰符声明一个变量，并将“self”赋值给它（[图\
    \ 5–11](#Chapter05.html#fig_5_11)）。\n\n```\n- (id)init\n{\n    self = [super init];\n\
    \    id __weak tmp = self;\n    blk_ = ^{NSLog(@\"self = %@\", tmp);};\n    return\
    \ self;\n}\n```\n\n![images](images/9781430241164_Fig05-11.jpg)\n\n**图 5–11.**\
    \ *避免Block成员变量的循环引用*\n\n在源代码中，只要Block存在，拥有该Block所有权的`MyObject`类的对象也就存在，这意味着赋值给变量“tmp”的“self”始终存在。因此，你不需要检查“tmp”是否为`nil`。\n\
    \n对于iOS 4或Snow Leopard应用程序，你必须使用`__unsafe_unretained`所有权修饰符来代替`__weak`。在这个例子中，你可以使用它而无需担心悬垂指针。\n\
    \n```\n- (id)init {\n    self = [super init];\n    id __unsafe_unretained tmp\
    \ = self;\n    blk_ = ^{NSLog(@\"self = %@\", tmp);};\n    return self;\n}\n```\n\
    \n并且，在接下来的源代码中，即使Block中没有使用到`self`，但因为捕获了`self`，所以会发生循环引用。\n\n```\n@interface\
    \ MyObject : NSObject\n{\n    blk_t blk_;\n    id obj_;\n}\n@end\n\n@implementation\
    \ MyObject\n- (id)init\n{\n    self = [super init];\n    blk_ = ^{NSLog(@\"obj_\
    \ = %@\", obj_);};\n    return self;\n}\n```\n\n你可以从警告消息中发现原因：\n\n```\nwarning:\
    \ capturing 'self' strongly in this Block is likely to lead\n        to a retain\
    \ cycle [-Warc-retain-cycles]\n            blk_ = ^{NSLog(@\"obj_ = %@\", obj_);};\n\
    \                                                                    ^~~~\nnote:\
    \ Block will be retained by an object strongly retained by the\n         captured\
    \ object\n            blk_ = ^{NSLog(@\"obj_ = %@\", obj_);};\n            ^~~~\n\
    ```"
  raw: 'Even with __block specifier, when the variable scope is left, the variable
    “array” with a __strong qualifier is released and discarded, and then nil is assigned
    to the variable “array2” because “array2” is qualified with __weak.


    A variable with a__unsafe_unretained qualifier is just same as a simple pointer.
    No matter how it is used, inside a Block or with a __block specifier, no mechanism
    for a __strong or __weak qualifier works. So, when you use a variable with __unsafe_unretained
    qualifier, please take care not to access a discarded object through the dangling
    pointer. Please see [Chapter 2](#Chapter02.html#ch2), the “__unsafe_unretained
    ownership qualifier” section.


    The __autoreleasing qualifier is not assumed to be used with a Block, and so it
    should not be used. If you use it with __block specifier, a compiling error occurs.


    `__block id __autoreleasing obj = [[NSObject alloc] init];`


    Because the __autoreleasing ownership qualifier and __block specifier are used
    for the variable “obj”, a compiling error occurs:


    `error: __block variables cannot have __autoreleasing ownership`

    `    __block id __autoreleasing obj = [[NSObject alloc] init];`

    `                                                       ^`


    ### Circular Reference with Blocks


    If a Block uses an automatic variable of object type with a __strong qualifier,
    when the Block is copied from the stack to the heap, the Block has the ownership
    of the object. It easily causes circular reference. Let’s see the next example.


    `typedef void (^blk_t)(void);`


    `@interface MyObject : NSObject`

    `{`

    `    blk_t blk_;`

    `}`

    `@end`


    `@implementation MyObject`


    `- (id)init`

    `{`

    `    self = [super init];`

    `    blk_ = ^{NSLog(@"self = %@", self);};`

    `    return self;`

    `}`


    `- (void)dealloc`

    `{`

    `    NSLog(@"dealloc");`

    `}`

    `@end`


    `int main()`

    `{`

    `    id o = [[MyObject alloc] init];`

    `    NSLog(@"%@", o);`

    `    return 0;`

    `}`


    In this example, the instance method “dealloc” of MyObject class is never called.


    The object of MyObject class has a strong reference to a Block, which is assigned
    to the Block type member variable “blk_”, meaning that the object of MyObject
    class has the ownership of the Block. The Block literal is executed in the instance
    method “init”, and it uses the id-type variable “self” with a __strong qualifier.
    When the Block literal is assigned to the member variable “blk_”, the Block, which
    is generated by the Block literal, is copied from the stack to the heap. The Block
    has ownership of “self”, because the Block uses “self”.


    So, “self” has ownership of the Block and the Block has ownership of “self”. This
    is a circular reference as shown in [Figure 5–10](#Chapter05.html#fig_5_10).


    ![images](images/9781430241164_Fig05-10.jpg)


    **Figure 5–10.** *Circular reference with a Block member variable*


    In this case, the compiler can detect the circular reference. The warning message
    is displayed properly.


    `warning: capturing ''self'' strongly in this block is likely to lead`

    `        to a retain cycle [-Warc-retain-cycles]`

    `            blk_ = ^{NSLog(@"self = %@", self);};`

    `                                         ^~~~`


    `note: Block will be retained by an object strongly retained by the`

    `        captured object`

    `            blk_ = ^{NSLog(@"self = %@", self);};`

    `            ^~~~`


    To avoid the circular reference, for instance, you can declare the variable with
    __weak qualifier and assign “self” to it ([Figure 5–11](#Chapter05.html#fig_5_11)).


    `- (id)init`

    `{`

    `    self = [super init];`

    `    id __weak tmp = self;`

    `    blk_ = ^{NSLog(@"self = %@", tmp);};`

    `    return self;`

    `}` ![images](images/9781430241164_Fig05-11.jpg)


    **Figure 5–11.** *Avoiding circular reference of a Block member variable*


    In the source code, as long as the Block exists, the object of MyObject class,
    which has ownership of the Block, exists as well, meaning that self, which is
    assigned to the variable “tmp” always exists. So, you don’t need to check if “tmp”
    is nil or not.


    For iOS4 or Snow Leopard applications, you have to use the __unsafe_unretained
    ownership qualifier instead of __weak. You can use it without worrying about a
    dangling pointer for this example.


    `- (id)init {`

    `    self = [super init];`

    `    id __unsafe_unretained tmp = self;`

    `    blk_ = ^{NSLog(@"self = %@", tmp);};`

    `    return self;`

    `}`


    And, in the next source code, circular reference occurs because self is captured
    even though self isn’t used in the Block.


    `@interface MyObject : NSObject`

    `{`

    `    blk_t blk_;`

    `    id obj_;`

    `}`

    `@end`


    `@implementation MyObject`

    `- (id)init`

    `{`

    `    self = [super init];`

    `    blk_ = ^{NSLog(@"obj_ = %@", obj_);};`

    `    return self;`

    `}`


    You can discover the reason from the warning message:


    `warning: capturing ''self'' strongly in this Block is likely to lead`

    `        to a retain cycle [-Warc-retain-cycles]`

    `            blk_ = ^{NSLog(@"obj_ = %@", obj_);};`

    `                                                                    ^~~~`

    `note: Block will be retained by an object strongly retained by the`

    `         captured object`

    `            blk_ = ^{NSLog(@"obj_ = %@", obj_);};`

    `            ^~~~`'
