    ## Introduction


    ### Preface


    This book is about ARC, Blocks, and Grand Central Dispatch in iOS and OS X. It’s
    a bit different from other books. In short, this book is quite deep, and explains
    the following.


    - ARC, a memory management mechanism newly introduced for iOS 5 and OS X Lion.

    - Blocks and Grand Central Dispatch, introduced for iOS 4 and OS X Snow Leopard,
    are mainly for writing multithreaded applications.


    These new technologies are essential to develop on iOS 5 and OS X Lion. Although
    they seem easy to understand, in fact, you will encounter pitfalls if you don’t
    really master them. In this book, I explain them along with the Apple’s source
    codes themselves so that you can have a deeper understanding than by just reading
    Apple’s references.


    ### Who This Book Is For


    - Those who understand C/C++, but not much Objective-C

    - Those who want to know how Objective-C source code works

    - Those who develop iOS or Mac applications and want to know more so they can
    move up to a higher level


