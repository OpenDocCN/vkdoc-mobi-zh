- fmt: "# You Have Ownership of Any Objects You Create\n\nYou use a method whose name\
    \ begins with one of the following, which means that you are creating an object\
    \ and have ownership of it.\n\n*   `alloc`\n*   `new`\n*   `copy`\n*   `mutableCopy`\n\
    \nLet’s see how to create an object with some example source code. The following\
    \ example uses the `alloc` method to create and have ownership of an object.\n\
    \n```\n/*\n * You create an object and have ownership.\n */\n\nid obj = [[NSObject\
    \ alloc] init];\n\n/*\n * Now, you have ownership of the object.\n */\n```\n\n\
    By calling the `NSObject` class method `alloc`, you create an object and take\
    \ ownership of it. The variable `obj` has a pointer to the created object. You\
    \ can also create it by using class method `new`. `[NSObject new]` and `[[NSObject\
    \ alloc] init]` do exactly the same thing.\n\n```\n/*\n * You create an object\
    \ and have ownership.\n */\n\nid obj = [NSObject new];\n\n/*\n * Now you have\
    \ ownership of the object.\n */\n```\n\n`NSObject` instance method `copy` creates\
    \ a copy of an object, the class of which has to adopt the `NSCopying` protocol\
    \ and `copyWithZone:` has to be implemented properly. Likewise, the `NSObject`\
    \ instance method `mutableCopy` creates a mutable copy of an object, the class\
    \ of which has to adopt the `NSMutableCopying` protocol and `mutableCopyWithZone:`\
    \ has to be implemented properly. The difference between `copy` and `mutableCopy`\
    \ is like that of `NSArray` and `NSMutableArray`. These methods create a new object\
    \ in the same way as `alloc` and `new` do; therefore, you have ownership of it.\n\
    \nAs previously described, when you use methods whose name begins with `alloc`,\
    \ `new`, `copy`, or `mutableCopy`, you create an object and have ownership. Following\
    \ are examples of method names.\n\n*   `allocMyObject`\n*   `newThatObject`\n\
    *   `copyThis`\n*   `mutableCopyYourObject`\n\nHowever, the naming convention\
    \ is not applied to the following methods.\n\n*   `allocate`\n*   `newer`\n* \
    \  `copying`\n*   `mutableCopyed`\n\n**NOTE:** Please use CamelCase for method\
    \ names. CamelCase is the practice of writing compound words or phrases in which\
    \ the elements are joined without spaces, with each element’s initial letter capitalized\
    \ within the compound. For method names, the first letter should be lowercase\
    \ as in camelCase. See Wikipedia, “CamelCase” [`http://en.wikipedia.org/wiki/CamelCase`](http://en.wikipedia.org/wiki/CamelCase)\n\
    \n# You Can Take Ownership of an Object Using `retain`\n\nSometimes methods that\
    \ are not in the `alloc`/`new`/`copy`/`mutableCopy` method group return an object.\
    \ In this case, you haven’t created it, so you don’t have ownership of it. The\
    \ following is an example with the `NSMutableArray` class method `array`.\n\n\
    ```\n/*\n * Obtain an object without creating it yourself or having ownership\n\
    \ */\n\nid obj = [NSMutableArray array];\n\n/*\n * The obtained object exists\
    \ and you don’t have ownership of it.\n */\n```\n\nThe variable `obj` has a reference\
    \ to the `NSMutableArray` object, but you don’t have ownership of it. To take\
    \ ownership, you have to use the `retain` method.\n\n```\n/*\n * Obtain an object\
    \ without creating it yourself or having ownership\n */\n\nid obj = [NSMutableArray\
    \ array];\n\n/*\n * The obtained object exists and you don’t have ownership of\
    \ it.\n */\n\n[obj retain];\n\n/*\n * Now you have ownership of it.\n */\n```\n\
    \nAfter calling the `retain` method, you have ownership of the object as if you\
    \ had obtained the object with the `alloc`/`new`/`copy`/`mutableCopy` method group.\n\
    \n# When No Longer Needed, You Must Relinquish Ownership of an Object You Own\n\
    \nWhen you own an object, but don’t need it anymore, you must relinquish ownership\
    \ by calling the `release` method.\n\n```\n/*\n * You create an object and have\
    \ ownership.\n */\n\nid obj = [[NSObject alloc] init];\n\n/*\n * Now you have\
    \ ownership of the object.\n */\n\n[obj release];\n\n/*\n * The object is relinquished.\n\
    \ *\n * Though the variable obj has the pointer to the object,\n * you can’t access\
    \ the object anymore.\n */\n```\n\nIn the above example, after an object is created\
    \ and the ownership is taken by `alloc`, you relinquished it by the `release`\
    \ method. You can do the same thing for retained objects as follows.\n\n## Relinquishing\
    \ Ownership of a Retained Object\n\n```\n/*\n * Obtain an object without creating\
    \ it yourself or having ownership\n */\n\nid obj = [NSMutableArray array];\n\n\
    /*\n * The obtained object exists and you don’t have ownership of it.\n */\n\n\
    [obj retain];\n\n/*\n * Now you have ownership of the object.\n */\n\n[obj release];\n\
    \n/*\n *  The object is relinquished.\n * You can’t access the object anymore.\n\
    \ */\n```\n\nYou have to relinquish ownership with the `release` method when you\
    \ have ownership of an object for both of these cases: you have created an object\
    \ and have ownership by calling the `alloc`/`new`/`copy`/`mutableCopy` method\
    \ group, or you have ownership by calling the `retain` method.\n\nNext, let’s\
    \ see how a method can return a created object.\n\n## Relinquishing Ownership\
    \ of a Retained Object\n\nThe following example shows how a method can return\
    \ a created object.\n\n```\n- (id)allocObject\n{\n      /*\n       * You create\
    \ an object and have ownership.\n       */\n    \n    id obj = [[NSObject alloc]\
    \ init];\n    \n     /*\n      * At this moment, this method has ownership of\
    \ the object.\n      */\n    \n    return obj;\n}\n```\n\nIf a method returns\
    \ an object of which the method has ownership, ownership is passed to the caller.\
    \ Also, please note that in order to be in the `alloc`/`new`/`copy`/`mutableCopy`\
    \ method group, the method name must begin with `alloc`.\n\n```\n/*\n * Obtain\
    \ an object without creating it yourself or having ownership\n */\n\nid obj1 =\
    \ [obj0 allocObject];\n\n/*\n * Now you have ownership of the object.\n */\n```\n\
    \nYou call the `allocObject` method, which means you create an object and have\
    \ ownership because the method name begins with `alloc`.\n\nNext, let’s see how\
    \ we can implement a method such as `[NSMutableArray array]`.\n\n## Returning\
    \ a New Object Without Ownership\n\n`[NSMutableArray array]` method returns a\
    \ new object without ownership taken by the caller. Let’s see how we can implement\
    \ this kind of method.\n\nWe can’t declare this kind of method with a name beginning\
    \ with `alloc`/`new`/`copy`/`mutableCopy`. In the following example, we use `object`\
    \ for the method name.\n\n```\n- (id)object\n{\n    id obj = [[NSObject alloc]\
    \ init];\n    \n     /*\n      * At this moment, this method has ownership of\
    \ the object.\n      */\n    \n    [obj autorelease];\n    \n     /*\n      *\
    \ The object exists, and you don’t have ownership of it.\n      */\n    \n   \
    \ return obj;\n}\n```\n\nTo implement such methods, we use the `autorelease` method\
    \ as above (see [Figure 1–6](#Chapter01.html#fig_1_6)). By calling `autorelease`,\
    \ you can return the created object without ownership. Autorelease offers a mechanism\
    \ to relinquish objects properly when the lifetime of the objects has ended.\n\
    \n![images](images/9781430241164_Fig01-06.jpg)\n\n**Figure 1–6.** *Difference\
    \ between release and autorelease*\n\nFor example, the class method of `NSMutableArray`,\
    \ `array` is implemented like this. Please note that in accordance with the naming\
    \ rule the method name doesn’t begin with `alloc`/`new`/`copy`/`mutableCopy`\n\
    \n```\nid obj1 = [obj0 object];\n\n/*\n * The obtained object exists and you don’t\
    \ have ownership of it.\n */\n```\n\nYou can take ownership of the autoreleased\
    \ object by the `retain` method.\n\n```\nid obj1 = [obj0 object];\n/*\n * The\
    \ obtained object exists and you don’t have ownership of it.\n */\n\n[obj1 retain];\n\
    \n/*\n * Now you have ownership of the object.\n */\n```\n\nI explain more `autorelease`\
    \ details in a later section."
  raw: '#### You Have Ownership of Any Objects You Create


    You use a method whose name begins with one of the following, which means that
    you are creating an object and have ownership of it.


    *   alloc

    *   new

    *   copy

    *   mutableCopy


    Let’s see how to create an object with some example source code. The following
    example uses the alloc method to create and have ownership of an object.


    ` /*`

    `  * You create an object and have ownership.`

    `  */`


    `id obj = [[NSObject alloc] init];`


    ` /*`

    `  * Now, you have ownership of the object.`

    `  */`


    By calling the NSObject class method alloc, you create an object and take ownership
    of it. The variable obj has a pointer to the created object. You can also create
    it by using class method new. [NSObject new] and [[NSObject alloc] init] do exactly
    the same thing.


    ` /*`

    `  * You create an object and have ownership.`

    `  */`


    `id obj = [NSObject new];`


    ` /*`

    `  * Now you have ownership of the object.`

    `  */`


    NSObject instance method “copy” creates a copy of an object, the class of which
    has to adopt the NSCopying protocol and copyWithZone: has to be implemented properly.
    Likewise, the NSObject instance method “mutableCopy” creates a mutable copy of
    an object, the class of which has to adopt the NSMutableCopying protocol and mutableCopyWithZone:
    has to be implemented properly. The difference between copy and mutableCopy is
    like that of NSArray and NSMutableArray. These methods create a new object in
    the same way as alloc and new do; therefore, you have ownership of it.


    As previously described, when you use methods whose name begins with alloc, new,
    copy, or mutableCopy, you create an object and have ownership. Following are examples
    of method names.


    *   allocMyObject

    *   newThatObject

    *   copyThis

    *   mutableCopyYourObject


    However, the naming convention is not applied to the following methods.


    *   allocate

    *   newer

    *   copying

    *   mutableCopyed


    **NOTE:** Please use CamelCase for method names. CamelCase is the practice of
    writing compound words or phrases in which the elements are joined without spaces,
    with each element’s initial letter capitalized within the compound. For method
    names, the first letter should be lowercase as in camelCase. See Wikipedia, “CamelCase”
    [`http://en.wikipedia.org/wiki/CamelCase`](http://en.wikipedia.org/wiki/CamelCase)


    #### You Can Take Ownership of an Object Using retain


    Sometimes methods that are not in the alloc/new/copy/mutableCopy method group
    return an object. In this case, you haven’t created it, so you don’t have ownership
    of it. The following is an example with the NSMutableArray class method array.


    ` /*`

    `  * Obtain an object without creating it yourself or having ownership`

    `  */`


    `id obj = [NSMutableArray array];`


    ` /*`

    `  * The obtained object exists and you don’t have ownership of it.`

    `  */`


    The variable obj has a reference to the NSMutableArray object, but you don’t have
    ownership of it. To take ownership, you have to use the retain method.


    ` /*`

    `  * Obtain an object without creating it yourself or having ownership`

    `  */`


    `id obj = [NSMutableArray array];`


    ` /*`

    `  * The obtained object exists and you don’t have ownership of it.`

    `  */`


    `[obj retain];`


    ` /*`

    `  * Now you have ownership of it.`

    `  */`


    After calling the “retain” method, you have ownership of the object as if you
    had obtained the object with the alloc/new/copy/mutableCopy method group.


    #### When No Longer Needed, You Must Relinquish Ownership of an Object You Own


    When you own an object, but don’t need it anymore, you must relinquish ownership
    by calling the release method.


    ` /*`

    `  * You create an object and have ownership.`

    `  */`


    `id obj = [[NSObject alloc] init];`


    ` /*`

    `  * Now you have ownership of the object.`

    `  */`


    `[obj release];`


    ` /*`

    `  * The object is relinquished.`

    `  *`

    `  * Though the variable obj has the pointer to the object,`

    `  * you can’t access the object anymore.`

    `  */`


    In the above example, after an object is created and the ownership is taken by
    alloc, you relinquished it by the release method. You can do the same thing for
    retained objects as follows.


    ##### Relinquishing Ownership of a Retained Object


    ` /*`

    `  * Obtain an object without creating it yourself or having ownership`

    `  */`


    `id obj = [NSMutableArray array];`


    ` /*`

    `  * The obtained object exists and you don’t have ownership of it.`

    `  */`


    `[obj retain];`


    ` /*`

    `  * Now you have ownership of the object.`

    `  */`


    `[obj release];`


    ` /*`

    `  *  The object is relinquished.`

    `  * You can’t access the object anymore.`

    `  */`


    You have to relinquish ownership with the release method when you have ownership
    of an object for both of these cases: you have created an object and have ownership
    by calling the alloc/new/copy/mutableCopy method group, or you have ownership
    by calling the retain method.


    Next, let’s see how a method can return a created object.


    ##### Relinquishing Ownership of a Retained Object


    The following example shows how a method can return a created object.


    `- (id)allocObject`

    `{`

    `      /*`

    `       * You create an object and have ownership.`

    `       */`


    `    id obj = [[NSObject alloc] init];`


    `     /*`

    `      * At this moment, this method has ownership of the object.`

    `      */`


    `    return obj;`

    `}`


    If a method returns an object of which the method has ownership, ownership is
    passed to the caller. Also, please note that in order to be in the alloc/new/copy/mutableCopy
    method group, the method name must begin with `alloc.`


    ` /*`

    `  * Obtain an object without creating it yourself or having ownership`

    `  */`


    `id obj1 = [obj0 allocObject];`


    ` /*`

    `  * Now you have ownership of the object.`

    `  */`


    You call the allocObject method, which means you create an object and have ownership
    because the method name begins with alloc.


    Next, let’s see how we can implement a method such as [NSMutableArray array].


    ##### Returning a New Object Without Ownership


    [NSMutableArray array] method returns a new object without ownership taken by
    the caller. Let’s see how we can implement this kind of method.


    We can’t declare this kind of method with a name beginning with alloc/new/copy/mutableCopy.
    In the following example, we use “object” for the method name.


    `- (id)object`

    `{`

    `    id obj = [[NSObject alloc] init];`


    `     /*`

    `      * At this moment, this method has ownership of the object.`

    `      */`


    `    [obj autorelease];`


    `     /*`

    `      * The object exists, and you don’t have ownership of it.`

    `      */`


    `    return obj;`

    `}`


    To implement such methods, we use the autorelease method as above (see [Figure
    1–6](#Chapter01.html#fig_1_6)). By calling autorelease, you can return the created
    object without ownership. Autorelease offers a mechanism to relinquish objects
    properly when the lifetime of the objects has ended.


    ![images](images/9781430241164_Fig01-06.jpg)


    **Figure 1–6.** *Difference between release and autorelease*


    For example, the class method of NSMutableArray, “array” is implemented like this.
    Please note that in accordance with the naming rule the method name doesn’t begin
    with alloc/new/copy/mutableCopy


    `id obj1 = [obj0 object];`


    ` /*`

    `  * The obtained object exists and you don’t have ownership of it.`

    `  */`


    You can take ownership of the autoreleased object by the retain method.


    `id obj1 = [obj0 object];`

    ` /*`

    `  * The obtained object exists and you don’t have ownership of it.`

    `  */`


    `[obj1 retain];`


    ` /*`

    `  * Now you have ownership of the object.`

    `  */`


    I explain more autorelease details in a later section.'
  trans: "\n# 你拥有所创建的任何对象的所有权\n\n当你使用的方法名以下列内容开头时，意味着你在创建一个对象并拥有其所有权。\n\n*   `alloc`\n\
    *   `new`\n*   `copy`\n*   `mutableCopy`\n\n让我们通过一些示例源码来看看如何创建一个对象。下面的示例使用了 `alloc`\
    \ 方法来创建并拥有一个对象的所有权。\n\n```\n/*\n * 你创建一个对象并拥有所有权。\n */\n\nid obj = [[NSObject\
    \ alloc] init];\n\n/*\n * 现在，你拥有了该对象的所有权。\n */\n```\n\n通过调用 `NSObject` 的类方法 `alloc`，你创建了一个对象并获得了它的所有权。变量\
    \ `obj` 持有一个指向所创建对象的指针。你也可以使用类方法 `new` 来创建它。`[NSObject new]` 和 `[[NSObject alloc]\
    \ init]` 的功能完全相同。\n\n```\n/*\n * 你创建一个对象并拥有所有权。\n */\n\nid obj = [NSObject new];\n\
    \n/*\n * 现在你拥有了该对象的所有权。\n */\n```\n\n`NSObject` 的实例方法 `copy` 创建一个对象的副本，该对象的类必须遵循\
    \ `NSCopying` 协议，并且 `copyWithZone:` 方法必须正确实现。同样地，`NSObject` 的实例方法 `mutableCopy`\
    \ 创建一个对象的可变副本，该对象的类必须遵循 `NSMutableCopying` 协议，并且 `mutableCopyWithZone:` 方法必须正确实现。`copy`\
    \ 和 `mutableCopy` 的区别类似于 `NSArray` 和 `NSMutableArray` 的区别。这些方法创建新对象的方式与 `alloc`\
    \ 和 `new` 相同；因此，你拥有其所有权。\n\n如前所述，当你使用名称以 `alloc`、`new`、`copy` 或 `mutableCopy`\
    \ 开头的方法时，你会创建一个对象并拥有其所有权。以下是方法名的一些示例。\n\n*   `allocMyObject`\n*   `newThatObject`\n\
    *   `copyThis`\n*   `mutableCopyYourObject`\n\n然而，这种命名约定并不适用于以下方法。\n\n*   `allocate`\n\
    *   `newer`\n*   `copying`\n*   `mutableCopyed`\n\n**注意：** 请对方法名使用驼峰命名法。驼峰命名法是一种书写复合词或短语的实践，其中各元素之间无空格连接，且每个元素的首字母在复合词中大写。对于方法名，首字母应为小写，即小驼峰命名法。请参考维基百科的“CamelCase”条目\
    \ [`http://en.wikipedia.org/wiki/CamelCase`](http://en.wikipedia.org/wiki/CamelCase)。\n\
    \n# 你可以使用 `retain` 获取对象的所有权\n\n有时，不属于 `alloc`/`new`/`copy`/`mutableCopy` 方法组的方法会返回一个对象。在这种情况下，你并未创建它，因此你对其没有所有权。以下是使用\
    \ `NSMutableArray` 类方法 `array` 的示例。\n\n```\n/*\n * 获取一个对象，而不自行创建或拥有所有权\n */\n\n\
    id obj = [NSMutableArray array];\n\n/*\n * 获取的对象存在，但你对其没有所有权。\n */\n```\n\n变量\
    \ `obj` 持有对 `NSMutableArray` 对象的引用，但你并不拥有其所有权。要获取所有权，你必须使用 `retain` 方法。\n\n```\n\
    /*\n * 获取一个对象，而不自行创建或拥有所有权\n */\n\nid obj = [NSMutableArray array];\n\n/*\n *\
    \ 获取的对象存在，但你对其没有所有权。\n */\n\n[obj retain];\n\n/*\n * 现在你拥有了该对象的所有权。\n */\n\n[obj\
    \ release];\n\n/*\n * 对象的所有权已被释放。\n *\n * 虽然变量 obj 还持有指向该对象的指针，\n * 但你不能继续访问该对象了。\n\
    \ */\n```\n\n调用 `retain` 方法后，你就拥有了该对象的所有权，就好像你是通过 `alloc`/`new`/`copy`/`mutableCopy`\
    \ 方法组获得它一样。\n\n# 不再需要时，你必须放弃你所拥有的对象的所有权\n\n当你拥有一个对象的所有权，但不再需要它时，你必须通过调用 `release`\
    \ 方法来放弃所有权。\n\n```\n/*\n * 你创建一个对象并拥有所有权。\n */\n\nid obj = [[NSObject alloc] init];\n\
    \n/*\n * 现在你拥有了该对象的所有权。\n */\n\n[obj release];\n\n/*\n * 对象的所有权已被释放。\n *\n * 虽然变量\
    \ obj 还持有指向该对象的指针，\n * 但你不能继续访问该对象了。\n */\n```\n\n在上面的例子中，通过 `alloc` 创建对象并获取所有权后，你通过\
    \ `release` 方法释放了它。对于通过 `retain` 获取所有权的对象，你可以执行类似的操作，如下所示。\n\n## 放弃 retain 对象的所有权\n\
    \n```\n/*\n * 获取一个对象，而不自行创建或拥有所有权\n */\n\nid obj = [NSMutableArray array];\n\n\
    /*\n * 获取的对象存在，但你对其没有所有权。\n */\n\n[obj retain];\n\n/*\n * 现在你拥有了该对象的所有权。\n */\n\
    \n[obj release];\n\n/*\n *  对象的所有权已被释放。\n * 你不能继续访问该对象了。\n */\n```\n\n无论是在以下哪种情况：通过调用\
    \ `alloc`/`new`/`copy`/`mutableCopy` 方法组创建对象并拥有所有权，还是通过调用 `retain` 方法拥有所有权，当你拥有一个对象的所有权时，都必须使用\
    \ `release` 方法放弃所有权。\n\n接下来，让我们看看一个方法如何返回一个已创建的对象。\n\n## 放弃 retain 对象的所有权\n\n\
    下面的示例展示了一个方法如何返回一个已创建的对象。\n\n```\n- (id)allocObject\n{\n      /*\n       * 你创建一个对象并拥有所有权。\n\
    \       */\n    \n    id obj = [[NSObject alloc] init];\n    \n     /*\n     \
    \ * 此时，此方法拥有该对象的所有权。\n      */\n    \n    return obj;\n}\n```\n\n如果一个方法返回了一个它拥有所有权的对象，那么所有权会传递给调用者。另外，请注意，为了归属于\
    \ `alloc`/`new`/`copy`/`mutableCopy` 方法组，方法名必须以 `alloc` 开头。\n\n```\n/*\n * 获取一个对象，而不自行创建或拥有所有权\n\
    \ */\n\nid obj1 = [obj0 allocObject];\n\n/*\n * 现在你拥有了该对象的所有权。\n */\n```\n\n你调用了\
    \ `allocObject` 方法，因为方法名以 `alloc` 开头，这意味着你创建了一个对象并拥有其所有权。\n\n接下来，让我们看看如何实现像 `[NSMutableArray\
    \ array]` 这样的方法。\n\n## 返回一个不附带所有权的新对象\n\n`[NSMutableArray array]` 方法返回一个新对象，但调用者不获取其所有权。让我们看看如何实现这类方法。\n\
    \n我们不能用 `alloc`/`new`/`copy`/`mutableCopy` 开头来命名这类方法。在下面的例子中，我们使用 `object` 作为方法名。\n\
    \n```\n- (id)object\n{\n    id obj = [[NSObject alloc] init];\n    \n     /*\n\
    \      * 此时，此方法拥有该对象的所有权。\n      */\n    \n    [obj autorelease];\n    \n    \
    \ /*\n      * 对象存在，但你对其没有所有权。\n      */\n    \n    return obj;\n}\n```\n\n为了实现此类方法，我们像上面那样使用\
    \ `autorelease` 方法（参见 图 1-6）。通过调用 `autorelease`，你可以在返回所创建的对象时不附带所有权。自动释放提供了一种机制，可以在对象的生命周期结束时妥善地释放它们。\n\
    \n![images](img/9781430241164_Fig01-06.jpg)\n\n**图 1-6.** *release 和 autorelease\
    \ 的区别*\n\n例如，`NSMutableArray` 的类方法 `array` 就是这样实现的。请注意，根据命名规则，该方法名不以 `alloc`/`new`/`copy`/`mutableCopy`\
    \ 开头。\n\n```\nid obj1 = [obj0 object];\n\n/*\n * 获取的对象存在，但你对其没有所有权。\n */\n```\n\
    \n你可以通过 `retain` 方法获取这个自动释放对象的所有权。\n\n```\nid obj1 = [obj0 object];\n/*\n * 获取的对象存在，但你对其没有所有权。\n\
    \ */\n\n[obj1 retain];\n\n/*\n * 现在你拥有了该对象的所有权。\n */\n```\n\n我将在后面的章节中更详细地解释 `autorelease`。\n"
- fmt: "# 你必须不能放弃一个你不拥有的对象的所有权\n\n如前所述，当你拥有对象的所有权时，你必须通过调用`release`方法来放弃它们。但是，当你通过其他方式获得对象时，绝对不能调用`release`方法。如果你这样做了，应用程序会崩溃。例如，在释放了一个你拥有所有权的对象后，如果你再次释放它，应用程序将会崩溃。\n\
    \n```\n/*\n * 你创建了一个对象并拥有其所有权。\n */\nid obj = [[NSObject alloc] init];\n\n/*\n\
    \ * 现在你拥有了该对象的所有权。\n */\n[obj release];\n\n/*\n * 对象的所有权已被放弃。\n */\n[obj release];\n\
    \n/*\n * 你放弃了一个你不拥有所有权的对象！\n * 应用程序将会崩溃！\n *\n * 在这些情况下应用程序会崩溃：\n * 当你对一个已经被销毁的对象调用\
    \ release 方法时。\n * 当你访问一个已经被销毁的对象时。\n */\n```\n\n另外，以下是一个释放你不拥有所有权的对象的示例：\n\n\
    ```\nid obj1 = [obj0 object];\n\n/*\n * 获得的对象存在，但你并不拥有其所有权。\n */\n[obj1 release];\n\
    \n/*\n * 你放弃了一个你不拥有所有权的对象！\n * 应用程序迟早会崩溃。\n */\n```\n\n如这些示例所示，你绝对不能放弃任何你不拥有所有权的对象。这会导致应用程序崩溃。\n\
    \n我们已经学习了四条规则，这些就是你在引用计数内存管理中需要考虑的全部内容。接下来，我们将学习`alloc`、`retain`、`release`和`dealloc`是如何实现的以及它们的工作原理。\n\
    \n## 实现 alloc、retain、release 和 dealloc\n\nOS X 和 iOS 的许多部分在 Apple Open Source\
    \ 中以开源软件的形式公开。如上所述，`alloc`、`retain`、`release`和`dealloc`是 Cocoa Framework 中 Foundation\
    \ Framework 内的`NSObject`类的方法。不幸的是，Foundation Framework 不是 Apple Open Source 的一部分。幸运的是，由于\
    \ Core Foundation Framework 是 Apple Open Source 的一部分，因此从`NSObject`使用的内存管理源代码是公开的。但是，如果没有`NSObject`本身的实现，就很难看到全貌。因此，让我们从\
    \ GNUstep 查看一个替代源代码。\n\nGNUstep 是与 Cocoa Framework 兼容的实现。虽然我们不能期望它与 Apple 的实现完全相同，但它以相同的方式工作，并且实现应该类似。理解\
    \ GNUstep 的源代码有助于我们推测 Apple 的 Cocoa 实现。\n\n### `alloc`方法\n\n让我们从 GNUstep 中`NSObject`类的`alloc`方法开始。作为旁注，本书中的一些源代码可能已经被修改以明确重要部分。\n\
    \n`NSObject`类的`alloc`方法被调用如下：\n\n```\nid obj = [NSObject alloc];\n```\n\n`alloc`\
    \ 在 `NSObject.m` 中的实现如 [Listing 1–1] 所示。\n\n**Listing 1–1.** *GNUstep/modules/core/base/Source/NSObject.m\
    \ alloc*\n\n```\n+ (id) alloc\n{\n    return [self allocWithZone: NSDefaultMallocZone()];\n\
    }\n\n+ (id) allocWithZone: (NSZone*)z\n{\n    return NSAllocateObject (self, 0,\
    \ z);\n}\n```\n\n在`allocWithZone:`方法内部，通过`NSAllocateObject`函数分配一个对象。实现如 [Listing\
    \ 1–2] 所示。\n\n__________\n\n¹ Apple, “Apple open source,” [`http://opensource.apple.com/`](http://opensource.apple.com/)\n\
    \n² GNUstep, “GNUstep.org,” [`http://gnustep.org/`](http://gnustep.org/)\n\n**Listing\
    \ 1–2.** *GNUstep/Modules/Core/Base/Source/NSObject.m NSAllocateObject*\n\n```\n\
    struct obj_layout {\n    NSUInteger  retained;\n};\n\ninline id\nNSAllocateObject\
