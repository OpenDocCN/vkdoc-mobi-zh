  raw: '##### You Must Not Relinquish Ownership of an Object You Don’t Own


    As previously described, when you have ownership of objects, you must relinquish
    them by calling the release method. However, you must not call the release method
    when you’ve obtained the object in some other way. If you do, the application
    will crash. For example, after releasing an object of which you have ownership,
    if you release it again, the application will crash.


    ` /*`

    `  * You create an object and have ownership.`

    `  */`


    `id obj = [[NSObject alloc] init];`


    ` /*`

    `  * Now you have ownership of the object.`

    `  */`


    `[obj release];`


    ` /*`

    `  * Object is relinquished.`

    `  */`


    `[obj release];`


    ` /*`

    `  * You relinquished the object, of which you don’t have ownership!`

    `  * The application will crash!`

    `  *`

    `  *  The applications will crash in these cases:`

    `  *  When you call the release method to an already-disposed-of object.`

    `  *  When you access an already-disposed-of object.`

    `  */`


    Also, the following is an example of releasing an object of which you don’t have
    ownership.


    `id obj1 = [obj0 object];`


    ` /*`

    `  * The obtained object exists and you don’t have ownership of it.`

    `  */`


    `[obj1 release];`


    ` /*`

    `  * You relinquished the object of which you don’t have ownership!`

    `  * The application will crash sooner or later.`

    `  */`


    As in these examples, you must not relinquish any objects of which you don’t have
    ownership. It causes the application to crash.


    We’ve learned four rules, which are all that you have to consider for memory management
    with reference counting. Next, we learn how alloc, retain, release, and dealloc
    are implemented and how they work.


    ### Implementing alloc, retain, release, and dealloc


    Many parts of OS X and iOS are publicly available as open source software at Apple
    Open Source.^([1](#Chapter01.html#CHP-1-FN-1)) As mentioned above, the alloc,
    retain, release, and dealloc are methods of the NSObject class.within the Foundation
    Framework, as part of the Cocoa Framework, Unfortunately, the Foundation Framework
    is not a part of Apple Open Source. Fortunately, because the Core Foundation Framework
    is a part of Apple Open Source, the source code for memory management that is
    used from NSObject is public. But still, without having the implementation of
    NSObject itself, it is hard to see the whole picture. So let’s check an alternative
    source code from GNUstep.^([2](#Chapter01.html#CHP-1-FN-2))


    GNUstep is a compatible implementation with the Cocoa Framework. Although we can’t
    expect it to be exactly the same as Apple’s implementation, it works in the same
    manner and the implementation should be similar. Understanding GNUstep source
    code helps us guess Apple’s Cocoa implementation.


    #### The alloc Method


    Let’s start with the `alloc` method of the NSObject class in GNUstep. As a side
    note, some source codes in this book might be modified to make the important part
    clear.


    The “alloc” method of the NSObject class is called as in:


    `id obj = [NSObject alloc];`


    The implementation of `alloc` in NSObject.m is shown in [Listing 1–1](#Chapter01.html#list_1_1).


    **Listing 1–1.** *GNUstep/modules/core/base/Source/NSObject.m alloc*


    `+ (id) alloc`

    `{`

    `    return [self allocWithZone: NSDefaultMallocZone()];`

    `}`


    `+ (id) allocWithZone: (NSZone*)z`

    `{`

    `    return NSAllocateObject (self, 0, z);`

    `}`


    Inside the allocWithZone: method, an object is allocated with the NSAllocateObject
    function. The implementation is shown in [Listing 1–2](#Chapter01.html#list_1_2).


    __________


    ¹ Apple, “Apple open source,” [`http://opensource.apple.com/`](http://opensource.apple.com/)


    ² GNUstep, “GNUstep.org,” [`http://gnustep.org/`](http://gnustep.org/)


    **Listing 1–2.** *GNUstep/Modules/Core/Base/Source/NSObject.m NSAllocateObject*


    `struct obj_layout {`

    `    NSUInteger  retained;`

    `};`


    `inline id`

    `NSAllocateObject (Class aClass, NSUInteger extraBytes, NSZone *zone)`

    `{`

    `    int size = /* needed size to store the object */`

    `    id new = NSZoneMalloc(zone, size);`

    `    memset(new, 0, size);`

    `    new = (id)&((struct obj_layout *)new)[1];`

    `}`


    The NSAllocateObject function calls NSZoneMalloc to allocate a memory area. After
    that, the area is filled with zero and the area pointer is returned.


    **NOTE:** Originally, NSZone was used to prevent memory fragmentation ([Figure
    1–7](#Chapter01.html#fig_1_7)). By switching zones case by case, memory allocation
    could be more effective.


    But nowadays, Objective-C runtime just ignores zones as you can see at “Transition
    to ARC Release Notes.”^([3](#Chapter01.html#CHP-1-FN-3)) Because a recent runtime
    memory management algorithm is effective enough, using zones is not considered
    meaningful or worthwhile because of the complexity.


    ![images](images/9781430241164_Fig01-07.jpg)


    **Figure 1–7.** *Preventing fragmentation using multiple Zones.*


    By removing NSZone-related code, the alloc method can be simply rewritten as in
    [Listing 1–3](#Chapter01.html#list_1_3).


    __________


    ³ Apple, “Transition to ARC Release Notes.”, [`http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html`](http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html)


    **Listing 1–3.** *GNUstep/modules/core/base/Source/NSObject.m alloc simplified*


    `struct obj_layout {`

    `    NSUInteger  retained;`

    `};`


    `+ (id) alloc`

    `{`

    `    int size = sizeof(struct obj_layout) + size_of_the_object;`

    `    struct obj_layout *p = (struct obj_layout *)calloc(1, size);`

    `    return (id)(p + 1);`

    `}`


    Now that you understand how the alloc method works, let’s move on to `retain`.'
  trans: "\n# 你必须不能放弃一个你不拥有所有权的对象\n\n如前所述，当你拥有对象的所有权时，你必须通过调用`release`方法来放弃它们。但是，当你通过其他方式获得对象时，绝对不能调用`release`方法。如果你这样做了，应用程序会崩溃。例如，在释放了一个你拥有所有权的对象后，如果你再次释放它，应用程序将会崩溃。\n\
    \n```\n/*\n * 你创建了一个对象并拥有其所有权。\n */\nid obj = [[NSObject alloc] init];\n\n/*\n\
    \ * 现在你拥有了该对象的所有权。\n */\n[obj release];\n\n/*\n * 对象的所有权已被放弃。\n */\n[obj release];\n\
    \n/*\n * 你放弃了一个你不拥有所有权的对象！\n * 应用程序将会崩溃！\n *\n * 在这些情况下应用程序会崩溃：\n * 当你对一个已经被销毁的对象调用\
    \ release 方法时。\n * 当你访问一个已经被销毁的对象时。\n */\n```\n\n另外，以下是一个释放你不拥有所有权的对象的示例：\n\n\
    ```\nid obj1 = [obj0 object];\n\n/*\n * 获得的对象存在，但你并不拥有其所有权。\n */\n[obj1 release];\n\
    \n/*\n * 你放弃了一个你不拥有所有权的对象！\n * 应用程序迟早会崩溃。\n */\n```\n\n如这些示例所示，你绝对不能放弃任何你不拥有所有权的对象。这会导致应用程序崩溃。\n\
    \n我们已经学习了四条规则，这些就是你在引用计数内存管理中需要考虑的全部内容。接下来，我们将学习`alloc`、`retain`、`release`和`dealloc`是如何实现的以及它们的工作原理。\n\
    \n## 实现 alloc、retain、release 和 dealloc\n\nOS X 和 iOS 的许多部分在 Apple Open Source\
    \ 中以开源软件的形式公开。如上所述，`alloc`、`retain`、`release`和`dealloc`是 Cocoa Framework 中 Foundation\
    \ Framework 内的`NSObject`类的方法。不幸的是，Foundation Framework 不是 Apple Open Source 的一部分。幸运的是，由于\
    \ Core Foundation Framework 是 Apple Open Source 的一部分，因此从`NSObject`使用的内存管理源代码是公开的。但是，如果没有`NSObject`本身的实现，就很难看到全貌。因此，让我们从\
    \ GNUstep 查看一个替代源代码。\n\nGNUstep 是与 Cocoa Framework 兼容的实现。虽然我们不能期望它与 Apple 的实现完全相同，但它以相同的方式工作，并且实现应该类似。理解\
    \ GNUstep 的源代码有助于我们推测 Apple 的 Cocoa 实现。\n\n### `alloc`方法\n\n让我们从 GNUstep 中`NSObject`类的`alloc`方法开始。作为旁注，本书中的一些源代码可能已经被修改以明确重要部分。\n\
    \n`NSObject`类的`alloc`方法被调用如下：\n\n```\nid obj = [NSObject alloc];\n```\n\n`alloc`\
    \ 在 `NSObject.m` 中的实现如 [Listing 1–1] 所示。\n\n**Listing 1–1.** *GNUstep/modules/core/base/Source/NSObject.m\
    \ alloc*\n\n```\n+ (id) alloc\n{\n    return [self allocWithZone: NSDefaultMallocZone()];\n\
    }\n\n+ (id) allocWithZone: (NSZone*)z\n{\n    return NSAllocateObject (self, 0,\
    \ z);\n}\n```\n\n在`allocWithZone:`方法内部，通过`NSAllocateObject`函数分配一个对象。实现如 [Listing\
    \ 1–2] 所示。\n\n__________\n\n¹ Apple, “Apple open source,” [`http://opensource.apple.com/`](http://opensource.apple.com/)\n\
    \n² GNUstep, “GNUstep.org,” [`http://gnustep.org/`](http://gnustep.org/)\n\n**Listing\
    \ 1–2.** *GNUstep/Modules/Core/Base/Source/NSObject.m NSAllocateObject*\n\n```\n\
    struct obj_layout {\n    NSUInteger  retained;\n};\n\ninline id\nNSAllocateObject\
    \ (Class aClass, NSUInteger extraBytes, NSZone *zone)\n{\n    int size = /* 存储对象所需的尺寸\
    \ */\n    id new = NSZoneMalloc(zone, size);\n    memset(new, 0, size);\n    new\
    \ = (id)&((struct obj_layout *)new)[1];\n}\n```\n\n`NSAllocateObject`函数调用`NSZoneMalloc`来分配一个内存区域。之后，该区域被填充为零，并返回该区域的指针。\n\
    \n**注意：** 最初，`NSZone`用于防止内存碎片化（[Figure 1–7]）。通过在不同情况下切换区域，内存分配可以更有效。\n\n但如今，正如你在“Transition\
    \ to ARC Release Notes”中所看到的，Objective-C 运行时只是忽略了区域。因为近期的运行时内存管理算法已经足够有效，由于复杂性，使用区域被认为没有意义或不值得。\n\
    \n![images](img/9781430241164_Fig01-07.jpg)\n\n**Figure 1–7.** *使用多个区域防止碎片化。*\n\
    \n通过移除与`NSZone`相关的代码，`alloc`方法可以简单地重写为 [Listing 1–3] 所示。\n\n__________\n\n³ Apple,\
    \ “Transition to ARC Release Notes.”, [`http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html`](http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html)\n\
    \n**Listing 1–3.** *GNUstep/modules/core/base/Source/NSObject.m alloc 简化版*\n\n\
    ```\nstruct obj_layout {\n    NSUInteger  retained;\n};\n\n+ (id) alloc\n{\n \
    \   int size = sizeof(struct obj_layout) + size_of_the_object;\n    struct obj_layout\
    \ *p = (struct obj_layout *)calloc(1, size);\n    return (id)(p + 1);\n}\n```\n\
    \n现在你已经理解了`alloc`方法的工作原理，让我们继续学习`retain`。\n"
- fmt: "#### The `retain` Method\n\nThe `alloc` method returns a memory block filled\
    \ with zero containing a `struct obj_layout` header, which has a variable `retained`\
    \ to store the number of references. This number is called the reference count.\
    \ [Figure 1–8](#Chapter01.html#fig_1_8) shows the structure of an object in the\
    \ GNUstep implementation.\n\n![images](images/9781430241164_Fig01-08.jpg)\n\n\
    **Figure 1–8.** *Memory image of an object returned by `alloc`*\n\nYou can get\
    \ the reference count value by calling the `retainCount` method.\n\n```objectivec\n\
    id obj = [[NSObject alloc] init];\nNSLog(@\"retainCount=%d\", [obj retainCount]);\n\
    \n/*\n  * retainCount=1 is displayed.\n  */\n```\n\nJust after `alloc` is called,\
    \ the reference count is one. The next source code shows how the `retainCount`\
    \ function is implemented in GNUstep.\n\n**Listing 1–4.** *GNUstep/Modules/Core/Base/Source/NSObject.m\
    \ retainCount*\n\n```objectivec\n- (NSUInteger) retainCount\n{\n    return NSExtraRefCount(self)\
    \ + 1;\n}\n\ninline NSUInteger\nNSExtraRefCount(id anObject)\n{\n    return ((struct\
    \ obj_layout *)anObject)[-1].retained;\n}\n```\n\nThe source code searches the\
    \ header from the object pointer and gets the value of the `retained` variable\
    \ ([Figure 1–9](#Chapter01.html#fig_1_9)).\n\n![images](images/9781430241164_Fig01-09.jpg)\n\
    \n**Figure 1–9.** *Accessing the header from an object*\n\nBecause the memory\
    \ block is filled with zero when it is allocated, the value of `retained` is zero.\
    \ The `retainCount` function returns 1 by `NSExtraRefCount(self) + 1`. We can\
    \ guess that the `retain` or `release` method would modify the value by +1 or\
    \ −1.\n\n```objectivec\n[obj retain];\n```\n\nLet’s check the implementation of\
    \ the `retain` method, as in [Listing 1–5](#Chapter01.html#list_1_5).\n\n**Listing\
    \ 1–5.** *GNUstep/Modules/Core/Base/Source/NSObject.m retain*\n\n```objectivec\n\
    - (id) retain\n{\n    NSIncrementExtraRefCount(self);\n    return self;\n}\n\n\
    inline void\nNSIncrementExtraRefCount(id anObject)\n{\n    if (((struct obj_layout\
    \ *)anObject)[-1].retained == UINT_MAX - 1)\n        [NSException raise: NSInternalInconsistencyException\n\
    \            format: @\"NSIncrementExtraRefCount() asked to increment too far\"\
    ];\n\n    ((struct obj_layout *)anObject)[-1].retained++;\n}\n```\n\nAlthough\
    \ it has a few lines of code to throw an exception, when the variable `retained`\
    \ overflows, it is fundamentally incremented by one on the line `retained++`.\
    \ Next, we learn the `release` method the functionality of which is opposite to\
    \ the `retained` method.\n\n#### The `release` Method\n\nWe can easily guess that\
    \ the `release` method would have `retained--`. Also, it should have some codes\
    \ when the value becomes zero.\n\n```objectivec\n[obj release];\n```\n\nThe `release`\
    \ method is implemented as shown in [Listing 1–6](#Chapter01.html#list_1_6).\n\
    \n**Listing 1–6.** *GNUstep/Modules/Core/Base/Source/NSObject.m release*\n\n```objectivec\n\
    - (void) release\n{\n    if (NSDecrementExtraRefCountWasZero(self))\n    [self\
    \ dealloc];\n}\n\nBOOL\nNSDecrementExtraRefCountWasZero(id anObject)\n{\n    if\
    \ (((struct obj_layout *)anObject)[-1].retained == 0) {\n        return YES;\n\
    \    } else {\n        ((struct obj_layout *)anObject)[-1].retained--;\n     \
    \   return NO;\n    }\n}\n```\n\nAs we expected, `retained` is decremented by\
    \ one. If the value is zero, the object will be disposed of by the `dealloc` method.\
    \ Let’s see how the `dealloc` method is implemented.\n\n#### The `dealloc` Method\n\
    \n[Listing 1–7](#Chapter01.html#list_1_7) is the implementation of the `dealloc`\
    \ method.\n\n**Listing 1–7.** *GNUstep/Modules/Core/Base/Source/NSObject.m dealloc*\n\
    \n```objectivec\n- (void) dealloc\n{\n    NSDeallocateObject (self);\n}\n\ninline\
    \ void\nNSDeallocateObject(id anObject)\n{\n    struct obj_layout *o = &((struct\
    \ obj_layout *)anObject)[-1];\n    free(o);\n}\n```\n\nIt just disposes of a memory\
    \ block.\n\nWe have seen the implementation of `alloc`, `retain`, `release`, and\
    \ `dealloc` in GNUstep and have learned the following.\n\n- All Objective-C objects\
    \ have an integer value called the reference count.\n- The reference count is\
    \ incremented by one when one of `alloc`/`new`/`copy`/`mutableCopy` or `retain`\
    \ is called.\n- It is decremented by one when `release` is called.\n- `Dealloc`\
    \ is called when the integer counter becomes zero.\n\nNext, let’s check the implementation\
    \ by Apple."
  raw: '#### The retain Method


    The alloc method returns a memory block filled with zero containing a struct obj_layout
    header, which has a variable “retained” to store the number of references. This
    number is called the reference count. [Figure 1–8](#Chapter01.html#fig_1_8) shows
    the structure of an object in the GNUstep implementation.


    ![images](images/9781430241164_Fig01-08.jpg)


    **Figure 1–8.** *Memory image of an object returned by alloc*


    You can get the reference count value by calling the retainCount method.


    `id obj = [[NSObject alloc] init];`

    `NSLog(@"retainCount=%d", [obj retainCount]);`


    `/*`

    `  * retainCount=1 is displayed.`

    `  */`


    Just after alloc is called, the reference count is one. The next source code shows
    how the retainCount function is implemented in GNUstep.


    **Listing 1–4.** *GNUstep/Modules/Core/Base/Source/NSObject.m retainCount*


    `- (NSUInteger) retainCount`

    `{`

    `    return NSExtraRefCount(self) + 1;`

    `}`


    `inline NSUInteger`

    `NSExtraRefCount(id anObject)`

    `{`

    `    return ((struct obj_layout *)anObject)[-1].retained;`

    `}`


    The source code searches the header from the object pointer and gets the value
    of the retained variable ([Figure 1–9](#Chapter01.html#fig_1_9)).


    ![images](images/9781430241164_Fig01-09.jpg)


    **Figure 1–9.** *Accessing the header from an object*


    Because the memory block is filled with zero when it is allocated, the value of
    “retained” is zero. The retainCount function returns 1 by “NSExtraRefCount(self)
    + 1”. We can guess that the “retain” or “release” method would modify the value
    by +1 or −1.


    `[obj retain];`


    Let’s check the implementation of the “retain” method, as in [Listing 1–5](#Chapter01.html#list_1_5).


    **Listing 1–5.** *GNUstep/Modules/Core/Base/Source/NSObject.m retain*


    `- (id) retain`

    `{`

    `    NSIncrementExtraRefCount(self);`

    `    return self;`

    `}`


    `inline void`

    `NSIncrementExtraRefCount(id anObject)`

    `{`

    `    if (((struct obj_layout *)anObject)[-1].retained == UINT_MAX - 1)`

    `        [NSException raise: NSInternalInconsistencyException`

    `            format: @"NSIncrementExtraRefCount() asked to increment too far"];`


    `    ((struct obj_layout *)anObject)[-1].retained++;`

    `}`


    Although it has a few lines of code to throw an exception, when the variable “retained”
    overflows, it is fundamentally incremented by one on the line “retained++”. Next,
    we learn the “release” method the functionality of which is opposite to the “retained”
    method.


    #### The release Method


    We can easily guess that the “release” method would have “retained--”. Also, it
    should have some codes when the value becomes zero.


    `[obj release];`


    The “release” method is implemented as shown in [Listing 1–6](#Chapter01.html#list_1_6).


    **Listing 1–6.** *GNUstep/Modules/Core/Base/Source/NSObject.m release*


    `- (void) release`

    `{`

    `    if (NSDecrementExtraRefCountWasZero(self))`

    `    [self dealloc];`

    `}`


    `BOOL`

    `NSDecrementExtraRefCountWasZero(id anObject)`

    `{`

    `    if (((struct obj_layout *)anObject)[-1].retained == 0) {`

    `        return YES;`

    `    } else {`

    `        ((struct obj_layout *)anObject)[-1].retained--;`

    `        return NO;`

    `    }`

    `}`


    As we expected, “retained” is decremented by one. If the value is zero, the object
    will be disposed of by the “dealloc” method. Let’s see how the “dealloc” method
    is implemented.


    #### The dealloc Method


    [Listing 1–7](#Chapter01.html#list_1_7) is the implementation of the “dealloc”
    method.


    **Listing 1–7.** *GNUstep/Modules/Core/Base/Source/NSObject.m dealloc*


    `- (void) dealloc`

    `{`

    `    NSDeallocateObject (self);`

    `}`


    `inline void`

    `NSDeallocateObject(id anObject)`

    `{`

    `    struct obj_layout *o = &((struct obj_layout *)anObject)[-1];`

    `    free(o);`

    `}`


    It just disposes of a memory block.


    We have seen the implementation of alloc, retain, release, and dealloc in GNUstep
    and have learned the following.


    *   All Objective-C objects have an integer value called the reference count.

    *   The reference count is incremented by one when one of alloc/new/copy/mutableCopy
    or retain is called.

    *   It is decremented by one when release is called.

    *   Dealloc is called when the integer counter becomes zero.


    Next, let’s check the implementation by Apple.'
  trans: "\n#### `retain` 方法\n\n`alloc` 方法返回一个用零填充的内存块，其中包含一个 `struct obj_layout`\
    \ 头部，该头部有一个变量 `retained` 用于存储引用次数。这个数字被称为引用计数。图 1-8 展示了 GNUstep 实现中对象的结构。\n\n\
    ![images](img/9781430241164_Fig01-08.jpg)\n\n**图 1-8.** *`alloc` 返回的对象的内存映像*\n\
    \n你可以通过调用 `retainCount` 方法获取引用计数的值。\n\n```objectivec\nid obj = [[NSObject alloc]\
    \ init];\nNSLog(@\"retainCount=%d\", [obj retainCount]);\n\n/*\n  * 显示 retainCount=1\n\
    \  */\n```\n\n就在 `alloc` 被调用之后，引用计数为 1。下面的源代码展示了在 GNUstep 中 `retainCount` 函数是如何实现的。\n\
    \n**代码清单 1-4.** *GNUstep/Modules/Core/Base/Source/NSObject.m retainCount*\n\n\
    ```objectivec\n- (NSUInteger) retainCount\n{\n    return NSExtraRefCount(self)\
    \ + 1;\n}\n\ninline NSUInteger\nNSExtraRefCount(id anObject)\n{\n    return ((struct\
    \ obj_layout *)anObject)[-1].retained;\n}\n```\n\n该源代码从对象指针中查找头部，并获取 `retained`\
    \ 变量的值（图 1-9）。\n\n![images](img/9781430241164_Fig01-09.jpg)\n\n**图 1-9.** *从对象访问头部*\n\
    \n由于内存块在分配时被零填充，因此 `retained` 的值为零。`retainCount` 函数通过 `NSExtraRefCount(self) +\
    \ 1` 返回 1。我们可以推测，`retain` 或 `release` 方法会通过加 1 或减 1 来修改这个值。\n\n```objectivec\n\
    [obj retain];\n```\n\n让我们检查一下 `retain` 方法的实现，如代码清单 1-5 所示。\n\n**代码清单 1-5.** *GNUstep/Modules/Core/Base/Source/NSObject.m\
    \ retain*\n\n```objectivec\n- (id) retain\n{\n    NSIncrementExtraRefCount(self);\n\
    \    return self;\n}\n\ninline void\nNSIncrementExtraRefCount(id anObject)\n{\n\
    \    if (((struct obj_layout *)anObject)[-1].retained == UINT_MAX - 1)\n     \
    \   [NSException raise: NSInternalInconsistencyException\n            format:\
    \ @\"NSIncrementExtraRefCount() asked to increment too far\"];\n\n    ((struct\
    \ obj_layout *)anObject)[-1].retained++;\n}\n```\n\n虽然有一些代码行用于在变量 `retained` 溢出时抛出异常，但根本上它是在\
    \ `retained++` 这一行上加一。接下来，我们学习功能与 `retained` 方法相反的 `release` 方法。\n\n#### `release`\
    \ 方法\n\n我们可以轻松猜测到 `release` 方法会包含 `retained--`。同时，当该值变为零时，它也应该包含一些代码。\n\n```objectivec\n\
    [obj release];\n```\n\n`release` 方法的实现如代码清单 1-6 所示。\n\n**代码清单 1-6.** *GNUstep/Modules/Core/Base/Source/NSObject.m\
    \ release*\n\n```objectivec\n- (void) release\n{\n    if (NSDecrementExtraRefCountWasZero(self))\n\
    \    [self dealloc];\n}\n\nBOOL\nNSDecrementExtraRefCountWasZero(id anObject)\n\
    {\n    if (((struct obj_layout *)anObject)[-1].retained == 0) {\n        return\
    \ YES;\n    } else {\n        ((struct obj_layout *)anObject)[-1].retained--;\n\
    \        return NO;\n    }\n}\n```\n\n正如我们所料，`retained` 被减一。如果该值为零，则对象将通过 `dealloc`\
    \ 方法被释放。让我们看看 `dealloc` 方法是如何实现的。\n\n#### `dealloc` 方法\n\n代码清单 1-7 是 `dealloc`\
    \ 方法的实现。\n\n**代码清单 1-7.** *GNUstep/Modules/Core/Base/Source/NSObject.m dealloc*\n\
    \n```objectivec\n- (void) dealloc\n{\n    NSDeallocateObject (self);\n}\n\ninline\
    \ void\nNSDeallocateObject(id anObject)\n{\n    struct obj_layout *o = &((struct\
    \ obj_layout *)anObject)[-1];\n    free(o);\n}\n```\n\n它只是释放了一个内存块。\n\n我们已经看到了\
    \ GNUstep 中 `alloc`、`retain`、`release` 和 `dealloc` 的实现，并了解了以下内容。\n\n- 所有 Objective-C\
    \ 对象都有一个称为引用计数的整数值。\n- 当调用 `alloc`/`new`/`copy`/`mutableCopy` 或 `retain` 之一时，引用计数加一。\n\
    - 当调用 `release` 时，它减一。\n- 当整数计数器变为零时，会调用 `Dealloc`。\n\n接下来，让我们检查 Apple 的实现。\n"
- fmt: "### Apple’s Implementation of `alloc`, `retain`, `release`, and `dealloc`\n\
    \nAs I said earlier, the source code of the `NSObject` class itself is not publicly\
    \ available. We investigate how the implementation works using an Xcode debugger\
    \ (`lldb`) for iOS application. First, set a breakpoint at the `NSObject` class\
    \ method `alloc`. See what happens on the debugger. The following is the list\
    \ of functions called inside `alloc`.\n\n```\n+alloc\n+allocWithZone:\nclass_createInstance\n\
    calloc\n```\n\nThe `NSObject` class method `alloc` calls `allocWithZone:`. After\
    \ that, through the `class_createInstance` function, which is documented in the\
    \ Objective-C Runtime reference, the `calloc` function is called to allocate the\
    \ memory block.^([4](#Chapter01.html#CHP-1-FN-4)) There does not seem to be much\
    \ difference with the implementation of GNUstep. We can see the source code of\
    \ `class_createInstance` function in `objc4` library `runtime/objc-runtime-new.mm`.^([5](#Chapter01.html#CHP-1-FN-5))\n\
    \nHow about `NSObject` instance methods `retainCount`, `retain`, and `release`?\
    \ The following functions are called inside.\n\n```\n-retainCount\n__CFDoExternRefOperation\n\
    CFBasicHashGetCountOfKey\n\n-retain\n__CFDoExternRefOperation\nCFBasicHashAddValue\n\
    \n-release\n__CFDoExternRefOperation\nCFBasicHashRemoveValue\n```\n\n__________\n\
    \n⁴ Apple, “Objective-C Runtime Reference,” [`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html)\n\
    \n⁵ Apple, “Source Browser,” [`http://www.opensource.apple.com/source/objc4/`](http://www.opensource.apple.com/source/objc4/)\n\
    \n(Also, `-dealloc` will be called as well when `CFBasicHashRemoveValue` returns\
    \ 0.)\n\nIn all the above methods, the `__CFDoExternRefOperation` function is\
    \ called. Then the function calls similarly named functions. These functions are\
    \ public. As you can see, if the function names begin with `CF`, you can find\
    \ the source codes in the Core Foundation Framework. ^([6](#Chapter01.html#CHP-1-FN-6))\
    \ The source code in [Listing 1–8](#Chapter01.html#list_1_8) is the simplified\
    \ `__CFDoExternRefOperation` implementation in `CFRuntime.c`.\n\n**Listing 1–8.**\
    \ *CF/CFRuntime.c `__CFDoExternRefOperation`*\n\n```\nint __CFDoExternRefOperation(uintptr_t\
    \ op, id obj) {\n    CFBasicHashRef table = get hashtable from obj;\n    int count;\n\
    \n    switch (op) {\n    case OPERATION_retainCount:\n        count = CFBasicHashGetCountOfKey(table,\
    \ obj);\n        return count;\n\n    case OPERATION_retain:\n        CFBasicHashAddValue(table,\
    \ obj);\n        return obj;\n\n    case OPERATION_release:\n        count = CFBasicHashRemoveValue(table,\
    \ obj);\n        return 0 == count;\n    }\n}\n```\n\n`__CFDoExternRefOperation`\
    \ function is a dispatcher, which calls different functions for `retainCount`,\
    \ `retain`, or `release`. We can guess these methods would be as follows.\n\n\
    ```\n- (NSUInteger) retainCount\n{\n    return (NSUInteger)__CFDoExternRefOperation(OPERATION_retainCount,\
    \ self);\n}\n\n- (id) retain\n{\n    return (id)__CFDoExternRefOperation(OPERATION_retain,\
    \ self);\n}\n\n- (void) release\n{\n    return __CFDoExternRefOperation(OPERATION_release,\
    \ self);\n}\n```\n\n__________\n\n⁶ Apple, “Source Browser”, [`http://www.opensource.apple.com/source/CF/`](http://www.opensource.apple.com/source/CF/)\n\
    \nAs you can see in the `__CFDoExternRefOperation` function above, Apple’s implementation\
    \ seems to handle the reference count by a hash table (reference counter table)\
    \ as shown in [Figure 1–10](#Chapter01.html#fig_1_10).\n\n![images](images/9781430241164_Fig01-10.jpg)\n\
    \n**Figure 1–10**. *Managing Reference Counts with a hash table*\n\nIn the GNUstep\
    \ implementation, reference counts are in the header of each object’s memory block.\
    \ But in Apple–s implementation, all the reference counts are stored in entries\
    \ of a hash table. Although GNUstep implementation looks simpler and faster, there\
    \ might be some merit to Apple’s as well.\n\nHere are the benefits if reference\
    \ counts are stored in each object’s header as in GNUstep’s implementation:\n\n\
    *   Fewer codes.\n*   It is quite simple to manage the lifetime, because each\
    \ memory area of the reference count itself is included in the object memory area.\n\
    \nHow about if reference counts are stored in a hash table as in Apple’s?\n\n\
    *   Each object doesn’t have a header, thus there is no need to worry about alignment\
    \ issues for the header area.\n*   By iterating through the hash table entries,\
    \ memory blocks for each object are reachable.\n\nThe latter is especially useful\
    \ for debugging. When the memory area of some objects is broken and the table\
    \ is still there, the debugger can reach the objects’ pointers ([Figure 1–11](#Chapter01.html#fig_1_11)).\n\
    \n![images](images/9781430241164_Fig01-11.jpg)\n\n**Figure 1–11.** *Finding objects\
    \ in the Reference Count table*\n\nAlso, to detect memory leaks, instruments check\
    \ the entries of the table and determine whether someone has ownership of each\
    \ object.\n\nThat’s it for Apple’s implementation. Now that we have a better understanding\
    \ of how Apple has implemented things, there is one more item to learn regarding\
    \ memory management in Objective-C: autorelease.\n\n### Autorelease\n\nBecause\
    \ of its name, you might think that `autorelease` is something like ARC. But it\
    \ is not. It is more like “automatic variable” in the C language.^([7](#Chapter01.html#CHP-1-FN-7))\n\
    \nLet’s start by reviewing what automatic variable is in C. We then look at the\
    \ source code of GNUstep to understand how `autorelease` works, followed by Apple’s\
    \ implementation of `autorelease`."
  raw: '### Apple’s Implementation of alloc, retain, release, and dealloc


    As I said earlier, the source code of the NSObject class itself is not publicly
    available. We investigate how the implementation works using an Xcode debugger
    (lldb) for iOS application. First, set a breakpoint at the NSObject class method
    alloc. See what happens on the debugger. The following is the list of functions
    called inside alloc.


    `+alloc`

    `+allocWithZone:`

    `class_createInstance`

    `calloc`


    The NSObject class method alloc calls allocWithZone. After that, through the class_createInstance
    function, which is documented in the Objective-C Runtime reference, the calloc
    function is called to allocate the memory block.^([4](#Chapter01.html#CHP-1-FN-4))
    There does not seem to be much difference with the implementation of GNUstep.
    We can see the source code of class_createInstance function in objc4 library runtime/objc-runtime-new.mm.^([5](#Chapter01.html#CHP-1-FN-5))


    How about NSObject instance methods retainCount, retain, and release? The following
    functions are called inside.


    `-retainCount`

    `__CFDoExternRefOperation`

    `CFBasicHashGetCountOfKey`


    `-retain`

    `__CFDoExternRefOperation`

    `CFBasicHashAddValue`


    `-release`

    `__CFDoExternRefOperation`

    `CFBasicHashRemoveValue`


    __________


    ⁴ Apple, “Objective-C Runtime Reference,” [`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html)


    ⁵ Apple, “Source Browser,” [`http://www.opensource.apple.com/source/objc4/`](http://www.opensource.apple.com/source/objc4/)


    (Also, -dealloc will be called as well when CFBasicHashRemoveValue returns 0.)


    In all the above methods, the __CFDoExternRefOperation function is called. Then
    the function calls similarly named functions. These functions are public. As you
    can see, if the function names begin with CF, you can find the source codes in
    the Core Foundation Framework. ^([6](#Chapter01.html#CHP-1-FN-6)) The source code
    in [Listing 1–8](#Chapter01.html#list_1_8) is the simplified __CFDoExternRefOperation
    implementation in CFRuntime.c.


    **Listing 1–8.** *CF/CFRuntime.c __CFDoExternRefOperation*


    `int __CFDoExternRefOperation(uintptr_t op, id obj) {`

    `    CFBasicHashRef table = get hashtable from obj;`

    `    int count;`


    `    switch (op) {`

    `    case OPERATION_retainCount:`

    `        count = CFBasicHashGetCountOfKey(table, obj);`

    `        return count;`


    `    case OPERATION_retain:`

    `        CFBasicHashAddValue(table, obj);`

    `        return obj;`


    `    case OPERATION_release:`

    `        count = CFBasicHashRemoveValue(table, obj);`

    `        return 0 == count;`

    `    }`

    `}`


    __CFDoExternRefOperation function is a dispatcher, which calls different functions
    for retainCount, retain, or release. We can guess these methods would be as follows.


    `- (NSUInteger) retainCount`

    `{`

    `    return (NSUInteger)__CFDoExternRefOperation(OPERATION_retainCount, self);`

    `}`


    `- (id) retain`

    `{`

    `    return (id)__CFDoExternRefOperation(OPERATION_retain, self);`

    `}`


    `- (void) release`

    `{`

    `    return __CFDoExternRefOperation(OPERATION_release, self);`

    `}`


    __________


    ⁶ Apple, “Source Browser”, [`http://www.opensource.apple.com/source/CF/`](http://www.opensource.apple.com/source/CF/)


    As you can see in the __CFDoExternRefOperation function above, Apple’s implementation
    seems to handle the reference count by a hash table (reference counter table)
    as shown in [Figure 1–10](#Chapter01.html#fig_1_10).


    ![images](images/9781430241164_Fig01-10.jpg)


    **Figure 1–10**. *Managing Reference Counts with a hash table*


    In the GNUstep implementation, reference counts are in the header of each object’s
    memory block. But in Apple–s implementation, all the reference counts are stored
    in entries of a hash table. Although GNUstep implementation looks simpler and
    faster, there might be some merit to Apple’s as well.


    Here are the benefits if reference counts are stored in each object’s header as
    in GNUstep’s implementation:


    *   Fewer codes.

    *   It is quite simple to manage the lifetime, because each memory area of the
    reference count itself is included in the object memory area.


    How about if reference counts are stored in a hash table as in Apple’s?


    *   Each object doesn’t have a header, thus there is no need to worry about alignment
    issues for the header area.

    *   By iterating through the hash table entries, memory blocks for each object
    are reachable.


    The latter is especially useful for debugging. When the memory area of some objects
    is broken and the table is still there, the debugger can reach the objects’ pointers
    ([Figure 1–11](#Chapter01.html#fig_1_11)).


    ![images](images/9781430241164_Fig01-11.jpg)


    **Figure 1–11.** *Finding objects in the Reference Count table*


    Also, to detect memory leaks, instruments check the entries of the table and determine
    whether someone has ownership of each object.


    That’s it for Apple’s implementation. Now that we have a better understanding
    of how Apple has implemented things, there is one more item to learn regarding
    memory management in Objective-C: autorelease.


    ### Autorelease


    Because of its name, you might think that autorelease is something like ARC. But
    it is not. It is more like “automatic variable” in the C language.^([7](#Chapter01.html#CHP-1-FN-7))


    Let’s start by reviewing what automatic variable is in C. We then look at the
    source code of GNUstep to understand how autorelease works, followed by Apple’s
    implementation of autorelease.'
  trans: "\n### Apple 对 `alloc`、`retain`、`release` 和 `dealloc` 的实现\n\n如前所述，`NSObject`\
    \ 类本身的源代码并未公开。我们通过使用 Xcode 调试器（`lldb`）对 iOS 应用进行调试，来探究其实现方式。首先，在 `NSObject` 的类方法\
    \ `alloc` 处设置一个断点，观察调试器中发生的情况。以下是 `alloc` 内部调用的函数列表。\n\n```\n+alloc\n+allocWithZone:\n\
    class_createInstance\ncalloc\n```\n\n`NSObject` 的类方法 `alloc` 会调用 `allocWithZone:`。随后，通过\
    \ Objective-C Runtime 参考文档中记载的 `class_createInstance` 函数，调用了 `calloc` 函数来分配内存块。^(4)\
    \ 这与 GNUstep 的实现似乎没有太大差异。我们可以在 `objc4` 库的 `runtime/objc-runtime-new.mm` 文件中看到\
    \ `class_createInstance` 函数的源代码。^(5)\n\n那么 `NSObject` 的实例方法 `retainCount`、`retain`\
    \ 和 `release` 又是如何实现的呢？以下是它们内部调用的函数。\n\n```\n-retainCount\n__CFDoExternRefOperation\n\
    CFBasicHashGetCountOfKey\n\n-retain\n__CFDoExternRefOperation\nCFBasicHashAddValue\n\
    \n-release\n__CFDoExternRefOperation\nCFBasicHashRemoveValue\n```\n\n__________\n\
    \n⁴ Apple，“Objective-C Runtime Reference”，[`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html)\n\
    \n⁵ Apple，“Source Browser”，[`http://www.opensource.apple.com/source/objc4/`](http://www.opensource.apple.com/source/objc4/)\n\
    \n（此外，当 `CFBasicHashRemoveValue` 返回 0 时，`-dealloc` 也会被调用。）\n\n在上述所有方法中，都调用了 `__CFDoExternRefOperation`\
    \ 函数。然后该函数会调用名称相似的函数。这些函数是公开的。如你所见，如果函数名以 `CF` 开头，你可以在 Core Foundation 框架中找到其源代码。^(6)\
    \ 以下代码清单 1-8 是 `CFRuntime.c` 中简化后的 `__CFDoExternRefOperation` 实现。\n\n**清单 1-8.**\
    \ *CF/CFRuntime.c `__CFDoExternRefOperation`*\n\n```\nint __CFDoExternRefOperation(uintptr_t\
    \ op, id obj) {\n    CFBasicHashRef table = get hashtable from obj;\n    int count;\n\
    \n    switch (op) {\n    case OPERATION_retainCount:\n        count = CFBasicHashGetCountOfKey(table,\
    \ obj);\n        return count;\n\n    case OPERATION_retain:\n        CFBasicHashAddValue(table,\
    \ obj);\n        return obj;\n\n    case OPERATION_release:\n        count = CFBasicHashRemoveValue(table,\
    \ obj);\n        return 0 == count;\n    }\n}\n```\n\n`__CFDoExternRefOperation`\
    \ 函数是一个分发器，它为 `retainCount`、`retain` 或 `release` 调用不同的函数。我们可以推测这些方法的实现如下所示。\n\n\
    ```\n- (NSUInteger) retainCount\n{\n    return (NSUInteger)__CFDoExternRefOperation(OPERATION_retainCount,\
    \ self);\n}\n\n- (id) retain\n{\n    return (id)__CFDoExternRefOperation(OPERATION_retain,\
    \ self);\n}\n\n- (void) release\n{\n    return __CFDoExternRefOperation(OPERATION_release,\
    \ self);\n}\n```\n\n__________\n\n⁶ Apple，“Source Browser”，[`http://www.opensource.apple.com/source/CF/`](http://www.opensource.apple.com/source/CF/)\n\
    \n如上面的 `__CFDoExternRefOperation` 函数所示，Apple 的实现似乎通过一个哈希表（引用计数表）来处理引用计数，如图 1-10\
    \ 所示。\n\n![images](img/9781430241164_Fig01-10.jpg)\n\n**图 1-10**. *使用哈希表管理引用计数*\n\
    \n在 GNUstep 的实现中，引用计数位于每个对象内存块的头部。但在 Apple 的实现中，所有引用计数都存储在哈希表的条目中。尽管 GNUstep 的实现看起来更简单、更快，但\
    \ Apple 的实现也有其优点。\n\n如果将引用计数存储在对象头部（如 GNUstep 的实现），其优点如下：\n\n*   代码量更少。\n*   生命周期管理非常简单，因为引用计数本身的内存区域就包含在对象的内存区域中。\n\
    \n那么，如果像 Apple 那样将引用计数存储在哈希表中，又有哪些优点呢？\n\n*   每个对象没有头部信息，因此无需担心头部区域的对齐问题。\n* \
    \  通过遍历哈希表条目，可以访问每个对象的内存块。\n\n后者对于调试尤其有用。当某些对象的内存区域损坏而哈希表仍然存在时，调试器可以访问这些对象的指针（图\
    \ 1-11）。\n\n![images](img/9781430241164_Fig01-11.jpg)\n\n**图 1-11.** *在引用计数表中查找对象*\n\
    \n此外，为了检测内存泄漏，Instruments 工具会检查哈希表的条目，以确定是否有人拥有每个对象的所有权。\n\n以上就是关于 Apple 实现的介绍。现在我们对\
    \ Apple 的实现方式有了更好的理解，还需要学习关于 Objective-C 内存管理的另一个知识点：自动释放池（autorelease）。\n\n###\
    \ 自动释放池\n\n鉴于其名称，你可能会认为 `autorelease` 类似于 ARC。但事实并非如此。它更像是 C 语言中的“自动变量”。^(7)\n\
    \n让我们先回顾一下 C 语言中的自动变量是什么。然后，我们将查看 GNUstep 的源代码，以了解 `autorelease` 的工作原理，接着再介绍 Apple\
    \ 对 `autorelease` 的实现。\n"
- fmt: "### Automatic Variables\n\nAn *automatic variable* is a lexically scoped variable,\
    \ which is disposed of automatically when the execution leaves the scope.\n\n\
    ```\n{\n    int a;\n}\n```\n\n```\n/*\n   * Because the variable scope is left,\n\
    \   * auto variable 'int a' is disposed of and can't be accessed anymore.\n  \
    \ */\n```\n\nWith `autorelease`, you can use objects in the same manner as automatic\
    \ variables, meaning that when execution leaves a code block, the `release` method\
    \ is called on the object automatically. You can control the block itself as well.\n\
    \n__________\n\n⁷ Wikipedia, “Automatic Variable,” [http://en.wikipedia.org/wiki/Automatic_variable](http://en.wikipedia.org/wiki/Automatic_variable)\n\
    \nThe following steps and [Figure 1–12](#Chapter01.html#fig_1_12) show you how\
    \ to use the `autorelease` instance method.\n\n1.  Create an `NSAutoreleasePool`\
    \ object.\n2.  Call `autorelease` to allocated objects.\n3.  Discard the `NSAutoreleasePool`\
    \ object.\n\n![images](images/9781430241164_Fig01-12.jpg)\n\n**Figure 1–12.**\
    \ *Lifetime of an NSAutoreleasePool object*\n\nA code block between the creation\
    \ and disposal of the `NSAutoreleasePool` object is equivalent to the variable\
    \ scope in C. When an `NSAutoreleasePool` object is disposed of, the `release`\
    \ method is automatically called for all the autoreleased objects. Some example\
    \ source code is as follows.\n\n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool\
    \ alloc] init];\nid obj = [[NSObject alloc] init];\n[obj autorelease];\n[pool\
    \ drain];\n```\n\nIn the last line of the above source code, `[pool drain]` will\
    \ do `[obj release]`.\n\nIn the Cocoa Framework, `NSAutoreleasePool` objects are\
    \ created, owned, or disposed of all over the place, such as `NSRunLoop`, which\
    \ is the main loop of the application ([Figure 1–13](#Chapter01.html#fig_1_13)).\
    \ So, you don’t need to use the `NSAutoreleasePool` object explicitly.\n\n![images](images/9781430241164_Fig01-13.jpg)\n\
    \n**Figure 1–13.** *A NSAutoreleasePool object is created and disposed of each\
    \ time in NSRunLoop.*\n\nBut when there are too many autoreleased objects, application\
    \ memory becomes short ([Figure 1–14](#Chapter01.html#fig_1_14)). It happens because\
    \ the objects still exist until the `NSAutoreleasePool` object is discarded. A\
    \ typical example of this is loading and resizing many images. Many autoreleased\
    \ objects, such as `NSData` objects for reading files, `UImage` objects for the\
    \ data, and resized images exist at the same time.\n\n```\nfor (int i = 0; i <\
    \ numberOfImages; ++i) {\n    /*\n      * Processing images, such as loading,etc.\n\
    \      * Too many autoreleased objects exist,\n      * because NSAutoreleasePool\
    \ object is not discarded.\n      * At some point, it causes memory shortage.\n\
    \      */\n}\n```\n![images](images/9781430241164_Fig01-14.jpg)\n\n**Figure 1–14.**\
    \ *The increasing number of autoreleased objects*\n\nIn this case, you should\
    \ create and discard an `NSAutoreleasePool` object by yourself explicitly at the\
    \ appropriate time ([Figure 1–15](#Chapter01.html#fig_1_15)).\n\n```\nfor (int\
    \ i = 0; i < numberOfImages; ++i) {\n    NSAutoreleasePool *pool = [[NSAutoreleasePool\
    \ alloc] init];\n\n    /*\n      * Loading images, etc.\n      * Too many autoreleased\
    \ objects exist.\n      */\n\n    [pool drain];\n\n    /*\n      * All the autoreleased\
    \ objects are released by [pool drain].\n      */\n}\n```\n![images](images/9781430241164_Fig01-15.jpg)\n\
    \n**Figure 1–15.** *Autoreleased object should be properly released.*\n\nWith\
    \ the Cocoa Framework, you will see many class methods returning autoreleased\
    \ objects, such as the `arrayWithCapacity` method of the `NSMutableArray` class.\n\
    \n```\nid array = [NSMutableArray arrayWithCapacity:1];\n```\n\nThe above source\
    \ code is equivalent to:\n\n```\nid array = [[[NSMutableArray alloc] initWithCapacity:1]\
    \ autorelease];\n```\n\n### Implementing autorelease\n\nIn this section, we discuss\
    \ the implementation of `autorelease` in GNUstep as we did for `alloc`, `retain`,\
    \ `release`, and `dealloc` to learn how it works in detail.\n\n```\n[obj autorelease];\n\
    ```\n\nThis source code calls the `NSObject` instance method `autorelease`. [Listing\
    \ 1–9](#Chapter01.html#list_1_9) shows the implementation of the `autorelease`\
    \ method.\n\n**Listing 1–9.** *GNUstep/Modules/Core/Base/Source/NSObject.m autorelease*\n\
    \n```\n- (id) autorelease\n{\n    [NSAutoreleasePool addObject:self];\n}\n```\n\
    \nActually, `autorelease` just calls the `NSAutoreleasePool` class method `addObject`.\
    \ In GNUstep, it is implemented a bit different. But this is just for optimization\
    \ as you can see below.\n\n**OPTIMIZATION ON OBJECTIVE-C METHOD CALL**\n\nIn GNUstep,\
    \ the `autorelease` method is implemented in an irregular way for optimization\
    \ purposes. Because `autorelease` is called so often in iOS and OSX applications,\
    \ it has a special mechanism called IMP caching. When the framework is initialized,\
    \ it caches some search results, such as function pointers and name resolution\
    \ of classes and methods. If the mechanism doesn’t exist, these procedures have\
    \ to be done when `autorelease` is called.\n\n```\nid autorelease_class = [NSAutoreleasePool\
    \ class];\nSEL autorelease_sel = @selector(addObject:);\nIMP autorelease_imp =\
    \ [autorelease_class methodForSelector: autorelease_sel];\n```\n\nWhen the method\
    \ is called, it just returns a cached value.\n\n```\n- (id) autorelease\n{\n \
    \   (*autorelease_imp)(autorelease_class, autorelease_sel, self);\n}\n```\n\n\
    Above is the method call with IMP caching. It can be rewritten as follows if IMP\
    \ caching is not there. It is about two times faster with the caching mechanism\
    \ though, depending on the environment.\n\n```\n- (id) autorelease\n{\n    [NSAutoreleasePool\
    \ addObject:self];\n}\n```\n\nLet’s see the implementation of the `NSAutoreleasePool`\
    \ class. [Listing 1–10](#Chapter01.html#list_1_10) is a simplified source code\
    \ in `NSAutoreleasePool`.\n\n**Listing 1–10.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m\
    \ addObject*\n\n```\n+ (void) addObject: (id)anObj\n{\n    NSAutoreleasePool *pool\
    \ = getting active NSAutoreleasePool;\n    if (pool != nil) {\n        [pool addObject:anObj];\n\
    \    } else {\n        NSLog(@\"autorelease is called without active NSAutoreleasePool.\"\
    );\n    }\n}\n```\n\nThe class method `addObject` calls `NSAutoreleasePool` instance\
    \ method `addObject` for the active `NSAutoreleasePool` object. In the next example,\
    \ a variable `pool` is the active `NSAutoreleasePool` object.\n\n```\nNSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\nid obj = [[NSObject alloc] init];\n\
    [obj autorelease];\n```\n\nWhen multiple `NSAutoreleasePool` objects are created\
    \ and nested, the innermost object becomes active. In the next example, `pool2`\
    \ is active.\n\n```\nNSAutoreleasePool *pool0 = [[NSAutoreleasePool alloc] init];\n\
    \n    NSAutoreleasePool *pool1 = [[NSAutoreleasePool alloc] init];\n\n       \
    \ NSAutoreleasePool *pool2 = [[NSAutoreleasePool alloc] init];\n\n        id obj\
    \ = [[NSObject alloc] init];\n        [obj autorelease];\n\n        [pool2 drain];\n\
    \n    [pool1 drain];\n\n[pool0 drain];\n```\n\nNext, let’s take a look at the\
    \ implementation of the `NSAutoreleasePool` instance method `addObject` as well\
    \ ([Listing 1–11](#Chapter01.html#list_1_11)).\n\n**Listing 1–11.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m\
    \ addObject*\n\n```\n- (void) addObject: (id)anObj\n{\n    [array addObject:anObj];\n\
    }\n```\n\nIt adds the object to a mutable array. In the original GNUstep implementation,\
    \ linked list is used instead of array. Anyway, the object is stored in a container,\
    \ which means that when the instance method `autorelease` of `NSObject` is called,\
    \ the object is added to the container in an active `NSAutoreleasePool` object.\n\
    \n```\n[pool drain];\n```\n\nNext, let’s see how the active `NSAutoreleasePool`\
    \ object is disposed of when `drain` is called ([Listing 1–12](#Chapter01.html#list_1_12)).\n\
    \n**Listing 1–12.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m drain*\n\
    \n```\n- (void) drain\n{\n    [self dealloc];\n}\n\n- (void) dealloc\n{\n    [self\
    \ emptyPool];\n    [array release];\n}\n\n- (void) emptyPool\n{\n    for (id obj\
    \ in array) {\n        [obj release];\n    }\n}\n```\n\nWe can see that the `release`\
    \ method is called for all the objects in the pool."
  raw: '#### Automatic Variables


    An *automatic variable* is a lexically scoped variable, which is disposed of automatically
    when the execution leaves the scope.


    `{`

    `    int a;`

    `}`


    `/*`

    `   * Because the variable scope is left,`

    `   * auto variable ''int a'' is disposed of and can''t be accessed anymore.`

    `   */`


    With autorelease, you can use objects in the same manner as automatic variables,
    meaning that when execution leaves a code block, the “release” method is called
    on the object automatically. You can control the block itself as well.


    __________


    ⁷ Wikipedia, “Automatic Variable,” [`http://en.wikipedia.org/wiki/Automatic_variable`](http://en.wikipedia.org/wiki/Automatic_variable)


    The following steps and [Figure 1–12](#Chapter01.html#fig_1_12) show you how to
    use the “autorelease” instance method.


    1.  Create an NSAutoreleasePool object.

    2.  Call “autorelease” to allocated objects.

    3.  Discard the NSAutoreleasePool object.


    ![images](images/9781430241164_Fig01-12.jpg)


    **Figure 1–12.** *Lifetime of an NSAutoreleasePool object*


    A code block between the creation and disposal of the NSAutoreleasePool object
    is equivalent to the variable scope in C. When an NSAutoreleasePool object is
    disposed of, the release method is automatically called for all the autoreleased
    objects. Some example source code is as follows.


    `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`

    `id obj = [[NSObject alloc] init];`

    `[obj autorelease];`

    `[pool drain];`


    In the last line of the above source code, [pool drain] will do [obj release].


    In the Cocoa Framework, NSAutoreleasePool objects are created, owned, or disposed
    of all over the place, such as NSRunLoop, which is the main loop of the application
    ([Figure 1–13](#Chapter01.html#fig_1_13)). So, you don’t need to use the NSAutoreleasePool
    object explicitly.


    ![images](images/9781430241164_Fig01-13.jpg)


    **Figure 1–13.** *A NSAutoreleasePool object is created and disposed of each time
    in NSRunLoop.*


    But when there are too many autoreleased objects, application memory becomes short
    ([Figure 1–14](#Chapter01.html#fig_1_14)). It happens because the objects still
    exist until the NSAutoreleasePool object is discarded. A typical example of this
    is loading and resizing many images. Many autoreleased objects, such as NSData
    objects for reading files, UImage objects for the data, and resized images exist
    at the same time.


    `for (int i = 0; i < numberOfImages; ++i) {`

    `    /*`

    `      * Processing images, such as loading,etc.`

    `      * Too many autoreleased objects exist,`

    `      * because NSAutoreleasePool object is not discarded.`

    `      * At some point, it causes memory shortage.`

    `      */`

    `}` ![images](images/9781430241164_Fig01-14.jpg)


    **Figure 1–14.** *The increasing number of autoreleased objects*


    In this case, you should create and discard an NSAutoreleasePool object by yourself
    explicitly at the appropriate time ([Figure 1–15](#Chapter01.html#fig_1_15)).


    `for (int i = 0; i < numberOfImages; ++i) {`

    `    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


    `    /*`

    `      * Loading images, etc.`

    `      * Too many autoreleased objects exist.`

    `      */`


    `    [pool drain];`


    `    /*`

    `      * All the autoreleased objects are released by [pool drain].`

    `      */`

    `}` ![images](images/9781430241164_Fig01-15.jpg)


    **Figure 1–15.** *Autoreleased object should be properly released.*


    With the Cocoa Framework, you will see many class methods returning autoreleased
    objects, such as the “arrayWithCapacity” method of the NSMutableArray class.


    `id array = [NSMutableArray arrayWithCapacity:1];`


    The above source code is equivalent to:


    `id array = [[[NSMutableArray alloc] initWithCapacity:1] autorelease];`


    #### Implementing autorelease


    In this section, we discuss the implementation of `autorelease` in GNUstep as
    we did for `alloc`, `retain`, `release`, and `dealloc` to learn how it works in
    detail.


    `[obj autorelease];`


    This source code calls the NSObject instance method “autorelease”. [Listing 1–9](#Chapter01.html#list_1_9)
    shows the implementation of the autorelease method.


    **Listing 1–9.** *GNUstep/Modules/Core/Base/Source/NSObject.m autorelease*


    `- (id) autorelease`

    `{`

    `    [NSAutoreleasePool addObject:self];`

    `}`


    Actually, autorelease just calls the NSAutoreleasePool class method addObject.
    In GNUstep, it is implemented bit different. But this is just for optimization
    as you can see below.


    **OPTIMIZATION ON OBJECTIVE-C METHOD CALL**


    In GNUstep, the autorelease method is implemented in an irregular way for optimization
    purposes. Because autorelease is called so often in iOS and OSX applications,
    it has a special mechanism called IMP caching. When the framework is initialized,
    it caches some search results, such as function pointers and name resolution of
    classes and methods. If the mechanism doesn’t exist, these procedures have to
    be done when autorelease is called.


    `id autorelease_class = [NSAutoreleasePool class];`

    `SEL autorelease_sel = @selector(addObject:);`

    `IMP autorelease_imp = [autorelease_class methodForSelector: autorelease_sel];`


    When the method is called, it just returns a cached value.


    `- (id) autorelease`

    `{`

    `    (*autorelease_imp)(autorelease_class, autorelease_sel, self);`

    `}`


    Above is the method call with IMP caching. It can be rewritten as follows if IMP
    caching is not there. It is about two times faster with the caching mechanism
    though, depending on the environment.


    `- (id) autorelease`

    `{`

    `    [NSAutoreleasePool addObject:self];`

    `}`


    Let’s see the implementation of the NSAutoreleasePool class. [Listing 1–10](#Chapter01.html#list_1_10)
    is a simplified source code in NSAutoreleasePool.


    **Listing 1–10.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m addObject*


    `+ (void) addObject: (id)anObj`

    `{`

    `    NSAutoreleasePool *pool = getting active NSAutoreleasePool;`

    `    if (pool != nil) {`

    `        [pool addObject:anObj];`

    `    } else {`

    `        NSLog(@"autorelease is called without active NSAutoreleasePool.");`

    `    }`

    `}`


    The Class method “addObject” calls NSAutoreleasePool instance method “addObject”
    for the active NSAutoreleasePool object. In the next example, a variable “pool”
    is the active NSAutoreleasePool object.


    `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`

    `id obj = [[NSObject alloc] init];`

    `[obj autorelease];`


    When multiple NSAutoreleasePool objects are created and nested, the innermost
    object becomes active. In the next example, pool2 is active.


    `NSAutoreleasePool *pool0 = [[NSAutoreleasePool alloc] init];`


    `    NSAutoreleasePool *pool1 = [[NSAutoreleasePool alloc] init];`


    `        NSAutoreleasePool *pool2 = [[NSAutoreleasePool alloc] init];`


    `        id obj = [[NSObject alloc] init];`

    `        [obj autorelease];`


    `        [pool2 drain];`


    `    [pool1 drain];`


    `[pool0 drain];`


    Next, let’s take a look at the implementation of the NSAutoreleasePool instance
    method addObject as well ([Listing 1–11](#Chapter01.html#list_1_11)).


    **Listing 1–11.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m addObject*


    `- (void) addObject: (id)anObj`

    `{`

    `    [array addObject:anObj];`

    `}`


    It adds the object to a mutable array. In the original GNUstep implementation,
    linked list is used instead of array. Anyway, the object is stored in a container,
    which means that when the instance method “autorelease” of NSObject is called,
    the object is added to the container in an active NSAutoreleasePool object.


    `[pool drain];`


    Next, let’s see how the active NSAutoreleasePool object is disposed of when drain
    is called ([Listing 1–12](#Chapter01.html#list_1_12)).


    **Listing 1–12.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m drain*


    `- (void) drain`

    `{`

    `    [self dealloc];`

    `}`


    `- (void) dealloc`

    `{`

    `    [self emptyPool];`

    `    [array release];`

    `}`


    `- (void) emptyPool`

    `{`

    `    for (id obj in array) {`

    `        [obj release];`

    `    }`

    `}`


    We can see that the “release” method is called for all the objects in the pool.'
  trans: "\n### 自动变量\n\n*自动变量*是一种词法作用域变量，当执行流程离开其作用域时，会被自动销毁。\n\n```\n{\n    int a;\n\
    }\n```\n\n```\n/*\n   * 由于变量作用域已离开，\n   * 自动变量 'int a' 被销毁，无法再访问。\n   */\n```\n\
    \n使用 `autorelease`，你可以像操作自动变量一样使用对象，这意味着当执行流程离开代码块时，会自动对该对象调用 `release` 方法。你也可以自行控制代码块本身。\n\
    \n__________\n\n⁷ 维基百科，“自动变量”，[`en.wikipedia.org/wiki/Automatic_variable`](http://en.wikipedia.org/wiki/Automatic_variable)\n\
    \n以下步骤和图 1-12 展示了如何使用 `autorelease` 实例方法。\n\n1.  创建一个 `NSAutoreleasePool` 对象。\n\
    2.  对已分配的对象调用 `autorelease`。\n3.  销毁 `NSAutoreleasePool` 对象。\n\n![images](img/9781430241164_Fig01-12.jpg)\n\
    \n**图 1-12.** *NSAutoreleasePool 对象的生命周期*\n\n从创建 `NSAutoreleasePool` 对象到销毁它之间的代码块，等价于\
    \ C 语言中的变量作用域。当 `NSAutoreleasePool` 对象被销毁时，会自动对所有已自动释放的对象调用 `release` 方法。部分示例源代码如下。\n\
    \n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\nid obj = [[NSObject\
    \ alloc] init];\n[obj autorelease];\n[pool drain];\n```\n\n在上述源代码的最后一行，`[pool\
    \ drain]` 将会执行 `[obj release]`。\n\n在 Cocoa 框架中，`NSAutoreleasePool` 对象会在各处被创建、持有或销毁，例如在应用的主循环\
    \ `NSRunLoop` 中（图 1-13）。因此，你通常不需要显式地使用 `NSAutoreleasePool` 对象。\n\n![images](img/9781430241164_Fig01-13.jpg)\n\
    \n**图 1-13.** *在 NSRunLoop 中，每次都会创建和销毁一个 NSAutoreleasePool 对象。*\n\n但是，当自动释放的对象过多时，应用程序的内存会变得紧张（图\
    \ 1-14）。这是因为这些对象会一直存在，直到 `NSAutoreleasePool` 对象被销毁。一个典型的例子是加载并调整大量图片大小。届时，许多自动释放的对象，比如用于读取文件的\
    \ `NSData` 对象、表示数据的 `UImage` 对象以及调整大小后的图片，会同时存在。\n\n```\nfor (int i = 0; i < numberOfImages;\
    \ ++i) {\n    /*\n      * 处理图片，例如加载等。\n      * 由于 NSAutoreleasePool 对象未被销毁，\n\
    \      * 存在过多自动释放的对象。\n      * 到某个时刻，会导致内存不足。\n      */\n}\n```\n![images](img/9781430241164_Fig01-14.jpg)\n\
    \n**图 1-14.** *自动释放对象数量不断增长*\n\n在这种情况下，你应该在适当的时机自行显式地创建并销毁一个 `NSAutoreleasePool`\
    \ 对象（图 1-15）。\n\n```\nfor (int i = 0; i < numberOfImages; ++i) {\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n\n    /*\n      * 加载图片等。\n      *\
    \ 存在过多自动释放的对象。\n      */\n\n    [pool drain];\n\n    /*\n      * 所有自动释放的对象都通过\
    \ [pool drain] 被释放。\n      */\n}\n```\n![images](img/9781430241164_Fig01-15.jpg)\n\
    \n**图 1-15.** *自动释放的对象应被妥善释放。*\n\n在 Cocoa 框架中，你会看到许多类方法会返回自动释放的对象，例如 `NSMutableArray`\
    \ 类的 `arrayWithCapacity` 方法。\n\n```\nid array = [NSMutableArray arrayWithCapacity:1];\n\
    ```\n\n上述源代码等价于：\n\n```\nid array = [[[NSMutableArray alloc] initWithCapacity:1]\
    \ autorelease];\n```\n\n### 实现 autorelease\n\n在本节中，我们将像之前讨论 `alloc`、`retain`、`release`\
    \ 和 `dealloc` 的实现那样，讨论 GNUstep 中 `autorelease` 的实现，以深入了解其工作原理。\n\n```\n[obj autorelease];\n\
    ```\n\n这行源代码调用了 `NSObject` 的实例方法 `autorelease`。代码清单 1-9 展示了 `autorelease` 方法的实现。\n\
    \n**代码清单 1-9.** *GNUstep/Modules/Core/Base/Source/NSObject.m 中的 autorelease*\n\
    \n```\n- (id) autorelease\n{\n    [NSAutoreleasePool addObject:self];\n}\n```\n\
    \n实际上，`autorelease` 只是调用了 `NSAutoreleasePool` 的类方法 `addObject`。在 GNUstep 中，其实现略有不同，但这只是出于优化目的，如下所示。\n\
    \n**关于 Objective-C 方法调用的优化**\n\n在 GNUstep 中，`autorelease` 方法出于优化目的以一种非常规方式实现。由于在\
    \ iOS 和 OSX 应用中 `autorelease` 的调用非常频繁，它拥有一种称为 IMP 缓存的特殊机制。当框架初始化时，它会缓存一些查询结果，例如函数指针以及类和方法的名称解析。如果没有这种机制，每次调用\
    \ `autorelease` 时都需要执行这些过程。\n\n```\nid autorelease_class = [NSAutoreleasePool\
    \ class];\nSEL autorelease_sel = @selector(addObject:);\nIMP autorelease_imp =\
    \ [autorelease_class methodForSelector: autorelease_sel];\n```\n\n当方法被调用时，它仅返回一个缓存值。\n\
    \n```\n- (id) autorelease\n{\n    (*autorelease_imp)(autorelease_class, autorelease_sel,\
    \ self);\n}\n```\n\n以上是使用 IMP 缓存的方法调用。如果没有 IMP 缓存，它可以重写为如下形式。尽管速度取决于具体环境，但使用缓存机制大约可以快两倍。\n\
    \n```\n- (id) autorelease\n{\n    [NSAutoreleasePool addObject:self];\n}\n```\n\
    \n让我们来看看 `NSAutoreleasePool` 类的实现。代码清单 1-10 是 `NSAutoreleasePool` 中简化后的源代码。\n\n\
    **代码清单 1-10.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m 中的 addObject*\n\
    \n```\n+ (void) addObject: (id)anObj\n{\n    NSAutoreleasePool *pool = 获取当前活跃的\
    \ NSAutoreleasePool;\n    if (pool != nil) {\n        [pool addObject:anObj];\n\
    \    } else {\n        NSLog(@\"在没有活跃的 NSAutoreleasePool 的情况下调用了 autorelease。\"\
    );\n    }\n}\n```\n\n类方法 `addObject` 对活跃的 `NSAutoreleasePool` 对象调用其实例方法 `addObject`。在下一个例子中，变量\
    \ `pool` 就是活跃的 `NSAutoreleasePool` 对象。\n\n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool\
    \ alloc] init];\nid obj = [[NSObject alloc] init];\n[obj autorelease];\n```\n\n\
    当创建了多个嵌套的 `NSAutoreleasePool` 对象时，最内层的对象变为活跃状态。在下一个例子中，`pool2` 是活跃的。\n\n```\n\
    NSAutoreleasePool *pool0 = [[NSAutoreleasePool alloc] init];\n\n    NSAutoreleasePool\
    \ *pool1 = [[NSAutoreleasePool alloc] init];\n\n        NSAutoreleasePool *pool2\
    \ = [[NSAutoreleasePool alloc] init];\n\n        id obj = [[NSObject alloc] init];\n\
    \        [obj autorelease];\n\n        [pool2 drain];\n\n    [pool1 drain];\n\n\
    [pool0 drain];\n```\n\n接下来，让我们也看看 `NSAutoreleasePool` 实例方法 `addObject` 的实现（代码清单\
    \ 1-11）。\n\n**代码清单 1-11.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m\
    \ 中的 addObject*\n\n```\n- (void) addObject: (id)anObj\n{\n    [array addObject:anObj];\n\
    }\n```\n\n它将对象添加到一个可变数组中。在原始的 GNUstep 实现中，使用的是链表而非数组。无论如何，对象都被存储在一个容器中，这意味着当调用\
    \ `NSObject` 的实例方法 `autorelease` 时，该对象会被添加到活跃的 `NSAutoreleasePool` 对象的容器中。\n\n\
    ```\n[pool drain];\n```\n\n接下来，让我们看看当调用 `drain` 时，活跃的 `NSAutoreleasePool` 对象是如何被销毁的（代码清单\
    \ 1-12）。\n\n**代码清单 1-12.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m\
    \ 中的 drain*\n\n```\n- (void) drain\n{\n    [self dealloc];\n}\n\n- (void) dealloc\n\
    {\n    [self emptyPool];\n    [array release];\n}\n\n- (void) emptyPool\n{\n \
    \   for (id obj in array) {\n        [obj release];\n    }\n}\n```\n\n我们可以看到，池中的所有对象都被调用了\
    \ `release` 方法。\n"
- fmt: "#### Apple's Implementation of `autorelease`\n\nWe can see Apple's implementation\
    \ of `autorelease` in `runtime/objc-arr.mm` in the `objc4` library. The source\
    \ code is shown in [Listing 1–13](#Chapter01.html#list_1_13).\n\n**Listing 1–13.**\
    \ *`objc4/runtime/objc-arr.mm` class `AutoreleasePoolPage`*\n\n```\nclass AutoreleasePoolPage\n\
    {\n    static inline void *push()\n    {\n        /* It corresponds to creation\
    \ and ownership of an NSAutoreleasePool object */\n    }\n\n    static inline\
    \ void pop(void *token)\n    {\n        /* It corresponds to disposal of an NSAutoreleasePool\
    \ object */\n        releaseAll();\n    }\n\n    static inline id autorelease(id\
    \ obj)\n    {\n        /* It corresponds to NSAutoreleasePool class method addObject.\
    \ */\n        AutoreleasePoolPage *autoreleasePoolPage = /* getting active AutoreleasePoolPage\n\
    object */\n        autoreleasePoolPage->add(obj);\n    }\n\n    id *add(id obj)\n\
    \    {\n        /* add the obj to an internal array; */\n    }\n\n    void releaseAll()\n\
    \    {\n        /* calls release for all the objects in the internal array */\n\
    \    }\n};\n\nvoid *objc_autoreleasePoolPush(void)\n{\n    return AutoreleasePoolPage::push();\n\
    }\n\nvoid objc_autoreleasePoolPop(void *ctxt)\n{\n    AutoreleasePoolPage::pop(ctxt);\n\
    }\n\nid objc_autorelease(id obj)\n{\n    return AutoreleasePoolPage::autorelease(obj);\n\
    }\n```\n\nThe functions and the `AutoreleasePoolPage` class are implemented using\
    \ a C++ class and a dynamic array. The functions seem to work the same as in GNUstep.\
    \ As we did previously with the debugger, we investigate what functions are called\
    \ in the `autorelease` and `NSAutoreleasePool` class methods. These methods will\
    \ call `objc4` functions, which are related to `autorelease`:\n\n```\nNSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n/* equivalent to objc_autoreleasePoolPush()\
    \ */\n\nid obj = [[NSObject alloc] init];\n\n[obj autorelease];\n/* equivalent\
    \ to objc_autorelease(obj)  */\n\n[pool drain];\n/* equivalent to objc_autoreleasePoolPop(pool)\
    \ */\n```\n\nBy the way, in iOS, the `NSAutoreleasePool` class has a method to\
    \ check the status of `autorelease`d objects. The method, `showPools`, displays\
    \ the current status of `NSAutoreleasePool` to the console. It can be used only\
    \ for debugging purposes because it is a private method. You can use it as\n\n\
    ```\n[NSAutoreleasePool showPools];\n```\n\nWith the latest Objective-C runtime,\
    \ instead of the `showPools` method, `_objc_autoreleasePoolPrint()` is provided\
    \ because `showPools` works in iOS only. This method is also a private method\
    \ so you can use it for debugging purposes only.\n\n```\n/* declare function */\n\
    extern void _objc_autoreleasePoolPrint();\n\n/* display autoreleasepool status\
    \ for debug. */\n_objc_autoreleasePoolPrint();\n```\n\nThen you can see the status\
    \ of `AutoreleasePoolPage`. The result is as follows.\n\n```\nobjc[14481]: ##############\n\
    objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]: 14 releases\
    \ pending.\nobjc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]:\
    \ [0x6a85028]  ################  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]    \
    \     0x6719e40  __NSCFString\nobjc[14481]: [0x6a85030]  ################  POOL\
    \ 0x6a85030\nobjc[14481]: [0x6a85034]         0x7608100  __NSArrayI\nobjc[14481]:\
    \ [0x6a85038]         0x7609a60  __NSCFData\nobjc[14481]: [0x6a8503c]  ################\
    \  POOL 0x6a8503c\nobjc[14481]: [0x6a85040]         0x8808df0  __NSCFDictionary\n\
    objc[14481]: [0x6a85044]         0x760ab50  NSConcreteValue\nobjc[14481]: [0x6a85048]\
    \         0x760afe0  NSConcreteValue\nobjc[14481]: [0x6a8504c]         0x760b280\
    \  NSConcreteValue\nobjc[14481]: [0x6a85050]         0x760b2f0  __NSCFNumber\n\
    objc[14481]: [0x6a851a8]  ################  POOL 0x6a851a8\nobjc[14481]: [0x6a851ac]\
    \         0x741d1e0  Test\nobjc[14481]: [0x6a851b0]         0x671c660  NSObject\n\
    objc[14481]: ##############\n```\n\nIt is very useful to know if some objects\
    \ are `autorelease`d or not, as noted in the following sidebar.\n\n**AUTORELEASE\
    \ NSAUTORELEASEPOOL OBJECT**\n\nQuestion: What will happen if `autorelease` is\
    \ called on an `NSAutoreleasePool` object?\n\n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool\
    \ alloc] init];\n[pool autorelease];\n```\n\nAnswer: The application will be terminated.\n\
    \n```\n*** Terminating app due to uncaught exception 'NSInvalidArgumentException'\n\
    reason: '*** -[NSAutoreleasePool autorelease]:\nCannot autorelease an autorelease\
    \ pool'\n```\n\nWhen `autorelease` is called in Objective-C with the Foundation\
    \ framework, an `NSObject` instance method is called for in almost all the cases.\
    \ However, the `NSAutoreleasePool` class overrides `autorelease` to show an error\
    \ when `autorelease` is called on autoreleasepool.\n\n### Summary\n\nYou’ve learned\
    \ the following in this chapter.\n\n*   The concept of memory management with\
    \ reference counting\n*   How `alloc`, `retain`, `release`, and `dealloc` methods\
    \ are implemented\n*   The mechanism of `autorelease` and its implementation\n\
    \nThese items are important and still applicable even if ARC is introduced. In\
    \ the next chapter we learn how the situation will be changed.\n\n## Chapter 2\n\
    \n## ARC Rules\n\nIn the previous chapter, we reviewed memory management in Objective-C\
    \ for a non-ARC environment. But what happens when ARC is enabled? This chapter\
    \ explores the changes incurred when ARC is employed. Automatic Reference Counting\
    \ was briefly explained in [Chapter 1](#Chapter01.html#ch1), but it is really\
    \ best summarized in Apple’s own words:\n\n> *Automatic Reference Counting (ARC)\
    \ in Objective-C makes memory management the job of the compiler. By enabling\
    \ ARC with the new Apple LLVM compiler, you will never need to type `retain` or\
    \ `release` again, dramatically simplifying the development process, while reducing\
    \ crashes and memory leaks. The compiler has a complete understanding of your\
    \ objects, and releases each object the instant it is no longer used, so apps\
    \ run as fast as ever, with predictable, smooth performance.^([1](#Chapter02.html#CHP-2-FN-1))*\n\
    \nFirst, we show the relationship of the reference counting rules with ARC, and\
    \ we also learn the ownership specifiers one by one, which are newly introduced\
    \ by ARC. Also ARC brings us new properties. And most important, we learn the\
    \ rules to make your code ARC-friendly: by simply following the rules, you can\
    \ write code for ARC with confidence.\n\n### Overview\n\nActually, reference counting\
    \ is still used as the basis of ARC, but ARC helps the reference counting mechanism\
    \ work automatically when you follow the rules that are explained in this chapter.\n\
    \nIn fact, we can enable or disable ARC for each compilable unit. For example,\
    \ we can enable or disable ARC for each source file as shown in [Figure 2–1](#Chapter02.html#fig_2_1).\n\
    \n__________\n\n¹ Apple, “iOS 5 for developers,” [`http://developer.apple.com/technologies/ios5/`](http://developer.apple.com/technologies/ios5/)\n\
    \n![images](images/9781430241164_Fig02-01.jpg)\n\n**Figure 2–1.** *Enabling or\
    \ disabling ARC for each source file in one application*\n\nIn summary, the most\
    \ important part of ARC is that you, the programmer, no longer need to call `retain`\
    \ or `release`. Under the following conditions, your source code will be automatically\
    \ compiled with ARC enabled:\n\n*   `clang`(LLVM compiler) 3.0 and newer\n*  \
    \ Compile option `-fobjc-arc`\n\nClang is the default compiler and the `-fobjc-arc`\
    \ option is set as the default in Xcode 4.2. Therefore, when you work in Xcode\
    \ 4.2, you don’t need to do anything special.\n\nFrom here, all the source codes\
    \ are for an ARC-enabled environment. We have the comment `/* non-ARC */` if the\
    \ source code is for a non-ARC environment. In the next section, we show how the\
    \ reference counting mechanism is changed when ARC is enabled."
