    \n接下来，你需要学习“带有自动（局部）变量”这部分含义。对于 Block 而言，这可以重新表述为“捕获自动变量的值”。下面的示例展示了如何实现这种捕获。\n\
    \n```\nint main()\n{\n    int dmy = 256;\n    int val = 10;\n    const char *fmt\
    \ = \"val = %d\\n\";\n    void (^blk)(void) = ^{printf(fmt, val);};\n\n    val\
    \ = 2;\n    fmt = \"These values were changed. val = %d\\n\";\n\n    blk();\n\n\
    \    return 0;\n}\n```\n\n在这段源代码中，声明了自动变量 `fmt` 和 `val`，然后在 Block 字面量中使用了它们。在编写\
    \ Block 字面量的地方，会自动变量的值将被捕获：这些值会在执行 Block 字面量时被存储起来。由于值已经被捕获，即使在 Block 字面量执行之后修改它们，Block\
    \ 中变量的值也不会受到影响。在这段源代码中，自动变量 `fmt` 和 `val` 在 Block 字面量之后被修改。结果是：\n\n```\nval =\
    \ 10\n```\n\n它不会显示“These values were changed. val = 2”。它显示的是执行 Block 字面量时变量的值。当执行时，自动变量\
    \ `fmt` 指向 `\"val = %d\\n\"`，而 `val` 的整数值为 10。这些值在该时刻被捕获，并在 Block 执行时使用。\n\n以上就是关于捕获自动变量的总结。接下来你需要学习一个说明符，它被称为\
    \ `__block` 说明符。通过使用它，你可以在不捕获变量的情况下修改自动变量。该说明符将在下一节中解释。\n\n#### `__block` 说明符\n\
    \n当自动变量被捕获时，这些值在 Block 内是只读的。这些变量不能被修改。下面的源代码尝试将 1 赋值给自动变量 `val`。\n\n```\nint\
    \ val = 0;\nvoid (^blk)(void) = ^{val = 1;};\nblk();\nprintf(\"val = %d\\n\",\
    \ val);\n```\n\n在这个源代码中，一个值被赋值给在 Block 字面量外部声明的自动变量。这会导致如下编译错误。\n\n```\nerror:\
    \ variable is not assignable (missing __block type specifier)\n         void (^blk)(void)\
    \ = ^{val = 1;};\n                           ~~~ ^\n```\n\n当在 Block 字面量外部声明自动变量时，你可以使用\
    \ `__block` 说明符在 Block 内部给该变量赋值。以下源代码为自动变量 `val` 使用了 `__block` 说明符，使得该变量在 Block\
    \ 内部可以被赋值。\n\n```\n__block int val = 0;    \nvoid (^blk)(void) = ^{val = 1;};\n\
    blk();\nprintf(\"val = %d\\n\", val);\n```\n\n结果是：\n\n```\nval = 1\n```\n\n通过使用\
    \ `__block` 说明符声明变量，你可以在 Block 内部给该变量赋值。这些由 `__block` 指定的自动变量被称为“`__block` 变量”。\n\
    \n#### 被捕获的自动变量\n\n如前所述，如果给一个被捕获的自动变量赋值，则会发生编译错误。\n\n```\nint val = 0;\nvoid (^blk)(void)\
    \ = ^{val = 1;};\n```\n\n这会导致以下编译错误。\n\n```\nerror: variable is not assignable\
    \ (missing __block type specifier)        \n    void (^blk)(void) = ^{val = 1;};\n\
    \                      ~~~ ^\n```\n\n当捕获 Objective-C 对象并调用方法修改对象本身时，会发生什么？它也会导致编译错误吗？\n\
    \n```\nid array = [[NSMutableArray alloc] init];\nvoid (^blk)(void) = ^{\n   \
    \ id obj = [[NSObject alloc] init];\n    [array addObject:obj];\n};\n```\n\n没有问题。只有当某个值被赋值给被捕获的变量\
    \ `array` 本身时，才会发生错误。在这段源代码中，被捕获变量的值是 `NSMutableArray` 类的一个对象。用 C 语言术语来说，该值是一个指向\
    \ `NSMutableArray` 类对象结构体实例的指针。如果将某个值赋值给被捕获的变量 `array`，则会发生编译错误。\n\n下面的源代码将一个值赋值给了被捕获的自动变量，因此会发生编译错误。\n\
    \n```\nid array = [[NSMutableArray alloc] init];\nvoid (^blk)(void) = ^{\n   \
    \ array = [[NSMutableArray alloc] init];\n};\n```\n\n```\nerror: variable is not\
    \ assignable (missing __block type specifier)\n    array = [[NSMutableArray alloc]\
    \ init];\n  ~~~~ ^\n```\n\n为此，自动变量需要使用 `__block` 说明符。\n\n```\n__block id array\
    \ = [[NSMutableArray alloc] init];\nvoid (^blk)(void) = ^{\n    array = [[NSMutableArray\
    \ alloc] init];\n};\n```\n\n还有一点。当你使用 C 数组时，必须有意识地使用指针。示例如下。\n\n```\nconst char\
    \ text[] = \"hello\";\n\nvoid (^blk)(void) = ^{\n     printf(\"%c\\n\", text[2]);\n\
    };\n```\n\n它使用了一个包含 C 字符串字面量的数组。没有值被赋值给被捕获的自动变量。看起来没有问题，但会导致如下编译错误。\n\n```\nerror:\
    \ cannot refer to declaration with an array type inside block\n            printf(\"\
    %c\\n\", text[2]);\n\nnote: declared here\n        const char text[] = \"hello\"\
    ;\n       ^\n```\n\n这是因为当前的 Block 实现无法捕获 C 数组。你可以像下面这样通过使用指针来避免这个问题。\n\n```\n\
    const char *text = \"hello\";\nvoid (^blk)(void) = ^{\n    printf(\"%c\\n\", text[2]);\n\
    };\n```\n\n### 总结\n\n本章解释了 Block。你已经了解到 Block 是“带有自动（局部）变量的匿名函数”。下一章将展示 Block\
    \ 是如何实现的，以便你更好地理解其用法。\n\n## 第 5 章：Block 的实现\n\n在前面的章节中，我们了解到 Block 是一个带有自动变量的匿名函数。在本章中，我们将通过其实现来详细了解\
    \ Block 的运作机制。我们将从 Block 实现的基本概念开始，然后展示各种情况以了解 Block 的工作方式，例如自动变量是如何被捕获的，Block\
    \ 和 `__block` 变量是如何存储在内存中的，以及对象是如何被 Block 捕获的。此外，我们还会展示一些与循环引用和 copy/release 方法相关的\
    \ Block 陷阱。除非特别说明，所有示例源代码均假设启用了 ARC。\n\n### 揭开 Block 的底层原理\n\n你可能会认为 Block 语法是某种特殊的东西。但实际上，编译器将其视为普通的\
    \ C 语言源代码。支持 Block 的编译器会将包含 Block 的源代码转换为标准的 C 源代码；然后像往常一样进行编译。\n\n这只是一个概念性的解释。实际上，编译器从不生成人类可读的源代码。但是，`clang`（LLVM\
    \ 编译器）具有生成人类可读转换后源代码的功能。\n\n在本节中，我们将借助转换后的源代码来展示 Block 是如何实现的。源代码有些复杂，因此我们将逐步进行阐述。首先概览一下，然后再深入细节。\n"
- fmt: "#### Converting Source Code\n\nWith the `\"-rewrite-objc\"` compiler option,\
    \ source code including Block syntax can be converted to standard C++ source code.\
    \ Although the generated source code is in C++, it is almost always written in\
    \ C except when it uses constructors for struct.\n\n`clang -rewrite-objc file_name_of_the_source_code`\n\
    \nLet’s see how the source code (Listing 5–1) is converted.\n\n**Listing 5–1.**\
    \ *Example with a simple Block*\n\n```\nint main()\n{\n    void (^blk)(void) =\
    \ ^{printf(\"Block\\n\");};\n    blk();\n    return 0;\n}\n```\n\nThis source\
    \ code has a Block literal in the simplest form, which has no return type and\
    \ no argument list. Clang converts the source code as shown in Listing 5–2.\n\n\
    **Listing 5–2.** *Converted source code of Listing 5–1*\n\n```\nstruct __block_impl\
    \ {\n    void *isa;\n    int Flags;\n    int Reserved;\n    void *FuncPtr;\n};\n\
    \nstruct __main_block_impl_0 {\n    struct __block_impl impl;\n    struct __main_block_desc_0*\
    \ Desc;\n\n    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,\
    \ int flags=0) {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags\
    \ = flags;\n        impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic\
    \ void __main_block_func_0(struct __main_block_impl_0 *__cself)\n{\n    printf(\"\
    Block\\n\");\n}\n\nstatic struct __main_block_desc_0\n{\n    unsigned long reserved;\n\
    \    unsigned long Block_size;\n} __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct\
    \ __main_block_impl_0)\n};\n\nint main() {\n    void (*blk)(void) =\n        (void\
    \ (*)(void))&__main_block_impl_0(\n            (void *)__main_block_func_0, &__main_block_desc_0_DATA);\n\
    \n    ((void (*)(struct __block_impl *))(\n        (struct __block_impl *)blk)->FuncPtr)((struct\
    \ __block_impl *)blk);\n\n    return 0;\n}\n```\n\nIt increases from 8 lines to\
    \ 43 lines! But, when you look closely, you see that it isn’t so complicated.\
    \ We learn this step by step, starting with the Block literal in the original\
    \ source code.\n\n`^{printf(\"Block\\n\")};`\n\nIn the converted source code,\
    \ you can see the same sentence.\n\n```\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself)\n{\n    printf(\"Block\\n\");\n}\n```\n\nAs shown\
    \ in the converted source code, anonymous functions are converted to C functions.\
    \ Function names are generated automatically and consist of a function name, where\
    \ the Block literal is, and a number ordered by its appearance in the function.\
    \ In the example, the function name is `\"main\"` and it is the first Block literal\
    \ (0).\n\nThe argument `__cself` for the function is like `\"self\"` for the Objective-C\
    \ instance method or `\"this\"` for the C++ instance method. We discuss these\
    \ next.\n\n#### this in C++ and self in Objective-C\n\nIn C++, an instance method\
    \ for a class is defined as follows.\n\n```\nvoid MyClass::method(int arg)\n{\n\
    \    printf(\"%p %d\\n\", this, arg);\n}\n```\n\nThe C++ compiler converts it\
    \ to a C function.\n\n```\nvoid __ZN7MyClass6methodEi(MyClass *this, int arg)\n\
    {\n    printf(\"%p %d\\n\", this, arg);\n}\n```\n\nThe `__ZN7MyClass6methodEi`\
    \ function is under the hood of the `MyClass::method`. An argument `\"this\"`\
    \ is passed to the function. This method is called.\n\n```\nMyClass cls;\ncls.method(10);\n\
    ```\n\nBy the C++ compiler, it is converted to a source code calling the C function\
    \ as follows.\n\n```\nstruct MyClass cls;\n__ZN7MyClass6methodEi(&cls, 10);\n\
    ```\n\n`\"this\"` is an instance of `MyClass` class (struct) itself. In addition,\
    \ let's check an instance method in Objective-C.\n\n```\n- (void) method:(int)arg\n\
    {\n    NSLog(@\"%p %d\\n\", self, arg);\n}\n```\n\nThe same as for C++ methods,\
    \ the Objective-C compiler converts the method to a C function.\n\n```\nvoid _I_MyObject_method_(struct\
    \ MyObject *self, SEL _cmd, int arg)\n{\n    NSLog(@\"%p %d\\n\", self, arg);\n\
    }\n```\n\nAnd the same as `\"this\"` in C++, `\"self\"` is passed as the first\
    \ argument. Let’s see its caller as well.\n\n```\nMyObject *obj = [[MyObject alloc]\
    \ init];\n[obj method:10];\n```\n\nUsing `-rewrite-objc` option for `clang`, we\
    \ can see how it is converted:\n\n```\nMyObject *obj = objc_msgSend(\n    objc_getClass(\"\
    MyObject\"), sel_registerName(\"alloc\"));\nobj = objc_msgSend(obj, sel_registerName(\"\
    init\"));\nobjc_msgSend(obj, sel_registerName(\"method:\"), 10);\n```\n\nThe `objc_msgSend`\
    \ function searches a pointer of the `_I_MyObject_method_` function by the object\
    \ and the method name. After that, it calls the function pointer, and the first\
    \ argument `\"obj\"` is passed to the `_I_MyObject_method_` function as its first\
    \ argument `\"self\"`. As in C++, `\"self\"` is the object of the `MyObject` class\
    \ itself.\n\n#### Declaring _cself\n\nLet’s continue reading the example. Unfortunately,\
    \ the `__main_block_func_0` function, which is converted from the Block syntax,\
    \ doesn’t use the argument `__cself`. Later, we show how `__cself` is used. For\
    \ now, I just explain how the argument `\"__cself\"` is declared.\n\n`struct __main_block_impl_0\
    \ *__cself`\n\nLike `\"self\"` in Objective-C or `\"this\"` in C++, the argument\
    \ `__cself` is a pointer to `struct __main_block_impl_0`. How is `struct __main_block_impl_0`\
    \ declared?\n\n```\nstruct __main_block_impl_0 {\n    struct __block_impl impl;\n\
    \    struct __main_block_desc_0* Desc;\n}\n```\n\nThe converted source code is\
    \ bit complex because its constructor is declared inside. After the constructor\
    \ is removed, the `struct __main_block_impl_0` is very simple as shown above.\
    \ Next, let’s check how the `struct __block_impl` is declared, which is used as\
    \ the first member variable `\"impl\"`.\n\n```\nstruct __block_impl {\n    void\
    \ *isa;\n    int Flags;\n    int Reserved;\n    void *FuncPtr;\n};\n```\n\nFrom\
    \ its name, we can guess what the member variable is for, such as a flag, a reserved\
    \ area for a future version, and a function pointer. For now, we just skip them.\
    \ First, let’s see `__main_block_desc_0` struct, which is used for the second\
    \ member variable `\"Desc\"`.\n\n```\nstruct __main_block_desc_0 {\n    unsigned\
    \ long reserved;\n    unsigned long Block_size;\n};\n```\n\nAs we can guess from\
    \ the names, it has a reserved area and a size of a Block.\n\n#### Constructor\
    \ of __main_block_impl_0 struct\n\nNext, let’s check the constructor, which initializes\
    \ the `__main_block_impl_0` struct, which has these structs.\n\n```\n__main_block_impl_0(void\
    \ *fp, struct __main_block_desc_0 *desc, int flags=0) {\n    impl.isa = &_NSConcreteStackBlock;\n\
    \    impl.Flags = flags;\n    impl.FuncPtr = fp;\n    Desc = desc;\n}\n```\n\n\
    It just initializes the member variables of `__main_block_impl_0` struct. Although\
    \ you might be interested in `_NSConcreteStackBlock`, which is used to initialize\
    \ the variable `\"isa\"` in `__block_impl` struct that we have skipped, we first\
    \ check how the constructor is called.\n\n```\nvoid (*blk)(void) =\n    (void\
    \ (*)(void))&__main_block_impl_0(\n        (void *)__main_block_func_0, &__main_block_desc_0_DATA);\n\
    ```\n\nThere are too many casts to understand. Just remove them all.\n\n```\n\
    struct __main_block_impl_0 tmp =\n    __main_block_impl_0(__main_block_func_0,\
    \ &__main_block_desc_0_DATA);\n\nstruct __main_block_impl_0 *blk = &tmp;\n```\n\
    \nNow, it is understandable. A pointer of an automatic variable is assigned to\
    \ the variable `\"blk\"`, the type of which is the pointer of `__main_block_impl_0`\
    \ struct. This means that an instance of `__main_block_impl_0` struct is created\
    \ on the stack and its pointer is assigned to the variable.\n\n```\nvoid (^blk)(void)\
    \ = ^{printf(\"Block\\n\");};\n```\n\nThe Block created from the Block literal\
    \ is assigned to the Block type variable `\"blk\"`. Therefore it is equivalent\
    \ to assigning a pointer of an instance of `__main_block_impl_0` struct to the\
    \ variable `\"blk\"`. The Block is equivalent to the automatic variable of `__main_block_impl_0`\
    \ struct type. In other words, the Block is the instance of `__main_block_impl_0`\
    \ struct created on the stack."
  raw: '#### Converting Source Code


    With the “-rewrite-objc” compiler option, source code including Block syntax can
    be converted to standard C++ source code. Although the generated source code is
    in C++, it is almost always written in C except when it uses constructors for
    struct.


    `clang -rewrite-objc file_name_of_the_source_code`


    Let’s see how the source code ([Listing 5–1](#Chapter05.html#list_5_1)) is converted.


    **Listing 5–1.** *Example with a simple Block*


    `int main()`

    `{`

    `    void (^blk)(void) = ^{printf("Block\n");};`

    `    blk();`

    `    return 0;`

    `}`


    This source code has a Block literal in the simplest form, which has no return
    type and no argument list. Clang converts the source code as shown in [Listing
    5–2](#Chapter05.html#list_5_2).


    **Listing 5–2.** *Converted source code of [Listing 5–1](#Chapter05.html#list_5_1)*


    `struct __block_impl {`

    `    void *isa;`

    `    int Flags;`

    `    int Reserved;`

    `    void *FuncPtr;`

    `};`


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`


    `    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc, int flags=0)
    {`

    `        impl.isa = &_NSConcreteStackBlock;`

    `        impl.Flags = flags;`

    `        impl.FuncPtr = fp;`

    `        Desc = desc;`

    `    }`

    `};`


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself)`

    `{`

    `    printf("Block\n");`

    `}`


    `static struct __main_block_desc_0`

    `{`

    `    unsigned long reserved;`

    `    unsigned long Block_size;`

    `} __main_block_desc_0_DATA = {`

    `    0,`

    `    sizeof(struct __main_block_impl_0)`

    `};`


    `int main() {`

    `    void (*blk)(void) =`

    `        (void (*)(void))&__main_block_impl_0(`

    `            (void *)__main_block_func_0, &__main_block_desc_0_DATA);`


    `    ((void (*)(struct __block_impl *))(`

    `        (struct __block_impl *)blk)->FuncPtr)((struct __block_impl *)blk);`


    `    return 0;`

    `}`


    It increases from 8 lines to 43 lines! But, when you look closely, you see that
    it isn’t so complicated. We learn this step by step, starting with the Block literal
    in the original source code.


    `^{printf("Block\n")};`


    In the converted source code, you can see the same sentence.


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself)`

    `{`

    `    printf("Block\n");`

    `}`


    As shown in the converted source code, anonymous functions are converted to C
    functions. Function names are generated automatically and consist of a function
    name, where the Block literal is, and a number ordered by its appearance in the
    function. In the example, the function name is “main” and it is the first Block
    literal (0).


    The argument “__cself” for the function is like “self” for the Objective-C instance
    method or “this” for the C++ instance method. We discuss these next.


    #### this in C++ and self in Objective-C


    In C++, an instance method for a class is defined as follows.


    `void MyClass::method(int arg)`

    `{`

    `    printf("%p %d\n", this, arg);`

    `}`


    The C++ compiler converts it to a C function.


    `void __ZN7MyClass6methodEi(MyClass *this, int arg)`

    `{`

    `    printf("%p %d\n", this, arg);`

    `}`


    The __ZN7MyClass6methodEi function is under the hood of the MyClass::method. An
    argument “this” is passed to the function. This method is called.


    `MyClass cls;`

    `cls.method(10);`


    `By the C++ compiler, it is converted to a source code calling the C function
    as follows.`


    `struct MyClass cls;`

    `__ZN7MyClass6methodEi(&cls, 10);`


    `"this" is an instance of MyClass class (struct) itself. In addition, let''s check
    an`

    `instance method in Objective-C.`


    `- (void) method:(int)arg`

    `{`

    `    NSLog(@"%p %d\n", self, arg);`

    `}`

    `The same as for C++ methods, the Objective-C compiler converts the method to
    a C`

    `function.`


    `void _I_MyObject_method_(struct MyObject *self, SEL _cmd, int arg)`

    `{`

    `    NSLog(@"%p %d\n", self, arg);`

    `}`


    And the same as “this” in C++, “self” is passed as the first argument. Let’s see
    its caller as well.


    `MyObject *obj = [[MyObject alloc] init];`

    `[obj method:10];`


    Using “-rewrite-objc option” for clang, we can see how it is converted:


    `MyObject *obj = objc_msgSend(`

    `    objc_getClass("MyObject"), sel_registerName("alloc"));`

    `obj = objc_msgSend(obj, sel_registerName("init"));`

    `objc_msgSend(obj, sel_registerName("method:"), 10);`


    The objc_msgSend function searches a pointer of the _I_MyObject_method_ function
    by the object and the method name. After that, it calls the function pointer,
    and the first argument “obj” is passed to the _I_MyObject_method_ function as
    its first argument “self”. As in C++, “self” is the object of the MyObject class
    itself.


    #### Declaring _cself


    Let’s continue reading the example. Unfortunately, the __main_block_func_0 function,
    which is converted from the Block syntax, doesn’t use the argument __cself. Later,
    we show how __cself is used. For now, I just explain how the argument “__cself”
    is declared.


    `struct __main_block_impl_0 *__cself`


    Like “self” in Objective-C or “this” in C++, the argument __cself is a pointer
    to struct __main_block_impl_0\. How is struct __main_block_impl_0 declared?


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`

    `}`


    The converted source code is bit complex because its constructor is declared inside.
    After the constructor is removed, the struct __main_block_impl_0 is very simple
    as shown above. Next, let’s check how the struct __block_impl is declared, which
    is used as the first member variable “impl”.


    `struct __block_impl {`

    `    void *isa;`

    `    int Flags;`

    `    int Reserved;`

    `    void *FuncPtr;`

    `};`


    From its name, we can guess what the member variable is for, such as a flag, a
    reserved area for a future version, and a function pointer. For now, we just skip
    them. First, let’s see __main_block_desc_0 struct, which is used for the second
    member variable “Desc”.


    `struct __main_block_desc_0 {`

    `    unsigned long reserved;`

    `    unsigned long Block_size;`

    `};`


    As we can guess from the names, it has a reserved area and a size of a Block.


    #### Constructor of __main_block_impl_0 struct


    Next, let’s check the constructor, which initializes the __main_block_impl_0 struct,
    which has these structs.


    `__main_block_impl_0(void *fp, struct __main_block_desc_0 *desc, int flags=0)
    {`

    `    impl.isa = &_NSConcreteStackBlock;`

    `    impl.Flags = flags;`

    `    impl.FuncPtr = fp;`

    `    Desc = desc;`

    `}`


    It just initializes the member variables of __main_block_impl_0 struct. Although
    you might be interested in _NSConcreteStackBlock, which is used to initialize
    the variable “isa” in __block_implstruct that we have skipped, we first check
    how the constructor is called.


    `void (*blk)(void) =`

    `    (void (*)(void))&__main_block_impl_0(`

    `        (void *)__main_block_func_0, &__main_block_desc_0_DATA);`


    There are too many casts to understand. Just remove them all.


    `struct __main_block_impl_0 tmp =`

    `    __main_block_impl_0(__main_block_func_0, &__main_block_desc_0_DATA);`


    `struct __main_block_impl_0 *blk = &tmp;`


    Now, it is understandable. A pointer of an automatic variable is assigned to the
    variable “blk”, the type of which is the pointer of __main_block_impl_0 struct.
    This means that an instance of __main_block_impl_0 struct is created on the stack
    and its pointer is assigned to the variable.


    `void (^blk)(void) = ^{printf("Block\n");};`


    The Block created from the Block literal is assigned to the Block type variable
    “blk”. Therefore it is equivalent to assigning a pointer of an instance of__main_block_impl_0
    struct to the variable “blk”. The Block is equivalent to the automatic variable
    of __main_block_impl_0 struct type. In other words, the Block is the instance
    of __main_block_impl_0 struct created on the stack.'
  trans: "\n#### 转换源码\n\n使用 `\"-rewrite-objc\"` 编译器选项，包含 Block 语法的源码可以转换成标准 C++ 源码。虽然生成的源码是\
    \ C++，但除了使用 struct 的构造函数外，它几乎完全用 C 语言编写。\n\n`clang -rewrite-objc file_name_of_the_source_code`\n\
    \n让我们看看源码（清单 5-1）是如何被转换的。\n\n**清单 5-1.** *包含简单 Block 的示例*\n\n```\nint main()\n\
    {\n    void (^blk)(void) = ^{printf(\"Block\\n\");};\n    blk();\n    return 0;\n\
    }\n```\n\n这段源码包含一个最简单的 Block 字面量，它没有返回值类型，也没有参数列表。Clang 将源码转换为如清单 5-2 所示。\n\n\
    **清单 5-2.** *清单 5-1 的转换后源码*\n\n```\nstruct __block_impl {\n    void *isa;\n  \
    \  int Flags;\n    int Reserved;\n    void *FuncPtr;\n};\n\nstruct __main_block_impl_0\
    \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n\n\
    \    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc, int flags=0)\
    \ {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n\
    \        impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself)\n{\n    printf(\"Block\\n\");\n}\n\nstatic struct\
    \ __main_block_desc_0\n{\n    unsigned long reserved;\n    unsigned long Block_size;\n\
    } __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct __main_block_impl_0)\n\
    };\n\nint main() {\n    void (*blk)(void) =\n        (void (*)(void))&__main_block_impl_0(\n\
    \            (void *)__main_block_func_0, &__main_block_desc_0_DATA);\n\n    ((void\
    \ (*)(struct __block_impl *))(\n        (struct __block_impl *)blk)->FuncPtr)((struct\
    \ __block_impl *)blk);\n\n    return 0;\n}\n```\n\n它从 8 行增加到了 43 行！但当你仔细看时，会发现它并没有那么复杂。我们将从原始源码中的\
    \ Block 字面量开始，逐步学习。\n\n`^{printf(\"Block\\n\")};`\n\n在转换后的源码中，你可以看到同样的语句。\n\n\
    ```\nstatic void __main_block_func_0(struct __main_block_impl_0 *__cself)\n{\n\
    \    printf(\"Block\\n\");\n}\n```\n\n如转换后的源码所示，匿名函数被转换为 C 函数。函数名是自动生成的，由 Block\
    \ 字面量所在的函数名及其在函数中出现顺序的编号组成。在示例中，函数名是 `\"main\"`，并且它是第一个 Block 字面量（序号为 0）。\n\n\
    该函数的参数 `__cself` 类似于 Objective-C 实例方法中的 `\"self\"` 或 C++ 实例方法中的 `\"this\"`。我们接下来会讨论这些。\n\
    \n#### C++ 中的 this 与 Objective-C 中的 self\n\n在 C++ 中，类的实例方法定义如下。\n\n```\nvoid MyClass::method(int\
    \ arg)\n{\n    printf(\"%p %d\\n\", this, arg);\n}\n```\n\nC++ 编译器会将其转换为一个 C 函数。\n\
    \n```\nvoid __ZN7MyClass6methodEi(MyClass *this, int arg)\n{\n    printf(\"%p\
    \ %d\\n\", this, arg);\n}\n```\n\n`__ZN7MyClass6methodEi` 函数是 `MyClass::method`\
    \ 的底层实现。参数 `\"this\"` 被传递给该函数。这个方法是这样调用的：\n\n```\nMyClass cls;\ncls.method(10);\n\
    ```\n\nC++ 编译器会将其转换为调用 C 函数的源码，如下所示。\n\n```\nstruct MyClass cls;\n__ZN7MyClass6methodEi(&cls,\
    \ 10);\n```\n\n`\"this\"` 是 `MyClass` 类（struct）本身的实例。此外，让我们检查一下 Objective-C 中的实例方法。\n\
    \n```\n- (void) method:(int)arg\n{\n    NSLog(@\"%p %d\\n\", self, arg);\n}\n\
    ```\n\n与 C++ 方法相同，Objective-C 编译器会将方法转换为一个 C 函数。\n\n```\nvoid _I_MyObject_method_(struct\
    \ MyObject *self, SEL _cmd, int arg)\n{\n    NSLog(@\"%p %d\\n\", self, arg);\n\
    }\n```\n\n并且，与 C++ 中的 `\"this\"` 一样，`\"self\"` 作为第一个参数传递。我们再看看它的调用者。\n\n```\n\
    MyObject *obj = [[MyObject alloc] init];\n[obj method:10];\n```\n\n使用 `clang`\
    \ 的 `-rewrite-objc` 选项，我们可以看到它如何被转换：\n\n```\nMyObject *obj = objc_msgSend(\n \
    \   objc_getClass(\"MyObject\"), sel_registerName(\"alloc\"));\nobj = objc_msgSend(obj,\
    \ sel_registerName(\"init\"));\nobjc_msgSend(obj, sel_registerName(\"method:\"\
    ), 10);\n```\n\n`objc_msgSend` 函数根据对象和方法名搜索 `_I_MyObject_method_` 函数的指针。之后，它调用该函数指针，并将第一个参数\
    \ `\"obj\"` 传递给 `_I_MyObject_method_` 函数作为其第一个参数 `\"self\"`。与 C++ 一样，`\"self\"\
    ` 是 `MyObject` 类自身的对象。\n\n#### 声明 _cself\n\n让我们继续阅读示例。不幸的是，从 Block 语法转换而来的 `__main_block_func_0`\
    \ 函数并未使用参数 `__cself`。稍后我们会展示 `__cself` 是如何被使用的。现在，我只解释参数 `\"__cself\"` 是如何声明的。\n\
    \n`struct __main_block_impl_0 *__cself`\n\n如同 Objective-C 中的 `\"self\"` 或 C++\
    \ 中的 `\"this\"`，参数 `__cself` 是一个指向 `struct __main_block_impl_0` 的指针。`struct __main_block_impl_0`\
    \ 是如何声明的？\n\n```\nstruct __main_block_impl_0 {\n    struct __block_impl impl;\n\
    \    struct __main_block_desc_0* Desc;\n}\n```\n\n转换后的源码因为在其内部声明了构造函数而略显复杂。移除构造函数后，`struct\
    \ __main_block_impl_0` 就变得如上所示非常简单。接下来，让我们检查一下 `struct __block_impl` 是如何声明的，它被用作第一个成员变量\
    \ `\"impl\"`。\n\n```\nstruct __block_impl {\n    void *isa;\n    int Flags;\n\
    \    int Reserved;\n    void *FuncPtr;\n};\n```\n\n从其名称来看，我们可以大致猜出成员变量的用途，例如标志位、为未来版本预留的区域以及函数指针。目前我们暂且跳过它们。首先，我们来看看用于第二个成员变量\
    \ `\"Desc\"` 的 `__main_block_desc_0` 结构体。\n\n```\nstruct __main_block_desc_0 {\n\
    \    unsigned long reserved;\n    unsigned long Block_size;\n};\n```\n\n正如我们可以从名称中猜测到的，它包含一个预留区域和一个\
    \ Block 的大小。\n\n#### __main_block_impl_0 结构体的构造函数\n\n接下来，让我们检查一下构造函数，它用于初始化包含这些结构体的\
    \ `__main_block_impl_0` 结构体。\n\n```\n__main_block_impl_0(void *fp, struct __main_block_desc_0\
    \ *desc, int flags=0) {\n    impl.isa = &_NSConcreteStackBlock;\n    impl.Flags\
    \ = flags;\n    impl.FuncPtr = fp;\n    Desc = desc;\n}\n```\n\n它仅仅是初始化 `__main_block_impl_0`\
    \ 结构体的成员变量。虽然你可能对 `_NSConcreteStackBlock` 感兴趣，它用于初始化我们之前跳过的 `__block_impl` 结构体中的\
    \ `\"isa\"` 变量，但我们首先要检查构造函数是如何被调用的。\n\n```\nvoid (*blk)(void) =\n    (void (*)(void))&__main_block_impl_0(\n\
    \        (void *)__main_block_func_0, &__main_block_desc_0_DATA);\n```\n\n这里有太多类型转换，难以理解。我们先把它们全部移除。\n\
    \n```\nstruct __main_block_impl_0 tmp =\n    __main_block_impl_0(__main_block_func_0,\
    \ &__main_block_desc_0_DATA);\n\nstruct __main_block_impl_0 *blk = &tmp;\n```\n\
    \n现在，它就容易理解了。一个自动变量的指针被赋值给了变量 `\"blk\"`，该变量的类型是 `__main_block_impl_0` 结构体的指针。这意味着在栈上创建了一个\
    \ `__main_block_impl_0` 结构体的实例，并且其指针被赋值给了该变量。\n\n```\nvoid (^blk)(void) = ^{printf(\"\
    Block\\n\");};\n```\n\n由 Block 字面量创建的 Block 被赋值给了 Block 类型变量 `\"blk\"`。因此，这等同于将\
    \ `__main_block_impl_0` 结构体实例的指针赋值给变量 `\"blk\"`。该 Block 等价于 `__main_block_impl_0`\
    \ 结构体类型的自动变量。换句话说，Block 是在栈上创建的 `__main_block_impl_0` 结构体的实例。\n"
- fmt: "#### Initializing `__main_block_impl_0` instance\n\nNext, let’s see how the\
    \ instance of `__main_block_impl_0` struct is initialized. The arguments for its\
    \ constructor are:\n\n`__main_block_impl_0(__main_block_func_0, &__main_block_desc_0_DATA);`\n\
    \nThe first argument is a pointer to a function, which is converted from the Block\
    \ literal. The second argument is a pointer to the instance of `__main_block_desc_0`\
    \ struct, which is initialized as a static global variable. Let’s check how the\
    \ instance of `__main_block_desc_0` struct is initialized.\n\n```\nstatic struct\
    \ __main_block_desc_0 __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct\
    \ __main_block_impl_0)\n};\n```\n\nIt is initialized with a size of the Block,\
    \ which means a size of `__main_block_impl_0` struct.\n\nLet’s see how the Block,\
    \ which is the instance of `__main_block_impl_0` struct on the stack, is initialized\
    \ with these arguments. `__main_block_impl_0` struct can be rewritten if `__block_impl`\
    \ is expanded:\n\n```\nstruct __main_block_impl_0 {\n    void *isa;\n    int Flags;\n\
    \    int Reserved;\n    void *FuncPtr;\n    struct __main_block_desc_0* Desc;\n\
    }\n```\n\nThis struct is initialized with the constructor as:\n\n```\nisa = &_NSConcreteStackBlock;\n\
    Flags = 0;\nReserved = 0;\nFuncPtr = __main_block_func_0;\nDesc = &__main_block_desc_0_DATA;\n\
    ```\n\nAgain, you might be interested in `_NSConcreteStackBlock`, however, we\
    \ skip it for now. Let’s check the other part first. The pointer of `__main_block_func_0`\
    \ function is assigned to its member `FuncPtr`. It is used where:\n\n`blk();`\n\
    \nThis is converted to:\n\n```\n((void (*)(struct __block_impl *))(\n    (struct\
    \ __block_impl *)blk)->FuncPtr)((struct __block_impl *)blk);\n```\n\nRemove the\
    \ casts again:\n\n```\n(*blk->impl.FuncPtr)(blk);\n```\n\nIt is a simple function\
    \ call via the function pointer. As we’ve checked, the member variable `FuncPtr`\
    \ has a pointer of the `__main_block_func_0` function, which is converted from\
    \ the Block literal. Also, we’ve learned that the argument of `__main_block_func_0`\
    \ function `__cself` is the Block itself. With this source code, we can confirm\
    \ that the Block is passed as the argument `__cself`.\n\n#### Reviewing `_NSConcreteStackBlock`\n\
    \nWe have roughly seen what is under the hood of a Block. There is one thing that\
    \ we skipped many times. What is `_NSConcreteStackBlock`?\n\n`isa = &_NSConcreteStackBlock;`\n\
    \nA pointer of `_NSConcreteStackBlock` is assigned to a member variable `isa`\
    \ in the struct for the Block. To understand what that is, we need to learn how\
    \ a class and an object in Objective-C are implemented. Actually, Block is an\
    \ object in Objective-C as well.\n\nAs you know, a variable type `id` is used\
    \ to store an Objective-C object. We use it in Objective-C source code casually,\
    \ like `void *` in C. Surprisingly, the `id` type is declared in C language. The\
    \ declaration is in `/usr/include/objc/objc.h`.\n\n```\ntypedef struct objc_object\
    \ {\n    Class isa;\n} *id;\n```\n\nThis means `id` is a pointer type of `objc_object`\
    \ struct. Let’s see what the `Class` is.\n\n```\ntypedef struct objc_class *Class;\n\
    ```\n\n`Class` is a pointer type of `objc_class` struct. `objc_class` struct is\
    \ declared in `/usr/include/objc/runtime.h`.\n\n```\nstruct objc_class {\n   \
    \ Class isa;\n};\n```\n\nIt is the same as the `objc_object` struct. Please note\
    \ that the `objc_object` struct and `objc_class` struct are used as the base struct\
    \ for each object and class. Let’s check that with the following simple Objective-C\
    \ class declaration.\n\n```\n@interface MyObject : NSObject\n{\n    int val0;\n\
    \    int val1;\n}\n@end\n```\n\nA struct for this class is based on the `objc_object`\
    \ struct as follows.\n\n```\nstruct MyObject {\n    Class isa;\n    int val0;\n\
    \    int val1;\n};\n```\n\nThe instance variables `val0` and `val1` of the `MyObject`\
    \ class are directly declared as member variables of the struct for the object.\
    \ Creating an object of a class in Objective-C is equivalent to creating an instance\
    \ from a struct that is generated from the class. Each created object (i.e., each\
    \ instance of the struct for the object) has a pointer to the instance of the\
    \ struct for its class in the member variable `isa` as shown in [Figure 5–1](#Chapter05.html#fig_5_1).\n\
    \n![images](images/9781430241164_Fig05-01.jpg)\n\n**Figure 5–1.** *Objective-C\
    \ class and object*\n\nA struct for each class is a `class_t` struct based on\
    \ `objc_class` struct. The `class_t` struct is declared at `runtime/objc-runtime-new.h`\
    \ in the `objc4` runtime library.\n\n```\nstruct class_t {\n    struct class_t\
    \ *isa;\n    struct class_t *superclass;\n    Cache cache;\n    IMP *vtable;\n\
    \    uintptr_t data_NEVER_USE;\n};\n```\n\nIn Objective-C, instances of `class_t`\
    \ struct are created and stored for all the classes. For example, an instance\
    \ of the `class_t` struct for `NSObject` and an instance of the `class_t` struct\
    \ for `NSMutableArray` are created. These instances have the names of declared\
    \ member variables, names of methods, the method implementations (which are function\
    \ pointers), properties, and the pointer to its superclass. These are used by\
    \ the Objective-C runtime library.\n\nNow, we understand how a class and an object\
    \ in Objective-C are implemented to go to next step. Let’s check the struct for\
    \ the Block again.\n\n```\nstruct __main_block_impl_0 {\n    void *isa;\n    int\
    \ Flags;\n    int Reserved;\n    void *FuncPtr;\n    struct __main_block_desc_0*\
    \ Desc;\n}\n```\n\nThis `__main_block_impl_0` struct is based on the `objc_object`\
    \ struct, and is a struct for Objective-C class objects. And, its member variable\
    \ `isa` is initialized as follows.\n\n`isa = &_NSConcreteStackBlock;`\n\nThis\
    \ means that `_NSConcreteStackBlock` is the instance of the `class_t` struct.\
    \ When the Block is treated as an Objective-C object, `_NSConcreteStackBlock`\
    \ has all the information of its class. Now we’ve seen under the hood of Block,\
    \ and we also know that a Block is an Objective-C object."
  raw: '#### Initializing __main_block_impl_0 instance


    Next, let’s see how the instance of __main_block_impl_0 struct is initialized.
    The arguments for its constructor are:


    `__main_block_impl_0(__main_block_func_0, &__main_block_desc_0_DATA);`


    The first argument is a pointer to a function, which is converted from the Block
    literal. The second argument is a pointer to the instance of __main_block_desc_0
    struct, which is initialized as a static global variable. Let’s check how the
    instance of __main_block_desc_0 struct is initialized.


    `static struct __main_block_desc_0 __main_block_desc_0_DATA = {`

    `    0,`

    `sizeof(struct __main_block_impl_0)`

    `};`


    It is initialized with a size of the Block, which means a size of __main_block_impl_0
    struct.


    Let’s see how the Block, which is the instance of __main_block_impl_0 struct on
    the stack, is initialized with these arguments. __main_block_impl_0 struct can
    be rewritten if __block_implis expanded:


    `struct __main_block_impl_0 {`

    `    void *isa;`

    `    int Flags;`

    `    int Reserved;`

    `    void *FuncPtr;`

    `    struct __main_block_desc_0* Desc;`

    `}`


    This struct is initialized with the constructor as


    `isa = &_NSConcreteStackBlock;`

    `Flags = 0;`

    `Reserved = 0;`

    `FuncPtr = __main_block_func_0;`

    `Desc = &__main_block_desc_0_DATA;`


    Again, you might be interested in _NSConcreteStackBlock, however, we skip it for
    now. Let’s check the other part first. The pointer of __main_block_func_0 function
    is assigned to its member “FuncPtr”. It is used where


    `blk();`


    This is converted to


    `((void (*)(struct __block_impl *))(`

    `    (struct __block_impl *)blk)->FuncPtr)((struct __block_impl *)blk);`


    `Remove the casts again.`

    `(*blk->impl.FuncPtr)(blk);`


    It is a simple function call via the function pointer. As we’ve checked, the member
    variable “FuncPtr” has a pointer of the __main_block_func_0 function, which is
    converted from the Block literal. Also, we’ve learned that the argument of __main_block_func_0
    function “__cself” is the Block itself. With this source code, we can confirm
    that the Block is passed as the argument “__cself”.


    #### Reviewing _NSConcreteStackBlock


    We have roughly seen what is under the hood of a Block. There is one thing that
    we skipped many times. What is _NSConcreteStackBlock?


    `isa = &_NSConcreteStackBlock;`


    A pointer of _NSConcreteStackBlock is assigned to a member variable “isa” in the
    struct for the Block. To understand what that is, we need to learn how a class
    and an object in Objective-C are implemented. Actually, Block is an object in
    Objective-C as well.


    As you know, a variable type “id” is used to store an Objective-C object. We use
    it in Objective-C source code casually, like “void *” in C. Surprisingly, the
    id type is declared in C language. The declaration is in /usr/include/objc/objc.h.


    `typedef struct objc_object {`

    `    Class isa;`

    `} *id;`


    This means id is a pointer type of objc_object struct. Let’s see what the “Class”
    is.


    `typedef struct objc_class *Class;`


    “Class” is a pointer type of objc_class struct. objc_class struct is declared
    in /usr/include/objc/runtime.h.


    `struct objc_class {`

    `    Class isa;`

    `};`


    It is the same as the objc_object struct. Please note that the objc_object struct
    and objc_class struct are used as the base struct for each object and class. Let’s
    check that with the following simple Objective-C class declaration.


    `@interface MyObject : NSObject`

    `{`

    `    int val0;`

    `    int val1;`

    `}`

    `@end`


    A struct for this class is based on the objc_object struct as follows.


    `struct MyObject {`

    `    Class isa;`

    `    int val0;`

    `    int val1;`

    `};`


    The instance variables “val0” and “val1” of the MyObject class are directly declared
    as member variables of the struct for the object. Creating an object of a class
    in Objective-C is equivalent to creating an instance from a struct that is generated
    from the class. Each created object (i.e., each instance of the struct for the
    object) has a pointer to the instance of the struct for its class in the member
    variable “isa” as shown in [Figure 5–1](#Chapter05.html#fig_5_1).


    ![images](images/9781430241164_Fig05-01.jpg)


    **Figure 5–1.** *Objective-C class and object*


    A struct for each class is a class_t struct based on objc_class struct. The class_t
    struct is declared at runtime/objc-runtime-new.h in the objc4 runtime library.


    `struct class_t {`

    `    struct class_t *isa;`

    `    struct class_t *superclass;`

    `    Cache cache;`

    `    IMP *vtable;`

    `    uintptr_t data_NEVER_USE;`

    `};`


    In Objective-C, instances of class_t struct are created and stored for all the
    classes. For example, an instance of the class_t struct for NSObject and an instance
    of the class_t struct for NSMutableArray are created. These instances have the
    names of declared member variables, names of methods, the method implementations
    (which are function pointers), properties, and the pointer to its superclass.
    These are used by the Objective-C runtime library.


    Now, we understand how a class and an object in Objective-C are implemented to
    go to next step. Let’s check the struct for the Block again.


    `struct __main_block_impl_0 {`

    `    void *isa;`

    `    int Flags;`

    `    int Reserved;`

    `    void *FuncPtr;`

    `    struct __main_block_desc_0* Desc;`

    `}`


    This __main_block_impl_0 struct is based on the objc_object struct, and is a struct
    for Objective-C class objects. And, its member variable “isa” is initialized as
    follows.


    `isa = &_NSConcreteStackBlock;`


    This means that _NSConcreteStackBlock is the instance of the class_t struct. When
    the Block is treated as an Objective-C object, _NSConcreteStackBlock has all the
    information of its class. Now we’ve seen under the hood of Block, and we also
    know that a Block is an Objective-C object.'
  trans: "\n#### 初始化 `__main_block_impl_0` 实例\n\n接下来，我们来看一下 `__main_block_impl_0`\
    \ 结构体的实例是如何初始化的。其构造函数的参数如下：\n\n`__main_block_impl_0(__main_block_func_0, &__main_block_desc_0_DATA);`\n\
    \n第一个参数是一个函数指针，由 Block 字面量转换而来。第二个参数是指向 `__main_block_desc_0` 结构体实例的指针，该实例被初始化为一个静态全局变量。下面我们来检查\
    \ `__main_block_desc_0` 结构体实例是如何初始化的：\n\n```\nstatic struct __main_block_desc_0\
    \ __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct __main_block_impl_0)\n\
    };\n```\n\n它使用 Block 的大小（即 `__main_block_impl_0` 结构体的大小）进行初始化。\n\n下面我们来看看 Stack\
    \ 上的 `__main_block_impl_0` 结构体实例（即 Block）是如何通过这些参数进行初始化的。如果展开 `__block_impl`，`__main_block_impl_0`\
    \ 结构体可以重写为：\n\n```\nstruct __main_block_impl_0 {\n    void *isa;\n    int Flags;\n\
    \    int Reserved;\n    void *FuncPtr;\n    struct __main_block_desc_0* Desc;\n\
    }\n```\n\n该结构体通过构造函数初始化如下：\n\n```\nisa = &_NSConcreteStackBlock;\nFlags = 0;\n\
    Reserved = 0;\nFuncPtr = __main_block_func_0;\nDesc = &__main_block_desc_0_DATA;\n\
    ```\n\n你或许会对 `_NSConcreteStackBlock` 感兴趣，不过我们先暂且略过。先来看其他部分。`__main_block_func_0`\
    \ 函数的指针被赋值给了其成员变量 `FuncPtr`。它会在以下位置被使用：\n\n`blk();`\n\n这会被转换为：\n\n```\n((void\
    \ (*)(struct __block_impl *))(\n    (struct __block_impl *)blk)->FuncPtr)((struct\
    \ __block_impl *)blk);\n```\n\n再次去除类型转换：\n\n```\n(*blk->impl.FuncPtr)(blk);\n\
    ```\n\n这是一个通过函数指针进行的简单函数调用。正如我们所检查过的，成员变量 `FuncPtr` 包含了 `__main_block_func_0`\
    \ 函数的指针，而该函数由 Block 字面量转换而来。此外，我们还了解到 `__main_block_func_0` 函数的参数 `__cself` 就是\
    \ Block 本身。通过这段源码，我们可以确认 Block 作为参数 `__cself` 传入。\n\n#### 回顾 `_NSConcreteStackBlock`\n\
    \n我们已经大致了解了 Block 的内部机制。但还有一个多次被我们跳过的问题。`_NSConcreteStackBlock` 是什么？\n\n`isa =\
    \ &_NSConcreteStackBlock;`\n\n`_NSConcreteStackBlock` 的指针被赋值给了 Block 的结构体中的成员变量\
    \ `isa`。要理解其含义，我们需要了解 Objective-C 中类和对象是如何实现的。实际上，Block 在 Objective-C 中也是一个对象。\n\
    \n如你所知，变量类型 `id` 用于存储 Objective-C 对象。我们通常在 Objective-C 源码中随意使用它，就像在 C 语言中使用 `void\
    \ *` 一样。令人惊讶的是，`id` 类型是在 C 语言中声明的。其声明位于 `/usr/include/objc/objc.h`。\n\n```\ntypedef\
    \ struct objc_object {\n    Class isa;\n} *id;\n```\n\n这意味着 `id` 是一个指向 `objc_object`\
    \ 结构体的指针类型。我们来看看 `Class` 是什么。\n\n```\ntypedef struct objc_class *Class;\n```\n\
    \n`Class` 是一个指向 `objc_class` 结构体的指针类型。`objc_class` 结构体声明在 `/usr/include/objc/runtime.h`\
    \ 中。\n\n```\nstruct objc_class {\n    Class isa;\n};\n```\n\n它与 `objc_object`\
    \ 结构体相同。请注意，`objc_object` 结构体和 `objc_class` 结构体分别作为每个对象和类的基结构体使用。我们通过下面这个简单的 Objective-C\
    \ 类声明来验证一下。\n\n```\n@interface MyObject : NSObject\n{\n    int val0;\n    int\
    \ val1;\n}\n@end\n```\n\n这个类对应的结构体基于 `objc_object` 结构体，如下所示：\n\n```\nstruct MyObject\
    \ {\n    Class isa;\n    int val0;\n    int val1;\n};\n```\n\n`MyObject` 类的实例变量\
    \ `val0` 和 `val1` 直接被声明为该对象结构体的成员变量。在 Objective-C 中创建一个类的对象，等同于从该类生成的结构体中创建出一个实例。每个创建出的对象（即每个对象结构体的实例）在其成员变量\
    \ `isa` 中都有一个指向其类结构体实例的指针，如图 5-1 所示。\n\n![images](img/9781430241164_Fig05-01.jpg)\n\
    \n**图 5-1.** *Objective-C 类与对象*\n\n每个类的结构体是一个基于 `objc_class` 结构体的 `class_t` 结构体。`class_t`\
    \ 结构体在 `objc4` 运行时库的 `runtime/objc-runtime-new.h` 中声明。\n\n```\nstruct class_t\
    \ {\n    struct class_t *isa;\n    struct class_t *superclass;\n    Cache cache;\n\
    \    IMP *vtable;\n    uintptr_t data_NEVER_USE;\n};\n```\n\n在 Objective-C 中，会为所有类创建并存储\
    \ `class_t` 结构体的实例。例如，会创建 `NSObject` 的 `class_t` 结构体实例，以及 `NSMutableArray` 的 `class_t`\
    \ 结构体实例。这些实例包含了声明的成员变量名称、方法名称、方法实现（即函数指针）、属性以及指向其父类的指针。Objective-C 运行时库会使用这些信息。\n\
    \n现在，我们理解了 Objective-C 中类和对象的实现方式，可以继续下一步了。让我们再来审视一下 Block 的结构体：\n\n```\nstruct\
    \ __main_block_impl_0 {\n    void *isa;\n    int Flags;\n    int Reserved;\n \
    \   void *FuncPtr;\n    struct __main_block_desc_0* Desc;\n}\n```\n\n这个 `__main_block_impl_0`\
    \ 结构体基于 `objc_object` 结构体，是一个适用于 Objective-C 类对象的结构体。并且，它的成员变量 `isa` 被如下初始化：\n\
    \n`isa = &_NSConcreteStackBlock;`\n\n这意味着 `_NSConcreteStackBlock` 是 `class_t`\
    \ 结构体的一个实例。当 Block 被当作 Objective-C 对象对待时，`_NSConcreteStackBlock` 包含了其类的所有信息。至此，我们已经了解了\
    \ Block 的内部机制，同时也知道了 Block 是一个 Objective-C 对象。"
- fmt: "# Capturing Automatic Variables\n\nNext, let’s see how capturing automatic\
    \ variables is implemented. And also we discuss how the anonymous function feature\
    \ is implemented. The original source code that captures automatic variables is\
    \ shown in [Listing 5–3](#Chapter05.html#list_5_3).\n\n**Listing 5–3.** *Capturing\
    \ automatic variables*\n\n```\nint main() {\n    int dmy = 256;\n    int val =\
    \ 10;\n    const char *fmt = \"val = %d\\n\";\n    void (^blk)(void) = ^{printf(fmt,\
    \ val);};\n    return 0;\n}\n```\n\nAs we did previously, we use `clang` to convert\
    \ the source code. The result is shown in [Listing 5–4](#Chapter05.html#list_5_4).\n\
    \n**Listing 5–4.** *Converted source code of [Listing 5–3](#Chapter05.html#list_5_3)*\n\
    \n```\nstruct __main_block_impl_0 {\n    struct __block_impl impl;\n    struct\
    \ __main_block_desc_0* Desc;\n    const char *fmt;\n    int val;\n\n    __main_block_impl_0(void\
    \ *fp, struct __main_block_desc_0 *desc,\n            const char *_fmt, int _val,\
    \ int flags=0) : fmt(_fmt), val(_val) {\n        impl.isa = &_NSConcreteStackBlock;\n\
    \        impl.Flags = flags;\n        impl.FuncPtr = fp;\n        Desc = desc;\n\
    \    }\n};\n\nstatic void __main_block_func_0(struct __main_block_impl_0 *__cself)\n\
    {\n    const char *fmt = __cself->fmt;\n    int val = __cself->val;\n    printf(fmt,\
    \ val);\n}\n\nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n\
    \    unsigned long Block_size;\n} __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct\
    \ __main_block_impl_0)\n};\n\nint main() {\n    int dmy = 256;\n    int val =\
    \ 10;\n    const char *fmt = \"val = %d\\n\";\n    void (*blk)(void) = &__main_block_impl_0(\n\
    \        __main_block_func_0, &__main_block_desc_0_DATA, fmt, val);\n\n    return\
    \ 0;\n}\n```\n\nLet’s check the differences in the converted code from the previous\
    \ example. The automatic variables used in the Block literal are added to member\
    \ variables in the `__main_block_impl_0` struct.\n\n```\nstruct __main_block_impl_0\
    \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n  \
    \  const char *fmt;\n    int val;\n};\n```\n\nNote that only variables used by\
    \ the Block are captured. In this case, `dmy` is not used, so it is not added.\n\
    \n```\n__main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,\n     \
    \   const char *_fmt, int _val, int flags=0) : fmt(_fmt), val(_val) {\n```\n\n\
    When the instance of the struct is initialized, the member variables, which are\
    \ added from the automatic variables, are initialized by the arguments of the\
    \ constructor. Let’s see what arguments are passed to the constructor.\n\n```\n\
    void (*blk)(void) = &__main_block_impl_0(\n    __main_block_func_0, &__main_block_desc_0_DATA,\
    \ fmt, val);\n```\n\nThe instance of `__main_block_impl_0` struct is initialized\
    \ with the automatic variables `fmt` and `val`, which store the values at the\
    \ moment when the Block literal is declared. This means that the instance of `__main_block_impl_0`\
    \ struct is initialized as\n\n```\nimpl.isa = &_NSConcreteStackBlock;\nimpl.Flags\
    \ = 0;\nimpl.FuncPtr = __main_block_func_0;\nDesc = &__main_block_desc_0_DATA;\n\
    fmt = \"val = %d\\n\";\nval = 10;\n```\n\nNow we understand how the values of\
    \ automatic variables are captured in the instance of `__main_block_impl_0` struct,\
    \ the Block.\n\n## Anonymous Function\n\nNext, let’s see the implementation of\
    \ the anonymous function that uses the Block. The original Block literal is as\
    \ follows.\n\n```\n^{printf(fmt, val);}\n```\n\nThis is converted to a function.\n\
    \n```\nstatic void __main_block_func_0(struct __main_block_impl_0 *__cself)\n\
    {\n    const char *fmt = __cself->fmt;\n    int val = __cself->val;\n    printf(fmt,\
    \ val);\n}\n```\n\nIn the converted source code, to make the captured automatic\
    \ variables usable in this function, automatic variables are declared and defined\
    \ just before the expressions generated from the Block literal. Then the original\
    \ expressions in the Block literal can use the captured automatic variables in\
    \ their original expressions.\n\nTo wrap up, capturing automatic variables means\
    \ that when a Block literal is executed, the values of automatic variables, which\
    \ are used in the Block literal, are assigned to member variables of an instance\
    \ of a struct for the Block, and the instance is the Block itself.\n\nBy the way,\
    \ as explained in [Chapter 4](#Chapter04.html#ch4), automatic variables of C array\
    \ type can’t be used in a Block directly. As we’ve learned, to capture automatic\
    \ variables, the values are passed to the struct by its constructor. The following\
    \ source code resembles a converted source code if a C array is used from a Block.\n\
    \nIf a C array is passed to a constructor of a struct for a Block:\n\n```\nvoid\
    \ func(char a[10])\n{\n    printf(\"%d\\n\", a[0]);\n}\n\nint main()\n{\n    \
    \ char a[10] = {2};\n    func(a);\n}\n```\n\nThis can be compiled and works without\
    \ any problem. After that, the constructor will assign the argument to a member\
    \ variable. A function, which is converted from a Block literal, assigns the member\
    \ variable to an automatic variable. The source code would be as follows.\n\n\
    ```\nvoid func(char a[10])\n{\n    char b[10] = a;\n    printf(\"%d\\n\", b[0]);\n\
    }\n\nint main()\n{\n    char a[10] = {2};\n    func(a);\n}\n```\n\nThis source\
    \ code tries to assign a variable from a C array to a C array. It can’t be compiled.\
    \ Even though the type and the array length are the same, C language specification\
    \ doesn’t allow this kind of assignment. Of course, there are some ways to do\
    \ that, but in Blocks, following C language specs seems to be considered important.\n\
    \n# Writable Variables\n\nNext we show how variables could be writable in Blocks.\
    \ We see the two solutions to make variables writable, and start with reviewing\
    \ the automatic variables that are used in Blocks. Again, see the example of capturing\
    \ automatic variables ([Listing 5–3](#Chapter05.html#list_5_3)).\n\n```\n^{printf(fmt,\
    \ val);}\n```\n\nThis source code is converted as follows.\n\n```\nstatic void\
    \ __main_block_func_0(struct __main_block_impl_0 *__cself)\n{\n    const char\
    \ *fmt = __cself->fmt;\n    int val = __cself->val;\n\n    printf(fmt, val);\n\
    }\n```\n\nYou might have noticed something already. Only the values of the automatic\
    \ variables used in the Block are captured. As I’ve explained, because “anonymous\
    \ functions together with automatic (local) variables,” after the Block use these\
    \ values, they are never written back to the instance on the Block struct or to\
    \ its original automatic variables.\n\nNext the source code tries to modify the\
    \ automatic variable `val` inside the Block.\n\n```\nint val = 0;\nvoid (^blk)(void)\
    \ = ^{val = 1;};\n```\n\nThis causes the following compilation error.\n\n```\n\
    error: variable is not assignable (missing __block type specifier)\n    void (^blk)(void)\
    \ = ^{val = 1;};\n                      ~~~ ^\n```\n\nAs we’ve learned previously,\
    \ the implementation of Blocks never writes back the modified value of the variables.\
    \ So, when the compiler detects an assignment to the captured automatic variable,\
    \ it causes a compile error. But this limitation would be too inconvenient if\
    \ you could never change the values. To solve this problem, you have two choices:\
    \ using another kind of variable or using `__block` specifier. Let’s discuss the\
    \ other kind of variable first."
  raw: '### Capturing Automatic Variables


    Next, let’s see how capturing automatic variables is implemented. And also we
    discuss how the anonymous function feature is implemented. The original source
    code that captures automatic variables is shown in [Listing 5–3](#Chapter05.html#list_5_3).


    **Listing 5–3.** *Capturing automatic variables*


    `int main() {`

    `    int dmy = 256;`

    `    int val = 10;`

    `    const char *fmt = "val = %d\n";`

    `    void (^blk)(void) = ^{printf(fmt, val);};`

    `    return 0;`

    `}`


    As we did previously, we use clang to convert the source code. The result is shown
    in [Listing 5–4](#Chapter05.html#list_5_4).


    **Listing 5–4.** *Converted source code of [Listing 5–3](#Chapter05.html#list_5_3)*


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`

    `    const char *fmt;`

    `    int val;`


    `    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,`

    `            const char *_fmt, int _val, int flags=0) : fmt(_fmt), val(_val) {`

    `        impl.isa = &_NSConcreteStackBlock;`

    `        impl.Flags = flags;`

    `        impl.FuncPtr = fp;`

    `        Desc = desc;`

    `    }`

    `};`


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself)`

    `{`

    `    const char *fmt = __cself->fmt;`

    `    int val = __cself->val;`

    `    printf(fmt, val);`

    `}`


    `static struct __main_block_desc_0 {`

    `    unsigned long reserved;`

    `    unsigned long Block_size;`

    `} __main_block_desc_0_DATA = {`

    `    0,`

    `    sizeof(struct __main_block_impl_0)`

    `};`


    `int main() {`

    `    int dmy = 256;`

    `    int val = 10;`

    `    const char *fmt = "val = %d\n";`

    `    void (*blk)(void) = &__main_block_impl_0(`

    `        __main_block_func_0, &__main_block_desc_0_DATA, fmt, val);`


    `    return 0;`

    `}`


    Let’s check the differences in the converted code from the previous example. The
    automatic variables used in the Block literal are added to member variables in
    the __main_block_impl_0 struct.


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`

    `    const char *fmt;`

    `    int val;`

    `};`


    Note that only variables used by the Block are captured. In this case, “dmy” is
    not used, so it is not added.


    `__main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,`

    `        const char *_fmt, int _val, int flags=0) : fmt(_fmt), val(_val) {`


    When the instance of the struct is initialized, the member variables, which are
    added from the automatic variables, are initialized by the arguments of the constructor.
    Let’s see what arguments are passed to the constructor.


    `void (*blk)(void) = &__main_block_impl_0(`

    `    __main_block_func_0, &__main_block_desc_0_DATA, fmt, val);`


    The instance of __main_block_impl_0 struct is initialized with the automatic variables
    “fmt” and “val”, which store the values at the moment when the Block literal is
    declared. This means that the instance of __main_block_impl_0 struct is initialized
    as


    `impl.isa = &_NSConcreteStackBlock;`

    `impl.Flags = 0;`

    `impl.FuncPtr = __main_block_func_0;`

    `Desc = &__main_block_desc_0_DATA;`

    `fmt = "val = %d\n";`

    `val = 10;`


    Now we understand how the values of automatic variables are captured in the instance
    of __main_block_impl_0 struct, the Block.


    #### Anonymous Function


    Next, let’s see the implementation of the anonymous function that uses the Block.
    The original Block literal is as follows.


    `^{printf(fmt, val);}`


    This is converted to a function.


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself)`

    `{`

    `    const char *fmt = __cself->fmt;`

    `    int val = __cself->val;`

    `    printf(fmt, val);`

    `}`


    In the converted source code, to make the captured automatic variables usable
    in this function, automatic variables are declared and defined just before the
    expressions generated from the Block literal. Then the original expressions in
    the Block literal can use the captured automatic variables in their original expressions.


    To wrap up, capturing automatic variables means that when a Block literal is executed,
    the values of automatic variables, which are used in the Block literal, are assigned
    to member variables of an instance of a struct for the Block, and the instance
    is the Block itself.


    By the way, as explained in [Chapter 4](#Chapter04.html#ch4), automatic variables
    of C array type can’t be used in a Block directly. As we’ve learned, to capture
    automatic variables, the values are passed to the struct by its constructor. The
    following source code resembles a converted source code if a C array is used from
    a Block.


    If a C array is passed to a constructor of a struct for a Block:


    `void func(char a[10])`

    `{`

    `    printf("%d\n", a[0]);`

    `}`


    `int main()`

    `{`

    `     char a[10] = {2};`

    `    func(a);`

    `}`


    This can be compiled and works without any problem. After that, the constructor
    will assign the argument to a member variable. A function, which is converted
    from a Block literal, assigns the member variable to an automatic variable. The
    source code would be as follows.


    `void func(char a[10])`

    `{`

    `    char b[10] = a;`

    `    printf("%d\n", b[0]);`

    `}`


    `int main()`

    `{`

    `    char a[10] = {2};`

    `    func(a);`

    `}`


    This source code tries to assign a variable from a C array to a C array. It can’t
    be compiled. Even though the type and the array length are the same, C language
    specification doesn’t allow this kind of assignment. Of course, there are some
    ways to do that, but in Blocks, following C language specs seems to be considered
    important.


    ### Writable Variables


    Next we show how variables could be writable in Blocks. We see the two solutions
    to make variables writable, and start with reviewing the automatic variables that
    are used in Blocks. Again, see the example of capturing automatic variables ([Listing
    5–3](#Chapter05.html#list_5_3)).


    `^{printf(fmt, val);}`


    This source code is converted as follows.


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself)`

    `{`

    `    const char *fmt = __cself->fmt;`

    `    int val = __cself->val;`


    `    printf(fmt, val);`

    `}`


    You might have noticed something already. Only the values of the automatic variables
    used in the Block are captured. As I’ve explained, because “anonymous functions
    together with automatic (local) variables,” after the Block use these values,
    they are never written back to the instance on the Block struct or to its original
    automatic variables.


    Next the source code tries to modify the automatic variable “val” inside the Block.


    `int val = 0;`

    `void (^blk)(void) = ^{val = 1;};`


    This causes the following compilation error.


    `error: variable is not assignable (missing __block type specifier)`

    `    void (^blk)(void) = ^{val = 1;};`

    `                      ~~~ ^`


    As we’ve learned previously, the implementation of Blocks never writes back the
    modified value of the variables. So, when the compiler detects an assignment to
    the captured automatic variable, it causes a compile error. But this limitation
    would be too inconvenient if you could never change the values. To solve this
    problem, you have two choices: using another kind of variable or using __block
    specifier. Let’s discuss the other kind of variable first.'
  trans: "\n# 捕获自动变量\n\n接下来，我们来看看捕获自动变量的实现方式，同时讨论匿名函数特性的实现原理。捕获自动变量的原始源代码如代码清单 5-3\
    \ 所示。\n\n**代码清单 5-3.** *捕获自动变量*\n\n```\nint main() {\n    int dmy = 256;\n   \
    \ int val = 10;\n    const char *fmt = \"val = %d\\n\";\n    void (^blk)(void)\
    \ = ^{printf(fmt, val);};\n    return 0;\n}\n```\n\n沿用之前的方法，我们用`clang`对源代码进行转换，转换结果如代码清单\
    \ 5-4 所示。\n\n**代码清单 5-4.** *代码清单 5-3 的转换后源代码*\n\n```\nstruct __main_block_impl_0\
    \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n  \
    \  const char *fmt;\n    int val;\n\n    __main_block_impl_0(void *fp, struct\
    \ __main_block_desc_0 *desc,\n            const char *_fmt, int _val, int flags=0)\
    \ : fmt(_fmt), val(_val) {\n        impl.isa = &_NSConcreteStackBlock;\n     \
    \   impl.Flags = flags;\n        impl.FuncPtr = fp;\n        Desc = desc;\n  \
    \  }\n};\n\nstatic void __main_block_func_0(struct __main_block_impl_0 *__cself)\n\
    {\n    const char *fmt = __cself->fmt;\n    int val = __cself->val;\n    printf(fmt,\
    \ val);\n}\n\nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n\
    \    unsigned long Block_size;\n} __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct\
    \ __main_block_impl_0)\n};\n\nint main() {\n    int dmy = 256;\n    int val =\
    \ 10;\n    const char *fmt = \"val = %d\\n\";\n    void (*blk)(void) = &__main_block_impl_0(\n\
    \        __main_block_func_0, &__main_block_desc_0_DATA, fmt, val);\n\n    return\
    \ 0;\n}\n```\n\n让我们对比转换后的代码与上一个示例的差异。在 Block 字面量中使用的自动变量，会被添加为`__main_block_impl_0`结构体的成员变量。\n\
    \n```\nstruct __main_block_impl_0 {\n    struct __block_impl impl;\n    struct\
    \ __main_block_desc_0* Desc;\n    const char *fmt;\n    int val;\n};\n```\n\n\
    请注意，只有 Block 内部使用到的变量才会被捕获。在这个例子中，`dmy`并未被使用，因此没有被添加。\n\n```\n__main_block_impl_0(void\
    \ *fp, struct __main_block_desc_0 *desc,\n        const char *_fmt, int _val,\
    \ int flags=0) : fmt(_fmt), val(_val) {\n```\n\n当结构体实例被初始化时，通过构造函数参数来初始化那些由自动变量添加而来的成员变量。我们来看看传递给构造函数的实际参数。\n\
    \n```\nvoid (*blk)(void) = &__main_block_impl_0(\n    __main_block_func_0, &__main_block_desc_0_DATA,\
    \ fmt, val);\n```\n\n`__main_block_impl_0`结构体的实例通过自动变量`fmt`和`val`进行初始化，这两个变量存储的是\
    \ Block 字面量声明时刻的值。这意味着`__main_block_impl_0`结构体实例的初始化过程如下：\n\n```\nimpl.isa = &_NSConcreteStackBlock;\n\
    impl.Flags = 0;\nimpl.FuncPtr = __main_block_func_0;\nDesc = &__main_block_desc_0_DATA;\n\
    fmt = \"val = %d\\n\";\nval = 10;\n```\n\n至此，我们理解了自动变量的值是如何被捕获到`__main_block_impl_0`结构体实例（即\
    \ Block）中的。\n\n## 匿名函数\n\n接下来，让我们看看使用 Block 实现的匿名函数。原始的 Block 字面量如下所示：\n\n```\n\
    ^{printf(fmt, val);}\n```\n\n这段代码被转换为一个函数。\n\n```\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself)\n{\n    const char *fmt = __cself->fmt;\n    int\
    \ val = __cself->val;\n    printf(fmt, val);\n}\n```\n\n在转换后的源代码中，为了使捕获的自动变量在该函数内可用，在由\
    \ Block 字面量生成的表达式之前，声明并定义了自动变量。这样，Block 字面量中的原始表达式就能使用这些捕获到的自动变量。\n\n总结来说，捕获自动变量意味着：当\
    \ Block 字面量被执行时，其中用到的自动变量的值，会被赋值给 Block 对应的结构体实例的成员变量，而这个实例就是 Block 本身。\n\n顺便提一下，如第\
    \ 4 章所述，C 数组类型的自动变量不能直接在 Block 中使用。正如我们所学，要捕获自动变量，需要将其值通过构造函数传递给结构体。如果 C 数组从 Block\
    \ 中使用，其转换后的源代码大致如下所示。\n\n如果将 C 数组传递给 Block 对应的结构体构造函数：\n\n```\nvoid func(char\
    \ a[10])\n{\n    printf(\"%d\\n\", a[0]);\n}\n\nint main()\n{\n     char a[10]\
    \ = {2};\n    func(a);\n}\n```\n\n这段代码可以编译并正常运行。之后，构造函数会将参数赋值给成员变量。由 Block 字面量转换而来的函数，则会将成员变量赋值给自动变量。源代码会变成下面这样：\n\
    \n```\nvoid func(char a[10])\n{\n    char b[10] = a;\n    printf(\"%d\\n\", b[0]);\n\
    }\n\nint main()\n{\n    char a[10] = {2};\n    func(a);\n}\n```\n\n这段代码试图将一个 C\
    \ 数组变量赋值给另一个 C 数组变量，但无法通过编译。即使类型和数组长度都相同，C 语言规范也不允许这种赋值操作。当然，存在一些方法可以实现该目的，但在\
    \ Block 的实现中，遵循 C 语言规范似乎被视作一个重要的原则。\n\n# 可写变量\n\n接下来，我们展示变量如何在 Block 内变得可写。我们将探讨两种使变量可写的方法，并从回顾\
    \ Block 中使用的自动变量开始。再次参考捕获自动变量的例子（代码清单 5-3）。\n\n```\n^{printf(fmt, val);}\n```\n\
    \n这段源代码被转换为以下形式：\n\n```\nstatic void __main_block_func_0(struct __main_block_impl_0\
    \ *__cself)\n{\n    const char *fmt = __cself->fmt;\n    int val = __cself->val;\n\
    \n    printf(fmt, val);\n}\n```\n\n你可能已经注意到了一些问题。Block 只捕获了其所用自动变量的值。正如我解释过的，因为“匿名函数与自动（局部）变量相结合”，在\
    \ Block 使用这些值之后，它们永远不会被写回 Block 结构体的实例，也不会写回原始的自动变量。\n\n接下来，这段源代码试图在 Block 内部修改自动变量`val`。\n\
    \n```\nint val = 0;\nvoid (^blk)(void) = ^{val = 1;};\n```\n\n这会导致以下编译错误：\n\n\
    ```\nerror: variable is not assignable (missing __block type specifier)\n    void\
    \ (^blk)(void) = ^{val = 1;};\n                      ~~~ ^\n```\n\n正如我们之前所学，Block\
    \ 的实现机制永远不会回写变量的修改值。因此，当编译器检测到对捕获的自动变量进行赋值操作时，会引发编译错误。但如果永远无法修改变量值，这种限制会显得非常不便。为了解决这个问题，你有两个选择：使用另一种类型的变量，或者使用`__block`说明符。我们先来讨论另一种类型的变量。\n"
- fmt: "### Static or Global Variables\n\nIn C Language, there are writable variables:\n\
    \n-   Static variables\n-   Static global variables\n-   Global variables\n\n\
    An anonymous function part in a Block literal is simply converted to a C function.\
    \ In the converted function, static global variables and global variables can\
    \ be accessed. They work without any problem. But static variables are different.\
    \ Because the converted function is declared outside the original function, where\
    \ the Block literal is, static variables cannot be accessed because of the variable\
    \ scope. Let’s check it with the following source code.\n\n```\nint global_val\
    \ = 1;\nstatic int static_global_val = 2;\n\nint main()\n{\n    static int static_val\
    \ = 3;\n    void (^blk)(void) = ^{\n        global_val *= 1;\n        static_global_val\
    \ *= 2;\n        static_val *= 3;\n    };\n    return 0;\n}\n```\n\nIn the Block,\
    \ the static variable `static_val`, static global variable `static_global_val`,\
    \ and global variable `global_val` are modified. How will the source code be converted?\n\
    \n```\nint global_val = 1;\nstatic int static_global_val = 2;\n\nstruct __main_block_impl_0\
    \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n  \
    \  int *static_val;\n    __main_block_impl_0(void *fp, struct __main_block_desc_0\
    \ *desc,\n            int *_static_val, int flags=0) : static_val(_static_val)\
    \ {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n\
    \        impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself) {\n    int *static_val = __cself->static_val;\n\
    \n    global_val *= 1;\n    static_global_val *= 2;\n    (*static_val) *= 3;\n\
    }\n\nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned\
    \ long Block_size;\n} __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct\
    \ __main_block_impl_0)\n};\n\nint main()\n{\n    static int static_val = 3;\n\n\
    \    blk = &__main_block_impl_0(\n        __main_block_func_0, &__main_block_desc_0_DATA,\
    \ &static_val);\n\n    return 0;\n}\n```\n\nThe converted source code is familiar\
    \ looking. The static global variable `static_global_val` and global variable\
    \ `global_val` are accessed just as in the original source code. How about the\
    \ static variable `static_val`? The following part shows how the variable is used\
    \ inside the Block.\n\n```\nstatic void __main_block_func_0(struct __main_block_impl_0\
    \ *__cself) {\n    int *static_val = __cself->static_val;\n\n    (*static_val)\
    \ *= 3;\n}\n```\n\nThe static variable `static_val` is accessed via its pointer.\
    \ A pointer to the variable is passed to the constructor of `__main_block_impl_0`\
    \ struct, and then the constructor assigns it. This is the easiest way to use\
    \ a variable beyond the variable’s scope.\n\nYou might think that accessing automatic\
    \ variables could be implemented in the same way as static variables. Why not?\
    \ Because a Block must be able to exist even after the scope of a captured automatic\
    \ variable is left. When the scope is left, the automatic variable is destroyed.\
    \ Which means the Block can’t access the automatic variable anymore. So, automatic\
    \ variables can’t be implemented the same as static variables. We learn those\
    \ details in the next section.\n\n### `__block` specifier\n\nAs mentioned before,\
    \ the other choice to avoid this problem is to use a `__block` specifier. To be\
    \ precise, it is called a `__block` storage-class-specifier. In C language, the\
    \ following are the storage-class-specifiers.\n\n-   `typedef`\n-   `extern`\n\
    -   `static`\n-   `auto`\n-   `register`\n\nThe `__block` specifier is something\
    \ like `static`, `auto`, and `register`. They specify where the variable is stored.\
    \ With `auto`, the value is stored on the stack as an automatic variable. With\
    \ `static`, the value is stored in the data section as a static variable, and\
    \ so on.\n\nLet’s see how `__block` specifier works.\n\nThe `__block` specifier\
    \ is used when you want to modify automatic variables from a Block, Let’s use\
    \ `__block` specifier for the previous source code, which causes a compiling error.\
    \ What will happen when `__block` specifier is added to the automatic variable\
    \ declaration?\n\n```\n__block int val = 10;\n\nvoid (^blk)(void) = ^{val = 1;};\n\
    ```\n\nThis source code is compiled without any problem. This is converted as\
    \ shown in [Listing 5–5](#Chapter05.html#list_5_5).\n\n**Listing 5–5.** *converted\
    \ sourcecode that uses __block specifier*\n\n```\nstruct __Block_byref_val_0 {\n\
    \    void *__isa;\n    __Block_byref_val_0 *__forwarding;\n    int __flags;\n\
    \    int __size;\n    int val;\n};\n\nstruct __main_block_impl_0 {\n    struct\
    \ __block_impl impl;\n    struct __main_block_desc_0* Desc;\n    __Block_byref_val_0\
    \ *val;\n    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,\n\
    \            __Block_byref_val_0 *_val, int flags=0) : val(_val->__forwarding)\
    \ {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n\
    \        impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself)\n{\n    __Block_byref_val_0 *val = __cself->val;\n\
    \n    (val->__forwarding->val) = 1;\n}\n\nstatic void __main_block_copy_0(   \
    \  struct __main_block_impl_0*dst, struct __main_block_impl_0*src)\n{\n    _Block_object_assign(&dst->val,\
    \ src->val, BLOCK_FIELD_IS_BYREF);\n}\n\nstatic void __main_block_dispose_0(struct\
    \ __main_block_impl_0*src) {\n    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);\n\
    }\n\nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned\
    \ long Block_size;\n    void (*copy)(struct __main_block_impl_0*, struct __main_block_impl_0*);\n\
    \    void (*dispose)(struct __main_block_impl_0*);\n} __main_block_desc_0_DATA\
    \ = {\n    0,\n    sizeof(struct __main_block_impl_0),\n     __main_block_copy_0,\n\
    \    __main_block_dispose_0\n};\n\nint main()\n{\n    __Block_byref_val_0 val\
    \ = {\n        0,\n        &val,\n        0,\n        sizeof(__Block_byref_val_0),\n\
    \        10\n    };\n\n    blk = &__main_block_impl_0(\n        __main_block_func_0,\
    \ &__main_block_desc_0_DATA, &val, 0x22000000);\n\n    return 0;\n}\n```\n\nWhen\
    \ `__block` specifier is added for the automatic variable, the source code becomes\
    \ quite large. Next, we discuss why such a large source code has to be needed\
    \ only for `__block` specifier.\n\nIn the original source code, `__block` specifier\
    \ was used as\n\n```\n__block int val = 10;\n```\n\nHow was the `__block` variable\
    \ `val` converted?\n\n```\n__Block_byref_val_0 val = {\n    0,\n    &val,\n  \
    \  0,\n    sizeof(__Block_byref_val_0),\n    10\n};\n```\n\nSurprisingly, it is\
    \ converted to an instance of a struct. The `__block` variable is an automatic\
    \ variable of `__Block_byref_val_0` struct, as Block is, which means that the\
    \ `__block` variable is an instance of the `__Block_byref_val_0` struct on the\
    \ stack. The `__block` variable is initialized with `10`. You can see the instance\
    \ of the struct is initialized with `10`, meaning that the struct stores the value\
    \ of the original automatic variable in its member variable.\n\nLet’s check the\
    \ declaration of the struct.\n\n```\nstruct __Block_byref_val_0 {\n    void *__isa;\n\
    \    __Block_byref_val_0 *__forwarding;\n    int __flags;\n    int __size;\n \
    \   int val;\n};\n```"
  raw: '#### Static or Global Variables


    In C Language, there are writable variables:


    *   Static variables

    *   Static global variables

    *   Global variables


    An anonymous function part in a Block literal is simply converted to a C function.
    In the converted function, static global variables and global variables can be
    accessed. They work without any problem. But static variables are different. Because
    the converted function is declared outside the original function, where the Block
    literal is, static variables cannot be accessed because of the variable scope.
    Let’s check it with the following source code.


    `int global_val = 1;`

    `static int static_global_val = 2;`


    `int main()`

    `{`

    `    static int static_val = 3;`

    `    void (^blk)(void) = ^{`

    `        global_val *= 1;`

    `        static_global_val *= 2;`

    `        static_val *= 3;`

    `    };`

    `    return 0;`

    `}`


    In the Block, the static variable “static_val”, static global variable “static_global_val”,
    and global variable “global_val” are modified. How will the source code be converted?


    `int global_val = 1;`

    `static int static_global_val = 2;`


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`

    `    int *static_val;`

    `    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,`

    `            int *_static_val, int flags=0) : static_val(_static_val) {`

    `        impl.isa = &_NSConcreteStackBlock;`

    `        impl.Flags = flags;`

    `        impl.FuncPtr = fp;`

    `        Desc = desc;`

    `    }`

    `};`


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself) {`

    `    int *static_val = __cself->static_val;`


    `    global_val *= 1;`

    `    static_global_val *= 2;`

    `    (*static_val) *= 3;`

    `}`


    `static struct __main_block_desc_0 {`

    `    unsigned long reserved;`

    `    unsigned long Block_size;`

    `} __main_block_desc_0_DATA = {`

    `    0,`

    `    sizeof(struct __main_block_impl_0)`

    `};`


    `int main()`

    `{`

    `    static int static_val = 3;`


    `    blk = &__main_block_impl_0(`

    `        __main_block_func_0, &__main_block_desc_0_DATA, &static_val);`


    `    return 0;`

    `}`


    The converted source code is familiar looking. The static global variable “static_global_val”
    and global variable “global_val” are accessed just as in the original source code.
    How about the static variable “static_val”? The following part shows how the variable
    is used inside the Block.


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself) {`

    `    int *static_val = __cself->static_val;`


    `    (*static_val) *= 3;`

    `}`


    The static variable “static_val” is accessed via its pointer. A pointer to the
    variable is passed to the constructor of _main_block_impl_0 struct, and then the
    constructor assigns it. This is the easiest way to use a variable beyond the variable’s
    scope.


    You might think that accessing automatic variables could be implemented in the
    same way as static variables. Why not? Because a Block must be able to exist even
    after the scope of a captured automatic variable is left. When the scope is left,
    the automatic variable is destroyed. Which means the Block can’t access the automatic
    variable anymore. So, automatic variables can’t be implemented the same as static
    variables. We learn those details in the next section.


    #### __block specifier


    As mentioned before, the other choice to avoid this problem is to use a __block
    specifier. To be precise, it is called a __block storage-class-specifier. In C
    language, the following are the storage-class-specifiers.


    *   typedef

    *   extern

    *   static

    *   auto

    *   register


    The __block specifier is something like static, auto, and register. They specify
    where the variable is stored. With “auto”, the value is stored on the stack as
    an automatic variable. With “static”, the value is stored in the data section
    as a static variable, and so on.


    Let’s see how __block specifier works.


    The __block specifier is used when you want to modify automatic variables from
    a Block, Let’s use __block specifier for the previous source code, which causes
    a compiling error. What will happen when __block specifier is added to the automatic
    variable declaration?


    `__block int val = 10;`


    `void (^blk)(void) = ^{val = 1;};`


    This source code is compiled without any problem. This is converted as shown in
    [Listing 5–5](#Chapter05.html#list_5_5).


    **Listing 5–5.** *converted sourcecode that uses __block specifier*


    `struct __Block_byref_val_0 {`

    `    void *__isa;`

    `    __Block_byref_val_0 *__forwarding;`

    `    int __flags;`

    `    int __size;`

    `    int val;`

    `};`


    `struct __main_block_impl_0 {`

    `    struct __block_impl impl;`

    `    struct __main_block_desc_0* Desc;`

    `    __Block_byref_val_0 *val;`

    `    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,`

    `            __Block_byref_val_0 *_val, int flags=0) : val(_val->__forwarding)
    {`

    `        impl.isa = &_NSConcreteStackBlock;`

    `        impl.Flags = flags;`

    `        impl.FuncPtr = fp;`

    `        Desc = desc;`

    `    }`

    `};`


    `static void __main_block_func_0(struct __main_block_impl_0 *__cself)`

    `{`

    `    __Block_byref_val_0 *val = __cself->val;`


    `    (val->__forwarding->val) = 1;`

    `}`


    `static void __main_block_copy_0(     struct __main_block_impl_0*dst, struct __main_block_impl_0*src)`

    `{`

    `    _Block_object_assign(&dst->val, src->val, BLOCK_FIELD_IS_BYREF);`

    `}`


    `static void __main_block_dispose_0(struct __main_block_impl_0*src) {`

    `    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);`

    `}`


    `static struct __main_block_desc_0 {`

    `    unsigned long reserved;`

    `    unsigned long Block_size;`

    `    void (*copy)(struct __main_block_impl_0*, struct __main_block_impl_0*);`

    `    void (*dispose)(struct __main_block_impl_0*);`

    `} __main_block_desc_0_DATA = {`

    `    0,`

    `    sizeof(struct __main_block_impl_0),`

    `     __main_block_copy_0,`

    `    __main_block_dispose_0`

    `};`


    `int main()`

    `{`

    `    __Block_byref_val_0 val = {`

    `        0,`

    `        &val,`

    `        0,`

    `        sizeof(__Block_byref_val_0),`

    `        10`

    `    };`


    `    blk = &__main_block_impl_0(`

    `        __main_block_func_0, &__main_block_desc_0_DATA, &val, 0x22000000);`


    `    return 0;`

    `}`


    When __block specifier is added for the automatic variable, the source code becomes
    quite large. Next, we discuss why such a large source code has to be needed only
    for __block specifier.


    In the original source code, __block specifier was used as


    `__block int val = 10;`


    How was the __block variable “val” converted?


    `__Block_byref_val_0 val = {`

    `    0,`

    `    &val,`

    `    0,`

    `    sizeof(__Block_byref_val_0),`

    `    10`

    `};`


    Surprisingly, it is converted to an instance of a struct. The __block variable
    is an automatic variable of __Block_byref_val_0 struct, as Block is, which means
    that the __block variable is an instance of the __Block_byref_val_0 struct on
    the stack. The _block variable is initialized with 10\. You can see the instance
    of the struct is initialized with 10, meaning that the struct stores the value
    of the original automatic variable in its member variable.


    Let’s check the declaration of the struct.


    `struct __Block_byref_val_0 {`

    `    void *__isa;`

    `    __Block_byref_val_0 *__forwarding;`

    `    int __flags;`

    `    int __size;`

    `    int val;`

    `};`'
  trans: "\n### 静态变量或全局变量\n\n在 C 语言中，存在可写变量：\n\n-   静态变量\n-   静态全局变量\n-   全局变量\n\n\
    Block 字面量中的匿名函数部分会被直接转换成 C 函数。在转换后的函数中，可以访问静态全局变量和全局变量。它们可以毫无问题地运行。但静态变量则不同。由于转换后的函数声明在原始函数之外——也就是\
    \ Block 字面量所在的位置——静态变量因变量作用域而无法访问。我们通过以下源代码来验证这一点。\n\n```\nint global_val = 1;\n\
    static int static_global_val = 2;\n\nint main()\n{\n    static int static_val\
    \ = 3;\n    void (^blk)(void) = ^{\n        global_val *= 1;\n        static_global_val\
    \ *= 2;\n        static_val *= 3;\n    };\n    return 0;\n}\n```\n\n在 Block 中，静态变量\
    \ `static_val`、静态全局变量 `static_global_val` 和全局变量 `global_val` 被修改。该源代码将如何转换？\n\n\
    ```\nint global_val = 1;\nstatic int static_global_val = 2;\n\nstruct __main_block_impl_0\
    \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n  \
    \  int *static_val;\n    __main_block_impl_0(void *fp, struct __main_block_desc_0\
    \ *desc,\n            int *_static_val, int flags=0) : static_val(_static_val)\
    \ {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n\
    \        impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself) {\n    int *static_val = __cself->static_val;\n\
    \n    global_val *= 1;\n    static_global_val *= 2;\n    (*static_val) *= 3;\n\
    }\n\nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned\
    \ long Block_size;\n} __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct\
    \ __main_block_impl_0)\n};\n\nint main()\n{\n    static int static_val = 3;\n\n\
    \    blk = &__main_block_impl_0(\n        __main_block_func_0, &__main_block_desc_0_DATA,\
    \ &static_val);\n\n    return 0;\n}\n```\n\n转换后的源代码看起来似曾相识。静态全局变量 `static_global_val`\
    \ 和全局变量 `global_val` 的访问方式与原始源代码中完全相同。那么静态变量 `static_val` 呢？以下部分展示了该变量在 Block\
    \ 内部的使用方式。\n\n```\nstatic void __main_block_func_0(struct __main_block_impl_0\
    \ *__cself) {\n    int *static_val = __cself->static_val;\n\n    (*static_val)\
    \ *= 3;\n}\n```\n\n静态变量 `static_val` 通过其指针进行访问。该变量的指针被传递给了 `__main_block_impl_0`\
    \ 结构体的构造函数，然后由构造函数赋值。这是在变量作用域之外使用变量的最简单方法。\n\n你可能会想，访问自动变量的方式也可以与静态变量相同。为什么不这样做呢？因为即使在捕获的自动变量离开作用域之后，Block\
    \ 也必须能够存在。当变量离开作用域时，自动变量会被销毁。这意味着 Block 无法再访问该自动变量。因此，自动变量不能像静态变量那样实现。我们将在下一节中了解这些细节。\n\
    \n### `__block` 说明符\n\n如前所述，避免这个问题的另一个选择是使用 `__block` 说明符。准确地说，它被称为 `__block`\
    \ 存储类说明符。在 C 语言中，存储类说明符如下所示。\n\n-   `typedef`\n-   `extern`\n-   `static`\n- \
    \  `auto`\n-   `register`\n\n`__block` 说明符类似于 `static`、`auto` 和 `register`。它们指定变量的存储位置。使用\
    \ `auto` 时，值作为自动变量存储在栈上。使用 `static` 时，值作为静态变量存储在数据段中，以此类推。\n\n让我们看看 `__block`\
    \ 说明符是如何工作的。\n\n当你想要从 Block 中修改自动变量时，会使用 `__block` 说明符。让我们在上一个导致编译错误的源代码中使用 `__block`\
    \ 说明符。当 `__block` 说明符被添加到自动变量声明中时，会发生什么？\n\n```\n__block int val = 10;\n\nvoid\
    \ (^blk)(void) = ^{val = 1;};\n```\n\n这段源代码可以毫无问题地编译。它的转换结果如 代码清单 5–5 所示。\n\n\
    **代码清单 5–5.** *使用 __block 说明符的转换后源代码*\n\n```\nstruct __Block_byref_val_0 {\n \
    \   void *__isa;\n    __Block_byref_val_0 *__forwarding;\n    int __flags;\n \
    \   int __size;\n    int val;\n};\n\nstruct __main_block_impl_0 {\n    struct\
    \ __block_impl impl;\n    struct __main_block_desc_0* Desc;\n    __Block_byref_val_0\
    \ *val;\n    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,\n\
    \            __Block_byref_val_0 *_val, int flags=0) : val(_val->__forwarding)\
    \ {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n\
    \        impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
    \ __main_block_impl_0 *__cself)\n{\n    __Block_byref_val_0 *val = __cself->val;\n\
    \n    (val->__forwarding->val) = 1;\n}\n\nstatic void __main_block_copy_0(   \
    \  struct __main_block_impl_0*dst, struct __main_block_impl_0*src)\n{\n    _Block_object_assign(&dst->val,\
    \ src->val, BLOCK_FIELD_IS_BYREF);\n}\n\nstatic void __main_block_dispose_0(struct\
    \ __main_block_impl_0*src) {\n    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);\n\
    }\n\nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned\
    \ long Block_size;\n    void (*copy)(struct __main_block_impl_0*, struct __main_block_impl_0*);\n\
    \    void (*dispose)(struct __main_block_impl_0*);\n} __main_block_desc_0_DATA\
    \ = {\n    0,\n    sizeof(struct __main_block_impl_0),\n     __main_block_copy_0,\n\
    \    __main_block_dispose_0\n};\n\nint main()\n{\n    __Block_byref_val_0 val\
    \ = {\n        0,\n        &val,\n        0,\n        sizeof(__Block_byref_val_0),\n\
    \        10\n    };\n\n    blk = &__main_block_impl_0(\n        __main_block_func_0,\
    \ &__main_block_desc_0_DATA, &val, 0x22000000);\n\n    return 0;\n}\n```\n\n当为自动变量添加\
    \ `__block` 说明符时，源代码变得相当庞大。接下来，我们讨论为什么仅仅为了 `__block` 说明符就需要如此庞大的源代码。\n\n在原始源代码中，`__block`\
    \ 说明符的使用如下：\n\n```\n__block int val = 10;\n```\n\n那么 `__block` 变量 `val` 是如何转换的呢？\n\
    \n```\n__Block_byref_val_0 val = {\n    0,\n    &val,\n    0,\n    sizeof(__Block_byref_val_0),\n\
    \    10\n};\n```\n\n令人惊讶的是，它被转换成了一个结构体实例。`__block` 变量是 `__Block_byref_val_0` 结构体的自动变量，就像\
    \ Block 一样，这意味着 `__block` 变量是栈上 `__Block_byref_val_0` 结构体的一个实例。`__block` 变量被初始化为\
    \ `10`。你可以看到该结构体实例被初始化为 `10`，这意味着该结构体将原始自动变量的值存储在其成员变量中。\n\n让我们检查该结构体的声明。\n\n\
    ```\nstruct __Block_byref_val_0 {\n    void *__isa;\n    __Block_byref_val_0 *__forwarding;\n\
    \    int __flags;\n    int __size;\n    int val;\n};\n```\n"
- fmt: "# 排版后的文档\n\nAs we’ve seen in the initializing part, the last member variable\
    \ in the struct `\"val\"`, stores the original automatic variable, as its name\
    \ suggests.\n\nHow does the assignment to the `__block` variables work?\n\n```\n\
    ^{val = 1;}\n```\n\nThis source code is converted as follows.\n\n```\nstatic void\
    \ __main_block_func_0(struct __main_block_impl_0 *__cself)\n{\n    __Block_byref_val_0\
    \ *val = __cself->val;\n    (val->__forwarding->val) = 1;\n}\n```\n\nAs we’ve\
    \ learned, to assign to a static variable from a Block, a pointer to the static\
    \ variable is used. Assigning to a `__block` variable, however, is more complicated.\
    \ An instance of `__main_block_impl_0` struct for the Block has a pointer to the\
    \ instance of `__Block_byref_val_0` struct for the `__block` variable.\n\nThe\
    \ instance of `__Block_byref_val_0` struct has a pointer to the instance of `__Block_byref_val_0`\
    \ struct in the member variable `\"__forwarding\"`. Through the member variable\
    \ `\"__forwarding\"`, the member variable `\"val\"`, corresponding to the original\
    \ automatic variable, is accessed ([Figure 5–2](#Chapter05.html#fig_5_2)).\n\n\
    ![images](images/9781430241164_Fig05-02.jpg)\n\n**Figure 5–2.** *Accessing __block\
    \ variable*\n\nWe get back to `\"forwarding\"` in a bit. It is explained further\
    \ in the next two sections, “Memory Segments for Blocks” and “Memory Segments\
    \ for `__block` Variables.” For now, let’s look at the member variables of the\
    \ `__Block_byref_val_0` struct, which are not included in the `__main_block_impl_0`\
    \ struct. The reason why `__Block_byref_val_0` struct is separated is to make\
    \ the `__block` variable usable from more than one Block. Let’s see the following\
    \ example.\n\n```\n__block int val = 10;\n\nvoid (^blk0)(void) = ^{val = 0;};\n\
    \nvoid (^blk1)(void) = ^{val = 1;};\n```\n\nThe variables `\"blk0\"` and `\"blk1\"\
    ` of the Block type access the `__block` variable `\"val\"`. It is converted as\n\
    \n```\n__Block_byref_val_0 val = {0, &val, 0, sizeof(__Block_byref_val_0), 10};\n\
    \nblk0 = &__main_block_impl_0(\n    __main_block_func_0, &__main_block_desc_0_DATA,\
    \ &val, 0x22000000);\n\nblk1 = &__main_block_impl_1(\n    __main_block_func_1,\
    \ &__main_block_desc_1_DATA, &val, 0x22000000);\n```\n\nTwo Blocks use pointers\
    \ to the same instance `\"val\"` of the `__Block_byref_val_0` struct, which means\
    \ that multiple Blocks can share the same `__block` variable. On the other hand,\
    \ one Block can share multiple `__block` variables as well. Multiple `__block`\
    \ variables can be used by the member variables in the struct for Block and the\
    \ arguments for the constructor are just added.\n\nNow, we’ve learned almost all\
    \ about a `__block` variable. In the next section, we learn what we’ve skipped:\n\
    \n- Why can’t a Block exist beyond a variable scope?\n- For what does a member\
    \ variable `\"__forwarding\"` of a struct for `__block` variables exist?\n\nAlso,\
    \ in the section, “Capturing Objects,” I explain the member variables `\"copy\"\
    ` and `\"dispose\"`, which are added in `__main_block_desc_0` struct.\n\n### Memory\
    \ Segments for Blocks\n\nIn the previous sections, we’ve learned that a Block\
    \ is implemented as an automatic variable of a struct, and the struct is generated\
    \ for the Block. Also `__block` variable is implemented as an automatic variable\
    \ of a struct, and the struct is generated for the `__block` variable. Because\
    \ they are implemented as automatic variables of a struct, the instances are created\
    \ on the stack as shown in [Table 5–1](#Chapter05.html#tab_5_1).\n\n![images](images/t0501.jpg)\n\
    \nAlso, in previous sections, we’ve learned that a Block is an Objective-C object\
    \ as well. If we see a Block as an object of Objective-C, its class is `_NSConcreteStackBlock`.\
    \ Although not covered earlier, there are similar classes to the `_NSConcreteStackBlock`:\n\
    \n- `_NSConcreteStackBlock`\n- `_NSConcreteGlobalBlock`\n- `_NSConcreteMallocBlock`\n\
    \nAt first, you might notice that the `_NSConcreteStackBlock` class has “stack”\
    \ in its name, meaning that objects of this class exist on the stack. Also, objects\
    \ of the `_NSConcreteGlobalBlock` class are, as the class name “global” shows,\
    \ stored in the data section as are global variables as shown in [Figure 5–3](#Chapter05.html#fig_5_3).\n\
    \nObjects of the `_NSConcreteMallocBlock` class are, as you can guess from the\
    \ name, stored on the heap, like memory blocks, which are allocated by the `\"\
    malloc\"` function.\n\n![images](images/9781430241164_Fig05-03.jpg)\n\n**Figure\
    \ 5–3.** *Memory segments for Blocks*"
