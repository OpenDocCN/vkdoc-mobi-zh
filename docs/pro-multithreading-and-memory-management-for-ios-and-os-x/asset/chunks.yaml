    Next, let’s see the dispatch_once function.


    #### dispatch_once


    The dispatch_once function is used to ensure that the specified task will be executed
    only once during the application’s lifetime. Following is a typical source code
    to initialize something. It could be made elegant by using the dispatch_once function.


