  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循注意事项和示例格式，将给定的英文文本翻译成中文。



    ### 添加标准 FileMaker 菜单的副本


    将每个标准 FileMaker 菜单的一个副本添加到 `Learn FileMaker Menus` 菜单集中。首先，点击 `Add` 按钮打开 `Select
    Menu` 对话框，如图 23-6 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig6_HTML.jpg](img/429700_2_En_23_Fig6_HTML.jpg)


    图 23-6


    用于选择可用的标准菜单和自定义菜单的对话框


    此对话框列出了所有可添加到自定义菜单集中的可用菜单。在创建自定义菜单之前，此对话框只会列出标准子菜单。按住 `Command`（macOS）或 `Windows`（Windows）键以允许多选，然后点击列表中的三个标准菜单：`[Format]`、`[Scripts]`
    和 `[Window]`。选定后，点击 `Select` 按钮，将这三个选定的菜单添加到自定义菜单集中。要添加其余标准菜单到菜单集中，需再次点击 `Edit
    Custom Menu Set` 对话框上的 `Add` 按钮，然后点击前一个 `Select Menu` 对话框中的 `+` 按钮，为每个菜单创建一个副本。这将打开
    `Create Custom Menu` 对话框，如图 23-7 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig7_HTML.jpg](img/429700_2_En_23_Fig7_HTML.jpg)


    图 23-7


    `Create Custom Menu` 对话框用于创建新菜单


    此对话框为我们正在添加的菜单提供了两个选项：`Start with an empty menu`（从空菜单开始）创建一个没有菜单项的新未命名菜单；`Start
    with a standard FileMaker menu`（从标准 FileMaker 菜单开始）创建所选标准 FileMaker 菜单的一个副本，该副本稍后可进行自定义。现在，逐一列出并选择八个标准菜单，点击“确定”来添加它们。每个副本都会被创建并在
    `Edit Custom Menu` 对话框中打开。暂时，只需在该对话框中点击“确定”，以默认状态保存新的菜单副本。完成后，`Select Menu` 对话框应包含全部八个标准菜单副本的列表，如图
    23-8 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig8_HTML.jpg](img/429700_2_En_23_Fig8_HTML.jpg)


    图 23-8


    创建每个标准 FileMaker 菜单副本后的对话框


    这些副本现在已作为自定义菜单添加到数据库中，但仍需添加到自定义菜单集中。按住 `Command`（macOS）或 `Windows`（Windows）键，选择所有八个标准菜单副本，然后点击
    `Select` 按钮。这将返回到 `Edit Custom Menu Set` 对话框，显示我们已添加的所有 11 个菜单的列表，如图 23-9 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig9_HTML.jpg](img/429700_2_En_23_Fig9_HTML.jpg)


    图 23-9


    新的自定义菜单集


    菜单可以在列表中通过拖拽排列，但有两个例外：`FileMaker Pro` 菜单将锁定为列表中的第一个，而 `Help` 菜单将锁定为列表中的最后一个。当菜单按所需顺序排列后，点击“确定”保存更改，并关闭
    `Edit Custom Menu Set` 对话框。然后点击“确定”关闭 `Manage Custom Menus` 对话框。现在，您可以通过从 `Tools
    ➤ Custom Menus` 菜单中选择当前布局来自动安装自定义菜单集（有关安装的更多信息，请参阅本章后续内容）。当自定义菜单集在此菜单中的名称旁边出现一个复选标记时，表示它已安装。由于我们创建的自定义集只是标准
    FileMaker 菜单集的副本，您应该不会注意到当前菜单与标准 FileMaker 菜单有任何差异。接下来，我们可以开始自定义新的菜单集。


    ## 自定义菜单项


    无论是编辑标准菜单项还是配置新的空菜单项，自定义菜单的过程本质上是相同的：在 `Edit Custom Menu` 对话框中打开它，然后修改设置、编辑菜单项或添加新项目。


    ### 探索“编辑自定义菜单”对话框


    配置菜单并定义其包含的菜单项是在 `Edit Custom Menu` 对话框中完成的，如图 23-10 所示。当创建新自定义菜单时，此对话框会自动打开，并且可以从
    `Manage Custom Menus` 对话框的任一个选项卡中打开。从 `Custom Menus` 选项卡中，选择一个菜单，然后点击 `Edit` 按钮或直接双击该菜单。从
    `Custom Menu Sets` 选项卡中，选择一个菜单集并点击 `Edit` 按钮或直接双击该菜单集。然后选择一个菜单并点击 `Edit` 按钮或直接双击该菜单。对话框顶部包含菜单配置控件，而底部区域包含菜单项的列表。在此处，可以创建、复制、删除菜单项，或自定义其属性和行为。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig10_HTML.jpg](img/429700_2_En_23_Fig10_HTML.jpg)


    图 23-10


    用于配置菜单及其定义项的对话框


    #### 配置菜单设置


    `Menu Name`（菜单名称）接受最多 100 个字符的自定义菜单名称。此名称仅在编程界面中可见，不一定是菜单栏中显示的标题。如果您正在跟随操作，请花点时间重命名自定义菜单，删除将标准菜单复制到自定义集时添加的“Copy（副本）”后缀。


    `Comment`（注释）字段用于存储供开发人员使用的菜单描述，最多 30,000 个字符。


    `Menu Title`（菜单标题）控制菜单在菜单栏中显示时的名称。如果该菜单是标准 FileMaker 菜单的副本，则会提供一个 `Default`（默认）选项，使用标准名称。若要覆盖此名称或为自定义菜单输入名称，`Override
    Title`（覆盖标题）选项包含一个字段和一个 `Specify`（指定）按钮，允许输入静态名称或用于计算名称的公式。自定义菜单名称最多可达 30,000
    个字符；但是，由于屏幕尺寸限制以及人类感知的特性，最好将每个菜单名称限制在一个单词内。


    使用协同工作的两组控件之一来控制菜单何时安装到菜单栏中。`Install when`（何时安装）设置允许通过一个返回布尔值的公式来控制菜单何时安装，静态默认值为真（1）。`Include
    in mode`（包含在模式中）复选框根据窗口模式应用该公式。例如，取消勾选 `Find`（查找）以在查找模式下隐藏菜单。

