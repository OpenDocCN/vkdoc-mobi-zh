    ### Insert Menu


    The *Insert* menu opens change radically in Layout mode, as shown in Figure [17-8](#429700_2_En_17_Chapter.xhtml#Fig8).


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig8_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig8_HTML.jpg)`


    *Figure 17-8* The Insert menu in Browse mode (left) and Layout mode (right)


    The first two sections mirror the tools of the Layout mode toolbar, providing
    an alternate method of inserting any type of layout objects. In the middle are
    functions for inserting a *Picture* or placing static text of the *Current Date*,
    *Current Time*, and *Current Username*. Below these are functions used to insert
    *dynamic placeholder symbols*, specially formatted text that is automatically
    replaced with current values at the time a layout is rendered in non-layout modes.
    These symbols include:


    - *Date Symbol* – The current date; `{{CurrentDate}}`

    - *Time Symbol* – The current time; `{{CurrentTime}}`

    - *User Name Symbol* – The user’s computer name; `{{UserName}}`

    - *Page Number Symbol* – The current page number when a page is printed or previewed;
    `{{PageNumber}}`

    - *Record Number Symbol* – The current record’s number within the found set; `{{RecordNumber}}`

    - *Other Symbol* – Opens a dialog listing over a hundred symbols


    Finally, two options at the bottom of the menu are used to insert merge values:


    - *Merge Field* – Opens a Specify Field dialog and inserts a selected field as
    a *merge field*; `<<FieldName>>`

    - *Merge Variable* – Inserts a starter tag which can be edited to a specific variable;
    `<<$$>>`


    > **Note**: Dynamic placeholder symbols, merge fields, and merge variables are
    also discussed in Chapter [20](#429700_2_En_20_Chapter.xhtml), "Working with Text."


    ### Format Menu


    The *Format* menu options change in Layout mode, as shown in Figure [17-9](#429700_2_En_17_Chapter.xhtml#Fig9).
    Items are enabled based on the current selection.


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig9_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig9_HTML.jpg)`


    *Figure 17-9* The Format menu in Browse mode (left) and Layout mode (right)


    - *Orientation* – A submenu with two options: *Horizontal* is the default and
    *Sideways (Asian text only)*.

    - *Setup Options* – This section of the menu contains a list of *Setup* menu items
    that are enabled based on the current object. Selecting one of these will open
    the corresponding setup dialog as if double-clicking on the object (Chapter [20](#429700_2_En_20_Chapter.xhtml)).

    - *Format Painter* – Performs the same function as the *Format Painter* tool in
    the toolbar, copying format settings from the current object and applying them
    to the next object selected.

    - *Conditional* – Opens the *Conditional Formatting* dialog (Chapter [21](#429700_2_En_21_Chapter.xhtml)).

    - *Set Script Triggers* – Opens the *Set Script Triggers* dialog (Chapter [27](#429700_2_En_27_Chapter.xhtml)).


    ### Layouts Menu


    The *Layouts* menu replaces the Browse mode *Records* menu and provides access
    to functions related to managing, designing, and configuring layouts, as shown
    in Figure [17-10](#429700_2_En_17_Chapter.xhtml#Fig10).


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig10_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig10_HTML.jpg)`


    *Figure 17-10* The Layouts menu is unique to Layout mode


    > **Note**: See further discussion of managing layouts in Chapter [18](#429700_2_En_18_Chapter.xhtml).


    The following functions are available in this menu:


    - *New Layout/Report* – Starts the process of creating a new layout

    - *Duplicate Layout* – Duplicates the current layout

    - *Delete Layout* – Deletes the current layout after a warning

    - *Go To Layout* – A submenu of options to go to another layout: *Next*, *Previous*,
    or by number

    - *Change Theme* – Opens the Change Theme dialog to assign a different theme to
    the layout (Chapter [22](#429700_2_En_22_Chapter.xhtml))

    - *Layout Setup* – Opens the Layout Setup dialog (Chapter [18](#429700_2_En_18_Chapter.xhtml))

    - *Part Setup* – Opens the Part Setup dialog (Chapter [18](#429700_2_En_18_Chapter.xhtml))

    - *Set Tab Order* – Opens a dialog to configure the Browse mode tabbing order
    (Chapter [21](#429700_2_En_21_Chapter.xhtml))

    - *Save Layout* – Saves any unsaved changes while remaining in Layout mode

    - *Revert Layout* – Discards any unsaved changes and reverts the layout to its
    previously saved state while remaining in Layout mode


    ### Arrange Menu


    The *Arrange* menu is unique to Layout mode and provides access to object arrangement
    functions, as shown in Figure [17-11](#429700_2_En_17_Chapter.xhtml#Fig11). This
    includes functions for grouping, locking, stacking order, rotation, alignment,
    distributions, and resizing and is described in Chapter [21](#429700_2_En_21_Chapter.xhtml).


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig11_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig11_HTML.jpg)`


    *Figure 17-11* The Arrange menu items


    ## Summary


    This chapter introduced Layout mode and identified changes to the window, toolbar,
    and menu. In the next chapter, we define layout parts and get started creating
    layouts.


    # 18. Getting Started with Layouts


    Continuing the introduction of layout basics, this chapter covers the following
    topics:


    - Working with layout parts

    - Adding layouts

    - Deleting layouts

    - Using the manage layouts dialog

    - Optimizing layout performance'
