- fmt: '### File: Manage Submenu


    The `Manage` submenu of the `File` menu, shown previously in Figure [2-7](#429700_2_En_2_Chapter.xhtml#Fig7),
    contains access to the embedded development interface for the current database
    file. Each of these is discussed in later chapters:


    - `Database` – Define tables, fields, and relationships (Chapters [7](#429700_2_En_7_Chapter.xhtml)–[9](#429700_2_En_9_Chapter.xhtml))

    - `Security` – Configure access credentials (Chapter [30](#429700_2_En_30_Chapter.xhtml))

    - `Value Lists` – Define lists of values (Chapter [11](#429700_2_En_11_Chapter.xhtml))
    to format fields for faster data entry (Chapter [20](#429700_2_En_20_Chapter.xhtml))

    - `Layouts` – Create and manage interface layouts (Chapter [18](#429700_2_En_18_Chapter.xhtml))

    - `Scripts` – Create and manage scripts (Chapter [24](#429700_2_En_24_Chapter.xhtml))

    - `External Data Sources` – Manage connections to other FileMaker and ODBC databases
    (Chapter [9](#429700_2_En_9_Chapter.xhtml))

    - `Containers` – Define image storage locations (Chapter [10](#429700_2_En_10_Chapter.xhtml))

    - `Custom Functions` – Create and edit custom global formulas (Chapter [15](#429700_2_En_15_Chapter.xhtml))

    - `Custom Menus` – Create and edit custom menus (Chapter [23](#429700_2_En_23_Chapter.xhtml))

    - `Themes` – Create and edit object styles (Chapter [22](#429700_2_En_22_Chapter.xhtml))


    ### Edit Menu


    The `Edit` menu contains standard features that are enabled when editing the contents
    of a field such as `Undo`, `Cut`, `Copy`, `Paste`, `Clear`, and `Select All`.
    These are ubiquitous computer functions and need no further description. However,
    a few others are worth mentioning. The `Find/Replace` menu contains functions
    for doing text replacements within a field for one or more records, while `Spelling`
    contains options for correcting text selected within a field or stepping through
    every field on the layout (Chapter [4](#429700_2_En_4_Chapter.xhtml)). The `Export
    Field Contents` item opens a dialog to specify a name and location of a file in
    which to save the contents of the current field (Chapter [10](#429700_2_En_10_Chapter.xhtml)).


    ### View Menu


    The `View` menu, shown in Figure [2-8](#429700_2_En_2_Chapter.xhtml#Fig8), contains
    functions that control the view of the database. The first four items are viewing
    modes: `Browse` (default for data entry), `Find` to begin a search (Chapter [4](#429700_2_En_4_Chapter.xhtml)),
    `Layout` to design interfaces (Chapter [17](#429700_2_En_17_Chapter.xhtml)), and
    `Preview` to prepare for printing (Chapter [4](#429700_2_En_4_Chapter.xhtml)).
    The `Go to Layout` submenu contains a list of layout choices allowing manual navigation
    between them. The three `View As` options invoke a new content view to the current
    layout. The togglable `Status Toolbar` item controls the visibility of the window''s
    toolbar, while `Customize Status Toolbar` opens a customization dialog. `Formatting
    Bar` and `Ruler` each toggle the visibility of an additional horizontal extension
    of the toolbar, while the window magnification can be increased or decreased by
    50% using `Zoom In` and `Zoom Out`. Most of these are discussed in Chapter [3](#429700_2_En_3_Chapter.xhtml).


    ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig8_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    The View menu


    ### Insert Menu


    The `Insert` menu contains contextually sensitive functions for inserting files
    or text into a field (Chapter [4](#429700_2_En_4_Chapter.xhtml), "Modifying Field
    Contents").


    ### Format Menu


    The `Format` menu contains submenus for standard text styling functions when editing
    field content including `Font`, `Size`, `Style`, `Alignment`, `Spacing`, and `Color`.


    ### Records Menu


    The `Records` menu, shown in Figure [2-9](#429700_2_En_2_Chapter.xhtml#Fig9),
    contains functions for `creating`, `duplicating`, `deleting`, `navigating`, `including`,
    `excluding`, `sorting`, and `manipulating` (Chapter [4](#429700_2_En_4_Chapter.xhtml)).


    ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig9_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    The Records menu


    ### Scripts Menu


    The `Scripts` menu provides access to the `Script Workspace` window and displays
    a list of individual scripts that have been configured to appear here (Chapter
    [24](#429700_2_En_24_Chapter.xhtml)).


    ### Tools Menu


    The `Tools` menu, shown in Figure [2-10](#429700_2_En_2_Chapter.xhtml#Fig10),
    contains access to key development functions and is only available when the `Use
    advanced tools` preferences is enabled.


    ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig10_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig10_HTML.jpg)


    Figure 2-10


    The Tools menu


    The top three items provide access to debugging features (Chapter [26](#429700_2_En_26_Chapter.xhtml)).
    The `Custom Menus` submenu is used to define and select a custom menu set (Chapter
    [23](#429700_2_En_23_Chapter.xhtml)). Analysis tools like `Save a Copy as XML`
    and `Database Design Report` are used to create readable documents listing internal
    structural resources (Chapter [31](#429700_2_En_31_Chapter.xhtml)) for analysis
    or storage. `Developer Utilities` opens a dialog with file encryption and other
    features (Chapter [31](#429700_2_En_31_Chapter.xhtml)). Finally, the `Tools Marketplace`
    provides a quick link to the online `Claris Marketplace` where you can download
    or purchase development tools from third parties.


    ### Window Menu


    The `Window` menu contains many window-related functions used to create additional
    windows for a database or choosing among multiple windows for any open database
    (Chapter [3](#429700_2_En_3_Chapter.xhtml)).


    ### Help Menu


    The `Help` menu provides access to online resources including a help guide, learning
    resources, upgrades, the community website, and other application-related functions.


    ## Accessing Contextual Menus


    There are numerous `contextual menus` that appear within FileMaker''s user and
    developer interfaces when the user right-clicks on regions or objects. These are
    summarized by field, record content area, web viewers, and windows. Each menu
    provides a specific shortcut to contextually relevant commands based on the context
    of the click. As you begin exploring databases in subsequent chapters, look for
    these time-saving menus as a faster alternative to searching the crowded menu
    bar.


    ### Contextual Menus for Fields


    There are six contextual menus for fields. These all contain cut-copy-paste functions
    with other functions varying by field type or window mode:


    - `Text-Based Field (Browse Mode)` – Formatting, inserting, sorting, searching,
    charting, and exporting

    - `Text-Based Field (Find Mode)` – Insert operator

    - `Container Field (Browse Mode)` – Inserting file and exporting the contents
    of the field

    - `Summary Field (Browse Mode)` – Formatting, charting, and exporting

    - `Toolbar ➤ Quick Search Field (Browse Mode)` – Spell and grammar check, text
    substitutions, transformations, and speech functions

    - `Any Field (Layout Mode)` – Text orientation, object style selection, specifying
    the field, configuring as a button, defining conditional formatting, configuring
    script triggers, formatting, and arranging


    ### Contextual Menus for Record Content Area


    The content area of a database window has a contextual menu that varies depending
    on the window mode:


    - `Browse Mode` – Copy, create, duplicate, delete, sort, and save/send records

    - `Find Mode` – Copy, add, and delete find requests

    - `Preview Mode` – Copy the page, configure the page, and print

    - `Layout Mode` – Paste, set background style, and open dialogs for theme and
    layout setup'
