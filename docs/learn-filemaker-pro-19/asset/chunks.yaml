  trans: '

    ### 在 FileMaker 中定义 ODBC“影子表”


    当将 `ODBC` 表添加到关系图时，FileMaker 会在“表”选项卡中自动创建一个*影子表*。这是一个反映外部表的内部表示形式。它们会以斜体格式显示在“表”选项卡的列表中。尽管这会将外部表引入数据库，并允许类似于原生
    FileMaker 表的交互，但仍存在一些显著差异，包括：


    - **架构锁定** – 无法从 FileMaker 内部修改外部数据源的结构。FileMaker 中的影子表允许进行一些修改，但这不会影响远程表。

    - **删除字段** – 可以从影子表中删除字段，以减少查询的数据量，但这些字段仍保留在远程表中。

    - **修改字段** – 可以针对影子表自定义字段的“自动输入”设置（第 8 章）。

    - **添加补充字段** – 可以向影子表添加字段，但这些字段仅限于非存储计算字段和汇总字段，并且不会添加到远程表中。

    - **数据类型** – 当远程表对某些信息使用独立的数据类型，而 FileMaker 将其作为单一数据类型处理时（例如，整数和浮点数据，而非仅数字字段），可能需要通过计算将数据转换为
    FileMaker 数据类型。

    - **数据输入限制** – 当某些字段类型的数据量受限时，FileMaker 会尽量遵守这些限制以避免问题，但仍需特别注意。

    - **数据更新** – 通过网络对外部表中记录更改的自动刷新频率低于对原生 FileMaker 表的更改。请使用“刷新窗口”脚本步骤强制刷新，确保显示的数据是最新的。

    - **记录锁定** – 与原生表不同，打开进行编辑的记录不会被锁定，因此用户可以同时编辑同一条记录。如果自用户开始编辑后该记录已被修改，将弹出一个警告对话框，提示用户，并允许其停止操作，以避免覆盖其他用户的更改。

    - **索引** – FileMaker 无法为 SQL 字段建立索引，因此对外部表的搜索应仅限于远程表已建立索引的字段，以避免长时间延迟。


    **提示**

    Claris 的技术简报“外部 SQL 源简介”包含了关于 `ODBC`、`JDBC` 以及连接至 FileMaker 数据库或从中连接的各种选项的更多信息。


    ### 重命名与删除表


    在“管理数据库”对话框的“表”选项卡中选中的表可以被重命名或删除。要重命名，请在“表名称”文本区域输入新名称，然后单击“更改”按钮。要删除，请单击“删除”按钮。将出现一个“删除表”警告对话框，要求您确认是否要继续，如图
    7-10 所示。该对话框包含一个复选框，如果选中，也将删除关系图中对应的表出现项（第 9 章）。如果未选中，关系图中的任何表出现项将变为 *<缺失表>* 占位符。被删除表的字段定义和记录将始终被删除，而布局将保留，直到手动删除或重新分配。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig10_HTML.jpg](img/429700_2_En_7_Fig10_HTML.jpg)


    **图 7-10** 删除表时的警告对话框


    ### 向示例数据库添加表


    在继续之前，请向 *Learn FileMaker* 数据库添加三个表：*Company*、*Contact* 和 *Project*。目前，请创建这些表，并保留自动创建的默认字段、表出现项和布局。完成后，对话框应如图
    7-11 所示。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig11_HTML.jpg](img/429700_2_En_7_Fig11_HTML.jpg)


    **图 7-11** 包含默认字段的 *Learn FileMaker* 数据库表


    ## 本章小结


    本章探讨了使用表的基础知识，既包括在 FileMaker 中原生使用表，也包括连接到外部 SQL 数据源。在下一章中，我们将学习如何向表中添加字段并配置其各种属性。


    # 8. 定义字段


    *字段*是表内一个已定义的数据输入空间。使用电子表格类比，字段就像一列，被命名并配置为包含特定类型的数据。本章重点讨论与字段相关的以下主题：


    - 定义字段数据类型

    - 介绍“管理数据库”对话框（字段）

    - 规划字段名称

    - 定义默认字段

    - 管理字段

    - 设置字段选项

    - 向示例数据库添加字段


    ### 定义字段数据类型


    FileMaker 支持八种不同类型的字段，它们分为两类：*输入字段*和*显示字段*。


    #### 输入字段


    *输入字段*是能够由用户、脚本或导入过程进行数据输入的字段。FileMaker 有六种类型的输入字段，每种对应特定类别的数据：*文本*、*数字*、*日期*、*时间*、*时间戳*和*容器*。


    **注意**

    根据定义，输入字段可以接受输入。但是，用户在特定实例中的输入能力将取决于该字段的布局存在性（第 4 部分）和用户的安全设置（第 30 章）。


    ##### 文本字段


    *文本字段*用于存储任意字母、符号或数字的组合，作为字符串，长度可达一千万个字符。文本字段的内容可以是纯文本，通过布局设置控制显示格式，或者可以包含嵌入的格式信息，通过字体、字号、样式和颜色实现丰富的样式。当按文本字段对记录排序时，值将按字母顺序排序。这意味着文本中包含的数字将*作为文本*进行排序，并逐字符评估；例如，值“`10`”将排在“`2`”*之前*，因为
    `1` 在 `2` 之前。


    **提示**

    使用文本字段存储包含前导零的数字。


    ##### 数字字段


    *数字字段*用于存储任何数值，范围从 `10^–400` 到 `10⁴⁰⁰`，每个字段最多可存储十亿个字符。数字字段中的值可以包含用于格式化数字的非数字字符。例如，一个数字字段可以包含
    `"5000"` 或 `"$5,000.00"`。虽然这些附加字符不会对数据输入、查找或排序产生不利影响，但理想情况下，应只将数字实际输入到字段中，因为可以使用字段显示布局设置（第
    19 章，“数据格式化”）动态应用货币格式。当按数字字段对记录排序时，字段中的值将按数字顺序排序，因此值 `"10"` 将正确地排在 `"2"` 之后。

