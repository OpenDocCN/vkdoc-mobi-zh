    ## Managing Tables


    Tables can be *added*, *renamed*, and *deleted* using the buttons on the *Tables*
    tab of the *Manage Database* dialog.


    ### Adding Tables


    There are *several* different methods for adding tables: creating a new table,
    duplicating an existing table, importing a table from another FileMaker database,
    or adding a table from an external ODBC data source. Tables can also be automatically
    created while importing records (Chapter [5](#429700_2_En_5_Chapter.xhtml), “Selecting
    a Target Table”).


    #### Creating a New Table


    Manually create a new table from the *Tables* tab of the *Manage Database* dialog
    by typing a name into the *Table Name* text area and clicking the *Create* button.
    The new table will appear in the list with five default fields (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    “Defining Default Fields”).


    #### Duplicating an Existing Table


    When a new table will be significantly similar to an existing one, consider duplicating
    to save time. The *Copy* and *Paste* buttons can be used to copy one or more tables
    and paste a duplicate of them into the list. This even works between two files
    providing a quick and simple way to replicate a table in a new database. The duplicate
    table(s) will appear highlighted in the list, each with the same name as the original
    plus a unique numeric suffix. Every field from the original table will be present
    in the new table, with the same names and settings. However, record content is
    not copied from the original; the duplicate table will contain no records.


    #### Importing a Table


    The *Import* button on the *Tables* tab of the *Manage Database* dialog begins
    the process of importing one or more tables from another FileMaker database. The
    source database can be a database in a folder directory or one hosted by a FileMaker
    Server. To begin, click the *Import* button. Locate and open the database file
    containing the tables to be imported. Once opened, FileMaker will present an *Import
    Tables* dialog listing all the tables available for import from the selected database,
    as shown in Figure [7-4](#429700_2_En_7_Chapter.xhtml#Fig4). Check the box next
    to the desired table(s) and click OK to import. Here too, only the structure will
    be imported so the tables will contain no records.


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig4_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    The dialog used to import tables from another FileMaker database


    #### Adding a Table from an ODBC Data Source (macOS)


    *Open Database Connectivity* (ODBC) is a standard application programming interface
    (API) that provides client applications a common language for interacting with
    other database systems. *Java Database Connectivity* (JDBC) is a similar API for
    accessing systems written in the Java language. FileMaker can use both ODBC and
    JDBC to communicate with a *Driver Manager* application that uses a client driver
    to communicate with an external data source, as shown in Figure [7-5](#429700_2_En_7_Chapter.xhtml#Fig5).


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig5_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Connecting a FileMaker database to an ODBC data source


    Caution


    ODBC connections are only required to connect non-FileMaker databases, not for
    FileMaker database connections.


    FileMaker can act as an ODBC client application or as an ODBC and JDBC data source.
    As a client application, FileMaker supports connections to external SQL data sources
    such as those from Oracle, Microsoft SQL, and MySQL. Once connected, tables from
    the external database can be added to the FileMaker database, and with a few exceptions,
    they act like a native FileMaker table. The process of configuring a computer
    and database for ODBC access is a relatively straightforward three-step process.
    First, prepare the host computer for an ODBC connection with a *Driver Manager*
    and *Client Driver*. Next, connect the FileMaker database to the ODBC client driver.
    Finally, insert and use ODBC tables in the FileMaker database. Let’s walk through
    an example of this process.


    ##### Preparing a Computer for an ODBC Connection


    To prepare a FileMaker host computer for an ODBC Connection, install the *ODBC
    Manager* application (freeware for macOS), install a client driver (such as *Actual
    Technologies ODBC Pack*), and configure the driver for a specific external data
    source. The *host computer* is the computer upon which the FileMaker database
    is installed (a computer running FileMaker Server rather than a client computer
    accessing it).'
  trans: "\n# 规划表名\n\n表名可以使用多种不同的命名约定，具体取决于开发人员的个人偏好，以及数据库用作入站 API、JDBC/ODBC 或 WebDirect\
    \ 连接源时所需的兼容性技术要求。由多个单词组成的名称可以用空格（`Project Resource`）或下划线（`Project_Resource`）分隔，也可以不使用空格，而采用“驼峰式”命名（`ProjectResources`）。名称可以全大写、全小写或大小写混合使用。每个表名都必须遵循以下规则：\n\
    \n*   每个表必须使用唯一的单词或短语来命名。\n*   名称可以包含数字，但不能以数字或句点开头。理想情况下，应*仅*使用字母字符。\n*   名称不应包含内置函数的名称，尤其是那些没有参数的函数，例如\
    \ `Random` 或 `Pi`。\n*   虽然*可以*使用某些保留符号和单词，但它们可能会在计算公式中产生冲突，应避免使用。\n*   名称可以包含空格。但是，对于\
    \ Web 集成（除了不关心空格的 `FileMaker Web Direct` 之外），你可能希望完全避免使用空格。\n\n除了这些技术考量之外，请花点时间思考什么才是一个*好的*表名。每个表都应该描述清晰、简洁但不晦涩，并且与其他表和谐共存。在拟定表名列表时，这里有一些建议供参考：\n\
    \n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig3_HTML.jpg](img/429700_2_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3\n\n原始名称列表（左侧）和添加了分组前缀的相同列表（右侧）\n\n*   名称应清晰指示表所建模的实体类别，在尽可能简洁的同时避免晦涩难懂。\n\
    *   尽可能使用完整单词而非缩写。如果某个单词太长，可以查阅同义词词典，寻找更短的替代词。\n*   考虑文件中其他表的完整上下文。如果一个数据库只管理一种类型的东西，那么将表命名为\
    \ `Stuff` 是没问题的。然而，当需要为多种类型的东西建模时，请使用更具描述性的名称，例如 `Inventory`、`Resources`、`Supplies`\
    \ 等。\n*   使用多个单词以提高清晰度。当存在其他同名实体的表时，请确保它们的名称*差异化足够明显*，以避免混淆。\n*   保持一致性，使用相同的格式，并使所有名称保持单数或复数形式。例如，统一使用\
    \ `Contact` 和 `Company`，或统一使用 `Contacts` 和 `Companies`。\n*   对于大型表列表，考虑使用前缀将其组织到概念组中，以便它们在开发者选择菜单中整齐排序，如图\
    \ 7-3 所示。\n\n## 管理表\n\n可以使用“管理数据库”对话框中“表”选项卡上的按钮来*添加*、*重命名*和*删除*表。\n\n### 添加表\n\
    \n添加表有*几种*不同的方法：创建新表、复制现有表、从另一个 FileMaker 数据库导入表，或从外部 ODBC 数据源添加表。在导入记录时也可以自动创建表（第\
    \ 5 章，“选择目标表”）。\n\n#### 创建新表\n\n在“管理数据库”对话框的“表”选项卡中，通过在“表名”文本区域键入名称并单击“创建”按钮，手动创建一个新表。新表将出现在列表中，并带有五个默认字段（第\
    \ 8 章，“定义默认字段”）。\n\n#### 复制现有表\n\n当新表与现有表高度相似时，可以考虑复制以节省时间。可以使用“复制”和“粘贴”按钮来复制一个或多个表，并将它们的副本粘贴到列表中。此操作甚至在两个文件之间也有效，提供了一种快速简单的方法来在新数据库中复制表。复制的表将在列表中高亮显示，每个表与原表名称相同，并附加一个唯一的数字后缀。原表中的每个字段都将出现在新表中，具有相同的名称和设置。但是，记录内容不会从原表复制；复制后的表将不包含任何记录。\n\
    \n#### 导入表\n\n“管理数据库”对话框“表”选项卡上的“导入”按钮，用于启动从另一个 FileMaker 数据库导入一个或多个表的过程。源数据库可以是文件夹目录中的数据库，也可以是由\
    \ FileMaker Server 托管的数据库。首先，单击“导入”按钮。找到并打开包含要导入的表的数据库文件。打开后，FileMaker 将显示一个“导入表”对话框，其中列出了所选数据库中可供导入的所有表，如图\
    \ 7-4 所示。勾选所需表旁边的复选框，然后单击“确定”进行导入。同样，此处仅导入表结构，因此表将不包含任何记录。\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig4_HTML.jpg](img/429700_2_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4\n\n用于从另一个 FileMaker 数据库导入表的对话框\n\n#### 从 ODBC 数据源添加表 (macOS)\n\n`开放数据库连接`\
    \ (ODBC) 是一种标准应用程序编程接口 (API)，它为客户应用程序提供一种通用语言，用于与其他数据库系统交互。`Java 数据库连接` (JDBC)\
    \ 是一种类似的 API，用于访问用 Java 语言编写的系统。FileMaker 可以使用 ODBC 和 JDBC 与 `驱动程序管理器` 应用程序通信，该应用程序使用客户端驱动程序与外部数据源通信，如图\
    \ 7-5 所示。\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig5_HTML.jpg](img/429700_2_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5\n\n将 FileMaker 数据库连接到 ODBC 数据源\n\n**注意**  \nODBC 连接仅用于连接非 FileMaker 数据库，不用于\
    \ FileMaker 数据库连接。\n\nFileMaker 既可以充当 ODBC 客户端应用程序，也可以充当 ODBC 和 JDBC 数据源。作为客户端应用程序，FileMaker\
    \ 支持连接到外部 SQL 数据源，例如来自 Oracle、Microsoft SQL 和 MySQL 的数据源。连接后，外部数据库中的表可以添加到 FileMaker\
    \ 数据库中，除了少数例外情况，它们的行为类似于 FileMaker 原生表。为 ODBC 访问配置计算机和数据库的过程相对简单，分为三个步骤。首先，使用\
    \ `驱动程序管理器` 和 `客户端驱动程序` 准备主机计算机以进行 ODBC 连接。接下来，将 FileMaker 数据库连接到 ODBC 客户端驱动程序。最后，在\
    \ FileMaker 数据库中插入并使用 ODBC 表。让我们逐步了解此过程的一个示例。\n\n##### 准备计算机以进行 ODBC 连接\n\n要为\
    \ ODBC 连接准备 FileMaker 主机计算机，请安装 `ODBC 管理器` 应用程序（macOS 免费软件），安装客户端驱动程序（例如 `Actual\
    \ Technologies ODBC Pack`），并为特定的外部数据源配置驱动程序。*主机计算机* 是安装 FileMaker 数据库的计算机（即运行\
    \ FileMaker Server 的计算机，而非访问它的客户端计算机）。\n"
- fmt: '## Installing the ODBC Manager Application


    Download and install the freeware `ODBC Manager` application onto the host computer,
    by following these steps:


    1. Download the `ODBC Manager` disk image from [`www.odbcmanager.net`](http://www.odbcmanager.net).

    2. Locate the `ODBC_Manager_Installer.dmg` file in your `Downloads` folder and
    launch it.

    3. The `ODBC Manager` disk image will appear on your desktop and should open in
    a window.

    4. Double-click on the `ODBC Manager.pkg` file to launch the installer.

    5. Step through the installer panels to complete the installation.


    Once the installer has finished, the `ODBC Manager` application should be in your
    `Utilities` subfolder of the macOS `Applications` folder.


    ## Installing the ODBC Driver


    Next, download and install an ODBC driver, like the one described here from Actual
    Technologies, by following these steps:


    1. Download the `Actual ODBC Pack` disk image, available at [`www.actualtech.com/download.php`](http://www.actualtech.com/download.php).

    2. Locate the `Actual_ODBC_Pack.dmg` file in your `Downloads` folder and launch
    it.

    3. The `Actual ODBC Pack` disk image will appear on your desktop and should open
    in a window.

    4. Double-click on the `Actual ODBC Pack.pkg` file to launch the installer.

    5. Step through the installer panels to complete the installation.


    > **Note:** The driver is a fully functional demo, limited to display only the
    first three rows resulting from any query. Purchase a license key from Actual
    Technologies web store to remove this limit.


    ## Configuring Driver


    Next, add and configure a driver for the specific database to which a connection
    will be made. Begin by opening the `ODBC Manager` application, shown in Figure
    [7-6](#429700_2_En_7_Chapter.xhtml#Fig6).


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig6_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig6_HTML.jpg)


    **Figure 7-6** — The ODBC Manager with a single connection


    Then follow these steps in the dialog:


    1. Click on the `System DSN` tab.

    2. Click the `Add` button.

    3. In the panel that opens, choose a driver appropriate for the target database:
    `Actual access`, `Actual open source databases`, `Actual oracle`, or `Actual SQL
    server`.

    4. Enter settings into the multi-panel driver specific configuration dialog. These
    vary but generally include the `server address`, `database name`, `username`,
    and `password`.

    5. Click the `Done` button to close the configuration dialog.

    6. The final panel of the configuration dialog allows you to test the connection.

    7. Quit the `ODBC Manager` application.


    ## Connecting a FileMaker Database to the ODBC Client Driver


    Connect your FileMaker database to the ODBC driver you just configured. This is
    done by setting up an external data source in the database and then adding table(s)
    from the external source into the FileMaker relationship graph.


    ### Setting Up External Data Source


    Select the `File ➤ Manage ➤ External Data Sources` menu item to open the `Manage
    External Data Source` dialog, shown in Figure [7-7](#429700_2_En_7_Chapter.xhtml#Fig7).
    From here, you can create, edit, and delete references to external databases.


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig7_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig7_HTML.jpg)


    **Figure 7-7** — The dialog to manage external data sources


    To add a new external source, click the `New` button to open the `Edit Data Source`
    dialog. At first, the dialog will ask for a `File Path List` because the `Type`
    is set to `FileMaker`. Once you select `ODBC` instead, the dialog will change,
    as shown in Figure [7-8](#429700_2_En_7_Chapter.xhtml#Fig8).


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig8_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig8_HTML.jpg)


    **Figure 7-8** — The process for setting up an external data source


    Follow these steps to configure a connection to the ODBC driver:


    1. `Name` – Enter a unique name for the data source for use within FileMaker.

    2. `Type` – Select `ODBC` radio button.

    3. `DSN` – Click the `Specify` button.

    4. `Select ODBC Data Source` – Select the desired data source from the list defined
    in the `ODBC Manager` application, and then click to close the dialog.

    5. `Authentication Options` – Optionally indicate how a username and password
    should be entered at the user level when a database attempts to access the data
    source. For the smoothest user experience, enter the username and password directly
    here so the user doesn’t have to repeat that process.

    6. `Filter Tables` – Optionally add filtering criteria to control which tables
    are displayed when a connection is made. This can be helpful when a database has
    many tables and you need to limit which are available within FileMaker to avoid
    failures. When finished, click `OK` to close the `Edit Data Source` dialog.


    ### Adding to Relationship Graph


    Unlike with the creation of a new FileMaker table, which is added to the `Tables`
    tab of the `Manage Database` dialog and automatically appears in the `Relationship
    graph` (Chapter [9](#429700_2_En_9_Chapter.xhtml)), a new ODBC table is manually
    added to the graph which automatically adds it to the table list. To do this,
    open the `Manage Database` dialog and click on the `Relationships` tab. Then follow
    these steps shown in Figure [7-9](#429700_2_En_7_Chapter.xhtml#Fig9):


    1. Click the `Add` button.

    2. In the `Specify Table` dialog that opens, select the ODBC connection in the
    `Data Source` menu.

    3. Select the table.

    4. Click the `OK` button to add the table to the occurrence graph and list of
    tables.


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig9_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig9_HTML.jpg)


    **Figure 7-9** — The process for adding an ODBC source to the relationship graph'
