  trans: '

    ### 布局事件


    #### OnLayoutEnter（进入布局时）


    `OnLayoutEnter` 布局事件发生在浏览模式下窗口切换到不同布局之后。这提供了一个机会，可以执行类似于打开窗口或激活记录时触发的设置功能。


    #### OnLayoutExit（退出布局时）


    `OnLayoutExit` 布局事件发生在导航离开当前布局之前。这提供了一个机会，可以在必要时验证并阻止导航变化。


    #### OnLayoutSizeChange（布局大小变更时）


    `OnLayoutSizeChange` 布局事件发生在窗口大小改变之后。这发生在打开窗口、调整窗口大小、隐藏/显示工具栏或格式栏，以及在 iOS 设备上切换横竖屏时。这提供了一个执行操作的机会，例如强制设置最小窗口大小或重新定位窗口以使其在屏幕范围内完美居中。以下公式可用于“设置变量”脚本步骤，根据当前窗口尺寸设置
    `$Height` 和 `$Width` 变量，或在数值过低时切换至默认最小值。随后可在“移动/调整窗口”脚本步骤中使用这些变量来强制设置最小窗口大小，本例中为
    800 x 1000。


    ```

    Let ( [

    Height = Get ( WindowHeight ) ;

    $Height = Case ( Height < 800 ; 800 ; Height ) ;

    Width = Get ( WindowWidth ) ;

    $Width = Case ( Width < 1000 ; 1000 ; Width )

    ] ;

    ""

    )

    ```


    #### OnModeEnter（进入模式时）


    `OnModeEnter` 布局事件发生在切换到浏览、查找或预览模式之后。这提供了一个机会，可以为特定活动准备窗口，例如设置默认查找条件、初始化变量或调整打印设置。


    #### OnModeExit（退出模式时）


    `OnModeExit` 布局事件发生在更改窗口模式之前。这为脚本提供了一个机会，可以在必要时验证并阻止模式更改。


    #### OnViewChange（视图变更时）


    `OnViewChange` 布局事件发生在表单视图、列表视图和表格视图之间切换之后。


    #### OnGestureTap（手势轻点时）


    `OnGestureTap` 布局事件发生在布局上执行轻点手势时。这为脚本提供了一个机会，可以使用 `Get ( TriggerGestureInfo )`
    函数确定事件的详细信息，并执行自定义操作或在必要时阻止该手势。该事件在以下条件下触发：


    - 仅限 FileMaker Go 和 Windows（Windows 7 除外）。

    - 仅限浏览和查找模式。

    - 轻点操作不在活动的 Web 查看器或活动的编辑框内。

    - 单指、双指或三指轻点（iOS）。

    - 单指双击（iOS），这将触发该事件两次。

    - 双指轻点（Windows）。


    #### OnExternalCommandReceived（收到外部命令时）


    `OnExternalCommandReceived` 布局事件发生在用户按下按钮以控制 iOS 设备锁定屏幕或外部设备上的播放功能时，例如“播放”、“暂停”、“停止”、“下一首”和“上一首”。触发的脚本在事件发生*之前*运行，并且可以使用
    `Get ( TriggerGestureInfo )` 函数获取有关外部事件的信息。


    ### 对象触发器


    *对象触发器* 在针对布局对象或在布局对象内部执行某个事件时运行脚本。这些可以通过图 27-3 所示的对话框进行配置，通过选择一个对象并从“格式”菜单或对象的上下文菜单中选择“设置脚本触发器”功能来访问。此外，“弹出面板设置”对话框中也有一个按钮可以打开此对话框（第
    20 章，“探索弹出按钮设置选项”）。


    ![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig3_HTML.jpg](img/429700_2_En_27_Fig3_HTML.jpg)


    图 27\-3


    用于配置对象脚本触发器的对话框


    #### OnObjectEnter（进入对象时）


    `OnObjectEnter` 事件发生在用户点击对象或使用 Tab 键进入对象，当布局对象获得活动焦点之后，或者当脚本执行诸如“转到对象”或“转到下一字段”等步骤时。


    #### OnObjectKeystroke（对象按键时）


    `OnObjectKeystroke` 事件发生在向具有焦点的对象键入任何字符时，但在事件完成之前。与布局按键触发器类似，此事件会忽略那些由操作系统或 FileMaker
    应用程序处理的按键，并且可以通过以假值（0）退出脚本来阻止。


    #### OnObjectModify（对象修改时）


    `OnObjectModify` 事件发生在对象的值已更改之后。该事件仅响应与界面相关的操作而发生。当窗口更新在外部数据源中修改的值、字段由自动输入公式更新，或使用“设置字段”脚本步骤更新字段值时，该事件*不会*发生。以下操作会触发此事件：


    - 在对象中键入按键

    - 在值列表格式的字段中选择新值

    - 使用“剪切”、“粘贴”或“清除”功能

    - 将内容拖放到其中

    - 使用与界面相关的脚本步骤（例如“插入文本”）更改对象的值

    - 选择新的选项卡控制面板


    #### OnObjectValidate（对象验证时）


    `OnObjectValidate` 事件发生在修改后字段的值准备进行验证时，即焦点即将移动到另一个字段或正在提交记录之前。这提供了一个机会，可以验证对对象的更改、执行任何预备操作，和/或在必要时阻止移动到另一个对象。


    #### OnObjectSave（对象保存时）


    `OnObjectSave` 事件发生在修改后的字段已验证但尚未退出之前，提供了另一个阻止退出过程的机会。


    #### OnObjectExit（退出对象时）


    `OnObjectExit` 事件发生在对象即将失去活动焦点时，无论是否有任何修改。这发生在移动到另一个对象、门户行或字段重复项时。当发生任何导致提交记录的操作时也会发生。脚本在退出对象之前触发，允许其在必要时阻止该过程。


    #### OnPanelSwitch（面板切换时）


    `OnPanelSwitch` 事件发生在面板控件的当前视图即将更改之前，并且可以通过以假值（0）退出脚本来阻止。内置的 `Get` 函数可以确定对象的布局名称以及当前和目标面板的编号，从而使脚本能够采取与更改相关的特定操作。以下公式可以放入目标脚本的“显示自定义对话框”步骤或“数据查看器”（第
    26 章）中，以句子的形式说明这些值。在 `If` 语句中使用它们，可以根据起始和结束面板有条件地执行不同的步骤集。


    ```

    Let ( [

    currentPanel = GetValue ( Get ( TriggerCurrentPanel ) ; 1 ) ;

    targetPanel = GetValue ( Get ( TriggerTargetPanel ) ; 1 )

    ] ;

    "正在从面板 " & currentPanel & " 切换到面板 " & targetPanel & "。"

    )

    ```


    #### OnObjectAVPlayerChange（对象音视频播放器变更时）


    `OnObjectAVPlayerChange` 事件发生在对象中的媒体更改状态之后。例如，当用户暂停、播放或停止字段中的视频，或者视频播放到结尾停止时，该事件将触发脚本。此事件仅在
    iOS 设备上的 FileMaker Go 中受支持。


    ## 了解事件优先级


    许多用户操作会触发多个事件，FileMaker 将按特定的优先级顺序执行脚本触发器。脚本拦截操作的位置取决于预期的操作类型以及取消事件选项是否重要。

