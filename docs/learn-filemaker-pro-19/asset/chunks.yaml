  trans: '


    #### 探索脚本结果


    由另一个脚本运行的脚本可以使用 `退出脚本` 步骤传回结果值。该步骤只有一个参数：一个用于生成文本值的计算公式。与输入参数一样，结果可以是单个值，也可以是复杂的数据结构。此示例展示了一个简单的结果，返回单词“Success”，以告知调用脚本，目标脚本已成功执行完所有步骤，未发生任何失败。


    ```

    退出脚本 [ 文本结果: "Success" ]

    ```


    一个脚本可以有多个退出点，每个退出点返回不同的值。在以下示例中，在执行`执行查找`步骤后，一个条件性的`如果`语句可以在未找到记录时退出脚本，并返回一个告知调用脚本此情况的结果。当找到记录时，脚本会继续执行直到结束，并返回成功指示符。


    ```

    执行查找 [ ]

    如果 [ Get ( FoundCount ) = 0 ]

    退出脚本 [ 文本结果: "No records found" ]

    结束如果

    循环


    结束循环

    退出脚本 [ 文本结果: "Success" ]

    ```


    ### 在服务器上执行脚本


    当数据库托管在 FileMaker Server 上时（第 29 章），脚本既可以在当前用户的计算机上使用`执行脚本`步骤本地运行，也可以使用`在服务器上执行脚本`步骤卸载到服务器上运行。在服务器上运行复杂脚本通常速度更快，因为客户端和服务器之间无需通过网络交换大量信息。当本地脚本不需要响应或任何界面操作时，该任务可以完全交由服务器处理，从而立即释放用户计算机以执行其他脚本功能或手动工作。但是，在使用此功能之前，重要的是要意识到，在服务器运行脚本时，服务器*不会*知道或访问本地计算机数据库窗口的上下文。因此，被调用脚本所需的关于*当前表*、*布局*、*记录*、*找到集*、*排序顺序*或*窗口*的任何上下文信息都必须包含在脚本参数中，以便服务器在运行前能够复制该上下文。可以专门设计新的脚本来解决此问题。在将现有脚本转换为在服务器上运行时，可能需要将其拆分为两个：一个用于将上下文信息加载到脚本参数中，另一个用于接收该信息、在服务器上重置上下文，然后执行其他脚本功能。


    脚本可以根据某些条件配置为本地运行或在服务器上运行。例如，当数据库因维护而脱机时，任何在启动时对数据库至关重要的脚本都必须能够在本地运行。对于这些脚本，应包含一个`条件`，允许脚本在托管时在服务器上运行，在非托管时在本地运行。以下示例展示了一个简单的`如果`步骤，借助`Get
    ( HostApplicationVersion )`和`LeftWords`函数，在本地运行脚本和在服务器上运行脚本之间进行选择。如果主机版本以单词“Server”开头，则表明是托管文件，并将使用`在服务器上执行脚本`步骤来执行调用。


    ```

    如果 [ LeftWords ( Get ( HostApplicationVersion ) ; 1 ) = "Server" ]

    在服务器上执行脚本 [  ]

    否则

    执行脚本 [  ]

    结束如果

    ```


    ## 强调上下文的重要性


    与计算一样，*脚本是上下文相关的*，在开发数据库时*认识到*这一点*很重要*。当执行脚本步骤时，它是在前端窗口当前布局的表出现上下文中运行的。这最初是脚本触发时的当前布局，但当脚本开始更改布局、执行查找或创建窗口时，可能会发生变化。一个复杂的数据库可能有脚本运行着运行其他脚本的脚本，其中任何一个都可能会更改当前上下文。如果脚本尝试从非当前上下文中访问字段，则会导致错误，使用户感到困惑，甚至可能具有破坏性。如果脚本在错误的上下文中创建、删除或复制记录，则可能是一场灾难。鉴于此，很显然，在设计脚本时，跟踪上下文是一项主要任务。在设计脚本时，要根据其包含的步骤来关注其预期的上下文。要了解不同步骤的期望。虽然所有脚本步骤*都是上下文操作*，但它们并非都具有相同类型的依赖关系。某些步骤是*布局表依赖的*，无论布局上可见什么，都直接访问表值。其他步骤是*布局对象依赖的*，需要与布局上的某些内容进行直接交互。在下一章中，我们将看到诸如`设置字段`（不需要字段存在于布局上）和`插入文本`（需要）之类的示例。此外，在相互关联的工作流复杂网络中调用其他脚本时，请尝试设计一个命名和组织标准，通过实施关于哪些脚本可以调用其他脚本以及哪些不能的规则来帮助您管理上下文。


    ## 管理脚本错误


    发生错误时，脚本可能会打开一个对话框，告知用户问题所在。根据用户的知识水平和发生的错误类型，此消息对用户来说可能有意义，也可能没有意义。一个常见的示例是，当`设置字段`步骤尝试为当前上下文无法访问的表中的字段设置值时发生失败。例如，如果在浏览`公司`记录时，直接（而不是通过关系）设置`联系人`表中的字段，将导致显示错误消息：“无法完成此操作，因为目标不是相关表的一部分。”由于这是一个编程错误，用户不会知道这意味着什么，也不知道该采取什么措施来解决。因此，最好设计您的脚本来捕获错误，并提供更具信息性的对话框，以有效的方式通知用户。


    要禁止显示错误，请使用`设置错误捕获`步骤，参数为`打开`。这将导致脚本完全忽略其遇到的任何错误并继续处理。在许多情况下，这并不理想，因为一个步骤中的错误可能导致工作流后续步骤中的重大问题。因此，可能需要使用自定义消息或其他步骤来检测和处理特定错误。`Get
    ( LastError )`函数可以在脚本中的不同位置使用，以确定在执行前一个（或多个）步骤时是否发生了错误。该函数将返回一个数字值，指示没有错误（`0`）或代表错误的数字。一个`如果`语句可以在检测到错误时根据条件采取行动。


    为了说明此技术，以下简单示例尝试设置`Contact::Name Last`字段。如果从`Contact`表运行此脚本，则不会产生错误，也不会显示对话框。但是，在不同表中运行它会产生一个错误，并在自定义对话框中显示该事实。根据错误及其位置以及脚本的其他功能，`如果`语句可以包含其他步骤，例如向开发人员发送电子邮件、执行替代步骤、完全停止等。


    ```

    设置错误捕获 [ 打开 ]

    设置字段 [ "Contact::Name Last; "Smith" ]

    如果 [ Get ( LastError ) = 103 ]

    显示自定义对话框 [ "错误 103: 设置字段上下文错误" ]

    结束如果

    ```


    **提示**


    有关完整错误列表，请在 Claris.com 上搜索“FileMaker Pro 错误代码参考指南”。


    ## 本章小结


    本章介绍了脚本编写基础、在脚本工作区中工作以及各种步骤配置界面选项。我们探讨了指定文件路径的各种格式，并讨论了脚本运行其他脚本、传递参数、接收结果、上下文感知以及管理脚本错误的主题。在下一章中，我们将开始创建执行常见脚本编写任务的示例。


    '
- fmt: '# 25. Common Scripting Tasks


    FileMaker ships with over 180 built-in script steps that can perform just about
    any database task you can imagine. In this chapter, we work through a handful
    of real-world examples to provide a basic foundation upon which to base your own
    exploration of the remaining script steps, covering the following topics:


    - Scripting basic functions

    - Interacting with fields

    - Accessing folders and files

    - Working with records

    - Using conditional statements

    - Showing custom dialogs

    - Searching and dealing with found sets

    - Iterating with repeating statements

    - Scripting portal functions

    - Managing windows

    - Using Insert from URL


    ## Scripting Basic Functions


    Let’s begin by exploring a few basic script steps that perform common functions:
    controlling the ability of users to abort a script, setting variables, and navigational
    context changes.


    ### Allowing User Abort


    Any running script can be manually halted at any time by typing `Esc` (Windows)
    or a Period while holding the `Command` key (macOS). While this may not be a concern
    for scripts that perform a couple quick steps that finish before a user can attempt
    this, it introduces a danger with more complex scripts and may cause various problems.
    A partially completed process may not be so easy to start again without programming
    intervention. The user may become stranded on a staging layout not designed as
    an interface or have hidden windows left open but accessible through the *Windows*
    menu. A set of records may be half imported but not yet processed, and repeating
    the script could cause duplicates the second time around. The *Allow User Abort*
    script step can avoid these and countless other catastrophes by denying a user’s
    ability to abort a script. The step has one setting with a default value of *On*
    to allow interruption of the script and an option to turn it *Off* to disable
    that ability.


    The step can be placed at the beginning of a script or anywhere in the workflow.
    It can be turned on and off as needed at different points in the workflow to only
    protect sensitive steps that must be completed. Once configured, all subsequent
    script steps in the current script and any subscripts in the execution stack will
    inherit that setting unless reversed. If a parent script turns it off, all subsequent
    subscripts called by the parent will inherent that setting unless or until they
    explicitly change it. Similarly, if a subscript changes the setting, the parent
    script will inherit that setting when control is relinquished back to it.


    A formula can check the status of the abort state using a *Get* function, which
    returns `0` (false) if abort is disallowed and `1` (true) if it is allowed. The
    following two examples show a script step turning the abort state *Off* and *On*
    with a formula below it checking the current state after each change:


    ```

    Allow User Abort [ Off ]

    Get ( AllowAbortState ) // result = 0

    Allow User Abort [ On ]

    Get ( AllowAbortState ) // result = 1

    ```


    Caution


    It is a good idea to always allow user abort when testing to avoid being locked
    into an endless loop or other situations that require a force quit to escape a
    programming error!


    ### Setting Variables


    The *Set Variable* step sets the value of a local or global variable (Chapter
    [12](#429700_2_En_12_Chapter.xhtml), “Variables”) at a specific point in a script’s
    workflow. Variables can be used within a script to “park” values at one step for
    use by another. They can store a value for later use, assemble data from multiple
    contexts, track iterations that control scripting behavior, and more. Remember
    that local variables are limited within the context of the running script. They
    are also *not inherited* by other scripts in the active execution stack, so subscripts
    called by a script or parent scripts calling it do not have access to local variables
    set within it. Insert the step into a script, and then open the *Set Variable
    Options* dialog, shown in Figure [25-1](#429700_2_En_25_Chapter.xhtml#Fig1), by
    either double-clicking on the step or clicking the gear icon next to it.


    The *Name* field is used to specify the name of the target variable. This can
    be a new variable or an existing one. The name is how the variable will be used
    in subsequent formulas, so choose something clear and descriptive. A single dollar
    sign prefix denotes a local variable, and a double dollar sign prefix denotes
    a global variable. If no prefix is entered, a single sign will be added automatically.


    In the *Value* field, type the information to be stored in the variable when the
    step executes, either a static value, a field reference or a formula entered using
    the adjacent *Specify* button.


    The *Repetition* field specifies which repetition of the named variable should
    receive the specified value. This allows a single variable to contain multiple
    separate values, similar to a repeating field (Chapter [8](#429700_2_En_8_Chapter.xhtml)).
    The default is always one.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig1_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig1_HTML.jpg)


    Figure 25-1


    The dialog used to set a variable


    Tip


    Since you can create numerous variables with different names, the repetition feature
    should be reserved for managing an expandable number of programmatically determined
    values.


    The following example could be used by a script assigned to a *Record ➤ Delete
    Record* custom menu item (Chapter [22](#429700_2_En_22_Chapter.xhtml)) or a delete
    button. It provides a warning prior to deleting a company record although it could
    be expanded to work with any table. It uses the *Set Variable* step four times.
    It starts by setting a `$name` variable to the *Company Name* field of the current
    *Company* record and a `$count` variable to the number of *Contact* records related
    to it. Next, it uses these values to place a custom warning value into a `$message`
    variable for use in a *Show Custom Dialog* step. Finally, it places the user’s
    button choice into a `$button` variable. The *If* step at the end limits the *Delete
    Record/Request* step to only execute when the button clicked in the message dialog
    indicates the user’s approval.


    ```

    Set Variable [ $name ; Value: Company::Company Name ]

    Set Variable [ $count ; Value: Count ( Company | Contact::Record ID ) ]

    Set Variable [ $message ; Value:

    "Are you sure you want to delete the company record for " &

    Quote ( $name ) &

    "? " & $count & " contact record(s) are connected to it!" ]

    Show Custom Dialog [ "Confirm Delete Company" ; $message ]

    Set Variable [ $button ; Value: Get ( LastMessageChoice ) ]

    If [ $button = 2 ]

    Delete Record/Request [ with dialog: Off ]

    End if

    ```


    Tip


    Since the *Let* and *While* functions can also set a local or global variable,
    you can set variables with any script step that includes a formula component.


    ### Creating Navigation Scripts


    Scripts can change a window’s context by navigating to a different layout, record,
    or related record.'
