- fmt: '# Using Styles


    Each object added to a layout is automatically assigned the type-appropriate *Default*
    style from the layout’s theme. Default styles can’t be renamed or deleted, but
    they can be updated with modified settings, and new completely custom styles can
    be added. A style can be assigned to a selected object by choosing it from the
    *Object Style* menu in the object’s contextual menu or selecting a style from
    the *Styles* pane of the *Inspector* pane, both shown in Figure 22-7.


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig7_HTML.jpg](images/429700_2_En_22_Chapter/429700_2_En_22_Fig7_HTML.jpg)


    Figure 22-7


    Select a style from the object contextual menu (left) or the Inspector (right)


    ## Editing an Object’s Style Settings


    To modify an object’s formatting and save it to the style and theme, follow the
    steps shown in Figure 22-8. First, select an object and then click on the *Appearance*
    tab of the *Inspector* pane. Then follow these steps: *select a part*, *select
    a state*, *edit any of the settings*, *save to a style*, and *save to the layout’s
    theme*.


    Let’s walk through an example in more detail. Begin by selecting an *object part*
    from the pop-up menu just below the *Theme* and *Style*. This automatically displays
    the object type as the whole “part,” and for objects composed of a hierarchy of
    components, it lists all available component parts. For example, when a *portal*
    is selected, the list will include *Portal* and *Portal: Row*, since each of these
    can have different formatting. In the example shown, a field formatted with a
    *pop-up menu* control style is selected, so there are three parts available: *Pop-up
    Menu*, *Pop-up Menu: Button*, and *Pop-up Menu: Icon*.


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig8_HTML.jpg](images/429700_2_En_22_Chapter/429700_2_En_22_Fig8_HTML.jpg)


    Figure 22-8


    The process for modifying an object’s formatting and saving to a style


    Next, choose an *object state*. The default selection will always be *Normal*
    representing the object’s part at rest. When you select a different state, the
    object’s appearance on the layout changes to preview how it will appear in that
    state based on the current settings. Once you have selected the object part and
    state, begin modifying settings for the object using the formatting controls in
    the *Inspector*. Make any changes required to as many different settings for any
    state of any part until you have the object behaving as desired.


    **Tip**


    The eyedropper icons next to the object part and state menus allow format settings
    to be copy and pasted to save time.


    When finished modifying the object format, the menu icon adjacent to the *Style*
    will turn red to indicate the presence of unsaved *object* changes. To consistently
    keep themes and styles in sync between objects and layouts, it is important to
    save these changes back to a style. Click the red icon to reveal the menu of action
    options. The *Revert Changes to Style* option will eliminate all unsaved changes
    and restore the object to previously saved settings. The *Save as New Style* option
    saves the object’s current format settings as a new style which is then assigned
    to the object, leaving the previously assigned style unchanged. Finally, the *Save
    Changes to Current Style* option will update the object’s current style based
    on all the unsaved format settings and then automatically update the format settings
    of all objects on the layout that share the same style. The menu also includes
    options to *rename* the current style and to *delete* it, reverting the object
    back to *Default*.


    After style changes are saved, the menu icon next to the *Theme* will turn red
    to indicate the presence of unsaved *style* changes. Click this to reveal a menu
    of similar saving options. The *Revert Changes to Theme* option eliminates all
    unsaved changes made to *any style* on the current layout, restoring *every style
    for every object* to those last saved to the theme. The *Save as New Theme* option
    saves a copy of all styles into a new theme. Finally, the *Save Changes to Theme*
    updates the current theme with all the style updates made and updates the format
    settings of all objects on every layout that shares the same theme.'
