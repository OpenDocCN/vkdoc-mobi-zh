  trans: '

    ## 安装 ODBC 管理器应用程序


    按照以下步骤，在主计算机上下载并安装免费软件 `ODBC Manager` 应用程序：


    1. 从 [`www.odbcmanager.net`](http://www.odbcmanager.net) 下载 `ODBC Manager` 磁盘映像。

    2. 在 `Downloads` 文件夹中找到 `ODBC_Manager_Installer.dmg` 文件并启动它。

    3. `ODBC Manager` 磁盘映像将出现在您的桌面上，并应在一个窗口中打开。

    4. 双击 `ODBC Manager.pkg` 文件以启动安装程序。

    5. 逐步完成安装程序面板以完成安装。


    安装程序完成后，`ODBC Manager` 应用程序应位于 macOS 的 `Applications` 文件夹下的 `Utilities` 子文件夹中。


    ## 安装 ODBC 驱动程序


    接下来，按照以下步骤下载并安装一个 ODBC 驱动程序，例如下文描述的来自 Actual Technologies 的驱动程序：


    1. 下载 `Actual ODBC Pack` 磁盘映像，可从 [`www.actualtech.com/download.php`](http://www.actualtech.com/download.php)
    获取。

    2. 在 `Downloads` 文件夹中找到 `Actual_ODBC_Pack.dmg` 文件并启动它。

    3. `Actual ODBC Pack` 磁盘映像将出现在您的桌面上，并应在一个窗口中打开。

    4. 双击 `Actual ODBC Pack.pkg` 文件以启动安装程序。

    5. 逐步完成安装程序面板以完成安装。


    > **注意：** 该驱动程序是一个功能完整的演示版，仅限显示任何查询结果中的前三行。请从 Actual Technologies 网络商店购买许可证密钥以解除此限制。


    ## 配置驱动程序


    接下来，为将要建立连接的特定数据库添加并配置一个驱动程序。首先打开 `ODBC Manager` 应用程序，如图 7-6 所示。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig6_HTML.jpg](img/429700_2_En_7_Fig6_HTML.jpg)


    **图 7-6** — 带有一个连接的 ODBC 管理器


    然后在对话框中按以下步骤操作：


    1. 点击 `System DSN` 选项卡。

    2. 点击 `Add` 按钮。

    3. 在打开的窗格中，为目标数据库选择合适的驱动程序：`Actual access`、`Actual open source databases`、`Actual
    oracle` 或 `Actual SQL server`。

    4. 在多面板驱动程序特定配置对话框中输入设置。这些设置各不相同，但通常包括 `server address`（服务器地址）、`database name`（数据库名称）、`username`（用户名）和
    `password`（密码）。

    5. 点击 `Done` 按钮关闭配置对话框。

    6. 配置对话框的最后一个面板允许您测试连接。

    7. 退出 `ODBC Manager` 应用程序。


    ## 将 FileMaker 数据库连接到 ODBC 客户端驱动程序


    将您的 FileMaker 数据库连接到刚刚配置的 ODBC 驱动程序。这可以通过在数据库中设置外部数据源，然后将外部源中的表添加到 FileMaker 关系图中来完成。


    ### 设置外部数据源


    选择 `File ➤ Manage ➤ External Data Sources` 菜单项，打开 `Manage External Data Source`
    对话框，如图 7-7 所示。在此，您可以创建、编辑和删除对外部数据库的引用。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig7_HTML.jpg](img/429700_2_En_7_Fig7_HTML.jpg)


    **图 7-7** — 管理外部数据源的对话框


    要添加新的外部源，请点击 `New` 按钮以打开 `Edit Data Source` 对话框。最初，对话框会要求输入 `File Path List`，因为
    `Type` 被设置为 `FileMaker`。当您选择 `ODBC` 后，对话框将会变化，如图 7-8 所示。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig8_HTML.jpg](img/429700_2_En_7_Fig8_HTML.jpg)


    **图 7-8** — 设置外部数据源的过程


    按照以下步骤配置与 ODBC 驱动程序的连接：


    1. `Name`（名称） – 为数据源输入一个在 FileMaker 中使用的唯一名称。

    2. `Type`（类型） – 选择 `ODBC` 单选按钮。

    3. `DSN` – 点击 `Specify`（指定）按钮。

    4. `Select ODBC Data Source`（选择 ODBC 数据源） – 从 `ODBC Manager` 应用程序中定义的列表中选择所需的数据源，然后点击以关闭对话框。

    5. `Authentication Options`（身份验证选项） – 可选地指定当数据库尝试访问数据源时，应在用户级别如何输入用户名和密码。为了获得最流畅的用户体验，直接在此处输入用户名和密码，这样用户就不必重复该过程。

    6. `Filter Tables`（过滤表） – 可选地添加过滤条件，以控制在建立连接时显示哪些表。当数据库有很多表，并且您需要限制在 FileMaker
    中可用的表以避免失败时，这会很有帮助。完成后，点击 `OK` 关闭 `Edit Data Source` 对话框。


    ### 添加到关系图


    与创建新 FileMaker 表（该表会被添加到 `Manage Database` 对话框的 `Tables` 选项卡中，并自动出现在 `关系图`（第 9
    章）中）不同，新的 ODBC 表需要手动添加到关系图中，这将会自动将其添加到表列表中。为此，请打开 `Manage Database` 对话框并点击 `Relationships`
    选项卡。然后按照图 7-9 所示的步骤操作：


    1. 点击 `Add` 按钮。

    2. 在打开的 `Specify Table`（指定表）对话框中，从 `Data Source`（数据源）菜单中选择 ODBC 连接。

    3. 选择该表。

    4. 点击 `OK` 按钮将表添加到表出现关系图和表列表中。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig9_HTML.jpg](img/429700_2_En_7_Fig9_HTML.jpg)


    **图 7-9** — 将 ODBC 源添加到关系图的过程

