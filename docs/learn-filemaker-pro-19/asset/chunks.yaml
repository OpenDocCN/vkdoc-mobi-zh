    ### 插入菜单


    在布局模式下，*插入*菜单的选项会发生巨大变化，如图 17-8 所示。


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig8_HTML.jpg](img/429700_2_En_17_Fig8_HTML.jpg)`


    *图 17-8* 浏览模式（左）和布局模式（右）下的“插入”菜单


    前两个部分与布局模式工具栏的工具相对应，提供了插入任何类型布局对象的替代方法。中间部分是用于插入*图片*或放置*当前日期*、*当前时间*和*当前用户名*等静态文本的功能。这些功能下方是用于插入*动态占位符符号*的功能，这些占位符符号是经过特殊格式化的文本，在非布局模式下渲染布局时，会自动替换为当前值。这些符号包括：


    - *日期符号* – 当前日期；`{{CurrentDate}}`

    - *时间符号* – 当前时间；`{{CurrentTime}}`

    - *用户名符号* – 用户的计算机名称；`{{UserName}}`

    - *页码符号* – 打印或预览页面时的当前页码；`{{PageNumber}}`

    - *记录编号符号* – 当前记录在找到的记录集中的编号；`{{RecordNumber}}`

    - *其他符号* – 打开一个列出上百个符号的对话框


    最后，菜单底部的两个选项用于插入合并值：


    - *合并字段* – 打开“指定字段”对话框，并将选定字段作为*合并字段*插入；`<<FieldName>>`

    - *合并变量* – 插入一个起始标签，可将其编辑为特定变量；`<<$$>>`


    > **注**：动态占位符符号、合并字段和合并变量也将在第 20 章“处理文本”中讨论。


    ### 格式菜单


    在布局模式下，*格式*菜单的选项会发生变化，如图 17-9 所示。菜单项会根据当前选择启用或禁用。


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig9_HTML.jpg](img/429700_2_En_17_Fig9_HTML.jpg)`


    *图 17-9* 浏览模式（左）和布局模式（右）下的“格式”菜单


    - *方向* – 包含两个选项的子菜单：*水平*为默认选项，*垂直（仅限亚洲文本）*。

    - *设置选项* – 菜单的此部分包含一系列*设置*菜单项，这些菜单项根据当前对象启用。选择其中一项将打开相应的设置对话框，如同双击该对象一样（第 20 章）。

    - *格式刷* – 执行与工具栏中*格式刷*工具相同的功能，复制当前对象的格式设置并将其应用于下一个选定的对象。

    - *条件* – 打开*条件格式*对话框（第 21 章）。

    - *设置脚本触发器* – 打开*设置脚本触发器*对话框（第 27 章）。


    ### 布局菜单


    *布局*菜单取代了浏览模式下的*记录*菜单，提供了与管理、设计和配置布局相关的功能，如图 17-10 所示。


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig10_HTML.jpg](img/429700_2_En_17_Fig10_HTML.jpg)`


    *图 17-10* “布局”菜单是布局模式独有的


    > **注**：关于管理布局的进一步讨论，请参阅第 18 章。


    以下功能在此菜单中可用：


    - *新建布局/报表* – 开始创建新布局的流程

    - *复制布局* – 复制当前布局

    - *删除布局* – 在警告后删除当前布局

    - *转到布局* – 用于转到另一个布局的子菜单选项：*下一个*、*上一个*或按编号

    - *更改主题* – 打开“更改主题”对话框，为布局分配不同的主题（第 22 章）

    - *布局设置* – 打开“布局设置”对话框（第 18 章）

    - *部件设置* – 打开“部件设置”对话框（第 18 章）

    - *设置 Tab 键顺序* – 打开一个对话框，用于配置浏览模式下的 Tab 键顺序（第 21 章）

    - *保存布局* – 在保持布局模式的同时保存所有未保存的更改

    - *还原布局* – 放弃所有未保存的更改，并将布局还原到之前保存的状态，同时保持布局模式


    ### 排列菜单


    *排列*菜单是布局模式独有的，提供对象排列功能的访问，如图 17-11 所示。这包括分组、锁定、堆叠顺序、旋转、对齐、分布和调整大小的功能，并在第 21 章中描述。


    `![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig11_HTML.jpg](img/429700_2_En_17_Fig11_HTML.jpg)`


    *图 17-11* “排列”菜单项


    ## 摘要


    本章介绍了布局模式，并指出了窗口、工具栏和菜单的变化。在下一章中，我们将定义布局部件并开始创建布局。


    # 18. 布局入门


    继续介绍布局基础知识，本章涵盖以下主题：


    -   处理布局部件

    -   添加布局

    -   删除布局

    -   使用管理布局对话框

    -   优化布局性能

    '
- fmt: "## Working with Layout Parts\n\nA *layout part* is a horizontal slice of the\
    \ layout design area that contains objects which together are rendered into an\
    \ interface. Every layout must have at least *one* part but can be made up of\
    \ several parts as necessary for your design. There are several part types available,\
    \ and these influence how components contained within will appear and behave.\
    \ Depending on how a layout is created and the options selected during the process,\
    \ each new layout usually has at least three default parts: *Header*, *Body*,\
    \ and *Footer*.\n\n### Defining Layout Regions and Controls\n\nThere are several\
    \ important regions and controls in layout mode, highlighted in Figure [18-1](#429700_2_En_18_Chapter.xhtml#Fig1).\n\
    \n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig1_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1  \nA typical layout highlighting various regions and controls\n\n\
    A *part label* is a small box attached to the left side of each part. These contain\
    \ the part type name and are multipurpose buttons providing access to three functions.\
    \ To open a configuration dialog, double-click on a part label. A single click\
    \ while holding the `Command` (macOS) or `Windows` (Windows) key will toggle the\
    \ label to a vertical or horizontal orientation. When horizontal, dragging a label\
    \ will resize the part with more ease than clicking on the line between parts,\
    \ although sometimes the Part Label can get in the way of layout objects. When\
    \ horizontal, the opposite is true, as shown in Figure [18-1](#429700_2_En_18_Chapter.xhtml#Fig1).\
    \ A right-click on the label opens a contextual menu with options to open the\
    \ part configuration dialog, choose a fill color for the part, or apply a style\
    \ to the part (Chapter [22](#429700_2_En_22_Chapter.xhtml)).\n\nThe *on-screen\
    \ part design areas* are delimited horizontal slices of the layout space that\
    \ runs from the left side of the window to the part boundary. This *stack* of\
    \ parts makes up the layout design area and represents what will become the content\
    \ area of the window when rendered non-Layout modes. New parts can be inserted\
    \ below or between existing parts, expanding the part stack further down into\
    \ the *off-screen part expansion* area below. Unused parts can be deleted from\
    \ the layout as long as one remains.\n\nThe *part boundary* represents a vertical\
    \ line that separates the visible *part stack* on its left from the *off-screen\
    \ developer area* on its right. When viewed in other modes, everything on the\
    \ left of this boundary will be rendered as the content area, while everything\
    \ to the right will remain hidden off-screen. The off-screen area on the right\
    \ can be used to store developer notes and other layout elements that are not\
    \ accessible to users.\n\n**Tip:** Fields configured for Quick Find (Chapter [4](#429700_2_En_4_Chapter.xhtml))\
    \ placed in the off-screen area will still produce results.\n\n#### Resizing a\
    \ Part Area\n\nParts can be resized vertically and horizontally to any dimension\
    \ that does not exceed the maximum limit of 32,000 x 32,000 points. To *vertically\
    \ resize* a part, position the cursor at the line below the part area until the\
    \ cursor changes into a short horizontal black line with two arrows on either\
    \ size, pointing up and down. Then click and drag the cursor up or down to contract\
    \ or expand the height of the part above the line. When the part labels are viewed\
    \ horizontally, you can grab the label and drag to resize the part. To *horizontally\
    \ resize* the entire part stack, position the cursor anywhere at the part boundary\
    \ line until it changes into a short vertical black line with two arrows, pointing\
    \ left and right. Then click and drag the cursor left or right to contract or\
    \ expand the width of the part stack as needed. Alternatively, select a part label\
    \ and adjust the width and height values in the *Position* settings of the *Inspector\
    \ pane* (Chapter [19](#429700_2_En_19_Chapter.xhtml)).\n\n### Defining Part Types\n\
    \nThere are ten different part types available, each with specific inherent properties.\
    \ These can be divided into two categories: *standard parts* and *summary parts*.\n\
    \n#### Defining Standard Parts\n\nA *standard part* displays objects without any\
    \ summarization function. Each layout is limited to a *single* instance of each\
    \ standard part, and they *must* fall within an automatically enforced stacking\
    \ order. There are seven different standard part types (in order):\n\n- *Top Navigation*\
    \ – Intended for on-screen navigation buttons and other controls. This will not\
    \ print, and it will not zoom in or out when the window view settings are changed.\n\
    - *Title Header* – Appears at the top when printing, replacing a *Header* on the\
    \ first page. This is not displayed in Browse mode.\n- *Header* – Appears at the\
    \ top, except when printing the first page if a *Title Header* is present.\n-\
    \ *Body* – Represents a single instance of a record. In List view, this part and\
    \ every object placed within it will be repeated once for every record in the\
    \ found set. In Form view, it renders once for the current record only.\n- *Footer*\
    \ – Appears at the bottom, except when printing the last page if a *Title Footer*\
    \ is present.\n- *Title Footer* – Appears at the bottom of the first page when\
    \ printing, replacing a *Footer*. This is not displayed in Browse mode.\n- *Bottom\
    \ Navigation* – Intended for on-screen navigation buttons and other controls.\
    \ This will not print.\n\n#### Defining Summary Parts\n\nA *summary part* is used\
    \ to insert summarization values for groups of records and is especially useful\
    \ when creating report layouts. A summary field placed in a summary part will\
    \ display a value based on a group of records specified by the part type and its\
    \ settings. There are two types of summary parts, each with a *leading* and *trailing*\
    \ variety indicating a position relative to the *Body*. These are:\n\n- *Grand\
    \ Summary* – A summary field here will display a summarized value for *all records\
    \ in the found set*. It can be placed at the beginning (*Leading Grand Summary*)\
    \ or end (*Trailing Grand Summary*) of a layout.\n- *Sub-summary When Sorted by*\
    \ – A summary field placed here will display summarized values for *one sorted\
    \ sub-grouping of records* within the found set. It is used to calculate *subtotals*\
    \ based on a specified break field and separates records into sorted groups. One\
    \ or more sub-summary parts can be placed both above and below the *Body*, and\
    \ they will only appear if records are sorted by the specified break field. A\
    \ single sub-summary part will be repeated once for every group of records that\
    \ result from the break field sort.\n\n### Managing Parts\n\nIn Layout mode, parts\
    \ can be added, deleted, and reordered to create a custom layout.\n\n#### Adding\
    \ a Part Using the Toolbar Button\n\nThe *Part* tool, shown in Figure [18-2](#429700_2_En_18_Chapter.xhtml#Fig2),\
    \ can be click-dragged down into the layout area to add to the part stack. The\
    \ cursor will turn into a clenched fist dragging a black horizontal line. Move\
    \ this line into a position above or below an existing part that approximates\
    \ the location within the stack to insert the new part and then release. The *Part\
    \ Definition* dialog will open and allow the selection and configuration of a\
    \ new part. Once finished and the dialog is closed, you can resize the part and\
    \ begin adding objects.\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig2_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig2_HTML.jpg)\n\
    \nFigure 18-2  \nThe tool used to drag a new part into the layout part stack\n\
    \n**Tip:** Dragging a new part this way is imprecise and changes the size of an\
    \ existing part. To avoid this, use the *Part Setup* dialog described later in\
    \ this chapter."
  raw: '## Working with Layout Parts


    A *layout part* is a horizontal slice of the layout design area that contains
    objects which together are rendered into an interface. Every layout must have
    at least *one* part but can be made up of several parts as necessary for your
    design. There are several part types available, and these influence how components
    contained within will appear and behave. Depending on how a layout is created
    and the options selected during the process, each new layout usually has at least
    three default parts: *Header*, *Body*, and *Footer*.


    ### Defining Layout Regions and Controls


    There are several important regions and controls in layout mode, highlighted in
    Figure [18-1](#429700_2_En_18_Chapter.xhtml#Fig1).


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig1_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig1_HTML.jpg)


    Figure 18-1


    A typical layout highlighting various regions and controls


    A *part label* is a small box attached to the left side of each part. These contain
    the part type name and are multipurpose buttons providing access to three functions.
    To open a configuration dialog, double-click on a part label. A single click while
    holding the Command (macOS) or Windows (Windows) key will toggle the label to
    a vertical or horizontal orientation. When horizontal, dragging a label will resize
    the part with more ease than clicking on the line between parts, although sometimes
    the Part Label can get in the way of layout objects. When horizontal, the opposite
    is true, as shown in Figure [18-1](#429700_2_En_18_Chapter.xhtml#Fig1). A right-click
    on the label opens a contextual menu with options to open the part configuration
    dialog, choose a fill color for the part, or apply a style to the part (Chapter
    [22](#429700_2_En_22_Chapter.xhtml)).


    The *on-screen part design areas* are delimited horizontal slices of the layout
    space that runs from the left side of the window to the part boundary. This *stack*
    of parts makes up the layout design area and represents what will become the content
    area of the window when rendered non-Layout modes. New parts can be inserted below
    or between existing parts, expanding the part stack further down into the *off-screen
    part expansion* area below. Unused parts can be deleted from the layout as long
    as one remains.


    The *part boundary* represents a vertical line that separates the visible *part
    stack* on its left from the *off-screen developer area* on its right. When viewed
    in other modes, everything on the left of this boundary will be rendered as the
    content area, while everything to the right will remain hidden off-screen. The
    off-screen area on the right can be used to store developer notes and other layout
    elements that are not accessible to users.


    Tip


    Fields configured for Quick Find (Chapter [4](#429700_2_En_4_Chapter.xhtml)) placed
    in the off-screen area will still produce results.


    #### Resizing a Part Area


    Parts can be resized vertically and horizontally to any dimension that does not
    exceed the maximum limit of 32,000 x 32,000 points. To *vertically resize* a part,
    position the cursor at the line below the part area until the cursor changes into
    a short horizontal black line with two arrows on either size, pointing up and
    down. Then click and drag the cursor up or down to contract or expand the height
    of the part above the line. When the part labels are viewed horizontally, you
    can grab the label and drag to resize the part. To *horizontally resize* the entire
    part stack, position the cursor anywhere at the part boundary line until it changes
    into a short vertical black line with two arrows, pointing left and right. Then
    click and drag the cursor left or right to contract or expand the width of the
    part stack as needed. Alternatively, select a part label and adjust the width
    and height values in the *Position* settings of the *Inspector pane* (Chapter
    [19](#429700_2_En_19_Chapter.xhtml)).


    ### Defining Part Types


    There are ten different part types available, each with specific inherent properties.
    These can be divided into two categories: *standard parts* and *summary parts*.


    #### Defining Standard Parts


    A *standard part* displays objects without any summarization function. Each layout
    is limited to a *single* instance of each standard part, and they *must* fall
    within an automatically enforced stacking order. There are seven different standard
    part types (in order):


    *   *Top Navigation* – Intended for on-screen navigation buttons and other controls.
    This will not print, and it will not zoom in or out when the window view settings
    are changed.


    *   *Title Header* – Appears at the top when printing, replacing a *Header* on
    the first page. This is not displayed in Browse mode.


    *   *Header* – Appears at the top, except when printing the first page if a *Title
    Header* is present.


    *   *Body* – Represents a single instance of a record. In List view, this part
    and every object placed within it will be repeated once for every record in the
    found set. In Form view, it renders once for the current record only.


    *   *Footer* – Appears at the bottom, except when printing the last page if a
    *Title Footer* is present.


    *   *Title Footer* – Appears at the bottom of the first page when printing, replacing
    a *Footer*. This is not displayed in Browse mode.


    *   *Bottom Navigation* – Intended for on-screen navigation buttons and other
    controls. This will not print.


    #### Defining Summary Parts


    A *summary part* is used to insert summarization values for groups of records
    and is especially useful when creating report layouts. A summary field placed
    in a summary part will display a value based on a group of records specified by
    the part type and its settings. There are two types of summary parts, each with
    a *leading* and *trailing* variety indicating a position relative to the *Body*.
    These are


    *   *Grand Summary* – A summary field here will display a summarized value for
    *all records in the found set*. It can be placed at the beginning (*Leading Grand
    Summary*) or end (*Trailing Grand Summary*) of a layout.


    *   *Sub-summary When Sorted by* – A summary field placed here will display summarized
    values for *one sorted sub-grouping of records* within the found set. It is used
    to calculate *subtotals* based on a specified break field and separates records
    into sorted groups. One or more sub-summary parts can be placed both above and
    below the *Body,* and they will only appear if records are sorted by the specified
    break field. A single sub-summary part will be repeated once for every group of
    records that result from the break field sort.


    ### Managing Parts


    In Layout mode, parts can be added, deleted, and reordered to create a custom
    layout.


    #### Adding a Part Using the Toolbar Button


    The *Part* tool , shown in Figure [18-2](#429700_2_En_18_Chapter.xhtml#Fig2),
    can be click-dragged down into the layout area to add to the part stack. The cursor
    will turn into a clenched fist dragging a black horizontal line. Move this line
    into a position above or below an existing part that approximates the location
    within the stack to insert the new part and then release. The *Part Definition*
    dialog will open and allow the selection and configuration of a new part. Once
    finished and the dialog is closed, you can resize the part and begin adding objects.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig2_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig2_HTML.jpg)


    Figure 18-2


    The tool used to drag a new part into the layout part stack


    Tip


    Dragging a new part this way is imprecise and changes the size of an existing
    part. To avoid this, use the *Part Setup* dialog described later in this chapter.'
  trans: "\n## 使用布局区段\n\n*布局区段*是布局设计区域中的一个水平切片，其中包含的对象共同渲染成一个界面。每个布局必须至少包含*一个*区段，但可以根据设计需求由多个区段组成。这里有几种可用的区段类型，它们会影响内部包含的组件如何显示和运作。根据布局的创建方式以及过程中选择的选项，每个新布局通常至少包含三个默认区段：*页眉*、*主体*和*页脚*。\n\
    \n### 定义布局区域和控件\n\n布局模式中有几个重要的区域和控件，如图 18-1 中高亮所示。\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig1_HTML.jpg](img/429700_2_En_18_Fig1_HTML.jpg)\n\
    \n**图 18-1**  \n一个典型布局，高亮显示了各种区域和控件\n\n*区段标签*是附加在每个区段左侧的一个小方框。它包含区段类型名称，并且是多功能按钮，提供三种功能的访问入口。要打开配置对话框，请双击区段标签。按住\
    \ `Command`（macOS）或 `Windows`（Windows）键单击一次，可将标签切换为垂直或水平方向。当标签为水平方向时，拖动标签可以比单击区段之间的线条更轻松地调整区段大小，尽管有时区段标签可能会妨碍布局对象。当标签为垂直方向时，情况则相反，如图\
    \ 18-1 所示。右键单击标签会打开一个上下文菜单，其中包含打开区段配置对话框、为区段选择填充颜色或为区段应用样式（第 22 章）等选项。\n\n*屏幕上的区段设计区域*是布局空间中从窗口左侧延伸到区段边界的水平切片。这个区段*堆栈*构成了布局设计区域，代表着在非布局模式渲染时将成为窗口内容区域的部分。可以在现有区段下方或之间插入新区段，将区段堆栈进一步向下扩展到屏幕下方的*屏幕外区段扩展*区域。只要至少保留一个区段，就可以从布局中删除未使用的区段。\n\
    \n*区段边界*是一条垂直线，它将左侧可见的*区段堆栈*与右侧的*屏幕外开发者区域*分隔开来。在其他模式下查看时，该边界左侧的所有内容将呈现为内容区域，而右侧的所有内容将隐藏在屏幕外不可见。右侧的屏幕外区域可用于存储开发者笔记和其他对用户不可见的布局元素。\n\
    \n**提示：** 放置在屏幕外区域中、为快速查找（第 4 章）配置的字段仍会产生结果。\n\n#### 调整区段区域大小\n\n区段可以在垂直和水平方向上调整大小，任何尺寸都不能超过\
    \ 32,000 x 32,000 点的最大限制。要*垂直调整*区段大小，将光标定位在区段区域下方的线上，直到光标变为一条短的水平黑线，线两侧各有一个向上和向下的箭头。然后，单击并向上或向下拖动光标，以收缩或扩展线上方区段的高度。当区段标签水平显示时，您可以抓取标签并拖动来调整区段大小。要*水平调整*整个区段堆栈的大小，将光标定位在区段边界的任意位置，直到它变为一条短的垂直黑线，线两侧各有一个向左和向右的箭头。然后，单击并向左或向右拖动光标，根据需要收缩或扩展区段堆栈的宽度。或者，选择一个区段标签，并在*检查器面板*（第\
    \ 19 章）的*位置*设置中调整宽度和高度值。\n\n### 定义区段类型\n\n这里有十种不同的区段类型，每种都有特定的固有属性。它们可以分为两类：*标准区段*和*汇总区段*。\n\
    \n#### 定义标准区段\n\n*标准区段*显示对象而不具备任何汇总功能。每个布局中每种标准区段仅限于一个*实例*，并且它们*必须*遵循自动强制执行的堆叠顺序。有七种不同的标准区段类型（按顺序排列）：\n\
    \n- *顶部导航* – 用于屏幕上的导航按钮和其他控件。此区段不会打印，并且在更改窗口视图设置时不会放大或缩小。\n- *标题页眉* – 打印时出现在顶部，替换第一页上的*页眉*。在浏览模式下不显示。\n\
    - *页眉* – 出现在顶部，但若存在*标题页眉*，则打印第一页时除外。\n- *主体* – 表示一条记录的单个实例。在列表视图中，对于找到的记录集中的每条记录，此区段及其内部放置的每个对象将重复显示一次。在表单视图中，它仅为当前记录渲染一次。\n\
    - *页脚* – 出现在底部，但若存在*标题页脚*，则打印最后一页时除外。\n- *标题页脚* – 打印时出现在第一页底部，替换*页脚*。在浏览模式下不显示。\n\
    - *底部导航* – 用于屏幕上的导航按钮和其他控件。此区段不会打印。\n\n#### 定义汇总区段\n\n*汇总区段*用于插入记录组的汇总值，在创建报表布局时尤其有用。放置在汇总区段中的汇总字段将根据区段类型及其设置指定的记录组显示一个值。有两种类型的汇总区段，每种都有*前导*和*结尾*变体，表示相对于*主体*的位置。它们分别是：\n\
    \n- *总汇总* – 此处的汇总字段将显示*找到记录集中所有记录*的汇总值。它可以放置在布局的开头（*前导总汇总*）或结尾（*结尾总汇总*）。\n- *子汇总（按...排序时）*\
    \ – 放置在此处的汇总字段将显示找到记录集中*一个排序子组记录*的汇总值。它用于根据指定的分隔字段计算*小计*，并将记录分成排序后的组。一个或多个子汇总区段可以放置在*主体*的上方和下方，并且仅当记录按指定的分隔字段排序时才会出现。每个由分隔字段排序产生的记录组将重复显示一个子汇总区段。\n\
    \n### 管理区段\n\n在布局模式下，可以添加、删除和重新排序区段以创建自定义布局。\n\n#### 使用工具栏按钮添加区段\n\n*区段*工具，如图\
    \ 18-2 所示，可以单击并向下拖入布局区域以添加到区段堆栈中。光标将变成紧握的拳头，拖动一条黑色水平线。将此线移动到现有区段上方或下方的位置，该位置近似于要在堆栈中插入新区段的位置，然后释放鼠标。将打开*区段定义*对话框，允许选择并配置新区段。完成后关闭对话框，即可调整区段大小并开始添加对象。\n\
    \n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig2_HTML.jpg](img/429700_2_En_18_Fig2_HTML.jpg)\n\
    \n**图 18-2**  \n用于将新区段拖入布局区段堆栈的工具\n\n**提示：** 以这种方式拖动新区段不够精确，并且会改变现有区段的大小。为避免此问题，请使用本章后面描述的*区段设置*对话框。\n"
- fmt: "#### Configuring a Part\n\nParts are defined using the `Part Definition` dialog,\
    \ shown in Figure [18-3](#429700_2_En_18_Chapter.xhtml#Fig3). When a new part\
    \ is created, this dialog automatically opens. Open it for an existing part by\
    \ double-clicking a part label, selecting the `Layout ➤ Part Setup` menu, or choosing\
    \ `Part Definition` from the part label’s contextual menu.\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig3_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig3_HTML.jpg)\n\
    \nFigure 18-3\n\nThe dialog used to define a layout part\n\nThe `Part Type` options\
    \ are automatically enabled or disabled based on the location within the stack\
    \ of the part being defined. For example, a `Body` part can’t change into a `Header`\
    \ if there is already one defined, nor can you change it to a `Title Header` if\
    \ it is in a stack below an existing `Header`.\n\nThe `Summary Break Field` on\
    \ the right becomes enabled when defining a `Sub-summary` part. The field selection\
    \ here indicates that the sub-summary part should be visible as a break between\
    \ groups of records when those records are sorted by that field. These are often\
    \ used to insert subtotals in financial reports. See the example for report layouts\
    \ later in this chapter for more information about how sub-summaries work.\n\n\
    The first four option checkboxes control how the part will be handled when printing\
    \ or viewing in Preview mode. Select `Page break before each occurrence` to automatically\
    \ insert a page break before a `Trailing Grand Summary`, `Body`, or `Sub-summary`\
    \ parts. The `Page break after every X occurrence` will insert a page break after\
    \ the part has been displayed a specified number of times, limiting the number\
    \ of times a `Body` or a `Sub-summary` part can be repeated on a single page.\
    \ Use `Restart page numbers after each occurrence` to reset the page numbering\
    \ after each instance of the part. Use this with a `Title Header` to create a\
    \ title page that is not included in the numbering sequence or with a `Sub-summary`\
    \ to restart numbering after each section. Finally, the `Allow part to break across\
    \ page boundaries` allows a part to be split by a page boundary. Without this\
    \ option selected, a part will not split between pages unless its contents won’t\
    \ fit on a single page. Instead, a blank space is left at the bottom of the current\
    \ page, and the part begins on the next page. Enable this option to override this\
    \ default behavior, and split at a page break to eliminate empty space. The adjacent\
    \ `Discard remainder of part before new page` checkbox will truncate any remaining\
    \ content for the part instead of displaying it on the next page, thereby clipping\
    \ the content at the page break.\n\nThe two options at the bottom control the\
    \ visual appearance of the part. The `Use alternate row state` checkbox enables\
    \ the `Body` to be alternatively styled to visually delineate records. Enable\
    \ `Use active row state` to have the `Body` visually indicate the current record\
    \ (on-screen only) with special styling.\n\n> **Tip**  \n> The appearance of the\
    \ alternate and active row states can be edited by selecting these in the `Object\
    \ State` menu of the `Inspector` pane (Chapter [22](#429700_2_En_22_Chapter.xhtml)).\n\
    \n#### Deleting a Part\n\nTo delete a part and all the objects it contains, select\
    \ the part label and type `Delete`.\n\n#### Using the Part Setup Dialog\n\nParts\
    \ can be managed with greater precision using the `Part Setup` dialog, shown in\
    \ Figure [18-4](#429700_2_En_18_Chapter.xhtml#Fig4). To open this dialog, select\
    \ `Part Setup` from the `Layouts` menu or from the contextual menu available by\
    \ right-clicking anywhere on the layout. The list displays every part defined\
    \ on the current layout and is the *only* place where summary parts can be reordered\
    \ above and below the body. To add a part, click the `Create` button. This inserts\
    \ the part in the list and on the layout without resizing other parts as occurs\
    \ when dragging a new part from the toolbar. To edit a part, select it and click\
    \ the `Change` button to open the `Part Definition` dialog. Use the `Delete` button\
    \ to delete the selected part. There is no cancel or undo option available in\
    \ this dialog, so, if a mistake is made, click the `Done` button, and then select\
    \ the `Edit ➤ Undo` menu to immediately reverse any changes made.\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig4_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig4_HTML.jpg)\n\
    \nFigure 18-4\n\nThe dialog allows more precise control over the part stack\n\n\
    ## Adding Layouts\n\nThere are two ways to add layouts to a database file: creating\
    \ a new layout and duplicating an existing layout.\n\n### Creating a New Layout\n\
    \nTo create a new layout, select the `New Layout/Report` function from the `Layout`\
    \ menu, or click the toolbar icon of the same name. This opens the dialog, shown\
    \ in Figure [18-5](#429700_2_En_18_Chapter.xhtml#Fig5), which will step through\
    \ additional screens based on the selected target device type and function selected.\
    \ The layout configuration can be modified afterward, and some find it easier\
    \ to choose `Computer` and click `Finish` to bypass the rest of this setup assistant\
    \ and then manually finish configuring. However, especially for initial configuration\
    \ of complex report layouts, this dialog can be an enormous time saver, especially\
    \ for new developers.\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig5_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig5_HTML.jpg)\n\
    \nFigure 18-5\n\nThe dialog used to create a new layout\n\nTo begin, choose a\
    \ table occurrence from the `Show records from` menu at the top, and enter a `Layout\
    \ name` for the new layout. Select a target device type by clicking on one of\
    \ three icons: `Computer`, `Touch Device`, or `Printer`. The `Touch Device` icon\
    \ opens a pop-up menu with three choices: `iPad`, `iPhone`, and `Custom Device`.\
    \ While any layout can be used on a combination of devices, these choices help\
    \ determine default size and configuration options for the new layout to save\
    \ a little time later.\n\nNext, select a primary function to further control default\
    \ settings. These choices vary depending on the target device selection. A `form\
    \ layout` is generally used to view a single record for data entry tasks or entering\
    \ find criteria. They can also be used for creating custom dialogs or print layouts.\
    \ A `list view` is used to display a list of multiple records in a found set.\
    \ A `table view` is a low-design list view that displays records and fields in\
    \ a format resembling a spreadsheet. A `report view` is a type of list view that\
    \ is optimized for either viewing or printing summarized lists of data using sub-summaries\
    \ and a grand summary. A `label view` is a type of list view that is optimized\
    \ for printing directly onto labels. These can be created *vertically* or *horizontally*\
    \ and can be sized based on a preconfigured Avery or Dymo label template, or custom\
    \ measurements. Finally, an `envelope view` is a type of list view optimized for\
    \ printing directly onto envelopes.\n\nFor `Touch Device` targets, an orientation\
    \ option at the bottom of the dialog allows selection of portrait or landscape.\
    \ It also includes width and height dimension fields when the touch device selection\
    \ is a `Custom Device`.\n\nWith options selected, click the `Finish` button. For\
    \ `List` or `Form` layouts, the process ends with the new layout open and ready\
    \ for customization. However, `Label`, `Report`, and `Table` layouts have additional\
    \ dialogs that open with further customization options.\n\n> **Tip**  \n> Remember\
    \ that any layout can be viewed as a Form, List, or Table. These choices here\
    \ only influence default setup options which can be modified and viewed differently\
    \ later."
  raw: '#### Configuring a Part


    Parts are defined using the *Part Definition* dialog, shown in Figure [18-3](#429700_2_En_18_Chapter.xhtml#Fig3).
    When a new part is created, this dialog automatically opens. Open it for an existing
    part by double-clicking a part label, selecting the *Layout ➤ Part Setup* menu,
    or choosing *Part Definition* from the part label’s contextual menu.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig3_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig3_HTML.jpg)


    Figure 18-3


    The dialog used to define a layout part


    The *Part Type* options are automatically enabled or disabled based on the location
    within the stack of the part being defined. For example, a *Body* part can’t change
    into a *Header* if there is already one defined, nor can you change it to a *Title
    Header* if it is in a stack below an existing *Header*.


    *The Summary Break Field* on the right becomes enabled when defining a *Sub-summary*
    part. The field selection here indicates that the sub-summary part should be visible
    as a break between groups of records when those records are sorted by that field.
    These are often used to insert subtotals in financial reports. See the example
    for report layouts later in this chapter for more information about how sub-summaries
    work.


    The first four option checkboxes control how the part will be handled when printing
    or viewing in Preview mode. Select *Page break before each occurrence* to automatically
    insert a page break before a *Trailing Grand Summary*, *Body,* or *Sub-summary*
    parts. The *Page break after every X occurrence* will insert a page break after
    the part has been displayed a specified number of times, limiting the number of
    times a *Body* or a *Sub-summary* part can be repeated on a single page. Use *Restart
    page numbers after each occurrence* to reset the page numbering after each instance
    of the part. Use this with a *Title Header* to create a title page that is not
    included in the numbering sequence or with a *Sub-summary* to restart numbering
    after each section. Finally, the *Allow part to break across page boundaries*
    allows a part to be split by a page boundary. Without this option selected, a
    part will not split between pages unless its contents won’t fit on a single page.
    Instead, a blank space is left at the bottom of the current page, and the part
    begins on the next page. Enable this option to override this default behavior,
    and split at a page break to eliminate empty space. The adjacent *Discard remainder
    of part before new page* checkbox will truncate any remaining content for the
    part instead of displaying it on the next page, thereby clipping the content at
    the page break.


    The two options at the bottom control the visual appearance of the part. The *Use
    alternate row state* checkbox enables the *Body* to be alternatively styled to
    visually delineate records. Enable *Use active row state* to have the *Body* visually
    indicate the current record (on-screen only) with special styling.


    Tip


    The appearance of the alternate and active row states can be edited by selecting
    these in the *Object State* menu of the *Inspector* pane (Chapter [22](#429700_2_En_22_Chapter.xhtml)).


    #### Deleting a Part


    To delete a part and all the objects it contains, select the part label and type
    Delete.


    #### Using the Part Setup Dialog


    Parts can be managed with greater precision using the *Part Setup* dialog, shown
    in Figure [18-4](#429700_2_En_18_Chapter.xhtml#Fig4). To open this dialog, select
    *Part Setup* from the *Layouts* menu or from the contextual menu available by
    right-clicking anywhere on the layout. The list displays every part defined on
    the current layout and is the *only* place where summary parts can be reordered
    above and below the body. To add a part, click the *Create* button. This inserts
    the part in the list and on the layout without resizing other parts as occurs
    when dragging a new part from the toolbar. To edit a part, select it and click
    the *Change* button to open the *Part Definition* dialog. Use the *Delete* button
    to delete the selected part. There is no cancel or undo option available in this
    dialog, so, if a mistake is made, click the Done button, and then select the *Edit
    ➤ Undo* menu to immediately reverse any changes made.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig4_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig4_HTML.jpg)


    Figure 18-4


    The dialog allows more precise control over the part stack


    ## Adding Layouts


    There are two ways to add layouts to a database file: creating a new layout and
    duplicating an existing layout.


    ### Creating a New Layout


    To create a new layout, select the *New Layout/Report* function from the *Layout*
    menu, or click the toolbar icon of the same name. This opens the dialog, shown
    in Figure [18-5](#429700_2_En_18_Chapter.xhtml#Fig5), which will step through
    additional screens based on the selected target device type and function selected.
    The layout configuration can be modified afterward, and some find it easier to
    choose *Computer* and click *Finish* to bypass the rest of this setup assistant
    and then manually finish configuring. However, especially for initial configuration
    of complex report layouts, this dialog can be an enormous time saver, especially
    for new developers.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig5_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig5_HTML.jpg)


    Figure 18-5


    The dialog used to create a new layout


    To begin, choose a table occurrence from the *Show records from* menu at the top,
    and enter a *Layout name* for the new layout. Select a target device type by clicking
    on one of three icons: *Computer*, *Touch Device,* or *Printer*. The *Touch Device*
    icon opens a pop-up menu with three choices: *iPad*, *iPhone*, and *Custom Device*.
    While any layout can be used on a combination of devices, these choices help determine
    default size and configuration options for the new layout to save a little time
    later.


    Next, select a primary function to further control default settings. These choices
    vary depending on the target device selection. A *form layout* is generally used
    to view a single record for data entry tasks or entering find criteria. They can
    also be used for creating custom dialogs or print layouts. A *list view* is used
    to display a list of multiple records in a found set. A *table view* is a low-design
    list view that displays records and fields in a format resembling a spreadsheet.
    A *report view* is a type of list view that is optimized for either viewing or
    printing summarized lists of data using sub-summaries and a grand summary. A *label
    view* is a type of list view that is optimized for printing directly onto labels.
    These can be created *vertically* or *horizontally* and can be sized based on
    a preconfigured Avery or Dymo label template, or custom measurements. Finally,
    an *envelope view* is a type of list view optimized for printing directly onto
    envelopes.


    For *Touch Device* targets, an orientation option at the bottom of the dialog
    allows selection of portrait or landscape. It also includes width and height dimension
    fields when the touch device selection is a *Custom Device*.


    With options selected, click the *Finish* button. For *List* or *Form* layouts,
    the process ends with the new layout open and ready for customization. However,
    *Label*, *Report,* and *Table* layouts have additional dialogs that open with
    further customization options.


    Tip


    Remember that any layout can be viewed as a Form, List, or Table. These choices
    here only influence default setup options which can be modified and viewed differently
    later.'
  trans: "\n#### 配置部件\n\n部件通过“**部件定义**”对话框进行定义，如图 18-3 所示。创建新部件时，此对话框会自动打开。若要为现有部件打开该对话框，请双击部件标签，选择\
    \ `布局 ➤ 部件设置` 菜单，或从部件标签的上下文菜单中选择“**部件定义**”。\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig3_HTML.jpg](img/429700_2_En_18_Fig3_HTML.jpg)\n\
    \n图 18-3\n\n用于定义布局部件的对话框\n\n`部件类型` 选项会根据所定义部件在堆栈中的位置自动启用或禁用。例如，如果已定义了一个`页眉`部件，则`主体`部件不能更改为`页眉`；如果当前部件位于现有`页眉`下方的堆栈中，则无法将其更改为`标题页眉`。\n\
    \n当定义`子摘要`部件时，右侧的`摘要分隔字段`会变为可用。此处的字段选择表示，当记录按该字段排序时，子摘要部件应作为记录组之间的分隔符可见。这些分隔符通常用于在财务报告中插入小计。有关子摘要如何工作的更多信息，请参见本章后面的报告布局示例。\n\
    \n前四个选项复选框控制部件在打印或预览模式下如何处理。选择`每次出现前分页`可在`结尾汇总`、`主体`或`子摘要`部件前自动插入分页符。`每出现 X 次后分页`将在部件显示指定次数后插入分页符，从而限制`主体`或`子摘要`部件在单个页面上的重复次数。使用`每次出现后重设页码`可在每次部件实例后重置页码编号。将此选项与`标题页眉`配合使用，可创建不包含在编号序列中的标题页；或与`子摘要`配合使用，可在每个部分后重置编号。最后，`允许部件跨页断开`允许部件被页面边界拆分。若不选择此选项，除非部件内容无法容纳于单个页面，否则部件不会跨页拆分，而是会在当前页面底部留下空白区域，部件从下一页开始。启用此选项可覆盖此默认行为，并在分页处进行拆分以消除空白区域。其相邻的`在新页面前丢弃部件剩余内容`复选框将截断部件的任何剩余内容，而不是在下一页显示，从而在分页处裁剪内容。\n\
    \n底部的两个选项控制部件的视觉外观。`使用交替行状态`复选框允许`主体`采用交替样式，以便在视觉上区分记录。启用`使用活动行状态`可使`主体`通过特殊样式在视觉上指示当前记录（仅限屏幕显示）。\n\
    \n> **提示**  \n> 交替行状态和活动行状态的外观可通过在“检查器”面板（第 22 章）的“对象状态”菜单中选择进行编辑。\n\n#### 删除部件\n\
    \n要删除部件及其包含的所有对象，请选中部件标签并键入 `Delete`。\n\n#### 使用部件设置对话框\n\n使用“部件设置”对话框（如图 18-4\
    \ 所示）可以更精确地管理部件。要打开此对话框，请从“布局”菜单或通过右键单击布局任意位置出现的上下文菜单中选择“部件设置”。列表显示当前布局上定义的每个部件，并且是*唯一*可以重新排序汇总部件（使其位于主体上方或下方）的地方。要添加部件，请单击“创建”按钮。这会将部件插入列表和布局中，而不会像从工具栏拖动新部件那样调整其他部件的大小。要编辑部件，请选中它并单击“更改”按钮以打开“部件定义”对话框。使用“删除”按钮可删除所选部件。此对话框中没有取消或撤消选项，因此如果出现错误，请单击“完成”按钮，然后选择“编辑\
    \ ➤ 撤消”菜单以立即撤销所做的任何更改。\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig4_HTML.jpg](img/429700_2_En_18_Fig4_HTML.jpg)\n\
    \n图 18-4\n\n该对话框允许对部件堆栈进行更精确的控制\n\n## 添加布局\n\n向数据库文件添加布局有两种方法：创建新布局和复制现有布局。\n\n\
    ### 创建新布局\n\n要创建新布局，请从“布局”菜单中选择“新建布局/报表”功能，或单击同名工具栏图标。这将打开对话框（如图 18-5 所示），该对话框将根据所选目标设备类型和功能逐步显示更多屏幕。布局配置可以在之后进行修改，有些人发现选择“计算机”并单击“完成”以绕过此设置助手的其余部分，然后手动完成配置会更简单。然而，尤其是对于复杂报告布局的初始配置，此对话框可以节省大量时间，特别对于新开发人员而言。\n\
    \n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig5_HTML.jpg](img/429700_2_En_18_Fig5_HTML.jpg)\n\
    \n图 18-5\n\n用于创建新布局的对话框\n\n首先，从顶部的“显示记录来自”菜单中选择一个表事件，并为新布局输入一个“布局名称”。通过单击三个图标之一来选择目标设备类型：“计算机”、“触控设备”或“打印机”。“触控设备”图标会打开一个弹出菜单，其中有三个选项：“iPad”、“iPhone”和“自定义设备”。虽然任何布局都可以在多种设备组合上使用，但这些选择有助于确定新布局的默认大小和配置选项，从而节省一些时间。\n\
    \n接下来，选择一个主要功能以进一步控制默认设置。这些选择因目标设备选择而异。“表单布局”通常用于查看单条记录以进行数据输入任务或输入查找条件。它们也可用于创建自定义对话框或打印布局。“列表视图”用于显示找到的记录集中的多条记录列表。“表格视图”是一种低设计的列表视图，以类似电子表格的格式显示记录和字段。“报表视图”是一种列表视图，经过优化，可使用子摘要和汇总查看或打印汇总的数据列表。“标签视图”是一种列表视图，经过优化可直接打印到标签上。这些可以*垂直*或*水平*创建，并且可以根据预配置的\
    \ Avery 或 Dymo 标签模板或自定义尺寸进行调整大小。最后，“信封视图”是一种列表视图，经过优化可直接打印到信封上。\n\n对于“触控设备”目标，对话框底部的方向选项允许选择纵向或横向。当触控设备选择为“自定义设备”时，还会包含宽度和高度尺寸字段。\n\
    \n选择好选项后，单击“完成”按钮。对于“列表”或“表单”布局，该过程以打开新布局并可供自定义而结束。但是，“标签”、“报表”和“表格”布局会有额外的对话框打开，并提供进一步的自定义选项。\n\
    \n> **提示**  \n> 请记住，任何布局都可以作为表单、列表或表格进行查看。这里的选择仅影响默认设置选项，这些选项之后可以修改并以不同方式查看。\n"
- fmt: '# Additional Options for New Report Layouts


    A report layout is a type of List view that includes summaries and grand totals,
    configured for printing or displaying organized information. For example, an *Invoice*
    report can present records sorted by year and month to summarize data into subtotaled
    groups as illustrated in Figure [18-6](#429700_2_En_18_Chapter.xhtml#Fig6). Creating
    a report layout with the *New Layout/Report* dialog involves a sequence of up
    to *eight* separate dialogs that step through options to preconfigure parts, content,
    summarization, sorting, and more. Although a report layout can be created manually
    starting from a plain List view, these dialogs offer an enormous convenience by
    greatly reducing the laborious task of configuring the parts and settings required
    to build a complex hierarchical display of information.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig6_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig6_HTML.jpg)


    **Figure 18-6** — An illustration of an invoice report summarizing sales by year
    and then by month


    The preceding report is made up of six layout parts, starting with a *Sub-summary
    when sorted by Year (Leading).* When records are sorted first by *Invoice Year*,
    this part appears before each group of records whenever a new year is detected.
    Next, a *Sub-summary when sorted by Month (Leading)* does the same when records
    are sorted secondly by an *Invoice Month* field. Although the month name is displayed
    on the layout, for the months to be arranged chronologically, the actual sort
    and layout part must be based on a month number break field instead. The labels
    for column headings are placed in this summary part so they will appear above
    each group of individual records whenever a new month begins.


    The *Body* part repeats once for every record in the found set. However, these
    are arranged into sorted groups based on the surrounding *Sub-summary* parts.
    So, January has one group of three records (shown), while other months like February
    will have their own group of records repeating the Body part (not shown).


    Two additional *Sub-summaries* trail the *Body*: one sorted by month and another
    by year. These operate the same as the corresponding leading parts but appear
    after each sorted group. In this example, these are used to display summary fields
    that calculate subtotals of values for the records in the group above it. Finally,
    at the bottom is a *Grand Summary (Trailing)* which will provide grand totals,
    summarizing fields for the entire found set.


    In every summary part, the same *Invoice Total Summary* field is used and will
    automatically summarize the values for the records in the group they subsume.
    Although not shown in the illustration, an *Invoice Count Summary* field could
    be added to a summary part to display the *number of records* in each group.


    ## Preparing for the Invoice Report Demonstration


    To construct the layout illustrated in Figure [18-6](#429700_2_En_18_Chapter.xhtml#Fig6),
    an *Invoice* table must first be defined containing a variety of fields, as shown
    in Figure [18-7](#429700_2_En_18_Chapter.xhtml#Fig7).


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig7_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig7_HTML.jpg)


    **Figure 18-7** — The field definitions for an Invoice table required for the
    report


    The first few fields are used for data entry to store the *company ID*, *number*,
    *status*, *amount*, and *date* of an invoice. The three calculation fields convert
    the date into a *month number*, *month name*, and *year number*. These will be
    used to sort records and display values in summary parts. The two summary fields
    will be used to display the total count and the total dollar amount of invoices
    in the various sub-summary and trailing grand summary parts. Once these are configured,
    begin creating a new report layout by opening the *New Layout/Report* dialog and
    following these steps to begin a multi-dialog sequence of report configuration
    options:


    1.  Select the *Invoice* table.

    2.  Enter a *Layout Name* of “Invoice Report.”

    3.  Click on the *Printer* icon.

    4.  Click on the *Report* icon.

    5.  Click the *Continue* button.


    ## Dialog 1: Include Subtotals and Grand Totals


    The first report configuration dialog will appear with two options, shown in Figure
    [18-8](#429700_2_En_18_Chapter.xhtml#Fig8). The checkboxes provide the option
    to *Include subtotals* and to *Include grand totals*. Select both options to include
    these parts and to ensure that the *Specify Subtotals* and *Specify Grand Totals*
    dialogs (Dialogs 6 and 7) are included in the configuration process. Click *Next*
    to continue.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig8_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig8_HTML.jpg)


    **Figure 18-8** — The first of eight report configuration dialogs


    ## Dialog 2: Specify Fields


    The second report creation dialog is used to specify which fields will be placed
    on the report, as shown in Figure [18-9](#429700_2_En_18_Chapter.xhtml#Fig9).
    While fields can be added after the layout is created, selecting certain fields
    now makes them available for summarization options in subsequent dialogs. Add
    fields from the list on the left to the right, by double-clicking or using the
    *Move* buttons. Fields can be dragged within the available list to determine their
    default order across the new layout. In our example, we include the *number*,
    *date*, *customer*, *amount*, *year*, and *month*, all from the *Invoice* table.
    Fields from a related table such as a *Company Name* could be included by selecting
    a different table occurrence in the menu above the *Available fields* list.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig9_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig9_HTML.jpg)


    **Figure 18-9** — The second of eight report configuration dialogs


    ## Dialog 3: Organize Records by Category


    The third report dialog is used to specify *sort fields* that organize records
    and act as grouping criteria for the report’s sub-summaries, shown in Figure [18-10](#429700_2_En_18_Chapter.xhtml#Fig10).
    The fields added in the previous dialog are displayed in *Report fields* list
    (left) and can be added to and enabled in the *Report categories* list (right).
    Each selected field will be included as a summarizing category for groups of sorted
    records. Enable the checkbox to include the field in *both* the sub-summary layout
    part and the body of the report. In our example, the *Invoice Year* and *Invoice
    Month* fields are both added as categories and checked because they will be used
    to summarize groups of records.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig10_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig10_HTML.jpg)


    **Figure 18-10** — The third of eight report configuration dialogs


    ## Dialog 4: Sort


    The fourth report dialog is used to specify a sort order, as shown in Figure [18-11](#429700_2_En_18_Chapter.xhtml#Fig11).
    This dialog contains an interface similar to the standard *Sort Records* dialog
    (Chapter [4](#429700_2_En_4_Chapter.xhtml), “Sorting Records in the Found Set”).
    Any fields added as *Report categories* in the previous dialog will automatically
    appear locked at the top of the *Sort order*. Having been selected to summarize
    groups, they are required in the sort order. Additional fields can be added below
    these to further sort records in the body of the report.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig11_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig11_HTML.jpg)


    **Figure 18-11** — The fourth of eight report configuration dialogs'
  raw: '#### Additional Options for New Report Layouts


    A report layout is a type of List view that includes summaries and grand totals,
    configured for printing or displaying organized information. For example, an *Invoice*
    report can present records sorted by year and month to summarize data into subtotaled
    groups as illustrated in Figure [18-6](#429700_2_En_18_Chapter.xhtml#Fig6). Creating
    a report layout with the *New Layout/Report* dialog involves a sequence of up
    to *eight* separate dialogs that step through options to preconfigure parts, content,
    summarization, sorting, and more. Although a report layout can be created manually
    starting from a plain List view, these dialogs offer an enormous convenience by
    greatly reducing the laborious task of configuring the parts and settings required
    to build a complex hierarchical display of information.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig6_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig6_HTML.jpg)


    Figure 18-6


    An illustration of an invoice report summarizing sales by year and then by month


    The preceding report is made up of six layout parts, starting with a *Sub-summary
    when sorted by Year (Leading).* When records are sorted first by *Invoice Year*,
    this part appears before each group of records whenever a new year is detected.
    Next, a *Sub-summary when sorted by Month (Leading)* does the same when records
    are sorted secondly by an *Invoice Month* field. Although the month name is displayed
    on the layout, for the months to be arranged chronologically, the actual sort
    and layout part must be based on a month number break field instead. The labels
    for column headings are placed in this summary part so they will appear above
    each group of individual records whenever a new month begins.


    The *Body* part repeats once for every record in the found set. However, these
    are arranged into sorted groups based on the surrounding *Sub-summary* parts.
    So, January has one group of three records (shown), while other months like February
    will have their own group of records repeating the Body part (not shown).


    Two additional *Sub-summaries* trail the *Body*: one sorted by month and another
    by year. These operate the same as the corresponding leading parts but appear
    after each sorted group. In this example, these are used to display summary fields
    that calculate subtotals of values for the records in the group above it. Finally,
    at the bottom is a *Grand Summary (Trailing)* which will provide grand totals,
    summarizing fields for the entire found set.


    In every summary part, the same *Invoice Total Summary* field is used and will
    automatically summarize the values for the records in the group they subsume.
    Although not shown in the illustration, an *Invoice Count Summary* field could
    be added to a summary part to display the *number of records* in each group.


