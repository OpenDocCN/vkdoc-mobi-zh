    ### Converting Text Encoding


    There are three functions that are useful when preparing text for web-related
    uses or other uses.


    #### Encoding Text for URLs


    The *GetAsURLEncoded* function encodes text for use in a *Uniform Resource Locator*
    (URL). Any style information is removed from the text, and all characters are
    converted to UTF-8 format. Any non-letter or digit characters that are in the
    upper ASCII range are *percent encoded*, meaning they are converted to a percent
    symbol followed by the hexadecimal value of the character, e.g., spaces are converted
    to “%20”. The function accepts a single text parameter.


    ```

    GetAsURLEncoded ( "Hello World" )        // result = "Hello%20World"

    GetAsURLEncoded ( "10% Surcharge" )      // result = "10%25%20Surcharge"

    ```


    #### Converting to CSS


    The *GetAsCSS* function converts formatted text into the *Cascading Style Sheet*
    (CSS) format, preserving the font, font size, font color, and font style attributes
    in a markup format. The style information must be applied directly to the actual
    text content as this function doesn’t look at layout settings applied to change
    how a field displays text. The following example assumes a record in a *Contact*
    table with a field named *Contact Notes* that contains the word “Hello” where
    the font is “Arial,” the font size is 18, the font style is bold, and the font
    color is red.


    ```

    GetAsCSS ( Contact::Contact Notes )

    // result = Hello

    ```


    #### Converting Text to SVG


    The *GetAsSVG* function converts text to the *Scalable Vector Graphics* (SVG)
    format, which supports more text formats than HTML and may represent text more
    accurately in certain cases. This example assumes a record in a *Contact* table
    with a field named *Contact Notes* that contains the same styled text from the
    previous example.


    ```

    GetAsSVG ( Contact::Contact Notes )

    // result =


    "font-family: ''Arial'';font-size: 18px;color: #FF2712;font-weight: bold;",begin:
    1, end: 4


    Hello


    ```


    ### Modifying Text


    There are many functions available for performing text modifications, including
    *changing case*, *filtering,* and *substituting* characters.'
  trans: '

    ### 更改数据类型


    有多个函数可用于将值转换为不同的数据类型：`Boolean`、`date`、`number`、`text`、`time` 和 `timestamp`。每个函数都接受一个任意类型的单一值，并尝试将其转换为函数名所指示的目标类型。


    #### `GetAsBoolean`


    `GetAsBoolean` 函数会将任何值转换为 `Boolean` 类型。如果提供的数据转换为非零结果，或者容器字段包含值，则结果将为 `1`（真）。否则，结果将为
    `0`（假）。


    ```

    GetAsBoolean ( "Hello, World" )        // 结果 = 0

    GetAsBoolean ( "Hello" = "World" )     // 结果 = 0

    GetAsBoolean ( "100" )                 // 结果 = 1

    ```


    #### `GetAsDate`


    `GetAsDate` 函数会将一个值转换为正式的日期对象。提供的数据可以包含或不包含前导零，如下例所示：


    ```

    GetAsDate ( "1/5/2021" )         // 结果 = 1/5/2021

    GetAsDate ( "01/05/2021" )       // 结果 = 1/5/2021

    ```


    基于文本且包含两位年份的日期会自动转换，假定该日期落在当前日期之后 30 年内或之前 70 年内（第 8 章，“两位年份日期转换”）。如果您不使用四位年份，则意图落在此范围之外的日期将得到错误结果。以下示例假设当前日期为
    2021 年 1 月 5 日：


    ```

    GetAsDate ( "1/5/17" )           // 结果 = 1/5/2017

    GetAsDate ( "1/5/95" )           // 结果 = 1/5/1995

    GetAsDate ( "1/5/50" )           // 结果 = 1/5/1950

    ```


    当提供一个数字时，它将用来计算自公元 0001 年 1 月 1 日以来经过的天数。例如：


    ```

    GetAsDate ( 737805 )             // 结果 = 1/15/2021

    ```


    #### `GetAsNumber`


    `GetAsNumber` 函数会将值转换为数字。当某个值与其他数字进行比较或排序时，这有助于确保获得正确结果。当以文本形式提供数字时，它们会被转换回数字。例如：


    ```

    GetAsNumber ( "1234" )          // 结果 = 1234

    GetAsNumber ( "015" )           // 结果 = 15

    GetAsNumber ( "13.75" )         // 结果 = 13.75

    ```


    在转换文本时，任何非数字字符都会被自动忽略。


    ```

    GetAsNumber ( "$25.09" )                // 结果 = 25.09

    GetAsNumber ( "He ran 9.75 miles." )    // 结果 = 9.75

    ```


    在某些情况下，依赖非数字字符的自动过滤可能无法得到理想的结果。


    ```

    GetAsNumber ( "3 men ran 9.75 miles." ) // 结果 = 39.75

    ```


    以下示例假设 `Qty` 文本字段中包含值“03”，并展示了在将文本与其它数值进行比较之前，将其转换为数字的重要性。由于字段中基于文本的数字带有前导零，在文本转换为数字之前（第一个示例中），这两个值看起来并不相同（第二个示例中）。


    ```

    3 = Qty                          // 结果 = 0

    3 = GetAsNumber ( Qty )          // 结果 = 1

    ```


    类似地，当值不是数字时，比较将会失败。以下示例假设 `Qty` 文本字段中包含值“20”。由于它是一个文本值，`20` 会被视为比 `3` 更小的值，因为文本是逐个字符进行比较，而不是将整个值作为数字进行比较。一旦转换为数字（如第二个示例所示），它就能正确评估。


    ```

    3 > Qty                          // 结果 = 1

    3 > GetAsNumber ( Qty )          // 结果 = 0

    ```


    #### `GetAsText`


    `GetAsText` 函数将任何值转换为文本字符串。


    ```

    GetAsText ( 58.75 )                     // 结果 = "58.75"

    GetAsText ( 05:15:00 )                  // 结果 = "5:15:00"

    GetAsText ( 6/30/2016 5:20:49 PM )      // 结果 = "6/30/2016 5:20:49 PM"

    ```


    该函数甚至可以将容器内容转换为两个值之一，具体取决于文件的存储方式（第 10 章，“解释容器存储选项”）。当存储在内部时，将返回文件名。当文件作为引用存储时，结果将是一个因文件类型而异但包含文件名和路径的元数据字符串。


    ```

    GetAsText ( 联系人::图片 )

    // 结果 = Mark Munro.jpg

    GetAsText ( 联系人::图片 )

    // 结果 =

    size:191,175

    image:Mark Munro.jpg

    imagemac:/Macintosh HD/Users/admin/Desktop/Mark Munro.jpg

    ```


    #### `GetAsTime`


    `GetAsTime` 函数将基于文本的时间或时间戳值转换为时间对象，以确保在与其它时间进行比较或排序时获得正确结果。非时间值将导致错误。


    ```

    GetAsTime ( "5:15:00" )         // 结果 = 5:15:00

    GetAsTime ( "Hello, World" )    // 结果 = ?

    ```


    #### `GetAsTimestamp`


    `GetAsTimestamp` 函数将基于文本的值转换为时间戳对象，以确保在与其它时间进行比较或排序时获得正确结果。当提供的文本不包含完整时间戳信息时，该函数将填补缺失的信息。例如，当提供日期但没有时间信息时，函数会返回指定日期午夜的
    时间戳。当提供一个数字时，函数会返回自公元 0001 年 1 月 1 日以来该秒数的时间戳。


    ```

    GetAsTimestamp ( "1/5/2017 5:15:00" )     // 结果 = 1/5/2017 5:15:00

    GetAsTimestamp ( "1/1/2017" )             // 结果 = 1/1/2017 12:00 AM

    GetAsTimestamp ( 100000 )                 // 结果 = 1/2/0001 3:46:40 AM

    ```


    ### 转换文本编码


    有三个函数在准备用于网络相关或其他用途的文本时非常有用。


    #### 为 URL 编码文本


    `GetAsURLEncoded` 函数对用于统一资源定位符（URL）的文本进行编码。文本中的所有样式信息都会被移除，所有字符都会被转换为 UTF-8 格式。任何位于高
    ASCII 范围的非字母或数字字符都会被进行百分号编码，这意味着它们会被转换为百分号后跟字符的十六进制值，例如，空格会被转换为“%20”。该函数接受一个文本参数。


    ```

    GetAsURLEncoded ( "Hello World" )        // 结果 = "Hello%20World"

    GetAsURLEncoded ( "10% Surcharge" )      // 结果 = "10%25%20Surcharge"

    ```


    #### 转换为 CSS


    `GetAsCSS` 函数将格式化的文本转换为层叠样式表（CSS）格式，以标记格式保留字体、字号、字体颜色和字体样式属性。样式信息必须直接应用于实际文本内容，因为此函数不查看应用于更改字段显示文本方式的布局设置。以下示例假设
    `联系人` 表中有一条记录，其中包含一个名为 `联系人备注` 的字段，其内容为单词“Hello”，字体为“Arial”，字号为 18，字体样式为粗体，字体颜色为红色。


    ```

    GetAsCSS ( 联系人::联系人备注 )

    // 结果 = <span style="font-family:''Arial'';font-size:18px;color:#FF2712;font-weight:bold;">Hello</span>

    ```


    #### 将文本转换为 SVG


    `GetAsSVG` 函数将文本转换为可缩放矢量图形（SVG）格式，该格式支持比 HTML 更多的文本格式，并且在某些情况下可以更准确地表示文本。此示例假设
    `联系人` 表中有一条记录，其中包含一个名为 `联系人备注` 的字段，其内容与上一个示例中的样式文本相同。


    ```

    GetAsSVG ( 联系人::联系人备注 )

    // 结果 =


    "font-family: ''Arial'';font-size: 18px;color: #FF2712;font-weight: bold;",begin:
    1, end: 4


    Hello

    ```


    ### 修改文本


    有许多函数可用于执行文本修改，包括更改大小写、过滤和替换字符。

