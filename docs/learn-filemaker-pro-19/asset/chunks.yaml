- fmt: '# Designing a Custom Theme


    Your personal approach to custom theme design will be influenced by many factors.
    Two big ones are specific experience with FileMaker and a general knowledge of
    principles of interface design. Those familiar with both can leverage that experience
    to focus on innovation when designing their vision for an interface. Those with
    less experience will need to draw inspiration from others or experiment more speculatively.
    Other factors include the type of solution one plans to build, the target deployment
    platforms, a client’s expectations, and budgetary constraints. There is no single
    approach that will work for every developer in every situation, and it can be
    challenging to plan a theme outside the context of a specific project. Without
    implying a one-size-fits-all approach, there are some specific things to think
    about when getting started.


    Consider separating your theme design planning from any specific project, past
    or present, by creating an abstract design sandbox. This allows you to focus on
    creating a cleanly designed, original theme without any distracting baggage clogging
    up the file. You should still look back at as many different real-world examples
    as possible for inspiration to ground your choices in actual projects without
    being bound to any one of them. Select the best practices from many examples,
    compare, contrast, and then reinvent them into something new.


    The sandbox file should contain one or two semi-realistic simple tables that can
    be used in the process, e.g., *Contacts* and *Company*, or *Invoices* and *Line
    Items*. Use one table as your design focus, and build a List and Form View layout
    for it, while the other can serve as a related table for portal design. Make additional
    layouts for dialogs, reports, iOS devices, etc. only as needed to define the styles
    necessary for a standard project. Remember to keep the fields and layouts limited
    to a minimum for now since you aren’t designing an actual solution, just a *style
    prototype*. Stay focused on that goal at first.


    Begin adding objects and experimenting with different formatting options. Focus
    on the unique formatting required on different layouts or when used for different
    functions. For example, a field on a List view may not be editable and can have
    a transparent fill and border, while one on a Form view that is editable may benefit
    from a visual indication that it is a field and accepts input, perhaps with a
    different fill color. Similarly, a separate style will be required for a text
    object used as a layout heading, field label, informational tips, prompts, report
    page numbers, and more. Think about all the different types of buttons you might
    use, such as a standard button, icon-only, text with icon, and more. Some may
    have borders and fill, others maybe only an icon with a transparent background,
    each requiring a separate style. Be sure to think about all the different control
    types for fields; each will require one or more defined styles since there is
    no general *Field* style category, only `Edit Box`, `Pop-up Menu`, `Calendar`,
    etc.


    Since *any format difference* requires a separate style, fields and labels may
    need several variations depending on the type of solution you will build. For
    example, you might need one for each alignment (left, right, center) and another
    for each visual appearance (clear, bordered, filled). Take time to think about
    different object states and Window modes. Most styles will need to adapt to interactions,
    look good in appearance, inform correctly in different modes, etc. Try to find
    a reasonable balance between these objectives. On one hand, keep the list short
    to avoid being overwhelming. On the other hand, provide an adequate number of
    options that create a practical palette of design options to avoid any temptation
    to cheat and apply small formatting changes to objects without updating or creating
    another style.


    When naming styles, choose a balance between a clear description of purpose and
    a concise easily readable string. Names must be unique across the entire theme
    regardless of object type, so it’s a good idea to include the object type as a
    name prefix, e.g., avoid a conflict between a button and field style named “Bordered
    Right” by naming them `Button Bordered Right` and `Field Bordered Right`. The
    `Default` style can’t be renamed, so keep this as your most commonly used style
    choice for each object type or ignore it.


    Once your style sandbox has enough styles that you feel adequately provides a
    solid foundation, move the theme to a live file and begin using it for real development.
    As you discover unanticipated style requirements, add or enhance the theme. If
    you do this purposefully and without haste, the result should be a well-designed,
    practical theme that can be imported and reused in other files.


    Although this process may sound like a tedious overbearing chore, remember that
    the benefits of a solid theme will ultimately provide a good return on the time
    investment.


    ## Summary


    This chapter introduced the basics of using themes and styles to improve the efficiency
    of interface design. In the next chapter, we will explore customizing the application
    menus to create a unique user experience.


    # Customizing Menus


    A database can override FileMaker’s default menu bar with custom menus. The level
    of customization can vary based on your needs, ranging from changes to intercept
    a few functions to building a completely unique desktop experience. You can build
    one set of custom menus that dynamically change based on various conditions or
    create multiple sets that are installed contextually based on the layout. Customizing
    menus elevates a solution from a mere database *document* to a custom *application*.
    This chapter explores the basics of custom menus, covering the following topics:


    - Getting started with custom menu basics

    - Exploring the `Manage Custom Menus` dialog

    - Creating a custom menu set

    - Customizing menu items

    - Installing a menu set

    - Exploring the link between commands and menus

    - Creating status-based custom menu'
