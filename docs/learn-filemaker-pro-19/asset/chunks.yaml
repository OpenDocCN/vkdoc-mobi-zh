- fmt: '# Naming Objects


    The `object name` property is an optional static text identifier that can be manually
    assigned to a layout object or group of objects in layout mode. While these are
    somewhat of a formality, they are helpful when viewing elements in the `Objects`
    pane and necessary to allow certain functions and script steps to refer to non-field
    objects: portals, tab control, slide control, and web viewers. For example, the
    `GetLayoutObjectAttribute` and `Get (ActiveLayoutObjectName)` functions can *only*
    refer to an object by the name property. Similarly, scripts steps like `Go To
    Object`, `Refresh Portal`, and `Set Web Viewer` require an object name as a target
    reference.


    An `object name` should not be confused with a `field name` as they are two separate
    things. Where a field name is a universal definition of a specific data container
    common to the field anywhere it is placed, an object name is a property unique
    to each layout instance of an object, including fields. An instance of a field
    can be assigned an object name different from its defined name, and each instance
    of the same field on any layout can have a different object name.


    To assign an object name, enter Layout mode and select an object. In the `Position`
    group of the `Position` tab of the `Inspector` pane, click into the `Name` text
    area and type a name for the object. Names are not case sensitive, and they must
    be unique.


    **Tip:** Objects pasted from other layouts with shared object names will be renamed
    to ensure unique naming between all objects. Always delete older objects prior
    to pasting new, and/or review any important names after pasting.


    # Summary


    This chapter explored various options for manipulating layout objects, including
    selecting, resizing, moving, arranging, aligning, hiding, conditionally formatting,
    tabbing, and naming. In the next chapter, we will explore the themes and styles
    feature.


    # 22. Using Themes and Styles


    Object formatting can be applied directly to objects using the functions of the
    `Format` menu or in the `Appearance` tab of the `Inspector` pane. However, like
    many popular print and design applications, FileMaker allows you to save object
    style definitions and group them into a theme to create a more efficient design
    workflow. This makes it easier to maintain consistency in similar objects across
    multiple layouts and allows formatting changes to be instantly applied throughout.
    Using styles is also recommended as a best practice for improved system performance.
    This chapter covers the basics of using themes and styles, including:


    - Anatomizing styles

    - Using themes

    - Using styles

    - Designing a custom theme


    ## Anatomizing Styles


    A `style` is a collection of appearance settings for a specific object type that
    can be applied to a new object with a single action. One or more styles can be
    defined for each object type, creating a library of design options. The applicable
    settings vary based on the type of object and only include properties pertaining
    to *appearance* rather than *data*, *position*, and other non-format related properties.
    Styles can include settings for `fill`, `border`, `corner radius`, `font`, `size`,
    `style`, `indents`, `line height`, and `tabs`.


    In many ways, styles in FileMaker are *similar* to those found in word processing,
    desktop publishing applications, and cascading style sheets (CSS) since they enable
    the rapid application of formatting to new objects and facilitating global style
    updates to existing objects. However, they are also *different* in a couple important
    ways. First, they are a layout design mechanism used by developers to facilitate
    efficient layout design and are not available to users when editing the text contents
    of a field in Browse mode. FileMaker has no user accessible, content applicable
    styles. Users can apply individual formatting changes to text inside of fields
    but there is no way to apply these in batches. Unlike CSS and desktop publishing,
    styles in FileMaker are discretely non-hierarchical and cannot inherit attributes
    from other styles. Further, because styles are applied to dynamic objects in an
    interactive interface, they have more dimension than those found in text-based
    applications. A style stores one group of every format setting for each possible
    `object state` for every `object part` forming a complex internal hierarchy, as
    illustrated in Figure 22-1.


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig1_HTML.jpg](images/429700_2_En_22_Chapter/429700_2_En_22_Fig1_HTML.jpg)


    Figure 22-1: An illustration of the hierarchy of an object style


    An `object part` is a component of an object (or the object itself) which can
    be separately styled. A `button` is made up of two parts: a `button` and an `icon`.
    A `portal` is also composed of two parts: a `portal` and a `portal row`. A `button
    bar` has four parts: a `button bar`, `divider`, `segment`, and `icon`. Each part
    has one set of format settings for every possible object state all defined as
    a single style.


    An `object state` is the status of an object relative to a user. Most objects
    have at least four states. A `Normal` state means the object is visible but not
    actively engaged. An `Active` state indicates the object has active focus, e.g.,
    a field in focus or the active segment of a button bar. The other two common states
    indicate the cursor’s interaction with the object: `Hover` and `Pressed`. Some
    objects have additional states available based on their nature, e.g., `fields`
    have a `Placeholder Text` state, and a `button bar segment` has an `Inactive`
    state.


    Each part-state combination can be assigned a group of format settings different
    from others. This enables a dynamic interface design where the overall appearance
    of an object changes based on the user’s action. For example, when the user moves
    their cursor over a button, its border, shading, or text color can change to indicate
    that it is an active element that accepts a mouse click. Similarly, when the user
    clicks the button, it can deepen in color to visually indicate the pushing activity.
    The combination of parts and states creates an exponential number of format settings
    that can be defined for a given object. For example, a button has *eight* different
    groups of format settings, one for each of the four states for the two parts,
    as illustrated in Figure 22-2. Remember, this illustrates a *single style definition*
    that can be saved and then applied to any number of additional buttons with a
    single action.'
