  trans: '

    ### 选择表事件


    选中的表事件将以蓝色阴影边框高亮显示，其大小、位置和格式均可修改。在启用*对象选择光标*后，可通过多种不同方法选择表事件，如图 9-17 所示。要选择单个表事件，请在关系图中直接单击它。要选择多个不连续的表事件，请按住`Shift`键，然后单击每个目标表事件。在按住该键的同时，再次单击先前选中的表事件将取消选择。要选择聚集在同一组中的多个表事件，请单击背景，然后按住并拖动，直到选择矩形框住目标表事件。选择框触及的每个表事件都将被选中。按住`Command`（macOS）或`Windows`（Windows）键拖动，则仅选择*完全*位于选择框边界内的表事件。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig17_HTML.jpg](img/429700_2_En_9_Fig17_HTML.jpg)


    图 9-17


    用于选择并操作表事件的光标工具


    当处理大量表事件时，在*选择表*工具下打开的菜单（如图 9-18 所示）提供两个选项，帮助定位特定实例。*选择 1 层相关表*选项会自动选择与所选表事件*直接相关*的每个表事件。*选择具有相同源表的表*功能会选择与所选表事件共享*相同源表*的每个表事件，这在复杂关系图中查找某个表的其他实例时很有帮助。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig18_HTML.jpg](img/429700_2_En_9_Fig18_HTML.jpg)


    图 9-18


    用于选择相似表的工具


    ### 与表事件交互


    选中光标工具后，可以移动、折叠、展开、调整大小以及在图 9-19 中高亮显示的点上滚动表事件框。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig19_HTML.jpg](img/429700_2_En_9_Fig19_HTML.jpg)


    图 9-19


    折叠（顶部）和展开（底部）时的表事件操作点


    1.  单击并按住表事件的*标题*可以拖动该框，并在关系图中重新定位。将光标悬停在箭头图标上可显示信息丰富的元数据弹出窗口。


    2.  标题右侧是一个展开切换按钮图标。单击一次可在三种状态之间切换表事件的状态。没有任何关联关系时，单击一次折叠该框，再次单击则展开。存在关联关系时，中间状态会半折叠，仅显示用于与其他表事件形成关系的匹配字段（未显示）。


    3.  拖动侧边和底部的细条可分别调整宽度或高度。


    4.  拖动底角可根据方向调整宽度和/或高度。


    5.  完全展开后，出现在顶部、底部或两端的箭头图标用于向上或向下滚动字段列表。单击一次将逐字段向上或向下移动；按住则会持续滚动列表，直到松开为止。


    在*Learn FileMaker*文件中练习，将所有表事件折叠并按顺序上下排列，使其大致排成垂直堆叠状，如图 9-20 所示。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig20_HTML.jpg](img/429700_2_En_9_Fig20_HTML.jpg)


    图 9-20


    四个表事件折叠后排列成堆叠状


    ### 排列和调整表事件大小


    *排列*工具用于根据这四个图标下隐藏菜单中的选项（如图 9-21 所示）来对齐和调整所选表事件组的大小：


    1.  按*左边缘*、*中心*或*右边缘*水平对齐。


    2.  按*顶部边缘*、*中间*或*底部边缘*垂直对齐。


    3.  *水平*或*垂直*均匀分布。


    4.  将*宽度*、*高度*或两者调整为*最小*或*最大*。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig21_HTML.jpg](img/429700_2_En_9_Fig21_HTML.jpg)


    图 9-21


    排列工具包含用于排列和调整表事件大小的菜单


    ### 查看选项


    *工具*部分包含四个控件，用于调整关系图的缩放倍率，如图 9-22 所示：


    1.  *调整缩放倍率* – 调整缩放倍率，使所有表事件均适合视图，无需滚动。


    2.  *放大* – 单击激活，然后在关系图中单击可将缩放倍率增加 25%。


    3.  *缩小* – 单击激活，然后在关系图中单击可将缩放倍率减少 25%。


    4.  *百分比* – 手动设置缩放百分比，范围为 1 到 400。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig22_HTML.jpg](img/429700_2_En_9_Fig22_HTML.jpg)


    图 9-22


    用于调整关系图缩放倍率的工具


    ### 格式化表事件


    表事件唯一的*格式化*工具是颜色菜单，可通过单击*表/关系*部分中*删除图标*右侧的颜色工具访问。颜色编码可通过多种方式用于对表事件进行视觉分组。可将一种颜色应用于所有主表事件，将另一种颜色应用于辅助表事件，或为每个事件组应用一种颜色。颜色可以指示用于将辅助表事件连接到主表事件的操作符类型，或者颜色可以表示表事件的功能，例如，一种颜色用于用作子门户的表事件，另一种颜色用于父表等。颜色还可用于指示每个表事件的开发状态，例如，高亮显示正在处理或已弃用的表事件。无论选择哪种具体方案，为表事件着色都有助于在视觉上导航复杂的关系图。


    ### 编辑表事件


    表事件使用*指定表*对话框进行编辑。双击某个表事件，或选择一个表事件并单击*编辑选择*按钮图标（如图 9-23 所示），即可打开此对话框。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig23_HTML.jpg](img/429700_2_En_9_Fig23_HTML.jpg)


    图 9-23


    用于编辑现有表事件的工具


    #### 介绍指定表对话框


    在*指定表*对话框中（如图 9-24 所示），可以修改表事件的*数据源*、*表*和名称。选择不同的表时，名称将始终更新为该表的名称，除非在打开对话框后编辑过名称。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig24_HTML.jpg](img/429700_2_En_9_Fig24_HTML.jpg)


    图 9-24


    用于指定分配给表事件的表的对话框


    ### 添加表事件


    可以为当前文件中定义的任何数据源中的任何表向关系图添加表事件。可以通过*创建新表事件*或*复制现有表事件*来实现。

    '
- fmt: '### Creating a New Occurrence


    To create a new table occurrence, start by clicking the `Add Table` button icon,
    shown in Figure [9-25](#429700_2_En_9_Chapter.xhtml#Fig25). This will open the
    `Specify Table` dialog described earlier. Optionally, choose a data source if
    the table you want to add is in a different file. After the occurrence is created,
    it can be resized and positioned as desired.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig25_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig25_HTML.jpg)


    Figure 9-25


    The tool used to add a new table occurrence


    ### Duplicating an Existing Occurrence


    To duplicate the selected occurrence(s), click the `Duplicate Table` button icon,
    shown in Figure [9-26](#429700_2_En_9_Chapter.xhtml#Fig26). There are many great
    reasons to duplicate existing occurrences instead of creating new ones. When an
    occurrence already exists for the new target table, duplicating it saves the step
    of assigning the table manually. A duplicate also retains the size and formatting
    of the original, saving you the time required to modify the default styling of
    a new occurrence. Duplicating a group of related occurrences will retain all relational
    connections between them.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig26_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig26_HTML.jpg)


    Figure 9-26


    The tool used to duplicate an existing occurrence


    ### Deleting Occurrences


    Table occurrences can be deleted by selecting and typing the `Delete` key or clicking
    the `Delete` tool shown in Figure [9-27](#429700_2_En_9_Chapter.xhtml#Fig27).
    Remember that this will only delete the *occurrence* of the table and *not* the
    actual *table*. However, any resources that use the occurrence as a context will
    be affected by the deletion. So, layouts and scripts may require updating after
    deleting occurrences assigned to or used within them.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig27_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig27_HTML.jpg)


    Figure 9-27


    The tool used to delete an existing occurrence


    ### Printing the Relationship Graph


    The `Pages` tools shown in Figure [9-28](#429700_2_En_9_Chapter.xhtml#Fig28) provide
    control over *page breaks* and *page setup* in preparation for printing the relationship
    graph.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig28_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig28_HTML.jpg)


    Figure 9-28


    The tools used to prepare the graph for printing


    ## Building Relationships


    Once occurrences are present in the graph, they can be linked to define relationships.


    ### Adding Relationships


    A relationship is formed when a connection between two occurrences is established.
    This can be done either by dragging a connection between two occurrences or using
    the `Add Relationship` button.


    #### Dragging a Connection Between Occurrences


    The most intuitive way of creating a connection between two occurrences is to
    use the cursor to drag a connection from a field in one occurrence to a field
    in another, thereby establishing a relationship based on those two match fields.
    To begin, locate the two occurrences in the graph that will be connected, and
    click the icon in the upper-right corner of both until they are fully expanded.
    Scroll until the desired match field for the relationship is in the visible region
    of each list. Click and hold on a match field from one occurrence. As you begin
    to drag the cursor toward the other occurrence, a line will appear connected to
    the first match field, shown in Figure [9-29](#429700_2_En_9_Chapter.xhtml#Fig29).
    Once the cursor is on top of the desired match field in the other occurrence,
    release it and the line connecting the two will be established.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig29_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig29_HTML.jpg)


    Figure 9-29


    Dragging a new relational connection between occurrences


    Tip


    Save time by quickly dragging a connection between *any* two fields currently
    visible and then edit the relationship (described later) and select the desired
    fields in dialog’s larger and more easily scrollable lists.


    #### Using the Add Relationship Button


    The other way to create a new relationship is by clicking the `Add Relationship`
    button in the toolbar, shown in Figure [9-30](#429700_2_En_9_Chapter.xhtml#Fig30).
    Clicking this button opens an empty `Edit Relationship` dialog (discussed later
    in this chapter) with both tables set to `<unknown>`. Since the connection is
    empty, occurrences and match fields must be manually selected.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig30_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig30_HTML.jpg)


    Figure 9-30


    The tool used to create an empty relationship


    ### Manipulating Relationships


    A *relationship* is represented in the graph by a line connecting two occurrences
    with a selector box in the middle, as shown in Figure [9-31](#429700_2_En_9_Chapter.xhtml#Fig31).
    The box will display the operator used to form a match between the two fields,
    with the default being an equal sign.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig31_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig31_HTML.jpg)


    Figure 9-31


    The relationship line with a selector box in the middle


    On each end of the line where it connects to an occurrence is an indication of
    the relationship type, shown enlarged in Figure [9-32](#429700_2_En_9_Chapter.xhtml#Fig32).
    A straight line, like that on the left, indicates a *one* connection, and the
    “crow’s feet” on the right side indicates a *many*. Therefore, in this example,
    there is a *one-to-many relationship* connection from *Company* to *Contact*.
    FileMaker determines this by looking *only* at the auto-enter settings for the
    fields. Since the `Record ID` field in *Company* is configured to auto-enter a
    unique serial id for each record, it is displayed as a one. On the other side,
    the field has no restrictions, so it assumes a many.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig32_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig32_HTML.jpg)


    Figure 9-32


    End-of-line symbols indicate the type of connection on each side


    Caution


    The end-of-line indicators only reflect field definition restrictions, not entry
    options on layouts or script functions.


    When moving occurrences, the relationship lines will stay connected on both sides,
    regardless of one box’s position relative to the other box. The line will split
    into three straight, pivoting segments, as shown in Figure [9-33](#429700_2_En_9_Chapter.xhtml#Fig33).
    After moving a box far enough, the line will snap to the other side of the occurrence
    box in order to maintain a connection.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig33_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig33_HTML.jpg)


    Figure 9-33


    The line splits into straight segments when an occurrence is moved'
