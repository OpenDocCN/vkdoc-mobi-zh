  trans: '

    # 自定义菜单基础入门


    FileMaker 中的*菜单栏*与任何现代应用程序类似：一条水平条带，位于屏幕顶部（macOS）或数据库窗口顶部（Windows）。数据库始终显示*活动菜单集*，默认为一个不可修改的集合，称为*[标准
    FileMaker 菜单]*。开发者可以创建一个或多个附加菜单集，在各种情况下代替标准菜单集进行安装。在深入探讨定制之前，请先回顾菜单的对象和术语，如图 23-1
    所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig1_HTML.jpg](img/429700_2_En_23_Fig1_HTML.jpg)


    图 23-1


    菜单组件的术语概览


    一个*菜单集*是一个命名的菜单集合，可以安装到菜单栏中，从而成为*活动菜单集*。一个*菜单*包含一组不同类型的项目，如图 23-2 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig2_HTML.jpg](img/429700_2_En_23_Fig2_HTML.jpg)


    图 23-2


    菜单的层级结构


    一旦定义完成，*自定义菜单*可以添加到一个或多个菜单集中。每个菜单可以创建为以下四种类型之一：


    -   完全从头创建构建的自定义菜单。

    -   三个*不可定制*的标准 FileMaker 菜单及其所有标准菜单项：*格式*、*脚本*和*窗口*。

    -   八个标准 FileMaker 菜单，可以按需复制和定制（少数例外）：*FileMaker Pro*、*文件*、*编辑*、*视图*、*插入*、*记录*、*请求*和*帮助*。

    -   大约二十多个*标准子菜单*可供选择，可以作为独立的*菜单*附加到菜单集，也可以作为附加到自定义菜单项的子菜单。这些子菜单包括*最近打开*、*导入记录*、*转到布局*、*管理*、*共享*、*显示窗口*等。


    一个*菜单项*是添加到菜单中的三种对象类型之一：*命令*、*分隔线*或*子菜单*。


    一个*命令项*触发一个功能，可以是标准 FileMaker 命令，也可以是自定义脚本。项目可以完全自定义，拥有独特的名称和脚本功能，或者可以继承标准 FileMaker
    命令的部分或全部属性（名称、功能和快捷键命令）。


    *分隔线*是一条非功能性的水平线，用于分隔菜单项组，以创建更直观有序的项目组织。


    *子菜单*是一个项目，点击后会弹出其下包含的次级菜单选项。子菜单可以嵌套层叠，即一个菜单项可以打开一个子菜单，该子菜单中的某个项目又能打开另一个子菜单，以此类推。每个子菜单首先被定义为一个独立的菜单，然后连接到将打开它的菜单项上。


    最多有四个标准菜单永远无法从应用程序中完全移除。即使安装了完全*空*的自定义菜单集，这四个菜单也会保留。在 macOS 电脑上，*Apple* 菜单包含标准的操作系统功能，完全不受自定义菜单集影响，并且无法以任何方式修改。*FileMaker
    Pro* 应用程序菜单和*帮助*菜单始终位于菜单栏的两侧，无论它们是否出现在自定义菜单集中。当在偏好设置中启用*高级工具*时（第 2 章），*工具*菜单可见，并且这些菜单完全无法修改。


    ## 探索管理自定义菜单对话框


    自定义菜单在*管理自定义菜单*对话框中定义，可以通过选择*管理自定义菜单*选项来打开，该选项在三个地方可用：*文件 ➤ 管理*菜单、*工具 ➤ 自定义菜单*菜单以及*布局设置*对话框*常规*选项卡中的*菜单集*弹出菜单。该对话框有两个选项卡，如图
    23-3 所示：*自定义菜单集*和*自定义菜单*。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig3_HTML.jpg](img/429700_2_En_23_Fig3_HTML.jpg)


    图 23-3


    用于定义自定义菜单的对话框


    *自定义菜单集*选项卡列出了文件中定义的所有菜单集。默认的标准菜单集会包含在内，且无法移除。在此对话框中，可以*创建*、*编辑*、*复制*和*删除*新的菜单集。


    *自定义菜单*选项卡显示所有已定义自定义菜单的列表，并带有类似的修改按钮。在您开始创建菜单之前，此列表为空。任何已定义的自定义菜单均可用于连接到自定义菜单集。


    这两个对话框之间的功能交集令人困惑，可能会让人望而生畏，并可能劝阻新手开发者。然而，考虑到为高级数据库提供完全自定义菜单系统的好处，值得花力气去理解其工作原理，如图
    23-4 所示。虽然一开始令人困惑，但这提供了本稍后将要描述的对话框和功能的概览。


    从*自定义菜单集*选项卡中，当您创建或编辑一个菜单集时，会打开*编辑自定义菜单集*对话框，列出已分配给该菜单集的菜单。可以在此处选择并编辑某个菜单，打开*编辑自定义菜单*对话框，或者点击*添加*按钮在此处添加新菜单，该按钮会打开*选择菜单*对话框。此对话框列出了所有标准的
    FileMaker 子菜单以及已创建的任何自定义菜单。选择一个以将其添加到菜单集，或点击加号按钮打开*创建自定义菜单*对话框以创建一个新菜单，该菜单将被添加。


    从*自定义菜单*选项卡中，点击*创建*会打开*创建自定义菜单*对话框，该对话框提供了基于标准菜单创建新菜单或从头创建一个空菜单的选项。一旦做出选择，*编辑自定义菜单*对话框便会打开。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig4_HTML.jpg](img/429700_2_En_23_Fig4_HTML.jpg)


    图 23-4


    自定义菜单对话框略显混乱的交集


    ## 创建自定义菜单集


    通过打开*管理自定义菜单*对话框并点击*自定义菜单集*选项卡，开始创建一个新的菜单集。点击*创建*按钮，在*编辑自定义菜单集*对话框中打开一个新的空菜单集，如图
    23-5 所示。为菜单集输入一个名称，并可选输入开发者注释。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig5_HTML.jpg](img/429700_2_En_23_Fig5_HTML.jpg)


    图 23-5


    用于创建新自定义菜单集的对话框

