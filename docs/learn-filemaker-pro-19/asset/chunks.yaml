- fmt: "### Repeating\n\nA `repeating field` is a field defined to store multiple\
    \ values for a single record. Instead of creating a separate field for each additional\
    \ value of a certain type, a single field can be defined to *repeat* any number\
    \ of times, e.g., a single phone number field can be defined to store multiple\
    \ numbers as if they were separate fields. Any type of field can be made to repeat.\
    \ For an entry field, indicate a number of desired repetitions in the text area\
    \ provided on the *Storage* tab of the *Options for Field* dialog. For a *calculation*\
    \ field, enter the number of repetitions in the *Specify Formula* dialog (Chapter\
    \ [12](#429700_2_En_12_Chapter.xhtml)). A *summary* field becomes repeating when\
    \ the field it summarizes is repeating and the option to summarize repetitions\
    \ individually is selected (described later in this chapter).\n\nThe *Maximum\
    \ number of repetitions* entered in the *Storage* tab of the *Options for Field*\
    \ dialog defines the number of separate values the field can contain. To allow\
    \ user entry into two or more of these repetitions, the field must be configured\
    \ to repeat on a layout (Chapter [19](#429700_2_En_19_Chapter.xhtml), “Inspecting\
    \ the Data Settings”). There are a few implications to consider when using repeating\
    \ fields, including:\n\n* Repeating fields are never scrollable on a layout.\n\
    * You can add more repetitions later, but the number displayed on a layout must\
    \ be manually adjusted to include them.\n* The *Hide* function (Chapter [21](#429700_2_En_21_Chapter.xhtml),\
    \ “Hiding Objects”) hides the entire field, including all repetitions displayed\
    \ on the layout.\n* A *Find* process will search in all repetitions, including\
    \ those not displayed on the current or any layout. It is not possible to limit\
    \ a find to just a specific repetition.\n* A *Sort* process will *only* look at\
    \ the first repetition.\n* Calculations that use a combination of repeating and\
    \ non-repeating fields may not work together without the usage of the *Extend*\
    \ function (Chapter [12](#429700_2_En_12_Chapter.xhtml), “Creating Repeating Calculation\
    \ Fields”).\n* An auto-enter calculation only works on the first repetition.\n\
    * Repeating values might not work properly in sub-summary parts of reports (Chapter\
    \ [18](#429700_2_En_18_Chapter.xhtml)) and may need to be condensed into a single\
    \ value with an aggregating function such as *List* (Chapter [13](#429700_2_En_13_Chapter.xhtml)).\n\
    \n> **Tip**  \n> Historically, repeating fields were used to achieve the function\
    \ now provided by portals (Chapter [20](#429700_2_En_20_Chapter.xhtml)). Use this\
    \ feature sparingly!\n\n### Indexing\n\nA `field index` is a hidden list of words\
    \ or values automatically generated from a non-global field’s content. This list\
    \ is used when performing searches, determining the uniqueness of a field value,\
    \ and connecting records through relationships. A field’s index serves a function\
    \ similar to a book index, quickly separating the individual terms and allowing\
    \ faster location of them without having to visually scan through every page.\
    \ FileMaker uses two kind of indexes, depending on the type of field and the option\
    \ selected. A `value index` is created from every paragraph return-delimited line\
    \ of text in a field. This is used to match related records and to search a field\
    \ for matching values. Here, it helps to think of a “value” as a paragraph. This\
    \ is used primarily for relationships, where each value is used to find a match\
    \ in a related table. A `word index` is created from each unique word in a text\
    \ field or a text calculation field. These are used for faster searching.\n\n\
    > **Caution**  \n> Indexing is required for some relational functions and improves\
    \ search performance. However, it increases the file size of a database and should\
    \ be used with conscious intent.\n\nIndexing options in the *Storage* tab of the\
    \ *Options for Field* dialog include:\n\n* **Indexing: None** – Prevents indexing\
    \ completely. Use this for fields that don’t require fast searching and won’t\
    \ be used to form relationships. Also, to cause a calculation to re-evaluate often.\n\
    * **Indexing: Minimal** – Create only a value index for the field.\n* **Indexing:\
    \ All** – Create a value index for non-text fields and both a word and value index\
    \ for text fields.\n* **Automatically Create Indexes as Needed** – Allow FileMaker\
    \ to create indexes as needed, e.g., when a user performs a search on a previously\
    \ unindexed field, this automatically switches *None* to *All* to generate and\
    \ store an index.\n* **Default Language** – Specify the language to use when indexing\
    \ and sorting values in a text field. The default value will match the operating\
    \ system of the computer upon which the file was created.\n\n> **Tip**  \n> There\
    \ may be situations where you want to customize the indexing settings to save\
    \ file size. However, the default settings allow FileMaker to adjust them based\
    \ on user and developer activity.\n\n### Container Storage Options\n\nContainer\
    \ fields can’t be indexed, so the *Storage* tab of the *Options for Field* dialog\
    \ does not have the preceding options available when editing them and instead\
    \ displays *container storage options* (Chapter [10](#429700_2_En_10_Chapter.xhtml)).\n\
    \n## Field Options: Furigana\n\nThe *Furigana* tab of the *Options for Entry*\
    \ dialog specifies a phonetic translation of Japanese text typed into the field.\
    \ For more information on Japanese functions, see Claris’ documentation website.\n\
    \n## Options for Display Fields\n\nOptions for *calculation* and *summary* fields\
    \ are different than entry fields. Clicking the *Options* button or double-clicking\
    \ will open an alternative dialog of options specifically focused for the field\
    \ type.\n\nFor a calculation field, the *Options* button opens a *Specify Calculation*\
    \ dialog where a formula can be entered and selection of the result data type,\
    \ repetitions, storage options, and an evaluation context can be configured (Chapter\
    \ [12](#429700_2_En_12_Chapter.xhtml)).\n\nFor a summary field, the *Options*\
    \ button opens an *Options for Summary Field* dialog for specifying the type of\
    \ summarization, target field, and more. The *summarization type* selected determines\
    \ what summary operation will be performed on the selected field for a group of\
    \ records in order to arrive at a value which will be placed into the field being\
    \ defined. The available summary operations that can be performed for a field\
    \ across a group of records are:\n\n* **Total of** – Calculates the total value\n\
    * **Average of** – Calculates the average value\n* **Count of** – Counts how many\
    \ records contain a value\n* **Minimum of** – Extracts the lowest available value\n\
    * **Maximum of** – Extracts the highest available value\n* **Standard Deviation\
    \ of** – Calculates the standard deviation from the mean of all the values\n*\
    \ **Fraction of Total of** – Calculates the ratio of the value to the total of\
    \ all the values in that field\n* **List of** – Creates a carriage return-delimited\
    \ list of every non-blank value"
  raw: '##### Repeating


    A *repeating field* is a field defined to store multiple values for a single record.
    Instead of creating a separate field for each additional value of a certain type,
    a single field can be defined to *repeat* any number of times, e.g., a single
    phone number field can be defined to store multiple numbers as if they were separate
    fields. Any type of field can be made to repeat. For an entry field, indicate
    a number of desired repetitions in the text area provided on the *Storage* tab
    of the *Options for Field* dialog. For a *calculation* field, enter the number
    of repetitions in the *Specify Formula* dialog (Chapter [12](#429700_2_En_12_Chapter.xhtml)).
    A *summary* field becomes repeating when the field it summarizes is repeating
    and the option to summarize repetitions individually is selected (described later
    in this chapter).


    The *Maximum number of repetitions* entered in the *Storage* tab of the *Options
    for Field* dialog defines the number of separate values the field can contain.
    To allow user entry into two or more of these repetitions, the field must be configured
    to repeat on a layout (Chapter [19](#429700_2_En_19_Chapter.xhtml), “Inspecting
    the Data Settings”). There are a few implications to consider when using repeating
    fields, including


    *   Repeating fields are never scrollable on a layout.


    *   You can add more repetitions later, but the number displayed on a layout must
    be manually adjusted to include them.


    *   The *Hide* function (Chapter [21](#429700_2_En_21_Chapter.xhtml), “Hiding
    Objects”) hides the entire field, including all repetitions displayed on the layout.


    *   A *Find* process will search in all repetitions, including those not displayed
    on the current or any layout. It is not possible to limit a find to just a specific
    repetition.


    *   A *Sort* process will *only* look at the first repetition.


    *   Calculations that use a combination of repeating and non-repeating fields
    may not work together without the usage of the *Extend* function (Chapter [12](#429700_2_En_12_Chapter.xhtml),
    “Creating Repeating Calculation Fields”).


    *   An auto-enter calculation only works on the first repetition.


    *   Repeating values might not work properly in sub-summary parts of reports (Chapter
    [18](#429700_2_En_18_Chapter.xhtml)) and may need to be condensed into a single
    value with an aggregating function such as *List* (Chapter [13](#429700_2_En_13_Chapter.xhtml)).


    Tip


    Historically, repeating fields were used to achieve the function now provided
    by portals (Chapter [20](#429700_2_En_20_Chapter.xhtml)). Use this feature sparingly!


    ##### Indexing


    A *field index* is a hidden list of words or values automatically generated from
    a non-global field’s content. This list is used when performing searches, determining
    the uniqueness of a field value, and connecting records through relationships.
    A field’s index serves a function similar to a book index, quickly separating
    the individual terms and allowing faster location of them without having to visually
    scan through every page. FileMaker uses two kind of indexes, depending on the
    type of field and the option selected. A *value index* is created from every paragraph
    return-delimited line of text in a field. This is used to match related records
    and to search a field for matching values. Here, it helps to think of a “value”
    as a paragraph. This is used primarily for relationships, where each value is
    used to find a match in a related table. A *word index* is created from each unique
    word in a text field or a text calculation field. These are used for faster searching.


    Caution


    Indexing is required for some relational functions and improves search performance.
    However, it increases the file size of a database and should be used with conscious
    intent.


    Indexing options in the *Storage* tab of the *Options for Field* dialog include


    *   *Indexing: None* – Prevents indexing completely. Use this for fields that
    don’t require fast searching and won’t be used to form relationships. Also, to
    cause a calculation to re-evaluate often.


    *   *Indexing: Minimal* – Create only a value index for the field.


    *   *Indexing: All* – Create a value index for non-text fields and both a word
    and value index for text fields.


    *   *Automatically Create Indexes as Needed* – Allow FileMaker to create indexes
    as needed, e.g., when a user performs a search on a previously unindexed field,
    this automatically switches *None* to *All* to generate and store an index.


    *   *Default Language* – Specify the language to use when indexing and sorting
    values in a text field. The default value will match the operating system of the
    computer upon which the file was created.


    Tip


    There may be situations where you want to customize the indexing settings to save
    file size. However, the default settings allow FileMaker to adjust them based
    on user and developer activity.


    ##### Container Storage Options


    Container fields can’t be indexed, so the *Storage* tab of the *Options for Field*
    dialog does not have the preceding options available when editing them and instead
    displays *container storage options* (Chapter [10](#429700_2_En_10_Chapter.xhtml)).


    #### Field Options: Furigana


    The *Furigana* tab of the *Options for Entry* dialog specifies a phonetic translation
    of Japanese text typed into the field. For more information on Japanese functions,
    see Claris’ documentation website.


    ### Options for Display Fields


    Options for *calculation* and *summary* fields are different than entry fields.
    Clicking the *Options* button or double-clicking will open an alternative dialog
    of options specifically focused for the field type.


    For a calculation field, the *Options* button opens a *Specify Calculation* dialog
    where a formula can be entered and selection of the result data type, repetitions,
    storage options, and an evaluation context can be configured (Chapter [12](#429700_2_En_12_Chapter.xhtml)).


    For a summary field, the *Options* button opens an *Options for Summary Field*
    dialog for specifying the type of summarization, target field, and more. The *summarization
    type* selected determines what summary operation will be performed on the selected
    field for a group of records in order to arrive at a value which will be placed
    into the field being defined. The available summary operations that can be performed
    for a field across a group of records are


    *   *Total of* – Calculates the total value


    *   *Average of* – Calculates the average value


    *   *Count of* – Counts how many records contain a value


    *   *Minimum of* – Extracts the lowest available value


    *   *Maximum of* – Extracts the highest available value


    *   *Standard Deviation of* – Calculates the standard deviation from the mean
    of all the values


    *   *Fraction of Total of* – Calculates the ratio of the value to the total of
    all the values in that field


    *   *List of* – Creates a carriage return-delimited list of every non-blank value'
  trans: "\n### 重复项\n\n`重复字段` 是一种定义为单个记录存储多个值的字段。无需为某种类型的每个附加值创建单独字段，而是可以定义一个字段来*重复*任意次数。例如，可以定义一个电话号码字段来存储多个号码，就像它们是独立的字段一样。任何类型的字段都可以设为重复。对于输入字段，请在“字段选项”对话框的“存储”选项卡提供的文本区域中输入所需的重复次数。对于*计算*字段，请在“指定公式”对话框中输入重复次数（第\
    \ 12 章）。当*摘要*字段所汇总的字段为重复字段，并且选择了“单独汇总重复项”选项时，该摘要字段也会变为重复字段（本章后文将介绍）。\n\n在“字段选项”对话框的“存储”选项卡中输入的*最大重复次数*定义了该字段可包含的独立值的数量。要允许用户输入到其中两个或更多重复项中，必须将该字段配置为在布局上重复（第\
    \ 19 章，“检查数据设置”）。使用重复字段时需要考虑几个影响，包括：\n\n* 重复字段在布局上永远无法滚动。\n* 稍后可以添加更多重复项，但布局上显示的数量必须手动调整以将其包含在内。\n\
    * *隐藏*功能（第 21 章，“隐藏对象”）会隐藏整个字段，包括布局上显示的所有重复项。\n* *查找*过程会搜索所有重复项，包括当前或任何布局上未显示的重复项。无法将查找限制为仅针对特定重复项。\n\
    * *排序*过程*仅*会查看第一个重复项。\n* 如果不使用*扩展*功能（第 12 章，“创建重复计算字段”），结合重复字段和非重复字段的计算可能无法正常工作。\n\
    * 自动输入计算仅在第一个重复项上有效。\n* 重复值在报表的子汇总部分（第 18 章）中可能无法正常工作，并且可能需要通过聚合函数（例如 *List*，第\
    \ 13 章）将其压缩为单个值。\n\n> **提示**  \n> 从历史上看，重复字段曾用于实现现在由门户提供的功能（第 20 章）。请谨慎使用此功能！\n\
    \n### 索引\n\n`字段索引` 是根据非全局字段的内容自动生成的隐藏单词或值列表。此列表用于执行搜索、确定字段值的唯一性以及通过关系连接记录。字段索引的功能类似于书籍索引，可以快速分离各个术语，从而无需逐页浏览即可更快地定位它们。根据字段类型和所选选项，FileMaker\
    \ 使用两种索引。`值索引` 是根据字段中每个由段落回车符分隔的文本行创建的。它用于匹配相关记录以及在字段中搜索匹配的值。此处，可以将“值”视为一个段落。这主要用于关系，其中每个值用于在相关表中查找匹配项。`单词索引`\
    \ 是根据文本字段或文本计算字段中的每个唯一单词创建的，用于加快搜索速度。\n\n> **警告**  \n> 某些关系功能需要索引，并且索引能提高搜索性能。但是，它会增加数据库的文件大小，因此应有意识地使用。\n\
    \n“字段选项”对话框的“存储”选项卡中的索引选项包括：\n\n* **索引：无** – 完全阻止索引。适用于不需要快速搜索且不会用于建立关系的字段。同时，也用于使计算频繁重新计算。\n\
    * **索引：最小** – 仅为该字段创建值索引。\n* **索引：全部** – 为非文本字段创建值索引，为文本字段创建单词索引和值索引。\n* **根据需要自动创建索引**\
    \ – 允许 FileMaker 根据需要创建索引。例如，当用户对之前未建立索引的字段执行搜索时，它会自动将*无*切换为*全部*以生成并存储索引。\n* **默认语言**\
    \ – 指定在对文本字段中的值进行索引和排序时使用的语言。默认值与创建文件所在计算机的操作系统匹配。\n\n> **提示**  \n> 在某些情况下，您可能希望自定义索引设置以节省文件大小。但是，默认设置允许\
    \ FileMaker 根据用户和开发者的活动进行调整。\n\n### 容器存储选项\n\n容器字段无法建立索引，因此在编辑时，“字段选项”对话框的“存储”选项卡中不提供上述选项，而是显示“容器存储选项”（第\
    \ 10 章）。\n\n## 字段选项：注音\n\n“输入选项”对话框的“注音”选项卡用于指定输入到字段中的日语文本的语音翻译。有关日语函数的更多信息，请参阅\
    \ Claris 的文档网站。\n\n## 显示字段的选项\n\n*计算*和*摘要*字段的选项与输入字段不同。单击*选项*按钮或双击将打开一个针对特定字段类型的备选选项对话框。\n\
    \n对于计算字段，*选项*按钮会打开“指定计算”对话框，可以在其中输入公式，并配置结果数据类型、重复项、存储选项和求值上下文（第 12 章）。\n\n对于摘要字段，*选项*按钮会打开“摘要字段选项”对话框，用于指定摘要类型、目标字段等。所选*摘要类型*决定了将对选定字段在一组记录上执行何种摘要操作，以得出放入正在定义的字段中的值。可对一组记录中的字段执行的可用摘要操作包括：\n\
    \n* **总计** – 计算总值\n* **平均值** – 计算平均值\n* **计数** – 统计包含值的记录数量\n* **最小值** – 提取可用的最小值\n\
    * **最大值** – 提取可用的最大值\n* **标准差** – 计算所有值与平均值的标准差\n* **占总和的百分比** – 计算该字段值占总值的比率\n\
    * **列表** – 创建一个所有非空值的回车分隔列表\n"
- fmt: "#### Options for Summary Field Dialog\n\nThe `Options for Summary Field` dialog\
    \ is divided into five general sections, shown in Figure [8-8](#429700_2_En_8_Chapter.xhtml#Fig8).\n\
    \n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig8_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig8_HTML.jpg)\n\
    \n**Figure 8-8** The dialog for summary options with additional controls visible\n\
    \n**Caution**\n\nThe options below provide an overview of summary settings and\
    \ may seem too abstract until one sees a complex report built with sub-summary\
    \ parts (Chapter [18](#429700_2_En_18_Chapter.xhtml), “Adding Layouts”).\n\nThe\
    \ dialog contains the following controls:\n\n1. **Summarization Type** – Specify\
    \ the type of summarization to use (listed in the previous section).\n\n2. **Available\
    \ Fields** – Choose a field from which to pull and summarize data. The list includes\
    \ eligible fields from the table of the field being defined.\n\n3. **Conditional\
    \ Options** – This area will display either *one*, *two*, or *none* of the following\
    \ options depending on which summarization type is selected: `Running total`,\
    \ `Restart summary for each sorted group`, `Weighted average`, `Running count`,\
    \ and `By population` or `Subtotaled`.\n\n4. **Summarize Repetitions** – When\
    \ a repeating field is selected, identify how repetitions will be handled. Select\
    \ `Individually` to display a separate summary for each repetition, making the\
    \ summary field repeating. Choose `All together` to add all repetitions for a\
    \ record, and treat it as a single value in the summarization process.\n\n5. **Conditional\
    \ Secondary Field Choice** – Depending on the preceding selected options, a field\
    \ selection may be required for one of these secondary functions:\n   - **When\
    \ Sorted by** – Some operations allow a field to restart the summarization when\
    \ a new sort value is detected. This creates summaries for multiple subgroups\
    \ of records within a single found set. For example, you might want to summarize\
    \ `sales per employee` or `revenue per client` using this feature. This option\
    \ is available with the `Total of` or `Count of` summary type when the `Restart\
    \ summary for each sorted group` option is selected or when the `Fraction of Total\
    \ of` summary type is used with the `Subtotaled` option selected.\n   - **Weighted\
    \ by** – When using the `Average of` summary type with the `Weighted average`\
    \ option selected, a field can be selected that will be used to weight the results.\n\
    \n## Adding Fields to the Example Database\n\nAt the end of the last chapter,\
    \ we added three tables to the `Learn FileMaker` example database: `Company`,\
    \ `Contact`, and `Project`. Now, using the lessons of this chapter, we can add\
    \ a few fields to each of these. While these are not comprehensive lists these\
    \ tables require in a real-world solution, they provide a few key fields to continue\
    \ our exploration of building databases.\n\n### Defining Company Fields\n\nIn\
    \ the `Company` table, create the following entry fields:\n\n- `Company Name (text)`\n\
    - `Company Description (text)`\n- `Company Industry (text)`\n- `Company Website\
    \ (text)`\n- `Company Status (text)`\n\n### Defining Contact Fields\n\nIn the\
    \ `Contact` table, create the following fields:\n\n- `Contact Name First (text)`\n\
    - `Contact Name Last (text)`\n- `Contact Company ID (text)`\n- `Contact Address\
    \ Street (text)`\n- `Contact Address City (text)`\n- `Contact Address State (text)`\n\
    - `Contact Address Zip (number)`\n- `Contact Address Country (text)`\n\n### Defining\
    \ Project Fields\n\nIn the `Project` table, create the following fields:\n\n-\
    \ `Project Company ID (text)`\n- `Project Contact ID (text)`\n- `Project Name\
    \ (text)`\n- `Project Description (text)`\n- `Project Budget (number)`\n- `Project\
    \ Budget Summary (summary as a Total of the Project Budget field)`\n\n### Renaming\
    \ and Modifying Default Fields\n\nTo follow along with the examples in the rest\
    \ of the book and to gain some experience modifying field definitions, perform\
    \ the following changes to the five default fields in all tables:\n\n- Rename\
    \ `PrimaryKey` to “Record ID” and change its Auto-Enter from a Calculated value\
    \ to a Serial number starting with “000001.”\n- Rename `CreationTimestamp` to\
    \ “Record Creation Timestamp.”\n- Rename `CreatedBy` to “Record Creation User.”\n\
    - Rename `ModificationTimestamp` to “Record Modification Timestamp.”\n- Rename\
    \ `ModifiedBy` to “Record Modification User.”\n\n**Tip**\n\nSave time by doing\
    \ these in one table and copy-paste them to replace default fields in other tables.\n\
    \n## Summary\n\nThis chapter explored the basics of defining fields. In the next\
    \ chapter, we turn attention to forming relational links between tables.\n\n#\
    \ 9. Forming Relationships\n\nA *relational database* allows connections to be\
    \ defined between tables to automatically connect individual records based on\
    \ field values. This chapter covers the following topics pertaining to relationships:\n\
    \n- Introducing relationships\n- Managing data sources\n- Introducing the manage\
    \ database dialog (Relationships)\n- Working with table occurrences\n- Building\
    \ relationships\n- Adding notes to the graph\n- Implementing a simple relational\
    \ model"
