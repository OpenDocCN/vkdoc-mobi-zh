- fmt: '# 15. Creating Custom Functions


    A *custom function* is a developer-defined formula that expands on the built-in
    functions within the database it is installed. Formulas can be off-loaded away
    from individual formulas and placed into a custom central library of easily accessible
    functionality. Unlike regular formulas, custom functions can be defined to accept
    parameters, can be recursive, and can be accessed directly from any formula or
    script in the database. A well-designed, open-ended, reusable custom function
    can reduce redundancies in formulas, simplify calculations, and save time. In
    this chapter, we discuss the process of creating and using custom functions, covering
    topics such as


    * Introducing the `Manage Custom Functions` dialog

    * Introducing the `Edit Custom Function` dialog

    * Adding parameters to a custom function

    * Accessing fields from custom functions

    * Building recursive custom functions


    > **Note**: Custom functions can only be created and edited with advanced tools
    enabled (Chapter [2](#429700_2_En_2_Chapter.xhtml)).


    ## Introducing the Custom Function Dialogs


    Custom functions are created and managed from the `Manage Custom Functions` dialog,
    shown in Figure [15-1](#429700_2_En_15_Chapter.xhtml#Fig1). To open it, select
    the `File ➤ Manage ➤ Custom Functions` menu. This dialog is used to *create*,
    *edit*, *duplicate*, *delete*, and *import* custom functions.


    ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig1_HTML.jpg](images/429700_2_En_15_Chapter/429700_2_En_15_Fig1_HTML.jpg)


    **Figure 15-1** — The dialog used to manage custom functions


    > **Tip**: Custom functions can be copied and pasted between two files or imported.


    To begin, click `New` to open a new function in the `Edit Custom Function` dialog,
    shown in Figure [15-2](#429700_2_En_15_Chapter.xhtml#Fig2). This dialog opens
    when creating a new function or editing an existing one. It is similar to a `Specify
    Calculation` dialog but with a few important differences.


    ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig2_HTML.jpg](images/429700_2_En_15_Chapter/429700_2_En_15_Fig2_HTML.jpg)


    **Figure 15-2** — The dialog used to define a custom function


    The `Function Name` field allows the function to be named so it can be called
    by other formulas in the same way built-in functions are called.


    Several tools are used to define optional `Function Parameters`. Parameters are
    positional input variables that are assigned a value when another formula calls
    the function. These work like parameters on built-in functions except you define
    them. Create a new parameter by entering a name and clicking the *plus* icon.
    Select and rename an existing parameter and click the *pencil* icon to save that
    change. Parameters can be deleted by clicking the *minus* icon. Once in the list,
    they can be drag-arranged to specify their order. Since parameters are positional,
    values passed when the function is called are inserted into the variable at the
    corresponding position in the list. *Changing the order of an existing function’s
    parameters will require rearranging the values in any existing call.* Once created,
    double-click a parameter in the list to insert it into the formula below.


    The function’s formula is entered into the formula text area. Unlike the `Specify
    Calculation` dialog, there is no *auto-complete suggestion interface* so everything
    must be typed manually or inserted using the buttons and lists in the top half
    of the dialog. Although functions execute in the current window’s context and
    can include field references, these must be manually entered because there is
    no selection pane for fields on this dialog. This is due to the fact that functions
    are accessible to any field, interface, or script formula and it is safer to push
    field values into the formula as a parameter to avoid making the function unnecessarily
    context sensitive.


    The top-right area contains controls for inserting operators and function calls
    into the formula. The `Availability` option at the bottom allows a choice to make
    a function accessible to only accounts with full access (Chapter [30](#429700_2_En_30_Chapter.xhtml)).


    Beyond these differences, custom functions are written just like other formulas
    and must adhere to the same 30,000-character limit.


    ## Creating a Custom Function


    To begin, create a simple custom function without parameters named `GetMonday`
    that calculates the *date* for the Monday of the current week using the following
    formula:


    ```

    Let ( [

    dateToday = Get ( CurrentDate ) ;

    numAdjustment = DayOfWeek (dateToday) – 2

    ] ;

    dateToday - numAdjustment

    )

    ```


    The formula uses a `Let` statement to put today’s date into a variable called
    `dateToday`. To determine the number of days today’s date needs to be adjusted
    to land on a Monday, it converts `dateToday` using the built-in `DayOfWeek` function.
    Then, since we know Monday is always the second day of a calendar week, we subtract
    2 from that number and put the result into a variable named `numAdjustment`. Finally,
    that adjustment number will be subtracted from today’s date to arrive at the date
    for this week’s Monday. For example, if today is a Friday, that is the *sixth*
    day of the week. Since we want to determine the corresponding Monday, which is
    the *second* day of the week, we subtract *2* from that number to arrive at the
    number of days we need to subtract from the current day in order to arrive at
    a Monday in the current week. No matter what day it is *today*, the result of
    this formula will always be the corresponding Monday’s date.


    To create this custom function, open the `Manage Custom Functions` dialog, and
    click the `New` button to open the `Edit Custom Function` dialog. Then follow
    the steps shown in Figure [15-3](#429700_2_En_15_Chapter.xhtml#Fig3), first entering
    a name of `GetMonday` and then entering the formula. Click the OK button to save
    the function and then click OK in the `Manage Custom Functions` dialog.


    ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig3_HTML.jpg](images/429700_2_En_15_Chapter/429700_2_En_15_Fig3_HTML.jpg)


    **Figure 15-3** — The steps required to create the example custom function


    Once finished, the new function can be inserted into any formula using the same
    process used to insert a built-in function. Test this in the `Sandbox` table by
    following these steps:


    1. Open the `Fields` tab for the `Sandbox` table in the `Manage Database` dialog.

    2. Double-click the `Example Calculation` field or select it and click the `Options`
    button.

    3. Change the field’s formula to `GetMonday`.

    4. Change the calculation result type to *date*.

    5. Click OK to save the calculation formula and close the `Specify Calculation`
    dialog.

    6. Click OK to save and close the `Manage Database` dialog.


    Now view the result on the `Sandbox Form` layout for any record. If the calculation
    containing this function call were evaluated on January 7, 2021, a Thursday, the
    result should be the preceding Monday: January 4, 2021.'
