- fmt: '### Changing Data Types


    There are several functions used to convert values into a different data type:
    `Boolean`, `date`, `number`, `text`, `time`, and `timestamp`. Each accepts a single
    value of any data which it attempts to convert into the desired type indicated
    by the function name.


    #### `GetAsBoolean`


    The `GetAsBoolean` function will convert any value into a `Boolean`. The result
    will be `1` (true) when the data provided converts to a non-zero result or a container
    field contains a value. Otherwise, the result will be `0` (false).


    ```

    GetAsBoolean ( "Hello, World" )        // result = 0

    GetAsBoolean ( "Hello" = "World" )     // result = 0

    GetAsBoolean ( "100" )                 // result = 1

    ```


    #### `GetAsDate`


    The `GetAsDate` function will convert a value into a formal date object. The data
    provided can contain leading zeros or not, as shown in these examples:


    ```

    GetAsDate ( "1/5/2021" )         // result = 1/5/2021

    GetAsDate ( "01/05/2021" )       // result = 1/5/2021

    ```


    Text-based dates that include a two-digit year will be automatically converted
    with the assumption that the date falls within the next 30 years or the preceding
    70 years from the current date (Chapter [8](#429700_2_En_8_Chapter.xhtml), “Two-Digit
    Date Conversion”). Dates intended to fall outside of that range will get incorrect
    results if you don''t use four-digit years. These examples assume a current date
    of January 5, 2021:


    ```

    GetAsDate ( "1/5/17" )           // result = 1/5/2017

    GetAsDate ( "1/5/95" )           // result = 1/5/1995

    GetAsDate ( "1/5/50" )           // result = 1/5/1950

    ```


    When a number is provided, it will be used to calculate the number of days that
    have passed since January 1, 0001. For example:


    ```

    GetAsDate ( 737805 )             // result = 1/15/2021

    ```


    #### `GetAsNumber`


    The `GetAsNumber` function will convert a value into a number. This can be useful
    to ensure proper results when a value is compared to or sorted with other numbers.
    When providing numbers as text, they are converted back into numbers. For example:


    ```

    GetAsNumber ( "1234" )          // result = 1234

    GetAsNumber ( "015" )           // result = 15

    GetAsNumber ( "13.75" )         // result = 13.75

    ```


    When converting text, any non-numeric characters will be automatically ignored.


    ```

    GetAsNumber ( "$25.09" )                // result = 25.09

    GetAsNumber ( "He ran 9.75 miles." )    // result = 9.75

    ```


    In some cases, relying on automatic filtering of non-numeric characters might
    not provide in a desirable result.


    ```

    GetAsNumber ( "3 men ran 9.75 miles." ) // result = 39.75

    ```


    These examples assume a value of “03” is contained in a `Qty` text field and show
    the importance of converting text into a number prior to comparing it to other
    numeric values. Because of the leading zero on the text-based number in the field,
    the two values don''t appear to be the same (in the first example) until the text
    is converted to a number (in the second example).


    ```

    3 = Qty                          // result = 0

    3 = GetAsNumber ( Qty )          // result = 1

    ```


    Similarly, comparisons will fail when a value isn’t numeric. The following examples
    assume a value of “20” is contained in a `Qty` text field. Since it is a text
    value, `20` will appear as a smaller value than `3` because the text is compared
    character by character rather than the entire value compared as a number. Once
    converted to a number, as shown in the second example, it evaluates correctly.


    ```

    3 > Qty                          // result = 1

    3 > GetAsNumber ( Qty )          // result = 0

    ```


    #### `GetAsText`


    The `GetAsText` function converts any value to a text string.


    ```

    GetAsText ( 58.75 )                     // result = "58.75"

    GetAsText ( 05:15:00 )                  // result = "5:15:00"

    GetAsText ( 6/30/2016 5:20:49 PM )      // result = "6/30/2016 5:20:49 PM"

    ```


    The function will even convert a container content into one of two values depending
    on how the file is stored (Chapter [10](#429700_2_En_10_Chapter.xhtml), “Explaining
    Container Storage Options”). When stored internally, the name of the file will
    be returned. When a file is stored as a reference, the result will be a metadata
    string that varies by file type but includes the file’s name and path.


    ```

    GetAsText ( Contact::Image )

    // result = Mark Munro.jpg

    GetAsText ( Contact::Image )

    // result =

    size:191,175

    image:Mark Munro.jpg

    imagemac:/Macintosh HD/Users/admin/Desktop/Mark Munro.jpg

    ```


    #### `GetAsTime`


    The `GetAsTime` function converts a text-based time or timestamp value into a
    time object to ensure proper results when compared to or sorted with other times.
    Non-time values will result in an error.


    ```

    GetAsTime ( "5:15:00" )         // result = 5:15:00

    GetAsTime ( "Hello, World" )    // result = ?

    ```


    #### `GetAsTimestamp`


    The `GetAsTimestamp` function converts a text-based value into a timestamp object
    to ensure proper results when compared to or sorted with other times. When the
    text provided does not contain information for a full timestamp, the function
    will fill in the missing information. For example, when a date is provided without
    time information, the function returns a timestamp for midnight on the specified
    date. When a number is provided, the function returns timestamp for that number
    of seconds since the first of January in the year 0001.


    ```

    GetAsTimestamp ( "1/5/2017 5:15:00" )     // result = 1/5/2017 5:15:00

    GetAsTimestamp ( "1/1/2017" )             // result = 1/1/2017 12:00 AM

    GetAsTimestamp ( 100000 )                 // result = 1/2/0001 3:46:40 AM

    ```


    ### Converting Text Encoding


    There are three functions that are useful when preparing text for web-related
    uses or other uses.


    #### Encoding Text for URLs


    The `GetAsURLEncoded` function encodes text for use in a Uniform Resource Locator
    (URL). Any style information is removed from the text, and all characters are
    converted to UTF-8 format. Any non-letter or digit characters that are in the
    upper ASCII range are percent encoded, meaning they are converted to a percent
    symbol followed by the hexadecimal value of the character, e.g., spaces are converted
    to “%20”. The function accepts a single text parameter.


    ```

    GetAsURLEncoded ( "Hello World" )        // result = "Hello%20World"

    GetAsURLEncoded ( "10% Surcharge" )      // result = "10%25%20Surcharge"

    ```


    #### Converting to CSS


    The `GetAsCSS` function converts formatted text into the Cascading Style Sheet
    (CSS) format, preserving the font, font size, font color, and font style attributes
    in a markup format. The style information must be applied directly to the actual
    text content as this function doesn’t look at layout settings applied to change
    how a field displays text. The following example assumes a record in a `Contact`
    table with a field named `Contact Notes` that contains the word “Hello” where
    the font is “Arial,” the font size is 18, the font style is bold, and the font
    color is red.


    ```

    GetAsCSS ( Contact::Contact Notes )

    // result = Hello

    ```


    #### Converting Text to SVG


    The `GetAsSVG` function converts text to the Scalable Vector Graphics (SVG) format,
    which supports more text formats than HTML and may represent text more accurately
    in certain cases. This example assumes a record in a `Contact` table with a field
    named `Contact Notes` that contains the same styled text from the previous example.


    ```

    GetAsSVG ( Contact::Contact Notes )

    // result =


    "font-family: ''Arial'';font-size: 18px;color: #FF2712;font-weight: bold;",begin:
    1, end: 4


    Hello

    ```


    ### Modifying Text


    There are many functions available for performing text modifications, including
    changing case, filtering, and substituting characters.'
