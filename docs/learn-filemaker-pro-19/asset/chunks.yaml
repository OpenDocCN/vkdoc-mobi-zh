    4.  选择`Learn FileMaker`菜单集并点击`Edit`。

    5.  在`Edit Custom Menu Set`对话框中，点击`Add`。

    6.  在打开的`Select Menu`对话框中，滚动到底部，选择`Actions`菜单，然后点击`Select`按钮。

    7.  在`Edit Custom Menu Set`对话框中，将`Actions`菜单拖拽到菜单列表中的所需位置。

    8.  点击`OK`关闭`Edit Custom Menu Set`对话框，然后点击`OK`关闭`Manage Custom Menus`对话框。如果自定义菜单集处于活动状态，菜单栏应显示一个新的`Actions`菜单，如图
    23-15 所示。


    ### 向 Actions 菜单添加项目


    将新的`Actions`菜单添加到菜单集后，根据需要添加菜单项。


    #### 添加命令菜单项


    要添加命令项，返回`Manage Custom Menus`对话框的`Custom Menus`选项卡，打开自定义`Actions`菜单。然后点击`Create`按钮添加新的菜单项。从一个简单示例开始，创建一个显示对话框的“About
    This Menu”项，步骤如下：


    1.  启用`Item Name`复选框，并在相邻的文本区域中输入名称“About This Menu”。

    2.  启用`Action`复选框。

    3.  在`Specify Script Step`对话框中，选择`Show Custom Dialog`步骤（第 25 章），并将其配置为显示描述菜单用途和功能的消息。

    4.  点击`OK`保存并返回所有对话框。


    现在`Actions`菜单应有一个菜单项，显示描述其功能的对话框，如图 23-16 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig16_HTML.jpg](img/429700_2_En_23_Fig16_HTML.jpg)


    **图 23-16** 自定义菜单项及生成的对话框


    #### 添加子菜单项


    当菜单变得过于拥挤时，可以组织项目分组。使用分隔符可以帮助将一长串项目划分为不同的组。对于更复杂的情况，使用子菜单将项目组织成子类别，使用户更容易找到特定功能。例如，`Searches`子菜单可以列出所有可用的搜索功能，而`Reports`子菜单可以列出所有报表，将这两组项目从`Actions`菜单的主列表中移出。


    提示


    考虑使用“七法则”来决定何时使用分隔符或子菜单对菜单项进行分组。当一组项目接近或超过七个时，考虑将它们与其他组分开。


    首先，创建一个包含一些项目的新自定义菜单。该菜单不会直接作为菜单添加到菜单集中，而是作为子菜单附加到另一个菜单的某个项目上。例如，创建一个名为`Reports
    Submenu`的新自定义菜单，并为每个你计划创建的报表脚本添加一个菜单项占位符，例如：`Revenue This Year to Date`、`Revenue
    This Year`和`Revenue Last Year`。目前，这些不会真正运行脚本，仅用于说明子菜单的设置。创建完成后，返回编辑`Actions`菜单，创建一个名为“Reports”的新项目，并将其配置为指向`Reports
    Submenu`的子菜单，如图 23-17 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig17_HTML.png](img/429700_2_En_23_Fig17_HTML.png)


    **图 23-17** 附加到`Actions`菜单中项目的子菜单示例


    保存并退出所有对话框后，`Actions`菜单现在应显示一个`Reports`子菜单，如图 23-18 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig18_HTML.jpg](img/429700_2_En_23_Fig18_HTML.jpg)


    **图 23-18** 子菜单对用户显示的示例

