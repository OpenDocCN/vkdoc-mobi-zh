  trans: '

    #### 在重复计算中使用重复字段


    当公式中使用的所有字段与计算字段配置了相同数量的重复次数时，重复计算将按预期工作。图 12-9 所示的示例展示了两个包含数字的输入字段，这些数字相加后进入计算字段的总和。每个字段都定义为
    *三个重复项*。在该示例中，计算字段的公式被定义为将这些数字相加。该公式会自动应用于两个输入字段的每组重复项，并将每个结果值放入计算字段的对应重复项中。


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig9_HTML.jpg](img/429700_2_En_12_Fig9_HTML.jpg)


    图 12-9：所有字段具有相同重复次数的计算示意图


    ```

    重复数字 1 + 重复数字 2

    ```


    #### 在重复计算中使用非重复字段


    当在重复计算字段的公式中使用*非重复字段*时，请使用 `Extend` 函数来*虚拟扩展*非重复字段，使其匹配重复次数。图 12-10 所示的示例展示了一个单重复输入字段、另一个具有三个重复的输入字段以及一个具有三个重复的计算字段。


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig10_HTML.jpg](img/429700_2_En_12_Fig10_HTML.jpg)


    图 12-10：重复字段与非重复字段混合的示意图


    为了使公式能够成功地将非重复字段中的值应用于重复字段中的每个值并生成三个结果，公式必须按如下例所示扩展非重复字段。该单一值将被视为三个独立的重复项，每个重复项都填充相同的值。


    ```

    扩展 ( 非重复数字 ) + 重复数字 1

    ```


    #### 其他重复函数


    还有其他内置函数在*重复*和*非重复*计算中都很有用。`Get ( ActiveRepetitionNumber )` 函数返回一个数字，指示当前字段的哪个重复项拥有光标焦点。这可用于与界面相关的计算和脚本步骤，以确定光标在重复字段中的位置。`GetRepetition`
    函数可用于从指定重复字段的特定重复项中提取值。`Get ( CalculationRepetitionNumber )` 函数返回一个数字，指示当前正在计算的重复计算字段的哪个重复项。这使得计算字段公式能够在每个重复项需要执行略有不同功能时，知道当前正在评估其自身字段结构中的哪个重复项。


    ### 为视觉格式留出空间


    在编译公式时，FileMaker 会忽略引用文本之外的任何多余空格、制表符和段落回车符。这意味着您可以在公式中添加空白来展开代码，使其更易于阅读。在编写公式时，考虑制定一个策略，始终在项目之间添加空格，将复杂的语句扩展到更易于阅读的格式。


    #### 在项目之间添加空格


    可以在公式组件之间添加空格，以水平展开文本，使其更易于阅读。下面的代码配对显示了一个没有空格的紧凑示例，以及同一行添加空格后的效果。在每组中，两者功能完全相同。


    ```

    (150+50)/25

    ( 150 + 50 ) / 25

    $FirstName&$Space&$LastName

    $FirstName & $Space & $LastName

    Get(CurrentDate)

    Get ( CurrentDate )

    ```


    #### 展开复杂语句


    涉及复杂 `Case`、`Let`、`Substitute`、`While` 和某些 `JSON` 函数（第 13 章和第 14 章）的公式可以从空格、制表符和回车符中受益。虽然确切的格式可能因语句的复杂性和嵌套子句的使用而异，但以下简单示例展示了作者偏爱的几种格式模式，用于分隔和缩进复杂语句以增强其视觉格式：


    ```

    // CASE 示例

    Case (

    条件 1 = 结果 1 ;

    条件 2 = 结果 2

    )

    // LET 示例

    Let ( [

    变量 1 = 表达式 1 ;

    变量 2 = 表达式 2

    ] ;

    计算

    )

    // SUBSTITUTE 示例

    Substitute (

    文本 ;

    [ 搜索字符串 1 ; 替换字符串 1 ] ;

    [ 搜索字符串 2 ; 替换字符串 2 ]

    )

    ```


    #### 管理字符限制


    FileMaker 将每个公式的总文本限制为 30,000 个字符。在编写冗长公式时，人们自然倾向于*避免*添加空格、制表符和段落回车符以节省空间并避免达到该限制。但是，有一些技术可以在*不*要求代码变得紧凑且难以阅读的情况下管理空间。首先，评估公式如此长的原因。除了一些例外情况，冗长的公式通常包含冗余的元素和短语。一个重复使用的长字段引用可以通过
    `Let` 语句（第 13 章）压缩成一个更短的语句变量。例如，字段引用 `Contact::Contact Name First` 可以被放入一个名为 “nameFirst”
    之类的变量中并重复使用，后续每次实例占用的空间大大减少。此外，在不失清晰度的前提下重命名变量以缩短其长度可以节省空间。公式的某些部分可以卸载到自定义函数中（第
    25 章），尤其是当该功能是通用的并且在数据库的其他地方使用。另一个选择是将复杂的计算分解为单独的字段或脚本步骤，而不是试图将庞大的过程强行塞入一个公式中。


    **提示** 养成高效编码的习惯，无论公式长度如何，都要密切关注清晰度并采用高效的技术设计。


    ### 向示例文件添加简单计算


    为了实验公式，可以在 *Learn FileMaker* 数据库的表中添加几个简单的计算。


    #### 公司联系人计数


    在 *Company* 表中，按照以下步骤添加一个名为 “Company Contact Count” 的新计算字段，该字段的公式用于计算相关的联系人记录：


    1. 打开 *管理数据库* 对话框，为 *Company* 表选择 *字段* 选项卡。

    2. 创建新的计算字段。

    3. 从字段选择面板的弹出菜单中选择 *Company | Contact* 表出现项。

    4. 在公式区域，开始输入“Count”并从自动完成列表中选择 `Count` 函数。

    5. 双击 *Company | Contact* 表出现项中的 *Record ID* 字段。公式应显示为：`Count ( Company | Contact::Record
    ID )`

    6. 确保结果类型为 *数字*。

    7. 点击保存并关闭对话框。

    8. 将此新字段放置在 *Company* 布局上，以确认它能准确统计每个公司的相关联系人数量。请记住，根据公司对联系人的分配情况，不同记录中的计数会有所不同。

    '
- fmt: "### Contact Full Name and Address Label\n\n在`Contact`表中，添加一个名为`Contact Name\
    \ Full`的新计算字段，并定义公式来拼接名字和姓氏。此字段可在布局和计算中使用，无需反复单独引用这两个字段。\n\n```\nContact Name\
    \ First & \" \" & Contact Name Last\n```\n\n接着，添加另一个名为`Contact Address Label`的字段，定义公式将地址格式化为单个文本值。公式如下：\n\
    \n```\nContact::Contact Name Full & \"¶\" &\nContact::Contact Address Street &\
    \ \"¶\" &\nContact::Contact Address City & \", \" &\nContact::Contact Address\
    \ State & \" \" &\nContact::Contact Address Zip\n// 结果 = Karen Smith\n// 521 Loft\
    \ Street\n// Sleepytown, CA 55555\n```\n\n> **提示**  \n> 使用`Case`或`List`函数（见第[13](#429700_2_En_13_Chapter.xhtml)章）来构建标签，避免因空字段中缺失信息而导致多余空格。\n\
    \n## 总结\n\n本章介绍了编写公式的基础知识。在下一章中，我们将看到许多使用各种实用内置函数的实际公式示例。\n\n# 13. 探索内置函数\n\n\
    FileMaker 包含一个包含超过300个内置函数的库，这些函数可在公式中使用以执行常见功能。本章将探讨许多重要的内置函数，涵盖以下主题：\n\n- 处理数字、日期和时间\n\
    - 处理文本\n- 处理值列表\n- 介绍`Get`函数\n- 访问字段\n- 聚合数据\n- 使用语句函数\n\n> **注意**  \n> 尽管大多数示例使用字面值作为参数，但请记住，这些参数可以是变量、字段引用、嵌套表达式，甚至是对其他函数的嵌套调用。\n\
    \n## 处理数字、日期和时间\n\n有许多函数可用于获取、生成、解析和操作数字、日期和时间。\n\n### 使用数字函数\n\n除了基本的数学运算外，还有许多内置函数提供更高级的数字功能：`Int`、`Random`、`Round`、`Mod`、`SetPrecision`和`Truncate`。\n\
    \n#### `Int`\n\n`Int`函数通过丢弃小数点右侧的任意位数（不进行四舍五入）来返回数字的整数部分。\n\n```\nInt ( 34.2653\
    \ )  // 结果 = 34\nInt ( -2.85 )    // 结果 = -2\nInt ( 10 / 3 )   // 结果 = 3\n```\n\
    \n#### `Random`\n\n`Random`函数生成一个介于0和0.99999999999999999999之间的伪随机数。结果可以乘以任意整数以生成介于0和该整数之间的随机数。\n\
    \n```\nRandom                  // 结果 = .69521348632189605699\nRandom         \
    \         // 结果 = .49928041600104466902\nRandom                  // 结果 = .16828354164749970145\n\
    Int ( 10 * Random )     // 结果 = 8\nInt ( 10 * Random )     // 结果 = 3\nInt ( 25\
    \ * Random )     // 结果 = 4\nInt ( 25 * Random )     // 结果 = 16\n```\n\n#### `Round`\n\
    \n`Round`函数将数字四舍五入到指定的小数位数。它接受`number`和`precision`参数，其中`precision`是结果中应包含的小数位数。\n\
    \n```\nRound ( 10.1564 ; 2 )   // 结果 = 10.16\nRound ( 10 / 3 ; 0 )    // 结果 =\
    \ 3\n```\n\n#### `Mod`\n\n`Mod`函数计算数字除以除数后的余数。它接受`number`和`divisor`作为参数。这可用于转换度量单位，例如将秒转换为分钟、分钟转换为小时或天数转换为年数。\n\
    \n```\nMod ( 100 ; 60 )        // 结果 = 40\nMod ( 410 ; 365 )       // 结果 = 45\n\
    Int ( 310 / 60 ) & \" hours, \" & Mod ( 310 ; 60 ) & \" minutes\"\n// 结果 = 5 hours,\
    \ 10 minutes\n```\n\n#### `SetPrecision`\n\n`SetPrecision`函数以指定精度计算数学表达式。这不是四舍五入或截断函数，而是一种扩展小数精度的方法，超出FileMaker默认的16位精度。它接受`expression`和`precision`作为参数，其中`precision`是16到400之间的数字，表示所需的精度。提供小于16的精度值将返回默认的16位精度。\n\
    \n```\n22 / 7                          // 结果 = 3.1428571428571429\nSetPrecision\
    \ ( 22 / 7 ; 20 )    // 结果 = 3.14285714285714285714\nSetPrecision ( 22 / 7 ; 30\
    \ )    // 结果 = 3.142857142857142857142857142857\n```\n\n#### `Truncate`\n\n`Truncate`函数将数字截断到指定的小数精度，不进行四舍五入。它接受`number`和`precision`作为参数。\n\
    \n```\nTruncate ( 10.246913 ; 2 )      // 结果 = 10.24\nTruncate ( 22 / 7 ; 4 )\
    \         // 结果 = 3.1428\n```\n\n### 处理日期和时间\n\n内置函数允许获取、创建、解析和计算日期和时间相关信息。\n\n\
    #### 获取当前信息\n\n有几个`Get`函数返回当前日期、时间或时间戳。\n\n```\nGet ( CurrentDate )          \
    \    // 结果 = 1/15/2021\nGet ( CurrentTime )              // 结果 = 2:05:10 PM\n\
    Get ( CurrentTimestamp )         // 结果 = 1/15/2017 2:05:10 PM\n```\n\n##### 获取协调世界时\
    \ (UTC)\n\n此函数返回当前协调世界时（UTC），精确到毫秒，不考虑当前时区。UTC以前称为格林威治标准时间（GMT），是用于调节时钟的主要时间标准。结果表示运行脚本的计算机的当前时间，格式为自“1/1/0001\
    \ 12:00 AM”以来的毫秒数，不考虑用户的当前时区。\n\n```\nGet ( CurrentTimeUTCMilliseconds )     \
    \   // 结果 = 63603934624024\n```\n\n要计算特定时区的时间，需考虑该区域的UTC时区调整。例如，当纽约市比UTC晚4小时时，以下公式将返回调整后的时间：\n\
    \n```\nGetAsTimestamp (\nRound ( ( Get ( CurrentTimeUTCMilliseconds )  + ( -4\
    \ * 3600000 ) ) / 1000 ; 0 )\n)\n```\n\n> **警告**  \n> 协调世界时不考虑夏令时，因此上述示例在一年中的半年中会有一个小时的偏差，除非您的公式对该变化进行调整。\n\
    \n#### 创建日期\n\n`Date`函数接受数值型的`month`、`day`和`year`参数，并返回一个日期对象。以下示例演示如何创建日期对象。第一个示例提供了用于构造日期的三个值。第二个示例显示，任何参数都可以是表达式，这些表达式将在构造日期之前被计算。第三个示例显示，如果提供的月份或日期超出范围，函数将自动偏移到新的月份、日期或年份。例如，月份值为13会导致函数自动返回下一年的1月日期。\n\
    \n```\nDate ( 1 ; 15 ; 2021 )          // 结果 = 1/15/2021\nDate ( 1 ; 15 ; 2021\
    \ + 10 )     // 结果 = 1/15/2031\nDate ( 13 ; 15 ; 2021 )         // 结果 = 1/15/2022\n\
    ```\n\n自动日期偏移可用于动态计算任何月份的最后一天，无论该月有多少天。构造下个月的日期，但将日期设置为-1。结果将是指定月份第一天前一天，即上个月的最后一天。\n\
    \n```\nDate ( 4 ; -1 ; 2021 )          // 结果 = 3/30/2021\nDate ( 7 ; -1 ; 2021\
    \ )          // 结果 = 6/29/2021\n```"
  raw: '### Contact Full Name and Address Label


    In the *Contact* table , add a new calculation field named “Contact Name Full”
    and define the formula to concatenate the first and last names. This can be used
    on layouts and in calculations instead of constantly using the two fields in formulas
    separately.


    ```

    Contact Name First & " " & Contact Name Last

    ```


    Then, add another field named “Contact Address Label” and define the formula to
    contain the address formatted as a single text value. The formula will look like
    this:


    ```

    Contact::Contact Name Full & "¶" &

    Contact::Contact Address Street & "¶" &

    Contact::Contact Address City & ", " &

    Contact::Contact Address State & " " &

    Contact::Contact Address Zip

    // Result =

    Karen Smith

    521 Loft Street

    Sleepytown, CA 55555

    ```


    Tip


    Use the *Case* or *List* functions (Chapter [13](#429700_2_En_13_Chapter.xhtml))
    to build a label without extra space caused by missing information in empty fields.


    ## Summary


    This chapter introduced the basics of writing formulas. In the next chapter, we
    will see many practical examples of formulas using a variety of useful built-in
    functions.


    # 13. Exploring Built-in Functions


    FileMaker includes a library of over 300 *built-in functions* that can be used
    in formulas to perform common functionality. This chapter explores many essential
    built-in functions, covering the following topics:


    *   Working with numbers, dates, and times


    *   Working with text


    *   Working with value lists


    *   Introducing Get functions


    *   Accessing fields


    *   Aggregating data


    *   Using statement functions


    Note


    Although most examples show literal values used as parameters, remember these
    can be variables, field references, nested expressions, and even nested calls
    to other functions.


    ## Working with Numbers, Dates, and Times


    There are numerous functions available for getting, generating, parsing, and manipulating
    numbers, dates, and times.


    ### Using Number Functions


    Beyond the obvious basic mathematical operations available, there are many built-in
    functions that provide more advanced numeric functionality: *Int*, *Random*, *Round*,
    *Mod*, *Set Precision,* and *Truncate*.


    #### Int


    The *Int* function returns the integer part of a number by dropping any digits
    to the right of the decimal without rounding.


    ```

    Int ( 34.2653 )  // result = 34

    Int ( -2.85 )    // result = -2

    Int ( 10 / 3 )   // result = 3

    ```


    #### Random


    The *Random* function generates a pseudo-random number between 0 and .99999999999999999999\.
    The result can be multiplied by any integer to generate a random number between
    0 and that number.


    ```

    Random                  // result = .69521348632189605699

    Random                  // result = .49928041600104466902

    Random                  // result = .16828354164749970145

    Int ( 10 * Random )     // result = 8

    Int ( 10 * Random )     // result = 3

    Int ( 25 * Random )     // result = 4

    Int ( 25 * Random )     // result = 16

    ```


    #### Round


    The *Round* function rounds a number to a chosen number of decimal places. It
    accepts a *number* and *precision* parameter, with the latter being the number
    of decimal places that should be included in the result generated from the former.


    ```

    Round ( 10.1564 ; 2 )   // result = 10.16

    Round ( 10 / 3 ; 0 )    // result = 3

    ```


    #### Mod


    The *Mod* function calculates a remainder from the result of a number being divided
    by a divisor. It accepts a *number* and *divisor* as parameters. This is can be
    used to convert units of measure, such as seconds to minutes, minutes to hours,
    or days to years.


    ```

    Mod ( 100 ; 60 )        // result = 40

    Mod ( 410 ; 365 )       // result = 45

    Int ( 310 / 60 ) & " hours, " & Mod ( 310 ; 60 ) & " minutes"

    // result = 5 hours, 10 minutes

    ```


    #### SetPrecision


    The *SetPrecision* function evaluates a math expression with a specified precision.
    This is not a rounding or truncating function but a way of expanding the decimal
    precision beyond the default of up to 16 digits returned by FileMaker. It accepts
    an *expression* and *precision* as parameters, with the latter being a number
    between 16 and 400 indicating the desired precision. Providing a precision value
    less than 16 will return the default of up to 16 digits.


    ```

    22 / 7                          // result = 3.1428571428571429

    SetPrecision ( 22 / 7 ; 20 )    // result = 3.14285714285714285714

    SetPrecision ( 22 / 7 ; 30 )    // result = 3.142857142857142857142857142857

    ```


    #### Truncate


    The *Truncate* function shortens a number to a specified decimal precision without
    rounding. It accepts a *number* and *precision* as parameters.


    ```

    Truncate ( 10.246913 ; 2 )      // result = 10.24

    Truncate ( 22 / 7 ; 4 )         // result = 3.1428

    ```


    ### Working with Dates and Times


    Built-in functions allow *getting, creating*, *parsing*, and *calculating* date-
    and time-related information.


    #### Getting Current Information


    There are several *Get* functions that return the current date, time, or timestamp.


    ```

    Get ( CurrentDate )              // result = 1/15/2021

    Get ( CurrentTime )              // result = 2:05:10 PM

    Get ( CurrentTimestamp )         // result = 1/15/2017 2:05:10 PM

    ```


    ##### Getting Coordinated Universal Time (UTC)


    This function returns the current time in *Coordinated Universal Time* (UTC) to
    the nearest millisecond without regard to the current time zone. UTC was previously
    known as *Greenwich Mean Time* (GMT) and is the primary time standard used to
    regulate clocks. The result represents the current time of the computer running
    the script in the form of the number of milliseconds since “1/1/0001 12:00 AM,”
    without regard to the user’s current time zone.


    ```

    Get ( CurrentTimeUTCMilliseconds )        // result = 63603934624024

    ```


    To calculate the time for a specific time zone, factor in the UTC time zone adjustment
    for the region. For example, when New York City is 4 hours behind UTC, this formula
    will return the time adjusted for that region:


    ```

    GetAsTimestamp (

    Round ( ( Get ( CurrentTimeUTCMilliseconds )  + ( -4 * 3600000 ) ) / 1000 ; 0
    )

    )

    ```


    Caution


    Universal Time is not adjusted for daylight savings, so the preceding example
    will be off by an hour half of the year unless your formula adjusts for that change.


    #### Creating Dates


    The *Date* function accepts a numeric *month*, *day*, and *year* parameters and
    returns a date object. The following examples demonstrate how a date object is
    created. The first provides three values used to construct the date. The second
    shows that any of the parameters can be expressions which will be evaluated prior
    to the construction of the date. The third example shows how the function will
    automatically shift to a new month, day, or year if the month or day provided
    falls out of range. For example, a month value of 13 causes the function to automatically
    return a date for January of the next year.


    ```

    Date ( 1 ; 15 ; 2021 )          // result = 1/15/2021

    Date ( 1 ; 15 ; 2021 + 10 )     // result = 1/15/2031

    Date ( 13 ; 15 ; 2021 )         // result = 1/15/2022

    ```


    The automatic date shift can be used to dynamically calculate the last day of
    any month regardless of the number of days in that month. Build a date for the
    following month with a negative one for the day. The result will be one day before
    the first of the month specified, i.e., the last day of the previous month.


    ```

    Date ( 4 ; -1 ; 2021 )          // result = 3/30/2021

    Date ( 7 ; -1 ; 2021 )          // result = 6/29/2021

    ```'
