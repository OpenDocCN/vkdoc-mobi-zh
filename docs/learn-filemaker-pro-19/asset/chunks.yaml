- fmt: '# Deploying to an iOS Device


    A database can be deployed directly onto an iPhone or iPad, accessed with the
    free `FileMaker Go` iOS application. Since the file is physically stored on the
    device, this provides the benefit of portability. The user can access the database
    anywhere they have their device, even when not connected to a cellular or Wi-Fi
    network. A deployment to an iOS device is limited to data entry related tasks
    only, with no option to structurally alter the file. Also, there is no option
    to share a database from the device for simultaneous workgroup access, so each
    device has an isolated copy of the file. However, this option is perfect for convenient
    single-user access to a database designed for smaller screens.


    To install, start by downloading the `Claris FileMaker Go 19` app onto the device.
    Then, connect the device to a computer and copy the database from a folder into
    the `FileMaker Go 19` folder in the device’s `Files`. On macOS Catalina (10.15),
    this is done by following these steps, as shown in Figure [29-1](#429700_2_En_29_Chapter.xhtml#Fig1):


    1. Open a new Finder window and make the sidebar visible.

    2. Select the target iOS device under the `Locations` sidebar group.

    3. Select the `Files` tab. Then drag the database file into the `FileMaker Go
    19` folder.


    > **Note**

    > Four Claris sample files will be automatically installed and appear in the folder
    with your file. These can be deleted if desired.


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig1_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig1_HTML.jpg)


    **Figure 29-1** The macOS Catalina (10.15) window for configuring an iPhone


    Once the database is installed on the device, launch the `FileMaker Go` app. Click
    the `My Apps` tab at the bottom, and then click `On My iPhone` under the `Locations`
    headings, as shown in Figure [29-2](#429700_2_En_29_Chapter.xhtml#Fig2). The next
    screen will display a list of databases installed on the device. Click to open
    the desired database.


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig2_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig2_HTML.jpg)


    **Figure 29-2** The `FileMaker Go` app’s access to databases installed on an iPhone


    # Sharing Databases on a Network


    Sharing a database on a network is *not* the same as sharing a document file in
    a shared server folder. As mentioned previously, a database file *can* be placed
    in a shared directory on a file server where multiple people can see and access
    it. However, if multiple users open the file at the same time, each copy of `FileMaker`
    will begin reading and writing to the file continuously as data entry tasks are
    performed. *This will result in file corruption and data loss!* If this happens,
    the file must be run through the Recovery process and may be damaged beyond repair
    (Chapter [6](#429700_2_En_6_Chapter.xhtml), “Avoiding File Damage”).


    The proper method of sharing a database across a network is *through* a share-enabled
    version of `FileMaker` software acting as a host service. This can be done using
    *peer-to-peer sharing* with the `FileMaker Pro` desktop app or using a dedicated
    server running `FileMaker Server` or `FileMaker Cloud`. The databases are stored
    in a folder hidden safely behind the host software which manages connections and
    coordinates conflict-free read/write processes, as illustrated in Figure [29-3](#429700_2_En_29_Chapter.xhtml#Fig3).


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig3_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig3_HTML.jpg)


    **Figure 29-3** A database with client access managed by host software


    Once the host is actively serving up a database, users can access it through their
    client software. In the `FileMaker Pro` desktop application, select the `File
    ➤ Hosts ➤ Show Hosts` menu, or click `Hosts` in an `Open File` dialog to see a
    dialog listing favorite and local hosts. The `Hosts` tab in the `FileMaker Go`
    iOS app lists the same. When databases are configured for `WebDirect`, users can
    also access the database from the hose through a URL in a web browser, e.g., `http://127.0.0.1/fmi/webd`.
    When hosting with `FileMaker Server` or `FileMaker Cloud`, it is also possible
    to enable incoming connections using `ODBC`/`JDBC` and *Representational State
    Transfer* (REST) with the `FileMaker API`. For more on those methods of connection,
    visit Claris’ documentation website.


    ## Understanding Collaborative Limitations


    There are several limitations automatically enforced to avoid conflicts between
    multiple users when working in the same hosted file. The sections are each limited
    to a *single user* at a time. The first three can be undertaken at the same time
    if the users are each modifying a *different* record, layout, or script. The remaining
    development actions are limited to a single user at a time within the respective
    developer dialog, i.e., one user can edit value lists at the same time another
    is editing schema since they are done in different dialogs.


    - Editing the *same* record

    - Modifying the *same* layout

    - Modifying the *same* script

    - Modifying *any* database schema: tables, fields, and relationships

    - Modifying *any* value list

    - Modifying *any* data source

    - Modifying *any* security access privileges


    ## Configuring Network Settings


    The `FileMaker Network Settings` dialog serves a dual purpose. It is used to enable
    network sharing capabilities of the `FileMaker Pro` desktop application and to
    configure network access settings for individual open databases. The dialog, shown
    in Figure [29-4](#429700_2_En_29_Chapter.xhtml#Fig4), can be opened by selecting
    the `Share with FileMaker Clients` option from the `File ➤ Sharing` submenu or
    the toolbar’s `Share` menu.


    > **Caution**

    > `FileMaker` will not host a database lacking adequate account credentials (Chapter
    [30](#429700_2_En_30_Chapter.xhtml)).


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig4_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig4_HTML.jpg)


    **Figure 29-4** The dialog used to configure peer-to-peer network sharing


    ### Enabling Peer-to-Peer Sharing


    The *peer-to-peer sharing* option allows a user to open up to 125 databases with
    the `FileMaker Pro` desktop application and act as a host for up to five concurrent
    remote client connections. Since the peer host is running a client version of
    the software, both the host and other connected users can perform data entry and
    development tasks in the files, depending on their access privileges. The top
    half of `FileMaker Network Settings` dialog is used to enable peer sharing for
    the client’s local application. A warning is posted here that peer sharing is
    not a secure network protocol since only `FileMaker Server` and `FileMaker Cloud`
    have options for *Secure Socket Layer* (SSL) certification to enable secure transfer
    across a network. While not adequate for large workgroups or where security is
    important, this method can be workable for sharing a database with a small group
    of colleagues.'
