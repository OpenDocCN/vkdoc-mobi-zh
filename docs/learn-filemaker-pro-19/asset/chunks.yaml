    the numeric value into the button name using the *Choose* function.


    ```

    Let (

    number = Get ( LastMessageChoice )

    ;

    Choose ( number ; "" ; "OK" ; "Cancel" ; "Help" )

    )

    ```


    ### Creating a Related Record Using a Dialog


    As a practical example of dialog with input options, create a script that starts
    from a *Contact* record and walks through the creation of a *Company* record which
    is then assigned to the contact. The script will automatically carry out a sequence
    that would be burdensome for a user: switch layouts, create a new company record,
    enter company info, capture the id of the new record, return to the original layout,
    and enter the new id into the contact’s foreign key field for a company relationship.
    The exact order will change slightly for the scripted version. Instead of creating
    a record and entering data, a dialog will request the name for the new company
    in a variable and, if the user doesn’t cancel, continue with the record creation
    and assignment steps.


    ```

    Show Custom Dialog [ "Create a New Company" ; "Enter a name for the new company:"
    ; $name ]

    If [ Get ( LastMessageChoice ) = 2 ]

    Exit Script

    End If

    Freeze Window

    Go to Layout [ "Company" (Company) ; Animation: None ]

    New Record/Request

    Set Field [ Company::Company Name ; $name ]

    Set Variable [ $id ; Value: Company::Record ID ]

    Go to Layout [ original layout ; Animation: None ]

    Set Field [ Contact::Contact Company ID ; $id ]

    Commit Records/Requests [ With Dialog: Off ]

    ```


    Alternatively, if *Allow creation of records* (Chapter [9](#429700_2_En_9_Chapter.xhtml))
    is enabled for the *Company* side of the relationship, a single step dialog can
    request a name and push it into the related field, automatically creating the
    connection between the two.


    ```

    Show Custom Dialog [ "New Company" ; "Enter a name:" ; Contact | Company::Company
    Name ]

    ```


    ### Confirming a Dialog Field Value


    To avoid an empty field in the dialog, use a *Loop* statement to confirm a value
    before allowing the script to continue. When a user dismisses a dialog with a
    missing a value, the script loops back, presenting the dialog again until the
    user either enters a value or clicks Cancel. The following example places the
    dialog’s prompt into a *$message* variable so it can change to a warning if subsequent
    loops are necessary. The *Show Custom Dialog* step is placed inside the *Loop*
    statement with an *Exit Loop If* step jumping out of the loop if the user cancels
    or if a name has been entered. If the *$name* variable is empty, the *$message*
    is modified to a more sternly phrased request before the loop repeats again. Once
    the user enters a name, then the script can continue to perform any other steps
    placed below these steps.


    ```

    Set Variable [ $message ; Value: "Enter a name for the new company:"  ]

    Loop

    Show Custom Dialog [ "Create a New Company" ; $message ; $name ]

    If [ Get ( LastMessageChoice ) = 2 ]

    Exit Script

    End If

    Exit Loop If [$name ≠ "" ]

    Beep

    Set Variable [ $message ; Value: "You MUST enter a name for the new company:"  ]

    End Loop

    ```'
  trans: '

    ### 配置对话框属性


    *显示自定义对话框选项*对话框中的*常规*选项卡（如图 25-11 所示）用于配置自定义对话框的消息属性。*标题*和*消息*字段可以直接接收输入的静态文本，也可以通过点击相应的*指定*按钮输入公式来生成内容。这些内容将显示在对话框的标题栏和正文中，应清晰地传达信息或请求执行某个操作。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig11_HTML.jpg](img/429700_2_En_25_Fig11_HTML.jpg)


    图 25-11


    配置对话框属性的选项卡（左）与对话框示例（右）


    最多可以为自定义对话框定义三个按钮的名称。这些按钮将在对话框中从右到左排列，其中*默认按钮*会高亮显示，并响应用户按下 Enter 键的操作。如果在显示对话框时，当前记录存在未提交的更改，则任何勾选了相应*提交数据*复选框的按钮，在用户于对话框中点击时都会导致该记录被提交。当对话框请求输入要放入字段的信息时，此功能非常有用。


    **警告**


    对话框不会自动调整大小，因此较长的消息可能会被遮挡。尽管用户可以调整大小，但请保持消息简洁，以避免沟通不畅。


    ### 配置对话框输入字段


    对话框最多可以包含三个可编辑字段，每个字段都链接到一个目标字段或变量。这使得对话框可以向用户请求输入，并且在很多场景下都非常有用。脚本可以针对特定字段执行引导式搜索，在创建记录时通过提示必需输入来提供帮助，要求输入关键短语以确认删除操作，等等。*输入字段*选项卡为此包含了三组相同的控件，如图
    25-12 所示。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig12_HTML.jpg](img/429700_2_En_25_Fig12_HTML.jpg)


    图 25-12


    用于配置对话框输入字段的选项卡


    要在对话框中包含一个字段，请启用相应的复选框。然后点击*指定*以选择一个目标字段或变量。该目标充当对话框中该文本区域的*源*和*目标*。当对话框打开时，目标中的任何值都会作为默认值显示在输入字段中，用户可以对其进行自定义。用户在对话框中的输入会更新目标的值，并且该值会在用户关闭对话框后保留。


    *使用密码字符*复选框会使该字段在对话框中显示为隐藏值，每个字符都显示为项目符号。与字段的类似布局设置（第 20 章，“隐藏式编辑框”）一样，这仅是一个显示功能，不会更改或加密输入到该字段中的文本。除非该字段也被配置为以项目符号显示，否则该值在布局上可能仍然可见。无论如何，脚本都可以像处理任何其他文本字符串一样访问和操作该值。


    *标签*字段允许在对话框中的字段上方显示一个字段标签。默认情况下，字段在对话框中是没有标签的。可以输入静态文本标签，或点击*指定*以通过公式生成标签。


    **提示**


    当对话框需要三个以上的按钮或字段选项，或者需要弹出菜单或复选框等其他控件时，可使用*新建窗口*步骤，通过自定义布局生成一个对话框窗口。


    ### 捕获对话框按钮点击


    对话框自然会暂停脚本，直到用户点击某个按钮。对话框关闭后，脚本可以使用 `Get(LastMessageChoice)` 函数访问被点击按钮的索引位置。该数字对应于按钮的配置顺序，其在对话框上从右到左显示。此值可以立即使用，或存储在变量中供后续在工作流中使用，如下方示例所示：


    ```

    Show Custom Dialog [ "选择" ; "请选择一个功能" ]

    Set Variable [ $button ; Get ( LastMessageChoice )

    ```


    如果定义了三个按钮——确定、取消和帮助——并且用户点击了确定，则 `$button` 变量将被设置为 1。以下示例展示了一个公式，该公式可在前面的 `Set
    Variable` 步骤中使用，通过 `Choose` 函数将数值转换为按钮名称。


    ```

    Let (

    number = Get ( LastMessageChoice )

    ;

    Choose ( number ; "" ; "确定" ; "取消" ; "帮助" )

    )

    ```


    ### 使用对话框创建相关记录


    作为带输入选项的对话框的一个实用示例，我们来创建一个脚本，该脚本从一个*联系人*记录开始，然后逐步创建一个*公司*记录，并将其分配给该联系人。该脚本将自动执行一系列对于用户来说较为繁琐的操作：切换布局、新建公司记录、输入公司信息、获取新记录的
    ID、返回原始布局，并将新 ID 输入到联系人用于公司关系的外键字段中。脚本化版本的具体顺序会略有不同。脚本不会创建记录并输入数据，而是通过一个对话框请求将新公司的名称存入变量，如果用户没有取消，则继续执行记录创建和分配步骤。


    ```

    Show Custom Dialog [ "创建新公司" ; "输入新公司的名称:" ; $name ]

    If [ Get ( LastMessageChoice ) = 2 ]

    退出脚本

    End If

    冻结窗口

    转到布局 [ "公司" (公司) ; 动画: 无 ]

    新建记录/请求

    设置字段 [ 公司::公司名称 ; $name ]

    设置变量 [ $id ; 值: 公司::记录 ID ]

    转到布局 [ 原始布局 ; 动画: 无 ]

    设置字段 [ 联系人::联系人公司 ID ; $id ]

    提交记录/请求 [ 带对话框: 关闭 ]

    ```


    或者，如果已为关系的*公司*一侧启用了*允许创建记录*（第 9 章），则可以通过一个简单的对话框步骤来请求名称，并将其推入相关字段，从而自动创建两者之间的关联。


    ```

    Show Custom Dialog [ "新公司" ; "输入名称:" ; 联系人 | 公司::公司名称 ]

    ```


    ### 确认对话框字段值


    为避免对话框中出现空字段，请在允许脚本继续之前使用*循环*语句来确认值。当用户关闭包含缺失值的对话框时，脚本会循环回去，再次显示对话框，直到用户输入值或点击取消。以下示例将对话框的提示放入
    `$message` 变量中，以便在需要后续循环时将其更改为警告。`Show Custom Dialog` 步骤被放置在*循环*语句内，并且带有一个 `Exit
    Loop If` 步骤，如果用户取消或已输入名称，则会跳出循环。如果 `$name` 变量为空，则在循环重复之前，`$message` 会被修改为措辞更严厉的请求。一旦用户输入了名称，脚本就可以继续执行放置在这些步骤下方的任何其他步骤。


    ```

    设置变量 [ $message ; 值: "输入新公司的名称:"  ]

    循环

    Show Custom Dialog [ "创建新公司" ; $message ; $name ]

    If [ Get ( LastMessageChoice ) = 2 ]

    退出脚本

    End If

    如果 [ $name ≠ "" ] 则退出循环

    发出蜂鸣声

    设置变量 [ $message ; 值: "您必须输入新公司的名称:"  ]

    结束循环

    ```

