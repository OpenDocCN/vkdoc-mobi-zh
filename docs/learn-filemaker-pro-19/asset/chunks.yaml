- fmt: '### Accessing Zip Code Information


    The `Insert from URL` step can be used to access APIs such as the zip code lookup
    service from Datasheer, L.L.C. (`https://www.zip-codes.com/zip-code-api.asp`).
    The site allows a URL to request a JSON object of information about any U.S. Zip
    Code. You can register at the site for a free account (limited to 250 lookups/month)
    or purchase a variety of tiers up to 2 million lookups per month. The example
    below uses a limited demo API key and can be run from a `Contact` layout after
    a zip code is entered into a field. The script starts by placing the site’s API
    address and the current record’s `Contact Address Zip` field value into a `$URL`
    variable. Next, the `Insert from URL` step targets a `$Data` variable and uses
    the `$URL` variable as its URL. The two `Set Field` steps place the city and state
    values parsed from the `$Data` result into the corresponding fields.


    ```

    Set Variable [ $URL ; Value: "https://api.zip-codes.com/ZipCodesAPI.svc/1.0/QuickGetZipCodeDetails/"
    &

    Contact::Contact Address Zip & "?key=DEMOAPIKEY" ]

    Insert from URL [ With dialog: Off ; Target: $Data ; $URL ]

    Set Field [ Contact::Contact Address City ; JSONGetElement ( $Data ; "City" )
    ]

    Set Field [ Contact::Contact Address State ; JSONGetElement ( $Data ; "State"
    ) ]

    ```


    **Tip**


    For the smoothest experience, use an `OnObjectValidate` script trigger (Chapter
    [27](#429700_2_En_27_Chapter.xhtml)) to run this script after the user types into
    the `Contact Address Zip` field.


    ### Using cURL Options


    `Client URL (cURL)` is an open-source, command-line tool for data transfer between
    different systems using the URL syntax. The technology greatly expands the functionality
    possible with website requests, using structured data accompanying the URL but
    separated from it. This offers a more secure method of data transfer with far
    greater structural flexibility. FileMaker’s `Insert from URL` script step includes
    a button to `Specify cURL Options` when sending a request to a website that requires
    a cURL format instead of embedding it directly in a URL. After entering the URL,
    click the `Specify` button and enter options, structured as required by the target
    website. For example, if a website requires authentication, the options might
    be formatted as shown in the following example. This example places a URL into
    one variable and cURL options in another and then uses these in the `Insert from
    URL` step which targets a `$Data` variable for the result.


    ```

    Set Variable [ $URL ; Value: "https://www.example.com/" ]

    Set Variable [ $Options ; Value: "--user name:password" ]

    Insert from URL [ With dialog: Off ; Target: $Data ; $URL ; cURL Options: $Options
    ]

    ```


    cURL can be used to push data to a web form as shown in the following example.
    A first name and last name are structured with field labels and included as the
    content of a `data` option which is then sent to a website’s contact form.


    ```

    Set Variable [ $URL ; Value: "https://www.example.com/contact.cgi" ]

    Set Variable [ $Options ; Value: "--data \"firstname=Mark&lastname=Munro\"" ]

    Insert from URL [ With dialog: Off ; Target: $Data ; $URL ; cURL Options: $Options
    ]

    ```


    ## Summary


    This chapter presented many examples of scripting tasks that can be used to automate
    activity within a database. In the next chapter, we will look at the built-in
    script debugging capabilities provided as part of FileMaker’s advanced tools.


    # 26. Debugging Scripts


    When a simple script encounters an error, it is relatively easy to troubleshoot.
    As a database grows more complex, troubleshooting rapidly becomes more challenging.
    Script calls initiated by users, event triggers, other scripts, and external systems
    form complex interwoven hierarchical execution stacks. Scripts can change found
    sets, switch layouts, and open new windows, creating a complex web of interconnected
    interface contexts. When something breaks, it is often difficult to even know
    which script caused the error, not to mention knowing where, why, and under what
    contextual conditions the problem occurred. To ease this burden, modern development
    environments like FileMaker include a debugger. In this chapter, we introduce
    script debugging and cover the following topics:


    - Introducing debugging

    - Exploring the debugging interface

    - Using custom breakpoints


    ### Introducing Debugging


    A `script debugger` is an interactive tool used by developers to visually step
    through a scripted process and troubleshoot or analyze performance. FileMaker’s
    debugger makes it easy to step through scripts, monitor variables, set breakpoints,
    and discover errors while directly observing the corresponding actions performed
    in the database interface in real time. It includes an option to temporarily disable
    all script triggers to avoid a malfunctioning startup script or other situations.
    The debugger can be activated by selecting `Script Debugger` from the `Tools`
    menu or in the header of the `Script Workspace` (Chapter [24](#429700_2_En_24_Chapter.xhtml)).
    Also, a `Pause on error` option can be enabled to automatically open the debugger
    and pause action anytime a script generates an error while working in Browse mode
    as a user.


    When running a script in the debugger, FileMaker pauses at the start of each script
    in the stack and at any step that encounters an error. You can define arbitrary
    `breakpoints` at any step to force the script to pause for further investigation.
    Once paused, there is a choice to `Continue` executing the script to the next
    breakpoint, `Halt` to abort the script, or `Step forward` using one of four options:


    - `Step Over` – Continues executing the current script, performing any subscripts
    *without* debugging

    - `Step Into` – Continues executing the script step by step, performing any subscripts
    *with* debugging

    - `Step Out` – Executes the remaining steps in the current subscript and then
    returns control up to the stack to the parent script, pausing on the line after
    the subscript call

    - `Set Next Step` – Skips ahead to a selected step in the current script *without
    performing the interim steps*


    ### Exploring the Debugging Interface


    The debugging interface includes debugging options under the `Tools` menu, a `Script
    Debugger` window, and a `Data Viewer` window.


    #### Debugging Options Under the Tools Menu


    The `Tools` menu, shown in Figure [26-1](#429700_2_En_26_Chapter.xhtml#Fig1),
    contains three items at the top for debugging. The `Script Debugger` menu item
    toggles the visibility of the debugging window. The `Debugging Controls` submenu
    contains various debugging functions for controlling the movement through an active
    script. Most of these are also available in the debugging window toolbar. Finally,
    the `Data Viewer` menu item toggles the visibility of a window used to browse
    variables and dynamically monitor formula results based on the current context.


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig1_HTML.jpg](images/429700_2_En_26_Chapter/429700_2_En_26_Fig1_HTML.jpg)


    Figure 26-1 The `Script Debugger` menu showing the `Debugging Controls` submenu'
