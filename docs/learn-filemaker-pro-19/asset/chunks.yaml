    # 命名对象


    `对象名称`属性是一个可选的静态文本标识符，可以在布局模式下手动分配给某个布局对象或对象组。虽然这些标识符有些形式化，但在查看`对象`面板中的元素时很有帮助，并且某些函数和脚本步骤必须依赖它来引用非字段对象：如门户、选项卡控件、滑动控件和网页浏览器。例如，`GetLayoutObjectAttribute`和`Get
    (ActiveLayoutObjectName)`函数*只能*通过名称属性来引用对象。同样，像`转到对象`、`刷新门户`和`设置网页浏览器`这样的脚本步骤也需要对象名称作为目标引用。


    不应将`对象名称`与`字段名称`混淆，因为它们是两回事。字段名称是对特定数据容器的通用定义，无论该字段放置在何处都通用；而对象名称则是每个布局对象实例所独有的属性，字段也不例外。某个字段的实例可以被赋予与其定义名称不同的对象名称，并且同一字段在任何布局上的每个实例都可以拥有不同的对象名称。


    要分配对象名称，请进入布局模式并选择一个对象。在`检查器`面板的`位置`选项卡中的`位置`组里，点击`名称`文本区域，然后为对象键入一个名称。名称不区分大小写，并且必须唯一。


    **提示：** 如果从其他布局粘贴的对象具有相同的对象名称，则会自动重命名，以确保所有对象名称的唯一性。在粘贴新对象之前，务必先删除旧对象，并/或在粘贴后检查任何重要的名称。


    # 总结


    本章探讨了操作布局对象的各种选项，包括选择、调整大小、移动、排列、对齐、隐藏、条件格式、制表符顺序和命名。下一章，我们将探讨主题和样式功能。


    # 22. 使用主题和样式


    对象的格式设置可以直接通过`格式`菜单的功能或`检查器`面板的`外观`选项卡应用于对象。然而，与许多流行的打印和设计应用程序一样，FileMaker 允许您保存对象样式定义并将其分组为主题，从而创建更高效的设计工作流程。这使得跨多个布局的相似对象更容易保持一致性，并允许格式化更改立即全局应用。为了提升系统性能，最佳实践也建议使用样式。本章涵盖使用主题和样式的基础知识，包括：


    - 剖析样式

    - 使用主题

    - 使用样式

    - 设计自定义主题


    ## 剖析样式


    `样式`是针对特定对象类型的外观设置集合，可通过单一操作应用于新对象。可以为每种对象类型定义一个或多个样式，从而创建设计选项库。适用的设置因对象类型而异，并且只包含与*外观*相关的属性，而非*数据*、*位置*及其他与格式无关的属性。样式可以包括`填充`、`边框`、`圆角半径`、`字体`、`字号`、`字形`、`缩进`、`行高`和`制表符`的设置。


    从许多方面来看，FileMaker 中的样式*类似于*文字处理、桌面出版应用程序以及层叠样式表（CSS）中的样式，因为它们能够将格式快速应用于新对象，并便于对现有对象进行全局样式更新。然而，它们也在一些重要方面*有所区别*。首先，样式是开发者用于高效布局设计的机制，用户在浏览模式下编辑字段文本内容时无法使用。FileMaker
    没有用户可访问的、适用于内容的样式。用户可以对字段内的文本应用单独的格式更改，但无法批量应用。与 CSS 和桌面出版不同，FileMaker 中的样式是离散的、非层次化的，不能从其他样式继承属性。此外，由于样式应用于交互式界面中的动态对象，它们比基于文本的应用程序中的样式拥有更多维度。一种样式为每个`对象部件`的每个可能的`对象状态`存储一组所有格式设置，形成一个复杂的内部层次结构，如图
    22-1 所示。


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig1_HTML.jpg](img/429700_2_En_22_Fig1_HTML.jpg)


    图 22-1：对象样式层次结构示意图


    `对象部件`是对象的一个组件（或对象本身），可以被单独设置样式。一个`按钮`由两个部件组成：`按钮`和`图标`。一个`门户`也由两个部件组成：`门户`和`门户行`。一个`按钮栏`有四个部件：`按钮栏`、`分隔符`、`分段`和`图标`。每个部件针对每个可能的对象状态都有一套格式设置，所有这些都定义在单一风格中。


    `对象状态`是对象相对于用户的状态。大多数对象至少具有四种状态。`正常`状态表示对象可见但未处于活跃交互中。`激活`状态表示对象获得了焦点，例如，处于焦点状态的字段或按钮栏的活动分段。另外两种常见状态表示光标与对象的交互：`悬停`和`按下`。某些对象根据其性质还有额外的状态可用，例如，`字段`具有`占位符文本`状态，而`按钮栏分段`具有`非激活`状态。


    每个部件-状态组合都可以被分配一组与其他组合不同的格式设置。这使得动态界面设计成为可能，对象的整体外观会根据用户的操作而变化。例如，当用户将光标移到按钮上时，其边框、阴影或文本颜色可以改变，以表明它是一个可以接受鼠标点击的活动元素。同样，当用户点击按钮时，其颜色可以加深，直观地表示按下的动作。部件和状态的组合为给定对象创造了指数级数量的可定义格式设置。例如，一个按钮有*八*组不同的格式设置，对应两个部件的四种状态各一组，如图
    22-2 所示。请记住，这展示了一个*单一的样式定义*，该样式可以保存并通过单一操作应用于任意数量的其他按钮。

