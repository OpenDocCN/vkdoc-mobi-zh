- fmt: '### Adding Copies of Standard FileMaker Menus


    Add a copy of each standard FileMaker menu into the `Learn FileMaker Menus` set.
    To begin, click the `Add` button to open the `Select Menu` dialog, shown in Figure
    [23-6](#429700_2_En_23_Chapter.xhtml#Fig6).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig6_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig6_HTML.jpg)


    Figure 23-6


    The dialog used to select available standard and custom menus


    This dialog lists all available menus that can be added to a custom set. Until
    custom menus are created, this dialog will only list standard submenus. Hold down
    the `Command` (macOS) or `Windows` (Windows) key to allow for multiple selections,
    and then click on the three standard menus in the list: `[Format]`, `[Scripts]`,
    and `[Window]`. Once selected, click the `Select` button to add the three selected
    menus to the custom set. To add the remaining standard menus to the set, create
    a copy of each menu by once again clicking the `Add` button on the `Edit Custom
    Menu Set` dialog and then clicking the `+` button on the preceding `Select Menu`
    dialog. This will open the `Create Custom Menu` dialog, shown in Figure [23-7](#429700_2_En_23_Chapter.xhtml#Fig7).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig7_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig7_HTML.jpg)


    Figure 23-7


    The `Create Custom Menu` dialog is used to create a new menu


    This dialog offers the choice of two options for the menus we are adding: `Start
    with an empty menu` creates a new unnamed menu with no menu items, and `Start
    with a standard FileMaker menu` creates a copy of a selected standard FileMaker
    menu, which can later be customized. For now, add each of the eight standard menus
    listed, one at a time, by selecting them and clicking OK. Each copy will be created
    and opened in the `Edit Custom Menu` dialog. For now, just click OK in that dialog
    to save the new menu copy in its default state. Once finished, the `Select Menu`
    dialog should contain a list of all eight copies of the standard menus, shown
    in Figure [23-8](#429700_2_En_23_Chapter.xhtml#Fig8).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig8_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig8_HTML.jpg)


    Figure 23-8


    The dialog after creating a copy of every standard FileMaker menu


    These copies have now been added to the database as custom menus but still need
    to be added to the custom menu set. Hold the `Command` (macOS) or `Windows` (Windows)
    key, select all eight of the standard menu copies, and then click the `Select`
    button. This will return to the `Edit Custom Menu Set` dialog, showing a list
    of all 11 menus we have added, shown in Figure [23-9](#429700_2_En_23_Chapter.xhtml#Fig9).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig9_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig9_HTML.jpg)


    Figure 23-9


    The new custom menu set


    Menus can be drag-arranged in the list with two exceptions: the `FileMaker Pro`
    menu will remain locked as the first in the list, and the `Help` menu will remain
    locked as the last menu in the list. Once the menus are in the desired order,
    click OK to save the changes, and close the `Edit Custom Menu Set` dialog. Then
    click OK to close the `Manage Custom Menus` dialog. Now you can manually install
    the custom menu set for the current layout by selecting it from the `Tools ➤ Custom
    Menus` menu (see more on installing later in this chapter). When the custom menu
    set has a check mark next to its name in this menu, it is installed. Since the
    custom set we created is simply a copy of the standard FileMaker menu set, you
    should notice no differences between the current menus compared to the standard
    FileMaker menus. Next, we can begin customizing the new menu set.


    ## Customizing Menu Items


    Whether editing standard menu items or configuring new empty menu items, the process
    of customizing a menu is essentially the same; open it in the `Edit Custom Menu`
    dialog, then modify settings, edit menu items, or add new items.


    ### Exploring the Edit Custom Menu Dialog


    Configuring menus and defining the items they contain are done from the `Edit
    Custom Menu` dialog, shown in Figure [23-10](#429700_2_En_23_Chapter.xhtml#Fig10).
    This dialog is opened automatically when creating a new custom menu and can be
    opened from either tab of the `Manage Custom Menus` dialog. From the `Custom Menus`
    tab, select a menu, and click the `Edit` button or double-click directly on the
    menu. From the `Custom Menu Sets` tab, select a menu set and click the `Edit`
    button or double-click directly on the menu set. Then select a menu and click
    `Edit` button or double-click directly on the menu. The top of the dialog includes
    menu configuration controls, while the bottom section includes a list of the menu’s
    items. From here, items can be created, duplicated, deleted, or have their properties
    and behavior customized.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig10_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig10_HTML.jpg)


    Figure 23-10


    The dialog used to configure a menu and define its items


    #### Configuring Menu Settings


    The `Menu Name` accepts a custom name for the menu up to 100 characters. This
    name is only visible within the programming interface and is not necessarily the
    title that will appear in the menu bar. If following along, take a moment to rename
    the custom menus, removing the “Copy” suffix that was added when we copied the
    standard menus into our custom set.


    The `Comment` field is used to store a description of the menu for developers,
    up to 30,000 characters.


    The `Menu Title` controls the name of the menu when it appears in the menu bar.
    If the menu is a copy of a standard FileMaker menu, a `Default` option will be
    available, using the standard name. To override this or to enter a name for a
    custom menu, the `Override Title` option includes a field and a `Specify` button
    allowing entry of a static name or a formula to calculate a name. Custom menu
    names can be up to 30,000 characters in length; however, due to the dimensional
    limitation of screens as well as the nature of human perception, it is best to
    limit each menu name to a single word.


    Control when a menu is installed in the menu bar using one of two sets of controls
    that work in concert. The `Install when` setting allows a formula to control when
    a menu is installed by returning a Boolean value, with a static default entry
    of true (1). The `Include in mode` checkboxes apply that formula based on the
    Window mode. For example, uncheck `Find` to hide the menu in Find mode.'
