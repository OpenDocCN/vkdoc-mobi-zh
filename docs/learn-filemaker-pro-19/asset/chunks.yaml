    \ | `Format Painter tool` – Select to copy and apply format settings from one\
    \ object to another. |\n\n#### Developer Menu and Pane Toggling\n\nThe `Manage\
    \ Database` icon reveals a shortcut menu of developer options that are also accessible\
    \ through the `File ➤ Manage` menu (Chapter [2](#429700_2_En_2_Chapter.xhtml)).\
    \ The two `Show/Hide Panes` buttons toggle a pane on each side of the window in\
    \ Layout mode (Chapter [19](#429700_2_En_19_Chapter.xhtml))."
  raw: '## Using Layout Mode


    *Layout mode* is an alternate window state in which the whole application environment
    is transformed to accommodate layout design work. In this mode, the toolbar buttons
    and menu items change to provide control over interface-related functions. Each
    side of the window has optional layout panes that provide access to fields, objects,
    add-ons, and configuration settings (Chapter [19](#429700_2_En_19_Chapter.xhtml)).
    The entire content area becomes an editable workspace where you can add, configure,
    and style objects to control how things will be rendered in other modes (Chapters
    [20](#429700_2_En_20_Chapter.xhtml) and [21](#429700_2_En_21_Chapter.xhtml)).
    Layout mode can be initiated selecting the *View ➤ Layout Mode* menu or clicking
    the *Edit Layout* button in the toolbar.


    ### Status Toolbar (Layout Mode)


    When a window is placed into Layout mode, the options available in the toolbar
    will change dramatically. The Browse mode controls for managing records, and performing
    data entry tasks will be replaced with tools for adding objects to the layout
    and performing other design-related functions. The controls available will be
    either the default Layout mode items or the user’s customized set.


    #### Default Status Toolbar Items (Layout Mode)


    The default status toolbar for Layout mode is shown in Figure [17-4](#429700_2_En_17_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig4_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig4_HTML.jpg)


    Figure 17-4


    The status toolbar for Layout mode


    1.  Navigation controls


    2.  New Layout/Report button


    3.  Layout tools


    4.  Developer menu and pane toggling


    5.  Layout menu


    6.  Layout Settings button


    7.  Theme Selection


    8.  Screen and Device Dimension menu


    9.  Formatting Bar button


    10.  Exit Layout button


    ##### Navigation Controls


    At the top left of the toolbar are navigation controls that appear and function
    similar to Browse mode (Chapter [3](#429700_2_En_3_Chapter.xhtml)) except they
    refer to and control *layouts* rather than *records*. The total refers to the
    total number of layouts that exist in the current file, and the number in the
    text box indicates which layout is being viewed.


    Caution


    Although included here, recent versions of FileMaker *exclude* navigation controls
    from the default Layout mode toolbar. Customize the toolbar to add these essential
    tools.


    ##### New Layout/Report Button


    The only function button present in the default toolbar is *New Layout/Report*
    which starts the process of creating a new layout (Chapter [18](#429700_2_En_18_Chapter.xhtml)).
    Other function buttons, such as *Delete Layout* and *Duplicate Layout*, can be
    added by customizing the toolbar.


    ##### Layout Tools


    The central row of icons are layout object tools, which are defined in Table [17-1](#429700_2_En_17_Chapter.xhtml#Tab1).
    Most are *object-creation tools* that are used to insert a new instance of an
    object (Chapter [20](#429700_2_En_20_Chapter.xhtml)). The majority of those are
    *draw-mode activation tools* that, once selected, allow object creation by clicking
    and dragging within the layout creation area. Each of these is a transitory selection
    which deactivates and reverts to the selection tool after an object is created.
    Double-click one of these to lock it and allow rapid creation of multiple objects
    of the same type one after another without having to reselect the tool. The tool
    will then remain active until another tool is selected. Many tools have dual modes:
    click to create a default object type or click-hold to reveal a menu of similar
    object types. Two of the object-creation tools are *drag-insertion tools* which
    are click-dragged from the toolbar onto the content area to initiate the creation
    of a field or layout part. Finally, two tools are *object manipulation tools*
    which are used to select an object or apply formatting.


    Table 17-1


    Each layout tool defined


    | Icon | Tool Description |

    | --- | --- |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figa_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figa_HTML.jpg)
    | *Selection tool* – Select objects on the layout to move or configure them. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figb_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figb_HTML.jpg)
    | *Text tool* – Add or edit text on a layout or in object types like buttons,
    tabs, etc. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figc_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figc_HTML.jpg)
    | *Line tool* – Draw a line on a layout. Hold the Shift key to lock for a straight
    horizontally or vertically line. Hold Option to lock to a 45-degree angle. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figd_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figd_HTML.jpg)
    | *Shape menu* – Click to select the *Rectangle* shape tool or click-hold to choose
    from a menu of *Rectangle*, *Rounded Rectangle,* or *Oval*. Hold the Shift or
    Option key to maintain a uniform height and width while dragging its boundaries.
    |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fige_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fige_HTML.jpg)
    | *Field menu* – Click to select an *Edit box* mode or click-hold to choose a
    specific control style. Drag in the content area to create a field object and
    select a field assignment. Once created, the control style can be modified (Chapter
    [20](#429700_2_En_20_Chapter.xhtml), “Configuring Field Control Style”). |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figf_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figf_HTML.jpg)
    | *Button menu* – Click to select the Button tool or click-hold to choose from
    a menu of *Button* or *Popover Button*. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figg_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figg_HTML.jpg)
    | *Button Bar tool* – Draw a segmented bar that can contain multiple *Buttons*
    and/or *Popover Buttons*. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figh_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figh_HTML.jpg)
    | *Multi-panel Object menu* – Click to select the *Tab Control* tool or click-hold
    to choose from a menu of *Tab Control* or *Slide Control*. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figi_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figi_HTML.jpg)
    | *Portal tool* – Draw a portal, for viewing a list of records from a related
    table. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figj_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figj_HTML.jpg)
    | *Chart tool* – Draw a graphical chart object. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figk_HTML.gif](images/429700_2_En_17_Chapter/429700_2_En_17_Figk_HTML.gif)
    | *Web Viewer tool* – Draw a web viewer object. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figl_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figl_HTML.jpg)
    | *Field tool* – Drag a new field down onto a layout. |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figm_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figm_HTML.jpg)
    | *Part tool* – Drag a new layout part onto a layout (Chapter [18](#429700_2_En_18_Chapter.xhtml)).
    |

    | ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fign_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fign_HTML.jpg)
    | *Format Painter tool* – Select to copy and apply format settings from one object
    to another. |


    ##### Developer Menu and Pane Toggling


    The *Manage Database* icon reveals a shortcut menu of developer options that are
    also accessible through the *File ➤ Manage* menu (Chapter [2](#429700_2_En_2_Chapter.xhtml)).
    The two *Show/Hide Panes* buttons toggle a pane on each side of the window in
    Layout mode (Chapter [19](#429700_2_En_19_Chapter.xhtml)).'
  trans: "\n# 使用布局模式\n\n`布局模式`是一种备选窗口状态，在此状态下，整个应用程序环境会进行转换，以适应布局设计工作。在此模式下，工具栏按钮和菜单项会发生变化，以提供对界面相关功能的控制。窗口的每一侧都有可选的布局窗格，用于访问字段、对象、插件和配置设置（第\
    \ 19 章）。整个内容区域变为一个可编辑的工作区，您可以在其中添加、配置对象并设置其样式，以控制它们在其他模式下的呈现方式（第 20 章和第 21 章）。可以通过选择\
    \ `查看 ➤ 布局模式` 菜单或单击工具栏中的 `编辑布局` 按钮来启动布局模式。\n\n## 状态工具栏（布局模式）\n\n当窗口进入布局模式时，工具栏中可用的选项将发生显著变化。用于管理记录和执行数据输入任务的浏览模式控件将被用于向布局添加对象和执行其他设计相关功能的工具所取代。可用的控件要么是默认的布局模式项目，要么是用户自定义的集合。\n\
    \n### 默认状态工具栏项目（布局模式）\n\n布局模式的默认状态工具栏如图 17-4 所示。\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig4_HTML.jpg](img/429700_2_En_17_Fig4_HTML.jpg)\n\
    \n图 17-4\n\n布局模式的状态工具栏\n\n1.  导航控件\n2.  新建布局/报表按钮\n3.  布局工具\n4.  开发者菜单和窗格切换\n\
    5.  布局菜单\n6.  布局设置按钮\n7.  主题选择\n8.  屏幕和设备尺寸菜单\n9.  格式化栏按钮\n10. 退出布局按钮\n\n####\
    \ 导航控件\n\n工具栏左上角是导航控件，它们的外观和功能与浏览模式（第 3 章）相似，但区别在于它们指的是并控制*布局*而非*记录*。总数指的是当前文件中存在的布局总数，文本框中的数字表示当前正在查看的是哪个布局。\n\
    \n> **警告**\n> \n> 尽管在此提及，但最新版本的 FileMaker *排除了*默认布局模式工具栏中的导航控件。请自定义工具栏以添加这些基本工具。\n\
    \n#### 新建布局/报表按钮\n\n默认工具栏中仅有的功能按钮是 `新建布局/报表`，它用于启动创建新布局的过程（第 18 章）。其他功能按钮，如 `删除布局`\
    \ 和 `复制布局`，可以通过自定义工具栏来添加。\n\n#### 布局工具\n\n中央一排图标是布局对象工具，定义在表 17-1 中。大多数是*对象创建工具*，用于插入对象的新实例（第\
    \ 20 章）。其中大部分是*绘图模式激活工具*，选中后，可以通过在布局创建区域内单击并拖动来创建对象。这些都是临时性选择，在创建对象后会取消激活并恢复为选择工具。双击其中之一可将其锁定，以便快速连续创建多个相同类型的对象，而无需重新选择工具。该工具将保持激活状态，直到选择了另一个工具。许多工具有双重模式：单击以创建默认对象类型，或按住单击以显示相似对象类型的菜单。其中两个对象创建工具是*拖放插入工具*，它们从工具栏拖放到内容区域以启动创建字段或布局部分。最后，两个工具是*对象操作工具*，用于选择对象或应用格式。\n\
    \n表 17-1\n\n每个定义的布局工具\n\n| 图标 | 工具描述 |\n| :--- | :--- |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figa_HTML.jpg](img/429700_2_En_17_Figa_HTML.jpg)\
    \ | `选择工具` – 选择布局上的对象以移动或配置它们。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figb_HTML.jpg](img/429700_2_En_17_Figb_HTML.jpg)\
    \ | `文本工具` – 在布局上或按钮、选项卡等对象类型中添加或编辑文本。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figc_HTML.jpg](img/429700_2_En_17_Figc_HTML.jpg)\
    \ | `线条工具` – 在布局上绘制一条线。按住 `Shift` 键可锁定为水平或垂直的直线。按住 `Option` 键可锁定为 45 度角。 |\n|\
    \ ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figd_HTML.jpg](img/429700_2_En_17_Figd_HTML.jpg)\
    \ | `形状菜单` – 单击以选择 `矩形` 形状工具，或按住单击以从 `矩形`、`圆角矩形` 或 `椭圆` 菜单中选择。拖动其边界时，按住 `Shift`\
    \ 或 `Option` 键可保持宽高一致。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fige_HTML.jpg](img/429700_2_En_17_Fige_HTML.jpg)\
    \ | `字段菜单` – 单击以选择 `编辑框` 模式，或按住单击以选择特定的控件样式。在内容区域拖动以创建字段对象并选择字段分配。创建后，可以修改控件样式（第\
    \ 20 章，“配置字段控件样式”）。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figf_HTML.jpg](img/429700_2_En_17_Figf_HTML.jpg)\
    \ | `按钮菜单` – 单击以选择按钮工具，或按住单击以从 `按钮` 或 `弹出框按钮` 菜单中选择。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figg_HTML.jpg](img/429700_2_En_17_Figg_HTML.jpg)\
    \ | `按钮栏工具` – 绘制一个分段的栏，其中可以包含多个 `按钮` 和/或 `弹出框按钮`。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figh_HTML.jpg](img/429700_2_En_17_Figh_HTML.jpg)\
    \ | `多面板对象菜单` – 单击以选择 `选项卡控件` 工具，或按住单击以从 `选项卡控件` 或 `幻灯片控件` 菜单中选择。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figi_HTML.jpg](img/429700_2_En_17_Figi_HTML.jpg)\
    \ | `门户工具` – 绘制一个门户，用于查看来自相关表的记录列表。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figj_HTML.jpg](img/429700_2_En_17_Figj_HTML.jpg)\
    \ | `图表工具` – 绘制一个图形图表对象。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figk_HTML.gif](img/429700_2_En_17_Figk_HTML.gif)\
    \ | `网页查看器工具` – 绘制一个网页查看器对象。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figl_HTML.jpg](img/429700_2_En_17_Figl_HTML.jpg)\
    \ | `字段工具` – 将新字段拖放到布局上。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figm_HTML.jpg](img/429700_2_En_17_Figm_HTML.jpg)\
    \ | `部分工具` – 将新的布局部分拖放到布局上（第 18 章）。 |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fign_HTML.jpg](img/429700_2_En_17_Fign_HTML.jpg)\
    \ | `格式刷工具` – 选择以复制格式设置并将其从一个对象应用到另一个对象。 |\n\n#### 开发者菜单和窗格切换\n\n`管理数据库` 图标显示一个开发者选项的快捷菜单，这些选项也可以通过\
    \ `文件 ➤ 管理` 菜单（第 2 章）访问。两个 `显示/隐藏窗格` 按钮用于在布局模式下切换窗口两侧的窗格（第 19 章）。\n"
- fmt: "### Layout Menu\n\nThe lower, non-customizable level of the `Layout` mode\
    \ toolbar starts with the `Layout` menu. Similar to the same menu in `Browse`\
    \ mode (Chapter [3](#429700_2_En_3_Chapter.xhtml)), this menu always lists *every\
    \ layout* in the file and adds access to the `Manage Layouts` dialog (Chapter\
    \ [18](#429700_2_En_18_Chapter.xhtml)). It is used to quickly switch to edit another\
    \ layout the same as selecting a layout from the `View ➤ Go To Layout` submenu.\n\
    \n### Layout Settings Button\n\nNext to the `Layout` menu, a button opens the\
    \ `Layout Settings` dialog where options and behaviors can be set for the current\
    \ layout (Chapter [18](#429700_2_En_18_Chapter.xhtml), “Configuring Layout Settings”).\n\
    \n### Theme Selection\n\nThe `Theme Selector` displays the name of the theme assigned\
    \ to the layout with a button that will open a theme selection dialog. A *layout\
    \ theme* is a collection of stylistic settings that, once assigned to the layout,\
    \ can be quickly applied to objects and allows changes to be synchronized across\
    \ the entire database (Chapter [22](#429700_2_En_22_Chapter.xhtml)).\n\n### Screen\
    \ and Device Dimension Menu\n\nThe `Screen and Device Dimension` menu allows a\
    \ choice of dimensional guide overlays that show an orange border in the layout\
    \ design area visually denoting the boundaries of specific screen sizes. Click\
    \ the box portion of the icon to toggle the visibility of all the overlay boxes\
    \ for selected dimensions.\n\n### Formatting Bar Button\n\nThe `Formatting Bar`\
    \ button will toggle the visibility of a text-formatting control bar between the\
    \ status toolbar and the design area of the window (Chapter [3](#429700_2_En_3_Chapter.xhtml),\
    \ “Formatting Bar”).\n\n### Exit Layout Button\n\nThe `Exit Layout` button will\
    \ switch the window back to `Browse` mode with an optional dialog asking if you\
    \ want to save changes depending on preference settings (Chapter [2](#429700_2_En_2_Chapter.xhtml),\
    \ “Layout Settings”).\n\n## Customizing the Status Toolbar (Layout Mode)\n\nThe\
    \ toolbar in `Layout` mode is customizable at the user-computer level exactly\
    \ as it is in `Browse` mode (Chapter [3](#429700_2_En_3_Chapter.xhtml), “Customizing\
    \ the Status Toolbar”) except that the buttons available are layout specific.\
    \ To begin customizing, enter `Layout` mode and then select the `View ➤ Customize\
    \ Toolbar` menu to open the customization panel attached to the window as shown\
    \ in Figure [17-5](#429700_2_En_17_Chapter.xhtml#Fig5). Once open, items can be\
    \ added, removed, or rearranged in the same manner as in `Browse` mode.\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig5_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig5_HTML.jpg)\n\
    \nFigure 17-5\n\nThe toolbar customization panel for `Layout` mode (macOS)\n\n\
    ## Menu Changes (Layout Mode)\n\nThe menus in `Layout` mode are similar to `Browse`\
    \ mode but with a few notable changes. In addition to the `Records` menu being\
    \ completely removed, the `Edit`, `View`, `Insert`, and `Format` menus are changed,\
    \ and `Layouts` and `Arrange` menus are added.\n\n### Edit Menu\n\nThe `Edit`\
    \ menu options change in `Layout` mode, as shown in Figure [17-6](#429700_2_En_17_Chapter.xhtml#Fig6).\n\
    \n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig6_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig6_HTML.jpg)\n\
    \nFigure 17-6\n\nThe `Edit` menu in `Browse` mode (left) and `Layout` mode (right)\n\
    \n*   `Copy Object Style` – Copies style information of a selected object.\n*\
    \   `Paste Object Style` – Applies previously copied style information to the\
    \ selected object.\n*   `Revert Changes to Style` – Reverts any formatting changes\
    \ applied to the selected object back to the style assigned (Chapter [22](#429700_2_En_22_Chapter.xhtml)).\n\
    *   `Duplicate` – Duplicates the selected layout object(s).\n*   `Export Field\
    \ Contents` – This function is removed in `Layout` mode.\n\n### View Menu\n\n\
    The `View` menu options change in `Layout` mode, as shown in Figure [17-7](#429700_2_En_17_Chapter.xhtml#Fig7).\n\
    \n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig7_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig7_HTML.jpg)\n\
    \nFigure 17-7\n\nThe `View` menu in `Browse` mode (left) and `Layout` mode (right)\n\
    \n*   `Go to Layout` – Like the `Layout` menu in the toolbar, this submenu displays\
    \ *all* layouts in `Layout` mode.\n*   `View as` – These three `Browse` mode functions\
    \ are removed.\n*   `Rulers` – The menu, pluralized in `Layout` mode, toggles\
    \ the visibility of both horizontal *and* vertical rulers.\n*   `Page Margins`\
    \ – Select to activate page border guides superimposed on the layout background\
    \ based on the current print settings.\n*   `Page Breaks` – Select to activate\
    \ page breaks superimposed on the layout background.\n*   `Grid` – A submenu of\
    \ two choices: `Show Grid` toggles the visibility of a grid of major and minor\
    \ lines, reminiscent of graph paper superimposed on the background, and `Snap\
    \ to Grid` toggles the magnetic attraction of objects to the grid.\n*   `Guides`\
    \ – A submenu of two choices: `Show Guides` toggles the visibility of manually\
    \ placed blue guide lines, and `Snap to Guides` toggles the magnetic attraction\
    \ of objects to those.\n*   `Dynamic Guides` – Select to activate automatic guides\
    \ that appear around and between an object when it is dragged around a layout.\n\
    \n> Note\n> \n> See further discussion of rulers, grids, guides, and dynamic guides\
    \ in Chapter [21](#429700_2_En_21_Chapter.xhtml), “Layout Positioning Helpers.”\n\
    \n*   `Show` – A submenu listing special iconography and display options in `Layout`\
    \ mode, including:\n    *   Show **Sample Data** in place of field names.\n  \
    \  *   Show **Text Boundaries** and **Field Boundaries** will make an object’s\
    \ dimension visible regardless of styling.\n    *   The remaining options toggle\
    \ the visibility of a small icon called an *object badge* superimposed over objects\
    \ indicating key features, each defined in Table [17-2](#429700_2_En_17_Chapter.xhtml#Tab2).\n\
    *   `Objects` – A submenu with an option to open an Objects pane tab: `Fields`,\
    \ `Objects`, and `Add-ons`.\n*   `Inspectors` – A submenu with options to toggle\
    \ the visibility of the Inspector pane and to create new floating Inspector windows.\n\
    \n> Note\n> \n> See further discussion of *objects* and *inspector panes* in Chapter\
    \ [19](#429700_2_En_19_Chapter.xhtml).\n\n### Table 17-2\n\nA list of layout object\
    \ badges"
