  trans: "\n#### 摘要字段选项对话框\n\n`摘要字段选项`对话框分为五个主要部分，如图 8-8 所示。\n\n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig8_HTML.jpg](img/429700_2_En_8_Fig8_HTML.jpg)\n\
    \n**图 8-8** 显示额外控件的摘要选项对话框\n\n**警告**\n\n以下选项提供了摘要设置的概述，在您看到构建了子摘要部分的复杂报表（请参阅第\
    \ 18 章“添加布局”）之前，它们可能显得过于抽象。\n\n该对话框包含以下控件：\n\n1.  **摘要类型** – 指定要使用的摘要类型（上一节已列出）。\n\
    2.  **可用字段** – 选择要从中提取并汇总数据的字段。该列表包含来自正在定义的字段所属表的相关字段。\n3.  **条件选项** – 根据所选的摘要类型，此区域将显示以下选项中的*零个*、*一个*或*两个*：`Running\
    \ total`、`Restart summary for each sorted group`、`Weighted average`、`Running count`、以及\
    \ `By population` 或 `Subtotaled`。\n4.  **汇总重复项** – 当选择了重复字段时，请指明如何处理重复项。选择 `Individually`\
    \ 可为每个重复项显示单独的摘要，从而使摘要字段也成为重复项。选择 `All together` 则将一个记录的所有重复项相加，并在摘要过程中将其视为单个值。\n\
    5.  **条件辅助字段选择** – 根据之前选择的选项，可能需要为以下某项辅助功能选择一个字段：\n   - **When Sorted by** – 某些操作允许在检测到新的排序值时重新开始摘要。这可以为单个找到的记录集中的多个子组创建摘要。例如，您可能希望使用此功能汇总\
    \ `每个员工的销售额` 或 `每个客户的收入`。当选择了 `Restart summary for each sorted group` 选项，或 `Fraction\
    \ of Total of` 摘要类型配合 `Subtotaled` 选项使用时，此选项适用于 `Total of` 或 `Count of` 摘要类型。\n\
    \   - **Weighted by** – 当使用 `Average of` 摘要类型并选择 `Weighted average` 选项时，可以选择一个用于加权计算结果的字段。\n\
    \n## 向示例数据库添加字段\n\n在上一章的结尾，我们向 `Learn FileMaker` 示例数据库添加了三个表：`Company`、`Contact`\
    \ 和 `Project`。现在，利用本章学到的知识，我们可以为每个表添加一些字段。虽然这些字段并非实际解决方案中这些表所需的完整列表，但它们提供了几个关键字段，以便我们继续探索构建数据库的过程。\n\
    \n### 定义公司字段\n\n在 `Company` 表中，创建以下字段：\n\n- `Company Name (text)`\n- `Company\
    \ Description (text)`\n- `Company Industry (text)`\n- `Company Website (text)`\n\
    - `Company Status (text)`\n\n### 定义联系人字段\n\n在 `Contact` 表中，创建以下字段：\n\n- `Contact\
    \ Name First (text)`\n- `Contact Name Last (text)`\n- `Contact Company ID (text)`\n\
    - `Contact Address Street (text)`\n- `Contact Address City (text)`\n- `Contact\
    \ Address State (text)`\n- `Contact Address Zip (number)`\n- `Contact Address\
    \ Country (text)`\n\n### 定义项目字段\n\n在 `Project` 表中，创建以下字段：\n\n- `Project Company\
    \ ID (text)`\n- `Project Contact ID (text)`\n- `Project Name (text)`\n- `Project\
    \ Description (text)`\n- `Project Budget (number)`\n- `Project Budget Summary\
    \ (summary as a Total of the Project Budget field)`\n\n### 重命名和修改默认字段\n\n为了遵循本书后续示例的操作，并积累修改字段定义的经验，请对所有表中的五个默认字段执行以下更改：\n\
    \n- 将 `PrimaryKey` 重命名为“Record ID”，并将其自动输入选项从“计算值”更改为以“000001”开头的“序列号”。\n- 将 `CreationTimestamp`\
    \ 重命名为“Record Creation Timestamp”。\n- 将 `CreatedBy` 重命名为“Record Creation User”。\n\
    - 将 `ModificationTimestamp` 重命名为“Record Modification Timestamp”。\n- 将 `ModifiedBy`\
    \ 重命名为“Record Modification User”。\n\n**提示**\n\n通过在一个表中完成这些操作，然后复制粘贴以替换其他表中的默认字段可以节省时间。\n\
    \n## 总结\n\n本章探讨了定义字段的基础知识。下一章，我们将重点转向在表之间建立关系连接。\n\n# 9. 建立关系\n\n*关系型数据库*允许在表之间定义连接，以便基于字段值自动关联单个记录。本章涵盖与关系相关的以下主题：\n\
    \n- 关系介绍\n- 管理数据源\n- 管理数据库对话框介绍（关系）\n- 处理表出现项\n- 构建关系\n- 向关系图添加注释\n- 实现简单的关系模型\n"
- fmt: "# Introducing Relationships\n\nA *relationship* defines a connection between\
    \ tables that forms a context of bidirectional conduits that link individual records\
    \ in one table to one or more individual records in another. As a digital model\
    \ of real-world phenomenon, a database uses `tables` to represent entities, `fields`\
    \ to store properties of entities, and `relationships` to reflect how those entities\
    \ connect or interact.\n\nConsider how the relationship between a company and\
    \ employees would be modeled in a database. Each can be represented by a table:\
    \ `Company` and `Contact`. Fields are created in each to store properties about\
    \ the entities that are important for database work. For example, a company’s\
    \ `address`, `description`, `industry`, `name`, and `website` would be fields.\
    \ Similarly, a contact’s `email`, `name`, `phones`, and `title` would be fields.\
    \ Next, looking at how these two relate in reality, we can identify the need for\
    \ a connection between them. Each company may employ one or more people, and conversely,\
    \ each person is typically employed by a company. From this, we can define at\
    \ least one relationship requirement in the database: each `Contact` record will\
    \ require the option to be connected to a `Company` record. A person can be linked\
    \ as an employee of a company, and conversely, a company can have one or more\
    \ people linked as employees.\n\nEvery table created in a database adds a potential\
    \ for more connections. For example, companies may need links to `inventory`,\
    \ `projects`, `budgets`, `assets`, and `procedures`, while contacts may need links\
    \ to `phones`, `emails`, and `web addresses`. Each of those imply more connections\
    \ as the database grows. A project and budget may require links to `tasks`, `timesheets`,\
    \ and `invoices`. The connections required will vary based on the database’s purpose\
    \ and the type of tables included in the object model. A relationship is defined\
    \ when a developer decides a connection found in reality needs to be rendered\
    \ in the digital object model and explicitly specifies the field criteria used\
    \ to compare and match values between records.\n\nRelationships make it possible\
    \ to create navigable links between records in related tables. They also create\
    \ a `relational context` between tables which can be used by calculations, layouts,\
    \ and scripts to access or display field values from various tables. Relationships\
    \ transform a bunch of isolated tables into an interconnected network of information\
    \ that can be dynamically accessed, displayed, and manipulated in numerous ways.\
    \ `Fields` use a relationship when they pull related values to perform lookups,\
    \ auto-enter calculations, or validation (Chapter [8](#429700_2_En_8_Chapter.xhtml)).\
    \ `Formulas` use them to access or manipulate related fields to calculate results\
    \ (Chapter [12](#429700_2_En_12_Chapter.xhtml)). `Layouts` can display individual\
    \ fields from related records or include a list of related records as a portal\
    \ from another table (Chapter [20](#429700_2_En_20_Chapter.xhtml)). Layout objects\
    \ can use values from related fields in calculation formulas for conditional formatting,\
    \ placeholder text, script parameters, tooltips, and hide functions (Chapter [21](#429700_2_En_21_Chapter.xhtml)).\
    \ Numerous `script steps` use relationships in formulas or when referencing a\
    \ field (Chapters [24](#429700_2_En_24_Chapter.xhtml) and [25](#429700_2_En_25_Chapter.xhtml)).\
    \ Users can select fields from related tables in dialogs when manually exporting,\
    \ importing, searching, and sorting.\n\n> **Tip**  \n> While most relationships\
    \ establish a connection between two `different` tables, it is possible to connect\
    \ records to other records in the `same` table or to connect a record to itself,\
    \ called a `self-join`.\n\n## Visualizing Relationships\n\nA `match field` is\
    \ any field used to form one side of the criteria for a relationship. Two match\
    \ fields pair together with an operator to form a single criterion for defining\
    \ a relationship. Any field can be used as a match field, although most relationships\
    \ use keys. A `key field` is a field that uniquely identifies a record in a table.\
    \ While many fields are candidates, a good choice for a key is one that is `both\
    \ unique and unchanging`. For example, although a `Contact` record’s email address\
    \ field is unique to a person, it can change if the person’s work changes or they\
    \ move to a new service provider for a personal account. This makes it a poor\
    \ candidate for a relational key because a change would sever the connection between\
    \ previously linked records. Because of this, most developers establish a field\
    \ that stores an automatically entered, anonymous, incremental, unique, and unchanging\
    \ identification number as a standard practice in every table. This can be a simple\
    \ auto-entered serial number (Chapter [8](#429700_2_En_8_Chapter.xhtml), “Field\
    \ Options: Auto-Enter”) or a more complex Universally Unique Identifier (Chapter\
    \ [8](#429700_2_En_8_Chapter.xhtml), “Defining Default Fields”). These serve as\
    \ a `primary key`, a key field that contains a value that identifies a record\
    \ in the same table the field is defined. For example, a `Record ID` field in\
    \ a `Company` table stores a primary key that identifies a specific company record,\
    \ e.g., “1105” for Widgets Manufacturing. When a primary key is placed in a field\
    \ where it identifies a record in another table in order to form a relationship,\
    \ it is called a `foreign key` because it identifies a record foreign to the table\
    \ containing it. Together, a primary key field and foreign key field form the\
    \ basis for most relationships. Since these often create a hierarchical relationship,\
    \ they are often referred to as a `parent-child connection`, as illustrated in\
    \ Figure [9-1](#429700_2_En_9_Chapter.xhtml#Fig1). In this example, the `Record\
    \ ID` is the primary key of a `Company`, and the `Contact Company ID` field in\
    \ `Contact` table contains a foreign key. When the values in both fields are equal,\
    \ a relational link is formed between two records.\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig1_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig1_HTML.jpg)\n\
    \n**Figure 9-1** An illustration of a single key field pair forming a relationship\n\
    \nEach relationship must include at least one set of match fields but can include\
    \ additional criteria. When more than one match field pair is defined, records\
    \ will only link when `all` criteria match. The example illustrated in Figure\
    \ [9-2](#429700_2_En_9_Chapter.xhtml#Fig2) shows an additional set of fields,\
    \ a `Company Contact Portal Filter` in `Company` and a `Contact Address State`\
    \ in `Contact`. These second match fields would allow a user viewing a company\
    \ record to select a state from a list, and that would be used to “filter” the\
    \ list of contacts in a portal view, so it only displays those with an address\
    \ in that state (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Filtering Portal\
    \ Records”).\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig2_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig2_HTML.jpg)\n\
    \n**Figure 9-2** An illustration of a relationship established by two match fields\n\
    \nRelationships fall into one of the three general classifications named based\
    \ on the number of matching records possible on each side: `one-to-one`, `one-to-many`,\
    \ and `many-to-many`. FileMaker has a unique `multi-key option` that can be used\
    \ to create one-to-many or many-to-many connections. These configurations can\
    \ be enforced at the field validation level and/or through interface mechanisms\
    \ that physically limit what can be selected or inserted into a key field. Another\
    \ option is a `Cartesian join` that relates every record in one table to every\
    \ record in another. These are set up at the relationship settings level with\
    \ an operator."
  raw: '## Introducing Relationships


    A *relationship* defines a connection between tables that forms a context of bidirectional
    conduits that link individual records in one table to one or more individual records
    in another. As a digital model of real-world phenomenon, a database uses *tables*
    to represent entities, *fields* to store properties of entities, and *relationships*
    to reflect how those entities connect or interact.


    Consider how the relationship between a company and employees would be modeled
    in a database. Each can be represented by a table: *Company* and *Contact*. Fields
    are created in each to store properties about the entities that are important
    for database work. For example, a company’s *address*, *description*, *industry*,
    *name*, and *website* would be fields. Similarly, a contact’s *email*, *name*,
    *phones,* and *title* would be fields. Next, looking at how these two relate in
    reality, we can identify the need for a connection between them. Each company
    may employ one or more people, and conversely, each person is typically employed
    by a company. From this, we can define at least one relationship requirement in
    the database: each *Contact* record will require the option to be connected to
    a *Company* record. A person can be linked as an employee of a company, and conversely,
    a company can have one or more people linked as employees.


    Every table created in a database adds a potential for more connections. For example,
    companies may need links to *inventory*, *projects*, *budgets*, *assets,* and
    *procedures,* while contacts may need links to *phones*, *emails,* and *web addresses*.
    Each of those imply more connections as the database grows. A project and budget
    may require links to *tasks*, *timesheets,* and *invoices*. The connections required
    will vary based on the database’s purpose and the type of tables included in the
    object model. A relationship is defined when a developer decides a connection
    found in reality needs to be rendered in the digital object model and explicitly
    specifies the field criteria used to compare and match values between records.


    Relationships make it possible to create navigable links between records in related
    tables. They also create a *relational context* between tables which can be used
    by calculations, layouts, and scripts to access or display field values from various
    tables. Relationships transform a bunch of isolated tables into an interconnected
    network of information that can be dynamically accessed, displayed, and manipulated
    in numerous ways. *Fields* use a relationship when they pull related values to
    perform lookups, auto-enter calculations, or validation (Chapter [8](#429700_2_En_8_Chapter.xhtml)).
    *Formulas* use them to access or manipulate related fields to calculate results
    (Chapter [12](#429700_2_En_12_Chapter.xhtml)). *Layouts* can display individual
    fields from related records or include a list of related records as a portal from
    another table (Chapter [20](#429700_2_En_20_Chapter.xhtml)). Layout objects can
    use values from related fields in calculation formulas for conditional formatting,
    placeholder text, script parameters, tooltips, and hide functions (Chapter [21](#429700_2_En_21_Chapter.xhtml)).
    Numerous *script steps* use relationships in formulas or when referencing a field
    (Chapters [24](#429700_2_En_24_Chapter.xhtml) and [25](#429700_2_En_25_Chapter.xhtml)).
    Users can select fields from related tables in dialogs when manually exporting,
    importing, searching, and sorting.


    Tip


    While most relationships establish a connection between two *different* tables,
    it is possible to connect records to other records in the *same* table or to connect
    a record to itself, called a *self-join*.


    ### Visualizing Relationships


    A *match field* is any field used to form one side of the criteria for a relationship.
    Two match fields pair together with an operator to form a single criterion for
    defining a relationship. Any field can be used as a match field, although most
    relationships use keys. A *key field* is a field that uniquely identifies a record
    in a table. While many fields are candidates, a good choice for a key is one that
    is *both unique and unchanging*. For example, although a *Contact* record’s email
    address field is unique to a person, it can change if the person’s work changes
    or they move to a new service provider for a personal account. This makes it a
    poor candidate for a relational key because a change would sever the connection
    between previously linked records. Because of this, most developers establish
    a field that stores an automatically entered, anonymous, incremental, unique,
    and unchanging identification number as a standard practice in every table. This
    can be a simple auto-entered serial number (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    “Field Options: Auto-Enter”) or a more complex Universally Unique Identifier (Chapter
    [8](#429700_2_En_8_Chapter.xhtml), “Defining Default Fields”). These serve as
    a *primary key*, a key field that contains a value that identifies a record in
    the same table the field is defined. For example, a *Record ID* field in a *Company*
    table stores a primary key that identifies a specific company record, e.g., “1105”
    for Widgets Manufacturing. When a primary key is placed in a field where it identifies
    a record in another table in order to form a relationship, it is called a *foreign
    key* because it identifies a record foreign to the table containing it. Together,
    a primary key field and foreign key field form the basis for most relationships.
    Since these often create a hierarchical relationship, they are often referred
    to as a *parent-child connection*, as illustrated in Figure [9-1](#429700_2_En_9_Chapter.xhtml#Fig1).
    In this example, the *Record ID* is the primary key of a *Company,* and the *Contact
    Company ID* field in *Contact* table contains a foreign key. When the values in
    both fields are equal, a relational link is formed between two records.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig1_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    An illustration of a single key field pair forming a relationship


    Each relationship must include at least one set of match fields but can include
    additional criteria. When more than one match field pair is defined, records will
    only link when *all* criteria match. The example illustrated in Figure [9-2](#429700_2_En_9_Chapter.xhtml#Fig2)
    shows an additional set of fields, a *Company Contact Portal Filter* in *Company*
    and a *Contact Address State* in *Contact*. These second match fields would allow
    a user viewing a company record to select a state from a list, and that would
    be used to “filter” the list of contacts in a portal view, so it only displays
    those with an address in that state (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Filtering Portal Records”).


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig2_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig2_HTML.jpg)


    Figure 9-2


    An illustration of a relationship established by two match fields


    Relationships fall into one of the three general classifications named based on
    the number of matching records possible on each side: *one-to-one*, *one-to-many,*
    and *many-to-many*. FileMaker has a unique *multi-key option* that can be used
    to create one-to-many or many-to-many connections. These configurations can be
    enforced at the field validation level and/or through interface mechanisms that
    physically limit what can be selected or inserted into a key field. Another option
    is a *Cartesian join* that relates every record in one table to every record in
    another. These are set up at the relationship settings level with an operator.'
  trans: "\n# 引入关系\n\n*关系*定义了表之间的连接，形成双向通道的上下文，将一个表中的单个记录链接到另一个表中的一个或多个单个记录。作为现实世界现象的数字化模型，数据库使用`tables`来表示实体，`fields`来存储实体的属性，并使用`relationships`来反映这些实体如何连接或交互。\n\
    \n考虑一下公司与员工之间的关系如何在数据库中进行建模。每个实体可以由一个表表示：`Company`和`Contact`。在每个表中创建字段，用于存储对数据库工作重要的实体属性。例如，公司的`address`、`description`、`industry`、`name`和`website`可以作为字段。同样，联系人的`email`、`name`、`phones`和`title`也可以作为字段。接下来，观察这两个实体在现实中的关联方式，我们可以确定它们之间存在连接的需要。每个公司可能雇佣一个或多个人员，反之，每个人员通常受雇于一家公司。由此，我们可以在数据库中定义至少一个关系需求：每条`Contact`记录需要能够连接到一条`Company`记录。一个人可以链接为公司的员工，反之，一家公司可以有一个或多个人员被链接为员工。\n\
    \n数据库中创建的每个表都增加了更多连接的可能性。例如，公司可能需要链接到`inventory`、`projects`、`budgets`、`assets`和`procedures`，而联系人可能需要链接到`phones`、`emails`和`web\
    \ addresses`。随着数据库的增长，这些都意味着更多的连接。一个项目和预算可能需要链接到`tasks`、`timesheets`和`invoices`。所需连接将根据数据库的目的以及对象模型中包含的表类型而有所不同。当开发者决定需要将现实中发现的连接呈现在数字化对象模型中，并明确指定用于比较和匹配记录之间值的字段条件时，就定义了一个关系。\n\
    \n关系使得在相关表的记录之间创建可导航的链接成为可能。它们还在表之间创建了一个`relational context`，可由计算、布局和脚本使用，以访问或显示来自不同表的字段值。关系将一组孤立的表转化为一个互联的信息网络，可以通过多种方式动态访问、显示和操作。`Fields`在拉取相关值以执行查找、自动输入计算或验证时会使用关系（参见第\
    \ 8 章）。`Formulas`使用它们来访问或操作相关字段以计算结果（参见第 12 章）。`Layouts`可以显示来自相关记录的单个字段，或包括一个来自其他表的相关记录列表作为门户（参见第\
    \ 20 章）。布局对象可以在用于条件格式、占位符文本、脚本参数、工具提示和隐藏功能的计算公式中使用相关字段的值（参见第 21 章）。许多`script steps`在公式中或引用字段时会使用关系（参见第\
    \ 24 章和第 25 章）。用户在手动导出、导入、搜索和排序时，可以在对话框中选择来自相关表的字段。\n\n> **提示**  \n> 虽然大多数关系是在两个`不同`的表之间建立连接，但也可以将记录连接到`同一个`表中的其他记录，或者将记录连接到自身，这称为`自连接`。\n\
    \n## 可视化关系\n\n`匹配字段`是用于形成关系条件一方的任何字段。两个匹配字段与一个运算符配对，形成定义关系的单一条件。任何字段都可以用作匹配字段，尽管大多数关系使用键。`键字段`是唯一标识表中一条记录的字段。虽然许多字段都是候选，但键的良好选择是`既唯一又不变`的。例如，尽管`Contact`记录的电子邮件地址字段对个人是唯一的，但如果个人的工作发生变化或他们因个人账户更换了服务提供商，它可能会改变。这使其不适合作为关系键，因为更改会切断先前链接的记录之间的连接。因此，大多数开发者会建立一个字段，用于存储自动输入、匿名、递增、唯一且不变的标识号，并将其作为每个表的标准实践。这可以是一个简单的自动输入序列号（第\
    \ 8 章，\"字段选项：自动输入\"），或更复杂的通用唯一标识符（第 8 章，\"定义默认字段\"）。这些字段充当`主键`，主键字段包含一个值，用于标识该字段所在表中同一表的记录。例如，`Company`表中的`Record\
    \ ID`字段存储了标识特定公司记录的主键，例如\"1105\"代表 Widgets Manufacturing。当一个主键被放入另一个表中用于标识该表中的记录以形成关系时，它被称为`外键`，因为它标识的是所在表外部的记录。主键字段和外键字段共同构成了大多数关系的基础。由于这些通常创建层级关系，所以常常被称为`父子连接`，如图\
    \ 9-1 所示。在此示例中，`Record ID`是`Company`的主键，而`Contact`表中的`Contact Company ID`字段包含一个外键。当两个字段中的值相等时，就在两条记录之间形成了关系链接。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig1_HTML.jpg](img/429700_2_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1** 单个键字段对形成关系的示意图\n\n每个关系必须包含至少一组匹配字段，但可以包含附加条件。当定义了多对匹配字段时，记录仅在`所有`条件都匹配时才会链接。图\
    \ 9-2 所示的示例展示了另一组字段：`Company`中的`Company Contact Portal Filter`和`Contact`中的`Contact\
    \ Address State`。这些第二匹配字段允许查看公司记录的用户从列表中选择一个州，该州将用于“筛选”门户视图中的联系人列表，使其仅显示地址在该州的联系人（参见第\
    \ 20 章，“筛选门户记录”）。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig2_HTML.jpg](img/429700_2_En_9_Fig2_HTML.jpg)\n\
    \n**图 9-2** 由两个匹配字段建立的关系示意图\n\n关系可分为三大类，根据每一侧可能匹配的记录数量命名：`一对一`、`一对多`和`多对多`。FileMaker\
    \ 有一个独特的`多键选项`，可用于创建一对多或多对多连接。这些配置可以在字段验证级别和/或通过物理限制可选定或插入到键字段中的内容的接口机制来强制执行。另一个选项是`笛卡尔连接`，它将一个表中的每条记录与另一个表中的每条记录相关联。这些可以在关系设置级别使用运算符进行设置。\n"
- fmt: '# 一对一关系


    一对一关系是一种连接，其中一个表中的一条记录只能与另一个表中的一条记录匹配。图[9-3](#429700_2_En_9_Chapter.xhtml#Fig3)中的示例展示了一组匹配的记录，其中`Contact`记录的主`Record
    ID`作为外键输入到`Cubicle`记录的`Contact ID`字段中。分配的方向性是可选的，因为对于哪个实体是主实体、哪个是次实体没有固有要求。作为开发者，你可以选择*要么*如图所示将隔间分配给人员，*要么*将人员分配给隔间，具体取决于你的偏好或其他后勤考虑。设置要求对两个键字段进行验证，以确保其包含在各自表中的所有记录中唯一的值。因此，在所示的示例中，每个联系人只能分配一个隔间，且每个隔间只能分配一个联系人。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig3_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig3_HTML.jpg)


    图9-3 展示一对一连接


    # 一对多关系


    一对多关系是一种连接，其中一个表中的一条记录可以与另一个表中的一条或多条记录匹配。图[9-4](#429700_2_En_9_Chapter.xhtml#Fig4)中的示例展示了一组匹配的记录，其中`Company`的主`Record
    ID`作为外键输入到`Contact`表中两条记录的`Contact Company ID`字段中。这种关系类型经常使用，因为现实世界中存在许多一个实体可以与多个实体关联的情况。一家公司可能有多个办事处、产品和员工。一个人可能有多个电话号码、电子邮件地址和网页。一个父母可以有多个孩子。最后一个例子正是这种安排常被比喻性地称为*父子*类型关系的原因，因为从生物学角度，一个孩子只有一个父亲或一个母亲，但任何一个父母都可以有多个孩子。设置要求对主键字段进行验证，以确保其包含单一、唯一的值，而另一个表中的外键字段允许非唯一值。分配的方向性取决于这样一个事实：多的一方必须包含来自具有唯一主键的表的那个外键。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig4_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig4_HTML.jpg)


    图9-4 展示一对多连接


    # 多对多关系


    多对多关系是一种连接，其中*两个表*上的记录都可以与来自另一个表的一条或多条记录连接。这通常通过使用联接表来实现。*联接表*是第三个表，主要作为连接点，在两个相关表之间进行连接转换。因此，它们有时被称为*连接表*。一个联接表至少包含*两个外键字段*，每个字段包含来自被联接的两个表中一个表的主键。图[9-5](#429700_2_En_9_Chapter.xhtml#Fig5)中的示例展示了使用联接表的这种关系。`Table
    1`和`Table 2`的主键分别输入到联接表一条记录的外键字段中，从而在两个表之间建立连接。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig5_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig5_HTML.jpg)


    图9-5 展示通过联接表实现的多对多连接


    多对多关系的一个示例是，当需要将一个人与其*当前*雇主连接起来，同时保持与其*过去*雇主的连接时，在公司和联系人之间建立连接，如图[9-6](#429700_2_En_9_Chapter.xhtml#Fig6)所示。在此示例中，`Company`表和`Contact`表通过一个名为`Contact
    Employer`的联接表连接。“Widgets Manufacturing”的`Company`记录连接到两个联接记录，每个联接记录又连接到一个联系人记录，一个给Jim，一个给Karen。而Jim的记录只与一个联接记录有单一连接，Karen的`Contact`记录则连接回两家公司：“Widgets
    Manufacturing”和“Zen Historical Artifacts”。使用联接表允许任一侧的记录链接到另一侧的任意数量的记录。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig6_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig6_HTML.jpg)


    图9-6 展示多对多关系中的连接


    严格来说，联接表并不是一个*单一*关系，因为它实际上由两个一对多关系组成。然而，它通常被称为*一个关系*，特别是当联接表仅用于促进两个普通表之间更广泛的连接时。在这种情况下，联接表只包含这两个字段，并且完全隐藏于视图中，没有用户可访问的界面。但是，联接*可以*包含特定于这两个实体联合的额外字段。例如，某个特定公司的联系人的电话号码和电子邮件地址可以存储在联接表记录中。它们还可以根据需要拥有界面，甚至与其它表连接。


    # FileMaker 独特的多键选项


    FileMaker 具有使用包含多个值的键字段来定义关系的独特能力。*多键字段*是一个文本或计算字段，包含一个由回车符分隔的键列表，用作关系中的匹配字段。当匹配字段包含由回车符分隔的值时，每个段落都被视为其自己的值并用于形成匹配，因此一个字段中的*任何*一个值如果能在另一个字段中找到，就会匹配并形成关系连接。多键字段可用于创建一对多关系或多对多关系，*无需*借助中间的联接表。图[9-7](#429700_2_En_9_Chapter.xhtml#Fig7)中的示例通过展示两个表之间使用多键字段作为两侧匹配字段的连接，演示了这种技术。`Table
    1`第一条记录中的字段在`Table 2`中找到了*三个*匹配的记录，尽管没有一个字段包含所有相同的值。当至少一个段落值在两侧都存在时，就会形成匹配。设置多键多对多关系要求匹配字段是允许包含多个值且不需要验证唯一值的文本字段（或返回文本值的计算字段）。虽然此示例使用了州名，但任何值，包括序列号，都可以使用。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig7_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig7_HTML.jpg)


    图9-7 多键字段关系连接的插图


    这种技术有利有弊。例如，没有像联接表那样的交叉表可以在其中添加字段或构建布局，因此如果需要这样做，这不是一个好的选择。然而，在复制记录时，由于键存储在本地而不是单独的联接表中，关系连接会得以保留。因此，如果复制图[9-7](#429700_2_En_9_Chapter.xhtml#Fig7)中`Table
    1`的第一条记录，它将保留与另一个表中记录的所有相同连接。'
  raw: '#### One-to-One Relationship


    A *one-to-one relationship* is a connection where a record in either table can
    only be matched to a single record in the other. The example in Figure [9-3](#429700_2_En_9_Chapter.xhtml#Fig3)
    illustrates one set of matched records where a *Contact* record’s primary *Record
    ID* is entered as a foreign key in the *Cubicle* record’s *Contact ID* field.
    The directionality of assignment is optional as there is no inherent requirement
    for which entity is primary and which secondary. As a developer, you can choose
    *either* a cubicle assigned to a person as shown *or* a person assigned to a cubicle,
    depending on your preference or other logistical considerations. The setup requires
    both key fields to be validated to contain a single value that is unique across
    all records within their respective tables. So, in the example shown, each contact
    can only be assigned a single cubicle, and each cubicle can only be assigned one
    contact.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig3_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Illustrating a one-to-one connection


    #### One-to-Many Relationship


    A *one-to-many relationship* is a connection where a record in one table can be
    matched to one or more records in another. The example in Figure [9-4](#429700_2_En_9_Chapter.xhtml#Fig4)
    illustrates one set of matched records where a *Company* primary *Record ID* has
    been entered as a foreign key into the *Contact Company ID* field of two records
    in a *Contact* table. This type of relationship is used often due to the number
    of real-world situations where an entity can relate to multiple entities. A company
    may have multiple offices, products, and employees. A person may have multiple
    phone numbers, email addresses, and web pages. A parent can have many children.
    This last example is why this arrangement is often referred to metaphorically
    as a *parent-child*-type relationship since, biologically, a child has only one
    father or one mother, but either one parent can have many children. The setup
    requires the primary key field to be validated to contain a single, unique value,
    while the foreign key field in the other table allows non-unique values. The directionality
    of assignment is dictated by the fact that the many side must contain the foreign
    key from the table containing the unique primary key.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig4_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Illustrating a one-to-many connection


    #### Many-to-Many Relationship


    A *many-to-many* *relationship* is a connection where records on *both tables*
    can be connected to one or more records from the other. This is typically done
    by using a join table. A *join table* is a third table that exists primarily as
    a junction point, pivoting the connection between two related tables. Because
    of this, they are sometimes called *junction tables*. A join table has at least
    *two foreign key fields*, each containing a primary key from one of the two tables
    being joined. The example in Figure [9-5](#429700_2_En_9_Chapter.xhtml#Fig5) illustrates
    such a relationship using a join table. The primary key from both *Table 1* and
    *Table 2* are each entered in a foreign key field on a single record in the join
    table, establishing a connection between the two tables.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig5_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Illustrating a many-to-many connection through a join table


    An example of a many-to-many relationship is found connecting a company to contacts
    when there is a need to connect a person to their *current* employer while maintaining
    connections to their *past* employers, as illustrated in Figure [9-6](#429700_2_En_9_Chapter.xhtml#Fig6).
    In this example, a *Company* table and a *Contact* table are connected through
    a join table named *Contact Employer* . The “Widgets Manufacturing” *Company*
    record has a connection to two join records that each connect to a contact record,
    one for Jim and one for Karen. While Jim’s record has only a single connection
    to one join record, Karen’s *Contact* record connects back to two companies: “Widgets
    Manufacturing” and “Zen Historical Artifacts.” The use of the join table allows
    a record on either side to link to any number of records on the other side.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig6_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Illustrating connections with a many-to-many relationship


    Technically, a join table is not a *single* relationship since it really consists
    of two one-to-many relationships. However, it is often referred to as *one relationship*,
    especially when a join table exists only to facilitate the wider connection of
    two regular tables. In those cases, the join table contains only the two fields
    and is completely hidden from view and has no user accessible interface. However,
    joins *can* include additional fields that are specific to the union of the two
    entities. For example, a phone number and email address for the contact at a particular
    company could be stored in a join table record. They can also have interfaces
    and even connections to other tables as needed.


    #### FileMaker’s Unique Multi-key Option


    FileMaker has the unique ability to define a relationship using a key field containing
    multiple values. A *multi-key field* is a text or calculation field that contains
    a return-delimited list of keys used as a match field in a relationship. When
    a match field contains values separated by a return, each paragraph is treated
    as its own value and used to form a match, so the presence of *any* one value
    from one field found in the other will match and form a relational connection.
    Multi-key fields can be used to create a one-to-many relationship or a many-to-many
    relationship *without* the need for an intervening join table. The example in
    Figure [9-7](#429700_2_En_9_Chapter.xhtml#Fig7) demonstrates this technique by
    showing a connection between two tables using a multi-key field as the match field
    on both sides. The field in the first record of *Table 1* finds *three* matching
    records in *Table 2* even though none of the fields contain all the same values.
    Matches are formed when at least one paragraph value is found on both sides. Setting
    up a multi-key, many-to-many relationship requires the match fields to be a text
    field (or a calculation field returning a text value) that allows multiple values
    and does not validate to require unique values. Although this example uses state
    names, any value, including serial numbers, can be used.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig7_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig7_HTML.jpg)


    Figure 9-7


    An illustration of a multi-key field relational connection


    There are pros and cons to this technique. For example, there is no intersecting
    table in which to add fields or build layouts like with a join table so this isn’t
    a good choice if that is required. However, relational connections are retained
    when duplicating a record since the keys are contained locally instead of in a
    separate join table. So, if the first record in *Table 1* in Figure [9-7](#429700_2_En_9_Chapter.xhtml#Fig7)
    were duplicated, it would retain all the same connections to records in the other
    table.'
