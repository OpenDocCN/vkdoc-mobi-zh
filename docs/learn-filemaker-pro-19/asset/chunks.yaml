- fmt: '### Opening a Database File


    When *opening a database file*, the following events will be triggered in order:

    1. `OnFirstWindowOpen`

    2. `OnWindowOpen`

    3. `OnLayoutEnter`

    4. `OnModeEnter`

    5. `OnRecordLoad`


    **Caution:** While not a script trigger, the file’s option to *Switch to layout*
    when the file is opened occurs prior to all script triggers (Chapter [6](#429700_2_En_6_Chapter.xhtml),
    “File Options: Open”).


    ### Committing a Record with Unsaved Changes


    When *committing a record with unsaved changes*, the following events will be
    triggered in order:

    1. `OnObjectValidate`

    2. `OnObjectSave`

    3. `OnObjectExit`

    4. `OnRecordCommit`

    5. `OnRecordLoad`

    6. `OnObjectEnter`


    ### Opening a New Window


    When *opening a new window*, the following events will be triggered in order:

    1. `OnWindowOpen`

    2. `OnLayoutEnter`

    3. `OnModeEnter`

    4. `OnRecordLoad`

    5. `OnLayoutSizeChange`


    ### Changing Layouts


    When *changing layouts*, the following events will be triggered in this order:

    1. `OnLayoutExit`

    2. `OnLayoutEnter`

    3. `OnRecordLoad`


    **Note:** When *changing layouts* in a window displaying a record with unsaved
    changes, the record commit sequence will be performed first followed by the changing
    layout sequence.


    ## Accessing Targets Before Event Completion


    As noted previously, many events trigger scripts before the event is completed,
    providing the option to halt the effects of the event before they are implemented.
    However, this means that the results of the action have not yet been realized
    and aren’t discernable to the script from the interface by normal means. For example,
    the `OnObjectKeystroke` event is triggered when a user types a character into
    the field. However, the script runs before the character is entered into the field,
    so pulling the field value into a formula in a script step will not include the
    most recent keystroke which triggered the script. Similarly, the `OnPanelSwitch`
    event happens before the target panel is activated. Since there is no corresponding
    event that occurs after the switch, ascertaining the target panel may be required
    in order for a script to take a particular course of action.


    FileMaker provides a set of built-in *Get* functions specifically designed to
    provide information about events so that information can be accessed and used
    by the triggered script. For example, the `Get ( TriggerCurrentPanel )` and `Get
    ( TriggerTargetPanel )` each return the number and name of the current and target
    panel as two return-delimited lists. The `Get ( TriggerKeystroke )` will return
    the last key typed not yet in the field on a `OnObjectKeystroke` event, and the
    `Get ( TriggerModifierKeys )` returns a number indicating any modifier key(s)
    the user is holding down when they typed. For example, if the user is holding
    the Shift key, this will return a “1,” while holding the Option key will return
    “8.” When key combinations are held, the result is the sum of the numbers representing
    those keys, e.g., holding Shift and Option returns “9.”


    For *events* that don’t have access to target information, switch from a pre-event
    trigger to a post-event trigger. For example, there is no function available to
    determine the next target object in a script triggered by `OnObjectExit`, so try
    switching to `OnObjectEnter` since it happens after the change has occurred.


    **Caution:** These target-determining functions will only work within the target
    script, *not* as a parameter sent to the script from the object.


    ## Avoiding Trigger Exceptions


    Some object changes will *not* trigger events. For example, most of the built-in
    *Spelling* and *Find/Replace* functions, especially when performed across found
    sets, will not trigger events such as `OnObjectModify`, `OnObjectValidate`, and
    `OnObjectSave`. Also, since functions like `Import Records`, `Replace Field Contents`,
    and `Relookup Field Contents` modify table data directly, they won’t trigger interface
    events. Similarly, script steps like `Set Field`, `Set Field by Name`, and `Set
    Web Viewer` are not triggering events. Be sure to consider all possible actions
    that users or scripts may perform and, where necessary, lock out functions or
    use alternative steps in your scripts to ensure that critical functionality is
    triggered. For example, use the `Insert Text` or `Insert Calculated Result` script
    steps instead of `Set Field` if the field in question has critical triggers assigned
    on the layout. When non-triggering steps can’t be avoided, add steps to programmatically
    trigger the relevant target scripts, or add steps to explicitly perform the desired
    functionality. Alternatively, don’t use script triggers excessively, especially
    in situations where they aren’t absolutely required and may create unnecessary
    complexities when excluded by these exceptions.


    ## Summary


    This chapter continued the discussion of scripting, focusing on how interface
    events can trigger scripts. In the next chapter, we will explore how plug-ins
    can extend the built-in functions and script steps available.


    # 28. Extending Features with Plug-ins


    A *plug-in* is a software extension package developed that extends the capabilities
    of FileMaker by adding new functions and script steps. They can also modify the
    development interface with new options. Plug-ins for FileMaker are available from
    third-party vendors, which means they involve an added expense and logistical
    considerations for installing and maintaining them over time. However, a good
    plug-in can be worth the effort since the features they provide would be difficult
    or impossible to achieve using only built-in tools. This chapter covers basic
    plug-in concepts including:

    - Finding plug-ins

    - Installing plug-ins

    - Accessing plug-ins


    ## Finding Plug-ins


    Plug-ins for FileMaker can be found from a variety of different vendors. Start
    by searching the Claris Marketplace (`marketplace.claris.com`), and take a look
    at some other prominent offerings directly available from the developer website.


    ### MonkeyBread Software


    The MBS plug-in from Monkey Bread Software ([www.monkeybreadsoftware.com](http://www.monkeybreadsoftware.com))
    boasts over 6,000 functions. The impressive feature list includes enhancements
    to the Script Workspace, connectivity features, OS integration, and content editing.
    Some highlights include:

    - Syntax coloring

    - Search in scripts, lists, or relationships

    - CURL for up/downloads, send/receive e-mail

    - Accessing scanners

    - Access to Address book, Calendars, and Reminders

    - Window management functions

    - Send user notifications

    - Control printers

    - Convert images, draw, and annotate

    - Create, edit, or merge PDF documents

    - Generate and recognize barcodes

    - Read and write Excel files

    - Fill Word files


    ### Productive Computing


    The Productive Computing plug-in offerings ([www.productivecomputing.com](http://www.productivecomputing.com))
    include:

    - **Address Book Manipulator** – Enables bidirectional data flow between a database
    and the macOS Contacts application

    - **iCal Manipulator** – Enables bidirectional data flow between a database and
    the macOS Calendar application

    - **Biometric Fingerprint Reader** – Adds the ability to incorporate fingerprint
    security and script control options to a database


    ### Prometheus Systems Consulting


    Prometheus Systems Consulting sells dozens of plug-ins (`360works.com`), including:

    - **360Works Email** – Send and receive email messages within a database. Supports
    SMTP, POP, and IMAP.

    - **360Works Plastic** – Enables credit card processing within a database. Supports
    both Authorize.net and Verisign/PayPal Payflow.

    - **360Works Web Services Manager** – Publishes your custom FileMaker scripts
    as XML Web Services that can be accessed by SOAP (Simple Object Access Protocol)–compatible
    software.'
  raw: '### Opening a Database File


    When *opening a database file* , the following events will be triggered in order:


    1.  OnFirstWindowOpen


    2.  OnWindowOpen


    3.  OnLayoutEnter


    4.  OnModeEnter


    5.  OnRecordLoad


    Caution


    While not a script trigger, the file’s option to *Switch to layout* when the file
    is opened occurs prior to all script triggers (Chapter [6](#429700_2_En_6_Chapter.xhtml),
    “File Options: Open”).


    ### Committing a Record with Unsaved Changes


    When *committing a record with unsaved changes*, the following events will be
    triggered in order:


    1.  OnObjectValidate


    2.  OnObjectSave


    3.  OnObjectExit


    4.  OnRecordCommit


    5.  OnRecordLoad


    6.  OnObjectEnter


    ### Opening a New Window


    When *opening a new window* , the following events will be triggered in order:


    1.  OnWindowOpen


    2.  OnLayoutEnter


    3.  OnModeEnter


    4.  OnRecordLoad


    5.  OnLayoutSizeChange


    ### Changing Layouts


    When *changing layouts* , the following events will be triggered in this order:


    1.  OnLayoutExit


    2.  OnLayoutEnter


    3.  OnRecordLoad


    Note


    When c*hanging layouts* in a window displaying a record with unsaved changes,
    the record commit sequence will be performed first followed by the changing layout
    sequence.


    ## Accessing Targets Before Event Completion


    As noted previously, many events trigger scripts before the event is completed,
    providing the option to halt the effects of the event before they are implemented.
    However, this means that the results of the action have not yet been realized
    and aren’t discernable to the script from the interface by normal means. For example,
    the *OnObjectKeystroke* event is triggered when a user types a character into
    the field. However, the script runs before the character is entered into the field,
    so pulling the field value into a formula in a script step will not include the
    most recent keystroke which triggered the script. Similarly, the *OnPanelSwitch*
    event happens before the target panel is activated. Since there is no corresponding
    event that occurs after the switch, ascertaining the target panel may be required
    in order for a script to take a particular course of action.


    FileMaker provides a set of built-in *Get* `functions specifically designed to
    provide information about events so that information can be accessed and used
    by the triggered script. For example, the` *Get ( TriggerCurrentPanel )* `and`
    *Get ( TriggerTargetPanel )* `each return the number and name of the current and
    target panel as two return-delimited lists. The` *Get ( TriggerKeystroke )* will
    return the last key typed not yet in the field on a *OnObjectKeystroke* event,
    and the *Get ( TriggerModifierKeys )* returns a number indicating any modifier
    key(s) the user is holding down when they typed. For example, if the user is holding
    the Shift key, this will return a “1,” while holding the Option key will return
    “8.” When key combinations are held, the result is the sum of the numbers representing
    those keys, e.g., holding Shift and Option returns “9.”


    *For events* that don’t have access to target information, switch from a pre-event
    trigger to a post-event trigger. For example, there is no function available to
    determine the next target object in a script triggered by *OnObjectExit,* so try
    switching to *OnObjectEnter* since it happens after the change has occurred.


    Caution


    These target-determining functions will only work within the target script, *not*
    as a parameter sent to the script from the object.


    ## Avoiding Trigger Exceptions


    Some object changes will *not* trigger events. For example, most of the built-in
    *Spelling* and *Find/Replace* functions, especially when performed across found
    sets, will not trigger events such as *OnObjectModify*, *OnObjectValidate*, and
    *OnObjectSave*. Also, since functions like *Import Records*, *Replace Field Contents*,
    and *Relookup Field Contents* modify table data directly, they won’t trigger interface
    events. Similarly, script steps like *Set Field*, *Set Field by Name*, and *Set
    Web Viewer* are not triggering events. Be sure to consider all possible actions
    that users or scripts may perform and, where necessary, lock out functions or
    use alternative steps in your scripts to ensure that critical functionality is
    triggered. For example, use the *Insert Text* or *Insert Calculated Result* script
    steps instead of *Set Field* if the field in question has critical triggers assigned
    on the layout. When non-triggering steps can’t be avoided, add steps to programmatically
    trigger the relevant target scripts, or add steps to explicitly perform the desired
    functionality. Alternatively, don’t use script triggers excessively, especially
    in situations where they aren’t absolutely required and may create unnecessary
    complexities when excluded by these exceptions.


    ## Summary


    This chapter continued the discussion of scripting, focusing on how interface
    events can trigger scripts. In the next chapter, we will explore how plug-ins
    can extend the built-in functions and script steps available.


    # 28. Extending Features with Plug-ins


    A *plug-in* is a software extension package developed that extends the capabilities
    of FileMaker by adding new functions and script steps. They can also modify the
    development interface with new options. Plug-ins for FileMaker are available from
    third-party vendors, which means they involve an added expense and logistical
    considerations for installing and maintaining them over time. However, a good
    plug-in can be worth the effort since the features they provide would be difficult
    or impossible to achieve using only built-in tools. This chapter covers basic
    plug-in concepts including


    *   Finding plug-ins


    *   Installing plug-ins


    *   Accessing plug-ins


    ## Finding Plug-ins


    Plug-ins for FileMaker can be found from a variety of different vendors. Start
    by searching the Claris Marketplace (marketplace.claris.com), and take a look
    at some other prominent offerings directly available from the developer website.


    ### MonkeyBread Software


    *The MBS* plug-in *from Monkey Bread Software* *(*[`www.monkeybreadsoftware.com`](http://www.monkeybreadsoftware.com)*)
    boasts* over 6,000 functions. The impressive feature list includes enhancements
    to the Script Workspace, connectivity features, OS integration, and content editing.
    Some highlights include


    *   Syntax coloring


    *   Search in scripts, lists, or relationships


    *   CURL for up/downloads, send/receive e-mail


    *   Accessing scanners


    *   Access to Address book, Calendars, and Reminders


    *   Window management functions


    *   Send user notifications


    *   Control printers


    *   Convert images, draw, and annotate


    *   Create, edit, or merge PDF documents


    *   Generate and recognize barcodes


    *   Read and write Excel files


    *   Fill Word files


    ### Productive Computing


    The *Productive Computing* plug-in offerings ([`www.productivecomputing.com`](http://www.productivecomputing.com))
    include


    *   *Address Book Manipulator* – Enables bidirectional data flow between a database
    and the macOS Contacts application


    *   *iCal Manipulator* – Enables bidirectional data flow between a database and
    the macOS Calendar application


    *   *Biometric Fingerprint Reader* – Adds the ability to incorporate fingerprint
    security and script control options to a database


    ### Prometheus Systems Consulting


    *Prometheus Systems Consulting* sells dozens of plug-ins (*360works.com*), including


    *   *360Works Email* – Send and receive email messages within a database. Supports
    SMTP, POP, and IMAP.


    *   *360Works Plastic* – Enables credit card processing within a database. Supports
    both Authorize.net and Verisign/PayPal Payflow.


    *   *360Works Web Services Manager* – Publishes your custom FileMaker scripts
    as XML Web Services that can be accessed by SOAP (Simple Object Access Protocol)–compatible
    software.'
  trans: '

    ### 打开数据库文件


    当 *打开数据库文件* 时，将按顺序触发以下事件：

    1. `OnFirstWindowOpen`

    2. `OnWindowOpen`

    3. `OnLayoutEnter`

    4. `OnModeEnter`

    5. `OnRecordLoad`


    **注意：** 虽然这不是脚本触发器，但文件打开时“*切换布局*”的选项会在所有脚本触发器之前执行（第 6 章，“文件选项：打开”）。


    ### 提交包含未保存更改的记录


    当 *提交包含未保存更改的记录* 时，将按顺序触发以下事件：

    1. `OnObjectValidate`

    2. `OnObjectSave`

    3. `OnObjectExit`

    4. `OnRecordCommit`

    5. `OnRecordLoad`

    6. `OnObjectEnter`


    ### 打开新窗口


    当 *打开新窗口* 时，将按顺序触发以下事件：

    1. `OnWindowOpen`

    2. `OnLayoutEnter`

    3. `OnModeEnter`

    4. `OnRecordLoad`

    5. `OnLayoutSizeChange`


    ### 切换布局


    当 *切换布局* 时，将按此顺序触发以下事件：

    1. `OnLayoutExit`

    2. `OnLayoutEnter`

    3. `OnRecordLoad`


    **注意：** 当在显示包含未保存更改记录的窗口中 *切换布局* 时，将首先执行记录提交序列，然后执行切换布局序列。


    ## 在事件完成前访问目标


    如前所述，许多事件会在事件完成前触发脚本，从而提供在事件效果实施前将其阻止的选项。然而，这意味着操作的结果尚未实现，并且脚本无法通过界面的常规方式识别这些结果。例如，当用户在字段中输入字符时，会触发
    `OnObjectKeystroke` 事件。然而，脚本会在字符输入到字段之前运行，因此在脚本步骤中将字段值拉入公式将不会包含最近触发脚本的按键操作。类似地，`OnPanelSwitch`
    事件发生在目标面板被激活之前。由于切换之后没有对应的事件发生，因此脚本可能需要确定目标面板才能执行特定的操作路径。


    FileMaker 提供了一组内置的 *Get* 函数，专门用于提供有关事件的信息，以便触发的脚本可以访问和使用这些信息。例如，`Get ( TriggerCurrentPanel
    )` 和 `Get ( TriggerTargetPanel )` 分别以两个由回车符分隔的列表形式返回当前面板和目标面板的编号和名称。`Get ( TriggerKeystroke
    )` 将返回导致 `OnObjectKeystroke` 事件的、尚未进入字段的最后一个按键，而 `Get ( TriggerModifierKeys )`
    返回一个数字，指示用户在键入时按下的任何修饰键。例如，如果用户按住 Shift 键，将返回“1”，而按住 Option 键将返回“8”。当按住组合键时，结果是代表这些键的数字之和，例如，同时按住
    Shift 和 Option 将返回“9”。


    对于无法访问目标信息的 *事件*，请从事件前触发器切换到事件后触发器。例如，没有可用的函数来确定由 `OnObjectExit` 触发的脚本中的下一个目标对象，因此尝试切换到
    `OnObjectEnter`，因为它发生在更改发生之后。


    **注意：** 这些目标确定函数仅在目标脚本内有效，*而不会*作为从对象发送到脚本的参数。


    ## 避免触发器异常


    某些对象更改将 *不会* 触发事件。例如，大多数内置的 *拼写* 和 *查找/替换* 功能，尤其是在查找集中执行时，不会触发诸如 `OnObjectModify`、`OnObjectValidate`
    和 `OnObjectSave` 等事件。此外，由于像 `导入记录`、`替换字段内容` 和 `重新查询字段内容` 之类的功能会直接修改表数据，它们不会触发界面事件。类似地，像
    `设置字段`、`按名称设置字段` 和 `设置 Web 查看器` 这样的脚本步骤也不会触发事件。请务必考虑用户或脚本可能执行的所有操作，并在必要时锁定相关功能或在脚本中使用替代步骤，以确保关键功能被触发。例如，如果布局上的相关字段分配了关键触发器，请使用
    `插入文本` 或 `插入计算结果` 脚本步骤代替 `设置字段`。当无法避免非触发步骤时，请添加步骤以编程方式触发相关的目标脚本，或添加步骤以显式执行所需功能。或者，不要过度使用脚本触发器，尤其是在并非绝对必要的情况下，否则当这些异常排除了触发器时，可能会造成不必要的复杂性。


    ## 总结


    本章继续讨论了脚本编写，重点关注界面事件如何触发脚本。在下一章中，我们将探讨插件如何扩展可用的内置函数和脚本步骤。


    # 28. 使用插件扩展功能


    *插件* 是一个软件扩展包，通过添加新函数和脚本步骤来扩展 FileMaker 的功能。它们还可以通过新的选项来修改开发界面。FileMaker 的插件由第三方供应商提供，这意味着它们会带来额外的费用以及在长期安装和维护方面的物流考量。然而，一个好的插件是值得付出努力的，因为它们提供的功能使用仅内置工具很难或不可能实现。本章涵盖了基本的插件概念，包括：

    - 寻找插件

    - 安装插件

    - 访问插件


    ## 寻找插件


    FileMaker 的插件可以在不同的供应商处找到。首先搜索 Claris Marketplace (`marketplace.claris.com`)，然后查看开发者网站上直接提供的其他一些主要产品。


    ### MonkeyBread Software


    来自 Monkey Bread Software ([www.monkeybreadsoftware.com](http://www.monkeybreadsoftware.com))
    的 MBS 插件拥有超过 6000 个函数。其令人印象深刻的功能列表包括对脚本工作区的增强、连接功能、操作系统集成以及内容编辑。一些亮点包括：

    - 语法着色

    - 在脚本、列表或关系中搜索

    - 用于上传/下载、发送/接收电子邮件的 CURL

    - 访问扫描仪

    - 访问通讯录、日历和提醒事项

    - 窗口管理功能

    - 发送用户通知

    - 控制打印机

    - 转换图像、绘图和批注

    - 创建、编辑或合并 PDF 文档

    - 生成和识别条形码

    - 读写 Excel 文件

    - 填充 Word 文件


    ### Productive Computing


    Productive Computing 插件产品 ([www.productivecomputing.com](http://www.productivecomputing.com))
    包括：

    - **Address Book Manipulator** – 实现数据库与 macOS 通讯录应用程序之间的双向数据流

    - **iCal Manipulator** – 实现数据库与 macOS 日历应用程序之间的双向数据流

    - **Biometric Fingerprint Reader** – 增加将指纹安全和脚本控制选项集成到数据库中的能力


    ### Prometheus Systems Consulting


    Prometheus Systems Consulting 销售数十种插件 (`360works.com`)，包括：

    - **360Works Email** – 在数据库内发送和接收电子邮件。支持 SMTP、POP 和 IMAP。

    - **360Works Plastic** – 在数据库内实现信用卡处理。支持 Authorize.net 和 Verisign/PayPal Payflow。

    - **360Works Web Services Manager** – 将您的自定义 FileMaker 脚本发布为可由兼容 SOAP（简单对象访问协议）的软件访问的
    XML Web 服务。

    '
- fmt: '### Troi Automatisering


    Troi Automatisering offers several plug-ins ([www.troi.com](http://www.troi.com)),
    including:


    - `Troi Dialog` – Create dynamic, feature-rich dialogs

    - `Troi Encryptor` – Generate passwords and save them in the keychain

    - `Troi File` – Access files and folders outside FileMaker, zip and unzip files
    and folders, search directories, and more


    ## Installing Plug-ins


    Each computer accessing a database with plug-in functions must have the plug-in
    installed locally. However, installation resources can be embedded in and installed
    from a database file, either in a separate installer database or directly within
    a database solution. Some plug-in vendors deliver plug-ins embedded inside of
    an installer database.


    To prepare a custom database to install a plug-in, create a container field for
    each plug-in installer. This may require more than one if the database is used
    in a cross-platform workflow of different operating systems. Create a script that
    uses the `Install Plug-in File` step like the following example which uses `Set
    Variable` to put a list of installed plug-ins into a variable named `$installed`
    and then uses the `PatternCount` function to determine if the `Troi File Plug-in`
    needs to be installed or updated. If so, it uses `Get ( SystemPlatform )` to determine
    if it should install the macOS or Windows plug-in.


    ```

    Set Variable [ $installed ; Value : Get ( InstalledFMPlugins ) ]

    If [ PatternCount ( $installed ; "Troi File Plug-in;8.0.2" ) = "" ]

    If [ Get ( SystemPlatform ) = 1 ]

    Install Plug-in File [ Resources::Troi_File.fmplugin ]

    Else

    Install Plug-in File [ Resources::Troi_File.fmx]

    End if

    End if

    ```


    The script can run automatically as part of a startup script triggered by an `OnFirstWindowOpen`
    event (Chapter [29](#429700_2_En_29_Chapter.xhtml)) to ensure that each user’s
    computer has a proper installation. The script can be expanded to check for errors
    to confirm that the installation process was successful and warn the user to contact
    a database administrator if a problem was detected. For example, the script will
    fail if the `Application` preference to `Allow Solutions` `to Install Files` is
    not enabled. The `Plug-ins` tab of the `Application` preferences dialog, shown
    in Figure [28-1](#429700_2_En_28_Chapter.xhtml#Fig1), lists every installed plug-in.
    From here, you can confirm installation, enable, disable, and configure a plug-in.


    ![../images/429700_2_En_28_Chapter/429700_2_En_28_Fig1_HTML.jpg](images/429700_2_En_28_Chapter/429700_2_En_28_Fig1_HTML.jpg)


    Figure 28-1


    The preference tab showing installed plug-ins must allow installation


    ## Accessing Plug-in Functions


    Once installed, a plug-in’s functions will appear as a new category in either
    the `Functions` pane of `Specify Calculation` dialogs or the `Steps` pane of the
    `Script Workspace`. Some plug-ins appear in both lists, as shown in Figure [28-2](#429700_2_En_28_Chapter.xhtml#Fig2).
    From here, plug-in functions can be easily inserted into formulas (Chapter [12](#429700_2_En_12_Chapter.xhtml))
    and scripts (Chapter [24](#429700_2_En_24_Chapter.xhtml)) like functions or steps.


    ![../images/429700_2_En_28_Chapter/429700_2_En_28_Fig2_HTML.jpg](images/429700_2_En_28_Chapter/429700_2_En_28_Fig2_HTML.jpg)


    Figure 28-2


    Plug-ins appear in the Steps pane of the Script Workspace (back) and/or in the
    Functions pane of the Specify Calculation window (front)


    ## Summary


    This chapter presented the basic process for finding, installing, and accessing
    plug-ins. In the next chapter, we begin an introduction to network sharing.


    # Part VI – Deploying, Securing, and Analyzing Files


    These final chapters cover the basics of deploying, network sharing, security,
    and some advanced tools:


    1.  Deploying and Accessing Databases

    2.  Defining Accounts and Permissions

    3.  Analyzing and Modifying Files


    # 29. Deploying and Accessing Databases


    When finished developing, it is time to deploy your database into the target workflow.
    There are three primary choices for deployment: in a folder directory, on an iOS
    device, or on a host server. Each option has different benefits, and the choice
    affects who can access the file, how, and from where. Each product in the FileMaker
    family has different capabilities for deployment and access (see Chapter [1](#429700_2_En_1_Chapter.xhtml),
    “Reviewing the Product Line”). In this chapter, we explore these options, introducing
    specific topics related to deploying and accessing a solution, including:


    - Deploying to a folder directory

    - Deploying to an iOS device

    - Sharing databases on a network

    - Hosting with FileMaker Server

    - Hosting with FileMaker Cloud

    - Accessing solutions externally


    ## Deploying to a Folder Directory


    The easiest deployment method is to store a database in a folder directory. With
    access to the folder, the `FileMaker Pro` desktop application can open and use
    the database. This provides a lot of convenience, since the database can be moved
    between folders or duplicated for reuse as simply as a word processing or Excel
    document. While this is an easy and useful option for a single user, opportunities
    for sharing are limited. The database can be shared by sending a copy to coworkers,
    but each person will have their own isolated copy of the file without the benefits
    of collaborative, simultaneous use. It can be placed in a folder on a networked
    file server; however, this is not recommended because each copy of the desktop
    application reading and writing to the same file at the same time will cause file
    corruption that may be catastrophic (Chapter [6](#429700_2_En_6_Chapter.xhtml),
    “Avoiding File Damage”). Similarly, services like Dropbox or Google Drive may
    corrupt files when syncing even with a single user. The `FileMaker Pro` desktop
    app can safely share a file opened from a local folder by acting as a proper host
    with peer-to-peer sharing (described later in this chapter). However, that is
    limited to five simultaneous connections by other users with access limited to
    FileMaker products. However, if sharing isn’t an important consideration, using
    a database from a local folder is a suitable option. Just make sure the file is
    closed before moving it to another folder and keep it in a folder that other users
    can’t access.'
