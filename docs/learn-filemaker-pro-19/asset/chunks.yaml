- fmt: "# Exploring the Tab Control Setup Dialog\n\nTabs are configured using the\
    \ *Tab Control Setup* dialog, which automatically opens when a new tab control\
    \ is created. This dialog, shown in Figure [20-42](#429700_2_En_20_Chapter.xhtml#Fig42),\
    \ can be accessed later by double-clicking anywhere on a panel of a tab control\
    \ or by selecting the *Tab Control Setup* item from the *Format* menu or the tab\
    \ control’s contextual menu.\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig42_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig42_HTML.jpg)\n\
    \nFigure 20-42\n\nThe dialog used to define a tab control\n\nThe controls available\
    \ on the dialog are:\n\n1.  *Tabs* – Lists each tab defined for the object. Drag\
    \ to reorder.\n2.  *Tab Name* – Type a name when creating a new panel or edit\
    \ the name of the selected tab. Click *Specify* to define a formula-driven name.\n\
    3.  *Create* – Click to create a new tab based on the preceding name.\n4.  *Rename*\
    \ – Click to save the selected tab’s modified name.\n5.  *Delete* – Delete the\
    \ selected tab(s).\n6.  *Default Front Tab* – Select a default tab selection when\
    \ the window is refreshed.\n7.  *Tab Justification* – Select the justification\
    \ of the tab’s labels.\n8.  *Tab Width* – Select the width of the tabs:\n    -\
    \ *Label Width* – The width varies based on each label name.\n    - *Label Width\
    \ + a Margin of* – The width varies based on each label name plus the specified\
    \ margin in pixels.\n    - *Width of Widest Label* – Use uniform widths based\
    \ on the longest label name.\n    - *Minimum of* – The width based on each label\
    \ name above the specified minimum.\n    - *Fixed Width of* – Use uniform widths\
    \ based on a specified width.\n9.  *Tabs Share Single Style* – Maintain design\
    \ uniformity between tabs with a single theme style (Chapter [22](#429700_2_En_22_Chapter.xhtml)).\n\
    \n## Slide Control\n\nA *slide control* is a multi-panel layout object where panels\
    \ are accessed by swiping left or right on an iOS device or by clicking a navigation\
    \ dot, as shown in Figure [20-43](#429700_2_En_20_Chapter.xhtml#Fig43). Functionally,\
    \ they are similar to tab controls but without the tab labels. Create a new slide\
    \ control by choosing the *Insert ➤ Slide Control* menu or clicking on the toolbar\
    \ icon and choose *Slide Control*.\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig43_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig43_HTML.jpg)\n\
    \nFigure 20-43\n\nAn example of a three-panel slide control\n\n### Exploring the\
    \ Slide Control Setup Dialog\n\nSlide controls are configured using the *Slide\
    \ Control Setup* dialog, which automatically opens when a new control is created.\
    \ This dialog, shown in Figure [20-44](#429700_2_En_20_Chapter.xhtml#Fig44), can\
    \ be opened later by double-clicking on the background of a slide control or choosing\
    \ *Slide Control Setup* from the *Format* menu or the slide control contextual\
    \ menu.\n\nThe setup dialog has panel controls used to add, remove, or navigate\
    \ to a specific panel using the buttons. The checkboxes control iOS swipe gestures\
    \ and the visibility of navigation dots so users on a macOS or Windows computer\
    \ can click to other panels when swiping isn’t an option.\n\n> **Tip**\n> \n>\
    \ Panels can also be reordered in Layout mode by dragging the navigation dots.\n\
    \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig44_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig44_HTML.jpg)\n\
    \nFigure 20-44\n\nThe dialog used to configure a slide control\n\n## Working with\
    \ Portals\n\nA *portal* is a layout object that displays a list of records from\
    \ a table occurrence related to the current layout’s occurrence. Portals resemble\
    \ a List view but are embedded as an object on a layout to display a group of\
    \ records with an optional scroll bar. A *portal row* represents one related record\
    \ and can include fields and other layout objects. Figure [20-45](#429700_2_En_20_Chapter.xhtml#Fig45)\
    \ shows an example of a *Contact* portal as it would appear on a *Company* layout.\
    \ Depending on the portal setup, users can add, delete, edit, view, or click a\
    \ button to navigate to a specific contact record. Portals have many styling options\
    \ similar to List views, allowing an *active row* to be styled differently and\
    \ alternating styles to help visually separate inactive rows.\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig45_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig45_HTML.jpg)\n\
    \nFigure 20-45\n\nAn example of a portal showing contact records\n\n### Exploring\
    \ the Portal Setup Dialog\n\nTo create a new portal, choose the *Insert ➤ Portal*\
    \ menu or select the tool in the toolbar. Portals are configured using the *Portal\
    \ Setup* dialog, which automatically opens when a new portal is created. This\
    \ dialog, shown in Figure [20-46](#429700_2_En_20_Chapter.xhtml#Fig46), can be\
    \ opened later by double-clicking anywhere on the background of a portal or selecting\
    \ *Portal Setup* from the Format menu or the portal’s contextual menu.\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig46_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig46_HTML.jpg)\n\
    \nFigure 20-46\n\nThe dialog used to configure a portal\n\nThe table occurrence\
    \ selected from the *Show records from* pop-up menu acts as the *data source*\
    \ for the portal. The four checkboxes and adjacent controls are used to configure\
    \ sorting, filtering, and other functions available to the user in the portal.\
    \ The *Allow deletion of portal records* checkbox allows users to delete a selected\
    \ portal row with the `Delete` key. For a more intuitive experience and to avoid\
    \ accidental deletions, disable this and create a custom *Delete* button in the\
    \ portal row. Allow scrolling when the number of records exceeds the number of\
    \ visible rows, optionally showing the scrollbar always or only when a user is\
    \ scrolling. The *Reset scroll bar when exiting record* option will automatically\
    \ scroll back to the first row when the record is committed instead of retaining\
    \ the user’s current scroll position.\n\nThe *Format* settings at the bottom allow\
    \ control over which related records appear in the portal and which style options\
    \ apply. The *Initial row* accepts a number indicating the first row that should\
    \ be displayed with any related records preceding that being omitted from view.\
    \ The *Number of rows* indicates how many related records to include in the portal\
    \ at its minimum size. Any related records after the *first* will still be included\
    \ in the portal but are only accessible by scrolling if enabled or if the portal\
    \ is configured to expand in size when the window dimensions change. The alternate\
    \ and active row states will apply style settings (Chapter [22](#429700_2_En_22_Chapter.xhtml))\
    \ to differently format every other row and the currently selected row to provide\
    \ visual clarity."
