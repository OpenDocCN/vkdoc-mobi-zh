- fmt: "###### Inline Editing with Pop-up Menu\n\nA step with an *inline pop-up menu*\
    \ allows a choice between several possible options. These can be identified by\
    \ a value between the square brackets and the appearance of a blue border outlining\
    \ the current value when the cursor hovers over it. Click on it to reveal a pop-up\
    \ menu of other values. Each of these states is shown in Figure [24-13](#429700_2_En_24_Chapter.xhtml#Fig13).\n\
    \n![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig13_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig13_HTML.jpg)\n\
    \nFigure 24-13\n\nA pop-up menu at rest (top), with hover (middle), and with active\
    \ focus (bottom)\n\n##### Configuring Steps with an Options Dialog\n\nA step uses\
    \ a *dialog or panel* when the available configuration options are too numerous\
    \ or in some way not conducive to inline editing. While many are unique to the\
    \ step, some open standard dialogs, e.g., *Specify Field* and *Specify Calculation*.\
    \ Some dialogs present a few simple options, while others summarize settings alongside\
    \ buttons that open additional dialogs. Some open an independent dialog window,\
    \ others open a popover panel that remains connected to the step. The method of\
    \ opening an options interface also varies between steps. A step that has a configuration\
    \ dialog will display a gear icon to the right of its statement when the cursor\
    \ hovers over it. Clicking this icon will open the options interface, like the\
    \ *Set Variable* dialog shown in Figure [24-14](#429700_2_En_24_Chapter.xhtml#Fig14).\n\
    \n![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig14_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig14_HTML.jpg)\n\
    \nFigure 24-14\n\nA step without the cursor over it (left, top), with the cursor\
    \ over it (left, bottom), and the options dialog opened by clicking it (right)\n\
    \nIn the preceding example, the *Set Variable* step will initialize a variable\
    \ with a specified value. A *Name* can be typed directly into the first field\
    \ which establishes the variable whose value will change. The *Value* to be placed\
    \ in the variable can be typed directly into the field or entered in a full *Specify\
    \ Formula* dialog accessed by clicking the adjacent *Specify* button. The same\
    \ is true of the *Repetition* option. See Chapter [25](#429700_2_En_25_Chapter.xhtml),\
    \ “Setting Variables” for more specifics about this step.\n\nInstead of a full\
    \ dialog, some steps open a popover panel of options, as shown in Figure [24-15](#429700_2_En_24_Chapter.xhtml#Fig15).\
    \ Like dialogs, panels may include directly editable settings and buttons that\
    \ open other dialogs. In this example, the *Enter Find Mode* step opens a simple\
    \ panel that contains a button which opens the standard *Find Request* dialog\
    \ (Chapter [4](#429700_2_En_4_Chapter.xhtml), “Editing a Find Request”). Unlike\
    \ dialogs, which typically have OK and Cancel buttons, changes made in these panels\
    \ are saved immediately. A popover can be closed by clicking on the script workspace\
    \ outside of the panel’s boundaries or typing the Return or Enter key.\n\n![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig15_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig15_HTML.jpg)\n\
    \nFigure 24-15\n\nA popover streamlines the selection of options for some steps\n\
    \n> **Tip**\n> \n> Many steps have multiple active regions that combine configuration\
    \ styles.\n\n##### Specifying Targets\n\nMany script steps require you to specify\
    \ a target using dialogs. Some steps require a variable and present a version\
    \ of the *Set Variable Options* dialog, described previously. A handful require\
    \ a field selection using the *Specify Field* dialog (Chapter [20](#429700_2_En_20_Chapter.xhtml),\
    \ “Exploring the Specify Field Dialog”). Many present a *Specify Path* dialog\
    \ (described later in this chapter). In addition to these, many steps use the\
    \ *Specify Target* dialog, shown in Figure [24-16](#429700_2_En_24_Chapter.xhtml#Fig16),\
    \ allowing specification of a field or variable. In recent versions, this dialog\
    \ has replaced the *Specify Field* option for a lot of script steps. For example,\
    \ most of the available *Insert* steps have been converted to this dialog, and\
    \ many of the newer *Data File* steps us it as well. This dialog allows the selection\
    \ of either a field or entry of a variable name, while the script step that opens\
    \ it also provides access to a *Specify Calculation* dialog that determines the\
    \ value to be inserted into that target.\n\n![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig16_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig16_HTML.jpg)\n\
    \nFigure 24-16\n\nSpecifying a target field (left) and variable (right)\n\n####\
    \ Script Comments\n\nA *script comment* is a text note placed into a script as\
    \ a nonfunctional step. Comments appear as a line of text with a preceding pound\
    \ or hash symbol. These are used to provide inline documentation, describing the\
    \ function of a script or of a group of steps. When combined with empty comments,\
    \ they help to separate sections of a script and avoid visual clutter, as shown\
    \ in Figure [24-17](#429700_2_En_24_Chapter.xhtml#Fig17). When a comment is added\
    \ to a script without any content, it becomes a blank line.\n\n![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig17_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig17_HTML.jpg)\n\
    \nFigure 24-17\n\nA script with several comments that document and steps\n\n>\
    \ **Tip**\n> \n> Multiline comment can be created by typing Return while holding\
    \ down the Option key (macOS) or Alt key (Windows).\n\n## Specifying File Paths\n\
    \nThere are many instances in the development interface where file paths must\
    \ be specified. This can be found when managing data sources (Chapter [9](#429700_2_En_9_Chapter.xhtml))\
    \ and script steps such as *Import Records*, *Export Records*, *Save Records as\
    \ Excel*, *Save Records as PDF*, *New File*, *Open File*, *Read from Data File*,\
    \ and more (Chapter [25](#429700_2_En_25_Chapter.xhtml)). Paths are entered into\
    \ a *Specify File* dialog, shown in Figure [24-18](#429700_2_En_24_Chapter.xhtml#Fig18).\
    \ The *File Path List* text area of this dialog can contain one or more return-delimited\
    \ paths. If more than one is entered, FileMaker will check each one, in the order\
    \ entered, until it finds a valid path pointing to an existing file.\n\n![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig18_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig18_HTML.jpg)\n\
    \nFigure 24-18\n\nThe dialog for specifying a file path\n\n### Formatting Paths\n\
    \nAs indicated by the examples displayed on the dialog, paths can be entered using\
    \ various formats to point to a file in a local directory, server folder directory,\
    \ or at a FileMaker Server network address. Properly formatting a path can be\
    \ tricky, especially when addressing files in a local directory relative to the\
    \ database location. There are various prefixes that can be mixed and matched\
    \ with different path format types. If a path is incorrectly entered or the target\
    \ file is moved after a path has been defined, a file missing error will occur\
    \ when FileMaker attempts to access it. To avoid mistyping a complex path, use\
    \ the *Add Files* button and subsequent *Open File* dialog to select a file and\
    \ allow FileMaker to formulate the best path option automatically. You can always\
    \ edit them later if necessary.\n\n#### Path Prefixes\n\nA *path prefix* indicates\
    \ a specific file type and/or operating system:\n\n- `file`, `image`, `or` `movie`\
    \ – A generic, cross-platform file path.\n- `filemac`, `imagemac`, `moviemac`\
    \ – A path to an item on a macOS computer.\n- `filewin`, `imagewin`, `moviewin`\
    \ – A path to an item on a Windows computer.\n- `filenet` – A path to a database\
    \ hosted on a FileMaker Server, regardless of the host’s platform. If both the\
    \ source and the target database are located on the same server, the `file` prefix\
    \ will suffice, regardless of the folder structure on the server.\n\n#### Path\
    \ Types\n\nFileMaker paths can be created as a *relative path*, *full path*, *network\
    \ path* (Windows), and *network address path* (FileMaker Server)."
  raw: '###### Inline Editing with Pop-up Menu


    A step with an *inline pop-up menu* allows a choice between several possible options.
    These can be identified by a value between the square brackets and the appearance
    of a blue border outlining the current value when the cursor hovers over it. Click
    on it to reveal a pop-up menu of other values. Each of these states is shown in
    Figure [24-13](#429700_2_En_24_Chapter.xhtml#Fig13).


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig13_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig13_HTML.jpg)


    Figure 24-13


    A pop-up menu at rest (top), with hover (middle), and with active focus (bottom)


    ##### Configuring Steps with an Options Dialog


    A step uses a *dialog or panel* when the available configuration options are too
    numerous or in some way not conducive to inline editing. While many are unique
    to the step, some open standard dialogs, e.g., *Specify Field* and *Specify Calculation*.
    Some dialogs present a few simple options, while others summarize settings alongside
    buttons that open additional dialogs. Some open an independent dialog window,
    others open a popover panel that remains connected to the step. The method of
    opening an options interface also varies between steps. A step that has a configuration
    dialog will display a gear icon to the right of its statement when the cursor
    hovers over it. Clicking this icon will open the options interface, like the *Set
    Variable* dialog shown in Figure [24-14](#429700_2_En_24_Chapter.xhtml#Fig14).


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig14_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig14_HTML.jpg)


    Figure 24-14


    A step without the cursor over it (left, top), with the cursor over it (left,
    bottom), and the options dialog opened by clicking it (right)


    In the preceding example, the *Set Variable* step will initialize a variable with
    a specified value. A *Name* can be typed directly into the first field which establishes
    the variable whose value will change. The *Value* to be placed in the variable
    can be typed directly into the field or entered in a full *Specify Formula* dialog
    accessed by clicking the adjacent *Specify* button. The same is true of the *Repetition*
    option. See Chapter [25](#429700_2_En_25_Chapter.xhtml), “Setting Variables” for
    more specifics about this step.


    Instead of a full dialog, some steps open a popover panel of options, as shown
    in Figure [24-15](#429700_2_En_24_Chapter.xhtml#Fig15). Like dialogs, panels may
    include directly editable settings and buttons that open other dialogs. In this
    example, the *Enter Find Mode* step opens a simple panel that contains a button
    which opens the standard *Find Request* dialog (Chapter [4](#429700_2_En_4_Chapter.xhtml),
    “Editing a Find Request”). Unlike dialogs, which typically have OK and Cancel
    buttons, changes made in these panels are saved immediately. A popover can be
    closed by clicking on the script workspace outside of the panel’s boundaries or
    typing the Return or Enter key.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig15_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig15_HTML.jpg)


    Figure 24-15


    A popover streamlines the selection of options for some steps


    Tip


    Many steps have multiple active regions that combine configuration styles.


    ##### Specifying Targets


    Many script steps require you to specify a target using dialogs. Some steps require
    a variable and present a version of the *Set Variable Options* dialog, described
    previously. A handful require a field selection using the *Specify Field* dialog
    (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Exploring the Specify Field Dialog”).
    Many present a *Specify Path* dialog (described later in this chapter). In addition
    to these, many steps use the *Specify Target* dialog, shown in Figure [24-16](#429700_2_En_24_Chapter.xhtml#Fig16),
    allowing specification of a field or variable. In recent versions, this dialog
    has replaced the *Specify Field* option for a lot of script steps. For example,
    most of the available *Insert* steps have been converted to this dialog, and many
    of the newer *Data File* steps us it as well. This dialog allows the selection
    of either a field or entry of a variable name, while the script step that opens
    it also provides access to a *Specify Calculation* dialog that determines the
    value to be inserted into that target.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig16_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig16_HTML.jpg)


    Figure 24-16


    Specifying a target field (left) and variable (right)


    #### Script Comments


    A *script comment* is a text note placed into a script as a nonfunctional step.
    Comments appear as a line of text with a preceding pound or hash symbol. These
    are used to provide inline documentation, describing the function of a script
    or of a group of steps. When combined with empty comments, they help to separate
    sections of a script and avoid visual clutter, as shown in Figure [24-17](#429700_2_En_24_Chapter.xhtml#Fig17).
    When a comment is added to a script without any content, it becomes a blank line.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig17_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig17_HTML.jpg)


    Figure 24-17


    A script with several comments that document and steps


    Tip


    Multiline comment can be created by typing Return while holding down the Option
    key (macOS) or Alt key (Windows).


    ## Specifying File Paths


    There are many instances in the development interface where file paths must be
    specified. This can be found when managing data sources (Chapter [9](#429700_2_En_9_Chapter.xhtml))
    and script steps such as *Import Records*, *Export Records*, *Save Records as
    Excel*, *Save Records as PDF*, *New File*, *Open File*, *Read from Data File*,
    and more (Chapter [25](#429700_2_En_25_Chapter.xhtml)). Paths are entered into
    a *Specify File* dialog, shown in Figure [24-18](#429700_2_En_24_Chapter.xhtml#Fig18).
    The *File Path List* text area of this dialog can contain one or more return-delimited
    paths. If more than one is entered, FileMaker will check each one, in the order
    entered, until it finds a valid path pointing to an existing file.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig18_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig18_HTML.jpg)


    Figure 24-18


    The dialog for specifying a file path


    ### Formatting Paths


    As indicated by the examples displayed on the dialog, paths can be entered using
    various formats to point to a file in a local directory, server folder directory,
    or at a FileMaker Server network address. Properly formatting a path can be tricky,
    especially when addressing files in a local directory relative to the database
    location. There are various prefixes that can be mixed and matched with different
    path format types. If a path is incorrectly entered or the target file is moved
    after a path has been defined, a file missing error will occur when FileMaker
    attempts to access it. To avoid mistyping a complex path, use the *Add Files*
    button and subsequent *Open File* dialog to select a file and allow FileMaker
    to formulate the best path option automatically. You can always edit them later
    if necessary.


    #### Path Prefixes


    A *path prefix* indicates a specific file type and/or operating system:


    *   *file,* *image,* `or` *movie* – A generic, cross-platform file path.


    *   *filemac,* *imagemac,* *moviemac* – A path to an item on a macOS computer.


    *   *filewin,* *imagewin,* *moviewin* – A path to an item on a Windows computer.


    *   *filenet* – A path to a database hosted on a FileMaker Server, regardless
    of the host’s platform. If both the source and the target database are located
    on the same server, the *file* prefix will suffice, regardless of the folder structure
    on the server.


    #### Path Types


    FileMaker paths can be created as a *relative path*, *full path*, *network path*
    (Windows), and *network address path* (FileMaker Server).'
