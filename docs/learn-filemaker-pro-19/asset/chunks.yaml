  trans: '

    ### 排除文件扩展名


    当指定 FileMaker 数据库时，文件扩展名是完全可选的。由于 FileMaker 文件扩展名未来可能发生变化，建议在路径中省略扩展名（或将其存储在全局变量中），以便日后能轻松更新数据库，而无需查找并编辑每个路径。例如，以下所有路径都会定位到同一个文件（最后一个路径假设
    `$$Extension` 变量包含 `.fmp12`）。


    ```

    filemac:/Macintosh HD/Users/john_smith/Documents/Test Target

    filemac:/Macintosh HD/Users/john_smith/Documents/Test Target.fmp12

    filemac:/Macintosh HD/Users/john_smith/Documents/Test Target$$Extension

    ```


    ### 转换路径


    在版本 19 中，新增了两个函数，可以更轻松地在操作系统路径格式和 FileMaker 路径之间进行转换。这免去了通过程序化解析公式来将路径转换为不同格式的繁琐工作。这两个函数都接受两个参数：一个*路径*和一个*格式*。两者的*格式*参数都可以是三个值之一，分别指示相应的源路径或目标路径格式：`PosixPath`、`URLPath`
    或 `WinPath`。


    ```

    ConvertToFileMakerPath ( "/Users/mmunro/Desktop/" ; PosixPath )

    // 结果 (macOS) = file:/Macintosh HD/Users/mmunro/Desktop/

    // 结果 (Windows) = file:/C:/Users/mmunro/Desktop/

    ConvertFromFileMakerPath ( "file:/Macintosh HD/Users/mmunro/Desktop/" ; PosixPath)

    // 结果 = /Users/mmunro/Desktop/

    ```


    ## 执行其他脚本


    `执行脚本`步骤允许一个脚本运行另一个脚本。这使得构建执行离散任务的模块化脚本成为可能，然后让更高级别的脚本按顺序运行它们。脚本可以调用调用其他脚本的脚本，从而创建复杂的层次化调用堆栈。脚本甚至可以调用自身，创建递归调用堆栈。将该步骤添加到脚本后，它会显示为一个未指定的脚本规范，如图
    24-19 所示。该步骤有两个活动区域。首先，*指定*值指示将定义对脚本的引用类型，这是一个由公式驱动的文本值，指示脚本的*名称*或从可用脚本列表中选择的*动态引用*。根据该选择，单击调用的脚本名称区域会打开相应的规范对话框，即*指定公式*或*指定脚本*对话框。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig19_HTML.jpg](img/429700_2_En_24_Fig19_HTML.jpg)


    图 24-19


    `执行脚本`步骤的选项


    **提示**


    按住 Command (macOS) 或 Windows (Windows) 键并单击`执行脚本`步骤的目标脚本，可在新标签页中自动打开已分配的脚本。


    ### 探索指定脚本对话框


    *指定脚本*对话框用于选择对脚本的引用，该脚本将作为按钮、界面事件触发器（第 27 章）或前面提到的`执行脚本`步骤的*目标操作*。该对话框如图 24-20
    所示，允许从当前文件或数据库中定义的任何 FileMaker 数据源（第 9 章）中选择脚本。可以定义一个可选的脚本参数，以伴随对所选脚本的调用。当将脚本分配给按钮或作为事件触发器时，此对话框包含三个按钮，可直接从对话框中添加、删除、编辑或复制脚本。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig20_HTML.jpg](img/429700_2_En_24_Fig20_HTML.jpg)


    图 24-20


    为按钮、脚本触发器或脚本步骤选择脚本


    脚本能够运行其他脚本，这允许更模块化的脚本设计。不必构建一个执行数十或数百步骤的单一庞大脚本，可以将一个流程分解为单独的脚本，每个脚本专注于特定任务。这使得建立层次结构成为可能，其中一些脚本执行开放的、基础的任务，这些任务可以被许多其他脚本共享，无论上下文如何。但是，在创建共享脚本功能的网状结构时，请务必管理好命名、组织和使用规则，以避免造成混乱的交叉调用。


    ### 在脚本之间交换数据


    脚本调用可以包含一个*参数*并接收一个*结果*，如图 24-21 所示，其中脚本 1 使用一个参数调用脚本 2，然后从该脚本的`退出脚本`步骤接收结果。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig21_HTML.jpg](img/429700_2_En_24_Fig21_HTML.jpg)


    图 24-21


    说明两个脚本之间的数据交换


    **警告**


    几十年前，全局字段和变量被用来在脚本调用前“暂存”数据，以促进过时的数据交换。在此之前，有些人为此目的使用剪贴板。然而，现在脚本之间的数据交换首选使用参数。


    #### 发送参数


    脚本参数是由触发对象发送给脚本的文本字符串。参数用于传输脚本可能因任何原因使用的任何信息。参数允许触发对象向脚本推送信息，这些信息可以在每次调用之间变化，而不是在脚本中硬编码字段引用或其他值。参数可以是单个单词、一个句子、一个值列表、一个字段名称、一个字段值，或包含复杂键值对数组的
    JSON 对象。它们可以作为字面值键入，也可以使用公式构造。为了说明参数的用法，创建一个脚本，该脚本使用配置了以下公式的`显示自定义对话框`脚本步骤，在对话框中显示传入的参数：


    ```

    Get ( ScriptParameter )

    ```


    接下来，创建一个按钮或第二个脚本，该脚本使用`执行脚本`函数，并在“可选的脚本参数”字段中键入一条短消息。当单击按钮或运行脚本时，目标脚本应显示一个对话框，显示作为参数发送的消息。


    #### 解析参数


    脚本参数是一个单一的值。但是，它可以通过使用回车符分隔的值列表、对重复字段的引用或 JSON 对象，以包含多个值的方式进行组织。当接收到代表多个组件的结构化信息时，脚本将需要解析这些值以便分别处理它们。为此，请使用一个或多个`设置变量`或`插入计算结果`步骤，将数据解析并暂存到单独的变量中。这可以通过
    `Let` 语句以及 `GetValue`、`GetRepetition` 或各种 JSON 函数来完成。以下示例演示了如何将包含三个值的值列表解析为单独的变量：


    ```

    Let ( [

    input = Get ( ScriptParameter ) ;

    $id = GetValue ( input ; 1 ) ;

    $name = GetValue ( input ; 2 ) ;

    $status = GetValue ( input ; 3 )

    ] ;

    ""

    )

    ```


    此示例将使用 `GetRepetition` 函数，从包含对定义了四个重复项的字段的引用的脚本参数中解析值。


    ```

    Let ( [

    field = Get ( ScriptParameter ) ;

    $id = GetRepetition ( field ; 1 ) ;

    $name = GetRepetition ( field; 2 ) ;

    $status = GetRepetition ( field; 3 ) ;

    $task = GetRepetition ( field; 4 )

    ] ;

    ""

    )

    ```


    虽然这两个示例解析了参数中固定数量的值，但也可以创建更动态的解析功能。如果值的数量或字段重复项的数量发生变化，则可能需要使用 `While` 函数（第 13
    章）语句或 `循环` 脚本步骤（第 25 章）来遍历它们。此外，递归自定义函数可以逐步处理每个值，并将其初始化到变量中。

