    \ (text)*\n\n*   *Company Description (text)*\n\n*   *Company Industry (text)*\n\
    \n*   *Company Website (text)*\n\n*   *Company Status (text)*\n\n### Defining\
    \ Contact Fields\n\nIn the *Contact* table, create the following fields:\n\n*\
    \   *Contact Name First (text)*\n\n*   *Contact Name Last (text)*\n\n*   *Contact\
