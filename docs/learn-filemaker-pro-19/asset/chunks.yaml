    ODBC 表（第 7 章）时，将需要额外的数据源。


    ### 介绍管理外部数据源对话框


    外部数据源在*管理外部数据源*对话框中创建、编辑和删除，如图 9-14 所示。可以通过选择`文件 ➤ 管理 ➤ 外部数据源`菜单访问此对话框。在开发界面各处出现的*指定表*对话框上的*数据源*弹出菜单底部也可以访问它。打开后，点击*新建*以打开*编辑数据源*对话框，并定义与外部数据源的新连接。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig14_HTML.jpg](img/429700_2_En_9_Fig14_HTML.jpg)


    **图 9-14** 用于管理外部数据源的对话框


    ### 探索编辑数据源对话框


    创建或编辑数据源在*编辑数据源*对话框中执行，如图 9-15 所示。此对话框从*管理外部数据源*对话框中通过点击*新建*、选择一个数据源并点击*编辑*，或直接双击列表中的数据源来打开。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig15_HTML.jpg](img/429700_2_En_9_Fig15_HTML.jpg)


    **图 9-15** 用于编辑所选数据源的对话框


    *名称*用于在整个开发界面的菜单中标识该源。*类型*选项根据目标数据源提供两种选择，并根据所选内容更改界面。本节剩余部分假定选择了*FileMaker*。*文件路径列表*用于指定指向目标数据源的一个或多个路径（第
    24 章，“指定文件路径”）。FileMaker 将连接到指向现有数据库文件的第一个路径。点击*添加文件*为所选文件自动添加路径，或手动输入一个。有关配置*ODBC*类型数据源的详细信息，请参阅第
    7 章，“从 ODBC 数据源添加表。”


    ## 介绍管理数据库对话框（关系）


    与表和字段类似，表出现和关系在*管理数据库*对话框中创建。选择`文件 ➤ 管理 ➤ 数据库`打开对话框，并确保选中*关系*选项卡，如图 9-16 所示。可滚动的白色区域是*关系图*，其中添加表出现并相互连接以定义关系。每个表应该已经存在于图中，但没有连接它们的关系。下方的按钮行用于在图区域内执行各种任务。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig16_HTML.jpg](img/429700_2_En_9_Fig16_HTML.jpg)


    **图 9-16** 用于管理关系的对话框


    ## 处理表出现


    *表出现*是关系图中显示的数据库表实例的图形表示。在定义表出现之间的关系之前，让我们回顾一下*选择*、*交互*、*排列*、*查看*、*格式化*、*编辑*、*添加*和*删除*表出现的基础知识。

    '
- fmt: '### Selecting Table Occurrences


    A selected occurrence will be highlighted with a blue shaded border, and its size,
    position, and formatting can be modified. Occurrences can be selected using a
    variety of different methods with the *Object Selection Cursor* activated, as
    shown in Figure [9-17](#429700_2_En_9_Chapter.xhtml#Fig17). To select a single
    occurrence, click directly on it in the graph. To select multiple non-clustered
    occurrences, hold the `Shift` key and click on each desired occurrence. A second
    click on a previously selected occurrence while holding the key will deselect
    it. To select multiple occurrences clustered together in a group, click on the
    background and then hold and drag until the selection rectangle encompasses the
    desired occurrences. Every occurrence touched by the selection box will be selected.
    Hold the `Command` (macOS) or `Windows` (Windows) key while dragging to only select
    items that are *completely* within the selection box’s boundary.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig17_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig17_HTML.jpg)


    Figure 9-17


    The cursor tool used to select and manipulate occurrences


    When working with large numbers of occurrences, the menu shown in Figure [9-18](#429700_2_En_9_Chapter.xhtml#Fig18)
    that opens under the *Select Tables* tool has two options to help locate specific
    instances. The *Select related tables 1-away* option automatically selects every
    occurrence that is *directly related* to the selected occurrence. The *Select
    tables with the same source table* function selects every occurrence that shares
    the *same source table* as the selected occurrence, which can be helpful trying
    to find other instances of a table in a complex graph.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig18_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig18_HTML.jpg)


    Figure 9-18


    The tool for selecting similar tables


    ### Interacting with Table Occurrences


    With the cursor tool selected, an occurrence box can be moved, collapsed, expanded,
    resized, and scrolled from the points highlighted in Figure [9-19](#429700_2_En_9_Chapter.xhtml#Fig19).


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig19_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig19_HTML.jpg)


    Figure 9-19


    Occurrence manipulation points when collapsed (top) and expanded (bottom)


    1.  Click and hold the *heading* of an occurrence to drag the box, and reposition
    it within the graph. Hover the cursor over the arrow icon to reveal an informative
    metadata popover.


    2.  On the right of the heading is an expansion toggle button icon. A single-click
    will toggle the state of the occurrence between one of three states. Without any
    relational connections, one click collapses the box, and another click expands
    it. With relationship connections, an intermediate state collapses halfway showing
    only match fields used to form relationship(s) to other occurrences (not shown).


    3.  Drag the thin bar on the sides and bottom to resize the width or height, respectively.


    4.  Drag the bottom corners to resize the width and/or height depending on the
    direction.


    5.  When fully expanded, this arrow icon that appears at the top, bottom, or both
    is used to scroll up or down the list of fields. Individual clicks will move up
    or down one field at a time; holding will continuously scroll the list until released.


    Practice in the *Learn FileMaker* file by collapsing all the occurrences and moving
    them one above the other so they are roughly lined up in a vertical stack, as
    shown in Figure [9-20](#429700_2_En_9_Chapter.xhtml#Fig20).


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig20_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig20_HTML.jpg)


    Figure 9-20


    The four table occurrences collapsed and arranged in a stack


    ### Arranging and Resizing Occurrences


    The *arrange* tools are used to align and resize groups of selected occurrences
    based on a selection from a hidden menu under these four icons, shown in Figure
    [9-21](#429700_2_En_9_Chapter.xhtml#Fig21):


    1.  Horizontally aligned by *left*, *center*, or *right edges*.


    2.  Vertically aligned by *top*, *middle*, or *bottom edges*.


    3.  Distribute *horizontally* or *vertically*.


    4.  Resize the *width*, *height*, or both, to *smallest* or *largest*.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig21_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig21_HTML.jpg)


    Figure 9-21


    Arrange tools contain menus for arranging and resizing occurrences


    ### Viewing Options


    The *tools* section includes four controls that modify the magnification of the
    relationship graph, shown in Figure [9-22](#429700_2_En_9_Chapter.xhtml#Fig22):


    1.  *Adjust Magnification* – Adjust the magnification to make every table occurrence
    fit in the view without scrolling.


    2.  *Magnification* – Click to activate, and then click in the graph to increase
    the zoom by 25%.


    3.  *Reduction* – Click to activate, and then click in the graph to decrease the
    zoom by 25%.


    4.  *Percentage* – Manually set the magnification percentage from 1 to 400.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig22_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig22_HTML.jpg)


    Figure 9-22


    The tools used to adjust the magnification of the relationship graph


    ### Formatting Table Occurrences


    The only *formatting* tool for table occurrences is a color menu accessible by
    clicking on the color tool located to the right of the *Delete icon* in the *Tables/Relationships*
    section. Color coding can be used in many ways to visually group table occurrences.
    Apply a color to all primary table occurrences and another to secondary or apply
    a color to each occurrence group. Colors can indicate the type of operator used
    to connect a secondary occurrence to a primary one, or color can denote the function
    of the occurrence, e.g., one color for those used as child portals, another for
    parent tables, etc. Colors can also be used to indicate the development status
    of each occurrence, e.g., highlighting those being worked on or deprecated. Whatever
    specific scheme you choose, coloring occurrences can help you visually navigate
    a complex relationship graph.


    ### Editing Table Occurrences


    Table occurrences are edited using the *Specify Table* dialog. This dialog is
    opened by double-clicking an occurrence or by selecting one and clicking the *Edit
    Selection* button icon, shown in Figure [9-23](#429700_2_En_9_Chapter.xhtml#Fig23).


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig23_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig23_HTML.jpg)


    Figure 9-23


    The tool used to edit an existing occurrence


    #### Introducing the Specify Table Dialog


    From the *Specify Table* dialog, shown in Figure [9-24](#429700_2_En_9_Chapter.xhtml#Fig24),
    the *data source*, *table*, and name *can* all be modified for the occurrence.
    When selecting a different table, the name will always update to that table unless
    it has been edited since opening the dialog.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig24_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig24_HTML.jpg)


    Figure 9-24


    The dialog used to specify which table is assigned to an occurrence


    ### Adding Table Occurrences


    Table occurrences can be added to the graph for any table that exists in any data
    source defined in the current file. This can be done by *creating a new table
    occurrence* or *duplicating an existing one*.'
