- fmt: "### Storing a Reference to an External File\n\nA *container field file reference*\
    \ is a text string that stores an external file’s location, type, and other information\
    \ which varies by type. For example, a *container image reference* includes the\
    \ dimensions of the original image, a path to the file relative to the database,\
    \ and an absolute path to the image. This example shows a reference to an image\
    \ file located on a user’s desktop:\n\n```\nsize:731,960\nimage:../../../../../../../../../Desktop/Flower\
    \ Picture.jpg\nimagemac:/Macintosh HD/Users/john_smith/Desktop/Flower Picture.jpg\n\
    ```\n\nStoring references in container fields maintains a lean, efficient database.\
    \ Although the insertion process only stores a reference in the field, that external\
    \ file will still be rendered in the interface as if it were stored internally,\
    \ based on the field’s settings. From the user’s perspective, there is no difference\
    \ when the field displays its content on a layout.\n\nThere are two methods for\
    \ using external files: *custom-managed* and *database-managed*.\n\n## Using Managed\
    \ External Storage\n\nTo use *database-managed* *external storage*, you must define\
    \ base directories and configure container fields to use them.\n\n### Defining\
    \ Base Directories\n\nA *base directory* is a developer-defined path to a folder\
    \ directory that acts as the root location into which one or more container fields\
    \ can store documents. The folder defined is fully managed by `FileMaker`, which\
    \ will automatically create the folder and then manage an internal directory structure\
    \ of subfolders and files depending on the settings defined for the base directory\
    \ and individual fields. Every database file contains one default directory, automatically\
    \ defined with the same name as the database and a formula prefix of `[database\
    \ location]`, meaning that the external container directory will be stored in\
    \ the same folder as the database file.\n\n**Note**  \nIf a database file is renamed,\
    \ the default base directory will not change but can be manually updated for consistency.\n\
    \n#### Exploring the Manage Containers Dialog\n\nExternal containers are defined\
    \ in the *Manage Containers* dialog which can be opened by selecting the `File\
    \ ➤ Manage ➤ Containers` menu. This dialog has two tabs: `Storage` and `Thumbnails`.\n\
    \n##### Exploring the Storage Tab\n\nThe `Storage` tab of the *Manage Containers*\
    \ dialog, shown in Figure [10-3](#429700_2_En_10_Chapter.xhtml#Fig3), contains\
    \ a list of defined base directories. This is where you *create*, *edit*, and\
    \ *delete* base directories. You can initiate a transfer of documents using the\
    \ `Transfer Data` button, which becomes highlighted after a field’s assigned base\
    \ directory is changed and documents are detected in the old location (see “Changing\
    \ a Field Container Settings” later in this chapter).\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig3_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig3_HTML.jpg)\
    \  \n*Figure 10-3*  \nThe list of base directories used for managed containers\n\
    \n**Caution**  \nBase directories can’t be edited when a database is hosted on\
    \ a `FileMaker Server`. Take the file offline and open with the `FileMaker Pro`\
    \ desktop application to edit.\n\n###### Creating a New Base Directory\n\nThe\
    \ number of base directories in a given database file is completely up to the\
    \ developer. The default directory can be shared by every container field in every\
    \ table in the file. Alternatively, every table or even every field can be assigned\
    \ a separate directory. To create a new base directory, click the `New` button.\
    \ This will open a `New Base Directory` dialog, shown in Figure [10-4](#429700_2_En_10_Chapter.xhtml#Fig4).\
    \ This window contains a single text area into which you can either type a directory\
    \ path or drop a folder to automatically insert its path. A path must be formatted\
    \ as shown in the examples.\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig4_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig4_HTML.jpg)\
    \  \n*Figure 10-4*  \nThe dialog used to specify a base directory’s path\n\n######\
    \ Editing a Base Directory\n\nA directory path can be edited as long as it doesn’t\
    \ yet contain any managed files. If empty, double-click or click the `Edit` button\
    \ in the *Manage Containers* dialog to open the selected base directory in the\
    \ `Edit Base Directory` dialog (same as the `New Base Directory` dialog shown\
    \ in Figure [10-4](#429700_2_En_10_Chapter.xhtml#Fig4)). If the directory already\
    \ contains files, create a new base directory, point any field using the old one\
    \ to the new one, transfer the existing container documents, and then delete the\
    \ old directory.\n\n###### Deleting a Base Directory\n\nWhen a base directory\
    \ is no longer used, it can be deleted as long as it doesn’t contain any managed\
    \ files. Select it in the list and click the `Delete` button. `FileMaker` requires\
    \ at least one base directory defined in a file, so a delete request will be rejected\
    \ if there is only one in the list.\n\n**Note**  \n`FileMaker` will delete the\
    \ definition of the base directory from the list, not the actual external folder.\n\
    \n##### Exploring the Thumbnails Tab\n\nThe `Thumbnails` tab of the *Manage Containers*\
    \ dialog, shown in Figure [10-5](#429700_2_En_10_Chapter.xhtml#Fig5), controls\
    \ automatic thumbnail generation which can speed up interface rendering of containers,\
    \ especially when transferred across a network. To activate thumbnails, select\
    \ the `Generate and store thumbnails for images` checkbox to allow `FileMaker`\
    \ to automatically generate and display a thumbnail for images when a layout attempts\
    \ to display them. Then choose between the two storage options. The *Permanent\
    \ storage* option will cause thumbnails to be cached both on-disk and in-memory,\
    \ with the on-disk portion retained when the database is closed. Use this for\
    \ the fastest performance. The *Temporary storage* option will cause thumbnails\
    \ to be cached in-memory only. When the database is closed, the cache is discarded.\
    \ This will be slightly slower but save hard drive space.\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig5_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig5_HTML.jpg)\
    \  \n*Figure 10-5*  \nThe dialog used to specify a thumbnail generation"
  raw: '### Storing a Reference to an External File


    A *container field file reference* is a text string that stores an external file’s
    location, type, and other information which varies by type. For example, a *container
    image reference* includes the dimensions of the original image, a path to the
    file relative to the database, and an absolute path to the image. This example
    shows a reference to an image file located on a user’s desktop:


    ```

    size:731,960

    image:../../../../../../../../../Desktop/Flower Picture.jpg

    imagemac:/Macintosh HD/Users/john_smith/Desktop/Flower Picture.jpg

    ```


    Storing references in container fields maintains a lean, efficient database. Although
    the insertion process only stores a reference in the field, that external file
    will still be rendered in the interface as if it were stored internally, based
    on the field’s settings. From the user’s perspective, there is no difference when
    the field displays its content on a layout.


    There are two methods for using external files: *custom-managed* and *database-managed*.


    ## Using Managed External Storage


    To use *database-managed* *external storage* , you must define base directories
    and configure container fields to use them.


    ### Defining Base Directories


    A *base directory* is a developer-defined path to a folder directory that acts
    as the root location into which one or more container fields can store documents.
    The folder defined is fully managed by FileMaker, which will automatically create
    the folder and then manage an internal directory structure of subfolders and files
    depending on the settings defined for the base directory and individual fields.
    Every database file contains one default directory, automatically defined with
    the same name as the database and a formula prefix of *[database location]* meaning
    that the external container directory will be stored in the same folder as the
    database file.


    Note


    If a database file is renamed, the default base directory will not change but
    can be manually updated for consistency.


    #### Exploring the Manage Containers Dialog


    External containers are defined in the *Manage Containers* dialog which can be
    opened by selecting the *File ➤ Manage ➤ Containers* menu. This dialog has two
    tabs: *Storage* and *Thumbnails*.


    ##### Exploring the Storage Tab


    The *Storage* tab of the *Manage Containers* dialog, shown in Figure [10-3](#429700_2_En_10_Chapter.xhtml#Fig3),
