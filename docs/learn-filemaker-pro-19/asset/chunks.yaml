  trans: "\n### 布局菜单\n\n`布局`模式工具栏中较低且不可自定义的层级以`布局`菜单开始。与`浏览`模式中的同一菜单（第 3 章）类似，该菜单始终列出文件中的*每个布局*，并提供访问`管理布局`对话框的入口（第\
    \ 18 章）。它用于快速切换以编辑另一个布局，如同从`视图 ➤ 转到布局`子菜单中选择一个布局一样。\n\n### 布局设置按钮\n\n在`布局`菜单旁边，有一个按钮可以打开`布局设置`对话框，在此可以为当前布局设置选项和行为（第\
    \ 18 章，“配置布局设置”）。\n\n### 主题选择\n\n`主题选择器`显示分配给布局的主题名称，并有一个按钮可打开主题选择对话框。*布局主题*是一组样式设置，一旦分配给布局，就可以快速应用于对象，并允许更改在整个数据库中同步（第\
    \ 22 章）。\n\n### 屏幕和设备尺寸菜单\n\n`屏幕和设备尺寸`菜单允许选择尺寸指南覆盖层，这些覆盖层会在布局设计区域显示一个橙色边框，直观地标示特定屏幕尺寸的边界。点击图标中的方框部分，可切换所选尺寸所有覆盖框的可见性。\n\
    \n### 格式栏按钮\n\n`格式栏`按钮将切换位于状态工具栏和窗口设计区域之间的文本格式控制栏的可见性（第 3 章，“格式栏”）。\n\n### 退出布局按钮\n\
    \n`退出布局`按钮会将窗口切换回`浏览`模式，并可能显示一个对话框询问是否要保存更改，具体取决于偏好设置（第 2 章，“布局设置”）。\n\n## 自定义状态工具栏（布局模式）\n\
    \n`布局`模式下的工具栏在用户计算机层面是可自定义的，这与`浏览`模式完全相同（第 3 章，“自定义状态工具栏”），区别在于可用的按钮是布局特定的。要开始自定义，请进入`布局`模式，然后选择`视图\
    \ ➤ 自定义工具栏`菜单，打开附加在窗口上的自定义面板，如图 17-5 所示。一旦打开，可以按照与`浏览`模式相同的方式添加、移除或重新排列项目。\n\n\
    ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig5_HTML.jpg](img/429700_2_En_17_Fig5_HTML.jpg)\n\
    \n图 17-5\n\n`布局`模式的工具栏自定义面板 (macOS)\n\n## 菜单变更（布局模式）\n\n`布局`模式下的菜单与`浏览`模式类似，但有一些显著变化。除了`记录`菜单被完全移除外，`编辑`、`视图`、`插入`和`格式`菜单有所更改，并且添加了`布局`和`排列`菜单。\n\
    \n### 编辑菜单\n\n`布局`模式下的`编辑`菜单选项发生了变化，如图 17-6 所示。\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig6_HTML.jpg](img/429700_2_En_17_Fig6_HTML.jpg)\n\
    \n图 17-6\n\n`浏览`模式（左）和`布局`模式（右）下的`编辑`菜单\n\n*   `复制对象样式` – 复制选定对象的样式信息。\n*   `粘贴对象样式`\
    \ – 将之前复制的样式信息应用于选定对象。\n*   `还原对样式的更改` – 将应用于选定对象的任何格式更改还原回所分配的样式（第 22 章）。\n*\
    \   `复制` – 复制选定的布局对象。\n*   `导出字段内容` – 此功能在`布局`模式下已被移除。\n\n### 视图菜单\n\n`布局`模式下的`视图`菜单选项发生了变化，如图\
    \ 17-7 所示。\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig7_HTML.jpg](img/429700_2_En_17_Fig7_HTML.jpg)\n\
    \n图 17-7\n\n`浏览`模式（左）和`布局`模式（右）下的`视图`菜单\n\n*   `转到布局` – 与工具栏中的`布局`菜单类似，此子菜单在`布局`模式下显示*所有*布局。\n\
    *   `查看为` – 这三个`浏览`模式功能已被移除。\n*   `标尺` – 此菜单在`布局`模式下以复数形式出现，用于切换水平*和*垂直标尺的可见性。\n\
    *   `页边距` – 选择此项可激活叠加在布局背景上的页面边框参考线，其依据为当前打印设置。\n*   `分页符` – 选择此项可激活叠加在布局背景上的分页符。\n\
    *   `网格` – 一个包含两个选项的子菜单：`显示网格`用于切换由主要和次要线条组成的网格（类似叠加在背景上的方格纸）的可见性；`对齐网格`用于切换对象受网格磁性吸附的开关。\n\
    *   `参考线` – 一个包含两个选项的子菜单：`显示参考线`用于切换手动放置的蓝色参考线的可见性；`对齐参考线`用于切换对象受参考线磁性吸附的开关。\n\
    *   `动态参考线` – 选择此项可激活自动参考线，当对象在布局上拖动时，这些参考线会出现在对象周围和对象之间。\n\n> 注\n>\n> 有关标尺、网格、参考线和动态参考线的进一步讨论，请参见第\
    \ 21 章“布局定位辅助工具”。\n\n*   `显示` – 一个列出`布局`模式下特殊图标和显示选项的子菜单，包括：\n    *   显示字段名称处的**样本数据**。\n\
    \    *   显示**文本边界**和**字段边界**将使对象的尺寸可见，无论其样式如何。\n    *   其余选项用于切换叠加在对象上、指示关键特征的小图标的可见性，该图标称为*对象徽章*，具体定义见表\
    \ 17-2。\n*   `对象` – 一个包含打开对象面板标签选项的子菜单：`字段`、`对象`和`插件`。\n*   `检查器` – 一个包含用于切换检查器面板可见性以及创建新的浮动检查器窗口选项的子菜单。\n\
    \n> 注\n>\n> 有关*对象*和*检查器面板*的进一步讨论，请参见第 19 章。\n\n### 表 17-2\n\n布局对象徽章列表\n"
