  trans: '

    ### 状态工具栏（浏览模式）


    `状态工具栏`是沿着窗口顶部延伸的最显眼区域，其中包含与当前窗口模式相关的控件。默认情况下，它是窗口标题栏唯一可见的部分。除非被脚本隐藏并锁定，用户可以通过菜单选择`查看
    ➤ 状态`来切换工具栏的可见性。


    #### 默认工具栏项目（浏览模式）


    浏览模式的默认工具栏配置如图 3-2 所示。上半部分可自定义（将在本节后面讨论），下半部分是固定的。


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig2_HTML.jpg](img/429700_2_En_3_Fig2_HTML.jpg)


    图 3-2


    默认浏览模式工具栏配置的剖析


    ##### 记录导航控件


    工具栏中的`记录导航控件`（如图 3-3 所示）显示正在查看的记录的信息，并允许用户在已找到的记录集中移动（第 4 章）。


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig3_HTML.jpg](img/429700_2_En_3_Fig3_HTML.jpg)


    图 3-3


    默认浏览模式导航控件


    工具栏的导航控件包括：


    1. `记录导航箭头` – 点击可移动到上一条或下一条记录。


    2. `记录编号和滑块` – 当前记录的编号。移动滑块或输入记录编号可跳转到另一条记录。


    3. `找到集状态` – 显示记录总数、找到集数量（若为总数的子集）以及排序状态。查看子集时，点击圆形图标可在找到记录和排除记录之间切换。


    ##### 功能按钮


    工具栏中的`功能按钮`（如图 3-4 所示）允许用户执行各种记录功能（第 4 章）并访问共享功能菜单（第 29 章）。


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig4_HTML.jpg](img/429700_2_En_3_Fig4_HTML.jpg)


    图 3-4


    浏览模式下的默认工具栏按钮


    ##### 快速查找搜索字段


    工具栏的右上方是一个搜索字段，用于执行`快速查找`（第 4 章，“使用快速查找进行搜索”）。


    ##### 布局菜单


    工具栏中较低且不可自定义的层级以`布局`菜单开始。在浏览模式下，它会显示一个可见布局的列表（第 18 章），用于手动导航到其他布局，与`查看 ➤ 转到布局`菜单相同。


    ##### 内容视图按钮


    下方栏中的下一个项目是三个`内容视图按钮`，用于更改窗口视图中内容的格式，如本章前面所述。此处启用的视图按钮由当前布局的视图设置控制（第 18 章）。


    ##### 预览按钮


    工具栏的`预览按钮`将窗口切换到预览模式（第 4 章）。


    ##### 格式栏按钮


    `格式栏按钮`在状态工具栏和窗口内容区域之间切换文本编辑控件栏的可见性（将在本章后面描述）。


    ##### 编辑布局按钮


    `编辑布局按钮`将窗口切换到布局模式（第 17 章）。


    #### 自定义工具栏（浏览模式）


    工具栏上半部分的控件可以在用户计算机级别进行自定义。这意味着用户可以自定义工具栏中控件的包含和排列方式，这将影响用户在其计算机上打开的所有数据库。打开数据库后，选择`查看
    ➤ 自定义状态工具栏`菜单以打开自定义面板。在 macOS 上，这是一个附加到窗口的图形面板，如图 3-5 所示。在该对话框的左下角，有一个`显示`菜单，用于控制工具栏中的按钮格式。选项如下：`仅图标`、`仅文本`或默认的`图标和文本`。在
    Windows 上，会出现一个不太美观的列表式对话框，并提供类似的拖放选项。


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig5_HTML.jpg](img/429700_2_En_3_Fig5_HTML.jpg)


    图 3-5


    浏览模式的工具栏自定义面板（macOS）


    ##### 添加、移除和重新排列工具栏项目


    要向工具栏添加项目，请将图标从自定义面板拖到工具栏区域并释放。FileMaker 会自动替换工具栏中已存在的同一控件，以避免重复。要移除项目，请将其拖出工具栏区域并释放鼠标按钮。项目可以通过在工具栏内拖动进行重新排列。


    ##### 恢复默认工具栏设置


    要恢复默认控件集，请将面板底部矩形中的组拖到工具栏中并释放。


    ### 格式栏


    `格式栏`是一组可选的文本格式控件，如图 3-6 所示。当选择`查看 ➤ 格式栏`菜单或点击工具栏右下角的按钮时，该栏会出现在默认状态工具栏底部与内容区域顶部之间。当用户点击进入文本字段时，这些用于`字体`、`样式`、`大小`、`颜色`、`高亮`、`强调`和`文本对齐`的控件将被启用。


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig6_HTML.jpg](img/429700_2_En_3_Fig6_HTML.jpg)


    图 3-6


    格式栏和切换按钮


    ### 水平标尺


    可以激活一个`水平标尺`，它显示在其他标题栏下方，如图 3-7 所示。`查看 ➤ 标尺`菜单可切换此标尺的可见性。可以使用其上下文菜单更改标尺的`度量单位`，选项包括`厘米`、`英寸`和`磅`。只有当光标在文本字段内时，浏览模式的标尺才变得有用，它会缩小到字段的大小并显示制表符和页边距。这些设置也可以通过布局工具进行修改（第
    19 章，“探索检查器面板”）。


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig7_HTML.jpg](img/429700_2_En_3_Fig7_HTML.jpg)


    图 3-7


    可见的标尺（上方）和字段获得焦点时的标尺（下方）


    ## 使用多个窗口


    当打开一个数据库时，窗口会自动出现并显示默认布局。用户可以在该窗口中导航到其他布局，或者打开额外的窗口以访问同一文件的多个同时视图。他们可以查看布局和记录已找到集的任意组合。例如，可以在一个窗口中查看`联系人`记录，在另一个窗口中查看`联系人`列表，在第三个窗口中查看`公司`列表。打开一个新窗口允许在一个窗口中保留已找到集的位置，同时在相同或不同表中处理其他记录。用户和脚本可以根据需要打开和关闭窗口，以更有效地完成任务。脚本可以创建屏幕外的新窗口，以在不干扰当前视图的情况下执行工作（第
    25 章）。

    '
- fmt: '### Creating a New Window


    Select the `Window ➤ New Window` menu to manually create a new window. The new
    window will open in front of and slightly offset from the current window. It will
    start as an exact duplicate with the same properties of the current window: `name`
    (with suffix), `mode`, `view`, `dimensions`, `toolbar visibility`, `layout`, `found
    set`, and `current record`. Once open, these can be changed by searching, navigating,
    moving, and resizing.


    Multiple windows are great for viewing records side by side or alternating between
    different work. However, conflict warnings will occur if a user tries to edit
    a record that is busy with active focus in another window. So, it is a good idea
    to encourage users to use this feature sparingly, reminding them to close out
    and return to a single window when finished with a task that required multiple
    windows. Close a window by selecting the `File ➤ Close Window` menu, or click
    the close icon on the window title bar.


    ### Selecting a Window from the Menu


    Each new window is added to the list at the bottom of the `Window` menu, as shown
    in Figure [3-8](#429700_2_En_3_Chapter.xhtml#Fig8). This is a blended list of
    all visible open windows for *all open databases* and includes windows that are
    positioned off-screen. The list displays the current stacking order of windows
    from front to back. Select a window to bring it to the front.


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig8_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig8_HTML.jpg)


    Figure 3-8


    The bottom of the Window menu lists all visible windows


    ### Hiding and Showing Windows


    A window can be hidden from view while remaining open. This happens automatically
    when a database opens a database to access resources in it or when a script explicitly
    hides the window. A user can manually hide a window by selecting the `Window ➤
    Hide Window` menu. Every hidden window is listed under the `Window ➤ Show Window`
    submenu, as shown in Figure [3-9](#429700_2_En_3_Chapter.xhtml#Fig9). Selecting
    a window from this list will make it visible and bring it to the front. The `Bring
    All To Front` item makes all hidden windows visible. Windows off-screen can be
    brought back into view all at once and arranged neatly with onscreen windows using
    `Tile Horizontally`, `Tile Vertically`, and `Cascade Windows`. A window can be
    minimized to the macOS or Windows dock by selecting the `Minimize Window` menu
    item. When minimized, it is listed as an open window in the menu but must be selected
    to bring it back into view.


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig9_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig9_HTML.jpg)


    Figure 3-9


    The submenu containing hidden windows


    ## Summary


    This chapter explored the anatomy of a window, toolbar controls, and managing
    multiple windows. In the next chapter, we begin working with records.


    # 4. Working with Records


    A `record` is a primary unit of content in a table, one group of values that together
    represent a particular entity. Using the spreadsheet metaphor to analogize a database
    file to a spreadsheet file, a table is like a sheet, a field like a column, and
    a record is like a row. In a `Contacts` table, a record represents *a person*,
    while a record in an `Inventory` table represents *one product*. When working
    in a database, users spend most of their time performing tasks that involve creating,
    editing, deleting, omitting, searching, exporting, importing, printing, and viewing
    records. Although a database can contain many different tables each with its own
    collection of records, this chapter uses the `Learn FileMaker Chapter 3-5` sample
    file with a single `Contacts` table. This simplifies examples and provides the
    basic context necessary for later development of more complex custom solutions.
    This chapter explores user interactions with records, covering the following topics:


    - Entering data

    - Creating, deleting, and duplicating records

    - Searching records

    - Working with found sets

    - Printing


    ## Entering Data


    A data entry task involves opening a record, focusing on a field, modifying field
    contents, moving from field to field, and then committing (closing) a record or
    reverting it.


    ### Opening a Record


    `Opening` a record transforms the fields on a layout from displaying information
    into an editable state ready for data input. To open the current record for data
    entry, click into any editable field on the layout, or type the `Tab` key to enter
    the first editable field.


    ### Understanding Field Focus


    A field has `focus` when it is currently ready to accept input. Only one field
    can have active focus at a time, and this fact is visually indicated by a text
    cursor blinking within the field. The visual appearance of the field may also
    change depending on the layout settings applied to its `in focus` state (Chapter
    [22](#429700_2_En_22_Chapter.xhtml), “Editing an Object’s Style Settings”). A
    layout should be designed to provide some visual change to make clear to users
    that the record is opened and which field will receive their input. For example,
    the field borders might become visible, change thickness, or have a color applied.
    The field’s fill color can also change. In the `Learn FileMaker` sample file,
    focus is indicated by a simple darker border, as shown in Figure [4-1](#429700_2_En_4_Chapter.xhtml#Fig1).
    Focus can be shifted to other fields by either clicking on them with the cursor
    or typing the `Tab` or other key(s) that move focus to the next field in the `tab
    order` based on the field settings (Chapter [21](#429700_2_En_21_Chapter.xhtml)).


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig1_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    A field in focus in the Learn FileMaker sample file'
