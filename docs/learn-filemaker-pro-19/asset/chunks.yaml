  trans: '

    ### 编辑框


    `编辑框`是默认的控件样式，它将字段渲染为一个框，用户可以在其中执行自由格式的数据录入任务。其大小可以是单行文本，也可以扩展到多段落，并且可以包含滚动条，以允许输入内容超出字段框架的尺寸，如图
    20-5 所示。所有容器字段都会自动锁定为`编辑框`控件样式。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig5_HTML.jpg](img/429700_2_En_20_Fig5_HTML.jpg)


    图 20-5


    编辑框：单行（上方）、多行（左下方）以及带滚动选项的编辑框（右下方）


    一旦选中此控件样式，即可启用添加垂直滚动条以及基于历史输入提供自动补全建议的设置，如图 20-6 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig6_HTML.jpg](img/429700_2_En_20_Fig6_HTML.jpg)


    图 20-6


    各种编辑框样式示例


    ### 弹出菜单


    `弹出菜单`控件样式将字段渲染为一个基于已定义值列表（第 11 章）的选择菜单，如图 20-7 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig7_HTML.jpg](img/429700_2_En_20_Fig7_HTML.jpg)


    图 20-7


    一个处于静止状态（左）和展开状态（右）的弹出菜单


    弹出菜单的设置包括选择一个值列表和若干可选功能，如图 20-8 所示。第一个复选框会在字段上绘制一个箭头，直观地提示它将打开一个菜单。接下来的两个选项允许任何用户用其他条目覆盖该列表，或直接编辑值列表（无需访问完整的开发者对话框）。最后一个选项用于更改做出选择后在字段中显示的值。启用后，它将显示值列表中的`第二个值`，而不是实际输入到字段中的值。例如，如果一个列表显示了`记录
    ID` 和`公司名称`，则前者总是被输入到字段中；启用此选项后，后者将`显示`为像是被输入的值。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig8_HTML.jpg](img/429700_2_En_20_Fig8_HTML.jpg)


    图 20-8


    弹出菜单控件选项


    ### 下拉列表


    `下拉列表`控件样式将字段渲染为一个组合编辑框，并附有值列表项的菜单，如图 20-9 所示。这允许用户选择输入自定义值，或从列表中选择一个已有的值。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig9_HTML.jpg](img/429700_2_En_20_Fig9_HTML.jpg)


    图 20-9


    一个没有可选箭头时处于静止状态的下拉菜单（左）、有可选箭头时处于静止状态（中）和展开状态（右）


    下拉列表的设置包括选择一个值列表和若干可选功能，如图 20-10 所示。第一个复选框启用一个打开列表的箭头图标。若未选中，则当字段获得焦点时，列表会自动弹出。其他选项允许用户直接编辑列表中的值，或基于字段历史输入中以用户正在键入的文本开头的内容进行自动补全建议。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig10_HTML.jpg](img/429700_2_En_20_Fig10_HTML.jpg)


    图 20-10


    下拉列表控件选项


    ### 复选框集


    `复选框集`控件样式将字段渲染为一组复选框，每个复选框都带有一个文本标签，如图 20-11 所示。这些复选框允许用户从指定的列表中选择一个或多个选项。复选框集旨在方便向单个字段中输入多个值。当用户勾选复选框时，相应的值会作为以回车符分隔的值列表插入到字段中，例如，如果勾选了“银行业”和“零售业”，字段中的实际值将是`Banking¶Retail`。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig11_HTML.jpg](img/429700_2_En_20_Fig11_HTML.jpg)


    图 20-11


    复选框集控件样式


    复选框集的设置包括选择一个值列表，如图 20-12 所示。还有一个选项允许用户使用自定义条目覆盖列表，以及选择用于指示复选框被选中的图标。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig12_HTML.jpg](img/429700_2_En_20_Fig12_HTML.jpg)


    图 20-12


    复选框集控件选项


    ### 单选按钮集


    `单选按钮集`控件样式将字段渲染为一组选择圆圈，每个圆圈都带有一个文本标签，如图 20-13 所示。这些控件鼓励用户从列表中选择单个选项。做出选择后，相应的值会替换字段中的先前值，从而仅保持单一选择。单选按钮格式没有提供直观的方法来移除选择并使字段为空。要清除选择，用户可以按住`Shift`键并点击当前选项，或者点击字段中的任意位置并按下`Delete`键。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig13_HTML.jpg](img/429700_2_En_20_Fig13_HTML.jpg)


    图 20-13


    一个单选按钮集


    单选按钮集的设置包括选择一个值列表和一个允许用户输入自定义值的选项，如图 20-14 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig14_HTML.jpg](img/429700_2_En_20_Fig14_HTML.jpg)


    图 20-14


    单选按钮集控件选项


    > **注意：** 复选框和单选按钮的列数由布局中字段的宽度和高度自动设置。


    ### 下拉日历


    `下拉日历`控件样式将字段渲染为一个组合编辑框，并带有一个可选的日历小部件，该小部件可打开并附着在字段底部，如图 20-15 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig15_HTML.jpg](img/429700_2_En_20_Fig15_HTML.jpg)


    图 20-15


    一个没有可选图标时处于静止状态的下拉日历（左）、有图标时处于静止状态（中）以及获得焦点并展开状态（右）


    日历面板包含几个有助于快速导航到特定日期的控件，其中包括一些不太显眼的控件。点击顶部的月份和年份可以弹出一个隐藏的弹出菜单，从而快速导航到任意月份。右侧的上/下箭头可使所选月份向前或向后移动
    1 年。左/右箭头可使所选年份向前或向后移动 1 个月。点击日历中的某个日期即可选中它，或者点击页脚中的`今天`以选择当前日期。做出选择后，该日期会插入到字段中。


    日历的设置包括选择一个值列表和一个选项，用于包含一个显示或隐藏日历的图标，如图 20-16 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig16_HTML.jpg](img/429700_2_En_20_Fig16_HTML.jpg)


    图 20-16


    下拉日历的选项


    > **提示：** 日历控件样式可以与非日期字段一起使用。选择的内容将以文本字符串形式输入到文本字段中，而以所选日期加当前时间的形式输入到时间戳字段中。

    '
- fmt: '#### Concealed Edit Box


    A `concealed edit box` control style renders the field as an edit box with each
    character displayed as a bullet, as shown in Figure [20-17](#429700_2_En_20_Chapter.xhtml#Fig17).
    When the field has focus, it displays one bullet for every character entered but
    reverts to displaying eight bullets once focus shifts to another field or the
    record is committed.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig17_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig17_HTML.jpg)


    **Figure 20-17** A concealed edit box without focus (left) and with focus (right)


    > **Caution**: Concealed edit boxes are intended to provide *minimal security
    only*. The data stored in the field is *not* encrypted. It is obscured from view
    on layouts where the control style is applied but continues to be accessible to
    scripts and calculations, which can access and manipulate the data as they would
    any other field.


    ### Using Pop-up Menus for Two-Field Value List


    The pop-up menu control style has a unique feature that reduces the need for extra
    resources when used with a dual-field value list. By configuring the assigned
    value list to show only the *second field* (Chapter [11](#429700_2_En_11_Chapter.xhtml),
    “Using Values from a Field”) and setting the field’s control style as a pop-up
    menu with the *Override data formatting with value list* option enabled, the user
    only sees the second field even though the first will be entered into the field.


    To illustrate this, add a value list for *Company* records to a `Contact Company
    ID` field in a `Contact` table that will insert a company `Record ID` and form
    a relationship between the contact and a company. To begin, set up a value list
    named `Company List`, as shown in Figure [20-18](#429700_2_En_20_Chapter.xhtml#Fig18),
    which generates a list of the `Record ID` of every company record with the `Company
    Name` as the second field.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig18_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig18_HTML.jpg)


    **Figure 20-18** An example of a dual-field value list sorting by the second field


    Next, apply the value list to the `Contact Company ID` field as a drop-down list,
    as shown in Figure [20-19](#429700_2_En_20_Chapter.xhtml#Fig19).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig19_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig19_HTML.jpg)


    **Figure 20-19** The value list assigned to a field (left), configured as a drop-down
    list (right)


    By including the second field in the value list definition, the user can see and
    select a company by *name*. However, once selected and committed, the menu disappears
    leaving only the *id* visible. Traditionally, this problem would be solved by
    adding a relationship between the `Contact Company ID` field and the `Company`
    table’s `Record ID` and then pulling the `Company Name` field through that relationship
    to display it nearby on the layout, as shown in Figure [20-20](#429700_2_En_20_Chapter.xhtml#Fig20).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig20_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig20_HTML.jpg)


    **Figure 20-20** The company name field (right) is pulled from the related occurrence
    (top, right)


    While this works to solve the problem, it has some drawbacks. It clutters the
    layout showing both the id and the name. It also makes the entry feel a little
    unnatural when you click on the id field, select by name, and the id goes into
    the field, while the name appears off to the side. Since ids are often not something
    a user needs to see, one might use a creative overlapping of the two fields so
    that the user only sees the company name field on top of the id field hidden behind
    it. By configuring the name field on top to not allow entry, a click would pass
    through it and activate the id field behind which then opens the menu. When a
    selection was made, the id field will be hidden by the name field. Making the
    value list only show the second field causes the id to almost completely disappear
    from view, except when the menu is open. While this approach works, the combination
    of a dedicated relationship and a clunky overlay of fields makes it less than
    ideal.


    Instead, eliminate the whole mess and use a pop-up menu control style that overrides
    data formatting. Start by expanding the `Contact Company ID` field’s width. Then,
    confirm that the value list is set to only show the second field (as shown previously).
    Finally, configure the field to display as a pop-up menu, and select the *Override
    data formatting with value list* option, as shown in Figure [20-21](#429700_2_En_20_Chapter.xhtml#Fig21).
    Now the list will only show company names, and the field, while still *containing*
    an id, will override that with layout formatting to display the selected value
    from the value list, the company name. This works *without* overlapping fields
    or requiring extra table occurrences and relationships.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig21_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig21_HTML.jpg)


    **Figure 20-21** The field shown with focus (left, top) and without (left, bottom),
    configured as a pop-up menu with override (right)


    ### Bypassing Value List Entry Restrictions


    All four of the control styles that use value lists implicitly encourage compliance
    with certain data entry restrictions, either entering a *single value* or restricting
    entry to *value list items only*, as shown in Table [20-1](#429700_2_En_20_Chapter.xhtml#Tab1).
    It is worth mentioning that *these are not strictly enforced rules and they can
    be bypassed by crafty users*. By the nature of their mechanism, both pop-up menus
    and radio buttons loosely exclude the possibility of a user entering multiple
    items or a value not present in the assigned list. Similarly, a checkbox set (without
    the setting to allow other values) appears to exclude choosing values not on the
    list. However, all of these “restrictions” can be overridden. In situations where
    it is important to restrict entry to options made available with a control style,
    it may be necessary to take explicit steps to make it impossible for users to
    bypassing the value list.


    **Table 20-1** The implied restrictions for entry into value list driven control
    styles


    | Control style | Single Item | Value List Items Only |

    | --- | --- | --- |

    | Pop-up menu | Yes | Yes |

    | Drop-down list | Yes | – |

    | Checkbox set | – | Yes |

    | Radio button | Yes | Yes |'
  raw: '#### Concealed Edit Box


