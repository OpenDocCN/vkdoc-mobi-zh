- fmt: '### Go to Field


    三个脚本步骤允许将焦点导航到当前布局上的某个字段：`Go to Next Field`、`Go to Previous Field` 和 `Go to Field`。前两个步骤没有参数选项；它们会基于字段的
    Tab 顺序，简单地将活动焦点移到当前布局上的*下一个*或*上一个*字段（第 [21](#429700_2_En_21_Chapter.xhtml) 章）。如果当前记录未打开且没有字段拥有焦点，这些步骤将打开该记录，并分别将焦点放在
    Tab 顺序的第一个或最后一个字段上。`Go to Field` 步骤（如图 25-5 所示）将焦点移动到一个特定的字段。在将其插入脚本后，双击该步骤的任意位置以打开一个`Specify
    Field`对话框，并选择一个目标字段。齿轮图标会打开一个包含两个选项的面板。启用`Select/perform`复选框，以在进入该字段时自动选择字段内容，并/或打开界面元素（如下拉列表或日历）。`Go
    to target field`是另一种指定目标字段的方式。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig5_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig5_HTML.jpg)


    **图 25-5** 用于将焦点移动到特定字段的步骤


    > **注意**：所选字段必须存在于当前布局上，并且用户必须拥有进入该字段的权限。如果在脚本中未选择目标字段或该字段无法访问，则此步骤将退出所有字段并提交记录。


    ### Set Field


    `Set Field` 步骤会用一个新值替换当前记录中指定字段的当前值。点击齿轮图标以打开配置面板（如图 25-6 所示）。`Specify target
    field`选项会打开一个`Specify Field`对话框，并允许选择目标字段引用。所选字段不必存在于布局上。如果未指定字段，则此步骤会向布局上拥有活动焦点的字段插入一个值。点击`Specify`按钮来定义一个`Calculated
    result`，该结果提供将被放入字段的值。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig6_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig6_HTML.jpg)


    **图 25-6** 设置字段值的选项


    ### Set Field by Name


    `Set Field by Name` 步骤会更改窗口中显示的当前记录中*按名称*指定的字段的值。与`Set Field`步骤必须使用选定的*动态字段引用*作为目标不同，此步骤使用一个公式来建立一个*基于文本的字段引用*，该引用可以根据需要变化（第
    [12](#429700_2_En_12_Chapter.xhtml) 章“字段引用”）。这些选项看起来完全相同，但当你点击指定目标字段时，会打开一个`Specify
    Calculation`对话框，并需要一个能得出目标字段名称的公式。结果必须包含一个表出现名称以提供定位字段所需的上下文。此示例针对当前`Contact`记录的`Contact
    Address State`字段。


    ```

    Set Field By Name [ "Contact::Contact Address State" ; "NY" ]

    ```


    由于字段引用是基于文本并通过公式创建的，它可以根据条件变化进行构建。此示例动态地为当前布局的表构建一个标准`Record Notes`字段的引用，这将在*任何*布局中有效，只要该布局分配的表包含该名称的字段。


    ```

    Set Field By Name [ Get ( LayoutTableName ) & "::Record Notes" ; "Hello World"
    ]

    ```


    ### Set Selection


    `Set Selection` 步骤（如图 25-7 所示）会在当前布局上可见的字段中选择一段文本。除非指定了另一个目标字段，否则该步骤将以拥有活动焦点的字段为目标。点击`Specify
    selection`以打开一个`Set Selection`对话框，并为`Start Position`和`End Position`输入两个数值。这些值可以是静态数字，也可以是动态计算表达式，用于分析字段内容并根据自定义条件进行选择。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig7_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig7_HTML.jpg)


    **图 25-7** 在字段内选择文本的选项


    > **提示**：要选择当前字段的*全部*内容，请改用`Select All`步骤。


    ### Set Next Serial Value


    `Set Next Serial Value` 步骤会更新字段自动输入定义中的下一个序列号值（第 [8](#429700_2_En_8_Chapter.xhtml)
    章）。由于自动输入设置在每次创建新记录时会自动递增`Next Value`设置，因此此步骤不常使用。然而，当作为数据迁移的一部分导入记录，或为上线使用重置数据库的新测试副本时，序列号字段可能需要更新，以确保分配的下一个值是唯一的，且比迄今为止分配的最高值大1。如果字段设置与记录数据不同步，可能会导致重复的序列号。在迁移包含数十个表的大型解决方案时，使用此脚本步骤来自动化此过程可以节省时间。更改是直接对字段定义进行的，因此指定的字段不必在当前布局上可见。事实上，当需要将其重置为静态数字而无需查看现有记录时，可以从*任意上下文*中对任意表运行此步骤。


    配置选项与其他更改字段值的步骤类似。点击齿轮图标打开面板，然后选择一个目标字段并输入一个公式作为结果，该结果将成为新记录的下一个序列号。当迁移脚本将记录导入表后，添加这些步骤以确保主键的下一个序列号比当前最高值大1。


    ```

    Show All Records

    Unsort Records

    Go to Record [ Last ]

    Set Next Serial Value [ Record ID ; Contact::Record ID + 1 ]

    ```


    前面的示例执行`Show All Records`以确保我们不会错过最高值。接下来，它运行`Unsort Records`步骤，假定当按输入顺序排序时，主键是递增的。如果未排序列表中最后一条记录并不总是最高值，请考虑改用`Sort
    Records`步骤按序列字段对记录进行排序。`Go to Record`步骤跳转到最后一条记录，该记录现在应具有最高值。最后，`Set Next Serial
    Value`以当前记录的`Record ID`字段当前值加1作为目标，应用于`Record ID`字段。


    如果目标键字段是带有前导零的文本字段，加1会将结果转换为一个不带前导字符的数字。要在字段中保持一致的字符数，公式需要向结果添加计算出的数量的零。如果该字段使用前导零以保持六位数字，以下公式通过在递增的
    ID 左侧添加六个零，然后从右侧提取六位数字来确保得到合适的结果。


    ```

    Right ( "000000" & ( Contact::Record ID + 1 ) ; 6 )

    // result = 000015

    ```


    ## 访问文件夹和文件


    在最近的版本中，FileMaker 添加并改进了多种可以访问文件夹和文件的脚本步骤。'
  raw: '### Go to Field


    Three script steps allow focus navigation to a field on the current layout: *Go
    to Next Field*, *Go to Previous Field,* and *Go to Field*. The first two of these
    have no parameter options; they will simply move active focus to the *next* or
    *previous* field on the current layout based on the field tab order (Chapter [21](#429700_2_En_21_Chapter.xhtml)).
    If the current record is not open and no field has focus, these steps will open
    the record and place focus respectively in the first or last field in the tab
    order. The *Go to Field* step, shown in Figure [25-5](#429700_2_En_25_Chapter.xhtml#Fig5),
    moves focus to a specific field. After inserting into the script, double-click
    anywhere on the step to open a *Specify Field* dialog and select a target field.
    The gear icon opens a panel with two options. Enable the *Select/perform* box
    to automatically select field contents, and/or open interface elements such as
    drop-down lists or calendars when entering the field. The *Go to target field*
    is an alternate way to specify the target field.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig5_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig5_HTML.jpg)


    Figure 25-5


    The step used to move focus to a specific field


    Note


    The selected field must be present on the current layout, and the user must have
    access to enter it. If no target field is selected in the script or the field
    is not accessible, the step will exit every field and commit the record.


    ### Set Field


    The *Set Field* step will replace the current value of a specified field for the
    current record with a new value. Click on the gear icon to open a configuration
    panel, as shown in Figure [25-6](#429700_2_En_25_Chapter.xhtml#Fig6). The *Specify
    target field* option will open a *Specify Field* dialog and allow selection of
    a target field reference. The selected field doesn’t need to be present on the
    layout. If no field is specified, the step will insert a value into a field if
    one on the layout has active focus. Click the *Specify* button to define a *Calculated
    result* which provides the value that will be placed into the field.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig6_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig6_HTML.jpg)


    Figure 25-6


    The options for setting a field value


    ### Set Field by Name


    The *Set Field by Name* step will change the value of a field specified *by name*
    for the current record displayed in the window. Unlike the *Set Field* step where
    a target must be a selected *dynamic field reference*, this step uses a formula
    to establish a *text-based field reference* which can vary as needed (Chapter
    [12](#429700_2_En_12_Chapter.xhtml), “Field References”). The options look exactly
    the same, except when you click to specify a target field, a *Specify Calculation*
    dialog opens and requires a formula that results in the target field name. The
    result must include a table occurrence to provide the necessary context to locate
    the field. This example targets the *Contact Address State* field for the current
    *Contact* record.


    ```

    Set Field By Name [ "Contact::Contact Address State" ; "NY" ]

    ```


    Since the field reference is text-based and created by a formula, it can be constructed
    with conditional variations. This example dynamically builds a reference to a
    standard *Record Notes* field for the table of the current layout, which would
    work in *any* layout where the assigned table contains a field of that name.


    ```

    Set Field By Name [ Get ( LayoutTableName ) & "::Record Notes" ; "Hello World"
    ]

    ```


    ### Set Selection


    The *Set Selection* step, shown in Figure [25-7](#429700_2_En_25_Chapter.xhtml#Fig7),
    will select a portion of text within a field visible on the current layout. The
    step will target the field with active focus unless another target field is specified.
    Click to *Specify selection* to open a *Set Selection* dialog and enter two numeric
    values for *Start Position* and *End Position*. These can each be either static
    numbers or a dynamic calculation that analyzes the field’s content and makes a
    selection based on custom criteria.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig7_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig7_HTML.jpg)


    Figure 25-7


    The options for selecting text within a field


    Tip


    To select the *entire* contents of the current field, use the *Select All* step
    instead.


    ### Set Next Serial Value


    The *Set Next Serial Value* step will update the next serial number value in a
    field’s *Auto Enter* definitions (Chapter [8](#429700_2_En_8_Chapter.xhtml)).
    Since the auto-enter settings automatically increment the *Next Value* setting
    each time a new record is created, this step is used infrequently. However, when
    importing records as part of a data migration or when resetting a new test copy
    of a database for live use, serial number fields may need an update to ensure
    that the next value assigned is uniquely one above the highest value assigned
    to date. If the field settings are out of sync with the record data, it might
    result in duplicate serial numbers. Using the script step to automate this process
    can save time when migrating a large solution with dozens of tables. The change
    is made to the field definition directly, so the specified field does not have
    to be visible on the current layout. In fact, when resetting this to a static
    number without the need to look at existing records, this step can be run for
    any table from *any context*.


    The configuration options are similar to other steps that change field values.
    Click on the gear icon to open the panel, and then select a target field and enter
    a formula for the result which will become the next serial number for new records.
    After a migration script imports records into a table, add these steps to ensure
    that the primary key’s next serial number is one greater than the current highest
    value.


    ```

    Show All Records

    Unsort Records

    Go to Record [ Last ]

    Set Next Serial Value [ Record ID ; Contact::Record ID + 1 ]

    ```


    The preceding example executes the *Show All Records* to ensure that we don’t
    miss the highest value. Next, it runs the *Unsort Records* step, assuming that
    the primary keys are low to high when ordered chronologically as entered. If the
    last record in an unsorted list is not always the highest value, consider using
    a *Sort Records* step instead to sort the records by the serial field. The *Go
    to Record* step jumps to the last record which should now have the highest current
    value. Finally, the *Set Next Serial Value* targets the *Record ID* field with
    the current value in that field for the current record plus one.


    If the targeted key field is a text field with leading zeros, adding one will
    convert the result into a number without leading characters. To maintain a consistent
    number of characters in the field, the formula will need to add a calculated number
    of zeros to the result. If the field uses leading zeros to maintain six digits,
    the following formula ensures the appropriate result by adding six zeros to the
    left of the incremented id and then extracting six digits from the right.


    ```

    Right ( "000000" & ( Contact::Record ID + 1 ) ; 6 )

    // result = 000015

    ```


    ## Accessing Folders and Files


    In recent versions, FileMaker has added and improved various script steps that
    can access folders and files.'
