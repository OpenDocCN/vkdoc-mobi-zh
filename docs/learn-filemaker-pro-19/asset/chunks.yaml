  trans: '

    # 向自定义函数添加参数


    上一个示例演示了如何构建一个简单的自定义函数。然而，由于灵活性严重受限，该函数缺乏实用性。虽然它使用了*当前日期*确实带来了一定的灵活性，并且未来也能继续工作，但它被锁定为仅能返回与今天相对的星期一。通过添加参数并修改公式，该函数可以扩展为计算*从任意起始日期起的任意指定工作日*。


    如先前所述（第 12 章，“调用带参数的函数”），*函数参数*是一个每次调用函数时都可能变化的值，它允许公式将特定值传入一个*开放式的*函数中。参数提供了可变输入和/或关于应执行何种处理的指令，使函数能够适应不同情况。定义自定义函数时，可以为任何功能目的创建任意数量的参数，并随意命名。由于无法控制公式作为参数传递给函数的数据类型，请务必选择一个能描述其预期接收的数据类型的名称。例如，名为
    *input* 的参数过于模糊，而 `dateInput` 或 `startDate` 则清楚地说明了期望的数据类型。在我们的示例中，我们希望向函数添加两个参数：一个名为
    `dateInput` 的输入日期，以及一个名为 `dayRequested` 的目标工作日。


    ## 添加输入日期参数


    首先，复制上一个函数，我们将其扩展，以便根据名为 `dateInput` 的参数中提供的任意起始日期来计算相应的星期一。打开*管理自定义函数*对话框，选择
    `GetMonday` 函数，然后单击*复制*按钮。接着单击*编辑*按钮，在*编辑自定义函数*对话框中打开该函数，并进行如图 15-4 所示的修改。


    ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig4_HTML.jpg](img/429700_2_En_15_Fig4_HTML.jpg)


    图 15-4


    修改复制的函数所需的步骤


    1.  将函数名称改为 `GetMonday2`。


    2.  输入参数名称 `dateInput`，然后单击 + 按钮，将其创建到下方的列表中。


    3.  修改代码，使 `dateInput` 参数替代当前日期，并使用 `GetAsDate` 函数将其转换为日期。同时，将 `dateToday` 变量重命名为
    `dateToProcess`：


    ```

    Let ( [

    dateToProcess = GetAsDate ( dateInput ) ;

    numAdjustment = DayOfWeek ( dateToProcess ) – 2

    ] ;

    dateToProcess - numAdjustment

    )

    ```


    保存该函数，并修改*示例计算*字段中的公式，以调用新函数。由于它会自动将输入转换为日期，因此参数可以是包含日期值的文本字段、日期字段、包含日期的文字文本字符串，或使用函数构建的日期值。以下是每种选项的示例：


    ```

    GetMonday2 ( Sandbox::Example Text )

    GetMonday2 ( Sandbox::Example Date )

    GetMonday2 ( "1/7/2021" )

    GetMonday2 ( Date ( 1 ; 7 ; 2021 ) )

    ```


    保存公式，并在浏览模式下查看结果。结果应为相对于您指定的输入日期的星期一。


    ## 添加请求日期参数


    接下来，添加一个名为 `dayRequested` 的额外参数，该参数接受一个工作日名称，并返回所提供 `dateInput` 相对于该工作日的日期。首先，复制
    `GetMonday2` 函数。由于新的、扩展后的函数不再仅限于返回星期一结果，新函数的名称应改为 `GetDay`。添加第二个参数，名为 `dayRequested`。最后，按如下所示修改代码：


    ```

    Let ( [

    dateToProcess = GetAsDate ( dateInput ) ;

    list = "Sunday¶Monday¶Tuesday¶Wednesday¶Thursday¶Friday¶Saturday" ;

    list = Left ( list ; Position ( list ; dayRequested ; 1; 1 ) ) ;

    dayNumber = ValueCount ( list ) ;

    numAdjustment = DayOfWeek ( dateToProcess ) – dayNumber

    ] ;

    dateToProcess - numAdjustment

    )

    ```


    该代码将接受 `dayRequested` 参数中的日期名称（例如，“Wednesday”），并通过在日期名称列表中查找该日期的位置，将其转换为日期数字（4）。这是通过向公式中添加三个步骤完成的。一个新的
    `list` 变量被初始化为包含一个由回车符分隔的工作日名称列表。在下一行，使用 `Left` 和 `Position` 函数修改 `list` 变量，将其缩减至仅包含所请求日期之前的那些日期名称。因此，如果请求的日期是“Wednesday”，那么
    `list` 将包含“Sunday¶Monday¶Tuesday¶W”。最后，使用 `ValueCount` 函数将该列表转换为工作日数字（4），并放入 `dayNumber`
    变量中。该变量用于确定 `numAdjustment` 值，该值用于像先前版本一样调整输入日期。保存新函数后，修改*示例计算*中的公式以调用新函数。在此示例中，结果将是
    *2021 年 1 月 4 日*所在周的*星期五*的日期：


    ```

    GetDay ( "1/4/2021" ; "Friday" )        // 结果 = 1/8/2021

    GetDay ( "1/4/2021" ; "Wednesday" )     // 结果 = 1/5/2021

    ```


    ## 添加默认日期选项


    作为进一步的优化，修改函数，使其在 `dateInput` 参数未指定日期时自动使用默认日期。这为任何希望使用当前日期的公式提供了一种快捷方式。目前，如果该函数用于计算当前日期的星期五，则调用公式必须显式地在调用中包含今天的日期，如下所示：


    ```

    GetDay ( Get ( CurrentDate ) ; "Friday" )

    ```


    修改上一个示例中 `Let` 语句的第一行，添加一个 `Case` 语句，使其在参数中未提供日期时自动默认使用当前日期。当调用传递空字符串而非日期时，此条件将使函数能够产生结果。按如下所示修改
    `Let` 语句的第一行：


    ```

    dateToProcess = Case ( dateInput = "" ; Get ( CurrentDate ) ; GetAsDate ( dateInput
    ) ) ;

    ```


    现在，公式可以通过在第一个参数中传递空字符串来请求相对于当前日期的某一天，或者通过提供具体日期来请求相对于该日期的某一天，如下面两个示例所示：


    ```

    GetDay ( "" ; "Friday" )

    GetDay ( "1/4/2021" ; "Friday" )

    ```

    '
- fmt: '### Stressing the Importance of Thorough Testing


    Every formula should be carefully tested prior to live production use. Being accessible
    from anywhere in the database, a custom function requires greater care. This is
    especially true for complex functions that accept parameter input. A single test
    showing a function working may not be adequate since different input may cause
    conditions not anticipated by the formula. Instead, perform as many tests as possible
    with a variety of input to confirm that it will handle a full range of possible
    values in various combinations.


    The testing requirements of each custom function will be different. Start by asking
    what variety of input might be received. There are many questions we might ask
    regarding the previous example. What if the date provided is at the *start* of
    the week: a Sunday or a Monday? What if the date is at the *end* of the week:
    a Friday or a Saturday? What if the day requested is the same day of the date
    provided? Will the function work under each of these circumstances? Will it operate
    correctly when requesting *any* day of the week relative to *any* date? Do all
    the anticipated data types – *date*, *timestamp*, and *text string with a date*
    – return an accurate result? To confirm this, we should devise a set of tests
    for each condition and confirm the results. To begin, convert the list of questions
    into a list of test scenarios that will adequately confirm the desired functionality
    with a large enough sampling of input. In our example, at the minimum, the following
    tests should be performed:


    - `dateInput` – Run seven tests, one test for each day of the week as input, also,
    at least one test of each accepted data type.

    - `dayRequested` – Run seven tests, one test for each day of the week.


    This indicates the need for at least *16* tests. Rather than perform these tests
    manually, one by one, the following single calculation formula, entered in the
    *Example Calculation* field, covers them all at once by producing a single text
    result that lists all the various results:


    ```

    Let ( [

    dateInput = Date ( 1 ; 17 ; 2021 )

    ] ;

    "Input = " & dateInput & " (" & DayName (dateInput) & ")¶" &

    "+1 Sunday=" & GetDay ( dateInput + 1  ; "Sunday" ) & "¶"

    "+2 Sunday=" & GetDay ( dateInput + 2  ; "Sunday" ) & "¶" &

    "+3 Sunday=" & GetDay ( dateInput + 3  ; "Sunday" ) & "¶" &

    "+4 Sunday=" & GetDay ( dateInput + 4  ; "Sunday" ) & "¶"

    "+5 Sunday=" & GetDay ( dateInput + 5  ; "Sunday" ) & "¶" &

    "Sunday=" & GetDay ( dateInput; "Sunday" ) & "¶"

    "Monday=" & GetDay ( dateInput ; "Monday" ) & "¶"

    "Tuesday=" & GetDay (dateInput; "Tuesday" ) & "¶"

    "Wednesday=" & GetDay ( dateInput; "Wednesday" ) & "¶" &

    "Thursday=" & GetDay ( dateInput; "Thursday" ) & "¶" &

    "Friday=" & GetDay ( dateInput; "Friday" ) & "¶" &

    "Saturday=" & GetDay ( dateInput; "Saturday" ) & "¶"

    "Timestamp=" & GetDay ( GetAsTimestamp ( dateInput )  ; "Sunday" ) & "¶" &

    "Text Date=" & GetDay ( GetAsText ( dateInput )  ; "Sunday" ) & "¶" &

    "Text TS=" & GetDay ( GetAsText ( GetASTimestamp ( dateInput ) )  ; "Sunday" )
    & "¶"

    )

    // result =

    Input = 1/17/2021 (Sunday)

    +1 Sunday=1/17/2021

    +2 Sunday=1/17/2021

    +3 Sunday=1/17/2021

    +4 Sunday=1/17/2021

    +5 Sunday=1/17/2021

    +6 Sunday=1/17/2021

    Sunday=1/17/2021

    Monday=1/18/2021

    Tuesday=1/19/2021

    Wednesday=1/20/2021

    Thursday=1/21/2021

    Friday=1/22/2021

    Saturday=1/23/2021

    Timestamp=1/17/2021

    Text Date=1/17/2021

    Text TS=1/17/2021

    ```


    **Caution**


    Be sure to change the *Example Calculation* result data type to “text” since this
    test formula returns text instead of a `date`.


    This formula uses a `Let` statement to place a start date into a variable and
    uses that to perform repeated calls to the function and concatenate the results
    into a string result. The first six results show that, as the `dateInput` is incremented
    to cover each day of an entire week, the result for the requested Sunday remains
    the same. The next seven results show that using the same `dateInput` while requesting
    a different day of the week works since the results span a 7-day period. Finally,
    the last three results show that when the `dateInput` is a `timestamp`, `text-based
    date`, or `text-based timestamp`, the result remains the same. With this test
    completed and confirmed, it should now be safe to use this custom function.


    ## Building Recursive Functions


    A *recursive function* is a formula that is capable of generating calls that are
    self-referencing, i.e., calling and executing itself from within itself. In FileMaker,
    custom functions are the only formulas that can be recursive. Recursion is often
    confused with the iterative functionality found in looping scripts or in the new
    `While` function (Chapter [13](#429700_2_En_13_Chapter.xhtml)). Although there
    are similarities and many tasks can be accomplished using either, recursion is
    actually very different. In a repeating, or *iterative process*, a piece of code
    is executed numerous times in succession; each iteration is completed *before*
    the next begins. By contrast, a *recursive process* creates and runs successive
    new instances of the same code *during execution of the preceding instance*, a
    difference illustrated in Figure [15-5](#429700_2_En_15_Chapter.xhtml#Fig5). Each
    instance queues up in memory forming what is known as a call stack until it reaches
    a termination point known as a base case where it stops calling itself and produces
    a result that cascades back up the stack, collapsing it.


    ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig5_HTML.jpg](images/429700_2_En_15_Chapter/429700_2_En_15_Fig5_HTML.jpg)


    **Figure 15-5** The difference between iterative looping (left) and recursion
    (right)


    Both the iterative and recursive options are superior to hard-coded statements
    that restrict the number of iterations. For example, using `If` or `Case` statements
    requires each possible iteration to be explicitly stated in a fixed sequence.
    Similarly, a `Let` statement can perform a fixed number of cascading variable
    declaration. While this is fine for static choices that never change and don’t
    vary in number, often a more dynamic approach is warranted.


    A *looping script* is easy to set up and runs quickly. However, scripts can’t
    be triggered from within a formula, so they are limited to interface-related actions
    and events. Also, they can be bulky to set up since they require iteration control
    variables along with lines to perform whatever functionality is required.


    For an exclusively *formula-based* solution, the choices are the iterative `While`
    function or a recursive custom function. The `While` function has the advantage
    of working in any formula, while recursion is limited to custom functions. The
    nested hierarchy of the recursive stack can be more difficult to conceptualize,
    but using the `While` function is not without its own confusion. It can feel overly
    wordy in simple examples and mind-boggling in more complex ones. Using `While`
    may be a little faster and doesn’t have the same memory impact. Although many
    programming challenges can be handled with either approach, when performing a
    complex, repeated process through hierarchical data, recursion is often the only
    practical choice.'
  raw: '### Stressing the Importance of Thorough Testing


    Every formula should be carefully tested prior to live production use. Being accessible
    from anywhere in the database, a custom function requires greater care. This is
    especially true for complex functions that accept parameter input. A single test
    showing a function working may not be adequate since different input may cause
    conditions not anticipated by the formula. Instead, perform as many tests as possible
    with a variety of input to confirm that it will handle a full range of possible
    values in various combinations.


    The testing requirements of each custom function will be different. Start by asking
    what variety of input might be received. There are many questions we might ask
    regarding the previous example. What if the date provided is at the *start* of
    the week: a Sunday or a Monday? What if the date is at the *end* of the week:
    a Friday or a Saturday? What if the day requested is the same day of the date
    provided? Will the function work under each of these circumstances? Will it operate
    correctly when requesting *any* day of the week relative to *any* date? Do all
    the anticipated data types – *date*, *timestamp*, and *text string with a date* –
    return an accurate result? To confirm this, we should devise a set of tests for
    each condition and confirm the results. To begin, convert the list of questions
    into a list of test scenarios that will adequately confirm the desired functionality
    with a large enough sampling of input. In our example, at the minimum, the following
    tests should be performed:


    *   *dateInput* – Run seven tests, one test for each day of the week as input,
    also, at least one test of each accepted data type.


    *   *dayRequested* – Run seven tests, one test for each day of the week.


    This indicates the need for at least *16* tests. Rather than perform these tests
    manually, one by one, the following single calculation formula, entered in the
    *Example Calculation* field, covers them all at once by producing a single text
    result that lists all the various results:


    ```

    Let ( [

    dateInput = Date ( 1 ; 17 ; 2021 )

    ] ;

    "Input = " & dateInput & " (" & DayName (dateInput) & ")¶" &

    "+1 Sunday=" & GetDay ( dateInput + 1  ; "Sunday" ) & "¶"

    "+2 Sunday=" & GetDay ( dateInput + 2  ; "Sunday" ) & "¶" &

    "+3 Sunday=" & GetDay ( dateInput + 3  ; "Sunday" ) & "¶" &

    "+4 Sunday=" & GetDay ( dateInput + 4  ; "Sunday" ) & "¶"

    "+5 Sunday=" & GetDay ( dateInput + 5  ; "Sunday" ) & "¶" &

    "Sunday=" & GetDay ( dateInput; "Sunday" ) & "¶"

    "Monday=" & GetDay ( dateInput ; "Monday" ) & "¶"

    "Tuesday=" & GetDay (dateInput; "Tuesday" ) & "¶"

    "Wednesday=" & GetDay ( dateInput; "Wednesday" ) & "¶" &

    "Thursday=" & GetDay ( dateInput; "Thursday" ) & "¶" &

    "Friday=" & GetDay ( dateInput; "Friday" ) & "¶" &

    "Saturday=" & GetDay ( dateInput; "Saturday" ) & "¶"

    "Timestamp=" & GetDay ( GetAsTimestamp ( dateInput )  ; "Sunday" ) & "¶" &

    "Text Date=" & GetDay ( GetAsText ( dateInput )  ; "Sunday" ) & "¶" &

    "Text TS=" & GetDay ( GetAsText ( GetASTimestamp ( dateInput ) )  ; "Sunday" )
    & "¶"

    )

    // result =

    Input = 1/17/2021 (Sunday)

    +1 Sunday=1/17/2021

    +2 Sunday=1/17/2021

    +3 Sunday=1/17/2021

    +4 Sunday=1/17/2021

    +5 Sunday=1/17/2021

    +6 Sunday=1/17/2021

    Sunday=1/17/2021

    Monday=1/18/2021

    Tuesday=1/19/2021

    Wednesday=1/20/2021

    Thursday=1/21/2021

    Friday=1/22/2021

    Saturday=1/23/2021

    Timestamp=1/17/2021

    Text Date=1/17/2021

    Text TS=1/17/2021

    ```


    Caution


    Be sure to change the Example Calculation result data type to “text” since this
    test formula returns text instead of a *date*.


    This formula uses a *Let* statement to place a start date into a variable and
    uses that to perform repeated calls to the function and concatenate the results
    into a string result. The first six results show that, as the *dateInput* is incremented
    to cover each day of an entire week, the result for the requested Sunday remains
    the same. The next seven results show that using the same *dateInput* while requesting
    a different day of the week works since the results span a 7-day period. Finally,
    the last three results show that when the *dateInput* is a *timestamp*, *text-based
    date*, or *text-based timestamp*, the result remains the same. With this test
    completed and confirmed, it should now be safe to use this custom function.


    ## Building Recursive Functions


    A *recursive function* is a formula that is capable of generating calls that are
    self-referencing, i.e., calling and executing itself from within itself. In FileMaker,
    custom functions are the only formulas that can be recursive. Recursion is often
    confused with the iterative functionality found in looping scripts or in the new
    *While* function (Chapter [13](#429700_2_En_13_Chapter.xhtml)). Although there
    are similarities and many tasks can be accomplished using either, recursion is
    actually very different. In a repeating, or *iterative process*, a piece of code
    is executed numerous times in succession; each iteration is completed *before*
    the next begins. By contrast, a *recursive process* creates and runs successive
    new instances of the same code *during execution of the preceding instance*, a
    difference illustrated in Figure [15-5](#429700_2_En_15_Chapter.xhtml#Fig5). Each
    instance queues up in memory forming what is known as a *call stack* until it
    reaches a termination point known as a *base case* where it stops calling itself
    and produces a result that cascades back up the stack, collapsing it.


    ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig5_HTML.jpg](images/429700_2_En_15_Chapter/429700_2_En_15_Fig5_HTML.jpg)


    Figure 15-5


    The difference between iterative looping (left) and recursion (right)


    Both the iterative and recursive options are superior to hard-coded statements
    that restrict the number of iterations. For example, using *If* or *Case* statements
    requires each possible iteration to be explicitly stated in a fixed sequence.
    Similarly, a *Let* statement can perform a fixed number of cascading variable
    declaration. While this is fine for static choices that never change and don’t
    vary in number, often a more dynamic approach is warranted.


    A *looping script* is easy to set up and runs quickly. However, scripts can’t
    be triggered from within a formula, so they are limited to interface-related actions
    and events. Also, they can be bulky to set up since they require iteration control
    variables along with lines to perform whatever functionality is required.


    For an exclusively *formula-based* solution, the choices are the iterative *While*
    function or a recursive custom function. The *While* function has the advantage
    of working in any formula, while recursion is limited to custom functions. The
    nested hierarchy of the recursive stack can be more difficult to conceptualize,
    but using the *While* function is not without its own confusion. It can feel overly
    wordy in simple examples and mind-boggling in more complex ones. Using *While*
    may be a little faster and doesn’t have the same memory impact. Although many
    programming challenges can be handled with either approach, when performing a
    complex, repeated process through hierarchical data, recursion is often the only
    practical choice.'
  trans: '

    ### 强调全面测试的重要性


    每个公式在投入生产环境使用前都应仔细测试。自定义函数可从数据库任意位置调用，因此需要特别谨慎。对于接受参数输入的复杂函数而言尤其如此。单次测试显示函数运行正常可能并不充分，因为不同的输入可能引发公式未预料到的情况。相反，应使用多种输入执行尽可能多的测试，以确认函数能处理各种可能值的组合。


    每个自定义函数的测试需求各不相同。首先要思考可能接收到哪些类型的输入。针对之前的示例，我们可以提出许多问题。如果提供的日期恰逢*周初*：是周日还是周一？如果日期恰逢*周末*：是周五还是周六？如果请求的星期几与提供的日期是相同的？函数在每种情况下是否能正常工作？当请求*任意*日期对应的*任意*星期几时，函数能否正确运行？所有预期的数据类型——*日期*、*时间戳*和*包含日期的文本字符串*——是否都能返回准确结果？为确认这一点，我们应为每个条件设计一套测试并验证结果。首先，将问题列表转化为测试场景列表，通过足够多样的输入样本来充分确认所需功能。在我们的示例中，至少应执行以下测试：


    - `dateInput` – 运行七次测试，输入值涵盖一周中的每一天；同时，对每种接受的数据类型至少进行一次测试。

    - `dayRequested` – 运行七次测试，涵盖一周中的每一天。


    这表明至少需要进行 *16* 次测试。无需逐一手动执行，在 *示例计算* 字段中输入以下单个计算公式，就能一次性覆盖所有测试，生成一个列出所有结果的文本结果：


    ```

    Let ( [

    dateInput = Date ( 1 ; 17 ; 2021 )

    ] ;

    "Input = " & dateInput & " (" & DayName (dateInput) & ")¶" &

    "+1 Sunday=" & GetDay ( dateInput + 1  ; "Sunday" ) & "¶"

    "+2 Sunday=" & GetDay ( dateInput + 2  ; "Sunday" ) & "¶" &

    "+3 Sunday=" & GetDay ( dateInput + 3  ; "Sunday" ) & "¶" &

    "+4 Sunday=" & GetDay ( dateInput + 4  ; "Sunday" ) & "¶"

    "+5 Sunday=" & GetDay ( dateInput + 5  ; "Sunday" ) & "¶" &

    "Sunday=" & GetDay ( dateInput; "Sunday" ) & "¶"

    "Monday=" & GetDay ( dateInput ; "Monday" ) & "¶"

    "Tuesday=" & GetDay (dateInput; "Tuesday" ) & "¶"

    "Wednesday=" & GetDay ( dateInput; "Wednesday" ) & "¶" &

    "Thursday=" & GetDay ( dateInput; "Thursday" ) & "¶" &

    "Friday=" & GetDay ( dateInput; "Friday" ) & "¶" &

    "Saturday=" & GetDay ( dateInput; "Saturday" ) & "¶"

    "Timestamp=" & GetDay ( GetAsTimestamp ( dateInput )  ; "Sunday" ) & "¶" &

    "Text Date=" & GetDay ( GetAsText ( dateInput )  ; "Sunday" ) & "¶" &

    "Text TS=" & GetDay ( GetAsText ( GetASTimestamp ( dateInput ) )  ; "Sunday" )
    & "¶"

    )

    // 结果 =

    Input = 1/17/2021 (Sunday)

    +1 Sunday=1/17/2021

    +2 Sunday=1/17/2021

    +3 Sunday=1/17/2021

    +4 Sunday=1/17/2021

    +5 Sunday=1/17/2021

    +6 Sunday=1/17/2021

    Sunday=1/17/2021

    Monday=1/18/2021

    Tuesday=1/19/2021

    Wednesday=1/20/2021

    Thursday=1/21/2021

    Friday=1/22/2021

    Saturday=1/23/2021

    Timestamp=1/17/2021

    Text Date=1/17/2021

    Text TS=1/17/2021

    ```


    **注意**


    务必将 *示例计算* 结果的数据类型更改为“文本”，因为此测试公式返回的是文本而非`date`。


    该公式使用`Let`语句将起始日期存入变量，并利用该变量重复调用函数，将结果拼接成字符串。前六个结果显示，当`dateInput`递增覆盖一整周的每一天时，对请求的周日返回的结果保持不变。接下来的七个结果显示，使用相同的`dateInput`请求不同星期几时，函数正常工作，因为结果跨越了
    7 天周期。最后三个结果显示，当`dateInput`为`timestamp`、`text-based date`或`text-based timestamp`时，结果保持不变。完成此测试并确认无误后，即可放心使用此自定义函数。


    ## 构建递归函数


    *递归函数*是一种能够生成自我引用的公式，即在其内部调用并执行自身。在 FileMaker 中，自定义函数是唯一可以进行递归的公式。递归常与循环脚本或新的`While`函数（第
    13 章）中的迭代功能相混淆。尽管两者有相似之处，许多任务可用任一种方式完成，但递归实际上非常不同。在重复或*迭代过程*中，一段代码被连续执行多次；每次迭代*在下一轮开始前*完成。相比之下，*递归过程*会*在前一个实例执行期间*创建并运行同一个代码的连续新实例，其差异如图
    15-5 所示。每个实例在内存中排队，形成所谓的调用栈，直到达到一个称为基础情况的终止点，此时它停止调用自身并生成一个结果，该结果沿栈向上级联返回，最终使栈折叠。


    ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig5_HTML.jpg](img/429700_2_En_15_Fig5_HTML.jpg)


    **图 15-5** 迭代循环（左）与递归（右）的区别


    迭代和递归两种方案都优于限制迭代次数的硬编码语句。例如，使用`If`或`Case`语句需要在固定序列中明确写出每个可能的迭代。同样，`Let`语句可以执行固定数量的级联变量声明。虽然这对数量从不改变且不变的静态选择可行，但通常需要更动态的方法。


    *循环脚本*易于设置且运行迅速。然而，脚本无法从公式内部触发，因此仅限于与界面相关的操作和事件。此外，设置起来可能很繁琐，因为它需要迭代控制变量以及执行所需功能的多行代码。


    对于纯*基于公式*的解决方案，可以选择迭代性`While`函数或递归自定义函数。`While`函数的优势在于可在任何公式中使用，而递归仅限于自定义函数。递归栈的嵌套层级概念上更难理解，但使用`While`函数也并非毫无困惑之处。在简单示例中它可能显得过于冗长，在复杂示例中则令人费解。使用`While`可能速度稍快，且内存影响较小。尽管许多编程挑战可用任一种方法处理，但在处理通过层级数据进行的复杂重复过程时，递归通常是唯一实用的选择。

    '
- fmt: '### Building Simple Recursive Functions


    To grasp the basic structure of a recursive function, start with some simple examples.
    First, create a new function named `DateRange` that accepts `startDate` and `endDate`
    parameters and uses these to return a list of every date in the range using the
    formula here:


    ```

    startDate &

    Case (  endDate = startDate ; "" ; "¶"  & DateRange ( startDate + 1 ; endDate
    ) )

    ```


    The formula concatenates the start date and the result of a `Case` statement,
    which determines if a recursive call should be issued to increment the date forward.
    If the end date equals the start date, the formula returns an empty string, thereby
    providing a terminating base case. If the two dates are different, a paragraph
    return is included, and then the function calls itself with the start date incremented
    by one. Each recursive call repeats this process until the start date equals the
    end, creating a result as shown in the following example:


    ```

    DateRange ( GetAsDate ( "1/1/2021" ) ; GetAsDate ( "1/5/2021" ) )

    // result =

    1/1/2021

    1/2/2021

    1/3/2021

    1/4/2021

    1/5/2021

    ```


    Create another function named `MergeValues` that accepts two return-delimited
    text value lists and returns a blended list. The code for this function shown
    in the following assumes two parameters, `column1` and `column2`:


    ```

    Let ( [

    current = GetValue ( column1 ; 1 ) & " " & GetValue ( column2 ; 1 ) ;

    column1 = RightValues ( column1 ; ValueCount ( column1 ) - 1 ) ;

    column2 = RightValues ( column2 ; ValueCount ( column2 ) - 1 )

    ] ;

    current & Case ( column1 ≠ "" ; "¶" & MergeValues ( column1 ; column2 ) )

    )

    ```


    In this example, the `Let` statement is used to step through the task. The first
    value from both inputs is extracted and concatenated into a `current` variable
    with a space between them. Then, the two input parameters are reduced by one value
    using the `ValueCount` and `RightValues` functions to remove the first value.
    The result is the value in the `current` variable, and if there are values remaining,
    a paragraph return and recursive call continue the process. This example call
    has three labels and phone numbers as input and shows the corresponding result:


    ```

    MergeValues ( "Work¶Home¶Cell" ; "555-2121¶555-3421¶555-2645" )

    // result =

    Work 555-2121

    Home 555-3421

    Cell 555-2645

    ```


    ### Controlling Recursion Limits with `setRecursion`


    To avoid infinite regress for situations when a recursive function doesn’t provide
    a terminating base case, FileMaker imposes a limit on the number of iterations
    a recursive stack can include. Any formula that exceeds this limit will return
    an error expressed as a question mark. Prior to FileMaker 18, the limit varied
    depending on the type of recursion used. Functions using *tail recursion*, where
    the recursive call is the final step at the end of the function’s formula leaving
    no processing unfinished, had a limit of 50,000 total recursive calls, in contrast
    to *head recursion*, where the placement of a recursive call anywhere within the
    formula was previously limited to 10,000 total calls. However, in version 18,
    both tail- and head-recursive calls and the `While` function have a default limit
    of 50,000 iterations. Also introduced in that version is the `setRecursion` function
    which allows a developer to set the maximum number of iterations allowed higher
    or lower than this default limit.


    ```

    setRecursion ( expression ; maxIterations )

    ```


    This is a *conditioning function* which sets the iterative terms for processing
    the `expression` it encloses. Any recursive function calls or `While` statements
    included in the first parameter’s statement will be limited to the number specified
    by the `maxIterations` parameter. This can be used to *increase* or *decrease*
    the maximum number of iterations allowed. For example, try calling the previous
    `DateRange` function with a start and end date more than 30 days apart from within
    a `setRecursion` statement limited to 30 iterations. This example fails because
    the recursive calls neccesary to finish the task exceed the limit of 30.


    ```

    setRecursion ( DateRange ( "1/1/2021" ; "2/10/2021" ) ; 30 )

    // result = ?

    ```


    Next, increase the limit to an amount greater than the range of dates to see it
    functions properly. If the preceding example were modified with a limit of 60,
    it is more than enough to cover the range of dates specified, and a proper result
    will be delivered.


    The following example shows the function increasing the limit to 250,000 in order
    to execute a simple `While` statement that increments a counter up to 200,000:


    ```

    SetRecursion (

    While (

    counter = 0 ;

    counter < 200000 ;

    counter = counter + 1 ;

    counter

    ) ; 250000

    )

    ```


    ### Embedding Test Code Inside a Function


    Earlier we discussed writing test code to quickly perform multiple tests of the
    `GetDay` custom function with a variety of different input. Recursion opens the
    possibility of storing that test code *inside* of the custom function it tests.
    While it may seem unnecessary to save test code at all, it may be prudent to retest
    a function anytime it is modified in the future. A `Case` statement can be used
    to detect a test request and perform an alternate set of code. In this example,
    the `dateInput` parameter will be used to determine if the call to the function
    was asking for *test results* or *normal operations* and run one or the other
    accordingly as shown in the following pattern:


    ```

    Case ( dateInput = "Test" ; > ; > )

    ```


    Using this format, we can combine the previous example test code with the original
    function code to convert the formula into the following combined statement. To
    demonstrate this technique, create a new function called `GetDay2` with this new
    capability. In this example, if the `dateInput` receives a value of “Test,” it
    will perform the test routine; otherwise, it will assume the parameter contains
    a date and will perform its normal function.


    ```

    Case ( dateInput = "Test" ;

    //    Test Code

    Let ( [

    dateInput = Date ( 1 ; 17 ; 2021 )

    ] ;

    "Input = " & dateInput & " (" & DayName (dateInput) & ")¶" &

    "1 Sunday=" & GetDay2 ( dateInput + 1  ; "Sunday" ) & "¶" &

    "+2 Sunday=" & GetDay2 ( dateInput + 2  ; "Sunday" ) & "¶"

    "+3 Sunday=" & GetDay2 ( dateInput + 3  ; "Sunday" ) & "¶" &

    "+4 Sunday=" & GetDay2 ( dateInput + 4  ; "Sunday" ) & "¶"

    "+5 Sunday=" & GetDay2 ( dateInput + 5  ; "Sunday" ) & "¶" &

    "+6 Sunday=" & GetDay2 ( dateInput + 6  ; "Sunday" ) & "¶" &

    "Sunday=" & GetDay2 ( dateInput; "Sunday" ) & "¶" &

    "Monday=" & GetDay2 ( dateInput ; "Monday" ) & "¶" &

    "Tuesday=" & GetDay2 (dateInput; "Tuesday" ) & "¶" &

    "Wednesday=" & GetDay2 ( dateInput; "Wednesday" ) & "¶"

    "Thursday=" & GetDay2 ( dateInput; "Thursday" ) & "¶"

    "Friday=" & GetDay2 ( dateInput; "Friday" ) & "¶" &

    "Saturday=" & GetDay2 ( dateInput; "Saturday" ) & "¶" &

    "Timestamp=" & GetDay2 ( GetAsTimestamp ( dateInput )  ; "Sunday" ) & "¶"

    "Text Date=" & GetDay2 ( GetAsText ( dateInput )  ; "Sunday" ) & "¶" &

    "Text TS=" & GetDay2 ( GetAsText ( GetAsTimestamp ( dateInput ) )  ; "Sunday"
    ) &

    )

    ;

    //    Regular Code

    Let ( [

    dateToProcess  = GetAsDate ( dateInput ) ;

    list = "Sunday¶Monday¶Tuesday¶Wednesday¶Thursday¶Friday¶Saturday" ;

    list = Left ( list ; Position ( list ; dayRequested ; 1; 1 ) ) ;

    dayNumber = ValueCount ( list ) ;

    numAdjustment = DayOfWeek ( dateToProcess ) – dayNumber

    ] ;

    dateToProcess  - numAdjustment

    )

    )

    ```


    ## Summary


    This chapter covered the basics of developing your own custom functions and the
    possibility of making them recursive. In the next chapter, we explore using the
    *Structured Query Language* (SQL) with the `ExecuteSQL` function.'
