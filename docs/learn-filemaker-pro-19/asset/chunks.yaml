  trans: '

    ### 文件触发器


    `文件触发器`（file trigger）可在发生文件事件时运行脚本。这些触发器在`文件选项`对话框（第 6 章）的`脚本触发器`选项卡中配置，如图 27-1
    所示。可通过选择`文件 ➤ 文件选项`菜单来访问此对话框。对话框顶部列出了所有可用的`文件事件`。复选框表示该事件处于活动状态，将触发所显示的脚本。下半部分显示所选事件的详细信息。点击`选择`指定与该事件关联的脚本。


    ![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig1_HTML.jpg](img/429700_2_En_27_Fig1_HTML.jpg)


    图 27-1：用于定义文件触发器的选项对话框选项卡


    #### OnFirstWindowOpen（首次打开窗口时）


    `OnFirstWindowOpen` 事件发生在数据库文件打开后、第一个窗口出现时，这提供了在用户开始工作之前自动执行设置功能的机会。触发的脚本可以初始化全局变量、自动打开其他窗口，或执行默认的查找与排序。此事件仅在用户打开数据库，或从另一个文件执行`打开文件`脚本步骤时发生。如果文件作为隐藏窗口打开在另一个数据库之后，通过关系显示资源，则*不会*触发此事件。


    **提示：** 在文件打开时导航至起始布局和隐藏工具栏，可以在`文件选项`对话框的`打开`选项卡中设置，无需触发器。


    #### OnLastWindowClose（关闭最后一个窗口时）


    `OnLastWindowClose` 文件事件发生在文件开始关闭最后一个界面窗口时。这为脚本提供了执行最后时刻维护任务的机会。如有必要，脚本可以通过返回
    false（0）值来停止关闭过程。例如，脚本可以使用`显示自定义对话框`步骤来确认用户是否确实打算关闭文件，并给他们取消的选择。在下面的示例中，对话框配置为第一个（默认）按钮命名为“取消”，第二个按钮命名为“关闭”。它使用`Get
    ( LastMessageChoice )` 函数检测点击了哪个按钮。如果用户点击第一个按钮取消，则返回零结果，导致触发事件停止，从而保持窗口和文件打开。


    ```

    显示自定义对话框 [ "确定要关闭数据库吗？" ]

    If [ Get ( LastMessageChoice ) = 1 ]

    退出脚本 [ 文本结果: 0 ]

    End If

    ```


    #### OnWindowOpen（打开窗口时）


    `OnWindowOpen` 文件事件发生在用户选择`窗口 ➤ 新建窗口`菜单或脚本运行`新建窗口`步骤创建任何新窗口之后。当之前因关系连接而作为隐藏窗口打开的文件首次被前置时，也会触发此事件。这为执行窗口的任何配置或设置程序提供了机会。例如，可用于将窗口精确定位在屏幕上、执行默认查找、排序、设置控制变量，或为使用窗口做其他准备。


    #### OnWindowClose（关闭窗口时）


    `OnWindowClose` 文件事件发生在*任何*窗口即将关闭*之前*。这为对窗口内查看的一条或多条记录执行最后时刻的验证功能或维护程序提供了机会。与其他发生在动作之前的事件一样，如果脚本返回
    false（0）值，过程将被停止，窗口保持打开状态。


    **注意：** 当首次打开文件时会触发两个窗口打开事件，关闭最后一个窗口时会触发两个窗口关闭事件。


    #### OnFileAVPlayerChange（文件媒体播放器变化时）


    `OnFileAVPlayerChange` 文件事件发生在容器字段或 URL 中播放的媒体文件的播放状态改变之后。例如，当暂停、播放、停止，或媒体播放到末尾停止时会触发此事件。此事件仅在
    iOS 设备上的 FileMaker Go 中支持。


    ### 布局触发器


    `布局触发器`（layout trigger）可在发生布局事件时运行脚本。这些触发器在`布局设置`对话框（第 18 章）的`脚本触发器`选项卡中配置，如图
    27-2 所示。该对话框与`文件选项`对话框类似，只是增加了用于控制事件在哪种窗口模式下启用的复选框。


    ![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig2_HTML.jpg](img/429700_2_En_27_Fig2_HTML.jpg)


    图 27-2：用于配置布局脚本触发器的对话框


    #### OnRecordLoad（加载记录时）


    `OnRecordLoad` 布局事件发生在记录成为当前记录之后。这为使用自动输入设置中过于复杂的值来设置默认字段值、创建相关记录，或执行其他自定义记录任务提供了机会。任何导致窗口激活记录的活动都会触发此事件。包括以下情况：


    * 在找到的记录集中导航到新记录

    * 导航到不同的布局

    * 创建新记录

    * 删除包含多条记录的找到记录集中的一条记录

    * 创建显示包含一条或多条记录的表的新窗口

    * 显示搜索结果


    #### OnRecordCommit（提交记录时）


    `OnRecordCommit` 布局事件发生在提交已修改的记录之前。这提供了在必要时停止提交操作的机会。如果脚本结果为 true（1），则原始事件正常进行。如果结果为
    false（0），则该事件被取消。任何导致当前记录提交的活动都会触发此事件，包括：


    * 用户通过键入 Enter 键或点击活动记录字段外部来显式提交记录

    * 导航到不同的记录

    * 创建、删除、复制或排除记录

    * 脚本执行`提交记录/请求`步骤

    * 打开`管理数据库`对话框或其他开发者对话框

    * 关闭文件


    #### OnRecordRevert（还原记录时）


    `OnRecordRevert` 布局事件发生在将已修改的记录还原到之前提交的状态之前。当用户选择`记录 ➤ 还原记录`菜单或脚本运行`还原记录/请求`步骤时会触发此事件。它提供了打开自定义对话框确认该操作、执行其他重置操作，或在必要时停止还原操作的机会。


    #### OnLayoutKeystroke（布局按键时）


    `OnLayoutKeystroke` 布局事件发生在键盘上键入任何字符时，但操作系统或 FileMaker 的活动菜单集处理的函数键除外。即使没有字段处于活动焦点，也会触发此事件，并且发生在按键事件发送给
    FileMaker *之前*。这为脚本提供了机会：当用户在进入字段之前开始输入时，用自定义消息覆盖默认错误对话框。也可以用于响应与菜单无关的组合键来运行脚本，或在向门户过滤器（第
    20 章，“过滤门户记录”）输入时刷新视图。以下示例使用两个以触发器为中心的 `Get` 函数，获取按下的按键，并在用户按住 macOS Control 键并键入“1”时运行脚本。脚本执行`执行脚本`步骤（此处未定义），然后使用`退出脚本`且返回结果为
    0 来停止按键操作。脚本会忽略用户按下的其他任何按键，并使它们继续进入活动字段。


    ```

    If [ Get ( TriggerModifierKeys ) = 4 and Get ( TriggerKeystroke ) = "1" ]

    执行脚本 [ ]

    退出脚本 [ 文本结果: 0 ]

    End if

    ```

    '
- fmt: '### Layout Events


    #### OnLayoutEnter


    `OnLayoutEnter` layout event occurs after a when a window switches to a different
    layout in Browse mode. This provides an opportunity to perform similar setup functionality
    as the triggers when opening a window or activating a record.


    #### OnLayoutExit


    `OnLayoutExit` layout event occurs before navigating away from the current layout.
    This provides an opportunity to validate and halt the navigation change if necessary.


    #### OnLayoutSizeChange


    `OnLayoutSizeChange` layout event occurs after the window has changed size. This
    happens when opening a window, resizing a window, hiding/showing the toolbar or
    formatting bar, and toggling an iOS device between portrait and landscape. This
    provides an opportunity to perform activity such as enforcing a minimum window
    size or repositioning a window to keep it centered perfectly within the bounds
    of the screen dimensions. The following formula can be used in a `Set Variable`
    step to establish variables for `$Height` and `$Width` using either the current
    window dimensions or switching to a default minimum when those values are too
    low. Those variables can then be used in the `Move/Resize Window` script step
    to enforce a minimum window size, in this case 800 x 1000.


    ```

    Let ( [

    Height = Get ( WindowHeight ) ;

    $Height = Case ( Height < 800 ; 800 ; Height ) ;

    Width = Get ( WindowWidth ) ;

    $Width = Case ( Width < 1000 ; 1000 ; Width )

    ] ;

    ""

    )

    ```


    #### OnModeEnter


    `OnModeEnter` layout event occurs after a change to Browse, Find, or Preview mode.
    This provides an opportunity to prepare a window for specific activity like setting
    up default find criteria, initializing variables, or adjusting print setup.


    #### OnModeExit


    `OnModeExit` layout event occurs before changing the window’s mode. This provides
    an opportunity for a script to validate and halt the mode change if necessary.


    #### OnViewChange


    `OnViewChange` layout event occurs after a change between Form, List, and Table
    view.


    #### OnGestureTap


    `OnGestureTap` layout event occurs when a tap gesture is performed on a layout.
    This provides an opportunity for a script to use the `Get ( TriggerGestureInfo
    )` function to determine details about the event and perform custom actions or
    halt the gesture if necessary. The event is triggered under the following conditions:


    - FileMaker Go and Windows only (except Windows 7).

    - Browse and Find modes only.

    - Tap is not made in active web viewers or active edit boxes.

    - Single tap is one, two, or three fingers (iOS).

    - Double tap with one finger (iOS), which will trigger the event twice.

    - Tap is with two fingers (Windows).


    #### OnExternalCommandReceived


    `OnExternalCommandReceived` layout event occurs when a user presses a button to
    control playback functions on an iOS device lock screen or on an external device,
    e.g., `play`, `pause`, `stop`, `next`, and `previous`. The triggered script runs
    *before* the event occurs, and it can use the `Get ( TriggerGestureInfo )` function
    to gain information about the external event.


    ### Object Triggers


    An *object trigger* runs a script in response to an event performed to or within
    a layout object. These can be configured in the dialog shown in Figure [27-3](#429700_2_En_27_Chapter.xhtml#Fig3),
    which is accessed by selecting an object and choosing the `Set Script Triggers`
    function from the `Format` menu or an object’s contextual menu. Also, the `Popover
    Panel Setup` dialog has a button to open this dialog (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Exploring the Popover Button Setup Options”).


    ![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig3_HTML.jpg](images/429700_2_En_27_Chapter/429700_2_En_27_Fig3_HTML.jpg)


    Figure 27-3


    The dialog used to configure object script triggers


    #### OnObjectEnter


    `OnObjectEnter` event occurs after a layout object receives active focus when
    a user clicks on the object or tabs into the object or when a script runs a step
    such as `Go to Object` or `Go to Next Field`.


    #### OnObjectKeystroke


    `OnObjectKeystroke` event occurs when any character is typed into an object with
    focus but before the event is completed. Similar to a layout keystroke trigger,
    this will ignore those keystrokes handled by the operating system or the FileMaker
    application, and it can be halted by exiting the script with a false (0) value.


    #### OnObjectModify


    `OnObjectModify` event occurs after the value of an object has changed. The event
    only occurs in response to interface-related actions. It does *not* occur when
    a window updates values that are modified in an external data source, when a field
    is updated by an auto-enter formula, or when the `Set Field` script step is used
    to update the value of a field. The following will trigger this event:


    - Typing keystrokes into the object

    - Selecting a new value in a value list formatted field

    - Using `Cut`, `Paste`, or `Clear` functions

    - Dragging and dropping content into it

    - Changing the value of the object with an interface-related script step such
    as `Insert Text`

    - Selecting a new tab control panel


    #### OnObjectValidate


    `OnObjectValidate` event occurs when the value of a modified field is ready for
    validation just prior to being saved when focus is about to move to another field
    or a record is in the process of being committed. This provides an opportunity
    to validate the change to the object, perform any preliminary actions, and/or
    halt the movement to another object if necessary.


    #### OnObjectSave


    `OnObjectSave` event occurs after a modified field has been validated but before
    being exited, providing another opportunity to halt the exit process.


    #### OnObjectExit


    `OnObjectExit` event occurs anytime an object is about to lose active focus regardless
    of any modifications. This happens when moving to another object, portal row,
    or field repetition. It also occurs when any action that causes a record to commit
    occurs. The script is triggered before exiting the object allowing it to halt
    the process if necessary.


    #### OnPanelSwitch


    `OnPanelSwitch` event occurs before the current view of a panel control is about
    to change and can be halted by exiting the script with a false (0) value. Built-in
    `Get` functions can determine the layout name of the object and the number of
    the current and target panels allowing a script to take specific actions pertinent
    to the change. The following formula can be placed into a `Show Custom Dialog`
    step of the target script or in the `Data Viewer` (Chapter [26](#429700_2_En_26_Chapter.xhtml))
    to illustrate these values, in the form of a sentence. Use them in an `If` statement
    to conditionally perform different sets of steps depending on which was the starting
    and ending panel.


    ```

    Let ( [

    currentPanel = GetValue ( Get ( TriggerCurrentPanel ) ; 1 ) ;

    targetPanel = GetValue ( Get ( TriggerTargetPanel ) ; 1 )

    ] ;

    "Changing from panel " & currentPanel & " to panel " & targetPanel & "."

    )

    ```


    #### OnObjectAVPlayerChange


    `OnObjectAVPlayerChange` event occurs after media in an object changes state.
    For example, the event will trigger a script when a user pauses, plays, or stops
    a video in a field or when the video stops upon reaching the end. This event is
    only supported in FileMaker Go on iOS devices.


    ## Understanding Event Precedence


    Many user actions will trigger multiple events, and FileMaker will execute the
    script triggers in a specific order of precedence. The choice of where your script
    intercepts the action depends on the kind of action intended and whether or not
    the option to cancel the event is important.'
  raw: '#### OnLayoutEnter


    The *OnLayoutEnter* layout event occurs after a when a window switches to a different
    layout in Browse mode. This provides an opportunity to perform similar setup functionality
    as the triggers when opening a window or activating a record.


    #### OnLayoutExit


    The *OnLayoutExit* layout event occurs before navigating away from the current
    layout. This provides an opportunity to validate and halt the navigation change
    if necessary.


    #### OnLayoutSizeChange


    The *OnLayoutSizeChange* layout event occurs after the window has changed size.
    This happens when opening a window, resizing a window, hiding/showing the toolbar
    or formatting bar, and toggling an iOS device between portrait and landscape.
    This provides an opportunity to perform activity such as enforcing a minimum window
    size or repositioning a window to keep it centered perfectly within the bounds
    of the screen dimensions. The following formula can be used in a *Set Variable*
    step to establish variables for *$Height* and *$Width* using either the current
    window dimensions or switching to a default minimum when those values are too
    low. Those variables can then be used in the *Move/Resize Window* script step
    to enforce a minimum window size, in this case 800 x 1000.


    ```

    Let ( [

    Height = Get ( WindowHeight ) ;

    $Height = Case ( Height < 800 ; 800 ; Height ) ;

    Width = Get ( WindowWidth ) ;

    $Width = Case ( Width < 1000 ; 1000 ; Width )

    ] ;

    ""

    )

    ```


    #### OnModeEnter


    The *OnModeEnter* layout event occurs after a change to Browse, Find, or Preview
    mode. This provides an opportunity to prepare a window for specific activity like
    setting up default find criteria, initializing variables, or adjusting print setup.


    #### OnModeExit


    The *OnModeExit* layout event occurs before changing the window’s mode. This provides
    an opportunity for a script to validate and halt the mode change if necessary.


    #### OnViewChange


    The *OnViewChange* layout event occurs after a change between Form, List, and
    Table view.


    #### OnGestureTap


    The *OnGestureTap* layout event occurs when a tap gesture is performed on a layout.
