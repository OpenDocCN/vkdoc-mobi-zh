- fmt: '### Exploring the Workspace Toolbar


    The `toolbar` of the `Script Workspace` window, shown in Figure 24-2, is a static
    toolbar of controls focused on script design and troubleshooting.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig2_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig2_HTML.jpg)


    *Figure 24-2*


    The workspace toolbar contains several static buttons. The following function
    buttons are available in the toolbar:


    1. `Create Script` – Creates a new script, open for editing.

    2. `Run Script` – Runs the selected script directly from the `Script Workspace`
    using the context of the frontmost window behind it.

    3. `Script Debugger` – Opens the `Script Debugger` window and runs the selected
    script (Chapter 26).

    4. `Compatibility` – Diminishes steps in the `Steps` pane and the content area
    based on compatibility with the selected device and software platforms.

    5. `Scripts Pane` – Toggles the visibility of the `Scripts` pane on the left side
    of the window.

    6. `Steps Pane` – Toggle the visibility of the `Steps` pane on the right side
    of the window.


    ### Exploring the Scripts Pane


    The `scripts pane` on the left side of the window displays a list of every script
    defined in the file. The pane’s visibility can be toggled by clicking the toolbar
    button. Scripts are displayed with an icon and name, as shown in Figure 24-3.
    In the pane, each script is an interactive region that hides an assortment of
    functionality.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig3_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig3_HTML.jpg)


    *Figure 24-3*


    The scripts pane on the left side of the workspace window.


    - A `single click` on a script name will select and open it in the content area
    where it can be viewed and edited. When unmodified, it automatically closes when
    another is selected.

    - A `second single click` on a selected script will cause the name to become editable
    directly in the list. Edit the name and type `Enter`.

    - A `double-click` will open the script in a locked tab where it remains open
    until explicitly closed.

    - A `right-click` opens a contextual menu containing functions also present in
    the `Scripts` menu.


    A `script folder` can be used to organize groups of scripts. Click the middle
    `+` icon at the top of the `script pane` to create a new folder, and then enter
    a name and type `Enter`. Once created, scripts can be dragged from the list into
    a folder. Folders can be dragged into other folders to create a nested hierarchy
    which can be collapsed or expanded to hide or show each folder’s content. Similar
    to scripts, two successive single clicks on a folder make its name editable.


    A `separator line` can be inserted anywhere in the list to create visual space
    between long lists of folders or scripts. Just click the line icon on the right
    at the top of the pane.


    The checkbox makes a script, folder, or separator appear in the `Scripts` menu
    visible by default when viewing regular windows. If the checkbox is not visible,
    click the first icon at the top. Folders included in the menu form submenus, and
    scripts become menu items that can be selected by users to run a script.


    Scripts, separators, and folders in the list can be deleted, duplicated, and more
    using the commands in the contextual menu and in the `Scripts` menu visible only
    when the `Script Workspace` is open.


    ### Exploring the Script Content Area


    The `script content area` at the center of the `Script Workspace` window displays
    open scripts and is used to view or edit the action steps that define the current
    selection. As shown in Figure 24-4, scripts are automatically opened into tabs,
    making it easy to jump back and forth between multiple open scripts. They can
    also be moved into separate windows using the contextual menu on the tabs or a
    function in the `Scripts` menu.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig4_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig4_HTML.jpg)


    *Figure 24-4*


    The script content area of the workspace window.


    1. `Script Tabs` – Hover the cursor over a tab to reveal and click a close icon.
    Right-click to open a contextual menu of functions. Drag horizontally to rearrange
    the tabs.

    2. `Script Steps` – A numbered list of interactive lines, each representing one
    step in the scripted process.

    3. `Unsaved Change Indicator` – This asterisk icon indicates the script has been
    modified since opening.

    4. `Preview Mode Indicator` – Indicates the script is open in a temporary state
    with no changes.


    ### Steps Pane


    The `steps pane` on the right of the `Script Workspace` window contains a list
    of every available action step, as shown in Figure 24-5. This includes `built-in`
    steps and steps from installed `plug-ins`. The pane’s visibility requires a selected
    script and can also be toggled open or closed by clicking the toolbar button.
    The list can be toggled between an alphabetic or categorical arrangement using
    the icon at the top shown in the figure.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig5_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig5_HTML.jpg)


    *Figure 24-5*


    The pane of steps can be alphabetical (left) or hierarchical (right).


    A script step can be inserted into the active open script by double-clicking on
    it or by right-clicking and choosing `Insert Into Script` from the contextual
    menu. That menu includes options to add or remove the step from the `Favorites`
    category (only available when steps are viewed in a categorical hierarchy) or
    to open the step in the online help guide. The `description pane` at the bottom
    provides a brief description of the selected step, and the help icon button opens
    the online documentation.


    ### Menu Changes (Script Workspace)


    The menu bar is radically transformed when working in the `Script Workspace`.
    Any active menu set (standard or custom) is replaced by a set specifically designed
    for working with scripts. Many inapplicable standard menus are removed completely,
    while the `Edit`, `View`, and `Scripts` menus are radically transformed.


    #### Edit Menu


    The `Edit` menu of the workspace contains a modified set of functions, as shown
    in Figure 24-6. Below standard functions such as `Cut`, `Copy`, and `Paste`, new
    items have been added for `Duplicate Step` and a toggling item to `Disable/Enable`
    selected script steps.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig6_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig6_HTML.jpg)


    *Figure 24-6*


    The Edit menu when working in the Script Workspace.


    #### View Menu


    The `View` menu of the workspace contains a completely unique set of functions,
    as shown in Figure 24-7. This menu provides basic workspace functions for toggling
    pane visibility, managing tabs, and other functions, including many accessible
    through various buttons and contextual menus within the workspace.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig7_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig7_HTML.jpg)


    *Figure 24-7*


    The View menu when working in the Script Workspace.'
