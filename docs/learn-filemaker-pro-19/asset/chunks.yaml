    ### 数据格式化


    可使用“数据格式化”控件来转换原始字段内容在屏幕上的渲染方式。如图 19-17 所示，四个图标按钮用于指示所选字段的数据类型：`数字`、`日期`、`时间`或`容器`。这些按钮会根据所选字段的数据类型有条件地启用。“格式”弹出菜单包含的选项因所选数据类型而异，而菜单下方的区域则根据此菜单中的选择而变化。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig17_HTML.jpg](img/429700_2_En_19_Fig17_HTML.jpg)


    **图 19-17** “检查器”中“数据”面板的“数据格式化”子组


    #### 数字的数据格式化选项


    “数字”的“格式”菜单选项包括：


    - **常规** – 按输入时的数值显示，不做特殊格式化，但可能会四舍五入或使用科学记数法，以适应该字段的范围。

    - **按输入格式** – *完全*按照输入时的数值显示，不做任何更改，如果数字超出字段范围则显示问号。

    - **布尔** – 将零和非零值转换为布尔格式。默认为`是`和`否`，但可替换为其他词语或符号。

    - **十进制** – 包含小数位数、记数法、负值格式、分隔符选择等选项，例如，`1003.7568`可以显示为`1,003.75`或`#1003`。

    - **货币** – 包含显示货币格式的选项，例如，`5.7534`可以显示为`$5.75`、`$5`等。

    - **百分比** – 包含显示百分比的选项，例如，`.62`可以显示为`62%`或`62.00%`。


    #### 日期的数据格式化选项


    “日期”的“格式”菜单选项包括各种预配置的日期格式选项，并可通过详细的界面（如图 19-18 所示）定义自定义格式。这允许进行精细控制，选择任何日期组件、顺序、分隔符，并为日和月的数字提供前导零选项。使用这些控件，在字段中输入为“1/15/2017”的日期可以显示为多种不同的组合，包括：


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig18_HTML.jpg](img/429700_2_En_19_Fig18_HTML.jpg)


    **图 19-18** 用于格式化日期的“自定义”选项


    - `2017 年 1 月 15 日`

    - `2017.01.15`

    - `2017.01.15`

    - `2017 年 1 月 15 日`

    - `2017 年 1 月 15 日 星期日`

    - `2017 年 01 月 15 日 星期四`


    #### 时间的数据格式化选项


    “时间”的“格式”菜单选项与日期格式化的选项类似。可以从各种预配置的时间格式中选择，输入自定义格式，并选择 24 小时制或 12 小时制、为小时和分钟添加前导零等。


    #### 容器的数据格式化选项


    容器的“格式”菜单选项控制图像相对于字段对象的大小调整方式：`裁剪至框架`、`缩小图像以适合`、`放大图像以适合`，或`缩小或放大图像以适合`。菜单下方还有几个附加设置。有`保持原始比例`的选项，当图像缩小或放大以适合字段时，此选项可保持图像的纵横比固定。“对齐”控件提供在字段内的定位。其他选项可控制图像优化或启用对嵌入在字段中的
    PDF、音频和视频文件的交互式控制。


    ---


    ### 本章小结


    本章介绍了“对象”和“检查器”面板。我们探索了它们提供的各种工具和设置。在下一章中，我们将开始创建对象。


    ---


    # 20. 创建布局对象


    *布局对象*是一种界面元素，用于显示信息、接受数据输入和/或启动脚本化进程。对象可以是八种类型之一：`字段`、`文本`、`按钮`、`面板`、`门户`、`Web
    查看器`、`图表`或`形状`。本章介绍所有类型的布局对象，涵盖以下主题：


    - 在布局上插入对象

    - 使用字段对象

    - 使用文本

    - 使用按钮控件

    - 使用面板控件

    - 使用门户

    - 使用 Web 查看器

    - 使用图表


    ## 在布局上插入对象


    可以使用以下方法将任何对象的新实例插入到布局中：


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig1_HTML.jpg](img/429700_2_En_20_Fig1_HTML.jpg)


    **图 20-1** 用于向布局添加对象的工具栏图标


    - 选择图 20-1 中所示的工具栏图标。然后，在设计区内单击并拖动以定义对象的尺寸。

    - 从“插入”菜单中选择对象类型，以在布局上的默认大小和位置快速放置一个新实例。

    - 选择现有对象并选择“编辑 ➤ 复制”菜单，将其复制为一个新实例。

    - 选择现有对象并使用“拷贝”和“粘贴”功能，或按住 Option 键拖动，以创建现有对象的新副本。


    **备注**：有几种对象的插入方式有所不同，本章将会说明。


    当对象首次添加到布局时，它将处于原始状态，并可供配置。根据对象类型的不同，可以使用不同的方法进行配置。双击大多数对象类型将打开一个特定类型的配置对话框，通常侧重于数据配置选项，而非格式化或其他行为控制。选定的对象可以通过“格式栏”（第
    3 章）中的选项、“格式”和“排列”等菜单中的选项，以及“检查器”面板中的选项进行操作。


    **注意**：布局上任何对象的实际外观将根据对象状态、自定义格式设置、条件格式设置（第 21 章）以及分配给布局的主题（第 22 章）而有所不同。

