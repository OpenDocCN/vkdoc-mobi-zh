    When encrypting a multi-file solution, be sure to use the same Developer Account
    and encryption password for every database.


    ##### Removing Database Encryption


    The *Remove Database Encryption* option will save a copy of the files in an unencrypted
    state, restoring normal operating behavior and access methods. Select the option
