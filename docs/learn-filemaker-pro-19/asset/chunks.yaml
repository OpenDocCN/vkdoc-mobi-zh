    Each of these parsing functions accepts a *date parameter* and returns a specific
    component indicated by the function name. The date provided can be a formal date
    from a date field or constructed with the *Date* function. It also accepts a literal
    text-based date.


    ```

    Day ( Date ( 1 ; 15 ; 2021 ) )   // result = 15

    Day ( "2/26/2021" )                    // result = 26

    DayName ( Date ( 1 ; 15 ; 2021 ) )      // result = Friday

    DayName ( "6/27/1758" )                 // result = Tuesday

    DayOfWeek ( Date ( 1 ; 15 ; 2021 ) )    // result = 6

    DayOfWeek ( "6/27/1758" )               // result = 3

    DayOfYear ( Date ( 1 ; 15 ; 2021 ) )    // result = 15

    DayOfYear ( "6/27/1758" )               // result = 178

    Month ( Date ( 1 ; 15 ; 2021 ) )        // result = 1

    Month ( "6/27/1758" )                   // result = 6

    MonthName ( Date ( 1 ; 15 ; 2021 ) )    // result = "January"

    MonthName ( "6/27/1758" )               // result = "June"

    WeekOfYear ( Date ( 1 ; 15 ; 2021) )    // result = 3

    WeekOfYear ( "6/27/1758" )              // result = 26

    Year ( Date ( 1 ; 15 ; 2021 ) )         // result = 2021

    Year ( "6/27/1758" )                    // result = 1758

    ```


    The *WeekOfYearFiscal* function calculates a number representing the week of a
    year for a given date based on a specified starting date for a workweek. This
    is useful in accounting applications to calculate if a year has an extra pay period
    because a week is split across the calendar year boundary. These examples show
    how Friday, January 2, 2009, can be either the first week of 2009 or the fifty-third
    week of 2008 depending on the day number provided as the start of the week, indicated
    by the second parameter.


    ```

    WeekOfYearFiscal ( "1/2/2009" ; 1 )     // result = 53

    WeekOfYearFiscal ( "1/2/2009" ; 2 )     // result = 1

    WeekOfYearFiscal ( "1/2/2009" ; 3 )     // result = 1

    WeekOfYearFiscal ( "1/2/2009" ; 4 )     // result = 1

    WeekOfYearFiscal ( "1/2/2009" ; 5 )     // result = 1

    WeekOfYearFiscal ( "1/2/2009" ; 6 )     // result = 1

    WeekOfYearFiscal ( "1/2/2009" ; 7 )     // result = 53

    ```


    #### Creating Times


    The *Time* function accepts a numeric *hour*, *minute*, and *second* parameters
    and returns a time object.


    ```

    Time ( 9 ; 15 ; 55 )    // result = 9:15:55

    Time ( 2 ; 8 ; 19 )     // result = 2:08:19

    ```


    #### Creating Timestamps


    The *Timestamp* function accepts a *date* and *time* parameter and returns a timestamp
    object. These examples show that timestamps will automatically add the appropriate
    AM/PM suffix to the time portion.


    ```

    Timestamp ( "1/15/2021" ; "9:15:55" )

    // result = 1/15/2021 9:15:55 AM

    Timestamp ( Date ( 5 ; 10 ; 1990 ) ; Time ( 10 ; 30 ; 00 ) )

    // result = 5/10/1990 10:30:00 AM

    ```


    If the hours are out of normal range, as in military time, the function will automatically
    convert to civilian time, also with the appropriate AM/PM suffix:


    ```

    Timestamp ( "1/15/2021" ; "15:15:55" )

    // result = 1/15/2021 3:15:55 PM

    ```


    #### Parsing Times


    Each of these functions accepts a *time* or *timestamp* parameter and returns
    a specific component.


    ```

    Hour ( "09:15:55 AM" )                  // result = 9

    Hour ( "4/20/2021 03:30:00 PM" )        // result = 15

    Minute ( "09:15:55 AM" )                // result = 15

    Minute ( "4/20/2021 03:30:00 PM" )      // result = 30

    Seconds ( "09:15:55 AM" )               // result = 55

    Seconds ( "4/20/2021 03:30:00 PM" )     // result = 0

    ```


    #### Calculating Time Elapsed


    There are several ways to calculate the time elapsed from a start and end dates,
    times, and timestamps. These examples can be used with values stored in fields
    and variables or hard coded into formulas (as shown). The first example calculates
    the number of days elapsed, simply subtracting the latter from the former. The
    others demonstrate calculating time elapsed.


    ```

    GetAsDate ( "1/30/2021" ) - GetAsDate ( "1/15/2021" )     // result = 15

    Time ( 11 ; 15 ; 48 ) - Time ( 8 ; 10 ; 35 )              // result = 3:05:13

    GetAsTime ( "4:15:00 pm" ) - GetAsTime ( "11:15:00 am" )  // result = 5:00:00

    ```


    Although timestamps work the same, these will return the amount of time elapsed
    between the two date-time combinations. When these span across multiple days,
    the results may not be easily human readable, as demonstrated by the following
    example. See the “Converting Seconds into a Sentence” example at the end of this
    chapter to see how to convert time elapsed into a human-readable form.


    ```

    GetAsTimestamp ( "8/1/2021 10:15 AM" ) - GetAsTimestamp ( "1/1/2021 10:00 AM"
    )

    // result = 5088:15:00

    ```


    ## Working with Text


    There are numerous functions available for performing various operations on text
    values such as *analyzing*, *changing data type*, *formatting*, *modifying,* and
    *parsing*.


    ### Analyzing Text


    There are three functions available that are used to analyze text: *Length*, *PatternCount,*
    and *Position*.


    #### Length


    The *Length* function counts the total number of characters in the text provided,
    automatically converting non-text values to text before counting. For example,
    a number will be converted to text and the number of digits returned, e.g., 24
    will return “2.”


    ```

    Length ( "Hello World" )        // result = 11

    Length ( "Two¶Paragraphs" )      // result = 14

    Length ( 359 )                   // result = 3

    ```


    Remembering that formal date objects are different than a date string, notice
    the difference in the following examples. The first example converts the date
    into a number and then to text and then counts the number of digits. A date string
    will simply count characters, producing a different value.


    ```

    Length ( 1/15/2021 )            // result = 17

    Length ( "1/15/2021" )          // result = 9

    ```


    #### PatternCount


    The *PatternCount* function counts the number of times a piece of text contains
    a search string. The first parameter specifies the text to be searched and the
    second the string whose pattern will be counted. The result is a number indicating
    the number of times the search string is detected inside the text.


    ```

    PatternCount ( "Hello, World. How is your world today?" ; "world" )    // result
    = 2

    PatternCount ( "15839" ; "4" )                        // result = 0

    PatternCount ( "Jim¶John¶Jo" ; "Jo" )                 // result = 2

    ```


    The function is *not case-sensitive* and searches for matches *anywhere* in the
    text, including as part of a word or paragraph.


    ```

    PatternCount ( "The age of his page caused RAGE." ; "age" )    // result = 3

    ```


    Tip


    The *PatternCount* function finds partial matches in paragraphs. Use *FilterValues*
    to find full paragraph values instead (see “Manipulating Value Lists” later in
    this chapter).


    #### Position


    The *Position* function finds the numeric starting position of the first character
    of a specified occurrence of some text in the provided text. The function accepts
    four parameters. The *text* parameter provides the text that will be searched
    and the *searchString* indicates what pattern of text to locate. A *start* parameter
    is a number indicating the character position, counting from the left, where the
    search will begin. Finally, the *occurrence* parameter is a number indicating
    the desired occurrence of a match found in the search string after the starting
    position that should be used as the result. So, if a string exists multiple times
    in the text, the last two parameters can be used to specify where to begin searching
    and/or which match of many should be returned.


    ```

    Position ( text ; searchString ; start ; occurrence )

    Position ( "Where is Waldo today?" ; "Waldo" ; 1 ; 1 )        // result = 10

    Position ( "Where is Waldo today?" ; "Waldo" ; 1 ; 2 )        // result = 0

    Position ( "Waldo is looking for Waldo?" ; "Waldo" ; 1 ; 2 )  // result = 22

    ```'
