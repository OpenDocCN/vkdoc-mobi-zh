  trans: '

    ### 存储选项实验


    与输入字段类似，计算字段也拥有*存储选项*，用于控制公式结果的存储方式，如图 12-5 所示。*全局存储*和*索引*的设置与*输入*字段类似（见第 8 章），但多了一个索引选项。勾选`不存储计算结果`复选框会强制计算字段永远不索引结果，而是在每次访问或显示该字段时自动重新计算。创建新字段时，此复选框默认处于未选中状态。


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig5_HTML.jpg](img/429700_2_En_12_Fig5_HTML.jpg)


    **图 12-5** 已禁用索引的存储选项对话框


    为了演示存储的效果，先配置一个返回*文本*结果的`"Hello World"`公式，并保持`不存储`复选框未选中。保存公式，并在浏览模式下确认字段正确显示。然后再次打开公式，在文本前输入两个正斜杠，将整个公式转换为注释，如下例所示。


    ```

    // "Hello World"

    ```


    不做其他修改，保存公式并再次在浏览模式下查看。如果它仍然显示值“Hello World”，好像什么都没变，不必惊讶。这是因为现有记录中存储了计算结果。如果选择`记录
    ➤ 新建记录`菜单，新记录将在该字段中正确显示空白值，反映出公式已被注释掉的事实。由于复选框设置为不重新计算结果，先前记录的旧值会保持不变，直到有事件触发更新才会改变。


    与其他字段类型一样，计算字段使用索引设置以某种方式预处理数据，从而加快搜索速度或建立关系。然而，此设置允许计算字段在没有其他事件触发重新计算时，不重新计算更新的结果。如果公式被大幅修改，则*会*提示每条记录刷新结果。例如，如果公式更改为一个完全不同的文本常量，它将更新并显示新值。为了强制上述被注释掉的例子正确工作，请勾选`不存储计算结果`复选框，保存，然后在浏览模式下查看。所有记录（包括现有记录）的该字段都将为空。


    尽管这个简单的例子并不能实际代表你将会面临的各类挑战，但它清晰地说明了在某些情况下你需要调整存储设置。例如，使用了`Get ( FoundCount )`或`Get
    ( RecordNumber )`等内置函数的公式将*需要*通过勾选禁止存储的复选框来强制重新计算。与此不同，包含字段引用的公式则会在这些字段值被修改时*自动*更新。


    ### 插入公式组件


    `指定计算`对话框允许在公式中插入*字段引用*、*函数*和*运算符*。输入文本有多种方式：键入、复制粘贴或拖放文本。字段引用和函数调用也可以通过双击对话框两侧窗格中的项目来插入。


    #### 使用自动完成


    对话框的公式区域将文本输入与动态辅助功能相结合，该功能可以检测关键短语并提供*自动完成建议界面*，如图 12-6 所示。当你输入时，可用组件的列表会刷新，包含以你输入的字母或短语开头的所有内置函数、自定义函数和字段的混合列表。在示例中，输入字母“E”会显示一个包含三个函数和一堆字段的列表。当你继续输入“Ex”、“Exa”和“Exam”时，列表会持续过滤，直到只看到我们的示例字段列表。


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig6_HTML.jpg](img/429700_2_En_12_Fig6_HTML.jpg)


    **图 12-6** 公式输入时自动完成功能的示例


    当自动完成列表出现时，你可以选择忽略它继续输入，或者选择一个项目进行快速插入。可以通过滚动、使用方向键垂直导航，或继续输入足够多的文本直到所需项目成为列表顶部的默认选项，来定位列表中的项目。一旦找到并选中后，可以通过双击或按`回车`键将其插入到公式中。


    #### 使用字段选择窗格


    *字段选择面板*，如图 12-7 所示，用于定位和插入字段引用。


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig7_HTML.jpg](img/429700_2_En_12_Fig7_HTML.jpg)


    **图 12-7** 对话框左侧的字段选择窗格


    顶部的弹出式菜单用于选择下方列出其字段的哪个表 occurrence。默认选择基于当前上下文。编辑计算字段时，默认将是包含正在定义字段的表，occurrence
    列表将分为相关和无关 occurrence，以帮助区分哪些关系可以使用。当为布局对象、脚本步骤或其他项目编辑公式时，列表默认为当前布局的表，并按字母顺序列出所有
    occurrence，你需要负责根据执行时活动的适当上下文，安全地选择一个有效的关系。选择一个 occurrence 后，字段列表会更新，并可以搜索或排序。要将引用插入公式，双击它即可。


    #### 使用函数选择窗格


    *函数选择面板*，如图 12-8 所示，用于定位和将函数插入到公式中。它包含一个*内置函数*（第 13 章）、*自定义函数*（第 15 章）和*插件函数*（第
    28 章）的列表。函数列表可以按类别分组（如图所示），或者使用排序图标下的菜单按字母顺序列出。可以通过在文本区搜索关键词，或者从排序菜单中选择一个类别来搜索。找到所需函数后，双击它即可将其插入公式。在此面板底部有一段简短的描述和一个帮助按钮，用于打开所选函数的在线文档。


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig8_HTML.jpg](img/429700_2_En_12_Fig8_HTML.jpg)


    **图 12-8** 对话框右侧的函数窗格


    ### 创建重复计算字段


    通过在`指定计算`对话框底部的`重复次数`中输入一个数字，可以将计算字段定义为重复字段。重复计算字段的工作原理类似于重复输入字段（第 8 章）。但是，在处理重复计算字段时，可能需要一些技术和内置函数。

    '
- fmt: '#### Using Repeating Fields in a Repeating Calculation


    Repeating calculations work as expected when all fields used in the formula are
    configured with the same number of repetitions as the calculation field. The example
    illustrated in Figure 12-9 shows two entry fields containing numbers that are
    added into a sum within a calculation field. Each field is defined with *three
    repetitions*. In the example shown, the calculation field’s formula would be defined
    to add the numbers together. The formula is automatically applied to each repetition
    set of the two entry fields, and the resulting value for each is placed into the
    corresponding repetition in the calculation field.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig9_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig9_HTML.jpg)


    Figure 12-9: An illustration of a calculation where all fields have the same number
    of repetitions


    ```

    Repeating Number 1 + Repeating Number 2

    ```


    #### Using Non-repeating Fields in a Repeating Calculation


    When *non-repeating fields* are used in a repeating calculation field’s formula,
    use the `Extend` function to allow the non-repeating field to be *virtually expanded*
    to match the number of repetitions. The example illustrated in Figure 12-10 shows
    one single-repetition entry field, another entry field with three repetitions,
    and a calculation field with three repetitions.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig10_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig10_HTML.jpg)


    Figure 12-10: An illustration of a mixture of repeating and non-repeating fields


    For the formula to successfully apply the value in the non-repeating field to
    each value in the repeating field and generate three results, the formula must
    extend the non-repeating field as shown in the following example. The single value
    will be treated as if it were three separate repetitions, each populated with
    the same value.


    ```

    Extend ( Non-Repeating Number ) + Repeating Number 1

    ```


    #### Other Repetition Functions


    There are other built-in functions that are useful in both *repeating* and *non-repeating*
    calculations. The `Get ( ActiveRepetitionNumber )` function returns a number indicating
    which repetition of the current field has the cursor focus. This can be used by
    interface-related calculations and script steps to determine where the cursor
    is located within a repeating field. The `GetRepetition` function can be used
    to extract the value from a specific repetition of a specified repeating field.
    The `Get ( CalculationRepetitionNumber )` function returns a number indicating
    which repetition of a repeating calculation field is currently being evaluated.
    This allows the calculation field formula to know which repetition of its own
    field structure is currently being evaluated when each repetition needs to perform
    slightly different functionality.


    ### Including Space for Visual Formatting


    When compiling a formula, FileMaker will ignore any extra spaces, tabs, and paragraph
    returns that are outside of quoted text. This means you can add white space throughout
    a formula to spread out the code and make it easier to read. When writing formulas,
    consider a policy of always adding space between items to expand complex statements
    into an easier to read format.


    #### Adding a Space Between Items


    Space can be added between formula components to spread the text horizontally
    and making it easier to read. The following pairs of code show a cramped example
    without spaces and the same line repeated with space added. In each set, the two
    are functionally identical.


    ```

    (150+50)/25

    ( 150 + 50 ) / 25

    $FirstName&$Space&$LastName

    $FirstName & $Space & $LastName

    Get(CurrentDate)

    Get ( CurrentDate )

    ```


    #### Expanding Complex Statements


    Formulas involving complex `Case`, `Let`, `Substitute`, `While`, and certain `JSON`
    functions (Chapters [13](#429700_2_En_13_Chapter.xhtml) and [14](#429700_2_En_14_Chapter.xhtml))
    can benefit from spaces, tabs, and carriage returns. While the exact format may
    vary depending on the complexity of the statement and the use of nested clauses,
    the following simple examples show a few patterns of the author’s preferred format
    for separating and indenting complex statements to enhance their visual format:


    ```

    // CASE Example

    Case (

    Condition1 = result1 ;

    Condition2 = result2

    )

    // LET Example

    Let ( [

    var1 = expression1 ;

    var2 = expression2

    ] ;

    calculation

    )

    // SUBSTITUTE Example

    Substitute (

    Text ;

    [ searchString1 ; replaceString1 ] ;

    [ searchString2 ; replaceString2 ]

    )

    ```


    #### Managing Character Limits


    FileMaker limits the overall text of each formula to 30,000 characters. When writing
    lengthy formulas, the natural tendency to *avoid* adding spaces, tabs, and paragraph
    returns to save space and avoid hitting that limit. However, there are techniques
    that can be employed to manage space *without* requiring code to become condensed
    and less readable. First, evaluate the reasons why the formula is so long. With
    some exceptions, lengthy formulas often have redundant elements and phrases. A
    lengthy field reference used repeatedly can be condensed into a shorter statement
    variable with a `Let` statement (Chapter [13](#429700_2_En_13_Chapter.xhtml)).
    For example, a field reference of `Contact::Contact Name First` can be placed
    into a variable called something like “nameFirst” and used repeatedly, with each
    subsequent instance using far less space. Also, renaming variables to shorten
    their length without losing clarity can save space. Some parts of a formula can
    be offloaded to a custom function (Chapter [25](#429700_2_En_25_Chapter.xhtml)),
    especially when the functionality is generic and used elsewhere in the database.
    Another option is to break a complex calculation into separate fields or script
    steps, rather than trying to force a huge process into one.


    **Tip** Make a habit of efficient coding with meticulous attention to clarity
    and an efficient technical design regardless of formula length.


    ### Adding Simple Calculations to the Example File


    To experiment with formulas, add a couple of simple calculations to tables in
    the *Learn FileMaker* database.


    #### Company Contact Count


    In the *Company* table, follow these steps to add a new calculation field called
    “Company Contact Count” with a formula that counts related contact records:


    1. Open the *Manage Database* dialog and select the *Fields* tab for the *Company*
    table.

    2. Create the new calculation field.

    3. Select the *Company | Contact* table occurrence from the pop-up menu in the
    field selection panel.

    4. In the formula area, begin typing “Count” and select the `Count` function from
    the auto-complete list.

    5. Double-click on the *Record ID* field from the *Company | Contact* table occurrence.
    The formula should read: `Count ( Company | Contact::Record ID )`

    6. Make sure the result type is *number*.

    7. Click to save and close the dialog.

    8. Place the new field on the *Company* layout to confirm that it accurately counts
    the related contacts for each company. Remember that the count will vary from
    one record to the next depending on company assignments to contacts.'
