- fmt: '### Defining an ODBC “Shadow Table” in FileMaker


    When an `ODBC` table is added to the relationship graph, FileMaker automatically
    creates a *shadow table* in the *Tables* tab. This is an internal representation
    that mirrors the external table. These appear in the list on the *Tables* tab
    with italic formatting. Although this brings the external table into the database
    and allows interactions similar to a native FileMaker table, there are a few notable
    differences, including:


    - **Schema Lock** – The structure of the external data source is not available
    for modification from within FileMaker. The shadow table in FileMaker allows some
    modification, but this does not affect the remote table.

    - **Deleting Fields** – Fields can be deleted from the shadow table to help thin
    out the amount of data queried, but the fields remain in the remote table.

    - **Modifying Fields** – Auto-Enter settings (Chapter [8](#429700_2_En_8_Chapter.xhtml))
    for fields can be customized for the shadow table.

    - **Adding Supplemental Fields** – Fields can be added to the shadow table but
    are limited to unstored calculations and summary fields and are not added to the
    remote table.

    - **Data Types** – When the remote table has separate data types for certain information
    that are handled as a single data type by FileMaker (e.g., integers and floating-point
    data instead of just number fields), a calculation may be required to convert
    data into a FileMaker data type.

    - **Data Entry Limitations** – When the amount of data for certain field types
    is limited, FileMaker will try to respect these limits to avoid problems, but
    special care may be required.

    - **Data Updates** – Automatic refreshes of record changes in the external table
    are less frequent across the network than changes to native FileMaker tables.
    Use the *Refresh Window* script step to force an update and ensure that the data
    displayed is current.

    - **Record Locking** – Unlike native tables, records open for editing are not
    locked, so users can be editing the same record simultaneously. A warning dialog
    will alert users if the record had been modified since they began editing and
    give them the ability to stop to avoid overwriting the other user’s changes.

    - **Indexing** – FileMaker can’t index SQL fields, so searches in external tables
    should be limited to those fields already indexed by the remote table to avoid
    long delays.


    **Tip**

    Claris’ technical brief “Introduction to External SQL Sources” contains more information
    about `ODBC`, `JDBC`, and the various connection options to and from FileMaker
    databases.


    ### Renaming and Deleting Tables


    A table selected in the *Tables* tab from the *Manage Database* dialog can be
    renamed or deleted. To rename, enter a new name in the *Table Name* text area,
    and click the *Change* button. To delete, click the *Delete* button. A *Delete
    Tables* warning dialog will appear to confirm you want to continue, as shown in
    Figure [7-10](#429700_2_En_7_Chapter.xhtml#Fig10). The dialog includes a check
    box that, when selected, will also delete the corresponding table occurrence in
    the relationship graph (Chapter [9](#429700_2_En_9_Chapter.xhtml)). If not selected,
    any table occurrences in the graph will become *<missing table>* placeholders.
    A deleted table’s field definitions and records will always be deleted, while
    layouts will remain until manually deleted or reassigned.


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig10_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig10_HTML.jpg)


    **Figure 7-10** The warning dialog when deleting tables


    ### Adding Tables to the Example Database


    Before continuing, add three tables to the *Learn FileMaker* database: *Company*,
    *Contact*, and *Project*. For now, create the tables and leave the automatically
    created default fields, table occurrences, and layouts in place. Once finished,
    the dialog should appear as shown in Figure [7-11](#429700_2_En_7_Chapter.xhtml#Fig11).


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig11_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig11_HTML.jpg)


    **Figure 7-11** The *Learn FileMaker* database tables with default fields


    ## Summary


    This chapter explored the basics of working with tables, both natively in FileMaker
    and connecting to an external SQL data source. In the next chapter, we learn how
    to add fields to tables and configure their various properties.


    # 8. Defining Fields


    A *field* is a defined data entry space within a table. Using the spreadsheet
    analogy, a field is like a column, named and configured to contain a specific
    type of data. This chapter focuses on the following field-related topics:


    - Defining field data types

    - Introducing the *Manage Database* dialog (fields)

    - Planning field names

    - Defining default fields

    - Managing fields

    - Setting field options

    - Adding fields to the example database


    ### Defining Field Data Types


    FileMaker supports eight different types of fields which fall into one of two
    categories: *entry fields* and *display fields*.


    #### Entry Fields


    An *entry field* is a field capable of data input by a user, script, or import
    process. FileMaker has six types of entry fields, each for a specific class of
    data: *text*, *number*, *date*, *time*, *timestamp*, and *container*.


    **Note**

    By definition, an entry field can accept input. However, a user’s ability to do
    so in a given instance will depend on the field’s layout presence (Part 4) and
    the user’s security settings (Chapter [30](#429700_2_En_30_Chapter.xhtml)).


    ##### Text Fields


    A *text field* is used to store any combination of letters, symbols, or numbers
    as a string of any length up to ten million characters. The content of a text
    field can be plain text with layout settings controlling display format, or they
    can include embedded formatting information, richly styled with font, size, style,
    and color. When sorting records by a text field, the values will be sorted in
    alphabetical order. This means that numbers contained within the text will be
    sorted *as text* and evaluated one character at a time; e.g., a value of “`10`”
    will sort *before* “`2`,” since `1` comes before `2`.


    **Tip**

    Use a text field to store numbers that contain leading zeros.


    ##### Number Fields


    A *number field* is used to store any numeric value ranging from `10^–400` to
    `10^400` up to one billion characters per field. A value in a number field can
    include non-numeric characters that are used to format numbers. For example, a
    number field can contain `"5000"` or `"$5,000.00"`. While these additional characters
    don’t adversely affect data entry, finding, or sorting, ideally only numerals
    should be physically entered into the field since currency formatting can be applied
    dynamically using field display layout settings (Chapter [19](#429700_2_En_19_Chapter.xhtml),
    “Data Formatting”). When sorting records by a number field, the values in the
    field will be sorted in numeric order, so a value of `"10"` will sort properly
    after `"2"`.'
