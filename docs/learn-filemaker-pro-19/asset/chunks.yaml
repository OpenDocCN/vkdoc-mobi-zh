    \ table. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figj_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figj_HTML.jpg)\
    \ | `Chart tool` – Draw a graphical chart object. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figk_HTML.gif](images/429700_2_En_17_Chapter/429700_2_En_17_Figk_HTML.gif)\
    \ | `Web Viewer tool` – Draw a web viewer object. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figl_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figl_HTML.jpg)\
    \ | `Field tool` – Drag a new field down onto a layout. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figm_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figm_HTML.jpg)\
    \ | `Part tool` – Drag a new layout part onto a layout (Chapter [18](#429700_2_En_18_Chapter.xhtml)).\
