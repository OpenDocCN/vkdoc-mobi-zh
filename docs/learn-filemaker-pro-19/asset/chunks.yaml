  trans: "\n### 全局变量\n\n`全局变量`是一种可从单个数据库文件内任何位置的任何公式访问的变量，并且会持续存在直到文件关闭。与局部变量类似，全局变量可以在`Let`或`While`语句以及`设置变量`脚本步骤中进行初始化。全局变量可用于存储控制自定义功能的自定义偏好设置、为某个目的而准备的暂存数据，或记录故障排除信息，以帮助追踪复杂多脚本流程或迭代公式中的问题。\n\
    \n**提示：** 将全局变量限制在文件内*真正全局*使用的信息范围内！避免使用它们来在脚本之间交换数据；应改用参数（参见第 24 章）。\n\nFileMaker\
    \ 要求全局变量以双美元符号前缀命名。除此之外，名称可以短至单个字符，也可以是较长的多词短语，并且可以使用各种分隔符，如下例所示。由于它们是全局变量，每个变量都必须唯一且仔细命名，以避免与同一文件中用于不同目的的其他全局变量产生混淆和冲突。但是，由于它们不在文件之间共享，因此可以在不同文件中重复使用标准化的名称，而无需担心它们会相互覆盖。\n\
    \n```\n$$x\n$$data\n$$firstName\n$$recordNumber\n$$dateToProcess\n$$date.to.process\n\
    $$date_to_process\n```\n\n**提示：** *数据查看器*（第 26 章“探索数据查看器”）可用于随时监控全局变量，并在脚本执行期间监控局部变量。\n\
    \n## 探索计算界面\n\n要试验公式，请使用 *Learn FileMaker* 数据库中 *Sandbox* 表的 *示例计算* 字段。首先，请按照以下步骤操作：\n\
    \n1.  打开 *Learn FileMaker* 数据库。\n2.  切换到 *Sandbox* 布局。\n3.  选择 *文件 ➤ 管理 ➤ 数据库*\
    \ 菜单项。\n4.  点击 *字段* 选项卡。\n5.  确认左上角 *表* 弹出菜单中为 *Sandbox*。\n6.  点击 *示例计算* 字段。\n\
    7.  点击 *选项* 按钮。\n\n### 探索“指定计算”对话框\n\n所有公式都在“指定计算”对话框中编写，如图 12-2 所示。\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig2_HTML.jpg](img/429700_2_En_12_Fig2_HTML.jpg)\n\
    \n**图 12-2** 用于指定计算公式的对话框窗口\n\n1.  *字段选择器面板* – 选择一个表 occurrence 并选择一个字段，以将字段引用插入到公式中。\n\
    2.  *上下文指示器* – 仅针对计算字段，如果字段的表存在多个 occurrence，则选择一个 occurrence 作为公式的上下文。\n3.  *公式文本区域*\
    \ – 这是公式的代码。通过单击左侧和右侧的面板来输入、拖放、复制粘贴或插入内容以构建公式。\n4.  *运算符* – 使用这些按钮快速插入运算符。\n5.\
    \  *函数面板* – 可以插入到公式中的内置函数、自定义函数和插件提供函数的列表。它们可以按层级或字母顺序排列。\n6.  仅针对计算字段的设置：\n \
    \   *   *计算结果为* – 为字段计算结果选择数据类型。其他公式会根据对象或函数类型自动指定，例如，按钮名称必须为文本。\n    *   *重复次数*\
    \ – 指定重复次数。\n    *   *不计算复选框* – 选择后，如果公式中引用的每个字段都为空，则自动返回无值。\n    *   *存储选项* –\
    \ 打开存储选项对话框。\n\n## 编写公式\n\n公式可以包含任意组合的组件，其复杂程度差异很大。本节中的所有示例都假设公式是在 *Learn FileMaker*\
    \ 数据库的 `Sandbox::示例计算` 字段中输入的，因此您可以在 *Sandbox 表单* 布局上的该字段中看到结果。\n\n### 仅含常量的公式\n\
    \n`仅含常量`的公式是指无需执行任何实际操作即可计算为字面值的公式。它基本上是一条包含单个值的语句，该值始终会计算出相同的结果。这些公式具有实际价值，可作为存储静态信息的一种方式，例如当前税率或用作关系匹配字段以连接到特定类型的相关记录子集的值。现在，它将作为最基本的示例，帮助我们开始编写简单的公式。在公式区域中输入\
    \ `\"Hello World\"`，然后选择 `文本` 作为计算结果数据类型。此时对话框应如图 12-3 所示。保存公式后，布局上的 *示例计算* 字段应为每条记录显示文本\
    \ `\"Hello World\"`。结果相同是因为公式返回了一个静态值。要使结果随记录变化，公式需要包含随记录变化的组件，例如字段引用。\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig3_HTML.jpg](img/429700_2_En_12_Fig3_HTML.jpg)\n\
    \n**图 12-3** 具有静态结果的简单计算公式\n\n### 制造故意的错误\n\n在继续之前，理解语法错误和结果错误之间的区别很重要。`语法错误`是指代码格式或语言方面的错误，会导致尝试编译和保存公式时失败。为了用简单的常量公式说明这一点，请从前面的公式中删除最后的引号符号。当您尝试保存计算时，FileMaker\
    \ 将显示如图 12-4 所示的错误对话框消息。检测到语法错误时，FileMaker 将不允许您保存公式，直到其格式正确为止。并非每条语法错误消息都这么具体，但它通常会提供足够的信息来帮助确定错误的性质。\n\
    \n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig4_HTML.jpg](img/429700_2_En_12_Fig4_HTML.jpg)\n\
    \n**图 12-4** 公式语法错误的示例错误消息\n\n相比之下，已编译并保存的公式可能会产生`结果错误`，表明公式的设置或其一个或多个操作中使用的组件存在问题。在这种情况下，公式的结果将显示为一个问号。为了说明这一点，请恢复公式的结束引号以消除语法错误。然后将“计算结果为”弹出菜单中的选择更改为`日期`、`时间`或`时间戳`。FileMaker\
    \ 将允许保存公式，因为语法正确，并且它不会将结果类型设置（`date`）与实际结果数据类型（`text`）进行比较，因为它假设您已负责任地创建了一个能产生您所指示结果的公式。当您查看记录上的字段时，结果将显示为一个问号。并非所有类型不匹配都会产生语法错误。有些类型（如`数字`和`容器`）会显示看起来正常但可能在搜索、排序或在其他公式中使用信息时表现不符合预期的文本结果。\n"
- fmt: '### Experimenting with Storage Options


    Like entry fields, calculation fields have *storage options* that control how
    the result of a formula is stored, shown in Figure [12-5](#429700_2_En_12_Chapter.xhtml#Fig5).
    The settings for *global storage* and *indexing* work similar to *entry* fields
    (discussed in Chapter [8](#429700_2_En_8_Chapter.xhtml)) with an additional option
    for indexing. The `Do not store calculation results` checkbox forces a calculation
    to never index results and instead automatically recalculates anytime the field
    is accessed or displayed. This box is unchecked by default when a new field is
    created.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig5_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig5_HTML.jpg)


    **Figure 12-5** The Storage Options dialog with indexing disabled


    To demonstrate the effect of storage, start with the `"Hello World"` formula configured
    to return a *text* result and the `Do not store` box unchecked. Save the formula
    and confirm that the field displays correctly in Browse mode. Then, open the formula
    again and type two forward slashes in front of the text to convert the entire
    formula into a comment, as shown in this example.


    ```

    // "Hello World"

    ```


    Without making other changes, save the formula and again view it in Browse mode.
    Don’t be surprised if it still displays the value “Hello World” as if nothing
    changed. This is due to the existing records containing a stored result. If you
    select the `Record ➤ New Record` menu, the new record will correctly display a
    blank value in the field reflecting the fact that the formula is commented out.
    With the checkbox set to not recalculate the results, the previous value remains
    in older records and appears unchanged until something triggers an update.


    Like other field types, calculations use index settings to pre-process data in
    a way that will speed up searches or establish relationships. However, this setting
    allows a calculation field to not recalculate an updated result when nothing else
    triggers it to reevaluate. If the formula is modified significantly, it *will*
    prompt every record to refresh the results. For example, if the formula changes
    to a completely different text constant, it will update to display the new value.
    To force the commented out example work correctly, check the `Do not store calculation
    results` checkbox, save, and view in Browse mode. The field will be empty for
    all records, including existing records.


    Although this simple example isn’t a practical representation of the kinds of
    challenges you will face, it illustrates simply that there will be times when
    you need to adjust the storage settings. For example, a formula that uses built-in
    functions like `Get ( FoundCount )` or `Get ( RecordNumber )` will *require* forced
    recalculate by checking the box forbidding storage. Unlike these, formulas that
    include references to fields *will* update automatically whenever those field
    values are modified.


    ### Inserting Formula Components


    The `Specify Calculation` dialog allows the insertion of *field references*, *functions*,
    and *operators* into a formula. Text can be entered many ways: type, copy-paste,
    or drag-drop text. Field references and function calls can also be inserted by
    double-clicking on an item in the panes on either side of the dialog.


    #### Using Auto-complete


    The formula area of the dialog combines text-based entry with dynamic assistance
    that detects key phrasing and presents an *auto-complete suggestion interface*,
    as shown in Figure [12-6](#429700_2_En_12_Chapter.xhtml#Fig6). As you type, the
    list of available components refreshes to include a mixture of every built-in
    function, custom function, and field that starts with the letter or phrase typed.
    In the example, the letter “E” causes a list of three functions and a bunch of
    fields. As you continue typing – “Ex,” “Exa,” and “Exam” – the list continuously
    filters until you see only a list of our example fields.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig6_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig6_HTML.jpg)


    **Figure 12-6** An example of the auto-complete function when typing into formulas


    When the auto-complete list appears, you have the option to ignore it while continuing
    to type or to select an item for rapid insertion. An item can be located in the
    list by scrolling, vertically navigating with the arrow keys, or continuing to
    type enough text until the desired item is the default selection at the top of
    the list. Once located and selected, insert it into the formula by either double-clicking
    or typing the `Enter` key.


    #### Using the Field Selection Pane


    The *field selection panel*, shown in Figure [12-7](#429700_2_En_12_Chapter.xhtml#Fig7),
    is used to locate and insert a field reference.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig7_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig7_HTML.jpg)


    **Figure 12-7** The field selection pane on the left side of the dialog


    The pop-up menu at the top is used to select which table occurrence’s fields are
    listed below. The default selection is based on the current context. When editing
    a calculation field, the default will be the table containing the field being
    defined, and the occurrence list will be separated into related and unrelated
    occurrences to help distinguish which relationships can be used. When editing
    a formula for a layout object, script step, or other item, the list defaults to
    the current layout’s table and lists all occurrences alphabetically leaving you
    responsible for safely selecting a valid relationship based on the appropriate
    context that will be active at the moment of execution. Once an occurrence is
    selected, the field list updates and can be searched or sorted. To insert a reference
    into the formula, double-click it.


    #### Using the Function Selection Pane


    The *function selection panel*, shown in Figure [12-8](#429700_2_En_12_Chapter.xhtml#Fig8),
    is used to locate and insert a function into a formula. It includes a list of
    *built-in functions* (Chapter [13](#429700_2_En_13_Chapter.xhtml)), *custom functions*
    (Chapter [15](#429700_2_En_15_Chapter.xhtml)), and *plug-in functions* (Chapter
    [28](#429700_2_En_28_Chapter.xhtml)). The list of functions can be grouped by
    category (shown) or listed alphabetically using a menu hidden under the sort icon.
    Search by keyword in the text area or by selecting one category from the sort
    menu. After locating a desired function, double-click it to insert it into the
    formula. At the bottom of this pane is a short description and a help button to
    open the online documentation for the selected function.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig8_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig8_HTML.jpg)


    **Figure 12-8** The function pane on the right side of the dialog


    ### Creating Repeating Calculation Fields


    A calculation field can be defined as repeating by entering a number in the `Number
    of repetitions` at the bottom of the `Specify Calculation` dialog. A repeating
    calculation works like a repeating entry field (Chapter [8](#429700_2_En_8_Chapter.xhtml)).
    However, there are a few techniques and built-in functions that may be necessary
    when working with repeating calculation fields.'
