- fmt: '### Getting Window Properties


    These functions provide information about the frontmost window’s name, mode, style,
    or zoom level.


    ```

    Get ( WindowName )        // result = "Learn FileMaker"

    Get ( WindowMode )        // result (Browse)  = 0

    // result (Find)    = 1

    // result (Preview) = 2

    // result (Printing) = 3

    // result (Layout)   = 4

    Get ( WindowStyle )       // result (Document) = 0

    // result (Floating) = 1

    // result (Dialog)   = 2

    // result (Card)     = 3

    Get ( WindowZoomLevel )   // result = 100

    ```


    ### Getting Window Dimensions


    Several `Get()` functions access measurement from one of four dimensional domains,
    as shown in Figure [13-1](#429700_2_En_13_Chapter.xhtml#Fig1). These are useful
    when setting a window position or size with script steps (Chapter [25](#429700_2_En_13_Chapter.xhtml)).


    ![../images/429700_2_En_13_Chapter/429700_2_En_13_Fig1_HTML.jpg](images/429700_2_En_13_Chapter/429700_2_En_13_Fig1_HTML.jpg)


    Figure 13-1


    The four domains of measurement accessible with `Get()` functions


    Each of the four domains has a `Height` and `Width` function. Because a window
    can move around the desktop area, it has an additional `Top` and `Left` function.


    ```

    Get ( ScreenHeight )             // result = 1440

    Get ( ScreenWidth )              // result = 2560

    Get ( WindowDesktopHeight )      // result = 1417

    Get ( WindowDesktopWidth )       // result = 2560

    Get ( WindowHeight )             // result = 613

    Get ( WindowWidth )              // result = 840

    Get ( WindowTop )                // result = 75

    Get ( WindowLeft )               // result = 100

    Get ( WindowContentHeight )      // result = 492

    Get ( WindowContentWidth )       // result = 825

    ```


    These functions can be used with the `New Window` and `Move/Resize Window` script
    steps (Chapter [25](#429700_2_En_25_Chapter.xhtml), “Managing Windows”) to center
    a window at a specific point on screen by calculating a new `top` and `left` position
    based on the `height` and `width` in relation to the screen dimensions. First,
    get the center point of the screen in each direction by dividing the height and
    width in half. Then subtract half of the window’s corresponding dimension from
    those respective measurements. The following formulas calculate these two measurements
    to center an existing window. When creating a new window, the measurements for
    the window would need to be manually entered since the window doesn’t exist yet.


    ```

    ( Get ( ScreenHeight ) / 2 ) – ( Get ( WindowHeight ) / 2 ) // Top

    ( Get ( ScreenWidth ) / 2 ) – ( Get ( WindowWidth ) / 2 )   // Left

    ```


    ## Accessing Fields


    Any calculation can include field references that directly access field content
    (Chapter [12](#429700_2_En_12_Chapter.xhtml), “Field References”). Several functions
    allow additional access to various meta-information about fields or advanced access
    to the data contained within.


    ### Discovering Active


    While any function has *direct* contextual access to any local or related field,
    a few functions access information about the field currently active within the
    interface. This is useful when creating functionality that needs to be aware of
    the current user’s activity to provide responsive and adaptable features.


    ```

    Get ( ActiveFieldName )                 // result = Full Name

    Get ( ActiveFieldContents )             // result = Mark Munro

    Get ( ActiveFieldTableName )            // result = "Contacts"

    ```


    ### Converting a Field Reference to Text


    The `GetFieldName` function accepts a *field reference* and returns the entire
    reference as a *string*. This function can allow field name manipulations with
    dynamic references to avoid hard-coding names that may break in the future if
    a field or table name is changed (Chapter [12](#429700_2_En_12_Chapter.xhtml),
    “Keeping Field Names Dynamic”).


    ```

    GetFieldName ( Contact::Name First )        // result = "Contact::Name First"

    ```


    ### Getting Field Content


    There are two built-in functions that return the contents of a field in very specific
    ways. These are `GetField` and `GetNthRecord`.


    #### GetField


    The `GetField` function returns the contents of a field based on a *text-based
    field reference* instead of a *dynamic field reference*. This is useful when building
    a field reference dynamically or using a reference stored in a text field or variable.
    The parameter can be either the *name* of the field or a full text-based *reference*
    to the table and field, with the latter required for fields in a related table.


    ```

    GetField ( "Contact Name Full" )                // result = Mark Munro

    GetField ( "Contact::Contact Name Full" )       // result = Mark Munro

    ```


    Since the function requires a *text-based reference*, providing a dynamic reference
    to a field will fail unless that field referenced happens to contain a text reference
    to third field. For example, if a field named “Referring Field” contains the text
    “Contact::Contact Name Full,” then the function will accept a dynamic reference
    to the referring field and use its content to identify the target field and retrieve
    *its* content. This is the only instance where the function works as expected
    with a dynamic reference, as demonstrated in the following three examples. The
    first passes a *text reference to the referring field* and returns the actual
    contents of that field. The second passes a *dynamic reference to the referring
    field* so it uses the reference contained in the field to identify and successfully
    return the value of the full name field. Although the third also passes a dynamic
    reference, the field contains the name “Mark Munro” which does not contain a text
    reference, so it returns an error .


    ```

    GetField ( "Contact::Referring Field" )    // result = Contact::Contact Name Full

    GetField ( Contact::Referring Field )      // result = Mark Munro

    GetField ( Contact::Contact Name Full )    // result = ?

    ```


    #### GetNthRecord


    The `GetNthRecord` function returns the contents of a field from a record within
    the found set, regardless of the current record. The `fieldName` parameter must
    contain a dynamic reference to a field and the `recordNumber` parameter the numeric
    position of a record in the current found set, together specifying the desired
    value. This example would return the contents of the `Contact Name Full` field
    from the fifth record in the found set from the `Contact` table.


    ```

    GetNthRecord ( Contact::Contact Name Full ; 5 )

    ```


    This function can be used with an iterative process to “step” through a found
    set and gather information across numerous records much faster without having
    to change the context of the active record. Use the `While` function (this chapter),
    a recursive custom function (Chapter [15](#429700_2_En_15_Chapter.xhtml)), or
    a looping script (Chapter [25](#429700_2_En_25_Chapter.xhtml), “Iterating with
    Repeating Statements”).'
