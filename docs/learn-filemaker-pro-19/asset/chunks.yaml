    # 23. Customizing Menus


    A database can override FileMaker’s default menu bar with custom menus. The level
    of customization can vary based on your needs, ranging from changes to intercept
    a few functions to building a completely unique desktop experience. You can build
    one set of custom menus that dynamically change based on various conditions or
    create multiple sets that are installed contextually based on the layout. Customizing
    menus elevates a solution from a mere database *document* to a custom *application*.
    This chapter explores the basics of custom menus, covering the following topics:


    *   Getting started with custom menu basics


    *   Exploring the Manage Custom Menus dialog


    *   Creating a custom menu set


    *   Customizing menu items


    *   Installing a menu set


    *   Exploring the link between commands and menus


    *   Creating status-based custom menu'
  trans: "  \n# 设计自定义主题  \n\n自定义主题设计的方法会受到多种因素的影响。两个主要因素是 FileMaker 的具体使用经验和对界面设计原理的普遍了解。熟悉这两者的人可以利用这些经验，在设计界面愿景时专注于创新。经验较少的人则需要从他人作品中汲取灵感，或进行更多的试探性实验。其他因素包括计划构建的解决方案类型、目标部署平台、客户期望以及预算限制。没有一种方法能够适用于每种情况下的每一位开发者，在具体项目之外规划主题可能颇具挑战。虽然不意味着存在一刀切的方法，但在开始阶段还是有一些具体事项值得思考。\
    \  \n\n尝试将主题设计规划与任何过去或现在的具体项目分离开来，创建一个抽象的设计沙盒。这能让你专注于创建干净、原创的主题，避免文件被无关负担填满。你仍应参考尽可能多的实际案例来激发灵感，确保你的选择基于真实项目，但又不被任何单一项目所束缚。从众多案例中选取最佳实践，进行比较、对比，然后重新整合为新的设计。\
    \  \n\n沙盒文件应包含一两个半真实性的简单表格，以便在过程中使用，例如*联系人*和*公司*，或*发票*和*明细项*。以一个表格作为设计焦点，为其构建列表视图和表单视图布局，另一个表格则作为门户设计的相关表。仅在需要时为对话框、报表、iOS\
    \ 设备等定义标准项目所需的样式时，才创建额外布局。请记住，目前要将字段和布局数量控制在最低限度，因为你并不是在设计实际解决方案，而只是一个*样式原型*。始终先专注于这一目标。\
    \  \n\n开始添加对象并尝试不同的格式选项。重点考虑不同布局或不同功能所需的独特格式。例如，列表视图中的字段可能不可编辑，因此可以设置为透明填充和无边框；而表单视图中可编辑的字段，最好通过不同填充颜色等视觉提示表明其是可接受输入的字段。同样，用于布局标题、字段标签、信息提示、说明、报表页码等文本对象也需要单独的样式。思考你可能使用的各种按钮类型，例如标准按钮、仅图标按钮、带图标的文本按钮等。有些按钮可能有边框和填充，另一些可能只有带透明背景的图标——每种都需要单独定义样式。务必考虑字段的所有不同控件类型；每种类型都需要一个或多个定义的样式，因为不存在通用的*字段*样式类别，只有`编辑框`、`弹出菜单`、`日历`等。\
    \  \n\n由于*任何格式差异*都需要单独的样式，字段和标签可能需要根据你构建的解决方案类型进行多种变体。例如，你可能需要为每种对齐方式（左、右、居中）以及每种外观（透明、带边框、填充）分别定义一种样式。花时间考虑不同的对象状态和窗口模式。大多数样式需要适应交互、在不同模式下正确提示信息等。尝试在这些目标之间找到合理的平衡点。一方面，保持样式列表简短以避免过于繁琐；另一方面，要提供足够多的选项，形成实用的设计调色板，避免因样式不足而作弊，对对象进行小的格式调整却不更新或创建新样式。\
    \  \n\n在命名样式时，要在清晰描述用途和简洁易读之间取得平衡。名称在整个主题中必须唯一，无论对象类型如何，因此建议将对象类型作为名称前缀，例如，通过将按钮和字段样式分别命名为`按钮\
    \ 带边框右对齐`和`字段 带边框右对齐`，避免冲突。`默认`样式无法重命名，因此将其作为每种对象类型最常用的样式选择，或者忽略它。  \n\n当样式沙盒中包含足够多的样式，让你觉得能够提供坚实基础时，将主题迁移到实际文件中并开始用于真实开发。当你遇到未预料到的样式需求时，添加或增强主题。如果目的明确且不仓促行事，最终结果将是一个设计良好、实用的主题，可以导入并复用于其他文件。\
    \  \n\n虽然这个过程听起来可能像是一项繁琐沉重的工作，但请记住，一个稳固的主题带来的好处最终会让时间投入获得良好回报。  \n\n## 总结  \n\n\
    本章介绍了使用主题和样式提高界面设计效率的基础知识。下一章，我们将探讨如何自定义应用程序菜单，以创造独特的用户体验。  \n\n# 自定义菜单  \n\n\
    一个数据库可以用自定义菜单覆盖 FileMaker 的默认菜单栏。自定义的程度可根据需求变化，从拦截少数功能的修改到构建完全独特的桌面体验。你可以构建一组根据条件动态变化的自定义菜单，或创建多个根据布局上下文安装的菜单集。自定义菜单能将一个解决方案从单纯的数据库*文档*提升为自定义*应用程序*。本章探讨自定义菜单的基础知识，涵盖以下主题：\
    \  \n\n- 开始了解自定义菜单基础知识  \n- 探索`管理自定义菜单`对话框  \n- 创建自定义菜单集  \n- 自定义菜单项  \n- 安装菜单集\
    \  \n- 探索命令与菜单之间的关联  \n- 创建基于状态的自定义菜单  \n"
- fmt: '# Getting Started with Custom Menus Basics


    The *menu bar* in FileMaker is similar to any modern application: a horizontal
    strip running along the top of the screen (macOS) or the top of a database window
    (Windows). A database always displays the *active menu set*, which defaults to
    a non-modifiable set called *[Standard FileMaker Menus]*. Developers can create
    one or more additional menu sets that can be installed in place of the standard
    set under a variety of circumstances. Before delving into customization, review
    the objects and terminology of menus, as overviewed in Figure [23-1](#429700_2_En_23_Chapter.xhtml#Fig1).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig1_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig1_HTML.jpg)


    Figure 23-1


    The terminological overview of menu components


    A *menu set* is a named collection of menus that can be installed into the menu
    bar, thereby becoming the *active menu set*. A *menu* contains a collection of
    various items of different types, as illustrated in Figure [23-2](#429700_2_En_23_Chapter.xhtml#Fig2).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig2_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig2_HTML.jpg)


    Figure 23-2


    The hierarchical structure of a menu


    Once defined, a *custom menu* can be added to one or more sets. Each menu can
    be created as one of the following four types:


    - A totally custom menu created and built from scratch.

    - Any of three *non-customizable* standard FileMaker menus with all their standard
    menu items: *Format*, *Scripts*, and *Window*.

    - Any of eight standard FileMaker menus that can be duplicated and customized
    as needed (with a few exceptions): *FileMaker Pro*, *File*, *Edit*, *View*, *Insert*,
    *Records*, *Request*, and *Help*.

    - A choice of about two dozen *standard submenus* that can be attached to the
    menu set as a stand-alone *menu* or as a submenu attached to a custom menu item.
    These include submenus such as *Open Recent*, *Import Records*, *Go to Layout*,
    *Manage*, *Sharing*, *Show Window*, and more.


    A *menu item* is one of three types of objects added to a menu: *command*, *separator*,
    or *submenu*.


    A *command item* triggers a function, either a standard FileMaker command or a
    custom script. Items can be completely customized with a unique name and script
    function, or they can inherit some or all properties of a standard FileMaker command
    (name, function, and key command).


    A *separator* is a nonfunctional horizontal line used to separate groups of menu
    items to create a more visually pleasing organization of items.


    A *submenu* is an item that springs opens a secondary menu of options subsumed
    under it. Submenus can cascade in a nested hierarchy, i.e., a menu item can open
    a submenu with an item that opens another submenu, etc. Each submenu is first
    defined as a separate menu which is then connected to the menu item that will
    open it.


    Up to four standard menus can never be completely removed from the application.
    Even with a completely *empty* custom menu set installed, these four menus will
    persist. On a macOS computer, the *Apple* menu contains standard operating system
    functions and is completely unaffected by the custom menu set and can''t be modified
    in any way. A *FileMaker Pro* application menu and a *Help* menu are always at
    opposite sides of the menu bar regardless of their presence in a custom menu set.
    The *Tools* menu is visible when *Advanced Tools* are enabled in preferences (Chapter
    [2](#429700_2_En_2_Chapter.xhtml)), and these can''t be modified at all.


    ## Exploring the Manage Custom Menus Dialog


    Custom menus are defined in the *Manage Custom Menus* dialog which can be opened
    by selecting the *Manage Custom Menus* option available in three places: the *File
    ➤ Manage* menu, the *Tools ➤ Custom Menus* menu, and the *Menu Set* pop-up menu
    in the *General* tab of the *Layout Setup* dialog. The dialog has two tabs, as
    shown in Figure [23-3](#429700_2_En_23_Chapter.xhtml#Fig3): *Custom Menu Sets*
    and *Custom Menus*.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig3_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig3_HTML.jpg)


    Figure 23-3


    The dialog used to define custom menus


    The *Custom Menu Sets* tab lists all the menu sets defined in the file. The default
    standard set is included by default and can''t be removed. New sets can be *created*,
    *edited*, *duplicated*, and *deleted* in this dialog.


    The *Custom Menus* tab presents a list of every defined custom menu with similar
    modification buttons. This list is empty until you begin creating menus. Any custom
    menus defined are available for connection to a custom set.


    There is a confusing intersection of features between these two dialogs that can
    be intimidating and may discourage a novice developer. However, given the benefits
    of a totally custom menu system for advanced databases, it is worth the effort
    to grasp how it works, as illustrated in Figure [23-4](#429700_2_En_23_Chapter.xhtml#Fig4).
    Although confusing at first, this presents an overview of dialogs and functions
    that will be described later in this chapter.


    From the *Custom Menu Sets* tab, when you create or edit a set, the *Edit Custom
    Menu Set* dialog opens listing the menus that have been assigned to it. A menu
    there can be selected and edited, opening the *Edit Custom Menu* dialog, or a
    new menu can be added here by clicking the *Add* button which opens a *Select
    Menu* dialog. This dialog lists all the standard FileMaker submenus and any custom
    menus that have been created. Select one to add it to the menu set, or click the
    plus button to open the *Create Custom Menu* dialog to create a new menu which
    will be added.


    From the *Custom Menus* tab, clicking *Create* opens the *Create Custom Menu*
    dialog which offers a choice of creating a new menu based on a standard menu or
    starting with an empty one. Once that choice is made, the *Edit Custom Menu* dialog
    opens.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig4_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig4_HTML.jpg)


    Figure 23-4


    The somewhat confusing intersection of dialogs for custom menus


    ## Creating a Custom Menu Set


    Start a new menu set by opening the *Manage Custom Menus* dialog and clicking
    on the *Custom Menu Sets* tab. Click the *Create* button to open a new empty menu
    set in an *Edit Custom Menu Set* dialog, shown in Figure [23-5](#429700_2_En_23_Chapter.xhtml#Fig5).
    Enter a name for the menu set and an optional developer comment.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig5_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig5_HTML.jpg)


    Figure 23-5


    The dialog used to create a new custom menu set'
