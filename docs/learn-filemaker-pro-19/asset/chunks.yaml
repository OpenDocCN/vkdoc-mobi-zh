- fmt: "### Defining SELECT Statements\n\nWhen calling the `ExecuteSQL` function,\
    \ the `sqlQuery` parameter must contain a properly formatted `SELECT` statement.\
    \ Minimally, this defines *what* to find and from *where*, following the pattern\
    \ shown here:\n\n```\nSELECT <What> FROM <Where>\n```\n\nUsually, the *what* is\
    \ the name of one or more fields and the *where* is the name of the table occurrence\
    \ from which to extract them. For example, the following example would return\
    \ the contents of a `Name` field from every record in a `Contact` table occurrence:\n\
    \n```\nSELECT Name FROM Contact\n```\n\nThe preceding code shows an example of\
    \ the simplest statement, requesting *one field from all records*. There are many\
    \ optional clauses that are shown in the following and briefly defined in Table\
    \ 16-1:\n\n**Table 16-1** The definitions of each available clause of a `SELECT`\
    \ statement  \n\n| Keyword | Clause Description |\n| --- | --- |\n| `SELECT` |\
    \ Specifies one or more fields to select. Can include fields, constants, calculations,\
    \ and functions. Use an asterisk to select all fields. |\n| `SELECT DISTINCT`\
    \ | Adding the `DISTINCT` operator will remove any duplicates from the result.\
    \ |\n| `FROM` | Specifies one or more tables from which to select the fields.\
    \ |\n| `JOIN` | Defines a table and relational formula to allow the results to\
    \ include fields through a temporary relationship. |\n| `WHERE` | Defines one\
    \ or more criteria formulas that specify qualifications for records included in\
    \ the result. |\n| `GROUP BY` | Identifies one or more selected fields used to\
    \ summarize the results. |\n| `HAVING` | Defines one or more formulas that specify\
    \ the criteria for the inclusion of a grouped result. `HAVING` is to a `GROUP\
    \ BY` what a `WHERE` is to a `SELECT`. |\n| `UNION` | Used to combine two or more\
    \ `SELECT` statements into a single result. |\n| `ORDER BY` | Identifies one or\
    \ more selected fields to use to sort the results. |\n| `OFFSET` | Specifies a\
    \ starting point within the selected set for the records that will be included\
    \ in the result. |\n| `FETCH FIRST` | Specifies the number of records that should\
    \ be retrieved from the starting point, either the first record or a record specified\
    \ by `OFFSET`. |\n| `AS` | Creates a shorter alias for a table name that can be\
    \ used elsewhere in the statement as a prefix to identify a field’s table, especially\
    \ when there is more than one table involved, like when using a `JOIN` clause.\
    \ |\n\n```\nSELECT/SELECT DISTINCT <SelectFields>\nFROM <TableName>\nJOIN <TableName>\
    \ ON <Formula>\nWHERE <CriteriaFormula>\nGROUP BY <GroupFieldList>\nHAVING <GroupCriteria>\n\
    UNION <SelectStatement>\nORDER BY <OrderFieldList>\nOFFSET <StartRow> ROW/ROWS\n\
    FETCH FIRST <NumberOfRows> PERCENT/ROWS/ROW/ONLY/WITH TIES\n```\n\n#### Formatting\
    \ Requirements\n\nThere are a few formatting requirements to keep in mind when\
    \ writing `SELECT` statements. These include:\n\n- **Command and Object Names**\
    \ – The names of tables, fields, and statement commands within a query are *not*\
    \ case sensitive. However, typing SQL commands and operators in upper case helps\
    \ to visually differentiate them from field and criteria values.\n- **Criteria**\
    \ – Literal criteria, such as that used within a `JOIN`, `WHERE`, and `HAVING`\
    \ clause, *are* case sensitive and will fail to locate matching values of a different\
    \ case. Also, all textual criteria *must* be enclosed in single quotations.\n\
    - **Name Separators** – When listing multiple tables and fields, always use a\
    \ comma-space delimiter between them.\n- **Quotations** – Table and field names\
    \ don’t need to be enclosed in double quotations *unless they contain spaces*.\
    \ Table names that begin with non-alphabetic characters must be enclosed in double\
    \ quotations even when they don’t contain spaces. Since the `SELECT` statement\
    \ is itself contained in quotations, quotes used within must be escaped with a\
    \ preceding backslash.\n\n### Using the SELECT Statement\n\nAlthough the `SELECT`\
    \ statement is the only one supported by the `ExecuteSQL` function, it is very\
    \ capable. Before delving into the many different optional clauses, let’s explore\
    \ the basic statement and discuss techniques for using it effectively.\n\n####\
    \ Selecting an Entire Table\n\nThe most basic query is one in which *every field*\
    \ will be selected for *every record*. This can be performed with a simple statement.\n\
    \n```\nSELECT * FROM <TableName>\n```\n\nThe statement must *always* begin with\
    \ the word `SELECT` followed by an indication of which fields to select and from\
    \ which table. In this case, the asterisk informs FileMaker to select *all fields*.\
    \ The `<TableName>` placeholder shown in the preceding example is replaced with\
    \ the name of an actual table occurrence whose base table the function should\
    \ access. The `SELECT` statement shown in the following example will fetch every\
    \ field from the `Contact` table:\n\n```\nSELECT * FROM Contact\n```\n\nPut this\
    \ in quotes and use it as the first parameter of an `ExecuteSQL` statement as\
    \ shown in this example:\n\n```\nExecuteSQL ( \"SELECT * FROM Contact\" ; \"\"\
    \ ; \"\" )\n```\n\nEnter this formula in the *Example Calculation* field of the\
    \ *Learn FileMaker* database. After confirming that the *Calculation result type*\
    \ is set to return *text*, save the formula, and the result displayed in Figure\
    \ 16-1 should appear in the field in Browse mode. Each paragraph of the result\
    \ is a single record that contains a comma-separated list of every field value,\
    \ both in creation order.\n\n![../images/429700_2_En_16_Chapter/429700_2_En_16_Fig1_HTML.jpg](images/429700_2_En_16_Chapter/429700_2_En_16_Fig1_HTML.jpg)\
    \  \n**Figure 16-1** An example of the result of a SQL query\n\n> **Note:** Although\
    \ the examples in this chapter assume the formula is used in a calculation field,\
    \ these can be used in any formula.\n\n#### Selecting Individual Fields\n\nFor\
    \ situations where you don’t need *every* field for *every* record in a table,\
    \ the `SELECT` statement can specify individual fields.\n\n##### Specifying a\
    \ Single Field\n\nTo select a *single field* from a `Contact` table, change the\
    \ asterisk to the name of the field, remembering to enclose it in escaped quotes\
    \ if it contains spaces. The following formula selects the `Contact Address City`\
    \ field from every record of the `Contact` table. This will result in a return-delimited\
    \ list of city names. Notice that the list includes the field value for *every*\
    \ record, so it will include many duplicates.\n\n```\nExecuteSQL ( \"SELECT \\\
    \"Contact Address City\\\" FROM Contact\" ; \"\" ; \"\" )\n// result =\nHamilton\n\
    Ashland\nChicago\nSan Jose\nSioux Falls\nSan Jose\nAshland\n...etc...\n```\n\n\
    ##### Specifying Multiple Fields\n\nTo select *multiple fields*, list each in\
    \ a comma-space separated string:\n\n```\nSELECT <Field1>, <Field2>, <Field3>\
    \ FROM <TableName>\n```\n\nFor example, to select the `Contact Address City` and\
    \ `Contact Address State` fields from the `Contact` table, use the following formula.\
    \ The result of this statement will be a comma-delimited list of city and state\
    \ names.\n\n```\nExecuteSQL (\n\"SELECT \\\"Contact Address City\\\", \\\"Contact\
    \ Address State\\\" FROM Contact\" ; \"\" ; \"\"\n)\n// result =\nHamilton,OH\n\
    Ashland,OH\nChicago,IL\nSan Jose,CA\nSioux Falls,SD\nSan Jose,CA\nAshland,OH\n\
    ...etc...\n```\n\n#### Getting Unique Values with SELECT DISTINCT\n\nTo automatically\
    \ alphabetize results and remove duplicates, use the `SELECT DISTINCT` command.\
    \ The following example will generate a list of alphabetically sorted, unique\
    \ values from the `Contact Address City` field of the `Contact` table:\n\n```\n\
    \"SELECT DISTINCT \\\"Contact Address City\\\" FROM Contact\"\n```\n\nThe uniqueness\
    \ of the result is based on the *entire record value*, not individual fields within\
    \ it. For example, when selecting only the city, the results will include only\
    \ one entry for \"San Jose.\" However, if multiple fields are selected, like a\
    \ street address and city shown in the following example, the results will include\
    \ multiple entries for San Jose since the full record now includes other values.\
    \ For example, \"123 First Street,San Jose\" is not fully equal to \"1837 Fifth\
    \ Ave,San Jose,\" so both would be included in the result.\n\n```\n\"SELECT DISTINCT\
    \ \\\"Contact Address Street\\\", \\\"Contact Address City\\\" FROM Contact\"\n\
    ```"
