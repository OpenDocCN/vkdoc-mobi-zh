  trans: '

    ### 使用已保存的查找


    查找请求可以保存以供将来重复使用。在浏览模式下，可通过*查找*按钮工具栏和*记录 ➤ 已保存的查找*菜单访问*已保存的查找*菜单。在查找模式下，可通过*已保存的查找*工具栏按钮访问该菜单。此菜单用于*保存*和*管理*已保存的查找，以及*执行*已保存或最近的查找。


    *保存当前查找*选项将打开一个对话框以开始保存过程。可以输入名称，并且可以选择编辑条件。在浏览模式下，将保存最后执行的查找。在查找模式下，将保存输入的当前查找条件。


    *编辑已保存的查找*选项会打开一个同名的对话框，如图 4-9 所示，该对话框用于创建、编辑、复制或删除已保存的查找。


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig9_HTML.jpg](img/429700_2_En_4_Fig9_HTML.jpg)


    图 4-9


    用于查看和管理已保存查找的对话框


    #### 管理查找请求


    保存或编辑查找时，会打开一个*为已保存的查找指定选项*对话框，其中显示该查找的名称。单击*高级*按钮将在*指定查找请求*对话框中打开存储的条件，如图 4-10
    所示。此对话框中的每一行代表构成该查找的一个请求。可以使用此对话框上的按钮*创建*、*编辑*、*复制*或*删除*请求。每个请求都指定一个操作（查找或排除）并显示条件。选择一个请求并单击*编辑*以打开编辑对话框。


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig10_HTML.jpg](img/429700_2_En_4_Fig10_HTML.jpg)


    图 4-10


    用于在已保存的查找中查看和管理查找请求的对话框


    #### 编辑查找请求条件


    *编辑查找请求*对话框，如图 4-11 所示，用于编辑新查找或已保存查找的查找请求。可以通过单击*新建*、*编辑*或双击图 4-10 对话框中的查找请求来打开此对话框。创建查找请求或执行查找的脚本步骤（第
    25 章，“搜索与处理找到的记录集”）也会使用此对话框。


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig11_HTML.jpg](img/429700_2_En_4_Fig11_HTML.jpg)


    图 4-11


    用于编辑已保存查找的单个请求的对话框


    在对话框中，您可以使用以下控件编辑请求的条件：


    1.  *操作* – 选择*查找记录*或*排除记录*，用于指示请求的匹配记录选项

    2.  *条件列表* – 列出构成请求的每个已定义字段条件，并在下方显示所选行的详细信息

    3.  *表* – 选择要查找搜索字段的表出现

    4.  *字段* – 选择搜索字段

    5.  *条件* – 要在所选字段中搜索的值

    6.  *插入运算符* – 单击以选择并插入运算符

    7.  条件按钮 – 用于*添加*新请求、*更改*当前选定的请求或*移除*选定的请求


    ## 使用找到的记录集


    *找到的记录集*是指在一个给定窗口的上下文中可见且可导航的一组记录。虽然找到的记录集可能包含表内的*所有记录*，但该术语通常指由搜索或其他操作生成的一个记录*子集*。不属于找到的记录集且不可见或不可导航的记录被称为*排除的记录集*。在单个窗口中，当导航到同一表的其他布局时，会保留每个表的找到的记录集。当使用多个窗口时，同一表在每个窗口中可以显示不同的找到的记录集。


    当工具栏隐藏时，用户无法知道找到的记录集是否包含少于全部记录，除非创建自定义布局元素来显示该信息。即使工具栏可见，也容易忽略这一点。当新手用户看到一个包含大量记录的表只显示一个小的找到的记录集时，一开始可能会惊慌失措，不知道他们所有的记录都去哪了。差异显示在工具栏导航区域的记录计数中，如图
    4-12 所示。当所有记录都可访问时，仅显示记录总数。当子集处于活动状态时，第一个数字表示可见找到的记录集包含多少条记录，而第二个数字表示记录总数，其中包括从找到的记录集中排除的记录。


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig12_HTML.jpg](img/429700_2_En_4_Fig12_HTML.jpg)


    图 4-12


    查看所有记录（左）或找到的记录集（右）时的记录计数


    ### 更改找到的记录集中的记录


    可以通过执行查找或*记录*菜单中的几个命令之一来更改找到的记录集中的记录。*显示所有记录*命令将当前窗口中的找到的记录集替换为表中的所有记录。*排除记录*命令会将当前记录从找到的记录集移动到排除的记录集。这可用于通过排除单个记录来微调结果，而无需执行新的、更复杂的搜索。*排除多条*命令允许用户指定从当前记录开始希望排除的任意数量的记录。例如，如果用户正在查看包含
    100 条记录的找到的记录集中的第一条记录，并选择排除 10 条记录，则将排除前 10 条记录，剩下 90 条记录。但是，如果他们正在查看 100 条中的第
    50 条记录并执行相同操作，则将排除第 50-59 条记录，剩下第 1-49 条和第 60-100 条记录。最后，*仅显示排除的记录*命令会将当前找到的记录集替换为排除的记录集。或者，单击工具栏导航区域中的圆圈图标，以在找到的记录或排除的记录之间切换。

