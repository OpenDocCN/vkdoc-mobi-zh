  trans: "\n### 将文件移入 Databases 文件夹\n\n服务器将托管的文件存储在 `FileMaker Server` 文件夹的 `Databases`\
    \ 子文件夹中。如果安装到默认位置，该文件夹将根据操作系统位于两个位置之一：macOS 上的 `Library` 文件夹或 Windows 上的 `Program\
    \ Files` 文件夹，两者均如下所示。要手动安装文件，只需将其拖入 `Databases` 文件夹即可。但是，以这种方式添加文件时，必须手动将它们分配给\
    \ `fmserver` 用户和 `fmsadmin` 组。\n\n```\n/Library/FileMaker Server/Data/Databases\n\
    [drive]:\\Program Files\\FileMaker\\FileMaker Server\\Data\\Databases\\\n```\n\
    \n**注意**  \n如果服务器正在主动托管数据库，则移除、替换或使用 `FileMaker Pro` 桌面应用程序直接打开这些数据库将导致严重损坏。在执行任何这些操作之前，请确认文件未被主动托管。\n\
    \n### 从客户端计算机上传文件\n\n在客户端计算机上创建的数据库文件可以通过 `FileMaker Pro` 桌面应用程序直接上传到服务器。对于 FileMaker\
    \ Cloud，这是将文件上传到服务器的唯一可用方法。通过从 `Sharing` 子菜单或工具栏中的 `Sharing` 图标菜单中选择 `Upload to\
    \ Host` 选项，打开 `Upload to Host` 对话框。该对话框类似于 `Hosts` 对话框，带有一个用于选择主机的侧边栏，如图 29-6\
    \ 所示。选择后，登录到主机以开始添加数据库。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig6_HTML.jpg](img/429700_2_En_29_Fig6_HTML.jpg)\n\
    \n**图 29-6** — 用于上传到主机的登录对话框\n\n输入所选主机的管理员凭据后，主面板将变为数据库上传列表，如图 29-7 所示。将数据库文件拖入列表，或单击\
    \ `Browse` 按钮通过对话框选择它们。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig7_HTML.jpg](img/429700_2_En_29_Fig7_HTML.jpg)\n\
    \n**图 29-7** — 显示待上传数据库文件的对话框\n\n添加数据库时，FileMaker 会运行一致性检查以确定文件的健康状况，并检查其是否具有足够的安全性以进行托管。在上述示例中，第一个文件具有受密码保护的\
    \ `Admin` 帐户，而第二个文件没有密码且已被拒绝。勾选文件旁的复选框以将其包含在上传中。对话框底部的复选框将使文件在上传完成后在服务器上自动打开。\n\
    \n## 管理数据库文件\n\n要管理托管的数据库，请登录 `Admin Console` 并单击 `Databases` 选项卡。列表中每个数据库旁边的下拉菜单包含以下管理命令：\n\
    \n- `Open` – 打开数据库以供网络访问。如果文件已加密，则需要输入密码。\n- `Close` – 关闭并停止托管数据库。\n- `Download`\
    \ – 将已关闭的数据库副本下载到本地硬盘驱动器。在 macOS 上，如果浏览器偏好设置阻止了弹窗，此功能将无法使用！\n- `Remove` – 将已关闭的数据库从列表中移除，并将其放入\
    \ `Databases` 文件夹中一个不可用于托管的特殊文件夹中。\n- `Verify` – 关闭、验证并重新打开数据库。\n- `Clear the\
    \ Encryption Passwords` – 移除所选数据库文件的加密密码。\n\n**提示**  \n数据库列表顶部的一个类似菜单提供了这些选项的镜像，但其命令会影响所有数据库。\n\
    \n## 重新启动服务器计算机\n\n当服务器正在主动托管文件时，它可能正在与客户端通信、在缓存中保留最近的更改，或正在将这些更改写入磁盘。如果强制退出服务器进程或硬件突然强制关闭，文件可能会损坏。为避免损坏，务必规避某些风险并正确关闭数据库。始终使用足够的不间断电源（UPS）设备，并在关闭计算机之前关闭\
    \ `Admin Console` 中的所有数据库。除非因重大崩溃或故障而绝对必要，否则切勿在不先关闭文件的情况下强制退出应用程序或执行硬重启计算机。\n\n\
    ## 使用命令行界面\n\n`fmsadmin` 命令行工具允许使用 `Terminal` 应用（macOS）或命令提示符（Windows）来管理服务器。这些命令随服务器自动安装到以下特定于平台的文件夹中：\n\
    \n```\nmacOS = /Library/FileMaker Server/Database Server/bin/fmsadmin\nmacOS（符号链接）\
    \ = /usr/bin/fmsadmin\nWindows = [drive]:\\Program Files\\FileMaker\\FileMaker\
    \ Server\\Database Server\\fmsadmin.exe\n```\n\n### 格式化 fmsadmin 命令\n\n命令的公式为：`fmsadmin\
    \ <command> <options>`。例如，要获取所有托管数据库的列表，请在 Terminal 中键入以下命令并按 Enter 键。\n\n```\n\
    fmsadmin list files\n```\n\n某些功能需要身份验证，并会提示您输入服务器管理员用户名和密码。或者，您可以在命令中包含凭据信息，以避免出现二次提示。只需按照以下模式和示例添加它们：\n\
    \n```\nfmsadmin  -u  -p\nfmsadmin list files –u Admin –p J56TF3\n```\n\n### 可用的\
    \ fmsadmin 命令\n\n`fmsadmin` 工具包含以下命令，每个命令都有各种可用选项：\n\n- `autorestart` – 获取或设置服务器的自动重启功能\n\
    - `backup` – 备份一个数据库或文件夹中的每个数据库\n- `clearkey` – 移除已保存的数据库加密密码\n- `close` – 关闭一个或多个数据库\n\
    - `certificate` – 管理 SSL 证书\n- `disable` – 禁用计划或统计记录\n- `disconnect` – 断开一个或多个客户端\n\
    - `enable` – 启用计划或统计记录\n- `help` – 获取可用命令的帮助信息\n- `list` – 列出客户端、数据库、插件或计划\n-\
    \ `open` – 开始托管数据库\n- `pause` – 临时停止数据库服务器\n- `remove` – 将文件移出 Databases 文件夹\n\
    - `resetpw` – 重置管理员用户密码\n- `restart` – 重启服务器、adminserver、FMSE、WPE 或 XDBC 进程\n\
    - `resume` – 结束数据库服务器的临时暂停\n- `run` – 运行一个计划\n- `send` – 向已连接的用户发送消息\n- `standby`\
    \ – 管理备用服务器连接、角色和更新\n- `start` – 启动服务器、adminserver、FMSE、WPE 或 XDBC 进程\n- `status`\
    \ – 获取客户端或数据库的状态\n- `stop` – 停止服务器、adminserver、FMSE、WPE 或 XDBC 进程\n- `verify`\
    \ – 检查数据库的一致性\n\n### 获取详细的命令帮助\n\n要获取有关某个命令的更多信息，请键入“help”，后跟该命令的名称。例如，输入 `fmsadmin\
    \ help close` 将返回 `close` 命令的帮助页面，如图 29-8 所示。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig8_HTML.jpg](img/429700_2_En_29_Fig8_HTML.jpg)\n\
    \n**图 29-8** — 命令帮助请求示例\n"
- fmt: "# Hosting with FileMaker Cloud\n\n`FileMaker Cloud` is a service by Claris\
    \ that provides reliable access to cloud-hosted databases. While the use and configuration\
    \ interface are nearly identical as those described earlier for `FileMaker Server`,\
    \ there are some important differences with Cloud. The hardware is managed by\
    \ Claris so you don’t need to be concerned with hardware or energy costs. There\
    \ is no way to access the folder structure directly, so interactions with the\
    \ server and databases can only be performed through the `Admin Console`. To protect\
    \ your information, all databases must be encrypted when uploaded to the cloud.\
    \ Various maintenance tasks such as daily backups, software upgrades, automatic\
    \ restarts during non-business hours, and other maintenance tasks are or can be\
    \ performed automatically. Another benefit is that Claris provides round the clock\
    \ support options.\n\n> **Note**  \n> For more information about Claris hosting\
    \ your database solution, visit [`www.claris.com/filemaker/cloud/`](http://www.claris.com/filemaker/cloud/).\n\
    \n# Controlling FileMaker with Links, URLs, and AppleScript\n\nThere are several\
    \ ways to open and perform actions within a database from outside FileMaker: `Snapshot\
    \ Links`, `FileMaker URL`, and `AppleScript`.\n\n## Sharing Bookmarks with Snapshot\
    \ Links\n\nA `snapshot link` is an XML file that stores information about a record\
    \ or a found set of records that can be used to re-create a previously existing\
    \ found set. They act like a bookmark but reference a specific found set of records\
    \ within a database. Opening a snapshot file will automatically open the database,\
    \ navigate to the layout, and restore the found set of records, thereby re-creating\
    \ the same context a user was viewing at the time they saved the snapshot. These\
    \ files can be stored in folders and sent to coworkers, allowing users to exchange\
    \ lists of records with other users. For example, each client folder on a company\
    \ file server can include a snapshot link that instantly opens a list view of\
    \ contacts for the company.\n\nTo generate a snapshot link, select the `File ➤\
    \ Save/Send Records As ➤ Snapshot Link` menu. This will open a `Save Records`\
    \ dialog with snapshot configuration `options`, shown in Figure [29-9](#429700_2_En_29_Chapter.xhtml#Fig9).\
    \ Enter a name and choose a save location for the link. Select a `Save` option\
    \ of `Current record` or `Records being browsed` to control which records are\
    \ saved. The optional checkbox can be used to create an email with the snapshot\
    \ attached. A `Send Records as Snapshot Link` script step uses the same dialog\
    \ to configure a script that automates snapshot link generation.\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig9_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig9_HTML.jpg)\n\
    \n**Figure 29-9** — The dialog used to configure and save a snapshot link\n\n\
    ## Using the FileMaker URL\n\nThe `FileMaker URL` is an internet protocol registered\
    \ with the FileMaker Pro client application installation that can open a database\
    \ and run a script using a URL. If a user account’s privilege set is explicitly\
    \ granted permission to the `fmurlscript` extended privilege (Chapter [30](#429700_2_En_30_Chapter.xhtml)),\
    \ the following URL options become possible:\n\n- **Typed in a Web Browser** —\
    \ Type or paste a URL into a web browser and the command will be routed to FileMaker.\n\
    \n- **Embedded in a Web Page** — Use an `href` tag to create a link in a web page\
    \ in a browser or a web viewer on a layout in a database. Alternatively, the new\
    \ `FileMaker.PerformScript` JavaScript function is a better option for web viewers\
    \ (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Calling a FileMaker Script with\
    \ JavaScript”).\n\n- **Used in a Script** — Use the `Open URL` script step to\
    \ trigger other scripts. However, the `Perform Script` step has a better option\
    \ to run a script by a calculated name.\n\n- **Used in External Applications and\
    \ Scripts** — Programming languages such as AppleScript can instruct the FileMaker\
    \ application to run the URL.\n\n### Formatting a Basic FMP URL\n\nThe address\
    \ must include a `prefix`, `address`, and `file name`. The inclusion of an extension\
    \ is optional. Starting with version 18, the prefix can include a version number\
    \ to specify one of multiple installed versions. Without a version specified,\
    \ the URL should be routed to the last installed version. An address is required\
    \ to open a database. To reference a file that is already open, use a dollar symbol\
    \ as the address. For example, to refer to an open `Contacts` database, the address\
    \ would be formatted as shown in the following examples:\n\n```\nfmp://$/\nfmp://$/Contacts.fmp12\n\
    fmp18://$/Contacts.fmp12\nfmp19://$/Contacts.fmp12\n```\n\nIf the database is\
    \ stored in the user’s `Documents` folder, use a tilde as the address as shown\
    \ in the following example which will automatically open the database:\n\n```\n\
    fmp19://~/Contacts.fmp12\n```\n\nAll URLs must be `percent encoded` except when\
    \ using the `Open URL` script step within FileMaker. For example, a database named\
    \ “Learn FileMaker” would require the space changed to “%20” as shown in the following\
    \ example:\n\n```\nfmp://$/Learn%20FileMaker.fmp12\n```\n\n> **Tip**  \n> When\
    \ building a URL in a FileMaker calculation, use the `GetAsURLEncoded` function\
    \ to automatically handle encoding.\n\n### Addressing a Hosted Database\n\nTo\
    \ access a database hosted on a network server, include the address to a host\
    \ computer. For example, if a `Contacts` database was hosted, the FMP URL can\
    \ be formatted with an IPv4 address, IPv6 address, or a DNS name as shown in these\
    \ three examples:\n\n```\nFMP://10.1.0.10/Contacts.fmp12\nFMP://[2001:0db8:0a0b:12f0:0000:0000:0000:0001]/Contacts.fmp12\n\
    FMP://filemaker-server.local/Contacts.fmp12\n```\n\n### Including Access Credentials\n\
    \nTo avoid a dialog requesting account credentials and achieve a seamless operation,\
    \ an account and password can be specified in the `URL`. These can be added as\
    \ colon-delimited values ahead of the address separated by an “`@`” sign. For\
    \ example, a database with an account named “admin” that has a password of “58Jt234”\
    \ can be opened without a password dialog using the address shown in the following\
    \ example:\n\n```\nFMP://admin:58Jt234@10.1.0.10/Contacts.fmp12\n```"
  raw: '## Hosting with FileMaker Cloud


    *FileMaker Cloud* is a service by Claris that provides reliable access to cloud-hosted
    databases. While the use and configuration interface are nearly identical as those
    described earlier for *FileMaker Server* , there are some important differences
    with Cloud. The hardware is managed by Claris so you don’t need to be concerned
    with hardware or energy costs. There is no way to access the folder structure
    directly, so interactions with the server and databases can only be performed
    through the *Admin Console*. To protect your information, all databases must be
    encrypted when uploaded to the cloud. Various maintenance tasks such as daily
    backups, software upgrades, automatic restarts during non-business hours, and
    other maintenance tasks are or can be performed automatically. Another benefit
    is that Claris provides round the clock support options.


    Note


    For more information about Claris hosting your database solution, visit [`www.claris.com/filemaker/cloud/`](http://www.claris.com/filemaker/cloud/).


    ## Controlling FileMaker with Links, URLs, and AppleScript


    There are several ways to open and perform actions within a database from outside
    FileMaker: *Snapshot Links*, *FileMaker URL,* and *AppleScript*.


    ### Sharing Bookmarks with Snapshot Links


    A *snapshot link* is an XML file that stores information about a record or a found
    set of records that can be used to re-create a previously existing found set.
    They act like a bookmark but reference a specific found set of records within
    a database. Opening a snapshot file will automatically open the database, navigate
    to the layout, and restore the found set of records, thereby re-creating the same
    context a user was viewing at the time they saved the snapshot. These files can
    be stored in folders and sent to coworkers, allowing users to exchange lists of
    records with other users. For example, each client folder on a company file server
    can include a snapshot link that instantly opens a list view of contacts for the
    company.


    To generate a snapshot link, select the *File ➤ Save/Send Records As ➤ Snapshot
    Link* menu. This will open a *Save Records* dialog with snapshot configuration
    `options`, shown in Figure [29-9](#429700_2_En_29_Chapter.xhtml#Fig9). Enter a
    name and choose a save location for the link. Select a *Save* option of *Current
    record* or *Records being browsed* to control which records are saved. The optional
    checkbox can be used to create an email with the snapshot attached. A *Send Records
    as Snapshot Link* script step uses the same dialog to configure a script that
    automates snapshot link generation.


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig9_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig9_HTML.jpg)


    Figure 29-9


    The dialog used to configure and save a snapshot link


    ### Using the FileMaker URL


    The *FileMaker URL* is an internet protocol registered with the FileMaker Pro
    client application installation that can open a database and run a script using
    a URL. If a user account’s privilege set is explicitly granted permission to the
    *fmurlscript* extended privilege (Chapter [30](#429700_2_En_30_Chapter.xhtml)),
    the following URL options become possible:


    *   *Typed in a Web Browser* – Type or pasted a URL into a web browser and the
    command will be routed to FileMaker.


    *   *Embedded in a Web Page* — Use a *href* tag to create a link in a web page
    in a browser or a web viewer on a layout in a database. Alternatively, the new
    *FileMaker.PerformScript* JavaScript function is a better option for web viewers
    (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Calling a FileMaker Script with
    JavaScript”).


    *   *Used in a Script* – Use the *Open URL* script step to trigger other scripts.
    However, the *Perform Script* step has a better option to run a script by a calculated
    name.


    *   *Used in External Applications and Scripts* – Programming languages such as
    AppleScript can instruct the FileMaker application to run the URL.


    #### Formatting a Basic FMP URL


    The address must include a *prefix* , *address,* and *file name*. The inclusion
    of an extension is optional. Starting with version 18, the prefix can include
    a version number to specify one of multiple installed versions. Without a version
    specified, the URL should be routed to the last installed version. An address
    is required to open a database. To reference a file that is already open, use
    a dollar symbol as the address. For example, to refer to an open *Contacts* database,
    the address would be formatted as shown in the following examples:


    ```

    :///

    fmp://$/Contacts.fmp12

    fmp18://$/Contacts.fmp12

    fmp19://$/Contacts.fmp12

    ```


    If the database is stored in the user’s *Documents* folder, use a tilde as the
    address as shown in the following example which will automatically open the database:


    ```

    fmp19://~/Contacts.fmp12

    ```


    All URLs must be *percent encoded* except when using the *Open URL* script step
    within FileMaker. For example, a database named “Learn FileMaker” would require
    the space changed to “%20” as shown in the following example:


    ```

    fmp://$/Learn%20FileMaker.fmp12

    ```


    Tip


    When building a URL in a FileMaker calculation, use the *GetAsURLEncoded* function
    to automatically handle encoding.


    #### Addressing a Hosted Database


    To access a database hosted on a network server, include the address to a host
    computer. For example, if a *Contacts* database was hosted, the FMP URL can be
    formatted with an IPv4 address, IPv6 address, or a DNS name as shown in these
    three examples:


    ```

    FMP://10.1.0.10/Contacts.fmp12

    FMP://[2001:0db8:0a0b:12f0:0000:0000:0000:0001]/Contacts.fmp12

    FMP://filemaker-server.local/Contacts.fmp12

    ```


    #### Including Access Credentials


    To avoid a dialog requesting account credentials and achieve a seamless operation,
    an account and password can be specified in the `URL`. These can be added as colon-delimited
    values ahead of the address separated by an “`@`” sign. For example, a database
    with an account named “admin” that has a password of “58Jt234” can be opened without
    a password dialog using the address shown in the following example:


    ```

    FMP://admin:58Jt234@10.1.0.10/Contacts.fmp12

    ```'
  trans: "\n# 使用 FileMaker Cloud 托管\n\n`FileMaker Cloud` 是 Claris 提供的一项服务，可提供对云端数据库的可靠访问。虽然其使用和配置界面与之前描述的\
    \ `FileMaker Server` 几乎相同，但云端存在一些重要差异。硬件由 Claris 管理，因此您无需关心硬件或能源成本。由于无法直接访问文件夹结构，因此与服务器和数据库的交互只能通过\
    \ `Admin Console` 执行。为保护您的信息，所有数据库在上传到云端时必须进行加密。各种维护任务，例如每日备份、软件升级、非工作时间的自动重启以及其他维护任务，都可以自动执行。另一个优势是\
    \ Claris 提供全天候支持选项。\n\n> **注意**  \n> 有关 Claris 托管您的数据库解决方案的更多信息，请访问 [`www.claris.com/filemaker/cloud/`](http://www.claris.com/filemaker/cloud/)。\n\
    \n# 使用链接、URL 和 AppleScript 控制 FileMaker\n\n有多种方法可以从 FileMaker 外部打开数据库并在其中执行操作：`Snapshot\
    \ Links`（快照链接）、`FileMaker URL` 和 `AppleScript`。\n\n## 使用快照链接共享书签\n\n`快照链接`是一个\
    \ XML 文件，存储关于一个记录或一组已找到记录的信息，可用于重新创建先前存在的已找到记录集。它们的作用类似于书签，但引用的是数据库中特定的一组已找到记录。打开一个快照文件会自动打开数据库，导航到相应布局，并恢复已找到的记录集，从而重新创建用户在保存快照时所查看的相同上下文。这些文件可以存储在文件夹中并发送给同事，允许用户与其他用户交换记录列表。例如，公司文件服务器上的每个客户文件夹都可以包含一个快照链接，点击即可立即打开该公司的联系人列表视图。\n\
    \n要生成快照链接，请选择 `File ➤ Save/Send Records As ➤ Snapshot Link` 菜单。这将打开一个 `Save Records`\
    \ 对话框，其中包含快照配置 `options`，如图 29-9 所示。为链接输入名称并选择保存位置。选择 `Current record` 或 `Records\
    \ being browsed` 的 `Save` 选项来控制保存哪些记录。可选的复选框可用于创建带有快照附件的电子邮件。`Send Records as\
    \ Snapshot Link` 脚本步骤使用相同的对话框来配置自动生成快照链接的脚本。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig9_HTML.jpg](img/429700_2_En_29_Fig9_HTML.jpg)\n\
    \n**图 29-9** — 用于配置和保存快照链接的对话框\n\n## 使用 FileMaker URL\n\n`FileMaker URL` 是一种已注册到\
    \ FileMaker Pro 客户端应用程序安装中的互联网协议，可以使用 URL 打开数据库并运行脚本。如果用户帐户的权限集被明确授予对 `fmurlscript`\
    \ 扩展权限的访问权（第 30 章），则以下 URL 选项变为可能：\n\n- **在 Web 浏览器中键入** — 在 Web 浏览器中键入或粘贴 URL，命令将被路由到\
    \ FileMaker。\n- **嵌入网页中** — 使用 `href` 标签在浏览器中的网页上或数据库中某个布局上的 Web 查看器中创建链接。或者，新的\
    \ `FileMaker.PerformScript` JavaScript 函数是用于 Web 查看器的更好选项（第 20 章，“使用 JavaScript\
    \ 调用 FileMaker 脚本”）。\n- **在脚本中使用** — 使用 `Open URL` 脚本步骤来触发其他脚本。但是，`Perform Script`\
    \ 步骤提供了通过计算名称运行脚本的更好选项。\n- **在外部应用程序和脚本中使用** — 编程语言（如 AppleScript）可以指示 FileMaker\
    \ 应用程序运行该 URL。\n\n### 格式化基本 FMP URL\n\n地址必须包含一个 `前缀`、`地址`和`文件名`。扩展名的包含是可选的。从版本\
    \ 18 开始，前缀可以包含版本号来指定多个已安装版本中的其中一个。如果未指定版本，URL 应路由到最后安装的版本。打开数据库需要地址。要引用一个已打开的数据库，请使用美元符号作为地址。例如，要引用一个已打开的\
    \ `Contacts` 数据库，地址应格式化如下例所示：\n\n```\nfmp://$/\nfmp://$/Contacts.fmp12\nfmp18://$/Contacts.fmp12\n\
    fmp19://$/Contacts.fmp12\n```\n\n如果数据库存储在用户的 `Documents` 文件夹中，请使用波浪号作为地址，如下例所示，该地址将自动打开数据库：\n\
    \n```\nfmp19://~/Contacts.fmp12\n```\n\n所有 URL 都必须进行 `百分比编码`，但在 FileMaker 内使用\
    \ `Open URL` 脚本步骤时除外。例如，一个名为“Learn FileMaker”的数据库需要将空格改为“%20”，如下例所示：\n\n```\n\
    fmp://$/Learn%20FileMaker.fmp12\n```\n\n> **提示**  \n> 在 FileMaker 计算中构建 URL 时，使用\
    \ `GetAsURLEncoded` 函数自动处理编码。\n\n### 寻址托管数据库\n\n要访问网络服务器上托管的数据库，请包含主机计算机的地址。例如，如果\
    \ `Contacts` 数据库已托管，FMP URL 可以使用 IPv4 地址、IPv6 地址或 DNS 名称进行格式化，如下三个示例所示：\n\n```\n\
    FMP://10.1.0.10/Contacts.fmp12\nFMP://[2001:0db8:0a0b:12f0:0000:0000:0000:0001]/Contacts.fmp12\n\
    FMP://filemaker-server.local/Contacts.fmp12\n```\n\n### 包含访问凭据\n\n为避免弹出请求帐户凭据的对话框并实现无缝操作，可以在\
    \ `URL` 中指定帐户和密码。这些可以以冒号分隔的值形式添加在地址之前，并用“`@`”符号分隔。例如，一个帐户名为“admin”、密码为“58Jt234”的数据库可以使用以下示例中的地址打开，而无需密码对话框：\n\
    \n```\nFMP://admin:58Jt234@10.1.0.10/Contacts.fmp12\n```\n"
- fmt: '## Including a Script Name


    The URL can also instruct FileMaker to run a script in the database. Add a question
    mark after the database name `script=` and include a URL encoded script name.
    For example, the following example will confirm a `Contacts` database is open
    from the specified host computer and then run a script named `Find`:


    ```

    FMP://10.1.0.10/Contacts.fmp12?script=Find

    ```


    The account credentials are excluded in this and other examples for brevity. However,
    these can be included to ensure the database opens without a dialog requesting
    that information. When the script runs, it will be executed with the privileges
    and limitations of the user account used to sign into the database.


    ### Adding a Script Parameter


    When targeting a script that accepts parameters, the URL can include a `param`
    value by appending it after the script name and an ampersand. For example, instead
    of always searching for the same criteria, the `Find` script from the previous
    example can be modified to accept a parameter and use that value to determine
    which type of search to perform. The parameter used in an `If` script step can
    allow the script to search a `Status` field based on a value provided by the URL.
    Now to find records that are `Active` or `Hold`, add an ampersand and `param`
    component to the URL, as shown in the following examples:


    ```

    FMP://10.1.0.10/Contacts.fmp12?script=Find&param=Active

    FMP://10.1.0.10/Contacts.fmp12?script=Find&param=Hold

    ```


    ### Adding Script Variables


    The URL can go even farther and initialize local variables within the script by
    adding an ampersand, the name, and value of the variables, following the pattern
    shown here:


    ```

    FMP:///?&param=&=

    ```


    This example initializes a variable specifying a state name for the find script:


    ```

    FMP://10.1.0.10/Contacts.fmp12?script=Find&param=Active&$State=Pennsylvania

    ```


    ## Using AppleScript to Automate FileMaker


    `AppleScript` is an `Open Scripting Architecture` (`OSA`) compliant command language
    that can communicate with and control macOS applications ([`https://goo.gl/i70lnx`](https://goo.gl/i70lnx)).
    Back in 1994 when the language was first introduced as a part of the Macintosh
    System 7.5, FileMaker was one of the first scriptable applications. Since then,
    support for the language has steadily evolved and continues to provide a great
    option for automating FileMaker functionality from external scripts and integrating
    it with data from other applications. If a user account’s privilege set is explicitly
    granted permission to the `fmextscriptaccess` extended privilege (Chapter [30](#429700_2_En_30_Chapter.xhtml)),
    an AppleScript will be able to control application and database actions.


    ### Defining the Tell FileMaker Statement


    AppleScripts are written using the `Script Editor` application located in the
    `Utilities` subfolder of the `Applications` folder. Event instructions are sent
    to an application using a `tell` statement that points to the application and
    encloses the object references and commands.


    ```

    tell application "FileMaker Pro"


    end tell

    ```


    ### Opening FileMaker’s Script Dictionary


    Every macOS scriptable application has a script dictionary which can be opened
    by dropping the application onto the `Script Editor` application or by launching
    the editor and selecting the `File ➤ Open Directory` menu. This opens a window
    exposing the dictionary of objects and commands available for controlling the
    application, as shown in Figure [29-10](#429700_2_En_29_Chapter.xhtml#Fig10).


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig10_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig10_HTML.jpg)


    Figure 29-10


    The FileMaker Pro Advanced AppleScript dictionary window


    **Caution**


    FileMaker’s script commands use three different words to describe a database window:
    `database`, `document`, and `window`. Each of these can be used interchangeably
    but may have a slightly different effect.


    ### Scripting Basic Tasks


    As a brief introduction to automating FileMaker with scripts, this section presents
    a few simple examples of opening a database, activating an open database, changing
    layouts, performing a find, and counting records. These can be expanded with other
    functions to create complex scripted workflows that perform vastly more complex
    actions. They can also be woven with script commands sent to other applications
    to create powerful inter-application data transfer solutions.


    **Note**


    FileMaker also includes a script step called `Perform AppleScript` that allows
    AppleScript commands to be embedded in a database script that targets commands
    in other applications.


    #### Opening a Database


    AppleScript can open a database from any folder using the `open file` command.
    This example sets the value of three variables to the path to a database, an account
    name, and password. These are used to instruct FileMaker to open the file:


    ```

    set pathToDatabase to "Macintosh HD:Users:shannonmiller:Learn FileMaker.fmp12"

    set textAccount to "Admin"

    set textPassword to "58Jt234"

    tell application "FileMaker Pro"

    open file pathToDatabase with passwords textPassword for Accounts textAccount

    end tell

    ```


    To open a hosted database, the `getURL` command will accept a FileMaker URL described
    earlier in this chapter.


    ```

    tell application "FileMaker Pro"

    getURL "fmp19://Admin:58Jt-234@10.0.1.20/Learn%20FileMaker.fmp12”

    end tell

    ```


    #### Activating an Open Database


    To bring an open database to the front of the document window stack, this example
    checks if the document exists and then uses the `show` command to activate the
    database:


    ```

    set nameDatabase to "Learn FileMaker"

    tell application "FileMaker Pro"

    if (document nameDatabase exists) = true then

    show document nameDatabase

    end if

    end tell

    ```


    #### Changing Layouts


    This example activates a layout named `Contact` using the `show` command:


    ```

    tell application "FileMaker Pro"

    tell document "Learn FileMaker"

    show layout "Contact"

    end tell

    end tell

    ```


    #### Finding All Records


    To perform the equivalent of a `Find All` command, use the `show` command with
    a reference of `every record`.


    ```

    tell application "FileMaker Pro"

    tell database "Learn FileMaker"

    tell table "Contact"

    show every record

    end tell

    end tell

    end tell

    ```


    #### Finding Records Based on a Field Value


    This example appends a `whose` clause to the `show` command to search based on
    a specific value within one field.


    ```

    set nameTable to "Contact"

    set nameField to "Contact Address State"

    set textToFind to "NY"

    tell application "FileMaker Pro"

    tell database "Learn FileMaker"

    tell table nameTable

    show every record whose cell nameField of table nameTable contains textToFind

    end tell

    end tell

    end tell

    ```


    The `whose` clause can use various operators for matching data in the field, including
    `contains`, `does not contain`, `is equal to`, and `is not equal to`. Further,
    clauses can be grouped with others to form compound search criteria, as shown
    in this example:


    ```

    show every record

    whose cell nameField1 of table nameTable contains value1 or

    whose cell nameField1 of table nameTable is equal to value2 and

    whose cell nameField2 of table nameTable is not equal to value3

    ```


    ##### Counting Records in the Found Set


    To count the records in the found set of the current window, a `tell window` statement
    is required to refer to the context displayed, regardless of the layout or table.


    ```

    tell application "FileMaker Pro"

    tell window "Learn FileMaker"

    return the number of every record

    end tell

    end tell

    ```


    ##### Counting Every Record in a Table


    To count the total records in the table regardless of the current window’s layout,
    use a `tell database` statement.


    ```

    tell application "FileMaker Pro"

    tell database "Learn FileMaker"

    return the number of every record of table "Contact"

    end tell

    end tell

    ```'
