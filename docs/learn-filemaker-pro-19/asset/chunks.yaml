    This technique isn’t necessarily the best for every situation. Even the preceding
    example looks a little more crowded using *Let* instead of nesting. One may argue
    that, in this case, adding returns and tabs to space out the nesting would be
    a better solution. However, in situations with statements more complex than this
    simple example, the Let statement can be used in this manner with great success.


    ### While


    The *While* function is a complex statement that repeats a series of logical steps
    as long as a specified condition is true. The function accepts four parameters.
    First, one or more *initialization variables* are declared as the first parameter.
    These set up values similar to a *Let* statement. A *condition parameter* is a
    Boolean expression that controls the looping action. As long as this result evaluates
    true and the maximum number of allowable iterations hasn’t been reached, the function
    will repeat the logical steps. Next, one or more *logic variables* contain variable
    declarations that will be repeated over and over until the function terminates.
    These are also structured like the initial variables and a *Let* statement. Finally,
    the *result parameter* is an expression that generates the final result of the
    statement. This can include values stored in any of the initial variables or logic
    variables.


    ```

    While (

    [ initialVariable ] ;

    condition ;

    [ logicVariables ] ;

    result

    )

    ```


    #### Removing Double Spaces with a While Statement


    The following simple example demonstrates the basic structure of a *While* function.
    First, a *data* variable is initialized to the value of a *Notes* field in a *Contact*
    table. This is a statement variable that will be available within the *While*
    statement during execution. Next, a *condition* is established that will cause
    the function to repeat as long as the *data* variable contains any double spaces.
    The *logic* portion reinitializes the *data* variable with double spaces replaced
    with a single space. This will continue looping until there are no double spaces
    left, thereby correcting any number of extra spaces: double, triple, quadruple,
    etc. Finally, after the *condition* fails to find double spaces and terminates,
    the cleaned up *data* variable becomes the *result* and returns the text without
    any extra spaces.


    ```

    While (

    [

    data = Contact::Notes

    ] ;

    PatternCount ( data ; "  " ) ;

    [

    data = Substitute ( data ; "  " ; " " )

    ] ;

    data

    )

    ```


    Place this formula into an auto-enter calculation (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    “Field Options: Auto-Enter”) that replaces an existing value to have any double
    spaces typed by a user automatically removed from the field. Just change the field
    reference to Self and the formula can be used for any field.


    Tip


    Consider creating a custom function to automatically clean text (Chapter [15](#429700_2_En_15_Chapter.xhtml))
    and use that for the auto-enter formula on any field.


    #### Compiling a List of Related Records Using While


    The following example pulls a list of names and titles from *Contact* records
    related to the current *Company* record and merges these values together to form
    a single contact list. In other words, a list of return-delimited *names* and
    a list of return-delimited *titles* become a return-delimited list of “name title”
    for each related record. The two lists are initialized into a variable, and these
    are counted, and two control variables are initialized. As long as the *current*
    value is less than or equal to the *count* of values, the logical variables will
    be repeated. There the entry for the *current* value is created and added to the
    *result* variable. Then the *current* variable is incremented by one. When all
    values have been processed, the statement exits and returns the accumulated results.


    ```

    While (

    [

    names = List ( Company | Contact::Contact Name Full ) ;

    titles = List ( Company | Contact::Contact Title ) ;

    count = ValueCount ( names ) ;

    current = 1 ;

    result = ""

    ] ;

    count ≥ current ;

    [

    entry = GetValue ( names ; current ) & " " & GetValue ( titles; current ) ;

    result = result & Case ( result ≠ "" ; "¶" ) & entry ;

    current = current + 1

    ] ;

    result

    )

    ```


    Caution


    The *List* function excludes blank values. If even one related record in the preceding
    example is missing a value in one of the two fields, the merged results will be
    mismatched for every subsequent record.


    #### Compiling a List of Local Records Using While


    This example generates the same results as in the preceding example, but instead
    of looping through lists pulled from records in a related table, it loops through
    a found set of records in the current table by employing the *GetNthRecord* function
    (described previously in this chapter).


    ```

    While (

    [

    count = Get ( FoundCount ) ;

    current = 1 ;

    result = ""

    ] ;

    count ≥ current ;

    [

    name = GetNthRecord ( Contact::Contact Name Full ; current ) ;

    title = GetNthRecord ( Contact::Contact Title ; current ) ;

    entry = name & " " & title ;

    result = result & Case ( result ≠ "" ; "¶" ) & entry ;

    current = current + 1

    ] ;

    result

    )

    ```


    ## Nesting Functions into Complex Statements


    Built-in functions can be combined and nested to create statements as complex
    as necessary to produce any desired result. The examples in this section demonstrate
    the move from simple statements to more complex by combining various functions
    and statements.


    ### Creating a Record Metadata String


    This example gathers information about a record and creates a string displaying
    that information. Each result can be displayed on a layout in a field or a *formula-named
    object* like a button bar (Chapter [20](#429700_2_En_20_Chapter.xhtml)). The *Let*
    statement pulls values from metadata fields and assembles them into a single value
    displaying the record serial number and created/modified dates and times.


    ```

    Let ( [

    id = Record ID ;

    creator = Record Creation User ;

    created = Record Creation Timestamp ;

    modifier = Record Modification User ;

    modified = Record Modification Timestamp ;

    creation =

    Right ( "0" & Month ( created ) ; 2 ) & "." &

    Right ( "0" & Day ( created ) ; 2 ) & "." &

    Year ( created ) ;

    modification =

    Right ( "0" & Month ( modified) ; 2 ) & "." &

    Right ( "0" & Day ( modified) ; 2 ) & "." &

    Year ( modified)

    ] ;

    "ID " & id & " | " &

    "Created on " & creation & " by " & creator & " | " &

    "Modified on " & modification & " by " & modifier

    )

    // result = ID 55326 | Created on 07.01.2020 by Admin | Modified on 07.01.2020
    by Admin

    ```


    ### Creating a Record Count String


    This example assembles a string that displays a record navigational string, including
    the *current record number* and total record count. If the user is viewing a found
    set, it includes that number as well.


    ```

    Let ( [

    total = Get ( TotalRecordCount ) ;

    found = Get ( FoundCount ) ;

    current = Get ( ActiveRecordNumber )

    ] ;

    "Record " & current & " of " & found &

    Case ( found ≠ total ; " Found ( " & total & " Total )" )

    )

    // result (viewing all)         = Record 2 of 6

    // result (viewing found set)   = Record 2 of 4 Found ( 6 Total )

    ```


    Caution


    When using the preceding example as a calculation field formula, turn indexing
    off under *Storage Options* to ensure constant updates.'
