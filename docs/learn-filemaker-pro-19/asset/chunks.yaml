- fmt: '# Searching and Dealing with Found Sets


    There are several different steps available to perform searches. These can be
    used separately or used with steps that perform navigation, sorts, compilations,
    and other functions. The `Perform Quick Find` step uses the text result of a formula
    as the criteria to perform a search within any field on the current layout that
    has `Quick Find` enabled (Chapter [19](#429700_2_En_19_Chapter.xhtml)).


    The `Enter Find Mode` step places the window into Find mode, giving the user or
    script steps an opportunity to enter find criteria in fields before searching.
    It can `Specify find requests`, establishing a default starting criteria, and
    optionally `Pause` to wait for the user. Since the step does not actually perform
    a find itself, that must be initiated by the user or another script step.


    The `Perform Find` step can be used in Find mode to execute the criteria entered
    by a user or script steps. Alternatively, it can be used in Browse mode as a stand-alone
    instant find step when using its optional `Specify Find Request` dialog to define
    search criteria (Chapter [4](#429700_2_En_4_Chapter.xhtml), “Working with Saved
    Finds”).


    A find script can take many forms. It may perform a find based on static unchanging
    criteria, build the criteria based on variables, solicit user criteria, or some
    combination of these. The following example uses one hard-coded criterion and
    one user entered. After entering Find mode, it sets the `Invoice Status` field
    to “Paid” and then presents a dialog allowing the user to enter a date range into
    an `Invoice Date` field. When the dialog is closed, the search will resume, performing
    the find and showing a found set of all paid invoices whose date falls within
    the range specified.


    ```

    Go to Layout ["Invoice List" ]

    Enter Find Mode [ Pause: Off ]

    Set Field [ Invoice::Invoice Status ; "Paid" ]

    Show Custom Dialog [

    "Search Paid Invoices" ;

    "Enter a date range (m/d/yyyy...m/d/yyyy):" ;

    Invoice::Invoice Date ]

    Perform Find

    ```


    **Tip:** Help users enter date ranges by inserting a default range into the target
    field or variable prior to the `Show Custom Dialog` step.


    ## Iterating with Repeating Statements


    A *repeating statement* is made up of one or more steps that are executed repeatedly
    until a step exits the loop. FileMaker has three steps that are used to construct
    repeating statements:


    - `Loop` – Required to begin repeating subsequent steps until a terminating step
    is executed

    - `Exit Loop If` – Immediately terminates a loop when a formula entered is true,
    skipping to the step after the next `End Loop`

    - `End Loop` – Required to mark the bottom of the repeating statement where control
    returns back to the start for the next iteration through the steps


    Certain steps inside the statement can also terminate the loop. For example, both
    `Exit Script` and `Halt Script` will stop an entire script, including any active
    looping. Use the `Exit after last` option of the `Next` or `Previous` option of
    a `Go to Record/Request/Page` or the `Go to Portal Row` steps to exit after the
    final record in the direction indicated is reached. A user can also halt a script
    by typing Esc (Windows) or Period with the Command key down (macOS) as long as
    `Allow User Abort` is `On`.


    **Caution:** If no step causes the loop to terminate, the statement will run endlessly
    until a force quit which may cause file damage.


    ### Looping Through a Found Set of Records


    A script can step through a found set and perform actions to each record. The
    following example starts by navigating to the first record in a found set of invoices
    and then initiates a `Loop`. For each record in the set, it calls another script
    named “Send Invoice Email” that sends an invoice to the customer. Then, a `Set
    Field` step changes the `Invoice Status` field from “Open” to “Sent.” Finally,
    it goes to the next record and repeats these steps until it reaches the end of
    the found set and exits the loop.


    ```

    Go to Record/Request/Page [ First ]

    Loop

    Perform Script [ Specified: From list ; "Send Invoice Email" ; Parameter: ]

    Set Field [ Invoice::Invoice Status ; "Sent" ]

    Go to Record/Request/Page [ Next ; Exit after last: On ]

    End Loop

    ```


    Another example in the following loops through a found set of open invoices and
    collects the value of several fields for each record. It extracts the id, date,
    company, amount, and a new `Invoice Status Overdue` field that calculates the
    overdue value for each invoice record with a status of “Sent” by looking at the
    number of 30-day increments that have passed since from the `Invoice Date`. These
    values are arranged as a columnar list stored in a variable named `$Body` which
    can later be used to create a report email or saved into a data file.


    ```

    Go to Record/Request/Page [ First ]

    Loop

    Set Variable [ $Body ; $Body &

    Invoice::Record ID & " " &

    Invoice::Invoice Date & " " &

    Invoice::Invoice Company Name & " " &

    Invoice::Invoice Amount & " " &

    Invoice::Invoice Status Overdue & "¶" ]

    Go to Record/Request/Page [ Next ; Exit after last: On ]

    End Loop

    // result =

    1001 04/15/2021 Fantastic Client 1000 Over 60 Days

    1001 04/15/2021 Fantastic Client 1000 Over 60 Days

    1002 05/19/2021 Creative Company 3000 Over 30 Days

    1003 06/1/2021 Fantastic Client 4500 Open

    1003 06/15/2021 Fantastic Client 958 Open

    ```


    When the result of the preceding example is used as the body of an email message,
    the data can be formatted differently to make it more readable. The following
    example returns a similar report that is refined with overdue status as a heading
    above groups of invoices rather than being repeated for each invoice. Starting
    with the same found set of open invoices sorted by `Invoice Status Overdue`, the
    script uses a variable named `$Last.Status` to track the status value from the
    record in the last iteration. Anytime it encounters a new status value in the
    current record, it performs a conditional step to insert that into to the `$Body`
    variable with some extra paragraph returns. Then it puts the current status into
    the `$Last.Status` variable so it will be ignored on each subsequent iteration
    until a different value is detected.


    ```

    Set Variable [ $Last.Group ; "" ]

    Go to Record/Request/Page [ First ]

    Loop

    Set Variable [ $Group ; Invoice::Invoice Status Overdue ]

    If [$Group ≠ $Last.Group ]

    # Add header row

    Set Variable [ $Body ; $Body & Case ( $Body ≠ "" ; "¶" ) & $Group & "¶" ]

    Set Variable [ $Last.Group ; $Group]

    End If

    # Add body row

    Set Variable [ $Body ; $Body &

    Invoice::Record ID & " " &

    Invoice::Invoice Date & " " &

    Invoice::Invoice Company Name & " " &

    Invoice::Invoice Amount & "¶" ]

    Go to Record/Request/Page [ Next ; Exit after last: On ]

    End Loop

    # Result =

    Open

    1003 06/1/2021 Fantastic Client 4500

    1003 06/15/2021 Fantastic Client 958

    Over 30 Days

    1002 05/19/2021 Creative Company 3000

    Over 60 Days

    1001 04/15/2021 Fantastic Client 1000

    1001 04/15/2021 Fantastic Client 1000

    ```'
