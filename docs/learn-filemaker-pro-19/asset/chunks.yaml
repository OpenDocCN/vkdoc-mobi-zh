  trans: '

    ### 向门户行中添加对象


    在布局模式下，门户的第一行是一个设计区域，可以在此添加字段、按钮和其他对象，以定义每个行在浏览模式下的渲染模板，如图 20-47 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig47_HTML.jpg](img/429700_2_En_20_Fig47_HTML.jpg)


    图 20-47


    分别显示布局模式（上）和浏览模式（下）中的门户


    放置在门户中的对象，其渲染依据当前布局实例的上下文以及与门户数据源实例之间的关联。在选择要放置在门户内的对象以及如何配置它们时，请务必牢记这一点。添加到门户中的任何`字段`，必须来自门户的指定实例，或者来自与该实例通过一条远离布局实例的直线路径相关联的实例。来自门户表之外的其他表的字段，只能通过关系通道从每个门户行的记录上下文中显示第一个匹配记录的值。因此，一个`联系人`门户可以包含一个跨越多个关系链的字段，用于显示与该联系人相关的发票中的某个发票行项目字段，但根据该关系链上的连接，它只会显示该联系人的第一张发票中的第一个行项目的值。门户中的任何`对象`都必须结合门户实例的上下文来思考。在编写隐藏、工具提示、条件格式、脚本参数等公式时，该公式必须限制为仅包含基于门户上下文的字段。


    ### 直接在门户中创建记录


    在浏览模式下，当在相关源表中创建新的匹配记录时，门户会自动更新。如果一位用户正在查看带有一个`联系人`门户的`公司`记录布局，那么任何链接到该公司的新的联系人记录都会出现在所有人查看的门户中。如果查看公司记录的用户想要从`公司`布局中创建一个新的相关联系人记录，他们通常需要切换布局、创建记录、将其链接到公司，然后返回原始布局才能在门户中看到它——或者运行一个按顺序执行这些步骤的脚本。或者，可以将门户配置一个快捷方式，允许用户通过在底部的一个空白门户行中输入内容，直接在门户中创建新记录。此功能在关系层面配置，而非布局对象层面。打开`管理数据库`对话框，并在`编辑关系`对话框（第
    9 章）中，于用作门户数据源的那一侧关系（本例中为`公司 | 联系人`）上，启用`允许创建记录`复选框。完成此操作后，任何分配了该实例的门户都会显示一个空白行，如图
    20-48 所示。这个空白行`仅存在于界面中`，并且会被`程序化地忽略`，不会影响诸如`计数`、`列表`、`最大值`、`最小值`、`总和`等汇总相关记录的函数。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig48_HTML.jpg](img/429700_2_En_20_Fig48_HTML.jpg)


    图 20-48


    设置（左）启用了用于创建新记录的空白门户行（右）


    当用户在该空白行的任何可编辑字段中输入内容，然后将焦点移动到另一个字段或提交记录时，系统将立即在远程表中创建一个新记录。新记录将自动使用所需的值填充每个匹配字段，以便将其与当前查看的父记录关联起来。尽管新记录保留在门户中，但它可能会根据在关系层面和/或门户设置中定义的任何排序字段的值，排序到一个新的位置。完成后，会出现一个新的空白行，用于创建更多的新记录。


    注意


    此功能可能会让用户感到困惑，因为空行看起来像是一条没有字段值的实际记录。用户可能会试图删除它。可以隐藏按钮（第 21 章）以使其不那么显眼，但有些开发者会禁用它，并改用自定义脚本来执行创建相关记录所需的操作序列。


    ### 删除门户行


    门户行是来自另一个表的记录的表示，每当相关记录被删除时，它们就会从门户中消失。可以将门户配置为允许用户直接在门户中删除记录。打开`门户设置`对话框，并选择`允许删除门户记录`选项。启用后，用户可以选择一个门户行并按
    Delete 键来删除相关记录，并将其从门户显示中移除。FileMaker 会显示一个确认对话框，询问用户是否要继续删除操作。如果他们确认，相关记录将被永久删除。


    注意


    删除门户行的确认对话框信息模糊，可能会使用户困惑，他们可能意识不到自己选择了哪一行，并意外删除了错误的记录。相反，可以在门户中添加一个按钮来更精确地处理此过程，并可选地运行一个带有信息更丰富的自定义对话框的脚本。


    ### 过滤门户记录


    布局实例与门户实例之间的关系自动提供了一个基线过滤器，用于控制门户中显示的记录。仅包含与当前记录实例存在关系匹配的记录。相比之下，`门户设置`对话框中的`门户过滤`选项允许使用公式进一步控制哪些相关记录会实际显示在门户中。过滤公式会为每个可用的相关记录评估一次，并且仅当结果为
    true 时才显示这些记录。


    过滤公式的复杂程度可以根据需要确定是否应包含某条记录。它可以包含字段比较，并且可以基于用户在专门用于征求过滤偏好的字段中的输入。例如，靠近门户放置的一个字段可以允许用户输入任何标准，这些标准可用于确定要显示的相关记录的子集。在图
    20-49 所示的示例中，一个`公司`布局包含一个显示相关人员的`联系人`门户。该关系将门户列表限制为仅与当前公司相关的人员。可以将过滤字段中的值与相关的`州/省`字段进行比较，以便将相关记录范围缩小到地址与用户输入的值匹配的联系人。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig49_HTML.jpg](img/429700_2_En_20_Fig49_HTML.jpg)


    图 20-49


    门户过滤字段示例


    注意


    过滤仅影响相关记录的`显示`，不影响实际的关系。任何通过该关系访问记录的计算将继续看到所有相关记录，即使门户显示的是过滤后的子集！

