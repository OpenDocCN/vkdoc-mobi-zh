    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig3_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig3_HTML.jpg)


    Figure 31-3


    The dialog containing various developer utility functions


    ### Renaming Files


    *To rename a file* *, select it in the list, enter a new name without the extension
    into the Rename File* text field, and click the *Change* button. This is the recommended
    method for renaming database files in a multi-file solution since it will not
    only rename the selected file *but also* update all external file references to
    it within all other files in the list. Any new names specified will be queued
    into the *New Name* column of the file list. These will not take effect until
    a *Project Folder* is specified and the *Create* button is clicked.


    ### Specifying a Project Folder


    Before you can rename files or perform solution options, choose a *Project Folder*
    by clicking the *Specify* button. Since the utility dialog creates new versions
    of files, this setting indicates where these should be saved. Check the box below
    to automatically overwrite any files with the same name that exist in the selected
    folder.


    ### Specifying Solution Options


    This *Developer Utilities* dialog contains several utility functions that can
    alter the structure of the *Solution Files*. To enable one or more of these options,
    click the Specify button under the *Solution Options* header which opens a *Specify
    Solution Options* dialog. Then enable checkboxes to any of the following utility
    functions:


    *   Remove admin access from files permanently.


    *   Enable kiosk mode for non-admin accounts.


    *   Databases must have a FileMaker file extension.


    *   Create error log for any processing errors.


    *   Enable database encryption (or re-encrypt files).


    *   Remove database encryption.


    #### Removing Admin Access from Files


    Enable the *Remove admin access from files* *permanently* checkbox to save copies
    of the files with all admin access removed from every user account and most design
    and structural elements rendered read-only. This essentially prevents *anyone*
    from acting as a developer within the file while allowing normal data entry and
    other uses to continue unabated. While this can be a useful method to secure a
    file for sale as a product or distribution as a demo, it should be used with caution
    and while retaining a safe unmodified backup file.


    #### Enabling Kiosk Mode


    The *Enable Kiosk mode* *for non-admin accounts* option saves copies of the file
    with full screen mode and no menu bar enforced for all non-admin access. This
    is a great option for creating touch kiosks where you don’t want to allow users
    access to anything except the interface controls you make accessible on layouts.
    The database must have at least one non-admin user account defined, which must
    be used to open in kiosk mode. Once in kiosk mode, a user’s ability to navigate
    within the file or to close the file will be through the controls you provide
    on layouts. There will be *no* menu bar, and even access to operating system functions
    such as force quit or toggle applications will be completely disabled. When adding
    a button to quit the database intended to be a public kiosk, be sure to include
    some sort of authentication process to exclude regular users from quitting the
    solution and accessing the underlying operating system.


    Caution


    If you don’t provide a button on the layout that will quit the application or
    close the database, the *only* option will be to perform a hard restart of the
    computer that may lead to file damage.


    #### Requiring a FileMaker File Extension


    The *Databases must have a* *FileMaker file extension* option will confirm each
    *Solution File* has a file extension and will add it to the new copies if missing.


    #### Creating an Error Log of Errors


    The *Create Error log* *for any processing errors* option will generate a log
    file in a *Project Folder* containing any errors that occur while processing other
    utility functions. This option can optionally be selected with any other utility
    function but is *required* when enabling encryption and will be selected by default
    for both encryption options. Once selected, an extra option below allows customization
    of the name and location of the log file by clicking the *Specify* button. The
    default is a file named “Logfile.txt” that will be saved in the *Project Folder*.'
  trans: '

    ### 专业 DDR 工具介绍


    一些公司提供了可用产品，用于导入一份`XML`设计报告，并以比 FileMaker 提供的 HTML 页面更精良的界面呈现材料。那些构建需要大量分析的复杂数据库的开发人员，将会欣赏这些产品所改进的查看体验。


    #### BaseElements


    BaseElements 是一款出色的分析工具，用于遍历数据库结构，由同名公司销售。该解决方案可作为 FileMaker 文件或适用于 macOS 和 Windows
    的独立应用程序提供。该产品具有完整的布局访问权限，因此您可以从数据库的关系图链接到 BaseElements 数据表，并在脚本中访问信息。该产品包含一个开源
    BaseElements 插件，其中包含许多有用的函数。了解更多信息，请访问[`www.baseelements.com`](http://www.baseelements.com)。


    #### FMPerception


    FMPerception 是一个用于搜索、分析和维护由 Geist Interactive 销售的数据库的工具。该产品使用渐进式分析技术，快速提供关于数据库结构的当前且准确的信息。其部分功能包括：


    -   提供高级概览和“数据库报告卡”，总结数据库的复杂性，并列出检测到的任何潜在问题。

    -   快速的`DDR`导入过程，几乎是即时的。

    -   图形化的“调用链可视化”阐明了从按钮到脚本再到子脚本的脚本调用流程，有助于跟踪复杂功能流程。

    -   识别可能降低性能的布局对象。

    -   执行安全审计，以识别诸如缺少密码或以完全访问权限运行的脚本等漏洞。


    了解更多信息，请访问[`www.geistinteractive.com`](http://www.geistinteractive.com)。


    #### InspectorPro


    InspectorPro 是一款由 Beezwax DataTools 销售的高级诊断、分析和可视化工具。该产品拥有超过 115 个不同领域，可标准化分析信息，并能自动检测数据库结构问题。了解更多信息，请访问[`www.beezwax.net`](http://www.beezwax.net)。


    ### 探索开发者工具


    如图 31-3 所示的`开发者工具`对话框，可通过`工具`菜单访问。打开对话框后，单击`添加`按钮将一个或多个文件放入`方案文件`列表中。这些文件将通过对话框中启动的各种功能和选项进行批量处理。在列表中，一个红色箭头指示一个文件为主文件，由
    Kiosk 选项用于指定包含起始“首页”界面的数据库。列表下方是用于重命名文件、选择修改后文件保存位置的输出文件夹的控件。


    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig3_HTML.jpg](img/429700_2_En_31_Fig3_HTML.jpg)


    图 31-3


    包含各种开发者实用功能的对话框


    ### 重命名文件


    要重命名文件，请在列表中选择它，在`重命名文件`文本字段中输入不带扩展名的新名称，然后单击`更改`按钮。这是在多文件方案中重命名数据库文件的推荐方法，因为它不仅会重命名所选文件，还会更新列表中所有其他文件中对该文件的所有外部文件引用。任何指定的新名称都将排入文件列表的`新名称`列。这些更改直到指定`项目文件夹`并单击`创建`按钮后才会生效。


    ### 指定项目文件夹


    在重命名文件或执行方案选项之前，请单击`指定`按钮选择一个`项目文件夹`。由于该实用工具对话框会创建文件的新版本，此设置指示新版本应保存的位置。选中下面的复选框，以自动覆盖所选文件夹中存在的任何同名文件。


    ### 指定方案选项


    `开发者工具`对话框包含多个可以改变`方案文件`结构的实用功能。要启用一个或多个这些选项，请单击`方案选项`标题下的`指定`按钮，这将打开`指定方案选项`对话框。然后，为以下任何实用功能启用复选框：


    -   从文件中永久删除管理员访问权限。

    -   为非管理员帐户启用 Kiosk 模式。

    -   数据库必须具有 FileMaker 文件扩展名。

    -   为任何处理错误创建错误日志。

    -   启用数据库加密（或重新加密文件）。

    -   移除数据库加密。


    #### 从文件中删除管理员访问权限


    选中`从文件中永久删除管理员访问权限`复选框，将保存文件的副本，并从每个用户帐户中删除所有管理员访问权限，并使大多数设计和结构元素变为只读。这基本上可以防止任何人在文件中以开发人员身份操作，同时允许正常的数据输入和其他使用不受影响。虽然这可能是保护作为产品销售或作为演示分发的文件的有用方法，但应谨慎使用，并保留一份安全且未经修改的备份文件。


    #### 启用 Kiosk 模式


    `为非管理员帐户启用 Kiosk 模式`选项会保存文件的副本，该副本对所有非管理员访问强制使用全屏模式且无菜单栏。这是创建触摸屏 Kiosk 的一个很好的选项，在这种模式下，您不希望用户访问除您在布局上提供的界面控件之外的任何内容。数据库必须至少定义一个非管理员用户帐户，并且必须使用该帐户以
    Kiosk 模式打开。一旦进入 Kiosk 模式，用户在文件中导航或关闭文件的能力将通过您在布局上提供的控件来实现。将没有菜单栏，甚至访问操作系统功能（如强制退出或切换应用程序）也将被完全禁用。当添加一个用于退出旨在作为公共
    Kiosk 的数据库的按钮时，请确保包含某种身份验证过程，以防止普通用户退出方案并访问底层操作系统。


    > **警告**

    >

    > 如果您没有在布局上提供退出应用程序或关闭数据库的按钮，那么唯一的选项就是强制重启计算机，这可能会导致文件损坏。


    #### 要求拥有 FileMaker 文件扩展名


    `数据库必须具有 FileMaker 文件扩展名`选项将确认每个`方案文件`都包含文件扩展名，如果缺失则将其添加到新副本中。


    #### 创建错误日志


    `为任何处理错误创建错误日志`选项将在`项目文件夹`中生成一个日志文件，其中包含处理其他实用功能时发生的任何错误。此选项可以与其他任何实用功能一起选择，但在启用加密时是必需的，并且对于加密选项将默认选中。一旦选中，下方的一个额外选项允许通过单击`指定`按钮来自定义日志文件的名称和位置。默认为一个名为“Logfile.txt”的文件，它将保存在`项目文件夹`中。

    '
- fmt: '#### Exploring Encryption Features


    FileMaker includes several encryption features that can be employed to protect
    data. Container fields using managed external storage (Chapter [11](#429700_2_En_11_Chapter.xhtml))
    can be configured to automatically encrypt stored files. Various built-in functions
    provide *Base64* and *Crypt* options for encoding/decoding and encrypting/decrypting
    data that is stored in fields or exchanged with other systems. *SSL Encryption*
    certificates installed protect data when in transit between client and server;
    these are encouraged by FileMaker Server and required by FileMaker Cloud. Additionally,
    two *Solution Options* available through the `Developer Utilities` dialog provide
    *Encryption at Rest* protection of an entire database file which adds a layer
    of protection beyond the standard credentialing for normal access (Chapter [30](#429700_2_En_30_Chapter.xhtml)).
    An encrypted database is structurally modified to protect it from unauthorized
    access, tampering, or analysis while stored on disk, e.g., if someone acquires
    a stolen backup or archive of the database. The password you define during the
    encryption process *must* be entered to open a file on the desktop or to host
    it with FileMaker Server. FileMaker Cloud requires this and will automatically
    encrypt files uploaded. Once hosted, only standard credentials are required for
    a user access.


    **Caution:** Be sure to keep encryption keys safely stored since there is no possibility
    of recovery.


    ##### Enabling Database Encryption (or Re-encrypt Files)


    The *Enable Database Encryption (or Re-encrypt files)* option will create a copy
    of the *Solution Files* that are structurally altered with an encryption password
    you define. This key will require a decryption password to be entered to open
    the files directly or to host them on FileMaker Server. To encrypt the selected
    file(s), select the option in the `Specify Solution Options` dialog, and configure
    the settings below, shown in Figure 31-4.


    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig4_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig4_HTML.jpg)


    **Figure 31-4** – The settings required when enabling encryption


    The `Shared ID` text field contains a case-sensitive string of up to 32 characters
    and is used to link all the database files in a multi-file solution. When one
    file is opened with the encryption password, that file can then access any other
    file that has been saved with the *same Shared ID* and *encryption password*,
    without prompting the user for the encryption password repeatedly.


    Click the `Specify` button to enter credentials for a *FileMaker Account* that
    has full access to the file(s) being encrypted. This is required to prove that
    you are an authorized full-access user of the file before modifying the structure
    of the files.


    Next, click the `Specify` button to enter an *Encryption Password*. This password
    will be used during encryption and will be required prior to opening a file or
    hosting it on a server.


    The `Keep Open Storage` checkbox can be selected to maintain externally stored
    container files in an unencrypted state if desired. Leave this unchecked to automatically
    encrypt all container field content.


    Once finished, close the `Specify Solution Options` dialog to return to the `Developer
    Utilities` dialog. Then, click `Create` to run the utility and create encrypted
    copies of the files in the specified `Project Folder`.


    Now, two dialogs will appear when opening the encrypted file(s) on the desktop.
    First an `Open Encrypted Database` prompt requires entry of the encryption password
    and then the standard login prompt for user account credentials. When opening
    an encrypted file for hosting on a server, only the first of these will appear
    and users continue to see only the prompt for account credentials.


    **Tip:** When encrypting a multi-file solution, be sure to use the same Developer
    Account and encryption password for every database.


    ##### Removing Database Encryption


    The `Remove Database Encryption` option will save a copy of the files in an unencrypted
    state, restoring normal operating behavior and access methods. Select the option
    in the `Specify Solution Options` dialog, and enter the required settings, shown
    in Figure 31-5. Type the *Encryption Password* for the file(s) to prove that you
    have access to modify the files. Then, click the `Specify` button to enter a *FileMaker
    Account* with full access. Both of these should be common to *all* the selected
    files. Close the `Specify Solution Options` dialog to return to the `Developer
    Utilities` dialog. Then, click `Create` to run the utility. The decrypted files
    will appear in the specified `Project Folder`.


    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig5_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig5_HTML.jpg)


    **Figure 31-5** – The settings required to remove file encryption


    ## Tools Marketplace


    The last item under the *Tools* menu is the *Tools Marketplace* which opens the
    *Claris Marketplace* web page. The site contains a collection of developer tools
    and products created by Claris Partners. This growing site includes pages of templates,
    tools, and plug-ins, some free and some paid, including:


    - Templates from *DB Services* that help integrate Square and Stripe into a FileMaker
    solution

    - A tool for writing and troubleshooting SQL queries from *Soliant Consulting*

    - Various paid products from *Productive Computing* that allow a database to manipulate
    or link to various external applications such as the Calendar, Address Book, and
    QuickBooks

    - Various *Database Design Report* tools mentioned earlier in this chapter

    - Various plug-ins, including some mentioned in Chapter [28](#429700_2_En_28_Chapter.xhtml)


    ## Summary


    This chapter discussed advanced features accessible through the FileMaker Pro
    application’s *Tools* menu.'
