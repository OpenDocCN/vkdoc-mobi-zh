- fmt: "# Introducing the Edit Relationship Dialog\n\nRelationships are edited in\
    \ the **Edit Relationship** dialog, shown in Figure 9-34. This can be opened by\
    \ either double-clicking the relationship connection box or by selecting the relationship\
    \ and clicking the **Edit Selection** tool.\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig34_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig34_HTML.jpg)\n\
    \n*Figure 9-34*  \nThe dialog used to edit a relationship’s settings\n\nThe controls\
    \ on the dialog include:\n\n1. **Table Occurrence** – Select an occurrence for\
    \ each side of the relationship when creating a new relationship. If editing an\
    \ existing relationship, these are non-editable and can only be edited directly\
    \ on the occurrence box in the graph.\n2. **Selected Match Field** – Select a\
    \ pair of match fields to be added or changed in the list below.\n3. **Comparative\
    \ Operator** – Select an operator to control how the match fields will be compared.\n\
    4. **Selected Match Field Buttons** – Click to *add* the selected fields as new\
    \ criteria to the list below or *change* to update the fields in the selected\
    \ combination below.\n5. **Link Field(s)** – Lists the criteria defining the relationship.\n\
    6. **Link Field Buttons** – Click to *duplicate* or *delete* the selected link\
    \ field.\n7. **Relationship Options** – Specify certain behaviors for each side\
    \ of the relationship.\n\n## Selecting a Comparative Operator\n\nA *comparative\
    \ operator* is used to specify how match field values will be compared to detect\
    \ a relational match. The available operators are shown in Table 9-1.\n\n**Table\
    \ 9-1** – A list of comparative operators available for relationships\n\n| Operator\
    \ | Description |\n| --- | --- |\n| `=` | Match when values in both fields are\
    \ equal to each other. |\n| `≠` | Match when values in both fields are not equal\
    \ to each other. |\n| `<` | Match when the value in the left field is less than\
    \ the value in the right field. |\n| `≤` | Match when the value in the left field\
    \ is less than or equal to the value in the right field. |\n| `>` | Match when\
    \ the value in the left field is greater than the value in the right field. |\n\
    | `≥` | Match when the value in the left field is greater than or equal to the\
    \ value in the right field. |\n| `X` | Match *every* record on the left side of\
    \ the relationship will be matched to all records on the right side, regardless\
    \ of the actual values contained in the selected fields. This is often referred\
    \ to as a *Cartesian Product*, *Cartesian Join*, or *Cross Join*, where a connection\
    \ between two tables is unrestricted by any criteria and every record will be\
    \ a match no matter the criteria. |\n\n## Relationship Options\n\nThe settings\
    \ at the bottom of the **Edit Relationship** dialog, shown in Figure 9-35, control\
    \ three functions for behavior on each side of the relationship.\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig35_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig35_HTML.jpg)\n\
    \n*Figure 9-35*  \nRelationship options for each occurrence\n\n### Allowing Creation\
    \ of Related Records\n\nThe **Allow creation of records** option makes it possible\
    \ for users to create records in an occurrence by typing into a related field\
    \ from the other occurrence placed on a layout. This is commonly used in portals\
    \ to allow easy creation of new records (Chapter 20, “Creating Records in a Portal\
    \ Directly”).\n\n### Automatically Delete Related Records\n\nThe **Delete related\
    \ records** option causes records in the table to be automatically deleted when\
    \ a related record on the other side is deleted by a user or script. This is especially\
    \ useful for deleting “child” records when their “parent” record is deleted. For\
    \ example, when a **Company** record is deleted, any related **Contact** records\
    \ can also be deleted if this feature is enabled on the *Company | Contact* side.\
    \ Only use this when the lack of a parent record creates problematic “ghost records,”\
    \ detached records that aren’t accessible or usable without a parent. To retain\
    \ related records and allow them to later be attached to a new parent record,\
    \ leave this option disabled.\n\n### Sorting Related Records\n\nThe **Sort records**\
    \ option enables a specific record sort at the *relationship level*. While a portal\
    \ can be configured to sort records for display (Chapter 20, “Exploring the Portal\
    \ Setup Dialog”), this feature sorts them at the relational root so they are sorted\
    \ when a calculation or script reaches through a relationship to access related\
    \ records directly. This is important when using the `List()` function (Chapter\
    \ 13) when the order is important.\n\n## Adding Notes to the Graph\n\nA *relationship\
    \ note* is a free-floating, colored box that can be added in the graph to contain\
    \ developer notes. A note is created by selecting the **Text** tool, shown in\
    \ Figure 9-36, and then clicking and dragging in the relationship graph. An **Edit\
    \ Note** dialog, shown in Figure 9-37, allows entry and editing of the note text\
    \ as well as specification of the font, size, text color, and background color\
    \ of the note. The dialog will automatically open when creating a new note or\
    \ when double-clicking on an existing one. Once saved, a note can be moved, resized,\
    \ minimized, aligned, or deleted just like a table occurrence.\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig36_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig36_HTML.jpg)\n\
    \n*Figure 9-36*  \nThe tool used to create a new note\n\n**Tip**\n\nA note can\
    \ be created without selecting the text tool by clicking and dragging on the background\
    \ while holding `Option` (macOS) or `Alt` (Windows).\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig37_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig37_HTML.jpg)\n\
    \n*Figure 9-37*  \nA note (left) and the dialog used to edit it (right)\n\n##\
    \ Implementing a Simple Relational Model\n\nNow the previously described simple\
    \ relationship model can be implemented in the **Learn FileMaker** database. Align\
    \ the four primary table occurrences into a vertical stack. First create two duplicates\
    \ of the **Contact** occurrence, and name one `Company | Contact` and the other\
    \ `Project | Contact`. Then make two duplicates of the **Company** occurrence,\
    \ and name them `Contact | Company` and `Project | Company`. Then arrange them\
    \ and form the following relationships between these, shown in Figure 9-38:\n\n\
    - **Link Company to Company | Contact** – This can be used to display a portal\
    \ of every contact who is linked to a company.\n- **Link Contact to Contact |\
    \ Company** – This can be used to display the name of the company on a contact\
    \ record and provide a navigable link from the latter to the former.\n- **Link\
    \ Project to Project | Contact** – This will link a project to a contact record\
    \ as the primary contact.\n- **Link Project to Project | Company** – This will\
    \ link a project to a company record, allow displaying the name on a project record,\
    \ and provide a navigable link between them.\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig38_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig38_HTML.jpg)\n\
    \n*Figure 9-38*  \nThe relational model for the Learn FileMaker test file\n\n\
    ## Summary\n\nThis chapter introduced data sources, table occurrences, and relationships.\
    \ In the next chapter, we will explore managing container fields and storage options."
  raw: '#### Introducing the Edit Relationship Dialog


    Relationships are edited in the *Edit Relationship* dialog, shown in Figure [9-34](#429700_2_En_9_Chapter.xhtml#Fig34).
    This can be opened by either double-clicking the relationship connection box or
    by selecting the relationship and clicking the *Edit Selection* tool.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig34_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig34_HTML.jpg)


    Figure 9-34


    The dialog used to edit a relationship’s settings


    The controls on the dialog include


    1.  *Table Occurrence* – Select an occurrence for each side of the relationship
    when creating a new relationship. If editing an existing relationship, these are
    non-editable and can only be edited directly on the occurrence box in the graph.


    2.  *Selected Match Field* – Select a pair of match fields to be added or changed
    in the list below.


    3.  *Comparative Operator* – Select an operator to control how the match fields
    will be compared.


    4.  *Selected Match Field Buttons* – Click to *add* the selected fields as new
    criteria to the list below or *change* to update the fields in the selected combination
    below.


    5.  *Link Field(s)* – Lists the criteria defining the relationship.


    6.  *Link Field Buttons* – Click to *duplicate* or *delete* the selected link
    field.


    7.  *Relationship Options* – Specify certain behaviors for each side of the relationship.


    #### Selecting a Comparative Operator


    A *comparative operator* is used to specify how match field values will be compared
    to detect a relational match. The available operators are shown in Table [9-1](#429700_2_En_9_Chapter.xhtml#Tab1).


    Table 9-1


     A list of comparative operators available for relationships


    | **Operator** | **Description** |

    | --- | --- |

    | `=` | Match when values in both fields are equal to each another. |

    | ≠ | Match when values in both fields are not equal to each other. |

    | `<` | Match when the value in the left field is less than the value in the right
    field. |

    | ≤ | Mach when the value in the left field is less than or equal to the value
    in the right field. |

    | `>` | Match when the value in the left field is greater than the value in the
    right field. |

    | ≥ | Match when the value in the left field is greater than or equal to the value
    in the right field. |

    | `X` | Match *every* record on the left side of the relationship will be matched
    to all records on the right side, regardless of the actual values contained in
    the selected fields. This is often referred to as a *Cartesian Product*, *Cartesian
    Join,* or *Cross Join*, where a connection between two tables is unrestricted
    by any criteria and every record will be a match no matter the criteria. |


    #### Relationship Options


    The settings at the bottom of the *Edit Relationship* dialog, shown in Figure
    [9-35](#429700_2_En_9_Chapter.xhtml#Fig35), control three functions for behavior
    on each side of the relationship.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig35_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig35_HTML.jpg)


    Figure 9-35


    Relationship options for each occurrence


    ##### Allowing Creation of Related Records


    The *Allow creation* *of records* option makes it possible for users to create
    records in an occurrence by typing into a related field from the other occurrence
    placed on a layout. This is commonly used in portals to allow easy creation of
    new records (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Creating Records in
    a Portal Directly”).


    ##### Automatically Delete Related Records


    The *Delete related records* option causes records in the table to be automatically
    deleted when a related record on the other side is deleted by a user or script.
    This is especially useful for deleting “child” records when their “parent” record
    is deleted. For example, when a *Company* record is deleted, any related *Contact*
    records can also be deleted if this feature is enabled on the *Company | Contact*
    side. Only use this when the lack of a parent record creates problematic “ghost
    records,” detached records that aren’t accessible or usable without a parent.
    To retain related records and allow them to later be attached to a new parent
    record, leave this option disabled.


    ##### Sorting Related Records


    The *Sort records* option enables a specific record sort at the *relationship
    level*. While a portal can be configured to sort records for display (Chapter
    [20](#429700_2_En_20_Chapter.xhtml), “Exploring the Portal Setup Dialog”), this
    feature sorts them at the relational root so they are sorted when a calculation
    or script reaches through a relationship to access related records directly. This
    is important when using the *List* function (Chapter [13](#429700_2_En_13_Chapter.xhtml))
    when the order is important.


    ## Adding Notes to the Graph


    A *relationship note* is a free-floating, colored box that can be added in the
    graph to contain developer notes. A note is created by selecting the *Text* tool,
    shown in Figure [9-36](#429700_2_En_9_Chapter.xhtml#Fig36), and then clicking
    and dragging in the relationship graph. An *Edit Note* dialog, shown in Figure
    [9-37](#429700_2_En_9_Chapter.xhtml#Fig37), allows entry and editing of the note
    text as well as specification of the font, size, text color, and background color
    of the note. The dialog will automatically open when creating a new note or when
    double-clicking on an existing one. Once saved, a note can be moved, resized,
    minimized, aligned, or deleted just like a table occurrence.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig36_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig36_HTML.jpg)


    Figure 9-36


    The tool used to create a new note


    Tip


    A note can be created without selecting the text tool by clicking and dragging
    on the background while holding Option (macOS) or Alt (Windows).


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig37_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig37_HTML.jpg)


    Figure 9-37


    A note (left) and the dialog used to edit it (right)


    ## Implementing a Simple Relational Model


    Now the previously described simple relationship model can be implemented in the
    *Learn FileMaker* database. Align the four primary table occurrences into a vertical
    stack. First create two duplicates of the *Contact* occurrence, and name one “Company
    | Contact” and the other “Project | Contact.” Then make two duplicates of the
    Company occurrence, and name them “Contact | Company” and “Project | Company.”
    Then arrange them and form the following relationships between these, shown in
    Figure [9-38](#429700_2_En_9_Chapter.xhtml#Fig38):


    *   *Link Company to Company | Contact* – This can be used to display a portal
    of every contact who is linked to a company.


    *   *Link Contact to Contact | Company* – This can be used to display the name
    of the company on a contact record and provide a navigable link from the latter
    to the former.


    *   *Link Project to Project | Contact* – This will link a project to a contact
    record as the primary contact.


    *   *Link Project to Project | Company* – This will link a project to a company
    record, allow displaying the name on a project record, and provide a navigable
    link between them.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig38_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig38_HTML.jpg)


    Figure 9-38


     The relational model for the Learn FileMaker test file


    ## Summary


    This chapter introduced data sources, table occurrences, and relationships. In
    the next chapter, we will explore managing container fields and storage options.'
  trans: "\n# 编辑关系对话框简介\n\n关系在**编辑关系**对话框中进行编辑，如图 9-34 所示。可以通过双击关系连接框或选中关系后点击**编辑选择**工具来打开此对话框。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig34_HTML.jpg](img/429700_2_En_9_Fig34_HTML.jpg)\n\
    \n*图 9-34*  \n用于编辑关系设置的对话框\n\n对话框中的控件包括：\n\n1. **表事件** – 创建新关系时，为关系的每一方选择一个事件。如果编辑现有关系，这些选项不可编辑，只能在关系图中直接对事件框进行编辑。\n\
    2. **选中的匹配字段** – 选择一对匹配字段，以添加至下方列表或进行更改。\n3. **比较运算符** – 选择用于控制匹配字段比较方式的运算符。\n\
    4. **选中的匹配字段按钮** – 点击**添加**，将所选字段作为新条件加入下方列表；或点击**更改**，更新所选组合中的字段。\n5. **链接字段**\
    \ – 列出定义关系的条件。\n6. **链接字段按钮** – 点击**复制**或**删除**所选链接字段。\n7. **关系选项** – 为关系的每一方指定特定的行为。\n\
    \n## 选择比较运算符\n\n*比较运算符*用于指定如何比较匹配字段的值以检测关系匹配。可用的运算符见表 9-1。\n\n**表 9-1** – 可用于关系的比较运算符列表\n\
    \n| 运算符 | 描述 |\n| --- | --- |\n| `=` | 当两个字段中的值相等时匹配。 |\n| `≠` | 当两个字段中的值不相等时匹配。\
    \ |\n| `<` | 当左侧字段中的值小于右侧字段中的值时匹配。 |\n| `≤` | 当左侧字段中的值小于或等于右侧字段中的值时匹配。 |\n| `>`\
    \ | 当左侧字段中的值大于右侧字段中的值时匹配。 |\n| `≥` | 当左侧字段中的值大于或等于右侧字段中的值时匹配。 |\n| `X` | 匹配关系左侧的*每条*记录将匹配右侧的所有记录，无论所选字段中的实际值如何。这通常被称为*笛卡尔积*、*笛卡尔连接*或*交叉连接*，其中两个表之间的连接不受任何条件限制，每条记录都会成为匹配项。\
    \ |\n\n## 关系选项\n\n**编辑关系**对话框底部的设置（如图 9-35 所示）控制着关系两侧行为的三个功能。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig35_HTML.jpg](img/429700_2_En_9_Fig35_HTML.jpg)\n\
    \n*图 9-35*  \n每个事件的关系选项\n\n### 允许创建相关记录\n\n**允许创建记录**选项使用户能够通过在布局中从另一事件放置的相关字段中输入内容，从而在一个事件中创建记录。此功能常用于门户，以便于轻松创建新记录（第\
    \ 20 章，“在门户中直接创建记录”）。\n\n### 自动删除相关记录\n\n**删除相关记录**选项会导致当另一侧的关联记录被用户或脚本删除时，自动删除本表中的记录。这在删除“父”记录时删除其“子”记录尤其有用。例如，当删除一个**公司**记录时，如果启用了该功能，则所有相关的**联系人**记录也会被删除。仅在缺少父记录会导致产生有问题的“幽灵记录”（即没有父记录就无法访问或使用的孤立记录）时使用此功能。如需保留相关记录并允许它们稍后关联到新的父记录，请保持此选项禁用。\n\
    \n### 对相关记录排序\n\n**排序记录**选项可在*关系层面*启用特定的记录排序。虽然门户可以配置为对记录进行排序以用于显示（第 20 章，“探索门户设置对话框”），但此功能在关系根源上对记录进行排序，这样当计算或脚本通过关系直接访问相关记录时，记录已被排序。当使用`List()`函数（第\
    \ 13 章）且顺序很重要时，这一点至关重要。\n\n## 向关系图添加注释\n\n*关系注释*是一个可自由放置的彩色框，可添加至关系图中以容纳开发者注释。通过选择**文本**工具（如图\
    \ 9-36 所示），然后在关系图中单击并拖动即可创建注释。**编辑注释**对话框（如图 9-37 所示）允许输入和编辑注释文本，以及指定注释的字体、字号、文本颜色和背景颜色。创建新注释或双击现有注释时会自动打开该对话框。保存后，注释可以像表事件一样移动、调整大小、最小化、对齐或删除。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig36_HTML.jpg](img/429700_2_En_9_Fig36_HTML.jpg)\n\
    \n*图 9-36*  \n用于创建新注释的工具\n\n**提示**\n\n无需选择文本工具，按住`Option`（macOS）或`Alt`（Windows）键，在背景上单击并拖动即可创建注释。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig37_HTML.jpg](img/429700_2_En_9_Fig37_HTML.jpg)\n\
    \n*图 9-37*  \n一个注释（左）及用于编辑它的对话框（右）\n\n## 实现一个简单的关系模型\n\n现在，可以在**Learn FileMaker**数据库中实现先前描述的简单关系模型。将四个主表事件垂直堆叠对齐。首先创建两个**联系人**事件的副本，分别命名为`公司\
    \ | 联系人`和`项目 | 联系人`。然后创建两个**公司**事件的副本，分别命名为`联系人 | 公司`和`项目 | 公司`。接着排列它们，并在它们之间建立如图\
    \ 9-38 所示的关系：\n\n- **链接公司到公司 | 联系人** – 可用于显示与某公司关联的所有联系人的门户。\n- **链接联系人到联系人 |\
    \ 公司** – 可用于在联系人记录上显示公司名称，并提供从后者到前者的可导航链接。\n- **链接项目到项目 | 联系人** – 这将把一个项目链接到联系人记录，作为主要联系人。\n\
    - **链接项目到项目 | 公司** – 这将把一个项目链接到公司记录，允许在项目记录上显示公司名称，并提供它们之间的可导航链接。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig38_HTML.jpg](img/429700_2_En_9_Fig38_HTML.jpg)\n\
    \n*图 9-38*  \nLearn FileMaker 测试文件的关系模型\n\n## 总结\n\n本章介绍了数据源、表事件和关系。在下一章中，我们将探讨管理容器字段和存储选项。\n"
- fmt: '# 10. Managing Containers


    A *container field* is a type of field that can store and display a document file.
    Formally, the content of a container is referred to as a *binary large object*
    or *basic large object*, both commonly expressed as the acronym “BLOB,” which
    is a collection of binary data representing an image, audio, or any file type
    (except folders) stored as a single data entry in a database. In FileMaker, container
    fields have a variety of options that influence how files are inserted into a
    field, where that material is actually stored (internally or externally), and
    how it is displayed when placed on a layout. This chapter provides an overview
    of the options for defining container fields, covering the following topics:


    - Inserting files into containers

    - Extracting files from containers

    - Explaining container storage options

    - Using managed external storage


    ## Inserting Files into Containers


    When a container field is visible and accessible to a user on a layout, a document
    file can be inserted using a function from the *Insert* menu, by *dragging and
    dropping* or *copying and pasting*. Depending on the field definitions and layout
    settings for a container field, each method has different options and limitations
    that may impact how the document is inserted and the size of the database file.


    **Tip:** To follow along with these examples, open the `Sandbox Form` layout of
    the `Learn FileMaker` database.


    ### Using the Insert Menu


    The *Insert menu* contains four options for inserting a file into a container
    field with focus, shown in Figure 10-1. These options are also available in the
    field’s contextual menu and as script steps. Choosing any options will open a
    *Choose File* dialog, automatically optimized for the type of file corresponding
    to the menu item.


    ![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig1_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig1_HTML.jpg)


    **Figure 10-1** The options for inserting a file into a container field


    - *Picture* – Insert and display a picture’s content.

    - *Audio/Video* – Insert an audio or video file. This is only enabled when the
    field’s layout settings allow *Interactive content*, which allows the file to
    be played directly from within the field without having to open the file in another
    application.

    - *PDF* – Inserts a PDF file. This is only enabled when the field’s layout settings
    allow *Interactive content*, which allows the file’s pages to be viewed directly
    from within the field without having to open it in another application.

    - *File* – Inserts any type of file into a field. The file will appear as it does
    in a directory folder, represented by an icon with no option to view or interact
    with its content.


    **Note:** For more on layout settings, see Chapter 19, “Data Formatting Options
    for Containers.”


    ### Dragging and Dropping


    Using *drag and drop* to insert a file from a directory into a container field
    on the current layout is the most intuitive method available. When dropping a
    file, FileMaker will automatically use the appropriate storage method based on
    dropped file’s type and the configuration of the field. For example, if you drop
    an image, it will be inserted and displayed as if you selected the *Insert Picture*
    menu. If you drop a PDF or audio file into a field that has not been configured
    for *Interactive content*, the file will be placed into the field and displayed
    as a preview of the first page of the PDF or as a file icon. However, if the field
    is configured for interactivity, the file will be inserted as if you chose the
    menu corresponding to the file type and will be fully interactive. When dropping,
    there is no way for a user to manually specify external storage (discussed later
    in this chapter). Instead, the field’s defined method of storage will be automatically
    applied.


    ### Copying and Pasting


    Using *copy and paste* to insert a file into a container is another convenient
    option. The clipboard can contain an *actual file* copied from a folder, the *content
    of an image* copied from a picture file opened in photo editing software, or a
    properly formatted *text reference* to a file. The result of pasting is identical
    to that of dragging and dropping, and there is no way to manually specify external
    storage (unless pasting a text reference).


    ## Extracting Files from Containers


    When a container field on a layout is editable, a user can save a copy of the
    contents from the record into a folder directory of their choosing using the `Export
    Field Contents` function. This is available under the *Edit* menu, in the field’s
    contextual menu, and as a script step. When selected, a dialog of the same name
    will open, allowing the user to choose a folder in which to export the document.
    The file name will default to the name of the document in the container but can
    be renamed in this dialog. The dialog includes the option to automatically open
    the file and to create an email with the extracted file as an attachment.


    **Tip:** This feature can also be used to save selected text from a field into
    a text file.


    ## Explaining Container Storage Options


    A container field can be configured to store files in one of two ways: storing
    the *actual file* inside of the database file or storing a *reference* to a file
    located *outside* the database file.


    ### Storing Files Internally


    When a new container field is defined, it defaults to store content internally.
    This means that the entire content of a file is replicated *inside the database
    file*. This has some advantages and disadvantages.


    A huge advantage is that internal storage maintains portability of the database
    since all elements are stored in a single document file. This may be important
    when accessing the database locally in a manner similar to a word processing or
    spreadsheet document. Although portability isn’t an issue for shared databases
    hosted on a server (Chapter 29), internal storage ensures that the files stored
    in container fields are universally accessible regardless of any given user’s
    lack of ability to access external files on an unmounted file server or an inaccessible
    coworker’s computer. Since the file is literally copied into the database structure,
    if a user can access that, they can access the container content.


    The downside to internal storage is that each file inserted into a field increases
    the size of the database file. This is not inherently a problem since a FileMaker
    database *can* be up to 8 terabytes in size. However, as the size of the file
    grows, performance can become degraded, especially when many users share access
    to a database over a network.


    Generally, if the number or size of files stored in container fields is excessive,
    it’s a good policy to insert file references into the fields and store the actual
    file externally. The user won’t notice a difference in how they interface with
    the content if it is done correctly.'
