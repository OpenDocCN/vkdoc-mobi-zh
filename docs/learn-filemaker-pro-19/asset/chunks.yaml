    *   `The` function will return *date*, *time*`,` and *number* data using the Unicode/SQL
    format rather than the date and time settings of the database file or operating
    system. So, these must be converted for use as dates in FileMaker.


    *   Sorting performed by the function uses the Unicode binary sort order.


    ## Creating SQL Queries


    At a minimum, the *sqlQuery* portion of the *ExecuteSQL* function requires a `SELECT`
    statement, which can include numerous optional clauses, and these can be used
    to perform numerous different data retrieval tasks.'
  trans: '

    # 16.  ExecuteSQL 函数介绍


    *结构化查询语言* (*SQL*) 是一种标准化的编程语言，用于管理关系型数据库，并对其存储的数据执行多种操作功能。它创建于 20 世纪 70 年代，后来成为关系型数据库的标准编程语言。*美国国家标准协会*
    (ANSI) 和*国际标准化组织* (ISO) 分别于 1986 年和 1987 年采纳了官方的 SQL 标准。自那以后，这两个组织联合发布了该标准的多次更新。如今，许多公司都在开发专有和开源的、符合
    SQL 标准的数据库系统。虽然 FileMaker 并非基于该标准构建，但它对在内部和外部执行 SQL 查询提供了一定支持。在 9.0 版本（2007 年）中，FileMaker
    引入了创建与外部 ODBC 数据源进行实时连接的功能（第 7 章）。12.0 版本（2012 年）引入了 *ExecuteSQL* 函数，该函数可以在 FileMaker
    数据库内通过任意计算来对 FileMaker 表执行查询。*SQL 查询* 是一种基于文本的语句，用于指示数据库执行某项操作。最常用的查询类型，也是 FileMaker
    中 *ExecuteSQL* 函数唯一支持的查询类型，是 `SELECT` 查询，它包含为所需结果集检索数据的指令。经验丰富的 SQL 程序员会欣赏此功能提供的直接后端访问，但可能会觉得其限制过于严格。其他人可能会觉得这种与
    FileMaker 以界面上下文为中心的数据访问方式的差异令人困惑。但是，能够完全*独立于上下文*的方式，*在计算公式内部*直接执行搜索、排序和汇总数据，这项功能是许多人会欣赏的。由于它不会取代
    FileMaker 的原生功能，因此并非学习 SQL 或使用此命令来创建数据库的必要条件。但是，在那些它能更有效补充原生功能的场景下，学习它是值得的。本章将探讨
    *ExecuteSQL* 函数，涵盖以下主题：


    *   定义 ExecuteSQL 函数

    *   创建 SQL 查询

    *   访问数据库模式


    ## 定义 ExecuteSQL 函数


    *ExecuteSQL* 函数允许一个公式**完全独立于**当前界面上下文与关系图中任何表出现项之间的关系，直接从该关系图中的*任意*表出现项中检索数据。调用该函数必须包含三个参数：*sqlQuery*、*fieldSeparator*
    和 *rowSeparator*。它还可以接受一个或多个可选的*参数*。


    ```

    ExecuteSQL ( sqlQuery ; fieldSeparator; rowSeparator )

    ExecuteSQL ( sqlQuery ; fieldSeparator; rowSeparator ; arguments )

    ```


    语句中的参数定义如下：


    *   *sqlQuery* – 文本表达式或对字段的引用，其中包含一个 `SELECT` 语句，用于指定获取所需记录和字段结果的位置及条件。

    *   *fieldSeparator* – 包含一个或多个字符的文本字符串，这些字符用作结果中字段之间的分隔符。如果留空，默认使用逗号。

    *   *rowSeparator* – 包含一个或多个字符的文本字符串，这些字符用作结果中记录之间的分隔符。如果留空，默认使用段落回车符。

    *   *arguments* – 一个或多个文本值，用作查询中的动态参数，通常替换 `WHERE` 子句中的问号。


    函数的结果将是一个文本字符串，其中每个匹配记录的每个指定字段的值都由指定的或默认的分隔符分隔。例如，使用默认分隔符时，结果将是代表记录的段落，这些段落由逗号分隔的字段值组成。


    ### 注意事项


    这是一个*计算函数*，不应与同名的脚本步骤混淆！


    ### 理解 ExecuteSQL 的局限


    *ExecuteSQL* 函数有一些需要注意的重要限制。经验丰富的 SQL 程序员可能会期望某些功能不被支持，而经验丰富的 FileMaker 开发者可能会错误地假设某些功能。


    *   如引言所述，该函数目前仅限于 `SELECT` 命令。它*不支持*任何其他常见的 SQL 函数，例如执行记录更改或修改模式的 `DELETE`、`INSERT`、`UPDATE`、`INSERT
    INTO`、`CREATE TABLE`、`DELETE TABLE` 等。

    *   函数不识别也不要求使用 FileMaker 的关系连接。`SELECT` 语句必须使用 `JOIN` 子句来动态创建用于查询内的临时关系。

    *   该函数不识别当前布局上下文。相反，它会根据指定的*表出现项*直接访问一个*表*。

    *   *必须*使用符合 SQL-92 标准的日期和时间格式（不带花括号）将值传递给函数。要在查询中应用正确的格式，请使用 `DATE`、`TIME` 或
    `TIMESTAMP` 条件运算符，否则该值可能会被当作字面字符串处理。它*不会*接受花括号中包含的 ODBC/JDBC 格式的 *date*、*time*
    和 *timestamp* 常量。

    *   该函数将使用 Unicode/SQL 格式返回 *date*、*time* 和 *number* 数据，而不是使用数据库文件或操作系统的日期和时间设置。因此，这些数据必须进行转换才能在
    FileMaker 中用作日期。

    *   函数执行的排序使用 Unicode 二进制排序顺序。


    ## 创建 SQL 查询


    `ExecuteSQL` 函数的 `sqlQuery` 部分至少需要一个 `SELECT` 语句，该语句可以包含多个可选的子句，并且这些子句可用于执行多种不同的数据检索任务。

