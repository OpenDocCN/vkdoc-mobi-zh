  trans: '

    # 导入记录


    `import records` 函数会在当前布局的表中创建或更新记录。记录可以从多种来源导入：同一文件内的表、外部数据库或各种基于文本的数据文件。若要探索此功能，请将一些联系人数据导入到
    `Learn FileMaker Chapter` 3–5 数据库中。首先，从 [`www.briandunning.com/sample-data/`](http://www.briandunning.com/sample-data/)
    免费下载 `us-500.csv` 联系人示例文件。然后，选择 `文件 ➤ 导入记录 ➤ 文件` 菜单，打开 `选择文件` 对话框，如图 5-2 所示。


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig2_HTML.jpg](img/429700_2_En_5_Fig2_HTML.jpg)


    图 5-2


    用于选择要导入的文件的对话框


    该对话框允许从任何文件夹目录中选择文件。还可以通过单击底部`选项`区域中的`主机`按钮（第 29 章）来访问托管在 `FileMaker Server` 上的数据库。此区域还包含一个`显示`弹出菜单，其中列出与导入兼容的文件类型，可在文件较多的文件夹中高亮显示特定文件。勾选“创建重复导入”复选框，可以跳过手动执行的导入步骤，并自动创建一个新表、布局和脚本，以便将来重复使用，从而提供快捷方式。现在，请选择并打开下载的
    CSV 文件。


    ## 执行导入


    选择并打开数据文件后，将出现一个`指定导入顺序`对话框，如图 5-3 所示。该对话框包含用于浏览源数据、指定导入类型、选择目标表以及设置导入选项（根据所执行的导入类型而有所不同）的区域。默认设置为`添加导入`，即所有导入的记录都将作为新记录添加到目标表中。


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig3_HTML.jpg](img/429700_2_En_5_Fig3_HTML.jpg)


    图 5-3


    导入字段映射对话框


    **注意：** 此对话框设计是在 `FileMaker 18` 中引入的，与早期版本完全不同。


    ### 浏览源数据


    `导入` `源数据` 显示在最左侧列的列表中，可以使用其上方的箭头按钮进行导航。一个弹出菜单（适用于基于文本的数据文件导入）会显示一个值，指示或控制下方显示的行/记录在导入时的处理方式。`数据`选项是所有条目的默认设置，表示该数据将作为普通记录导入。选择`用作字段名称`选项会将当前条目的值指定为字段/列名称的来源。这可以分配给任何单个记录，并为导入在源数据中建立起点。任何位于该记录之前的记录将自动被分配一个`排除`值，表示该记录不会被导入。这允许将包含文档信息和列标题的多个“标题行”从实际要导入的数据中排除。源数据中任何位置的个别行也可以手动排除。向右移动，`源字段`列表会显示源数据中的字段名称（如果可用）。从基于文本的数据文件导入时，除非某个记录被指定为字段名称的来源，否则这些字段将显示为`来自源文件`。从
    `FileMaker` 数据库导入时，将显示实际的字段名称，并且对对话框源数据侧的唯一控制是能够导航和查看源数据记录。


    ### 选择目标表


    `目标表`是传入数据的目标表，默认设置为当前布局的表。`目标`弹出菜单（如图 5-4 所示）提供了一个选项，用于在导入过程中创建新表。该菜单是标准的 `FileMaker`
    `表选择菜单`，列出`当前表`、`相关表`、`不相关表`和一个`管理数据库`选项，以及一个仅导入时才有的`新建表`选项。由于导入必须在当前布局的上下文中进行，这些选项在导入时大多被禁用。除了将当前表作为目标外，唯一的选择是创建一个新表。


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig4_HTML.jpg](img/429700_2_En_5_Fig4_HTML.jpg)


    图 5-4


    导入目标表弹出菜单


    选择`新建表`选项将配置对话框，使其在导入期间自动创建新表并将数据流入其中。除非某行已指定为`用作字段名称`，否则`目标字段`列表将显示按数字顺序排列且带有“f”前缀的新名称。


    `管理数据库`选项已启用，它会打开一个同名对话框（第 7-9 章），以便在目标表中创建新字段，从而无需退出导入对话框即可将这些字段包含在导入中。


    ### 将字段从源端映射到目标端


    目标表和导入源文件的字段数量可能或多或少，并且顺序也可能不同。因此，有必要指明应导入哪些源字段，并将其与适当的目标字段进行匹配。这种`字段映射`过程是`指定导入顺序`对话框的主要用途。


    中间列表中每个可选的行都显示`源字段`、`映射`和`目标字段`这几列，并且后两列各自打开一个选项菜单。`映射`列显示了相应两个字段的导入状态：`导入`或`不导入`。单击可显示选项菜单，如图
    5-5 所示。


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig5_HTML.jpg](img/429700_2_En_5_Fig5_HTML.jpg)


    图 5-5


    选择是导入还是不导入所选字段。


    `目标字段`列的每一行都会打开一个菜单，允许选择对应的源字段应流入哪个字段，如图 5-6 所示。当前行的字段将在列表中高亮显示。图标指示着每个字段当前的导入状态：箭头表示它们已配置为接收来自源端的输入，空心椭圆表示未配置。不接受数据输入的字段（如计算字段或汇总字段）将分组显示在底部的`不用于导入`文件夹下。单击以选择与源字段对应的合适目标字段。当所有输入字段都映射到目标字段后，就该配置导入选项了。


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig6_HTML.jpg](img/429700_2_En_5_Fig6_HTML.jpg)


    图 5-6


    用于排列目标字段列表的可用选项

