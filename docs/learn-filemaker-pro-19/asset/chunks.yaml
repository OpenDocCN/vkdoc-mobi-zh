    ### 访问邮政编码信息


    `从 URL 插入` 脚本步骤可用于访问 API，例如 Datasheer, L.L.C. 提供的邮政编码查询服务 (`https://www.zip-codes.com/zip-code-api.asp`)。该网站允许通过
    URL 请求一个包含任意美国邮政编码信息的 JSON 对象。您可以在该网站注册一个免费账户（每月限制 250 次查询），或购买各种付费套餐，最高可达每月 200
    万次查询。下面的示例使用了一个受限的演示 API 密钥，可以在用户在字段中输入邮政编码后，从 `联系人` 布局运行。脚本首先将网站的 API 地址和当前记录的
    `联系人地址邮政编码` 字段值放入一个 `$URL` 变量中。接着，`从 URL 插入` 脚本步骤以 `$Data` 变量为目标，并使用 `$URL` 变量作为其
    URL。两个 `设置字段` 脚本步骤将从 `$Data` 结果中解析出的城市和州的值放入相应的字段。


    ```

    设置变量 [ $URL ; 值: "https://api.zip-codes.com/ZipCodesAPI.svc/1.0/QuickGetZipCodeDetails/"
    &

    联系人::联系人地址邮政编码 & "?key=DEMOAPIKEY" ]

    从 URL 插入 [ 对话框: 关闭 ; 目标: $Data ; $URL ]

    设置字段 [ 联系人::联系人地址城市 ; JSONGetElement ( $Data ; "City" ) ]

    设置字段 [ 联系人::联系人地址州 ; JSONGetElement ( $Data ; "State" ) ]

    ```


    **提示**


    为了获得最流畅的体验，请在用户输入 `联系人地址邮政编码` 字段后，使用 `OnObjectValidate` 脚本触发器（第 27 章）运行此脚本。


    ### 使用 cURL 选项


    `客户端 URL (cURL)` 是一个开源的命令行工具，用于使用 URL 语法在不同系统之间传输数据。该技术极大地扩展了网站请求的功能，它使用随 URL
    一起发送但与之分离的结构化数据。这提供了一种更安全的数据传输方法，并具有更大的结构灵活性。FileMaker 的 `从 URL 插入` 脚本步骤包含一个 `指定
    cURL 选项` 按钮，用于当向需要 cURL 格式而非直接将其嵌入 URL 的网站发送请求时。输入 URL 后，单击 `指定` 按钮，并根据目标网站的要求输入选项。例如，如果某个网站需要身份验证，选项的格式可能如下例所示。此示例将一个
    URL 放入一个变量，将 cURL 选项放入另一个变量，然后在 `从 URL 插入` 脚本步骤中使用它们，该步骤以 `$Data` 变量作为结果的目标。


    ```

    设置变量 [ $URL ; 值: "https://www.example.com/" ]

    设置变量 [ $Options ; 值: "--user name:password" ]

    从 URL 插入 [ 对话框: 关闭 ; 目标: $Data ; $URL ; cURL 选项: $Options ]

    ```


    cURL 可用于将数据推送到 Web 表单，如下例所示。将名字和姓氏与字段标签一起构建，作为 `data` 选项的内容包含，然后发送到网站的“联系我们”表单。


    ```

    设置变量 [ $URL ; 值: "https://www.example.com/contact.cgi" ]

    设置变量 [ $Options ; 值: "--data \"firstname=Mark&lastname=Munro\"" ]

    从 URL 插入 [ 对话框: 关闭 ; 目标: $Data ; $URL ; cURL 选项: $Options ]

    ```


    ## 总结


    本章提供了许多脚本任务示例，可用于自动化数据库内的活动。在下一章中，我们将了解作为 FileMaker 高级工具一部分的内置脚本调试功能。


    # 26. 调试脚本


    当一个简单脚本遇到错误时，排查相对容易。随着数据库变得越来越复杂，故障排查迅速变得更具挑战性。由用户、事件触发器、其他脚本以及外部系统发起的脚本调用形成了复杂交织的层级执行堆栈。脚本可以更改找到的记录集、切换布局和打开新窗口，从而创建了一个由相互关联的界面上下文组成的复杂网络。当出现问题时，通常很难甚至不知道是哪个脚本导致了错误，更不用说知道问题发生的位置、原因以及在何种上下文条件下发生的了。为了减轻这种负担，像
    FileMaker 这样的现代开发环境包含了一个调试器。在本章中，我们将介绍脚本调试，并涵盖以下主题：


    -   调试简介

    -   探索调试界面

    -   使用自定义断点


    ### 调试简介


    `脚本调试器` 是一个交互式工具，开发人员可以使用它来可视地逐步执行脚本化过程，并对性能进行故障排查或分析。FileMaker 的调试器使得逐步执行脚本、监控变量、设置断点以及发现错误变得容易，同时还能实时直接观察在数据库界面中执行的相应操作。它包含一个临时禁用所有脚本触发器的选项，以避免出现故障的启动脚本或其他情况。可以通过从
    `工具` 菜单或 `脚本工作空间`（第 24 章）的标题中选择 `脚本调试器` 来激活调试器。此外，可以启用 `出错时暂停` 选项，以便当用户处于浏览模式时，如果脚本产生错误，自动打开调试器并暂停操作。


    在调试器中运行脚本时，FileMaker 会在堆栈中每个脚本的开头以及遇到错误的任何步骤暂停。您可以在任何步骤定义任意的 `断点`，以强制脚本暂停以便进一步调查。暂停后，可以选择
    `继续` 执行脚本到下一个断点，`停止` 以中止脚本，或者使用以下四个选项之一 `单步执行`：


    -   `单步跳过` – 继续执行当前脚本，*不*调试地执行任何子脚本

    -   `单步进入` – 逐步执行脚本，*同时*调试地执行任何子脚本

    -   `单步跳出` – 执行当前子脚本中的剩余步骤，然后将控制权返回给堆栈中的父脚本，并在调用子脚本的那一行之后暂停

    -   `设置下一步` – 跳到当前脚本中的选定步骤，*不执行中间步骤*


    ### 探索调试界面


    调试界面包括 `工具` 菜单下的调试选项、一个 `脚本调试器` 窗口和一个 `数据查看器` 窗口。


    #### 工具菜单下的调试选项


    `工具` 菜单（如图 26-1 所示）顶部包含三个用于调试的项目。`脚本调试器` 菜单项用于切换调试窗口的可见性。`调试控制` 子菜单包含各种调试功能，用于控制脚本在活动状态下的移动。其中大部分功能也可以在调试窗口的工具栏中找到。最后，`数据查看器`
    菜单项用于切换一个窗口的可见性，该窗口用于浏览变量并根据当前上下文动态监控公式结果。


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig1_HTML.jpg](img/429700_2_En_26_Fig1_HTML.jpg)


    图 26-1 显示 `调试控制` 子菜单的 `脚本调试器` 菜单

    '
- fmt: '# Exploring the Script Debugger Window


    The `Script Debugger` window, shown in Figure [26-2](#429700_2_En_26_Chapter.xhtml#Fig2),
    is always open when debugging is active. The non-editable toolbar contains buttons
    for controlling the debugging process. The steps of the active script are listed
    in the middle with a green arrow label on the number of the paused step. Any steps
    with a breakpoint are similarly highlighted with a blue arrow. The `Pause on error`
    checkbox below opens the debugger and pauses on any steps that generate an error
    during regular use, including those automatically suppressed with the `Set Error
    Capture` script step. At the bottom is the `call stack`, a hierarchy of nested
    script calls that are listed up in execution order, from the current script back
    to the first script that started the currently active workflow.


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig2_HTML.jpg](images/429700_2_En_26_Chapter/429700_2_En_26_Fig2_HTML.jpg)


    Figure 26-2


    The window used to debug scripts


    In the example shown in Figure [26-2](#429700_2_En_26_Chapter.xhtml#Fig2), a script
    named `Report Start` was run, and it called the active script named `Prepare Report
    Records` which is displayed. Sensing a new script starting, the debugger automatically
    paused on the first step, freezing the interface in its current state. The fourth
    step has a breakpoint which adds an additional forced pause. The developer now
    has time to observe the state of the interface, review the current script steps,
    and decide the next option: continue running normally, stepping through the script
    line by line, or completely halting the entire script stack to make any required
    development changes.


    ## Status Toolbar Items (Debugger Window)


    The non-customizable status toolbar for the `Script Debugger` window, shown in
    Figure [26-3](#429700_2_En_26_Chapter.xhtml#Fig3), provides control over the debugging
    process.


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig3_HTML.jpg](images/429700_2_En_26_Chapter/429700_2_En_26_Fig3_HTML.jpg)


    Figure 26-3


    The toolbar of the Script Debugger window


    1.  `Edit Script` – Open the paused script in the `Script Workspace`.


    2.  `Continue` – Continue running the paused script using default stepping/pausing
    options.


    3.  `Halt Script` – Stop all scripts in the entire stack.


    4.  `Step Over` – Continue the current script *without* debugging subscripts.


    5.  `Step Into` – Continue the current script step by step *with* debugging subscripts.


    6.  `Step Out` – Continue the current subscript without debugging until control
    is returned to the parent script, and then pause.


    7.  `Set Next Step` – Jump ahead to the script step that is selected in the window,
    skipping over the interim steps.


    8.  `Disable Script Triggers` – Toggle the enabled status of script triggers globally
    in the database file.


    9.  `Open Data Viewer` – Open the `Data Viewer` dialog.


    # Exploring the Data Viewer


    The `Data Viewer` is a dialog that displays a list of variables and their current
    value, as shown in Figure [26-4](#429700_2_En_26_Chapter.xhtml#Fig4). This can
    be opened at any time to view global variables or to test a formula. When used
    in conjunction with the debugging feature or any time a script is paused, it displays
    the value of all variables at the moment the pause occurred. The dialog has two
    tabs: `Current` and `Watch`.


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig4_HTML.jpg](images/429700_2_En_26_Chapter/429700_2_En_26_Fig4_HTML.jpg)


    Figure 26-4


    The dialog used to monitor the value of variables


    The `Current` tab lists every variable currently defined. Global variables are
    always present, while local variables are only present when a script is running
    or paused. Double-click to open a variable into a dialog for an expanded view
    of its content. Observing variables at key moments during a script''s execution
    has many uses. For example, when an `Export` or `Save as` script step fails and
    you suspect it might be a faulty path construction, add a breakpoint just prior
    to that step, and then confirm that the value in the variable contains a valid
    path when the debugger pauses.


    The `Watch` tab is used to monitor values in a manually compiled list of variables,
    fields, or expressions. This can be used during debugging or to test new formulas
    before integrating them into a field, layout object, or custom function. An expression
    on this tab can optionally continuously evaluate a result based on the current
    window''s context so it provides the ability to confirm a formula with real-time
    values.


    ## Setting Custom Breakpoints


    A `custom breakpoint` is a developer marked point in a script that pauses the
    debugger and is used to troubleshoot script problems. Breakpoints allow you to
    stop a script at any arbitrary position and provides an opportunity to see the
    current layout context and review current values in key variables at a frozen
    moment in time. Breakpoints allow you to quickly run a script up to a specific
    line without having to manually step through it. To add a breakpoint, open a script
    and click a step number. A breakpoint is indicated when the number is illuminated
    in a blue arrow, as shown in Figure [26-5](#429700_2_En_26_Chapter.xhtml#Fig5).
    Breakpoints can be removed individually by clicking on the arrow icon or selecting
    the `Remove Breakpoints` option from the `Tools ➤ Debugger Controls` submenu to
    remove all breakpoints from the current script paused in the debugger.


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig5_HTML.jpg](images/429700_2_En_26_Chapter/429700_2_En_26_Fig5_HTML.jpg)


    Figure 26-5


    A script with two breakpoints


    ## Summary


    This chapter introduced the debugging capabilities of FileMaker. These provide
    an invaluable tool for troubleshooting databases with complex scripting. In the
    next chapter, we will learn how to trigger scripts in response to interface events.


    # 27. Using Script Triggers


    A script connected to a button or menu requires a user to perform a manual action
    to initiate the process. While this is fine for tasks that are optional or require
    a conscious choice, critical business functions can be forgotten. In some cases,
    it may be inefficient and non-intuitive to require a user to perform extra clicks
    to initiate mandatory actions in the interface. FileMaker allows you to design
    dynamically responsive interfaces that connect user events to custom scripts.
    A `script trigger` is a developer-defined connection between an interface event
    and a script process. Whenever the event occurs, the script runs automatically.
    FileMaker has over two dozen triggers for a variety of file, layout, and object
    events. Some events run the assigned script prior to the completion of the user
    action, allowing the script to execute custom steps and determine if the event
    should be performed to completion. Others run after the event, allowing the script
    to perform follow-up tasks. This chapter introduces script triggers, covering
    the following topics:


    * Defining available triggers

    * Understanding event precedence

    * Accessing targets before event completion

    * Avoiding trigger exceptions


    > **Tip:** Objects assigned a script trigger will optionally display a badge icon
    in Layout mode (Chapter [17](#429700_2_En_17_Chapter.xhtml), "View Menu").


    ### Defining Available Triggers


    There are three categories of script triggers: `file`, `layout`, and `object`.'
