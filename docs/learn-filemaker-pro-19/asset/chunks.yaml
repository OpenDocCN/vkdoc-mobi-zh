    ###### 带弹出菜单的内联编辑


    带有*内联弹出菜单*的步骤允许在多个可选选项中进行选择。这些选项可通过方括号内的值以及光标悬停时勾勒出当前值的蓝色边框来识别。点击该值会显示一个包含其他选项的弹出菜单。每种状态如图
    24-13 所示。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig13_HTML.jpg](img/429700_2_En_24_Fig13_HTML.jpg)


    图 24-13


    弹出菜单的三种状态：静止（上）、悬停（中）和活动聚焦（下）


    ##### 使用选项对话框配置步骤


    当可用的配置选项过多或某种方式上不利于内联编辑时，步骤会使用*对话框或面板*。虽然许多对话框是步骤特有的，但有些会打开标准对话框，例如*指定字段*和*指定计算*。有些对话框只提供几个简单的选项，而另一些则在按钮旁边汇总设置，这些按钮可打开其他对话框。有些会打开独立的对话框窗口，其他则打开一个与步骤保持连接的弹出面板。打开选项界面的方法也因步骤而异。具有配置对话框的步骤，当光标悬停在语句上时，其右侧会显示一个齿轮图标。点击此图标将打开选项界面，例如图
    24-14 中所示的*设置变量*对话框。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig14_HTML.jpg](img/429700_2_En_24_Fig14_HTML.jpg)


    图 24-14


    光标未悬停时的步骤（左上）、光标悬停时的步骤（左下）以及点击后打开的选项对话框（右）


    在上例中，*设置变量*步骤将使用指定值初始化一个变量。*名称*可以直接输入到第一个字段中，该字段用于建立要更改其值的变量。要放入变量的*值*可以直接输入到字段中，或者通过点击旁边的*指定*按钮打开的完整*指定计算公式*对话框输入。*重复*选项也是如此。有关此步骤的更多详细信息，请参阅第
    25 章“设置变量”。


    有些步骤不打开完整的对话框，而是打开一个选项面板，如图 24-15 所示。与对话框一样，面板可能包含可直接编辑的设置和打开其他对话框的按钮。在本例中，*进入查找模式*步骤打开一个简单的面板，其中包含一个按钮，用于打开标准的*查找请求*对话框（第
    4 章，“编辑查找请求”）。与通常具有“确定”和“取消”按钮的对话框不同，在此类面板中所做的更改会立即保存。可以通过点击面板边界外的脚本工作区或按下 Return
    或 Enter 键来关闭弹出面板。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig15_HTML.jpg](img/429700_2_En_24_Fig15_HTML.jpg)


    图 24-15


    弹出面板简化了某些步骤的选项选择过程


    > **提示**

    >

    > 许多步骤具有多个活动区域，它们结合了不同的配置风格。


    ##### 指定目标


    许多脚本步骤要求您使用对话框指定目标。有些步骤需要变量，并会显示之前描述过的*设置变量选项*对话框的某个版本。少数步骤需要使用*指定字段*对话框（第 20
    章，“探索指定字段对话框”）选择字段。许多步骤会显示*指定路径*对话框（本章后面描述）。除此之外，许多步骤还使用*指定目标*对话框，如图 24-16 所示，允许指定字段或变量。在最近的版本中，该对话框已取代许多脚本步骤中的*指定字段*选项。例如，大多数可用的*插入*步骤都已转换为使用此对话框，并且许多较新的*数据文件*步骤也使用它。此对话框允许选择字段或输入变量名，而打开它的脚本步骤还提供对*指定计算*对话框的访问，该对话框用于确定要插入到该目标的值。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig16_HTML.jpg](img/429700_2_En_24_Fig16_HTML.jpg)


    图 24-16


    指定目标字段（左）和变量（右）


    #### 脚本注释


    *脚本注释*是作为非功能性步骤放入脚本中的文本注释。注释显示为前面带有井号或哈希符号的文本行。它们用于提供内联文档，描述脚本或一组步骤的功能。当与空注释结合使用时，它们有助于分隔脚本的不同部分并避免视觉混乱，如图
    24-17 所示。当向脚本添加不包含任何内容的注释时，它会变成空行。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig17_HTML.jpg](img/429700_2_En_24_Fig17_HTML.jpg)


    图 24-17


    一个包含多个注释的脚本，用于记录和分隔步骤


    > **提示**

    >

    > 可以通过在按住 Option 键 (macOS) 或 Alt 键 (Windows) 的同时按 Return 键来创建多行注释。


    ## 指定文件路径


    在开发界面中，有许多实例需要指定文件路径。这在管理数据源（第 9 章）和脚本步骤（如*导入记录*、*导出记录*、*将记录另存为 Excel*、*将记录另存为
    PDF*、*新建文件*、*打开文件*、*从数据文件读取*等）中都可以找到（第 25 章）。路径输入到*指定文件*对话框中，如图 24-18 所示。此对话框的*文件路径列表*文本区域可以包含一个或多个以回车分隔的路径。如果输入了多个路径，FileMaker
    将按输入顺序检查每个路径，直到找到指向现有文件的有效路径为止。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig18_HTML.jpg](img/429700_2_En_24_Fig18_HTML.jpg)


    图 24-18


    用于指定文件路径的对话框


    ### 格式化路径


    正如对话框上显示的示例所示，可以使用多种格式输入路径，以指向本地目录、服务器文件夹目录或 FileMaker Server 网络地址中的文件。正确格式化路径可能比较棘手，尤其是在处理相对于数据库位置的本地目录中的文件时。有多种前缀可以与不同的路径格式类型混合搭配使用。如果路径输入错误，或者在定义路径后目标文件被移动，则当
    FileMaker 尝试访问该文件时，将会出现文件缺失错误。为避免输错复杂路径，请使用*添加文件*按钮及其后的*打开文件*对话框来选择文件，并允许 FileMaker
    自动制定最佳路径选项。如有必要，您可以随时进行编辑。


    #### 路径前缀


    *路径前缀*指示特定的文件类型和/或操作系统：


    - `file`、`image`、`or` `movie` – 通用、跨平台的文件路径。

    - `filemac`、`imagemac`、`moviemac` – 指向 macOS 计算机上项目的路径。

    - `filewin`、`imagewin`、`moviewin` – 指向 Windows 计算机上项目的路径。

    - `filenet` – 指向 FileMaker Server 上托管的数据库的路径，与主机的平台无关。如果源数据库和目标数据库都位于同一台服务器上，则使用
    `file` 前缀即可，无需考虑服务器上的文件夹结构。


    #### 路径类型


    FileMaker 路径可以创建为*相对路径*、*完整路径*、*网络路径* (Windows) 和*网络地址路径* (FileMaker Server)。

    '
- fmt: '### 相对路径


    *相对路径*从当前数据库位置所在的上下文指定目标文件。此格式假设源数据库和目标数据库均未托管，且其部分目录位置相同。换句话说，它们都是在同一硬盘的同一文件夹中本地运行。尽管有时会令人困惑，但这些路径的优点是允许文件随父文件夹结构一起移动，只要两者之间的相对位置保持不变即可。相对路径的公式如下：


    ```

    file:[pathDifferential]fileName

    ```


    前缀和`fileName`是必需的，当包含它们的两个文件夹之间存在差异时，则需要包含`pathDifferential`。以下示例假设有两个文件：一个名为“Test
    Source”的当前数据库指向一个名为“Test Target”的数据库。如果这两个文件位于同一个目录文件夹中，则无需包含关于它们位置差异的任何信息，因此路径将只是前缀和目标文件的名字。


    ```

    file:Test Target

    ```


    如果源文件被移动到 macOS 的*桌面*，而目标文件被移动到用户的*文稿*文件夹，那么这两个文件将只有部分路径是共同的：


    ```

    Macintosh HD/Users/john_doe/Desktop/Test Source

    Macintosh HD/Users/john_doe/Documents/Test Target

    ```


    在这种情况下，为了让源文件指向目标文件，它需要一个由两个句点和一个正斜杠组成的`pathDifferential`，表示我们必须先在目录层级中向上移动一级，然后向下进入*文稿*文件夹以定位文件，如下路径所示：


    ```

    file:../Documents/Test Target

    ```


    将源文件留在`Desktop`上，如果目标文件被移动到*文稿*中一个名为“Target Subfolder”的子文件夹内，则文件路径将更改为包括该子文件夹。


    ```

    file:../Documents/Target Subfolder/Test Target

    ```


    当源文件被放入`Desktop`上一个名为“Source Subfolder”的文件夹中时，`pathDifferential`必须更改，以表明在向下导航到目标文件的文件夹之前需要向上移动两级。例如，假设这两个文件位于以下文件夹中：


    ```

    Macintosh HD/Users/john_doe/Desktop/Source Subfolder/Test Source

    Macintosh HD/Users/john_doe/Documents/Target Subfolder/Test Target

    ```


    因此，文件路径将需要两个*双句点-正斜杠*的层级指示符来向上指向两级，以到达共同的父文件夹，然后再向下进入文件夹结构以找到目标文件，如下路径所示：


    ```

    file:../../Documents/Target Subfolder/Test Target

    ```


    ### 完整路径


    *完整路径*是从包含它的磁盘卷的上下文指定的、指向目标数据库文件夹的路径。这会建立一个不会改变的绝对路径。只要目标文件保持在原位，无论源数据库位于何处，该路径都将有效。完整路径可用于本地启动硬盘、外置磁盘上的
    macOS 目录以及 Windows 本地目录。绝对路径的公式根据用户计算机的操作系统略有不同。


    ```

    filemac:/volume/directoryName/fileName

    filewin:/driveLetter:/directoryName/fileName

    ```


    例如，如果文件位于 macOS 计算机用户的*文稿*文件夹中，路径的格式应如下所示：


    ```

    filemac:/Macintosh HD/Users/alex_smith/Documents/Test Target

    ```


    通用的`file`前缀也适用于完整路径，并且完全跨平台。


    ```

    file:/Macintosh HD/Users/alex_smith/Documents/Test Target

    ```


    ### 网络路径（仅限 Windows 共享目录）


    *网络路径*是指向存储在 Windows 环境服务器目录中的目标数据库文件的路径。网络路径的公式是：


    ```

    filewin:/computerName/shareName/directoryName/fileName

    ```


    例如，路径可能是：


    ```

    filewin:/Company_Server/Databases/Sales/Test_Target

    ```


    ### FileMaker Server 网络路径


    *FileMaker 网络路径*是指向托管在 FileMaker Server 计算机上（而非任何形式的文件共享）的目标数据库文件的路径。网络路径的公式是：


    ```

    fmnet:/addressOrName/fileName

    ```


    例如：


    ```

    fmnet:/192.100.50.10/Test Target

    fmnet:/FileMaker-Server.local/Test Target

    ```


    如果源数据库与目标数据库托管在同一个服务器上，则可以使用简单的相对路径，如下所示。使用这种方法将使数据库“面向未来”，因为即使服务器地址发生变化，它也能继续工作。


    ```

    file:/Test Target

    ```


    ### 构建动态路径


    与作为文本键入的字面路径不同，*动态路径*可以从一个用户的计算机自动更改为下一个用户。有几种技术可以帮助保持路径的动态性：*使用变量*、*使用函数*以及*排除文件扩展名*。


    #### 在路径中使用变量


    在“指定文件”对话框中输入的路径可以包含指定整个路径或路径一部分的变量。例如，一个使用*设置变量*步骤（第 [25] 章）的脚本可以将常用目标文件的网络地址和文件名存储在全局变量中，并在构建路径时使用它们。或者，可以将整个路径放入单个变量中。需要路径的脚本步骤也可以使用存储在局部变量中的路径。这些示例展示了路径如何使用变量作为路径的一部分或全部：


    ```

    fmnet:/$$ServerAddress/$$FileName

    file:$$PathToExport

    $PathToImportFile

    ```


    当向脚本步骤提供了无效路径时，它通常会报错并显示一条相当晦涩的消息。在变量中构建路径使得排查这些问题成为可能，因为在将其嵌入脚本步骤之前就可以访问该值。当路径跨多个脚本步骤动态构建，并且可能以一种不明显的方式不遵守正确的格式要求时，这一点尤其重要。一个*显示对话框*步骤可以在需要路径的步骤之前显示该变量以供检查。作为一个变量，它也可以在数据查看器（第
    [26] 章，“探索数据查看器”）中进行监控。通常，只需查看路径就能立即揭示错误的根源。


    #### 使用函数生成本地路径


    FileMaker 的几个内置函数可以自动生成指向用户计算机上标准文件夹的路径。它们可以在公式中用于构建动态路径，无论启动磁盘或主目录的名称是什么，这些路径都能工作。


    ```

    Get ( SystemDrive )     // result = /Macintosh HD/

    Get ( DesktopPath )     // result = /Macintosh HD/Users/karen_camacho/Desktop/

    Get ( DocumentsPath )   // result = /Macintosh HD/Users/karen_camacho/Documents/

    Get ( PreferencesPath ) // result = /Macintosh HD/Users/karen_camacho/Library/Preferences/

    ```


    这些函数返回指向 FileMaker 应用程序或当前数据库文件的路径。


    ```

    Get ( FileMakerPath )

    // result = /Macintosh HD/Applications/

    Get ( FilePath )

    // result = file:/Macintosh HD/Users/karen_camacho /Desktop/Learn FileMaker.fmp12

    ```


    *临时文件夹*是一个自动生成的隐藏文件夹，仅在用户注销或计算机重新启动之前存在。由于这些文件夹不存储在可轻易访问的目录中，因此它们非常适合用作在发送电子邮件之前导出文件或存储临时数据文件时的暂存位置。


    ```

    Get ( TemporaryPath )

    // result = /Macintosh HD/var/folders/rt/n62fc5vd0hn7js2v4098ydkw0000gp/T/S10/

    ```'
  raw: '##### Relative Path


    A *relative path* specifies a target file from the context of the current database
    location. This format assumes the source and target database are both not hosted
    and have a portion of their directory location in common. In other words, they
    are running locally from a folder on the same hard drive. Although sometimes confusing,
    these paths have the benefit of allowing the location of the files to move with
    a parent folder structure as long as the relative location between the two remains
    the same. The formula for a relative path is


    ```

    file:[pathDifferential]fileName

    ```


    The prefix and *fileName* are required with the *pathDifferential* included when
    there is a difference between the two folders containing them. The following examples
    assume two files: a current database named “Test Source” that is targeting a database
    named “Test Target.” If these two files are sitting in the same directory folder,
    there is no need to include any information about the difference between their
    locations, so the path will be simply be the prefix and the name of the target
    file .


    ```

    file:Test Target

    ```


    If the source file is moved to the macOS *Desktop* and the target to the user’s
    *Documents* folder, the two files will have only part of their path in common:


    ```

    Macintosh HD/Users/john_doe/Desktop/Test Source

    Macintosh HD/Users/john_doe/Documents/Test Target

    ```


    In this case, for the source file to point to the target file, it would need a
    differential of two periods and a forward slash indicating that we must move up
    the directory hierarchy one folder and then down into the *Documents* folder to
    locate the file as shown in the following path:


    ```

    file:../Documents/Test Target

    ```


    Leaving the source file on the *Desktop*, if the target was moved into a subfolder
    within the *Documents*, subfolder named “Target Subfolder,” the file path would
    change to include the additional subfolder.


    ```

    file:../Documents/Target Subfolder/Test Target

    ```


    When the source is placed into a folder on the *Desktop named “Source Subfolder,*”
    the differential must change to indicate the need to move up the two levels before
    navigating downward into the target file’s folder. For example, assume the two
    files are in the following folders:


    ```

    Macintosh HD/Users/john_doe/Desktop/Source Subfolder/Test Source

    Macintosh HD/Users/john_doe/Documents/Target Subfolder/Test Target

    ```


    So, the file path would require two sets of *double-period, forward slash* hierarchy
    indicators to point up two levels to reach the common parent folder before heading
    back down into the folder structure to find the target, as shown in the following
    path:


    ```

    file:../../Documents/Target Subfolder/Test Target

    ```


    ##### Full Path


    A *full path* is a path to a target database in a folder that is specified from
    the context of the disk volume containing it. This establishes an absolute path
    that doesn’t change. As long as the target remains in place, the path will work
    regardless of where the source database is located. Full paths can be used for
    macOS directories on the local startup hard drive, an external disk and for Windows
    local directories. The formula of an absolute path varies slightly depending on
    the operating system of the user computer.


    ```

    filemac:/volume/directoryName/fileName

    filewin:/driveLetter:/directoryName/fileName

    ```


    For example, if the file is in the user’s *Documents* folder on a macOS computer,
    the path would be formatted as shown here:


    ```

    filemac:/Macintosh HD/Users/alex_smith/Documents/Test Target

    ```


    The generic `file` prefix will also work for full paths and be completely cross-platform.


    ```

    file:/Macintosh HD/Users/alex_smith/Documents/Test Target

    ```


    ##### Network Path (Windows Shared Directory Only)


    A *network path* is a path to a target database file stored in a server directory
    in a Windows environment. The formula of a network path is


    ```

    filewin:/computerName/shareName/directoryName/fileName

    ```


    For example, a path might be


    ```

    filewin:/Company_Server/Databases/Sales/Test_Target

    ```


    ##### FileMaker Server Network Path


    A *FileMaker network path* is a path to a target database file hosted on a FileMaker
    Server computer (not any form of file sharing). The formula of a network path
    is


    ```

    fmnet:/addressOrName/fileName

    ```


    For example


    ```

    fmnet:/192.100.50.10/Test Target

    fmnet:/FileMaker-Server.local/Test Target

    ```


    If the source database is hosted on the same server as the target, a simple relative
    path can be used as shown in the following. Using this method will “future-proof”
    a database as it will continue to work even if the server address changes.


    ```

    file:/Test Target

    ```


    ### Building Dynamic Paths


    Unlike literal paths typed as text, a *dynamic path* can automatically change
    from one user’s computer to the next. There are a few techniques that can help
    keep paths dynamic: *using variables*, *using functions,* and *excluding file
    extensions*.


    #### Using Variables in Paths


    Paths entered in the *Specify File* dialog can include variables that specify
    an entire path or a portion of a path. For example, a script using the *Set Variable*
    step (Chapter [25](#429700_2_En_25_Chapter.xhtml)) can store a network address
    and file name for a commonly used target file in global variables and use them
    when constructing a path. Alternatively, an entire path can be placed into a single
    variable. Script steps requiring a path can use paths stored in local variables
    as well. These examples show how paths can use variables for part or all of the
    path:


    ```

    fmnet:/$$ServerAddress/$$FileName

    file:$$PathToExport

    $PathToImportFile

    ```


    When a script step is provided an invalid path, it usually errors with a rather
    cryptic message. Building paths in variables makes it possible to troubleshoot
    these problems since the value is accessible prior to being embedded in the script
    step. This is especially important when a path is being constructed dynamically
    across several script steps and may not adhere to proper formatting requirements
    in a non-obvious way. A *Show Dialog* step can display the variable for examination
    prior to the step that requires it. As a variable, it can also be monitored in
    the Data Viewer (Chapter [26](#429700_2_En_26_Chapter.xhtml), “Exploring the Data
    Viewer”). More often than not, simply looking at the path instantly reveals the
    cause of the error.


    #### Using Functions to Generate Contextual Paths


    Several of FileMaker’s built-in functions automatically generate paths to standard
    folders on the user’s computer. These can be used in formulas to construct dynamic
    paths that work regardless of the context of the startup disk or home directory
    name.


    ```

    Get ( SystemDrive )     // result = /Macintosh HD/

    Get ( DesktopPath )     // result = /Macintosh HD/Users/karen_camacho/Desktop/

    Get ( DocumentsPath )   // result = /Macintosh HD/Users/karen_camacho/Documents/

    Get ( PreferencesPath ) // result = /Macintosh HD/Users/karen_camacho/Library/Preferences/

    ```


    These functions return the path to the FileMaker application or current database
    file.


    ```

    Get ( FileMakerPath )

    // result = /Macintosh HD/Applications/

    Get ( FilePath )

    // result = file:/Macintosh HD/Users/karen_camacho /Desktop/Learn FileMaker.fmp12

    ```


    A *temporary folder* is an automatically generated hidden folder that only exists
    until the user signs out or the computer is restarted. Since these are not stored
    in an obviously accessible directory, they are ideal for use as a staging location
    when exporting files prior to sending an email or storing transitory data files.


    ```

    Get ( TemporaryPath )

    // result = /Macintosh HD/var/folders/rt/n62fc5vd0hn7js2v4098ydkw0000gp/T/S10/

    ```'
