  trans: "\n### 定义 SELECT 语句\n\n当调用 `ExecuteSQL` 函数时，`sqlQuery` 参数必须包含一个格式正确的 `SELECT`\
    \ 语句。最低限度下，该语句需定义要查找的*内容* 及其*来源*，遵循如下所示模式：\n\n```\nSELECT <内容> FROM <来源>\n```\n\
    \n通常，*内容* 是一个或多个字段的名称，而*来源* 则是要从中提取这些字段的表出现项（table occurrence）的名称。例如，以下示例将返回 `Contact`\
    \ 表出现项中每条记录的 `Name` 字段内容：\n\n```\nSELECT Name FROM Contact\n```\n\n上述代码展示了一个最简单语句的示例，请求*来自所有记录的一个字段*。还有许多可选的子句，如下所示，并在表\
    \ 16-1 中进行了简要定义：\n\n**表 16-1** `SELECT` 语句中每个可用子句的定义  \n\n| 关键字 | 子句描述 |\n| ---\
    \ | --- |\n| `SELECT` | 指定要选择的一个或多个字段。可以包含字段、常量、计算和函数。使用星号选择所有字段。 |\n| `SELECT\
    \ DISTINCT` | 添加 `DISTINCT` 操作符将从结果中移除任何重复项。 |\n| `FROM` | 指定要从中选择字段的一个或多个表。 |\n\
    | `JOIN` | 定义一个表和关联公式，以便结果能够通过临时关系包含字段。 |\n| `WHERE` | 定义一个或多个条件公式，用于指定结果中记录需满足的资格。\
    \ |\n| `GROUP BY` | 标识一个或多个用于汇总结果的选定字段。 |\n| `HAVING` | 定义一个或多个公式，用于指定包含分组结果的条件。`HAVING`\
    \ 之于 `GROUP BY` 就如同 `WHERE` 之于 `SELECT`。 |\n| `UNION` | 用于将两个或多个 `SELECT` 语句合并为一个结果。\
    \ |\n| `ORDER BY` | 标识一个或多个用于对结果排序的选定字段。 |\n| `OFFSET` | 在选定集中指定一个起点，用于确定将包含在结果中的记录。\
    \ |\n| `FETCH FIRST` | 指定应从起点检索的记录数量，起点可以是第一条记录或由 `OFFSET` 指定的记录。 |\n| `AS` |\
    \ 为表名创建简短的别名，该别名可在语句的其他位置用作前缀来标识字段所属的表，尤其在涉及多个表时（例如使用 `JOIN` 子句时）。 |\n\n```\n\
    SELECT/SELECT DISTINCT <选择字段>\nFROM <表名>\nJOIN <表名> ON <公式>\nWHERE <条件公式>\nGROUP\
    \ BY <分组字段列表>\nHAVING <分组条件>\nUNION <选择语句>\nORDER BY <排序字段列表>\nOFFSET <起始行> ROW/ROWS\n\
    FETCH FIRST <行数> PERCENT/ROWS/ROW/ONLY/WITH TIES\n```\n\n#### 格式要求\n\n编写 `SELECT`\
    \ 语句时，需要记住一些格式要求。包括：\n\n-   **命令和对象名称** – 查询中的表名、字段名和语句命令*不* 区分大小写。然而，将 SQL 命令和操作符大写有助于在视觉上将其与字段值和条件值区分开。\n\
    -   **条件** – 字面量条件（例如在 `JOIN`、`WHERE` 和 `HAVING` 子句中使用的）*区分*大小写，如果大小写不匹配，将无法定位到匹配的值。此外，所有文本条件*必须*\
    \ 用单引号括起来。\n-   **名称分隔符** – 在列出多个表和字段时，务必在其间使用逗号加空格作为分隔符。\n-   **引号** – 表名和字段名不需要用双引号括起来，*除非它们包含空格*。以非字母字符开头的表名必须用双引号括起来，即使它们不包含空格。由于\
    \ `SELECT` 语句本身被包含在引号中，因此内部使用的引号必须使用反斜杠进行转义。\n\n### 使用 SELECT 语句\n\n尽管 `SELECT`\
    \ 语句是 `ExecuteSQL` 函数唯一支持的语句，但它的功能非常强大。在深入研究许多不同的可选子句之前，让我们先探讨基本语句并讨论有效使用它的技巧。\n\
    \n#### 选择整个表\n\n最基本的查询是*每条记录*的*每个字段*都被选中的查询。这可以通过一个简单的语句实现。\n\n```\nSELECT * FROM\
    \ <表名>\n```\n\n该语句必须*始终*以单词 `SELECT` 开头，后跟要选择的字段以及来自哪个表的指示。在此例中，星号告知 FileMaker\
    \ 选择*所有字段*。前面示例中显示的 `<表名>` 占位符被替换为实际表出现项的名称，函数将访问该表出现项的基础表。以下示例中的 `SELECT` 语句将获取\
    \ `Contact` 表中的所有字段：\n\n```\nSELECT * FROM Contact\n```\n\n将其放入引号中，并用作 `ExecuteSQL`\
    \ 语句的第一个参数，如下例所示：\n\n```\nExecuteSQL ( \"SELECT * FROM Contact\" ; \"\" ; \"\"\
    \ )\n```\n\n在 *Learn FileMaker* 数据库的 *示例计算* 字段中输入此公式。确认 *计算结果类型* 设置为返回*文本* 后，保存公式，然后在浏览模式下字段中应显示如图\
    \ 16-1 所示的结果。结果的每个段落都是一条单独的记录，包含按创建顺序排列的每个字段值的逗号分隔列表。\n\n![../images/429700_2_En_16_Chapter/429700_2_En_16_Fig1_HTML.jpg](img/429700_2_En_16_Fig1_HTML.jpg)\
    \  \n**图 16-1** SQL 查询结果示例\n\n> **注意：** 尽管本章中的示例假设该公式在计算字段中使用，但它们可以在任何公式中使用。\n\
    \n#### 选择单个字段\n\n对于你不需要表中*每条记录*的*每个字段*的情况，`SELECT` 语句可以指定单个字段。\n\n##### 指定单个字段\n\
    \n要从 `Contact` 表中选择*单个字段*，请将星号替换为字段名称，如果字段名称包含空格，请记得将其放在转义引号中。以下公式从 `Contact`\
    \ 表的每条记录中选择 `Contact Address City` 字段。这将生成一个以回车符分隔的城市名称列表。请注意，该列表包含*每条*记录的字段值，因此会包含许多重复项。\n\
    \n```\nExecuteSQL ( \"SELECT \\\"Contact Address City\\\" FROM Contact\" ; \"\"\
    \ ; \"\" )\n// 结果 =\nHamilton\nAshland\nChicago\nSan Jose\nSioux Falls\nSan Jose\n\
    Ashland\n...等...\n```\n\n##### 指定多个字段\n\n要选择*多个字段*，请将其列在一个以逗号加空格分隔的字符串中：\n\n```\n\
    SELECT <字段 1>, <字段 2>, <字段 3> FROM <表名>\n```\n\n例如，要从 `Contact` 表中选择 `Contact\
    \ Address City` 和 `Contact Address State` 字段，请使用以下公式。此语句的结果将是一个以逗号分隔的城市和州名称列表。\n\
    \n```\nExecuteSQL (\n\"SELECT \\\"Contact Address City\\\", \\\"Contact Address\
    \ State\\\" FROM Contact\" ; \"\" ; \"\"\n)\n// 结果 =\nHamilton,OH\nAshland,OH\n\
    Chicago,IL\nSan Jose,CA\nSioux Falls,SD\nSan Jose,CA\nAshland,OH\n...等...\n```\n\
    \n#### 使用 SELECT DISTINCT 获取唯一值\n\n要自动按字母顺序排列结果并移除重复项，请使用 `SELECT DISTINCT` 命令。以下示例将从\
    \ `Contact` 表的 `Contact Address City` 字段生成一个按字母顺序排序的唯一值列表：\n\n```\n\"SELECT DISTINCT\
    \ \\\"Contact Address City\\\" FROM Contact\"\n```\n\n结果的唯一性基于*整个记录值*，而不是其中的单个字段。例如，当仅选择城市时，结果将仅包含\
    \ \"San Jose\" 的一个条目。但是，如果选择了多个字段，如下例所示的街道地址和城市，则结果将包含 San Jose 的多个条目，因为完整的记录现在包含了其他值。例如，\"\
    123 First Street,San Jose\" 与 \"1837 Fifth Ave,San Jose\" 并不完全相等，因此两者都会包含在结果中。\n\
    \n```\n\"SELECT DISTINCT \\\"Contact Address Street\\\", \\\"Contact Address City\\\
    \" FROM Contact\"\n```\n"
- fmt: "#### Reformatting SELECT Statements for Clarity\n\nUnlike the preceding examples\
    \ that are short and easy to read, `SELECT` statements can quickly grow in complexity\
    \ and wrap to multiple lines. There are two techniques that can be used to reformat\
    \ statements and avoid visual clutter: adding extra space and using a `Let` statement.\n\
    \n##### Adding Extra Space with Tabs and Paragraph Returns\n\nFileMaker will ignore\
    \ paragraph returns and tabs in the `sqlQuery` text string so these can be used\
    \ to separate the statement into readable blocks, as shown in the following pattern.\
    \ A combination of a tab and paragraph return separates each clause of the statement\
    \ onto its own line, where it is indented to stand out from the enclosing statement.\
    \ Following this pattern will make the statement easier to read:\n\n```\nExecuteSQL\
    \ ( \"\nSELECT \nFROM \nJOIN  ON \nWHERE \nORDER BY \n\" ; \"\" ; \"\" )\n```\n\
    \nWhen multiple fields, find conditions, or other components are used, those can\
    \ be pushed onto their own line, further indented for additional clarity as shown\
    \ here in this pattern:\n\n```\nExecuteSQL ( \"\nSELECT\n,\n,\n\nFROM \nJOIN \
    \ ON \nWHERE\n and\n and\n\nORDER BY\n,\n\n\" ; \"\" ; \"\" )\n```\n\n##### Using\
    \ a LET Statement\n\nAnother method of eliminating the visual confusion of a complex\
    \ query is the use of a `Let` statement. The entire `SELECT` query can be built\
    \ in pieces using separate variables that are finally combined into a single variable\
    \ and inserted into the `ExecuteSQL` statement, as shown in this example:\n\n\
    ```\nLet ( [\nsFields = \"SELECT \" ;\nsTable = \"FROM  \" ;\nsJoin = \"JOIN \
    \ ON  \" ;\nsWhere = \"WHERE  \" ;\nsGroup = \"GROUP BY  \" ;\nSQL = sFields &\
    \ sTable & sJoin & sWhere & sGroup\n] ;\nExecuteSQL ( SQL ; \"\" ; \"\" )\n)\n\
    ```\n\nTip: Create a custom function to accept a field reference and other criteria\
    \ and return the query statement.\n\n#### Exploring the Benefits of Aliases\n\n\
    An `alias` is a short text string that can act as a proxy for a table name elsewhere\
    \ in a `SELECT` statement. When a `SELECT` statement contains repeated references\
    \ to more than one table, as in a `JOIN` clause (discussed later in this chapter),\
    \ aliases are used to identify the table containing a field. Although an alias\
    \ can be made up of any number of characters, as a space-saving mechanism shorter\
    \ is always better. To establish an alias, use the `AS` clause after the identification\
    \ of a table, and follow it with a text alias, as shown in the following pattern:\n\
    \n```\nSELECT  FROM  AS \n```\n\nFor example, to create an alias `c` for the `Contact`\
    \ table, format it like this:\n\n```\nSELECT  FROM Contact AS c\n```\n\nOnce the\
    \ alias `c` is established, it can be used as a prefix on any field name, in any\
    \ clause, to identify the table to which a field belongs. While aliases are not\
    \ required when selecting fields from a single table, the following example demonstrates\
    \ how aliases work. Notice that the alias is defined at the end of the statement\
    \ but can be used in previous clauses.\n\n```\nSELECT c.Notes FROM Contact AS\
    \ c\n```\n\nWhen a field with spaces in its name is enclosed in double quotations,\
    \ the alias prefix should precede the name outside of the quotes.\n\n```\nSELECT\
    \ c.\\\"Contact First Name\\\" FROM Contact AS c\n```\n\nAlthough an alias is\
    \ unnecessary in the following short examples, as a demonstration of the formatting\
    \ with or without an alias, each of these will generate the exact same result:\n\
    \n```\nSELECT Notes FROM Contact\nSELECT Contact.Notes FROM Contact\nSELECT c.Notes\
    \ FROM Contact AS c\n```\n\nNote: Aliases will be used in more complex examples\
    \ later in this chapter.\n\n### Inserting Literal Text in the Field List\n\nLiteral\
    \ text strings can be inserted before, between, and after field names within the\
    \ `SELECT` statement and will be repeated in the results for each record. Literals\
    \ must be enclosed in single quotation marks and separated by a comma. This example\
    \ demonstrates a `'Name:'` label inserted into the field results.\n\n```\nExecuteSQL\
    \ ( \"\nSELECT\n'Name: ',\n\\\"Contact Name First\\\",\n\\\"Contact Name Last\\\
    \"\nFROM Contact\"\n; \" \" ; \"\" )\n// Result\nName: Cynthia,Johnson\nName:\
    \ Karen,Camacho\nName: Sandy,Robinson\nName: Thomas,Smithfield\n```\n\n### Concatenating\
    \ Results\n\nA query can include instructions for pre-processing separate field\
    \ values into combined results using `concatenation`, the action of linking things\
    \ together in a chain or series. Instead of receiving a result of raw comma-delimited\
    \ set of field names which would require further parsing and manipulating, concatenation\
    \ provides more useful results. This can be achieved using either the `+` or `||`\
    \ operators, although the latter is both more reliable and less likely to be confused\
    \ with the same operator used in mathematical calculations. The following example\
    \ query shows first and last names being concatenated into a single string, with\
    \ a space inserted between them:\n\n```\nExecuteSQL ( \"\nSELECT \\\"Contact Name\
    \ First\\\" || ' ' || \\\"Contact Name Last\\\"\nFROM Contact\n\" ; \"\" ; \"\"\
    \ )\n// Result\nCynthia Johnson\nKaren Camacho\nSandy Robinson\nThomas Smithfield\n\
    ```\n\nAlternatively, the plus-sign delimiter would produce the same results.\n\
    \n```\nSELECT \\\"Contact Name First\\\" + ' ' + \\\"Contact Name Last\\\"\n```\n\
    \nIn the preceding two simple examples, the same result could also have been achieved\
    \ by placing a space in the `fieldDelimiter` parameter. However, when more fields\
    \ are selected, concatenation allows different delimiters between different sets\
    \ of fields where the field delimiter is the same for every field. The following\
    \ example shows a more realistic example of using both concatenation and a custom\
    \ delimiter to return a contact's full name and mailing address as a three-paragraph\
    \ result. The first-last name and city-state-zip are each concatenated, and then\
    \ a custom field and record delimiter format the results into a list of mailing\
    \ addresses.\n\n```\nExecuteSQL ( \"\nSELECT\n\\\"Contact Name First\\\" + ' '\
    \ + \\\"Contact Name Last\\\",\n\\\"Contact Address Street\\\",\n\\\"Contact Address\
    \ City\\\" + ', ' +\n\\\"Contact Address State\\\" + ' ' +\n\\\"Contact Address\
    \ Zip\\\"\nFROM Contact\" ; \"¶\" ; \"¶¶\" )\n// Result\nCynthia Johnson\n123\
    \ Main Street\nYoungstown, OH 44504\nKaren Camacho\n42 Memory Lane\nBrooklyn,\
    \ NY 11111\nSandy Robinson\n631 Front Street\nLafayette, IN 47901\n```\n\n###\
    \ Using the WHERE Clause\n\nAdding a `WHERE` clause to a `SELECT` statement allows\
    \ the query to target specific records based on search criteria. The `<formula>`\
    \ portion can contain one or more expressions that define the criteria used to\
    \ match records, typically including a field, an operator, and a search value.\n\
    \n```\nSELECT  FROM  WHERE \n```\n\n#### Creating a WHERE Clause with a Single\
    \ Expression\n\nTo limit the results to contacts from California, a `WHERE` formula\
    \ would be composed of the field name (in quotes if required), an equal sign as\
    \ the operator, and `'CA'` in single quotes. The following example demonstrates\
    \ this by requesting the first and last name of every contact within that state.\
    \ Remember, when this is inserted into the `ExecuteSQL` function call, the entire\
    \ statement would be enclosed in quotes, and the quotes around field names would\
    \ need to be escaped with a backslash.\n\n```\nSELECT\n\"Contact Name First\"\
    ,\n\"Contact Name Last\"\nFROM Contact\nWHERE \"Contact Address State\" = 'CA'\n\
    ```\n\n#### Creating a WHERE Clause with Multiple Expressions\n\nFor complex criteria,\
    \ a `WHERE` clause can contain multiple search expressions separated by a comparison\
    \ operator of `AND` or `OR`. For example, when searching for contacts living in\
    \ a city that is common to many states, such as `'Milford'`, use two expressions\
    \ to specify both the city and the state. To do this, use the `AND` operator between\
    \ the two expressions, requiring results to match both criteria.\n\n```\nWHERE\
    \ \"Contact Address City\" = 'Milford' AND \"Contact Address State\" = 'PA'\n\
    ```\n\nSimilarly, to find contacts from two different states, for example, from\
    \ Pennsylvania or Ohio, use an `OR` operator to allow the results to include results\
    \ from either expression.\n\n```\nWHERE \"Contact Address State\" = 'PA' OR \"\
    Contact Address State\" = 'OH'\n```"
