- fmt: '### Contextual Menus for Web Viewers


    There are two contextual menus for `Web Viewers` that vary by window mode:


    - **Browse Mode** – One option to reload the content

    - **Layout Mode** – Functions to cut-copy-paste, set style, configure as a button,
    configure the viewer settings, define conditional formatting, configure script
    triggers, and set various formatting options


    ### Contextual Menus for Window Components


    These three contextual menus appear on various window components:


    - **Layout Part** (Layout mode) – Open the **Part Definition** dialog, and choose
    the style or fill color of the part

    - **Ruler** – Choose points, inches, or centimeters as the unit of measure

    - **Toolbar** – Open the toolbar customization dialog


    ### Contextual Menus for Calculation Formulas


    Every instance of the **Specify Calculation** dialog (Chapter [12](#429700_2_En_12_Chapter.xhtml))
    has a contextual menu that includes text manipulation functions that vary slightly
    depending on whether text is selected or not.


    ## Summary


    This chapter introduced the basics of the **FileMaker Pro** desktop application,
    covering topics such as the default windows, preferences, and various menus. Next,
    we begin exploring a database window.


    # 3. Exploring a Database Window


    A **database window** is a view into an open database file. As a full-stack development
    environment, FileMaker’s windows have different window modes for data entry and
    development. This chapter begins an exploration of a database window from a **user
    perspective**, covering these topics:


    - Identifying window regions and modes

    - Exploring the window header

    - Managing multiple windows


    Since we don’t discuss creating database files until Chapter [6](#429700_2_En_6_Chapter.xhtml),
    to follow along with the exploration of the window interface, take a moment to
    download the Learn FileMaker sample files from the Apress website ([*https://www.apress.com/9781484266793*](https://www.apress.com/9781484266793)),
    and open the **Chapter** [**3**](#429700_2_En_3_Chapter.xhtml)**-** [**5**](#429700_2_En_5_Chapter.xhtml)
    file. This example contains a simple **Contacts** table with two layouts and a
    simple custom theme to render nice example pictures for the book.


    ## Identifying Window Regions and Modes


    A database window, shown in Figure [3-1](#429700_2_En_3_Chapter.xhtml#Fig1), is
    divided into two primary regions: **toolbar** and **content area**. The **toolbar**,
    discussed later in this chapter, is the header containing two rows of controls
    that are uniform to all databases with some customization options. The **content
    area** includes the area below the toolbar that displays a custom user interface
    designed by a developer. In this example, the window is preconfigured with a few
    simple interface elements. When creating a new blank file (Chapter [6](#429700_2_En_6_Chapter.xhtml)),
    this area would be completely blank and require a layout design (Chapters [17](#429700_2_En_17_Chapter.xhtml)–[22](#429700_2_En_22_Chapter.xhtml))
    which can be more graphically elaborate. This area displays one layout at a time
    but can switch between any number of layouts created in the file. The rendering
    method of content varies by the selected **window mode** and **content view**.


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig1_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig1_HTML.jpg)


    **Figure 3-1** The two window areas: toolbar (top) and content area (bottom)


    ### Defining Window Modes


    A **window mode** is a display state that optimizes a window’s interface for a
    specific functional purpose. FileMaker has four modes that are described across
    several different chapters: **Browse**, **Find**, **Preview**, and **Layout**.


    **Browse mode** is the default window state and is used to interact with the content
    of a database and perform data entry–related tasks. In Browse mode, the content
    area of the window renders a set of records from a layout’s table. Depending on
    the design of the layout and account permissions, a user can interact with the
    data to create, view, edit, delete, duplicate, search, sort, and omit records
    as well as interact with other objects.


    **Find mode** is a window state used to enter search criteria. In Find mode, the
    layout transforms into a blank record-like **request** into which the user enters
    criteria defining a desired set of records prior to performing a search.


    **Preview mode** is a window state that acts like a print preview, displaying
    the current layout and found set of records as they would appear on a printed
    page. The layout will appear similar to Browse mode but be presented in a nonfunctional
    state. So, fields will not be editable, and buttons that aren’t hidden appear
    as non-clickable art. Also, objects may hide, slide, compress, summarize, and
    change formatting depending on how they are defined on the layout.


    **Layout mode** is a window state used to create interface layouts. Special design
    tools are used to add and configure objects to the layout.


    Each mode has a unique toolbar, menu bar, and content area rendering methodology.
    Depending on their access permissions (Chapter [30](#429700_2_En_30_Chapter.xhtml)),
    a user can change the mode of a window by clicking a mode button in the status
    toolbar, selecting a mode from the **View** menu, or running a script that changes
    the mode. Using Browse mode is discussed in this chapter and in Chapter [4](#429700_2_En_4_Chapter.xhtml)
    along with using Find and Preview modes. Designing custom interface elements in
    Layout mode is explored in Chapters [17](#429700_2_En_17_Chapter.xhtml)–[22](#429700_2_En_22_Chapter.xhtml).


    ### Defining Content Views


    A **content view** is an interface setting that determines how records are displayed
    in the content area of a window in Browse mode. Depending on restrictions enforced
    by the layout settings (Chapter [18](#429700_2_En_18_Chapter.xhtml), "Views"),
    a user can choose to view records in up to three formats: **Form**, **List**,
    or **Table**. The current view of a layout can be changed by selecting a menu
    item under the **View** menu, clicking a **View As** icon in the toolbar, or running
    a script that changes the view.


    In **Form view**, the window displays one record at a time rendered into one set
    of all the layout elements. To see other records in this view, use the navigation
    controls in the toolbar or custom interface elements designed to go to other records.
    This is analogous to looking at one sheet of paper pulled out of a file cabinet
    or a single page in a book.


    In **List view**, the window displays a continuous list of records that are rendered
    by repeating the layout elements once for each. In this view, the user can scroll
    up or down to see other records. This is analogous to looking across a sequence
    of tabs on folders in a file cabinet or at a book’s table of contents.


    In **Table view**, the window displays a set of records in a spreadsheet-style
    format of columns and rows while excluding other graphical elements that are present
    on the layout. The user can rearrange and resize columns by dragging their headings.
    They can sort the records by clicking on a heading. New fields (columns) and new
    records (rows) can be created intuitively in a manner somewhat similar to a spreadsheet.
    An action pop-up menu is hidden within each field’s heading and provides quick
    access to various features including sorting, summarization, field control, and
    view control. Table views aren’t high on design and customized functionality,
    but they provide a more familiar environment for those used to working with spreadsheets
    and may be suitable for simple databases that don’t require an elaborate interface.


    ## Exploring the Window Header


    There are three horizontal bars that can be displayed or hidden in the toolbar
    area of a window depending on the user’s access privileges, preferences, and the
    settings established by the developer. These are the **Status Toolbar**, **Formatting
    Bar**, and **Ruler**.'
