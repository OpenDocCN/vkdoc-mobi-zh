  trans: "\n# 使用 `ORDER BY` 子句\n\n可以添加 `ORDER BY` 子句来指定结果排序。\n\n```\nSELECT  FROM\
    \  ORDER BY \n```\n\n以下示例返回按州排序的每个联系人的姓氏列表。\n\n```\nSELECT \"Contact Name Last\"\
    \ FROM Contact ORDER BY \"Contact Address State\"\n```\n\n将 `ORDER BY` 与 `WHERE`\
    \ 子句结合使用，以下示例将返回居住在城市名为‘Milford’的每个联系人的姓氏，并按州排序。\n\n```\nSELECT \"Contact Name\
    \ Last\"\nFROM Contact\nWHERE \"Contact Address City\" = 'Milford'\nORDER BY \"\
    Contact Address State\"\n```\n\n# 使用 `JOIN` 子句\n\n添加 `JOIN` 子句会在两个表实例之间创建一个临时关系，该关系仅在\
    \ SQL 查询执行期间存在。它们用于从两个表中选择字段并返回混合结果。`JOIN` 允许其他子句（如 `WHERE` 或 `ORDER BY`）引用任一表或两个表中的字段。例如，可以选择相关的*公司*记录位于特定州的*联系人*记录，并且结果联系人列表可以按公司名称排序。`JOIN`\
    \ 子句包含一个表名，该表应与 `FROM` 表建立关系，并使用一个表达式来表述用于形成临时关系的条件。完整的公式模式如下所示：\n\n```\nSELECT\
    \  FROM  JOIN  ON \n```\n\n以下示例连接*联系人*和*公司*表，以选择每个联系人的名字及其关联的公司名称，条件是在*联系人*（别名为\
    \ `con`）中的 *Contact Company ID* 字段等于*公司*（别名为 `com`）中的 *Record ID* 字段。它为表分配了别名，并在字段列表和连接子句中将其用作前缀。\n\
    \n```\nSELECT\ncon.\"Contact Name First\",\ncom.\"Company Name\"\nFROM Contact\
    \ AS con\nJOIN Company AS com ON\ncon.\"Contact Company ID\" = com.\"Record ID\"\
    \n```\n\n# 使用 `GROUP BY` 子句\n\n添加 `GROUP BY` 子句会基于一个或多个字段生成一个*聚合值*。这相当于原生 FileMaker\
    \ 汇总字段的 SQL 版本（第 8 章）；两者都基于排序分组字段生成数据汇总。例如，如果*联系人*表有一个名为*State*的字段和另一个名为*Invoices*（包含客户发票金额总额）的字段，以下*不带*\
    \ `GROUP BY` 子句的代码将返回每个联系人记录的*State*和*Invoice*金额列表，如下例所示：\n\n```\nSELECT State,\
    \ Invoices FROM Contact ORDER BY State\n// 结果 =\nAK,1000\nAK,500\nAK,250\nAZ,500\n\
    AZ,750\n等其他\n```\n\n通过对*Invoices*字段使用 *Sum* 函数，并添加一个指定*State*字段的 `GROUP BY` 子句，以下示例将返回按州汇总的发票金额摘要。请注意，此示例中已移除了\
    \ `ORDER BY` 子句。这不是必需的，因为 `GROUP BY` 子句会对记录进行排序以便分组和汇总结果。\n\n```\nSELECT State,\
    \ Sum ( Invoices ) FROM Contact GROUP BY State\n// 结果 =\nAK,1750\nAZ,1250\nCA,2500\n\
    ```\n\n## 添加 `HAVING` 子句\n\n组合使用 `HAVING` 和 `GROUP BY` 子句允许语句定义将包含哪些*分组结果*，其作用类似于\
    \ `WHERE` 子句，但针对的是汇总结果。基于前面的示例，以下示例使用 `HAVING` 子句仅包含*发票汇总*大于某个金额的州的结果。这里，前一个示例中\
    \ `AZ` 的汇总条目已被移除，因为汇总总计 `1250` 低于 `HAVING` 子句中指定的阈值 `1500`。\n\n```\nSELECT State,\
    \ Sum ( Invoices ) FROM Contact GROUP BY State HAVING Sum ( Invoices ) > 1500\n\
    -- 结果 =\nAK,1750\nCA,2500\n```\n\n# 使用 `UNION` 子句\n\n添加 `UNION` 子句可以合并两个或多个 `SELECT`\
    \ 语句的结果，无论这些语句是来自具有相同或不同标准的同一个表，还是来自不同的表，只要每个语句选择的字段数量相同，并且每个字段位置的数据类型在所有语句中都一致。例如，如果第一个\
    \ `SELECT` 语句返回三个字段，数据类型分别为*文本*、*数字*和*文本*，那么第二个 `SELECT` 语句也必须返回三个字段，且具有相同顺序的相同数据类型。以下是在两个\
    \ `SELECT` 语句之间添加 `UNION` 的简化模式，未显示可以包含在其中任一或两个语句中的其他子句。\n\n```\nSELECT  FROM\
    \  UNION SELECT  FROM \n```\n\n默认情况下，此子句会自动从合并结果中排除重复条目。使用 `UNION ALL` 可包含所有结果，即使有重复项也不例外。\n\
    \n# 限制查询结果\n\n`OFFSET` 和 `FETCH FIRST` 子句可以单独使用或联合使用，以控制查询返回的结果数量。\n\n## 使用 `OFFSET`\
    \ 子句\n\n`OFFSET` 子句用于指定要从结果顶部排除的记录数量。此示例将排除前 20 条记录，并从第 21 条记录开始返回结果：\n\n```\n\
    SELECT \"Record ID\" FROM Contact OFFSET 20 ROWS\n```\n\n## 使用 `FETCH FIRST` 子句\n\
    \n`FETCH FIRST` 子句限制返回的行数。此示例将仅返回前十条结果：\n\n```\nSELECT \"Record ID\" FROM Contact\
    \ FETCH FIRST 10 ROWS ONLY\n```\n\n## 组合使用 `OFFSET` 和 `FETCH FIRST` 子句\n\n`OFFSET`\
    \ 和 `FETCH FIRST` 子句的组合可以从结果中获取特定的记录组。这允许以一系列小批次的方式提取结果子集，通常称为*分页结果*，其中每个查询一次返回一“页”结果。`OFFSET`\
    \ 部分指示所需组的起始位置，`FETCH FIRST` 部分限制从该起始点访问的记录数量。以下代码展示了若干访问记录批次的示例，每次十批。\n\n```\n\
    SELECT \"Record ID\" FROM Contact FETCH FIRST 10 ROWS ONLY\nSELECT \"Record ID\"\
    \ FROM Contact OFFSET 10 ROWS FETCH FIRST 10 ROWS ONLY\nSELECT \"Record ID\" FROM\
    \ Contact OFFSET 20 ROWS FETCH FIRST 10 ROWS ONLY\nSELECT \"Record ID\" FROM Contact\
    \ OFFSET 30 ROWS FETCH FIRST 10 ROWS ONLY\nSELECT \"Record ID\" FROM Contact OFFSET\
    \ 40 ROWS FETCH FIRST 10 ROWS ONLY\n```\n\n第一个语句返回记录 1 到 10，第二个返回记录 11 到 20，第三个返回记录\
    \ 21 到 30，依此类推。使用此技术，界面元素可以允许用户一次一“页”地在结果组中来回点击。\n\n# 访问数据库模式\n\n`ExecuteSQL`\
    \ 函数能够访问两个提供数据库模式元信息的系统表：`FileMaker_Tables` 和 `FileMaker_Fields`。这些表可以在 `SELECT`\
    \ 语句中像使用自定义表实例一样使用，以访问构成数据库结构的表和字段的信息。\n"
- fmt: '### Selecting FileMaker_Tables


    `FileMaker_Tables`表包含一个虚拟记录，针对关系图中定义的每个*表出现*，并包含以下信息字段：


    - `TableName` – 表出现的名称

    - `TableID` – 表出现的标识号

    - `BaseTableName` – 表出现的基础表名称

    - `BaseFileName` – 出现的基础表所在文件的名称

    - `ModCount` – 自创建以来对表结构进行的修改次数


    要选择数据库中每个表出现的所有五个字段，请在`ExecuteSQL`函数中使用以下查询公式：


    ```

    "SELECT * FROM FileMaker_Tables"

    // 结果 =

    Company,1065101,Company,Learn FileMaker,20

    Company | Contact,1065105,Contact,Learn FileMaker,24

    Contact,1065102,Contact,Learn FileMaker,24

    Contact | Company,1065106,Company,Learn FileMaker,20

    Project,1065103,Project,Learn FileMaker,4

    Project | Company,1065107,Company,Learn FileMaker,20

    Sandbox,1065089,Sandbox,Learn FileMaker,134

    ```


    此示例指定只返回`TableName`字段的结果：


    ```

    "SELECT TableName FROM FileMaker_Tables"

    // 结果 =

    Company

    Company | Contact

    Contact

    Contact | Company

    Project

    Project | Company

    Sandbox

    ```


    此示例使用`SELECT DISTINCT`和`BaseTableName`将结果限制为实际的表名称：


    ```

    "SELECT DISTINCT BaseTableName FROM FileMaker_Tables"

    // 结果 =

    Company

    Contact

    Project

    Sandbox

    ```


    ### Selecting FileMaker_Fields


    `FileMaker_Fields`表包含一个虚拟记录，针对数据库中定义的每个*字段*，并提供以下可用元信息：


    - `TableName` – 字段的表出现的名称

    - `FieldName` – 字段的名称

    - `FieldType` – 文件的 SQL 数据类型

    - `FieldID` – 字段的标识号

    - `FieldClass` – 字段的类别：`Normal`、`Summary`或`Calculated`

    - `FieldReps` – 定义的最大重复次数

    - `ModCount` – 自创建以来对字段进行的修改次数


    此示例返回数据库中每个表每个字段的所有七个值：


    ```

    "SELECT * FROM FileMaker_Fields"

    ```


    由于此系统表包含基于*表出现*的字段，如果基础表有多个出现，结果将包含重复项。迭代过程（如`While`函数（第[13]章）、递归自定义函数（第[15]章）或循环脚本（第[25]章“使用重复语句迭代”））可以获取每个基础表的名称，然后逐步通过这些名称检索每个表的字段，从而避免重复。以下示例展示了一个简单的`While`语句，演示了如何做到这一点：


    ```

    While (

    [

    baseTables =

    ExecuteSQL ( "SELECT DISTINCT BaseTableName FROM FileMaker_Tables" ; "" ; "" )
    ;

    result = ""

    ] ;

    baseTables ≠ "" ;

    [

    current.table = GetValue ( baseTables ; 1 ) ;

    baseTables = RightValues ( baseTables ; ValueCount ( baseTables ) - 1 ) ;

    current.fields =

    ExecuteSQL (

    "SELECT * FROM FileMaker_Fields WHERE TableName=''" & current.table & "''" ; ""
    ; ""

    ) ;

    result = result & current.fields

    ] ;

    result

    )

    ```


    ## 探索其他 SQL 功能


    除了本章涵盖的内容之外，FileMaker 还包含额外的 SQL 功能。可以将许多函数嵌入到`SELECT`语句中以处理结果，其中许多函数提供的功能类似于
    FileMaker 自己的函数。有多种命令可用于处理日期、时间和字符串。数值可以进行聚合或用于数学计算。可以嵌入条件操作，并且可以将许多运算符与字段值和 SQL
    函数一起使用来处理结果。`Execute SQL`脚本步骤允许对来自外部数据库的外部 ODBC/JDBC 数据源进行更强大的操作。此外，FileMaker
    数据库可以用作 ODBC/JDBC 数据源，并支持来自外部数据库的 SQL 查询。有关这些主题的更多信息，请访问[*www.*`claris.com`](http://www.claris.com)并搜索`FileMaker
    ODBC and JDBC Guide`或`FileMaker SQL Reference`文档。


    ## 总结


    本章介绍了使用`ExecuteSQL`函数的基础知识，并提供了`SELECT`语句许多功能的示例。在下一章中，我们将开始探索布局设计，为用户提供访问数据结构界面的入口。


    # 第四部分 设计用户界面


    界面为用户和脚本与存储在基础表结构中的数据进行交互提供了接入点。它是数据库最突出的部分，可以说是最重要的部分之一。以下章节探讨布局设计的基础知识：


    1.  介绍布局

    2.  布局入门

    3.  探索布局面板

    4.  创建布局对象

    5.  操作对象

    6.  使用主题和样式

    7.  自定义菜单


    # 17. 介绍布局


    *布局*是开发者设计的图形模板，定义了如何渲染记录、字段和对象以产生交互式体验。每个数据库窗口一次显示一个布局。在特定时刻激活的布局字面上称为*当前布局*。当数据库打开时，这是一个根据数据库配置方式选择的默认布局。它可能是在*文件选项*（第[6]章）中选择的布局、由*脚本触发器*（第[27]章）打开的布局，或者在本地计算机上运行时文件关闭时最后打开的布局。与
    Claris 入门解决方案中方便的预定义布局不同，自定义数据库从一个空布局开始，开发者必须从中设计界面。本章通过介绍布局基础知识开始探讨界面设计，包括：


    - 理解上下文访问

    - 剖析布局

    - 规划布局

    - 使用布局模式'
  raw: '### Selecting FileMaker_Tables


    The *FileMaker_Tables* table contains one virtual record for every *table occurrence*
    defined in the relationship graph with the following fields of information:


    *   *TableName* – The name of the table occurrence


    *   *TableID* – An identification number for the table occurrence


    *   *BaseTableName* – The name of the base table for the table occurrence


    *   *BaseFileName* – The name of the file in which the occurrence’s base table
    exists


    *   *ModCount* – The number of modifications made to the table structure since
    its creation


    To select all five fields for every table occurrence in the database, use the
    following query formula in the *ExecuteSQL* function:


    ```

    "SELECT * FROM FileMaker_Tables"

    // Result =

    Company,1065101,Company,Learn FileMaker,20

    Company | Contact,1065105,Contact,Learn FileMaker,24

    Contact,1065102,Contact,Learn FileMaker,24

    Contact | Company,1065106,Company,Learn FileMaker,20

    Project,1065103,Project,Learn FileMaker,4

    Project | Company,1065107,Company,Learn FileMaker,20

    Sandbox,1065089,Sandbox,Learn FileMaker,134

    ```


    This example specifies a result of only the *TableName* field:


    ```

    "SELECT TableName FROM FileMaker_Tables"

    // Result =

    Company

    Company | Contact

    Contact

    Contact | Company

    Project

    Project | Company

    Sandbox

    ```


    This example limits the results to the actual table names using `SELECT DISTINCT`
    and the *BaseTableName*:


    ```

    "SELECT DISTINCT BaseTableName FROM FileMaker_Tables"

    //Result =

    Company

    Contact

    Project

    Sandbox

    ```


    ### Selecting FileMaker_Fields


    The *FileMaker_Fields* table contains one virtual record for every *field* defined
    in the database with the following meta-information available:


    *   *TableName* – The name of the field’s table occurrence


    *   *FieldName* – The name of the field


    *   *FieldType* – The SQL data type of the file


    *   *FieldID* – An identification number for the field


    *   *FieldClass* – The class of the field: *Normal*, *Summary*, or *Calculated*


    *   *FieldReps* – The number of maximum repetitions defined


    *   *ModCount* – The number of modifications made to the field since it was created


    This example returns all seven values for every field for every table in the database:


    ```

    "SELECT * FROM FileMaker_Fields"

    ```


    Since this system table contains fields based on *table occurrences*, the results
    will include duplicates if there is more than one occurrence for a given base
    table. An iterative process like a *While* function (Chapter [13](#429700_2_En_13_Chapter.xhtml)),
    a recursive custom function (Chapter [15](#429700_2_En_15_Chapter.xhtml)), or
    a looping script (Chapter [25](#429700_2_En_25_Chapter.xhtml), “Iterating with
    Repeating Statements”) can get the name of every base table and then step through
    these to retrieve the fields for each, thereby avoiding any duplicates. The following
    example shows a simple *While* statement that demonstrates how to do this:


    ```

    While (

    [

    baseTables =

    ExecuteSQL ( "SELECT DISTINCT BaseTableName FROM FileMaker_Tables" ; "" ; "" )
    ;

    result = ""

    ] ;

    baseTables ≠ "" ;

    [

    current.table = GetValue ( baseTables ; 1 ) ;

    baseTables = RightValues ( baseTables ; ValueCount ( baseTables ) - 1 ) ;

    current.fields =

    ExecuteSQL (

    "SELECT * FROM FileMaker_Fields WHERE TableName=''" & current.table & "''" ; ""
    ; ""

    ) ;

    result = result & current.fields

    ] ;

    result

    )

    ```


    ## Exploring Other SQL Features


    FileMaker includes additional SQL functionality beyond the material covered in
    this chapter. Numerous functions can be embedded into a `SELECT` statement to
    manipulate the results, many providing functionality like FileMaker’s own functions.
    There are commands available to manipulate dates, times, and strings. Numeric
    values can be aggregated or used in mathematical computations. Conditional actions
    can be embedded, and numerous operators can be used with field values and SQL
    functions to manipulate results. The *Execute SQL* script step allows more robust
    manipulation of external ODBC/JDBC data sources from external databases. Also,
    a FileMaker database can be used as an ODBC/JDBC data source and supports SQL
    queries from external databases. For more information about these topics, visit
    [*www.*`claris.com`](http://www.claris.com) and search for the *FileMaker ODBC
    and JDBC Guide* or *FileMaker SQL Reference* documents.


    ## Summary


    This chapter introduced the basics of using the *ExecuteSQL* function and provided
    examples of many features of the `SELECT` statement. In the next chapter, we begin
    to explore layout design, giving users an interface access into your data structure.


    # Part IVDesigning


    User Interfaces


    An interface provides an access point for user and script interactions with the
    data stored in the foundational table structure. It is the most prominent part
    of a database and arguably one of the most important. These chapters explore the
    basics of layout design:


    1.  *Introducing Layouts*


    2.  *Getting Started with Layouts*


    3.  *Exploring Layout Panes*


    4.  *Creating Layout Objects*


    5.  *Manipulating Objects*


    6.  *Using Themes and Styles*


    7.  *Customizing Menus*


    # 17. Introducing Layouts


    A *layout* is a developer-designed graphical template that defines how records,
    fields, and objects will be rendered to produce an interactive experience. Each
    database window displays one layout at a time. The layout active at a given moment
    in time is referred to literally as the *current layout*. When a database opens,
    this is a default layout selected based on how the database is configured. It
    may be a selected layout in *File Options* (Chapter [6](#429700_2_En_6_Chapter.xhtml)),
    one opened by a *Script Trigger* (Chapter [27](#429700_2_En_27_Chapter.xhtml)),
    or the last layout that was open when the file was closed while running on a local
    computer. Unlike the convenient predefined layouts in Claris starter solutions,
    a custom database begins with a single empty layout from which a developer must
    design an interface. This chapter begins exploring interface design by introducing
    layout basics, including


    *   Understanding contextual access


    *   Anatomizing a layout


    *   Planning layouts


    *   Using Layout mode'
