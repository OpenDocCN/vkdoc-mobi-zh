    #### Sliding & Visibility


    The *Sliding & Visibility* group , shown in Figure [19-8](#429700_2_En_19_Chapter.xhtml#Fig8),
    controls how objects behave when printing, saving as a PDF file, or viewing in
    preview mode. There are three primary options: *Sliding left*, *Sliding up based
    on,* and *Hide when printing*.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig8_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig8_HTML.jpg)


    Figure 19-8


    The Sliding & Visibility controls on the Position tab of the Inspector pane


    The *Sliding left* option causes an object to shrink its width to the minimum
    required to display its content and to slide left as far as possible based on
    the other objects within the same horizontal plane.


    The *Sliding up based on* option causes an object to shrink its height to the
    minimum required to display its content and to slide up as far as possible based
    on the other objects in the same vertical plane. When this object is selected,
    other options below will become enabled. Select the *All objects above* option
    to cause objects in a common horizontal plane to slide up *together* relative
    to objects resizing above them. Select the *Only objects directly above* option
    to cause objects in a common horizontal plane to slide up independent of each
    other relative to resizing objects directly above them. Select the *Also resize
    enclosing part* checkbox to cause the layout part enclosing the object to shrink
    vertically relative to the lowest object after all resizing is complete. For example,
    a notes field can be expanded on a large layout part to accommodate the potential
    for lengthy content will end up shrinking to only the space necessary to display
    the actual content .


    The *Hide when printing* causes an object to be invisible when printing.


    #### Grid


    The *layout grid* is a sequence of evenly spaced horizontal and vertical lines
    overlaid on a layout background to form a regular grid of minor and major areas,
    shown in Figure [19-9](#429700_2_En_19_Chapter.xhtml#Fig9). The grid is only visible
    in Layout mode to assist with precision manual placement and spacing of objects.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig9_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig9_HTML.jpg)


    Figure 19-9


    The grid visible on the background of a layout


    The *Grid* group in the *Inspector* pane, shown in Figure [19-10](#429700_2_En_19_Chapter.xhtml#Fig10),
    contains settings that control the layout grid, universally on every layout in
    the current file. The *Show grid* checkbox enables the grid in Layout view. Selecting
    *Snap to grid* forces objects to fall on grid lines when manually dragged to a
    new position. The major and minor grid spacing can be customized in the two fields.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig10_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig10_HTML.jpg)


    Figure 19-10


    The Grid controls on the Position tab of the Inspector pane


    ### Inspecting the Style Settings


    The *Style* settings located on the second tab of the *Inspector* pane display
    and control the theme and style assigned to the layout and selected object (Chapter
    [22](#429700_2_En_22_Chapter.xhtml)).


    ### Inspecting the Appearance Settings


    The *Appearance* settings located on the third tab of the *Inspector* pane are
    divided into six regions: *Theme and Style*, *Graphic*, *Advanced Graphic*, *Text*,
    *Paragraph*, and *Tabs*. All but the first of these can be collapsed or expanded.


    #### Theme and Style


    The *Theme and Style* group is a non-collapsible section of the panel that displays
    the theme and style assigned to the layout with adjacent icon menus for updating
    these when changes are made. The pop-up menus below these allow selection of an
    *object part type* and *object part state,* and each combination of these has
    a different set of format settings in the rest of the *Appearance* panel (Chapter
    [22](#429700_2_En_22_Chapter.xhtml), “Editing an Object’s Style Settings”).'
  trans: '

    #### 自动调整大小


    “`Autosizing`（自动调整大小）”组（如图 19-6 所示）包含锚定控制，用于控制窗口调整大小时对象的移动或增长方式。通过切换框对应侧边的锁定图标开启或关闭，可以将对象锚定到`左侧`、`顶部`、`右侧`或`底部`。在非布局模式下调整窗口大小时，任何一侧的锁定都意味着该侧对象与布局/窗口对应边缘之间的当前距离将保持不变。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig6_HTML.jpg](img/429700_2_En_19_Fig6_HTML.jpg)


    图 19-6


    检查器窗格“位置”选项卡上的自动调整大小设置


    以不同组合方式使用这些锁定可以产生多种不同的定位和大小调整效果。锁定`顶部`和`左侧`可使对象在窗口调整大小时保持其大小并保持静止。要固定到布局的右下角，只需锚定`底部`和`右侧`。当两个相对的锚点激活时，对象将扩展其大小。例如，要在窗口调整大小时扩展对象的宽度，请激活`左侧`和`右侧`锚点。没有锚定的对象将浮动在窗口的中央。


    #### 排列与对齐


    “`Arrange & Align`（排列与对齐）”组（如图 19-7 所示）包含排列成三行的六组按钮，用于调整对象对齐、分布间距、相对大小、分组状态、排列顺序和锁定状态。与`检查器`窗格中的其他设置不同，这些不是对象属性，而是用于整齐排列选定对象以收紧界面设计的工具。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig7_HTML.jpg](img/429700_2_En_19_Fig7_HTML.jpg)


    图 19-7


    检查器窗格“位置”选项卡上的排列控制


    - `对齐` – 按侧边对齐对象：`左对齐`、`居中对齐`、`右对齐`、`顶对齐`、`中对齐`或`底对齐`。

    - `间距` – `水平`或`垂直`均匀分布对象组。

    - `调整大小` – 根据组中最小或最大的对象同步一组对象的高度和/或宽度。

    - `分组` – 将单个对象转换为一组或取消分组。

    - `排列` – 使用`置于顶层`、`上移一层`、`下移一层`和`置于底层`更改所选对象的堆叠顺序。

    - `锁定` – 更改对象的锁定状态。锁定可防止意外修改。


    #### 滑动与可见性


    “`Sliding & Visibility`（滑动与可见性）”组（如图 19-8 所示）控制对象在打印、另存为 PDF 文件或在预览模式下查看时的行为。主要有三个选项：`向左滑动`、`基于……向上滑动`和`打印时隐藏`。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig8_HTML.jpg](img/429700_2_En_19_Fig8_HTML.jpg)


    图 19-8


    检查器窗格“位置”选项卡上的滑动与可见性控制


    `向左滑动`选项使对象的宽度缩小到显示其内容所需的最小宽度，并根据同一水平面上的其他对象尽可能向左滑动。


    `基于……向上滑动`选项使对象的高度缩小到显示其内容所需的最小高度，并根据同一垂直面上的其他对象尽可能向上滑动。选中此对象后，下方的其他选项将变为可用。选择`所有上方对象`选项可使同一水平面上的对象相对于其上方正在调整大小的对象*一起*向上滑动。选择`仅正上方对象`选项可使同一水平面上的对象相对于其正上方正在调整大小的对象彼此独立地向上滑动。选中`同时调整封闭部件大小`复选框，可使在完成所有大小调整后，包围该对象的布局部件相对于最低的对象垂直缩小。例如，可以在较大的布局部件上展开备注字段，以容纳可能较长的内容，最终将仅缩小到显示实际内容所需的空间。


    `打印时隐藏`使对象在打印时不可见。


    #### 网格


    “布局网格”是一系列等间距的水平线和垂直线，覆盖在布局背景之上，形成由次要区域和主要区域组成的规则网格，如图 19-9 所示。网格仅在布局模式下可见，用于辅助对象的手动精确定位和间距调整。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig9_HTML.jpg](img/429700_2_En_19_Fig9_HTML.jpg)


    图 19-9


    布局背景上可见的网格


    `检查器`窗格中的“`Grid`（网格）”组（如图 19-10 所示）包含控制布局网格的设置，这些设置普遍适用于当前文件中的每个布局。`显示网格`复选框可在布局视图中启用网格。选中`对齐到网格`可强制手动拖拽对象到新位置时使其落在网格线上。可以在两个字段中自定义主要和次要网格间距。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig10_HTML.jpg](img/429700_2_En_19_Fig10_HTML.jpg)


    图 19-10


    检查器窗格“位置”选项卡上的网格控制


    ### 检查样式设置


    位于`检查器`窗格第二个选项卡上的“`Style`（样式）”设置用于显示和控制分配给布局和所选对象的主题和样式（第 22 章）。


    ### 检查外观设置


    位于`检查器`窗格第三个选项卡上的“`Appearance`（外观）”设置分为六个区域：`主题和样式`、`图形`、`高级图形`、`文本`、`段落`和`制表符`。除第一个区域外，其他区域均可折叠或展开。


    #### 主题和样式


    “`Theme and Style`（主题和样式）”组是该面板中不可折叠的部分，用于显示分配给布局的主题和样式，并带有相邻的图标菜单，以便在进行更改时进行更新。这些菜单下方的弹出菜单允许选择`对象部件类型`和`对象部件状态`，每种组合在“`Appearance`（外观）”面板的其余部分都有一组不同的格式设置（第
    22 章，“编辑对象的样式设置”）。

    '
- fmt: '### Graphic


    `Graphic`组，如图[19-11](#429700_2_En_19_Chapter.xhtml#Fig11)所示，控制所选对象的选定部件类型和状态的图形设置。


    `Fill`菜单包含四个选项，这些选项会条件性地改变其下方可用的选项：`None`、`Solid Color`、`Gradient`或`Image`。默认选项为`None`，表示对象将是透明的。选择`Solid
    Color`可选择填充颜色，或选择`Gradient`以访问更高级的填充设置，两者均使用熟悉的控件。`Image`选项允许选择将作为背景显示的图像文件。弹窗菜单允许选择图像的处理方式，包含以下选项：`Original
    Size`、`Scale to Fit`、`Scale to Fill`、`Slice`和`Tile`。


    `Line`选项包括对象边框类型的选择：`None`、`Solid`、`Dashed`和`Dotted`。可以指定粗细值和颜色。边框图标允许选择对象的哪些维度具有边框：`All`、`Left`、`Top`、`Right`、`Bottom`和`Between
    repetitions in repeating fields`。最后，`Corner Radius`是一个数值，表示边框角落的圆角像素值，该值将应用于相邻可点击象限选择器中所选的角落。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig11_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig11_HTML.jpg)


    *图 19-11*

    检查器外观面板中的图形子组


    ### Advanced Graphic


    `Advanced Graphic`组，如图[19-12](#429700_2_En_19_Chapter.xhtml#Fig12)所示，控制所选对象的选定部件和状态的高级图形设置。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig12_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig12_HTML.jpg)


    *图 19-12*

    检查器外观面板中的高级图形子组


    `Effects`复选框可为对象启用外部和内部阴影，使用相邻的图标按钮打开一个面板，可设置`Color`、`Offsets`、`Opacity`、`Blur`和`Spread`的具体设置。


    `Padding`数值控制对象边框与其内容之间的距离。这些设置可能与`Paragraph`组的`indentation`和`spacing`设置冲突，如果同时使用，可能会导致混淆。


    ### Text


    `Text`组控制所选对象的选定部件和状态的标准文本和样式设置。这些包括字体`family`、`style`和`size`的选择，以及`color`和`style`的文本设置，还有`type`、`thickness`、`color`和`offset`的基线设置。


    ### Paragraph


    `Paragraph`组，如图[19-13](#429700_2_En_19_Chapter.xhtml#Fig13)所示，控制所选对象的选定部件和状态的段落对齐和间距设置。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig13_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig13_HTML.jpg)


    *图 19-13*

    检查器外观面板中的段落子组


    `Alignment`图标控制对象内文本的水平与垂直对齐方式，例如：字段内容、按钮名称等。`Line spacing`选项根据选定的度量单位调整段落的间距：`height`、`space
    above`和`space below`。`Indents`设置会在段落的第一行以及整个`left`和`right`缩进处插入文本空间，所有这些都基于选定的度量单位。


    > **注意：** 这些设置中的某些可能与内边距（padding）设置冲突，如果同时使用，可能会导致混淆。


    ### Tabs


    `Tabs`组，如图[19-14](#429700_2_En_19_Chapter.xhtml#Fig14)所示，控制所选对象中文本的制表符缩进间距。点击按钮可在列表中添加或删除`Tab
    positions`。点击某个位置可编辑其测量值，并选择`Alignment`和`Leader`字符。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig14_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig14_HTML.jpg)


    *图 19-14*

    检查器外观面板中的制表符子组


    ### Inspecting the Data Settings


    `Data`设置位于检查器的第四个面板，分为三个可折叠区域：`Field`、`Behavior`和`Data Formatting`。


    #### Field


    `Field`组，如图[19-15](#429700_2_En_19_Chapter.xhtml#Fig15)所示，控制所选字段的设置。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig15_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig15_HTML.jpg)


    *图 19-15*

    检查器数据面板中的字段子组


    1.  `Display Data from` – 通过点击相邻按钮打开`Specify Field`对话框（见第[20]章(#429700_2_En_20_Chapter.xhtml)，"探索指定字段对话框"），选择一个要分配给布局上选定字段对象的字段。


    2.  `Placeholder Text` – 输入文本或点击图标定义一个公式，该公式将在字段为空时显示（见第[20]章(#429700_2_En_20_Chapter.xhtml)，"使用字段占位符"）。


    3.  `Control Style` – 选择字段的输入样式。下方阴影区域内的设置将根据所选内容而变化（见第[20]章(#429700_2_En_20_Chapter.xhtml)，"配置字段的控件样式"）。


    4.  `Show Repetitions` – 控制字段的哪些重复项显示在布局上，及其垂直或水平方向（见第[8]章(#429700_2_En_8_Chapter.xhtml)，"字段选项：存储"）。


    #### Behavior


    `Behavior`组，如图[19-16](#429700_2_En_19_Chapter.xhtml#Fig16)所示，控制各种对象行为。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig16_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig16_HTML.jpg)


    *图 19-16*

    检查器数据面板中的行为子组


    1.  `Hide Object When` – 控制任何对象何时应被隐藏。直接在该字段中输入公式，或使用相邻按钮打开对话框。复选框可启用在查找模式下隐藏。


    2.  `Field Entry` – 启用在浏览或查找模式下用户可进入该字段。下方的复选框会导致当字段获得焦点时，字段的全部内容被选中。


    3.  `Go to Next Object Using` – 选择哪个按键可跳转到下一个字段/对象。默认情况下，FileMaker使用`Tab`键跳转字段，使用`Enter`键提交记录。在此处启用`Return`可防止用户在字段中输入回车字符。


    4.  `Quick Find and Spell-Checking` – 控制字段是否包含在`Quick Find`中（见第[4]章(#429700_2_En_4_Chapter.xhtml)，"使用快速查找搜索"），并会直观地突出显示拼写错误。


    5.  `Select Input Method` – 为字段输入选择一种语言。


    6.  `Touch Keyboard Type` – 为iOS设备选择一种键盘类型：`ASCII`、`URL`、`Email`、`Numeric`、`Phone`等。'
  raw: '#### Graphic


    The *Graphic* group, shown in Figure [19-11](#429700_2_En_19_Chapter.xhtml#Fig11),
    controls graphic settings of the chosen part type and state of selected objects.


    The *Fill* menu contains four choices that conditionally change the options available
    below it: *None*, *Solid Color*, *Gradient,* or *Image*. The default option is
    *None* and means that the object will be transparent. Select *Solid Color* to
    have the option to choose a fill color or *Gradient* to access more advanced fill
    settings, both using familiar controls. The *Image* option allows selection of
    an image file that will be displayed as a background. A pop-up menu allows selection
    of how the image is handled with the following options: *Original Size*, *Scale
    to Fit*, *Scale to Fill*, *Slice,* and *Tile*.


    The *Line* options include the selection of the object’s border type: *None*,
    *Solid*, *Dashed*, and *Dotted*. A number of thickness and a color can be specified.
    The border icons allow selection of which dimensions of an object have a border:
    *All*, *Left*, *Top*, *Right*, *Bottom,* and *Between repetitions in repeating
    fields*. Finally, a *Corner Radius* is a number indicating the rounding points
    (pixels) for border corners that will be applied to the corners selected in the
    adjacent clickable quadrant selector.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig11_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig11_HTML.jpg)


    Figure 19-11


    The Graphic subgroup of the Appearance panel of the Inspector


    #### Advanced Graphic


    The *Advanced Graphic* group, shown in Figure [19-12](#429700_2_En_19_Chapter.xhtml#Fig12),
    controls advanced graphical settings of the chosen part and state of the selected
    object.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig12_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig12_HTML.jpg)


    Figure 19-12


    The Advanced Graphic subgroup of the Appearance panel of the Inspector


    The *Effects* checkboxes enable an outer and inner shadow on the object using
    the adjacent icon button to open a panel with specific settings for *Color*, *Offsets*,
    *Opacity*, *Blur,* and *Spread*.


    The *Padding* numbers control the amount of distance between the border of the
    object and its content. These settings may compete with the *Paragraph* group’s
    settings for *indentation* and *spacing*, causing confusion if used simultaneously.


    #### Text


    The *Text* group controls standard text and style settings for the chosen part
    and state of the selected object. These include a selection of font *family*,
    *style,* and *size*, text settings for *color* and *style*, as well as baseline
    settings for *type*, *thickness*, *color,* and *offset*.


    #### Paragraph


    The *Paragraph* group, shown in Figure [19-13](#429700_2_En_19_Chapter.xhtml#Fig13),
    controls paragraph alignment and spacing settings of a chosen part and state of
    the selected object.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig13_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig13_HTML.jpg)


    Figure 19-13


    The Paragraph subgroup of the Appearance panel of the Inspector


    The *Alignment* icons control the horizontal and vertical alignment of text within
    the object, e.g., a field’s content, button’s name, etc. The *Line spacing* options
    adjust the spacing of paragraphs, *height*, *space above*, and *space below,*
    based on a selected unit of measure. The *Indents* settings insert space for text
    on the *first line* of a paragraph and the entire *left* and *right* indent, all
    based on a selected unit of measure.


    Caution


    Some of these settings may compete with the padding settings and may cause confusion
    if used simultaneously.


    #### Tabs


    The *Tabs* group, shown in Figure [19-14](#429700_2_En_19_Chapter.xhtml#Fig14),
    controls tabbed indentation spacing of the text in the selected object. Click
    the buttons to add or remove *Tab positions* in the list. Click on a position
    to edit the measurement, and choose an *Alignment* and *Leader* character.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig14_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig14_HTML.jpg)


    Figure 19-14


    The Tab subgroup of the Appearance panel of the Inspector


    ### Inspecting the Data Settings


    The *Data* settings are located on the fourth panel of the *Inspector* and are
    divided into three collapsible regions: *Field*, *Behavior*, and *Data Formatting*.


    #### Field


    The *Field* group, shown in Figure [19-15](#429700_2_En_19_Chapter.xhtml#Fig15),
    controls settings of a selected field.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig15_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig15_HTML.jpg)


    Figure 19-15


    The Field subgroup of the Data panel of the Inspector


    1.  *Display Data from* – Choose a field to assign to the selected field object
    on the layout by clicking the adjacent button to open a *Specify Field* dialog
    (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Exploring the Specify Field Dialog”).


    2.  *Placeholder Text* – Enter text or click the icon to define a formula that
    will be displayed in a field when it is empty (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Using Field Placeholders”).


    3.  *Control Style* – Select an input style for the field. The settings in the
    shaded area below will vary depending on the selection (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Configuring a Field’s Control Style”).


    4.  *Show Repetitions* – Controls which repetitions of a field are displayed on
    the layout and their vertical or horizontal orientation (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    “Field Options: Storage”).


    #### Behavior


    The *Behavior* group, shown in Figure [19-16](#429700_2_En_19_Chapter.xhtml#Fig16),
    controls various object behaviors.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig16_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig16_HTML.jpg)


    Figure 19-16


    The Behavior subgroup of the Data panel of the Inspector


    1.  *Hide Object When* – Control when any object should be hidden. Enter a formula
    directly into the field, or open a dialog with the adjacent button. The checkbox
    enables hiding in Find mode.


    2.  *Field Entry* – Enable a field for user entry in Browse or Find modes. The
    checkbox below causes the entire contents of the field to be selected when a field
    acquires focus.


    3.  *Go to Next Object Using* – Select which key(s) jump to the next field/object.
    By default, FileMaker uses a *Tab* to jump fields and *Enter* to commit a record.
    Enabling Return here prevents the user from typing a return character in the field.


    4.  *Quick Find and Spell-Checking* – Control if a field is included in a *Quick
    Find* (Chapter [4](#429700_2_En_4_Chapter.xhtml), “Searching with Quick Find”)
    and will visually highlight spelling errors.


    5.  *Select Input Method* – Choose a language for a field input.


    6.  *Touch Keyboard Type* – Choose a keyboard type for an iOS device: *ASCII*,
    *URL*, *Email*, *Numeric*, *Phone*, etc.'
  trans: '

    ### 图形


    `Graphic`组，如图 19-11 所示，控制所选对象的选定部件类型和状态的图形设置。


    `Fill`菜单包含四个选项，这些选项会条件性地改变其下方可用的选项：`None`、`Solid Color`、`Gradient`或`Image`。默认选项为`None`，表示对象将是透明的。选择`Solid
    Color`可选择填充颜色，或选择`Gradient`以访问更高级的填充设置，两者均使用熟悉的控件。`Image`选项允许选择将作为背景显示的图像文件。弹窗菜单允许选择图像的处理方式，包含以下选项：`Original
    Size`、`Scale to Fit`、`Scale to Fill`、`Slice`和`Tile`。


    `Line`选项包括对象边框类型的选择：`None`、`Solid`、`Dashed`和`Dotted`。可以指定粗细值和颜色。边框图标允许选择对象的哪些维度具有边框：`All`、`Left`、`Top`、`Right`、`Bottom`和`Between
    repetitions in repeating fields`。最后，`Corner Radius`是一个数值，表示边框角落的圆角像素值，该值将应用于相邻可点击象限选择器中所选的角落。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig11_HTML.jpg](img/429700_2_En_19_Fig11_HTML.jpg)


    *图 19-11*

    检查器外观面板中的图形子组


    ### 高级图形


    `Advanced Graphic`组，如图 19-12 所示，控制所选对象的选定部件和状态的高级图形设置。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig12_HTML.jpg](img/429700_2_En_19_Fig12_HTML.jpg)


    *图 19-12*

    检查器外观面板中的高级图形子组


    `Effects`复选框可为对象启用外部和内部阴影，使用相邻的图标按钮打开一个面板，可设置`Color`、`Offsets`、`Opacity`、`Blur`和`Spread`的具体设置。


    `Padding`数值控制对象边框与其内容之间的距离。这些设置可能与`Paragraph`组的`indentation`和`spacing`设置冲突，如果同时使用，可能会导致混淆。


    ### 文本


    `Text`组控制所选对象的选定部件和状态的标准文本和样式设置。这些包括字体`family`、`style`和`size`的选择，以及`color`和`style`的文本设置，还有`type`、`thickness`、`color`和`offset`的基线设置。


    ### 段落


    `Paragraph`组，如图 19-13 所示，控制所选对象的选定部件和状态的段落对齐和间距设置。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig13_HTML.jpg](img/429700_2_En_19_Fig13_HTML.jpg)


    *图 19-13*

    检查器外观面板中的段落子组


    `Alignment`图标控制对象内文本的水平与垂直对齐方式，例如：字段内容、按钮名称等。`Line spacing`选项根据选定的度量单位调整段落的间距：`height`、`space
    above`和`space below`。`Indents`设置会在段落的第一行以及整个`left`和`right`缩进处插入文本空间，所有这些都基于选定的度量单位。


    > **注意：** 这些设置中的某些可能与内边距（padding）设置冲突，如果同时使用，可能会导致混淆。


    ### 制表符


    `Tabs`组，如图 19-14 所示，控制所选对象中文本的制表符缩进间距。点击按钮可在列表中添加或删除`Tab positions`。点击某个位置可编辑其测量值，并选择`Alignment`和`Leader`字符。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig14_HTML.jpg](img/429700_2_En_19_Fig14_HTML.jpg)


    *图 19-14*

    检查器外观面板中的制表符子组


    ### 检查数据设置


    `Data`设置位于检查器的第四个面板，分为三个可折叠区域：`Field`、`Behavior`和`Data Formatting`。


    #### 字段


    `Field`组，如图 19-15 所示，控制所选字段的设置。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig15_HTML.jpg](img/429700_2_En_19_Fig15_HTML.jpg)


    *图 19-15*

    检查器数据面板中的字段子组


    1.  `Display Data from` – 通过点击相邻按钮打开`Specify Field`对话框（见第[20]章(#429700_2_En_20_Chapter.xhtml)，"探索指定字段对话框"），选择一个要分配给布局上选定字段对象的字段。


    2.  `Placeholder Text` – 输入文本或点击图标定义一个公式，该公式将在字段为空时显示（见第[20]章(#429700_2_En_20_Chapter.xhtml)，"使用字段占位符"）。


    3.  `Control Style` – 选择字段的输入样式。下方阴影区域内的设置将根据所选内容而变化（见第[20]章(#429700_2_En_20_Chapter.xhtml)，"配置字段的控件样式"）。


    4.  `Show Repetitions` – 控制字段的哪些重复项显示在布局上，及其垂直或水平方向（见第[8]章(#429700_2_En_8_Chapter.xhtml)，"字段选项：存储"）。


    #### 行为


    `Behavior`组，如图 19-16 所示，控制各种对象行为。


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig16_HTML.jpg](img/429700_2_En_19_Fig16_HTML.jpg)


    *图 19-16*

    检查器数据面板中的行为子组


    1.  `Hide Object When` – 控制任何对象何时应被隐藏。直接在该字段中输入公式，或使用相邻按钮打开对话框。复选框可启用在查找模式下隐藏。


    2.  `Field Entry` – 启用在浏览或查找模式下用户可进入该字段。下方的复选框会导致当字段获得焦点时，字段的全部内容被选中。


    3.  `Go to Next Object Using` – 选择哪个按键可跳转到下一个字段/对象。默认情况下，FileMaker 使用`Tab`键跳转字段，使用`Enter`键提交记录。在此处启用`Return`可防止用户在字段中输入回车字符。


    4.  `Quick Find and Spell-Checking` – 控制字段是否包含在`Quick Find`中（见第[4]章(#429700_2_En_4_Chapter.xhtml)，"使用快速查找搜索"），并会直观地突出显示拼写错误。


    5.  `Select Input Method` – 为字段输入选择一种语言。


    6.  `Touch Keyboard Type` – 为 iOS 设备选择一种键盘类型：`ASCII`、`URL`、`Email`、`Numeric`、`Phone`等。

