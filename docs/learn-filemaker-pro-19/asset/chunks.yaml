  trans: "\n### 创建新窗口\n\n选择 `Window ➤ New Window` 菜单来手动创建新窗口。新窗口将显示在当前窗口的前方，并略微偏移。它最初会是当前窗口的完全副本，具有相同的属性：`名称`（带后缀）、模式、视图、尺寸、**工具栏可见性**、布局、找到的记录集和当前记录。打开后，可以通过搜索、导航、移动和调整大小来更改这些属性。\n\
    \n多窗口非常适合并排查看记录或在不同的工作之间交替。然而，如果用户试图编辑一个在其他窗口中拥有活动焦点的记录，将会出现冲突警告。因此，建议用户谨慎使用此功能，并提醒他们在完成需要多个窗口的任务后，关闭多余的窗口并恢复到单个窗口。选择\
    \ `File ➤ Close Window` 菜单或点击窗口标题栏上的关闭图标即可关闭窗口。\n\n### 从菜单中选择窗口\n\n每个新窗口都会添加到\
    \ `Window` 菜单底部的列表中，如图 3-8 所示。这是一个混合列表，包含*所有打开的数据库*中所有可见的打开窗口，也包括那些位于屏幕外的窗口。该列表显示了窗口从前到后的当前堆叠顺序。选择一个窗口可将其置于最前。\n\
    \n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig8_HTML.jpg](img/429700_2_En_3_Fig8_HTML.jpg)\n\
    \n**图 3-8**  \nWindow 菜单底部列出了所有可见窗口\n\n### 隐藏和显示窗口\n\n窗口可以保持打开状态但被隐藏。当数据库打开另一个数据库以访问其资源时，或者当脚本明确隐藏窗口时，会自动发生这种情况。用户可以通过选择\
    \ `Window ➤ Hide Window` 菜单手动隐藏窗口。每个隐藏的窗口都列在 `Window ➤ Show Window` 子菜单下，如图 3-9\
    \ 所示。从此列表中选择一个窗口会使其可见并将其置于最前。`Bring All To Front` 选项可使所有隐藏窗口变为可见。屏幕外的窗口可以通过 `Tile\
    \ Horizontally`、`Tile Vertically` 和 `Cascade Windows` 一次性全部恢复到视图中，并与屏幕上的窗口整齐排列。选择\
    \ `Minimize Window` 菜单项，可以将窗口最小化到 macOS 或 Windows 的 Dock 中。当最小化时，它会在菜单中列为一个已打开的窗口，但必须点击才能将其恢复到视图中。\n\
    \n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig9_HTML.jpg](img/429700_2_En_3_Fig9_HTML.jpg)\n\
    \n**图 3-9**  \n包含隐藏窗口的子菜单\n\n## 总结\n\n本章探讨了窗口的结构、工具栏控件以及管理多个窗口。在下一章中，我们将开始处理记录。\n\
    \n# 4. 处理记录\n\n`记录`是表中内容的主要单元，是一组共同代表特定实体的值。使用电子表格的比喻来类比数据库文件与电子表格文件：表就像一个工作表，字段就像一列，而记录就像一行。在`联系人`表中，一条记录代表*一个人*，而在`库存`表中，一条记录代表*一个产品*。在使用数据库时，用户大部分时间都在执行涉及创建、编辑、删除、排除、搜索、导出、导入、打印和查看记录的任务。尽管一个数据库可以包含多个不同的表，每个表都有自己的记录集合，但本章使用包含单个`联系人`表的\
    \ `Learn FileMaker 第 3-5 章`示例文件。这简化了示例，并为以后开发更复杂的自定义解决方案提供了必要的基本上下文。本章探讨用户与记录的交互，涵盖以下主题：\n\
    \n- 输入数据\n- 创建、删除和复制记录\n- 搜索记录\n- 处理找到的记录集\n- 打印\n\n## 输入数据\n\n数据输入任务涉及打开一条记录、聚焦到某个字段、修改字段内容、在字段之间移动，然后提交（关闭）记录或将其还原。\n\
    \n### 打开记录\n\n`打开`记录会使布局上的字段从显示信息的状态转变为可供数据输入的编辑状态。要打开当前记录进行数据输入，请点击布局中任何可编辑的字段，或按\
    \ `Tab` 键进入第一个可编辑字段。\n\n### 了解字段焦点\n\n当字段准备好接受输入时，它便具有`焦点`。一次只能有一个字段具有活动焦点，这一点可通过字段内闪烁的文本光标直观地指示出来。字段的视觉外观也可能根据应用于其`聚焦`状态的布局设置而变化（第\
    \ 22 章，“编辑对象的样式设置”）。布局的设计应提供一些视觉变化，让用户清楚地知道记录已打开，以及哪个字段将接收他们的输入。例如，字段边框可能变得可见、改变粗细或应用颜色。字段的填充颜色也可以改变。在\
    \ `Learn FileMaker` 示例文件中，焦点通过一个更深的简单边框表示，如图 4-1 所示。可以通过点击其他字段，或按 `Tab` 键或其他按键，根据字段设置将焦点移动到`制表顺序`中的下一个字段来转移焦点（第\
    \ 21 章）。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig1_HTML.jpg](img/429700_2_En_4_Fig1_HTML.jpg)\n\
    \n**图 4-1**  \nLearn FileMaker 示例文件中处于焦点的字段\n"
- fmt: "### Modifying Field Contents\n\nOnce a record is open and a field has focus,\
    \ the value in the field can be changed in several different ways depending on\
    \ the field’s data type (Chapter [8](#429700_2_En_8_Chapter.xhtml)) or the layout\
    \ behavior and formatting options (Chapters [19](#429700_2_En_19_Chapter.xhtml)\
    \ and [20](#429700_2_En_20_Chapter.xhtml)). These may include typing, cut, copy-paste,\
    \ undo-redo, insert functions, or mouse clicks.\n\nThe most common method of entering\
    \ data into any data entry field is by simply typing on the keyboard. As long\
    \ as a field is in focus, anything typed will flow in as its content.\n\nLike\
    \ most applications, FileMaker’s Edit menu has commands for cut, copy, paste,\
    \ undo, and redo. These functions only affect content stored in fields while they\
    \ are in focus. Undo, for example, will step back text changes just made in the\
    \ active field but does not reverse actions such as record creation or deletion\
    \ and doesn’t work after changes are committed when a record closes.\n\nWhen drag\
    \ and drop is enabled in the application preferences (Chapter [2](#429700_2_En_2_Chapter.xhtml)),\
    \ text can be dragged to rearrange it within a field. It can also be dragged from\
    \ one field to another, between fields in different windows and between fields\
    \ and text in other applications.\n\nThe Insert menu and similarly named submenu\
    \ of a field’s contextual menu contain functions for quickly inserting content\
    \ into fields. Each is contextually enabled depending on the data type of the\
    \ field in focus (Chapter [8](#429700_2_En_8_Chapter.xhtml)) and the field’s editable\
    \ status on the layout (Chapter [19](#429700_2_En_19_Chapter.xhtml)). Inserting\
    \ different files is made possible by selecting the Insert Picture, Insert Audio/Video,\
    \ Insert PDF, or Insert File functions. Quickly insert the Current Date, Current\
    \ Time, or Current Username using other functions. The From Index option is used\
    \ to select and insert a value into the current field from an indexed list of\
    \ values entered into that field on any record. The From Last Visited Record option\
    \ inserts the value of the current field from the last record viewed.\n\nFinally,\
    \ fields can also be configured with a control style that allows data entry with\
    \ mouse clicks. For example, a check box style allows selection of boxes to enter\
    \ a value, while a calendar style provides a graphical calendar for date entries\
    \ (Chapter [20](#429700_2_En_20_Chapter.xhtml)).\n\n### Closing a Record\n\nAfter\
    \ editing, a record must be closed to commit or revert changes. Reverting closes\
    \ a record and omits all changes made during the session. A record can be reverted\
    \ by selecting the Record ➤ Revert Record menu or running a script that performs\
    \ the function of the same name. Committing a record closes the record while saving\
    \ changes made during the session. During this process, FileMaker will perform\
    \ data entry validations and report problems if any are detected. A record can\
    \ be committed numerous ways. Manually commit a record by typing the Enter key\
    \ or clicking on the layout’s background, away from other objects. Other actions\
    \ that will commit the current record include navigating to another record, creating\
    \ a new record, closing the current window, closing the file, or running a script\
    \ that uses the Commit Records/Request script step.\n\n> **Tip**  \n> A layout\
    \ can be configured to automatically save changes or present a confirmation dialog\
    \ when committing (Chapter [18](#429700_2_En_18_Chapter.xhtml)).\n\n## Creating,\
    \ Deleting, and Duplicating Records\n\nUsers can create, delete, delete all, and\
    \ duplicate records. All of these commands are accessible to users through the\
    \ Records menu or a custom script. Some are also accessible through a toolbar\
    \ icon or the record contextual menu on the background of a layout.\n\nThe New\
    \ Record function will create a new blank record in the current layout’s table\
    \ of the front window and automatically open it with focus in the first field.\n\
    \nThe Delete Record function will permanently delete the current record in the\
    \ window after presenting a warning dialog to confirm the user’s intent. A user\
    \ can bypass this warning dialog and instantly delete a record by holding Option\
    \ (macOS) or Shift (Windows) while selecting the Delete Record option. While this\
    \ may be a useful tip for power users, it can be dangerous and shouldn’t be shared\
    \ with new users. It may be prudent to disable this ability using custom menus\
    \ (Chapter [23](#429700_2_En_23_Chapter.xhtml)). The Delete All Records function\
    \ will delete every record being viewed in the found set.\n\nThe Duplicate Record\
    \ function will create a duplicate of the current record with all local field\
    \ values retained.\n\n> **Tip**  \n> To reset the Learn FileMaker Chapter [3](#429700_2_En_3_Chapter.xhtml)-[5](#429700_2_En_5_Chapter.xhtml)\
    \ sample data, choose the Reset Sample Records under the Scripts menu.\n\n## Searching\
    \ Records\n\nA FileMaker table can contain a maximum of 64 quadrillion total records.\
    \ While most tables will likely never reach that number, as the number grows,\
    \ it becomes increasingly difficult to find a specific record. Scrolling through\
    \ even a few hundred records to find one is unnecessarily time-consuming. Instead,\
    \ a record search can quickly create a smaller temporary subset of records based\
    \ on user-specified criteria. Searching helps users locate records for data entry\
    \ work but also isolates a group of records for processes like printing or exporting.\
    \ FileMaker offers several methods for searching records: fast searches using\
    \ quick find or field selection, Find mode to build complex finds, SQL queries\
    \ (Chapter [16](#429700_2_En_16_Chapter.xhtml)), or custom scripts (Chapter [24](#429700_2_En_24_Chapter.xhtml)).\n\
    \n> **Caution**  \n> Except for SQL Queries, all searches are context sensitive\
    \ and executed from the perspective of a window’s layout!\n\n### Performing Fast\
    \ Searches\n\nFileMaker offers two options for performing a single-criterion search:\
    \ Quick Find and Find Matching.\n\n#### Searching with Quick Find\n\nThe Quick\
    \ Find feature searches for records in the current layout’s table where some criteria\
    \ are found in any field on the layout that is configured specifically for quick\
    \ find inclusion (Chapter [19](#429700_2_En_19_Chapter.xhtml), “Inspecting the\
    \ Data Settings”). To perform this type of find manually, enter a word or phrase\
    \ into the search field located in the toolbar, shown in Figure [4-2](#429700_2_En_4_Chapter.xhtml#Fig2),\
    \ and then type the Enter key. The records visible in the window will be updated\
    \ to only those with the matching value in a field, and the found/total record\
    \ counts in the navigation area will reflect the difference. Click the magnifier\
    \ icon in the quick find field to see a list of recent searches from any table\
    \ in the file, and select one to repeat it for the current layout’s table.\n\n\
    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig2_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig2_HTML.jpg)\n\
    \n*Figure 4-2: The Quick Find field in the toolbar*\n\n> **Caution**  \n> After\
    \ searching, the text remains in the search field but doesn’t interact with the\
    \ found set. If the user or a script changes the found set, the criteria linger\
    \ as an obsolete reminder of the last search, no longer relevant to the records\
    \ actually displayed."
  raw: '### Modifying Field Contents


    Once a record is open and a field has focus, the value in the field can be changed
    in several different ways depending on the field’s data type (Chapter [8](#429700_2_En_8_Chapter.xhtml))
    or the layout behavior and formatting options (Chapters [19](#429700_2_En_19_Chapter.xhtml)
    and [20](#429700_2_En_20_Chapter.xhtml)). These may include *typing*, *cut*, *copy-paste*,
    *undo-redo*, *insert functions,* or *mouse clicks*.


    The most common method of entering data into any data entry field is by simply
    *typing* on the keyboard. As long as a field is in focus, anything typed will
    flow in as its content.


    Like most applications, FileMaker’s *Edit* menu has commands for *cut*, *copy*,
    *paste*, *undo*`,` and *redo*. These functions only affect content stored in fields
    while they are in focus. Undo, for example, will step back text changes just made
    in the active field but does not reverse actions such as record creation or deletion
    and doesn’t work after changes are committed when a record closes.


    When *drag and drop* is enabled in the application preferences (Chapter [2](#429700_2_En_2_Chapter.xhtml)),
    text can be dragged to rearrange it within a field. It can also be dragged from
    one field to another, between fields in different windows and between fields and
    text in other applications.


    The *Insert* menu and similarly named submenu of a field’s contextual menu contain
    functions for quickly inserting content into fields. Each is contextually enabled
    depending on the data type of the field in focus (Chapter [8](#429700_2_En_8_Chapter.xhtml))
    and the field’s editable status on the layout (Chapter [19](#429700_2_En_19_Chapter.xhtml)).
    Inserting different files is made possible by selecting the *Insert Picture*,
    *Insert Audio/Video*, *Insert PDF,* or *Insert File* functions. Quickly insert
    the *Current Date*, *Current Time,* or *Current Username* using other functions.
    The *From Index* option is used to select and insert a value into the current
    field from an indexed list of values entered into that field on any record. The
    *From Last Visited Record* option inserts the value of the current field from
    the last record viewed.


    Finally, fields can also be configured with a *control style* that allows data
    entry with mouse clicks. For example, a *check box* style allows selection of
    boxes to enter a value, while a *calendar* style provides a graphical calendar
    for date entries (Chapter [20](#429700_2_En_20_Chapter.xhtml)).


    ### Closing a Record


    After editing, a record must be *closed* to commit or revert changes. *Reverting*
    closes a record and omits all changes made during the session. A record can be
    reverted by selecting the *Record ➤ Revert Record* menu or running a script that
    performs the function of the same name. *Committing* a record closes the record
    while saving changes made during the session. During this process, FileMaker will
    perform data entry validations and report problems if any are detected. A record
    can be committed numerous ways. Manually commit a record by typing the Enter key
    or clicking on the layout’s background, away from other objects. Other actions
    that will commit the current record include navigating to another record, creating
    a new record, closing the current window, closing the file, or running a script
    that uses the *Commit Records/Request* script step.


    Tip


    A layout can be configured to automatically save changes or present a confirmation
    dialog when committing (Chapter [18](#429700_2_En_18_Chapter.xhtml)).


    ## Creating, Deleting, and Duplicating Records


    Users can *create*, *delete*, *delete all,* and *duplicate* records. All of these
    commands are accessible to users through the *Records* menu or a custom script.
    Some are also accessible through a toolbar icon or the *record contextual menu*
    on the background of a layout.


    The *New Record* function will create a new blank record in the current layout’s
    table of the front window and automatically open it with focus in the first field.


    The *Delete Record* function will permanently delete the current record in the
    window after presenting a warning dialog to confirm the user’s intent. A user
    can bypass this warning dialog and instantly delete a record by holding Option
    (macOS) or Shift (Windows) while selecting the *Delete Record* option. While this
    may be a useful tip for power users, it can be dangerous and shouldn’t be shared
    with new users. It may be prudent to disable this ability using custom menus (Chapter
    [23](#429700_2_En_23_Chapter.xhtml)). The *Delete All Records* function will delete
    every record being viewed in the found set.


    The *Duplicate Record* function will create a duplicate of the current record
    with all local field values retained.


    Tip


    To reset the *Learn FileMaker Chapter* [*3*](#429700_2_En_3_Chapter.xhtml)*-*[*5*](#429700_2_En_5_Chapter.xhtml)
    sample data, choose the *Reset Sample Records* under the *Scripts* menu.


    ## Searching Records


    A FileMaker table can contain a maximum of 64 quadrillion total records. While
    most tables will likely never reach that number, as the number grows, it becomes
    increasingly difficult to find a specific record. Scrolling through even a few
    hundred records to find one is unnecessarily time-consuming. Instead, a *record
    search* can quickly create a smaller temporary subset of records based on user-specified
    criteria. Searching helps users locate records for data entry work but also isolates
    a group of records for processes like printing or exporting. FileMaker offers
    several methods for searching records: *fast searches* using *quick find* or *field
    selection*, *Find mode* to build complex finds, *SQL queries* (Chapter [16](#429700_2_En_16_Chapter.xhtml)),
    or *custom scripts* (Chapter [24](#429700_2_En_24_Chapter.xhtml)).


    Caution


    Except for SQL Queries, all searches are *context sensitive* and executed from
    the perspective of a window’s layout!


    ### Performing Fast Searches


    FileMaker offers two options for performing a single-criterion search: *Quick
    Find* and *Find Matching*.


    #### Searching with Quick Find


    The *Quick Find* feature searches for records in the current layout’s table where
    some criteria are found in any field on the layout that is configured specifically
    for quick find inclusion (Chapter [19](#429700_2_En_19_Chapter.xhtml), “Inspecting
    the Data Settings”). To perform this type of find manually, enter a word or phrase
    into the search field located in the toolbar, shown in Figure [4-2](#429700_2_En_4_Chapter.xhtml#Fig2),
    and then type the Enter key. The records visible in the window will be updated
    to only those with the matching value in a field, and the found/total record counts
    in the navigation area will reflect the difference. Click the magnifier icon in
    the quick find field to see a list of recent searches from any table in the file,
    and select one to repeat it for the current layout’s table.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig2_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The Quick Find field in the toolbar


    Caution


    After searching, the text remains in the search field but doesn’t interact with
    the found set. If the user or a script changes the found set, the criteria linger
    as an obsolete reminder of the last search, no longer relevant to the records
    actually displayed.'
  trans: "\n### 修改字段内容\n\n当一条记录被打开且某个字段获得焦点时，可以通过多种方式更改字段中的值，具体取决于字段的数据类型（第 8 章）或布局行为及格式设置选项（第\
    \ 19 章和第 20 章）。这些方式可能包括输入、剪切、复制粘贴、撤销重做、插入函数或鼠标点击。\n\n在任何数据输入字段中输入数据最常用的方法就是直接在键盘上输入。只要字段处于焦点状态，输入的任何内容都会作为其内容流入。\n\
    \n与大多数应用程序一样，FileMaker 的“编辑”菜单包含用于剪切、复制、粘贴、撤销和重做的命令。这些功能仅影响获得焦点时字段中存储的内容。例如，“撤销”将回退刚在活动字段中进行的文本更改，但不能撤销创建或删除记录等操作，并且在记录关闭且更改被提交后不起作用。\n\
    \n当在应用程序偏好设置中启用了拖放功能（第 2 章）时，文本可以在字段内拖拽以重新排列。它也可以从一个字段拖拽到另一个字段，在不同窗口的字段之间拖拽，以及在字段与其他应用程序的文本之间拖拽。\n\
    \n“插入”菜单以及字段上下文菜单中同名的子菜单包含用于快速将内容插入字段的功能。每个功能都会根据焦点所在字段的数据类型（第 8 章）和该字段在布局上的可编辑状态（第\
    \ 19 章）按情况启用。通过选择“插入图片”、“插入音频/视频”、“插入 PDF”或“插入文件”功能，可以插入不同类型的文件。使用其他功能可以快速插入当前日期、当前时间或当前用户名。“来自索引”选项用于从输入到该字段（在所有记录中）的值索引列表中选择一个值并插入到当前字段中。“来自上次访问的记录”选项则插入上次查看记录中当前字段的值。\n\
    \n最后，字段还可以配置为允许通过鼠标点击进行数据输入的控件样式。例如，复选框样式允许通过勾选框来输入值，而日历样式则提供一个图形化日历用于日期输入（第 20\
    \ 章）。\n\n### 关闭记录\n\n编辑完成后，必须关闭记录以提交或还原更改。还原操作会关闭记录并放弃在该会话期间所做的所有更改。可以通过选择“记录”➤“还原记录”菜单或运行执行同名功能的脚本来还原记录。提交操作会关闭记录并保存该会话期间所做的更改。在此过程中，FileMaker\
    \ 将执行数据输入验证，并在检测到问题时报告。可以通过多种方式提交记录。手动提交记录可以按 Enter 键，或者点击布局背景上远离其他对象的位置。其他会提交当前记录的操作包括：导航到另一条记录、创建新记录、关闭当前窗口、关闭文件，或者运行使用“提交记录/请求”脚本步骤的脚本。\n\
    \n> **提示**  \n> 可以将布局配置为在提交时自动保存更改或显示确认对话框（第 18 章）。\n\n## 创建、删除和复制记录\n\n用户可以创建、删除、删除全部以及复制记录。用户可以通过“记录”菜单或自定义脚本访问所有这些命令。有些命令也可以通过工具栏图标或布局背景上的记录上下文菜单访问。\n\
    \n“新建记录”功能将在前台窗口当前布局的表中创建一个新的空白记录，并自动打开它，将焦点置于第一个字段。\n\n“删除记录”功能将在显示警告对话框以确认用户意图后，永久删除窗口中的当前记录。用户可以在选择“删除记录”选项时按住\
    \ Option（macOS）或 Shift（Windows）键来绕过此警告对话框并立即删除记录。虽然这对高级用户来说可能是个有用的技巧，但这可能很危险，不应传授给新用户。使用自定义菜单禁用此功能可能是明智之举（第\
    \ 23 章）。“删除全部记录”功能将删除当前找到集中的所有记录。\n\n“复制记录”功能将创建当前记录的一个副本，并保留所有本地字段的值。\n\n> **提示**\
    \  \n> 要重置“学习 FileMaker” 第 3 章至第 5 章的示例数据，请选择“脚本”菜单下的“重置示例记录”。\n\n## 搜索记录\n\n\
    一个 FileMaker 表最多可以包含 64 千万亿条记录。虽然大多数表可能永远达不到这个数字，但随着记录数量的增长，找到特定记录就变得越来越困难。即使只浏览几百条记录来查找一条，也可能会不必要地耗费时间。相反，记录搜索可以根据用户指定的条件快速创建出一个更小的临时记录子集。搜索帮助用户定位用于数据输入工作的记录，也能将一组记录隔离出来用于诸如打印或导出等流程。FileMaker\
    \ 提供了几种搜索记录的方法：使用快速查找或字段选择进行快速搜索、使用“查找”模式构建复杂查找、SQL 查询（第 16 章）或自定义脚本（第 24 章）。\n\
    \n> **警告**  \n> 除 SQL 查询外，所有搜索都是上下文相关的，并且是从窗口布局的角度执行的！\n\n### 执行快速搜索\n\nFileMaker\
    \ 提供了两种执行单条件搜索的选项：“快速查找”和“查找匹配项”。\n\n#### 使用快速查找进行搜索\n\n快速查找功能会在当前布局的表中搜索记录，查找条件存在于布局上那些专门配置为包含在快速查找中的任何字段中（第\
    \ 19 章，“检查数据设置”）。要手动执行此类查找，请在位于工具栏的搜索字段中输入一个词或短语（如图 4-2 所示），然后按 Enter 键。窗口中可见的记录将更新为仅包含那些在某个字段中具有匹配值的记录，并且导航区域中的“找到/总记录”计数会反映此变化。点击快速查找字段中的放大镜图标，可以查看文件中来自任何表的最近搜索列表，然后选择一个搜索条件，为当前布局的表重复执行该搜索。\n\
    \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig2_HTML.jpg](img/429700_2_En_4_Fig2_HTML.jpg)\n\
    \n*图 4-2：工具栏中的“快速查找”字段*\n\n> **警告**  \n> 搜索之后，文本会保留在搜索字段中，但不会与找到集交互。如果用户或脚本更改了找到集，该搜索条件会像一个过时的上次搜索提醒一样残留下来，不再与实际显示的记录相关。\n"
- fmt: '# Searching with Find Matching


    A *find matching* type of search uses the text selection within a field as the
    criteria to quickly search for any records containing that value in the same field.
    There are three functions available by highlighting some text in a field and right-clicking
    to access the contextual menu, shown in Figure [4-3](#429700_2_En_4_Chapter.xhtml#Fig3).
    Each of these functions will perform a predefined type of search by matching the
    selected value in the current field. The `Find Matching Records` option performs
    a new find for records where the field contains the selected value. The others
    modify the current found set; `Constrain Found Set` performs a narrowing find
    that retains only those records in the found set where the field contains the
    selected value, and `Extend Found Set` performs an expanding find that adds to
    the found set any records where the field contains the selected value.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig3_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig3_HTML.jpg)


    Figure 4-3 — The find matching records functions of a field’s contextual menu


    ## Using Find Mode


    For more complex searching tasks, *Find mode* is a transitional window state that
    changes the menu, toolbar, and content area for flexible entry of search criteria,
    as shown in Figure [4-4](#429700_2_En_4_Chapter.xhtml#Fig4). To begin, enter Find
    mode by selecting `Find Mode` under the `View` menu or clicking the `Find` toolbar
    icon.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig4_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig4_HTML.jpg)


    Figure 4-4 — A window rendered in Find mode transforms to show find requests and
    search-related toolbar functions


    ### Status Toolbar (Find Mode)


    The Find mode toolbar changes to search-specific buttons, either the default Find
    options or the user’s customized set.


    #### Default Toolbar Items (Find Mode)


    The default toolbar for Find mode is shown in Figure [4-5](#429700_2_En_4_Chapter.xhtml#Fig5).
    Similar to Browse mode, the top portion can be customized, and the bottom is static.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig5_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig5_HTML.jpg)


    Figure 4-5 — The anatomy of the default Find mode toolbar


    ##### Navigation Controls


    The *navigation controls* in Find mode are similar to those in Browse mode except
    that they display information and navigation options pertaining to *find requests*
    instead of records.


    ##### Function Buttons


    The *function buttons* in the Find mode toolbar are:


    * `New Request` – Create a new find request to enter alternate criteria

    * `Delete Request` – Delete the current find request

    * `Perform Find` – Execute the find and returns to browse mode with the resulting
    found set

    * `Cancel Find` – Return the window to Browse mode with the previous found set


    ##### Saved Finds Menu


    The `Saved Finds` button on the far right of the toolbar provides access to a
    menu of Finds explicitly saved for the current table. These can be selected to
    instantly perform a find instead of entering custom criteria. See “Working with
    Saved Finds” later in this chapter.


    ##### Layout Menu


    The lower, non-customizable level of the Find mode toolbar starts with the `Layout`
    menu. This works the same as in Browse mode allowing a user to switch layouts.
    In Find mode, this can be useful if the user wishes to create a find using multiple
    fields that are only visible on different layouts. However, since a find requires
    a table context, at the time of execution, *only criteria entered on layouts for
    the same table as the current layout will be considered part of the request*.
    Therefore, use this only to access fields on layouts for a single table since
    others will be ignored.


    ##### Content View Buttons


    The *Content View buttons* work the same as in Browse (Chapter [3](#429700_2_En_3_Chapter.xhtml)),
    rendering content as a list, form, or table.


    ##### Matching Records Options


    The *Matching Records options* are two togglable options that determine if records
    matching the current find request will be *included* or *omitted* from the resulting
    found set. See “Specifying a Matching Record Option” later in this chapter.


    ##### Insert Operators Menu


    The `Insert Operators` menu contains search operators that can be inserted into
    a field with or without other criteria to enhance the search parameters. See “Using
    Search Operators” later in this chapter.


    #### Customizing the Toolbar (Find Mode)


    The Find mode toolbar is customizable at the user-computer level. Enter Find mode
    and select the `View ➤ Customize Toolbar` menu to open the customization panel
    attached to the window as shown in Figure [4-6](#429700_2_En_4_Chapter.xhtml#Fig6).
    Although the available buttons are different, they can be added or removed as
    described for Browse mode in Chapter [3](#429700_2_En_3_Chapter.xhtml).


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig6_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig6_HTML.jpg)


    Figure 4-6 — The toolbar customization panel for Find mode


    ### Entering Criteria and Performing the Find


    In Find mode, the window’s content area is rendered as a blank version of the
    current layout, called a *find request*. This appears similar to a record but
    is used to enter search criteria. Unlike with the `Quick Find` and `Find Matching
    Record` functions where users search for one piece of information at a time, a
    find request allows criteria to be typed into more than one field. Users type
    criteria into specific fields to build more precise and complex search requests.
    Criteria can be typed, pasted, or inserted into fields and can be combined with
    search operators. For records to qualify as a match, they must match all of the
    values entered in a single request.


    Once the desired criteria are entered into the appropriate fields, the search
    process can be performed by either typing `Enter`, clicking the `Perform Find`
    toolbar button, or selecting the `Requests ➤ Perform Find` menu. FileMaker will
    search the current table for matching criteria in the fields indicated and display
    a found set of the results. If there are no results, a dialog will offer the user
    an option to return to Find mode and edit the criteria or cancel the process and
    return to Browse mode.


    Try searching the *Learn FileMaker* sample records for a resulting found set of
    contacts who work for a specific company, as shown in Figure [4-7](#429700_2_En_4_Chapter.xhtml#Fig7),
    and follow these steps:


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig7_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig7_HTML.jpg)


    Figure 4-7 — The resulting found set of a search shows only matching records


    1.  Enter Find mode.

    2.  Click into the `Company` field.

    3.  Type some or all of the desired value, e.g., “Widget.”

    4.  Click the `Perform Find` button in the toolbar or type `Enter`.


    Experiment with different mixtures of criteria. For example, search for “Widget”
    in the `Company` field and “Karen” in the `First Name` field. Since the results
    must contain both values, only one record will be returned as a match.'
  raw: '#### Searching with Find Matching


    A *find matching* type of search uses the text selection within a field as the
    criteria to quickly search for any records containing that value in the same field.
    There are three functions available by highlighting some text in a field and right-clicking
    to access the contextual menu, shown in Figure [4-3](#429700_2_En_4_Chapter.xhtml#Fig3).
