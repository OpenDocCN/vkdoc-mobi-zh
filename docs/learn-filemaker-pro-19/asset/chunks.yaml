  trans: '

    ### 指定导出字段


    “指定导出字段顺序”对话框（如图 5-12 所示）用于选择导出时要包含的字段、它们在输出文件中的保存顺序以及一些格式选项。


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig12_HTML.jpg](img/429700_2_En_5_Fig12_HTML.jpg)


    图 5-12：用于指定导出字段顺序和设置的对话框


    在左侧，数据源弹出菜单用于指定生成下方字段列表的位置。默认情况下，已选择`当前布局`，仅显示当前布局上的字段，包括本地字段和相关字段。选择`当前表`可以显示当前布局表出现中的所有字段，或选择某个相关表出现以在导出中包含相关字段（第
    9 章）。


    可以通过双击列表中的字段或使用`移动`或`全部移动`按钮将字段添加到导出顺序中。导出列表中的字段将按照它们出现的顺序保存到输出文件中，并且可以拖拽到所需的顺序。通过双击列表中的字段、单击`清除`或`全部清除`按钮，或按
    Delete 键，可以从导出列表中移除字段。


    设置好字段顺序后，有几个选项可用。`输出文件字符集`弹出菜单用于指定导出过程中使用的字符编码。`应用当前布局的数据格式`复选框将使任何数字、日期或时间字段以当前布局上的数据格式进行导出，而非实际输入数据的格式（第
    19 章“数据格式”）。例如，如果一个数字字段包含“10”，但在当前布局上被格式化为显示货币（例如“$10.00”），则必须勾选此框才能以货币格式导出该数字。


    ### 将输出汇总为组


    对于更复杂的导出，`分组依据`功能允许在导出过程中对值进行子汇总。如果找到的记录集已排序，则对话框的`分组依据`区域将包含排序字段列表，这些字段可用于在导出过程中汇总数据。例如，假设有一组记录集，如表
    5-1 所示，包含三个字段的值：`公司`、`行业`和`数量`。`数量汇总`字段是一个汇总字段，它会自动将六个记录的`数量`字段进行汇总（第 8 章“汇总字段”）。


    表 5-1：展示未分组汇总行为的假设记录


    | 公司 | 行业 | 数量 | 数量汇总 |

    | --- | --- | --- | --- |

    | Online Tutor, LLC | 教育 | 20 | 95 |

    | Learning Resources | 教育 | 15 | 95 |

    | Mutual Investors Corp | 金融 | 5 | 95 |

    | Dividend Party, Inc. | 金融 | 10 | 95 |

    | Knowledge Bound Co. | 出版 | 35 | 95 |

    | Widget Books, Inc. | 出版 | 10 | 95 |


    如果导出这三个字段，结果文件中的值将与表中的值相同。然而，可以先按`行业`字段对记录进行排序，然后将数据作为每个行业的总数量汇总报告进行导出。开始导出操作，当进入“指定字段顺序”对话框时，`分组依据`区域会为`行业`字段提供一个复选框。将`行业`字段和`数量汇总`字段添加到导出列表。系统会自动添加第三个额外字段：`按行业汇总的数量`。最后一个字段将以斜体显示，以突出它并非数据库中的实际字段，而是按行业汇总的子汇总，如图
    5-13 所示。


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig13_HTML.jpg](img/429700_2_En_5_Fig13_HTML.jpg)


    图 5-13：使用分组依据功能的字段导出顺序示例


    采用此配置后，导出文件将包含每个行业一行数据，第一行为三个行业的总数量，第三列为每个行业的总数量，如表 5-2 所示。


    表 5-2：使用`分组依据`选项导出的假设数据


    | 教育 | 95 | 35 |

    | 金融 |   | 15 |

    | 出版 |   | 45 |


    ## 本章小结


    在本章中，我们探讨了导入和导出记录的基础知识。在下一章中，我们将从用户视角转向开发者界面，并开始定义数据结构。


    # 第二部分：定义数据结构


    构建自定义数据库的第一步是创建一个新文件，并开始定义其结构化的数据模式：提供接口构建基础的`表`、`字段`、`关系`、`容器`和`值列表`。


    1.  使用数据库文件

    2.  使用表

    3.  定义字段

    4.  建立关系

    5.  管理容器

    6.  定义值列表


    # 6. 使用数据库文件


    数据库是以数字格式存储的结构化信息集合，可灵活访问以实现各种功能。FileMaker 数据库文件是一个文档，既包含开发者定义的结构元素，也包含用户输入的数据。FileMaker
    12 至 19 版本共享了单一的文件格式，并以文件扩展名 `fmp12` 标识。本章涵盖了创建、配置和维护数据库文件的基础知识，包括：


    - 创建新的数据库文件

    - 配置文件选项

    - 设计并维护健康的文件


    **注意：** 虽然 `fmp12` 扩展名表示文件在 FileMaker 12 至 19 版本之间兼容，但新版本中引入的功能在旧版本中并不向后兼容。


    ## 创建新的数据库文件


    可以通过启动解决方案、空白文件，或者将电子表格或其他基于文本的文件转换为 FileMaker 数据库来创建数据库文件。所有这些操作都可以在“启动中心”窗口的`创建`选项卡中执行，该选项卡可通过选择`文件`菜单中的`新建`来访问。


    ### 从启动解决方案创建数据库


    启动解决方案是 Claris 作为 FileMaker 安装的一部分提供的一组模板。虽然本书专注于从空白文件开始，但这些模板可以作为构建自定义解决方案的基础起点，或作为“通过示例学习”的教程。要开始操作，请按照图
    6-1 所示的步骤，创建一个`联系人`启动模板的副本。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig1_HTML.jpg](img/429700_2_En_6_Fig1_HTML.jpg)


    图 6-1：从启动解决方案创建新数据库的过程


    1.  在“启动中心”窗口中选择`创建`选项卡。

    2.  点击`启动器`标题下的`联系人`图标。

    3.  点击`创建`按钮。

    4.  在窗口顶部附着的`保存`对话框工作表中，指定名称和保存位置。


    **注意：** 启动器是 Claris 设计的示例。它们所采用的结构和设计选择不应被视为必须无条件遵循的严格规则。

