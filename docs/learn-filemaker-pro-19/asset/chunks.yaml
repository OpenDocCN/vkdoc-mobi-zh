- fmt: '### Creating a Database from a Blank Template


    To create a new database from a blank template, select `Launch Center`, in the
    `File` menu, and follow the steps shown in Figure [6-2](#429700_2_En_6_Chapter.xhtml#Fig2).


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig2_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    The dialog used to create a new blank database file


    1. Select the `Create` tab in the `Launch Center` window.

    2. Select the `Blank` icon.

    3. Click the `Create` button.

    4. In the `Save` dialog sheet attached to the top of the window, enter a name
    (type “Learn FileMaker” to follow along with the book’s examples), choose a location,
    and click `Save`.


    **Caution:** Files you create will appear different from screenshots in this book
    because a custom theme was used for visual clarity. Download sample files from
    Apress.com to follow the examples.


    ### Converting an Existing File into a Database


    FileMaker can automatically convert various files into a new database file. This
    includes older FileMaker databases, spreadsheets, or other text-based data files.
    To begin, select the `Convert` option on the `Create` tab of the `Launch Center`
    window, and then select a source file. Alternatively, you can drag and drop the
    file directly onto the FileMaker application file.


    If the source file is a FileMaker database with the `fmp12` extension, it will
    simply open since that is the current file format used by versions 12–19. If the
    file has the previous `fmp7` extension, FileMaker 19 will recreate the file, saving
    a copy as the current file format. Any file with an extension prior to that must
    first be converted to the `fmp7` format using a copy of FileMaker 11 before FileMaker
    19 can convert it to the modern format.


    If the source file is a structured data file, there are various options available
    in a sequence of dialogs. The file can be one of various file types including
    `tab separated`, `comma separated`, `merge file`, `Excel workbooks` (`xls` or
    `xlsx`), `dbase`, or from an XML or ODBC data source. For example, assume an Excel
    spreadsheet. If the file selected for conversion has multiple tabbed worksheets,
    a `Specify Excel Data` dialog will ask which worksheet should be used as the data
    source. A save dialog will request a name and location for the new file. The source
    file’s columns are used to automatically define a table with fields named `f1`,
    `f2`, `f3`, etc. A `Convert File` dialog similar to the `Specify Import Order`
    dialog (Chapter [5](#429700_2_En_5_Chapter.xhtml)) opens allowing target table
    renaming and the option to use field names from a selected source record. Once
    finished, the new database file will have one table populated with the fields
    specified and with two layouts: a Form layout named `Layout #1` and a List layout
    named `Layout #2`. The data structure and interface can then be customized to
    suit your purposes.


    ### Configuring a Sandbox Table


    Before exploring file basics, let’s configure a rudimentary `Sandbox` table in
    the `Learn FileMaker` database. This process will provide a quick overview of
    building a table with fields and layouts, rapidly skimming over lessons that will
    be explored in more depth in later chapters. It also provides an experimental
    sandbox for tinkering and visualizing calculation results prior to later lessons
    on building layouts.


    **Tip:** Walking through these lessons will provide a crash course in setting
    up a database. However, these steps are already done in the `Learn FileMaker Pro
    Chapter` [6](#429700_2_En_6_Chapter.xhtml) file available from Apress.com.


    ### Changing the Default Table Name


    A new database file will automatically have a default table with the same name
    as the file. So, the example database should already have one table named `Learn
    FileMaker` and a blank layout of the same name. This default behavior may be adequate
    when a database requires a table of the same name. For example, a database named
    `Contacts` or `Projects` will likely require a similarly named table. However,
    for our purposes and to gain a little practical experience, we will rename the
    default table to `Sandbox`.


    First, we need to make sure the `Manage Database` dialog is open. Depending on
    application settings (Chapter [2](#429700_2_En_2_Chapter.xhtml)), the new file
    will open in Layout mode without opening the dialog or will open in Browse mode
    with the dialog open. If in Layout mode, open this dialog selecting the `File
    ➤ Manage ➤ Database` menu item. Then follow these steps, shown in Figure [6-3](#429700_2_En_6_Chapter.xhtml#Fig3):


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig3_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Highlighting the process of renaming the default table


    1. Click on the `Tables` tab.

    2. Make sure the default `Learn FileMaker` table is selected.

    3. Type `Sandbox` into the `Table Name` field.

    4. Click the `Change` button, and then click `OK`.


    ### Adding Placeholder Fields


    The renamed `Sandbox` table, probably already has five fields defined. Since version
    17, FileMaker automatically creates default fields (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    “Defining Default Fields”). For now, we will ignore these and create one field
    of each available data type to serve as an example for experimentation on topics
    presented in forthcoming chapters.


    #### Creating Data Entry Fields


    First, we will create six data entry fields that are capable of accepting input
    from a user. To get started, click on the `Fields` tab. Then, follow the steps
    shown in Figure [6-4](#429700_2_En_6_Chapter.xhtml#Fig4):


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig4_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The process of creating a text field in the Sandbox table


    1. Click in the white space under the default fields so no field is selected.

    2. Type `Example Text` into the `Field Name` text area.

    3. Select `Text` from the `Type` menu.

    4. Click the `Create` button or type Enter.


    For now, ignore other options and repeat this process for each of these field
    types:


    1. Create a `Number` field named `Example Number`

    2. Create a `Date` field named `Example Date`

    3. Create a `Time` field named `Example Time`

    4. Create a `Timestamp` field named `Example Timestamp`

    5. Create a `Container` field named `Example Container`


    **Note:** Field data types and options are discussed in Chapter [8](#429700_2_En_8_Chapter.xhtml).


    #### Creating a Calculation Field


    Following the same process earlier, create a `Calculation` field named `Example
    Calculation`. When the `Specify Calculation` dialog appears, follow the steps
    in Figure [6-5](#429700_2_En_6_Chapter.xhtml#Fig5) to enter a temporary placeholder
    calculation formula:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig5_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    The process of creating a placeholder calculation in the Sandbox


    1. Type zero as a placeholder formula in the text area.

    2. Select `Number` for a result type.

    3. Click the OK button to close and save.


    **Note:** Calculation fields are discussed further starting in Chapter [12](#429700_2_En_12_Chapter.xhtml).


    #### Creating a Summary Field


    Again, repeat the process to create a `Summary` field named `Example Summary`.
    When the `Options for Summary Field` dialog appears, follow the steps in Figure
    [6-6](#429700_2_En_6_Chapter.xhtml#Fig6) to select a default summary process:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig6_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    The process of creating a summary field in the Sandbox


    1. Click the `Total of` radio button.

    2. Select the `Example Number` field from the `Available Fields` list.

    3. Click the `OK` button to close and save.


    **Note:** Summary field options are discussed further in Chapter [8](#429700_2_En_8_Chapter.xhtml).'
  raw: '### Creating a Database from a Blank Template


    To create a new database from a blank template, select *Launch Center*, in the
    *File* menu, and follow the steps shown in Figure [6-2](#429700_2_En_6_Chapter.xhtml#Fig2).


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig2_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    The dialog used to create a new blank database file


    1.  Select the *Create* tab in the *Launch Center* window.


    2.  Select the *Blank* icon.


    3.  Click the *Create* button.


    4.  In the *Save* dialog sheet attached to the top of the window, enter a name
    (type “Learn FileMaker” to follow along with the book’s examples), choose a location,
    and click *Save*.


    Caution


    Files you create will appear different from screenshots in this book because a
    custom theme was used for visual clarity. Download sample files from Apress.com
    to follow the examples.


    ### Converting an Existing File into a Database


    FileMaker can automatically convert various files into a new database file. This
    includes older FileMaker databases, spreadsheets, or other text-based data files.
    To begin, select the *Convert* option on the *Create* tab of the *Launch Center*
    window, and then select a source file. Alternatively, you can drag and drop the
    file directly onto the FileMaker application file.


    If the source file is a FileMaker database with the “fmp12” extension, it will
    simply open since that is the current file format used by versions 12–19\. If
    the file has the previous “fmp7” extension, FileMaker 19 will recreate the file,
    saving a copy as the current file format. Any file with an extension prior to
    that must first be converted to the “fmp7” format using a copy of FileMaker 11
    before FileMaker 19 can convert it to the modern format.


    If the source file is a structured data file, there are various options available
    in a sequence of dialogs. The file can be one of various file types including
    *tab separated*, *comma separated*, *merge file*, *Excel workbooks* (*xls* or
    *xlsx*), *dbase,* or from an XML or ODBC data source. For example, assume an Excel
    spreadsheet. If the file selected for conversion has multiple tabbed worksheets,
    a *Specify Excel Data* dialog will ask which worksheet should be used as the data
    source. A save dialog will request a name and location for the new file. The source
    file’s columns are used to automatically define a table with fields named *f1*,
    *f2*, *f3*, etc. A *Convert File* dialog similar to the *Specify Import Order*
    dialog (Chapter [5](#429700_2_En_5_Chapter.xhtml)) opens allowing target table
    renaming and the option to use field names from a selected source record. Once
    finished, the new database file will have one table populated with the fields
    specified and with two layouts: a Form layout named “Layout #1” and a List layout
    named “Layout #2.” The data structure and interface can then be customized to
    suit your purposes.


    ### Configuring a Sandbox Table


    Before exploring file basics, let’s configure a rudimentary *Sandbox* table in
    the *Learn FileMaker* database. This process will provide a quick overview of
    building a table with fields and layouts, rapidly skimming over lessons that will
    be explored in more depth in later chapters. It also provides an experimental
    sandbox for tinkering and visualizing calculation results prior to later lessons
    on building layouts.


    Tip


    Walking through these lessons will provide a crash course in setting up a database.
    However, these steps are already done in the *Learn FileMaker Pro Chapter* [6](#429700_2_En_6_Chapter.xhtml)
    file available from Apress.com.


    ### Changing the Default Table Name


    A new database file will automatically have a default table with the same name
    as the file. So, the example database should already have one table named “Learn
    FileMaker” and a blank layout of the same name. This default behavior may be adequate
    when a database requires a table of the same name. For example, a database named
    *Contacts* or *Projects* will likely require a similarly named table. However,
    for our purposes and to gain a little practical experience, we will rename the
    default table to “Sandbox.”


    First, we need to make sure the *Manage Database* dialog is open. Depending on
    application settings (Chapter [2](#429700_2_En_2_Chapter.xhtml)), the new file
    will open in Layout mode without opening the dialog or will open in Browse mode
    with the dialog open. If in Layout mode, open this dialog selecting the *File
    ➤ Manage ➤ Database* menu item. Then follow these steps, shown in Figure [6-3](#429700_2_En_6_Chapter.xhtml#Fig3):


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig3_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Highlighting the process of renaming the default table


    1.  Click on the *Tables* tab.


    2.  Make sure the default *Learn FileMaker* table is selected.


    3.  Type “Sandbox” into the *Table Name* field.


    4.  Click the *Change* button, and then click *OK*.


    ### Adding Placeholder Fields


    The renamed *Sandbox* table, probably already has five fields defined. Since version
    17, FileMaker automatically creates default fields (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    “Defining Default Fields”). For now, we will ignore these and create one field
    of each available data type to serve as an example for experimentation on topics
    presented in forthcoming chapters.


    #### Creating Data Entry Fields


    First, we will create six data entry fields that are capable of accepting input
    from a user. To get started, click on the *Fields* tab. Then, follow the steps
    shown in Figure [6-4](#429700_2_En_6_Chapter.xhtml#Fig4):


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig4_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The process of creating a text field in the Sandbox table


    1.  Click in the white space under the default fields so no field is selected.


    2.  Type “Example Text” into the *Field Name* text area.


    3.  Select *Text* from the *Type* menu.


    4.  Click the *Create* button or type Enter.


    For now, ignore other options and repeat this process for each of these field
    types:


    1.  Create a *Number* field named “Example Number”


    2.  Create a *Date* field named “Example Date”


    3.  Create a *Time* field named “Example Time”


    4.  Create a *Timestamp* field named “Example Timestamp”


    5.  Create a *Container* field named “Example Container”


    Note


    Field data types and options are discussed in Chapter [8](#429700_2_En_8_Chapter.xhtml).


    #### Creating a Calculation Field


    Following the same process earlier , create a *Calculation* field named “Example
    Calculation.” When the *Specify Calculation* dialog appears, follow the steps
    in Figure [6-5](#429700_2_En_6_Chapter.xhtml#Fig5) to enter a temporary placeholder
    calculation formula:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig5_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    The process of creating a placeholder calculation in the Sandbox


    1.  Type zero as a placeholder formula in the text area.


    2.  Select *Number* for a result type.


    3.  Click the OK button to close and save.


    Note


    Calculation fields are discussed further starting in Chapter [12](#429700_2_En_12_Chapter.xhtml).


    #### Creating a Summary Field


    Again, repeat the process to create a *Summary* field named “Example Summary.”
    When the *Options for Summary Field* dialog appears, follow the steps in Figure
    [6-6](#429700_2_En_6_Chapter.xhtml#Fig6) to select a default summary process:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig6_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    The process of creating a summary field in the Sandbox


    1.  Click the *Total of* radio button.


    2.  Select the *Example Number* field from the *Available Fields* list.


    3.  Click the *OK* button to close and save.


    Note


    Summary field options are discussed further in Chapter [8](#429700_2_En_8_Chapter.xhtml).'
  trans: '

    ### 从空白模板创建数据库


    要从空白模板创建新数据库，请选择“文件”菜单中的`启动中心`，然后按照图 6-2 所示的步骤操作。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig2_HTML.jpg](img/429700_2_En_6_Fig2_HTML.jpg)


    图 6-2


    用于创建新的空白数据库文件的对话框


    1. 在“启动中心”窗口中选择`创建`选项卡。

    2. 选择`空白`图标。

    3. 点击`创建`按钮。

    4. 在窗口顶部附着的“保存”对话框表中，输入名称（若要跟随本书示例操作，请键入“Learn FileMaker”），选择位置，然后点击`保存`。


    **注意：** 您创建的文件在外观上会与本书的屏幕截图有所不同，因为为了视觉清晰而使用了自定义主题。请从 Apress.com 下载示例文件以跟随示例操作。


    ### 将现有文件转换为数据库


    FileMaker 可以自动将各种文件转换为新的数据库文件。这包括较旧版本的 FileMaker 数据库、电子表格或其他基于文本的数据文件。首先，在“启动中心”窗口的`创建`选项卡中选择`转换`选项，然后选择源文件。或者，您也可以将文件直接拖放到
    FileMaker 应用程序文件上。


    如果源文件是扩展名为 `fmp12` 的 FileMaker 数据库，它将直接打开，因为这是版本 12–19 使用的当前文件格式。如果文件具有之前的 `fmp7`
    扩展名，FileMaker 19 将重新创建该文件，并保存一份副本为当前文件格式。任何在此之前的扩展名文件，都必须先使用 FileMaker 11 的副本转换为
    `fmp7` 格式，然后才能由 FileMaker 19 将其转换为现代格式。


    如果源文件是结构化数据文件，则在一系列对话框中会提供各种选项。该文件可以是多种文件类型之一，包括`制表符分隔`、`逗号分隔`、`合并文件`、`Excel 工作簿`（`xls`
    或 `xlsx`）、`dbase`，或者来自 XML 或 ODBC 数据源。例如，假设有一个 Excel 电子表格。如果为转换选择的文件包含多个带标签的工作表，则会弹出一个“指定
    Excel 数据”对话框，询问应使用哪个工作表作为数据源。随后会弹出一个保存对话框，要求为新文件指定名称和位置。源文件的列将用于自动定义一个表，其字段命名为
    `f1`、`f2`、`f3` 等。一个类似于“指定导入顺序”对话框（第 5 章）的“转换文件”对话框将打开，允许重命名目标表，并可选择使用所选源记录中的字段名称。完成后，新的数据库文件将包含一个表，其中填充了指定的字段，并包含两个布局：一个名为`布局
    #1` 的表单布局和一个名为`布局 #2` 的列表布局。随后，您可以根据需要定制数据结构和界面。


    ### 配置沙箱表


    在探索文件基础知识之前，让我们在 `Learn FileMaker` 数据库中配置一个基本的 `Sandbox` 表。此过程将快速概述如何构建包含字段和布局的表，并快速浏览将在后续章节中深入探讨的一些课程。同时，它也为在后续关于构建布局的课程之前，提供了一个用于尝试和可视化计算结果的实验沙箱。


    **提示：** 完成这些课程将为您快速入门数据库设置。但是，在 Apress.com 提供的 `Learn FileMaker Pro Chapter` 6
    文件中，这些步骤已经完成。


    ### 更改默认表名


    一个新的数据库文件会自动创建一个与文件同名的默认表。因此，示例数据库应该已经有一个名为 `Learn FileMaker` 的表和一个同名的空白布局。当数据库需要一个同名的表时，这种默认行为可能是合适的。例如，名为
    `Contacts` 或 `Projects` 的数据库很可能需要一个同名的表。但出于我们的目的，并且为了获得一些实际经验，我们将把默认表重命名为 `Sandbox`。


    首先，我们需要确保“管理数据库”对话框已打开。根据应用程序设置（第 2 章），新文件可能以布局模式打开（不打开该对话框），也可能以浏览模式打开（同时打开该对话框）。如果在布局模式下，请选择`文件
    ➤ 管理 ➤ 数据库`菜单项打开此对话框。然后按照图 6-3 所示的步骤操作：


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig3_HTML.jpg](img/429700_2_En_6_Fig3_HTML.jpg)


    图 6-3


    突出显示重命名默认表的过程


    1. 点击`表`选项卡。

    2. 确保选中默认的 `Learn FileMaker` 表。

    3. 在`表名称`字段中键入 `Sandbox`。

    4. 点击`更改`按钮，然后点击`确定`。


    ### 添加占位字段


    重命名后的 `Sandbox` 表可能已经定义了五个字段。自版本 17 起，FileMaker 会自动创建默认字段（第 8 章，“定义默认字段”）。目前，我们将忽略这些字段，并为每种可用的数据类型创建一个字段，作为接下来章节中将讨论的主题的实验示例。


    #### 创建数据输入字段


    首先，我们将创建六个能够接受用户输入的数据输入字段。首先，点击`字段`选项卡。然后，按照图 6-4 所示的步骤操作：


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig4_HTML.jpg](img/429700_2_En_6_Fig4_HTML.jpg)


    图 6-4


    在 Sandbox 表中创建文本字段的过程


    1. 点击默认字段下方的空白区域，确保没有选中任何字段。

    2. 在`字段名称`文本区域中键入 `Example Text`。

    3. 从`类型`菜单中选择`文本`。

    4. 点击`创建`按钮或按 Enter 键。


    现在，忽略其他选项，对以下每种字段类型重复此过程：


    1. 创建一个名为 `Example Number` 的`数字`字段

    2. 创建一个名为 `Example Date` 的`日期`字段

    3. 创建一个名为 `Example Time` 的`时间`字段

    4. 创建一个名为 `Example Timestamp` 的`时间戳`字段

    5. 创建一个名为 `Example Container` 的`容器`字段


    **注意：** 字段数据类型和选项将在第 8 章讨论。


    #### 创建计算字段


    按照之前的相同过程，创建一个名为 `Example Calculation` 的`计算`字段。当出现“指定计算”对话框时，按照图 6-5 中的步骤输入一个临时的占位计算公式：


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig5_HTML.jpg](img/429700_2_En_6_Fig5_HTML.jpg)


    图 6-5


    在 Sandbox 中创建占位计算的过程


    1. 在文本区域中键入零作为占位公式。

    2. 为结果类型选择`数字`。

    3. 点击“确定”按钮关闭并保存。


    **注意：** 计算字段将在第 12 章开始进一步讨论。


    #### 创建汇总字段


    再次重复此过程，创建一个名为 `Example Summary` 的`汇总`字段。当出现“汇总字段选项”对话框时，按照图 6-6 中的步骤选择默认的汇总方式：


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig6_HTML.jpg](img/429700_2_En_6_Fig6_HTML.jpg)


    图 6-6


    在 Sandbox 中创建汇总字段的过程


    1. 点击`合计`单选按钮。

    2. 从`可用字段`列表中选择 `Example Number` 字段。

    3. 点击“确定”按钮关闭并保存。


    **注意：** 汇总字段选项将在第 8 章进一步讨论。

    '
- fmt: '### Reviewing the Sandbox Fields


    Once finished creating data entry, calculation, and summary fields, the `Sandbox`
    table should contain five default fields and the eight example fields shown in
    Figure [6-7](#429700_2_En_6_Chapter.xhtml#Fig7). Click the `OK` button to close
    the `Manage Database` dialog, and save all changes made to the `Sandbox` table.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig7_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig7_HTML.jpg)


    **Figure 6-7** – The complete list of fields in the practice table


    ### Setting Up Placeholder Layouts


    Continuing with a rapid setup of sandbox resources, let’s set up two layouts:
    a `Form view` layout for data entry and a `List view` for scrolling through records.


    > **Note**

    > Content views were defined in more detail in Chapter [3](#429700_2_En_3_Chapter.xhtml).


    #### Renaming the Default Layout as a Form View


    A new database file will automatically have a default `Form` layout with the same
    name as the file. Initially there would have been a single `Learn FileMaker` layout.
    However, when the default table name was changed to `Sandbox`, the layout should
    have changed as well. So, if following the instructions in this section, there
    should be a blank layout named `Sandbox`. Since we will be building two layouts
    for the same table, we need to distinguish this one from the other layout by renaming
    it `Sandbox Form` following these steps:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig8_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig8_HTML.jpg)


    **Figure 6-8** – The Layout Setup dialog with the new layout name entered


    1.  Select the `View ➤ Layout` menu item to enter Layout mode.

    2.  Select the `Layout ➤ Layout Setup` menu to open the `Layout Setup` dialog.

    3.  In the `Layout Name` field on the `General` tab, change the name to `Sandbox
    Form` as shown in Figure [6-8](#429700_2_En_6_Chapter.xhtml#Fig8).

    4.  Click the `OK` button to close the window and save the change.


    > **Note**

    > Layout settings are discussed further in Chapter [18](#429700_2_En_18_Chapter.xhtml).


    #### Adding Fields to a Layout


    If `Layout` preferences are set to automatically add new fields to the current
    layout (Chapter [2](#429700_2_En_2_Chapter.xhtml)), then the eight Example fields
    will already be present on the default layout. If not, there are three ways to
    add fields to a layout. For now, use the `Field` tab of the `Objects` pane by
    following these steps in Layout mode:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig9_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig9_HTML.jpg)


    **Figure 6-9** – Drag selected fields from the Fields tab to the layout


    1.  Confirm that the `Field` tab is visible by selecting it under the `View ➤
    Objects ➤ Fields tab` menu.

    2.  Select the entire list of fields by clicking in the field list and then selecting
    the `Edit ➤ Select All` menu item.

    3.  Click, hold, and drag the list of fields onto the layout, as shown in Figure
    [6-9](#429700_2_En_6_Chapter.xhtml#Fig9). The fields should appear on the layout,
    neatly aligned and sized according to their data type.


    > **Note**

    > Learn about other ways to add fields to layouts in Chapter [20](#429700_2_En_20_Chapter.xhtml).


    #### Creating a List Layout


    Next, add a List view layout, by selecting the `Layout ➤ New Layout/Report` menu,
    and follow the steps in the dialog, shown in Figure [6-10](#429700_2_En_6_Chapter.xhtml#Fig10):


    1.  Enter `Sandbox List` into the `Layout Name` field.

    2.  Click a layout category of `Computer` in the first row of icons.

    3.  Click a layout type of `List` in the second row of icons.

    4.  Click the `Finish` button to close the dialog and complete the process.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig10_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig10_HTML.jpg)


    **Figure 6-10** – The dialog used to create a new layout or report


    > **Note**

    > Other layout creation options are explored in Chapter [18](#429700_2_En_18_Chapter.xhtml).


    When finished, an empty `List view` layout will appear with three parts: `Header`,
    `Body`, and `Footer`. Because a `List view` has a vertical orientation, the process
    of adding fields will change slightly, following the steps shown in Figure [6-11](#429700_2_En_6_Chapter.xhtml#Fig11):


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig11_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig11_HTML.jpg)


    **Figure 6-11** – Configure the Fields tab for dragging to a List view


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig12_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig12_HTML.jpg)


    **Figure 6-12** – The fields dropped into the Body part of the layout


    1.  In the `Field tab` of the `Object` pane, confirm the `Drag Preferences` disclosure
    triangle is open and showing additional controls.

    2.  Select the `Horizontal` icon under `Field Placement`.

    3.  Select the `Labels` option to put labels above fields.

    4.  Select every Example field *except the container field* by clicking on each
    field while holding the Command (macOS) or Windows (Windows) key. We’ll skip the
    container field on the List view since it will default to a large vertical footprint
    and attempt to expand the layout.

    5.  Next drag the selected fields onto the layout. Be sure to place them high
    enough so they land completely within the defined layout parts (horizontal white
    area).

    6.  Once placed, drag them down so that the fields are roughly centered in the
    `Body` part, as shown in Figure [6-12](#429700_2_En_6_Chapter.xhtml#Fig12).


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig13_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig13_HTML.jpg)


    **Figure 6-13** – The List view with cleaned-up labels and fields


    1.  Position the labels squarely in the `Header` area using the mouse or arrow
    keys.

    2.  Remove the repetitive prefix from each field label by double-clicking on each,
    and delete the extraneous `Example` portion.

    3.  Finally, adjust the size and position of the last two fields so nothing extends
    to the right in the gray area beyond the visible layout, as shown in Figure [6-13](#429700_2_En_6_Chapter.xhtml#Fig13).


    > **Note**

    > Manipulating layout objects is discussed further in Chapter [21](#429700_2_En_21_Chapter.xhtml).


    ## Configuring File Options


    The `File Options` dialog allows control over various behaviors of a database
    file. Unlike *application preferences*, these options are stored in the database
    file and are accessible only when a database is open. Select the `File ➤ File
    Options` menu to open the dialog which is divided into five tabs: `Open`, `Icon`,
    `Spelling`, `Text`, and `Script Triggers`.'
  raw: '#### Reviewing the Sandbox Fields


    Once finished creating data entry, calculation, and summary fields, the *Sandbox*
    table should contain five default fields and the eight example fields shown in
    Figure [6-7](#429700_2_En_6_Chapter.xhtml#Fig7). Click the OK button to close
    the *Manage Database* dialog, and save all changes made to the *Sandbox* table.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig7_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    The complete list of fields in the practice table


    ### Setting Up Placeholder Layouts


    Continuing with a rapid setup of sandbox resources, let’s set up two layouts:
    a *Form view* layout for data entry and a *List view* for scrolling through records.


    Note


    Content views were defined in more detail in Chapter [3](#429700_2_En_3_Chapter.xhtml).


    #### Renaming the Default Layout as a Form View


    A new database file will automatically have a default Form layout with the same
    name as the file. Initially there would have been a single *Learn FileMaker* layout.
    However, when the default table name was changed to “Sandbox,” the layout should
    have changed as well. So, if following the instructions in this section, there
    should be a blank layout named “Sandbox.” Since we will be building two layouts
    for the same table, we need to distinguish this one from the other layout by renaming
    it “Sandbox Form” following these steps:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig8_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    The Layout Setup dialog with the new layout name entered


    1.  Select the *View ➤ Layout* menu item to enter Layout mode.


    2.  Select the *Layout ➤ Layout Setup* menu to open the *Layout Setup* dialog.


    3.  In the *Layout Name* field on the *General* tab, change the name to “Sandbox
    Form” as shown in Figure [6-8](#429700_2_En_6_Chapter.xhtml#Fig8).


    4.  Click the *OK* button to close the window and save the change.


    Note


    Layout settings are discussed further in Chapter [18](#429700_2_En_18_Chapter.xhtml).


    #### Adding Fields to a Layout


    If *Layout* preferences are set to automatically add new fields to the current
    layout (Chapter [2](#429700_2_En_2_Chapter.xhtml)), then the eight Example fields
    will already be present on the default layout. If not, there are three ways to
    add fields to a layout. For now, use the *Field* tab of the *Objects* pane by
    following these steps in Layout mode:


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig9_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Drag selected fields from the Fields tab to the layout


    1.  Confirm that the *Field* tab is visible by selecting it under the *View ➤
    Objects ➤ Fields tab* menu.


    2.  Select the entire list of fields by clicking in the field list and then selecting
    the *Edit ➤ Select All* menu item.


    3.  Click, hold, and drag the list of fields onto the layout, as shown in Figure
    [6-9](#429700_2_En_6_Chapter.xhtml#Fig9). The fields should appear on the layout,
    neatly aligned and sized according to their data type.


    Note


    Learn about other ways to add fields to layouts in Chapter [20](#429700_2_En_20_Chapter.xhtml).


    #### Creating a List Layout


    Next, add a List view layout, by selecting the *Layout ➤ New Layout/Report* menu,
    and follow the steps in the dialog, shown in Figure [6-10](#429700_2_En_6_Chapter.xhtml#Fig10):


    1.  Enter “Sandbox List” into the *Layout Name* field.


    2.  Click a layout category of *Computer* in the first row of icons.


    3.  Click a layout type of *List* in the second row of icons.


    4.  Click the *Finish* button to close the dialog and complete the process.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig10_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig10_HTML.jpg)


    Figure 6-10


    The dialog used to create a new layout or report


    Note


    Other layout creation options are explored in Chapter [18](#429700_2_En_18_Chapter.xhtml).


    When finished, an empty List view layout will appear with three parts: *Header*,
    *Body*, and *Footer*. Because a List view has a vertical orientation, the process
    of adding fields will change slightly, following the steps shown in Figure [6-11](#429700_2_En_6_Chapter.xhtml#Fig11):


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig11_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Configure the Fields tab for dragging to a List view


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig12_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig12_HTML.jpg)


    Figure 6-12


    The fields dropped into the Body part of the layout


    1.  In the *Field tab* of the *Object* pane, confirm the *Drag Preferences* disclosure
    triangle is open and showing additional controls.


    2.  Select the *Horizontal* icon under *Field Placement*.


    3.  Select the *Labels* `option to put` labels above fields.


    4.  Select every Example field *except the container field* by clicking on each
    field while holding the Command (macOS) or Windows (Windows) key. We’ll skip the
    container field on the List view since it will default to a large vertical footprint
    and attempt to expand the layout.


    5.  Next drag the selected fields onto the layout. Be sure to place them high
    enough so they land completely within the defined layout parts (horizontal white
    area).


    6.  Once placed, drag them down so that the fields are roughly centered in the
    *Body* part, as shown in Figure [6-12](#429700_2_En_6_Chapter.xhtml#Fig12).


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig13_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig13_HTML.jpg)


    Figure 6-13


    The List view with cleaned-up labels and fields


    1.  Position the labels squarely in the *Header* area using the mouse or arrow
    keys.


    2.  Remove the repetitive prefix from each field label by double-clicking on each,
    and delete the extraneous “Example” portion.


    3.  Finally, adjust the size and position of the last two fields so nothing extends
    to the right in the gray area beyond the visible layout, as shown in Figure [6-13](#429700_2_En_6_Chapter.xhtml#Fig13).


    Note


    Manipulating layout objects is discussed further in Chapter [21](#429700_2_En_21_Chapter.xhtml).


    ## Configuring File Options


    The *File Options* dialog allows control over various behaviors of a database
    file. Unlike *application preferences*, these options are stored in the database
    file and are accessible only when a database is open. Select the *File ➤ File
