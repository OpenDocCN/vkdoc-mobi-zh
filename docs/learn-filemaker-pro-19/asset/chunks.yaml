    any other scripts in the stack which will resume execution.


    *   *Resume Current Script* – The paused script will resume running.


    *   *Pause Current Script* – The script will remain paused.


    ### Popover Button


    A *popover button* is a type of button that a user clicks to open a floating panel
    that contains additional layout objects. This reduces visual clutter by storing
    groups of controls out of view until needed. Popovers can be used for a variety
    of different purposes such as expanding field inputs, documentation tips, or a
    menu of actions like the simple example shown in Figure [20-33](#429700_2_En_20_Chapter.xhtml#Fig33).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig33_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig33_HTML.jpg)


    Figure 20-33


    A popover button containing an array of action buttons


    To create a popover, choose the *Insert ➤ Popover Button* menu, or click-hold
    the *Button* toolbar icon, and choose *Popover Button* from the menu, shown in
    Figure [20-34](#429700_2_En_20_Chapter.xhtml#Fig34). Then click and drag in the
    content area to draw the boundaries for the object.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig34_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig34_HTML.jpg)


    Figure 20-34


    Selecting the popover button tool from the toolbar


    #### Defining the Basic Popover Interface


    Once it is created, a new popover appears as a button with a popover interface
    open, as shown in Figure [20-35](#429700_2_En_20_Chapter.xhtml#Fig35).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig35_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig35_HTML.jpg)


    Figure 20-35


    A new popover button ready for editing


    The following elements make up the popover button interface:


    1.  *Button* – The button remains on the layout when the popover is closed. Like
    a standard button, this will be blank until you specify a label and/or icon.


    2.  *Interface/Design Area* – This area pops open when the user clicks the button.
    In Layout mode, this is a resizable design area where you can add layout elements
    as needed.


    3.  *Close Button* – This button, only visible when editing the popover in Layout
    mode, will close the popover interface.


    4.  *Title* – An optional title for the popover.


    Tip


    Click on the popover design area to show a gradient control bar and resize handles.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。



    ### 配置按钮标签


    *按钮标签*是显示在按钮边界内的标识性文本和/或图标，用于向用户传达其将执行的功能。标签在*按钮设置*对话框的顶部区域定义。按钮可以包含文本标签、图标标签，或两者组合。


    #### 使用文本标签


    要定义一个带有文本标签的按钮，请选择*标签*选项，然后输入标签文本，如图 20-28 所示：


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig28_HTML.jpg](img/429700_2_En_20_Fig28_HTML.jpg)


    **图 20-28** – 呈现一个命名按钮的按钮配置（对话框）（右）


    > **提示：** 按钮标签可以包含在文本区域中输入的合并字段，以创建动态名称。如需更动态的命名公式，请使用单段按钮栏代替按钮。


    #### 使用图标标签


    当定义一个带有*图标*标签的按钮时，*按钮设置*对话框的控件会发生变化，以允许选择和配置图像，如图 20-29 所示。从标准图标列表中选择一个图标。可以通过点击下方的加号图标并选择一个
    PNG 或 SVG 图像来扩展列表。此处添加的新图像将在当前数据库文件中的任何位置可用。使用图标列表下方的滑块可以在按钮对象的边界内缩小或放大图标的大小。


    > **注意：** 与其他控件不同，无论当前为标尺选择了哪个单位，此处的尺寸设置始终以*点*为单位显示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig29_HTML.jpg](img/429700_2_En_20_Fig29_HTML.jpg)


    **图 20-29** – 呈现一个图标按钮的按钮配置（对话框）（右）


    ---


    ### 配置按钮操作


    *按钮设置*对话框的底部区域控制按钮的功能。


    #### 执行单一步骤


    要将按钮配置为运行脚本步骤命令，请将*操作*弹出菜单更改为*单一步骤*。这将立即打开*按钮操作*对话框，如图 20-30 所示。这是*脚本工作区*对话框（第
    24 章）的一个受限版本。双击右侧列表中的一个步骤，将其添加为左侧分配的操作，替换现有选择。然后根据需要进行配置并点击确定。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig30_HTML.jpg](img/429700_2_En_20_Fig30_HTML.jpg)


    **图 20-30** – 用于为按钮选择和配置脚本步骤的对话框


    一旦分配并配置了脚本步骤，设置对话框底部的*操作*区域将显示所选的命令，如图 20-31 所示。要更改分配的命令，请点击它。启用底部的复选框可以使光标在悬停在按钮上时发生变化，从而向用户提供这是一个活动按钮的可视化指示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig31_HTML.jpg](img/429700_2_En_20_Fig31_HTML.jpg)


    **图 20-31** – 配置为运行单一步骤的对话框


    使用*单一步骤*选项时，只能为按钮分配*一个*命令。要为按钮附加更复杂的功能，请选择*执行脚本*而不是*单一步骤*，或者点击*按钮操作*对话框中的*转换为脚本*按钮，以快速创建保留任何现有步骤配置的新脚本。


    #### 执行脚本


    要将按钮配置为运行脚本，请将按钮的操作更改为*执行脚本*。这将立即打开*指定脚本*对话框（第 24 章，“探索指定脚本对话框”），允许选择脚本并输入可选参数。选择脚本后，*按钮设置*对话框底部的*操作*区域将显示所选脚本、参数和选项，如图
    20-32 所示。可以点击分配的脚本以打开并直接编辑脚本步骤。点击相邻的脚本图标可为按钮选择不同的脚本。点击脚本参数按钮可打开*指定计算*对话框，并输入将作为参数发送到脚本的数据公式（第
    24 章，“发送参数”）。


    *选项*区域包含一个用于更改光标的复选框。此外，还有一个菜单允许选择四个选项之一，用于处理按钮脚本运行后当前暂停的脚本，选项如下：


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig32_HTML.jpg](img/429700_2_En_20_Fig32_HTML.jpg)


    **图 20-32** – 配置为运行脚本的对话框


    -   **暂停当前脚本** – 所有正在运行的脚本都将暂停。

    -   **退出当前脚本** – 暂停的脚本将停止，控制权将返回到堆栈中任何其他脚本，这些脚本将恢复执行。

    -   **继续当前脚本** – 暂停的脚本将恢复运行。

    -   **暂停当前脚本** – 脚本将保持暂停状态。


    ---


    ### 弹出按钮


    *弹出按钮*是一种按钮类型，用户点击它可以打开一个包含其他布局对象的浮动面板。这通过将控件组隐藏在视线之外直到需要它们时再显示，从而减少了视觉杂乱。弹出按钮可用于多种不同目的，例如扩展字段输入、文档提示或操作菜单，如图
    20-33 所示的简单示例。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig33_HTML.jpg](img/429700_2_En_20_Fig33_HTML.jpg)


    **图 20-33** – 包含一系列操作按钮的弹出按钮


    要创建弹出按钮，请选择*插入 ➤ 弹出按钮*菜单，或按住*按钮*工具栏图标，然后从菜单中选择*弹出按钮*，如图 20-34 所示。然后在内容区域中单击并拖动以绘制对象的边界。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig34_HTML.jpg](img/429700_2_En_20_Fig34_HTML.jpg)


    **图 20-34** – 从工具栏选择弹出按钮工具


    #### 定义基本弹出按钮界面


    创建后，新的弹出按钮会显示为一个带有打开弹出界面的按钮，如图 20-35 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig35_HTML.jpg](img/429700_2_En_20_Fig35_HTML.jpg)


    **图 20-35** – 准备好进行编辑的新弹出按钮


    弹出按钮界面由以下元素组成：


    1.  **按钮** – 当弹出窗口关闭时，按钮保留在布局上。与标准按钮一样，在您指定标签和/或图标之前，此按钮为空。

    2.  **界面/设计区域** – 当用户点击按钮时，此区域会弹出。在布局模式下，这是一个可调整大小的设计区域，您可以在其中根据需要添加布局元素。

    3.  **关闭按钮** – 此按钮仅在布局模式下编辑弹出按钮时可见，它将关闭弹出界面。

    4.  **标题** – 弹出按钮的可选标题。


    > **提示：** 点击弹出设计区域可显示渐变控制条和调整大小手柄。

