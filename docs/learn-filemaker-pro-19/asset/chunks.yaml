  trans: '

    #### 恢复文件


    当数据库损坏或行为异常时，可以使用 `Recover` 功能重建文件的新副本并重新访问其内容。此过程具有攻击性，会采取一切必要措施来恢复对文件的访问。它会逐块重建文件，并尝试纠正任何损坏。但是，如果某个对象无法修复，它可能会被删除。由于其攻击性，该功能应作为诊断或恢复工具使用，而非用于日常维护。要执行恢复过程，请启动
    FileMaker Pro 应用程序，然后选择 `File ➤ Recover` 菜单。在文件选择对话框中，找到损坏的文件，然后单击 `Select` 按钮。在
    `Save` 对话框中，为恢复后的新文件副本输入名称并选择保存位置，并可选择指定高级选项（将在下一节中描述）。然后单击 `Save` 开始恢复过程。


    FileMaker 会将文件重建到指定的保存位置并报告结果。根据提供的信息，您可以确定恢复的文件副本是否可以安全使用，或者是否应将内容转移到之前保存的备份副本中。如果没有可用的稳定备份，可以仔细检查恢复日志，查看哪些类型的结构对象被报告为已损坏，然后系统地删除资源，并反复重复恢复过程，直到隔离出损坏的资源。然后，可以在原始文件中删除并重新创建每个损坏的项目，并重复该过程，直到恢复过程报告文件没有问题。然而，保留安全备份是最佳实践。


    ### 高级恢复选项


    `Advanced Recover Options` 对话框（如图 6-19 所示）控制恢复的执行方式。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig19_HTML.jpg](img/429700_2_En_6_Fig19_HTML.jpg)


    图 6-19


    恢复文件的高级选项


    `Generate new file` 部分控制恢复过程中创建新文件的三种方式。选择 `Copy file blocks as-is` 将按源文件中的原样复制所有文件块。生成的文件可能仍包含损坏的块。这相当于只保存当前文件的一个副本。`Copy
    logical structure (same as Compacted Copy)` 将复制源文件中的所有数据而不检查块，但会重建树结构。生成的文件可能仍包含损坏的块。这相当于保存当前文件的压缩副本。最后，选择
    `Scan blocks and rebuild file (drop invalid blocks)` 可完全重建文件，仅包括未损坏且不重复的块。生成的文件可能在结构上不稳定，可能仅适用于将数据提取到可靠的备份副本中。这是完整的恢复过程。以下复选框控制恢复期间的可选功能：


    *   `Scan Record Data and Rebuild Fields and Tables (schema)` – 重建文件的数据库模式（表、字段和关系），删除位于文件内无效位置的字段或记录，并重新创建缺失的字段和表定义。

    *   `Scan and Rebuild Scripts, Layouts, etc. (structure)` – 重建文件的结构（布局、脚本、主题）。

    *   `Rebuild Field Index` – 清除索引，并可以选择重建索引的时间。立即重建需要更长时间，但在任何人使用文件之前完成。稍后重建会强制在用户搜索或执行其他功能时根据需要重建索引。有关字段索引的更多信息，请参见第
    8 章。

    *   `Delete Cached Settings` – 移除打印、导入/导出、排序、查找等操作时上次选择的设置。

    *   `Bypass Startup Script and Layout` – 禁用脚本触发器（第 27 章）和文件的默认布局，改为打开一个新创建的空白恢复布局。


    ## 排查损坏文件的问题


    当文件明确报告损坏且无法打开时，您别无选择，只能恢复，并且通常需要将数据提取到可靠的结构备份中。但是，当文件可以打开但出现严重的间歇性崩溃时，需要执行几个步骤来安全地定位损坏，确定最佳行动方案，并将记录转移到良好的结构中。


    ### 定位损坏


    第一步排查涉及通过确定损坏是在数据库结构还是记录数据中来定位损坏。根据发现的情况，您的恢复选项和未来使用的文件选择可能会有所不同。


    #### 检查数据库结构


    要确定数据库结构是否损坏，请遵循以下步骤：


    1.  创建原始文件的排查副本，将其命名为唯一的名称，例如 “Broken Database”。

    2.  通过制作一个不包含任何记录数据的副本来隔离结构。打开 `Broken Database` 文件，执行 `Save a Copy as` 命令，选择
    `Clone (no records)` 选项，并将其命名为 “Broken Database Structure”。然后关闭 `Broken Database`
    文件。

    3.  接下来，压缩 `Broken Database Structure` 以预先修复可能妨碍排查的任何小问题。打开 `Broken Database Structure`
    文件，执行 `Save a Copy as` 命令，选择 `compacted copy (smaller)` 选项，并将其命名为 “Broken Database
    Structure Compacted”。然后关闭该文件。

    4.  要诊断结构，请使用默认恢复设置（取消选中高级选项）`Recover` `Broken Database Structure Compacted` 文件，并将其保存为
    “Broken Database Structure Recovered”。


    如果发现损坏，您可以跳过检查记录数据的步骤，而是恢复原始文件，并将记录数据从该文件转移到可靠的结构备份中，理想情况下是来自引入损坏之前某个时间的保存克隆。如果损坏已存在一段时间，并且您无法访问此类文件，则可以使用之前生成的已恢复文件作为结构。但是，请记住，恢复过程可能会导致无法恢复的对象被重命名或删除，因此可能需要做一些工作来补救这些情况。例如，字段可能被重命名为
    “Recovered Field”，或者关系图中可能出现 “Recovered Blob” 或 “Recovered Library” 表出现。这些可能表示也可能不表示损坏或数据丢失。


    警告


    如果 FileMaker 恢复报告明确声明某个文件不安全，则不建议使用它。


    #### 检查记录数据


    一旦排除了文件结构是损坏源，请遵循以下步骤来确定记录数据是否损坏：


    1.  打开 `Broken Database` 排查副本，执行 `Save a Copy as` 命令，选择 `compacted copy (smaller)`
    选项，并将其命名为 “Broken Database Records”。然后关闭该文件。

    2.  通过取消选中 `advanced options` 并命名为 “`Broken Database Records Recovered`”，使用默认恢复设置
    `Recover` `Broken Database Records` 文件。


    #### 确定最佳行动方案


    如果在文件结构和记录数据中均未报告损坏，您可以尝试在记录数据检查结束时使用已恢复的文件。如果随机崩溃继续发生，请考虑将记录数据转移到安全结构中。如果结构或记录数据报告了损坏，请立即将记录数据转移到安全结构中。

