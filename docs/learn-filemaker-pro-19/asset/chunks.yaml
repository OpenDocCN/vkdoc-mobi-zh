  trans: '

    # 安装菜单组


    安装自定义菜单组有多种方式。若要将某个菜单组设为整个文件的默认组，可在*管理自定义菜单*对话框底部的弹出菜单中选择该组。此操作会将此菜单组分配给每个使用文件默认组的布局（第
    18 章“探索布局设置对话框”）。当一个解决方案定义了多个自定义菜单组时，可以在*布局设置*对话框中针对特定布局激活这些菜单组。脚本也可以使用`安装菜单组`步骤来激活菜单组。此外，拥有完全访问权限的用户（第
    30 章）可以随时通过`工具 ➤ 自定义菜单`子菜单手动更改菜单组。


    # 探索命令与菜单之间的关联


    FileMaker Pro 应用程序界面中内置的某些元素为用户提供了对标准命令的访问权限，但未向开发者提供直接的自定义选项。例如，`新建记录`命令出现在多个位置：工具栏图标、记录右键菜单项以及表格视图中嵌入的某些控件。虽然菜单可以自定义，但工具栏和其他右键菜单无法直接修改。然而，FileMaker
    通过将这些元素与命令*通过活动的菜单组*进行关联来解决这个问题，如图 23-19 所示。这些静态界面元素从*命令关联的菜单项*中提取其*名称*、*工具提示*和*启用状态*，并将点击操作通过菜单项路由至命令。这种设置使得在使用自定义菜单时，可以间接自定义这些标准界面元素。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig19_HTML.jpg](img/429700_2_En_23_Fig19_HTML.jpg)


    图 23-19


    命令与界面元素的集成


    这方面的一个典型例子是`新建记录`命令，它出现在`记录`菜单以及前面提到的所有其他位置。核心的`新建记录`命令会根据用户账户权限被启用或禁用（第 30 章），不过这些权限可以被以完全权限运行的自定义脚本绕过（第
    24 章）。默认菜单项与该命令关联，并根据用户的凭据自动启用或禁用。其他访问点（如工具栏图标）会基于`新建记录`命令在*菜单*中查找对应项，以确定其名称、工具提示和启用状态。点击这些界面元素中的任何一个，都相当于直接选择该菜单项。因此，命令关联的菜单项充当了该命令的中心枢纽，这使得用自定义菜单组替换默认菜单组成为可能，同时仍能控制这些不可自定义的界面元素。如果菜单项的名称被自定义，该命令的工具栏图标也会随之更新，如图
    23-20 所示。如果为菜单项分配了一个自定义脚本，那么工具栏图标将运行该脚本，而非默认命令。与这些元素不同，布局上的按钮不通过命令-菜单结构进行关联，只能通过脚本来运行命令。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig20_HTML.jpg](img/429700_2_En_23_Fig20_HTML.jpg)


    图 23-20


    修改后的图标（左侧）和右键菜单（右侧）


    当从活动的菜单组中移除一个标准的`新建记录`命令关联菜单项时，这些其他界面元素将被禁用。可以创建一个新的菜单项，为其命名并分配一个用于创建记录的脚本动作，但该菜单项不会自动代表该命令，除非在`编辑自定义菜单`对话框中通过`基于现有命令`设置将其与命令关联起来，如图
    23-21 所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig21_HTML.jpg](img/429700_2_En_23_Fig21_HTML.jpg)


    图 23-21


    菜单项的命令链接允许基于权限启用和自定义标准界面元素


    菜单项与标准命令之间的关系可以有三种形式。*如果菜单项仅与标准命令关联，没有*名称或脚本重写，那么它将正常显示并执行与该命令关联的标准功能，同时正常影响其他界面元素。*如果菜单项未与标准命令关联，并被赋予了自定义名称和脚本，*那么它将执行自定义脚本作为其功能，但其他与命令相关的界面元素将被禁用或隐藏。当这两种情况结合，即菜单项*与标准命令关联，但重写了名称或脚本*时，它将显示自定义名称，执行分配的自定义脚本，同时基于权限继续自动启用，并将这些能力扩展到标准界面元素。

    '
- fmt: '# Creating a Status-Based Custom Menu


    Some standard menu items are status based, meaning they indicate the status of
    some mode of operation. The *View* menu has several examples, as shown in Figure
    [23-22](#429700_2_En_23_Chapter.xhtml#Fig22). Some status-based menus are a single
    menu item that toggles an on-off setting. For example, the *Status Toolbar* menu
    item displays a check mark when the toolbar is visible and no check mark when
    it is not visible. The single menu item can be selected to toggle this choice
    back and forth. Other examples combine groups of menus to allow multiple choice
    status menus, where there are more than two options. One of the four available
    modes at the top of the *View* menu will always have a check mark next to it indicating
    it as the active window mode. Similarly, one of the three *View as* options will
    be marked indicating the current Content view selected for the active window.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig22_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig22_HTML.jpg)


    **Figure 23-22** – Status-based menus are denoted with a check mark when active


    When menu items are based on commands, they will continue to function this way.
    Beyond that, there is no built-in option to make one or a set of custom menu items
    status based, and there is no way to include a check mark in the proper position
    to simulate such a state. However, since an item’s name can be the result of a
    calculation, it is possible to have a single menu item’s name changed to indicate
    a current state and create a similar toggle effect each time a user selects the
    item. For example, a menu item can be configured to alternate between two names,
    e.g., “Enable Tooltips” and “Disable Tooltips.” This can be accomplished by creating
    a global variable that stores a current status value and use that to generate
    the menu item’s name. The custom script assigned as the menu’s action looks at
    the variable’s current value to determine how to toggle to the opposite state,
    which then changes the menu item’s name.


    To illustrate this method, let’s create a custom menu item under the *Actions*
    menu that will have a *Name* formula shown in the following example. First, it
    uses a *Let* statement to initialize a `$$Mode_Tooltips` variable if it doesn’t
    yet contain a value. This is done with a *Case* statement that checks the variable
    for an empty string and sets it to 0 or uses the current value if one is found.
    Then, it uses another *Case* statement to create a menu name that reflects the
    action that will be taken depending on the current value. If the variable has
    a value of 0 indicating tooltips are off, the name will be “Enable Tooltips”;
    if the global variable has a value of 1 indicating tooltips are on, its name will
    be “Disable Tooltips.”


    ```

    Let ( [

    $$Mode_Tooltips = Case ( $$Mode_Tooltips = "" ; 0 ; $$Mode_Tooltips )

    ] ;

    Case ( $$Mode_Tooltips = 1 ; "Disable Tooltips" ; "Enable Tooltips" )

    )

    ```


    The menu item’s *Action* should be configured to run a script that uses the *Set
    Variable* script step (Chapter [25](#429700_2_En_25_Chapter.xhtml), “Setting Variables”)
    to toggle the value in the variable using the following *Case* statement. To refresh
    the menu name for the current layout, the script will also need to perform the
    *Install Menu Set* step to reset the custom set.


    ```

    Case ( $$Mode_Tooltips = 1 ; 0 ; 1 )

    ```


    Once the menu is in place, every layout object that will be assigned a tooltip
    in the *Position* tab of the *Inspector* pane can use the following formula to
    determine if a tooltip should be displayed:


    ```

    Case ( $$Mode_Tooltips = 1 ; "" ; "" )

    ```


    Now, when the user selects *Enable Tooltips*, the global variable is assigned
    a value of 1, tooltips begin appearing when the cursor hovers on objects, and
    the custom menu item’s name changes to *Disable Tooltips* which will hide the
    appearance of tooltips.


    ## Summary


    This chapter introduced the options for creating custom menus for total control
    of the application interface. In the next chapters, we begin creating scripts
    that can be assigned to menus, buttons, and event triggers to automatically perform
    a sequence of actions.


    # Part V – Automating Tasks with Scripts


    Scripts that automate repetitive actions can be assigned to buttons, menus, and
    interface events to improve data entry efficiency and reduce human errors. These
    chapters explore the basics of creating and debugging scripts:


    1. *Introduction to Scripting*

    2. *Common Scripting Tasks*

    3. *Debugging Scripts*

    4. *Using Script Triggers*

    5. *Extending Features with Plug-ins*


    # 24. Introduction to Scripting


    A script, sometimes called a macro, is a developer-defined action sequence stored
    for later execution. Once created, scripts can be connected to interface objects
    (Chapter [20](#429700_2_En_20_Chapter.xhtml)), menu items (Chapter [23](#429700_2_En_23_Chapter.xhtml)),
    and interface event triggers (Chapter [27](#429700_2_En_27_Chapter.xhtml)). They
    can also be run by other scripts, external scripting languages like *AppleScript*
    (macOS) or *ActiveX* (Windows). There are options to run a script with a URL (Chapter
    [20](#429700_2_En_20_Chapter.xhtml)), from JavaScript code in a web viewer’s HTML
    (Chapter [20](#429700_2_En_20_Chapter.xhtml)) or based on a FileMaker Server schedule.
    By performing complex tasks with a click, scripts can save users an enormous amount
    of time while improving consistency, reducing errors, and increasing productivity.
    Scripting transforms a database from a fancy spreadsheet to a fully functional
    custom application. It liberates users from having to manually perform mundane
    data entry chores and allows them to focus more attention on creative endeavors
    and customer engagement. FileMaker comes with numerous ready to configure script
    steps that can navigate, search, sort, print, export, communicate, and more (Chapter
    [25](#429700_2_En_25_Chapter.xhtml)). Plug-ins can add new functions to the library
    of available steps (Chapter [28](#429700_2_En_28_Chapter.xhtml)). This chapter
    introduces scripting, covering the following topics:


    - Introducing the script workspace

    - Writing scripts

    - Performing other scripts

    - Emphasizing the importance of context

    - Managing script errors


    ## Introducing the Script Workspace


    Scripts are viewed, written, and managed within the *Script Workspace* window,
    shown in Figure [24-1](#429700_2_En_24_Chapter.xhtml#Fig1). This window can be
    opened by selecting the *File ➤ Manage ➤ Scripts* menu item or the *Scripts ➤
    Script Workspace* menu item. The workspace is divided into four sections: *toolbar*,
    *scripts pane*, *script content area*, and *steps pane*.


    **Caution:** The workspace in a new database will hide elements until the first
    script is created. Click the + button to get started.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig1_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig1_HTML.jpg)


    **Figure 24-1** – The workspace for defining scripts'
  raw: '## Creating a Status-Based Custom Menu


    Some standard menu items are *status based*, meaning they indicate the status
    of some mode of operation. The *View* menu has several examples, as shown in Figure
    [23-22](#429700_2_En_23_Chapter.xhtml#Fig22). Some status-based menus are a single
    menu item that toggles an on-off setting. For example, the *Status Toolbar* menu
    item displays a check mark when the toolbar is visible and no check mark when
    it is not visible. The single menu item can be selected to toggle this choice
    back and forth. Other examples combine groups of menus to allow multiple choice
    status menus, where there are more than two options. One of the four available
    modes at the top of the *View* menu will always have a check mark next to it indicating
    it as the active window mode. Similarly, one of the three *View as* options will
    be marked indicating the current Content view selected for the active window.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig22_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig22_HTML.jpg)


    Figure 23-22


    Status-based menus are denoted with a check mark when active


    When menu items are based on commands, they will continue to function this way.
    Beyond that, there is no built-in option to make one or a set of custom menu items
    status based, and there is no way to include a check mark in the proper position
    to simulate such a state. However, since an item’s name can be the result of a
    calculation, it is possible to have a single menu item’s name changed to indicate
    a current state and create a similar toggle effect each time a user selects the
    item. For example, a menu item can be configured to alternate between two names,
    e.g., “Enable Tooltips” and “Disable Tooltips.” This can be accomplished by creating
    a global variable that stores a current status value and use that to generate
    the menu item’s name. The custom script assigned as the menu’s action looks at
    the variable’s current value to determine how to toggle to the opposite state,
    which then changes the menu item’s name.


    To illustrate this method, let’s create a custom menu item under the *Actions*
    menu that will have a *Name* formula shown in the following example. First, it
    uses a *Let* statement to initialize a *$$Mode_Tooltips* variable if it doesn’t
    yet contain a value. This is done with a *Case* statement that checks the variable
    for an empty string and sets it to 0 or uses the current value if one is found.
    Then, it uses another *Case* statement to create a menu name that reflects the
    action that will be taken depending on the current value. If the variable has
    a value of 0 indicating tooltips are off, the name will be “Enable Tooltips”;
    if the global variable has a value of 1 indicating tooltips are on, its name will
    be “Disable Tooltips.”


    ```

    Let ( [

    $$Mode_Tooltips = Case ( $$Mode_Tooltips = "" ; 0 ; $$Mode_Tooltips )

    ] ;

    Case ( $$Mode_Tooltips = 1 ; "Disable Tooltips" ; "Enable Tooltips" )

    )

    ```


    The menu item’s *Action* should be configured to run a script that uses the *Set
    Variable* script step (Chapter [25](#429700_2_En_25_Chapter.xhtml), “Setting Variables”)
    to toggle the value in the variable using the following *Case* statement. To refresh
    the menu name for the current layout, the script will also need to perform the
    *Install Menu Set* step to reset the custom set.


    ```

    Case ( $$Mode_Tooltips = 1 ; 0 ; 1 )

    ```


    Once the menu is in place, every layout object that will be assigned a tooltip
    in the *Position* tab of the *Inspector* pane can use the following formula to
    determine if a tooltip should be displayed:


    ```

    Case ( $$Mode_Tooltips = 1 ; "" ; "" )

    ```


    Now, when the user selects *Enable Tooltips*, the global variable is assigned
    a value of 1, tooltips begin appearing when the cursor hovers on objects, and
    the custom menu item’s name changes to *Disable Tooltips* which will hide the
    appearance of tooltips.


    ## Summary


    This chapter introduced the options for creating custom menus for total control
    of the application interface. In the next chapters, we begin creating scripts
    that can be assigned to menus, buttons, and event triggers to automatically perform
    a sequence of actions.


    # Part VAutomating


    Tasks with Scripts


    Scripts that automate repetitive actions can be assigned to buttons, menus, and
    interface events to improve data entry efficiency and reduce human errors. These
    chapters explore the basics of creating and debugging scripts:


    1.  *Introduction to Scripting*


    2.  *Common Scripting Tasks*


    3.  *Debugging Scripts*


    4.  *Using Script Triggers*


    5.  *Extending Features with Plug-ins*


    # 24. Introduction to Scripting


    A *script*, sometimes called a *macro*, is a developer-defined action sequence
    stored for later execution. Once created, scripts can be connected to interface
    objects (Chapter [20](#429700_2_En_20_Chapter.xhtml)), menu items (Chapter [23](#429700_2_En_23_Chapter.xhtml)),
    and interface event triggers (Chapter [27](#429700_2_En_27_Chapter.xhtml)). They
    can also be run by other scripts, external scripting languages like *AppleScript*
    (macOS) or *ActiveX* (Windows). There are options to run a script with a URL (Chapter
    [20](#429700_2_En_20_Chapter.xhtml)), from JavaScript code in a web viewer’s HTML
    (Chapter [20](#429700_2_En_20_Chapter.xhtml)) or based on a FileMaker Server schedule.
    By performing complex tasks with a click, scripts can save users an enormous amount
    of time while improving consistency, reducing errors, and increasing productivity.
    Scripting transforms a database from a fancy spreadsheet to a fully functional
    custom application. It liberates users from having to manually perform mundane
    data entry chores and allows them to focus more attention on creative endeavors
    and customer engagement. FileMaker comes with numerous ready to configure script
    steps that can navigate, search, sort, print, export, communicate, and more (Chapter
    [25](#429700_2_En_25_Chapter.xhtml)). Plug-ins can add new functions to the library
    of available steps (Chapter [28](#429700_2_En_28_Chapter.xhtml)). This chapter
    introduces scripting, covering the following topics:


    *   Introducing the script workspace


    *   Writing scripts


    *   Performing other scripts


    *   Emphasizing the importance of context


    *   Managing script errors


    ## Introducing the Script Workspace


    Scripts are viewed, written, and managed within the *Script Workspace* window,
    shown in Figure [24-1](#429700_2_En_24_Chapter.xhtml#Fig1). This window can be
    opened by selecting the *File ➤ Manage ➤ Scripts* menu item or the *Scripts ➤
    Script Workspace* menu item. The workspace is divided into four sections: *toolbar*,
    *scripts pane*, *script content area*, and *steps pane*.


    Caution


    The workspace in a new database will hide elements until the first script is created.
    Click the + button to get started.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig1_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig1_HTML.jpg)


    Figure 24-1


    The workspace for defining scripts'
  trans: '

    # 创建基于状态的自定义菜单


    某些标准菜单项是基于状态的，也就是说，它们指示某种操作模式的状态。*视图*（View）菜单中就有几个这样的例子，如图 23-22 所示。一些基于状态的菜单是单个菜单项，用于切换某个开关设置。例如，*状态工具栏*（Status
    Toolbar）菜单项在工具栏可见时会显示一个复选标记，而在不可见时则不显示。选择这个菜单项可以来回切换该选项。其他例子则将菜单组合在一起，形成多选状态菜单，这种情况下选项超过两个。在*视图*菜单顶部的四种可用模式中，总有一种旁边会带有复选标记，表示它是当前的活动窗口模式。同样，在三个*视图方式*（View
    as）选项中，也会有一个被标记，指示当前为活动窗口选择的视图内容。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig22_HTML.jpg](img/429700_2_En_23_Fig22_HTML.jpg)


    **图 23-22** – 基于状态的菜单在激活时以复选标记表示


    当菜单项基于命令时，它们将继续以这种方式运行。除此之外，没有内置选项可以使一个或一组自定义菜单项变为基于状态，也没有办法在适当位置包含复选标记来模拟这种状态。然而，由于菜单项的名称可以是计算的结果，因此可以让单个菜单项的名称根据当前状态改变，从而在用户每次选择该项时产生类似的切换效果。例如，可以将一个菜单项配置为在两个名称之间交替，如“启用工具提示”和“禁用工具提示”。这可以通过创建一个存储当前状态值的全局变量，并用它来生成菜单项的名称来实现。分配给菜单操作的自定义脚本会查看变量的当前值，以确定如何切换到相反状态，进而修改菜单项的名称。


    为了说明这种方法，让我们在*操作*（Actions）菜单下创建一个自定义菜单项，其*名称*（Name）公式如下例所示。首先，它使用一个*Let*语句来初始化
    `$$Mode_Tooltips` 变量（如果尚未包含值）。这是通过一个*Case*语句完成的，该语句检查变量是否为空字符串，若是则将其设置为 0，若找到值则使用当前值。然后，它使用另一个*Case*语句来创建一个反映当前值所对应操作的菜单名称。如果变量值为
    0，表示工具提示关闭，则名称为“启用工具提示”；如果全局变量值为 1，表示工具提示开启，则名称为“禁用工具提示”。


    ```

    Let ( [

    $$Mode_Tooltips = Case ( $$Mode_Tooltips = "" ; 0 ; $$Mode_Tooltips )

    ] ;

    Case ( $$Mode_Tooltips = 1 ; "Disable Tooltips" ; "Enable Tooltips" )

    )

    ```


    该菜单项的*操作*（Action）应配置为运行一个脚本，该脚本使用*设置变量*（Set Variable）脚本步骤（第 25 章“设置变量”）通过以下*Case*语句来切换变量中的值。为了刷新当前布局的菜单名称，该脚本还需要执行*安装菜单集*（Install
    Menu Set）步骤来重置自定义集。


    ```

    Case ( $$Mode_Tooltips = 1 ; 0 ; 1 )

    ```


    一旦菜单就位，每个在检查器（Inspector）窗格的*定位*（Position）选项卡中分配了工具提示的布局对象，都可以使用以下公式来确定是否应显示工具提示：


    ```

    Case ( $$Mode_Tooltips = 1 ; "" ; "" )

    ```


    现在，当用户选择*启用工具提示*时，全局变量被赋值为 1，当光标悬停在对象上时工具提示开始出现，并且自定义菜单项的名称变为*禁用工具提示*，这将隐藏工具提示的显示。


    ## 总结


    本章介绍了创建自定义菜单的选项，以便对应用程序界面进行完全控制。在接下来的章节中，我们将开始创建可以分配给菜单、按钮和事件触发的脚本，以自动执行一系列操作。


    # 第五部分 – 使用脚本自动化任务


    可以将自动化重复操作的脚本分配给按钮、菜单和界面事件，以提高数据输入效率并减少人为错误。这些章节探讨了创建和调试脚本的基础知识：


    1.  *脚本简介*

    2.  *常见脚本任务*

    3.  *调试脚本*

    4.  *使用脚本触发*

    5.  *通过插件扩展功能*


    # 24. 脚本简介


    脚本（有时称为宏）是开发者定义的、存储起来供以后执行的操作序列。创建后，脚本可以连接到界面对象（第 20 章）、菜单项（第 23 章）和界面事件触发（第 27
    章）。它们也可以由其他脚本、外部脚本语言（如 macOS 上的 *AppleScript* 或 Windows 上的 *ActiveX*）运行。还有选项可以通过
    URL（第 20 章）、Web 查看器 HTML 中的 JavaScript 代码（第 20 章）或基于 FileMaker Server 调度来运行脚本。通过一次点击执行复杂任务，脚本可以为用户节省大量时间，同时提高一致性、减少错误并提高生产力。脚本编程将数据库从花哨的电子表格转变为功能齐全的自定义应用程序。它使用户不必再手动执行繁琐的数据输入工作，从而能够将更多注意力集中在创造性工作和客户互动上。FileMaker
    提供了许多即用型的脚本步骤，可以导航、搜索、排序、打印、导出、通信等（第 25 章）。插件可以向可用步骤库添加新功能（第 28 章）。本章介绍脚本编程，涵盖以下主题：


    -   脚本工作区简介

    -   编写脚本

    -   执行其他脚本

    -   强调上下文的重要性

    -   管理脚本错误


    ## 脚本工作区简介


    脚本在*脚本工作区*（Script Workspace）窗口中查看、编写和管理，如图 24-1 所示。可以通过选择*文件 ➤ 管理 ➤ 脚本*（File ➤
    Manage ➤ Scripts）菜单项或*脚本 ➤ 脚本工作区*（Scripts ➤ Script Workspace）菜单项来打开此窗口。工作区分为四个部分：*工具栏*（toolbar）、*脚本窗格*（scripts
    pane）、*脚本内容区域*（script content area）和*步骤窗格*（steps pane）。


    **注意：** 新数据库中的工作区会隐藏元素，直到创建第一个脚本。点击 + 按钮开始。


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig1_HTML.jpg](img/429700_2_En_24_Fig1_HTML.jpg)


    **图 24-1** – 用于定义脚本的工作区

