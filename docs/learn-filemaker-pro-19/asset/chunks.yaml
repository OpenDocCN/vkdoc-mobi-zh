- fmt: '### Date Fields


    A `date field` is used to store a formal date within a range from `January 1,
    0001`, through `December 31, 4000`. Dates must be typed using the `short date
    format` matching the database setting for dates and times which was inherited
    from the computer upon which the file was created (Chapter [6](#429700_2_En_6_Chapter.xhtml),
    “File Options: Text”). In the United States, the default format is typically “<month>/<day>/<year>.”
    For example, `January 15, 2017`, would be entered into a date field as “`1/15/2017`.”
    Although all dates must be entered as short dates, a field on a layout can be
    configured to display the value in one of a variety of formats (Chapter [19](#429700_2_En_19_Chapter.xhtml),
    “Data Formatting”). When sorting records by a date field, the values will be sorted
    chronologically.


    #### Two-Digit Date Conversion


    `FileMaker` requires all dates to have four-digit years. Any entry in a date field
    with a two-digit year will automatically be converted to a four-digit year using
    a formula based on the year in which the data entry action occurs. This includes
    all entry methods: manual typing, importing, auto-enter formulas, or script step
    entry. The conversion process assumes that a date with a two-digit year is more
    likely to refer to a time further in the `past` than the `future`. Therefore,
    automatic conversion of a date’s year from two to four digits will adjust so the
    date falls within either the `next 30 years` or the `preceding 70 years` based
    on the `current year` when the data is entered. So, in 2020, typing “`1/1/51`”
    or earlier will be automatically converted to “`1/1/1951`,” while “`1/1/50`” will
    convert to “`1/1/2050`.” A database managing dates that fall outside of a 100-year
    range or that don’t fit this division pattern must be:


    -   Entered with four-digit years

    -   Entered into a text field instead of a date field where they can remain two-digit
    years

    -   Entered into a field with an auto-enter formula or script trigger that converts
    the date to the appropriate four-digit equivalent `before` `FileMaker` imposes
    its automatic conversion


    **Caution:** Prior to the year 2000, `FileMaker` allowed two-digit dates. When
    upgrading an old database, these will automatically receive a century of 1900
    unless manually converted before upgrading!


    ### Time Fields


    A `time field` is used to store a formal time string. Times must be typed using
    the time format matching the database setting for dates and times which was inherited
    from the computer upon which the file was created. In the United States, the default
    format is typically “<hour>:<min>:<sec> <am|pm>” or “`10:30:00 am`.” Times can
    refer to a time of day or an `amount of time`, which can be used to denote things
    like time allotted or elapsed. For example, “`0:15:00`” refers to 15 minutes.
    When sorting records by a time field, the values will be sorted chronologically
    by the amount of time.


    ### Timestamp Fields


    A `timestamp field` is used to unify a formal date and time in a single string.
    `FileMaker` allows timestamp values to range from `January 1, 0001, 12:00 AM`,
    through `December 31, 4000, 11:59:59 PM`. As with separate date and time values,
    a timestamp must be entered in a short format matching the database’s settings
    for each component, which are inherited from the computer upon which the file
    was created. The two components are entered with a space between them: “`<date>
    <time>`.” For example, “`1/1/2021 3:00 PM`” or “`8/1/2021 8:00 AM`.”


    **Tip:** Dates, times, and timestamps are stored as numbers expressing time passed
    from a fixed point: dates as a number of days passed since `January 1, 0001`,
    and times as a number of seconds passed since midnight. For example, “`8/1/2002`”
    is stored as `737638`, and “`10:00:00 AM`” is stored as `36000`. Therefore, formulas
    can add or subtract a number of days to a date or seconds to a time.


    ### Container Fields


    A `container field` is used to store a document. Files can be placed into container
    fields by a variety of functions including `Insert`, `Copy/Paste`, or `Drag/Drop`.
    A database running on an iOS device can use the `Insert from Device` script step
    to insert music, photo, camera, microphone, or signature data into a container.
    Depending on the configuration of the database and field, the files displayed
    in containers can exist within the database structure or be linked to it from
    an external folder location (Chapter [10](#429700_2_En_10_Chapter.xhtml)). Some
    file types have an `Interactive content` layout setting that allows for interactivity
    similar to their native applications (Chapter [19](#429700_2_En_19_Chapter.xhtml)).
    For example, a PDF file can be stored in a field with a layout configuration that
    allows users to view and navigate through the pages of the document as if they
    were viewing it in Adobe Acrobat. Other file types with interactive options are
    `photos`, `movies`, and `audio files`.


    ### Display Fields


    A `display field` is a non-editable field that automatically displays a value
    determined by its settings. `FileMaker` has two types of display fields: `calculation`
    and `summary`.


    #### Calculation Fields


    A `calculation field` is defined with a formula statement that is evaluated by
    `FileMaker` to produce a result (Chapter [12](#429700_2_En_12_Chapter.xhtml)).
    These are similar to cells in a spreadsheet with a formula applied with two major
    differences. First, the formula applies to the entire column, so each record uses
    the same formula to evaluate a result for the field. The formula can include variable
    conditions that evaluate differently for different records, but the overall formula
    itself remains the same for all. Second, it is `impossible` for a user to type
    into the cell, wipe out the formula, and enter data instead.


    #### Summary Fields


    A `summary field` is a field that automatically calculates a value based on another
    field’s values across a set of records, based on the current user’s context of
    a found set and sort order. For example, a summary field can calculate and display
    the total value of a field for every record in a found set or for subsets of records
    based on key sort fields. Summaries are configured with a combination of field
    options (explained later in this chapter) and layout part setup (Chapter [18](#429700_2_En_18_Chapter.xhtml)).


    ## Introducing the Manage Database Dialog (Fields)


    Fields are created and defined in the `Fields` tab of the `Manage Database` dialog
    shown in Figure [8-1](#429700_2_En_8_Chapter.xhtml#Fig1). Select `File ➤ Manage
    ➤ Database` menu and click on the `Fields` tab.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig1_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig1_HTML.jpg)

    *Figure 8-1: The dialog used to manage fields*


    The controls for field definitions include:


    1.  `Table Pop-up` – Select a table to see its fields below.

    2.  `Field List` – Displays a list of fields defined in the selected table. Select
    one to configure, rename, duplicate, or delete.

    3.  `Field Name and Comment` – Enter a new name for the selected field or a name
    for a new field. Enter a short developer comment about the selected field.

    4.  `Type` – Select a type for a new field or to change the selected.

    5.  `Options` – Click to edit field settings based on type.

    6.  `Buttons` – Used to `create` a new field or `change`, `duplicate`, `delete`,
    or `copy-paste` selected fields.'
