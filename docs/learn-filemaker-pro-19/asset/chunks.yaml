- fmt: '#### Go to Layout


    `Go to Layout`脚本步骤，如图[25-2](#429700_2_En_25_Chapter.xhtml#Fig2)所示，将切换当前窗口中显示的布局。该步骤有两个活动区域。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig2_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig2_HTML.jpg)


    Figure 25-2


    `Go to Layout`的配置选项


    未标记的`layout specifier`会打开一个菜单，提供选择如何标识目标布局的选项。默认选项是`Original layout`，它指示脚本导航回脚本开始运行时的布局。这在脚本可以从数据库中的多个位置触发时节省开发时间，并自动跟踪和恢复用户的起始布局。选择`Layout`选项可打开`Specify
    Layout`对话框，并选择对特定目标布局的引用。`Layout Name by calculation`和`Layout Number by calculation`选项会打开`Specify
    Calculation`对话框，允许通过公式确定目标布局的名称或编号。


    步骤中的`Animation`区域用于在`FileMaker Go`中指定布局切换的动画效果。在其他平台上运行脚本时，此设置将被忽略。


    #### Go to Record/Request/Page


    `Go to Record/Request/Page`步骤，如图[25-3](#429700_2_En_25_Chapter.xhtml#Fig3)所示，用于根据模式在窗口内容中进行导航。它会根据模式导航到指定的项目：记录（浏览模式）、查找请求（查找模式）或页面（预览模式）。根据第一个设置中选择的选项，该步骤有一个或两个活动区域。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig3_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig3_HTML.jpg)


    Figure 25-3


    `Go to Record/Request/Page`的配置选项


    未标记的`target specifier`会打开一个位置目标选项菜单。这些选项允许步骤跳转到`First`或`Last`项目，或移动到`Previous`或`Next`项目。底部的`By
    Calculation`选项允许通过公式确定一个数字，指示目标记录、请求或页面。当目标是`Previous`或`Next`时，会出现一个额外的`Exit after
    last`选项，可以切换为`On`或`Off`。当开启时，步骤在到达第一个参数指示方向上的最后一条可用记录后，会自动退出`Loop`语句。当开启时，`Previous`会在到达第一条记录/请求/页面后退出，而`Next`会在到达最后一条后退出。


    #### Go to Related Record


    `Go to Related Record`步骤作为一个单一步骤执行多项功能。它会查找并导航到另一布局上的一组相关记录，并可以选择在新窗口中打开结果。为了说明，想象一个用户正在查看一个`Contact`记录，并希望在一个新窗口中查看该联系人关联的父级`Company`记录。无需手动创建新窗口、更改布局和执行查找，按钮或脚本可以使用`Go
    to Related Record`步骤通过一次单击快速完成该任务。在这个例子中，`Contact`是起始的`source table`，而`Company`是目标的`target
    table`，它们各自位于表实例之间关系的一侧（第[9](#429700_2_En_9_Chapter.xhtml)章）。用于在联系人布局上`display`相关公司名称的同一关系将被此步骤用作我们`navigate`的通道。通过“穿过”该关系，用于形成关系的匹配字段就像显示在目标表中的记录的搜索条件。


    一旦将步骤添加到脚本或分配给按钮，双击它，或单击齿轮图标以打开`Go to Related Record Options`对话框，如图[25-4](#429700_2_En_25_Chapter.xhtml#Fig4)所示。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig4_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig4_HTML.jpg)


    Figure 25-4


    用于配置`Go to Related Record Options`的对话框


    `Get related record from`弹出菜单列出了当前数据库文件的关系图中定义的每个表实例。选择与起始布局的表相关的任何实例。在我们的示例中，我们将从`Contact`表的布局开始。要到达`Company`表的布局，我们必须选择一个也同时与`Contact`表相关的`Company`表实例。因此，我们选择`Contact
    | Company`关系，以使用该关系的条件从`Contact`记录导航到其相关的`Company`。


    `Show record using layout`选项指定了用于显示相关记录的目标布局。此设置打开一个菜单，提供与`Go to Layout`步骤类似的四个选项。`Current
    Layout`选项将用户留在当前布局上。这对于定位自联接关系非常有用，其中目标记录与源记录在同一表中。`Layout`选项打开`Specify Layout`对话框，用于选择对特定布局的引用。`Layout
    Name by calculation`和`Layout Number by calculation`选项打开`Specify Calculation`对话框，允许通过公式确定目标布局的编号或名称。`Specify
    Layout`对话框仅显示当前数据库文件中目标表的布局。如果目标表来自外部数据源，请选中`Use external table''s layouts`复选框，以改为显示该外部文件中表的布局列表。


    `Show in new window`复选框及相邻的`Specify`按钮允许在新窗口中显示结果，而不是起始窗口。这些设置与本章后面描述的`New Window`脚本步骤相同。


    `Show only related records`选项控制目标布局/窗口中显示的找到集中包含哪些记录。当`disabled`时，该步骤将尝试保留目标表中已存在的找到集。如果相关记录存在于该集中，它将保留该集并将用户置于该记录上。如果不存在，该步骤将查找所有记录并将用户带到目标记录。当`enabled`时，将在目标表中建立不同的找到集，具体取决于选中的单选按钮选项。`Match
    current record only`选择将导致目标找到集仅包含与`starting record`相关条件匹配的记录。这类似于`one-to-one`或`one-to-many`搜索，其中使用当前起始记录查找目标表中的匹配记录。`Match
    all records in the current found set`选项将导致找到集包含目标表中与起始找到集中`any`记录匹配的每条记录。这相当于`many-to-many`搜索，其中使用当前找到集查找目标表中的匹配记录。


    当此步骤因点击门户中的按钮而执行时，设置控制目标找到集，但用户点击的记录决定了该集中哪一条将成为当前活动记录。


    ## Interacting with Fields


    有几个步骤允许与字段进行各种交互。这些包括将焦点移入字段、更改字段内容以及重置字段定义的序列化设置。'
  raw: '#### Go to Layout


    The *Go to Layout* script step, shown in Figure [25-2](#429700_2_En_25_Chapter.xhtml#Fig2),
    will switch the layout displayed in the current window. The step has two active
    regions.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig2_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig2_HTML.jpg)


    Figure 25-2


    The configuration options for Go to Layout


    The unlabeled *layout specifier* opens a menu of choices for how to identify the
    target layout. The default selection will be *Original layout* which instructs
    the script to navigate back to the layout that was active when the script started
    running. This saves development time when a script can be triggered from multiple
    locations in a database, automatically tracking and restoring the user’s starting
    layout. Choose the *Layout* option to open a *Specify Layout* dialog, and choose
    a reference to a specific target layout. The *Layout Name by calculation* and
    *Layout Number by calculation* options open the *Specify Calculation* dialog allowing
    a formula to determine the name or number of the target layout.


    The *Animation* region of the step is used in FileMaker Go to specify how the
    layout switch should be animated. This setting will be ignored when running the
    script on other platforms.


    #### Go to Record/Request/Page


    The *Go to Record/Request/Page* step, shown in Figure [25-3](#429700_2_En_25_Chapter.xhtml#Fig3),
    is used to navigate through the content of a window, depending on the mode. It
    will navigate to a specified item by mode; record (Browse), find request (Find),
    or page (Preview). The step has one or two active regions depending on the option
    selected on the first setting.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig3_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig3_HTML.jpg)


    Figure 25-3


    The configuration options for Go to Record/Request/Page


    The unlabeled *target specifier* opens a menu of positional target options. These
    allow the step to jump to the *First* or *Last* item or to move one step to the
    *Previous* or *Next* item. The *By Calculation* option at the bottom allows a
    formula to determine a number indicating which record, request, or page is the
    target. When the target is *Previous* or *Next*, an additional *Exit after last*
    option appears, which can be toggled *On* or *Off*. When on, the step will automatically
    exit a *Loop* statement after reaching the last available record in the direction
    indicated by the first parameter. When on, *Previous* will exit after reaching
    the first record/request/page, while *Next* will exit after reaching the last.


    #### Go to Related Record


    The *Go to Related Record* step performs multiple functions as a single step.
    It finds and navigates to a set of related records on another layout and can optionally
    open the result in a new window. To illustrate, imagine a user is viewing a *Contact*
    record and wants to view the record for that contact’s related parent *Company*
    in a new window. Instead of manually creating a new window, changing layouts,
    and performing a find, a button or script can use the *Go to Related Record* step
    to quickly carry out the task with a single click. In this example, *Contact*
    is the starting *source table,* and *Company* is the destination *target table*,
    each being on one side of a relationship between table occurrences (Chapter [9](#429700_2_En_9_Chapter.xhtml)).
    The same relationship used to *display* a related company name on a contact layout
    will be used by this step as the conduit through which we *navigate*. By traveling
    “through” the relationship, the match fields used to form the relationship act
    like the search criteria for the record(s) that will be displayed in the target
    table.


    Once the step is added to the script or assigned to a button, double-click it,
    or click the gear icon to open the *Go to Related Record Options* dialog, shown
    in Figure [25-4](#429700_2_En_25_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig4_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig4_HTML.jpg)


    Figure 25-4


    The dialog used to configure going to a related record


    The *Get related record from* pop-up menu lists every table occurrence defined
    in the current database file’s relationship graph. Select any occurrence related
    to the starting layout’s table. In our example, we will start on a layout for
    the *Contact* table. To reach a layout for the *Company* table, we must pick an
    occurrence of that table that is also related to the *Contact* table. So, we select
    the *Contact | Company* relationship to travel from a *Contact* record to its
    related *Company* using that relationship’s criteria.


    The *Show record using layout* option specifies the target layout that will be
    the destination used to display the related record(s). This setting opens a menu
    with four options that are similar to the *Go to Layout* step. The *Current Layout*
    option will leave the user on the current layout. This is useful for targeting
    a self-join relationship, where the target records are in the same table as the
    source record. The *Layout* option opens a *Specify Layout* dialog for selection
    of a reference to a specific layout. The *Layout Name by calculation* and *Layout
    Number by calculation* options open the *Specify Calculation* dialog allowing
    a formula to determine the number or name of the target layout. The *Specify Layout*
    dialog will only display layouts for the target table from the current database
    file. If the target table is from an external data source, select the *Use external
    table’s layouts* checkbox to instead show a list of layouts for the table from
    that external file.


    The *Show in new window* checkbox and adjacent *Specify* button enable displaying
    the results in a new window instead of the starting window. These settings are
    identical to the *New Window* script step described later in this chapter.


    The *Show only related records* option controls which records are included in
    the found set displayed in the target layout/window. When *disabled*, the step
    will attempt to preserve the found set already present in the target table. If
    the related record is present in that set, it will retain the set and drop the
    user on that record. If not, the step will find all records and take the user
    to the target record. When *enabled*, a different found set will be established
    in the target table depending on the radio button option selected. The *Match
    current record only* selection will result in a target found set of only the record(s)
    matching the related criteria for the *starting record*. This is like a *one-to-one*
    or *one-to-many* search, where the current starting record is used to find matching
    records in the target table. The *Match all records in the current found set*
    option will result in a found set of every record in the target table that has
    a match to *any* record in the starting found set. This is the equivalent of a
    *many-to-many* search, where the current found set is used to find matching records
    in the target table.


    When this step is executed as the result of a click on a button in a portal, the
    settings control the target found set, but the record the user clicked determines
    which of those will be come the currently active record in that set.


    ## Interacting with Fields


    Several steps allow various interactions with fields. These include moving focus
    into a field, changing the contents of a field, and resetting the field’s defined
    serialization settings.'
