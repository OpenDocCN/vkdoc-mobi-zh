  raw: '# 1. Introducing FileMaker


    *FileMaker Pro* is a software platform used to create relational database applications
    for modern workflows. Published by Apple subsidiary Claris International Inc.,
    the software is popular among novice programmers for its intuitive, low-code programming
    interface, while professionals appreciate access to advanced technologies, robust
    customization options, rich connectivity, and plug-in extensibility. A uniquely
    integrated architecture combines the full stack of data, logic, and interface
    layers into a seamless programming experience. Using the flagship desktop application,
    developers can collaboratively create a secure, multi-user, cross-platform solution
    and rapidly deploy it to mobile, cloud, and on-premise workflows. Solutions can
    range from simple spreadsheet-like worksheets to artfully designed, feature-rich,
    interface-driven solutions. FileMaker is used by independent consultants, employees
    of small businesses, and members of teams working at medium to large businesses,
    nonprofits, and government agencies. Although it is easy to learn, business leaders
    who can’t invest the time themselves and don’t employ a development staff can
    easily find a professional consultant to develop a system tailored to meet their
    needs. Whatever the skill set, FileMaker is an excellent choice for building custom
    databases. This chapter introduces FileMaker, discussing


    *   A brief introduction to databases


    *   The history of FileMaker in a nutshell


    *   Adapting to the integrated full stack


    *   Reviewing product line


    ## A Brief Introduction to Databases


    A *database* is a structured collection of information stored in a generic format
    that is easily accessible for a wide variety of uses. The modern world is full
    of databases, and we interact with them constantly through apps and websites.
    Most of these are focused on one specific data type with predefined properties
    and procedures. For example, a calendar application allows a user to create and
    manage *events* with properties of *date*, *time*, *attendees*, *notes*, and *alerts*.
    Similarly, an email application allows management of *messages* with predefined
    properties of *sender*, *recipients*, *subject*, and *body*. These could each
    be thought of colloquially as an “event-base” and a “message-base” since, at their
    *base*, they store and provide access to *events* and *messages*. From a wider
    perspective, both events and messages are types of information; they are both
    forms of *data*. A calendar app accesses and manages an *event database*. A mail
    application does the same with a *message database*. Unlike these and countless
    other modern applications that provide front-end access to an out-of-sight database,
    an *open-ended database* application has no predefined data type; at its base
    is data, *any kind of data*. A database application like FileMaker allows a developer
    to create custom solutions that manage any data they define.


    Applications such as a calendar or mail app provide a predefined database that
    is like a metaphorical filing cabinet, structurally locked and preconfigured by
    the vendor to accept a specific type of information. A user is free to enter information
    into this predefined framework but has little or no control over the framework
    itself. By contrast, a custom database is the metaphorical equivalent of that
    same filing drawer completely empty and unlocked so that *you* can define the
    content it accepts and decide how that information is stored, related, displayed,
    used, and shared. Every project starts fresh with the same blank slate waiting
    for you to define the framework and establish the capabilities that will be available
    to the user. So, don’t make the mistake of thinking of FileMaker as a system for
    only managing contacts or projects. Similar to how a word processing document
    can contain a wide variety of different written content, a database built with
    FileMaker can store information about *anything* a developer defines it to manage:
    *companies*, *contacts*, *inventory*, *invoices*, *messages*, *notes*, *people*,
    *products*, *tasks*, and more.


    ## The History of FileMaker in a Nutshell


    The early history of FileMaker is a zigzag between various names, publishers,
    platforms, and numbering systems before eventually settling into a stable, modern
    track.


    ### Nashoba Systems


    FileMaker started its life in the early 1980s as Nutshell, an MS-DOS computer
    program developed by Nashoba Systems in Concord, Massachusetts, and distributed
    by electronics marketer Leading Edge. When the Macintosh computer was introduced
    in early 1984, Nashoba saw an opportunity and combined the Nutshell database engine
    with a graphic user interface to create a forms-based database product. Since
    Leading Edge wanted to remain a DOS-only vendor, Nashoba turned to a new distributor,
    Forethought, Inc. As a result, FileMaker version 1.0 was released in April 1985
    for the Macintosh platform. In 1986, it was renamed *FileMaker Plus* to match
    the release of the Macintosh Plus. When Microsoft purchased Forethought in 1987,
    they tried to negotiate a purchase of FileMaker, which was outselling their own
    Microsoft File database application. However, Nashoba declined and began self-publishing
    the program, now named FileMaker 4\. By today’s standards, these early versions
    of FileMaker were incredibly primitive. However, it was very capable for its time,
    and the software filled an important need by providing an easy-to-use interface
