- fmt: '# Introducing Formulas


    Formulas are used in numerous places in the development interface. The *Replace
    Field Contents* dialog has an option to insert a formula result (Chapter [4](#429700_2_En_4_Chapter.xhtml)).
    Many programming dialogs or panels have *Options*, *Specify*, `Fx`, or *Pencil
    icon* buttons that access a formula dialog. The same applies to a *Specify* option
    in some pop-up menus. When defining a calculation field, a formula is entered.
    Regular fields accept formulas to generate an auto-enter value and a validation
    result (Chapter [8](#429700_2_En_8_Chapter.xhtml)). Custom functions define global
    formulas (Chapter [15](#429700_2_En_15_Chapter.xhtml)). The *Inspector* pane in
    Layout mode accepts formulas to hide objects and create placeholder text and tooltips
    (Chapter [19](#429700_2_En_19_Chapter.xhtml)). Many layout objects accept formulas
    to determine their name or other criteria, including *Button Bars*, *Buttons*,
    *Popovers*, *Tabs*, *Portals*, *Charts*, and *Web viewers* (Chapter [20](#429700_2_En_20_Chapter.xhtml)).
    Custom menus can use formulas to determine a name and visibility (Chapter [23](#429700_2_En_23_Chapter.xhtml)).
    Script parameters can be generated with a formula (Chapter [24](#429700_2_En_24_Chapter.xhtml)),
    and numerous script steps can or must be configured with formulas (Chapter [25](#429700_2_En_25_Chapter.xhtml)).
    Security privileges can be configured to use formulas to determine access to schema
    resources (Chapter [30](#429700_2_En_30_Chapter.xhtml)). The developer *Data Viewer*
    dialog has an *Edit Expressions* dialog that accepts formulas to continuously
    monitor a result (Chapter [31](#429700_2_En_31_Chapter.xhtml)). All of these open
    a *Specify Calculation* window, as shown in Figure [12-1](#429700_2_En_12_Chapter.xhtml#Fig1).
    This dialog is where formulas are constructed.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig1_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig1_HTML.jpg)


    Figure 12-1


    A dialog used to define a calculation formula


    ## How Formulas Work


    A calculation formula is created by assembling various text components into a
    written statement that express how a result should be produced. When saving a
    new or modified formula, FileMaker scans the statement to check for syntax errors,
    e.g., such as broken references, missing functions, or incorrectly structured
    statements. When a problem is detected, the save process is halted, the error
    is highlighted in the statement, and a dialog message explains the details of
    the error. This process is repeated until there are no errors detected, and the
    code can be successfully compiled and saved. Once saved, a formula remains in
    an idle state, until it is *called* by any process which prompts an evaluation
    of its statement to produce a result.


    A formula can be called numerous ways. A field’s auto-enter formula is called
    when a record is created or when fields used in the formula are altered. When
    a layout object is rendered, any formulas used by it will be called. This applies
    to objects that use formulas to generate a *name*, *hide condition*, *contextual
    formatting*, or other interface-related properties or conditions. A script step’s
    calculation element is called when the step is executed as the script runs. A
    formula can be called by another formula, e.g., a calculation field including
    another calculation field in its formula or a custom function calling another
    custom function or a calculation field.


    When called, the formula’s statement is *evaluated*, which means that the code
    is converted into a result by working through each operation in a specific order
    of precedence. Formulas are always evaluated from the *context* of a specific
    table occurrence. A formula used in a *field definition* requires a manually selected
    context of any table occurrence for the table in which the field exists. A formula
    associated with an *interface element* will use the context of the table occurrence
    of the layout upon which the object is being rendered. A formula used in a *script
    step* will use the context of the table occurrence of the layout displayed in
    the current window at the time it is executed. Formulas used in *custom menus*
    also use the current layout’s table as a context.


    The *result* of a formula is returned to the calling process which handles it
    in a way appropriate to its function. For example, a *calculation field* contains
    the result of its formula and displays it when placed on a layout. A *layout object*
    name may change its displayed name, visibility, or appearance based on the result.
    The `Set Variable` script step places the result of its formula into a variable.
    The `Show Custom Message` script step will place a result into a dialog presented
    on screen. The type of object and the aspect of its configuration that called
    the formula determines the destination or use of the result.


    When a formula is unable to create a result due to an execution error, it will
    return a question mark. For example, if a formula is using a field that has been
    deleted or is inaccessible from the current context, the formula may return an
    error. Similarly, using a custom function that has been deleted or providing a
    result as a data type inconsistent with the expectations of the calling process
    will return an error.


    ## Defining Formula Components


    A formula expression can be built using any combination of *comments*, *constants*,
    *field references*, *functions*, *operators*, *reserved keywords*, and *variables*.


    ### Comments


    A *comment* is a text string inserted into a formula that is completely ignored
    when the code is evaluated. Comments can be used to break code into sections or
    act as integrated documentation for developers, providing details about the functions
    it performs, how it works, a record of changes, or notes about unfinished work.
    A comment may be placed at the top of the formula or anywhere between individual
    statements or sections of code. There are two styles of comment available: *end-of-line*
    and *multiline*.


    #### Creating End-of-Line Comments


    An *end-of-line comment* starts at any double forward slash and continues until
    the next paragraph return. Any text placed between the slashes and the end of
    line indicated by the return will be ignored by FileMaker when the formula is
    evaluated. The following example has several end-of-line comments. The first and
    second paragraphs are both comments and demonstrate that each line requires a
    new set of slashes to produce a comment. The third paragraph has a comment starting
    in the middle of the paragraph, after a formula adding two numbers. The formula
    portion of this line will be evaluated, while the comment portion will be ignored.
    The result will be the total of the two numbers: *four*.


    ```

    // This is a comment

    // To continue on a second line you must use another set of symbols

    2 + 2    // This comment starts in the middle of a line, after a formula

    ```


    #### Creating Multiline Comments


    A *multiline comment* uses an *initiating* and *terminating* symbol to indicate
    the start and end of a comment. These are used to “comment out” an entire block
    of paragraphs. To enter a multiline comment, use a forward slash and asterisk
    to indicate the *start* of the comment and the reverse, an asterisk and forward
    slash, to indicate the *end* of the comment. Any text between these two will be
    completely ignored by FileMaker when the formula is evaluated. In the following
    example, the formula has two block comments that will be ignored with a formula
    between them that will be evaluated, again producing a result of the total of
    the two numbers: *four*.


    ```

    /*

    This is a comment

    The comment continues on additional lines

    3 + 4 including this entire line

    Until you terminate it here

    */

    2 + 2

    /*

    This is another comment with returns as spaces

    The comment continues on additional lines until terminated

    */

    ```'
  raw: '## Introducing Formulas


    Formulas are used in numerous places in the development interface. The *Replace
    Field Contents* dialog has an option to insert a formula result (Chapter [4](#429700_2_En_4_Chapter.xhtml)).
    Many programming dialogs or panels have *Options*, *Specify*, *Fx,* or *Pencil
    icon* buttons that access a formula dialog. The same applies to a *Specify* option
    in some pop-up menus. When defining a calculation field, a formula is entered.
    Regular fields accept formulas to generate an auto-enter value and a validation
    result (Chapter [8](#429700_2_En_8_Chapter.xhtml)). Custom functions define global
    formulas (Chapter [15](#429700_2_En_15_Chapter.xhtml)). The *Inspector* pane in
    Layout mode accepts formulas to hide objects and create placeholder text and tooltips
    (Chapter [19](#429700_2_En_19_Chapter.xhtml)). Many layout objects accept formulas
    to determine their name or other criteria, including *Button Bars*, *Buttons*,
    *Popovers*, *Tabs*, *Portals*, *Charts,* and *Web viewers* (Chapter [20](#429700_2_En_20_Chapter.xhtml)).
    Custom menus can use formulas to determine a name and visibility (Chapter [23](#429700_2_En_23_Chapter.xhtml)).
    Script parameters can be generated with a formula (Chapter [24](#429700_2_En_24_Chapter.xhtml)),
    and numerous script steps can or must be configured with formulas (Chapter [25](#429700_2_En_25_Chapter.xhtml)).
    Security privileges can be configured to use formulas to determine access to schema
    resources (Chapter [30](#429700_2_En_30_Chapter.xhtml)). The developer *Data Viewer*
    dialog has an *Edit Expressions* dialog that accepts formulas to continuously
    monitor a result (Chapter [31](#429700_2_En_31_Chapter.xhtml)). All of these open
    a *Specify Calculation* window, as shown in Figure [12-1](#429700_2_En_12_Chapter.xhtml#Fig1).
    This dialog is where formulas are constructed.


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig1_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig1_HTML.jpg)


    Figure 12-1


    A dialog used to define a calculation formula


    ### How Formulas Work


    A calculation formula is created by assembling various text components into a
    written statement that express how a result should be produced. When saving a
    new or modified formula, FileMaker scans the statement to check for syntax errors,
    e.g., such as broken references, missing functions, or incorrectly structured
    statements. When a problem is detected, the save process is halted, the error
    is highlighted in the statement, and a dialog message explains the details of
    the error. This process is repeated until there are no errors detected, and the
    code can be successfully compiled and saved. Once saved, a formula remains in
    an idle state, until it is *called* by any process which prompts an evaluation
    of its statement to produce a result.


    A formula can be called numerous ways. A field’s auto-enter formula is called
    when a record is created or when fields used in the formula are altered. When
    a layout object is rendered, any formulas used by it will be called. This applies
    to objects that use formulas to generate a *name*, *hide condition*, *contextual
    formatting,* or other interface-related properties or conditions. A script step’s
    calculation element is called when the step is executed as the script runs. A
    formula can be called by another formula, e.g., a calculation field including
    another calculation field in its formula or a custom function calling another
    custom function or a calculation field.


    When called, the formula’s statement is *evaluated*, which means that the code
    is converted into a result by working through each operation in a specific order
    of precedence. Formulas are always evaluated from the *context* of a specific
    table occurrence. A formula used in a *field definition* requires a manually selected
    context of any table occurrence for the table in which the field exists. A formula
    associated with an *interface element* will use the context of the table occurrence
    of the layout upon which the object is being rendered. A formula used in a *script
    step* will use the context of the table occurrence of the layout displayed in
    the current window at the time it is executed. Formulas used in *custom menus*
    also use the current layout’s table as a context.


    The *result* of a formula is returned to the calling process which handles it
    in a way appropriate to its function. For example, a *calculation field* contains
    the result of its formula and displays it when placed on a layout. A *layout object*
    name may change its displayed name, visibility, or appearance based on the result.
    The *Set Variable* script step places the result of its formula into a variable.
    The *Show Custom Message* script step will place a result into a dialog presented
    on screen. The type of object and the aspect of its configuration that called
    the formula determines the destination or use of the result.


    When a formula is unable to create a result due to an execution error, it will
    return a question mark. For example, if a formula is using a field that has been
    deleted or is inaccessible from the current context, the formula may return an
    error. Similarly, using a custom function that has been deleted or providing a
    result as a data type inconsistent with the expectations of the calling process
    will return an error.


    ## Defining Formula Components


    A formula expression can be built using any combination of *comments*, *constants*,
    *field references*, *functions*, *operators*, *reserved keywords,* and *variables*.


    ### Comments


    A *comment* is a text string inserted into a formula that is completely ignored
    when the code is evaluated. Comments can be used to break code into sections or
    act as integrated documentation for developers, providing details about the functions
    it performs, how it works, a record of changes, or notes about unfinished work.
    A comment may be placed at the top of the formula or anywhere between individual
    statements or sections of code. There are two styles of comment available: *end-of-line*
    and *multiline*.


    #### Creating End-of-Line Comments


    An *end-of-line comment* starts at any double forward slash and continues until
    the next paragraph return. Any text placed between the slashes and the end of
    line indicated by the return will be ignored by FileMaker when the formula is
    evaluated. The following example has several end-of-line comments. The first and
    second paragraphs are both comments and demonstrate that each line requires a
    new set of slashes to produce a comment. The third paragraph has a comment starting
    in the middle of the paragraph, after a formula adding two numbers. The formula
    portion of this line will be evaluated, while the comment portion will be ignored.
    The result will be the total of the two numbers: *four*.


    ```

    // This is a comment

    // To continue on a second line you must use another set of symbols

    2 + 2    // This comment starts in the middle of a line, after a formula

    ```


    #### Creating Multiline Comments


    A *multiline comment* uses an *initiating* and *terminating* symbol to indicate
    the start and end of a comment. These are used to “comment out” an entire block
    of paragraphs. To enter a multiline comment, use a forward slash and asterisk
    to indicate the *start* of the comment and the reverse, an asterisk and forward
    slash, to indicate the *end* of the comment. Any text between these two will be
    completely ignored by FileMaker when the formula is evaluated. In the following
    example, the formula has two block comments that will be ignored with a formula
    between them that will be evaluated, again producing a result of the total of
    the two numbers: *four*.


    ```

    /*

    This is a comment

    The comment continues on additional lines

    3 + 4 including this entire line

    Until you terminate it here

    */

    2 + 2

    /*

    This is another comment with returns as spaces

    The comment continues on additional lines until terminated

    */

    ```'
  trans: '

    # 公式简介


    公式在开发界面的诸多位置均有使用。*替换字段内容*对话框提供了一个插入公式结果的选项（第 4 章）。许多编程对话框或面板都设有*选项*、*指定*、`Fx`或*铅笔图标*按钮，点击后可进入公式对话框。某些弹出菜单中的*指定*选项也是如此。定义计算字段时，需要输入公式。常规字段可接受公式以生成自动输入值和验证结果（第
    8 章）。自定义函数用于定义全局公式（第 15 章）。布局模式下的*检查器*面板可接受公式来隐藏对象、创建占位符文本和工具提示（第 19 章）。许多布局对象可接受公式来确定其名称或其他标准，包括*按钮栏*、*按钮*、*弹出框*、*标签页*、*门户*、*图表*和*Web
    查看器*（第 20 章）。自定义菜单可以使用公式来确定名称和可见性（第 23 章）。脚本参数可以通过公式生成（第 24 章），并且许多脚本步骤可以或必须使用公式进行配置（第
    25 章）。安全权限可以被配置为使用公式来确定对模式资源的访问权限（第 30 章）。开发者的*数据查看器*对话框包含一个*编辑表达式*对话框，该对话框接受公式以持续监控结果（第
    31 章）。所有这些操作都会打开一个*指定计算*窗口，如图 12-1 所示。此对话框用于构建公式。


    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig1_HTML.jpg](img/429700_2_En_12_Fig1_HTML.jpg)


    图 12-1


    用于定义计算公式的对话框


    ## 公式工作原理


    计算公式是通过将各种文本组件组合成一条书面语句来创建的，该语句表达了结果应如何产生。保存新的或修改过的公式时，FileMaker 将扫描该语句以检查语法错误，例如，断开的引用、缺失的函数或结构错误的语句。当检测到问题时，保存过程会暂停，语句中的错误会被高亮显示，并会弹出一个对话框消息详细说明错误信息。这个过程会重复进行，直到未检测到任何错误，并且代码可以成功编译和保存。一旦保存，公式将保持空闲状态，直到被任何进程*调用*，该进程会触发对其语句的评估以产生结果。


    公式可以通过多种方式被调用。当创建记录或公式中使用的字段被更改时，字段的自动输入公式会被调用。当布局对象被渲染时，其使用的任何公式都会被调用。这适用于使用公式生成*名称*、*隐藏条件*、*条件格式*或其他与界面相关的属性或条件的对象。脚本步骤的计算元素会在脚本运行时该步骤被执行时被调用。公式可以被另一个公式调用，例如，一个计算字段在其公式中包含另一个计算字段，或者一个自定义函数调用另一个自定义函数或一个计算字段。


    调用时，公式的语句会被*评估*，这意味着代码会通过按照特定的优先级顺序执行每个操作来转换为一个结果。公式总是在特定表出现的*上下文中*进行评估。*字段定义*中使用的公式需要从字段所在表的任何表出现中手动选择一个上下文。与*界面元素*关联的公式将使用呈现该对象的布局所对应的表出现上下文。在*脚本步骤*中使用的公式将使用执行时当前窗口中显示的布局所对应的表出现上下文。在*自定义菜单*中使用的公式也使用当前布局的表作为上下文。


    公式的*结果*会返回给调用进程，该进程会根据其功能以适当的方式处理结果。例如，*计算字段*包含其公式的结果，并在放置在布局上时显示该结果。*布局对象*的名称可能会根据结果改变其显示名称、可见性或外观。`设置变量`脚本步骤将公式的结果放入变量中。`显示自定义对话框`脚本步骤会将一个结果放入屏幕上显示的对话框中。对象类型以及调用公式的配置方面决定了结果的目的地或用途。


    当公式因执行错误而无法产生结果时，它将返回一个问号。例如，如果公式使用了已被删除或从当前上下文中无法访问的字段，则公式可能会返回错误。同样，使用已被删除的自定义函数，或提供与调用进程期望不一致的数据类型的结果，也会返回错误。


    ## 定义公式组件


    公式表达式可以使用*注释*、*常量*、*字段引用*、*函数*、*运算符*、*保留关键字*和*变量*的任意组合来构建。


    ### 注释


    *注释*是插入到公式中的文本字符串，在代码评估时会被完全忽略。注释可用于将代码分段，或作为针对开发者的集成文档，提供关于其执行的函数、工作原理、更改记录或未完成工作的说明等信息。注释可以放在公式顶部，也可以放在各个语句或代码段之间的任何位置。有两种可用的注释样式：*行尾注释*和*多行注释*。


    #### 创建行尾注释


    *行尾注释*从双斜杠（//）开始，一直持续到下一个段落回车符。在公式评估时，位于双斜杠和由回车符指示的行尾之间的任何文本都将被 FileMaker 忽略。下面的示例包含几个行尾注释。第一段和第二段都是注释，并说明了每一行都需要一组新的双斜杠来创建注释。第三段有一个注释从段落中间开始，位于两个数相加的公式之后。该行的公式部分将被评估，而注释部分将被忽略。结果将是两个数的总和：*四*。


    ```

    // 这是一个注释

    // 要延续到第二行，你必须使用另一组符号

    2 + 2    // 此注释从行中间开始，在一个公式之后

    ```


    #### 创建多行注释


    *多行注释*使用*起始*和*终止*符号来指示注释的开始和结束。它们用于“注释掉”整个段落块。要输入多行注释，使用斜杠后跟星号（`/*`）来指示注释的*开始*，使用星号后跟斜杠（`*/`）来指示注释的*结束*。在公式评估时，这两个符号之间的任何文本都将被
    FileMaker 完全忽略。在下面的示例中，公式有两个将被忽略的块注释，它们之间有一个公式将被评估，再次产生两个数的总和结果：*四*。


    ```

    /*

    这是一个注释

    注释在附加行上继续

    3 + 4 包括这整行

    直到你在此处终止它

    */

    2 + 2

    /*

    这是另一个带有换行（视为空格）的注释

    注释在附加行上继续，直到被终止

    */

    ```

    '
- fmt: "### Constants\n\nA *constant*, sometimes referred to as a *literal*, is a\
    \ static, unchanging value literally typed into a formula. The value can be any\
    \ of FileMaker’s data types: *text*, *number*, *date*, *time*, or *timestamp*.\
    \ A quantity, city name, event date, and start time are all examples of constants\
    \ when typed *literally* into a formula. Numeric constants can be typed directly\
    \ into a formula, while other text-based constants like dates, times, and strings\
    \ must be contained within quotation marks so that it is interpreted as a literal\
    \ value instead of as a field reference, function name, or variable. The following\
    \ shows examples of each type of constant, as they might appear in a formula:\n\
    \n```\n\"New York\"\n\"1/15/2017\"\n\"10:15:00\"\n\"1/15/2017 10:15:00\"\n```\n\
    \nA date and time constant entered as literal strings are seen as text and must\
    \ be converted into actual date and time values in order to be treated as such.\
    \ This is done using a built-in function: `GetAsDate`, `GetAsTime`, and `GetAsTimestamp`.\n\
    \n```\nGetAsDate ( \"1/15/2021” )\nGetAsTime ( \"10:15:00\" )\nGetAsTimestamp\
    \ ( \"1/15/2017 10:15:00\" )\n```\n\n> **Tip**  \n> Learn more about built-in\
    \ functions in Chapter [13](#429700_2_En_13_Chapter.xhtml).\n\n### Functions\n\
    \nA *function* is a predefined, named formula that is evaluated to return a result.\
    \ Functions are like subroutines in other programming languages since they allow\
    \ some specific functionality to be off-loaded to a process outside of the current\
    \ formula to help avoid redundancies. Within FileMaker, there are two kinds of\
    \ functions: *built-in functions* (Chapters [13](#429700_2_En_13_Chapter.xhtml)\
    \ and [14](#429700_2_En_14_Chapter.xhtml)) and *custom functions* (Chapter [15](#429700_2_En_15_Chapter.xhtml)).\
    \ In this section, we will introduce calling functions using simple pattern to\
    \ illustrate their use in formulas. See those other chapters for more specific\
    \ information.\n\n#### Calling a Function from a Formula\n\nA function call can\
    \ be placed into a formula by typing its name or selecting it through the interface\
    \ (described later). Generally, functions are named with two or more capitalized\
    \ words, phrased without spaces that concisely describe the process they perform.\
    \ So, a function call is simply that name placed into a statement, shown in pattern\
    \ here:\n\n```\nFunctionName\n```\n\n#### Calling a Function with Parameters\n\
    \nA *function parameter* is a value that can vary with each call to the function.\
    \ Some functions use parameters to allow input provided by the calling formula.\
    \ Parameters may contain material for manipulation or instructions about the process(es)\
    \ to be performed. Parameters are listed after the function name, enclosed within\
    \ a set of parentheses. If a function accepts more than one parameter, they are\
    \ listed in order, separated with semicolons after the function name. Examples\
    \ of both are shown here:\n\n```\nExampleFunction ( parameter )\nExampleFunction\
    \ ( parameter1 ; parameter2 ; parameter3 )\n```\n\nThe value of a parameter in\
    \ a function call can be a constant, field reference, literal, nested function,\
    \ or variable expression as illustrated in these examples, each calling a hypothetical\
    \ function that has a single parameter.\n\n```\nExampleFunction ( \"Hello, World\"\
    \ )\nExampleFunction ( 5000 )\nExampleFunction ( Invoice Tax Rate * Invoice Subtotal\
    \ )\nExampleFunction ( AnotherFunction ( 15 ) )\n```\n\n#### Optional Parameters\n\
    \nSome built-in functions have *optional parameters* that can be included or ignored\
    \ as needed. When inserting a function call into a formula, FileMaker will denote\
    \ optional parameters with braces as shown in this pattern.\n\n```\nExampleFunction\
    \ ( parameter1 {; parameter2 ; parameter3} )\n```\n\nIn this case, the braces\
    \ indicate that `parameter1` is required, while `parameter2` and `parameter3`\
    \ are optional. Before compiling the formula, the braces must be removed along\
    \ with any optional parameters that *won’t* be used. The following examples show\
    \ one call to the same hypothetical function without optional parameters and a\
    \ second call to the same function with optional parameters included.\n\n```\n\
    ExampleFunction ( parameter1 )\nExampleFunction ( parameter1 ; parameter2 ; parameter3\
    \ )\n```\n\n#### Nesting Function Calls\n\nA parameter can accept an expression\
    \ as a value, including calls to *other functions*. In this example, `ExampleFunction2`\
    \ will be evaluated first, and the result will be used as the parameter for `ExampleFunction1`.\n\
    \n```\nExampleFunction1 ( ExampleFunction2 ( parameter ) )\n```\n\n### Operators\n\
    \nAn *operator* is a symbol used to express a type of operation within a formula.\
    \ FileMaker has many different operators: *comparison*, *logical*, *mathematical*,\
    \ and *textual*.\n\n> **Caution**  \n> For clarity, examples in this section use\
    \ simple formulas containing only constants. However, they can be used with any\
    \ combination of formula components.\n\n#### Comparison Operators\n\nA *comparison\
    \ operator* is a symbol used to compare two values, either a literal value or\
    \ the evaluated result of two expressions. The result of an expression using a\
    \ comparison operator will be a *Boolean value*, represented respectively by a\
    \ `1` (*true*) or `0` (*false*).\n\n##### Equal To\n\nAn *equal to* symbol is\
    \ used to compare two values for similarity. The equation will evaluate true if\
    \ the values are identical and false if they are not.\n\n```\n100 = 100      \
    \   // result = 1\n150 = 100         // result = 0\n\"New York\" = \"New York\"\
    \  // result = 1\n\"New York\" = \"NY\"        // result = 0\nGetAsDate ( \"1/15/2021\"\
    \ ) = GetAsDate ( \"1/15/2021\" )     // result = 1\nGetAsDate ( \"1/15/2021\"\
    \ ) = GetAsDate ( \"7/20/2021\" )     // result = 0\nGetAsTime ( \"9:30:00\" )\
    \ = GetAsTime ( \"9:30:00\" )         // result = 1\nGetAsTime ( \"9:30:00\" )\
    \ = GetAsTime ( \"12:15:00\" )        // result = 0\n```\n\n##### Not Equal To\n\
    \nComparing two values for dissimilarity can be performed using either a *not\
    \ equal to* symbol or a *less than* and *greater than* symbol side by side. An\
    \ equation will evaluate false if the values are identical and true if they are\
    \ not, as demonstrated in these examples:\n\n```\n100 ≠ 100        // result =\
    \ 0\n150 ≠ 100        // result = 1\n\"New York\"  \"New York\" // result = 0\n\
    \"New York\"  \"NY\"       // result = 1\nGetAsDate ( \"1/15/2021\" ) ≠ GetAsDate\
    \ ( \"1/15/2021\" )     // result = 0\nGetAsDate ( \"1/15/2021\" ) ≠ GetAsDate\
    \ ( \"7/20/2021\" )     // result = 1\nGetAsTime ( \"9:30:00\" ) ≠ GetAsTime (\
    \ \"9:30:00\" )         // result = 0\nGetAsTime ( \"9:30:00\" ) ≠ GetAsTime (\
    \ \"12:15:00\" )        // result = 1\n```\n\n> **Tip**  \n> The *not equal to*\
    \ symbol can be created by typing an equal sign while holding the Option key on\
    \ macOS.\n\n##### Greater Than\n\nA *greater than* symbol is used to compare the\
    \ relative alphabetical, chronological, or numerical positions of two values.\
    \ The equation will evaluate to true if the value on the left is greater in position\
    \ compared to the value on the right.\n\n```\n150 > 100        // result = 1\n\
    100 > 100        // result = 0\n\"Bear\" > \"Automobile\"    // result = 1\n\"\
    Atlanta\" > \"New York\"   // result = 0\nGetAsDate ( \"1/15/2021\" ) > GetAsDate\
    \ ( \"1/10/2021\" )     // result = 1\nGetAsDate ( \"1/15/2021\" ) > GetAsDate\
    \ ( \"7/10/2021\" )     // result = 0\nGetAsTime ( \"12:30:00\" ) > GetAsTime\
    \ ( \"9:15:00\" )        // result = 1\nGetAsTime ( \"9:30:00\" ) > GetAsTime\
    \ ( \"10:45:00\" )        // result = 0\n```"
  raw: '### Constants


    A *constant* , sometimes referred to as a *literal*, is a static, unchanging value
    literally typed into a formula. The value can be any of FileMaker’s data types:
    *text*, *number*, *date*, *time*, or *timestamp*. A quantity, city name, event
    date, and start time are all examples of constants when typed *literally* into
    a formula. Numeric constants can be typed directly into a formula, while other
    text-based constants like dates, times, and strings must be contained within quotation
    marks so that it is interpreted as a literal value instead of as a field reference,
    function name, or variable. The following shows examples of each type of constant,
    as they might appear in a formula:


    ```


    "New York"

    "1/15/2017"

    "10:15:00"

    "1/15/2017 10:15:00"

    ```


    A date and time constant entered as literal strings are seen as text and must
    be converted into actual date and time values in order to be treated as such.
    This is done using a built-in function: *GetAsDate*, *GetAsTime*, and *GetAsTimestamp*.


    ```

    GetAsDate ( "1/15/2021” )

    GetAsTime ( "10:15:00" )

    GetAsTimestamp ( "1/15/2017 10:15:00" )

    ```


    Tip


    Learn more about built-in functions in Chapter [13](#429700_2_En_13_Chapter.xhtml).


    ### Functions


    A *function* is a predefined, named formula that is evaluated to return a result.
    Functions are like subroutines in other programming languages since they allow
    some specific functionality to be off-loaded to a process outside of the current
    formula to help avoid redundancies. Within FileMaker, there are two kinds of functions:
    *built-in functions* (Chapters [13](#429700_2_En_13_Chapter.xhtml) and [14](#429700_2_En_14_Chapter.xhtml))
    and *custom functions* (Chapter [15](#429700_2_En_15_Chapter.xhtml)). In this
    section, we will introduce calling functions using simple pattern to illustrate
    their use in formulas. See those other chapters for more specific information.


    #### Calling a Function from a Formula


    A function call can be placed into a formula by typing its name or selecting it
    through the interface (described later). Generally, functions are named with two
    or more capitalized words, phrased without spaces that concisely describe the
    process they perform. So, a function call is simply that name placed into a statement,
    shown in pattern here:


    ```

    FunctionName

    ```


    #### Calling a Function with Parameters


    A *function parameter* is a value that can vary with each call to the function.
    Some functions use parameters to allow input provided by the calling formula.
    Parameters may contain material for manipulation or instructions about the process(es)
    to be performed. Parameters are listed after the function name, enclosed within
    a set of parentheses. If a function accepts more than one parameter, they are
    listed in order, separated with semicolons after the function name. Examples of
    both are shown here:


    ```

    ExampleFunction ( parameter )

    ExampleFunction ( parameter1 ; parameter2 ; parameter3 )

    ```


    The value of a parameter in a function call can be a constant, field reference,
    literal, nested function, or variable expression as illustrated in these examples,
    each calling a hypothetical function that has a single parameter.


    ```

    ExampleFunction ( "Hello, World" )

    ExampleFunction ( 5000 )

    ExampleFunction ( Invoice Tax Rate * Invoice Subtotal )

    ExampleFunction ( AnotherFunction ( 15 ) )

    ```


    #### Optional Parameters


    Some built-in functions have *optional parameters* that can be included or ignored
    as needed. When inserting a function call into a formula, FileMaker will denote
    optional parameters with braces as shown in this pattern.


    ```

    ExampleFunction ( parameter1 {; parameter2 ; parameter3} )

    ```


    In this case, the braces indicate that *parameter1* is required, while *parameter2*
    and *parameter3* are optional. Before compiling the formula, the braces must be
    removed along with any optional parameters that *won’t* be used. The following
    examples show one call to the same hypothetical function without optional parameters
    and a second call to the same function with optional parameters included.


    ```

    ExampleFunction ( parameter1 )

    ExampleFunction ( parameter1 ; parameter2 ; parameter3 )

    ```


    #### Nesting Function Calls


    A parameter can accept an expression as a value, including calls to *other functions*.
    In this example, *ExampleFunction2* will be evaluated first, and the result will
    be used as the parameter for *ExampleFunction1*.


    ```

    ExampleFunction1 ( ExampleFunction2 ( parameter ) )

    ```


    ### Operators


    An *operator* is a symbol used to express a type of operation within a formula.
    FileMaker has many different operators: *comparison*, *logical*, *mathematical,*
    and *textual*.


    Caution


    For clarity, examples in this section use simple formulas containing only constants.
    However, they can be used with any combination of formula components.


    #### Comparison Operators


    A *comparison operator* is a symbol used to compare two values, either a literal
    value or the evaluated result of two expressions. The result of an expression
    using a comparison operator will be a *Boolean value*, represented respectively
    by a 1 (*true*) or 0 (*false*).


    ##### Equal To


    An *equal to* symbol is used to compare two values for similarity. The equation
    will evaluate true if the values are identical and false if they are not.


    ```

    100 = 100         // result = 1

    150 = 100         // result = 0

    "New York" = "New York"  // result = 1

    "New York" = "NY"        // result = 0

    GetAsDate ( "1/15/2021" ) = GetAsDate ( "1/15/2021" )     // result = 1

    GetAsDate ( "1/15/2021" ) = GetAsDate ( "7/20/2021" )     // result = 0

    GetAsTime ( "9:30:00" ) = GetAsTime ( "9:30:00" )         // result = 1

    GetAsTime ( "9:30:00" ) = GetAsTime ( "12:15:00" )        // result = 0

    ```


    ##### Not Equal To


    Comparing two values for dissimilarity can be performed using either a *not equal
    to* symbol or a *less than* and *greater than* symbol side by side. An equation
    will evaluate false if the values are identical and true if they are not, as demonstrated
    in these examples:


    ```

    100 ≠ 100        // result = 0

    150 ≠ 100        // result = 1

    "New York"  "New York" // result = 0

    "New York"  "NY"       // result = 1

    GetAsDate ( "1/15/2021" ) ≠ GetAsDate ( "1/15/2021" )     // result = 0

    GetAsDate ( "1/15/2021" ) ≠ GetAsDate ( "7/20/2021" )     // result = 1

    GetAsTime ( "9:30:00" ) ≠ GetAsTime ( "9:30:00" )         // result = 0

    GetAsTime ( "9:30:00" ) ≠ GetAsTime ( "12:15:00" )        // result = 1

    ```


    Tip


    The *not equal to* symbol can be created by typing an equal sign while holding
    the Option key on macOS.


    ##### Greater Than


    A *greater than* symbol is used to compare the relative alphabetical, chronological,
    or numerical positions of two values. The equation will evaluate to true if the
    value on the left is greater in position compared to the value on the right.


    ```

    150 > 100        // result = 1

    100 > 100        // result = 0

    "Bear" > "Automobile"    // result = 1

    "Atlanta" > "New York"   // result = 0

    GetAsDate ( "1/15/2021" ) > GetAsDate ( "1/10/2021" )     // result = 1

    GetAsDate ( "1/15/2021" ) > GetAsDate ( "7/10/2021" )     // result = 0

    GetAsTime ( "12:30:00" ) > GetAsTime ( "9:15:00" )        // result = 1

    GetAsTime ( "9:30:00" ) > GetAsTime ( "10:45:00" )        // result = 0

    ```'
  trans: "\n### 常量\n\n*常量*，有时也被称为*字面量*，是直接键入公式中的静态不变的值。该值可以是 FileMaker 的任何数据类型：*文本*、*数字*、*日期*、*时间*或*时间戳*。当数量、城市名称、事件日期和开始时间等被*直接*键入公式时，它们都是常量的例子。数字常量可以直接键入公式，而其他基于文本的常量（如日期、时间和字符串）必须用引号括起来，以便将其解释为字面值，而不是字段引用、函数名或变量。以下展示了各类常量在公式中可能的示例：\n\
    \n```\n\"New York\"\n\"1/15/2017\"\n\"10:15:00\"\n\"1/15/2017 10:15:00\"\n```\n\
    \n以字面字符串形式输入的日期和时间常量被视为文本，必须转换为实际的日期和时间值才能被如此处理。这可以通过使用内置函数来完成：`GetAsDate`、`GetAsTime`\
    \ 和 `GetAsTimestamp`。\n\n```\nGetAsDate ( \"1/15/2021” )\nGetAsTime ( \"10:15:00\"\
    \ )\nGetAsTimestamp ( \"1/15/2017 10:15:00\" )\n```\n\n> **提示**  \n> 在第 13 章中了解更多关于内置函数的信息。\n\
    \n### 函数\n\n*函数*是一个预定义的、有名称的公式，它会被计算并返回一个结果。函数类似于其他编程语言中的子程序，因为它们允许将某些特定功能委托给当前公式之外的进程来处理，这有助于避免重复。在\
    \ FileMaker 中，有两种函数：*内置函数*（第 13 章和第 14 章）和*自定义函数*（第 15 章）。在本节中，我们将介绍如何使用简单的模式调用函数，以说明它们在公式中的使用。更多具体信息请参阅其他章节。\n\
    \n#### 从公式中调用函数\n\n可以通过键入函数名称或通过界面选择（稍后介绍）来将函数调用放入公式中。通常，函数的名称由两个或多个首字母大写的单词组成，单词之间没有空格，简洁地描述了它们执行的过程。因此，函数调用就是将该名称放入语句中，其模式如下：\n\
    \n```\nFunctionName\n```\n\n#### 带参数的函数调用\n\n*函数参数*是一个值，它可以在每次调用函数时改变。某些函数使用参数来允许调用公式提供输入。参数可以包含用于操作的材料或关于要执行的过程的指令。参数列在函数名称之后，用一组括号括起来。如果一个函数接受多个参数，它们将按顺序列出，在函数名称后用分号分隔。以下显示了两者的示例：\n\
    \n```\nExampleFunction ( parameter )\nExampleFunction ( parameter1 ; parameter2\
    \ ; parameter3 )\n```\n\n函数调用中的参数值可以是常量、字段引用、字面量、嵌套函数或变量表达式，如下例所示，每个例子都调用了一个假设的只有一个参数的函数。\n\
    \n```\nExampleFunction ( \"Hello, World\" )\nExampleFunction ( 5000 )\nExampleFunction\
    \ ( Invoice Tax Rate * Invoice Subtotal )\nExampleFunction ( AnotherFunction (\
    \ 15 ) )\n```\n\n#### 可选参数\n\n某些内置函数具有*可选参数*，可以根据需要包含或忽略这些参数。当在公式中插入函数调用时，FileMaker\
    \ 会用大括号表示可选参数，如下模式所示。\n\n```\nExampleFunction ( parameter1 {; parameter2 ; parameter3}\
    \ )\n```\n\n在这种情况下，大括号表示 `parameter1` 是必需的，而 `parameter2` 和 `parameter3` 是可选的。在编译公式之前，必须移除大括号以及任何*不会*使用的可选参数。以下示例显示了对同一个假设函数的一次调用（不带可选参数）和另一次调用（带有可选参数）。\n\
    \n```\nExampleFunction ( parameter1 )\nExampleFunction ( parameter1 ; parameter2\
    \ ; parameter3 )\n```\n\n#### 嵌套函数调用\n\n参数可以接受表达式作为值，包括对*其他函数*的调用。在此示例中，`ExampleFunction2`\
    \ 将首先被计算，其结果将用作 `ExampleFunction1` 的参数。\n\n```\nExampleFunction1 ( ExampleFunction2\
    \ ( parameter ) )\n```\n\n### 操作符\n\n*操作符*是一个符号，用于在公式中表达一种操作类型。FileMaker 有许多不同的操作符：*比较*、*逻辑*、*数学*和*文本*操作符。\n\
    \n> **注意**  \n> 为清晰起见，本节中的示例使用了仅包含常量的简单公式。但是，它们可以与任何公式组件组合使用。\n\n#### 比较操作符\n\n\
    *比较操作符*是一个用于比较两个值的符号，这两个值可以是字面值，也可以是两个表达式的计算结果。使用比较操作符的表达式的结果将是一个*布尔值*，分别用 `1`（*真*）或\
    \ `0`（*假*）表示。\n\n##### 等于\n\n*等于*符号用于比较两个值是否相同。如果两个值相同，则等式计算结果为真；如果不同，则为假。\n\n\
    ```\n100 = 100         // 结果 = 1\n150 = 100         // 结果 = 0\n\"New York\" =\
    \ \"New York\"  // 结果 = 1\n\"New York\" = \"NY\"        // 结果 = 0\nGetAsDate (\
    \ \"1/15/2021\" ) = GetAsDate ( \"1/15/2021\" )     // 结果 = 1\nGetAsDate ( \"\
    1/15/2021\" ) = GetAsDate ( \"7/20/2021\" )     // 结果 = 0\nGetAsTime ( \"9:30:00\"\
    \ ) = GetAsTime ( \"9:30:00\" )         // 结果 = 1\nGetAsTime ( \"9:30:00\" ) =\
    \ GetAsTime ( \"12:15:00\" )        // 结果 = 0\n```\n\n##### 不等于\n\n比较两个值是否不同，可以使用*不等于*符号，或使用*小于*和*大于*符号并列。如果两个值相同，则等式计算结果为假；如果不同，则为真，如下例所示：\n\
    \n```\n100 ≠ 100        // 结果 = 0\n150 ≠ 100        // 结果 = 1\n\"New York\" ≠\
    \ \"New York\" // 结果 = 0\n\"New York\" ≠ \"NY\"       // 结果 = 1\nGetAsDate ( \"\
    1/15/2021\" ) ≠ GetAsDate ( \"1/15/2021\" )     // 结果 = 0\nGetAsDate ( \"1/15/2021\"\
    \ ) ≠ GetAsDate ( \"7/20/2021\" )     // 结果 = 1\nGetAsTime ( \"9:30:00\" ) ≠ GetAsTime\
    \ ( \"9:30:00\" )         // 结果 = 0\nGetAsTime ( \"9:30:00\" ) ≠ GetAsTime ( \"\
    12:15:00\" )        // 结果 = 1\n```\n\n> **提示**  \n> 在 macOS 上，可以通过按住 Option 键并输入等号来创建*不等于*符号。\n\
    \n##### 大于\n\n*大于*符号用于比较两个值的字母顺序、时间顺序或数值大小。如果左侧的值在位置上大于右侧的值，则等式计算结果为真。\n\n```\n\
    150 > 100        // 结果 = 1\n100 > 100        // 结果 = 0\n\"Bear\" > \"Automobile\"\
    \    // 结果 = 1\n\"Atlanta\" > \"New York\"   // 结果 = 0\nGetAsDate ( \"1/15/2021\"\
    \ ) > GetAsDate ( \"1/10/2021\" )     // 结果 = 1\nGetAsDate ( \"1/15/2021\" ) >\
    \ GetAsDate ( \"7/10/2021\" )     // 结果 = 0\nGetAsTime ( \"12:30:00\" ) > GetAsTime\
    \ ( \"9:15:00\" )        // 结果 = 1\nGetAsTime ( \"9:30:00\" ) > GetAsTime ( \"\
    10:45:00\" )        // 结果 = 0\n```\n"
- fmt: "### Greater Than or Equal To\n\nComparing the relative positions of two values\
    \ can be performed using either a *greater than or equal to* symbol or a *greater\
    \ than* symbol followed by an *equal* sign. The equation will evaluate true if\
    \ the value on the left is greater in position or the same value compared to the\
    \ value on the right, as shown in these examples:\n\n```\n100 ≥ 100        //\
    \ result = 1\n100 ≥ 150        // result = 0\n\"Bear\" >= \"Automobile\"    //\
    \ result = 1\n\"New York\" >= \"Ohio\"      // result = 0\nGetAsDate ( \"1/15/2021\"\
    \ ) ≥ GetAsDate ( \"7/20/2016\" )     // result = 1\nGetAsDate ( \"1/15/2021\"\
    \ ) ≥ GetAsDate ( \"7/10/2021\" )     // result = 0\nGetAsTime ( \"12:30:00\"\
    \ ) ≥ GetAsTime ( \"12:30:00\" )       // result = 1\nGetAsTime ( \"9:30:00\"\
    \ ) ≥ GetAsTime ( \"10:45:00\" )        // result = 0\n```\n\n**Tip**  \nThe `≥`\
    \ symbol can be created by typing a *greater than* symbol while holding the `Option`\
    \ key on macOS.\n\n### Less Than\n\nA *less than* symbol is used to compare the\
    \ relative positions of two values. The equation will evaluate true if the value\
    \ on the right is greater in position than the value on the left.\n\n```\n100\
    \ < 350        // result = 1\n100 < 100        // result = 0\n\"Automobile\" <\
    \ \"Car\"    // result = 1\n\"New York\" < \"New York\" // result = 0\nGetAsDate\
    \ ( \"7/20/2016\" ) < GetAsDate ( \"1/15/2021\" )     // result = 1\nGetAsDate\
    \ ( \"7/10/2021\" ) < GetAsDate ( \"1/15/2021\" )     // result = 0\nGetAsTime\
    \ ( \"9:15:00\" ) < GetAsTime ( \"12:30:00\" )        // result = 1\nGetAsTime\
    \ ( \"10:45:00\" ) < GetAsTime ( \"9:30:00\" )        // result = 0\n```\n\n###\
    \ Less Than or Equal To\n\nComparing the relative positions of two values can\
    \ be performed using either a *less than or equal to* symbol or a *less than*\
    \ symbol followed by an *equal* sign. The equation will evaluate true if the value\
    \ on the left is greater in position or the same value compared to the value on\
    \ the right, as shown in these examples:\n\n```\n100 ≤ 100       // result = 1\n\
    100 ≤ 50        // result = 0\n\"Automobile\" <= \"Bear\"   // result = 1\n\"\
    Ohio\" <= \"New York\"     // result = 0\nGetAsDate ( \"7/20/2016\" ) ≤ GetAsDate\
    \ ( \"1/15/2021\" )     // result = 1\nGetAsDate ( \"7/10/2021\" ) ≤ GetAsDate\
    \ ( \"1/15/2021\" )     // result = 0\nGetAsTime ( \"12:30:00\" ) ≤ GetAsTime\
    \ ( \"12:30:00\" )       // result = 1\nGetAsTime ( \"10:45:00\" ) ≤ GetAsTime\
    \ ( \"9:30:00\" )        // result = 0\n```\n\n**Tip**  \nThe `≤` symbol can be\
    \ created by typing a *greater than* symbol while holding the `Option` key on\
    \ macOS.\n\n## Logical Operators\n\nA *logical operator* is a keyword used to\
    \ build compound conditions by joining two or more separate expressions into a\
    \ single expression or, in one case, to negate a single expression to reverse\
    \ a Boolean result. The result of an expression using a logical operator will\
    \ be a Boolean.\n\n**Tip**  \nUse parenthesis to help visualize the separate expressions\
    \ on either side of a logical operator and ensure proper execution order.\n\n\
    ### AND\n\nThe `AND` operator is used to combine two separate Boolean expressions\
    \ into a combined equation that will evaluate true only if the result of both\
    \ expressions are true.\n\n```\n( 150 > 100 ) AND ( \"Bear\" > \"Automobile\"\
    \ )       // result = 1\n( 150 > 100 ) AND ( \"Bear\" = \"Automobile\" )     \
    \  // result = 0\n```\n\n### OR\n\nThe `OR` operator is used to combine two separate\
    \ Boolean expressions into a combined equation that will evaluate true if the\
    \ result of at least one of the two expressions is true.\n\n```\n( 150 > 100 )\
    \ OR ( \"Bear\" < \"Automobile\" )       // result = 1\n( 150 < 100 ) OR ( \"\
    Bear\" = \"Automobile\" )       // result = 0\n```\n\n### XOR\n\nThe `XOR` operator\
    \ is used to combine two separate Boolean expressions into a combined equation\
    \ that will evaluate true if the result of only one of the two equations is true.\
    \ If both equations are true, it will return false.\n\n```\n( 150 > 100 ) XOR\
    \ ( \"Bear\" > \"Automobile\" )       // result = 0\n( 150 > 100 ) XOR ( \"Bear\"\
    \ ≠ \"Automobile\" )       // result = 1\n( 150 < 100 ) XOR ( \"Bear\" ≠ \"Automobile\"\
    \ )       // result = 1\n( 150 < 100 ) XOR ( \"Bear\" = \"Automobile\" )     \
    \  // result = 0\n```\n\n### NOT\n\nThe `NOT` operator is a unique logical operator\
    \ that will negate the result of any expression to its right, thereby reversing\
    \ the Boolean result of that expression. If the expression evaluates true, putting\
    \ this operator in front of it will reverse it to return false and vice versa.\n\
    \n```\nNOT ( 150 > 100 )                       // result = 0\nNOT ( \"Tuesday\"\
    \ < \"Monday\" )            // result = 1\n```\n\nA reversal can also be achieved\
    \ by comparing the Boolean result of an expression to `0`. In this example, the\
    \ false (`0`) result from the parenthesized expression is reversed by the subsequent\
    \ comparison to `0`:\n\n```\n( 150 < 100 ) = 0                      // result\
    \ = 1\n```\n\n## Mathematical Operators\n\nA *mathematical operator* is a symbol\
    \ used to perform or control arithmetic computations with one or more values or\
    \ expressions. The mathematical operations can be performed not only on numbers\
    \ but on other data types such as dates, times, and timestamps.\n\n**Note**  \n\
    For mathematical operations, dates and times are converted to a number (Chapter\
    \ [8](#429700_2_En_8_Chapter.xhtml), “Defining Field Data Types”).\n\n### Addition\n\
    \nThe *plus* symbol is used to add the value on the right to the value on the\
    \ left.\n\n```\n100 + 50                        // result = 150\nGetAsDate ( \"\
    1/5/2021\" ) + 5    // result = 1/10/2017\nGetasTime ( \"1:15:00\" ) + 300   //\
    \ result = 1:20:00\n```\n\n### Subtraction\n\nThe *minus* symbol is used to subtract\
    \ the value on the right from the value on the left.\n\n```\n100 – 50        \
    \                // result = 50\nGetAsDate ( \"1/5/2021\" ) - 2    // result =\
    \ 1/3/2017\nGetasTime ( \"1:15:00\" ) - 300   // result = 1:10:00\n```\n\n###\
    \ Multiplication\n\nThe *multiply* symbol is used to multiply the value on the\
    \ left by the value on the right.\n\n```\n100 * 50                      // result\
    \ = 5000\nGetAsDate ( \"1/5/2021\" ) * 2  // result = 1475590\n```\n\n### Division\n\
    \nThe *division* symbol is used to divide the value on the left by the value on\
    \ the right.\n\n```\n100 / 50                       // result = 2\nGetAsTime (\
    \ \"1:15:00\" ) / 2    // result = 2250\n```\n\n### Raising to a Power\n\nThe\
    \ *power of* symbol is used to raise the value on the left to the power of the\
    \ value on the right.\n\n```\n100^2\n```\n\n### Precedence\n\nA set of *parentheses*\
    \ is used to change the order of *evaluative precedence* (discussed later in this\
    \ chapter). FileMaker will evaluate formulas from left to right after first evaluating\
    \ expressions that are enclosed within parentheses, working from the inside out\
    \ and based on an order of precedence. Although these two equations perform the\
    \ same mathematical operations on the same numbers in the same order, the results\
    \ are drastically different due to the control of precedence imposed with parentheses:\n\
    \n```\n100 * 2 + 50 / 25                // result = 202\n( ( 100 * 2 ) + 50 )\
    \ / 25        // result = 10\n```"
