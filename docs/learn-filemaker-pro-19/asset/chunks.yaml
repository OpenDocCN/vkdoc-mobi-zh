- fmt: '# Guides


    ## Guides


    A layout *guide* is a movable blue line used to align objects and define regions
    of a layout. Multiple guides can be placed horizontally or vertically on the layout,
    as shown in Figure [21-5](#429700_2_En_21_Chapter.xhtml#Fig5). Guides don’t print
    and are only visible in Layout mode when the *View ➤ Guides ➤ Show Guides* menu
    is active. Click anywhere on the left or top ruler and then drag right or down,
    respectively, and release a new guide at the desired position on the content area.
    Guides can be repositioned by dragging them to a new position or removed completely
    by dragging them back to the ruler. When visible, guides can visually assist in
    uniform alignment of objects. Activating the *View ➤ Guides ➤ Snap to Guides*
    menu will cause an object being dragged to be drawn to the next available guide
    in the direction of travel.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig5_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig5_HTML.jpg)


    Figure 21-5: A layout with several guides defining regions


    ## Dynamic Guides


    As an object is moved around a layout, blue lines called *dynamic guides* automatically
    appear and disappear on or around nearby objects showing alignment and spacing
    patterns that would result if the object were dropped in its current location.
    By showing these spatial relationships of stationary objects relative to the position
    of the moving object, dynamic guides help to encourage a neat design when repositioning
    an object. Like the grid and guides, objects will be magnetically drawn to dynamic
    guides. Dynamic guides can be activated or deactivated with the *View ➤ Dynamic
    Guides* menu.


    When first moving an object, no guides will appear when the current position does
    not align to any other objects on the layout, as shown in Figure [21-6](#429700_2_En_21_Chapter.xhtml#Fig6).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig6_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig6_HTML.jpg)


    Figure 21-6: No dynamic guides appear when an object does not align with other
    objects


    As the object is dragged or nudged with arrow keys and begins to align with other
    objects, one or more dynamic guides will appear, as shown in Figure [21-7](#429700_2_En_21_Chapter.xhtml#Fig7).
    Alignments are shown for *left*, *right*, *horizontal center*, *top*, *bottom*,
    and *vertical center*, connecting to one or more other objects.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig7_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig7_HTML.jpg)


    Figure 21-7: As an object aligns with one or more objects, a guide will appear


    When the object is dragged into a position that creates a consistent spacing pattern,
    those are highlighted as well, as shown in Figure [21-8](#429700_2_En_21_Chapter.xhtml#Fig8).
    These appear for *horizontal* and *vertical* distribution and are displayed simultaneously
    with alignment guides.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig8_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig8_HTML.jpg)


    Figure 21-8: Multiple guides can show alignment and distribution spacing


    > **Note:** Examples in this chapter are shown with uniform square shapes for
    illustrative purposes only. Dynamic guides and all other features work the same
    with *any* combination of different object types, in non-uniform arrangements,
    and of varying sizes.


    ## Arranging and Aligning Objects


    When working on complex layouts with dozens or hundreds of items, moving, sizing,
    and spacing groups of objects can be a tediously repetitive manual chore. FileMaker
    has functions that assist in the task of *aligning*, *distributing*, *resizing*,
    *rotating*, *grouping*, and *locking* objects. These are all accessible from the
    Layout mode in the *Arrange* menu in the menu bar, a submenu of an object’s contextual
    menu, and in the *Arrange & Align* group of tools on the *Position* tab of the
    *Inspector* pane. With the exception of *Rotate*, these functions all work with
    any combination of object type.


    ### Align


    The *Align* functions automatically align groups of selected objects horizontally
    or vertically. For example, with several misaligned objects selected, choose the
    *Arrange ➤ Align ➤ Left* menu item to instantly align them along their left border,
    as shown in Figure [21-9](#429700_2_En_21_Chapter.xhtml#Fig9).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig9_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig9_HTML.jpg)


    Figure 21-9: Transforming misaligned objects (before) to aligned (after)


    ### Resize To


    The *Resize To* functions automatically resizes a group of selected objects to
    *Smallest Width*, *Smallest Height*, *Smallest Width and Height*, *Largest Width*,
    *Largest Height*, or *Largest Width and Height*. For example, with several non-uniformly
    sized objects selected, choose the *Arrange ➤ Resize To ➤ Smallest Width and Height*
    menu item to instantly resize every object to a uniform size and height based
    on the object with the smallest of each, as shown in Figure [21-10](#429700_2_En_21_Chapter.xhtml#Fig10).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig10_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig10_HTML.jpg)


    Figure 21-10: Transforming non-uniform objects (before) to a uniform size (after)


    ### Distribute


    The *Distribute* commands will reposition a group of objects so that they are
    uniformly spaced horizontally or vertically using the outside measurements of
    the group along the respective axis. For example, with several non-uniformly spaced
    objects selected, choose the *Arrange ➤ Distribute ➤ Vertical* menu to instantly
    reposition every object uniformly spaced, as shown in Figure [21-11](#429700_2_En_21_Chapter.xhtml#Fig11).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig11_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig11_HTML.jpg)


    Figure 21-11: Transforming non-uniform spacing (before) to an even vertical distribution
    (after)


    ### Rotate


    Many objects can be rotated in a clockwise direction in 90-degree increments by
    selecting the *Arrange ➤ Rotate* menu item, as shown in Figure [21-12](#429700_2_En_21_Chapter.xhtml#Fig12).
    The exceptions are button bars, charts, popovers, portals, slide controls, tab
    controls, and web viewers.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig12_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig12_HTML.jpg)


    Figure 21-12: A text object (left) after two 90-degree rotations (right)


    ### Group


    A set of selected objects can be transformed into a single *group object* by selecting
    the *Arrange ➤ Group* menu. Once joined together, the grouped objects can be moved
    or resized as a single unit but still manipulated individually within the group
    by clicking once on the group and a second time on an item within it. Objects
    such as buttons, button bars, charts, fields, web viewers, and more can be functionally
    edited while grouped by double-clicking directly on them. To ungroup formerly
    grouped objects, select the *Arrange ➤ Ungroup* menu.'
  raw: '#### Guides


    A layout *guide* is a movable blue line used to align objects and define regions
    of a layout. Multiple guides can be placed horizontally or vertically on the layout,
    as shown in Figure [21-5](#429700_2_En_21_Chapter.xhtml#Fig5). Guides don’t print
    and are only visible in Layout mode when the *View ➤ Guides ➤ Show Guides* menu
    is active. **C**lick anywhere on the left or top ruler and then drag right or
    down, respectively, and release a new guide at the desired position on the content
    area. Guides can be repositioned by dragging them to a new position or removed
    completely by dragging them back to the ruler. When visible, guides can visually
    assist in uniform alignment of objects. Activating the *View ➤ Guides ➤ Snap to
    Guides* menu will cause an object being dragged to be drawn to the next available
    guide in the direction of travel.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig5_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig5_HTML.jpg)


    Figure 21-5


    A layout with several guides defining regions


    #### Dynamic Guides


    As an object is moved around a layout, blue lines called *dynamic guides* automatically
    appear and disappear on or around nearby objects showing alignment and spacing
    patterns that would result if the object were dropped in its current location.
    By showing these spatial relationships of stationary objects relative to the position
    of the moving object, dynamic guides help to encourage a neat design when repositioning
    an object. Like the grid and guides, objects will be magnetically drawn to dynamic
    guides. Dynamic guides can be activated or deactivated with the *View ➤ Dynamic
    Guides* menu.


    When first moving an object, no guides will appear when the current position does
    not align to any other objects on the layout, as shown in Figure [21-6](#429700_2_En_21_Chapter.xhtml#Fig6).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig6_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig6_HTML.jpg)


    Figure 21-6


    No dynamic guides appear when an object does not align with other objects


    As the object is dragged or nudged with arrow keys and begins to align with other
    objects, one or more dynamic guides will appear, as shown in Figure [21-7](#429700_2_En_21_Chapter.xhtml#Fig7).
    Alignments are shown for *left*, *right*, *horizontal center*, *top*, *bottom,*
    and *vertical center*, connecting to one or more other objects.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig7_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig7_HTML.jpg)


    Figure 21-7


    As an object aligns with one or more objects, a guide will appear


    When the object is dragged into a position that creates a consistent spacing pattern,
    those are highlighted as well, as shown in Figure [21-8](#429700_2_En_21_Chapter.xhtml#Fig8).
    These appear for *horizontal* and *vertical* distribution and are displayed simultaneously
    with alignment guides.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig8_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig8_HTML.jpg)


    Figure 21-8


    Multiple guides can show alignment and distribution spacing


    Note


    Examples in this chapter are shown with uniform square shapes for illustrative
    purposes only. Dynamic guides and all other features work the same with *any*
    combination of different object types, in non-uniform arrangements, and of varying
    sizes.


    ## Arranging and Aligning Objects


    When working on complex layouts with dozens or hundreds of items, moving, sizing,
    and spacing groups of objects can be a tediously repetitive manual chore. FileMaker
    has functions that assist in the task of *aligning*, *distributing*, *resizing*,
    *rotating*, *grouping*, and *locking* objects. These are all accessible from the
    Layout mode in the *Arrange* menu in the menu bar, a submenu of an object’s contextual
    menu, and in the *Arrange & Align* group of tools on the *Position* tab of the
    *Inspector* pane. With the exception of *Rotate*, these functions all work with
    any combination of object type.


    ### Align


    The *Align* functions automatically align groups of selected objects horizontally
    or vertically. For example, with several misaligned objects selected, choose the
    *Arrange ➤ Align ➤ Left* menu item to instantly align them along their left border,
    as shown in Figure [21-9](#429700_2_En_21_Chapter.xhtml#Fig9).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig9_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig9_HTML.jpg)


    Figure 21-9


    Transforming misaligned objects (before) to aligned (after)


    ### Resize To


    The *Resize To* functions automatically resizes a group of selected objects to
    *Smallest Width*, *Smallest Height*, *Smallest Width and Height*, *Largest Width*,
    *Largest Height,* or *Largest Width and Height*. For example, with several non-uniformly
    sized objects selected, choose the *Arrange ➤ Resize To ➤ Smallest Width and Height*
    menu item to instantly resize every object to a uniform size and height based
    on the object with the smallest of each, as shown in Figure [21-10](#429700_2_En_21_Chapter.xhtml#Fig10).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig10_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig10_HTML.jpg)


    Figure 21-10


    Transforming non-uniform objects (before) to a uniform size (after)


    ### Distribute


    The *Distribute* commands will reposition a group of objects so that they are
    uniformly spaced horizontally or vertically using the outside measurements of
    the group along the respective axis. For example, with several non-uniformly spaced
    objects selected, choose the *Arrange ➤ Distribute ➤ Vertical* menu to instantly
    reposition every object uniformly spaced, as shown in Figure [21-11](#429700_2_En_21_Chapter.xhtml#Fig11).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig11_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig11_HTML.jpg)


    Figure 21-11


    Transforming non-uniform spacing (before) to an even vertical distribution (after)


    ### Rotate


    Many objects can be rotated in a clockwise direction in 90-degree increments by
    selecting the *Arrange ➤ Rotate* menu item, as shown in Figure [21-12](#429700_2_En_21_Chapter.xhtml#Fig12).
    The exceptions are button bars, charts, popovers, portals, slide controls, tab
    controls, and web viewers.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig12_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig12_HTML.jpg)


    Figure 21-12


    A text object (left) after two 90-degree rotations (right)


    ### Group


    A set of selected objects can be transformed into a single *group object* by selecting
    the *Arrange ➤ Group* menu. Once joined together, the grouped objects can be moved
    or resized as a single unit but still manipulated individually within the group
    by clicking once on the group and a second time on an item within it. Objects
    such as buttons, button bars, charts, fields, web viewers, and more can be functionally
    edited while grouped by double-clicking directly on them. To ungroup formerly
    grouped objects, select the *Arrange ➤ Ungroup* menu.'
  trans: '# 指南


    ## 指南


    布局*参考线*是一种可移动的蓝色线条，用于对齐对象和定义布局区域。可以在布局上水平或垂直放置多条参考线，如图 21-5 所示。参考线不会被打印，并且仅在*查看
    ➤ 参考线 ➤ 显示参考线*菜单处于激活状态时，在布局模式下可见。点击左侧或顶部标尺上的任意位置，然后分别向右或向下拖动，并在内容区域的目标位置释放以创建新参考线。可以通过将参考线拖动到新位置来重新定位，或将其拖回标尺来彻底移除。可见时，参考线有助于视觉上统一对齐对象。激活*查看
    ➤ 参考线 ➤ 对齐参考线*菜单，将导致正在拖动的对象被吸附到移动方向上最近的可参考线。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig5_HTML.jpg](img/429700_2_En_21_Fig5_HTML.jpg)


    图 21-5：包含多条定义区域参考线的布局


    ## 动态参考线


    当对象在布局上移动时，称为*动态参考线*的蓝色线条会在附近对象上或其周围自动出现和消失，显示如果将对象放置在其当前位置将会产生的对齐和间距模式。通过显示固定对象与移动对象位置相关的空间关系，动态参考线有助于在重新定位对象时实现整洁的设计。与网格和参考线一样，对象会被磁力吸附到动态参考线上。动态参考线可以通过*查看
    ➤ 动态参考线*菜单激活或停用。


    初次移动对象时，如果当前位置与布局上的任何其他对象不对齐，则不会显示参考线，如图 21-6 所示。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig6_HTML.jpg](img/429700_2_En_21_Fig6_HTML.jpg)


    图 21-6：当对象与其他对象不对齐时，不显示动态参考线


    当对象被拖动或用箭头键微移并开始与其他对象对齐时，将出现一条或多条动态参考线，如图 21-7 所示。会显示*左侧*、*右侧*、*水平居中*、*顶部*、*底部*和*垂直居中*的对齐，并连接到一个或多个其他对象。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig7_HTML.jpg](img/429700_2_En_21_Fig7_HTML.jpg)


    图 21-7：当对象与一个或多个对象对齐时，将出现参考线


    当对象被拖动到创建一致间距模式的位置时，这些模式也会被突出显示，如图 21-8 所示。这些模式在*水平*和*垂直*分布时出现，并与对齐参考线同时显示。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig8_HTML.jpg](img/429700_2_En_21_Fig8_HTML.jpg)


    图 21-8：多条参考线可显示对齐和分布间距


    > **注意：** 本章示例中仅使用统一正方形形状进行说明。动态参考线和所有其他功能同样适用于*任何*不同对象类型、非均匀排列以及不同大小的组合。


    ## 排列和对齐对象


    在处理包含数十或数百个项目的复杂布局时，移动、调整大小和排列对象组可能是一项繁琐重复的手动工作。FileMaker 提供了有助于*对齐*、*分布*、*调整大小*、*旋转*、*分组*和*锁定*对象的功能。这些功能均可从布局模式下的菜单栏*排列*菜单、对象上下文菜单的子菜单以及检查器面板*位置*选项卡上的*排列和对齐*工具组中访问。除了*旋转*之外，这些功能均适用于任何对象类型的组合。


    ### 对齐


    *对齐*功能可自动水平或垂直对齐选定的对象组。例如，选中几个未对齐的对象后，选择*排列 ➤ 对齐 ➤ 左对齐*菜单项可立即将它们沿左侧边框对齐，如图 21-9
    所示。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig9_HTML.jpg](img/429700_2_En_21_Fig9_HTML.jpg)


    图 21-9：将未对齐对象（前）转换为对齐状态（后）


    ### 调整为


    *调整为*功能可自动将选定的对象组调整为*最小宽度*、*最小高度*、*最小宽度和高度*、*最大宽度*、*最大高度*或*最大宽度和高度*。例如，选中几个大小不一的对象后，选择*排列
    ➤ 调整为 ➤ 最小宽度和高度*菜单项可立即将所有对象调整为基于其中最小对象的统一宽度和大小，如图 21-10 所示。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig10_HTML.jpg](img/429700_2_En_21_Fig10_HTML.jpg)


    图 21-10：将大小不一的非均匀对象（前）转换为统一大小（后）


    ### 分布


    *分布*命令将重新定位一组对象，使其使用组沿相应轴的外部测量值在水平或垂直方向上均匀分布。例如，选中几个间距不一的非均匀对象后，选择*排列 ➤ 分布 ➤ 垂直*菜单可立即将每个对象重新定位为均匀间距，如图
    21-11 所示。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig11_HTML.jpg](img/429700_2_En_21_Fig11_HTML.jpg)


    图 21-11：将非均匀间距（前）转换为均匀垂直分布（后）


    ### 旋转


    选择*排列 ➤ 旋转*菜单项可将许多对象按顺时针方向旋转 90 度递增，如图 21-12 所示。例外情况包括按钮栏、图表、弹出框、门户、滑块控件、选项卡控件和
    Web 查看器。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig12_HTML.jpg](img/429700_2_En_21_Fig12_HTML.jpg)


    图 21-12：一个文本对象（左侧）经过两次 90 度旋转后（右侧）


    ### 分组


    通过选择*排列 ➤ 分组*菜单，可以将一组选定对象转换为一个单一的*组对象*。组合后，分组对象可以作为单个单元移动或调整大小，但仍可通过单击组一次，再单击其中的项目来单独操作。按钮、按钮栏、图表、字段、Web
    查看器等对象在分组状态下，可以通过直接双击它们来进行功能编辑。要取消对先前分组对象的组合，请选择*排列 ➤ 取消分组*菜单。'
- fmt: "### Lock\n\n锁定对象后，在布局模式下该对象将变为不可编辑。这有助于避免在复杂布局中意外删除或移动对象。锁定的对象在解锁前无法移动、调整大小、重新分配、重新配置或以任何方式更改。通过选择`Arrange\
    \ ➤ Lock`菜单可锁定所选对象或对象组。锁定后，该对象将不再响应任何编辑操作。尝试通过`Inspector`更改某些设置时，会弹出一个对话框，说明由于对象的锁定状态而无法进行更改。但在许多情况下，命令会被静默忽略。可以通过`Arrange\
    \ ➤ Unlock`菜单解锁对象。选中时，锁定对象的每个调整手柄位置会显示一个“x”图标，如图[21-13](#429700_2_En_21_Chapter.xhtml#Fig13)所示。\n\
    \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig13_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig13_HTML.jpg)\n\
    \n**图 21-13**  \n通过调整手柄指示的锁定对象\n\n### 对象堆叠\n\n对象存在于从前到后的*堆叠顺序*中。当两个对象移动到一起时，较晚创建的对象会出现在较早创建的对象之上，从而遮挡后者。有四个命令可以改变对象在堆叠中的位置，如图[21-14](#429700_2_En_21_Chapter.xhtml#Fig14)所示：`Bring\
    \ to Front`（移至顶层）、`Bring Forward`（上移一层）、`Send Backward`（下移一层）和`Send to Back`（移至底层）。\n\
    \n**注意**  \n对象堆叠顺序会反映在`Objects`窗格的`Objects`标签页中，列表顶部的对象位于列表下方对象的前面。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig14_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig14_HTML.jpg)\n\
    \n**图 21-14**  \n影响对象堆叠位置的命令示意图\n\n## 隐藏对象\n\n可以为对象分配一个公式，用于确定何时应渲染它以及何时应隐藏它。选择对象，在`Inspector`窗格的`Data`标签页的`Behavior`部分输入`Hide\
    \ objects when`公式。当该公式返回`true`时，对象将在非布局模式下隐藏。输入的公式可以基于多种条件：字段中的值、窗口状态或用户环境的详细信息。例如，在特定字段中输入数据之前可以隐藏一个按钮，例如隐藏`Print`按钮直到报表所需的字段有值，或者隐藏`Approve`按钮直到关键状态字段有值。如果值列表当前为空，则隐藏配置为弹出菜单的`field`。当窗口处于查找模式时，隐藏数据输入专用的按钮和对象。在字段中输入足够信息以实际绘制有用内容之前，可以隐藏`chart`。可以根据记录类型切换一组`portal`的显示，为供应商联系人显示采购订单门户，为客户联系人切换到项目门户。还可以利用此功能根据用户的访问权限（第[30](#429700_2_En_30_Chapter.xhtml)章）来隐藏信息，使用户看不到显示“无权限”的屏蔽字段，也无法点击会产生访问拒绝错误的按钮。多段`button\
    \ bar`可以切换，使得一次只显示一个分段，以此作为切换按钮图标和功能的技术。\n\n### 使用隐藏功能切换按钮栏\n\n一个两段按钮栏，如果每个分段具有不同的`Hide`公式，则可以创建*活动标签*，即根据对应字段的值更改图标和功能的按钮。例如，考虑一个`Contact\
    \ Company ID`字段的标签，该字段配置为用于为公司分配联系人的弹出菜单。如果所需的公司记录已存在，用户只需在字段中选择它即可。但是，如果公司尚不存在，则可以创建一个按钮来创建新记录并将其链接到联系人。类似地，一旦分配了公司，通常需要一个按钮允许用户导航到分配给联系人的相关公司记录。隐藏函数可以在给定时间切换哪些按钮可见，但您仍然需要处理三个对象：字段标签、导航按钮和新建按钮。或者，所有这些都可以替换为一个对象：一个用作活动标签的两段按钮栏，该按钮栏在一个分段与另一个分段之间切换，以允许创建新公司（如果尚未选择公司）或导航到相关记录（如果已选择公司）。\n\
    \n图[21-15](#429700_2_En_21_Chapter.xhtml#Fig15)所示的示例展示了一个无边框的两段按钮栏，用作`Contact\
    \ Company ID`字段的字段标签。第一个按钮分段分配了一个加号图标，并配置为在`id`字段不为空时隐藏。这将运行一个脚本，该脚本创建一个新的相关公司记录并将其`id`分配给当前联系人记录。第二个分段分配了一个导航图标，并配置为在`id`字段为空时隐藏。这将运行一个脚本，用于导航到选定的`Company`记录。由于这两个隐藏公式是二元对立关系，因此在浏览模式下，任何时候只有一个标签可见。\n\
    \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig15_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig15_HTML.jpg)\n\
    \n**图 21-15**  \n作为字段标签、始终隐藏一个分段的二段栏\n\n**警告**  \n可以添加第三个分段，不带图标和脚本，作为查找模式下的非活动标签。隐藏公式将检查窗口模式并相应调整隐藏动作。\n\
    \n根据上述配置，带有加号图标的标签仅在未选择公司时出现，而带有导航图标的标签仅在选择了公司时出现，两者均如图[21-16](#429700_2_En_21_Chapter.xhtml#Fig16)所示。\n\
    \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig16_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig16_HTML.jpg)\n\
    \n**图 21-16**  \n公司为空（上方）或已选择（下方）时的标签按钮\n\n**提示**  \n使用隐藏功能，通过一个始终返回`true`（`1`）的公式嵌入包含开发者注释的文本对象，使其只在布局模式下可见。\n\
    \n## 条件格式\n\n任何布局对象都可以使用`Inspector`窗格中的工具进行格式化。字段可以作为对象进行格式化，并且其包含的内容可以设置样式。*条件格式*是一项功能，它使用自定义公式或从二十个预定义内容值中选择的条件，覆盖应用于对象或内容的静态格式。自定义规则在`Conditional\
    \ Formatting`对话框中定义，如图[21-17](#429700_2_En_21_Chapter.xhtml#Fig17)所示。要打开此对话框，请选择目标对象，然后选择`Format\
    \ ➤ Conditional`菜单，或从对象的上下文菜单中选择`Conditional Formatting`选项。该对话框包含以下控件：\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig17_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig17_HTML.jpg)\n\
    \n**图 21-17**  \n用于根据条件定义格式覆盖的对话框\n\n1.  `Condition List` – 触发格式化的已定义条件列表。这些条件将按从上到下的顺序求值。复选框指示条件是否处于激活状态。\n\
    2.  `Condition` – 定义所选条件何时应用格式化的标准。\n3.  `Format` – 选择当所选条件求值为`true`时要应用的格式设置。\n\
    \n### 条件公式选项\n\n*上下文格式化条件*定义了在何种情况下会将一组格式设置应用于对象。该条件可以是预定义的*基于值的条件*，也可以是自定义的*基于公式的条件*。"
  raw: '### Lock


    Locking an object causes it to become non-editable in Layout mode. This helps
    avoid accidental deletion or movement of objects on complex layouts. A locked
    object can’t be moved, resized, reassigned, reconfigured, or changed in any way
    until it is unlocked. Lock a selected object or group of objects by selecting
    the *Arrange ➤ Lock* menu. Once locked, the item will not respond to any editing
    attempts. Attempting to change some settings through the *Inspector* will produce
    a dialog stating that the change can’t be made because of the object’s locked
    status. However, in many cases, the command will just be silently ignored. An
    object can be unlocked with the *Arrange ➤ Unlock* menu. When selected, locked
    objects display an “x” icon in place of each sizing handle, as shown in Figure
    [21-13](#429700_2_En_21_Chapter.xhtml#Fig13).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig13_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig13_HTML.jpg)


    Figure 21-13


    A locked object indicated by its sizing handles


    ### Object Stacking


    Objects exist within a front to back *stacking order* . When two objects are moved
    together, the one created more recently will appear on top of the first, obscuring
    it from view. There are four commands that change an object’s position within
    the stack, as illustrated in Figure [21-14](#429700_2_En_21_Chapter.xhtml#Fig14):
    *Bring to Front*, *Bring Forward*, *Send Backward*, and *Send to Back*.


    Note


    The object stacking order is reflected in the *Objects* tab of the *Objects* pane,
    where objects on top of the list are in front of those below.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig14_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig14_HTML.jpg)


    Figure 21-14


    An illustration of commands that affect an object’s stack position


    ## Hiding Objects


    Objects can be assigned a formula that determines when they should be rendered
    and when they should be hidden. Select the object and enter a *Hide objects when*
    formula in the *Behavior* section of the *Data* tab of the *Inspector* pane. When
    that formula returns a true result, the object will be hidden in non-Layout modes.
    The formula entered can be based on various criteria: the values in fields, conditions
    of the window, or details about the user’s environment. A button can be hidden
    until data is entered in specific fields, e.g., hide a *Print* button until fields
    required for the report have a value, or hide an *Approve* button until key status
    fields have a value. Hide a *field* configured as a pop-up menu if the value list
    is currently empty. Hide data entry–specific buttons and objects when the window
    is in Find mode. A *chart* can be hidden until enough information has been entered
    into fields to actually draw something useful. A set of *portals* can be toggled
    depending on the type of record, showing a purchase order portal for vendor contacts
    and switching to a project portal for customer contacts. Use the feature to obscure
    information depending on a user’s access privilege (Chapter [30](#429700_2_En_30_Chapter.xhtml))
    so they don’t see blocked out fields saying “no access” and can’t click buttons
    that produce access denied errors. A multi-segment *button bar* can toggle so
    only one segment shows at a time as a technique to toggle a button’s icon and
    function.


    ### Using Hide to Toggle a Button Bar


    A two-segment button bar with a different *Hide* formula on each segment can create
    an *active label*, a button that changes icon and functionality depending on the
    corresponding field’s value. For example, consider the label of a *Contact Company
    ID* field configured with a pop-up menu for assigning a company to a contact.
    If the desired company record exists, the user can simply select it in the field.
    However, if the company doesn’t exist yet, a button can be created to create a
    new record and link it to the contact. Similarly, once a company has been assigned,
    it is customary to have a button that allows the user to navigate to the related
    company record assigned to the contact. A hide function can toggle which buttons
    are visible at a given time, but you still have three objects to contend with:
    a field label, a navigation button, and a create new button. Alternatively, all
    of these could be replaced with a single object: a two-segment button bar used
    as an active label that toggles between one or the other segment to allow creation
    of a new company (if one hasn’t been selected) or navigation to the related record
    (if one has been selected).


    The example illustrated in Figure [21-15](#429700_2_En_21_Chapter.xhtml#Fig15)
    shows a two-segment button bar with no border used as a field label for a *Contact
    Company ID* field. The first button segment has a plus icon assigned and is configured
    to hide when the id field is not empty. This would run a script that creates a
    new related company record and assigns its id to the current contact record. The
    second segment has a navigation icon assigned and is configured to hide when the
    id field is empty. This would run a script that navigates to the selected *Company*
    record. Since the two hide formulas are binary opposites, only one label will
    be visible at any given moment in Browse mode.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig15_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig15_HTML.jpg)


    Figure 21-15


    A two-segment bar as a field label that always hides one segment.


    Caution


    A third segment could be added with no icon and no script as an inactive label
    in Find mode. The hide formulas would check the window mode and adjust the hide
    action accordingly.


    Based on the preceding configuration, the label with a plus icon will only appear
    when no company is selected, and the label with the navigation icon will only
    appear when one is selected, both shown in Figure [21-16](#429700_2_En_21_Chapter.xhtml#Fig16).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig16_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig16_HTML.jpg)


    Figure 21-16


    The label button when a company is empty (top) or selected (bottom)


    Tip


    Use hide to embed text objects with developer notes with a formula that always
    returns true (1) so they are only visible in Layout mode.


    ## Conditional Formatting


    Any layout object can be formatted using the tools in the *Inspector* pane. Fields
    can be formatted as an object, and the content they contain can be styled. *Conditional
    formatting* is a feature that overrides static formatting applied to objects or
    content using conditions defined by custom formulas or a selection of one of twenty
    predetermined content values. The custom rules are defined in the *Conditional
    Formatting* dialog, shown in Figure [21-17](#429700_2_En_21_Chapter.xhtml#Fig17).
    To open this dialog, select the target object(s), and choose the *Format ➤ Conditional*
    menu, or choose the *Conditional Formatting* option from the object’s contextual
    menu. The dialog includes the following controls:


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig17_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig17_HTML.jpg)


    Figure 21-17


    The dialog used to define format overrides based on conditional criteria


    1.  *Condition List* – List of the defined conditions that trigger formatting.
    These will be evaluated in order from top to bottom. The checkbox indicates an
    active condition.


    2.  *Condition* – Define the criteria for the selected condition to determine
    when formatting will be applied.


    3.  *Format* – Select the formatting settings to apply when the selected condition
    evaluates true.


    ### Condition Formula Options


    A *contextual formatting condition* defines the circumstances under which a set
    of format settings will be applied to an object. The condition can be a selection
    of a predefined *value-based condition* or a custom *formula-based condition*.'
  trans: "\n### 锁定\n\n锁定对象后，在布局模式下该对象将变为不可编辑。这有助于避免在复杂布局中意外删除或移动对象。锁定的对象在解锁前无法移动、调整大小、重新分配、重新配置或以任何方式更改。通过选择`Arrange\
    \ ➤ Lock`菜单可锁定所选对象或对象组。锁定后，该对象将不再响应任何编辑操作。尝试通过`Inspector`更改某些设置时，会弹出一个对话框，说明由于对象的锁定状态而无法进行更改。但在许多情况下，命令会被静默忽略。可以通过`Arrange\
    \ ➤ Unlock`菜单解锁对象。选中时，锁定对象的每个调整手柄位置会显示一个“x”图标，如图 21-13 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig13_HTML.jpg](img/429700_2_En_21_Fig13_HTML.jpg)\n\
    \n**图 21-13**  \n通过调整手柄指示的锁定对象\n\n### 对象堆叠\n\n对象存在于从前到后的*堆叠顺序*中。当两个对象移动到一起时，较晚创建的对象会出现在较早创建的对象之上，从而遮挡后者。有四个命令可以改变对象在堆叠中的位置，如图\
    \ 21-14 所示：`Bring to Front`（移至顶层）、`Bring Forward`（上移一层）、`Send Backward`（下移一层）和`Send\
    \ to Back`（移至底层）。\n\n**注意**  \n对象堆叠顺序会反映在`Objects`窗格的`Objects`标签页中，列表顶部的对象位于列表下方对象的前面。\n\
    \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig14_HTML.jpg](img/429700_2_En_21_Fig14_HTML.jpg)\n\
    \n**图 21-14**  \n影响对象堆叠位置的命令示意图\n\n## 隐藏对象\n\n可以为对象分配一个公式，用于确定何时应渲染它以及何时应隐藏它。选择对象，在`Inspector`窗格的`Data`标签页的`Behavior`部分输入`Hide\
    \ objects when`公式。当该公式返回`true`时，对象将在非布局模式下隐藏。输入的公式可以基于多种条件：字段中的值、窗口状态或用户环境的详细信息。例如，在特定字段中输入数据之前可以隐藏一个按钮，例如隐藏`Print`按钮直到报表所需的字段有值，或者隐藏`Approve`按钮直到关键状态字段有值。如果值列表当前为空，则隐藏配置为弹出菜单的`field`。当窗口处于查找模式时，隐藏数据输入专用的按钮和对象。在字段中输入足够信息以实际绘制有用内容之前，可以隐藏`chart`。可以根据记录类型切换一组`portal`的显示，为供应商联系人显示采购订单门户，为客户联系人切换到项目门户。还可以利用此功能根据用户的访问权限（第\
    \ 30 章）来隐藏信息，使用户看不到显示“无权限”的屏蔽字段，也无法点击会产生访问拒绝错误的按钮。多段`button bar`可以切换，使得一次只显示一个分段，以此作为切换按钮图标和功能的技术。\n\
    \n### 使用隐藏功能切换按钮栏\n\n一个两段按钮栏，如果每个分段具有不同的`Hide`公式，则可以创建*活动标签*，即根据对应字段的值更改图标和功能的按钮。例如，考虑一个`Contact\
    \ Company ID`字段的标签，该字段配置为用于为公司分配联系人的弹出菜单。如果所需的公司记录已存在，用户只需在字段中选择它即可。但是，如果公司尚不存在，则可以创建一个按钮来创建新记录并将其链接到联系人。类似地，一旦分配了公司，通常需要一个按钮允许用户导航到分配给联系人的相关公司记录。隐藏函数可以在给定时间切换哪些按钮可见，但您仍然需要处理三个对象：字段标签、导航按钮和新建按钮。或者，所有这些都可以替换为一个对象：一个用作活动标签的两段按钮栏，该按钮栏在一个分段与另一个分段之间切换，以允许创建新公司（如果尚未选择公司）或导航到相关记录（如果已选择公司）。\n\
    \n图 21-15 所示的示例展示了一个无边框的两段按钮栏，用作`Contact Company ID`字段的字段标签。第一个按钮分段分配了一个加号图标，并配置为在`id`字段不为空时隐藏。这将运行一个脚本，该脚本创建一个新的相关公司记录并将其`id`分配给当前联系人记录。第二个分段分配了一个导航图标，并配置为在`id`字段为空时隐藏。这将运行一个脚本，用于导航到选定的`Company`记录。由于这两个隐藏公式是二元对立关系，因此在浏览模式下，任何时候只有一个标签可见。\n\
    \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig15_HTML.jpg](img/429700_2_En_21_Fig15_HTML.jpg)\n\
    \n**图 21-15**  \n作为字段标签、始终隐藏一个分段的二段栏\n\n**警告**  \n可以添加第三个分段，不带图标和脚本，作为查找模式下的非活动标签。隐藏公式将检查窗口模式并相应调整隐藏动作。\n\
    \n根据上述配置，带有加号图标的标签仅在未选择公司时出现，而带有导航图标的标签仅在选择了公司时出现，两者均如图 21-16 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig16_HTML.jpg](img/429700_2_En_21_Fig16_HTML.jpg)\n\
    \n**图 21-16**  \n公司为空（上方）或已选择（下方）时的标签按钮\n\n**提示**  \n使用隐藏功能，通过一个始终返回`true`（`1`）的公式嵌入包含开发者注释的文本对象，使其只在布局模式下可见。\n\
    \n## 条件格式\n\n任何布局对象都可以使用`Inspector`窗格中的工具进行格式化。字段可以作为对象进行格式化，并且其包含的内容可以设置样式。*条件格式*是一项功能，它使用自定义公式或从二十个预定义内容值中选择的条件，覆盖应用于对象或内容的静态格式。自定义规则在`Conditional\
    \ Formatting`对话框中定义，如图 21-17 所示。要打开此对话框，请选择目标对象，然后选择`Format ➤ Conditional`菜单，或从对象的上下文菜单中选择`Conditional\
    \ Formatting`选项。该对话框包含以下控件：\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig17_HTML.jpg](img/429700_2_En_21_Fig17_HTML.jpg)\n\
    \n**图 21-17**  \n用于根据条件定义格式覆盖的对话框\n\n1.  `Condition List` – 触发格式化的已定义条件列表。这些条件将按从上到下的顺序求值。复选框指示条件是否处于激活状态。\n\
    2.  `Condition` – 定义所选条件何时应用格式化的标准。\n3.  `Format` – 选择当所选条件求值为`true`时要应用的格式设置。\n\
    \n### 条件公式选项\n\n*上下文格式化条件*定义了在何种情况下会将一组格式设置应用于对象。该条件可以是预定义的*基于值的条件*，也可以是自定义的*基于公式的条件*。\n"
- fmt: '### Using Value-Based Conditions


    A *value-based condition* determines when formatting should be applied by comparing
    the value of the object to static criteria using a selected operator, as shown
    in Figure [21-18](#429700_2_En_21_Chapter.xhtml#Fig18). In the *Condition* section
    of the *Conditional Formatting* dialog, select *Value Is* in the first menu, and
    then select an operator from the second menu. Depending on your choice, one or
    more text boxes will appear to the right into which static values can be inserted
    to form the conditional criteria. For example, if the value of a *Status* field
    is *equal to* “Urgent” or if a *Total Price* field is *less than* zero, the field
    text can be colored red and made bold.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig18_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig18_HTML.jpg)


    Figure 21-18 — The options for a value-driven condition


    ### Using Formula-Based Conditions


    A *formula-based condition* determines when formatting should be applied by evaluating
    a custom formula and applying the styling if the result is true. In the *Condition*
    section of the *Conditional Formatting* dialog, select *Formula Is* in the first
    menu, as shown in Figure [21-19](#429700_2_En_21_Chapter.xhtml#Fig19). Then, enter
    a formula directly into the field or click the *Specify* button to open the *Specify
    Calculation* dialog (Chapter [12](#429700_2_En_12_Chapter.xhtml)). The formula
    can use any combination of built-in functions, custom functions, and fields to
    define the conditions under which formatting will be applied.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig19_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig19_HTML.jpg)


    Figure 21-19 — The interface for a formula-driven condition


    ### Conditionally Formatting a Project Status Field


    To illustrate a use of conditional formatting, consider an example of a *Status*
    field value controlling the formatting of itself and other fields in a list, like
    the example shown in Figure [21-20](#429700_2_En_21_Chapter.xhtml#Fig20). By defining
    two conditions for each field, they are conditionally formatted bold when the
    status is “Active” or gray when it is “Hold.” Records with a status of “Pending”
    are left unchanged with default layout formatting. The result is three format
    tiers that visually emphasize the urgency of records. Remember, these format changes
    are imposed on top of the default formatting for the fields set through the *Inspector*
    pane.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig20_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig20_HTML.jpg)


    Figure 21-20 — An example of conditionally formatted fields in a list based on
    record status


    In this example, the *Project Status* field is assigned a value list with three
    values: *Active*, *Pending*, and *Hold*. Because this field will be conditionally
    formatted based on its own value, it can be configured with two *value-based conditions*,
    shown in Figure [21-21](#429700_2_En_21_Chapter.xhtml#Fig21). When the value is
    equal to “Active,” it applies bold formatting, and when it equals “Hold,” it colors
    the text a light gray.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig21_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig21_HTML.jpg)


    Figure 21-21 — The defined status field uses value-based conditions


    The other two fields in the list view need to each be configured with *formula-based
    conditions* because they need to look at another field value (the status field)
    to determine their formatting. The format settings are the same, but the specific
    condition formula is different, as shown for the *Company Name* field in Figure
    [21-22](#429700_2_En_21_Chapter.xhtml#Fig22). Here the formula looks for “Active”
    or “Hold” in the *Project Status* field and then applies formatting.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig22_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig22_HTML.jpg)


    Figure 21-22 — The formula-driven conditions for other fields in the list view


    ## Understanding Tab Order


    A layout’s *tab order* defines the focus precedence when stepping from one object
    to another as the user types the `Tab` or other field-exiting keys defined for
    objects (Chapter [19](#429700_2_En_19_Chapter.xhtml), “Behavior”). This allows
    a user to “tab” through from field to field to object to field, etc., using only
    the keyboard. The default order is left to right and top to bottom through every
    object that can accept focus. However, as objects are moved around on a layout
    or are added at a later time, the tab order will need to be reset to avoid bouncing
    focus back and forth haphazardly. When setting a custom order, objects that don’t
    require data entry, like calculation fields or buttons, can be excluded.


    ### Changing the Tab Order


    In Layout mode, select the *Layout ➤ Set Tab Order* menu to place the layout into
    a *tab-order editing mode*, shown in Figure [21-23](#429700_2_En_21_Chapter.xhtml#Fig23).
    Each object capable of receiving focus will have an arrow icon attached to one
    side. These contain the object’s current tab order number and are editable text
    boxes. Delete an object’s number to remove it from the tab order. Click inside
    a blank arrow to automatically assign the next available number in the tab order,
    and/or edit the number by typing over it. `FileMaker` enforces a unique number
    sequence by automatically changing an object’s value when its assigned number
    is typed elsewhere.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig23_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig23_HTML.jpg)


    Figure 21-23 — A window in tab-editing mode has customizable order arrow fields


    ### Using Functions of the Set Tab Order Dialog


    The *Set Tab Order* dialog shown in Figure [21-24](#429700_2_En_21_Chapter.xhtml#Fig24)
    opens automatically when a layout is placed into tab-editing mode. This dialog
    is used to perform batch tab-order functions and to exit back to regular Layout
    mode.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig24_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig24_HTML.jpg)


    Figure 21-24 — The dialog used to control batch tab-ordering functions


    1.  *Add Remaining* – Add a default order to unassigned objects by selecting an
    option in the menu: *Objects*, *Fields only*, and *Buttons only*. Then click the
    *Add* button.

    2.  *Remove* – Remove objects from the tab order by selecting an option in the
    menu: *All fields* or *All buttons*. Then click the *Remove* button.

    3.  *Clear All* – Delete the tab order from every object on the layout, providing
    a clean slate for reassignment.


    > **Tip:** After moving any object on a layout, always return to Browse mode,
    and click through the fields to confirm a desirable tab order.'
