- fmt: '# Get Folder Path


    The `Get Folder Path` step, formerly named `Get Directory`, presents the user
    with a `Choose Folder` dialog. This allows a user to select a folder which can
    then be used by other steps that import, export, and save various resources. The
    step includes several configurable options, shown in Figure [25-8](#429700_2_En_25_Chapter.xhtml#Fig8).


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig8_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig8_HTML.jpg)


    **Figure 25-8** The options for selecting a directory


    The `Allow Folder Creation` checkbox enables the `New Folder` button in the `Choose
    Folder` dialog, making it possible for the user to create and select a new folder.
    The `Variable` button opens a limited `Set Variable Options` dialog that specifies
    the name of the variable into which the selected folder path will be placed. The
    buttons by `Dialog title` and `Default location` both open a `Specify Calculation`
    dialog to control the dialog’s title prompt and default starting folder path.


    When a script executes this step, the dialog opens and waits for user input. Once
    they choose a folder and click to dismiss the dialog, the path to that folder
    is placed into the variable specified. The path may need to be converted to a
    FileMaker format (Chapter [24](#429700_2_En_24_Chapter.xhtml), “Converting Paths”)
    or have a prefix added in order to work with other script steps.


    The following example uses `Set Error Capture` to suppress a warning dialog if
    the user clicks `Cancel` in the dialog. A default path is set to the user computer’s
    documents path. After the `Get Folder Path` step, the `If` statement checks for
    a `LastError`. If the user cancels the dialog, the `If` statement uses the `Exit
    Script` step to stop the script. Otherwise, the user’s folder selection in the
    `$pathToFolder` variable can be used later as the script continues.


    ```

    Set Error Capture [ On ]

    Set Variable [ $pathToDefault ; Value: Get ( DocumentsPath ) ]

    Get Folder Path [ $pathToFolder ; $pathToDefault ]

    If [ Get ( LastError ) = 1 ]

    Exit Script [ Text Result: "User Cancelled" ]

    End if

    ```


    **Caution**: The dialog’s appearance depends on the operating system. For example,
    macOS doesn’t display the `Dialog title`.


    ## Manipulating Data Files


    A new group of steps was added in version 18 that can manipulate data files. These
    can be used to *create*, *close*, *delete*, *detect*, *open*, *read*, *rename*,
    and *write* data files on the user’s computer.


    ### Creating a Data File


    The `Create Data File` step will create a new empty file that automatically replaces
    any preexisting file with the same name at the specified FileMaker path. It accepts
    a file path parameter and has an option to automatically create folders to ensure
    the entire path exists. Once created, a script can open the file and write to
    it.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Create Data File [ "$filePath" ; Create folders: Off ]

    ```


    ### Opening and Closing a Data File


    The `Open Data File` step will open a data file and assign it a numeric `File
    ID` that will persist until the file is explicitly closed. This number acts as
    a reference pointer to the file and is required by other data file steps instead
    of a path, e.g., the `Close Data File` step accepts only a `File ID` that points
    to the file that should be closed. In the following example, the script assumes
    the file path created in the previous example is in a variable named `$filePath`.
    Using this path, it opens the file, places the id into a target variable named
    `$fileID`, and then immediately uses that id to close the file.


    ```

    Open Data File [ "$filePath" ; Target: $fileID ]

    Close Data File [ File ID: $fileID ]

    ```


    ### Reading a Data File


    The `Read from Data File` step will read data from an open data file and place
    the content into a `Target` variable or field. It accepts four parameters. The
    `File ID` requires a numeric file reference, typically the targeted result of
    the `Open Data File` step. The `Target` allows the selection of a field or entry
    of a variable into which the file’s contents will be placed. A `Read as` inline
    menu allows the choice of character encoding, and an `Amount` option allows a
    formula to determine the number of bytes to read (leave blank for all). Building
    on the last example, this script has a step added between opening and closing
    the file, where it reads the contents as UTF-8 and places it into a variable named
    `$fileContents`. At the end, a `Show Custom Dialog` displays the text.


    ```

    Open Data File [ "$filePath" ; Target: $fileID ]

    Read from Data File [ File ID: $fileID ; Target: $fileContents ; Read as: UTF-8
    ]

    Close Data File [ File ID: $fileID ]

    Show Custom Dialog [ $fileContents ]

    ```


    ### Confirming a Data File’s Existence


    When a referenced file does not exist, an error will be generated if a script
    attempts to open it. To avoid this, the `Get File Exists` step can first confirm
    the existence of a file and take an alternate course of action if it isn’t found.
    The step accepts a `Source file` path and places a true (1) or false (0) value
    into a `Target` field or variable. This example will check for the file and, if
    it doesn’t exist, will present a dialog and exit the script.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Get File Exists [ "$filePath" ; Target: $fileExists ]

    If [ $fileExists = 0 ]

    Show Custom Dialog [ "Unable to locate the Hello.txt file!" ]

    Exit Script

    End If

    ```


    ### Writing to a Data File


    The `Write to Data File` step will write data to an open data file. It requires
    the similar parameters as the read step but reverses the labelling of the target
    to a `Data source` and the character encoding to `Write as`. An additional optional
    checkbox to `Append line feed` adds a line feed character after writing data.
    This example will replace the previous file data with the words “Hello, World.”


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Set Variable [ $fileContents ; Value: "Hello, World" ]

    Open Data File [ "$filePath" ; Target: $fileID ]

    Write to Data File [ File ID: $fileID ; Data source: $fileContents ; Write as:
    UTF-8 ]

    Close Data File [ File ID: $fileID ]

    ```


    To begin writing at the end of the existing data, use the `Get File Size` and
    `Set Data File Position` steps to determine the number of bytes in the file and
    to begin after that point. The first accepts a file path instead of a file id
    so the file doesn’t have to be open for that step.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Set Variable [ $fileContents ; Value: "Hello, World" ]

    Get File Size [ "$filePath" ; Target: $fileSize ]

    Open Data File [ "$filePath" ; Target: $fileID ]

    Set Data File Position [ File ID: $fileID ; New position: $fileSize ]

    Write to Data File [ File ID: $fileID ; Data source: $fileContents ; Write as:
    UTF-8 ]

    Close Data File [ File ID: $fileID ]

    ```


    Alternatively, reading from the file prior to writing will automatically begin
    writing after all existing data.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Set Variable [ $fileContents ; Value: "Hello, World" ]

    Open Data File [ "$filePath" ; Target: $fileID ]

    Read from Data File [ File ID: $fileID ; Target: $fileContents ; Read as: UTF-8
    ]

    Write to Data File [ File ID: $fileID ; Data source: $fileContents ; Write as:
    UTF-8 ]

    Close Data File [ File ID: $fileID ]

    ```'
  raw: '### Get Folder Path


    The *Get Folder Path* step, formerly named *Get Directory*, presents the user
    with a *Choose Folder* dialog. This allows a user to select a folder which can
    then be used by other steps that import, export, and save various resources. The
    step includes several configurable options, shown in Figure [25-8](#429700_2_En_25_Chapter.xhtml#Fig8).


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig8_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig8_HTML.jpg)


    Figure 25-8


    The options for selecting a directory


    The *Allow Folder Creation* checkbox enables the *New Folder* button in the *Choose
    Folder* dialog, making it possible for the user to create and select a new folder.
    The *Variable* button opens a limited *Set Variable Options* dialog that specifies
    the name of the variable into which the selected folder path will be placed. The
    buttons by *Dialog title* and *Default location* both open a *Specify Calculation*
    dialog to control the dialog’s title prompt and default starting folder path.


    When a script executes this step, the dialog opens and waits for user input. Once
    they choose a folder and click to dismiss the dialog, the path to that folder
    is placed into the variable specified. The path may need to be converted to a
    FileMaker format (Chapter [24](#429700_2_En_24_Chapter.xhtml), “Converting Paths”)
    or have a prefix added in order to work with other script steps.


    The following example uses *Set Error Capture* to suppress a warning dialog if
    the user clicks *Cancel* in the dialog. A default path is set to the user computer’s
    documents path. After the *Get Folder Path* step, the *If* statement checks for
    a *LastError*. If the user cancels the dialog, the *If* statement uses the *Exit
    Script* step to stop the script. Otherwise, the user’s folder selection in the
    *$pathToFolder* variable can be used later as the script continues.


    ```

    Set Error Capture [ On ]

    Set Variable [ $pathToDefault ; Value: Get ( DocumentsPath ) ]

    Get Folder Path [ $pathToFolder ; $pathToDefault ]

    If [ Get ( LastError ) = 1 ]

    Exit Script [ Text Result: "User Cancelled" ]

    End if

    ```


    Caution


    The dialog’s appearance depends on the operating system. For example, macOS doesn’t
    display the *Dialog title*.


    ### Manipulating Data Files


    A new group of steps was added in version 18 that can manipulate data files. These
    can be used to *create*, *close*, *delete*, *detect*, *open*, *read*, *rename,*
    and *write* data files on the user’s computer.


    #### Creating a Data File


    The *Create Data File* step will create a new empty file that automatically replaces
    any preexisting file with the same name at the specified FileMaker path. It accepts
    a file path parameter and has an option to automatically create folders to ensure
    the entire path exists. Once created, a script can open the file and write to
    it.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Create Data File [ "$filePath" ; Create folders: Off ]

    ```


    #### Opening and Closing a Data File


    The *Open Data File* step will open a data file and assign it a numeric *File
    ID* that will persist until the file is explicitly closed. This number acts as
    a reference pointer to the file and is required by other data file steps instead
    of a path, e.g., the *Close Data File* step accepts only a *File ID* that points
    to the file that should be closed. In the following example, the script assumes
    the file path created in the previous example is in a variable named *$filePath*.
    Using this path, it opens the file, places the id into a target variable named
    *$fileID*, and then immediately uses that id to close the file.


    ```

    Open Data File [ "$filePath" ; Target: $fileID ]

    Close Data File [ File ID: $fileID ]

    ```


    #### Reading a Data File


    The *Read from Data File* step will read data from an open data file and place
    the content into a *Target* variable or field. It accepts four parameters. The
    *File ID* requires a numeric file reference, typically the targeted result of
    the *Open Data File* step. The *Target* allows the selection of a field or entry
    of a variable into which the file’s contents will be placed. A *Read as* inline
    menu allows the choice of character encoding, and an *Amount* option allows a
    formula to determine the number of bytes to read (leave blank for all). Building
    on the last example, this script has a step added between opening and closing
    the file, where it reads the contents as UTF-8 and places it into a variable named
    *$fileContents*. At the end, a *Show Custom Dialog* displays the text.


    ```

    Open Data File [ "$filePath" ; Target: $fileID ]

    Read from Data File [ File ID: $fileID ; Target: $fileContents ; Read as: UTF-8
    ]

    Close Data File [ File ID: $fileID ]

    Show Custom Dialog [ $fileContents ]

    ```


    #### Confirming a Data File’s Existence


    When a referenced file does not exist, an error will be generated if a script
    attempts to open it. To avoid this, the *Get File Exists* step can first confirm
    the existence of a file and take an alternate course of action if it isn’t found.
    The step accepts a *Source file* path and places a true (1) or false (0) value
    into a *Target* field or variable. This example will check for the file and, if
    it doesn’t exist, will present a dialog and exit the script.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Get File Exists [ "$filePath" ; Target: $fileExists ]

    If [ $fileExists = 0 ]

    Show Custom Dialog [ "Unable to locate the Hello.txt file!" ]

    Exit Script

    End If

    ```


    #### Writing to a Data File


    The *Write to Data File* step will write data to an open data file. It requires
    the similar parameters as the read step but reverses the labelling of the target
    to a *Data source* and the character encoding to *Write as*. An additional optional
    checkbox to *Append line feed* adds a line feed character after writing data.
    This example will replace the previous file data with the words “Hello, World.”


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Set Variable [ $fileContents ; Value: "Hello, World" ]

    Open Data File [ "$filePath" ; Target: $fileID ]

    Write to Data File [ File ID: $fileID ; Data source: $fileContents ; Write as:
    UTF-8 ]

    Close Data File [ File ID: $fileID ]

    ```


    To begin writing at the end of the existing data, use the *Get File Size* and
    *Set Data File Position* steps to determine the number of bytes in the file and
    to begin after that point. The first accepts a file path instead of a file id
    so the file doesn’t have to be open for that step.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Set Variable [ $fileContents ; Value: "Hello, World" ]

    Get File Size [ "$filePath" ; Target: $fileSize ]

    Open Data File [ "$filePath" ; Target: $fileID ]

    Set Data File Position [ File ID: $fileID ; New position: $fileSize ]

    Write to Data File [ File ID: $fileID ; Data source: $fileContents ; Write as:
    UTF-8 ]

    Close Data File [ File ID: $fileID ]

    ```


    Alternatively, reading from the file prior to writing will automatically begin
    writing after all existing data.


    ```

    Set Variable [ $filePath ; Value: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt"
    ]

    Set Variable [ $fileContents ; Value: "Hello, World" ]

    Open Data File [ "$filePath" ; Target: $fileID ]

    Read from Data File [ File ID: $fileID ; Target: $fileContents ; Read as: UTF-8
    ]

    Write to Data File [ File ID: $fileID ; Data source: $fileContents ; Write as:
    UTF-8 ]

    Close Data File [ File ID: $fileID ]

    ```'
  trans: '```markdown

    # 获取文件夹路径


    `获取文件夹路径`步骤（原名`获取目录`）会向用户显示一个`选择文件夹`对话框。这允许用户选择一个文件夹，然后供其他导入、导出和保存各种资源的步骤使用。该步骤包含多个可配置选项，如图
    25-8 所示。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig8_HTML.jpg](img/429700_2_En_25_Fig8_HTML.jpg)


    **图 25-8** 选择目录的选项


    `允许创建文件夹`复选框可在`选择文件夹`对话框中启用`新建文件夹`按钮，使用户能够创建并选择新文件夹。`变量`按钮会打开一个受限的`设置变量选项`对话框，用于指定存储所选文件夹路径的变量名称。`对话框标题`和`默认位置`旁的按钮都会打开一个`指定计算`对话框，用于控制对话框的标题提示和默认起始文件夹路径。


    当脚本执行此步骤时，对话框会打开并等待用户输入。一旦用户选择了一个文件夹并点击关闭对话框，该文件夹的路径便会存入指定的变量中。该路径可能需要转换为 FileMaker
    格式（第 24 章，“转换路径”），或添加前缀，以便与其他脚本步骤配合使用。


    以下示例使用`设置错误捕获`来抑制用户点击对话框中的`取消`时出现的警告对话框。默认路径设置为用户电脑的“文档”路径。在`获取文件夹路径`步骤之后，`If`语句会检查`LastError`。如果用户取消了对话框，`If`语句会使用`退出脚本`步骤来停止脚本。否则，脚本继续执行时，稍后便可使用`$pathToFolder`变量中用户选择的文件夹。


    ```

    设置错误捕获 [ 开启 ]

    设置变量 [ $pathToDefault ; 值: Get ( DocumentsPath ) ]

    获取文件夹路径 [ $pathToFolder ; $pathToDefault ]

    If [ Get ( LastError ) = 1 ]

    退出脚本 [ 文本结果: "用户已取消" ]

    End if

    ```


    **警告**: 对话框的外观取决于操作系统。例如，macOS 不显示`对话框标题`。


    ## 操作数据文件


    18 版本新增了一组可以操作数据文件的步骤。这些步骤可用于在用户电脑上*创建*、*关闭*、*删除*、*检测*、*打开*、*读取*、*重命名*和*写入*数据文件。


    ### 创建数据文件


    `创建数据文件`步骤会创建一个新的空文件，并自动替换指定 FileMaker 路径下任何同名的现有文件。它接受一个文件路径参数，并具有自动创建文件夹以确保完整路径存在的选项。创建后，脚本可以打开该文件并写入数据。


    ```

    设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

    创建数据文件 [ "$filePath" ; 创建文件夹: 关闭 ]

    ```


    ### 打开和关闭数据文件


    `打开数据文件`步骤会打开一个数据文件，并为其分配一个数字`文件 ID`，该 ID 将一直存在，直到文件被显式关闭。此数字充当文件的引用指针，其他数据文件步骤（例如`关闭数据文件`步骤）需要用它来代替路径。`关闭数据文件`步骤仅接受指向应关闭文件的`文件
    ID`。在以下示例中，脚本假设前一个示例中创建的文件路径位于名为`$filePath`的变量中。使用此路径，它打开文件，将 ID 放入名为`$fileID`的目标变量中，然后立即使用该
    ID 关闭文件。


    ```

    打开数据文件 [ "$filePath" ; 目标: $fileID ]

    关闭数据文件 [ 文件 ID: $fileID ]

    ```


    ### 读取数据文件


    `从数据文件读取`步骤会从一个已打开的数据文件中读取数据，并将内容放入一个`目标`变量或字段中。它接受四个参数。`文件 ID`需要一个数字文件引用，通常是`打开数据文件`步骤的目标结果。`目标`允许选择字段或输入变量，文件内容将放入其中。`读取为`内联菜单允许选择字符编码，`数量`选项允许通过公式确定要读取的字节数（留空则读取全部内容）。延续上一个示例，此脚本在打开和关闭文件之间添加了一个步骤，它将内容读取为
    UTF-8 编码，并放入名为`$fileContents`的变量中。最后，`显示自定义对话框`会显示该文本。


    ```

    打开数据文件 [ "$filePath" ; 目标: $fileID ]

    从数据文件读取 [ 文件 ID: $fileID ; 目标: $fileContents ; 读取为: UTF-8 ]

    关闭数据文件 [ 文件 ID: $fileID ]

    显示自定义对话框 [ $fileContents ]

    ```


    ### 确认数据文件是否存在


    当引用的文件不存在时，如果脚本尝试打开它，将会产生错误。为避免这种情况，可以使用`获取文件是否存在`步骤先确认文件是否存在，并在未找到时采取替代操作。该步骤接受一个`源文件`路径，并将一个真
    (1) 或假 (0) 值放入`目标`字段或变量。此示例将检查文件是否存在，如果不存在，则显示对话框并退出脚本。


    ```

    设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

    获取文件是否存在 [ "$filePath" ; 目标: $fileExists ]

    If [ $fileExists = 0 ]

    显示自定义对话框 [ "无法找到 Hello.txt 文件！" ]

    退出脚本

    End If

    ```


    ### 写入数据文件


    `写入数据文件`步骤会将数据写入一个已打开的数据文件。它需要的参数与读取步骤类似，但将目标的标签反转为`数据源`，字符编码标签改为`写入为`。还有一个可选的`追加换行符`复选框，用于在写入数据后添加一个换行符。此示例将用“Hello,
    World.”替换之前文件中的数据。


    ```

    设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

    设置变量 [ $fileContents ; 值: "Hello, World" ]

    打开数据文件 [ "$filePath" ; 目标: $fileID ]

    写入数据文件 [ 文件 ID: $fileID ; 数据源: $fileContents ; 写入为: UTF-8 ]

    关闭数据文件 [ 文件 ID: $fileID ]

    ```


    要从现有数据的末尾开始写入，请使用`获取文件大小`和`设置数据文件位置`步骤来确定文件中的字节数，并从该位置之后开始写入。第一个步骤接受文件路径而不是文件
    ID，因此文件不必为执行该步骤而打开。


    ```

    设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

    设置变量 [ $fileContents ; 值: "Hello, World" ]

    获取文件大小 [ "$filePath" ; 目标: $fileSize ]

    打开数据文件 [ "$filePath" ; 目标: $fileID ]

    设置数据文件位置 [ 文件 ID: $fileID ; 新位置: $fileSize ]

    写入数据文件 [ 文件 ID: $fileID ; 数据源: $fileContents ; 写入为: UTF-8 ]

    关闭数据文件 [ 文件 ID: $fileID ]

    ```


    或者，在写入之前读取文件，写入操作将自动在已有所有数据之后开始。


    ```

    设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

    设置变量 [ $fileContents ; 值: "Hello, World" ]

    打开数据文件 [ "$filePath" ; 目标: $fileID ]

    从数据文件读取 [ 文件 ID: $fileID ; 目标: $fileContents ; 读取为: UTF-8 ]

    写入数据文件 [ 文件 ID: $fileID ; 数据源: $fileContents ; 写入为: UTF-8 ]

    关闭数据文件 [ 文件 ID: $fileID ]

    ```'
- fmt: '# Working with Records


    Numerous script steps perform interactions with records. The `New Record/Request`
    step will create a new record in the current window, while the `Duplicate Record/Request`
    step will create a duplicate of the current record. These have no configurable
    options. The `Delete Record/Request` step will automatically delete the current
    record in the front window after presenting an optional confirmation dialog. Similarly,
    the `Delete All Records` step will delete every record in the found set after
    presenting an optional dialog. There are steps available to perform many of the
    record actions users can perform through the interface from the `Records` menu
    and toolbar options. Scripts can open, commit, copy, and revert records. There
    are steps for `Save Records as Excel`, `Save Records as PDF`, and `Save Records
    as Snapshot Link`. The `Truncate Table` step deletes all records in a specified
    table, regardless of the current found set or the current layout context. In addition,
    there are two steps used to move records in and out of a table: `Import Records`
    and `Export Records`.


    ## Import Records


    The `Import Records` step, shown in Figure [25-9](#429700_2_En_25_Chapter.xhtml#Fig9),
    is used to import records into a table with or without human interaction, depending
    on the configuration settings.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig9_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig9_HTML.jpg)


    Figure 25-9


    The configuration options for automatically importing records


    The `With dialog` option can be turned `Off` to suppress dialogs when the step
    is performed, allowing a truly autonomous operation. However, if a `data source`
    or `import order` is not defined, this setting will be ignored, and the dialogs
    will appear, requesting the missing information. The `Specify data source` accepts
    a path for the file to import, and the `Specify import order` button opens the
    dialog of the same name used to map import data to fields (Chapter [5](#429700_2_En_5_Chapter.xhtml)).
    Enable the `Verify SSL Certificates` when importing XML data from a server specified
    with a HTTP request.


    ## Export Records


    The `Export Record` step, shown in Figure [25-10](#429700_2_En_25_Chapter.xhtml#Fig10),
    allows a script to automatically export records with or without human interaction,
    depending on the configuration settings. The `Specify output file` and `Specify
    export order` both open dialogs that respectively allow specification of a file
    path and field order. Two additional toggle options are accessible directly in
    the step line. The `With dialog` can suppress dialogs for autonomous operation
    as long as both panel options are configured. The `Create folders` option automatically
    creates folders to ensure the entire directory path exists.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig10_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig10_HTML.jpg)


    Figure 25-10


    The configuration options for automatically exporting records


    ## Using Conditional Statements


    A `conditional statement` is made up of one or more script steps that are only
    executed if certain conditions are true. These are known as `if-then statements`
    because they include criteria that can be thought of as the equivalent of *if
    this formula is true then run these steps*. FileMaker has four script steps used
    to build if-then script statements:


    * `If` – Required at the start of a statement to define a formula that controls
    when the steps following it will be executed

    * `Else If` – Optionally placed between an `If` and `End If` step to start a new
    group of conditional steps based on a new formula

    * `Else` – Optionally placed somewhere prior to an `End If` to denote a separate
    group of conditional steps that are performed only if all preceding conditions
    were false

    * `End If` – Required to terminate the conditional statement started by the `If`
    step


    As an example, assume an `Invoice Status` field has several possible values: `Unsent`,
    `Sent`, `Due`, `Past Due`, `Delinquent`, and `Paid`. A script created to email
    an invoice wouldn’t apply to those already sent, and sending a reminder about
    an overdue status wouldn’t apply to every invoice record. Further, some haven’t
    been sent yet, some that have been aren’t yet overdue, etc. A simple `If` statement
    can be set up to only send a reminder if an invoice has a past due status as shown
    in the following example:


    ```

    If [ Invoice::Status = "Past Due" ]

    Perform Script ["Email Invoice Past Due" ]

    End If

    ```


    This can be expanded into a `compound conditional statement` that includes several
    conditions that each call a different script. If the invoice hasn’t been sent,
    it runs a script to send it. If the status is past due or delinquent, it sends
    a reminder or a warning, respectively. Other statuses not included in the statement
    would send nothing.


    ```

    If [ Invoice::Status = "Unsent" ]

    Perform Script ["Email Invoice" ]

    Else If [ Invoice::Status = "Past Due" ]

    Perform Script ["Email Invoice Past Due" ]

    Else If [ Invoice::Status = "Delinquent" ]

    Perform Script ["Email Invoice Collection Warning" ]

    End If

    ```


    A conditional statement can be placed inside of another conditional statement
    creating a `nested statement`. The statement hierarchy can be as complex as necessary
    to achieve the necessary objective. In this example, the first outer statement
    contains and controls which of the two inner compound statements get executed
    based on the status field.


    ```

    If [ Invoice::Status = "Past Due" ]

    If [ Invoice::Days Past > 15  ]

    Perform Script ["Email First Warning" ]

    Else If [ Invoice::Days Past > 30  ]

    Perform Script ["Email Second Warning" ]

    Else If [ Invoice::Days Past > 45  ]

    Perform Script ["Email Final Warning" ]

    End If

    Else If [ Invoice::Status = "Delinquent"]

    If [ Invoice::Days Delinquent > 15  ]

    Perform Script ["Email Collections Warning" ]

    Else If [ Invoice::Days Delinquent > 30  ]

    Perform Script ["Email Collections Notification" ]

    End If

    End If

    ```


    Tip


    Avoid situations where excessive nesting makes it too difficult to follow how
    a script will execute when scrolling pages of steps.


    ## Showing Custom Dialogs


    The `Show Custom Dialog` step is used to present a message to the user and can
    also request input into three fields or variables. Dialogs can present an informative
    notification, warn the user about a problem, confirm a certain action, present
    a choice of action, request input, provide instruction, etc. With the step added
    to a script, the gear icon opens a `Show Custom Dialog Options` dialog, which
    has two tabs: `General` and `Input Fields`.'
  raw: '## Working with Records


    Numerous script steps perform interactions with records. The *New Record/Request*
    step will create a new record in the current window, while the *Duplicate Record/Request*
    step will create a duplicate of the current record. These have no configurable
    options. The *Delete Record/Request* step will automatically delete the current
    record in the front window after presenting an optional confirmation dialog. Similarly,
    the *Delete All Records* step will delete every record in the found set after
    presenting an optional dialog. There are steps available to perform many of the
    record actions users can perform through the interface from the *Records* menu
    and toolbar options. Scripts can open, commit, copy, and revert records. There
    are steps for *Save Records as Excel*, *Save Records as PDF*, and *Save Records
    as Snapshot Link*. The *Truncate Table* step deletes all records in a specified
    table, regardless of the current found set or the current layout context. In addition,
    there are two steps used to move records in and out of a table: *Import Records*
    and *Export Records*.


    ### Import Records


    The *Import Records* step, shown in Figure [25-9](#429700_2_En_25_Chapter.xhtml#Fig9),
    is used to import records into a table with or without human interaction, depending
    on the configuration settings.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig9_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig9_HTML.jpg)


    Figure 25-9


    The configuration options for automatically importing records


    The *With dialog* option can be turned *Off* to suppress dialogs when the step
    is performed, allowing a truly autonomous operation. However, if a *data source*
    or *import order* is not defined, this setting will be ignored, and the dialogs
    will appear, requesting the missing information. The *Specify data source* accepts
    a path for the file to import, and the *Specify import order* button opens the
    dialog of the same name used to map import data to fields (Chapter [5](#429700_2_En_5_Chapter.xhtml)).
    Enable the *Verify SSL Certificates* when importing XML data from a server specified
    with a HTTP request.


    ### Export Records


    The *Export Record* step, shown in Figure [25-10](#429700_2_En_25_Chapter.xhtml#Fig10),
    allows a script to automatically export records with or without human interaction,
    depending on the configuration settings. The *Specify output file* and *Specify
    export order* both open dialogs that respectively allow specification of a file
    path and field order. Two additional toggle options are accessible directly in
    the step line. The *With dialog* can suppress dialogs for autonomous operation
    as long as both panel options are configured. The *Create folders* option automatically
    creates folders to ensure the entire directory path exists.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig10_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig10_HTML.jpg)


    Figure 25-10


    The configuration options for automatically exporting records


    ## Using Conditional Statements


    A *conditional statement* is made up of one or more script steps that are only
    executed if certain conditions are true. These are known as *if-then statements*
    because they include criteria that can be thought of as the equivalent of *if
    this formula is true then run these steps*. FileMaker has four script steps used
    to build if-then script statements:


    *   *If* – Required at the start of a statement to define a formula that controls
    when the steps following it will be executed


    *   *Else If* – Optionally placed between an *If* and *End If* step to start a
    new group of conditional steps based on a new formula


    *   *Else* – Optionally placed somewhere prior to an *End If* to denote a separate
    group of conditional steps that are performed only if all preceding conditions
    were false


    *   *End If* – Required to terminate the conditional statement started by the
    *If* step


    As an example, assume an *Invoice Status* field has several possible values: *Unsent*,
    *Sent*, *Due*, *Past Due*, *Delinquent,* and *Paid*. A script created to email
    an invoice wouldn’t apply to those already sent, and sending a reminder about
    an overdue status wouldn’t apply to every invoice record. Further, some haven’t
    been sent yet, some that have been aren’t yet overdue, etc. A simple *If* statement
    can be set up to only send a reminder if an invoice has a past due status as shown
    in the following example:


    ```

    If [ Invoice::Status = "Past Due" ]

    Perform Script ["Email Invoice Past Due" ]

    End If

    ```


    This can be expanded into a *compound conditional statement* that includes several
    conditions that each call a different script. If the invoice hasn’t been sent,
    it runs a script to send it. If the status is past due or delinquent, it sends
    a reminder or a warning, respectively. Other statuses not included in the statement
    would send nothing.


    ```

    If [ Invoice::Status = "Unsent" ]

    Perform Script ["Email Invoice" ]

    Else If [ Invoice::Status = "Past Due" ]

    Perform Script ["Email Invoice Past Due" ]

    Else If [ Invoice::Status = "Delinquent" ]

    Perform Script ["Email Invoice Collection Warning" ]

    End If

    ```


    A conditional statement can be placed inside of another conditional statement
    creating a *nested statement* . The statement hierarchy can be as complex as necessary
    to achieve the necessary objective. In this example, the first outer statement
    contains and controls which of the two inner compound statements get executed
    based on the status field.


    ```

    If [ Invoice::Status = "Past Due" ]

    If [ Invoice::Days Past > 15  ]

    Perform Script ["Email First Warning" ]

    Else If [ Invoice::Days Past > 30  ]

    Perform Script ["Email Second Warning" ]

    Else If [ Invoice::Days Past > 45  ]

    Perform Script ["Email Final Warning" ]

    End If

    Else If [ Invoice::Status = "Delinquent"]

    If [ Invoice::Days Delinquent > 15  ]

    Perform Script ["Email Collections Warning" ]

    Else If [ Invoice::Days Delinquent > 30  ]

    Perform Script ["Email Collections Notification" ]

    End If

    End If

    ```


    Tip


    Avoid situations where excessive nesting makes it too difficult to follow how
    a script will execute when scrolling pages of steps.


    ## Showing Custom Dialogs


    The *Show Custom Dialog* step is used to present a message to the user and can
    also request input into three fields or variables. Dialogs can present an informative
    notification, warn the user about a problem, confirm a certain action, present
    a choice of action, request input, provide instruction, etc. With the step added
    to a script, the gear icon opens a *Show Custom Dialog Options* dialog, which
    has two tabs: *General* and *Input Fields*.'
  trans: '

    # 操作记录


    众多脚本步骤都会与记录进行交互。`新建记录/请求`步骤会在当前窗口中创建一条新记录，而`复制记录/请求`步骤则会复制当前记录。这两个步骤没有可配置的选项。`删除记录/请求`步骤会在显示一个可选的确认对话框后，自动删除前端窗口中的当前记录。类似地，`删除全部记录`步骤会在显示一个可选的对话框后，删除找到集中的所有记录。还有一些步骤可以执行用户通过`记录`菜单和工具栏选项在界面中执行的许多记录操作。脚本可以打开、提交、复制和恢复记录。存在`将记录另存为
    Excel`、`将记录另存为 PDF` 和`将记录另存为快照链接`等步骤。`清空表`步骤会删除指定表中的所有记录，无论当前找到集或当前布局上下文如何。此外，还有两个步骤用于将记录移入或移出表：`导入记录`和`导出记录`。


    ## 导入记录


    `导入记录`步骤，如图 25-9 所示，用于将记录导入到表中，根据配置设置，可以带有人机交互或无人工干预。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig9_HTML.jpg](img/429700_2_En_25_Fig9_HTML.jpg)


    图 25-9


    自动导入记录的配置选项


    `显示对话框`选项可以设置为`关闭`，以在执行步骤时抑制对话框，从而实现真正的自主操作。但是，如果未定义`数据源`或`导入映射`，则会忽略此设置，并显示对话框，请求缺失的信息。`指定数据源`接受要导入文件的路径，而`指定导入映射`按钮会打开同名的对话框，用于将导入数据映射到字段（第
    5 章）。当从通过 HTTP 请求指定的服务器导入 XML 数据时，请启用`验证 SSL 证书`。


    ## 导出记录


    `导出记录`步骤，如图 25-10 所示，允许脚本根据配置设置自动导出记录，可以带有人机交互或无人工干预。`指定输出文件`和`指定导出映射`都会打开对话框，分别允许指定文件路径和字段顺序。在步骤行中可以直接访问两个额外的开关选项。`显示对话框`可以抑制对话框以实现自主操作，前提是两个面板选项都已配置。`创建文件夹`选项会自动创建文件夹，以确保整个目录路径存在。


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig10_HTML.jpg](img/429700_2_En_25_Fig10_HTML.jpg)


    图 25-10


    自动导出记录的配置选项


    ## 使用条件语句


    一个`条件语句`由一个或多个脚本步骤组成，这些步骤仅在特定条件为真时执行。这些被称为`if-then 语句`，因为它们包含的条件可以理解为*如果此公式为真，则运行这些步骤*。FileMaker
    有四个用于构建 if-then 脚本语句的脚本步骤：


    * `If` – 必须在语句开头使用，用于定义一个公式，该公式控制何时执行其后的步骤

    * `Else If` – 可选地放置在 `If` 步骤和 `End If` 步骤之间，用于基于一个新公式开始一组新的条件步骤

    * `Else` – 可选地放置在 `End If` 之前，用于表示一组单独的条件步骤，这些步骤仅在所有前面的条件都为假时才执行

    * `End If` – 必须用于终止由 `If` 步骤开始的条件语句


    例如，假设一个`发票状态`字段有以下几个可能的值：`未发送`、`已发送`、`待付款`、`逾期`、`严重逾期`和`已付款`。一个用于通过电子邮件发送发票的脚本不适用于已发送的发票，而发送关于逾期状态的提醒也不适用于每条发票记录。此外，有些发票尚未发送，有些已发送但尚未逾期，等等。可以设置一个简单的
    `If` 语句，以便仅在发票状态为已逾期时发送提醒，如下例所示：


    ```

    If [ Invoice::Status = "Past Due" ]

    Perform Script ["Email Invoice Past Due" ]

    End If

    ```


    这可以扩展成一个`复合条件语句`，其中包含多个条件，每个条件调用不同的脚本。如果发票尚未发送，则运行一个脚本来发送它。如果状态是逾期或严重逾期，则分别发送提醒或警告。语句中未包含的其他状态则不发送任何内容。


    ```

    If [ Invoice::Status = "Unsent" ]

    Perform Script ["Email Invoice" ]

    Else If [ Invoice::Status = "Past Due" ]

    Perform Script ["Email Invoice Past Due" ]

    Else If [ Invoice::Status = "Delinquent" ]

    Perform Script ["Email Invoice Collection Warning" ]

    End If

    ```


    一个条件语句可以放置在另一个条件语句内部，从而创建一个`嵌套语句`。语句的层次结构可以根据需要变得复杂，以实现必要的目标。在这个例子中，第一个外部语句包含并控制基于状态字段执行两个内部复合语句中的哪一个。


    ```

    If [ Invoice::Status = "Past Due" ]

    If [ Invoice::Days Past > 15  ]

    Perform Script ["Email First Warning" ]

    Else If [ Invoice::Days Past > 30  ]

    Perform Script ["Email Second Warning" ]

    Else If [ Invoice::Days Past > 45  ]

    Perform Script ["Email Final Warning" ]

    End If

    Else If [ Invoice::Status = "Delinquent"]

    If [ Invoice::Days Delinquent > 15  ]

    Perform Script ["Email Collections Warning" ]

    Else If [ Invoice::Days Delinquent > 30  ]

    Perform Script ["Email Collections Notification" ]

    End If

    End If

    ```


    提示


    避免过度嵌套导致在滚动浏览步骤页面时难以跟踪脚本执行逻辑的情况。


    ## 显示自定义对话框


    `显示自定义对话框`步骤用于向用户显示一条消息，并且还可以请求向三个字段或变量输入内容。对话框可以显示信息性通知、警告用户某个问题、确认某个操作、提供操作选择、请求输入、提供说明等。将该步骤添加到脚本后，齿轮图标会打开`显示自定义对话框选项`对话框，该对话框有两个选项卡：`常规`和`输入字段`。

    '
- fmt: '### Configuring Dialog Properties


    The *General* tab of the *Show Custom Dialog Options* dialog, shown in Figure
    [25-11](#429700_2_En_25_Chapter.xhtml#Fig11), is used to configure the messaging
    properties of a custom dialog. The *Title* and *Message* fields can each receive
    static text typed directly or from a formula entered by clicking the corresponding
    *Specify* buttons. These produce the values that appear in the title bar and body
    of the dialog and should clearly convey a message or request an action.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig11_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig11_HTML.jpg)


    Figure 25-11


    The tab for configuring dialog properties (left) and an example dialog (right)


    Up to three button names can be defined for the custom dialog. These will appear
    in the dialog from right to left with the *Default Button* being highlighted as
    the default button which is responsive to the user typing the Enter key. If the
    current record has uncommitted changes at the time the dialog is presented, any
    buttons with the corresponding *Commit Data* checkbox enabled will cause the record
    to commit when a user clicks in the dialog. This is useful when the dialog requests
    information that is placed into fields.


    **Caution**


    Dialogs do not automatically resize, so lengthy messages may be obscured. Although
    users can resize, keep messages concise to avoid miscommunication.


    ### Configuring Dialog Input Fields


    A dialog can include up to three editable fields which are each linked to a target
    field or variable. This allows a dialog to present a request for input from the
    users and can be useful in numerous ways. A script can perform guided searches
    for specific fields, assist during record creation by prompting required input,
    require a key phrase to confirm a deletion action, and more. The *Input Fields*
    tab contains three sets of identical controls for this purpose, shown in Figure
    [25-12](#429700_2_En_25_Chapter.xhtml#Fig12).


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig12_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig12_HTML.jpg)


    Figure 25-12


    The tab for configuring input fields on a dialog


    To include a field in the dialog, enable the corresponding checkbox. Then click
    *Specify* to select a target field or variable. The target acts as both the *source*
    and *destination* of the text for that text area in the dialog. When the dialog
    opens, any value in the target will be displayed in the input field as a default
    value which the user can customize. Their entry in the dialog updates the target’s
    value which remains in place after the user dismisses the dialog.


    The *Use password character* checkbox will render the field in the dialog as an
    obscured value, with each character appearing as a bullet point. Like the similar
    layout setting for fields (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Concealed
    Edit Box”), this is a display feature only and does not alter or encrypt the text
    entered into the field. The value may still be visible on layouts unless the field
    is also configured to display as bullets. In any case, the script can access and
    manipulate the value like any other text string.


    The *Label* field allows a field label to appear above the field in the dialog.
    By default, the field will be present on the dialog without a label. Type a static
    text label or click *Specify* to generate a label with a formula.


    **Tip**


    When a dialog requires more than three button or field options, or needs other
    controls like pop-up menus or checkboxes, use the *New Window* step to generate
    a dialog window from a custom layout.


    ### Capturing a Dialog Button Click


    A dialog naturally pauses a script until a user clicks a button. Once a dialog
    is dismissed, the script can access the index position of the button that was
    clicked using the `Get(LastMessageChoice)` function. The number corresponds to
    the button’s configuration order, which will display from right to left on the
    dialog. This value can be used immediately or stored in a variable and used later
    in the workflow as shown in the example here:


    ```

    Show Custom Dialog [ "Choose" ; "Please choose a function" ]

    Set Variable [ $button ; Get ( LastMessageChoice )

    ```


    If there are three buttons defined – OK, Cancel, and Help – and the user clicks
    OK, the `$button` variable will be set to a value of 1. The following example
    shows a formula that can be used in the preceding `Set Variable` step to convert
    the numeric value into the button name using the `Choose` function.


    ```

    Let (

    number = Get ( LastMessageChoice )

    ;

    Choose ( number ; "" ; "OK" ; "Cancel" ; "Help" )

    )

    ```


    ### Creating a Related Record Using a Dialog


    As a practical example of dialog with input options, create a script that starts
    from a *Contact* record and walks through the creation of a *Company* record which
    is then assigned to the contact. The script will automatically carry out a sequence
    that would be burdensome for a user: switch layouts, create a new company record,
    enter company info, capture the id of the new record, return to the original layout,
    and enter the new id into the contact’s foreign key field for a company relationship.
    The exact order will change slightly for the scripted version. Instead of creating
    a record and entering data, a dialog will request the name for the new company
    in a variable and, if the user doesn’t cancel, continue with the record creation
    and assignment steps.


    ```

    Show Custom Dialog [ "Create a New Company" ; "Enter a name for the new company:"
    ; $name ]

    If [ Get ( LastMessageChoice ) = 2 ]

    Exit Script

    End If

    Freeze Window

    Go to Layout [ "Company" (Company) ; Animation: None ]

    New Record/Request

    Set Field [ Company::Company Name ; $name ]

    Set Variable [ $id ; Value: Company::Record ID ]

    Go to Layout [ original layout ; Animation: None ]

    Set Field [ Contact::Contact Company ID ; $id ]

    Commit Records/Requests [ With Dialog: Off ]

    ```


    Alternatively, if *Allow creation of records* (Chapter [9](#429700_2_En_9_Chapter.xhtml))
    is enabled for the *Company* side of the relationship, a single step dialog can
    request a name and push it into the related field, automatically creating the
    connection between the two.


    ```

    Show Custom Dialog [ "New Company" ; "Enter a name:" ; Contact | Company::Company
    Name ]

    ```


    ### Confirming a Dialog Field Value


    To avoid an empty field in the dialog, use a *Loop* statement to confirm a value
    before allowing the script to continue. When a user dismisses a dialog with a
    missing value, the script loops back, presenting the dialog again until the user
    either enters a value or clicks Cancel. The following example places the dialog’s
    prompt into a `$message` variable so it can change to a warning if subsequent
    loops are necessary. The `Show Custom Dialog` step is placed inside the *Loop*
    statement with an `Exit Loop If` step jumping out of the loop if the user cancels
    or if a name has been entered. If the `$name` variable is empty, the `$message`
    is modified to a more sternly phrased request before the loop repeats again. Once
    the user enters a name, then the script can continue to perform any other steps
    placed below these steps.


    ```

    Set Variable [ $message ; Value: "Enter a name for the new company:"  ]

    Loop

    Show Custom Dialog [ "Create a New Company" ; $message ; $name ]

    If [ Get ( LastMessageChoice ) = 2 ]

    Exit Script

    End If

    Exit Loop If [$name ≠ "" ]

    Beep

    Set Variable [ $message ; Value: "You MUST enter a name for the new company:"  ]

    End Loop

    ```'
