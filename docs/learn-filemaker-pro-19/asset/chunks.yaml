  trans: '

    #### 对话框 5：指定小计


    第五个报表对话框，如图 18-12 所示，仅当在第一个对话框中选中了`指定小计`复选框时才会出现。此功能允许添加一个或多个*汇总字段*，这些字段将显示在按选定字段分组的子摘要部分中的记录组上方或下方。


    通过点击`指定`按钮选择要包含的*汇总字段*。然后，可以从`要汇总的类别`弹出菜单中选择一个字段，该菜单列出了在第三个对话框中添加为报表类别的所有字段。`小计位置`弹出菜单用于指定小计相对于其正在汇总的记录组显示的位置：`记录组上方`、`记录组下方`或`上方和下方`。完成这些选择后，点击`添加小计`将字段插入到下方的列表中，然后重复此过程以添加其他字段。可以添加多个汇总以创建更健壮的汇总层次结构。


    对于我们正在进行的发票示例，`发票金额汇总`字段被添加为小计，将显示在记录组*下方*，并为`发票月份`和`发票年份`分别汇总一次，以便它们出现在两个子摘要部分中。可选地，可以重复此操作以同时包含`发票计数汇总`。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig12_HTML.jpg](img/429700_2_En_18_Fig12_HTML.jpg)


    图 18-12


    八个报表配置对话框中的第五个


    #### 对话框 6：指定总计


    第六个报表对话框，如图 18-13 所示，仅当在第一个对话框中选中了`指定总计`复选框时才会出现。其工作方式与前一个对话框类似，但使用汇总字段来显示报表中*所有记录*的总计。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig13_HTML.jpg](img/429700_2_En_18_Fig13_HTML.jpg)


    图 18-13


    八个报表配置对话框中的第六个


    通过点击`指定`按钮选择要包含的*汇总字段*。然后，从`总计位置`弹出菜单中选择一个选项，以指定总计相对于整个报表的位置：`报表开头`、`报表结尾`或`报表开头和结尾`。最后，点击`添加总计`将字段插入到下方的列表中，然后重复此过程以添加其他字段。


    在发票示例中，`发票金额汇总`字段都被添加为总计，并且应仅出现在报表末尾。可选地，可以重复此操作以同时包含`发票计数汇总`。


    #### 对话框 7：页眉和页脚信息


    第七个报表对话框，如图 18-14 所示，允许为将自动放置在布局上六个不同位置的标准信息插入可选占位符。每个弹出菜单都包含相同的选项：`页码`、`当前日期`、`布局名称`、`大自定义文本`、`小自定义文本`和`徽标`。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig14_HTML.jpg](img/429700_2_En_18_Fig14_HTML.jpg)


    图 18-14


    第七步用于选择标准的页眉和页脚信息


    #### 对话框 8：创建脚本


    第八个也是最后一个对话框提供了为新报表布局自动创建脚本的选项。如果没有脚本，用户需要*手动*执行查找、导航到报表布局、排序记录以及打印或预览报表。可以手动创建脚本来执行这些步骤（第
    24 章–28 章）。这最后一个对话框，如图 18-15 所示，提供了自动起步的便利。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig15_HTML.jpg](img/429700_2_En_18_Fig15_HTML.jpg)


    图 18-15


    第八个也是最后一个报表配置对话框


    点击`创建脚本`选项，并可选择覆盖默认的`脚本名称`。选中`自动运行脚本`复选框以分配一个`OnLayoutEnter`脚本触发器（第 27 章），该触发器将在用户导航到新布局时运行脚本。然后点击`完成`按钮以创建脚本并完成新布局和脚本的创建。


    所创建的脚本将包含两个或三个步骤，这些步骤会根据此过程中的其他选项自动配置。它将始终包含`进入浏览模式`和`转到布局`步骤。如果在第四个对话框中指定了排序字段，它将包含一个按所选字段`排序记录`的步骤。创建完成后，可以根据需要进一步自定义脚本。例如，按照配置，它假定报表应包含找到集中的每条记录。但是，可以添加一个步骤，以根据当前日期、周、月或年的上下文，或包括用户输入的任何其他条件，来查找一组记录。


    #### 优化报表布局


    创建报表布局后，通常需要清理和自定义。图 18-16 中的示例显示了基于前面示例中所选选项的布局。可以压缩各部分的高度以节省空间，并且背景、标签和字段的格式均基于主题，可能不合适，尤其是对于打印报表。如果包含徽标，可能需要调整其大小和位置。自动添加在顶部的正文字段的字段标签可以移动到正文正上方的子摘要中，以便它们直接在每组字段上方重复显示。此外，字段标签会自动显示字段的全名，可能会重叠并包含命名前缀，因此可能需要编辑。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig16_HTML.jpg](img/429700_2_En_18_Fig16_HTML.jpg)


    图 18-16


    自动创建的报表布局通常需要优化


    ### 复制现有布局


    为了节省时间并在布局之间保持一致性，可以考虑为典型的列表视图和表单视图设计一个模板，然后复制这些模板并根据其他表进行自定义。可以通过选择`布局 ➤ 复制布局`菜单来复制当前布局。此外，打开`管理布局`对话框，并使用其中的复制功能（请参阅本章后面的“使用管理布局对话框”）。新布局的名称将与原始布局相同，并附加“副本”字样。布局的所有其他方面（包括所有部分、主题、对象、格式、设置和分配的表事件）都将与原始布局相同。复制后，可以重命名新布局、将其分配给新的表事件，并根据需要进一步自定义。


    ## 配置布局设置


    `布局设置`对话框控制布局的行为、外观和功能。要打开此对话框，请进入布局模式，然后从布局菜单或工具栏中选择`布局设置`。该对话框分为四个选项卡：`常规`、`视图`、`打印`和`脚本触发器`。

    '
- fmt: '### General


    `General`选项卡位于`Layout Setup`对话框中，包含常规设置，如图18-17所示。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig17_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig17_HTML.jpg)


    图18-17


    第一个选项卡包含常规设置和选项。


    1. `Layout Name` – 编辑布局的名称。

    2. `Include in Layout Menus` – 启用后，布局将在`View`菜单和工具栏中作为可导航选项供用户使用。

    3. `Show Records from` – 选择布局上下文的表 occurrence。

    4. `Save Record Changes Automatically` – 控制当用户或脚本提交记录时是否自动保存字段更改。如果未选中，每次提交尝试后都会显示保存对话框。

    5. `Show Field Frames When Record Is Active` – 启用后，当记录处于活动状态时，每个字段上会显示特殊边框。

    6. `Delineate Fields on Current Record Only` – 启用后，仅当前记录上的字段会显示边框。使用此选项可避免在列表布局上造成干扰。

    7. `Show Current Record Indicator in List View` – 在列表视图中，当前记录左侧启用黑色条。应禁用此遗留元素，转而使用布局`Body`上的`Use
    active row state`，该功能允许对活动记录的对象进行样式驱动控制（第22章）。

    8. `Menu Set` – 为布局设置自定义菜单（第23章）。

    9. `Enable Quick Find` – 为布局启用`Quick Find`功能（第4章）。该按钮用于将所有字段重置为默认的`Quick Find`设置。


    ### Views


    `Layout Setup`对话框中的`Views`选项卡（如图18-18所示）包含三个复选框，用于控制哪些内容视图类型可供用户使用（第3章，“定义内容视图”）。`Properties`按钮打开`Table
    View Properties`对话框，其中的设置控制布局在浏览模式下以表格视图显示时的外观。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig18_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig18_HTML.jpg)


    图18-18


    第二个选项卡控制视图选项。


    ### Printing


    `Layout Setup`对话框中的`Printing`选项卡（如图18-19所示）控制打印布局时的列和页边距。不要与通过`File`菜单中的`Page
    Setup`和`Print`选项访问的打印和纸张大小设置混淆，此处设置侧重于布局的间距和列，控制可用于放置对象的可打印区域。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig19_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig19_HTML.jpg)


    图18-19


    第三个选项卡控制特定的布局打印选项。


    ### Script Triggers


    `Layout Setup`对话框中的`Script Triggers`选项卡用于将布局事件连接到脚本（第27章）。


    ## Using the Manage Layouts Dialog


    `Manage Layouts`对话框（如图18-20所示）用于重新排序布局、添加分隔线以及将布局分组到文件夹中。它还集成了所有管理功能，用于创建、查看、编辑、复制、删除和打开布局。通过工具栏中的`Layout`弹出菜单中的`Manage
    Layouts`选项，或选择`File ➤ Manage ➤ Layouts`菜单，打开此对话框。


    文件中的每个布局都会列出，包含布局名称、关联表以及菜单集列。可以通过拖拽重新排序布局或将其移入文件夹，文件夹通过`New`按钮附带的菜单创建。布局旁边的复选框指示它是否将成为用户的可导航选项。顶部有一个弹出菜单，可以快速将列表筛选为仅包含特定文件夹中的布局。菜单中的默认值（也是未定义文件夹时唯一的选项）是`Show
    All`。相邻的`Search`字段按关键字筛选列表。底部的按钮允许创建布局、文件夹或分隔线，以及编辑、复制、删除和打开布局。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig20_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig20_HTML.jpg)


    图18-20


    用于管理布局的对话框。


    **提示：** 文件夹可以按层次嵌套。此处定义的文件夹结构将在布局菜单中形成子菜单，使用户更容易手动导航复杂的数据库。


    ## Optimizing Layout Performance


    布局可以根据项目的需求设计得尽可能复杂。可以构建简单、流线型的视图，或图形丰富、复杂的界面。然而，请注意以下几点原则以确保高效性能：


    - 当同时显示多个记录时（如列表视图或门户中），尽量减少对象数量，特别是涉及复杂功能的对象，例如，大量关联字段或执行SQL查询的项会减慢大型列表的速度。

    - 在表单布局上，尽量减少高级控件（如门户和面板）的数量。

    - 将复杂布局拆分为多个较简单的布局，并提供导航按钮以便快速切换。

    - 尽量减少使用带有阴影、半透明颜色、渐变、大型导入图形等效果的对象。

    - 尽量减少字段中未存储计算的数量，尤其是在列表中。

    - 谨慎使用脚本触发器（第27章），避免将简单的界面事件与复杂脚本连接，以免产生较长的延迟时间，干扰用户的工作能力。

    - 使用主题和样式进行对象格式化（第22章）。


    ## Summary


    本章介绍了创建和配置布局的基础知识。在下一章中，我们将探讨用于构建和配置布局对象的控件。


    # 19. Exploring Layout Panes


    字段和对象的配置工具位于两个窗格中，一个集成在布局模式窗口的左侧，另一个集成在右侧：`Objects`窗格和`Inspector`窗格。这两个窗格在布局模式下默认可见，但在不需要时可以隐藏。在本章中，我们将探讨这两个窗格上的可用控件：


    - `Objects`窗格

    - `Inspector`窗格


    ## Exploring the Objects Pane


    `Objects`窗格是布局模式窗口左侧的一个集成区域，包含三个选项卡：`Fields`、`Objects`和`Add-ons`。可以通过单击工具栏中的`Show/Hide
    Pane`按钮或选择`View ➤ Objects`菜单中的项目来切换此窗格的可见性。'
  raw: '### General


    The *General* tab of the *Layout Setup* dialog contains general settings, as shown
    in Figure [18-17](#429700_2_En_18_Chapter.xhtml#Fig17).


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig17_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig17_HTML.jpg)


    Figure 18-17


    The first tab contains general settings and options


    1.  *Layout Name* – Edit the layout’s name.


    2.  *Include in Layout Menus* – Enable for the layout to be a navigable option
    for users in the View menu and toolbar.


    3.  *Show Records from* – Select an occurrence for the layout’s context.


    4.  *Save Record Changes Automatically* – Control if field changes are automatically
    saved when a user or script commits a record. If unchecked, a save dialog will
    be presented after each commit attempt.


    5.  *Show Field Frames When Record Is Active* – Enable to show special borders
    on every field when a record is active.


    6.  *Delineate Fields on Current Record Only* — Enable to cause only fields on
    the current record to have a border. Use this to avoid distraction on List layouts.


    7.  *Show Current Record Indicator in List View* – Enables a black bar on the
    left of the current record in a List view. This vestigial element should be disabled
    in favor of the *Use active row state* for the *Body* of a layout which allows
    style-driven control of objects for an active record (Chapter [22](#429700_2_En_22_Chapter.xhtml)).


    8.  *Menu Set* – Set custom menus for the layout (Chapter [23](#429700_2_En_23_Chapter.xhtml)).


    9.  *Enable Quick Find* – Enables the *Quick Find* feature (Chapter [4](#429700_2_En_4_Chapter.xhtml))
    for the layout. The button is used to reset all fields to their default *Quick
    Find* setting.


    ### Views


    The *Views* tab of the *Layout Setup* dialog, shown in Figure [18-18](#429700_2_En_18_Chapter.xhtml#Fig18),
    contains three checkboxes controlling which content view types are available to
    a user (Chapter [3](#429700_2_En_3_Chapter.xhtml), “Defining Content Views”).
    The *Properties* button opens the *Table View Properties* dialog of settings that
    control how a layout appears in Browse mode when viewed in Table view.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig18_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig18_HTML.jpg)


    Figure 18-18


    The second tab controls view options


    ### Printing


    The *Printing* tab of the *Layout Setup* dialog, shown in Figure [18-19](#429700_2_En_18_Chapter.xhtml#Fig19),
    controls columns and page margins when printing the layout. Not to be confused
    with print and paper size settings accessible through the *Page Setup* and *Print*
    options in the *File* menu, these focus on spacing and columns of the *layout*,
    controlling the available printable area in which to place objects.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig19_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig19_HTML.jpg)


    Figure 18-19


    The third tab controls specific layout print options


    ### Script Triggers


    The *Script Triggers* tab of the *Layout Setup* dialog is used to connect layout
    events to scripts (Chapter [27](#429700_2_En_27_Chapter.xhtml)).


    ## Using the Manage Layouts Dialog


    The *Manage Layouts* dialog, shown in Figure [18-20](#429700_2_En_18_Chapter.xhtml#Fig20),
    is used to reorder layouts, add separator lines, and group layouts into folders.
    It also integrates all management features used to *create*, *view*, *edit*, *duplicate*,
    *delete*, and *open* layouts. Open this dialog using the *Manage Layouts* option
    from the *Layout* pop-up menu in the toolbar or choosing the *File ➤ Manage ➤
    Layouts* menu.


    Every layout in the file will be listed with columns for *layout name*, *associated
    table,* and *menu set*. Layouts can be dragged to reorder or moved into folders,
    which are created using the menu attached to the *New* button. The checkbox next
    to a layout indicates if it will be a navigable option for users. Along the top,
    a pop-up menu quickly filters the list to only those layouts contained within
    a specific folder. The default value in the menu, and the only option when there
    are no folders defined, is *Show All*. The adjacent *Search* field filters the
    list by keyword. The buttons along the bottom allow creation of a layout, folder,
    or separator line as well as editing, duplicating, deleting, and opening layouts.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig20_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig20_HTML.jpg)


    Figure 18-20


    The dialog used to manage layouts


    Tip


    Folders can be nested hierarchically. The folder structure defined here forms
    submenus in the Layout menus, making it easier for users to manually navigate
    a complex database.


    ## Optimizing Layout Performance


    Layouts can be designed as complexly as required for your project. Build simple,
    streamlined views or graphically rich, complex interfaces. However, here are a
    few principles to be mindful of to help ensure efficient performance:


    *   When multiple records are displayed at once, as in a List view or portal,
    try to minimize the number of objects, especially those involving complex functionality,
    e.g., lots of related fields or items performing SQL queries will slow down large
    lists.


    *   On a Form layout, try to minimize the number of advanced controls such as
    portals and panels.


    *   Divide complex layouts into multiple less complex layouts, and provide navigation
    buttons to quickly toggle between them.


    *   Minimize the use of objects with shadows, semi-transparent colors, gradients,
    large imported graphics, etc.


    *   Minimize the number of unstored calculations in fields, especially in lists.


    *   Use script triggers (Chapter [27](#429700_2_En_27_Chapter.xhtml)) sparingly,
    and avoid connecting simple interface events with complex scripts that might create
    long lag times that interfere with a user’s ability to work.


    *   Use themes and styles for object formatting (Chapter [22](#429700_2_En_22_Chapter.xhtml)).


    ## Summary


    This chapter introduced the basics of creating and configuring layouts. In the
    next chapter, we will explore the controls used to construct and configure layout
    objects.


    # 19. Exploring Layout Panes


    Configuration tools for fields and objects are available in two panes, one integrated
    on either side of the window in Layout mode: an *Objects pane* and an *Inspector
    pane*. Both of these are visible by default in Layout mode but can be hidden when
    not required. In this chapter, we explore the controls available on these two
    panes:


    *   Objects pane


    *   Inspector pane


    ## Exploring the Objects Pane


    The *Objects* pane is an integrated region on the left side of a window in Layout
    mode that contains three tabs: *Fields*, *Objects,* and *Add-ons*. The visibility
    of this pane can be toggled using either clicking the *Show/Hide Pane* button
    in the toolbar or selecting an item from the *View ➤ Objects* menu.'
  trans: '

    ### 通用设置


    `General`选项卡位于`Layout Setup`对话框中，包含常规设置，如图 18-17 所示。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig17_HTML.jpg](img/429700_2_En_18_Fig17_HTML.jpg)


    图 18-17


    第一个选项卡包含常规设置和选项。


    1.  `Layout Name` – 编辑布局的名称。

    2.  `Include in Layout Menus` – 启用后，布局将在`View`菜单和工具栏中作为可导航选项供用户使用。

    3.  `Show Records from` – 选择布局上下文的表 occurrence。

    4.  `Save Record Changes Automatically` – 控制当用户或脚本提交记录时是否自动保存字段更改。如果未选中，每次提交尝试后都会显示保存对话框。

    5.  `Show Field Frames When Record Is Active` – 启用后，当记录处于活动状态时，每个字段上会显示特殊边框。

    6.  `Delineate Fields on Current Record Only` – 启用后，仅当前记录上的字段会显示边框。使用此选项可避免在列表布局上造成干扰。

    7.  `Show Current Record Indicator in List View` – 在列表视图中，当前记录左侧启用黑色条。应禁用此遗留元素，转而使用布局`Body`上的`Use
    active row state`，该功能允许对活动记录的对象进行样式驱动控制（第 22 章）。

    8.  `Menu Set` – 为布局设置自定义菜单（第 23 章）。

    9.  `Enable Quick Find` – 为布局启用`Quick Find`功能（第 4 章）。该按钮用于将所有字段重置为默认的`Quick Find`设置。


    ### 视图


    `Layout Setup`对话框中的`Views`选项卡（如图 18-18 所示）包含三个复选框，用于控制哪些内容视图类型可供用户使用（第 3 章，“定义内容视图”）。`Properties`按钮打开`Table
    View Properties`对话框，其中的设置控制布局在浏览模式下以表格视图显示时的外观。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig18_HTML.jpg](img/429700_2_En_18_Fig18_HTML.jpg)


    图 18-18


    第二个选项卡控制视图选项。


    ### 打印设置


    `Layout Setup`对话框中的`Printing`选项卡（如图 18-19 所示）控制打印布局时的列和页边距。不要与通过`File`菜单中的`Page
    Setup`和`Print`选项访问的打印和纸张大小设置混淆，此处设置侧重于布局的间距和列，控制可用于放置对象的可打印区域。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig19_HTML.jpg](img/429700_2_En_18_Fig19_HTML.jpg)


    图 18-19


    第三个选项卡控制特定的布局打印选项。


    ### 脚本触发器


    `Layout Setup`对话框中的`Script Triggers`选项卡用于将布局事件连接到脚本（第 27 章）。


    ## 使用布局管理对话框


    `Manage Layouts`对话框（如图 18-20 所示）用于重新排序布局、添加分隔线以及将布局分组到文件夹中。它还集成了所有管理功能，用于创建、查看、编辑、复制、删除和打开布局。通过工具栏中的`Layout`弹出菜单中的`Manage
    Layouts`选项，或选择`File ➤ Manage ➤ Layouts`菜单，打开此对话框。


    文件中的每个布局都会列出，包含布局名称、关联表以及菜单集列。可以通过拖拽重新排序布局或将其移入文件夹，文件夹通过`New`按钮附带的菜单创建。布局旁边的复选框指示它是否将成为用户的可导航选项。顶部有一个弹出菜单，可以快速将列表筛选为仅包含特定文件夹中的布局。菜单中的默认值（也是未定义文件夹时唯一的选项）是`Show
    All`。相邻的`Search`字段按关键字筛选列表。底部的按钮允许创建布局、文件夹或分隔线，以及编辑、复制、删除和打开布局。


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig20_HTML.jpg](img/429700_2_En_18_Fig20_HTML.jpg)


    图 18-20


    用于管理布局的对话框。


    **提示：** 文件夹可以按层次嵌套。此处定义的文件夹结构将在布局菜单中形成子菜单，使用户更容易手动导航复杂的数据库。


    ## 优化布局性能


    布局可以根据项目的需求设计得尽可能复杂。可以构建简单、流线型的视图，或图形丰富、复杂的界面。然而，请注意以下几点原则以确保高效性能：


    - 当同时显示多个记录时（如列表视图或门户中），尽量减少对象数量，特别是涉及复杂功能的对象，例如，大量关联字段或执行 SQL 查询的项会减慢大型列表的速度。

    - 在表单布局上，尽量减少高级控件（如门户和面板）的数量。

    - 将复杂布局拆分为多个较简单的布局，并提供导航按钮以便快速切换。

    - 尽量减少使用带有阴影、半透明颜色、渐变、大型导入图形等效果的对象。

    - 尽量减少字段中未存储计算的数量，尤其是在列表中。

    - 谨慎使用脚本触发器（第 27 章），避免将简单的界面事件与复杂脚本连接，以免产生较长的延迟时间，干扰用户的工作能力。

    - 使用主题和样式进行对象格式化（第 22 章）。


    ## 总结


    本章介绍了创建和配置布局的基础知识。在下一章中，我们将探讨用于构建和配置布局对象的控件。


    # 19. 探索布局窗格


    字段和对象的配置工具位于两个窗格中，一个集成在布局模式窗口的左侧，另一个集成在右侧：`Objects`窗格和`Inspector`窗格。这两个窗格在布局模式下默认可见，但在不需要时可以隐藏。在本章中，我们将探讨这两个窗格上的可用控件：


    - `Objects`窗格

    - `Inspector`窗格


    ## 探索对象窗格


    `Objects`窗格是布局模式窗口左侧的一个集成区域，包含三个选项卡：`Fields`、`Objects`和`Add-ons`。可以通过单击工具栏中的`Show/Hide
    Pane`按钮或选择`View ➤ Objects`菜单中的项目来切换此窗格的可见性。

