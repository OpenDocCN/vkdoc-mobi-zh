    ### 使用基于值的条件


    *基于值的条件*通过选定的运算符将对象的值与静态条件进行比较，从而确定何时应用格式，如图 21-18 所示。在“条件格式”对话框的“*条件*”部分，从第一个菜单中选择“*值为*”，然后从第二个菜单中选择一个运算符。根据您的选择，右侧将出现一个或多个文本框，可在其中插入静态值以构成条件标准。例如，如果“*状态*”字段的值*等于*“紧急”，或者“*总价*”字段的值*小于*零，则字段文本可以变为红色并加粗。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig18_HTML.jpg](img/429700_2_En_21_Fig18_HTML.jpg)


    图 21-18 — 基于值的条件的选项


    ### 使用基于公式的条件


    *基于公式的条件*通过计算自定义公式并在结果为真时应用样式，来确定何时应用格式。在“条件格式”对话框的“*条件*”部分，从第一个菜单中选择“*公式为*”，如图
    21-19 所示。然后，直接在字段中输入公式，或单击“*指定*”按钮打开“*指定计算*”对话框（第 12 章）。该公式可以使用内置函数、自定义函数和字段的任意组合来定义应用格式的条件。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig19_HTML.jpg](img/429700_2_En_21_Fig19_HTML.jpg)


    图 21-19 — 基于公式的条件的界面


    ### 对项目状态字段进行条件格式设置


    为了说明条件格式的用途，请考虑一个示例，其中“*状态*”字段的值控制列表中其自身和其他字段的格式，如图 21-20 所示。通过为每个字段定义两个条件，当状态为“活动”时，它们会被条件格式设置为粗体；当状态为“暂停”时，则会变为灰色。状态为“待处理”的记录保持不变，使用默认布局格式。结果是三个格式层级，可以直观地强调记录的紧急程度。请记住，这些格式更改是叠加在通过“*检查器*”窗格设置的字段默认格式之上的。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig20_HTML.jpg](img/429700_2_En_21_Fig20_HTML.jpg)


    图 21-20 — 列表中基于记录状态进行条件格式设置的字段示例


    在此示例中，“*项目状态*”字段被分配了一个包含三个值的值列表：*活动*、*待处理*和*暂停*。由于此字段将根据其自身值进行条件格式设置，因此可以配置两个*基于值的条件*，如图
    21-21 所示。当值等于“Active”时，应用粗体格式；当值等于“Hold”时，将文本颜色设置为浅灰色。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig21_HTML.jpg](img/429700_2_En_21_Fig21_HTML.jpg)


    图 21-21 — 已定义的状态字段使用基于值的条件


    列表视图中的其他两个字段需要各自配置*基于公式的条件*，因为它们需要查看另一个字段的值（状态字段）来确定其格式。格式设置相同，但具体的条件公式不同，如图 21-22
    中“*公司名称*”字段所示。此处的公式在“*项目状态*”字段中查找“Active”或“Hold”，然后应用格式。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig22_HTML.jpg](img/429700_2_En_21_Fig22_HTML.jpg)


    图 21-22 — 列表视图中其他字段的公式驱动条件


    ## 了解 Tab 键顺序


    布局的*Tab 键顺序*定义了当用户按下`Tab`键或为对象定义的其他退出字段键（第 19 章，“行为”）时，从一个对象切换到另一个对象的焦点优先顺序。这使得用户能够仅使用键盘，从一个字段“跳转”到另一个字段，再到对象，再到字段等。默认顺序是从左到右、从上到下遍历所有可以接收焦点的对象。然而，当对象在布局上移动或稍后添加时，需要重置
    Tab 键顺序，以避免焦点随意来回跳动。设置自定义顺序时，可以排除不需要数据输入的对象，如计算字段或按钮。


    ### 更改 Tab 键顺序


    在布局模式下，选择“*布局* ➤ *设置 Tab 键顺序*”菜单，将布局置于*Tab 键顺序编辑模式*，如图 21-23 所示。每个能够接收焦点的对象一侧都会附加一个箭头图标。这些箭头包含对象的当前
    Tab 键顺序编号，并且是可编辑的文本框。删除对象的编号可将其从 Tab 键顺序中移除。单击空白箭头内部可自动分配 Tab 键顺序中的下一个可用编号，和/或通过直接键入来编辑编号。`FileMaker`
    通过在某处键入对象的已分配编号时自动更改该对象的值，来强制实施唯一的编号序列。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig23_HTML.jpg](img/429700_2_En_21_Fig23_HTML.jpg)


    图 21-23 — 处于 Tab 键编辑模式的窗口具有可自定义顺序的箭头字段


    ### 使用“设置 Tab 键顺序”对话框的功能


    当布局进入 Tab 键编辑模式时，图 21-24 所示的“*设置 Tab 键顺序*”对话框会自动打开。此对话框用于执行批量 Tab 键顺序功能，并退出返回到常规布局模式。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig24_HTML.jpg](img/429700_2_En_21_Fig24_HTML.jpg)


    图 21-24 — 用于控制批量 Tab 键顺序功能的对话框


    1.  *添加剩余* – 通过在菜单中选择一个选项（*对象*、*仅字段*和*仅按钮*）来为未分配的对象添加默认顺序。然后点击“*添加*”按钮。

    2.  *移除* – 通过在菜单中选择一个选项（*所有字段*或*所有按钮*）来从 Tab 键顺序中移除对象。然后点击“*移除*”按钮。

    3.  *全部清除* – 删除布局上所有对象的 Tab 键顺序，为重新分配提供一个干净的状态。


    > **提示：** 在布局上移动任何对象后，请始终返回浏览模式，并点击浏览各字段以确认 Tab 键顺序符合预期。

