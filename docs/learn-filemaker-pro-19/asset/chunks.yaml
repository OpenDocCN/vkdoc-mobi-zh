  trans: '

    ### 控制文件大小


    添加到数据库中的每一项内容都会增加文件体积。创建新表、字段、布局和脚本会增加文件大小；录入成百上千乃至数百万条记录也会增加文件大小；包含大量文本的索引字段以及插入了大文件的容器字段同样会增大文件体积。这是一个自然过程，通常不会立即造成问题，尤其是因为
    FileMaker 将数据库大小限制为可用磁盘空间容量，技术上限为 8 TB。不过，遵循“少即是多”的原则，设计一个在结构和内容上都尽可能高效的数据库，仍然是一个好主意。结构设计庞大而复杂的文件可能会运行缓慢、让开发者感到困惑，并且容易引发其他问题。有两个主要问题会使文件体积超出必要：*低效的设计*和*碎片化*。


    #### 进行高效设计


    保持文件小巧并确保运行高效的一种方法就是进行高效设计。尽管设计方法众多，且这些主题将在后续章节中讨论，但越早考虑高效设计越好。


    当*容器字段*在内部存储图像或文件时，数据库大小会增加所存储内容的大小。显然，当存储成百上千张大图时，这会对文件体积产生巨大影响。如果数据库托管在服务器上或用于本地环境，但无需成为独立文件，则推荐使用*外部容器存储*（第
    10 章）。该方法将文件存储在数据库文件之外，同时像内部存储一样渲染它们，用户甚至不会察觉到差异，从而大大减小文件体积。


    另一个会迅速增大文件体积的因素是字段索引，尤其是在冗长的备注字段上。索引对于某些功能很重要，不应完全避免。但是，应尽可能减少字段索引（第 8 章，“字段选项：存储”）。


    保持数据库精简的另一种方法是使用更精细的结构和界面设计，以避免表、布局和脚本中的冗余。设计*开放、动态的资源*，使其能够更广泛地使用，并具备可变的功能特性。可以将一个常用公式或一组相似的公式移至单个自定义函数中（第
    15 章），以避免重复编写相同代码。一个用于存储与*联系人*记录相关笔记的表和一个用于存储与*项目*记录相关笔记的表可以合并。布局可以设计成提供全局功能，通过附加到主窗口的卡片窗口从任何位置访问（第
    25 章，“管理窗口”）。脚本可以设计成接受参数、灵活处理不同信息，并在单一操作功能上执行多种变体。


    图形丰富的界面设计可以改善用户体验，但也会增加文件体积以及加载和绘制布局所需的时间。因此，要在视觉惊艳的展示与实用高效的设计之间找到平衡。尽可能使用 FileMaker
    内置的布局对象，而非自定义图形。当使用自定义图标时，将其作为 SVG 文件导入到文件的图标库中（第 20 章，“使用图标标签”）。任何直接放置在布局上的自定义图形都应针对屏幕使用进行优化，使用较低分辨率，尤其当它们不在打印布局上时。


    值得一提的是，应避免采用整体式的中心辐射型关系结构，而应优先考虑表出现组设计（第 9 章，“使用表出现”）。虽然复杂的关系设置主要会导致性能问题，但也可能使开发者陷入困境，从而难以在公式、布局和脚本中进行更好的设计。请记住，某些领域的低效设计看似无害，却可能在其他地方产生负面连锁反应。始终追求最佳的结构和界面设计。


    最后，尽管会创建更复杂的整体结构，但将表分散到多个文件中有助于减小每个文件的体积。有多种方法可以通过混合搭配不同方式来实现，这在第 1 章中简要描述。例如，可以使用*数据分离模型*，其中一个或多个文件提供一个占用空间小的前端界面，与存储在一个或多个独立专用数据文件中的表内容进行交互，这些数据文件充当传统的后端数据源。这使得记录内容可以分布在一个或多个较小的文件中，同时仍能保持单一、统一的界面。


    #### 避免碎片化


    随着在常规数据录入过程中创建和删除记录，文件内部会积累空余空间。当开发者添加和移除资源时，也会发生这种情况。久而久之，这会人为地增大文件体积，并可能影响性能和稳定性。将文件保存为压缩副本（本章后面会介绍）可以安全地重建文件，将尽可能多的数据填入每个块中，通过移除空“幽灵”块来回收未使用的空间，从而消除膨胀。


    ### 避免文件损坏


    任何数字文件都可能损坏。由于数据库通常通过网络被多个用户同时访问，并且持续进行磁盘读写操作，因此它们更加脆弱，数据丢失的风险也更高。开发者应该了解可能导致损坏的原因、如何避免损坏、检测损坏的方法以及正确的修复方式。损坏的范围可能从最初被忽视的小问题，到灾难性的无法打开文件。


    在排除其他原因之前，有许多症状可能看起来像是文件损坏。如果某个字段显示问号而不是数据，但并非计算返回了错误的数据类型，也不是布局上字段宽度太小无法容纳内容所致，则可能是损坏的迹象。记录丢失或显示为空白可能表明存在损坏。但是，在确认这不是错误的已找到记录集、布局格式问题或意外删除记录的结果之前，不要惊慌。此外，如果通过调整设置或重新创建索引无法解决，不正确的搜索结果可能表明索引损坏。脚本设计不当、用户经验不足、关系断裂以及网络问题都可能造成被误认为是损坏的情况。


    其他症状则明确表明存在损坏。打开数据库时执行一致性检查，表明文件未正确关闭，可能存在损坏。如果这种情况在没有崩溃事件或强制退出的情况下随机发生，则可能表明存在持续性的损坏。在数据库中工作时，FileMaker
    应用程序随机崩溃可能是操作系统或网络问题，但也可能表明数据库存在损坏。最后，有时对话框会直接提示文件已损坏、无法打开或应进行恢复。


    避免文件损坏的最佳方法是通过网络正确共享、确保文件正确关闭，并维护好硬件和软件。

    '
- fmt: "# Share Properly\n\nWhen sharing a database with others, *never place it in\
    \ a directory that can be accessed by more than one person at a time*. This includes\
    \ a folder on a file server or any type of cloud storage, e.g., Dropbox, Google\
    \ Drive, etc. Two users opening the same database file directly from a folder\
    \ will guarantee a corrupt file. Instead, use FileMaker’s *peer-to-peer sharing,*\
    \ or host the file on a *FileMaker Server* to ensure proper multi-user read/write\
    \ management and greater protection from user crashes (Chapter [29](#429700_2_En_29_Chapter.xhtml)).\n\
    \n# Close Files Properly\n\nMost file damage occurs when a database was improperly\
    \ closed. This can result in the loss of data, corrupted data, and/or structural\
    \ flaws. The proper close method is to close all database windows or to quit the\
    \ FileMaker application by selected the *File ➤ Quit Application* menu. Some ways\
    \ a database may be *improperly closed* include:\n\n*   Computer power is interrupted,\
    \ resulting in abrupt shutdown of an open database.\n*   A system-wide crash that\
    \ also crashes FileMaker.\n*   A glitch that causes FileMaker to unexpectedly\
    \ quit.\n*   If the network connection is dropped as it is when the user’s computer\
    \ goes to sleep while a hosted database is open.\n*   A hasty force quit of the\
    \ application with databases open when a user mistakes a spinning cursor during\
    \ a lengthy script process for a crash.\n*   A force quit is required to stop\
    \ a faulty script endlessly looping with abort capability turned off.\n*   Trying\
    \ to open or make a copy of a live database actively hosted by *FileMaker Server*.\n\
    \n**Tip**  \nDatabases hosted on a FileMaker Server (Chapter [29](#429700_2_En_29_Chapter.xhtml))\
    \ are cushioned from user computer crashes and force quit damage. Files run locally\
    \ are more vulnerable.\n\n# Maintain Hardware and Software\n\nAlways maintain\
    \ stable and up-to-date hardware and software, paying close attention to these\
    \ details:\n\n*   Don’t rush to upgrade anything. Perform extensive testing on\
    \ a safe *copy* of your database prior to upgrading hardware or software.\n* \
    \  Keep host and user operating systems up to date.\n*   Keep the FileMaker application\
    \ up to date, including all interim bug fix releases.\n*   Use an adequate uninterruptable\
    \ power supply and surge protector on all computers to avoid sudden shutdowns\
    \ in the event of a power loss, especially a database host server.\n*   Run regular\
    \ hardware maintenance using a disk utility program, and don’t let computers get\
    \ outdated to the point of risking failure.\n*   Don’t allow the disk of a host\
    \ computer to run out of space.\n*   Use fast hardware and networking equipment\
    \ with adequate cabling.\n*   Perform regular database maintenance.\n\n**Tip**\
    \  \nConsider using FileMaker Cloud which handles most hardware and software maintenance\
    \ functions automatically.\n\n# Exploring Maintenance Functions\n\nThere are several\
    \ functions that can help maintain database integrity and troubleshoot file damage.\
    \ Each must be performed *locally,* so files hosted on a network must be taken\
    \ offline and manipulated directly in a copy of the *FileMaker Pro* desktop application.\
    \ These functions are *Save a copy as*, *Consistency check,* and *Recover*.\n\n\
    **Tip**  \nAlways make regular backups of your databases, and preserve an extra\
    \ development copy of major structural changes. If damage occurs, the safest action\
    \ is to revert to a recent backup or recover data from the damaged file and import\
    \ it into a reliable backup.\n\n## Saving a Copy As\n\nThe *Save a Copy As* function,\
    \ accessible under the *File* menu, will create a new copy of the open database\
    \ as one of these four types selectable in the save file dialog: `Copy`, `Compacted`,\
    \ `Clone`, or `Self-Contained`.\n\nThe `Copy of current file` option saves the\
    \ database as an identical copy of itself without any changes. This is identical\
    \ to the `Save As` function in most applications and can also be done by duplicating\
    \ a closed file using the operating system file duplication command. It doesn’t\
    \ have any diagnostic function; it simply makes a copy.\n\nThe `Compacted copy\
    \ (smaller)` option saves an optimized copy of the database with empty space removed,\
    \ resulting in a smaller file size. Used periodically, this can maintain the health\
    \ of a file, especially if a lot of content is deleted from a file or lots of\
    \ structural changes have occurred.\n\nThe `Clone (no records)` option saves a\
    \ copy of the database’s *structure only*. This will include tables, fields, relationships,\
    \ page setup options, field definitions, custom functions, layouts, scripts, and\
    \ more, *without any records*. This can be used when troubleshooting a problem\
    \ as it quickly isolates a file’s structure from its content.\n\nThe `Self-contained\
    \ copy (single file)` option saves a copy with external container data (Chapter\
    \ [10](#429700_2_En_10_Chapter.xhtml)) embedded in the file’s container fields,\
    \ making it fully self-contained.\n\n## Performing a Consistency Check\n\nA *consistency\
    \ check* will read every block that makes up a file, verify the internal structure\
    \ of each block, and confirm it is properly linked to other blocks. This process\
    \ does not read the data within blocks, check the file schema, or check higher-level\
    \ structures; these functions are only performed by the full *Recover* process.\
    \ Each time a database opens, FileMaker checks the file and automatically performs\
    \ a consistency check if it detects that the file has been improperly closed.\
    \ A manual consistency check can be performed on any closed file as a troubleshooting\
    \ step when damage is suspected. Launch the *FileMaker Pro* application, and select\
    \ the *File ➤ Recover* menu. In the file selection dialog, shown in Figure [6-18](#429700_2_En_6_Chapter.xhtml#Fig18),\
    \ select the file suspected of damage. Instead of clicking the `Select` button,\
    \ which would begin the full *Recover* process, click the `Check Consistency`\
    \ button.\n\n![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig18_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig18_HTML.jpg)\n\
    \nFigure 6-18  \nUse the check consistency button instead of performing a full\
    \ recovery\n\nFileMaker will immediately check the file and report the results\
    \ in both a dialog and `Recover.log` file. If no problems have been reported,\
    \ the file is probably safe to continue using. If damage is reported, it may recommend\
    \ performing the recovery process. After the consistency check is complete, the\
    \ file selection dialog remains open so you can choose to recover the file, perform\
    \ a consistency check on a different file, or cancel."
  raw: '#### Share Properly


    When sharing a database with others, *never place it in a directory that can be
    accessed by more than one person at a time*. This includes a folder on a file
    server or any type of cloud storage, e.g., Dropbox, Google Drive, etc. Two users
    opening the same database file directly from a folder will guarantee a corrupt
    file. Instead, use FileMaker’s *peer-to-peer sharing,* or host the file on a *FileMaker
    Server* to ensure proper multi-user read/write management and greater protection
    from user crashes (Chapter [29](#429700_2_En_29_Chapter.xhtml)).


    #### Close Files Properly


    Most file damage occurs when a database was improperly closed. This can result
    in the loss of data, corrupted data, and/or structural flaws. The proper close
    method is to close all database windows or to quit the FileMaker application by
    selected the *File ➤ Quit Application* menu. Some ways a database may be *improperly
    closed* include


    *   Computer power is interrupted, resulting in abrupt shutdown of an open database.


    *   A system-wide crash that also crashes FileMaker.


    *   A glitch that causes FileMaker to unexpectedly quit.


    *   If the network connection is dropped as it is when the user’s computer goes
    to sleep while a hosted database is open.


    *   A hasty force quit of the application with databases open when a user mistakes
    a spinning cursor during a lengthy script process for a crash.


    *   A force quit is required to stop a faulty script endlessly looping with abort
    capability turned off.


    *   Trying to open or make a copy of a live database actively hosted by *FileMaker
    Server*.


    Tip


    Databases hosted on a FileMaker Server (Chapter [29](#429700_2_En_29_Chapter.xhtml))
    are cushioned from user computer crashes and force quit damage. Files run locally
    are more vulnerable.


    #### Maintain Hardware and Software


    Always maintain stable and up-to-date hardware and software, paying close attention
    to these details:


    *   Don’t rush to upgrade anything. Perform extensive testing on a safe *copy*
    of your database prior to upgrading hardware or software.


    *   Keep host and user operating systems up to date.


    *   Keep the FileMaker application up to date, including all interim bug fix releases.


    *   Use an adequate uninterruptable power supply and surge protector on all computers
    to avoid sudden shutdowns in the event of a power loss, especially a database
    host server.


    *   Run regular hardware maintenance using a disk utility program, and don’t let
    computers get outdated to the point of risking failure.


    *   Don’t allow the disk of a host computer to run out of space.


    *   Use fast hardware and networking equipment with adequate cabling.


    *   Perform regular database maintenance.


    Tip


    Consider using FileMaker Cloud which handles most hardware and software maintenance
    functions automatically.


    ### Exploring Maintenance Functions


    There are several functions that can help maintain database integrity and troubleshoot
    file damage. Each must be performed *locally,* so files hosted on a network must
    be taken offline and manipulated directly in a copy of the *FileMaker Pro* desktop
    application. These functions are *Save a copy as*, *Consistency check,* and *Recover*.


    Tip


    Always make regular backups of your databases, and preserve an extra development
    copy of major structural changes. If damage occurs, the safest action is to revert
    to a recent backup or recover data from the damaged file and import it into a
    reliable backup.


    #### Saving a Copy As


    The *Save a Copy As* function, accessible under the *File* menu, will create a
    new copy of the open database as one of these four types selectable in the save
    file dialog: *Copy*, *Compacted*, *Clone*, or *Self-Contained*.


    The *Copy of current file* option saves the database as an identical copy of itself
    without any changes. This is identical to the *Save As* function in most applications
    and can also be done by duplicating a closed file using the operating system file
    duplication command. It doesn’t have any diagnostic function; it simply makes
    a copy.


    The *Compacted copy (smaller)* option saves an optimized copy of the database
    with empty space removed, resulting in a smaller file size. Used periodically,
    this can maintain the health of a file, especially if a lot of content is deleted
    from a file or lots of structural changes have occurred.


    The *Clone (no records)* option saves a copy of the database’s *structure only*.
    This will include tables, fields, relationships, page setup options, field definitions,
    custom functions, layouts, scripts, and more, *without any records*. This can
    be used when troubleshooting a problem as it quickly isolates a file’s structure
    from its content.


    The *Self-contained copy (single file)* option saves a copy with external container
    data (Chapter [10](#429700_2_En_10_Chapter.xhtml)) embedded in the file’s container
    fields, making it fully self-contained.


    #### Performing a Consistency Check


    A *consistency check* will read every block that makes up a file, verify the internal
    structure of each block, and confirm it is properly linked to other blocks. This
    process does not read the data within blocks, check the file schema, or check
    higher-level structures; these functions are only performed by the full *Recover*
    process. Each time a database opens, FileMaker checks the file and automatically
    performs a consistency check if it detects that the file has been improperly closed.
    A manual consistency check can be performed on any closed file as a troubleshooting
    step when damage is suspected. Launch the *FileMaker Pro* application, and select
    the *File ➤ Recover* menu. In the file selection dialog, shown in Figure [6-18](#429700_2_En_6_Chapter.xhtml#Fig18),
    select the file suspected of damage. Instead of clicking the *Select* button,
    which would begin the full *Recover* process, click the *Check Consistency* button.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig18_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Use the check consistency button instead of performing a full recovery


    FileMaker will immediately check the file and report the results in both a dialog
    and *Recover.log* file. If no problems have been reported, the file is probably
    safe to continue using. If damage is reported, it may recommend performing the
    recovery process. After the consistency check is complete, the file selection
    dialog remains open so you can choose to recover the file, perform a consistency
    check on a different file, or cancel.'
  trans: "\n# 正确共享\n\n与他人共享数据库时，*切勿将其放在可同时被多人访问的目录中*。这包括文件服务器上的文件夹或任何类型的云存储（例如 Dropbox、Google\
    \ Drive 等）。两个用户直接从文件夹打开同一数据库文件必定会导致文件损坏。应改用 FileMaker 的*点对点共享*，或将文件托管在 *FileMaker\
    \ Server* 上，以确保正确的多用户读写管理，并更好地防止用户崩溃（参见第 29 章）。\n\n# 正确关闭文件\n\n大多数文件损坏发生在数据库被错误关闭时。这可能导致数据丢失、数据损坏和/或结构缺陷。正确的关闭方法是关闭所有数据库窗口，或通过选择\
    \ *文件 ➤ 退出程序* 菜单来退出 FileMaker 应用程序。数据库可能被*错误关闭*的几种方式包括：\n\n*   计算机电源中断，导致打开的数据库意外关闭。\n\
    *   系统级崩溃，同时也导致 FileMaker 崩溃。\n*   导致 FileMaker 意外退出的故障。\n*   当用户计算机进入休眠状态而托管的数据库仍打开时，网络连接断开。\n\
    *   在长时间脚本过程中，用户误将旋转的光标当作崩溃，从而仓促强制退出仍有数据库打开的程序。\n*   为停止一个关闭了中止功能的、有缺陷的无限循环脚本而需要强制退出。\n\
    *   尝试打开或复制由 *FileMaker Server* 主动托管的实时数据库。\n\n**提示**  \n托管在 FileMaker Server（第\
    \ 29 章）上的数据库可免受用户计算机崩溃和强制退出导致的损坏。本地运行的文件则更容易受损。\n\n# 维护硬件和软件\n\n始终保持稳定且最新的硬件和软件，并密切关注以下细节：\n\
    \n*   不要急于升级任何东西。在升级硬件或软件之前，先在数据库的*安全副本*上进行全面测试。\n*   保持主机和用户操作系统为最新版本。\n*   保持\
    \ FileMaker 应用程序为最新版本，包括所有临时的错误修复版本。\n*   在所有计算机上使用足够的不间断电源和电涌保护器，以防断电时发生意外关机，尤其是数据库主机服务器。\n\
    *   使用磁盘工具程序定期进行硬件维护，不要让计算机过时到有故障风险的地步。\n*   不要让主机计算机的磁盘空间耗尽。\n*   使用配备合适线缆的快速硬件和网络设备。\n\
    *   定期进行数据库维护。\n\n**提示**  \n考虑使用 FileMaker Cloud，它会自动处理大多数硬件和软件维护功能。\n\n# 探索维护功能\n\
    \n有几个功能有助于维护数据库完整性并排查文件损坏问题。每个功能都必须在*本地*执行，因此网络上托管的文件必须离线，并直接在 *FileMaker Pro*\
    \ 桌面应用程序的副本中操作。这些功能包括*另存为副本*、*一致性检查*和*恢复*。\n\n**提示**  \n请始终定期备份数据库，并为主结构更改保留一份额外的开发副本。如果发生损坏，最安全的做法是恢复到最近的备份，或从损坏文件中恢复数据并将其导入到可靠的备份中。\n\
    \n## 另存为副本\n\n*文件*菜单下的*另存为副本*功能会将打开的数据库创建为一个新副本，可在保存文件对话框中选择以下四种类型之一：`副本`、`压缩副本`、`克隆副本`\
    \ 或 `自包含副本`。\n\n`当前文件的副本`选项将数据库保存为其自身的相同副本，不做任何更改。这与大多数应用程序中的`另存为`功能相同，也可以通过使用操作系统文件复制命令复制一个已关闭的文件来实现。它没有任何诊断功能；只是制作了一个副本。\n\
    \n`压缩副本（较小）`选项会保存数据库的优化副本，移除空白空间，从而得到更小的文件大小。定期使用此选项可以维护文件的健康状态，尤其是当文件中删除了大量内容或发生了许多结构更改时。\n\
    \n`克隆副本（无记录）`选项仅保存数据库的*结构*副本。这将包括表、字段、关系、页面设置选项、字段定义、自定义函数、布局、脚本等，但*不包含任何记录*。当排查问题时，这可以快速将文件的结构与其内容分离开来。\n\
    \n`自包含副本（单文件）`选项会保存一个副本，其中外部容器数据（第 10 章）嵌入在文件的容器字段中，使其完全自包含。\n\n## 执行一致性检查\n\n\
    *一致性检查*会读取构成文件的每一个块，验证每个块的内部结构，并确认它与其他块正确链接。此过程不读取块内的数据、不检查文件模式，也不检查更高级别的结构；这些功能仅由完整的*恢复*过程执行。每次数据库打开时，FileMaker\
    \ 都会检查文件，如果检测到文件被错误关闭，则会自动执行一致性检查。当怀疑文件损坏时，可以手动对任何已关闭的文件执行一致性检查，以作为排查步骤。启动 *FileMaker\
    \ Pro* 应用程序，然后选择 *文件 ➤ 恢复* 菜单。在如图 6-18 所示的文件选择对话框中，选择怀疑已损坏的文件。不要单击会启动完整*恢复*过程的`选择`按钮，而是单击`检查一致性`按钮。\n\
    \n![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig18_HTML.jpg](img/429700_2_En_6_Fig18_HTML.jpg)\n\
    \n图 6-18  \n使用检查一致性按钮，而不是执行完整恢复\n\nFileMaker 将立即检查文件，并在对话框和 `Recover.log` 文件中报告结果。如果未报告任何问题，则该文件可能可以安全地继续使用。如果报告了损坏，它可能会建议执行恢复过程。一致性检查完成后，文件选择对话框将保持打开状态，以便您可以选择恢复文件、对另一个文件执行一致性检查或取消。\n"
- fmt: '#### Recovering a File


    When a database is damaged or acting buggy, the `Recover` function can be used
    to rebuild a new copy of the file and regain access to its contents. This process
    is aggressive and will do whatever is necessary to restore access to a file. It
    will rebuild the file block by block and attempt to correct any corruption. However,
    if an object can’t be repaired, it may be deleted. Because of its aggressive nature,
    the function should be used a diagnostic or recovery tool and not for regular
    maintenance. To perform the recovery process, launch the FileMaker Pro application,
    and select the `File ➤ Recover` menu. In the file selection dialog, locate the
    damaged file, and click the `Select` button. In the `Save` dialog, enter a name
    and select a save location for the new recovered copy of the file, and optionally
    specify advanced options (described in the next section). Then click `Save` to
    begin the recovery process.


    FileMaker will rebuild the file to the specified save location and report the
    results. Based on the information provided, you can determine if the recovered
    copy of the file is safe for use or if you should transfer the content into a
    previously saved backup copy. If no stable backup is available, it is possible
    to meticulously review the recovery log to see what type of structural objects
    are reported as corrupt and then systematically delete resources and repeat the
    recovery process over and over until you isolate the corrupt resources. Then,
    each corrupted item can be deleted and recreated in the original file and the
    process repeated until the recovery process reports the file has no problems.
    However, preserving safe backups is the best practice.


    ### Advanced Recovery Options


    The `Advanced Recover Options` dialog, shown in Figure [6-19](#429700_2_En_6_Chapter.xhtml#Fig19),
    controls how a recovery is performed.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig19_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig19_HTML.jpg)


    Figure 6-19


    The advanced options for recovery a file


    The `Generate new file` section controls which of three ways a new file will be
    created during the recovery process. Select `Copy file blocks as-is` to copy all
    file blocks exactly as they exist in the source file. The resulting file may still
    include damaged blocks. This is the equivalent of just saving a copy of the current
    file. The `Copy logical structure (same as Compacted Copy)` will copy all data
    in the source file without checking the blocks, but it will rebuild the tree structure.
    The resulting file may still include damaged blocks. This is the equivalent of
    saving a compacted copy of the current file. Finally, select `Scan blocks and
    rebuild file (drop invalid blocks)` to completely rebuild the file, including
    only undamaged and non-duplicate blocks. The resulting file may be structurally
    unsound and may only be suitable for data extraction into a reliable backup copy.
    This is the full recovery process. The following checkboxes control optional functions
    during recovery:


    *   `Scan Record Data and Rebuild Fields and Tables (schema)` – Rebuilds the file’s
    database schema (tables, fields, and relationships), removing fields or records
    found to be at invalid locations within the file, and re-creates missing fields
    and table definitions.

    *   `Scan and Rebuild Scripts, Layouts, etc. (structure)` – Rebuilds the file’s
    structure (layouts, scripts, themes).

    *   `Rebuild Field Index` – Clears indexes with a choice of when to rebuild them.
    Rebuilding now takes longer but is done before anyone uses the file. Rebuilding
    later forces indexes to be rebuilt as needed when users search or perform other
    functions. See Chapter [8](#429700_2_En_8_Chapter.xhtml) for more on field indexing.

    *   `Delete Cached Settings` – Removes settings for last choices made when printing,
    importing/exporting, sorting, finding, etc.

    *   `Bypass Startup Script and Layout` – Disables script triggers (Chapter [27](#429700_2_En_27_Chapter.xhtml))
    and the file’s default layout, opening to a newly created blank recovery layout
    instead.


    ## Troubleshooting a Damaged File


    When a file explicitly reports damage and won’t open, you have no choice but to
    recover and usually will need to extract the data into a reliable backup of the
    structure. However, when a file opens but exhibits severe intermittent crashing,
    there are several steps required to safely locate the damage, determine the best
    course of action, and transfer records into a good structure.


    ### Locating Damage


    The first troubleshooting step involves locating the damage by determining if
    it is in the database structure or record data. Depending on what you find, your
    recovery option and choice of file for future use may vary.


    #### Checking the Database Structure


    To determine if the database structure is damaged, follow these steps:


    1.  Create a troubleshooting copy of the original file, naming it something unique,
    e.g., “Broken Database.”

    2.  Isolate the structure by making a copy without any record data. Open the `Broken
    Database` file, and perform the `Save a Copy as` command, selecting `Clone (no
    records)` option and naming it “Broken Database Structure.” Then close the `Broken
    Database` file.

    3.  Next, compact the `Broken Database Structure` to preemptively fix any minor
    issues that might get in the way of troubleshooting. Open the `Broken Database
    Structure` file, and perform the `Save a Copy as` command, selecting `compacted
    copy (smaller)` option and naming it “Broken Database Structure Compacted.” Then
    close the file.

    4.  To diagnose the structure, `Recover` the `Broken Database Structure Compacted`
    using default recovery settings (uncheck advanced options) and saving it as “Broken
    Database Structure Recovered.”


    If damage is found, you may be able to skip checking the record data and instead
    recover the original file and transfer record data from that into a reliable backup
    structure, ideally a preserved clone of a backup from a time prior to the introduction
    of corruption. If the corruption has been lingering awhile and you do not have
    access to such a file, you can use the recovered file generated previously as
    the structure. However, keep in mind that the recovery process may result in renamed
    or deleted objects that could not be recovered, so some work to remedy these may
    be required. For example, a field might be renamed “Recovered Field,” or a “Recovered
    Blob” or “Recovered Library” table occurrence can appear in the relationship graph.
    These may or may not indicate corruption or data loss.


    Caution


    If the FileMaker recovery report explicitly states that a file is not safe for
    use, using it anyway is not recommended.


    #### Checking the Record Data


    Once the file structure has been ruled out as the source of corruption, follow
    these steps to determine if the record data is damaged:


    1.  Open the `Broken Database` troubleshooting copy, and perform the `Save a Copy
    as` command, selecting `compacted copy (smaller)` option and naming it “Broken
    Database Records.” Then close the file.

    2.  `Recover` the `Broken Database Records` using default recovery settings by
    unchecking the `advanced options` and naming it “`Broken Database Records Recovered`.”


    #### Determining the Best Course of Action


    If no damage is reported in both the file structure and record data, you can try
    to use the recovered file at the conclusion of the record data check. If random
    crashes continue to occur, consider transferring the record data into a safe structure
    anyway. If the structure or record data reported damage, immediately transfer
    the record data to safe structure.'
