    FilterValues ( "10¶100¶10¶1000" ; "10" )            // result = "10¶10¶"

    ```


    在`PatternCount`因发现`部分模式匹配`而失败的情况下，此公式可用于安全地检测`完整值匹配`。以下两个示例对此进行了说明，两者都检查值列表中是否存在“age”。在第一个示例中，`PatternCount`找到了三个文本模式匹配项，因此即使没有完整的段落值匹配，它也会返回真值。在第二个示例中，`FilterValues`过滤掉了所有三个值，因为它们没有一个完全匹配。因此，第二个示例正确返回了`false`结果，表明列表中不存在“age”的`完整值`。


    ```

    PatternCount ( "Rage¶Page¶Sage" ; "age" ) > 0      // result = 1

    FilterValues ( "Rage¶Page¶Sage" ; "age"  ) ≠ ""    // result = 0

    ```


    #### `SortValues`


    `SortValues`函数将根据指定的数据类型重新排列列表中值的顺序。要使用文件的默认区域设置将值排序为文本，仅需要一个参数，即要排序的文本。可选参数允许指定`datatype`和/或`locale`。这里展示了所有三种形式：


    ```

    SortValues ( values )

    SortValues ( values ; datatype )

    SortValues ( values ; datatype ; locale )

    ```


    `values`参数是要排序的以回车符分隔的文本值列表。`datatype`参数是一个从1到5的数字，指示排序时使用的数据类型：1，文本；2，数值；3，日期；4，时间；5，时间戳。正数表示升序排序，而负数表示降序排序。`locale`参数指示排序时使用的数十种区域设置之一，例如`French`、`Norwegian`、`Ukrainian`等。函数的结果将是重新排列后的列表。


    ```

    SortValues ( "New York¶Illinois¶Pennsylvania¶California" )

    // result =

    California

    Illinois

    New York

    Pennsylvania

    ```


    这三个示例以不同的方式对同一数字列表进行排序。第一个示例因为没有指定`datatype`而按文本排序。结果将20置于100之后，因为“2”按字母顺序排在“1”之后，并且排序是一次一个文本字符进行的。第二个示例指定了数值排序，第三个示例指定了降序数值排序。


    ```

    SortValues ( "100¶10¶200¶20" )        // result = "10¶100¶20¶200"

    SortValues ( "100¶10¶200¶20" ; 2 )    // result = "10¶20¶100¶200"

    SortValues ( "100¶10¶200¶20" ; -2 )   // result = "200¶100¶20¶10"

    ```


    #### `UniqueValues`


    `UniqueValues`函数返回一个移除了所有重复值的值列表。此函数也接受额外的`datatype`和`locale`参数，其工作方式与`SortValues`相同。


    ```

    UniqueValues ( values )

    UniqueValues ( values ; datatype )

    UniqueValues ( values ; datatype ; locale )

    ```


    这些示例展示了将数据视为文本（默认）或指定数值结果时结果的差异。注意，“10”和“10.0”在作为文本时被视为不同，但在使用数值`datatype`时被视为相同。


    ```

    UniqueValues ( "15¶125¶10¶125¶10.0" )      // result = "15¶125¶10¶10.0"

    UniqueValues ( "15¶125¶10¶125¶10.0" ; 2 )  // result = "15¶125¶10"

    ```


    ## 介绍 `Get` 函数


    `Get`函数提供关于计算机系统、用户环境、当前数据库上下文或各种进程状态的一条信息。在创建根据当前上下文或情况的某些方面返回不同结果或执行不同任务的条件公式或脚本时，这些函数非常有用。每个函数都需要一个不变的参数，即一个指示所需信息的关键字。


    ```

    Get (  )

    ```


    提示


    有关这些函数的完整列表和更全面的描述，请参阅 FileMaker 的文档。


    ### 凭证和用户信息


    这些函数获取有关用户及其数据库账户凭证的信息（第[30](#429700_2_En_30_Chapter.xhtml)章）。


    ```

    Get ( UserName )                       // result = Karen Camacho

    Get ( AccountName )                    // result = k.camacho

    Get ( AccountExtendedPrivileges )      // result = fmapp

    Get ( AccountPrivilegeSetName )        // result = [Full Access]

    Get ( AccountGroupName )               // result = dbmarketing

    ```


    ### 操作系统、计算机和应用


    这些函数获取关于用户计算机、应用或主机的信息。


    ```

    Get ( ApplicationArchitecture )         // result = x86_64

    Get ( ApplicationLanguage )             // result = English

    Get ( ApplicationVersion )       // result = ProAdvanced 19.0.1

    Get ( HostApplicationVersion )   // result = Server 19.0.1

    Get ( HostName )                 // result = Production-FileMaker-Server.local

    Get ( HostIPAddress )            // result = 10.0.1.50

    Get ( SystemDrive )              // result = Macintosh HD

    Get ( SystemIPAddress )          // result = 10.0.1.27

    Get ( SystemLanguage )           // result = "English"

    Get ( SystemPlatform )           // result = 1

    Get ( SystemVersion )            // result = 10.15.5

    ```


    ### 记录


    这些函数获取当前布局表格中记录的信息。显示的结果假设当前表格包含500条记录，用户正在查看找到的结果集为125条记录中的第15条记录。


    ```

    Get ( FoundCount )          // result = 125

    Get ( TotalRecordCount )    // result = 500

    Get ( RecordNumber )        // result = 15

    Get ( ActiveRecordNumber )  // result = 15

    ```


    `RecordNumber`和`ActiveRecordNumber`之间的区别微妙但令人困惑，但在布局工作中很有用。在自定义函数、自定义菜单和脚本步骤中使用的公式都在`窗口上下文`中运行，并且对于这两个函数将始终返回相同的值，因为`记录编号`将始终是当前的`活动记录编号`。或者，在布局对象上使用的公式在`记录上下文`中运行，因此`RecordNumber`对于每条记录始终不同，而`ActiveRecordNumber`对于整个找到的结果集始终相同。这在配合`隐藏`功能（第[21](#429700_2_En_21_Chapter.xhtml)章，“隐藏对象”）时很有用，以下公式将隐藏除当前记录之外的所有记录上的按钮或其他对象。


    ```

    Get ( RecordNumber ) ≠ Get ( ActiveRecordNumber )

    ```


    ### 布局


    这些函数获取前端窗口中当前布局的信息：


    ```

    Get ( LayoutName )        // result = Sandbox – List

    Get ( LayoutNumber )      // result = 2

    Get ( LayoutTableName )          // result = Sandbox

    Get ( LayoutViewState )          // result (Form View)  = 0

    // result (List View) = 1

    // result (Table View) = 2

    ```


    ### 窗口


    许多`Get`函数会返回窗口属性和尺寸。'
  raw: '#### FilterValues


    The *FilterValues* function removes unwanted values from a list. The function
    accepts two parameters: *textToFilter* contains the values that will be manipulated,
    and *filterValues* indicates the desired values that are allowed to remain in
    the result. The result will be the original text with any values not specified
    in *filterValues* removed.


    ```

    FilterValues ( textToFilter ; filterValues )

    ```


    Any *filterValues* that exists more than once will be included, in the same order
    as they originally appear. Notice how partial paragraph matches are not included
    in the results. For example, even though “NYC” includes “NY,” it is filtered out
    because this function matches *values* (entire paragraphs) and not partial strings.


    ```

    FilterValues ( "NY¶IN¶OH¶PA¶NY¶IN¶NYC" ; "PA¶NY" )  // result = "NY¶PA¶NY¶"

    FilterValues ( "10¶100¶10¶1000" ; "10" )            // result = "10¶10¶"

    ```


    This formula can be used to safely detect a *full value match* in situations where
    *PatternCount* would fail because it finds *partial pattern matches*. This is
    shown in the following two examples, both checking to see if “age” exists in a
    list of values. In first example, *PatternCount* finds three text pattern matches,
    so it returns a true value even though there is no complete paragraph value match.
    In the second example, *FilterValues* filters out all three values because none
    exactly match. So, the second example correctly returns a *false* result, indicating
    that a *full value* of “age” is not present in the list.


    ```

    PatternCount ( "Rage¶Page¶Sage" ; "age" ) > 0      // result = 1

    FilterValues ( "Rage¶Page¶Sage" ; "age"  ) ≠ ""    // result = 0

    ```


    #### SortValues


    The *SortValues* function will rearrange the order of values in a list based on
    a specified data type. To sort values as text using the file’s default locale,
    only a single parameter is required, the text to sort. Optional parameters allow
    specification of a *datatype* and/or *locale*. All three varieties are shown here:


    ```

    SortValues ( values )

    SortValues ( values ; datatype )

    SortValues ( values ; datatype ; locale )

    ```


    The *values* parameter is a list of return-delimited text values to be sorted.
    The *datatype* parameter is a number from 1 to 5 indicating the data type to use
    when sorting: 1, text; 2, numeric; 3, date; 4, time; and 5, timestamp. A positive
    number indicates an ascending sort, while a negative number sorts descending.
    The *locale* parameter indicates one of several dozen locales to use when sorting,
    e.g., *French*, *Norwegian*, *Ukrainian*, etc. The result of the function will
    be the list provided rearranged.


    ```

    SortValues ( "New York¶Illinois¶Pennsylvania¶California" )

    // result =

    California

    Illinois

    New York

    Pennsylvania

    ```


    These three examples sort the same list of numbers different ways. The first sorts
    as text because no *datatype* is specified. The result puts 20 after 100 because
    “2” sorts alphabetically after “1,” and the sort is performed one text character
    at a time. The second specifies a numeric sort and the third a descending numeric
    sort.


    ```

    SortValues ( "100¶10¶200¶20" )        // result = "10¶100¶20¶200"

    SortValues ( "100¶10¶200¶20" ; 2 )    // result = "10¶20¶100¶200"

    SortValues ( "100¶10¶200¶20" ; -2 )   // result = "200¶100¶20¶10"

    ```


    #### UniqueValues


    The *UniqueValues* function returns a value list with any duplicate values removed.
    This function also accepts additional *datatype* and *locale* parameters that
    work the same as *SortValues*.


    ```

    UniqueValues ( values )

    UniqueValues ( values ; datatype )

    UniqueValues ( values ; datatype ; locale )

    ```


    These examples show the difference between results when treating the data as text
    (default) or specifying a numeric result. Notice that “10” and “10.0” are treated
    differently as text but the same when using a numeric *datatype*.


    ```

    UniqueValues ( "15¶125¶10¶125¶10.0" )      // result = "15¶125¶10¶10.0"

    UniqueValues ( "15¶125¶10¶125¶10.0" ; 2 )  // result = "15¶125¶10"

    ```


    ## Introducing Get Functions


    *Get functions* provide a single piece of information about the computer’s system,
    the user’s environment, the current database context, or the status of various
    processes. These are useful when creating conditional formulas or scripts that
    return different results or perform a different task based on some aspect of the
    current context or situation. They each require a single unchanging parameter,
    a keyword that indicates the desired information.


    ```

    Get (  )

    ```


    Tip


    For a complete list of functions and fuller description of those listed here,
    see FileMaker’s documentation.


    ### Credentials and User Information


    These functions get information about the user and their database account credentials
    (Chapter [30](#429700_2_En_30_Chapter.xhtml)).


    ```

    Get ( UserName )                       // result = Karen Camacho

    Get ( AccountName )                    // result = k.camacho

    Get ( AccountExtendedPrivileges )      // result = fmapp

    Get ( AccountPrivilegeSetName )        // result = [Full Access]

    Get ( AccountGroupName )               // result = dbmarketing

    ```


    ### OS, Computer, and App


    These functions get information about the user’s computer and application, or
    the host computer.


    ```

    Get ( ApplicationArchitecture )         // result = x86_64

    Get ( ApplicationLanguage )             // result = English

    Get ( ApplicationVersion )       // result = ProAdvanced 19.0.1

    Get ( HostApplicationVersion )   // result = Server 19.0.1

    Get ( HostName )                 // result = Production-FileMaker-Server.local

    Get ( HostIPAddress )            // result = 10.0.1.50

    Get ( SystemDrive )              // result = Macintosh HD

    Get ( SystemIPAddress )          // result = 10.0.1.27

    Get ( SystemLanguage )           // result = "English"

    Get ( SystemPlatform )           // result = 1

    Get ( SystemVersion )            // result = 10.15.5

    ```


    ### Records


    These functions get information about the records in the current layout’s table.
    The results shown assume the current table contains 500 records and the user is
    viewing the 15th record in a found set of 125.


    ```

    Get ( FoundCount )          // result = 125

    Get ( TotalRecordCount )    // result = 500

    Get ( RecordNumber )        // result = 15

    Get ( ActiveRecordNumber )  // result = 15

    ```


    The difference between *RecordNumber* and *ActiveRecordNumber* is subtly confusing
    but useful for layout work. Formulas used in custom functions, custom menus, and
    script steps all operate from the *window context* and will always return the
    same value for both of these two functions because the *record number* will always
    be the currently *active record number*. Alternatively, a formula used on a layout
    object operates from the *record context* so the *RecordNumber* will always be
    different for each record, while the *ActiveRecordNumber* will always be the same
    for the entire found set. This can be useful with the *Hide* feature (Chapter
    [21](#429700_2_En_21_Chapter.xhtml), “Hiding Objects”) where the following formula
    will hide a button or other object on every record except the current one.


    ```

    Get ( RecordNumber ) ≠ Get ( ActiveRecordNumber )

    ```


    ### Layouts


    These functions get information about the current layout in the front window:


    ```

    Get ( LayoutName )        // result = Sandbox – List

    Get ( LayoutNumber )      // result = 2

    Get ( LayoutTableName )          // result = Sandbox

    Get ( LayoutViewState )          // result (Form View)  = 0

    // result (List View) = 1

    // result (Table View) = 2

    ```


    ### Window


    Many *Get* functions return window properties and dimensions.'
