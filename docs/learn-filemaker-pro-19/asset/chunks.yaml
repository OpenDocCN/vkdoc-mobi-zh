  trans: '

    # 使用其他文件中的值列表


    一个数据库中的值列表可以定义为订阅另一个数据库中定义的列表。这有助于通过在一个文件中定义列表并在其他文件中共享来消除多文件系统中的冗余。以下示例假设存在第二个名为“示例外部列表”的文件，其中包含一个名为“地址州名”的值列表。在
    *学习 FileMaker* 数据库中，打开 *管理值列表* 对话框，然后单击 *新建* 按钮打开 *编辑值列表* 对话框。接着输入一个名称，并按照以下步骤配置列表，如图
    11-3 所示：


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig3_HTML.jpg](img/429700_2_En_11_Fig3_HTML.jpg)


    图 11-3


    一个使用外部数据库文件中列表的值列表


    1.  选择 *使用其他文件中的值列表* 选项。

    2.  如果另一个数据库已被定义为外部文件源，它将显示在第一个弹出菜单中。如果没有，可以通过从该菜单中选择 *添加 FileMaker 数据源*，然后定位并选择另一个数据库来定义。

    3.  一旦选择了文件，接下来的 *值列表* 弹出菜单将被激活，允许从外部文件中定义的列表中进行选择。选择目标列表并关闭对话框。


    # 使用字段中的值


    列表可以从目标字段中收集值，以动态生成一个随记录内容变化而变化的列表。通过使用字段数据作为源，授权用户、开发者或脚本可以轻松编辑值列表内容，并随时间动态调整其值。这在创建列表以帮助用户将一个表中的记录分配给另一个表中的记录时特别有用，例如，将一个
    *公司* 记录指定为 *联系人*、*项目*、*发票* 等的父记录。用户无需记住或查找公司的主键并手动输入或复制粘贴，而是通过弹出菜单或下拉列表控件样式，用户可以根据名称选择公司，系统会自动填入主键。默认情况下，使用字段值的列表是
    *上下文无关的*，这意味着它们将包含该字段表中 *每条记录* 的值，并且可以在 *任何* *上下文中* 使用。然而，也可以通过声明一个 *起始上下文* 并通过关系拉取值来有条件地限制列表，从而将列表仅限于单个表的布局。


    ## 指定字段对话框简介


    首先创建一个新的值列表，为其分配一个名称，然后选择 *使用字段中的值* 单选按钮。这将自动打开一个 *指定字段* 对话框，如图 11-4 所示。


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig4_HTML.jpg](img/429700_2_En_11_Fig4_HTML.jpg)


    图 11-4


    用于指定由字段值生成的列表的对话框


    要定义列表，请指定将用于生成值的字段，并使用对话框中的这些控件指示要包含哪些值以及它们的显示方式：


    1.  *使用第一个字段的值* – 选择一个表出现和字段来指定列表中使用的 *第一个字段*。当做出选择时，该值将被插入到一个字段中。

    2.  *也使用第二个字段的值* – 可选，从同一个表出现或与其关联的表出现中选择一个 *第二个字段*。该值在列表中 *显示* 以进行识别，但在做出选择时不插入。例如，如果第一个字段使用公司主键编号，第二个字段可以显示人类可读的公司名称。

    3.  *选择要包含的值* – *包含所有值* 选项为表中 *所有记录* 生成一个来自所选字段的唯一值列表。*仅包含从……开始的关联值* 选项会为 *仅*
    从所选表出现的上下文开始的关联记录生成一个值列表。这将创建一个 *上下文相关值列表*，它会根据用户正在查看的记录而改变。

    4.  *仅显示第二个字段的值* – 限制为 *仅显示* 第二个字段的值，但在做出选择时仍会 *插入* 第一个值。

    5.  *使用……排序值* – 选择在显示多个字段时用于对列表进行排序的两个字段之一。

    6.  *根据……重新排序值* – 选择用于值排序的语言。当使用字典排序顺序与索引排序顺序不同的语言时，这很有用，例如，区分带有变音符号和不带变音符号的字符。


    ## 创建表中所有记录的列表


    默认情况下，设置为 *使用字段中的值* 的值列表会从表中的 *每条记录* 中拉取值，因此可以在数据库的任何布局上使用，而无需考虑布局表的关联上下文（第 17
    章“理解上下文访问”）。前面图 11-4 中显示的示例创建了一个值列表，该列表使用 *公司* 表中所有记录的 *记录 ID* 和 *公司名称* 字段。配置并保存后，此列表可以作为
    *弹出菜单* 或 *下拉列表* 分配给任何表中的字段（第 20 章“配置字段控件样式”）。例如，在 *联系人* 表中，*联系人公司 ID* 字段用于存储将联系人记录连接到公司的外键。为了允许用户快速输入此信息，可以将该值列表作为弹出菜单分配给
    *联系人表单* 布局上的该字段。


    ## 创建条件值列表


    *条件值列表* 包含经过筛选的选项，这些选项仅代表可用记录值的一个子集。通过提供仅包含相关值的更小列表，用户可以更容易地找到他们需要的值。这可以通过多种方式使用。例如，当将
    *公司* 指定为 *联系人* 的父记录时，条件列表可以仅限于仅包含活跃的公司记录。类似地，将 *产品* 分配给 *发票* 时，可以根据类别字段的值或接收发票的公司类型来将列表仅限于包含某些产品。当选择用于生成
    *电子邮件* 记录的 *模板* 时，可以筛选列表，使其仅包含与正在生成的电子邮件类型相关的已批准类别记录。


    创建条件值列表有两种方法：*使用专用关系* 和 *使用计算字段*。在接下来的示例中，我们将使用 *学习 FileMaker* 数据库中 *公司* 表的 *公司状态*
    字段来创建一个条件值列表，该列表仅显示状态为“活跃”的公司记录。

    '
- fmt: '#### Using a Dedicated Relationship


    A *relationship-driven conditional value list* is compiled through a relationship
    (Chapter [9](#429700_2_En_9_Chapter.xhtml)), thereby creating a list containing
    a subset of values from only matching records. Creating a conditional value list
    using a relationship involves the selection of a *starting occurrence* which represents
    the interface context that will be used when pulling values from the selected
    list fields. Usually, this is the occurrence assigned to the table of the layout
    where the list will be used. However, it can also be any occurrence that is related
    to the layout’s occurrence. The relational criteria from the *starting occurrence*
    to the *list occurrence* controls which matching records are included in the list
    and which are excluded. As an example, build a value list in the *Learn FileMaker*
    file that includes only *Company* records where the *Company Status* field contains
    a value of “active.” Since the value list requires a relationship to work, we
    will declare a *use context* as the *Contact* table, i.e., the value list will
    be usable from any layout assigned to the *Contact* table. To begin, perform a
    few preparatory steps.


    First, create a calculation field in the *Contact* table named `Contact Company
    Status Match` with a formula of `"Active"` and with a calculation result type
    of text (Chapter [12](#429700_2_En_12_Chapter.xhtml)). Since the formula result
    will be the same for every record and since it will be a local key in the relationship
    (Chapter [9](#429700_2_En_9_Chapter.xhtml), “Indexing Match Fields”), it can be
    set to store a global value.


    Next, in the relationship graph, create a new occurrence of the *Company* table,
    and name it `Contact | Company for Active List`, and position it to the right
    of the *Contact* table. This will be the occurrence from which the list will pull
    values.


    Finally, connect this new occurrence to *Contact* with a relationship as shown
    in Figure [11-5](#429700_2_En_11_Chapter.xhtml#Fig5). Now, from the perspective
    of the *Contact* table (the starting occurrence), the *Company* values pulled
    through this relationship will be only those with a *Company Status* value of
    “Active.”


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig5_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig5_HTML.jpg)


    Figure 11-5


    The new relationship for the conditional value list


    Once finished, create a new value list set to *Use values from field* and specify
    the fields as shown in Figure [11-6](#429700_2_En_11_Chapter.xhtml#Fig6):


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig6_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig6_HTML.jpg)


    Figure 11-6


    The configuration of the conditional value list


    1. Choose fields from the new occurrence created earlier.

    2. Select the *Include only related values starting from* option.

    3. Select *Contact* as the starting occurrence.


    Once saved, assign the value list to the `Contact Company ID` field on a *Contact*
    layout as the source for a pop-up menu or drop-down list (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Configuring a Field’s Control Style”). Then, when clicking in that field, it
    should display a list of only the active companies.


    **Caution**: If the value list is empty, confirm that some Company records have
    an “Active” status.


    Although there are many valid uses for this technique, a relationship-driven value
    list is not always the best choice. Since the filtering mechanism is a relationship,
    it is inherently context sensitive. To implement the same feature on layouts for
    other tables, it would require a duplicate set of resources. For example, to add
    the same list of active companies to a *Project* table would require a link calculation
    match field created there, a new dedicated table occurrence connecting *Project*
    to *Company*, and an additional value list. To add it to *Invoices* requires yet
    another duplication of these resources. Implementing such a value list in six
    different tables would require one set of those four resources for each, giving
    you a total of *twenty-four additional components*. So, using this technique for
    a widely used feature like an active company list would quickly clog up the relationship
    graph and value list definitions with extraneous resources to accommodate what
    should be a simple global value list. In cases like this, use a *calculation-driven
    conditional list* instead.


    #### Using a Calculation Field


    A *calculation-driven conditional value list* generates a subset of records using
    a calculation field in the source table whose formula result (Chapter [12](#429700_2_En_12_Chapter.xhtml))
    controls which records are included or excluded. Since FileMaker ignores empty
    values when building a list from a field, the only record values included in the
    list are those that produce a calculation result. When the fields used in the
    formula are local and indexed, this is usually the best choice for creating a
    conditional value list that is both *context neutral* and *resource efficient*.
    Used in place of the last example, this will create one list of active companies
    that can be used *anywhere* in a database without additional resources. To begin,
    create a calculation field in the *Company* table named `Company Name for Active
    List` that returns a *text* result and has a formula of:


    ```

    Case ( Company Status = "Active" ; Company Name ; "" )

    ```


    Then create a value list that uses the `Record ID` as the first field and the
    aforementioned calculation field as the second field, as shown in Figure [11-7](#429700_2_En_11_Chapter.xhtml#Fig7).
    When creating a list this way, only the second field needs to be conditionally
    generated from a calculation. Once created, this list can be used from *any* layout
    context, regardless of the source table and without requiring a dedicated relationship.


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig7_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig7_HTML.jpg)


    Figure 11-7


    The configuration of a calculation-driven conditional value list


    1. Select `Record ID` from the *Company* table as the first field.

    2. Select the `Company Name for Active List` calculation field as the second field.

    3. Select the *Include all records* option.


    ## Summary


    This chapter explored how to create predefined value lists a variety of different
    ways. Assigning these to layout objects is discussed further in Chapters [19](#429700_2_En_19_Chapter.xhtml)
    and [20](#429700_2_En_20_Chapter.xhtml). In the next chapter, we begin learning
    how to write formulas.


    ## Part III: Writing Formulas and Using Functions


    Formulas are used throughout the development interface in field definitions, custom
    functions, layout objects, custom menus, and script steps. These chapters cover
    the basics of writing formulas:


    1. *Writing Formulas*

    2. *Exploring Built-in Functions*

    3. *Using JSON*

    4. *Creating Custom Functions*

    5. *Introducing ExecuteSQL*


    # 12. Writing Formulas


    A *calculation formula* is an equation made up of one or more statements expressing
    operations that, when performed, produce a result. Formulas can *analyze*, *compare*,
    *concatenate*, *condense*, *convert*, *expand*, *format*, *parse*, *replace*,
    or *summarize* any of FileMaker’s supported data types. They can range in size
    from a simple mathematical equation to an extremely complex collection of interrelated
    expressions and nested logical clauses involving values of any data type. This
    chapter introduces the basics of writing formulas, covering the following topics:


    - Introducing formulas

    - Defining formula components

    - Exploring the calculation interface

    - Writing formulas

    - Adding calculations to the *Learn FileMaker* file'
