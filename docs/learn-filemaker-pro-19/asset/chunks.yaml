  trans: '

    #### 配置数据库网络访问设置


    `FileMaker Network Settings`（文件管理器网络设置）对话框的下半部分包含一个本地打开的文件列表，并允许在相邻面板中配置网络访问设置。这些设置控制当数据库由`FileMaker
    Server`（文件管理器服务器）、`FileMaker Cloud`（文件管理器云）或启用了对等功能的`FileMaker Pro`（文件管理器专业版）桌面应用副本托管时，客户端的访问权限。选中一个文件后，可以选择允许哪些用户从其他工作站连接到该文件。选择`All
    Users`（所有用户）允许输入有效凭证的任何用户访问选中的文件。选择`Specify users by privilege set`（按权限集指定用户）将访问权限限制为您选择的特定权限集。新文件的默认选择是`No
    users`（无用户），这将拒绝对该文件的所有访问，即您可以打开它，但不会共享它。`Don''t display in Launch Center`（不在启动中心显示）复选框将隐藏文件，使其不出现在远程用户的`Hosts`（主机）对话框中。用户必须手动输入文件的名称和地址才能直接打开它。此设置可用于提高安全性，或从可用文件列表中排除那些在使用其表的另一个数据库打开时自动打开的后台数据文件。


    **注意**：通过`File ➤ Sharing`（文件 ➤ 共享）菜单访问的类似对话框用于配置数据库的 ODBC/JDBC 和`WebDirect`（网页直连）设置。


    ### 打开托管数据库


    要使用`FileMaker Pro`桌面应用打开托管文件，请选择`File ➤ Hosts ➤ Show Hosts`（文件 ➤ 主机 ➤ 显示主机）菜单，或点击`Open
    File`（打开文件）对话框上的`Hosts`（主机）按钮。这将打开一个`Hosts`（主机）对话框，列出主机上可用的文件，而不是文件夹目录，如图 29-5
    所示。侧边栏包含三个可折叠的组。点击`Claris ID`（克 laris 标识）可访问托管在`FileMaker Cloud`账户上的数据库。云托管文件也可以从`Launch
    Center`（启动中心）的`My Apps`（我的应用）部分打开。通过点击`Local`（本地）组并选择一个数据库来访问本地对等主机或`FileMaker
    Server`（文件管理器服务器）。在列表中右键点击文件，从上下文菜单中选择`Add to Favorites`（添加到收藏夹），即可将任何主机的文件标记为收藏。这些文件将显示在`Favorites`（收藏夹）选项卡下的列表中。


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig5_HTML.jpg](img/429700_2_En_29_Fig5_HTML.jpg)


    **图 29-5** 用于打开托管数据库的对话框


    ## 使用 FileMaker Server 托管


    `FileMaker Server`是一个快速、可靠且可扩展的服务器软件包，可在网络上安全地共享数据库文件。该服务器具有强大的功能和优势，包括：


    - 为运行在 macOS、Windows 或 iOS 上的任何`FileMaker`产品线的用户提供可靠的全时数据库服务。

    - 多种灵活的许可选项，可以混合搭配以满足团队成员的个人需求。

    - 使用`FileMaker WebDirect`（文件管理器网页直连）无需网络编程即可在 Web 上共享数据库，或使用`Custom Web Publishing`（自定义网络发布）通过
    PHP 或 XML 创建数据驱动的网站。

    - 使用`Open Database Connectivity`（开放数据库连接，ODBC）和`Java Database Connectivity`（Java
    数据库连接，JDBC）与远程系统共享托管数据库。

    - 使用`Admin Console`（管理控制台）网络界面或`fmsadmin`命令行本地或远程监控和管理服务器。

    - 通过自动数据库备份和计划脚本实现管理任务的自动化。

    - 可以使用`Perform Script On Server`（在服务器上执行脚本）步骤将脚本从客户端软件卸载到服务器上运行。


    **注意**：有关超出本节所述托管基础知识的更多信息，请参阅位于`https://www.claris.com/resources/documentation/`的`FileMaker
    Server`产品支持部分。


    ### 准备主机计算机


    在选择用作服务器主机的计算机时，有许多重要的考虑因素。计算机应具有快速处理器、充足的内存和固态硬盘。使用有线的、高速的、专用的网络连接将其连接到网络，并理想地为其分配一个静态
    IP 地址。为了允许优先使用处理器、硬盘和网络容量，*专门*将该计算机用于托管数据库。为避免损坏，不应直接备份包含托管数据库的文件夹。相反，请使用`FileMaker
    Server`内置的计划备份功能，然后将这些备份的额外副本复制到其他驱动器。此外，禁用屏幕保护程序和节能休眠功能，改为使用显示器变暗。关闭诸如 macOS
    `Spotlight`（聚光灯）功能之类的索引服务，并且不要使用防病毒软件扫描。


    **提示**：始终查看 Claris 网站以获取服务器的最低硬件要求和其他服务器建议。


    #### 定义已安装资源


    `FileMaker Server`不是一个传统应用程序，不会出现在计算机的`Applications`（应用程序）文件夹中。相反，将安装以下资源：


    - `Database Server`（数据库服务器） – 托管数据库，与`FileMaker Pro`和`FileMaker Go`（文件管理器 Go）客户端共享。

    - `Web Publishing Engine`（网络发布引擎） – 处理`WebDirect`服务，管理`Web Server`（网络服务器）和`Database
    Server`之间的流量。

    - `Web Server`（网络服务器） – macOS 使用其自己的 Apache 网络服务器副本。在 Windows 上，安装期间会启用`Internet
    Information Services`（互联网信息服务）并将其用作网络服务器。

    - `PHP Engine`（PHP 引擎） – 用于将`FileMaker API`的调用路由到`Web Publishing Engine`。

    - `Admin Console`（管理控制台） – 通过服务器或客户端计算机上的网络浏览器访问，用于配置和管理服务器。

    - `Command-Line Interface Executable`（命令行界面可执行文件） – 使用`fmsadmin`命令通过命令行界面管理服务器。

    - `User Account`（用户账户） – 指定服务器运行所用的账户。macOS 上的默认选择是安装程序创建的新`fmserver`用户，Windows
    上则是`Local System`（本地系统）。如果需要，可以指定自定义账户。

    - `User Group`（用户组） – 会创建一个名为`fmsadmin`的新用户组，并且必须将其分配给托管数据库文件。


    ### 访问管理控制台


    `Admin Console`（管理控制台）用于管理服务器，可通过网络浏览器访问。安装服务器后，服务器计算机桌面上会有一个指向本地主机的书签。也可以通过打开网络浏览器并输入以下地址来访问控制台：


    ```

    http://localhost:16001/admin-console

    ```


    要使用另一台计算机访问它，请将`localhost`替换为以下服务器地址：


    ```

    https://10.0.1.20:16000/admin-console

    https://10.0.1.20/admin-console

    ```


    当控制台页面打开并请求身份验证时，输入您在安装期间定义的管理员名称和密码。服务器管理控件分布在六个选项卡页面上：


    - `Dashboard`（仪表盘） – 汇总服务器信息和状态

    - `Databases`（数据库） – 列出所有已安装的数据库和活跃连接的客户端，并带有管理数据库以及与客户端通信或断开连接的控件

    - `Backups`（备份） – 用于计划并查看备份

    - `Configuration`（配置） – 包含常规设置、客户端、文件夹、计划脚本、通知、证书和日志记录

    - `Connectors`（连接器） – 包含`Web Publishing`（网络发布）、`FileMaker Data API`（文件管理器数据 API）、插件以及
    ODBC/JDBC 连接的设置

    - `Administration`（管理） – 包含许可证、管理员密码和外部身份验证设置


    ### 上传文件到 FileMaker Server


    可以通过手动将数据库文件移动到`Databases`（数据库）文件夹中，或通过`FileMaker Pro`桌面应用从客户端计算机上传它们来将数据库文件添加到服务器。

