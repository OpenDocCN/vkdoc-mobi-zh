    DateRange ( GetAsDate ( "1/1/2021" ) ; GetAsDate ( "1/5/2021" ) )

    // result =

    1/1/2021

    1/2/2021

    1/3/2021

    1/4/2021

    1/5/2021

    ```


    Create another function named “MergeValues” that accepts two return-delimited
    text value lists and returns a blended list. The code for this function shown
    in the following assumes two parameters, *column1* and *column2*:


    ```

    Let ( [

    current = GetValue ( column1 ; 1 ) & " " & GetValue ( column2 ; 1 ) ;

    column1 = RightValues ( column1 ; ValueCount ( column1 ) - 1 ) ;

    column2 = RightValues ( column2 ; ValueCount ( column2 ) - 1 )

    ] ;

    current & Case ( column1 ≠ "" ; "¶" & MergeValues ( column1 ; column2 ) )

    )

    ```


    In this example, the *Let* statement is used to step through the task. The first
    value from both inputs is extracted and concatenated into a *current* variable
    with a space between them. Then, the two input parameters are reduced by one value
    using the *ValueCount* and *RightValues* functions to remove the first value.
    The result is the value in the *current* variable, and if there are values remaining,
    a paragraph return and recursive call continue the process. This example call
    has three labels and phone numbers as input and shows the corresponding result:


    ```

    MergeValues ( "Work¶Home¶Cell" ; "555-2121¶555-3421¶555-2645" )

    // result =

    Work 555-2121

    Home 555-3421

    Cell 555-2645

    ```


    ### Controlling Recursion Limits with setRecursion


    To avoid infinite regress for situations when a recursive function doesn’t provide
    a terminating base case, FileMaker imposes a limit on the number of iterations
    a recursive stack can include. Any formula that exceeds this limit will return
    an error expressed as a question mark. Prior to FileMaker 18, the limit varied
    depending on the type of recursion used. Functions using *tail recursion*, where
    the recursive call is the final step at the end of the function’s formula leaving
    no processing unfinished, had a limit of 50,000 total recursive calls, in contrast
    to *head recursion*, where the placement of a recursive call anywhere within the
    formula was previously limited to 10,000 total calls. However, in version 18,
    both tail- and head-recursive calls and the *While* function have a default limit
    of 50,000 iterations. Also introduced in that version is the *setRecursion* function
    which allows a developer to set the maximum number of iterations allowed higher
    or lower than this default limit.


    ```

    setRecursion ( expression ; maxIterations )

    ```


    This is a *conditioning function* which sets the iterative terms for processing
    the *expression* it encloses. Any recursive function calls or *While* statements
    included in the first parameter’s statement will be limited to the number specified
    by the *maxIterations* parameter. This can be used to *increase* or *decrease*
    the maximum number of iterations allowed. For example, try calling the previous
    *DateRange* function with a start and end date more than 30 days apart from within
    a *setRecursion* statement limited to 30 iterations. This example fails because
    the recursive calls neccesary to finish the task exceed the limit of 30.


    ```

    setRecursion ( DateRange ( "1/1/2021" ; "2/10/2021" ) ; 30 )

    // result = ?

    ```


    Next, increase the limit to an amount greater than the range of dates to see it
    functions properly. If the preceding example were modified with a limit of 60,
    it is more than enough to cover the range of dates specified, and a proper result
    will be delivered.


    The following example shows the function increasing the limit to 250,000 in order
    to execute a simple *While* statement that increments a counter up to 200,000:


    ```

    SetRecursion (

    While (

    counter = 0 ;

    counter < 200000 ;

    counter = counter + 1 ;

    counter

    ) ; 250000

    )

    ```


    ### Embedding Test Code Inside a Function


    Earlier we discussed writing test code to quickly perform multiple tests of the
    *GetDay* custom function with a variety of different input. Recursion opens the
    possibility of storing that test code *inside* of the custom function it tests.
    While it may seem unnecessary to save test code at all, it may be prudent to retest
    a function anytime it is modified in the future. A *Case* statement can be used
    to detect a test request and perform an alternate set of code. In this example,
    the *dateInput* parameter will be used to determine if the call to the function
    was asking for *test results* or *normal operations* and run one or the other
    accordingly as shown in the following pattern:


    ```

    Case ( dateInput = "Test" ; > ; > )

    ```


    Using this format, we can combine the previous example test code with the original
    function code to convert the formula into the following combined statement. To
    demonstrate this technique, create a new function called *GetDay2* with this new
    capability. In this example, if the *dateInput* receives a value of “Test,” it
    will perform the test routine; otherwise, it will assume the parameter contains
    a date and will perform its normal function.


    ```

    Case ( dateInput = "Test" ;

    //    Test Code

    Let ( [

    dateInput = Date ( 1 ; 17 ; 2021 )

    ] ;

    "Input = " & dateInput & " (" & DayName (dateInput) & ")¶" &

    "1 Sunday=" & GetDay2 ( dateInput + 1  ; "Sunday" ) & "¶" &

    "+2 Sunday=" & GetDay2 ( dateInput + 2  ; "Sunday" ) & "¶"

    "+3 Sunday=" & GetDay2 ( dateInput + 3  ; "Sunday" ) & "¶" &

    "+4 Sunday=" & GetDay2 ( dateInput + 4  ; "Sunday" ) & "¶"

    "+5 Sunday=" & GetDay2 ( dateInput + 5  ; "Sunday" ) & "¶" &

    "+6 Sunday=" & GetDay2 ( dateInput + 6  ; "Sunday" ) & "¶" &

    "Sunday=" & GetDay2 ( dateInput; "Sunday" ) & "¶" &

    "Monday=" & GetDay2 ( dateInput ; "Monday" ) & "¶" &

    "Tuesday=" & GetDay2 (dateInput; "Tuesday" ) & "¶" &

    "Wednesday=" & GetDay2 ( dateInput; "Wednesday" ) & "¶"

    "Thursday=" & GetDay2 ( dateInput; "Thursday" ) & "¶"

    "Friday=" & GetDay2 ( dateInput; "Friday" ) & "¶" &

    "Saturday=" & GetDay2 ( dateInput; "Saturday" ) & "¶" &

    "Timestamp=" & GetDay2 ( GetAsTimestamp ( dateInput )  ; "Sunday" ) & "¶"

    "Text Date=" & GetDay2 ( GetAsText ( dateInput )  ; "Sunday" ) & "¶" &

    "Text TS=" & GetDay2 ( GetAsText ( GetAsTimestamp ( dateInput ) )  ; "Sunday"
    ) &

    )

    ;

    //    Regular Code

    Let ( [

    dateToProcess  = GetAsDate ( dateInput ) ;

    list = "Sunday¶Monday¶Tuesday¶Wednesday¶Thursday¶Friday¶Saturday" ;

    list = Left ( list ; Position ( list ; dayRequested ; 1; 1 ) ) ;

    dayNumber = ValueCount ( list ) ;

    numAdjustment = DayOfWeek ( dateToProcess ) – dayNumber

    ] ;

    dateToProcess  - numAdjustment

    )

    )

    ```


    ## Summary


    This chapter covered the basics of developing your own custom functions and the
    possibility of making them recursive. In the next chapter, we explore using the
    *Structured Query Language* (SQL) with the *ExecuteSQL* function.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。



    ### 构建简单的递归函数


    要掌握递归函数的基本结构，请从一些简单的示例开始。首先，创建一个名为 `DateRange` 的新函数，它接受 `startDate` 和 `endDate`
    参数，并使用以下公式返回范围内每一天的列表：


    ```

    startDate &

    Case (  endDate = startDate ; "" ; "¶"  & DateRange ( startDate + 1 ; endDate
    ) )

    ```


    该公式将开始日期与一个 `Case` 语句的结果连接起来，该语句决定是否应发出递归调用以将日期向前递增。如果结束日期等于开始日期，则公式返回一个空字符串，从而提供一个终止的基础情况。如果两个日期不同，则包含一个段落换行符，然后函数将开始日期加一后调用自身。每次递归调用都会重复此过程，直到开始日期等于结束日期，从而生成如下例所示的结果：


    ```

    DateRange ( GetAsDate ( "1/1/2021" ) ; GetAsDate ( "1/5/2021" ) )

    // 结果 =

    1/1/2021

    1/2/2021

    1/3/2021

    1/4/2021

    1/5/2021

    ```


    创建另一个名为 `MergeValues` 的函数，它接受两个以回车符分隔的文本值列表，并返回一个混合列表。如下所示的此函数代码假定有两个参数：`column1`
    和 `column2`：


    ```

    Let ( [

    current = GetValue ( column1 ; 1 ) & " " & GetValue ( column2 ; 1 ) ;

    column1 = RightValues ( column1 ; ValueCount ( column1 ) - 1 ) ;

    column2 = RightValues ( column2 ; ValueCount ( column2 ) - 1 )

    ] ;

    current & Case ( column1 ≠ "" ; "¶" & MergeValues ( column1 ; column2 ) )

    )

    ```


    在此示例中，使用 `Let` 语句逐步完成任务。从两个输入中提取第一个值，并将它们连接成一个 `current` 变量，中间用空格隔开。然后，使用 `ValueCount`
    和 `RightValues` 函数移除第一个值，从而将两个输入参数各减少一个值。结果是 `current` 变量中的值，如果还有剩余值，则通过段落换行符和递归调用继续该过程。以下示例调用以三个标签和电话号码作为输入，并显示相应的结果：


    ```

    MergeValues ( "工作¶家庭¶手机" ; "555-2121¶555-3421¶555-2645" )

    // 结果 =

    工作 555-2121

    家庭 555-3421

    手机 555-2645

    ```


    ### 使用 `setRecursion` 控制递归限制


    为避免递归函数未提供终止基础情况时发生无限回归，FileMaker 对递归栈可包含的迭代次数施加了限制。任何超出此限制的公式都会返回一个以问号表示的错误。在
    FileMaker 18 之前，该限制因递归类型而异。使用*尾递归*（递归调用是函数公式末尾的最后一步，不留未完成处理）的函数，总递归调用限制为 50,000
    次，相比之下，*头递归*（递归调用位于公式中的任何位置）之前的限制为总调用 10,000 次。然而，在版本 18 中，头递归和尾递归调用以及 `While`
    函数的默认限制都是 50,000 次迭代。该版本还引入了 `setRecursion` 函数，它允许开发人员将此默认限制设置得更高或更低。


    ```

    setRecursion ( expression ; maxIterations )

    ```


    这是一个*条件函数*，用于设置处理其封装的 `expression` 的迭代条件。第一个参数语句中包含的任何递归函数调用或 `While` 语句将限于 `maxIterations`
    参数指定的次数。这可用于*增加*或*减少*允许的最大迭代次数。例如，尝试在限制为 30 次迭代的 `setRecursion` 语句中调用之前的 `DateRange`
    函数，且开始和结束日期相隔超过 30 天。此示例会失败，因为完成任务所需的递归调用超出了 30 次的限制。


    ```

    setRecursion ( DateRange ( "1/1/2021" ; "2/10/2021" ) ; 30 )

    // 结果 = ?

    ```


    接下来，将限制增加到大于日期范围的数值，以查看其正常运行。如果上述示例的限制定为 60，则足以覆盖指定的日期范围，并且将得到正确的结果。


    以下示例展示了将该函数限制增加到 250,000，以便执行一个简单的 `While` 语句，该语句将计数器递增到 200,000：


    ```

    SetRecursion (

    While (

    counter = 0 ;

    counter < 200000 ;

    counter = counter + 1 ;

    counter

    ) ; 250000

    )

    ```


    ### 在函数内嵌入测试代码


    之前我们讨论了编写测试代码，以便使用各种不同的输入快速对 `GetDay` 自定义函数执行多项测试。递归开辟了将测试代码存储在被测试的自定义函数*内部*的可能性。虽然保存测试代码可能看起来没有必要，但将来任何时候修改函数时，重新测试函数可能是明智之举。可以使用
    `Case` 语句来检测测试请求并执行一组替代代码。在此示例中，`dateInput` 参数将用于确定对该函数的调用是在请求*测试结果*还是*正常操作*，并相应地运行其中的一个，如下面的模式所示：


    ```

    Case ( dateInput = "测试" ; > ; > )

    ```


    使用这种格式，我们可以将之前的示例测试代码与原始函数代码结合起来，将公式转换为以下组合语句。为了演示此技术，创建一个名为 `GetDay2` 的新函数，使其具有此新功能。在此示例中，如果
    `dateInput` 接收到值 “测试”，它将执行测试例程；否则，它将假定参数包含一个日期并执行其正常功能。


    ```

    Case ( dateInput = "测试" ;

    //    测试代码

    Let ( [

    dateInput = Date ( 1 ; 17 ; 2021 )

    ] ;

    "输入 = " & dateInput & " (" & DayName (dateInput) & ")¶" &

    "1 星期日=" & GetDay2 ( dateInput + 1  ; "星期日" ) & "¶" &

    "+2 星期日=" & GetDay2 ( dateInput + 2  ; "星期日" ) & "¶"

    "+3 星期日=" & GetDay2 ( dateInput + 3  ; "星期日" ) & "¶" &

    "+4 星期日=" & GetDay2 ( dateInput + 4  ; "星期日" ) & "¶"

    "+5 星期日=" & GetDay2 ( dateInput + 5  ; "星期日" ) & "¶" &

    "+6 星期日=" & GetDay2 ( dateInput + 6  ; "星期日" ) & "¶" &

    "星期日=" & GetDay2 ( dateInput; "星期日" ) & "¶" &

    "星期一=" & GetDay2 ( dateInput ; "星期一" ) & "¶" &

    "星期二=" & GetDay2 (dateInput; "星期二" ) & "¶" &

    "星期三=" & GetDay2 ( dateInput; "星期三" ) & "¶"

    "星期四=" & GetDay2 ( dateInput; "星期四" ) & "¶"

    "星期五=" & GetDay2 ( dateInput; "星期五" ) & "¶" &

    "星期六=" & GetDay2 ( dateInput; "星期六" ) & "¶" &

    "时间戳=" & GetDay2 ( GetAsTimestamp ( dateInput )  ; "星期日" ) & "¶"

    "文本日期=" & GetDay2 ( GetAsText ( dateInput )  ; "星期日" ) & "¶" &

    "文本时间戳=" & GetDay2 ( GetAsText ( GetAsTimestamp ( dateInput ) )  ; "星期日" ) &

    )

    ;

    //    常规代码

    Let ( [

    dateToProcess  = GetAsDate ( dateInput ) ;

    list = "星期日¶星期一¶星期二¶星期三¶星期四¶星期五¶星期六" ;

    list = Left ( list ; Position ( list ; dayRequested ; 1; 1 ) ) ;

    dayNumber = ValueCount ( list ) ;

    numAdjustment = DayOfWeek ( dateToProcess ) – dayNumber

    ] ;

    dateToProcess  - numAdjustment

    )

    )

    ```


    ## 总结


    本章涵盖了开发自己的自定义函数的基础知识，以及使它们成为递归函数的可能性。在下一章中，我们将探讨将*结构化查询语言*（SQL）与 `ExecuteSQL`
    函数一起使用。

