  trans: '

    # 设置门户筛选


    要设置筛选示例，请按以下步骤操作：


    1.  在 `Company` 表中，创建一个名为“公司联系人门户筛选”的文本字段。可选地，让此字段使用全局存储，以避免用户之间的冲突，并保留用户在所有记录中的输入。

    2.  将该字段放置在布局上，位于门户上方，并使用一个能清晰说明其功能的标签，例如“联系人筛选”。或者，使用一个占位计算作为提示。

    3.  打开“门户设置”对话框。

    4.  单击“筛选门户记录”旁边的“指定”按钮。

    5.  输入一个公式，用于指示 `Contacts` 表中的相关记录何时应根据用户在筛选字段中输入的内容显示在门户中（请参阅以下示例）。

    6.  然后保存公式并关闭“门户设置”对话框。


    # 编写基本门户筛选公式


    门户筛选公式由一个或多个条件语句组成，这些语句计算得出组合结果为 `true` (1) 或 `false` (0)。每个相关记录都使用此公式单独评估，并且仅当结果为
    `true` 时才会出现在门户中。由于该公式在相关记录列表内运行，因此它已假定关系本身的记录匹配条件。因此，筛选公式无需重新指定该条件，也不能将结果扩展到该条件之外以包含非相关记录。例如，当门户的数据源匹配分配给当前公司记录的联系人记录时，我们可以按联系地址进行筛选，但无法使公式包含分配给其他公司的联系人。


    编写筛选公式时，公式应包含一个条件，用于在未输入任何条件时显示所有记录。因此，请以以下代码开始公式，该代码在筛选字段为空时提供 `true` 结果：


    ```

    Company::公司联系人门户筛选 = ""

    ```


    接下来，在 `or` 运算符之后添加第二个条件，使用 `PatternCount` 函数，指定相关 `联系地址州` 字段与用户在筛选字段中输入的文本之间的部分或完全匹配。以下示例公式允许在未输入筛选值时
    `or` 在州字段中找到输入的值时显示记录：


    ```

    Company::公司联系人门户筛选 = "" or

    PatternCount (

    Company | Contact::联系地址州 ;

    Company::公司联系人门户筛选

    ) > 0

    ```


    保存公式并关闭设置对话框以测试功能。从一个在门户中包含大量联系人的公司记录开始。当在筛选字段中输入州缩写、提交记录并刷新窗口后，门户行应仅包含与输入文本匹配的记录。要使门户在用户输入筛选字段时自动更新，请使用
    `ObjectModify` 脚本触发器（第 [27] 章）运行一个脚本，该脚本持续提交、刷新并重新进入筛选字段。


    # 扩展公式以支持多个匹配字段


    前面的示例假设用户的筛选条件是州。但是，可以扩展筛选公式以检测跨多个字段的匹配。以下示例添加了条件，用于在“名”、“姓”、“城市”或“州”中查找匹配项：


    ```

    Company::公司联系人门户筛选 = "" or

    PatternCount (

    Company | Contact::联系人名 ;

    Company::公司联系人门户筛选

    ) > 0 or

    PatternCount (

    Company | Contact::联系人生 ;

    Company::公司联系人门户筛选

    ) > 0 or

    PatternCount (

    Company | Contact::联系地址城市 ;

    Company::公司联系人门户筛选

    ) > 0 or

    PatternCount (

    Company | Contact::联系地址州 ;

    Company::公司联系人门户筛选

    ) > 0

    ```


    # 增强搜索字段


    筛选字段投入使用后，应用一些格式更改，如图 [20-50] 所示。搜索字段的左角使用“检查器”面板中“外观”选项卡的“圆角半径”设置进行圆角处理。移除了标签，改用占位文本值“按...搜索”。最后，在字段右侧添加了一个按钮，具有相对的圆角、分配了图标，并定义了一个“操作”来运行脚本，该脚本删除筛选字段的内容并提交记录。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig50_HTML.jpg](img/429700_2_En_20_Fig50_HTML.jpg)


    图 20-50


    视觉改进的门户筛选字段


    # 使用网页查看器


    网页查看器是一种布局对象，可直接在布局上显示网页。可以配置为允许或不允许用户交互，并且内容可以由以下任一方式生成：


    -   硬编码指向特定网站的网址

    -   从数据库字段提取的网址或由公式动态生成的网址

    -   由 Claris 提供的地址公式，例如 Google 网页搜索、Google 地图、FedEx 或 Wikipedia

    -   来自字段或公式的自定义 `HTML` 代码，其中可包含硬编码元素、字段数据，甚至字段中的图像

    -   由脚本提供的网址或自定义 `HTML` 代码


    **注意：** 自定义网址必须以正确的 URL 方案开头，例如 `http://`、`https://`、`ftp://` 或 `file://`。


    ## 探索网页查看器设置对话框


    要将网页添加到布局，请选择 `插入 ➤ 网页查看器` 菜单，或使用工具栏中的工具。将出现“网页查看器设置”对话框，如图 [20-51] 所示。稍后可以通过双击网页查看器，或从
    `格式` 菜单或查看器的上下文菜单中选择 `网页查看器设置` 来打开此对话框。


    左上角的“选择网站”列表指定源数据。从数据驱动模板列表中选择，或选择“自定义网址”来编写自己的 URL 或 HTML 公式。使用模板时，右侧的组件字段接受将插入
    URL 的值。“网址”区域允许输入 URL、HTML 代码或用于生成任一内容的公式。模板将插入一个现成的计算，其中包含指向右上角参数字段的链接。在文本区域输入地址或公式，或单击“指定”按钮以输入公式。


    底部的复选框选项控制各种查看器功能。您可以启用与渲染网页的用户交互、控制查找模式下的显示、在加载时包含进度条，以及包含状态消息。“自动编码 URL”选项将对地址中的特殊字符进行百分比编码。例如，如果选中此框，空格将转换为
    `%20`。或者，可以在公式中使用 `GetAsURLEncoded` 函数来处理编码。“允许 JavaScript 执行 FileMaker 脚本”选项是在版本
    19 中添加的，用于使 HTML 代码能够使用 `FileMaker.PerformScript` JavaScript 函数直接调用本机 FileMaker
    脚本（本节稍后描述）。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig51_HTML.jpg](img/429700_2_En_20_Fig51_HTML.jpg)


    图 20-51


    用于配置网页查看器的对话框


    启用“允许与网页查看器内容交互”选项后，用户可以像使用任何标准浏览器一样与网页交互。他们可以单击链接导航到其他页面，并与丰富的媒体内容（如电影）进行交互。尽管功能强大，但查看器并非旨在作为全功能网页浏览器，可能存在一些限制。在浏览模式下，查看器上下文菜单中的“在新窗口中打开链接”功能会将页面重定向到
    FileMaker 之外用户的默认浏览器应用程序，从而提供更完整的网页浏览体验。

    '
- fmt: '### Building a Web Page Using Data from Fields


    As an alternative to displaying a page based on a web address, a viewer can display
    HTML code to generate a custom page. FileMaker uses the *data universal resource
    identifier* (URI) scheme, which is a standard method of including data within
    the code of a web page instead of accessing external resources. The *data URI*
    is expressed with the following formula, with square brackets indicating optional
    elements:


    ```

    data:[<media type>][;base64],<data>

    ```


    This formula contains the following elements:


    - `data` – This required prefix indicates the scheme being used, followed by a
    semicolon.

    - `<media type>` – Optionally indicates the type of material contained in the
    data. A web page would use `text/html`, while an image would use `image/<type>`,
    for example, `image/png`. If no media type is specified, the data will be assumed
    to be `text/plain`.

    - `base64` – This optional extension, delimited from the media type with a semicolon,
    is used to indicate that the data content is binary data, which is encoded in
    `ASCII` format using the `Base64` binary-to-text encoding scheme.

    - `<data>` – Preceded with a comma, this placeholder would be replaced with a
    sequence of characters containing the content being described, HTML code or Base64
    image data.


    **Note**: Since version 15, the data and media type have been optional. The text
    can begin with `<html>` or `<!DOCTYPE html>` and render as expected in a web viewer.


    #### Creating a Hello World Web Page


    This code defines a simple *Hello, World* example web page formula for a web viewer:


    ```

    "data:text/html,


    Hello, World

    "

    ```


    Add a `<style>` tag to control text formatting with *Cascading Style Sheets* (CSS).
    This example modifies the color of the `h1` style to display the text in green:


    ```

    "data:text/html,


    <style>

    h1 {

    color: green;

    }

    </style>


    <h1>Hello, World</h1>

    "

    ```


    Add a `<script>` tag to include JavaScript functions as demonstrated by the following
    example that opens an alert dialog when the page loads:


    ```

    "data:text/html,


    <script>

    alert(''Hello, World!'')

    </script>


    <h1>Hello, World</h1>

    "

    ```


    **Caution**: When calculating content for a web viewer in a formula, all text
    must be enclosed in quotation marks. Any quotes within that text must be escaped
    with a preceding backslash.


    #### Including Text Fields in a Web Page


    Using a formula-driven web page, inserting fields is done the same as in any formula
    (Chapter [12](#429700_2_En_12_Chapter.xhtml)). Simply insert a field reference
    into the formula outside of the quoted text.


    ```

    "data:text/html,


    <h1>" & Company::Company Name & "</h1>

    "

    ```


    #### Including a Container Field Image in a Web Page


    Images from the Web can be included by inserting the URL in an `<image>` tag.
    However, to include an image stored in a field, use the `Base64Decode` function
    to convert the image into text.


    ```

    "data:text/html,


    <h1>" & Company::Company Name & "</h1>

    <img src=''" & Base64Decode ( Company::ContainerField ) & "'' />

    "

    ```


    ### Calling a FileMaker Script with JavaScript


    In version 19, FileMaker added the ability for JavaScript in a web viewer to call
    a native FileMaker script. As long as the option in the *Web Viewer Setup* dialog
    is enabled, buttons and URLs in HTML code can call a `FileMaker.PerformScript`
    function with two parameters: *script name* and *parameter*. The following simple
    example assumes a script named “Test Script” exists that will generate a dialog
    using the `Show Custom Dialog` script step that displays the script parameter
    (Chapters [24](#429700_2_En_24_Chapter.xhtml) and [25](#429700_2_En_25_Chapter.xhtml)).
    The code renders a button that calls a JavaScript function named `runScript()`
    that runs the FileMaker script. If configured correctly, clicking the button should
    cause FileMaker to open a dialog with a message of “Hello, World!”


    ```

    "data:text/html,


    <button onclick=''runScript()''>Test FMP Script</button>

    <script>

    function runScript() {

    FileMaker.PerformScript ( \"Test Script\", \"Hello, World!\" );

    }

    </script>

    "

    ```


    **Caution**: This JavaScript function only works on web pages rendered in a FileMaker
    web viewer. To enable HTML click access from outside the database, use the FileMaker
    URL (Chapter [29](#429700_2_En_29_Chapter.xhtml)).


    ## Working with Charts


    A *chart* is a layout object that draws a graphical representation of data in
    one of several popular charting formats: *column*, *stacked column*, *positive
    negative column*, *bar*, *stacked bar*, *pie*, *line*, *area*, *scatter*, or *bubble*.
    These can be created using data from the current found set, a group of related
    records, or from calculated data. Charts are configured in a *Chart Setup* dialog
    that opens whenever a new chart object is inserted onto a layout. This dialog
    can be re-opened for an existing chart object by double-clicking on it or selecting
    *Chart Setup* from the *Format* menu or its contextual menu. The dialog is divided
    into two main sections: a *chart preview* area continuously updates a drawing
    of the chart as it is configured and a settings sidebar of togglable sections
    for various settings – *Chart*, *Styles*, and *Data Source*.


    ### Creating a Chart Using Calculated Data


    Using calculated data to generate a chart will pull information from either hard-coded
    calculated values or fields from the current record. To create a pie chart using
    hard-coded values, insert a chart object onto a layout, and then configure the
    settings as shown in Figure [20-52](#429700_2_En_20_Chapter.xhtml#Fig52).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig52_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig52_HTML.jpg)


    **Figure 20-52** – The settings for a simple pie chart based on calculated data


    The following settings are required to generate a pie chart with three sections,
    as shown in Figure [20-53](#429700_2_En_20_Chapter.xhtml#Fig53):


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig53_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig53_HTML.jpg)


    **Figure 20-53** – The chart generated by the example data


    1. **Type** – Select *Pie* as the type and optionally enter a title.

    2. **Category Labels** – Enter a return-delimited list of categories for the chart,
    e.g., `Category A¶Category B¶Category C`.

    3. **Slice Data** – Enter a return-delimited list of numbers for each category
    slice of the pie, e.g., `1000¶250¶650`.

    4. **Options** – Choose various optional settings for label format.

    5. **Chart Data** – From the *Data Source* settings group, select *Current Record
    (delimited data)* to instruct the chart engine to use data from the context of
    the current record only.


    **Note**: Optionally, the labels and data for the preceding chart could be generated
    using field values by clicking the icon with three dots to open the *Specify Formula*
    dialog.'
