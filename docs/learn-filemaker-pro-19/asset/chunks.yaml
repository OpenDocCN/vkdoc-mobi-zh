    ## Working with Text


    A text object can be added to a layout in one of four types: *static text*, *dynamic
    symbols*, *merge fields,* and *merge variables*.


    ### Creating Static Text


    On a layout, *static* *text* is an object that contains an unchanging string of
    characters used for labeling or conveying a message to users. A static text object
    can contain rich formatting and multiple paragraphs. In Layout mode, create a
    static text object by choosing the *Text* tool in the toolbar and then click-dragging
    in the layout design area to define the object boundaries. When you release the
    cursor, begin typing. Once created, text can be edited and formatted by selecting
    the tool and clicking on the object or by double-clicking it.


    ### Creating Dynamic Placeholder Symbols


    A *dynamic placeholder symbol* is a special string in a text object that is automatically
    replaced with a predetermined value type whose content varies over time, e.g.,
    a date or time. There are dozens of symbols available, each corresponding to a
    *Get* function (Chapter [13](#429700_2_En_13_Chapter.xhtml), “Introducing Get
    Functions”). These can be manually typed or added to a layout by selecting one
    from the *Insert* menu. The menu adds the symbol into the current text object
    with edit focus or as a new object. Symbols are made up of a keyword enclosed
    in double braces. For example, to have the *current date* rendered on a layout,
    create a text object with the value shown here:


    ```

    {{CurrentDate}}

    ```


    A placeholder symbol can be combined with other symbols and static text to create
    compound strings. The following example can be placed in the footer of a print
    layout and will automatically update to display the date, time, and user account
    at the time the report was printed:


    ```

    Report printed on {{CurrentDate}} at {{CurrentTime}} by {{AccountName}}

    ```


    ### Creating Merge Fields


    Similar to dynamic function placeholders, a *merge field* is a symbolic tagging
    format that allows a field’s content to appear on a layout within a non-editable
    text object. Use the *Insert ➤ Merge Field* menu to add one into the current text
    object with edit focus or as a new object. Merge fields are made up of a field
    name enclosed in two left-shift and two right-shift symbols and can also be typed
    manually.


    ```

    >

    >

    ```


    When referencing a field local to the current layout’s table, only the field name
    is required. A related field must include the name of the table occurrence to
    provide a contextual reference. The following example assumes placement on a *Contact*
    layout and will display the full name of a contact and the name of the related
    *Company* assigned to them:


    ```

    Contact > > at >

    // Result = Contact Karen Smith at Atlas Shoulder Pads LLC.

    ```


    Caution


    Empty fields used in a compound merge field string will show up blank in a string
    with other static text surrounding it to form a sentence that doesn’t make sense!


    ### Creating Merge Variables


    A *merge variable* is a symbolic tagging format that allows a global variable
    (Chapter [12](#429700_2_En_12_Chapter.xhtml), “Variables”) to be rendered as a
    text object on a layout. Like merge fields and dynamic symbols, merge variables
    can be used in any combination with other merge variables, text, symbols, and
    merge fields. Use the *Insert ➤ Merge Variable* menu to add one into the current
    text object with edit focus or as a new object. Merge variables are made up of
    a variable name enclosed in two left-shift and two right-shift symbols, following
    the pattern shown here:


    ```

    >

    ```


    ## Working with Button Controls


    A *button* is a layout object that embeds an action control into an object. Buttons
    work in Browse and Find mode and, depending on the type and configuration, can
    run a script, perform a single script step, or open a popover interface element.
    Buttons allow a developer to embed active controls into the interface for navigation,
    creating, deleting, or performing any number of other functions. These provide
    shortcuts for users and relieve them of the burden of manually repeating complex
    tasks. FileMaker has four options for buttons: three native button types – *buttons*,
    *popover buttons,* and *button bars* – and the ability to format *any object*
    as a button.


    ### Working with Buttons


    A *button* is a layout object in the form of a traditional graphical push button,
    like those shown in Figure [20-27](#429700_2_En_20_Chapter.xhtml#Fig27). Buttons
    can be added to a layout using the toolbar icon or selecting the *Insert ➤ Button*
    menu. When a button is created, a *Button Setup* dialog opens which allows configuration
    of a *label* and *action*. The dialog can be opened for an existing button by
    double-clicking it or selecting the *Button Setup* command from the *Format* menu
    or the button’s contextual menu.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig27_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig27_HTML.jpg)


    Figure 20-27


    Examples of buttons'
