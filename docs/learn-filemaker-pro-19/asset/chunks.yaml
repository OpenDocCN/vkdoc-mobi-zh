    combining the full stack of a *presentation front end*, *process logic middleware,*
    and *data storage back end*. Unlike the traditional approach where these components
    are physically separated and built with different languages, FileMaker folds all
    three into a familiar, document-based user experience with an accessible low-code
    development environment. Experienced software developers familiar with multitier
    architectures that employ command-line languages may find this arrangement initially
    disorienting. They may even be tempted to hastily and unjustly dismiss it as something
    only for beginners. However, FileMaker expertly unites ease of use with powerful
    standards-based technologies, uniting the best of both worlds in a powerful application
    for those who look deeper than the façade. Although accessible to beginners, it
    is also a *very capable* and *extremely powerful* development tool.


    FileMaker flattens the learning curve for beginners but also provides an astonishing
    flexibility in structural design options for advanced users. A database can be
    built as a self-contained solution, where the full resource stack of every table,
    layout, and script is all built inside of a *single document file*. Solutions
    built this way can be used like a document file, duplicated and modified like
    a word processing template, or passed on to a colleague like a spreadsheet file.
    They can be stored in your documents folder for personal use or shared across
    a network with other users. More complex solutions may benefit from the compact
    unified design but can optionally reach beyond the confines of the document container
    and become *modular solutions* made up of more than one file. Each module can
    incorporate tables from the others, opening up an enormous set of design choices.
    FileMaker databases can also interface with other ODBC/JDBC database systems and/or
    can act as a data source for other systems. This suggests a staggering number
    of possible design combinations.


    Note


    See Chapter [7](#429700_2_En_7_Chapter.xhtml) for information on adding an external
    table into a FileMaker database using *Open Database Connectivity* (ODBC) or *Java
    Database Connectivity* (JDBC).


    While at the beginning of your FileMaker journey or when contemplating your first
    database, don’t let the complexity of these options be a burden. It is not necessary
    to wrestle with them at first. However, be cognizant of the possibility to expand
    a solution beyond the confines of a single file and push further than the examples
    in this book. What starts as a single file with a handful of tables can evolve
    into a variety of different structural designs. A file can be combined with others,
    split into a *data-separation model* where interface files are linked to separate
    data files, and more. To summarize, a *database solution* can be constructed using
    any combination of any of the following:


    *   A custom single, self-contained, full-stack database


    *   A custom group of full-stack databases linked together


    *   A custom database acting as a back-end data source accessed by FileMaker databases,
    websites, or other platforms


    *   A custom database acting as a front-end interface, incorporating external
    tables from FileMaker databases or other platforms


    *   A custom database serving a specific data or interface function like printing
    specific reports, storing historical data, serving as an access point for mobile
    devices or web browsers, etc.


    *   A Claris starter template used as is or customized


    *   A module purchased from a third-party developer


    *   A file stored locally, hosted on a network server or in the cloud


    ## Reviewing the Product Line


    The FileMaker platform, summarized in Table [1-1](#429700_2_En_1_Chapter.xhtml#Tab1),
    is made up of several applications, each designed to address a specific function
    in *developing*, *using,* and *sharing* databases.


    Table 1-1


    A summary of each product in the FileMaker product line


    | Product Name | Platform(s) | Develop | Use | Share |

    | --- | --- | --- | --- | --- |

    | *FileMaker Pro* | Mac, Windows | Yes | Yes | Limited |

    | *FileMaker Server* | Mac, Windows | No | No | Yes |

    | *FileMaker Cloud* | Linux on AWS | No | No | Yes |

    | *FileMaker Go* | iOS Devices | No | Yes | No |

    | *FileMaker WebDirect* | Web Browser | No | Yes | No |'
