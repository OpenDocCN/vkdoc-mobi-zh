  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文，并保留所有格式和代码块。\n\n\n#### 重新格式化 SELECT\
    \ 语句以提高清晰度\n\n与前面简短易读的示例不同，`SELECT` 语句会迅速变得复杂并换行至多行。有两种技术可用于重新格式化语句并避免视觉混乱：添加额外空格和使用\
    \ `Let` 语句。\n\n##### 使用制表符和段落回车添加额外空格\n\nFileMaker 会忽略 `sqlQuery` 文本字符串中的段落回车和制表符，因此可以使用这些字符将语句分隔成可读的块，如下模式所示。通过组合使用制表符和段落回车，可以将语句的每个子句放在单独的行上，并缩进以使其从外部语句中突出。遵循此模式将使语句更易于阅读：\n\
    \n```\nExecuteSQL ( \"\nSELECT \nFROM \nJOIN  ON \nWHERE \nORDER BY \n\" ; \"\"\
    \ ; \"\" )\n```\n\n当使用多个字段、查找条件或其他组件时，可以将它们推到单独的行上，并进一步缩进以提高清晰度，如下模式所示：\n\n```\n\
    ExecuteSQL ( \"\nSELECT\n,\n,\n\nFROM \nJOIN  ON \nWHERE\n and\n and\n\nORDER\
    \ BY\n,\n\n\" ; \"\" ; \"\" )\n```\n\n##### 使用 LET 语句\n\n消除复杂查询视觉混乱的另一种方法是使用 `Let`\
    \ 语句。整个 `SELECT` 查询可以分部分构建，使用单独的变量，最终组合成单个变量并插入到 `ExecuteSQL` 语句中，如下例所示：\n\n```\n\
    Let ( [\nsFields = \"SELECT \" ;\nsTable = \"FROM  \" ;\nsJoin = \"JOIN  ON  \"\
    \ ;\nsWhere = \"WHERE  \" ;\nsGroup = \"GROUP BY  \" ;\nSQL = sFields & sTable\
    \ & sJoin & sWhere & sGroup\n] ;\nExecuteSQL ( SQL ; \"\" ; \"\" )\n)\n```\n\n\
    提示：创建一个自定义函数来接受字段引用和其他条件，并返回查询语句。\n\n#### 探索别名的好处\n\n`别名`是一个简短的文本字符串，可以在 `SELECT`\
    \ 语句的其他地方充当表名的代理。当一个 `SELECT` 语句包含对多个表的重复引用时（例如在 `JOIN` 子句中，本章稍后讨论），可以使用别名来标识包含某个字段的表。尽管别名可以由任意数量的字符组成，但作为节省空间的方法，越短越好。要建立别名，请在标识表之后使用\
    \ `AS` 子句，并跟一个文本别名，如下模式所示：\n\n```\nSELECT  FROM  AS \n```\n\n例如，要为 `Contact` 表创建别名\
    \ `c`，请按如下格式：\n\n```\nSELECT  FROM Contact AS c\n```\n\n一旦建立了别名 `c`，它就可以在任何子句中用作任何字段名的前缀，以标识该字段所属的表。虽然从单个表中选择字段时不需要别名，但以下示例演示了别名的工作原理。请注意，别名是在语句末尾定义的，但可以在前面的子句中使用。\n\
    \n```\nSELECT c.Notes FROM Contact AS c\n```\n\n当名称中包含空格的字段用双引号括起来时，别名前缀应位于引号外的名称之前。\n\
    \n```\nSELECT c.\\\"Contact First Name\\\" FROM Contact AS c\n```\n\n尽管在以下简短的示例中别名不是必需的，但为了演示带或不带别名的格式，以下每个语句都会生成完全相同的结果：\n\
    \n```\nSELECT Notes FROM Contact\nSELECT Contact.Notes FROM Contact\nSELECT c.Notes\
    \ FROM Contact AS c\n```\n\n注意：别名将在本章后面的更复杂示例中使用。\n\n### 在字段列表中插入文字文本\n\n文字文本字符串可以插入到\
    \ `SELECT` 语句中的字段名称之前、之间和之后，并且会为每条记录重复显示在结果中。文字必须用单引号括起来，并用逗号分隔。此示例演示了在字段结果中插入了一个\
    \ `'Name:'` 标签。\n\n```\nExecuteSQL ( \"\nSELECT\n'Name: ',\n\\\"Contact Name First\\\
    \",\n\\\"Contact Name Last\\\"\nFROM Contact\"\n; \" \" ; \"\" )\n// 结果\nName:\
    \ Cynthia,Johnson\nName: Karen,Camacho\nName: Sandy,Robinson\nName: Thomas,Smithfield\n\
    ```\n\n### 连接结果\n\n查询可以包含使用 `连接`（将事物链接在一起形成链条或系列的操作）将单独的字段值预处理为组合结果的指令。不是接收原始的、逗号分隔的字段名称集（这需要进一步解析和处理），连接提供了更有用的结果。这可以使用\
    \ `+` 或 `||` 运算符来实现，尽管后者更可靠，且不太可能与数学计算中使用的相同运算符混淆。以下示例查询显示了名字和姓氏被连接成一个字符串，并在它们之间插入了一个空格：\n\
    \n```\nExecuteSQL ( \"\nSELECT \\\"Contact Name First\\\" || ' ' || \\\"Contact\
    \ Name Last\\\"\nFROM Contact\n\" ; \"\" ; \"\" )\n// 结果\nCynthia Johnson\nKaren\
    \ Camacho\nSandy Robinson\nThomas Smithfield\n```\n\n或者，使用加号分隔符会产生相同的结果。\n\n```\n\
    SELECT \\\"Contact Name First\\\" + ' ' + \\\"Contact Name Last\\\"\n```\n\n在前面两个简单的示例中，通过在\
    \ `fieldDelimiter` 参数中放置一个空格也可以获得相同的结果。但是，当选择更多字段时，连接允许在不同字段集之间使用不同的分隔符，而字段分隔符对于每个字段都是相同的。以下示例展示了一个更现实的例子，它结合使用连接和自定义分隔符，将联系人的全名和邮寄地址作为三段式结果返回。名字-姓氏和城市-州-邮政编码分别被连接，然后自定义字段和记录分隔符将结果格式化为邮寄地址列表。\n\
    \n```\nExecuteSQL ( \"\nSELECT\n\\\"Contact Name First\\\" + ' ' + \\\"Contact\
    \ Name Last\\\",\n\\\"Contact Address Street\\\",\n\\\"Contact Address City\\\"\
    \ + ', ' +\n\\\"Contact Address State\\\" + ' ' +\n\\\"Contact Address Zip\\\"\
    \nFROM Contact\" ; \"¶\" ; \"¶¶\" )\n// 结果\nCynthia Johnson\n123 Main Street\n\
    Youngstown, OH 44504\nKaren Camacho\n42 Memory Lane\nBrooklyn, NY 11111\nSandy\
    \ Robinson\n631 Front Street\nLafayette, IN 47901\n```\n\n### 使用 WHERE 子句\n\n\
    向 `SELECT` 语句添加 `WHERE` 子句允许查询根据搜索条件定位特定记录。`<formula>` 部分可以包含一个或多个表达式，这些表达式定义了用于匹配记录的条件，通常包括一个字段、一个运算符和一个搜索值。\n\
    \n```\nSELECT  FROM  WHERE \n```\n\n#### 创建包含单个表达式的 WHERE 子句\n\n要将结果限制为来自加利福尼亚州的联系人，`WHERE`\
    \ 公式将由字段名称（如果需要则加引号）、作为运算符的等号和单引号中的 `'CA'` 组成。以下示例通过请求该州内每个联系人的名字和姓氏来演示这一点。请记住，当将其插入到\
    \ `ExecuteSQL` 函数调用中时，整个语句将用引号括起来，并且字段名称周围的引号需要用反斜杠进行转义。\n\n```\nSELECT\n\"Contact\
    \ Name First\",\n\"Contact Name Last\"\nFROM Contact\nWHERE \"Contact Address\
    \ State\" = 'CA'\n```\n\n#### 创建包含多个表达式的 WHERE 子句\n\n对于复杂条件，`WHERE` 子句可以包含多个搜索表达式，这些表达式由比较运算符\
    \ `AND` 或 `OR` 分隔。例如，当搜索居住在一个许多州都有的城市（如 `'Milford'`）的联系人时，使用两个表达式来指定城市和州。为此，在两个表达式之间使用\
    \ `AND` 运算符，要求结果同时匹配两个条件。\n\n```\nWHERE \"Contact Address City\" = 'Milford' AND\
    \ \"Contact Address State\" = 'PA'\n```\n\n类似地，要查找来自两个不同州（例如，来自宾夕法尼亚州或俄亥俄州）的联系人，请使用\
    \ `OR` 运算符以允许结果包含来自任一表达式的结果。\n\n```\nWHERE \"Contact Address State\" = 'PA' OR\
    \ \"Contact Address State\" = 'OH'\n```\n"
- fmt: "# Using the `ORDER BY` Clause\n\nThe `ORDER BY` clause can be added to specify\
    \ result sorting.\n\n```\nSELECT  FROM  ORDER BY \n```\n\nThe following example\
    \ returns a list of the last name of every contact sorted by state.\n\n```\nSELECT\
    \ \"Contact Name Last\" FROM Contact ORDER BY \"Contact Address State\"\n```\n\
    \nCombining the `ORDER BY` with a `WHERE` clause, the following example will return\
    \ the last name of every contact living in a city named ‘Milford’ sorted by state.\n\
    \n```\nSELECT \"Contact Name Last\"\nFROM Contact\nWHERE \"Contact Address City\"\
    \ = 'Milford'\nORDER BY \"Contact Address State\"\n```\n\n# Using the `JOIN` Clause\n\
    \nAdding a `JOIN` clause creates a temporary relationship between two table occurrences\
    \ that exist only during the execution of the SQL query. These are used to select\
    \ fields from two tables and return a blended result. A `JOIN` allows other clauses\
    \ like `WHERE` or `ORDER BY` to refer to fields from either table or both. For\
    \ example, *Contact* records can be selected where related *Company* records are\
    \ located in a specific state and the resulting contact list can be sorted by\
    \ company name. The `JOIN` clause contains the name of a table that should be\
    \ related to the `FROM` table with a formula expressing the criteria that should\
    \ be used to form the temporary relationship. The full formula pattern is shown\
    \ here:\n\n```\nSELECT  FROM  JOIN  ON \n```\n\nThe following example connects\
    \ *Contact* and *Company* tables to select every contact’s first name and their\
    \ related company’s name when the *Contact Company ID* field in *Contacts* (aliased\
    \ `con`) equals the *Record ID* field in *Company* (aliased `com`). It assigns\
    \ an alias to the tables and uses these as a prefix in the field list and the\
    \ join clause.\n\n```\nSELECT\ncon.\"Contact Name First\",\ncom.\"Company Name\"\
    \nFROM Contact AS con\nJOIN Company AS com ON\ncon.\"Contact Company ID\" = com.\"\
    Record ID\"\n```\n\n# Using the `GROUP BY` Clause\n\nAdding a `GROUP BY` clause\
    \ generates an *aggregate value* based on one or more fields. This is a SQL equivalent\
    \ of a native FileMaker summary field (Chapter [8](#429700_2_En_8_Chapter.xhtml));\
    \ both generate a summarization of data based on a sort-grouping field. For example,\
    \ if a *Contact* table had a field named *State* and another named *Invoices*\
    \ that contained a total of a customer’s invoice amounts, the following code *without*\
    \ a `GROUP BY` clause will return a list of each contact record’s *State* and\
    \ *Invoice* amount as shown in the following example:\n\n```\nSELECT State, Invoices\
    \ FROM Contact ORDER BY State\n// Result =\nAK,1000\nAK,500\nAK,250\nAZ,500\n\
    AZ,750\nEtc.\n```\n\nBy using the *Sum* function on the *Invoices* field and adding\
    \ a `GROUP BY` clause that specifies the *State* field, the following example\
    \ would return a summary of invoice amounts, totaled by state. Notice that the\
    \ `ORDER BY` clause is removed from this example. It is not required since the\
    \ `GROUP BY` clause sorts the records in order to group and summarize the results.\n\
    \n```\nSELECT State, Sum ( Invoices ) FROM Contact GROUP BY State\n// Result =\n\
    AK,1750\nAZ,1250\nCA,2500\n```\n\n## Adding a `HAVING` Clause\n\nCombining a `HAVING`\
    \ and `GROUP BY` clause allows the statement to define which *grouped results*\
    \ will be included, acting like a `WHERE` clause but for summarized results. Building\
    \ on the previous example, the following example uses a `HAVING` clause to only\
    \ include results for states where the *summary of Invoices* is greater than a\
    \ certain dollar amount. Here, the summarized entry for `AZ` from the previous\
    \ example has been removed because the summary total of `1250` was under the threshold\
    \ of `1500` that is specified in the `HAVING` clause.\n\n```\nSELECT State, Sum\
    \ ( Invoices ) FROM Contact GROUP BY State HAVING Sum ( Invoices ) > 1500\n--\
    \ Result =\nAK,1750\nCA,2500\n```\n\n# Using the `UNION` Clause\n\nAdding a `UNION`\
    \ clause can combine the results of two or more `SELECT` statements, whether from\
    \ the same table with the same or different criteria or from different tables,\
    \ as long as each selects the same number of fields and each field position is\
    \ the same data type across them all. For example, if the first `SELECT` statement\
    \ returns three fields with the data types of *text*, *number*, and *text*, a\
    \ second `SELECT` statement must also return three fields with the same data types\
    \ in the same order. The following is a simplified pattern of adding `UNION` between\
    \ two `SELECT` statements that doesn’t show other clauses which can be included\
    \ in either or both statements.\n\n```\nSELECT  FROM  UNION SELECT  FROM \n```\n\
    \nBy default, this clause automatically excludes duplicate entries from the merged\
    \ result. Use `UNION ALL` to include all results, even duplicates.\n\n# Limiting\
    \ the Results of a Query\n\nThe `OFFSET` and `FETCH FIRST` clauses can be used\
    \ separately or in unison to control the number of results returned by a query.\n\
    \n## Using the `OFFSET` Clause\n\nThe `OFFSET` clause is used to specify a number\
    \ of records to exclude from the top of the result. This example will exclude\
    \ the first 20 records and return results starting from record 21:\n\n```\nSELECT\
    \ \"Record ID\" FROM Contact OFFSET 20 ROWS\n```\n\n## Using the `FETCH FIRST`\
    \ Clause\n\nThe `FETCH FIRST` clause limits the number of rows returned. This\
    \ example will return only the first ten results:\n\n```\nSELECT \"Record ID\"\
    \ FROM Contact FETCH FIRST 10 ROWS ONLY\n```\n\n## Combining the `OFFSET` and\
    \ `FETCH FIRST` Clauses\n\nA combination of the `OFFSET` and `FETCH FIRST` clauses\
    \ can fetch specific groups of records from the result. This allows subsets of\
    \ results to be extracted in a sequence of small batches, often referred to as\
    \ *paging results*, where each query returns one “page” of results at a time.\
    \ The `OFFSET` portion indicates where the desired group begins, and the `FETCH\
    \ FIRST` portion limits the number of records accessed from that starting point.\
    \ This code shows several examples of accessing batches of records, ten at a time.\n\
    \n```\nSELECT \"Record ID\" FROM Contact FETCH FIRST 10 ROWS ONLY\nSELECT \"Record\
    \ ID\" FROM Contact OFFSET 10 ROWS FETCH FIRST 10 ROWS ONLY\nSELECT \"Record ID\"\
    \ FROM Contact OFFSET 20 ROWS FETCH FIRST 10 ROWS ONLY\nSELECT \"Record ID\" FROM\
    \ Contact OFFSET 30 ROWS FETCH FIRST 10 ROWS ONLY\nSELECT \"Record ID\" FROM Contact\
    \ OFFSET 40 ROWS FETCH FIRST 10 ROWS ONLY\n```\n\nThe first statement returns\
    \ records 1 through 10, the second records 11 through 20, the third records 21\
    \ through 30, and so on. Using this technique, interface elements can allow a\
    \ user to click back and forth through groups of results one “page” at a time.\n\
    \n# Accessing the Database Schema\n\nThe `ExecuteSQL` function has the ability\
    \ to access two system tables which provide meta-information about the database’s\
    \ schema: `FileMaker_Tables` and `FileMaker_Fields`. These tables can be used\
    \ in a `SELECT` statement as if they were custom table occurrences to access information\
    \ about the tables and fields that make up the database structure."
