    Found Set* menu instead of *Perform Find*. Records in the last found set without
    the matching criteria will be removed. For example, if viewing a result set of
    records with a *Company* of “Widget,” enter Find mode, type “CO” in the *State*
    field, and then select *Constrain Found Set*. The resulting found set will retain
    only the contacts from the previous found set that are from Colorado.


    #### Managing Multiple Find Requests


    Find mode creates a single default find request. This can be expanded to create
    more complex searches. Each request provides one additional set of criteria defining
    values that indicate if a matching record should be included or omitted from the
    result. The results of all requests are combined into the final result. So, if
    one request specifies records with a *State* of “NY” and another specifies records
    with a *State* of “CO,” the result will be a combined list of those two sets of
    records. A single request containing multiple field criteria acts as an “and”
    type search where a record must have all the values to be included in the result.
    In other words, it must contain the specified value in one field *and* the specified
    value in another. Conversely, multiple requests act as an “or” type search, where
    a record must match all the criteria of at least one request. In other words,
    it must contain specified values from one request *or* specified values from another
    request.


    Users can *create*, *delete,* and *duplicate* find requests just like they can
    do with records except that they are accessed through a *Requests* menu, which
    replaces the *Records* menu while in Find mode. Some of these are also accessible
    through a toolbar icon or the *record contextual menu* on the background of a
    layout.


    #### Specifying a Matching Record Option


    Every new find request has a default *Matching Record option* set to “Include”
    which means that records matching the request criteria will be included in the
    results. If this option is toggled to “Omit” in the lower toolbar, then matching
    records will be excluded from the results of the previous request(s). In the examples
    shown in Figure [4-8](#429700_2_En_4_Chapter.xhtml#Fig8), the first request will
    include every record with “Widget” in the *Company* field, and the second request
    will omit from that set any matches with a *First Name* of “Jim.” The results
    will be all contacts working for Widget company except for Jim. Using this setting
    with multiple find requests makes it possible to construct and perform extremely
    complex include-omit multi-criteria searches.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig8_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    An example of a second find request set to omit results'
  trans: '

    ### 使用搜索运算符


    *搜索运算符*是用于精确限定字段中输入搜索条件范围的一个或一组字符。若不使用运算符，FileMaker 默认执行“开头为”类型的搜索，即匹配单词开头的文本。因此，搜索`Widget`、`Wid
    Manu`或`W M`均能查找到字段中包含`Widget Manufacturing`的记录。在**查找模式**下，可通过直接在字段中输入运算符、使用工具栏中的*插入运算符*菜单或从字段的上下文菜单中选择*运算符*子菜单，将运算符添加到字段中，具体运算符将在表
    4-1 中说明。要查看运算符的实际效果，请在*公司*字段中输入感叹号（`!`），以查找所有包含重复值的记录；或者在*姓氏*字段中搜索`*n`，以查找名称以此字符结尾的记录。


    **表 4-1** 查找模式下的可用运算符说明


    | 运算符 | 说明                                                                                                                                                                                                                          |

    |--------|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|

    | `=`    | 单独使用，查找该字段为空的记录。放在值前面，匹配字段中的完整单词，排除部分匹配。                                                                                                                                                |

    | `==`   | 放在值前面，匹配字段中的整个短语。                                                                                                                                                                                            |

    | `!`    | 查找该字段中存在重复值的记录，即该字段的值在其他记录中也存在。                                                                                                                                                                  |

    | `<`    | 查找数值或文本值小于符号后输入值的记录。                                                                                                                                                                                      |

    | `≤`    | 查找数值或文本值小于或等于符号后输入值的记录。                                                                                                                                                                                |

    | `>`    | 查找数值或文本值大于符号后输入值的记录。                                                                                                                                                                                      |

    | `≥`    | 查找数值或文本值大于或等于符号后输入值的记录。                                                                                                                                                                                |

    | `...`  | 根据运算符前后输入的文本查找一系列值。例如，输入`1/15/2021…1/30/2021`（不含引号），可查找字段中包含所列两个日期之间（含这两个日期）日期的所有记录。                                                                            |

    | `//`   | 查找字段中包含当天日期的记录。                                                                                                                                                                                                |

    | `?`    | 查找字段中包含无效值的记录。                                                                                                                                                                                                  |

    | `@`    | 查找字段中包含特定数量任意字符的记录。例如，`@@`将匹配`He`或`It`，而`@@@@`将匹配`Door`或`Test`。                                                                                                                             |

    | `#`    | 查找字段中包含特定数量任意数字的记录。例如，`#`将匹配`3`或`8`，而`##`将匹配`33`或`81`。                                                                                                                                       |

    | `*`    | 用于代替字符创建搜索模式，表示必须存在某些值。例如，单独使用将查找该字段包含任何值的所有记录（即排除空值）；或输入`1/15/*`，可查找字段中包含任意年份
    1 月 15 日的所有记录。                                                         |

    | `\`    | 对下一个字符进行转义。当搜索字面运算符时非常有用，可将运算符视为搜索条件的一部分而非运算符。例如，要查找字段中包含引号的记录，请输入`\"`。                                                                                   |

    | `` `"" `` | 用于精确匹配引号之间的短语。                                                                                                                                                                                                  |

    | `*""`  | 用于匹配包含大量文本的字段中任意位置的引号之间的短语。                                                                                                                                                                        |

    | `~`    | 用于对日文文本执行宽松搜索。                                                                                                                                                                                                  |


    ### 操作先前执行的查找


    执行查找后，FileMaker 提供了三种无需从头创建新请求即可进一步优化结果的方法：*修改*、*扩展*和*约束*上一次的查找结果。


    #### 修改上一次查找


    *修改上一次查找*功能会重建在当前表中执行的最后一次查找的查找请求和条件，并允许编辑条件并执行修改后的搜索。此命令可通过*记录*菜单、工具栏中*查找*图标下的菜单或作为脚本中可包含的步骤来使用。


    #### 扩展上一次查找


    *扩展查找结果集*命令使用新的搜索来查找匹配的记录并将其添加到当前查找结果集中。可通过两种方式访问。在**浏览模式**下，选中字段中的某些文本，然后从上下文菜单中选择`命令`。系统会使用选中的文本来查找不在结果集中的记录并将其添加进来。在**查找模式**下，输入条件并选择*请求
    ➤ 扩展查找结果集*菜单（而非*执行查找*）。结果将添加到当前结果集中。例如，如果当前查看的查找结果集中记录的*州*为`NY`，则进入查找模式，在*州*字段中输入`CO`，然后选择*扩展查找结果集*，结果将得到一个来自*两个州*的联系人扩展列表。


    #### 约束上一次查找


    *约束查找结果集*命令使用新的请求从当前结果集中移除记录。可通过两种方式访问。在**浏览模式**下，选中字段中的某些文本，然后从字段上下文菜单中选择*约束查找结果集*。系统会使用选中的文本在当前结果集中仅保留包含匹配值的记录。在**查找模式**下，输入条件并选择*请求
    ➤ 约束查找结果集*菜单（而非*执行查找*）。上次结果集中不匹配条件的记录将被移除。例如，如果当前查看的结果集中记录的*公司*为`Widget`，则进入查找模式，在*州*字段中输入`CO`，然后选择*约束查找结果集*，最终的结果集将仅保留上一次结果集中来自科罗拉多州的联系人。


    ### 管理多个查找请求


    查找模式会创建一个默认的查找请求。可扩展此请求以创建更复杂的搜索。每个请求都提供一组额外的条件，用于定义匹配记录应包含在结果中还是从中排除。所有请求的结果将被合并为最终结果。因此，如果一个请求指定了*州*为`NY`的记录，另一个请求指定了*州*为`CO`的记录，则结果将是这两组记录的合并列表。包含多个字段条件的单个请求相当于“与”类型搜索，记录必须满足所有值才能包含在结果中。换句话说，它必须在一个字段中包含指定值*并且*在另一个字段中包含指定值。相反，多个请求则相当于“或”类型搜索，记录必须至少满足一个请求的所有条件。换句话说，它必须包含来自一个请求的指定值*或者*来自另一个请求的指定值。


    用户可以像操作记录一样*创建*、*删除*和*复制*查找请求，不同之处在于这些操作通过*请求*菜单访问，该菜单在查找模式下会替代*记录*菜单。其中一些操作也可通过工具栏图标或布局背景上的*记录上下文菜单*访问。


    ### 指定匹配记录选项


    每个新查找请求都有一个默认的*匹配记录选项*，设置为`包含`，这意味着匹配请求条件的记录将包含在结果中。如果在下部工具栏中将此选项切换为`排除`，则匹配的记录将从之前请求的结果中排除。在图
    4-8 所示的示例中，第一个请求将包含*公司*字段中所有包含`Widget`的记录，第二个请求将从该结果集中排除任何*名字*为`Jim`的匹配项。最终结果将是所有为
    Widget 公司工作（除了 Jim）的联系人。将此设置与多个查找请求结合使用，可以构建并执行极其复杂的包含-排除多条件搜索。


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig8_HTML.jpg](img/429700_2_En_4_Fig8_HTML.jpg)


    **图 4-8** 设置为排除结果的第二个查找请求示例

