- fmt: '#### Configuring Database Network Access Settings


    The bottom half of the `FileMaker Network Settings` dialog includes a list of
    files open locally and allows network access settings to be configured in the
    adjacent panel. These settings control client access when the database is hosted
    by `FileMaker Server`, `FileMaker Cloud`, or a peer-enabled copy of the `FileMaker
    Pro` desktop application. With a file selected, choose which users can connect
    to the selected file from another workstation. Select `All Users` to allow any
    user who enters valid credentials to access the selected file. Select `Specify
    users by privilege set` to limit access to specific privilege sets you select.
    The default selection for a new file is `No users` which will deny all access
    to the file, i.e., you can open it but it will not be shared. The `Don''t display
    in Launch Center` checkbox will hide the file from remote users in the `Hosts`
    dialog. A user must manually enter the name and address of the file in order to
    open it directly. This setting can be used to increase security or exclude from
    the list of available files any background data files that open automatically
    when another database using its tables opens.


    **Note**: Similar dialogs accessed from the `File ➤ Sharing` menu are used to
    configure the database’s ODBC/JDBC and `WebDirect` settings.


    ### Opening a Hosted Database


    To open a hosted file with the `FileMaker Pro` desktop application, select the
    `File ➤ Hosts ➤ Show Hosts` menu, or click the `Hosts` button on the `Open File`
    dialog. This opens a `Hosts` dialog listing files available from hosts instead
    of folder directories, shown in Figure 29-5. The sidebar contains three collapsible
    groups. Click `Claris ID` to access databases hosted on a `FileMaker Cloud` account.
    Cloud hosted files can also be opened from the `My Apps` section of the `Launch
    Center`. Access a local peer or `FileMaker Server` host by clicking on the `Local`
    group and selecting a database. Files from any host can be assigned a favorite
    status by selecting `Add to Favorites` from the contextual menu when right-clicking
    on a file in the list. These will appear in a list under the `Favorites` tab.


    ![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig5_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig5_HTML.jpg)


    **Figure 29-5** The dialog used to open a hosted database


    ## Hosting with FileMaker Server


    `FileMaker Server` is a fast, reliable, and scalable server software package that
    securely shares database files across a network. The server has powerful features
    and benefits including:


    - Reliable, full-time serving of databases to users of any of the `FileMaker`
    product line running on macOS, Windows, or iOS.

    - Multiple, flexible licensing options that can be mixed and matched to suit the
    needs of your individual team members.

    - Share databases on the Web without web programming using `FileMaker WebDirect`,
    or use `Custom Web Publishing` to create data-driven websites with PHP or XML.

    - Use `Open Database Connectivity` (ODBC) and `Java Database Connectivity` (JDBC)
    to share hosted databases remote systems.

    - Monitor and manage the server locally or remotely using either the `Admin Console`
    web interface or the `fmsadmin` command line.

    - Automate administration tasks with automatic database backups and scheduled
    scripts.

    - Scripts can be offloaded from the client’s software to run on the server using
    the `Perform Script On Server` step.


    **Note**: For more information beyond the hosting basics described in this section,
    consult the `FileMaker Server` product support section located at `https://www.claris.com/resources/documentation/`.


    ### Preparing a Host Computer


    There are many important considerations when choosing a computer for use as a
    server host. The computer should have a fast processor, plenty of RAM, and a solid-state
    hard drive. Connect it to a network using a wired, high-speed, dedicated network
    connection, and ideally assign it a static IP address. To allow for priority use
    of the processor, hard disk, and network capacity, dedicate the computer *exclusively*
    for hosting databases. To avoid corruption, the folder containing hosted databases
    should *not* be backed up directly. Instead, use `FileMaker Server`’s built-in
    scheduled backup feature, and then make additional copies of those backups to
    other drives. Also, disable screen savers and energy-saving hibernation features
    in favor of monitor diming. Turn off indexing services such as the macOS `Spotlight`
    feature, and don’t use antivirus software scans.


    **Tip**: Always check the Claris website for the minimum hardware requirements
    for a server and other server recommendations.


    #### Defining Installed Resources


    `FileMaker Server` isn’t a traditional application and will not appear in the
    computer’s `Applications` folder. Instead, the following resources will be installed:


    - `Database Server` – Hosts the databases, sharing them with `FileMaker Pro` and
    `FileMaker Go` clients.

    - `Web Publishing Engine` – Handles the `WebDirect` services, managing traffic
    between a `Web Server` and the `Database Server`.

    - `Web Server` – macOS uses its own copy of the Apache web server. On Windows,
    the `Internet Information Services` is enabled during installation and used as
    the web server.

    - `PHP Engine` – Used to route calls for the `FileMaker API` to the `Web Publishing
    Engine`.

    - `Admin Console` – Accessed through a web browser on the server or a client computer,
    this is used to configure and administer the server.

    - `Command-Line Interface Executable` – The `fmsadmin` commands are used to administer
    the server through a command-line interface.

    - `User Account` – Specifies an account under which the server will run. The default
    choice on macOS is a new `fmserver` user created by the installer, and on Windows,
    the `Local System`. A custom account can be specified instead, if desired.

    - `User Group` – A new user group called `fmsadmin` is created and must be assigned
    to hosted database files.


    ### Accessing the Admin Console


    The `Admin Console` is used to administer the server and is accessible through
    a web browser. After installation of the server, a bookmark to the local host
    will be found on the server computer’s desktop. The console can also be accessed
    by opening a web browser and entering:


    ```

    http://localhost:16001/admin-console

    ```


    To access it from another computer, replace the `localhost` with the following
    server address:


    ```

    https://10.0.1.20:16000/admin-console

    https://10.0.1.20/admin-console

    ```


    When the console page opens and requests authentication, enter the administrator
    name and password you defined during installation. Server administration controls
    are organized across six tabbed pages:


    - `Dashboard` – Summarizes server information and status

    - `Databases` – Lists all installed databases and actively connected clients,
    with controls to manage databases and communicate with or disconnect clients

    - `Backups` – Used to schedule and view backups

    - `Configuration` – Contains general settings, clients, folders, scheduled scripts,
    notifications, certificates, and logging

    - `Connectors` – Contains settings for `Web Publishing`, `FileMaker Data API`,
    Plug-ins, and ODBC/JDBC connections

    - `Administration` – Contains license, admin password, and external authentication
    settings


    ### Uploading Files to a FileMaker Server


    Database files can be added to the server by manually moving them into the `Databases`
    folder or uploading them from a client computer through the `FileMaker Pro` desktop
    application.'
