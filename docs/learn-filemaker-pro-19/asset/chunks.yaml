  trans: "\n### 对查找集中的记录进行排序\n\n`记录排序状态`始终显示在工具栏的记录导航区域中，如图 4-13 所示。记录默认按创建顺序排列，这被视为`未排序`。可以根据自定义的排序字段列表对其进行排序，该列表可以使用`排序记录`对话框（如图\
    \ 4-14 所示）从本地或关联字段中编译。该对话框可通过在`记录`菜单或记录上下文菜单中选择`排序记录`命令来打开，也可以通过单击工具栏中的`排序`按钮来打开。\n\
    \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig14_HTML.jpg](img/429700_2_En_4_Fig14_HTML.jpg)\n\
    \n图 4-14\n\n用于排序记录的对话框\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig13_HTML.jpg](img/429700_2_En_4_Fig13_HTML.jpg)\n\
    \n图 4-13\n\n排序状态始终显示在工具栏的记录计数区域\n\n以下排序控件可用：\n\n1. `字段选择器` – 从基于上方弹出菜单中选择的表或布局的列表中选择一个字段。\n\
    \n2. `排序顺序` – 按将用于排序记录的顺序列出当前的`排序字段`。通过在字段选择器中双击字段或使用`移动`按钮来添加字段。向上或向下拖动以重新排列。通过在此处双击或使用`清除`按钮来移除字段。要移除所有字段，请单击`全部清除`。\n\
    \n3. `排序字段方向` – 选择选定字段的排序方向：`升序`（默认）、`降序`或`基于值列表的自定义顺序`（第 11 章）。排序顺序列表中的字段旁边会显示图标，以指示分配了哪个选项。\n\
    \n4. `排序选项复选框` – 启用高级排序控制：\n   * `基于汇总字段重新排序` – 选择一个汇总字段（第 8 章），根据排序字段的值由另一个排序字段进行子汇总后的位置来重新排序记录。例如，联系人列表可以按州（排序字段）进行汇总，但按居住在每个州的联系人数量（汇总字段）进行排序。\n\
    \   * `排序时覆盖字段的语言` – 选择在排序时用于对文本字段建立索引的语言。\n\n5. `保持记录排序顺序` – 取消选择可防止在修改排序字段的内容时记录不断重新排序。\n\
    \n### 修改查找集中的字段值\n\n有多个命令可用于修改整个查找集中的字段值：`替换字段内容`、`重新查找字段内容`、`查找和替换`以及`拼写检查`。\n\
    \n#### 替换字段内容\n\n`记录`菜单下的`替换字段内容`命令会打开如图 4-15 所示的对话框。此命令用于定义一个值，该值将插入到查找集中每条记录的当前字段中，完全替换之前的值。替换值可以是当前记录字段中包含的字面值；一个从第一个记录指定数字开始，并为每个后续记录递增指定数量的序列号；或者是一个计算结果（第\
    \ 12 章）。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig15_HTML.jpg](img/429700_2_En_4_Fig15_HTML.jpg)\n\
    \n图 4-15\n\n用于定义替换值的对话框\n\n警告\n\n替换过程不可撤销，应谨慎使用。使用自定义菜单（第 23 章）向不需要此功能的用户隐藏此功能，并创建自定义脚本（第\
    \ 24 章）来安全地执行开发者定义的替换。\n\n#### 重新查找字段内容\n\n当一个字段被定义为使用`查找`功能（第 8 章，“字段查找对话框”）从相关记录复制数据时，可以使用`重新查找字段内容`命令手动强制更新查找集中每条记录的已复制值。\n\
    \n警告\n\n`查找`功能是在更优秀的自动输入选项和关系出现之前的遗留残余。\n\n#### 查找和替换\n\nFileMaker 的`查找和替换`功能让人联想到文本编辑器中的相应功能。它可以在当前查找集的一条或所有记录的一个或所有字段中定位文本，并可选择用替代文本替换匹配项。通过`编辑`菜单中的`查找/替换`功能将打开同名的对话框，如图\
    \ 4-16 所示。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig16_HTML.jpg](img/429700_2_En_4_Fig16_HTML.jpg)\n\
    \n图 4-16\n\n用于查找和替换文本的对话框\n\n首先，在`查找内容`字段中输入文本，并可选择在`替换为`字段中输入文本。`方向`弹出菜单提供了在查找集中的字段和/或记录中`向前`或`向后`移动的选项。勾选`区分大小写`复选框可使查找过程区分大小写；勾选`仅全字匹配`则仅当字段中的文本完全包含输入到`查找内容`字段中的完整、独立的单词时才视为匹配。`搜索范围`单选按钮指示该功能是应搜索查找集中的`所有记录`还是仅限于`当前记录`。`搜索区域`选项控制它是应搜索布局上的`所有字段`还是仅搜索`当前字段`。\n\
    \n配置完成后，`查找下一个`按钮会定位并高亮显示当前字段、下一个字段或下一个记录中`查找内容`字段文本的下一个实例，具体取决于对话框中的其他设置。`替换并查找`按钮会定位第一个匹配实例（如果尚未找到），或者用替换文本替换当前高亮显示的匹配文本，然后定位下一个匹配实例。如果查找操作已选定搜索文本的一个匹配实例，则`替换`按钮会执行替换功能。之后，光标会立即出现在替换文本之后。`全部替换`按钮会根据对话框中的设置替换搜索文本的所有匹配实例。\n"
- fmt: "### Spell-checking\n\nFileMaker has an integrated spell-checker that can process\
    \ a piece of selected text, the contents of a field, every field on the current\
    \ record, or all records in the found set.\n\n#### Exploring the Spelling Menu\n\
    \nThe `Spelling` submenu of the `Edit` menu has several commands for standard\
    \ spell-checking functionality. The `Check Selection` command quickly spell-checks\
    \ selected text in the current field. `Check Record` checks the text in every\
    \ field on the layout for the current record, and `Check All` checks every field\
    \ on the current layout for every record in the found set. The `Correct Word`\
    \ command checks the last word typed in a field but is only enabled when the `Check\
    \ spelling as you type` setting is set to `Beep on questionable spellings` (Chapter\
    \ [6](#429700_2_En_6_Chapter.xhtml), “File Options: Spelling”). You can `Select\
    \ Dictionaries` to choose a language and `Edit User Directory` to add custom terms\
    \ to the user dictionary.\n\n#### Contextual Spelling Features\n\nWhen the `Indicate\
    \ questionable words with special underline` file option is enabled, any questionable\
    \ words in the active field will be marked with a red underline. This option applies\
    \ to an entire file but can be turned off for individual fields on a layout (Chapter\
    \ [19](#429700_2_En_19_Chapter.xhtml), “Inspecting the Data Settings”). When on,\
    \ a list of suggested spellings and alternate words are available at the top of\
    \ the text contextual menu for the selected word, shown in Figure [4-17](#429700_2_En_4_Chapter.xhtml#Fig17).\n\
    \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig17_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig17_HTML.jpg)\n\
    \nFigure 4-17\n\nA contextual menu shows alternative spellings for questionable\
    \ words\n\n## Printing\n\nThe content area of a window can be previewed and printed\
    \ using familiar operating system `Page Setup` and `Print` dialogs.\n\n### Using\
    \ Preview Mode\n\n`Preview mode` is a transitional window state that changes the\
    \ menu, toolbar, and content area for the purpose of viewing a layout in preparation\
    \ for sending it to a printer or saving as a PDF file. To preview a layout, select\
    \ `Preview Mode` from the `View` menu, or click the `Preview` toolbar icon. The\
    \ toolbar options will change to print related functionality, and the content\
    \ area will become one or more non-interactive, non-editable pages rendered exactly\
    \ as they will appear when printed. Any interactive objects such as buttons, tabs,\
    \ slide controls, etc. will be displayed as a nonfunctional artwork. Depending\
    \ on the settings of each layout object, some objects and data may be invisible,\
    \ reformatted, slide into a new position, or be cut off at the page margins.\n\
    \n#### Status Toolbar (Preview Mode)\n\nThe Preview mode toolbar will change to\
    \ print-specific buttons, either default options or the user’s customized set.\n\
    \n##### Default Status Toolbar Items (Preview Mode)\n\nThe default toolbar for\
    \ Preview mode is shown in Figure [4-18](#429700_2_En_4_Chapter.xhtml#Fig18).\
    \ Similar to Browse mode, the top portion can be customized, and the bottom is\
    \ static.\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig18_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig18_HTML.jpg)\n\
    \nFigure 4-18\n\nThe anatomy of the toolbar in Preview mode\n\n###### Navigation\
    \ Controls\n\nThe `navigation controls` in the Preview mode toolbar are similar\
    \ to those in Browse and Find modes except that they display information about\
    \ and allow movement between `print pages` instead of records or find requests.\
    \ At first, the page count may be displayed as a question mark if the entire document\
    \ has not yet been rendered. Click through pages or scroll to the end to update.\n\
    \n###### Function Buttons\n\nThe function buttons included in the default Preview\
    \ toolbar are:\n\n- `Save as Excel` – Export the records into an Excel file\n\
    - `Save as PDF` – Save the preview as a PDF file\n- `Print` – Open the dialog\
    \ to send the preview to a printer\n- `Page Setup` – Open the dialog to configure\
    \ page setup to change the rendering\n\n###### Exit Preview Button\n\nThe `Exit\
    \ Preview button` will end the preview and return the window to Browse mode.\n\
    \n##### Customizing the Status Toolbar (Preview Mode)\n\nThe Preview mode toolbar\
    \ is customizable at the user-computer level. Enter Preview mode and select the\
    \ `View ➤ Customize Toolbar` menu to open the customization panel attached to\
    \ the window as shown in Figure [4-19](#429700_2_En_4_Chapter.xhtml#Fig19). Although\
    \ the available buttons are different, they can be added or removed as described\
    \ for Browse mode in Chapter [3](#429700_2_En_3_Chapter.xhtml).\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig19_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig19_HTML.jpg)\n\
    \nFigure 4-19\n\nThe toolbar customization panel for Preview mode\n\n### Page\
    \ Setup\n\nThe `Page Setup` dialog (`Print Setup` in Windows) is a standard operating\
    \ system dialog used to configure how the current layout will behave when previewing\
    \ or printing, shown in Figure [4-20](#429700_2_En_4_Chapter.xhtml#Fig20). This\
    \ can be accessed in Browse, Preview, or Layout mode by selecting Page Setup in\
    \ the File menu. Here you can choose a `printer`, `paper size`, `orientation`,\
    \ and `scale percentage`.\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig20_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig20_HTML.jpg)\n\
    \nFigure 4-20\n\nThe dialog to configure page setting\n\n### Print Dialog Options\n\
    \nThe `Print` dialog is a standard operating system dialog for configuring a print\
    \ job, shown in Figure [4-21](#429700_2_En_4_Chapter.xhtml#Fig21). This can be\
    \ opened by selecting `Print` in the `File` menu or clicking `Print` in the Preview\
    \ mode toolbar.\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig21_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig21_HTML.jpg)\n\
    \nFigure 4-21\n\nThe dialog for preparing a job to send to a printer\n\nWhile\
    \ most of the options are identical to other applications, a few are specific\
    \ to FileMaker. The `Number pages from` field accepts a page number that will\
    \ be considered the first page for numbering purposes. Three print options determine\
    \ how the content area of the window will be printed. Choose `Records being browsed`\
    \ to include every record in the found set or `Current record` to include only\
    \ the current record selected or in view when the Print dialog was opened. Choose\
    \ `Blank record, showing fields` to print the layout without any record data.\
    \ The adjacent menu controls how fields will be printed: `as formatted`, `with\
    \ boxes`, `with underlines`, or `with placeholder text`.\n\n## Summary\n\nThis\
    \ chapter explored how users interact with records to enter data, perform searches,\
    \ and print. In the next chapter, we focus on importing and exporting records.\n\
    \n# 5. Transferring Records\n\nFileMaker has `import` and `export` functions that\
    \ transfer records between two locations, manually or through an automatic scripted\
    \ process. This allows sharing data to avoid retyping, moving template data into\
    \ a content table for customizing, migrating old data into a newer version of\
    \ a database, sending data to other systems, and more. This chapter discusses\
    \ the following data transfer topics:\n\n- Supported file types\n- Importing records\n\
    - Exporting records\n\n## Supported File Types\n\nFileMaker can `import and export\
    \ records` in several formats, shown in Figure [5-1](#429700_2_En_5_Chapter.xhtml#Fig1).\
    \ In addition, `content imports` are supported from ODBC and XML sources, or a\
    \ folder containing picture, movie, or text files.\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig1_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nThe file types supported for record import (left) and export (right)\n\
    \n> **Note**  \nThe new `Custom-Separated Values` import option allows a selection\
    \ of delimiter and replaces the former `Tab-Separated Values`."
  raw: '#### Spell-checking


    FileMaker has an integrated spell-checker that can process a piece of selected
    text, the contents of a field, every field on the current record, or all records
    in the found set.


    ##### Exploring the Spelling Menu


    The *Spelling* submenu of the *Edit* menu has several commands for standard spell-checking
    functionality. The *Check Selection* command quickly spell-checks selected text
    in the current field. *Check Record* checks the text in every field on the layout
    for the current record, and *Check All* checks every field on the current layout
    for every record in the found set. The *Correct Word* command checks the last
    word typed in a field but is only enabled when the *Check spelling as you type*
    setting is set to *Beep on questionable spellings* (Chapter [6](#429700_2_En_6_Chapter.xhtml),
    “File Options: Spelling”). You can *Select Dictionaries* to choose a language
    and *Edit User Directory* to add custom terms to the user dictionary.


    ##### Contextual Spelling Features


    When the *Indicate questionable words with special underline* file option is enabled,
    any questionable words in the active field will be marked with a red underline.
    This option applies to an entire file but can be turned off for individual fields
    on a layout (Chapter [19](#429700_2_En_19_Chapter.xhtml), “Inspecting the Data
    Settings”). When on, a list of suggested spellings and alternate words are available
    at the top of the text contextual menu for the selected word, shown in Figure
    [4-17](#429700_2_En_4_Chapter.xhtml#Fig17).


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig17_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig17_HTML.jpg)


    Figure 4-17


    A contextual menu shows alternative spellings for questionable words


    ## Printing


    The content area of a window can be previewed and printed using familiar operating
    system *Page Setup* and *Print* dialogs.


    ### Using Preview Mode


    *Preview mode* is a transitional window state that changes the menu, toolbar,
    and content area for the purpose of viewing a layout in preparation for sending
    it to a printer or saving as a PDF file. To preview a layout, select *Preview
    Mode* from the *View* menu, or click the *Preview* toolbar icon. The toolbar options
    will change to print related functionality, and the content area will become one
    or more non-interactive, non-editable pages rendered exactly as they will appear
    when printed. Any interactive objects such as buttons, tabs, slide controls, etc.
    will be displayed as a nonfunctional artwork. Depending on the settings of each
    layout object, some objects and data may be invisible, reformatted, slide into
    a new position, or be cut off at the page margins.


    #### Status Toolbar (Preview Mode)


    The Preview mode toolbar will change to print-specific buttons, either default
    options or the user’s customized set.


    ##### Default Status Toolbar Items (Preview Mode)


    The default toolbar for Preview mode is shown in Figure [4-18](#429700_2_En_4_Chapter.xhtml#Fig18).
    Similar to Browse mode, the top portion can be customized, and the bottom is static.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig18_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig18_HTML.jpg)


    Figure 4-18


    The anatomy of the toolbar in Preview mode


    ###### Navigation Controls


    The *navigation controls* in the Preview mode toolbar are similar to those in
    Browse and Find modes except that they display information about and allow movement
    between *print pages* instead of records or find requests. At first, the page
    count may be displayed as a question mark if the entire document has not yet been
    rendered. Click through pages or scroll to the end to update.


    ###### Function Buttons


    The function buttons included in the default Preview toolbar are


    *   *Save as Excel* – Export the records into an Excel file


    *   *Save as PDF* – Save the preview as a PDF file


    *   *Print* – Open the dialog to send the preview to a printer


    *   *Page Setup* – Open the dialog to configure page setup to change the rendering


    ###### Exit Preview Button


    The *Exit Preview button* will end the preview and return the window to Browse
    mode.


    ##### Customizing the Status Toolbar (Preview Mode)


    The Preview mode toolbar is customizable at the user-computer level. Enter Preview
    mode and select the *View ➤ Customize Toolbar* menu to open the customization
    panel attached to the window as shown in Figure [4-19](#429700_2_En_4_Chapter.xhtml#Fig19).
    Although the available buttons are different, they can be added or removed as
    described for Browse mode in Chapter [3](#429700_2_En_3_Chapter.xhtml).


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig19_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig19_HTML.jpg)


    Figure 4-19


    The toolbar customization panel for Preview mode


    ### Page Setup


    The *Page Setup* dialog (*Print Setup* in Windows) is a standard operating system
    dialog used to configure how the current layout will behave when previewing or
    printing, shown in Figure [4-20](#429700_2_En_4_Chapter.xhtml#Fig20). This can
    be accessed in Browse, Preview, or Layout mode by selecting Page Setup in the
    File menu. Here you can choose a *printer*, *paper size*, *orientation,* and *scale
    percentage*.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig20_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig20_HTML.jpg)


    Figure 4-20


    The dialog to configure page setting


    ### Print Dialog Options


    The *Print* dialog is a standard operating system dialog for configuring a print
    job, shown in Figure [4-21](#429700_2_En_4_Chapter.xhtml#Fig21). This can be opened
    by selecting *Print* in the *File* menu or clicking *Print* in the Preview mode
    toolbar.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig21_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig21_HTML.jpg)


    Figure 4-21


    The dialog for preparing a job to send to a printer


    While most of the options are identical to other applications, a few are specific
    to FileMaker. The *Number pages from* field accepts a page number that will be
    considered the first page for numbering purposes. Three print options determine
    how the content area of the window will be printed. Choose *Records being* *browsed*
    to include every record in the found set or *Current record* to include only the
    current record selected or in view when the Print dialog was opened. Choose *Blank
    record, showing fields* to print the *layout* without any record data. The adjacent
    menu controls how fields will be printed: *as formatted*, *with boxes*, *with
    underlines*`,` or *with placeholder text*.


    ## Summary


    This chapter explored how users interact with records to enter data, perform searches,
    and print. In the next chapter, we focus on importing and exporting records.


    # 5. Transferring Records


    FileMaker has *import* and *export* functions that transfer records between two
    locations, manually or through an automatic scripted process. This allows sharing
    data to avoid retyping, moving template data into a content table for customizing,
    migrating old data into a newer version of a database, sending data to other systems,
    and more. This chapter discusses the following data transfer topics:


    *   Supported file types


    *   Importing records


    *   Exporting records


    ## Supported File Types


    FileMaker can *import and export records* in several formats, shown in Figure
    [5-1](#429700_2_En_5_Chapter.xhtml#Fig1). In addition, *content imports* are supported
    from ODBC and XML sources, or a folder containing picture, movie, or text files.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig1_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The file types supported for record import (left) and export (right)


    Note


    The new *Custom-Separated Values* import option allows a selection of delimiter
    and replaces the former *Tab-Separated Values*.'
  trans: "\n### 拼写检查\n\nFileMaker 内置了拼写检查器，可对选定的文本片段、某个字段的内容、当前记录中的所有字段，或已找到记录集中的所有记录进行处理。\n\
    \n#### 探索“拼写”菜单\n\n“编辑”菜单下的“拼写”子菜单提供了若干命令，用于实现标准拼写检查功能。“检查所选内容”命令可快速检查当前字段中选定文本的拼写。“检查记录”会检查布局上当前记录中每个字段的文本，而“检查全部”则会对已找到记录集中每条记录的当前布局中的所有字段进行检查。“纠正单词”命令会检查字段中最后输入的单词，但仅当“键入时检查拼写”设置设为“对可疑拼写发出提示音”时（第\
    \ 6 章，“文件选项：拼写”），该命令才可用。你可以使用“选择词典”来选择语言，并通过“编辑用户词典”将自定义术语添加到用户词典中。\n\n#### 上下文拼写功能\n\
    \n当启用了“用特殊下划线标出可疑单词”文件选项时，活动字段中的任何可疑单词都会用红色下划线标记出来。此选项适用于整个文件，但可以在布局上针对个别字段将其关闭（第\
    \ 19 章，“检查数据设置”）。启用后，所选单词的文本上下文菜单顶部会显示一个建议拼写和替代单词列表，如图 4-17 所示。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig17_HTML.jpg](img/429700_2_En_4_Fig17_HTML.jpg)\n\
    \n图 4-17\n\n上下文菜单显示可疑单词的替代拼写\n\n## 打印\n\n可以使用熟悉的操作系统“页面设置”和“打印”对话框来预览和打印窗口的内容区域。\n\
    \n### 使用预览模式\n\n“预览模式”是一种过渡性窗口状态，它会更改菜单、工具栏和内容区域，以便在将布局发送到打印机或保存为 PDF 文件之前对其进行查看。要预览布局，请从“查看”菜单中选择“预览模式”，或单击“预览”工具栏图标。工具栏选项将更改为与打印相关的功能，内容区域将成为一个或多个不可交互、不可编辑的页面，其呈现效果与打印时完全一致。任何交互式对象（如按钮、选项卡、滑动控件等）都将显示为无效的静态图形。根据每个布局对象的设置，某些对象和数据可能不可见、被重新格式化、滑动到新位置或从页边距处截断。\n\
    \n#### 状态工具栏（预览模式）\n\n预览模式下的工具栏将变为特定于打印的按钮，这些按钮可以是默认选项，也可以是用户自定义的集合。\n\n#####\
    \ 默认状态工具栏项目（预览模式）\n\n预览模式的默认工具栏如图 4-18 所示。与浏览模式类似，顶部区域可以自定义，而底部区域是固定的。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig18_HTML.jpg](img/429700_2_En_4_Fig18_HTML.jpg)\n\
    \n图 4-18\n\n预览模式下工具栏的结构分析\n\n###### 导航控件\n\n预览模式工具栏中的“导航控件”与浏览模式和查找模式中的类似，但区别在于它们显示的是关于“打印页面”的信息，并允许在“打印页面”之间移动，而不是在记录或查找请求之间移动。最初，如果整个文档尚未渲染完成，页数可能会显示为问号。点击翻页或滚动到文档末尾以更新页数。\n\
    \n###### 功能按钮\n\n默认预览工具栏中包含的功能按钮有：\n\n- “另存为 Excel” – 将记录导出到 Excel 文件\n- “另存为\
    \ PDF” – 将预览保存为 PDF 文件\n- “打印” – 打开对话框以将预览发送到打印机\n- “页面设置” – 打开对话框以配置页面设置，从而更改渲染效果\n\
    \n###### 退出预览按钮\n\n“退出预览按钮”将结束预览并使窗口返回浏览模式。\n\n##### 自定义状态工具栏（预览模式）\n\n预览模式工具栏可以在用户计算机级别进行自定义。进入预览模式，然后选择“查看\
    \ ➤ 自定义工具栏”菜单，以打开附加到窗口上的自定义面板，如图 4-19 所示。尽管可用的按钮不同，但它们的添加或删除方式与第 3 章中描述的浏览模式操作方式相同。\n\
    \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig19_HTML.jpg](img/429700_2_En_4_Fig19_HTML.jpg)\n\
    \n图 4-19\n\n预览模式的工具栏自定义面板\n\n### 页面设置\n\n“页面设置”对话框（在 Windows 中为“打印设置”）是一个标准操作系统对话框，用于配置当前布局在预览或打印时的行为方式，如图\
    \ 4-20 所示。在浏览模式、预览模式或布局模式下，可以通过在“文件”菜单中选择“页面设置”来访问此对话框。在此处，你可以选择“打印机”、“纸张大小”、“方向”和“缩放百分比”。\n\
    \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig20_HTML.jpg](img/429700_2_En_4_Fig20_HTML.jpg)\n\
    \n图 4-20\n\n用于配置页面设置的对话框\n\n### 打印对话框选项\n\n“打印”对话框是一个用于配置打印任务的标准操作系统对话框，如图 4-21\
    \ 所示。可以通过在“文件”菜单中选择“打印”，或单击预览模式工具栏中的“打印”来打开此对话框。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig21_HTML.jpg](img/429700_2_En_4_Fig21_HTML.jpg)\n\
    \n图 4-21\n\n用于准备发送到打印机的任务的对话框\n\n虽然大多数选项与其他应用程序相同，但有一些是 FileMaker 特有的。“起始页码”字段接受一个页码，该页码将作为编号的第一页。三个打印选项决定了窗口内容区域的打印方式。选择“正在浏览的记录”可包括已找到记录集中的每条记录；选择“当前记录”则仅包括打开“打印”对话框时已选择或正在查看的当前记录。选择“空白记录，显示字段”可打印不带任何记录数据的布局。相邻的菜单控制字段的打印方式：“按格式设置”、“带框”、“带下划线”或“带占位符文本”。\n\
    \n## 总结\n\n本章探讨了用户如何与记录进行交互以输入数据、执行搜索和打印。在下一章中，我们将重点讨论记录的导入和导出。\n\n# 5. 传输记录\n\
    \nFileMaker 具有“导入”和“导出”功能，可以在两个位置之间手动或通过自动脚本化流程传输记录。这允许共享数据以避免重新输入、将模板数据移动到内容表中进行自定义、将旧数据迁移到较新版本的数据库、将数据发送到其他系统等等。本章讨论以下数据传输主题：\n\
    \n-   支持的文件类型\n-   导入记录\n-   导出记录\n\n## 支持的文件类型\n\nFileMaker 可以多种格式“导入和导出记录”，如图\
    \ 5-1 所示。此外，还支持从 ODBC 和 XML 源，或从包含图片、影片或文本文件的文件夹进行“内容导入”。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig1_HTML.jpg](img/429700_2_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n\n记录导入（左）和导出（右）支持的文件类型\n\n> **注意**  \n新的“自定义分隔值”导入选项允许选择分隔符，并取代了之前的“制表符分隔值”。\n"
- fmt: '# Importing Records


    The `import records` function will create or update records in the table of the
    current layout. Records can be imported from various sources: a table within the
    same file, an external database, or one of various text-based data files. To explore
    the feature, import some contact data into the `Learn FileMaker Chapter` 3–5 database.
    First, download the free `us-500.csv` contacts sample file from [`www.briandunning.com/sample-data/`](http://www.briandunning.com/sample-data/).
    Then, select the `File ➤ Import Records ➤ File` menu to open the `Choose File`
    dialog, as shown in Figure 5-2.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig2_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The dialog used to choose a file to import


    The dialog allows a selection of a file from any folder directory. It can also
    be used to access a database hosted on a `FileMaker Server` by clicking the `Hosts`
    button in the `Options` area at the bottom (Chapter 29). This area also contains
    a `Show` pop-up menu of import-compatible file types that highlights specific
    files in a crowded folder. The checkbox to create a recurring import provides
    a shortcut by skipping the manual import steps taken and automatically creating
    a new table, layout, and script for repeated use in the future. For now, select
    and open the downloaded CSV file.


    ## Performing an Import


    After selecting and opening the data file, a `Specify Import Order` dialog will
    appear, as shown in Figure 5-3. The dialog contains regions for browsing source
    data, specifying an import type, selecting a target table, and setting import
    options that vary depending on the type of import being performed. The default
    is an `add import`, where all imported records will be added as new records in
    the target table.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig3_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    The import field-mapping dialog


    **Caution:** This dialog design was introduced in `FileMaker 18` and is completely
    different from earlier versions.


    ### Browsing the Source Data


    The `import` `source data` is displayed in a list on the leftmost column and is
    navigable using the arrows buttons above it. A pop-up menu enabled for text-based
    data file imports displays a value indicating or controlling how the row/record
    displayed below will be handled on import. The `Data` option, the default for
    all entries, means the data will be imported as a normal record. Choosing the
    `Use as Field Names` option assigns the current entry''s values as the source
    of field/column names. This can be assigned to any single record and establishes
    the starting point in the source data for the import. Any record preceding the
    record will automatically be assigned a value of `Excluded`, indicating that it
    will not be imported. This allows multiple "header rows" containing document information
    and column titles to be excluded from the actual data being imported. Individual
    rows anywhere in the source data can also be excluded manually. Moving to the
    right, the `Source Field` list shows the field names from the source data if available.
    When importing from a text-based data file, these will say `From source file`
    unless a record is assigned as the source of field names. When importing from
    a `FileMaker` database, the actual field names will be displayed, and the only
    control over the source data side of the dialog is the ability to navigate and
    view source data records.


    ### Selecting a Target Table


    The `target table` is the destination table for incoming data and will default
    to the current layout''s table. The `Target` pop-up menu, shown in Figure 5-4,
    provides one option for creating a new table as part of the import process. The
    menu is a standard `FileMaker` `table selection menu` that lists the `Current
    Table`, `Related Tables`, `Unrelated Tables`, and a `Manage Database` with an
    additional import-only option of `New Table`. Since an import must flow into the
    current layout''s context, most of these options are disabled when importing.
    The only alternative to a target of the current table is to create a new table.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig4_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    The import target table pop-up menu


    Selecting the `New Table` option will configure the dialog to automatically create
    a new table during the import and flow the data into it. The `Target fields` list
    will display new names as a numerically sequence with an "f" prefix unless a row
    has been assigned to `Use as Field Names`.


    The `Manage Database` option is enabled and will open a dialog of the same name
    (Chapters 7–9) to create new fields in the target table so they can be included
    in the import without having to exit the import dialog.


    ### Mapping Fields from Source to Target


    The target table and import source file may have more or less fields than the
    other and in a different order. Therefore, it is necessary to indicate which source
    fields should be imported and match them to an appropriate target field. This
    process of `mapping fields` is the primary purpose of the `Specify Import Order`
    dialog.


    Each selectable row of the central list shows columns for `Source Fields`, `Mapping`,
    and `Target Fields`, and these last two each open a menu of options. The `Mapping`
    column displays the import status of the corresponding two fields: `Import` or
    `Don''t Import`. Click to reveal the menu of options, as shown in Figure 5-5.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig5_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig5_HTML.jpg)


    Figure 5-5


    The choice to import a selected field or not.


    Each row of the `Target fields` column opens a menu that allows selection of which
    field the corresponding source field should flow into, as shown in Figure 5-6.
    The current row''s field will be highlighted in the list. An icon indicates each
    field''s current import status: an arrow means they are already configured to
    receive input from the source, and a clear oval indicates they are not. Fields
    that don''t accept data entry, like a calculation or summary fields, will be grouped
    at the bottom under a `Not for Importing` folder. Click to select the appropriate
    target field for the corresponding source field. Once all input fields are mapped
    to targets, it''s time to configure import options.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig6_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig6_HTML.jpg)


    Figure 5-6


    The options available for arranging the list of target fields'
