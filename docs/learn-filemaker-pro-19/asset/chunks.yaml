- fmt: "### Setting Import Options\n\nThe *Import Options* section at the bottom of\
    \ the *Specify Import Order* dialog, shown in Figure [5-7](#429700_2_En_5_Chapter.xhtml#Fig7),\
    \ controls various behaviors based on the type of import source.\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig7_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig7_HTML.jpg)\
    \  \nFigure 5-7: The import options section of the dialog\n\nThe *text-parsing\
    \ options* on the left control how the import source is parsed and are only visible\
    \ when importing from a text-based file. Here you can choose a character set and\
    \ field delimiter: *comma*, *tab*, *semi-colon*, *space*, or a custom value.\n\
    \nThe import options on the right affect behaviors when the new information is\
    \ placed into database fields.\n\nThe *Perform the auto-enter options* checkbox\
    \ controls which fields that have an auto-enter setting defined (Chapter [8](#429700_2_En_8_Chapter.xhtml))\
    \ will update their values as part of the import. This allows serial numbers,\
    \ creation, or modification data to be preserved from the source file or updated\
    \ based on the target field definitions. Fields that don’t receive data can trigger\
    \ their auto-enter options using this feature. Check the box to select all such\
    \ fields, select individual fields in the adjacent menu, or click the red gear\
    \ icon to the right of individual fields in the list above. When importing into\
    \ the *Learn FileMaker* file, turn this on for all fields.\n\nThe *Preserve external\
    \ container storage* checkbox suppresses container field content validation, allowing\
    \ the target table to use existing external container contents (Chapter [10](#429700_2_En_10_Chapter.xhtml)).\
    \ Select this when reimporting data back into an existing file or a copy of a\
    \ file, to avoid decrypting and re-encrypting external files when the base directory\
    \ of the source and target fields are the same.\n\nThe *Repeating Fields* option\
    \ allows a choice between keeping repeating fields (Chapter [8](#429700_2_En_8_Chapter.xhtml))\
    \ together in a single record or splitting them into one imported record per repetition.\
    \ When the latter is selected, all non-repeating fields will be duplicated, with\
    \ one record generated for each of the repetitions.\n\n### Finishing the Import\n\
    \nOnce configured, click the *Import* button to perform the process. An *Import\
    \ Summary* dialog appears reporting the number of records added or updated, the\
    \ number of skipped records and fields, and how many tables were created, if any.\
    \ A text file named `Import.log` will be saved to the database’s folder containing\
    \ details about the import process and noting any errors that may have occurred.\
    \ After the import process, the found set in the window will be that of only the\
    \ imported records.\n\n### Changing the Import Type\n\nBesides the *add records*\
    \ style import described earlier, there are two other types of import available:\
    \ *update* and *replace*. Instead of creating records, these are used to overwrite\
    \ existing records. An *import type selection* panel is accessible by clicking\
    \ in the space between the source and target icons, shown in Figure [5-8](#429700_2_En_5_Chapter.xhtml#Fig8).\n\
    \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig8_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig8_HTML.jpg)\
    \  \nFigure 5-8: The hidden panel to select a different import type\n\n#### Updating\
    \ Matching Records in Found Set\n\nAn *update* import is a nonlinear data transfer\
    \ that will import each record of the source data into an existing record based\
    \ on match criteria. A *match field* is a new field mapping designation, shown\
    \ in Figure [5-9](#429700_2_En_5_Chapter.xhtml#Fig9), used to tag one or more\
    \ fields as criteria for matching an incoming record to a record in the target\
    \ table.\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig9_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig9_HTML.jpg)\
    \  \nFigure 5-9: The expanded mapping choice for match fields\n\nDuring the import,\
    \ each incoming source record will be matched to an existing record based on the\
    \ selected match field(s). If a matching record is found, the remaining fields\
    \ will be updated in their mapped target fields for that record. If a matching\
    \ record is not found, it will be skipped over unless the *Add remaining data\
    \ as new records* checkbox is selected at the bottom of the selection panel, shown\
    \ previously in Figure [5-8](#429700_2_En_5_Chapter.xhtml#Fig8).\n\n#### Replacing\
    \ Records in Found Set\n\nA *replace import* will use the incoming record values\
    \ to overwrite fields on existing records based on their linear position in the\
    \ corresponding sets without any concern for matching records. In other words,\
    \ the values from the first record in the source data will be used to replace\
    \ values in the mapped fields of the first record in the target set. This can\
    \ be useful in a situation where you need to export a set of data, manipulate\
    \ it outside of FileMaker, and then immediately replace some or all field values\
    \ of those same records. When using this import type, typically, the source data\
    \ and the target table’s current found set should contain the same number of records.\
    \ If the source record count is *less* than the target found set, records in the\
    \ found set beyond that source’s count will not be modified. If the source data\
    \ count is *greater* than the target table’s found set, the import will stop after\
    \ the number of records in that found set are finished, unless the *Add remaining\
    \ data as new records* checkbox is selected.\n\n### Setting Up an Automatic Recurring\
    \ Import\n\nSelecting the optional *Set up as automatic recurring import* checkbox\
    \ in the *Choose File* dialog, as shown previously in Figure [5-2](#429700_2_En_5_Chapter.xhtml#Fig2),\
    \ will completely bypass the rest of the import process and create a new table,\
    \ layout, and script that can be customized and used to automate the same process\
    \ in the future. When selected, it opens a *Recurring Import Setup* dialog shown\
    \ in Figure [5-10](#429700_2_En_5_Chapter.xhtml#Fig10). This dialog remembers\
    \ the path of the source data and has three configurable options. Select *Don't\
    \ import first record* to skip importing the first record, and instead use it\
    \ as field names. The other two fields allow entry of a layout and script name\
    \ to override the default names entered based on the import file name.\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig10_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig10_HTML.jpg)\
    \  \nFigure 5-10: The Recurring Import Setup dialog\n\nOnce configured and continued,\
    \ a new table will be created with the same name as the source data file with\
    \ a field for every column of data it contains. A new layout is created with the\
    \ specified name and every field displayed. A script is created with the specified\
    \ name that will navigate to the new layout, delete every record, and import the\
    \ records from the file thereby refreshing the data. All of these resources can\
    \ then be renamed and customized as needed to suit a specific workflow.\n\n##\
    \ Exporting Records\n\nThe *Export Records* function will save values from one\
    \ or more selected fields from every record in the current found set to a file\
    \ of a specified type. To begin an export, open a database, navigate to a desired\
    \ layout, and optionally perform a find to isolate a desired found set. Select\
    \ the *File ➤ Export Records* menu to open the *Export Records to File* dialog,\
    \ as shown in Figure [5-11](#429700_2_En_5_Chapter.xhtml#Fig11). In addition to\
    \ a standard selection of file name and folder location, a couple of FileMaker\
    \ specific options are available below. Select the *Type* of file for the export\
    \ from the pop-up menu and one or both of the *After saving* action shortcuts\
    \ for opening or emailing the new file. Click *Save* to continue the process and\
    \ specify export fields.\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig11_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig11_HTML.jpg)\
    \  \nFigure 5-11: A dialog used to specify an export location, file name, and\
    \ type"
  raw: '#### Setting Import Options


    The *Import Options* section at the bottom of the *Specify Import Order* dialog,
    shown in Figure [5-7](#429700_2_En_5_Chapter.xhtml#Fig7), controls various behaviors
    based on the type of import source.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig7_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig7_HTML.jpg)


    Figure 5-7


    The import options section of the dialog


    The *text-parsing options* on the left control how the import source is parsed
    and are only visible when importing from a text-based file. Here you can choose
    a character set and field delimiter: *comma*, *tab*, *semi-colon*, *space,* or
    a custom value.


    The import options on the right affect behaviors when the new information is placed
    into database fields.


    The *Perform the auto-enter options* checkbox controls which fields that have
    an auto-enter setting defined (Chapter [8](#429700_2_En_8_Chapter.xhtml)) will
    update their values as part of the import. This allows serial numbers, creation,
    or modification data to be preserved from the source file or updated based on
    the target field definitions. Fields that don’t receive data can trigger their
    auto-enter options using this feature. Check the box to select all such fields,
    select individual fields in the adjacent menu, or click the red gear icon to the
    right of individual fields in the list above. When importing into the *Learn FileMaker*
    file, turn this on for all fields.


    The *Preserve external container storage* checkbox suppresses container field
    content validation, allowing the target table to use existing external container
    contents (Chapter [10](#429700_2_En_10_Chapter.xhtml)). Select this when reimporting
    data back into an existing file or a copy of a file, to avoid decrypting and re-encrypting
    external files when the base directory of the source and target fields are the
    same.


    The *Repeating Fields* option allows a choice between keeping repeating fields
    (Chapter [8](#429700_2_En_8_Chapter.xhtml)) together in a single record or splitting
    them into one imported record per repetition. When the latter is selected, all
    non-repeating fields will be duplicated, with one record generated for each of
    the repetitions.


    #### Finishing the Import


    Once configured, click the *Import* button to perform the process. An *Import
    Summary* dialog appears reporting the number of records added or updated, the
    number of skipped records and fields, and how many tables were created, if any.
    A text file named *Import.log* will be saved to the database’s folder containing
    details about the import process and noting any errors that may have occurred.
    After the import process, the found set in the window will be that of only the
    imported records.


    ### Changing the Import Type


    Besides the *add records* style import described earlier, there are two other
    types of import available: *update* and *replace*. Instead of creating records,
    these are used to overwrite existing records. An *import type selection* panel
    is accessible by clicking in the space between the source and target icons, shown
    in Figure [5-8](#429700_2_En_5_Chapter.xhtml#Fig8).


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig8_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig8_HTML.jpg)


    Figure 5-8


    The hidden panel to select a different import type


    #### Updating Matching Records in Found Set


    An *update* import is a nonlinear data transfer that will import each record of
    the source data into an existing record based on match criteria. A *match field*
    is a new field mapping designation, shown in Figure [5-9](#429700_2_En_5_Chapter.xhtml#Fig9),
    used to tag one or more fields as criteria for matching an incoming record to
    a record in the target table.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig9_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig9_HTML.jpg)


    Figure 5-9


    The expanded mapping choice for match fields


    During the import, each incoming source record will be matched to an existing
    record based on the selected match field(s). If a matching record is found, the
    remaining fields will be updated in their mapped target fields for that record.
    If a matching record is not found, it will be skipped over unless the *Add remaining
    data as new records* checkbox is selected at the bottom of the selection panel,
    shown previously in Figure [5-8](#429700_2_En_5_Chapter.xhtml#Fig8).


    #### Replacing Records in Found Set


    A *replace import* will use the incoming record values to overwrite fields on
    existing records based on their linear position in the corresponding sets without
    any concern for matching records. In other words, the values from the first record
    in the source data will be used to replace values in the mapped fields of the
    first record in the target set. This can be useful in a situation where you need
    to export a set of data, manipulate it outside of FileMaker, and then immediately
    replace some or all field values of those same records. When using this import
    type, typically, the source data and the target table’s current found set should
    contain the same number of records. If the source record count is *less* than
    the target found set, records in the found set beyond that source’s count will
    not be modified. If the source data count is *greater* than the target table’s
    found set, the import will stop after the number of records in that found set
    are finished, unless the *Add remaining data as new records* checkbox is selected.


    ### Setting Up an Automatic Recurring Import


    Selecting the optional *Set up as* *automatic recurring import* checkbox in the
    *Choose File* dialog, as shown previously in Figure [5-2](#429700_2_En_5_Chapter.xhtml#Fig2),
    will completely bypass the rest of the import process and create a new table,
    layout, and script that can be customized and used to automate the same process
    in the future. When selected, it opens a *Recurring Import Setup* dialog shown
    in Figure [5-10](#429700_2_En_5_Chapter.xhtml#Fig10). This dialog remembers the
    path of the source data and has three configurable options. Select *Don''t import
    first record* to skip importing the first record, and instead use it as field
    names. The other two fields allow entry of a layout and script name to override
    the default names entered based on the import file name.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig10_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig10_HTML.jpg)


    Figure 5-10


    The Recurring Import Setup dialog


    Once configured and continued, a new table will be created with the same name
    as the source data file with a field for every column of data it contains. A new
    layout is created with the specified name and every field displayed. A script
    is created with the specified name that will navigate to the new layout, delete
    every record, and import the records from the file thereby refreshing the data.
    All of these resources can then be renamed and customized as needed to suit a
    specific workflow.


    ## Exporting Records


    The *Export Records* function will save values from one or more selected fields
    from every record in the current found set to a file of a specified type. To begin
    an export, open a database, navigate to a desired layout, and optionally perform
    a find to isolate a desired found set. Select the *File ➤ Export Records* menu
    to open the *Export Records to File* dialog, as shown in Figure [5-11](#429700_2_En_5_Chapter.xhtml#Fig11).
    In addition to a standard selection of file name and folder location, a couple
    of FileMaker specific options are available below. Select the *Type* of file for
    the export from the pop-up menu and one or both of the *After saving* action shortcuts
    for opening or emailing the new file. Click *Save* to continue the process and
    specify export fields.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig11_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig11_HTML.jpg)


    Figure 5-11


    A dialog used to specify an export location, file name, and type'
  trans: "\n### 设置导入选项\n\n在“指定导入顺序”对话框底部的*导入选项*部分（如图 5-7 所示），可根据导入源的类型控制各种行为。\n\n\
    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig7_HTML.jpg](img/429700_2_En_5_Fig7_HTML.jpg)\
    \  \n图 5-7: 对话框的导入选项部分\n\n左侧的*文本解析选项*控制导入源的解析方式，仅在从基于文本的文件导入时可见。在此处可以选择字符集和字段分隔符：*逗号*、*制表符*、*分号*、*空格*或自定义值。\n\
    \n右侧的导入选项影响新信息放入数据库字段时的行为。\n\n*“执行自动输入选项”*复选框控制哪些定义了自动输入设置的字段（参见第 8 章）会在导入过程中更新其值。这使得可以保留源文件中的序列号、创建或修改数据，或根据目标字段定义更新这些数据。未接收数据的字段可使用此功能触发其自动输入选项。勾选此框可选择所有此类字段，在相邻菜单中选择单个字段，或点击上方列表中单个字段右侧的红色齿轮图标。当导入到\
    \ *Learn FileMaker* 文件时，请为所有字段开启此选项。\n\n*“保留外部容器存储”*复选框可抑制容器字段内容验证，允许目标表使用现有的外部容器内容（参见第\
    \ 10 章）。当将数据重新导入现有文件或其副本时，选择此项可避免在源字段和目标字段的基目录相同时对外部文件进行解密和重新加密。\n\n*“重复字段”*选项允许选择将重复字段（参见第\
    \ 8 章）保留在单条记录中，还是将它们拆分为每条重复项对应一条导入记录。选择后者时，所有非重复字段将被复制，每个重复项将生成一条记录。\n\n### 完成导入\n\
    \n配置完成后，点击*导入*按钮执行该过程。系统将显示*“导入摘要”*对话框，报告添加或更新的记录数、跳过的记录和字段数，以及创建的表数量（如有）。一个名为\
    \ `Import.log` 的文本文件将保存到数据库文件夹中，其中包含导入过程的详细信息，并记录可能发生的任何错误。导入过程结束后，窗口中的找到集将仅包含导入的记录。\n\
    \n### 更改导入类型\n\n除了前面描述的*“添加记录”*类型导入外，还有另外两种导入类型：*更新*和*替换*。这两种类型不创建记录，而是用于覆盖现有记录。点击源图标和目标图标之间的区域，可访问*“导入类型选择”*面板，如图\
    \ 5-8 所示。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig8_HTML.jpg](img/429700_2_En_5_Fig8_HTML.jpg)\
    \  \n图 5-8: 用于选择不同导入类型的隐藏面板\n\n#### 更新找到集中的匹配记录\n\n*更新*导入是一种非线性数据传输，它会根据匹配条件将源数据的每条记录导入到现有记录中。*“匹配字段”*是一种新的字段映射指定方式，如图\
    \ 5-9 所示，用于将一个或多个字段标记为匹配条件，以将传入记录与目标表中的记录进行匹配。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig9_HTML.jpg](img/429700_2_En_5_Fig9_HTML.jpg)\
    \  \n图 5-9: 匹配字段的扩展映射选择\n\n在导入过程中，传入的每条源记录将根据选定的匹配字段与现有记录进行匹配。如果找到匹配记录，则该记录的其余字段将更新到其映射的目标字段中。如果未找到匹配记录，则跳过该记录，除非选中了选择面板底部的*“将剩余数据添加为新记录”*复选框（如前文图\
    \ 5-8 所示）。\n\n#### 替换找到集中的记录\n\n*替换*导入将使用传入的记录值，根据对应集合中的线性位置覆盖现有记录的字段，而无需考虑匹配记录。换句话说，源数据中第一条记录的值将用于替换目标集合中第一条记录的映射字段值。这在以下情况中可能很有用：需要导出一组数据，在\
    \ FileMaker 外部对其进行操作，然后立即替换这些记录的部分或全部字段值。使用此导入类型时，通常源数据和目标表的当前找到集应包含相同数量的记录。如果源记录数*少于*目标找到集，则找到集中超出源记录数的记录将不会被修改。如果源数据计数*大于*目标表的找到集，则导入将在处理完找到集中的记录数后停止，除非选中了*“将剩余数据添加为新记录”*复选框。\n\
    \n### 设置自动定期导入\n\n在“选择文件”对话框中选中可选的*“设置为自动定期导入”*复选框（如前文图 5-2 所示），将完全跳过导入过程的其余部分，创建一个新的表、布局和脚本，这些资源可自定义并用于将来自动化同样的过程。选中后，将打开*“定期导入设置”*对话框，如图\
    \ 5-10 所示。该对话框会记住源数据的路径，并提供三个可配置选项。选择*“不导入第一条记录”*可跳过导入第一条记录，而是将其用作字段名称。另外两个字段允许输入布局名称和脚本名称，以覆盖基于导入文件名输入的默认名称。\n\
    \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig10_HTML.jpg](img/429700_2_En_5_Fig10_HTML.jpg)\
    \  \n图 5-10: “定期导入设置”对话框\n\n配置完成并继续后，将创建一个新表，其名称与源数据文件相同，并为其包含的每一列数据创建一个字段。同时创建一个包含指定名称的新布局，并显示所有字段。还会创建一个具有指定名称的脚本，该脚本将导航到新布局，删除所有记录，并从文件中导入记录，从而刷新数据。所有这些资源随后都可以根据特定工作流程的需要进行重命名和自定义。\n\
    \n## 导出记录\n\n*“导出记录”*功能会将当前找到集中每条记录的一个或多个选定字段的值保存到指定类型的文件中。要开始导出，请打开一个数据库，导航到所需布局，并可选择执行查找以隔离所需的找到集。选择\
    \ *文件 ➤ 导出记录* 菜单，打开*“将记录导出到文件”*对话框，如图 5-11 所示。除了标准的文件名和文件夹位置选择外，下方还提供了一些 FileMaker\
    \ 特定的选项。从弹出菜单中选择导出的*文件类型*，并选择*“保存后”*操作快捷方式之一（打开或通过电子邮件发送新文件）。点击*保存*继续该过程并指定导出字段。\n\
    \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig11_HTML.jpg](img/429700_2_En_5_Fig11_HTML.jpg)\
    \  \n图 5-11: 用于指定导出位置、文件名和类型的对话框\n"
- fmt: '### Specifying Export Fields


    The `Specify Field Order for Export` dialog, as shown in Figure 5-12, is used
    to select the fields that will be included in the export, the order they will
    be saved in the output file, and some formatting options.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig12_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig12_HTML.jpg)


    Figure 5-12: The dialog used to specify the export field order and settings


    On the left, the data source pop-up menu is used to specify where to generate
    the field list below it. By default, this has the `Current Layout` selected, showing
    only the fields displayed on the current layout, both local and related. Select
    `Current Table` instead to show every field from the current layout’s table occurrence,
    or choose a related table occurrence to include related fields in the export (Chapter
    9).


    Fields can be added to the export order by double-clicking in the list or using
    the `Move` or `Move All` button. The fields in the export list will be saved in
    the output file in the order they appear and can be dragged into the desired order.
    Remove fields from the export list by double-clicking, clicking the `Clear` or
    `Clear All` button, or typing the Delete key.


    Once the field order is set, there are a few options available. The `Output file
    character set` pop-up menu specifies which character encoding will be used during
    the export. The `Apply current layout''s data formatting` checkbox will cause
    any number, date, or time field to be exported with the data formatted as it is
    on the current layout rather than the format of the actual data entered (Chapter
    19, “Data Formatting”). For example, if a number field contains "10" but is formatted
    on the current layout to display currency (e.g., "$10.00"), this box must be checked
    to export the number formatted as currency.


    ### Summarizing Output into Groups


    For more complex exports, the `Group by` feature allows values to be sub-summarized
    during the export. If the found set of records is sorted, the `Group By` area
    of the dialog will contain a list of the sort fields which can be used to summarize
    data during the export. For example, imagine a found set of records shown in Table
    5-1, with values as shown in three fields: `Company`, `Industry`, and `Quantity`.
    The `Quantity Summary` field is a summary that automatically totals the `Quantity`
    field for the six records (Chapter 8, “Summary Fields”).


    Table 5-1: Hypothetical records showing how a non-grouped summary behaves


    | Company | Industry | Quantity | Quantity Summary |

    | --- | --- | --- | --- |

    | Online Tutor, LLC | Education | 20 | 95 |

    | Learning Resources | Education | 15 | 95 |

    | Mutual Investors Corp | Finance | 5 | 95 |

    | Dividend Party, Inc. | Finance | 10 | 95 |

    | Knowledge Bound Co. | Publishing | 35 | 95 |

    | Widget Books, Inc. | Publishing | 10 | 95 |


    If these three fields were exported, the values in the resulting file would look
    the same as they do in the table. However, the data can be exported as a summary
    report of the total quantity for each industry by first sorting the records by
    the `Industry` field. Begin an export, and when you reach the `Specify Field Order`
    dialog, the `Group by` area will have a checkbox for the `Industry` field. Add
    the `Industry` field and the `Quantity Summary` field to the export list. An extra
    third field will be added automatically: `Quantity Summary by Industry`. This
    last will be italicized to highlight the fact that it is not an actual field in
    the database, but a sub-summary of the quantity by industry, as shown in Figure
    5-13.


    ![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig13_HTML.jpg](images/429700_2_En_5_Chapter/429700_2_En_5_Fig13_HTML.jpg)


    Figure 5-13: An example of a field export order using the group by feature


    With this configuration, the export file would contain one row for each industry,
    the total quantity for all three industries (only on the first row), and the total
    of each industry in the third column, as shown in Table 5-2.


    Table 5-2: Hypothetical data exported using the `Group by` option


    | Education | 95 | 35 |

    | Finance |   | 15 |

    | Publishing |   | 45 |


    ## Summary


    In this chapter, we explored the basics of importing and exporting records. In
    the next chapter, we will move from the user perspective to the developer interface
    and begin defining data structures.


    # Part II: Defining Data Structures


    The first step to building a custom database is to create a new file and begin
    defining its structural data schema: the `tables`, `fields`, `relationships`,
    `containers`, and `value lists` that provide a foundation upon which interfaces
    will be constructed.


    1.  Working with Database Files

    2.  Working with Tables

    3.  Defining Fields

    4.  Forming Relationships

    5.  Managing Containers

    6.  Defining Value Lists


    # 6. Working with Database Files


    A database is a structured collection of information stored in a digital format
    that is flexibly accessible for a variety of functions. A FileMaker database file
    is a document that contains both structural elements defined by a developer and
    data entered by users. A single file format has been shared by all versions of
    FileMaker between 12 and 19 and indicated by the file extension `fmp12`. This
    chapter covers the basics of creating, configuring, and maintaining a database
    file, including:


    - Creating a new database file

    - Configuring file options

    - Designing and maintaining healthy files


    **Caution:** While the `fmp12` extension indicates file compatibility between
    FileMaker versions 12 and 19, features introduced in newer versions are not backward
    compatible in older versions.


    ## Creating a New Database File


    A database file can be created from a starter solution, a blank file, or by converting
    a spreadsheet or other text-based file into a FileMaker database. All of these
    are performed from the `Create` tab of the `Launch Center` window, accessible
    by selecting `Create New` from the `File` menu.


    ### Creating a Database from a Starter Solution


    A starter solution is one of a set of templates provided by Claris as part of
    the FileMaker installation. Although this book is focused on starting from a blank
    file, these templates can be used as a starting foundation upon which to build
    a custom solution or serve as a "learn by example" tutorial. To begin, create
    a copy of the `Contacts` starter template by following the steps shown in Figure
    6-1.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig1_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig1_HTML.jpg)


    Figure 6-1: The process of creating a new database from a starter solution


    1.  Select the `Create` tab in the `Launch Center` window.

    2.  Click on the `Contacts` icon under the `Starter` heading.

    3.  Click the `Create` button.

    4.  In the `Save` dialog sheet attached to the top of the window, specify a name
    and save location.


    **Caution:** Starters are designed by Claris as examples. The structural and design
    choices they employ should not be taken as strict rules that must be unquestionably
    followed.'
