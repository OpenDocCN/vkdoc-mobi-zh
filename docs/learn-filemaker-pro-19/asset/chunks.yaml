- fmt: '# Exploring the Popover Button Setup Options


    A popover’s label and behavior settings are configured using the `Popover Button
    Setup` dialog, which automatically opens when it is created. This dialog, shown
    in Figure [20-36](#429700_2_En_20_Chapter.xhtml#Fig36), can be opened later by
    double-clicking on a button or the popover interface design area or by selecting
    `Popover Button Setup` from the `Format` menu or the button’s contextual menu.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig36_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig36_HTML.jpg)


    Figure 20-36


    The dialog used to configure a popover’s label and behavior settings


    The top portion of the setup dialog is identical to regular `Button Setup`, allowing
    control over the button’s label and/or icon. The bottom portion contains settings
    specifically for the popover interface panel:


    1.  `Directional Control` – Choose a preferred open direction for the popover
    interface relative to the button icon. FileMaker will override this choice if
    needed to ensure that the popover interface never goes off-screen.


    2.  `Title` – Enter a title for the popover or click the adjacent pencil icon
    to generate one with a formula. Click the checkbox to have the title display for
    the user at the top of the panel when open.


    3.  `Script Triggers` – Click to open a dialog to configure script triggers (Chapter
    [27](#429700_2_En_27_Chapter.xhtml)) for the popover interface.


    ## Button Bar


    A `button bar` is a layout object that defines a group of interconnected button
    segments, as shown in Figure [20-37](#429700_2_En_20_Chapter.xhtml#Fig37). Create
    a bar by choosing the `Insert ➤ Button Bar` menu or using the corresponding tool
    in the toolbar. Each segment of the bar can be defined independently as a push
    button or a popover button. Clicking on a segment performs its defined action
    and then leaves that segment actively selected until another is selected, making
    them an odd combination of a button and mode indicator. This selection behavior
    can be overridden by configuring the default segment to 0 and refreshing the window
    after the script action has been performed.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig37_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig37_HTML.jpg)


    Figure 20-37


    An example of a three-segment button bar with the second segment active


    ### Exploring the Button Bar Setup Options


    Button bars are configured using the `Button Bar Setup` dialog, shown in Figure
    [20-38](#429700_2_En_20_Chapter.xhtml#Fig38). This dialog automatically opens
    when a new bar is created and can be opened later by double-clicking on a button
    segment. It can also be opened by selecting `Button Bar Setup` from the `Format`
    menu or the button’s contextual menu. This dialog is a hybrid of the setting for
    a `button` and a `popover button` with a few controls specific to button bars.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig38_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig38_HTML.jpg)


    Figure 20-38


    The dialog used to configure a button bar


    The top portion contains controls for the overall bar, including:


    1.  `Bar Orientation Control` – Select the direction segments should run: `horizontally`
    or `vertically`.


    2.  `Button Labeling Options` – Select a labeling option for all the segments
    (similar to buttons and popovers).


    3.  `Active Segment` – Specify which segment will be “active” by default. The
    menu allows selection of a segment by name and includes a `Specify` option for
    a formula-driven choice.


    4.  `Segment Control` – Add or remove segments from the bar.


    5.  `Segment Navigation` – Select a specific segment whose settings will be displayed
    for configuration below.


    The bottom portion of the dialog applies to the currently selected segment:


    1.  `Button Labeling Specification` – Identical to buttons, enter a name and/or
    select an icon for the button segment’s label depending on the labeling option
    selected previously.


    2.  `Segment Type` – Select a type for the current segment: `Button` or `Popover
    Button`.


    3.  `Action Menu and Specification` – This area provides action controls depending
    on the type selected previously with options identical to a button or popover.


    ## Making Any Object a Button


    In addition to formal buttons and button bar objects, any object or group of objects
    can be converted into a simple push button. Select the object, and click the `Format
    ➤ Button Setup` menu or the contextual menu option of the same name to open a
    simplified `Button Setup` dialog, as shown in Figure [20-39](#429700_2_En_20_Chapter.xhtml#Fig39).
    Because the object is not a native button, the only configuration choices are
    an action selection and the option to change the cursor. Once converted into a
    button, the objects will no longer be receptive to input native to their type,
    e.g., fields will no longer accept data entry.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig39_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig39_HTML.jpg)


    Figure 20-39


    The dialog used to assign an action to an object button


    ## Working with Panel Controls


    A `panel control` is a layout object that contains multiple object groups, organized
    in separate panels, which can be alternately displayed within the area of the
    object. Panels save space by allowing part of a layout to be used for multiple
    purposes, one at a time as selected by a user. FileMaker has two such object types:
    `tab controls` and `slide controls`.


    ### Tab Control


    A `tab control` is a multi-panel layout object with labeled “tabs” reminiscent
    of file folders, as shown in Figure [20-40](#429700_2_En_20_Chapter.xhtml#Fig40).
    When a user clicks on one of the available tabs, the corresponding panel becomes
    active and renders the other tabs inactive. Each panel can be designed with any
    number and different layout objects. A tab panel can even include other tab controls,
    making a hierarchical tab structure.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig40_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig40_HTML.jpg)


    Figure 20-40


    An example of a tab control with four tabbed panels


    To create a new tab control, select the `Insert ➤ Tab Control` menu item, or click
    on the toolbar icon, and choose `Tab Control` from the menu, as shown in Figure
    [20-41](#429700_2_En_20_Chapter.xhtml#Fig41).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig41_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig41_HTML.jpg)


    Figure 20-41


    Selecting the tab control tool from the toolbar'
