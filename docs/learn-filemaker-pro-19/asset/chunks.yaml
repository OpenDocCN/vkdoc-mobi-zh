- fmt: "### Global Variable\n\nA `global variable` is a variable that is accessible\
    \ from any formula anywhere within a single database file and will persist until\
    \ the file is closed. Like local variables, a global variable can be initialized\
    \ within a `Let` or `While` statement and the `Set Variable` script step. Global\
    \ variables can be used to store custom preference settings that control custom\
    \ functionality, stage data being prepared for some purpose, or log troubleshooting\
    \ information to help track down problems with complex, multi-script processes\
    \ or iterative formulas.\n\n**Tip:** Limit global variables to information truly\
    \ used *universally* within the file! Avoid using them to exchange data between\
    \ scripts; use parameters instead (Chapter [24](#429700_2_En_24_Chapter.xhtml)).\n\
    \nFileMaker requires that global variables be named with a double dollar symbol\
    \ prefix. Beyond that, names can be as short as a single character or a lengthy,\
    \ multi-word phrase and can use any of a variety of delimiters, as shown in the\
    \ following examples. Since they are global, they must each be uniquely and carefully\
    \ named to avoid confusion and conflicts with other global variables used for\
    \ different purposes in the same file. However, since they are not shared between\
    \ files, standardized names can be reused from one file to the next without concern\
    \ about them overwriting each other.\n\n```\n$$x\n$$data\n$$firstName\n$$recordNumber\n\
    $$dateToProcess\n$$date.to.process\n$$date_to_process\n```\n\n**Tip:** The *Data\
    \ Viewer* (Chapter [26](#429700_2_En_26_Chapter.xhtml), “Exploring the Data Viewer”)\
    \ can be used to monitor global variables anytime and local variables during the\
    \ execution of a script.\n\n## Exploring the Calculation Interface\n\nTo experiment\
    \ with formulas, use the *Example Calculation* field of the *Sandbox* table in\
    \ the *Learn FileMaker* database. To begin, follow these steps:\n\n1.  Open the\
    \ *Learn FileMaker* database.\n2.  Switch to the *Sandbox* layout.\n3.  Select\
    \ the *File ➤ Manage ➤ Database* menu item.\n4.  Click on the *Fields* tab.\n\
    5.  Confirm *Sandbox* in the *Tables* pop-up on the upper left.\n6.  Click on\
    \ the *Example Calculation* field.\n7.  Click the *Options* button.\n\n### Exploring\
    \ the Specify Calculation Dialog\n\nAll formulas are written in a *Specify Calculation*\
    \ dialog, shown in Figure [12-2](#429700_2_En_12_Chapter.xhtml#Fig2).\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig2_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig2_HTML.jpg)\n\
    \n**Figure 12-2** The dialog window used to specify a calculation formula\n\n\
    1.  *Field Selector Pane* – Select a table occurrence and choose a field to insert\
    \ a field reference into the formula.\n2.  *Context Indicator* – For calculation\
    \ fields only, choose an occurrence to serve as the context for the formula if\
    \ more than one occurrence exists for the field’s table.\n3.  *Formula Text Area*\
    \ – This is the formula’s code. Type, drag-drop, copy-paste, or insert content\
    \ by clicking on the panes to the left and right to build the formula.\n4.  *Operators*\
    \ – Use these buttons to quickly insert an operator.\n5.  *Functions Pane* – A\
    \ list of built-in, custom, and plug-in provided functions that can be inserted\
    \ into the formula. They can be organized hierarchically or alphabetically.\n\
    6.  Settings for calculation fields only:\n    *   *Calculation Result Is* – Select\
    \ a data type for the result for field calculations. Other formulas automatically\
    \ specify by object or function type, e.g., button names must be text.\n    *\
    \   *Number of Repetitions* – Specify the number of repetitions.\n    *   *Do\
    \ Not Evaluate Checkbox* – Select to automatically return no value if every field\
    \ referenced in the formula is empty.\n    *   *Storage Options* – Open a dialog\
    \ of storage options.\n\n## Writing Formulas\n\nFormulas can contain any combination\
    \ of components and range greatly in complexity. All the examples in this section\
    \ assume the formula is being typed into the `Sandbox::Example Calculation` field\
    \ in the *Learn FileMaker* database, so you can see the results in that field\
    \ on the *Sandbox Form* layout.\n\n### Constant-Only Formula\n\nA `constant-only`\
    \ formula is a formula that evaluates to a literal value without performing any\
    \ actual operations. It is basically a statement containing a single value that\
    \ will always evaluate to a result of the same value. These have a practical value\
    \ as a way of storing static information such as a current tax rate or value(s)\
    \ used as a relationship match field to connect to a subset of related records\
    \ of a certain type. For now, it will serve as the most basic example to get us\
    \ started writing simple formulas. Type `\"Hello World\"` into the formula area,\
    \ and select a calculation result data type of `text`. The dialog should now look\
    \ as shown in Figure [12-3](#429700_2_En_12_Chapter.xhtml#Fig3). After saving\
    \ the formula, the *Example Calculation* field on the layout should now display\
    \ the text `\"Hello World\"` for every record. The result is the same because\
    \ the formula returns a static value. For it to vary from one record to the next,\
    \ the formula would require components that vary from one record to the next,\
    \ such as field references.\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig3_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig3_HTML.jpg)\n\
    \n**Figure 12-3** A simple calculation formula with a static result\n\n### Creating\
    \ Intentional Errors\n\nBefore moving forward, it is important to understand the\
    \ difference between a syntax error and a result error. A `syntax error` is an\
    \ error with the format or language of the code which causes it to fail when attempting\
    \ to compile and save the formula. To illustrate this with the simple constant\
    \ formula, remove the final quotation symbol from the previous formula. When you\
    \ attempt to save the calculation, FileMaker will display the error dialog message\
    \ shown in Figure [12-4](#429700_2_En_12_Chapter.xhtml#Fig4). When a syntax error\
    \ is detected, FileMaker will not allow you to save the formula until it is correctly\
    \ formatted. Not every syntax error message will be this specific, but it usually\
    \ gives you enough information to help determine the nature of the error.\n\n\
    ![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig4_HTML.jpg](images/429700_2_En_12_Chapter/429700_2_En_12_Fig4_HTML.jpg)\n\
    \n**Figure 12-4** An example error message for formula syntax errors\n\nBy contrast,\
    \ a compiled and saved formula can produce a `result error` indicating a problem\
    \ with the formula’s settings or a component used within one or more of its operations.\
    \ In this case, the result of the formula will be a question mark. To illustrate\
    \ this, restore the formula’s closing quote mark to eliminate the syntax error.\
    \ Then change the selection in the *Calculation result is* pop-up menu to `date`,\
    \ `time`, or `timestamp`. FileMaker will allow the formula to be saved because\
    \ the syntax is correct and it doesn’t compare the result type setting (`date`)\
    \ to the actual result data type (`text`) because it assumes you have responsibly\
    \ created a formula that produces the result you indicated. When you look at the\
    \ field on a record, the result will be displayed as a question mark. Not every\
    \ mismatch type produces a syntax error. Some, like `number` and `container`,\
    \ will display a text result that looks normal but may not behave as expected\
    \ when searching, sorting, or using the information in other formulas."
