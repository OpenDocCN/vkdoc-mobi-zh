- fmt: "# Exploring Menu Item Settings\n\nThe settings to the right of the menu items\
    \ list will vary depending on the type of menu item selected: `command`, `submenu`,\
    \ and `separator`. Each of these have one common setting: an `Install when` text\
    \ area that works the same as described earlier for the menu, allowing a formula\
    \ to control the conditions under which the menu item will appear within the menu.\
    \ For `separators`, this is the only option available.\n\n## Defining Settings\
    \ for Commands\n\nThe settings available for a `Command` menu item are shown in\
    \ Figure [23-11](#429700_2_En_23_Chapter.xhtml#Fig11).\n\n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig11_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig11_HTML.jpg)\n\
    \nFigure 23-11  \nThe settings for defining a command menu item\n\nThe `Based\
    \ on existing command` can be enabled if the item's function will be an existing\
    \ FileMaker command (with or without overrides). A `Specify FileMaker Command`\
    \ dialog will open the first time the checkbox is enabled but can be opened later\
    \ using the `Specify` button. This dialog presents a list of all available commands\
    \ that can be selected to assign it to the menu item. For information about the\
    \ benefits of basing an item on a command even when the menu item will perform\
    \ a custom script, see \"Exploring the Link Between Commands and Menus\" section\
    \ later in this chapter. The three checkboxes below this provide override controls\
    \ for default behavior when based on a menu or custom settings when not.\n\nFirst,\
    \ enable the `Item Name` checkbox to override the default command name or to enter\
    \ a name for a custom item. Names should be short action-oriented statements that\
    \ clearly describe the function performed. For example, \"Print Sales Report\"\
    \ and \"Send Proposal Request\" may be good names, while \"Send to Accounting\"\
    \ doesn't make clear what is being sent, and \"Get Approval\" doesn't make clear\
    \ the action being taken.\n\nThe `Keyboard shortcut` checkbox will override a\
    \ default keyboard shortcut for a standard menu item or establish one for a custom\
    \ item. A `Specify Shortcut` dialog appears the first time this box is checked\
    \ or when the adjacent `Specify` button is clicked. While this dialog is open,\
    \ any key combination typed will be captured as the shortcut for the menu item.\
    \ Be sure to avoid any keyboard combinations that are reserved for operating system\
    \ functions or standard FileMaker menus that will remain in use.\n\nFinally, the\
    \ `Action` checkbox allows a custom script or single script step to be assigned\
    \ as the menu item's function.\n\n## Defining Settings for Submenus\n\nThe settings\
    \ available for a `Submenu` item are shown in Figure [23-12](#429700_2_En_23_Chapter.xhtml#Fig12).\
    \ The `Specify` button opens a `Select Menu` dialog allowing the assignment of\
    \ any standard submenu or custom menu as the submenu for the menu item being edited.\
    \ The `Item Name` checkbox and field allow entry of a custom name for the submenu,\
    \ overriding the name of the selected menu above.\n\n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig12_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig12_HTML.jpg)\n\
    \nFigure 23-12  \nThe settings for defining a submenu\n\n# Modifying a Standard\
    \ Menu Item\n\nLet's work through a few examples of customizing standard menu\
    \ items: `renaming`, `overriding functionality`, and `conditional removal`. This\
    \ section assumes a custom menu set was created with copies of all the standard\
    \ FileMaker menus, as previously described.\n\n## Renaming a Menu Item\n\nA standard\
    \ menu item is named generically to be descriptive of `function` without specifying\
    \ `context`. Regardless of the layout a user is viewing, a menu item is always\
    \ named `New Record`, `Delete Record`, or `Duplicate Record`. This can become\
    \ confusing when users are moving between different layouts, especially with multiple\
    \ windows open. When they select `New Record`, it may result in a record created\
    \ in a different table than the one they intended. With custom menus, the name\
    \ can be set with a formula that looks at the current layout context to include\
    \ the table name in the menu item, e.g., \"New Contact Record\" or \"New Project\
    \ Record.\"\n\nTo begin, open the `Manage Custom Menus` dialog and click on the\
    \ `Custom Menus` tab. Double-click on the `Records` menu to open the `Edit Custom\
    \ Menu` dialog. Select the `New Record` menu item in the list and enable the `Item\
    \ Name` checkbox to override the default name. Click `Specify` to open the `Specify\
    \ Calculation` dialog if it didn't automatically open. Then enter a formula for\
    \ the name. The exact formula may vary depending on your tables. If they are named\
    \ clearly like the examples we have used previously – `Contact`, `Company`, and\
    \ `Project` – then the following formula should produce the conditional menu items\
    \ shown in Figure [23-13](#429700_2_En_23_Chapter.xhtml#Fig13). This process can\
    \ be repeated for many items in the `Records` menu, although having the first\
    \ item in the menu specify the table provides a good contextual orientation for\
    \ the remaining items and may be sufficient.\n\n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig13_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig13_HTML.jpg)\n\
    \nFigure 23-13  \nExamples of a conditionally named New Record menu\n\n```\n\"\
    New \" & Get ( LayoutTableName ) & \" Record\"\n```\n\n## Overriding a Menu Item\
    \ Function\n\nA custom script can be attached to a menu item to override to the\
    \ function of a standard menu or provide a function for a custom item. For the\
    \ former, consider the fact that the `Delete Record` and `Delete All Record` functions\
    \ both present rather vague, generic dialog messages. Both dialogs ask the user\
    \ to confirm the deletion process, but neither makes it clear exactly what will\
    \ be deleted. The `Delete Record` process asks \"Permanently delete this ENTIRE\
    \ record?\" with the assumption that the user is explicitly aware of which record\
    \ they are about to delete. However, in a list view or when using multiple windows,\
    \ it is possible that the user might become disoriented and accidentally delete\
    \ the wrong record. Renaming the menu item as discussed in the last section can\
    \ avoid this, but using a custom script with a more articulate dialog provides\
    \ additional protection. A script using a `Show Custom Dialog` step (Chapter [25](#429700_2_En_25_Chapter.xhtml))\
    \ can present a more specific confirmation prompt. For example, a message can\
    \ include the table name and the contents of a field representing the record (e.g.,\
    \ a contact or project name), and/or a notification of related material will also\
    \ be automatically deleted. Once you have established the desired message formula,\
    \ create a script that performs the steps to ask the user, evaluate their response,\
    \ and take the appropriate action or not. The following example script presents\
    \ a dialog with whatever message formula you insert. The button the user clicks\
    \ is placed into a `$button` variable which is used in an `If` statement to `Exit\
    \ Script` if they click `Cancel`. If they didn't cancel, the script continues,\
    \ performing a `Delete Record/Request` step without a default dialog.\n\n```\n\
    Show Custom Dialog [ \"Confirm Deletion Request\" ; \"\" ]\nSet Variable [ $button\
    \ ; Get ( LastMessageChoice ) ]\nIf [ $button = 1 ] // Cancel Button\nExit Script\n\
    End If\nDelete Record/Request [ with dialog:Off ]\n```\n\nOnce written and tested,\
    \ override the `Delete Record` menu item's `Action` to point to the custom script.\
    \ The default message should now be replaced with the custom script dialog, as\
    \ shown in Figure [23-14](#429700_2_En_23_Chapter.xhtml#Fig14).\n\n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig14_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig14_HTML.jpg)\n\
    \nFigure 23-14  \nThe default delete dialog (left) and a custom example (right)"
  raw: '#### Exploring Menu Item Settings


    The settings to the right of the menu items list will vary depending on the type
    of menu item selected: *command*, *submenu*, and *separator*. Each of these have
    one common setting: an *Install when* text area that works the same as described
    earlier for the menu, allowing a formula to control the conditions under which
    the menu item will appear within the menu. For *separators*, this is the only
    option available.


    ##### Defining Settings for Commands


    The settings available for a *Command* menu item are shown in Figure [23-11](#429700_2_En_23_Chapter.xhtml#Fig11).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig11_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig11_HTML.jpg)


    Figure 23-11


    The settings for defining a command menu item


    The *Based on existing command* can be enabled if the item’s function will be
    an existing FileMaker command (with or without overrides). A *Specify FileMaker
    Command* dialog will open the first time the checkbox is enabled but can be opened
    later using the *Specify* button. This dialog presents a list of all available
    commands that can be selected to assign it to the menu item. For information about
    the benefits of basing an item on a command even when the menu item will perform
    a custom script, see “Exploring the Link Between Commands and Menus” section later
    in this chapter. The three checkboxes below this provide override controls for
    default behavior when based on a menu or custom settings when not.


    First, enable the *Item Name* checkbox to override the default command name or
    to enter a name for a custom item. Names should be short action-oriented statements
    that clearly describe the function performed. For example, “Print Sales Report”
    and “Send Proposal Request” may be good names, while “Send to Accounting” doesn’t
    make clear what is being sent, and “Get Approval” doesn’t make clear the action
    being taken.


    The *Keyboard shortcut* checkbox will override a default keyboard shortcut for
    a standard menu item or establish one for a custom item. A *Specify Shortcut*
    dialog appears the first time this box is checked or when the adjacent *Specify*
    button is clicked. While this dialog is open, any key combination typed will be
    captured as the shortcut for the menu item. Be sure to avoid any keyboard combinations
    that are reserved for operating system functions or standard FileMaker menus that
    will remain in use.


    `Finally, the` *Action* checkbox allows a custom script or single script step
    to be assigned as the menu item’s function.


    ##### Defining Settings for Submenus


    The settings available for a *Submenu* item are shown in Figure [23-12](#429700_2_En_23_Chapter.xhtml#Fig12).
    The *Specify* button opens a *Select Menu* dialog allowing the assignment of any
    standard submenu or custom menu as the submenu for the menu item being edited.
    The *Item Name* checkbox and field allow entry of a custom name for the submenu,
    overriding the name of the selected menu above.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig12_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig12_HTML.jpg)


    Figure 23-12


    The settings for defining a submenu


    ### Modifying a Standard Menu Item


    Let’s work through a few examples of customizing standard menu items: *renaming*,
    *overriding functionality,* and *conditional removal*. This section assumes a
    custom menu set was created with copies of all the standard FileMaker menus, as
    previously described.


    #### Renaming a Menu Item


    A standard menu item is named generically to be descriptive of *function* without
    specifying *context*. Regardless of the layout a user is viewing, a menu item
    is always named *New Record*, *Delete Record,* or *Duplicate Record*. This can
    become confusing when users are moving between different layouts, especially with
    multiple windows open. When they select *New Record,* it may result in a record
    created in a different table than the one they intended. With custom menus, the
    name can be set with a formula that looks at the current layout context to include
    the table name in the menu item, e.g., “New Contact Record” or “New Project Record.”


    To begin, Open the *Manage Custom Menus* dialog and click on the *Custom Menus*
    tab. Double-click on the *Records* menu to open the *Edit Custom Menu* dialog.
    Select the *New Record* menu item in the list and enable the *Item Name* checkbox
    to override the default name. Click *Specify* to open the *Specify Calculation*
    dialog if it didn’t automatically open. Then enter a formula for the name. The
    exact formula may vary depending on your tables. If they are named clearly like
    the examples we have used previously – *Contact*, *Company*, and *Project* – then
    the following formula should produce the conditional menu items shown in Figure
    [23-13](#429700_2_En_23_Chapter.xhtml#Fig13). This process can be repeated for
    many items in the *Records* menu, although having the first item in the menu specify
    the table provides a good contextual orientation for the remaining items and may
    be sufficient.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig13_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig13_HTML.jpg)


    Figure 23-13


    Examples of a conditionally named New Record menu


    ```

    "New " & Get ( LayoutTableName ) & " Record"

    ```


    #### Overriding a Menu Item Function


    A custom script can be attached to a menu item to override to the function of
    a standard menu or provide a function for a custom item. For the former, consider
    the fact that the *Delete Record* and *Delete All Record* functions both present
    rather vague, generic dialog messages. Both dialogs ask the user to confirm the
    deletion process, but neither makes it clear exactly what will be deleted. The
    *Delete Record* process asks “Permanently delete this ENTIRE record?” with the
    assumption that the user is explicitly aware of which record they are about to
    delete. However, in a list view or when using multiple windows, it is possible
    that the user might become disoriented and accidentally delete the wrong record.
    Renaming the menu item as discussed in the last section can avoid this, but using
    a custom script with a more articulate dialog provides additional protection.
    A script using a *Show Custom Dialog* step (Chapter [25](#429700_2_En_25_Chapter.xhtml))
    can present a more specific confirmation prompt. For example, a message can include
    the table name and the contents of a field representing the record (e.g., a contact
    or project name), and/or a notification of related material will also be automatically
    deleted. Once you have established the desired message formula, create a script
    that performs the steps to ask the user, evaluate their response, and take the
    appropriate action or not. The following example script presents a dialog with
    whatever message formula you insert. The button the user clicks is placed into
    a *$button* variable which is used in an *If* statement to *Exit Script* if they
    click *Cancel*. If they didn’t cancel, the script continues, performing a *Delete
    Record/Request* step without a default dialog.


    ```

    Show Custom Dialog [ "Confirm Deletion Request" ; "" ]

    Set Variable [ $button ; Get ( LastMessageChoice ) ]

    If [ $button = 1 ] // Cancel Button

    Exit Script

    End If

    Delete Record/Request [ with dialog:Off ]

    ```


    Once written and tested, override the *Delete Record* menu item’s *Action* to
    point to the custom script. The default message should now be replaced with the
    custom script dialog, as shown in Figure [23-14](#429700_2_En_23_Chapter.xhtml#Fig14).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig14_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig14_HTML.jpg)


    Figure 23-14


    The default delete dialog (left) and a custom example (right)'
  trans: "\n# 探索菜单项设置\n\n菜单项列表右侧的设置会根据所选菜单项的类型而变化：`command`（命令）、`submenu`（子菜单）和 `separator`（分隔符）。每种类型都有一个共同设置：一个`Install\
    \ when`（何时安装）文本区域，其工作原理与前面菜单描述相同，允许通过公式控制菜单项在菜单中显示的时机。对于`separators`（分隔符），这是唯一可用的选项。\n\
    \n## 定义命令设置\n\n`Command`（命令）菜单项的可用设置如图 23-11 所示。\n\n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig11_HTML.jpg](img/429700_2_En_23_Fig11_HTML.jpg)\n\
    \n图 23-11  \n定义命令菜单项的设置\n\n如果该项的功能是现有的 FileMaker 命令（带或不带覆盖），则可以启用`Based on existing\
    \ command`（基于现有命令）。首次启用该复选框时，会打开一个`Specify FileMaker Command`（指定 FileMaker 命令）对话框，但之后可通过`Specify`（指定）按钮再次打开。该对话框列出了所有可用的命令，以便选择并将其分配给菜单项。关于即使菜单项执行自定义脚本时也基于命令的好处，请参见本章后面的\"\
    探索命令与菜单之间的联系\"部分。下方的三个复选框为基于菜单时的默认行为（或未基于菜单时的自定义设置）提供了覆盖控制。\n\n首先，启用`Item Name`（项目名称）复选框以覆盖默认命令名称，或为自定义项输入名称。名称应为简短、面向操作的陈述句，清晰描述所执行的功能。例如，\"\
    打印销售报表\"和\"发送提案请求\"可能是好名称，而\"发送到会计部\"则未说明发送内容，\"获取批准\"也未明确正在执行的操作。\n\n`Keyboard\
    \ shortcut`（键盘快捷键）复选框将覆盖标准菜单项的默认键盘快捷键，或为自定义项建立快捷键。首次勾选此框或单击旁边的`Specify`（指定）按钮时，会显示一个`Specify\
    \ Shortcut`（指定快捷键）对话框。在此对话框打开的状态下，输入的任何按键组合都将被捕获为该菜单项的快捷键。请务必避免使用预留用于操作系统功能或仍在使用中的标准\
    \ FileMaker 菜单的键盘组合。\n\n最后，`Action`（操作）复选框允许将自定义脚本或单个脚本步骤分配为菜单项的功能。\n\n## 定义子菜单设置\n\
    \n`Submenu`（子菜单）项的可用设置如图 23-12 所示。`Specify`（指定）按钮会打开一个`Select Menu`（选择菜单）对话框，允许将任何标准子菜单或自定义菜单分配为正在编辑的菜单项的子菜单。`Item\
    \ Name`（项目名称）复选框及字段允许为子菜单输入自定义名称，以覆盖上方所选菜单的名称。\n\n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig12_HTML.jpg](img/429700_2_En_23_Fig12_HTML.jpg)\n\
    \n图 23-12  \n定义子菜单的设置\n\n# 修改标准菜单项\n\n让我们通过几个示例来学习自定义标准菜单项：`重命名`、`覆盖功能`和`条件性移除`。本节假设已按照前述方法，通过复制所有标准\
    \ FileMaker 菜单创建了一个自定义菜单集。\n\n## 重命名菜单项\n\n标准菜单项的名称是通用性的，用于描述`功能`，而不指定`上下文`。无论用户正在查看哪个布局，菜单项始终命名为`新建记录`、`删除记录`或`复制记录`。当用户在不同布局之间切换时，尤其是在打开多个窗口的情况下，这可能会造成混淆。当他们选择`新建记录`时，可能会在不相关的表中创建记录。使用自定义菜单，可以通过公式设置名称，该公式会查看当前布局上下文，将表名包含在菜单项中，例如，\"\
    新建联系人记录\"或\"新建项目记录\"。\n\n首先，打开`管理自定义菜单`对话框，单击`自定义菜单`标签页。双击`记录`菜单以打开`编辑自定义菜单`对话框。在列表中选择`新建记录`菜单项，并启用`Item\
    \ Name`（项目名称）复选框以覆盖默认名称。单击`Specify`（指定）打开`指定计算`对话框（如果未自动打开）。然后输入一个名称公式。具体公式可能因数据表而异。如果它们的命名清晰，如我们之前使用的示例——`联系人`、`公司`和`项目`——则以下公式应能生成如图\
    \ 23-13 所示的条件性菜单项。此过程可针对`记录`菜单中的许多项重复进行，不过让菜单中的第一个项指定数据表，即可为其余项提供良好的上下文定位，可能已经足够。\n\
    \n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig13_HTML.jpg](img/429700_2_En_23_Fig13_HTML.jpg)\n\
    \n图 23-13  \n条件性命名的\"新建记录\"菜单示例\n\n```\n\"New \" & Get ( LayoutTableName ) & \"\
    \ Record\"\n```\n\n## 覆盖菜单项功能\n\n可以为菜单项附加自定义脚本，以覆盖标准菜单的功能，或为自定义项提供功能。对于前者，请考虑以下事实：`删除记录`和`删除全部记录`功能都会显示相当模糊、通用的对话框消息。这两个对话框都要求用户确认删除过程，但都没有明确说明将要删除的具体内容。`删除记录`过程会询问\"\
    永久删除这整条记录？\"默认用户明确知道自己将要删除哪条记录。然而，在列表视图或使用多个窗口时，用户可能会迷失方向，意外删除错误的记录。如上节所述重命名菜单项可以避免这种情况，但使用带有更清晰对话框的自定义脚本则能提供额外的保护。使用`显示自定义对话框`步骤（第\
    \ 25 章）的脚本可以显示更具体的确认提示。例如，消息可以包含表名和代表该记录的字段内容（例如，联系人或项目名称），和/或同时自动删除相关材料的通知。一旦确定了所需的消息公式，创建一个脚本，执行询问用户、评估其响应并采取适当操作（或不操作）的步骤。以下示例脚本会显示一个包含你插入的任何消息公式的对话框。用户点击的按钮将被存入一个`$button`变量中，该变量在`If`语句中用于判断，如果用户点击`取消`则`退出脚本`。如果用户未取消，脚本继续执行，在不显示默认对话框的情况下执行`删除记录/请求`步骤。\n\
    \n```\nShow Custom Dialog [ \"Confirm Deletion Request\" ; \"\" ]\nSet Variable\
    \ [ $button ; Get ( LastMessageChoice ) ]\nIf [ $button = 1 ] // 取消按钮\nExit Script\n\
    End If\nDelete Record/Request [ with dialog:Off ]\n```\n\n编写并测试后，覆盖`删除记录`菜单项的`Action`（操作），使其指向自定义脚本。现在，默认消息应被自定义脚本对话框取代，如图\
    \ 23-14 所示。\n\n![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig14_HTML.jpg](img/429700_2_En_23_Fig14_HTML.jpg)\n\
    \n图 23-14  \n默认删除对话框（左）与自定义示例（右）\n"
- fmt: '# 条件性移除菜单项


    可以根据特定条件有条件地隐藏菜单。例如，`Delete All Records`菜单项对开发者和知识型用户很有用，但对某些其他用户来说可能存在危险。用户可能认为自己在删除一个小的找到记录集，却不小心删除了表中的每条记录。为避免这种情况，通过修改控制菜单项安装时机的公式来隐藏该菜单。点击菜单项`Install
    when`设置旁边的`Specify`按钮。然后输入一个公式，该公式对允许使用该功能的任何用户、权限集或扩展权限评估为`1`（真），对其他所有人评估为`0`（假）。例如，以下公式将仅为对文件拥有`full
    access privileges`的开发者用户安装该菜单项（第[30](#429700_2_En_30_Chapter.xhtml)章）：


    ```

    Case (

    Get ( AcccountPrivilegeSetName ) = "[Full Access]" ; 1 ;


    )

    ```


    当条件可能导致菜单功能引发错误或让用户困惑时，隐藏自定义菜单是个好主意。例如，某些自定义项不应在查找模式、查看空找到集或卡片式窗口打开时可访问（第[25](#429700_2_En_25_Chapter.xhtml)章）。


    ## 添加自定义菜单


    添加一个全新的菜单可以为用户提供便捷访问自定义脚本的方式，而无需在布局上堆砌几十个按钮或在标准菜单中塞满大量项目。


    一个包含几十个脚本的数据库，这些脚本可按状态或其他条件在不同表中查找记录组，可以将它们放在`Records`菜单下。类似地，针对发票和其他表的报表脚本可以放在`File`菜单下，靠近`Print`项。这样会将自定义功能集成到现有菜单中，在这些或类似情况下可能是可取的。然而，当添加大量此类项目时，会增加原本拥挤的菜单的混乱程度，并且需要用户了解访问这些自定义脚本的所有不同位置。相反，考虑让自定义菜单项的位置更加便捷。


    `Scripts`菜单（第[24](#429700_2_En_24_Chapter.xhtml)章）可以用于此目的，因为它允许脚本选择性包含在基于文件夹的分层子菜单结构中。然而，有时创建完全自定义的菜单是有益或可取的，以提供更专业的品牌化界面。当菜单需要任何形式的编程可变性时，这一点尤其重要，因为默认的`Scripts`菜单项无法动态更改名称、拥有自定义快捷键或被条件性隐藏。


    添加一个或多个全新的菜单可以解决这些问题，并提供真正的自定义应用体验。具体设置将根据需要在菜单中存在的功能数量和种类而变化。使用前面的例子，当面临大量搜索和报表脚本时，开发者可以添加两个菜单：`Searches`和`Reports`。然而，如果每个菜单中的项目数量很少，或者它们是需要的大量自定义菜单中的两个，则可以考虑添加一个名为`Actions`的菜单，并将每个类别作为子菜单。或者，一个以客户命名的自定义菜单是添加个性化自定义操作集合的好方法。


    ### 创建 Actions 菜单


    要创建新的`Actions`菜单，打开`Manage Custom Menus`对话框，点击`Custom Menus`选项卡，然后点击`Create`按钮。接着按照以下步骤操作：


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig15_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig15_HTML.jpg)


    **图 23-15** 菜单栏中出现的新菜单


    1.  选择`Start with an empty menu`并点击`OK`。

    2.  在`Edit Custom Menu`对话框中，输入自定义名称（例如“Actions”），输入同名的覆盖标题，并仅将菜单包含在浏览模式中。然后点击`OK`。

    3.  点击`Manage Custom Menus`对话框的`Custom Menu Sets`选项卡。

    4.  选择`Learn FileMaker`菜单集并点击`Edit`。

    5.  在`Edit Custom Menu Set`对话框中，点击`Add`。

    6.  在打开的`Select Menu`对话框中，滚动到底部，选择`Actions`菜单，然后点击`Select`按钮。

    7.  在`Edit Custom Menu Set`对话框中，将`Actions`菜单拖拽到菜单列表中的所需位置。

    8.  点击`OK`关闭`Edit Custom Menu Set`对话框，然后点击`OK`关闭`Manage Custom Menus`对话框。如果自定义菜单集处于活动状态，菜单栏应显示一个新的`Actions`菜单，如图[23-15](#429700_2_En_23_Chapter.xhtml#Fig15)所示。


    ### 向 Actions 菜单添加项目


    将新的`Actions`菜单添加到菜单集后，根据需要添加菜单项。


    #### 添加命令菜单项


    要添加命令项，返回`Manage Custom Menus`对话框的`Custom Menus`选项卡，打开自定义`Actions`菜单。然后点击`Create`按钮添加新的菜单项。从一个简单示例开始，创建一个显示对话框的“About
    This Menu”项，步骤如下：


    1.  启用`Item Name`复选框，并在相邻的文本区域中输入名称“About This Menu”。

    2.  启用`Action`复选框。

    3.  在`Specify Script Step`对话框中，选择`Show Custom Dialog`步骤（第[25](#429700_2_En_25_Chapter.xhtml)章），并将其配置为显示描述菜单用途和功能的消息。

    4.  点击`OK`保存并返回所有对话框。


    现在`Actions`菜单应有一个菜单项，显示描述其功能的对话框，如图[23-16](#429700_2_En_23_Chapter.xhtml#Fig16)所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig16_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig16_HTML.jpg)


    **图 23-16** 自定义菜单项及生成的对话框


    #### 添加子菜单项


    当菜单变得过于拥挤时，可以组织项目分组。使用分隔符可以帮助将一长串项目划分为不同的组。对于更复杂的情况，使用子菜单将项目组织成子类别，使用户更容易找到特定功能。例如，`Searches`子菜单可以列出所有可用的搜索功能，而`Reports`子菜单可以列出所有报表，将这两组项目从`Actions`菜单的主列表中移出。


    提示


    考虑使用“七法则”来决定何时使用分隔符或子菜单对菜单项进行分组。当一组项目接近或超过七个时，考虑将它们与其他组分开。


    首先，创建一个包含一些项目的新自定义菜单。该菜单不会直接作为菜单添加到菜单集中，而是作为子菜单附加到另一个菜单的某个项目上。例如，创建一个名为`Reports
    Submenu`的新自定义菜单，并为每个你计划创建的报表脚本添加一个菜单项占位符，例如：`Revenue This Year to Date`、`Revenue
    This Year`和`Revenue Last Year`。目前，这些不会真正运行脚本，仅用于说明子菜单的设置。创建完成后，返回编辑`Actions`菜单，创建一个名为“Reports”的新项目，并将其配置为指向`Reports
    Submenu`的子菜单，如图[23-17](#429700_2_En_23_Chapter.xhtml#Fig17)所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig17_HTML.png](images/429700_2_En_23_Chapter/429700_2_En_23_Fig17_HTML.png)


    **图 23-17** 附加到`Actions`菜单中项目的子菜单示例


    保存并退出所有对话框后，`Actions`菜单现在应显示一个`Reports`子菜单，如图[23-18](#429700_2_En_23_Chapter.xhtml#Fig18)所示。


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig18_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig18_HTML.jpg)


    **图 23-18** 子菜单对用户显示的示例'
  raw: '#### Removing a Menu Item Conditionally


    A menu can be conditionally hidden under specific conditions. For example, the
    *Delete All Records* menu item is useful for developers and knowledgeable users
    but potentially dangerous for certain other users. There is a real possibility
    that a user thinks they are deleting a small found set of records and inadvertently
    delete every record in the table. To avoid this, hide the menu by modifying the
    formula controlling when that item is installed. Click the *Specify* button next
    to the *Install when* setting for the menu item. Then enter a formula that evaluates
    to 1 (true) for any users, privilege sets, or extended privilege who are allowed
    to use the function and 0 (false) for everyone else. For example, the following
    formula will install the menu item only for developer users with *full access
    privileges* to the file (Chapter [30](#429700_2_En_30_Chapter.xhtml)):


    ```

    Case (

    Get ( AcccountPrivilegeSetName ) = "[Full Access]" ; 1 ;


    )

    ```


    Hiding custom menus is a good idea when conditions would make a menu’s function
    cause an error or be otherwise confusing for the user. For example, certain custom
    items shouldn’t be accessible in Find mode, when viewing an empty found set or
    when a card-style window is open (Chapter [25](#429700_2_En_25_Chapter.xhtml)).


    ### Adding a Custom Menu


    Adding a completely new menu can provide users with convenient access to custom
    scripts without cluttering a layout with dozens of buttons or clogging up standard
    menus with dozens of items.


    A database with dozens of scripts that find groups of records in different tables
    by status or other criteria could be placed under the *Records* menu. Similarly,
    report scripts for invoices and other tables *could* be placed under the *File*
    menu near the *Print* item. This would integrate custom features into existing
    menus and may be desirable in these or other similar cases. However, when adding
    numerous such items, this adds clutter to already crowded menus and requires a
    user to know all the various locations in which to access these custom scripts.
    Instead, consider making custom menu items more conveniently located.


    The *Scripts* menu (Chapter [24](#429700_2_En_24_Chapter.xhtml)) *can* be used
    for this purpose since it allows scripts to be selectively included in a hierarchical
    folder-based arrangement of submenus. However, sometimes, it is beneficial or
    desirable to create one or more fully custom menus to provide a more professionally
    branded interface. This is especially important when the menu needs any kind of
    programmatic variability, since the default *Scripts* menu items can’t dynamically
    change names, have custom key commands, or be conditionally hidden.


    Adding one or more completely new menus solves these problems and satisfies a
    truly custom application experience. The setup will vary based on the number and
    variety of functions requiring a presence in the menu. Using the previous example,
    when faced with a large quantity of search and report scripts, a developer may
    add two menus: *Searches* and *Reports*. However, if the number of items in each
    is sparse or these are two among dozens of required custom menus, one might consider
    adding a single menu called *Actions* and having each category be a submenu. Alternatively,
    a single custom menu with a client’s name is a great way to adding a personalized
    collection of custom actions.


    #### Creating an Actions Menu


    To create a new *Actions* menu, open the *Manage Custom Menus* dialog, click on
    the *Custom Menus* tab, and click the *Create* button. Then follow these steps:


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig15_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig15_HTML.jpg)


    Figure 23-15


    The new menu appearing in the menu bar


    1.  Select *Start with an empty menu* and click OK.


    2.  In the *Edit Custom Menu* dialog, enter a custom name (e.g., “Actions”), an
    override title of the same name, and only include the menu in Browse mode. Then
    click OK.


    3.  Click the *Custom Menu Sets* tab of the *Manage Custom Menus* dialog.


    4.  Select the *Learn FileMaker* menu set and click *Edit.*


    5.  In the *Edit Custom Menu Set* dialog, click *Add*.


    6.  In the *Select Menu* dialog that opens, scroll to the bottom and select the
    *Actions* menu, and then click the *Select* button.


    7.  In the *Edit Custom Menu Set* dialog, drag the *Actions* menu to the desired
    location within the list of menus.


    8.  Click OK to close the *Edit Custom Menu Set* dialog and then OK to close the
    *Manage Custom Menus* dialog. If the custom menu set is active, the menu bar should
    have a new *Actions* menu, as shown in Figure [23-15](#429700_2_En_23_Chapter.xhtml#Fig15).


    #### Adding Items to the Actions Menu


    With the new *Actions* menu added to the menu set, add menu items as needed.


    ##### Adding a Command Menu Item


    To add a command item, return to the *Custom Menus* tab of the *Manage Custom
    Menus* dialog, and open the custom *Actions* menu. Then click the *Create* button
    to add a new menu item. To get started with a simple example, make an “About This
    Menu” item that displays a dialog by following these steps:


    1.  Enable the *Item Name* checkbox and enter a name of “About This Menu” into
    the adjacent text area.


    2.  Enable the *Action* checkbox.


    3.  In the *Specify Script Step* dialog, select the *Show Custom Dialog* step
    (Chapter [25](#429700_2_En_25_Chapter.xhtml)), and configure it to display a message
    describing the menu’s purpose and function.


    4.  Click OK to save back through all the dialogs.


    Now the *Actions* menu should have a single menu item that displays a dialog describing
    its function, as shown in Figure [23-16](#429700_2_En_23_Chapter.xhtml#Fig16).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig16_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig16_HTML.jpg)


    Figure 23-16


    The custom menu item and resulting dialog


    ##### Adding a Submenu Item


    As menus become too crowded, organize groups of items. Using separators can help
    divide a long list of items into separate groups. For more complex situations,
    use submenus to organize items into subcategories and make it easier for users
    to locate a specific function. For example, a *Searches* submenu can list all
    the available search functions, while a *Reports* submenu can list all the reports,
    moving both of these groups of items from the main list of an *Actions* menu.


    Tip


    Consider using the “rule of seven” to determine when to divide menu items into
    groups using separators or submenus. As a group approaches or exceeds seven items,
    consider separating them from other groups.


    First, create a new custom menu with some items. This will not be added directly
    to the menu set as a menu but will be attached as a submenu to an item of another
    menu. For example, create new custom menu called *Reports Submenu,* and add one
    menu item placeholder for each report script you envision creating, e.g., *Revenue
    This Year to Date*, *Revenue This Year*, and *Revenue Last Year*. For now, these
    won’t actually run a script but will be used to illustrate setting up a submenu.
    Once they are created, return to editing the *Actions* menu and create a new item
    named “Reports” and configure it as a *submenu* pointing to the *Reports Submenu*,
    as shown in Figure [23-17](#429700_2_En_23_Chapter.xhtml#Fig17).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig17_HTML.png](images/429700_2_En_23_Chapter/429700_2_En_23_Fig17_HTML.png)


    Figure 23-17


    An example of a submenu attached to an item in the Actions menu


    After saving your way back out of the dialogs, the *Actions* menu should now display
    a *Reports* submenu, as shown in Figure [23-18](#429700_2_En_23_Chapter.xhtml#Fig18).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig18_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig18_HTML.jpg)


    Figure 23-18


    An example of the submenu as it appears to users'
