- fmt: '### Indexing Match Fields


    A relationship forms a bidirectional conduit which allows either table to act
    as the local *starting context* (parent) for formulas and layouts from which the
    other related table is targeted (child). However, in order for the connection
    to produce results, *every match field used in the targeted (child) table must
    either be indexed or a global*. Since calculation fields can’t be indexed when
    their formula contains related fields, a calculated match field on the targeted
    side must only include fields local to that table. Global fields can’t be indexed
    but will still work on either side of the relationship. However, they are only
    really practical on the local (parent) side since they produce a match to every
    record when used on the target (child) side.


    ### Using Table Occurrences


    Instead of directly connecting tables, relationships are actually connections
    between an abstraction of a table. In FileMaker, a *table occurrence* is a representative
    instance of a table placed into a graphical worksheet called the *relationship
    graph*. Although the tables are technically linked, it is done through a specific
    occurrence instance of the table. This avoids circular connections between tables
    and enables multiple connections between the same two tables based on different
    criteria. It even allows *self-join connections* between a table and itself.


    Every table is automatically represented in the relationship graph with a default
    table occurrence. Although this appears to be and can be thought of as the table,
    it is only an *occurrence* of the table. As a database grows, multiple connections
    involving the same table become necessary but risk becoming circular, as illustrated
    in Figure [9-8](#429700_2_En_9_Chapter.xhtml#Fig8) (left). Here, the connections
    between *company-to-contact* and *company-to-project* are standard one-to-many
    relationships and don’t pose a problem. However, when a *contact-to-project* connection
    is required, it would create an overall circular connection between the three
    tables which is forbidden. To resolve this, a new occurrence of the *Contact*
    table is created and used for the new relationship (right). Both instances of
    Contact represent the *same table* but from a *different relational context*.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig8_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig8_HTML.jpg)


    Figure 9-8


    A circular connection (left) is solved with a new occurrence (right)


    Context is a critically important concept in FileMaker. While a *table* is an
    isolated data structure defining and storing information in fields and records,
    a *table occurrence* specifies that data from a specific *relational context*
    and is used everywhere to control what tables are accessible from a given perspective.
    A calculation field’s formula operates from a context that must be selected if
    there is more than one occurrence for the field’s parent table. Value lists can
    be configured to filter values from a field to only those in an occurrence from
    a specific starting interface context (Chapter [11](#429700_2_En_11_Chapter.xhtml)).
    Each layout requires an occurrence assignment that controls which fields can be
    displayed and establishes the context for object formulas. Numerous script steps
    automatically execute from the *user context*, based on the occurrence assigned
    to the layout active in the current window at the time they execute.


    As more occurrences are added, they can be chained together in sequences. In the
    previous example, there is a connection from *Company* to *Project* to *Contact-2*.
    Each step between occurrences is often referred to as a “hop,” referring to the
    number of occurrence steps to get from a starting occurrence to a target. A calculation,
    layout, or script step can access fields through any number of hops along a single
    relational chain, but reaching across too many can become problematic. In the
    preceding example, a formula in *Company* can access fields from *Contact-2* but
    *only* for the first related *Project* record because it has to reach through
    that relational conduit. A more direct route to the other *Contact* occurrence
    directly connected to the *Company* occurrence provides access to all company
    contacts.


    As the relational model grows in complexity, it can quickly become a monolithic
    mess that is both confusing and technically dangerous. Developers with less experience
    tend to rapidly connect more and more occurrences into one gigantic multipronged
    chain of occurrences, a single mass that is referred to as a *hub-and-spoke monolith*.
    Instead, the recommended approach is to build multiple separate *table occurrence
    groups*. Given the reliance on relational context everywhere in a database’s development,
    a better understanding of these two approaches can make the difference between
    creating an efficient system and a colossal mess.


    Caution


    These discussions of relational models may be overwhelming to beginners, especially
    prior to creating layouts. However, it will be worth the effort to avoid mistakes
    later.'
  raw: '### Indexing Match Fields


    A relationship forms a bidirectional conduit which allows either table to act
    as the local *starting context* (parent) for formulas and layouts from which the
    other related table is targeted (child). However, in order for the connection
    to produce results, *every match field used in the targeted (child) table must
    either be indexed or a global*. Since calculation fields can’t be indexed when
    their formula contains related fields, a calculated match field on the targeted
    side must only include fields local to that table. Global fields can’t be indexed
    but will still work on either side of the relationship. However, they are only
    really practical on the local (parent) side since they produce a match to every
    record when used on the target (child) side.


    ### Using Table Occurrences


    Instead of directly connecting tables, relationships are actually connections
    between an abstraction of a table. In FileMaker, a *table occurrence* is a representative
    instance of a table placed into a graphical worksheet called the *relationship
    graph*. Although the tables are technically linked, it is done through a specific
    occurrence instance of the table. This avoids circular connections between tables
    and enables multiple connections between the same two tables based on different
    criteria. It even allows *self-join connections* between a table and itself.


    Every table is automatically represented in the relationship graph with a default
    table occurrence. Although this appears to be and can be thought of as the table,
    it is only an *occurrence* of the table. As a database grows, multiple connections
    involving the same table become necessary but risk becoming circular, as illustrated
    in Figure [9-8](#429700_2_En_9_Chapter.xhtml#Fig8) (left). Here, the connections
    between *company-to-contact* and *company-to-project* are standard one-to-many
    relationships and don’t pose a problem. However, when a *contact-to-project* connection
    is required, it would create an overall circular connection between the three
    tables which is forbidden. To resolve this, a new occurrence of the *Contact*
    table is created and used for the new relationship (right). Both instances of
    Contact represent the *same table* but from a *different relational context*.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig8_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig8_HTML.jpg)


    Figure 9-8


    A circular connection (left) is solved with a new occurrence (right)


    Context is a critically important concept in FileMaker. While a *table* is an
    isolated data structure defining and storing information in fields and records,
    a *table occurrence* specifies that data from a specific *relational context*
    and is used everywhere to control what tables are accessible from a given perspective.
    A calculation field’s formula operates from a context that must be selected if
    there is more than one occurrence for the field’s parent table. Value lists can
    be configured to filter values from a field to only those in an occurrence from
    a specific starting interface context (Chapter [11](#429700_2_En_11_Chapter.xhtml)).
    Each layout requires an occurrence assignment that controls which fields can be
    displayed and establishes the context for object formulas. Numerous script steps
    automatically execute from the *user context*, based on the occurrence assigned
    to the layout active in the current window at the time they execute.


    As more occurrences are added, they can be chained together in sequences. In the
    previous example, there is a connection from *Company* to *Project* to *Contact-2*.
    Each step between occurrences is often referred to as a “hop,” referring to the
    number of occurrence steps to get from a starting occurrence to a target. A calculation,
    layout, or script step can access fields through any number of hops along a single
    relational chain, but reaching across too many can become problematic. In the
    preceding example, a formula in *Company* can access fields from *Contact-2* but
    *only* for the first related *Project* record because it has to reach through
    that relational conduit. A more direct route to the other *Contact* occurrence
    directly connected to the *Company* occurrence provides access to all company
    contacts.


    As the relational model grows in complexity, it can quickly become a monolithic
    mess that is both confusing and technically dangerous. Developers with less experience
    tend to rapidly connect more and more occurrences into one gigantic multipronged
    chain of occurrences, a single mass that is referred to as a *hub-and-spoke monolith*.
    Instead, the recommended approach is to build multiple separate *table occurrence
    groups*. Given the reliance on relational context everywhere in a database’s development,
    a better understanding of these two approaches can make the difference between
    creating an efficient system and a colossal mess.


    Caution


    These discussions of relational models may be overwhelming to beginners, especially
    prior to creating layouts. However, it will be worth the effort to avoid mistakes
    later.'
  trans: '

    ### 索引匹配字段


    关系形成一条双向通道，允许任一表作为本地*起始上下文*（父表），供公式和布局以此定位另一相关表（子表）作为目标。然而，要使连接产生结果，*目标（子）表中使用的每个匹配字段必须被索引或为全局字段*。由于计算字段在其公式包含相关字段时无法被索引，因此目标侧的计算匹配字段必须仅包含该表本地的字段。全局字段无法被索引，但仍可在关系的任意一侧工作。不过，它们只在本地（父表）侧真正实用，因为在目标（子表）侧使用时，它们会匹配每条记录。


    ### 使用表出现项


    关系实际上连接的是表的抽象表示，而非直接连接表。在 FileMaker 中，*表出现项* 是表的一个代表实例，放置在一个称为*关系图*的图形工作表中。虽然表在技术上是相连的，但这是通过表的特定出现实例完成的。这避免了表之间的循环连接，并允许基于不同条件在同一对表之间建立多个连接。它甚至允许表与自身之间的*自连接*。


    每个表都会在关系图中自动以一个默认的表出现项表示。尽管这看起来并且可以被视为表本身，但它只是表的一个*出现项*。随着数据库的增长，涉及同一表的多个连接变得必要，但有形成循环的风险，如图
    9-8（左图）所示。在这里，*公司-联系人* 和 *公司-项目* 之间的连接是标准的一对多关系，不会造成问题。然而，当需要 *联系人-项目* 连接时，它会在三个表之间形成一个整体循环连接，这是被禁止的。为了解决这个问题，创建了一个新的
    *联系人* 表出现项，用于建立新关系（右图）。两个联系人实例代表的是*同一张表*，但来自*不同的关系上下文*。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig8_HTML.jpg](img/429700_2_En_9_Fig8_HTML.jpg)


    图 9-8


    循环连接（左图）通过新出现项得到解决（右图）


    上下文是 FileMaker 中一个极其重要的概念。虽然*表*是一个独立的数据结构，用于在字段和记录中定义和存储信息，但*表出现项*指定了来自特定*关系上下文*的数据，并用于控制从给定视角可访问哪些表。计算字段的公式在一个上下文中运行，如果该字段的父表有多个出现项，则必须选择该上下文。值列表可以配置为仅筛选来自特定起始界面上下文中出现项的字段值（第
    11 章）。每个布局都需要分配一个出现项，该出现项控制可显示的字段，并为对象公式建立上下文。许多脚本步骤会根据执行时当前窗口中活动布局所分配的出现项，自动从*用户上下文*执行。


    随着更多出现项的添加，它们可以串联成序列。在前面的示例中，从 *公司* 到 *项目* 再到 *联系人-2* 有一条连接。出现项之间的每一步通常被称为一个“跳”，指从起始出现项到目标出现项的步骤数。计算、布局或脚本步骤可以沿着单个关系链通过任意数量的跳来访问字段，但跨越太多跳可能会产生问题。在前面的示例中，*公司*
    中的公式可以访问 *联系人-2* 中的字段，但*仅限*于第一个相关的 *项目* 记录，因为它必须通过那个关系通道。另一种更直接的路径，即直接连接到 *公司*
    出现项的其他 *联系人* 出现项，则可以访问所有公司联系人。


    随着关系模型复杂性的增加，它可能迅速变成一团混乱的单体结构，既令人困惑又存在技术风险。经验较少的开发者倾向于迅速将越来越多的出现项连接成一个巨大的多分支出现项链，这种单一整体被称为*轮毂-辐条式单体*。相反，推荐的方法是构建多个独立的*表出现项组*。鉴于数据库开发中到处都依赖于关系上下文，更好地理解这两种方法可以决定你是创建一个高效的系统，还是制造一个庞大的烂摊子。


    警告


    这些关于关系模型的讨论可能让初学者感到不知所措，尤其是在创建布局之前。然而，为避免后期出现错误，付出这些努力是值得的。

    '
- fmt: "### 避免中心辐射式单体\n\n*中心辐射式单体*是一种关系模型，其中所有表实例被连接成一个庞大的互联组，如图[9-9](#429700_2_En_9_Chapter.xhtml#Fig9)所示。这种结构往往是大多数新手开发者直觉上默认采用的。他们一开始只连接少数几个默认的表实例。随后，当他们试图添加会导致循环的新关系时，`FileMaker`会提示他们创建新的实例，而他们则会保留带有数字后缀的默认表名。很快，他们就会拥有几十甚至上百个命名不当的实例，相互连接成一个庞大的组。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig9_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig9_HTML.jpg)\n\
    \n**图 9-9** 中心辐射式单体关系模型示意图\n\n虽然这本身并非必然有问题，对于简单的数据库来说甚至是一种可行的选择，但仍有充分的理由完全避免中心辐射式模型。在这种模型中，很难判断哪些实例已被使用或应被用作起始上下文，结果导致成百上千的计算、界面和脚本在整个结构中迂回曲折，造成概念上的僵局。很快，要跟踪哪个实例匹配特定的上下文就变得令人困惑，例如，在公式中试图从`Contact-1`、`Contact-2`、`Contact-3`和`Contact-4`中做出选择，就需要耗时的侦查工作。当一个布局最初被分配了错误的上下文，只有在放置了数十个需要重新配置的对象之后才发现时，就需要进行错误的启动和回溯修正。添加新功能开始变得像是一项乏味的苦差事，而要概念化整个结构则需要巨大的努力。随着复杂结构的束缚越来越紧，令人麻木的混乱只是开始。一个微小的疏忽就可能导致数据丢失，例如脚本从错误的上下文执行函数，或者由于开发者疲劳导致的界面错误，用户通过错误的关系在字段中输入数据。计算跨越过多跳数向各个方向延伸，开始使简单任务变得异常缓慢，并可能返回错误的结果。最终，当用户难以忍受极度缓慢的性能，甚至可能遇到随机应用程序崩溃时，技术问题就会出现。将问题归咎于技术的诱惑变得难以抗拒，但这实际上是经验不足的开发者选择了糟糕结构设计的错误。\n\
    \n专业的开发者明白，一个设计良好的关系模型对于技术原因和保护自身理性都*至关重要*。数据库是众多组件的复杂集成，正如*界面设计*对于避免用户混淆很重要一样，在*结构设计*方法上也应给予同等的关注，以避免开发者混淆和功能故障。中心辐射式模型的许多问题可以通过有意识地改进实践来缓解。例如，清晰地命名实例，并制定规则确定哪些实例将被用作计算和布局的起始上下文，这会有所帮助。限制公式从给定上下文向外延伸一到两跳也有帮助。但这些技术仍然需要额外的工作来设置，并有意识地努力遵守。最终，最好的解决方案是*完全避免这种模型，转而使用实例组*！\n\
    \n### 采用表实例组\n\n*表实例组*关系模型为每个表建立一个*主表实例*，并规定这些实例*永远*不直接相互连接。两个表之间的任何连接*必须*通过从一个主实例连接到一个新的表的*次实例*来建立，以避免主实例之间的任何直接连接。这也被称为*锚-浮标*模型，因为每个主实例充当一个独立的锚点，相关的次实例可以附着在其上，并被视为从该锚点漂浮出去。在图[9-10](#429700_2_En_9_Chapter.xhtml#Fig10)所示的设置中，一列主表（灰色）独立地矗立在左侧。每个连接到这些主表的次表（透明）都是主表的副本。使用此模型并遵循一些规则，可以解决中心辐射式方法中发现的大部分混乱和潜在的技术复杂性。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig10_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig10_HTML.jpg)\n\
    \n**图 9-10** 表实例组关系模型示意图\n\n左侧的每个主实例为一个*实例上下文组*建立了基础锚点。这些实例应以实际表名命名，以明确它们代表主根实例，例如`Company`、`Contact`、`Project`等。在构建界面时，只应将这些主实例用作计算字段和布局的上下文。组之间的物理隔离限制了字段或界面公式可以访问相关字段的距离和方向，因为它们被限制在其小型“岛屿”组内的相关次实例中。\n\
    \n每个次实例从主实例向右“漂浮”。这些实例的命名方式应能指示它们所连接的起始上下文组，并包含关于它们如何关联回该组根主实例的路径信息。这可以采用多种形式，但理想情况下以主实例的名称开头，后跟一个表示跳转到新实例的分隔符，然后是次实例表的名称。例如，一个连接到主`Company`实例的次`Contact`实例可以命名为`Company\
    \ | Contact`。名称的次实例部分可以包含用于标识关系性质的额外信息，例如`Company | Contact Employees`表示此`Contact`实例用于公司上下文，并关联到作为公司员工的联系人。\n\
    \n> **提示**  \n> 考虑将表名部分大写以作强调。`Company | CONTACT`清楚地表明该实例起始于`Company`，但实际上是`Contacts`表的一个实例。\n\
    \n这里的“次级”命名法并非指与主实例的*距离*，而是表示那些*非主实例*的分类状态。因此，任何距离主实例任意跳数的实例都称为次实例。例如，一个`Phone\
    \ Number`表的实例可能连接到一个次`Contact`实例，而该次`Contact`实例又连接到主`Company`实例，如图[9-11](#429700_2_En_9_Chapter.xhtml#Fig11)所示。它是链条中的第三个实例，距离主实例有两跳，但仍然被称为“次”实例，以表明两者均非主状态。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig11_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig11_HTML.jpg)\n\
    \n**图 9-11** 从主实例延伸出两个次实例的示例\n\n> **提示**  \n> 虽然次实例可以进一步延伸，但如果可能，最好将每个分支限制在大约两到三跳。"
  raw: '#### Avoiding Hub-and-Spoke Monoliths


    A *hub-and-spoke monolith* is a relational model where table occurrences are linked
    into a massive interconnected group, as illustrated in Figure [9-9](#429700_2_En_9_Chapter.xhtml#Fig9).
    This structure tends to be adopted as an intuitive default by most new developers.
    They start by connecting a handful of default table occurrences. Then, as they
    attempt to add new relationships that would be circular, FileMaker prompts them
    to create new occurrences, and they leave the default name of the table with a
    numeric suffix. Soon, they have dozens or hundreds of poorly named occurrences
    interconnected in one massive group.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig9_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Illustrating a hub-and-spoke monolithic relationship model


    Although this is not inherently problematic and can be a valid choice for simple
    databases, there are good reasons to avoid hub-and-spoke models completely. There
    is no easy way to tell which occurrences have been or should be used as a starting
    context, and as a result, hundreds or thousands of calculations, interfaces, and
    scripts zigzag around the structure, creating a conceptual gridlock. It quickly
    becomes confusing to keep track of which occurrence matches a certain context,
    e.g., trying to choose between *Contact-1*, *Contact-2*, *Contact-3*, and *Contact-4*
    in a formula requires time-consuming detective work. False starts and backtracking
    are necessary to correct a layout that is originally assigned the wrong context
    and only discovered after placing dozens of objects that now need to be reconfigured.
    Adding new features begins to feel like a tedious chore, and the ability to conceptualize
    the whole structure requires an enormous effort. As the grip of the convoluted
    structure tightens, the mind-numbing confusion is just the beginning. A small
    oversight can result in the loss of data when a script performs a function from
    the wrong context or a user types into a field through the wrong relationship
    because of an interface error caused by developer fatigue. Calculations reaching
    out in every direction across an excessive number of hops begin to make simple
    tasks dramatically slower and may return incorrect results. Eventually, technical
    problems appear as users struggle with unbearably slow performance and may even
    experience random application crashes. The temptation to blame the technology
    becomes overwhelming, but it is really the fault of a poor structural design chosen
    by an inexperienced developer.


    The professional developer understands that a well-designed relational model is
    *critically important* for both technical reasons and the protection of their
    own sanity. A database is a complex integration of numerous components, and just
    as *interface design* is important to avoid user confusion, equal care should
    be taken in one’s approach to *structural design* to avoid developer confusion
    and functional failure. Many of the problems with the hub-and-spoke model can
    be softened by conscientiously improving one’s practices. For example, naming
    occurrences clearly and establishing a rule about which will be used as the starting
    context for calculations and layouts will help. Limiting formulas to reach out
    one or two hops from a given context helps too. But these techniques still require
    extra work to set up and conscious effort to follow. In the end, the best solution
    is to *avoid this model completely and instead use occurrence groups*!


    #### Embracing Table Occurrence Groups


    The *table occurrence group* relationship model establishes a *primary table occurrence*
    for every table and a rule that these are *never* directly interconnected to each
    other. Any connection between two tables *must* be established by connection from
    a primary occurrence to a new *secondary occurrence* of a table to avoid any direct
    connections between primaries. This is also called an *anchor-buoy* model since
    each primary occurrence acts as an independent anchor to which related secondary
    occurrences can be attached where they are said to float away from it. In the
    setup illustrated in Figure [9-10](#429700_2_En_9_Chapter.xhtml#Fig10), a column
    of primary tables (gray) stands in a disconnected column on the left. Each secondary
    table (clear) that connects to these is a duplicate copy of a primary table. Using
    this model and following a few rules can solve most of the confusion and potential
    for technical complications found with the hub-and-spoke method.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig10_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Illustrating a table occurrence group relationship model


    Each primary occurrence on the left establishes the foundational anchor for an
    *occurrence context group.* These should be named with the actual table name to
    make clear that they represent the primary root occurrence, e.g., *Company*, *Contact*,
    *Project, etc.* When building interfaces, only these primary occurrences should
    be used as the context for calculation fields and layouts. The physical separation
    between groups limits how far and in which direction a field or interface formula
    can reach out to access related fields since they are limited to related secondary
    occurrences related within their small “island” group.


    Each secondary occurrence “floats” off to the right from a primary. These should
    be named in a way that indicates the starting context group they connect to and
    include path information about how they relate back to the root primary occurrence
    of that group. This can take various forms but ideally starts with the name of
    the primary occurrence, with a delimiter indicating a hop to a new occurrence,
    and then the name of the secondary occurrence table. For example, a secondary
    *Contact* occurrence connected to the primary *Company* occurrence might be named
    “Company | Contact.” The secondary part of the name could include additional information
    used to identify the nature of the relationship, e.g., “Company | Contact Employees”
    indicating that this *Contact* occurrence is used from company contexts and links
    to contacts that are a company’s employees.


    Tip


    Consider capitalizing the table name portion for emphasis. *Company | CONTACT*
    makes clear that the occurrence starts from *Company* but is actually an occurrence
    of the *Contacts* table.


    The “secondary” nomenclature here doesn’t refer to the *distance* from the primary
    but indicates a classification status of occurrences that are *not primary*. So,
    any occurrence any number of hops away from the primary is called secondary. For
    example, an occurrence of a *Phone Number* table might be connected to a secondary
    *Contact* occurrence which is connected to the primary *Company* as shown in Figure
    [9-11](#429700_2_En_9_Chapter.xhtml#Fig11). It is a third occurrence in a chain,
    two hops removed from the primary occurrence, but is still referred to as a “secondary”
    occurrence indicating the non-primary status of both.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig11_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig11_HTML.jpg)


    Figure 9-11


    An example of two secondary occurrences extending from a primary


    Tip


    Although secondary occurrences can extend further, it’s a good idea to limit each
    branch to about two or three hops if possible.'
  trans: "\n### 避免中心辐射式单体\n\n*中心辐射式单体*是一种关系模型，其中所有表实例被连接成一个庞大的互联组，如图 9-9 所示。这种结构往往是大多数新手开发者直觉上默认采用的。他们一开始只连接少数几个默认的表实例。随后，当他们试图添加会导致循环的新关系时，`FileMaker`会提示他们创建新的实例，而他们则会保留带有数字后缀的默认表名。很快，他们就会拥有几十甚至上百个命名不当的实例，相互连接成一个庞大的组。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig9_HTML.jpg](img/429700_2_En_9_Fig9_HTML.jpg)\n\
    \n**图 9-9** 中心辐射式单体关系模型示意图\n\n虽然这本身并非必然有问题，对于简单的数据库来说甚至是一种可行的选择，但仍有充分的理由完全避免中心辐射式模型。在这种模型中，很难判断哪些实例已被使用或应被用作起始上下文，结果导致成百上千的计算、界面和脚本在整个结构中迂回曲折，造成概念上的僵局。很快，要跟踪哪个实例匹配特定的上下文就变得令人困惑，例如，在公式中试图从`Contact-1`、`Contact-2`、`Contact-3`和`Contact-4`中做出选择，就需要耗时的侦查工作。当一个布局最初被分配了错误的上下文，只有在放置了数十个需要重新配置的对象之后才发现时，就需要进行错误的启动和回溯修正。添加新功能开始变得像是一项乏味的苦差事，而要概念化整个结构则需要巨大的努力。随着复杂结构的束缚越来越紧，令人麻木的混乱只是开始。一个微小的疏忽就可能导致数据丢失，例如脚本从错误的上下文执行函数，或者由于开发者疲劳导致的界面错误，用户通过错误的关系在字段中输入数据。计算跨越过多跳数向各个方向延伸，开始使简单任务变得异常缓慢，并可能返回错误的结果。最终，当用户难以忍受极度缓慢的性能，甚至可能遇到随机应用程序崩溃时，技术问题就会出现。将问题归咎于技术的诱惑变得难以抗拒，但这实际上是经验不足的开发者选择了糟糕结构设计的错误。\n\
    \n专业的开发者明白，一个设计良好的关系模型对于技术原因和保护自身理性都*至关重要*。数据库是众多组件的复杂集成，正如*界面设计*对于避免用户混淆很重要一样，在*结构设计*方法上也应给予同等的关注，以避免开发者混淆和功能故障。中心辐射式模型的许多问题可以通过有意识地改进实践来缓解。例如，清晰地命名实例，并制定规则确定哪些实例将被用作计算和布局的起始上下文，这会有所帮助。限制公式从给定上下文向外延伸一到两跳也有帮助。但这些技术仍然需要额外的工作来设置，并有意识地努力遵守。最终，最好的解决方案是*完全避免这种模型，转而使用实例组*！\n\
    \n### 采用表实例组\n\n*表实例组*关系模型为每个表建立一个*主表实例*，并规定这些实例*永远*不直接相互连接。两个表之间的任何连接*必须*通过从一个主实例连接到一个新的表的*次实例*来建立，以避免主实例之间的任何直接连接。这也被称为*锚-浮标*模型，因为每个主实例充当一个独立的锚点，相关的次实例可以附着在其上，并被视为从该锚点漂浮出去。在图\
    \ 9-10 所示的设置中，一列主表（灰色）独立地矗立在左侧。每个连接到这些主表的次表（透明）都是主表的副本。使用此模型并遵循一些规则，可以解决中心辐射式方法中发现的大部分混乱和潜在的技术复杂性。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig10_HTML.jpg](img/429700_2_En_9_Fig10_HTML.jpg)\n\
    \n**图 9-10** 表实例组关系模型示意图\n\n左侧的每个主实例为一个*实例上下文组*建立了基础锚点。这些实例应以实际表名命名，以明确它们代表主根实例，例如`Company`、`Contact`、`Project`等。在构建界面时，只应将这些主实例用作计算字段和布局的上下文。组之间的物理隔离限制了字段或界面公式可以访问相关字段的距离和方向，因为它们被限制在其小型“岛屿”组内的相关次实例中。\n\
    \n每个次实例从主实例向右“漂浮”。这些实例的命名方式应能指示它们所连接的起始上下文组，并包含关于它们如何关联回该组根主实例的路径信息。这可以采用多种形式，但理想情况下以主实例的名称开头，后跟一个表示跳转到新实例的分隔符，然后是次实例表的名称。例如，一个连接到主`Company`实例的次`Contact`实例可以命名为`Company\
    \ | Contact`。名称的次实例部分可以包含用于标识关系性质的额外信息，例如`Company | Contact Employees`表示此`Contact`实例用于公司上下文，并关联到作为公司员工的联系人。\n\
    \n> **提示**  \n> 考虑将表名部分大写以作强调。`Company | CONTACT`清楚地表明该实例起始于`Company`，但实际上是`Contacts`表的一个实例。\n\
    \n这里的“次级”命名法并非指与主实例的*距离*，而是表示那些*非主实例*的分类状态。因此，任何距离主实例任意跳数的实例都称为次实例。例如，一个`Phone\
    \ Number`表的实例可能连接到一个次`Contact`实例，而该次`Contact`实例又连接到主`Company`实例，如图 9-11 所示。它是链条中的第三个实例，距离主实例有两跳，但仍然被称为“次”实例，以表明两者均非主状态。\n\
    \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig11_HTML.jpg](img/429700_2_En_9_Fig11_HTML.jpg)\n\
    \n**图 9-11** 从主实例延伸出两个次实例的示例\n\n> **提示**  \n> 虽然次实例可以进一步延伸，但如果可能，最好将每个分支限制在大约两到三跳。\n"
- fmt: '为了说明这一设置，考虑两个分别锚定到`Company`和`Contact`表的上下文组，如图[9-12](#429700_2_En_9_Chapter.xhtml#Fig12)所示。主要的`Company`表出现将用作每个公司计算和布局的上下文。连接到它的三个表可以在公式（第[12](#429700_2_En_12_Chapter.xhtml)章）中使用，并用于在布局上定义门户（第[20](#429700_2_En_20_Chapter.xhtml)章），以访问相关的`Contact`、`Project`和`Invoice`记录。如果联系人门户需要显示联系人的电话号码，或者计算或脚本需要从`Company`的上下文中访问该信息，则添加从`Company`出发、相距两个跳转的`Phone`表出现。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig12_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig12_HTML.jpg)


    **图 9-12** 两个假设的表出现组示意图


    类似地，主要的`Contact`表出现将用作每个联系人计算字段和布局的上下文。附属的`Company`表出现可用于在布局上显示联系人的雇主名称，并被脚本用于从联系人记录导航到其相关的父公司。`Phone`和`Letter`表出现可以为联系人布局上的门户提供上下文。


    使用表出现组方法将导致关系图中存在一些冗余，并且最初可能看起来违反直觉，因为它似乎不必要地增加了表出现的数量。然而，如果实施得当，其好处最终会显现，您会庆幸花时间实施了它。*组之间的分离*简化了性能，并使在概念上导航结构变得更加容易。将所有公式和布局限制在一个主要的表出现起始上下文，使得更容易达到目标并避免混淆。一种包含从主要上下文开始的路径的命名方案，使得表出现组在整个开发界面的选择菜单中保持排序，从而同步有序的关系结构到列表中，并使目标表的选择更加容易。


    ### 规划学习 FileMaker 关系对象模型


    在本章剩余课程之后，我们将遵循表出现组方法，在`Learn FileMaker`数据库中设置三个简单的表出现组，如图[9-13](#429700_2_En_9_Chapter.xhtml#Fig13)所示。左侧的三个主要表出现将用作任何计算公式和布局的上下文，而右侧的次要表出现可用于创建计算、门户和脚本。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig13_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig13_HTML.jpg)


    **图 9-13** Learn FileMaker 数据库中表出现计划


    ## 管理数据源


    *数据源*是对其他 FileMaker 和 ODBC 数据库的已定义引用。当构建一个不访问外部表的自包含数据库时，无需定义数据源，因为隐含的源始终是当前文件。但是，当创建多文件数据库或集成
    ODBC 表（第[7](#429700_2_En_7_Chapter.xhtml)章）时，将需要额外的数据源。


    ### 介绍管理外部数据源对话框


    外部数据源在*管理外部数据源*对话框中创建、编辑和删除，如图[9-14](#429700_2_En_9_Chapter.xhtml#Fig14)所示。可以通过选择`文件
    ➤ 管理 ➤ 外部数据源`菜单访问此对话框。在开发界面各处出现的*指定表*对话框上的*数据源*弹出菜单底部也可以访问它。打开后，点击*新建*以打开*编辑数据源*对话框，并定义与外部数据源的新连接。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig14_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig14_HTML.jpg)


    **图 9-14** 用于管理外部数据源的对话框


    ### 探索编辑数据源对话框


    创建或编辑数据源在*编辑数据源*对话框中执行，如图[9-15](#429700_2_En_9_Chapter.xhtml#Fig15)所示。此对话框从*管理外部数据源*对话框中通过点击*新建*、选择一个数据源并点击*编辑*，或直接双击列表中的数据源来打开。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig15_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig15_HTML.jpg)


    **图 9-15** 用于编辑所选数据源的对话框


    *名称*用于在整个开发界面的菜单中标识该源。*类型*选项根据目标数据源提供两种选择，并根据所选内容更改界面。本节剩余部分假定选择了*FileMaker*。*文件路径列表*用于指定指向目标数据源的一个或多个路径（第[24](#429700_2_En_24_Chapter.xhtml)章，“指定文件路径”）。FileMaker
    将连接到指向现有数据库文件的第一个路径。点击*添加文件*为所选文件自动添加路径，或手动输入一个。有关配置*ODBC*类型数据源的详细信息，请参阅第[7](#429700_2_En_7_Chapter.xhtml)章，“从
    ODBC 数据源添加表。”


    ## 介绍管理数据库对话框（关系）


    与表和字段类似，表出现和关系在*管理数据库*对话框中创建。选择`文件 ➤ 管理 ➤ 数据库`打开对话框，并确保选中*关系*选项卡，如图[9-16](#429700_2_En_9_Chapter.xhtml#Fig16)所示。可滚动的白色区域是*关系图*，其中添加表出现并相互连接以定义关系。每个表应该已经存在于图中，但没有连接它们的关系。下方的按钮行用于在图区域内执行各种任务。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig16_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig16_HTML.jpg)


    **图 9-16** 用于管理关系的对话框


    ## 处理表出现


    *表出现*是关系图中显示的数据库表实例的图形表示。在定义表出现之间的关系之前，让我们回顾一下*选择*、*交互*、*排列*、*查看*、*格式化*、*编辑*、*添加*和*删除*表出现的基础知识。'
  raw: 'To illustrate this setup, consider two contextual groups anchored to *Company*
    and *Contact* tables, as shown in Figure [9-12](#429700_2_En_9_Chapter.xhtml#Fig12).
    The primary *Company* occurrence would be used as the context for every company
    calculation and layout. The three tables connected to it may be used within formulas
    (Chapter [12](#429700_2_En_12_Chapter.xhtml)) and to define a portal on a layout
    (Chapter [20](#429700_2_En_20_Chapter.xhtml)) accessing related *Contact*, *Project,*
    and *Invoice* records. The protruding *Phone* occurrence, two hops from *Company*,
    is added if the contact portal needs to display a phone number for a contact or
    if a calculation or script needs to access that information from the context of
    a *Company*.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig12_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig12_HTML.jpg)


    Figure 9-12


    An illustration of two hypothetical occurrence groups


    Similarly, the primary *Contact* occurrence would be used as the context for every
    contact calculation field and layout. The attached *Company* occurrence could
    be used to display the contact’s employer name on a layout and used by scripts
    to navigate from a contact record to its related parent company. The *Phone* and
    *Letter* occurrences can provide the context for portals on contact layouts.


    Using the occurrence group method will necessitate some redundancy in the relationship
    graph, and it may initially seem counterintuitive as unnecessarily increasing
    the number of occurrences. However, if implemented properly, eventually, the benefits
    prove themselves, and you will be thankful you took the time to implement it.
    The *separation between groups* streamlines performance and makes it easier to
    conceptually navigate the structure. Limiting all formulas and layouts to a primary
    occurrence starting context makes it easier to reach targets and avoids confusion.
    A naming scheme that includes the path from the primary keeps occurrence groups
    sorted in the selection menus throughout the development interface, synchronizing
    the orderly relational structure in a list and making the selection of a target
    table even easier.


    ### Planning a Learn FileMaker Relational Object Model


    After the remaining lessons in this chapter, we will follow the table occurrence
    group method and set up three simple occurrence groups in the *Learn FileMaker*
    database, as shown in Figure [9-13](#429700_2_En_9_Chapter.xhtml#Fig13). Each
    of the three primary occurrences on the left will be used as the context for any
    calculation formula and layout, while the secondary occurrences on the right can
    be used to create calculations, portals, and scripts.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig13_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig13_HTML.jpg)


    Figure 9-13


    The plan for table occurrences in the Learn FileMaker database


    ## Managing Data Sources


    A *data source* is a defined reference to other FileMaker and ODBC databases.
    When building a self-contained database that doesn’t access external tables, there
    is no need to define data sources since the implied source will always be the
    current file. However, when creating a multi-file database or integrating ODBC
    tables (Chapter [7](#429700_2_En_7_Chapter.xhtml)), additional data sources will
    be required.


    ### Introducing the Manage External Data Sources Dialog


    External data sources are created, edited, and deleted from *the Manage External
    Data Source* dialog, shown in Figure [9-14](#429700_2_En_9_Chapter.xhtml#Fig14).
    This dialog can be accessed by selecting the *File ➤ Manage ➤ External Data Sources*
    menu. It is also accessible at the bottom of the *Data Source* pop-up menu found
    on the *Specify Table* dialogs that appear in various locations of the development
    interface. Once open, click *New* to open the *Edit Data Source* dialog and define
    a new connection to an external data source.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig14_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig14_HTML.jpg)


    Figure 9-14


     The dialog used to manage external data sources


    ### Exploring the Edit Data Source Dialog


    Creating or editing a data source is performed in an *Edit Data Source* dialog,
    shown in Figure [9-15](#429700_2_En_9_Chapter.xhtml#Fig15). This dialog is opened
    from the *Manage External Data Source* dialog by clicking *New*, selecting a data
    source and clicking *Edit,* or double-clicking directly on a data source in the
    list.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig15_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig15_HTML.jpg)


    Figure 9-15


    The dialog used to edit a selected data source


    *The Name* entered is used to identify the source in menus throughout the development
    interface. The *Type* option offers two choices based on the data source being
    targeted and will change the interface depending on which is selected. The remainder
    of this section assumes a selection of *FileMaker*. The *File Path List* is used
    to specify one or more paths to the target data source (Chapter [24](#429700_2_En_24_Chapter.xhtml),
    “Specifying File Paths”). FileMaker will link to the first path that points to
    an existing database file. Click Add File to add a path automatically for a selected
    file, or type one manually. For details on configuring an *ODBC* type data source,
    see Chapter [7](#429700_2_En_7_Chapter.xhtml), “Adding a Table from an ODBC Data
    Source.”


    ## Introducing the Manage Database Dialog (Relationships)


    Like tables and fields, table occurrences and relationships are created in the
    *Manage Database* dialog . Select *File ➤ Manage ➤ Database* to open the dialog,
    and make sure the *Relationships* tab is selected, as shown in Figure [9-16](#429700_2_En_9_Chapter.xhtml#Fig16).
    The scrollable white area is the *relationship graph* where table occurrences
    are added and interconnected to define relationships. Each table should already
    be present in the graph but with no relationships connecting them. The row of
    buttons beneath this is used to perform various tasks within the graph area.


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig16_HTML.jpg](images/429700_2_En_9_Chapter/429700_2_En_9_Fig16_HTML.jpg)


    Figure 9-16


    The dialog used to manage relationships


    ## Working with Table Occurrences


    A *table occurrence* is a graphical representation of an instance of a table displayed
    in the relationship graph. Before defining relationships between occurrences,
    let’s review the basics of *selecting*, *interacting*, *arranging*, *viewing*,
    *formatting*, *editing*, *adding,* and *deleting* occurrences.'
