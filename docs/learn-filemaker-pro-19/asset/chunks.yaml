  trans: '

    # 分配扩展权限


    之前在图 30-6 中看到的*编辑权限集*对话框中的*扩展权限*部分，包含一个可以启用的附加权限列表。*扩展权限*是一种基于关键字的权限设置，可以分配给一个或多个权限集。这些权限用于访问特定类型的功能。FileMaker
    包含几个固定用于特定功能的扩展权限，主要是各种类型的入站网络和脚本访问。


    一些扩展权限允许用户通过特定方法登录。例如，`fmwebdirect` 允许从 Web 浏览器访问服务器托管的数据库，而 `fmapp` 允许从 *FileMaker
    Pro* 和 *FileMaker Go* 应用程序访问文件。


    其他权限则允许外部系统通过特定协议访问服务器托管的数据库：`fmxdbc` 允许通过 ODBC/JDBC 进行入站访问，`fmxml` 允许 XML 访问，`fmphp`
    允许 PHP 访问，`fmrest` 允许通过 *FileMaker Data API* 从*表述性状态转移*（RESTful）Web 服务进行访问。


    另外两个权限提供脚本访问：`fmextscriptaccess` 允许通过 *AppleScript*（macOS）和 *ActiveX*（Windows）进行访问，而
    `fmurlscript` 允许通过 URL 触发数据库脚本（第 29 章，“使用 FileMaker URL”）。


    虽然所有默认的扩展权限都是硬编码的，只能简单地打开或关闭 FileMaker 内置功能，但可以定义新的扩展权限来控制数据库中的自定义功能（本章稍后讨论）。


    # 在公式中使用凭据


    使用*账户*和*权限集*进行凭据验证，在限制对文件、内置功能和自定义结构元素的访问方面表现出色。尽管凭据接口对自定义资源具有相当出色的控制能力，但其覆盖范围仍有一定限制。一个权限集可以控制布局的可见性，但无法限制对单个对象的访问。它可以使脚本可执行，但无法控制脚本中的单个步骤。它无法控制自定义菜单或自定义函数的可访问性或行为，也无法深入公式内部。这些限制仅仅是自定义解决方案的本质所致。在某个节点之后，内置的凭据接口就无法*向外延伸*足够远，来控制每个对象、脚本步骤和自定义配置的权限。超过这个节点，自定义资源必须使用公式来*向内查看*用户的凭据，并确定应施加哪些限制以及执行哪些变体。为此，有三个
    *Get* 函数可用于公式中，以施加*基于凭据的条件*。使用这些函数，公式可以识别用户的*账户*名称、*权限集*名称，以及在使用外部身份验证方法时的*组*名称。以下示例展示了每个函数的假设结果。


    ```

    Get ( AccountName )                    // 结果 = 张三

    Get ( AccountPrivilegeSetName )        // 结果 = [完全访问权限]

    Get ( AccountGroupName )               // 结果 = dbmarketing

    ```


    脚本可以使用 *If* 步骤来限制为特定用户执行一组单个步骤。例如，一个发票报表脚本可能由许多用户运行，但其中有一部分步骤是生成敏感的财务报告，该部分应仅在脚本由首席财务官运行时才执行。账户名可用于确定这些步骤是否应该执行。


    ```

    If [ Get ( AccountName ) = "李华" ]

    转至布局 [ "发票 – 特殊报表" ; 动画: 无 ]

    排序记录 [ 恢复 ; 对话框: 关闭 ]

    打印 [ 对话框: 打开 ]

    转至布局 [ 原始布局 ; 动画: 无 ]

    结束条件

    ```


    另一个脚本可能会根据用户的权限集导航到特定部门的菜单布局。此示例脚本使用一系列 *If* 和 *Else If* 脚本步骤，每个步骤针对一个单独的布局。


    ```

    设置变量 [ $set ; 值: Get ( AccountPrivilegeSet ) ]

    If [ $set = "人力资源" ]

    转至布局 [ "主页 HR" ; 动画: 无 ]

    Else If [ [ $set = "销售" ]

    转至布局 [ "主页 销售" ; 动画: 无 ]

    Else If [ [ $set = "生产" ]

    转至布局 [ "主页 生产" ; 动画: 无 ]

    结束条件

    ```


    这些函数可用于在任何可以使用公式的地方创建特定于凭据的行为。隐藏布局对象或自定义菜单、更改按钮或标签名称、个性化工具提示、在计算字段中产生不同结果等等。*然而，使用此技术应持谨慎态度。*


    ## 理解嵌入凭据的风险


    在公式中嵌入凭据以创建条件性功能应谨慎使用。公司员工的每一次变动都可能需要更改在数十、数百或数千个不同公式中使用的员工姓名。即使像同事结婚更改姓氏这样简单的事情，在复杂的数据库中也可能需要大量工作。虽然可以为新员工更改现有账户的名称，但公式中所有使用旧名称的地方不会自动更新，因为它们是文字文本，而不是动态引用。在人员流动率高的组织中，定位和更改这些名称可能会成为一项全职工作。


    这个问题可以通过使用“职务”作为账户名而不是员工的实际“姓名”来部分缓解。例如，张三可以以“账户主管”的身份使用唯一密码登录数据库。然后，如果新人接替该职位，他们沿用相同的账户名和新密码。由于实际账户名未更改，任何使用它的公式也无需更改。然而，这种方法有问题，因为它使用户身份失去了个性，并且在查看历史记录列表时，看到所有记录都由“账户主管”修改，但跨越了三个不同的人担任此职位的时期，这会令人困惑。理想情况下，用户应使用个人标识符登录数据库。


    当公式使用*权限集*而不是*账户名*时，条件性功能可以稍微更能适应团队变化。可以根据需要删除和创建单个用户账户，而分配的权限集继续控制公式中的界面和行为条件。虽然这是一个更好的方法，但仍然存在风险因素。除非权限集经过精心设计，几乎无所不能，否则随着公司工作流中角色和职责的变化，某些功能几乎不可避免地需要进行重大更改。此外，由于每个用户只能分配一个权限集，功能可能需要大量的复合子句来授予一组不同权限集的权限。


    在公式中使用凭据确实将安全设置的能力扩展到了*管理安全性*对话框之外，但这种方式可能非常耗费人力。一开始可能只是为某个用户或组设置一个简单的临时例外，但很快就会成为一种坏习惯，使开发者陷入困境，因为他们必须不断记住在拥挤界面设计的黑暗角落中丢失和遗忘的数千个凭据例外。幸运的是，FileMaker
    有一个极好的替代方案，通过允许将自定义功能例外轻松直接连接到安全接口中来解决这个问题：*自定义扩展权限*。'
- fmt: "# Leveraging Custom Extended Privileges\n\nA *custom extended privilege* is\
    \ a developer-defined, keyword-based permission that can be safely used in formulas\
    \ to create conditional features. These can be easily linked to one or more privilege\
    \ sets, making them adaptable to future changes to a company’s personnel. Instead\
    \ of connecting directly to changing *accounts* and *privilege sets*, conditional\
    \ formulas are connected to an unchanging *custom extended privilege* by keyword.\
    \ As individual user accounts are created and deleted, as privilege sets are modified\
    \ and reassigned, conditional access and behavior granted by the extended privilege\
    \ can be easily enabled or disabled directly in the *Manage Security* dialog.\
    \ Instead of inserting credential naming into formulas, extended privileges allow\
    \ you to name a custom feature of your database and insert it as a new setting\
    \ in the credentialing interface.\n\nTo create a custom extended privilege, start\
    \ by identifying a set of conditional features and the objects/formulas involved.\
    \ For the sake of illustration, let’s use a simple example: the ability to approve\
    \ an *Invoice* record by clicking a button on a layout. The button will need to\
    \ be conditionally hidden so unauthorized users can’t see or click it. To begin,\
    \ choose a name for the new privilege. The name should be a short keyword made\
    \ up of two or more words that is unique and clearly indicates the function(s)\
    \ it will control. For this example, a name like `InvoiceApproval` will describe\
    \ the capability we are defining in our example.\n\n> **Caution**\n>\n> Choose\
    \ extended privilege names carefully before using them in many object formulas\
    \ to avoid having to change it numerous times, the very problem we are trying\
    \ to avoid!\n\nOpen the *Manage Security* dialog, click the *Advanced Settings*\
    \ button and select the *Extended Privileges* tab. This lists all built-in and\
    \ custom extended privileges defined in the file. Click the *New* button to open\
    \ a new, extended privilege in an *Edit Extended Privilege* dialog, shown in Figure\
    \ [30-10](#429700_2_En_30_Chapter.xhtml#Fig10).\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig10_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig10_HTML.jpg)\n\
    \n**Figure 30-10**  \nThe dialog used to create and edit custom extended privileges\n\
    \nType the name of the privilege in the *Keyword* text box and enter a short *Description*.\
    \ The *Access* list shows privilege sets with a checkbox indicating those with\
    \ permission to access this custom privilege. After closing the preceding dialog,\
    \ view any privilege set to see the new extended privilege listed as an option,\
    \ as shown in Figure [30-11](#429700_2_En_30_Chapter.xhtml#Fig11).\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig11_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig11_HTML.jpg)\n\
    \n**Figure 30-11**  \nThe new extended privilege enabled on a privilege set\n\n\
    The `InvoiceApproval` privilege is now defined but doesn’t actually control anything\
    \ until it is used in a behavior conditioning formula somewhere in the database.\
    \ For our invoice approval example, add a button to an *Invoice* layout, and enter\
    \ the *Hide object when* formula (Chapter [21](#429700_2_En_21_Chapter.xhtml))\
    \ shown in the following example to hide the object for any users who do not have\
    \ the extended privilege enabled on their account’s privilege set. The formula\
    \ uses the `Get ( AccountExtendedPrivileges )` function to get a list of the names\
    \ of all enabled extended privileges for the user’s privilege set and then checks\
    \ for `InvoiceApproval` using the `FilterValues` function (Chapter [13](#429700_2_En_13_Chapter.xhtml),\
    \ “Manipulating Values”).\n\n```\nFilterValues ( Get ( AccountExtendedPrivileges\
    \ ) ; \"InvoiceApproval\" ) = \"\"\n```\n\n# Controlling File Access\n\nThe *File\
    \ Access* tab of the *Advanced Security Settings* dialog lists which other FileMaker\
    \ databases can access the current database. Individual databases can be *Authorized*\
    \ or *Deauthorized*. A *Reset All* will reset the ID of all the files listed and\
    \ require them to be reauthorized. Use this to ensure unique identifiers if a\
    \ duplicate or clone of a file should be granted access along with the original.\n\
    \n# Summary\n\nThis chapter explored the credential options for securing a database.\
    \ In the next chapter, we will explore some additional advanced tools for analyzing\
    \ and modifying files.\n\n# 31. Analyzing and Modifying Files\n\nThe *Tools* menu\
    \ contains a few additional features below the *Script Debugging* options (Chapter\
    \ [26](#429700_2_En_26_Chapter.xhtml)) and *Custom Menus* submenu (Chapter [23](#429700_2_En_23_Chapter.xhtml)).\
    \ These additional tools include:\n\n- Save a Copy as XML\n- Database design report\n\
    - Developer utilities\n- Tools Marketplace\n\n## Save a Copy as XML\n\nThe *Save\
    \ a Copy as XML* option saves a copy of the current database file as an XML file.\
    \ The file includes raw structural details about the file but does not include\
    \ any record content. This can be used to store and compare structural changes\
    \ over time.\n\n## Generating a Database Design Report\n\nA *database design report*\
    \ is a detailed report of a database file structure, listing every table in the\
    \ database with optional information about other resources. These reports can\
    \ be saved as a HTML or XML file and can be used to perform the following development\
    \ tasks:\n\n- Troubleshoot structural problems by locating missing references,\
    \ broken relationships, and more.\n- Find obsolete elements to help maintain a\
    \ clean structure.\n- Locate interface elements still pointing to an old script\
    \ or custom functions.\n- Glimpse statistics about component counts and usage.\n\
    - Save a structural snapshot of a database at a certain point in time, which can\
    \ be compared to a later structure to identify changes.\n\n### Generating a Design\
    \ Report\n\nTo generate a report, open a database and select the *Tools ➤ Database\
    \ Design Report* menu. This will open the `Database Design Report` dialog, shown\
    \ in Figure [31-1](#429700_2_En_31_Chapter.xhtml#Fig1). The *Available Files*\
    \ area allows a selection of the currently open database files that should be\
    \ included in the report. Select a file to have the option to exclude individual\
    \ tables from the adjacent list. Choose from the *Include in report* checkboxes\
    \ to determine what resources are included in the analysis. This scrolling list\
    \ includes everything from *Accounts* to *Value Lists*. The *Report Format* option\
    \ at the bottom controls which style of report will be generated.\n\n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig1_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig1_HTML.jpg)\n\
    \n**Figure 31-1**  \nThe dialog used to create a database design report\n\n###\
    \ Exploring a HTML Design Report\n\nAn `HTML` design report will produce collection\
    \ of pages, as shown in Figure [31-2](#429700_2_En_31_Chapter.xhtml#Fig2). The\
    \ `Summary.html` contains a navigable overview of each included database showing\
    \ a columnar summary of its objects. The `Styles.css` files contain style information,\
    \ one for the summary and one for pages inside of each database folder. Each database\
    \ included in the report will be represented by a folder, in this case only a\
    \ single folder for the *Learn FileMaker* database. Inside each database folder,\
    \ an `Index.html` page contains a complex table structure with navigable sidebar\
    \ detailing every object and lots of detailed information about them. This can\
    \ be opened directly or through the summary page. The other two html files contain\
    \ sidebar navigation and body panels that are displayed in the index file.\n\n\
    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig2_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig2_HTML.jpg)\n\
    \n**Figure 31-2**  \nThe results of a design report saved as HTML\n\n### Exploring\
    \ an XML Design Report\n\nWhen a design report is saved as `XML`, the folder will\
    \ contain two or more files: a `Summary.xml` file which contains a summary of\
    \ the included files and a detail file for each database included."
  raw: '## Leveraging Custom Extended Privileges


    A *custom extended privilege* is a developer-defined, keyword-based permission
    that can be safely used in formulas to create conditional features. These can
    be easily linked to one or more privilege sets, making them adaptable to future
    changes to a company’s personnel. Instead of connecting directly to changing *accounts*
    and *privilege sets*, conditional formulas are connected to an unchanging *custom
    extended privilege* by keyword. As individual user accounts are created and deleted,
    as privilege sets are modified and reassigned, conditional access and behavior
    granted by the extended privilege can be easily enabled or disabled directly in
    the *Manage Security* dialog. Instead of inserting credential naming into formulas,
    extended privileges allow you to name a custom feature of your database and insert
    it as a new setting in the credentialing interface.


    To create a custom extended privilege, start by identifying a set of conditional
    features and the objects/formulas involved. For the sake of illustration, let’s
    use a simple example: the ability to approve an *Invoice* record by clicking a
    button on a layout. The button will need to be conditionally hidden so unauthorized
    users can’t see or click it. To begin, choose a name for the new privilege. The
    name should be a short keyword made up of two or more words that is unique and
    clearly indicates the function(s) it will control. For this example, a name like
    “InvoiceApproval” will describe the capability we are defining in our example.


    Caution


    Choose extended privilege names carefully before using them in many object formulas
    to avoid having to change it numerous times, the very problem we are trying to
    avoid!


    Open the *Manage Security* dialog, click the *Advanced Settings* button and select
    the *Extended Privileges* tab. This lists all built-in and custom extended privileges
    defined in the file. Click the *New* button to open a new, extended privilege
    in an *Edit Extended Privilege* dialog, shown in Figure [30-10](#429700_2_En_30_Chapter.xhtml#Fig10).


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig10_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig10_HTML.jpg)


    Figure 30-10


    The dialog used to create and edit custom extended privileges


    Type the name of the privilege in the *Keyword* text box and enter a short *Description*.
    The *Access* list shows privilege sets with a checkbox indicating those with permission
    to access this custom privilege. After closing the preceding dialog, view any
    privilege set to see the new extended privilege listed as an option, as shown
    in Figure [30-11](#429700_2_En_30_Chapter.xhtml#Fig11).


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig11_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig11_HTML.jpg)


    Figure 30-11


    The new extended privilege enabled on a privilege set


    The *InvoiceApproval* privilege is now defined but doesn’t actually control anything
    until it is used in a behavior conditioning formula somewhere in the database.
    For our invoice approval example, add a button to an *Invoice* layout, and enter
    the *Hide object when* formula (Chapter [21](#429700_2_En_21_Chapter.xhtml)) shown
    in the following example to hide the object for any users who do not have the
    extended privilege enabled on their account’s privilege set. The formula uses
    the *Get ( AccountExtendedPrivileges )* function to get a list of the names of
    all enabled extended privileges for the user’s privilege set and then checks for
    *InvoiceApproval* using the *FilterValues* function (Chapter [13](#429700_2_En_13_Chapter.xhtml),
    “Manipulating Values”).


    ```

    FilterValues ( Get ( AccountExtendedPrivileges ) ; "InvoiceApproval" ) = ""

    ```


    ## Controlling File Access


    The *File Access* tab of the *Advanced Security Settings* dialog lists which other
    FileMaker databases can access the current database. Individual databases can
    be *Authorized* or *Deauthorized*. A *Reset All* will reset the ID of all the
    files listed and require them to be reauthorized. Use this to ensure unique identifiers
    if a duplicate or clone of a file should be granted access along with the original.


    ## Summary


    This chapter explored the credential options for securing a database. In the next
    chapter, we will explore some additional advanced tools for analyzing and modifying
    files.


    # 31. Analyzing and Modifying Files


    The *Tools* menu contains a few additional features below the *Script Debugging*
    options (Chapter [26](#429700_2_En_26_Chapter.xhtml)) and *Custom Menus* submenu
    (Chapter [23](#429700_2_En_23_Chapter.xhtml)). These additional tools include


    *   Save a Copy as XML


    *   Database design report


    *   Developer utilities


    *   Tools Marketplace


    ## Save a Copy as XML


    The *Save a Copy as XML* option saves a copy of the current database file as an
    XML file. The file includes raw structural details about the file but does not
    include any record content. This can be used to store and compare structural changes
    over time.


    ## Generating a Database Design Report


    A *database design report* is a detailed report of a database file structure,
    listing every table in the database with optional information about other resources.
    These reports can be saved as a HTML or XML file and can be used to perform the
    following development tasks:


    *   Troubleshoot structural problems by locating missing references, broken relationships,
    and more.


    *   Find obsolete elements to help maintain a clean structure.


    *   Locate interface elements still pointing to an old script or custom functions.


    *   Glimpse statistics about component counts and usage.


    *   Save a structural snapshot of a database at a certain point in time, which
    can be compared to a later structure to identify changes.


    ### Generating a Design Report


    To generate a report, open a database and select the *Tools ➤ Database Design
    Report* menu. This will open the `Database Design Report` dialog, shown in Figure
    [31-1](#429700_2_En_31_Chapter.xhtml#Fig1). The *Available Files* area allows
    a selection of the currently open database files that should be included in the
    report. Select a file to have the option to exclude individual tables from the
    adjacent list. Choose from the *Include in report* checkboxes to determine what
    resources are included in the analysis. This scrolling list includes everything
    from *Accounts* to *Value Lists*. The *Report Format* option at the bottom controls
    which style of report will be generated.


    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig1_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig1_HTML.jpg)


    Figure 31-1


    The dialog used to create a database design report


    ### Exploring a HTML Design Report


    An `HTML` design report will produce collection of pages, as shown in Figure [31-2](#429700_2_En_31_Chapter.xhtml#Fig2).
    The *Summary.html* contains a navigable overview of each included database showing
    a columnar summary of its objects. The *Styles.css* files contain style information,
    one for the summary and one for pages inside of each database folder. Each database
    included in the report will be represented by a folder, in this case only a single
    folder for the *Learn FileMaker* database. Inside each database folder, an *Index.html*
    page contains a complex table structure with navigable sidebar detailing every
    object and lots of detailed information about them. This can be opened directly
    or through the summary page. The other two html files contain sidebar navigation
    and body panels that are displayed in the index file.


    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig2_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig2_HTML.jpg)


    Figure 31-2


    The results of a design report saved as HTML


    ### Exploring an XML Design Report


    When a design report is saved as `XML` , the folder will contain two or more files:
    a *Summary.xml* file which contains a summary of the included files and a detail
    file for each database included.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n# 利用自定义扩展权限\n\n\
    *自定义扩展权限*是一种由开发者定义的、基于关键字的权限，可以安全地在公式中使用以创建条件功能。这些权限可以轻松地链接到一个或多个权限集，从而适应公司人员未来的变动。条件公式不是直接连接到不断变化的*账户*和*权限集*，而是通过关键字连接到一个不变的*自定义扩展权限*。随着单个用户账户的创建和删除，以及权限集的修改和重新分配，由扩展权限授予的条件访问和行为可以直接在*管理安全*对话框中轻松启用或禁用。扩展权限允许您为数据库的自定义功能命名，并将其作为新设置插入到凭据接口中，而不是将凭据命名插入到公式中。\n\
    \n要创建自定义扩展权限，首先要确定一组条件功能以及所涉及的对象/公式。为了便于说明，我们使用一个简单的示例：通过点击布局上的按钮来批准*发票*记录的能力。该按钮需要被条件隐藏，以便未经授权的用户无法看到或点击它。首先，为新权限选择一个名称。名称应是一个由两个或多个单词组成的短关键字，该关键字应唯一且能清晰地指示其将控制的功能。对于此示例，像\
    \ `InvoiceApproval` 这样的名称将描述我们在示例中定义的能力。\n\n> **注意**\n>\n> 在多个对象公式中使用扩展权限名称之前，请仔细选择，以避免日后需要多次更改，而这正是我们试图避免的问题！\n\
    \n打开*管理安全*对话框，点击*高级设置*按钮，然后选择*扩展权限*选项卡。这里列出了文件中定义的所有内置和自定义扩展权限。点击*新建*按钮，在*编辑扩展权限*对话框中打开一个新的扩展权限，如图\
    \ 30-10 所示。\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig10_HTML.jpg](img/429700_2_En_30_Fig10_HTML.jpg)\n\
    \n**图 30-10**  \n用于创建和编辑自定义扩展权限的对话框\n\n在*关键字*文本框中输入权限的名称，并输入简短的*描述*。*访问*列表显示了权限集，其中的复选框指示哪些权限集有权访问此自定义权限。关闭前述对话框后，查看任意权限集，即可看到新的扩展权限列为一个选项，如图\
    \ 30-11 所示。\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig11_HTML.jpg](img/429700_2_En_30_Fig11_HTML.jpg)\n\
    \n**图 30-11**  \n已在一个权限集上启用的新扩展权限\n\n`InvoiceApproval` 权限现已定义，但在其被用于数据库中某处的行为条件公式之前，它实际上并不控制任何东西。对于我们的发票批准示例，向*发票*布局添加一个按钮，并输入以下示例中所示的\
    \ *Hide object when* 公式（第 21 章），以对任何其账户的权限集未启用此扩展权限的用户隐藏该对象。该公式使用 `Get ( AccountExtendedPrivileges\
    \ )` 函数获取用户权限集所启用所有扩展权限的名称列表，然后使用 `FilterValues` 函数（第 13 章，“操作值”）检查 `InvoiceApproval`。\n\
    \n```\nFilterValues ( Get ( AccountExtendedPrivileges ) ; \"InvoiceApproval\"\
    \ ) = \"\"\n```\n\n# 控制文件访问\n\n*高级安全设置*对话框中的*文件访问*选项卡列出了哪些其他 FileMaker 数据库可以访问当前数据库。单个数据库可以被*授权*或*取消授权*。*全部重置*将重置所有列出文件的\
    \ ID，并要求重新授权它们。如果某个文件的副本或克隆应与原始文件一起被授予访问权限，请使用此功能以确保唯一标识符。\n\n# 总结\n\n本章探讨了保护数据库安全的凭据选项。下一章，我们将探讨一些用于分析和修改文件的额外高级工具。\n\
    \n# 31. 分析与修改文件\n\n*工具*菜单在*脚本调试*选项（第 26 章）和*自定义菜单*子菜单（第 23 章）下方包含一些额外功能。这些额外工具包括：\n\
    \n-   另存为 XML 副本\n-   数据库设计报告\n-   开发者实用工具\n-   工具市场\n\n## 另存为 XML 副本\n\n*另存为\
    \ XML 副本*选项将当前数据库文件的副本另存为 XML 文件。该文件包含有关文件的原始结构细节，但不包含任何记录内容。这可用于存储和比较随时间变化的结构变更。\n\
    \n## 生成数据库设计报告\n\n*数据库设计报告*是一份关于数据库文件结构的详细报告，列出数据库中的每个表，并可选地包含有关其他资源的信息。这些报告可以保存为\
    \ HTML 或 XML 文件，并可用于执行以下开发任务：\n\n-   通过定位缺失引用、破损关系等来排查结构问题。\n-   查找过时的元素，以帮助维护清晰的结构。\n\
    -   定位仍指向旧脚本或自定义函数的界面元素。\n-   获取有关组件数量和使用情况的统计信息。\n-   保存数据库在特定时间点的结构快照，该快照可以与之后的结构进行比较，以识别变更。\n\
    \n### 生成设计报告\n\n要生成报告，请打开一个数据库，然后选择*工具 ➤ 数据库设计报告*菜单。这将打开 `Database Design Report`\
    \ 对话框，如图 31-1 所示。*可用文件*区域允许选择应包含在报告中的当前打开的数据库文件。选择一个文件后，可以选择从相邻列表中排除个别表。勾选*包含在报告中*的复选框，以确定分析中包含哪些资源。此滚动列表包含从*账户*到*值列表*的所有内容。底部的*报告格式*选项控制将生成的报告样式。\n\
    \n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig1_HTML.jpg](img/429700_2_En_31_Fig1_HTML.jpg)\n\
    \n**图 31-1**  \n用于创建数据库设计报告的对话框\n\n### 探索 HTML 设计报告\n\n一份 `HTML` 格式的设计报告将生成一组页面，如图\
    \ 31-2 所示。`Summary.html` 包含每个已包含数据库的可导航概览，显示其对象的列式摘要。`Styles.css` 文件包含样式信息，一个用于摘要页面，一个用于每个数据库文件夹内的页面。报告中包含的每个数据库将由一个文件夹表示，在本例中，只有一个用于\
    \ *Learn FileMaker* 数据库的文件夹。在每个数据库文件夹内，`Index.html` 页面包含一个复杂的表格结构，带有可导航的侧边栏，详细列出了每个对象及其大量详细信息。这可以通过摘要页面直接打开或导航访问。另外两个\
    \ HTML 文件包含在索引文件中显示的侧边栏导航和主体面板。\n\n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig2_HTML.jpg](img/429700_2_En_31_Fig2_HTML.jpg)\n\
    \n**图 31-2**  \n保存为 HTML 格式的设计报告结果\n\n### 探索 XML 设计报告\n\n当设计报告保存为 `XML` 格式时，该文件夹将包含两个或多个文件：一个包含已包含文件摘要的\
    \ `Summary.xml` 文件，以及每个已包含数据库的详细信息文件。\n"
- fmt: '### Introducing Professional DDR Tools


    Several companies offer products that import an `XML` design report and present
    the material in a more polished interface than the HTML pages provided by FileMaker.
    Developers who build complex databases that require a lot of analysis will appreciate
    the improved viewing experience of these products.


    #### BaseElements


    BaseElements is a great analysis tool for traversing the structure of a database
    sold by a company of the same name. The solution is available as a FileMaker file
    or a stand-alone application for macOS and Windows. The product has full layout
    access, so you can link to BaseElements Data Tables from your database''s relationship
    graph and access the information in scripts. The product includes an open source
    BaseElements plug-in with many useful functions. For more information visit [`www.baseelements.com`](http://www.baseelements.com).


    #### FMPerception


    FMPerception is a utility for searching, analyzing, and maintaining databases
    sold by Geist Interactive. The product uses a progressive analysis technique to
    quickly provide current and accurate information about a database''s structure.
    Some features include:


    - A high-level overview and a "Database Report Card" that summarizes the complexity
    of a database and lists any potential problems that were detected.

    - A fast `DDR` import process that is nearly instantaneous.

    - A graphical "call chain visualization" illustrates the flow of script calls
    from buttons to scripts to subscripts, helping trace the flow of complex functionality.

    - Identifies layout objects that might slow down performance.

    - Performs a security audit to identify vulnerabilities such as missing passwords
    or scripts that run with full access.


    For more information visit [`www.geistinteractive.com`](http://www.geistinteractive.com).


    #### InspectorPro


    InspectorPro is an advanced diagnostics, analysis, and visualization tool sold
    by Beezwax DataTools. The product boasts over 115 different areas where it normalizes
    analysis information and can automatically detect problems with a database structure.
    For more information visit [`www.beezwax.net`](http://www.beezwax.net).


    ### Exploring Developer Utilities


    The `Developer Utilities` dialog, shown in Figure [31-3](#429700_2_En_31_Chapter.xhtml#Fig3),
    is accessed from the `Tools` menu. Once the dialog is open, click the `Add` button
    to place one or more files into the `Solution Files` list. These will be batch-manipulated
    by the various features and options initiated in the dialog. Within the list,
    a red arrow designates one file as the primary which is used by the Kiosk option
    to denote the database containing the starting "home" interface. Below the list
    are controls for renaming files, selecting an output folder where modified files
    will be saved.


    ![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig3_HTML.jpg](images/429700_2_En_31_Chapter/429700_2_En_31_Fig3_HTML.jpg)


    Figure 31-3


    The dialog containing various developer utility functions


    ### Renaming Files


    To rename a file, select it in the list, enter a new name without the extension
    into the `Rename File` text field, and click the `Change` button. This is the
    recommended method for renaming database files in a multi-file solution since
    it will not only rename the selected file but also update all external file references
    to it within all other files in the list. Any new names specified will be queued
    into the `New Name` column of the file list. These will not take effect until
    a `Project Folder` is specified and the `Create` button is clicked.


    ### Specifying a Project Folder


    Before you can rename files or perform solution options, choose a `Project Folder`
    by clicking the `Specify` button. Since the utility dialog creates new versions
    of files, this setting indicates where these should be saved. Check the box below
    to automatically overwrite any files with the same name that exist in the selected
    folder.


    ### Specifying Solution Options


    The `Developer Utilities` dialog contains several utility functions that can alter
    the structure of the `Solution Files`. To enable one or more of these options,
    click the `Specify` button under the `Solution Options` header which opens a `Specify
    Solution Options` dialog. Then enable checkboxes to any of the following utility
    functions:


    - Remove admin access from files permanently.

    - Enable kiosk mode for non-admin accounts.

    - Databases must have a FileMaker file extension.

    - Create error log for any processing errors.

    - Enable database encryption (or re-encrypt files).

    - Remove database encryption.


    #### Removing Admin Access from Files


    Enable the `Remove admin access from files permanently` checkbox to save copies
    of the files with all admin access removed from every user account and most design
    and structural elements rendered read-only. This essentially prevents anyone from
    acting as a developer within the file while allowing normal data entry and other
    uses to continue unabated. While this can be a useful method to secure a file
    for sale as a product or distribution as a demo, it should be used with caution
    and while retaining a safe unmodified backup file.


    #### Enabling Kiosk Mode


    The `Enable Kiosk mode for non-admin accounts` option saves copies of the file
    with full screen mode and no menu bar enforced for all non-admin access. This
    is a great option for creating touch kiosks where you don''t want to allow users
    access to anything except the interface controls you make accessible on layouts.
    The database must have at least one non-admin user account defined, which must
    be used to open in kiosk mode. Once in kiosk mode, a user''s ability to navigate
    within the file or to close the file will be through the controls you provide
    on layouts. There will be no menu bar, and even access to operating system functions
    such as force quit or toggle applications will be completely disabled. When adding
    a button to quit the database intended to be a public kiosk, be sure to include
    some sort of authentication process to exclude regular users from quitting the
    solution and accessing the underlying operating system.


    > **Caution**

    >

    > If you don''t provide a button on the layout that will quit the application
    or close the database, the only option will be to perform a hard restart of the
    computer that may lead to file damage.


    #### Requiring a FileMaker File Extension


    The `Databases must have a FileMaker file extension` option will confirm each
    `Solution File` has a file extension and will add it to the new copies if missing.


    #### Creating an Error Log of Errors


    The `Create Error log for any processing errors` option will generate a log file
    in a `Project Folder` containing any errors that occur while processing other
    utility functions. This option can optionally be selected with any other utility
    function but is required when enabling encryption and will be selected by default
    for both encryption options. Once selected, an extra option below allows customization
    of the name and location of the log file by clicking the `Specify` button. The
    default is a file named "Logfile.txt" that will be saved in the `Project Folder`.'
