- fmt: '# Assigning Extended Privileges


    The *Extended Privileges* section of the *Edit Privilege Set* dialog seen previously
    in Figure [30-6](#429700_2_En_30_Chapter.xhtml#Fig6) includes a list of additional
    privileges that can be enabled. An *extended privilege* is a keyword-based permission
    setting that can be assigned to one or more privilege sets. These enable access
    to one specific type of functionality. FileMaker includes several extended privileges
    that are fixed to specific functions, mostly various types of inbound networking
    and scripting access.


    Some extended privileges grant the ability of users to sign in via specific methods.
    For example, `fmwebdirect` enables access to a server-hosted database from a web
    browser, while `fmapp` allows access to the file from the *FileMaker Pro* and
    *FileMaker Go* apps.


    Others provide protocol-specific access to a server-hosted database by external
    systems: `fmxdbc` allows incoming access with ODBC/JDBC, `fmxml` allows XML access,
    `fmphp` allows PHP, and `fmrest` allows access from a *Representational State
    Transfer* (RESTful) web service via the *FileMaker Data API*.


    Two others provide scripted access: `fmextscriptaccess` allows access with *AppleScript*
    (macOS) and *ActiveX* (Windows), while `fmurlscript` allows triggering a database
    script from a URL (Chapter [29](#429700_2_En_29_Chapter.xhtml#Fig6), “Using the
    FileMaker URL”).


    While all of the default extended privileges are hardwired to simply turn on or
    off a built-in FileMaker capability, new extended privileges can be defined that
    control custom features in your database (discussed later in this chapter).


    # Using Credentials in Formulas


    Credentialing with *accounts* and *privilege sets* does a great job limiting access
    to the file, built-in capabilities, and custom structural elements. Although the
    credentialing interface exerts an impressive level of control over custom resources,
    its reach is somewhat limited. A privilege set can control a layout’s viewability
    but has no options to limit access to individual objects. It can make a script
    executable but has no option to control individual steps within the script. It
    can’t exert any control over the accessibility or behavior of custom menus or
    custom functions, and it can’t reach inside of formulas. These limitations are
    simply due to the nature of a custom solution. At a certain point, the built-in
    credentialing interface simply can’t *reach outward* far enough to control permissions
    for every object, script step, and custom configuration. Beyond that point, the
    custom resources must instead use formulas to *look inward* at the user’s credentials
    and determine what limits should be imposed and which variations performed. To
    accommodate this, there are three *Get* functions that can be used in formulas
    to impose *credentials-based conditions*. Using these, a formula can identify
    the name of the user’s *account*, *privilege set,* and, when using an external
    authentication method, *group*. These examples show hypothetical results of each.


    ```

    Get ( AccountName )                    // result = Jim Smith

    Get ( AccountPrivilegeSetName )        // result = [Full Access]

    Get ( AccountGroupName )               // result = dbmarketing

    ```


    A script can use an *If* step to limit execution of a group of individual steps
    for a specific user. For example, an invoice report script may be run by many
    users but have a section of steps that generates a sensitive financial report
    that should only execute when the script is run by the Chief Financial Officer.
    The account name can be used to determine if the steps should execute or not.


    ```

    If [ Get ( AccountName ) = "Rashida Fields" ]

    Go to Layout [ "Invoice – Special Report" ; Animation: None ]

    Sort Records [ Restore ; With dialog: Off ]

    Print [ With dialog: On ]

    Go to Layout [ Original Layout ; Animation: None ]

    End if

    ```


    Another script may navigate to a department-specific menu layout based on the
    user’s privilege set. This example script uses a sequence of *If* and *Else If*
    script steps with separate steps, each targeting a single layout.


    ```

    Set Variable [ $set ; Value: Get ( AccountPrivilegeSet ) ]

    If [ $set = "human resources" ]

    Go to Layout [ "Home HR" ; Animation: None ]

    Else If [ [ $set = "sales" ]

    Go to Layout [ "Home Sales" ; Animation: None ]

    Else If [ [ $set = "production" ]

    Go to Layout [ "Home Production" ; Animation: None ]

    End if

    ```


    These functions can be used to create credential-specific behavior anywhere that
    a formula is an option. Hide layout objects or custom menus, change button or
    tab names, personalize a tooltip, produce different results in calculation fields,
    and more. *However, using this technique should be done with some hesitation.*


    ## Understanding the Risks of Credential Embedding


    Embedding credentials in formulas to create conditional functionality should be
    used with caution. Each change to the company workforce may require changes to
    employee names used in dozens, hundreds, or thousands of different formulas. Even
    something as simple as a coworker marrying and changing their last name can require
    a lot of work in a complex database. While the name of an existing account can
    be changed for a new employee, all the uses of the former name in formulas don’t
    automatically update because they are literal text and not dynamic references.
    In a large organization with high turnover, locating and changing these could
    become a full-time job.


    This problem can be somewhat abated by using *titles* for account names instead
    of employee’s actual *name*. For example, Jim Smith might sign into the database
    as “Account Supervisor” with a unique password. Then, if a new person fills that
    position, they carry on with the same account name and a new password. Since the
    actual account name didn’t change, any formulas using it wouldn’t need to change
    either. However, this approach is problematic since it depersonalizes the user
    identity and can be confusing when looking at a historical list of records seeing
    they were all modified by the “Account Supervisor,” but they span a period where
    three different people held that position. Ideally, users sign into the database
    with a personal identifier.


    Conditional features can be made slightly more impervious to team changes when
    formulas use *privilege sets* instead of *account names.* Individual user accounts
    can be removed and created as needed, while the assigned privilege set continues
    to control the interface and behavioral conditions in formulas. Although this
    is a better approach, there are still elements of risk. Unless privilege sets
    are meticulously designed with near omniscience, it is almost inevitable that
    certain features will need major changes as roles and responsibilities shift within
    a company workflow. Also, since each user can be assigned only a single privilege
    set, features may require numerous compound clauses, to grant permission for a
    group of different privilege sets.


    Using credentials in formulas does extend the ability of security settings beyond
    the *Manage Security* dialog, but in a potentially labor-intensive way. What may
    begin as a simple, ad hoc exception for one user or group can quickly become a
    bad habit that paralyzes developers who must constantly try to remember thousands
    of credential exceptions lost and forgotten in the dark corners of a crowded interface
    design. Fortunately, FileMaker has an amazing alternative that solves this problem
    by allowing custom feature exceptions to be easily wired directly into the security
    interface: *custom extended privileges*.'
