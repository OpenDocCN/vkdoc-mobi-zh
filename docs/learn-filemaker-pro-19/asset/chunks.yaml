    The list of base directories used for managed containers


    Caution


    Base directories can’t be edited when a database is hosted on a FileMaker Server.
    Take the file offline and open with the FileMaker Pro desktop application to edit.


    ###### Creating a New Base Directory


    The number of base directories in a given database file is completely up to the
    developer. The default directory can be shared by every container field in every
    table in the file. Alternatively, every table or even every field can be assigned
