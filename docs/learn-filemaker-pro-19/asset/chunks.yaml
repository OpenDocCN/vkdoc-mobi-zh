- fmt: '# Installing a Menu Set


    There are several different ways to install a custom menu set. To assign a set
    as the default for the entire file, choose it in the pop-up menu at the bottom
    of the *Manage Custom Menus* dialog. Doing that will assign the set to every layout
    set to use the file’s default set (Chapter [18](#429700_2_En_18_Chapter.xhtml),
    “Exploring the Layout Setup Dialog”). When a solution has multiple custom menu
    sets defined, these can be activated for specific layouts in the *Layout Setup*
    dialog. Scripts can also use the `Install Menu Set` step to activate a set. Also,
    users with full access privileges (Chapter [30](#429700_2_En_30_Chapter.xhtml))
    can manually change the menu set at any time using the `Tools ➤ Custom Menus`
    submenu.


    # Exploring the Link Between Commands and Menus


    Certain elements built into the FileMaker Pro application interface provide user
    access to standard commands but offer no direct customization options for developers.
    For example, the `New Record` command is present in numerous locations: the toolbar
    icons, record contextual menu items, and some controls embedded into Table view.
    While the menu can be customized, the toolbar and other contextual menus aren’t
    directly modifiable. However, FileMaker handles this by linking those elements
    to commands *through the active menu set*, as illustrated in Figure [23-19](#429700_2_En_23_Chapter.xhtml#Fig19).
    These static interface elements pull their *name*, *tooltip,* and *enabled status*
    from a *command-linked menu item* and route a click through the menu item to the
    command. This setup allows indirect customization of these standard interface
    elements when using custom menus.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig19_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig19_HTML.jpg)


    Figure 23-19


    The integration of a command with interface elements


    A good example of this is the `New Record` command, which is present in the `Records`
    menu and in all of the other locations mentioned. The core `New Record` command
    is enabled or disabled by a user’s account privileges (Chapter [30](#429700_2_En_30_Chapter.xhtml)),
    although these can be bypassed by a custom script running with full privileges
    (Chapter [24](#429700_2_En_24_Chapter.xhtml)). The default menu item is linked
    to the command and is automatically enabled or disabled depending on the user’s
    credentials. Other access points like the toolbar icon look to the *menu* for
    an item based on the `New Record` command to determine name, tooltip, and enabled
    status. A click on any of those interface elements is the equivalent of selecting
    the menu item directly. So, a command-linked menu item acts as the hub for the
    command, and this makes it possible to replace the default menu set with a custom
    one and still have control over these non-customizable interface elements. If
    the menu item’s name is customized, the toolbar icon for that command is updated,
    as shown in Figure [23-20](#429700_2_En_23_Chapter.xhtml#Fig20). If a custom script
    is assigned to the menu item, the toolbar icon runs that instead of the default
    command. Unlike these elements, buttons on a layout aren’t linked through the
    command-menu structure and can only run commands through scripts.


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig20_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig20_HTML.jpg)


    Figure 23-20


    The modified icon (left) and contextual menu (right)


    When a standard `New Record` command-linked menu item is removed from the active
    menu set, these other interface elements will be disabled. A new menu item can
    be named and run a script action for creating records but will not automatically
    represent the command until it is linked to the command using the `Based on existing
    command` settings in the `Edit Custom Menu` dialog, as shown in Figure [23-21](#429700_2_En_23_Chapter.xhtml#Fig21).


    ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig21_HTML.jpg](images/429700_2_En_23_Chapter/429700_2_En_23_Fig21_HTML.jpg)


    Figure 23-21


    A menu item’s command link allows permission enabling and customization of standard
    interface elements


    A menu item’s relationship to a standard command can take one of three forms.
    *If the item is linked to a standard command only, without* a name or script override,
    it will appear and perform the normal functionality associated with the command
    and influence other interface elements normally. *If the item is not linked to
    a standard command and assigned a custom name and a script,* it will perform the
    custom script as its function but any other command-related interface elements
    will be disabled or invisible. When these two are combined and an item *is linked
    to a standard command with a name or script override*, it will appear with a custom
    name, perform the assigned custom script, continue to be automatically enabled
    based on permissions, and extend these capabilities to standard interface elements.'
