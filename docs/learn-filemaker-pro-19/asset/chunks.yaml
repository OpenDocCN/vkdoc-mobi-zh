    ## 使用逻辑函数


    *逻辑函数*用于测试条件以产生可变结果并执行其他求值函数。其中包括四个绝对必要的函数：`Case`、`Choose`、`Let`和`While`。

    '
- fmt: '# Case


    `Case`函数求值一个或多个表达式，并返回第一个结果为 true 的表达式所对应的结果。如果没有表达式为 true，则可以包含一个可选的默认结果。该函数产生的条件结果类似于嵌套的`if-then`函数，但处理多条语句时更加简洁。该函数至少需要包含一个*测试-结果对*作为参数，其中仅当*测试*部分为
    true 时，*结果*才会被求值并返回。*测试*参数必须包含一个结果为布尔值的文本或数值表达式。*结果*参数可以是字面量结果，也可以是生成任意结果的表达式。


    ```

    Case ( test ; result )

    ```


    可以添加任意数量的附加测试条件，并且这些条件将按顺序依次求值，直到某个条件求值为 true，并返回对应的结果。


    ```

    Case ( test ; result ; test2 ; result2 )

    Case ( test ; result ; test2 ; result2 ; test3 ; result3)

    ```


    可以在末尾包含一个未经测试的最终结果，当之前的测试条件均未产生 true 结果时，该结果将作为返回值。如果没有提供默认值，那么当所有测试均为 false 时，结果将为空。在以下示例中，如果`test`和`test2`条件均为
    false，则结果将为`defaultResult`语句生成的任何内容。


    ```

    Case ( test ; result ; test2 ; result2 ; defaultResult )

    ```


    随着这些语句变得冗长，可以考虑添加制表符和回车符来垂直重新格式化它们，将每一对放在单独的行上，使语句更易于阅读和遵循逻辑执行顺序。


    ```

    Case (

    test ; result ;

    test2 ; result2 ;

    test3 ; result3 ;

    test4 ; result4 ;

    defaultResult

    )

    ```


    以下示例构建一个句子，并使用`Case`在`Qty`字段中的值大于 1 时，为单词 “widget” 添加可选的复数形式。


    ```

    "Enclosed find " & Qty & " widget" & Case ( Qty > 1 ; "s" ) & " for inspection."

    // result examples (varying by Qty) =

    //    Enclosed find 1 widget for inspection.

    //    Enclosed find 8 widgets for inspection.

    ```


    在此示例中，名为`Elapsed`的字段包含发票逾期的天数，并生成四种不同文本结果之一以指示其状态。如果值为 32，则结果将为 “Past Due”，因为前两个测试为
    false，而第三个为 true。类似地，值为 64 将导致 “Delinquent”，而值为 20 将获得默认结果 “On Time”。


    ```

    Case (

    Elapsed > 90 ; "Severe" ;

    Elapsed > 60 ; "Delinquent"

    Elapsed > 30 ; "Past Due"

    "On Time"

    )

    ```


    注意：FileMaker 确实包含内置的`If`函数，但通常为了`Case`的优越性而弃用该函数。


    # Choose


    `Choose`函数求值单个测试条件以生成一个整数，并使用该数字从一个或多个结果值列表中进行选择。*测试*参数必须包含一个结果为整数的文本或数值表达式。可以包含任意数量的*结果*参数，并将根据测试生成的数字返回对应的结果。结果可以是字面量值，也可以是求值为任意数据结果的表达式。索引是*从零开始*的，因此如果测试求值为
    0，则返回列出的第一个结果；测试值为 1 时返回第二个结果，依此类推。


    ```

    Choose ( test ; result0 ; result1 ; result2 ; result3 )

    ```


    在此示例中，`Status`字段包含 0 到 4 的数字，`Choose`函数用于将其转换为文本状态。


    ```

    Choose ( Status ; "Low" ; "Guarded" ; "Elevated" ; "High" ; "Severe" )

    ```


    此示例使用随机数从四个姓名中选出一个。


    ```

    Choose ( Random * 4 ; "Jim Thomas" ; "Shannon Miller" ; "Charlene Smith" ; "Karen
    Camacho" )

    ```


    # Let


    `Let`函数在执行业务处理内嵌计算语句之前，初始化一个或多个变量。该函数接受两个表达式作为参数。*变量声明*参数由一个或多个变量名组成，每个变量名带有一个生成其值的表达式，变量名与表达式之间用等号分隔。变量可以是任何类型的混合：*语句*、*局部*或*全局*（第
    12 章，“变量类型”）。每个变量的表达式可以是字面量值、函数调用或生成任意类型结果（将成为对应变量的值）的表达式。*计算*参数可以是任何能产生整个语句结果的表达式。


    ```

    Let ( variable = expression ; calculation )

    ```


    当初始化多个变量时，必须在声明参数周围添加方括号，并在每个*变量-表达式*对之间添加分号。


    ```

    Let ( [

    variable = expression1 ;

    variable2 = expression2 ;

    variable3 = expression3

    ] ;

    calculation

    )

    ```


    `Let`函数在构建复杂公式时非常有用。冗长的字段名可以压缩为短变量，以便在公式中多次使用时节省空间。由许多嵌套函数或子句组成的复杂表达式可以分离为一系列较短的表达式，这些表达式逐步生成变量的值，从而更易于阅读和编辑。这还可以消除对大型相关记录集执行相同操作（例如，多次对大型相关记录集使用`Sum`函数）带来的负面性能影响。


    举一个简单的例子，对`Contact::Contact Last Name`字段的引用可能在`Case`语句中被多次使用，每次都重复完整的字段引用。通过`Let`语句，该字段的值可以插入到一个名为`lastName`、`name.last`或仅`last`的短变量中，并在原位置使用该变量。以下两个示例说明了这一点，它们构建了一个三级文件夹路径，该路径使用姓氏的首字母、姓氏的前三个字母以及姓氏本身，并在未指定姓氏时使用占位符；例如，“Munro”
    将变为 “M:Mun:Munro:”。以下是在公式中重复多次看到对同一字段的四个引用以产生此结果：


    ```

    Case (

    Contact::Contact Last Name = "" ; "Missing Name:" ;

    Left ( Contact::Contact Last Name ; 1 ) & ":" &

    Left ( Contact::Contact Last Name ; 3 ) & ":" &

    Contact::Contact Last Name & ":"

    )

    ```


    或者，使用`Let`语句，通过一次字段引用将字段的值放入一个短变量中。然后，如果该变量为空，则将其替换为缺失占位符。最后，使用它来构造路径。


    ```

    Let ( [

    last = Contact::Contact Last Name ;

    last = Case ( last = "" ; "Missing Name:" ; last )

    ] ;

    Left ( last; 1 ) & ":" & Left ( last; 3 ) & ":" & last & ":"

    )

    ```


    前面的示例使用了*级联声明*，它使用相同的变量以逐步连续的方式为一个变量建立值，从而将复杂的语句分隔为更易读的格式。在前面的示例中，`last`变量首先被设置为字段名，然后在第二个声明步骤中（如果为空）重置。这允许将复杂的嵌套语句分隔为更易于阅读的步骤。在以下示例中，四个函数嵌套在一行中，可能非常难以阅读，尤其是在更复杂的公式中。从内向外看，此示例首先从`Notes`字段获取内容，`GetValue`函数从中提取第一段，然后使用`TextFormatRemove`函数消除所有格式，最后使用`Substitute`函数将破折号替换为句点。


    ```

    Substitute ( TextFormatRemove ( GetValue ( Contact::Notes ; 1 ) ) ; "-" ; "."
    )

    ```'
  raw: '### Case


    The *Case* function evaluates one or more expressions and returns a result corresponding
    to the first expression that returns a true result. If none of the expressions
    are true, an optional default result can be included. The function produces a
    conditional result similar to nested *if-then* functions, but it handles multiple
    statements with less verbiage. At a minimum, the function requires parameters
    consisting of one *test-result pair* where the *result* is only evaluated and
    returned if the *test* portion is true. The *test* parameter must contain a text
    or numeric expression that evaluates to a Boolean. The *result* parameter can
    be a literal result or an expression that generates any result.


    ```

    Case ( test ; result )

    ```


    Any number of additional test conditions can be added, and each will be evaluated
    in order until one evaluates true and causes the corresponding result to be returned.


    ```

    Case ( test ; result ; test2 ; result2 )

    Case ( test ; result ; test2 ; result2 ; test3 ; result3)

    ```


    A final, untested result can be included at the end to serve as the result when
    no prior test conditions produce a true result. If no default is provided, the
    result will be nothing when all tests are false. In this example, if the *test*
    and *test2* conditions are both false, the result will be whatever is produced
    by the *defaultResult* statement.


    ```

    Case ( test ; result ; test2 ; result2 ; defaultResult )

    ```


    As these statements grow, consider adding tabs and carriage returns to reformat
    them vertically, putting each pair on its own line and making the statement easier
    to read and follow the logical execution of tests.


    ```

    Case (

    test ; result ;

    test2 ; result2 ;

    test3 ; result3 ;

    test4 ; result4 ;

    defaultResult

    )

    ```


    This example builds a sentence and uses *Case* to optionally pluralize the word
    “widget” if the value in the *Qty* field is greater than one.


    ```

    "Enclosed find " & Qty & " widget" & Case ( Qty > 1 ; "s" ) & " for inspection."

    // result examples (varying by Qty) =

    //    Enclosed find 1 widget for inspection.

    //    Enclosed find 8 widgets for inspection.

    ```


    In this example, a field named *Elapsed* contains the number of days an invoice
    is past due and generates one of four different text results indicating its status.
    If the value is 32, the result will be “Past Due” because the first two tests
    were false and the third was true. Similarly, a value of 64 will result in “Delinquent,”
    while a value of 20 will receive the “On Time” default result.


    ```

    Case (

    Elapsed > 90 ; "Severe" ;

    Elapsed > 60 ; "Delinquent"

    Elapsed > 30 ; "Past Due"

    "On Time"

    )

    ```


    Note


    FileMaker does include a built-in *If* function but that is largely shunned in
    favor of the superiority of *Case*.


    ### Choose


    The *Choose* function evaluates a single test condition to generate an integer
    and uses that number to select from a list of one or more result values. The *test*
    parameter must contain a text or numeric expression that evaluates to an integer.
    Any number of *result* parameters can be included and will be returned based on
    the number generated by the test. The results can be literal values or expressions
    that evaluate to any data result. The indexing is *zero-based*, so the first result
    listed will be returned if the test evaluates to a 0, the second result for a
    1, etc.


    ```

    Choose ( test ; result0 ; result1 ; result2 ; result3 )

    ```


    In this example, a *Status* field contains a number from 0 to 4, and the *Choose*
    function is used to convert this into a textual status.


    ```

    Choose ( Status ; "Low" ; "Guarded" ; "Elevated" ; "High" ; "Severe" )

    ```


    This example uses a random number to pick one of four names.


    ```

    Choose ( Random * 4 ; "Jim Thomas" ; "Shannon Miller" ; "Charlene Smith" ; "Karen
    Camacho" )

    ```


    ### Let


    The *Let* function initializes one or more variables prior to performing an embedded
    calculation statement. The function accepts two expressions as parameters. The
    *variable declaration* parameter is made up of one or more variable names, each
    with an expression that produces its value, separated by an equal sign. Variables
    can be a mixture of any type: *statement*, *local,* or *global* (Chapter [12](#429700_2_En_12_Chapter.xhtml),
    “Types of Variable”). The expression for each can be a literal value, function
    call, or expression that produces any type of result that will become the corresponding
    variable’s value. The *calculation parameter* can be any expression that produces
    the result of the overall statement.


    ```

    Let ( variable = expression ; calculation )

    ```


    When initializing more than one variable, square brackets must be added around
    the declaration parameter and a semicolon between each *variable-expression* pair.


    ```

    Let ( [

    variable = expression1 ;

    variable2 = expression2 ;

    variable3 = expression3

    ] ;

    calculation

    )

    ```


    The *Let* function is useful when constructing complex formulas. Lengthy field
    names can be compressed into short variables to save space when they are used
    multiple times in a formula. Complex expressions made up of many nested functions
    or clauses can be separated into a cascade of shorter expressions that produce
    a variable’s value in steps, making it easier to read and edit. This can also
    eliminate the negative performance impact of performing the same operation on
    large sets of related record, e.g., using the *Sum* function on a large set of
    related records multiple times.


    For a simple example, a reference to a *Contact::Contact Last Name* field may
    be used in a *Case* statement several times, each repeating the full field reference.
    With a Let statement, the field’s value can be inserted into a short variable
    named *lastName*, *name.last*, or just *last* that can be used in its place. This
    is illustrated in the following two examples that build a three-level folder path
    to a folder using the first letter of the last name, the first three letters of
    the last name, and the last name with a condition to use a placeholder when the
    last name isn’t specified; for example, “Munro” would become “M:Mun:Munro:”. Here
    we can see four references to the same field repeated in the formula to produce
    this result:


    ```

    Case (

    Contact::Contact Last Name = "" ; "Missing Name:" ;

    Left ( Contact::Contact Last Name ; 1 ) & ":" &

    Left ( Contact::Contact Last Name ; 3 ) & ":" &

    Contact::Contact Last Name & ":"

    )

    ```


    Alternatively, using a *Let* statement , a single field reference is used to place
    the field’s value into a short variable. Then, if that variable is empty, it is
    replaced with the missing placeholder. Finally, it is used to construct the path.


    ```

    Let ( [

    last = Contact::Contact Last Name ;

    last = Case ( last = "" ; "Missing Name:" ; last )

    ] ;

    Left ( last; 1 ) & ":" & Left ( last; 3 ) & ":" & last & ":"

    )

    ```


    The preceding example uses a *cascading declaration* which uses the same variable
    to establish a value for one variable in a stepped succession that separates a
    complex statement into a more readable format. In the preceding example, the *last*
    variable was first set to the field name and then reset in a second declaration
    step if empty. This allows complex nested statements to be separated into steps
    that can be more easily read. In the following example, four functions are nested
    in a single line and can be very hard to read, especially in more complex formulas.
    Working from the inside out, this example first gets content from a *Notes* field,
    from which the *GetValue* function extracts the first paragraph, then uses the
    *TextFormatRemove* function to eliminate all formatting, and then uses the *Substitute*
    function to replace dashes with periods.


    ```

    Substitute ( TextFormatRemove ( GetValue ( Contact::Notes ; 1 ) ) ; "-" ; "."
    )

    ```'
