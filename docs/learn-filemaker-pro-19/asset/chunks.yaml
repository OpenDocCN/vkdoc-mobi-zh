- fmt: '### Adding a Password to the Default Account


    To begin exploring the configuration options for accounts, start by adding a password
    to the default `Admin` account. Select the account in the list to open the details
    panel on the right, shown in Figure 30-2. Click the pencil icon to open a `Set
    Password` dialog and enter a new password. If desired, you can also optionally
    modify the `Account Name` to something more descriptive or more personal, e.g.,
    “Developer” or your name.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig2_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig2_HTML.jpg)


    Figure 30-2

    The panel for a selected account, showing the change password button


    When closing the `Manage Security` dialog after entering a password, FileMaker
    will present a `Verify Access` dialog to ensure that you know an `Account Name`
    and `Password` that has full access privileges. This helps to ensure that you
    don’t lose access to the file. Be sure to write down the password you enter so
    that you don’t forget it!


    The next time the database file is opened, a sign-in dialog will ask for an `Account
    Name` and `Password`. The `Account Name` will default to the computer’s name and
    doesn’t necessarily indicate an acceptable account for access. Enter your credentials
    and click `Sign In` to regain access.


    **Note:** Passwords can be any length and may include any characters. However,
    to ensure compatibility with WebDirect, they should be limited to ASCII characters
    that don’t contain accented or non-Roman characters. They are case-sensitive,
    so be aware of Shift-lock.


    ### Creating a FileMaker File Account


    A `FileMaker File` account defines sign-in credentials and privileges for a user
    that will be stored internally and can be used to access the file even when not
    hosted on a server. To begin, open the `Manage Security` dialog and follow the
    steps shown in Figure 30-3.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig3_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig3_HTML.jpg)


    Figure 30-3

    The process for configuring an internal account


    1. Click the `New` button to add a new account to the list. The account will be
    `Active` by default and selected, ready to configure.

    2. Confirm that the authentication option is `FileMaker File`.

    3. Enter an account name, e.g., “John Smith.”

    4. Click the pencil icon to enter a password. To force a user to change their
    password to something private, check the `Require password change on next sign-in`
    box.

    5. Select a `Privilege Set` to determine the permissions granted to the user (discussed
    later in this chapter).


    ### Creating an External Server Account


    An `External Server` account defines permissions for a user group. The actual
    user account(s) and user group are created in the operating system of the host
    `FileMaker Server` computer. The account inside the database identifies the group
    name that a user must be a member of externally in order to gain the selected
    level of access defined. This allows one or more users to log into the database
    using their externally defined credentials and gain access to specific database
    features based on membership in an externally defined user group. To create a
    new `External Server` account, open the `Manage Security` dialog, and follow the
    steps shown in Figure 30-4.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig4_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig4_HTML.jpg)


    Figure 30-4

    The process for configuring an external account


    1. Click the `New` button to add a new account to the list.

    2. Select `External Server` as the authentication method.

    3. Enter a `Group Name` that is defined on the external server, remembering that
    these are case-sensitive.

    4. Select a `Privilege Set` to determine the permissions granted to any user who
    signs in as a member of that group.


    **Tip:** On macOS, the externally defined users can be `Sharing Only` accounts
    to avoid creating unnecessary directories and resources.


    #### Enabling FileMaker Server External Authentication


    Users can only log in using an external account when the database is hosted on
    a `FileMaker Server` or that is configured to explicitly allow authentication
    from external accounts. To confirm this for FileMaker Server version 19, follow
    these steps:


    1. Open and sign into the `Admin Console` (Chapter 29).

    2. Click the `Administration` tab along the top.

    3. Click on `External Authentication` in the sidebar.

    4. Under the `Database Sign In` heading, enable `External Server Accounts`.


    ## Exploring Privilege Sets


    A `privilege set` is a collection of permissions defining a level of access to
    data, layout, and other features. Once defined, a privilege set can be assigned
    to one or more user accounts to establish their abilities within the database.
    To view, create, and edit privilege sets, open the `Manage Security` dialog and
    click the `Advanced Settings` button. This will open an `Advanced Security Settings`
    dialog, shown in Figure 30-5. Click the `Privilege Sets` tab to view the list
    of defined sets.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig5_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig5_HTML.jpg)


    Figure 30-5

    The dialog used to define sets of access privileges for user accounts


    ### Default Privilege Sets


    Every database will have three default privilege sets. Each of these has a square
    bracket around their names and are non-editable except for the ability to enable
    and disable `extended privileges`.


    * `Full Access` – Allows unrestricted access to `every available feature` and
    all content. This should be reserved for developers only. FileMaker requires at
    least one account that allows full access.

    * `Data Entry Only` – Provides limited access to only data entry work. Users assigned
    this set can create, edit, and delete records in every table. They can use but
    not structurally alter layouts, scripts, and value lists. They can print and export.
    They are automatically disconnected from a server when idle, and they can change
    their own account password.

    * `Read-Only Access` – Similar to the preceding one but more with no access to
    modify content or structure in any way.


    ### Creating Custom Privilege Sets


    To create a new privilege set, open the `Advanced Security Settings` dialog, click
    on `Privilege Sets` tab, and click the `New` button. This will open a new empty
    set in the `Edit Privilege Set` dialog, shown in Figure 30-6. By default, a new
    set allows almost no access. Enter a name, optional description, and then begin
    enabling the desired permissions which are grouped into three categories:


    * `Data Access and Design Privileges` – Allow access by resource type: `Records`,
    `Layouts`, `Value List`, and `Scripts`

    * `Other Privilege` – A mixture of miscellaneous features

    * `Extended Privileges` – Enables specific capabilities, ten default options that
    can be expanded


    **Caution:** A custom privilege set cannot grant developer access to modify the
    structural schema (table, fields, and relationships). Only the default, unalterable
    `Full Access` privilege set allows editing these.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig6_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig6_HTML.jpg)


    Figure 30-6

    The dialog used to edit permissions for a privilege set


    #### Configuring Data Access and Design Settings


    The first set of privilege settings define `data access and design` permissions.
    These control the actions users can perform by resource type: `Records`, `Layouts`,
    `Value Lists`, and `Scripts`. Each has a menu of several options that control
    access to all entities within its class and an option to assign `custom privileges`
    to individual objects instead.'
