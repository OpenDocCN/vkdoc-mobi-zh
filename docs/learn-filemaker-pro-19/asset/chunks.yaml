    \ layout, making it easy to locate and select items, including those in groups\
    \ or hidden behind other objects.\n\n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig2_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig2_HTML.jpg)\n\
    \nFigure 19-2\n\nThe Objects tab of the Objects pane\n\nEach object on the layout\
    \ is listed here with a default name unless a custom name has been assigned. The\
    \ default name displayed will vary by object type. For example, a label displays\
    \ its text value, while a field shows its control style and field name.\n\nThere\
    \ is a lot of functionality built into the object list. An object selected in\
    \ the list will cause the corresponding object on the layout to be selected and\
    \ vice versa. Grouped objects and multilayered objects like *portals*, *tab controls*,\
    \ and *slide controls* show their nested hierarchy which can be expanded or collapsed\
    \ in the list. A togglable *Hide* icon next to an item’s name can temporarily\
    \ make an item invisible in Layout mode to help declutter the design area for\
    \ focused work. Finally, a contextual menu contains additional functionality,\
    \ shown in Figure [19-3](#429700_2_En_19_Chapter.xhtml#Fig3).\n\n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig3_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig3_HTML.jpg)\n\
    \nFigure 19-3\n\nThe contextual menu for items listed in the Objects tab\n\nThe\
    \ commands in this menu depend on the type of object selected:\n\n*   *Hide All\
    \ Other Objects* – Hides every object on the layout except for the selected object(s).\n\
    \n*   *Hide Objects in Front* – Hides every object that is layered in front of\
    \ the selected object(s).\n\n*   *Hide Objects in Front and Back* – Hides every\
    \ object that is layered in front of and behind the selected object(s).\n\n* \
    \  *Specify Object Name* – Reveals a field for entering a custom name (Chapter\
    \ [21](#429700_2_En_21_Chapter.xhtml), “Naming Objects”). Names can also be set\
    \ in the *Inspector* pane.\n\n*   *Conditional Formatting* – Opens a dialog for\
    \ defining conditionally applied styles (Chapter [21](#429700_2_En_21_Chapter.xhtml)).\n\
    \n*   *Set Script Triggers* – Opens the dialog for connecting layout events to\
    \ scripts (Chapter [27](#429700_2_En_27_Chapter.xhtml)).\n\nNote\n\n*Objects hidden\
    \ using this function are only temporarily hidden in Layout mode but continue\
    \ to render normally in other modes.*\n\n### Defining the Add-ons Tab\n\nThe *Add-ons*\
    \ tab of the *Objects* pane, shown in Figure [19-4](#429700_2_En_19_Chapter.xhtml#Fig4),\
    \ is a new feature in version 19 that allows drag and drop insertion of preconfigured\
    \ resource components. An *add-on module* is a collection of xml, json, and graphic\
    \ elements that automate the insertion of specialty resources into a FileMaker\
    \ database.\n\n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig4_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig4_HTML.jpg)\n\
    \nFigure 19-4\n\nThe Fields tab of the Objects pane with some add-ons added\n\n\
    Click the add (+) icon to open a panel containing a library of available modules.\
    \ Select one and click *Choose* to add it to your file. The module will appear\
    \ as an icon in the pane and, depending on the selection, may add some combination\
    \ of tables, fields, relationships, scripts, and value lists to the database.\
    \ Once added, drag the icon to any layout to instantly create a set of functional\
    \ objects, pre-wired into the schema. The resources can be further customized\
    \ to adjust to the formatting and functional needs of the database. To remove,\
    \ right-click on an add-on icon, and choose the *Uninstall Add-on* option. A warning\
    \ dialog includes a checkbox option that can also automatically delete all the\
    \ resources that were added to the database.\n\nCaution\n\nSome add-ons require\
    \ a detectable primary key field in the current layout’s table and will refuse\
    \ to work if one can’t be found.\n\n## Exploring the Inspector Pane\n\nThe *Inspector*\
    \ pane is an integrated region on the right of a window in Layout mode. The visibility\
    \ of this pane can be toggled by either clicking the *Show/Hide Inspector Pane*\
    \ button in the toolbar or selecting an item from the *View ➤ Inspector* menu.\
    \ Unlike the *Objects* pane, the Inspector can also be opened into one or more\
    \ floating palettes using the *View ➤ New Inspector* menu, reminiscent of past\
    \ versions. This pane is loaded with controls used to edit the format and behavior\
    \ settings for a selected layout part or object. The controls are organized into\
    \ four icon-labeled tabs: *Position*, *Style*, *Appearance,* and *Data*. Each\
    \ of these has controls grouped into several collapsible regions.\n\n### Inspecting\
    \ the Position Tab\n\nThe *Position* tab is the first in the Inspector and is\
    \ divided into five collapsible regions: *Position*, *Autosizing*, *Arrange &\
    \ Align*, *Sliding & Visibility*, and *Grid*.\n\n#### Position\n\nThe *Position*\
    \ group, shown in Figure [19-5](#429700_2_En_19_Chapter.xhtml#Fig5), contains\
    \ options for object naming, tooltip, and position.\n\n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig5_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig5_HTML.jpg)\n\
    \nFigure 19-5\n\nThe first group of settings on the Position tab of the Inspector\
    \ pane\n\n1.  *Name* – Add an optional object name (Chapter [21](#429700_2_En_21_Chapter.xhtml),\
    \ “Naming Objects”).\n\n2.  *Tooltip* – Add an optional string to be displayed\
    \ as a floating tooltip when the user holds the cursor over the object in Browse\
    \ mode. The icon opens a *Specify Calculation* dialog for formula-driven tips.\n\
    \n3.  *Position* – Control positioning of a selected object within the design\
    \ area precisely instead of dragging. These are proportionally locked, so changing\
    \ one will automatically adjust the opposing value to maintain the *Width* or\
    \ *Height*.\n\n4.  *Size* – Set an object’s *Width* and *Height*.\n\nNote\n\n\
    The unit of measurement for the position and size will match the current ruler’s\
    \ settings but can be changed by clicking the labels, which cycle through the\
    \ options *centimeters*, *points*, and *inches*."
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您的指示，将给定的英文文本翻译成中文，并严格遵守所有的格式和注意事项。\n\n\n### 定义“字段”选项卡\n\
    \n“对象”窗格中的`字段`选项卡（如图 19-1 所示）是在版本 17 中新增的，它取代了之前独立存在的`字段选取器`面板。此面板整合了一些*架构函数快捷方式*和*布局设计功能*。它提供了一种直接创建字段、修改其数据类型以及访问字段选项对话框来编辑字段架构属性的途径。底部的控件允许进行预配置设置，这些设置会在将字段添加到布局时生效。\n\
    \n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig1_HTML.jpg](img/429700_2_En_19_Fig1_HTML.jpg)\n\
    \n图 19-1\n\n对象窗格的字段选项卡\n\n1.  `切换按钮` – 显示和隐藏该窗格。\n2.  `表 occurrence` – 选择一个表 occurrence\
    \ 来访问当前布局所分配 occurrence 之外的字段列表。单击相邻的搜索图标以显示隐藏的筛选字段。\n3.  `字段` – 列出所选 occurrence\
    \ 中的字段。将一个或多个字段拖到布局中以添加实例。更改架构类型或访问上下文菜单以删除、重命名或打开`字段选项`对话框（第 8 章）。\n4.  `新字段`\
    \ – 在所选 occurrence 的表中创建一个字段。\n5.  `拖放首选项` – 控制将字段拖到布局时的配置方式：\n    - `字段放置` –\
    \ 将新字段*垂直*堆叠或在一行中*水平*对齐。\n    - `标签` – 在选定的相对位置包含一个标签。\n    - `控件样式` – 选择数据控件样式（第\
    \ 20 章）。\n\n### 定义“对象”选项卡\n\n“对象”窗格中的`对象`选项卡（如图 19-2 所示）是在版本 17 中新增的，它取代了之前独立存在的`布局对象`面板。这提供了当前布局上所有对象的分层视图，使得定位和选择项目变得容易，包括那些在组中或隐藏在其他对象后面的项目。\n\
    \n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig2_HTML.jpg](img/429700_2_En_19_Fig2_HTML.jpg)\n\
    \n图 19-2\n\n对象窗格的对象选项卡\n\n除非指定了自定义名称，否则布局上的每个对象都会在此处以默认名称列出。显示的名称会因对象类型而异。例如，标签会显示其文本值，而字段则会显示其控件样式和字段名称。\n\
    \n对象列表内置了许多功能。在列表中选择一个对象会导致布局上相应的对象被选中，反之亦然。分组对象和像*门户*、*选项卡控件*和*滑动控件*这样的多层对象会显示其嵌套层次结构，可以在列表中展开或折叠。项目名称旁边的可切换`隐藏`图标可以临时使项目在布局模式下不可见，从而帮助整理设计区域以进行专注的工作。最后，一个上下文菜单包含额外的功能，如图\
    \ 19-3 所示。\n\n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig3_HTML.jpg](img/429700_2_En_19_Fig3_HTML.jpg)\n\
    \n图 19-3\n\n对象选项卡中列出项目的上下文菜单\n\n此菜单中的命令取决于所选对象的类型：\n\n- `隐藏所有其他对象` – 隐藏布局上除选定对象之外的所有对象。\n\
    - `隐藏前面的对象` – 隐藏所有层叠在选定对象前面的对象。\n- `隐藏前面和后面的对象` – 隐藏所有层叠在选定对象前面和后面的对象。\n- `指定对象名称`\
    \ – 显示一个用于输入自定义名称的字段（第 21 章，“命名对象”）。也可以在`检查器`窗格中设置名称。\n- `条件格式` – 打开一个用于定义条件应用样式的对话框（第\
    \ 21 章）。\n- `设置脚本触发器` – 打开用于将布局事件连接到脚本的对话框（第 27 章）。\n\n注意\n\n*使用此功能隐藏的对象仅在布局模式下临时隐藏，但在其他模式下会正常渲染。*\n\
    \n### 定义“加载项”选项卡\n\n“对象”窗格中的`加载项`选项卡（如图 19-4 所示）是版本 19 中的一个新功能，它允许拖放插入预配置的资源组件。一个`加载项模块`是\
    \ xml、json 和图形元素的集合，可将专业资源的插入过程自动化到 FileMaker 数据库中。\n\n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig4_HTML.jpg](img/429700_2_En_19_Fig4_HTML.jpg)\n\
    \n图 19-4\n\n添加了一些加载项后的对象窗格字段选项卡\n\n单击添加 (`+`) 图标打开一个面板，其中包含可用模块的库。选择一个模块并单击`选择`将其添加到您的文件中。该模块将作为图标出现在窗格中，并且根据选择，可能会向数据库添加表、字段、关系、脚本和值列表的某种组合。添加后，将图标拖到任何布局上即可立即创建一组功能对象，这些对象已预先连接到架构中。可以进一步自定义这些资源以适应数据库的格式和功能需求。要删除，右键单击加载项图标，然后选择`卸载加载项`选项。一个警告对话框包含一个复选框选项，该选项还可以自动删除添加到数据库中的所有资源。\n\
    \n警告\n\n某些加载项需要当前布局表中存在一个可检测的主键字段，如果找不到，它们将拒绝工作。\n\n## 探索检查器窗格\n\n`检查器`窗格是布局模式下窗口右侧的一个集成区域。可以通过单击工具栏中的`显示/隐藏检查器窗格`按钮或从`视图\
    \ ➤ 检查器`菜单中选择一个项目来切换此窗格的可见性。与`对象`窗格不同，检查器还可以使用`视图 ➤ 新建检查器`菜单打开到一个或多个浮动面板中，类似于过去版本的形式。此窗格包含用于编辑选定布局部分或对象的格式和行为设置的控件。这些控件组织在四个带图标的选项卡中：`位置`、`样式`、`外观`和`数据`。每个选项卡的控件都分组到几个可折叠的区域中。\n\
    \n### 检查“位置”选项卡\n\n`位置`选项卡是检查器中的第一个，分为五个可折叠区域：`位置`、`自动调整大小`、`排列和对齐`、`滑动和可见性`以及`网格`。\n\
    \n#### 位置\n\n`位置`组（如图 19-5 所示）包含用于对象命名、工具提示和位置的选项。\n\n![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig5_HTML.jpg](img/429700_2_En_19_Fig5_HTML.jpg)\n\
    \n图 19-5\n\n检查器窗格位置选项卡上的第一组设置\n\n1. `名称` – 添加一个可选的对象名称（第 21 章，“命名对象”）。\n2. `工具提示`\
    \ – 添加一个可选的字符串，当用户在浏览模式下将光标悬停在对象上时，该字符串将显示为浮动工具提示。该图标打开一个`指定计算`对话框，用于公式驱动的提示。\n\
    3. `位置` – 精确控制选定对象在设计区域中的定位，而不是通过拖动。这些是按比例锁定的，因此更改一个将自动调整对面的值以保持`宽度`或`高度`。\n4.\
    \ `大小` – 设置对象的`宽度`和`高度`。\n\n注意\n\n位置和大小的度量单位将与当前标尺的设置匹配，但可以通过单击标签来更改，标签会循环显示选项*厘米*、*点*和*英寸*。\n"
- fmt: '#### Autosizing


    The `Autosizing` group, shown in Figure [19-6](#429700_2_En_19_Chapter.xhtml#Fig6),
    contains anchoring control over how an object moves or grows when a window is
    resized. Objects can be anchored to the `Left`, `Top`, `Right`, or `Bottom` by
    toggling the lock icon on or off at the respective side of the box. A lock on
    any side means that the current distance between that side of the object and the
    corresponding edge of the layout/window will remain fixed as the window is resized
    in non-Layout modes.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig6_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig6_HTML.jpg)


    Figure 19-6


    The Autosizing settings on the Position tab of the Inspector pane


    Using these locks in different combinations can create many different positioning
    and sizing effects. Lock the `Top` and `Left` to cause an object to retain its
    size and remain stationary as the window is resized. To stick to the bottom right
    of the layout, anchor only the `Bottom` and `Right` sides. Objects will expand
    their size when two opposing anchors are active. For example, to expand an object’s
    width as a window is resized, activate the `Left` and `Right` anchors. An object
    with no anchoring will float in the center of the window.


    #### Arrange & Align


    The `Arrange & Align` group, shown in Figure [19-7](#429700_2_En_19_Chapter.xhtml#Fig7),
    contains six groups of buttons arranged in three rows that are used to adjust
    object alignment, distributed space, relative size, group status, arrangement,
    and locked status. Unlike other settings in the `Inspector` pane, these are not
    object properties but are tools used to arrange selected objects neatly to tighten
    an interface design.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig7_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig7_HTML.jpg)


    Figure 19-7


    The Arrangement controls on the Position tab of the Inspector pane


    - `Align` – Align objects by side: `Left`, `Center`, `Right`, `Top`, `Middle`,
    or `Bottom`.

    - `Space` – Evenly distribute groups of objects `Horizontally` or `Vertically`.

    - `Resize` – Sync the height and/or width of a group of objects based on the smallest
    or largest among them.

    - `Group` – Convert individual objects into a single group or ungroup them.

    - `Arrange` – Change the stack position of selected objects using `Bring to Front`,
    `Bring Forward`, `Send Backward`, and `Send to Back`.

    - `Lock` – Change the locked status of objects. Locking protects from accidental
    modification.


    #### Sliding & Visibility


    The `Sliding & Visibility` group, shown in Figure [19-8](#429700_2_En_19_Chapter.xhtml#Fig8),
    controls how objects behave when printing, saving as a PDF file, or viewing in
    preview mode. There are three primary options: `Sliding left`, `Sliding up based
    on`, and `Hide when printing`.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig8_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig8_HTML.jpg)


    Figure 19-8


    The Sliding & Visibility controls on the Position tab of the Inspector pane


    The `Sliding left` option causes an object to shrink its width to the minimum
    required to display its content and to slide left as far as possible based on
    the other objects within the same horizontal plane.


    The `Sliding up based on` option causes an object to shrink its height to the
    minimum required to display its content and to slide up as far as possible based
    on the other objects in the same vertical plane. When this object is selected,
    other options below will become enabled. Select the `All objects above` option
    to cause objects in a common horizontal plane to slide up *together* relative
    to objects resizing above them. Select the `Only objects directly above` option
    to cause objects in a common horizontal plane to slide up independent of each
    other relative to resizing objects directly above them. Select the `Also resize
    enclosing part` checkbox to cause the layout part enclosing the object to shrink
    vertically relative to the lowest object after all resizing is complete. For example,
    a notes field can be expanded on a large layout part to accommodate the potential
    for lengthy content will end up shrinking to only the space necessary to display
    the actual content.


    The `Hide when printing` causes an object to be invisible when printing.


    #### Grid


    The `layout grid` is a sequence of evenly spaced horizontal and vertical lines
    overlaid on a layout background to form a regular grid of minor and major areas,
    shown in Figure [19-9](#429700_2_En_19_Chapter.xhtml#Fig9). The grid is only visible
    in Layout mode to assist with precision manual placement and spacing of objects.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig9_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig9_HTML.jpg)


    Figure 19-9


    The grid visible on the background of a layout


    The `Grid` group in the `Inspector` pane, shown in Figure [19-10](#429700_2_En_19_Chapter.xhtml#Fig10),
    contains settings that control the layout grid, universally on every layout in
    the current file. The `Show grid` checkbox enables the grid in Layout view. Selecting
    `Snap to grid` forces objects to fall on grid lines when manually dragged to a
    new position. The major and minor grid spacing can be customized in the two fields.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig10_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig10_HTML.jpg)


    Figure 19-10


    The Grid controls on the Position tab of the Inspector pane


    ### Inspecting the Style Settings


    The `Style` settings located on the second tab of the `Inspector` pane display
    and control the theme and style assigned to the layout and selected object (Chapter
    [22](#429700_2_En_22_Chapter.xhtml)).


    ### Inspecting the Appearance Settings


    The `Appearance` settings located on the third tab of the `Inspector` pane are
    divided into six regions: `Theme and Style`, `Graphic`, `Advanced Graphic`, `Text`,
    `Paragraph`, and `Tabs`. All but the first of these can be collapsed or expanded.


    #### Theme and Style


    The `Theme and Style` group is a non-collapsible section of the panel that displays
    the theme and style assigned to the layout with adjacent icon menus for updating
    these when changes are made. The pop-up menus below these allow selection of an
    `object part type` and `object part state`, and each combination of these has
    a different set of format settings in the rest of the `Appearance` panel (Chapter
    [22](#429700_2_En_22_Chapter.xhtml), “Editing an Object’s Style Settings”).'
