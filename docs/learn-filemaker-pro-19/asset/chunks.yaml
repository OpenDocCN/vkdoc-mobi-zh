- fmt: '#### Exploring Script Results


    A script run by another script can send back a result value using the `Exit Script`
    step. This step has a single parameter: a calculation formula that generates a
    text value. Like an input parameter, a result can be a single value or complex
    data structure. This example shows a simple result returning the word “Success”
    to indicate to the calling script that the target script reached the end of its
    steps without failure.


    ```

    Exit Script [ Text Result: "Success" ]

    ```


    A script can have multiple exit points, each returning a different value. In the
    following example, after a `Perform Find` step, a conditional `If` statement can
    exit the script if no records are found with a result that informs the calling
    script of this fact. When records are found, the script continues functioning
    until the end and returns the success indicator instead.


    ```

    Perform Find [ ]

    If [ Get ( FoundCount ) = 0 ]

    Exit Script [ Text Result: "No records found" ]

    End If

    Loop


    End Loop

    Exit Script [ Text Result: "Success" ]

    ```


    ### Perform Script on Server


    When a database is hosted on a FileMaker Server (Chapter [29](#429700_2_En_29_Chapter.xhtml)),
    scripts can be run locally on the current user’s computer using the `Perform Script`
    step or can be offloaded to run on the server using the `Perform Script on Server`
    step. Running a complex script on the server tends to be faster since the client
    and server don’t need to exchange as much information across the network. In instances
    where the local script doesn’t require a response or any interface manipulation,
    the task can be fully handed off to the server, instantly freeing the user’s computer
    to perform other script functions or manual work. However, before using this feature,
    it is important to realize that the context of the local computer’s database window
    will *not* be known or accessible to the server when running the script. Therefore,
    any contextual information about the *current table*, *layout*, *record*, *found
    set*, *sort order*, or *window* required by the script being called must be included
    in a script parameter so the server can replicate the context before running.
    New scripts can be designed specifically to address this issue. When converting
    an existing script to run on the server, it may be necessary to split it into
    two: one script that loads the context information into a script parameter and
    another that will receive that information, reset the context on the server, and
    then perform the other script functions.


    A script can be configured to run locally or on the server depending on certain
    conditions. For example, when the database is taken offline for maintenance, any
    scripts critical to the database at launch time must be able to run locally. For
    these, include a `condition that` allows the script to be run on the server when
    hosted and locally when not. The following example demonstrates a simple `If`
    step, choosing between running the script locally and on the server with the help
    of the `Get ( HostApplicationVersion )` and `LeftWords` functions. If the host
    version starts with the word “Server,” it indicates a hosted file, and the call
    will be performed using the `Perform Script on Server` step instead.


    ```

    If [ LeftWords ( Get ( HostApplicationVersion ) ; 1 ) = "Server" ]

    Perform Script On Server [  ]

    Else

    Perform Script [  ]

    End If

    ```


    ## Emphasizing the Importance of Context


    Like calculations, *scripts are contextual,* and it is *important* to be cognizant
    of this fact as you develop your database. When a script step executes, it runs
    within the context of the table occurrence of the front window’s current layout.
    This starts as the current layout when the script is triggered but may change
    when scripts begins changing layouts, performing finds or creating windows. A
    complex database may have scripts running scripts that run other scripts, and
    any of them might change the current context. If a script tries to access fields
    from a non-current context, it will cause errors and be confusing to users and
    possibly be destructive. If a script creates, deletes, or duplicates records while
    in the wrong context, it can be a disaster. Given this, it should be obvious that
    keeping track of context is a major imperative when designing scripts. When designing
    a script, keep focus on its intended context based on the steps it contains. Be
    aware of the expectation of different steps. While all script steps *operate contextually*,
    they don’t all have the same type of dependency. Some steps are *layout-table
    dependent* and access table values directly regardless of what is visible on the
    layout. Others are *layout-object dependent* and require direct interaction with
    something on the layout. In the next chapter, we will see examples such as `Set
    Field`, which doesn’t require a field present on the layout, and `Insert Text`
    which does. Also, when calling other scripts in a complex mesh of interconnected
    workflows, try to design a naming and organization standard that helps you manage
    context by implementing rules for which scripts can call others and which can’t.


    ## Managing Scripting Errors


    When an error occurs, a script may open a dialog informing the user of the problem.
    The message may or may not make sense to a user, depending on their knowledge
    and the type of error that occurred. A common example is a failure when the `Set
    Field` step tries to set a value for a field from a table not accessible from
    the current context. For example, if browsing a `Company` record, setting a field
    in the `Contact` table directly (not through a relationship) will result in the
    error message stating, “This operation could not be completed because the target
    is not part of the related table.” Since this is a programming error, a user would
    have no idea what this means or what to do to reach a resolution. So, it is a
    good idea to design your scripts to capture errors and present more informative
    dialogs that notify users in a productive way.


    To suppress error displays, use the `Set Error Capture` step with a parameter
    of `On`. This will cause the script to completely ignore any errors it encounters
    and continue processing. In many cases, this isn’t ideal because an error at one
    step may cause major problems further in the workflow. So, it may be necessary
    to detect and handle specific errors with custom messaging or other steps. The
    `Get ( LastError )` function can be used at various points in the script to determine
    if an error has occurred when the previous step(s) executed. The function will
    return a numeric value indicating either no error (`0`) or the number representing
    the error. An `If` statement can take conditional action in the event an error
    is detected.


    To illustrate this technique, the following simple example attempts to set the
    `Contact::Name Last` field. If this script is run from the `Contact` table, there
    will be no error generated and no dialog presented. However, running it in a different
    table will generate an error and present that fact in a custom dialog. Depending
    on the error, its location, and other functions of the script, the `If` statement
    can include other steps to email a developer, perform alternative steps, halt
    completely, etc.


    ```

    Set Error Capture [ On ]

    Set Field [ "Contact::Name Last; "Smith" ]

    If [ Get ( LastError ) = 103 ]

    Show Custom Dialog [ "Error 103: Set Field context error" ]

    End If

    ```


    **Tip**


    For a complete list of errors, search for “FileMaker Pro error code reference
    guide” on Claris.com.


    ## Summary


    This chapter introduced scripting basics, working in script workspace, and various
    step configuration interface options. We explored various formats for specifying
    file paths and discussed scripts running other scripts, passing parameters, receiving
    results, contextual awareness, and managing script errors. In the next chapter,
    we begin creating examples that perform common scripting tasks.'
