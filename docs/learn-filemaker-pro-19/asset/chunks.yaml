    a sound will be played anytime a user types a word that the dictionary thinks
    is misspelled.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig16_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig16_HTML.jpg)


    Figure 6-16


    The file options for spell-checking


    ### File Options: Text


    The *Text* tab, shown in Figure [6-17](#429700_2_En_6_Chapter.xhtml#Fig17), controls
    a few text entry options.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig17_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig17_HTML.jpg)


    Figure 6-17


    The file options for text entry


    The *text handling* checkboxes control certain special data entry considerations.
    Enable *Use smart quotes* to always enter apostrophes and double-quotation marks
    in fields as curly quotes. The *Use Asian language line-breaking* option controls
    how line endings are handled when a word reaches the edge of a text field when
    using Asian languages, and *Use Roman language line-breaking* does the same when
    using Roman languages.


    The *data entry* section handles formatting of various standard data like currency
    symbols, dates, and times. When FileMaker creates a new database, the file is
    encoded with regional settings from the operating system of the local computer.
    On macOS, these can be found in the *System Preferences ➤ Language & Region ➤
    Advanced* panel. Once the file is created, these settings can’t be modified. However,
    the *File Options* dialog allows selection of what happens when there is a difference
    between the user’s operating system and the settings encoded in the database:


    *   *Always Use Current System Settings* – Select to use the current system settings
    of the computer instead of those saved in the database file.


    *   *Always Use File’s Saved Settings* – Select to use the settings saved in the
    database file.


    *   *Ask Whenever Settings Are Different* – Select to ask the user at launch time
    which settings to use.


    ### File Options: Script Triggers


    The *Script Triggers* tab is used to configure database to automatically trigger
    scripts in response to interface events pertaining to the file (Chapter [27](#429700_2_En_27_Chapter.xhtml)).


    ## Designing and Maintaining Healthy Files


    FileMaker automatically saves changes made in a file so there is no need or ability
    to explicitly perform a save function. Users can modify records, and developers
    can modify the structural elements with confidence that the work will be written
    to disk. However, things *can* go wrong, and it’s important to know how to avoid,
    identify, and remedy problems in order to maintain healthy files. Before starting
    to design a custom database, take a moment to review some of the problems that
    can occur and how to help ensure they don’t end in tragedy.


    ### Avoiding Design and Training Deficiencies


    Most database accidents are the result of some form of user confusion caused by
    a combination of lack of training, poor interface design, or careless scripting.
    A few specific problems involve users overwriting existing records, forgetting
    to commit a record, deleting records carelessly, or misidentifying a found set.'
  trans: '

    ### 文件选项：打开


    “打开”标签页（如图 6-14 所示）的设置用于控制数据库首次打开时的行为。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig14_HTML.jpg](img/429700_2_En_6_Fig14_HTML.jpg)


    图 6-14：控制打开行为的文件选项


    `允许打开此文件的最低版本`文本字段可让你限制文件仅允许在指定的 FileMaker 版本或更高版本中打开。虽然从 12.0 到 19.1 的所有版本都共享相同的文件格式，但使用了较新版本功能的数据库不应在旧版本中打开，除非专门设计了基于版本的备用功能。如果数据库使用了较新版本的功能，最好将此设置保留为最新版本。在该字段中输入`主版本号`和`次版本号`（例如，输入`19.0`而非`19`）。


    以下四个复选框用于控制登录和默认界面功能：


    - `使用以下账号登录` – 指定文件打开时的自动登录凭据。当数据库需要严格安全性时，**不要**使用此选项（第 30 章）。

    - `允许存储凭据进行身份验证` – 控制用户是否可以选择在本地设备上保存凭据，以便将来自动登录。在共享计算机环境或需要严格安全性的数据库中，**不要**使用此选项。

    - `切换到布局` – 指定打开时的默认布局。此布局更改会在任何`脚本触发器`（第 27 章）之前执行。

    - `隐藏所有工具栏` – 勾选后启动时将隐藏工具栏。


    ### 文件选项：图标


    “图标”标签页（如图 6-15 所示）允许自定义`启动中心`中代表数据库的图标，使其更易于直观地找到所需文件。默认图标是 FileMaker 19 的文档图标。你可以从
    Claris 提供的内置图标列表中选择替代图标，或通过单击“自定义”指定自定义的 PNG 或 JPEG 文件。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig15_HTML.jpg](img/429700_2_En_6_Fig15_HTML.jpg)


    图 6-15：分配自定义图标的文件选项


    ### 文件选项：拼写


    “拼写”标签页（如图 6-16 所示）控制自动拼写检查设置。`用特殊下划线标记可疑单词`复选框会在任何可能拼写错误的单词下方显示红色虚线，前提是当前获得焦点的字段或对象未在`检查器`中明确禁用此功能（第
    19 章，“检查数据设置”）。当勾选`可疑拼写时发出蜂鸣声`后，只要用户键入词典认为拼写错误的单词，就会发出提示音。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig16_HTML.jpg](img/429700_2_En_6_Fig16_HTML.jpg)


    图 6-16：拼写检查的文件选项


    ### 文件选项：文本


    “文本”标签页（如图 6-17 所示）控制一些文本输入选项。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig17_HTML.jpg](img/429700_2_En_6_Fig17_HTML.jpg)


    图 6-17：文本输入的文件选项


    `文本处理`复选框控制某些特殊的数据输入事项。启用`使用智能引号`可始终在字段中以英文弯引号形式输入撇号和双引号。`使用亚洲语言换行`选项控制当单词到达文本字段边缘时，在处理亚洲语言时的换行方式；而`使用罗马语言换行`在处理罗马语言时执行相同功能。


    `数据输入`部分处理货币符号、日期和时间等各种标准数据的格式。当 FileMaker 创建新数据库时，文件会使用本地计算机操作系统的区域设置进行编码。在 macOS
    上，可以在`系统偏好设置 ➤ 语言与地区 ➤ 高级`面板中找到这些设置。文件创建后，这些设置便无法修改。但是，“文件选项”对话框允许选择当用户的操作系统与数据库编码的设置之间存在差异时如何处理：


    - `始终使用当前系统设置` – 选择此选项将使用计算机的当前系统设置，而非数据库文件中保存的设置。

    - `始终使用文件保存的设置` – 选择此选项将使用数据库文件中保存的设置。

    - `设置不同时询问` – 选择此选项将在启动时询问用户使用哪种设置。


    ### 文件选项：脚本触发器


    “脚本触发器”标签页用于配置数据库，以自动触发脚本来响应与文件相关的界面事件（第 27 章）。


    ## 设计与维护健康的文件


    FileMaker 会自动保存文件中所做的更改，因此无需也无法显式执行保存功能。用户可以修改记录，开发者可以修改结构元素，并且可以放心这些工作都会被写入磁盘。然而，事情**可能**会出错，了解如何避免、识别和修复问题以维护文件的健康非常重要。在开始设计自定义数据库之前，请花点时间回顾一些可能发生的问题，以及如何帮助确保它们不会以悲剧收场。


    ### 避免设计与培训缺陷


    大多数数据库事故都是某种形式的用户困惑造成的，其原因包括培训不足、界面设计不佳或脚本编写粗心。一些具体问题涉及用户覆盖现有记录、忘记提交记录、随意删除记录或错误识别找到的记录集。

    '
- fmt: '### 覆盖现有记录


    覆盖现有内容是一个比你想象中更常见的问题，其发生原因多种多样，通常是由于经验不足和错误假设，加之糟糕的界面设计与不充分培训的叠加效应。


    缺乏一般计算机经验或特定数据库知识的人，常常没有意识到在输入数据之前需要先创建一个新记录。一些人假设窗口就像用于录入但将数据发送到别处保存的 Web 表单，因此他们可以直接覆盖并再次发送。无论假设是什么，避免此问题的最佳方法是提供明确的培训，确保每个人都理解：在为新的实体输入信息之前，他们需要实际创建一个新记录。


    覆盖的另一个原因是用户未能复制记录，便开始编辑原始记录，误以为它是新的副本记录。问题在于，默认的“复制”功能在原始记录和副本记录之间不会产生任何视觉差异。工具栏中的记录计数会增加，如果布局中包含一个保存唯一记录标识符的字段，该字段会显示不同的值。除此之外，副本记录看起来与原始记录完全一样。如果用户的点击或输入操作并未实际生成副本，他们可能会意外地开始在原始记录上输入。培训可以帮助他们知道在哪里查看以视觉确认新记录已创建。然而，更好的避免方法是使用自定义菜单（第
    [23](#429700_2_En_23_Chapter.xhtml) 章），用你自己的自定义脚本（第 [24](#429700_2_En_24_Chapter.xhtml)
    章）替换默认功能。该脚本可以创建一个副本记录，然后在关键字段的值后添加单词“复制”（`Copy`），清空在创建副本时应修改的字段，并弹出一个对话框确认副本已准备好进行录入。用户会习惯于看到这些明显的指示，当这些指示缺失时，他们更可能意识到自己未能成功创建副本。


    *类似地，一个未被注意的失败* 进入“查找”模式，当用户将其误认为是临时的查找请求时，可能导致无意中编辑记录。在“查找”模式下，菜单和工具栏的变化很容易被忽略，而查找请求看起来与普通记录非常相似。较新版本的
    FileMaker 有有用的指示器，比如在“查找”模式下每个字段中出现的小放大镜图标。向布局添加你自己的视觉指示器，可以进一步强调模式切换的成功。在“查找”模式下隐藏或更改格式的布局元素会有所帮助（第
    [17](#429700_2_En_17_Chapter.xhtml)–[22](#429700_2_En_22_Chapter.xhtml) 章）。


    相反的情况是，用户未能从“查找”模式切换回“浏览”模式，然后开始在查找请求中输入，误以为它们是新的空记录。FileMaker 有一个“断路器”对话框，在创建多个查找请求后会出现，提醒用户他们正处于“查找”模式。前面提到的自定义视觉指示器也可以帮助避免此问题。


    一个优秀的开发者必须能够转换心智焦点，从新用户的角度测试界面设计。为了在潜在混乱点酿成灾难之前预先识别它们，请务必不要做有偏见的假设，即认为用户拥有你对你自己创建的数据库的知识。


    ### 忘记提交记录


    在数据输入任务完成后，必须*提交*已编辑的记录，以便其被保存并供他人访问。当用户导航到另一条记录或关闭文件时，这会自动发生。他们也可以手动提交记录（第 [4](#429700_2_En_4_Chapter.xhtml)
    章，“关闭记录”）。如果他们在完成数据输入任务后让记录保持打开状态，会给其他等待查看、访问或编辑数据的用户带来烦恼。如果用户尝试在自己电脑的第二个窗口中访问打开的记录，还可能引发冲突。让记录保留未提交的更改甚至可能是*危险的*，并可能导致文件损坏（本章后面会讨论）。鼓励用户在做出更改后始终及时提交记录，并考虑使用条件布局元素来视觉指示记录何时拥有活动焦点。例如，可以在布局上放置一个仅当记录活动时才显示的“提交”按钮，并且记录标题文本对象可以改变颜色（第
    [21](#429700_2_En_21_Chapter.xhtml) 章）。


    ### 粗心删除记录


    意外删除记录可能是由于新用户缺乏经验，或是经验丰富用户的过度自信。删除确认对话框包含一个通用且极简的消息，假设用户了解上下文。因此，它无法充分指示即将删除的是哪些具体记录，当用户失去上下文意识或注意力不集中时，这可能是一个大问题。在列表视图（`List
    view`）中，当用户错误地认为选中的记录是他们打算删除的那条时，这种困惑尤为突出。此外，在使用多个窗口时，用户可能认为他们在删除一个窗口中的记录，而实际上却在另一个窗口中进行删除。具有讽刺意味的是，这个问题更常影响有经验的用户。虽然新用户可能会紧张地阅读对话框消息并谨慎操作，但有经验的用户可能会变得马虎，以不当的过度自信点击对话框。记录删除是“撤销”命令无法撤消的操作，因此检索已删除记录的唯一方法是将其从数据库的备份副本中重新导入。因此，考虑几个选项来帮助避免此问题。


    自定义菜单可以覆盖删除功能，并呈现一个自定义的、信息丰富的警告对话框，通过包含关键标识字段来清晰说明*将要删除哪条记录*（第 [23](#429700_2_En_23_Chapter.xhtml)
    章，“覆盖菜单项功能”）。添加第二个确认对话框也有助于避免意外，尤其是在删除大量已找到集合（`found set`）时。这稍微有些不方便，但可以避免错误删除带来的更大不便。或者，自定义对话框可以要求用户输入一个单词或短语，在脚本继续执行删除请求之前提供明确的意图确认。此外，考虑对一次可以删除的记录数量设置严格限制，以避免因错误操作而清空整个表的内容——可以通过自定义脚本拒绝请求，并在信息对话框中显示记录计数。最后，安全设置（第
    [30](#429700_2_En_30_Chapter.xhtml) 章）可以完全限制未经授权删除记录的用户对删除命令的访问权限。


    ### 误判已找到的集合


    当用户未能正确识别已找到的集合（`found set`）时，他们可能会意外执行一些影响范围超出预期的操作。如果用户认为已找到的集合包含 10 条记录，而实际上它包含
    10,000 条，那么执行诸如*删除所有记录*、*替换字段内容*或*查找/替换*等功能可能会造成灾难。确保用户理解什么是已找到的集合，以及在使用这些功能之前如何确认它。使用自定义菜单创建更具信息性的对话框（第
    [23](#429700_2_En_23_Chapter.xhtml) 章），并通过安全设置（第 [30](#429700_2_En_30_Chapter.xhtml)
    章）完全禁用不需要这些功能的用户的访问。在创建自动运行的脚本时要格外小心，因为设计不良的脚本可以比人类更快地执行这些功能，并且造成的损害可能不会立竿见影。'
  raw: '#### Overwriting an Existing Record


    Overwriting existing content is a more common problem than you might think and
    occurs for a variety of different reasons, usually inexperience and mistaken assumptions
    made worse by a combination of poor interface design and inadequate training.


    People lacking general computer experience or specific database knowledge often
    do not realize that they need to create a new record prior to typing data. Some
    assume that the window is like a web form that is used for entry but sends the
    data elsewhere for saving so they can type over and send again. Whatever the assumption,
    the best way to avoid this problem is with explicit training to ensure that everyone
    understands that they need to actually create a new record before typing information
    for a new entity.


    Another cause of overwriting is when a user fails to duplicate a record and begin
    editing the original thinking it is a new duplicate record. The problem here is
    that the default *Duplicate* function doesn’t produce any visual differences between
    the original and the duplicate record. The record count in the toolbar will increase,
    and if a field containing a unique record identifier is on the layout, it would
    contain a different value. Otherwise, the duplicate record will appear exactly
    the same as the original. If the user types or clicks in a way that doesn’t actually
    produce a duplicate, they may accidentally begin typing over the original. Training
    can help them know where to look to visually confirm a new record has been created.
    However, a better way to avoid this is to use a custom menu (Chapter [23](#429700_2_En_23_Chapter.xhtml))
    that replaces the default function with your own custom script (Chapter [24](#429700_2_En_24_Chapter.xhtml)).
    The script can create a duplicate record and then add the word “Copy” after the
    value in a key field, clear out fields that should be modified when creating a
    duplicate, and present a dialog to confirm the duplicate is ready for entry. Users
    will become accustomed to seeing these overt indicators and, in their absence,
    be more likely to realize that they failed to actually create a duplicate.


    *Similarly, an unnoticed failure* to enter Find mode can result in inadvertent
    editing of a record when the user mistakes it for a temporary find request. The
    changes to the menu and toolbar in Find mode can easily be overlooked, and a find
    request appears very similar to a regular record. Newer versions of FileMaker
    have helpful indicators like a little magnifying glass icon that appears in every
    field in Find mode. Adding your own visual indicators to a layout can help further
    emphasize a successful switch in modes. Layout elements that hide or change formatting
    in Find mode can help (Chapters [17](#429700_2_En_17_Chapter.xhtml)–[22](#429700_2_En_22_Chapter.xhtml)).


    The reverse happens when a user fails to switch from Find back to Browse and then
    begins typing into find requests assuming they are new empty records. FileMaker
    has a “circuit breaker” dialog that appears after several find requests are created,
    reminding the user they are in Find mode. The custom visual indicators described
    earlier can also help avoid this problem.


    A good developer must be able to switch mental focus to test an interface design
    from the perspective of a new user. It is important not to make biased assumptions
    that users possess your knowledge of a database you create in order to preemptively
    identify points of confusion before they cause a disaster.


    #### Forgetting to Commit a Record


    At the completion of a data entry task, an edited record must be *committed* for
    it to be saved and released for access by others. This happens automatically when
    a user navigates to another record or closes a file. They can also manually commit
    a record (Chapter [4](#429700_2_En_4_Chapter.xhtml), “Closing a Record”). If they
    leave a record open after completing the data entry task, it creates an annoyance
    for other users waiting to see, access, or edit the data. It can also cause conflicts
    for themselves if they try to access the open record in a second window on their
    own computer. Leaving records with uncommitted changes can even be *dangerous*
    and cause file damage (discussed later in this chapter). Encourage users to always
    commit records promptly after making changes and consider using conditional layout
    elements to visually indicate when a record has active focus. For example, a *Commit*
    button can be placed on a layout that only appears when a record is active, and
    a record heading text object can change color (Chapter [21](#429700_2_En_21_Chapter.xhtml)).


    #### Deleting Records Carelessly


    Accidental record deletion can be the result of either the inexperience of new
    users or the overconfidence of experienced users. The delete confirmation dialog
    contains a generically minimalistic message that assumes the user is aware of
    the context. As a result, it does not adequately indicate which specific record(s)
    are about to be deleted, and this can be a major problem when the user has lost
    track of context or isn’t paying attention. This is especially confusing on a
    List view when a user mistakenly assumes a different record is selected than the
    one they intend to delete. Also, when using multiple windows, they may think they
    are deleting a record in one window when they are really in another. Ironically,
    this problem can more often affect experienced users. While a new user may nervously
    read a dialog message and proceed with caution, an experienced user can become
    sloppy and click through a dialog with an unwarranted overconfidence. Record deletion
    is not something the *Undo* command can reverse so the only way to retrieve deleted
    records is to re-import them from a backup copy of the database. So, consider
    a few options to help avoid this problem.


    A custom menu can override the delete functions and present a customized, informative
    warning dialog that clearly articulates *which record* is going to be deleted
    by including key identifying fields (Chapter [23](#429700_2_En_23_Chapter.xhtml),
    “Overriding a Menu Item Function”). Adding a second confirmation dialog can also
    help avoid accidents, especially when deleting a large found set. It is a little
    more inconvenient but can avoid the greater inconvenience of erroneous deletions.
    Alternatively, a custom dialog can require a user to type a word or phrase, providing
    an explicit confirmation of intent before a script continues with the deletion
    request. Also, consider placing strict limits on how many records can be deleted
    at once to avoid mistakes that wipe out an entire table’s contents by having a
    custom script deny the request and present the record count in an informative
    dialog. Finally, security settings (Chapter [30](#429700_2_En_30_Chapter.xhtml))
    can completely restrict access to delete commands for users who aren’t authorized
    to delete records.


    #### Misidentifying a Found Set


    When a user does not identify a found set, they may accidentally perform several
    functions that affect more records than they intend. If a user thinks the found
    set contains 10 records when it really contains 10,000, performing functions like
    *Delete All Records*, *Replace Field Contents,* or *Find/Replace* can create a
    disaster. Make sure that users understand what a found set is and how to confirm
    it prior to using these functions. Create more informative dialogs with custom
    menus (Chapter [23](#429700_2_En_23_Chapter.xhtml)) and completely disable these
    features for users who don’t require them with security settings (Chapter [30](#429700_2_En_30_Chapter.xhtml)).
    Take extra care when creating scripts that run automatically since a poorly designed
    script can perform these same functions with even greater rapidity than humans,
    and the damage may not be immediately apparent.'
  trans: '

    ### 覆盖现有记录


    覆盖现有内容是一个比你想象中更常见的问题，其发生原因多种多样，通常是由于经验不足和错误假设，加之糟糕的界面设计与不充分培训的叠加效应。


    缺乏一般计算机经验或特定数据库知识的人，常常没有意识到在输入数据之前需要先创建一个新记录。一些人假设窗口就像用于录入但将数据发送到别处保存的 Web 表单，因此他们可以直接覆盖并再次发送。无论假设是什么，避免此问题的最佳方法是提供明确的培训，确保每个人都理解：在为新的实体输入信息之前，他们需要实际创建一个新记录。


    覆盖的另一个原因是用户未能复制记录，便开始编辑原始记录，误以为它是新的副本记录。问题在于，默认的“复制”功能在原始记录和副本记录之间不会产生任何视觉差异。工具栏中的记录计数会增加，如果布局中包含一个保存唯一记录标识符的字段，该字段会显示不同的值。除此之外，副本记录看起来与原始记录完全一样。如果用户的点击或输入操作并未实际生成副本，他们可能会意外地开始在原始记录上输入。培训可以帮助他们知道在哪里查看以视觉确认新记录已创建。然而，更好的避免方法是使用自定义菜单（第
    23 章），用你自己的自定义脚本（第 24 章）替换默认功能。该脚本可以创建一个副本记录，然后在关键字段的值后添加单词“复制”（`Copy`），清空在创建副本时应修改的字段，并弹出一个对话框确认副本已准备好进行录入。用户会习惯于看到这些明显的指示，当这些指示缺失时，他们更可能意识到自己未能成功创建副本。


    *类似地，一个未被注意的失败* 进入“查找”模式，当用户将其误认为是临时的查找请求时，可能导致无意中编辑记录。在“查找”模式下，菜单和工具栏的变化很容易被忽略，而查找请求看起来与普通记录非常相似。较新版本的
    FileMaker 有有用的指示器，比如在“查找”模式下每个字段中出现的小放大镜图标。向布局添加你自己的视觉指示器，可以进一步强调模式切换的成功。在“查找”模式下隐藏或更改格式的布局元素会有所帮助（第
    17–22 章）。


    相反的情况是，用户未能从“查找”模式切换回“浏览”模式，然后开始在查找请求中输入，误以为它们是新的空记录。FileMaker 有一个“断路器”对话框，在创建多个查找请求后会出现，提醒用户他们正处于“查找”模式。前面提到的自定义视觉指示器也可以帮助避免此问题。


    一个优秀的开发者必须能够转换心智焦点，从新用户的角度测试界面设计。为了在潜在混乱点酿成灾难之前预先识别它们，请务必不要做有偏见的假设，即认为用户拥有你对你自己创建的数据库的知识。


    ### 忘记提交记录


    在数据输入任务完成后，必须*提交*已编辑的记录，以便其被保存并供他人访问。当用户导航到另一条记录或关闭文件时，这会自动发生。他们也可以手动提交记录（第 4
    章，“关闭记录”）。如果他们在完成数据输入任务后让记录保持打开状态，会给其他等待查看、访问或编辑数据的用户带来烦恼。如果用户尝试在自己电脑的第二个窗口中访问打开的记录，还可能引发冲突。让记录保留未提交的更改甚至可能是*危险的*，并可能导致文件损坏（本章后面会讨论）。鼓励用户在做出更改后始终及时提交记录，并考虑使用条件布局元素来视觉指示记录何时拥有活动焦点。例如，可以在布局上放置一个仅当记录活动时才显示的“提交”按钮，并且记录标题文本对象可以改变颜色（第
    21 章）。


    ### 粗心删除记录


    意外删除记录可能是由于新用户缺乏经验，或是经验丰富用户的过度自信。删除确认对话框包含一个通用且极简的消息，假设用户了解上下文。因此，它无法充分指示即将删除的是哪些具体记录，当用户失去上下文意识或注意力不集中时，这可能是一个大问题。在列表视图（`List
    view`）中，当用户错误地认为选中的记录是他们打算删除的那条时，这种困惑尤为突出。此外，在使用多个窗口时，用户可能认为他们在删除一个窗口中的记录，而实际上却在另一个窗口中进行删除。具有讽刺意味的是，这个问题更常影响有经验的用户。虽然新用户可能会紧张地阅读对话框消息并谨慎操作，但有经验的用户可能会变得马虎，以不当的过度自信点击对话框。记录删除是“撤销”命令无法撤消的操作，因此检索已删除记录的唯一方法是将其从数据库的备份副本中重新导入。因此，考虑几个选项来帮助避免此问题。


    自定义菜单可以覆盖删除功能，并呈现一个自定义的、信息丰富的警告对话框，通过包含关键标识字段来清晰说明*将要删除哪条记录*（第 23 章，“覆盖菜单项功能”）。添加第二个确认对话框也有助于避免意外，尤其是在删除大量已找到集合（`found
    set`）时。这稍微有些不方便，但可以避免错误删除带来的更大不便。或者，自定义对话框可以要求用户输入一个单词或短语，在脚本继续执行删除请求之前提供明确的意图确认。此外，考虑对一次可以删除的记录数量设置严格限制，以避免因错误操作而清空整个表的内容——可以通过自定义脚本拒绝请求，并在信息对话框中显示记录计数。最后，安全设置（第
    30 章）可以完全限制未经授权删除记录的用户对删除命令的访问权限。


    ### 误判已找到的集合


    当用户未能正确识别已找到的集合（`found set`）时，他们可能会意外执行一些影响范围超出预期的操作。如果用户认为已找到的集合包含 10 条记录，而实际上它包含
    10,000 条，那么执行诸如*删除所有记录*、*替换字段内容*或*查找/替换*等功能可能会造成灾难。确保用户理解什么是已找到的集合，以及在使用这些功能之前如何确认它。使用自定义菜单创建更具信息性的对话框（第
    23 章），并通过安全设置（第 30 章）完全禁用不需要这些功能的用户的访问。在创建自动运行的脚本时要格外小心，因为设计不良的脚本可以比人类更快地执行这些功能，并且造成的损害可能不会立竿见影。

    '
- fmt: '### Restraining File Size


    Everything added to a database will increase the size of the file. Creating new
    tables, fields, layouts, and scripts increases file size. Entering hundreds, thousands,
    or millions of records increases file size. Indexed fields with large amounts
    of text and container fields with large files inserted both increase file size.
    This is a natural process that doesn’t pose an immediate problem, especially since
    FileMaker limits databases to the amount of disk space available with a technical
    maximum of 8 terabytes. However, it is still a good idea to follow the adage “less
    is more” and design a database to be as efficient as possible both in its structure
    and content. Files with a large and convoluted structural design can be slower
    and confusing to developers and may be prone to other problems. There are two
    primary issues that can make a file larger than it needs to be: *inefficient design*
    and *fragmentation*.


    #### Designing Efficiently


    One way to maintain a slim file size and keep things operating efficiently is
    to design efficiently. Although there are numerous design approaches and these
    topics are not discussed until later chapters, the sooner you think about efficient
    design, the better.


    When *container fields* store images or files internally, the database size will
    increase by the size of the item stored. Obviously, this can make a huge impact
    on the file size when storing hundreds or thousands of large images. If the database
    is hosted on a server or used locally but doesn’t need to be a self-contained
    file, using *external container storage* (Chapter [10](#429700_2_En_10_Chapter.xhtml))
    is recommended and will greatly reduce the file size by storing files outside
    of the database file while rendering them as if they were internal so the user
    doesn’t even notice a difference.


    Another thing that rapidly increases the size of a file is field indexing, especially
    on lengthy notes fields. Indexing is important for certain functions and shouldn’t
    be avoided. However, to the extent possible, try to minimize field indexes (Chapter
    [8](#429700_2_En_8_Chapter.xhtml), “Field Options: Storage”).


    Another way to keep a database slim is using a more sophisticated structural and
    interface design to avoid redundancy in tables, layouts, and scripts. Design *open-ended,
    dynamic resources* that can be used more broadly and with variable features and
    functions. A commonly used formula or a group of similar formulas can be moved
    into a single custom function (Chapter [15](#429700_2_En_15_Chapter.xhtml)) to
    avoid repeating the same code. A table designed to store notes related to *Contact*
    records and a table storing notes related to a *Project* records could be combined.
    Layouts can be designed to provide global functionality, accessed from anywhere
    using a Card window attached to the main window (Chapter [25](#429700_2_En_25_Chapter.xhtml),
    “Managing Windows”). Scripts can be designed to accept parameters, flexibly process
    different information, and perform multiple variations on a single operational
    function.


    A graphically rich interface design can improve the user experience but can also
    increase the size of the file and the length of time it takes to load and draw
    layouts. So, try to find a balance between a visually stunning display and a practical,
    efficient design. Use FileMaker’s built-in layout objects instead of custom graphics
    where possible. When using custom icons, import them as SVG files into the file’s
    icon library (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Using an Icon Label”).
    Any custom graphics placed directly on the layout should be optimized for screen
    use, using lower resolution especially if they are not on print layouts.


    It is worth mentioning that a monolithic hub-and-spoke relationship structure
    should be avoided in favor of a table occurrence group design (Chapter [9](#429700_2_En_9_Chapter.xhtml),
    “Using Table Occurrences”). Although a convoluted relationship setup primarily
    causes performance issues, it can also result in developer paralysis making better
    design in formulas, layouts, and scripts more difficult. Remember, an inefficient
    design in some areas might seem innocuous, but it can have negative repercussions
    elsewhere. Always strive for the best structural and interface design possible.


    Finally, although it creates a more complex overall structure, spreading tables
    across multiple files can help reduce each file’s size. There are various ways
    of doing this by mixing and matching different methods, briefly described in Chapter
    [1](#429700_2_En_1_Chapter.xhtml). For example, a *data separation model* can
    be used where one or more files provide a small footprint front-end interface
    that interacts with table content stored in one or more separate dedicated data
    files acting like a traditional back-end source. This allows record content to
    be distributed across one or more smaller files while still maintaining a single,
    unified interface.


    #### Avoiding Fragmentation


    As records are created and deleted through the course of normal data entry, empty
    space can accumulate within the file. This can also happen as developers add and
    remove resources. Over time, this artificially inflates the file’s size and may
    impact performance and stability. Saving the file as a compacted copy (described
    later in this chapter) will safely re-create the file, fitting as much data into
    each block as possible to reclaim unused space by removing the bloat of empty
    “ghost” blocks.


    ### Avoiding File Damage


    Any digital file can become damaged. Since databases are typically accessed by
    many users simultaneously across a network and are continually reading from and
    writing to disk, they can be more vulnerable and at greater risk of data loss.
    Developers should be aware of what can cause damage, how to avoid it, ways to
    detect it, and the correct approach to repair it. Damage can range from a minor
    problem that initially goes unnoticed to a catastrophic inability to open the
    file.


    There are many symptoms that may appear like a damaged file until other causes
    are ruled out. A field displaying a question mark instead of data can be evidence
    of corruption when it isn’t a calculation returning the wrong type of data or
    a field width on a layout being too small to fit content. Records missing or appearing
    blank may indicate corruption. However, don’t panic until confirming it isn’t
    a mistaken found set, a layout formatting issue, or the result of accidental record
    deletion. Also, incorrect search results may indicate index corruption when it
    can’t be remedied by adjusting the settings or recreating indices. Inadequate
    script design, inexperienced users, broken relationships, and networking issues
    can all create situations that can be mistaken for corruption.


    Other symptoms clearly indicate damage. A database performing a consistency check
    when opened indicates the file wasn’t closed properly and could have damage. If
    this happens randomly, without a crash event or force quit, it could indicate
    lingering damage. The FileMaker application randomly crashing when working in
    the database may be an operating system or networking issue, but it can also indicate
    corruption in the database. Finally, sometimes, a dialog will simply inform that
    the file is damaged, can’t be opened, or should be recovered.


    The best ways to avoid file damage is to share properly across a network, make
    sure that files are closed properly, and maintain hardware and software.'
