- fmt: "### Creating with FileMaker Pro\n\nAt the forefront of the product line is\
    \ the flagship desktop application and the primary focus of this book, `FileMaker\
    \ Pro`. This application is the modern incarnation of the legacy product, providing\
    \ a multipurpose interface that can be used to `create`, `share`, and `access`\
    \ database files on macOS and Windows computers. It is the `only` product that\
    \ includes all the structural development tools required to define data models,\
    \ design interface layout, and assemble scripts. It includes both front end, back\
    \ end, and middleware in a single seamless low-code application programming interface.\n\
    \nThe software provides front-end access to data through a familiar desktop document\
    \ format that displays interface layouts (Chapter [3](#429700_2_En_3_Chapter.xhtml)).\
    \ A graphical schema editor makes it easy to define tables, fields, and relationships\
    \ (Chapters [7](#429700_2_En_7_Chapter.xhtml)–[9](#429700_2_En_9_Chapter.xhtml)).\
    \ A layout editor allows rapid development of rich interfaces that render and\
    \ integrate table content and interface objects (Chapters [17](#429700_2_En_17_Chapter.xhtml)–[22](#429700_2_En_22_Chapter.xhtml)).\
    \ A script editor skillfully balances object-driven construction with formula\
    \ code, making it easy to create reusable sequences of automated events (Chapters\
    \ [24](#429700_2_En_24_Chapter.xhtml)–[27](#429700_2_En_27_Chapter.xhtml)). Credential\
    \ management makes it simple to create secure accounts that limit user access\
    \ and activity within the file using various types of internal or external authentication\
    \ (Chapter [30](#429700_2_En_30_Chapter.xhtml)).\n\nMany advanced tools provide\
    \ even more powerful control. Build a library of custom functions that can be\
    \ reused anywhere in the file (Chapter [15](#429700_2_En_15_Chapter.xhtml)). Override\
    \ the entire menu bar with custom menus to take complete control of the user experience\
    \ (Chapter [23](#429700_2_En_23_Chapter.xhtml)). A script debugger helps identify\
    \ problems and evaluate performance (Chapter [26](#429700_2_En_26_Chapter.xhtml)).\
    \ Save an entire database as XML, generate design reports with ease, and encrypt\
    \ databases with AES 256-bit encryption to protect networked databases (Chapter\
    \ [31](#429700_2_En_31_Chapter.xhtml)).\n\nData can be shared and integrated in\
    \ a variety of ways. Users and scripts can easily import and export data between\
    \ databases and text-based data formats (Chapter [5](#429700_2_En_5_Chapter.xhtml)).\
    \ Network sharing allows workgroups to simultaneously access the same database\
    \ in real time (Chapter [29](#429700_2_En_29_Chapter.xhtml)). Numerous integration\
    \ options are available to connect to external systems using AppleScript (macOS),\
    \ Claris Connect, Dynamic Data Exchange (Windows), FileMaker API, JDBC, ODBC,\
    \ SQL, and more.\n\n> **Tip**  \n> Enable `Use advanced tools` under the `General`\
    \ tab of application Preferences (Chapter [2](#429700_2_En_2_Chapter.xhtml)) to\
    \ access all advanced features.\n\n### Sharing with FileMaker Server and Cloud\n\
    \nTwo product offerings are used exclusively to host databases on a network for\
    \ team sharing: `FileMaker Server` and `FileMaker Cloud`.\n\n`FileMaker Server`\
    \ is a database-hosting software package offering scalable, secure, and reliable\
    \ round-the-clock access to databases for authorized users. Hosted files can be\
    \ simultaneously accessed by multiple users of FileMaker Pro, FileMaker Go, and\
    \ FileMaker WebDirect or through other systems using hosted databases as a back-end\
    \ data source. The server manages event scheduling for running database backups,\
    \ system level scripts (shell script or batch file), and FileMaker scripts in\
    \ a hosted database. Individual database scripts can be configured to run from\
    \ the server rather than on a user’s computer to offload tasks and save time.\
    \ Administrators can access event and error logs to troubleshoot problems or view\
    \ performance metrics to help optimize database performance. The server uses progressive\
    \ downloading technology to begin streaming media content for immediate display\
    \ without hesitation.\n\n`FileMaker Cloud` is a Claris-managed cloud-hosting version\
    \ of FileMaker Server with similar features plus full-time monitoring and support\
    \ and the added ease of use for allowing remote access.\n\n> **Note**  \n> Although\
    \ this book is focused on using and creating databases, Chapter [29](#429700_2_En_29_Chapter.xhtml)\
    \ introduces network sharing.\n\n### Accessing with FileMaker Go and WebDirect\n\
    \nTwo offerings allow use or access to databases developed with the desktop application:\
    \ `FileMaker Go` and `FileMaker WebDirect`.\n\n`FileMaker Go` is an iOS-only app\
    \ available free of charge from Apple’s App Store that allows iPhone and iPad\
    \ users to access databases when away from their desktop computer. Users can open\
    \ a database stored locally on their iOS devices or access one remotely from a\
    \ `FileMaker Server` or `FileMaker Cloud` server over Wi-Fi or cellular networks.\
    \ Optionally, databases built for the desktop can be designed with custom scripts\
    \ to detect a user’s mobile device and switch to layouts designed specifically\
    \ for smaller screens and touch navigation. Calculations and scripts can take\
    \ advantage of iOS technologies including media capture through the camera, signature\
    \ capture through the touch screen, barcode scanning, touch/face identification,\
    \ and more. A database can access information about the device’s battery, location,\
    \ attitude, air pressure, acceleration, magnetic heading, steps, and more.\n\n\
    `FileMaker WebDirect` is the easiest way to share a database on the web. With\
    \ a few settings, any database can allow access through a web browser `without`\
    \ using coding tools like PHP, HTML5, CSS, or JavaScript. All the web programming\
    \ required to present the database in a web front end is handled automatically\
    \ by `FileMaker Server` or `Cloud`. Layouts are automatically rendered in the\
    \ browser, and, except for certain incompatible script steps and the ability to\
    \ work in multiple windows, most functionality is identical to that on a desktop\
    \ or iOS device.\n\n## Summary\n\nThis chapter provided a brief introduction and\
    \ historical overview of FileMaker, with a summary of the present-day product\
    \ line. Next, we begin our exploration of the desktop application.\n\n# 2. Exploring\
    \ the Application\n\n`FileMaker Pro` is a desktop application for macOS and Windows\
    \ with a dual-purpose interface that integrates features for `using` and `developing`\
    \ databases. While other products in the line can `share` or `use` database, the\
    \ desktop application is required to first create those databases. This chapter\
    \ introduces the application, covering these topics:\n\n- Introducing the Launch\
    \ Center window\n- Configuring application preferences\n- Exploring menus (Browse\
    \ mode)\n- Accessing contextual menus\n\n## Introducing the Launch Center Window\n\
    \nThe `Launch Center` is a multi-tabbed window used to create new databases, access\
    \ existing databases, and link to educational resources. The window, shown in\
    \ Figure [2-1](#429700_2_En_2_Chapter.xhtml#Fig1), will automatically open when\
    \ you launch the application. Later, it can be accessed by selecting any of the\
    \ following items under the `File` menu, each corresponding to a tab section of\
    \ the window:\n\n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig1_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1\n\nThe FileMaker Pro Launch Center\n\n- `Create New` – Opens the\
    \ `Create` tab to create a database, convert files into a database, and access\
    \ educational resources\n- `My Apps ➤ Show My Apps` – Opens the `My Apps` tab\
    \ to access databases from a FileMaker Cloud server (subscription required)\n\
    - `Favorites ➤ Show Favorites` – Opens the `Favorites` tab to access databases\
    \ saved as favorites\n- `Recent ➤ Show Recent` – Opens the `Recent` tab to access\
    \ databases recently open\n\n> **Tip**  \n> For now, ignore these options as we\
    \ continue exploring application features. Learn more about creating files in\
    \ Chapter [6](#429700_2_En_6_Chapter.xhtml)."
  raw: '### Creating with FileMaker Pro


    At the forefront of the product line is the flagship desktop application and the
    primary focus of this book, *FileMaker Pro* . This application is the modern incarnation
    of the legacy product, providing a multipurpose interface that can be used to
    *create*, *share,* and *access* database files on macOS and Windows computers.
    It is the *only* product that includes all the structural development tools required
    to define data models, design interface layout, and assemble scripts. It includes
    both front end, back end, and middleware in a single seamless low-code application
    programming interface.


    The software provides front-end access to data through a familiar desktop document
    format that displays interface layouts (Chapter [3](#429700_2_En_3_Chapter.xhtml)).
    A graphical schema editor makes it easy to define tables, fields, and relationships
    (Chapters [7](#429700_2_En_7_Chapter.xhtml)–[9](#429700_2_En_9_Chapter.xhtml)).
    A layout editor allows rapid development of rich interfaces that render and integrate
    table content and interface objects (Chapters [17](#429700_2_En_17_Chapter.xhtml)–[22](#429700_2_En_22_Chapter.xhtml)).
    A script editor skillfully balances object-driven construction with formula code,
    making it easy to create reusable sequences of automated events (Chapters [24](#429700_2_En_24_Chapter.xhtml)–[27](#429700_2_En_27_Chapter.xhtml)).
    Credential management makes it simple to create secure accounts that limit user
    access and activity within the file using various types of internal or external
    authentication (Chapter [30](#429700_2_En_30_Chapter.xhtml)).


    Many advanced tools provide even more powerful control. Build a library of custom
    functions that can be reused anywhere in the file (Chapter [15](#429700_2_En_15_Chapter.xhtml)).
    Override the entire menu bar with custom menus to take complete control of the
    user experience (Chapter [23](#429700_2_En_23_Chapter.xhtml)). A script debugger
    helps identify problems and evaluate performance (Chapter [26](#429700_2_En_26_Chapter.xhtml)).
    Save an entire database as XML, generate design reports with ease, and encrypt
    databases with AES 256-bit encryption to protect networked databases (Chapter
    [31](#429700_2_En_31_Chapter.xhtml)).


    Data can be shared and integrated in a variety of ways. Users and scripts can
    easily import and export data between databases and text-based data formats (Chapter
    [5](#429700_2_En_5_Chapter.xhtml)). Network sharing allows workgroups to simultaneously
    access the same database in real time (Chapter [29](#429700_2_En_29_Chapter.xhtml)).
    Numerous integration options are available to connect to external systems using
    AppleScript (macOS), Claris Connect, Dynamic Data Exchange (Windows), FileMaker
    API, JDBC, ODBC, SQL, and more.


    Tip


    Enable *Use advanced tools* under the *General* tab of application Preferences
    (Chapter [2](#429700_2_En_2_Chapter.xhtml)) to access all advanced features.


    ### Sharing with FileMaker Server and Cloud


    Two product offerings are used exclusively to host databases on a network for
    team sharing: *FileMaker Server* and *FileMaker Cloud*.


    *FileMaker Server* is a database-hosting software package offering scalable, secure,
    and reliable round-the-clock access to databases for authorized users. Hosted
    files can be simultaneously accessed by multiple users of FileMaker Pro, FileMaker
    Go, and FileMaker WebDirect or through other systems using hosted databases as
    a back-end data source. The server manages event scheduling for running database
    backups, system level scripts (shell script or batch file), and FileMaker scripts
    in a hosted database. Individual database scripts can be configured to run from
    the server rather than on a user’s computer to offload tasks and save time. Administrators
    can access event and error logs to troubleshoot problems or view performance metrics
    to help optimize database performance. The server uses progressive downloading
    technology to begin streaming media content for immediate display without hesitation.


    *FileMaker Cloud* is a Claris-managed cloud-hosting version of FileMaker Server
    with similar features plus full-time monitoring and support and the added ease
    of use for allowing remote access.


    Note


    Although this book is focused on using and creating databases, Chapter [29](#429700_2_En_29_Chapter.xhtml)
    introduces network sharing.


    ### Accessing with FileMaker Go and WebDirect


    Two offerings allow use or access to databases developed with the desktop application:
    *FileMaker Go* and *FileMaker WebDirect*.


    *FileMaker Go* is an iOS-only app available free of charge from Apple’s App Store
    that allows iPhone and iPad users to access databases when away from their desktop
    computer. Users can open a database stored locally on their iOS devices or access
    one remotely from a *FileMaker Server* or *FileMaker Cloud* server over Wi-Fi
    or cellular networks. Optionally, databases built for the desktop can be designed
    with custom scripts to detect a user’s mobile device and switch to layouts designed
    specifically for smaller screens and touch navigation. Calculations and scripts
    can take advantage of iOS technologies including media capture through the camera,
    signature capture through the touch screen, barcode scanning, touch/face identification,
    and more. A database can access information about the device’s battery, location,
    attitude, air pressure, acceleration, magnetic heading, steps, and more.


    *FileMaker WebDirect* is the easiest way to share a database on the web. With
    a few settings, any database can allow access through a web browser *without*
    using coding tools like PHP, HTML5, CSS, or JavaScript. All the web programming
    required to present the database in a web front end is handled automatically by
    *FileMaker Server* or *Cloud*. Layouts are automatically rendered in the browser,
    and, except for certain incompatible script steps and the ability to work in multiple
    windows, most functionality is identical to that on a desktop or iOS device.


    ## Summary


    This chapter provided a brief introduction and historical overview of FileMaker,
    with a summary of the present-day product line. Next, we begin our exploration
    of the desktop application.


    # 2. Exploring the Application


    *FileMaker Pro* is a desktop application for macOS and Windows with a dual-purpose
    interface that integrates features for *using* and *developing* databases. While
    other products in the line can *share* or *use* database, the desktop application
    is required to first create those databases. This chapter introduces the application,
    covering these topics:


    *   Introducing the Launch Center window


    *   Configuring application preferences


    *   Exploring menus (Browse mode)


    *   Accessing contextual menus


    ## Introducing the Launch Center Window


    The *Launch Center* is a multi-tabbed window used to create new databases, access
    existing databases, and link to educational resources. The window, shown in Figure
    [2-1](#429700_2_En_2_Chapter.xhtml#Fig1), will automatically open when you launch
    the application. Later, it can be accessed by selecting any of the following items
    under the *File* menu, each corresponding to a tab section of the window:


    ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig1_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The FileMaker Pro Launch Center


    *   *Create New –* Opens the *Create* tab to create a database, convert files
    into a database, and access educational resources


    *   *My Apps ➤* *Show My Apps* – Opens the *My Apps* tab to access databases from
    a FileMaker Cloud server (subscription required)


    *   *Favorites ➤ Show Favorites* – Opens the *Favorites* tab to access databases
    saved as favorites


    *   *Recent ➤ Show Recent* – Opens the *Recent* tab to access databases recently
    open


    Tip


    For now, ignore these options as we continue exploring application features. Learn
    more about creating files in Chapter [6](#429700_2_En_6_Chapter.xhtml).'
  trans: "\n### 使用 FileMaker Pro 创建数据\n\n产品线中的旗舰产品是桌面级应用程序，也是本书的重点，即 `FileMaker Pro`。该应用程序是传统产品的现代化身，它提供了一个多用途界面，可用于在\
    \ macOS 和 Windows 电脑上`创建`、`共享`和`访问`数据库文件。它是`唯一`包含定义数据模型、设计界面布局和编写脚本所需的所有结构开发工具的产品。它将前端、后端和中间件整合到一个无缝的低代码应用程序编程接口中。\n\
    \n该软件通过熟悉的桌面文档格式提供对数据的前端访问，该格式可显示界面布局（第 3 章）。图形化的模式编辑器使定义表、字段和关系变得容易（第 7 章 – 9\
    \ 章）。布局编辑器允许快速开发丰富的界面，以呈现和整合表内容及界面对象（第 17 章 – 22 章）。脚本编辑器巧妙地平衡了对象驱动构建和公式代码，使得创建可重用的自动化事件序列变得简单（第\
    \ 24 章 – 27 章）。凭据管理使其能够轻松创建安全账户，通过使用各种内部或外部身份验证方式来限制用户在文件内的访问和活动（第 30 章）。\n\n\
    许多高级工具提供了更强大的控制能力。构建一个可在文件中任意位置重用的自定义函数库（第 15 章）。用自定义菜单覆盖整个菜单栏，从而完全掌控用户体验（第 23\
    \ 章）。脚本调试器有助于识别问题并评估性能（第 26 章）。将整个数据库保存为 XML，轻松生成设计报告，并使用 AES 256 位加密对数据库进行加密，以保护网络数据库（第\
    \ 31 章）。\n\n数据可以通过多种方式进行共享和集成。用户和脚本可以在数据库和基于文本的数据格式之间轻松地导入和导出数据（第 5 章）。网络共享允许多个工作组成员实时同时访问同一个数据库（第\
    \ 29 章）。提供了多种集成选项，可通过 AppleScript (macOS)、Claris Connect、动态数据交换 (Windows)、FileMaker\
    \ API、JDBC、ODBC、SQL 等方式连接到外部系统。\n\n> **提示**  \n> 在应用程序偏好设置的`通用`选项卡下启用`使用高级工具`（第\
    \ 2 章），以访问所有高级功能。\n\n### 使用 FileMaker Server 与 Cloud 进行共享\n\n有两款专用产品用于在网络上托管数据库以供团队共享：`FileMaker\
    \ Server` 和 `FileMaker Cloud`。\n\n`FileMaker Server` 是一款数据库托管软件包，可为授权用户提供可扩展、安全且可靠的\
    \ 24/7 全天候数据库访问。托管文件可以被 FileMaker Pro、FileMaker Go 和 FileMaker WebDirect 的多个用户同时访问，或者通过使用托管数据库作为后端数据源的其他系统进行访问。该服务器管理用于运行数据库备份、系统级脚本（shell\
    \ 脚本或批处理文件）以及在托管数据库中运行 FileMaker 脚本的事件调度。可以配置单个数据库脚本在服务器上运行，而不是在用户计算机上运行，以卸载任务并节省时间。管理员可以访问事件和错误日志以排查问题，或查看性能指标以帮助优化数据库性能。该服务器使用渐进式下载技术来流式传输媒体内容，实现即时显示，无需等待。\n\
    \n`FileMaker Cloud` 是 Claris 管理的 FileMaker Server 云托管版本，具有类似的功能，外加全天候监控与支持，并且增加了远程访问的易用性。\n\
    \n> **注意**  \n> 尽管本书侧重于使用和创建数据库，但第 29 章将介绍网络共享。\n\n### 使用 FileMaker Go 与 WebDirect\
    \ 进行访问\n\n有两款产品允许使用或访问在桌面应用程序中开发的数据库：`FileMaker Go` 和 `FileMaker WebDirect`。\n\
    \n`FileMaker Go` 是一款仅限 iOS 系统的应用程序，可从 Apple App Store 免费获取，它允许 iPhone 和 iPad 用户在离开桌面电脑时访问数据库。用户可以打开存储在\
    \ iOS 设备本地的数据库，或者通过 Wi-Fi 或蜂窝网络从 `FileMaker Server` 或 `FileMaker Cloud` 服务器远程访问数据库。可选地，为桌面设计的数据库可以通过自定义脚本进行设计，以检测用户的移动设备并切换到专为较小屏幕和触摸导航设计的布局。计算和脚本可以利用\
    \ iOS 技术，包括通过相机进行媒体捕获、通过触摸屏进行签名采集、条形码扫描、触控/面容识别等。数据库可以访问关于设备电量、位置、姿态、气压、加速度、磁航向、步数等信息。\n\
    \n`FileMaker WebDirect` 是网络上共享数据库最简单的方法。只需进行一些设置，任何数据库都可以允许通过网页浏览器进行访问，而`无需`使用像\
    \ PHP、HTML5、CSS 或 JavaScript 这样的编码工具。在前端网页中呈现数据库所需的所有网页编程均由 `FileMaker Server`\
    \ 或 `Cloud` 自动处理。布局会自动在浏览器中渲染，并且除了一些不兼容的脚本步骤和无法在多个窗口中操作外，大多数功能与在桌面或 iOS 设备上相同。\n\
    \n## 摘要\n\n本章简要介绍了 FileMaker 的历史背景，并概述了其现产品线。接下来，我们将开始探索桌面应用程序。\n\n# 2. 探索应用程序\n\
    \n`FileMaker Pro` 是一款适用于 macOS 和 Windows 的桌面应用程序，具有双重用途的界面，集成了`使用`和`开发`数据库的功能。虽然产品线中的其他产品可以`共享`或`使用`数据库，但首先需要桌面应用程序来创建这些数据库。本章介绍该应用程序，涵盖以下主题：\n\
    \n- 介绍启动中心窗口\n- 配置应用程序偏好设置\n- 探索菜单（浏览模式）\n- 使用上下文菜单\n\n## 介绍启动中心窗口\n\n`启动中心`是一个多选项卡窗口，用于创建新数据库、访问现有数据库以及链接到教育资源。该窗口如图\
    \ 2-1 所示，将在您启动应用程序时自动打开。之后，可以通过选择`文件`菜单下的以下任意项来访问它，每个项都对应于窗口的一个选项卡部分：\n\n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig1_HTML.jpg](img/429700_2_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1\n\nFileMaker Pro 启动中心\n\n- `创建新文件` – 打开`创建`选项卡以创建数据库、将文件转换为数据库以及访问教育资源\n\
    - `我的 App ➤ 显示我的 App` – 打开`我的 App`选项卡以从 FileMaker Cloud 服务器访问数据库（需要订阅）\n- `收藏\
    \ ➤ 显示收藏` – 打开`收藏`选项卡以访问保存为收藏的数据库\n- `最近使用 ➤ 显示最近使用` – 打开`最近使用`选项卡以访问最近打开的数据库\n\
    \n> **提示**  \n> 在我们继续探索应用程序功能时，请暂时忽略这些选项。要了解有关创建文件的更多信息，请参见第 6 章。\n"
- fmt: '### General: User Interface Options


    These *user interface options* control aspects of the application interface. The
    `Allow drag-and-drop text selection` checkbox enables dragging between fields,
    between layouts, and between fields and content from other applications. Take
    control of how many recently opened files appear in the `File` menu and `Launch
    Center` with the `Show recently opened files` options. Choose to enable opening
    the `Manage Database` window when creating a new file (Chapter [7](#429700_2_En_7_Chapter.xhtml)),
    and click the `Reset` button to reset all application dialogs to default size
    and position.


    There are a few Windows-only options, which are controlled by the operating system
    on Macintosh computers and not shown earlier. These include options to increase
    the size of layout objects for improved readability, selecting an interface language
    and sharpening text.


    ### General: Username


    The `username` setting identifies how a database will determine the name of a
    computer. The behavior varies slightly by platform. On macOS, the username defaults
    to "System" and uses the current user''s computer account name. Choose "Other"
    to enter a static override for any user on the local computer. On a Windows computer,
    a custom name must be entered.


    ### General: Application


    The `application` settings control several options. The first two control whether
    FileMaker checks for and notifies the user when a software update is available,
    full versions and/or incremental updates. The `startup file` setting at the bottom
    accepts a file selection that will automatically open when the application is
    launched. The `Use advanced tools` checkbox should be selected to enable advanced
    application features on any computer where development will occur. Enabling advanced
    tools reveals the entire `Tools` menu (discussed later in this chapter) and other
    features, including:


    - Two items in the `File ➤ Manage` submenu, `Custom Functions` and `Custom Menus`

    - Using copy-paste with tables, field definitions, and themes

    - The ability to import tables


    **Tip:** Enable advanced tools and then quit and relaunch the app.


    ## Exploring Menus (Browse Mode)


    The default Browse mode menu bar, shown in Figure [2-5](#429700_2_En_2_Chapter.xhtml#Fig5),
    contains commands for data entry and switching to other modes, including the deeper
    developer interface used to define database structure and design layouts.


    ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig5_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig5_HTML.jpg)


    *Figure 2-5: The default Browse mode menu bar*


    This section introduces the default Browse mode menus. There are many contextually
    sensitive items that are not enabled under various circumstances, e.g., no database
    is open, a script is running or paused, a modal window is open, or a user''s login
    account (Chapter [30](#429700_2_En_30_Chapter.xhtml)) doesn''t grant them access
    to the feature. Similarly, some or all menus may be completely different under
    a variety of other conditions, including:


    - The `Launch Center` window or another file dialog is open.

    - A window is in a non-Browse mode: Find (Chapter [4](#429700_2_En_4_Chapter.xhtml)),
    Preview (Chapter [4](#429700_2_En_4_Chapter.xhtml)), or Layout (Chapter [17](#429700_2_En_17_Chapter.xhtml))
    modes.

    - A modifier key such as `Option` is held down.

    - A developer dialog is open.

    - The database is using a custom menu set (Chapter [23](#429700_2_En_23_Chapter.xhtml)).


    ### FileMaker Pro Menu


    The `FileMaker Pro` menu, shown in Figure [2-6](#429700_2_En_2_Chapter.xhtml#Fig6),
    is a macOS-only menu that contains access to information about the application,
    preferences, and some operating system features. These are used to get information
    about the application, open the preferences window, and hide or quit the app and
    may include services from the operating system and other applications. On Windows,
    this menu doesn''t exist, so `Preferences` are available under the `Edit` menu,
    and an `Exit` item is added under the `File` menu to quit the application.


    ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig6_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig6_HTML.jpg)


    *Figure 2-6: The FileMaker Pro application menu*


    ### File Menu


    The `File` menu, shown in Figure [2-7](#429700_2_En_2_Chapter.xhtml#Fig7), contains
    many file and developer-related functions. The menu''s functions include accessing,
    configuring, printing, transferring data, and more.


    The `Create New` item at the top opens the corresponding tab of the `Launch Center`
    window, providing access to resources, starter templates, and spreadsheet conversion
    functions and creating a new blank database. The next four submenu items each
    provide resource access with an option to open a window or directly access a resource.
    The `My Apps`, `Favorites`, and `Recent` submenus each correspond to a `Launch
    Center` tab providing access to databases in a cloud account, saved as favorite
    or recently accessed. The `Hosts` submenu provides access to hosted databases
    with an option to open a `Hosts` window that summarizes servers by cloud, favorites,
    and local with an option to add, edit, or remove hosts (Chapter [29](#429700_2_En_29_Chapter.xhtml)).


    ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig7_HTML.jpg](images/429700_2_En_2_Chapter/429700_2_En_2_Fig7_HTML.jpg)


    *Figure 2-7: The File menu and Manage submenu*


    The `Manage` submenu provides access to development options (described later in
    this chapter), while the `Sharing` submenu provides control over who can access
    the current database across a network and the local application''s ability to
    share open files (Chapter [29](#429700_2_En_29_Chapter.xhtml)). `File Options`
    opens a dialog of settings for the current database (Chapter [6](#429700_2_En_6_Chapter.xhtml)),
    and `Change Password` opens a dialog allowing a user to change the password for
    the current user account if that capability is permitted by their security privileges
    (Chapter [30](#429700_2_En_30_Chapter.xhtml)).


    At the top of the output options is `Page Setup` (called `Print Setup` on Windows)
    and `Print` which provide access to typical operating system dialogs used to configure
    the current window for printing. Next, the `Import Records` and `Export Records`
    options provide options for transferring data into or out of the current database
    (Chapter [5](#429700_2_En_5_Chapter.xhtml)). The `Save/Send Record As` submenu
    allows records to be saved as an Excel or PDF file or a Snapshot link to a set
    of records (Chapter [29](#429700_2_En_29_Chapter.xhtml)). The `Send` submenu has
    options for creating a manual email or creating an email with a FileMaker URL
    link to the current database (Chapter [31](#429700_2_En_31_Chapter.xhtml)). The
    `Save a Copy As` menu can save the entire database as a `copy`, `compacted copy`,
    or `clone` (Chapter [6](#429700_2_En_6_Chapter.xhtml)). Finally, the `Recover`
    item begins a database recovery process used to troubleshoot or salvage a damaged
    database (Chapter [6](#429700_2_En_6_Chapter.xhtml)).'
