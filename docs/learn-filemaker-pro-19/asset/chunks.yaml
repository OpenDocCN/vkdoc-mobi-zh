  trans: '

    ### 日期字段


    `日期字段`用于存储正式日期，日期范围从`0001 年 1 月 1 日`到`4000 年 12 月 31 日`。输入日期时，必须使用与创建文件时继承自计算机的数据库日期和时间设置相匹配的`短日期格式`（参见第
    6 章“文件选项：文本”）。在美国，默认格式通常是“<月>/<日>/<年>”。例如，`2017 年 1 月 15 日`在日期字段中应输入为“`1/15/2017`”。尽管所有日期都必须以短日期格式输入，但布局上的字段可以配置为以多种格式之一显示该值（参见第
    19 章“数据格式化”）。按日期字段对记录排序时，这些值将按时间顺序排列。


    #### 两位数年份转换


    `FileMaker` 要求所有日期都具有四位数的年份。任何在日期字段中输入的两位数年份，都将根据输入操作发生时的年份，使用一个公式自动转换为四位数年份。这包括所有输入方法：手动输入、导入、自动输入公式或脚本步骤输入。转换过程假定两位数年份的日期更可能指的是比`未来`更远的`过去`时间。因此，将日期年份由两位自动转换为四位时，会根据数据输入时的`当前年份`进行调整，使日期落在`未来
    30 年`或`过去 70 年`的范围内。所以，在 2020 年，输入“`1/1/51`”或更早的日期会自动转换为“`1/1/1951`”，而“`1/1/50`”则会转换为“`1/1/2050`”。管理超出百年范围或不符合此分割模式的日期的数据库，必须：


    -   以四位数年份输入

    -   输入到**文本字段**而不是日期字段中，这样它们可以保持两位数年份

    -   使用自动输入公式或脚本触发器，在`FileMaker`强制执行自动转换`之前`，将日期转换为相应的四位数等效值


    **注意：** 在 2000 年之前，`FileMaker`允许使用两位数年份。升级旧数据库时，这些日期会自动获得世纪 1900，除非在升级前手动转换！


    ### 时间字段


    `时间字段`用于存储正式的时间字符串。输入时间时，必须使用与创建文件时继承自计算机的数据库日期和时间设置相匹配的时间格式。在美国，默认格式通常是“<小时>:<分钟>:<秒>
    <上午|下午>”或“`10:30:00 am`”。时间可以指代一天中的某个时刻，也可以指代`时间段`，用于表示分配或经过的时间等。例如，“`0:15:00`”表示
    15 分钟。按时间字段对记录排序时，这些值将按时间量顺序排列。


    ### 时间戳字段


    `时间戳字段`用于将正式的日期和时间统一存储在一个字符串中。`FileMaker`允许时间戳值的范围从`0001 年 1 月 1 日 上午 12:00`到`4000
    年 12 月 31 日 晚上 11:59:59`。与单独的日期和时间值一样，时间戳必须以与数据库各组件设置相匹配的短格式输入，这些设置继承自创建文件时的计算机。两个组成部分输入时中间有一个空格：“`<日期>
    <时间>`”。例如，“`1/1/2021 3:00 PM`”或“`8/1/2021 8:00 AM`”。


    **提示：** 日期、时间和时间戳在内部存储为表示从某个固定点开始经过的时间的数值：日期存储为从`0001 年 1 月 1 日`开始经过的天数，时间存储为从午夜开始经过的秒数。例如，“`8/1/2002`”存储为`737638`，“`10:00:00
    AM`”存储为`36000`。因此，公式可以对日期加减天数，或对时间加减秒数。


    ### 容器字段


    `容器字段`用于存储文档。可以通过多种功能将文件放入容器字段，包括`插入`、`复制/粘贴`或`拖放`。在 iOS 设备上运行的数据库可以使用`从设备插入`脚本步骤将音乐、照片、摄像头、麦克风或签名数据插入到容器中。根据数据库和字段的配置，容器中显示的文件可以存在于数据库结构中，也可以链接到外部文件夹位置（参见第
    10 章）。某些文件类型具有`交互内容`布局设置，允许类似于其原生应用程序的交互性（参见第 19 章）。例如，PDF 文件可以存储在一个字段中，通过布局配置允许用户查看和浏览文档的各页，就像在
    Adobe Acrobat 中查看它一样。其他具有交互选项的文件类型包括`照片`、`影片`和`音频文件`。


    ### 显示字段


    `显示字段`是一个不可编辑的字段，它会自动显示由其设置决定的值。`FileMaker`有两种类型的显示字段：`计算字段`和`汇总字段`。


    #### 计算字段


    `计算字段`由一个公式语句定义，该公式由 `FileMaker` 评估以产生结果（参见第 12 章）。这类似于应用了公式的电子表格中的单元格，但有两个主要区别。首先，该公式适用于整个列，因此每条记录都使用相同的公式来计算字段的结果。该公式可以包含针对不同记录产生不同结果的变量条件，但整体公式本身对所有记录保持不变。其次，用户`不可能`直接输入到单元格中，清除公式，然后输入数据。


    #### 汇总字段


    `汇总字段`是一种自动基于当前用户查找集和排序顺序的上下文，根据一组记录中另一个字段的值来计算值的字段。例如，汇总字段可以计算并显示查找集中每条记录的某个字段的总值，或根据关键排序字段对记录子集进行计算。汇总字段通过组合字段选项（本章稍后解释）和布局部分设置（参见第
    18 章）进行配置。


    ## 管理数据库对话框（字段）介绍


    字段在“管理数据库”对话框的“字段”选项卡中创建和定义，如图 8-1 所示。选择 `文件 ➤ 管理 ➤ 数据库` 菜单，并单击“字段”选项卡。


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig1_HTML.jpg](img/429700_2_En_8_Fig1_HTML.jpg)

    *图 8-1：用于管理字段的对话框*


    用于字段定义的控件包括：


    1.  `表弹出菜单` – 选择一个表以查看其下方的字段。

    2.  `字段列表` – 显示所选表中已定义的字段列表。选择其中一个进行配置、重命名、复制或删除。

    3.  `字段名称和注释` – 为所选字段输入新名称，或为新字段输入名称。输入关于所选字段的简短开发者注释。

    4.  `类型` – 为新字段选择类型，或更改所选字段的类型。

    5.  `选项` – 单击以根据类型编辑字段设置。

    6.  `按钮` – 用于`创建`新字段，或`更改`、`复制`、`删除`、或`复制粘贴`所选字段。

    '
- fmt: '# Planning Field Names


    Field naming should follow the same general guidelines as tables: they can have
    spaces, should avoid reserved words and symbols, and be descriptive of content
    without being excessively long. They can also be assigned name prefixes to form
    groups for sorting in the developer lists. However, with fields, this often requires
    a reversal of natural language flow, and that may be confusing for users in certain
    situations. For example, while `Company Name` and `Company URL` make sense, using
    `Name First` and `Name Last` instead of `First Name` and `Last Name` keeps the
    fields conceptually together in a list but may seem unnatural and may be confusing
    to users. While table names remain mostly hidden from users, field names are more
    visible when performing certain functions like `import`, `export`, `sort`, and
    more. On layouts, field labels can be renamed to avoid confusion. However, a user
    who is familiar with fields labeled `First Name` and `Last Name` may be confused
    by a dialog where those fields are suddenly called `Name First` and `Name Last`.
    When using this kind of naming technique, you may need to create a script driven
    processes for various functions to avoid users seeing the name differences. Alternatively,
    train users about the differences in names so they aren’t confused.


    # Defining Default Fields


    Starting with FileMaker 17, every new table is created with default fields that
    are pre-configured to automatically enter standard metadata. Once created, these
    can be edited, renamed, or removed as desired. The file that controls which fields
    are created for any future table is named `DefaultFields.xml` file and is located
    in a language subfolder of the FileMaker Pro application. These fields are:


    * `PrimaryKey` – Enters a Universally Unique Identifier (UUID) for each record

    * `CreationTimestamp` – Enters when a record is created

    * `CreationBy` – Enters the name of the record creator

    * `ModificationTimestamp` – Enters when a record was last modified

    * `ModificationBy` – Enters the name of the last modifier


    ## Creating Your Own Standard Fields


    Some developers define alternative and/or additional standard fields that they
    always add to tables in every database they create. A `standard field` is a field
    that can universally apply to any table, no matter what type of object is modeled
    by its content. They don’t need to be limited to auto-entered metadata values
    like the preceding default fields. Instead, they can be any field that stores
    content or provides some type of function that can apply generically no matter
    the table’s entity or purpose. As you develop more, ideas for standard fields
    may become plentiful although not every standard field should be forced into every
    table. Some `universal standards` will be easily applicable to every table. Other
    `group standards` may apply to only certain types of tables, while other `optional
    standards` may be applied sparingly as needed. Here are a few ideas for standardization
    across all tables:


    * `Status` – A data entry status field that stores a progress value, e.g., `new`,
    `active`, `hold`, or `done`. The specific values may vary from one table to the
    next.

    * `Notes` – A freeform notes field used to store information about the record
    itself or the entity represented by the record.

    * `Errors` – A calculation used to automatically compile and display data entry
    error notifications on layouts, providing instant feedback to users about problems
    with key fields.

    * `Title` – A calculation that combines fields to create a heading for display
    at the top of entry layouts or in the body of a List view or portal rows to help
    users quickly identify a particular record.


    **Tip**


    Custom standard fields can be copy and pasted into new tables or added to the
    `DefaultFields.xml` file for automatic insertion.


    ## Grouping Standard Fields


    Since a standard field will be used consistently in lots of tables and across
    many solutions, extra care should be taken when naming them. While grouping prefixes
    will help sort fields in lists, consider the addition of a `super grouping prefix`,
    a single word to separate fields into two “top level” groups: `standard` and `custom`.
    For example, a prefix of `Record` can indicate a standard field containing metadata,
    while a table-specific prefix indicates a custom field, e.g., using `Contact`
    to indicate a field specific to a table containing contacts, as shown in Figure
    8-2.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig2_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig2_HTML.jpg)


    **Figure 8-2** Examples of unprefixed fields (left) and prefix-grouped fields
    (right)


    Although this approach may at first appear visually cluttered, as a list expands
    to include dozens or hundreds of fields, some kind of name-group organization
    can be beneficial.


    # Managing Fields


    From the `Fields` tab of the `Manage Database` window, fields can be created,
    duplicated, renamed, modified, and deleted.


    ## Creating a New Field


    Manually create a new field from the `Fields` tab of the `Manage Database` dialog
    by typing a name into the `Field Name` text area. Then choose a data type for
    the field in the `Type` menu, and click the `Create` button. The new field should
    appear in the list. When creating a new `Summary` or `Calculation` field, FileMaker
    will immediately open an options dialog based on the selected type. These can
    be opened later for an existing field by clicking the `Options` button (described
    later in this chapter).


    ## Duplicating an Existing Field


    When a new field will be similar to an existing field, consider duplicating to
    save time. Select one or more fields, and use the `Copy` and `Paste` buttons or
    click `Duplicate`. The duplicate field(s) will appear highlighted in the list,
    each with the same name as the original plus either a unique numeric suffix or
    a suffix of `Copy` depending on which method of duplication you use. All the settings
    of the duplicate fields will be the same as the originals. However, field content
    for existing records is not copied from the original, so the duplicate fields
    will be empty of content. Fields can be pasted in the same table, a different
    table in the file, or a table in a different database file.


    ## Modifying a Field Name or Comment


    An existing field’s name and comment can be changed by selecting it, entering
    a new value in the respective text area, and clicking the `Change` button.


    ## Modifying a Field’s Type


    Once a field is created and has data entered, changing its type should be a rare
    occurrence. However, if necessary, due to a mistake or the need to structurally
    change a database, select the field, choose a new value from the `Type` menu,
    and then click the `Change` button. Depending on the original and new type, a
    dialog may warn that existing content in the field will be converted to the new
    type across all existing records. Changing from `text` to a `date` or `timestamp`
    will convert dates previously entered as text into formal dates and automatically
    convert years to four digits as needed (see “Two-Digit Date Conversion” earlier
    in this chapter). Changing a `container` to another data type will remove any
    non-textual data from the field. For example, the actual embedded file or image
    data would be removed leaving only the name or path of the file. Changing `to`
    a `calculation` or `summary` will result in the permanent loss of any previous
    manually entered input.'
  raw: '## Planning Field Names


    Field naming should follow the same general guidelines as tables: they can have
    spaces, should avoid reserved words and symbols, and be descriptive of content
    without being excessively long. They can also be assigned name prefixes to form
    groups for sorting in the developer lists. However, with fields, this often requires
    a reversal of natural language flow, and that may be confusing for users in certain
    situations. For example, while *Company Name* and *Company URL* make sense, using
    *Name First* and *Name Last* instead of *First Name* and *Last Name* keeps the
    fields conceptually together in a list but may seem unnatural and may be confusing
    to users. While table names remain mostly hidden from users, field names are more
    visible when performing certain functions like *import*, *export*, *sort,* and
    more. On layouts, field labels can be renamed to avoid confusion. However, a user
    who is familiar with fields labeled *First Name* and *Last Name* may be confused
    by a dialog where those fields are suddenly called *Name First* and *Name Last*.
