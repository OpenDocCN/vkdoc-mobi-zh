- fmt: '# Creating a Dialog Layout


    Create a new layout named “Contact – Dialog Find” and assign it to the `Contact`
    table. Remove other parts and shrink the `Body` part down to a desired dialog
    size, as shown in Figure [25-14](#429700_2_En_25_Chapter.xhtml#Fig14). Add a text
    object for a heading and action prompt. Place the `Contact Address State` field
    formatted as pop-up menu assigned a value list of state abbreviations. Distribute
    four buttons along the bottom, and configure their `Autosize` settings in the
    `Position` tab of the `Inspector` pane to lock to the bottom right, so the window
    size can vary slightly without adversely affecting the appearance. Then, save
    the layout by returning to Browse mode and create a script.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig14_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig14_HTML.jpg)


    Figure 25-14: An example of a layout designed for use as a dialog


    # Creating a Dialog Layout Script


    A dialog script can be configured in a variety of different ways, and your choice
    will vary based on the functions required. In some cases, a script can open the
    dialog, pause, and then continue when a button is clicked. In other cases, a group
    of separate scripts can be created: one to present the dialog and one for each
    button option. The following example uses parameters to package all the operations
    as separate functional sections of a single script. Start by creating a script
    named “Contact - Marketing Email,” as shown in Figure [25-15](#429700_2_En_25_Chapter.xhtml#Fig15).
    The script starts with a `Set Error Capture` step and then places the script parameter
    into a `$function` variable. It accepts one of five parameters to guide the workflow
    through different conditional statements: `Start` (default when no parameter provided),
    `Cancel`, `Introduction`, `Services`, and `Offers`.


    A `Start` parameter will begin the process, being triggered when the user runs
    the script from the `Scripts` menu, a custom menu, a button, or some other triggering
    methods. The first portion of the conditional `If` statement allows for either
    a parameter of “Start” or no parameter, which opens a new window showing the dialog
    layout, assigns a name, and centers itself on-screen both horizontally and vertically.
    Then it enters Find mode and relinquishes control to the user, allowing them to
    select a state from the pop-up menu and make a button selection. The other four
    parameters will be used to perform different conditional steps depending on which
    of the four buttons is clicked. So, each button calls the same script but passes
    in a different parameter which activates a different portion of the conditional
    statement. When the script detects the `Cancel` parameter, it will enter Browse
    mode and close the dialog, returning the user to the window they had open previously.
    Each of the three report buttons will be handled after the first `Else` step which
    has a nested conditional statement. There, the `Perform Find` step executes the
    search and, if records are found, steps through the resulting found set. Inside
    the `Loop` statement is a nested condition for each of the three parameters, but
    with specifics omitted for simplicity. The three comments indicate where additional
    steps would be placed to create and send an email, or perform whatever action
    is required.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig15_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig15_HTML.jpg)


    Figure 25-15: The dialog script has conditions for each of five parameter values


    Notice that the script doesn’t close the dialog until after it is finished running
    whichever conditional section is activated by the parameter. The new window for
    the dialog is being used as a temporary context which is separate from other windows
    the user had open when the script ran. Since the find is performed in the dialog
    window, the results will only exist there, and so the other steps must be performed
    in that context before closing the window. Alternatively, a script could gather
    the find criteria entered in the dialog and the name of the button clicked, store
    them in variables and close the window, and then reconstruct and perform the find
    in the original window.


    Once the script is written and saved, make sure to check the box to include the
    script in the `Scripts` menu or provide some other interface access point where
    the users can start the process.


    > **Caution:** Be sure to connect the layout buttons to the script to avoid opening
    a window that can’t be closed!


    # Connecting the Dialog Buttons to the Script


    Each button should call the script with a parameter, as shown in Figure [25-16](#429700_2_En_25_Chapter.xhtml#Fig16).


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig16_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig16_HTML.jpg)


    Figure 25-16: Each button calls the script with a parameter and set to exit the
    current script


    ## Introducing the Card Window


    A `Card` is a modal window that appears as an overlay connected on top of the
    current window’s active layout, as shown in Figure [25-17](#429700_2_En_25_Chapter.xhtml#Fig17).
    The parent window’s content becomes inactive and inaccessible while the card is
    open. However, depending on the size of the card, the content behind may still
    be visible in an optionally diminished light. Unlike a `Dialog window`, which
    is modal to the application, a card only locks up a single window.


    Cards are similar in appearance and behavior to modal windows found in other environments.
    For example, a macOS dialog can open as a `sheet`, attached to the top of a window.
    Also, web pages often display various objects like advertisements or images in
    a similar `lightbox` format. In FileMaker, Card windows are great for presenting
    navigation menus, custom toolbars, dialogs, wizards, custom help guides, and more.
    Since the layout displayed has its own context, it can be based on a table occurrence
    other than that of the parent window’s active layout. This allows a card to provide
    universal interface “services” that work anywhere in your solution which can reduce
    technical redundancy and facilitate resource sharing.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig17_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig17_HTML.jpg)


    Figure 25-17: An example of a card window


    > **Tip:** When configuring a `Card` in the `New Window Options` dialog, leave
    the `Size` and `Position` values empty to have the layout centered in the parent
    window at full size. Set the top position to 0 to simulate attachment to the top
    of the parent window.


    ## Using Insert from URL


    The `Insert from URL` step enters data from a URL into a target field or variable.
    The command supports the `http`, `https`, `ftp`, `ftps`, and `file` protocols
    and includes `cURL` options. The step’s panel includes options to specify various
    settings, as shown in Figure [25-18](#429700_2_En_25_Chapter.xhtml#Fig18).


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig18_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig18_HTML.jpg)


    Figure 25-18: The `Insert from URL` step’s configuration panel


    ### Downloading a PDF File


    Start with a simple example by downloading a PDF file from a website. First, click
    to specify a target container field as the destination for the file, e.g., the
    `Example Container` field in the `Sandbox` table. Then, click to `Specify URL`
    and enter the address of a PDF file, as shown in Figure [25-19](#429700_2_En_25_Chapter.xhtml#Fig19).
    Run the script and the file should appear in the container field.


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig19_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig19_HTML.jpg)


    Figure 25-19: The `Insert from URL` step’s configuration panel'
