  trans: '

    ### 审查沙箱字段


    在完成数据录入、计算和汇总字段的创建后，`Sandbox` 表应包含五个默认字段和如图 6-7 所示的八个示例字段。点击 `OK` 按钮关闭 `Manage
    Database` 对话框，并保存对 `Sandbox` 表所做的所有更改。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig7_HTML.jpg](img/429700_2_En_6_Fig7_HTML.jpg)


    **图 6-7** – 练习表中字段的完整列表


    ### 设置占位布局


    继续快速设置沙箱资源，我们来创建两个布局：一个用于数据录入的`表单视图`布局，以及一个用于滚动浏览记录的`列表视图`布局。


    > **注意**

    > 第 3 章详细定义了内容视图。


    #### 将默认布局重命名为表单视图


    新建的数据库文件会自动包含一个与文件名同名的默认`表单`布局。最初会有一个名为 `Learn FileMaker` 的布局。但是，当默认表名更改为 `Sandbox`
    时，布局也应随之更改。因此，如果按照本节中的说明操作，应该会有一个名为 `Sandbox` 的空白布局。由于我们将为同一个表创建两个布局，我们需要通过将其重命名为
    `Sandbox Form` 来区分这个布局和另一个布局，请按以下步骤操作：


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig8_HTML.jpg](img/429700_2_En_6_Fig8_HTML.jpg)


    **图 6-8** – 已输入新布局名称的“布局设置”对话框


    1.  选择 `View ➤ Layout` 菜单项以进入布局模式。

    2.  选择 `Layout ➤ Layout Setup` 菜单以打开 `Layout Setup` 对话框。

    3.  在 `General` 选项卡的 `Layout Name` 字段中，将名称更改为 `Sandbox Form`，如图 6-8 所示。

    4.  点击 `OK` 按钮关闭窗口并保存更改。


    > **注意**

    > 第 18 章将进一步讨论布局设置。


    #### 向布局添加字段


    如果 `Layout` 首选项设置为自动将新字段添加到当前布局（第 2 章），那么这八个示例字段将已经存在于默认布局上。如果没有，则有两种方式可以向布局添加字段。现在，请按照以下步骤在布局模式中使用
    `Objects` 窗格的 `Field` 选项卡：


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig9_HTML.jpg](img/429700_2_En_6_Fig9_HTML.jpg)


    **图 6-9** – 将选定的字段从字段选项卡拖到布局上


    1.  通过在 `View ➤ Objects ➤ Fields tab` 菜单下选择该项，确认 `Field` 选项卡可见。

    2.  点击字段列表，然后选择 `Edit ➤ Select All` 菜单项，选中全部字段列表。

    3.  单击并按住鼠标左键，将字段列表拖到布局上，如图 6-9 所示。这些字段应出现在布局上，并根据其数据类型整齐对齐并调整大小。


    > **注意**

    > 在第 20 章中了解向布局添加字段的其他方法。


    #### 创建列表布局


    接下来，通过选择 `Layout ➤ New Layout/Report` 菜单添加一个列表视图布局，并按照对话框中的步骤操作，如图 6-10 所示：


    1.  在 `Layout Name` 字段中输入 `Sandbox List`。

    2.  在第一行图标中点击 `Computer` 布局类别。

    3.  在第二行图标中点击 `List` 布局类型。

    4.  点击 `Finish` 按钮关闭对话框并完成此过程。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig10_HTML.jpg](img/429700_2_En_6_Fig10_HTML.jpg)


    **图 6-10** – 用于创建新布局或报表的对话框


    > **注意**

    > 第 18 章将探讨其他布局创建选项。


    完成后，将出现一个包含三个部分：`页眉`、`主体`和`页脚`的空`列表视图`布局。由于`列表视图`是垂直方向的，因此添加字段的过程会稍有不同，请按照图 6-11
    所示的步骤操作：


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig11_HTML.jpg](img/429700_2_En_6_Fig11_HTML.jpg)


    **图 6-11** – 配置字段选项卡以拖拽到列表视图


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig12_HTML.jpg](img/429700_2_En_6_Fig12_HTML.jpg)


    **图 6-12** – 放入布局主体部分的字段


    1.  在 `Object` 窗格的 `Field tab` 中，确认 `Drag Preferences` 展开三角形已打开并显示附加控件。

    2.  在 `Field Placement` 下选择 `Horizontal` 图标。

    3.  选择 `Labels` 选项，将标签放在字段上方。

    4.  按住 Command (macOS) 或 Windows (Windows) 键的同时点击每个字段，选择除容器字段之外的*所有*示例字段。我们将在列表视图中跳过容器字段，因为它的默认占用空间很大，并且会尝试扩展布局。

    5.  接下来，将选定的字段拖到布局上。确保将字段放置得足够高，使其完全落在定义的布局部分（水平白色区域）内。

    6.  放置后，将它们向下拖动，使字段大致位于 `Body` 部分的居中位置，如图 6-12 所示。


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig13_HTML.jpg](img/429700_2_En_6_Fig13_HTML.jpg)


    **图 6-13** – 清理标签和字段后的列表视图


    1.  使用鼠标或箭头键将标签精确放置在 `Header` 区域内。

    2.  双击每个字段标签，删除多余的 `Example` 部分，以去除重复的前缀。

    3.  最后，调整最后两个字段的大小和位置，使任何内容都不延伸到可见布局右侧的灰色区域之外，如图 6-13 所示。


    > **注意**

    > 第 21 章将进一步讨论操作布局对象。


    ## 配置文件选项


    `File Options` 对话框允许控制数据库文件的多种行为。与*应用程序偏好设置*不同，这些选项存储在数据库文件中，并且仅在数据库打开时才能访问。选择
    `File ➤ File Options` 菜单以打开对话框，该对话框分为五个选项卡：`Open`、`Icon`、`Spelling`、`Text` 和 `Script
    Triggers`。

    '
- fmt: '### File Options: Open


    The `Open` tab settings, shown in Figure 6-14, control what happens when a database
    is first opened.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig14_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig14_HTML.jpg)


    Figure 6-14: The file options for open behavior


    The `Minimum version allowed to open this file` text field allows you to limit
    the file to only open for FileMaker versions at or above the version it is designed
    to support. Although all versions from 12.0 through 19.1 share the same file format,
    a database that uses features from newer versions should not be opened in an older
    version unless specifically designed with alternate functionality based on version.
    If a database uses features from newer versions, it is best to keep this set to
    the latest version. Enter both a `major` and `minor` version number into the field
    (e.g., `19.0` instead of `19`).


    The following four checkboxes control login and default interface functions:


    - `Log In Using` – Specify automatic sign in credentials when a file opens. Do
    **not** use when a database requires tight security (Chapter 30).

    - `Allow Stored Credentials for Authentication` – Controls if a user can opt to
    save credentials on their local device for automatic entry for future log-ins.
    Do **not** use for databases in a shared computer environment or where tight security
    is important.

    - `Switch to Layout` – Specify a default layout when opened. This layout change
    runs prior to any `Script Triggers` (Chapter 27).

    - `Hide All Toolbars` – Select to start with the toolbar hidden.


    ### File Options: Icon


    The `Icon` tab, shown in Figure 6-15, allows customization of the icon that represents
    the database in the `Launch Center`, making it easier to visually locate a desired
    file. The default icon is the FileMaker 19 document icon. Choose an alternative
    from the built-in list of Claris-provided icons, or specify a custom PNG or JPEG
    file by clicking `Custom`.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig15_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig15_HTML.jpg)


    Figure 6-15: The file options for assigning a custom icon


    ### File Options: Spelling


    The `Spelling` tab, shown in Figure 6-16, controls automatic spell-check settings.
    The `Indicate questionable words with special underline` checkbox will enable
    a red dotted line under any potentially misspelled words in a field with focus
    unless that field or object has been configured in the `Inspector` to explicitly
    disable the feature (Chapter 19, “Inspecting the Data Settings”). With the `Beep
    on questionable spellings` selected, a sound will be played anytime a user types
    a word that the dictionary thinks is misspelled.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig16_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig16_HTML.jpg)


    Figure 6-16: The file options for spell-checking


    ### File Options: Text


    The `Text` tab, shown in Figure 6-17, controls a few text entry options.


    ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig17_HTML.jpg](images/429700_2_En_6_Chapter/429700_2_En_6_Fig17_HTML.jpg)


    Figure 6-17: The file options for text entry


    The `text handling` checkboxes control certain special data entry considerations.
    Enable `Use smart quotes` to always enter apostrophes and double-quotation marks
    in fields as curly quotes. The `Use Asian language line-breaking` option controls
    how line endings are handled when a word reaches the edge of a text field when
    using Asian languages, and `Use Roman language line-breaking` does the same when
    using Roman languages.


    The `data entry` section handles formatting of various standard data like currency
    symbols, dates, and times. When FileMaker creates a new database, the file is
    encoded with regional settings from the operating system of the local computer.
    On macOS, these can be found in the `System Preferences ➤ Language & Region ➤
    Advanced` panel. Once the file is created, these settings can’t be modified. However,
    the `File Options` dialog allows selection of what happens when there is a difference
    between the user’s operating system and the settings encoded in the database:


    - `Always Use Current System Settings` – Select to use the current system settings
    of the computer instead of those saved in the database file.

    - `Always Use File’s Saved Settings` – Select to use the settings saved in the
    database file.

    - `Ask Whenever Settings Are Different` – Select to ask the user at launch time
    which settings to use.


    ### File Options: Script Triggers


    The `Script Triggers` tab is used to configure database to automatically trigger
    scripts in response to interface events pertaining to the file (Chapter 27).


    ## Designing and Maintaining Healthy Files


    FileMaker automatically saves changes made in a file so there is no need or ability
    to explicitly perform a save function. Users can modify records, and developers
    can modify the structural elements with confidence that the work will be written
    to disk. However, things **can** go wrong, and it’s important to know how to avoid,
    identify, and remedy problems in order to maintain healthy files. Before starting
    to design a custom database, take a moment to review some of the problems that
    can occur and how to help ensure they don’t end in tragedy.


    ### Avoiding Design and Training Deficiencies


    Most database accidents are the result of some form of user confusion caused by
    a combination of lack of training, poor interface design, or careless scripting.
    A few specific problems involve users overwriting existing records, forgetting
    to commit a record, deleting records carelessly, or misidentifying a found set.'
