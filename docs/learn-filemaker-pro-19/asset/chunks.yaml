    任何在 `filterValues` 中出现多次的值都会被包含，并且保持它们最初出现的顺序。请注意，部分段落匹配不会被包含在结果中。例如，即使“NYC”包含“NY”，它也会被过滤掉，因为此函数匹配的是
    `values`（完整段落）而非部分字符串。


    ```

