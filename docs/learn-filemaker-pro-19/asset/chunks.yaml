- fmt: '### Using `JSONListValues`


    The `JSONListValues` function will return a list of the value of every key for
    an element containing an object or array.


    ```

    JSONListValues ( json ; keyOrIndexOrPath )

    ```


    This works the same as `JSONListKeys` except it returns the *values* instead of
    the *keys*, as shown in this example which returns the values of every element
    of the `contact` element:


    ```

    JSONListValues ( Sandbox::Example Text ; "contact" )

    // Result =

    555-867-5309

    sales@widgets.nope

    www.widgets.nope

    ```


    ## Creating and Manipulating JSON


    FileMaker provides three functions used to manipulate elements within a JSON object:
    `JSONSetElement`, `JSONDeleteElement`, and `JSONFormatElements`.


    ### Using `JSONSetElement`


    The `JSONSetElement` function sets the value of one or more elements in an object,
    creating them if necessary. The function call has four parameters, shown here:


    ```

    JSONSetElement ( json ; keyOrIndexOrPath ; value ; type )

    ```


    The `json` parameter can contain an object, array, or an empty string when creating
    a new object. The `keyOrIndexOrPath` and `value` are required and specify the
    element key that should be created or modified and the content it should contain.
    The `type` parameter can specify a data type of the `value` or be an empty string,
    and FileMaker will use a type determined by the content provided. The following
    example creates a simple object with a `name` element:


    ```

    JSONSetElement ( "" ; "name" ; "First Class Widgets"; "" )

    // Result = {"name":"First Class Widgets"}

    ```


    Assuming the preceding result is placed into a variable named `data`, this example
    shows how to add an element to the existing object, in this case a `category`
    element:


    ```

    JSONSetElement ( data ; "category" ; "Manufacturing"; "" )

    // Result =

    {

    "name":"First Class Widgets",

    "category":"Manufacturing"

    }

    ```


    Setting the value of an element that already exists in the object provided will
    replace the existing value with the new value.


    ```

    JSONSetElement ( {"name":"Honda"} ; "name" ; "Ford"; "" )

    // Result = {"name":"Ford"}

    ```


    **Tip**: Instead of writing JSON manually, always use the `JSONSetElement` function
    to create a new element to help avoid mistakes.


    #### Specifying a Data Type


    The previous examples leave the `type` parameter blank because the data provided
    is obviously text, and we can rely on FileMaker to choose the correct format.
    Often you will need to specify a type to ensure the correct result. For example,
    if the `value` starts with a numeric digit and no type is specified, FileMaker
    will automatically treat it like a number. This means that text with leading zeros
    or dates will be converted into a number unless you specify the correct data type.
    To illustrate the importance of specifying a type for text-based text strings,
    consider the difference in these results:


    ```

    JSONSetElement ( "" ; "phone" ; "555-867-5309" ; "" )

    // Result = {"phone":555}

    JSONSetElement ( "" ; "phone" ; "555-867-5309" ; JSONString )

    // Result = {"phone":"555-867-5309"}

    ```


    #### Setting Multiple Values at Once


    You can set multiple keys with a single call by using semicolon-delimited, square-bracketed
    sets of `keyOrIndexOrPath`, `value`, and `type` parameters, as shown in this example
    that sets two elements at once:


    ```

    JSONSetElement ( "" ;

    [ "name" ; "First Class Widgets"; "" ] ;

    [ "category" ; "Manufacturing"; "" ]

    )

    // Result =

    {

    "name":"First Class Widgets",

    "category":"Manufacturing"

    }

    ```


    #### Setting a Value by Path


    When working with complex objects that need elements containing objects and arrays,
    it is necessary to specify a *path* that refers to elements deeper than the first
    level. This example sets the `name` element at the top level and then sets a `contact`
    element as an object containing a `phone` and `email` element:


    ```

    JSONSetElement ( "" ;

    [ "name" ; "First Class Widgets"; "" ] ;

    [ "contact.phone" ; "555-867-5309"; JSONString ] ;

    [ "contact.email" ; " sales@widgets.nope "; "" ]

    )

    // Result =

    {

    "name":"First Class Widgets",

    "contact":

    {

    "phone":"555-867-5309",

    "email":"sales@widgets.nope"

    }

    }

    ```


    #### Setting Array Values


    `JSONSetElement` can target an index position in an array as described for `JSONGetElement`.
    The index value must be enclosed in square brackets to avoid the number being
    used to create or refer to a key instead of an array position, as demonstrated
    by the following examples. The first shows how to correctly create a value in
    an array. The second shows the incorrect result when failing to use brackets.


    ```

    JSONSetElement ( "" ; "[0]" ; "Claris" ; "" )

    // Result = ["Claris"]

    JSONSetElement ( "" ; "0" ; "Claris" ; "")

    // Result = {"0":"Claris"}

    ```


    When setting an element in an existing array, the value at the index position
    will be replaced with the new value, even if it is a different data type. This
    example replaces the *number* in the third array position with some *text*:


    ```

    JSONSetElement ( "[1,2,3,4]" ; "[2]" ; "Claris" ; "" )

    // Result = [1,2,"Claris",4]

    ```


    If an index position specified is beyond the range of existing values, FileMaker
    will insert one or more *null* placeholders to target the desired position.


    ```

    JSONSetElement ( "" ; "[3]" ; "Claris" ; "" )

    // Result = [null,null,null,"Claris"]

    JSONSetElement ( "[1,2,3,4]" ; "[6]" ; "Claris" ; "" )

    // Result = [1,2,3,4,null,null,"Claris"]

    ```


    Arrays work the same as keys in paths. This example will change the `price` of
    the first `product` in the vendor example:


    ```

    JSONSetElement ( Sandbox::Example Text ; "products.[0].price" ; "45.00" ; "" )

    ```


    ### Using `JSONDeleteElement`


    The `JSONDeleteElement` function will delete an element from an object. The function
    call has two parameters, shown here:


    ```

    JSONDeleteElement ( json ; keyOrIndexOrPath )

    ```


    The specified element will be completely removed, as shown in the following example
    which removes the `name` element, leaving only the `id` remaining:


    ```

    JSONDeleteElement ( {"name":"Honda", "id":350} ; "name" )

    // Result = {"id":350}

    ```


    Deleting an index position in an array will automatically shift values to avoid
    an empty position.


    ```

    JSONDeleteElement ( "[1,2,3,4,5]" ; "[2]" )

    // Result = [1,2,4,5]

    ```


    Deleting works with paths as well. This example will completely remove the first
    `price` from the first `product` of the vendor example, shifting the second price
    into the position of the first:


    ```

    JSONDeleteElement ( Sandbox::Example Text ; "products.[0].price" )

    ```


    ### Using `JSONFormatElements`


    The `JSONFormatElements` function reformats an object by inserting extra space
    to render it in an easier to read format. FileMaker will always remove spaces
    from an object when performing any of the manipulation functions, so this function
    is useful when reviewing the results:


    ```

    JSONFormatElements(

    {"id":5103,"First":"John","Last":"Smith","Title":"Chief Technology Officer"}

    )

    // Result

    {

    "id":5103,

    "First":"John",

    "Last":"Smith",

    "Title":"Chief Technology Officer"

    }

    ```


    ## Summary


    This chapter introduced JSON and explored the built-in functions used to create,
    parse, and manipulate objects and elements. In the next chapter, we will learn
    how to create custom functions.'
