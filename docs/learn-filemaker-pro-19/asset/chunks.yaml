- fmt: '### Creating Sentence from Time Elapsed


    This example creates a human-readable statement of time elapsed. First a `Let`
    statement begins initializing variables starting with `start` and `end` with a
    timestamp value. Although these are set to hard-coded values for this demonstration,
    they could be provided by a field, variable, or other function. The `end` is then
    subtracted from the `start` and converted to a number to establish the seconds
    `elapsed`. This number is then passed through four cascading steps to determine
    the number of `days`, `hours`, `minutes`, and `seconds` elapsed while, at each
    step, deducting the extracted amount from the `elapsed` seconds. These use the
    `Int` function which returns the integer part of a number without rounding by
    dropping any digits to the right of the decimal. Once these four values are calculated
    and placed into variables, the calculation portion of the statement produces the
    final result. This uses a sequence of four `Case` statements nested in a `List`
    statement which is nested in `Substitute` statement. Each `Case` checks to see
    if the corresponding value is not zero which is required for inclusion. If included,
    it constructs a sentence with a conditional suffix, e.g., “1 day” or “10 days.”
    Each of these is added to a return-delimited value list using `List` which is
    then converted into a comma-space-delimited sentence using `Substitute`.


    ```

    Let ( [

    start = GetAsTimestamp ( "8/1/2021 10:00 AM" ) ;

    end = GetAsTimestamp ( "8/2/2021 11:15:10 AM" ) ;

    elapsed = GetAsNumber ( end - start ) ;

    days = Int ( elapsed / 86400 ) ;

    elapsed = elapsed - ( days * 86400 ) ;

    hours = Int ( elapsed / 3600 ) ;

    elapsed = elapsed - ( hours * 3600 ) ;

    minutes = Int ( elapsed / 60 );

    elapsed = elapsed - ( minutes * 60 ) ;

    seconds = Int ( elapsed )

    ] ;

    Substitute (

    List (

    Case ( days ≠ 0 ; days & " day" & Case ( days > 1 ; "s" ) ) ;

    Case ( hours ≠ 0 ; hours & " hour" & Case ( hours > 1 ; "s" ) ) ;

    Case ( minutes ≠ 0 ; minutes & " minute" & Case ( minutes > 1 ; "s" ) ) ;

    Case ( seconds ≠ 0 ; seconds & " second" & Case ( seconds > 1 ; "s" ) )

    ) ; "¶" ; ", "

    )

    )

    // result = 1 day, 1 hour, 15 minutes, 10 seconds

    ```


    ### Converting a Number to a Sentence


    This example converts a number into a sentence using `Let`, `Case`, `Choose`,
    and other functions. In the variable declaration portion of the `Let` statement,
    a number is pulled from a field and placed into an `n` variable. The `Length`
    and `GetAsText` functions count the characters of the number and puts that into
    the `count` variable. Next, three variables are initialized with one digit of
    the number as needed based on the digits. The first (right) digit is placed into
    a, the second (middle) into b, and the third (left) into c using a combination
    of `Left`, `Middle`, `Right`, `GetAsNumber`, and `Case` functions. The calculation
    portion contains four `Case` statements that conditionally use the positional
    digit to insert a text representation of each value which are then concatenated
    to form the resulting sentence. Depending on the input number, the function will
    return a result from “1 Year” up to “Nine Hundred Ninety Nine Years.”


    ```

    Let ( [

    |

    n = Example Number ;

    t = GetAsText ( n ) ;

    count = Length ( t ) ;

    a = GetAsNumber ( Right ( t ; 1 ) ) ;

    b = Case ( count > 1 ; GetAsNumber ( Left ( Right ( t ; 2 ) ; 1 ) ) ) ;

    c = Case ( count > 2 ; GetAsNumber ( Left ( t ; 1 ) ) )

    ] ;

    Case ( c > 0 ;

    Choose( c ; "";

    "One "; "Two "; "Three "; "Four "; "Five "; "Six "; "Seven "; "Eight "; "Nine
    "

    ) & "Hundred " ) &

    Case ( b > 1 ;

    Choose( b ; ""; "";

    "Twenty "; "Thirty "; "Forty "; "Fifty "; "Sixty "; "Seventy "; "Eighty "; "Ninety
    ")

    ) &

    Case ( a > 0 and b ≠ 1 ;

    Choose( a ; "";

    "One "; "Two "; "Three "; "Four "; "Five "; "Six "; "Seven "; "Eight "; "Nine
    ")

    ) &

    Case ( b = 1 ;

    Choose( a ;

    "Ten "; "Eleven "; "Twelve "; "Thirteen "; "Fourteen "; "Fifteen "; "Sixteen ";
    "Seventeen "; "Eighteen "; "Nineteen ") ) &

    "Year" & Case ( n > 1 ; "s" )

    )

    // result (if the number field contains 32) = Thirty Two Years

    ```


    ## Summary


    This chapter discussed many useful built-in functions. Remember that FileMaker
    has over `300` built-in functions that are available when writing formulas. A
    few more of these will be mentioned in the forthcoming chapters, and all are described
    in the online help guide accessible from the hint at the bottom of the `Functions`
    pane in the `Specify Calculation` dialog. In the next chapter, we will continue
    our exploration of built-in functions looking at the *JavaScript Object Notation*
    (JSON) functions.


    # 14. Using JSON


    *JavaScript Object Notation* (JSON) is an open-standard, lightweight, data-interchange
    format originally specified by Douglas Crockford in 2000, standardized in 2013,
    and finalized to its current version in 2017. It was derived from the JavaScript
    Programming Language to fulfill a need for a language-independent, real-time,
    server-to-browser exchange protocol that didn’t require plug-ins. JSON objects
    are formatted using a relatively simple key/value pair structure that is easy
    for humans and machines to read and write. As a result, it has become popular
    with *Representational State Transfer* (REST) web services as an indispensable
    tool for a variety of data exchanges. FileMaker added a set of built-in functions
    in version 16 that can be used to create and manipulate JSON data. These are essential
    when working with data in the format provided by external services and can also
    be employed when using JSON as an internal format for data exchange between scripts
    and other functions. This chapter introduces JSON, covering the following topics:


    - Defining the JSON format

    - Parsing JSON

    - Manipulating JSON'
