    Status Match” with a formula of “Active” and with a calculation result type of
    text (Chapter [12](#429700_2_En_12_Chapter.xhtml)). Since the formula result will
    be the same for every record and since it will be a local key in the relationship
    (Chapter [9](#429700_2_En_9_Chapter.xhtml), “Indexing Match Fields”), it can be
    set to store a global value.


