- fmt: '# Working with Field Objects


    In FileMaker, the meaning of the term *field* will vary greatly depending on the
    context of discussion. Take a moment to acknowledge the difference between four
    things that are usually blurred together under this single term, as illustrated
    in Figure [20-2](#429700_2_En_20_Chapter.xhtml#Fig2):


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig2_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig2_HTML.jpg)


    Figure 20-2 – An illustration of the various uses of the term “field”


    - A *field definition* in a table’s schema, its underlying data structure

    - A *field cell* instance for a record of data

    - A *field object* on a layout being designed

    - A *field display* rendered on a layout in Browse mode


    There is no inherent problem with referring to each of these as a “field,” and
    one shouldn’t feel obligated to use the formal terms shown. In fact, even this
    book will sometimes refer to these all by that term. However, take a moment to
    acknowledge the differences to avoid confusion.


    A table’s *field definition* is an individual unit of storage *potential* that
    establishes the data type and settings in the database schema. These are replicated
    as a *field cell*, one for each record created in the table’s data content, making
    an *actual* unit of storage that will contain information. This is the spreadsheet
    metaphor: a field definition is like a *column*, a record is a *row*, and each
    instance of the field for a record is a *cell*. In FileMaker, since a user interacts
    with the data structure *through* a layout, the metaphorical spreadsheet is hidden
    from view, and the distinction is less important to them.


    When designing a layout, a *field object* is a graphical element that defines
    the position, behavior, and appearance of where and how a field cell should be
    displayed. In Layout mode, the *field object* is assigned a *field reference*
    which is a pointer to a *field definition*. When viewed in Browse mode, that layout
    object is rendered as a *field display* showing information stored in the *field
    cell* for the record currently viewed; formatted, and behaving in accordance with
    the settings of both the *table’s field definition* and the *layout’s field object*.


    ## Adding Fields to a Layout


    A field can be added to a layout by one of numerous methods. Some of these will
    place the field object and then ask you to specify a field reference. Others require
    a reference to be specified prior to creating the object. One method works either
    way depending on the circumstances. Let’s briefly look at all of the ways to add
    a field to a layout.


    ### Specifying the Field Reference After Adding


    All of the following methods will first add an *undefined field object* to the
    layout and then immediately present a *Specify Field* dialog (described in the
    next section) asking for the selection of a field reference:


    - Drag the `Field` tool from the toolbar down onto the layout.

    - Select the `Field/Control` toolbar menu to set the cursor into a *field drawing*
    mode, and then click and drag to create the field object. Click once to auto-select
    the default `Edit box` control type. Click and hold to select a control type from
    the menu.

    - Select the `Insert ➤ Field` menu.

    - Duplicate a selected field using the `Edit ➤ Duplicate` menu.


    ### Specifying the Field Reference While Adding


    All of these methods add a field with a reference already specified as part of
    the process:


    - Drag one or more fields from the `Fields` tab of the `Objects` pane (Chapter
    [19](#429700_2_En_19_Chapter.xhtml)).

    - Copy and paste an existing field.

    - Add fields in a dialog when creating a new layout (Chapter [18](#429700_2_En_18_Chapter.xhtml),
    “Creating a New Layout”).

    - Duplicate *multiple fields* using the `Edit ➤ Duplicate` menu, and their current
    assigned field will remain.

    - Drag and drop an existing field while holding `Option` (macOS) or `Windows`
    (Windows) to create a new duplicate of the field object. This works within a single
    layout or between layouts in two windows.


    When drag-duplicating fields between windows from two different files, the field
    assignment varies. If the receiving file has a field defined with the same name
    as the field being dragged in a table with the same name, it will be placed referencing
    that field. If the receiving file does not have matching field but does have a
    matching table name, the field will be placed with a `<Field Missing>` reference.
    If the receiving file does not have a matching field or table name, the field
    will be placed as a blank field object.


    ## Exploring the Specify Field Dialog


    Adding a field using any method that requires the selection of a reference will
    tentatively place a blank field object and open a *Specify Field* dialog, shown
    in Figure [20-3](#429700_2_En_20_Chapter.xhtml#Fig3). At the top, select a table
    occurrence from the menu. The current layout’s table occurrence will always be
    at the top with every other occurrence in the file included in one of two lists;
    related and unrelated. Any field can be added, but only those from the current
    table or a related table will work as expected. Once a field is located and selected,
    check the box to optionally create a label automatically, and click `OK` to add
    the field to the layout.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig3_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig3_HTML.jpg)


    Figure 20-3 – The dialog used to select a field reference


    ### Editing the Reference of an Existing Field


    To reassign the reference for an existing field object, open the *Specify Field*
    dialog by double-clicking on the field, choosing `Specify Field` from its contextual
    menu, or clicking the pencil icon next to the `Display data from` settings in
    the `Field` group of the `Data` panel in the `Inspector` pane.


    ## Working with Field Labels


    A *field label* is a text object placed adjacent to a field to help users identify
    its content. A label can be created manually by inserting a text object or automatically
    using the `Create label` option in the `Specify Field` dialog. Once created, these
    can be edited, moved, formatted, and manipulated like any other text object. Labels
    created automatically remain *dynamically linked* to the field name as long as
    they haven’t been manually edited. In this case, if the field’s defined name is
    modified in the schema, the label automatically updates to reflect the new name.
    A label for an existing field can be added later by double-clicking the field
    to reopen the `Specify Field` dialog and selecting the `Create label` box and
    clicking `OK`. The label will reappear as a dynamically linked value next to the
    existing field object.


    ## Configuring a Field’s Control Style


    A *control style* is a layout setting that modifies the appearance and entry options
    for a field to streamline data entry. A field can be assigned one of seven types
    available in the `Control style` menu in the `Field` group on the `Data` tab of
    the `Inspector` pane, shown in Figure [20-4](#429700_2_En_20_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig4_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig4_HTML.jpg)


    Figure 20-4 – The menu of available field control styles'
