- fmt: "# Understanding Contextual Access\n\nEach layout is assigned a table occurrence\
    \ and acts as an *interface context* that corresponds to the *relational context*\
    \ of that assignment. This extends a specific relational perspective from the\
    \ back-end data to the front-end interface, rendering an intersecting context\
    \ point where users and scripts can create, delete, edit, find, print, and view\
    \ records stored in the underlying table. The occurrence assignment determines\
    \ which records and fields are accessible when the layout is current. Any field\
    \ that is local to a layout’s occurrence or is in an occurrence related to that\
    \ occurrence can be placed on the layout, viewed by the user, and used in calculations\
    \ embedded into layout objects, scripts, and menus.\n\nThe illustration in Figure\
    \ [17-1](#429700_2_En_17_Chapter.xhtml#Fig1) shows a user viewing a *Contacts\
    \ – Entry* layout that displays records from the *Contacts* table through the\
    \ context of the primary *Contacts* table occurrence. Any field from the *Contacts*\
    \ table placed on that layout will render the value stored for the current record\
    \ being viewed. Additionally, fields from the *Company* table can be placed on\
    \ the layout by way of the *Contacts | Company* occurrence. This will automatically\
    \ pull record(s) based on the relationship criteria between the two occurrences\
    \ and only display matching records (Chapter [9](#429700_2_En_9_Chapter.xhtml)).\
    \ The *Contact – List* layout is assigned the same occurrence, so it displays\
    \ records from the same relational context. Switching between these two contact\
    \ layouts within the same window will retain the current record and current found\
    \ set. By contrast, the *Company – List* layout shows records from the *Company*\
    \ table through the primary *Company* occurrence but can’t include fields from\
    \ *Contacts* since those two occurrences aren’t currently related.\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig1_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig1_HTML.jpg)\n\
    \nFigure 17-1  \nAn illustration of how tables, occurrences, layouts, and windows\
    \ interconnect to present an interface\n\n# Anatomizing a Layout\n\nA *layout*\
    \ is a configurable space that contains a stack of one or more horizontal regions\
    \ that create a single screen or page. As discussed in forthcoming chapters, these\
    \ *layout parts* come in a variety of types, each with inherent and configurable\
    \ properties that determine their rendered appearance and behavior. Parts can\
    \ be added, rearranged, and configured in various combinations depending on the\
    \ functional needs of the layout. Fields and other objects placed onto parts have\
    \ their own inherent and configurable properties. Together these elements define\
    \ a layout. When rendered in Browse mode, a layout can be viewed in different\
    \ ways when a user or script chooses from the developer-enabled *content views*\
    \ or changes the window mode (Chapter [3](#429700_2_En_3_Chapter.xhtml)). The\
    \ illustration in Figure [17-2](#429700_2_En_17_Chapter.xhtml#Fig2) shows the\
    \ general anatomy using the example of a simple layout and the variety of viewing\
    \ options that control how it is rendered for the user.\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig2_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig2_HTML.jpg)\n\
    \nFigure 17-2  \nAn illustration of the anatomy of a layout\n\n# Planning Layouts\n\
    \nLayouts will vary in complexity based on their purpose, the needs of a given\
    \ workflow, budgetary restrictions, and the skills of the developer-designer.\
    \ A quickly constructed spreadsheet-like table view can provide the ad hoc simplicity\
    \ that adequately serves a specific need. In a modern workplace, populated with\
    \ sophisticated professional users, a more elaborate design is usually more appropriate\
    \ and may even be expected. Poorly designed layouts become a cluttered, confusing,\
    \ visual nightmare that frustrates a user’s ability to work. Such “solutions”\
    \ tend to cause more problems than they solve. A well-designed layout can range\
    \ from a modest but practical design up through an artistically expressed, robustly\
    \ featured, efficiently visualized, graphical masterpiece that anticipates a user’s\
    \ needs and extends powerful, time-saving tools for manipulating and repurposing\
    \ data in a convenient and intuitive way. Whatever the approach, layout design\
    \ and planning is important. The entire experience a user has with a database\
    \ is *through* a layout. The appearance and functionality of that layout design\
    \ will greatly influence their evaluation of the database and of *you* as its\
    \ developer.\n\n> **Caution**  \n> When learning or building a proof of concept,\
    \ design can be temporarily less important. Examples in this book are created\
    \ plainly for demonstration and not intended as examples of good design!\n\nWhen\
    \ designing an interface, start by making a list of the layouts you envision for\
    \ each table. Typically, every table requires at least one List and one Form layout\
    \ to allow users to perform basic functions, e.g., scrolling through a found set\
    \ to locate a desired record and then navigating to an expanded layout for viewing\
    \ and data entry. Beyond that, layouts will vary based on the nature of the information,\
    \ the company workflow, and other considerations. Some tables require layouts\
    \ for printing envelopes, labels, or financial reports. Others require layouts\
    \ for special data entry tasks or for interactions with the smaller screens of\
    \ mobile devices. Layouts can be created to act as dialogs that inform and guide\
    \ users or to provide workspaces optimized for specific tasks. Additional layouts\
    \ can be added at any time during development and even after deployment, so it\
    \ isn’t necessary to plan every layout upfront. But a good starting plan is important.\n\
    \nAfter creating a list of desired layouts, connect them into a navigational flow\
    \ chart to help visualize how the user will move around the interface. Even a\
    \ rough sketch can be helpful, like the one shown in Figure [17-3](#429700_2_En_17_Chapter.xhtml#Fig3).\
    \ The diagram shows a rough representation of the *Learn FileMaker* database with\
    \ an added menu layout and various placeholders for hypothetical future layouts.\
    \ Remember, the navigational arrows are illustrating a general interface connection\
    \ between layouts. In the actual interface, navigation functions may be much more\
    \ complex depending on the number of tables, the relationships between them, the\
    \ style of the navigational controls you develop, and other factors. For now,\
    \ the diagram simply gives you a “big picture” overview of the flow. Once you\
    \ have at least a rough plan prepared, enter Layout mode and begin exploring the\
    \ environment used to design interfaces.\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig3_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3  \nA rough sketch of a simple layout flow with expansion placeholders\n\
    \nLayout names can take whatever form you want. Ideally, they include the name\
    \ of the table they represent and something to describe their general function.\
    \ Although FileMaker allows layouts with the same name, keep the names unique\
    \ to avoid confusion. The *Learn FileMaker* demo files use the name of the primary\
    \ table for the main Form layout and the same plus a descriptor for other layouts,\
    \ e.g., *Invoice*, *Invoice List*, and *Invoice Report*."
  raw: '## Understanding Contextual Access


    Each layout is assigned a table occurrence and acts as an *interface context*
    that corresponds to the *relational context* of that assignment. This extends
    a specific relational perspective from the back-end data to the front-end interface,
    rendering an intersecting context point where users and scripts can create, delete,
    edit, find, print, and view records stored in the underlying table. The occurrence
    assignment determines which records and fields are accessible when the layout
    is current. Any field that is local to a layout’s occurrence or is in an occurrence
    related to that occurrence can be placed on the layout, viewed by the user, and
    used in calculations embedded into layout objects, scripts, and menus.


    The illustration in Figure [17-1](#429700_2_En_17_Chapter.xhtml#Fig1) shows a
    user viewing a *Contacts – Entry* layout that displays records from the *Contacts*
    table through the context of the primary *Contacts* table occurrence. Any field
    from the *Contacts* table placed on that layout will render the value stored for
    the current record being viewed. Additionally, fields from the *Company* table
    can be placed on the layout by way of the *Contacts | Company* occurrence. This
    will automatically pull record(s) based on the relationship criteria between the
    two occurrences and only display matching records (Chapter [9](#429700_2_En_9_Chapter.xhtml)).
    The *Contact – List* layout is assigned the same occurrence, so it displays records
    from the same relational context. Switching between these two contact layouts
    within the same window will retain the current record and current found set. By
    contrast, the *Company – List* layout shows records from the *Company* table through
    the primary *Company* occurrence but can’t include fields from *Contacts* since
    those two occurrences aren’t currently related.


    ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig1_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig1_HTML.jpg)


    Figure 17-1


    An illustration of how tables, occurrences, layouts, and windows interconnect
    to present an interface


    ## Anatomizing a Layout


    A *layout* is a configurable space that contains a stack of one or more horizontal
    regions that create a single screen or page. As discussed in forthcoming chapters,
    these *layout parts* come in a variety of types, each with inherent and configurable
    properties that determine their rendered appearance and behavior. Parts can be
    added, rearranged, and configured in various combinations depending on the functional
    needs of the layout. Fields and other objects placed onto parts have their own
    inherent and configurable properties. Together these elements define a layout.
    When rendered in Browse mode, a layout can be viewed in different ways when a
    user or script chooses from the developer-enabled *content views* or changes the
    window mode (Chapter [3](#429700_2_En_3_Chapter.xhtml)). The illustration in Figure
    [17-2](#429700_2_En_17_Chapter.xhtml#Fig2) shows the general anatomy using the
    example of a simple layout and the variety of viewing options that control how
    it is rendered for the user.


    ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig2_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig2_HTML.jpg)


    Figure 17-2


    An illustration of the anatomy of a layout


    ## Planning Layouts


    Layouts will vary in complexity based on their purpose, the needs of a given workflow,
    budgetary restrictions, and the skills of the developer-designer. A quickly constructed
    spreadsheet-like table view can provide the ad hoc simplicity that adequately
    serves a specific need. In a modern workplace, populated with sophisticated professional
    users, a more elaborate design is usually more appropriate and may even be expected.
    Poorly designed layouts become a cluttered, confusing, visual nightmare that frustrates
    a user’s ability to work. Such “solutions” tend to cause more problems than they
    solve. A well-designed layout can range from a modest but practical design up
    through an artistically expressed, robustly featured, efficiently visualized,
    graphical masterpiece that anticipates a user’s needs and extends powerful, time-saving
    tools for manipulating and repurposing data in a convenient and intuitive way.
    Whatever the approach, layout design and planning is important. The entire experience
    a user has with a database is *through* a layout. The appearance and functionality
    of that layout design will greatly influence their evaluation of the database
    and of *you* as its developer.


    Caution


    When learning or building a proof of concept, design can be temporarily less important.
    Examples in this book are created plainly for demonstration and not intended as
    examples of good design!


    When designing an interface, start by making a list of the layouts you envision
    for each table. Typically, every table requires at least one List and one Form
    layout to allow users to perform basic functions, e.g., scrolling through a found
    set to locate a desired record and then navigating to an expanded layout for viewing
    and data entry. Beyond that, layouts will vary based on the nature of the information,
    the company workflow, and other considerations. Some tables require layouts for
    printing envelopes, labels, or financial reports. Others require layouts for special
    data entry tasks or for interactions with the smaller screens of mobile devices.
    Layouts can be created to act as dialogs that inform and guide users or to provide
    workspaces optimized for specific tasks. Additional layouts can be added at any
    time during development and even after deployment, so it isn’t necessary to plan
    every layout upfront. But a good starting plan is important.


    After creating a list of desired layouts, connect them into a navigational flow
    chart to help visualize how the user will move around the interface. Even a rough
    sketch can be helpful, like the one shown in Figure [17-3](#429700_2_En_17_Chapter.xhtml#Fig3).
    The diagram shows a rough representation of the *Learn FileMaker* database with
    an added menu layout and various placeholders for hypothetical future layouts.
    Remember, the navigational arrows are illustrating a general interface connection
    between layouts. In the actual interface, navigation functions may be much more
    complex depending on the number of tables, the relationships between them, the
    style of the navigational controls you develop, and other factors. For now, the
    diagram simply gives you a “big picture” overview of the flow. Once you have at
    least a rough plan prepared, enter Layout mode and begin exploring the environment
    used to design interfaces.


    ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig3_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig3_HTML.jpg)


    Figure 17-3


    A rough sketch of a simple layout flow with expansion placeholders


    Layout names can take whatever form you want. Ideally, they include the name of
    the table they represent and something to describe their general function. Although
    FileMaker allows layouts with the same name, keep the names unique to avoid confusion.
    The *Learn FileMaker* demo files use the name of the primary table for the main
    Form layout and the same plus a descriptor for other layouts, e.g., *Invoice*,
    *Invoice List,* and *Invoice Report*.'
  trans: "\n# 理解上下文访问\n\n每个布局都分配了一个表出现，并充当一个*界面上下文*，该上下文对应于该分配的*关系上下文*。这从后端数据向用户界面延伸出一个特定的关系视角，形成一个交叉的上下文点，用户和脚本可以在此创建、删除、编辑、查找、打印和查看存储在基础表中的记录。该出现分配决定了在布局处于当前状态时可以访问哪些记录和字段。任何属于布局表出现本地的字段，或者与表出现相关的其他出现中的字段，都可以放置在布局上、供用户查看，并用于嵌入到布局对象、脚本和菜单中的计算。\n\
    \n图 17-1 中的插图展示了一个用户正在查看*联系人 – 录入*布局，该布局通过主要*联系人*表出现的上下文显示来自*联系人*表的记录。任何来自*联系人*表并放置在该布局上的字段，都将呈现当前正在查看的记录所存储的值。此外，通过*联系人\
    \ | 公司*出现，可以将来自*公司*表的字段放置在布局上。这将根据两个出现之间的关系标准自动拉取记录，并仅显示匹配的记录（第 9 章）。*联系人 – 列表*布局分配了相同的出现，因此它显示来自相同关系上下文的记录。在同一窗口中切换这两个联系人布局将保留当前记录和当前找到集。相比之下，*公司\
    \ – 列表*布局通过主要的*公司*出现显示来自*公司*表的记录，但不能包含来自*联系人*表的字段，因为这两个出现目前没有关联。\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig1_HTML.jpg](img/429700_2_En_17_Fig1_HTML.jpg)\n\
    \n**图 17-1**  \n表、出现、布局和窗口如何相互连接以呈现界面的示意图\n\n# 剖析布局\n\n*布局*是一个可配置的空间，包含一个或多个水平区域的堆栈，这些区域构成单个屏幕或页面。如后续章节所述，这些*布局部分*有多种类型，每种类型都具有固有的和可配置的属性，这些属性决定了它们的渲染外观和行为。根据布局的功能需求，可以添加、重新排列和配置不同组合的部分。放置在部分上的字段和其他对象具有其自身的固有和可配置属性。这些元素共同定义了一个布局。在浏览模式下渲染时，当用户或脚本从开发者启用的*内容视图*中选择或更改窗口模式时（第\
    \ 3 章），布局可以以不同的方式查看。图 17-2 中的插图使用一个简单布局的示例展示了常规的布局结构，以及控制其如何为用户渲染的各种查看选项。\n\n\
    ![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig2_HTML.jpg](img/429700_2_En_17_Fig2_HTML.jpg)\n\
    \n**图 17-2**  \n布局结构示意图\n\n# 规划布局\n\n布局的复杂性将根据其用途、特定工作流程的需求、预算限制以及开发设计人员的技能而有所不同。一个快速构建的类似电子表格的表格视图可以提供满足特定需求的临时简便性。在充满经验丰富的专业用户的现代工作场所中，更精致的设计通常更合适，甚至可能是期望的。设计不佳的布局会变得杂乱、令人困惑、视觉上如同噩梦，从而挫伤用户的工作能力。这样的“解决方案”往往带来的问题比解决的更多。一个设计良好的布局，范围可以从朴素但实用的设计，一直到艺术表现、功能强大、可视化高效、预测用户需求并以便捷直观的方式提供强大省时工具来操作和重新利用数据的图形化杰作。无论采用何种方法，布局设计和规划都很重要。用户与数据库的整个体验都是*通过*布局进行的。该布局设计的外观和功能将极大地影响他们对数据库以及作为其开发者的*您的*评价。\n\
    \n> **警告**  \n> 在学习或构建概念验证时，设计可以暂时不那么重要。本书中的示例仅出于演示目的而简单创建，并不旨在作为优秀设计的范例！\n\n\
    在设计界面时，首先为你为每个表设想的布局列出清单。通常，每个表至少需要一个列表布局和一个表单布局，以允许用户执行基本功能，例如，滚动查找集以定位所需记录，然后导航到展开的布局进行查看和数据录入。除此之外，布局将根据信息的性质、公司工作流程以及其他考虑因素而有所不同。有些表需要用于打印信封、标签或财务报表的布局。其他表则需要用于特殊数据录入任务或与移动设备小屏幕交互的布局。可以创建布局作为告知和引导用户的对话框，或者提供针对特定任务优化的工作区。在开发期间甚至部署后，可以随时添加额外的布局，因此不必预先规划每一个布局。但一个好的初始计划很重要。\n\
    \n在创建了所需布局的列表后，将它们连接成一个导航流程图，以帮助直观地了解用户将如何在界面中移动。即使是一张粗略的草图也很有帮助，例如图 17-3 中所示。该图显示了*学习\
    \ FileMaker*数据库的粗略表示，其中包含一个添加的菜单布局和用于假设的未来布局的各种占位符。请记住，导航箭头说明了布局之间的大致界面连接。在实际界面中，导航功能可能复杂得多，具体取决于表的数量、它们之间的关系、你开发的导航控件样式以及其他因素。目前，此图只是为你提供了一个流程的“大图”概览。一旦你至少有了一份粗略的计划，就可以进入布局模式并开始探索用于设计界面的环境。\n\
    \n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig3_HTML.jpg](img/429700_2_En_17_Fig3_HTML.jpg)\n\
    \n**图 17-3**  \n一个带有扩展占位符的简单布局流程的粗略草图\n\n布局名称可以采用你想要的任何形式。理想情况下，它们包含所代表表的名称以及描述其一般功能的某些内容。尽管\
    \ FileMaker 允许布局同名，但请保持名称唯一以避免混淆。*学习 FileMaker* 演示文件使用主表的名称作为主要表单布局的名称，对于其他布局，则使用相同名称加上描述符，例如*发票*、*发票列表*和*发票报表*。\n"
- fmt: "# Using Layout Mode\n\n`Layout mode` is an alternate window state in which\
    \ the whole application environment is transformed to accommodate layout design\
    \ work. In this mode, the toolbar buttons and menu items change to provide control\
    \ over interface-related functions. Each side of the window has optional layout\
    \ panes that provide access to fields, objects, add-ons, and configuration settings\
    \ (Chapter [19](#429700_2_En_19_Chapter.xhtml)). The entire content area becomes\
    \ an editable workspace where you can add, configure, and style objects to control\
    \ how things will be rendered in other modes (Chapters [20](#429700_2_En_20_Chapter.xhtml)\
    \ and [21](#429700_2_En_21_Chapter.xhtml)). Layout mode can be initiated selecting\
    \ the `View ➤ Layout Mode` menu or clicking the `Edit Layout` button in the toolbar.\n\
    \n## Status Toolbar (Layout Mode)\n\nWhen a window is placed into Layout mode,\
    \ the options available in the toolbar will change dramatically. The Browse mode\
    \ controls for managing records, and performing data entry tasks will be replaced\
    \ with tools for adding objects to the layout and performing other design-related\
    \ functions. The controls available will be either the default Layout mode items\
    \ or the user’s customized set.\n\n### Default Status Toolbar Items (Layout Mode)\n\
    \nThe default status toolbar for Layout mode is shown in Figure [17-4](#429700_2_En_17_Chapter.xhtml#Fig4).\n\
    \n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig4_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Fig4_HTML.jpg)\n\
    \nFigure 17-4\n\nThe status toolbar for Layout mode\n\n1. Navigation controls\n\
    2. New Layout/Report button\n3. Layout tools\n4. Developer menu and pane toggling\n\
    5. Layout menu\n6. Layout Settings button\n7. Theme Selection\n8. Screen and Device\
    \ Dimension menu\n9. Formatting Bar button\n10. Exit Layout button\n\n#### Navigation\
    \ Controls\n\nAt the top left of the toolbar are navigation controls that appear\
    \ and function similar to Browse mode (Chapter [3](#429700_2_En_3_Chapter.xhtml))\
    \ except they refer to and control *layouts* rather than *records*. The total\
    \ refers to the total number of layouts that exist in the current file, and the\
    \ number in the text box indicates which layout is being viewed.\n\n> **Caution**\n\
    > \n> Although included here, recent versions of FileMaker *exclude* navigation\
    \ controls from the default Layout mode toolbar. Customize the toolbar to add\
    \ these essential tools.\n\n#### New Layout/Report Button\n\nThe only function\
    \ button present in the default toolbar is `New Layout/Report` which starts the\
    \ process of creating a new layout (Chapter [18](#429700_2_En_18_Chapter.xhtml)).\
    \ Other function buttons, such as `Delete Layout` and `Duplicate Layout`, can\
    \ be added by customizing the toolbar.\n\n#### Layout Tools\n\nThe central row\
    \ of icons are layout object tools, which are defined in Table [17-1](#429700_2_En_17_Chapter.xhtml#Tab1).\
    \ Most are *object-creation tools* that are used to insert a new instance of an\
    \ object (Chapter [20](#429700_2_En_20_Chapter.xhtml)). The majority of those\
    \ are *draw-mode activation tools* that, once selected, allow object creation\
    \ by clicking and dragging within the layout creation area. Each of these is a\
    \ transitory selection which deactivates and reverts to the selection tool after\
    \ an object is created. Double-click one of these to lock it and allow rapid creation\
    \ of multiple objects of the same type one after another without having to reselect\
    \ the tool. The tool will then remain active until another tool is selected. Many\
    \ tools have dual modes: click to create a default object type or click-hold to\
    \ reveal a menu of similar object types. Two of the object-creation tools are\
    \ *drag-insertion tools* which are click-dragged from the toolbar onto the content\
    \ area to initiate the creation of a field or layout part. Finally, two tools\
    \ are *object manipulation tools* which are used to select an object or apply\
    \ formatting.\n\nTable 17-1\n\nEach layout tool defined\n\n| Icon | Tool Description\
    \ |\n| --- | --- |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figa_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figa_HTML.jpg)\
    \ | `Selection tool` – Select objects on the layout to move or configure them.\
    \ |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figb_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figb_HTML.jpg)\
    \ | `Text tool` – Add or edit text on a layout or in object types like buttons,\
    \ tabs, etc. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figc_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figc_HTML.jpg)\
    \ | `Line tool` – Draw a line on a layout. Hold the `Shift` key to lock for a\
    \ straight horizontally or vertically line. Hold `Option` to lock to a 45-degree\
    \ angle. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figd_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figd_HTML.jpg)\
    \ | `Shape menu` – Click to select the `Rectangle` shape tool or click-hold to\
