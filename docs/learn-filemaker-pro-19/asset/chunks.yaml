- fmt: "### Moving the File into the Databases Folder\n\nThe server stores hosted\
    \ files in a `Databases` subfolder of the `FileMaker Server` folder. If installed\
    \ into the default location, this folder will be in one of two locations depending\
    \ on the operating system, in the `Library` folder on macOS or in the `Program\
    \ Files` folder on Windows, both shown in the following. To manually install files,\
    \ simply drag them into the `Databases` folder. However, when adding files this\
    \ way, you must manually assign them to the `fmserver` user and `fmsadmin` group.\n\
    \n```\n/Library/FileMaker Server/Data/Databases\n[drive]:\\Program Files\\FileMaker\\\
    FileMaker Server\\Data\\Databases\\\n```\n\n**Caution**  \nIf databases are actively\
    \ hosted by the server, removing, replacing, or directly opening them with `FileMaker\
    \ Pro` desktop application will cause major corruption. Confirm files are not\
    \ actively hosted before performing any of these functions.\n\n### Uploading a\
    \ File from a Client Computer\n\nA database file created on a client computer\
    \ can be uploaded directly to a server through the `FileMaker Pro` desktop application.\
    \ For FileMaker Cloud, this is the only method available for uploading a file\
    \ to the server. Open the `Upload to Host` dialog by selecting the `Upload to\
    \ Host` option from the `Sharing` submenu or the `Sharing` icon menu in the toolbar.\
    \ The dialog is similar to the `Hosts` dialog with a sidebar for selecting a host,\
    \ as shown in Figure [29-6](#429700_2_En_29_Chapter.xhtml#Fig6). Once selected,\
    \ sign into the host to begin adding databases.\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig6_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig6_HTML.jpg)\n\
    \n**Figure 29-6** — The sign-in dialog is used to upload to a host\n\nAfter entering\
    \ admin credentials for the selected host, the main panel changes to a list of\
    \ database uploads, as shown in Figure [29-7](#429700_2_En_29_Chapter.xhtml#Fig7).\
    \ Drag database files into the list or click the `Browse` button to select them\
    \ through a dialog.\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig7_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig7_HTML.jpg)\n\
    \n**Figure 29-7** — The dialog showing database file(s) to be uploaded\n\nAs databases\
    \ are added, FileMaker runs a consistency check to determine the health of the\
    \ file and checks to see if it has security adequate for hosting. In the preceding\
    \ example, the first has a password-protected `Admin` account, while the second\
    \ file has no password and has been rejected. Enable the checkbox next to a file\
    \ to include it in the upload. The checkbox at the bottom of the dialog will cause\
    \ files to automatically open on the server after the upload is complete.\n\n\
    ## Managing Database Files\n\nTo manage hosted databases, log into the `Admin\
    \ Console` and click on the `Databases` tab. A drop-down menu next to each database\
    \ in the list contains the following management commands:\n\n- `Open` – Opens\
    \ the database for network access. This will require entry of a password if the\
    \ file is encrypted.\n- `Close` – Close and cease hosting the database.\n- `Download`\
    \ – Download a copy of a closed database to the local hard drive. In macOS, this\
    \ feature will not work if pop-up windows are blocked by the browser preferences!\n\
    - `Remove` – Remove a closed database from the list by placing it into a special\
    \ folder in the `Databases` folder that is not available for hosting.\n- `Verify`\
    \ – Close, verify, and reopen a database.\n- `Clear the Encryption Passwords`\
    \ – Remove the encryption password from the selected database file(s).\n\n**Tip**\
    \  \nA similar menu at the top of the database list mirrors these options but\
    \ with commands that affect all databases.\n\n## Restarting a Server Computer\n\
    \nWhen the server is actively hosting files, it may be communicating with clients,\
    \ holding recent changes in cache, or be in the middle of writing those changes\
    \ to disk. A file might become corrupt if the server process is force quit or\
    \ hardware is abruptly forced to shut down. To avoid damage, it is important to\
    \ avoid certain risks and properly close databases. Always use an adequate uninterruptible\
    \ power supply (UPS) device, and close all databases in the `Admin Console` prior\
    \ to shutting down a computer. Never force quit the application or perform a hard\
    \ reboot of the computer without first closing files unless absolutely necessary\
    \ due to a major crash or malfunction.\n\n## Using the Command-Line Interface\n\
    \nThe `fmsadmin` command-line tool allows administration of the server using the\
    \ `Terminal` app (macOS) or the command prompt (Windows). These commands are automatically\
    \ installed with the server in the following platform-specific folder(s):\n\n\
    ```\nmacOS = /Library/FileMaker Server/Database Server/bin/fmsadmin\nmacOS (symbolic\
    \ link) = /usr/bin/fmsadmin\nWindows = [drive]:\\Program Files\\FileMaker\\FileMaker\
    \ Server\\Database Server\\fmsadmin.exe\n```\n\n### Formatting a fmsadmin Command\n\
    \nThe formula for a command is: `fmsadmin <command> <options>`. For example, to\
    \ get a list of all hosted databases, type the following command into the Terminal\
    \ and type Enter.\n\n```\nfmsadmin list files\n```\n\nCertain functions require\
    \ authentication and will prompt you to enter the server administrator username\
    \ and password. Optionally, you can include credential information with the command\
    \ to avoid the secondary prompt. Simply add them as shown in the pattern and example\
    \ here:\n\n```\nfmsadmin  -u  -p\nfmsadmin list files –u Admin –p J56TF3\n```\n\
    \n### Available fmsadmin Commands\n\nThe `fmsadmin` tool contains the following\
    \ commands, each with various options available:\n\n- `autorestart` – Get or set\
    \ the auto-restart feature of the server\n- `backup` – Back up one database or\
    \ every database in a folder\n- `clearkey` – Remove saved database encryption\
    \ passwords\n- `close` – Close one or more databases\n- `certificate` – Manage\
    \ SSL certificates\n- `disable` – Disable schedules or statistics logging\n- `disconnect`\
    \ – Disconnect one or more clients\n- `enable` – Enable schedules or statistics\
    \ logging\n- `help` – Get help with available commands\n- `list` – List clients,\
    \ databases, plug-ins, or schedules\n- `open` – Start hosting databases\n- `pause`\
    \ – Temporarily stop the database server\n- `remove` – Move files out of the Databases\
    \ folder\n- `resetpw` – Reset the admin user password\n- `restart` – Restart the\
    \ server, adminserver, FMSE, WPE, or XDBC process\n- `resume` – End a temporary\
    \ pause of the database server\n- `run` – Run a schedule\n- `send` – Send a message\
    \ to connected users\n- `standby` – Manage standby server connections, roles,\
    \ and updates\n- `start` – Start the server, adminserver, FMSE, WPE, or XDBC process\n\
    - `status` – Get the status of clients or databases\n- `stop` – Stop the server,\
    \ adminserver, FMSE, WPE, or XDBC process\n- `verify` – Check the consistency\
    \ of databases\n\n### Getting Detailed Command Help\n\nTo get more information\
    \ about a command, type “help” followed by the name of the command. For example,\
    \ type `fmsadmin help close` to return a help page for the `close` command, as\
    \ shown in Figure [29-8](#429700_2_En_29_Chapter.xhtml#Fig8).\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig8_HTML.jpg](images/429700_2_En_29_Chapter/429700_2_En_29_Fig8_HTML.jpg)\n\
    \n**Figure 29-8** — An example of the command help request"
