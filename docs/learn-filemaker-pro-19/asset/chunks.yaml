    #### OnExternalCommandReceived


    The *OnExternalCommandReceived* layout event occurs when a user presses a button
    to control playback functions on an iOS device lock screen or on an external device,
    e.g., *play*, *pause*, *stop*, *next*, and *previous*. The triggered script runs
    *before* the event occurs, and it can use the *Get ( TriggerGestureInfo )* function
    to gain information about the external event.


