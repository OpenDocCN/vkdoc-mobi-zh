    **Figure 22-2** Visualizing the number of format setting groups available for
    a button


    Styles are created and modified *through objects*. Each object type starts with
    one *Default* style. When an object''s format is modified, the changes are applied
    to the *object* but do not affect the assigned *style*. Instead, they are held
    as *unsaved object changes*. To properly use styles, these changes must be explicitly
    saved back to the assigned style or saved as a new style. When saved to the existing
    style, the changes will be automatically applied to all other objects assigned
    that style on the current layout, as illustrated in Figure [22-3](#429700_2_En_22_Chapter.xhtml#Fig3).


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig3_HTML.jpg](images/429700_2_En_22_Chapter/429700_2_En_22_Fig3_HTML.jpg)


    **Figure 22-3** Format changes must be saved to the style to update other objects


    A *theme* is a collection of styles for every object type that can be applied
    to layouts. FileMaker ships with dozens of built-in themes, some rather simple
    and others showcasing advanced styling features. Any of these can be used without
    modification, customized to meet your needs, or ignored in favor of a totally
    custom theme. A custom theme with a larger and more practical selection of styles
    can be custom-tailored to your design sensibilities and technical requirements.


    Each layout can be assigned one theme, and all of its styles become available
    for assignment to objects. Within a file, any number of different themes can be
    used. However, to easily synchronize style changes across an entire solution,
    a single theme used on every layout is recommended. In the same way that formatting
    changes made to an *object* must be saved back to a *style* in order to apply
    to other objects on a layout, changes to a *style* must be saved back to the layout''s
    *theme* in order to apply to objects on other layouts. If not saved, the copy
    of the theme for that layout accumulates *unsaved style changes*, making it an
    individualized collection, mismatched with styles on other layouts using the same
    theme. To update the theme, any changes must be explicitly saved back to the theme,
    as illustrated in Figure [22-4](#429700_2_En_22_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig4_HTML.jpg](images/429700_2_En_22_Chapter/429700_2_En_22_Fig4_HTML.jpg)


    **Figure 22-4** Style changes must be saved to the theme to update other layouts


    > **Caution:** Since style and theme updates must be explicitly saved, get into
    the habit of doing so *immediately* after making *any* format change to layout
    objects.


    ## Using Themes


    FileMaker automatically assigns a theme to every new layout based on a determination
    of the best option for the new layout type following a few basic rules. The default
    layout of a new database will always be assigned the *Enlightened* theme. A new
    *Computer* layout will always be assigned the same theme as the layout one is
    viewing when starting the layout creation process. New *Touch Device* layouts
    will be assigned the *Enlightened Touch* theme unless the built-in theme of the
    layout one is viewing has a built-in touch variant. For example, if viewing a
    layout assigned the *Luminous* theme, the new touch layout will be assigned the
    *Luminous Touch* theme. However, if viewing a layout assigned the *Cosmos* theme,
    the new touch layout will be assigned the *Enlightened Touch* theme since there
    is no available touch theme for it. Any new *Printer* layouts will be assigned
    the *Enlightened Print* theme. Once the new layout is created, you can assign
    another theme to the layout.


    > **Caution:** FileMaker does not look at custom theme names when determining
    the best default assignment for a new layout. Although you can create custom themes
    with a suffix of *Touch* and *Print*, they will not be automatically selected
    in the manner described previously.


    ### Changing a Layout''s Theme


    After a layout is created, the theme assignment can be changed using the *Change
    Theme* dialog, shown in Figure [22-5](#429700_2_En_22_Chapter.xhtml#Fig5). This
    dialog can be opened while in Layout mode by clicking the icon next to the *Theme*
    name listed in the second row of the toolbar and selecting *Change Theme* in the
    *Layout* menu, or the contextual menu on the layout''s background.


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig5_HTML.jpg](images/429700_2_En_22_Chapter/429700_2_En_22_Fig5_HTML.jpg)


    **Figure 22-5** The dialog used to select a theme assignment for the current layout


    This dialog categorizes a list of the available themes with the theme assigned
    to the current layout selected. Nothing is directly editable in the dialog. You
    can only select a theme or import themes for selection. When a different theme
    is selected and assigned, every object on the layout will be affected, depending
    on the styles available in the new theme compared to those assigned to objects
    from the old. If the new theme has a style with the same name as the one assigned
    an object, the object will retain that assignment and change the format settings
    for the style from the new theme. Style names are *not* case sensitive, so any
    name match will work. An object assigned a style name not found in the new theme
    will be assigned the *Default* style for the object''s type from the new theme.


    Most unsaved formatting changes will be lost during the theme transition. Some
    unsaved text formatting changes will be retained when the theme is changed, e.g.,
    text size. To retain unsaved formatting changes, FileMaker has a rather clever
    two-stage undo process after a theme is changed. Immediately after assigning a
    new theme to a layout, the first use of the *Undo* command will retain the new
    theme assignment but restore any object attributes that were lost due to being
    unsaved in the old theme. A second use of *Undo* will fully restore the layout
    to the previous theme. This allows you to assign a new theme on a trial basis,
    go back a half step, and have an opportunity either to save previously unsaved
    changes into new or existing styles within the newly assigned theme or to revert
    completely to the old theme.


    > **Tip:** For the best experience, avoid changing themes after designing layout
    elements. Choose a theme and use it consistently throughout your database, constantly
    updating style changes.


    ### Managing Themes


    Themes are managed from the *Manage Themes* dialog, shown in Figure [22-6](#429700_2_En_22_Chapter.xhtml#Fig6),
    which can be opened by selecting the *File ➤ Manage ➤ Themes* menu item. As you
    assign themes to layouts, they are added to this dialog.


    ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig6_HTML.jpg](images/429700_2_En_22_Chapter/429700_2_En_22_Fig6_HTML.jpg)


    **Figure 22-6** The dialog used to manage themes


    The dialog lists every theme that has been used on a layout within the database
    file, even if it is no longer in use. These remain until explicitly deleted. Built-in
    theme names will always be contained within square brackets. The *Import* button
    begins the process of copy custom themes from another database file. The *Rename*
    button allows the assignment of a new name to a custom theme. Built-in themes
    can''t be renamed, but they can be duplicated to create a new custom named theme.
    Themes can be deleted as long as they aren''t in use in the file.'
