- fmt: '### Working with Saved Finds


    Find requests can be saved for future reuse. In Browse mode, the *Saved Finds*
    menu is accessible from the *Find* button toolbar and the *Records ➤ Saved Finds*
    menu. In Find mode, it is available through the *Saved Finds* toolbar button.
    This menu is used to *save* and *manage* saved finds as well as *perform* saved
    or recent finds.


    The *Save Current Find* option will open a dialog to start the save process. A
    name can be entered, and optionally, the criteria can be edited. In Browse mode,
    the last executed find will be saved. In Find mode, the current find criteria
    entered will be saved.


    The *Edit Saved Finds* option opens a dialog of the same name, shown in Figure
    [4-9](#429700_2_En_4_Chapter.xhtml#Fig9), that is used to create, edit, duplicate,
    or delete saved finds.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig9_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig9_HTML.jpg)


    Figure 4-9


    The dialog used to view and manage saved finds


    #### Managing a Find Request


    When saving or editing a find, a *Specify Options for the Saved Find* dialog opens
    displaying the name of the find. Clicking the *Advanced* button will open the
    stored criteria in a *Specify Find Requests* dialog shown in Figure [4-10](#429700_2_En_4_Chapter.xhtml#Fig10).
    Each line in this dialog represents one request that makes up the find. Requests
    can be *created*, *edited*, *duplicated,* or *deleted* using the buttons on this
    dialog. Each request specifies an action (Find or Omit) and shows the criteria.
    Select a request and click *Edit* to open the editing dialog.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig10_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig10_HTML.jpg)


    Figure 4-10


    The dialog used to view and manage find requests in a saved find


    #### Editing a Find Request Criteria


    The *Edit Find Request* dialog, shown in Figure [4-11](#429700_2_En_4_Chapter.xhtml#Fig11),
    is used to edit a find request for a new or saved find. This dialog can be opened
    by clicking *New*, *Edit* or double-clicking on a find request in the dialog in
    Figure [4-10](#429700_2_En_4_Chapter.xhtml#Fig10). This dialog is also used by
    script steps that create find requests or perform finds (Chapter [25](#429700_2_En_4_Chapter.xhtml#Fig25),
    “Searching and Dealing with Found Sets”).


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig11_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig11_HTML.jpg)


    Figure 4-11


    The dialog used to edit a single request of a saved find


    In the dialog, you can edit the criteria of the request using the following controls:


    1.  *Action* – Choose *Find Records* or *Omit Records*, which indicates the matching
    records option for the request

    2.  *Criteria List* – Lists each field criteria defined to make up the request,
    displaying the selected row’s details below

    3.  *Table* – Select a table occurrence to find a search field

    4.  *Fields* – Select the search field

    5.  *Criteria* – The value to search for in the selected field

    6.  *Insert Operator* – Click to choose and insert an operator

    7.  Criteria Buttons – Used to *Add* a new request, *Change* the currently selected
    request, or *Remove* the selected request


    ## Working with Found Sets


    A *found set* is a group of records that are visible and navigable within the
    context of a given window. While the found set may contain *all records* within
    a table, the term generally refers to a *subset* of records generated by a search
    or other actions. Records that are not part of the found set and not actively
    visible or navigable are called the *omitted set*. Within a single window, a found
    set for each table is retained when navigating to other layouts for the same table.
    When using multiple windows, the same table can display a different found set
    in each window.


    With the toolbar hidden, it is impossible for a user to know if the found set
    consists of less than all records unless custom layout elements are created to
    display that information. Even with the toolbar visible, it’s easy to miss. A
    new user might panic at first wondering where all their records have gone when
    looking at a small found set for a table that contains a large quantity of records.
    The difference is displayed in the record count in the navigation area of the
    toolbar, as shown in Figure [4-12](#429700_2_En_4_Chapter.xhtml#Fig12). When all
    records are accessible, only the total count of records is displayed. When a subset
    is active, the first number indicates how many records make up the visible found
    set, while the second number indicates the total number of records including those
    that are omitted from the found set.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig12_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig12_HTML.jpg)


    Figure 4-12


    The record count when viewing all records (left) or a found set (right)


    ### Changing the Records in the Found Set


    The records in a found set can be changed by performing a find or one of several
    commands in the *Records* menu. The *Show All Records* command replaces the found
    set in the current window with all records in the table. The *Omit Record* command
    will move the current record from the found set to the omitted set. This can be
    used to fine-tune results by omitting individual records without the need to perform
    a new, more complex search. The *Omit Multiple* command allows the user to specify
    any number of records they wish to omit starting from the current record. For
    example, if the user is viewing the first record of a found set of 100 records
    and choose to omit 10 records, the first 10 records will be omitted leaving the
    remaining 90 records. However, if they are viewing record 50 of 100 and do the
    same thing, then records 50–59 will be omitted leaving records 1–49 and 60–100.
    Finally, the *Show Omitted Only* command replaces the current found set with the
    omitted set. Alternatively, click the circle icon in the navigation area of the
    toolbar to toggle between the found or omitted records.'
