    user account(s) and user group are created in the operating system of the host
    *FileMaker Server* computer. The account inside the database identifies the group
    name that a user must be a member of externally in order to gain the selected
    level of access defined. This allows one or more users to log into the database
    using their externally defined credentials and gain access to specific database
    features based on membership in an externally defined user group. To create a
    new *External Server* account, open the *Manage Security* dialog, and follow the
    steps shown in Figure [30-4](#429700_2_En_30_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig4_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig4_HTML.jpg)


    Figure 30-4


    The process for configuring an external account


    1.  Click the *New* button to add a new account to the list.


    2.  Select *External Server* as the authentication method.


    3.  Enter a *Group Name* that is defined on the external server, remembering that
    these are case-sensitive.


    4.  Select a *Privilege Set* to determine the permissions granted to any user
    who signs in as a member of that group.


    Tip


    On macOS, the externally defined users can be *Sharing Only* accounts to avoid
    creating unnecessary directories and resources.


    #### Enabling FileMaker Server External Authentication


    Users can only log in using an external account when the database is hosted on
    a *FileMaker Server* or that is configured to explicitly allow authentication
    from external accounts. To confirm this for FileMaker Server version 19, follow
    these steps :


    1.  Open and sign into the *Admin Console* (Chapter [29](#429700_2_En_29_Chapter.xhtml)).


    2.  Click the *Administration* tab along the top.


    3.  Click on *External Authentication* in the sidebar.


    4.  Under the *Database Sign In* heading, enable *External Server Accounts*.


    ## Exploring Privilege Sets


    A *privilege set* is a collection of permissions defining a level of access to
    data, layout, and other features. Once defined, a privilege set can be assigned
    to one or more user accounts to establish their abilities within the database.
    To view, create, and edit privilege sets, open the *Manage Security* dialog and
    click the *Advanced Settings* button. This will open an *Advanced Security Settings*
    dialog, shown in Figure [30-5](#429700_2_En_30_Chapter.xhtml#Fig5). Click the
    *Privilege Sets* tab to view the list of defined sets.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig5_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig5_HTML.jpg)


    Figure 30-5


    The dialog used to define sets of access privileges for user accounts


    ### Default Privilege Sets


    Every database will have three default privilege sets. Each of these has a square
    bracket around their names and are non-editable except for the ability to enable
    and disable *extended privileges* .


    *   *Full Access* – Allows unrestricted access to *every available feature* and
    all content. This should be reserved for developers only. FileMaker requires at
    least one account that allows full access.


    *   *Data Entry Only* – Provides limited access to only data entry work. Users
    assigned this set can create, edit, and delete records in every table. They can
    use but not structurally alter layouts, scripts, and value lists. They can print
    and export. They are automatically disconnected from a server when idle, and they
    can change their own account password.


    *   *Read-Only Access* – Similar to the preceding one but more with no access
    to modify content or structure in any way.


    ### Creating Custom Privilege Sets


    To create a new privilege set, open the *Advanced Security Settings* dialog, click
    on *Privilege Sets* tab, and click the *New* button. This will open a new empty
    set in the *Edit Privilege Set* dialog, shown in Figure [30-6](#429700_2_En_30_Chapter.xhtml#Fig6).
    By default, a new set allows almost no access. Enter a name, optional description,
    and then begin enabling the desired permissions which are grouped into three categories:


    *   *Data Access and Design Privileges* – Allow access by resource type: *Records*,
    *Layouts*, *Value List,* and *Scripts*


    *   *Other Privilege* – A mixture of miscellaneous features


    *   *Extended Privileges* – Enables specific capabilities, ten default options
    that can be expanded


    Caution


    A custom privilege set cannot grant developer access to modify the structural
    schema (table, fields, and relationships). Only the default, unalterable *Full
    Access* privilege set allows editing these.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig6_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig6_HTML.jpg)


    Figure 30-6


    The dialog used to edit permissions for a privilege set


    #### Configuring Data Access and Design Settings


    The first set of privilege settings define *data access and design* permissions.
    These control the actions users can perform by resource type: *Records*, *Layouts*,
    *Value Lists*, and *Scripts*. Each has a menu of several options that control
    access to all entities within its class and an option to assign *custom privileges*
    to individual objects instead.'
  trans: '

    ### 为默认账户添加密码


    要开始探索账户的配置选项，首先为默认的 `Admin` 账户添加密码。在列表中选择该账户，即可在右侧打开详情面板，如图 30-2 所示。点击铅笔图标打开`设置密码`对话框，然后输入新密码。如有需要，您还可以将`账户名称`修改为更具描述性或更个性化的名称，例如“开发者”或您的名字。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig2_HTML.jpg](img/429700_2_En_30_Fig2_HTML.jpg)


    图 30-2

    选定账户的面板，显示更改密码按钮


    在输入密码后关闭`管理安全性`对话框时，FileMaker 会弹出一个`验证访问`对话框，以确保您知道具有完全访问权限的`账户名称`和`密码`。这有助于确保您不会失去对文件的访问权限。请务必记下您输入的密码，以免忘记！


    下次打开数据库文件时，登录对话框将要求您输入`账户名称`和`密码`。`账户名称`默认为计算机名称，并不一定表示该账户可以访问。请输入您的凭据，然后点击`登录`重新获得访问权限。


    **注意：** 密码可以是任意长度，并可包含任何字符。但是，为了确保与 WebDirect 兼容，密码应限制为不含重音或非罗马字符的 ASCII 字符。密码区分大小写，因此请注意
    Shift 锁定键。


    ### 创建 FileMaker 文件账户


    `FileMaker 文件`账户定义了用户的登录凭据和权限，这些信息将存储在内部，即使在未托管于服务器上时也可用于访问文件。首先，打开`管理安全性`对话框，按照图
    30-3 所示的步骤进行操作。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig3_HTML.jpg](img/429700_2_En_30_Fig3_HTML.jpg)


    图 30-3

    配置内部账户的流程


    1. 点击`新建`按钮，在列表中添加一个新账户。默认情况下，该账户将为`活跃`状态并被选中，准备进行配置。

    2. 确认身份验证选项为`FileMaker 文件`。

    3. 输入一个账户名称，例如“张三”。

    4. 点击铅笔图标输入密码。若要强制用户将密码更改成私密密码，请勾选`要求下次登录时更改密码`复选框。

    5. 选择`权限集`以确定授予用户的权限（将在本章后面讨论）。


    ### 创建外部服务器账户


    `外部服务器`账户定义了用户组的权限。实际的用户账户和用户组是在主机`FileMaker Server`计算机的操作系统中创建的。数据库内的账户标识了用户必须在外部是其成员才能获得所定义选定访问权限级别的组名称。这允许一个或多个用户使用其外部定义的凭据登录数据库，并基于在外部定义的用户组中的成员身份，获得对特定数据库功能的访问权限。要创建新的`外部服务器`账户，请打开`管理安全性`对话框，并按照图
    30-4 所示的步骤进行操作。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig4_HTML.jpg](img/429700_2_En_30_Fig4_HTML.jpg)


    图 30-4

    配置外部账户的流程


    1. 点击`新建`按钮，在列表中添加一个新账户。

    2. 选择`外部服务器`作为身份验证方法。

    3. 输入在外部服务器上定义的`组名称`，请注意这些名称是区分大小写的。

    4. 选择`权限集`，以确定授予任何以该组成员身份登录的用户的权限。


    **提示：** 在 macOS 上，外部定义的用户可以是`仅限共享`账户，以避免创建不必要的目录和资源。


    #### 启用 FileMaker Server 外部身份验证


    只有将数据库托管在配置为明确允许外部账户进行身份验证的`FileMaker Server`上时，用户才能使用外部账户登录。要确认 FileMaker Server
    19 版的此项设置，请执行以下步骤：


    1. 打开并登录`管理控制台`（第 29 章）。

    2. 点击顶部的`管理`选项卡。

    3. 点击侧边栏中的`外部身份验证`。

    4. 在`数据库登录`标题下，启用`外部服务器账户`。


    ## 探究权限集


    `权限集`是一组权限的集合，定义了访问数据、布局和其他功能的级别。权限集一旦定义，即可分配给一个或多个用户账户，以确定他们在数据库中的能力。要查看、创建和编辑权限集，请打开`管理安全性`对话框，并点击`高级设置`按钮。这将打开`高级安全设置`对话框，如图
    30-5 所示。点击`权限集`选项卡以查看已定义权限集的列表。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig5_HTML.jpg](img/429700_2_En_30_Fig5_HTML.jpg)


    图 30-5

    用于定义用户账户访问权限集的对话框


    ### 默认权限集


    每个数据库都有三个默认权限集。它们的名称周围带有方括号，并且除了可以启用和禁用`扩展权限`之外，这些权限集是不可编辑的。


    * `完全访问权限` – 允许对`每个可用功能`和所有内容进行不受限制的访问。此权限只应保留给开发者。FileMaker 要求至少有一个允许完全访问的账户。

    * `仅限数据输入` – 仅提供对数据输入工作的有限访问权限。分配此权限集的用户可以在每个表中创建、编辑和删除记录。他们可以使用但无法结构性修改布局、脚本和值列表。他们可以打印和导出。空闲时会自动与服务器断开连接，并且可以更改自己的账户密码。

    * `只读访问权限` – 与前一权限类似，但更严格，不允许以任何方式修改内容或结构。


    ### 创建自定义权限集


    要创建新的权限集，请打开`高级安全设置`对话框，点击`权限集`选项卡，然后点击`新建`按钮。这将打开`编辑权限集`对话框中的一个新的空权限集，如图 30-6
    所示。默认情况下，新的权限集几乎不允许任何访问。输入名称、可选的描述，然后开始启用所需的权限，这些权限分为三类：


    * `数据访问和设计权限` – 按资源类型提供访问权限：`记录`、`布局`、`值列表`和`脚本`

    * `其他权限` – 各种功能的混合体

    * `扩展权限` – 启用特定功能，有十个默认选项可以扩展


    **警告：** 自定义权限集不能授予开发者修改结构模式（表、字段和关系）的访问权限。只有默认的、不可更改的`完全访问权限`权限集允许编辑这些内容。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig6_HTML.jpg](img/429700_2_En_30_Fig6_HTML.jpg)


    图 30-6

    用于编辑权限集权限的对话框


    #### 配置数据访问和设计设置


    第一组权限设置定义了`数据访问和设计`权限。这些按资源类型控制用户可以执行的操作：`记录`、`布局`、`值列表`和`脚本`。每种资源类型都有一个包含多个选项的菜单，用于控制对其类别内所有实体的访问，以及一个为单个对象分配`自定义权限`的选项。'
- fmt: '##### Controlling Record Access


    The `Records` pop-up menu of the `Edit Privilege Set` dialog offers five options
    that control what users can do with records:


    - `Create, edit, and delete in all tables`

    - `Create and edit in all tables`

    - `View only in all tables`

    - `All no access`

    - `Custom privileges`


    The first four are self-descriptive and apply to records in every table. Select
    the `Custom Privileges` option to open the `Custom Record Privileges` dialog,
    shown in Figure [30-7](#429700_2_En_30_Chapter.xhtml#Fig7). Every table in the
    database is listed with an extra row at the bottom that defines default privilege
    settings for any new table that is created in the future. Below the list are five
    pop-up menus for specifying the `View`, `Edit`, `Create`, `Delete`, and `Field
    Access` permissions for the selected table(s) in the list above.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig7_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig7_HTML.jpg)


    Figure 30-7


    The dialog used to control permissions for record access per table


    The settings available across all five pop-up menus are similar with only a few
    minor differences. The first four have a `yes` and `no` option that do exactly
    the same thing: enable or disable the function for the selected table. For example,
    to allow creation of records in the selected table(s), select `yes` under the
    `Create` menu. Three of these four also have a `limited` option that opens a `Specify
    Calculation` dialog so a formula can provide more finely tuned control over access
    to the function. For example, a formula can allow deletion of a record only when
    a specific field has a certain value, on a certain day of the week, only when
    a certain layout is current or any other criteria included in the formula. The
    `Edit` menu is disabled when the `View` option is set to not allow access, i.e.,
    you can’t grant permission to edit something that the user can’t view.


    The `Field Access` menu options are slightly different than the other four. Although
    they perform similar functionality, they are named to relate to fields instead
    of function. Choose `all` to allow editing access to all fields and `none` to
    restrict access. Select `limited` to open a `Custom Field Privileges` dialog,
    shown in Figure [30-8](#429700_2_En_30_Chapter.xhtml#Fig8). This dialog allows
    each field to have a setting of either `modifiable`, `view only`, or `no access`.
    It also includes an option that defines default settings for any new fields added
    to the table in the future.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig8_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig8_HTML.jpg)


    Figure 30-8


    The dialog used to control the privileges of individual fields for a table


    ##### Controlling Layout Access


    The `Layouts` pop-up menu of the `Edit Privilege Set` dialog offers four options
    that control what a user can do with layouts:


    - `All modifiable`

    - `All view only`

    - `All no access`

    - `Custom privileges`


    > **Caution**: If a user can’t access a layout, neither can a script that runs
    during their session, unless it is configured to run with full access.


    When you choose the `Custom Privileges` option from the `Layouts` menu, it opens
    the `Custom Layout Privileges` dialog, shown in Figure [30-9](#429700_2_En_30_Chapter.xhtml#Fig9).
    Enable the `Allow creation of new layouts` checkbox at the top corner to allow
    users to create new layouts. Every layout in the database is listed with an extra
    option at the bottom that defines the default privilege settings for any new layout
    that is created in the future. Below the list are two sets of privilege options
    for the selected layout(s). The `Layout` options offer three levels of permission:
    `modifiable`, `view only`, or providing `no access`. The `Records via this layout`
    radio buttons control the permission for record interactions when a layout is
    viewable or modifiable with similarly named options, allowing you to grant layout-by-layout
    control over field interactions beyond the previously discussed `Record` settings
    for the entire table.


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig9_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig9_HTML.jpg)


    Figure 30-9


    The dialog used to control permissions by layout


    ##### Controlling Value List Access


    The `Value List` pop-up menu of the `Edit Privilege Set` dialog offers four options
    that control what users can do with value lists.


    - `All modifiable`

    - `All view only`

    - `All no access`

    - `Custom privileges`


    ##### Controlling Script Access


    The `Scripts` pop-up menu of the `Edit Privilege Set` dialog offers four options
    that control what users can do with scripts.


    - `All modifiable`

    - `All executable only`

    - `All no access`

    - `Custom privileges`


    #### Assigning Other Privilege Settings


    On the right side of the `Edit Privilege Set` dialog are `Other Privileges`, seen
    previously in Figure [30-6](#429700_2_En_30_Chapter.xhtml#Fig6). The functionality
    enabled by most of these features should be fairly obvious by their phrasing.
    However, a few are worth mentioning.


    The `Allow exporting` option enables a variety of data output functions including
    exporting records, saving records as an Excel file, copying all records in the
    found set, and saving a copy of records. But it also enables the ability of external
    scripts to access and extract record information, e.g., `AppleScript` on macOS.


    When the `Allow user to override data validation warnings` option is enabled,
    users assigned the privilege set can override any field validation warning dialog,
    including those that are not explicitly defined to allow it (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    "Validation Control").


    Enable the `Allow user to modify their own password` to let users change their
    password by selecting the `File ➤ Change Password` menu item. Two adjacent checkboxes
    allow you to schedule a forced password change at regular intervals and control
    a minimum length for any new passwords they select.


    The selection from the `Available menu commands` pop-up menu controls the menus
    available. While access to menus can be influenced by other permissions granted
    to the privilege set and by the presence of custom menus (Chapter [23](#429700_2_En_23_Chapter.xhtml)),
    this option specifies a blanket category of commands they can access. Choose `All`
    to grant access to the entire active menu bar. Limit them to basic editing functions
    by choosing `Editing Only`. Select `Minimum` to severely restrict them to menus
    for only the most basic functions such as open, close, and create database files,
    window functions, perform scripts, preferences, and help.


    > **Caution**: The menu setting for new privilege sets defaults to minimal which
    provides almost no enabled functions. Be sure to change this when creating new
    accounts.'
