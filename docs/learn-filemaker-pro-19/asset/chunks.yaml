- fmt: '### Data Formatting


    The `Data Formatting` controls can be used to apply a transformation in how raw
    field content is rendered on-screen. Four icon buttons, shown in Figure 19-17,
    indicate the data type of the selected field: `number`, `date`, `time`, or `container`.
    These are conditionally enabled depending on the data type of the selected field.
    The `Format` pop-up menu contains options that vary by the data type selection,
    while the area beneath the menu varies based on the selection made within this
    menu.


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig17_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig17_HTML.jpg)


    **Figure 19-17** The `Data Formatting` subgroup of the `Data` panel of the `Inspector`


    #### Data Formatting Options for Numbers


    The `Format` menu options for `numbers` are:


    - **General** – Displays a numeric value as entered with no special formatting
    but may round or express it in scientific notation to fit within the boundaries
    of the field.

    - **As Entered** – Displays a numeric value *exactly* as it was entered with no
    changes for any reason, displaying a question mark if the number extends beyond
    the boundaries of the field.

    - **Boolean** – Transforms zero and non-zero values into a Boolean format. The
    default is `Yes` and `No`, but these can be replaced with other words or symbols.

    - **Decimal** – Includes options for number of decimal places, notation, negative
    value formatting, choice of separators, and more, e.g., `1003.7568` can be displayed
    as `1,003.75` or `#1003`.

    - **Currency** – Includes options for displaying monetary formats, e.g., `5.7534`
    can be displayed as `$5.75`, `$5`, etc.

    - **Percent** – Includes option for displaying percentages, e.g., `.62` can be
    displayed as `62%` or `62.00%`.


    #### Data Formatting Options for Dates


    The `Format` menu options for `dates` include a variety of preconfigured date
    formatting options with an option for defining a custom format in a detailed interface,
    shown in Figure 19-18. This allows granular control, selecting any date component,
    in any order, with any delimiter and with leading zero options for day and month
    numbers. Using these controls, a date entered in a field as "1/15/2017" can be
    displayed in any number of different combinations including:


    ![../images/429700_2_En_19_Chapter/429700_2_En_19_Fig18_HTML.jpg](images/429700_2_En_19_Chapter/429700_2_En_19_Fig18_HTML.jpg)


    **Figure 19-18** The `Custom` options for formatting dates


    - `January 15, 2017`

    - `01.15.2017`

    - `01.15.17`

    - `15 Jan 2017`

    - `Sunday Jan 15, 2017`

    - `Thursday 01/15/2017`


    #### Data Formatting Options for Times


    The `Format` menu options for `times` are similar to those available for date
    formatting. Choose from a variety of preconfigured time formats, enter a custom
    format, and choose military vs. civilian time, leading zeros for hours and minutes,
    and more.


    #### Data Formatting Options for Containers


    The `Format` menu options for containers control how an image should resize, relative
    to the field object: `Crop to frame`, `Reduce image to fit`, `Enlarge image to
    fit`, or `Reduce or enlarge image to fit`. Several additional settings are available
    below the menu. There is an option to `Maintain original proportions`, which keeps
    the image''s aspect ratio fixed when it is reduced or enlarged to fit in a field.
    The `Alignment` controls provide positioning within the field. Other options control
    image optimization or enable interactive control over PDF, audio, and video files
    embedded in a field.


    ---


    ### Summary


    This chapter introduced the `Object` and `Inspector` panes. We explored the various
    tools and settings they make available. In the next chapter, we begin creating
    objects.


    ---


    # 20. Creating Layout Objects


    A *layout object* is an interface element used to display information, accept
    data entry, and/or initiate a scripted process. An object can be one of eight
    types: `field`, `text`, `button`, `panel`, `portal`, `web viewer`, `chart`, or
    `shape`. This chapter introduces every type of layout object, covering the following
    topics:


    - Inserting an object onto a layout

    - Working with field objects

    - Working with text

    - Working with button controls

    - Working with panel controls

    - Working with portals

    - Working with web viewers

    - Working with charts


    ## Inserting an Object onto a Layout


    A new instance of any object can be inserted onto a layout, using the following
    methods:


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig1_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig1_HTML.jpg)


    **Figure 20-1** The toolbar icons for adding objects to layouts


    - Select the toolbar icon shown in Figure 20-1. Then, click and drag on the design
    area to define the dimensions of the object.

    - Select object type from the `Insert` menu to quickly place a new instance at
    a default size and position on the layout.

    - Duplicate an existing object to a new instance by selecting it and choosing
    the `Edit ➤ Duplicate` menu.

    - Select an existing object and use the `Copy` and `Paste` functions or option-drag
    to create a new copy of an existing object.


    **Note**: A couple of objects have different insertion methods that are noted
    throughout this chapter.


    When an object is first added to a layout, it will be in a raw state and ready
    to be configured. Depending on the type, an object can be configured using different
    methods. Double-clicking on most object types will open a type-specific configuration
    dialog, usually focused on data configuration options rather than formatting or
    other behavioral control. A selected object can be manipulated using options in
    the `Formatting Bar` (Chapter 3), menus such as `Format` and `Arrange`, and the
    options in the `Inspector` pane.


    **Caution**: The actual appearance of any object on a layout will vary depending
    on the object state, custom format settings, conditional format settings (Chapter
    21), and the theme assigned to the layout (Chapter 22).'
