- fmt: '#### Transferring Records into a Good Structure


    To move record data from the recovered file into a reliable structure, follow
    these steps:


    1. Make a copy of either the recovered file from the conclusion of the record
    data check (like the *Broken Database Records Recovered* described earlier) or
    the original troubleshooting copy.

    2. Open the file.

    3. Perform a *Find All* to confirm a found set of all records.

    4. Export all records using the *Excel Workbooks (.xlsx)* type option. Be sure
    to check the *Use field names as column names in first row* option in the *Excel
    Options* dialog. In the *Export Options* dialog, take care to select all fields
    from the *Current Table* and not just the ones visible on the current layout.


    **Caution**


    Exporting to a non-FileMaker format guarantees the data is cleanly separated from
    any structural corruption. However, container fields are not supported and can’t
    be exported. Those must be manually restored in the new database. You may attempt
    to export to the FileMaker format instead but then need to double-check to confirm
    that no corruption follows the data in the transfer.


    5. Repeat steps 3 and 4 for every table in the database.

    6. Identify a stable copy of the database *structure*. Ideally use a clone that
    was created from a time prior to the corruption event. If that is not available,
    use a recovered copy (like the *Broken Database Structure Recovered* from the
    previous process) as long as the database structure is no longer reporting damage.

    7. Import the records from the spreadsheet(s) into each table of the safe structure.


    ## Summary


    This chapter explored the basics of creating, configuring, and maintaining the
    health of database files. In the next chapter, learn how to create tables and
    begin developing an object model that will define the fields that can be populated
    when entering records.


    # 7. Working with Tables


    A *table* is the fundamental unit of a database’s structural schema which forms
    a digital representative of some type of entity being modeled. Tables create a
    digital space and define a set of fields for storing data. This chapter explores
    the following topics:


    - Introducing object modeling

    - Introducing the `Manage Database` window (`Tables`)

    - Planning table names

    - Managing tables

    - Adding tables to the example database


    ## Introducing Object Modeling


    An *object model* or *data model* is an abstraction that defines elements of data
    for database entries, describing how they relate both to each other and to properties
    of the real-world entities they represent. A model is like an architectural blueprint
    that informs FileMaker about the structure of the information a database will
    store and manage. The term is used because the information is sometimes called
    a *virtual model* of the real objects represented by that structure. *Data modeling*
    is the process of planning and creating a model of the various properties, relationships,
    and actions that make up a data model for a set of related entity classes that
    will be managed by a database. The elements of an object model are *tables*, *fields*,
    and *relationships*.


    A *table* allocates a space for a particular type of entity being modeled within
    the database. These are analogous to a tab in a spreadsheet, as shown in Figure
    7-1. The term is used to refer to both the structural definition of a table as
    a storage model and to the content collected within that structure. So, one may
    refer to a *table’s fields* (defined structure) and a *table’s records* (content
    entered). Objects modeled as tables can be broad categories (people or products),
    narrow subcategories (employees or cars), properties of an entity (prices or components),
    actions (historical events or process steps), or any other thing one may need
    to manage. In the early planning stages, a model may take the form of a simple
    list of table names, e.g., *Company*, *Person*, and *Project*. Later, this expands
    into a field list for each table and details about how they all interconnect to
    form a relational hierarchy. Complex systems can contain models defining dozens
    or hundreds of tables.


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig1_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig1_HTML.jpg)


    Figure 7-1 — The basic anatomy of a database table


    The spreadsheet metaphor continues for *fields*, *records*, and *cells*.


    A *field*, similar to a column in a spreadsheet, is a defined container in which
    one piece of information about the modeled entity will be stored. In the example
    shown, each column heading names an individual field defining the column beneath
    it: *First Name*, *Last Name*, *Address*, etc.


    A *record*, similar to a row in the spreadsheet, represents one individual entry
    stored within the table for one instance of the object being modeled. While the
    table in the example represents *people in general*, a row, or record, represents
    *one specific person*. The record is one instance of the table’s defined field
    set, created to store information about a specific person.


    A *cell* is the formal name of an intersection of a field and record. In FileMaker,
    these are commonly referred to less formally as *fields* with the implied understanding
    of the difference between an instance of a field definition for a specific record
    (*cell*) and the field definition itself (*field*).


    ## Introducing the `Manage Database` Dialog (`Tables`)


    Tables are created and configured from the *Tables* tab of the `Manage Database`
    dialog, shown in Figure 7-2. Once a database file is open, this dialog can be
    opened by selecting the *File ➤ Manage ➤ Database* menu in Browse or Layout mode
    or selecting *Database* in the *Manage* toolbar menu in Layout mode. It is also
    accessible from various developer menus throughout the development interface,
    such as the `Specify Import Order` dialog (Chapter 5).


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig2_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig2_HTML.jpg)


    Figure 7-2 — The dialog used to manage tables


    The *Tables* tab displays a list of every table defined in the file. Each is made
    up of five properties listed in columns. The first column displays the *Table
    Name*. The *Source* column displays the source type of the table, either “FileMaker”
    or the name of an ODBC data source. *Details* includes a count of *Fields* defined
    as the table structure and *Records* of data content stored. Finally, *Occurrences
    in Graph* displays a comma-separated list of every instance of the table in the
    relationship graph (Chapter 9).


    Tables in the list can be selected to *rename*, *delete*, or *copy* and *paste*.
    A double-click switches to the *Fields* tab for that table. The *Table Name* field
    below the list displays the name of the selected table and is used to change the
    name or enter a name for a new table. Clicking `OK` saves changes and closes the
    dialog. Clicking `Cancel` will close the dialog *without saving changes made in
    any tab*.'
  raw: '#### Transferring Records into a Good Structure


    To move record data from the recovered file into a reliable structure, follow
    these steps:


    1.  Make a copy of either the recovered file from the conclusion of the record
    data check (like the *Broken Database Records Recovered* described earlier) or
    the original troubleshooting copy.


    2.  Open the file.


    3.  Perform a *Find All* to confirm a found set of all records.


    4.  Export all records using the *Excel Workbooks (.xlsx)* type option. Be sure
    to check the *Use field names as column names in first row* option in the *Excel
    Options* dialog. In the *Export Options* dialog, take care to select all fields
    from the *Current Table* and not just the ones visible on the current layout.


    Caution


    Exporting to a non-FileMaker format guarantees the data is cleanly separated from
    any structural corruption. However, container fields are not supported and can’t
    be exported. Those must be manually restored in the new database. You may attempt
    to export to the FileMaker format instead but then need to double-check to confirm
    that no corruption follows the data in the transfer.


    1.  Repeat steps 3 and 4 for every table in the database.


    2.  Identify a stable copy of the database *structure*. Ideally use a clone that
    was created from a time prior to the corruption event. If that is not available,
    use a recovered copy (like the *Broken Database Structure Recovered* from the
    previous process) as long as the database structure is no longer reporting damage.


    3.  Import the records from the spreadsheet(s) into each table of the safe structure.


    ## Summary


    This chapter explored the basics of creating, configuring, and maintaining the
    health of database files. In the next chapter, learn how to create tables and
    begin developing an object model that will define the fields that can be populated
    when entering records.


    # 7. Working with Tables


    A *table* is the fundamental unit of a database’s structural schema which forms
    a digital representative of some type of entity being modeled. Tables create a
    digital space and define a set of fields for storing data. This chapter explores
    the following topics:


    *   Introducing object modeling


    *   Introducing the Manage Database window (Tables)


    *   Planning table names


    *   Managing tables


    *   Adding tables to the example database


    ## Introducing Object Modeling


    An *object model* or *data model* is an abstraction that defines elements of data
    for database entries, describing how they relate both to each other and to properties
    of the real-world entities they represent. A model is like an architectural blueprint
    that informs FileMaker about the structure of the information a database will
    store and manage. The term is used because the information is sometimes called
    a *virtual model* of the real objects represented by that structure. *Data modeling*
    is the process of planning and creating a model of the various properties, relationships,
    and actions that make up a data model for a set of related entity classes that
    will be managed by a database. The elements of an object model are *tables*, *fields,*
    and *relationships*.


    A *table* allocates a space for a particular type of entity being modeled within
    the database. These are analogous to a tab in a spreadsheet, as shown in Figure
    [7-1](#429700_2_En_7_Chapter.xhtml#Fig1). The term is used to refer to both the
    structural definition of a table as a storage model and to the content collected
    within that structure. So, one may refer to a *table’s fields* (defined structure)
    and a *table’s records* (content entered). Objects modeled as tables can be broad
    categories (people or products), narrow subcategories (employees or cars), properties
    of an entity (prices or components), actions (historical events or process steps),
    or any other thing one may need to manage. In the early planning stages, a model
    may take the form of a simple list of table names, e.g., *Company*, *Person,*
    and *Project*. Later, this expands into a field list for each table and details
    about how they all interconnect to form a relational hierarchy. Complex systems
    can contain models defining dozens or hundreds of tables.


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig1_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    The basic anatomy of a database table


    The spreadsheet metaphor continues for *fields*, *records,* and *cells*.


    A *field* , similar to a column in a spreadsheet, is a defined container in which
    one piece of information about the modeled entity will be stored. In the example
    shown, each column heading names an individual field defining the column beneath
    it: *First Name*, *Last Name*, *Address*, etc.


    A *record* , similar to a row in the spreadsheet , represents one individual entry
    stored within the table for one instance of the object being modeled. While the
    table in the example represents *people in general*, a row, or record, represents
    *one specific person*. The record is one instance of the table’s defined field
    set, created to store information about a specific person.


    A *cell* is the formal name of an intersection of a field and record. In FileMaker,
    these are commonly referred to less formally as *fields* with the implied understanding
    of the difference between an instance of a field definition for a specific record
    (*cell*) and the field definition itself (*field*).


    ## Introducing the Manage Database Dialog (Tables)


    Tables are created and configured from the *Tables* tab of the *Manage Database*
    dialog, shown in Figure [7-2](#429700_2_En_7_Chapter.xhtml#Fig2). Once a database
    file is open, this dialog can be opened by selecting the *File ➤ Manage ➤ Database*
    menu in Browse or Layout mode or selecting *Database* in the *Manage* toolbar
    menu in Layout mode. It is also accessible from various developer menus throughout
    the development interface, such as the *Specify Import Order* dialog (Chapter
    [5](#429700_2_En_5_Chapter.xhtml)).


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig2_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    The dialog used to manage tables


    The *Tables* tab displays a list of every table defined in the file. Each is made
    up of five properties listed in columns. The first column displays the *Table
    Name*. The *Source* column displays the source type of the table, either “FileMaker”
    or the name of an ODBC data source. *Details* includes a count of *Fields* defined
    as the table structure and *Records* of data content stored. Finally, *Occurrences
    in Graph* displays a comma-separated list of every instance of the table in the
    relationship graph (Chapter [9](#429700_2_En_9_Chapter.xhtml)).


    Tables in the list can be selected to *rename*, *delete,* or *copy* and *paste*.
    A double-click switches to the *Fields* tab for that table. The *Table Name* field
    below the list displays the name of the selected table and is used to change the
    name or enter a name for a new table. Clicking OK saves changes and closes the
    dialog. Clicking Cancel will close the dialog *without saving changes made in
    any tab*.'
  trans: '

    #### 将记录传输到良好的结构中


    要将恢复文件中的记录数据转移到可靠的结构中，请遵循以下步骤：


    1.  复制一份记录数据检查完成后得到的恢复文件（例如前面描述的*已恢复的损坏数据库记录*）或原始的故障排查副本。

    2.  打开该文件。

    3.  执行*查找全部*以确认找到所有记录的查找集。

    4.  使用*Excel 工作簿 (.xlsx)* 类型选项导出所有记录。请务必在*Excel 选项*对话框中勾选*在第一行中使用字段名作为列名*选项。在*导出选项*对话框中，注意选择*当前表*中的所有字段，而不仅仅是当前布局上可见的字段。


    **警告**


    导出为非 FileMaker 格式可以确保数据与任何结构损坏完全分离。但是，容器字段不受支持且无法导出。这些字段必须在新数据库中手动恢复。你也可以尝试导出为
    FileMaker 格式，但随后需要仔细检查，确保在传输过程中没有损坏跟随数据。


    5.  对数据库中的每个表重复步骤 3 和 4。

    6.  确定一个稳定的数据库*结构*副本。理想情况下，使用在损坏事件发生之前创建的克隆。如果找不到这样的克隆，只要数据库结构不再报告损坏，可以使用恢复的副本（例如之前流程中的*已恢复的损坏数据库结构*）。

    7.  将电子表格中的记录导入到安全结构的每个表中。


    ## 总结


    本章探讨了创建、配置和维护数据库文件健康的基础知识。在下一章中，学习如何创建表并开始开发一个对象模型，该模型将定义在输入记录时可以填充的字段。


    # 7. 使用表


    *表*是数据库结构模式的基本单元，它构成了所建模的某种实体类型的数字代表。表创建了一个数字空间，并定义了一组用于存储数据的字段。本章探讨以下主题：


    - 介绍对象建模

    - 介绍`管理数据库`窗口（`表`）

    - 规划表名

    - 管理表

    - 向示例数据库添加表


    ## 介绍对象建模


    *对象模型*或*数据模型*是一种抽象，它定义了数据库条目的数据元素，描述了它们之间以及它们与其代表的现实世界实体属性之间的关系。模型就像一个建筑蓝图，告知
    FileMaker 数据库将存储和管理的信息的结构。之所以使用这个术语，是因为这些信息有时被称为该结构所代表的真实对象的*虚拟模型*。*数据建模*是规划并创建一个模型的过程，该模型包含构成一组相关实体类（将由数据库管理）的数据模型的各种属性、关系和操作。对象模型的要素是*表*、*字段*和*关系*。


    *表*为数据库内建模的特定类型的实体分配了一个空间。这类似于电子表格中的选项卡，如图 7-1 所示。该术语既用于指表作为存储模型的结构定义，也用于指代该结构内收集的内容。因此，可以提及*表的字段*（已定义的结构）和*表的记录*（已输入的内容）。建模为表的对象可以是广泛的类别（人员或产品）、狭窄的子类别（员工或汽车）、实体的属性（价格或组件）、操作（历史事件或流程步骤）或任何其他可能需要管理的事物。在早期规划阶段，模型可能采用简单的表名列表形式，例如*公司*、*人员*和*项目*。随后，这会扩展为每个表的字段列表，以及关于它们如何相互连接以形成关系层次结构的详细信息。复杂的系统可以包含定义数十甚至数百个表的模型。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig1_HTML.jpg](img/429700_2_En_7_Fig1_HTML.jpg)


    图 7-1 — 数据库表的基本结构


    电子表格的比喻延续到了*字段*、*记录*和*单元格*。


    *字段*，类似于电子表格中的列，是一个已定义的容器，用于存储关于被建模实体的一个信息。在所示的示例中，每个列标题命名了一个定义其下方列的单独字段：*名字*、*姓氏*、*地址*等。


    *记录*，类似于电子表格中的一行，代表存储在表中、对应于被建模对象的一个实例的单个条目。虽然示例中的表代表*一般意义上的人*，但一行（或一条记录）代表*一个特定的人*。记录是表已定义字段集的一个实例，创建用于存储关于某个特定人的信息。


    *单元格*是字段和记录交叉点的正式名称。在 FileMaker 中，这些通常不那么正式地被称为*字段*，但隐含着理解特定记录的字段定义实例（*单元格*）与字段定义本身（*字段*）之间的区别。


    ## 介绍`管理数据库`对话框（`表`）


    表是从`管理数据库`对话框的*表*选项卡创建和配置的，如图 7-2 所示。打开数据库文件后，可以在浏览模式或布局模式下选择*文件 ➤ 管理 ➤ 数据库*菜单，或在布局模式下从*管理*工具栏菜单中选择*数据库*来打开此对话框。在开发界面的各种开发者菜单中也可以访问它，例如`指定导入顺序`对话框（第
    5 章）。


    ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig2_HTML.jpg](img/429700_2_En_7_Fig2_HTML.jpg)


    图 7-2 — 用于管理表的对话框


    *表*选项卡显示文件中定义的每个表的列表。每个表由列出的五个属性组成。第一列显示*表名*。*数据源*列显示表的源类型，可以是“FileMaker”或 ODBC
    数据源的名称。*详细信息*包括定义为表结构的*字段*计数和存储的*记录*数据内容计数。最后，*图形中的出现次数*显示关系图中该表每个实例的逗号分隔列表（第
    9 章）。


    可以选择列表中的表来*重命名*、*删除*或*复制*和*粘贴*。双击将切换到该表的*字段*选项卡。列表下方的*表名*字段显示所选表的名称，并用于更改名称或输入新表的名称。单击`确定`保存更改并关闭对话框。单击`取消`将关闭对话框，*不保存任何选项卡中所做的更改*。

    '
- fmt: "# Planning Table Names\n\nTable names can use a variety of different conventions\
    \ depending on the preferences of an individual developer and any technical requirements\
    \ for compatibility when the database is used as a source for inbound API, JDBC/ODBC,\
    \ or WebDirect connections. Names composed of multiple words can be delimited\
    \ with a space (`Project Resource`) and an underscore (`Project_Resource`) or\
    \ have no space using “camel case” (`ProjectResources`). They can be upper- or\
    \ lowercase or any combination of the two. Every table name must follow these\
    \ rules:\n\n* Each table must be named with a unique word or phrase.\n* Names\
    \ can include numbers but shouldn’t start with a number or a period. Ideally,\
    \ use *only* alphabetic characters.\n* Names should not contain the name of built-in\
    \ functions, especially those that have no parameters such as `Random` or `Pi`.\n\
    * Although some reserved symbols and words *can* be used, they may conflict in\
    \ calculation formulas and should be avoided.\n* A name can include spaces. However,\
    \ for web integrations (other than `FileMaker Web Direct` which doesn’t care),\
    \ you may want to avoid them completely.\n\nBeyond these technical considerations,\
    \ take a moment to consider what constitutes a *good* table name. Every table\
    \ should be clearly descriptive, concise but not cryptic, and exist harmoniously\
    \ with other tables. Here are a few suggestions to consider when developing a\
    \ list of table names:\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig3_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\n\nA list of raw names (left) and the same with group prefixes (right)\n\
    \n* Names should clearly indicate the entity class modeled by the table, concisely\
    \ as possible without being cryptic.\n* Use full words instead of abbreviations\
    \ where possible. If a word is too long, consult a thesaurus for a shorter alternative.\n\
    * Consider the full context of other tables in the file. A table named `Stuff`\
    \ is fine in a database that manages only one kind of stuff. However, when modeling\
    \ several kinds of stuff, use more descriptive names like `Inventory`, `Resources`,\
    \ `Supplies`, etc.\n* Use multiple words for clarity. When there are other tables\
    \ for similarly named entities, make sure that their names are *differentiated\
    \ enough* to avoid confusion.\n* Be consistent, using the same format and keeping\
    \ all names either singular or plural. For example, use either `Contact` and `Company`\
    \ or `Contacts` and `Companies`.\n* For large lists of tables, consider prefixes\
    \ to organize them into conceptual groups so they sort neatly in developer selection\
    \ menus, as shown in Figure [7-3](#429700_2_En_7_Chapter.xhtml#Fig3).\n\n## Managing\
    \ Tables\n\nTables can be *added*, *renamed*, and *deleted* using the buttons\
    \ on the `Tables` tab of the `Manage Database` dialog.\n\n### Adding Tables\n\n\
    There are *several* different methods for adding tables: creating a new table,\
    \ duplicating an existing table, importing a table from another FileMaker database,\
    \ or adding a table from an external ODBC data source. Tables can also be automatically\
    \ created while importing records (Chapter [5](#429700_2_En_5_Chapter.xhtml),\
    \ “Selecting a Target Table”).\n\n#### Creating a New Table\n\nManually create\
    \ a new table from the `Tables` tab of the `Manage Database` dialog by typing\
    \ a name into the `Table Name` text area and clicking the `Create` button. The\
    \ new table will appear in the list with five default fields (Chapter [8](#429700_2_En_8_Chapter.xhtml),\
    \ “Defining Default Fields”).\n\n#### Duplicating an Existing Table\n\nWhen a\
    \ new table will be significantly similar to an existing one, consider duplicating\
    \ to save time. The `Copy` and `Paste` buttons can be used to copy one or more\
    \ tables and paste a duplicate of them into the list. This even works between\
    \ two files providing a quick and simple way to replicate a table in a new database.\
    \ The duplicate table(s) will appear highlighted in the list, each with the same\
    \ name as the original plus a unique numeric suffix. Every field from the original\
    \ table will be present in the new table, with the same names and settings. However,\
    \ record content is not copied from the original; the duplicate table will contain\
    \ no records.\n\n#### Importing a Table\n\nThe `Import` button on the `Tables`\
    \ tab of the `Manage Database` dialog begins the process of importing one or more\
    \ tables from another FileMaker database. The source database can be a database\
    \ in a folder directory or one hosted by a FileMaker Server. To begin, click the\
    \ `Import` button. Locate and open the database file containing the tables to\
    \ be imported. Once opened, FileMaker will present an `Import Tables` dialog listing\
    \ all the tables available for import from the selected database, as shown in\
    \ Figure [7-4](#429700_2_En_7_Chapter.xhtml#Fig4). Check the box next to the desired\
    \ table(s) and click OK to import. Here too, only the structure will be imported\
    \ so the tables will contain no records.\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig4_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nThe dialog used to import tables from another FileMaker database\n\
    \n#### Adding a Table from an ODBC Data Source (macOS)\n\n`Open Database Connectivity`\
    \ (ODBC) is a standard application programming interface (API) that provides client\
    \ applications a common language for interacting with other database systems.\
    \ `Java Database Connectivity` (JDBC) is a similar API for accessing systems written\
    \ in the Java language. FileMaker can use both ODBC and JDBC to communicate with\
    \ a `Driver Manager` application that uses a client driver to communicate with\
    \ an external data source, as shown in Figure [7-5](#429700_2_En_7_Chapter.xhtml#Fig5).\n\
    \n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig5_HTML.jpg](images/429700_2_En_7_Chapter/429700_2_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nConnecting a FileMaker database to an ODBC data source\n\n**Caution**\
    \  \nODBC connections are only required to connect non-FileMaker databases, not\
    \ for FileMaker database connections.\n\nFileMaker can act as an ODBC client application\
    \ or as an ODBC and JDBC data source. As a client application, FileMaker supports\
    \ connections to external SQL data sources such as those from Oracle, Microsoft\
    \ SQL, and MySQL. Once connected, tables from the external database can be added\
    \ to the FileMaker database, and with a few exceptions, they act like a native\
    \ FileMaker table. The process of configuring a computer and database for ODBC\
    \ access is a relatively straightforward three-step process. First, prepare the\
    \ host computer for an ODBC connection with a `Driver Manager` and `Client Driver`.\
    \ Next, connect the FileMaker database to the ODBC client driver. Finally, insert\
    \ and use ODBC tables in the FileMaker database. Let’s walk through an example\
    \ of this process.\n\n##### Preparing a Computer for an ODBC Connection\n\nTo\
    \ prepare a FileMaker host computer for an ODBC Connection, install the `ODBC\
    \ Manager` application (freeware for macOS), install a client driver (such as\
    \ `Actual Technologies ODBC Pack`), and configure the driver for a specific external\
    \ data source. The *host computer* is the computer upon which the FileMaker database\
    \ is installed (a computer running FileMaker Server rather than a client computer\
    \ accessing it)."
