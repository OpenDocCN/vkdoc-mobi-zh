- fmt: '### Configuring a Button’s Label


    A *button label* is the identifying text and/or icon displayed within the boundary
    of the button that communicates to users what functionality it will perform. The
    label is defined in the top portion of the *Button Setup* dialog. A button can
    have a text label, icon label, or a combination of the two.


    #### Using a Text Label


    To define a button with a text label, choose the *label* option and enter the
    text for the label, as shown in Figure [20-28](#429700_2_En_20_Chapter.xhtml#Fig28):


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig28_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig28_HTML.jpg)


    **Figure 20-28** – A button configuration (dialog) rendering a named button (right)


    > **Tip:** A button label can include a merge field typed into the text area to
    create dynamic names. For more dynamic naming formulas, use a single segment button
    bar instead of a button.


    #### Using an Icon Label


    When defining a button with an *icon* label, the *Button Setup* dialog controls
    transform to allow selection and configuration of an image, as shown in Figure
    [20-29](#429700_2_En_20_Chapter.xhtml#Fig29). Select an icon from the list of
    standard icons. The list can be expanded by clicking the plus icon below and choosing
    a PNG or SVG image. New images added here will be available anywhere within the
    current database file. Use the slider below the icon list to shrink or enlarge
    the size of the icon within the bounds of the button object.


    > **Note:** Unlike other controls, the size setting here will always be displayed
    in *points* regardless of units currently selected for the ruler.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig29_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig29_HTML.jpg)


    **Figure 20-29** – A button configuration (dialog) rendering an icon button (right)


    ---


    ### Configuring a Button’s Action


    The bottom portion of the *Button Setup* dialog controls the button function.


    #### Performing a Single Step


    To configure a button to run a script step command, change the *Action* pop-up
    menu to *Single Step*. This will immediately open the *Button Action* dialog,
    shown in Figure [20-30](#429700_2_En_20_Chapter.xhtml#Fig30). This is a limited
    version of the *Script Workspace* dialog (Chapter [24](#429700_2_En_24_Chapter.xhtml)).
    Double-click a step from the list on the right to add it as the action assigned
    on the left, replacing an existing selection. Then configure as needed and click
    OK.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig30_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig30_HTML.jpg)


    **Figure 20-30** – The dialog used to select and configure a script step for a
    button


    Once a script step has been assigned and configured, the *Action* area at the
    bottom of the setup dialog will display the command selected, as shown in Figure
    [20-31](#429700_2_En_20_Chapter.xhtml#Fig31). To change the command assigned,
    click on it. Enable the checkbox at the bottom to cause the cursor to change when
    over the button, providing a visual indication to the user that it is an active
    button.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig31_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig31_HTML.jpg)


    **Figure 20-31** – The dialog configured to run a single step


    When using the *Single Step* option, only *one* command can be assigned to the
    button. To attach more complex functionality to a button, choose *Perform Script*
    instead of *Single Step*, or click the *Convert to Script* button in the *Button
    Action* dialog to quickly create a new script with any existing step configurations
    retained.


    #### Performing a Script


    To configure a button to run a script, change the button’s action to *Perform
    a Script*. This will immediately open the *Specify Script* dialog (Chapter [24](#429700_2_En_24_Chapter.xhtml),
    “Exploring the Specify Script Dialog”), allowing the selection of a script and
    entry of an optional parameter. After choosing the script, the *Action* area at
    the bottom of the *Button Setup* dialog will display the script selected, parameter,
    and options, as shown in Figure [20-32](#429700_2_En_20_Chapter.xhtml#Fig32).
    The assigned script can be clicked to open and directly edit the script steps.
    Click the adjacent script icon to choose a different script for the button. Click
    the script parameter button to open a *Specify Calculation* dialog and enter a
    formula for data that will be sent to the script as a parameter (Chapter [24](#429700_2_En_24_Chapter.xhtml),
    “Sending Parameters”).


    The *Options* area includes a checkbox to change the cursor. Also, a menu allows
    the selection of one of the four options for how to handle a currently paused
    script after the button’s script runs, with the following choices:


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig32_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig32_HTML.jpg)


    **Figure 20-32** – The dialog configured to run a script


    - **Halt Current Script** – All running scripts will be halted.

    - **Exit Current Script** – The paused script will stop and control reverts to
    any other scripts in the stack which will resume execution.

    - **Resume Current Script** – The paused script will resume running.

    - **Pause Current Script** – The script will remain paused.


    ---


    ### Popover Button


    A *popover button* is a type of button that a user clicks to open a floating panel
    that contains additional layout objects. This reduces visual clutter by storing
    groups of controls out of view until needed. Popovers can be used for a variety
    of different purposes such as expanding field inputs, documentation tips, or a
    menu of actions like the simple example shown in Figure [20-33](#429700_2_En_20_Chapter.xhtml#Fig33).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig33_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig33_HTML.jpg)


    **Figure 20-33** – A popover button containing an array of action buttons


    To create a popover, choose the *Insert ➤ Popover Button* menu, or click-hold
    the *Button* toolbar icon, and choose *Popover Button* from the menu, shown in
    Figure [20-34](#429700_2_En_20_Chapter.xhtml#Fig34). Then click and drag in the
    content area to draw the boundaries for the object.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig34_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig34_HTML.jpg)


    **Figure 20-34** – Selecting the popover button tool from the toolbar


    #### Defining the Basic Popover Interface


    Once it is created, a new popover appears as a button with a popover interface
    open, as shown in Figure [20-35](#429700_2_En_20_Chapter.xhtml#Fig35).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig35_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig35_HTML.jpg)


    **Figure 20-35** – A new popover button ready for editing


    The following elements make up the popover button interface:


    1. **Button** – The button remains on the layout when the popover is closed. Like
    a standard button, this will be blank until you specify a label and/or icon.

    2. **Interface/Design Area** – This area pops open when the user clicks the button.
    In Layout mode, this is a resizable design area where you can add layout elements
    as needed.

    3. **Close Button** – This button, only visible when editing the popover in Layout
    mode, will close the popover interface.

    4. **Title** – An optional title for the popover.


    > **Tip:** Click on the popover design area to show a gradient control bar and
    resize handles.'
