    A *logical operator* is a keyword used to build compound conditions by joining
    two or more separate expressions into a single expression or, in one case, to
    negate a single expression to reverse a Boolean result. The result of an expression
    using a logical operator will be a Boolean.


    Tip


    Use parenthesis to help visualize the separate expressions on either side of a
    logical operator and ensure proper execution order.


    ##### AND


    The `AND` operator is used to combine two separate Boolean expressions into a
    combined equation that will evaluate true only if the result of both expressions
    are true.


    ```

    ( 150 > 100 ) AND ( "Bear" > "Automobile" )       // result = 1

    ( 150 > 100 ) AND ( "Bear" = "Automobile" )       // result = 0

    ```


    ##### OR


    The `OR` operator is used to combine two separate Boolean expressions into a combined
    equation that will evaluate true if the result of at least one of the two expressions
    is true.


    ```

    ( 150 > 100 ) OR ( "Bear" < "Automobile" )       // result = 1

    ( 150 < 100 ) OR ( "Bear" = "Automobile" )       // result = 0

    ```


    ##### XOR


    The `XOR` operator is used to combine two separate Boolean expressions into a
    combined equation that will evaluate true if the result of only one of the two
    equations is true. If both equations are true, it will return false.


    ```

    ( 150 > 100 ) XOR ( "Bear"  100 ) XOR ( "Bear" ≠ "Automobile" )       // result
    = 0

    ( 150 < 100 ) XOR ( "Bear" = "Automobile" )       // result = 0

    ```


    ##### NOT


    The `NOT` operator is a unique logical operator that will negate the result of
    any expression to its right, thereby reversing the Boolean result of that expression.
    If the expression evaluates true, putting this operator in front of it will reverse
    it to return false and vice versa.


    ```

    NOT ( 150 > 100 )                       // result = 0

    NOT ( "Tuesday" < "Monday" )            // result = 1

    ```


    A reversal can also be achieved by comparing the Boolean result of an expression
    to 0\. In this example, the false (0) result from the parenthesized expression
    is reversed by the subsequent comparison to 0:


    ```

    ( 150 < 100 ) = 0                      // result = 1

    ```


    #### Mathematical Operators


    A *mathematical operator* is a symbol used to perform or control arithmetic computations
    with one or more values or expressions. The mathematical operations can be performed
    not only on numbers but on other data types such as dates, times, and timestamps.


    Note


    For mathematical operations, dates and times are converted to a number (Chapter
    [8](#429700_2_En_8_Chapter.xhtml), “Defining Field Data Types”).


    ##### Addition


    The *plus* symbol is used to add the value on the right to the value on the left.


    ```

    100 + 50                        // result = 150

    GetAsDate ( "1/5/2021" ) + 5    // result = 1/10/2017

    GetasTime ( "1:15:00" ) + 300   // result = 1:20:00

    ```


    ##### Subtraction


    The *minus* symbol is used to subtract the value on the right from the value on
    the left.


    ```

    100 – 50                        // result = 50

    GetAsDate ( "1/5/2021" ) - 2    // result = 1/3/2017

    GetasTime ( "1:15:00" ) - 300   // result = 1:10:00

    ```


    ##### Multiplication


    The *multiply* symbol is used to multiply the value on the left by the value on
    the right.


    ```

    100 * 50                      // result = 5000

    GetAsDate ( "1/5/2021" ) * 2  // result = 1475590

    ```


    ##### Division


    The *division* symbol is used to divide the value on the left by the value on
    the right.


    ```

    100 / 50                       // result = 2

    GetAsTime ( "1:15:00" ) / 2    // result = 2250

    ```


    ##### Raising to a Power


    The *power of* symbol is used to raise the value on the left to the power of the
    value on the right.


    ```

    100^2

    ```


    ##### Precedence


    A set of *parentheses* is used to change the order of *evaluative precedence*
    (discussed later in this chapter). FileMaker will evaluate formulas from left
    to right after first evaluating expressions that are enclosed within parentheses,
    working from the inside out and based on an order of precedence. Although these
    two equations perform the same mathematical operations on the same numbers in
    the same order, the results are drastically different due to the control of precedence
    imposed with parentheses:


    ```

    100 * 2 + 50 / 25                // result = 202

    ( ( 100 * 2 ) + 50 ) / 25        // result = 10

    ```'
  trans: "\n### 大于或等于\n\n比较两个值的相对位置可以使用*大于或等于*符号，或使用*大于*符号后跟一个*等号*。如果左侧的值在位置上大于或等于右侧的值，则表达式计算结果为真，如下例所示：\n\
    \n```\n100 ≥ 100        // 结果 = 1\n100 ≥ 150        // 结果 = 0\n\"Bear\" >= \"\
    Automobile\"    // 结果 = 1\n\"New York\" >= \"Ohio\"      // 结果 = 0\nGetAsDate\
    \ ( \"1/15/2021\" ) ≥ GetAsDate ( \"7/20/2016\" )     // 结果 = 1\nGetAsDate ( \"\
    1/15/2021\" ) ≥ GetAsDate ( \"7/10/2021\" )     // 结果 = 0\nGetAsTime ( \"12:30:00\"\
    \ ) ≥ GetAsTime ( \"12:30:00\" )       // 结果 = 1\nGetAsTime ( \"9:30:00\" ) ≥\
    \ GetAsTime ( \"10:45:00\" )        // 结果 = 0\n```\n\n**提示**  \n在 macOS 上，按住 `Option`\
    \ 键并输入*大于*符号即可创建 `≥` 符号。\n\n### 小于\n\n使用*小于*符号比较两个值的相对位置。如果右侧的值在位置上大于左侧的值，则表达式计算结果为真。\n\
    \n```\n100 < 350        // 结果 = 1\n100 < 100        // 结果 = 0\n\"Automobile\"\
    \ < \"Car\"    // 结果 = 1\n\"New York\" < \"New York\" // 结果 = 0\nGetAsDate ( \"\
    7/20/2016\" ) < GetAsDate ( \"1/15/2021\" )     // 结果 = 1\nGetAsDate ( \"7/10/2021\"\
    \ ) < GetAsDate ( \"1/15/2021\" )     // 结果 = 0\nGetAsTime ( \"9:15:00\" ) < GetAsTime\
    \ ( \"12:30:00\" )        // 结果 = 1\nGetAsTime ( \"10:45:00\" ) < GetAsTime (\
    \ \"9:30:00\" )        // 结果 = 0\n```\n\n### 小于或等于\n\n比较两个值的相对位置可以使用*小于或等于*符号，或使用*小于*符号后跟一个*等号*。如果左侧的值在位置上小于或等于右侧的值，则表达式计算结果为真，如下例所示：\n\
    \n```\n100 ≤ 100       // 结果 = 1\n100 ≤ 50        // 结果 = 0\n\"Automobile\" <=\
    \ \"Bear\"   // 结果 = 1\n\"Ohio\" <= \"New York\"     // 结果 = 0\nGetAsDate ( \"\
    7/20/2016\" ) ≤ GetAsDate ( \"1/15/2021\" )     // 结果 = 1\nGetAsDate ( \"7/10/2021\"\
    \ ) ≤ GetAsDate ( \"1/15/2021\" )     // 结果 = 0\nGetAsTime ( \"12:30:00\" ) ≤\
    \ GetAsTime ( \"12:30:00\" )       // 结果 = 1\nGetAsTime ( \"10:45:00\" ) ≤ GetAsTime\
    \ ( \"9:30:00\" )        // 结果 = 0\n```\n\n**提示**  \n在 macOS 上，按住 `Option` 键并输入*小于*符号即可创建\
    \ `≤` 符号。\n\n## 逻辑运算符\n\n*逻辑运算符*是一种关键字，用于通过将两个或多个单独的表达式连接成一个表达式来构建复合条件，或者在某些情况下，用于否定单个表达式以反转布尔结果。使用逻辑运算符的表达式结果将是一个布尔值。\n\
    \n**提示**  \n使用括号有助于可视化逻辑运算符两侧的各个表达式，并确保正确的执行顺序。\n\n### AND\n\n`AND` 运算符用于将两个独立的布尔表达式组合成一个复合方程，仅当两个表达式的结果都为真时，该复合方程才求值为真。\n\
    \n```\n( 150 > 100 ) AND ( \"Bear\" > \"Automobile\" )       // 结果 = 1\n( 150\
    \ > 100 ) AND ( \"Bear\" = \"Automobile\" )       // 结果 = 0\n```\n\n### OR\n\n\
    `OR` 运算符用于将两个独立的布尔表达式组合成一个复合方程，如果两个表达式中至少有一个结果为真，则该复合方程求值为真。\n\n```\n( 150 > 100\
    \ ) OR ( \"Bear\" < \"Automobile\" )       // 结果 = 1\n( 150 < 100 ) OR ( \"Bear\"\
    \ = \"Automobile\" )       // 结果 = 0\n```\n\n### XOR\n\n`XOR` 运算符用于将两个独立的布尔表达式组合成一个复合方程，仅当两个方程中只有一个结果为真时，该复合方程才求值为真。如果两个方程都为真，则返回假。\n\
    \n```\n( 150 > 100 ) XOR ( \"Bear\" > \"Automobile\" )       // 结果 = 0\n( 150\
    \ > 100 ) XOR ( \"Bear\" ≠ \"Automobile\" )       // 结果 = 1\n( 150 < 100 ) XOR\
    \ ( \"Bear\" ≠ \"Automobile\" )       // 结果 = 1\n( 150 < 100 ) XOR ( \"Bear\"\
    \ = \"Automobile\" )       // 结果 = 0\n```\n\n### NOT\n\n`NOT` 运算符是一种独特的逻辑运算符，它会否定其右侧任何表达式的结果，从而反转该表达式的布尔结果。如果表达式求值为真，在此运算符前加上它，将反转为返回假，反之亦然。\n\
    \n```\nNOT ( 150 > 100 )                       // 结果 = 0\nNOT ( \"Tuesday\" <\
    \ \"Monday\" )            // 结果 = 1\n```\n\n还可以通过将表达式的布尔结果与 `0` 进行比较来实现反转。在此示例中，括号内表达式产生的假（`0`）结果通过随后与\
    \ `0` 的比较而被反转：\n\n```\n( 150 < 100 ) = 0                      // 结果 = 1\n```\n\
    \n## 数学运算符\n\n*数学运算符*是一种符号，用于对一个或多个值或表达式执行或控制算术运算。数学运算不仅可以对数字执行，也可以对其他数据类型（如日期、时间和时间戳）执行。\n\
    \n**注意**  \n对于数学运算，日期和时间会转换为数字（第 8 章“定义字段数据类型”）。\n\n### 加法\n\n*加号*符号用于将右侧的值加到左侧的值上。\n\
    \n```\n100 + 50                        // 结果 = 150\nGetAsDate ( \"1/5/2021\" )\
    \ + 5    // 结果 = 1/10/2017\nGetasTime ( \"1:15:00\" ) + 300   // 结果 = 1:20:00\n\
    ```\n\n### 减法\n\n*减号*符号用于从左侧的值中减去右侧的值。\n\n```\n100 – 50                      \
    \  // 结果 = 50\nGetAsDate ( \"1/5/2021\" ) - 2    // 结果 = 1/3/2017\nGetasTime (\
    \ \"1:15:00\" ) - 300   // 结果 = 1:10:00\n```\n\n### 乘法\n\n*乘号*符号用于将左侧的值乘以右侧的值。\n\
    \n```\n100 * 50                      // 结果 = 5000\nGetAsDate ( \"1/5/2021\" )\
    \ * 2  // 结果 = 1475590\n```\n\n### 除法\n\n*除号*符号用于将左侧的值除以右侧的值。\n\n```\n100 / 50\
    \                       // 结果 = 2\nGetAsTime ( \"1:15:00\" ) / 2    // 结果 = 2250\n\
    ```\n\n### 乘方\n\n*乘方*符号用于将左侧的值提升到右侧值的幂。\n\n```\n100²\n```\n\n### 优先级\n\n一组*圆括号*用于改变*求值优先级*（本章后面会讨论）。FileMaker\
    \ 会从左到右计算公式，但会首先计算括号内的表达式，遵循由内向外以及基于优先级的顺序。尽管以下两个方程式对相同的数字以相同的顺序执行相同的数学运算，但由于使用括号控制优先级，结果截然不同：\n\
    \n```\n100 * 2 + 50 / 25                // 结果 = 202\n( ( 100 * 2 ) + 50 ) / 25\
    \        // 结果 = 10\n```\n"
- fmt: '### Text Operators


    A `text operator` is a symbol used to construct an equation that combines text
    items into a single item and performs other text-related functions. These include
    quoting, concatenating, paragraph returns, and backslashes.


    #### Quoting Text


    A pair of `quotation marks` is used to indicate a literal text constant. Text
    entered into a formula without quotation marks will be interpreted as a `field`,
    `function`, or `variable`. Date and time constants must be enclosed in quotation
    marks.


    ```

    "John"

    "1/15/2021"

    ```


    #### Concatenate Text


    The `ampersand` symbol is used to join text values into a single value.


    ```

    "John" & " " & "Smith"        //result = John Smith

    ```


    #### Paragraph Return


    The `paragraph return` symbol is used to insert a carriage return into a text
    value and can be placed in a calculation. Although a single return character can
    be placed outside of quotes as shown in the second example, putting multiple returns
    together outside quotes will produce an error and fail to compile. All three examples
    in the following return the same result:


    ```

    "John Smith" & "¶" & "Jim Smith"

    "John Smith" & ¶ & "Jim Smith"

    "John Smith¶Jim Smith"

    // result = John Smith¶Jim Smith

    ```


    Tip


    The paragraph return symbol can be created by typing a “7” while holding down
    the `Option` key on macOS.


    #### Backslash


    Quotes are operators and are not actually part of the value they contain. The
    backslash symbol is used to force an operator to be used literally instead. This
    is referred to as `escaping a string` since it allows operator use in a string
    without causing errors. For example, a backslash preceding a quote symbol will
    force the quote symbol to be treated as text and become part of the result. Without
    the backslash, FileMaker will interpret the formula as having a syntax error and
    not allow it to be saved.


    ```

    5"                 // result = syntax error, will not compile

    "5\""              // result = 5"

    "Hello, World"     // result = Hello, World

    "\"Hello, World\"" // result = "Hello, World"

    ```


    Tip


    FileMaker’s built-in `Quote()` function will automatically enclose an existing
    value into quoted text.


    #### Reserved Name


    FileMaker will allow a reserved keyword or function name to be used as a table
    name or field name. However, when referencing these in a formula, an error may
    occur because FileMaker has no way to distinguish between it as a field reference
    instead of an operator or function call. For example, you can name a field `AND`,
    but when referring to it in a formula, it must be wrapped in curly brackets with
    a preceding dollar sign in order for it to be interpreted as a field and compile:


    ```

    ${AND}

    ```


    Tip


    Avoid using reserved names as table or field names!


    ### Understanding Operator Precedence


    Operators in a calculation formula are evaluated in the following order of precedence:


    1.  Comments

    2.  Space, backslash, paragraph return, reserved name

    3.  Parentheses

    4.  `NOT`

    5.  Power of (`^`)

    6.  Multiplication, division

    7.  Addition, subtraction

    8.  Ampersand

    9.  Equal to, not equal to, greater than, less than, greater than or equal to,
    less than or equal to

    10. `OR`, `XOR`


    ### Reserved Words


    A `reserved word` is a word, term, or symbol used by FileMaker for function names,
    predefined parameters, and operators and to construct SQL statements. These should
    not be used as names for tables, fields, custom functions, and other objects to
    avoid problems when writing formulas. Claris provides a list on their site by
    searching “Reserved words in FileMaker Pro” or following this address:


    ```

    https://support.claris.com/s/article/Reserved-words-in-FileMaker-Pro-1503693036814

    ```


    ### Variables


    A `variable` is a developer-named letter, word, or phrase that stores a value
    which can be used in a calculation formula and other places in the development
    interface.


    #### Types of Variables


    FileMaker has three different variable types, each with a different naming requirement
    and scope: `statement`, `local`, and `global`. Although variables can be named
    using a variety of different formats, there are a few general naming considerations
    to keep in mind. Variable names should avoid reserved words and field names to
    avoid confusion and conflicts in formulas. As with names elsewhere, variable names
    should be concise to avoid clutter but with enough descriptive clarity to indicate
    what data it contains. Overall, be consistent in case; choose either `camel-case`
    (`variableNameExample`), `dot-delimited` (`variable.name.example`), `underscore-delimited`
    (`variable_name_example`), or some other format of your choosing.


    ##### Statement Variables


    A `statement variable` is a variable initialized within `Let` or `While` statements
    (Chapter [13](#429700_2_En_13_Chapter.xhtml)). These only exist when the statement
    is being actively evaluated. Except for the normal restrictions, FileMaker imposes
    no special naming requirements to a statement variable. Names can be as short
    as a single character or a lengthy, multi-word phrase like any of the following
    examples. Since statement variables are limited to the statement in which they
    are defined, they can’t conflict with similarly named variables in other formulas
    or within the same formula outside of the statement containing them. Therefore,
    standardized names can be reused from one formula to the next without concern
    for conflict.


    ```

    X

    data

    firstName

    first_Name

    dateToProcess

    table.name

    ```


    ##### Local Variables


    A `local variable` is a variable that persists temporarily during the evaluation
    of a formula, custom function or the execution of a script. A local variable can
    be initialized within a `Let` or `While` statement (Chapter [13](#429700_2_En_13_Chapter.xhtml))
    and with the `Set Variable` script step (Chapter [25](#429700_2_En_25_Chapter.xhtml))
    and has a variety of uses. Store information at one position in a script for use
    later in the same script, share information between a script and a custom function,
    or store information from one iteration to the next in a recursive custom function
    (Chapter [15](#429700_2_En_15_Chapter.xhtml)). FileMaker requires that local variables
    be named with a single dollar symbol prefix. Beyond that, the name can be as short
    as a single character or a lengthy, multi-word phrase and can use any of a variety
    of delimiters, as shown in the following examples. Since local variables are limited
    to the formula or script in which they are defined, they can’t typically conflict
    with similarly named variables in other scripts. However, multiple calls to custom
    function from the same script will retain any local variables used by that function.


    ```

    $x

    $data

    $firstName

    $recordNumber

    $dateToProcess

    $date.to.process

    $date_to_process

    ```'
