    Once installed, a plug-in’s functions will appear as a new category in either
    *Functions* pane of *Specify Calculation* dialogs or the *Steps* pane of the *Script
    Workspace*. Some plug-ins appear in both lists, as shown in Figure [28-2](#429700_2_En_28_Chapter.xhtml#Fig2).
    From here, plug-in functions can be easily inserted into formulas (Chapter [12](#429700_2_En_12_Chapter.xhtml))
    and scripts (Chapter [24](#429700_2_En_24_Chapter.xhtml)) like functions or steps.


    ![../images/429700_2_En_28_Chapter/429700_2_En_28_Fig2_HTML.jpg](images/429700_2_En_28_Chapter/429700_2_En_28_Fig2_HTML.jpg)


    Figure 28-2


    Plug-ins appear in the Steps pane of the Script Workspace (back) and/or in the
    Functions pane of the Specify Calculation window (front)


    ## Summary


    This chapter presented the basic process for finding, installing, and accessing
    plug-ins. In the next chapter, we begin an introduction to network sharing.


    # Part VIDeploying,


    Securing, and Analyzing Files


    These final chapters cover the basics of deploying, network sharing, security,
    and some advanced tools:


    1.  *Deploying and Accessing Databases*


    2.  *Defining Accounts and Permissions*


    3.  *Analyzing and Modifying Files*


    # 29. Deploying and Accessing Databases


    When finished developing, it is time to deploy your database into the target workflow.
    There are three primary choices for deployment: in a *folder directory*, on an
    *iOS device,* or on a *host server*. Each option has different benefits, and the
    choice affects who can access the file, how, and from where. Each product in the
    FileMaker family has different capabilities for deployment and access (see Chapter
    [1](#429700_2_En_1_Chapter.xhtml), “Reviewing the Product Line”). In this chapter,
    we explore these options, introducing specific topics related to deploying and
    accessing a solution, including


    *   Deploying to a folder directory


    *   Deploying to an iOS device


    *   Sharing databases on a network


    *   Hosting with FileMaker Server


    *   Hosting with FileMaker Cloud


    *   Accessing solutions externally


    ## Deploying to a Folder Directory


    The easiest deployment method is to store a database in a *folder directory* .
    With access to the folder, the FileMaker Pro desktop application can open and
    use the database. This provides a lot of convenience, since the database can be
    moved between folders or duplicated for reuse as simply as a word processing or
    excel document. While this is an easy and useful option for a single user, opportunities
    for sharing are limited. The database can be shared by sending a copy to coworkers,
    but each person will have their own isolated copy of the file without the benefits
    of collaborative, simultaneous use. It can be placed in a folder on a networked
    file server; however, this is not recommended because each copy the desktop application
    reading and writing to the same file at the same time will cause file corruption
    that may be catastrophic (Chapter [6](#429700_2_En_6_Chapter.xhtml), “Avoiding
    File Damage”). Similarly, services like Dropbox or Google Drive may corrupt files
    when syncing even with a single user. The *FileMaker Pro* desktop app can safely
    share a file opened from a local folder by acting as a proper host with *peer-to-peer
    sharing* (described later in this chapter). However, that is limited to five simultaneous
    connections by other users with access limited to FileMaker products. However,
    if sharing isn’t an important consideration, using a database from a local folder
    is a suitable option. Just make sure the file is closed before moving it to another
    folder and keep it in a folder that other users can’t access.'
  trans: '

    ### Troi Automatisering


    Troi Automatisering 提供多个插件（[www.troi.com](http://www.troi.com)），包括：


    - `Troi Dialog` – 创建动态、功能丰富的对话框

    - `Troi Encryptor` – 生成密码并保存到钥匙串中

    - `Troi File` – 访问 FileMaker 外部的文件和文件夹，压缩和解压缩文件及文件夹，搜索目录等


    ## 安装插件


    每台访问带有插件功能的数据库的计算机，都必须在本地安装该插件。不过，安装资源可以嵌入到数据库文件中并从其中安装，既可以放在单独的安装程序数据库中，也可以直接放在数据库解决方案内。一些插件供应商将插件嵌入在安装程序数据库中交付。


    要准备一个自定义数据库来安装插件，请为每个插件安装程序创建一个容器字段。如果数据库用于跨平台工作流（不同操作系统），则可能需要多个容器字段。创建一个脚本，使用`
    Install Plug-in File `步骤，如下面的示例所示，该示例使用` Set Variable `将已安装插件的列表放入名为`$installed`的变量中，然后使用`
    PatternCount `函数判断` Troi File Plug-in `是否需要安装或更新。如果需要，则使用` Get ( SystemPlatform
    ) `确定应安装 macOS 还是 Windows 插件。


    ```

    Set Variable [ $installed ; Value : Get ( InstalledFMPlugins ) ]

    If [ PatternCount ( $installed ; "Troi File Plug-in;8.0.2" ) = "" ]

    If [ Get ( SystemPlatform ) = 1 ]

    Install Plug-in File [ Resources::Troi_File.fmplugin ]

    Else

    Install Plug-in File [ Resources::Troi_File.fmx]

    End if

    End if

    ```


    该脚本可以作为由` OnFirstWindowOpen `事件（第 29 章）触发的启动脚本的一部分自动运行，以确保每个用户的计算机都正确安装。可以扩展该脚本以检查错误，确认安装过程是否成功，并在检测到问题时警告用户联系数据库管理员。例如，如果未启用`应用程序`偏好设置中的`允许解决方案安装文件`，则脚本将失败。图
    28-1 所示的`应用程序`偏好设置对话框中的`插件`选项卡列出了所有已安装的插件。在此处，您可以确认安装、启用、禁用和配置插件。


    ![../images/429700_2_En_28_Chapter/429700_2_En_28_Fig1_HTML.jpg](img/429700_2_En_28_Fig1_HTML.jpg)


    图 28-1


    显示已安装插件的偏好设置选项卡必须允许安装


    ## 访问插件功能


    安装后，插件的功能将作为新类别出现在`指定计算`对话框的`函数`窗格或`脚本工作区`的`步骤`窗格中。某些插件会同时出现在这两个列表中，如图 28-2 所示。在此处，可以像插入函数或步骤一样，轻松地将插件功能插入到公式（第
    12 章）和脚本（第 24 章）中。


    ![../images/429700_2_En_28_Chapter/429700_2_En_28_Fig2_HTML.jpg](img/429700_2_En_28_Fig2_HTML.jpg)


    图 28-2


    插件显示在脚本工作区的步骤窗格（后）和/或指定计算窗口的函数窗格（前）中


    ## 总结


    本章介绍了查找、安装和访问插件的基本过程。下一章将开始介绍网络共享。


    # 第六部分 – 部署、保护和分析文件


    最后这几章涵盖了部署、网络共享、安全性以及一些高级工具的基础知识：


    1.  部署和访问数据库

    2.  定义账户和权限

    3.  分析和修改文件


    # 29. 部署和访问数据库


    开发完成后，就该将数据库部署到目标工作流中了。部署有三种主要选择：在文件夹目录中、在 iOS 设备上或在主机服务器上。每个选项都有不同的优势，选择会影响谁可以访问文件、如何访问以及从何处访问。FileMaker
    系列中的每个产品都有不同的部署和访问能力（参见第 1 章，“审查产品线”）。在本章中，我们将探讨这些选项，介绍与部署和访问解决方案相关的特定主题，包括：


    - 部署到文件夹目录

    - 部署到 iOS 设备

    - 在网络上共享数据库

    - 使用 FileMaker Server 托管

    - 使用 FileMaker Cloud 托管

    - 外部访问解决方案


    ## 部署到文件夹目录


    最简单的部署方法是将数据库存储在文件夹目录中。只要有该文件夹的访问权限，`FileMaker Pro` 桌面应用程序就可以打开并使用该数据库。这提供了极大的便利，因为数据库可以在文件夹之间移动，或者像处理文字处理文档或
    Excel 文档一样简单地复制以重复使用。虽然这对于单个用户来说是一个简单且有用的选项，但共享的机会有限。可以通过将副本发送给同事来共享数据库，但每个人都将拥有自己独立的文件副本，无法享受协作、同时使用的优势。它可以放在网络文件服务器上的文件夹中；但是，不建议这样做，因为多个桌面应用程序副本同时读取和写入同一文件会导致文件损坏，这可能是灾难性的（第
    6 章，“避免文件损坏”）。同样，像 Dropbox 或 Google Drive 这样的服务即使在单用户情况下也可能在同步时损坏文件。`FileMaker
    Pro` 桌面应用程序可以通过充当具有点对点共享（本章后面描述）的适当主机，安全地共享从本地文件夹打开的文件。但是，这仅限于其他用户最多五个并发连接，并且访问权限仅限于
    FileMaker 产品。然而，如果共享不是一个重要的考虑因素，那么从本地文件夹使用数据库是一个合适的选择。只需确保在将文件移动到另一个文件夹之前将其关闭，并将其保存在其他用户无法访问的文件夹中。

