    \ City (text)*\n\n*   *Contact Address State (text)*\n\n*   *Contact Address Zip\
    \ (number)*\n\n*   *Contact Address Country (text)*\n\n### Defining Project Fields\n\
    \nIn the *Project* table, create the following fields:\n\n*   *Project Company\
    \ ID (text)*\n\n*   *Project Contact ID (text)*\n\n*   *Project Name (text)*\n\
    \n*   *Project Description (text)*\n\n*   *Project Budget (number)*\n\n*   *Project\
    \ Budget Summary (summary as a Total of the Project Budget field)*\n\n### Renaming\
    \ and Modifying Default Fields\n\nTo follow along with the examples in the rest\
    \ of the book and to gain some experience modifying field definitions, perform\
    \ the following changes to the five default fields in all tables:\n\n*   *Rename\
    \ PrimaryKey* to “Record ID” and *change its Auto-Enter from a Calculated value\
    \ to a Serial number starting with “000001.”*\n\n*   *Rename CreationTimestamp*\
    \ to “Record Creation Timestamp.”\n\n*   *Rename CreatedBy* to “Record Creation\
    \ User.”\n\n*   *Rename ModificationTimestamp* to “Record Modification Timestamp.”\n\
    \n*   *Rename ModifiedBy* to “Record Modification User.”\n\nTip\n\nSave time by\
    \ doing these in one table and copy-paste them to replace default fields in other\
    \ tables.\n\n## Summary\n\nThis chapter explored the basics of defining fields.\
    \ In the next chapter, we turn attention to forming relational links between tables.\n\
    \n# 9. Forming Relationships\n\nA *relational database* allows connections to\
    \ be defined between tables to automatically connect individual records based\
    \ on field values. This chapter covers the following topics pertaining to relationships:\n\
    \n*   Introducing relationships\n\n*   Managing data sources\n\n*   Introducing\
