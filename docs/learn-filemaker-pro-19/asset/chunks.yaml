    ### 从时间差创建语句


    本示例根据经过的时间创建一条人类可读的语句。首先，一个 `Let` 语句开始初始化变量，起始变量 `start` 和 `end` 均包含一个时间戳值。虽然在本次演示中这些值被设为硬编码值，但它们也可以通过字段、变量或其他函数提供。接着，用
    `end` 减去 `start`，并将结果转换为数字，以得出经过的秒数 `elapsed`。随后，将这个数字经过四个级联步骤处理，依次确定经过的天数 (`days`)、小时数
    (`hours`)、分钟数 (`minutes`) 和秒数 (`seconds`)，并且在每一步中，都从 `elapsed` 秒数中扣除已提取的量。这些步骤使用了
    `Int` 函数，该函数通过舍弃小数点右侧的所有数字来返回一个数字的整数部分（不进行四舍五入）。计算出这四个值并赋值给变量后，语句的计算部分将生成最终结果。这里使用了
    `Substitute` 语句中嵌套 `List` 语句、`List` 语句中再嵌套四个 `Case` 语句的序列。每个 `Case` 语句检查对应的值是否不为零，因为只有非零值才需包含在结果中。如果包含，则构建一个带有条件后缀的语句，例如“1
    day（1 天）”或“10 days（10 天）”。这些语句片段通过 `List` 添加到一个以回车符分隔的值列表中，然后通过 `Substitute` 将其转换为一个以逗号加空格分隔的语句。


    ```

    Let ( [

    start = GetAsTimestamp ( "8/1/2021 10:00 AM" ) ;

    end = GetAsTimestamp ( "8/2/2021 11:15:10 AM" ) ;

    elapsed = GetAsNumber ( end - start ) ;

    days = Int ( elapsed / 86400 ) ;

    elapsed = elapsed - ( days * 86400 ) ;

    hours = Int ( elapsed / 3600 ) ;

    elapsed = elapsed - ( hours * 3600 ) ;

    minutes = Int ( elapsed / 60 );

    elapsed = elapsed - ( minutes * 60 ) ;

    seconds = Int ( elapsed )

    ] ;

    Substitute (

    List (

    Case ( days ≠ 0 ; days & " day" & Case ( days > 1 ; "s" ) ) ;

    Case ( hours ≠ 0 ; hours & " hour" & Case ( hours > 1 ; "s" ) ) ;

    Case ( minutes ≠ 0 ; minutes & " minute" & Case ( minutes > 1 ; "s" ) ) ;

    Case ( seconds ≠ 0 ; seconds & " second" & Case ( seconds > 1 ; "s" ) )

    ) ; "¶" ; ", "

    )

    )

    // 结果 = 1 day, 1 hour, 15 minutes, 10 seconds

    ```


    ### 将数字转换为语句


    本示例使用 `Let`、`Case`、`Choose` 及其他函数将一个数字转换为语句。在 `Let` 语句的变量声明部分，从一个字段中提取数字并赋值给变量
    `n`。`Length` 和 `GetAsText` 函数用于计算该数字的字符数，并将结果放入 `count` 变量中。接着，根据数字的位数，初始化三个变量，每个变量包含数字的一位。通过组合使用
    `Left`、`Middle`、`Right`、`GetAsNumber` 和 `Case` 函数，将第一位（右侧）数字放入 `a`，第二位（中间）数字放入
    `b`，第三位（左侧）数字放入 `c`。计算部分包含四个 `Case` 语句，它们根据位置数字有条件地插入每个值的文本表示形式，然后将这些片段拼接起来形成最终语句。根据输入的数字，该函数将返回从“1
    Year（1 年）”到“Nine Hundred Ninety Nine Years（九百九十九年）”的结果。


    ```

    Let ( [

    |

    n = Example Number ;

    t = GetAsText ( n ) ;

    count = Length ( t ) ;

    a = GetAsNumber ( Right ( t ; 1 ) ) ;

    b = Case ( count > 1 ; GetAsNumber ( Left ( Right ( t ; 2 ) ; 1 ) ) ) ;

    c = Case ( count > 2 ; GetAsNumber ( Left ( t ; 1 ) ) )

    ] ;

    Case ( c > 0 ;

    Choose( c ; "";

    "One "; "Two "; "Three "; "Four "; "Five "; "Six "; "Seven "; "Eight "; "Nine
    "

    ) & "Hundred " ) &

    Case ( b > 1 ;

    Choose( b ; ""; "";

    "Twenty "; "Thirty "; "Forty "; "Fifty "; "Sixty "; "Seventy "; "Eighty "; "Ninety
    ")

    ) &

    Case ( a > 0 and b ≠ 1 ;

    Choose( a ; "";

    "One "; "Two "; "Three "; "Four "; "Five "; "Six "; "Seven "; "Eight "; "Nine
    ")

    ) &

    Case ( b = 1 ;

    Choose( a ;

    "Ten "; "Eleven "; "Twelve "; "Thirteen "; "Fourteen "; "Fifteen "; "Sixteen ";
    "Seventeen "; "Eighteen "; "Nineteen ") ) &

    "Year" & Case ( n > 1 ; "s" )

    )

    // 结果（如果数字字段包含 32）= Thirty Two Years

    ```


    ## 总结


    本章讨论了许多有用的内置函数。请记住，FileMaker 拥有超过 `300` 个内置函数，在编写公式时均可使用。后续章节还会提到更多此类函数，而所有函数都在
    `指定计算` 对话框的 `函数` 窗格底部提示可访问的联机帮助指南中进行了描述。在下一章中，我们将继续探索内置函数，重点讲解 *JavaScript 对象表示法*
    (JSON) 函数。


    # 14. 使用 JSON


    *JavaScript 对象表示法* (JSON) 是一种开放标准、轻量级的数据交换格式，最初由道格拉斯·克罗克福特于 2000 年制定，于 2013 年标准化，并于
    2017 年最终定稿为当前版本。它源自 JavaScript 编程语言，旨在满足一种独立于语言、实时的、无需插件即可实现服务器到浏览器交换协议的需求。JSON
    对象使用相对简单的键/值对结构进行格式化，这种结构易于人类和机器读写。因此，它已成为 *表述性状态转移* (REST) Web 服务中不可或缺的数据交换工具。FileMaker
    在版本 16 中添加了一组内置函数，可用于创建和操作 JSON 数据。这些函数在处理外部服务提供格式的数据时至关重要，也可在将 JSON 用作脚本与其他函数之间进行数据交换的内部格式时使用。本章将介绍
    JSON，涵盖以下主题：


    - 定义 JSON 格式

    - 解析 JSON

    - 操作 JSON

    '
- fmt: '## 定义 JSON 格式


    一个 **JSON 对象**是括号内一系列 **元素**的列表，这些元素将标识 *key*（键）与关联的 *value*（值）结合在一起。类似的结构在其它语言中有多种称呼，包括
    *array*（数组）、*dictionary*（字典）、*hash table*（哈希表）、*keyed list*（键控列表）、*record*（记录）和
    *struct*（结构体）。*key* 始终是一个文本字符串，充当标签来命名和标识元素。元素中的 *value* 包含一些数据内容，是以下类型之一：


    - *JSONString* – 文本字符串

    - *JSONNumber* – 数值

    - *JSONBoolean* – `true` 或 `false` 值

    - *JSONArray* – 包含在方括号内、由逗号分隔的有序值列表

    - *JSONObject* – 嵌套在父对象元素中的 JSON 对象

    - *JSONNull* – 空值

    - *JSONRaw* – 将由 JSON 解析器确定的值


    一个包含单个元素（含 `id` 号码）的 JSON 对象格式如下：标签放在引号中，后跟冒号和值，所有内容包裹在花括号中。此处键的值是 *JSONumber*：


    ```

    {"id":5103}

    ```


    在此示例中，值包含 *JSONText*，即一个人的名字：


    ```

    {"First":"John"}

    ```


    多元素对象使用逗号分隔每个唯一命名的元素。例如，包含人员数据的对象可能组合 *id*、*first name*、*last name* 和 *title*
    等元素，如下所示：


    ```

    {"id":5103,"First":"John","Last":"Smith","Title":"Chief Technology Officer"}

    ```


    JSON 不关心元素周围是否存在空白，因此上述对象可以格式化为多行格式，如下所示：


    ```

    {

    "id":5103,

    "First":"John",

    "Last":"Smith",

    "Title":"Chief Technology Officer"

    }

    ```


    **JSON 数组**是一种包含未标记值或元素列表的对象类型。其格式为用方括号括起来的逗号分隔值，如下列数字数组示例所示：


    ```

    [1,2,3,4,5]

    ```


    数组可以包含其它数据类型，包括文本，如下例所示：


    ```

    ["Karen","Charlene","Jeff","Susan","Howard"]

    ```


    元素的值甚至可以是另一个对象，从而形成对象的嵌套层次结构。此示例显示一个包含两个 **product 元素**的对象，每个元素包含一个嵌套的 *JSONObject*
    作为产品元数据：


    ```

    {

    "Product1":{"name":"Widget 1","price":39.99,"vendor":15},

    "Product2":{"name":"Widget 2","price":55.48,"vendor":38}

    }

    ```


    元素的值也可以包含数组，如下所示，其中 `friends` 和 `colleagues` 元素各自是一个包含名称列表的 *JSONArray*：


    ```

    {

    "friends":["Dan","Brian","Carolyn","Karen"],

    "colleagues":["Brian","Michael","Mary","Walker","Nadya"]

    }

    ```


    类似地，数组可以包含对象。此示例显示一个包含两个项目的数组：一个包含两个 `Product` 元素的对象，以及另一个包含两个 `Employee` 元素的对象：


    ```

    [

    {"Product1":"Widget 1","Product2":"Widget 2"},

    {"Employee1":"William","Employee2":"Janice"}

    ]

    ```


    虽然某些系统和服务器会返回它们定义的 JSON 格式的数据，但在 FileMaker 中创建 JSON 时，对象的结构可以由你自由定义。任何数量的对象、数组和数据类型都可以混合搭配、连接或嵌套，使用你自定义的标签来创建基于自定义系统要求的独特结构。


    > **提示**：在 [`www.jsonlint.com`](http://www.jsonlint.com) 验证 JSON 对象的格式。


    ## 解析 JSON


    FileMaker 提供了三个用于解析数据的 JSON 函数，每个函数都需要两个参数：一个 `json` 对象（或空字符串）和一个 `keyOrIndexPath`（可选的，用于引用特定元素键、数组索引位置或嵌套元素的路径）：`JSONGetElement`、`JSONListKeys`、`JSONListValues`。


    让我们基于以下假设来学习一些示例：Sandbox 表中的 `Example Text` 字段包含以下包含供应商信息的 JSON：


    ```

    {

    "id":350,

    "name":"First Class Widgets",

    "category":"Manufacturing",

    "contact":

    {

    "phone":"555-867-5309",

    "email":"sales@widgets.nope",

    "web":"www.widgets.nope"

    },

    "products":

    [

    {

    "aisles":[3,8],

    "id":1000,

    "name":"Widget 1",

    "price":39.99

    },

    {

    "aisles":[2,4],

    "id":1001,

    "name":"Widget 2",

    "price":59.99

    }

    ]

    }

    ```


    ### 使用 `JSONGetElement`


    `JSONGetElement` 函数将从提供的 JSON 数据中返回指定元素的值。


    ```

    JSONGetElement ( json ; keyOrIndexOrPath )

    ```


    #### 通过键引用元素


    要通过键引用元素，请在 `keyOrIndexOrPath` 参数中使用其标签名称。此示例显示请求 `name` 元素的调用：


    ```

    JSONGetElement ( Sandbox::Example Text ; "name" )    // 结果 = First Class Widgets

    ```


    此示例请求 `contact` 元素，因此结果是一个 JSON 对象。


    ```

    JSONGetElement ( Sandbox::Example Text ; "contact" )

    // 结果 =

    {

    "phone":"555-867-5309",

    "email":"sales@widgets.nope",

    "web":"www.widgets.nope"

    }

    ```


    #### 通过数组索引引用元素


    当对象是数组时，`keyOrIndexOrPath` 参数应为方括号内的数字，指示所需元素的零基位置。通过使用索引位置 `2`，此示例将从名称数组中提取第三个值，如下所示：


    ```

    JSONGetElement ( ["Michael","Mary","Walker","Karen"] ; "[2]" ) // 结果 = Walker

    ```


    #### 通过路径引用元素


    当解析包含嵌套对象和数组元素的复杂 JSON 时，可以使用 *path*（路径）来引用比第一层更深的元素。*JSON path* 通过指定遍历层级结构到达所需元素所需的每个键来表示，每个键之间用句点分隔。使用供应商示例，要获取
    `phone` 元素，我们必须指定它包含在 `contact` 元素中，如下所示：


    ```

    JSONGetElement ( Sandbox::Example Text ; "contact.phone" )    // 结果 = 555-867-5309

    ```


    *path* 可以根据需要深入到任意层级，并且可以混合使用对象键和数组索引位置。在此示例中，我们通过包含索引位置 `[1]` 来获取数组中第二个位置的 `product`
    的 `price`，如下所示：


    ```

    JSONGetElement ( Sandbox::Example Text ; "products.[1].price" )    // 结果 = 59.99

    ```


    类似地，此示例将从 `product` 元素第一个数组位置的 `aisles` 元素中提取第二个数组位置：


    ```

    JSONGetElement ( Sandbox::Example Text ; "products.[0].aisles.[1]" )    // 结果
    = 8

    ```


    ### 使用 `JSONListKeys`


    `JSONListKeys` 函数返回对象或指定元素中每个键的名称列表。


    ```

    JSONListKeys ( json ; keyOrIndexOrPath )

    ```


    此示例显示如何获取示例 JSON 中的键列表：


    ```

    JSONListKeys ( Sandbox::Example Text ; "" )

    // 结果 =

    category

    contact

    id

    name

    products

    ```


    `keyOrIndexOrPath` 参数可用于指定包含对象或数组的嵌套元素。此示例将返回 `contact` 元素的键列表：


    ```

    JSONListKeys ( Sandbox::Example Text ; "contact" )

    // 结果 =

    phone

    email

    web

    ```


    因为数组是未标记的列表，返回的键将是项目的零基索引位置列表，如下所示指定 `products` 元素：


    ```

    JSONListKeys ( Sandbox::Example Text ; "products" )

    // 结果 =


    ```'
  raw: '## Defining the JSON Format


    A *JSON object* is a bracketed list of *elements* that combine an identifying
    *key* with an associated *value*. Similar structures are referred to many ways
    in other languages, including *array*, *dictionary*, *hash table*, *keyed list*,
    *record*, and *struct*. The *key* is always a text string that acts like a label
    to name and identify the element. An element’s *value* contains some data content
    that is one of the following types:


    *   *JSONString* – A text string


    *   *JSONNumber* – A numeric value


    *   *JSONBoolean* – A true or false value


    *   *JSONArray* – An ordered list of comma-separated values contained within square
    brackets


    *   *JSONObject* – A JSON object nested in the element of a parent object


    *   *JSONNull* – A null value


    *   *JSONRaw* – A value that will be determined by the JSON parser


    A JSON object with a single element containing an id number is formatted with
    the label in quotes, a colon followed by the value, all enclosed in curly brackets
    as follows. Here the key’s value is a *JSONumber*:


    ```

    {"id":5103}

    ```


    In this example, the value contains *JSONText*, a person’s first name:


    ```

    {"First":"John"}

    ```


    A multi-element object uses a comma to separate each uniquely named element. For
    example, an object containing data about a person may combine elements for *id*,
    *first name*, *last name*, and *title*, as shown here:


    ```

    {"id":5103,"First":"John","Last":"Smith","Title":"Chief Technology Officer"}

    ```


    JSON doesn’t care about white space around the elements, so the preceding object
    can be formatted in a multi-line format, as shown here:


    ```

    {

    "id":5103,

    "First":"John",

    "Last":"Smith",

    "Title":"Chief Technology Officer"

    }

    ```


    A *JSON array* is a type of object that contains a list of unlabeled values or
    elements. These are formatted as comma-separated values enclosed in square brackets
    as shown in the following example of an array of numbers:


    ```

    [1,2,3,4,5]

    ```


    An array can contain other data types, including text as shown in this example:


    ```

    ["Karen","Charlene","Jeff","Susan","Howard"]

    ```


    The value of an element can even be another object, creating a nested hierarchy
    of objects. This example shows an object with two *product elements*, each containing
    a nested *JSONObject* of product metadata:


    ```

    {

    "Product1":{"name":"Widget 1","price":39.99,"vendor":15},

    "Product2":{"name":"Widget 2","price":55.48,"vendor":38}

    }

    ```


    An element value can also contain an array, as shown here where the *friends*
    and *colleagues* elements are each a *JSONArray* that contains a list of names.


    ```

    {

    "friends":["Dan","Brian","Carolyn","Karen"],

    "colleagues":["Brian","Michael","Mary","Walker","Nadya"]

    }

    ```


    Similarly, arrays can contain objects. This example shows an array of two items,
    an object with two *Product* elements and another object with two *Employee* elements:


    ```

    [

    {"Product1":"Widget 1","Product2":"Widget 2"},

    {"Employee1":"William"," Employee2":"Janice"}

    ]

    ```


    While some systems and servers will return data in a JSON format defined by them,
    when creating JSON in FileMaker, the structure of an object can be whatever you
    define. Any number of objects, arrays, and data types can be mixed and matched,
    joined, or nested, using custom labels you define to create a unique structure
    based on the requirements of your custom system.


    Tip


    Validate JSON object formatting at [`www.jsonlint.com`](http://www.jsonlint.com).


    ## Parsing JSON


    FileMaker provides three JSON functions that parse data, each requiring two parameters:
    a *json* object (or empty string) and a *keyOrIndexPath* that optionally references
    a specific element key, array index position, or a path to a nested element: *JSONGetElement,
    JSONListKeys, JSONListValues*.


    Let’s work through some examples from the assumption that the *Example Text* field
    in the Sandbox table contains the following JSON that contains vendor information:


    ```

    {

    "id":350,

    "name":"First Class Widgets",

    "category":"Manufacturing",

    "contact":

    {

    "phone":"555-867-5309",

    "email":"sales@widgets.nope",

    "web":"www.widgets.nope"

    },

    "products":

    [

    {

    "aisles":[3,8]

    "id":1000,

    "name":"Widget 1",

    "price":39.99,

    },

    {

    "aisles":[2,4]

    "id":1001,

    "name":"Widget 2",

    "price":59.99,

    }

    ]

    }

    ```


    ### Using JSONGetElement


    The *JSONGetElement* function will return the value of a specified element from
    the json data provided.


    ```

    JSONGetElement ( json ; keyOrIndexOrPath )

    ```


    #### Referring to an Element by Key


    To refer to an element by key, use its label name in the *keyOrIndexOrPath* parameter.
    This example shows a call requesting the *name* element:


    ```

    JSONGetElement ( Sandbox::Example Text ; "name" )    // Result = First Class Widgets

    ```


    This example requests the *contact* element, so the result is a JSON object.


    ```

    JSONGetElement ( Sandbox::Example Text ; "contact" )

    // Result =

    {

    "phone":"555-867-5309",

    "email":"sales@widgets.nope",

    "web":www.widgets.nope

    }

    ```


    #### Referring to an Element by Array Index


    When the object is an array, the *keyOrIndexOrPath* parameter should be a number
    in square brackets indicating the zero-based position of the desired element.
    By using an index position of 2, this example will extract the third value from
    an array of names as shown in this example.


    ```

    JSONGetElement ( ["Michael","Mary","Walker","Karen"] ; "[2]" ) // Result = Walker

    ```


    #### Referring to an Element by Path


    When parsing complex JSON with elements containing nested objects and arrays,
    a *path* can be used to refer to elements deeper than the first level. A *JSON
    path* is specified by denoting each key necessary to traverse the hierarchical
    structure down to the desired element, each separated by a period. Using the vender
    example, to get the *phone* element, we must specify that it is contained within
    the *contact* element, as shown here:


    ```

    JSONGetElement ( Sandbox::Example Text ; "contact.phone" )    // Result = 555-867-5309

    ```


    A *path* can reach down as many levels as necessary, and they can mix object keys
    and array index positions. In this example, we get the *price* of the *product*
    at the second position in the array by including the index position [1], as shown
    here:


    ```

    JSONGetElement ( Sandbox::Example Text ; "products.[1].price" )    // Result =
    59.99

    ```


    Similarly, this example will extract the *second* array position from the *aisle*
    element of the first array position of the *product* element:


    ```

    JSONGetElement ( Sandbox::Example Text ; "products.[0].aisles.[1]" )    // Result
    = 8

    ```


    ### Using JSONListKeys


    The *JSONListKeys* function returns a list of the name of every key in the object
    or a specified element.


    ```

    JSONListKeys ( json ; keyOrIndexOrPath )

    ```


    This example shows how to get a list of the keys in the example json:


    ```

    JSONListKeys ( Sandbox::Example Text ; "" )

    // Result =

    category

    contact

    id

    name

    products

    ```


    The *keyOrIndexOrPath* parameter can be used to specify a nested element containing
    an object or array. This example will return a list of keys for the *contact*
    element:


    ```

    JSONListKeys ( Sandbox::Example Text ; "contact" )

    // Result =

    phone

    email

    web

    ```


    Because arrays are unlabeled lists, the keys returned will be a list of the zero-based
    index positions of items, as shown here specifying the *product* element:


    ```

    JSONListKeys ( Sandbox::Example Text ; "products" )

    // Result =


    ```'
  trans: '

    ## 定义 JSON 格式


    一个 **JSON 对象**是括号内一系列 **元素**的列表，这些元素将标识 *key*（键）与关联的 *value*（值）结合在一起。类似的结构在其它语言中有多种称呼，包括
    *array*（数组）、*dictionary*（字典）、*hash table*（哈希表）、*keyed list*（键控列表）、*record*（记录）和
    *struct*（结构体）。*key* 始终是一个文本字符串，充当标签来命名和标识元素。元素中的 *value* 包含一些数据内容，是以下类型之一：


    - *JSONString* – 文本字符串

    - *JSONNumber* – 数值

    - *JSONBoolean* – `true` 或 `false` 值

    - *JSONArray* – 包含在方括号内、由逗号分隔的有序值列表

    - *JSONObject* – 嵌套在父对象元素中的 JSON 对象

    - *JSONNull* – 空值

    - *JSONRaw* – 将由 JSON 解析器确定的值


    一个包含单个元素（含 `id` 号码）的 JSON 对象格式如下：标签放在引号中，后跟冒号和值，所有内容包裹在花括号中。此处键的值是 *JSONNumber*：


    ```

    {"id":5103}

    ```


    在此示例中，值包含 *JSONText*，即一个人的名字：


    ```

    {"First":"John"}

    ```


    多元素对象使用逗号分隔每个唯一命名的元素。例如，包含人员数据的对象可能组合 *id*、*first name*、*last name* 和 *title*
    等元素，如下所示：


    ```

    {"id":5103,"First":"John","Last":"Smith","Title":"Chief Technology Officer"}

    ```


    JSON 不关心元素周围是否存在空白，因此上述对象可以格式化为多行格式，如下所示：


    ```

    {

    "id":5103,

    "First":"John",

    "Last":"Smith",

    "Title":"Chief Technology Officer"

    }

    ```


    **JSON 数组**是一种包含未标记值或元素列表的对象类型。其格式为用方括号括起来的逗号分隔值，如下列数字数组示例所示：


    ```

    [1,2,3,4,5]

    ```


    数组可以包含其它数据类型，包括文本，如下例所示：


    ```

    ["Karen","Charlene","Jeff","Susan","Howard"]

    ```


    元素的值甚至可以是另一个对象，从而形成对象的嵌套层次结构。此示例显示一个包含两个 **product 元素**的对象，每个元素包含一个嵌套的 *JSONObject*
    作为产品元数据：


    ```

    {

    "Product1":{"name":"Widget 1","price":39.99,"vendor":15},

    "Product2":{"name":"Widget 2","price":55.48,"vendor":38}

    }

    ```


    元素的值也可以包含数组，如下所示，其中 `friends` 和 `colleagues` 元素各自是一个包含名称列表的 *JSONArray*：


    ```

    {

    "friends":["Dan","Brian","Carolyn","Karen"],

    "colleagues":["Brian","Michael","Mary","Walker","Nadya"]

    }

    ```


    类似地，数组可以包含对象。此示例显示一个包含两个项目的数组：一个包含两个 `Product` 元素的对象，以及另一个包含两个 `Employee` 元素的对象：


    ```

    [

    {"Product1":"Widget 1","Product2":"Widget 2"},

    {"Employee1":"William","Employee2":"Janice"}

    ]

    ```


    虽然某些系统和服务器会返回它们定义的 JSON 格式的数据，但在 FileMaker 中创建 JSON 时，对象的结构可以由你自由定义。任何数量的对象、数组和数据类型都可以混合搭配、连接或嵌套，使用你自定义的标签来创建基于自定义系统要求的独特结构。


    > **提示**：在 [`www.jsonlint.com`](http://www.jsonlint.com) 验证 JSON 对象的格式。


    ## 解析 JSON


    FileMaker 提供了三个用于解析数据的 JSON 函数，每个函数都需要两个参数：一个 `json` 对象（或空字符串）和一个 `keyOrIndexPath`（可选的，用于引用特定元素键、数组索引位置或嵌套元素的路径）：`JSONGetElement`、`JSONListKeys`、`JSONListValues`。


    让我们基于以下假设来学习一些示例：Sandbox 表中的 `Example Text` 字段包含以下包含供应商信息的 JSON：


    ```

    {

    "id":350,

    "name":"First Class Widgets",

    "category":"Manufacturing",

    "contact":

    {

    "phone":"555-867-5309",

    "email":"sales@widgets.nope",

    "web":"www.widgets.nope"

    },

    "products":

    [

    {

    "aisles":[3,8],

    "id":1000,

    "name":"Widget 1",

    "price":39.99

    },

    {

    "aisles":[2,4],

    "id":1001,

    "name":"Widget 2",

    "price":59.99

    }

    ]

    }

    ```


    ### 使用 `JSONGetElement`


    `JSONGetElement` 函数将从提供的 JSON 数据中返回指定元素的值。


    ```

    JSONGetElement ( json ; keyOrIndexOrPath )

    ```


    #### 通过键引用元素


    要通过键引用元素，请在 `keyOrIndexOrPath` 参数中使用其标签名称。此示例显示请求 `name` 元素的调用：


    ```

    JSONGetElement ( Sandbox::Example Text ; "name" )    // 结果 = First Class Widgets

    ```


    此示例请求 `contact` 元素，因此结果是一个 JSON 对象。


    ```

    JSONGetElement ( Sandbox::Example Text ; "contact" )

    // 结果 =

    {

    "phone":"555-867-5309",

    "email":"sales@widgets.nope",

    "web":"www.widgets.nope"

    }

    ```


    #### 通过数组索引引用元素


    当对象是数组时，`keyOrIndexOrPath` 参数应为方括号内的数字，指示所需元素的零基位置。通过使用索引位置 `2`，此示例将从名称数组中提取第三个值，如下所示：


    ```

    JSONGetElement ( ["Michael","Mary","Walker","Karen"] ; "[2]" ) // 结果 = Walker

    ```


    #### 通过路径引用元素


    当解析包含嵌套对象和数组元素的复杂 JSON 时，可以使用 *path*（路径）来引用比第一层更深的元素。*JSON path* 通过指定遍历层级结构到达所需元素所需的每个键来表示，每个键之间用句点分隔。使用供应商示例，要获取
    `phone` 元素，我们必须指定它包含在 `contact` 元素中，如下所示：


    ```

    JSONGetElement ( Sandbox::Example Text ; "contact.phone" )    // 结果 = 555-867-5309

    ```


    *path* 可以根据需要深入到任意层级，并且可以混合使用对象键和数组索引位置。在此示例中，我们通过包含索引位置 `[1]` 来获取数组中第二个位置的 `product`
    的 `price`，如下所示：


    ```

    JSONGetElement ( Sandbox::Example Text ; "products.[1].price" )    // 结果 = 59.99

    ```


    类似地，此示例将从 `product` 元素第一个数组位置的 `aisles` 元素中提取第二个数组位置：


    ```

    JSONGetElement ( Sandbox::Example Text ; "products.[0].aisles.[1]" )    // 结果
    = 8

    ```


    ### 使用 `JSONListKeys`


    `JSONListKeys` 函数返回对象或指定元素中每个键的名称列表。


    ```

    JSONListKeys ( json ; keyOrIndexOrPath )

    ```


    此示例显示如何获取示例 JSON 中的键列表：


    ```

    JSONListKeys ( Sandbox::Example Text ; "" )

    // 结果 =

    category

    contact

    id

    name

    products

    ```


    `keyOrIndexOrPath` 参数可用于指定包含对象或数组的嵌套元素。此示例将返回 `contact` 元素的键列表：


    ```

    JSONListKeys ( Sandbox::Example Text ; "contact" )

    // 结果 =

    phone

    email

    web

    ```


    因为数组是未标记的列表，返回的键将是项目的零基索引位置列表，如下所示指定 `products` 元素：


    ```

    JSONListKeys ( Sandbox::Example Text ; "products" )

    // 结果 =


    ```

