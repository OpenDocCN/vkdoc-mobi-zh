    in a database, users spend most of their time performing tasks that involve creating,
    editing, deleting, omitting, searching, exporting, importing, printing, and viewing
    records. Although a database can contain many different tables each with its own
    collection of records, this chapter uses the *Learn FileMaker Chapter* [*3*](#429700_2_En_3_Chapter.xhtml)*-*[*5*](#429700_2_En_5_Chapter.xhtml)
    sample file with a single *Contacts* table. This simplifies examples and provides
