    \ | `Field menu` – Click to select an `Edit box` mode or click-hold to choose\
    \ a specific control style. Drag in the content area to create a field object\
    \ and select a field assignment. Once created, the control style can be modified\
    \ (Chapter [20](#429700_2_En_20_Chapter.xhtml), “Configuring Field Control Style”).\
    \ |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figf_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figf_HTML.jpg)\
    \ | `Button menu` – Click to select the Button tool or click-hold to choose from\
    \ a menu of `Button` or `Popover Button`. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figg_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figg_HTML.jpg)\
    \ | `Button Bar tool` – Draw a segmented bar that can contain multiple `Buttons`\
    \ and/or `Popover Buttons`. |\n| ![../images/429700_2_En_17_Chapter/429700_2_En_17_Figh_HTML.jpg](images/429700_2_En_17_Chapter/429700_2_En_17_Figh_HTML.jpg)\
    \ | `Multi-panel Object menu` – Click to select the `Tab Control` tool or click-hold\
