    The *Allow exporting* option enables a variety of data output functions including
    exporting records, saving records as an Excel file, copying all records in the
    found set, and saving a copy of records. But it also enables the ability of external
    scripts to access and extract record information, e.g., *AppleScript* on macOS.


    When the *Allow user to override data validation warnings* option is enabled,
    users assigned the privilege set can override any field validation warning dialog,
    including those that are not explicitly defined to allow it (Chapter [8](#429700_2_En_8_Chapter.xhtml),
    “Validation Control”).


    Enable the *Allow user to modify their own password* to let users change their
    password by selecting the *File ➤ Change Password* menu item. Two adjacent checkboxes
    allow you to schedule a forced password change at regular intervals and control
    a minimum length for any new passwords they select.


    The selection from the *Available menu commands* pop-up menu controls the menus
    available. While access to menus can be influenced by other permissions granted
    to the privilege set and by the presence of custom menus (Chapter [23](#429700_2_En_23_Chapter.xhtml)),
    this option specifies a blanket category of commands they can access. Choose *All*
    to grant access to the entire active menu bar. Limit them to basic editing functions
    by choosing *Editing Only*. Select *Minimum* to severely restrict them to menus
    for only the most basic functions such as open, close, and create database files,
    window functions, perform scripts, preferences, and help.


    Caution


    The menu setting for new privilege sets defaults to minimal which provides almost
    no enabled functions. Be sure to change this when creating new accounts.'
  trans: '


    ##### 控制记录访问


    `编辑权限集`对话框中的`记录`弹出菜单提供了五个选项，用于控制用户对记录的操作：


    - `在所有表中创建、编辑和删除`

    - `在所有表中创建和编辑`

    - `在所有表中仅查看`

    - `全部无访问权限`

    - `自定义权限`


    前四个选项不言自明，适用于每个表中的所有记录。选择`自定义权限`选项将打开`自定义记录权限`对话框，如图 30-7 所示。数据库中的每个表都列在其中，底部还有一个额外的行，用于定义未来创建的任何新表的默认权限设置。列表下方有五个弹出菜单，用于为上方选定的表指定`查看`、`编辑`、`创建`、`删除`和`字段访问`权限。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig7_HTML.jpg](img/429700_2_En_30_Fig7_HTML.jpg)


    图 30-7


    用于控制每个表记录访问权限的对话框


    所有五个弹出菜单中的可用设置类似，仅有细微差别。前四个菜单都有`是`和`否`选项，功能完全相同：为所选表启用或禁用该功能。例如，要允许在所选表中创建记录，请在`创建`菜单下选择`是`。其中三个菜单还有一个`有限`选项，选择后会打开`指定计算`对话框，以便通过公式对功能访问进行更精细的控制。例如，公式可以设置仅在特定字段具有特定值、仅在特定星期几、仅在特定布局当前时，或满足公式中包含的任何其他条件时，才允许删除记录。当`查看`选项设置为不允许访问时（即，你不能授予对用户无法查看的内容的编辑权限），`编辑`菜单将被禁用。


    `字段访问`菜单选项与其他四个略有不同。虽然它们执行类似的功能，但其命名与字段相关而非功能相关。选择`全部`允许对所有字段的编辑访问，选择`无`以限制访问。选择`有限`将打开`自定义字段权限`对话框，如图
    30-8 所示。此对话框允许为每个字段设置`可修改`、`仅查看`或`无访问权限`。它还包含一个选项，用于定义将来添加到表中的任何新字段的默认设置。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig8_HTML.jpg](img/429700_2_En_30_Fig8_HTML.jpg)


    图 30-8


    用于控制表中单个字段权限的对话框


    ##### 控制布局访问


    `编辑权限集`对话框中的`布局`弹出菜单提供了四个选项，用于控制用户对布局的操作：


    - `全部可修改`

    - `全部仅查看`

    - `全部无访问权限`

    - `自定义权限`


    > **注意**：如果用户无法访问某个布局，那么在其会话期间运行的脚本也无法访问该布局，除非该脚本被配置为使用完全访问权限运行。


    当你从`布局`菜单中选择`自定义权限`选项时，将打开`自定义布局权限`对话框，如图 30-9 所示。选中顶角的`允许创建新布局`复选框，以允许用户创建新布局。数据库中的每个布局都列在其中，底部还有一个额外的选项，用于定义将来创建的任何新布局的默认权限设置。列表下方是为所选布局提供的两组权限选项。`布局`选项提供三个权限级别：`可修改`、`仅查看`或`无访问权限`。`通过此布局的记录`单选按钮控制当布局可查看或可修改时，用户与记录交互的权限，其选项名称类似，允许你超越之前讨论的针对整个表的`记录`设置，逐个布局地控制字段交互权限。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig9_HTML.jpg](img/429700_2_En_30_Fig9_HTML.jpg)


    图 30-9


    用于按布局控制权限的对话框


    ##### 控制值列表访问


    `编辑权限集`对话框中的`值列表`弹出菜单提供了四个选项，用于控制用户对值列表的操作。


    - `全部可修改`

    - `全部仅查看`

    - `全部无访问权限`

    - `自定义权限`


    ##### 控制脚本访问


    `编辑权限集`对话框中的`脚本`弹出菜单提供了四个选项，用于控制用户对脚本的操作。


    - `全部可修改`

    - `全部仅可执行`

    - `全部无访问权限`

    - `自定义权限`


    #### 分配其他权限设置


    在`编辑权限集`对话框的右侧是`其他权限`，之前在图 30-6 中已显示。这些功能大多数启用的功能从其表述上应该相当明显。然而，有几个值得一提。


    `允许导出`选项启用了多种数据输出功能，包括导出记录、将记录保存为 Excel 文件、复制找到集中的所有记录以及保存记录的副本。但它也允许外部脚本访问和提取记录信息，例如
    macOS 上的 `AppleScript`。


    当启用了`允许用户覆盖数据验证警告`选项时，被分配了该权限集的用户能够覆盖任何字段验证警告对话框，包括那些未明确允许覆盖的警告（参见第 8 章“验证控制”）。


    启用`允许用户修改自己的密码`选项，让用户可以通过选择`文件 ➤ 更改密码`菜单项来更改其密码。旁边有两个复选框，允许你安排定期强制更改密码，并控制他们选择的任何新密码的最小长度。


    从`可用的菜单命令`弹出菜单中的选择控制着可用的菜单。虽然菜单访问可能受到授予权限集的其他权限以及自定义菜单存在的影响（第 23 章），但此选项指定了他们可以访问的命令的通用类别。选择`全部`以允许访问整个活动菜单栏。通过选择`仅编辑`将其限制为基本的编辑功能。选择`最小`以严格限制他们只能访问最基本功能的菜单，例如打开、关闭和创建数据库文件、窗口功能、执行脚本、偏好设置和帮助。


    > **注意**：新权限集的菜单设置默认为最小，这几乎不提供任何启用的功能。在创建新帐户时，请务必更改此项。

