- fmt: '## Summary


    This chapter introduced the methods of solution deployment and various ways to
    access databases. In the next chapter, we explore credentialing to restrict access
    to a database.


    # 30. Defining Accounts and Permissions


    In this modern age of global network connectivity, the need to secure a database
    should be glaringly obvious. News stories about data breaches, leaked information,
    and malicious exploitation by hackers provide us a sobering warning about the
    dangers of unsecured data. As important as it is to stop unauthorized access by
    outsiders, security permission is a far more complex subject. Even authorized
    users require restrictions on their activity inside the database. Limitations
    on the content they can create, view, modify, and use are important to consider.
    Also, restricting access to the *structural design* of a database can help stop
    careless or malicious alternations to the schema, interface, and script functions.
    Even a minor accidental change to a formula or script can be catastrophic to a
    company’s workflow and may result in severe financial consequences. Only users
    with adequate technical skills and knowledge of business logistics should be authorized
    to act as a developer. This chapter explores the available credentialing features,
    covering the following topics:


    - Defining default security

    - Defining user accounts

    - Exploring privilege sets

    - Using credentials in formulas

    - Leveraging custom extended privileges

    - Controlling file access


    ## Defining Default Security


    *Account credentials* define who can open a file and what privileges they are
    granted. Every FileMaker database begins with default credential settings configured
    to be unobtrusive and allow anyone instant access to the full content and structure
    of the file. Anyone who can see the file stored in a directory or shared by another
    client can open it and will have *full access to everything*. The file will appear
    to be unlocked and will open without a login prompt. This configuration may be
    acceptable for situations involving personal use of a database as a document file
    on a local computer or in small teams where security isn’t a concern. However,
    in most cases, credentialing is recommended to protect both sensitive content
    and structural programming. It is *required* when hosting a database with FileMaker
    Server or FileMaker Cloud.


    FileMaker requires every database to have at least two default accounts setting:
    one active account that allows full development access and another account that
    provides guests read-only access. Every new database is created with both. An
    account named `[Guest]` allows a user to open the file *without* entering a username
    or password but with severely limited privileges. This account cannot be deleted
    but is disabled by default. When enabled, a *Sign-in As Guest* button is added
    to the login dialog. A second account named `Admin` is automatically enabled but
    has no password entered. Since the *Log in using* setting of the *File Options*
    dialog (Chapter [6](#429700_2_En_6_Chapter.xhtml), “Database File Options”) is
    automatically configured to enter this account when a file is opened, it creates
    the illusion that new files have no access settings. In fact, new files are simply
    bypassing the login screen and signing in as this default full access account
    without a password.


    **Caution:** When a file is configured to auto-enter a *Full Access* account or
    if no password is assigned it, FileMaker Server and FileMaker Cloud will refuse
    to host it.


    ## Defining User Accounts


    Accounts are defined in the *Manage Security* dialog, shown in Figure [30-1](#429700_2_En_30_Chapter.xhtml#Fig1).
    This dialog is opened by selecting the *Manage ➤ Security* under the *File* menu.
    It lists the accounts defined in the file and is used to create, configure, edit,
    duplicate, and delete accounts. It also has a button used to access another dialog
    of *Advanced Settings* (discussed later in this chapter).


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig1_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig1_HTML.jpg)


    **Figure 30-1** The dialog used to manage file access credentials


    While the two default accounts are stored fully inside the database file, accounts
    can also be defined that authenticate a user using an external authorization system.
    The *Authenticate via* pop-up menu toggles the account list by the selected authentication
    method.


    The default *FileMaker File or External Server* authentication option combines
    two accounts types into a single list. A *FileMaker File* account is defined with
    an account name and password that is fully stored inside the database file. An
    *External Server* account is defined in the file with only a name that references
    a *user account group* created externally on the host computer or on a centrally
    managed authentication server, such as *Apple Open Directory* or *Windows Active
    Directory*. This allows individual user credentials to be stored and managed at
    the computer level by the IT department, so personnel changes don’t require modifications
    inside the database. One or more external user accounts can be attached to a group
    by the operating system or authentication server. The database account grants
    permissions to any user assigned to the group, allowing them to sign in using
    their external credentials. This is especially useful when a database solution
    is composed of many separate files and managing user changes across them all would
    be too labor intensive. External authentication only works when a database is
    hosted by a FileMaker Server.


    The *Claris ID* option appears at the top of the authentication menu when the
    developer’s local application is signed into a *FileMaker Cloud* account. Sign
    into an account by selecting the *My Apps* section of the *Launch Center* window.
    Then, return to the security dialog and define which cloud users will have access
    to this file when it is hosted on that *FileMaker Cloud*.


    FileMaker also includes support for *Open Authorization* (OAuth), the open-standard
    authorization framework that allows a third-party system to authenticate a user
    on behalf of another system without directly sharing credentials. Databases hosted
    on a *FileMaker Server* can be configured to authenticate using credentials from
    a user’s *Amazon*, *Google*, and *Microsoft Azure AD* account.'
  raw: '## Summary


    This chapter introduced the methods of solution deployment and various ways to
    access databases. In the next chapter, we explore credentialing to restrict access
    to a database.


    # 30. Defining Accounts and Permissions


    In this modern age of global network connectivity, the need to secure a database
    should be glaringly obvious. News stories about data breaches, leaked information,
    and malicious exploitation by hackers provide us a sobering warning about the
    dangers of unsecured data. As important as it is to stop unauthorized access by
    outsiders, security permission is a far more complex subject. Even authorized
    users require restrictions on their activity inside the database. Limitations
    on the content they can create, view, modify, and use are important to consider.
    Also, restricting access to the *structural design* of a database can help stop
    careless or malicious alternations to the schema, interface, and script functions.
    Even a minor accidental change to a formula or script can be catastrophic to a
    company’s workflow and may result in severe financial consequences. Only users
    with adequate technical skills and knowledge of business logistics should be authorized
    to act as a developer. This chapter explores the available credentialing features,
    covering the following topics:


    *   Defining default security


    *   Defining user accounts


    *   Exploring privilege sets


    *   Using credentials in formulas


    *   Leveraging custom extended privileges


    *   Controlling file access


    ## Defining Default Security


    *Account credentials* define who can open a file and what privileges they are
    granted. Every FileMaker database begins with default credential settings configured
    to be unobtrusive and allow anyone instant access to the full content and structure
    of the file. Anyone who can see the file stored in a directory or shared by another
    client can open it and will have *full access to everything*. The file will appear
    to be unlocked and will open without a login prompt. This configuration may be
    acceptable for situations involving personal use of a database as a document file
    on a local computer or in small teams where security isn’t a concern. However,
    in most cases, credentialing is recommended to protect both sensitive content
    and structural programming. It is *required* when hosting a database with FileMaker
    Server or FileMaker Cloud.


    FileMaker requires every database to have at least two default accounts setting:
    one active account that allows full development access and another account that
    provides guests read-only access. Every new database is created with both. An
    account named “`[Guest]`” allows a user to open the file *without* entering a
    username or password but with severely limited privileges. This account cannot
    be deleted but is disabled by default. When enabled, a *Sign-in As Guest* button
    is added to the login dialog. A second account named “Admin” is automatically
    enabled but has no password entered. Since the *Log in using* setting of the *File
    Options* dialog (Chapter [6](#429700_2_En_6_Chapter.xhtml), “Database File Options”)
    is automatically configured to enter this account when a file is opened, it creates
    the illusion that new files have no access settings. In fact, new files are simply
    bypassing the login screen and signing in as this default full access account
    without a password.


    Caution


    When a file is configured to auto-enter a *Full Access* account or if no password
    is assigned it, FileMaker Server and FileMaker Cloud will refuse to host it.


    ## Defining User Accounts


    Accounts are defined in the *Manage Security* dialog, shown in Figure [30-1](#429700_2_En_30_Chapter.xhtml#Fig1).
    This dialog is opened by selecting the *Manage ➤ Security* under the *File* menu.
    It lists the accounts defined in the file and is used to create, configure, edit,
    duplicate, and delete accounts. It also has a button used to access another dialog
    of *Advanced Settings* (discussed later in this chapter).


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig1_HTML.jpg](images/429700_2_En_30_Chapter/429700_2_En_30_Fig1_HTML.jpg)


    Figure 30-1


    The dialog used to manage file access credentials


    While the two default accounts are stored fully inside the database file, accounts
    can also be defined that authenticate a user using an external authorization system.
    The *Authenticate via* pop-up menu toggles the account list by the selected authentication
    method.


    The default *FileMaker File or External Server* authentication option combines
    two accounts types into a single list. A *FileMaker File* account is defined with
    an account name and password that is fully stored inside the database file. An
    *External Server* account is defined in the file with only a name that references
    a *user account group* created externally on the host computer or on a centrally
    managed authentication server, such as *Apple Open Directory* or *Windows Active
    Directory*. This allows individual user credentials to be stored and managed at
    the computer level by the IT department, so personnel changes don’t require modifications
    inside the database. One or more external user accounts can be attached to a group
    by the operating system or authentication server. The database account grants
    permissions to any user assigned to the group, allowing them to sign in using
    their external credentials. This is especially useful when a database solution
    is composed of many separate files and managing user changes across them all would
    be too labor intensive. External authentication only works when a database is
    hosted by a FileMaker Server.


    The *Claris ID* option appears at the top of the authentication menu when the
    developer’s local application is signed into a *FileMaker Cloud* account. Sign
    into an account by selecting the *My Apps* section of the *Launch Center* window.
    Then, return to the security dialog and define which cloud users will have access
    to this file when it is hosted on that *FileMaker Cloud*.


    FileMaker also includes support for *Open Authorization* (OAuth), the open-standard
    authorization framework that allows a third-party system to authenticate a user
    on behalf of another system without directly sharing credentials. Databases hosted
    on a *FileMaker Server* can be configured to authenticate using credentials from
    a user’s *Amazon*, *Google*, and *Microsoft Azure AD* account.'
  trans: '好的，作为高级文档工程师和翻译员，我已遵循您提供的注意事项，将英文文本翻译成中文，并保留了所有格式标记。



    ## 摘要


    本章介绍了解决方案部署的方法以及访问数据库的各种方式。在下一章中，我们将探讨用于限制数据库访问的凭据认证。


    # 30. 定义账户与权限


    在这个全球网络互联的现代时代，保护数据库安全的需求显而易见。关于数据泄露、信息泄漏以及黑客恶意利用的新闻报道，为我们提供了关于未受保护数据危险的警钟。虽然阻止外部人员的未授权访问非常重要，但安全权限是一个更为复杂的主题。即使是授权用户，也需对其在数据库内部的活动进行限制。限制他们可以创建、查看、修改和使用的*内容*值得考虑。同样，限制对数据库*结构设计*的访问，有助于阻止对模式、界面和脚本函数的粗心或恶意更改。即使是对公式或脚本的微小意外更改，也可能对公司的业务流程造成灾难性影响，并可能导致严重的经济后果。只有具备足够技术技能和业务逻辑知识的用户才应被授权担任开发者角色。本章探讨可用的凭据认证功能，涵盖以下主题：


    -   定义默认安全

    -   定义用户账户

    -   探索权限集

    -   在公式中使用凭据

    -   利用自定义扩展权限

    -   控制文件访问


    ## 定义默认安全


    *账户凭据*定义了谁可以打开文件以及他们被授予了哪些权限。每个 FileMaker 数据库都从默认凭据设置开始，这些设置被配置为不引人注目，并允许任何人立即访问文件的全部内容和结构。任何能看到存储在目录中或由其他客户端共享的文件的人都可以打开它，并拥有*对所有内容的完全访问权限*。该文件将显示为已解锁，并且无需登录提示即可打开。对于在本地计算机上将数据库作为文档文件使用的个人情况，或者在无需考虑安全性的小团队中，此配置可能是可以接受的。然而，在大多数情况下，建议使用凭据认证来保护敏感内容和结构编程。当使用
    FileMaker Server 或 FileMaker Cloud 托管数据库时，这是*必须的*。


    FileMaker 要求每个数据库至少有两个默认账户设置：一个允许完全开发访问的活动账户，另一个为访客提供只读访问权限的账户。每个新创建的数据库都包含这两个账户。一个名为
    `[Guest]` 的账户允许用户*无需*输入用户名或密码即可打开文件，但权限受到严格限制。此账户无法删除，但默认情况下处于禁用状态。启用后，登录对话框中会添加一个*以访客身份登录*按钮。第二个名为
    `Admin` 的账户会自动启用，但未设置密码。由于*文件选项*对话框（第 6 章，“数据库文件选项”）中的*登录方式*设置会自动配置为在打开文件时使用此账户登录，因此造成了新文件没有访问设置的假象。实际上，新文件只是绕过了登录屏幕，并以无密码的默认完全访问账户身份登录。


    **注意：** 当文件配置为自动登录*完全访问*账户或未分配密码时，FileMaker Server 和 FileMaker Cloud 将拒绝托管该文件。


    ## 定义用户账户


    账户在*管理安全性*对话框中定义，如图 30-1 所示。通过选择*文件*菜单下的*管理 ➤ 安全性*来打开此对话框。它列出了文件中定义的账户，并用于创建、配置、编辑、复制和删除账户。它还有一个按钮，用于访问另一个*高级设置*对话框（本章稍后讨论）。


    ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig1_HTML.jpg](img/429700_2_En_30_Fig1_HTML.jpg)


    **图 30-1** 用于管理文件访问凭据的对话框


    虽然两个默认账户完全存储在数据库文件内部，但也可以定义使用外部授权系统对用户进行身份验证的账户。*通过以下方式验证*弹出菜单可根据选定的身份验证方法切换账户列表。


    默认的 *FileMaker 文件或外部服务器* 身份验证选项将两种账户类型合并到一个列表中。*FileMaker 文件*账户使用完全存储在数据库文件内部的账户名和密码进行定义。*外部服务器*账户在文件中仅使用一个名称进行定义，该名称引用了在主机计算机上或集中管理的身份验证服务器（例如
    *Apple Open Directory* 或 *Windows Active Directory*）上外部创建的*用户账户组*。这样，各个用户的凭据可以由
    IT 部门在计算机级别进行存储和管理，因此人员变动无需在数据库内部进行修改。一个或多个外部用户账户可以由操作系统或身份验证服务器附加到一个组。数据库账户将权限授予分配给该组的任何用户，允许他们使用其外部凭据登录。当数据库解决方案由许多独立的文件组成，并且跨所有文件管理用户更改过于费力时，这尤其有用。外部身份验证仅在数据库由
    FileMaker Server 托管时有效。


    当开发者的本地应用程序已登录到 *FileMaker Cloud* 账户时，*Claris ID* 选项会出现在身份验证菜单的顶部。通过选择*启动中心*窗口的*我的应用*部分登录账户。然后，返回安全性对话框，定义哪些云用户在该文件托管于该
    *FileMaker Cloud* 上时可以访问它。


    FileMaker 还包括对*开放授权* (OAuth) 的支持，这是一种开放标准的授权框架，允许第三方系统代表另一个系统对用户进行身份验证，而无需直接共享凭据。托管在
    *FileMaker Server* 上的数据库可以配置为使用来自用户的 *Amazon*、*Google* 和 *Microsoft Azure AD*
    账户的凭据进行身份验证。

