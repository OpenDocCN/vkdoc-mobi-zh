- fmt: '### Looping Through Data


    A *Loop* can also be used to step through data stored in a variable. Each loop
    can perform operations on a paragraph of a return-delimited list of values or
    a key of a JSON Object, working through them one by one until complete. There
    are different ways of controlling the process. One method involves setting up
    a couple of *control variables*, one to store a *count* of values and another
    to keep track of the number of the *current* value which is incremented on each
    loop.


    For example, assume a list of state abbreviations placed into a variable named
    `$States`. Each state listed will be used to build one find criteria request for
    a search of `Contact` records. If the entire list of states is entered into a
    single find request, there will be no resulting matches since that would instruct
    FileMaker to look for records with a mailing address that includes all those states.
    To get a result, multiple find requests need to be created, one for each state
    in the list. The following script assumes a variable named `$State` contains a
    list of abbreviated states, e.g., `OH¶PA¶NY`. It counts these using the `ValueCount`
    function and places that number into a variable named `$Count` which will control
    how many loops we perform. Then, it initializes another variable named `$Current`
    to indicate a start on the first state in the list. Next, it does the `Enter Find
    Mode` step and begins the *Loop* through the list of states, creating one find
    request for each state in the variable. With each loop, the `$Current` variable
    is increased by one until it exceeds `$Count` and the loop is exited. After the
    loop has terminated, the find is performed.


    ```

    Set Variable [ $States ; "OH¶PA¶NY" ]

    Set Variable [ $Count ; ValueCount ( $States ) ]

    Set Variable [ $Current ; 1 ]

    Enter Find Mode [ Pause : Off ]

    Loop

    Set Field [ Contact::Contact Address State ; GetValue ( $States ; $Current ) ]

    Set Variable [ $Current ; $Current + 1 ]

    Exit Loop If [ $Current > $Count ]

    New Record/Request

    End Loop

    Perform Find [ ]

    ```


    Another method of doing the same is to use the first value from the list on each
    loop but remove it from the list, repeating until the list is empty. This eliminates
    the need to have control variables to store the number of values and the current
    value. In the following example, `GetValue` is used to insert the first state
    into the current request. Next, the `$States` variable uses the `ValueCount` and
    `RightValues` functions to remove the first value, leaving the remaining values
    for future iterations. When the `$States` variable is empty, the `Exit Loop If`
    step terminates the loop and the find is performed.


    ```

    Set Variable [ $States ; "OH¶PA¶NY" ]

    Enter Find Mode [ Pause : Off ]

    Loop

    Set Field [ Contact::Contact Address State ; GetValue ( $States ; 1 ) ]

    Set Variable [ $States ; RightValues ( $States ; ValueCount ( $States ) - 1 )
    ]

    Exit Loop If [ $States = "" ]

    New Record/Request

    End Loop

    Perform Find [ ]

    ```


    ## Managing Windows


    There are numerous script steps that allow for the manipulation and management
    of windows. The `Adjust Window` step changes the visibility or size of a window
    based on a selection from one of five options. The `Resize to Fit` setting will
    adjust the dimensions of the window to the minimum size possible while continuing
    to display the entire content area within the confines of the maximum size allowed
    by the current monitor dimensions. Choosing `Maximize` will cause the step to
    resize the window to the full size of the computer screen, while `Minimize` will
    shrink the window down to an icon stored in the Dock (macOS) or taskbar (Windows).
    To return a window to the size and position it was when the script started, choose
    `Restore`. Finally, the `Hide` option will hide the window from view, placing
    it into the `Window ➤ Show Window` menu from where it can be reopened. The `Arrange
    all Windows` step can arrange every open window one of four ways: `Tile Horizontally`,
    `Tile Vertically`, `Cascade`, or `Bring All To Front`. Other steps can `Close`,
    `Refresh`, or `Scroll Window`. The `Select Window` step will bring a specific
    window to the front, making it the currently active context. With `Move/Resize
    Window`, a script can adjust the `Height`, `Width`, `Distance from Top`, and `Distance
    from Left` dimensions for a specified window. Change the name of a window using
    the `Set Window Title` step.


    ### Creating a New Window


    The `New Window` step will create a new window based on the current window’s type,
    layout, size, positions, and other properties, unless these are specifically modified
    in the configuration dialog shown in Figure [25-13](#429700_2_En_25_Chapter.xhtml#Fig13).


    ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig13_HTML.jpg](images/429700_2_En_25_Chapter/429700_2_En_25_Fig13_HTML.jpg)


    Figure 25-13


    The configuration options for creating a new window with a script


    The `Window Style` controls the type of window that will be created. The default
    option is a `Document` which is a standard non-modal FileMaker window. Other options
    are a `Floating Document` (a non-modal window that remains in front of other windows),
    a `Dialog` (a window that is modal to the application), or a `Card` (a window
    modal to and attached as an overlay to the parent window).


    Note


    A window is *modal* when it forces user interaction and/or dismissal before resuming
    other work in the affected context.


    The central settings are all optional. If these are not specified, the new window
    will default to the settings of the window active when the step is executed. A
    `Window Name` can be entered in the text area or by clicking the `fx` button to
    generate one with a formula. If no name is specified, the new window will be named
    the same as the current window with a numeric suffix. Select a `Layout` that should
    be displayed in the new window. The `Size` and `Position` dimensions control window
    dimensions, each with the option to directly enter a value or a formula. The `From
    Top` and `From Left` positions can specify positions based on the current user’s
    screen size. A formula can be used for precise centering or other alignments (Chapter
    [13](#429700_2_En_13_Chapter.xhtml), “Getting Window Dimensions”).


    Tip


    Developers often create “staging” windows with large negative value for the `From
    Left` and `From Top` properties to “hide” them off-screen when performing a complex
    sequence of steps that would be visually distracting to a user if done in full
    view.


    The `Window Options` checkboxes control the properties of the new window. The
    `Close`, `Minimize`, `Maximize`, and `Resize` options enable the ability of a
    user to modify the window. The `Menubar` visibility can be visible or hidden (Windows
    only) as can the `Toolbars`. For Card windows, the `Dim Parent Window` option
    will obscure the window behind the attached card window to help highlight its
    dimensions.


    Caution


    Opening a modal window without access to the close function and without a button
    or script to close the window will trap the user and may require a force quit
    of the application to escape.


    ### Building a Custom Dialog Window


    One way to overcome the limitations of the `Show Custom Dialog` step is using
    the `New Window` step to open a custom layout designed as a dialog. Since the
    dialog is really a layout, it can contain any number of any type of object formatted
    in any way required to accomplish the intended task. It can include lengthy instructions,
    any number of input fields configured with any control style, and way more than
    three buttons. A script can present the dialog in a new window and pause for the
    user action before continuing. In this section, we create a simple dialog layout
    and script that opens it in a new window, enters Find mode, and pauses for the
    user to make a selection of a state in a pop-up menu. Four buttons are included
    to continue the process: a choice of three types of marketing emails that would
    be sent to the found set and an option to cancel.'
