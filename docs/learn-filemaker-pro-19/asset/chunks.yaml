  trans: '

    # 处理字段对象


    在 FileMaker 中，术语*字段*的含义会根据讨论语境而有很大差异。请花点时间区分通常被混为一谈的四种事物，如图 20-2 所示：


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig2_HTML.jpg](img/429700_2_En_20_Fig2_HTML.jpg)


    图 20-2 – 术语“字段”各种用途的图示


    - 表模式中的*字段定义*，即其底层数据结构

    - 数据记录的*字段单元格*实例

    - 正在设计的布局上的*字段对象*

    - 浏览模式下布局中呈现的*字段显示*


    将这四种都称为“字段”本身并无问题，也无需强制使用所示的标准术语。事实上，本书有时也会统一用该术语指代它们。然而，请花点时间理解其中的区别，以避免混淆。


    表的*字段定义*是存储*潜力*的独立单元，它确立了数据库模式中的数据类型和设置。这些定义会被复制为*字段单元格*，对应表中数据内容创建的每条记录，成为包含信息的*实际*存储单元。这类似于电子表格的隐喻：字段定义如同*列*，记录如同*行*，而记录中字段的每个实例则是一个*单元格*。在
    FileMaker 中，由于用户是*通过*布局与数据结构交互，因此隐喻性的电子表格被隐藏起来，这种区别对用户来说不太重要。


    在设计布局时，*字段对象*是一个图形元素，它定义了字段单元格显示的位置、行为和外貌。在布局模式下，*字段对象*被赋予一个*字段引用*，它是指向*字段定义*的指针。在浏览模式下查看时，该布局对象会渲染成*字段显示*，展示当前查看记录的*字段单元格*中存储的信息；其格式和行为遵循*表的字段定义*和*布局的字段对象*两者的设置。


    ## 向布局添加字段


    可以通过多种方法将字段添加到布局中。有些方法会先放置字段对象，然后要求指定字段引用。其他方法则要求在创建对象之前指定引用。还有一种方法可以根据情况双向操作。下面简要介绍所有向布局添加字段的方法。


    ### 添加后指定字段引用


    以下所有方法都会先在布局上添加一个*未定义字段对象*，然后立即弹出*指定字段*对话框（下一节描述），要求选择字段引用：


    - 将工具栏中的`字段`工具拖放到布局上。

    - 选择工具栏菜单中的`字段/控件`，将光标置于*字段绘制*模式，然后点击并拖动以创建字段对象。单击一次可自动选择默认的`编辑框`控件类型。按住鼠标点击并保持，可从菜单中选择一种控件类型。

    - 选择`插入 ➤ 字段`菜单。

    - 使用`编辑 ➤ 复制`菜单复制选定的字段。


    ### 添加时指定字段引用


    以下所有方法在添加字段时，引用已作为过程的一部分指定好：


    - 从`对象`面板（第 [19]章(#429700_2_En_19_Chapter.xhtml)）的`字段`标签页中，拖放一个或多个字段。

    - 复制并粘贴现有字段。

    - 创建新布局时，在对话框中添加字段（第 [18]章(#429700_2_En_18_Chapter.xhtml)，“创建新布局”）。

    - 使用`编辑 ➤ 复制`菜单复制*多个字段*，它们当前分配的字段将保持不变。

    - 按住`Option`（macOS）或`Windows`（Windows）键，拖放现有字段以创建该字段对象的新副本。此操作可在单个布局内或两个窗口的布局之间进行。


    当在两个不同文件的窗口之间拖放复制字段时，字段分配会有所不同。如果接收文件在相同表名中定义了与被拖字段同名的字段，则该字段将引用该字段进行放置。如果接收文件没有匹配的字段，但有匹配的表名，则字段将以`<字段缺失>`引用进行放置。如果接收文件既没有匹配的字段也没有匹配的表名，则该字段将作为空白字段对象放置。


    ## 探索“指定字段”对话框


    使用任何需要选择引用的方法添加字段时，都会先临时放置一个空白字段对象，并打开*指定字段*对话框，如图 20-3 所示。在顶部，从菜单中选择一个表 occurrence。当前布局的表
    occurrence 始终位于顶部，文件中所有其他 occurrence 则分列于两个列表中：相关和不相关。可以添加任何字段，但只有来自当前表或相关表的字段才能按预期工作。找到并选择字段后，勾选可选地自动创建标签的复选框，然后点击`确定`将字段添加到布局。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig3_HTML.jpg](img/429700_2_En_20_Fig3_HTML.jpg)


    图 20-3 – 用于选择字段引用的对话框


    ### 编辑现有字段的引用


    要重新分配现有字段对象的引用，请双击该字段打开*指定字段*对话框，或从其上下文菜单中选择`指定字段`，或点击`检查器`面板中`数据`标签页下`字段`组里“显示数据来自”设置旁边的铅笔图标。


    ## 处理字段标签


    *字段标签*是放置在字段旁边的文本对象，用于帮助用户识别其内容。标签可以手动插入文本对象创建，也可以使用`指定字段`对话框中的`创建标签`选项自动创建。创建后，可以像其他文本对象一样对其进行编辑、移动、格式化和操作。只要没有手动编辑过，自动创建的标签将保持与字段名称*动态链接*。在这种情况下，如果在模式中修改了字段的已定义名称，标签会自动更新以反映新名称。稍后可以通过双击现有字段重新打开`指定字段`对话框，选中`创建标签`框并点击`确定`，为现有字段添加标签。该标签将作为动态链接值重新出现在现有字段对象旁边。


    ## 配置字段的控件样式


    *控件样式*是一种布局设置，用于修改字段的外观和输入选项，以简化数据输入。可以为字段分配七种类型之一，这些类型位于`检查器`面板`数据`标签页下`字段`组的`控件样式`菜单中，如图
    20-4 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig4_HTML.jpg](img/429700_2_En_20_Fig4_HTML.jpg)


    图 20-4 – 可用的字段控件样式菜单

    '
- fmt: '### Edit Box


    An `Edit box` is the default control style that renders a field as a box into
    which the user can perform freeform data entry tasks. These can vary in size from
    a single line of text to multiple paragraphs and can include a scroll bar to allow
    entries longer than the size of the field’s frame, all shown in Figure [20-5](#429700_2_En_20_Chapter.xhtml#Fig5).
    All container fields are automatically locked to an `Edit Box` control style.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig5_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig5_HTML.jpg)


    Figure 20-5


    Edit boxes; single line (top), multiline (bottom left), and with a scroll option
    (bottom right)


    Once this control style is selected, settings for adding a vertical scroll bar
    and auto-complete suggestions based on past entries are enabled, as shown in Figure
    [20-6](#429700_2_En_20_Chapter.xhtml#Fig6).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig6_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig6_HTML.jpg)


    Figure 20-6


    Examples of various edit style boxes


    ### Pop-up Menu


    The `pop-up menu` control style renders a field as a menu of choices based on
    a defined value list (Chapter [11](#429700_2_En_11_Chapter.xhtml)), as shown in
    Figure [20-7](#429700_2_En_20_Chapter.xhtml#Fig7).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig7_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig7_HTML.jpg)


    Figure 20-7


    A pop-up menu at rest (left) and open (right)


    The settings for pop-up menus include the selection of a value list and a few
    optional features, as shown in Figure [20-8](#429700_2_En_20_Chapter.xhtml#Fig8).
    The first checkbox causes an arrow to be drawn on the field to visually indicate
    that it will open a menu. The next two allow any user to override the list with
    other entries or to directly edit the value list (without accessing the full developer
    dialogs). The last option changes the value displayed in the field after a selection
    is made. When enabled, it displays the value list’s `second value` instead of
    the value actually entered in the field. For example, if a list shows a `Record
    ID` and `Company Name`, the former is always entered in the field; with this option
    enabled, the latter is `displayed` as if it were the entry.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig8_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig8_HTML.jpg)


    Figure 20-8


    The pop-up menu control options


    ### Drop-Down List


    A `drop-down list` control style renders a field as a combination edit box with
    an attached menu of value list items, as shown in Figure [20-9](#429700_2_En_20_Chapter.xhtml#Fig9).
    This allows a user a choice of either typing a custom value or choosing a preexisting
    value from a list.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig9_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig9_HTML.jpg)


    Figure 20-9


    A drop-down menu at rest without optional arrow (left), at rest with optional
    arrow (middle), and open (right)


    The settings for drop-down lists include the selection of a value list and a few
    optional features, as shown in Figure [20-10](#429700_2_En_20_Chapter.xhtml#Fig10).
    The first checkbox enables an arrow icon that opens the list. Without this, the
    list springs open whenever the field gains focus. Other options allow users to
    directly edit the values in the list or to auto-complete suggestions based on
    past entries in the field that start with the text a user is typing.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig10_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig10_HTML.jpg)


    Figure 20-10


    The drop-down list control options


    ### Checkbox Set


    A `checkbox set` control style renders a field as a set of check boxes, each with
    a text label, as shown in Figure [20-11](#429700_2_En_20_Chapter.xhtml#Fig11).
    These allow a user to select one or more individual options from the assigned
    list. Checkbox sets are intended to facilitate the entry of multiple values into
    a single field. As the user checks boxes, the corresponding values are inserted
    into the field as a list of carriage return-delimited values, e.g., if “Banking”
    and “Retail” are checked, the actual value in the field will be `Banking¶Retail`.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig11_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig11_HTML.jpg)


    Figure 20-11


    A checkbox set control style


    The settings for a checkbox set include the selection of a value list, as shown
    in Figure [20-12](#429700_2_En_20_Chapter.xhtml#Fig12). There is also an option
    to allow users to override the list with custom entries and a choice of icon that
    denotes a selected checkbox.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig12_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig12_HTML.jpg)


    Figure 20-12


    The checkbox set control options


    ### Radio Button Set


    A `radio button set` control style renders a field as a set of selection circles,
    each with a text label, as shown in Figure [20-13](#429700_2_En_20_Chapter.xhtml#Fig13).
    These controls encourage a user to select a single option from the list. When
    a selection is made, the corresponding value replaces the previous value in the
    field maintaining only a single selection. The radio button format doesn’t provide
    an intuitive method for removing a selection and leaving the field empty. To clear
    the selection, a user can click the current selection while holding the `Shift`
    key or click anywhere in the field and typing `Delete`.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig13_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig13_HTML.jpg)


    Figure 20-13


    A radio button set


    The settings for a radio button set includes a selection of a value list and option
    to allow users to enter custom values, as shown in Figure [20-14](#429700_2_En_20_Chapter.xhtml#Fig14).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig14_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig14_HTML.jpg)


    Figure 20-14


    The radio button set control options


    > **Note:** The number of columns in checkboxes and radio button is automatically
    set by the width and height of the field on the layout.


    ### Drop-Down Calendar


    A `drop-down calendar` control style renders a field as a combination edit box
    with an optional calendar widget that opens attached to the bottom of the field,
    as shown in Figure [20-15](#429700_2_En_20_Chapter.xhtml#Fig15).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig15_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig15_HTML.jpg)


    Figure 20-15


    A drop-down calendar at rest without optional icon (left), at rest with icon (middle),
    and open with active focus (right)


    The calendar panel includes several controls that assist in quickly navigating
    to a specific date, including a few subtly hidden. Click on the month and year
    at the top to reveal a hidden pop-up menu that allows quick navigation to any
    month. The up/down arrow to the right moves back or forward 1 year for the selected
    month. The left/right arrows move back and forward 1 month for the selected year.
    Click a date in the calendar to select it, or click on `Today` in the footer to
    select the current date. Once a selection is made, the date is inserted into the
    field.


    The settings for a calendar include a selection of a value list and option to
    include an icon to show and hide the calendar, as shown in Figure [20-16](#429700_2_En_20_Chapter.xhtml#Fig16).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig16_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig16_HTML.jpg)


    Figure 20-16


    The options for a drop-down calendar


    > **Tip:** The calendar control style can be used with non-date fields. The selection
    will be entered into text fields as a text string and into timestamp fields as
    the date selected with the current time.'
