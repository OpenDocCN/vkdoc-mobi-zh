- fmt: '# Setting Up Portal Filtering


    To set up the filtering example, start with these steps:


    1. In the `Company` table, create a text field named "Company Contact Portal Filter."
    Optionally make this field use global storage to avoid conflicts between users
    and preserve a user''s entry across all records.

    2. Place that field on the layout above the portal with a label that makes clear
    its function, like "Contacts Filter." Alternatively, use a placeholder calculation
    as a prompt.

    3. Open the `Portal Setup` dialog.

    4. Click the `Specify` button next to `Filter portal records`.

    5. Enter a formula that indicates when a related record in the `Contacts` table
    should appear in the portal based on what the user has typed into the filter field
    (see following examples).

    6. Then save the formula and close the `Portal Setup` dialog.


    # Writing a Basic Portal Filter Formula


    A portal filter formula is made up of one or more conditional statements that
    evaluate to a combined result of `true` (1) or `false` (0). Each related record
    is evaluated individually using this formula and will only appear in the portal
    if the result is `true`. Since the formula operates within the list of related
    records, it already assumes the record matching criteria of the relationship itself.
    As a result, the filter formula does not need to re-specify that criteria nor
    can it work to extend the results beyond that criteria to include non-related
    records. For example, when a portal''s data source matches contact records assigned
    to the current company record, we can filter by contact address, but we can''t
    make the formula include contacts assigned to other companies.


    When writing a formula for filtering, the formula should include a condition to
    display all records for situations when no criteria is entered. So, start the
    formula with the following code that provides a `true` result when the filter
    field is empty:


    ```

    Company::Company Contact Portal Filter = ""

    ```


    Next, add a second condition after an `or` operator that uses the `PatternCount`
    function, to specify a partial or full match between the related `Contact Address
    State` field and the text the user enters in the filter field. The following example
    formula allows a record to appear if no filter value is entered `or` if the value
    entered is found within the state field:


    ```

    Company::Company Contact Portal Filter = "" or

    PatternCount (

    Company | Contact::Contact Address State ;

    Company::Company Contact Portal Filter

    ) > 0

    ```


    Save the formula and close the setup dialog to test the function. Start with a
    company record with a lot of contacts in the portal. When a state abbreviation
    is typed into the filter field, the record committed, and the window refreshed,
    the portal rows should only include those records matching the text entered. To
    have the portal update automatically as a user is typing into the filter field,
    use the `ObjectModify` script trigger (Chapter [27](#429700_2_En_27_Chapter.xhtml))
    to run a script that commits, refreshes, and re-enters the filter field constantly.


    # Expanding the Formula for Multiple Match Fields


    The previous example assumed the user''s filtering criteria would be a state.
    However, the filter formula can be expanded to detect matches across multiple
    fields. The following example adds conditions to find matches in `first name`,
    `last name`, `city`, or `state`:


    ```

    Company::Company Contact Portal Filter = "" or

    PatternCount (

    Company | Contact::Contact Name First ;

    Company::Company Contact Portal Filter

    ) > 0 or

    PatternCount (

    Company | Contact::Contact Name Last ;

    Company::Company Contact Portal Filter

    ) > 0 or

    PatternCount (

    Company | Contact::Contact Address City ;

    Company::Company Contact Portal Filter

    ) > 0 or

    PatternCount (

    Company | Contact::Contact Address State ;

    Company::Company Contact Portal Filter

    ) > 0

    ```


    # Enhancing the Search Field


    Once the filter field is operational, apply some formatting changes like those
    shown in Figure [20-50](#429700_2_En_20_Chapter.xhtml#Fig50). The search field
    has its left corners rounded using the `Corner radius` settings of the `Appearance`
    tab of the `Inspector` pane. The label was removed in favor of a `Placeholder
    text` value of "Search by." Finally, a button has been added to the right of the
    field with opposing rounded corners, an icon assigned, and an `Action` defined
    to run a script that deletes the contents of the filter field and commits the
    record.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig50_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig50_HTML.jpg)


    Figure 20-50


    A visually improved portal filter field


    # Working with Web Viewers


    A web viewer is a layout object that displays a web page directly on a layout.
    This can be configured with or without user interaction, and the content can be
    generated by any of the following:


    - A web address hard-coded to point to a specific website

    - A web address pulled from a database field or dynamically generated from a formula

    - A Claris-provided address formula such as Google web search, Google maps, FedEx,
    or Wikipedia

    - Custom `HTML` code from a field or formula, which can include hard-code elements,
    field data, and even images in fields

    - A web address or custom `HTML` code provided by a script


    **Caution:** Custom web addresses must begin with the correct URL scheme such
    as `http://`, `https://`, `ftp://`, or `file://`.


    ## Exploring the Web Viewer Setup Dialog


    To add a web page to a layout, select the `Insert ➤ Web Viewer` menu, or use the
    tool in the toolbar. The `Web Viewer Setup` dialog will appear, shown in Figure
    [20-51](#429700_2_En_20_Chapter.xhtml#Fig51). This can be opened later by double-clicking
    on a web viewer or selecting the `Web Viewer Setup` from the `Format` menu or
    the viewer''s contextual menu.


    The `Choose a Website` list on the top left specifies the source data. Choose
    from a list of data-driven templates or select `Custom Web Address` to write your
    own URL or HTML formula. When using a template, the component fields on the right
    accept values that will be inserted into the URL. The `Web Address` area allows
    entry of a URL, HTML code, or a formula to generate either. The templates will
    insert a ready-made calculation with links to parameter fields on the top right.
    Enter addresses or formulas into the text area, or click the `Specify` button
    to enter a formula.


    The checkbox options at the bottom control various viewer features. You can enable
    user interaction with the rendered web page, control display in Find mode, include
    a progress bar when loading, and include a status message. The `Automatically
    encode URL` option will percent-encode special characters in the address. For
    example, spaces are converted to `%20` if this box is checked. Alternatively,
    the `GetAsURLEncoded` function can be used in a formula to handle encoding. The
    `Allow JavaScript to perform FileMaker scripts` option was added in version 19
    to enable the HTML code to directly call native FileMaker scripts using a `FileMaker.PerformScript`
    JavaScript function (described later in this section).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig51_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig51_HTML.jpg)


    Figure 20-51


    The dialog used to configure a web viewer


    With the `Allow interaction with web viewer content` option enabled, users can
    interact with a web page as with any standard browser. They can click links to
    navigate to other pages and interact with rich content such as movies. Although
    very capable, viewers aren''t intended to act as a full-featured web browser,
    and there may be some limitations. The `Open Link in New Window` function in the
    viewer''s contextual menu in Browse mode will redirect the page out of FileMaker
    to the user''s default browser application and allow a fuller web experience.'
