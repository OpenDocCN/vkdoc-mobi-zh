    for the file(s) to prove that you have access to modify the files. Then, click
    the *Specify* button to enter a *FileMaker Account* with full access. Both of
    these should be common to *all* the selected `files`. Close the *Specify Solution
    Options* dialog to return to the *Developer Utilities* dialog. Then, click *Create*
