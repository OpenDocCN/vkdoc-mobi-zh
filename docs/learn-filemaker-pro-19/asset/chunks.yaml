  trans: '

    # 探索脚本调试器窗口


    调试功能激活时，`Script Debugger` 窗口会始终保持开启状态，如图 26-2 所示。窗口内的**非可编辑工具栏**包含用于控制调试过程的按钮。活动脚本的步骤列于窗口中央，暂停步骤的编号旁会标注一个绿色箭头。任何设置了断点的步骤也会用蓝色箭头突出显示。下方的
    `Pause on error` 复选框用于打开调试器，并在常规使用期间产生错误的任何步骤上暂停，包括那些被 `Set Error Capture` 脚本步骤自动抑制的错误。窗口底部是**调用堆栈**，其中按执行顺序列出了嵌套的脚本调用层级，从当前脚本一直回溯到启动当前工作流的原始脚本。


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig2_HTML.jpg](img/429700_2_En_26_Fig2_HTML.jpg)


    **图 26-2**


    用于调试脚本的窗口


    在图 26-2 所示的示例中，名为 `Report Start` 的脚本被运行，它调用了当前显示的活动脚本 `Prepare Report Records`。调试器检测到新脚本启动后，自动在第一步暂停，将界面冻结在当前状态。第四步设有一个断点，增加了一个额外的强制暂停点。开发者此时可以观察界面的状态，审查当前的脚本步骤，并决定下一步操作：正常运行、逐行单步执行脚本，或完全停止整个脚本堆栈以进行必要的开发更改。


    ## 状态工具栏项目（调试器窗口）


    `Script Debugger` 窗口的**不可自定义状态工具栏**，如图 26-3 所示，提供了对调试过程的控制。


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig3_HTML.jpg](img/429700_2_En_26_Fig3_HTML.jpg)


    **图 26-3**


    Script Debugger 窗口的工具栏


    1.  `Edit Script` – 在 `Script Workspace` 中打开已暂停的脚本。

    2.  `Continue` – 使用默认的单步执行/暂停选项，继续运行已暂停的脚本。

    3.  `Halt Script` – 停止整个堆栈中的所有脚本。

    4.  `Step Over` – 继续执行当前脚本，*但不调试*子脚本。

    5.  `Step Into` – 逐行继续执行当前脚本，*同时调试*子脚本。

    6.  `Step Out` – 继续执行当前子脚本而不进行调试，直到控制权返回给父脚本，然后暂停。

    7.  `Set Next Step` – 跳转到窗口中选中的脚本步骤，跳过中间的步骤。

    8.  `Disable Script Triggers` – 全局切换数据库文件中脚本触发器的启用状态。

    9.  `Open Data Viewer` – 打开 `Data Viewer` 对话框。


    # 探索数据查看器


    `Data Viewer` 是一个显示变量列表及其当前值的对话框，如图 26-4 所示。该对话框可随时打开以查看全局变量或测试公式。当与调试功能结合使用或脚本暂停时，它会显示暂停发生瞬间所有变量的值。此对话框有两个标签页：`Current`
    和 `Watch`。


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig4_HTML.jpg](img/429700_2_En_26_Fig4_HTML.jpg)


    **图 26-4**


    用于监视变量值的对话框


    `Current` 标签页列出了当前定义的所有变量。全局变量始终存在，而局部变量仅在脚本运行或暂停时存在。双击某个变量可在对话框中打开其内容的扩展视图。在脚本执行的关键时刻观察变量有很多用途。例如，当
    `Export` 或 `Save as` 脚本步骤失败，您怀疑可能是路径构造错误时，可以在该步骤前添加一个断点，然后当调试器暂停时确认该变量中的值包含有效路径。


    `Watch` 标签页用于监视手动编制的变量、字段或表达式列表中的值。这可以在调试期间使用，也可以在将新公式集成到字段、布局对象或自定义函数之前进行测试。此标签页上的表达式可以根据当前窗口的上下文连续评估结果，从而提供使用实时值确认公式的能力。


    ## 设置自定义断点


    `自定义断点`是开发者在脚本中标记的一个点，用于暂停调试器，以排查脚本问题。断点允许您在任意位置停止脚本，并提供了机会来查看当前布局上下文，并在时间冻结的时刻审查关键变量中的当前值。断点允许您快速将脚本运行到特定行，而无需手动单步执行。要添加断点，请打开一个脚本并点击某个步骤编号。当该编号显示为蓝色箭头时，表示设置了断点，如图
    26-5 所示。可以通过点击箭头图标单独移除断点，或者从 `Tools ➤ Debugger Controls` 子菜单中选择 `Remove Breakpoints`
    选项，以移除当前在调试器中暂停的脚本的所有断点。


    ![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig5_HTML.jpg](img/429700_2_En_26_Fig5_HTML.jpg)


    **图 26-5**


    一个包含两个断点的脚本


    ## 总结


    本章介绍了 FileMaker 的调试功能。这些功能为排查包含复杂脚本的数据库提供了宝贵的工具。在下一章中，我们将学习如何触发脚本以响应界面事件。


    # 27. 使用脚本触发器


    连接到按钮或菜单的脚本需要用户执行手动操作来启动进程。虽然这对于可选任务或需要有意选择的任务来说没有问题，但关键业务功能可能会被遗忘。在某些情况下，要求用户执行额外的点击来启动界面中的强制性操作可能效率低下且不直观。FileMaker
    允许您设计动态响应的界面，将用户事件与自定义脚本连接起来。`脚本触发器`是开发者定义的界面事件与脚本进程之间的连接。每当事件发生时，脚本会自动运行。FileMaker
    拥有二十多种触发器，用于各种文件、布局和对象事件。一些事件会在用户操作完成之前运行分配的脚本，允许脚本执行自定义步骤并决定是否应将事件执行完毕。另一些则在事件之后运行，允许脚本执行后续任务。本章介绍脚本触发器，涵盖以下主题：


    * 定义可用的触发器

    * 理解事件优先级

    * 在事件完成前访问目标

    * 避免触发器异常


    > **提示:** 分配了脚本触发器的对象在布局模式下会选择性显示一个徽章图标（第 17 章，“视图菜单”）。


    ### 定义可用的触发器


    脚本触发器分为三类：`文件`、`布局`和`对象`。

    '
- fmt: '### File Triggers


    A `file trigger` runs a script in response to a file event. These triggers are
    configured in the `Script Triggers` tab of the `File Options` dialog (Chapter
    [6](#429700_2_En_6_Chapter.xhtml)), shown in Figure [27-1](#429700_2_En_27_Chapter.xhtml#Fig1).
    This dialog can be accessed by selecting the `File ➤ File Options` menu. At the
    top of the dialog is a list of all the `file events` available. The checkbox indicates
    an active event that will trigger the script displayed. The bottom half displays
    details for the selected event. Click `Select` to specify the script that will
    be connected to that event.


    ![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig1_HTML.jpg](images/429700_2_En_27_Chapter/429700_2_En_27_Fig1_HTML.jpg)


    Figure 27-1: The options dialog tab used to define triggers for the file


    #### OnFirstWindowOpen


    The `OnFirstWindowOpen` event occurs after the first window appears when a database
    file opens, providing an opportunity to automatically perform setup functions
    prior to a user beginning work. The triggered script can initialize global variables,
    automatically open other windows, or perform default finds and sorts. This event
    only occurs when a database is opened by a user or by the `Open File` script step
    run from another file. It does *not* occur if the file opens as a hidden window
    behind another database to display resources through a relationship.


    **Tip:** Navigation to a starting layout and hiding toolbars on file opens can
    be set on the `Open` tab of the `File Options` dialog without a trigger.


    #### OnLastWindowClose


    The `OnLastWindowClose` file event occurs as a file begins to close the last interface
    window. This provides an opportunity for a script to perform last-minute maintenance
    tasks. If necessary, the script can halt the closure by returning a false (0)
    value. For example, a script can use the `Show Custom Dialog` step to confirm
    that the user actually intended to close the file and give them an option to cancel.
    In the following example, the dialog step is configured so the first (default)
    button is named “Cancel,” and the second is named “Close.” It uses the `Get (
    LastMessageChoice )` function to detect which button was clicked. If the user
    clicks the first button to cancel, it returns a zero result which causes the triggering
    event to halt, thereby leaving the window and file open.


    ```

    Show Custom Dialog [ "Really close the database?" ]

    If [ Get ( LastMessageChoice ) = 1 ]

    Exit Script [ Text Result: 0 ]

    End If

    ```


    #### OnWindowOpen


    The `OnWindowOpen` file event occurs after any new window is created by a user
    selecting the `Window ➤ New Window` menu or a script running the `New Window`
    step. It is also triggered when a file previously opened hidden because of a relational
    connection is brought forward for the first time. This provides an opportunity
    to perform any configuration or setup routines for the window. For example, this
    can be used to position the window precisely on screen, perform a default find,
    sort, set up control variables, or otherwise prepare the window for use.


    #### OnWindowClose


    The `OnWindowClose` file event occurs immediately *before* any window is about
    to close. This provides an opportunity to perform last-minute validation functions
    or maintenance routines to the record(s) viewed within the window. Like other
    events that precede an action, if the script returns a false (0) value, the process
    will be halted and the window will remain open.


    **Note:** Both window open events are triggered when a file is first opened, and
    both window close events are triggered when closing the last window.


    #### OnFileAVPlayerChange


    The `OnFileAVPlayerChange` file event occurs after the playback state of a media
    file playing in a container field or URL is changed. For example, the event triggers
    when paused, played, or stopped, or when the media stops upon reaching the end.
    This event is only supported in FileMaker Go on iOS devices.


    ### Layout Triggers


    A `layout trigger` runs a script in response to a layout event. These triggers
    are configured in the `Script Triggers` tab of the `Layout Setup` dialog (Chapter
    [18](#429700_2_En_18_Chapter.xhtml)), shown in Figure [27-2](#429700_2_En_27_Chapter.xhtml#Fig2).
    The dialog is similar to the `File Options` dialog, with the addition of checkboxes
    to control which Window mode(s) the event is enabled.


    ![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig2_HTML.jpg](images/429700_2_En_27_Chapter/429700_2_En_27_Fig2_HTML.jpg)


    Figure 27-2: The dialog used to configure layout script triggers


    #### OnRecordLoad


    The `OnRecordLoad` layout event occurs after a record becomes current. This provides
    an opportunity to set up default field values with values too complex for auto-enter
    settings, create related records, or perform other custom record tasks. Any activity
    that causes a window to activate a record will trigger this event. This includes
    the following:


    * Navigating to a new record within a found set

    * Navigating to a different layout

    * Creating a new record

    * Deleting a record in a found set of more than one record

    * Creating a new window showing a table with one or more records

    * Displaying search results


    #### OnRecordCommit


    The `OnRecordCommit` layout event occurs before committing a modified record.
    This provides an opportunity to halt the commit action if necessary. If the script
    result is true (1), the original event proceeds normally. If the result is false
    (0), the event is canceled. Any activity that causes the current record to commit
    will trigger this event, including:


    * A user explicitly committing a record by typing the Enter key or clicking outside
    of fields on the active record

    * Navigating to a different record

    * Creating, deleting, duplicating, or omitting records

    * A script performing the `Commit Records/Requests` step

    * Opening the `Manage Database` dialog or other developer dialogs

    * Closing the file


    #### OnRecordRevert


    The `OnRecordRevert` layout event occurs before reverting a modified record to
    its previously committed state. This event is triggered when a user selects the
    `Records ➤ Revert Record` menu or a script runs the `Revert Record/Request` step.
    It provides an opportunity to open a custom dialog confirming the action, perform
    other resetting actions, or halt the reversion action if necessary.


    #### OnLayoutKeystroke


    The `OnLayoutKeystroke` layout event occurs when any character is typed on the
    keyboard except those handled as functions by the operating system or FileMaker’s
    active menu set. The event triggers even when no field has active focus and occurs
    *before* the keystroke event is sent to FileMaker. This provides an opportunity
    for a script to override the default error dialog with a custom message when the
    user begins typing before entering a field. This can also be used to run a script
    in response to a key combination that isn’t associated with a menu, or to refresh
    a view when typing into a portal filter (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Filtering Portal Records”). Using two trigger-centric `Get` functions, the following
    example gets the key(s) typed and runs a script when the user types “1” while
    holding down the macOS Control key. The script runs the `Perform Script` step
    (shown undefined) and then uses the `Exit Script` with a result of 0 to halt the
    keystrokes. Any other keys typed are ignored by the script and continue into the
    active field.


    ```

    If [ Get ( TriggerModifierKeys ) = 4 and Get ( TriggerKeystroke ) = "1" ]

    Perform Script [ ]

    Exit Script [ Text Result: 0 ]

    End if

    ```'
