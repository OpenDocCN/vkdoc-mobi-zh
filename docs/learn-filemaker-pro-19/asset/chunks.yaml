- fmt: '#### Dialog 5: Specify Subtotals


    The fifth report dialog, shown in Figure [18-12](#429700_2_En_18_Chapter.xhtml#Fig12),
    will only appear if the `Specify subtotals` checkbox was selected in the first
    dialog. This allows the addition of one or more *summary fields* that will be
    displayed above or below groups of records on a sub-summary part that groups by
    the selected field.


    Select a *Summary field* for inclusion by clicking the `Specify` button. Next,
    a field can be selected from the `Category to summarize by` pop-up menu, which
    lists all the fields added as report categories in the third dialog. The `Subtotal
    placement` pop-up menu specifies where the subtotal will appear in relation to
    the group of records that it is summarizing: `Above Record Group`, `Below Record
    Group`, or `Above and Below`. Once these choices are made, click `Add Subtotal`
    to insert the field into the list below, and then repeat the process for additional
    fields. Multiple summaries can be added to create a more robust summarized hierarchy.


    For our ongoing invoice example, the `Invoice Amount Summary` fields are added
    as subtotals that will appear *below* the record group, summarized twice for `Invoice
    Month` and `Invoice Year` so that they appear in both sub-summary parts. Optionally,
    this can be repeated to also include the `Invoice Count Summary`.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig12_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig12_HTML.jpg)


    Figure 18-12


    The fifth of eight report configuration dialogs


    #### Dialog 6: Specify Grand Totals


    The sixth report dialog, shown in Figure [18-13](#429700_2_En_18_Chapter.xhtml#Fig13),
    will only appear if the `Specify grand totals` checkbox was selected in the first
    dialog. This works like the previous dialog but uses summary fields to display
    a grand total of *all records* on the report.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig13_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig13_HTML.jpg)


    Figure 18-13


    The sixth of eight report configuration dialogs


    Select a *Summary field* for inclusion by clicking the `Specify` button. Then,
    choose an option from the `Grand total placement` pop-up to specify a location
    for the grand total relative to the entire report: `Beginning of Report`, `End
    of Report`, or `Beginning and End of Report`. Finally, click `Add Grand Total`
    to insert the field into the list below, and then repeat the process for additional
    fields.


    In the invoice example, the `Invoice Amount Summary` fields are both added as
    grand totals that should appear only at the end of the report. Optionally, this
    can be repeated to also include the `Invoice Count Summary`.


    #### Dialog 7: Header and Footer Information


    The seventh report dialog, shown in Figure [18-14](#429700_2_En_18_Chapter.xhtml#Fig14),
    allows insertion of optional placeholders for standard information automatically
    placed in six different locations on the layout. Each pop-up menu contains the
    same choices: `Page Number`, `Current Date`, `Layout Name`, `Large Custom Text`,
    `Small Custom Text`, and `Logo`.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig14_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig14_HTML.jpg)


    Figure 18-14


    The seventh step is used to select standard header and footer info


    #### Dialog 8: Create a Script


    The eighth and final dialog offers the option to automatically create a script
    for the new report layout. Without a script, a user is required to *manually*
    perform a find, navigate to the report layout, sort records, and print or preview
    the report. Scripts can be manually created to perform these steps (Chapters [24](#429700_2_En_24_Chapter.xhtml)–[28](#429700_2_En_28_Chapter.xhtml)).
    This last dialog, shown in Figure [18-15](#429700_2_En_18_Chapter.xhtml#Fig15),
    offers the convenience of an automatic head start.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig15_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig15_HTML.jpg)


    Figure 18-15


    The eighth and final report configuration dialog


    Click the `Create a Script` option, and optionally override the default `Script
    name`. Select the `Run script automatically` checkbox to assign an `OnLayoutEnter`
    script trigger (Chapter [27](#429700_2_En_27_Chapter.xhtml)) that will run the
    script whenever a user navigates to the new layout. Then click the `Finish` button
    to create the script and complete the creation of the new layout and script.


    The script created will include two or three steps, automatically configured depending
    on other options in this process. It will always include steps to `Enter Browse
    Mode` and `Go to Layout`. If sort fields were specified in the fourth dialog,
    it will include a step to `Sort Records` by the field(s) selected. Once created,
    the script can be further customized as needed. For example, as configured, it
    assumes the report should include every record in the found set. However, a step
    can be added to find a set of records based on the context of the current date,
    week, month, or year, or using any other criteria including that solicited from
    a user.


    #### Refining the Report Layout


    Once a report layout is created, it will usually require clean up and customization.
    The example in Figure [18-16](#429700_2_En_18_Chapter.xhtml#Fig16) shows the layout
    based on the options selected in the preceding example. The height of parts can
    be tightened to save space, and the formatting of both backgrounds, labels, and
    fields is based on a theme and may not be appropriate, especially for printed
    reports. If a logo was included, the size and position might require adjustment.
    The field labels for the body fields automatically added at the top can be moved
    into a sub-summary just above the body so they are repeated directly above each
    group of fields. Also, the field labels automatically show the full name of the
    field and may overlap and include naming prefixes and may require editing.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig16_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig16_HTML.jpg)


    Figure 18-16


    An automatically created report layout typically requires refinement


    ### Duplicating an Existing Layout


    To save time and maintain uniformity between layouts, consider designing a template
    for a typical List and Form view and then duplicating and customizing these for
    other tables. The current layout can be duplicated by selecting the `Layouts ➤
    Duplicate Layouts` menu. Also, open the `Manage Layouts` dialog, and use the duplicate
    feature there (see “Using the Manage Layouts Dialog” later in this chapter). The
    new layout will have the same name as the original with the word “Copy” appended
    to it. Everything else about the layout will be the same as the original including
    all parts, theme, objects, formatting, settings, and the assigned table occurrence.
    Once duplicated, the new layout can be renamed, assigned to a new table occurrence,
    and further customized as needed.


    ## Configuring Layout Settings


    The `Layout Setup` dialog controls the behaviors, appearance, and functions of
    a layout. To open this dialog, enter Layout mode, and select `Layout Setup` from
    the Layouts menu or the toolbar. The dialog is divided into four tabs: `General`,
    `Views`, `Printing`, and `Script Triggers`.'
  raw: '##### Dialog 5: Specify Subtotals


    The fifth report dialog, shown in Figure [18-12](#429700_2_En_18_Chapter.xhtml#Fig12),
    will only appear if the *Specify subtotals* checkbox was selected in the first
    dialog. This allows the addition of one or more *summary fields* that will be
    displayed above or below groups of records on a sub-summary part that groups by
    the selected field.


    Select a *Summary field* for inclusion by clicking the *Specify* button. Next,
    a field can be selected from the *Category to summarize by* pop-up menu, which
    lists all the fields added as report categories in the third dialog. The *Subtotal
    placement* pop-up menu specifies where the subtotal will appear in relation to
    the group of records that it is summarizing: *Above Record Group*, *Below Record
    Group,* or *Above and Below*. Once these choices are made, click *Add Subtotal*
    to insert the field into the list below, and then repeat the process for additional
    fields. Multiple summaries can be added to create a more robust summarized hierarchy.


    For our ongoing invoice example, the *Invoice Amount Summary* fields are added
    as subtotals that will appear *below* the record group, summarized twice for *Invoice
    Month* and *Invoice Year* so that they appear in both sub-summary parts. Optionally,
    this can be repeated to also include the *Invoice Count Summary.*


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig12_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig12_HTML.jpg)


    Figure 18-12


    The fifth of eight report configuration dialogs


    ##### Dialog 6: Specify Grand Totals


    The sixth report dialog, shown in Figure [18-13](#429700_2_En_18_Chapter.xhtml#Fig13),
    will only appear if the *Specify grand totals* checkbox was selected in the first
    dialog. This works like the previous dialog but uses summary fields to display
    a grand total of *all records* on the report.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig13_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig13_HTML.jpg)


    Figure 18-13


    The sixth of eight report configuration dialogs


    Select a *Summary field* for inclusion by clicking the *Specify* button. Then,
    choose an option from the *Grand total placement* pop-up to specify a location
    for the grand total relative to the entire report: *Beginning of Report*, *End
    of Report,* or *Beginning and End of Report*. Finally, click *Add Grand Total*
    to insert the field into the list below, and then repeat the process for additional
    fields.


    In the invoice example, the *Invoice Amount Summary* fields are both added as
    grand totals that should appear only at the end of the report. Optionally, this
    can be repeated to also include the *Invoice Count Summary*.


    ##### Dialog 7: Header and Footer Information


    The seventh report dialog, shown in Figure [18-14](#429700_2_En_18_Chapter.xhtml#Fig14),
    allows insertion of optional placeholders for standard information automatically
    placed in six different locations on the layout. Each pop-up menu contains the
    same choices: *Page Number*, *Current Date*, *Layout Name*, *Large Custom Text*,
    *Small Custom Text,* and *Logo*.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig14_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig14_HTML.jpg)


    Figure 18-14


    The seventh step is used to select standard header and footer info


    ##### Dialog 8: Create a Script


    The eighth and final dialog offers the option to automatically create a script
    for the new report layout. Without a script, `a` user is required to *manually*
    perform a find, navigate to the report layout, sort records, and print or preview
    the report. Scripts can be manually created to perform these steps (Chapters [24](#429700_2_En_24_Chapter.xhtml)–[28](#429700_2_En_28_Chapter.xhtml)).
    This last dialog, shown in Figure [18-15](#429700_2_En_18_Chapter.xhtml#Fig15),
    offers the convenience of an automatic head start.


    ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig15_HTML.jpg](images/429700_2_En_18_Chapter/429700_2_En_18_Fig15_HTML.jpg)


    Figure 18-15


    The eighth and final report configuration dialog


    Click the *Create a Script* option, and optionally override the default *Script
    name*. Select the *Run script automatically* checkbox to assign an *OnLayoutEnter*
    script trigger (Chapter [27](#429700_2_En_27_Chapter.xhtml)) that will run the
    script whenever a user navigates to the new layout. Then click the *Finish* button
    to create the script and complete the creation of the new layout and script.


    The script created will include two or three steps, automatically configured depending
    on other options in this process. It will always include steps to *Enter Browse
    Mode* and *Go to Layout*. If sort fields were specified in the fourth dialog,
    it will include a step to *Sort Records* by the field(s) selected. Once created,
    the script can be further customized as needed. For example, as configured, it
    assumes the report should include every record in the found set. However, a step
    can be added to find a set of records based on the context of the current date,
    week, month, or year, or using any other criteria including that solicited from
    a user.


