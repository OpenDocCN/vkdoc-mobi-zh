  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，完成如下翻译。



    ### 使用字段中的数据构建网页


    作为根据网址显示页面的替代方案，查看器可以显示 HTML 代码以生成自定义页面。FileMaker 使用了*数据通用资源标识符*（URI）方案，这是一种标准方法，用于在网页代码中包含数据，而不是访问外部资源。*数据
    URI* 使用以下公式表示，方括号表示可选元素：


    ```

    data:[<media type>][;base64],<data>

    ```


    此公式包含以下元素：


    - `data` – 此必需前缀表示正在使用的方案，后跟一个冒号。

    - `<media type>` – 可选，指示数据中包含的材料类型。网页将使用 `text/html`，而图像将使用 `image/<type>`，例如
    `image/png`。如果未指定媒体类型，数据将被假定为 `text/plain`。

    - `base64` – 此可选扩展名，与媒体类型之间用分号分隔，用于指示数据内容是二进制数据，该数据使用 `Base64` 二进制到文本编码方案以 `ASCII`
    格式编码。

    - `<data>` – 此占位符前面带有一个逗号，将被替换为包含所描述内容的字符序列、HTML 代码或 Base64 图像数据。


    **注意**：自版本 15 起，数据和媒体类型已变为可选。文本可以以 `<html>` 或 `<!DOCTYPE html>` 开头，并将在网页查看器中按预期渲染。


    #### 创建一个 Hello World 网页


    此代码为网页查看器定义了一个简单的 *Hello, World* 示例网页公式：


    ```

    "data:text/html,


    Hello, World

    "

    ```


    添加一个 `<style>` 标签以使用*层叠样式表*（CSS）控制文本格式。此示例修改了 `h1` 样式的颜色，以绿色显示文本：


    ```

    "data:text/html,


    <style>

    h1 {

    color: green;

    }

    </style>


    <h1>Hello, World</h1>

    "

    ```


    添加一个 `<script>` 标签以包含 JavaScript 函数，如下例所示，该示例在页面加载时打开一个警报对话框：


    ```

    "data:text/html,


    <script>

    alert(''Hello, World!'')

    </script>


    <h1>Hello, World</h1>

    "

    ```


    **警告**：在公式中计算网页查看器的内容时，所有文本都必须用引号括起来。该文本中的任何引号都必须使用前置的反斜杠进行转义。


    #### 在网页中包含文本字段


    使用公式驱动的网页，插入字段的方式与在任何公式中插入字段的方式相同（第 12 章）。只需在引用的文本之外将字段引用插入到公式中。


    ```

    "data:text/html,


    <h1>" & Company::Company Name & "</h1>

    "

    ```


    #### 在网页中包含容器字段图像


    可以通过在 `<image>` 标签中插入 URL 来包含来自 Web 的图像。但是，要包含存储在字段中的图像，请使用 `Base64Decode` 函数将图像转换为文本。


    ```

    "data:text/html,


    <h1>" & Company::Company Name & "</h1>

    <img src=''" & Base64Decode ( Company::ContainerField ) & "'' />

    "

    ```


    ### 使用 JavaScript 调用 FileMaker 脚本


    在版本 19 中，FileMaker 增加了网页查看器中的 JavaScript 调用原生 FileMaker 脚本的功能。只要在*网页查看器设置*对话框中启用了该选项，HTML
    代码中的按钮和 URL 就可以调用带有两个参数的 `FileMaker.PerformScript` 函数：*脚本名称*和*参数*。以下简单示例假设存在一个名为“Test
    Script”的脚本，该脚本将使用 `Show Custom Dialog` 脚本步骤生成一个显示脚本参数的对话框（第 24 和 25 章）。该代码渲染一个按钮，该按钮调用名为
    `runScript()` 的 JavaScript 函数，该函数运行 FileMaker 脚本。如果配置正确，单击该按钮将导致 FileMaker 打开一个包含消息“Hello,
    World!”的对话框。


    ```

    "data:text/html,


    <button onclick=''runScript()''>Test FMP Script</button>

    <script>

    function runScript() {

    FileMaker.PerformScript ( \"Test Script\", \"Hello, World!\" );

    }

    </script>

    "

    ```


    **警告**：此 JavaScript 函数仅适用于在 FileMaker 网页查看器中渲染的网页。要从数据库外部启用 HTML 点击访问，请使用 FileMaker
    URL（第 29 章）。


    ## 使用图表


    *图表*是一种布局对象，它以几种流行的图表格式之一绘制数据的图形表示：*柱形图*、*堆积柱形图*、*正负柱形图*、*条形图*、*堆积条形图*、*饼图*、*折线图*、*面积图*、*散点图*或*气泡图*。这些图表可以使用当前查找集中的数据、一组相关记录的数据或计算出的数据来创建。图表在*图表设置*对话框中进行配置，每当在布局上插入新的图表对象时，该对话框就会打开。对于现有的图表对象，可以通过双击它或从*格式*菜单或其上下文菜单中选择*图表设置*来重新打开此对话框。该对话框分为两个主要部分：一个*图表预览*区域，在配置图表时持续更新图表的绘图；以及一个设置侧边栏，其中包含用于各种设置的可切换部分
    – *图表*、*样式*和*数据源*。


    ### 使用计算数据创建图表


    使用计算数据生成图表将从硬编码的计算值或当前记录中的字段中提取信息。要使用硬编码值创建一个饼图，请将一个图表对象插入到布局中，然后按照图 20-52 所示配置设置。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig52_HTML.jpg](img/429700_2_En_20_Fig52_HTML.jpg)


    **图 20-52** – 基于计算数据的简单饼图的设置


    需要以下设置才能生成一个包含三个扇区的饼图，如图 20-53 所示：


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig53_HTML.jpg](img/429700_2_En_20_Fig53_HTML.jpg)


    **图 20-53** – 由示例数据生成的图表


    1. **类型** – 选择*饼图*作为类型，并可选择输入标题。

    2. **类别标签** – 输入以回车符分隔的图表类别列表，例如 `Category A¶Category B¶Category C`。

    3. **扇区数据** – 为饼图的每个类别扇区输入以回车符分隔的数字列表，例如 `1000¶250¶650`。

    4. **选项** – 为标签格式选择各种可选设置。

    5. **图表数据** – 从*数据源*设置组中，选择*当前记录（已分隔数据）*以指示图表引擎仅使用来自当前记录上下文中的数据。


    **注意**：或者，可以通过单击带有三个点的图标打开*指定公式*对话框，使用字段值生成上述图表的标签和数据。

    '
- fmt: '### Creating a Chart Using the Found Set


    Using the records in the found set as the data source, create a bar chart that
    displays the number of `Contact` records by state. To get started, insert a chart
    onto a layout, and then configure the settings as shown in Figure 20-54.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig54_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig54_HTML.jpg)


    **Figure 20-54** Configuring a bar chart using data from the found set


    **Caution**


    Creating charts from found sets can be a little confusing. It is like creating
    a report with a sub-summary part since only records in the found set will be included
    and the current sort order controls how a summary field counts records into subgroups.


    The following settings will create a chart as shown in Figure 20-55:


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig55_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig55_HTML.jpg)


    **Figure 20-55** A column chart of the number of contact records for each state


    1. **Type** – Select `Column` as the type.


    2. **X-Axis Data** – Select a field containing text that will act as the labels
    for the bars. To avoid duplicate values, FileMaker will automatically summarize
    these *if the found set is sorted by the field specified*. In our example, we
    sort by and point to the `Contact Address State` field.


    3. **Y-Axis Data** – Select a summary field containing the numeric values for
    the bar height. In our example, a new `Contact State Count Summary` field is used,
    which performs a `Count` of the `Record ID` field.


    4. **Chart Data** – On the `Data Source` section of the controls, select `Current
    Found Set` to instruct the chart engine to summarize data from across all the
    records.


    **Remember**, for this chart to summarize correctly, the records *must* be sorted
    by the x-axis, and the y-axis *must* be a summary field.


    ### Summary


    This chapter explored the various objects that are used when designing layouts.
    In the next chapter, we learn how to manipulate, arrange, and configure objects.


    # 21. Manipulating Objects


    After adding an object to a layout, it can be manipulated and configured in a
    variety of ways. This chapter introduces the many basic methods, covering these
    topics:


    - Selecting objects

    - Resizing objects

    - Moving objects

    - Arranging and aligning objects

    - Hiding objects

    - Conditional formatting

    - Understanding tab order

    - Naming objects


    ## Selecting Objects


    To *select* an object, click on it with the cursor or click on the layout near
    the object and drag the cursor over or around it. The object will become highlighted
    with an outline that includes eight *sizing handles*, as shown in Figure 21-1.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig1_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig1_HTML.jpg)


    **Figure 21-1** An object at rest (left) vs. a selected object (right)


    To select more than one object at a time, either click on them one by one while
    holding down the `Shift` key or click on the background and drag the cursor so
    that the focal rectangle touches all the desired objects. Hold the `Command` (macOS)
    or `Windows` (Windows) key while dragging to require that an item be *completely*
    within the boundaries of the focal rectangle before it will be selected. When
    multiple objects are selected, they share one set of sizing handles, outlining
    the overall space of the group, as shown in Figure 21-2. Objects can be de-selected
    by clicking on the layout background or by selecting another object. To de-select
    one of a group of selected objects, click on the object while holding the `Shift`
    key.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig2_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig2_HTML.jpg)


    **Figure 21-2** Objects selected together will share sizing handles


    **Caution**


    Shape objects with no fill can only be selected by clicking the border. Clicking
    in the center of an object will click through the object onto objects behind it
    or the background of the layout.


    ## Resizing Objects


    Objects can be resized by dragging one of the eight sizing in or out from the
    center of the object. Use the settings on the `Position` tab of the `Inspector`
    pane controls for precision resizing of objects, entering a new `Width` or `Height`
    and typing `Tab` or `Enter` to register the change. To uniformly resize groups
    of objects, use the `Resize To` functions, described later in this chapter.


    ## Moving Objects


    When one or more objects are selected, they can be moved to a new location by
    clicking and dragging them around the layout or using one of three other methods.
    The arrow keys will nudge a selection one pixel at a time in one directional plane.
    The settings on the `Position` tab of the `Inspector` pane allow objects to be
    precisely placed by entering a new measurement for `Left`, `Right`, `Top`, or
    `Bottom`. To move groups of objects relative to each other, use the `Arrange`
    and `Align` functions, described later in this chapter.


    ### Layout Positioning Helpers


    There are four features that are helpful when positioning objects manually: the
    `ruler`, `grid`, `guides`, and `dynamic guides`. These can be used individually
    or together to guide an object to a new location.


    #### Ruler


    The `ruler` is a horizontal and vertical strip running along the entire left and
    top of a window’s content area that displays incremental markings based on a chosen
    unit of measurement: `inch`, `centimeter`, or `point`. The full ruler, as shown
    in Figure 21-3, is only visible in Layout mode when the `View ➤ Rulers` menu is
    active.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig3_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig3_HTML.jpg)


    **Figure 21-3** The Layout mode ruler assists for precise positioning


    The ruler has several non-obvious features. At the corner where the horizontal
    and vertical rulers intersect, a button displays the current unit of measure.
    Click this to cycle through the available units for the ruler. The selected unit
    can also be changed from the ruler’s contextual menu. The cursor’s current position
    is marked in each ruler with a dotted line, and, when dragging an object, the
    rulers denote the boundaries of object with a white highlight.


    When editing the content of a text object, the top ruler transforms into a gray
    bar with a text ruler overlay that spans only the width of text object, as shown
    in Figure 21-4. This ruler controls indentation, margins, and tabs within the
    text object in a similar manner to the text ruler accessible in Browse mode when
    editing a field.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig4_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig4_HTML.jpg)


    **Figure 21-4** The top ruler transforms when editing layout text


    #### Grid


    The layout `grid` is a sequence of evenly spaced horizontal and vertical lines
    overlaid on a layout background that denotes minor and major areas. These lines,
    resembling graph paper, are only visible in Layout mode when the `View ➤ Grid
    ➤ Show Grid` menu item is active or the corresponding check box in the `Inspector`
    pane is enabled. When visible, the lines can visually assist in uniform alignment
    of objects. Activating the `View ➤ Grid ➤ Snap to Grid` menu setting in the `Inspector`
    will cause an object being dragged to be drawn to the next grid line in the direction
    of travel (Chapter 19, “Grid”).'
  raw: '### Creating a Chart Using the Found Set


    Using the records in the found set as the data source, create a bar chart that
    displays the number of *Contact* records by state. To get started, insert a chart
    onto a layout, and then configure the settings as shown in Figure [20-54](#429700_2_En_20_Chapter.xhtml#Fig54).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig54_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig54_HTML.jpg)


    Figure 20-54


    Configuring a bar chart using data from the found set


    Caution


    Creating charts from found sets can be a little confusing. It is like creating
    a report with a sub-summary part since only records in the found set will be included
    and the current sort order controls how a summary field counts records into subgroups.


    The following settings will create a chart as shown in Figure [20-55](#429700_2_En_20_Chapter.xhtml#Fig55):


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig55_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig55_HTML.jpg)


    Figure 20-55


    A column chart of the number of contact records for each state


    1.  *Type* – Select *Column* as the type.


    2.  *X-Axis Data* – Select a field containing text that will act as the labels
    for the bars. To avoid duplicate values, FileMaker will automatically summarize
    these *if the found set is sorted by the field specified*. In our example, we
    sort by and point to the *Contact Address State* field.


    3.  *Y-Axis Data* – Select a summary field containing the numeric values for the
    bar height. In our example, a new *Contact State Count Summary* field is used,
    which performs a *Count* of the *Record ID* field.


    4.  *Chart Data* – On the *Data Source* section of the controls, select *Current
    Found Set* to instruct the chart engine to summarize data from across all the
    records.


    Remember , for this chart to summarize correctly, the records *must* be sorted
    by the x-axis, and the y-axis *must* be a summary field.


    ## Summary


    This chapter explored the various objects that are used when designing layouts.
    In the next chapter, we learn how to manipulate, arrange, and configure objects.


    # 21. Manipulating Objects


    After adding an object to a layout, it can be manipulated and configured in a
    variety of ways. This chapter introduces the many basic methods, covering these
    topics:


    *   Selecting objects


    *   Resizing objects


    *   Moving objects


    *   Arranging and aligning objects


    *   Hiding objects


    *   Conditional formatting


    *   Understanding tab order


    *   Naming objects


    ## Selecting Objects


    To *select* an object, click on it with the cursor or click on the layout near
    the object and drag the cursor over or around it. The object will become highlighted
    with an outline that includes eight *sizing handles*, as shown in Figure [21-1](#429700_2_En_21_Chapter.xhtml#Fig1).


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig1_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig1_HTML.jpg)


    Figure 21-1


    An object at rest (left) vs. a selected object (right)


    To select more than one object at a time, either click on them one by one while
    holding down the Shift key or click on the background and drag the cursor so that
    the focal rectangle touches all the desired objects. Hold the Command (macOS)
    or Windows (Windows) key while dragging to require that an item be *completely*
    within the boundaries of the focal rectangle before it will be selected. When
    multiple objects are selected, they share one set of sizing handles, outlining
    the overall space of the group, as shown in Figure [21-2](#429700_2_En_21_Chapter.xhtml#Fig2).
    Objects can be de-selected by clicking on the layout background or by selecting
    another object. To de-select one of a group of selected objects, click on the
    object while holding the Shift key.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig2_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig2_HTML.jpg)


    Figure 21-2


    Objects selected together will share sizing handles


    Caution


    Shape objects with no fill can only be selected by clicking the border. Clicking
    in the center of an object will click through the object onto objects behind it
    or the background of the layout.


    ## Resizing Objects


    Objects can be resized by dragging one of the eight sizing in or out from the
    center of the object. Use the settings on the *Position* tab of the *Inspector*
    pane controls for precision resizing of objects, entering a new *Width* or *Height*
    and typing Tab or Enter to register the change. To uniformly resize groups of
    objects, use the *Resize To* functions, described later in this chapter.


    ## Moving Objects


    When one or more objects are selected, they can be moved to a new location by
    clicking and dragging them around the layout or using one of three other methods.
    The arrow keys will nudge a selection one pixel at a time in one directional plane.
    The settings on the *Position* tab of the *Inspector* pane allow objects to be
    precisely placed by entering a new measurement for *Left*, *Right*, *Top,* or
    *Bottom*. To move groups of objects relative to each other, use the *Arrange*
    and *Align* functions, described later in this chapter.


    ### Layout Positioning Helpers


    There are four features that are helpful when positioning objects manually: the
    *ruler*, *grid*, *guides,* and *dynamic guides*. These can be used individually
    or together to guide an object to a new location.


    #### Ruler


    The *ruler* is a horizontal and vertical strip running along the entire left and
    top of a window’s content area that displays incremental markings based on a chosen
    unit of measurement: *inch*, *centimeter*, or *point*. The full ruler, as shown
    in Figure [21-3](#429700_2_En_21_Chapter.xhtml#Fig3), is only visible in Layout
    mode when the *View ➤ Rulers* menu is active.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig3_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig3_HTML.jpg)


    Figure 21-3


    The Layout mode ruler assists for precise positioning


    The ruler has several non-obvious features. At the corner where the horizontal
    and vertical rulers intersect, a button displays the current unit of measure.
    Click this to cycle through the available units for the ruler. The selected unit
    can also be changed from the ruler’s contextual menu. The cursor’s current position
    is marked in each ruler with a dotted line, and, when dragging an object, the
    rulers denote the boundaries of object with a white highlight.


    When editing the content of a text object, the top ruler transforms into a gray
    bar with a text ruler overlay that spans only the width of text object, as shown
    in Figure [21-4](#429700_2_En_21_Chapter.xhtml#Fig4). This ruler controls indentation,
    margins, and tabs within the text object in a similar manner to the text ruler
    accessible in Browse mode when editing a field.


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig4_HTML.jpg](images/429700_2_En_21_Chapter/429700_2_En_21_Fig4_HTML.jpg)


    Figure 21-4


    The top ruler transforms when editing layout text


    #### Grid


    The layout *grid* is a sequence of evenly spaced horizontal and vertical lines
    overlaid on a layout background that denotes minor and major areas. These lines,
    resembling graph paper, are only visible in Layout mode when the *View ➤ Grid
    ➤ Show Grid* menu item is active or the corresponding check box in the Inspector
    pane is enabled. When visible, the lines can visually assist in uniform alignment
    of objects. Activating the *View ➤ Grid ➤ Snap to Grid* menu setting in the Inspector
    will cause an object being dragged to be drawn to the next grid line in the direction
    of travel (Chapter [19](#429700_2_En_19_Chapter.xhtml), “Grid”).'
  trans: '

    ### 使用找到的记录集创建图表


    以找到的记录集中的记录作为数据源，创建条形图来显示按州划分的 `Contact` 记录数量。首先，在布局上插入一个图表，然后按照图 20-54 所示配置设置。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig54_HTML.jpg](img/429700_2_En_20_Fig54_HTML.jpg)


    **图 20-54** 使用找到的记录集中的数据配置条形图


    **注意**


    从找到的记录集创建图表可能会有点令人困惑。这就像创建带有子汇总部分的报表，因为只有找到的记录集中的记录会被包含在内，并且当前的排序顺序决定了汇总字段如何将记录计数到子组中。


    以下设置将创建如图 20-55 所示的图表：


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig55_HTML.jpg](img/429700_2_En_20_Fig55_HTML.jpg)


    **图 20-55** 每个州的联系记录数量柱状图


    1. **类型** – 选择 `Column` 作为类型。


    2. **X 轴数据** – 选择一个包含文本的字段，该文本将作为条形的标签。为避免重复值，如果*找到的记录集已按指定字段排序*，FileMaker 将自动汇总这些值。在我们的示例中，我们按
    `Contact Address State` 字段排序并将其指定。


    3. **Y 轴数据** – 选择一个包含条形高度数值的汇总字段。在我们的示例中，使用了一个新的 `Contact State Count Summary`
    字段，该字段对 `Record ID` 字段执行 `Count` 操作。


    4. **图表数据** – 在控件的 `Data Source` 部分，选择 `Current Found Set`，以指示图表引擎汇总所有记录中的数据。


    **请记住**，要使此图表正确汇总，记录*必须*按 x 轴排序，并且 y 轴*必须*是一个汇总字段。


    ### 总结


    本章探讨了设计布局时使用的各种对象。在下一章中，我们将学习如何操作、排列和配置对象。


    # 21. 操作对象


    将对象添加到布局后，可以通过多种方式对其进行操作和配置。本章介绍许多基本方法，涵盖以下主题：


    - 选择对象

    - 调整对象大小

    - 移动对象

    - 排列和对齐对象

    - 隐藏对象

    - 条件格式

    - 了解 Tab 键顺序

    - 命名对象


    ## 选择对象


    要*选择*一个对象，请用光标单击它，或者在布局上靠近对象的位置单击，然后将光标拖过或拖绕它。对象将高亮显示，并包含一个带有八个*大小调整手柄*的轮廓，如图
    21-1 所示。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig1_HTML.jpg](img/429700_2_En_21_Fig1_HTML.jpg)


    **图 21-1** 静止状态的对象（左）与选中的对象（右）


    要一次选择多个对象，可以在按住 `Shift` 键的同时逐个单击它们，或者单击背景并拖动光标，使焦点矩形接触到所有所需对象。在拖动时按住 `Command`
    (macOS) 或 `Windows` (Windows) 键，要求项目*完全*位于焦点矩形边界内才会被选中。当选择多个对象时，它们共享一组大小调整手柄，勾勒出组的整体空间，如图
    21-2 所示。单击布局背景或选择其他对象可以取消选择对象。要取消选择一组已选中对象中的某一个，可以在按住 `Shift` 键的同时单击该对象。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig2_HTML.jpg](img/429700_2_En_21_Fig2_HTML.jpg)


    **图 21-2** 一起选中的对象将共享大小调整手柄


    **注意**


    无填充的形状对象只能通过单击边框来选择。单击对象的中心将穿透该对象，选中其后面的对象或布局背景。


    ## 调整对象大小


    可以通过向内或向外拖动八个大小调整手柄之一（相对于对象中心）来调整对象大小。使用 `检查器` 面板控件的 `位置` 选项卡上的设置可以精确调整对象大小，输入新的
    `宽度` 或 `高度`，然后按 `Tab` 或 `Enter` 键以注册更改。要统一调整对象组的大小，请使用 `调整为` 功能，本章后面会介绍。


    ## 移动对象


    选中一个或多个对象后，可以通过单击并拖动它们在布局上移动，或使用其他三种方法之一。箭头键会一次性将选定对象在单个方向上微移一个像素。`检查器` 面板的 `位置`
    选项卡设置允许通过为 `左`、`右`、`顶` 或 `底` 输入新的测量值来精确定位对象。要使对象组相对于彼此移动，请使用 `排列` 和 `对齐` 功能，本章后面会介绍。


    ### 布局定位辅助工具


    有四个功能对手动定位对象很有帮助：`标尺`、`网格`、`参考线` 和 `动态参考线`。这些功能可以单独使用，也可以组合使用，以引导对象移动到新位置。


    #### 标尺


    `标尺` 是沿着窗口内容区域整个左侧和顶部延伸的水平与垂直条，显示基于所选测量单位（`英寸`、`厘米` 或 `点`）的增量刻度。完整标尺（如图 21-3 所示）仅在布局模式下且
    `视图 ➤ 标尺` 菜单项处于激活状态时才可见。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig3_HTML.jpg](img/429700_2_En_21_Fig3_HTML.jpg)


    **图 21-3** 布局模式标尺有助于精确定位


    标尺有几个不太明显的特性。在水平标尺和垂直标尺相交的角落处，有一个按钮显示当前测量单位。单击此按钮可循环切换标尺的可用单位。也可以从标尺的上下文菜单更改所选单位。光标的当前位置在每个标尺中用虚线标记，并且在拖动对象时，标尺会以白色高亮显示对象的边界。


    编辑文本对象内容时，顶部标尺会变为一个灰色条，上面覆盖一个仅跨越文本对象宽度的文本标尺覆盖层，如图 21-4 所示。此标尺控制文本对象中的缩进、边距和制表符，其方式类似于在浏览模式下编辑字段时可访问的文本标尺。


    ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig4_HTML.jpg](img/429700_2_En_21_Fig4_HTML.jpg)


    **图 21-4** 编辑布局文本时顶部标尺会变换


    #### 网格


    布局 `网格` 是叠放在布局背景上的一系列均匀间隔的水平线和垂直线，用于标示次要区域和主要区域。这些线条类似于方格纸，仅在布局模式下且 `视图 ➤ 网格 ➤
    显示网格` 菜单项处于激活状态或 `检查器` 面板中相应的复选框被启用时才可见。当可见时，线条可以在视觉上协助对象均匀对齐。在 `检查器` 中激活 `视图
    ➤ 网格 ➤ 对齐网格` 菜单设置，会导致正在拖动的对象被自动吸附到移动方向上的下一条网格线（详见第 19 章“网格”）。

