- fmt: '### Using Search Operators


    A *search operator* is a character or set of characters that are used to narrow
    the focus of search criteria typed in a field. Without an operator, FileMaker
    defaults to a "begins with" type search, where matches are found at the beginning
    of words. So, searching for `Widget` or `Wid Manu` or `W M` would all find records
    with `Widget Manufacturing` in the field. Operators, described in Table [4-1](#429700_2_En_4_Chapter.xhtml#Tab1),
    can be added to a field while in Find mode by typing them directly into a field,
    using the *Insert Operators* menu in the toolbar or selecting the *Operators*
    submenu from a field''s contextual menu. To see operators in action, place an
    exclamation mark (`!`) in the *Company* field to find all records with other records
    with the same value, or search the *First Name* field for `*n` to find records
    with names ending with that character.


    **Table 4-1** A description of the available Find mode operators


    | Operator        | Description                                                                                                                                                                                                                                          |

    |-----------------|------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|

    | `=`             | By itself, finds records where that field is empty. In front
    of a value, matches a whole word within the field, excluding partial matches.                                                                                                           |

    | `==`            | In front of a value, matches an entire phrase within the field.                                                                                                                                                                                      |

    | `!`             | Finds records that have duplicate values in the field, i.e.,
    any record whose value in the field is also found in another record.                                                                                                                    |

    | `<`             | Finds numeric or text values that are less than the value
    entered after the symbol.                                                                                                                                                                  |

    | `≤`             | Finds numeric or text values that are less than or equal to
    the value entered after the symbol.                                                                                                                                                      |

    | `>`             | Finds numeric or text values that are greater than the value
    entered after the symbol.                                                                                                                                                               |

    | `≥`             | Finds numeric or text values that are greater than or equal
    to the value entered after the symbol.                                                                                                                                                   |

    | `...`           | Finds a range of values based on text placed before and after
    the operator. For example, enter `1/15/2021…1/30/2021` (without the quotes) to
    find all records where the field contains a date including or between the two
    dates entered.            |

    | `//`            | Finds records where the field contains today''s date.                                                                                                                                                                                                 |

    | `?`             | Finds records where the field contains an invalid value.                                                                                                                                                                                             |

    | `@`             | Finds records where the field contains a specific number of
    any character. For example, `@@` will find `He` or `It`, while `@@@@` will find
    `Door` or `Test`.                                                                                        |

    | `#`             | Finds records where the field contains a specific number of
    any number. For example, `#` will find `3` or `8` and `##` will find `33` or `81`.                                                                                                       |

    | `*`             | Use this in place of a character to create a search pattern
    indicating there must be some value present. For example, by itself, it will find
    every record with any value in that field (e.g., omitting empty), or typing `1/15/*`
    will find any records where the field contains a date of January 15 for any year.
    |

    | `\`             | Escapes the next character. This can be useful when searching
    for a literal operator by treating the operator as part of the search criteria
    and not as an operator. For example, to search for any records where the field
    contains a quote symbol, enter `\"`. |

    | `` `"" ``         | Used to match the phrase exactly as typed between the quote
    marks.                                                                                                                                                                                   |

    | `*""`           | Used to match the phrase typed between the quote marks anywhere
    in a field containing a lot of text.                                                                                                                                                 |

    | `~`             | Used to perform a relaxed search in Japanese text.                                                                                                                                                                                                   |


    ### Manipulating a Previously Executed Find


    Once a find has been performed, FileMaker offers three methods for further refining
    the results without having to start over with a new request: *modifying*, *extending*,
    and *constraining* the last find.


    #### Modifying the Last Find


    The *Modify Last Find* function re-creates the find request(s) and criteria of
    the last find performed in the current table providing an opportunity to edit
    the criteria and perform the modified search. This command is available in the
    *Record* menu, in the menu under the toolbar''s *Find* icon, or as a step that
    can be included in scripts.


    #### Extending the Last Find


    The *Extend Found Set* command uses a new search to find and add matching records
    to the current found set. This can be accessed two ways. In Browse mode, highlight
    some text in a field, and select `command` from the contextual menu. The text
    selection is used to find records not in the found set and add them. In Find mode,
    enter criteria and select the *Request ➤ Extend Found Set* menu instead of *Perform
    Find*. The results will be added to the current found set. For example, if viewing
    a found set of records with a *State* of `NY`, enter Find mode, type `CO` into
    *State*, and select *Extend Found Set*. The result will be an expanded list of
    contacts from *both states*.


    #### Constraining the Last Find


    The *Constrain Found Set* command uses a new request to remove records from the
    current found set. This can be accessed two ways. While in Browse mode, highlight
    some text in a field, and select *Constrain Found Set* from the field contextual
    menu. The selection is used to find and retain only records from the found set
    with the matching value. In Find mode, enter criteria and select the *Request
    ➤ Constrain Found Set* menu instead of *Perform Find*. Records in the last found
    set without the matching criteria will be removed. For example, if viewing a result
    set of records with a *Company* of `Widget`, enter Find mode, type `CO` in the
    *State* field, and then select *Constrain Found Set*. The resulting found set
    will retain only the contacts from the previous found set that are from Colorado.


    ### Managing Multiple Find Requests


    Find mode creates a single default find request. This can be expanded to create
    more complex searches. Each request provides one additional set of criteria defining
    values that indicate if a matching record should be included or omitted from the
    result. The results of all requests are combined into the final result. So, if
    one request specifies records with a *State* of `NY` and another specifies records
    with a *State* of `CO`, the result will be a combined list of those two sets of
    records. A single request containing multiple field criteria acts as an "and"
    type search where a record must have all the values to be included in the result.
    In other words, it must contain the specified value in one field *and* the specified
    value in another. Conversely, multiple requests act as an "or" type search, where
    a record must match all the criteria of at least one request. In other words,
    it must contain specified values from one request *or* specified values from another
    request.


    Users can *create*, *delete*, and *duplicate* find requests just like they can
    do with records except that they are accessed through a *Requests* menu, which
    replaces the *Records* menu while in Find mode. Some of these are also accessible
    through a toolbar icon or the *record contextual menu* on the background of a
    layout.


    ### Specifying a Matching Record Option


    Every new find request has a default *Matching Record option* set to `Include`
    which means that records matching the request criteria will be included in the
    results. If this option is toggled to `Omit` in the lower toolbar, then matching
    records will be excluded from the results of the previous request(s). In the examples
    shown in Figure [4-8](#429700_2_En_4_Chapter.xhtml#Fig8), the first request will
    include every record with `Widget` in the *Company* field, and the second request
    will omit from that set any matches with a *First Name* of `Jim`. The results
    will be all contacts working for Widget company except for Jim. Using this setting
    with multiple find requests makes it possible to construct and perform extremely
    complex include-omit multi-criteria searches.


    ![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig8_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig8_HTML.jpg)


    **Figure 4-8** An example of a second find request set to omit results'
