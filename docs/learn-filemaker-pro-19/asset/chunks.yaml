  trans: '

    ### 创建新表事件


    要创建新的表事件，首先点击“添加表”按钮图标，如图 9-25 所示。这将打开之前介绍的“指定表”对话框。如果所需添加的表位于其他文件中，可选择相应的数据源。创建事件后，可以根据需要调整其大小和位置。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig25_HTML.jpg](img/429700_2_En_9_Fig25_HTML.jpg)


    图 9-25


    用于添加新表事件的工具


    ### 复制现有事件


    要复制选中的事件，请点击“复制表”按钮图标，如图 9-26 所示。复制现有事件而非新建事件有很多好处。如果目标表已存在对应事件，复制它可省去手动分配表的步骤。复制件还会保留原件的尺寸和格式，从而节省修改新事件默认样式所需的时间。复制一组相关联的事件将保留它们之间的所有关系连接。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig26_HTML.jpg](img/429700_2_En_9_Fig26_HTML.jpg)


    图 9-26


    用于复制现有事件的工具


    ### 删除事件


    可以通过选中表事件后按 `Delete` 键，或点击如图 9-27 所示的“删除”工具来删除表事件。请注意，这只会删除表的*事件*，而*不会*删除实际的*表*。不过，任何将该事件作为上下文使用的资源都会受到删除操作的影响。因此，在删除已分配或引用了该事件的布局和脚本后，可能需要对其进行更新。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig27_HTML.jpg](img/429700_2_En_9_Fig27_HTML.jpg)


    图 9-27


    用于删除现有事件的工具


    ### 打印关系图


    如图 9-28 所示的“页面”工具提供了对*分页符*和*页面设置*的控制，用于准备打印关系图。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig28_HTML.jpg](img/429700_2_En_9_Fig28_HTML.jpg)


    图 9-28


    用于准备打印关系图的工具


    ## 构建关系


    当图中有事件存在后，可以将它们连接起来以定义关系。


    ### 添加关系


    当两个事件之间建立连接时，即形成关系。可以通过拖拽两个事件之间的连接，或使用“添加关系”按钮来实现。


    #### 在事件之间拖拽连接


    在两个事件之间创建连接最直观的方法是使用光标，从一个事件的字段拖拽到另一个事件的字段，从而基于这两个匹配字段建立关系。首先，在图中找到要连接的两个事件，点击它们右上角的图标，直至完全展开。滚动列表，使关系的目标匹配字段位于每个列表的可见区域内。按住一个事件中的匹配字段并拖动。当开始向另一个事件拖动光标时，会有一条线连接到第一个匹配字段，如图
    9-29 所示。一旦光标悬停在另一个事件的目标匹配字段上，松开鼠标，连接线便建立完毕。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig29_HTML.jpg](img/429700_2_En_9_Fig29_HTML.jpg)


    图 9-29


    在事件之间拖拽新的关系连接


    提示


    通过快速拖拽*任意*两个当前可见字段之间的连接，可以节省时间。随后再编辑关系（稍后介绍），并在对话框更大、更易滚动的列表中选择所需字段。


    #### 使用添加关系按钮


    创建新关系的另一种方法是点击工具栏中的“添加关系”按钮，如图 9-30 所示。点击此按钮将打开一个空的“编辑关系”对话框（本章稍后讨论），其中两个表均设置为
    `<unknown>`。由于连接为空，必须手动选择事件和匹配字段。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig30_HTML.jpg](img/429700_2_En_9_Fig30_HTML.jpg)


    图 9-30


    用于创建空关系的工具


    ### 操作关系


    *关系*在图中由一条连接两个事件的线表示，中间有一个选择框，如图 9-31 所示。该框会显示用于匹配两个字段的运算符，默认是等号。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig31_HTML.jpg](img/429700_2_En_9_Fig31_HTML.jpg)


    图 9-31


    带有中间选择框的关系线


    在线与事件相连的两端，会显示关系类型的指示符，如图 9-32 的放大图所示。直线（如左侧所示）表示*一*端，右侧的“乌鸦脚”表示*多*端。因此，在此示例中，从*公司*到*联系人*存在一个*一对多关系*连接。FileMaker
    仅通过查看字段的自动输入设置来确定此信息。由于*公司*表中的 `Record ID` 字段被配置为为每条记录自动输入唯一的序列 ID，因此它显示为一端。而另一端的字段没有限制，因此假定为多端。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig32_HTML.jpg](img/429700_2_En_9_Fig32_HTML.jpg)


    图 9-32


    线端符号表示每侧连接的类型


    警告


    线端指示符仅反映字段定义的限制，不反映布局或脚本函数中的输入选项。


    移动事件时，无论一个框相对于另一个框的位置如何，关系线都会保持两侧连接。当移动一个框足够远时，线会分成三段直线转折段，如图 9-33 所示。当框被移动到足够远时，线会自动跳到事件框的另一侧以保持连接。


    ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig33_HTML.jpg](img/429700_2_En_9_Fig33_HTML.jpg)


    图 9-33


    移动事件时，线会分成直线段

