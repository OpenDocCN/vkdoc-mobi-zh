- fmt: "### Sorting Records in the Found Set\n\nThe `record sort status` is always\
    \ indicated in the record navigation area of the toolbar as shown in Figure [4-13](#429700_2_En_4_Chapter.xhtml#Fig13).\
    \ Records always default to creation order, which is considered `unsorted`. They\
    \ can be sorted based on a custom list of sort fields, which can be compiled from\
    \ local or related fields using the `Sort Records` dialog, shown in Figure [4-14](#429700_2_En_4_Chapter.xhtml#Fig14).\
    \ The dialog can be opened by selecting the `Sort Records` command in the `Records`\
    \ menu or the record contextual menu. It is also available by clicking the `Sort`\
    \ button in the toolbar.\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig14_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig14_HTML.jpg)\n\
    \nFigure 4-14\n\nThe dialog used to sort records\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig13_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig13_HTML.jpg)\n\
    \nFigure 4-13\n\nThe sort status is always displayed in the toolbar record count\
    \ area\n\nThe following sort controls are available:\n\n1. `Field Selector` –\
    \ Select a field from the list which is based on the table or layout selected\
    \ in the pop-up menu above.\n\n2. `Sort Order` – Lists the current `sort fields`\
    \ in the order they will be used to sort records. Add a field by double-clicking\
    \ it in the field selector or with the `Move` button. Drag up or down to rearrange.\
    \ Remove a field by double-clicking here or with the `Clear` button. To remove\
    \ all fields, click `Clear All`.\n\n3. `Sort Field Direction` – Choose the sort\
    \ direction of the selected field: `ascending` (default), `descending`, or a `custom\
    \ order based on a value list` (Chapter [11](#429700_2_En_11_Chapter.xhtml)).\
    \ The icons are displayed next to fields in the sort order list to indicate which\
    \ option is assigned.\n\n4. `Sort Option Checkboxes` – Enable advanced sort control:\n\
    \   * `Reorder Based on Summary Field` – Select a summary field (Chapter [8](#429700_2_En_8_Chapter.xhtml))\
    \ to reorder records based on the position of the sort field’s value as sub-summarized\
    \ by another sort field. For example, a list of contacts can be summarized by\
    \ a state (sort field) but sorted by the number of contacts living in each state\
    \ (summary field).\n   * `Override Field’s Language for Sort` – Select a language\
    \ used to index text fields when sorting.\n\n5. `Keep Records in Sorted Order`\
    \ – Deselect to stop records from continuously resorting whenever the contents\
    \ of a sort field is modified.\n\n### Modifying Field Values in a Found Set\n\n\
    Several commands can be used to modify field values across an entire found set:\
    \ `Replace Field Contents`, `Relookup Field Contents`, `Find and Replace`, and\
    \ `Spell-checking`.\n\n#### Replace Field Contents\n\nThe `Replace Field Contents`\
    \ command under the `Records` menu opens the dialog shown in Figure [4-15](#429700_2_En_4_Chapter.xhtml#Fig15).\
    \ This is used to define a value that will be inserted into the current field\
    \ on every record in the found set, completely replacing the previous value. The\
    \ replacement value can be the literal value contained in the field of the current\
    \ record, a serial number starting from a specified number on the first record\
    \ and incremented a specified amount for each subsequent record, or the result\
    \ of a calculation (Chapter [12](#429700_2_En_12_Chapter.xhtml)).\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig15_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15\n\nThe dialog used to define a replacement value\n\nCaution\n\n\
    The replace process can’t be undone and should be used carefully. Use custom menus\
    \ (Chapter [23](#429700_2_En_23_Chapter.xhtml)) to hide this feature from users\
    \ who don’t require it, and create a custom script (Chapter [24](#429700_2_En_24_Chapter.xhtml))\
    \ to perform developer-defined replacements safely.\n\n#### Relookup Field Contents\n\
    \nWhen a field is defined to copy data from related records using the `Lookup`\
    \ feature (Chapter [8](#429700_2_En_8_Chapter.xhtml), “Lookup for Field Dialog”),\
    \ the copied values can be manually forced to update for every record in the found\
    \ set using the `Relookup Field Contents` command.\n\nCaution\n\nThe `Lookup`\
    \ feature is a vestigial remnant from the days before better auto-enter options\
    \ and relationships were available.\n\n#### Find and Replace\n\nFileMaker’s `Find\
    \ and Replace` function is reminiscent of those found in text editors. It can\
    \ locate text within one or all fields for one or all records in the current found\
    \ set and optionally replace matches with alternate text. The `Find/Replace` function\
    \ from the `Edit` menu will open a dialog of the same name, shown in Figure [4-16](#429700_2_En_4_Chapter.xhtml#Fig16).\n\
    \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig16_HTML.jpg](images/429700_2_En_4_Chapter/429700_2_En_4_Fig16_HTML.jpg)\n\
    \nFigure 4-16\n\nThe dialog used to find and replace text\n\nTo begin, type text\
    \ into the `Find what` field and optionally in the `Replace with` field. The `Direction`\
    \ pop-up menu offers the choice of moving `forward` or `backward` through fields\
    \ and/or records in a found set. Select the `Match case` checkbox for the find\
    \ process to be case-sensitive, and select `Match whole words only` to only consider\
    \ a match when the text in a field contains the entire, separate word(s) typed\
    \ into the `Find what` field. The `Search across` radio buttons instructs the\
    \ function whether it should search `all records` in the found set or limit itself\
    \ to the `current record`. The `Search within` option controls if it should search\
    \ `all fields` on the layout or just the `current field`.\n\nOnce configured,\
    \ the `Find Next` button locates and highlight the next instance of the text in\
    \ the `Find what` field in the current field, next field, or next record, depending\
    \ on the other settings in the dialog. The `Replace & Find` button will either\
    \ locate the first instance of a match, if one has not yet been made, or replace\
    \ the currently highlighted matched text with the replacement text and then locate\
    \ the next instance of a match. The `Replace` button performs the replace function\
    \ if a find has already selected a matching instance of the search text. Afterward,\
    \ the cursor appears immediately after the replaced text. The `Replace All` button\
    \ replaces all matching instances of the search text based on the settings in\
    \ the dialog."
