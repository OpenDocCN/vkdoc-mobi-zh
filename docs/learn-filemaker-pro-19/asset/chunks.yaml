- fmt: '# 16.  Introducing ExecuteSQL


    The *Structured Query Language* (*SQL*) is a standardized programming language
    used to manage relational databases and perform numerous operational functions
    to the data they store. It was created in the 1970s and became the standard programming
    language for relational databases. The *American National Standards Institute*
    (ANSI) and the *International Organization for Standardization* (ISO) adopted
    an official SQL standard in 1986 and 1987, respectively. Since then, many updates
    to the standard have been released jointly by both organizations. Numerous companies
    now develop proprietary and open source SQL-compliant database systems. While
    FileMaker is not built on the standard, it has some support for performing SQL
    queries internally and externally. In version 9.0 (2007), FileMaker introduced
    the ability to create live connections to external ODBC data sources (Chapter
    [7](#429700_2_En_7_Chapter.xhtml)). Version 12.0 (2012) introduced the *ExecuteSQL*
    function which can perform queries against FileMaker tables from any calculation
    within a FileMaker database. A *SQL Query* is a text-based statement used to instruct
    a database to perform an action. The most frequently used type of query and the
    only one supported by the *ExecuteSQL* function in FileMaker is the `SELECT` query,
    which contains data retrieval instructions for a desired result set. Experienced
    SQL programmers will appreciate the direct back-end access of this feature but
    may find the limitation constraining. Others may find the divergence from FileMaker’s
    interface context–centric data access confusing. But the ability to perform a
    search, sort, and summarize data directly *within a calculation formula* in a
    completely *context-independent* manner is something many will appreciate. It
    isn’t necessary to learn SQL or to use this command to create databases since
    it doesn’t replace native FileMaker features. However, it is worth learning for
    situations where it complements those features more efficiently. This chapter
    explores the *ExecuteSQL* function, covering the following topics:


    *   Defining the ExecuteSQL function

    *   Creating SQL queries

    *   Accessing the database schema


    ## Defining the ExecuteSQL Function


    The *ExecuteSQL* function allows a formula to retrieve data directly from *any*
    table occurrence within the file’s relationship graph *completely independent*
    of any relationship between it and the current interface context. A call to the
    function must include three parameters: *sqlQuery*, *fieldSeparator,* and *rowSeparator*.
    It can also accept one or more optional *arguments*.


    ```

    ExecuteSQL ( sqlQuery ; fieldSeparator; rowSeparator )

    ExecuteSQL ( sqlQuery ; fieldSeparator; rowSeparator ; arguments )

    ```


    The parameters in the statement are defined as follows:


    *   *sqlQuery* – A text expression or reference to a field that contains a `SELECT`
    statement which specifies the location and criteria for fetching a desired record
    and field result.

    *   *fieldSeparator* – A text string containing the character(s) that should be
    used as a separator between fields in the result. If left empty, a comma is the
    default.

    *   *rowSeparator* – A text string containing the character(s) that should be
    used as a separator between records in the result. If left empty, a paragraph
    return is the default.

    *   *arguments* – One or more text values that are used as dynamic parameters
    in the query, replacing question marks typically in a `WHERE` clause.


    The results of the function will be a text string with the value for each specified
    field for every matching record delimited by the specified or default separators.
    For example, using default separators, the result will be paragraphs representing
    records made up of comma-separated field values.


    ### Caution


    This is a *calculation function* and should not be confused with the similarly
    named script step!


    ### Understanding the Limits of ExecuteSQL


    The *ExecuteSQL* function has a few limitations that are important to note. There
    are features not supported that experienced SQL programmers may expect and others
    that experienced FileMaker developers may incorrectly assume.


    *   As mentioned in the introduction, the function is currently limited to the
    `SELECT` command only. It *does not support* any other common SQL functions that
    perform record changes or modify schema such as `DELETE`, `INSERT`, `UPDATE`,
    `INSERT INTO`, `CREATE TABLE`, `DELETE TABLE`, etc.

    *   FileMaker’s relational connections are not recognized or required by the function.
    A `SELECT` statement must use a `JOIN` clause to dynamically create temporary
    relationships for use within the query.

    *   The function does not recognize the current layout context. Instead, it directly
    accesses a *table* based on the *occurrence* specified.

    *   Values *must* be sent to the function with SQL-92 compliant date and time
    formats with no braces. To apply the correct formatting in a query, use a `DATE`,
    `TIME`, or `TIMESTAMP` conditioning operator, or the value may be evaluated as
    a literal string. It will *not* accept the ODBC/JDBC formats for *date*, *time*,
    and *timestamp* constants contained in braces.

    *   The function will return *date*, *time*, and *number* data using the Unicode/SQL
    format rather than the date and time settings of the database file or operating
    system. So, these must be converted for use as dates in FileMaker.

    *   Sorting performed by the function uses the Unicode binary sort order.


    ## Creating SQL Queries


    At a minimum, the `sqlQuery` portion of the `ExecuteSQL` function requires a `SELECT`
    statement, which can include numerous optional clauses, and these can be used
    to perform numerous different data retrieval tasks.'
