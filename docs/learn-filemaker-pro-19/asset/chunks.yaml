- fmt: '### Excluding File Extensions


    When targeting a FileMaker database, the file extension is completely optional.
    Since the FileMaker file extension may change in the future, consider omitting
    extensions in paths (or store them in a global variable), so the database can
    be easily updated later without having to find and edit every path. For example,
    all of these paths will locate the same file (with the last one assuming that
    the `$$Extension` variable contains `.fmp12`).


    ```

    filemac:/Macintosh HD/Users/john_smith/Documents/Test Target

    filemac:/Macintosh HD/Users/john_smith/Documents/Test Target.fmp12

    filemac:/Macintosh HD/Users/john_smith/Documents/Test Target$$Extension

    ```


    ### Converting Paths


    In version 19, two new functions make it easier to convert between an operating
    system path format and a FileMaker path. This eliminates the chore of programmatically
    parsing formulas to convert paths to a different format. Both functions accept
    two parameters: a *path* and a *format*. The *format* parameter for either can
    be one of three values indicating the respective source or target path format:
    `PosixPath`, `URLPath`, or `WinPath`.


    ```

    ConvertToFileMakerPath ( "/Users/mmunro/Desktop/" ; PosixPath )

    // result (macOS) = file:/Macintosh HD/Users/mmunro/Desktop/

    // result (Windows) = file:/C:/Users/mmunro/Desktop/

    ConvertFromFileMakerPath ( "file:/Macintosh HD/Users/mmunro/Desktop/" ; PosixPath)

    // result = /Users/mmunro/Desktop/

    ```


    ## Performing Other Scripts


    The `Perform Script` step allows a script to run another script. This makes it
    possible to build modular scripts that perform discrete tasks and then have higher-level
    scripts run them in a sequence. Scripts can call scripts that call other scripts,
    creating complex hierarchical call stacks. Scripts can even call themselves creating
    a recursive call stack. After adding the step to a script, it will appear with
    an unknown script specification, as shown in Figure 24-19. The step has two active
    regions. First, the *Specified* value indicates what type of reference to a script
    will be defined, a formula-driven text value indicating the *name* of the script
    or a *dynamic reference* selected from a list of available scripts. Depending
    on that selection, clicking on the script name region of the call opens the appropriate
    specification dialog, either the *Specify Formula* or *Specify Script* dialog.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig19_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig19_HTML.jpg)


    Figure 24-19


    The `Perform Script` step’s options


    **Tip**


    Hold the Command (macOS) or Windows (Windows) key when clicking on a `Perform
    Script` step’s target script to automatically open the assigned script in a new
    tab.


    ### Exploring the Specify Script Dialog


    The *Specify Script* dialog is used to select a reference to a script that will
    be targeted as the action for a button, an interface event trigger (Chapter 27)
    or the `Perform Script` step mentioned previously. The dialog, shown in Figure
    24-20, allows selection of a script from the current file or any FileMaker data
    source defined in the database (Chapter 9). An optional script parameter can be
    defined to accompany the call to the selected script. When assigning a script
    to a button or as an event trigger, this dialog includes the three buttons that
    allow adding, deleting, editing, or duplicating a script directly from the dialog.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig20_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig20_HTML.jpg)


    Figure 24-20


    Selecting a script for a button, script trigger, or script step


    The ability of a script to run other scripts allows for a more modular script
    design. Instead of building one monolithic script that performs dozens or hundreds
    of steps in a long complex sequence, a process can be broken into separate scripts,
    each focused on a certain task. This makes it possible to set up a hierarchy where
    some scripts perform open-ended, fundamental tasks that can be shared by many
    other scripts regardless of context. However, when creating a delimited mesh of
    shared script functions, be sure to manage the naming, organizations, and usage
    rules in a way to avoid confusing zigzagging cross talk back and forth.


    ### Exchanging Data Between Scripts


    A script call can include a *parameter* and receive a *result*, as illustrated
    in Figure 24-21 where Script 1 calls Script 2 with a parameter and then receives
    a result from that script’s `Exit Script` step.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig21_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig21_HTML.jpg)


    Figure 24-21


    Illustrating data exchange between two scripts


    **Caution**


    Decades ago, global fields and variables were used to “park” data prior to script
    calls to facilitate an archaic data exchange. Before that, some used the clipboard
    for this purpose. However, parameters are now preferred for data exchange between
    scripts.


    #### Sending Parameters


    A script parameter is a text string sent to a script by a triggering object. Parameters
    are used to transmit any information that a script can use for any number of reasons.
    Instead of hard-coding field references or other values inside a script, parameters
    allow the triggering object to push information to the script that can vary from
    one call to the next. Parameters can be a single word, a sentence, a value list,
    a field name, a field value, or a JSON object containing a complex array of key-value
    pairs. They can be typed as literal values or constructed with a formula. To illustrate
    the use of parameters, create a script that displays an incoming parameter in
    a dialog using the `Show Custom Dialog` script step configured with this formula:


    ```

    Get ( ScriptParameter )

    ```


    Next create a button or a second script that uses the `Perform Script` function
    with a short message typed into the Optional script parameter field. When the
    button is clicked or script run, the targeted script should present a dialog displaying
    the message that was sent as a parameter.


    #### Parsing a Parameter


    A script parameter is a singular value. However, it can be arranged in a way to
    contain multiple values using a return-delimited value list, a reference to a
    repeating field, or a JSON object. When receiving structured information representing
    multiple components, a script will need to parse the values in order to deal with
    them separately. To accommodate this, use one or more `Set Variable` or `Insert
    Calculated Result` steps to parse and park the data into separate variables. This
    can be done with a `Let` statement and the `GetValue`, `GetRepetition`, or various
    JSON functions. The following example demonstrates how to parse a value list containing
    three values into separate variables:


    ```

    Let ( [

    input = Get ( ScriptParameter ) ;

    $id = GetValue ( input ; 1 ) ;

    $name = GetValue ( input ; 2 ) ;

    $status = GetValue ( input ; 3 )

    ] ;

    ""

    )

    ```


    This example will parse values from a script parameter containing a reference
    to a field that is defined with four repetitions, using the `GetRepetition` function.


    ```

    Let ( [

    field = Get ( ScriptParameter ) ;

    $id = GetRepetition ( field ; 1 ) ;

    $name = GetRepetition ( field; 2 ) ;

    $status = GetRepetition ( field; 3 ) ;

    $task = GetRepetition ( field; 4 )

    ] ;

    ""

    )

    ```


    While those two examples parse a fixed number of values in the parameter, it is
    possible to create more dynamic parsing functionality. If the number of values
    or field repetitions varies, a `While` function (Chapter 13) statement or `Loop`
    script step (Chapter 25) might be necessary to cycle through them. Also, a recursive
    custom function can step through each value, initializing it into a variable.'
