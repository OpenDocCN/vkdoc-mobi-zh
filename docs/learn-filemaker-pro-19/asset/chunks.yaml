    FileMaker 自己的函数。有多种命令可用于处理日期、时间和字符串。数值可以进行聚合或用于数学计算。可以嵌入条件操作，并且可以将许多运算符与字段值和 SQL
    函数一起使用来处理结果。`Execute SQL`脚本步骤允许对来自外部数据库的外部 ODBC/JDBC 数据源进行更强大的操作。此外，FileMaker
    数据库可以用作 ODBC/JDBC 数据源，并支持来自外部数据库的 SQL 查询。有关这些主题的更多信息，请访问[*www.*`claris.com`](http://www.claris.com)并搜索`FileMaker
    ODBC and JDBC Guide`或`FileMaker SQL Reference`文档。


    ## 总结


    本章介绍了使用`ExecuteSQL`函数的基础知识，并提供了`SELECT`语句许多功能的示例。在下一章中，我们将开始探索布局设计，为用户提供访问数据结构界面的入口。


    # 第四部分 设计用户界面


    界面为用户和脚本与存储在基础表结构中的数据进行交互提供了接入点。它是数据库最突出的部分，可以说是最重要的部分之一。以下章节探讨布局设计的基础知识：


    1.  介绍布局

    2.  布局入门

    3.  探索布局面板

    4.  创建布局对象

    5.  操作对象

    6.  使用主题和样式

    7.  自定义菜单


    # 17. 介绍布局


    *布局*是开发者设计的图形模板，定义了如何渲染记录、字段和对象以产生交互式体验。每个数据库窗口一次显示一个布局。在特定时刻激活的布局字面上称为*当前布局*。当数据库打开时，这是一个根据数据库配置方式选择的默认布局。它可能是在*文件选项*（第[6]章）中选择的布局、由*脚本触发器*（第[27]章）打开的布局，或者在本地计算机上运行时文件关闭时最后打开的布局。与
    Claris 入门解决方案中方便的预定义布局不同，自定义数据库从一个空布局开始，开发者必须从中设计界面。本章通过介绍布局基础知识开始探讨界面设计，包括：


    - 理解上下文访问

    - 剖析布局

    - 规划布局

    - 使用布局模式

