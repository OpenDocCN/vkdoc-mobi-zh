- fmt: '# Scripts Menu


    The `Scripts` menu when working in the `Script Workspace` is completely transformed,
    as shown in Figure [24-8](#429700_2_En_24_Chapter.xhtml#Fig8). It contains functions
    for `creating`, `importing`, `opening`, `renaming`, `duplicating`, `deleting`,
    `saving`, `reverting`, and `running` scripts, many also available in the toolbar
    or contextual menus. One notable function, `Grant/Revoke Full Access Privileges`,
    configures a selected script to run with `full access privileges` even when the
    current user does not have full access (Chapter [30](#429700_2_En_30_Chapter.xhtml)).
    When a script has been granted full access, a small icon of a person appears next
    to its name in the list.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig8_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig8_HTML.jpg)


    Figure 24-8


    The Scripts menu when working in the Script Workspace


    **Caution**


    The `Scripts` menu is macOS only. In Windows, these functions can be found in
    a modified `File` and `Edit` menus.


    ## Writing Scripts


    To create a script, click the `+` button in the toolbar or select the `Scripts
    ➤ New Script` menu item. The new script will appear in the `scripts pane` and
    open as a tab with editing focus on the label awaiting entry of a custom name.
    Enter a name and type `Enter` or click away from the tab to commit it.


    ### Exploring Script Step Basics


    A `script step` is a command instruction inserted into a script workflow that
    defines a specific action executed as part of an overall sequence of events. Although
    steps can be `inserted` into the workflow by typing, they are really `object-based`
    not `text-based`. Once inserted, steps can be selected, dragged, duplicated, copied,
    pasted, or deleted but are no longer editable by typing as found in a command-line
    based scripting environments. Some have active regions that allow typing a formula
    or selecting menu options directly in line. However, most configurable options
    are modified by clicking to open a pane or dialog.


    #### Inserting Script Steps


    Steps can be added to a script using auto-complete while typing directly or using
    the `steps pane`.


    ##### Inserting Steps Using Auto-Complete


    A new script will have one blank row. Click into the row and begin typing a step
    name to activate an auto-complete suggestion interface. A list of available steps
    appears and is filtered as you type, as shown in Figure [24-9](#429700_2_En_24_Chapter.xhtml#Fig9).
    To select a step, either click directly on a step, use the keyboard arrows, or
    keep typing until the desired step is at the top of the list. Once a step is selected,
    insert it by typing `Enter` or double-clicking on it. Once inserted, the step
    transforms from editable text into an interactive object.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig9_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig9_HTML.jpg)


    Figure 24-9


    The suggestions available for auto-complete


    ##### Inserting Steps from the Steps Pane


    To insert using the `Steps` pane, locate the desired step in the list by scrolling,
    using the arrow keys, typing a few characters of the desired step or using the
    `Search` field to filter the list. Once selected, insert the step into the script
    workflow by typing the `Enter` key, double-clicking on it or right-clicking on
    it and selecting the `Insert into Script` function from the contextual menu.


    #### Configuring Script Steps


    Script steps can be divided into two fundamental categories. `Steps without configurable
    options` will perform a predetermined function without any variability. These
    appear in the script workflow by name only, without any interactive options, and
    include commands like a `New Record/Request`, `Go to Next Field`, `Show All Records`,
    `Beep`, and more. They can be dragged around to position them in the workflow
    but offer no functional variation. By contrast, `steps with configurable options`
    appear in the workflow with square brackets after the command name. These may
    contain default settings, value labels, or nothing between the bracket, as shown
    in the following examples. Once configured, they will display all or some of the
    selected settings. Configuring step options varies by step, but can be roughly
    divided into two groups: those `configurable directly inline` and those `configured
    with an options dialog`. Some steps combine both of these.


    ```

    Allow User Abort [ Off ]

    Enter Browse Mode [ Pause: Off ]

    Set Variable [ ]

    Perform Script [  ]

    ```


    ##### Configuring Settings Directly Inline


    A step with `inline direct editing` of options has one or more interface components
    that are accessible and editable directly between the bracketed area of the step
    statement without opening a separate panel or window. There are three different
    types of inline editing control you will encounter: `formula text`, `toggle buttons`,
    and `menus`.


    ###### Inline Editing with Formula Text


    Many steps allow `inline formula editing` where a formula can be typed directly
    into the script step. These include steps like `If`, `Exit Loop If`, and `Exit
    Script`. When inline editing is available, a red box appears between the square
    brackets. With the cursor over this, the box deepens in color and gains a red
    outline. Click it to reveal an expanded formula text area, as shown in Figure
    [24-10](#429700_2_En_24_Chapter.xhtml#Fig10).


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig10_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig10_HTML.jpg)


    Figure 24-10


    A formula step at rest (top), with hover (middle), and with active focus (bottom)


    **Note**


    Inline formula editing is a convenience for entering a short formula but is impractical
    for longer formulas. Click the `fx` icon to open a full-sized `Specify Calculation`
    dialog.


    The inline formula editor is fully featured like the `Specify Calculation` dialog
    (Chapter [12](#429700_2_En_12_Chapter.xhtml), “Exploring the Specify Calculation
    Dialog”). It includes auto-complete suggestions and allows for multiline formula
    entry and editing, both shown in Figure [24-11](#429700_2_En_24_Chapter.xhtml#Fig11).
    After typing a formula, compile and save by clicking outside of the formula area
    or by typing either the `Return` or `Enter` key. If a syntax error is detected
    in the formula, the full `Specify Calculation` dialog will automatically open
    with an error notification dialog, forcing you to remedy the problem before saving.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig11_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig11_HTML.jpg)


    Figure 24-11


    An inline multiline formula showing the auto-complete interface


    **Tip**


    To insert a carriage return in an inline formula, type `Return` while holding
    down the `Option` key (macOS) or `Alt` key (Windows).


    ###### Inline Editing with a Toggle Button


    A step with an `inline editable toggle button` allows a choice between two possible
    options. These can be identified by a labeled value between the brackets that
    is logically binary and the appearance of a blue border outlining the current
    value when the cursor hovers over it, as shown in Figure [24-12](#429700_2_En_24_Chapter.xhtml#Fig12).
    To toggle the current value, click it or press the space bar with the step selected.


    ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig12_HTML.jpg](images/429700_2_En_24_Chapter/429700_2_En_24_Fig12_HTML.jpg)


    Figure 24-12


    A toggle button at rest (top), with hover (middle), and after click (bottom)


    **Tip**


    When available in combination with a dialog or popover of configuration options,
    the toggle setting is generally only accessible inline and not included on a dialog
    with other options.'
