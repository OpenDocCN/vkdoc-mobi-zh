  trans: '

    #### 隐藏式编辑框


    `隐藏式编辑框`控件样式会将字段渲染为每个字符显示为项目符号的编辑框，如图 20-17 所示。当字段获得焦点时，每输入一个字符便显示一个项目符号，但一旦焦点移至其他字段或提交记录，则会恢复显示八个项目符号。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig17_HTML.jpg](img/429700_2_En_20_Fig17_HTML.jpg)


    **图 20-17** 无焦点（左）和有焦点（右）的隐藏式编辑框


    > **注意**：隐藏式编辑框仅旨在提供*最低限度的安全性*。字段中存储的数据*并*未加密。在应用了该控件样式的布局上，数据会被遮挡，但脚本和计算仍可访问并像操作其他字段一样操控这些数据。


    ### 为双字段值列表使用弹出菜单


    弹出菜单控件样式具有一项独特功能，可在与双字段值列表配合使用时减少对额外资源的需求。通过配置已分配的值列表使其仅显示*第二个字段*（第 11 章，“使用字段中的值”），并将字段的控件样式设置为启用了*使用值列表覆盖数据格式*选项的弹出菜单，用户将仅看到第二个字段，即使第一个字段会被输入到字段中。


    为说明这一点，向 `Contact` 表中的 `Contact Company ID` 字段添加一个用于 *Company* 记录的值列表，该列表将插入公司
    `Record ID` 并在联系人与公司之间建立关系。首先，设置一个名为 `Company List` 的值列表，如图 20-18 所示，该列表生成所有公司记录的
    `Record ID` 列表，并将 `Company Name` 作为第二个字段。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig18_HTML.jpg](img/429700_2_En_20_Fig18_HTML.jpg)


    **图 20-18** 按第二个字段排序的双字段值列表示例


    接下来，将该值列表作为下拉列表应用于 `Contact Company ID` 字段，如图 20-19 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig19_HTML.jpg](img/429700_2_En_20_Fig19_HTML.jpg)


    **图 20-19** 分配给字段的值列表（左），配置为下拉列表（右）


    通过在值列表定义中包含第二个字段，用户可以按*名称*查看并选择公司。然而，一旦选择并提交后，菜单消失，仅保留*id*可见。传统上，此问题可通过在 `Contact
    Company ID` 字段与 `Company` 表的 `Record ID` 之间添加关系，然后通过该关系提取 `Company Name` 字段并显示在布局上附近位置来解决，如图
    20-20 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig20_HTML.jpg](img/429700_2_En_20_Fig20_HTML.jpg)


    **图 20-20** 公司名称字段（右）从相关表匹配项（右上）中提取


    虽然这能解决问题，但存在一些缺点。它会使布局变得杂乱，同时显示 id 和名称。而且，当您点击 id 字段、按名称选择，id 进入字段，而名称却显示在侧边时，操作会显得有些不自然。由于用户通常无需查看
    id，一种创造性的做法是重叠两个字段，使用户只看到顶部的公司名称字段，而隐藏其下方的 id 字段。通过将顶部的名称字段配置为不允许输入，点击操作会穿透它并激活其后方的
    id 字段，从而打开菜单。做出选择后，id 字段将被名称字段隐藏。使值列表仅显示第二个字段，会导致 id 几乎完全不可见（菜单打开时除外）。虽然此方法可行，但专用关系与笨拙的字段叠加组合使其不太理想。


    相比之下，可以消除所有这些混乱，直接使用可覆盖数据格式的弹出菜单控件样式。首先，扩展 `Contact Company ID` 字段的宽度。然后，确认值列表设置为仅显示第二个字段（如前所述）。最后，将字段配置为显示为弹出菜单，并选择*使用值列表覆盖数据格式*选项，如图
    20-21 所示。现在，列表将仅显示公司名称，而该字段虽然仍*包含* id，但会通过布局格式将其覆盖，显示从值列表中选择的值，即公司名称。此方法*无需*重叠字段或要求额外的表匹配项和关系。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig21_HTML.jpg](img/429700_2_En_20_Fig21_HTML.jpg)


    **图 20-21** 有焦点（左上）与无焦点（左下）的字段，配置为带覆盖功能的弹出菜单（右）


    ### 绕过值列表输入限制


    使用值列表的四种控件样式均隐含地鼓励遵守某些数据输入限制，即输入*单个值*或将输入限制为*仅限值列表项目*，如表 20-1 所示。值得指出的是，*这些并非严格执行的规则，狡猾的用户可以绕过它们*。就其机制本质而言，弹出菜单和单选按钮都大致排除了用户输入多个项目或不在分配列表中的值的可能性。同样，复选框集（未设置允许其他值的选项）似乎也排除了选择不在列表中的值。然而，所有这些“限制”都是可以覆盖的。在必须限制用户只能使用控件样式提供的选项的情况下，可能需要采取明确措施，使用户无法绕过值列表。


    **表 20-1** 值列表驱动控件样式的隐含输入限制


    | 控件样式 | 单个项目 | 仅限值列表项目 |

    | --- | --- | --- |

    | 弹出菜单 | 是 | 是 |

    | 下拉列表 | 是 | – |

    | 复选框集 | – | 是 |

    | 单选按钮 | 是 | 是 |

    '
- fmt: '#### Halting Entry of Custom Values


    The entry of values not present on a field’s assigned value list can be done several
    ways. For example, when the field has focus, text in the clipboard can be pasted
    into the field. Also, any of the text-entering functions from the *Insert* menu
    can be used to insert predefined values. Users can drag a text selection from
    another field or even another application and drop it into the field. Importing
    records can bypass the interface as can many script steps. There are several ways
    to tighten up data entry, making it impossible to bypass the assigned value list.


    ##### Using Field Validation


    One method to stop users from bypassing the assigned value list is to use validation
    at the field definition level (Chapter [8](#429700_2_En_8_Chapter.xhtml)). This
    will apply to every use of the field on any layout (*including* those where a
    value list control style is not used) and will warn the user about the error.
    This is a good option for situations where universal coverage is desired.


    ##### Filtering Bad Values with a Calculation


    Alternatively, an auto-enter calculation at the field definition level can automatically
    preprocesses data input to confirm that any entries made are appropriate and filter
    out those that are not. This provides greater flexibility since a custom formula
    can dynamically change behavior based on various conditions, e.g., make the field
    operate differently on different layouts or depending on various factors. Since
    the technique removes the erroneous entry silently without an error dialog, it
    is great for a nondisruptive correction and won’t slow down a user’s data entry.
    However, in some cases, it can be confusing, appearing like a bug to an inexperienced
    user who would have no idea what error they committed or that their entry was
    modified.


    The following formula assumes a single value being entered and will automatically
    filter out any value entered that is not in the list. It uses a `Let` statement
    and the `ValueListItems` function to pull a list of all the items in a value list
    named “Company – Industry” into a variable named `itemsAllowed`. Then, the `FilterValues`
    function removes every item entered that isn’t found in the list of items allowed.
    This formula could be expanded with a `While` statement to loop and reject one
    or more entries in a field containing multiple values, as one might with the checkbox
    control set.


    ```

    Let (

    itemsAllowed = ValueListItems ( Get ( FileName ) ; "Company - Industry" )

    ;

    FilterValues ( itemsAllowed ; Self )

    )

    ```


    ##### Using a Script Trigger


    Finally, the `OnObjectValidate` script trigger (Chapter [27](#429700_2_En_27_Chapter.xhtml))
    can be used to run a script that validates the user’s entry and takes corrective
    action, automatically cleaning up and/or informing the user about their error.
    It can even abort the validation process and force them to correct it before continuing.
    This is a good option for a layout-specific intervention that can auto-correct
    with a custom notification or inform and require a user change.


    #### Halting Entry of Multiple Values


    A checkbox set is the only value list–driven control style that intuitively allows
    the selection of multiple items from a value list. Other control styles always
    replace the existing value when a new value is selected and *appears* to restrict
    entry to a single selection. However, it is possible to select more than one item
    from pop-up menus, drop-down menus, and even radio buttons, using any of the following
    methods:


    *   Hold the Shift key while clicking on additional options.

    *   Use the `Paste` command to enter a return-delimited list.

    *   Drag a return-delimited list from another field or application.

    *   When the `Allow entry of other values` option is enabled on the field, a user
    can manually enter multiple values.

    *   Use a script step such as `Set Field`, `Insert Text`, `Replace Field Contents`,
    `Import Records`, and more.


    ##### Restricting Multiple Value Bypass


    To forbid multiple values being entered in a field, use an auto-enter calculation
    or script trigger to bypass user entries.


    ###### Using Auto-Enter to Limit Field to a Single Value


    An auto-enter calculation can automatically remove all values entered except for
    one. In the following example, only the last value entered will be retained. The
    first example in the following uses the `GetValue` and `ValueCount` function to
    also restrict the entry to the last value entered. The second example will always
    return the first value entered. All other values would disappear when this formula
    executes.


    ```

    GetValue ( Self ; ValueCount ( Self ) )

    GetValue ( Self ; 1 )

    ```


    ###### Using a Script Trigger to Limit Field to a Single Value


    Use an `OnObjectValidate` Script Trigger that runs a script to detect the presence
    of multiple values and either automatically removes excess values or warns the
    user and halts the validation process until they correct the problem.


    ### Using Field Placeholders


    A *field placeholder* is a text value that will be displayed in the field when
    empty. This can be used in lieu of a field label or to provide users a short instructional
    call to action. Since the placeholder is applied to the field as a *layout object*
    and not to the *field definition*, each instance on a new layout must be configured
    separately. To avoid confusion, the placeholder value has its own *part style
    state* (Chapter [22](#429700_2_En_22_Chapter.xhtml)) which allows formatting to
    change so users can distinguish a placeholder from actual field content. The example
    in Figure [20-22](#429700_2_En_20_Chapter.xhtml#Fig22) shows three instances of
    the same `Company Name` field. The first shows the default state of a new field
    added to a layout without a placeholder. The second shows an example of a placeholder
    used instead of a label, displaying the field name. While this technique saves
    space, once actual data is entered into the field, the placeholder text vanishes,
    and no label will be shown. That may be confusing in cases where the content isn’t
    easily identifiable. The third example shows the field with a permanent label
    and a descriptive prompt as a placeholder.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig22_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig22_HTML.jpg)


    Figure 20-22


    An example without placeholder (top), with field name as placeholder (middle),
    and with a placeholder prompt (bottom)


    Note


    A field formatted as checkbox or radio button can’t have a placeholder text value.


    #### Entering Placeholder Text


    To define a placeholder, select a field and open the `Field` group on the `Data`
    tab of the `Inspector` pane. A static value can be typed directly into the `Placeholder
    text` box, shown in Figure [20-23](#429700_2_En_20_Chapter.xhtml#Fig23).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig23_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig23_HTML.jpg)


    Figure 20-23


    The controls for defining a field’s placeholder text


    Alternatively, click the pencil icon to enter a formula that generates the placeholder
    value. The placeholder text will be displayed when the window is in Browse mode.
    Enable the `Show placeholder in Find mode` checkbox to also show it in Find mode.
    When enabled in Find mode, a formula can vary the value displayed based on a `Case`
    formula that checks the `WindowMode`, as shown in this example:


    ```

    Case (

    Get ( WindowMode ) = 0 ; "Enter a Company name" ;

    "Search for a Company name"

    )

    ```'
  raw: '#### Halting Entry of Custom Values


    The entry of values not present on a field’s assigned value list can be done several
    ways. For example, when the field has focus, text in the clipboard can be pasted
    into the field. Also, any of the text-entering functions from the *Insert* menu
    can be used to insert predefined values. Users can drag a text selection from
    another field or even another application and drop it into the field. Importing
    records can bypass the interface as can many script steps. There are several ways
    to tighten up data entry, making it impossible to bypass the assigned value list.


    ##### Using Field Validation


    One method to stop users from bypassing the assigned value list is to use validation
    at the field definition level (Chapter [8](#429700_2_En_8_Chapter.xhtml)). This
    will apply to every use of the field on any layout (*including* those where a
    value list control style is not used) and will warn the user about the error.
    This is a good option for situations where universal coverage is desired.


    ##### Filtering Bad Values with a Calculation


    Alternatively, an auto-enter calculation at the field definition level can automatically
    preprocesses data input to confirm that any entries made are appropriate and filter
    out those that are not. This provides greater flexibility since a custom formula
    can dynamically change behavior based on various conditions, e.g., make the field
    operate differently on different layouts or depending on various factors. Since
    the technique removes the erroneous entry silently without an error dialog, it
    is great for a nondisruptive correction and won’t slow down a user’s data entry.
    However, in some cases, it can be confusing, appearing like a bug to an inexperienced
    user who would have no idea what error they committed or that their entry was
    modified.


    The following formula assumes a single value being entered and will automatically
    filter out any value entered that is not in the list. It uses a *Let* statement
    and the *ValueListItems* function to pull a list of all the items in a value list
    named “Company – Industry” into a variable named *itemsAllowed*. Then, the *FilterValues*
    function removes every item entered that isn’t found in the list of items allowed.
    This formula could be expanded with a *While* statement to loop and reject one
    or more entries in a field containing multiple values, as one might with the checkbox
    control set.


    ```

    Let (

    itemsAllowed = ValueListItems ( Get ( FileName ) ; "Company - Industry" )

    ;

    FilterValues ( itemsAllowed ; Self )

    )

    ```


    ##### Using a Script Trigger


    Finally, the *OnObjectValidate* script trigger (Chapter [27](#429700_2_En_27_Chapter.xhtml))
    can be used to run a script that validates the user’s entry and takes corrective
    action, automatically cleaning up and/or informing the user about their error.
    It can even abort the validation process and force them to correct it before continuing.
    This is a good option for a layout-specific intervention that can auto-correct
    with a custom notification or inform and require a user change.


    #### Halting Entry of Multiple Values


    A checkbox set is the only value list–driven control style that intuitively allows
    the selection of multiple items from a value list. Other control styles always
    replace the existing value when a new value is selected and *appears* to restrict
    entry to a single selection. However, it is possible to select more than one item
    from pop-up menus, drop-down menus, and even radio buttons, using any of the following
    methods:


    *   Hold the Shift key while clicking on additional options.


    *   Use the *Paste* command to enter a return-delimited list.


    *   Drag a return-delimited list from another field or application.


    *   When the *Allow entry of other values* option is enabled on the field, a user
    can manually enter multiple values.


    *   Use a script step such as *Set Field*, *Insert Text*, *Replace Field Contents*,
    *Import Records*`,` and more.


    ##### Restricting Multiple Value Bypass


    To forbid multiple values being entered in a field, use an auto-enter calculation
    or script trigger to bypass user entries.


    ###### Using Auto-Enter to Limit Field to a Single Value


    An auto-enter calculation can automatically remove all values entered except for
    one. In the following example, only the last value entered will be retained. The
    first example in the following uses the *GetValue* and *ValueCount* function to
    also restrict the entry to the last value entered. The second example will always
    return the first value entered. All other values would disappear when this formula
    executes.


    ```

    GetValue ( Self ; ValueCount ( Self ) )

    GetValue ( Self ; 1 )

    ```


    ###### Using a Script Trigger to Limit Field to a Single Value


    Use an *OnObjectValidate* Script Trigger that runs a script to detect the presence
    of multiple values and either automatically removes excess values or warns the
    user and halts the validation process until they correct the problem.


    ### Using Field Placeholders


    A *field placeholder* is a text value that will be displayed in the field when
    empty. This can be used in lieu of a field label or to provide users a short instructional
    call to action. Since the placeholder is applied to the field as a *layout object*
    and not to the *field definition*, each instance on a new layout must be configured
    separately. To avoid confusion, the placeholder value has its own *part style
    state* (Chapter [22](#429700_2_En_22_Chapter.xhtml)) which allows formatting to
    change so users can distinguish a placeholder from actual field content. The example
    in Figure [20-22](#429700_2_En_20_Chapter.xhtml#Fig22) shows three instances of
    the same *Company Name* field. The first shows the default state of a new field
    added to a layout without a placeholder. The second shows an example of a placeholder
    used instead of a label, displaying the field name. While this technique saves
    space, once actual data is entered into the field, the placeholder text vanishes,
    and no label will be shown. That may be confusing in cases where the content isn’t
    easily identifiable. The third example shows the field with a permanent label
    and a descriptive prompt as a placeholder.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig22_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig22_HTML.jpg)


    Figure 20-22


    An example without placeholder (top), with field name as placeholder (middle),
    and with a placeholder prompt (bottom)


    Note


    A field formatted as checkbox or radio button can’t have a placeholder text value.


    #### Entering Placeholder Text


    To define a placeholder, select a field and open the *Field* group on the *Data*
    tab of the *Inspector* pane. A static value can be typed directly into the *Placeholder
    text* box, shown in Figure [20-23](#429700_2_En_20_Chapter.xhtml#Fig23).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig23_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig23_HTML.jpg)


    Figure 20-23


    The controls for defining a field’s placeholder text


    Alternatively, click the pencil icon to enter a formula that generates the placeholder
    value. The placeholder text will be displayed when the window is in Browse mode.
    Enable the *Show placeholder in Find mode* checkbox to also show it in Find mode.
    When enabled in Find mode, a formula can vary the value displayed based on a *Case*
    formula that checks the *WindowMode*, as shown in this example:


    ```

    Case (

    Get ( WindowMode ) = 0 ; "Enter a Company name" ;

    "Search for a Company name"

    )

    ```'
  trans: '

    #### 阻止输入自定义值


    有几种方法可以输入字段指定值列表中不存在的值。例如，当字段获得焦点时，可以粘贴剪贴板中的文本。此外，*插入*菜单中的任何文本输入功能都可以用来插入预定义值。用户可以从另一个字段甚至另一个应用程序中拖动一段文本并将其放入该字段。导入记录以及许多脚本步骤都可以绕过该界面。有几种方法可以加强数据输入，使其无法绕过指定的值列表。


    ##### 使用字段验证


    阻止用户绕过指定值列表的一种方法是在字段定义级别使用验证（第 8 章）。这将适用于任何布局上该字段的每次使用（*包括*未使用值列表控件样式的布局），并会向用户发出错误警告。对于需要全面覆盖的情况，这是一个不错的选择。


    ##### 使用计算过滤错误值


    或者，在字段定义级别使用自动输入计算可以自动预处理数据输入，以确认任何输入都是合适的，并过滤掉不合适的输入。这提供了更大的灵活性，因为自定义公式可以根据各种条件动态改变行为，例如，使字段在不同的布局上或根据不同的因素以不同的方式运行。由于该技术会在没有错误对话框的情况下静默地删除错误输入，因此非常适合进行无中断的修正，并且不会减慢用户的数据输入速度。然而，在某些情况下，它可能会让人困惑，对于没有经验的用户来说，这看起来像一个错误，他们不知道犯了什么错误，也不知道他们的输入已被修改。


    以下公式假设输入的是单个值，并将自动过滤掉任何不在列表中的输入值。它使用 `Let` 语句和 `ValueListItems` 函数，将名为“公司 - 行业”的值列表中的所有项目拉取到一个名为
    `itemsAllowed` 的变量中。然后，`FilterValues` 函数会删除所有不在允许列表中的输入项。这个公式可以通过 `While` 语句进行扩展，以循环处理并拒绝包含多个值的字段中的一个或多个条目，就像使用复选框控件集时一样。


    ```

    Let (

    itemsAllowed = ValueListItems ( Get ( FileName ) ; "Company - Industry" )

    ;

    FilterValues ( itemsAllowed ; Self )

    )

    ```


    ##### 使用脚本触发器


    最后，可以使用 `OnObjectValidate` 脚本触发器（第 27 章）来运行一个脚本，验证用户的输入并采取纠正措施，自动清理和/或通知用户其错误。它甚至可以中止验证过程，强制用户在继续之前纠正错误。对于需要特定布局的干预，这是一个不错的选择，可以通过自定义通知自动纠正，或者通知并强制用户更改。


    #### 阻止输入多个值


    复选框集是唯一一种直观地允许从值列表中选择多个项目的值列表驱动控件样式。其他控件样式在选择新值时总是替换现有值，并且*看起来*限制为只能单选。然而，可以使用以下任何方法从弹出菜单、下拉菜单甚至单选按钮中选择多个项目：


    *   点击其他选项时按住 Shift 键。

    *   使用 `粘贴` 命令输入一个以回车符分隔的列表。

    *   从另一个字段或应用程序拖拽一个以回车符分隔的列表。

    *   当字段启用了“允许输入其他值”选项时，用户可以手动输入多个值。

    *   使用诸如 `设置字段`、`插入文本`、`替换字段内容`、`导入记录` 等脚本步骤。


    ##### 限制绕过机制输入多值


    要禁止在字段中输入多个值，请使用自动输入计算或脚本触发器来阻止用户输入。


    ###### 使用自动输入将字段限制为单个值


    自动输入计算可以自动删除除一个值之外的所有输入值。在下面的示例中，只会保留最后输入的值。下面的第一个示例使用 `GetValue` 和 `ValueCount`
    函数将输入限制为最后输入的值。第二个示例将始终返回第一个输入的值。当此公式执行时，所有其他值都将消失。


    ```

    GetValue ( Self ; ValueCount ( Self ) )

    GetValue ( Self ; 1 )

    ```


    ###### 使用脚本触发器将字段限制为单个值


    使用 `OnObjectValidate` 脚本触发器，该触发器运行一个脚本来检测是否存在多个值，然后自动删除多余的值，或者警告用户并中止验证过程，直到他们纠正问题。


    ### 使用字段占位符


    *字段占位符*是一种文本值，当字段为空时会显示在其中。这可以用来代替字段标签，或者为用户提供一个简短的操作提示。由于占位符是作为*布局对象*应用于字段，而不是*字段定义*，因此在新布局上的每个实例都必须单独配置。为避免混淆，占位符值有其自己的*部件样式状态*（第
    22 章），允许更改格式，以便用户区分占位符和实际的字段内容。图 20-22 中的示例显示了同一个 `公司名称` 字段的三个实例。第一个显示的是新字段添加到布局且没有占位符时的默认状态。第二个显示了一个使用占位符代替标签的示例，显示的是字段名称。虽然这种技术节省空间，但一旦向字段中输入了实际数据，占位符文本就会消失，并且不会显示标签。当内容不易识别时，这可能会令人困惑。第三个示例显示了一个带有永久标签和描述性提示作为占位符的字段。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig22_HTML.jpg](img/429700_2_En_20_Fig22_HTML.jpg)


    图 20-22


    无占位符的示例（上）、以字段名作为占位符的示例（中）和以占位符提示的示例（下）


    注意


    格式化为复选框或单选按钮的字段不能有占位符文本值。


    #### 输入占位符文本


    要定义占位符，请选择一个字段，然后打开“检查器”面板中“数据”选项卡上的 `字段` 组。可以直接在 `占位符文本` 框中输入静态值，如图 20-23 所示。


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig23_HTML.jpg](img/429700_2_En_20_Fig23_HTML.jpg)


    图 20-23


    用于定义字段占位符文本的控件


    或者，点击铅笔图标输入生成占位符值的公式。当窗口处于浏览模式时，将显示占位符文本。启用 `在查找模式下显示占位符` 复选框，使其在查找模式下也显示。当在查找模式下启用时，公式可以根据检查
    `WindowMode` 的 `Case` 公式来改变显示的值，如下例所示：


    ```

    Case (

    Get ( WindowMode ) = 0 ; "输入公司名称" ;

    "搜索公司名称"

    )

    ```

