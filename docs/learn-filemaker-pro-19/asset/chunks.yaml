  trans: '

    ### Web 查看器的上下文菜单


    `Web 查看器` 有两种上下文菜单，其内容因窗口模式而异：


    - **浏览模式** – 提供刷新内容的选项

    - **布局模式** – 提供剪切-复制-粘贴、设置样式、配置为按钮、配置查看器设置、定义条件格式、配置脚本触发器以及设置各种格式选项的功能


    ### 窗口组件的上下文菜单


    以下三种上下文菜单出现在各种窗口组件上：


    - **布局部分**（布局模式）– 打开**部分定义**对话框，并选择部分的样式或填充颜色

    - **标尺** – 选择磅、英寸或厘米作为度量单位

    - **工具栏** – 打开工具栏自定义对话框


    ### 计算公式的上下文菜单


    **指定计算**对话框（第 12 章）的每个实例都有一个上下文菜单，其中包含文本操作功能，这些功能会根据是否选择文本而略有不同。


    ## 总结


    本章介绍了 **FileMaker Pro** 桌面应用程序的基础知识，涵盖了默认窗口、偏好设置和各种菜单等主题。接下来，我们将开始探索数据库窗口。


    # 3. 探索数据库窗口


    **数据库窗口** 是打开数据库文件的一个视图。作为一个全栈开发环境，FileMaker 的窗口具有不同的窗口模式，用于数据输入和开发。本章从**用户视角**开始探索数据库窗口，涵盖以下主题：


    - 识别窗口区域和模式

    - 探索窗口标题栏

    - 管理多个窗口


    由于我们直到第 6 章才会讨论创建数据库文件，为了跟随对窗口界面的探索，请花点时间从 Apress 网站 ([*https://www.apress.com/9781484266793*](https://www.apress.com/9781484266793))
    下载 Learn FileMaker 示例文件，并打开**第** **3** **-** **5** **章**文件夹。此示例包含一个简单的**联系人**表，该表有两个布局和一个简单的自定义主题，用于为本书呈现美观的示例图片。


    ## 识别窗口区域和模式


    如图 3-1 所示的数据库窗口分为两个主要区域：**工具栏** 和 **内容区域**。**工具栏**（本章稍后讨论）是标题区域，包含两行控件，这些控件在所有数据库中都保持一致，但提供一些自定义选项。**内容区域**
    包括工具栏下方的区域，用于显示由开发者设计的自定义用户界面。在此示例中，窗口预配置了一些简单的界面元素。创建新的空白文件时（第 6 章），此区域将完全空白，需要设计布局（第
    17–22 章），布局在图形上可以更加复杂。此区域一次显示一个布局，但可以在文件中创建的任意数量的布局之间切换。内容的呈现方式取决于所选的**窗口模式**
    和 **内容视图**。


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig1_HTML.jpg](img/429700_2_En_3_Fig1_HTML.jpg)


    **图 3-1** 两个窗口区域：工具栏（顶部）和内容区域（底部）


    ### 定义窗口模式


    **窗口模式** 是一种显示状态，它会针对特定功能目的优化窗口界面。FileMaker 有四种模式，将在几个不同的章节中描述：**浏览**、**查找**、**预览**
    和 **布局**。


    **浏览模式** 是默认的窗口状态，用于与数据库内容进行交互并执行数据输入相关的任务。在浏览模式下，窗口的内容区域会呈现来自布局表的一组记录。根据布局的设计和帐户权限，用户可以与此数据交互，以创建、查看、编辑、删除、复制、搜索、排序和忽略记录，并与其它对象进行交互。


    **查找模式** 是一种用于输入搜索条件的窗口状态。在查找模式下，布局会转换为一个空白的类似于记录的**请求**，用户在其中输入条件，以在执行搜索前定义所需的一组记录。


    **预览模式** 是一种类似于打印预览的窗口状态，显示当前布局和找到的记录集在打印页面上的外观。布局看起来与浏览模式相似，但处于非功能状态。因此，字段不可编辑，未隐藏的按钮显示为不可点击的图形。此外，对象可能会根据其在布局上的定义方式而隐藏、滑动、压缩、汇总和更改格式。


    **布局模式** 是一种用于创建界面布局的窗口状态。使用特殊的设计工具向布局添加和配置对象。


    每种模式都有独特的工具栏、菜单栏和内容区域呈现方法。根据其访问权限（第 30 章），用户可以通过单击状态工具栏中的模式按钮、从**视图**菜单中选择模式或运行更改模式的脚本，来更改窗口的模式。本章和第
    4 章将讨论如何使用浏览模式，以及如何使用查找和预览模式。在第 17–22 章中，我们将探讨如何在布局模式下设计自定义界面元素。


    ### 定义内容视图


    **内容视图** 是一种界面设置，决定在浏览模式下，记录如何显示在窗口的内容区域中。根据布局设置（第 18 章“视图”）强制的限制，用户可以选择以最多三种格式查看记录：**表单**、**列表**
    或 **表格**。可以通过从**视图**菜单中选择菜单项、单击工具栏中的**视图方式**图标或运行更改视图的脚本，来更改布局的当前视图。


    在**表单视图**中，窗口一次只显示一条记录，该记录通过一组完整的布局元素呈现。要查看此视图中的其他记录，请使用工具栏中的导航控件或设计用于转到其他记录的自定义界面元素。这类似于查看从文件柜中取出的一张纸或一本书中的单页。


    在**列表视图**中，窗口会显示一个连续的记录列表，通过将布局元素为每条记录重复一次来呈现。在此视图中，用户可以上下滚动以查看其他记录。这类似于查看文件柜中文件夹上的标签序列或书的目录。


    在**表格视图**中，窗口以列和行的电子表格式格式显示一组记录，同时排除布局上存在的其他图形元素。用户可以通过拖动列标题来重新排列和调整列的大小。他们可以通过单击标题对记录进行排序。可以以类似于电子表格的方式直观地创建新字段（列）和新记录（行）。每个字段标题中都隐藏着一个弹出式操作菜单，提供对各种功能的快速访问，包括排序、汇总、字段控制和视图控制。表格视图在设计和自定义功能方面并不突出，但它为那些习惯于使用电子表格的用户提供了更熟悉的环境，并且可能适用于不需要复杂界面的简单数据库。


    ## 探索窗口标题栏


    根据用户的访问权限、偏好设置以及开发者建立的设置，窗口的工具栏区域可以显示或隐藏三个水平栏。它们是：**状态工具栏**、**格式栏** 和 **标尺**。

    '
- fmt: '### Status Toolbar (Browse Mode)


    The `Status Toolbar` is the most prominent area running along the top of the window
    containing controls pertinent to the current window mode. It is the only part
    of the window header that is visible by default. Unless hidden and locked by a
    script, users can toggle the visibility of the toolbar by selecting `View ➤ Status`
    from the menu.


    #### Default Toolbar Items (Browse Mode)


    The default toolbar configuration for Browse mode is shown in Figure [3-2](#429700_2_En_3_Chapter.xhtml#Fig2).
    The top portions are customizable (discussed later in this section), and the bottom
    are static.


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig2_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The anatomy of the default Browse mode toolbar configuration


    ##### Record Navigation Controls


    The `record navigation controls` in the toolbar, shown in Figure [3-3](#429700_2_En_3_Chapter.xhtml#Fig3),
    display information about the records being viewed and allow a user to move around
    within the found set of records (Chapter [4](#429700_2_En_4_Chapter.xhtml)).


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig3_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The default Browse mode navigation controls


    The toolbar’s navigation controls are


    1. `Record Navigation Arrows` – Click to move to the previous or next record.


    2. `Record Number & Slider` – The number of the current record. Move the slider
    or type a record number to jump to another record.


    3. `Found Set Status` – Shows the total record count, the found set count (if
    a subset of the total), and the sort status. When viewing a subset, click the
    circle icon to toggle between found and omitted records.


    ##### Function Buttons


    The `function buttons` in the toolbar, shown in Figure [3-4](#429700_2_En_3_Chapter.xhtml#Fig4),
    allow a user to perform various record functions (Chapter [4](#429700_2_En_4_Chapter.xhtml))
    and access a menu of sharing functions (Chapter [29](#429700_2_En_29_Chapter.xhtml)).


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig4_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    The default toolbar buttons in Browse mode


    ##### Quick Find Search Field


    At the top right of the toolbar is a search field used to perform a `Quick Find`
    (Chapter [4](#429700_2_En_4_Chapter.xhtml), “Searching with Quick Find”).


    ##### Layout Menu


    The lower, non-customizable level of the toolbar starts with the `Layout` menu.
    In Browse mode, this displays a list of visible layouts (Chapter [18](#429700_2_En_18_Chapter.xhtml))
    for manually navigating to another layout, the same as the `View ➤ Go To Layout`
    menu.


    ##### Content View Buttons


    Next in the lower bar are three `content view buttons` used to change the content
    as formatted in the window view as described earlier in this chapter. The view
    buttons enabled here are controlled by the current layout’s view settings (Chapter
    [18](#429700_2_En_18_Chapter.xhtml)).


    ##### Preview Button


    The toolbar’s `Preview button` changes the window into Preview mode (Chapter [4](#429700_2_En_4_Chapter.xhtml)).


    ##### Formatting Bar Button


    The `Formatting Bar button` toggles the visibility of a text-editing control bar
    between the status toolbar and the content area of the window (described later
    in this chapter).


    ##### Edit Layout Button


    The `Edit Layout button` changes the window to Layout mode (Chapter [17](#429700_2_En_17_Chapter.xhtml)).


    #### Customizing the Toolbar (Browse Mode)


    The controls in the top portion of the toolbar are customizable at the user-computer
    level. This means that a user can customize the inclusion and arrangement of controls
    in the toolbar, which affect all databases they open on their computer. With a
    database open, select the `View ➤ Customize Status Toolbar` menu to open a customization
    panel. On macOS, this is a graphical panel attached to the window as shown in
    Figure [3-5](#429700_2_En_3_Chapter.xhtml#Fig5). On the lower left of this dialog
    is a `Show` menu that controls the button format in the toolbar. The choices are
    as follows: `Icon only`, `Text only`, or the default, `Icon and text`. On Windows,
    a less attractive list-based dialog appears with similar drag and drop options.


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig5_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The toolbar customization panel for Browse mode (macOS)


    ##### Adding, Removing, and Rearranging Toolbar Items


    To add an item to the toolbar, drag an icon from the customization panel up into
    the toolbar area and drop it. FileMaker will avoid duplication by automatically
    replacing an object already present in the toolbar when that same control is dropped
    elsewhere. To remove an item, drag it until it clears the toolbar area and release
    the mouse button. Items can be rearranged by dragging them around within the toolbar.


    ##### Restoring the Default Toolbar Set


    To restore the default control set, drag the group in the rectangle at the bottom
    of the panel and drop it in the toolbar.


    ### Formatting Bar


    The `Formatting bar` is an optional set of text-formatting controls, shown in
    Figure [3-6](#429700_2_En_3_Chapter.xhtml#Fig6). The bar appears between the bottom
    of the default status toolbar and the top of the content area when the `View ➤
    Formatting Bar` menu is selected or the button on the lower right of the toolbar
    is clicked. These controls for `font`, `style`, `size`, `color`, `highlight`,
    `emphasis`, and `text alignment` become enabled when the user clicks into a text
    field.


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig6_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    The formatting bar and toggle button


    ### Horizontal Ruler


    A `horizontal ruler` can be activated and appears below the other header bars,
    as shown in Figure [3-7](#429700_2_En_3_Chapter.xhtml#Fig7). The `View ➤ Ruler`
    menu toggles the visibility of this ruler. The `measurement unit` of the ruler
    can be changed using its contextual menu, with a choice of `centimeters`, `inches`,
    and `points`. The Browse mode ruler isn’t useful until focus is inside a text
    field and it shrinks to the size of the field and shows tabs and margins. These
    settings can also be modified with layout tools (Chapter [19](#429700_2_En_19_Chapter.xhtml),
    “Exploring the Inspector Pane”).


    ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig7_HTML.jpg](images/429700_2_En_3_Chapter/429700_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    A ruler visible (top) and when a field has focus (bottom)


    ## Using Multiple Windows


    When a database is opened, a window automatically appears and displays a default
    layout. Users can navigate to other layouts within that window, or they can open
    additional windows to access multiple simultaneous views into the same file. They
    can view any combination of layouts and found sets of records. For example, a
    `Contact` record can be viewed in one window, a `Contact` list in another, and
    a `Company` list in a third. Opening a new window allows the preservation of a
    position in a found set in one window while performing work on other records in
    the same or different tables. Users and scripts can open and close windows as
    needed to complete a task more efficiently. Scripts can create new windows off-screen
    to perform work without disrupting the current view (Chapter [25](#429700_2_En_25_Chapter.xhtml)).'
