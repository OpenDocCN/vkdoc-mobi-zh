  trans: "\n### 存储对外部文件的引用\n\n*容器字段文件引用*是一个文本字符串，用于存储外部文件的位置、类型以及其他因类型而异的信息。例如，*容器图像引用*包含原始图像的尺寸、相对于数据库的文件路径以及图像的绝对路径。以下示例展示了对用户桌面上一个图像文件的引用：\n\
    \n```\nsize:731,960\nimage:../../../../../../../../../Desktop/Flower Picture.jpg\n\
    imagemac:/Macintosh HD/Users/john_smith/Desktop/Flower Picture.jpg\n```\n\n在容器字段中存储引用可以保持数据库的简洁高效。虽然插入过程仅在字段中存储了一个引用，但根据字段的设置，该外部文件仍会像存储在内部一样在界面中渲染。从用户的角度来看，当字段在布局上显示其内容时，没有任何区别。\n\
    \n使用外部文件有两种方法：*自定义管理*和*数据库管理*。\n\n## 使用托管式外部存储\n\n要使用*数据库管理*的*外部存储*，您必须定义基础目录并配置容器字段以使用它们。\n\
    \n### 定义基础目录\n\n*基础目录*是开发者定义的一个文件夹目录路径，它作为根位置，一个或多个容器字段可以在此存储文档。`FileMaker` 会完全管理所定义的文件夹，它会自动创建该文件夹，然后根据为基础目录和各个字段定义的设置，管理子文件夹和文件的内部目录结构。每个数据库文件都包含一个默认目录，自动以数据库名称命名，并带有\
    \ `[database location]` 的公式前缀，这意味着外部容器目录将存储在与数据库文件相同的文件夹中。\n\n**注意**  \n如果数据库文件被重命名，默认基础目录不会改变，但可以为了保持一致性而手动更新。\n\
    \n#### 探索“管理容器”对话框\n\n外部容器是在“管理容器”对话框中定义的，该对话框可以通过选择 `File ➤ Manage ➤ Containers`\
    \ 菜单打开。此对话框有两个选项卡：`Storage` 和 `Thumbnails`。\n\n##### 探索“存储”选项卡\n\n“管理容器”对话框的 `Storage`\
    \ 选项卡（如图 10-3 所示）包含一个已定义基础目录的列表。在这里您可以*创建*、*编辑*和*删除*基础目录。您可以使用 `Transfer Data`\
    \ 按钮启动文档传输，当字段分配的基础目录发生更改并且在旧位置检测到文档时，该按钮会高亮显示（参见本章后面的“更改字段容器设置”）。\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig3_HTML.jpg](img/429700_2_En_10_Fig3_HTML.jpg)\
    \  \n*图 10-3*  \n用于托管容器的基础目录列表\n\n**警告**  \n当数据库托管在 `FileMaker Server` 上时，基础目录无法编辑。请将文件脱机，并使用\
    \ `FileMaker Pro` 桌面应用程序打开以进行编辑。\n\n###### 创建新基础目录\n\n给定数据库文件中基础目录的数量完全由开发者决定。默认目录可以被文件中所有表中的所有容器字段共享。或者，每个表甚至每个字段都可以分配一个单独的目录。要创建新的基础目录，请单击\
    \ `New` 按钮。这将打开一个 `New Base Directory` 对话框（如图 10-4 所示）。此窗口包含一个文本区域，您可以在其中键入目录路径，或者拖入一个文件夹以自动插入其路径。路径的格式必须如示例所示。\n\
    \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig4_HTML.jpg](img/429700_2_En_10_Fig4_HTML.jpg)\
    \  \n*图 10-4*  \n用于指定基础目录路径的对话框\n\n###### 编辑基础目录\n\n只要目录中尚未包含任何托管文件，就可以编辑目录路径。如果目录为空，请在“管理容器”对话框中双击或单击\
    \ `Edit` 按钮，以在 `Edit Base Directory` 对话框（与图 10-4 所示的 `New Base Directory` 对话框相同）中打开所选基础目录。如果目录已包含文件，请创建一个新的基础目录，将使用旧目录的所有字段指向新目录，传输现有的容器文档，然后删除旧目录。\n\
    \n###### 删除基础目录\n\n当不再使用某个基础目录时，只要它不包含任何托管文件，就可以将其删除。在列表中选择它，然后单击 `Delete` 按钮。`FileMaker`\
    \ 要求文件中至少定义一个基础目录，因此如果列表中只有一个目录，删除请求将被拒绝。\n\n**注意**  \n`FileMaker` 会从列表中删除基础目录的定义，而不会删除实际的外部文件夹。\n\
    \n##### 探索“缩略图”选项卡\n\n“管理容器”对话框的 `Thumbnails` 选项卡（如图 10-5 所示）控制自动缩略图生成，这可以加快容器的界面渲染速度，尤其是在通过网络传输时。要激活缩略图，请选中\
    \ `Generate and store thumbnails for images` 复选框，以允许 `FileMaker` 在布局尝试显示图像时自动生成并显示缩略图。然后在两种存储选项中选择。*永久存储*选项将使缩略图缓存在磁盘和内存中，并在数据库关闭时保留磁盘上的缓存部分。使用此选项可获得最佳性能。*临时存储*选项将使缩略图仅缓存在内存中。当数据库关闭时，缓存会被丢弃。这样会稍微慢一些，但可以节省硬盘空间。\n\
    \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig5_HTML.jpg](img/429700_2_En_10_Fig5_HTML.jpg)\
    \  \n*图 10-5*  \n用于指定缩略图生成的对话框\n"
- fmt: "### Defining a Field’s External Storage Directory\n\nOnce a base directory\
    \ is defined, it can be assigned to container fields. The external storage settings\
    \ for a container field are configured on the *Storage* tab of the *Options for\
    \ Field* dialog, shown in Figure [10-6](#429700_2_En_10_Chapter.xhtml#Fig6). Open\
    \ the *Manage Database* dialog, click on the *Fields* tab, and double-click on\
    \ a container field. Then select on the *Storage* tab.\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig6_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6  \nThe container field storage options\n\nEnable the *Store container\
    \ data externally* checkbox and choose a base directory from the pop-up menu.\
    \ Once a directory is selected, choose a storage methodology. The *secure storage*\
    \ option will encrypt documents and automatically distribute the files randomly\
    \ across automatically created subdirectories in a subdirectory within the base\
    \ directory. This option automatically avoids conflicts between files with the\
    \ same name stored in any field that is using the same base directory. The *open\
    \ storage* option keeps document data in the original file format and uses a developer\
    \ specified subdirectory which is required to avoid conflicts between similarly\
    \ named items stored for different tables and fields. If using the same base directory\
    \ for many fields across different tables in the database, use a formula to generate\
    \ a subdirectory that includes the appropriate subfolders to avoid overwrite conflicts\
    \ between records. Click the *Specify* button to enter a subdirectory formula\
    \ like the following example which creates a hierarchy of folders for *table*,\
    \ *field*, and *serial number* to ensure one container item per folder:\n\n```\n\
    \"Sandbox/Example Container/\" & Record ID & \"/\"\n```\n\n**Caution:** `FileMaker\
    \ Cloud Server` requires all containers to use secure storage.\n\n#### Changing\
    \ a Field Container Settings\n\n`FileMaker` automatically recognizes when a change\
    \ is made to a container field’s configuration. This includes changing between\
    \ unmanaged internal or managed external storage, changing the field’s base directory\
    \ or subdirectory, or switching between secure or open storage. When a modified\
    \ field definition is saved, a *Container Data Transfer* dialog will list any\
    \ container fields modified during the session, as shown in Figure [10-7](#429700_2_En_10_Chapter.xhtml#Fig7).\
    \ To immediately transfer the external files to their new base directory, make\
    \ sure the field has a check in the box and click *Transfer*. If you click *Close*\
    \ instead, the unperformed transfer will be retained and can be performed later\
    \ using the *Manage Containers* dialog’s *Transfer Data* button.\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig7_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7  \nThe dialog indicating the need to transfer container field content\n\
    \n## Summary\n\nThis chapter explored inserting and extracting files from container\
    \ fields as well as various methods of managing containers. In the next chapter,\
    \ we explore how to define value lists.\n\n# 11. Defining Value Lists\n\nA *value\
    \ list* is a return-delimited sequence of values. Lists can be created by formulas\
    \ (Chapter [13](#429700_2_En_13_Chapter.xhtml), “Aggregating Data”) or by defining\
    \ one as a centralized resource. A predefined list can be a set of static values\
    \ or values dynamically compiled from the contents of a field gathered directly\
    \ from a table or through a relationship. Once defined, these lists can be assigned\
    \ to a field to enable selection-based data entry by means of *drop-down lists*,\
    \ *pop-up menus*, *checkboxes*, and *radio buttons* (Chapter [20](#429700_2_En_20_Chapter.xhtml),\
    \ “Configuring a Field’s Control Style”). Using value lists as the control style\
    \ for a field increases data entry speed and ensures accuracy and consistency.\
    \ This chapter covers the following topics regarding defining value lists, including:\n\
    \n*   Introducing the Value Lists dialog\n*   Using custom values\n*   Using a\
    \ list from another file\n*   Using values from a field\n\n## Introducing the\
    \ Value Lists Dialogs\n\nPredefined lists are configured using the *Manage Value\
    \ Lists* dialog, shown in Figure [11-1](#429700_2_En_11_Chapter.xhtml#Fig1). This\
    \ dialog can be opened by selecting the *File ➤ Manage ➤ Value Lists* menu, clicking\
    \ the pencil icon in the *Inspector pane* for fields assigned a list-based control\
    \ style (Chapters [19](#429700_2_En_19_Chapter.xhtml) and [20](#429700_2_En_20_Chapter.xhtml))\
    \ or with the *Open Manage Value Lists* script step. This dialog is used to *create*,\
    \ *edit*, *duplicate*, and *delete* lists.\n\n![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig1_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1  \nThe dialog used to manage value lists\n\n**Tip:** Value lists\
    \ can be copied and pasted between two files.\n\nList settings are defined in\
    \ the *Edit Value List* dialog. This dialog opens when creating a new list or\
    \ editing an existing list in the dialog in Figure [11-1](#429700_2_En_11_Chapter.xhtml#Fig1).\
    \ After entering a name for the list, there are three options for how values are\
    \ generated:\n\n*   *Use Values from Field* – Generate a list from field values,\
    \ defined in a *Specify Field* dialog\n*   *Use Value List from Another File*\
    \ – Select a value list from a different `FileMaker` database for use in this\
    \ one\n*   *Use Custom Values* – Manually define a return-delimited list of values\
    \ in the field below\n\n**Caution:** Examples in this section only *define* a\
    \ list. See Chapter [20](#429700_2_En_20_Chapter.xhtml), “Configuring a Field’s\
    \ Control Style,” to learn how to assign a list to fields on layouts.\n\n## Using\
    \ Custom Values\n\nA value list defined with manually entered *custom values*\
    \ can be used for quick data entry of a set of static values, e.g., a *category*,\
    \ *country*, *group*, *location*, *status*, and more. This defines a list of information\
    \ that doesn’t exist elsewhere in the database and is typed directly into the\
    \ editing dialog. For example, create a simple example status list that can be\
    \ assigned to fields such as *Company Status*. In the *Manage Value Lists* dialog,\
    \ click the *New* button to open the *Edit Value List* dialog, and then perform\
    \ these steps shown in Figure [11-2](#429700_2_En_11_Chapter.xhtml#Fig2):\n\n\
    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig2_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2  \nA value list using custom values\n\n1.  Enter a name for the\
    \ value list, e.g., “Record Status.”\n2.  Select the *Use custom values* option.\n\
    3.  Enter values into the text area, e.g., “Active” and “Inactive.”"
  raw: '### Defining a Field’s External Storage Directory


    Once a base directory is defined, it can be assigned to container fields. The
    external storage settings for a container field are configured on the *Storage*
    tab of the *Options for Field* dialog, shown in Figure [10-6](#429700_2_En_10_Chapter.xhtml#Fig6).
    Open the *Manage Database* dialog, click on the *Fields* tab, and double-click
    on a container field. Then select on the *Storage* tab.


    ![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig6_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    The container field storage options


    Enable the *Store container data externally* checkbox and choose a base directory
    from the pop-up menu. Once a directory is selected, choose a storage methodology.
    The *secure storage* option will encrypt documents and automatically distribute
    the files randomly across automatically created subdirectories in a subdirectory
    within the base directory. This option automatically avoids conflicts between
    files with the same name stored in any field that is using the same base directory.
    The *open storage* option keeps document data in the original file format and
    uses a developer specified subdirectory which is required to avoid conflicts between
    similarly named items stored for different tables and fields. If using the same
    base directory for many fields across different tables in the database, use a
    formula to generate a subdirectory that includes the appropriate subfolders to
    avoid overwrite conflicts between records. Click the *Specify* button to enter
    a subdirectory formula like the following example which creates a hierarchy of
    folders for *table*, *field,* and *serial number* to ensure one container item
    per folder:


    ```

    "Sandbox/Example Container/" & Record ID & "/"

    ```


    Caution


    FileMaker Cloud Server requires all containers to use secure storage.


    #### Changing a Field Container Settings


    FileMaker automatically recognizes when a change is made to a container field’s
    configuration. This includes changing between unmanaged internal or managed external
    storage, changing the field’s base directory or subdirectory, or switching between
    secure or open storage. When a modified field definition is saved, a *Container
    Data Transfer* dialog will list any container fields modified during the session,
    as shown in Figure [10-7](#429700_2_En_10_Chapter.xhtml#Fig7). To immediately
    transfer the external files to their new base directory, make sure the field has
    a check in the box and click *Transfer*. If you click *Close* instead, the unperformed
    transfer will be retained and can be performed later using the *Manage Containers*
    dialog’s *Transfer Data* button.


    ![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig7_HTML.jpg](images/429700_2_En_10_Chapter/429700_2_En_10_Fig7_HTML.jpg)


    Figure 10-7


    The dialog indicating the need to transfer container field content


    ## Summary


    This chapter explored inserting and extracting files from container fields as
    well as various methods of managing containers. In the next chapter, we explore
    how to define value lists.


    # 11. Defining Value Lists


    A *value list* is a return-delimited sequence of values. Lists can be created
    by formulas (Chapter [13](#429700_2_En_13_Chapter.xhtml), “Aggregating Data”)
    or by defining one as a centralized resource. A predefined list can be a set of
    static values or values dynamically compiled from the contents of a field gathered
    directly from a table or through a relationship. Once defined, these lists can
    be assigned to a field to enable selection-based data entry by means of *drop-down
    lists*, *pop-up menus*, *checkboxes,* and *radio buttons* (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Configuring a Field’s Control Style”). Using value lists as the control style
    for a field increases data entry speed and ensures accuracy and consistency. This
    chapter covers the following topics regarding defining value lists, including


    *   Introducing the Value Lists dialog


    *   Using custom values


    *   Using a list from another file


    *   Using values from a field


    ## Introducing the Value Lists Dialogs


    Predefined lists are configured using the *Manage Value Lists* dialog, shown in
    Figure [11-1](#429700_2_En_11_Chapter.xhtml#Fig1). This dialog can be opened by
    selecting the *File ➤ Manage ➤ Value Lists* menu, clicking the pencil icon in
    the *Inspector pane* for fields assigned a list-based control style (Chapters
    [19](#429700_2_En_19_Chapter.xhtml) and [20](#429700_2_En_20_Chapter.xhtml)) or
    with the *Open Manage Value Lists* script step. This dialog is used to *create*,
    *edit*, *duplicate,* and *delete* lists.


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig1_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig1_HTML.jpg)


    Figure 11-1


    The dialog used to manage value lists


    Tip


    Value lists can be copied and pasted between two files.


    List settings are defined in the *Edit Value List* dialog. This dialog opens when
    creating a new list or editing an existing list in the dialog in Figure [11-1](#429700_2_En_11_Chapter.xhtml#Fig1).
    After entering a name for the list, there are three options for how values are
    generated:


    *   *Use Values from Field* – Generate a list from field values, defined in a
    *Specify Field* dialog


    *   *Use Value List from Another File* – Select a value list from a different
    FileMaker database for use in this one


    *   *Use Custom Values* – Manually define a return-delimited list of values in
    the field below


    Caution


    Examples in this section only *define* a list. See Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Configuring a Field’s Control Style,” to learn how to assign a list to fields
    on layouts.


    ## Using Custom Values


    A value list defined with manually entered *custom values* can be used for quick
    data entry of a set of static values, e.g., a *category*, *country*, *group*,
    *location*, *status*, and more. This defines a list of information that doesn’t
    exist elsewhere in the database and is typed directly into the editing dialog.
    For example, create a simple example status list that can be assigned to fields
    such as *Company Status*. In the *Manage Value Lists* dialog, click the *New*
    button to open the *Edit Value List* dialog, and then perform these steps shown
    in Figure [11-2](#429700_2_En_11_Chapter.xhtml#Fig2):


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig2_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig2_HTML.jpg)


    Figure 11-2


    A value list using custom values


    1.  Enter a name for the value list, e.g., “Record Status.”


    2.  Select the *Use custom values* option.


    3.  Enter values into the text area, e.g., “Active” and “Inactive.”'
  trans: "\n### 定义字段的外部存储目录\n\n定义基础目录后，可将其分配给容器字段。容器字段的外部存储设置在“字段选项”对话框的*存储*选项卡中进行配置，如图\
    \ 10-6 所示。打开“管理数据库”对话框，点击*字段*选项卡，然后双击一个容器字段，接着选择*存储*选项卡。\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig6_HTML.jpg](img/429700_2_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6  \n容器字段存储选项\n\n勾选*将容器数据存储于外部*复选框，并从弹出菜单中选择一个基础目录。选择目录后，再选择一种存储方法。*安全存储*选项会对文档进行加密，并自动将文件随机分布到基础目录内自动创建的子目录中。该选项自动避免在使用同一基础目录的任何字段中存储同名文件时发生冲突。*开放存储*选项则保留文档数据的原始文件格式，并使用开发者指定的子目录——这是避免为不同表和字段存储的类似名称项目发生冲突所必需的。如果对数据库中不同表的多个字段使用同一基础目录，可使用公式生成包含相应子文件夹的子目录，以避免记录间覆盖冲突。点击*指定*按钮输入类似以下示例的子目录公式，该示例为*表*、*字段*和*序列号*创建层级文件夹，以确保每个文件夹只包含一个容器项目：\n\
    \n```\n\"Sandbox/示例容器/\" & Record ID & \"/\"\n```\n\n**注意：** `FileMaker Cloud\
    \ Server` 要求所有容器都使用安全存储。\n\n#### 更改字段容器设置\n\n`FileMaker` 会自动识别对容器字段配置所做的更改。这些更改包括在非托管内部存储与托管外部存储之间切换、更改字段的基础目录或子目录，或在安全存储与开放存储之间切换。当保存修改后的字段定义时，*容器数据传输*对话框会列出会话期间所有被修改的容器字段，如图\
    \ 10-7 所示。若要将外部文件立即传输至新的基础目录，请确保该字段的复选框已勾选，然后点击*传输*。如果改为点击*关闭*，则未执行的传输将被保留，稍后可通过“管理容器”对话框中的*传输数据*按钮执行。\n\
    \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig7_HTML.jpg](img/429700_2_En_10_Fig7_HTML.jpg)\n\
    \n图 10-7  \n指示需要传输容器字段内容的对话框\n\n## 总结\n\n本章探讨了如何向容器字段插入和提取文件，以及管理容器的各种方法。下一章，我们将探讨如何定义值列表。\n\
    \n# 11. 定义值列表\n\n*值列表*是由回车符分隔的一系列值。列表可通过公式创建（第 13 章，“聚合数据”），也可通过将其定义为集中式资源来创建。预定义列表可以是一组静态值，也可以是动态编译自字段内容（从表中直接或通过关系获取）的值。定义后，这些列表可分配给字段，以实现基于选择的数据录入，例如*下拉列表*、*弹出菜单*、*复选框*和*单选按钮*（第\
    \ 20 章，“配置字段的控制样式”）。使用值列表作为字段的控制样式，可提高数据录入速度并确保准确性和一致性。本章涵盖以下关于定义值列表的主题，包括：\n\n\
    *   介绍值列表对话框\n*   使用自定义值\n*   使用来自其他文件的值列表\n*   使用来自字段的值\n\n## 介绍值列表对话框\n\n预定义列表通过“管理值列表”对话框进行配置，如图\
    \ 11-1 所示。该对话框可通过选择菜单 *文件 ➤ 管理 ➤ 值列表*、点击检查器窗格中已分配基于列表的控制样式字段旁的铅笔图标（第 19 章和第 20\
    \ 章），或通过执行*打开管理值列表*脚本步骤来打开。此对话框用于*创建*、*编辑*、*复制*和*删除*列表。\n\n![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig1_HTML.jpg](img/429700_2_En_11_Fig1_HTML.jpg)\n\
    \n图 11-1  \n用于管理值列表的对话框\n\n**提示：** 值列表可以在两个文件之间复制和粘贴。\n\n列表设置在*编辑值列表*对话框中定义。在图\
    \ 11-1 所示对话框中创建新列表或编辑现有列表时，会打开此对话框。为列表输入名称后，有三种生成值的选项：\n\n*   *使用来自字段的值* – 从字段值生成列表，在“指定字段”对话框中定义\n\
    *   *使用来自另一个文件的值列表* – 从另一个 `FileMaker` 数据库中选择一个值列表用于当前数据库\n*   *使用自定义值* – 在下方字段中手动输入由回车符分隔的值列表\n\
    \n**注意：** 本节中的示例仅*定义*列表。请参阅第 20 章“配置字段的控制样式”，了解如何将列表分配给布局上的字段。\n\n## 使用自定义值\n\n\
    使用手动输入的*自定义值*定义的值列表可用于快速输入一组静态值，例如：*类别*、*国家*、*分组*、*位置*、*状态*等。这定义了一个在数据库其他位置不存在的、直接键入编辑对话框的信息列表。例如，创建一个简单的示例状态列表，可将其分配给诸如*公司状态*之类的字段。在“管理值列表”对话框中，点击*新建*按钮打开“编辑值列表”对话框，然后执行图\
    \ 11-2 所示的步骤：\n\n![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig2_HTML.jpg](img/429700_2_En_11_Fig2_HTML.jpg)\n\
    \n图 11-2  \n使用自定义值的值列表\n\n1.  为值列表输入名称，例如“记录状态”。\n2.  选择*使用自定义值*选项。\n3.  在文本区域中输入值，例如“活跃”和“非活跃”。\n"
- fmt: '# Using a List from Another File


    A value list in one database can be defined to subscribe to a list defined in
    another database. This helps to eliminate redundancy in multi-file systems by
    defining a list once and sharing it in other files. The following example assumes
    a second file named “Sample External List” with a value list named “Address States.”
    From the *Learn FileMaker* database, open the *Manage Value Lists* dialog, and
    click the *New* button to open the *Edit Value List* dialog. Then enter a name
    and follow these steps to configure the list as shown in Figure [11-3](#429700_2_En_11_Chapter.xhtml#Fig3):


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig3_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig3_HTML.jpg)


    Figure 11-3


    A value list using a list from an external database file


    1.  Select the *Use value list from another file* option.

    2.  If the other database is already defined as an external file source, it will
    show up in the first pop-up menu. If not, it can be defined by selecting *Add
    FileMaker Data Source* from that menu and then locating and selecting the other
    database.

    3.  Once the file has been selected, the following *Value list* pop-up menu will
    become activated, allowing a selection from lists defined in the external file.
    Select the target list and close the dialog.


    # Using Values from a Field


    A list can gather values from a target field to dynamically generate a list that
    changes based on record content. By using field data as the source, the value
    list content can be easily edited by authorized users, developers, or scripts
    and dynamically adjust the value over time. This is particularly useful when creating
    a list to aid users in assigning a record in one table to a record in another,
    e.g., assigning a *Company* record as the parent of a *Contact*, *Project*, *Invoice*,
    etc. Instead of remembering or finding a company’s primary key and typing it manually
    or copy-pasting, a pop-up menu or drop-down list control style allows a user to
    select a company by name, and the primary key is entered for them automatically.
    By default, lists using field values are *context-insensitive*, meaning they will
    include values from *every record* in the field’s table and are usable from *any*
    *context*. However, a list can also be configured to conditionally limit the values
    by declaring a *starting context* and pulling values through a relationship instead,
    thereby limiting the list to a single table’s layouts.


    ## Introducing the Specify Fields Dialog


    Start by creating a new value list, assign it a name, and select the *Use values
    from field* radio button. This will automatically open a *Specify Fields* dialog,
    shown in Figure [11-4](#429700_2_En_11_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig4_HTML.jpg](images/429700_2_En_11_Chapter/429700_2_En_11_Fig4_HTML.jpg)


    Figure 11-4


    The dialog used to specify a list generated from field values


    To define the list, specify the field(s) that will be used to generate values
    and indicate which values to include and how they will be displayed, using these
    controls in the dialog:


    1.  *Use Values from First Field* – Choose a table occurrence and field to specify
    the *first field* that will be used in the list. This value will be inserted in
    a field when a selection is made.

    2.  *Also Use Values from Second Field* – Optionally, choose a *second field*
    from the same occurrence or one related to it. This value is *displayed* in lists
    for identification purposes but not inserted when a selection is made. For example,
    if the first field uses a company primary key number, the second field can display
    the human-readable company name.

    3.  *Choose Which Values Are Included* – The *Include all values* option generates
    a list of unique values from the selected field(s) for *all records* in the table.
    The *Include only related values starting from* option generates a list of values
    for *only* related records starting from the context of a table occurrence selected.
    This creates a *contextual value list* that changes depending on which record
    a user is viewing.

    4.  *Show Values Only from Second Field* – Limits to *display* values only from
    second field but will still *insert* the first value when a selection is made.

    5.  *Sort Values Using* – Select which of the two fields to use to sort the list
    when displaying more than one field.

    6.  *Re-sort Values Based on* – Select a language to use when sorting values.
    This is useful when using languages where the dictionary sort order is different
    from the indexed sort order, e.g., distinguishing between characters with and
    without diacritical marks.


    ## Creating a List of All Records in a Table


    By default, a value list set to *use values from a field* pulls from *every record*
    in the table and can therefore be used on any layout in the database without concern
    for the relational context of the layout’s table (Chapter [17](#429700_2_En_17_Chapter.xhtml),
    “Understanding Contextual Access”). The example previously shown in Figure [11-4](#429700_2_En_11_Chapter.xhtml#Fig4)
    creates a value list using the *Record ID* and *Company Name* fields for all records
    in the *Company* table. Once configured and saved, this list can be assigned to
    a field as a *pop-up menu* or *drop-down list* in any table (Chapter [20](#429700_2_En_20_Chapter.xhtml),
    “Configuring Field Control Style”). For example, in the *Contact* table, the *Contact
    Company ID* field is used to store a foreign key that connects a contact record
    to a company. To allow a user to quickly enter this, the value list can be assigned
    to that field as a pop-up menu on the *Contact Form* layout.


    ## Creating Conditional Value Lists


    A *conditional value list* contains filtered choices that represent only a subset
    of the available record values. By offering a smaller list of only relevant values,
    users can more easily locate the value they need. This can be used in numerous
    ways. For example, when assigning a *Company* as the parent to a *Contact*, a
    conditional list can be limited to only include active company records. Similarly,
    assigning a *Product* to an *Invoice* can limit the list to only include products
    based on the value of a category field or the type of company receiving the invoice.
    When selecting a *Template* to use to generate an *Email* record, this can filter
    the list to only approved records for categories that are relevant to the type
    of email being generated.


    There are two ways to create a conditional value list: *using a dedicated relationship*
    and *using a calculation field*. For the examples to follow, we will use the *Company
    Status* field in the *Company* table of *Learn FileMaker* database to create a
    value list that is conditioned to only display company records that have an “Active”
    status.'
