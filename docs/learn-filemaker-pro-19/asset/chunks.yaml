- fmt: '### Changing Case


    Three functions, each accepting a single text parameter, change the case of characters
    to `Upper`, `Lower`, and `Proper`.


    ```

    Upper ( "Hello, World" )       // result = "HELLO, WORLD"

    Upper ( "this is screaming" )  // result = "THIS IS SCREAMING"

    Lower ( "Hello, World" )       // result = "hello, world"

    Lower ( "THIS IS SCREAMING" )  // result = "this is screaming"

    Proper ( "hello, world" )      // result = "Hello, World"

    Proper ( "THIS IS SCREAMING" ) // result = "This Is Screaming"

    ```


    ### Filter


    The `Filter` function removes unwanted characters from a text value. Two parameters
    are required: the text to be filtered followed by a string of allowable characters.
    Any character not present in the second parameter will be removed from the text
    provided in the first.


    ```

    Filter ( "Hello World" ; "1234567890" )                    // result = ""

    Filter ( "1 Hello 2 World 3" ; "1234567890" )              // result = "123"

    Filter ( "Las Vegas, NV 89101" ; "1234567890" )            // result = "89101"

    Filter ( "(212) 555-1234" ; "1234567890" )                 // result = "2125551234"

    Filter ( "The total purchase is $5,000.00" ; "1234567890$.," )  // result = "$5,000.00"

    ```


    **Tip**


    See `FilterValues` later in this chapter to perform a similar function with entire
    paragraphs instead of individual characters.


    ### Substitute


    The `Substitute` function replaces a search string within a piece of text with
    a replacement string. When specifying one *search-replacement pair*, the function
    is called with three parameters as shown here.


    ```

    Substitute ( text ; searchString ; replacementString )

    ```


    These examples demonstrate the function making simple replacements where one search
    value is replaced with one replacement value:


    ```

    Substitute ( "One Two Four" ; "Four" ; "Three" )

    // result = "One Two Three"

    Substitute ( "Hello World? It is good to see you?" ; "?" ; "!" )

    // result = "Hello World! It is good to see you!"

    ```


    To specify *multiple search-replace pairs* in a single statement, each set of
    search and replacement strings is contained within square brackets and separated
    by a semicolon as shown in the following pattern:


    ```

    Substitute ( text ;

    [ searchString1 ; replacementString1 ] ;

    [ searchString2 ; replacementString2 ] ;

    [ searchString3 ; replacementString3 ]

    )

    ```


    The following example demonstrates two search-replace pairs, first replacing `Four`
    with `Three` and then replacing `Six` with `Four`:


    ```

    Substitute ( "One Two Four Six" ; [ "Four" ; "Three" ] ; [ "Six" ; "Four" ] )

    // result = "One Two Three Four"

    ```


    In this example, the result will be the text in the `Notes` field with all carriage
    returns and tabs removed:


    ```

    Substitute ( Table::Notes ; [ "¶" ; "" ] ; [ "    " ; "" ] )

    ```


    This example shows a crude method of clearing extra space in a piece of text using
    three substitutions – replacing a quadruple space, triple space, and double space
    with a single space in succession to ensure that most extra spaces are removed:


    ```

    Substitute ( Table::Text Field ; [ "    " ; " " ] ; [ "   " ; " " ] ; [ "  " ;
    " " ] )

    ```


    **Tip**


    To guarantee all extra spaces are removed, repeatedly substitute double spaces
    with single spaces until none remain using the `While` function (described later
    in this chapter).


    ### Parsing Text


    Several text parsing functions can extract characters or words from the beginning,
    middle, or end of a text value. These include `Left`, `Right`, `Middle`, `LeftWords`,
    `RightWords`, and `MiddleWords`.


    #### Extracting Characters


    The `Left` function extracts a specified number of characters from the provided
    text starting from the first character on the left. If the number specified is
    greater than the number of characters in the text provided, the function simply
    returns the original value.


    ```

    Left ( "Hello, World" ; 8 )        // result = "Hello, W"

    Left ( "Hello, World" ; 100 )      // result = "Hello, World"

    ```


    The `Right` function extracts a specified number of characters starting from the
    last character on the right.


    ```

    Right ( "Hello, World" ; 5 )    // result = "World"

    ```


    The `Middle` function extracts a specified number of characters from a specified
    position within a text string. Unlike the `Left` and `Right` functions, `Middle`
    requires a start parameter indicating where to begin pulling the specified number
    of characters.


    ```

    Middle ( text ; start ; numberOfCharacters )

    Middle ( "Good Morning Everyone." ; 6 ; 7 )   // result = "Morning"

    Middle ( 123456789 ; 4 ; 3 )                  // result = 456

    ```


    #### Extracting Words


    The `LeftWords` function extracts a specified number of words from the text provided,
    starting from the first word on the left. The words returned will include any
    space and punctuation that fall *within* the range specified.


    ```

    LeftWords ( "Hello, World. How are you?" ; 3 )    // result = "Hello, World. How"

    LeftWords ( "Hello, World. How are you?" ; 2 )    // result = "Hello, World"

    ```


    The `RightWords` function extracts a specified number of words from the text provided,
    starting from the last word on the right.


    ```

    RightWords ( "Hello, World. How are you?" ; 3 )  // result = "How are you"

    ```


    The `MiddleWords` function extracts a specified number of words from the text
    provided, starting from a specified word anywhere in the text provided. The following
    example extracts two words starting from the third word:


    ```

    MiddleWords ( "Hello World. How are you?" ; 3 ; 2 )    // result = "How are"

    ```


    ## Working with Values


    A *value* is a return-delimited list of text values where each paragraph is considered
    a single value unit. FileMaker provides several functions specifically for *counting*,
    *parsing*, and *manipulating* value lists.


    ### Counting and Parsing Values


    Several built-in functions can count and parse values in lists: `ValueCount`,
    `LeftValues`, `RightValues`, `MiddleValues`, and `GetValue`.


    **Caution**


    Unlike text counting and parsing, these functions work with values, i.e., entire
    paragraphs.


    #### ValueCount


    The `ValueCount` function counts the number of values in the text specified.


    ```

    ValueCount ( "John¶Jane¶Jim¶Joe¶" )    // result = 4

    ```


    #### LeftValues


    The `LeftValues` function extracts a specified number of values from a list, starting
    from the first value.


    ```

    LeftValues ( "John¶Jane¶Jim¶Joe¶" ; 2 )         // result = "John¶Jane¶"

    LeftValues ( "159¶245¶396¶721¶" ; 3 )           // result = "159¶245¶396¶"

    LeftValues ( "John¶Jane¶Jim¶Joe¶" ; 10 )        // result = "John¶Jane¶Jim¶Joe¶"

    ```


    #### RightValues


    The `RightValues` function extracts a specified number of values from a list,
    starting from the last value.


    ```

    RightValues ( "John¶Jane¶Jim¶Joe¶" ; 2 )    // result = "Jim¶Joe¶"

    ```


    #### MiddleValues


    The `MiddleValues` function extracts a number of values specified by the third
    parameter from a list of values in the first parameter starting from a value specified
    by the second parameter. In this example, one value is extracted, starting with
    the second.


    ```

    MiddleValues ( "John¶Jane¶Jim¶Joe¶" ; 2 ; 1 )  // result = "Jane¶"

    ```


    **Caution**


    When extracting values from the *left*, *right*, or *middle*, a carriage return
    after the last value will be included and may need to be removed for use with
    other text functions.


    #### GetValue


    The `GetValue` function extracts a single value from a list by numeric position,
    without a trailing return character. If the number specified is greater than the
    number of values in the list provided, an empty string will be returned.


    ```

    GetValue ( "John¶Jane¶Jim¶Joe¶" ; 3 )   // result = "Jim"

    GetValue ( "159¶245¶396¶721¶" ; 2 )     // result = 245

    GetValue ( "John¶Jane¶Jim¶Joe¶" ; 18 )  // result = ""

    ```


    ### Manipulating Values


    A few functions can manipulate values in a list, including `FilterValues`, `SortValues`,
    and `UniqueValues`.'
