    # 20. Creating Layout Objects


    A *layout object* is an interface element used to display information, accept
    data entry, and/or initiate a scripted process. An object can be one of eight
    types: *field*, *text*, *button*, *panel*, *portal*, *web viewer*, *chart,* or
    *shape*. This chapter introduces every type of layout object, covering the following
    topics:


    *   Inserting an object onto a layout


    *   Working with field objects


    *   Working with text


    *   Working with button controls


    *   Working with panel controls


    *   Working with portals


    *   Working with web viewers


    *   Working with charts


    ## Inserting an Object onto a Layout


    A new instance of any object can be inserted onto a layout, using the following
    methods:


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig1_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig1_HTML.jpg)


    Figure 20-1


    The toolbar icons for adding objects to layouts


    *   Select the toolbar icon shown in Figure [20-1](#429700_2_En_20_Chapter.xhtml#Fig1).
    Then, click and drag on the design area to define the dimensions of the object.


    *   Select object type from the *Insert* menu to quickly place a new instance
    at a default size and position on the layout.


    *   Duplicate an existing object to a new instance by selecting it and choosing
    the *Edit ➤ Duplicate* menu.


    *   Select an existing object and use the *Copy* and *Paste* functions or option-drag
    to create a new copy of an existing object.


    Note


    A couple of objects have different insertion methods that are noted throughout
    this chapter.


    When an object is first added to a layout, it will be in a raw state and ready
    to be configured. Depending on the type, an object can be configured using different
    methods. Double-clicking on most object types will open a type-specific configuration
    dialog, usually focused on data configuration options rather than formatting or
    other behavioral control. A selected object can be manipulated using options in
    the *Formatting Bar* (Chapter [3](#429700_2_En_3_Chapter.xhtml)), menus such as
    *Format* and *Arrange*, and the options in the *Inspector* pane.


    Caution


    The actual appearance of any object on a layout will vary depending on the object
    state, custom format settings, conditional format settings (Chapter [21](#429700_2_En_21_Chapter.xhtml)),
    and the theme assigned to the layout (Chapter [22](#429700_2_En_22_Chapter.xhtml)).'
