  trans: "\n# 探索标签控制设置对话框\n\n标签通过*标签控制设置*对话框进行配置，该对话框在创建新标签控制时自动打开。此对话框如图 20-42 所示，之后可通过双击标签控制面板的任意位置，或从*格式*菜单或标签控制的上下文菜单中选择*标签控制设置*项来打开。\n\
    \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig42_HTML.jpg](img/429700_2_En_20_Fig42_HTML.jpg)\n\
    \n图 20-42\n\n用于定义标签控制的对话框\n\n对话框中可用的控件如下：\n\n1.  *标签* – 列出为对象定义的每个标签。可拖拽以重新排序。\n\
    2.  *标签名称* – 创建新面板时输入名称，或编辑所选标签的名称。点击*指定*来定义一个由公式驱动的名称。\n3.  *创建* – 点击以基于前述名称创建新标签。\n\
    4.  *重命名* – 点击以保存所选标签的修改后名称。\n5.  *删除* – 删除选中的标签。\n6.  *默认前端标签* – 当窗口刷新时，选择一个默认的标签选项。\n\
    7.  *标签对齐方式* – 选择标签标题的对齐方式。\n8.  *标签宽度* – 选择标签的宽度：\n    - *标签宽度* – 宽度根据每个标签名称变化。\n\
    \    - *标签宽度 + 边距* – 宽度根据每个标签名称加上指定的像素边距变化。\n    - *最宽标签的宽度* – 使用基于最长标签名称的统一宽度。\n\
    \    - *最小值* – 宽度基于每个标签名称，但以指定最小值为下限。\n    - *固定宽度* – 使用基于指定宽度的统一宽度。\n9.  *标签共享单一样式*\
    \ – 通过单一主题样式（第 22 章）保持标签之间的设计统一性。\n\n## 滑动控制\n\n*滑动控制*是一种多面板布局对象，在 iOS 设备上通过向左或向右滑动，或点击导航点来访问面板，如图\
    \ 20-43 所示。在功能上，它们类似于标签控制，但没有标签标题。通过选择*插入 ➤ 滑动控制*菜单，或点击工具栏图标并选择*滑动控制*来创建新的滑动控制。\n\
    \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig43_HTML.jpg](img/429700_2_En_20_Fig43_HTML.jpg)\n\
    \n图 20-43\n\n一个三面板滑动控制示例\n\n### 探索滑动控制设置对话框\n\n滑动控制通过*滑动控制设置*对话框进行配置，该对话框在创建新控件时自动打开。此对话框如图\
    \ 20-44 所示，之后可通过双击滑动控制的背景区域，或从*格式*菜单或滑动控制的上下文菜单中选择*滑动控制设置*来打开。\n\n设置对话框的面板控件可通过按钮添加、移除或导航到特定面板。复选框控制\
    \ iOS 滑动手势和导航点的可见性，以便在 macOS 或 Windows 电脑上的用户在无法滑动时可以点击切换到其他面板。\n\n> **提示**\n\
    > \n> 面板也可以在布局模式下通过拖拽导航点来重新排序。\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig44_HTML.jpg](img/429700_2_En_20_Fig44_HTML.jpg)\n\
    \n图 20-44\n\n用于配置滑动控制的对话框\n\n## 使用门户\n\n*门户*是一种布局对象，用于显示来自与当前布局关联的表单项相关的记录列表。门户类似于列表视图，但作为对象嵌入在布局中，用于显示一组记录，并可选择显示滚动条。*门户行*代表一条相关记录，可以包含字段和其他布局对象。图\
    \ 20-45 展示了*联系人*门户在*公司*布局上的示例。根据门户设置，用户可以添加、删除、编辑、查看记录，或点击按钮导航到特定联系人记录。门户具有许多类似于列表视图的样式选项，允许对*活动行*进行不同样式的设置，并使用交替样式帮助在视觉上区分非活动行。\n\
    \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig45_HTML.jpg](img/429700_2_En_20_Fig45_HTML.jpg)\n\
    \n图 20-45\n\n显示联系人记录的门户示例\n\n### 探索门户设置对话框\n\n要创建新门户，请选择*插入 ➤ 门户*菜单，或在工具栏中选择该工具。门户通过*门户设置*对话框进行配置，该对话框在创建新门户时自动打开。此对话框如图\
    \ 20-46 所示，之后可通过双击门户背景的任意位置，或从格式菜单或门户的上下文菜单中选择*门户设置*来打开。\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig46_HTML.jpg](img/429700_2_En_20_Fig46_HTML.jpg)\n\
    \n图 20-46\n\n用于配置门户的对话框\n\n从*显示记录来自*弹出菜单中选中的表单项充当门户的*数据源*。四个复选框及其相邻控件用于配置门户中可供用户使用的排序、筛选和其他功能。*允许删除门户记录*复选框允许用户使用`Delete`键删除选中的门户行。为提供更直观的体验并避免意外删除，可禁用此功能，并在门户行中创建一个自定义的*删除*按钮。当记录数超过可见行数时，允许滚动，并可选择始终显示滚动条或仅在用户滚动时显示。*退出记录时重置滚动条*选项将在记录提交时自动滚动回第一行，而不是保留用户当前的滚动位置。\n\
    \n底部的*格式*设置允许控制出现在门户中的相关记录以及应用的样式选项。*初始行*接受一个数字，指示应显示的第一行，该行之前的所有相关记录将被隐藏。*行数*指示门户在其最小尺寸下应包含多少条相关记录。在*第一行*之后的相关记录仍会包含在门户中，但只有在启用滚动功能或门户配置为在窗口尺寸变化时扩展大小时，才能通过滚动进行访问。交替行和活动行状态将应用样式设置（第\
    \ 22 章），以不同格式显示每隔一行和当前选中的行，从而提供视觉清晰度。\n"
- fmt: '### Adding Objects to Portal Rows


    In Layout mode, a portal’s first row is a design area where fields, buttons, and
    other objects can be added to define the template for how each row will be rendered
    in Browse mode, as shown in Figure [20-47](#429700_2_En_20_Chapter.xhtml#Fig47).


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig47_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig47_HTML.jpg)


    Figure 20-47


    Showing a portal in Layout mode (top) and Browse mode (bottom)


    Objects placed in the portal are rendered from the context of the current layout’s
    occurrence and the relationship to the portal’s data source occurrence. This is
    important to remember when choosing what objects to place inside a portal and
    how to configure them. Any `fields` added into the portal must be either from
    the portal’s assigned occurrence or occurrences that are related to it in a direct
    line away from the layout’s occurrence. Fields from tables beyond the portal’s
    table will only display a value from the first matching record through the relationship
    conduit from the context of the record for each portal row. So, a `Contact` portal
    can include a field that hops across multiple relationships to show a field from
    an invoice line item from an invoice related to the contact, but it will only
    show the value from the first line item for the first invoice for the contact
    based on the relational connections along that chain. Any `object` in a portal
    must be thought of in the context of the portal’s occurrence. When writing formulas
    for hide, tooltips, conditional formatting, script parameters, etc., the formula
    must be restrained to include fields based on the portal’s context.


    ### Creating Records in a Portal Directly


    In Browse mode, portals automatically update anytime new matching records are
    created in the related source table. If one user is viewing a `Company` record
    on a layout with a `Contact` portal, any new contact record that is linked to
    that company will appear in the portal viewed by anyone. If the user viewing the
    company record wants to create a new related contact record from the `Company`
    layout, they would have to switch layouts, create the record, link it to the company,
    and then return to the original layout to see it in the portal – or run a script
    that performs those steps in sequence. Alternatively, a portal can be configured
    with a shortcut that allows users to create a new record directly in the portal
    by typing into an empty portal row at the bottom. This ability is configured at
    the relationship level instead of on the layout object. Open the `Manage Database`
    dialog and enable the `Allow creation of records` checkbox in the `Edit Relationship`
    dialog (Chapter [9](#429700_2_En_9_Chapter.xhtml)) on the side of the relationship
    used as the portal’s data source, in this case, `Company | Contact`. Once done,
    any portal assigned that occurrence will display one blank row, as shown in Figure
    [20-48](#429700_2_En_20_Chapter.xhtml#Fig48). The blank row `only exists in the
    interface` and will be `programmatically ignored` with no effect on functions
    that summarize related records such as `Count`, `List`, `Max`, `Min`, `Sum`, etc.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig48_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig48_HTML.jpg)


    Figure 20-48


    The setting (left) that enables a blank portal row for creating new records (right)


    When the user types into any editable field in that blank row and then moves focus
    to another field or commits the record, a new record will be instantly created
    in the remote table. The new record will automatically populate each match field
    with the appropriate value required to relate it to the currently viewed parent
    record. Although the new record remains in the portal, it may sort to a new position
    based on the values in any sort field defined at the relationship level and/or
    specified in the portal’s settings. Once finished, a new blank row will appear
    for the creation of additional new records.


    Caution


    This feature may confuse users since the empty row appears like an actual record
    with no field values. Users may try to delete it. Buttons can be hidden (Chapter
    [21](#429700_2_En_21_Chapter.xhtml)) to make it less conspicuous, but some developers
    disable this and use a custom script to perform the sequence required to create
    related records.


    ### Deleting Portal Rows


    Portal rows are a representation of records from another table, and they will
    disappear from the portal whenever the related record is deleted. A portal can
    be configured to allow users to delete a record directly within the portal. Open
    the `Portal Setup` dialog, and select the `Allow deletion of portal records` option.
    Once enabled, a user can select a portal row and type the Delete key to delete
    the related record and remove it from the portal display. FileMaker will present
    a confirmation dialog asking if the user wants to continue with the deletion.
    If they confirm, the related record will be permanently deleted.


    Caution


    The delete portal row confirmation dialog is vague and may be confusing to the
    users who may not realize which row they have selected and accidentally delete
    the wrong record. Instead, add a button in the portal that handles the process
    with more precision and optionally run a script with a more informative custom
    dialog.


    ### Filtering Portal Records


    The relationship between the layout’s occurrence and portal’s occurrence automatically
    provides a baseline filter controlling the records displayed in a portal. Only
    records with a relational match of the current record’s occurrence will be included.
    By contrast, the `portal filtering` option in the `Portal Setup` dialog allows
    a formula to further control which of the related records will actually be displayed
    in the portal. The filter formula is evaluated once for each available related
    record, and they are only displayed if the result is true.


    The filter formula can be as simple or as complex as needed to determine if a
    record should be included. It can include field comparisons and can be based on
    a user’s entry in fields exclusively for soliciting filtering preferences. For
    example, a field positioned near the portal can allow users to type any criteria
    that can be used to determine a subset of related records that will be displayed.
    In the example shown in Figure [20-49](#429700_2_En_20_Chapter.xhtml#Fig49), a
    `Company` layout includes a `Contact` portal showing related people. The relationship
    limits the portal list to only people related to the current company. The value
    in the filtering field can be compared to the related `State` field in order to
    narrow the related to only contacts whose address matches the value entered by
    a user.


    ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig49_HTML.jpg](images/429700_2_En_20_Chapter/429700_2_En_20_Fig49_HTML.jpg)


    Figure 20-49


    An example of a portal filtering field


    Caution


    Filtering only affects the `display` of related records and does not affect the
    actual relationship. Any calculation that accesses records through the relationship
    will continue to see all related records even when the portal displays a filtered
    set!'
