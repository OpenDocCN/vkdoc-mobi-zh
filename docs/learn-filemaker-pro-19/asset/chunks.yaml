- fmt: '# Deleting Fields


    Fields can be deleted from a table by selecting them and clicking the `*Delete*`
    button. A warning dialog will confirm the deletion request. The selected fields(s)
    will disappear from the list immediately; however, the actual deletion doesn’t
    occur until you click the `OK` button to close the `*Manage Database*` dialog.
    Click `*Cancel*` instead if you made an error and don’t want to save the deletion
    change. FileMaker does a pretty good job of cleaning up instances of the field
    on layouts. However, you may need to manually delete any lingering `*<missing
    field>*` references on layouts in other files. Any references to a deleted field
    in script steps or formulas will need to be manually removed or reassigned.


    ## Setting Field Options


    In addition to a field’s `*name*`, `*type*`, and `*comment*` properties, there
    are numerous options available for configuration depending on the type of field.
    To edit these options, select a field and click the `*Options*` button.


    ### Options for Entry Fields


    All entry fields have similar options that only vary slightly from one to the
    next. These are controlled through an `*Options for Field*` dialog with settings
    spread across four tabs: `*Auto-Enter*`, `*Validation*`, `*Storage*`, and `*Furigana*`.


    #### Field Options: Auto-Enter


    The `*Auto-Enter options*` tab of the `*Options for Entry*` dialog, shown in Figure
    [8-3](#429700_2_En_8_Chapter.xhtml#Fig3), controls data that will be automatically
    entered into the field when a new record is created or when certain conditions
    are met.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig3_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    The Auto-Enter tab of the options dialog for entry fields


    **Caution**


    Although all of the options are checkbox controls, the first five operate as radio
    buttons, allowing only `*one*` to be selected since they would overwrite each
    other.


    ##### Automatically Enter the Following Data into This Field


    Some of these settings are limited or disabled for certain entry fields depending
    on the specific data type they contain. The options include auto-entering:


    - `*Creation*` – Select a value to be entered at record creation: `*Date*`, `*Time*`,
    `*Timestamp*`, `*Name*`, or `*Account Name*`.

    - `*Modification*` – Select a value to be entered when a record is modified (same
    options as the preceding ones).

    - `*Serial Number*` – Enter a serialized number at record creation or on first
    commit. The number is based on the value in the `*next value*` text area and automatically
    incremented each time by the value in `*increment by*`.

    - `*Value from Last Visited Record*` – Enters a value into a new record from the
    same field on the last record the user viewed.

    - `*Data*` – Enters the static text value in the adjacent text area.

    - `*Calculated Value*` – Define a formula that generates a result entered into
    the field (Chapter [12](#429700_2_En_12_Chapter.xhtml)). The `*Do not replace*`
    checkbox will cause the field to `*not*` evaluate the calculation if a value already
    exists from a preceding option or contains data previously entered by the user.

    - `*Looked-up Value*` – Copies a value from a related field.


    **Caution**


    A calculated value set to not replace existing values will evaluate once when
    a record is created and will not reevaluate again if a value was generated, including
    when duplicating a record.


    ##### Lookup for Field Dialog


    A `*lookup field*` automatically copies a value from a specific field from a related
    record immediately after a key field defining the relationship is updated. This
    is used to place a copy of a value locally from a related record so that it will
    remain in place even if the related record is deleted. This feature is a vestigial
    remnant from the pre-relationship days that will likely be deprecated in future
    releases. Instead, consider using either an auto-enter calculation or direct placement
    of a related field on a layout. To configure a lookup, click the `*Looked-up value*`
    checkbox on the `*Auto-Enter*` tab of the `*Options for Field*` dialog. This will
    open a `*Lookup for Field*` dialog, shown in Figure [8-4](#429700_2_En_8_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig4_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    The dialog for configuring lookup settings


    The dialog contains the following controls:


    1. `*Starting with Table*` – Select a table occurrence for the field being defined
    to serve as the starting context if multiple table occurrences exist for its table
    (Chapter [9](#429700_2_En_9_Chapter.xhtml))

    2. `*Lookup from Related Table*` – Select a table related to the starting table
    to identify the relational conduit through which a field value will be copied

    3. `*Copy Value from Field*` – Choose a field from the selected lookup table occurrence
    whose value should be copied into the field being defined when the lookup happens

    4. `*Don’t Copy Contents if Empty*` – Select to halt the lookup if the selected
    field is empty, in favor of any existing value

    5. `*If No Exact Match Then*` – Choose an action to perform if no related record
    is found


    ##### Prohibit Modification of Value During Data Entry


    This checkbox at the bottom of the `*Auto-Enter*` tab of the `*Options for Field*`
    dialog makes the field non-editable at the data level `*regardless*` of a user’s
    security settings or the field’s configuration on a layout. After any auto-enter
    option(s) have been performed, the field’s value will be non-editable unless this
    setting is changed. This is useful for default fields such as the primary key
    and record metadata or any other entry fields that you want to be read-only after
    an initial automatic entry is complete.


    #### Field Options: Validation


    The `*Validation*` tab of the `*Options for Entry*` dialog, shown in Figure [8-5](#429700_2_En_8_Chapter.xhtml#Fig5),
    defines entry requirements for the field, allowing the database to automatically
    validate input and enforce rules. If one or more requirements are specified, FileMaker
    will validate data entered into the field. When a field fails a validation check,
    the user is notified and given a choice for corrective action.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig5_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    The Validation tab of the options dialog for entry field


    ##### Validation Control


    The options at the top of the `*Validation*` tab control when input is validated
    and whether a user can override a validation warning. Select `*Always*` to cause
    the field to validate when data entry is performed and when importing into the
    field or `*Only during data entry*` to validate `*only*` during data entry and
    not during import.


    **Caution**


    Fields set to always validate will cause FileMaker to `*not*` import a record
    if validation fails. These will be reported with the total incidence of import
    errors without providing any additional detail!


    Check the `*Allow user to override*` box to change the validation warning options
    as shown in Figure [8-6](#429700_2_En_8_Chapter.xhtml#Fig6). With the override
    option `*off*`, the warning dialog has two buttons. The `*Revert Field*` button
    will remove the data entry changes, restoring the previous saved value, while
    the `OK` button returns the user to the uncommitted record where they can edit
    their entry to comply with the validation requirements before attempting to commit
    again. With the override option `*on*`, the `*Revert Field*` option remains and
    is joined by a new message offering to override the warning. Clicking the `No`
    button returns the user to edit the uncommitted record, while clicking `Yes` ignores
    the validation warning, accepts the changes as entered, and continues committing
    the record.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig6_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig6_HTML.jpg)


    Figure 8-6


    The warning with allow override off (left) and on (right)'
  raw: '### Deleting Fields


    Fields can be deleted from a table by selecting them and clicking the *Delete*
    button. A warning dialog will confirm the deletion request. The selected fields(s)
    will disappear from the list immediately; however, the actual deletion doesn’t
    occur until you click the OK button to close the *Manage Database* dialog. Click
    *Cancel* instead if you made an error and don’t want to save the deletion change.
    FileMaker does a pretty good job of cleaning up instances of the field on layouts.
    However, you may need to manually delete any lingering *<missing field>* references
    on layouts in other files. Any references to a deleted field in script steps or
    formulas will need to be manually removed or reassigned.


    ## Setting Field Options


    In addition to a field’s *name*, *type*`,` and *comment* properties, there are
    numerous options available for configuration depending on the type of field. To
    edit these options, select a field and click the *Options* button.


    ### Options for Entry Fields


    All entry fields have similar options that only vary slightly from one to the
    next. These are controlled through an *Options for Field* dialog with settings
    spread across four tabs: *Auto-Enter*`,` *Validation*`,` *Storage*`, and` *Furigana*`.`


    #### Field Options: Auto-Enter


    The *Auto-Enter options* tab of the *Options for Entry* dialog, shown in Figure
    [8-3](#429700_2_En_8_Chapter.xhtml#Fig3), controls data that will be automatically
    entered into the field when a new record is created or when certain conditions
    are met.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig3_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    The Auto-Enter tab of the options dialog for entry fields


    Caution


    Although all of the options are checkbox controls, the first five operate as radio
    buttons, allowing only *one* to be selected since they would overwrite each other.


    ##### Automatically Enter the Following Data into This Field


    Some of these settings are limited or disabled for certain entry fields depending
    on the specific data type they contain. The options include auto-entering


    *   *Creation* – Select a value to be entered at record creation: *Date*, *Time*,
    *Timestamp*, *Name*, or *Account Name*.


    *   *Modification* – Select a value to be entered when a record is modified (same
    options as the preceding ones).


    *   *Serial Number* – Enter a serialized number at record creation or on first
    commit. The number is based on the value in the *next value* text area and automatically
    incremented each time by the value in *increment by*.


    *   *Value from Last Visited Record* – Enters a value into a new record from the
    same field on the last record the user viewed.


    *   *Data* – Enters the static text value in the adjacent text area.


    *   *Calculated Value* – Define a formula that generates a result entered into
    the field (Chapter [12](#429700_2_En_12_Chapter.xhtml)). The *Do not replace*
    checkbox will cause the field to *not* evaluate the calculation if a value already
    exists from a preceding option or contains data previously entered by the user.


    *   *Looked-up Value* – Copies a value from a related field.


    Caution


    A calculated value set to not replace existing values will evaluate once when
    a record is created and will not reevaluate again if a value was generated, including
    when duplicating a record.


    ##### Lookup for Field Dialog


    A *lookup field* automatically copies a value from a specific field from a related
    record immediately after a key field defining the relationship is updated. This
    is used to place a copy of a value locally from a related record so that it will
    remain in place even if the related record is deleted. This feature is a vestigial
    remnant from the pre-relationship days that will likely be deprecated in future
    releases. Instead, consider using either an auto-enter calculation or direct placement
    of a related field on a layout. To configure a lookup, click the *Looked-up value*
    checkbox on the *Auto-Enter* tab of the *Options for Field* dialog. This will
    open a *Lookup for Field* dialog, shown in Figure [8-4](#429700_2_En_8_Chapter.xhtml#Fig4).


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig4_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    The dialog for configuring lookup settings


    The dialog contains the following controls:


    1.  *Starting with Table* – Select a table occurrence for the field being defined
    to serve as the starting context if multiple table occurrences exist for its table
    (Chapter [9](#429700_2_En_9_Chapter.xhtml))


    2.  *Lookup from Related Table* – Select a table related to the starting table
    to identify the relational conduit through which a field value will be copied


    3.  *Copy Value from Field* – Choose a field from the selected lookup table occurrence
    whose value should be copied into the field being defined when the lookup happens


    4.  *Don’t Copy Contents if Empty* – Select to halt the lookup if the selected
    field is empty, in favor of any existing value


    5.  *If No Exact Match Then* – Choose an action to perform if no related record
    is found


    ##### Prohibit Modification of Value During Data Entry


    This checkbox at the bottom of the *Auto-Enter* tab of the *Options for Field*
    dialog makes the field non-editable at the data level *regardless* of a user’s
    security settings or the field’s configuration on a layout. After any auto-enter
    option(s) have been performed, the field’s value will be non-editable unless this
    setting is changed. This is useful for default fields such as the primary key
    and record metadata or any other entry fields that you want to be read-only after
    an initial automatic entry is complete.


    #### Field Options: Validation


    The *Validation* tab of the *Options for Entry* dialog, shown in Figure [8-5](#429700_2_En_8_Chapter.xhtml#Fig5),
    defines entry requirements for the field, allowing the database to automatically
    validate input and enforce rules. If one or more requirements are specified, FileMaker
    will validate data entered into the field. When a field fails a validation check,
    the user is notified and given a choice for corrective action.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig5_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    The Validation tab of the options dialog for entry field


    ##### Validation Control


    The options at the top of the *Validation* tab control when input is validated
    and whether a user can override a validation warning. Select *Always* to cause
    the field to validate when data entry is performed and when importing into the
    field or *Only during data entry* to validate *only* during data entry and not
    during import.


    Caution


    Fields set to always validate will cause FileMaker to *not* import a record if
    validation fails. These will be reported with the total incidence of import errors
    without providing any additional detail!


    Check the *Allow user to override* box to change the validation warning options
    as shown in Figure [8-6](#429700_2_En_8_Chapter.xhtml#Fig6). With the override
    option *off*, the warning dialog has two buttons. The *Revert Field* button will
    remove the data entry changes, restoring the previous saved value, while the OK
    button returns the user to the uncommitted record where they can edit their entry
    to comply with the validation requirements before attempting to commit again.
    With the override option *on*, the *Revert Field* option remains and is joined
    by a new message offering to override the warning. Clicking the No button returns
    the user to edit the uncommitted record, while clicking Yes ignores the validation
    warning, accepts the changes as entered, and continues committing the record.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig6_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig6_HTML.jpg)


    Figure 8-6


    The warning with allow override off (left) and on (right)'
  trans: '

    # 删除字段


    只需选中字段并点击`*删除*`按钮，即可从表中删除字段。系统会弹出一个警告对话框来确认删除请求。选中的字段会立即从列表中消失；然而，实际的删除操作要到您点击`确定`按钮关闭`*管理数据库*`对话框后才会执行。如果您操作有误，不希望保存删除更改，请点击`*取消*`按钮。FileMaker
    在清理布局中字段的引用方面做得相当不错。但是，您可能需要手动删除其他文件中布局上残留的任何`*<缺失字段>*`引用。脚本步骤或公式中对已删除字段的任何引用都需要手动移除或重新指定。


    ## 设置字段选项


    除了字段的`*名称*`、`*类型*`和`*注释*`属性外，根据字段类型的不同，还有许多可配置的选项。要编辑这些选项，请选中一个字段并点击`*选项*`按钮。


    ### 输入字段的选项


    所有输入字段都具有相似的选项，只是彼此之间略有差异。这些选项通过一个`*字段选项*`对话框进行控制，其设置分布在四个选项卡中：`*自动输入*`、`*验证*`、`*存储*`和`*假名*`。


    #### 字段选项：自动输入


    `*输入字段选项*`对话框的`*自动输入选项*`选项卡（如图 [8-3] 所示）用于控制创建新记录或满足特定条件时自动输入到字段中的数据。


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig3_HTML.jpg](img/429700_2_En_8_Fig3_HTML.jpg)


    图 8-3


    输入字段选项对话框的“自动输入”选项卡


    **注意**


    虽然所有选项都是复选框控件，但前五个选项像单选按钮一样工作，只允许选择`*一个*`，因为它们会互相覆盖。


    ##### 自动将以下数据输入到此字段


    对于某些输入字段，其中一些设置可能会受到限制或禁用，具体取决于它们包含的特定数据类型。这些选项包括自动输入：


    - `*创建*` – 在记录创建时选择一个要输入的值：`*日期*`、`*时间*`、`*时间戳*`、`*名称*`或`*账户名*`。

    - `*修改*` – 在记录被修改时选择一个要输入的值（选项与前述相同）。

    - `*序列号*` – 在记录创建时或首次提交时输入一个序列化编号。该编号基于`*下一个值*`文本框中的值，并每次自动按`*增量*`中的值递增。

    - `*来自上次访问记录的值*` – 将用户查看的上一条记录中同一字段的值输入到新记录中。

    - `*数据*` – 输入相邻文本框中的静态文本值。

    - `*计算值*` – 定义一个生成结果并输入到字段中的公式（第 [12] 章）。如果之前选项已存在值，或字段已包含用户先前输入的数据，则`*不要替换*`复选框将导致字段`*不*`计算该结果。

    - `*查找值*` – 从相关字段复制一个值。


    **注意**


    设置为不替换现有值的计算值，在记录创建时计算一次，如果生成了值，则不会重新计算，包括在复制记录时也不会。


    ##### 字段查找对话框


    `*查找字段*`会在定义关系的关键字段更新后，立即自动从相关记录的特定字段复制一个值。此功能用于在本地放置一个来自相关记录的值副本，以便即使相关记录被删除，该副本仍然保留。此功能是关系型数据库出现之前的遗留产物，可能会在未来的版本中弃用。建议改用自动输入计算或直接在布局上放置相关字段。要配置查找，请在`*字段选项*`对话框的`*自动输入*`选项卡中勾选`*查找值*`复选框。这将打开一个`*字段查找*`对话框，如图
    [8-4] 所示。


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig4_HTML.jpg](img/429700_2_En_8_Fig4_HTML.jpg)


    图 8-4


    用于配置查找设置的对话框


    该对话框包含以下控件：


    1. `*起始表*` – 如果为其表存在多个表出现项（第 [9] 章），请选择一个表出现项作为正在定义字段的起始上下文。

    2. `*从相关表查找*` – 选择一个与起始表相关的表，以确定将通过哪个关系通道复制字段值。

    3. `*从字段复制值*` – 从选定的查找表出现项中选择一个字段，该字段的值将在查找发生时复制到正在定义的字段中。

    4. `*如果为空则不复制内容*` – 如果选定字段为空，则选择停止查找，保留任何现有值。

    5. `*如果未找到完全匹配项则*` – 选择在未找到相关记录时要执行的操作。


    ##### 禁止在数据输入期间修改值


    `*字段选项*`对话框`*自动输入*`选项卡底部的此复选框使该字段在数据层变为不可编辑，这`*独立于*`用户的安全设置或该字段在布局上的配置。在任何自动输入选项执行后，除非更改此设置，否则该字段的值将不可编辑。这对于主键和记录元数据等默认字段，或任何您希望在初始自动输入完成后为只读的其他输入字段非常有用。


    #### 字段选项：验证


    `*输入字段选项*`对话框的`*验证*`选项卡（如图 [8-5] 所示）定义了该字段的输入要求，使数据库能够自动验证输入并强制执行规则。如果指定了一个或多个要求，FileMaker
    将验证输入到字段中的数据。当字段未通过验证检查时，用户会收到通知，并获得纠正措施的选择。


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig5_HTML.jpg](img/429700_2_En_8_Fig5_HTML.jpg)


    图 8-5


    输入字段选项对话框的“验证”选项卡


    ##### 验证控制


    `*验证*`选项卡顶部的选项用于控制何时验证输入，以及用户是否可以覆盖验证警告。选择`*始终*`以使字段在输入数据时以及导入到字段时进行验证，或选择`*仅限数据输入期间*`以`*仅*`在数据输入期间进行验证，而不在导入期间进行。


    **注意**


    设置为始终验证的字段如果验证失败，将导致 FileMaker `*不*`导入该记录。这些失败将作为导入错误的总次数进行报告，且不提供任何额外细节！


    勾选`*允许用户覆盖*`框以更改验证警告选项，如图 [8-6] 所示。当覆盖选项`*关闭*`时，警告对话框有两个按钮。`*还原字段*`按钮将撤消数据输入更改，恢复之前保存的值，而`确定`按钮将用户返回到未提交的记录，用户可以在其中编辑其输入以符合验证要求，然后再次尝试提交。当覆盖选项`*打开*`时，`*还原字段*`选项仍然存在，并新增了一条允许覆盖警告的消息。点击`否`按钮将用户返回到编辑未提交的记录，而点击`是`则忽略验证警告，接受输入的更改，并继续提交记录。


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig6_HTML.jpg](img/429700_2_En_8_Fig6_HTML.jpg)


    图 8-6


    覆盖关闭（左）与覆盖开启（右）时的警告信息

    '
- fmt: '### Validation Requirements


    The following validation requirements can be imposed on data entered into the
    field:


    - **Strict Data Type** – Restricts values to one of the following options: `Numeric
    Only`, `4-Digit Year Date`, or `Time of Day`.


    > **Tip**: The `4-Digit Year` option here requires entry of a full year *before*
    FileMaker performs its automatic conversion and can be used to avoid inadvertent
    conversions for dates outside of that span.


    - **Not Empty** – Requires a value in the record.


    - **Unique Value** – Requires the input to be unique for the field across *all*
    records in the table.


    - **Existing Value** – Requires the input to already exist in the same field for
    at least one other record in the table.


    - **Member of Value List** – Requires the input to be present in the specified
    value list (Chapter [11](#429700_2_En_11_Chapter.xhtml)).


    - **In Range** – Requires the input to be within a range specified, which can
    be text, date, time, or numeric values.


    - **Validated by Calculation** – Allows a custom validation formula (Chapter [12](#429700_2_En_12_Chapter.xhtml)).
    The formula *must* evaluate to `true` (non-zero) for the entry to pass the validation
    test.


    - **Maximum Number of Characters** – Requires input of a character length equal
    to or less than the number specified (for non-container fields only).


    - **Maximum Number of Kilobytes** – This option replaces the preceding one for
    container fields, specifying an upper limit on the size of a file that can be
    placed into the field.


    ### Display Custom Message if Validation Fails


    When the validation of a field fails, FileMaker will generate a dialog message
    like those shown previously in Figure [8-6](#429700_2_En_8_Chapter.xhtml#Fig6).
    The default message will include details about the specific validation failure,
    which can be helpful when multiple validation criteria are applied to a single
    field. The **Display custom message** option allows the entry of an alternative
    custom static message for a field.


    ### Exploring Validation Alternatives


    Some developers use FileMaker’s validation options sparingly and prefer alternatives.
    Many data entry errors can be anticipated and *automatically corrected* using
    an `Auto-Enter Calculation` formula to clean up and replace the value entered.
    For example, the `GetAsNumber`, `Filter`, `Trim`, and `Substitute` functions can
    automatically remove undesirable characters that are typed in a field (Chapter
    [13](#429700_2_En_13_Chapter.xhtml)). Keeping paragraph returns out of a field
    can be done by making the Return key move to the next field for fields on layouts
    using **Behavior** settings in the **Inspector** pane (Chapter [19](#429700_2_En_19_Chapter.xhtml)).
    When an error can’t be easily avoided or auto-corrected, an error-detecting calculation
    field can display a list of fields with detectable validation errors. This removes
    an obtrusive dialog and allows searching/sorting records with errors; however,
    users can ignore it. An `OnObjectValidate` script trigger (Chapter [27](#429700_2_En_27_Chapter.xhtml))
    assigned to a field can run a script that checks the field for detectable errors
    and stops the user from exiting the field until they are corrected. This allows
    a more elaborate, formula-driven dialog message to explain the problem. An `OnRecordCommit`
    script trigger can halt record commit until detected problems are corrected.


    ## Field Options: Storage


    The **Storage options** tab of the **Options for Entry** dialog, shown in Figure
    [8-7](#429700_2_En_8_Chapter.xhtml#Fig7), controls how information is stored and
    indexed within a field.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig7_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig7_HTML.jpg)


    **Figure 8-7** – The Storage tab of the options dialog for entry fields


    ### Global Storage


    A *local field* is replicated as a unique instance of itself for each record like
    a cell in a spreadsheet where every record can contain a different value. The
    value placed within the field is considered *local* to a single record, which
    is separate and different from the same field on any other records. Local fields
    can only be displayed and accessed from the context of their parent table or a
    table related to that table. Every newly defined field starts out as a local field
    but can be configured as global. A *global field* contains one value that will
    be shared across every record in the table and can be accessed from any context
    within the database. Using the spreadsheet analogy where a column represents a
    defined field and a row a record, a global field is like a column with the same
    value in every cell of that column for every row, except there is only *one value*
    that is the same from the perspective of any individual record.


    In the **Storage** tab of the **Options for Field** dialog, the **Use global storage**
    checkbox converts a field to use global storage. FileMaker will present a warning
    dialog indicating that existing values within the field will be lost when the
    change occurs. Once a field is global, it can be used for a variety of special
    purposes, including:


    - Storing a fixed value that is available to *any* calculation formula or layout
    regardless of context, e.g., a tax rate

    - Creating a *control field* like a menu of options, e.g., a pop-up menu of portal
    filtering or sorting options

    - Providing temporary storage for scripts to place information that needs to interact
    with other calculation fields

    - Storing static text or graphics that will be displayed on a multiple layout
    as iconography, branding, etc.

    - Storing print report headings or other temporary information


    A global variable is preferable for most uses because it doesn’t clog up the field
    definition list. However, it is limited to a single file. A global field in a
    table occurrence added to other files allows content to be shared globally between
    files to create a *solution-wide global*.


    The value placed into a global field is retained from one session to the next
    *only* when entered on a non-hosted database that is open on a local copy of the
    `FileMaker Pro` desktop application. When opened across a network, values placed
    into a global field will not be saved between sessions and are not shared between
    users who access the file simultaneously. Each time the database is opened from
    a server host, the field will contain the value entered when it was last opened
    *locally* by the desktop application.


    > **Tip**: In ancient times, developers used global fields for a variety of functions
    that are now better managed with variables (Chapters [12](#429700_2_En_12_Chapter.xhtml)
    and [25](#429700_2_En_25_Chapter.xhtml)), custom functions (Chapter [15](#429700_2_En_15_Chapter.xhtml)),
    merge variables (Chapter [20](#429700_2_En_20_Chapter.xhtml)), and script parameters
    (Chapter [24](#429700_2_En_24_Chapter.xhtml)). Use global fields sparingly!'
  raw: '##### Validation Requirements


    The following validation requirements can be imposed on data entered into the
    field:


    *   *Strict Data Type* – Restricts values to one of the following options: *Numeric
    Only*, *4-Digit Year Date*`,` or *Time of Day*.


    Tip


    The *4-Digit Year* option here requires entry of a full year *before* FileMaker
    performs its automatic conversion and can be used to avoid inadvertent conversions
    for dates outside of that span.


    *   *Not Empty* – Requires a value in the record.


    *   *Unique Value* – Requires the input to be unique for the field across *all*
    records in the table.


    *   *Existing Value* – Requires the input to already exist in the same field for
    at least one other record in the table.


    *   *Member of Value List* – Requires the input to be present in the specified
    value list (Chapter [11](#429700_2_En_11_Chapter.xhtml)).


    *   *In Range* – Requires the input to be within a range specified, which can
    be text, date, time, or numeric values.


    *   *Validated by Calculation* – Allows a custom validation formula (Chapter [12](#429700_2_En_12_Chapter.xhtml)).
    The formula *must* evaluate to *true* (non-zero) for the entry to pass the validation
    test.


    *   *Maximum Number of Characters* – Requires input of a character length equal
    to or less than the number specified (for non-container fields only).


    *   *Maximum Number of Kilobytes* – This option replaces the preceding one for
    container fields, specifying an upper limit on the size of a file that can be
    placed into the field.


    ##### Display Custom Message if Validation Fails


    When the validation of a field fails, FileMaker will generate a dialog message
    like those shown previously in Figure [8-6](#429700_2_En_8_Chapter.xhtml#Fig6).
    The default message will include details about the specific validation failure,
    which can be helpful when multiple validation criteria are applied to a single
    field. The *Display custom message* option allows the entry of an alternative
    custom static message for a field.


    ##### Exploring Validation Alternatives


    Some developers use FileMaker’s validation options sparingly and prefer alternatives.
    Many data entry errors can be anticipated and *automatically corrected* using
    an *Auto-Enter Calculation* formula to clean up and replace the value entered.
    For example, the *GetAsNumber*, *Filter, Trim,* and *Substitute* functions can
    automatically remove undesirable characters that are typed in a field (Chapter
    [13](#429700_2_En_13_Chapter.xhtml)). Keeping paragraph returns out of a field
    can be done by making the Return key move to the next field for fields on layouts
    using *Behavior* settings in the *Inspector* pane (Chapter [19](#429700_2_En_19_Chapter.xhtml)).
    When an error can’t be easily avoided or auto-corrected, an error-detecting calculation
    field can display a list of fields with detectable validation errors. This removes
    an obtrusive dialog and allows searching/sorting records with errors; however,
    users can ignore it. An *OnObjectValidate* script trigger (Chapter [27](#429700_2_En_27_Chapter.xhtml))
    assigned to a field can run a script that checks the field for detectable errors
    and stops the user from exiting the field until they are corrected. This allows
    a more elaborate, formula-driven dialog message to explain the problem. An *OnRecordCommit*
    script trigger can halt record commit until detected problems are corrected.


    #### Field Options: Storage


    The *Storage options* tab of the *Options for Entry* dialog, shown in Figure [8-7](#429700_2_En_8_Chapter.xhtml#Fig7),
    controls how information is stored and indexed within a field.


    ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig7_HTML.jpg](images/429700_2_En_8_Chapter/429700_2_En_8_Fig7_HTML.jpg)


    Figure 8-7


    The Storage tab of the options dialog for entry fields


    ##### Global Storage


    A *local field* is replicated as a unique instance of itself for each record like
    a cell in a spreadsheet where every record can contain a different value. The
    value placed within the field is considered *local* to a single record, which
    is separate and different from the same field on any other records. Local fields
    can only be displayed and accessed from the context of their parent table or a
    table related to that table. Every newly defined field starts out as local field
    but can be configured as global. A *global field* contains one value that will
    be shared across every record in the table and can be accessed from any context
    within the database. Using the spreadsheet analogy where a column represents a
    defined field and a row a record, a global field is like a column with the same
    value in every cell of that column for every row, except there is only *one value*
    that is the same from the perspective of any individual record.


    In the *Storage* tab of the *Options for Field* dialog, the *Use global storage*
    checkbox converts a field to use global storage. FileMaker will present a warning
    dialog indicating that existing values within the field will be lost when the
    change occurs. Once a field is global, it can be used for a variety of special
    purposes, including


    *   Storing a fixed value that is available to *any* calculation formula or layout
    regardless of context, e.g., a tax rate


    *   Creating a *control field* like a menu of options, e.g., a pop-up menu of
    portal filtering or sorting options


    *   Providing temporary storage for scripts to place information that needs to
    interact with other calculation fields


    *   Storing static text or graphics that will be displayed on a multiple layout
    as iconography, branding, etc


    *   Storing print report headings or other temporary information


    A global variable is preferable for most uses because it doesn’t clog up the field
    definition list. However, it is limited to a single file. A global field in a
    table occurrence added to other files allows content to be shared globally between
    files to create a *solution-wide global*.


    The value placed into a global field is retained from one session to the next
    *only* when entered on a non-hosted database that is open on a local copy of the
    *FileMaker Pro* desktop application. When opened across a network, values placed
    into a global field will not be saved between sessions and are not shared between
    users who access the file simultaneously. Each time the database is opened from
    a server host, the field will contain the value entered when it was last opened
    *locally* by the desktop application.


    Tip


    In ancient times, developers used global fields for a variety of functions that
    are now better managed with variables (Chapters [12](#429700_2_En_12_Chapter.xhtml)
    and [25](#429700_2_En_25_Chapter.xhtml)), custom functions (Chapter [15](#429700_2_En_15_Chapter.xhtml)),
    merge variables (Chapter [20](#429700_2_En_20_Chapter.xhtml)), and script parameters
    (Chapter [24](#429700_2_En_24_Chapter.xhtml)). Use global fields sparingly!'
