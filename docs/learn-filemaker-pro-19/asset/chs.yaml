  \ `SELECT` 语句本身被包含在引号中，因此内部使用的引号必须使用反斜杠进行转义。\n\n### 使用 SELECT 语句\n\n尽管 `SELECT`\
  \ 语句是 `ExecuteSQL` 函数唯一支持的语句，但它的功能非常强大。在深入研究许多不同的可选子句之前，让我们先探讨基本语句并讨论有效使用它的技巧。\n\
  \n#### 选择整个表\n\n最基本的查询是*每条记录*的*每个字段*都被选中的查询。这可以通过一个简单的语句实现。\n\n```\nSELECT * FROM\
  \ <表名>\n```\n\n该语句必须*始终*以单词 `SELECT` 开头，后跟要选择的字段以及来自哪个表的指示。在此例中，星号告知 FileMaker 选择*所有字段*。前面示例中显示的\
  \ `<表名>` 占位符被替换为实际表出现项的名称，函数将访问该表出现项的基础表。以下示例中的 `SELECT` 语句将获取 `Contact` 表中的所有字段：\n\
  \n```\nSELECT * FROM Contact\n```\n\n将其放入引号中，并用作 `ExecuteSQL` 语句的第一个参数，如下例所示：\n\n\
  ```\nExecuteSQL ( \"SELECT * FROM Contact\" ; \"\" ; \"\" )\n```\n\n在 *Learn FileMaker*\
  \ 数据库的 *示例计算* 字段中输入此公式。确认 *计算结果类型* 设置为返回*文本* 后，保存公式，然后在浏览模式下字段中应显示如图 16-1 所示的结果。结果的每个段落都是一条单独的记录，包含按创建顺序排列的每个字段值的逗号分隔列表。\n\
  \n![../images/429700_2_En_16_Chapter/429700_2_En_16_Fig1_HTML.jpg](img/429700_2_En_16_Fig1_HTML.jpg)\
  \  \n**图 16-1** SQL 查询结果示例\n\n> **注意：** 尽管本章中的示例假设该公式在计算字段中使用，但它们可以在任何公式中使用。\n\n\
  #### 选择单个字段\n\n对于你不需要表中*每条记录*的*每个字段*的情况，`SELECT` 语句可以指定单个字段。\n\n##### 指定单个字段\n\n\
  要从 `Contact` 表中选择*单个字段*，请将星号替换为字段名称，如果字段名称包含空格，请记得将其放在转义引号中。以下公式从 `Contact` 表的每条记录中选择\
  \ `Contact Address City` 字段。这将生成一个以回车符分隔的城市名称列表。请注意，该列表包含*每条*记录的字段值，因此会包含许多重复项。\n\
  \n```\nExecuteSQL ( \"SELECT \\\"Contact Address City\\\" FROM Contact\" ; \"\"\
  \ ; \"\" )\n// 结果 =\nHamilton\nAshland\nChicago\nSan Jose\nSioux Falls\nSan Jose\n\
  Ashland\n...等...\n```\n\n##### 指定多个字段\n\n要选择*多个字段*，请将其列在一个以逗号加空格分隔的字符串中：\n\n```\n\
  SELECT <字段 1>, <字段 2>, <字段 3> FROM <表名>\n```\n\n例如，要从 `Contact` 表中选择 `Contact Address\
  \ City` 和 `Contact Address State` 字段，请使用以下公式。此语句的结果将是一个以逗号分隔的城市和州名称列表。\n\n```\n\
  ExecuteSQL (\n\"SELECT \\\"Contact Address City\\\", \\\"Contact Address State\\\
  \" FROM Contact\" ; \"\" ; \"\"\n)\n// 结果 =\nHamilton,OH\nAshland,OH\nChicago,IL\n\
  San Jose,CA\nSioux Falls,SD\nSan Jose,CA\nAshland,OH\n...等...\n```\n\n#### 使用 SELECT\
  \ DISTINCT 获取唯一值\n\n要自动按字母顺序排列结果并移除重复项，请使用 `SELECT DISTINCT` 命令。以下示例将从 `Contact`\
  \ 表的 `Contact Address City` 字段生成一个按字母顺序排序的唯一值列表：\n\n```\n\"SELECT DISTINCT \\\"\
  Contact Address City\\\" FROM Contact\"\n```\n\n结果的唯一性基于*整个记录值*，而不是其中的单个字段。例如，当仅选择城市时，结果将仅包含\
  \ \"San Jose\" 的一个条目。但是，如果选择了多个字段，如下例所示的街道地址和城市，则结果将包含 San Jose 的多个条目，因为完整的记录现在包含了其他值。例如，\"\
  123 First Street,San Jose\" 与 \"1837 Fifth Ave,San Jose\" 并不完全相等，因此两者都会包含在结果中。\n\
  \n```\n\"SELECT DISTINCT \\\"Contact Address Street\\\", \\\"Contact Address City\\\
  \" FROM Contact\"\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文，并保留所有格式和代码块。\n\
  \n\n#### 重新格式化 SELECT 语句以提高清晰度\n\n与前面简短易读的示例不同，`SELECT` 语句会迅速变得复杂并换行至多行。有两种技术可用于重新格式化语句并避免视觉混乱：添加额外空格和使用\
  \ `Let` 语句。\n\n##### 使用制表符和段落回车添加额外空格\n\nFileMaker 会忽略 `sqlQuery` 文本字符串中的段落回车和制表符，因此可以使用这些字符将语句分隔成可读的块，如下模式所示。通过组合使用制表符和段落回车，可以将语句的每个子句放在单独的行上，并缩进以使其从外部语句中突出。遵循此模式将使语句更易于阅读：\n\
  \n```\nExecuteSQL ( \"\nSELECT \nFROM \nJOIN  ON \nWHERE \nORDER BY \n\" ; \"\"\
  \ ; \"\" )\n```\n\n当使用多个字段、查找条件或其他组件时，可以将它们推到单独的行上，并进一步缩进以提高清晰度，如下模式所示：\n\n```\n\
  ExecuteSQL ( \"\nSELECT\n,\n,\n\nFROM \nJOIN  ON \nWHERE\n and\n and\n\nORDER BY\n\
  ,\n\n\" ; \"\" ; \"\" )\n```\n\n##### 使用 LET 语句\n\n消除复杂查询视觉混乱的另一种方法是使用 `Let` 语句。整个\
  \ `SELECT` 查询可以分部分构建，使用单独的变量，最终组合成单个变量并插入到 `ExecuteSQL` 语句中，如下例所示：\n\n```\nLet (\
  \ [\nsFields = \"SELECT \" ;\nsTable = \"FROM  \" ;\nsJoin = \"JOIN  ON  \" ;\n\
  sWhere = \"WHERE  \" ;\nsGroup = \"GROUP BY  \" ;\nSQL = sFields & sTable & sJoin\
  \ & sWhere & sGroup\n] ;\nExecuteSQL ( SQL ; \"\" ; \"\" )\n)\n```\n\n提示：创建一个自定义函数来接受字段引用和其他条件，并返回查询语句。\n\
  \n#### 探索别名的好处\n\n`别名`是一个简短的文本字符串，可以在 `SELECT` 语句的其他地方充当表名的代理。当一个 `SELECT` 语句包含对多个表的重复引用时（例如在\
  \ `JOIN` 子句中，本章稍后讨论），可以使用别名来标识包含某个字段的表。尽管别名可以由任意数量的字符组成，但作为节省空间的方法，越短越好。要建立别名，请在标识表之后使用\
  \ `AS` 子句，并跟一个文本别名，如下模式所示：\n\n```\nSELECT  FROM  AS \n```\n\n例如，要为 `Contact` 表创建别名\
  \ `c`，请按如下格式：\n\n```\nSELECT  FROM Contact AS c\n```\n\n一旦建立了别名 `c`，它就可以在任何子句中用作任何字段名的前缀，以标识该字段所属的表。虽然从单个表中选择字段时不需要别名，但以下示例演示了别名的工作原理。请注意，别名是在语句末尾定义的，但可以在前面的子句中使用。\n\
  \n```\nSELECT c.Notes FROM Contact AS c\n```\n\n当名称中包含空格的字段用双引号括起来时，别名前缀应位于引号外的名称之前。\n\
  \n```\nSELECT c.\\\"Contact First Name\\\" FROM Contact AS c\n```\n\n尽管在以下简短的示例中别名不是必需的，但为了演示带或不带别名的格式，以下每个语句都会生成完全相同的结果：\n\
  \n```\nSELECT Notes FROM Contact\nSELECT Contact.Notes FROM Contact\nSELECT c.Notes\
  \ FROM Contact AS c\n```\n\n注意：别名将在本章后面的更复杂示例中使用。\n\n### 在字段列表中插入文字文本\n\n文字文本字符串可以插入到\
  \ `SELECT` 语句中的字段名称之前、之间和之后，并且会为每条记录重复显示在结果中。文字必须用单引号括起来，并用逗号分隔。此示例演示了在字段结果中插入了一个\
  \ `'Name:'` 标签。\n\n```\nExecuteSQL ( \"\nSELECT\n'Name: ',\n\\\"Contact Name First\\\
  \",\n\\\"Contact Name Last\\\"\nFROM Contact\"\n; \" \" ; \"\" )\n// 结果\nName: Cynthia,Johnson\n\
  Name: Karen,Camacho\nName: Sandy,Robinson\nName: Thomas,Smithfield\n```\n\n### 连接结果\n\
  \n查询可以包含使用 `连接`（将事物链接在一起形成链条或系列的操作）将单独的字段值预处理为组合结果的指令。不是接收原始的、逗号分隔的字段名称集（这需要进一步解析和处理），连接提供了更有用的结果。这可以使用\
  \ `+` 或 `||` 运算符来实现，尽管后者更可靠，且不太可能与数学计算中使用的相同运算符混淆。以下示例查询显示了名字和姓氏被连接成一个字符串，并在它们之间插入了一个空格：\n\
  \n```\nExecuteSQL ( \"\nSELECT \\\"Contact Name First\\\" || ' ' || \\\"Contact\
  \ Name Last\\\"\nFROM Contact\n\" ; \"\" ; \"\" )\n// 结果\nCynthia Johnson\nKaren\
  \ Camacho\nSandy Robinson\nThomas Smithfield\n```\n\n或者，使用加号分隔符会产生相同的结果。\n\n```\n\
  SELECT \\\"Contact Name First\\\" + ' ' + \\\"Contact Name Last\\\"\n```\n\n在前面两个简单的示例中，通过在\
  \ `fieldDelimiter` 参数中放置一个空格也可以获得相同的结果。但是，当选择更多字段时，连接允许在不同字段集之间使用不同的分隔符，而字段分隔符对于每个字段都是相同的。以下示例展示了一个更现实的例子，它结合使用连接和自定义分隔符，将联系人的全名和邮寄地址作为三段式结果返回。名字-姓氏和城市-州-邮政编码分别被连接，然后自定义字段和记录分隔符将结果格式化为邮寄地址列表。\n\
  \n```\nExecuteSQL ( \"\nSELECT\n\\\"Contact Name First\\\" + ' ' + \\\"Contact Name\
  \ Last\\\",\n\\\"Contact Address Street\\\",\n\\\"Contact Address City\\\" + ',\
  \ ' +\n\\\"Contact Address State\\\" + ' ' +\n\\\"Contact Address Zip\\\"\nFROM\
  \ Contact\" ; \"¶\" ; \"¶¶\" )\n// 结果\nCynthia Johnson\n123 Main Street\nYoungstown,\
  \ OH 44504\nKaren Camacho\n42 Memory Lane\nBrooklyn, NY 11111\nSandy Robinson\n\
  631 Front Street\nLafayette, IN 47901\n```\n\n### 使用 WHERE 子句\n\n向 `SELECT` 语句添加\
  \ `WHERE` 子句允许查询根据搜索条件定位特定记录。`<formula>` 部分可以包含一个或多个表达式，这些表达式定义了用于匹配记录的条件，通常包括一个字段、一个运算符和一个搜索值。\n\
  \n```\nSELECT  FROM  WHERE \n```\n\n#### 创建包含单个表达式的 WHERE 子句\n\n要将结果限制为来自加利福尼亚州的联系人，`WHERE`\
  \ 公式将由字段名称（如果需要则加引号）、作为运算符的等号和单引号中的 `'CA'` 组成。以下示例通过请求该州内每个联系人的名字和姓氏来演示这一点。请记住，当将其插入到\
  \ `ExecuteSQL` 函数调用中时，整个语句将用引号括起来，并且字段名称周围的引号需要用反斜杠进行转义。\n\n```\nSELECT\n\"Contact\
  \ Name First\",\n\"Contact Name Last\"\nFROM Contact\nWHERE \"Contact Address State\"\
  \ = 'CA'\n```\n\n#### 创建包含多个表达式的 WHERE 子句\n\n对于复杂条件，`WHERE` 子句可以包含多个搜索表达式，这些表达式由比较运算符\
  \ `AND` 或 `OR` 分隔。例如，当搜索居住在一个许多州都有的城市（如 `'Milford'`）的联系人时，使用两个表达式来指定城市和州。为此，在两个表达式之间使用\
  \ `AND` 运算符，要求结果同时匹配两个条件。\n\n```\nWHERE \"Contact Address City\" = 'Milford' AND\
  \ \"Contact Address State\" = 'PA'\n```\n\n类似地，要查找来自两个不同州（例如，来自宾夕法尼亚州或俄亥俄州）的联系人，请使用\
  \ `OR` 运算符以允许结果包含来自任一表达式的结果。\n\n```\nWHERE \"Contact Address State\" = 'PA' OR \"\
  Contact Address State\" = 'OH'\n```\n\n\n\n"
- "# 使用 `ORDER BY` 子句\n\n可以添加 `ORDER BY` 子句来指定结果排序。\n\n```\nSELECT  FROM  ORDER BY\
  \ \n```\n\n以下示例返回按州排序的每个联系人的姓氏列表。\n\n```\nSELECT \"Contact Name Last\" FROM Contact\
  \ ORDER BY \"Contact Address State\"\n```\n\n将 `ORDER BY` 与 `WHERE` 子句结合使用，以下示例将返回居住在城市名为‘Milford’的每个联系人的姓氏，并按州排序。\n\
  \n```\nSELECT \"Contact Name Last\"\nFROM Contact\nWHERE \"Contact Address City\"\
  \ = 'Milford'\nORDER BY \"Contact Address State\"\n```\n\n"
- "# 使用 `JOIN` 子句\n\n添加 `JOIN` 子句会在两个表实例之间创建一个临时关系，该关系仅在 SQL 查询执行期间存在。它们用于从两个表中选择字段并返回混合结果。`JOIN`\
  \ 允许其他子句（如 `WHERE` 或 `ORDER BY`）引用任一表或两个表中的字段。例如，可以选择相关的*公司*记录位于特定州的*联系人*记录，并且结果联系人列表可以按公司名称排序。`JOIN`\
  \ 子句包含一个表名，该表应与 `FROM` 表建立关系，并使用一个表达式来表述用于形成临时关系的条件。完整的公式模式如下所示：\n\n```\nSELECT\
  \  FROM  JOIN  ON \n```\n\n以下示例连接*联系人*和*公司*表，以选择每个联系人的名字及其关联的公司名称，条件是在*联系人*（别名为\
  \ `con`）中的 *Contact Company ID* 字段等于*公司*（别名为 `com`）中的 *Record ID* 字段。它为表分配了别名，并在字段列表和连接子句中将其用作前缀。\n\
  \n```\nSELECT\ncon.\"Contact Name First\",\ncom.\"Company Name\"\nFROM Contact AS\
  \ con\nJOIN Company AS com ON\ncon.\"Contact Company ID\" = com.\"Record ID\"\n\
  ```\n\n"
- '# 使用 `GROUP BY` 子句


  添加 `GROUP BY` 子句会基于一个或多个字段生成一个*聚合值*。这相当于原生 FileMaker 汇总字段的 SQL 版本（第 8 章）；两者都基于排序分组字段生成数据汇总。例如，如果*联系人*表有一个名为*State*的字段和另一个名为*Invoices*（包含客户发票金额总额）的字段，以下*不带*
  `GROUP BY` 子句的代码将返回每个联系人记录的*State*和*Invoice*金额列表，如下例所示：


  ```

  SELECT State, Invoices FROM Contact ORDER BY State

  // 结果 =

  AK,1000

  AK,500

  AK,250

  AZ,500

  AZ,750

  等其他

  ```


  通过对*Invoices*字段使用 *Sum* 函数，并添加一个指定*State*字段的 `GROUP BY` 子句，以下示例将返回按州汇总的发票金额摘要。请注意，此示例中已移除了
  `ORDER BY` 子句。这不是必需的，因为 `GROUP BY` 子句会对记录进行排序以便分组和汇总结果。


  ```

  SELECT State, Sum ( Invoices ) FROM Contact GROUP BY State

  // 结果 =

  AK,1750

  AZ,1250

  CA,2500

  ```


  ## 添加 `HAVING` 子句


  组合使用 `HAVING` 和 `GROUP BY` 子句允许语句定义将包含哪些*分组结果*，其作用类似于 `WHERE` 子句，但针对的是汇总结果。基于前面的示例，以下示例使用
  `HAVING` 子句仅包含*发票汇总*大于某个金额的州的结果。这里，前一个示例中 `AZ` 的汇总条目已被移除，因为汇总总计 `1250` 低于 `HAVING`
  子句中指定的阈值 `1500`。


  ```

  SELECT State, Sum ( Invoices ) FROM Contact GROUP BY State HAVING Sum ( Invoices
  ) > 1500

  -- 结果 =

  AK,1750

  CA,2500

  ```


  '
- "# 使用 `UNION` 子句\n\n添加 `UNION` 子句可以合并两个或多个 `SELECT` 语句的结果，无论这些语句是来自具有相同或不同标准的同一个表，还是来自不同的表，只要每个语句选择的字段数量相同，并且每个字段位置的数据类型在所有语句中都一致。例如，如果第一个\
  \ `SELECT` 语句返回三个字段，数据类型分别为*文本*、*数字*和*文本*，那么第二个 `SELECT` 语句也必须返回三个字段，且具有相同顺序的相同数据类型。以下是在两个\
  \ `SELECT` 语句之间添加 `UNION` 的简化模式，未显示可以包含在其中任一或两个语句中的其他子句。\n\n```\nSELECT  FROM  UNION\
  \ SELECT  FROM \n```\n\n默认情况下，此子句会自动从合并结果中排除重复条目。使用 `UNION ALL` 可包含所有结果，即使有重复项也不例外。\n\
  \n"
- '# 限制查询结果


  `OFFSET` 和 `FETCH FIRST` 子句可以单独使用或联合使用，以控制查询返回的结果数量。


  ## 使用 `OFFSET` 子句


  `OFFSET` 子句用于指定要从结果顶部排除的记录数量。此示例将排除前 20 条记录，并从第 21 条记录开始返回结果：


  ```

  SELECT "Record ID" FROM Contact OFFSET 20 ROWS

  ```


  ## 使用 `FETCH FIRST` 子句


  `FETCH FIRST` 子句限制返回的行数。此示例将仅返回前十条结果：


  ```

  SELECT "Record ID" FROM Contact FETCH FIRST 10 ROWS ONLY

  ```


  ## 组合使用 `OFFSET` 和 `FETCH FIRST` 子句


  `OFFSET` 和 `FETCH FIRST` 子句的组合可以从结果中获取特定的记录组。这允许以一系列小批次的方式提取结果子集，通常称为*分页结果*，其中每个查询一次返回一“页”结果。`OFFSET`
  部分指示所需组的起始位置，`FETCH FIRST` 部分限制从该起始点访问的记录数量。以下代码展示了若干访问记录批次的示例，每次十批。


  ```

  SELECT "Record ID" FROM Contact FETCH FIRST 10 ROWS ONLY

  SELECT "Record ID" FROM Contact OFFSET 10 ROWS FETCH FIRST 10 ROWS ONLY

  SELECT "Record ID" FROM Contact OFFSET 20 ROWS FETCH FIRST 10 ROWS ONLY

  SELECT "Record ID" FROM Contact OFFSET 30 ROWS FETCH FIRST 10 ROWS ONLY

  SELECT "Record ID" FROM Contact OFFSET 40 ROWS FETCH FIRST 10 ROWS ONLY

  ```


  第一个语句返回记录 1 到 10，第二个返回记录 11 到 20，第三个返回记录 21 到 30，依此类推。使用此技术，界面元素可以允许用户一次一“页”地在结果组中来回点击。


  '
- '# 访问数据库模式


  `ExecuteSQL` 函数能够访问两个提供数据库模式元信息的系统表：`FileMaker_Tables` 和 `FileMaker_Fields`。这些表可以在
  `SELECT` 语句中像使用自定义表实例一样使用，以访问构成数据库结构的表和字段的信息。




  ### 选择 FileMaker_Tables


  `FileMaker_Tables`表包含一个虚拟记录，针对关系图中定义的每个*表出现*，并包含以下信息字段：


  - `TableName` – 表出现的名称

  - `TableID` – 表出现的标识号

  - `BaseTableName` – 表出现的基础表名称

  - `BaseFileName` – 出现的基础表所在文件的名称

  - `ModCount` – 自创建以来对表结构进行的修改次数


  要选择数据库中每个表出现的所有五个字段，请在`ExecuteSQL`函数中使用以下查询公式：


  ```

  "SELECT * FROM FileMaker_Tables"

  // 结果 =

  Company,1065101,Company,Learn FileMaker,20

  Company | Contact,1065105,Contact,Learn FileMaker,24

  Contact,1065102,Contact,Learn FileMaker,24

  Contact | Company,1065106,Company,Learn FileMaker,20

  Project,1065103,Project,Learn FileMaker,4

  Project | Company,1065107,Company,Learn FileMaker,20

  Sandbox,1065089,Sandbox,Learn FileMaker,134

  ```


  此示例指定只返回`TableName`字段的结果：


  ```

  "SELECT TableName FROM FileMaker_Tables"

  // 结果 =

  Company

  Company | Contact

  Contact

  Contact | Company

  Project

  Project | Company

  Sandbox

  ```


  此示例使用`SELECT DISTINCT`和`BaseTableName`将结果限制为实际的表名称：


  ```

  "SELECT DISTINCT BaseTableName FROM FileMaker_Tables"

  // 结果 =

  Company

  Contact

  Project

  Sandbox

  ```


  ### 选择 FileMaker_Fields


  `FileMaker_Fields`表包含一个虚拟记录，针对数据库中定义的每个*字段*，并提供以下可用元信息：


  - `TableName` – 字段的表出现的名称

  - `FieldName` – 字段的名称

  - `FieldType` – 文件的 SQL 数据类型

  - `FieldID` – 字段的标识号

  - `FieldClass` – 字段的类别：`Normal`、`Summary`或`Calculated`

  - `FieldReps` – 定义的最大重复次数

  - `ModCount` – 自创建以来对字段进行的修改次数


  此示例返回数据库中每个表每个字段的所有七个值：


  ```

  "SELECT * FROM FileMaker_Fields"

  ```


  由于此系统表包含基于*表出现*的字段，如果基础表有多个出现，结果将包含重复项。迭代过程（如`While`函数（第[13]章）、递归自定义函数（第[15]章）或循环脚本（第[25]章“使用重复语句迭代”））可以获取每个基础表的名称，然后逐步通过这些名称检索每个表的字段，从而避免重复。以下示例展示了一个简单的`While`语句，演示了如何做到这一点：


  ```

  While (

  [

  baseTables =

  ExecuteSQL ( "SELECT DISTINCT BaseTableName FROM FileMaker_Tables" ; "" ; "" ) ;

  result = ""

  ] ;

  baseTables ≠ "" ;

  [

  current.table = GetValue ( baseTables ; 1 ) ;

  baseTables = RightValues ( baseTables ; ValueCount ( baseTables ) - 1 ) ;

  current.fields =

  ExecuteSQL (

  "SELECT * FROM FileMaker_Fields WHERE TableName=''" & current.table & "''" ; ""
  ; ""

  ) ;

  result = result & current.fields

  ] ;

  result

  )

  ```


  ## 探索其他 SQL 功能


  除了本章涵盖的内容之外，FileMaker 还包含额外的 SQL 功能。可以将许多函数嵌入到`SELECT`语句中以处理结果，其中许多函数提供的功能类似于 FileMaker
  自己的函数。有多种命令可用于处理日期、时间和字符串。数值可以进行聚合或用于数学计算。可以嵌入条件操作，并且可以将许多运算符与字段值和 SQL 函数一起使用来处理结果。`Execute
  SQL`脚本步骤允许对来自外部数据库的外部 ODBC/JDBC 数据源进行更强大的操作。此外，FileMaker 数据库可以用作 ODBC/JDBC 数据源，并支持来自外部数据库的
  SQL 查询。有关这些主题的更多信息，请访问[*www.*`claris.com`](http://www.claris.com)并搜索`FileMaker ODBC
  and JDBC Guide`或`FileMaker SQL Reference`文档。


  ## 总结


  本章介绍了使用`ExecuteSQL`函数的基础知识，并提供了`SELECT`语句许多功能的示例。在下一章中，我们将开始探索布局设计，为用户提供访问数据结构界面的入口。


  '
- '# 第四部分 设计用户界面


  界面为用户和脚本与存储在基础表结构中的数据进行交互提供了接入点。它是数据库最突出的部分，可以说是最重要的部分之一。以下章节探讨布局设计的基础知识：


  1.  介绍布局

  2.  布局入门

  3.  探索布局面板

  4.  创建布局对象

  5.  操作对象

  6.  使用主题和样式

  7.  自定义菜单


  '
- '# 17. 介绍布局


  *布局*是开发者设计的图形模板，定义了如何渲染记录、字段和对象以产生交互式体验。每个数据库窗口一次显示一个布局。在特定时刻激活的布局字面上称为*当前布局*。当数据库打开时，这是一个根据数据库配置方式选择的默认布局。它可能是在*文件选项*（第[6]章）中选择的布局、由*脚本触发器*（第[27]章）打开的布局，或者在本地计算机上运行时文件关闭时最后打开的布局。与
  Claris 入门解决方案中方便的预定义布局不同，自定义数据库从一个空布局开始，开发者必须从中设计界面。本章通过介绍布局基础知识开始探讨界面设计，包括：


  - 理解上下文访问

  - 剖析布局

  - 规划布局

  - 使用布局模式




  '
- "# 理解上下文访问\n\n每个布局都分配了一个表出现，并充当一个*界面上下文*，该上下文对应于该分配的*关系上下文*。这从后端数据向用户界面延伸出一个特定的关系视角，形成一个交叉的上下文点，用户和脚本可以在此创建、删除、编辑、查找、打印和查看存储在基础表中的记录。该出现分配决定了在布局处于当前状态时可以访问哪些记录和字段。任何属于布局表出现本地的字段，或者与表出现相关的其他出现中的字段，都可以放置在布局上、供用户查看，并用于嵌入到布局对象、脚本和菜单中的计算。\n\
  \n图 17-1 中的插图展示了一个用户正在查看*联系人 – 录入*布局，该布局通过主要*联系人*表出现的上下文显示来自*联系人*表的记录。任何来自*联系人*表并放置在该布局上的字段，都将呈现当前正在查看的记录所存储的值。此外，通过*联系人\
  \ | 公司*出现，可以将来自*公司*表的字段放置在布局上。这将根据两个出现之间的关系标准自动拉取记录，并仅显示匹配的记录（第 9 章）。*联系人 – 列表*布局分配了相同的出现，因此它显示来自相同关系上下文的记录。在同一窗口中切换这两个联系人布局将保留当前记录和当前找到集。相比之下，*公司\
  \ – 列表*布局通过主要的*公司*出现显示来自*公司*表的记录，但不能包含来自*联系人*表的字段，因为这两个出现目前没有关联。\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig1_HTML.jpg](img/429700_2_En_17_Fig1_HTML.jpg)\n\
  \n**图 17-1**  \n表、出现、布局和窗口如何相互连接以呈现界面的示意图\n\n"
- "# 剖析布局\n\n*布局*是一个可配置的空间，包含一个或多个水平区域的堆栈，这些区域构成单个屏幕或页面。如后续章节所述，这些*布局部分*有多种类型，每种类型都具有固有的和可配置的属性，这些属性决定了它们的渲染外观和行为。根据布局的功能需求，可以添加、重新排列和配置不同组合的部分。放置在部分上的字段和其他对象具有其自身的固有和可配置属性。这些元素共同定义了一个布局。在浏览模式下渲染时，当用户或脚本从开发者启用的*内容视图*中选择或更改窗口模式时（第\
  \ 3 章），布局可以以不同的方式查看。图 17-2 中的插图使用一个简单布局的示例展示了常规的布局结构，以及控制其如何为用户渲染的各种查看选项。\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig2_HTML.jpg](img/429700_2_En_17_Fig2_HTML.jpg)\n\
  \n**图 17-2**  \n布局结构示意图\n\n"
- "# 规划布局\n\n布局的复杂性将根据其用途、特定工作流程的需求、预算限制以及开发设计人员的技能而有所不同。一个快速构建的类似电子表格的表格视图可以提供满足特定需求的临时简便性。在充满经验丰富的专业用户的现代工作场所中，更精致的设计通常更合适，甚至可能是期望的。设计不佳的布局会变得杂乱、令人困惑、视觉上如同噩梦，从而挫伤用户的工作能力。这样的“解决方案”往往带来的问题比解决的更多。一个设计良好的布局，范围可以从朴素但实用的设计，一直到艺术表现、功能强大、可视化高效、预测用户需求并以便捷直观的方式提供强大省时工具来操作和重新利用数据的图形化杰作。无论采用何种方法，布局设计和规划都很重要。用户与数据库的整个体验都是*通过*布局进行的。该布局设计的外观和功能将极大地影响他们对数据库以及作为其开发者的*您的*评价。\n\
  \n> **警告**  \n> 在学习或构建概念验证时，设计可以暂时不那么重要。本书中的示例仅出于演示目的而简单创建，并不旨在作为优秀设计的范例！\n\n在设计界面时，首先为你为每个表设想的布局列出清单。通常，每个表至少需要一个列表布局和一个表单布局，以允许用户执行基本功能，例如，滚动查找集以定位所需记录，然后导航到展开的布局进行查看和数据录入。除此之外，布局将根据信息的性质、公司工作流程以及其他考虑因素而有所不同。有些表需要用于打印信封、标签或财务报表的布局。其他表则需要用于特殊数据录入任务或与移动设备小屏幕交互的布局。可以创建布局作为告知和引导用户的对话框，或者提供针对特定任务优化的工作区。在开发期间甚至部署后，可以随时添加额外的布局，因此不必预先规划每一个布局。但一个好的初始计划很重要。\n\
  \n在创建了所需布局的列表后，将它们连接成一个导航流程图，以帮助直观地了解用户将如何在界面中移动。即使是一张粗略的草图也很有帮助，例如图 17-3 中所示。该图显示了*学习\
  \ FileMaker*数据库的粗略表示，其中包含一个添加的菜单布局和用于假设的未来布局的各种占位符。请记住，导航箭头说明了布局之间的大致界面连接。在实际界面中，导航功能可能复杂得多，具体取决于表的数量、它们之间的关系、你开发的导航控件样式以及其他因素。目前，此图只是为你提供了一个流程的“大图”概览。一旦你至少有了一份粗略的计划，就可以进入布局模式并开始探索用于设计界面的环境。\n\
  \n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig3_HTML.jpg](img/429700_2_En_17_Fig3_HTML.jpg)\n\
  \n**图 17-3**  \n一个带有扩展占位符的简单布局流程的粗略草图\n\n布局名称可以采用你想要的任何形式。理想情况下，它们包含所代表表的名称以及描述其一般功能的某些内容。尽管\
  \ FileMaker 允许布局同名，但请保持名称唯一以避免混淆。*学习 FileMaker* 演示文件使用主表的名称作为主要表单布局的名称，对于其他布局，则使用相同名称加上描述符，例如*发票*、*发票列表*和*发票报表*。\n\
  \n\n\n"
- "# 使用布局模式\n\n`布局模式`是一种备选窗口状态，在此状态下，整个应用程序环境会进行转换，以适应布局设计工作。在此模式下，工具栏按钮和菜单项会发生变化，以提供对界面相关功能的控制。窗口的每一侧都有可选的布局窗格，用于访问字段、对象、插件和配置设置（第\
  \ 19 章）。整个内容区域变为一个可编辑的工作区，您可以在其中添加、配置对象并设置其样式，以控制它们在其他模式下的呈现方式（第 20 章和第 21 章）。可以通过选择\
  \ `查看 ➤ 布局模式` 菜单或单击工具栏中的 `编辑布局` 按钮来启动布局模式。\n\n## 状态工具栏（布局模式）\n\n当窗口进入布局模式时，工具栏中可用的选项将发生显著变化。用于管理记录和执行数据输入任务的浏览模式控件将被用于向布局添加对象和执行其他设计相关功能的工具所取代。可用的控件要么是默认的布局模式项目，要么是用户自定义的集合。\n\
  \n### 默认状态工具栏项目（布局模式）\n\n布局模式的默认状态工具栏如图 17-4 所示。\n\n![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig4_HTML.jpg](img/429700_2_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4\n\n布局模式的状态工具栏\n\n1.  导航控件\n2.  新建布局/报表按钮\n3.  布局工具\n4.  开发者菜单和窗格切换\n5.\
  \  布局菜单\n6.  布局设置按钮\n7.  主题选择\n8.  屏幕和设备尺寸菜单\n9.  格式化栏按钮\n10. 退出布局按钮\n\n#### 导航控件\n\
  \n工具栏左上角是导航控件，它们的外观和功能与浏览模式（第 3 章）相似，但区别在于它们指的是并控制*布局*而非*记录*。总数指的是当前文件中存在的布局总数，文本框中的数字表示当前正在查看的是哪个布局。\n\
  \n> **警告**\n> \n> 尽管在此提及，但最新版本的 FileMaker *排除了*默认布局模式工具栏中的导航控件。请自定义工具栏以添加这些基本工具。\n\
  \n#### 新建布局/报表按钮\n\n默认工具栏中仅有的功能按钮是 `新建布局/报表`，它用于启动创建新布局的过程（第 18 章）。其他功能按钮，如 `删除布局`\
  \ 和 `复制布局`，可以通过自定义工具栏来添加。\n\n#### 布局工具\n\n中央一排图标是布局对象工具，定义在表 17-1 中。大多数是*对象创建工具*，用于插入对象的新实例（第\
  \ 20 章）。其中大部分是*绘图模式激活工具*，选中后，可以通过在布局创建区域内单击并拖动来创建对象。这些都是临时性选择，在创建对象后会取消激活并恢复为选择工具。双击其中之一可将其锁定，以便快速连续创建多个相同类型的对象，而无需重新选择工具。该工具将保持激活状态，直到选择了另一个工具。许多工具有双重模式：单击以创建默认对象类型，或按住单击以显示相似对象类型的菜单。其中两个对象创建工具是*拖放插入工具*，它们从工具栏拖放到内容区域以启动创建字段或布局部分。最后，两个工具是*对象操作工具*，用于选择对象或应用格式。\n\
