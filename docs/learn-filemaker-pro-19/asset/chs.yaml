  \ | 对象已分配工具提示文本。 |\n\n### 插入菜单\n\n在布局模式下，*插入*菜单的选项会发生巨大变化，如图 17-8 所示。\n\n`![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig8_HTML.jpg](img/429700_2_En_17_Fig8_HTML.jpg)`\n\
  \n*图 17-8* 浏览模式（左）和布局模式（右）下的“插入”菜单\n\n前两个部分与布局模式工具栏的工具相对应，提供了插入任何类型布局对象的替代方法。中间部分是用于插入*图片*或放置*当前日期*、*当前时间*和*当前用户名*等静态文本的功能。这些功能下方是用于插入*动态占位符符号*的功能，这些占位符符号是经过特殊格式化的文本，在非布局模式下渲染布局时，会自动替换为当前值。这些符号包括：\n\
  \n- *日期符号* – 当前日期；`{{CurrentDate}}`\n- *时间符号* – 当前时间；`{{CurrentTime}}`\n- *用户名符号*\
  \ – 用户的计算机名称；`{{UserName}}`\n- *页码符号* – 打印或预览页面时的当前页码；`{{PageNumber}}`\n- *记录编号符号*\
  \ – 当前记录在找到的记录集中的编号；`{{RecordNumber}}`\n- *其他符号* – 打开一个列出上百个符号的对话框\n\n最后，菜单底部的两个选项用于插入合并值：\n\
  \n- *合并字段* – 打开“指定字段”对话框，并将选定字段作为*合并字段*插入；`<<FieldName>>`\n- *合并变量* – 插入一个起始标签，可将其编辑为特定变量；`<<$$>>`\n\
  \n> **注**：动态占位符符号、合并字段和合并变量也将在第 20 章“处理文本”中讨论。\n\n### 格式菜单\n\n在布局模式下，*格式*菜单的选项会发生变化，如图\
  \ 17-9 所示。菜单项会根据当前选择启用或禁用。\n\n`![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig9_HTML.jpg](img/429700_2_En_17_Fig9_HTML.jpg)`\n\
  \n*图 17-9* 浏览模式（左）和布局模式（右）下的“格式”菜单\n\n- *方向* – 包含两个选项的子菜单：*水平*为默认选项，*垂直（仅限亚洲文本）*。\n\
  - *设置选项* – 菜单的此部分包含一系列*设置*菜单项，这些菜单项根据当前对象启用。选择其中一项将打开相应的设置对话框，如同双击该对象一样（第 20 章）。\n\
  - *格式刷* – 执行与工具栏中*格式刷*工具相同的功能，复制当前对象的格式设置并将其应用于下一个选定的对象。\n- *条件* – 打开*条件格式*对话框（第\
  \ 21 章）。\n- *设置脚本触发器* – 打开*设置脚本触发器*对话框（第 27 章）。\n\n### 布局菜单\n\n*布局*菜单取代了浏览模式下的*记录*菜单，提供了与管理、设计和配置布局相关的功能，如图\
  \ 17-10 所示。\n\n`![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig10_HTML.jpg](img/429700_2_En_17_Fig10_HTML.jpg)`\n\
  \n*图 17-10* “布局”菜单是布局模式独有的\n\n> **注**：关于管理布局的进一步讨论，请参阅第 18 章。\n\n以下功能在此菜单中可用：\n\n\
  - *新建布局/报表* – 开始创建新布局的流程\n- *复制布局* – 复制当前布局\n- *删除布局* – 在警告后删除当前布局\n- *转到布局* – 用于转到另一个布局的子菜单选项：*下一个*、*上一个*或按编号\n\
  - *更改主题* – 打开“更改主题”对话框，为布局分配不同的主题（第 22 章）\n- *布局设置* – 打开“布局设置”对话框（第 18 章）\n- *部件设置*\
  \ – 打开“部件设置”对话框（第 18 章）\n- *设置 Tab 键顺序* – 打开一个对话框，用于配置浏览模式下的 Tab 键顺序（第 21 章）\n-\
  \ *保存布局* – 在保持布局模式的同时保存所有未保存的更改\n- *还原布局* – 放弃所有未保存的更改，并将布局还原到之前保存的状态，同时保持布局模式\n\
  \n### 排列菜单\n\n*排列*菜单是布局模式独有的，提供对象排列功能的访问，如图 17-11 所示。这包括分组、锁定、堆叠顺序、旋转、对齐、分布和调整大小的功能，并在第\
  \ 21 章中描述。\n\n`![../images/429700_2_En_17_Chapter/429700_2_En_17_Fig11_HTML.jpg](img/429700_2_En_17_Fig11_HTML.jpg)`\n\
  \n*图 17-11* “排列”菜单项\n\n## 摘要\n\n本章介绍了布局模式，并指出了窗口、工具栏和菜单的变化。在下一章中，我们将定义布局部件并开始创建布局。\n\
  \n"
- "# 18. 布局入门\n\n继续介绍布局基础知识，本章涵盖以下主题：\n\n-   处理布局部件\n-   添加布局\n-   删除布局\n-   使用管理布局对话框\n\
  -   优化布局性能\n\n\n\n## 使用布局区段\n\n*布局区段*是布局设计区域中的一个水平切片，其中包含的对象共同渲染成一个界面。每个布局必须至少包含*一个*区段，但可以根据设计需求由多个区段组成。这里有几种可用的区段类型，它们会影响内部包含的组件如何显示和运作。根据布局的创建方式以及过程中选择的选项，每个新布局通常至少包含三个默认区段：*页眉*、*主体*和*页脚*。\n\
  \n### 定义布局区域和控件\n\n布局模式中有几个重要的区域和控件，如图 18-1 中高亮所示。\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig1_HTML.jpg](img/429700_2_En_18_Fig1_HTML.jpg)\n\
  \n**图 18-1**  \n一个典型布局，高亮显示了各种区域和控件\n\n*区段标签*是附加在每个区段左侧的一个小方框。它包含区段类型名称，并且是多功能按钮，提供三种功能的访问入口。要打开配置对话框，请双击区段标签。按住\
  \ `Command`（macOS）或 `Windows`（Windows）键单击一次，可将标签切换为垂直或水平方向。当标签为水平方向时，拖动标签可以比单击区段之间的线条更轻松地调整区段大小，尽管有时区段标签可能会妨碍布局对象。当标签为垂直方向时，情况则相反，如图\
  \ 18-1 所示。右键单击标签会打开一个上下文菜单，其中包含打开区段配置对话框、为区段选择填充颜色或为区段应用样式（第 22 章）等选项。\n\n*屏幕上的区段设计区域*是布局空间中从窗口左侧延伸到区段边界的水平切片。这个区段*堆栈*构成了布局设计区域，代表着在非布局模式渲染时将成为窗口内容区域的部分。可以在现有区段下方或之间插入新区段，将区段堆栈进一步向下扩展到屏幕下方的*屏幕外区段扩展*区域。只要至少保留一个区段，就可以从布局中删除未使用的区段。\n\
  \n*区段边界*是一条垂直线，它将左侧可见的*区段堆栈*与右侧的*屏幕外开发者区域*分隔开来。在其他模式下查看时，该边界左侧的所有内容将呈现为内容区域，而右侧的所有内容将隐藏在屏幕外不可见。右侧的屏幕外区域可用于存储开发者笔记和其他对用户不可见的布局元素。\n\
  \n**提示：** 放置在屏幕外区域中、为快速查找（第 4 章）配置的字段仍会产生结果。\n\n#### 调整区段区域大小\n\n区段可以在垂直和水平方向上调整大小，任何尺寸都不能超过\
  \ 32,000 x 32,000 点的最大限制。要*垂直调整*区段大小，将光标定位在区段区域下方的线上，直到光标变为一条短的水平黑线，线两侧各有一个向上和向下的箭头。然后，单击并向上或向下拖动光标，以收缩或扩展线上方区段的高度。当区段标签水平显示时，您可以抓取标签并拖动来调整区段大小。要*水平调整*整个区段堆栈的大小，将光标定位在区段边界的任意位置，直到它变为一条短的垂直黑线，线两侧各有一个向左和向右的箭头。然后，单击并向左或向右拖动光标，根据需要收缩或扩展区段堆栈的宽度。或者，选择一个区段标签，并在*检查器面板*（第\
  \ 19 章）的*位置*设置中调整宽度和高度值。\n\n### 定义区段类型\n\n这里有十种不同的区段类型，每种都有特定的固有属性。它们可以分为两类：*标准区段*和*汇总区段*。\n\
  \n#### 定义标准区段\n\n*标准区段*显示对象而不具备任何汇总功能。每个布局中每种标准区段仅限于一个*实例*，并且它们*必须*遵循自动强制执行的堆叠顺序。有七种不同的标准区段类型（按顺序排列）：\n\
  \n- *顶部导航* – 用于屏幕上的导航按钮和其他控件。此区段不会打印，并且在更改窗口视图设置时不会放大或缩小。\n- *标题页眉* – 打印时出现在顶部，替换第一页上的*页眉*。在浏览模式下不显示。\n\
  - *页眉* – 出现在顶部，但若存在*标题页眉*，则打印第一页时除外。\n- *主体* – 表示一条记录的单个实例。在列表视图中，对于找到的记录集中的每条记录，此区段及其内部放置的每个对象将重复显示一次。在表单视图中，它仅为当前记录渲染一次。\n\
  - *页脚* – 出现在底部，但若存在*标题页脚*，则打印最后一页时除外。\n- *标题页脚* – 打印时出现在第一页底部，替换*页脚*。在浏览模式下不显示。\n\
  - *底部导航* – 用于屏幕上的导航按钮和其他控件。此区段不会打印。\n\n#### 定义汇总区段\n\n*汇总区段*用于插入记录组的汇总值，在创建报表布局时尤其有用。放置在汇总区段中的汇总字段将根据区段类型及其设置指定的记录组显示一个值。有两种类型的汇总区段，每种都有*前导*和*结尾*变体，表示相对于*主体*的位置。它们分别是：\n\
  \n- *总汇总* – 此处的汇总字段将显示*找到记录集中所有记录*的汇总值。它可以放置在布局的开头（*前导总汇总*）或结尾（*结尾总汇总*）。\n- *子汇总（按...排序时）*\
  \ – 放置在此处的汇总字段将显示找到记录集中*一个排序子组记录*的汇总值。它用于根据指定的分隔字段计算*小计*，并将记录分成排序后的组。一个或多个子汇总区段可以放置在*主体*的上方和下方，并且仅当记录按指定的分隔字段排序时才会出现。每个由分隔字段排序产生的记录组将重复显示一个子汇总区段。\n\
  \n### 管理区段\n\n在布局模式下，可以添加、删除和重新排序区段以创建自定义布局。\n\n#### 使用工具栏按钮添加区段\n\n*区段*工具，如图 18-2\
  \ 所示，可以单击并向下拖入布局区域以添加到区段堆栈中。光标将变成紧握的拳头，拖动一条黑色水平线。将此线移动到现有区段上方或下方的位置，该位置近似于要在堆栈中插入新区段的位置，然后释放鼠标。将打开*区段定义*对话框，允许选择并配置新区段。完成后关闭对话框，即可调整区段大小并开始添加对象。\n\
  \n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig2_HTML.jpg](img/429700_2_En_18_Fig2_HTML.jpg)\n\
  \n**图 18-2**  \n用于将新区段拖入布局区段堆栈的工具\n\n**提示：** 以这种方式拖动新区段不够精确，并且会改变现有区段的大小。为避免此问题，请使用本章后面描述的*区段设置*对话框。\n\
  \n\n\n#### 配置部件\n\n部件通过“**部件定义**”对话框进行定义，如图 18-3 所示。创建新部件时，此对话框会自动打开。若要为现有部件打开该对话框，请双击部件标签，选择\
  \ `布局 ➤ 部件设置` 菜单，或从部件标签的上下文菜单中选择“**部件定义**”。\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig3_HTML.jpg](img/429700_2_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3\n\n用于定义布局部件的对话框\n\n`部件类型` 选项会根据所定义部件在堆栈中的位置自动启用或禁用。例如，如果已定义了一个`页眉`部件，则`主体`部件不能更改为`页眉`；如果当前部件位于现有`页眉`下方的堆栈中，则无法将其更改为`标题页眉`。\n\
  \n当定义`子摘要`部件时，右侧的`摘要分隔字段`会变为可用。此处的字段选择表示，当记录按该字段排序时，子摘要部件应作为记录组之间的分隔符可见。这些分隔符通常用于在财务报告中插入小计。有关子摘要如何工作的更多信息，请参见本章后面的报告布局示例。\n\
  \n前四个选项复选框控制部件在打印或预览模式下如何处理。选择`每次出现前分页`可在`结尾汇总`、`主体`或`子摘要`部件前自动插入分页符。`每出现 X 次后分页`将在部件显示指定次数后插入分页符，从而限制`主体`或`子摘要`部件在单个页面上的重复次数。使用`每次出现后重设页码`可在每次部件实例后重置页码编号。将此选项与`标题页眉`配合使用，可创建不包含在编号序列中的标题页；或与`子摘要`配合使用，可在每个部分后重置编号。最后，`允许部件跨页断开`允许部件被页面边界拆分。若不选择此选项，除非部件内容无法容纳于单个页面，否则部件不会跨页拆分，而是会在当前页面底部留下空白区域，部件从下一页开始。启用此选项可覆盖此默认行为，并在分页处进行拆分以消除空白区域。其相邻的`在新页面前丢弃部件剩余内容`复选框将截断部件的任何剩余内容，而不是在下一页显示，从而在分页处裁剪内容。\n\
  \n底部的两个选项控制部件的视觉外观。`使用交替行状态`复选框允许`主体`采用交替样式，以便在视觉上区分记录。启用`使用活动行状态`可使`主体`通过特殊样式在视觉上指示当前记录（仅限屏幕显示）。\n\
  \n> **提示**  \n> 交替行状态和活动行状态的外观可通过在“检查器”面板（第 22 章）的“对象状态”菜单中选择进行编辑。\n\n#### 删除部件\n\
  \n要删除部件及其包含的所有对象，请选中部件标签并键入 `Delete`。\n\n#### 使用部件设置对话框\n\n使用“部件设置”对话框（如图 18-4 所示）可以更精确地管理部件。要打开此对话框，请从“布局”菜单或通过右键单击布局任意位置出现的上下文菜单中选择“部件设置”。列表显示当前布局上定义的每个部件，并且是*唯一*可以重新排序汇总部件（使其位于主体上方或下方）的地方。要添加部件，请单击“创建”按钮。这会将部件插入列表和布局中，而不会像从工具栏拖动新部件那样调整其他部件的大小。要编辑部件，请选中它并单击“更改”按钮以打开“部件定义”对话框。使用“删除”按钮可删除所选部件。此对话框中没有取消或撤消选项，因此如果出现错误，请单击“完成”按钮，然后选择“编辑\
  \ ➤ 撤消”菜单以立即撤销所做的任何更改。\n\n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig4_HTML.jpg](img/429700_2_En_18_Fig4_HTML.jpg)\n\
  \n图 18-4\n\n该对话框允许对部件堆栈进行更精确的控制\n\n## 添加布局\n\n向数据库文件添加布局有两种方法：创建新布局和复制现有布局。\n\n\
  ### 创建新布局\n\n要创建新布局，请从“布局”菜单中选择“新建布局/报表”功能，或单击同名工具栏图标。这将打开对话框（如图 18-5 所示），该对话框将根据所选目标设备类型和功能逐步显示更多屏幕。布局配置可以在之后进行修改，有些人发现选择“计算机”并单击“完成”以绕过此设置助手的其余部分，然后手动完成配置会更简单。然而，尤其是对于复杂报告布局的初始配置，此对话框可以节省大量时间，特别对于新开发人员而言。\n\
  \n![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig5_HTML.jpg](img/429700_2_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5\n\n用于创建新布局的对话框\n\n首先，从顶部的“显示记录来自”菜单中选择一个表事件，并为新布局输入一个“布局名称”。通过单击三个图标之一来选择目标设备类型：“计算机”、“触控设备”或“打印机”。“触控设备”图标会打开一个弹出菜单，其中有三个选项：“iPad”、“iPhone”和“自定义设备”。虽然任何布局都可以在多种设备组合上使用，但这些选择有助于确定新布局的默认大小和配置选项，从而节省一些时间。\n\
  \n接下来，选择一个主要功能以进一步控制默认设置。这些选择因目标设备选择而异。“表单布局”通常用于查看单条记录以进行数据输入任务或输入查找条件。它们也可用于创建自定义对话框或打印布局。“列表视图”用于显示找到的记录集中的多条记录列表。“表格视图”是一种低设计的列表视图，以类似电子表格的格式显示记录和字段。“报表视图”是一种列表视图，经过优化，可使用子摘要和汇总查看或打印汇总的数据列表。“标签视图”是一种列表视图，经过优化可直接打印到标签上。这些可以*垂直*或*水平*创建，并且可以根据预配置的\
  \ Avery 或 Dymo 标签模板或自定义尺寸进行调整大小。最后，“信封视图”是一种列表视图，经过优化可直接打印到信封上。\n\n对于“触控设备”目标，对话框底部的方向选项允许选择纵向或横向。当触控设备选择为“自定义设备”时，还会包含宽度和高度尺寸字段。\n\
  \n选择好选项后，单击“完成”按钮。对于“列表”或“表单”布局，该过程以打开新布局并可供自定义而结束。但是，“标签”、“报表”和“表格”布局会有额外的对话框打开，并提供进一步的自定义选项。\n\
  \n> **提示**  \n> 请记住，任何布局都可以作为表单、列表或表格进行查看。这里的选择仅影响默认设置选项，这些选项之后可以修改并以不同方式查看。\n\n\
  \n\n"
- '# 新版报表布局的附加选项


  报表布局是一种列表视图，其中包含汇总和小计，专为打印或显示组织好的信息而配置。例如，*发票*报表可以按年和月对记录进行排序，将数据汇总到带小计的分组中，如图 18-6
  所示。通过*新建布局/报表*对话框创建报表布局，需依次进行多达*八个*独立的对话框，逐步配置部件、内容、汇总、排序等选项。尽管可以从一个空白列表视图开始手动创建报表布局，但这些对话框通过大大简化构建复杂分层信息显示所需的配置部件和设置这一繁琐任务，提供了极大的便利。


  ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig6_HTML.jpg](img/429700_2_En_18_Fig6_HTML.jpg)


  **图 18-6** — 一张按年、再按月汇总销售额的发票报表示意图


  上述报表由六个布局部件组成，始于一个*按年份排序时的子摘要（前导）*。当记录首先按*发票年份*排序时，每当检测到新一年，该部件就会出现在每组记录之前。接下来，*按月排序时的子摘要（前导）*在记录其次按*发票月份*字段排序时执行相同操作。尽管布局上显示的是月份名称，但为了月份能按时间顺序排列，实际的排序和布局部件必须基于月份数字中断字段。列标题的标签放置在此摘要部件中，以便每当新月份开始时，它们会出现在每组单独记录的上方。


  *主体*部件会对找到集中的每条记录重复一次。然而，这些记录会根据周围的*子摘要*部件排列成排序分组。因此，一月有一组三条记录（已显示），而像二月这样的其他月份则会有自己的记录分组，重复主体部件（未显示）。


  *主体*之后还有两个附加的*子摘要*：一个按月排序，另一个按年排序。它们与对应的前导部件功能相同，但出现在每个排序分组之后。在此示例中，这些部件用于显示汇总字段，计算其上方分组中记录值的的小计。最后，底部是一个*最终汇总（尾随）*，它将提供总计，汇总整个找到集的字段。


  在每个摘要部件中，都使用同一个*发票总计汇总*字段，它会自动汇总其所包含分组中记录的值。尽管示意图中未显示，但*发票数量汇总*字段可以添加到摘要部件中，以显示每个分组中的*记录数量*。


  ## 为发票报表演示做准备


  要构建图 18-6 所示的布局，必须先定义一个*发票*表，其中包含各种字段，如图 18-7 所示。


  ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig7_HTML.jpg](img/429700_2_En_18_Fig7_HTML.jpg)


  **图 18-7** — 报表所需的发票表字段定义


  前几个字段用于数据输入，以存储发票的*公司 ID*、*编号*、*状态*、*金额*和*日期*。三个计算字段将日期转换为*月份数字*、*月份名称*和*年份数字*。这些字段将用于记录排序以及在摘要部分显示值。两个汇总字段将用于在各个子摘要和尾随最终汇总部件中显示发票的总数及总美元金额。配置完成后，打开*新建布局/报表*对话框，按照以下步骤开始一个多对话框的报表配置选项序列，以创建新的报表布局：


  1.  选择*发票*表。

  2.  输入布局名称“发票报表”。

  3.  点击*打印机*图标。

  4.  点击*报表*图标。

  5.  点击*继续*按钮。


  ## 对话框 1：包含小计和总计


  第一个报表配置对话框将出现两个选项，如图 18-8 所示。复选框提供了*包含小计*和*包含总计*的选项。选择这两个选项以包含这些部件，并确保*指定小计*和*指定总计*对话框（对话框
  6 和 7）包含在配置过程中。点击*下一步*继续。


  ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig8_HTML.jpg](img/429700_2_En_18_Fig8_HTML.jpg)


  **图 18-8** — 八个报表配置对话框中的第一个


  ## 对话框 2：指定字段


  第二个报表创建对话框用于指定将放置在报表上的字段，如图 18-9 所示。虽然在布局创建后也可以添加字段，但现在选择某些字段可使它们在后续对话框中可用于汇总选项。通过双击或使用*移动*按钮，将字段从左侧列表添加到右侧列表。字段可以在可用列表中拖拽，以确定它们在新布局中的默认顺序。在我们的示例中，我们包含了来自*发票*表的*编号*、*日期*、*客户*、*金额*、*年份*和*月份*。通过在选择*可用字段*列表上方的菜单中选择不同的表出现，可以包含来自关联表（如*公司名称*）的字段。


  ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig9_HTML.jpg](img/429700_2_En_18_Fig9_HTML.jpg)


  **图 18-9** — 八个报表配置对话框中的第二个


  ## 对话框 3：按类别组织记录


  第三个报表对话框用于指定*排序字段*，这些字段可组织记录并作为报表子摘要的分组条件，如图 18-10 所示。上一个对话框中添加的字段显示在*报表字段*列表（左侧）中，可以添加并启用至*报表类别*列表（右侧）。每个选定的字段都将作为排序记录分组的汇总类别。启用复选框以将该字段同时包含在子摘要布局部件和报表主体中。在我们的示例中，*发票年份*和*发票月份*字段均被添加为类别并选中，因为它们将用于汇总记录分组。


  ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig10_HTML.jpg](img/429700_2_En_18_Fig10_HTML.jpg)


  **图 18-10** — 八个报表配置对话框中的第三个


  ## 对话框 4：排序


  第四个报表对话框用于指定排序顺序，如图 18-11 所示。此对话框包含一个与标准*排序记录*对话框（第 4 章，“对找到集中的记录进行排序”）类似的界面。在上一个对话框中添加为*报表类别*的任何字段将自动锁定在*排序顺序*的顶部。由于这些字段已被选中用于汇总分组，因此它们是排序顺序中必需的。可以在这类字段下方添加其他字段，以进一步对报表主体中的记录进行排序。


  ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig11_HTML.jpg](img/429700_2_En_18_Fig11_HTML.jpg)


  **图 18-11** — 八个报表配置对话框中的第四个




  #### 对话框 5：指定小计


  第五个报表对话框，如图 18-12 所示，仅当在第一个对话框中选中了`指定小计`复选框时才会出现。此功能允许添加一个或多个*汇总字段*，这些字段将显示在按选定字段分组的子摘要部分中的记录组上方或下方。


  通过点击`指定`按钮选择要包含的*汇总字段*。然后，可以从`要汇总的类别`弹出菜单中选择一个字段，该菜单列出了在第三个对话框中添加为报表类别的所有字段。`小计位置`弹出菜单用于指定小计相对于其正在汇总的记录组显示的位置：`记录组上方`、`记录组下方`或`上方和下方`。完成这些选择后，点击`添加小计`将字段插入到下方的列表中，然后重复此过程以添加其他字段。可以添加多个汇总以创建更健壮的汇总层次结构。


  对于我们正在进行的发票示例，`发票金额汇总`字段被添加为小计，将显示在记录组*下方*，并为`发票月份`和`发票年份`分别汇总一次，以便它们出现在两个子摘要部分中。可选地，可以重复此操作以同时包含`发票计数汇总`。


