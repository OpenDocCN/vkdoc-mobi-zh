  #### 格式要求\n\n编写 `SELECT` 语句时，需要记住一些格式要求。包括：\n\n-   **命令和对象名称** – 查询中的表名、字段名和语句命令*不*\
  \ 区分大小写。然而，将 SQL 命令和操作符大写有助于在视觉上将其与字段值和条件值区分开。\n-   **条件** – 字面量条件（例如在 `JOIN`、`WHERE`\
  \ 和 `HAVING` 子句中使用的）*区分*大小写，如果大小写不匹配，将无法定位到匹配的值。此外，所有文本条件*必须* 用单引号括起来。\n-   **名称分隔符**\
