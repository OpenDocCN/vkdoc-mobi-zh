  ## 定义 ExecuteSQL 函数\n\n*ExecuteSQL* 函数允许一个公式**完全独立于**当前界面上下文与关系图中任何表出现项之间的关系，直接从该关系图中的*任意*表出现项中检索数据。调用该函数必须包含三个参数：*sqlQuery*、*fieldSeparator*\
  \ 和 *rowSeparator*。它还可以接受一个或多个可选的*参数*。\n\n```\nExecuteSQL ( sqlQuery ; fieldSeparator;\
  \ rowSeparator )\nExecuteSQL ( sqlQuery ; fieldSeparator; rowSeparator ; arguments\
  \ )\n```\n\n语句中的参数定义如下：\n\n*   *sqlQuery* – 文本表达式或对字段的引用，其中包含一个 `SELECT` 语句，用于指定获取所需记录和字段结果的位置及条件。\n\
  *   *fieldSeparator* – 包含一个或多个字符的文本字符串，这些字符用作结果中字段之间的分隔符。如果留空，默认使用逗号。\n*   *rowSeparator*\
