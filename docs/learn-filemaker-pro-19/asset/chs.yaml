  ## 使用条件语句


  一个`条件语句`由一个或多个脚本步骤组成，这些步骤仅在特定条件为真时执行。这些被称为`if-then 语句`，因为它们包含的条件可以理解为*如果此公式为真，则运行这些步骤*。FileMaker
  有四个用于构建 if-then 脚本语句的脚本步骤：


  * `If` – 必须在语句开头使用，用于定义一个公式，该公式控制何时执行其后的步骤

  * `Else If` – 可选地放置在 `If` 步骤和 `End If` 步骤之间，用于基于一个新公式开始一组新的条件步骤

  * `Else` – 可选地放置在 `End If` 之前，用于表示一组单独的条件步骤，这些步骤仅在所有前面的条件都为假时才执行

  * `End If` – 必须用于终止由 `If` 步骤开始的条件语句


  例如，假设一个`发票状态`字段有以下几个可能的值：`未发送`、`已发送`、`待付款`、`逾期`、`严重逾期`和`已付款`。一个用于通过电子邮件发送发票的脚本不适用于已发送的发票，而发送关于逾期状态的提醒也不适用于每条发票记录。此外，有些发票尚未发送，有些已发送但尚未逾期，等等。可以设置一个简单的
  `If` 语句，以便仅在发票状态为已逾期时发送提醒，如下例所示：


  ```

  If [ Invoice::Status = "Past Due" ]

  Perform Script ["Email Invoice Past Due" ]

  End If

  ```


  这可以扩展成一个`复合条件语句`，其中包含多个条件，每个条件调用不同的脚本。如果发票尚未发送，则运行一个脚本来发送它。如果状态是逾期或严重逾期，则分别发送提醒或警告。语句中未包含的其他状态则不发送任何内容。


  ```

  If [ Invoice::Status = "Unsent" ]

  Perform Script ["Email Invoice" ]

  Else If [ Invoice::Status = "Past Due" ]

  Perform Script ["Email Invoice Past Due" ]

  Else If [ Invoice::Status = "Delinquent" ]

  Perform Script ["Email Invoice Collection Warning" ]

  End If

  ```


  一个条件语句可以放置在另一个条件语句内部，从而创建一个`嵌套语句`。语句的层次结构可以根据需要变得复杂，以实现必要的目标。在这个例子中，第一个外部语句包含并控制基于状态字段执行两个内部复合语句中的哪一个。


  ```

  If [ Invoice::Status = "Past Due" ]

  If [ Invoice::Days Past > 15  ]

  Perform Script ["Email First Warning" ]

  Else If [ Invoice::Days Past > 30  ]

  Perform Script ["Email Second Warning" ]

  Else If [ Invoice::Days Past > 45  ]

  Perform Script ["Email Final Warning" ]

  End If

  Else If [ Invoice::Status = "Delinquent"]

  If [ Invoice::Days Delinquent > 15  ]

  Perform Script ["Email Collections Warning" ]

  Else If [ Invoice::Days Delinquent > 30  ]

  Perform Script ["Email Collections Notification" ]

  End If

  End If

  ```


  提示


  避免过度嵌套导致在滚动浏览步骤页面时难以跟踪脚本执行逻辑的情况。


  ## 显示自定义对话框


  `显示自定义对话框`步骤用于向用户显示一条消息，并且还可以请求向三个字段或变量输入内容。对话框可以显示信息性通知、警告用户某个问题、确认某个操作、提供操作选择、请求输入、提供说明等。将该步骤添加到脚本后，齿轮图标会打开`显示自定义对话框选项`对话框，该对话框有两个选项卡：`常规`和`输入字段`。




  ### 配置对话框属性


  *显示自定义对话框选项*对话框中的*常规*选项卡（如图 25-11 所示）用于配置自定义对话框的消息属性。*标题*和*消息*字段可以直接接收输入的静态文本，也可以通过点击相应的*指定*按钮输入公式来生成内容。这些内容将显示在对话框的标题栏和正文中，应清晰地传达信息或请求执行某个操作。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig11_HTML.jpg](img/429700_2_En_25_Fig11_HTML.jpg)


  图 25-11


  配置对话框属性的选项卡（左）与对话框示例（右）


  最多可以为自定义对话框定义三个按钮的名称。这些按钮将在对话框中从右到左排列，其中*默认按钮*会高亮显示，并响应用户按下 Enter 键的操作。如果在显示对话框时，当前记录存在未提交的更改，则任何勾选了相应*提交数据*复选框的按钮，在用户于对话框中点击时都会导致该记录被提交。当对话框请求输入要放入字段的信息时，此功能非常有用。


  **警告**


  对话框不会自动调整大小，因此较长的消息可能会被遮挡。尽管用户可以调整大小，但请保持消息简洁，以避免沟通不畅。


  ### 配置对话框输入字段


  对话框最多可以包含三个可编辑字段，每个字段都链接到一个目标字段或变量。这使得对话框可以向用户请求输入，并且在很多场景下都非常有用。脚本可以针对特定字段执行引导式搜索，在创建记录时通过提示必需输入来提供帮助，要求输入关键短语以确认删除操作，等等。*输入字段*选项卡为此包含了三组相同的控件，如图
  25-12 所示。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig12_HTML.jpg](img/429700_2_En_25_Fig12_HTML.jpg)


  图 25-12


  用于配置对话框输入字段的选项卡


  要在对话框中包含一个字段，请启用相应的复选框。然后点击*指定*以选择一个目标字段或变量。该目标充当对话框中该文本区域的*源*和*目标*。当对话框打开时，目标中的任何值都会作为默认值显示在输入字段中，用户可以对其进行自定义。用户在对话框中的输入会更新目标的值，并且该值会在用户关闭对话框后保留。


  *使用密码字符*复选框会使该字段在对话框中显示为隐藏值，每个字符都显示为项目符号。与字段的类似布局设置（第 20 章，“隐藏式编辑框”）一样，这仅是一个显示功能，不会更改或加密输入到该字段中的文本。除非该字段也被配置为以项目符号显示，否则该值在布局上可能仍然可见。无论如何，脚本都可以像处理任何其他文本字符串一样访问和操作该值。


  *标签*字段允许在对话框中的字段上方显示一个字段标签。默认情况下，字段在对话框中是没有标签的。可以输入静态文本标签，或点击*指定*以通过公式生成标签。


  **提示**


  当对话框需要三个以上的按钮或字段选项，或者需要弹出菜单或复选框等其他控件时，可使用*新建窗口*步骤，通过自定义布局生成一个对话框窗口。


  ### 捕获对话框按钮点击


  对话框自然会暂停脚本，直到用户点击某个按钮。对话框关闭后，脚本可以使用 `Get(LastMessageChoice)` 函数访问被点击按钮的索引位置。该数字对应于按钮的配置顺序，其在对话框上从右到左显示。此值可以立即使用，或存储在变量中供后续在工作流中使用，如下方示例所示：


  ```

  Show Custom Dialog [ "选择" ; "请选择一个功能" ]

  Set Variable [ $button ; Get ( LastMessageChoice )

  ```


  如果定义了三个按钮——确定、取消和帮助——并且用户点击了确定，则 `$button` 变量将被设置为 1。以下示例展示了一个公式，该公式可在前面的 `Set Variable`
  步骤中使用，通过 `Choose` 函数将数值转换为按钮名称。


  ```

  Let (

  number = Get ( LastMessageChoice )

  ;

  Choose ( number ; "" ; "确定" ; "取消" ; "帮助" )

  )

  ```


  ### 使用对话框创建相关记录


  作为带输入选项的对话框的一个实用示例，我们来创建一个脚本，该脚本从一个*联系人*记录开始，然后逐步创建一个*公司*记录，并将其分配给该联系人。该脚本将自动执行一系列对于用户来说较为繁琐的操作：切换布局、新建公司记录、输入公司信息、获取新记录的
  ID、返回原始布局，并将新 ID 输入到联系人用于公司关系的外键字段中。脚本化版本的具体顺序会略有不同。脚本不会创建记录并输入数据，而是通过一个对话框请求将新公司的名称存入变量，如果用户没有取消，则继续执行记录创建和分配步骤。


  ```

  Show Custom Dialog [ "创建新公司" ; "输入新公司的名称:" ; $name ]

  If [ Get ( LastMessageChoice ) = 2 ]

  退出脚本

  End If

  冻结窗口

  转到布局 [ "公司" (公司) ; 动画: 无 ]

  新建记录/请求

  设置字段 [ 公司::公司名称 ; $name ]

  设置变量 [ $id ; 值: 公司::记录 ID ]

  转到布局 [ 原始布局 ; 动画: 无 ]

  设置字段 [ 联系人::联系人公司 ID ; $id ]

  提交记录/请求 [ 带对话框: 关闭 ]

  ```


  或者，如果已为关系的*公司*一侧启用了*允许创建记录*（第 9 章），则可以通过一个简单的对话框步骤来请求名称，并将其推入相关字段，从而自动创建两者之间的关联。


  ```

  Show Custom Dialog [ "新公司" ; "输入名称:" ; 联系人 | 公司::公司名称 ]

  ```


  ### 确认对话框字段值


  为避免对话框中出现空字段，请在允许脚本继续之前使用*循环*语句来确认值。当用户关闭包含缺失值的对话框时，脚本会循环回去，再次显示对话框，直到用户输入值或点击取消。以下示例将对话框的提示放入
  `$message` 变量中，以便在需要后续循环时将其更改为警告。`Show Custom Dialog` 步骤被放置在*循环*语句内，并且带有一个 `Exit
  Loop If` 步骤，如果用户取消或已输入名称，则会跳出循环。如果 `$name` 变量为空，则在循环重复之前，`$message` 会被修改为措辞更严厉的请求。一旦用户输入了名称，脚本就可以继续执行放置在这些步骤下方的任何其他步骤。


  ```

  设置变量 [ $message ; 值: "输入新公司的名称:"  ]

  循环

  Show Custom Dialog [ "创建新公司" ; $message ; $name ]

  If [ Get ( LastMessageChoice ) = 2 ]

  退出脚本

  End If

  如果 [ $name ≠ "" ] 则退出循环

  发出蜂鸣声

  设置变量 [ $message ; 值: "您必须输入新公司的名称:"  ]

  结束循环

  ```




  # 搜索与处理找到的记录集


  执行搜索时可使用若干不同的步骤。这些步骤可以单独使用，也可以与执行导航、排序、编译及其他功能的步骤结合使用。`Perform Quick Find` 步骤使用公式的文本结果作为条件，在当前布局中启用了`快速查找`功能的任何字段内执行搜索（第
  [19]章）。


  `Enter Find Mode` 步骤将窗口置于查找模式，允许用户或脚本步骤在搜索前于字段中输入查找条件。它可以“指定查找请求”，建立默认的起始条件，并可以选择“暂停”以等待用户。由于该步骤本身并不实际执行查找，因此必须由用户或另一个脚本步骤来启动。


  `Perform Find` 步骤可在查找模式中用于执行用户或脚本步骤输入的条件。或者，它也可以在浏览模式中作为一个独立的即时查找步骤使用，此时需使用其可选的“指定查找请求”对话框来定义搜索条件（第
  [4]章，“使用已保存的查找”）。


  一个查找脚本可以有多种形式。它可以基于静态不变的条件执行查找，基于变量构建条件，征求用户条件，或这些方式的某种组合。下面的示例使用了一个硬编码条件和一个用户输入条件。在进入查找模式后，它将`发票状态`字段设置为“已付款”，然后弹出一个对话框，允许用户在`发票日期`字段中输入一个日期范围。当对话框关闭后，搜索将继续，执行查找并显示一个找到的记录集，其中包含所有在指定日期范围内且已付清的发票。


  ```

  转到布局 ["发票列表"]

  进入查找模式 [ 暂停: 关闭 ]

  设置字段 [ 发票::发票状态 ; "已付款" ]

  显示自定义对话框 [

  "搜索已付款发票" ;

  "输入日期范围 (月/日/年...月/日/年):" ;

  发票::发票日期 ]

  执行查找

  ```


  **提示：** 通过在`显示自定义对话框`步骤之前，在目标字段或变量中插入默认范围，来帮助用户输入日期范围。


  ## 使用重复语句进行迭代


  *重复语句* 由一个或多个重复执行的步骤组成，直到某个步骤退出循环。FileMaker 有三个步骤用于构建重复语句：


  - `Loop` – 必需，用于开始重复后续步骤，直到执行到终止步骤

  - `Exit Loop If` – 当输入的公式为真时，立即终止循环，并跳转到下一个`End Loop`之后的步骤

  - `End Loop` – 必需，用于标记重复语句的底部，在此处控制权返回到语句开头以进行下一次迭代


  语句内的某些步骤也可以终止循环。例如，`Exit Script` 和 `Halt Script` 都会停止整个脚本，包括任何活动的循环。使用 `Go to Record/Request/Page`
  的“下一个”或“上一个”选项中的“最后一个之后退出”选项，或 `Go to Portal Row` 步骤，可以在到达指定方向的最后一条记录后退出。只要`允许用户中止`为“打开”，用户也可以通过按
  Esc（Windows）或 Command+句号（macOS）来终止脚本。


  **注意：** 如果没有步骤导致循环终止，该语句将无限运行，直到强制退出，这可能导致文件损坏。


  ### 循环遍历找到的记录集


  一个脚本可以逐步遍历一个找到的记录集，并对每条记录执行操作。下面的示例从导航到发票记录集中的第一条记录开始，然后启动一个`循环`。对于记录集中的每条记录，它调用另一个名为“发送发票电子邮件”的脚本来向客户发送发票。然后，一个`设置字段`步骤将`发票状态`字段从“未结”更改为“已发送”。最后，它转到下一条记录并重复这些步骤，直到到达找到的记录集的末尾并退出循环。


  ```

  转到记录/请求/页面 [ 第一个 ]

  循环

  执行脚本 [ 指定: 从列表 ; "发送发票电子邮件" ; 参数: ]

  设置字段 [ 发票::发票状态 ; "已发送" ]

  转到记录/请求/页面 [ 下一个 ; 最后一个之后退出: 打开 ]

  结束循环

  ```


  另一个示例如下，循环遍历找到的未结发票记录集，并收集每条记录的多个字段的值。它会提取每条发票记录的 ID、日期、公司、金额，以及一个新的`发票逾期状态`字段，该字段通过计算自`发票日期`以来经过的
  30 天增量次数，来得出状态为“已发送”的发票的逾期值。这些值被排列成一个列式列表，存储在名为 `$Body` 的变量中，稍后可用于创建报告电子邮件或保存到数据文件。


  ```

  转到记录/请求/页面 [ 第一个 ]

  循环

  设置变量 [ $Body ; $Body &

  发票::记录 ID & " " &

  发票::发票日期 & " " &

  发票::发票公司名称 & " " &

  发票::发票金额 & " " &

  发票::发票逾期状态 & "¶" ]

  转到记录/请求/页面 [ 下一个 ; 最后一个之后退出: 打开 ]

  结束循环

  // 结果 =

  1001 04/15/2021 Fantastic Client 1000 逾期超过 60 天

  1001 04/15/2021 Fantastic Client 1000 逾期超过 60 天

  1002 05/19/2021 Creative Company 3000 逾期超过 30 天

  1003 06/1/2021 Fantastic Client 4500 未结

  1003 06/15/2021 Fantastic Client 958 未结

  ```


  当前面示例的结果用作电子邮件的正文时，可以对数据进行不同的格式化以使其更易读。下面的示例返回一个类似的报告，但通过将逾期状态作为发票组上方的标题（而不是为每张发票重复）来加以优化。从相同的已找到的未结发票记录集（按`发票逾期状态`排序）开始，脚本使用一个名为
  `$Last.Status` 的变量来跟踪上一次迭代中记录的状态值。每当它在当前记录中遇到新的状态值时，就会执行一个条件步骤，将该状态值连同一些额外的段落回车符插入到
  `$Body` 变量中。然后，它将当前状态存入 `$Last.Status` 变量，以便在后续每次迭代中都忽略该值，直到检测到不同的值。


  ```

  设置变量 [ $Last.Group ; "" ]

  转到记录/请求/页面 [ 第一个 ]

  循环

  设置变量 [ $Group ; 发票::发票逾期状态 ]

  如果 [$Group ≠ $Last.Group ]

  '
- '# 添加标题行

  设置变量 [ $Body ; $Body & 情况 ( $Body ≠ "" ; "¶" ) & $Group & "¶" ]

  设置变量 [ $Last.Group ; $Group]

  结束如果

  '
- '# 添加正文行

  设置变量 [ $Body ; $Body &

  发票::记录 ID & " " &

  发票::发票日期 & " " &

  发票::发票公司名称 & " " &

  发票::发票金额 & "¶" ]

  转到记录/请求/页面 [ 下一个 ; 最后一个之后退出: 打开 ]

  结束循环

  '
- "# 结果 =\n未结\n1003 06/1/2021 Fantastic Client 4500\n1003 06/15/2021 Fantastic Client\
  \ 958\n逾期超过 30 天\n1002 05/19/2021 Creative Company 3000\n逾期超过 60 天\n1001 04/15/2021\
  \ Fantastic Client 1000\n1001 04/15/2021 Fantastic Client 1000\n```\n\n\n\n### 遍历数据\n\
  \n*循环*也可用于逐条处理存储在变量中的数据。每次循环可对一个以回车符分隔的值列表中的某个段落或 JSON 对象的某个键执行操作，逐一处理直至完成。有几种不同的方式可控制此过程。一种方法是设置几个*控制变量*，一个用于存储值的*计数*，另一个用于跟踪*当前*值的序号，该序号在每次循环时递增。\n\
  \n例如，假设有一个州缩写列表，存放在名为 `$States` 的变量中。列表中的每个州都将用于构建一个查找条件请求，以搜索 `Contact` 记录。如果将所有州输入到单个查找请求中，则不会有任何匹配结果，因为这会指示\
  \ FileMaker 查找邮寄地址包含所有这些州的记录。为了获取结果，需要创建多个查找请求，列表中的每个州对应一个请求。以下脚本假设名为 `$State` 的变量包含一个缩写州列表，例如\
  \ `OH¶PA¶NY`。它使用 `ValueCount` 函数统计这些州的数量，并将该数值存入名为 `$Count` 的变量中，该变量将控制循环执行的次数。然后，它初始化另一个名为\
  \ `$Current` 的变量，以指示从列表中的第一个州开始。接着，执行 `Enter Find Mode` 步骤，并开始*循环*遍历州列表，为变量中的每个州创建一个查找请求。每次循环，`$Current`\
  \ 变量增加 1，直到超过 `$Count`，循环退出。循环结束后，执行查找操作。\n\n```\nSet Variable [ $States ; \"OH¶PA¶NY\"\
  \ ]\nSet Variable [ $Count ; ValueCount ( $States ) ]\nSet Variable [ $Current ;\
  \ 1 ]\nEnter Find Mode [ Pause : Off ]\nLoop\nSet Field [ Contact::Contact Address\
  \ State ; GetValue ( $States ; $Current ) ]\nSet Variable [ $Current ; $Current\
  \ + 1 ]\nExit Loop If [ $Current > $Count ]\nNew Record/Request\nEnd Loop\nPerform\
  \ Find [ ]\n```\n\n另一种实现相同目的的方法是，每次循环时使用列表中的第一个值，然后将其从列表中移除，重复此操作直到列表为空。这消除了需要控制变量来存储值数量和当前值的问题。在以下示例中，使用\
  \ `GetValue` 将第一个州插入当前请求。接着，`$States` 变量利用 `ValueCount` 和 `RightValues` 函数移除第一个值，保留剩余值供后续迭代使用。当\
  \ `$States` 变量为空时，`Exit Loop If` 步骤终止循环，然后执行查找。\n\n```\nSet Variable [ $States ;\
  \ \"OH¶PA¶NY\" ]\nEnter Find Mode [ Pause : Off ]\nLoop\nSet Field [ Contact::Contact\
  \ Address State ; GetValue ( $States ; 1 ) ]\nSet Variable [ $States ; RightValues\
  \ ( $States ; ValueCount ( $States ) - 1 ) ]\nExit Loop If [ $States = \"\" ]\n\
  New Record/Request\nEnd Loop\nPerform Find [ ]\n```\n\n## 管理窗口\n\n有许多脚本步骤可用于操作和管理窗口。`Adjust\
  \ Window` 步骤可根据从五个选项中选择的一项来更改窗口的可见性或大小。`Resize to Fit` 设置会将窗口尺寸调整到最小可能尺寸，同时继续在当前显示器最大尺寸限制内显示整个内容区域。选择\
  \ `Maximize` 将使步骤将窗口大小调整为计算机屏幕的完整尺寸，而 `Minimize` 会将窗口缩小为存储在 Dock (macOS) 或任务栏 (Windows)\
  \ 中的图标。要将窗口恢复到脚本开始时的尺寸和位置，请选择 `Restore`。最后，`Hide` 选项会将窗口从视图中隐藏，并放入 `Window ➤ Show\
  \ Window` 菜单中，从那里可以重新打开它。`Arrange all Windows` 步骤可以按四种方式之一排列所有打开的窗口：`Tile Horizontally`、`Tile\
  \ Vertically`、`Cascade` 或 `Bring All To Front`。其他步骤可以 `Close`、`Refresh` 或 `Scroll\
  \ Window`。`Select Window` 步骤会将特定窗口置于前台，使其成为当前活动的上下文。通过 `Move/Resize Window`，脚本可以调整指定窗口的\
  \ `Height`、`Width`、`Distance from Top` 和 `Distance from Left` 尺寸。使用 `Set Window\
  \ Title` 步骤可更改窗口的名称。\n\n### 创建新窗口\n\n`New Window` 步骤将基于当前窗口的类型、布局、大小、位置和其他属性创建一个新窗口，除非在图\
  \ 25-13 所示的配置对话框中特别修改了这些属性。\n\n![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig13_HTML.jpg](img/429700_2_En_25_Fig13_HTML.jpg)\n\
  \n图 25-13\n\n使用脚本创建新窗口的配置选项\n\n`Window Style` 控制将创建的窗口类型。默认选项是 `Document`，它是一个标准的非模态\
  \ FileMaker 窗口。其他选项包括 `Floating Document`（一个位于其他窗口前面的非模态窗口）、`Dialog`（一个对应用程序模态的窗口）或\
  \ `Card`（一个对父窗口模态并作为覆盖层附加到父窗口的窗口）。\n\n注意\n\n当窗口强制用户进行交互和/或关闭后才能在被影响的上下文中恢复其他工作时，该窗口是\
  \ *模态* 的。\n\n中央设置都是可选的。如果未指定，新窗口将默认使用执行该步骤时活动窗口的设置。可以在文本区域输入 `Window Name`，或单击 `fx`\
  \ 按钮使用公式生成。如果未指定名称，新窗口将以当前窗口的名称加上一个数字后缀来命名。选择新窗口中应显示的 `Layout`。`Size` 和 `Position`\
  \ 尺寸控制窗口尺寸，每个都提供直接输入值或公式的选项。`From Top` 和 `From Left` 位置可根据当前用户的屏幕尺寸指定位置。可以使用公式进行精确居中或其他对齐（第\
  \ 13 章，“获取窗口尺寸”）。\n\n提示\n\n开发人员通常会创建“暂存”窗口，为 `From Left` 和 `From Top` 属性设置较大的负值，以在执行复杂的步骤序列时将其“隐藏”在屏幕外，因为如果完全可见地执行这些步骤，可能会对用户造成视觉干扰。\n\
  \n`Window Options` 复选框控制新窗口的属性。`Close`、`Minimize`、`Maximize` 和 `Resize` 选项允许用户修改窗口。`Menubar`\
  \ 可见性可以设为可见或隐藏（仅限 Windows），`Toolbars` 也是如此。对于 Card 窗口，`Dim Parent Window` 选项会使附加卡片窗口后面的窗口变暗，以帮助突出其尺寸。\n\
  \n警告\n\n打开一个没有关闭功能的模态窗口，并且没有按钮或脚本来关闭该窗口，将会困住用户，可能需要强制退出应用程序才能逃脱。\n\n### 构建自定义对话框窗口\n\
  \n克服 `Show Custom Dialog` 步骤局限性的一种方法是使用 `New Window` 步骤打开一个设计为对话框的自定义布局。由于对话框实际上是一个布局，它可以包含任意数量的任何类型的对象，并以完成预期任务所需的任何方式格式化。它可以包含冗长的说明、任意数量的配置有任意控制样式的输入字段，以及远不止三个的按钮。脚本可以在新窗口中显示该对话框，并在继续之前暂停等待用户操作。在本节中，我们将创建一个简单的对话框布局和脚本，该脚本在新窗口中打开它，进入查找模式，并暂停等待用户在弹出的菜单中选择一个州。包含四个按钮以继续该过程：三种营销电子邮件的选择，这些邮件将发送给找到的记录集，以及一个取消选项。\n\
  \n\n\n# 创建对话框布局\n\n创建一个名为“联系人 – 对话框查找”的新布局，并将其分配给 `Contact` 表。移除其他部分，并将 `Body` 部分缩小到所需的对话框大小，如图\
  \ 25-14 所示。添加一个文本对象用于标题和操作提示。放置 `Contact Address State` 字段，将其格式设置为弹出式菜单，并分配一个州缩写值列表。在底部均匀放置四个按钮，并在\
  \ `检查器` 面板的 `位置` 选项卡中配置它们的 `自动调整大小` 设置，使其锁定在右下角，这样窗口大小可以略有变化，而不会对外观产生不利影响。然后，通过返回浏览模式并创建一个脚本来保存此布局。\n\
  \n![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig14_HTML.jpg](img/429700_2_En_25_Fig14_HTML.jpg)\n\
  \n图 25-14：一个设计用作对话框的布局示例\n\n# 创建对话框布局脚本\n\n对话框脚本可以通过多种不同的方式进行配置，具体选择取决于所需的功能。在某些情况下，脚本可以打开对话框，暂停，然后单击按钮时继续。在其他情况下，可以创建一组独立的脚本：一个用于呈现对话框，另一个用于每个按钮选项。下面的示例使用参数将所有操作打包到单个脚本的不同功能部分中。首先，创建一个名为“联系人\
  \ - 营销邮件”的脚本，如图 25-15 所示。该脚本以 `设置错误捕获` 步骤开始，然后将脚本参数放入 `$function` 变量中。它接受五个参数之一，以通过不同的条件语句引导工作流：`Start`（未提供参数时的默认值）、`Cancel`、`Introduction`、`Services`\
  \ 和 `Offers`。\n\n`Start` 参数将启动该过程，当用户从 `脚本` 菜单、自定义菜单、按钮或其他触发方法运行脚本时触发。条件 `If` 语句的第一部分允许使用“Start”参数或不使用参数，这会打开一个显示对话框布局的新窗口，为其分配一个名称，并在屏幕上水平和垂直居中。然后，它进入查找模式并将控制权交给用户，允许他们从弹出式菜单中选择一个州并做出按钮选择。其他四个参数将用于根据单击的四个按钮执行不同的条件步骤。因此，每个按钮都调用相同的脚本，但传入一个不同的参数，该参数会激活条件语句的不同部分。当脚本检测到\
  \ `Cancel` 参数时，它将进入浏览模式并关闭对话框，将用户返回到他们之前打开的窗口。三个报告按钮中的每一个都将在第一个 `Else` 步骤之后处理，该步骤包含一个嵌套的条件语句。在那里，`执行查找`\
  \ 步骤执行搜索，如果找到记录，则遍历生成的找到的记录集。在 `循环` 语句内部，为三个参数中的每一个嵌套了一个条件，但为了简洁起见，省略了具体细节。三个注释指示了将在哪里添加额外的步骤来创建和发送电子邮件，或执行所需的任何操作。\n\
  \n![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig15_HTML.jpg](img/429700_2_En_25_Fig15_HTML.jpg)\n\
  \n图 25-15：对话框脚本对五个参数值中的每一个都设置了条件\n\n请注意，在脚本完成运行由参数激活的任何条件部分之前，它不会关闭对话框。对话框的新窗口被用作一个临时上下文，它与脚本运行时用户打开的其他窗口是分开的。由于查找是在对话框窗口中执行的，因此结果只会在那里存在，因此在关闭窗口之前，必须在该上下文中执行其他步骤。或者，脚本可以收集在对话框中输入的查找条件以及单击的按钮名称，将它们存储在变量中并关闭窗口，然后在原始窗口中重建并执行查找。\n\
  \n编写并保存脚本后，请务必选中该复选框以将脚本包含在 `脚本` 菜单中，或提供其他界面访问点，以便用户启动该过程。\n\n> **警告：** 请务必将布局按钮连接到脚本，以避免打开一个无法关闭的窗口！\n\
  \n# 将对话框按钮连接到脚本\n\n每个按钮都应使用一个参数调用脚本，如图 25-16 所示。\n\n![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig16_HTML.jpg](img/429700_2_En_25_Fig16_HTML.jpg)\n\
  \n图 25-16：每个按钮都使用一个参数调用脚本，并设置为退出当前脚本\n\n## 介绍卡片窗口\n\n`卡片` 是一个模式窗口，它作为一个覆盖层显示在当前窗口的活动布局之上，如图\
  \ 25-17 所示。父窗口的内容在卡片打开时变得不活动且不可访问。但是，根据卡片的大小，其背后的内容可能仍在可选地变暗后可见。与对应用程序来说是模态的 `对话框窗口`\
  \ 不同，卡片仅锁定单个窗口。\n\n卡片在外观和行为上类似于其他环境中找到的模式窗口。例如，macOS 对话框可以作为 `工作表` 打开，附着在窗口顶部。此外，网页通常以类似的\
  \ `lightbox` 格式显示各种对象，如广告或图像。在 FileMaker 中，卡片窗口非常适合呈现导航菜单、自定义工具栏、对话框、向导、自定义帮助指南等。由于显示的布局有其自身的上下文，它可以基于与父窗口活动布局不同的表\
  \ occurrence。这允许卡片提供在你的解决方案中任何地方都适用的通用界面“服务”，这可以减少技术重复并促进资源共享。\n\n![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig17_HTML.jpg](img/429700_2_En_25_Fig17_HTML.jpg)\n\
  \n图 25-17：卡片窗口示例\n\n> **提示：** 在 `新建窗口选项` 对话框中配置 `卡片` 时，将 `大小` 和 `位置` 值留空，以便布局在父窗口中居中并全尺寸显示。将顶部位置设置为\
  \ 0 以模拟附着到父窗口的顶部。\n\n## 使用从 URL 插入\n\n`从 URL 插入` 步骤将来自 URL 的数据输入到目标字段或变量中。该命令支持\
  \ `http`、`https`、`ftp`、`ftps` 和 `file` 协议，并包含 `cURL` 选项。该步骤的面板包括指定各种设置的选项，如图 25-18\
  \ 所示。\n\n![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig18_HTML.jpg](img/429700_2_En_25_Fig18_HTML.jpg)\n\
  \n图 25-18：`从 URL 插入` 步骤的配置面板\n\n### 下载 PDF 文件\n\n从一个简单的示例开始，从网站下载一个 PDF 文件。首先，单击指定一个目标容器字段作为文件的目的地，例如，`Sandbox`\
  \ 表中的 `Example Container` 字段。然后，单击 `指定 URL` 并输入 PDF 文件的地址，如图 25-19 所示。运行该脚本，文件应出现在容器字段中。\n\
  \n![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig19_HTML.jpg](img/429700_2_En_25_Fig19_HTML.jpg)\n\
  \n图 25-19：`从 URL 插入` 步骤的配置面板\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n### 访问邮政编码信息\n\n`从 URL 插入` 脚本步骤可用于访问 API，例如 Datasheer, L.L.C. 提供的邮政编码查询服务 (`https://www.zip-codes.com/zip-code-api.asp`)。该网站允许通过\
  \ URL 请求一个包含任意美国邮政编码信息的 JSON 对象。您可以在该网站注册一个免费账户（每月限制 250 次查询），或购买各种付费套餐，最高可达每月 200\
  \ 万次查询。下面的示例使用了一个受限的演示 API 密钥，可以在用户在字段中输入邮政编码后，从 `联系人` 布局运行。脚本首先将网站的 API 地址和当前记录的\
  \ `联系人地址邮政编码` 字段值放入一个 `$URL` 变量中。接着，`从 URL 插入` 脚本步骤以 `$Data` 变量为目标，并使用 `$URL` 变量作为其\
  \ URL。两个 `设置字段` 脚本步骤将从 `$Data` 结果中解析出的城市和州的值放入相应的字段。\n\n```\n设置变量 [ $URL ; 值: \"\
  https://api.zip-codes.com/ZipCodesAPI.svc/1.0/QuickGetZipCodeDetails/\" &\n联系人::联系人地址邮政编码\
  \ & \"?key=DEMOAPIKEY\" ]\n从 URL 插入 [ 对话框: 关闭 ; 目标: $Data ; $URL ]\n设置字段 [ 联系人::联系人地址城市\
  \ ; JSONGetElement ( $Data ; \"City\" ) ]\n设置字段 [ 联系人::联系人地址州 ; JSONGetElement (\
  \ $Data ; \"State\" ) ]\n```\n\n**提示**\n\n为了获得最流畅的体验，请在用户输入 `联系人地址邮政编码` 字段后，使用 `OnObjectValidate`\
  \ 脚本触发器（第 27 章）运行此脚本。\n\n### 使用 cURL 选项\n\n`客户端 URL (cURL)` 是一个开源的命令行工具，用于使用 URL\
  \ 语法在不同系统之间传输数据。该技术极大地扩展了网站请求的功能，它使用随 URL 一起发送但与之分离的结构化数据。这提供了一种更安全的数据传输方法，并具有更大的结构灵活性。FileMaker\
  \ 的 `从 URL 插入` 脚本步骤包含一个 `指定 cURL 选项` 按钮，用于当向需要 cURL 格式而非直接将其嵌入 URL 的网站发送请求时。输入 URL\
  \ 后，单击 `指定` 按钮，并根据目标网站的要求输入选项。例如，如果某个网站需要身份验证，选项的格式可能如下例所示。此示例将一个 URL 放入一个变量，将 cURL\
  \ 选项放入另一个变量，然后在 `从 URL 插入` 脚本步骤中使用它们，该步骤以 `$Data` 变量作为结果的目标。\n\n```\n设置变量 [ $URL\
  \ ; 值: \"https://www.example.com/\" ]\n设置变量 [ $Options ; 值: \"--user name:password\"\
  \ ]\n从 URL 插入 [ 对话框: 关闭 ; 目标: $Data ; $URL ; cURL 选项: $Options ]\n```\n\ncURL 可用于将数据推送到\
  \ Web 表单，如下例所示。将名字和姓氏与字段标签一起构建，作为 `data` 选项的内容包含，然后发送到网站的“联系我们”表单。\n\n```\n设置变量\
  \ [ $URL ; 值: \"https://www.example.com/contact.cgi\" ]\n设置变量 [ $Options ; 值: \"\
  --data \\\"firstname=Mark&lastname=Munro\\\"\" ]\n从 URL 插入 [ 对话框: 关闭 ; 目标: $Data\
  \ ; $URL ; cURL 选项: $Options ]\n```\n\n## 总结\n\n本章提供了许多脚本任务示例，可用于自动化数据库内的活动。在下一章中，我们将了解作为\
  \ FileMaker 高级工具一部分的内置脚本调试功能。\n\n# 26. 调试脚本\n\n当一个简单脚本遇到错误时，排查相对容易。随着数据库变得越来越复杂，故障排查迅速变得更具挑战性。由用户、事件触发器、其他脚本以及外部系统发起的脚本调用形成了复杂交织的层级执行堆栈。脚本可以更改找到的记录集、切换布局和打开新窗口，从而创建了一个由相互关联的界面上下文组成的复杂网络。当出现问题时，通常很难甚至不知道是哪个脚本导致了错误，更不用说知道问题发生的位置、原因以及在何种上下文条件下发生的了。为了减轻这种负担，像\
  \ FileMaker 这样的现代开发环境包含了一个调试器。在本章中，我们将介绍脚本调试，并涵盖以下主题：\n\n-   调试简介\n-   探索调试界面\n\
  -   使用自定义断点\n\n### 调试简介\n\n`脚本调试器` 是一个交互式工具，开发人员可以使用它来可视地逐步执行脚本化过程，并对性能进行故障排查或分析。FileMaker\
  \ 的调试器使得逐步执行脚本、监控变量、设置断点以及发现错误变得容易，同时还能实时直接观察在数据库界面中执行的相应操作。它包含一个临时禁用所有脚本触发器的选项，以避免出现故障的启动脚本或其他情况。可以通过从\
  \ `工具` 菜单或 `脚本工作空间`（第 24 章）的标题中选择 `脚本调试器` 来激活调试器。此外，可以启用 `出错时暂停` 选项，以便当用户处于浏览模式时，如果脚本产生错误，自动打开调试器并暂停操作。\n\
  \n在调试器中运行脚本时，FileMaker 会在堆栈中每个脚本的开头以及遇到错误的任何步骤暂停。您可以在任何步骤定义任意的 `断点`，以强制脚本暂停以便进一步调查。暂停后，可以选择\
  \ `继续` 执行脚本到下一个断点，`停止` 以中止脚本，或者使用以下四个选项之一 `单步执行`：\n\n-   `单步跳过` – 继续执行当前脚本，*不*调试地执行任何子脚本\n\
  -   `单步进入` – 逐步执行脚本，*同时*调试地执行任何子脚本\n-   `单步跳出` – 执行当前子脚本中的剩余步骤，然后将控制权返回给堆栈中的父脚本，并在调用子脚本的那一行之后暂停\n\
  -   `设置下一步` – 跳到当前脚本中的选定步骤，*不执行中间步骤*\n\n### 探索调试界面\n\n调试界面包括 `工具` 菜单下的调试选项、一个 `脚本调试器`\
  \ 窗口和一个 `数据查看器` 窗口。\n\n#### 工具菜单下的调试选项\n\n`工具` 菜单（如图 26-1 所示）顶部包含三个用于调试的项目。`脚本调试器`\
  \ 菜单项用于切换调试窗口的可见性。`调试控制` 子菜单包含各种调试功能，用于控制脚本在活动状态下的移动。其中大部分功能也可以在调试窗口的工具栏中找到。最后，`数据查看器`\
  \ 菜单项用于切换一个窗口的可见性，该窗口用于浏览变量并根据当前上下文动态监控公式结果。\n\n![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig1_HTML.jpg](img/429700_2_En_26_Fig1_HTML.jpg)\n\
  \n图 26-1 显示 `调试控制` 子菜单的 `脚本调试器` 菜单\n\n\n\n# 探索脚本调试器窗口\n\n调试功能激活时，`Script Debugger`\
  \ 窗口会始终保持开启状态，如图 26-2 所示。窗口内的**非可编辑工具栏**包含用于控制调试过程的按钮。活动脚本的步骤列于窗口中央，暂停步骤的编号旁会标注一个绿色箭头。任何设置了断点的步骤也会用蓝色箭头突出显示。下方的\
  \ `Pause on error` 复选框用于打开调试器，并在常规使用期间产生错误的任何步骤上暂停，包括那些被 `Set Error Capture` 脚本步骤自动抑制的错误。窗口底部是**调用堆栈**，其中按执行顺序列出了嵌套的脚本调用层级，从当前脚本一直回溯到启动当前工作流的原始脚本。\n\
  \n![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig2_HTML.jpg](img/429700_2_En_26_Fig2_HTML.jpg)\n\
  \n**图 26-2**\n\n用于调试脚本的窗口\n\n在图 26-2 所示的示例中，名为 `Report Start` 的脚本被运行，它调用了当前显示的活动脚本\
  \ `Prepare Report Records`。调试器检测到新脚本启动后，自动在第一步暂停，将界面冻结在当前状态。第四步设有一个断点，增加了一个额外的强制暂停点。开发者此时可以观察界面的状态，审查当前的脚本步骤，并决定下一步操作：正常运行、逐行单步执行脚本，或完全停止整个脚本堆栈以进行必要的开发更改。\n\
  \n## 状态工具栏项目（调试器窗口）\n\n`Script Debugger` 窗口的**不可自定义状态工具栏**，如图 26-3 所示，提供了对调试过程的控制。\n\
  \n![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig3_HTML.jpg](img/429700_2_En_26_Fig3_HTML.jpg)\n\
  \n**图 26-3**\n\nScript Debugger 窗口的工具栏\n\n1.  `Edit Script` – 在 `Script Workspace`\
  \ 中打开已暂停的脚本。\n2.  `Continue` – 使用默认的单步执行/暂停选项，继续运行已暂停的脚本。\n3.  `Halt Script` – 停止整个堆栈中的所有脚本。\n\
  4.  `Step Over` – 继续执行当前脚本，*但不调试*子脚本。\n5.  `Step Into` – 逐行继续执行当前脚本，*同时调试*子脚本。\n\
  6.  `Step Out` – 继续执行当前子脚本而不进行调试，直到控制权返回给父脚本，然后暂停。\n7.  `Set Next Step` – 跳转到窗口中选中的脚本步骤，跳过中间的步骤。\n\
  8.  `Disable Script Triggers` – 全局切换数据库文件中脚本触发器的启用状态。\n9.  `Open Data Viewer` –\
  \ 打开 `Data Viewer` 对话框。\n\n# 探索数据查看器\n\n`Data Viewer` 是一个显示变量列表及其当前值的对话框，如图 26-4\
  \ 所示。该对话框可随时打开以查看全局变量或测试公式。当与调试功能结合使用或脚本暂停时，它会显示暂停发生瞬间所有变量的值。此对话框有两个标签页：`Current`\
  \ 和 `Watch`。\n\n![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig4_HTML.jpg](img/429700_2_En_26_Fig4_HTML.jpg)\n\
  \n**图 26-4**\n\n用于监视变量值的对话框\n\n`Current` 标签页列出了当前定义的所有变量。全局变量始终存在，而局部变量仅在脚本运行或暂停时存在。双击某个变量可在对话框中打开其内容的扩展视图。在脚本执行的关键时刻观察变量有很多用途。例如，当\
  \ `Export` 或 `Save as` 脚本步骤失败，您怀疑可能是路径构造错误时，可以在该步骤前添加一个断点，然后当调试器暂停时确认该变量中的值包含有效路径。\n\
  \n`Watch` 标签页用于监视手动编制的变量、字段或表达式列表中的值。这可以在调试期间使用，也可以在将新公式集成到字段、布局对象或自定义函数之前进行测试。此标签页上的表达式可以根据当前窗口的上下文连续评估结果，从而提供使用实时值确认公式的能力。\n\
  \n## 设置自定义断点\n\n`自定义断点`是开发者在脚本中标记的一个点，用于暂停调试器，以排查脚本问题。断点允许您在任意位置停止脚本，并提供了机会来查看当前布局上下文，并在时间冻结的时刻审查关键变量中的当前值。断点允许您快速将脚本运行到特定行，而无需手动单步执行。要添加断点，请打开一个脚本并点击某个步骤编号。当该编号显示为蓝色箭头时，表示设置了断点，如图\
  \ 26-5 所示。可以通过点击箭头图标单独移除断点，或者从 `Tools ➤ Debugger Controls` 子菜单中选择 `Remove Breakpoints`\
  \ 选项，以移除当前在调试器中暂停的脚本的所有断点。\n\n![../images/429700_2_En_26_Chapter/429700_2_En_26_Fig5_HTML.jpg](img/429700_2_En_26_Fig5_HTML.jpg)\n\
  \n**图 26-5**\n\n一个包含两个断点的脚本\n\n## 总结\n\n本章介绍了 FileMaker 的调试功能。这些功能为排查包含复杂脚本的数据库提供了宝贵的工具。在下一章中，我们将学习如何触发脚本以响应界面事件。\n\
  \n# 27. 使用脚本触发器\n\n连接到按钮或菜单的脚本需要用户执行手动操作来启动进程。虽然这对于可选任务或需要有意选择的任务来说没有问题，但关键业务功能可能会被遗忘。在某些情况下，要求用户执行额外的点击来启动界面中的强制性操作可能效率低下且不直观。FileMaker\
  \ 允许您设计动态响应的界面，将用户事件与自定义脚本连接起来。`脚本触发器`是开发者定义的界面事件与脚本进程之间的连接。每当事件发生时，脚本会自动运行。FileMaker\
  \ 拥有二十多种触发器，用于各种文件、布局和对象事件。一些事件会在用户操作完成之前运行分配的脚本，允许脚本执行自定义步骤并决定是否应将事件执行完毕。另一些则在事件之后运行，允许脚本执行后续任务。本章介绍脚本触发器，涵盖以下主题：\n\
  \n* 定义可用的触发器\n* 理解事件优先级\n* 在事件完成前访问目标\n* 避免触发器异常\n\n> **提示:** 分配了脚本触发器的对象在布局模式下会选择性显示一个徽章图标（第\
  \ 17 章，“视图菜单”）。\n\n### 定义可用的触发器\n\n脚本触发器分为三类：`文件`、`布局`和`对象`。\n\n\n\n### 文件触发器\n\n\
  `文件触发器`（file trigger）可在发生文件事件时运行脚本。这些触发器在`文件选项`对话框（第 6 章）的`脚本触发器`选项卡中配置，如图 27-1\
  \ 所示。可通过选择`文件 ➤ 文件选项`菜单来访问此对话框。对话框顶部列出了所有可用的`文件事件`。复选框表示该事件处于活动状态，将触发所显示的脚本。下半部分显示所选事件的详细信息。点击`选择`指定与该事件关联的脚本。\n\
  \n![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig1_HTML.jpg](img/429700_2_En_27_Fig1_HTML.jpg)\n\
  \n图 27-1：用于定义文件触发器的选项对话框选项卡\n\n#### OnFirstWindowOpen（首次打开窗口时）\n\n`OnFirstWindowOpen`\
  \ 事件发生在数据库文件打开后、第一个窗口出现时，这提供了在用户开始工作之前自动执行设置功能的机会。触发的脚本可以初始化全局变量、自动打开其他窗口，或执行默认的查找与排序。此事件仅在用户打开数据库，或从另一个文件执行`打开文件`脚本步骤时发生。如果文件作为隐藏窗口打开在另一个数据库之后，通过关系显示资源，则*不会*触发此事件。\n\
  \n**提示：** 在文件打开时导航至起始布局和隐藏工具栏，可以在`文件选项`对话框的`打开`选项卡中设置，无需触发器。\n\n#### OnLastWindowClose（关闭最后一个窗口时）\n\
  \n`OnLastWindowClose` 文件事件发生在文件开始关闭最后一个界面窗口时。这为脚本提供了执行最后时刻维护任务的机会。如有必要，脚本可以通过返回\
  \ false（0）值来停止关闭过程。例如，脚本可以使用`显示自定义对话框`步骤来确认用户是否确实打算关闭文件，并给他们取消的选择。在下面的示例中，对话框配置为第一个（默认）按钮命名为“取消”，第二个按钮命名为“关闭”。它使用`Get\
  \ ( LastMessageChoice )` 函数检测点击了哪个按钮。如果用户点击第一个按钮取消，则返回零结果，导致触发事件停止，从而保持窗口和文件打开。\n\
  \n```\n显示自定义对话框 [ \"确定要关闭数据库吗？\" ]\nIf [ Get ( LastMessageChoice ) = 1 ]\n退出脚本 [\
  \ 文本结果: 0 ]\nEnd If\n```\n\n#### OnWindowOpen（打开窗口时）\n\n`OnWindowOpen` 文件事件发生在用户选择`窗口\
  \ ➤ 新建窗口`菜单或脚本运行`新建窗口`步骤创建任何新窗口之后。当之前因关系连接而作为隐藏窗口打开的文件首次被前置时，也会触发此事件。这为执行窗口的任何配置或设置程序提供了机会。例如，可用于将窗口精确定位在屏幕上、执行默认查找、排序、设置控制变量，或为使用窗口做其他准备。\n\
  \n#### OnWindowClose（关闭窗口时）\n\n`OnWindowClose` 文件事件发生在*任何*窗口即将关闭*之前*。这为对窗口内查看的一条或多条记录执行最后时刻的验证功能或维护程序提供了机会。与其他发生在动作之前的事件一样，如果脚本返回\
  \ false（0）值，过程将被停止，窗口保持打开状态。\n\n**注意：** 当首次打开文件时会触发两个窗口打开事件，关闭最后一个窗口时会触发两个窗口关闭事件。\n\
  \n#### OnFileAVPlayerChange（文件媒体播放器变化时）\n\n`OnFileAVPlayerChange` 文件事件发生在容器字段或 URL\
  \ 中播放的媒体文件的播放状态改变之后。例如，当暂停、播放、停止，或媒体播放到末尾停止时会触发此事件。此事件仅在 iOS 设备上的 FileMaker Go 中支持。\n\
  \n### 布局触发器\n\n`布局触发器`（layout trigger）可在发生布局事件时运行脚本。这些触发器在`布局设置`对话框（第 18 章）的`脚本触发器`选项卡中配置，如图\
  \ 27-2 所示。该对话框与`文件选项`对话框类似，只是增加了用于控制事件在哪种窗口模式下启用的复选框。\n\n![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig2_HTML.jpg](img/429700_2_En_27_Fig2_HTML.jpg)\n\
  \n图 27-2：用于配置布局脚本触发器的对话框\n\n#### OnRecordLoad（加载记录时）\n\n`OnRecordLoad` 布局事件发生在记录成为当前记录之后。这为使用自动输入设置中过于复杂的值来设置默认字段值、创建相关记录，或执行其他自定义记录任务提供了机会。任何导致窗口激活记录的活动都会触发此事件。包括以下情况：\n\
  \n* 在找到的记录集中导航到新记录\n* 导航到不同的布局\n* 创建新记录\n* 删除包含多条记录的找到记录集中的一条记录\n* 创建显示包含一条或多条记录的表的新窗口\n\
  * 显示搜索结果\n\n#### OnRecordCommit（提交记录时）\n\n`OnRecordCommit` 布局事件发生在提交已修改的记录之前。这提供了在必要时停止提交操作的机会。如果脚本结果为\
  \ true（1），则原始事件正常进行。如果结果为 false（0），则该事件被取消。任何导致当前记录提交的活动都会触发此事件，包括：\n\n* 用户通过键入\
  \ Enter 键或点击活动记录字段外部来显式提交记录\n* 导航到不同的记录\n* 创建、删除、复制或排除记录\n* 脚本执行`提交记录/请求`步骤\n* 打开`管理数据库`对话框或其他开发者对话框\n\
  * 关闭文件\n\n#### OnRecordRevert（还原记录时）\n\n`OnRecordRevert` 布局事件发生在将已修改的记录还原到之前提交的状态之前。当用户选择`记录\
  \ ➤ 还原记录`菜单或脚本运行`还原记录/请求`步骤时会触发此事件。它提供了打开自定义对话框确认该操作、执行其他重置操作，或在必要时停止还原操作的机会。\n\n\
  #### OnLayoutKeystroke（布局按键时）\n\n`OnLayoutKeystroke` 布局事件发生在键盘上键入任何字符时，但操作系统或 FileMaker\
  \ 的活动菜单集处理的函数键除外。即使没有字段处于活动焦点，也会触发此事件，并且发生在按键事件发送给 FileMaker *之前*。这为脚本提供了机会：当用户在进入字段之前开始输入时，用自定义消息覆盖默认错误对话框。也可以用于响应与菜单无关的组合键来运行脚本，或在向门户过滤器（第\
  \ 20 章，“过滤门户记录”）输入时刷新视图。以下示例使用两个以触发器为中心的 `Get` 函数，获取按下的按键，并在用户按住 macOS Control 键并键入“1”时运行脚本。脚本执行`执行脚本`步骤（此处未定义），然后使用`退出脚本`且返回结果为\
  \ 0 来停止按键操作。脚本会忽略用户按下的其他任何按键，并使它们继续进入活动字段。\n\n```\nIf [ Get ( TriggerModifierKeys\
  \ ) = 4 and Get ( TriggerKeystroke ) = \"1\" ]\n执行脚本 [ ]\n退出脚本 [ 文本结果: 0 ]\nEnd\
  \ if\n```\n\n\n\n### 布局事件\n\n#### OnLayoutEnter（进入布局时）\n\n`OnLayoutEnter` 布局事件发生在浏览模式下窗口切换到不同布局之后。这提供了一个机会，可以执行类似于打开窗口或激活记录时触发的设置功能。\n\
  \n#### OnLayoutExit（退出布局时）\n\n`OnLayoutExit` 布局事件发生在导航离开当前布局之前。这提供了一个机会，可以在必要时验证并阻止导航变化。\n\
  \n#### OnLayoutSizeChange（布局大小变更时）\n\n`OnLayoutSizeChange` 布局事件发生在窗口大小改变之后。这发生在打开窗口、调整窗口大小、隐藏/显示工具栏或格式栏，以及在\
  \ iOS 设备上切换横竖屏时。这提供了一个执行操作的机会，例如强制设置最小窗口大小或重新定位窗口以使其在屏幕范围内完美居中。以下公式可用于“设置变量”脚本步骤，根据当前窗口尺寸设置\
  \ `$Height` 和 `$Width` 变量，或在数值过低时切换至默认最小值。随后可在“移动/调整窗口”脚本步骤中使用这些变量来强制设置最小窗口大小，本例中为\
  \ 800 x 1000。\n\n```\nLet ( [\nHeight = Get ( WindowHeight ) ;\n$Height = Case (\
  \ Height < 800 ; 800 ; Height ) ;\nWidth = Get ( WindowWidth ) ;\n$Width = Case\
  \ ( Width < 1000 ; 1000 ; Width )\n] ;\n\"\"\n)\n```\n\n#### OnModeEnter（进入模式时）\n\
  \n`OnModeEnter` 布局事件发生在切换到浏览、查找或预览模式之后。这提供了一个机会，可以为特定活动准备窗口，例如设置默认查找条件、初始化变量或调整打印设置。\n\
  \n#### OnModeExit（退出模式时）\n\n`OnModeExit` 布局事件发生在更改窗口模式之前。这为脚本提供了一个机会，可以在必要时验证并阻止模式更改。\n\
  \n#### OnViewChange（视图变更时）\n\n`OnViewChange` 布局事件发生在表单视图、列表视图和表格视图之间切换之后。\n\n####\
  \ OnGestureTap（手势轻点时）\n\n`OnGestureTap` 布局事件发生在布局上执行轻点手势时。这为脚本提供了一个机会，可以使用 `Get\
  \ ( TriggerGestureInfo )` 函数确定事件的详细信息，并执行自定义操作或在必要时阻止该手势。该事件在以下条件下触发：\n\n- 仅限 FileMaker\
  \ Go 和 Windows（Windows 7 除外）。\n- 仅限浏览和查找模式。\n- 轻点操作不在活动的 Web 查看器或活动的编辑框内。\n- 单指、双指或三指轻点（iOS）。\n\
  - 单指双击（iOS），这将触发该事件两次。\n- 双指轻点（Windows）。\n\n#### OnExternalCommandReceived（收到外部命令时）\n\
  \n`OnExternalCommandReceived` 布局事件发生在用户按下按钮以控制 iOS 设备锁定屏幕或外部设备上的播放功能时，例如“播放”、“暂停”、“停止”、“下一首”和“上一首”。触发的脚本在事件发生*之前*运行，并且可以使用\
  \ `Get ( TriggerGestureInfo )` 函数获取有关外部事件的信息。\n\n### 对象触发器\n\n*对象触发器* 在针对布局对象或在布局对象内部执行某个事件时运行脚本。这些可以通过图\
  \ 27-3 所示的对话框进行配置，通过选择一个对象并从“格式”菜单或对象的上下文菜单中选择“设置脚本触发器”功能来访问。此外，“弹出面板设置”对话框中也有一个按钮可以打开此对话框（第\
  \ 20 章，“探索弹出按钮设置选项”）。\n\n![../images/429700_2_En_27_Chapter/429700_2_En_27_Fig3_HTML.jpg](img/429700_2_En_27_Fig3_HTML.jpg)\n\
  \n图 27\\-3\n\n用于配置对象脚本触发器的对话框\n\n#### OnObjectEnter（进入对象时）\n\n`OnObjectEnter` 事件发生在用户点击对象或使用\
  \ Tab 键进入对象，当布局对象获得活动焦点之后，或者当脚本执行诸如“转到对象”或“转到下一字段”等步骤时。\n\n#### OnObjectKeystroke（对象按键时）\n\
  \n`OnObjectKeystroke` 事件发生在向具有焦点的对象键入任何字符时，但在事件完成之前。与布局按键触发器类似，此事件会忽略那些由操作系统或 FileMaker\
  \ 应用程序处理的按键，并且可以通过以假值（0）退出脚本来阻止。\n\n#### OnObjectModify（对象修改时）\n\n`OnObjectModify`\
  \ 事件发生在对象的值已更改之后。该事件仅响应与界面相关的操作而发生。当窗口更新在外部数据源中修改的值、字段由自动输入公式更新，或使用“设置字段”脚本步骤更新字段值时，该事件*不会*发生。以下操作会触发此事件：\n\
  \n- 在对象中键入按键\n- 在值列表格式的字段中选择新值\n- 使用“剪切”、“粘贴”或“清除”功能\n- 将内容拖放到其中\n- 使用与界面相关的脚本步骤（例如“插入文本”）更改对象的值\n\
  - 选择新的选项卡控制面板\n\n#### OnObjectValidate（对象验证时）\n\n`OnObjectValidate` 事件发生在修改后字段的值准备进行验证时，即焦点即将移动到另一个字段或正在提交记录之前。这提供了一个机会，可以验证对对象的更改、执行任何预备操作，和/或在必要时阻止移动到另一个对象。\n\
  \n#### OnObjectSave（对象保存时）\n\n`OnObjectSave` 事件发生在修改后的字段已验证但尚未退出之前，提供了另一个阻止退出过程的机会。\n\
  \n#### OnObjectExit（退出对象时）\n\n`OnObjectExit` 事件发生在对象即将失去活动焦点时，无论是否有任何修改。这发生在移动到另一个对象、门户行或字段重复项时。当发生任何导致提交记录的操作时也会发生。脚本在退出对象之前触发，允许其在必要时阻止该过程。\n\
  \n#### OnPanelSwitch（面板切换时）\n\n`OnPanelSwitch` 事件发生在面板控件的当前视图即将更改之前，并且可以通过以假值（0）退出脚本来阻止。内置的\
  \ `Get` 函数可以确定对象的布局名称以及当前和目标面板的编号，从而使脚本能够采取与更改相关的特定操作。以下公式可以放入目标脚本的“显示自定义对话框”步骤或“数据查看器”（第\
  \ 26 章）中，以句子的形式说明这些值。在 `If` 语句中使用它们，可以根据起始和结束面板有条件地执行不同的步骤集。\n\n```\nLet ( [\ncurrentPanel\
  \ = GetValue ( Get ( TriggerCurrentPanel ) ; 1 ) ;\ntargetPanel = GetValue ( Get\
  \ ( TriggerTargetPanel ) ; 1 )\n] ;\n\"正在从面板 \" & currentPanel & \" 切换到面板 \" & targetPanel\
  \ & \"。\"\n)\n```\n\n#### OnObjectAVPlayerChange（对象音视频播放器变更时）\n\n`OnObjectAVPlayerChange`\
  \ 事件发生在对象中的媒体更改状态之后。例如，当用户暂停、播放或停止字段中的视频，或者视频播放到结尾停止时，该事件将触发脚本。此事件仅在 iOS 设备上的 FileMaker\
  \ Go 中受支持。\n\n## 了解事件优先级\n\n许多用户操作会触发多个事件，FileMaker 将按特定的优先级顺序执行脚本触发器。脚本拦截操作的位置取决于预期的操作类型以及取消事件选项是否重要。\n\
  \n\n\n### 打开数据库文件\n\n当 *打开数据库文件* 时，将按顺序触发以下事件：\n1. `OnFirstWindowOpen`\n2. `OnWindowOpen`\n\
  3. `OnLayoutEnter`\n4. `OnModeEnter`\n5. `OnRecordLoad`\n\n**注意：** 虽然这不是脚本触发器，但文件打开时“*切换布局*”的选项会在所有脚本触发器之前执行（第\
  \ 6 章，“文件选项：打开”）。\n\n### 提交包含未保存更改的记录\n\n当 *提交包含未保存更改的记录* 时，将按顺序触发以下事件：\n1. `OnObjectValidate`\n\
  2. `OnObjectSave`\n3. `OnObjectExit`\n4. `OnRecordCommit`\n5. `OnRecordLoad`\n6.\
  \ `OnObjectEnter`\n\n### 打开新窗口\n\n当 *打开新窗口* 时，将按顺序触发以下事件：\n1. `OnWindowOpen`\n2.\
  \ `OnLayoutEnter`\n3. `OnModeEnter`\n4. `OnRecordLoad`\n5. `OnLayoutSizeChange`\n\
  \n### 切换布局\n\n当 *切换布局* 时，将按此顺序触发以下事件：\n1. `OnLayoutExit`\n2. `OnLayoutEnter`\n3.\
  \ `OnRecordLoad`\n\n**注意：** 当在显示包含未保存更改记录的窗口中 *切换布局* 时，将首先执行记录提交序列，然后执行切换布局序列。\n\
  \n## 在事件完成前访问目标\n\n如前所述，许多事件会在事件完成前触发脚本，从而提供在事件效果实施前将其阻止的选项。然而，这意味着操作的结果尚未实现，并且脚本无法通过界面的常规方式识别这些结果。例如，当用户在字段中输入字符时，会触发\
  \ `OnObjectKeystroke` 事件。然而，脚本会在字符输入到字段之前运行，因此在脚本步骤中将字段值拉入公式将不会包含最近触发脚本的按键操作。类似地，`OnPanelSwitch`\
  \ 事件发生在目标面板被激活之前。由于切换之后没有对应的事件发生，因此脚本可能需要确定目标面板才能执行特定的操作路径。\n\nFileMaker 提供了一组内置的\
  \ *Get* 函数，专门用于提供有关事件的信息，以便触发的脚本可以访问和使用这些信息。例如，`Get ( TriggerCurrentPanel )` 和 `Get\
  \ ( TriggerTargetPanel )` 分别以两个由回车符分隔的列表形式返回当前面板和目标面板的编号和名称。`Get ( TriggerKeystroke\
  \ )` 将返回导致 `OnObjectKeystroke` 事件的、尚未进入字段的最后一个按键，而 `Get ( TriggerModifierKeys )`\
  \ 返回一个数字，指示用户在键入时按下的任何修饰键。例如，如果用户按住 Shift 键，将返回“1”，而按住 Option 键将返回“8”。当按住组合键时，结果是代表这些键的数字之和，例如，同时按住\
  \ Shift 和 Option 将返回“9”。\n\n对于无法访问目标信息的 *事件*，请从事件前触发器切换到事件后触发器。例如，没有可用的函数来确定由 `OnObjectExit`\
  \ 触发的脚本中的下一个目标对象，因此尝试切换到 `OnObjectEnter`，因为它发生在更改发生之后。\n\n**注意：** 这些目标确定函数仅在目标脚本内有效，*而不会*作为从对象发送到脚本的参数。\n\
  \n## 避免触发器异常\n\n某些对象更改将 *不会* 触发事件。例如，大多数内置的 *拼写* 和 *查找/替换* 功能，尤其是在查找集中执行时，不会触发诸如\
  \ `OnObjectModify`、`OnObjectValidate` 和 `OnObjectSave` 等事件。此外，由于像 `导入记录`、`替换字段内容`\
  \ 和 `重新查询字段内容` 之类的功能会直接修改表数据，它们不会触发界面事件。类似地，像 `设置字段`、`按名称设置字段` 和 `设置 Web 查看器` 这样的脚本步骤也不会触发事件。请务必考虑用户或脚本可能执行的所有操作，并在必要时锁定相关功能或在脚本中使用替代步骤，以确保关键功能被触发。例如，如果布局上的相关字段分配了关键触发器，请使用\
  \ `插入文本` 或 `插入计算结果` 脚本步骤代替 `设置字段`。当无法避免非触发步骤时，请添加步骤以编程方式触发相关的目标脚本，或添加步骤以显式执行所需功能。或者，不要过度使用脚本触发器，尤其是在并非绝对必要的情况下，否则当这些异常排除了触发器时，可能会造成不必要的复杂性。\n\
  \n## 总结\n\n本章继续讨论了脚本编写，重点关注界面事件如何触发脚本。在下一章中，我们将探讨插件如何扩展可用的内置函数和脚本步骤。\n\n# 28. 使用插件扩展功能\n\
  \n*插件* 是一个软件扩展包，通过添加新函数和脚本步骤来扩展 FileMaker 的功能。它们还可以通过新的选项来修改开发界面。FileMaker 的插件由第三方供应商提供，这意味着它们会带来额外的费用以及在长期安装和维护方面的物流考量。然而，一个好的插件是值得付出努力的，因为它们提供的功能使用仅内置工具很难或不可能实现。本章涵盖了基本的插件概念，包括：\n\
  - 寻找插件\n- 安装插件\n- 访问插件\n\n## 寻找插件\n\nFileMaker 的插件可以在不同的供应商处找到。首先搜索 Claris Marketplace\
  \ (`marketplace.claris.com`)，然后查看开发者网站上直接提供的其他一些主要产品。\n\n### MonkeyBread Software\n\
  \n来自 Monkey Bread Software ([www.monkeybreadsoftware.com](http://www.monkeybreadsoftware.com))\
  \ 的 MBS 插件拥有超过 6000 个函数。其令人印象深刻的功能列表包括对脚本工作区的增强、连接功能、操作系统集成以及内容编辑。一些亮点包括：\n- 语法着色\n\
  - 在脚本、列表或关系中搜索\n- 用于上传/下载、发送/接收电子邮件的 CURL\n- 访问扫描仪\n- 访问通讯录、日历和提醒事项\n- 窗口管理功能\n\
  - 发送用户通知\n- 控制打印机\n- 转换图像、绘图和批注\n- 创建、编辑或合并 PDF 文档\n- 生成和识别条形码\n- 读写 Excel 文件\n\
  - 填充 Word 文件\n\n### Productive Computing\n\nProductive Computing 插件产品 ([www.productivecomputing.com](http://www.productivecomputing.com))\
  \ 包括：\n- **Address Book Manipulator** – 实现数据库与 macOS 通讯录应用程序之间的双向数据流\n- **iCal Manipulator**\
  \ – 实现数据库与 macOS 日历应用程序之间的双向数据流\n- **Biometric Fingerprint Reader** – 增加将指纹安全和脚本控制选项集成到数据库中的能力\n\
  \n### Prometheus Systems Consulting\n\nPrometheus Systems Consulting 销售数十种插件 (`360works.com`)，包括：\n\
  - **360Works Email** – 在数据库内发送和接收电子邮件。支持 SMTP、POP 和 IMAP。\n- **360Works Plastic**\
  \ – 在数据库内实现信用卡处理。支持 Authorize.net 和 Verisign/PayPal Payflow。\n- **360Works Web Services\
  \ Manager** – 将您的自定义 FileMaker 脚本发布为可由兼容 SOAP（简单对象访问协议）的软件访问的 XML Web 服务。\n\n\n\n\
  ### Troi Automatisering\n\nTroi Automatisering 提供多个插件（[www.troi.com](http://www.troi.com)），包括：\n\
  \n- `Troi Dialog` – 创建动态、功能丰富的对话框\n- `Troi Encryptor` – 生成密码并保存到钥匙串中\n- `Troi File`\
  \ – 访问 FileMaker 外部的文件和文件夹，压缩和解压缩文件及文件夹，搜索目录等\n\n## 安装插件\n\n每台访问带有插件功能的数据库的计算机，都必须在本地安装该插件。不过，安装资源可以嵌入到数据库文件中并从其中安装，既可以放在单独的安装程序数据库中，也可以直接放在数据库解决方案内。一些插件供应商将插件嵌入在安装程序数据库中交付。\n\
  \n要准备一个自定义数据库来安装插件，请为每个插件安装程序创建一个容器字段。如果数据库用于跨平台工作流（不同操作系统），则可能需要多个容器字段。创建一个脚本，使用`\
  \ Install Plug-in File `步骤，如下面的示例所示，该示例使用` Set Variable `将已安装插件的列表放入名为`$installed`的变量中，然后使用`\
  \ PatternCount `函数判断` Troi File Plug-in `是否需要安装或更新。如果需要，则使用` Get ( SystemPlatform\
  \ ) `确定应安装 macOS 还是 Windows 插件。\n\n```\nSet Variable [ $installed ; Value : Get\
  \ ( InstalledFMPlugins ) ]\nIf [ PatternCount ( $installed ; \"Troi File Plug-in;8.0.2\"\
  \ ) = \"\" ]\nIf [ Get ( SystemPlatform ) = 1 ]\nInstall Plug-in File [ Resources::Troi_File.fmplugin\
  \ ]\nElse\nInstall Plug-in File [ Resources::Troi_File.fmx]\nEnd if\nEnd if\n```\n\
  \n该脚本可以作为由` OnFirstWindowOpen `事件（第 29 章）触发的启动脚本的一部分自动运行，以确保每个用户的计算机都正确安装。可以扩展该脚本以检查错误，确认安装过程是否成功，并在检测到问题时警告用户联系数据库管理员。例如，如果未启用`应用程序`偏好设置中的`允许解决方案安装文件`，则脚本将失败。图\
  \ 28-1 所示的`应用程序`偏好设置对话框中的`插件`选项卡列出了所有已安装的插件。在此处，您可以确认安装、启用、禁用和配置插件。\n\n![../images/429700_2_En_28_Chapter/429700_2_En_28_Fig1_HTML.jpg](img/429700_2_En_28_Fig1_HTML.jpg)\n\
  \n图 28-1\n\n显示已安装插件的偏好设置选项卡必须允许安装\n\n## 访问插件功能\n\n安装后，插件的功能将作为新类别出现在`指定计算`对话框的`函数`窗格或`脚本工作区`的`步骤`窗格中。某些插件会同时出现在这两个列表中，如图\
  \ 28-2 所示。在此处，可以像插入函数或步骤一样，轻松地将插件功能插入到公式（第 12 章）和脚本（第 24 章）中。\n\n![../images/429700_2_En_28_Chapter/429700_2_En_28_Fig2_HTML.jpg](img/429700_2_En_28_Fig2_HTML.jpg)\n\
  \n图 28-2\n\n插件显示在脚本工作区的步骤窗格（后）和/或指定计算窗口的函数窗格（前）中\n\n## 总结\n\n本章介绍了查找、安装和访问插件的基本过程。下一章将开始介绍网络共享。\n\
  \n# 第六部分 – 部署、保护和分析文件\n\n最后这几章涵盖了部署、网络共享、安全性以及一些高级工具的基础知识：\n\n1.  部署和访问数据库\n2. \
  \ 定义账户和权限\n3.  分析和修改文件\n\n# 29. 部署和访问数据库\n\n开发完成后，就该将数据库部署到目标工作流中了。部署有三种主要选择：在文件夹目录中、在\
  \ iOS 设备上或在主机服务器上。每个选项都有不同的优势，选择会影响谁可以访问文件、如何访问以及从何处访问。FileMaker 系列中的每个产品都有不同的部署和访问能力（参见第\
  \ 1 章，“审查产品线”）。在本章中，我们将探讨这些选项，介绍与部署和访问解决方案相关的特定主题，包括：\n\n- 部署到文件夹目录\n- 部署到 iOS 设备\n\
  - 在网络上共享数据库\n- 使用 FileMaker Server 托管\n- 使用 FileMaker Cloud 托管\n- 外部访问解决方案\n\n##\
  \ 部署到文件夹目录\n\n最简单的部署方法是将数据库存储在文件夹目录中。只要有该文件夹的访问权限，`FileMaker Pro` 桌面应用程序就可以打开并使用该数据库。这提供了极大的便利，因为数据库可以在文件夹之间移动，或者像处理文字处理文档或\
  \ Excel 文档一样简单地复制以重复使用。虽然这对于单个用户来说是一个简单且有用的选项，但共享的机会有限。可以通过将副本发送给同事来共享数据库，但每个人都将拥有自己独立的文件副本，无法享受协作、同时使用的优势。它可以放在网络文件服务器上的文件夹中；但是，不建议这样做，因为多个桌面应用程序副本同时读取和写入同一文件会导致文件损坏，这可能是灾难性的（第\
  \ 6 章，“避免文件损坏”）。同样，像 Dropbox 或 Google Drive 这样的服务即使在单用户情况下也可能在同步时损坏文件。`FileMaker\
  \ Pro` 桌面应用程序可以通过充当具有点对点共享（本章后面描述）的适当主机，安全地共享从本地文件夹打开的文件。但是，这仅限于其他用户最多五个并发连接，并且访问权限仅限于\
  \ FileMaker 产品。然而，如果共享不是一个重要的考虑因素，那么从本地文件夹使用数据库是一个合适的选择。只需确保在将文件移动到另一个文件夹之前将其关闭，并将其保存在其他用户无法访问的文件夹中。\n\
  \n\n\n# 部署到 iOS 设备\n\n可以将数据库直接部署到 iPhone 或 iPad 上，并通过免费的 `FileMaker Go` iOS 应用程序进行访问。由于文件物理存储在设备上，因此具有便携性的优势。用户可以在任何有设备的地方访问数据库，即使没有连接到蜂窝网络或\
  \ Wi-Fi 网络也是如此。部署到 iOS 设备仅限于与数据录入相关的任务，无法对文件进行结构性修改。此外，也无法从设备上共享数据库以供工作组同时访问，因此每个设备都拥有文件的独立副本。然而，对于需要便捷单用户访问为小屏幕设计的数据库来说，这个选项非常理想。\n\
  \n要安装，请先将 `Claris FileMaker Go 19` 应用程序下载到设备上。然后，将设备连接到计算机，并将数据库从某个文件夹复制到设备“文件”中的\
  \ `FileMaker Go 19` 文件夹中。在 macOS Catalina (10.15) 上，按照以下步骤操作，如图 29-1 所示：\n\n1. 打开一个新的“访达”窗口，并让边栏可见。\n\
  2. 在“位置”边栏组下，选择目标 iOS 设备。\n3. 选择“文件”选项卡。然后将数据库文件拖入 `FileMaker Go 19` 文件夹。\n\n> **注意**\n\
  > 四个 Claris 示例文件会自动安装并出现在您的文件所在的文件夹中。如果需要，可以删除这些文件。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig1_HTML.jpg](img/429700_2_En_29_Fig1_HTML.jpg)\n\
  \n**图 29-1** 用于配置 iPhone 的 macOS Catalina (10.15) 窗口\n\n数据库安装到设备后，启动 `FileMaker\
  \ Go` 应用程序。点击底部的“我的应用”选项卡，然后在“位置”标题下点击“在我的 iPhone 上”，如图 29-2 所示。下一个屏幕将显示设备上已安装的数据库列表。点击以打开所需的数据库。\n\
  \n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig2_HTML.jpg](img/429700_2_En_29_Fig2_HTML.jpg)\n\
  \n**图 29-2** `FileMaker Go` 应用程序对 iPhone 上已安装数据库的访问权限\n\n# 在网络上共享数据库\n\n在网络上的共享数据库与在共享服务器文件夹中共享文档文件*不是*一回事。如前所述，数据库文件*可以*放置在文件服务器上的共享目录中，多个人可以看到并访问它。但是，如果多个用户同时打开该文件，当执行数据录入任务时，每个\
  \ `FileMaker` 副本将开始持续地读写该文件。*这将导致文件损坏和数据丢失！* 如果发生这种情况，该文件必须通过恢复过程进行处理，并且可能损坏到无法修复（第\
  \ 6 章，“避免文件损坏”）。\n\n在网络上共享数据库的正确方法是*通过*一个启用了共享功能的 `FileMaker` 软件版本来充当主机服务。这可以通过使用\
  \ `FileMaker Pro` 桌面应用程序进行*点对点共享*，或使用运行 `FileMaker Server` 或 `FileMaker Cloud` 的专用服务器来实现。数据库存储在主机软件安全隐藏的文件夹中，该软件管理连接并协调无冲突的读/写进程，如图\
  \ 29-3 所示。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig3_HTML.jpg](img/429700_2_En_29_Fig3_HTML.jpg)\n\
  \n**图 29-3** 数据库及由主机软件管理的客户端访问\n\n一旦主机开始提供数据库服务，用户就可以通过其客户端软件访问它。在 `FileMaker Pro`\
  \ 桌面应用程序中，选择 `文件 ➤ 主机 ➤ 显示主机` 菜单，或者在“打开文件”对话框中点击“主机”，即可看到列出收藏主机和本地主机的对话框。iOS 版 `FileMaker\
  \ Go` 应用程序中的“主机”选项卡也会列出相同的内容。当数据库配置为 `WebDirect` 时，用户还可以通过网络浏览器中的 URL（例如 `http://127.0.0.1/fmi/webd`）从主机访问数据库。当使用\
  \ `FileMaker Server` 或 `FileMaker Cloud` 托管时，还可以使用 `ODBC`/`JDBC` 和通过 `FileMaker\
  \ API` 进行的*表述性状态传递* (REST) 来启用传入连接。有关这些连接方法的更多信息，请访问 Claris 的文档网站。\n\n## 了解协作限制\n\
  \n当多个用户在同一个托管文件中工作时，会自动强制执行一些限制以避免冲突。各部分每次*仅限一名用户*。如果用户各自修改的是*不同*的记录、布局或脚本，那么前三个操作可以同时进行。其余的开发操作在各自的开发者对话框中每次仅限一名用户，即，一名用户可以编辑值列表，同时另一名用户可以编辑模式，因为这些操作在不同对话框中进行。\n\
  \n-   编辑*相同*记录\n-   修改*相同*布局\n-   修改*相同*脚本\n-   修改*任何*数据库模式：表、字段和关系\n-   修改*任何*值列表\n\
  -   修改*任何*数据源\n-   修改*任何*安全访问权限\n\n## 配置网络设置\n\n`FileMaker 网络设置` 对话框具有双重用途。它用于启用\
  \ `FileMaker Pro` 桌面应用程序的网络共享功能，并用于配置各个已打开数据库的网络访问设置。如图 29-4 所示的该对话框，可以通过从 `文件 ➤\
  \ 共享` 子菜单或工具栏的“共享”菜单中选择“与 FileMaker 客户端共享”选项来打开。\n\n> **警告**\n> `FileMaker` 不会托管缺乏足够帐户凭据的数据库（第\
  \ 30 章）。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig4_HTML.jpg](img/429700_2_En_29_Fig4_HTML.jpg)\n\
  \n**图 29-4** 用于配置点对点网络共享的对话框\n\n### 启用点对点共享\n\n*点对点共享* 选项允许用户通过 `FileMaker Pro`\
  \ 桌面应用程序打开最多 125 个数据库，并充当最多五个并发远程客户端连接的主机。由于点对点主机运行的是客户端版本的软件，因此主机和其他已连接的用户都可以在文件中执行数据录入和开发任务，具体取决于其访问权限。`FileMaker\
  \ 网络设置` 对话框的上半部分用于为客户端本地应用程序启用点对点共享。此处会显示一条警告，指出点对点共享不是安全的网络协议，因为只有 `FileMaker Server`\
  \ 和 `FileMaker Cloud` 具备使用*安全套接层* (SSL) 认证的选项以启用网络上的安全传输。虽然此方法不适用于大型工作组或对安全性有重要要求的场景，但对于与一小群同事共享数据库来说，它是可行的。\n\
  \n\n\n#### 配置数据库网络访问设置\n\n`FileMaker Network Settings`（文件管理器网络设置）对话框的下半部分包含一个本地打开的文件列表，并允许在相邻面板中配置网络访问设置。这些设置控制当数据库由`FileMaker\
  \ Server`（文件管理器服务器）、`FileMaker Cloud`（文件管理器云）或启用了对等功能的`FileMaker Pro`（文件管理器专业版）桌面应用副本托管时，客户端的访问权限。选中一个文件后，可以选择允许哪些用户从其他工作站连接到该文件。选择`All\
  \ Users`（所有用户）允许输入有效凭证的任何用户访问选中的文件。选择`Specify users by privilege set`（按权限集指定用户）将访问权限限制为您选择的特定权限集。新文件的默认选择是`No\
  \ users`（无用户），这将拒绝对该文件的所有访问，即您可以打开它，但不会共享它。`Don't display in Launch Center`（不在启动中心显示）复选框将隐藏文件，使其不出现在远程用户的`Hosts`（主机）对话框中。用户必须手动输入文件的名称和地址才能直接打开它。此设置可用于提高安全性，或从可用文件列表中排除那些在使用其表的另一个数据库打开时自动打开的后台数据文件。\n\
  \n**注意**：通过`File ➤ Sharing`（文件 ➤ 共享）菜单访问的类似对话框用于配置数据库的 ODBC/JDBC 和`WebDirect`（网页直连）设置。\n\
  \n### 打开托管数据库\n\n要使用`FileMaker Pro`桌面应用打开托管文件，请选择`File ➤ Hosts ➤ Show Hosts`（文件\
  \ ➤ 主机 ➤ 显示主机）菜单，或点击`Open File`（打开文件）对话框上的`Hosts`（主机）按钮。这将打开一个`Hosts`（主机）对话框，列出主机上可用的文件，而不是文件夹目录，如图\
  \ 29-5 所示。侧边栏包含三个可折叠的组。点击`Claris ID`（克 laris 标识）可访问托管在`FileMaker Cloud`账户上的数据库。云托管文件也可以从`Launch\
  \ Center`（启动中心）的`My Apps`（我的应用）部分打开。通过点击`Local`（本地）组并选择一个数据库来访问本地对等主机或`FileMaker\
  \ Server`（文件管理器服务器）。在列表中右键点击文件，从上下文菜单中选择`Add to Favorites`（添加到收藏夹），即可将任何主机的文件标记为收藏。这些文件将显示在`Favorites`（收藏夹）选项卡下的列表中。\n\
  \n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig5_HTML.jpg](img/429700_2_En_29_Fig5_HTML.jpg)\n\
  \n**图 29-5** 用于打开托管数据库的对话框\n\n## 使用 FileMaker Server 托管\n\n`FileMaker Server`是一个快速、可靠且可扩展的服务器软件包，可在网络上安全地共享数据库文件。该服务器具有强大的功能和优势，包括：\n\
  \n- 为运行在 macOS、Windows 或 iOS 上的任何`FileMaker`产品线的用户提供可靠的全时数据库服务。\n- 多种灵活的许可选项，可以混合搭配以满足团队成员的个人需求。\n\
  - 使用`FileMaker WebDirect`（文件管理器网页直连）无需网络编程即可在 Web 上共享数据库，或使用`Custom Web Publishing`（自定义网络发布）通过\
  \ PHP 或 XML 创建数据驱动的网站。\n- 使用`Open Database Connectivity`（开放数据库连接，ODBC）和`Java Database\
  \ Connectivity`（Java 数据库连接，JDBC）与远程系统共享托管数据库。\n- 使用`Admin Console`（管理控制台）网络界面或`fmsadmin`命令行本地或远程监控和管理服务器。\n\
  - 通过自动数据库备份和计划脚本实现管理任务的自动化。\n- 可以使用`Perform Script On Server`（在服务器上执行脚本）步骤将脚本从客户端软件卸载到服务器上运行。\n\
  \n**注意**：有关超出本节所述托管基础知识的更多信息，请参阅位于`https://www.claris.com/resources/documentation/`的`FileMaker\
  \ Server`产品支持部分。\n\n### 准备主机计算机\n\n在选择用作服务器主机的计算机时，有许多重要的考虑因素。计算机应具有快速处理器、充足的内存和固态硬盘。使用有线的、高速的、专用的网络连接将其连接到网络，并理想地为其分配一个静态\
  \ IP 地址。为了允许优先使用处理器、硬盘和网络容量，*专门*将该计算机用于托管数据库。为避免损坏，不应直接备份包含托管数据库的文件夹。相反，请使用`FileMaker\
  \ Server`内置的计划备份功能，然后将这些备份的额外副本复制到其他驱动器。此外，禁用屏幕保护程序和节能休眠功能，改为使用显示器变暗。关闭诸如 macOS\
  \ `Spotlight`（聚光灯）功能之类的索引服务，并且不要使用防病毒软件扫描。\n\n**提示**：始终查看 Claris 网站以获取服务器的最低硬件要求和其他服务器建议。\n\
  \n#### 定义已安装资源\n\n`FileMaker Server`不是一个传统应用程序，不会出现在计算机的`Applications`（应用程序）文件夹中。相反，将安装以下资源：\n\
  \n- `Database Server`（数据库服务器） – 托管数据库，与`FileMaker Pro`和`FileMaker Go`（文件管理器 Go）客户端共享。\n\
  - `Web Publishing Engine`（网络发布引擎） – 处理`WebDirect`服务，管理`Web Server`（网络服务器）和`Database\
  \ Server`之间的流量。\n- `Web Server`（网络服务器） – macOS 使用其自己的 Apache 网络服务器副本。在 Windows 上，安装期间会启用`Internet\
  \ Information Services`（互联网信息服务）并将其用作网络服务器。\n- `PHP Engine`（PHP 引擎） – 用于将`FileMaker\
  \ API`的调用路由到`Web Publishing Engine`。\n- `Admin Console`（管理控制台） – 通过服务器或客户端计算机上的网络浏览器访问，用于配置和管理服务器。\n\
  - `Command-Line Interface Executable`（命令行界面可执行文件） – 使用`fmsadmin`命令通过命令行界面管理服务器。\n\
  - `User Account`（用户账户） – 指定服务器运行所用的账户。macOS 上的默认选择是安装程序创建的新`fmserver`用户，Windows\
  \ 上则是`Local System`（本地系统）。如果需要，可以指定自定义账户。\n- `User Group`（用户组） – 会创建一个名为`fmsadmin`的新用户组，并且必须将其分配给托管数据库文件。\n\
  \n### 访问管理控制台\n\n`Admin Console`（管理控制台）用于管理服务器，可通过网络浏览器访问。安装服务器后，服务器计算机桌面上会有一个指向本地主机的书签。也可以通过打开网络浏览器并输入以下地址来访问控制台：\n\
  \n```\nhttp://localhost:16001/admin-console\n```\n\n要使用另一台计算机访问它，请将`localhost`替换为以下服务器地址：\n\
  \n```\nhttps://10.0.1.20:16000/admin-console\nhttps://10.0.1.20/admin-console\n\
  ```\n\n当控制台页面打开并请求身份验证时，输入您在安装期间定义的管理员名称和密码。服务器管理控件分布在六个选项卡页面上：\n\n- `Dashboard`（仪表盘）\
  \ – 汇总服务器信息和状态\n- `Databases`（数据库） – 列出所有已安装的数据库和活跃连接的客户端，并带有管理数据库以及与客户端通信或断开连接的控件\n\
  - `Backups`（备份） – 用于计划并查看备份\n- `Configuration`（配置） – 包含常规设置、客户端、文件夹、计划脚本、通知、证书和日志记录\n\
  - `Connectors`（连接器） – 包含`Web Publishing`（网络发布）、`FileMaker Data API`（文件管理器数据 API）、插件以及\
  \ ODBC/JDBC 连接的设置\n- `Administration`（管理） – 包含许可证、管理员密码和外部身份验证设置\n\n### 上传文件到 FileMaker\
  \ Server\n\n可以通过手动将数据库文件移动到`Databases`（数据库）文件夹中，或通过`FileMaker Pro`桌面应用从客户端计算机上传它们来将数据库文件添加到服务器。\n\
  \n\n\n### 将文件移入 Databases 文件夹\n\n服务器将托管的文件存储在 `FileMaker Server` 文件夹的 `Databases`\
  \ 子文件夹中。如果安装到默认位置，该文件夹将根据操作系统位于两个位置之一：macOS 上的 `Library` 文件夹或 Windows 上的 `Program\
  \ Files` 文件夹，两者均如下所示。要手动安装文件，只需将其拖入 `Databases` 文件夹即可。但是，以这种方式添加文件时，必须手动将它们分配给 `fmserver`\
  \ 用户和 `fmsadmin` 组。\n\n```\n/Library/FileMaker Server/Data/Databases\n[drive]:\\\
  Program Files\\FileMaker\\FileMaker Server\\Data\\Databases\\\n```\n\n**注意**  \n\
  如果服务器正在主动托管数据库，则移除、替换或使用 `FileMaker Pro` 桌面应用程序直接打开这些数据库将导致严重损坏。在执行任何这些操作之前，请确认文件未被主动托管。\n\
  \n### 从客户端计算机上传文件\n\n在客户端计算机上创建的数据库文件可以通过 `FileMaker Pro` 桌面应用程序直接上传到服务器。对于 FileMaker\
  \ Cloud，这是将文件上传到服务器的唯一可用方法。通过从 `Sharing` 子菜单或工具栏中的 `Sharing` 图标菜单中选择 `Upload to\
  \ Host` 选项，打开 `Upload to Host` 对话框。该对话框类似于 `Hosts` 对话框，带有一个用于选择主机的侧边栏，如图 29-6 所示。选择后，登录到主机以开始添加数据库。\n\
  \n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig6_HTML.jpg](img/429700_2_En_29_Fig6_HTML.jpg)\n\
  \n**图 29-6** — 用于上传到主机的登录对话框\n\n输入所选主机的管理员凭据后，主面板将变为数据库上传列表，如图 29-7 所示。将数据库文件拖入列表，或单击\
  \ `Browse` 按钮通过对话框选择它们。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig7_HTML.jpg](img/429700_2_En_29_Fig7_HTML.jpg)\n\
  \n**图 29-7** — 显示待上传数据库文件的对话框\n\n添加数据库时，FileMaker 会运行一致性检查以确定文件的健康状况，并检查其是否具有足够的安全性以进行托管。在上述示例中，第一个文件具有受密码保护的\
  \ `Admin` 帐户，而第二个文件没有密码且已被拒绝。勾选文件旁的复选框以将其包含在上传中。对话框底部的复选框将使文件在上传完成后在服务器上自动打开。\n\n\
  ## 管理数据库文件\n\n要管理托管的数据库，请登录 `Admin Console` 并单击 `Databases` 选项卡。列表中每个数据库旁边的下拉菜单包含以下管理命令：\n\
  \n- `Open` – 打开数据库以供网络访问。如果文件已加密，则需要输入密码。\n- `Close` – 关闭并停止托管数据库。\n- `Download`\
  \ – 将已关闭的数据库副本下载到本地硬盘驱动器。在 macOS 上，如果浏览器偏好设置阻止了弹窗，此功能将无法使用！\n- `Remove` – 将已关闭的数据库从列表中移除，并将其放入\
  \ `Databases` 文件夹中一个不可用于托管的特殊文件夹中。\n- `Verify` – 关闭、验证并重新打开数据库。\n- `Clear the Encryption\
  \ Passwords` – 移除所选数据库文件的加密密码。\n\n**提示**  \n数据库列表顶部的一个类似菜单提供了这些选项的镜像，但其命令会影响所有数据库。\n\
  \n## 重新启动服务器计算机\n\n当服务器正在主动托管文件时，它可能正在与客户端通信、在缓存中保留最近的更改，或正在将这些更改写入磁盘。如果强制退出服务器进程或硬件突然强制关闭，文件可能会损坏。为避免损坏，务必规避某些风险并正确关闭数据库。始终使用足够的不间断电源（UPS）设备，并在关闭计算机之前关闭\
  \ `Admin Console` 中的所有数据库。除非因重大崩溃或故障而绝对必要，否则切勿在不先关闭文件的情况下强制退出应用程序或执行硬重启计算机。\n\n\
  ## 使用命令行界面\n\n`fmsadmin` 命令行工具允许使用 `Terminal` 应用（macOS）或命令提示符（Windows）来管理服务器。这些命令随服务器自动安装到以下特定于平台的文件夹中：\n\
  \n```\nmacOS = /Library/FileMaker Server/Database Server/bin/fmsadmin\nmacOS（符号链接）\
  \ = /usr/bin/fmsadmin\nWindows = [drive]:\\Program Files\\FileMaker\\FileMaker Server\\\
  Database Server\\fmsadmin.exe\n```\n\n### 格式化 fmsadmin 命令\n\n命令的公式为：`fmsadmin <command>\
  \ <options>`。例如，要获取所有托管数据库的列表，请在 Terminal 中键入以下命令并按 Enter 键。\n\n```\nfmsadmin list\
  \ files\n```\n\n某些功能需要身份验证，并会提示您输入服务器管理员用户名和密码。或者，您可以在命令中包含凭据信息，以避免出现二次提示。只需按照以下模式和示例添加它们：\n\
  \n```\nfmsadmin  -u  -p\nfmsadmin list files –u Admin –p J56TF3\n```\n\n### 可用的\
  \ fmsadmin 命令\n\n`fmsadmin` 工具包含以下命令，每个命令都有各种可用选项：\n\n- `autorestart` – 获取或设置服务器的自动重启功能\n\
  - `backup` – 备份一个数据库或文件夹中的每个数据库\n- `clearkey` – 移除已保存的数据库加密密码\n- `close` – 关闭一个或多个数据库\n\
  - `certificate` – 管理 SSL 证书\n- `disable` – 禁用计划或统计记录\n- `disconnect` – 断开一个或多个客户端\n\
  - `enable` – 启用计划或统计记录\n- `help` – 获取可用命令的帮助信息\n- `list` – 列出客户端、数据库、插件或计划\n- `open`\
  \ – 开始托管数据库\n- `pause` – 临时停止数据库服务器\n- `remove` – 将文件移出 Databases 文件夹\n- `resetpw`\
  \ – 重置管理员用户密码\n- `restart` – 重启服务器、adminserver、FMSE、WPE 或 XDBC 进程\n- `resume` –\
  \ 结束数据库服务器的临时暂停\n- `run` – 运行一个计划\n- `send` – 向已连接的用户发送消息\n- `standby` – 管理备用服务器连接、角色和更新\n\
  - `start` – 启动服务器、adminserver、FMSE、WPE 或 XDBC 进程\n- `status` – 获取客户端或数据库的状态\n- `stop`\
  \ – 停止服务器、adminserver、FMSE、WPE 或 XDBC 进程\n- `verify` – 检查数据库的一致性\n\n### 获取详细的命令帮助\n\
  \n要获取有关某个命令的更多信息，请键入“help”，后跟该命令的名称。例如，输入 `fmsadmin help close` 将返回 `close` 命令的帮助页面，如图\
  \ 29-8 所示。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig8_HTML.jpg](img/429700_2_En_29_Fig8_HTML.jpg)\n\
  \n**图 29-8** — 命令帮助请求示例\n\n\n\n# 使用 FileMaker Cloud 托管\n\n`FileMaker Cloud` 是 Claris\
  \ 提供的一项服务，可提供对云端数据库的可靠访问。虽然其使用和配置界面与之前描述的 `FileMaker Server` 几乎相同，但云端存在一些重要差异。硬件由\
  \ Claris 管理，因此您无需关心硬件或能源成本。由于无法直接访问文件夹结构，因此与服务器和数据库的交互只能通过 `Admin Console` 执行。为保护您的信息，所有数据库在上传到云端时必须进行加密。各种维护任务，例如每日备份、软件升级、非工作时间的自动重启以及其他维护任务，都可以自动执行。另一个优势是\
  \ Claris 提供全天候支持选项。\n\n> **注意**  \n> 有关 Claris 托管您的数据库解决方案的更多信息，请访问 [`www.claris.com/filemaker/cloud/`](http://www.claris.com/filemaker/cloud/)。\n\
  \n# 使用链接、URL 和 AppleScript 控制 FileMaker\n\n有多种方法可以从 FileMaker 外部打开数据库并在其中执行操作：`Snapshot\
  \ Links`（快照链接）、`FileMaker URL` 和 `AppleScript`。\n\n## 使用快照链接共享书签\n\n`快照链接`是一个 XML\
  \ 文件，存储关于一个记录或一组已找到记录的信息，可用于重新创建先前存在的已找到记录集。它们的作用类似于书签，但引用的是数据库中特定的一组已找到记录。打开一个快照文件会自动打开数据库，导航到相应布局，并恢复已找到的记录集，从而重新创建用户在保存快照时所查看的相同上下文。这些文件可以存储在文件夹中并发送给同事，允许用户与其他用户交换记录列表。例如，公司文件服务器上的每个客户文件夹都可以包含一个快照链接，点击即可立即打开该公司的联系人列表视图。\n\
  \n要生成快照链接，请选择 `File ➤ Save/Send Records As ➤ Snapshot Link` 菜单。这将打开一个 `Save Records`\
  \ 对话框，其中包含快照配置 `options`，如图 29-9 所示。为链接输入名称并选择保存位置。选择 `Current record` 或 `Records\
  \ being browsed` 的 `Save` 选项来控制保存哪些记录。可选的复选框可用于创建带有快照附件的电子邮件。`Send Records as Snapshot\
  \ Link` 脚本步骤使用相同的对话框来配置自动生成快照链接的脚本。\n\n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig9_HTML.jpg](img/429700_2_En_29_Fig9_HTML.jpg)\n\
  \n**图 29-9** — 用于配置和保存快照链接的对话框\n\n## 使用 FileMaker URL\n\n`FileMaker URL` 是一种已注册到\
  \ FileMaker Pro 客户端应用程序安装中的互联网协议，可以使用 URL 打开数据库并运行脚本。如果用户帐户的权限集被明确授予对 `fmurlscript`\
  \ 扩展权限的访问权（第 30 章），则以下 URL 选项变为可能：\n\n- **在 Web 浏览器中键入** — 在 Web 浏览器中键入或粘贴 URL，命令将被路由到\
  \ FileMaker。\n- **嵌入网页中** — 使用 `href` 标签在浏览器中的网页上或数据库中某个布局上的 Web 查看器中创建链接。或者，新的\
  \ `FileMaker.PerformScript` JavaScript 函数是用于 Web 查看器的更好选项（第 20 章，“使用 JavaScript\
  \ 调用 FileMaker 脚本”）。\n- **在脚本中使用** — 使用 `Open URL` 脚本步骤来触发其他脚本。但是，`Perform Script`\
  \ 步骤提供了通过计算名称运行脚本的更好选项。\n- **在外部应用程序和脚本中使用** — 编程语言（如 AppleScript）可以指示 FileMaker\
  \ 应用程序运行该 URL。\n\n### 格式化基本 FMP URL\n\n地址必须包含一个 `前缀`、`地址`和`文件名`。扩展名的包含是可选的。从版本 18\
  \ 开始，前缀可以包含版本号来指定多个已安装版本中的其中一个。如果未指定版本，URL 应路由到最后安装的版本。打开数据库需要地址。要引用一个已打开的数据库，请使用美元符号作为地址。例如，要引用一个已打开的\
  \ `Contacts` 数据库，地址应格式化如下例所示：\n\n```\nfmp://$/\nfmp://$/Contacts.fmp12\nfmp18://$/Contacts.fmp12\n\
  fmp19://$/Contacts.fmp12\n```\n\n如果数据库存储在用户的 `Documents` 文件夹中，请使用波浪号作为地址，如下例所示，该地址将自动打开数据库：\n\
  \n```\nfmp19://~/Contacts.fmp12\n```\n\n所有 URL 都必须进行 `百分比编码`，但在 FileMaker 内使用 `Open\
  \ URL` 脚本步骤时除外。例如，一个名为“Learn FileMaker”的数据库需要将空格改为“%20”，如下例所示：\n\n```\nfmp://$/Learn%20FileMaker.fmp12\n\
  ```\n\n> **提示**  \n> 在 FileMaker 计算中构建 URL 时，使用 `GetAsURLEncoded` 函数自动处理编码。\n\n\
  ### 寻址托管数据库\n\n要访问网络服务器上托管的数据库，请包含主机计算机的地址。例如，如果 `Contacts` 数据库已托管，FMP URL 可以使用\
  \ IPv4 地址、IPv6 地址或 DNS 名称进行格式化，如下三个示例所示：\n\n```\nFMP://10.1.0.10/Contacts.fmp12\n\
  FMP://[2001:0db8:0a0b:12f0:0000:0000:0000:0001]/Contacts.fmp12\nFMP://filemaker-server.local/Contacts.fmp12\n\
  ```\n\n### 包含访问凭据\n\n为避免弹出请求帐户凭据的对话框并实现无缝操作，可以在 `URL` 中指定帐户和密码。这些可以以冒号分隔的值形式添加在地址之前，并用“`@`”符号分隔。例如，一个帐户名为“admin”、密码为“58Jt234”的数据库可以使用以下示例中的地址打开，而无需密码对话框：\n\
  \n```\nFMP://admin:58Jt234@10.1.0.10/Contacts.fmp12\n```\n\n\n\n## 包含脚本名称\n\nURL\
  \ 还可以指示 FileMaker 在数据库中运行脚本。在数据库名称后添加问号，后跟 `script=` 和一个经过 URL 编码的脚本名称。例如，以下示例将确认指定主机上的\
  \ `Contacts` 数据库已打开，然后运行名为 `Find` 的脚本：\n\n```\nFMP://10.1.0.10/Contacts.fmp12?script=Find\n\
  ```\n\n为简洁起见，本示例及其他示例中均省略了帐户凭据。但可以包含这些凭据，以确保数据库打开时不会出现要求输入信息的对话框。运行脚本时，将使用登录数据库的用户帐户的权限和限制来执行。\n\
  \n### 添加脚本参数\n\n当目标脚本接受参数时，URL 可以通过在脚本名称后附加一个与号（ampersand）和 `param` 值来包含该参数。例如，无需总是搜索相同的条件，可以修改前面示例中的\
  \ `Find` 脚本，使其接受一个参数并使用该值来确定执行哪种类型的搜索。在 `If` 脚本步骤中使用的参数，可以让脚本根据 URL 提供的值来搜索 `Status`\
  \ 字段。现在，要查找状态为 `Active` 或 `Hold` 的记录，请在 URL 中添加一个与号和 `param` 组件，如下例所示：\n\n```\n\
  FMP://10.1.0.10/Contacts.fmp12?script=Find&param=Active\nFMP://10.1.0.10/Contacts.fmp12?script=Find&param=Hold\n\
  ```\n\n### 添加脚本变量\n\nURL 还可以更进一步，通过在脚本中初始化局部变量，添加与号、变量名和变量值，遵循如下所示的模式：\n\n```\n\
  FMP:///?&param=&=\n```\n\n此示例初始化了一个变量，为查找脚本指定了州名：\n\n```\nFMP://10.1.0.10/Contacts.fmp12?script=Find&param=Active&$State=Pennsylvania\n\
  ```\n\n## 使用 AppleScript 自动化 FileMaker\n\n`AppleScript` 是一种符合 `开放脚本架构`（`OSA`）的命令语言，可以与\
  \ macOS 应用程序通信并进行控制（[`https://goo.gl/i70lnx`](https://goo.gl/i70lnx)）。早在 1994 年该语言首次作为\
  \ Macintosh System 7.5 的一部分引入时，FileMaker 就是首批支持脚本化的应用程序之一。从那时起，对该语言的支持稳步发展，并继续为从外部脚本自动化\
  \ FileMaker 功能以及将其与其他应用程序的数据集成提供了绝佳选择。如果用户帐户的权限集被明确授予 `fmextscriptaccess` 扩展权限（第\
  \ 30 章），那么 AppleScript 将能够控制应用程序和数据库的操作。\n\n### 定义 Tell FileMaker 语句\n\nAppleScript\
  \ 是使用位于 `Applications` 文件夹下 `Utilities` 子文件夹中的 `脚本编辑器` 应用程序编写的。事件指令通过一条指向应用程序的 `tell`\
  \ 语句发送给该应用程序，该语句包含对象引用和命令。\n\n```\ntell application \"FileMaker Pro\"\n\nend tell\n\
  ```\n\n### 打开 FileMaker 的脚本词典\n\n每个 macOS 可脚本化应用程序都有一个脚本词典，可以通过将应用程序拖放到 `脚本编辑器`\
  \ 应用程序上，或启动编辑器并选择 `文件 ➤ 打开词典` 菜单来打开它。这会打开一个窗口，显示可用于控制应用程序的对象和命令词典，如图 29-10 所示。\n\
  \n![../images/429700_2_En_29_Chapter/429700_2_En_29_Fig10_HTML.jpg](img/429700_2_En_29_Fig10_HTML.jpg)\n\
  \n图 29-10\n\nFileMaker Pro Advanced AppleScript 词典窗口\n\n**警告**\n\nFileMaker 的脚本命令使用三个不同的词来描述数据库窗口：`database`、`document`\
  \ 和 `window`。这三个词可以互换使用，但可能产生略有不同的效果。\n\n### 编写基本任务脚本\n\n作为使用脚本自动化 FileMaker 的简要介绍，本节提供了一些简单示例，包括打开数据库、激活已打开的数据库、更改布局、执行查找和统计记录数。这些可以通过与其他功能结合来创建复杂的脚本化工作流，从而执行更复杂的操作。它们还可以与发送到其他应用程序的脚本命令交织在一起，创建强大的应用程序间数据传输解决方案。\n\
  \n**注意**\n\nFileMaker 还包括一个名为 `Perform AppleScript` 的脚本步骤，该步骤允许将 AppleScript 命令嵌入到针对其他应用程序命令的数据库脚本中。\n\
  \n#### 打开数据库\n\nAppleScript 可以使用 `open file` 命令从任何文件夹打开数据库。此示例将三个变量的值设置为数据库的路径、帐户名和密码。这些变量用于指示\
  \ FileMaker 打开该文件：\n\n```\nset pathToDatabase to \"Macintosh HD:Users:shannonmiller:Learn\
  \ FileMaker.fmp12\"\nset textAccount to \"Admin\"\nset textPassword to \"58Jt234\"\
  \ntell application \"FileMaker Pro\"\nopen file pathToDatabase with passwords textPassword\
  \ for Accounts textAccount\nend tell\n```\n\n要打开托管的数据库，`getURL` 命令将接受本章前面描述的 FileMaker\
  \ URL。\n\n```\ntell application \"FileMaker Pro\"\ngetURL \"fmp19://Admin:58Jt-234@10.0.1.20/Learn%20FileMaker.fmp12\"\
  \nend tell\n```\n\n#### 激活已打开的数据库\n\n要使已打开的数据库显示在文档窗口堆栈的最前面，此示例检查该文档是否存在，然后使用 `show`\
  \ 命令激活该数据库：\n\n```\nset nameDatabase to \"Learn FileMaker\"\ntell application \"\
  FileMaker Pro\"\nif (document nameDatabase exists) = true then\nshow document nameDatabase\n\
  end if\nend tell\n```\n\n#### 更改布局\n\n此示例使用 `show` 命令激活名为 `Contact` 的布局：\n\n```\n\
  tell application \"FileMaker Pro\"\ntell document \"Learn FileMaker\"\nshow layout\
  \ \"Contact\"\nend tell\nend tell\n```\n\n#### 查找所有记录\n\n要执行相当于 `查找全部` 命令的操作，请使用带有\
  \ `every record` 引用的 `show` 命令。\n\n```\ntell application \"FileMaker Pro\"\ntell\
  \ database \"Learn FileMaker\"\ntell table \"Contact\"\nshow every record\nend tell\n\
  end tell\nend tell\n```\n\n#### 基于字段值查找记录\n\n此示例在 `show` 命令后附加一个 `whose` 子句，以根据某个字段中的特定值进行搜索。\n\
  \n```\nset nameTable to \"Contact\"\nset nameField to \"Contact Address State\"\n\
  set textToFind to \"NY\"\ntell application \"FileMaker Pro\"\ntell database \"Learn\
  \ FileMaker\"\ntell table nameTable\nshow every record whose cell nameField of table\
  \ nameTable contains textToFind\nend tell\nend tell\nend tell\n```\n\n`whose` 子句可以使用多种运算符来匹配字段中的数据，包括\
  \ `contains`、`does not contain`、`is equal to` 和 `is not equal to`。此外，子句可以与其他子句组合以形成复合搜索条件，如下例所示：\n\
  \n```\nshow every record\nwhose cell nameField1 of table nameTable contains value1\
  \ or\nwhose cell nameField1 of table nameTable is equal to value2 and\nwhose cell\
  \ nameField2 of table nameTable is not equal to value3\n```\n\n##### 统计找到集中的记录数\n\
  \n要统计当前窗口找到集中的记录数，需要一条 `tell window` 语句来引用所显示的上下文，无论布局或表如何。\n\n```\ntell application\
  \ \"FileMaker Pro\"\ntell window \"Learn FileMaker\"\nreturn the number of every\
  \ record\nend tell\nend tell\n```\n\n##### 统计表中的所有记录数\n\n要统计表中所有记录的总数，无论当前窗口的布局如何，请使用\
  \ `tell database` 语句。\n\n```\ntell application \"FileMaker Pro\"\ntell database\
  \ \"Learn FileMaker\"\nreturn the number of every record of table \"Contact\"\n\
  end tell\nend tell\n```\n\n\n好的，作为高级文档工程师和翻译员，我已遵循您提供的注意事项，将英文文本翻译成中文，并保留了所有格式标记。\n\
  \n\n## 摘要\n\n本章介绍了解决方案部署的方法以及访问数据库的各种方式。在下一章中，我们将探讨用于限制数据库访问的凭据认证。\n\n# 30. 定义账户与权限\n\
  \n在这个全球网络互联的现代时代，保护数据库安全的需求显而易见。关于数据泄露、信息泄漏以及黑客恶意利用的新闻报道，为我们提供了关于未受保护数据危险的警钟。虽然阻止外部人员的未授权访问非常重要，但安全权限是一个更为复杂的主题。即使是授权用户，也需对其在数据库内部的活动进行限制。限制他们可以创建、查看、修改和使用的*内容*值得考虑。同样，限制对数据库*结构设计*的访问，有助于阻止对模式、界面和脚本函数的粗心或恶意更改。即使是对公式或脚本的微小意外更改，也可能对公司的业务流程造成灾难性影响，并可能导致严重的经济后果。只有具备足够技术技能和业务逻辑知识的用户才应被授权担任开发者角色。本章探讨可用的凭据认证功能，涵盖以下主题：\n\
  \n-   定义默认安全\n-   定义用户账户\n-   探索权限集\n-   在公式中使用凭据\n-   利用自定义扩展权限\n-   控制文件访问\n\n\
  ## 定义默认安全\n\n*账户凭据*定义了谁可以打开文件以及他们被授予了哪些权限。每个 FileMaker 数据库都从默认凭据设置开始，这些设置被配置为不引人注目，并允许任何人立即访问文件的全部内容和结构。任何能看到存储在目录中或由其他客户端共享的文件的人都可以打开它，并拥有*对所有内容的完全访问权限*。该文件将显示为已解锁，并且无需登录提示即可打开。对于在本地计算机上将数据库作为文档文件使用的个人情况，或者在无需考虑安全性的小团队中，此配置可能是可以接受的。然而，在大多数情况下，建议使用凭据认证来保护敏感内容和结构编程。当使用\
  \ FileMaker Server 或 FileMaker Cloud 托管数据库时，这是*必须的*。\n\nFileMaker 要求每个数据库至少有两个默认账户设置：一个允许完全开发访问的活动账户，另一个为访客提供只读访问权限的账户。每个新创建的数据库都包含这两个账户。一个名为\
  \ `[Guest]` 的账户允许用户*无需*输入用户名或密码即可打开文件，但权限受到严格限制。此账户无法删除，但默认情况下处于禁用状态。启用后，登录对话框中会添加一个*以访客身份登录*按钮。第二个名为\
  \ `Admin` 的账户会自动启用，但未设置密码。由于*文件选项*对话框（第 6 章，“数据库文件选项”）中的*登录方式*设置会自动配置为在打开文件时使用此账户登录，因此造成了新文件没有访问设置的假象。实际上，新文件只是绕过了登录屏幕，并以无密码的默认完全访问账户身份登录。\n\
  \n**注意：** 当文件配置为自动登录*完全访问*账户或未分配密码时，FileMaker Server 和 FileMaker Cloud 将拒绝托管该文件。\n\
  \n## 定义用户账户\n\n账户在*管理安全性*对话框中定义，如图 30-1 所示。通过选择*文件*菜单下的*管理 ➤ 安全性*来打开此对话框。它列出了文件中定义的账户，并用于创建、配置、编辑、复制和删除账户。它还有一个按钮，用于访问另一个*高级设置*对话框（本章稍后讨论）。\n\
  \n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig1_HTML.jpg](img/429700_2_En_30_Fig1_HTML.jpg)\n\
  \n**图 30-1** 用于管理文件访问凭据的对话框\n\n虽然两个默认账户完全存储在数据库文件内部，但也可以定义使用外部授权系统对用户进行身份验证的账户。*通过以下方式验证*弹出菜单可根据选定的身份验证方法切换账户列表。\n\
  \n默认的 *FileMaker 文件或外部服务器* 身份验证选项将两种账户类型合并到一个列表中。*FileMaker 文件*账户使用完全存储在数据库文件内部的账户名和密码进行定义。*外部服务器*账户在文件中仅使用一个名称进行定义，该名称引用了在主机计算机上或集中管理的身份验证服务器（例如\
  \ *Apple Open Directory* 或 *Windows Active Directory*）上外部创建的*用户账户组*。这样，各个用户的凭据可以由\
  \ IT 部门在计算机级别进行存储和管理，因此人员变动无需在数据库内部进行修改。一个或多个外部用户账户可以由操作系统或身份验证服务器附加到一个组。数据库账户将权限授予分配给该组的任何用户，允许他们使用其外部凭据登录。当数据库解决方案由许多独立的文件组成，并且跨所有文件管理用户更改过于费力时，这尤其有用。外部身份验证仅在数据库由\
  \ FileMaker Server 托管时有效。\n\n当开发者的本地应用程序已登录到 *FileMaker Cloud* 账户时，*Claris ID* 选项会出现在身份验证菜单的顶部。通过选择*启动中心*窗口的*我的应用*部分登录账户。然后，返回安全性对话框，定义哪些云用户在该文件托管于该\
  \ *FileMaker Cloud* 上时可以访问它。\n\nFileMaker 还包括对*开放授权* (OAuth) 的支持，这是一种开放标准的授权框架，允许第三方系统代表另一个系统对用户进行身份验证，而无需直接共享凭据。托管在\
  \ *FileMaker Server* 上的数据库可以配置为使用来自用户的 *Amazon*、*Google* 和 *Microsoft Azure AD*\
  \ 账户的凭据进行身份验证。\n\n\n\n### 为默认账户添加密码\n\n要开始探索账户的配置选项，首先为默认的 `Admin` 账户添加密码。在列表中选择该账户，即可在右侧打开详情面板，如图\
  \ 30-2 所示。点击铅笔图标打开`设置密码`对话框，然后输入新密码。如有需要，您还可以将`账户名称`修改为更具描述性或更个性化的名称，例如“开发者”或您的名字。\n\
  \n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig2_HTML.jpg](img/429700_2_En_30_Fig2_HTML.jpg)\n\
  \n图 30-2\n选定账户的面板，显示更改密码按钮\n\n在输入密码后关闭`管理安全性`对话框时，FileMaker 会弹出一个`验证访问`对话框，以确保您知道具有完全访问权限的`账户名称`和`密码`。这有助于确保您不会失去对文件的访问权限。请务必记下您输入的密码，以免忘记！\n\
  \n下次打开数据库文件时，登录对话框将要求您输入`账户名称`和`密码`。`账户名称`默认为计算机名称，并不一定表示该账户可以访问。请输入您的凭据，然后点击`登录`重新获得访问权限。\n\
  \n**注意：** 密码可以是任意长度，并可包含任何字符。但是，为了确保与 WebDirect 兼容，密码应限制为不含重音或非罗马字符的 ASCII 字符。密码区分大小写，因此请注意\
  \ Shift 锁定键。\n\n### 创建 FileMaker 文件账户\n\n`FileMaker 文件`账户定义了用户的登录凭据和权限，这些信息将存储在内部，即使在未托管于服务器上时也可用于访问文件。首先，打开`管理安全性`对话框，按照图\
  \ 30-3 所示的步骤进行操作。\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig3_HTML.jpg](img/429700_2_En_30_Fig3_HTML.jpg)\n\
  \n图 30-3\n配置内部账户的流程\n\n1. 点击`新建`按钮，在列表中添加一个新账户。默认情况下，该账户将为`活跃`状态并被选中，准备进行配置。\n2.\
  \ 确认身份验证选项为`FileMaker 文件`。\n3. 输入一个账户名称，例如“张三”。\n4. 点击铅笔图标输入密码。若要强制用户将密码更改成私密密码，请勾选`要求下次登录时更改密码`复选框。\n\
  5. 选择`权限集`以确定授予用户的权限（将在本章后面讨论）。\n\n### 创建外部服务器账户\n\n`外部服务器`账户定义了用户组的权限。实际的用户账户和用户组是在主机`FileMaker\
  \ Server`计算机的操作系统中创建的。数据库内的账户标识了用户必须在外部是其成员才能获得所定义选定访问权限级别的组名称。这允许一个或多个用户使用其外部定义的凭据登录数据库，并基于在外部定义的用户组中的成员身份，获得对特定数据库功能的访问权限。要创建新的`外部服务器`账户，请打开`管理安全性`对话框，并按照图\
  \ 30-4 所示的步骤进行操作。\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig4_HTML.jpg](img/429700_2_En_30_Fig4_HTML.jpg)\n\
  \n图 30-4\n配置外部账户的流程\n\n1. 点击`新建`按钮，在列表中添加一个新账户。\n2. 选择`外部服务器`作为身份验证方法。\n3. 输入在外部服务器上定义的`组名称`，请注意这些名称是区分大小写的。\n\
  4. 选择`权限集`，以确定授予任何以该组成员身份登录的用户的权限。\n\n**提示：** 在 macOS 上，外部定义的用户可以是`仅限共享`账户，以避免创建不必要的目录和资源。\n\
  \n#### 启用 FileMaker Server 外部身份验证\n\n只有将数据库托管在配置为明确允许外部账户进行身份验证的`FileMaker Server`上时，用户才能使用外部账户登录。要确认\
  \ FileMaker Server 19 版的此项设置，请执行以下步骤：\n\n1. 打开并登录`管理控制台`（第 29 章）。\n2. 点击顶部的`管理`选项卡。\n\
  3. 点击侧边栏中的`外部身份验证`。\n4. 在`数据库登录`标题下，启用`外部服务器账户`。\n\n## 探究权限集\n\n`权限集`是一组权限的集合，定义了访问数据、布局和其他功能的级别。权限集一旦定义，即可分配给一个或多个用户账户，以确定他们在数据库中的能力。要查看、创建和编辑权限集，请打开`管理安全性`对话框，并点击`高级设置`按钮。这将打开`高级安全设置`对话框，如图\
  \ 30-5 所示。点击`权限集`选项卡以查看已定义权限集的列表。\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig5_HTML.jpg](img/429700_2_En_30_Fig5_HTML.jpg)\n\
  \n图 30-5\n用于定义用户账户访问权限集的对话框\n\n### 默认权限集\n\n每个数据库都有三个默认权限集。它们的名称周围带有方括号，并且除了可以启用和禁用`扩展权限`之外，这些权限集是不可编辑的。\n\
  \n* `完全访问权限` – 允许对`每个可用功能`和所有内容进行不受限制的访问。此权限只应保留给开发者。FileMaker 要求至少有一个允许完全访问的账户。\n\
  * `仅限数据输入` – 仅提供对数据输入工作的有限访问权限。分配此权限集的用户可以在每个表中创建、编辑和删除记录。他们可以使用但无法结构性修改布局、脚本和值列表。他们可以打印和导出。空闲时会自动与服务器断开连接，并且可以更改自己的账户密码。\n\
  * `只读访问权限` – 与前一权限类似，但更严格，不允许以任何方式修改内容或结构。\n\n### 创建自定义权限集\n\n要创建新的权限集，请打开`高级安全设置`对话框，点击`权限集`选项卡，然后点击`新建`按钮。这将打开`编辑权限集`对话框中的一个新的空权限集，如图\
  \ 30-6 所示。默认情况下，新的权限集几乎不允许任何访问。输入名称、可选的描述，然后开始启用所需的权限，这些权限分为三类：\n\n* `数据访问和设计权限`\
  \ – 按资源类型提供访问权限：`记录`、`布局`、`值列表`和`脚本`\n* `其他权限` – 各种功能的混合体\n* `扩展权限` – 启用特定功能，有十个默认选项可以扩展\n\
  \n**警告：** 自定义权限集不能授予开发者修改结构模式（表、字段和关系）的访问权限。只有默认的、不可更改的`完全访问权限`权限集允许编辑这些内容。\n\n\
  ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig6_HTML.jpg](img/429700_2_En_30_Fig6_HTML.jpg)\n\
  \n图 30-6\n用于编辑权限集权限的对话框\n\n#### 配置数据访问和设计设置\n\n第一组权限设置定义了`数据访问和设计`权限。这些按资源类型控制用户可以执行的操作：`记录`、`布局`、`值列表`和`脚本`。每种资源类型都有一个包含多个选项的菜单，用于控制对其类别内所有实体的访问，以及一个为单个对象分配`自定义权限`的选项。\n\
  \n\n\n##### 控制记录访问\n\n`编辑权限集`对话框中的`记录`弹出菜单提供了五个选项，用于控制用户对记录的操作：\n\n- `在所有表中创建、编辑和删除`\n\
  - `在所有表中创建和编辑`\n- `在所有表中仅查看`\n- `全部无访问权限`\n- `自定义权限`\n\n前四个选项不言自明，适用于每个表中的所有记录。选择`自定义权限`选项将打开`自定义记录权限`对话框，如图\
  \ 30-7 所示。数据库中的每个表都列在其中，底部还有一个额外的行，用于定义未来创建的任何新表的默认权限设置。列表下方有五个弹出菜单，用于为上方选定的表指定`查看`、`编辑`、`创建`、`删除`和`字段访问`权限。\n\
  \n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig7_HTML.jpg](img/429700_2_En_30_Fig7_HTML.jpg)\n\
  \n图 30-7\n\n用于控制每个表记录访问权限的对话框\n\n所有五个弹出菜单中的可用设置类似，仅有细微差别。前四个菜单都有`是`和`否`选项，功能完全相同：为所选表启用或禁用该功能。例如，要允许在所选表中创建记录，请在`创建`菜单下选择`是`。其中三个菜单还有一个`有限`选项，选择后会打开`指定计算`对话框，以便通过公式对功能访问进行更精细的控制。例如，公式可以设置仅在特定字段具有特定值、仅在特定星期几、仅在特定布局当前时，或满足公式中包含的任何其他条件时，才允许删除记录。当`查看`选项设置为不允许访问时（即，你不能授予对用户无法查看的内容的编辑权限），`编辑`菜单将被禁用。\n\
  \n`字段访问`菜单选项与其他四个略有不同。虽然它们执行类似的功能，但其命名与字段相关而非功能相关。选择`全部`允许对所有字段的编辑访问，选择`无`以限制访问。选择`有限`将打开`自定义字段权限`对话框，如图\
  \ 30-8 所示。此对话框允许为每个字段设置`可修改`、`仅查看`或`无访问权限`。它还包含一个选项，用于定义将来添加到表中的任何新字段的默认设置。\n\n\
  ![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig8_HTML.jpg](img/429700_2_En_30_Fig8_HTML.jpg)\n\
  \n图 30-8\n\n用于控制表中单个字段权限的对话框\n\n##### 控制布局访问\n\n`编辑权限集`对话框中的`布局`弹出菜单提供了四个选项，用于控制用户对布局的操作：\n\
  \n- `全部可修改`\n- `全部仅查看`\n- `全部无访问权限`\n- `自定义权限`\n\n> **注意**：如果用户无法访问某个布局，那么在其会话期间运行的脚本也无法访问该布局，除非该脚本被配置为使用完全访问权限运行。\n\
  \n当你从`布局`菜单中选择`自定义权限`选项时，将打开`自定义布局权限`对话框，如图 30-9 所示。选中顶角的`允许创建新布局`复选框，以允许用户创建新布局。数据库中的每个布局都列在其中，底部还有一个额外的选项，用于定义将来创建的任何新布局的默认权限设置。列表下方是为所选布局提供的两组权限选项。`布局`选项提供三个权限级别：`可修改`、`仅查看`或`无访问权限`。`通过此布局的记录`单选按钮控制当布局可查看或可修改时，用户与记录交互的权限，其选项名称类似，允许你超越之前讨论的针对整个表的`记录`设置，逐个布局地控制字段交互权限。\n\
  \n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig9_HTML.jpg](img/429700_2_En_30_Fig9_HTML.jpg)\n\
  \n图 30-9\n\n用于按布局控制权限的对话框\n\n##### 控制值列表访问\n\n`编辑权限集`对话框中的`值列表`弹出菜单提供了四个选项，用于控制用户对值列表的操作。\n\
  \n- `全部可修改`\n- `全部仅查看`\n- `全部无访问权限`\n- `自定义权限`\n\n##### 控制脚本访问\n\n`编辑权限集`对话框中的`脚本`弹出菜单提供了四个选项，用于控制用户对脚本的操作。\n\
  \n- `全部可修改`\n- `全部仅可执行`\n- `全部无访问权限`\n- `自定义权限`\n\n#### 分配其他权限设置\n\n在`编辑权限集`对话框的右侧是`其他权限`，之前在图\
  \ 30-6 中已显示。这些功能大多数启用的功能从其表述上应该相当明显。然而，有几个值得一提。\n\n`允许导出`选项启用了多种数据输出功能，包括导出记录、将记录保存为\
  \ Excel 文件、复制找到集中的所有记录以及保存记录的副本。但它也允许外部脚本访问和提取记录信息，例如 macOS 上的 `AppleScript`。\n\n\
  当启用了`允许用户覆盖数据验证警告`选项时，被分配了该权限集的用户能够覆盖任何字段验证警告对话框，包括那些未明确允许覆盖的警告（参见第 8 章“验证控制”）。\n\
  \n启用`允许用户修改自己的密码`选项，让用户可以通过选择`文件 ➤ 更改密码`菜单项来更改其密码。旁边有两个复选框，允许你安排定期强制更改密码，并控制他们选择的任何新密码的最小长度。\n\
  \n从`可用的菜单命令`弹出菜单中的选择控制着可用的菜单。虽然菜单访问可能受到授予权限集的其他权限以及自定义菜单存在的影响（第 23 章），但此选项指定了他们可以访问的命令的通用类别。选择`全部`以允许访问整个活动菜单栏。通过选择`仅编辑`将其限制为基本的编辑功能。选择`最小`以严格限制他们只能访问最基本功能的菜单，例如打开、关闭和创建数据库文件、窗口功能、执行脚本、偏好设置和帮助。\n\
  \n> **注意**：新权限集的菜单设置默认为最小，这几乎不提供任何启用的功能。在创建新帐户时，请务必更改此项。\n\n\n\n# 分配扩展权限\n\n之前在图\
  \ 30-6 中看到的*编辑权限集*对话框中的*扩展权限*部分，包含一个可以启用的附加权限列表。*扩展权限*是一种基于关键字的权限设置，可以分配给一个或多个权限集。这些权限用于访问特定类型的功能。FileMaker\
  \ 包含几个固定用于特定功能的扩展权限，主要是各种类型的入站网络和脚本访问。\n\n一些扩展权限允许用户通过特定方法登录。例如，`fmwebdirect` 允许从\
  \ Web 浏览器访问服务器托管的数据库，而 `fmapp` 允许从 *FileMaker Pro* 和 *FileMaker Go* 应用程序访问文件。\n\n\
  其他权限则允许外部系统通过特定协议访问服务器托管的数据库：`fmxdbc` 允许通过 ODBC/JDBC 进行入站访问，`fmxml` 允许 XML 访问，`fmphp`\
  \ 允许 PHP 访问，`fmrest` 允许通过 *FileMaker Data API* 从*表述性状态转移*（RESTful）Web 服务进行访问。\n\n\
  另外两个权限提供脚本访问：`fmextscriptaccess` 允许通过 *AppleScript*（macOS）和 *ActiveX*（Windows）进行访问，而\
  \ `fmurlscript` 允许通过 URL 触发数据库脚本（第 29 章，“使用 FileMaker URL”）。\n\n虽然所有默认的扩展权限都是硬编码的，只能简单地打开或关闭\
  \ FileMaker 内置功能，但可以定义新的扩展权限来控制数据库中的自定义功能（本章稍后讨论）。\n\n# 在公式中使用凭据\n\n使用*账户*和*权限集*进行凭据验证，在限制对文件、内置功能和自定义结构元素的访问方面表现出色。尽管凭据接口对自定义资源具有相当出色的控制能力，但其覆盖范围仍有一定限制。一个权限集可以控制布局的可见性，但无法限制对单个对象的访问。它可以使脚本可执行，但无法控制脚本中的单个步骤。它无法控制自定义菜单或自定义函数的可访问性或行为，也无法深入公式内部。这些限制仅仅是自定义解决方案的本质所致。在某个节点之后，内置的凭据接口就无法*向外延伸*足够远，来控制每个对象、脚本步骤和自定义配置的权限。超过这个节点，自定义资源必须使用公式来*向内查看*用户的凭据，并确定应施加哪些限制以及执行哪些变体。为此，有三个\
  \ *Get* 函数可用于公式中，以施加*基于凭据的条件*。使用这些函数，公式可以识别用户的*账户*名称、*权限集*名称，以及在使用外部身份验证方法时的*组*名称。以下示例展示了每个函数的假设结果。\n\
  \n```\nGet ( AccountName )                    // 结果 = 张三\nGet ( AccountPrivilegeSetName\
  \ )        // 结果 = [完全访问权限]\nGet ( AccountGroupName )               // 结果 = dbmarketing\n\
  ```\n\n脚本可以使用 *If* 步骤来限制为特定用户执行一组单个步骤。例如，一个发票报表脚本可能由许多用户运行，但其中有一部分步骤是生成敏感的财务报告，该部分应仅在脚本由首席财务官运行时才执行。账户名可用于确定这些步骤是否应该执行。\n\
  \n```\nIf [ Get ( AccountName ) = \"李华\" ]\n转至布局 [ \"发票 – 特殊报表\" ; 动画: 无 ]\n排序记录\
  \ [ 恢复 ; 对话框: 关闭 ]\n打印 [ 对话框: 打开 ]\n转至布局 [ 原始布局 ; 动画: 无 ]\n结束条件\n```\n\n另一个脚本可能会根据用户的权限集导航到特定部门的菜单布局。此示例脚本使用一系列\
  \ *If* 和 *Else If* 脚本步骤，每个步骤针对一个单独的布局。\n\n```\n设置变量 [ $set ; 值: Get ( AccountPrivilegeSet\
  \ ) ]\nIf [ $set = \"人力资源\" ]\n转至布局 [ \"主页 HR\" ; 动画: 无 ]\nElse If [ [ $set = \"\
  销售\" ]\n转至布局 [ \"主页 销售\" ; 动画: 无 ]\nElse If [ [ $set = \"生产\" ]\n转至布局 [ \"主页 生产\"\
  \ ; 动画: 无 ]\n结束条件\n```\n\n这些函数可用于在任何可以使用公式的地方创建特定于凭据的行为。隐藏布局对象或自定义菜单、更改按钮或标签名称、个性化工具提示、在计算字段中产生不同结果等等。*然而，使用此技术应持谨慎态度。*\n\
  \n## 理解嵌入凭据的风险\n\n在公式中嵌入凭据以创建条件性功能应谨慎使用。公司员工的每一次变动都可能需要更改在数十、数百或数千个不同公式中使用的员工姓名。即使像同事结婚更改姓氏这样简单的事情，在复杂的数据库中也可能需要大量工作。虽然可以为新员工更改现有账户的名称，但公式中所有使用旧名称的地方不会自动更新，因为它们是文字文本，而不是动态引用。在人员流动率高的组织中，定位和更改这些名称可能会成为一项全职工作。\n\
  \n这个问题可以通过使用“职务”作为账户名而不是员工的实际“姓名”来部分缓解。例如，张三可以以“账户主管”的身份使用唯一密码登录数据库。然后，如果新人接替该职位，他们沿用相同的账户名和新密码。由于实际账户名未更改，任何使用它的公式也无需更改。然而，这种方法有问题，因为它使用户身份失去了个性，并且在查看历史记录列表时，看到所有记录都由“账户主管”修改，但跨越了三个不同的人担任此职位的时期，这会令人困惑。理想情况下，用户应使用个人标识符登录数据库。\n\
  \n当公式使用*权限集*而不是*账户名*时，条件性功能可以稍微更能适应团队变化。可以根据需要删除和创建单个用户账户，而分配的权限集继续控制公式中的界面和行为条件。虽然这是一个更好的方法，但仍然存在风险因素。除非权限集经过精心设计，几乎无所不能，否则随着公司工作流中角色和职责的变化，某些功能几乎不可避免地需要进行重大更改。此外，由于每个用户只能分配一个权限集，功能可能需要大量的复合子句来授予一组不同权限集的权限。\n\
  \n在公式中使用凭据确实将安全设置的能力扩展到了*管理安全性*对话框之外，但这种方式可能非常耗费人力。一开始可能只是为某个用户或组设置一个简单的临时例外，但很快就会成为一种坏习惯，使开发者陷入困境，因为他们必须不断记住在拥挤界面设计的黑暗角落中丢失和遗忘的数千个凭据例外。幸运的是，FileMaker\
  \ 有一个极好的替代方案，通过允许将自定义功能例外轻松直接连接到安全接口中来解决这个问题：*自定义扩展权限*。\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\
  \n\n# 利用自定义扩展权限\n\n*自定义扩展权限*是一种由开发者定义的、基于关键字的权限，可以安全地在公式中使用以创建条件功能。这些权限可以轻松地链接到一个或多个权限集，从而适应公司人员未来的变动。条件公式不是直接连接到不断变化的*账户*和*权限集*，而是通过关键字连接到一个不变的*自定义扩展权限*。随着单个用户账户的创建和删除，以及权限集的修改和重新分配，由扩展权限授予的条件访问和行为可以直接在*管理安全*对话框中轻松启用或禁用。扩展权限允许您为数据库的自定义功能命名，并将其作为新设置插入到凭据接口中，而不是将凭据命名插入到公式中。\n\
  \n要创建自定义扩展权限，首先要确定一组条件功能以及所涉及的对象/公式。为了便于说明，我们使用一个简单的示例：通过点击布局上的按钮来批准*发票*记录的能力。该按钮需要被条件隐藏，以便未经授权的用户无法看到或点击它。首先，为新权限选择一个名称。名称应是一个由两个或多个单词组成的短关键字，该关键字应唯一且能清晰地指示其将控制的功能。对于此示例，像\
  \ `InvoiceApproval` 这样的名称将描述我们在示例中定义的能力。\n\n> **注意**\n>\n> 在多个对象公式中使用扩展权限名称之前，请仔细选择，以避免日后需要多次更改，而这正是我们试图避免的问题！\n\
  \n打开*管理安全*对话框，点击*高级设置*按钮，然后选择*扩展权限*选项卡。这里列出了文件中定义的所有内置和自定义扩展权限。点击*新建*按钮，在*编辑扩展权限*对话框中打开一个新的扩展权限，如图\
  \ 30-10 所示。\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig10_HTML.jpg](img/429700_2_En_30_Fig10_HTML.jpg)\n\
  \n**图 30-10**  \n用于创建和编辑自定义扩展权限的对话框\n\n在*关键字*文本框中输入权限的名称，并输入简短的*描述*。*访问*列表显示了权限集，其中的复选框指示哪些权限集有权访问此自定义权限。关闭前述对话框后，查看任意权限集，即可看到新的扩展权限列为一个选项，如图\
  \ 30-11 所示。\n\n![../images/429700_2_En_30_Chapter/429700_2_En_30_Fig11_HTML.jpg](img/429700_2_En_30_Fig11_HTML.jpg)\n\
  \n**图 30-11**  \n已在一个权限集上启用的新扩展权限\n\n`InvoiceApproval` 权限现已定义，但在其被用于数据库中某处的行为条件公式之前，它实际上并不控制任何东西。对于我们的发票批准示例，向*发票*布局添加一个按钮，并输入以下示例中所示的\
  \ *Hide object when* 公式（第 21 章），以对任何其账户的权限集未启用此扩展权限的用户隐藏该对象。该公式使用 `Get ( AccountExtendedPrivileges\
  \ )` 函数获取用户权限集所启用所有扩展权限的名称列表，然后使用 `FilterValues` 函数（第 13 章，“操作值”）检查 `InvoiceApproval`。\n\
  \n```\nFilterValues ( Get ( AccountExtendedPrivileges ) ; \"InvoiceApproval\" )\
  \ = \"\"\n```\n\n# 控制文件访问\n\n*高级安全设置*对话框中的*文件访问*选项卡列出了哪些其他 FileMaker 数据库可以访问当前数据库。单个数据库可以被*授权*或*取消授权*。*全部重置*将重置所有列出文件的\
  \ ID，并要求重新授权它们。如果某个文件的副本或克隆应与原始文件一起被授予访问权限，请使用此功能以确保唯一标识符。\n\n## 总结\n\n本章探讨了保护数据库安全的凭据选项。下一章，我们将探讨一些用于分析和修改文件的额外高级工具。\n\
  \n# 31. 分析与修改文件\n\n*工具*菜单在*脚本调试*选项（第 26 章）和*自定义菜单*子菜单（第 23 章）下方包含一些额外功能。这些额外工具包括：\n\
  \n-   另存为 XML 副本\n-   数据库设计报告\n-   开发者实用工具\n-   工具市场\n\n## 另存为 XML 副本\n\n*另存为 XML\
  \ 副本*选项将当前数据库文件的副本另存为 XML 文件。该文件包含有关文件的原始结构细节，但不包含任何记录内容。这可用于存储和比较随时间变化的结构变更。\n\n\
  ## 生成数据库设计报告\n\n*数据库设计报告*是一份关于数据库文件结构的详细报告，列出数据库中的每个表，并可选地包含有关其他资源的信息。这些报告可以保存为\
  \ HTML 或 XML 文件，并可用于执行以下开发任务：\n\n-   通过定位缺失引用、破损关系等来排查结构问题。\n-   查找过时的元素，以帮助维护清晰的结构。\n\
  -   定位仍指向旧脚本或自定义函数的界面元素。\n-   获取有关组件数量和使用情况的统计信息。\n-   保存数据库在特定时间点的结构快照，该快照可以与之后的结构进行比较，以识别变更。\n\
  \n### 生成设计报告\n\n要生成报告，请打开一个数据库，然后选择*工具 ➤ 数据库设计报告*菜单。这将打开 `Database Design Report`\
  \ 对话框，如图 31-1 所示。*可用文件*区域允许选择应包含在报告中的当前打开的数据库文件。选择一个文件后，可以选择从相邻列表中排除个别表。勾选*包含在报告中*的复选框，以确定分析中包含哪些资源。此滚动列表包含从*账户*到*值列表*的所有内容。底部的*报告格式*选项控制将生成的报告样式。\n\
  \n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig1_HTML.jpg](img/429700_2_En_31_Fig1_HTML.jpg)\n\
  \n**图 31-1**  \n用于创建数据库设计报告的对话框\n\n### 探索 HTML 设计报告\n\n一份 `HTML` 格式的设计报告将生成一组页面，如图\
  \ 31-2 所示。`Summary.html` 包含每个已包含数据库的可导航概览，显示其对象的列式摘要。`Styles.css` 文件包含样式信息，一个用于摘要页面，一个用于每个数据库文件夹内的页面。报告中包含的每个数据库将由一个文件夹表示，在本例中，只有一个用于\
  \ *Learn FileMaker* 数据库的文件夹。在每个数据库文件夹内，`Index.html` 页面包含一个复杂的表格结构，带有可导航的侧边栏，详细列出了每个对象及其大量详细信息。这可以通过摘要页面直接打开或导航访问。另外两个\
  \ HTML 文件包含在索引文件中显示的侧边栏导航和主体面板。\n\n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig2_HTML.jpg](img/429700_2_En_31_Fig2_HTML.jpg)\n\
  \n**图 31-2**  \n保存为 HTML 格式的设计报告结果\n\n### 探索 XML 设计报告\n\n当设计报告保存为 `XML` 格式时，该文件夹将包含两个或多个文件：一个包含已包含文件摘要的\
  \ `Summary.xml` 文件，以及每个已包含数据库的详细信息文件。\n\n\n\n### 专业 DDR 工具介绍\n\n一些公司提供了可用产品，用于导入一份`XML`设计报告，并以比\
  \ FileMaker 提供的 HTML 页面更精良的界面呈现材料。那些构建需要大量分析的复杂数据库的开发人员，将会欣赏这些产品所改进的查看体验。\n\n###\
  \ BaseElements\n\nBaseElements 是一款出色的分析工具，用于遍历数据库结构，由同名公司销售。该解决方案可作为 FileMaker 文件或适用于\
  \ macOS 和 Windows 的独立应用程序提供。该产品具有完整的布局访问权限，因此您可以从数据库的关系图链接到 BaseElements 数据表，并在脚本中访问信息。该产品包含一个开源\
  \ BaseElements 插件，其中包含许多有用的函数。了解更多信息，请访问[`www.baseelements.com`](http://www.baseelements.com)。\n\
  \n### FMPerception\n\nFMPerception 是一个用于搜索、分析和维护由 Geist Interactive 销售的数据库的工具。该产品使用渐进式分析技术，快速提供关于数据库结构的当前且准确的信息。其部分功能包括：\n\
  \n-   提供高级概览和“数据库报告卡”，总结数据库的复杂性，并列出检测到的任何潜在问题。\n-   快速的`DDR`导入过程，几乎是即时的。\n-   图形化的“调用链可视化”阐明了从按钮到脚本再到子脚本的脚本调用流程，有助于跟踪复杂功能流程。\n\
  -   识别可能降低性能的布局对象。\n-   执行安全审计，以识别诸如缺少密码或以完全访问权限运行的脚本等漏洞。\n\n了解更多信息，请访问[`www.geistinteractive.com`](http://www.geistinteractive.com)。\n\
  \n### InspectorPro\n\nInspectorPro 是一款由 Beezwax DataTools 销售的高级诊断、分析和可视化工具。该产品拥有超过\
  \ 115 个不同领域，可标准化分析信息，并能自动检测数据库结构问题。了解更多信息，请访问[`www.beezwax.net`](http://www.beezwax.net)。\n\
  \n### 探索开发者工具\n\n如图 31-3 所示的`开发者工具`对话框，可通过`工具`菜单访问。打开对话框后，单击`添加`按钮将一个或多个文件放入`方案文件`列表中。这些文件将通过对话框中启动的各种功能和选项进行批量处理。在列表中，一个红色箭头指示一个文件为主文件，由\
  \ Kiosk 选项用于指定包含起始“首页”界面的数据库。列表下方是用于重命名文件、选择修改后文件保存位置的输出文件夹的控件。\n\n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig3_HTML.jpg](img/429700_2_En_31_Fig3_HTML.jpg)\n\
  \n图 31-3\n\n包含各种开发者实用功能的对话框\n\n### 重命名文件\n\n要重命名文件，请在列表中选择它，在`重命名文件`文本字段中输入不带扩展名的新名称，然后单击`更改`按钮。这是在多文件方案中重命名数据库文件的推荐方法，因为它不仅会重命名所选文件，还会更新列表中所有其他文件中对该文件的所有外部文件引用。任何指定的新名称都将排入文件列表的`新名称`列。这些更改直到指定`项目文件夹`并单击`创建`按钮后才会生效。\n\
  \n### 指定项目文件夹\n\n在重命名文件或执行方案选项之前，请单击`指定`按钮选择一个`项目文件夹`。由于该实用工具对话框会创建文件的新版本，此设置指示新版本应保存的位置。选中下面的复选框，以自动覆盖所选文件夹中存在的任何同名文件。\n\
  \n### 指定方案选项\n\n`开发者工具`对话框包含多个可以改变`方案文件`结构的实用功能。要启用一个或多个这些选项，请单击`方案选项`标题下的`指定`按钮，这将打开`指定方案选项`对话框。然后，为以下任何实用功能启用复选框：\n\
  \n-   从文件中永久删除管理员访问权限。\n-   为非管理员帐户启用 Kiosk 模式。\n-   数据库必须具有 FileMaker 文件扩展名。\n\
  -   为任何处理错误创建错误日志。\n-   启用数据库加密（或重新加密文件）。\n-   移除数据库加密。\n\n#### 从文件中删除管理员访问权限\n\n\
  选中`从文件中永久删除管理员访问权限`复选框，将保存文件的副本，并从每个用户帐户中删除所有管理员访问权限，并使大多数设计和结构元素变为只读。这基本上可以防止任何人在文件中以开发人员身份操作，同时允许正常的数据输入和其他使用不受影响。虽然这可能是保护作为产品销售或作为演示分发的文件的有用方法，但应谨慎使用，并保留一份安全且未经修改的备份文件。\n\
  \n#### 启用 Kiosk 模式\n\n`为非管理员帐户启用 Kiosk 模式`选项会保存文件的副本，该副本对所有非管理员访问强制使用全屏模式且无菜单栏。这是创建触摸屏\
  \ Kiosk 的一个很好的选项，在这种模式下，您不希望用户访问除您在布局上提供的界面控件之外的任何内容。数据库必须至少定义一个非管理员用户帐户，并且必须使用该帐户以\
  \ Kiosk 模式打开。一旦进入 Kiosk 模式，用户在文件中导航或关闭文件的能力将通过您在布局上提供的控件来实现。将没有菜单栏，甚至访问操作系统功能（如强制退出或切换应用程序）也将被完全禁用。当添加一个用于退出旨在作为公共\
  \ Kiosk 的数据库的按钮时，请确保包含某种身份验证过程，以防止普通用户退出方案并访问底层操作系统。\n\n> **警告**\n>\n> 如果您没有在布局上提供退出应用程序或关闭数据库的按钮，那么唯一的选项就是强制重启计算机，这可能会导致文件损坏。\n\
  \n#### 要求拥有 FileMaker 文件扩展名\n\n`数据库必须具有 FileMaker 文件扩展名`选项将确认每个`方案文件`都包含文件扩展名，如果缺失则将其添加到新副本中。\n\
  \n#### 创建错误日志\n\n`为任何处理错误创建错误日志`选项将在`项目文件夹`中生成一个日志文件，其中包含处理其他实用功能时发生的任何错误。此选项可以与其他任何实用功能一起选择，但在启用加密时是必需的，并且对于加密选项将默认选中。一旦选中，下方的一个额外选项允许通过单击`指定`按钮来自定义日志文件的名称和位置。默认为一个名为“Logfile.txt”的文件，它将保存在`项目文件夹`中。\n\
  \n\n\n#### 探索加密功能\n\nFileMaker 包含多种可用于保护数据的加密功能。使用受管外部存储的容器字段（第 11 章）可以配置为自动加密存储的文件。各种内置函数提供了*Base64*和*Crypt*选项，用于对存储在字段中或与其他系统交换的数据进行编码/解码和加密/解密。已安装的*SSL\
  \ 加密*证书可保护客户端与服务器之间的传输数据；FileMaker Server 推荐使用此类证书，而 FileMaker Cloud 则要求必须使用。此外，通过`Developer\
  \ Utilities`对话框提供的两个*解决方案选项*可为整个数据库文件提供*静态加密*保护，这在标准凭据访问之外增加了额外保护层（第 30 章）。加密后的数据库在结构上进行了修改，以防止其在存储于磁盘时被未经授权的访问、篡改或分析，例如，如果有人获取了数据库的备份或存档副本。在桌面上打开文件或在\
  \ FileMaker Server 上托管文件时，*必须*输入您在加密过程中定义的密码。FileMaker Cloud 要求这样做，并将自动加密上传的文件。一旦托管，用户访问仅需标准凭据。\n\
  \n**注意：**请务必将加密密钥安全存储，因为密钥一旦丢失将无法恢复。\n\n##### 启用数据库加密（或重新加密文件）\n\n*启用数据库加密（或重新加密文件）*选项会创建*解决方案文件*的副本，这些副本在结构上已使用您定义的加密密码进行了修改。此密钥要求输入解密密码才能直接打开文件或在\
  \ FileMaker Server 上托管文件。要加密所选文件，请在`指定解决方案选项`对话框中选择此选项，并配置下方图 31-4 所示的设置。\n\n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig4_HTML.jpg](img/429700_2_En_31_Fig4_HTML.jpg)\n\
  \n**图 31-4** – 启用加密时所需的设置\n\n`共享 ID`文本字段包含一个最多 32 个字符的区分大小写的字符串，用于链接多文件解决方案中的所有数据库文件。当使用加密密码打开一个文件时，该文件随后可以访问任何其他已使用*相同共享\
  \ ID*和*加密密码*保存的文件，而无需重复提示用户输入加密密码。\n\n点击`指定`按钮，输入具有对正在加密的文件拥有完全访问权限的*FileMaker 账户*的凭据。这是在修改文件结构之前，证明您是授权的文件完全访问用户的必要步骤。\n\
  \n接下来，点击`指定`按钮，输入一个*加密密码*。此密码将在加密过程中使用，并且在打开文件或在服务器上托管文件之前必须输入。\n\n可以根据需要选中`保持开放式存储`复选框，以将外部存储的容器文件保持未加密状态。取消选中此复选框可自动加密所有容器字段内容。\n\
  \n完成后，关闭`指定解决方案选项`对话框以返回`开发者实用工具`对话框。然后，点击`创建`以运行该实用工具，在指定的`项目文件夹`中创建文件的加密副本。\n\n\
  现在，在桌面上打开加密文件时，将出现两个对话框。首先，`打开加密数据库`提示要求输入加密密码，随后是用户账户凭据的标准登录提示。当在服务器上打开加密文件进行托管时，只会出现第一个对话框，用户仍然只会看到账户凭据提示。\n\
  \n**提示：**加密多文件解决方案时，请确保每个数据库都使用相同的开发者账户和加密密码。\n\n##### 移除数据库加密\n\n`移除数据库加密`选项会以未加密状态保存文件副本，恢复正常的操作行为和访问方法。在`指定解决方案选项`对话框中选择此选项，并输入图\
  \ 31-5 所示所需的设置。输入文件的*加密密码*以证明您有权修改文件。然后，点击`指定`按钮输入具有完全访问权限的*FileMaker 账户*。这两项对于*所有*选定的文件应该是一致的。关闭`指定解决方案选项`对话框以返回`开发者实用工具`对话框。然后，点击`创建`以运行该实用工具。解密后的文件将出现在指定的`项目文件夹`中。\n\
  \n![../images/429700_2_En_31_Chapter/429700_2_En_31_Fig5_HTML.jpg](img/429700_2_En_31_Fig5_HTML.jpg)\n\
  \n**图 31-5** – 移除文件加密所需的设置\n\n## 工具市场\n\n*工具*菜单下的最后一个项目是*工具市场*，它会打开*Claris 市场*网页。该网站包含由\
  \ Claris 合作伙伴创建的开发者工具和产品集合。这个不断发展的网站包含模板、工具和插件页面，有些是免费的，有些是付费的，包括：\n\n- 来自*DB Services*的模板，可帮助将\
  \ Square 和 Stripe 集成到 FileMaker 解决方案中\n- 来自*Soliant Consulting*的用于编写和排查 SQL 查询问题的工具\n\
  - 来自*Productive Computing*的各种付费产品，允许数据库操作或链接到各种外部应用程序，例如日历、通讯录和 QuickBooks\n- 本章前面提到的各种*数据库设计报告*工具\n\
  - 各种插件，包括第 28 章中提到的一些插件\n\n## 总结\n\n本章讨论了通过 FileMaker Pro 应用程序的*工具*菜单可访问的高级功能。\n\
