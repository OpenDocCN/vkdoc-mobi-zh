  ## 使用逻辑函数


  *逻辑函数*用于测试条件以产生可变结果并执行其他求值函数。其中包括四个绝对必要的函数：`Case`、`Choose`、`Let`和`While`。




  '
- '# Case


  `Case`函数求值一个或多个表达式，并返回第一个结果为 true 的表达式所对应的结果。如果没有表达式为 true，则可以包含一个可选的默认结果。该函数产生的条件结果类似于嵌套的`if-then`函数，但处理多条语句时更加简洁。该函数至少需要包含一个*测试-结果对*作为参数，其中仅当*测试*部分为
  true 时，*结果*才会被求值并返回。*测试*参数必须包含一个结果为布尔值的文本或数值表达式。*结果*参数可以是字面量结果，也可以是生成任意结果的表达式。


  ```

  Case ( test ; result )

  ```


  可以添加任意数量的附加测试条件，并且这些条件将按顺序依次求值，直到某个条件求值为 true，并返回对应的结果。


  ```

  Case ( test ; result ; test2 ; result2 )

  Case ( test ; result ; test2 ; result2 ; test3 ; result3)

  ```


  可以在末尾包含一个未经测试的最终结果，当之前的测试条件均未产生 true 结果时，该结果将作为返回值。如果没有提供默认值，那么当所有测试均为 false 时，结果将为空。在以下示例中，如果`test`和`test2`条件均为
  false，则结果将为`defaultResult`语句生成的任何内容。


  ```

  Case ( test ; result ; test2 ; result2 ; defaultResult )

  ```


  随着这些语句变得冗长，可以考虑添加制表符和回车符来垂直重新格式化它们，将每一对放在单独的行上，使语句更易于阅读和遵循逻辑执行顺序。


  ```

  Case (

  test ; result ;

  test2 ; result2 ;

  test3 ; result3 ;

  test4 ; result4 ;

  defaultResult

  )

  ```


  以下示例构建一个句子，并使用`Case`在`Qty`字段中的值大于 1 时，为单词 “widget” 添加可选的复数形式。


  ```

  "Enclosed find " & Qty & " widget" & Case ( Qty > 1 ; "s" ) & " for inspection."

  // result examples (varying by Qty) =

  //    Enclosed find 1 widget for inspection.

  //    Enclosed find 8 widgets for inspection.

  ```


  在此示例中，名为`Elapsed`的字段包含发票逾期的天数，并生成四种不同文本结果之一以指示其状态。如果值为 32，则结果将为 “Past Due”，因为前两个测试为
  false，而第三个为 true。类似地，值为 64 将导致 “Delinquent”，而值为 20 将获得默认结果 “On Time”。


  ```

  Case (

  Elapsed > 90 ; "Severe" ;

  Elapsed > 60 ; "Delinquent"

  Elapsed > 30 ; "Past Due"

  "On Time"

  )

  ```


  注意：FileMaker 确实包含内置的`If`函数，但通常为了`Case`的优越性而弃用该函数。


  '
- '# Choose


  `Choose`函数求值单个测试条件以生成一个整数，并使用该数字从一个或多个结果值列表中进行选择。*测试*参数必须包含一个结果为整数的文本或数值表达式。可以包含任意数量的*结果*参数，并将根据测试生成的数字返回对应的结果。结果可以是字面量值，也可以是求值为任意数据结果的表达式。索引是*从零开始*的，因此如果测试求值为
  0，则返回列出的第一个结果；测试值为 1 时返回第二个结果，依此类推。


  ```

  Choose ( test ; result0 ; result1 ; result2 ; result3 )

  ```


  在此示例中，`Status`字段包含 0 到 4 的数字，`Choose`函数用于将其转换为文本状态。


  ```

  Choose ( Status ; "Low" ; "Guarded" ; "Elevated" ; "High" ; "Severe" )

  ```


  此示例使用随机数从四个姓名中选出一个。


  ```

  Choose ( Random * 4 ; "Jim Thomas" ; "Shannon Miller" ; "Charlene Smith" ; "Karen
  Camacho" )

  ```


  '
- '# Let


  `Let`函数在执行业务处理内嵌计算语句之前，初始化一个或多个变量。该函数接受两个表达式作为参数。*变量声明*参数由一个或多个变量名组成，每个变量名带有一个生成其值的表达式，变量名与表达式之间用等号分隔。变量可以是任何类型的混合：*语句*、*局部*或*全局*（第
  12 章，“变量类型”）。每个变量的表达式可以是字面量值、函数调用或生成任意类型结果（将成为对应变量的值）的表达式。*计算*参数可以是任何能产生整个语句结果的表达式。


  ```

  Let ( variable = expression ; calculation )

  ```


  当初始化多个变量时，必须在声明参数周围添加方括号，并在每个*变量-表达式*对之间添加分号。


  ```

  Let ( [

  variable = expression1 ;

  variable2 = expression2 ;

  variable3 = expression3

  ] ;

  calculation

  )

  ```


  `Let`函数在构建复杂公式时非常有用。冗长的字段名可以压缩为短变量，以便在公式中多次使用时节省空间。由许多嵌套函数或子句组成的复杂表达式可以分离为一系列较短的表达式，这些表达式逐步生成变量的值，从而更易于阅读和编辑。这还可以消除对大型相关记录集执行相同操作（例如，多次对大型相关记录集使用`Sum`函数）带来的负面性能影响。


  举一个简单的例子，对`Contact::Contact Last Name`字段的引用可能在`Case`语句中被多次使用，每次都重复完整的字段引用。通过`Let`语句，该字段的值可以插入到一个名为`lastName`、`name.last`或仅`last`的短变量中，并在原位置使用该变量。以下两个示例说明了这一点，它们构建了一个三级文件夹路径，该路径使用姓氏的首字母、姓氏的前三个字母以及姓氏本身，并在未指定姓氏时使用占位符；例如，“Munro”
  将变为 “M:Mun:Munro:”。以下是在公式中重复多次看到对同一字段的四个引用以产生此结果：


  ```

  Case (

  Contact::Contact Last Name = "" ; "Missing Name:" ;

  Left ( Contact::Contact Last Name ; 1 ) & ":" &

  Left ( Contact::Contact Last Name ; 3 ) & ":" &

  Contact::Contact Last Name & ":"

  )

  ```


  或者，使用`Let`语句，通过一次字段引用将字段的值放入一个短变量中。然后，如果该变量为空，则将其替换为缺失占位符。最后，使用它来构造路径。


  ```

  Let ( [

  last = Contact::Contact Last Name ;

  last = Case ( last = "" ; "Missing Name:" ; last )

  ] ;

  Left ( last; 1 ) & ":" & Left ( last; 3 ) & ":" & last & ":"

  )

  ```


  前面的示例使用了*级联声明*，它使用相同的变量以逐步连续的方式为一个变量建立值，从而将复杂的语句分隔为更易读的格式。在前面的示例中，`last`变量首先被设置为字段名，然后在第二个声明步骤中（如果为空）重置。这允许将复杂的嵌套语句分隔为更易于阅读的步骤。在以下示例中，四个函数嵌套在一行中，可能非常难以阅读，尤其是在更复杂的公式中。从内向外看，此示例首先从`Notes`字段获取内容，`GetValue`函数从中提取第一段，然后使用`TextFormatRemove`函数消除所有格式，最后使用`Substitute`函数将破折号替换为句点。


  ```

  Substitute ( TextFormatRemove ( GetValue ( Contact::Notes ; 1 ) ) ; "-" ; "." )

  ```




  '
- '# 排版后的内容


  在下面的修改示例中，每个步骤都在`Let`语句中对单独的变量声明执行。由于它是逐步构建单个值，因此可以使用相同的变量名，以便每个步骤替换前一个值，形成向下级联的流程。


  ```

  Let ( [

  result = Contact::Notes ;

  result = GetValue ( result ; 1 ) ;

  result = TextFormatRemove ( result) ;

  result = Substitute ( result ; "-" ; "." )

  ] ;

  result

  )

  ```


  这种技术并非在所有情况下都是最佳选择。即使是前面的示例，使用`Let`替代嵌套看起来也有些拥挤。有人可能会争辩说，在这种情况下，通过添加回车和制表符来间隔嵌套会是更好的解决方案。然而，在语句比这个简单示例更复杂的情况下，以这种方式使用`Let`语句可以取得很好的效果。


  ## `While`


  `While`函数是一个复杂的语句，只要指定的条件为真，它就会重复执行一系列逻辑步骤。该函数接受四个参数。首先，一个或多个*初始化变量*作为第一个参数声明。这些用于设置值，类似于`Let`语句。*条件参数*是一个布尔表达式，用于控制循环操作。只要此结果评估为真且未达到最大允许迭代次数，函数就会重复执行逻辑步骤。接下来，一个或多个*逻辑变量*包含变量声明，这些声明将反复执行直到函数终止。它们的结构也类似于初始变量和`Let`语句。最后，*结果参数*是一个生成语句最终结果的表达式。它可以包含存储在任何初始变量或逻辑变量中的值。


  ```

  While (

  [ initialVariable ] ;

  condition ;

  [ logicVariables ] ;

  result

  )

  ```


  ### 使用`While`语句删除双空格


  以下简单示例演示了`While`函数的基本结构。首先，一个`data`变量被初始化为`Contact`表中`Notes`字段的值。这是一个语句变量，在执行期间可在`While`语句中使用。接下来，建立一个*条件*，只要`data`变量包含任何双空格，函数就会重复执行。*逻辑*部分重新初始化`data`变量，将双空格替换为单个空格。这将持续循环，直到没有双空格为止，从而纠正任意数量的多余空格：双空格、三空格、四空格等。最后，当*条件*未能找到双空格并终止时，清理后的`data`变量成为*结果*，并返回没有多余空格的文本。


  ```

  While (

  [

  data = Contact::Notes

  ] ;

  PatternCount ( data ; "  " ) ;

  [

  data = Substitute ( data ; "  " ; " " )

  ] ;

  data

  )

  ```


  将此公式放入自动输入计算（第 8 章，“字段选项：自动输入”）中，该计算替换现有值，以便用户输入的任何双空格都会自动从字段中移除。只需将字段引用更改为`Self`，该公式即可用于任何字段。


  > **提示**

  > 考虑创建一个自定义函数来自动清理文本（第 15 章），并将其用于任何字段的自动输入公式。


  ### 使用`While`编译相关记录列表


  以下示例从与当前`Company`记录相关的`Contact`记录中提取姓名和职务列表，并将这些值合并以形成单个联系人列表。换句话说，一个由回车分隔的*姓名*列表和一个由回车分隔的*职务*列表，变为每个相关记录的“姓名
  职务”回车分隔列表。这两个列表被初始化到一个变量中，并计数，同时初始化两个控制变量。只要*当前*值小于或等于值的*计数*，逻辑变量将重复执行。在那里，为*当前*值创建条目并添加到*结果*变量中。然后，*当前*变量递增一。当所有值处理完毕后，语句退出并返回累积的结果。


  ```

  While (

  [

  names = List ( Company | Contact::Contact Name Full ) ;

  titles = List ( Company | Contact::Contact Title ) ;

  count = ValueCount ( names ) ;

  current = 1 ;

  result = ""

  ] ;

  count ≥ current ;

  [

  entry = GetValue ( names ; current ) & " " & GetValue ( titles; current ) ;

  result = result & Case ( result ≠ "" ; "¶" ) & entry ;

  current = current + 1

  ] ;

  result

  )

  ```


  > **注意**

  > `List`函数排除空值。如果前面示例中即使有一个相关记录在两个字段之一中缺少值，则合并结果将在每个后续记录中不匹配。


  ### 使用`While`编译本地记录列表


  此示例生成与前一示例相同的结果，但不是循环从相关表中提取的列表，而是通过使用`GetNthRecord`函数（本章前面已描述）循环当前表中的记录查找集。


  ```

  While (

  [

  count = Get ( FoundCount ) ;

  current = 1 ;

  result = ""

  ] ;

  count ≥ current ;

  [

  name = GetNthRecord ( Contact::Contact Name Full ; current ) ;

  title = GetNthRecord ( Contact::Contact Title ; current ) ;

  entry = name & " " & title ;

  result = result & Case ( result ≠ "" ; "¶" ) & entry ;

  current = current + 1

  ] ;

  result

  )

  ```


  ## 将函数嵌套到复杂语句中


  内置函数可以组合和嵌套，以创建尽可能复杂的语句，以产生任何所需的结果。本节中的示例演示了通过组合各种函数和语句，从简单语句到更复杂的语句的转变。


  ### 创建记录元数据字符串


  此示例收集有关记录的信息，并创建一个显示该信息的字符串。每个结果都可以显示在布局的字段或*公式命名的对象*（如按钮栏）中（第 20 章）。`Let`语句从元数据字段中提取值，并将它们组合成一个显示记录序列号以及创建/修改日期和时间的单个值。


  ```

  Let ( [

  id = Record ID ;

  creator = Record Creation User ;

  created = Record Creation Timestamp ;

  modifier = Record Modification User ;

  modified = Record Modification Timestamp ;

  creation =

  Right ( "0" & Month ( created ) ; 2 ) & "." &

  Right ( "0" & Day ( created ) ; 2 ) & "." &

  Year ( created ) ;

  modification =

  Right ( "0" & Month ( modified) ; 2 ) & "." &

  Right ( "0" & Day ( modified) ; 2 ) & "." &

  Year ( modified)

  ] ;

  "ID " & id & " | " &

  "Created on " & creation & " by " & creator & " | " &

  "Modified on " & modification & " by " & modifier

  )

  // result = ID 55326 | Created on 07.01.2020 by Admin | Modified on 07.01.2020 by
  Admin

  ```


  ### 创建记录计数字符串


  此示例组装一个字符串，显示记录导航字符串，包括*当前记录号*和总记录数。如果用户正在查看查找集，则也会包含该数量。


  ```

  Let ( [

  total = Get ( TotalRecordCount ) ;

  found = Get ( FoundCount ) ;

  current = Get ( ActiveRecordNumber )

  ] ;

  "Record " & current & " of " & found &

  Case ( found ≠ total ; " Found ( " & total & " Total )" )

  )

  // result (viewing all)         = Record 2 of 6

  // result (viewing found set)   = Record 2 of 4 Found ( 6 Total )

  ```


  > **注意**

  > 使用上述示例作为计算字段公式时，请在*存储选项*下关闭索引，以确保常量更新。




  ### 从时间差创建语句


  本示例根据经过的时间创建一条人类可读的语句。首先，一个 `Let` 语句开始初始化变量，起始变量 `start` 和 `end` 均包含一个时间戳值。虽然在本次演示中这些值被设为硬编码值，但它们也可以通过字段、变量或其他函数提供。接着，用
  `end` 减去 `start`，并将结果转换为数字，以得出经过的秒数 `elapsed`。随后，将这个数字经过四个级联步骤处理，依次确定经过的天数 (`days`)、小时数
  (`hours`)、分钟数 (`minutes`) 和秒数 (`seconds`)，并且在每一步中，都从 `elapsed` 秒数中扣除已提取的量。这些步骤使用了
  `Int` 函数，该函数通过舍弃小数点右侧的所有数字来返回一个数字的整数部分（不进行四舍五入）。计算出这四个值并赋值给变量后，语句的计算部分将生成最终结果。这里使用了
  `Substitute` 语句中嵌套 `List` 语句、`List` 语句中再嵌套四个 `Case` 语句的序列。每个 `Case` 语句检查对应的值是否不为零，因为只有非零值才需包含在结果中。如果包含，则构建一个带有条件后缀的语句，例如“1
  day（1 天）”或“10 days（10 天）”。这些语句片段通过 `List` 添加到一个以回车符分隔的值列表中，然后通过 `Substitute` 将其转换为一个以逗号加空格分隔的语句。


  ```

  Let ( [

  start = GetAsTimestamp ( "8/1/2021 10:00 AM" ) ;

  end = GetAsTimestamp ( "8/2/2021 11:15:10 AM" ) ;

  elapsed = GetAsNumber ( end - start ) ;

  days = Int ( elapsed / 86400 ) ;

  elapsed = elapsed - ( days * 86400 ) ;

  hours = Int ( elapsed / 3600 ) ;

  elapsed = elapsed - ( hours * 3600 ) ;

  minutes = Int ( elapsed / 60 );

  elapsed = elapsed - ( minutes * 60 ) ;

  seconds = Int ( elapsed )

  ] ;

  Substitute (

  List (

  Case ( days ≠ 0 ; days & " day" & Case ( days > 1 ; "s" ) ) ;

  Case ( hours ≠ 0 ; hours & " hour" & Case ( hours > 1 ; "s" ) ) ;

  Case ( minutes ≠ 0 ; minutes & " minute" & Case ( minutes > 1 ; "s" ) ) ;

  Case ( seconds ≠ 0 ; seconds & " second" & Case ( seconds > 1 ; "s" ) )

  ) ; "¶" ; ", "

  )

  )

  // 结果 = 1 day, 1 hour, 15 minutes, 10 seconds

  ```


  ### 将数字转换为语句


  本示例使用 `Let`、`Case`、`Choose` 及其他函数将一个数字转换为语句。在 `Let` 语句的变量声明部分，从一个字段中提取数字并赋值给变量 `n`。`Length`
  和 `GetAsText` 函数用于计算该数字的字符数，并将结果放入 `count` 变量中。接着，根据数字的位数，初始化三个变量，每个变量包含数字的一位。通过组合使用
  `Left`、`Middle`、`Right`、`GetAsNumber` 和 `Case` 函数，将第一位（右侧）数字放入 `a`，第二位（中间）数字放入 `b`，第三位（左侧）数字放入
  `c`。计算部分包含四个 `Case` 语句，它们根据位置数字有条件地插入每个值的文本表示形式，然后将这些片段拼接起来形成最终语句。根据输入的数字，该函数将返回从“1
  Year（1 年）”到“Nine Hundred Ninety Nine Years（九百九十九年）”的结果。


  ```

  Let ( [

  |

  n = Example Number ;

  t = GetAsText ( n ) ;

  count = Length ( t ) ;

  a = GetAsNumber ( Right ( t ; 1 ) ) ;

  b = Case ( count > 1 ; GetAsNumber ( Left ( Right ( t ; 2 ) ; 1 ) ) ) ;

  c = Case ( count > 2 ; GetAsNumber ( Left ( t ; 1 ) ) )

  ] ;

  Case ( c > 0 ;

  Choose( c ; "";

  "One "; "Two "; "Three "; "Four "; "Five "; "Six "; "Seven "; "Eight "; "Nine "

  ) & "Hundred " ) &

  Case ( b > 1 ;

  Choose( b ; ""; "";

  "Twenty "; "Thirty "; "Forty "; "Fifty "; "Sixty "; "Seventy "; "Eighty "; "Ninety
  ")

  ) &

  Case ( a > 0 and b ≠ 1 ;

  Choose( a ; "";

  "One "; "Two "; "Three "; "Four "; "Five "; "Six "; "Seven "; "Eight "; "Nine ")

  ) &

  Case ( b = 1 ;

  Choose( a ;

  "Ten "; "Eleven "; "Twelve "; "Thirteen "; "Fourteen "; "Fifteen "; "Sixteen ";
  "Seventeen "; "Eighteen "; "Nineteen ") ) &

  "Year" & Case ( n > 1 ; "s" )

  )

  // 结果（如果数字字段包含 32）= Thirty Two Years

  ```


  ## 总结


  本章讨论了许多有用的内置函数。请记住，FileMaker 拥有超过 `300` 个内置函数，在编写公式时均可使用。后续章节还会提到更多此类函数，而所有函数都在
  `指定计算` 对话框的 `函数` 窗格底部提示可访问的联机帮助指南中进行了描述。在下一章中，我们将继续探索内置函数，重点讲解 *JavaScript 对象表示法*
  (JSON) 函数。


  '
- '# 14. 使用 JSON


  *JavaScript 对象表示法* (JSON) 是一种开放标准、轻量级的数据交换格式，最初由道格拉斯·克罗克福特于 2000 年制定，于 2013 年标准化，并于
  2017 年最终定稿为当前版本。它源自 JavaScript 编程语言，旨在满足一种独立于语言、实时的、无需插件即可实现服务器到浏览器交换协议的需求。JSON
  对象使用相对简单的键/值对结构进行格式化，这种结构易于人类和机器读写。因此，它已成为 *表述性状态转移* (REST) Web 服务中不可或缺的数据交换工具。FileMaker
  在版本 16 中添加了一组内置函数，可用于创建和操作 JSON 数据。这些函数在处理外部服务提供格式的数据时至关重要，也可在将 JSON 用作脚本与其他函数之间进行数据交换的内部格式时使用。本章将介绍
  JSON，涵盖以下主题：


  - 定义 JSON 格式

  - 解析 JSON

  - 操作 JSON




  ## 定义 JSON 格式


  一个 **JSON 对象**是括号内一系列 **元素**的列表，这些元素将标识 *key*（键）与关联的 *value*（值）结合在一起。类似的结构在其它语言中有多种称呼，包括
  *array*（数组）、*dictionary*（字典）、*hash table*（哈希表）、*keyed list*（键控列表）、*record*（记录）和
  *struct*（结构体）。*key* 始终是一个文本字符串，充当标签来命名和标识元素。元素中的 *value* 包含一些数据内容，是以下类型之一：


  - *JSONString* – 文本字符串

  - *JSONNumber* – 数值

  - *JSONBoolean* – `true` 或 `false` 值

  - *JSONArray* – 包含在方括号内、由逗号分隔的有序值列表

  - *JSONObject* – 嵌套在父对象元素中的 JSON 对象

  - *JSONNull* – 空值

  - *JSONRaw* – 将由 JSON 解析器确定的值


  一个包含单个元素（含 `id` 号码）的 JSON 对象格式如下：标签放在引号中，后跟冒号和值，所有内容包裹在花括号中。此处键的值是 *JSONNumber*：


  ```

  {"id":5103}

  ```


  在此示例中，值包含 *JSONText*，即一个人的名字：


  ```

  {"First":"John"}

  ```


  多元素对象使用逗号分隔每个唯一命名的元素。例如，包含人员数据的对象可能组合 *id*、*first name*、*last name* 和 *title* 等元素，如下所示：


  ```

  {"id":5103,"First":"John","Last":"Smith","Title":"Chief Technology Officer"}

  ```


  JSON 不关心元素周围是否存在空白，因此上述对象可以格式化为多行格式，如下所示：


  ```

  {

  "id":5103,

  "First":"John",

  "Last":"Smith",

  "Title":"Chief Technology Officer"

  }

  ```


  **JSON 数组**是一种包含未标记值或元素列表的对象类型。其格式为用方括号括起来的逗号分隔值，如下列数字数组示例所示：


  ```

  [1,2,3,4,5]

  ```


  数组可以包含其它数据类型，包括文本，如下例所示：


  ```

  ["Karen","Charlene","Jeff","Susan","Howard"]

  ```


  元素的值甚至可以是另一个对象，从而形成对象的嵌套层次结构。此示例显示一个包含两个 **product 元素**的对象，每个元素包含一个嵌套的 *JSONObject*
  作为产品元数据：


  ```

  {

  "Product1":{"name":"Widget 1","price":39.99,"vendor":15},

  "Product2":{"name":"Widget 2","price":55.48,"vendor":38}

  }

  ```


  元素的值也可以包含数组，如下所示，其中 `friends` 和 `colleagues` 元素各自是一个包含名称列表的 *JSONArray*：


  ```

  {

  "friends":["Dan","Brian","Carolyn","Karen"],

  "colleagues":["Brian","Michael","Mary","Walker","Nadya"]

  }

  ```


  类似地，数组可以包含对象。此示例显示一个包含两个项目的数组：一个包含两个 `Product` 元素的对象，以及另一个包含两个 `Employee` 元素的对象：


  ```

  [

  {"Product1":"Widget 1","Product2":"Widget 2"},

  {"Employee1":"William","Employee2":"Janice"}

  ]

  ```


  虽然某些系统和服务器会返回它们定义的 JSON 格式的数据，但在 FileMaker 中创建 JSON 时，对象的结构可以由你自由定义。任何数量的对象、数组和数据类型都可以混合搭配、连接或嵌套，使用你自定义的标签来创建基于自定义系统要求的独特结构。


  > **提示**：在 [`www.jsonlint.com`](http://www.jsonlint.com) 验证 JSON 对象的格式。


  ## 解析 JSON


  FileMaker 提供了三个用于解析数据的 JSON 函数，每个函数都需要两个参数：一个 `json` 对象（或空字符串）和一个 `keyOrIndexPath`（可选的，用于引用特定元素键、数组索引位置或嵌套元素的路径）：`JSONGetElement`、`JSONListKeys`、`JSONListValues`。


  让我们基于以下假设来学习一些示例：Sandbox 表中的 `Example Text` 字段包含以下包含供应商信息的 JSON：


  ```

  {

  "id":350,

  "name":"First Class Widgets",

  "category":"Manufacturing",

  "contact":

  {

  "phone":"555-867-5309",

  "email":"sales@widgets.nope",

  "web":"www.widgets.nope"

  },

  "products":

  [

  {

  "aisles":[3,8],

  "id":1000,

  "name":"Widget 1",

  "price":39.99

  },

  {

  "aisles":[2,4],

  "id":1001,

  "name":"Widget 2",

  "price":59.99

  }

  ]

  }

  ```


  ### 使用 `JSONGetElement`


  `JSONGetElement` 函数将从提供的 JSON 数据中返回指定元素的值。


  ```

  JSONGetElement ( json ; keyOrIndexOrPath )

  ```


  #### 通过键引用元素


  要通过键引用元素，请在 `keyOrIndexOrPath` 参数中使用其标签名称。此示例显示请求 `name` 元素的调用：


  ```

  JSONGetElement ( Sandbox::Example Text ; "name" )    // 结果 = First Class Widgets

  ```


  此示例请求 `contact` 元素，因此结果是一个 JSON 对象。


  ```

  JSONGetElement ( Sandbox::Example Text ; "contact" )

  // 结果 =

  {

  "phone":"555-867-5309",

  "email":"sales@widgets.nope",

  "web":"www.widgets.nope"

  }

  ```


  #### 通过数组索引引用元素


  当对象是数组时，`keyOrIndexOrPath` 参数应为方括号内的数字，指示所需元素的零基位置。通过使用索引位置 `2`，此示例将从名称数组中提取第三个值，如下所示：


  ```

  JSONGetElement ( ["Michael","Mary","Walker","Karen"] ; "[2]" ) // 结果 = Walker

  ```


  #### 通过路径引用元素


  当解析包含嵌套对象和数组元素的复杂 JSON 时，可以使用 *path*（路径）来引用比第一层更深的元素。*JSON path* 通过指定遍历层级结构到达所需元素所需的每个键来表示，每个键之间用句点分隔。使用供应商示例，要获取
  `phone` 元素，我们必须指定它包含在 `contact` 元素中，如下所示：


  ```

  JSONGetElement ( Sandbox::Example Text ; "contact.phone" )    // 结果 = 555-867-5309

  ```


  *path* 可以根据需要深入到任意层级，并且可以混合使用对象键和数组索引位置。在此示例中，我们通过包含索引位置 `[1]` 来获取数组中第二个位置的 `product`
  的 `price`，如下所示：


  ```

  JSONGetElement ( Sandbox::Example Text ; "products.[1].price" )    // 结果 = 59.99

  ```


  类似地，此示例将从 `product` 元素第一个数组位置的 `aisles` 元素中提取第二个数组位置：


  ```

  JSONGetElement ( Sandbox::Example Text ; "products.[0].aisles.[1]" )    // 结果 =
  8

  ```


  ### 使用 `JSONListKeys`


  `JSONListKeys` 函数返回对象或指定元素中每个键的名称列表。


  ```

  JSONListKeys ( json ; keyOrIndexOrPath )

  ```


  此示例显示如何获取示例 JSON 中的键列表：


  ```

  JSONListKeys ( Sandbox::Example Text ; "" )

  // 结果 =

  category

  contact

  id

  name

  products

  ```


  `keyOrIndexOrPath` 参数可用于指定包含对象或数组的嵌套元素。此示例将返回 `contact` 元素的键列表：


  ```

  JSONListKeys ( Sandbox::Example Text ; "contact" )

  // 结果 =

  phone

  email

  web

  ```


  因为数组是未标记的列表，返回的键将是项目的零基索引位置列表，如下所示指定 `products` 元素：


  ```

  JSONListKeys ( Sandbox::Example Text ; "products" )

  // 结果 =


  ```




  ### 使用 `JSONListValues`


  `JSONListValues` 函数会返回包含对象或数组的元素中，每个键所对应的值组成的列表。


  ```

  JSONListValues ( json ; keyOrIndexOrPath )

  ```


  其工作方式与 `JSONListKeys` 相同，区别在于它返回的是 *值* 而非 *键*，如下例所示，它返回了 `contact` 元素中每个元素的值：


  ```

  JSONListValues ( Sandbox::Example Text ; "contact" )

  // 结果 =

  555-867-5309

  sales@widgets.nope

  www.widgets.nope

  ```


  ## 创建与操作 JSON


  FileMaker 提供了三个用于操作 JSON 对象中元素的函数：`JSONSetElement`、`JSONDeleteElement` 和 `JSONFormatElements`。


  ### 使用 `JSONSetElement`


  `JSONSetElement` 函数用于设置对象中一个或多个元素的值，如果元素不存在则会创建它们。该函数调用包含四个参数，如下所示：


  ```

  JSONSetElement ( json ; keyOrIndexOrPath ; value ; type )

  ```


  `json` 参数可以包含一个对象、数组，或者在创建新对象时使用空字符串。`keyOrIndexOrPath` 和 `value` 是必填参数，用于指定要创建或修改的元素键及其应包含的内容。`type`
  参数可以指定 `value` 的数据类型，也可以使用空字符串，此时 FileMaker 会根据提供的内容自动推断类型。下面的示例创建了一个包含 `name` 元素的简单对象：


  ```

  JSONSetElement ( "" ; "name" ; "First Class Widgets"; "" )

  // 结果 = {"name":"First Class Widgets"}

  ```


  假设上述结果被存入一个名为 `data` 的变量，以下示例展示了如何向现有对象添加一个元素，此处为 `category` 元素：


  ```

  JSONSetElement ( data ; "category" ; "Manufacturing"; "" )

  // 结果 =

  {

  "name":"First Class Widgets",

  "category":"Manufacturing"

  }

  ```


  设置对象中已存在的元素的值时，会用新值替换旧值。


  ```

  JSONSetElement ( {"name":"Honda"} ; "name" ; "Ford"; "" )

  // 结果 = {"name":"Ford"}

  ```


  **提示**：不要手动编写 JSON，应始终使用 `JSONSetElement` 函数来创建新元素，以帮助避免错误。


  #### 指定数据类型


  前面的示例将 `type` 参数留空，因为提供的数据显然是文本，我们可以依赖 FileMaker 选择正确的格式。但通常你需要指定类型以确保得到正确的结果。例如，如果
  `value` 以数字开头且未指定类型，FileMaker 会自动将其视为数字。这意味着，带有前导零的文本或日期将被转换为数字，除非你指定了正确的数据类型。为了说明为基于文本的字符串指定类型的重要性，请比较以下结果的差异：


  ```

  JSONSetElement ( "" ; "phone" ; "555-867-5309" ; "" )

  // 结果 = {"phone":555}

  JSONSetElement ( "" ; "phone" ; "555-867-5309" ; JSONString )

  // 结果 = {"phone":"555-867-5309"}

  ```


  #### 同时设置多个值


  你可以通过使用分号分隔的、方括号括起来的 `keyOrIndexOrPath`、`value` 和 `type` 参数集，在一次调用中设置多个键，如下例所示，它同时设置了两个元素：


  ```

  JSONSetElement ( "" ;

  [ "name" ; "First Class Widgets"; "" ] ;

  [ "category" ; "Manufacturing"; "" ]

  )

  // 结果 =

  {

  "name":"First Class Widgets",

  "category":"Manufacturing"

  }

  ```


  #### 通过路径设置值


  在处理需要包含对象和数组元素的复杂对象时，有必要指定一个*路径*来引用第一层以下的元素。此示例在顶层设置 `name` 元素，然后将 `contact` 元素设置为一个包含
  `phone` 和 `email` 元素的对象：


  ```

  JSONSetElement ( "" ;

  [ "name" ; "First Class Widgets"; "" ] ;

  [ "contact.phone" ; "555-867-5309"; JSONString ] ;

  [ "contact.email" ; " sales@widgets.nope "; "" ]

  )

  // 结果 =

  {

  "name":"First Class Widgets",

  "contact":

  {

  "phone":"555-867-5309",

  "email":"sales@widgets.nope"

  }

  }

  ```


  #### 设置数组值


  `JSONSetElement` 可以定位数组中的索引位置，正如 `JSONGetElement` 所述。索引值必须用方括号括起来，以防止数字被用于创建或引用键而非数组位置，如下例所示。第一个示例展示了如何正确地在数组中创建值。第二个示例展示了未使用括号时的错误结果。


  ```

  JSONSetElement ( "" ; "[0]" ; "Claris" ; "" )

  // 结果 = ["Claris"]

  JSONSetElement ( "" ; "0" ; "Claris" ; "")

  // 结果 = {"0":"Claris"}

  ```


  在现有数组中设置元素时，该索引位置的值将被新值替换，即使数据类型不同也是如此。此示例将第三个数组位置中的*数字*替换为一些*文本*：


  ```

  JSONSetElement ( "[1,2,3,4]" ; "[2]" ; "Claris" ; "" )

  // 结果 = [1,2,"Claris",4]

  ```


  如果指定的索引位置超出了现有值的范围，FileMaker 会插入一个或多个 *null* 占位符，以定位到目标位置。


  ```

  JSONSetElement ( "" ; "[3]" ; "Claris" ; "" )

  // 结果 = [null,null,null,"Claris"]

  JSONSetElement ( "[1,2,3,4]" ; "[6]" ; "Claris" ; "" )

  // 结果 = [1,2,3,4,null,null,"Claris"]

  ```


  数组在路径中的使用方式与键相同。此示例将更改供应商示例中第一个 `product` 的 `price`：


  ```

  JSONSetElement ( Sandbox::Example Text ; "products.[0].price" ; "45.00" ; "" )

  ```


  ### 使用 `JSONDeleteElement`


  `JSONDeleteElement` 函数将从对象中删除一个元素。该函数调用包含两个参数，如下所示：


  ```

  JSONDeleteElement ( json ; keyOrIndexOrPath )

  ```


  指定的元素将被完全移除，如下例所示，它移除了 `name` 元素，仅保留 `id`：


  ```

  JSONDeleteElement ( {"name":"Honda", "id":350} ; "name" )

  // 结果 = {"id":350}

  ```


  删除数组中的索引位置会自动移动后续值，以避免出现空位。


  ```

  JSONDeleteElement ( "[1,2,3,4,5]" ; "[2]" )

  // 结果 = [1,2,4,5]

  ```


  删除操作也适用于路径。此示例将完全移除供应商示例中第一个 `product` 的第一个 `price`，并将第二个 price 移动到第一个的位置：


  ```

  JSONDeleteElement ( Sandbox::Example Text ; "products.[0].price" )

  ```


  ### 使用 `JSONFormatElements`


  `JSONFormatElements` 函数通过插入额外的空格来重新格式化对象，使其更易于阅读。FileMaker 在执行任何操作函数时都会移除对象中的空格，因此此函数在审查结果时非常有用：


  ```

  JSONFormatElements(

  {"id":5103,"First":"John","Last":"Smith","Title":"Chief Technology Officer"}

  )

  // 结果

  {

  "id":5103,

  "First":"John",

  "Last":"Smith",

  "Title":"Chief Technology Officer"

  }

  ```


  ## 总结


  本章介绍了 JSON，并探讨了用于创建、解析和操作对象与元素的内置函数。在下一章中，我们将学习如何创建自定义函数。



  '
- '# 15. 创建自定义函数


  *自定义函数*是一种由开发者定义的公式，它扩展了所在数据库中内置函数的功能。公式可以从单个公式中分离出来，置于一个易于访问的中央函数库中。与常规公式不同，自定义函数可以定义参数，可以递归，并且可以直接从数据库中的任何公式或脚本进行访问。一个设计良好、开放且可复用的自定义函数能够减少公式中的冗余，简化计算，并节省时间。在本章中，我们将讨论创建和使用自定义函数的过程，涵盖以下主题：


  * 介绍"管理自定义函数"对话框

  * 介绍"编辑自定义函数"对话框

  * 向自定义函数添加参数

  * 从自定义函数访问字段

  * 构建递归自定义函数


  > **注意**：只有在启用高级工具后才能创建和编辑自定义函数（第 2 章）。


  ## 自定义函数对话框介绍


  自定义函数通过"管理自定义函数"对话框创建和管理，如图 15-1 所示。要打开该对话框，请选择"文件 ➤ 管理 ➤ 自定义函数"菜单。此对话框用于*创建*、*编辑*、*复制*、*删除*和*导入*自定义函数。


  ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig1_HTML.jpg](img/429700_2_En_15_Fig1_HTML.jpg)


  **图 15-1** — 用于管理自定义函数的对话框


  > **提示**：自定义函数可以在两个文件之间复制粘贴，或通过导入方式添加。


  首先，点击"新建"按钮，在"编辑自定义函数"对话框中打开一个新函数，如图 15-2 所示。创建新函数或编辑现有函数时会打开此对话框。它类似于"指定计算"对话框，但有几个重要差异。


  ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig2_HTML.jpg](img/429700_2_En_15_Fig2_HTML.jpg)


  **图 15-2** — 用于定义自定义函数的对话框


  "函数名称"字段用于为函数命名，以便其他公式像调用内置函数一样调用它。


  多个工具用于定义可选的"函数参数"。参数是位置性输入变量，当其他公式调用该函数时被赋予值。这些参数的工作方式类似于内置函数的参数，只是由您自行定义。输入名称并点击*加号*图标即可创建新参数。选择并重命名现有参数，然后点击*铅笔*图标保存更改。点击*减号*图标可删除参数。参数加入列表后，可通过拖拽调整顺序。由于参数是位置性的，调用函数时传递的值会插入到列表中对应位置的变量中。*更改现有函数参数的顺序将需要重新调整任何现有调用中的值的顺序*。创建完成后，双击列表中的参数可将其插入到下方的公式中。


  函数的公式在公式文本区域输入。与"指定计算"对话框不同，这里没有*自动补全建议界面*，因此所有内容都必须手动输入，或使用对话框上半部分的按钮和列表插入。尽管函数在当前窗口上下文中执行且可以包含字段引用，但这些引用必须手动输入，因为此对话框上没有字段选择面板。这是因为函数可被任何字段、界面或脚本公式访问，将字段值作为参数传入函数更为安全，可避免使函数不必要地依赖于上下文。


  右上角区域包含用于将运算符和函数调用插入公式的控件。底部的"可用性"选项允许选择仅向具有完全访问权限的账户开放函数（第 30 章）。


  除了这些差异之外，自定义函数的编写方式与其他公式相同，并且必须遵守相同的 30,000 字符限制。


  ## 创建自定义函数


  首先，创建一个名为 `GetMonday` 的简单无参数自定义函数，该函数使用以下公式计算当前周星期一的*日期*：


  ```

  Let ( [

  dateToday = Get ( CurrentDate ) ;

  numAdjustment = DayOfWeek (dateToday) – 2

  ] ;

  dateToday - numAdjustment

  )

  ```


  该公式使用 `Let` 语句将今天的日期存入变量 `dateToday` 中。为了确定将今天日期调整到星期一所需的天数，它使用内置函数 `DayOfWeek`
  对 `dateToday` 进行转换。然后，由于我们知道星期一始终是日历周的第二天，因此从该数字中减去 2，并将结果存入变量 `numAdjustment`。最后，从今天日期中减去该调整数，得出本周星期一的日期。例如，如果今天是星期五，即一周的*第六天*。由于我们要确定对应的星期一（一周的*第二天*），因此从该数字中减去
  *2*，得出需要从当前日期减去的天数，从而得到本周的星期一。无论*今天*是星期几，此公式的结果始终是对应星期一的日期。


  要创建此自定义函数，请打开"管理自定义函数"对话框，点击"新建"按钮打开"编辑自定义函数"对话框。然后按照图 15-3 所示的步骤操作，首先输入名称 `GetMonday`，然后输入公式。点击"确定"按钮保存函数，然后在"管理自定义函数"对话框中点击"确定"。


  ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig3_HTML.jpg](img/429700_2_En_15_Fig3_HTML.jpg)


  **图 15-3** — 创建示例自定义函数所需的步骤


  完成后，可以使用与插入内置函数相同的过程将新函数插入到任何公式中。在 `Sandbox` 表中按以下步骤进行测试：


  1. 在"管理数据库"对话框中打开 `Sandbox` 表的"字段"选项卡。

  2. 双击 `Example Calculation` 字段，或选中它并点击"选项"按钮。

  3. 将字段的公式改为 `GetMonday`。

  4. 将计算结果类型改为*日期*。

  5. 点击"确定"保存计算公式并关闭"指定计算"对话框。

  6. 点击"确定"保存并关闭"管理数据库"对话框。


  现在，在任何记录的 `Sandbox Form` 布局上查看结果。如果包含此函数调用的计算在 2021 年 1 月 7 日（星期四）进行评估，结果应为前一个星期一：2021
  年 1 月 4 日。



  '
- '# 向自定义函数添加参数


  上一个示例演示了如何构建一个简单的自定义函数。然而，由于灵活性严重受限，该函数缺乏实用性。虽然它使用了*当前日期*确实带来了一定的灵活性，并且未来也能继续工作，但它被锁定为仅能返回与今天相对的星期一。通过添加参数并修改公式，该函数可以扩展为计算*从任意起始日期起的任意指定工作日*。


  如先前所述（第 12 章，“调用带参数的函数”），*函数参数*是一个每次调用函数时都可能变化的值，它允许公式将特定值传入一个*开放式的*函数中。参数提供了可变输入和/或关于应执行何种处理的指令，使函数能够适应不同情况。定义自定义函数时，可以为任何功能目的创建任意数量的参数，并随意命名。由于无法控制公式作为参数传递给函数的数据类型，请务必选择一个能描述其预期接收的数据类型的名称。例如，名为
  *input* 的参数过于模糊，而 `dateInput` 或 `startDate` 则清楚地说明了期望的数据类型。在我们的示例中，我们希望向函数添加两个参数：一个名为
  `dateInput` 的输入日期，以及一个名为 `dayRequested` 的目标工作日。


  ## 添加输入日期参数


  首先，复制上一个函数，我们将其扩展，以便根据名为 `dateInput` 的参数中提供的任意起始日期来计算相应的星期一。打开*管理自定义函数*对话框，选择 `GetMonday`
  函数，然后单击*复制*按钮。接着单击*编辑*按钮，在*编辑自定义函数*对话框中打开该函数，并进行如图 15-4 所示的修改。


  ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig4_HTML.jpg](img/429700_2_En_15_Fig4_HTML.jpg)


  图 15-4


  修改复制的函数所需的步骤


  1.  将函数名称改为 `GetMonday2`。


  2.  输入参数名称 `dateInput`，然后单击 + 按钮，将其创建到下方的列表中。


  3.  修改代码，使 `dateInput` 参数替代当前日期，并使用 `GetAsDate` 函数将其转换为日期。同时，将 `dateToday` 变量重命名为
  `dateToProcess`：


  ```

  Let ( [

  dateToProcess = GetAsDate ( dateInput ) ;

  numAdjustment = DayOfWeek ( dateToProcess ) – 2

  ] ;

  dateToProcess - numAdjustment

  )

  ```


  保存该函数，并修改*示例计算*字段中的公式，以调用新函数。由于它会自动将输入转换为日期，因此参数可以是包含日期值的文本字段、日期字段、包含日期的文字文本字符串，或使用函数构建的日期值。以下是每种选项的示例：


  ```

  GetMonday2 ( Sandbox::Example Text )

  GetMonday2 ( Sandbox::Example Date )

  GetMonday2 ( "1/7/2021" )

  GetMonday2 ( Date ( 1 ; 7 ; 2021 ) )

  ```


  保存公式，并在浏览模式下查看结果。结果应为相对于您指定的输入日期的星期一。


  ## 添加请求日期参数


  接下来，添加一个名为 `dayRequested` 的额外参数，该参数接受一个工作日名称，并返回所提供 `dateInput` 相对于该工作日的日期。首先，复制
  `GetMonday2` 函数。由于新的、扩展后的函数不再仅限于返回星期一结果，新函数的名称应改为 `GetDay`。添加第二个参数，名为 `dayRequested`。最后，按如下所示修改代码：


  ```

  Let ( [

  dateToProcess = GetAsDate ( dateInput ) ;

  list = "Sunday¶Monday¶Tuesday¶Wednesday¶Thursday¶Friday¶Saturday" ;

  list = Left ( list ; Position ( list ; dayRequested ; 1; 1 ) ) ;

  dayNumber = ValueCount ( list ) ;

  numAdjustment = DayOfWeek ( dateToProcess ) – dayNumber

  ] ;

  dateToProcess - numAdjustment

  )

  ```


  该代码将接受 `dayRequested` 参数中的日期名称（例如，“Wednesday”），并通过在日期名称列表中查找该日期的位置，将其转换为日期数字（4）。这是通过向公式中添加三个步骤完成的。一个新的
  `list` 变量被初始化为包含一个由回车符分隔的工作日名称列表。在下一行，使用 `Left` 和 `Position` 函数修改 `list` 变量，将其缩减至仅包含所请求日期之前的那些日期名称。因此，如果请求的日期是“Wednesday”，那么
  `list` 将包含“Sunday¶Monday¶Tuesday¶W”。最后，使用 `ValueCount` 函数将该列表转换为工作日数字（4），并放入 `dayNumber`
  变量中。该变量用于确定 `numAdjustment` 值，该值用于像先前版本一样调整输入日期。保存新函数后，修改*示例计算*中的公式以调用新函数。在此示例中，结果将是
  *2021 年 1 月 4 日*所在周的*星期五*的日期：


  ```

  GetDay ( "1/4/2021" ; "Friday" )        // 结果 = 1/8/2021

  GetDay ( "1/4/2021" ; "Wednesday" )     // 结果 = 1/5/2021

  ```


  ## 添加默认日期选项


  作为进一步的优化，修改函数，使其在 `dateInput` 参数未指定日期时自动使用默认日期。这为任何希望使用当前日期的公式提供了一种快捷方式。目前，如果该函数用于计算当前日期的星期五，则调用公式必须显式地在调用中包含今天的日期，如下所示：


  ```

  GetDay ( Get ( CurrentDate ) ; "Friday" )

  ```


  修改上一个示例中 `Let` 语句的第一行，添加一个 `Case` 语句，使其在参数中未提供日期时自动默认使用当前日期。当调用传递空字符串而非日期时，此条件将使函数能够产生结果。按如下所示修改
  `Let` 语句的第一行：


  ```

  dateToProcess = Case ( dateInput = "" ; Get ( CurrentDate ) ; GetAsDate ( dateInput
  ) ) ;

  ```


  现在，公式可以通过在第一个参数中传递空字符串来请求相对于当前日期的某一天，或者通过提供具体日期来请求相对于该日期的某一天，如下面两个示例所示：


  ```

  GetDay ( "" ; "Friday" )

  GetDay ( "1/4/2021" ; "Friday" )

  ```




  ### 强调全面测试的重要性


  每个公式在投入生产环境使用前都应仔细测试。自定义函数可从数据库任意位置调用，因此需要特别谨慎。对于接受参数输入的复杂函数而言尤其如此。单次测试显示函数运行正常可能并不充分，因为不同的输入可能引发公式未预料到的情况。相反，应使用多种输入执行尽可能多的测试，以确认函数能处理各种可能值的组合。


  每个自定义函数的测试需求各不相同。首先要思考可能接收到哪些类型的输入。针对之前的示例，我们可以提出许多问题。如果提供的日期恰逢*周初*：是周日还是周一？如果日期恰逢*周末*：是周五还是周六？如果请求的星期几与提供的日期是相同的？函数在每种情况下是否能正常工作？当请求*任意*日期对应的*任意*星期几时，函数能否正确运行？所有预期的数据类型——*日期*、*时间戳*和*包含日期的文本字符串*——是否都能返回准确结果？为确认这一点，我们应为每个条件设计一套测试并验证结果。首先，将问题列表转化为测试场景列表，通过足够多样的输入样本来充分确认所需功能。在我们的示例中，至少应执行以下测试：


  - `dateInput` – 运行七次测试，输入值涵盖一周中的每一天；同时，对每种接受的数据类型至少进行一次测试。

  - `dayRequested` – 运行七次测试，涵盖一周中的每一天。


  这表明至少需要进行 *16* 次测试。无需逐一手动执行，在 *示例计算* 字段中输入以下单个计算公式，就能一次性覆盖所有测试，生成一个列出所有结果的文本结果：


  ```

  Let ( [

  dateInput = Date ( 1 ; 17 ; 2021 )

  ] ;

  "Input = " & dateInput & " (" & DayName (dateInput) & ")¶" &

  "+1 Sunday=" & GetDay ( dateInput + 1  ; "Sunday" ) & "¶"

  "+2 Sunday=" & GetDay ( dateInput + 2  ; "Sunday" ) & "¶" &

  "+3 Sunday=" & GetDay ( dateInput + 3  ; "Sunday" ) & "¶" &

  "+4 Sunday=" & GetDay ( dateInput + 4  ; "Sunday" ) & "¶"

  "+5 Sunday=" & GetDay ( dateInput + 5  ; "Sunday" ) & "¶" &

  "Sunday=" & GetDay ( dateInput; "Sunday" ) & "¶"

  "Monday=" & GetDay ( dateInput ; "Monday" ) & "¶"

  "Tuesday=" & GetDay (dateInput; "Tuesday" ) & "¶"

  "Wednesday=" & GetDay ( dateInput; "Wednesday" ) & "¶" &

  "Thursday=" & GetDay ( dateInput; "Thursday" ) & "¶" &

  "Friday=" & GetDay ( dateInput; "Friday" ) & "¶" &

  "Saturday=" & GetDay ( dateInput; "Saturday" ) & "¶"

  "Timestamp=" & GetDay ( GetAsTimestamp ( dateInput )  ; "Sunday" ) & "¶" &

  "Text Date=" & GetDay ( GetAsText ( dateInput )  ; "Sunday" ) & "¶" &

  "Text TS=" & GetDay ( GetAsText ( GetASTimestamp ( dateInput ) )  ; "Sunday" ) &
  "¶"

  )

  // 结果 =

  Input = 1/17/2021 (Sunday)

  +1 Sunday=1/17/2021

  +2 Sunday=1/17/2021

  +3 Sunday=1/17/2021

  +4 Sunday=1/17/2021

  +5 Sunday=1/17/2021

  +6 Sunday=1/17/2021

  Sunday=1/17/2021

  Monday=1/18/2021

  Tuesday=1/19/2021

  Wednesday=1/20/2021

  Thursday=1/21/2021

  Friday=1/22/2021

  Saturday=1/23/2021

  Timestamp=1/17/2021

  Text Date=1/17/2021

  Text TS=1/17/2021

  ```


  **注意**


  务必将 *示例计算* 结果的数据类型更改为“文本”，因为此测试公式返回的是文本而非`date`。


  该公式使用`Let`语句将起始日期存入变量，并利用该变量重复调用函数，将结果拼接成字符串。前六个结果显示，当`dateInput`递增覆盖一整周的每一天时，对请求的周日返回的结果保持不变。接下来的七个结果显示，使用相同的`dateInput`请求不同星期几时，函数正常工作，因为结果跨越了
  7 天周期。最后三个结果显示，当`dateInput`为`timestamp`、`text-based date`或`text-based timestamp`时，结果保持不变。完成此测试并确认无误后，即可放心使用此自定义函数。


  ## 构建递归函数


  *递归函数*是一种能够生成自我引用的公式，即在其内部调用并执行自身。在 FileMaker 中，自定义函数是唯一可以进行递归的公式。递归常与循环脚本或新的`While`函数（第
  13 章）中的迭代功能相混淆。尽管两者有相似之处，许多任务可用任一种方式完成，但递归实际上非常不同。在重复或*迭代过程*中，一段代码被连续执行多次；每次迭代*在下一轮开始前*完成。相比之下，*递归过程*会*在前一个实例执行期间*创建并运行同一个代码的连续新实例，其差异如图
  15-5 所示。每个实例在内存中排队，形成所谓的调用栈，直到达到一个称为基础情况的终止点，此时它停止调用自身并生成一个结果，该结果沿栈向上级联返回，最终使栈折叠。


  ![../images/429700_2_En_15_Chapter/429700_2_En_15_Fig5_HTML.jpg](img/429700_2_En_15_Fig5_HTML.jpg)


  **图 15-5** 迭代循环（左）与递归（右）的区别


  迭代和递归两种方案都优于限制迭代次数的硬编码语句。例如，使用`If`或`Case`语句需要在固定序列中明确写出每个可能的迭代。同样，`Let`语句可以执行固定数量的级联变量声明。虽然这对数量从不改变且不变的静态选择可行，但通常需要更动态的方法。


  *循环脚本*易于设置且运行迅速。然而，脚本无法从公式内部触发，因此仅限于与界面相关的操作和事件。此外，设置起来可能很繁琐，因为它需要迭代控制变量以及执行所需功能的多行代码。


  对于纯*基于公式*的解决方案，可以选择迭代性`While`函数或递归自定义函数。`While`函数的优势在于可在任何公式中使用，而递归仅限于自定义函数。递归栈的嵌套层级概念上更难理解，但使用`While`函数也并非毫无困惑之处。在简单示例中它可能显得过于冗长，在复杂示例中则令人费解。使用`While`可能速度稍快，且内存影响较小。尽管许多编程挑战可用任一种方法处理，但在处理通过层级数据进行的复杂重复过程时，递归通常是唯一实用的选择。



  好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。



  ### 构建简单的递归函数


  要掌握递归函数的基本结构，请从一些简单的示例开始。首先，创建一个名为 `DateRange` 的新函数，它接受 `startDate` 和 `endDate`
  参数，并使用以下公式返回范围内每一天的列表：


  ```

  startDate &

  Case (  endDate = startDate ; "" ; "¶"  & DateRange ( startDate + 1 ; endDate )
  )

  ```


  该公式将开始日期与一个 `Case` 语句的结果连接起来，该语句决定是否应发出递归调用以将日期向前递增。如果结束日期等于开始日期，则公式返回一个空字符串，从而提供一个终止的基础情况。如果两个日期不同，则包含一个段落换行符，然后函数将开始日期加一后调用自身。每次递归调用都会重复此过程，直到开始日期等于结束日期，从而生成如下例所示的结果：


  ```

  DateRange ( GetAsDate ( "1/1/2021" ) ; GetAsDate ( "1/5/2021" ) )

  // 结果 =

  1/1/2021

  1/2/2021

  1/3/2021

  1/4/2021

  1/5/2021

  ```


  创建另一个名为 `MergeValues` 的函数，它接受两个以回车符分隔的文本值列表，并返回一个混合列表。如下所示的此函数代码假定有两个参数：`column1`
  和 `column2`：


  ```

  Let ( [

  current = GetValue ( column1 ; 1 ) & " " & GetValue ( column2 ; 1 ) ;

  column1 = RightValues ( column1 ; ValueCount ( column1 ) - 1 ) ;

  column2 = RightValues ( column2 ; ValueCount ( column2 ) - 1 )

  ] ;

  current & Case ( column1 ≠ "" ; "¶" & MergeValues ( column1 ; column2 ) )

  )

  ```


  在此示例中，使用 `Let` 语句逐步完成任务。从两个输入中提取第一个值，并将它们连接成一个 `current` 变量，中间用空格隔开。然后，使用 `ValueCount`
  和 `RightValues` 函数移除第一个值，从而将两个输入参数各减少一个值。结果是 `current` 变量中的值，如果还有剩余值，则通过段落换行符和递归调用继续该过程。以下示例调用以三个标签和电话号码作为输入，并显示相应的结果：


  ```

  MergeValues ( "工作¶家庭¶手机" ; "555-2121¶555-3421¶555-2645" )

  // 结果 =

  工作 555-2121

  家庭 555-3421

  手机 555-2645

  ```


  ### 使用 `setRecursion` 控制递归限制


  为避免递归函数未提供终止基础情况时发生无限回归，FileMaker 对递归栈可包含的迭代次数施加了限制。任何超出此限制的公式都会返回一个以问号表示的错误。在 FileMaker
  18 之前，该限制因递归类型而异。使用*尾递归*（递归调用是函数公式末尾的最后一步，不留未完成处理）的函数，总递归调用限制为 50,000 次，相比之下，*头递归*（递归调用位于公式中的任何位置）之前的限制为总调用
  10,000 次。然而，在版本 18 中，头递归和尾递归调用以及 `While` 函数的默认限制都是 50,000 次迭代。该版本还引入了 `setRecursion`
  函数，它允许开发人员将此默认限制设置得更高或更低。


  ```

  setRecursion ( expression ; maxIterations )

  ```


  这是一个*条件函数*，用于设置处理其封装的 `expression` 的迭代条件。第一个参数语句中包含的任何递归函数调用或 `While` 语句将限于 `maxIterations`
  参数指定的次数。这可用于*增加*或*减少*允许的最大迭代次数。例如，尝试在限制为 30 次迭代的 `setRecursion` 语句中调用之前的 `DateRange`
  函数，且开始和结束日期相隔超过 30 天。此示例会失败，因为完成任务所需的递归调用超出了 30 次的限制。


  ```

  setRecursion ( DateRange ( "1/1/2021" ; "2/10/2021" ) ; 30 )

  // 结果 = ?

  ```


  接下来，将限制增加到大于日期范围的数值，以查看其正常运行。如果上述示例的限制定为 60，则足以覆盖指定的日期范围，并且将得到正确的结果。


  以下示例展示了将该函数限制增加到 250,000，以便执行一个简单的 `While` 语句，该语句将计数器递增到 200,000：


  ```

  SetRecursion (

  While (

  counter = 0 ;

  counter < 200000 ;

  counter = counter + 1 ;

  counter

  ) ; 250000

  )

  ```


  ### 在函数内嵌入测试代码


  之前我们讨论了编写测试代码，以便使用各种不同的输入快速对 `GetDay` 自定义函数执行多项测试。递归开辟了将测试代码存储在被测试的自定义函数*内部*的可能性。虽然保存测试代码可能看起来没有必要，但将来任何时候修改函数时，重新测试函数可能是明智之举。可以使用
  `Case` 语句来检测测试请求并执行一组替代代码。在此示例中，`dateInput` 参数将用于确定对该函数的调用是在请求*测试结果*还是*正常操作*，并相应地运行其中的一个，如下面的模式所示：


  ```

  Case ( dateInput = "测试" ; > ; > )

  ```


  使用这种格式，我们可以将之前的示例测试代码与原始函数代码结合起来，将公式转换为以下组合语句。为了演示此技术，创建一个名为 `GetDay2` 的新函数，使其具有此新功能。在此示例中，如果
  `dateInput` 接收到值 “测试”，它将执行测试例程；否则，它将假定参数包含一个日期并执行其正常功能。


  ```

  Case ( dateInput = "测试" ;

  //    测试代码

  Let ( [

  dateInput = Date ( 1 ; 17 ; 2021 )

  ] ;

  "输入 = " & dateInput & " (" & DayName (dateInput) & ")¶" &

  "1 星期日=" & GetDay2 ( dateInput + 1  ; "星期日" ) & "¶" &

  "+2 星期日=" & GetDay2 ( dateInput + 2  ; "星期日" ) & "¶"

  "+3 星期日=" & GetDay2 ( dateInput + 3  ; "星期日" ) & "¶" &

  "+4 星期日=" & GetDay2 ( dateInput + 4  ; "星期日" ) & "¶"

  "+5 星期日=" & GetDay2 ( dateInput + 5  ; "星期日" ) & "¶" &

  "+6 星期日=" & GetDay2 ( dateInput + 6  ; "星期日" ) & "¶" &

  "星期日=" & GetDay2 ( dateInput; "星期日" ) & "¶" &

  "星期一=" & GetDay2 ( dateInput ; "星期一" ) & "¶" &

  "星期二=" & GetDay2 (dateInput; "星期二" ) & "¶" &

  "星期三=" & GetDay2 ( dateInput; "星期三" ) & "¶"

  "星期四=" & GetDay2 ( dateInput; "星期四" ) & "¶"

  "星期五=" & GetDay2 ( dateInput; "星期五" ) & "¶" &

  "星期六=" & GetDay2 ( dateInput; "星期六" ) & "¶" &

  "时间戳=" & GetDay2 ( GetAsTimestamp ( dateInput )  ; "星期日" ) & "¶"

  "文本日期=" & GetDay2 ( GetAsText ( dateInput )  ; "星期日" ) & "¶" &

  "文本时间戳=" & GetDay2 ( GetAsText ( GetAsTimestamp ( dateInput ) )  ; "星期日" ) &

  )

  ;

  //    常规代码

  Let ( [

  dateToProcess  = GetAsDate ( dateInput ) ;

  list = "星期日¶星期一¶星期二¶星期三¶星期四¶星期五¶星期六" ;

  list = Left ( list ; Position ( list ; dayRequested ; 1; 1 ) ) ;

  dayNumber = ValueCount ( list ) ;

  numAdjustment = DayOfWeek ( dateToProcess ) – dayNumber

  ] ;

  dateToProcess  - numAdjustment

  )

  )

  ```


  ## 总结


  本章涵盖了开发自己的自定义函数的基础知识，以及使它们成为递归函数的可能性。在下一章中，我们将探讨将*结构化查询语言*（SQL）与 `ExecuteSQL` 函数一起使用。




