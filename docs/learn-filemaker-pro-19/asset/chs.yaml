- "# 删除字段\n\n只需选中字段并点击`*删除*`按钮，即可从表中删除字段。系统会弹出一个警告对话框来确认删除请求。选中的字段会立即从列表中消失；然而，实际的删除操作要到您点击`确定`按钮关闭`*管理数据库*`对话框后才会执行。如果您操作有误，不希望保存删除更改，请点击`*取消*`按钮。FileMaker\
  \ 在清理布局中字段的引用方面做得相当不错。但是，您可能需要手动删除其他文件中布局上残留的任何`*<缺失字段>*`引用。脚本步骤或公式中对已删除字段的任何引用都需要手动移除或重新指定。\n\
  \n## 设置字段选项\n\n除了字段的`*名称*`、`*类型*`和`*注释*`属性外，根据字段类型的不同，还有许多可配置的选项。要编辑这些选项，请选中一个字段并点击`*选项*`按钮。\n\
  \n### 输入字段的选项\n\n所有输入字段都具有相似的选项，只是彼此之间略有差异。这些选项通过一个`*字段选项*`对话框进行控制，其设置分布在四个选项卡中：`*自动输入*`、`*验证*`、`*存储*`和`*假名*`。\n\
  \n#### 字段选项：自动输入\n\n`*输入字段选项*`对话框的`*自动输入选项*`选项卡（如图 [8-3] 所示）用于控制创建新记录或满足特定条件时自动输入到字段中的数据。\n\
  \n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig3_HTML.jpg](img/429700_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n输入字段选项对话框的“自动输入”选项卡\n\n**注意**\n\n虽然所有选项都是复选框控件，但前五个选项像单选按钮一样工作，只允许选择`*一个*`，因为它们会互相覆盖。\n\
  \n##### 自动将以下数据输入到此字段\n\n对于某些输入字段，其中一些设置可能会受到限制或禁用，具体取决于它们包含的特定数据类型。这些选项包括自动输入：\n\
  \n- `*创建*` – 在记录创建时选择一个要输入的值：`*日期*`、`*时间*`、`*时间戳*`、`*名称*`或`*账户名*`。\n- `*修改*` – 在记录被修改时选择一个要输入的值（选项与前述相同）。\n\
  - `*序列号*` – 在记录创建时或首次提交时输入一个序列化编号。该编号基于`*下一个值*`文本框中的值，并每次自动按`*增量*`中的值递增。\n- `*来自上次访问记录的值*`\
  \ – 将用户查看的上一条记录中同一字段的值输入到新记录中。\n- `*数据*` – 输入相邻文本框中的静态文本值。\n- `*计算值*` – 定义一个生成结果并输入到字段中的公式（第\
  \ [12] 章）。如果之前选项已存在值，或字段已包含用户先前输入的数据，则`*不要替换*`复选框将导致字段`*不*`计算该结果。\n- `*查找值*` – 从相关字段复制一个值。\n\
  \n**注意**\n\n设置为不替换现有值的计算值，在记录创建时计算一次，如果生成了值，则不会重新计算，包括在复制记录时也不会。\n\n##### 字段查找对话框\n\
  \n`*查找字段*`会在定义关系的关键字段更新后，立即自动从相关记录的特定字段复制一个值。此功能用于在本地放置一个来自相关记录的值副本，以便即使相关记录被删除，该副本仍然保留。此功能是关系型数据库出现之前的遗留产物，可能会在未来的版本中弃用。建议改用自动输入计算或直接在布局上放置相关字段。要配置查找，请在`*字段选项*`对话框的`*自动输入*`选项卡中勾选`*查找值*`复选框。这将打开一个`*字段查找*`对话框，如图\
  \ [8-4] 所示。\n\n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig4_HTML.jpg](img/429700_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n用于配置查找设置的对话框\n\n该对话框包含以下控件：\n\n1. `*起始表*` – 如果为其表存在多个表出现项（第 [9] 章），请选择一个表出现项作为正在定义字段的起始上下文。\n\
  2. `*从相关表查找*` – 选择一个与起始表相关的表，以确定将通过哪个关系通道复制字段值。\n3. `*从字段复制值*` – 从选定的查找表出现项中选择一个字段，该字段的值将在查找发生时复制到正在定义的字段中。\n\
  4. `*如果为空则不复制内容*` – 如果选定字段为空，则选择停止查找，保留任何现有值。\n5. `*如果未找到完全匹配项则*` – 选择在未找到相关记录时要执行的操作。\n\
  \n##### 禁止在数据输入期间修改值\n\n`*字段选项*`对话框`*自动输入*`选项卡底部的此复选框使该字段在数据层变为不可编辑，这`*独立于*`用户的安全设置或该字段在布局上的配置。在任何自动输入选项执行后，除非更改此设置，否则该字段的值将不可编辑。这对于主键和记录元数据等默认字段，或任何您希望在初始自动输入完成后为只读的其他输入字段非常有用。\n\
  \n#### 字段选项：验证\n\n`*输入字段选项*`对话框的`*验证*`选项卡（如图 [8-5] 所示）定义了该字段的输入要求，使数据库能够自动验证输入并强制执行规则。如果指定了一个或多个要求，FileMaker\
  \ 将验证输入到字段中的数据。当字段未通过验证检查时，用户会收到通知，并获得纠正措施的选择。\n\n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig5_HTML.jpg](img/429700_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n\n输入字段选项对话框的“验证”选项卡\n\n##### 验证控制\n\n`*验证*`选项卡顶部的选项用于控制何时验证输入，以及用户是否可以覆盖验证警告。选择`*始终*`以使字段在输入数据时以及导入到字段时进行验证，或选择`*仅限数据输入期间*`以`*仅*`在数据输入期间进行验证，而不在导入期间进行。\n\
  \n**注意**\n\n设置为始终验证的字段如果验证失败，将导致 FileMaker `*不*`导入该记录。这些失败将作为导入错误的总次数进行报告，且不提供任何额外细节！\n\
  \n勾选`*允许用户覆盖*`框以更改验证警告选项，如图 [8-6] 所示。当覆盖选项`*关闭*`时，警告对话框有两个按钮。`*还原字段*`按钮将撤消数据输入更改，恢复之前保存的值，而`确定`按钮将用户返回到未提交的记录，用户可以在其中编辑其输入以符合验证要求，然后再次尝试提交。当覆盖选项`*打开*`时，`*还原字段*`选项仍然存在，并新增了一条允许覆盖警告的消息。点击`否`按钮将用户返回到编辑未提交的记录，而点击`是`则忽略验证警告，接受输入的更改，并继续提交记录。\n\
  \n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig6_HTML.jpg](img/429700_2_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\n\n覆盖关闭（左）与覆盖开启（右）时的警告信息\n\n\n\n### 验证要求\n\n可对输入到字段中的数据施加以下验证要求：\n\n- **严格数据类型**\
  \ – 将值限制为以下选项之一：`仅数字`、`4 位年份日期` 或 `一天中的时间`。\n\n> **提示**：此处的 `4 位年份` 选项要求在 FileMaker\
  \ 执行自动转换*之前*输入完整年份，可用于避免该范围之外的日期发生意外转换。\n\n- **非空** – 要求在记录中输入值。\n\n- **唯一值** –\
  \ 要求输入的值在该字段中对于表中的*所有*记录都是唯一的。\n\n- **现有值** – 要求输入的值必须已存在于表中至少一条其他记录的相同字段中。\n\n\
  - **值列表成员** – 要求输入的值出现在指定的值列表中（第 11 章）。\n\n- **在范围内** – 要求输入的值位于指定的范围内，可以是文本、日期、时间或数值。\n\
  \n- **通过计算验证** – 允许使用自定义验证公式（第 12 章）。公式*必须*求值为 `true`（非零），输入才能通过验证测试。\n\n- **最大字符数**\
  \ – 要求输入的字符长度小于或等于指定的数字（仅适用于非容器字段）。\n\n- **最大千字节数** – 此选项替换了容器字段的前一个选项，指定可放入该字段的文件大小的上限。\n\
  \n### 验证失败时显示自定义消息\n\n当字段验证失败时，FileMaker 将生成一个对话框消息，如前文图 8-6 所示。默认消息将包含有关特定验证失败的详细信息，当对单个字段应用多个验证条件时，这会很有帮助。**显示自定义消息**\
  \ 选项允许为字段输入替代的自定义静态消息。\n\n### 探索验证替代方案\n\n一些开发者会谨慎使用 FileMaker 的验证选项，并更喜欢替代方案。许多数据输入错误可以预见，并使用\
  \ `自动输入计算` 公式*自动更正*，以清理和替换输入的值。例如，`GetAsNumber`、`Filter`、`Trim` 和 `Substitute` 函数可以自动移除在字段中键入的不良字符（第\
  \ 13 章）。通过使用**检查器**面板（第 19 章）中的**行为**设置，使 Return 键在布局上移动到下一个字段，可以防止段落回车符进入字段。当错误不容易避免或无法自动更正时，错误检测计算字段可以显示一个包含可检测验证错误的字段列表。这消除了一个突兀的对话框，并允许搜索/排序有错误的记录；但是，用户可以忽略它。分配给字段的\
  \ `OnObjectValidate` 脚本触发器（第 27 章）可以运行一个检查该字段是否存在可检测错误的脚本，并阻止用户退出该字段，直到错误被纠正。这允许使用更复杂的、由公式驱动的对话框消息来解释问题。`OnRecordCommit`\
  \ 脚本触发器可以在检测到的问题得到纠正之前，暂停提交记录。\n\n## 字段选项：存储\n\n**输入选项**对话框的**存储选项**选项卡，如图 8-7 所示，控制着信息在字段中的存储和索引方式。\n\
  \n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig7_HTML.jpg](img/429700_2_En_8_Fig7_HTML.jpg)\n\
  \n**图 8-7** – 输入字段选项对话框的存储选项卡\n\n### 全局存储\n\n一个*本地字段*在每条记录中作为自身的唯一实例复制，就像电子表格中的单元格，每条记录可以包含不同的值。放置在字段中的值被视为单条记录的*本地*值，它与任何其他记录上的相同字段是分开且不同的。本地字段只能从其父表或与该表相关的表的上下文中显示和访问。每个新定义的字段最初都是本地字段，但可以配置为全局字段。一个*全局字段*包含一个值，该值将在表中的每条记录之间共享，并且可以从数据库中的任何上下文中访问。使用电子表格类比，其中列代表已定义的字段，行代表一条记录，全局字段就像一列，该列的每个单元格中对于每一行都有相同的值，只不过从任何单个记录的角度来看，*只有一个相同的值*。\n\
  \n在**字段选项**对话框的**存储**选项卡中，**使用全局存储**复选框可将字段转换为使用全局存储。FileMaker 将弹出一个警告对话框，指示在更改时该字段内的现有值将丢失。一旦字段设定为全局，它可以用于多种特殊用途，包括：\n\
  \n- 存储一个固定值，该值对*任何*计算公式或布局都可用，无论上下文如何，例如，税率\n- 创建一个*控制字段*，例如选项菜单，如门户过滤或排序选项的弹出菜单\n\
  - 为脚本提供临时存储，以放置需要与其他计算字段交互的信息\n- 存储将在多个布局上以图标、品牌标识等形式显示的静态文本或图形\n- 存储打印报告标题或其他临时信息\n\
  \n在大多数情况下，全局变量更可取，因为它不会使字段定义列表变得臃肿。但是，它仅限于单个文件。添加到其他文件的表出现中的全局字段允许内容在文件之间全局共享，从而创建一个*解决方案全局变量*。\n\
  \n放入全局字段的值会从一个会话保留到下一个会话，*仅*当在 `FileMaker Pro` 桌面应用程序本地副本上打开的非托管数据库上输入时。当通过网络打开时，放入全局字段的值不会在会话之间保存，也不会在同时访问文件的用户之间共享。每次从服务器主机打开数据库时，该字段将包含桌面应用程序*本地*上次打开时输入的值。\n\
  \n> **提示**：在远古时代，开发者将全局字段用于多种功能，这些功能现在通过变量（第 12 和 25 章）、自定义函数（第 15 章）、合并变量（第 20\
  \ 章）和脚本参数（第 24 章）可以更好地管理。请谨慎使用全局字段！\n\n\n\n### 重复项\n\n`重复字段` 是一种定义为单个记录存储多个值的字段。无需为某种类型的每个附加值创建单独字段，而是可以定义一个字段来*重复*任意次数。例如，可以定义一个电话号码字段来存储多个号码，就像它们是独立的字段一样。任何类型的字段都可以设为重复。对于输入字段，请在“字段选项”对话框的“存储”选项卡提供的文本区域中输入所需的重复次数。对于*计算*字段，请在“指定公式”对话框中输入重复次数（第\
  \ 12 章）。当*摘要*字段所汇总的字段为重复字段，并且选择了“单独汇总重复项”选项时，该摘要字段也会变为重复字段（本章后文将介绍）。\n\n在“字段选项”对话框的“存储”选项卡中输入的*最大重复次数*定义了该字段可包含的独立值的数量。要允许用户输入到其中两个或更多重复项中，必须将该字段配置为在布局上重复（第\
  \ 19 章，“检查数据设置”）。使用重复字段时需要考虑几个影响，包括：\n\n* 重复字段在布局上永远无法滚动。\n* 稍后可以添加更多重复项，但布局上显示的数量必须手动调整以将其包含在内。\n\
  * *隐藏*功能（第 21 章，“隐藏对象”）会隐藏整个字段，包括布局上显示的所有重复项。\n* *查找*过程会搜索所有重复项，包括当前或任何布局上未显示的重复项。无法将查找限制为仅针对特定重复项。\n\
  * *排序*过程*仅*会查看第一个重复项。\n* 如果不使用*扩展*功能（第 12 章，“创建重复计算字段”），结合重复字段和非重复字段的计算可能无法正常工作。\n\
  * 自动输入计算仅在第一个重复项上有效。\n* 重复值在报表的子汇总部分（第 18 章）中可能无法正常工作，并且可能需要通过聚合函数（例如 *List*，第 13\
  \ 章）将其压缩为单个值。\n\n> **提示**  \n> 从历史上看，重复字段曾用于实现现在由门户提供的功能（第 20 章）。请谨慎使用此功能！\n\n"
- "# 索引\n\n`字段索引` 是根据非全局字段的内容自动生成的隐藏单词或值列表。此列表用于执行搜索、确定字段值的唯一性以及通过关系连接记录。字段索引的功能类似于书籍索引，可以快速分离各个术语，从而无需逐页浏览即可更快地定位它们。根据字段类型和所选选项，FileMaker\
  \ 使用两种索引。`值索引` 是根据字段中每个由段落回车符分隔的文本行创建的。它用于匹配相关记录以及在字段中搜索匹配的值。此处，可以将“值”视为一个段落。这主要用于关系，其中每个值用于在相关表中查找匹配项。`单词索引`\
  \ 是根据文本字段或文本计算字段中的每个唯一单词创建的，用于加快搜索速度。\n\n> **警告**  \n> 某些关系功能需要索引，并且索引能提高搜索性能。但是，它会增加数据库的文件大小，因此应有意识地使用。\n\
  \n“字段选项”对话框的“存储”选项卡中的索引选项包括：\n\n* **索引：无** – 完全阻止索引。适用于不需要快速搜索且不会用于建立关系的字段。同时，也用于使计算频繁重新计算。\n\
  * **索引：最小** – 仅为该字段创建值索引。\n* **索引：全部** – 为非文本字段创建值索引，为文本字段创建单词索引和值索引。\n* **根据需要自动创建索引**\
  \ – 允许 FileMaker 根据需要创建索引。例如，当用户对之前未建立索引的字段执行搜索时，它会自动将*无*切换为*全部*以生成并存储索引。\n* **默认语言**\
  \ – 指定在对文本字段中的值进行索引和排序时使用的语言。默认值与创建文件所在计算机的操作系统匹配。\n\n> **提示**  \n> 在某些情况下，您可能希望自定义索引设置以节省文件大小。但是，默认设置允许\
  \ FileMaker 根据用户和开发者的活动进行调整。\n\n### 容器存储选项\n\n容器字段无法建立索引，因此在编辑时，“字段选项”对话框的“存储”选项卡中不提供上述选项，而是显示“容器存储选项”（第\
  \ 10 章）。\n\n## 字段选项：注音\n\n“输入选项”对话框的“注音”选项卡用于指定输入到字段中的日语文本的语音翻译。有关日语函数的更多信息，请参阅\
  \ Claris 的文档网站。\n\n## 显示字段的选项\n\n*计算*和*摘要*字段的选项与输入字段不同。单击*选项*按钮或双击将打开一个针对特定字段类型的备选选项对话框。\n\
  \n对于计算字段，*选项*按钮会打开“指定计算”对话框，可以在其中输入公式，并配置结果数据类型、重复项、存储选项和求值上下文（第 12 章）。\n\n对于摘要字段，*选项*按钮会打开“摘要字段选项”对话框，用于指定摘要类型、目标字段等。所选*摘要类型*决定了将对选定字段在一组记录上执行何种摘要操作，以得出放入正在定义的字段中的值。可对一组记录中的字段执行的可用摘要操作包括：\n\
  \n* **总计** – 计算总值\n* **平均值** – 计算平均值\n* **计数** – 统计包含值的记录数量\n* **最小值** – 提取可用的最小值\n\
  * **最大值** – 提取可用的最大值\n* **标准差** – 计算所有值与平均值的标准差\n* **占总和的百分比** – 计算该字段值占总值的比率\n\
  * **列表** – 创建一个所有非空值的回车分隔列表\n\n\n\n#### 摘要字段选项对话框\n\n`摘要字段选项`对话框分为五个主要部分，如图 8-8\
  \ 所示。\n\n![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig8_HTML.jpg](img/429700_2_En_8_Fig8_HTML.jpg)\n\
  \n**图 8-8** 显示额外控件的摘要选项对话框\n\n**警告**\n\n以下选项提供了摘要设置的概述，在您看到构建了子摘要部分的复杂报表（请参阅第 18\
  \ 章“添加布局”）之前，它们可能显得过于抽象。\n\n该对话框包含以下控件：\n\n1.  **摘要类型** – 指定要使用的摘要类型（上一节已列出）。\n\
  2.  **可用字段** – 选择要从中提取并汇总数据的字段。该列表包含来自正在定义的字段所属表的相关字段。\n3.  **条件选项** – 根据所选的摘要类型，此区域将显示以下选项中的*零个*、*一个*或*两个*：`Running\
  \ total`、`Restart summary for each sorted group`、`Weighted average`、`Running count`、以及\
  \ `By population` 或 `Subtotaled`。\n4.  **汇总重复项** – 当选择了重复字段时，请指明如何处理重复项。选择 `Individually`\
  \ 可为每个重复项显示单独的摘要，从而使摘要字段也成为重复项。选择 `All together` 则将一个记录的所有重复项相加，并在摘要过程中将其视为单个值。\n\
  5.  **条件辅助字段选择** – 根据之前选择的选项，可能需要为以下某项辅助功能选择一个字段：\n   - **When Sorted by** – 某些操作允许在检测到新的排序值时重新开始摘要。这可以为单个找到的记录集中的多个子组创建摘要。例如，您可能希望使用此功能汇总\
  \ `每个员工的销售额` 或 `每个客户的收入`。当选择了 `Restart summary for each sorted group` 选项，或 `Fraction\
  \ of Total of` 摘要类型配合 `Subtotaled` 选项使用时，此选项适用于 `Total of` 或 `Count of` 摘要类型。\n\
  \   - **Weighted by** – 当使用 `Average of` 摘要类型并选择 `Weighted average` 选项时，可以选择一个用于加权计算结果的字段。\n\
  \n## 向示例数据库添加字段\n\n在上一章的结尾，我们向 `Learn FileMaker` 示例数据库添加了三个表：`Company`、`Contact`\
  \ 和 `Project`。现在，利用本章学到的知识，我们可以为每个表添加一些字段。虽然这些字段并非实际解决方案中这些表所需的完整列表，但它们提供了几个关键字段，以便我们继续探索构建数据库的过程。\n\
  \n### 定义公司字段\n\n在 `Company` 表中，创建以下字段：\n\n- `Company Name (text)`\n- `Company Description\
  \ (text)`\n- `Company Industry (text)`\n- `Company Website (text)`\n- `Company Status\
  \ (text)`\n\n### 定义联系人字段\n\n在 `Contact` 表中，创建以下字段：\n\n- `Contact Name First (text)`\n\
  - `Contact Name Last (text)`\n- `Contact Company ID (text)`\n- `Contact Address\
  \ Street (text)`\n- `Contact Address City (text)`\n- `Contact Address State (text)`\n\
  - `Contact Address Zip (number)`\n- `Contact Address Country (text)`\n\n### 定义项目字段\n\
  \n在 `Project` 表中，创建以下字段：\n\n- `Project Company ID (text)`\n- `Project Contact ID\
  \ (text)`\n- `Project Name (text)`\n- `Project Description (text)`\n- `Project Budget\
  \ (number)`\n- `Project Budget Summary (summary as a Total of the Project Budget\
  \ field)`\n\n### 重命名和修改默认字段\n\n为了遵循本书后续示例的操作，并积累修改字段定义的经验，请对所有表中的五个默认字段执行以下更改：\n\
  \n- 将 `PrimaryKey` 重命名为“Record ID”，并将其自动输入选项从“计算值”更改为以“000001”开头的“序列号”。\n- 将 `CreationTimestamp`\
  \ 重命名为“Record Creation Timestamp”。\n- 将 `CreatedBy` 重命名为“Record Creation User”。\n\
  - 将 `ModificationTimestamp` 重命名为“Record Modification Timestamp”。\n- 将 `ModifiedBy`\
  \ 重命名为“Record Modification User”。\n\n**提示**\n\n通过在一个表中完成这些操作，然后复制粘贴以替换其他表中的默认字段可以节省时间。\n\
  \n## 总结\n\n本章探讨了定义字段的基础知识。下一章，我们将重点转向在表之间建立关系连接。\n\n"
- '# 9. 建立关系


  *关系型数据库*允许在表之间定义连接，以便基于字段值自动关联单个记录。本章涵盖与关系相关的以下主题：


  - 关系介绍

  - 管理数据源

  - 管理数据库对话框介绍（关系）

  - 处理表出现项

  - 构建关系

  - 向关系图添加注释

  - 实现简单的关系模型




  '
- "# 引入关系\n\n*关系*定义了表之间的连接，形成双向通道的上下文，将一个表中的单个记录链接到另一个表中的一个或多个单个记录。作为现实世界现象的数字化模型，数据库使用`tables`来表示实体，`fields`来存储实体的属性，并使用`relationships`来反映这些实体如何连接或交互。\n\
  \n考虑一下公司与员工之间的关系如何在数据库中进行建模。每个实体可以由一个表表示：`Company`和`Contact`。在每个表中创建字段，用于存储对数据库工作重要的实体属性。例如，公司的`address`、`description`、`industry`、`name`和`website`可以作为字段。同样，联系人的`email`、`name`、`phones`和`title`也可以作为字段。接下来，观察这两个实体在现实中的关联方式，我们可以确定它们之间存在连接的需要。每个公司可能雇佣一个或多个人员，反之，每个人员通常受雇于一家公司。由此，我们可以在数据库中定义至少一个关系需求：每条`Contact`记录需要能够连接到一条`Company`记录。一个人可以链接为公司的员工，反之，一家公司可以有一个或多个人员被链接为员工。\n\
  \n数据库中创建的每个表都增加了更多连接的可能性。例如，公司可能需要链接到`inventory`、`projects`、`budgets`、`assets`和`procedures`，而联系人可能需要链接到`phones`、`emails`和`web\
  \ addresses`。随着数据库的增长，这些都意味着更多的连接。一个项目和预算可能需要链接到`tasks`、`timesheets`和`invoices`。所需连接将根据数据库的目的以及对象模型中包含的表类型而有所不同。当开发者决定需要将现实中发现的连接呈现在数字化对象模型中，并明确指定用于比较和匹配记录之间值的字段条件时，就定义了一个关系。\n\
  \n关系使得在相关表的记录之间创建可导航的链接成为可能。它们还在表之间创建了一个`relational context`，可由计算、布局和脚本使用，以访问或显示来自不同表的字段值。关系将一组孤立的表转化为一个互联的信息网络，可以通过多种方式动态访问、显示和操作。`Fields`在拉取相关值以执行查找、自动输入计算或验证时会使用关系（参见第\
  \ 8 章）。`Formulas`使用它们来访问或操作相关字段以计算结果（参见第 12 章）。`Layouts`可以显示来自相关记录的单个字段，或包括一个来自其他表的相关记录列表作为门户（参见第\
  \ 20 章）。布局对象可以在用于条件格式、占位符文本、脚本参数、工具提示和隐藏功能的计算公式中使用相关字段的值（参见第 21 章）。许多`script steps`在公式中或引用字段时会使用关系（参见第\
  \ 24 章和第 25 章）。用户在手动导出、导入、搜索和排序时，可以在对话框中选择来自相关表的字段。\n\n> **提示**  \n> 虽然大多数关系是在两个`不同`的表之间建立连接，但也可以将记录连接到`同一个`表中的其他记录，或者将记录连接到自身，这称为`自连接`。\n\
  \n## 可视化关系\n\n`匹配字段`是用于形成关系条件一方的任何字段。两个匹配字段与一个运算符配对，形成定义关系的单一条件。任何字段都可以用作匹配字段，尽管大多数关系使用键。`键字段`是唯一标识表中一条记录的字段。虽然许多字段都是候选，但键的良好选择是`既唯一又不变`的。例如，尽管`Contact`记录的电子邮件地址字段对个人是唯一的，但如果个人的工作发生变化或他们因个人账户更换了服务提供商，它可能会改变。这使其不适合作为关系键，因为更改会切断先前链接的记录之间的连接。因此，大多数开发者会建立一个字段，用于存储自动输入、匿名、递增、唯一且不变的标识号，并将其作为每个表的标准实践。这可以是一个简单的自动输入序列号（第\
  \ 8 章，\"字段选项：自动输入\"），或更复杂的通用唯一标识符（第 8 章，\"定义默认字段\"）。这些字段充当`主键`，主键字段包含一个值，用于标识该字段所在表中同一表的记录。例如，`Company`表中的`Record\
  \ ID`字段存储了标识特定公司记录的主键，例如\"1105\"代表 Widgets Manufacturing。当一个主键被放入另一个表中用于标识该表中的记录以形成关系时，它被称为`外键`，因为它标识的是所在表外部的记录。主键字段和外键字段共同构成了大多数关系的基础。由于这些通常创建层级关系，所以常常被称为`父子连接`，如图\
  \ 9-1 所示。在此示例中，`Record ID`是`Company`的主键，而`Contact`表中的`Contact Company ID`字段包含一个外键。当两个字段中的值相等时，就在两条记录之间形成了关系链接。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig1_HTML.jpg](img/429700_2_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1** 单个键字段对形成关系的示意图\n\n每个关系必须包含至少一组匹配字段，但可以包含附加条件。当定义了多对匹配字段时，记录仅在`所有`条件都匹配时才会链接。图\
  \ 9-2 所示的示例展示了另一组字段：`Company`中的`Company Contact Portal Filter`和`Contact`中的`Contact\
  \ Address State`。这些第二匹配字段允许查看公司记录的用户从列表中选择一个州，该州将用于“筛选”门户视图中的联系人列表，使其仅显示地址在该州的联系人（参见第\
  \ 20 章，“筛选门户记录”）。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig2_HTML.jpg](img/429700_2_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2** 由两个匹配字段建立的关系示意图\n\n关系可分为三大类，根据每一侧可能匹配的记录数量命名：`一对一`、`一对多`和`多对多`。FileMaker\
  \ 有一个独特的`多键选项`，可用于创建一对多或多对多连接。这些配置可以在字段验证级别和/或通过物理限制可选定或插入到键字段中的内容的接口机制来强制执行。另一个选项是`笛卡尔连接`，它将一个表中的每条记录与另一个表中的每条记录相关联。这些可以在关系设置级别使用运算符进行设置。\n\
  \n\n\n"
- '# 一对一关系


  一对一关系是一种连接，其中一个表中的一条记录只能与另一个表中的一条记录匹配。图 9-3 中的示例展示了一组匹配的记录，其中`Contact`记录的主`Record
  ID`作为外键输入到`Cubicle`记录的`Contact ID`字段中。分配的方向性是可选的，因为对于哪个实体是主实体、哪个是次实体没有固有要求。作为开发者，你可以选择*要么*如图所示将隔间分配给人员，*要么*将人员分配给隔间，具体取决于你的偏好或其他后勤考虑。设置要求对两个键字段进行验证，以确保其包含在各自表中的所有记录中唯一的值。因此，在所示的示例中，每个联系人只能分配一个隔间，且每个隔间只能分配一个联系人。


  ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig3_HTML.jpg](img/429700_2_En_9_Fig3_HTML.jpg)


  图 9-3 展示一对一连接


  '
- '# 一对多关系


  一对多关系是一种连接，其中一个表中的一条记录可以与另一个表中的一条或多条记录匹配。图 9-4 中的示例展示了一组匹配的记录，其中`Company`的主`Record
  ID`作为外键输入到`Contact`表中两条记录的`Contact Company ID`字段中。这种关系类型经常使用，因为现实世界中存在许多一个实体可以与多个实体关联的情况。一家公司可能有多个办事处、产品和员工。一个人可能有多个电话号码、电子邮件地址和网页。一个父母可以有多个孩子。最后一个例子正是这种安排常被比喻性地称为*父子*类型关系的原因，因为从生物学角度，一个孩子只有一个父亲或一个母亲，但任何一个父母都可以有多个孩子。设置要求对主键字段进行验证，以确保其包含单一、唯一的值，而另一个表中的外键字段允许非唯一值。分配的方向性取决于这样一个事实：多的一方必须包含来自具有唯一主键的表的那个外键。


  ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig4_HTML.jpg](img/429700_2_En_9_Fig4_HTML.jpg)


  图 9-4 展示一对多连接


  '
- '# 多对多关系


  多对多关系是一种连接，其中*两个表*上的记录都可以与来自另一个表的一条或多条记录连接。这通常通过使用联接表来实现。*联接表*是第三个表，主要作为连接点，在两个相关表之间进行连接转换。因此，它们有时被称为*连接表*。一个联接表至少包含*两个外键字段*，每个字段包含来自被联接的两个表中一个表的主键。图
  9-5 中的示例展示了使用联接表的这种关系。`Table 1`和`Table 2`的主键分别输入到联接表一条记录的外键字段中，从而在两个表之间建立连接。


  ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig5_HTML.jpg](img/429700_2_En_9_Fig5_HTML.jpg)


  图 9-5 展示通过联接表实现的多对多连接


  多对多关系的一个示例是，当需要将一个人与其*当前*雇主连接起来，同时保持与其*过去*雇主的连接时，在公司和联系人之间建立连接，如图 9-6 所示。在此示例中，`Company`表和`Contact`表通过一个名为`Contact
  Employer`的联接表连接。“Widgets Manufacturing”的`Company`记录连接到两个联接记录，每个联接记录又连接到一个联系人记录，一个给
  Jim，一个给 Karen。而 Jim 的记录只与一个联接记录有单一连接，Karen 的`Contact`记录则连接回两家公司：“Widgets Manufacturing”和“Zen
  Historical Artifacts”。使用联接表允许任一侧的记录链接到另一侧的任意数量的记录。


  ![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig6_HTML.jpg](img/429700_2_En_9_Fig6_HTML.jpg)


  图 9-6 展示多对多关系中的连接


  严格来说，联接表并不是一个*单一*关系，因为它实际上由两个一对多关系组成。然而，它通常被称为*一个关系*，特别是当联接表仅用于促进两个普通表之间更广泛的连接时。在这种情况下，联接表只包含这两个字段，并且完全隐藏于视图中，没有用户可访问的界面。但是，联接*可以*包含特定于这两个实体联合的额外字段。例如，某个特定公司的联系人的电话号码和电子邮件地址可以存储在联接表记录中。它们还可以根据需要拥有界面，甚至与其它表连接。


  '
- "# FileMaker 独特的多键选项\n\nFileMaker 具有使用包含多个值的键字段来定义关系的独特能力。*多键字段*是一个文本或计算字段，包含一个由回车符分隔的键列表，用作关系中的匹配字段。当匹配字段包含由回车符分隔的值时，每个段落都被视为其自己的值并用于形成匹配，因此一个字段中的*任何*一个值如果能在另一个字段中找到，就会匹配并形成关系连接。多键字段可用于创建一对多关系或多对多关系，*无需*借助中间的联接表。图\
  \ 9-7 中的示例通过展示两个表之间使用多键字段作为两侧匹配字段的连接，演示了这种技术。`Table 1`第一条记录中的字段在`Table 2`中找到了*三个*匹配的记录，尽管没有一个字段包含所有相同的值。当至少一个段落值在两侧都存在时，就会形成匹配。设置多键多对多关系要求匹配字段是允许包含多个值且不需要验证唯一值的文本字段（或返回文本值的计算字段）。虽然此示例使用了州名，但任何值，包括序列号，都可以使用。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig7_HTML.jpg](img/429700_2_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7 多键字段关系连接的插图\n\n这种技术有利有弊。例如，没有像联接表那样的交叉表可以在其中添加字段或构建布局，因此如果需要这样做，这不是一个好的选择。然而，在复制记录时，由于键存储在本地而不是单独的联接表中，关系连接会得以保留。因此，如果复制图\
  \ 9-7 中`Table 1`的第一条记录，它将保留与另一个表中记录的所有相同连接。\n\n\n\n### 索引匹配字段\n\n关系形成一条双向通道，允许任一表作为本地*起始上下文*（父表），供公式和布局以此定位另一相关表（子表）作为目标。然而，要使连接产生结果，*目标（子）表中使用的每个匹配字段必须被索引或为全局字段*。由于计算字段在其公式包含相关字段时无法被索引，因此目标侧的计算匹配字段必须仅包含该表本地的字段。全局字段无法被索引，但仍可在关系的任意一侧工作。不过，它们只在本地（父表）侧真正实用，因为在目标（子表）侧使用时，它们会匹配每条记录。\n\
  \n### 使用表出现项\n\n关系实际上连接的是表的抽象表示，而非直接连接表。在 FileMaker 中，*表出现项* 是表的一个代表实例，放置在一个称为*关系图*的图形工作表中。虽然表在技术上是相连的，但这是通过表的特定出现实例完成的。这避免了表之间的循环连接，并允许基于不同条件在同一对表之间建立多个连接。它甚至允许表与自身之间的*自连接*。\n\
  \n每个表都会在关系图中自动以一个默认的表出现项表示。尽管这看起来并且可以被视为表本身，但它只是表的一个*出现项*。随着数据库的增长，涉及同一表的多个连接变得必要，但有形成循环的风险，如图\
  \ 9-8（左图）所示。在这里，*公司-联系人* 和 *公司-项目* 之间的连接是标准的一对多关系，不会造成问题。然而，当需要 *联系人-项目* 连接时，它会在三个表之间形成一个整体循环连接，这是被禁止的。为了解决这个问题，创建了一个新的\
  \ *联系人* 表出现项，用于建立新关系（右图）。两个联系人实例代表的是*同一张表*，但来自*不同的关系上下文*。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig8_HTML.jpg](img/429700_2_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\n循环连接（左图）通过新出现项得到解决（右图）\n\n上下文是 FileMaker 中一个极其重要的概念。虽然*表*是一个独立的数据结构，用于在字段和记录中定义和存储信息，但*表出现项*指定了来自特定*关系上下文*的数据，并用于控制从给定视角可访问哪些表。计算字段的公式在一个上下文中运行，如果该字段的父表有多个出现项，则必须选择该上下文。值列表可以配置为仅筛选来自特定起始界面上下文中出现项的字段值（第\
  \ 11 章）。每个布局都需要分配一个出现项，该出现项控制可显示的字段，并为对象公式建立上下文。许多脚本步骤会根据执行时当前窗口中活动布局所分配的出现项，自动从*用户上下文*执行。\n\
  \n随着更多出现项的添加，它们可以串联成序列。在前面的示例中，从 *公司* 到 *项目* 再到 *联系人-2* 有一条连接。出现项之间的每一步通常被称为一个“跳”，指从起始出现项到目标出现项的步骤数。计算、布局或脚本步骤可以沿着单个关系链通过任意数量的跳来访问字段，但跨越太多跳可能会产生问题。在前面的示例中，*公司*\
  \ 中的公式可以访问 *联系人-2* 中的字段，但*仅限*于第一个相关的 *项目* 记录，因为它必须通过那个关系通道。另一种更直接的路径，即直接连接到 *公司*\
  \ 出现项的其他 *联系人* 出现项，则可以访问所有公司联系人。\n\n随着关系模型复杂性的增加，它可能迅速变成一团混乱的单体结构，既令人困惑又存在技术风险。经验较少的开发者倾向于迅速将越来越多的出现项连接成一个巨大的多分支出现项链，这种单一整体被称为*轮毂-辐条式单体*。相反，推荐的方法是构建多个独立的*表出现项组*。鉴于数据库开发中到处都依赖于关系上下文，更好地理解这两种方法可以决定你是创建一个高效的系统，还是制造一个庞大的烂摊子。\n\
  \n警告\n\n这些关于关系模型的讨论可能让初学者感到不知所措，尤其是在创建布局之前。然而，为避免后期出现错误，付出这些努力是值得的。\n\n\n\n### 避免中心辐射式单体\n\
  \n*中心辐射式单体*是一种关系模型，其中所有表实例被连接成一个庞大的互联组，如图 9-9 所示。这种结构往往是大多数新手开发者直觉上默认采用的。他们一开始只连接少数几个默认的表实例。随后，当他们试图添加会导致循环的新关系时，`FileMaker`会提示他们创建新的实例，而他们则会保留带有数字后缀的默认表名。很快，他们就会拥有几十甚至上百个命名不当的实例，相互连接成一个庞大的组。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig9_HTML.jpg](img/429700_2_En_9_Fig9_HTML.jpg)\n\
  \n**图 9-9** 中心辐射式单体关系模型示意图\n\n虽然这本身并非必然有问题，对于简单的数据库来说甚至是一种可行的选择，但仍有充分的理由完全避免中心辐射式模型。在这种模型中，很难判断哪些实例已被使用或应被用作起始上下文，结果导致成百上千的计算、界面和脚本在整个结构中迂回曲折，造成概念上的僵局。很快，要跟踪哪个实例匹配特定的上下文就变得令人困惑，例如，在公式中试图从`Contact-1`、`Contact-2`、`Contact-3`和`Contact-4`中做出选择，就需要耗时的侦查工作。当一个布局最初被分配了错误的上下文，只有在放置了数十个需要重新配置的对象之后才发现时，就需要进行错误的启动和回溯修正。添加新功能开始变得像是一项乏味的苦差事，而要概念化整个结构则需要巨大的努力。随着复杂结构的束缚越来越紧，令人麻木的混乱只是开始。一个微小的疏忽就可能导致数据丢失，例如脚本从错误的上下文执行函数，或者由于开发者疲劳导致的界面错误，用户通过错误的关系在字段中输入数据。计算跨越过多跳数向各个方向延伸，开始使简单任务变得异常缓慢，并可能返回错误的结果。最终，当用户难以忍受极度缓慢的性能，甚至可能遇到随机应用程序崩溃时，技术问题就会出现。将问题归咎于技术的诱惑变得难以抗拒，但这实际上是经验不足的开发者选择了糟糕结构设计的错误。\n\
  \n专业的开发者明白，一个设计良好的关系模型对于技术原因和保护自身理性都*至关重要*。数据库是众多组件的复杂集成，正如*界面设计*对于避免用户混淆很重要一样，在*结构设计*方法上也应给予同等的关注，以避免开发者混淆和功能故障。中心辐射式模型的许多问题可以通过有意识地改进实践来缓解。例如，清晰地命名实例，并制定规则确定哪些实例将被用作计算和布局的起始上下文，这会有所帮助。限制公式从给定上下文向外延伸一到两跳也有帮助。但这些技术仍然需要额外的工作来设置，并有意识地努力遵守。最终，最好的解决方案是*完全避免这种模型，转而使用实例组*！\n\
  \n### 采用表实例组\n\n*表实例组*关系模型为每个表建立一个*主表实例*，并规定这些实例*永远*不直接相互连接。两个表之间的任何连接*必须*通过从一个主实例连接到一个新的表的*次实例*来建立，以避免主实例之间的任何直接连接。这也被称为*锚-浮标*模型，因为每个主实例充当一个独立的锚点，相关的次实例可以附着在其上，并被视为从该锚点漂浮出去。在图\
  \ 9-10 所示的设置中，一列主表（灰色）独立地矗立在左侧。每个连接到这些主表的次表（透明）都是主表的副本。使用此模型并遵循一些规则，可以解决中心辐射式方法中发现的大部分混乱和潜在的技术复杂性。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig10_HTML.jpg](img/429700_2_En_9_Fig10_HTML.jpg)\n\
  \n**图 9-10** 表实例组关系模型示意图\n\n左侧的每个主实例为一个*实例上下文组*建立了基础锚点。这些实例应以实际表名命名，以明确它们代表主根实例，例如`Company`、`Contact`、`Project`等。在构建界面时，只应将这些主实例用作计算字段和布局的上下文。组之间的物理隔离限制了字段或界面公式可以访问相关字段的距离和方向，因为它们被限制在其小型“岛屿”组内的相关次实例中。\n\
  \n每个次实例从主实例向右“漂浮”。这些实例的命名方式应能指示它们所连接的起始上下文组，并包含关于它们如何关联回该组根主实例的路径信息。这可以采用多种形式，但理想情况下以主实例的名称开头，后跟一个表示跳转到新实例的分隔符，然后是次实例表的名称。例如，一个连接到主`Company`实例的次`Contact`实例可以命名为`Company\
  \ | Contact`。名称的次实例部分可以包含用于标识关系性质的额外信息，例如`Company | Contact Employees`表示此`Contact`实例用于公司上下文，并关联到作为公司员工的联系人。\n\
  \n> **提示**  \n> 考虑将表名部分大写以作强调。`Company | CONTACT`清楚地表明该实例起始于`Company`，但实际上是`Contacts`表的一个实例。\n\
  \n这里的“次级”命名法并非指与主实例的*距离*，而是表示那些*非主实例*的分类状态。因此，任何距离主实例任意跳数的实例都称为次实例。例如，一个`Phone Number`表的实例可能连接到一个次`Contact`实例，而该次`Contact`实例又连接到主`Company`实例，如图\
  \ 9-11 所示。它是链条中的第三个实例，距离主实例有两跳，但仍然被称为“次”实例，以表明两者均非主状态。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig11_HTML.jpg](img/429700_2_En_9_Fig11_HTML.jpg)\n\
  \n**图 9-11** 从主实例延伸出两个次实例的示例\n\n> **提示**  \n> 虽然次实例可以进一步延伸，但如果可能，最好将每个分支限制在大约两到三跳。\n\
  \n\n\n为了说明这一设置，考虑两个分别锚定到`Company`和`Contact`表的上下文组，如图 9-12 所示。主要的`Company`表出现将用作每个公司计算和布局的上下文。连接到它的三个表可以在公式（第\
  \ 12 章）中使用，并用于在布局上定义门户（第 20 章），以访问相关的`Contact`、`Project`和`Invoice`记录。如果联系人门户需要显示联系人的电话号码，或者计算或脚本需要从`Company`的上下文中访问该信息，则添加从`Company`出发、相距两个跳转的`Phone`表出现。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig12_HTML.jpg](img/429700_2_En_9_Fig12_HTML.jpg)\n\
  \n**图 9-12** 两个假设的表出现组示意图\n\n类似地，主要的`Contact`表出现将用作每个联系人计算字段和布局的上下文。附属的`Company`表出现可用于在布局上显示联系人的雇主名称，并被脚本用于从联系人记录导航到其相关的父公司。`Phone`和`Letter`表出现可以为联系人布局上的门户提供上下文。\n\
  \n使用表出现组方法将导致关系图中存在一些冗余，并且最初可能看起来违反直觉，因为它似乎不必要地增加了表出现的数量。然而，如果实施得当，其好处最终会显现，您会庆幸花时间实施了它。*组之间的分离*简化了性能，并使在概念上导航结构变得更加容易。将所有公式和布局限制在一个主要的表出现起始上下文，使得更容易达到目标并避免混淆。一种包含从主要上下文开始的路径的命名方案，使得表出现组在整个开发界面的选择菜单中保持排序，从而同步有序的关系结构到列表中，并使目标表的选择更加容易。\n\
  \n### 规划学习 FileMaker 关系对象模型\n\n在本章剩余课程之后，我们将遵循表出现组方法，在`Learn FileMaker`数据库中设置三个简单的表出现组，如图\
  \ 9-13 所示。左侧的三个主要表出现将用作任何计算公式和布局的上下文，而右侧的次要表出现可用于创建计算、门户和脚本。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig13_HTML.jpg](img/429700_2_En_9_Fig13_HTML.jpg)\n\
  \n**图 9-13** Learn FileMaker 数据库中表出现计划\n\n## 管理数据源\n\n*数据源*是对其他 FileMaker 和 ODBC\
  \ 数据库的已定义引用。当构建一个不访问外部表的自包含数据库时，无需定义数据源，因为隐含的源始终是当前文件。但是，当创建多文件数据库或集成 ODBC 表（第 7\
  \ 章）时，将需要额外的数据源。\n\n### 介绍管理外部数据源对话框\n\n外部数据源在*管理外部数据源*对话框中创建、编辑和删除，如图 9-14 所示。可以通过选择`文件\
  \ ➤ 管理 ➤ 外部数据源`菜单访问此对话框。在开发界面各处出现的*指定表*对话框上的*数据源*弹出菜单底部也可以访问它。打开后，点击*新建*以打开*编辑数据源*对话框，并定义与外部数据源的新连接。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig14_HTML.jpg](img/429700_2_En_9_Fig14_HTML.jpg)\n\
  \n**图 9-14** 用于管理外部数据源的对话框\n\n### 探索编辑数据源对话框\n\n创建或编辑数据源在*编辑数据源*对话框中执行，如图 9-15 所示。此对话框从*管理外部数据源*对话框中通过点击*新建*、选择一个数据源并点击*编辑*，或直接双击列表中的数据源来打开。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig15_HTML.jpg](img/429700_2_En_9_Fig15_HTML.jpg)\n\
  \n**图 9-15** 用于编辑所选数据源的对话框\n\n*名称*用于在整个开发界面的菜单中标识该源。*类型*选项根据目标数据源提供两种选择，并根据所选内容更改界面。本节剩余部分假定选择了*FileMaker*。*文件路径列表*用于指定指向目标数据源的一个或多个路径（第\
  \ 24 章，“指定文件路径”）。FileMaker 将连接到指向现有数据库文件的第一个路径。点击*添加文件*为所选文件自动添加路径，或手动输入一个。有关配置*ODBC*类型数据源的详细信息，请参阅第\
  \ 7 章，“从 ODBC 数据源添加表。”\n\n## 介绍管理数据库对话框（关系）\n\n与表和字段类似，表出现和关系在*管理数据库*对话框中创建。选择`文件\
  \ ➤ 管理 ➤ 数据库`打开对话框，并确保选中*关系*选项卡，如图 9-16 所示。可滚动的白色区域是*关系图*，其中添加表出现并相互连接以定义关系。每个表应该已经存在于图中，但没有连接它们的关系。下方的按钮行用于在图区域内执行各种任务。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig16_HTML.jpg](img/429700_2_En_9_Fig16_HTML.jpg)\n\
  \n**图 9-16** 用于管理关系的对话框\n\n## 处理表出现\n\n*表出现*是关系图中显示的数据库表实例的图形表示。在定义表出现之间的关系之前，让我们回顾一下*选择*、*交互*、*排列*、*查看*、*格式化*、*编辑*、*添加*和*删除*表出现的基础知识。\n\
  \n\n\n### 选择表事件\n\n选中的表事件将以蓝色阴影边框高亮显示，其大小、位置和格式均可修改。在启用*对象选择光标*后，可通过多种不同方法选择表事件，如图\
  \ 9-17 所示。要选择单个表事件，请在关系图中直接单击它。要选择多个不连续的表事件，请按住`Shift`键，然后单击每个目标表事件。在按住该键的同时，再次单击先前选中的表事件将取消选择。要选择聚集在同一组中的多个表事件，请单击背景，然后按住并拖动，直到选择矩形框住目标表事件。选择框触及的每个表事件都将被选中。按住`Command`（macOS）或`Windows`（Windows）键拖动，则仅选择*完全*位于选择框边界内的表事件。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig17_HTML.jpg](img/429700_2_En_9_Fig17_HTML.jpg)\n\
  \n图 9-17\n\n用于选择并操作表事件的光标工具\n\n当处理大量表事件时，在*选择表*工具下打开的菜单（如图 9-18 所示）提供两个选项，帮助定位特定实例。*选择\
  \ 1 层相关表*选项会自动选择与所选表事件*直接相关*的每个表事件。*选择具有相同源表的表*功能会选择与所选表事件共享*相同源表*的每个表事件，这在复杂关系图中查找某个表的其他实例时很有帮助。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig18_HTML.jpg](img/429700_2_En_9_Fig18_HTML.jpg)\n\
  \n图 9-18\n\n用于选择相似表的工具\n\n### 与表事件交互\n\n选中光标工具后，可以移动、折叠、展开、调整大小以及在图 9-19 中高亮显示的点上滚动表事件框。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig19_HTML.jpg](img/429700_2_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19\n\n折叠（顶部）和展开（底部）时的表事件操作点\n\n1.  单击并按住表事件的*标题*可以拖动该框，并在关系图中重新定位。将光标悬停在箭头图标上可显示信息丰富的元数据弹出窗口。\n\
  \n2.  标题右侧是一个展开切换按钮图标。单击一次可在三种状态之间切换表事件的状态。没有任何关联关系时，单击一次折叠该框，再次单击则展开。存在关联关系时，中间状态会半折叠，仅显示用于与其他表事件形成关系的匹配字段（未显示）。\n\
  \n3.  拖动侧边和底部的细条可分别调整宽度或高度。\n\n4.  拖动底角可根据方向调整宽度和/或高度。\n\n5.  完全展开后，出现在顶部、底部或两端的箭头图标用于向上或向下滚动字段列表。单击一次将逐字段向上或向下移动；按住则会持续滚动列表，直到松开为止。\n\
  \n在*Learn FileMaker*文件中练习，将所有表事件折叠并按顺序上下排列，使其大致排成垂直堆叠状，如图 9-20 所示。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig20_HTML.jpg](img/429700_2_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20\n\n四个表事件折叠后排列成堆叠状\n\n### 排列和调整表事件大小\n\n*排列*工具用于根据这四个图标下隐藏菜单中的选项（如图 9-21\
  \ 所示）来对齐和调整所选表事件组的大小：\n\n1.  按*左边缘*、*中心*或*右边缘*水平对齐。\n\n2.  按*顶部边缘*、*中间*或*底部边缘*垂直对齐。\n\
  \n3.  *水平*或*垂直*均匀分布。\n\n4.  将*宽度*、*高度*或两者调整为*最小*或*最大*。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig21_HTML.jpg](img/429700_2_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21\n\n排列工具包含用于排列和调整表事件大小的菜单\n\n### 查看选项\n\n*工具*部分包含四个控件，用于调整关系图的缩放倍率，如图 9-22\
  \ 所示：\n\n1.  *调整缩放倍率* – 调整缩放倍率，使所有表事件均适合视图，无需滚动。\n\n2.  *放大* – 单击激活，然后在关系图中单击可将缩放倍率增加\
  \ 25%。\n\n3.  *缩小* – 单击激活，然后在关系图中单击可将缩放倍率减少 25%。\n\n4.  *百分比* – 手动设置缩放百分比，范围为 1\
  \ 到 400。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig22_HTML.jpg](img/429700_2_En_9_Fig22_HTML.jpg)\n\
  \n图 9-22\n\n用于调整关系图缩放倍率的工具\n\n### 格式化表事件\n\n表事件唯一的*格式化*工具是颜色菜单，可通过单击*表/关系*部分中*删除图标*右侧的颜色工具访问。颜色编码可通过多种方式用于对表事件进行视觉分组。可将一种颜色应用于所有主表事件，将另一种颜色应用于辅助表事件，或为每个事件组应用一种颜色。颜色可以指示用于将辅助表事件连接到主表事件的操作符类型，或者颜色可以表示表事件的功能，例如，一种颜色用于用作子门户的表事件，另一种颜色用于父表等。颜色还可用于指示每个表事件的开发状态，例如，高亮显示正在处理或已弃用的表事件。无论选择哪种具体方案，为表事件着色都有助于在视觉上导航复杂的关系图。\n\
  \n### 编辑表事件\n\n表事件使用*指定表*对话框进行编辑。双击某个表事件，或选择一个表事件并单击*编辑选择*按钮图标（如图 9-23 所示），即可打开此对话框。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig23_HTML.jpg](img/429700_2_En_9_Fig23_HTML.jpg)\n\
  \n图 9-23\n\n用于编辑现有表事件的工具\n\n#### 介绍指定表对话框\n\n在*指定表*对话框中（如图 9-24 所示），可以修改表事件的*数据源*、*表*和名称。选择不同的表时，名称将始终更新为该表的名称，除非在打开对话框后编辑过名称。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig24_HTML.jpg](img/429700_2_En_9_Fig24_HTML.jpg)\n\
  \n图 9-24\n\n用于指定分配给表事件的表的对话框\n\n### 添加表事件\n\n可以为当前文件中定义的任何数据源中的任何表向关系图添加表事件。可以通过*创建新表事件*或*复制现有表事件*来实现。\n\
  \n\n\n### 创建新表事件\n\n要创建新的表事件，首先点击“添加表”按钮图标，如图 9-25 所示。这将打开之前介绍的“指定表”对话框。如果所需添加的表位于其他文件中，可选择相应的数据源。创建事件后，可以根据需要调整其大小和位置。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig25_HTML.jpg](img/429700_2_En_9_Fig25_HTML.jpg)\n\
  \n图 9-25\n\n用于添加新表事件的工具\n\n### 复制现有事件\n\n要复制选中的事件，请点击“复制表”按钮图标，如图 9-26 所示。复制现有事件而非新建事件有很多好处。如果目标表已存在对应事件，复制它可省去手动分配表的步骤。复制件还会保留原件的尺寸和格式，从而节省修改新事件默认样式所需的时间。复制一组相关联的事件将保留它们之间的所有关系连接。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig26_HTML.jpg](img/429700_2_En_9_Fig26_HTML.jpg)\n\
  \n图 9-26\n\n用于复制现有事件的工具\n\n### 删除事件\n\n可以通过选中表事件后按 `Delete` 键，或点击如图 9-27 所示的“删除”工具来删除表事件。请注意，这只会删除表的*事件*，而*不会*删除实际的*表*。不过，任何将该事件作为上下文使用的资源都会受到删除操作的影响。因此，在删除已分配或引用了该事件的布局和脚本后，可能需要对其进行更新。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig27_HTML.jpg](img/429700_2_En_9_Fig27_HTML.jpg)\n\
  \n图 9-27\n\n用于删除现有事件的工具\n\n### 打印关系图\n\n如图 9-28 所示的“页面”工具提供了对*分页符*和*页面设置*的控制，用于准备打印关系图。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig28_HTML.jpg](img/429700_2_En_9_Fig28_HTML.jpg)\n\
  \n图 9-28\n\n用于准备打印关系图的工具\n\n## 构建关系\n\n当图中有事件存在后，可以将它们连接起来以定义关系。\n\n### 添加关系\n\n\
  当两个事件之间建立连接时，即形成关系。可以通过拖拽两个事件之间的连接，或使用“添加关系”按钮来实现。\n\n#### 在事件之间拖拽连接\n\n在两个事件之间创建连接最直观的方法是使用光标，从一个事件的字段拖拽到另一个事件的字段，从而基于这两个匹配字段建立关系。首先，在图中找到要连接的两个事件，点击它们右上角的图标，直至完全展开。滚动列表，使关系的目标匹配字段位于每个列表的可见区域内。按住一个事件中的匹配字段并拖动。当开始向另一个事件拖动光标时，会有一条线连接到第一个匹配字段，如图\
  \ 9-29 所示。一旦光标悬停在另一个事件的目标匹配字段上，松开鼠标，连接线便建立完毕。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig29_HTML.jpg](img/429700_2_En_9_Fig29_HTML.jpg)\n\
  \n图 9-29\n\n在事件之间拖拽新的关系连接\n\n提示\n\n通过快速拖拽*任意*两个当前可见字段之间的连接，可以节省时间。随后再编辑关系（稍后介绍），并在对话框更大、更易滚动的列表中选择所需字段。\n\
  \n#### 使用添加关系按钮\n\n创建新关系的另一种方法是点击工具栏中的“添加关系”按钮，如图 9-30 所示。点击此按钮将打开一个空的“编辑关系”对话框（本章稍后讨论），其中两个表均设置为\
  \ `<unknown>`。由于连接为空，必须手动选择事件和匹配字段。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig30_HTML.jpg](img/429700_2_En_9_Fig30_HTML.jpg)\n\
  \n图 9-30\n\n用于创建空关系的工具\n\n### 操作关系\n\n*关系*在图中由一条连接两个事件的线表示，中间有一个选择框，如图 9-31 所示。该框会显示用于匹配两个字段的运算符，默认是等号。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig31_HTML.jpg](img/429700_2_En_9_Fig31_HTML.jpg)\n\
  \n图 9-31\n\n带有中间选择框的关系线\n\n在线与事件相连的两端，会显示关系类型的指示符，如图 9-32 的放大图所示。直线（如左侧所示）表示*一*端，右侧的“乌鸦脚”表示*多*端。因此，在此示例中，从*公司*到*联系人*存在一个*一对多关系*连接。FileMaker\
  \ 仅通过查看字段的自动输入设置来确定此信息。由于*公司*表中的 `Record ID` 字段被配置为为每条记录自动输入唯一的序列 ID，因此它显示为一端。而另一端的字段没有限制，因此假定为多端。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig32_HTML.jpg](img/429700_2_En_9_Fig32_HTML.jpg)\n\
  \n图 9-32\n\n线端符号表示每侧连接的类型\n\n警告\n\n线端指示符仅反映字段定义的限制，不反映布局或脚本函数中的输入选项。\n\n移动事件时，无论一个框相对于另一个框的位置如何，关系线都会保持两侧连接。当移动一个框足够远时，线会分成三段直线转折段，如图\
  \ 9-33 所示。当框被移动到足够远时，线会自动跳到事件框的另一侧以保持连接。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig33_HTML.jpg](img/429700_2_En_9_Fig33_HTML.jpg)\n\
  \n图 9-33\n\n移动事件时，线会分成直线段\n\n\n\n"
- "# 编辑关系对话框简介\n\n关系在**编辑关系**对话框中进行编辑，如图 9-34 所示。可以通过双击关系连接框或选中关系后点击**编辑选择**工具来打开此对话框。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig34_HTML.jpg](img/429700_2_En_9_Fig34_HTML.jpg)\n\
  \n*图 9-34*  \n用于编辑关系设置的对话框\n\n对话框中的控件包括：\n\n1. **表事件** – 创建新关系时，为关系的每一方选择一个事件。如果编辑现有关系，这些选项不可编辑，只能在关系图中直接对事件框进行编辑。\n\
  2. **选中的匹配字段** – 选择一对匹配字段，以添加至下方列表或进行更改。\n3. **比较运算符** – 选择用于控制匹配字段比较方式的运算符。\n4.\
  \ **选中的匹配字段按钮** – 点击**添加**，将所选字段作为新条件加入下方列表；或点击**更改**，更新所选组合中的字段。\n5. **链接字段** –\
  \ 列出定义关系的条件。\n6. **链接字段按钮** – 点击**复制**或**删除**所选链接字段。\n7. **关系选项** – 为关系的每一方指定特定的行为。\n\
  \n## 选择比较运算符\n\n*比较运算符*用于指定如何比较匹配字段的值以检测关系匹配。可用的运算符见表 9-1。\n\n**表 9-1** – 可用于关系的比较运算符列表\n\
  \n| 运算符 | 描述 |\n| --- | --- |\n| `=` | 当两个字段中的值相等时匹配。 |\n| `≠` | 当两个字段中的值不相等时匹配。\
  \ |\n| `<` | 当左侧字段中的值小于右侧字段中的值时匹配。 |\n| `≤` | 当左侧字段中的值小于或等于右侧字段中的值时匹配。 |\n| `>`\
  \ | 当左侧字段中的值大于右侧字段中的值时匹配。 |\n| `≥` | 当左侧字段中的值大于或等于右侧字段中的值时匹配。 |\n| `X` | 匹配关系左侧的*每条*记录将匹配右侧的所有记录，无论所选字段中的实际值如何。这通常被称为*笛卡尔积*、*笛卡尔连接*或*交叉连接*，其中两个表之间的连接不受任何条件限制，每条记录都会成为匹配项。\
  \ |\n\n## 关系选项\n\n**编辑关系**对话框底部的设置（如图 9-35 所示）控制着关系两侧行为的三个功能。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig35_HTML.jpg](img/429700_2_En_9_Fig35_HTML.jpg)\n\
  \n*图 9-35*  \n每个事件的关系选项\n\n### 允许创建相关记录\n\n**允许创建记录**选项使用户能够通过在布局中从另一事件放置的相关字段中输入内容，从而在一个事件中创建记录。此功能常用于门户，以便于轻松创建新记录（第\
  \ 20 章，“在门户中直接创建记录”）。\n\n### 自动删除相关记录\n\n**删除相关记录**选项会导致当另一侧的关联记录被用户或脚本删除时，自动删除本表中的记录。这在删除“父”记录时删除其“子”记录尤其有用。例如，当删除一个**公司**记录时，如果启用了该功能，则所有相关的**联系人**记录也会被删除。仅在缺少父记录会导致产生有问题的“幽灵记录”（即没有父记录就无法访问或使用的孤立记录）时使用此功能。如需保留相关记录并允许它们稍后关联到新的父记录，请保持此选项禁用。\n\
  \n### 对相关记录排序\n\n**排序记录**选项可在*关系层面*启用特定的记录排序。虽然门户可以配置为对记录进行排序以用于显示（第 20 章，“探索门户设置对话框”），但此功能在关系根源上对记录进行排序，这样当计算或脚本通过关系直接访问相关记录时，记录已被排序。当使用`List()`函数（第\
  \ 13 章）且顺序很重要时，这一点至关重要。\n\n## 向关系图添加注释\n\n*关系注释*是一个可自由放置的彩色框，可添加至关系图中以容纳开发者注释。通过选择**文本**工具（如图\
  \ 9-36 所示），然后在关系图中单击并拖动即可创建注释。**编辑注释**对话框（如图 9-37 所示）允许输入和编辑注释文本，以及指定注释的字体、字号、文本颜色和背景颜色。创建新注释或双击现有注释时会自动打开该对话框。保存后，注释可以像表事件一样移动、调整大小、最小化、对齐或删除。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig36_HTML.jpg](img/429700_2_En_9_Fig36_HTML.jpg)\n\
  \n*图 9-36*  \n用于创建新注释的工具\n\n**提示**\n\n无需选择文本工具，按住`Option`（macOS）或`Alt`（Windows）键，在背景上单击并拖动即可创建注释。\n\
  \n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig37_HTML.jpg](img/429700_2_En_9_Fig37_HTML.jpg)\n\
  \n*图 9-37*  \n一个注释（左）及用于编辑它的对话框（右）\n\n## 实现一个简单的关系模型\n\n现在，可以在**Learn FileMaker**数据库中实现先前描述的简单关系模型。将四个主表事件垂直堆叠对齐。首先创建两个**联系人**事件的副本，分别命名为`公司\
  \ | 联系人`和`项目 | 联系人`。然后创建两个**公司**事件的副本，分别命名为`联系人 | 公司`和`项目 | 公司`。接着排列它们，并在它们之间建立如图\
  \ 9-38 所示的关系：\n\n- **链接公司到公司 | 联系人** – 可用于显示与某公司关联的所有联系人的门户。\n- **链接联系人到联系人 | 公司**\
  \ – 可用于在联系人记录上显示公司名称，并提供从后者到前者的可导航链接。\n- **链接项目到项目 | 联系人** – 这将把一个项目链接到联系人记录，作为主要联系人。\n\
  - **链接项目到项目 | 公司** – 这将把一个项目链接到公司记录，允许在项目记录上显示公司名称，并提供它们之间的可导航链接。\n\n![../images/429700_2_En_9_Chapter/429700_2_En_9_Fig38_HTML.jpg](img/429700_2_En_9_Fig38_HTML.jpg)\n\
  \n*图 9-38*  \nLearn FileMaker 测试文件的关系模型\n\n## 总结\n\n本章介绍了数据源、表事件和关系。在下一章中，我们将探讨管理容器字段和存储选项。\n\
  \n\n\n"
- "# 10. 管理容器字段\n\n*容器字段*是一种能够存储和显示文档文件的字段类型。正式地说，容器中的内容被称为*二进制大对象*或*基本大对象*，两者常缩写为“BLOB”，它是一组二进制数据的集合，代表图像、音频或任何文件类型（文件夹除外），在数据库中作为单条数据条目存储。在\
  \ FileMaker 中，容器字段具有多种选项，这些选项会影响文件插入字段的方式、文件的实际存储位置（内部或外部），以及字段在布局上放置时的显示方式。本章概述了定义容器字段的选项，涵盖以下主题：\n\
  \n- 将文件插入容器\n- 从容器中提取文件\n- 解释容器存储选项\n- 使用托管外部存储\n\n## 将文件插入容器\n\n当容器字段在布局上对用户可见且可访问时，可以通过*插入*菜单中的功能、*拖放*或*复制粘贴*来插入文档文件。根据容器字段的字段定义和布局设置，每种方法都有不同的选项和限制，这些可能会影响文档的插入方式以及数据库文件的大小。\n\
  \n**提示：** 要跟随这些示例进行操作，请打开 `Learn FileMaker` 数据库的 `Sandbox Form` 布局。\n\n### 使用插入菜单\n\
  \n*插入菜单*包含四个选项，用于将文件插入到当前聚焦的容器字段中，如图 10-1 所示。这些选项也可在字段的上下文菜单中以及作为脚本步骤使用。选择任何选项都会打开一个*选择文件*对话框，该对话框会自动根据菜单项对应的文件类型进行优化。\n\
  \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig1_HTML.jpg](img/429700_2_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 将文件插入容器字段的选项\n\n- *图片* – 插入并显示图片内容。\n- *音频/视频* – 插入音频或视频文件。仅当字段的布局设置允许*交互内容*时启用，这允许文件直接在字段内播放，而无需在其他应用程序中打开。\n\
  - *PDF* – 插入 PDF 文件。仅当字段的布局设置允许*交互内容*时启用，这允许直接在字段内查看文件页面，而无需在其他应用程序中打开。\n- *文件*\
  \ – 将任何类型的文件插入字段。文件将显示为目录文件夹中的样子，由图标表示，并且无法查看或与其内容交互。\n\n**注意：** 有关布局设置的更多信息，请参见第\
  \ 19 章“容器的数据格式选项”。\n\n### 拖放\n\n使用*拖放*将文件从目录插入到当前布局上的容器字段中，是最直观的方法。拖放文件时，FileMaker\
  \ 会根据拖放文件的类型和字段的配置自动使用适当的存储方法。例如，如果拖放的是图像，它会像选择了*插入图片*菜单一样被插入并显示。如果将 PDF 或音频文件拖放到未配置为*交互内容*的字段中，该文件将放置到字段中，并显示为\
  \ PDF 第一页的预览或文件图标。但是，如果字段配置为交互式，那么文件将像选择了对应文件类型的菜单一样被插入，并完全可交互。拖放时，用户无法手动指定外部存储（本章后续讨论）。相反，字段定义的存储方法将自动应用。\n\
  \n### 复制粘贴\n\n使用*复制粘贴*将文件插入容器是另一种便捷选项。剪贴板可以包含从文件夹中复制的*实际文件*、从照片编辑软件中打开的图片文件复制的*图像内容*，或格式正确的文件*文本引用*。粘贴的结果与拖放相同，并且无法手动指定外部存储（除非粘贴的是文本引用）。\n\
  \n## 从容器中提取文件\n\n当布局上的容器字段可编辑时，用户可以使用`导出字段内容`功能将记录中的内容副本保存到其选择的目录文件夹中。此功能可在*编辑*菜单、字段的上下文菜单中找到，并可作为脚本步骤使用。选择后，将打开一个同名对话框，允许用户选择导出文档的文件夹。文件名默认为容器中文档的名称，但可以在此对话框中重命名。该对话框包含自动打开文件以及创建附件为提取文件的电子邮件的选项。\n\
  \n**提示：** 此功能还可用于将字段中的选定文本保存到文本文件中。\n\n## 解释容器存储选项\n\n容器字段可以配置为以下两种方式之一来存储文件：将*实际文件*存储在数据库文件内部，或存储指向*数据库文件外部*文件的*引用*。\n\
  \n### 在内部存储文件\n\n定义新容器字段时，默认情况下会内部存储内容。这意味着文件的全部内容会被复制*到数据库文件内部*。这有其优点和缺点。\n\n一个巨大的优势是，内部存储保持了数据库的可移植性，因为所有元素都存储在单个文档文件中。当以类似于字处理或电子表格文档的方式在本地访问数据库时，这一点可能很重要。虽然对于在服务器上托管的共享数据库（第\
  \ 29 章）来说，可移植性不是问题，但内部存储确保存储在容器字段中的文件普遍可访问，无论任何给定用户是否无法访问未挂载文件服务器或无法访问的同事计算机上的外部文件。由于文件实际上被复制到了数据库结构中，如果用户能够访问数据库结构，就能访问容器内容。\n\
  \n内部存储的缺点是，每个插入到字段的文件都会增加数据库文件的大小。这本身并不是问题，因为 FileMaker 数据库*可以*高达 8 TB。然而，随着文件大小的增长，性能可能会下降，尤其是当许多用户通过网络共享访问数据库时。\n\
  \n通常，如果存储在容器字段中的文件数量或大小过大，一个好的策略是将文件引用插入字段，并将实际文件存储在外部。如果操作得当，用户在交互时不会注意到与内容交互方式上的差异。\n\
  \n\n\n### 存储对外部文件的引用\n\n*容器字段文件引用*是一个文本字符串，用于存储外部文件的位置、类型以及其他因类型而异的信息。例如，*容器图像引用*包含原始图像的尺寸、相对于数据库的文件路径以及图像的绝对路径。以下示例展示了对用户桌面上一个图像文件的引用：\n\
  \n```\nsize:731,960\nimage:../../../../../../../../../Desktop/Flower Picture.jpg\n\
  imagemac:/Macintosh HD/Users/john_smith/Desktop/Flower Picture.jpg\n```\n\n在容器字段中存储引用可以保持数据库的简洁高效。虽然插入过程仅在字段中存储了一个引用，但根据字段的设置，该外部文件仍会像存储在内部一样在界面中渲染。从用户的角度来看，当字段在布局上显示其内容时，没有任何区别。\n\
  \n使用外部文件有两种方法：*自定义管理*和*数据库管理*。\n\n## 使用托管式外部存储\n\n要使用*数据库管理*的*外部存储*，您必须定义基础目录并配置容器字段以使用它们。\n\
  \n### 定义基础目录\n\n*基础目录*是开发者定义的一个文件夹目录路径，它作为根位置，一个或多个容器字段可以在此存储文档。`FileMaker` 会完全管理所定义的文件夹，它会自动创建该文件夹，然后根据为基础目录和各个字段定义的设置，管理子文件夹和文件的内部目录结构。每个数据库文件都包含一个默认目录，自动以数据库名称命名，并带有\
  \ `[database location]` 的公式前缀，这意味着外部容器目录将存储在与数据库文件相同的文件夹中。\n\n**注意**  \n如果数据库文件被重命名，默认基础目录不会改变，但可以为了保持一致性而手动更新。\n\
  \n#### 探索“管理容器”对话框\n\n外部容器是在“管理容器”对话框中定义的，该对话框可以通过选择 `File ➤ Manage ➤ Containers`\
  \ 菜单打开。此对话框有两个选项卡：`Storage` 和 `Thumbnails`。\n\n##### 探索“存储”选项卡\n\n“管理容器”对话框的 `Storage`\
  \ 选项卡（如图 10-3 所示）包含一个已定义基础目录的列表。在这里您可以*创建*、*编辑*和*删除*基础目录。您可以使用 `Transfer Data` 按钮启动文档传输，当字段分配的基础目录发生更改并且在旧位置检测到文档时，该按钮会高亮显示（参见本章后面的“更改字段容器设置”）。\n\
  \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig3_HTML.jpg](img/429700_2_En_10_Fig3_HTML.jpg)\
  \  \n*图 10-3*  \n用于托管容器的基础目录列表\n\n**警告**  \n当数据库托管在 `FileMaker Server` 上时，基础目录无法编辑。请将文件脱机，并使用\
  \ `FileMaker Pro` 桌面应用程序打开以进行编辑。\n\n###### 创建新基础目录\n\n给定数据库文件中基础目录的数量完全由开发者决定。默认目录可以被文件中所有表中的所有容器字段共享。或者，每个表甚至每个字段都可以分配一个单独的目录。要创建新的基础目录，请单击\
  \ `New` 按钮。这将打开一个 `New Base Directory` 对话框（如图 10-4 所示）。此窗口包含一个文本区域，您可以在其中键入目录路径，或者拖入一个文件夹以自动插入其路径。路径的格式必须如示例所示。\n\
  \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig4_HTML.jpg](img/429700_2_En_10_Fig4_HTML.jpg)\
  \  \n*图 10-4*  \n用于指定基础目录路径的对话框\n\n###### 编辑基础目录\n\n只要目录中尚未包含任何托管文件，就可以编辑目录路径。如果目录为空，请在“管理容器”对话框中双击或单击\
  \ `Edit` 按钮，以在 `Edit Base Directory` 对话框（与图 10-4 所示的 `New Base Directory` 对话框相同）中打开所选基础目录。如果目录已包含文件，请创建一个新的基础目录，将使用旧目录的所有字段指向新目录，传输现有的容器文档，然后删除旧目录。\n\
  \n###### 删除基础目录\n\n当不再使用某个基础目录时，只要它不包含任何托管文件，就可以将其删除。在列表中选择它，然后单击 `Delete` 按钮。`FileMaker`\
  \ 要求文件中至少定义一个基础目录，因此如果列表中只有一个目录，删除请求将被拒绝。\n\n**注意**  \n`FileMaker` 会从列表中删除基础目录的定义，而不会删除实际的外部文件夹。\n\
  \n##### 探索“缩略图”选项卡\n\n“管理容器”对话框的 `Thumbnails` 选项卡（如图 10-5 所示）控制自动缩略图生成，这可以加快容器的界面渲染速度，尤其是在通过网络传输时。要激活缩略图，请选中\
  \ `Generate and store thumbnails for images` 复选框，以允许 `FileMaker` 在布局尝试显示图像时自动生成并显示缩略图。然后在两种存储选项中选择。*永久存储*选项将使缩略图缓存在磁盘和内存中，并在数据库关闭时保留磁盘上的缓存部分。使用此选项可获得最佳性能。*临时存储*选项将使缩略图仅缓存在内存中。当数据库关闭时，缓存会被丢弃。这样会稍微慢一些，但可以节省硬盘空间。\n\
  \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig5_HTML.jpg](img/429700_2_En_10_Fig5_HTML.jpg)\
  \  \n*图 10-5*  \n用于指定缩略图生成的对话框\n\n\n\n### 定义字段的外部存储目录\n\n定义基础目录后，可将其分配给容器字段。容器字段的外部存储设置在“字段选项”对话框的*存储*选项卡中进行配置，如图\
  \ 10-6 所示。打开“管理数据库”对话框，点击*字段*选项卡，然后双击一个容器字段，接着选择*存储*选项卡。\n\n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig6_HTML.jpg](img/429700_2_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6  \n容器字段存储选项\n\n勾选*将容器数据存储于外部*复选框，并从弹出菜单中选择一个基础目录。选择目录后，再选择一种存储方法。*安全存储*选项会对文档进行加密，并自动将文件随机分布到基础目录内自动创建的子目录中。该选项自动避免在使用同一基础目录的任何字段中存储同名文件时发生冲突。*开放存储*选项则保留文档数据的原始文件格式，并使用开发者指定的子目录——这是避免为不同表和字段存储的类似名称项目发生冲突所必需的。如果对数据库中不同表的多个字段使用同一基础目录，可使用公式生成包含相应子文件夹的子目录，以避免记录间覆盖冲突。点击*指定*按钮输入类似以下示例的子目录公式，该示例为*表*、*字段*和*序列号*创建层级文件夹，以确保每个文件夹只包含一个容器项目：\n\
  \n```\n\"Sandbox/示例容器/\" & Record ID & \"/\"\n```\n\n**注意：** `FileMaker Cloud Server`\
  \ 要求所有容器都使用安全存储。\n\n#### 更改字段容器设置\n\n`FileMaker` 会自动识别对容器字段配置所做的更改。这些更改包括在非托管内部存储与托管外部存储之间切换、更改字段的基础目录或子目录，或在安全存储与开放存储之间切换。当保存修改后的字段定义时，*容器数据传输*对话框会列出会话期间所有被修改的容器字段，如图\
  \ 10-7 所示。若要将外部文件立即传输至新的基础目录，请确保该字段的复选框已勾选，然后点击*传输*。如果改为点击*关闭*，则未执行的传输将被保留，稍后可通过“管理容器”对话框中的*传输数据*按钮执行。\n\
  \n![../images/429700_2_En_10_Chapter/429700_2_En_10_Fig7_HTML.jpg](img/429700_2_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7  \n指示需要传输容器字段内容的对话框\n\n## 总结\n\n本章探讨了如何向容器字段插入和提取文件，以及管理容器的各种方法。下一章，我们将探讨如何定义值列表。\n\
  \n"
- "# 11. 定义值列表\n\n*值列表*是由回车符分隔的一系列值。列表可通过公式创建（第 13 章，“聚合数据”），也可通过将其定义为集中式资源来创建。预定义列表可以是一组静态值，也可以是动态编译自字段内容（从表中直接或通过关系获取）的值。定义后，这些列表可分配给字段，以实现基于选择的数据录入，例如*下拉列表*、*弹出菜单*、*复选框*和*单选按钮*（第\
  \ 20 章，“配置字段的控制样式”）。使用值列表作为字段的控制样式，可提高数据录入速度并确保准确性和一致性。本章涵盖以下关于定义值列表的主题，包括：\n\n\
  *   介绍值列表对话框\n*   使用自定义值\n*   使用来自其他文件的值列表\n*   使用来自字段的值\n\n## 介绍值列表对话框\n\n预定义列表通过“管理值列表”对话框进行配置，如图\
  \ 11-1 所示。该对话框可通过选择菜单 *文件 ➤ 管理 ➤ 值列表*、点击检查器窗格中已分配基于列表的控制样式字段旁的铅笔图标（第 19 章和第 20 章），或通过执行*打开管理值列表*脚本步骤来打开。此对话框用于*创建*、*编辑*、*复制*和*删除*列表。\n\
  \n![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig1_HTML.jpg](img/429700_2_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1  \n用于管理值列表的对话框\n\n**提示：** 值列表可以在两个文件之间复制和粘贴。\n\n列表设置在*编辑值列表*对话框中定义。在图 11-1\
  \ 所示对话框中创建新列表或编辑现有列表时，会打开此对话框。为列表输入名称后，有三种生成值的选项：\n\n*   *使用来自字段的值* – 从字段值生成列表，在“指定字段”对话框中定义\n\
  *   *使用来自另一个文件的值列表* – 从另一个 `FileMaker` 数据库中选择一个值列表用于当前数据库\n*   *使用自定义值* – 在下方字段中手动输入由回车符分隔的值列表\n\
  \n**注意：** 本节中的示例仅*定义*列表。请参阅第 20 章“配置字段的控制样式”，了解如何将列表分配给布局上的字段。\n\n## 使用自定义值\n\n\
  使用手动输入的*自定义值*定义的值列表可用于快速输入一组静态值，例如：*类别*、*国家*、*分组*、*位置*、*状态*等。这定义了一个在数据库其他位置不存在的、直接键入编辑对话框的信息列表。例如，创建一个简单的示例状态列表，可将其分配给诸如*公司状态*之类的字段。在“管理值列表”对话框中，点击*新建*按钮打开“编辑值列表”对话框，然后执行图\
  \ 11-2 所示的步骤：\n\n![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig2_HTML.jpg](img/429700_2_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2  \n使用自定义值的值列表\n\n1.  为值列表输入名称，例如“记录状态”。\n2.  选择*使用自定义值*选项。\n3.  在文本区域中输入值，例如“活跃”和“非活跃”。\n\
  \n\n\n"
- '# 使用其他文件中的值列表


  一个数据库中的值列表可以定义为订阅另一个数据库中定义的列表。这有助于通过在一个文件中定义列表并在其他文件中共享来消除多文件系统中的冗余。以下示例假设存在第二个名为“示例外部列表”的文件，其中包含一个名为“地址州名”的值列表。在
  *学习 FileMaker* 数据库中，打开 *管理值列表* 对话框，然后单击 *新建* 按钮打开 *编辑值列表* 对话框。接着输入一个名称，并按照以下步骤配置列表，如图
  11-3 所示：


  ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig3_HTML.jpg](img/429700_2_En_11_Fig3_HTML.jpg)


  图 11-3


  一个使用外部数据库文件中列表的值列表


  1.  选择 *使用其他文件中的值列表* 选项。

  2.  如果另一个数据库已被定义为外部文件源，它将显示在第一个弹出菜单中。如果没有，可以通过从该菜单中选择 *添加 FileMaker 数据源*，然后定位并选择另一个数据库来定义。

  3.  一旦选择了文件，接下来的 *值列表* 弹出菜单将被激活，允许从外部文件中定义的列表中进行选择。选择目标列表并关闭对话框。


  '
- '# 使用字段中的值


  列表可以从目标字段中收集值，以动态生成一个随记录内容变化而变化的列表。通过使用字段数据作为源，授权用户、开发者或脚本可以轻松编辑值列表内容，并随时间动态调整其值。这在创建列表以帮助用户将一个表中的记录分配给另一个表中的记录时特别有用，例如，将一个
  *公司* 记录指定为 *联系人*、*项目*、*发票* 等的父记录。用户无需记住或查找公司的主键并手动输入或复制粘贴，而是通过弹出菜单或下拉列表控件样式，用户可以根据名称选择公司，系统会自动填入主键。默认情况下，使用字段值的列表是
  *上下文无关的*，这意味着它们将包含该字段表中 *每条记录* 的值，并且可以在 *任何* *上下文中* 使用。然而，也可以通过声明一个 *起始上下文* 并通过关系拉取值来有条件地限制列表，从而将列表仅限于单个表的布局。


  ## 指定字段对话框简介


  首先创建一个新的值列表，为其分配一个名称，然后选择 *使用字段中的值* 单选按钮。这将自动打开一个 *指定字段* 对话框，如图 11-4 所示。


  ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig4_HTML.jpg](img/429700_2_En_11_Fig4_HTML.jpg)


  图 11-4


  用于指定由字段值生成的列表的对话框


  要定义列表，请指定将用于生成值的字段，并使用对话框中的这些控件指示要包含哪些值以及它们的显示方式：


  1.  *使用第一个字段的值* – 选择一个表出现和字段来指定列表中使用的 *第一个字段*。当做出选择时，该值将被插入到一个字段中。

  2.  *也使用第二个字段的值* – 可选，从同一个表出现或与其关联的表出现中选择一个 *第二个字段*。该值在列表中 *显示* 以进行识别，但在做出选择时不插入。例如，如果第一个字段使用公司主键编号，第二个字段可以显示人类可读的公司名称。

  3.  *选择要包含的值* – *包含所有值* 选项为表中 *所有记录* 生成一个来自所选字段的唯一值列表。*仅包含从……开始的关联值* 选项会为 *仅* 从所选表出现的上下文开始的关联记录生成一个值列表。这将创建一个
  *上下文相关值列表*，它会根据用户正在查看的记录而改变。

  4.  *仅显示第二个字段的值* – 限制为 *仅显示* 第二个字段的值，但在做出选择时仍会 *插入* 第一个值。

  5.  *使用……排序值* – 选择在显示多个字段时用于对列表进行排序的两个字段之一。

  6.  *根据……重新排序值* – 选择用于值排序的语言。当使用字典排序顺序与索引排序顺序不同的语言时，这很有用，例如，区分带有变音符号和不带变音符号的字符。


  ## 创建表中所有记录的列表


  默认情况下，设置为 *使用字段中的值* 的值列表会从表中的 *每条记录* 中拉取值，因此可以在数据库的任何布局上使用，而无需考虑布局表的关联上下文（第 17 章“理解上下文访问”）。前面图
  11-4 中显示的示例创建了一个值列表，该列表使用 *公司* 表中所有记录的 *记录 ID* 和 *公司名称* 字段。配置并保存后，此列表可以作为 *弹出菜单*
  或 *下拉列表* 分配给任何表中的字段（第 20 章“配置字段控件样式”）。例如，在 *联系人* 表中，*联系人公司 ID* 字段用于存储将联系人记录连接到公司的外键。为了允许用户快速输入此信息，可以将该值列表作为弹出菜单分配给
  *联系人表单* 布局上的该字段。


  ## 创建条件值列表


  *条件值列表* 包含经过筛选的选项，这些选项仅代表可用记录值的一个子集。通过提供仅包含相关值的更小列表，用户可以更容易地找到他们需要的值。这可以通过多种方式使用。例如，当将
  *公司* 指定为 *联系人* 的父记录时，条件列表可以仅限于仅包含活跃的公司记录。类似地，将 *产品* 分配给 *发票* 时，可以根据类别字段的值或接收发票的公司类型来将列表仅限于包含某些产品。当选择用于生成
  *电子邮件* 记录的 *模板* 时，可以筛选列表，使其仅包含与正在生成的电子邮件类型相关的已批准类别记录。


  创建条件值列表有两种方法：*使用专用关系* 和 *使用计算字段*。在接下来的示例中，我们将使用 *学习 FileMaker* 数据库中 *公司* 表的 *公司状态*
  字段来创建一个条件值列表，该列表仅显示状态为“活跃”的公司记录。




  #### 使用专用关系


  *关系驱动的条件值列表*通过一个关系（第 9 章）来编译，从而创建一个仅包含匹配记录中值子集的列表。使用关系创建条件值列表需要选择一个*起始表出现*，它代表了从所选列表字段中提取值时将使用的界面上下文。通常，该起始表出现是分配给列表所在布局的表的表出现。然而，它也可以是任何与布局的表出现相关的表出现。从*起始表出现*到*列表表出现*的关系条件，决定了哪些匹配记录被包含在列表中，哪些被排除。


  例如，在 *Learn FileMaker* 文件中构建一个值列表，该列表仅包含 *Company 状态* 字段值为“active”的 *Company* 记录。由于值列表需要关系才能工作，我们将声明一个*使用上下文*为
  *Contact* 表，即该值列表可从任何分配给 *Contact* 表的布局中使用。首先，执行几个准备步骤。


  首先，在 *Contact* 表中创建一个计算字段，命名为 `Contact Company Status Match`，公式为 `"Active"`，计算结果类型为文本（第
  12 章）。由于每条记录的计算结果相同，且它将成为关系中的本地键（第 9 章，“索引匹配字段”），因此可以将其设置为存储全局值。


  接下来，在关系图中创建一个 *Company* 表的新表出现，并将其命名为 `Contact | Company for Active List`，并将其放置在
  *Contact* 表的右侧。这将是列表从中提取值的表出现。


  最后，如图 11-5 所示，通过一个关系将此新表出现连接到 *Contact*。现在，从 *Contact* 表（起始表出现）的角度来看，通过此关系提取的 *Company*
  值将仅包含那些 *Company 状态* 值为“Active”的记录。


  ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig5_HTML.jpg](img/429700_2_En_11_Fig5_HTML.jpg)


  图 11-5


  条件值列表的新关系


  完成后，创建一个新的值列表，设置为*从字段中取值*，并指定字段如图 11-6 所示：


  ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig6_HTML.jpg](img/429700_2_En_11_Fig6_HTML.jpg)


  图 11-6


  条件值列表的配置


  1. 从先前创建的新表出现中选择字段。

  2. 选择*仅包含从以下起始的相关值*选项。

  3. 选择 *Contact* 作为起始表出现。


  保存后，将该值列表分配给 *Contact* 布局上的 `Contact Company ID` 字段，作为弹出菜单或下拉列表的数据源（第 20 章，“配置字段的控制样式”）。然后，当在该字段内点击时，应仅显示活跃公司列表。


  **注意**：如果值列表为空，请确认某些 Company 记录的状态为“Active”。


  尽管此技术有很多有效的用途，但关系驱动的值列表并不总是最佳选择。由于过滤机制是一个关系，它天生具有上下文敏感性。要在其他表的布局上实现相同的功能，需要复制一套资源。例如，要将相同的活跃公司列表添加到
  *Project* 表，就需要在那里创建一个链接计算匹配字段、一个新的连接 *Project* 与 *Company* 的专用表出现，以及一个额外的值列表。要将其添加到
  *Invoices* 表，则需要再次复制这些资源。在六个不同的表中实现这样的值列表，每个表都需要一组这样的四个资源，总计*二十四个额外组件*。因此，对于像活跃公司列表这样广泛使用的功能，使用此技术会很快用额外的资源堵塞关系图和值列表定义，而本应是一个简单的全局值列表就能解决。在这种情况下，应改用*计算驱动的条件列表*。


  #### 使用计算字段


  *计算驱动的条件值列表*使用源表中的计算字段生成记录子集，该计算字段的公式结果（第 12 章）控制哪些记录被包含或排除。由于 FileMaker 在从字段构建列表时会忽略空值，因此列表中仅包含那些产生计算结果的记录值。当公式中使用的字段是本地字段且已索引时，这通常是创建*上下文中立*且*资源高效*的条件值列表的最佳选择。用它来替代上一个示例，将创建一个活跃公司列表，该列表可在数据库中的*任何位置*使用，而无需额外资源。首先，在
  *Company* 表中创建一个计算字段，命名为 `Company Name for Active List`，该字段返回*文本*结果，公式为：


  ```

  Case ( Company Status = "Active" ; Company Name ; "" )

  ```


  然后，创建一个值列表，使用 `Record ID` 作为第一个字段，并以上述计算字段作为第二个字段，如图 11-7 所示。按此方式创建列表时，仅第二个字段需要通过计算有条件地生成。一旦创建，此列表即可在*任何*布局上下文中使用，无论源表是什么，也无需专用关系。


  ![../images/429700_2_En_11_Chapter/429700_2_En_11_Fig7_HTML.jpg](img/429700_2_En_11_Fig7_HTML.jpg)


  图 11-7


  计算驱动的条件值列表的配置


  1. 从 *Company* 表中选择 `Record ID` 作为第一个字段。

  2. 选择 `Company Name for Active List` 计算字段作为第二个字段。

  3. 选择*包含所有记录*选项。


  ## 总结


  本章探讨了如何以多种不同方式创建预定义值列表。如何将这些值列表分配给布局对象将在第 19 章和第 20 章中进一步讨论。在下一章中，我们将开始学习如何编写公式。


  ## 第三部分：编写公式和使用函数


  公式在开发界面中广泛应用于字段定义、自定义函数、布局对象、自定义菜单和脚本步骤。这些章节涵盖了编写公式的基础知识：


  1. *编写公式*

  2. *探索内置函数*

  3. *使用 JSON*

  4. *创建自定义函数*

  5. *介绍 ExecuteSQL*


  '
- '# 12. 编写公式


  *计算公式*是一个由一条或多条语句组成的等式，这些语句表达的操作在被执行后会产生一个结果。公式可以*分析*、*比较*、*连接*、*压缩*、*转换*、*扩展*、*格式化*、*解析*、*替换*或*汇总*
  FileMaker 支持的任何数据类型。公式的范围可以从一个简单的数学方程式到涉及任何数据类型值的极其复杂的相互关联表达式和嵌套逻辑子句集合。本章介绍了编写公式的基础知识，涵盖以下主题：


  - 介绍公式

  - 定义公式组件

  - 探索计算界面

  - 编写公式

  - 将计算添加到 *Learn FileMaker* 文件




  '
- "# 公式简介\n\n公式在开发界面的诸多位置均有使用。*替换字段内容*对话框提供了一个插入公式结果的选项（第 4 章）。许多编程对话框或面板都设有*选项*、*指定*、`Fx`或*铅笔图标*按钮，点击后可进入公式对话框。某些弹出菜单中的*指定*选项也是如此。定义计算字段时，需要输入公式。常规字段可接受公式以生成自动输入值和验证结果（第\
  \ 8 章）。自定义函数用于定义全局公式（第 15 章）。布局模式下的*检查器*面板可接受公式来隐藏对象、创建占位符文本和工具提示（第 19 章）。许多布局对象可接受公式来确定其名称或其他标准，包括*按钮栏*、*按钮*、*弹出框*、*标签页*、*门户*、*图表*和*Web\
  \ 查看器*（第 20 章）。自定义菜单可以使用公式来确定名称和可见性（第 23 章）。脚本参数可以通过公式生成（第 24 章），并且许多脚本步骤可以或必须使用公式进行配置（第\
  \ 25 章）。安全权限可以被配置为使用公式来确定对模式资源的访问权限（第 30 章）。开发者的*数据查看器*对话框包含一个*编辑表达式*对话框，该对话框接受公式以持续监控结果（第\
  \ 31 章）。所有这些操作都会打开一个*指定计算*窗口，如图 12-1 所示。此对话框用于构建公式。\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig1_HTML.jpg](img/429700_2_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n\n用于定义计算公式的对话框\n\n## 公式工作原理\n\n计算公式是通过将各种文本组件组合成一条书面语句来创建的，该语句表达了结果应如何产生。保存新的或修改过的公式时，FileMaker\
  \ 将扫描该语句以检查语法错误，例如，断开的引用、缺失的函数或结构错误的语句。当检测到问题时，保存过程会暂停，语句中的错误会被高亮显示，并会弹出一个对话框消息详细说明错误信息。这个过程会重复进行，直到未检测到任何错误，并且代码可以成功编译和保存。一旦保存，公式将保持空闲状态，直到被任何进程*调用*，该进程会触发对其语句的评估以产生结果。\n\
  \n公式可以通过多种方式被调用。当创建记录或公式中使用的字段被更改时，字段的自动输入公式会被调用。当布局对象被渲染时，其使用的任何公式都会被调用。这适用于使用公式生成*名称*、*隐藏条件*、*条件格式*或其他与界面相关的属性或条件的对象。脚本步骤的计算元素会在脚本运行时该步骤被执行时被调用。公式可以被另一个公式调用，例如，一个计算字段在其公式中包含另一个计算字段，或者一个自定义函数调用另一个自定义函数或一个计算字段。\n\
  \n调用时，公式的语句会被*评估*，这意味着代码会通过按照特定的优先级顺序执行每个操作来转换为一个结果。公式总是在特定表出现的*上下文中*进行评估。*字段定义*中使用的公式需要从字段所在表的任何表出现中手动选择一个上下文。与*界面元素*关联的公式将使用呈现该对象的布局所对应的表出现上下文。在*脚本步骤*中使用的公式将使用执行时当前窗口中显示的布局所对应的表出现上下文。在*自定义菜单*中使用的公式也使用当前布局的表作为上下文。\n\
  \n公式的*结果*会返回给调用进程，该进程会根据其功能以适当的方式处理结果。例如，*计算字段*包含其公式的结果，并在放置在布局上时显示该结果。*布局对象*的名称可能会根据结果改变其显示名称、可见性或外观。`设置变量`脚本步骤将公式的结果放入变量中。`显示自定义对话框`脚本步骤会将一个结果放入屏幕上显示的对话框中。对象类型以及调用公式的配置方面决定了结果的目的地或用途。\n\
  \n当公式因执行错误而无法产生结果时，它将返回一个问号。例如，如果公式使用了已被删除或从当前上下文中无法访问的字段，则公式可能会返回错误。同样，使用已被删除的自定义函数，或提供与调用进程期望不一致的数据类型的结果，也会返回错误。\n\
  \n## 定义公式组件\n\n公式表达式可以使用*注释*、*常量*、*字段引用*、*函数*、*运算符*、*保留关键字*和*变量*的任意组合来构建。\n\n###\
  \ 注释\n\n*注释*是插入到公式中的文本字符串，在代码评估时会被完全忽略。注释可用于将代码分段，或作为针对开发者的集成文档，提供关于其执行的函数、工作原理、更改记录或未完成工作的说明等信息。注释可以放在公式顶部，也可以放在各个语句或代码段之间的任何位置。有两种可用的注释样式：*行尾注释*和*多行注释*。\n\
  \n#### 创建行尾注释\n\n*行尾注释*从双斜杠（//）开始，一直持续到下一个段落回车符。在公式评估时，位于双斜杠和由回车符指示的行尾之间的任何文本都将被\
  \ FileMaker 忽略。下面的示例包含几个行尾注释。第一段和第二段都是注释，并说明了每一行都需要一组新的双斜杠来创建注释。第三段有一个注释从段落中间开始，位于两个数相加的公式之后。该行的公式部分将被评估，而注释部分将被忽略。结果将是两个数的总和：*四*。\n\
  \n```\n// 这是一个注释\n// 要延续到第二行，你必须使用另一组符号\n2 + 2    // 此注释从行中间开始，在一个公式之后\n```\n\n\
  #### 创建多行注释\n\n*多行注释*使用*起始*和*终止*符号来指示注释的开始和结束。它们用于“注释掉”整个段落块。要输入多行注释，使用斜杠后跟星号（`/*`）来指示注释的*开始*，使用星号后跟斜杠（`*/`）来指示注释的*结束*。在公式评估时，这两个符号之间的任何文本都将被\
  \ FileMaker 完全忽略。在下面的示例中，公式有两个将被忽略的块注释，它们之间有一个公式将被评估，再次产生两个数的总和结果：*四*。\n\n```\n\
  /*\n这是一个注释\n注释在附加行上继续\n3 + 4 包括这整行\n直到你在此处终止它\n*/\n2 + 2\n/*\n这是另一个带有换行（视为空格）的注释\n\
  注释在附加行上继续，直到被终止\n*/\n```\n\n\n\n### 常量\n\n*常量*，有时也被称为*字面量*，是直接键入公式中的静态不变的值。该值可以是\
  \ FileMaker 的任何数据类型：*文本*、*数字*、*日期*、*时间*或*时间戳*。当数量、城市名称、事件日期和开始时间等被*直接*键入公式时，它们都是常量的例子。数字常量可以直接键入公式，而其他基于文本的常量（如日期、时间和字符串）必须用引号括起来，以便将其解释为字面值，而不是字段引用、函数名或变量。以下展示了各类常量在公式中可能的示例：\n\
  \n```\n\"New York\"\n\"1/15/2017\"\n\"10:15:00\"\n\"1/15/2017 10:15:00\"\n```\n\n\
  以字面字符串形式输入的日期和时间常量被视为文本，必须转换为实际的日期和时间值才能被如此处理。这可以通过使用内置函数来完成：`GetAsDate`、`GetAsTime`\
  \ 和 `GetAsTimestamp`。\n\n```\nGetAsDate ( \"1/15/2021” )\nGetAsTime ( \"10:15:00\"\
  \ )\nGetAsTimestamp ( \"1/15/2017 10:15:00\" )\n```\n\n> **提示**  \n> 在第 13 章中了解更多关于内置函数的信息。\n\
  \n### 函数\n\n*函数*是一个预定义的、有名称的公式，它会被计算并返回一个结果。函数类似于其他编程语言中的子程序，因为它们允许将某些特定功能委托给当前公式之外的进程来处理，这有助于避免重复。在\
  \ FileMaker 中，有两种函数：*内置函数*（第 13 章和第 14 章）和*自定义函数*（第 15 章）。在本节中，我们将介绍如何使用简单的模式调用函数，以说明它们在公式中的使用。更多具体信息请参阅其他章节。\n\
  \n#### 从公式中调用函数\n\n可以通过键入函数名称或通过界面选择（稍后介绍）来将函数调用放入公式中。通常，函数的名称由两个或多个首字母大写的单词组成，单词之间没有空格，简洁地描述了它们执行的过程。因此，函数调用就是将该名称放入语句中，其模式如下：\n\
  \n```\nFunctionName\n```\n\n#### 带参数的函数调用\n\n*函数参数*是一个值，它可以在每次调用函数时改变。某些函数使用参数来允许调用公式提供输入。参数可以包含用于操作的材料或关于要执行的过程的指令。参数列在函数名称之后，用一组括号括起来。如果一个函数接受多个参数，它们将按顺序列出，在函数名称后用分号分隔。以下显示了两者的示例：\n\
  \n```\nExampleFunction ( parameter )\nExampleFunction ( parameter1 ; parameter2\
  \ ; parameter3 )\n```\n\n函数调用中的参数值可以是常量、字段引用、字面量、嵌套函数或变量表达式，如下例所示，每个例子都调用了一个假设的只有一个参数的函数。\n\
  \n```\nExampleFunction ( \"Hello, World\" )\nExampleFunction ( 5000 )\nExampleFunction\
  \ ( Invoice Tax Rate * Invoice Subtotal )\nExampleFunction ( AnotherFunction ( 15\
  \ ) )\n```\n\n#### 可选参数\n\n某些内置函数具有*可选参数*，可以根据需要包含或忽略这些参数。当在公式中插入函数调用时，FileMaker\
  \ 会用大括号表示可选参数，如下模式所示。\n\n```\nExampleFunction ( parameter1 {; parameter2 ; parameter3}\
  \ )\n```\n\n在这种情况下，大括号表示 `parameter1` 是必需的，而 `parameter2` 和 `parameter3` 是可选的。在编译公式之前，必须移除大括号以及任何*不会*使用的可选参数。以下示例显示了对同一个假设函数的一次调用（不带可选参数）和另一次调用（带有可选参数）。\n\
  \n```\nExampleFunction ( parameter1 )\nExampleFunction ( parameter1 ; parameter2\
  \ ; parameter3 )\n```\n\n#### 嵌套函数调用\n\n参数可以接受表达式作为值，包括对*其他函数*的调用。在此示例中，`ExampleFunction2`\
  \ 将首先被计算，其结果将用作 `ExampleFunction1` 的参数。\n\n```\nExampleFunction1 ( ExampleFunction2\
  \ ( parameter ) )\n```\n\n### 操作符\n\n*操作符*是一个符号，用于在公式中表达一种操作类型。FileMaker 有许多不同的操作符：*比较*、*逻辑*、*数学*和*文本*操作符。\n\
  \n> **注意**  \n> 为清晰起见，本节中的示例使用了仅包含常量的简单公式。但是，它们可以与任何公式组件组合使用。\n\n#### 比较操作符\n\n\
  *比较操作符*是一个用于比较两个值的符号，这两个值可以是字面值，也可以是两个表达式的计算结果。使用比较操作符的表达式的结果将是一个*布尔值*，分别用 `1`（*真*）或\
  \ `0`（*假*）表示。\n\n##### 等于\n\n*等于*符号用于比较两个值是否相同。如果两个值相同，则等式计算结果为真；如果不同，则为假。\n\n```\n\
  100 = 100         // 结果 = 1\n150 = 100         // 结果 = 0\n\"New York\" = \"New York\"\
  \  // 结果 = 1\n\"New York\" = \"NY\"        // 结果 = 0\nGetAsDate ( \"1/15/2021\"\
  \ ) = GetAsDate ( \"1/15/2021\" )     // 结果 = 1\nGetAsDate ( \"1/15/2021\" ) = GetAsDate\
  \ ( \"7/20/2021\" )     // 结果 = 0\nGetAsTime ( \"9:30:00\" ) = GetAsTime ( \"9:30:00\"\
  \ )         // 结果 = 1\nGetAsTime ( \"9:30:00\" ) = GetAsTime ( \"12:15:00\" )  \
  \      // 结果 = 0\n```\n\n##### 不等于\n\n比较两个值是否不同，可以使用*不等于*符号，或使用*小于*和*大于*符号并列。如果两个值相同，则等式计算结果为假；如果不同，则为真，如下例所示：\n\
  \n```\n100 ≠ 100        // 结果 = 0\n150 ≠ 100        // 结果 = 1\n\"New York\" ≠ \"\
  New York\" // 结果 = 0\n\"New York\" ≠ \"NY\"       // 结果 = 1\nGetAsDate ( \"1/15/2021\"\
  \ ) ≠ GetAsDate ( \"1/15/2021\" )     // 结果 = 0\nGetAsDate ( \"1/15/2021\" ) ≠ GetAsDate\
  \ ( \"7/20/2021\" )     // 结果 = 1\nGetAsTime ( \"9:30:00\" ) ≠ GetAsTime ( \"9:30:00\"\
  \ )         // 结果 = 0\nGetAsTime ( \"9:30:00\" ) ≠ GetAsTime ( \"12:15:00\" )  \
  \      // 结果 = 1\n```\n\n> **提示**  \n> 在 macOS 上，可以通过按住 Option 键并输入等号来创建*不等于*符号。\n\
  \n##### 大于\n\n*大于*符号用于比较两个值的字母顺序、时间顺序或数值大小。如果左侧的值在位置上大于右侧的值，则等式计算结果为真。\n\n```\n\
  150 > 100        // 结果 = 1\n100 > 100        // 结果 = 0\n\"Bear\" > \"Automobile\"\
  \    // 结果 = 1\n\"Atlanta\" > \"New York\"   // 结果 = 0\nGetAsDate ( \"1/15/2021\"\
  \ ) > GetAsDate ( \"1/10/2021\" )     // 结果 = 1\nGetAsDate ( \"1/15/2021\" ) > GetAsDate\
  \ ( \"7/10/2021\" )     // 结果 = 0\nGetAsTime ( \"12:30:00\" ) > GetAsTime ( \"9:15:00\"\
  \ )        // 结果 = 1\nGetAsTime ( \"9:30:00\" ) > GetAsTime ( \"10:45:00\" )   \
  \     // 结果 = 0\n```\n\n\n\n### 大于或等于\n\n比较两个值的相对位置可以使用*大于或等于*符号，或使用*大于*符号后跟一个*等号*。如果左侧的值在位置上大于或等于右侧的值，则表达式计算结果为真，如下例所示：\n\
  \n```\n100 ≥ 100        // 结果 = 1\n100 ≥ 150        // 结果 = 0\n\"Bear\" >= \"Automobile\"\
  \    // 结果 = 1\n\"New York\" >= \"Ohio\"      // 结果 = 0\nGetAsDate ( \"1/15/2021\"\
  \ ) ≥ GetAsDate ( \"7/20/2016\" )     // 结果 = 1\nGetAsDate ( \"1/15/2021\" ) ≥ GetAsDate\
  \ ( \"7/10/2021\" )     // 结果 = 0\nGetAsTime ( \"12:30:00\" ) ≥ GetAsTime ( \"12:30:00\"\
  \ )       // 结果 = 1\nGetAsTime ( \"9:30:00\" ) ≥ GetAsTime ( \"10:45:00\" )    \
  \    // 结果 = 0\n```\n\n**提示**  \n在 macOS 上，按住 `Option` 键并输入*大于*符号即可创建 `≥` 符号。\n\n\
  ### 小于\n\n使用*小于*符号比较两个值的相对位置。如果右侧的值在位置上大于左侧的值，则表达式计算结果为真。\n\n```\n100 < 350    \
  \    // 结果 = 1\n100 < 100        // 结果 = 0\n\"Automobile\" < \"Car\"    // 结果 =\
  \ 1\n\"New York\" < \"New York\" // 结果 = 0\nGetAsDate ( \"7/20/2016\" ) < GetAsDate\
  \ ( \"1/15/2021\" )     // 结果 = 1\nGetAsDate ( \"7/10/2021\" ) < GetAsDate ( \"\
  1/15/2021\" )     // 结果 = 0\nGetAsTime ( \"9:15:00\" ) < GetAsTime ( \"12:30:00\"\
  \ )        // 结果 = 1\nGetAsTime ( \"10:45:00\" ) < GetAsTime ( \"9:30:00\" )   \
  \     // 结果 = 0\n```\n\n### 小于或等于\n\n比较两个值的相对位置可以使用*小于或等于*符号，或使用*小于*符号后跟一个*等号*。如果左侧的值在位置上小于或等于右侧的值，则表达式计算结果为真，如下例所示：\n\
  \n```\n100 ≤ 100       // 结果 = 1\n100 ≤ 50        // 结果 = 0\n\"Automobile\" <= \"\
  Bear\"   // 结果 = 1\n\"Ohio\" <= \"New York\"     // 结果 = 0\nGetAsDate ( \"7/20/2016\"\
  \ ) ≤ GetAsDate ( \"1/15/2021\" )     // 结果 = 1\nGetAsDate ( \"7/10/2021\" ) ≤ GetAsDate\
  \ ( \"1/15/2021\" )     // 结果 = 0\nGetAsTime ( \"12:30:00\" ) ≤ GetAsTime ( \"12:30:00\"\
  \ )       // 结果 = 1\nGetAsTime ( \"10:45:00\" ) ≤ GetAsTime ( \"9:30:00\" )    \
  \    // 结果 = 0\n```\n\n**提示**  \n在 macOS 上，按住 `Option` 键并输入*小于*符号即可创建 `≤` 符号。\n\n\
  ### 逻辑运算符\n\n*逻辑运算符*是一种关键字，用于通过将两个或多个单独的表达式连接成一个表达式来构建复合条件，或者在某些情况下，用于否定单个表达式以反转布尔结果。使用逻辑运算符的表达式结果将是一个布尔值。\n\
  \n**提示**  \n使用括号有助于可视化逻辑运算符两侧的各个表达式，并确保正确的执行顺序。\n\n### AND\n\n`AND` 运算符用于将两个独立的布尔表达式组合成一个复合方程，仅当两个表达式的结果都为真时，该复合方程才求值为真。\n\
  \n```\n( 150 > 100 ) AND ( \"Bear\" > \"Automobile\" )       // 结果 = 1\n( 150 >\
  \ 100 ) AND ( \"Bear\" = \"Automobile\" )       // 结果 = 0\n```\n\n### OR\n\n`OR`\
  \ 运算符用于将两个独立的布尔表达式组合成一个复合方程，如果两个表达式中至少有一个结果为真，则该复合方程求值为真。\n\n```\n( 150 > 100 )\
  \ OR ( \"Bear\" < \"Automobile\" )       // 结果 = 1\n( 150 < 100 ) OR ( \"Bear\"\
  \ = \"Automobile\" )       // 结果 = 0\n```\n\n### XOR\n\n`XOR` 运算符用于将两个独立的布尔表达式组合成一个复合方程，仅当两个方程中只有一个结果为真时，该复合方程才求值为真。如果两个方程都为真，则返回假。\n\
  \n```\n( 150 > 100 ) XOR ( \"Bear\" > \"Automobile\" )       // 结果 = 0\n( 150 >\
  \ 100 ) XOR ( \"Bear\" ≠ \"Automobile\" )       // 结果 = 1\n( 150 < 100 ) XOR ( \"\
  Bear\" ≠ \"Automobile\" )       // 结果 = 1\n( 150 < 100 ) XOR ( \"Bear\" = \"Automobile\"\
  \ )       // 结果 = 0\n```\n\n### NOT\n\n`NOT` 运算符是一种独特的逻辑运算符，它会否定其右侧任何表达式的结果，从而反转该表达式的布尔结果。如果表达式求值为真，在此运算符前加上它，将反转为返回假，反之亦然。\n\
  \n```\nNOT ( 150 > 100 )                       // 结果 = 0\nNOT ( \"Tuesday\" < \"\
  Monday\" )            // 结果 = 1\n```\n\n还可以通过将表达式的布尔结果与 `0` 进行比较来实现反转。在此示例中，括号内表达式产生的假（`0`）结果通过随后与\
  \ `0` 的比较而被反转：\n\n```\n( 150 < 100 ) = 0                      // 结果 = 1\n```\n\n\
  ## 数学运算符\n\n*数学运算符*是一种符号，用于对一个或多个值或表达式执行或控制算术运算。数学运算不仅可以对数字执行，也可以对其他数据类型（如日期、时间和时间戳）执行。\n\
  \n**注意**  \n对于数学运算，日期和时间会转换为数字（第 8 章“定义字段数据类型”）。\n\n### 加法\n\n*加号*符号用于将右侧的值加到左侧的值上。\n\
  \n```\n100 + 50                        // 结果 = 150\nGetAsDate ( \"1/5/2021\" ) +\
  \ 5    // 结果 = 1/10/2017\nGetasTime ( \"1:15:00\" ) + 300   // 结果 = 1:20:00\n```\n\
  \n### 减法\n\n*减号*符号用于从左侧的值中减去右侧的值。\n\n```\n100 – 50                        // 结果\
  \ = 50\nGetAsDate ( \"1/5/2021\" ) - 2    // 结果 = 1/3/2017\nGetasTime ( \"1:15:00\"\
  \ ) - 300   // 结果 = 1:10:00\n```\n\n### 乘法\n\n*乘号*符号用于将左侧的值乘以右侧的值。\n\n```\n100 *\
  \ 50                      // 结果 = 5000\nGetAsDate ( \"1/5/2021\" ) * 2  // 结果 =\
  \ 1475590\n```\n\n### 除法\n\n*除号*符号用于将左侧的值除以右侧的值。\n\n```\n100 / 50              \
  \         // 结果 = 2\nGetAsTime ( \"1:15:00\" ) / 2    // 结果 = 2250\n```\n\n### 乘方\n\
  \n*乘方*符号用于将左侧的值提升到右侧值的幂。\n\n```\n100²\n```\n\n### 优先级\n\n一组*圆括号*用于改变*求值优先级*（本章后面会讨论）。FileMaker\
  \ 会从左到右计算公式，但会首先计算括号内的表达式，遵循由内向外以及基于优先级的顺序。尽管以下两个方程式对相同的数字以相同的顺序执行相同的数学运算，但由于使用括号控制优先级，结果截然不同：\n\
  \n```\n100 * 2 + 50 / 25                // 结果 = 202\n( ( 100 * 2 ) + 50 ) / 25 \
  \       // 结果 = 10\n```\n\n\n\n### 文本运算符\n\n`文本运算符`是一种用于构建方程式的符号，它可以将文本项组合成单个项，并执行其他与文本相关的功能。这些功能包括引号、文本连接、段落回车和反斜杠。\n\
  \n#### 引用文本\n\n一对`引号`用于表示字面文本常量。在公式中输入的文本如果没有引号，则会被解释为`字段`、`函数`或`变量`。日期和时间常量必须用引号括起来。\n\
  \n```\n\"John\"\n\"1/15/2021\"\n```\n\n#### 连接文本\n\n`&`符号用于将文本值连接成单个值。\n\n```\n\"\
  John\" & \" \" & \"Smith\"        //结果 = John Smith\n```\n\n#### 段落回车\n\n`段落回车`符号用于在文本值中插入一个回车符，且可以放在计算式中。虽然如第二个示例所示，可以在引号外放置单个回车符，但将多个回车符放在引号外会产生错误，导致编译失败。以下三个示例都返回相同的结果：\n\
  \n```\n\"John Smith\" & \"¶\" & \"Jim Smith\"\n\"John Smith\" & ¶ & \"Jim Smith\"\
  \n\"John Smith¶Jim Smith\"\n// 结果 = John Smith¶Jim Smith\n```\n\n提示\n\n在 macOS 上，按住`Option`键并输入“7”即可创建段落回车符号。\n\
  \n#### 反斜杠\n\n引号是运算符，实际上并不属于它们所包含的值的一部分。反斜杠符号用于强制将运算符按字面意义使用。这被称为`转义字符串`，因为它允许在字符串中使用运算符而不会引起错误。例如，反斜杠后面跟着一个引号符号，会强制该引号符号被视为文本并成为结果的一部分。如果没有反斜杠，FileMaker\
  \ 会将该公式解释为存在语法错误，并且不允许保存。\n\n```\n5\"                 // 结果 = 语法错误，不会编译\n\"5\\\"\
  \"              // 结果 = 5\"\n\"Hello, World\"     // 结果 = Hello, World\n\"\\\"Hello,\
  \ World\\\"\" // 结果 = \"Hello, World\"\n```\n\n提示\n\nFileMaker 内置的 `Quote()` 函数会自动将现有值包裹在引号文本中。\n\
  \n#### 保留名称\n\nFileMaker 允许将保留关键字或函数名称用作表名或字段名。然而，在公式中引用这些名称时，可能会发生错误，因为 FileMaker\
  \ 无法区分它是一个字段引用还是一个运算符或函数调用。例如，你可以将字段命名为 `AND`，但在公式中引用它时，必须用花括号括起来并在前面加上美元符号，才能被解释为字段并成功编译：\n\
  \n```\n${AND}\n```\n\n提示\n\n避免使用保留名称作为表名或字段名！\n\n### 理解运算符优先级\n\n计算公式中的运算符按照以下优先级顺序进行求值：\n\
  \n1.  注释\n2.  空格、反斜杠、段落回车、保留名称\n3.  括号\n4.  `NOT`\n5.  幂运算（`^`）\n6.  乘法和除法\n7. \
  \ 加法和减法\n8.  连接符号（&）\n9.  等于、不等于、大于、小于、大于等于、小于等于\n10. `OR`、`XOR`\n\n### 保留字\n\n\
  `保留字`是 FileMaker 用于函数名、预定义参数和运算符以及构造 SQL 语句的词、术语或符号。为了避免编写公式时出现问题，不应将这些词用作表、字段、自定义函数和其他对象的名称。Claris\
  \ 在其网站上通过搜索“Reserved words in FileMaker Pro”或访问以下地址提供了一个列表：\n\n```\nhttps://support.claris.com/s/article/Reserved-words-in-FileMaker-Pro-1503693036814\n\
  ```\n\n### 变量\n\n`变量`是一个由开发者命名的字母、单词或短语，它存储一个可以在计算公式和开发界面其他位置使用的值。\n\n#### 变量类型\n\
  \nFileMaker 有三种不同的变量类型，每种都有不同的命名要求和作用域：`语句变量`、`局部变量`和`全局变量`。虽然变量可以使用多种不同格式命名，但需牢记一些通用的命名注意事项。变量名称应避免使用保留字和字段名，以防止公式中的混淆和冲突。与其他地方的名称一样，变量名应简洁以避免杂乱，但同时要有足够的描述性清晰度来表明其包含的数据。总体而言，大小写要保持一致；选择`驼峰式`（`variableNameExample`）、`点分隔式`（`variable.name.example`）、`下划线分隔式`（`variable_name_example`）或你选择的其他格式。\n\
  \n##### 语句变量\n\n`语句变量`是在 `Let` 或 `While` 语句（第 13 章）中初始化的变量。这些变量仅在该语句被积极求值时存在。除了常规限制外，FileMaker\
  \ 对语句变量没有特殊的命名要求。名称可以短至单个字符，也可以像以下任一示例那样是冗长的多词短语。由于语句变量仅限于定义它们的语句内部，它们不会与其他公式中的同名变量或同一公式中该语句外部的同名变量产生冲突。因此，标准化的名称可以在不同公式间重复使用，无需担心冲突。\n\
  \n```\nX\ndata\nfirstName\nfirst_Name\ndateToProcess\ntable.name\n```\n\n##### 局部变量\n\
  \n`局部变量`是在公式、自定义函数求值期间或脚本执行期间暂时存在的变量。局部变量可以在 `Let` 或 `While` 语句（第 13 章）中以及通过 `设置变量`\
  \ 脚本步骤（第 25 章）进行初始化，并有多种用途。在脚本中的某个位置存储信息，以便在同一脚本中稍后使用；在脚本和自定义函数之间共享信息；或者在递归自定义函数（第\
  \ 15 章）中从一个迭代到下一个迭代存储信息。FileMaker 要求局部变量必须以单个美元符号为前缀。除此之外，名称可以短至单个字符，也可以像以下示例中那样是冗长的多词短语，并且可以使用各种分隔符。由于局部变量仅限于定义它们的公式或脚本，它们通常不会与其他脚本中的同名变量冲突。但是，从同一脚本对自定义函数进行多次调用时，会保留该函数使用的所有局部变量。\n\
  \n```\n$x\n$data\n$firstName\n$recordNumber\n$dateToProcess\n$date.to.process\n\
  $date_to_process\n```\n\n\n\n### 全局变量\n\n`全局变量`是一种可从单个数据库文件内任何位置的任何公式访问的变量，并且会持续存在直到文件关闭。与局部变量类似，全局变量可以在`Let`或`While`语句以及`设置变量`脚本步骤中进行初始化。全局变量可用于存储控制自定义功能的自定义偏好设置、为某个目的而准备的暂存数据，或记录故障排除信息，以帮助追踪复杂多脚本流程或迭代公式中的问题。\n\
  \n**提示：** 将全局变量限制在文件内*真正全局*使用的信息范围内！避免使用它们来在脚本之间交换数据；应改用参数（参见第 24 章）。\n\nFileMaker\
  \ 要求全局变量以双美元符号前缀命名。除此之外，名称可以短至单个字符，也可以是较长的多词短语，并且可以使用各种分隔符，如下例所示。由于它们是全局变量，每个变量都必须唯一且仔细命名，以避免与同一文件中用于不同目的的其他全局变量产生混淆和冲突。但是，由于它们不在文件之间共享，因此可以在不同文件中重复使用标准化的名称，而无需担心它们会相互覆盖。\n\
  \n```\n$$x\n$$data\n$$firstName\n$$recordNumber\n$$dateToProcess\n$$date.to.process\n\
  $$date_to_process\n```\n\n**提示：** *数据查看器*（第 26 章“探索数据查看器”）可用于随时监控全局变量，并在脚本执行期间监控局部变量。\n\
  \n## 探索计算界面\n\n要试验公式，请使用 *Learn FileMaker* 数据库中 *Sandbox* 表的 *示例计算* 字段。首先，请按照以下步骤操作：\n\
  \n1.  打开 *Learn FileMaker* 数据库。\n2.  切换到 *Sandbox* 布局。\n3.  选择 *文件 ➤ 管理 ➤ 数据库* 菜单项。\n\
  4.  点击 *字段* 选项卡。\n5.  确认左上角 *表* 弹出菜单中为 *Sandbox*。\n6.  点击 *示例计算* 字段。\n7.  点击 *选项*\
  \ 按钮。\n\n### 探索“指定计算”对话框\n\n所有公式都在“指定计算”对话框中编写，如图 12-2 所示。\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig2_HTML.jpg](img/429700_2_En_12_Fig2_HTML.jpg)\n\
  \n**图 12-2** 用于指定计算公式的对话框窗口\n\n1.  *字段选择器面板* – 选择一个表 occurrence 并选择一个字段，以将字段引用插入到公式中。\n\
  2.  *上下文指示器* – 仅针对计算字段，如果字段的表存在多个 occurrence，则选择一个 occurrence 作为公式的上下文。\n3.  *公式文本区域*\
  \ – 这是公式的代码。通过单击左侧和右侧的面板来输入、拖放、复制粘贴或插入内容以构建公式。\n4.  *运算符* – 使用这些按钮快速插入运算符。\n5. \
  \ *函数面板* – 可以插入到公式中的内置函数、自定义函数和插件提供函数的列表。它们可以按层级或字母顺序排列。\n6.  仅针对计算字段的设置：\n    *\
  \   *计算结果为* – 为字段计算结果选择数据类型。其他公式会根据对象或函数类型自动指定，例如，按钮名称必须为文本。\n    *   *重复次数* – 指定重复次数。\n\
  \    *   *不计算复选框* – 选择后，如果公式中引用的每个字段都为空，则自动返回无值。\n    *   *存储选项* – 打开存储选项对话框。\n\n\
  ## 编写公式\n\n公式可以包含任意组合的组件，其复杂程度差异很大。本节中的所有示例都假设公式是在 *Learn FileMaker* 数据库的 `Sandbox::示例计算`\
  \ 字段中输入的，因此您可以在 *Sandbox 表单* 布局上的该字段中看到结果。\n\n### 仅含常量的公式\n\n`仅含常量`的公式是指无需执行任何实际操作即可计算为字面值的公式。它基本上是一条包含单个值的语句，该值始终会计算出相同的结果。这些公式具有实际价值，可作为存储静态信息的一种方式，例如当前税率或用作关系匹配字段以连接到特定类型的相关记录子集的值。现在，它将作为最基本的示例，帮助我们开始编写简单的公式。在公式区域中输入\
  \ `\"Hello World\"`，然后选择 `文本` 作为计算结果数据类型。此时对话框应如图 12-3 所示。保存公式后，布局上的 *示例计算* 字段应为每条记录显示文本\
  \ `\"Hello World\"`。结果相同是因为公式返回了一个静态值。要使结果随记录变化，公式需要包含随记录变化的组件，例如字段引用。\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig3_HTML.jpg](img/429700_2_En_12_Fig3_HTML.jpg)\n\
  \n**图 12-3** 具有静态结果的简单计算公式\n\n### 制造故意的错误\n\n在继续之前，理解语法错误和结果错误之间的区别很重要。`语法错误`是指代码格式或语言方面的错误，会导致尝试编译和保存公式时失败。为了用简单的常量公式说明这一点，请从前面的公式中删除最后的引号符号。当您尝试保存计算时，FileMaker\
  \ 将显示如图 12-4 所示的错误对话框消息。检测到语法错误时，FileMaker 将不允许您保存公式，直到其格式正确为止。并非每条语法错误消息都这么具体，但它通常会提供足够的信息来帮助确定错误的性质。\n\
  \n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig4_HTML.jpg](img/429700_2_En_12_Fig4_HTML.jpg)\n\
  \n**图 12-4** 公式语法错误的示例错误消息\n\n相比之下，已编译并保存的公式可能会产生`结果错误`，表明公式的设置或其一个或多个操作中使用的组件存在问题。在这种情况下，公式的结果将显示为一个问号。为了说明这一点，请恢复公式的结束引号以消除语法错误。然后将“计算结果为”弹出菜单中的选择更改为`日期`、`时间`或`时间戳`。FileMaker\
  \ 将允许保存公式，因为语法正确，并且它不会将结果类型设置（`date`）与实际结果数据类型（`text`）进行比较，因为它假设您已负责任地创建了一个能产生您所指示结果的公式。当您查看记录上的字段时，结果将显示为一个问号。并非所有类型不匹配都会产生语法错误。有些类型（如`数字`和`容器`）会显示看起来正常但可能在搜索、排序或在其他公式中使用信息时表现不符合预期的文本结果。\n\
  \n\n\n### 存储选项实验\n\n与输入字段类似，计算字段也拥有*存储选项*，用于控制公式结果的存储方式，如图 12-5 所示。*全局存储*和*索引*的设置与*输入*字段类似（见第\
  \ 8 章），但多了一个索引选项。勾选`不存储计算结果`复选框会强制计算字段永远不索引结果，而是在每次访问或显示该字段时自动重新计算。创建新字段时，此复选框默认处于未选中状态。\n\
  \n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig5_HTML.jpg](img/429700_2_En_12_Fig5_HTML.jpg)\n\
  \n**图 12-5** 已禁用索引的存储选项对话框\n\n为了演示存储的效果，先配置一个返回*文本*结果的`\"Hello World\"`公式，并保持`不存储`复选框未选中。保存公式，并在浏览模式下确认字段正确显示。然后再次打开公式，在文本前输入两个正斜杠，将整个公式转换为注释，如下例所示。\n\
  \n```\n// \"Hello World\"\n```\n\n不做其他修改，保存公式并再次在浏览模式下查看。如果它仍然显示值“Hello World”，好像什么都没变，不必惊讶。这是因为现有记录中存储了计算结果。如果选择`记录\
  \ ➤ 新建记录`菜单，新记录将在该字段中正确显示空白值，反映出公式已被注释掉的事实。由于复选框设置为不重新计算结果，先前记录的旧值会保持不变，直到有事件触发更新才会改变。\n\
  \n与其他字段类型一样，计算字段使用索引设置以某种方式预处理数据，从而加快搜索速度或建立关系。然而，此设置允许计算字段在没有其他事件触发重新计算时，不重新计算更新的结果。如果公式被大幅修改，则*会*提示每条记录刷新结果。例如，如果公式更改为一个完全不同的文本常量，它将更新并显示新值。为了强制上述被注释掉的例子正确工作，请勾选`不存储计算结果`复选框，保存，然后在浏览模式下查看。所有记录（包括现有记录）的该字段都将为空。\n\
  \n尽管这个简单的例子并不能实际代表你将会面临的各类挑战，但它清晰地说明了在某些情况下你需要调整存储设置。例如，使用了`Get ( FoundCount )`或`Get\
  \ ( RecordNumber )`等内置函数的公式将*需要*通过勾选禁止存储的复选框来强制重新计算。与此不同，包含字段引用的公式则会在这些字段值被修改时*自动*更新。\n\
  \n### 插入公式组件\n\n`指定计算`对话框允许在公式中插入*字段引用*、*函数*和*运算符*。输入文本有多种方式：键入、复制粘贴或拖放文本。字段引用和函数调用也可以通过双击对话框两侧窗格中的项目来插入。\n\
  \n#### 使用自动完成\n\n对话框的公式区域将文本输入与动态辅助功能相结合，该功能可以检测关键短语并提供*自动完成建议界面*，如图 12-6 所示。当你输入时，可用组件的列表会刷新，包含以你输入的字母或短语开头的所有内置函数、自定义函数和字段的混合列表。在示例中，输入字母“E”会显示一个包含三个函数和一堆字段的列表。当你继续输入“Ex”、“Exa”和“Exam”时，列表会持续过滤，直到只看到我们的示例字段列表。\n\
  \n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig6_HTML.jpg](img/429700_2_En_12_Fig6_HTML.jpg)\n\
  \n**图 12-6** 公式输入时自动完成功能的示例\n\n当自动完成列表出现时，你可以选择忽略它继续输入，或者选择一个项目进行快速插入。可以通过滚动、使用方向键垂直导航，或继续输入足够多的文本直到所需项目成为列表顶部的默认选项，来定位列表中的项目。一旦找到并选中后，可以通过双击或按`回车`键将其插入到公式中。\n\
  \n#### 使用字段选择窗格\n\n*字段选择面板*，如图 12-7 所示，用于定位和插入字段引用。\n\n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig7_HTML.jpg](img/429700_2_En_12_Fig7_HTML.jpg)\n\
  \n**图 12-7** 对话框左侧的字段选择窗格\n\n顶部的弹出式菜单用于选择下方列出其字段的哪个表 occurrence。默认选择基于当前上下文。编辑计算字段时，默认将是包含正在定义字段的表，occurrence\
  \ 列表将分为相关和无关 occurrence，以帮助区分哪些关系可以使用。当为布局对象、脚本步骤或其他项目编辑公式时，列表默认为当前布局的表，并按字母顺序列出所有\
  \ occurrence，你需要负责根据执行时活动的适当上下文，安全地选择一个有效的关系。选择一个 occurrence 后，字段列表会更新，并可以搜索或排序。要将引用插入公式，双击它即可。\n\
  \n#### 使用函数选择窗格\n\n*函数选择面板*，如图 12-8 所示，用于定位和将函数插入到公式中。它包含一个*内置函数*（第 13 章）、*自定义函数*（第\
  \ 15 章）和*插件函数*（第 28 章）的列表。函数列表可以按类别分组（如图所示），或者使用排序图标下的菜单按字母顺序列出。可以通过在文本区搜索关键词，或者从排序菜单中选择一个类别来搜索。找到所需函数后，双击它即可将其插入公式。在此面板底部有一段简短的描述和一个帮助按钮，用于打开所选函数的在线文档。\n\
  \n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig8_HTML.jpg](img/429700_2_En_12_Fig8_HTML.jpg)\n\
  \n**图 12-8** 对话框右侧的函数窗格\n\n### 创建重复计算字段\n\n通过在`指定计算`对话框底部的`重复次数`中输入一个数字，可以将计算字段定义为重复字段。重复计算字段的工作原理类似于重复输入字段（第\
  \ 8 章）。但是，在处理重复计算字段时，可能需要一些技术和内置函数。\n\n\n\n#### 在重复计算中使用重复字段\n\n当公式中使用的所有字段与计算字段配置了相同数量的重复次数时，重复计算将按预期工作。图\
  \ 12-9 所示的示例展示了两个包含数字的输入字段，这些数字相加后进入计算字段的总和。每个字段都定义为 *三个重复项*。在该示例中，计算字段的公式被定义为将这些数字相加。该公式会自动应用于两个输入字段的每组重复项，并将每个结果值放入计算字段的对应重复项中。\n\
  \n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig9_HTML.jpg](img/429700_2_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9：所有字段具有相同重复次数的计算示意图\n\n```\n重复数字 1 + 重复数字 2\n```\n\n#### 在重复计算中使用非重复字段\n\
  \n当在重复计算字段的公式中使用*非重复字段*时，请使用 `Extend` 函数来*虚拟扩展*非重复字段，使其匹配重复次数。图 12-10 所示的示例展示了一个单重复输入字段、另一个具有三个重复的输入字段以及一个具有三个重复的计算字段。\n\
  \n![../images/429700_2_En_12_Chapter/429700_2_En_12_Fig10_HTML.jpg](img/429700_2_En_12_Fig10_HTML.jpg)\n\
  \n图 12-10：重复字段与非重复字段混合的示意图\n\n为了使公式能够成功地将非重复字段中的值应用于重复字段中的每个值并生成三个结果，公式必须按如下例所示扩展非重复字段。该单一值将被视为三个独立的重复项，每个重复项都填充相同的值。\n\
  \n```\n扩展 ( 非重复数字 ) + 重复数字 1\n```\n\n#### 其他重复函数\n\n还有其他内置函数在*重复*和*非重复*计算中都很有用。`Get\
  \ ( ActiveRepetitionNumber )` 函数返回一个数字，指示当前字段的哪个重复项拥有光标焦点。这可用于与界面相关的计算和脚本步骤，以确定光标在重复字段中的位置。`GetRepetition`\
  \ 函数可用于从指定重复字段的特定重复项中提取值。`Get ( CalculationRepetitionNumber )` 函数返回一个数字，指示当前正在计算的重复计算字段的哪个重复项。这使得计算字段公式能够在每个重复项需要执行略有不同功能时，知道当前正在评估其自身字段结构中的哪个重复项。\n\
  \n### 为视觉格式留出空间\n\n在编译公式时，FileMaker 会忽略引用文本之外的任何多余空格、制表符和段落回车符。这意味着您可以在公式中添加空白来展开代码，使其更易于阅读。在编写公式时，考虑制定一个策略，始终在项目之间添加空格，将复杂的语句扩展到更易于阅读的格式。\n\
  \n#### 在项目之间添加空格\n\n可以在公式组件之间添加空格，以水平展开文本，使其更易于阅读。下面的代码配对显示了一个没有空格的紧凑示例，以及同一行添加空格后的效果。在每组中，两者功能完全相同。\n\
  \n```\n(150+50)/25\n( 150 + 50 ) / 25\n$FirstName&$Space&$LastName\n$FirstName &\
  \ $Space & $LastName\nGet(CurrentDate)\nGet ( CurrentDate )\n```\n\n#### 展开复杂语句\n\
  \n涉及复杂 `Case`、`Let`、`Substitute`、`While` 和某些 `JSON` 函数（第 13 章和第 14 章）的公式可以从空格、制表符和回车符中受益。虽然确切的格式可能因语句的复杂性和嵌套子句的使用而异，但以下简单示例展示了作者偏爱的几种格式模式，用于分隔和缩进复杂语句以增强其视觉格式：\n\
  \n```\n// CASE 示例\nCase (\n条件 1 = 结果 1 ;\n条件 2 = 结果 2\n)\n// LET 示例\nLet ( [\n变量\
  \ 1 = 表达式 1 ;\n变量 2 = 表达式 2\n] ;\n计算\n)\n// SUBSTITUTE 示例\nSubstitute (\n文本 ;\n\
  [ 搜索字符串 1 ; 替换字符串 1 ] ;\n[ 搜索字符串 2 ; 替换字符串 2 ]\n)\n```\n\n#### 管理字符限制\n\nFileMaker\
  \ 将每个公式的总文本限制为 30,000 个字符。在编写冗长公式时，人们自然倾向于*避免*添加空格、制表符和段落回车符以节省空间并避免达到该限制。但是，有一些技术可以在*不*要求代码变得紧凑且难以阅读的情况下管理空间。首先，评估公式如此长的原因。除了一些例外情况，冗长的公式通常包含冗余的元素和短语。一个重复使用的长字段引用可以通过\
  \ `Let` 语句（第 13 章）压缩成一个更短的语句变量。例如，字段引用 `Contact::Contact Name First` 可以被放入一个名为 “nameFirst”\
  \ 之类的变量中并重复使用，后续每次实例占用的空间大大减少。此外，在不失清晰度的前提下重命名变量以缩短其长度可以节省空间。公式的某些部分可以卸载到自定义函数中（第\
  \ 25 章），尤其是当该功能是通用的并且在数据库的其他地方使用。另一个选择是将复杂的计算分解为单独的字段或脚本步骤，而不是试图将庞大的过程强行塞入一个公式中。\n\
  \n**提示** 养成高效编码的习惯，无论公式长度如何，都要密切关注清晰度并采用高效的技术设计。\n\n### 向示例文件添加简单计算\n\n为了实验公式，可以在\
  \ *Learn FileMaker* 数据库的表中添加几个简单的计算。\n\n#### 公司联系人计数\n\n在 *Company* 表中，按照以下步骤添加一个名为\
  \ “Company Contact Count” 的新计算字段，该字段的公式用于计算相关的联系人记录：\n\n1. 打开 *管理数据库* 对话框，为 *Company*\
  \ 表选择 *字段* 选项卡。\n2. 创建新的计算字段。\n3. 从字段选择面板的弹出菜单中选择 *Company | Contact* 表出现项。\n4.\
  \ 在公式区域，开始输入“Count”并从自动完成列表中选择 `Count` 函数。\n5. 双击 *Company | Contact* 表出现项中的 *Record\
  \ ID* 字段。公式应显示为：`Count ( Company | Contact::Record ID )`\n6. 确保结果类型为 *数字*。\n7. 点击保存并关闭对话框。\n\
  8. 将此新字段放置在 *Company* 布局上，以确认它能准确统计每个公司的相关联系人数量。请记住，根据公司对联系人的分配情况，不同记录中的计数会有所不同。\n\
  \n\n\n### 联系人全名与地址标签\n\n在`Contact`表中，添加一个名为`Contact Name Full`的新计算字段，并定义公式来拼接名字和姓氏。此字段可在布局和计算中使用，无需反复单独引用这两个字段。\n\
  \n```\nContact Name First & \" \" & Contact Name Last\n```\n\n接着，添加另一个名为`Contact\
  \ Address Label`的字段，定义公式将地址格式化为单个文本值。公式如下：\n\n```\nContact::Contact Name Full &\
  \ \"¶\" &\nContact::Contact Address Street & \"¶\" &\nContact::Contact Address City\
  \ & \", \" &\nContact::Contact Address State & \" \" &\nContact::Contact Address\
  \ Zip\n// 结果 = Karen Smith\n// 521 Loft Street\n// Sleepytown, CA 55555\n```\n\n\
  > **提示**  \n> 使用`Case`或`List`函数（见第 13 章）来构建标签，避免因空字段中缺失信息而导致多余空格。\n\n## 总结\n\n本章介绍了编写公式的基础知识。在下一章中，我们将看到许多使用各种实用内置函数的实际公式示例。\n\
  \n"
- "# 13. 探索内置函数\n\nFileMaker 包含一个包含超过 300 个内置函数的库，这些函数可在公式中使用以执行常见功能。本章将探讨许多重要的内置函数，涵盖以下主题：\n\
  \n- 处理数字、日期和时间\n- 处理文本\n- 处理值列表\n- 介绍`Get`函数\n- 访问字段\n- 聚合数据\n- 使用语句函数\n\n> **注意**\
  \  \n> 尽管大多数示例使用字面值作为参数，但请记住，这些参数可以是变量、字段引用、嵌套表达式，甚至是对其他函数的嵌套调用。\n\n## 处理数字、日期和时间\n\
  \n有许多函数可用于获取、生成、解析和操作数字、日期和时间。\n\n### 使用数字函数\n\n除了基本的数学运算外，还有许多内置函数提供更高级的数字功能：`Int`、`Random`、`Round`、`Mod`、`SetPrecision`和`Truncate`。\n\
  \n#### `Int`\n\n`Int`函数通过丢弃小数点右侧的任意位数（不进行四舍五入）来返回数字的整数部分。\n\n```\nInt ( 34.2653\
  \ )  // 结果 = 34\nInt ( -2.85 )    // 结果 = -2\nInt ( 10 / 3 )   // 结果 = 3\n```\n\n\
  #### `Random`\n\n`Random`函数生成一个介于 0 和 0.99999999999999999999 之间的伪随机数。结果可以乘以任意整数以生成介于\
  \ 0 和该整数之间的随机数。\n\n```\nRandom                  // 结果 = .69521348632189605699\n\
  Random                  // 结果 = .49928041600104466902\nRandom                  //\
  \ 结果 = .16828354164749970145\nInt ( 10 * Random )     // 结果 = 8\nInt ( 10 * Random\
  \ )     // 结果 = 3\nInt ( 25 * Random )     // 结果 = 4\nInt ( 25 * Random )     //\
  \ 结果 = 16\n```\n\n#### `Round`\n\n`Round`函数将数字四舍五入到指定的小数位数。它接受`number`和`precision`参数，其中`precision`是结果中应包含的小数位数。\n\
  \n```\nRound ( 10.1564 ; 2 )   // 结果 = 10.16\nRound ( 10 / 3 ; 0 )    // 结果 = 3\n\
  ```\n\n#### `Mod`\n\n`Mod`函数计算数字除以除数后的余数。它接受`number`和`divisor`作为参数。这可用于转换度量单位，例如将秒转换为分钟、分钟转换为小时或天数转换为年数。\n\
  \n```\nMod ( 100 ; 60 )        // 结果 = 40\nMod ( 410 ; 365 )       // 结果 = 45\n\
  Int ( 310 / 60 ) & \" hours, \" & Mod ( 310 ; 60 ) & \" minutes\"\n// 结果 = 5 hours,\
  \ 10 minutes\n```\n\n#### `SetPrecision`\n\n`SetPrecision`函数以指定精度计算数学表达式。这不是四舍五入或截断函数，而是一种扩展小数精度的方法，超出\
  \ FileMaker 默认的 16 位精度。它接受`expression`和`precision`作为参数，其中`precision`是 16 到 400 之间的数字，表示所需的精度。提供小于\
  \ 16 的精度值将返回默认的 16 位精度。\n\n```\n22 / 7                          // 结果 = 3.1428571428571429\n\
  SetPrecision ( 22 / 7 ; 20 )    // 结果 = 3.14285714285714285714\nSetPrecision ( 22\
  \ / 7 ; 30 )    // 结果 = 3.142857142857142857142857142857\n```\n\n#### `Truncate`\n\
  \n`Truncate`函数将数字截断到指定的小数精度，不进行四舍五入。它接受`number`和`precision`作为参数。\n\n```\nTruncate\
  \ ( 10.246913 ; 2 )      // 结果 = 10.24\nTruncate ( 22 / 7 ; 4 )         // 结果 =\
  \ 3.1428\n```\n\n### 处理日期和时间\n\n内置函数允许获取、创建、解析和计算日期和时间相关信息。\n\n#### 获取当前信息\n\n有几个`Get`函数返回当前日期、时间或时间戳。\n\
  \n```\nGet ( CurrentDate )              // 结果 = 1/15/2021\nGet ( CurrentTime ) \
  \             // 结果 = 2:05:10 PM\nGet ( CurrentTimestamp )         // 结果 = 1/15/2017\
  \ 2:05:10 PM\n```\n\n##### 获取协调世界时 (UTC)\n\n此函数返回当前协调世界时（UTC），精确到毫秒，不考虑当前时区。UTC\
  \ 以前称为格林威治标准时间（GMT），是用于调节时钟的主要时间标准。结果表示运行脚本的计算机的当前时间，格式为自“1/1/0001 12:00 AM”以来的毫秒数，不考虑用户的当前时区。\n\
  \n```\nGet ( CurrentTimeUTCMilliseconds )        // 结果 = 63603934624024\n```\n\n\
  要计算特定时区的时间，需考虑该区域的 UTC 时区调整。例如，当纽约市比 UTC 晚 4 小时时，以下公式将返回调整后的时间：\n\n```\nGetAsTimestamp\
  \ (\nRound ( ( Get ( CurrentTimeUTCMilliseconds )  + ( -4 * 3600000 ) ) / 1000 ;\
  \ 0 )\n)\n```\n\n> **警告**  \n> 协调世界时不考虑夏令时，因此上述示例在一年中的半年中会有一个小时的偏差，除非您的公式对该变化进行调整。\n\
  \n#### 创建日期\n\n`Date`函数接受数值型的`month`、`day`和`year`参数，并返回一个日期对象。以下示例演示如何创建日期对象。第一个示例提供了用于构造日期的三个值。第二个示例显示，任何参数都可以是表达式，这些表达式将在构造日期之前被计算。第三个示例显示，如果提供的月份或日期超出范围，函数将自动偏移到新的月份、日期或年份。例如，月份值为\
  \ 13 会导致函数自动返回下一年的 1 月日期。\n\n```\nDate ( 1 ; 15 ; 2021 )          // 结果 = 1/15/2021\n\
  Date ( 1 ; 15 ; 2021 + 10 )     // 结果 = 1/15/2031\nDate ( 13 ; 15 ; 2021 )     \
  \    // 结果 = 1/15/2022\n```\n\n自动日期偏移可用于动态计算任何月份的最后一天，无论该月有多少天。构造下个月的日期，但将日期设置为-1。结果将是指定月份第一天前一天，即上个月的最后一天。\n\
  \n```\nDate ( 4 ; -1 ; 2021 )          // 结果 = 3/30/2021\nDate ( 7 ; -1 ; 2021 )\
  \          // 结果 = 6/29/2021\n```\n\n\n\n### 解析日期\n\n以下每个解析函数都接受一个*日期参数*，并返回由函数名指示的特定组件。所提供的日期可以是来自日期字段的正式日期，也可以通过`Date()`函数构造。它也接受基于文本的字面日期。\n\
  \n```\nDay ( Date ( 1 ; 15 ; 2021 ) )   // result = 15\nDay ( \"2/26/2021\" )  \
  \                  // result = 26\nDayName ( Date ( 1 ; 15 ; 2021 ) )      // result\
  \ = Friday\nDayName ( \"6/27/1758\" )                 // result = Tuesday\nDayOfWeek\
  \ ( Date ( 1 ; 15 ; 2021 ) )    // result = 6\nDayOfWeek ( \"6/27/1758\" )     \
  \          // result = 3\nDayOfYear ( Date ( 1 ; 15 ; 2021 ) )    // result = 15\n\
  DayOfYear ( \"6/27/1758\" )               // result = 178\nMonth ( Date ( 1 ; 15\
  \ ; 2021 ) )        // result = 1\nMonth ( \"6/27/1758\" )                   //\
  \ result = 6\nMonthName ( Date ( 1 ; 15 ; 2021 ) )    // result = \"January\"\n\
  MonthName ( \"6/27/1758\" )               // result = \"June\"\nWeekOfYear ( Date\
  \ ( 1 ; 15 ; 2021) )    // result = 3\nWeekOfYear ( \"6/27/1758\" )            \
  \  // result = 26\nYear ( Date ( 1 ; 15 ; 2021 ) )         // result = 2021\nYear\
  \ ( \"6/27/1758\" )                    // result = 1758\n```\n\n`WeekOfYearFiscal()`函数根据指定的工作周起始日期，计算给定日期所在年份的周数。这在会计应用程序中很有用，用于计算某一年是否因为一周跨越了日历年的边界而多出一个付款周期。以下示例展示了\
  \ 2009 年 1 月 2 日（星期五）如何可以被视为 2009 年的第一周，或 2008 年的第五十三周，具体取决于作为周起始日的参数（第二个参数）所指定的数字。\n\
  \n```\nWeekOfYearFiscal ( \"1/2/2009\" ; 1 )     // result = 53\nWeekOfYearFiscal\
  \ ( \"1/2/2009\" ; 2 )     // result = 1\nWeekOfYearFiscal ( \"1/2/2009\" ; 3 )\
  \     // result = 1\nWeekOfYearFiscal ( \"1/2/2009\" ; 4 )     // result = 1\nWeekOfYearFiscal\
  \ ( \"1/2/2009\" ; 5 )     // result = 1\nWeekOfYearFiscal ( \"1/2/2009\" ; 6 )\
  \     // result = 1\nWeekOfYearFiscal ( \"1/2/2009\" ; 7 )     // result = 53\n\
  ```\n\n### 创建时间\n\n`Time()`函数接受数字类型的*小时*、*分钟*和*秒*参数，并返回一个时间对象。\n\n```\nTime ( 9\
  \ ; 15 ; 55 )    // result = 9:15:55\nTime ( 2 ; 8 ; 19 )     // result = 2:08:19\n\
  ```\n\n### 创建时间戳\n\n`Timestamp()`函数接受*日期*和*时间*参数，并返回一个时间戳对象。这些示例显示时间戳会自动为时间部分添加适当的\
  \ AM/PM 后缀。\n\n```\nTimestamp ( \"1/15/2021\" ; \"9:15:55\" )\n// result = 1/15/2021\
  \ 9:15:55 AM\nTimestamp ( Date ( 5 ; 10 ; 1990 ) ; Time ( 10 ; 30 ; 00 ) )\n// result\
  \ = 5/10/1990 10:30:00 AM\n```\n\n如果小时超出了正常范围（例如使用 24 小时制时间），函数会自动将其转换为 12 小时制时间，并同样添加适当的\
  \ AM/PM 后缀：\n\n```\nTimestamp ( \"1/15/2021\" ; \"15:15:55\" )\n// result = 1/15/2021\
  \ 3:15:55 PM\n```\n\n### 解析时间\n\n以下每个函数都接受一个*时间*或*时间戳*参数，并返回一个特定的组件。\n\n```\nHour\
  \ ( \"09:15:55 AM\" )                  // result = 9\nHour ( \"4/20/2021 03:30:00\
  \ PM\" )        // result = 15\nMinute ( \"09:15:55 AM\" )                // result\
  \ = 15\nMinute ( \"4/20/2021 03:30:00 PM\" )      // result = 30\nSeconds ( \"09:15:55\
  \ AM\" )               // result = 55\nSeconds ( \"4/20/2021 03:30:00 PM\" )   \
  \  // result = 0\n```\n\n### 计算经过的时间\n\n有几种方法可以计算起始日期、时间和时间戳与结束日期、时间和时间戳之间的时间差。这些示例可应用于存储在字段和变量中的值，或直接硬编码到公式中（如所示）。第一个示例通过简单地将结束日期减去起始日期，计算经过的天数。其他示例则演示了如何计算经过的时间。\n\
  \n```\nGetAsDate ( \"1/30/2021\" ) - GetAsDate ( \"1/15/2021\" )     // result =\
  \ 15\nTime ( 11 ; 15 ; 48 ) - Time ( 8 ; 10 ; 35 )              // result = 3:05:13\n\
  GetAsTime ( \"4:15:00 pm\" ) - GetAsTime ( \"11:15:00 am\" )  // result = 5:00:00\n\
  ```\n\n虽然时间戳的工作原理相同，但它们会返回两个日期时间组合之间经过的时间量。当这些时间跨越多天时，结果可能不易于人类阅读，如下例所示。参见本章末尾的“将秒数转换为句子”示例，了解如何将经过的时间转换为人类可读的格式。\n\
  \n```\nGetAsTimestamp ( \"8/1/2021 10:15 AM\" ) - GetAsTimestamp ( \"1/1/2021 10:00\
  \ AM\" )\n// result = 5088:15:00\n```\n\n## 处理文本\n\n有许多函数可用于对文本值执行各种操作，例如*分析*、*更改数据类型*、*格式化*、*修改*和*解析*。\n\
  \n### 分析文本\n\n有三个函数可用于分析文本：`Length()`、`PatternCount()` 和 `Position()`。\n\n#### Length\n\
  \n`Length()`函数计算提供的文本中的字符总数，在计数前会自动将非文本值转换为文本。例如，一个数字会被转换为文本，并返回其位数，例如 `24` 会返回\
  \ `2`。\n\n```\nLength ( \"Hello World\" )        // result = 11\nLength ( \"Two¶Paragraphs\"\
  \ )      // result = 14\nLength ( 359 )                   // result = 3\n```\n\n\
  请记住，正式的日期对象与日期字符串不同，注意以下示例中的差异。第一个示例将日期转换为数字，再转换为文本，然后计算数字的位数。日期字符串则直接计算字符数，产生的值是不同的。\n\
  \n```\nLength ( 1/15/2021 )            // result = 17\nLength ( \"1/15/2021\" )\
  \          // result = 9\n```\n\n#### PatternCount\n\n`PatternCount()`函数计算一段文本包含某个搜索字符串的次数。第一个参数指定要搜索的文本，第二个参数指定要计数的模式字符串。结果是一个数字，表示搜索字符串在文本中出现的次数。\n\
  \n```\nPatternCount ( \"Hello, World. How is your world today?\" ; \"world\" ) \
  \   // result = 2\nPatternCount ( \"15839\" ; \"4\" )                        //\
  \ result = 0\nPatternCount ( \"Jim¶John¶Jo\" ; \"Jo\" )                 // result\
  \ = 2\n```\n\n该函数**不区分大小写**，并且会搜索文本中**任何位置**的匹配项，包括作为单词或段落的一部分。\n\n```\nPatternCount\
  \ ( \"The age of his page caused RAGE.\" ; \"age\" )    // result = 3\n```\n\n**提示**\n\
  \n`PatternCount()`函数会在段落中查找部分匹配。若要查找完整的段落值，请改用`FilterValues()`（参见本章后面的“操作值列表”）。\n\
  \n#### Position\n\n`Position()`函数用于查找指定文本在给定文本中某个匹配项的第一个字符的数字起始位置。该函数接受四个参数。*text*参数提供要搜索的文本，*searchString*指示要定位的文本模式。*start*参数是一个数字，表示从左边开始计数的字符位置，搜索将从该位置开始。最后，*occurrence*参数是一个数字，表示从起始位置之后找到的匹配项中，需要作为结果返回的指定匹配项。因此，如果一个字符串在文本中多次出现，最后两个参数可用于指定从何处开始搜索，以及应返回多个匹配项中的哪一个。\n\
  \n```\nPosition ( text ; searchString ; start ; occurrence )\nPosition ( \"Where\
  \ is Waldo today?\" ; \"Waldo\" ; 1 ; 1 )        // result = 10\nPosition ( \"Where\
  \ is Waldo today?\" ; \"Waldo\" ; 1 ; 2 )        // result = 0\nPosition ( \"Waldo\
  \ is looking for Waldo?\" ; \"Waldo\" ; 1 ; 2 )  // result = 22\n```\n\n\n\n###\
  \ 更改数据类型\n\n有多个函数可用于将值转换为不同的数据类型：`Boolean`、`date`、`number`、`text`、`time` 和 `timestamp`。每个函数都接受一个任意类型的单一值，并尝试将其转换为函数名所指示的目标类型。\n\
  \n#### `GetAsBoolean`\n\n`GetAsBoolean` 函数会将任何值转换为 `Boolean` 类型。如果提供的数据转换为非零结果，或者容器字段包含值，则结果将为\
  \ `1`（真）。否则，结果将为 `0`（假）。\n\n```\nGetAsBoolean ( \"Hello, World\" )        // 结果\
  \ = 0\nGetAsBoolean ( \"Hello\" = \"World\" )     // 结果 = 0\nGetAsBoolean ( \"100\"\
  \ )                 // 结果 = 1\n```\n\n#### `GetAsDate`\n\n`GetAsDate` 函数会将一个值转换为正式的日期对象。提供的数据可以包含或不包含前导零，如下例所示：\n\
  \n```\nGetAsDate ( \"1/5/2021\" )         // 结果 = 1/5/2021\nGetAsDate ( \"01/05/2021\"\
  \ )       // 结果 = 1/5/2021\n```\n\n基于文本且包含两位年份的日期会自动转换，假定该日期落在当前日期之后 30 年内或之前 70\
  \ 年内（第 8 章，“两位年份日期转换”）。如果您不使用四位年份，则意图落在此范围之外的日期将得到错误结果。以下示例假设当前日期为 2021 年 1 月 5\
  \ 日：\n\n```\nGetAsDate ( \"1/5/17\" )           // 结果 = 1/5/2017\nGetAsDate ( \"\
  1/5/95\" )           // 结果 = 1/5/1995\nGetAsDate ( \"1/5/50\" )           // 结果\
  \ = 1/5/1950\n```\n\n当提供一个数字时，它将用来计算自公元 0001 年 1 月 1 日以来经过的天数。例如：\n\n```\nGetAsDate\
  \ ( 737805 )             // 结果 = 1/15/2021\n```\n\n#### `GetAsNumber`\n\n`GetAsNumber`\
  \ 函数会将值转换为数字。当某个值与其他数字进行比较或排序时，这有助于确保获得正确结果。当以文本形式提供数字时，它们会被转换回数字。例如：\n\n```\nGetAsNumber\
  \ ( \"1234\" )          // 结果 = 1234\nGetAsNumber ( \"015\" )           // 结果 =\
  \ 15\nGetAsNumber ( \"13.75\" )         // 结果 = 13.75\n```\n\n在转换文本时，任何非数字字符都会被自动忽略。\n\
  \n```\nGetAsNumber ( \"$25.09\" )                // 结果 = 25.09\nGetAsNumber ( \"\
  He ran 9.75 miles.\" )    // 结果 = 9.75\n```\n\n在某些情况下，依赖非数字字符的自动过滤可能无法得到理想的结果。\n\
  \n```\nGetAsNumber ( \"3 men ran 9.75 miles.\" ) // 结果 = 39.75\n```\n\n以下示例假设 `Qty`\
  \ 文本字段中包含值“03”，并展示了在将文本与其它数值进行比较之前，将其转换为数字的重要性。由于字段中基于文本的数字带有前导零，在文本转换为数字之前（第一个示例中），这两个值看起来并不相同（第二个示例中）。\n\
  \n```\n3 = Qty                          // 结果 = 0\n3 = GetAsNumber ( Qty )     \
  \     // 结果 = 1\n```\n\n类似地，当值不是数字时，比较将会失败。以下示例假设 `Qty` 文本字段中包含值“20”。由于它是一个文本值，`20`\
  \ 会被视为比 `3` 更小的值，因为文本是逐个字符进行比较，而不是将整个值作为数字进行比较。一旦转换为数字（如第二个示例所示），它就能正确评估。\n\n```\n\
  3 > Qty                          // 结果 = 1\n3 > GetAsNumber ( Qty )          //\
  \ 结果 = 0\n```\n\n#### `GetAsText`\n\n`GetAsText` 函数将任何值转换为文本字符串。\n\n```\nGetAsText\
  \ ( 58.75 )                     // 结果 = \"58.75\"\nGetAsText ( 05:15:00 )      \
  \            // 结果 = \"5:15:00\"\nGetAsText ( 6/30/2016 5:20:49 PM )      // 结果\
  \ = \"6/30/2016 5:20:49 PM\"\n```\n\n该函数甚至可以将容器内容转换为两个值之一，具体取决于文件的存储方式（第 10 章，“解释容器存储选项”）。当存储在内部时，将返回文件名。当文件作为引用存储时，结果将是一个因文件类型而异但包含文件名和路径的元数据字符串。\n\
  \n```\nGetAsText ( 联系人::图片 )\n// 结果 = Mark Munro.jpg\nGetAsText ( 联系人::图片 )\n//\
  \ 结果 =\nsize:191,175\nimage:Mark Munro.jpg\nimagemac:/Macintosh HD/Users/admin/Desktop/Mark\
  \ Munro.jpg\n```\n\n#### `GetAsTime`\n\n`GetAsTime` 函数将基于文本的时间或时间戳值转换为时间对象，以确保在与其它时间进行比较或排序时获得正确结果。非时间值将导致错误。\n\
  \n```\nGetAsTime ( \"5:15:00\" )         // 结果 = 5:15:00\nGetAsTime ( \"Hello, World\"\
  \ )    // 结果 = ?\n```\n\n#### `GetAsTimestamp`\n\n`GetAsTimestamp` 函数将基于文本的值转换为时间戳对象，以确保在与其它时间进行比较或排序时获得正确结果。当提供的文本不包含完整时间戳信息时，该函数将填补缺失的信息。例如，当提供日期但没有时间信息时，函数会返回指定日期午夜的\
  \ 时间戳。当提供一个数字时，函数会返回自公元 0001 年 1 月 1 日以来该秒数的时间戳。\n\n```\nGetAsTimestamp ( \"1/5/2017\
  \ 5:15:00\" )     // 结果 = 1/5/2017 5:15:00\nGetAsTimestamp ( \"1/1/2017\" )    \
  \         // 结果 = 1/1/2017 12:00 AM\nGetAsTimestamp ( 100000 )                 //\
  \ 结果 = 1/2/0001 3:46:40 AM\n```\n\n### 转换文本编码\n\n有三个函数在准备用于网络相关或其他用途的文本时非常有用。\n\n\
  #### 为 URL 编码文本\n\n`GetAsURLEncoded` 函数对用于统一资源定位符（URL）的文本进行编码。文本中的所有样式信息都会被移除，所有字符都会被转换为\
  \ UTF-8 格式。任何位于高 ASCII 范围的非字母或数字字符都会被进行百分号编码，这意味着它们会被转换为百分号后跟字符的十六进制值，例如，空格会被转换为“%20”。该函数接受一个文本参数。\n\
  \n```\nGetAsURLEncoded ( \"Hello World\" )        // 结果 = \"Hello%20World\"\nGetAsURLEncoded\
  \ ( \"10% Surcharge\" )      // 结果 = \"10%25%20Surcharge\"\n```\n\n#### 转换为 CSS\n\
  \n`GetAsCSS` 函数将格式化的文本转换为层叠样式表（CSS）格式，以标记格式保留字体、字号、字体颜色和字体样式属性。样式信息必须直接应用于实际文本内容，因为此函数不查看应用于更改字段显示文本方式的布局设置。以下示例假设\
  \ `联系人` 表中有一条记录，其中包含一个名为 `联系人备注` 的字段，其内容为单词“Hello”，字体为“Arial”，字号为 18，字体样式为粗体，字体颜色为红色。\n\
  \n```\nGetAsCSS ( 联系人::联系人备注 )\n// 结果 = <span style=\"font-family:'Arial';font-size:18px;color:#FF2712;font-weight:bold;\"\
  >Hello</span>\n```\n\n#### 将文本转换为 SVG\n\n`GetAsSVG` 函数将文本转换为可缩放矢量图形（SVG）格式，该格式支持比\
  \ HTML 更多的文本格式，并且在某些情况下可以更准确地表示文本。此示例假设 `联系人` 表中有一条记录，其中包含一个名为 `联系人备注` 的字段，其内容与上一个示例中的样式文本相同。\n\
  \n```\nGetAsSVG ( 联系人::联系人备注 )\n// 结果 =\n\n\"font-family: 'Arial';font-size: 18px;color:\
  \ #FF2712;font-weight: bold;\",begin: 1, end: 4\n\nHello\n```\n\n### 修改文本\n\n有许多函数可用于执行文本修改，包括更改大小写、过滤和替换字符。\n\
  \n\n\n### 更改大小写\n\n三个函数，每个接受一个文本参数，可以将字符大小写更改为`Upper`（全大写）、`Lower`（全小写）和`Proper`（首字母大写）。\n\
  \n```\nUpper ( \"Hello, World\" )       // 结果 = \"HELLO, WORLD\"\nUpper ( \"this\
  \ is screaming\" )  // 结果 = \"THIS IS SCREAMING\"\nLower ( \"Hello, World\" )  \
  \     // 结果 = \"hello, world\"\nLower ( \"THIS IS SCREAMING\" )  // 结果 = \"this\
  \ is screaming\"\nProper ( \"hello, world\" )      // 结果 = \"Hello, World\"\nProper\
  \ ( \"THIS IS SCREAMING\" ) // 结果 = \"This Is Screaming\"\n```\n\n### Filter（过滤）\n\
  \n`Filter`函数用于从文本值中移除不需要的字符。该函数需要两个参数：要被过滤的文本，后跟一个允许保留的字符串。在第二个参数中不存在的任何字符都将从第一个参数提供的文本中删除。\n\
  \n```\nFilter ( \"Hello World\" ; \"1234567890\" )                    // 结果 = \"\
  \"\nFilter ( \"1 Hello 2 World 3\" ; \"1234567890\" )              // 结果 = \"123\"\
  \nFilter ( \"Las Vegas, NV 89101\" ; \"1234567890\" )            // 结果 = \"89101\"\
  \nFilter ( \"(212) 555-1234\" ; \"1234567890\" )                 // 结果 = \"2125551234\"\
  \nFilter ( \"The total purchase is $5,000.00\" ; \"1234567890$.,\" )  // 结果 = \"\
  $5,000.00\"\n```\n\n**提示**\n\n请参阅本章后文中的 `FilterValues` 以了解对完整段落而非单个字符执行类似功能的方法。\n\
  \n### Substitute（替换）\n\n`Substitute`函数用于在文本中将搜索字符串替换为替换字符串。当指定一个*搜索-替换对*时，该函数使用三个参数，如下所示。\n\
  \n```\nSubstitute ( text ; searchString ; replacementString )\n```\n\n以下示例展示了函数进行简单替换的情况，即将一个搜索值替换为一个替换值：\n\
  \n```\nSubstitute ( \"One Two Four\" ; \"Four\" ; \"Three\" )\n// 结果 = \"One Two\
  \ Three\"\nSubstitute ( \"Hello World? It is good to see you?\" ; \"?\" ; \"!\"\
  \ )\n// 结果 = \"Hello World! It is good to see you!\"\n```\n\n要在单个语句中指定*多个搜索-替换对*，每组搜索字符串和替换字符串需包含在方括号内，并用分号分隔，如下所示：\n\
  \n```\nSubstitute ( text ;\n[ searchString1 ; replacementString1 ] ;\n[ searchString2\
  \ ; replacementString2 ] ;\n[ searchString3 ; replacementString3 ]\n)\n```\n\n以下示例演示了两个搜索-替换对，首先将\
  \ `Four` 替换为 `Three`，然后将 `Six` 替换为 `Four`：\n\n```\nSubstitute ( \"One Two Four Six\"\
  \ ; [ \"Four\" ; \"Three\" ] ; [ \"Six\" ; \"Four\" ] )\n// 结果 = \"One Two Three\
  \ Four\"\n```\n\n在此示例中，结果是 `Notes` 字段中的文本，其中所有回车符和制表符均已被移除：\n\n```\nSubstitute (\
  \ Table::Notes ; [ \"¶\" ; \"\" ] ; [ \"    \" ; \"\" ] )\n```\n\n此示例展示了一种清除文本中多余空格的粗略方法，即使用三次替换——依次将四重空格、三重空格和双倍空格替换为单个空格，以确保移除大部分多余空格：\n\
  \n```\nSubstitute ( Table::Text Field ; [ \"    \" ; \" \" ] ; [ \"   \" ; \" \"\
  \ ] ; [ \"  \" ; \" \" ] )\n```\n\n**提示**\n\n要确保移除所有多余空格，请使用 `While` 函数（本章后文有介绍）反复将双倍空格替换为单个空格，直到不再存在双倍空格。\n\
  \n### 解析文本\n\n多个文本解析函数可以从文本值的开头、中间或结尾提取字符或单词。这些函数包括 `Left`、`Right`、`Middle`、`LeftWords`、`RightWords`\
  \ 和 `MiddleWords`。\n\n#### 提取字符\n\n`Left` 函数从提供的文本最左侧的第一个字符开始，提取指定数量的字符。如果指定的数量大于提供的文本中的字符数，该函数仅返回原始值。\n\
  \n```\nLeft ( \"Hello, World\" ; 8 )        // 结果 = \"Hello, W\"\nLeft ( \"Hello,\
  \ World\" ; 100 )      // 结果 = \"Hello, World\"\n```\n\n`Right` 函数从最右侧的最后一个字符开始，提取指定数量的字符。\n\
  \n```\nRight ( \"Hello, World\" ; 5 )    // 结果 = \"World\"\n```\n\n`Middle` 函数从文本字符串中的指定位置开始，提取指定数量的字符。与\
  \ `Left` 和 `Right` 函数不同，`Middle` 需要一个起始参数，指示从何处开始提取指定数量的字符。\n\n```\nMiddle ( text\
  \ ; start ; numberOfCharacters )\nMiddle ( \"Good Morning Everyone.\" ; 6 ; 7 )\
  \   // 结果 = \"Morning\"\nMiddle ( 123456789 ; 4 ; 3 )                  // 结果 = 456\n\
  ```\n\n#### 提取单词\n\n`LeftWords` 函数从提供的文本最左侧的第一个单词开始，提取指定数量的单词。返回的单词将包括指定*范围*内的任何空格和标点符号。\n\
  \n```\nLeftWords ( \"Hello, World. How are you?\" ; 3 )    // 结果 = \"Hello, World.\
  \ How\"\nLeftWords ( \"Hello, World. How are you?\" ; 2 )    // 结果 = \"Hello, World\"\
  \n```\n\n`RightWords` 函数从提供的文本最右侧的最后一个单词开始，提取指定数量的单词。\n\n```\nRightWords ( \"Hello,\
  \ World. How are you?\" ; 3 )  // 结果 = \"How are you\"\n```\n\n`MiddleWords` 函数从提供的文本中的任意指定单词开始，提取指定数量的单词。以下示例从第三个单词开始提取两个单词：\n\
  \n```\nMiddleWords ( \"Hello World. How are you?\" ; 3 ; 2 )    // 结果 = \"How are\"\
  \n```\n\n## 使用值\n\n*值*是一个以回车分隔的文本值列表，其中每个段落被视为一个单独的值单元。FileMaker 提供了几个专门用于*计数*、*解析*和*操作*值列表的函数。\n\
  \n### 计数和解析值\n\n几个内置函数可以计数和解析列表中的值：`ValueCount`、`LeftValues`、`RightValues`、`MiddleValues`\
  \ 和 `GetValue`。\n\n**注意**\n\n与文本计数和解析不同，这些函数处理的是值，即整个段落。\n\n#### ValueCount（值计数）\n\
  \n`ValueCount` 函数计算指定文本中值的数量。\n\n```\nValueCount ( \"John¶Jane¶Jim¶Joe¶\" )    //\
  \ 结果 = 4\n```\n\n#### LeftValues（左侧值）\n\n`LeftValues` 函数从列表的第一个值开始，提取指定数量的值。\n\n\
  ```\nLeftValues ( \"John¶Jane¶Jim¶Joe¶\" ; 2 )         // 结果 = \"John¶Jane¶\"\n\
  LeftValues ( \"159¶245¶396¶721¶\" ; 3 )           // 结果 = \"159¶245¶396¶\"\nLeftValues\
  \ ( \"John¶Jane¶Jim¶Joe¶\" ; 10 )        // 结果 = \"John¶Jane¶Jim¶Joe¶\"\n```\n\n\
  #### RightValues（右侧值）\n\n`RightValues` 函数从列表的最后一个值开始，提取指定数量的值。\n\n```\nRightValues\
  \ ( \"John¶Jane¶Jim¶Joe¶\" ; 2 )    // 结果 = \"Jim¶Joe¶\"\n```\n\n#### MiddleValues（中间值）\n\
  \n`MiddleValues` 函数从第一个参数中的值列表里，按照第三个参数指定的数量提取值，起始值为第二个参数指定的值。在此示例中，从第二个值开始提取一个值。\n\
  \n```\nMiddleValues ( \"John¶Jane¶Jim¶Joe¶\" ; 2 ; 1 )  // 结果 = \"Jane¶\"\n```\n\
  \n**注意**\n\n当从*左侧*、*右侧*或*中间*提取值时，最后一个值后的回车符可能会被包含在内，为了与其他文本函数一起使用，可能需要将其移除。\n\n\
  #### GetValue（获取值）\n\n`GetValue` 函数通过数字位置从列表中提取单个值，不含尾随回车符。如果指定的数字大于提供的列表中的值的数量，将返回一个空字符串。\n\
  \n```\nGetValue ( \"John¶Jane¶Jim¶Joe¶\" ; 3 )   // 结果 = \"Jim\"\nGetValue ( \"\
  159¶245¶396¶721¶\" ; 2 )     // 结果 = 245\nGetValue ( \"John¶Jane¶Jim¶Joe¶\" ; 18\
  \ )  // 结果 = \"\"\n```\n\n### 操作值\n\n有几个函数可以操作列表中的值，包括 `FilterValues`、`SortValues`\
  \ 和 `UniqueValues`。\n\n\n\n#### `FilterValues`\n\n`FilterValues` 函数用于从列表中移除不需要的值。该函数接受两个参数：`textToFilter`\
  \ 包含将被操作的值，`filterValues` 指明允许保留在结果中的期望值。结果将是移除了所有未在 `filterValues` 中指定的值后的原始文本。\n\
  \n```\nFilterValues ( textToFilter ; filterValues )\n```\n\n任何在 `filterValues` 中出现多次的值都会被包含，并且保持它们最初出现的顺序。请注意，部分段落匹配不会被包含在结果中。例如，即使“NYC”包含“NY”，它也会被过滤掉，因为此函数匹配的是\
  \ `values`（完整段落）而非部分字符串。\n\n```\nFilterValues ( \"NY¶IN¶OH¶PA¶NY¶IN¶NYC\" ; \"PA¶NY\"\
  \ )  // result = \"NY¶PA¶NY¶\"\nFilterValues ( \"10¶100¶10¶1000\" ; \"10\" )   \
  \         // result = \"10¶10¶\"\n```\n\n在 `PatternCount` 因发现`部分模式匹配`而失败的情况下，此公式可用于安全地检测`完整值匹配`。以下两个示例对此进行了说明，两者都检查值列表中是否存在“age”。在第一个示例中，`PatternCount`\
  \ 找到了三个文本模式匹配项，因此即使没有完整的段落值匹配，它也会返回真值。在第二个示例中，`FilterValues` 过滤掉了所有三个值，因为它们没有一个完全匹配。因此，第二个示例正确返回了\
  \ `false` 结果，表明列表中不存在“age”的`完整值`。\n\n```\nPatternCount ( \"Rage¶Page¶Sage\" ; \"\
  age\" ) > 0      // result = 1\nFilterValues ( \"Rage¶Page¶Sage\" ; \"age\"  ) ≠\
  \ \"\"    // result = 0\n```\n\n#### `SortValues`\n\n`SortValues` 函数将根据指定的数据类型重新排列列表中值的顺序。要使用文件的默认区域设置将值排序为文本，仅需要一个参数，即要排序的文本。可选参数允许指定\
  \ `datatype` 和/或 `locale`。这里展示了所有三种形式：\n\n```\nSortValues ( values )\nSortValues\
  \ ( values ; datatype )\nSortValues ( values ; datatype ; locale )\n```\n\n`values`\
  \ 参数是要排序的以回车符分隔的文本值列表。`datatype` 参数是一个从 1 到 5 的数字，指示排序时使用的数据类型：1，文本；2，数值；3，日期；4，时间；5，时间戳。正数表示升序排序，而负数表示降序排序。`locale`\
  \ 参数指示排序时使用的数十种区域设置之一，例如 `French`、`Norwegian`、`Ukrainian` 等。函数的结果将是重新排列后的列表。\n\n\
  ```\nSortValues ( \"New York¶Illinois¶Pennsylvania¶California\" )\n// result =\n\
  California\nIllinois\nNew York\nPennsylvania\n```\n\n这三个示例以不同的方式对同一数字列表进行排序。第一个示例因为没有指定\
  \ `datatype` 而按文本排序。结果将 20 置于 100 之后，因为“2”按字母顺序排在“1”之后，并且排序是一次一个文本字符进行的。第二个示例指定了数值排序，第三个示例指定了降序数值排序。\n\
  \n```\nSortValues ( \"100¶10¶200¶20\" )        // result = \"10¶100¶20¶200\"\nSortValues\
  \ ( \"100¶10¶200¶20\" ; 2 )    // result = \"10¶20¶100¶200\"\nSortValues ( \"100¶10¶200¶20\"\
  \ ; -2 )   // result = \"200¶100¶20¶10\"\n```\n\n#### `UniqueValues`\n\n`UniqueValues`\
  \ 函数返回一个移除了所有重复值的值列表。此函数也接受额外的 `datatype` 和 `locale` 参数，其工作方式与 `SortValues` 相同。\n\
  \n```\nUniqueValues ( values )\nUniqueValues ( values ; datatype )\nUniqueValues\
  \ ( values ; datatype ; locale )\n```\n\n这些示例展示了将数据视为文本（默认）或指定数值结果时结果的差异。注意，“10”和“10.0”在作为文本时被视为不同，但在使用数值\
  \ `datatype` 时被视为相同。\n\n```\nUniqueValues ( \"15¶125¶10¶125¶10.0\" )      // result\
  \ = \"15¶125¶10¶10.0\"\nUniqueValues ( \"15¶125¶10¶125¶10.0\" ; 2 )  // result =\
  \ \"15¶125¶10\"\n```\n\n## 介绍 `Get` 函数\n\n`Get` 函数提供关于计算机系统、用户环境、当前数据库上下文或各种进程状态的一条信息。在创建根据当前上下文或情况的某些方面返回不同结果或执行不同任务的条件公式或脚本时，这些函数非常有用。每个函数都需要一个不变的参数，即一个指示所需信息的关键字。\n\
  \n```\nGet (  )\n```\n\n提示\n\n有关这些函数的完整列表和更全面的描述，请参阅 FileMaker 的文档。\n\n### 凭证和用户信息\n\
  \n这些函数获取有关用户及其数据库账户凭证的信息（第 30 章）。\n\n```\nGet ( UserName )                     \
  \  // result = Karen Camacho\nGet ( AccountName )                    // result =\
  \ k.camacho\nGet ( AccountExtendedPrivileges )      // result = fmapp\nGet ( AccountPrivilegeSetName\
  \ )        // result = [Full Access]\nGet ( AccountGroupName )               //\
  \ result = dbmarketing\n```\n\n### 操作系统、计算机和应用\n\n这些函数获取关于用户计算机、应用或主机的信息。\n\n```\n\
  Get ( ApplicationArchitecture )         // result = x86_64\nGet ( ApplicationLanguage\
  \ )             // result = English\nGet ( ApplicationVersion )       // result\
  \ = ProAdvanced 19.0.1\nGet ( HostApplicationVersion )   // result = Server 19.0.1\n\
  Get ( HostName )                 // result = Production-FileMaker-Server.local\n\
  Get ( HostIPAddress )            // result = 10.0.1.50\nGet ( SystemDrive )    \
  \          // result = Macintosh HD\nGet ( SystemIPAddress )          // result\
  \ = 10.0.1.27\nGet ( SystemLanguage )           // result = \"English\"\nGet ( SystemPlatform\
  \ )           // result = 1\nGet ( SystemVersion )            // result = 10.15.5\n\
  ```\n\n### 记录\n\n这些函数获取当前布局表格中记录的信息。显示的结果假设当前表格包含 500 条记录，用户正在查看找到的结果集为 125 条记录中的第\
  \ 15 条记录。\n\n```\nGet ( FoundCount )          // result = 125\nGet ( TotalRecordCount\
  \ )    // result = 500\nGet ( RecordNumber )        // result = 15\nGet ( ActiveRecordNumber\
  \ )  // result = 15\n```\n\n`RecordNumber` 和 `ActiveRecordNumber` 之间的区别微妙但令人困惑，但在布局工作中很有用。在自定义函数、自定义菜单和脚本步骤中使用的公式都在`窗口上下文`中运行，并且对于这两个函数将始终返回相同的值，因为`记录编号`将始终是当前的`活动记录编号`。或者，在布局对象上使用的公式在`记录上下文`中运行，因此\
  \ `RecordNumber` 对于每条记录始终不同，而 `ActiveRecordNumber` 对于整个找到的结果集始终相同。这在配合 `隐藏` 功能（第\
  \ 21 章，“隐藏对象”）时很有用，以下公式将隐藏除当前记录之外的所有记录上的按钮或其他对象。\n\n```\nGet ( RecordNumber ) ≠\
  \ Get ( ActiveRecordNumber )\n```\n\n### 布局\n\n这些函数获取前端窗口中当前布局的信息：\n\n```\nGet (\
  \ LayoutName )        // result = Sandbox – List\nGet ( LayoutNumber )      // result\
  \ = 2\nGet ( LayoutTableName )          // result = Sandbox\nGet ( LayoutViewState\
  \ )          // result (Form View)  = 0\n// result (List View) = 1\n// result (Table\
  \ View) = 2\n```\n\n### 窗口\n\n许多 `Get` 函数会返回窗口属性和尺寸。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项，将给定的英文文本翻译成中文。\n\
  \n\n### 获取窗口属性\n\n这些函数提供有关最前面窗口的名称、模式、样式或缩放级别的信息。\n\n```\nGet ( WindowName )   \
  \     // 结果 = \"Learn FileMaker\"\nGet ( WindowMode )        // 结果 (浏览)  = 0\n//\
  \ 结果 (查找)    = 1\n// 结果 (预览) = 2\n// 结果 (打印) = 3\n// 结果 (布局)   = 4\nGet ( WindowStyle\
  \ )       // 结果 (文档窗口) = 0\n// 结果 (浮动窗口) = 1\n// 结果 (对话框)   = 2\n// 结果 (卡片窗口)  \
  \   = 3\nGet ( WindowZoomLevel )   // 结果 = 100\n```\n\n### 获取窗口尺寸\n\n几个 `Get()`\
  \ 函数可以从四个维度域之一获取测量值，如图 13-1 所示。这些值在使用脚本步骤设置窗口位置或大小时非常有用（第 25 章）。\n\n![../images/429700_2_En_13_Chapter/429700_2_En_13_Fig1_HTML.jpg](img/429700_2_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\n\n可通过 `Get()` 函数访问的四个测量域\n\n四个域中的每一个都有 `Height` 和 `Width` 函数。因为窗口可以在桌面区域中移动，所以它还有额外的\
  \ `Top` 和 `Left` 函数。\n\n```\nGet ( ScreenHeight )             // 结果 = 1440\nGet\
  \ ( ScreenWidth )              // 结果 = 2560\nGet ( WindowDesktopHeight )      //\
  \ 结果 = 1417\nGet ( WindowDesktopWidth )       // 结果 = 2560\nGet ( WindowHeight )\
  \             // 结果 = 613\nGet ( WindowWidth )              // 结果 = 840\nGet ( WindowTop\
  \ )                // 结果 = 75\nGet ( WindowLeft )               // 结果 = 100\nGet\
  \ ( WindowContentHeight )      // 结果 = 492\nGet ( WindowContentWidth )       //\
  \ 结果 = 825\n```\n\n这些函数可以与`新建窗口`和`移动/调整窗口大小`脚本步骤（第 25 章，“管理窗口”）一起使用，通过根据屏幕尺寸计算基于`高度`和`宽度`的新`顶部`和`左侧`位置，将窗口居中到屏幕上的特定点。首先，将高度和宽度各除以一半，获得屏幕在每个方向上的中心点。然后，从这些测量值中减去窗口对应尺寸的一半。以下公式计算了这两个测量值，以将现有窗口居中。创建新窗口时，由于窗口尚不存在，需要手动输入窗口的测量值。\n\
  \n```\n( Get ( ScreenHeight ) / 2 ) – ( Get ( WindowHeight ) / 2 ) // 顶部\n( Get\
  \ ( ScreenWidth ) / 2 ) – ( Get ( WindowWidth ) / 2 )   // 左侧\n```\n\n### 访问字段\n\
  \n任何计算都可以包含直接访问字段内容的字段引用（第 12 章，“字段引用”）。有几个函数允许额外访问关于字段的各种元信息，或者对其中包含的数据进行高级访问。\n\
  \n### 发现活动字段\n\n虽然任何函数都可以*直接*在上下文中访问任何本地或相关字段，但少数函数可以访问在当前界面中处于活动状态的字段的信息。这在创建需要感知当前用户活动以提供响应式和自适应功能的功能时非常有用。\n\
  \n```\nGet ( ActiveFieldName )                 // 结果 = Full Name\nGet ( ActiveFieldContents\
  \ )             // 结果 = Mark Munro\nGet ( ActiveFieldTableName )            // 结果\
  \ = \"Contacts\"\n```\n\n### 将字段引用转换为文本\n\n`GetFieldName` 函数接受一个*字段引用*，并将整个引用作为*字符串*返回。此函数允许使用动态引用进行字段名称操作，以避免硬编码那些可能在将来因字段或表名更改而出错的名称（第\
  \ 12 章，“保持字段名称动态化”）。\n\n```\nGetFieldName ( Contact::Name First )        // 结果 =\
  \ \"Contact::Name First\"\n```\n\n### 获取字段内容\n\n有两个内置函数可以以非常特定的方式返回字段的内容。它们是 `GetField`\
  \ 和 `GetNthRecord`。\n\n#### GetField\n\n`GetField` 函数基于*基于文本的字段引用*（而不是*动态字段引用*）返回字段的内容。这在动态构建字段引用或使用存储在文本字段或变量中的引用时非常有用。参数可以是字段的*名称*，也可以是表字段的完整基于文本的*引用*，对于相关表中的字段，后者是必需的。\n\
  \n```\nGetField ( \"Contact Name Full\" )                // 结果 = Mark Munro\nGetField\
  \ ( \"Contact::Contact Name Full\" )       // 结果 = Mark Munro\n```\n\n由于该函数需要*基于文本的引用*，提供对字段的动态引用将会失败，除非被引用的字段恰好包含对第三个字段的文本引用。例如，如果一个名为“Referring\
  \ Field”的字段包含文本“Contact::Contact Name Full”，那么该函数将接受对该引用字段的动态引用，并使用其内容来识别目标字段并检索*其*内容。这是该函数使用动态引用按预期工作的唯一情况，如以下三个示例所示。第一个传递*对引用字段的文本引用*，并返回该字段的实际内容。第二个传递*对引用字段的动态引用*，因此它使用该字段中包含的引用，成功识别并返回名称字段的值。尽管第三个也传递了一个动态引用，但该字段包含名称“Mark\
  \ Munro”，其中不包含文本引用，因此返回一个错误。\n\n```\nGetField ( \"Contact::Referring Field\" ) \
  \   // 结果 = Contact::Contact Name Full\nGetField ( Contact::Referring Field )  \
  \    // 结果 = Mark Munro\nGetField ( Contact::Contact Name Full )    // 结果 = ?\n\
  ```\n\n#### GetNthRecord\n\n`GetNthRecord` 函数从找到的记录集中返回某个记录的字段内容，无论当前记录是什么。`fieldName`\
  \ 参数必须包含一个对字段的动态引用，`recordNumber` 参数是当前找到的记录集中记录的数值位置，两者共同指定所需的值。此示例将返回`联系人`表中找到的记录集中第五条记录的`Contact\
  \ Name Full`字段的内容。\n\n```\nGetNthRecord ( Contact::Contact Name Full ; 5 )\n```\n\
  \n此函数可以与迭代过程一起使用，以“逐步”遍历找到的记录集，并跨大量记录更快地收集信息，而无需更改活动记录的上下文。使用 `While` 函数（本章）、递归自定义函数（第\
  \ 15 章）或循环脚本（第 25 章，“使用重复语句进行迭代”）。\n\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n"
- '# 获取选定文本


  两个 `Get` 函数允许计算式提取当前具有活动焦点的字段中选定的文本。`Get ( ActiveSelectionSize )` 函数返回所选字符的数量，而
  `Get ( ActiveSelectionStart )` 函数返回字段内文本选择开始处的字符位置。这两个函数共同作用，可以提取选中的文本并用另一个值替换它。以下示例使用了本章前面讨论过的函数，演示了如何访问选区范围（假设
  `联系人备注` 字段具有焦点，尽管也可以使用 `Get ( ActiveFieldContents )` 函数从任何字段提取内容）。分三步，我们获取选中的文本、选中文本之前的文本以及之后的文本。一旦将这些部分作为单独的值保存在变量中，就可以修改选区，然后重新组合，使用
  `设置字段`（参见第 [25] 章(#429700_2_En_25_Chapter.xhtml)）将其放回字段，或以其他方式使用。


  `Middle` 函数被调用时，第一个参数是对字段的引用。此示例将从活动字段中提取选定的文本：


  ```

  Middle (

  联系人::联系人备注 ;

  Get ( ActiveSelectionStart ) ;

  Get ( ActiveSelectionSize )

  )

  ```


  `Left` 函数可以提取选区之前的字符。


  ```

  Left (

  联系人::联系人备注 ;

  Get ( ActiveSelectionStart ) - 1

  )

  ```


  `Right` 函数提取选区之后剩余的文本。


  ```

  Right (

  联系人::联系人备注 ;

  长度 ( 联系人::联系人备注 ) - Get ( ActiveSelectionStart ) - Get ( ActiveSelectionSize) +
  1

  )

  ```


  ## 聚合数据


  `聚合` 函数可以汇总字段，并对数字、日期和时间执行统计计算。每个函数都可以接受单个重复字段或非重复、重复或相关字段的列表：`平均值`、`计数`、`列表` 和
  `总和`。由于行为上的相似性以及可能的输入组合数量众多，本节中的所有示例都使用与图 13-2 中所示相同的数据。


  ![../images/429700_2_En_13_Chapter/429700_2_En_13_Fig2_HTML.jpg](img/429700_2_En_13_Fig2_HTML.jpg)


  图 13-2


  一组本地和相关字段，带有用于本节所有示例的简单值


  ### 平均值


  `平均值` 函数计算一个或多个字段中所有值的平均值。它可以接受单个重复或相关数字字段，或使用分号分隔符的多个数字字段（无论是否重复）。


  ```

  平均值 ( 字段 )

  平均值 ( 字段 1 ; 字段 2 ; 字段 3 ; 等等 )

  ```


  #### 将平均值函数与本地字段一起使用


  一个非重复本地字段的列表将根据所提供的字段中包含的所有值返回平均值：


  ```

  平均值 ( 示例::非重复 1 ; 示例::非重复 2 ; 示例::非重复 3 )

  // 结果 = 2

  ```


  一个单个的重复本地字段将根据该字段中包含的所有值返回平均值：


  ```

  平均值 ( 示例::重复 1 )

  // 结果 = 6

  ```


  在非重复计算中使用的重复本地字段列表，将根据所提供字段的第一次重复值返回平均值：


  ```

  平均值 ( 示例::重复 1 ; 示例::重复 2 ; 示例::重复 3 )

  // 结果 = 9

  ```


  在重复计算中使用的重复本地字段列表，会根据所提供字段的相应重复项，返回结果中每次重复的平均值：


  ```

  平均值 ( 示例::重复 1 ; 示例::重复 2 ; 示例::重复 3 )

  // 重复 1 = 9

  // 重复 2 = 10

  // 重复 3 = 11

  // 重复 4 = 12

  // 重复 5 = 13

  ```


  #### 将平均值函数与相关字段一起使用


  一个单个的、非重复的相关字段，将根据执行计算的本地记录相关的每条记录的该字段的所有值返回平均值：


  ```

  平均值 ( 相关::非重复 1 )

  // 结果 = 32

  ```


  一个非重复相关字段的列表，将根据为第一条相关记录提供的字段的值返回平均值：


  ```

  平均值 ( 相关::非重复 1 ; 相关::非重复 2 ; 相关::非重复 3 )

  // 结果 = 20

  ```


  一个单个的、重复的相关字段，将根据与执行计算的本地记录相关的每条记录中的每个重复项的值返回平均值：


  ```

  平均值 ( 相关::重复 1 )

  // 结果 = 37

  ```


  在非重复计算中使用的重复相关字段列表，将根据与执行计算的本地记录相关的第一条记录中这些字段的第一次重复值返回平均值：


  ```

  平均值 ( 相关::重复 1 ; 相关::重复 2 )

  // 结果 = 24.5

  ```


  在重复计算中使用的重复相关字段列表，会根据与执行计算的本地记录相关的第一条记录中每个字段的相应重复项的值，返回平均值的每次重复结果：


  ```

  平均值 ( 相关::重复 1 ; 相关::重复 2 )

  // 重复 1 = 24.5

  // 重复 2 = 25.5

  // 重复 3 = 26.5

  // 重复 4 = 27.5

  // 重复 5 = 28.5

  ```


  ### 计数


  `计数` 函数统计一个或多个字段中值的数量。尽管此处显示的示例统计的是数字值列表，但该函数会统计任何类型的数据文件。例如，“8¶10¶2”和“Mon¶Tues¶Wed”都包含三个值。


  ```

  计数 ( 字段 )

  计数 ( 字段 1 ; 字段 2 ; 字段 3 ; 等等 )

  ```


  #### 将计数函数与本地字段一起使用


  一个非重复本地字段的列表将根据所提供的字段中包含的所有值返回非空值的总数：


  ```

  计数 ( 示例::非重复 1 ; 示例::非重复 2 ; 示例::非重复 3 )

  // 结果 = 3

  ```


  一个单个的重复本地字段将根据该字段中包含的所有值返回非空值的总数：


  ```

  计数 ( 示例::重复 1 )

  // 结果 = 5

  ```


  在非重复计算中使用的重复本地字段列表，将根据所提供字段的第一次重复值返回非空值的总数：


  ```

  计数 ( 示例::重复 1 ; 示例::重复 2 ; 示例::重复 3 )

  // 结果 = 3

  ```


  在重复计算中使用的重复本地字段列表，会根据所提供字段的相应重复项，返回结果中每次重复的非空值总数：


  ```

  计数 ( 示例::重复 1 ; 示例::重复 2 ; 示例::重复 3 )

  // 重复 1 = 3

  // 重复 2 = 3

  // 重复 3 = 3

  // 重复 4 = 3

  // 重复 5 = 3

  ```




  ## 使用带有相关字段的 Count 函数


  一个*单相关的非重复字段*将基于与执行计算的本地记录相关的每条记录中该字段的所有值，返回非空值的总计数：


  ```

  Count ( Related::NonRepeating1 )

  // result = 3

  ```


  一个*相关的非重复字段列表*将基于提供给第一个相关记录的字段中的值，返回非空值的总计数：


  ```

  Count ( Related::NonRepeating1 ; Related::NonRepeating2 ; Related::NonRepeating3
  )

  // result = 3

  ```


  一个*单相关的重复字段*将基于与执行计算的本地记录相关的每条记录的每个重复项中的值，返回非空值的总计数：


  ```

  Count ( Related::Repeating1 )

  // result = 15

  ```


  一个*相关的重复字段列表*在*非重复计算*中使用时，将基于与执行计算的本地记录相关的第一条记录的这些字段的第一个重复项中的值，返回非空值的总计数：


  ```

  Count ( Related::Repeating1 ; Related::Repeating2 )

  // result = 2

  ```


  一个*相关的重复字段列表*在*重复计算*中使用时，将基于与执行计算的本地记录相关的第一条记录中提供的每个字段的对应重复项中的值，返回非空值的总计数：


  ```

  Count ( Related::Repeating1 ; Related::Repeating2 )

  // repetition 1 = 2

  // repetition 2 = 2

  // repetition 3 = 2

  // repetition 4 = 2

  // repetition 5 = 2

  ```


