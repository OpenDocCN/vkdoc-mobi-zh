  ### 配置按钮操作


  *按钮设置*对话框的底部区域控制按钮的功能。


  #### 执行单一步骤


  要将按钮配置为运行脚本步骤命令，请将*操作*弹出菜单更改为*单一步骤*。这将立即打开*按钮操作*对话框，如图 20-30 所示。这是*脚本工作区*对话框（第 24
  章）的一个受限版本。双击右侧列表中的一个步骤，将其添加为左侧分配的操作，替换现有选择。然后根据需要进行配置并点击确定。


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig30_HTML.jpg](img/429700_2_En_20_Fig30_HTML.jpg)


  **图 20-30** – 用于为按钮选择和配置脚本步骤的对话框


  一旦分配并配置了脚本步骤，设置对话框底部的*操作*区域将显示所选的命令，如图 20-31 所示。要更改分配的命令，请点击它。启用底部的复选框可以使光标在悬停在按钮上时发生变化，从而向用户提供这是一个活动按钮的可视化指示。


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig31_HTML.jpg](img/429700_2_En_20_Fig31_HTML.jpg)


  **图 20-31** – 配置为运行单一步骤的对话框


  使用*单一步骤*选项时，只能为按钮分配*一个*命令。要为按钮附加更复杂的功能，请选择*执行脚本*而不是*单一步骤*，或者点击*按钮操作*对话框中的*转换为脚本*按钮，以快速创建保留任何现有步骤配置的新脚本。


  #### 执行脚本


  要将按钮配置为运行脚本，请将按钮的操作更改为*执行脚本*。这将立即打开*指定脚本*对话框（第 24 章，“探索指定脚本对话框”），允许选择脚本并输入可选参数。选择脚本后，*按钮设置*对话框底部的*操作*区域将显示所选脚本、参数和选项，如图
  20-32 所示。可以点击分配的脚本以打开并直接编辑脚本步骤。点击相邻的脚本图标可为按钮选择不同的脚本。点击脚本参数按钮可打开*指定计算*对话框，并输入将作为参数发送到脚本的数据公式（第
  24 章，“发送参数”）。


  *选项*区域包含一个用于更改光标的复选框。此外，还有一个菜单允许选择四个选项之一，用于处理按钮脚本运行后当前暂停的脚本，选项如下：


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig32_HTML.jpg](img/429700_2_En_20_Fig32_HTML.jpg)


  **图 20-32** – 配置为运行脚本的对话框


  -   **暂停当前脚本** – 所有正在运行的脚本都将暂停。

  -   **退出当前脚本** – 暂停的脚本将停止，控制权将返回到堆栈中任何其他脚本，这些脚本将恢复执行。

  -   **继续当前脚本** – 暂停的脚本将恢复运行。

  -   **暂停当前脚本** – 脚本将保持暂停状态。


