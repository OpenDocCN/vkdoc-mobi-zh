- "# 审视产品线\n\nFileMaker 平台，如表 [1-1]() 所示，由多个应用程序组成，每个应用程序都旨在满足开发、使用和共享数据库中的特定功能。\n\
  \n**表 1-1** FileMaker 产品线中各产品摘要\n\n| 产品名称 | 平台 | 开发 | 使用 | 共享 |\n| --- | --- | ---\
  \ | --- | --- |\n| FileMaker Pro | Mac, Windows | 是 | 是 | 有限 |\n| FileMaker Server\
  \ | Mac, Windows | 否 | 否 | 是 |\n| FileMaker Cloud | 基于 AWS 的 Linux | 否 | 否 | 是 |\n\
  | FileMaker Go | iOS 设备 | 否 | 是 | 否 |\n| FileMaker WebDirect | Web 浏览器 | 否 | 是 |\
  \ 否 |\n\n\n\n### 使用 FileMaker Pro 创建数据\n\n产品线中的旗舰产品是桌面级应用程序，也是本书的重点，即 `FileMaker\
  \ Pro`。该应用程序是传统产品的现代化身，它提供了一个多用途界面，可用于在 macOS 和 Windows 电脑上`创建`、`共享`和`访问`数据库文件。它是`唯一`包含定义数据模型、设计界面布局和编写脚本所需的所有结构开发工具的产品。它将前端、后端和中间件整合到一个无缝的低代码应用程序编程接口中。\n\
  \n该软件通过熟悉的桌面文档格式提供对数据的前端访问，该格式可显示界面布局（第 3 章）。图形化的模式编辑器使定义表、字段和关系变得容易（第 7 章 – 9 章）。布局编辑器允许快速开发丰富的界面，以呈现和整合表内容及界面对象（第\
  \ 17 章 – 22 章）。脚本编辑器巧妙地平衡了对象驱动构建和公式代码，使得创建可重用的自动化事件序列变得简单（第 24 章 – 27 章）。凭据管理使其能够轻松创建安全账户，通过使用各种内部或外部身份验证方式来限制用户在文件内的访问和活动（第\
  \ 30 章）。\n\n许多高级工具提供了更强大的控制能力。构建一个可在文件中任意位置重用的自定义函数库（第 15 章）。用自定义菜单覆盖整个菜单栏，从而完全掌控用户体验（第\
  \ 23 章）。脚本调试器有助于识别问题并评估性能（第 26 章）。将整个数据库保存为 XML，轻松生成设计报告，并使用 AES 256 位加密对数据库进行加密，以保护网络数据库（第\
  \ 31 章）。\n\n数据可以通过多种方式进行共享和集成。用户和脚本可以在数据库和基于文本的数据格式之间轻松地导入和导出数据（第 5 章）。网络共享允许多个工作组成员实时同时访问同一个数据库（第\
  \ 29 章）。提供了多种集成选项，可通过 AppleScript (macOS)、Claris Connect、动态数据交换 (Windows)、FileMaker\
  \ API、JDBC、ODBC、SQL 等方式连接到外部系统。\n\n> **提示**  \n> 在应用程序偏好设置的`通用`选项卡下启用`使用高级工具`（第\
  \ 2 章），以访问所有高级功能。\n\n### 使用 FileMaker Server 与 Cloud 进行共享\n\n有两款专用产品用于在网络上托管数据库以供团队共享：`FileMaker\
  \ Server` 和 `FileMaker Cloud`。\n\n`FileMaker Server` 是一款数据库托管软件包，可为授权用户提供可扩展、安全且可靠的\
  \ 24/7 全天候数据库访问。托管文件可以被 FileMaker Pro、FileMaker Go 和 FileMaker WebDirect 的多个用户同时访问，或者通过使用托管数据库作为后端数据源的其他系统进行访问。该服务器管理用于运行数据库备份、系统级脚本（shell\
  \ 脚本或批处理文件）以及在托管数据库中运行 FileMaker 脚本的事件调度。可以配置单个数据库脚本在服务器上运行，而不是在用户计算机上运行，以卸载任务并节省时间。管理员可以访问事件和错误日志以排查问题，或查看性能指标以帮助优化数据库性能。该服务器使用渐进式下载技术来流式传输媒体内容，实现即时显示，无需等待。\n\
  \n`FileMaker Cloud` 是 Claris 管理的 FileMaker Server 云托管版本，具有类似的功能，外加全天候监控与支持，并且增加了远程访问的易用性。\n\
  \n> **注意**  \n> 尽管本书侧重于使用和创建数据库，但第 29 章将介绍网络共享。\n\n### 使用 FileMaker Go 与 WebDirect\
  \ 进行访问\n\n有两款产品允许使用或访问在桌面应用程序中开发的数据库：`FileMaker Go` 和 `FileMaker WebDirect`。\n\n\
  `FileMaker Go` 是一款仅限 iOS 系统的应用程序，可从 Apple App Store 免费获取，它允许 iPhone 和 iPad 用户在离开桌面电脑时访问数据库。用户可以打开存储在\
  \ iOS 设备本地的数据库，或者通过 Wi-Fi 或蜂窝网络从 `FileMaker Server` 或 `FileMaker Cloud` 服务器远程访问数据库。可选地，为桌面设计的数据库可以通过自定义脚本进行设计，以检测用户的移动设备并切换到专为较小屏幕和触摸导航设计的布局。计算和脚本可以利用\
  \ iOS 技术，包括通过相机进行媒体捕获、通过触摸屏进行签名采集、条形码扫描、触控/面容识别等。数据库可以访问关于设备电量、位置、姿态、气压、加速度、磁航向、步数等信息。\n\
  \n`FileMaker WebDirect` 是网络上共享数据库最简单的方法。只需进行一些设置，任何数据库都可以允许通过网页浏览器进行访问，而`无需`使用像\
  \ PHP、HTML5、CSS 或 JavaScript 这样的编码工具。在前端网页中呈现数据库所需的所有网页编程均由 `FileMaker Server` 或\
  \ `Cloud` 自动处理。布局会自动在浏览器中渲染，并且除了一些不兼容的脚本步骤和无法在多个窗口中操作外，大多数功能与在桌面或 iOS 设备上相同。\n\n\
  ## 摘要\n\n本章简要介绍了 FileMaker 的历史背景，并概述了其现产品线。接下来，我们将开始探索桌面应用程序。\n\n"
- "# 2. 探索应用程序\n\n`FileMaker Pro` 是一款适用于 macOS 和 Windows 的桌面应用程序，具有双重用途的界面，集成了`使用`和`开发`数据库的功能。虽然产品线中的其他产品可以`共享`或`使用`数据库，但首先需要桌面应用程序来创建这些数据库。本章介绍该应用程序，涵盖以下主题：\n\
  \n- 介绍启动中心窗口\n- 配置应用程序偏好设置\n- 探索菜单（浏览模式）\n- 使用上下文菜单\n\n## 介绍启动中心窗口\n\n`启动中心`是一个多选项卡窗口，用于创建新数据库、访问现有数据库以及链接到教育资源。该窗口如图\
  \ 2-1 所示，将在您启动应用程序时自动打开。之后，可以通过选择`文件`菜单下的以下任意项来访问它，每个项都对应于窗口的一个选项卡部分：\n\n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig1_HTML.jpg](img/429700_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n\nFileMaker Pro 启动中心\n\n- `创建新文件` – 打开`创建`选项卡以创建数据库、将文件转换为数据库以及访问教育资源\n\
  - `我的 App ➤ 显示我的 App` – 打开`我的 App`选项卡以从 FileMaker Cloud 服务器访问数据库（需要订阅）\n- `收藏 ➤\
  \ 显示收藏` – 打开`收藏`选项卡以访问保存为收藏的数据库\n- `最近使用 ➤ 显示最近使用` – 打开`最近使用`选项卡以访问最近打开的数据库\n\n\
  > **提示**  \n> 在我们继续探索应用程序功能时，请暂时忽略这些选项。要了解有关创建文件的更多信息，请参见第 6 章。\n\n\n\n### 常规：用户界面选项\n\
  \n这些*用户界面选项*控制着应用程序界面的各个方面。`Allow drag-and-drop text selection`（允许拖放文本选择）复选框支持在字段之间、布局之间以及字段与其他应用程序的内容之间进行拖拽。通过`Show\
  \ recently opened files`（显示最近打开的文件）选项，您可以控制`File`（文件）菜单和`Launch Center`（启动中心）中显示的最近打开文件的数量。您可以选择在创建新文件时启用打开`Manage\
  \ Database`（管理数据库）窗口的功能（第 7 章），并点击`Reset`（重置）按钮将所有应用程序对话框重置为默认大小和位置。\n\n还有一些仅适用于\
  \ Windows 的选项，这些选项在 Macintosh 计算机上由操作系统控制，因此不会在前面显示。这些选项包括：增大布局对象尺寸以提高可读性、选择界面语言以及锐化文本。\n\
  \n### 常规：用户名\n\n`username`（用户名）设置确定了数据库识别计算机名称的方式。该行为因平台而异。在 macOS 上，用户名默认为\"System\"\
  （系统），并使用当前用户的计算机账户名。选择\"Other\"（其他）可为本地计算机上的任何用户输入一个静态的覆盖名称。在 Windows 计算机上，则必须输入一个自定义名称。\n\
  \n### 常规：应用程序\n\n`application`（应用程序）设置控制着若干选项。前两个选项控制 FileMaker 是否在软件更新可用时进行检查并通知用户，包括完整版本更新和/或增量更新。底部的`startup\
  \ file`（启动文件）设置允许选择一个文件，该文件将在应用程序启动时自动打开。`Use advanced tools`（使用高级工具）复选框应在任何进行开发的计算机上选中，以启用高级应用程序功能。启用高级工具会显示完整的`Tools`（工具）菜单（本章后续部分会讨论）以及其他功能，包括：\n\
  \n- `File ➤ Manage`（文件 ➤ 管理）子菜单中的两项：`Custom Functions`（自定义函数）和`Custom Menus`（自定义菜单）\n\
  - 对表、字段定义和主题进行复制粘贴\n- 导入表的功能\n\n**提示：** 启用高级工具，然后退出并重新启动应用程序。\n\n## 探索菜单（浏览模式）\n\
  \n默认的\"浏览\"模式菜单栏（如图 2-5 所示）包含用于数据输入和切换到其他模式的命令，包括用于定义数据库结构和设计布局的更深入的开发者界面。\n\n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig5_HTML.jpg](img/429700_2_En_2_Fig5_HTML.jpg)\n\
  \n*图 2-5：默认的浏览模式菜单栏*\n\n本节介绍默认的\"浏览\"模式菜单。有许多上下文相关的项目在各种情况下不会被启用，例如：没有打开数据库、脚本正在运行或暂停、模态窗口打开、或用户的登录账户（第\
  \ 30 章）未授予其访问该功能的权限。同样，在多种其他条件下，部分或全部菜单可能会完全不同，包括：\n\n- `Launch Center`（启动中心）窗口或其他文件对话框处于打开状态。\n\
  - 窗口处于非\"浏览\"模式：查找（第 4 章）、预览（第 4 章）或布局（第 17 章）模式。\n- 按住了`Option`等修饰键。\n- 开发者对话框处于打开状态。\n\
  - 数据库正在使用自定义菜单集（第 23 章）。\n\n### FileMaker Pro 菜单\n\n`FileMaker Pro`菜单（如图 2-6 所示）是仅限\
  \ macOS 的菜单，包含访问应用程序信息、偏好设置和一些操作系统功能。这些选项用于获取应用程序信息、打开偏好设置窗口、隐藏或退出应用，并且可能包含来自操作系统和其他应用程序的服务。在\
  \ Windows 上，此菜单不存在，因此`Preferences`（偏好设置）位于`Edit`（编辑）菜单下，并且`File`（文件）菜单下添加了一个`Exit`（退出）项用于退出应用程序。\n\
  \n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig6_HTML.jpg](img/429700_2_En_2_Fig6_HTML.jpg)\n\
  \n*图 2-6：FileMaker Pro 应用程序菜单*\n\n### 文件菜单\n\n`File`（文件）菜单（如图 2-7 所示）包含许多与文件和开发相关的功能。该菜单的功能包括访问、配置、打印、传输数据等。\n\
  \n顶部的`Create New`（新建）项打开`Launch Center`（启动中心）窗口的相应选项卡，提供对资源、入门模板和电子表格转换功能的访问，并创建新的空白数据库。接下来的四个子菜单项各自提供资源访问，并带有打开窗口或直接访问资源的选项。`My\
  \ Apps`（我的应用）、`Favorites`（收藏夹）和`Recent`（最近）子菜单分别对应一个`Launch Center`（启动中心）选项卡，提供对云账户中、标记为收藏或最近访问的数据库的访问。`Hosts`（主机）子菜单提供对托管数据库的访问，并带有打开`Hosts`（主机）窗口的选项，该窗口按云、收藏夹和本地汇总服务器，并提供添加、编辑或删除主机的选项（第\
  \ 29 章）。\n\n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig7_HTML.jpg](img/429700_2_En_2_Fig7_HTML.jpg)\n\
  \n*图 2-7：文件菜单和管理子菜单*\n\n`Manage`（管理）子菜单提供对开发选项的访问（本章后续部分会介绍），而`Sharing`（共享）子菜单则控制谁能通过网络访问当前数据库，以及本地应用程序共享打开文件的能力（第\
  \ 29 章）。`File Options`（文件选项）打开当前数据库的设置对话框（第 6 章），`Change Password`（更改密码）打开一个对话框，允许用户更改当前用户账户的密码（如果其安全权限允许此操作）（第\
  \ 30 章）。\n\n在输出选项的顶部是`Page Setup`（页面设置）（在 Windows 上称为`Print Setup`（打印设置））和`Print`（打印），它们提供对用于配置当前窗口以进行打印的典型操作系统对话框的访问。接下来，`Import\
  \ Records`（导入记录）和`Export Records`（导出记录）选项提供将数据传入或传出当前数据库的选项（第 5 章）。`Save/Send Record\
  \ As`（另存为/发送记录为）子菜单允许将记录保存为 Excel 或 PDF 文件，或保存为一组记录的快照链接（第 29 章）。`Send`（发送）子菜单包含创建手动电子邮件或创建包含指向当前数据库的\
  \ FileMaker URL 链接的电子邮件的选项（第 31 章）。`Save a Copy As`（另存副本为）菜单可以将整个数据库保存为`copy`（副本）、`compacted\
  \ copy`（压缩副本）或`clone`（克隆）（第 6 章）。最后，`Recover`（恢复）项目启动一个用于故障排除或抢救受损数据库的数据库恢复过程（第\
  \ 6 章）。\n\n\n\n### 文件：管理子菜单\n\n`文件`菜单中的`管理`子菜单（如图 2-7 所示）提供了访问当前数据库文件的内嵌开发界面的入口。每个选项都将在后续章节中讨论：\n\
  \n- `数据库` – 定义表、字段和关系（第 7 章–9 章）\n- `安全` – 配置访问凭据（第 30 章）\n- `值列表` – 定义值列表（第 11\
  \ 章）以格式化字段，加快数据录入速度（第 20 章）\n- `布局` – 创建和管理界面布局（第 18 章）\n- `脚本` – 创建和管理脚本（第 24 章）\n\
  - `外部数据源` – 管理与其他 FileMaker 和 ODBC 数据库的连接（第 9 章）\n- `容器` – 定义图像存储位置（第 10 章）\n- `自定义函数`\
  \ – 创建和编辑自定义全局公式（第 15 章）\n- `自定义菜单` – 创建和编辑自定义菜单（第 23 章）\n- `主题` – 创建和编辑对象样式（第 22\
  \ 章）\n\n#### 编辑菜单\n\n`编辑`菜单包含在编辑字段内容时可用的标准功能，例如`撤销`、`剪切`、`复制`、`粘贴`、`清除`和`全选`。这些都是普遍存在的计算机功能，无需赘述。不过，其他几个选项值得一提。`查找/替换`菜单包含用于在一个或多个记录的字段内进行文本替换的功能，而`拼写`则包含用于更正选定字段内文本或逐一遍历布局上每个字段的选项（第\
  \ 4 章）。`导出字段内容`项会打开一个对话框，用于指定保存当前字段内容的文件名和位置（第 10 章）。\n\n#### 视图菜单\n\n`视图`菜单（如图\
  \ 2-8 所示）包含控制数据库视图的功能。前四项是查看模式：`浏览`（数据录入的默认模式）、`查找`（开始搜索，第 4 章）、`布局`（设计界面，第 17 章）和`预览`（准备打印，第\
  \ 4 章）。`转到布局`子菜单包含一个布局选项列表，用于在布局之间手动导航。三个`视图方式`选项可为当前布局调用新的内容视图。可切换的`状态工具栏`项控制窗口工具栏的可见性，而`自定义状态工具栏`则打开自定义对话框。`格式栏`和`标尺`分别切换工具栏额外水平扩展区域的可见性，而窗口的缩放比例则可通过`放大`和`缩小`以\
  \ 50%的幅度增减。其中大部分功能将在第 3 章中讨论。\n\n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig8_HTML.jpg](img/429700_2_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n\n视图菜单\n\n### 插入菜单\n\n`插入`菜单包含根据上下文敏感的功能，用于将文件或文本插入到字段中（第 4 章“修改字段内容”）。\n\
  \n### 格式菜单\n\n`格式`菜单包含用于编辑字段内容时进行标准文本样式设置功能的子菜单，包括`字体`、`字号`、`样式`、`对齐`、`间距`和`颜色`。\n\
  \n### 记录菜单\n\n`记录`菜单（如图 2-9 所示）包含用于`创建`、`复制`、`删除`、`导航`、`纳入`、`排除`、`排序`和`操作`的功能（第\
  \ 4 章）。\n\n![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig9_HTML.jpg](img/429700_2_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9\n\n记录菜单\n\n"
- '# 脚本菜单


  `脚本`菜单提供对`脚本工作空间`窗口的访问，并显示已配置为在此显示的各个脚本的列表（第 24 章）。


  ### 工具菜单


  `工具`菜单（如图 2-10 所示）包含对关键开发功能的访问，仅在启用了`使用高级工具`首选项时才可用。


  ![../images/429700_2_En_2_Chapter/429700_2_En_2_Fig10_HTML.jpg](img/429700_2_En_2_Fig10_HTML.jpg)


  图 2-10


  工具菜单


  顶部三个选项提供了调试功能的入口（第 26 章）。`自定义菜单`子菜单用于定义和选择自定义菜单集（第 23 章）。分析工具，如`另存为 XML 副本`和`数据库设计报告`，用于创建列出内部结构资源的可读文档（第
  31 章），以便分析或存储。`开发工具实用程序`会打开一个对话框，其中包含文件加密和其他功能（第 31 章）。最后，`工具市场`提供了一个指向在线`Claris
  Marketplace`的快速链接，您可以在其中下载或购买第三方开发工具。


  ### 窗口菜单


  `窗口`菜单包含许多与窗口相关的功能，用于为数据库创建附加窗口，或为打开的任意数据库在多个窗口之间进行选择（第 3 章）。


  ### 帮助菜单


  `帮助`菜单提供对在线资源的访问，包括帮助指南、学习资源、升级、社区网站以及其他与应用相关的功能。


  ## 访问上下文菜单


  当用户在区域或对象上右键单击时，FileMaker 的用户和开发者界面中会出现许多`上下文菜单`。这些菜单按字段、记录内容区域、Web 查看器和窗口进行归纳。每个菜单都根据点击的上下文，提供指向上下文相关命令的特定快捷方式。在后续章节中探索数据库时，请留意这些省时的菜单，它们是搜索拥挤菜单栏的更快捷方式。


  ### 字段的上下文菜单


  字段有六个上下文菜单。这些菜单都包含剪切-复制-粘贴功能，其他功能因字段类型或窗口模式而异：


  - `基于文本的字段（浏览模式）` – 格式化、插入、排序、搜索、图表和导出

  - `基于文本的字段（查找模式）` – 插入运算符

  - `容器字段（浏览模式）` – 插入文件并导出字段内容

  - `汇总字段（浏览模式）` – 格式化、图表和导出

  - `工具栏 ➤ 快速搜索字段（浏览模式）` – 拼写和语法检查、文本替换、转换和语音功能

  - `任意字段（布局模式）` – 文本方向、对象样式选择、指定字段、配置为按钮、定义条件格式、配置脚本触发器、格式化和排列


  ### 记录内容区域的上下文菜单


  数据库窗口的内容区域有一个上下文菜单，该菜单根据窗口模式而变化：


  - `浏览模式` – 复制、创建、复制记录、删除、排序以及保存/发送记录

  - `查找模式` – 复制、添加和删除查找请求

  - `预览模式` – 复制页面、配置页面和打印

  - `布局模式` – 粘贴、设置背景样式以及打开主题和布局设置对话框




  ### Web 查看器的上下文菜单


  `Web 查看器` 有两种上下文菜单，其内容因窗口模式而异：


  - **浏览模式** – 提供刷新内容的选项

  - **布局模式** – 提供剪切-复制-粘贴、设置样式、配置为按钮、配置查看器设置、定义条件格式、配置脚本触发器以及设置各种格式选项的功能


  ### 窗口组件的上下文菜单


  以下三种上下文菜单出现在各种窗口组件上：


  - **布局部分**（布局模式）– 打开**部分定义**对话框，并选择部分的样式或填充颜色

  - **标尺** – 选择磅、英寸或厘米作为度量单位

  - **工具栏** – 打开工具栏自定义对话框


  ### 计算公式的上下文菜单


  **指定计算**对话框（第 12 章）的每个实例都有一个上下文菜单，其中包含文本操作功能，这些功能会根据是否选择文本而略有不同。


  ## 总结


  本章介绍了 **FileMaker Pro** 桌面应用程序的基础知识，涵盖了默认窗口、偏好设置和各种菜单等主题。接下来，我们将开始探索数据库窗口。


  '
- "# 3. 探索数据库窗口\n\n**数据库窗口** 是打开数据库文件的一个视图。作为一个全栈开发环境，FileMaker 的窗口具有不同的窗口模式，用于数据输入和开发。本章从**用户视角**开始探索数据库窗口，涵盖以下主题：\n\
  \n- 识别窗口区域和模式\n- 探索窗口标题栏\n- 管理多个窗口\n\n由于我们直到第 6 章才会讨论创建数据库文件，为了跟随对窗口界面的探索，请花点时间从\
  \ Apress 网站 ([*https://www.apress.com/9781484266793*](https://www.apress.com/9781484266793))\
  \ 下载 Learn FileMaker 示例文件，并打开**第** **3** **-** **5** **章**文件夹。此示例包含一个简单的**联系人**表，该表有两个布局和一个简单的自定义主题，用于为本书呈现美观的示例图片。\n\
  \n## 识别窗口区域和模式\n\n如图 3-1 所示的数据库窗口分为两个主要区域：**工具栏** 和 **内容区域**。**工具栏**（本章稍后讨论）是标题区域，包含两行控件，这些控件在所有数据库中都保持一致，但提供一些自定义选项。**内容区域**\
  \ 包括工具栏下方的区域，用于显示由开发者设计的自定义用户界面。在此示例中，窗口预配置了一些简单的界面元素。创建新的空白文件时（第 6 章），此区域将完全空白，需要设计布局（第\
  \ 17–22 章），布局在图形上可以更加复杂。此区域一次显示一个布局，但可以在文件中创建的任意数量的布局之间切换。内容的呈现方式取决于所选的**窗口模式**\
  \ 和 **内容视图**。\n\n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig1_HTML.jpg](img/429700_2_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** 两个窗口区域：工具栏（顶部）和内容区域（底部）\n\n### 定义窗口模式\n\n**窗口模式** 是一种显示状态，它会针对特定功能目的优化窗口界面。FileMaker\
  \ 有四种模式，将在几个不同的章节中描述：**浏览**、**查找**、**预览** 和 **布局**。\n\n**浏览模式** 是默认的窗口状态，用于与数据库内容进行交互并执行数据输入相关的任务。在浏览模式下，窗口的内容区域会呈现来自布局表的一组记录。根据布局的设计和帐户权限，用户可以与此数据交互，以创建、查看、编辑、删除、复制、搜索、排序和忽略记录，并与其它对象进行交互。\n\
  \n**查找模式** 是一种用于输入搜索条件的窗口状态。在查找模式下，布局会转换为一个空白的类似于记录的**请求**，用户在其中输入条件，以在执行搜索前定义所需的一组记录。\n\
  \n**预览模式** 是一种类似于打印预览的窗口状态，显示当前布局和找到的记录集在打印页面上的外观。布局看起来与浏览模式相似，但处于非功能状态。因此，字段不可编辑，未隐藏的按钮显示为不可点击的图形。此外，对象可能会根据其在布局上的定义方式而隐藏、滑动、压缩、汇总和更改格式。\n\
  \n**布局模式** 是一种用于创建界面布局的窗口状态。使用特殊的设计工具向布局添加和配置对象。\n\n每种模式都有独特的工具栏、菜单栏和内容区域呈现方法。根据其访问权限（第\
  \ 30 章），用户可以通过单击状态工具栏中的模式按钮、从**视图**菜单中选择模式或运行更改模式的脚本，来更改窗口的模式。本章和第 4 章将讨论如何使用浏览模式，以及如何使用查找和预览模式。在第\
  \ 17–22 章中，我们将探讨如何在布局模式下设计自定义界面元素。\n\n### 定义内容视图\n\n**内容视图** 是一种界面设置，决定在浏览模式下，记录如何显示在窗口的内容区域中。根据布局设置（第\
  \ 18 章“视图”）强制的限制，用户可以选择以最多三种格式查看记录：**表单**、**列表** 或 **表格**。可以通过从**视图**菜单中选择菜单项、单击工具栏中的**视图方式**图标或运行更改视图的脚本，来更改布局的当前视图。\n\
  \n在**表单视图**中，窗口一次只显示一条记录，该记录通过一组完整的布局元素呈现。要查看此视图中的其他记录，请使用工具栏中的导航控件或设计用于转到其他记录的自定义界面元素。这类似于查看从文件柜中取出的一张纸或一本书中的单页。\n\
  \n在**列表视图**中，窗口会显示一个连续的记录列表，通过将布局元素为每条记录重复一次来呈现。在此视图中，用户可以上下滚动以查看其他记录。这类似于查看文件柜中文件夹上的标签序列或书的目录。\n\
  \n在**表格视图**中，窗口以列和行的电子表格式格式显示一组记录，同时排除布局上存在的其他图形元素。用户可以通过拖动列标题来重新排列和调整列的大小。他们可以通过单击标题对记录进行排序。可以以类似于电子表格的方式直观地创建新字段（列）和新记录（行）。每个字段标题中都隐藏着一个弹出式操作菜单，提供对各种功能的快速访问，包括排序、汇总、字段控制和视图控制。表格视图在设计和自定义功能方面并不突出，但它为那些习惯于使用电子表格的用户提供了更熟悉的环境，并且可能适用于不需要复杂界面的简单数据库。\n\
  \n## 探索窗口标题栏\n\n根据用户的访问权限、偏好设置以及开发者建立的设置，窗口的工具栏区域可以显示或隐藏三个水平栏。它们是：**状态工具栏**、**格式栏**\
  \ 和 **标尺**。\n\n\n\n### 状态工具栏（浏览模式）\n\n`状态工具栏`是沿着窗口顶部延伸的最显眼区域，其中包含与当前窗口模式相关的控件。默认情况下，它是窗口标题栏唯一可见的部分。除非被脚本隐藏并锁定，用户可以通过菜单选择`查看\
  \ ➤ 状态`来切换工具栏的可见性。\n\n#### 默认工具栏项目（浏览模式）\n\n浏览模式的默认工具栏配置如图 3-2 所示。上半部分可自定义（将在本节后面讨论），下半部分是固定的。\n\
  \n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig2_HTML.jpg](img/429700_2_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n默认浏览模式工具栏配置的剖析\n\n##### 记录导航控件\n\n工具栏中的`记录导航控件`（如图 3-3 所示）显示正在查看的记录的信息，并允许用户在已找到的记录集中移动（第\
  \ 4 章）。\n\n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig3_HTML.jpg](img/429700_2_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n默认浏览模式导航控件\n\n工具栏的导航控件包括：\n\n1. `记录导航箭头` – 点击可移动到上一条或下一条记录。\n\n2. `记录编号和滑块`\
  \ – 当前记录的编号。移动滑块或输入记录编号可跳转到另一条记录。\n\n3. `找到集状态` – 显示记录总数、找到集数量（若为总数的子集）以及排序状态。查看子集时，点击圆形图标可在找到记录和排除记录之间切换。\n\
  \n###### 功能按钮\n\n工具栏中的`功能按钮`（如图 3-4 所示）允许用户执行各种记录功能（第 4 章）并访问共享功能菜单（第 29 章）。\n\n\
  ![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig4_HTML.jpg](img/429700_2_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n\n浏览模式下的默认工具栏按钮\n\n##### 快速查找搜索字段\n\n工具栏的右上方是一个搜索字段，用于执行`快速查找`（第 4 章，“使用快速查找进行搜索”）。\n\
  \n### 布局菜单\n\n工具栏中较低且不可自定义的层级以`布局`菜单开始。在浏览模式下，它会显示一个可见布局的列表（第 18 章），用于手动导航到其他布局，与`查看\
  \ ➤ 转到布局`菜单相同。\n\n##### 内容视图按钮\n\n下方栏中的下一个项目是三个`内容视图按钮`，用于更改窗口视图中内容的格式，如本章前面所述。此处启用的视图按钮由当前布局的视图设置控制（第\
  \ 18 章）。\n\n##### 预览按钮\n\n工具栏的`预览按钮`将窗口切换到预览模式（第 4 章）。\n\n### 格式栏按钮\n\n`格式栏按钮`在状态工具栏和窗口内容区域之间切换文本编辑控件栏的可见性（将在本章后面描述）。\n\
  \n##### 编辑布局按钮\n\n`编辑布局按钮`将窗口切换到布局模式（第 17 章）。\n\n#### 自定义工具栏（浏览模式）\n\n工具栏上半部分的控件可以在用户计算机级别进行自定义。这意味着用户可以自定义工具栏中控件的包含和排列方式，这将影响用户在其计算机上打开的所有数据库。打开数据库后，选择`查看\
  \ ➤ 自定义状态工具栏`菜单以打开自定义面板。在 macOS 上，这是一个附加到窗口的图形面板，如图 3-5 所示。在该对话框的左下角，有一个`显示`菜单，用于控制工具栏中的按钮格式。选项如下：`仅图标`、`仅文本`或默认的`图标和文本`。在\
  \ Windows 上，会出现一个不太美观的列表式对话框，并提供类似的拖放选项。\n\n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig5_HTML.jpg](img/429700_2_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\n浏览模式的工具栏自定义面板（macOS）\n\n##### 添加、移除和重新排列工具栏项目\n\n要向工具栏添加项目，请将图标从自定义面板拖到工具栏区域并释放。FileMaker\
  \ 会自动替换工具栏中已存在的同一控件，以避免重复。要移除项目，请将其拖出工具栏区域并释放鼠标按钮。项目可以通过在工具栏内拖动进行重新排列。\n\n#####\
  \ 恢复默认工具栏设置\n\n要恢复默认控件集，请将面板底部矩形中的组拖到工具栏中并释放。\n\n### 格式栏\n\n`格式栏`是一组可选的文本格式控件，如图\
  \ 3-6 所示。当选择`查看 ➤ 格式栏`菜单或点击工具栏右下角的按钮时，该栏会出现在默认状态工具栏底部与内容区域顶部之间。当用户点击进入文本字段时，这些用于`字体`、`样式`、`大小`、`颜色`、`高亮`、`强调`和`文本对齐`的控件将被启用。\n\
  \n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig6_HTML.jpg](img/429700_2_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n格式栏和切换按钮\n\n### 水平标尺\n\n可以激活一个`水平标尺`，它显示在其他标题栏下方，如图 3-7 所示。`查看 ➤ 标尺`菜单可切换此标尺的可见性。可以使用其上下文菜单更改标尺的`度量单位`，选项包括`厘米`、`英寸`和`磅`。只有当光标在文本字段内时，浏览模式的标尺才变得有用，它会缩小到字段的大小并显示制表符和页边距。这些设置也可以通过布局工具进行修改（第\
  \ 19 章，“探索检查器面板”）。\n\n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig7_HTML.jpg](img/429700_2_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7\n\n可见的标尺（上方）和字段获得焦点时的标尺（下方）\n\n## 使用多个窗口\n\n当打开一个数据库时，窗口会自动出现并显示默认布局。用户可以在该窗口中导航到其他布局，或者打开额外的窗口以访问同一文件的多个同时视图。他们可以查看布局和记录已找到集的任意组合。例如，可以在一个窗口中查看`联系人`记录，在另一个窗口中查看`联系人`列表，在第三个窗口中查看`公司`列表。打开一个新窗口允许在一个窗口中保留已找到集的位置，同时在相同或不同表中处理其他记录。用户和脚本可以根据需要打开和关闭窗口，以更有效地完成任务。脚本可以创建屏幕外的新窗口，以在不干扰当前视图的情况下执行工作（第\
  \ 25 章）。\n\n\n\n### 创建新窗口\n\n选择 `Window ➤ New Window` 菜单来手动创建新窗口。新窗口将显示在当前窗口的前方，并略微偏移。它最初会是当前窗口的完全副本，具有相同的属性：`名称`（带后缀）、模式、视图、尺寸、**工具栏可见性**、布局、找到的记录集和当前记录。打开后，可以通过搜索、导航、移动和调整大小来更改这些属性。\n\
  \n多窗口非常适合并排查看记录或在不同的工作之间交替。然而，如果用户试图编辑一个在其他窗口中拥有活动焦点的记录，将会出现冲突警告。因此，建议用户谨慎使用此功能，并提醒他们在完成需要多个窗口的任务后，关闭多余的窗口并恢复到单个窗口。选择\
  \ `File ➤ Close Window` 菜单或点击窗口标题栏上的关闭图标即可关闭窗口。\n\n### 从菜单中选择窗口\n\n每个新窗口都会添加到 `Window`\
  \ 菜单底部的列表中，如图 3-8 所示。这是一个混合列表，包含*所有打开的数据库*中所有可见的打开窗口，也包括那些位于屏幕外的窗口。该列表显示了窗口从前到后的当前堆叠顺序。选择一个窗口可将其置于最前。\n\
  \n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig8_HTML.jpg](img/429700_2_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8**  \nWindow 菜单底部列出了所有可见窗口\n\n### 隐藏和显示窗口\n\n窗口可以保持打开状态但被隐藏。当数据库打开另一个数据库以访问其资源时，或者当脚本明确隐藏窗口时，会自动发生这种情况。用户可以通过选择\
  \ `Window ➤ Hide Window` 菜单手动隐藏窗口。每个隐藏的窗口都列在 `Window ➤ Show Window` 子菜单下，如图 3-9\
  \ 所示。从此列表中选择一个窗口会使其可见并将其置于最前。`Bring All To Front` 选项可使所有隐藏窗口变为可见。屏幕外的窗口可以通过 `Tile\
  \ Horizontally`、`Tile Vertically` 和 `Cascade Windows` 一次性全部恢复到视图中，并与屏幕上的窗口整齐排列。选择\
  \ `Minimize Window` 菜单项，可以将窗口最小化到 macOS 或 Windows 的 Dock 中。当最小化时，它会在菜单中列为一个已打开的窗口，但必须点击才能将其恢复到视图中。\n\
  \n![../images/429700_2_En_3_Chapter/429700_2_En_3_Fig9_HTML.jpg](img/429700_2_En_3_Fig9_HTML.jpg)\n\
  \n**图 3-9**  \n包含隐藏窗口的子菜单\n\n## 总结\n\n本章探讨了窗口的结构、工具栏控件以及管理多个窗口。在下一章中，我们将开始处理记录。\n\
  \n"
- "# 4. 处理记录\n\n`记录`是表中内容的主要单元，是一组共同代表特定实体的值。使用电子表格的比喻来类比数据库文件与电子表格文件：表就像一个工作表，字段就像一列，而记录就像一行。在`联系人`表中，一条记录代表*一个人*，而在`库存`表中，一条记录代表*一个产品*。在使用数据库时，用户大部分时间都在执行涉及创建、编辑、删除、排除、搜索、导出、导入、打印和查看记录的任务。尽管一个数据库可以包含多个不同的表，每个表都有自己的记录集合，但本章使用包含单个`联系人`表的\
  \ `Learn FileMaker 第 3-5 章`示例文件。这简化了示例，并为以后开发更复杂的自定义解决方案提供了必要的基本上下文。本章探讨用户与记录的交互，涵盖以下主题：\n\
  \n- 输入数据\n- 创建、删除和复制记录\n- 搜索记录\n- 处理找到的记录集\n- 打印\n\n## 输入数据\n\n数据输入任务涉及打开一条记录、聚焦到某个字段、修改字段内容、在字段之间移动，然后提交（关闭）记录或将其还原。\n\
  \n### 打开记录\n\n`打开`记录会使布局上的字段从显示信息的状态转变为可供数据输入的编辑状态。要打开当前记录进行数据输入，请点击布局中任何可编辑的字段，或按\
  \ `Tab` 键进入第一个可编辑字段。\n\n### 了解字段焦点\n\n当字段准备好接受输入时，它便具有`焦点`。一次只能有一个字段具有活动焦点，这一点可通过字段内闪烁的文本光标直观地指示出来。字段的视觉外观也可能根据应用于其`聚焦`状态的布局设置而变化（第\
  \ 22 章，“编辑对象的样式设置”）。布局的设计应提供一些视觉变化，让用户清楚地知道记录已打开，以及哪个字段将接收他们的输入。例如，字段边框可能变得可见、改变粗细或应用颜色。字段的填充颜色也可以改变。在\
  \ `Learn FileMaker` 示例文件中，焦点通过一个更深的简单边框表示，如图 4-1 所示。可以通过点击其他字段，或按 `Tab` 键或其他按键，根据字段设置将焦点移动到`制表顺序`中的下一个字段来转移焦点（第\
  \ 21 章）。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig1_HTML.jpg](img/429700_2_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1**  \nLearn FileMaker 示例文件中处于焦点的字段\n\n\n\n### 修改字段内容\n\n当一条记录被打开且某个字段获得焦点时，可以通过多种方式更改字段中的值，具体取决于字段的数据类型（第\
  \ 8 章）或布局行为及格式设置选项（第 19 章和第 20 章）。这些方式可能包括输入、剪切、复制粘贴、撤销重做、插入函数或鼠标点击。\n\n在任何数据输入字段中输入数据最常用的方法就是直接在键盘上输入。只要字段处于焦点状态，输入的任何内容都会作为其内容流入。\n\
  \n与大多数应用程序一样，FileMaker 的“编辑”菜单包含用于剪切、复制、粘贴、撤销和重做的命令。这些功能仅影响获得焦点时字段中存储的内容。例如，“撤销”将回退刚在活动字段中进行的文本更改，但不能撤销创建或删除记录等操作，并且在记录关闭且更改被提交后不起作用。\n\
  \n当在应用程序偏好设置中启用了拖放功能（第 2 章）时，文本可以在字段内拖拽以重新排列。它也可以从一个字段拖拽到另一个字段，在不同窗口的字段之间拖拽，以及在字段与其他应用程序的文本之间拖拽。\n\
  \n“插入”菜单以及字段上下文菜单中同名的子菜单包含用于快速将内容插入字段的功能。每个功能都会根据焦点所在字段的数据类型（第 8 章）和该字段在布局上的可编辑状态（第\
  \ 19 章）按情况启用。通过选择“插入图片”、“插入音频/视频”、“插入 PDF”或“插入文件”功能，可以插入不同类型的文件。使用其他功能可以快速插入当前日期、当前时间或当前用户名。“来自索引”选项用于从输入到该字段（在所有记录中）的值索引列表中选择一个值并插入到当前字段中。“来自上次访问的记录”选项则插入上次查看记录中当前字段的值。\n\
  \n最后，字段还可以配置为允许通过鼠标点击进行数据输入的控件样式。例如，复选框样式允许通过勾选框来输入值，而日历样式则提供一个图形化日历用于日期输入（第 20\
  \ 章）。\n\n### 关闭记录\n\n编辑完成后，必须关闭记录以提交或还原更改。还原操作会关闭记录并放弃在该会话期间所做的所有更改。可以通过选择“记录”➤“还原记录”菜单或运行执行同名功能的脚本来还原记录。提交操作会关闭记录并保存该会话期间所做的更改。在此过程中，FileMaker\
  \ 将执行数据输入验证，并在检测到问题时报告。可以通过多种方式提交记录。手动提交记录可以按 Enter 键，或者点击布局背景上远离其他对象的位置。其他会提交当前记录的操作包括：导航到另一条记录、创建新记录、关闭当前窗口、关闭文件，或者运行使用“提交记录/请求”脚本步骤的脚本。\n\
  \n> **提示**  \n> 可以将布局配置为在提交时自动保存更改或显示确认对话框（第 18 章）。\n\n## 创建、删除和复制记录\n\n用户可以创建、删除、删除全部以及复制记录。用户可以通过“记录”菜单或自定义脚本访问所有这些命令。有些命令也可以通过工具栏图标或布局背景上的记录上下文菜单访问。\n\
  \n“新建记录”功能将在前台窗口当前布局的表中创建一个新的空白记录，并自动打开它，将焦点置于第一个字段。\n\n“删除记录”功能将在显示警告对话框以确认用户意图后，永久删除窗口中的当前记录。用户可以在选择“删除记录”选项时按住\
  \ Option（macOS）或 Shift（Windows）键来绕过此警告对话框并立即删除记录。虽然这对高级用户来说可能是个有用的技巧，但这可能很危险，不应传授给新用户。使用自定义菜单禁用此功能可能是明智之举（第\
  \ 23 章）。“删除全部记录”功能将删除当前找到集中的所有记录。\n\n“复制记录”功能将创建当前记录的一个副本，并保留所有本地字段的值。\n\n> **提示**\
  \  \n> 要重置“学习 FileMaker” 第 3 章至第 5 章的示例数据，请选择“脚本”菜单下的“重置示例记录”。\n\n## 搜索记录\n\n一个\
  \ FileMaker 表最多可以包含 64 千万亿条记录。虽然大多数表可能永远达不到这个数字，但随着记录数量的增长，找到特定记录就变得越来越困难。即使只浏览几百条记录来查找一条，也可能会不必要地耗费时间。相反，记录搜索可以根据用户指定的条件快速创建出一个更小的临时记录子集。搜索帮助用户定位用于数据输入工作的记录，也能将一组记录隔离出来用于诸如打印或导出等流程。FileMaker\
  \ 提供了几种搜索记录的方法：使用快速查找或字段选择进行快速搜索、使用“查找”模式构建复杂查找、SQL 查询（第 16 章）或自定义脚本（第 24 章）。\n\n\
  > **警告**  \n> 除 SQL 查询外，所有搜索都是上下文相关的，并且是从窗口布局的角度执行的！\n\n### 执行快速搜索\n\nFileMaker\
  \ 提供了两种执行单条件搜索的选项：“快速查找”和“查找匹配项”。\n\n#### 使用快速查找进行搜索\n\n快速查找功能会在当前布局的表中搜索记录，查找条件存在于布局上那些专门配置为包含在快速查找中的任何字段中（第\
  \ 19 章，“检查数据设置”）。要手动执行此类查找，请在位于工具栏的搜索字段中输入一个词或短语（如图 4-2 所示），然后按 Enter 键。窗口中可见的记录将更新为仅包含那些在某个字段中具有匹配值的记录，并且导航区域中的“找到/总记录”计数会反映此变化。点击快速查找字段中的放大镜图标，可以查看文件中来自任何表的最近搜索列表，然后选择一个搜索条件，为当前布局的表重复执行该搜索。\n\
  \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig2_HTML.jpg](img/429700_2_En_4_Fig2_HTML.jpg)\n\
  \n*图 4-2：工具栏中的“快速查找”字段*\n\n> **警告**  \n> 搜索之后，文本会保留在搜索字段中，但不会与找到集交互。如果用户或脚本更改了找到集，该搜索条件会像一个过时的上次搜索提醒一样残留下来，不再与实际显示的记录相关。\n\
  \n\n\n"
- "# 使用查找匹配进行搜索\n\n*查找匹配*类型搜索利用字段中的文本选定内容作为条件，快速搜索同一字段中包含该值的所有记录。通过在字段中高亮显示某些文本并右键单击以访问上下文菜单，即可使用三种功能，如图\
  \ 4-3 所示。每种功能都会通过匹配当前字段中的选定值来执行预定义类型的搜索。`查找匹配记录`选项会执行一次新查找，查找字段中包含选定值的记录。其余选项则用于修改当前的查找结果集；`缩小查找结果集`会执行收窄查找，仅保留查找结果集中字段包含选定值的记录；`扩大查找结果集`则执行扩展查找，将字段中包含选定值的任何记录添加到查找结果集中。\n\
  \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig3_HTML.jpg](img/429700_2_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3 — 字段上下文菜单中的查找匹配记录功能\n\n## 使用查找模式\n\n对于更复杂的搜索任务，*查找模式*是一种过渡性窗口状态，它会更改菜单、工具栏和内容区域，以便灵活输入搜索条件，如图\
  \ 4-4 所示。首先，通过选择`视图`菜单下的`查找模式`或单击`查找`工具栏图标进入查找模式。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig4_HTML.jpg](img/429700_2_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4 — 处于查找模式下的窗口会进行转换，显示查找请求和与搜索相关的工具栏功能\n\n### 状态工具栏（查找模式）\n\n查找模式的工具栏会变为搜索专用按钮，即默认的查找选项或用户自定义设置。\n\
  \n#### 默认工具栏项（查找模式）\n\n查找模式的默认工具栏如图 4-5 所示。与浏览模式类似，顶部区域可以自定义，底部区域则是固定的。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig5_HTML.jpg](img/429700_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5 — 默认查找模式工具栏的结构解析\n\n#### 导航控件\n\n查找模式下的*导航控件*与浏览模式类似，不同之处在于它们显示的是与*查找请求*相关的信息和导航选项，而非关于记录的信息。\n\
  \n###### 功能按钮\n\n查找模式工具栏中的*功能按钮*包括：\n\n* `新建请求` – 创建新的查找请求以输入备选条件\n* `删除请求` – 删除当前的查找请求\n\
  * `执行查找` – 执行查找并返回浏览模式，同时显示生成的查找结果集\n* `取消查找` – 返回浏览模式并保留之前的查找结果集\n\n##### 已保存的查找菜单\n\
  \n工具栏最右侧的`已保存的查找`按钮提供了一个菜单，可访问为当前表明确保存的查找。选择这些查找可以立即执行搜索，而无需输入自定义条件。请参阅本章后面的“使用已保存的查找”。\n\
  \n### 布局菜单\n\n查找模式工具栏中较低且不可自定义的层级以`布局`菜单开始。其工作原理与浏览模式相同，允许用户切换布局。在查找模式下，如果用户希望使用仅在多个布局上可见的字段来创建查找，此功能会很有用。但由于查找需要表上下文，在执行时，*只有输入在与当前布局相同的表的布局上的条件才会被视为请求的一部分*。因此，请仅使用此功能来访问单个表的布局上的字段，因为其他表的字段将被忽略。\n\
  \n##### 内容视图按钮\n\n*内容视图按钮*的工作原理与浏览模式（第 3 章）相同，将内容呈现为列表、表单或表格形式。\n\n##### 匹配记录选项\n\
  \n*匹配记录选项*是两个可切换的选项，用于确定是否将匹配当前查找请求的记录*包含*在生成的查找结果集中，或是从中*排除*。请参阅本章后面的“指定匹配记录选项”。\n\
  \n### 插入运算符菜单\n\n`插入运算符`菜单包含搜索运算符，可以插入到字段中，可配合其他条件使用，以增强搜索参数。请参阅本章后面的“使用搜索运算符”。\n\
  \n#### 自定义工具栏（查找模式）\n\n查找模式工具栏可在用户计算机级别进行自定义。进入查找模式，选择`视图 ➤ 自定义工具栏`菜单，即可打开附加到窗口上的自定义面板，如图\
  \ 4-6 所示。虽然可用的按钮不同，但可以按照第 3 章中描述的浏览模式那样添加或移除它们。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig6_HTML.jpg](img/429700_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6 — 查找模式的工具栏自定义面板\n\n### 输入条件并执行查找\n\n在查找模式下，窗口的内容区域会呈现为当前布局的空白版本，称为*查找请求*。这看起来类似于一条记录，但用于输入搜索条件。与`快速查找`和`查找匹配记录`功能（用户一次只搜索一条信息）不同，查找请求允许在多个字段中输入条件。用户将条件输入到特定字段中，以构建更精确、更复杂的搜索请求。条件可以输入、粘贴或插入到字段中，并可结合搜索运算符使用。要成为符合匹配条件的记录，必须与单个请求中输入的所有值都匹配。\n\
  \n在相应字段中输入所需条件后，可以通过按`Enter`键、单击`执行查找`工具栏按钮或选择`请求 ➤ 执行查找`菜单来执行搜索过程。FileMaker 将在当前表中搜索指定的字段中匹配条件的记录，并显示结果查找结果集。如果没有结果，将弹出一个对话框，让用户选择返回到查找模式并编辑条件，或取消该过程并返回浏览模式。\n\
  \n尝试搜索 *Learn FileMaker* 示例记录，以获取为特定公司工作的联系人结果查找结果集，如图 4-7 所示，并按照以下步骤操作：\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig7_HTML.jpg](img/429700_2_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7 — 搜索得到的结果查找结果集仅显示匹配的记录\n\n1.  进入查找模式。\n2.  单击进入`公司`字段。\n3.  输入所需值的部分或全部内容，例如“Widget”。\n\
  4.  单击工具栏中的`执行查找`按钮或按`Enter`键。\n\n尝试使用不同的条件组合。例如，在`公司`字段中搜索“Widget”，并在`名字`字段中搜索“Karen”。由于结果必须同时包含这两个值，因此只会返回一条匹配的记录。\n\
  \n\n\n### 使用搜索运算符\n\n*搜索运算符*是用于精确限定字段中输入搜索条件范围的一个或一组字符。若不使用运算符，FileMaker 默认执行“开头为”类型的搜索，即匹配单词开头的文本。因此，搜索`Widget`、`Wid\
  \ Manu`或`W M`均能查找到字段中包含`Widget Manufacturing`的记录。在**查找模式**下，可通过直接在字段中输入运算符、使用工具栏中的*插入运算符*菜单或从字段的上下文菜单中选择*运算符*子菜单，将运算符添加到字段中，具体运算符将在表\
  \ 4-1 中说明。要查看运算符的实际效果，请在*公司*字段中输入感叹号（`!`），以查找所有包含重复值的记录；或者在*姓氏*字段中搜索`*n`，以查找名称以此字符结尾的记录。\n\
  \n**表 4-1** 查找模式下的可用运算符说明\n\n| 运算符 | 说明                                        \
  \                                                                              \
  \                                                                              \
  \                      |\n|--------|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
  | `=`    | 单独使用，查找该字段为空的记录。放在值前面，匹配字段中的完整单词，排除部分匹配。                            \
  \                                                                              \
  \                                      |\n| `==`   | 放在值前面，匹配字段中的整个短语。         \
  \                                                                              \
  \                                                                              \
  \                       |\n| `!`    | 查找该字段中存在重复值的记录，即该字段的值在其他记录中也存在。          \
  \                                                                              \
  \                                                                          |\n|\
  \ `<`    | 查找数值或文本值小于符号后输入值的记录。                                                \
  \                                                                              \
  \                                                        |\n| `≤`    | 查找数值或文本值小于或等于符号后输入值的记录。\
  \                                                                              \
  \                                                                              \
  \                    |\n| `>`    | 查找数值或文本值大于符号后输入值的记录。                        \
  \                                                                              \
  \                                                                              \
  \  |\n| `≥`    | 查找数值或文本值大于或等于符号后输入值的记录。                                       \
  \                                                                              \
  \                                                           |\n| `...`  | 根据运算符前后输入的文本查找一系列值。例如，输入`1/15/2021…1/30/2021`（不含引号），可查找字段中包含所列两个日期之间（含这两个日期）日期的所有记录。\
  \                                                                            |\n\
  | `//`   | 查找字段中包含当天日期的记录。                                                     \
  \                                                                              \
  \                                                             |\n| `?`    | 查找字段中包含无效值的记录。\
  \                                                                              \
  \                                                                              \
  \                                      |\n| `@`    | 查找字段中包含特定数量任意字符的记录。例如，`@@`将匹配`He`或`It`，而`@@@@`将匹配`Door`或`Test`。\
  \                                                                              \
  \                                               |\n| `#`    | 查找字段中包含特定数量任意数字的记录。例如，`#`将匹配`3`或`8`，而`##`将匹配`33`或`81`。\
  \                                                                              \
  \                                                         |\n| `*`    | 用于代替字符创建搜索模式，表示必须存在某些值。例如，单独使用将查找该字段包含任何值的所有记录（即排除空值）；或输入`1/15/*`，可查找字段中包含任意年份\
  \ 1 月 15 日的所有记录。                                                         |\n| `\\\
  `    | 对下一个字符进行转义。当搜索字面运算符时非常有用，可将运算符视为搜索条件的一部分而非运算符。例如，要查找字段中包含引号的记录，请输入`\\\"`。\
  \                                                                              \
  \     |\n| `` `\"\" `` | 用于精确匹配引号之间的短语。                                        \
  \                                                                              \
  \                                                                            |\n\
  | `*\"\"`  | 用于匹配包含大量文本的字段中任意位置的引号之间的短语。                                       \
  \                                                                              \
  \                                                   |\n| `~`    | 用于对日文文本执行宽松搜索。\
  \                                                                              \
  \                                                                              \
  \                                      |\n\n### 操作先前执行的查找\n\n执行查找后，FileMaker 提供了三种无需从头创建新请求即可进一步优化结果的方法：*修改*、*扩展*和*约束*上一次的查找结果。\n\
  \n#### 修改上一次查找\n\n*修改上一次查找*功能会重建在当前表中执行的最后一次查找的查找请求和条件，并允许编辑条件并执行修改后的搜索。此命令可通过*记录*菜单、工具栏中*查找*图标下的菜单或作为脚本中可包含的步骤来使用。\n\
  \n#### 扩展上一次查找\n\n*扩展查找结果集*命令使用新的搜索来查找匹配的记录并将其添加到当前查找结果集中。可通过两种方式访问。在**浏览模式**下，选中字段中的某些文本，然后从上下文菜单中选择`命令`。系统会使用选中的文本来查找不在结果集中的记录并将其添加进来。在**查找模式**下，输入条件并选择*请求\
  \ ➤ 扩展查找结果集*菜单（而非*执行查找*）。结果将添加到当前结果集中。例如，如果当前查看的查找结果集中记录的*州*为`NY`，则进入查找模式，在*州*字段中输入`CO`，然后选择*扩展查找结果集*，结果将得到一个来自*两个州*的联系人扩展列表。\n\
  \n#### 约束上一次查找\n\n*约束查找结果集*命令使用新的请求从当前结果集中移除记录。可通过两种方式访问。在**浏览模式**下，选中字段中的某些文本，然后从字段上下文菜单中选择*约束查找结果集*。系统会使用选中的文本在当前结果集中仅保留包含匹配值的记录。在**查找模式**下，输入条件并选择*请求\
  \ ➤ 约束查找结果集*菜单（而非*执行查找*）。上次结果集中不匹配条件的记录将被移除。例如，如果当前查看的结果集中记录的*公司*为`Widget`，则进入查找模式，在*州*字段中输入`CO`，然后选择*约束查找结果集*，最终的结果集将仅保留上一次结果集中来自科罗拉多州的联系人。\n\
  \n### 管理多个查找请求\n\n查找模式会创建一个默认的查找请求。可扩展此请求以创建更复杂的搜索。每个请求都提供一组额外的条件，用于定义匹配记录应包含在结果中还是从中排除。所有请求的结果将被合并为最终结果。因此，如果一个请求指定了*州*为`NY`的记录，另一个请求指定了*州*为`CO`的记录，则结果将是这两组记录的合并列表。包含多个字段条件的单个请求相当于“与”类型搜索，记录必须满足所有值才能包含在结果中。换句话说，它必须在一个字段中包含指定值*并且*在另一个字段中包含指定值。相反，多个请求则相当于“或”类型搜索，记录必须至少满足一个请求的所有条件。换句话说，它必须包含来自一个请求的指定值*或者*来自另一个请求的指定值。\n\
  \n用户可以像操作记录一样*创建*、*删除*和*复制*查找请求，不同之处在于这些操作通过*请求*菜单访问，该菜单在查找模式下会替代*记录*菜单。其中一些操作也可通过工具栏图标或布局背景上的*记录上下文菜单*访问。\n\
  \n### 指定匹配记录选项\n\n每个新查找请求都有一个默认的*匹配记录选项*，设置为`包含`，这意味着匹配请求条件的记录将包含在结果中。如果在下部工具栏中将此选项切换为`排除`，则匹配的记录将从之前请求的结果中排除。在图\
  \ 4-8 所示的示例中，第一个请求将包含*公司*字段中所有包含`Widget`的记录，第二个请求将从该结果集中排除任何*名字*为`Jim`的匹配项。最终结果将是所有为\
  \ Widget 公司工作（除了 Jim）的联系人。将此设置与多个查找请求结合使用，可以构建并执行极其复杂的包含-排除多条件搜索。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig8_HTML.jpg](img/429700_2_En_4_Fig8_HTML.jpg)\n\
  \n**图 4-8** 设置为排除结果的第二个查找请求示例\n\n\n\n### 使用已保存的查找\n\n查找请求可以保存以供将来重复使用。在浏览模式下，可通过*查找*按钮工具栏和*记录\
  \ ➤ 已保存的查找*菜单访问*已保存的查找*菜单。在查找模式下，可通过*已保存的查找*工具栏按钮访问该菜单。此菜单用于*保存*和*管理*已保存的查找，以及*执行*已保存或最近的查找。\n\
  \n*保存当前查找*选项将打开一个对话框以开始保存过程。可以输入名称，并且可以选择编辑条件。在浏览模式下，将保存最后执行的查找。在查找模式下，将保存输入的当前查找条件。\n\
  \n*编辑已保存的查找*选项会打开一个同名的对话框，如图 4-9 所示，该对话框用于创建、编辑、复制或删除已保存的查找。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig9_HTML.jpg](img/429700_2_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n用于查看和管理已保存查找的对话框\n\n#### 管理查找请求\n\n保存或编辑查找时，会打开一个*为已保存的查找指定选项*对话框，其中显示该查找的名称。单击*高级*按钮将在*指定查找请求*对话框中打开存储的条件，如图\
  \ 4-10 所示。此对话框中的每一行代表构成该查找的一个请求。可以使用此对话框上的按钮*创建*、*编辑*、*复制*或*删除*请求。每个请求都指定一个操作（查找或排除）并显示条件。选择一个请求并单击*编辑*以打开编辑对话框。\n\
  \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig10_HTML.jpg](img/429700_2_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n用于在已保存的查找中查看和管理查找请求的对话框\n\n#### 编辑查找请求条件\n\n*编辑查找请求*对话框，如图 4-11 所示，用于编辑新查找或已保存查找的查找请求。可以通过单击*新建*、*编辑*或双击图\
  \ 4-10 对话框中的查找请求来打开此对话框。创建查找请求或执行查找的脚本步骤（第 25 章，“搜索与处理找到的记录集”）也会使用此对话框。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig11_HTML.jpg](img/429700_2_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\n用于编辑已保存查找的单个请求的对话框\n\n在对话框中，您可以使用以下控件编辑请求的条件：\n\n1.  *操作* – 选择*查找记录*或*排除记录*，用于指示请求的匹配记录选项\n\
  2.  *条件列表* – 列出构成请求的每个已定义字段条件，并在下方显示所选行的详细信息\n3.  *表* – 选择要查找搜索字段的表出现\n4.  *字段*\
  \ – 选择搜索字段\n5.  *条件* – 要在所选字段中搜索的值\n6.  *插入运算符* – 单击以选择并插入运算符\n7.  条件按钮 – 用于*添加*新请求、*更改*当前选定的请求或*移除*选定的请求\n\
  \n## 使用找到的记录集\n\n*找到的记录集*是指在一个给定窗口的上下文中可见且可导航的一组记录。虽然找到的记录集可能包含表内的*所有记录*，但该术语通常指由搜索或其他操作生成的一个记录*子集*。不属于找到的记录集且不可见或不可导航的记录被称为*排除的记录集*。在单个窗口中，当导航到同一表的其他布局时，会保留每个表的找到的记录集。当使用多个窗口时，同一表在每个窗口中可以显示不同的找到的记录集。\n\
  \n当工具栏隐藏时，用户无法知道找到的记录集是否包含少于全部记录，除非创建自定义布局元素来显示该信息。即使工具栏可见，也容易忽略这一点。当新手用户看到一个包含大量记录的表只显示一个小的找到的记录集时，一开始可能会惊慌失措，不知道他们所有的记录都去哪了。差异显示在工具栏导航区域的记录计数中，如图\
  \ 4-12 所示。当所有记录都可访问时，仅显示记录总数。当子集处于活动状态时，第一个数字表示可见找到的记录集包含多少条记录，而第二个数字表示记录总数，其中包括从找到的记录集中排除的记录。\n\
  \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig12_HTML.jpg](img/429700_2_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12\n\n查看所有记录（左）或找到的记录集（右）时的记录计数\n\n### 更改找到的记录集中的记录\n\n可以通过执行查找或*记录*菜单中的几个命令之一来更改找到的记录集中的记录。*显示所有记录*命令将当前窗口中的找到的记录集替换为表中的所有记录。*排除记录*命令会将当前记录从找到的记录集移动到排除的记录集。这可用于通过排除单个记录来微调结果，而无需执行新的、更复杂的搜索。*排除多条*命令允许用户指定从当前记录开始希望排除的任意数量的记录。例如，如果用户正在查看包含\
  \ 100 条记录的找到的记录集中的第一条记录，并选择排除 10 条记录，则将排除前 10 条记录，剩下 90 条记录。但是，如果他们正在查看 100 条中的第\
  \ 50 条记录并执行相同操作，则将排除第 50-59 条记录，剩下第 1-49 条和第 60-100 条记录。最后，*仅显示排除的记录*命令会将当前找到的记录集替换为排除的记录集。或者，单击工具栏导航区域中的圆圈图标，以在找到的记录或排除的记录之间切换。\n\
  \n\n\n### 对查找集中的记录进行排序\n\n`记录排序状态`始终显示在工具栏的记录导航区域中，如图 4-13 所示。记录默认按创建顺序排列，这被视为`未排序`。可以根据自定义的排序字段列表对其进行排序，该列表可以使用`排序记录`对话框（如图\
  \ 4-14 所示）从本地或关联字段中编译。该对话框可通过在`记录`菜单或记录上下文菜单中选择`排序记录`命令来打开，也可以通过单击工具栏中的`排序`按钮来打开。\n\
  \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig14_HTML.jpg](img/429700_2_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n\n用于排序记录的对话框\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig13_HTML.jpg](img/429700_2_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13\n\n排序状态始终显示在工具栏的记录计数区域\n\n以下排序控件可用：\n\n1. `字段选择器` – 从基于上方弹出菜单中选择的表或布局的列表中选择一个字段。\n\
  \n2. `排序顺序` – 按将用于排序记录的顺序列出当前的`排序字段`。通过在字段选择器中双击字段或使用`移动`按钮来添加字段。向上或向下拖动以重新排列。通过在此处双击或使用`清除`按钮来移除字段。要移除所有字段，请单击`全部清除`。\n\
  \n3. `排序字段方向` – 选择选定字段的排序方向：`升序`（默认）、`降序`或`基于值列表的自定义顺序`（第 11 章）。排序顺序列表中的字段旁边会显示图标，以指示分配了哪个选项。\n\
  \n4. `排序选项复选框` – 启用高级排序控制：\n   * `基于汇总字段重新排序` – 选择一个汇总字段（第 8 章），根据排序字段的值由另一个排序字段进行子汇总后的位置来重新排序记录。例如，联系人列表可以按州（排序字段）进行汇总，但按居住在每个州的联系人数量（汇总字段）进行排序。\n\
  \   * `排序时覆盖字段的语言` – 选择在排序时用于对文本字段建立索引的语言。\n\n5. `保持记录排序顺序` – 取消选择可防止在修改排序字段的内容时记录不断重新排序。\n\
  \n### 修改查找集中的字段值\n\n有多个命令可用于修改整个查找集中的字段值：`替换字段内容`、`重新查找字段内容`、`查找和替换`以及`拼写检查`。\n\n\
  #### 替换字段内容\n\n`记录`菜单下的`替换字段内容`命令会打开如图 4-15 所示的对话框。此命令用于定义一个值，该值将插入到查找集中每条记录的当前字段中，完全替换之前的值。替换值可以是当前记录字段中包含的字面值；一个从第一个记录指定数字开始，并为每个后续记录递增指定数量的序列号；或者是一个计算结果（第\
  \ 12 章）。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig15_HTML.jpg](img/429700_2_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15\n\n用于定义替换值的对话框\n\n警告\n\n替换过程不可撤销，应谨慎使用。使用自定义菜单（第 23 章）向不需要此功能的用户隐藏此功能，并创建自定义脚本（第\
  \ 24 章）来安全地执行开发者定义的替换。\n\n#### 重新查找字段内容\n\n当一个字段被定义为使用`查找`功能（第 8 章，“字段查找对话框”）从相关记录复制数据时，可以使用`重新查找字段内容`命令手动强制更新查找集中每条记录的已复制值。\n\
  \n警告\n\n`查找`功能是在更优秀的自动输入选项和关系出现之前的遗留残余。\n\n#### 查找和替换\n\nFileMaker 的`查找和替换`功能让人联想到文本编辑器中的相应功能。它可以在当前查找集的一条或所有记录的一个或所有字段中定位文本，并可选择用替代文本替换匹配项。通过`编辑`菜单中的`查找/替换`功能将打开同名的对话框，如图\
  \ 4-16 所示。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig16_HTML.jpg](img/429700_2_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16\n\n用于查找和替换文本的对话框\n\n首先，在`查找内容`字段中输入文本，并可选择在`替换为`字段中输入文本。`方向`弹出菜单提供了在查找集中的字段和/或记录中`向前`或`向后`移动的选项。勾选`区分大小写`复选框可使查找过程区分大小写；勾选`仅全字匹配`则仅当字段中的文本完全包含输入到`查找内容`字段中的完整、独立的单词时才视为匹配。`搜索范围`单选按钮指示该功能是应搜索查找集中的`所有记录`还是仅限于`当前记录`。`搜索区域`选项控制它是应搜索布局上的`所有字段`还是仅搜索`当前字段`。\n\
  \n配置完成后，`查找下一个`按钮会定位并高亮显示当前字段、下一个字段或下一个记录中`查找内容`字段文本的下一个实例，具体取决于对话框中的其他设置。`替换并查找`按钮会定位第一个匹配实例（如果尚未找到），或者用替换文本替换当前高亮显示的匹配文本，然后定位下一个匹配实例。如果查找操作已选定搜索文本的一个匹配实例，则`替换`按钮会执行替换功能。之后，光标会立即出现在替换文本之后。`全部替换`按钮会根据对话框中的设置替换搜索文本的所有匹配实例。\n\
  \n\n\n### 拼写检查\n\nFileMaker 内置了拼写检查器，可对选定的文本片段、某个字段的内容、当前记录中的所有字段，或已找到记录集中的所有记录进行处理。\n\
  \n#### 探索“拼写”菜单\n\n“编辑”菜单下的“拼写”子菜单提供了若干命令，用于实现标准拼写检查功能。“检查所选内容”命令可快速检查当前字段中选定文本的拼写。“检查记录”会检查布局上当前记录中每个字段的文本，而“检查全部”则会对已找到记录集中每条记录的当前布局中的所有字段进行检查。“纠正单词”命令会检查字段中最后输入的单词，但仅当“键入时检查拼写”设置设为“对可疑拼写发出提示音”时（第\
  \ 6 章，“文件选项：拼写”），该命令才可用。你可以使用“选择词典”来选择语言，并通过“编辑用户词典”将自定义术语添加到用户词典中。\n\n#### 上下文拼写功能\n\
  \n当启用了“用特殊下划线标出可疑单词”文件选项时，活动字段中的任何可疑单词都会用红色下划线标记出来。此选项适用于整个文件，但可以在布局上针对个别字段将其关闭（第\
  \ 19 章，“检查数据设置”）。启用后，所选单词的文本上下文菜单顶部会显示一个建议拼写和替代单词列表，如图 4-17 所示。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig17_HTML.jpg](img/429700_2_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17\n\n上下文菜单显示可疑单词的替代拼写\n\n## 打印\n\n可以使用熟悉的操作系统“页面设置”和“打印”对话框来预览和打印窗口的内容区域。\n\
  \n### 使用预览模式\n\n“预览模式”是一种过渡性窗口状态，它会更改菜单、工具栏和内容区域，以便在将布局发送到打印机或保存为 PDF 文件之前对其进行查看。要预览布局，请从“查看”菜单中选择“预览模式”，或单击“预览”工具栏图标。工具栏选项将更改为与打印相关的功能，内容区域将成为一个或多个不可交互、不可编辑的页面，其呈现效果与打印时完全一致。任何交互式对象（如按钮、选项卡、滑动控件等）都将显示为无效的静态图形。根据每个布局对象的设置，某些对象和数据可能不可见、被重新格式化、滑动到新位置或从页边距处截断。\n\
  \n#### 状态工具栏（预览模式）\n\n预览模式下的工具栏将变为特定于打印的按钮，这些按钮可以是默认选项，也可以是用户自定义的集合。\n\n##### 默认状态工具栏项目（预览模式）\n\
  \n预览模式的默认工具栏如图 4-18 所示。与浏览模式类似，顶部区域可以自定义，而底部区域是固定的。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig18_HTML.jpg](img/429700_2_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18\n\n预览模式下工具栏的结构分析\n\n#### 导航控件\n\n预览模式工具栏中的“导航控件”与浏览模式和查找模式中的类似，但区别在于它们显示的是关于“打印页面”的信息，并允许在“打印页面”之间移动，而不是在记录或查找请求之间移动。最初，如果整个文档尚未渲染完成，页数可能会显示为问号。点击翻页或滚动到文档末尾以更新页数。\n\
  \n###### 功能按钮\n\n默认预览工具栏中包含的功能按钮有：\n\n- “另存为 Excel” – 将记录导出到 Excel 文件\n- “另存为 PDF”\
  \ – 将预览保存为 PDF 文件\n- “打印” – 打开对话框以将预览发送到打印机\n- “页面设置” – 打开对话框以配置页面设置，从而更改渲染效果\n\n\
  ###### 退出预览按钮\n\n“退出预览按钮”将结束预览并使窗口返回浏览模式。\n\n##### 自定义状态工具栏（预览模式）\n\n预览模式工具栏可以在用户计算机级别进行自定义。进入预览模式，然后选择“查看\
  \ ➤ 自定义工具栏”菜单，以打开附加到窗口上的自定义面板，如图 4-19 所示。尽管可用的按钮不同，但它们的添加或删除方式与第 3 章中描述的浏览模式操作方式相同。\n\
  \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig19_HTML.jpg](img/429700_2_En_4_Fig19_HTML.jpg)\n\
  \n图 4-19\n\n预览模式的工具栏自定义面板\n\n### 页面设置\n\n“页面设置”对话框（在 Windows 中为“打印设置”）是一个标准操作系统对话框，用于配置当前布局在预览或打印时的行为方式，如图\
  \ 4-20 所示。在浏览模式、预览模式或布局模式下，可以通过在“文件”菜单中选择“页面设置”来访问此对话框。在此处，你可以选择“打印机”、“纸张大小”、“方向”和“缩放百分比”。\n\
  \n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig20_HTML.jpg](img/429700_2_En_4_Fig20_HTML.jpg)\n\
  \n图 4-20\n\n用于配置页面设置的对话框\n\n### 打印对话框选项\n\n“打印”对话框是一个用于配置打印任务的标准操作系统对话框，如图 4-21\
  \ 所示。可以通过在“文件”菜单中选择“打印”，或单击预览模式工具栏中的“打印”来打开此对话框。\n\n![../images/429700_2_En_4_Chapter/429700_2_En_4_Fig21_HTML.jpg](img/429700_2_En_4_Fig21_HTML.jpg)\n\
  \n图 4-21\n\n用于准备发送到打印机的任务的对话框\n\n虽然大多数选项与其他应用程序相同，但有一些是 FileMaker 特有的。“起始页码”字段接受一个页码，该页码将作为编号的第一页。三个打印选项决定了窗口内容区域的打印方式。选择“正在浏览的记录”可包括已找到记录集中的每条记录；选择“当前记录”则仅包括打开“打印”对话框时已选择或正在查看的当前记录。选择“空白记录，显示字段”可打印不带任何记录数据的布局。相邻的菜单控制字段的打印方式：“按格式设置”、“带框”、“带下划线”或“带占位符文本”。\n\
  \n## 总结\n\n本章探讨了用户如何与记录进行交互以输入数据、执行搜索和打印。在下一章中，我们将重点讨论记录的导入和导出。\n\n"
- "# 5. 传输记录\n\nFileMaker 具有“导入”和“导出”功能，可以在两个位置之间手动或通过自动脚本化流程传输记录。这允许共享数据以避免重新输入、将模板数据移动到内容表中进行自定义、将旧数据迁移到较新版本的数据库、将数据发送到其他系统等等。本章讨论以下数据传输主题：\n\
  \n-   支持的文件类型\n-   导入记录\n-   导出记录\n\n## 支持的文件类型\n\nFileMaker 可以多种格式“导入和导出记录”，如图\
  \ 5-1 所示。此外，还支持从 ODBC 和 XML 源，或从包含图片、影片或文本文件的文件夹进行“内容导入”。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig1_HTML.jpg](img/429700_2_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\n记录导入（左）和导出（右）支持的文件类型\n\n> **注意**  \n新的“自定义分隔值”导入选项允许选择分隔符，并取代了之前的“制表符分隔值”。\n\
  \n\n\n### 导入记录\n\n`import records` 函数会在当前布局的表中创建或更新记录。记录可以从多种来源导入：同一文件内的表、外部数据库或各种基于文本的数据文件。若要探索此功能，请将一些联系人数据导入到\
  \ `Learn FileMaker Chapter` 3–5 数据库中。首先，从 [`www.briandunning.com/sample-data/`](http://www.briandunning.com/sample-data/)\
  \ 免费下载 `us-500.csv` 联系人示例文件。然后，选择 `文件 ➤ 导入记录 ➤ 文件` 菜单，打开 `选择文件` 对话框，如图 5-2 所示。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig2_HTML.jpg](img/429700_2_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n\n用于选择要导入的文件的对话框\n\n该对话框允许从任何文件夹目录中选择文件。还可以通过单击底部`选项`区域中的`主机`按钮（第 29 章）来访问托管在\
  \ `FileMaker Server` 上的数据库。此区域还包含一个`显示`弹出菜单，其中列出与导入兼容的文件类型，可在文件较多的文件夹中高亮显示特定文件。勾选“创建重复导入”复选框，可以跳过手动执行的导入步骤，并自动创建一个新表、布局和脚本，以便将来重复使用，从而提供快捷方式。现在，请选择并打开下载的\
  \ CSV 文件。\n\n## 执行导入\n\n选择并打开数据文件后，将出现一个`指定导入顺序`对话框，如图 5-3 所示。该对话框包含用于浏览源数据、指定导入类型、选择目标表以及设置导入选项（根据所执行的导入类型而有所不同）的区域。默认设置为`添加导入`，即所有导入的记录都将作为新记录添加到目标表中。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig3_HTML.jpg](img/429700_2_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n导入字段映射对话框\n\n**注意：** 此对话框设计是在 `FileMaker 18` 中引入的，与早期版本完全不同。\n\n### 浏览源数据\n\
  \n`导入` `源数据` 显示在最左侧列的列表中，可以使用其上方的箭头按钮进行导航。一个弹出菜单（适用于基于文本的数据文件导入）会显示一个值，指示或控制下方显示的行/记录在导入时的处理方式。`数据`选项是所有条目的默认设置，表示该数据将作为普通记录导入。选择`用作字段名称`选项会将当前条目的值指定为字段/列名称的来源。这可以分配给任何单个记录，并为导入在源数据中建立起点。任何位于该记录之前的记录将自动被分配一个`排除`值，表示该记录不会被导入。这允许将包含文档信息和列标题的多个“标题行”从实际要导入的数据中排除。源数据中任何位置的个别行也可以手动排除。向右移动，`源字段`列表会显示源数据中的字段名称（如果可用）。从基于文本的数据文件导入时，除非某个记录被指定为字段名称的来源，否则这些字段将显示为`来自源文件`。从\
  \ `FileMaker` 数据库导入时，将显示实际的字段名称，并且对对话框源数据侧的唯一控制是能够导航和查看源数据记录。\n\n### 选择目标表\n\n`目标表`是传入数据的目标表，默认设置为当前布局的表。`目标`弹出菜单（如图\
  \ 5-4 所示）提供了一个选项，用于在导入过程中创建新表。该菜单是标准的 `FileMaker` `表选择菜单`，列出`当前表`、`相关表`、`不相关表`和一个`管理数据库`选项，以及一个仅导入时才有的`新建表`选项。由于导入必须在当前布局的上下文中进行，这些选项在导入时大多被禁用。除了将当前表作为目标外，唯一的选择是创建一个新表。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig4_HTML.jpg](img/429700_2_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n\n导入目标表弹出菜单\n\n选择`新建表`选项将配置对话框，使其在导入期间自动创建新表并将数据流入其中。除非某行已指定为`用作字段名称`，否则`目标字段`列表将显示按数字顺序排列且带有“f”前缀的新名称。\n\
  \n`管理数据库`选项已启用，它会打开一个同名对话框（第 7-9 章），以便在目标表中创建新字段，从而无需退出导入对话框即可将这些字段包含在导入中。\n\n###\
  \ 将字段从源端映射到目标端\n\n目标表和导入源文件的字段数量可能或多或少，并且顺序也可能不同。因此，有必要指明应导入哪些源字段，并将其与适当的目标字段进行匹配。这种`字段映射`过程是`指定导入顺序`对话框的主要用途。\n\
  \n中间列表中每个可选的行都显示`源字段`、`映射`和`目标字段`这几列，并且后两列各自打开一个选项菜单。`映射`列显示了相应两个字段的导入状态：`导入`或`不导入`。单击可显示选项菜单，如图\
  \ 5-5 所示。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig5_HTML.jpg](img/429700_2_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n\n选择是导入还是不导入所选字段。\n\n`目标字段`列的每一行都会打开一个菜单，允许选择对应的源字段应流入哪个字段，如图 5-6 所示。当前行的字段将在列表中高亮显示。图标指示着每个字段当前的导入状态：箭头表示它们已配置为接收来自源端的输入，空心椭圆表示未配置。不接受数据输入的字段（如计算字段或汇总字段）将分组显示在底部的`不用于导入`文件夹下。单击以选择与源字段对应的合适目标字段。当所有输入字段都映射到目标字段后，就该配置导入选项了。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig6_HTML.jpg](img/429700_2_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n\n用于排列目标字段列表的可用选项\n\n\n\n### 设置导入选项\n\n在“指定导入顺序”对话框底部的*导入选项*部分（如图 5-7 所示），可根据导入源的类型控制各种行为。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig7_HTML.jpg](img/429700_2_En_5_Fig7_HTML.jpg)\
  \  \n图 5-7: 对话框的导入选项部分\n\n左侧的*文本解析选项*控制导入源的解析方式，仅在从基于文本的文件导入时可见。在此处可以选择字符集和字段分隔符：*逗号*、*制表符*、*分号*、*空格*或自定义值。\n\
  \n右侧的导入选项影响新信息放入数据库字段时的行为。\n\n*“执行自动输入选项”*复选框控制哪些定义了自动输入设置的字段（参见第 8 章）会在导入过程中更新其值。这使得可以保留源文件中的序列号、创建或修改数据，或根据目标字段定义更新这些数据。未接收数据的字段可使用此功能触发其自动输入选项。勾选此框可选择所有此类字段，在相邻菜单中选择单个字段，或点击上方列表中单个字段右侧的红色齿轮图标。当导入到\
  \ *Learn FileMaker* 文件时，请为所有字段开启此选项。\n\n*“保留外部容器存储”*复选框可抑制容器字段内容验证，允许目标表使用现有的外部容器内容（参见第\
  \ 10 章）。当将数据重新导入现有文件或其副本时，选择此项可避免在源字段和目标字段的基目录相同时对外部文件进行解密和重新加密。\n\n*“重复字段”*选项允许选择将重复字段（参见第\
  \ 8 章）保留在单条记录中，还是将它们拆分为每条重复项对应一条导入记录。选择后者时，所有非重复字段将被复制，每个重复项将生成一条记录。\n\n### 完成导入\n\
  \n配置完成后，点击*导入*按钮执行该过程。系统将显示*“导入摘要”*对话框，报告添加或更新的记录数、跳过的记录和字段数，以及创建的表数量（如有）。一个名为 `Import.log`\
  \ 的文本文件将保存到数据库文件夹中，其中包含导入过程的详细信息，并记录可能发生的任何错误。导入过程结束后，窗口中的找到集将仅包含导入的记录。\n\n### 更改导入类型\n\
  \n除了前面描述的*“添加记录”*类型导入外，还有另外两种导入类型：*更新*和*替换*。这两种类型不创建记录，而是用于覆盖现有记录。点击源图标和目标图标之间的区域，可访问*“导入类型选择”*面板，如图\
  \ 5-8 所示。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig8_HTML.jpg](img/429700_2_En_5_Fig8_HTML.jpg)\
  \  \n图 5-8: 用于选择不同导入类型的隐藏面板\n\n#### 更新找到集中的匹配记录\n\n*更新*导入是一种非线性数据传输，它会根据匹配条件将源数据的每条记录导入到现有记录中。*“匹配字段”*是一种新的字段映射指定方式，如图\
  \ 5-9 所示，用于将一个或多个字段标记为匹配条件，以将传入记录与目标表中的记录进行匹配。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig9_HTML.jpg](img/429700_2_En_5_Fig9_HTML.jpg)\
  \  \n图 5-9: 匹配字段的扩展映射选择\n\n在导入过程中，传入的每条源记录将根据选定的匹配字段与现有记录进行匹配。如果找到匹配记录，则该记录的其余字段将更新到其映射的目标字段中。如果未找到匹配记录，则跳过该记录，除非选中了选择面板底部的*“将剩余数据添加为新记录”*复选框（如前文图\
  \ 5-8 所示）。\n\n#### 替换找到集中的记录\n\n*替换*导入将使用传入的记录值，根据对应集合中的线性位置覆盖现有记录的字段，而无需考虑匹配记录。换句话说，源数据中第一条记录的值将用于替换目标集合中第一条记录的映射字段值。这在以下情况中可能很有用：需要导出一组数据，在\
  \ FileMaker 外部对其进行操作，然后立即替换这些记录的部分或全部字段值。使用此导入类型时，通常源数据和目标表的当前找到集应包含相同数量的记录。如果源记录数*少于*目标找到集，则找到集中超出源记录数的记录将不会被修改。如果源数据计数*大于*目标表的找到集，则导入将在处理完找到集中的记录数后停止，除非选中了*“将剩余数据添加为新记录”*复选框。\n\
  \n### 设置自动定期导入\n\n在“选择文件”对话框中选中可选的*“设置为自动定期导入”*复选框（如前文图 5-2 所示），将完全跳过导入过程的其余部分，创建一个新的表、布局和脚本，这些资源可自定义并用于将来自动化同样的过程。选中后，将打开*“定期导入设置”*对话框，如图\
  \ 5-10 所示。该对话框会记住源数据的路径，并提供三个可配置选项。选择*“不导入第一条记录”*可跳过导入第一条记录，而是将其用作字段名称。另外两个字段允许输入布局名称和脚本名称，以覆盖基于导入文件名输入的默认名称。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig10_HTML.jpg](img/429700_2_En_5_Fig10_HTML.jpg)\
  \  \n图 5-10: “定期导入设置”对话框\n\n配置完成并继续后，将创建一个新表，其名称与源数据文件相同，并为其包含的每一列数据创建一个字段。同时创建一个包含指定名称的新布局，并显示所有字段。还会创建一个具有指定名称的脚本，该脚本将导航到新布局，删除所有记录，并从文件中导入记录，从而刷新数据。所有这些资源随后都可以根据特定工作流程的需要进行重命名和自定义。\n\
  \n### 导出记录\n\n*“导出记录”*功能会将当前找到集中每条记录的一个或多个选定字段的值保存到指定类型的文件中。要开始导出，请打开一个数据库，导航到所需布局，并可选择执行查找以隔离所需的找到集。选择\
  \ *文件 ➤ 导出记录* 菜单，打开*“将记录导出到文件”*对话框，如图 5-11 所示。除了标准的文件名和文件夹位置选择外，下方还提供了一些 FileMaker\
  \ 特定的选项。从弹出菜单中选择导出的*文件类型*，并选择*“保存后”*操作快捷方式之一（打开或通过电子邮件发送新文件）。点击*保存*继续该过程并指定导出字段。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig11_HTML.jpg](img/429700_2_En_5_Fig11_HTML.jpg)\
  \  \n图 5-11: 用于指定导出位置、文件名和类型的对话框\n\n\n\n### 指定导出字段\n\n“指定导出字段顺序”对话框（如图 5-12 所示）用于选择导出时要包含的字段、它们在输出文件中的保存顺序以及一些格式选项。\n\
  \n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig12_HTML.jpg](img/429700_2_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12：用于指定导出字段顺序和设置的对话框\n\n在左侧，数据源弹出菜单用于指定生成下方字段列表的位置。默认情况下，已选择`当前布局`，仅显示当前布局上的字段，包括本地字段和相关字段。选择`当前表`可以显示当前布局表出现中的所有字段，或选择某个相关表出现以在导出中包含相关字段（第\
  \ 9 章）。\n\n可以通过双击列表中的字段或使用`移动`或`全部移动`按钮将字段添加到导出顺序中。导出列表中的字段将按照它们出现的顺序保存到输出文件中，并且可以拖拽到所需的顺序。通过双击列表中的字段、单击`清除`或`全部清除`按钮，或按\
  \ Delete 键，可以从导出列表中移除字段。\n\n设置好字段顺序后，有几个选项可用。`输出文件字符集`弹出菜单用于指定导出过程中使用的字符编码。`应用当前布局的数据格式`复选框将使任何数字、日期或时间字段以当前布局上的数据格式进行导出，而非实际输入数据的格式（第\
  \ 19 章“数据格式”）。例如，如果一个数字字段包含“10”，但在当前布局上被格式化为显示货币（例如“$10.00”），则必须勾选此框才能以货币格式导出该数字。\n\
  \n### 将输出汇总为组\n\n对于更复杂的导出，`分组依据`功能允许在导出过程中对值进行子汇总。如果找到的记录集已排序，则对话框的`分组依据`区域将包含排序字段列表，这些字段可用于在导出过程中汇总数据。例如，假设有一组记录集，如表\
  \ 5-1 所示，包含三个字段的值：`公司`、`行业`和`数量`。`数量汇总`字段是一个汇总字段，它会自动将六个记录的`数量`字段进行汇总（第 8 章“汇总字段”）。\n\
  \n表 5-1：展示未分组汇总行为的假设记录\n\n| 公司 | 行业 | 数量 | 数量汇总 |\n| --- | --- | --- | --- |\n|\
  \ Online Tutor, LLC | 教育 | 20 | 95 |\n| Learning Resources | 教育 | 15 | 95 |\n| Mutual\
  \ Investors Corp | 金融 | 5 | 95 |\n| Dividend Party, Inc. | 金融 | 10 | 95 |\n| Knowledge\
  \ Bound Co. | 出版 | 35 | 95 |\n| Widget Books, Inc. | 出版 | 10 | 95 |\n\n如果导出这三个字段，结果文件中的值将与表中的值相同。然而，可以先按`行业`字段对记录进行排序，然后将数据作为每个行业的总数量汇总报告进行导出。开始导出操作，当进入“指定字段顺序”对话框时，`分组依据`区域会为`行业`字段提供一个复选框。将`行业`字段和`数量汇总`字段添加到导出列表。系统会自动添加第三个额外字段：`按行业汇总的数量`。最后一个字段将以斜体显示，以突出它并非数据库中的实际字段，而是按行业汇总的子汇总，如图\
  \ 5-13 所示。\n\n![../images/429700_2_En_5_Chapter/429700_2_En_5_Fig13_HTML.jpg](img/429700_2_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13：使用分组依据功能的字段导出顺序示例\n\n采用此配置后，导出文件将包含每个行业一行数据，第一行为三个行业的总数量，第三列为每个行业的总数量，如表\
  \ 5-2 所示。\n\n表 5-2：使用`分组依据`选项导出的假设数据\n\n| 教育 | 95 | 35 |\n| 金融 |   | 15 |\n| 出版\
  \ |   | 45 |\n\n## 本章小结\n\n在本章中，我们探讨了导入和导出记录的基础知识。在下一章中，我们将从用户视角转向开发者界面，并开始定义数据结构。\n\
  \n"
