- "# 规划表名\n\n表名可以使用多种不同的命名约定，具体取决于开发人员的个人偏好，以及数据库用作入站 API、JDBC/ODBC 或 WebDirect 连接源时所需的兼容性技术要求。由多个单词组成的名称可以用空格（`Project\
  \ Resource`）或下划线（`Project_Resource`）分隔，也可以不使用空格，而采用“驼峰式”命名（`ProjectResources`）。名称可以全大写、全小写或大小写混合使用。每个表名都必须遵循以下规则：\n\
  \n*   每个表必须使用唯一的单词或短语来命名。\n*   名称可以包含数字，但不能以数字或句点开头。理想情况下，应*仅*使用字母字符。\n*   名称不应包含内置函数的名称，尤其是那些没有参数的函数，例如\
  \ `Random` 或 `Pi`。\n*   虽然*可以*使用某些保留符号和单词，但它们可能会在计算公式中产生冲突，应避免使用。\n*   名称可以包含空格。但是，对于\
  \ Web 集成（除了不关心空格的 `FileMaker Web Direct` 之外），你可能希望完全避免使用空格。\n\n除了这些技术考量之外，请花点时间思考什么才是一个*好的*表名。每个表都应该描述清晰、简洁但不晦涩，并且与其他表和谐共存。在拟定表名列表时，这里有一些建议供参考：\n\
  \n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig3_HTML.jpg](img/429700_2_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n\n原始名称列表（左侧）和添加了分组前缀的相同列表（右侧）\n\n*   名称应清晰指示表所建模的实体类别，在尽可能简洁的同时避免晦涩难懂。\n\
  *   尽可能使用完整单词而非缩写。如果某个单词太长，可以查阅同义词词典，寻找更短的替代词。\n*   考虑文件中其他表的完整上下文。如果一个数据库只管理一种类型的东西，那么将表命名为\
  \ `Stuff` 是没问题的。然而，当需要为多种类型的东西建模时，请使用更具描述性的名称，例如 `Inventory`、`Resources`、`Supplies`\
  \ 等。\n*   使用多个单词以提高清晰度。当存在其他同名实体的表时，请确保它们的名称*差异化足够明显*，以避免混淆。\n*   保持一致性，使用相同的格式，并使所有名称保持单数或复数形式。例如，统一使用\
  \ `Contact` 和 `Company`，或统一使用 `Contacts` 和 `Companies`。\n*   对于大型表列表，考虑使用前缀将其组织到概念组中，以便它们在开发者选择菜单中整齐排序，如图\
  \ 7-3 所示。\n\n## 管理表\n\n可以使用“管理数据库”对话框中“表”选项卡上的按钮来*添加*、*重命名*和*删除*表。\n\n### 添加表\n\n\
  添加表有*几种*不同的方法：创建新表、复制现有表、从另一个 FileMaker 数据库导入表，或从外部 ODBC 数据源添加表。在导入记录时也可以自动创建表（第\
  \ 5 章，“选择目标表”）。\n\n#### 创建新表\n\n在“管理数据库”对话框的“表”选项卡中，通过在“表名”文本区域键入名称并单击“创建”按钮，手动创建一个新表。新表将出现在列表中，并带有五个默认字段（第\
  \ 8 章，“定义默认字段”）。\n\n#### 复制现有表\n\n当新表与现有表高度相似时，可以考虑复制以节省时间。可以使用“复制”和“粘贴”按钮来复制一个或多个表，并将它们的副本粘贴到列表中。此操作甚至在两个文件之间也有效，提供了一种快速简单的方法来在新数据库中复制表。复制的表将在列表中高亮显示，每个表与原表名称相同，并附加一个唯一的数字后缀。原表中的每个字段都将出现在新表中，具有相同的名称和设置。但是，记录内容不会从原表复制；复制后的表将不包含任何记录。\n\
  \n#### 导入表\n\n“管理数据库”对话框“表”选项卡上的“导入”按钮，用于启动从另一个 FileMaker 数据库导入一个或多个表的过程。源数据库可以是文件夹目录中的数据库，也可以是由\
  \ FileMaker Server 托管的数据库。首先，单击“导入”按钮。找到并打开包含要导入的表的数据库文件。打开后，FileMaker 将显示一个“导入表”对话框，其中列出了所选数据库中可供导入的所有表，如图\
  \ 7-4 所示。勾选所需表旁边的复选框，然后单击“确定”进行导入。同样，此处仅导入表结构，因此表将不包含任何记录。\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig4_HTML.jpg](img/429700_2_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n\n用于从另一个 FileMaker 数据库导入表的对话框\n\n#### 从 ODBC 数据源添加表 (macOS)\n\n`开放数据库连接`\
  \ (ODBC) 是一种标准应用程序编程接口 (API)，它为客户应用程序提供一种通用语言，用于与其他数据库系统交互。`Java 数据库连接` (JDBC) 是一种类似的\
  \ API，用于访问用 Java 语言编写的系统。FileMaker 可以使用 ODBC 和 JDBC 与 `驱动程序管理器` 应用程序通信，该应用程序使用客户端驱动程序与外部数据源通信，如图\
  \ 7-5 所示。\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig5_HTML.jpg](img/429700_2_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\n将 FileMaker 数据库连接到 ODBC 数据源\n\n**注意**  \nODBC 连接仅用于连接非 FileMaker 数据库，不用于\
  \ FileMaker 数据库连接。\n\nFileMaker 既可以充当 ODBC 客户端应用程序，也可以充当 ODBC 和 JDBC 数据源。作为客户端应用程序，FileMaker\
  \ 支持连接到外部 SQL 数据源，例如来自 Oracle、Microsoft SQL 和 MySQL 的数据源。连接后，外部数据库中的表可以添加到 FileMaker\
  \ 数据库中，除了少数例外情况，它们的行为类似于 FileMaker 原生表。为 ODBC 访问配置计算机和数据库的过程相对简单，分为三个步骤。首先，使用 `驱动程序管理器`\
  \ 和 `客户端驱动程序` 准备主机计算机以进行 ODBC 连接。接下来，将 FileMaker 数据库连接到 ODBC 客户端驱动程序。最后，在 FileMaker\
  \ 数据库中插入并使用 ODBC 表。让我们逐步了解此过程的一个示例。\n\n##### 准备计算机以进行 ODBC 连接\n\n要为 ODBC 连接准备 FileMaker\
  \ 主机计算机，请安装 `ODBC 管理器` 应用程序（macOS 免费软件），安装客户端驱动程序（例如 `Actual Technologies ODBC Pack`），并为特定的外部数据源配置驱动程序。*主机计算机*\
  \ 是安装 FileMaker 数据库的计算机（即运行 FileMaker Server 的计算机，而非访问它的客户端计算机）。\n\n\n\n## 安装 ODBC\
  \ 管理器应用程序\n\n按照以下步骤，在主计算机上下载并安装免费软件 `ODBC Manager` 应用程序：\n\n1. 从 [`www.odbcmanager.net`](http://www.odbcmanager.net)\
  \ 下载 `ODBC Manager` 磁盘映像。\n2. 在 `Downloads` 文件夹中找到 `ODBC_Manager_Installer.dmg`\
  \ 文件并启动它。\n3. `ODBC Manager` 磁盘映像将出现在您的桌面上，并应在一个窗口中打开。\n4. 双击 `ODBC Manager.pkg`\
  \ 文件以启动安装程序。\n5. 逐步完成安装程序面板以完成安装。\n\n安装程序完成后，`ODBC Manager` 应用程序应位于 macOS 的 `Applications`\
  \ 文件夹下的 `Utilities` 子文件夹中。\n\n## 安装 ODBC 驱动程序\n\n接下来，按照以下步骤下载并安装一个 ODBC 驱动程序，例如下文描述的来自\
  \ Actual Technologies 的驱动程序：\n\n1. 下载 `Actual ODBC Pack` 磁盘映像，可从 [`www.actualtech.com/download.php`](http://www.actualtech.com/download.php)\
  \ 获取。\n2. 在 `Downloads` 文件夹中找到 `Actual_ODBC_Pack.dmg` 文件并启动它。\n3. `Actual ODBC Pack`\
  \ 磁盘映像将出现在您的桌面上，并应在一个窗口中打开。\n4. 双击 `Actual ODBC Pack.pkg` 文件以启动安装程序。\n5. 逐步完成安装程序面板以完成安装。\n\
  \n> **注意：** 该驱动程序是一个功能完整的演示版，仅限显示任何查询结果中的前三行。请从 Actual Technologies 网络商店购买许可证密钥以解除此限制。\n\
  \n## 配置驱动程序\n\n接下来，为将要建立连接的特定数据库添加并配置一个驱动程序。首先打开 `ODBC Manager` 应用程序，如图 7-6 所示。\n\
  \n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig6_HTML.jpg](img/429700_2_En_7_Fig6_HTML.jpg)\n\
  \n**图 7-6** — 带有一个连接的 ODBC 管理器\n\n然后在对话框中按以下步骤操作：\n\n1. 点击 `System DSN` 选项卡。\n2.\
  \ 点击 `Add` 按钮。\n3. 在打开的窗格中，为目标数据库选择合适的驱动程序：`Actual access`、`Actual open source databases`、`Actual\
  \ oracle` 或 `Actual SQL server`。\n4. 在多面板驱动程序特定配置对话框中输入设置。这些设置各不相同，但通常包括 `server\
  \ address`（服务器地址）、`database name`（数据库名称）、`username`（用户名）和 `password`（密码）。\n5. 点击\
  \ `Done` 按钮关闭配置对话框。\n6. 配置对话框的最后一个面板允许您测试连接。\n7. 退出 `ODBC Manager` 应用程序。\n\n## 将\
