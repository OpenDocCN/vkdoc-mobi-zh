  \ 函数的 `sqlQuery` 部分至少需要一个 `SELECT` 语句，该语句可以包含多个可选的子句，并且这些子句可用于执行多种不同的数据检索任务。\n\n\
  \n\n### 定义 SELECT 语句\n\n当调用 `ExecuteSQL` 函数时，`sqlQuery` 参数必须包含一个格式正确的 `SELECT` 语句。最低限度下，该语句需定义要查找的*内容*\
  \ 及其*来源*，遵循如下所示模式：\n\n```\nSELECT <内容> FROM <来源>\n```\n\n通常，*内容* 是一个或多个字段的名称，而*来源*\
