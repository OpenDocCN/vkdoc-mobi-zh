  ### 文件选项：文本


  “文本”标签页（如图 6-17 所示）控制一些文本输入选项。


  ![../images/429700_2_En_6_Chapter/429700_2_En_6_Fig17_HTML.jpg](img/429700_2_En_6_Fig17_HTML.jpg)


  图 6-17：文本输入的文件选项


  `文本处理`复选框控制某些特殊的数据输入事项。启用`使用智能引号`可始终在字段中以英文弯引号形式输入撇号和双引号。`使用亚洲语言换行`选项控制当单词到达文本字段边缘时，在处理亚洲语言时的换行方式；而`使用罗马语言换行`在处理罗马语言时执行相同功能。


  `数据输入`部分处理货币符号、日期和时间等各种标准数据的格式。当 FileMaker 创建新数据库时，文件会使用本地计算机操作系统的区域设置进行编码。在 macOS
  上，可以在`系统偏好设置 ➤ 语言与地区 ➤ 高级`面板中找到这些设置。文件创建后，这些设置便无法修改。但是，“文件选项”对话框允许选择当用户的操作系统与数据库编码的设置之间存在差异时如何处理：


  - `始终使用当前系统设置` – 选择此选项将使用计算机的当前系统设置，而非数据库文件中保存的设置。

  - `始终使用文件保存的设置` – 选择此选项将使用数据库文件中保存的设置。

  - `设置不同时询问` – 选择此选项将在启动时询问用户使用哪种设置。


  ### 文件选项：脚本触发器


  “脚本触发器”标签页用于配置数据库，以自动触发脚本来响应与文件相关的界面事件（第 27 章）。


  ## 设计与维护健康的文件


  FileMaker 会自动保存文件中所做的更改，因此无需也无法显式执行保存功能。用户可以修改记录，开发者可以修改结构元素，并且可以放心这些工作都会被写入磁盘。然而，事情**可能**会出错，了解如何避免、识别和修复问题以维护文件的健康非常重要。在开始设计自定义数据库之前，请花点时间回顾一些可能发生的问题，以及如何帮助确保它们不会以悲剧收场。


  ### 避免设计与培训缺陷


  大多数数据库事故都是某种形式的用户困惑造成的，其原因包括培训不足、界面设计不佳或脚本编写粗心。一些具体问题涉及用户覆盖现有记录、忘记提交记录、随意删除记录或错误识别找到的记录集。




  ### 覆盖现有记录


  覆盖现有内容是一个比你想象中更常见的问题，其发生原因多种多样，通常是由于经验不足和错误假设，加之糟糕的界面设计与不充分培训的叠加效应。


  缺乏一般计算机经验或特定数据库知识的人，常常没有意识到在输入数据之前需要先创建一个新记录。一些人假设窗口就像用于录入但将数据发送到别处保存的 Web 表单，因此他们可以直接覆盖并再次发送。无论假设是什么，避免此问题的最佳方法是提供明确的培训，确保每个人都理解：在为新的实体输入信息之前，他们需要实际创建一个新记录。


  覆盖的另一个原因是用户未能复制记录，便开始编辑原始记录，误以为它是新的副本记录。问题在于，默认的“复制”功能在原始记录和副本记录之间不会产生任何视觉差异。工具栏中的记录计数会增加，如果布局中包含一个保存唯一记录标识符的字段，该字段会显示不同的值。除此之外，副本记录看起来与原始记录完全一样。如果用户的点击或输入操作并未实际生成副本，他们可能会意外地开始在原始记录上输入。培训可以帮助他们知道在哪里查看以视觉确认新记录已创建。然而，更好的避免方法是使用自定义菜单（第
  23 章），用你自己的自定义脚本（第 24 章）替换默认功能。该脚本可以创建一个副本记录，然后在关键字段的值后添加单词“复制”（`Copy`），清空在创建副本时应修改的字段，并弹出一个对话框确认副本已准备好进行录入。用户会习惯于看到这些明显的指示，当这些指示缺失时，他们更可能意识到自己未能成功创建副本。


  *类似地，一个未被注意的失败* 进入“查找”模式，当用户将其误认为是临时的查找请求时，可能导致无意中编辑记录。在“查找”模式下，菜单和工具栏的变化很容易被忽略，而查找请求看起来与普通记录非常相似。较新版本的
  FileMaker 有有用的指示器，比如在“查找”模式下每个字段中出现的小放大镜图标。向布局添加你自己的视觉指示器，可以进一步强调模式切换的成功。在“查找”模式下隐藏或更改格式的布局元素会有所帮助（第
  17–22 章）。


  相反的情况是，用户未能从“查找”模式切换回“浏览”模式，然后开始在查找请求中输入，误以为它们是新的空记录。FileMaker 有一个“断路器”对话框，在创建多个查找请求后会出现，提醒用户他们正处于“查找”模式。前面提到的自定义视觉指示器也可以帮助避免此问题。


  一个优秀的开发者必须能够转换心智焦点，从新用户的角度测试界面设计。为了在潜在混乱点酿成灾难之前预先识别它们，请务必不要做有偏见的假设，即认为用户拥有你对你自己创建的数据库的知识。


  ### 忘记提交记录


  在数据输入任务完成后，必须*提交*已编辑的记录，以便其被保存并供他人访问。当用户导航到另一条记录或关闭文件时，这会自动发生。他们也可以手动提交记录（第 4 章，“关闭记录”）。如果他们在完成数据输入任务后让记录保持打开状态，会给其他等待查看、访问或编辑数据的用户带来烦恼。如果用户尝试在自己电脑的第二个窗口中访问打开的记录，还可能引发冲突。让记录保留未提交的更改甚至可能是*危险的*，并可能导致文件损坏（本章后面会讨论）。鼓励用户在做出更改后始终及时提交记录，并考虑使用条件布局元素来视觉指示记录何时拥有活动焦点。例如，可以在布局上放置一个仅当记录活动时才显示的“提交”按钮，并且记录标题文本对象可以改变颜色（第
  21 章）。


  ### 粗心删除记录


  意外删除记录可能是由于新用户缺乏经验，或是经验丰富用户的过度自信。删除确认对话框包含一个通用且极简的消息，假设用户了解上下文。因此，它无法充分指示即将删除的是哪些具体记录，当用户失去上下文意识或注意力不集中时，这可能是一个大问题。在列表视图（`List
  view`）中，当用户错误地认为选中的记录是他们打算删除的那条时，这种困惑尤为突出。此外，在使用多个窗口时，用户可能认为他们在删除一个窗口中的记录，而实际上却在另一个窗口中进行删除。具有讽刺意味的是，这个问题更常影响有经验的用户。虽然新用户可能会紧张地阅读对话框消息并谨慎操作，但有经验的用户可能会变得马虎，以不当的过度自信点击对话框。记录删除是“撤销”命令无法撤消的操作，因此检索已删除记录的唯一方法是将其从数据库的备份副本中重新导入。因此，考虑几个选项来帮助避免此问题。


  自定义菜单可以覆盖删除功能，并呈现一个自定义的、信息丰富的警告对话框，通过包含关键标识字段来清晰说明*将要删除哪条记录*（第 23 章，“覆盖菜单项功能”）。添加第二个确认对话框也有助于避免意外，尤其是在删除大量已找到集合（`found
  set`）时。这稍微有些不方便，但可以避免错误删除带来的更大不便。或者，自定义对话框可以要求用户输入一个单词或短语，在脚本继续执行删除请求之前提供明确的意图确认。此外，考虑对一次可以删除的记录数量设置严格限制，以避免因错误操作而清空整个表的内容——可以通过自定义脚本拒绝请求，并在信息对话框中显示记录计数。最后，安全设置（第
  30 章）可以完全限制未经授权删除记录的用户对删除命令的访问权限。


  ### 误判已找到的集合


  当用户未能正确识别已找到的集合（`found set`）时，他们可能会意外执行一些影响范围超出预期的操作。如果用户认为已找到的集合包含 10 条记录，而实际上它包含
  10,000 条，那么执行诸如*删除所有记录*、*替换字段内容*或*查找/替换*等功能可能会造成灾难。确保用户理解什么是已找到的集合，以及在使用这些功能之前如何确认它。使用自定义菜单创建更具信息性的对话框（第
  23 章），并通过安全设置（第 30 章）完全禁用不需要这些功能的用户的访问。在创建自动运行的脚本时要格外小心，因为设计不良的脚本可以比人类更快地执行这些功能，并且造成的损害可能不会立竿见影。




  ### 控制文件大小


  添加到数据库中的每一项内容都会增加文件体积。创建新表、字段、布局和脚本会增加文件大小；录入成百上千乃至数百万条记录也会增加文件大小；包含大量文本的索引字段以及插入了大文件的容器字段同样会增大文件体积。这是一个自然过程，通常不会立即造成问题，尤其是因为
  FileMaker 将数据库大小限制为可用磁盘空间容量，技术上限为 8 TB。不过，遵循“少即是多”的原则，设计一个在结构和内容上都尽可能高效的数据库，仍然是一个好主意。结构设计庞大而复杂的文件可能会运行缓慢、让开发者感到困惑，并且容易引发其他问题。有两个主要问题会使文件体积超出必要：*低效的设计*和*碎片化*。


  #### 进行高效设计


  保持文件小巧并确保运行高效的一种方法就是进行高效设计。尽管设计方法众多，且这些主题将在后续章节中讨论，但越早考虑高效设计越好。


  当*容器字段*在内部存储图像或文件时，数据库大小会增加所存储内容的大小。显然，当存储成百上千张大图时，这会对文件体积产生巨大影响。如果数据库托管在服务器上或用于本地环境，但无需成为独立文件，则推荐使用*外部容器存储*（第
  10 章）。该方法将文件存储在数据库文件之外，同时像内部存储一样渲染它们，用户甚至不会察觉到差异，从而大大减小文件体积。


  另一个会迅速增大文件体积的因素是字段索引，尤其是在冗长的备注字段上。索引对于某些功能很重要，不应完全避免。但是，应尽可能减少字段索引（第 8 章，“字段选项：存储”）。


  保持数据库精简的另一种方法是使用更精细的结构和界面设计，以避免表、布局和脚本中的冗余。设计*开放、动态的资源*，使其能够更广泛地使用，并具备可变的功能特性。可以将一个常用公式或一组相似的公式移至单个自定义函数中（第
  15 章），以避免重复编写相同代码。一个用于存储与*联系人*记录相关笔记的表和一个用于存储与*项目*记录相关笔记的表可以合并。布局可以设计成提供全局功能，通过附加到主窗口的卡片窗口从任何位置访问（第
  25 章，“管理窗口”）。脚本可以设计成接受参数、灵活处理不同信息，并在单一操作功能上执行多种变体。


  图形丰富的界面设计可以改善用户体验，但也会增加文件体积以及加载和绘制布局所需的时间。因此，要在视觉惊艳的展示与实用高效的设计之间找到平衡。尽可能使用 FileMaker
  内置的布局对象，而非自定义图形。当使用自定义图标时，将其作为 SVG 文件导入到文件的图标库中（第 20 章，“使用图标标签”）。任何直接放置在布局上的自定义图形都应针对屏幕使用进行优化，使用较低分辨率，尤其当它们不在打印布局上时。


  值得一提的是，应避免采用整体式的中心辐射型关系结构，而应优先考虑表出现组设计（第 9 章，“使用表出现”）。虽然复杂的关系设置主要会导致性能问题，但也可能使开发者陷入困境，从而难以在公式、布局和脚本中进行更好的设计。请记住，某些领域的低效设计看似无害，却可能在其他地方产生负面连锁反应。始终追求最佳的结构和界面设计。


  最后，尽管会创建更复杂的整体结构，但将表分散到多个文件中有助于减小每个文件的体积。有多种方法可以通过混合搭配不同方式来实现，这在第 1 章中简要描述。例如，可以使用*数据分离模型*，其中一个或多个文件提供一个占用空间小的前端界面，与存储在一个或多个独立专用数据文件中的表内容进行交互，这些数据文件充当传统的后端数据源。这使得记录内容可以分布在一个或多个较小的文件中，同时仍能保持单一、统一的界面。


  #### 避免碎片化


  随着在常规数据录入过程中创建和删除记录，文件内部会积累空余空间。当开发者添加和移除资源时，也会发生这种情况。久而久之，这会人为地增大文件体积，并可能影响性能和稳定性。将文件保存为压缩副本（本章后面会介绍）可以安全地重建文件，将尽可能多的数据填入每个块中，通过移除空“幽灵”块来回收未使用的空间，从而消除膨胀。


  ### 避免文件损坏


  任何数字文件都可能损坏。由于数据库通常通过网络被多个用户同时访问，并且持续进行磁盘读写操作，因此它们更加脆弱，数据丢失的风险也更高。开发者应该了解可能导致损坏的原因、如何避免损坏、检测损坏的方法以及正确的修复方式。损坏的范围可能从最初被忽视的小问题，到灾难性的无法打开文件。


  在排除其他原因之前，有许多症状可能看起来像是文件损坏。如果某个字段显示问号而不是数据，但并非计算返回了错误的数据类型，也不是布局上字段宽度太小无法容纳内容所致，则可能是损坏的迹象。记录丢失或显示为空白可能表明存在损坏。但是，在确认这不是错误的已找到记录集、布局格式问题或意外删除记录的结果之前，不要惊慌。此外，如果通过调整设置或重新创建索引无法解决，不正确的搜索结果可能表明索引损坏。脚本设计不当、用户经验不足、关系断裂以及网络问题都可能造成被误认为是损坏的情况。


  其他症状则明确表明存在损坏。打开数据库时执行一致性检查，表明文件未正确关闭，可能存在损坏。如果这种情况在没有崩溃事件或强制退出的情况下随机发生，则可能表明存在持续性的损坏。在数据库中工作时，FileMaker
  应用程序随机崩溃可能是操作系统或网络问题，但也可能表明数据库存在损坏。最后，有时对话框会直接提示文件已损坏、无法打开或应进行恢复。


  避免文件损坏的最佳方法是通过网络正确共享、确保文件正确关闭，并维护好硬件和软件。




