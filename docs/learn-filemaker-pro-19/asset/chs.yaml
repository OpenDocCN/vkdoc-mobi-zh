  ![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig7_HTML.jpg](img/429700_2_En_7_Fig7_HTML.jpg)\n\
  \n**图 7-7** — 管理外部数据源的对话框\n\n要添加新的外部源，请点击 `New` 按钮以打开 `Edit Data Source` 对话框。最初，对话框会要求输入\
  \ `File Path List`，因为 `Type` 被设置为 `FileMaker`。当您选择 `ODBC` 后，对话框将会变化，如图 7-8 所示。\n\
  \n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig8_HTML.jpg](img/429700_2_En_7_Fig8_HTML.jpg)\n\
  \n**图 7-8** — 设置外部数据源的过程\n\n按照以下步骤配置与 ODBC 驱动程序的连接：\n\n1. `Name`（名称） – 为数据源输入一个在\
  \ FileMaker 中使用的唯一名称。\n2. `Type`（类型） – 选择 `ODBC` 单选按钮。\n3. `DSN` – 点击 `Specify`（指定）按钮。\n\
  4. `Select ODBC Data Source`（选择 ODBC 数据源） – 从 `ODBC Manager` 应用程序中定义的列表中选择所需的数据源，然后点击以关闭对话框。\n\
  5. `Authentication Options`（身份验证选项） – 可选地指定当数据库尝试访问数据源时，应在用户级别如何输入用户名和密码。为了获得最流畅的用户体验，直接在此处输入用户名和密码，这样用户就不必重复该过程。\n\
  6. `Filter Tables`（过滤表） – 可选地添加过滤条件，以控制在建立连接时显示哪些表。当数据库有很多表，并且您需要限制在 FileMaker 中可用的表以避免失败时，这会很有帮助。完成后，点击\
  \ `OK` 关闭 `Edit Data Source` 对话框。\n\n### 添加到关系图\n\n与创建新 FileMaker 表（该表会被添加到 `Manage\
  \ Database` 对话框的 `Tables` 选项卡中，并自动出现在 `关系图`（第 9 章）中）不同，新的 ODBC 表需要手动添加到关系图中，这将会自动将其添加到表列表中。为此，请打开\
  \ `Manage Database` 对话框并点击 `Relationships` 选项卡。然后按照图 7-9 所示的步骤操作：\n\n1. 点击 `Add`\
  \ 按钮。\n2. 在打开的 `Specify Table`（指定表）对话框中，从 `Data Source`（数据源）菜单中选择 ODBC 连接。\n3. 选择该表。\n\
  4. 点击 `OK` 按钮将表添加到表出现关系图和表列表中。\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig9_HTML.jpg](img/429700_2_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9** — 将 ODBC 源添加到关系图的过程\n\n\n\n### 在 FileMaker 中定义 ODBC“影子表”\n\n当将 `ODBC`\
  \ 表添加到关系图时，FileMaker 会在“表”选项卡中自动创建一个*影子表*。这是一个反映外部表的内部表示形式。它们会以斜体格式显示在“表”选项卡的列表中。尽管这会将外部表引入数据库，并允许类似于原生\
  \ FileMaker 表的交互，但仍存在一些显著差异，包括：\n\n- **架构锁定** – 无法从 FileMaker 内部修改外部数据源的结构。FileMaker\
  \ 中的影子表允许进行一些修改，但这不会影响远程表。\n- **删除字段** – 可以从影子表中删除字段，以减少查询的数据量，但这些字段仍保留在远程表中。\n\
  - **修改字段** – 可以针对影子表自定义字段的“自动输入”设置（第 8 章）。\n- **添加补充字段** – 可以向影子表添加字段，但这些字段仅限于非存储计算字段和汇总字段，并且不会添加到远程表中。\n\
  - **数据类型** – 当远程表对某些信息使用独立的数据类型，而 FileMaker 将其作为单一数据类型处理时（例如，整数和浮点数据，而非仅数字字段），可能需要通过计算将数据转换为\
  \ FileMaker 数据类型。\n- **数据输入限制** – 当某些字段类型的数据量受限时，FileMaker 会尽量遵守这些限制以避免问题，但仍需特别注意。\n\
  - **数据更新** – 通过网络对外部表中记录更改的自动刷新频率低于对原生 FileMaker 表的更改。请使用“刷新窗口”脚本步骤强制刷新，确保显示的数据是最新的。\n\
  - **记录锁定** – 与原生表不同，打开进行编辑的记录不会被锁定，因此用户可以同时编辑同一条记录。如果自用户开始编辑后该记录已被修改，将弹出一个警告对话框，提示用户，并允许其停止操作，以避免覆盖其他用户的更改。\n\
  - **索引** – FileMaker 无法为 SQL 字段建立索引，因此对外部表的搜索应仅限于远程表已建立索引的字段，以避免长时间延迟。\n\n**提示**\n\
  Claris 的技术简报“外部 SQL 源简介”包含了关于 `ODBC`、`JDBC` 以及连接至 FileMaker 数据库或从中连接的各种选项的更多信息。\n\
  \n### 重命名与删除表\n\n在“管理数据库”对话框的“表”选项卡中选中的表可以被重命名或删除。要重命名，请在“表名称”文本区域输入新名称，然后单击“更改”按钮。要删除，请单击“删除”按钮。将出现一个“删除表”警告对话框，要求您确认是否要继续，如图\
  \ 7-10 所示。该对话框包含一个复选框，如果选中，也将删除关系图中对应的表出现项（第 9 章）。如果未选中，关系图中的任何表出现项将变为 *<缺失表>* 占位符。被删除表的字段定义和记录将始终被删除，而布局将保留，直到手动删除或重新分配。\n\
  \n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig10_HTML.jpg](img/429700_2_En_7_Fig10_HTML.jpg)\n\
  \n**图 7-10** 删除表时的警告对话框\n\n### 向示例数据库添加表\n\n在继续之前，请向 *Learn FileMaker* 数据库添加三个表：*Company*、*Contact*\
  \ 和 *Project*。目前，请创建这些表，并保留自动创建的默认字段、表出现项和布局。完成后，对话框应如图 7-11 所示。\n\n![../images/429700_2_En_7_Chapter/429700_2_En_7_Fig11_HTML.jpg](img/429700_2_En_7_Fig11_HTML.jpg)\n\
  \n**图 7-11** 包含默认字段的 *Learn FileMaker* 数据库表\n\n## 本章小结\n\n本章探讨了使用表的基础知识，既包括在 FileMaker\
  \ 中原生使用表，也包括连接到外部 SQL 数据源。在下一章中，我们将学习如何向表中添加字段并配置其各种属性。\n\n"
- '# 8. 定义字段


  *字段*是表内一个已定义的数据输入空间。使用电子表格类比，字段就像一列，被命名并配置为包含特定类型的数据。本章重点讨论与字段相关的以下主题：


  - 定义字段数据类型

  - 介绍“管理数据库”对话框（字段）

  - 规划字段名称

  - 定义默认字段

  - 管理字段

  - 设置字段选项

  - 向示例数据库添加字段


  ### 定义字段数据类型


  FileMaker 支持八种不同类型的字段，它们分为两类：*输入字段*和*显示字段*。


  #### 输入字段


  *输入字段*是能够由用户、脚本或导入过程进行数据输入的字段。FileMaker 有六种类型的输入字段，每种对应特定类别的数据：*文本*、*数字*、*日期*、*时间*、*时间戳*和*容器*。


  **注意**

  根据定义，输入字段可以接受输入。但是，用户在特定实例中的输入能力将取决于该字段的布局存在性（第 4 部分）和用户的安全设置（第 30 章）。


  ##### 文本字段


  *文本字段*用于存储任意字母、符号或数字的组合，作为字符串，长度可达一千万个字符。文本字段的内容可以是纯文本，通过布局设置控制显示格式，或者可以包含嵌入的格式信息，通过字体、字号、样式和颜色实现丰富的样式。当按文本字段对记录排序时，值将按字母顺序排序。这意味着文本中包含的数字将*作为文本*进行排序，并逐字符评估；例如，值“`10`”将排在“`2`”*之前*，因为
  `1` 在 `2` 之前。


  **提示**

  使用文本字段存储包含前导零的数字。


  ##### 数字字段


  *数字字段*用于存储任何数值，范围从 `10^–400` 到 `10⁴⁰⁰`，每个字段最多可存储十亿个字符。数字字段中的值可以包含用于格式化数字的非数字字符。例如，一个数字字段可以包含
  `"5000"` 或 `"$5,000.00"`。虽然这些附加字符不会对数据输入、查找或排序产生不利影响，但理想情况下，应只将数字实际输入到字段中，因为可以使用字段显示布局设置（第
  19 章，“数据格式化”）动态应用货币格式。当按数字字段对记录排序时，字段中的值将按数字顺序排序，因此值 `"10"` 将正确地排在 `"2"` 之后。




  ### 日期字段


  `日期字段`用于存储正式日期，日期范围从`0001 年 1 月 1 日`到`4000 年 12 月 31 日`。输入日期时，必须使用与创建文件时继承自计算机的数据库日期和时间设置相匹配的`短日期格式`（参见第
  6 章“文件选项：文本”）。在美国，默认格式通常是“<月>/<日>/<年>”。例如，`2017 年 1 月 15 日`在日期字段中应输入为“`1/15/2017`”。尽管所有日期都必须以短日期格式输入，但布局上的字段可以配置为以多种格式之一显示该值（参见第
  19 章“数据格式化”）。按日期字段对记录排序时，这些值将按时间顺序排列。


  #### 两位数年份转换


  `FileMaker` 要求所有日期都具有四位数的年份。任何在日期字段中输入的两位数年份，都将根据输入操作发生时的年份，使用一个公式自动转换为四位数年份。这包括所有输入方法：手动输入、导入、自动输入公式或脚本步骤输入。转换过程假定两位数年份的日期更可能指的是比`未来`更远的`过去`时间。因此，将日期年份由两位自动转换为四位时，会根据数据输入时的`当前年份`进行调整，使日期落在`未来
  30 年`或`过去 70 年`的范围内。所以，在 2020 年，输入“`1/1/51`”或更早的日期会自动转换为“`1/1/1951`”，而“`1/1/50`”则会转换为“`1/1/2050`”。管理超出百年范围或不符合此分割模式的日期的数据库，必须：


  -   以四位数年份输入

  -   输入到**文本字段**而不是日期字段中，这样它们可以保持两位数年份

  -   使用自动输入公式或脚本触发器，在`FileMaker`强制执行自动转换`之前`，将日期转换为相应的四位数等效值


  **注意：** 在 2000 年之前，`FileMaker`允许使用两位数年份。升级旧数据库时，这些日期会自动获得世纪 1900，除非在升级前手动转换！


  ### 时间字段


  `时间字段`用于存储正式的时间字符串。输入时间时，必须使用与创建文件时继承自计算机的数据库日期和时间设置相匹配的时间格式。在美国，默认格式通常是“<小时>:<分钟>:<秒>
  <上午|下午>”或“`10:30:00 am`”。时间可以指代一天中的某个时刻，也可以指代`时间段`，用于表示分配或经过的时间等。例如，“`0:15:00`”表示
  15 分钟。按时间字段对记录排序时，这些值将按时间量顺序排列。


  ### 时间戳字段


  `时间戳字段`用于将正式的日期和时间统一存储在一个字符串中。`FileMaker`允许时间戳值的范围从`0001 年 1 月 1 日 上午 12:00`到`4000
  年 12 月 31 日 晚上 11:59:59`。与单独的日期和时间值一样，时间戳必须以与数据库各组件设置相匹配的短格式输入，这些设置继承自创建文件时的计算机。两个组成部分输入时中间有一个空格：“`<日期>
  <时间>`”。例如，“`1/1/2021 3:00 PM`”或“`8/1/2021 8:00 AM`”。


  **提示：** 日期、时间和时间戳在内部存储为表示从某个固定点开始经过的时间的数值：日期存储为从`0001 年 1 月 1 日`开始经过的天数，时间存储为从午夜开始经过的秒数。例如，“`8/1/2002`”存储为`737638`，“`10:00:00
  AM`”存储为`36000`。因此，公式可以对日期加减天数，或对时间加减秒数。


  ### 容器字段


  `容器字段`用于存储文档。可以通过多种功能将文件放入容器字段，包括`插入`、`复制/粘贴`或`拖放`。在 iOS 设备上运行的数据库可以使用`从设备插入`脚本步骤将音乐、照片、摄像头、麦克风或签名数据插入到容器中。根据数据库和字段的配置，容器中显示的文件可以存在于数据库结构中，也可以链接到外部文件夹位置（参见第
  10 章）。某些文件类型具有`交互内容`布局设置，允许类似于其原生应用程序的交互性（参见第 19 章）。例如，PDF 文件可以存储在一个字段中，通过布局配置允许用户查看和浏览文档的各页，就像在
  Adobe Acrobat 中查看它一样。其他具有交互选项的文件类型包括`照片`、`影片`和`音频文件`。


  ### 显示字段


  `显示字段`是一个不可编辑的字段，它会自动显示由其设置决定的值。`FileMaker`有两种类型的显示字段：`计算字段`和`汇总字段`。


  #### 计算字段


  `计算字段`由一个公式语句定义，该公式由 `FileMaker` 评估以产生结果（参见第 12 章）。这类似于应用了公式的电子表格中的单元格，但有两个主要区别。首先，该公式适用于整个列，因此每条记录都使用相同的公式来计算字段的结果。该公式可以包含针对不同记录产生不同结果的变量条件，但整体公式本身对所有记录保持不变。其次，用户`不可能`直接输入到单元格中，清除公式，然后输入数据。


  #### 汇总字段


  `汇总字段`是一种自动基于当前用户查找集和排序顺序的上下文，根据一组记录中另一个字段的值来计算值的字段。例如，汇总字段可以计算并显示查找集中每条记录的某个字段的总值，或根据关键排序字段对记录子集进行计算。汇总字段通过组合字段选项（本章稍后解释）和布局部分设置（参见第
  18 章）进行配置。


  ## 管理数据库对话框（字段）介绍


  字段在“管理数据库”对话框的“字段”选项卡中创建和定义，如图 8-1 所示。选择 `文件 ➤ 管理 ➤ 数据库` 菜单，并单击“字段”选项卡。


  ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig1_HTML.jpg](img/429700_2_En_8_Fig1_HTML.jpg)

  *图 8-1：用于管理字段的对话框*


  用于字段定义的控件包括：


  1.  `表弹出菜单` – 选择一个表以查看其下方的字段。

  2.  `字段列表` – 显示所选表中已定义的字段列表。选择其中一个进行配置、重命名、复制或删除。

  3.  `字段名称和注释` – 为所选字段输入新名称，或为新字段输入名称。输入关于所选字段的简短开发者注释。

  4.  `类型` – 为新字段选择类型，或更改所选字段的类型。

  5.  `选项` – 单击以根据类型编辑字段设置。

  6.  `按钮` – 用于`创建`新字段，或`更改`、`复制`、`删除`、或`复制粘贴`所选字段。




  '
- '# 规划字段名称


  字段命名应遵循与数据表相同的一般准则：可以包含空格，应避免使用保留字和符号，命名应描述内容且不过长。也可以为其指定名称前缀，以便在开发者列表中分组排序。然而对于字段而言，这通常需要逆转自然语言的语序，在某些情况下可能会让用户感到困惑。例如，虽然
  `Company Name`（公司名称）和 `Company URL`（公司网址）合乎逻辑，但使用 `Name First`和 `Name Last`代替 `First
  Name`（名）和 `Last Name`（姓）虽然能让字段在概念上保持列表分组，但可能显得不自然，并可能让用户感到困惑。虽然数据表名称大多对用户保持隐藏，但在执行诸如
  `import`（导入）、`export`（导出）、`sort`（排序）等特定功能时，字段名称会更多地暴露出来。在布局上，字段标签可以重命名以避免混淆。然而，熟悉
  `First Name`和 `Last Name`字段标签的用户，可能会对对话框里这些字段突然变成 `Name First`和 `Name Last`感到困惑。使用这种命名技巧时，可能需要创建由脚本驱动的流程来处理各种功能，以避免用户看到名称差异。或者，对用户进行名称差异的培训，使其不会感到困惑。


  '
- '# 定义默认字段


  从 FileMaker 17 开始，每个新数据表都会创建带有默认字段，这些字段已预配置为自动输入标准元数据。创建后，可根据需要对其进行编辑、重命名或删除。控制将来任何数据表创建哪些字段的文件名为
  `DefaultFields.xml`，位于 FileMaker Pro 应用程序的语言子文件夹中。这些字段包括：


  * `PrimaryKey` – 为每条记录输入通用唯一标识符 (UUID)

  * `CreationTimestamp` – 输入记录创建的时间

  * `CreationBy` – 输入记录创建者的名称

  * `ModificationTimestamp` – 输入记录最后修改的时间

  * `ModificationBy` – 输入最后修改者的名称


  ## 创建自己的标准字段


  一些开发者会定义替代和/或额外的标准字段，并始终将其添加到他们创建的每个数据库的所有数据表中。`标准字段`是可以普遍应用于任何数据表的字段，无论其内容所建模的对象类型为何。它们不必局限于像前面默认字段那样的自动输入元数据值。相反，它们可以是任何存储内容或提供某种功能的字段，无论数据表的实体或用途如何，都能通用。随着开发的深入，标准字段的想法可能会变得丰富，但并非每个标准字段都应强制加入每个数据表。一些`通用标准`将很容易应用于所有数据表。其他`分组标准`可能仅适用于特定类型的数据表，而另一些`可选标准`则仅根据需要进行少量应用。以下是一些适用于所有数据表的标准化思路：


  * `Status` – 一个数据输入状态字段，用于存储进度值，例如 `new`（新建）、`active`（进行中）、`hold`（暂缓）或 `done`（完成）。具体值可能因数据表而异。

  * `Notes` – 一个自由格式的备注字段，用于存储关于记录本身或记录所代表的实体的信息。

  * `Errors` – 一个计算字段，用于自动编译并在布局上显示数据输入错误通知，使用户能即时获得有关关键字段问题的反馈。

  * `Title` – 一个计算字段，组合多个字段以生成标题，显示在输入布局顶部或列表视图或门户行的主体中，帮助用户快速识别特定记录。


  **提示**


  可以复制并粘贴自定义标准字段到新数据表中，或将其添加到 `DefaultFields.xml` 文件中以实现自动插入。


  ## 对标准字段进行分组


  由于标准字段将在许多数据表和众多解决方案中一致使用，命名时应格外小心。虽然分组前缀有助于在列表中排序字段，但可考虑添加一个`超级分组前缀`，即一个单词，将字段分为两个“顶层”组：`standard`（标准）和
  `custom`（自定义）。例如，前缀 `Record` 可以表示包含元数据的标准字段，而特定于数据表的前缀则表示自定义字段，例如，使用 `Contact` 表示特定于联系人数据表的字段，如图
  8-2 所示。


  ![../images/429700_2_En_8_Chapter/429700_2_En_8_Fig2_HTML.jpg](img/429700_2_En_8_Fig2_HTML.jpg)


  **图 8-2** 无前缀字段（左）与前缀分组字段（右）示例


  虽然这种方法乍看之下视觉上可能显得杂乱，但随着列表扩展到包含数十或数百个字段，某种按名称分组的组织结构会变得有益。


