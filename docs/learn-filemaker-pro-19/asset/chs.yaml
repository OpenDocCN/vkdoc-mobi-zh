- "# 探索标签控制设置对话框\n\n标签通过*标签控制设置*对话框进行配置，该对话框在创建新标签控制时自动打开。此对话框如图 20-42 所示，之后可通过双击标签控制面板的任意位置，或从*格式*菜单或标签控制的上下文菜单中选择*标签控制设置*项来打开。\n\
  \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig42_HTML.jpg](img/429700_2_En_20_Fig42_HTML.jpg)\n\
  \n图 20-42\n\n用于定义标签控制的对话框\n\n对话框中可用的控件如下：\n\n1.  *标签* – 列出为对象定义的每个标签。可拖拽以重新排序。\n\
  2.  *标签名称* – 创建新面板时输入名称，或编辑所选标签的名称。点击*指定*来定义一个由公式驱动的名称。\n3.  *创建* – 点击以基于前述名称创建新标签。\n\
  4.  *重命名* – 点击以保存所选标签的修改后名称。\n5.  *删除* – 删除选中的标签。\n6.  *默认前端标签* – 当窗口刷新时，选择一个默认的标签选项。\n\
  7.  *标签对齐方式* – 选择标签标题的对齐方式。\n8.  *标签宽度* – 选择标签的宽度：\n    - *标签宽度* – 宽度根据每个标签名称变化。\n\
  \    - *标签宽度 + 边距* – 宽度根据每个标签名称加上指定的像素边距变化。\n    - *最宽标签的宽度* – 使用基于最长标签名称的统一宽度。\n\
  \    - *最小值* – 宽度基于每个标签名称，但以指定最小值为下限。\n    - *固定宽度* – 使用基于指定宽度的统一宽度。\n9.  *标签共享单一样式*\
  \ – 通过单一主题样式（第 22 章）保持标签之间的设计统一性。\n\n## 滑动控制\n\n*滑动控制*是一种多面板布局对象，在 iOS 设备上通过向左或向右滑动，或点击导航点来访问面板，如图\
  \ 20-43 所示。在功能上，它们类似于标签控制，但没有标签标题。通过选择*插入 ➤ 滑动控制*菜单，或点击工具栏图标并选择*滑动控制*来创建新的滑动控制。\n\
  \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig43_HTML.jpg](img/429700_2_En_20_Fig43_HTML.jpg)\n\
  \n图 20-43\n\n一个三面板滑动控制示例\n\n### 探索滑动控制设置对话框\n\n滑动控制通过*滑动控制设置*对话框进行配置，该对话框在创建新控件时自动打开。此对话框如图\
  \ 20-44 所示，之后可通过双击滑动控制的背景区域，或从*格式*菜单或滑动控制的上下文菜单中选择*滑动控制设置*来打开。\n\n设置对话框的面板控件可通过按钮添加、移除或导航到特定面板。复选框控制\
  \ iOS 滑动手势和导航点的可见性，以便在 macOS 或 Windows 电脑上的用户在无法滑动时可以点击切换到其他面板。\n\n> **提示**\n> \n\
  > 面板也可以在布局模式下通过拖拽导航点来重新排序。\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig44_HTML.jpg](img/429700_2_En_20_Fig44_HTML.jpg)\n\
  \n图 20-44\n\n用于配置滑动控制的对话框\n\n## 使用门户\n\n*门户*是一种布局对象，用于显示来自与当前布局关联的表单项相关的记录列表。门户类似于列表视图，但作为对象嵌入在布局中，用于显示一组记录，并可选择显示滚动条。*门户行*代表一条相关记录，可以包含字段和其他布局对象。图\
  \ 20-45 展示了*联系人*门户在*公司*布局上的示例。根据门户设置，用户可以添加、删除、编辑、查看记录，或点击按钮导航到特定联系人记录。门户具有许多类似于列表视图的样式选项，允许对*活动行*进行不同样式的设置，并使用交替样式帮助在视觉上区分非活动行。\n\
  \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig45_HTML.jpg](img/429700_2_En_20_Fig45_HTML.jpg)\n\
  \n图 20-45\n\n显示联系人记录的门户示例\n\n### 探索门户设置对话框\n\n要创建新门户，请选择*插入 ➤ 门户*菜单，或在工具栏中选择该工具。门户通过*门户设置*对话框进行配置，该对话框在创建新门户时自动打开。此对话框如图\
  \ 20-46 所示，之后可通过双击门户背景的任意位置，或从格式菜单或门户的上下文菜单中选择*门户设置*来打开。\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig46_HTML.jpg](img/429700_2_En_20_Fig46_HTML.jpg)\n\
  \n图 20-46\n\n用于配置门户的对话框\n\n从*显示记录来自*弹出菜单中选中的表单项充当门户的*数据源*。四个复选框及其相邻控件用于配置门户中可供用户使用的排序、筛选和其他功能。*允许删除门户记录*复选框允许用户使用`Delete`键删除选中的门户行。为提供更直观的体验并避免意外删除，可禁用此功能，并在门户行中创建一个自定义的*删除*按钮。当记录数超过可见行数时，允许滚动，并可选择始终显示滚动条或仅在用户滚动时显示。*退出记录时重置滚动条*选项将在记录提交时自动滚动回第一行，而不是保留用户当前的滚动位置。\n\
  \n底部的*格式*设置允许控制出现在门户中的相关记录以及应用的样式选项。*初始行*接受一个数字，指示应显示的第一行，该行之前的所有相关记录将被隐藏。*行数*指示门户在其最小尺寸下应包含多少条相关记录。在*第一行*之后的相关记录仍会包含在门户中，但只有在启用滚动功能或门户配置为在窗口尺寸变化时扩展大小时，才能通过滚动进行访问。交替行和活动行状态将应用样式设置（第\
  \ 22 章），以不同格式显示每隔一行和当前选中的行，从而提供视觉清晰度。\n\n\n\n### 向门户行中添加对象\n\n在布局模式下，门户的第一行是一个设计区域，可以在此添加字段、按钮和其他对象，以定义每个行在浏览模式下的渲染模板，如图\
  \ 20-47 所示。\n\n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig47_HTML.jpg](img/429700_2_En_20_Fig47_HTML.jpg)\n\
  \n图 20-47\n\n分别显示布局模式（上）和浏览模式（下）中的门户\n\n放置在门户中的对象，其渲染依据当前布局实例的上下文以及与门户数据源实例之间的关联。在选择要放置在门户内的对象以及如何配置它们时，请务必牢记这一点。添加到门户中的任何`字段`，必须来自门户的指定实例，或者来自与该实例通过一条远离布局实例的直线路径相关联的实例。来自门户表之外的其他表的字段，只能通过关系通道从每个门户行的记录上下文中显示第一个匹配记录的值。因此，一个`联系人`门户可以包含一个跨越多个关系链的字段，用于显示与该联系人相关的发票中的某个发票行项目字段，但根据该关系链上的连接，它只会显示该联系人的第一张发票中的第一个行项目的值。门户中的任何`对象`都必须结合门户实例的上下文来思考。在编写隐藏、工具提示、条件格式、脚本参数等公式时，该公式必须限制为仅包含基于门户上下文的字段。\n\
  \n### 直接在门户中创建记录\n\n在浏览模式下，当在相关源表中创建新的匹配记录时，门户会自动更新。如果一位用户正在查看带有一个`联系人`门户的`公司`记录布局，那么任何链接到该公司的新的联系人记录都会出现在所有人查看的门户中。如果查看公司记录的用户想要从`公司`布局中创建一个新的相关联系人记录，他们通常需要切换布局、创建记录、将其链接到公司，然后返回原始布局才能在门户中看到它——或者运行一个按顺序执行这些步骤的脚本。或者，可以将门户配置一个快捷方式，允许用户通过在底部的一个空白门户行中输入内容，直接在门户中创建新记录。此功能在关系层面配置，而非布局对象层面。打开`管理数据库`对话框，并在`编辑关系`对话框（第\
  \ 9 章）中，于用作门户数据源的那一侧关系（本例中为`公司 | 联系人`）上，启用`允许创建记录`复选框。完成此操作后，任何分配了该实例的门户都会显示一个空白行，如图\
  \ 20-48 所示。这个空白行`仅存在于界面中`，并且会被`程序化地忽略`，不会影响诸如`计数`、`列表`、`最大值`、`最小值`、`总和`等汇总相关记录的函数。\n\
  \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig48_HTML.jpg](img/429700_2_En_20_Fig48_HTML.jpg)\n\
  \n图 20-48\n\n设置（左）启用了用于创建新记录的空白门户行（右）\n\n当用户在该空白行的任何可编辑字段中输入内容，然后将焦点移动到另一个字段或提交记录时，系统将立即在远程表中创建一个新记录。新记录将自动使用所需的值填充每个匹配字段，以便将其与当前查看的父记录关联起来。尽管新记录保留在门户中，但它可能会根据在关系层面和/或门户设置中定义的任何排序字段的值，排序到一个新的位置。完成后，会出现一个新的空白行，用于创建更多的新记录。\n\
  \n注意\n\n此功能可能会让用户感到困惑，因为空行看起来像是一条没有字段值的实际记录。用户可能会试图删除它。可以隐藏按钮（第 21 章）以使其不那么显眼，但有些开发者会禁用它，并改用自定义脚本来执行创建相关记录所需的操作序列。\n\
  \n### 删除门户行\n\n门户行是来自另一个表的记录的表示，每当相关记录被删除时，它们就会从门户中消失。可以将门户配置为允许用户直接在门户中删除记录。打开`门户设置`对话框，并选择`允许删除门户记录`选项。启用后，用户可以选择一个门户行并按\
  \ Delete 键来删除相关记录，并将其从门户显示中移除。FileMaker 会显示一个确认对话框，询问用户是否要继续删除操作。如果他们确认，相关记录将被永久删除。\n\
  \n注意\n\n删除门户行的确认对话框信息模糊，可能会使用户困惑，他们可能意识不到自己选择了哪一行，并意外删除了错误的记录。相反，可以在门户中添加一个按钮来更精确地处理此过程，并可选地运行一个带有信息更丰富的自定义对话框的脚本。\n\
  \n### 过滤门户记录\n\n布局实例与门户实例之间的关系自动提供了一个基线过滤器，用于控制门户中显示的记录。仅包含与当前记录实例存在关系匹配的记录。相比之下，`门户设置`对话框中的`门户过滤`选项允许使用公式进一步控制哪些相关记录会实际显示在门户中。过滤公式会为每个可用的相关记录评估一次，并且仅当结果为\
  \ true 时才显示这些记录。\n\n过滤公式的复杂程度可以根据需要确定是否应包含某条记录。它可以包含字段比较，并且可以基于用户在专门用于征求过滤偏好的字段中的输入。例如，靠近门户放置的一个字段可以允许用户输入任何标准，这些标准可用于确定要显示的相关记录的子集。在图\
  \ 20-49 所示的示例中，一个`公司`布局包含一个显示相关人员的`联系人`门户。该关系将门户列表限制为仅与当前公司相关的人员。可以将过滤字段中的值与相关的`州/省`字段进行比较，以便将相关记录范围缩小到地址与用户输入的值匹配的联系人。\n\
  \n![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig49_HTML.jpg](img/429700_2_En_20_Fig49_HTML.jpg)\n\
  \n图 20-49\n\n门户过滤字段示例\n\n注意\n\n过滤仅影响相关记录的`显示`，不影响实际的关系。任何通过该关系访问记录的计算将继续看到所有相关记录，即使门户显示的是过滤后的子集！\n\
  \n\n\n"
- '# 设置门户筛选


  要设置筛选示例，请按以下步骤操作：


  1.  在 `Company` 表中，创建一个名为“公司联系人门户筛选”的文本字段。可选地，让此字段使用全局存储，以避免用户之间的冲突，并保留用户在所有记录中的输入。

  2.  将该字段放置在布局上，位于门户上方，并使用一个能清晰说明其功能的标签，例如“联系人筛选”。或者，使用一个占位计算作为提示。

  3.  打开“门户设置”对话框。

  4.  单击“筛选门户记录”旁边的“指定”按钮。

  5.  输入一个公式，用于指示 `Contacts` 表中的相关记录何时应根据用户在筛选字段中输入的内容显示在门户中（请参阅以下示例）。

  6.  然后保存公式并关闭“门户设置”对话框。


  '
- '# 编写基本门户筛选公式


  门户筛选公式由一个或多个条件语句组成，这些语句计算得出组合结果为 `true` (1) 或 `false` (0)。每个相关记录都使用此公式单独评估，并且仅当结果为
  `true` 时才会出现在门户中。由于该公式在相关记录列表内运行，因此它已假定关系本身的记录匹配条件。因此，筛选公式无需重新指定该条件，也不能将结果扩展到该条件之外以包含非相关记录。例如，当门户的数据源匹配分配给当前公司记录的联系人记录时，我们可以按联系地址进行筛选，但无法使公式包含分配给其他公司的联系人。


  编写筛选公式时，公式应包含一个条件，用于在未输入任何条件时显示所有记录。因此，请以以下代码开始公式，该代码在筛选字段为空时提供 `true` 结果：


  ```

  Company::公司联系人门户筛选 = ""

  ```


  接下来，在 `or` 运算符之后添加第二个条件，使用 `PatternCount` 函数，指定相关 `联系地址州` 字段与用户在筛选字段中输入的文本之间的部分或完全匹配。以下示例公式允许在未输入筛选值时
  `or` 在州字段中找到输入的值时显示记录：


  ```

  Company::公司联系人门户筛选 = "" or

  PatternCount (

  Company | Contact::联系地址州 ;

  Company::公司联系人门户筛选

  ) > 0

  ```


  保存公式并关闭设置对话框以测试功能。从一个在门户中包含大量联系人的公司记录开始。当在筛选字段中输入州缩写、提交记录并刷新窗口后，门户行应仅包含与输入文本匹配的记录。要使门户在用户输入筛选字段时自动更新，请使用
  `ObjectModify` 脚本触发器（第 [27] 章）运行一个脚本，该脚本持续提交、刷新并重新进入筛选字段。


  '
- '# 扩展公式以支持多个匹配字段


  前面的示例假设用户的筛选条件是州。但是，可以扩展筛选公式以检测跨多个字段的匹配。以下示例添加了条件，用于在“名”、“姓”、“城市”或“州”中查找匹配项：


  ```

  Company::公司联系人门户筛选 = "" or

  PatternCount (

  Company | Contact::联系人名 ;

  Company::公司联系人门户筛选

  ) > 0 or

  PatternCount (

  Company | Contact::联系人生 ;

  Company::公司联系人门户筛选

  ) > 0 or

  PatternCount (

  Company | Contact::联系地址城市 ;

  Company::公司联系人门户筛选

  ) > 0 or

  PatternCount (

  Company | Contact::联系地址州 ;

  Company::公司联系人门户筛选

  ) > 0

  ```


  '
- '# 增强搜索字段


  筛选字段投入使用后，应用一些格式更改，如图 [20-50] 所示。搜索字段的左角使用“检查器”面板中“外观”选项卡的“圆角半径”设置进行圆角处理。移除了标签，改用占位文本值“按...搜索”。最后，在字段右侧添加了一个按钮，具有相对的圆角、分配了图标，并定义了一个“操作”来运行脚本，该脚本删除筛选字段的内容并提交记录。


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig50_HTML.jpg](img/429700_2_En_20_Fig50_HTML.jpg)


  图 20-50


  视觉改进的门户筛选字段


  '
- '# 使用网页查看器


  网页查看器是一种布局对象，可直接在布局上显示网页。可以配置为允许或不允许用户交互，并且内容可以由以下任一方式生成：


  -   硬编码指向特定网站的网址

  -   从数据库字段提取的网址或由公式动态生成的网址

  -   由 Claris 提供的地址公式，例如 Google 网页搜索、Google 地图、FedEx 或 Wikipedia

  -   来自字段或公式的自定义 `HTML` 代码，其中可包含硬编码元素、字段数据，甚至字段中的图像

  -   由脚本提供的网址或自定义 `HTML` 代码


  **注意：** 自定义网址必须以正确的 URL 方案开头，例如 `http://`、`https://`、`ftp://` 或 `file://`。


  ## 探索网页查看器设置对话框


  要将网页添加到布局，请选择 `插入 ➤ 网页查看器` 菜单，或使用工具栏中的工具。将出现“网页查看器设置”对话框，如图 [20-51] 所示。稍后可以通过双击网页查看器，或从
  `格式` 菜单或查看器的上下文菜单中选择 `网页查看器设置` 来打开此对话框。


  左上角的“选择网站”列表指定源数据。从数据驱动模板列表中选择，或选择“自定义网址”来编写自己的 URL 或 HTML 公式。使用模板时，右侧的组件字段接受将插入
  URL 的值。“网址”区域允许输入 URL、HTML 代码或用于生成任一内容的公式。模板将插入一个现成的计算，其中包含指向右上角参数字段的链接。在文本区域输入地址或公式，或单击“指定”按钮以输入公式。


  底部的复选框选项控制各种查看器功能。您可以启用与渲染网页的用户交互、控制查找模式下的显示、在加载时包含进度条，以及包含状态消息。“自动编码 URL”选项将对地址中的特殊字符进行百分比编码。例如，如果选中此框，空格将转换为
  `%20`。或者，可以在公式中使用 `GetAsURLEncoded` 函数来处理编码。“允许 JavaScript 执行 FileMaker 脚本”选项是在版本
  19 中添加的，用于使 HTML 代码能够使用 `FileMaker.PerformScript` JavaScript 函数直接调用本机 FileMaker
  脚本（本节稍后描述）。


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig51_HTML.jpg](img/429700_2_En_20_Fig51_HTML.jpg)


  图 20-51


  用于配置网页查看器的对话框


  启用“允许与网页查看器内容交互”选项后，用户可以像使用任何标准浏览器一样与网页交互。他们可以单击链接导航到其他页面，并与丰富的媒体内容（如电影）进行交互。尽管功能强大，但查看器并非旨在作为全功能网页浏览器，可能存在一些限制。在浏览模式下，查看器上下文菜单中的“在新窗口中打开链接”功能会将页面重定向到
  FileMaker 之外用户的默认浏览器应用程序，从而提供更完整的网页浏览体验。



  好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，完成如下翻译。



  ### 使用字段中的数据构建网页


  作为根据网址显示页面的替代方案，查看器可以显示 HTML 代码以生成自定义页面。FileMaker 使用了*数据通用资源标识符*（URI）方案，这是一种标准方法，用于在网页代码中包含数据，而不是访问外部资源。*数据
  URI* 使用以下公式表示，方括号表示可选元素：


  ```

  data:[<media type>][;base64],<data>

  ```


  此公式包含以下元素：


  - `data` – 此必需前缀表示正在使用的方案，后跟一个冒号。

  - `<media type>` – 可选，指示数据中包含的材料类型。网页将使用 `text/html`，而图像将使用 `image/<type>`，例如 `image/png`。如果未指定媒体类型，数据将被假定为
  `text/plain`。

  - `base64` – 此可选扩展名，与媒体类型之间用分号分隔，用于指示数据内容是二进制数据，该数据使用 `Base64` 二进制到文本编码方案以 `ASCII`
  格式编码。

  - `<data>` – 此占位符前面带有一个逗号，将被替换为包含所描述内容的字符序列、HTML 代码或 Base64 图像数据。


  **注意**：自版本 15 起，数据和媒体类型已变为可选。文本可以以 `<html>` 或 `<!DOCTYPE html>` 开头，并将在网页查看器中按预期渲染。


  #### 创建一个 Hello World 网页


  此代码为网页查看器定义了一个简单的 *Hello, World* 示例网页公式：


  ```

  "data:text/html,


  Hello, World

  "

  ```


  添加一个 `<style>` 标签以使用*层叠样式表*（CSS）控制文本格式。此示例修改了 `h1` 样式的颜色，以绿色显示文本：


  ```

  "data:text/html,


  <style>

  h1 {

  color: green;

  }

  </style>


  <h1>Hello, World</h1>

  "

  ```


  添加一个 `<script>` 标签以包含 JavaScript 函数，如下例所示，该示例在页面加载时打开一个警报对话框：


  ```

  "data:text/html,


  <script>

  alert(''Hello, World!'')

  </script>


  <h1>Hello, World</h1>

  "

  ```


  **警告**：在公式中计算网页查看器的内容时，所有文本都必须用引号括起来。该文本中的任何引号都必须使用前置的反斜杠进行转义。


  #### 在网页中包含文本字段


  使用公式驱动的网页，插入字段的方式与在任何公式中插入字段的方式相同（第 12 章）。只需在引用的文本之外将字段引用插入到公式中。


  ```

  "data:text/html,


  <h1>" & Company::Company Name & "</h1>

  "

  ```


  #### 在网页中包含容器字段图像


  可以通过在 `<image>` 标签中插入 URL 来包含来自 Web 的图像。但是，要包含存储在字段中的图像，请使用 `Base64Decode` 函数将图像转换为文本。


  ```

  "data:text/html,


  <h1>" & Company::Company Name & "</h1>

  <img src=''" & Base64Decode ( Company::ContainerField ) & "'' />

  "

  ```


  ### 使用 JavaScript 调用 FileMaker 脚本


  在版本 19 中，FileMaker 增加了网页查看器中的 JavaScript 调用原生 FileMaker 脚本的功能。只要在*网页查看器设置*对话框中启用了该选项，HTML
  代码中的按钮和 URL 就可以调用带有两个参数的 `FileMaker.PerformScript` 函数：*脚本名称*和*参数*。以下简单示例假设存在一个名为“Test
  Script”的脚本，该脚本将使用 `Show Custom Dialog` 脚本步骤生成一个显示脚本参数的对话框（第 24 和 25 章）。该代码渲染一个按钮，该按钮调用名为
  `runScript()` 的 JavaScript 函数，该函数运行 FileMaker 脚本。如果配置正确，单击该按钮将导致 FileMaker 打开一个包含消息“Hello,
  World!”的对话框。


  ```

  "data:text/html,


  <button onclick=''runScript()''>Test FMP Script</button>

  <script>

  function runScript() {

  FileMaker.PerformScript ( \"Test Script\", \"Hello, World!\" );

  }

  </script>

  "

  ```


  **警告**：此 JavaScript 函数仅适用于在 FileMaker 网页查看器中渲染的网页。要从数据库外部启用 HTML 点击访问，请使用 FileMaker
  URL（第 29 章）。


  ## 使用图表


  *图表*是一种布局对象，它以几种流行的图表格式之一绘制数据的图形表示：*柱形图*、*堆积柱形图*、*正负柱形图*、*条形图*、*堆积条形图*、*饼图*、*折线图*、*面积图*、*散点图*或*气泡图*。这些图表可以使用当前查找集中的数据、一组相关记录的数据或计算出的数据来创建。图表在*图表设置*对话框中进行配置，每当在布局上插入新的图表对象时，该对话框就会打开。对于现有的图表对象，可以通过双击它或从*格式*菜单或其上下文菜单中选择*图表设置*来重新打开此对话框。该对话框分为两个主要部分：一个*图表预览*区域，在配置图表时持续更新图表的绘图；以及一个设置侧边栏，其中包含用于各种设置的可切换部分
  – *图表*、*样式*和*数据源*。


  ### 使用计算数据创建图表


  使用计算数据生成图表将从硬编码的计算值或当前记录中的字段中提取信息。要使用硬编码值创建一个饼图，请将一个图表对象插入到布局中，然后按照图 20-52 所示配置设置。


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig52_HTML.jpg](img/429700_2_En_20_Fig52_HTML.jpg)


  **图 20-52** – 基于计算数据的简单饼图的设置


  需要以下设置才能生成一个包含三个扇区的饼图，如图 20-53 所示：


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig53_HTML.jpg](img/429700_2_En_20_Fig53_HTML.jpg)


  **图 20-53** – 由示例数据生成的图表


  1. **类型** – 选择*饼图*作为类型，并可选择输入标题。

  2. **类别标签** – 输入以回车符分隔的图表类别列表，例如 `Category A¶Category B¶Category C`。

  3. **扇区数据** – 为饼图的每个类别扇区输入以回车符分隔的数字列表，例如 `1000¶250¶650`。

  4. **选项** – 为标签格式选择各种可选设置。

  5. **图表数据** – 从*数据源*设置组中，选择*当前记录（已分隔数据）*以指示图表引擎仅使用来自当前记录上下文中的数据。


  **注意**：或者，可以通过单击带有三个点的图标打开*指定公式*对话框，使用字段值生成上述图表的标签和数据。




  ### 使用找到的记录集创建图表


  以找到的记录集中的记录作为数据源，创建条形图来显示按州划分的 `Contact` 记录数量。首先，在布局上插入一个图表，然后按照图 20-54 所示配置设置。


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig54_HTML.jpg](img/429700_2_En_20_Fig54_HTML.jpg)


  **图 20-54** 使用找到的记录集中的数据配置条形图


  **注意**


  从找到的记录集创建图表可能会有点令人困惑。这就像创建带有子汇总部分的报表，因为只有找到的记录集中的记录会被包含在内，并且当前的排序顺序决定了汇总字段如何将记录计数到子组中。


  以下设置将创建如图 20-55 所示的图表：


  ![../images/429700_2_En_20_Chapter/429700_2_En_20_Fig55_HTML.jpg](img/429700_2_En_20_Fig55_HTML.jpg)


  **图 20-55** 每个州的联系记录数量柱状图


  1. **类型** – 选择 `Column` 作为类型。


  2. **X 轴数据** – 选择一个包含文本的字段，该文本将作为条形的标签。为避免重复值，如果*找到的记录集已按指定字段排序*，FileMaker 将自动汇总这些值。在我们的示例中，我们按
  `Contact Address State` 字段排序并将其指定。


  3. **Y 轴数据** – 选择一个包含条形高度数值的汇总字段。在我们的示例中，使用了一个新的 `Contact State Count Summary` 字段，该字段对
  `Record ID` 字段执行 `Count` 操作。


  4. **图表数据** – 在控件的 `Data Source` 部分，选择 `Current Found Set`，以指示图表引擎汇总所有记录中的数据。


  **请记住**，要使此图表正确汇总，记录*必须*按 x 轴排序，并且 y 轴*必须*是一个汇总字段。


  ## 总结


  本章探讨了设计布局时使用的各种对象。在下一章中，我们将学习如何操作、排列和配置对象。


  '
- "# 21. 操作对象\n\n将对象添加到布局后，可以通过多种方式对其进行操作和配置。本章介绍许多基本方法，涵盖以下主题：\n\n- 选择对象\n- 调整对象大小\n\
  - 移动对象\n- 排列和对齐对象\n- 隐藏对象\n- 条件格式\n- 了解 Tab 键顺序\n- 命名对象\n\n## 选择对象\n\n要*选择*一个对象，请用光标单击它，或者在布局上靠近对象的位置单击，然后将光标拖过或拖绕它。对象将高亮显示，并包含一个带有八个*大小调整手柄*的轮廓，如图\
  \ 21-1 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig1_HTML.jpg](img/429700_2_En_21_Fig1_HTML.jpg)\n\
  \n**图 21-1** 静止状态的对象（左）与选中的对象（右）\n\n要一次选择多个对象，可以在按住 `Shift` 键的同时逐个单击它们，或者单击背景并拖动光标，使焦点矩形接触到所有所需对象。在拖动时按住\
  \ `Command` (macOS) 或 `Windows` (Windows) 键，要求项目*完全*位于焦点矩形边界内才会被选中。当选择多个对象时，它们共享一组大小调整手柄，勾勒出组的整体空间，如图\
  \ 21-2 所示。单击布局背景或选择其他对象可以取消选择对象。要取消选择一组已选中对象中的某一个，可以在按住 `Shift` 键的同时单击该对象。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig2_HTML.jpg](img/429700_2_En_21_Fig2_HTML.jpg)\n\
  \n**图 21-2** 一起选中的对象将共享大小调整手柄\n\n**注意**\n\n无填充的形状对象只能通过单击边框来选择。单击对象的中心将穿透该对象，选中其后面的对象或布局背景。\n\
  \n## 调整对象大小\n\n可以通过向内或向外拖动八个大小调整手柄之一（相对于对象中心）来调整对象大小。使用 `检查器` 面板控件的 `位置` 选项卡上的设置可以精确调整对象大小，输入新的\
  \ `宽度` 或 `高度`，然后按 `Tab` 或 `Enter` 键以注册更改。要统一调整对象组的大小，请使用 `调整为` 功能，本章后面会介绍。\n\n##\
  \ 移动对象\n\n选中一个或多个对象后，可以通过单击并拖动它们在布局上移动，或使用其他三种方法之一。箭头键会一次性将选定对象在单个方向上微移一个像素。`检查器`\
  \ 面板的 `位置` 选项卡设置允许通过为 `左`、`右`、`顶` 或 `底` 输入新的测量值来精确定位对象。要使对象组相对于彼此移动，请使用 `排列` 和 `对齐`\
  \ 功能，本章后面会介绍。\n\n### 布局定位辅助工具\n\n有四个功能对手动定位对象很有帮助：`标尺`、`网格`、`参考线` 和 `动态参考线`。这些功能可以单独使用，也可以组合使用，以引导对象移动到新位置。\n\
  \n#### 标尺\n\n`标尺` 是沿着窗口内容区域整个左侧和顶部延伸的水平与垂直条，显示基于所选测量单位（`英寸`、`厘米` 或 `点`）的增量刻度。完整标尺（如图\
  \ 21-3 所示）仅在布局模式下且 `视图 ➤ 标尺` 菜单项处于激活状态时才可见。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig3_HTML.jpg](img/429700_2_En_21_Fig3_HTML.jpg)\n\
  \n**图 21-3** 布局模式标尺有助于精确定位\n\n标尺有几个不太明显的特性。在水平标尺和垂直标尺相交的角落处，有一个按钮显示当前测量单位。单击此按钮可循环切换标尺的可用单位。也可以从标尺的上下文菜单更改所选单位。光标的当前位置在每个标尺中用虚线标记，并且在拖动对象时，标尺会以白色高亮显示对象的边界。\n\
  \n编辑文本对象内容时，顶部标尺会变为一个灰色条，上面覆盖一个仅跨越文本对象宽度的文本标尺覆盖层，如图 21-4 所示。此标尺控制文本对象中的缩进、边距和制表符，其方式类似于在浏览模式下编辑字段时可访问的文本标尺。\n\
  \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig4_HTML.jpg](img/429700_2_En_21_Fig4_HTML.jpg)\n\
  \n**图 21-4** 编辑布局文本时顶部标尺会变换\n\n#### 网格\n\n布局 `网格` 是叠放在布局背景上的一系列均匀间隔的水平线和垂直线，用于标示次要区域和主要区域。这些线条类似于方格纸，仅在布局模式下且\
  \ `视图 ➤ 网格 ➤ 显示网格` 菜单项处于激活状态或 `检查器` 面板中相应的复选框被启用时才可见。当可见时，线条可以在视觉上协助对象均匀对齐。在 `检查器`\
  \ 中激活 `视图 ➤ 网格 ➤ 对齐网格` 菜单设置，会导致正在拖动的对象被自动吸附到移动方向上的下一条网格线（详见第 19 章“网格”）。\n\n\n##\
  \ 指南\n\n## 指南\n\n布局*参考线*是一种可移动的蓝色线条，用于对齐对象和定义布局区域。可以在布局上水平或垂直放置多条参考线，如图 21-5 所示。参考线不会被打印，并且仅在*查看\
  \ ➤ 参考线 ➤ 显示参考线*菜单处于激活状态时，在布局模式下可见。点击左侧或顶部标尺上的任意位置，然后分别向右或向下拖动，并在内容区域的目标位置释放以创建新参考线。可以通过将参考线拖动到新位置来重新定位，或将其拖回标尺来彻底移除。可见时，参考线有助于视觉上统一对齐对象。激活*查看\
  \ ➤ 参考线 ➤ 对齐参考线*菜单，将导致正在拖动的对象被吸附到移动方向上最近的可参考线。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig5_HTML.jpg](img/429700_2_En_21_Fig5_HTML.jpg)\n\
  \n图 21-5：包含多条定义区域参考线的布局\n\n## 动态参考线\n\n当对象在布局上移动时，称为*动态参考线*的蓝色线条会在附近对象上或其周围自动出现和消失，显示如果将对象放置在其当前位置将会产生的对齐和间距模式。通过显示固定对象与移动对象位置相关的空间关系，动态参考线有助于在重新定位对象时实现整洁的设计。与网格和参考线一样，对象会被磁力吸附到动态参考线上。动态参考线可以通过*查看\
  \ ➤ 动态参考线*菜单激活或停用。\n\n初次移动对象时，如果当前位置与布局上的任何其他对象不对齐，则不会显示参考线，如图 21-6 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig6_HTML.jpg](img/429700_2_En_21_Fig6_HTML.jpg)\n\
  \n图 21-6：当对象与其他对象不对齐时，不显示动态参考线\n\n当对象被拖动或用箭头键微移并开始与其他对象对齐时，将出现一条或多条动态参考线，如图 21-7\
  \ 所示。会显示*左侧*、*右侧*、*水平居中*、*顶部*、*底部*和*垂直居中*的对齐，并连接到一个或多个其他对象。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig7_HTML.jpg](img/429700_2_En_21_Fig7_HTML.jpg)\n\
  \n图 21-7：当对象与一个或多个对象对齐时，将出现参考线\n\n当对象被拖动到创建一致间距模式的位置时，这些模式也会被突出显示，如图 21-8 所示。这些模式在*水平*和*垂直*分布时出现，并与对齐参考线同时显示。\n\
  \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig8_HTML.jpg](img/429700_2_En_21_Fig8_HTML.jpg)\n\
  \n图 21-8：多条参考线可显示对齐和分布间距\n\n> **注意：** 本章示例中仅使用统一正方形形状进行说明。动态参考线和所有其他功能同样适用于*任何*不同对象类型、非均匀排列以及不同大小的组合。\n\
  \n## 排列和对齐对象\n\n在处理包含数十或数百个项目的复杂布局时，移动、调整大小和排列对象组可能是一项繁琐重复的手动工作。FileMaker 提供了有助于*对齐*、*分布*、*调整大小*、*旋转*、*分组*和*锁定*对象的功能。这些功能均可从布局模式下的菜单栏*排列*菜单、对象上下文菜单的子菜单以及检查器面板*位置*选项卡上的*排列和对齐*工具组中访问。除了*旋转*之外，这些功能均适用于任何对象类型的组合。\n\
  \n### 对齐\n\n*对齐*功能可自动水平或垂直对齐选定的对象组。例如，选中几个未对齐的对象后，选择*排列 ➤ 对齐 ➤ 左对齐*菜单项可立即将它们沿左侧边框对齐，如图\
  \ 21-9 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig9_HTML.jpg](img/429700_2_En_21_Fig9_HTML.jpg)\n\
  \n图 21-9：将未对齐对象（前）转换为对齐状态（后）\n\n### 调整为\n\n*调整为*功能可自动将选定的对象组调整为*最小宽度*、*最小高度*、*最小宽度和高度*、*最大宽度*、*最大高度*或*最大宽度和高度*。例如，选中几个大小不一的对象后，选择*排列\
  \ ➤ 调整为 ➤ 最小宽度和高度*菜单项可立即将所有对象调整为基于其中最小对象的统一宽度和大小，如图 21-10 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig10_HTML.jpg](img/429700_2_En_21_Fig10_HTML.jpg)\n\
  \n图 21-10：将大小不一的非均匀对象（前）转换为统一大小（后）\n\n### 分布\n\n*分布*命令将重新定位一组对象，使其使用组沿相应轴的外部测量值在水平或垂直方向上均匀分布。例如，选中几个间距不一的非均匀对象后，选择*排列\
  \ ➤ 分布 ➤ 垂直*菜单可立即将每个对象重新定位为均匀间距，如图 21-11 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig11_HTML.jpg](img/429700_2_En_21_Fig11_HTML.jpg)\n\
  \n图 21-11：将非均匀间距（前）转换为均匀垂直分布（后）\n\n### 旋转\n\n选择*排列 ➤ 旋转*菜单项可将许多对象按顺时针方向旋转 90 度递增，如图\
  \ 21-12 所示。例外情况包括按钮栏、图表、弹出框、门户、滑块控件、选项卡控件和 Web 查看器。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig12_HTML.jpg](img/429700_2_En_21_Fig12_HTML.jpg)\n\
  \n图 21-12：一个文本对象（左侧）经过两次 90 度旋转后（右侧）\n\n### 分组\n\n通过选择*排列 ➤ 分组*菜单，可以将一组选定对象转换为一个单一的*组对象*。组合后，分组对象可以作为单个单元移动或调整大小，但仍可通过单击组一次，再单击其中的项目来单独操作。按钮、按钮栏、图表、字段、Web\
  \ 查看器等对象在分组状态下，可以通过直接双击它们来进行功能编辑。要取消对先前分组对象的组合，请选择*排列 ➤ 取消分组*菜单。\n\n\n### 锁定\n\n\
  锁定对象后，在布局模式下该对象将变为不可编辑。这有助于避免在复杂布局中意外删除或移动对象。锁定的对象在解锁前无法移动、调整大小、重新分配、重新配置或以任何方式更改。通过选择`Arrange\
  \ ➤ Lock`菜单可锁定所选对象或对象组。锁定后，该对象将不再响应任何编辑操作。尝试通过`Inspector`更改某些设置时，会弹出一个对话框，说明由于对象的锁定状态而无法进行更改。但在许多情况下，命令会被静默忽略。可以通过`Arrange\
  \ ➤ Unlock`菜单解锁对象。选中时，锁定对象的每个调整手柄位置会显示一个“x”图标，如图 21-13 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig13_HTML.jpg](img/429700_2_En_21_Fig13_HTML.jpg)\n\
  \n**图 21-13**  \n通过调整手柄指示的锁定对象\n\n### 对象堆叠\n\n对象存在于从前到后的*堆叠顺序*中。当两个对象移动到一起时，较晚创建的对象会出现在较早创建的对象之上，从而遮挡后者。有四个命令可以改变对象在堆叠中的位置，如图\
  \ 21-14 所示：`Bring to Front`（移至顶层）、`Bring Forward`（上移一层）、`Send Backward`（下移一层）和`Send\
  \ to Back`（移至底层）。\n\n**注意**  \n对象堆叠顺序会反映在`Objects`窗格的`Objects`标签页中，列表顶部的对象位于列表下方对象的前面。\n\
  \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig14_HTML.jpg](img/429700_2_En_21_Fig14_HTML.jpg)\n\
  \n**图 21-14**  \n影响对象堆叠位置的命令示意图\n\n## 隐藏对象\n\n可以为对象分配一个公式，用于确定何时应渲染它以及何时应隐藏它。选择对象，在`Inspector`窗格的`Data`标签页的`Behavior`部分输入`Hide\
  \ objects when`公式。当该公式返回`true`时，对象将在非布局模式下隐藏。输入的公式可以基于多种条件：字段中的值、窗口状态或用户环境的详细信息。例如，在特定字段中输入数据之前可以隐藏一个按钮，例如隐藏`Print`按钮直到报表所需的字段有值，或者隐藏`Approve`按钮直到关键状态字段有值。如果值列表当前为空，则隐藏配置为弹出菜单的`field`。当窗口处于查找模式时，隐藏数据输入专用的按钮和对象。在字段中输入足够信息以实际绘制有用内容之前，可以隐藏`chart`。可以根据记录类型切换一组`portal`的显示，为供应商联系人显示采购订单门户，为客户联系人切换到项目门户。还可以利用此功能根据用户的访问权限（第\
  \ 30 章）来隐藏信息，使用户看不到显示“无权限”的屏蔽字段，也无法点击会产生访问拒绝错误的按钮。多段`button bar`可以切换，使得一次只显示一个分段，以此作为切换按钮图标和功能的技术。\n\
  \n### 使用隐藏功能切换按钮栏\n\n一个两段按钮栏，如果每个分段具有不同的`Hide`公式，则可以创建*活动标签*，即根据对应字段的值更改图标和功能的按钮。例如，考虑一个`Contact\
  \ Company ID`字段的标签，该字段配置为用于为公司分配联系人的弹出菜单。如果所需的公司记录已存在，用户只需在字段中选择它即可。但是，如果公司尚不存在，则可以创建一个按钮来创建新记录并将其链接到联系人。类似地，一旦分配了公司，通常需要一个按钮允许用户导航到分配给联系人的相关公司记录。隐藏函数可以在给定时间切换哪些按钮可见，但您仍然需要处理三个对象：字段标签、导航按钮和新建按钮。或者，所有这些都可以替换为一个对象：一个用作活动标签的两段按钮栏，该按钮栏在一个分段与另一个分段之间切换，以允许创建新公司（如果尚未选择公司）或导航到相关记录（如果已选择公司）。\n\
  \n图 21-15 所示的示例展示了一个无边框的两段按钮栏，用作`Contact Company ID`字段的字段标签。第一个按钮分段分配了一个加号图标，并配置为在`id`字段不为空时隐藏。这将运行一个脚本，该脚本创建一个新的相关公司记录并将其`id`分配给当前联系人记录。第二个分段分配了一个导航图标，并配置为在`id`字段为空时隐藏。这将运行一个脚本，用于导航到选定的`Company`记录。由于这两个隐藏公式是二元对立关系，因此在浏览模式下，任何时候只有一个标签可见。\n\
  \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig15_HTML.jpg](img/429700_2_En_21_Fig15_HTML.jpg)\n\
  \n**图 21-15**  \n作为字段标签、始终隐藏一个分段的二段栏\n\n**警告**  \n可以添加第三个分段，不带图标和脚本，作为查找模式下的非活动标签。隐藏公式将检查窗口模式并相应调整隐藏动作。\n\
  \n根据上述配置，带有加号图标的标签仅在未选择公司时出现，而带有导航图标的标签仅在选择了公司时出现，两者均如图 21-16 所示。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig16_HTML.jpg](img/429700_2_En_21_Fig16_HTML.jpg)\n\
  \n**图 21-16**  \n公司为空（上方）或已选择（下方）时的标签按钮\n\n**提示**  \n使用隐藏功能，通过一个始终返回`true`（`1`）的公式嵌入包含开发者注释的文本对象，使其只在布局模式下可见。\n\
  \n### 条件格式\n\n任何布局对象都可以使用`Inspector`窗格中的工具进行格式化。字段可以作为对象进行格式化，并且其包含的内容可以设置样式。*条件格式*是一项功能，它使用自定义公式或从二十个预定义内容值中选择的条件，覆盖应用于对象或内容的静态格式。自定义规则在`Conditional\
  \ Formatting`对话框中定义，如图 21-17 所示。要打开此对话框，请选择目标对象，然后选择`Format ➤ Conditional`菜单，或从对象的上下文菜单中选择`Conditional\
  \ Formatting`选项。该对话框包含以下控件：\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig17_HTML.jpg](img/429700_2_En_21_Fig17_HTML.jpg)\n\
  \n**图 21-17**  \n用于根据条件定义格式覆盖的对话框\n\n1.  `Condition List` – 触发格式化的已定义条件列表。这些条件将按从上到下的顺序求值。复选框指示条件是否处于激活状态。\n\
  2.  `Condition` – 定义所选条件何时应用格式化的标准。\n3.  `Format` – 选择当所选条件求值为`true`时要应用的格式设置。\n\
  \n### 条件公式选项\n\n*上下文格式化条件*定义了在何种情况下会将一组格式设置应用于对象。该条件可以是预定义的*基于值的条件*，也可以是自定义的*基于公式的条件*。\n\
  \n\n\n### 使用基于值的条件\n\n*基于值的条件*通过选定的运算符将对象的值与静态条件进行比较，从而确定何时应用格式，如图 21-18 所示。在“条件格式”对话框的“*条件*”部分，从第一个菜单中选择“*值为*”，然后从第二个菜单中选择一个运算符。根据您的选择，右侧将出现一个或多个文本框，可在其中插入静态值以构成条件标准。例如，如果“*状态*”字段的值*等于*“紧急”，或者“*总价*”字段的值*小于*零，则字段文本可以变为红色并加粗。\n\
  \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig18_HTML.jpg](img/429700_2_En_21_Fig18_HTML.jpg)\n\
  \n图 21-18 — 基于值的条件的选项\n\n### 使用基于公式的条件\n\n*基于公式的条件*通过计算自定义公式并在结果为真时应用样式，来确定何时应用格式。在“条件格式”对话框的“*条件*”部分，从第一个菜单中选择“*公式为*”，如图\
  \ 21-19 所示。然后，直接在字段中输入公式，或单击“*指定*”按钮打开“*指定计算*”对话框（第 12 章）。该公式可以使用内置函数、自定义函数和字段的任意组合来定义应用格式的条件。\n\
  \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig19_HTML.jpg](img/429700_2_En_21_Fig19_HTML.jpg)\n\
  \n图 21-19 — 基于公式的条件的界面\n\n### 对项目状态字段进行条件格式设置\n\n为了说明条件格式的用途，请考虑一个示例，其中“*状态*”字段的值控制列表中其自身和其他字段的格式，如图\
  \ 21-20 所示。通过为每个字段定义两个条件，当状态为“活动”时，它们会被条件格式设置为粗体；当状态为“暂停”时，则会变为灰色。状态为“待处理”的记录保持不变，使用默认布局格式。结果是三个格式层级，可以直观地强调记录的紧急程度。请记住，这些格式更改是叠加在通过“*检查器*”窗格设置的字段默认格式之上的。\n\
  \n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig20_HTML.jpg](img/429700_2_En_21_Fig20_HTML.jpg)\n\
  \n图 21-20 — 列表中基于记录状态进行条件格式设置的字段示例\n\n在此示例中，“*项目状态*”字段被分配了一个包含三个值的值列表：*活动*、*待处理*和*暂停*。由于此字段将根据其自身值进行条件格式设置，因此可以配置两个*基于值的条件*，如图\
  \ 21-21 所示。当值等于“Active”时，应用粗体格式；当值等于“Hold”时，将文本颜色设置为浅灰色。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig21_HTML.jpg](img/429700_2_En_21_Fig21_HTML.jpg)\n\
  \n图 21-21 — 已定义的状态字段使用基于值的条件\n\n列表视图中的其他两个字段需要各自配置*基于公式的条件*，因为它们需要查看另一个字段的值（状态字段）来确定其格式。格式设置相同，但具体的条件公式不同，如图\
  \ 21-22 中“*公司名称*”字段所示。此处的公式在“*项目状态*”字段中查找“Active”或“Hold”，然后应用格式。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig22_HTML.jpg](img/429700_2_En_21_Fig22_HTML.jpg)\n\
  \n图 21-22 — 列表视图中其他字段的公式驱动条件\n\n## 了解 Tab 键顺序\n\n布局的*Tab 键顺序*定义了当用户按下`Tab`键或为对象定义的其他退出字段键（第\
  \ 19 章，“行为”）时，从一个对象切换到另一个对象的焦点优先顺序。这使得用户能够仅使用键盘，从一个字段“跳转”到另一个字段，再到对象，再到字段等。默认顺序是从左到右、从上到下遍历所有可以接收焦点的对象。然而，当对象在布局上移动或稍后添加时，需要重置\
  \ Tab 键顺序，以避免焦点随意来回跳动。设置自定义顺序时，可以排除不需要数据输入的对象，如计算字段或按钮。\n\n### 更改 Tab 键顺序\n\n在布局模式下，选择“*布局*\
  \ ➤ *设置 Tab 键顺序*”菜单，将布局置于*Tab 键顺序编辑模式*，如图 21-23 所示。每个能够接收焦点的对象一侧都会附加一个箭头图标。这些箭头包含对象的当前\
  \ Tab 键顺序编号，并且是可编辑的文本框。删除对象的编号可将其从 Tab 键顺序中移除。单击空白箭头内部可自动分配 Tab 键顺序中的下一个可用编号，和/或通过直接键入来编辑编号。`FileMaker`\
  \ 通过在某处键入对象的已分配编号时自动更改该对象的值，来强制实施唯一的编号序列。\n\n![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig23_HTML.jpg](img/429700_2_En_21_Fig23_HTML.jpg)\n\
  \n图 21-23 — 处于 Tab 键编辑模式的窗口具有可自定义顺序的箭头字段\n\n### 使用“设置 Tab 键顺序”对话框的功能\n\n当布局进入 Tab\
  \ 键编辑模式时，图 21-24 所示的“*设置 Tab 键顺序*”对话框会自动打开。此对话框用于执行批量 Tab 键顺序功能，并退出返回到常规布局模式。\n\n\
  ![../images/429700_2_En_21_Chapter/429700_2_En_21_Fig24_HTML.jpg](img/429700_2_En_21_Fig24_HTML.jpg)\n\
  \n图 21-24 — 用于控制批量 Tab 键顺序功能的对话框\n\n1.  *添加剩余* – 通过在菜单中选择一个选项（*对象*、*仅字段*和*仅按钮*）来为未分配的对象添加默认顺序。然后点击“*添加*”按钮。\n\
  2.  *移除* – 通过在菜单中选择一个选项（*所有字段*或*所有按钮*）来从 Tab 键顺序中移除对象。然后点击“*移除*”按钮。\n3.  *全部清除*\
  \ – 删除布局上所有对象的 Tab 键顺序，为重新分配提供一个干净的状态。\n\n> **提示：** 在布局上移动任何对象后，请始终返回浏览模式，并点击浏览各字段以确认\
  \ Tab 键顺序符合预期。\n\n\n\n"
- '# 命名对象


  `对象名称`属性是一个可选的静态文本标识符，可以在布局模式下手动分配给某个布局对象或对象组。虽然这些标识符有些形式化，但在查看`对象`面板中的元素时很有帮助，并且某些函数和脚本步骤必须依赖它来引用非字段对象：如门户、选项卡控件、滑动控件和网页浏览器。例如，`GetLayoutObjectAttribute`和`Get
  (ActiveLayoutObjectName)`函数*只能*通过名称属性来引用对象。同样，像`转到对象`、`刷新门户`和`设置网页浏览器`这样的脚本步骤也需要对象名称作为目标引用。


  不应将`对象名称`与`字段名称`混淆，因为它们是两回事。字段名称是对特定数据容器的通用定义，无论该字段放置在何处都通用；而对象名称则是每个布局对象实例所独有的属性，字段也不例外。某个字段的实例可以被赋予与其定义名称不同的对象名称，并且同一字段在任何布局上的每个实例都可以拥有不同的对象名称。


  要分配对象名称，请进入布局模式并选择一个对象。在`检查器`面板的`位置`选项卡中的`位置`组里，点击`名称`文本区域，然后为对象键入一个名称。名称不区分大小写，并且必须唯一。


  **提示：** 如果从其他布局粘贴的对象具有相同的对象名称，则会自动重命名，以确保所有对象名称的唯一性。在粘贴新对象之前，务必先删除旧对象，并/或在粘贴后检查任何重要的名称。


  ## 总结


  本章探讨了操作布局对象的各种选项，包括选择、调整大小、移动、排列、对齐、隐藏、条件格式、制表符顺序和命名。下一章，我们将探讨主题和样式功能。


  '
- '# 22. 使用主题和样式


  对象的格式设置可以直接通过`格式`菜单的功能或`检查器`面板的`外观`选项卡应用于对象。然而，与许多流行的打印和设计应用程序一样，FileMaker 允许您保存对象样式定义并将其分组为主题，从而创建更高效的设计工作流程。这使得跨多个布局的相似对象更容易保持一致性，并允许格式化更改立即全局应用。为了提升系统性能，最佳实践也建议使用样式。本章涵盖使用主题和样式的基础知识，包括：


  - 剖析样式

  - 使用主题

  - 使用样式

  - 设计自定义主题


  ## 剖析样式


  `样式`是针对特定对象类型的外观设置集合，可通过单一操作应用于新对象。可以为每种对象类型定义一个或多个样式，从而创建设计选项库。适用的设置因对象类型而异，并且只包含与*外观*相关的属性，而非*数据*、*位置*及其他与格式无关的属性。样式可以包括`填充`、`边框`、`圆角半径`、`字体`、`字号`、`字形`、`缩进`、`行高`和`制表符`的设置。


  从许多方面来看，FileMaker 中的样式*类似于*文字处理、桌面出版应用程序以及层叠样式表（CSS）中的样式，因为它们能够将格式快速应用于新对象，并便于对现有对象进行全局样式更新。然而，它们也在一些重要方面*有所区别*。首先，样式是开发者用于高效布局设计的机制，用户在浏览模式下编辑字段文本内容时无法使用。FileMaker
  没有用户可访问的、适用于内容的样式。用户可以对字段内的文本应用单独的格式更改，但无法批量应用。与 CSS 和桌面出版不同，FileMaker 中的样式是离散的、非层次化的，不能从其他样式继承属性。此外，由于样式应用于交互式界面中的动态对象，它们比基于文本的应用程序中的样式拥有更多维度。一种样式为每个`对象部件`的每个可能的`对象状态`存储一组所有格式设置，形成一个复杂的内部层次结构，如图
  22-1 所示。


  ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig1_HTML.jpg](img/429700_2_En_22_Fig1_HTML.jpg)


  图 22-1：对象样式层次结构示意图


  `对象部件`是对象的一个组件（或对象本身），可以被单独设置样式。一个`按钮`由两个部件组成：`按钮`和`图标`。一个`门户`也由两个部件组成：`门户`和`门户行`。一个`按钮栏`有四个部件：`按钮栏`、`分隔符`、`分段`和`图标`。每个部件针对每个可能的对象状态都有一套格式设置，所有这些都定义在单一风格中。


  `对象状态`是对象相对于用户的状态。大多数对象至少具有四种状态。`正常`状态表示对象可见但未处于活跃交互中。`激活`状态表示对象获得了焦点，例如，处于焦点状态的字段或按钮栏的活动分段。另外两种常见状态表示光标与对象的交互：`悬停`和`按下`。某些对象根据其性质还有额外的状态可用，例如，`字段`具有`占位符文本`状态，而`按钮栏分段`具有`非激活`状态。


  每个部件-状态组合都可以被分配一组与其他组合不同的格式设置。这使得动态界面设计成为可能，对象的整体外观会根据用户的操作而变化。例如，当用户将光标移到按钮上时，其边框、阴影或文本颜色可以改变，以表明它是一个可以接受鼠标点击的活动元素。同样，当用户点击按钮时，其颜色可以加深，直观地表示按下的动作。部件和状态的组合为给定对象创造了指数级数量的可定义格式设置。例如，一个按钮有*八*组不同的格式设置，对应两个部件的四种状态各一组，如图
  22-2 所示。请记住，这展示了一个*单一的样式定义*，该样式可以保存并通过单一操作应用于任意数量的其他按钮。




  ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig2_HTML.jpg](img/429700_2_En_22_Fig2_HTML.jpg)


  **图 22-2** 可视化按钮可用的格式设置组数量


  样式的创建和修改*通过对象*完成。每个对象类型都以一个*默认*样式开始。当修改对象的格式时，更改会应用于该*对象*，但不会影响已分配的*样式*，而是以*未保存的对象更改*形式保留。要正确使用样式，必须将这些更改明确保存回已分配的样式，或另存为新样式。当保存到现有样式时，这些更改将自动应用于当前布局中分配了该样式的所有其他对象，如图
  22-3 所示。


  ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig3_HTML.jpg](img/429700_2_En_22_Fig3_HTML.jpg)


  **图 22-3** 格式更改必须保存到样式才能更新其他对象


  *主题*是应用于布局的每种对象类型的样式集合。FileMaker 附带了数十个内置主题，有些相当简单，另一些则展示了高级样式功能。这些主题可以不经过修改直接使用，也可以自定义以满足需求，或者完全忽略而采用完全自定义的主题。一个拥有更庞大且更实用样式选择的自定义主题，可以根据您的设计品味和技术要求进行量身定制。


  每个布局可以分配一个主题，该主题中的所有样式都可用于分配给对象。在一个文件内，可以使用任意数量的不同主题。但是，为了轻松地在整个解决方案中同步样式更改，建议在每个布局上使用单一主题。正如对*对象*所做的格式更改必须保存回*样式*才能应用于布局上的其他对象一样，对*样式*的更改也必须保存回布局的*主题*才能应用于其他布局上的对象。如果不保存，该布局的主题副本会累积*未保存的样式更改*，使其成为一个个性化的集合，与使用同一主题的其他布局上的样式不匹配。要更新主题，必须将所有更改明确保存回主题，如图
  22-4 所示。


  ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig4_HTML.jpg](img/429700_2_En_22_Fig4_HTML.jpg)


  **图 22-4** 样式更改必须保存到主题才能更新其他布局


  > **注意：** 因为样式和主题更新必须明确保存，请养成在对布局对象进行*任何*格式更改后*立即*保存的习惯。


  ## 使用主题


  FileMaker 会根据几条基本规则为新布局类型确定最佳选项，从而自动为每个新布局分配一个主题。新数据库的默认布局将始终分配*明朗*主题。新的*电脑*布局将始终分配与创建布局时正在查看的布局相同的主题。新的*触控设备*布局将分配*明朗触控*主题，除非正在查看的布局的内置主题具有内置的触控变体。例如，如果正在查看分配了*明亮*主题的布局，则新触控布局将分配*明亮触控*主题。但是，如果正在查看分配了*宇宙*主题的布局，则新触控布局将分配*明朗触控*主题，因为没有可用的触控主题。任何新的*打印机*布局都将分配*明朗打印*主题。创建新布局后，您可以为其分配其他主题。


  > **注意：** FileMaker 在确定新布局的最佳默认分配时，不会查看自定义主题名称。尽管您可以创建后缀为*触控*和*打印*的自定义主题，但它们不会按照前面描述的方式被自动选择。


  ### 更改布局的主题


  创建布局后，可以使用*更改主题*对话框更改主题分配，如图 22-5 所示。在布局模式下，可以通过单击工具栏第二行中显示的*主题*名称旁边的图标，并选择*布局*菜单或布局背景的上下文菜单中的*更改主题*来打开此对话框。


  ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig5_HTML.jpg](img/429700_2_En_22_Fig5_HTML.jpg)


  **图 22-5** 用于选择当前布局主题分配的对话框


  此对话框对可用主题列表进行分类，并已选中分配给当前布局的主题。对话框中没有任何内容可直接编辑。您只能选择一个主题或导入主题以供选择。当选择并分配了不同的主题时，布局上的每个对象都会受到影响，这取决于新主题中可用的样式与旧主题中分配给对象的样式相比如何。如果新主题具有与分配给对象的样式同名的样式，则对象将保留该分配，并使用新主题中该样式的格式设置。样式名称*不*区分大小写，因此任何名称匹配都可生效。分配了在新主题中未找到的样式名称的对象，将被分配新主题中该对象类型的*默认*样式。


  在主题切换期间，大部分未保存的格式更改将丢失。某些未保存的文本格式更改（例如文本大小）会在更改主题时保留。为了保留未保存的格式更改，FileMaker 在更改主题后有一个相当巧妙的**两步撤销过程**。在为新布局分配主题后立即执行，第一次使用*撤销*命令将保留新的主题分配，但会恢复因在旧主题中未保存而丢失的对象属性。第二次使用*撤销*将完全将布局恢复到之前的主题。这使您可以尝试性地分配一个新主题，后退半步，然后有机会将之前未保存的更改保存到新分配主题中的新样式或现有样式中，或者完全恢复到旧主题。


  > **提示：** 为获得最佳体验，请在设计布局元素后避免更改主题。选择一个主题并在整个数据库中一致地使用它，并不断更新样式更改。


  ### 管理主题


  主题通过*管理主题*对话框进行管理，如图 22-6 所示，可以通过选择*文件 ➤ 管理 ➤ 主题*菜单项打开。当您为布局分配主题时，它们会添加到此对话框中。


  ![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig6_HTML.jpg](img/429700_2_En_22_Fig6_HTML.jpg)


  **图 22-6** 用于管理主题的对话框


  此对话框列出了数据库中文件内曾经在布局上使用过的每个主题，即使它已不再使用。这些主题会一直保留，直到被明确删除。内置主题名称将始终包含在方括号内。*导入*按钮开始从另一个数据库文件复制自定义主题的过程。*重命名*按钮允许为自定义主题分配新名称。内置主题无法重命名，但可以复制以创建新的自定义命名主题。只要主题不在文件中使用，就可以将其删除。




  '
- "# 使用样式\n\n添加到布局中的每个对象都会自动分配布局主题中类型对应的*默认*样式。默认样式无法重命名或删除，但可以更新修改后的设置，也可以添加全新的自定义样式。通过从对象的上下文菜单中的*对象样式*菜单中选择样式，或从*检查器*窗格的*样式*面板中选择样式（如图\
  \ 22-7 所示），可以将样式分配给选中的对象。\n\n![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig7_HTML.jpg](img/429700_2_En_22_Fig7_HTML.jpg)\n\
  \n图 22-7\n\n从对象上下文菜单（左）或检查器（右）中选择样式\n\n## 编辑对象的样式设置\n\n要修改对象的格式并将其保存到样式和主题，请按照图\
  \ 22-8 所示的步骤操作。首先，选择一个对象，然后点击*检查器*窗格的*外观*选项卡。接着执行以下步骤：*选择部件*、*选择状态*、*编辑任意设置*、*保存到样式*、*保存到布局主题*。\n\
  \n让我们更详细地演示一个示例。首先，从*主题*和*样式*下方的弹出菜单中选择一个*对象部件*。此操作会自动将对象类型显示为整个“部件”，对于由组件层级结构组成的对象，则会列出所有可用的组件部件。例如，当选择了一个*门户*时，列表将包含*门户*和*门户：行*，因为每个部件都可以有不同的格式。在所示的示例中，选择了以*弹出菜单*控件样式格式化的字段，因此有三个部件可用：*弹出菜单*、*弹出菜单：按钮*和*弹出菜单：图标*。\n\
  \n![../images/429700_2_En_22_Chapter/429700_2_En_22_Fig8_HTML.jpg](img/429700_2_En_22_Fig8_HTML.jpg)\n\
  \n图 22-8\n\n修改对象格式并保存到样式的过程\n\n接下来，选择一个*对象状态*。默认选择始终是代表对象部件静止状态的*正常*。当选择其他状态时，布局上对象的外观会相应改变，以预览基于当前设置下该状态的外观。选择好对象部件和状态后，使用*检查器*中的格式控件开始修改对象的设置。可以任意修改任意部件任意状态的任意设置，直到对象表现符合预期为止。\n\
  \n**提示**\n\n对象部件和状态菜单旁边的吸管图标允许复制和粘贴格式设置，以节省时间。\n\n完成对象格式修改后，*样式*旁边的菜单图标将变为红色，表示存在未保存的*对象*更改。为了保持主题和样式在对象与布局之间的一致性，务必将这些更改保存回样式。点击红色图标以显示操作选项菜单。*还原对样式的更改*选项将消除所有未保存的更改，并将对象恢复到先前保存的设置。*另存为新样式*选项将对象的当前格式设置保存为新样式，然后将其分配给对象，而先前分配的样式保持不变。最后，*保存对当前样式的更改*选项将根据所有未保存的格式设置更新对象的当前样式，然后自动更新布局上所有共享相同样式的对象的格式设置。菜单还包含*重命名*当前样式和*删除*当前样式的选项，删除后对象将恢复为*默认*样式。\n\
  \n样式更改保存后，*主题*旁边的菜单图标将变为红色，表示存在未保存的*样式*更改。点击此图标可显示类似的保存选项菜单。*还原对主题的更改*选项将消除对当前布局上*任何样式*所做的所有未保存更改，将所有对象的每个样式*恢复到最后一次保存到主题的状态。*另存为新主题*选项将所有样式的副本保存到一个新主题中。最后，*保存对主题的更改*选项使用所有已完成的样式更新来更新当前主题，并更新所有共享同一主题的布局上所有对象的格式设置。\n\
  \n\n  \n"
- "# 设计自定义主题  \n\n自定义主题设计的方法会受到多种因素的影响。两个主要因素是 FileMaker 的具体使用经验和对界面设计原理的普遍了解。熟悉这两者的人可以利用这些经验，在设计界面愿景时专注于创新。经验较少的人则需要从他人作品中汲取灵感，或进行更多的试探性实验。其他因素包括计划构建的解决方案类型、目标部署平台、客户期望以及预算限制。没有一种方法能够适用于每种情况下的每一位开发者，在具体项目之外规划主题可能颇具挑战。虽然不意味着存在一刀切的方法，但在开始阶段还是有一些具体事项值得思考。\
  \  \n\n尝试将主题设计规划与任何过去或现在的具体项目分离开来，创建一个抽象的设计沙盒。这能让你专注于创建干净、原创的主题，避免文件被无关负担填满。你仍应参考尽可能多的实际案例来激发灵感，确保你的选择基于真实项目，但又不被任何单一项目所束缚。从众多案例中选取最佳实践，进行比较、对比，然后重新整合为新的设计。\
  \  \n\n沙盒文件应包含一两个半真实性的简单表格，以便在过程中使用，例如*联系人*和*公司*，或*发票*和*明细项*。以一个表格作为设计焦点，为其构建列表视图和表单视图布局，另一个表格则作为门户设计的相关表。仅在需要时为对话框、报表、iOS\
  \ 设备等定义标准项目所需的样式时，才创建额外布局。请记住，目前要将字段和布局数量控制在最低限度，因为你并不是在设计实际解决方案，而只是一个*样式原型*。始终先专注于这一目标。\
  \  \n\n开始添加对象并尝试不同的格式选项。重点考虑不同布局或不同功能所需的独特格式。例如，列表视图中的字段可能不可编辑，因此可以设置为透明填充和无边框；而表单视图中可编辑的字段，最好通过不同填充颜色等视觉提示表明其是可接受输入的字段。同样，用于布局标题、字段标签、信息提示、说明、报表页码等文本对象也需要单独的样式。思考你可能使用的各种按钮类型，例如标准按钮、仅图标按钮、带图标的文本按钮等。有些按钮可能有边框和填充，另一些可能只有带透明背景的图标——每种都需要单独定义样式。务必考虑字段的所有不同控件类型；每种类型都需要一个或多个定义的样式，因为不存在通用的*字段*样式类别，只有`编辑框`、`弹出菜单`、`日历`等。\
  \  \n\n由于*任何格式差异*都需要单独的样式，字段和标签可能需要根据你构建的解决方案类型进行多种变体。例如，你可能需要为每种对齐方式（左、右、居中）以及每种外观（透明、带边框、填充）分别定义一种样式。花时间考虑不同的对象状态和窗口模式。大多数样式需要适应交互、在不同模式下正确提示信息等。尝试在这些目标之间找到合理的平衡点。一方面，保持样式列表简短以避免过于繁琐；另一方面，要提供足够多的选项，形成实用的设计调色板，避免因样式不足而作弊，对对象进行小的格式调整却不更新或创建新样式。\
  \  \n\n在命名样式时，要在清晰描述用途和简洁易读之间取得平衡。名称在整个主题中必须唯一，无论对象类型如何，因此建议将对象类型作为名称前缀，例如，通过将按钮和字段样式分别命名为`按钮\
  \ 带边框右对齐`和`字段 带边框右对齐`，避免冲突。`默认`样式无法重命名，因此将其作为每种对象类型最常用的样式选择，或者忽略它。  \n\n当样式沙盒中包含足够多的样式，让你觉得能够提供坚实基础时，将主题迁移到实际文件中并开始用于真实开发。当你遇到未预料到的样式需求时，添加或增强主题。如果目的明确且不仓促行事，最终结果将是一个设计良好、实用的主题，可以导入并复用于其他文件。\
  \  \n\n虽然这个过程听起来可能像是一项繁琐沉重的工作，但请记住，一个稳固的主题带来的好处最终会让时间投入获得良好回报。  \n\n## 总结  \n\n\
  本章介绍了使用主题和样式提高界面设计效率的基础知识。下一章，我们将探讨如何自定义应用程序菜单，以创造独特的用户体验。  \n\n"
- "# 自定义菜单  \n\n一个数据库可以用自定义菜单覆盖 FileMaker 的默认菜单栏。自定义的程度可根据需求变化，从拦截少数功能的修改到构建完全独特的桌面体验。你可以构建一组根据条件动态变化的自定义菜单，或创建多个根据布局上下文安装的菜单集。自定义菜单能将一个解决方案从单纯的数据库*文档*提升为自定义*应用程序*。本章探讨自定义菜单的基础知识，涵盖以下主题：\
  \  \n\n- 开始了解自定义菜单基础知识  \n- 探索`管理自定义菜单`对话框  \n- 创建自定义菜单集  \n- 自定义菜单项  \n- 安装菜单集\
  \  \n- 探索命令与菜单之间的关联  \n- 创建基于状态的自定义菜单  \n\n\n\n"
- '# 自定义菜单基础入门


  FileMaker 中的*菜单栏*与任何现代应用程序类似：一条水平条带，位于屏幕顶部（macOS）或数据库窗口顶部（Windows）。数据库始终显示*活动菜单集*，默认为一个不可修改的集合，称为*[标准
  FileMaker 菜单]*。开发者可以创建一个或多个附加菜单集，在各种情况下代替标准菜单集进行安装。在深入探讨定制之前，请先回顾菜单的对象和术语，如图 23-1
  所示。


  ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig1_HTML.jpg](img/429700_2_En_23_Fig1_HTML.jpg)


  图 23-1


  菜单组件的术语概览


  一个*菜单集*是一个命名的菜单集合，可以安装到菜单栏中，从而成为*活动菜单集*。一个*菜单*包含一组不同类型的项目，如图 23-2 所示。


  ![../images/429700_2_En_23_Chapter/429700_2_En_23_Fig2_HTML.jpg](img/429700_2_En_23_Fig2_HTML.jpg)


  图 23-2


  菜单的层级结构


  一旦定义完成，*自定义菜单*可以添加到一个或多个菜单集中。每个菜单可以创建为以下四种类型之一：


  -   完全从头创建构建的自定义菜单。

  -   三个*不可定制*的标准 FileMaker 菜单及其所有标准菜单项：*格式*、*脚本*和*窗口*。

  -   八个标准 FileMaker 菜单，可以按需复制和定制（少数例外）：*FileMaker Pro*、*文件*、*编辑*、*视图*、*插入*、*记录*、*请求*和*帮助*。

  -   大约二十多个*标准子菜单*可供选择，可以作为独立的*菜单*附加到菜单集，也可以作为附加到自定义菜单项的子菜单。这些子菜单包括*最近打开*、*导入记录*、*转到布局*、*管理*、*共享*、*显示窗口*等。


  一个*菜单项*是添加到菜单中的三种对象类型之一：*命令*、*分隔线*或*子菜单*。


  一个*命令项*触发一个功能，可以是标准 FileMaker 命令，也可以是自定义脚本。项目可以完全自定义，拥有独特的名称和脚本功能，或者可以继承标准 FileMaker
  命令的部分或全部属性（名称、功能和快捷键命令）。


  *分隔线*是一条非功能性的水平线，用于分隔菜单项组，以创建更直观有序的项目组织。


  *子菜单*是一个项目，点击后会弹出其下包含的次级菜单选项。子菜单可以嵌套层叠，即一个菜单项可以打开一个子菜单，该子菜单中的某个项目又能打开另一个子菜单，以此类推。每个子菜单首先被定义为一个独立的菜单，然后连接到将打开它的菜单项上。


  最多有四个标准菜单永远无法从应用程序中完全移除。即使安装了完全*空*的自定义菜单集，这四个菜单也会保留。在 macOS 电脑上，*Apple* 菜单包含标准的操作系统功能，完全不受自定义菜单集影响，并且无法以任何方式修改。*FileMaker
  Pro* 应用程序菜单和*帮助*菜单始终位于菜单栏的两侧，无论它们是否出现在自定义菜单集中。当在偏好设置中启用*高级工具*时（第 2 章），*工具*菜单可见，并且这些菜单完全无法修改。


  ## 探索管理自定义菜单对话框


