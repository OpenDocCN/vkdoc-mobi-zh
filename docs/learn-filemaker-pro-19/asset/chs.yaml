  *图 24-6*


  在脚本工作区中工作时的编辑菜单。


  #### 视图菜单


  工作区的`视图`菜单包含一套完全独特的功能，如图 24-7 所示。此菜单提供了用于切换窗格可见性、管理标签页和其他功能的基本工作区功能，其中包括许多可通过工作区内的各种按钮和上下文菜单访问的功能。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig7_HTML.jpg](img/429700_2_En_24_Fig7_HTML.jpg)


  *图 24-7*


  在脚本工作区中工作时的视图菜单。




  '
- '# 脚本菜单


  在`脚本工作区`中工作时，`脚本`菜单会完全变换形态，如图 24-8 所示。它包含了`创建`、`导入`、`打开`、`重命名`、`复制`、`删除`、`保存`、`还原`和`运行`脚本的功能，其中许多功能也出现在工具栏或上下文菜单中。一个值得注意的功能是`授予/撤销完全访问权限`，它可以将选定的脚本配置为以`完全访问权限`运行，即使当前用户没有完全访问权限（第
  30 章）。当脚本被授予完全访问权限后，其名称旁边会出现一个小人物图标。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig8_HTML.jpg](img/429700_2_En_24_Fig8_HTML.jpg)


  **图 24-8**


  在脚本工作区中工作时的脚本菜单


  **警告**


  `脚本`菜单仅适用于 macOS。在 Windows 系统中，这些功能位于修改后的`文件`和`编辑`菜单中。


  ## 编写脚本


  要创建脚本，请点击工具栏中的`+`按钮，或选择`脚本 ➤ 新建脚本`菜单项。新脚本将出现在`脚本窗格`中，并以选项卡形式打开，编辑焦点集中在标签上，等待输入自定义名称。输入名称后按`回车`键，或点击选项卡外部区域以确认。


  ### 探索脚本步骤基础


  `脚本步骤`是插入到脚本工作流中的一条命令指令，它定义了一个作为整体事件序列一部分执行的特定操作。虽然步骤可以通过键盘输入`插入`到工作流中，但它们实际上是`基于对象`而非`基于文本`的。插入后，步骤可以被选中、拖拽、复制、剪切、粘贴或删除，但不能像在基于命令行的脚本环境中那样通过键盘输入进行编辑。某些步骤具有活动区域，允许直接输入公式或选择菜单选项。然而，大多数可配置选项是通过点击打开窗格或对话框来修改的。


  #### 插入脚本步骤


  可以通过直接键入时的自动补全功能或使用`步骤窗格`将步骤添加到脚本中。


  ##### 使用自动补全插入步骤


  新脚本会有一个空白行。点击该行并开始键入步骤名称以激活自动补全建议界面。可用步骤列表会随着您的键入而出现和过滤，如图 24-9 所示。要选择一个步骤，可以直接点击该步骤、使用键盘方向键，或继续键入直到所需步骤位于列表顶部。选择步骤后，按`回车`键或双击它即可插入。插入后，该步骤会从可编辑文本变为交互式对象。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig9_HTML.jpg](img/429700_2_En_24_Fig9_HTML.jpg)


  **图 24-9**


  自动补全可用的建议


  ##### 从步骤窗格插入步骤


  要使用`步骤`窗格插入，请通过滚动、使用方向键、键入所需步骤的几个字符或使用`搜索`字段过滤列表来找到所需的步骤。选择后，按`回车`键、双击该步骤，或右键点击它并从上下文菜单中选择`插入到脚本`功能，即可将步骤插入脚本工作流。


  #### 配置脚本步骤


  脚本步骤可分为两大类。`无可配置选项的步骤`将执行预定的功能，没有任何可变性。这些步骤在脚本工作流中仅以名称显示，没有任何交互选项，包括`新建记录/请求`、`转到下一个字段`、`显示所有记录`、`发出蜂鸣声`等命令。它们可以在工作流中拖拽定位，但功能上不能变化。相比之下，`有可配置选项的步骤`在命令名称后以方括号形式出现在工作流中。方括号内可能包含默认设置、值标签，或者为空，如下例所示。配置后，它们将显示全部或部分选定设置。配置步骤选项的方式因步骤而异，但大致可分为两类：`可直接内联配置的`步骤和`需通过选项对话框配置的`步骤。有些步骤则结合了这两种方式。


  ```

  允许用户中止 [ 关闭 ]

  进入浏览模式 [ 暂停: 关闭 ]

  设置变量 [  ]

  执行脚本 [  ]

  ```


  ##### 直接内联配置设置


  具有`内联直接编辑`选项功能的步骤，其方括号区域之间有一个或多个可直接访问和编辑的界面组件，无需打开单独的窗格或窗口。您会遇到三种不同的内联编辑控件：`公式文本`、`切换按钮`和`菜单`。


  ###### 使用公式文本进行内联编辑


  许多步骤允许进行`内联公式编辑`，即可以直接在脚本步骤中键入公式。这些步骤包括`如果`、`如果退出循环`和`退出脚本`。当内联编辑可用时，方括号之间会出现一个红色方框。当光标悬停时，该方框颜色加深并出现红色轮廓。点击它以展开一个扩大的公式文本区域，如图
  24-10 所示。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig10_HTML.jpg](img/429700_2_En_24_Fig10_HTML.jpg)


  **图 24-10**


  公式步骤的静止状态（顶部）、悬停状态（中间）和活动焦点状态（底部）


  **注意**


  内联公式编辑对于输入简短公式很方便，但不适用于较长公式。点击 `fx` 图标可打开全尺寸的`指定计算`对话框。


  内联公式编辑器功能齐全，与`指定计算`对话框（第 12 章，“探索指定计算对话框”）类似。它包括自动补全建议，并支持多行公式输入和编辑，如图 24-11 所示。键入公式后，点击公式区域外部或按`回车`键即可编译并保存。如果检测到公式中存在语法错误，全尺寸的`指定计算`对话框将自动打开并显示错误通知对话框，强制您在保存前解决问题。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig11_HTML.jpg](img/429700_2_En_24_Fig11_HTML.jpg)


  **图 24-11**


  显示自动补全界面的内联多行公式


  **提示**


  要在内联公式中插入回车符，请在按住`Option`键（macOS）或`Alt`键（Windows）的同时按`回车`键。


  ###### 使用切换按钮进行内联编辑


  具有`内联可编辑切换按钮`的步骤允许在两个选项之间进行选择。这些步骤可以通过方括号内带标签的值来识别，该值在逻辑上是二元的，并且当光标悬停时当前值周围会出现蓝色边框，如图
  24-12 所示。要切换当前值，请点击它或在选中该步骤时按空格键。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig12_HTML.jpg](img/429700_2_En_24_Fig12_HTML.jpg)


  **图 24-12**


  切换按钮的静止状态（顶部）、悬停状态（中间）和点击后状态（底部）


  **提示**


  当与配置选项对话框或弹出框结合使用时，切换设置通常仅可通过内联方式访问，而不会包含在其他选项的对话框中。




  ###### 带弹出菜单的内联编辑


  带有*内联弹出菜单*的步骤允许在多个可选选项中进行选择。这些选项可通过方括号内的值以及光标悬停时勾勒出当前值的蓝色边框来识别。点击该值会显示一个包含其他选项的弹出菜单。每种状态如图
  24-13 所示。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig13_HTML.jpg](img/429700_2_En_24_Fig13_HTML.jpg)


  图 24-13


  弹出菜单的三种状态：静止（上）、悬停（中）和活动聚焦（下）


  ##### 使用选项对话框配置步骤


  当可用的配置选项过多或某种方式上不利于内联编辑时，步骤会使用*对话框或面板*。虽然许多对话框是步骤特有的，但有些会打开标准对话框，例如*指定字段*和*指定计算*。有些对话框只提供几个简单的选项，而另一些则在按钮旁边汇总设置，这些按钮可打开其他对话框。有些会打开独立的对话框窗口，其他则打开一个与步骤保持连接的弹出面板。打开选项界面的方法也因步骤而异。具有配置对话框的步骤，当光标悬停在语句上时，其右侧会显示一个齿轮图标。点击此图标将打开选项界面，例如图
  24-14 中所示的*设置变量*对话框。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig14_HTML.jpg](img/429700_2_En_24_Fig14_HTML.jpg)


  图 24-14


  光标未悬停时的步骤（左上）、光标悬停时的步骤（左下）以及点击后打开的选项对话框（右）


  在上例中，*设置变量*步骤将使用指定值初始化一个变量。*名称*可以直接输入到第一个字段中，该字段用于建立要更改其值的变量。要放入变量的*值*可以直接输入到字段中，或者通过点击旁边的*指定*按钮打开的完整*指定计算公式*对话框输入。*重复*选项也是如此。有关此步骤的更多详细信息，请参阅第
  25 章“设置变量”。


  有些步骤不打开完整的对话框，而是打开一个选项面板，如图 24-15 所示。与对话框一样，面板可能包含可直接编辑的设置和打开其他对话框的按钮。在本例中，*进入查找模式*步骤打开一个简单的面板，其中包含一个按钮，用于打开标准的*查找请求*对话框（第
  4 章，“编辑查找请求”）。与通常具有“确定”和“取消”按钮的对话框不同，在此类面板中所做的更改会立即保存。可以通过点击面板边界外的脚本工作区或按下 Return
  或 Enter 键来关闭弹出面板。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig15_HTML.jpg](img/429700_2_En_24_Fig15_HTML.jpg)


  图 24-15


  弹出面板简化了某些步骤的选项选择过程


  > **提示**

  >

  > 许多步骤具有多个活动区域，它们结合了不同的配置风格。


  ##### 指定目标


  许多脚本步骤要求您使用对话框指定目标。有些步骤需要变量，并会显示之前描述过的*设置变量选项*对话框的某个版本。少数步骤需要使用*指定字段*对话框（第 20 章，“探索指定字段对话框”）选择字段。许多步骤会显示*指定路径*对话框（本章后面描述）。除此之外，许多步骤还使用*指定目标*对话框，如图
  24-16 所示，允许指定字段或变量。在最近的版本中，该对话框已取代许多脚本步骤中的*指定字段*选项。例如，大多数可用的*插入*步骤都已转换为使用此对话框，并且许多较新的*数据文件*步骤也使用它。此对话框允许选择字段或输入变量名，而打开它的脚本步骤还提供对*指定计算*对话框的访问，该对话框用于确定要插入到该目标的值。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig16_HTML.jpg](img/429700_2_En_24_Fig16_HTML.jpg)


  图 24-16


  指定目标字段（左）和变量（右）


  #### 脚本注释


  *脚本注释*是作为非功能性步骤放入脚本中的文本注释。注释显示为前面带有井号或哈希符号的文本行。它们用于提供内联文档，描述脚本或一组步骤的功能。当与空注释结合使用时，它们有助于分隔脚本的不同部分并避免视觉混乱，如图
  24-17 所示。当向脚本添加不包含任何内容的注释时，它会变成空行。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig17_HTML.jpg](img/429700_2_En_24_Fig17_HTML.jpg)


  图 24-17


  一个包含多个注释的脚本，用于记录和分隔步骤


  > **提示**

  >

  > 可以通过在按住 Option 键 (macOS) 或 Alt 键 (Windows) 的同时按 Return 键来创建多行注释。


  ## 指定文件路径


  在开发界面中，有许多实例需要指定文件路径。这在管理数据源（第 9 章）和脚本步骤（如*导入记录*、*导出记录*、*将记录另存为 Excel*、*将记录另存为 PDF*、*新建文件*、*打开文件*、*从数据文件读取*等）中都可以找到（第
  25 章）。路径输入到*指定文件*对话框中，如图 24-18 所示。此对话框的*文件路径列表*文本区域可以包含一个或多个以回车分隔的路径。如果输入了多个路径，FileMaker
  将按输入顺序检查每个路径，直到找到指向现有文件的有效路径为止。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig18_HTML.jpg](img/429700_2_En_24_Fig18_HTML.jpg)


  图 24-18


  用于指定文件路径的对话框


  ### 格式化路径


  正如对话框上显示的示例所示，可以使用多种格式输入路径，以指向本地目录、服务器文件夹目录或 FileMaker Server 网络地址中的文件。正确格式化路径可能比较棘手，尤其是在处理相对于数据库位置的本地目录中的文件时。有多种前缀可以与不同的路径格式类型混合搭配使用。如果路径输入错误，或者在定义路径后目标文件被移动，则当
  FileMaker 尝试访问该文件时，将会出现文件缺失错误。为避免输错复杂路径，请使用*添加文件*按钮及其后的*打开文件*对话框来选择文件，并允许 FileMaker
  自动制定最佳路径选项。如有必要，您可以随时进行编辑。


  #### 路径前缀


  *路径前缀*指示特定的文件类型和/或操作系统：


  - `file`、`image`、`or` `movie` – 通用、跨平台的文件路径。

  - `filemac`、`imagemac`、`moviemac` – 指向 macOS 计算机上项目的路径。

  - `filewin`、`imagewin`、`moviewin` – 指向 Windows 计算机上项目的路径。

  - `filenet` – 指向 FileMaker Server 上托管的数据库的路径，与主机的平台无关。如果源数据库和目标数据库都位于同一台服务器上，则使用
  `file` 前缀即可，无需考虑服务器上的文件夹结构。


  #### 路径类型


  FileMaker 路径可以创建为*相对路径*、*完整路径*、*网络路径* (Windows) 和*网络地址路径* (FileMaker Server)。




  ### 相对路径


  *相对路径*从当前数据库位置所在的上下文指定目标文件。此格式假设源数据库和目标数据库均未托管，且其部分目录位置相同。换句话说，它们都是在同一硬盘的同一文件夹中本地运行。尽管有时会令人困惑，但这些路径的优点是允许文件随父文件夹结构一起移动，只要两者之间的相对位置保持不变即可。相对路径的公式如下：


  ```

  file:[pathDifferential]fileName

  ```


  前缀和`fileName`是必需的，当包含它们的两个文件夹之间存在差异时，则需要包含`pathDifferential`。以下示例假设有两个文件：一个名为“Test
  Source”的当前数据库指向一个名为“Test Target”的数据库。如果这两个文件位于同一个目录文件夹中，则无需包含关于它们位置差异的任何信息，因此路径将只是前缀和目标文件的名字。


  ```

  file:Test Target

  ```


  如果源文件被移动到 macOS 的*桌面*，而目标文件被移动到用户的*文稿*文件夹，那么这两个文件将只有部分路径是共同的：


  ```

  Macintosh HD/Users/john_doe/Desktop/Test Source

  Macintosh HD/Users/john_doe/Documents/Test Target

  ```


  在这种情况下，为了让源文件指向目标文件，它需要一个由两个句点和一个正斜杠组成的`pathDifferential`，表示我们必须先在目录层级中向上移动一级，然后向下进入*文稿*文件夹以定位文件，如下路径所示：


  ```

  file:../Documents/Test Target

  ```


  将源文件留在`Desktop`上，如果目标文件被移动到*文稿*中一个名为“Target Subfolder”的子文件夹内，则文件路径将更改为包括该子文件夹。


  ```

  file:../Documents/Target Subfolder/Test Target

  ```


  当源文件被放入`Desktop`上一个名为“Source Subfolder”的文件夹中时，`pathDifferential`必须更改，以表明在向下导航到目标文件的文件夹之前需要向上移动两级。例如，假设这两个文件位于以下文件夹中：


  ```

  Macintosh HD/Users/john_doe/Desktop/Source Subfolder/Test Source

  Macintosh HD/Users/john_doe/Documents/Target Subfolder/Test Target

  ```


  因此，文件路径将需要两个*双句点-正斜杠*的层级指示符来向上指向两级，以到达共同的父文件夹，然后再向下进入文件夹结构以找到目标文件，如下路径所示：


  ```

  file:../../Documents/Target Subfolder/Test Target

  ```


  ### 完整路径


  *完整路径*是从包含它的磁盘卷的上下文指定的、指向目标数据库文件夹的路径。这会建立一个不会改变的绝对路径。只要目标文件保持在原位，无论源数据库位于何处，该路径都将有效。完整路径可用于本地启动硬盘、外置磁盘上的
  macOS 目录以及 Windows 本地目录。绝对路径的公式根据用户计算机的操作系统略有不同。


  ```

  filemac:/volume/directoryName/fileName

  filewin:/driveLetter:/directoryName/fileName

  ```


  例如，如果文件位于 macOS 计算机用户的*文稿*文件夹中，路径的格式应如下所示：


  ```

  filemac:/Macintosh HD/Users/alex_smith/Documents/Test Target

  ```


  通用的`file`前缀也适用于完整路径，并且完全跨平台。


  ```

  file:/Macintosh HD/Users/alex_smith/Documents/Test Target

  ```


  ### 网络路径（仅限 Windows 共享目录）


  *网络路径*是指向存储在 Windows 环境服务器目录中的目标数据库文件的路径。网络路径的公式是：


  ```

  filewin:/computerName/shareName/directoryName/fileName

  ```


  例如，路径可能是：


  ```

  filewin:/Company_Server/Databases/Sales/Test_Target

  ```


  ### FileMaker Server 网络路径


  *FileMaker 网络路径*是指向托管在 FileMaker Server 计算机上（而非任何形式的文件共享）的目标数据库文件的路径。网络路径的公式是：


  ```

  fmnet:/addressOrName/fileName

  ```


  例如：


  ```

  fmnet:/192.100.50.10/Test Target

  fmnet:/FileMaker-Server.local/Test Target

  ```


  如果源数据库与目标数据库托管在同一个服务器上，则可以使用简单的相对路径，如下所示。使用这种方法将使数据库“面向未来”，因为即使服务器地址发生变化，它也能继续工作。


  ```

  file:/Test Target

  ```


  ### 构建动态路径


  与作为文本键入的字面路径不同，*动态路径*可以从一个用户的计算机自动更改为下一个用户。有几种技术可以帮助保持路径的动态性：*使用变量*、*使用函数*以及*排除文件扩展名*。


  #### 在路径中使用变量


  在“指定文件”对话框中输入的路径可以包含指定整个路径或路径一部分的变量。例如，一个使用*设置变量*步骤（第 [25] 章）的脚本可以将常用目标文件的网络地址和文件名存储在全局变量中，并在构建路径时使用它们。或者，可以将整个路径放入单个变量中。需要路径的脚本步骤也可以使用存储在局部变量中的路径。这些示例展示了路径如何使用变量作为路径的一部分或全部：


  ```

  fmnet:/$$ServerAddress/$$FileName

  file:$$PathToExport

  $PathToImportFile

  ```


  当向脚本步骤提供了无效路径时，它通常会报错并显示一条相当晦涩的消息。在变量中构建路径使得排查这些问题成为可能，因为在将其嵌入脚本步骤之前就可以访问该值。当路径跨多个脚本步骤动态构建，并且可能以一种不明显的方式不遵守正确的格式要求时，这一点尤其重要。一个*显示对话框*步骤可以在需要路径的步骤之前显示该变量以供检查。作为一个变量，它也可以在数据查看器（第
  [26] 章，“探索数据查看器”）中进行监控。通常，只需查看路径就能立即揭示错误的根源。


  #### 使用函数生成本地路径


  FileMaker 的几个内置函数可以自动生成指向用户计算机上标准文件夹的路径。它们可以在公式中用于构建动态路径，无论启动磁盘或主目录的名称是什么，这些路径都能工作。


  ```

  Get ( SystemDrive )     // result = /Macintosh HD/

  Get ( DesktopPath )     // result = /Macintosh HD/Users/karen_camacho/Desktop/

  Get ( DocumentsPath )   // result = /Macintosh HD/Users/karen_camacho/Documents/

  Get ( PreferencesPath ) // result = /Macintosh HD/Users/karen_camacho/Library/Preferences/

  ```


  这些函数返回指向 FileMaker 应用程序或当前数据库文件的路径。


  ```

  Get ( FileMakerPath )

  // result = /Macintosh HD/Applications/

  Get ( FilePath )

  // result = file:/Macintosh HD/Users/karen_camacho /Desktop/Learn FileMaker.fmp12

  ```


  *临时文件夹*是一个自动生成的隐藏文件夹，仅在用户注销或计算机重新启动之前存在。由于这些文件夹不存储在可轻易访问的目录中，因此它们非常适合用作在发送电子邮件之前导出文件或存储临时数据文件时的暂存位置。


  ```

  Get ( TemporaryPath )

  // result = /Macintosh HD/var/folders/rt/n62fc5vd0hn7js2v4098ydkw0000gp/T/S10/

  ```




  ### 排除文件扩展名


  当指定 FileMaker 数据库时，文件扩展名是完全可选的。由于 FileMaker 文件扩展名未来可能发生变化，建议在路径中省略扩展名（或将其存储在全局变量中），以便日后能轻松更新数据库，而无需查找并编辑每个路径。例如，以下所有路径都会定位到同一个文件（最后一个路径假设
  `$$Extension` 变量包含 `.fmp12`）。


  ```

  filemac:/Macintosh HD/Users/john_smith/Documents/Test Target

  filemac:/Macintosh HD/Users/john_smith/Documents/Test Target.fmp12

  filemac:/Macintosh HD/Users/john_smith/Documents/Test Target$$Extension

  ```


  ### 转换路径


  在版本 19 中，新增了两个函数，可以更轻松地在操作系统路径格式和 FileMaker 路径之间进行转换。这免去了通过程序化解析公式来将路径转换为不同格式的繁琐工作。这两个函数都接受两个参数：一个*路径*和一个*格式*。两者的*格式*参数都可以是三个值之一，分别指示相应的源路径或目标路径格式：`PosixPath`、`URLPath`
  或 `WinPath`。


  ```

  ConvertToFileMakerPath ( "/Users/mmunro/Desktop/" ; PosixPath )

  // 结果 (macOS) = file:/Macintosh HD/Users/mmunro/Desktop/

  // 结果 (Windows) = file:/C:/Users/mmunro/Desktop/

  ConvertFromFileMakerPath ( "file:/Macintosh HD/Users/mmunro/Desktop/" ; PosixPath)

  // 结果 = /Users/mmunro/Desktop/

  ```


  ## 执行其他脚本


  `执行脚本`步骤允许一个脚本运行另一个脚本。这使得构建执行离散任务的模块化脚本成为可能，然后让更高级别的脚本按顺序运行它们。脚本可以调用调用其他脚本的脚本，从而创建复杂的层次化调用堆栈。脚本甚至可以调用自身，创建递归调用堆栈。将该步骤添加到脚本后，它会显示为一个未指定的脚本规范，如图
  24-19 所示。该步骤有两个活动区域。首先，*指定*值指示将定义对脚本的引用类型，这是一个由公式驱动的文本值，指示脚本的*名称*或从可用脚本列表中选择的*动态引用*。根据该选择，单击调用的脚本名称区域会打开相应的规范对话框，即*指定公式*或*指定脚本*对话框。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig19_HTML.jpg](img/429700_2_En_24_Fig19_HTML.jpg)


  图 24-19


  `执行脚本`步骤的选项


  **提示**


  按住 Command (macOS) 或 Windows (Windows) 键并单击`执行脚本`步骤的目标脚本，可在新标签页中自动打开已分配的脚本。


  ### 探索指定脚本对话框


  *指定脚本*对话框用于选择对脚本的引用，该脚本将作为按钮、界面事件触发器（第 27 章）或前面提到的`执行脚本`步骤的*目标操作*。该对话框如图 24-20 所示，允许从当前文件或数据库中定义的任何
  FileMaker 数据源（第 9 章）中选择脚本。可以定义一个可选的脚本参数，以伴随对所选脚本的调用。当将脚本分配给按钮或作为事件触发器时，此对话框包含三个按钮，可直接从对话框中添加、删除、编辑或复制脚本。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig20_HTML.jpg](img/429700_2_En_24_Fig20_HTML.jpg)


  图 24-20


  为按钮、脚本触发器或脚本步骤选择脚本


  脚本能够运行其他脚本，这允许更模块化的脚本设计。不必构建一个执行数十或数百步骤的单一庞大脚本，可以将一个流程分解为单独的脚本，每个脚本专注于特定任务。这使得建立层次结构成为可能，其中一些脚本执行开放的、基础的任务，这些任务可以被许多其他脚本共享，无论上下文如何。但是，在创建共享脚本功能的网状结构时，请务必管理好命名、组织和使用规则，以避免造成混乱的交叉调用。


  ### 在脚本之间交换数据


  脚本调用可以包含一个*参数*并接收一个*结果*，如图 24-21 所示，其中脚本 1 使用一个参数调用脚本 2，然后从该脚本的`退出脚本`步骤接收结果。


  ![../images/429700_2_En_24_Chapter/429700_2_En_24_Fig21_HTML.jpg](img/429700_2_En_24_Fig21_HTML.jpg)


  图 24-21


  说明两个脚本之间的数据交换


  **警告**


  几十年前，全局字段和变量被用来在脚本调用前“暂存”数据，以促进过时的数据交换。在此之前，有些人为此目的使用剪贴板。然而，现在脚本之间的数据交换首选使用参数。


  #### 发送参数


  脚本参数是由触发对象发送给脚本的文本字符串。参数用于传输脚本可能因任何原因使用的任何信息。参数允许触发对象向脚本推送信息，这些信息可以在每次调用之间变化，而不是在脚本中硬编码字段引用或其他值。参数可以是单个单词、一个句子、一个值列表、一个字段名称、一个字段值，或包含复杂键值对数组的
  JSON 对象。它们可以作为字面值键入，也可以使用公式构造。为了说明参数的用法，创建一个脚本，该脚本使用配置了以下公式的`显示自定义对话框`脚本步骤，在对话框中显示传入的参数：


  ```

  Get ( ScriptParameter )

  ```


  接下来，创建一个按钮或第二个脚本，该脚本使用`执行脚本`函数，并在“可选的脚本参数”字段中键入一条短消息。当单击按钮或运行脚本时，目标脚本应显示一个对话框，显示作为参数发送的消息。


  #### 解析参数


  脚本参数是一个单一的值。但是，它可以通过使用回车符分隔的值列表、对重复字段的引用或 JSON 对象，以包含多个值的方式进行组织。当接收到代表多个组件的结构化信息时，脚本将需要解析这些值以便分别处理它们。为此，请使用一个或多个`设置变量`或`插入计算结果`步骤，将数据解析并暂存到单独的变量中。这可以通过
  `Let` 语句以及 `GetValue`、`GetRepetition` 或各种 JSON 函数来完成。以下示例演示了如何将包含三个值的值列表解析为单独的变量：


  ```

  Let ( [

  input = Get ( ScriptParameter ) ;

  $id = GetValue ( input ; 1 ) ;

  $name = GetValue ( input ; 2 ) ;

  $status = GetValue ( input ; 3 )

  ] ;

  ""

  )

  ```


  此示例将使用 `GetRepetition` 函数，从包含对定义了四个重复项的字段的引用的脚本参数中解析值。


  ```

  Let ( [

  field = Get ( ScriptParameter ) ;

  $id = GetRepetition ( field ; 1 ) ;

  $name = GetRepetition ( field; 2 ) ;

  $status = GetRepetition ( field; 3 ) ;

  $task = GetRepetition ( field; 4 )

  ] ;

  ""

  )

  ```


  虽然这两个示例解析了参数中固定数量的值，但也可以创建更动态的解析功能。如果值的数量或字段重复项的数量发生变化，则可能需要使用 `While` 函数（第 13 章）语句或
  `循环` 脚本步骤（第 25 章）来遍历它们。此外，递归自定义函数可以逐步处理每个值，并将其初始化到变量中。





  #### 探索脚本结果


  由另一个脚本运行的脚本可以使用 `退出脚本` 步骤传回结果值。该步骤只有一个参数：一个用于生成文本值的计算公式。与输入参数一样，结果可以是单个值，也可以是复杂的数据结构。此示例展示了一个简单的结果，返回单词“Success”，以告知调用脚本，目标脚本已成功执行完所有步骤，未发生任何失败。


  ```

  退出脚本 [ 文本结果: "Success" ]

  ```


  一个脚本可以有多个退出点，每个退出点返回不同的值。在以下示例中，在执行`执行查找`步骤后，一个条件性的`如果`语句可以在未找到记录时退出脚本，并返回一个告知调用脚本此情况的结果。当找到记录时，脚本会继续执行直到结束，并返回成功指示符。


  ```

  执行查找 [ ]

  如果 [ Get ( FoundCount ) = 0 ]

  退出脚本 [ 文本结果: "No records found" ]

  结束如果

  循环


  结束循环

  退出脚本 [ 文本结果: "Success" ]

  ```


  ### 在服务器上执行脚本


  当数据库托管在 FileMaker Server 上时（第 29 章），脚本既可以在当前用户的计算机上使用`执行脚本`步骤本地运行，也可以使用`在服务器上执行脚本`步骤卸载到服务器上运行。在服务器上运行复杂脚本通常速度更快，因为客户端和服务器之间无需通过网络交换大量信息。当本地脚本不需要响应或任何界面操作时，该任务可以完全交由服务器处理，从而立即释放用户计算机以执行其他脚本功能或手动工作。但是，在使用此功能之前，重要的是要意识到，在服务器运行脚本时，服务器*不会*知道或访问本地计算机数据库窗口的上下文。因此，被调用脚本所需的关于*当前表*、*布局*、*记录*、*找到集*、*排序顺序*或*窗口*的任何上下文信息都必须包含在脚本参数中，以便服务器在运行前能够复制该上下文。可以专门设计新的脚本来解决此问题。在将现有脚本转换为在服务器上运行时，可能需要将其拆分为两个：一个用于将上下文信息加载到脚本参数中，另一个用于接收该信息、在服务器上重置上下文，然后执行其他脚本功能。


  脚本可以根据某些条件配置为本地运行或在服务器上运行。例如，当数据库因维护而脱机时，任何在启动时对数据库至关重要的脚本都必须能够在本地运行。对于这些脚本，应包含一个`条件`，允许脚本在托管时在服务器上运行，在非托管时在本地运行。以下示例展示了一个简单的`如果`步骤，借助`Get
  ( HostApplicationVersion )`和`LeftWords`函数，在本地运行脚本和在服务器上运行脚本之间进行选择。如果主机版本以单词“Server”开头，则表明是托管文件，并将使用`在服务器上执行脚本`步骤来执行调用。


  ```

  如果 [ LeftWords ( Get ( HostApplicationVersion ) ; 1 ) = "Server" ]

  在服务器上执行脚本 [  ]

  否则

  执行脚本 [  ]

  结束如果

  ```


  ## 强调上下文的重要性


  与计算一样，*脚本是上下文相关的*，在开发数据库时*认识到*这一点*很重要*。当执行脚本步骤时，它是在前端窗口当前布局的表出现上下文中运行的。这最初是脚本触发时的当前布局，但当脚本开始更改布局、执行查找或创建窗口时，可能会发生变化。一个复杂的数据库可能有脚本运行着运行其他脚本的脚本，其中任何一个都可能会更改当前上下文。如果脚本尝试从非当前上下文中访问字段，则会导致错误，使用户感到困惑，甚至可能具有破坏性。如果脚本在错误的上下文中创建、删除或复制记录，则可能是一场灾难。鉴于此，很显然，在设计脚本时，跟踪上下文是一项主要任务。在设计脚本时，要根据其包含的步骤来关注其预期的上下文。要了解不同步骤的期望。虽然所有脚本步骤*都是上下文操作*，但它们并非都具有相同类型的依赖关系。某些步骤是*布局表依赖的*，无论布局上可见什么，都直接访问表值。其他步骤是*布局对象依赖的*，需要与布局上的某些内容进行直接交互。在下一章中，我们将看到诸如`设置字段`（不需要字段存在于布局上）和`插入文本`（需要）之类的示例。此外，在相互关联的工作流复杂网络中调用其他脚本时，请尝试设计一个命名和组织标准，通过实施关于哪些脚本可以调用其他脚本以及哪些不能的规则来帮助您管理上下文。


  ## 管理脚本错误


  发生错误时，脚本可能会打开一个对话框，告知用户问题所在。根据用户的知识水平和发生的错误类型，此消息对用户来说可能有意义，也可能没有意义。一个常见的示例是，当`设置字段`步骤尝试为当前上下文无法访问的表中的字段设置值时发生失败。例如，如果在浏览`公司`记录时，直接（而不是通过关系）设置`联系人`表中的字段，将导致显示错误消息：“无法完成此操作，因为目标不是相关表的一部分。”由于这是一个编程错误，用户不会知道这意味着什么，也不知道该采取什么措施来解决。因此，最好设计您的脚本来捕获错误，并提供更具信息性的对话框，以有效的方式通知用户。


  要禁止显示错误，请使用`设置错误捕获`步骤，参数为`打开`。这将导致脚本完全忽略其遇到的任何错误并继续处理。在许多情况下，这并不理想，因为一个步骤中的错误可能导致工作流后续步骤中的重大问题。因此，可能需要使用自定义消息或其他步骤来检测和处理特定错误。`Get
  ( LastError )`函数可以在脚本中的不同位置使用，以确定在执行前一个（或多个）步骤时是否发生了错误。该函数将返回一个数字值，指示没有错误（`0`）或代表错误的数字。一个`如果`语句可以在检测到错误时根据条件采取行动。


  为了说明此技术，以下简单示例尝试设置`Contact::Name Last`字段。如果从`Contact`表运行此脚本，则不会产生错误，也不会显示对话框。但是，在不同表中运行它会产生一个错误，并在自定义对话框中显示该事实。根据错误及其位置以及脚本的其他功能，`如果`语句可以包含其他步骤，例如向开发人员发送电子邮件、执行替代步骤、完全停止等。


  ```

  设置错误捕获 [ 打开 ]

  设置字段 [ "Contact::Name Last; "Smith" ]

  如果 [ Get ( LastError ) = 103 ]

  显示自定义对话框 [ "错误 103: 设置字段上下文错误" ]

  结束如果

  ```


  **提示**


  有关完整错误列表，请在 Claris.com 上搜索“FileMaker Pro 错误代码参考指南”。


  ## 本章小结


  本章介绍了脚本编写基础、在脚本工作区中工作以及各种步骤配置界面选项。我们探讨了指定文件路径的各种格式，并讨论了脚本运行其他脚本、传递参数、接收结果、上下文感知以及管理脚本错误的主题。在下一章中，我们将开始创建执行常见脚本编写任务的示例。





  '
- '# 25. 常见脚本任务


  FileMaker 配备了超过 180 个内置脚本步骤，几乎可以执行你能想到的任何数据库任务。在本章中，我们将通过一些真实世界的示例来介绍基础知识，为你自行探索其余脚本步骤奠定基础。内容涵盖以下主题：


  - 基本函数脚本

  - 与字段交互

  - 访问文件夹和文件

  - 处理记录

  - 使用条件语句

  - 显示自定义对话框

  - 搜索并处理找到的记录集

  - 使用重复语句进行迭代

  - 门户函数脚本

  - 管理窗口

  - 使用“从 URL 插入”


  ## 基本函数脚本


  让我们首先探索几个执行常见功能的基本脚本步骤：控制用户中止脚本的能力、设置变量以及导航上下文更改。


  ### 允许用户中止


  任何正在运行的脚本都可以随时通过按 `Esc` (Windows) 或按住 `Command` 键的同时按句点 (macOS) 来手动停止。虽然对于执行几个快速步骤、在用户尝试中止之前就已完成的脚本来说，这可能不是问题，但对于更复杂的脚本而言，这则会带来风险，并可能导致各种问题。如果没有编程干预，部分完成的过程可能很难重新开始。用户可能会困在并非设计为用户界面的临时布局上，或者有隐藏窗口保持打开状态，但可通过*窗口*菜单访问。一组记录可能只导入了一半但尚未处理，重复运行脚本可能会导致第二次重复导入。*允许用户中止*脚本步骤可以通过拒绝用户中止脚本的能力来避免这些以及无数其他灾难。该步骤有一个默认值为*开*的设置，允许中断脚本，以及一个将其设置为*关*以禁用该功能的选项。


  此步骤可以放置在脚本的开头或工作流中的任何位置。可以在工作流中的不同点根据需要将其打开和关闭，以仅保护那些必须完成的敏感步骤。一旦配置完成，当前脚本中所有后续的脚本步骤以及执行堆栈中的任何子脚本都将继承该设置，除非被反转。如果父脚本将其关闭，则父脚本调用的所有后续子脚本都将继承该设置，除非或直到它们显式更改该设置。同样，如果子脚本更改了该设置，则当控制权交回给父脚本时，父脚本将继承该设置。


  可以使用 *Get* 函数来检查中止状态的状态，如果禁止中止则返回 `0`（假），如果允许则返回 `1`（真）。以下两个示例显示了一个脚本步骤将中止状态设置为*关*和*开*，并在其下方有一个公式，用于检查每次更改后的当前状态：


  ```

  允许用户中止 [ 关 ]

  Get ( AllowAbortState ) // 结果 = 0

  允许用户中止 [ 开 ]

  Get ( AllowAbortState ) // 结果 = 1

  ```


  注意


  在测试时，建议始终保持允许用户中止，以避免陷入无限循环或其他需要通过强制退出才能摆脱编程错误的情况！


  ### 设置变量


  *设置变量*步骤在脚本工作流的特定点设置局部变量或全局变量（第 12 章，“变量”）的值。变量可以在脚本中用于在一个步骤“暂存”值，以供另一个步骤使用。它们可以存储值以供以后使用，从多个上下文中汇编数据，跟踪控制脚本行为的迭代次数，以及更多用途。请记住，局部变量仅限于正在运行的脚本的上下文内。它们也*不会被*活动执行堆栈中的其他脚本继承，因此由脚本调用的子脚本或调用它的父脚本无法访问在其中设置的局部变量。将该步骤插入脚本中，然后双击该步骤或单击其旁边的齿轮图标，打开*设置变量选项*对话框，如图
  25-1 所示。


  *名称*字段用于指定目标变量的名称。这可以是一个新变量或一个现有变量。名称是变量在后续公式中的使用方式，因此请选择清晰且具有描述性的名称。单个美元符号前缀表示局部变量，两个美元符号前缀表示全局变量。如果未输入前缀，将自动添加一个符号。


  在*值*字段中，键入步骤执行时要存储在变量中的信息，可以是静态值、字段引用或使用旁边的*指定*按钮输入的公式。


  *重复次数*字段指定应为命名变量的哪个重复项接收指定的值。这允许单个变量包含多个单独的值，类似于重复字段（第 8 章）。默认值始终为 1。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig1_HTML.jpg](img/429700_2_En_25_Fig1_HTML.jpg)


  图 25-1


  用于设置变量的对话框


  提示


  由于你可以创建许多具有不同名称的变量，因此重复功能应保留用于管理可通过编程方式确定的可扩展数量的值。


  以下示例可由分配给*记录 ➤ 删除记录*自定义菜单项（第 22 章）或删除按钮的脚本使用。它在删除公司记录之前提供警告，尽管它可以扩展用于任何表。它使用了四次*设置变量*步骤。它首先将
  `$name` 变量设置为当前*公司*记录的*公司名称*字段，并将 `$count` 变量设置为与之关联的*联系人*记录数量。接下来，它使用这些值将自定义警告值放入
  `$message` 变量中，以供在*显示自定义对话框*步骤中使用。最后，它将用户的按钮选择放入 `$button` 变量中。末尾的 *If* 步骤将*删除记录/请求*步骤限制为仅在消息对话框中点击的按钮表示用户确认时才执行。


  ```

  设置变量 [ $name ; 值: 公司::公司名称 ]

  设置变量 [ $count ; 值: 计数 ( 公司 | 联系人::记录 ID ) ]

  设置变量 [ $message ; 值:

  "您确定要删除公司记录 " &

  引用 ( $name ) &

  " 吗？有 " & $count & " 条联系人记录与之关联！" ]

  显示自定义对话框 [ "确认删除公司" ; $message ]

  设置变量 [ $button ; 值: Get ( LastMessageChoice ) ]

  如果 [ $button = 2 ]

  删除记录/请求 [ 带对话框: 关 ]

  结束如果

  ```


  提示


  由于 *Let* 和 *While* 函数也可以设置局部或全局变量，你可以使用任何包含公式组件的脚本步骤来设置变量。


  ### 创建导航脚本


  脚本可以通过导航到不同的布局、记录或相关记录来更改窗口的上下文。




  #### 转到布局


  `Go to Layout`脚本步骤，如图 25-2 所示，将切换当前窗口中显示的布局。该步骤有两个活动区域。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig2_HTML.jpg](img/429700_2_En_25_Fig2_HTML.jpg)


  图 25-2


  `Go to Layout`的配置选项


  未标记的`layout specifier`会打开一个菜单，提供选择如何标识目标布局的选项。默认选项是`Original layout`，它指示脚本导航回脚本开始运行时的布局。这在脚本可以从数据库中的多个位置触发时节省开发时间，并自动跟踪和恢复用户的起始布局。选择`Layout`选项可打开`Specify
  Layout`对话框，并选择对特定目标布局的引用。`Layout Name by calculation`和`Layout Number by calculation`选项会打开`Specify
  Calculation`对话框，允许通过公式确定目标布局的名称或编号。


  步骤中的`Animation`区域用于在`FileMaker Go`中指定布局切换的动画效果。在其他平台上运行脚本时，此设置将被忽略。


  #### 转到记录/请求/页面


  `Go to Record/Request/Page`步骤，如图 25-3 所示，用于根据模式在窗口内容中进行导航。它会根据模式导航到指定的项目：记录（浏览模式）、查找请求（查找模式）或页面（预览模式）。根据第一个设置中选择的选项，该步骤有一个或两个活动区域。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig3_HTML.jpg](img/429700_2_En_25_Fig3_HTML.jpg)


  图 25-3


  `Go to Record/Request/Page`的配置选项


  未标记的`target specifier`会打开一个位置目标选项菜单。这些选项允许步骤跳转到`First`或`Last`项目，或移动到`Previous`或`Next`项目。底部的`By
  Calculation`选项允许通过公式确定一个数字，指示目标记录、请求或页面。当目标是`Previous`或`Next`时，会出现一个额外的`Exit after
  last`选项，可以切换为`On`或`Off`。当开启时，步骤在到达第一个参数指示方向上的最后一条可用记录后，会自动退出`Loop`语句。当开启时，`Previous`会在到达第一条记录/请求/页面后退出，而`Next`会在到达最后一条后退出。


  #### 转到相关记录


  `Go to Related Record`步骤作为一个单一步骤执行多项功能。它会查找并导航到另一布局上的一组相关记录，并可以选择在新窗口中打开结果。为了说明，想象一个用户正在查看一个`Contact`记录，并希望在一个新窗口中查看该联系人关联的父级`Company`记录。无需手动创建新窗口、更改布局和执行查找，按钮或脚本可以使用`Go
  to Related Record`步骤通过一次单击快速完成该任务。在这个例子中，`Contact`是起始的`source table`，而`Company`是目标的`target
  table`，它们各自位于表实例之间关系的一侧（第 9 章）。用于在联系人布局上`display`相关公司名称的同一关系将被此步骤用作我们`navigate`的通道。通过“穿过”该关系，用于形成关系的匹配字段就像显示在目标表中的记录的搜索条件。


  一旦将步骤添加到脚本或分配给按钮，双击它，或单击齿轮图标以打开`Go to Related Record Options`对话框，如图 25-4 所示。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig4_HTML.jpg](img/429700_2_En_25_Fig4_HTML.jpg)


  图 25-4


  用于配置`Go to Related Record Options`的对话框


  `Get related record from`弹出菜单列出了当前数据库文件的关系图中定义的每个表实例。选择与起始布局的表相关的任何实例。在我们的示例中，我们将从`Contact`表的布局开始。要到达`Company`表的布局，我们必须选择一个也同时与`Contact`表相关的`Company`表实例。因此，我们选择`Contact
  | Company`关系，以使用该关系的条件从`Contact`记录导航到其相关的`Company`。


  `Show record using layout`选项指定了用于显示相关记录的目标布局。此设置打开一个菜单，提供与`Go to Layout`步骤类似的四个选项。`Current
  Layout`选项将用户留在当前布局上。这对于定位自联接关系非常有用，其中目标记录与源记录在同一表中。`Layout`选项打开`Specify Layout`对话框，用于选择对特定布局的引用。`Layout
  Name by calculation`和`Layout Number by calculation`选项打开`Specify Calculation`对话框，允许通过公式确定目标布局的编号或名称。`Specify
  Layout`对话框仅显示当前数据库文件中目标表的布局。如果目标表来自外部数据源，请选中`Use external table''s layouts`复选框，以改为显示该外部文件中表的布局列表。


  `Show in new window`复选框及相邻的`Specify`按钮允许在新窗口中显示结果，而不是起始窗口。这些设置与本章后面描述的`New Window`脚本步骤相同。


  `Show only related records`选项控制目标布局/窗口中显示的找到集中包含哪些记录。当`disabled`时，该步骤将尝试保留目标表中已存在的找到集。如果相关记录存在于该集中，它将保留该集并将用户置于该记录上。如果不存在，该步骤将查找所有记录并将用户带到目标记录。当`enabled`时，将在目标表中建立不同的找到集，具体取决于选中的单选按钮选项。`Match
  current record only`选择将导致目标找到集仅包含与`starting record`相关条件匹配的记录。这类似于`one-to-one`或`one-to-many`搜索，其中使用当前起始记录查找目标表中的匹配记录。`Match
  all records in the current found set`选项将导致找到集包含目标表中与起始找到集中`any`记录匹配的每条记录。这相当于`many-to-many`搜索，其中使用当前找到集查找目标表中的匹配记录。


  当此步骤因点击门户中的按钮而执行时，设置控制目标找到集，但用户点击的记录决定了该集中哪一条将成为当前活动记录。


  ## 与字段交互


  有几个步骤允许与字段进行各种交互。这些包括将焦点移入字段、更改字段内容以及重置字段定义的序列化设置。




  ### 转到字段


  三个脚本步骤允许将焦点导航到当前布局上的某个字段：`Go to Next Field`、`Go to Previous Field` 和 `Go to Field`。前两个步骤没有参数选项；它们会基于字段的
  Tab 顺序，简单地将活动焦点移到当前布局上的*下一个*或*上一个*字段（第 21 章）。如果当前记录未打开且没有字段拥有焦点，这些步骤将打开该记录，并分别将焦点放在
  Tab 顺序的第一个或最后一个字段上。`Go to Field` 步骤（如图 25-5 所示）将焦点移动到一个特定的字段。在将其插入脚本后，双击该步骤的任意位置以打开一个`Specify
  Field`对话框，并选择一个目标字段。齿轮图标会打开一个包含两个选项的面板。启用`Select/perform`复选框，以在进入该字段时自动选择字段内容，并/或打开界面元素（如下拉列表或日历）。`Go
  to target field`是另一种指定目标字段的方式。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig5_HTML.jpg](img/429700_2_En_25_Fig5_HTML.jpg)


  **图 25-5** 用于将焦点移动到特定字段的步骤


  > **注意**：所选字段必须存在于当前布局上，并且用户必须拥有进入该字段的权限。如果在脚本中未选择目标字段或该字段无法访问，则此步骤将退出所有字段并提交记录。


  ### 设置字段


  `Set Field` 步骤会用一个新值替换当前记录中指定字段的当前值。点击齿轮图标以打开配置面板（如图 25-6 所示）。`Specify target field`选项会打开一个`Specify
  Field`对话框，并允许选择目标字段引用。所选字段不必存在于布局上。如果未指定字段，则此步骤会向布局上拥有活动焦点的字段插入一个值。点击`Specify`按钮来定义一个`Calculated
  result`，该结果提供将被放入字段的值。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig6_HTML.jpg](img/429700_2_En_25_Fig6_HTML.jpg)


  **图 25-6** 设置字段值的选项


  ### 按名称设置字段


  `Set Field by Name` 步骤会更改窗口中显示的当前记录中*按名称*指定的字段的值。与`Set Field`步骤必须使用选定的*动态字段引用*作为目标不同，此步骤使用一个公式来建立一个*基于文本的字段引用*，该引用可以根据需要变化（第
  12 章“字段引用”）。这些选项看起来完全相同，但当你点击指定目标字段时，会打开一个`Specify Calculation`对话框，并需要一个能得出目标字段名称的公式。结果必须包含一个表出现名称以提供定位字段所需的上下文。此示例针对当前`Contact`记录的`Contact
  Address State`字段。


  ```

  Set Field By Name [ "Contact::Contact Address State" ; "NY" ]

  ```


  由于字段引用是基于文本并通过公式创建的，它可以根据条件变化进行构建。此示例动态地为当前布局的表构建一个标准`Record Notes`字段的引用，这将在*任何*布局中有效，只要该布局分配的表包含该名称的字段。


  ```

  Set Field By Name [ Get ( LayoutTableName ) & "::Record Notes" ; "Hello World" ]

  ```


  ### 设置选定范围


  `Set Selection` 步骤（如图 25-7 所示）会在当前布局上可见的字段中选择一段文本。除非指定了另一个目标字段，否则该步骤将以拥有活动焦点的字段为目标。点击`Specify
  selection`以打开一个`Set Selection`对话框，并为`Start Position`和`End Position`输入两个数值。这些值可以是静态数字，也可以是动态计算表达式，用于分析字段内容并根据自定义条件进行选择。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig7_HTML.jpg](img/429700_2_En_25_Fig7_HTML.jpg)


  **图 25-7** 在字段内选择文本的选项


  > **提示**：要选择当前字段的*全部*内容，请改用`Select All`步骤。


  ### 设置下一个序列值


  `Set Next Serial Value` 步骤会更新字段自动输入定义中的下一个序列号值（第 8 章）。由于自动输入设置在每次创建新记录时会自动递增`Next
  Value`设置，因此此步骤不常使用。然而，当作为数据迁移的一部分导入记录，或为上线使用重置数据库的新测试副本时，序列号字段可能需要更新，以确保分配的下一个值是唯一的，且比迄今为止分配的最高值大
  1。如果字段设置与记录数据不同步，可能会导致重复的序列号。在迁移包含数十个表的大型解决方案时，使用此脚本步骤来自动化此过程可以节省时间。更改是直接对字段定义进行的，因此指定的字段不必在当前布局上可见。事实上，当需要将其重置为静态数字而无需查看现有记录时，可以从*任意上下文*中对任意表运行此步骤。


  配置选项与其他更改字段值的步骤类似。点击齿轮图标打开面板，然后选择一个目标字段并输入一个公式作为结果，该结果将成为新记录的下一个序列号。当迁移脚本将记录导入表后，添加这些步骤以确保主键的下一个序列号比当前最高值大
  1。


  ```

  Show All Records

  Unsort Records

  Go to Record [ Last ]

  Set Next Serial Value [ Record ID ; Contact::Record ID + 1 ]

  ```


  前面的示例执行`Show All Records`以确保我们不会错过最高值。接下来，它运行`Unsort Records`步骤，假定当按输入顺序排序时，主键是递增的。如果未排序列表中最后一条记录并不总是最高值，请考虑改用`Sort
  Records`步骤按序列字段对记录进行排序。`Go to Record`步骤跳转到最后一条记录，该记录现在应具有最高值。最后，`Set Next Serial
  Value`以当前记录的`Record ID`字段当前值加 1 作为目标，应用于`Record ID`字段。


  如果目标键字段是带有前导零的文本字段，加 1 会将结果转换为一个不带前导字符的数字。要在字段中保持一致的字符数，公式需要向结果添加计算出的数量的零。如果该字段使用前导零以保持六位数字，以下公式通过在递增的
  ID 左侧添加六个零，然后从右侧提取六位数字来确保得到合适的结果。


  ```

  Right ( "000000" & ( Contact::Record ID + 1 ) ; 6 )

  // result = 000015

  ```


  ### 访问文件夹和文件


  在最近的版本中，FileMaker 添加并改进了多种可以访问文件夹和文件的脚本步骤。



  ```markdown

  # 获取文件夹路径


  `获取文件夹路径`步骤（原名`获取目录`）会向用户显示一个`选择文件夹`对话框。这允许用户选择一个文件夹，然后供其他导入、导出和保存各种资源的步骤使用。该步骤包含多个可配置选项，如图
  25-8 所示。


  ![../images/429700_2_En_25_Chapter/429700_2_En_25_Fig8_HTML.jpg](img/429700_2_En_25_Fig8_HTML.jpg)


  **图 25-8** 选择目录的选项


  `允许创建文件夹`复选框可在`选择文件夹`对话框中启用`新建文件夹`按钮，使用户能够创建并选择新文件夹。`变量`按钮会打开一个受限的`设置变量选项`对话框，用于指定存储所选文件夹路径的变量名称。`对话框标题`和`默认位置`旁的按钮都会打开一个`指定计算`对话框，用于控制对话框的标题提示和默认起始文件夹路径。


  当脚本执行此步骤时，对话框会打开并等待用户输入。一旦用户选择了一个文件夹并点击关闭对话框，该文件夹的路径便会存入指定的变量中。该路径可能需要转换为 FileMaker
  格式（第 24 章，“转换路径”），或添加前缀，以便与其他脚本步骤配合使用。


  以下示例使用`设置错误捕获`来抑制用户点击对话框中的`取消`时出现的警告对话框。默认路径设置为用户电脑的“文档”路径。在`获取文件夹路径`步骤之后，`If`语句会检查`LastError`。如果用户取消了对话框，`If`语句会使用`退出脚本`步骤来停止脚本。否则，脚本继续执行时，稍后便可使用`$pathToFolder`变量中用户选择的文件夹。


  ```

  设置错误捕获 [ 开启 ]

  设置变量 [ $pathToDefault ; 值: Get ( DocumentsPath ) ]

  获取文件夹路径 [ $pathToFolder ; $pathToDefault ]

  If [ Get ( LastError ) = 1 ]

  退出脚本 [ 文本结果: "用户已取消" ]

  End if

  ```


  **警告**: 对话框的外观取决于操作系统。例如，macOS 不显示`对话框标题`。


  ## 操作数据文件


  18 版本新增了一组可以操作数据文件的步骤。这些步骤可用于在用户电脑上*创建*、*关闭*、*删除*、*检测*、*打开*、*读取*、*重命名*和*写入*数据文件。


  ### 创建数据文件


  `创建数据文件`步骤会创建一个新的空文件，并自动替换指定 FileMaker 路径下任何同名的现有文件。它接受一个文件路径参数，并具有自动创建文件夹以确保完整路径存在的选项。创建后，脚本可以打开该文件并写入数据。


  ```

  设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

  创建数据文件 [ "$filePath" ; 创建文件夹: 关闭 ]

  ```


  ### 打开和关闭数据文件


  `打开数据文件`步骤会打开一个数据文件，并为其分配一个数字`文件 ID`，该 ID 将一直存在，直到文件被显式关闭。此数字充当文件的引用指针，其他数据文件步骤（例如`关闭数据文件`步骤）需要用它来代替路径。`关闭数据文件`步骤仅接受指向应关闭文件的`文件
  ID`。在以下示例中，脚本假设前一个示例中创建的文件路径位于名为`$filePath`的变量中。使用此路径，它打开文件，将 ID 放入名为`$fileID`的目标变量中，然后立即使用该
  ID 关闭文件。


  ```

  打开数据文件 [ "$filePath" ; 目标: $fileID ]

  关闭数据文件 [ 文件 ID: $fileID ]

  ```


  ### 读取数据文件


  `从数据文件读取`步骤会从一个已打开的数据文件中读取数据，并将内容放入一个`目标`变量或字段中。它接受四个参数。`文件 ID`需要一个数字文件引用，通常是`打开数据文件`步骤的目标结果。`目标`允许选择字段或输入变量，文件内容将放入其中。`读取为`内联菜单允许选择字符编码，`数量`选项允许通过公式确定要读取的字节数（留空则读取全部内容）。延续上一个示例，此脚本在打开和关闭文件之间添加了一个步骤，它将内容读取为
  UTF-8 编码，并放入名为`$fileContents`的变量中。最后，`显示自定义对话框`会显示该文本。


  ```

  打开数据文件 [ "$filePath" ; 目标: $fileID ]

  从数据文件读取 [ 文件 ID: $fileID ; 目标: $fileContents ; 读取为: UTF-8 ]

  关闭数据文件 [ 文件 ID: $fileID ]

  显示自定义对话框 [ $fileContents ]

  ```


  ### 确认数据文件是否存在


  当引用的文件不存在时，如果脚本尝试打开它，将会产生错误。为避免这种情况，可以使用`获取文件是否存在`步骤先确认文件是否存在，并在未找到时采取替代操作。该步骤接受一个`源文件`路径，并将一个真
  (1) 或假 (0) 值放入`目标`字段或变量。此示例将检查文件是否存在，如果不存在，则显示对话框并退出脚本。


  ```

  设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

  获取文件是否存在 [ "$filePath" ; 目标: $fileExists ]

  If [ $fileExists = 0 ]

  显示自定义对话框 [ "无法找到 Hello.txt 文件！" ]

  退出脚本

  End If

  ```


  ### 写入数据文件


  `写入数据文件`步骤会将数据写入一个已打开的数据文件。它需要的参数与读取步骤类似，但将目标的标签反转为`数据源`，字符编码标签改为`写入为`。还有一个可选的`追加换行符`复选框，用于在写入数据后添加一个换行符。此示例将用“Hello,
  World.”替换之前文件中的数据。


  ```

  设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

  设置变量 [ $fileContents ; 值: "Hello, World" ]

  打开数据文件 [ "$filePath" ; 目标: $fileID ]

  写入数据文件 [ 文件 ID: $fileID ; 数据源: $fileContents ; 写入为: UTF-8 ]

  关闭数据文件 [ 文件 ID: $fileID ]

  ```


  要从现有数据的末尾开始写入，请使用`获取文件大小`和`设置数据文件位置`步骤来确定文件中的字节数，并从该位置之后开始写入。第一个步骤接受文件路径而不是文件 ID，因此文件不必为执行该步骤而打开。


  ```

  设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

  设置变量 [ $fileContents ; 值: "Hello, World" ]

  获取文件大小 [ "$filePath" ; 目标: $fileSize ]

  打开数据文件 [ "$filePath" ; 目标: $fileID ]

  设置数据文件位置 [ 文件 ID: $fileID ; 新位置: $fileSize ]

  写入数据文件 [ 文件 ID: $fileID ; 数据源: $fileContents ; 写入为: UTF-8 ]

  关闭数据文件 [ 文件 ID: $fileID ]

  ```


  或者，在写入之前读取文件，写入操作将自动在已有所有数据之后开始。


  ```

  设置变量 [ $filePath ; 值: "file:/Macintosh HD/Users/mmunro/Desktop/Hello.txt" ]

  设置变量 [ $fileContents ; 值: "Hello, World" ]

  打开数据文件 [ "$filePath" ; 目标: $fileID ]

  从数据文件读取 [ 文件 ID: $fileID ; 目标: $fileContents ; 读取为: UTF-8 ]

  写入数据文件 [ 文件 ID: $fileID ; 数据源: $fileContents ; 写入为: UTF-8 ]

  关闭数据文件 [ 文件 ID: $fileID ]

  ```



  # 操作记录


  众多脚本步骤都会与记录进行交互。`新建记录/请求`步骤会在当前窗口中创建一条新记录，而`复制记录/请求`步骤则会复制当前记录。这两个步骤没有可配置的选项。`删除记录/请求`步骤会在显示一个可选的确认对话框后，自动删除前端窗口中的当前记录。类似地，`删除全部记录`步骤会在显示一个可选的对话框后，删除找到集中的所有记录。还有一些步骤可以执行用户通过`记录`菜单和工具栏选项在界面中执行的许多记录操作。脚本可以打开、提交、复制和恢复记录。存在`将记录另存为
  Excel`、`将记录另存为 PDF` 和`将记录另存为快照链接`等步骤。`清空表`步骤会删除指定表中的所有记录，无论当前找到集或当前布局上下文如何。此外，还有两个步骤用于将记录移入或移出表：`导入记录`和`导出记录`。


  ### 导入记录


  `导入记录`步骤，如图 25-9 所示，用于将记录导入到表中，根据配置设置，可以带有人机交互或无人工干预。


