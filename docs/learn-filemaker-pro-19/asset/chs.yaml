  \n### 注意事项\n\n这是一个*计算函数*，不应与同名的脚本步骤混淆！\n\n### 理解 ExecuteSQL 的局限\n\n*ExecuteSQL*\
  \ 函数有一些需要注意的重要限制。经验丰富的 SQL 程序员可能会期望某些功能不被支持，而经验丰富的 FileMaker 开发者可能会错误地假设某些功能。\n\n\
  *   如引言所述，该函数目前仅限于 `SELECT` 命令。它*不支持*任何其他常见的 SQL 函数，例如执行记录更改或修改模式的 `DELETE`、`INSERT`、`UPDATE`、`INSERT\
  \ INTO`、`CREATE TABLE`、`DELETE TABLE` 等。\n*   函数不识别也不要求使用 FileMaker 的关系连接。`SELECT`\
