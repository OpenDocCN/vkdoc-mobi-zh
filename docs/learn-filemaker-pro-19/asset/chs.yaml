  `Layout Setup`对话框中的`Printing`选项卡（如图 18-19 所示）控制打印布局时的列和页边距。不要与通过`File`菜单中的`Page
  Setup`和`Print`选项访问的打印和纸张大小设置混淆，此处设置侧重于布局的间距和列，控制可用于放置对象的可打印区域。


