  #### 对话框 8：创建脚本


  第八个也是最后一个对话框提供了为新报表布局自动创建脚本的选项。如果没有脚本，用户需要*手动*执行查找、导航到报表布局、排序记录以及打印或预览报表。可以手动创建脚本来执行这些步骤（第
  24 章–28 章）。这最后一个对话框，如图 18-15 所示，提供了自动起步的便利。


  ![../images/429700_2_En_18_Chapter/429700_2_En_18_Fig15_HTML.jpg](img/429700_2_En_18_Fig15_HTML.jpg)


