    \n## 基于向量的演员的 UIView: VectorActorView\n\n类`VectorActorView`是`UIView`的子类，用于在场景中表示演员，这与我们使用`UIImageView`实例表示基于图像的`Actor`的方式非常相似。让我们看一下类`VectorActorView`，从头部开始，看看它如何协同工作。请参见\
