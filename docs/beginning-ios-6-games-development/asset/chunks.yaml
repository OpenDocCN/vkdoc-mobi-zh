    `drawRect:` of class `HealthBarView`. In this task, we draw two rectangles. The
    first rectangle is filled and the second is just an outline. Besides just drawing
    the rectangles, we want to adjust the color of the rectangles to reflect how damaged
    the ship is. To figure out which color we should use as our `baseColor`, we iterate
    through the `NSArray percents` until the percent we are going to draw is higher
    than the percent at index.    Once we have our base color, we create two modified
    colors from it. The first is the color `frameColor` used for the outline of the
    health bar; it has an alpha of 0.8\. The second color is `healthColor` and will
    be used to draw the interior of the health bar; it has an alpha of 0.5.    To
    draw the rectangles, we first define them by calling `CGRectMake`. Once the `CGRect`
    is created, we call `CGContextStrokeRect` and `CGContextFillRect`, respectively.    We
    have looked at the class `BeltCommanderController` and know it works. In the next
    section, we will consider the four main actors and understand how they have the
    features that they do.    Implementing the Actors    We have reviewed how the
    class `BeltCommanderController` handles the big picture. It controls how and when
    `Actors` are created, and it manages the interactions between them. However, a
    lot of the functionality of the game is implemented in the classes that make up
    the different `Actors`. In this section, we will take each of the four main `Actors`
    and understand what the key customizations are to make them work the way we want.
    In several earlier chapters, we have implemented Actors of different types. In
    that light, we are only going to look at the bits of code that make each interesting
    feature of the Actor work. If you would like a refresher on how to implement Actors,
    check out [Chapters 6](#9781430244226_Ch06.xhtml) and [7](#9781430244226_Ch07.xhtml).
    Also, you can always look at the full source code. Let’s start with the class
    `Viper`.    The Viper Actor    The `Viper` class represents the spaceship at the
    left side of the screen. This is the `Actor` that the user controls to achieve
    a high score. The `Viper` fires `Bullets` continuously to the right. To move the
    `Viper`, the user taps the screen, indicating a point above or below the `Viper`
    where it should travel. When traveling, the graphic changes to show thrusters
    on the top or bottom of the craft. Also, a `Viper` can intercept a `Powerup` that
    improves its guns. Lastly, the `Viper` has a fixed amount of health that slowly
    regenerates. In summary, the key features of the `Viper` are as follows:    *   Moves
    to a point specified by user. *   Thrusters fire when ship moves. *   Fires bullets
    continuously. *   Improves quality of bullets when “powered up.” *   Has a health
    value that regenerates.    Let’s take a look at the source code and see how we
    implement these features, starting with the header file for context, as shown
    in [Listing 12-18](#9781430244226_Ch12.xhtml#list18).    **[Listing 12-18](#9781430244226_Ch12.xhtml#_list18).** `Viper.'
  trans: "\n# 排版后内容\n\n如果`source`是`Saucer`，那么`Bullet`原本是针对`Viper`的，不能伤害`Saucer`。如果`Bullet`与`Viper`重叠，则减少`Viper`的生命值，添加`Shield`，并将`Bullet`从游戏中移除。如果`Bullet`不是由`Saucer`发射的，那它一定来自`Viper`。因此我们检查`Bullet`是否与任何`Saucer`重叠。如果重叠，则减少`Saucer`的生命值，为`Saucer`添加`Shield`，并移除`Bullet`。\n\
    \n在`doCollisionDetection`中，最后一个需要考虑的关系是`Powerups`与`Viper`之间的关系。我们遍历游戏中所有的`Powerups`，检查它们是否与`Viper`重叠。如果重叠，则在`Powerup`上调用`doHitOn:in:`来应用奖励。`doHit:in:`的实现将在详细讨论`Powerup`类时介绍。\n\
    \n现在我们已经了解了所有不同 Actor 之间的交互。在详细研究每个不同的 Actor 类之前，让我们先看看如何更新屏幕上的分数和生命值条。\n\n##\
    \ 更新 HUD\n\n在游戏的每一步中，分数或生命值条都可能发生变化。这两个组件统称为平视显示器（HUD）。回顾清单 12-7，我们看到这两个组件通过`IBOutlet`连接到`BeltCommanderController`。我们看到`scoreLabel`是一个简单的`UILabel`，但`HealthBarView`类并不熟悉。我们稍后将讨论`HealthBarView`类；首先，让我们看看在`doUpdateHUD`任务中更新这些组件的代码，如清单\
    \ 12-16 所示。\n\n**清单 12-16.** `BeltCommanderController.m`（`doUpdateHUD`）\n\n```\n\
    -(void)doUpdateHUD{\n    if ([self stepNumber] == [self scoreChangedOnStep]){\n\
    \        [scoreLabel setText: [[NSNumber numberWithLong:[self score]] stringValue]\
    \ ];\n    }\n    [healthBarView setHealth:[viper health]/[viper maxHealth]];\n\
    }\n```\n\n在清单 12-16 中，我们看到任务`doUpdateHUD`在游戏的每一步中被调用。在这个任务中，我们检查当前的`stepNumber`是否等于属性`scoreChangedOnStep`。属性`scoreChangedOnStep`是上次更新分数时的`stepNumber`值。因此，如果`stepNumber`等于`scoreChangedOnStep`，我们就知道分数在这一步被修改了，因此需要更新`scoreLabel`。要更新`scoreLabel`，我们只需调用`setText:`并传入分数的`NSString`版本。\n\
