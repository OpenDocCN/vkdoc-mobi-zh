    dimension to describe the size of an actor. If you build your own game framework,
    you may choose to have your actors include a width and height—it really depends
    on the game. Certainly if you look at prebuilt game engines you will find that
    their base type has all sorts of features you may or may not use. It may make
    a lot of sense to use a game engine, but here we are trading complexity for understanding.    A
    Simple Actor    [Listing 5-7](#9781430244226_Ch05.xhtml#list7) shows that the
