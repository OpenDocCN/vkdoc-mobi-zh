    \    [saucer setCurrentHealth:100];\n    HealthBar* healthBar = [HealthBar healthBar:saucer];\n\
    \    [healthBar setPercent:1];\n    [saucer setHealthBar:healthBar];\n    [controller\
    \ addActor:healthBar];\n    return saucer;\n}\n```\n\n在[Listing 7-3](#9781430244226_Ch07.xhtml#list3)中，我们首先找到游戏区域的中心，并将该值存储在`CGPoint\
    \ gameCenter`中。接下来，我们创建一个名为`rep`的`ImageRepresentation`。我们指示`rep`应该以每帧动画3步的速度，一半时间向后旋转`Saucer`。`CGRect\
    \ gameCenter`和`ImageRepresentation rep`被传递给超类初始化器`initAt:WithRadius:AndRepresenation:`，以创建一个半径为32的`Saucer`对象。然后将对象`saucer`设置为`ImageRepresenation`的委托，以便我们可以通过类`Saucer`指定表示细节。这与[第6章](#9781430244226_Ch06.xhtml)中的角色工作原理完全相同。请查看源代码以了解这些任务是如何实现的。\n\
    \n一旦创建了`saucer`对象，我们就想用一些细节来初始化它。我们通过调用`saucer`上的`setVariant:`来设置我们要使用的三个变体之一。我们还将最大生命值和当前生命值属性设置为100。接下来，让我们转到`HealthBar`类。\n\
    \n### 实例化HealthBar类\n\n为了在飞碟下方渲染生命条，我们创建一个`HealthBar`对象，并传入它要跟随的对象，即角色`saucer`。我们还将`saucer`的`healthBar`属性设置为新创建的`healthBar`，以便`saucer`对象在受到伤害时可以更新`healthBar`显示的百分比。最后，`healthBar`被添加到场景中。让我们看一下`HealthBar`的构造函数，了解它是如何设置和表现其行为的。参见[Listing\
