    # 排版后的内容


    顾名思义，它模拟了二维物体的相互作用，这显然并非对现实的精确呈现。然而，`Box2D` 确实提供了足够逼真的效果，足以欺骗我们的大脑，让我们相信游戏中的物体是以真实的方式运动的。


    在本章中，你将学习如何向游戏项目中添加 `Box2D`，并理解如何将其功能集成到现有框架中。本章的代码来自 `Sample 13` 项目。


    我想提一下，`Box2D` 并非唯一适用于 iOS 开发的物理引擎。另一个非常流行的物理库是 `Chipmunk Physics`。`Chipmunk Physics`
    团队推荐其专业版（付费）用于 iOS 开发。这个专业版为其基于 C 的库提供了 `Objective C` 封装，这听起来非常方便。我对 `Box2D` 和
    `Chipmunk Physics` 的使用都不够深入，无法给出推荐建议。不过，我建议在开始开发复杂的物理游戏之前，先对这两个库进行评估。还有许多其他开源项目也可能成为开发物理游戏的良好起点。


    让我们先看一下 `Sample 13`，了解我们在这里要构建什么。


    ## 基于物理的示例概述


    在本章中，我们将修改现有的游戏框架，创建一个使用物理模拟小行星运动的示例应用程序。图 13-1 展示了该示例的运行情况。


    ![9781430244226_Fig13-01.jpg](img/9781430244226_Fig13-01.jpg)


    图 13-1. 由物理描述的小行星运动


    在图 13-1 中，我们看到许多小行星出现在熟悉的星空背景中。每颗小行星都随机方向运动，当它们移出屏幕时，会从另一侧重新出现。当小行星碰撞时，它们会像台球一样相互弹开。较小的小行星被定义为质量较低；因此，它们往往会被较大的小行星弹开，而较大的小行星则倾向于碾过较小的。


    在前面的章节中，游戏中的每个演员都在游戏场景内记录其状态，然后由 `GameController` 负责根据每个演员的状态来确定其在屏幕上绘制的位置。在本章中，我们仍然遵循相同的模式，但使用
    `Box2D` 来告诉我们每个演员在场景中的位置。在了解如何实现之前，我们先来概述一下 `Box2D` 并理解其原理；这将使代码的解释更加清晰。


    ## Box2D 概述


    `Box2D` 是一个用于游戏的 2D 物理引擎。它是一个用 C++ 编写的库，因此可在广泛的平台上使用，并采用宽松的 zlib 开源许可。除了 `Box2D`
    的主要 C++ 版本外，还有大量移植到其他平台的版本，包括 Java、C#、JavaScript 等。该项目的主要开发者和推动者是 Erin Catto，可以通过
    `Box2D` 网站上的论坛联系他：`http://www.box2d.org.`


    **注意** 有关 zlib 许可的信息可以在这里找到：`http://en.wikipedia.org/wiki/Zlib_License`


    如前所述，`Box2D` 是用 C++ 而非 Objective C 编写的。对于一个刚掌握 Objective C 的 iOS 新手开发者来说，这可能会有点令人望而却步。此外，要让你的
    Xcode 项目顺畅地结合 Objective C 和 C++ 代码，还需要克服一些障碍。我们稍后会简要介绍如何设置；不过，现在先忽略这个障碍，花些时间看看
    `Box2D` 究竟是做什么的。


    ### 世界


    所有 `Box2D` 应用的起点是理解 `Box2D` 模拟世界中的物体和关节的运动。物体就是你想象中的那些东西——方块、球体和其他游戏元素。


    关节是对世界中物体施加的约束，包括滑轮和跷跷板之类的东西。我们不会在示例中使用关节。这些物体和关节都存在于一个描述它们如何相互作用的*世界*中。这类似于本书其他章节中我们在
    `GameController` 中拥有演员的方式。


    除了作为物体和关节的集合，世界还描述了模拟中的重力大小。重力可以设置为任意值，并指向任意方向。由于我们的示例发生在太空中，重力将设置为零。


    **注意** 世界中的单位假定为米-千克-秒（MKS）。因为你可能不希望一个像素代表一米，所以你需要将 `Box2D` 坐标缩放到你的显示坐标系。


    世界还负责推进模拟，类似于 `GameController` 推进每个演员的位置和呈现。两者存在一些差异；例如，`Box2D` 世界会将模拟推进到未来若干秒（实际上是几分之一秒），而
    `GameController` 只是将帧计数增加 1。这是一个细微的区别，但意味着你可以调整场景中经过的模拟时间量。让我们看一个例子来理解这为什么有用。假设你正在构建一个以每秒
    60 帧运行的游戏。如果你使用 `GameController` 类，并将帧率调整为每秒 30 帧，游戏在设备上将会显得慢动作（半速）。如果你使用 `Box2D`
    世界，并将帧率从每秒 60 帧降到 30 帧，你可以将每帧经过的模拟时间加倍；这会使游戏看起来以全速运行——只是动画的精细度降低了。


    然而，这种优势是有代价的。使用 `GameController`（以及其他以相同方式工作的引擎），每个演员都知道自上次更新以来经过了一帧。这使得游戏逻辑的某些方面非常简单；如果某个粒子应在屏幕上存在
    15 帧，你只需计数并将粒子移除即可。在 `Box2D` 世界中，如果你想能够改变给定帧的时间量，你必须以模拟秒为单位指定粒子的生命周期。此外，为了知道何时移除粒子，你必须计算自上次检查以来经过了多少时间。这看起来不是什么大问题；你只需做一点减法即可。然而，如果粒子生命周期的持续时间不能被每帧之间的持续时间整除，你的粒子可能会比你预期存在得更久，并可能导致一些难以调试的意外交互。


    讨论了这么多关于 `GameController` 和 `Box2D` 世界在场景中推进演员的方式差异，你可能会认为让这两个类协同工作会很棘手。其实不然。在本例中，我们打算忽略这个问题，并不利用
    `Box2D` 的这一特性。我指出这个区别，是为了让那些打算开发复杂物理游戏的读者能够在早期设计时考虑到这一点。


    ### 物体


    一旦世界被创建，我们想要在里面放入一些东西——这些东西被称为物体。一个物体代表世界中一个对象的位置、角度、速度和其他物理属性。'
- fmt: 'Here is the full list of attributes:


    - **Type** – Either static, kinematic, or dynamic

    - **Position** – A point in world coordinates

    - **Angle** – The rotate of the body

    - **Linear Velocity** – A vector describing the current velocity of a body

    - **Angular Velocity** – A vector describing the rotational velocity of a body

    - **Linear Damping** – How much the linear velocity is reduced over time

    - **Angular Damping** – How much the angular velocity is reduced over time

    - **Allow Sleep** – A flag indicating that the world can use an optimization that
    ignores this body when appropriate

    - **Awake** – A flag indicating that the body is currently being used in the simulation
    (not asleep)

    - **Fixed Rotation** – A flag that prevents the body from rotating

    - **Bullet** – A flag indicating the simulation should pay special attention to
    this fast-moving body to prevent “tunneling”

    - **Active** – A flag indicating that the body is participating in the simulation.
    If a body is not active, then it does not participate in the simulation until
    active is set to true by user code

    - **User Data** – A place to attach additional data to a body

    - **Gravity Scale** – The effect that gravity has on the object


    There are a few items in the above list that require a little more explanation.
    The type of a body dictates how it interacts with other bodies in the world. A
    static body will never move or rotate, but another body may hit or bounce off
    it. A kinematic body is similar to a static body but moves according to a velocity,
    like a moving platform in a game. A kinematic body will not collide with other
    static or kinematic bodies. A dynamic body moves according to the laws of physics;
    it collides with all other types of bodies. In a game, a dynamic body may be a
    block, ball, bird, pig, or what have you.


    The `Allow Sleep` and `Awake` properties are used by the simulation engine to
    make some optimizations. Since it is computationally expensive to simulate a body,
    it makes sense to skip bodies that are not moving. If `Allow Sleep` is set to
    `true`, the simulation will put a body to sleep (`Awake` = `false`) if it comes
    to rest, temporarily removing it from the simulation. If a body is hit by another
    body, it will be awakened and continue participating in the simulation. In general,
    you use these flags only when you want to mark a body as not being allowed to
    sleep. You may do this because the body is a particularly important part of the
    game. The property `Active` is similar to `Awake`, in that an inactive body is
    very much like a sleeping body—it does not participate in the simulation. However,
    an inactive body will never be activated by the simulation; you have to do that
    in your code.


    You will notice in the above list that there is no mention of shape, density,
    or other physical characteristics. These other attributes are covered by the concept
    of a fixture, as discussed in the next section.


    ## Fixtures


    A fixture attaches a shape to a body, as well as some additional physical properties.
    Those properties are:


    - **Shape** – The shape of the body

    - **User Data** – A place to attach game-specific data

    - **Friction** – The friction coefficient—how much the body is slowed when it
    slides on another body

    - **Restitution** – How bouncy an object is

    - **Density** – The density of the body, in k/m²

    - **Is Sensor** – A sensor that records that a body has touched other bodies but
    has not created a collision—a nonsolid body


    The shape of a fixture can be a convex polygon or a circle. There is also the
    option for the shape to be a chain or an edge (used with chains). We are only
    going to use circles in our example, but these other shapes could be used to make
    some interesting games. The friction, restitution (not in the legal sense), and
    density all describe additional physical characteristics of the body. Friction
    describes how a body slows down when sliding on another body.


    This is different from linear damping, which is more like air resistance. Restitution
    describes how a body comes to rest after colliding with another body; low restitution
    means that the body will not bounce much, while high restitution is very bouncy,
    like a super ball. Density is a calculation of the mass of a dynamic body based
    on the area of its shape. Notice that density is given in terms of m², because
    we are working in a 2D world.


    We have looked at the world, bodies, and fixtures. While Box2D offers a bit more,
    such as joints, chains, and a number of other features, we have enough background
    to explore the code that makes up our example. I leave it up to the interested
    reader to explore the Box2D documentation and examples in more detail. Covering
    a physics engine in full detail would require a whole book!


    ## Adding Box2D to an Xcode Project


    As mentioned, Box2D is written in C++; it is distributed as source code and not
    in any easy-to-use library. This was done to make it possible to integrate Box2D
    into any C-based project. However, this does leave us with a little work of actually
    getting it into our project and compiling it. Don’t feel compelled to follow along
    with all of the steps in this section; feel free to use the provided sample project
    as a starting place for your own project.


    The first step is to download the Box2D source code from: `http://code.google.com/p/box2d/downloads/list`.
    You want the file `Box2D_v2.2.1.zip`. Unzip it and you should see the files, as
    shown in [Figure 13-2](#9781430244226_Ch13.xhtml#Fig2).


    ![9781430244226_Fig13-02.jpg](images/9781430244226_Fig13-02.jpg)


    [Figure 13-2.](#9781430244226_Ch13.xhtml#_Fig2)  The downloaded and unzipped Box2D
    source code


    In [Figure 13-2](#9781430244226_Ch13.xhtml#Fig2), note the expanded directory
    Box2D at the top. This is the directory you want to add to your Xcode project.
    I did this by copying the `Box2D` directory into the project folder before using
    Xcode’s “Add Files to . . . ” feature. This makes sure the files that are added
    to the project stay in a folder called `Box2D`. This is not exactly required,
    but it simplifies importing and compiling the files down the road.


    Once the source code is added, make sure all of the `cpp` files are considered
    “Default – C++ Source,” as shown in [Figure 13-3](#9781430244226_Ch13.xhtml#Fig3).


    ![9781430244226_Fig13-03.jpg](images/9781430244226_Fig13-03.jpg)


    [Figure 13-3.](#9781430244226_Ch13.xhtml#_Fig3)  Details of a cpp file


    Also, make sure that all of the `cpp` files are included in your main build target,
    as shown by the check box at the bottom of [Figure 13-3](#9781430244226_Ch13.xhtml#Fig3).
    At this point, your project will not compile; you have to set your Header Search
    Paths to `../**`, as shown in [Figure 13-4](#9781430244226_Ch13.xhtml#Fig4).


    ![9781430244226_Fig13-04.jpg](images/9781430244226_Fig13-04.jpg)


    [Figure 13-4.](#9781430244226_Ch13.xhtml#_Fig4)  Correct Header Search Paths to
    Compile Box2D


    At this point, your project should compile. To use the Box2D classes, you import
    the classes like this:


    ```

    #import <Box2D/Box2D.h>

    ```


    However, you will probably be importing Box2D into an Objective C class, so you
    have to tell Xcode that it should expect mixed C++ and Objective C code. This
    is done by changing the type of the file to “Objective-C++ Source,” as shown in
    [Figure 13-5](#9781430244226_Ch13.xhtml#Fig5).


    ![9781430244226_Fig13-05.jpg](images/9781430244226_Fig13-05.jpg)


    [Figure 13-5.](#9781430244226_Ch13.xhtml#_Fig5)  Correct type for Objective C
    `.m` files that import Box2D


    Now, you can actually use the Box2D classes in your project. I must warn future
    readers, however, that this process was cobbled together from various Googled
    sources that describe this process for older versions of both Xcode and Box2D.
    I assure you this setup will change in future versions of Xcode.'
