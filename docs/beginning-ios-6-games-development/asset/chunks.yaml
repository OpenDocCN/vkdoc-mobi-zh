    # 关于作者


    ![image](img/9781430244226_unFM-01.jpg)


    **卢卡斯·L·乔丹** 是一位终身的计算机爱好者，作为一名开发者工作多年，专注于用户界面。他是《JavaFX 特效：通过动画、多媒体和游戏元素将 Java
    RIA 推向极致》一书的作者，也是《实用 Android 项目》的合著者，两本书均由 Apress 出版。卢卡斯对多种形式的移动应用开发充满兴趣。他最近辞去了日常工作，以
    ClayWare, LLC 的名义投身于应用开发事业。了解更多信息请访问 `http://claywaregames.com`。


    # 关于技术审校


    ![image](img/9781430244226_unFM-02.jpg)


    **托尼·希勒森** 是一位移动开发者，也是 Tack Mobile 公司的联合创始人。他毕业于大使大学，获得管理信息系统学士学位。他日常工作中可能会用到
    `Objective-C`、`Java`、`Ruby`、`Coffeescript`、`Javascript`、`HTML` 或 shell 脚本。托尼曾在
    RailsConf、AnDevCon、360|Flex 上发表演讲，并制作了广受欢迎的 O''Reilly Android 视频教程。


    在空闲时间，托尼喜欢弹奏贝斯和 Warr Guitar，并制作电子音乐。托尼与妻子洛瑞以及两个儿子泰特斯和林肯居住在科罗拉多州丹佛市郊。


    # 致谢


    一如既往，没有 Apress 公司的优秀同仁将一堆 Word 文档变成一本书，本书就不会存在。这太神奇了！特别感谢凯蒂·沙利文出色地确保我按计划推进。汤姆·威尔士帮助查明了那些棘手的内联代码格式问题。托尼·希勒森运行了代码并确保我没有胡编乱造。感谢各位。


    # 第 1 章：第一个简单游戏


    在本章中，你将学习许多关于 iOS 开发的知识。目标当然是能够构建一个在 iOS 上运行的游戏。为此，你必须了解一个完整游戏所包含的许多不同元素，例如基本
    UI 控件、音频、复杂触摸输入、游戏中心、应用内购买，当然还有图形。本书将探讨这些概念以及其他许多内容。你可以将其视为一份构建块指南，这些构建块是你制作一个引人入胜的、专为
    iOS 和 Apple 移动设备量身定制的游戏所必需的。所有 iOS 应用都有一个共同点——应用程序 `Xcode`，因此从它开始是合理的。


    在第一章中，我们将构建一个非常简单的石头-剪刀-布游戏。我们将使用 `Xcode` 的 Storyboard 功能来创建一个包含两个视图以及它们之间导航的应用。

    '
- fmt: '本书附带示例 Xcode 项目，所有代码示例均直接取自这些项目。这样，您便可以在 Xcode 中逐一跟进。我在创建本书项目时使用了 Xcode 4.5
    版本。本章附带的项目名为 `Sample 1`；您只需按照本章概述的步骤操作，即可轻松自行构建。


    该项目是一个非常简单的游戏，我们使用 Storyboard 创建了两个场景。第一个场景是起始视图，第二个场景是用户玩“石头、剪刀、布”游戏的地方。在第二个场景中，您将添加一个
    `UIView` 并指定其类为 `RockPaperScissorView`。类 `RockPaperScissorView` 的源代码可以在 `Sample
    1` 项目找到。


    我们将逐步介绍这些步骤，但首先让我们快速浏览一下我们的游戏，如 [图 1-1](#9781430244226_Ch01.xhtml#Fig1) 所示。


    ![9781430244226_Fig01-01.jpg](images/9781430244226_Fig01-01.jpg)


    [图 1-1.](#9781430244226_Ch01.xhtml#_Fig1)  我们的第一个游戏的两个视图：`Sample 1`


    在 [图 1-1](#9781430244226_Ch01.xhtml#Fig1) 的左侧，我们看到起始视图。它只有一个简单的标题和一个“Play”按钮。当用户点击“Play”按钮时，会转换到图右侧所示的第二个视图。在此视图中，用户可以玩“石头、剪刀、布”。如果用户希望返回起始视图（即主屏幕），可以按下“Back”按钮。这个简单的游戏由
    Xcode 中的 Storyboard 布局和一个实现游戏逻辑的自定义类组成。


    让我们来看看我如何创建这个游戏，以及一些自定义项目的方法。


    ## 在 Xcode 中创建项目：`Sample 1`


    创建这个游戏只需几个步骤，我们将通过它们来初步了解 Xcode。


    首先启动 Xcode。从“File”菜单中选择“New Project”。您将看到一个屏幕，显示可以用 Xcode 创建的项目类型（参见 [图 1-2](#9781430244226_Ch01.xhtml#Fig2)）。


    ![9781430244226_Fig01-02.jpg](images/9781430244226_Fig01-02.jpg)


    [图 1-2.](#9781430244226_Ch01.xhtml#_Fig2)  Xcode 中的项目模板


    对于此项目，选择模板“Single View Application”。点击“Next”，系统将提示您为项目命名，如 [图 1-3](#9781430244226_Ch01.xhtml#Fig3)
    所示。


    ![9781430244226_Fig01-03.jpg](images/9781430244226_Fig01-03.jpg)


    [图 1-3.](#9781430244226_Ch01.xhtml#_Fig3)  命名 Xcode 项目


    为您的项目起任何名字。您给项目起的名字将是包含它的根文件夹的名称。您还需要确保选中“Use Storyboard”和“Use Automatic Reference
    Counting”。


    这次我们将制作一个仅适用于 iPhone 的应用程序，但从“Device Family”下拉菜单中，您也可以选择“iPad”或“Universal”。点击“Next”后，系统会提示您选择一个位置来保存项目。项目可以保存在您电脑上的任何位置。


    在继续之前，让我们花点时间来了解一下 Xcode 项目的组织结构。


    ### 项目的文件结构


    保存新项目后，Xcode 会在您选择的文件夹中创建一个新的单一文件夹。这个单一文件夹将包含该项目。如果需要，您以后可以移动此文件夹，而不会影响项目。[图 1-4](#9781430244226_Ch01.xhtml#Fig4)
    显示了由 Xcode 创建的文件。


    ![9781430244226_Fig01-04.jpg](images/9781430244226_Fig01-04.jpg)


    [图 1-4.](#9781430244226_Ch01.xhtml#_Fig4)  Xcode 创建的文件


    在 [图 1-4](#9781430244226_Ch01.xhtml#Fig4) 中，我们看到一个 Finder 窗口，显示了创建的文件结构。我选择了将项目保存在桌面上，因此
    Xcode 创建了一个名为 `Sample 1` 的根文件夹，其中包含 `Sample 1.xcodeproj` 文件。`xcodeproj` 文件是向 Xcode
    描述项目的文件，所有资源默认都相对于该文件。保存项目后，Xcode 会自动打开您的新项目。然后，您可以根据需要开始自定义它。


    ### 自定义您的项目


    我们已经了解了如何创建项目。现在，在继续添加实现游戏逻辑的新 `UIView` 之前，您将学习一些使用 Xcode 自定义项目的知识。


    #### 排列 Xcode 视图以简化操作


    创建新项目后，您可以开始自定义它。此时，您的 Xcode 应该已经打开并显示了新项目。继续点击左侧的 `MainStoryboard.storyboard`
    文件，使您的项目看起来像 [图 1-5](#9781430244226_Ch01.xhtml#Fig5)。


    ![9781430244226_Fig01-05.jpg](images/9781430244226_Fig01-05.jpg)


    [图 1-5.](#9781430244226_Ch01.xhtml#_Fig5)  自定义前的 `MainStoryboard.storyboard`


    在 [图 1-5](#9781430244226_Ch01.xhtml#Fig5) 中，我们看到选中了 `MainStoryboard.storyboard`
    文件（项目 A）。该文件用于描述多个视图以及它们之间的导航关系。它显示选中的 storyboard 文件，并描述屏幕右侧的内容。在项目 B 中，我们看到一个名为“View
    Controller”的项目。这是项目 C 中描述的视图的控制器。项目 D 处的项目用于放大和缩小 storyboard 视图，对于成功导航至关重要。此外，项目
    E 中的按钮用于控制 Xcode 中哪些主面板可见。随意操作这些按钮。


    接下来，让我们看看如何添加一个新视图。


    #### 添加新视图


    当您有机会尝试 Xcode 中可用的不同视图设置后，就可以继续为项目添加新视图了。排列 Xcode，使最右侧的面板可见，如果需要，可以隐藏最左侧的面板。Xcode
    应该看起来像 [图 1-6](#9781430244226_Ch01.xhtml#Fig6)。


    ![9781430244226_Fig01-06.jpg](images/9781430244226_Fig01-06.jpg)


    [图 1-6.](#9781430244226_Ch01.xhtml#_Fig6)  包含第二个视图的 Storyboard


    在 [图 1-6](#9781430244226_Ch01.xhtml#Fig6) 中，我们看到已向 storyboard 添加了第二个视图。像任何优秀的
    Apple 桌面应用程序一样，大部分工作都是通过拖放完成的。要添加第二个视图，我们在右下角的文本字段（项目 A）中输入“UIView”。这会过滤列表，以便我们可以将标记为项目
    B 的图标拖到中央的工作区域。点击新视图以选中它（参见项目 C），我们可以看到它与项目 D 中选中的图标相对应。项目 E 显示选中项目的属性。


    现在我们的项目中有了一个新视图，我们想要设置一种在视图之间导航的方式。


    #### 简单导航


    我们现在想要创建一些按钮，使我们能够从一个视图导航到另一个视图。第一步是添加按钮，第二步是配置导航。[图 1-7](#9781430244226_Ch01.xhtml#Fig7)
    展示了这些视图正在连接导航。


    ![9781430244226_Fig01-07.jpg](images/9781430244226_Fig01-07.jpg)


    [图 1-7.](#9781430244226_Ch01.xhtml#_Fig7)  包含导航的 Storyboard'
  raw: 'Included with this book are sample Xcode projects; all of the code examples
    are taken directly from these projects. In this way, you can follow along with
    each one in Xcode. I used version 4.5 of Xcode when creating the projects for
    this book. The project that accompanies this chapter is called Sample 1; you can
    easily build it for yourself by following the steps outlined in this chapter.


    The project is a very simple game in which we use Storyboard to create two scenes.
    The first scene is the starting view, and the second scene is where the user can
    play the Rock, Paper, Scissors game. The second scene is where you will add a
    `UIView` and specify the class as `RockPaperScissorView`. The source code for
    the class `RockPaperScissorView` can be found in the project Sample 1.


    We will walk through each of these steps, but first let’s take a quick look at
    our game, shown in [Figure 1-1](#9781430244226_Ch01.xhtml#Fig1).


    ![9781430244226_Fig01-01.jpg](images/9781430244226_Fig01-01.jpg)


    [Figure 1-1.](#9781430244226_Ch01.xhtml#_Fig1)  The two views of our first game:
    Sample 1


    On the left of [Figure 1-1](#9781430244226_Ch01.xhtml#Fig1) we see the starting
    view. It just has a simple title and a Play button. When the user clicks the Play
    button, he is transitioned to the second view, shown on the right of the figure.
    In this view, the user can play Rock, Paper, Scissors. If the user wishes to return
    to the starting view, or home screen, he can press the Back button. This simple
    game is composed of a Storyboard layout in Xcode and a custom class that implements
    the game.


    Let’s take a look at how I created this game and at some ways you can customize
    a project.


    Creating a Project in Xcode: Sample 1


    Creating this game involves only a few steps, which we’ll walk through as an introduction
    to Xcode.


    Start by launching Xcode. From the File menu, select New Project. You will see
    a screen showing the types of projects you can create with Xcode (See [Figure
    1-2](#9781430244226_Ch01.xhtml#Fig2)).


    ![9781430244226_Fig01-02.jpg](images/9781430244226_Fig01-02.jpg)


    [Figure 1-2.](#9781430244226_Ch01.xhtml#_Fig2)  Project templates in Xcode


    For this project, select the template Single View Application. Click Next, and
    you will be prompted to name the project, as shown in [Figure 1-3](#9781430244226_Ch01.xhtml#Fig3).


    ![9781430244226_Fig01-03.jpg](images/9781430244226_Fig01-03.jpg)


    [Figure 1-3.](#9781430244226_Ch01.xhtml#_Fig3)  Naming an Xcode project


    Name your project whatever you want. The name you give your project will be the
    name of the root folder that contains it. You also want make sure Use Storyboard
    and Use Automatic Reference Counting are selected.


    This time we will be making an application just for the iPhone, but from the Device
    Family pull-down menu you could also select iPad or Universal. After you click
    Next, you will be prompted to pick a place to save your project. The project can
    be saved anywhere on your computer.


    Before moving on, let’s take a moment to understand a little about how an Xcode
    project is organized.


    A Project’s File Structure


    After saving a new project, Xcode will create a single new folder within the folder
    you select. This single folder will contain the project. You can move this folder
    later if you want without affecting the project. [Figure 1-4](#9781430244226_Ch01.xhtml#Fig4)
    shows the files created by Xcode.


    ![9781430244226_Fig01-04.jpg](images/9781430244226_Fig01-04.jpg)


    [Figure 1-4.](#9781430244226_Ch01.xhtml#_Fig4)  Files created by Xcode


    In [Figure 1-4](#9781430244226_Ch01.xhtml#Fig4), we see a Finder window showing
    the file structure created. I selected that I wanted the project saved on my desktop,
    so Xcode created a root folder name `Sample 1` that contains the `Sample 1.xcodeproj`
    file. The `xcodeproj` file is the file that describes the project to Xcode, and
    all resources are by default relative to that file. Once you have saved your project,
    Xcode will open your new project automatically. Then you can start customizing
    it as you like.


    Customizing Your Project


    We have looked at how to create a project. Now you are going to learn a little
    about working with Xcode to customize your project before moving on to adding
    a new UIView that implements the game.


    Arranging Xcode Views to Make Life Easier


    Once you have a new project created, you can start customizing it. You should
    have Xcode open with your new project at this point. Go ahead and click the `MainStoryboard.storyboard`
    file found on the left so your project looks like [Figure 1-5](#9781430244226_Ch01.xhtml#Fig5).


    ![9781430244226_Fig01-05.jpg](images/9781430244226_Fig01-05.jpg)


    [Figure 1-5.](#9781430244226_Ch01.xhtml#_Fig5)  MainStoryboard.storyboard before
    customization


    In [Figure 1-5](#9781430244226_Ch01.xhtml#Fig5), we see the file `MainStoryboard.storyboard`
    selected (item A). This file is used to describe multiple views and the navigation
    relationships between them. It shows the selected storyboard file and describes
    the content of the right side of the screen. In item B, we see an item called
    View Controller. This is the controller for the view described in item C. The
    items at D are used to zoom in and out of a storyboard view, and are critical
    to successfully navigating your way around. Additionally, the buttons in item
    E are used to control which of the main panels are visible in Xcode. Go ahead
    and play around with those buttons.


    Next, let’s look at how to add a new view.


    Adding a New View


    Once you have had a chance to play a little with the different view setups available
    in Xcode, you can move on and add a new view to your project. Arrange Xcode so
    the right-most panel is visible, and hide the left-most panel if you want. Xcode
    should look something like [Figure 1-6](#9781430244226_Ch01.xhtml#Fig6).


    ![9781430244226_Fig01-06.jpg](images/9781430244226_Fig01-06.jpg)


    [Figure 1-6.](#9781430244226_Ch01.xhtml#_Fig6)  Storyboard with second view


    In [Figure 1-6](#9781430244226_Ch01.xhtml#Fig6), we see that we have added a second
    view to the storyboard. Like any good Apple desktop application, most of the work
    is done by dragging and dropping. To add the second view, we enter the word “UIView”
    into the bottom-right text field, at item A. This filters the list so we can drag
    the icon labeled item B on the work area in the center. Click on the new view
    so it is selected (see item C), which we can see correlates to the selected icon
    in item D. Item E shows the properties for the selected item.


    Now that we have a new view in the project, we want to set up a way to navigate
    between our views.


    Simple Navigation


    We now want to create some buttons that enable us to navigate from one view to
    the other. The first step is to add the buttons, and the second is to configure
    the navigation. [Figure 1-7](#9781430244226_Ch01.xhtml#Fig7) shows these views
    being wired up for navigation.


    ![9781430244226_Fig01-07.jpg](images/9781430244226_Fig01-07.jpg)


    [Figure 1-7.](#9781430244226_Ch01.xhtml#_Fig7)  Storyboard with navigation'
