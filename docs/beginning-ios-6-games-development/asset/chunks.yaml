    \ WithRep:(NSObject<Representation>*)rep Steps:(float)numStepsToLive;\n@end\n\
    ```\n\n在[清单 7-21](#9781430244226_Ch07.xhtml#list21)中，`Particle`类的头文件继承了`Actor`并遵守`ExpireAfterTimeDelegate`协议。`Particle`遵守`ExpireAfterTimeDelegate`，因为我们希望在其生命周期内改变粒子的不透明度，使其逐渐淡出。属性`totalStepsAlive`表示粒子在场景中应该存在的时间，它由构造函数`particleAt:WithRep:Steps:`设置。我们还可以看到，粒子需要一个`Representation`作为构造函数的参数传入。`Particle`的实现如[清单\
