  raw: 'm (viewDidLoad)    ``` - (void)viewDidLoad {     [super viewDidLoad];     UIDevice*
    device = [UIDevice currentDevice];     [self setOrientation: [device orientation]];
    } ```    In [Listing 2-8](#9781430244226_Ch02.xhtml#list8), the task viewDidLoad
    is called as the ViewController is done initializing and is displayed on our screen.
    Here, we simply get the current device’s orientation and pass that value to `setOrientation:`,
    ensuring the UI is oriented correctly when the application starts.    If you run
    the project, you will see the app running on both the iPad and the iPhone, changing
    its layout based on orientation.    Summary    In this chapter, we looked at how
    to create an Xcode project suitable for developing a universal application. We
    explored the initialization process of an iOS application, and saw where to start
    modifying the project to create the application we want. We looked at how XIB
    files and classes interact, and at how iOS exploits MVC with the `UIViewController`
    class. We created an application that seamlessly supports running on an iPhone
    or an iPad in all orientations, setting the stage for game development.    Chapter
        3    Explore the Game Application Life Cycle    There is more to a game than
    just the fun parts. Almost all of the games on the market, and definitely the
    big titles, involve multiple views and a reasonably complex life cycle. This chapter
    explores how to turn a simple game into a complete application. We will look at
    how a typical game organizes the different views that constitute it, including
    a Loading view, a Welcome view, a High Score view, and of course the game itself.    Beyond
    user navigation, an application also has a life cycle. On iOS, that life cycle
    includes responding to the application being terminated, recovering from being
    in the background, or starting up for the first time. When an application moves
    through its life cycle, it will want to preserve elements of the user data, like
    high scores and the state of the game. Paying attention to these little details
    will make your game look polished instead of amateurish and annoying.    While
    the game presented here is not very exciting, and the art is admittedly amateurish,
    you will be able to take the basic outline presented here and drop your own game
    into it. You should update your art, though!    Understanding the Views in a Game    The
    game presented in this chapter is called Coin Sorter. It is a simple puzzle game
    in which the player sorts coins into rows and columns. The player has ten turns
    to make as many matching rows or columns as possible. The fun part of this game
    is just about as simple as an iOS game can get. The playable part of this game
    consists of just two classes, `CoinsController` and `CoinsGame`. As the names
    of these two classes suggest, `CoinsController` is responsible for rendering the
    game to the screen and interpreting player actions. `CoinsGame` is responsible
    for storing the state of the game and providing a few utility methods for manipulating
    that state. The details of how these two classes work is explored fully in [Chapter
    4](#9781430244226_Ch04.xhtml). In this chapter, we are going to look at all of
    the surrounding code that supports these two classes to create a complete application.    Most
    games comprise several views—not just the view where the main action of the game
    takes place. These views often include a Welcome view, a High Score view, and
    maybe a few others. The sample code that accompanies this chapter is designed
    to outline how these supporting views are managed. [Figure 3-1](#9781430244226_Ch03.xhtml#Fig1)
    is a flowchart of the views used in this game.    ![9781430244226_Fig03-01.jpg](images/9781430244226_Fig03-01.jpg)    [Figure
    3-1.](#9781430244226_Ch03.xhtml#_Fig1)  CoinSorter application flow    In [Figure
    3-1](#9781430244226_Ch03.xhtml#Fig1), each rectangle is a view in the game. The
    arrows indicate the transitions between these views.


    Starting on the left, there is a box with the title Launch Image. This view is
    different from the others, as it is just a PNG file that is displayed before control
    of the application is passed to the app delegate. See Appendix A for the details
    of configuring this image. When the application has fully loaded, we display the
    Loading view. This view stays on the screen for a few seconds while the application
    pre-loads some images. Once the images are loaded, we show the user the Welcome
    view.    The Welcome view in [Figure 3-1](#9781430244226_Ch03.xhtml#Fig1) offers
    the player a number of options. They can continue an old game, start a new game,
    view the high scores, or view information about the game. If the user plays the
    game, they are directed to the Play view, where the main action of this application
    takes place. When they are done with a game, the user is shown the High Scores
    view. When they are done reviewing the high scores, they are sent back to the
    Welcome view, enabling them to again select from the available options.    The
    application flow presented in [Figure 3-1](#9781430244226_Ch03.xhtml#Fig1) is
    by no means the only option, but it presents a common pattern. Extending or modifying
    this example should be simple once you understand what each view does and how
    the state of the application is managed.    **Note**  Although laying out this
    type of workflow with the Storyboard feature of Xcode might be appealing, supporting
    multiple orientations and multiple devices makes using Storyboard impractical.
    Ideally, Storyboard will improve in future versions of Xcode and become the only
    tool used to manage application life cycles.    Exploring the Role Each View Plays    Each
    view in the application serves a different purpose. By understanding what each
    view does, you will understand why this example is organized the way that it is.
    Let’s start by looking at [Figure 3-2](#9781430244226_Ch03.xhtml#Fig2), showing
    the Launch Image and the Loading view.    ![9781430244226_Fig03-02.jpg](images/9781430244226_Fig03-02.jpg)    [Figure
    3-2.](#9781430244226_Ch03.xhtml#_Fig2)  Launch Image and Loading view    In [Figure
    3-2](#9781430244226_Ch03.xhtml#Fig2), we see the Launch Image on the left, which
    appears when control of the initialization process is passed to the app delegate.
    We see the Loading view  on the right of [Figure 3-2](#9781430244226_Ch03.xhtml#Fig2).
    In this case, the Loading view has a `UIImageView` with the same image used as
    the Launch image. This is not required, but it is a nice way to provide a seamless
    visual experience for the user. In a more complex application, you might want
    to display a progress bar as images are loading. For an application this simple,
    you don’t really need a loading screen, because the number and size of the images
    used are small. In our case, we simply add a `UILabel` with the text “Loading
    . . . ” to the Loading view. Once the initial resources of an application are
    loaded, the Welcome view is presented, as shown in [Figure 3-3](#9781430244226_Ch03.xhtml#Fig3).    ![9781430244226_Fig03-03.jpg](images/9781430244226_Fig03-03.jpg)    [Figure
    3-3.](#9781430244226_Ch03.xhtml#_Fig3)  Welcome view showing the Continue Game
    button    The Welcome view shown in [Figure 3-3](#9781430244226_Ch03.xhtml#Fig3)
    presents four buttons to the player. The first button allows the player to continue
    the previous game. The New Game button starts a new game. The buttons High Scores
    and About allow the player to review past high scores and view the About screen.
    The Welcome view is the home screen for the player. Looking at [Figure 3-1](#9781430244226_Ch03.xhtml#Fig1),
    we see that all future actions will inevitably lead the player back to this view.
    If the player chooses to continue an earlier game or start a new game, the Play
    view is presented, as shown in [Figure 3-4](#9781430244226_Ch03.xhtml#Fig4).    ![9781430244226_Fig03-04.jpg](images/9781430244226_Fig03-04.jpg)    [Figure
    3-4.](#9781430244226_Ch03.'
  trans: "\n`- (void)viewDidLoad {  \n    [super viewDidLoad];  \n    UIDevice* device\
    \ = [UIDevice currentDevice];  \n    [self setOrientation: [device orientation]];\
    \  \n}`\n\n在清单 2-8 中，当 `ViewController` 完成初始化并显示在屏幕上时，会调用 `viewDidLoad` 任务。此处，我们简单获取当前设备的朝向，并将该值传递给\
    \ `setOrientation:`，确保应用程序启动时界面方向正确。\n\n如果运行该项目，您会看到应用在 iPad 和 iPhone 上均可运行，并会根据朝向改变布局。\n\
    \n## 总结\n\n本章我们探讨了如何创建适用于开发通用应用的 Xcode 项目。我们研究了 iOS 应用的初始化过程，并了解了从何处开始修改项目以创建所需应用。我们掌握了\
    \ XIB 文件与类的交互方式，以及 iOS 如何通过 `UIViewController` 类运用 MVC 模式。我们创建了一个应用，使其在 iPhone\
    \ 或 iPad 上能够以所有方向无缝运行，为游戏开发奠定了基础。\n\n# 第 3 章 探索游戏应用生命周期\n\n游戏不仅仅包含有趣的部分。市场上几乎所有游戏，尤其是大型作品，都涉及多个视图和相当复杂的生命周期。本章将探讨如何将一个简单的游戏转变为一个完整的应用。我们将研究典型游戏如何组织构成其的各个视图，包括加载视图、欢迎视图、高分视图以及游戏本身。\n\
    \n除了用户导航，应用也有其生命周期。在 iOS 上，该生命周期包括响应应用被终止、从后台恢复或首次启动。当应用在其生命周期中移动时，它需要保存用户数据的元素，如高分和游戏状态。关注这些细节将使您的游戏看起来精致而非业余和恼人。\n\
    \n虽然这里展示的游戏并不令人兴奋，且图像也承认是业余水平，但您可以采用此处展示的基本框架，并将自己的游戏融入其中。不过，建议您更新自己的图像！\n\n##\
    \ 理解游戏中的视图\n\n本章介绍的游戏名为 Coin Sorter。这是一个简单的益智游戏，玩家将硬币按行和列排序。玩家有十次机会尽可能多地匹配行或列。这个游戏的有趣部分几乎就是\
    \ iOS 游戏能有的最简单形式。游戏的可玩部分仅由两个类组成：`CoinsController` 和 `CoinsGame`。正如这两个类的名称所示，`CoinsController`\
    \ 负责将游戏渲染到屏幕并解释玩家操作。`CoinsGame` 负责存储游戏状态并提供一些操作该状态的实用方法。这两个类如何工作的细节将在第 4 章中全面探讨。在本章中，我们将研究支持这两个类以创建完整应用的所有周边代码。\n\
    \n大多数游戏包含多个视图——不仅仅是游戏主要动作发生的视图。这些视图通常包括欢迎视图、高分视图，可能还有一些其他视图。本章附带的示例代码旨在概述如何管理这些支持视图。图\
    \ 3-1 是此游戏中视图的流程图。\n\n![9781430244226_Fig03-01.jpg](img/9781430244226_Fig03-01.jpg)\n\
    \n图 3-1. CoinSorter 应用流程\n\n在图 3-1 中，每个矩形都是游戏中的一个视图。箭头指示这些视图之间的转换。\n\n从左侧开始，有一个标题为“启动图像”的框。此视图与其他视图不同，它只是一个\
    \ PNG 文件，在应用控制权传递给应用委托之前显示。配置此图像的详细信息见附录 A。当应用完全加载后，我们会显示加载视图。此视图会在屏幕上停留几秒钟，同时应用预加载一些图像。图像加载完成后，我们会向用户显示欢迎视图。\n\
    \n图 3-1 中的欢迎视图为玩家提供了多个选项。他们可以继续旧游戏、开始新游戏、查看高分或查看游戏信息。如果用户玩游戏，他们会被引导至游戏视图，这是应用主要动作发生的地方。游戏结束后，用户会看到高分视图。当他们查看完高分后，会被送回欢迎视图，以便再次从可用选项中选择。\n\
    \n图 3-1 中展示的应用流程绝非唯一选择，但它展示了一种常见模式。一旦您理解每个视图的作用以及应用状态如何管理，扩展或修改此示例应该非常简单。\n\n\
    > **注意** 虽然使用 Xcode 的 Storyboard 功能来布置此类工作流可能很吸引人，但支持多种方向和多种设备使得 Storyboard 不实用。理想情况下，Storyboard\
    \ 将在未来版本的 Xcode 中改进，并成为管理应用生命周期的唯一工具。\n\n## 探索每个视图扮演的角色\n\n应用中的每个视图都有不同的用途。通过理解每个视图的作用，您将理解此示例为何如此组织。让我们先看图\
    \ 3-2，它展示了启动图像和加载视图。\n\n![9781430244226_Fig03-02.jpg](img/9781430244226_Fig03-02.jpg)\n\
    \n图 3-2. 启动图像和加载视图\n\n在图 3-2 中，我们看到左侧的启动图像，它在初始化过程控制权传递给应用委托时出现。我们在图 3-2 的右侧看到加载视图。在此例中，加载视图有一个\
    \ `UIImageView`，其图像与启动图像相同。这不是必须的，但这是为用户提供无缝视觉体验的好方法。在更复杂的应用中，您可能希望在加载图像时显示进度条。对于如此简单的应用，您实际上并不需要加载屏幕，因为使用的图像数量和大小都很小。在我们的案例中，我们简单地在加载视图中添加了一个带有文本“加载中...”的\
    \ `UILabel`。一旦应用的初始资源加载完成，就会显示欢迎视图，如图 3-3 所示。\n\n![9781430244226_Fig03-03.jpg](img/9781430244226_Fig03-03.jpg)\n\
    \n图 3-3. 显示“继续游戏”按钮的欢迎视图\n\n图 3-3 中显示的欢迎视图向玩家展示了四个按钮。第一个按钮允许玩家继续之前的游戏。“新游戏”按钮开始一个新游戏。“高分”和“关于”按钮允许玩家查看过去的高分和关于屏幕。欢迎视图是玩家的主屏幕。查看图\
    \ 3-1，我们看到所有未来的操作最终都会将玩家带回此视图。如果玩家选择继续之前的游戏或开始新游戏，则会显示游戏视图，如图 3-4 所示。\n\n![9781430244226_Fig03-04.jpg](img/9781430244226_Fig03-04.jpg)\n\
    图 3-4.\n"
- fmt: '# Play View—A Game in Progress


    The Play view is where the game play actually happens. In [Figure 3-4](#9781430244226_Ch03.xhtml#Fig4),
    the top of the screen displays the number of remaining turns, as well as the current
    score. The square region with the geometric shapes is where the game takes place.
    Each triangle, square, and circle represents a different type of coin. The object
    of the game is to create columns and rows of like coins. The only way to rearrange
    the coins is by selecting two to trade places. When a row or column of like coins
    is created, the player’s score is incremented and new coins appear to replace
    those in the matching column or row. The player can only swap coins ten times
    before the game is over, but with careful planning, a player can create multiple
    matches per swap. When the game is over, the High Score view is shown, highlighting
    any new high score the player may have achieved. [Figure 3-5](#9781430244226_Ch03.xhtml#Fig5)
    shows the High Score view.


    ![9781430244226_Fig03-05.jpg](images/9781430244226_Fig03-05.jpg)


    [Figure 3-5.](#9781430244226_Ch03.xhtml#_Fig5) The High Score view


    In [Figure 3-5](#9781430244226_Ch03.xhtml#Fig5), you can see the High Score view;
    it highlights the score of the last game played, which is the third score from
    the top (it is slightly lighter than the others in the black and white image).
    The high scores presented in this view are saved between application sessions.
    Later in this chapter, we will explore how the High Score data are saved. When
    the user is done inspecting their past and current successes, they can select
    the Done button to be directed back to the Welcome view. From the Welcome view,
    they can click the About button and view some information about the game, as shown
    in [Figure 3-6](#9781430244226_Ch03.xhtml#Fig6).


    ![9781430244226_Fig03-06.jpg](images/9781430244226_Fig03-06.jpg)


    [Figure 3-6.](#9781430244226_Ch03.xhtml#_Fig6) The Welcome view


    The Welcome view presented in [Figure 3-6](#9781430244226_Ch03.xhtml#Fig6) is
    very much a placeholder. You would want to replace the “Lorem ipsem . . . ” with
    a description of your game.


    In [Chapter 2](#9781430244226_Ch02.xhtml), we explored how to configure an XIB
    file containing the various UI elements in the game. With this game, we follow
    a very similar pattern.


    ## Understanding the Project’s Structure


    Even a simple game can have a surprising number of artifacts in the Xcode project.
    Exploring what these items are helps you understand where each piece of the application
    is defined and how they fit together. [Figure 3-7](#9781430244226_Ch03.xhtml#Fig7)
    shows the Project Explorer in Xcode, which lists a number of the files used in
    this project.


    ![9781430244226_Fig03-07.jpg](images/9781430244226_Fig03-07.jpg)


    [Figure 3-7.](#9781430244226_Ch03.xhtml#_Fig7) Project files for the Project Sample
    03


    The project files shown in [Figure 3-7](#9781430244226_Ch03.xhtml#Fig7) follows
    the same pattern as the project from [Chapter 2](#9781430244226_Ch02.xhtml). There
    are the shared classes under the group `Sample 03`, while device-specific classes
    are stored under the groups iPhone and iPad. The class `Sample_03AppDelegate`
    contains the initialization code for the application and code for saving the user
    state when a player exits the application. The XIB files are also wired up very
    much like the XIB files from [Chapter 2](#9781430244226_Ch02.xhtml): the XIB files
    starting with `MainWindow` each contain a `GameController` of the appropriate
    subclass. The class `GameController` contains all of the logic for managing the
    state of the application, while the XIB files for each subclass contain the UI
    elements suitable for each device.


    The class `CoinsController` describes the fun part of the game and the class `CoinGame`
    is a model class that describes which type of coins are where, and also the current
    score and remaining turns.


    By archiving an object of the class `CoinGame`, we can save the state of the current
    game when the application quits.


    The class `HighscoreController` manages the High Score view and displays the data
    found in the class `Highscores`. The class `Highscores` contains an array of `Score`
    objects, where each `Score` object represents a score and the date that score
    was achieved. By serializing an instance of `Highscores`, we can preserve a user’s
    high scores between play sessions.


    The meat of the view configuration is defined in the two `GameController` XIB
    files. Let’s take a look at those.


    ## Configuring an Application for Multiple Views


    While this application works equally well on the iPhone and the iPad, let’s just
    look at the iPhone version of the GameController XIB file, shown in [Figure 3-8](#9781430244226_Ch03.xhtml#Fig8).


    ![9781430244226_Fig03-08.jpg](images/9781430244226_Fig03-08.jpg)


    [Figure 3-8.](#9781430244226_Ch03.xhtml#_Fig8) `GameController_iPhone.xib`


    In [Figure 3-8](#9781430244226_Ch03.xhtml#Fig8), we see the details of the file
    `GameController_iPhone.xib` on the left. On the right, we see the `IBOutlets`
    and `IBActions` defined in the file `GameController.h`.


    ### Reviewing `GameController_iPhone.xib`


    Under the Objects section on the left, we see a number of `UIViews`. The Landscape
    Play view and the Portrait Play view are shown when the game is being played,
    which is the only time this application supports both orientations. For simplicity,
    the rest of the views are for portrait orientation only.


    When the application initializes, we know that the first view the user sees is
    the Loading view. After that, the user is directed to the Welcome view. In [Figure
    3-8](#9781430244226_Ch03.xhtml#Fig8), we can see that both of these views are
    defined in the XIB file. We also see that the About view is defined in the XIB
    file. For the actual game and the High Score view, we see corresponding `UIViewControllers`
    in the XIB. These two views are handled with a `UIViewController` because each
    contributes a reasonable amount of functionality, so it makes sense to define
    their behaviors in their own `UIViewController` classes. As a side effect of this
    design decision, we can reuse High Score `UIViewController` in other applications.


    ### Reviewing `GameController.h`


    On the right of [Figure 3-8](#9781430244226_Ch03.xhtml#Fig8), we see the connections
    defined in the class `GameController`. We can also see that most of the Objects
    listed are wired up to various connections. Wiring up these components in this
    way allows us to easily reference these different components in code. [Listing
    3-1](#9781430244226_Ch03.xhtml#list1) shows the definition of these connections
    in `GameController.h`.


    **[Listing 3-1](#9781430244226_Ch03.xhtml#_list1).** `GameController.h`


    ```

    #import <UIKit/UIKit.h>

    #import "CoinsController.h"

    #import "CoinsGame.h"

    #import "HighscoreController.

    ```'
