- fmt: '在[Figure 1-7](#9781430244226_Ch01.xhtml#Fig7)中，我们看到已将`UIButton`从库项目A拖到每个视图上。我们将左侧的`UIButton`标记为“Play”，右侧的`UIButton`标记为“Back”。要使“Play”按钮导航到右侧视图，我们从“Play”按钮（项目B）向右拖动到右侧视图，并在项目C处释放。此时，会弹出一个上下文对话框，允许我们选择所需的过渡类型。我选择了“Modal”。我们可以对“Back”按钮重复此过程：将其向右拖动到左侧视图，并选择返回所需的过渡。此时您可以运行应用程序，并在两个视图之间导航。然而，为了使其成为一个游戏，我们需要包含“Rock,
    Paper, Scissors”视图和按钮。


    ### 添加 Rock, Paper, Scissors 视图


    要添加“Rock, Paper, Scissors”视图，我们需要从示例代码中包含一个类到您正在构建的项目中。最简单的方法是打开示例项目，并将文件`RockPaperScissorsView.h`和`RockPaperScissorsView.m`从示例项目拖到您的新项目中。[Figure
    1-8](#9781430244226_Ch01.xhtml#Fig8)显示了将文件拖入Xcode项目时弹出的对话框。


    ![9781430244226_Fig01-08.jpg](images/9781430244226_Fig01-08.jpg)


    *[Figure 1-8.](#9781430244226_Ch01.xhtml#_Fig8) 将文件拖入 Xcode 项目*


    在[Figure 1-8](#9781430244226_Ch01.xhtml#Fig8)中，我们看到一个对话框，确认我们要将新文件拖入Xcode项目。请确保勾选“Destination”复选框。否则，Xcode不会将文件复制到目标项目的位置。最好将所有项目资源保留在项目的根文件夹中。Xcode足够灵活，并不强制您这样做，但我曾多次因这种灵活性而吃亏。好了，既然我们已将所需的类添加到项目中，接下来就让我们连接界面以包含它。


    ### 自定义 UIView


    准备简单应用程序的最后一步是在界面中创建一个属于`RockPaperScissorsView`类的新`UIView`。[Figure 1-9](#9781430244226_Ch01.xhtml#Fig9)展示了如何做到这一点。


    ![9781430244226_Fig01-09.jpg](images/9781430244226_Fig01-09.jpg)


    *[Figure 1-9.](#9781430244226_Ch01.xhtml#_Fig9) 自定义的 UIView*


    在[Figure 1-9](#9781430244226_Ch01.xhtml#Fig9)中，我们看到在右侧视图中添加了一个`UIView`。我们通过将项目A中的图标拖到项目B中的故事板上来实现。调整新`UIView`的大小后，我们将其类设置为`RockPaperScissorsView`，如项目C所示。至此，技术上我们已经完成了。我们创建了我们的第一个游戏！显然，我们还没有查看`RockPaperScissorsView`的实现，这将在下一章讨论。


    本书的其余部分将以示例1作为起点。您将学习许多新技术来定制一个简单的应用程序，以制作一个真正完整的游戏。


    ### 总结


    在本章中，我们快速浏览了Xcode，学习了如何用它创建项目，并使用Storyboard构建简单的导航。后续章节将在这些基础知识上补充内容，向您展示如何构建一个完整的游戏。


    ## 第二章 设置您的游戏项目


    与所有软件项目一样，iOS游戏开发受益于良好的开端。在本章中，我们将讨论设置一个新的Xcode项目，作为许多游戏的合适起点。这将包括创建一个可用于在iPhone和iPad上部署的项目，同时处理横屏和竖屏方向。


    我们将研究iOS应用程序是如何初始化的，以及我们可以在何处开始自定义行为，以匹配我们对应用程序应该如何执行的期望。我们还将探索iOS应用程序中用户界面(UI)元素的创建和修改方式，特别关注管理不同设备和方向。


    我们将在本章创建的游戏与[第一章](#9781430244226_Ch01.xhtml)中的简单示例非常相似——事实上，玩法完全相同。但我们将为后续章节打下基础，同时练习一些关键技巧，例如使用`UIViewControllers`和Interface
    Builder。


    我们将探索iOS应用程序是如何组合在一起的，并解释关键的类。我们还将创建新的UI元素，并学习如何使用Interface Builder自定义它们。我们还将探索使用MVC模式创建灵活、可重用的代码元素。到本章结束时，我们将创建如图[Figure
    2-1](#9781430244226_Ch02.xhtml#Fig1)所示的“Rock, Paper, Scissors”应用程序。


    ![9781430244226_Fig02-01.jpg](images/9781430244226_Fig02-01.jpg)


    *[Figure 2-1.](#9781430244226_Ch02.xhtml#_Fig1) 适用于 iPhone 和 iPad 所有方向的应用程序设计*


    [Figure 2-1](#9781430244226_Ch02.xhtml#Fig1)展示了在iPhone和iPad模拟器上运行的应用程序。这是一个所谓的通用应用程序：它可以在这两种设备上运行，并以此方式在App
    Store中呈现。除非有特定的商业理由编写仅适用于iPhone或iPad的应用程序，否则将您的应用程序做成通用版是很有意义的。即使您最初只打算在其中一个设备上发布应用，从长远来看，这也会为您节省时间。


    我们的示例应用程序非常简单，以至于可能很难看出[Figure 2-1](#9781430244226_Ch02.xhtml#Fig1)中呈现的四种状态之间的差异。在左上角（iPhone竖屏方向），灰色区域的位置与左下角iPhone横屏时的布局不同。文本的布局也不同。应用程序在iPad上运行时，横屏与竖屏的情况也是如此。让我们开始了解如何设置一个项目来适应这些不同的设备和方向。


    ### 创建您的游戏项目


    要开始我们的示例游戏，我们首先必须在Xcode中创建一个新项目。


    通过选择File ➤ New ➤ New Project...来创建一个新项目。这将打开一个向导，允许您选择所需项目的类型，如[Figure 2-2](#9781430244226_Ch02.xhtml#Fig2)所示。


    ![9781430244226_Fig02-02.jpg](images/9781430244226_Fig02-02.jpg)


    *[Figure 2-2.](#9781430244226_Ch02.xhtml#_Fig2) 创建新的 Single View Application*


    在[Figure 2-2](#9781430244226_Ch02.xhtml#Fig2)的左侧，我们从iOS部分选择了Application。右侧是可用于创建iOS应用程序的项目类型。这里提供的选择通过为开发人员提供一个合理的起点来帮助他们。这对于刚接触iOS的开发人员尤其有帮助，因为这些模板为多种常见的应用导航风格提供了起点。我们将选择Single
    View Application，因为我们只需要一个非常简洁的起点，并且Single View Application为通用应用程序提供了良好的支持。点击Next后，我们看到[Figure
    2-3](#9781430244226_Ch02.xhtml#Fig3)所示的选项。


    ![9781430244226_Fig02-03.jpg](images/9781430244226_Fig02-03.jpg)


    *[Figure 2-3.](#9781430244226_Ch02.xhtml#_Fig3) 新项目的详细信息*


    我们要做的第一件事是命名我们的产品。您可以选择任何您喜欢的名称。公司标识符将在应用提交过程中用于标识应用。您可以输入任何值作为公司标识符，但通常的做法是使用反向域名。如[Figure
    2-3](#9781430244226_Ch02.xhtml#Fig3)所示，Bundle Identifier是产品名称和公司标识符的组合。Bundle
    Identifier稍后可以更改——向导只是显示默认值。当您将游戏提交到App Store时，Bundle Identifier用于指示您正在上传的是哪个应用程序。'
  raw: 'In [Figure 1-7](#9781430244226_Ch01.xhtml#Fig7), we see that we have dragged
    a `UIButton` from the library item A onto each of the views. We gave the `UIButton`
    on the left the label Play, and the `UIButton` on the right the label Back. To
    make the Play button navigate to the view on the right, we right-drag from the
    Play button (item B) to the view on the right and release at item C. When we do
    this, a context dialog pops up, allowing us to select which type of transition
    we want. I selected Model. We can repeat the process for the Back button: right-drag
    it to the view on the left and select the transition you want for the return trip.
    You can run the application at this point and navigate between these two views.
    In order to make it a game, though, we need to include the Rock, Paper, Scissors
    view and buttons.


    Adding the Rock, Paper, Scissors View


    To add the Rock, Paper, Scissors view, we need to include a class from the sample
    code in the project you are building. The easiest way to do this is to open the
    sample project and drag the files `RockPaperScissorsView.h` and `RockPaperScissorsView.m`
    from the sample project to your new project. [Figure 1-8](#9781430244226_Ch01.xhtml#Fig8)
    shows the dialog that pops up when you drag files into an Xcode project.


    ![9781430244226_Fig01-08.jpg](images/9781430244226_Fig01-08.jpg)


    [Figure 1-8.](#9781430244226_Ch01.xhtml#_Fig8)  Dragging files into an Xcode project


    In [Figure 1-8](#9781430244226_Ch01.xhtml#Fig8), we see the dialog confirming
    that we want to drag new files into an Xcode project. Be sure the Destination
    box is checked. Otherwise, Xcode will not copy the files to the location of the
    target project. It is good practice to keep all project resources in the root
    folder of a project. Xcode is flexible enough to not require that you do this,
    but I have been burned too many times by this flexibility. Anyway, now that we
    have the required class in our project, let’s wire up our interface to include
    it.


    Customizing a UIView


    The last step in preparing a simple application is to create a new `UIView` in
    our interface that is of the class `RockPaperScissorsView`. [Figure 1-9](#9781430244226_Ch01.xhtml#Fig9)
    shows how this is done.


    ![9781430244226_Fig01-09.jpg](images/9781430244226_Fig01-09.jpg)


    [Figure 1-9.](#9781430244226_Ch01.xhtml#_Fig9)  A customized UIView


    In [Figure 1-9](#9781430244226_Ch01.xhtml#Fig9), we see a `UIView` added to the
    view on the right. We did this by dragging the icon from item A onto the storyboard
    in item B. After adjusting the size of the new `UIView`, we set its class to be
    `RockPaperScissorsView`, as shown in item C. At this point, we are technically
    done. We have created our first game! Obviously, we have not looked at the implementation
    of `RockPaperScissorsView`, which is discussed on the next chapter.


    The rest of this book will use Sample 1 as a starting place. You will learn many
    new techniques for customizing a simple app to make a truly complete game.


    Summary


    In this chapter, we have taken a quick tour through Xcode, learning how to create
    a project with it and build a simple navigation using Storyboard. The chapters
    that follow will add to the basic lessons given here to show you how to build
    a complete game.


    Chapter     2


    Setting up Your Game Project


    Like all software projects, iOS game development benefits from starting on good
    footing. In this chapter, we will discuss setting up a new Xcode project that
    is a suitable starting point for many games. This will include creating a project
    that can be used for the deployment on the iPhone and the iPad, handling both
    landscape and portrait orientations.


    We look at how an iOS application is initialized and where we can start customizing
    behavior to match our expectations of how the application should perform. We will
    also explore how user interface (UI) elements are created and modified in an iOS
    application, paying special attention to managing different devices and orientations.


    The game we create in this chapter will be very much like the simple example from
    [Chapter 1](#9781430244226_Ch01.xhtml)—in fact, it will play exactly the same.
    But we will be building a foundation for future chapters while practicing some
    key techniques, such as working with `UIViewControllers` and Interface Builder.


    We will explore how an iOS application is put together, and explain the key classes.
    We’ll also create new UI elements and learn how to customize them with Interface
    Builder, and we will explore using the MVC pattern to create flexible, reusable
    code elements. At the end of this chapter, we will have created the Rock, Paper,
    Scissors application shown in [Figure 2-1](#9781430244226_Ch02.xhtml#Fig1).


    ![9781430244226_Fig02-01.jpg](images/9781430244226_Fig02-01.jpg)


    [Figure 2-1.](#9781430244226_Ch02.xhtml#_Fig1)  An application design to work
    on the iPhone and iPad in all orientations


    [Figure 2-1](#9781430244226_Ch02.xhtml#Fig1) shows the application running on
    an iPhone and iPad simulator. This is a so-called universal application: it can
    run on both devices and would be presented in the App Store as such. Unless there
    are specific business reasons for writing an app that only works on the iPhone
    or the iPad, it makes a lot of sense to make your app universal. It will save
    you time down the road, even if you only intend to release your app on one of
    the devices to start.


    Our sample application is so simple that it may be difficult to see the differences
    between the four states presented in [Figure 2-1](#9781430244226_Ch02.xhtml#Fig1).
    On the upper left, where the iPhone is in portrait orientation, the position of
    the gray area is laid out differently from the iPhone in landscape at the bottom
    left. The layout of the text is also different. The same goes for the application
    when it is running on the iPad in landscape vs. portrait. Let’s get going and
    understand how we can set up a project to accommodate these different devices
    and orientations.


    Creating Your Game Project


    To get things started with our sample game, we first have to create a new project
    in Xcode.


    Create a new project by selecting File ➤ New ➤ New Project . . . . This will open
    a wizard that allows you to select which type of project you want, as shown in
    [Figure 2-2](#9781430244226_Ch02.xhtml#Fig2).


    ![9781430244226_Fig02-02.jpg](images/9781430244226_Fig02-02.jpg)


    [Figure 2-2.](#9781430244226_Ch02.xhtml#_Fig2)  Creating a new Single View Application


    On the left side of [Figure 2-2](#9781430244226_Ch02.xhtml#Fig2), we have selected
    Application from the iOS section. On the right are the available project types
    for creating iOS applications. The choices presented here help developers by giving
    them a reasonable starting place for their applications. This is particularly
    helpful for developers new to iOS, because these templates get you started for
    a number of common application navigation styles. We are going to pick a Single
    View Application, because we require only a very minimal starting point, and the
    Single View Application provides good support for universal applications. After
    clicking Next, we see the options shown in [Figure 2-3](#9781430244226_Ch02.xhtml#Fig3).


    ![9781430244226_Fig02-03.jpg](images/9781430244226_Fig02-03.jpg)


    [Figure 2-3.](#9781430244226_Ch02.xhtml#_Fig3)  Details for the new project


    The first thing we will do is name our product. You can pick anything you want.
    The company identifier will be used during the app submission process to identify
    it. You can put any value you want as the company identifier, but it is common
    practice to use a reverse domain name. As can be seen in [Figure 2-3](#9781430244226_Ch02.xhtml#Fig3),
    the bundle identifier is a composite of the product name and the company identifier.
    The bundle identifier can be changed later—the wizard is simply showing what the
    default will be. When you submit your game to the App Store, the bundle identifier
    is used to indicate which application you are uploading.'
