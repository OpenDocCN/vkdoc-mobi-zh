  trans: "\n在开始之前，我们先仔细看看`CoinsGame`类，以便理解我们是如何表示这 25 枚硬币及其类型的。  \n**模型**  \n你已经看过了设置代码，它使用`UIViews`和`UIImageViews`在屏幕上创建了表示游戏的场景。你知道游戏由\
    \ 25 枚硬币组成，排列成 5x5 的网格。现在，我们来看看负责管理这些数据的类，让我们先看`CoinsGame.h`，如清单 4-13 所示。\n\n\
    **[清单 4-13.]** `CoinsGame.h`\n\n```objc\n#import <Foundation/Foundation.h>\n\n\
    #define COIN_TRIANGLE 0\n#define COIN_SQUARE 1\n#define COIN_CIRCLE 2\n\nstruct\
