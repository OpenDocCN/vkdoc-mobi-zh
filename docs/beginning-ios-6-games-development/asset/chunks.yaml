- fmt: "Now let’s look at a specific example, where we implement the purchase of a\
    \ nonconsumable in-app purchase for our game Belt Commander. We are going to implement\
    \ the view from [Figure 10-1](#9781430244226_Ch10.xhtml#Fig1), where the user\
    \ can select which actors are involved in the game and purchase new actors to\
    \ be made available.\n\n## In-App Purchase Implementation\n\nAs we discussed,\
    \ the process of making a purchase is really just two calls to the iTunes Store.\
    \ We will see in this section that it really only involves a handful of classes.\
    \ In our example, we will be handling most of the details of working with StoreKit\
    \ and handling the UI in a single class called `ExtrasController`, whose header\
    \ is shown in [Listing 10-1](#9781430244226_Ch10.xhtml#_list1).\n\n**[Listing\
    \ 10-1](#9781430244226_Ch10.xhtml#_list1).** ExtrasController.h\n\n```\n@interface\
    \ ExtrasController : UIViewController<SKPaymentTransactionObserver, SKProductsRequestDelegate>{\n\
    \    GameParameters* gameParams;\n    NSMutableDictionary* idsToProducts;\n}\n\
    @property (strong, nonatomic) IBOutlet UIButton *asteroidButton;\n@property (strong,\
    \ nonatomic) IBOutlet UIButton *saucerButton;\n@property (strong, nonatomic) IBOutlet\
    \ UIButton *powerupButton;\n\n-(void)setGameParams:(GameParameters*)params;\n\
    @end\n```\n\nIn [Listing 10-1](#9781430244226_Ch10.xhtml#_list1), we see the header\
    \ for the class `ExtrasController`. The class `ExtrasController` plays two roles:\
    \ it manages the purchasing process and it updates the three buttons accordingly.\n\
    \nThe object `gameParams` is responsible for storing which actors are enabled\
    \ in the game and which purchases have been made. The object `idsToProducts` is\
    \ used to map our ids for purchases to `SKProduct` objects that Apple tells us\
    \ are valid; we will see how we use these objects shortly.\n\nIn order to interact\
    \ with StoreKit, `ExtrasController` conforms to the protocols `SKPaymentTransactionObserver`\
    \ and `SKProductsRequestDelegate`. These protocols provide everything you need\
    \ for your application to respond to interactions with the store. We will see\
    \ how `ExtrasController` implements the tasks from these two protocols as we work\
    \ through the code.\n\nThe first step when working StoreKit is to set up an object\
    \ that responds to changes in the state of purchases. We create an object that\
    \ responds to changes in purchases by adding an observer to the default `SKPaymentQueue`,\
    \ as shown in [Listing 10-2](#9781430244226_Ch10.xhtml#_list2).\n\n**[Listing\
    \ 10-2](#9781430244226_Ch10.xhtml#_list2).** ExtrasController.m (viewDidLoad)\n\
    \n```\n#define PURCHASE_INGAME_SAUCERS @\"com.beltcommander.ingame.saucers\"\n\
    #define PURCHASE_INGAME_POWERUPS @\"com.beltcommander.ingame.powerups\"\n//....\n\
    - (void)viewDidLoad {\n    [super viewDidLoad];\n    idsToProducts = [NSMutableDictionary\
    \ new];\n    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];\n\n\
    \    //Get set of product ids\n    NSSet* potentialProducts = [NSSet setWithObjects:PURCHASE_INGAME_POWERUPS,\
    \ PURCHASE_INGAME_SAUCERS, nil];\n\n    SKProductsRequest* request = [[SKProductsRequest\
    \ alloc] initWithProductIdentifiers:potentialProducts];\n    [request setDelegate:self];\n\
    \    [request start];\n\n    [self setGameParams: [GameParameters readFromDefaults]];\n\
    }\n```\n\nIn [Listing 10-2](#9781430244226_Ch10.xhtml#_list2), we see the task\
    \ `viewDidLoad` for the class `ExtrasController`. In this task, we start by creating\
    \ our `idsToProducts` map and by getting the default `SKPaymentQueue` by calling\
    \ `defaultQueue`, adding `self` as an observer. Because `self` conforms to the\
    \ protocol `SKPaymentTransactionObserver`, our `ExtrasController` will be informed\
    \ of all changes in state for a purchase. Once we have a registered observer,\
    \ we create a set of known product IDs. In this case, the `NSSet` `potentialProducts`\
    \ is created from two constants: `PURCHASE_INGAME_POWERUPS` and `PURCHASE_INGAME_SAUCERS`.\
    \ As we can see, these constants are the same strings as we specified when we\
    \ created the products in iTunes Connect.\n\nOnce we have specified our set of\
    \ potential products, we create an `SKProductsRequest`, set `self` as the delegate,\
    \ and call `start` on it. While StoreKit is working out which product IDs are\
    \ valid, we call `setGameParams` and specify that we should use the `GameParameters`\
    \ object we have stored the default `NSUserDefaults`. When StoreKit has its results,\
    \ the tasks `productsRequest:didReceiveResponse:`, as shown in [Listing 10-3](#9781430244226_Ch10.xhtml#_list3).\n\
    \n**[Listing 10-3](#9781430244226_Ch10.xhtml#_list3).** ExtrasController.m (productsRequest:didReceiveResponse:)\n\
    \n```\n- (void)productsRequest:(SKProductsRequest *)request didReceiveResponse:(SKProductsResponse\
    \ *)response {\n    for (SKProduct* aProduct in response.products){\n        if\
    \ ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_SAUCERS]){\n  \
    \          [saucerButton setEnabled:YES];\n            [saucerButton setHidden:NO];\n\
    \            [idsToProducts setObject:aProduct forKey:PURCHASE_INGAME_SAUCERS];\n\
    \        } else if ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_POWERUPS]){\n\
    \            [powerupButton setEnabled:YES];\n            [powerupButton setHidden:NO];\n\
    \            [idsToProducts setObject:aProduct forKey:PURCHASE_INGAME_POWERUPS];\n\
    \        }\n    }\n}\n```\n\nIn [Listing 10-3](#9781430244226_Ch10.xhtml#_list3),\
    \ we see the task `productsRequest:didReceiveResponse:` that gets called when\
    \ we have a valid set of product IDs. In this task, we simply iterate over all\
    \ of the products returned and make our buttons visible for purchasing saucers\
    \ and power-ups. In this way, we make sure the user only sees viable purchase\
    \ options.\n\nWe also map each of valid product IDs to the `SKProduct` objects\
    \ set to the application. In this way, when the user makes a purchase, we can\
    \ pull out the exact object Apple sent to us. This ensures we are presenting good\
    \ data to our users.\n\nWe have looked at how we figure out which purchases are\
    \ valid. Before we look at how purchases are actually made, we should examine\
    \ the class `GameParameters`. The class `GameParameters` is responsible for storing\
    \ which products have already been purchased and which actors the user wants in\
    \ his or her game.\n\n## Driving the UI from Existing Purchases\n\nThe three buttons,\
    \ shown in [Figure 10-1](#9781430244226_Ch10.xhtml#Fig1), allow the user to select\
    \ which actors are available in the game. The same UI allows the user to purchase\
    \ new actors. In order to keep track of this information we have created the model\
    \ class `GameParameters`, whose header is shown in [Listing 10-4](#9781430244226_Ch10.xhtml#_list4).\n\
    \n**[Listing 10-4](#9781430244226_Ch10.xhtml#_list4).** GameParameters.h\n\n```\n\
    @interface GameParameters : NSObject<NSCoding>\n\n@property (nonatomic) BOOL includeAsteroids;\n\
    @property (nonatomic) BOOL includeSaucers;\n@property (nonatomic) BOOL includePowerups;\n\
    @property (nonatomic, retain) NSMutableSet* purchases;\n\n+(id)gameParameters;\n\
    +(id)readFromDefaults;\n-(void)writeToDefaults;\n@end\n```\n\nIn [Listing 10-4](#9781430244226_Ch10.xhtml#_list4),\
    \ we see the header for the class `GameParameters`. We have three `BOOL` properties\
    \ to keep track of which actors the user wants in the game. We also have an `NSMutableSet`\
    \ called `purchases` that is used to store a set of product ID strings. The constructor\
    \ `gameParameters` will create a new `GameParameters` object with no purchases\
    \ and only `includeAsteroids` set to true (implementation not shown). The class\
    \ task `readFromDefaults` is used to pull a `GameParameters` out of the default\
    \ `NSUserDefaults`, whereas `writeToDefaults` is used to serialize a `GameParameters`\
    \ back to the default `NSUserDefaults`. [Listing 10-5](#9781430244226_Ch10.xhtml#_list5)\
    \ shows both `readFromDefaults` and `writeToDefaults`.\n\n**[Listing 10-5](#9781430244226_Ch10.xhtml#_list5).**\
    \ GameParameters."
