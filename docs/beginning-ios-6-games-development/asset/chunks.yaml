    application was already running, it will show up on the screen exactly as the
    user left it; no code is required on our part to reestablish state. In an action
    game, you might want to pause the game when the application is brought to the
    foreground; this will give the user a chance to reorient before play resumes.
    Either way, we return to the application flow presented in [Figure 3-1](#9781430244226_Ch03.xhtml#Fig1).    If
    the application was not already running, we show the load screen as normal, and
    then we check to see if the game state was archived. If yes, we want to unarchive
    the game state and show the Continue button. We then continue with the flow presented
    in [Figure 3-1](#9781430244226_Ch03.xhtml#Fig1). To support the case where we
    need to unarchive the game state, we obviously need to archive it at some point.
    Let’s start by looking at the archive logic, and then looking at the unarchive
    logic.    Archiving and Unarchiving Game State    In our sample application, we
    store the state of our game in a class called `CoinsGame`. We are going to save
    some of the implementation details of this class for the next chapter, but because
    we know it is being archived and unarchived, we know it probably conforms to the
    `NSCoding` protocol. And indeed it does—[Listing 3-17](#9781430244226_Ch03.xhtml#list17)
    shows the implementation of the two `NSCoding` tasks.    **[Listing 3-17](#9781430244226_Ch03.xhtml#_list17).** CoinsGame.m
    (encodeWithCoder: and initWithCoder:)    ``` - (void)encodeWithCoder:(NSCoder
    *)encoder{      [encoder encodeObject:coins forKey:@"coins"];     [encoder encodeInt:remaingTurns
    forKey:@"remaingTurns"];     [encoder encodeInt:score forKey:@"score"];     [encoder
    encodeInt:colCount forKey:@"colCount"];     [encoder encodeInt:rowCount forKey:@"rowCount"];
    } - (id)initWithCoder:(NSCoder *)decoder{      coins = [[decoder decodeObjectForKey:@"coins"]
    retain];     remaingTurns = [decoder decodeIntForKey:@"remaingTurns"];     score
    = [decoder decodeIntForKey:@"score"];     colCount = [decoder decodeIntForKey:@"colCount"];
        rowCount = [decoder decodeIntForKey:@"rowCount"];     return self; } ```    In
    [Listing 3-17](#9781430244226_Ch03.xhtml#list17), we see the task used by `CoinsGame`
    to support archiving and unarchiving. In each task, a number of properties are
    encoded or decoded—nothing too surprising there, presumably. An object can be
    archived at any point in the application life cycle, but there are special tasks
    that are called when an application is either closing or terminating. These are
    the following:    ``` - (void)applicationWillTerminate:(UIApplication *)application
    - (void)applicationDidEnterBackground:(UIApplication *)application ```    The
    task `applicationWillTerminate:` is called just before the application is terminated.'
  trans: "\n另外，还有一个便捷构造方法，可快速创建同时填充了这两个属性的 `Score` 对象。如前所述，为了使归档过程正常工作，`Score` 类必须遵循\
    \ `NSCoding` 协议。列表 3-15 展示了 `Score` 类的实现。\n\n**列表 3-15.** Score.m\n```\n#import\
    \ \"Score.h\"\n\n@implementation Score\n@synthesize date;\n@synthesize score;\n\
    \n+(id)score:(int)aScore At:(NSDate*)aDate{\n    Score* highscore = [[Score alloc]\
    \ init];\n    [highscore setScore:aScore];\n    [highscore setDate:aDate];\n \
    \   return highscore;\n}\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder\
    \ encodeObject:date forKey:@\"date\"];\n    [encoder encodeInt:score forKey:@\"\
    score\"];\n}\n- (id)initWithCoder:(NSCoder *)decoder{\n    date = [[decoder decodeObjectForKey:@\"\
    date\"] retain];\n    score = [decoder decodeIntForKey:@\"score\"];\n    return\
    \ self;\n}\n- (NSComparisonResult)compare:(id)otherObject {\n    Score* otherScore\
    \ = (Score*)otherObject;\n    if (score > [otherScore score]){\n        return\
    \ NSOrderedAscending;\n    } else if (score < [otherScore score]){\n        return\
    \ NSOrderedDescending;\n    } else {\n        return NSOrderedSame;\n    }\n}\n\
    @end\n```\n列表 3-15 向我们展示了几个要点。我们看到 `score:At:` 的实现只是简单地创建了一个新的 `Score` 对象并填充属性。任务\
    \ `compare:` 被 `Highscores` 用来对 `Score` 对象进行排序（参见列表 3-13 中的 `addScore` 任务）。我们还看到了现在熟悉的归档和解档任务：`encodeWithCoder:`\
    \ 和 `initWithCoder:`。对于 `Score` 类，我们使用 `NSCoder` 的对象方法来存储 `NSDate date`。对于 `int\
    \ score`，我们必须使用特殊任务，因为 `int` 不是对象。`NSCoder` 为原始类型提供了特殊任务。在我们的例子中，我们使用了 `decodeInt:ForKey:`\
    \ 和 `encodeInt:ForKey:`。对于其他原始类型，例如 `BOOL`、`float`、`double` 等，也存在类似的任务。\n\n我们已经了解了希望进行归档（和解档）的类所需的实现，但还没有了解如何实际从用户的偏好设置中解档一个对象。列表\
    \ 3-16 展示了在 `HighscoreController` 类中是如何完成此操作的。\n\n**列表 3-16.** HighscoreController（viewDidLoad）\n\
    ```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    [highscores release];\n\
    \n    NSData* highscoresData = [[NSUserDefaults standardUserDefaults] dataForKey:KEY_HIGHSCORES];\n\
    \n    if (highscoresData == nil){\n        highscores = [[[Highscores alloc] initWithDefaults]\
    \ retain];\n        [self saveHighscores];\n    } else {\n        highscores =\
    \ [[NSKeyedUnarchiver unarchiveObjectWithData: highscoresData] retain];\n    }\n\
    \    [self layoutScores:nil];\n}\n```\n当 `HighscoreController` 的视图被加载时，会调用列表 3-16\
    \ 中的 `viewDidLoad` 任务。在此任务中，我们希望准备好 `HighscoreController` 以供使用。这意味着要确保 `highscores`\
    \ 处于可用且准确的状态，并且我们希望布局当前的最高分集合，以防在此视图显示之前尚未添加新的 `Score`。为了检索当前的最高分，我们从 `NSUserDefaults`\
    \ 对象（通过调用 `standardUserDefaults` 返回）中读取了一个 `NSData` 对象。如果该 `NSData` 对象是 `nil`（这种情况会在你首次运行应用程序时发生），我们会初始化一个新的\
    \ `Highscores` 对象并立即保存它。如果该 `NSData` 对象不是 `nil`，我们则通过调用 `NSKeyedUnarchiver` 的任务\
    \ `unarchiveObjectWithData` 来解档它，并保留结果。\n\n在本节中，我们已经了解了如何对对象进行归档和解档。现在，我们将运用相同的原理来展示如何归档和解档我们的游戏状态。\n\
    \n## 保存游戏状态\n\n随着 iOS 设备上后台执行的到来，保存游戏或应用程序状态的重要性有所降低。但一个功能齐全且用户友好的应用程序，如果被终止，应该能够优雅地处理状态恢复。保存状态所需的步骤与存储其他类型的数据实际上并没有太大区别。这是许多应用程序的一个关键特性。\n\
    \n我们首先需要理解的是，何时应该尝试恢复状态或归档状态。图 3-11 是一个流程图，描述了示例应用程序在初始化方面的生命周期。\n\n![9781430244226_Fig03-11.jpg](img/9781430244226_Fig03-11.jpg)\n\
    \n图 3-11.  示例应用程序的初始化生命周期\n\n在图 3-11 中，我们看到所有应用程序都是通过用户点击应用程序图标启动的。然后，会发生两种情况之一：要么应用程序（如果已在后台运行）会被带到前台；要么应用程序将全新启动。如果应用程序已经在运行，它就会完全按照用户离开时的样子显示在屏幕上；我们不需要编写任何代码来重新建立状态。在动作游戏中，你可能希望在应用程序被带到前台时暂停游戏；这会给用户在恢复游戏前一个重新适应的机会。无论哪种方式，我们都会回到图\
    \ 3-1 中展示的应用程序流程。\n\n如果应用程序尚未运行，我们会正常显示加载屏幕，然后检查游戏状态是否已被归档。如果是，我们希望解档游戏状态并显示“继续”按钮。然后，我们继续执行图\
    \ 3-1 中展示的流程。为了支持需要解档游戏状态的情况，我们显然需要在某个时间点对其进行归档。让我们先来看一下归档逻辑，然后再看解档逻辑。\n\n## 归档和解档游戏状态\n\
    \n在示例应用程序中，我们将游戏状态存储在一个名为 `CoinsGame` 的类中。我们将把这个类的一些实现细节留到下一章介绍，但由于我们知道它正在被归档和解档，因此我们知道它可能遵循\
    \ `NSCoding` 协议。事实也确实如此——列表 3-17 展示了两个 `NSCoding` 任务的实现。\n\n**列表 3-17.** CoinsGame.m（encodeWithCoder:\
    \ 和 initWithCoder:）\n```\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder\
    \ encodeObject:coins forKey:@\"coins\"];\n    [encoder encodeInt:remaingTurns\
    \ forKey:@\"remaingTurns\"];\n    [encoder encodeInt:score forKey:@\"score\"];\n\
    \    [encoder encodeInt:colCount forKey:@\"colCount\"];\n    [encoder encodeInt:rowCount\
    \ forKey:@\"rowCount\"];\n}\n- (id)initWithCoder:(NSCoder *)decoder{\n    coins\
    \ = [[decoder decodeObjectForKey:@\"coins\"] retain];\n    remaingTurns = [decoder\
    \ decodeIntForKey:@\"remaingTurns\"];\n    score = [decoder decodeIntForKey:@\"\
    score\"];\n    colCount = [decoder decodeIntForKey:@\"colCount\"];\n    rowCount\
    \ = [decoder decodeIntForKey:@\"rowCount\"];\n    return self;\n}\n```\n在列表 3-17\
    \ 中，我们看到 `CoinsGame` 用于支持归档和解档的任务。在每个任务中，都会对许多属性进行编码或解码——想必这没什么令人惊讶的。对象可以在应用程序生命周期的任何时间点进行归档，但是当应用程序即将关闭或终止时，会调用一些特殊任务。它们如下所示：\n\
    \n```\n- (void)applicationWillTerminate:(UIApplication *)application\n- (void)applicationDidEnterBackground:(UIApplication\
    \ *)application\n```\n\n`applicationWillTerminate:` 任务恰好在应用程序被终止之前被调用。\n"
- fmt: "其同级任务`applicationDidEnterBackground:`类似，但在应用被发送到后台时调用。如果你的应用支持后台执行（新项目中的默认设置），则不会调用`applicationWillTerminate:`；你必须将归档逻辑放在`applicationDidEnterBackground:`中。这是因为用户可能随时在后台退出应用，因此在应用完全活跃时预先处理记账工作是合理的。应用委托还有许多其他生命周期任务可用。当你在Xcode中创建新项目时，这些任务会自动添加到你的应用委托类中，并附有良好的文档。\n\
    \n### 实现生命周期任务\n\n由于我们的应用支持后台执行，我们将归档逻辑放入`applicationDidEnterBackground:`任务中，如[清单\
    \ 3-18](#9781430244226_Ch03.xhtml#list18)所示。\n\n**[清单 3-18](#9781430244226_Ch03.xhtml#_list18).**\
    \ `Sample_03AppDelegate.m` (`applicationDidEnterBackground:`)\n\n```objective-c\n\
    - (void)applicationDidEnterBackground:(UIApplication *)application {\n    NSString*\
    \ gameArchivePath = [self gameArchivePath];\n    [NSKeyedArchiver archiveRootObject:[gameController\
    \ currentGame] toFile: gameArchivePath];\n}\n```\n\n为了归档游戏状态，[清单 3-18](#9781430244226_Ch03.xhtml#list18)显示我们再次使用`NSKeyedArchiver`类归档`CoinsGame`对象，但这次将其归档到文件中。变量`gameArchivePath`是我们将用作存档的文件的路径。我们通过调用任务`gameArchivePath`获得此路径，如[清单\
    \ 3-19](#9781430244226_Ch03.xhtml#list19)所示。\n\n**[清单 3-19](#9781430244226_Ch03.xhtml#_list19).**\
    \ `Sample_03AppDelegate.m` (`gameArchivePath`)\n\n```objective-c\n-(NSString*)gameArchivePath{\n\
    \    NSArray* paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString* documentDirPath = [paths objectAtIndex:0];\n\
    \    return [documentDirPath stringByAppendingPathComponent:@\"GameArchive\"];\n\
    }\n```\n\n[清单 3-19](#9781430244226_Ch03.xhtml#list19)中的`gameArchivePath`任务显示，我们使用函数`NSSearchPathForDirectoriesInDomains`，并传入`NSDocumentDirectory`，与`NSUserDomainMask`进行掩码操作。结尾的`YES`表示我们希望用于指示用户主目录的波浪号被扩展为完整路径。iOS设备上的每个应用都有一个根目录，可以从中读取和写入文件。通过获取路径`NSArray`中的第零个元素，我们可以访问该目录。我们只需指定要使用的文件名，将`NSString`传递给`documentDirPath`的`stringByAppendingPathComponent`任务即可。\n\
    \n当我们解归档`CoinsGame`对象时，显然也需要存档文件的路径。[清单 3-20](#9781430244226_Ch03.xhtml#list20)显示了我们在何处解归档此对象。\n\
    \n**[清单 3-20](#9781430244226_Ch03.xhtml#_list20).** `Sample_03AppDelegate.m` (`application:didFinishLaunchingWithOptions:`)\n\
    \n```objective-c\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n    NSString* gameArchivePath = [self gameArchivePath];\n\
    \    CoinsGame* existingGame;\n    @try {\n        existingGame = [[NSKeyedUnarchiver\
    \ unarchiveObjectWithFile:gameArchivePath] retain];\n    }\n    @catch (NSException\
    \ *exception) {\n        existingGame = nil;\n    }\n    [gameController setPreviousGame:existingGame];\n\
    \    [existingGame release];\n    [self.window makeKeyAndVisible];\n    return\
    \ YES;\n}\n```\n\n在[清单 3-20](#9781430244226_Ch03.xhtml#list20)中，我们看到的是当我们的应用完全加载并准备就绪时调用的任务。你会想起上一章的最后两行：它们将`UIWindow`放到屏幕上，并返回一切正常。任务的前面部分与解归档游戏状态有关。\n\
    \n使用`gameArchivePath`，我们在类`NSKeyedUnarchiver`上调用`unarchiveObjectFromFile`。如果之前归档的`CoinsGame`对象存在，则返回该对象。如果这是应用首次运行，`existingGame`将为`nil`。此外，如果发生异常，我们也将`existingGame`设置为`nil`，因为我们知道在`gameController`上调用`setPreviousGame`可以处理`nil`值。为了完成这个流程，让我们看看`GameController`如何处理这个解归档后的`CoinsGame`，如[清单\
    \ 3-21](#9781430244226_Ch03.xhtml#list21)所示。\n\n**[清单 3-21](#9781430244226_Ch03.xhtml#_list21).**\
    \ `GameController.m` (`setPreviousGame:`)\n\n```objective-c\n-(void)setPreviousGame:(CoinsGame*)aCoinsGame{\n\
    \    previousGame = [aCoinsGame retain];\n\n    if (previousGame != nil && [previousGame\
    \ remaingTurns] > 0){\n        [continueButton setHidden:NO];\n    } else {\n\
    \        [continueButton setHidden:YES];\n    }\n}\n```\n\n在[清单 3-21](#9781430244226_Ch03.xhtml#list21)中，我们看到传入的`CoinsGame`被保存为本地字段`previousGame`并进行了保留。如果`previousGame`不为`nil`并且还有剩余回合，我们显示按钮`continueButton`；否则将其隐藏。一旦用户看到欢迎视图，他们将能够从之前离开的地方继续玩游戏。\n\
    \n### 总结\n\n在本章中，我们探讨了完整游戏所需的支持元素。这些元素包括建立应用程序的流程以及管理构成此流程的视图。我们研究了一种协调游戏行为的方法，例如分数变化或游戏结束，并使用委托模式与应用程序的其余部分进行交互。我们还研究了两种持久化数据的方式：通过用户设置或在磁盘上存储对象。这两种技术都使用了协议`NSCoding`提供的相同归档和解归档技术。\n\
    \n## 第四章 快速构建一个输入驱动的游戏\n\n所有游戏都由用户输入驱动，但根据游戏在用户操作之间的行为方式，游戏可以分为两种类型。一种是动作游戏，无论用户是否提供输入，屏幕上的事件都会展开。动作游戏将在[第5章](#9781430244226_Ch05.xhtml)中探讨。在本章中，我们将讨论等待用户做出选择的游戏。这类游戏包括益智游戏和策略游戏。在本章中，我们将其称为输入驱动的游戏。\n\
    \n尽管输入驱动游戏的酷炫程度确实低于动作游戏，但市场上有很多成功的此类游戏。从扫雷到数独再到愤怒的小鸟，这类游戏吸引了大量用户，因此了解如何实现此类游戏非常重要。[图4-1](#9781430244226_Ch04.xhtml#Fig1)展示了输入驱动游戏的典型生命周期。\n\
    \n![9781430244226_Fig04-01.jpg](images/9781430244226_Fig04-01.jpg)\n\n[图4-1.](#9781430244226_Ch04.xhtml#_Fig1)\
    \ Coin Sorter——一个简单的输入驱动游戏\n\n在[图4-1](#9781430244226_Ch04.xhtml#Fig1)中，在任何初始设置之后，应用程序等待用户采取某些操作。当用户执行操作时，游戏状态会更新，并创建动画来反映用户的操作。由此用户操作创建的动画可以很简单，例如高亮选择，也可以很复杂，例如完整的物理模拟。动画完成后，应用程序测试是否已到达游戏结束。如果尚未结束，应用程序将再次等待用户输入。\n\
    \n在本章中，你将探索如何创建遵循[图4-1](#9781430244226_Ch04.xhtml#Fig1)概述的流程的游戏。你还将了解将内容显示到屏幕上以及创建动画的细节。\n\
    \n### 探索如何将内容显示到屏幕上\n\n在上一章中，我们组装了视图以创建一个完整的应用程序。"
  raw: 'Its cousin task `applicationDidEnterBackground:` is similar, but it is called
    when the application is sent to the background. If your application supports background
    execution (the default in new projects), the task `applicationWillTerminate:`
    will not be called; you must put your archiving logic in `applicationDidEnterBackground:`.
    This is the case because a user can exit an application in the background at any
    point; so it makes sense to have the bookkeeping taken care of beforehand, while
    the application is fully active. There are a number of other life cycle tasks
    available to app delegates. When you create a new project in Xcode, these tasks
    are automatically added to your app delegate class with nice documentation.    Implementing
    Life Cycle Tasks    Because our application supports background execution, we
    put the archiving logic into the `applicationDidEnterBackground:` task, as shown
    in [Listing 3-18](#9781430244226_Ch03.xhtml#list18).    **[Listing 3-18](#9781430244226_Ch03.xhtml#_list18).** Sample_03AppDelegate.m
    (applicationDidEnterBackground:)    ``` - (void)applicationDidEnterBackground:(UIApplication
    *)application {     NSString* gameArchivePath = [self gameArchivePath];     [NSKeyedArchiver
    archiveRootObject:[gameController currentGame] toFile: gameArchivePath]; } ```    To
    archive our game state, [Listing 3-18](#9781430244226_Ch03.xhtml#list18) shows
    that we again use the `NSKeyedArchiver` class to archive our `CoinsGame` object,
    but this time we archive it to a file. The variable `gameArchivePath` is the path
    to the file we are going to use as our archive. We get this path by calling the
    task `gameArchivePath`, as shown in [Listing 3-19](#9781430244226_Ch03.xhtml#list19).    **[Listing
    3-19](#9781430244226_Ch03.xhtml#_list19).** Sample_03AppDelegate.m (gameArchivePath)    ```
    -(NSString*)gameArchivePath{     NSArray* paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,
    NSUserDomainMask, YES);     NSString* documentDirPath = [paths objectAtIndex:0];
        return [documentDirPath stringByAppendingPathComponent:@"GameArchive"]; }
    ```    The `gameArchivePath` task from [Listing 3-19](#9781430244226_Ch03.xhtml#list19)
    shows that we use the function `NSSearchPathForDirectoriesInDomains` and pass
    the `NSDocumentDirectory`, masked with the `NSUserDomainMask`. The YES at the
    end indicates that we want the tilde that is used to indicate the user’s home
    directory to be expanded into the full path. Each application on an iOS device
    is given a root directory to which files can be read and written. By getting the
    zero items out of the path’s `NSArray`, we get access to that directory. We simply
    specify the name of the file we want to use passing an `NSString` to the `stringByAppendingPathComponent`
    task of `documentDirPath`.    We obviously need the path to the archive file when
    we unarchive the `CoinsGame` object as well. [Listing 3-20](#9781430244226_Ch03.xhtml#list20)
    shows where we unarchive this object.    **[Listing 3-20](#9781430244226_Ch03.xhtml#_list20).** Sample_03AppDelegate.m(application:
    didFinishLaunchingWithOptions:)    ``` - (BOOL)application:(UIApplication *)application
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {      NSString* gameArchivePath
    = [self gameArchivePath];     CoinsGame* existingGame;     @try {         existingGame
    = [[NSKeyedUnarchiver unarchiveObjectWithFile:gameArchivePath] retain];     }
        @catch (NSException *exception) {         existingGame = nil;     }     [gameController
    setPreviousGame:existingGame];     [existingGame release];     [self.window makeKeyAndVisible];
        return YES; } ```    In [Listing 3-20](#9781430244226_Ch03.xhtml#list20),
    we are looking at the task that is called when our application is fully loaded
    and ready to go. You will recall the last two lines from the previous chapter:
    they put the `UIWindow` on the screen and return that everything is okay. The
    earlier part of the task is concerned with unarchiving our game state.


    Using the `gameArcivePath`, we call `unarchiveObjectFromFile` on the class `NSKeyedUnarchiver`.
    This returns our previously archived `CoinsGame` object, if it exists. If this
    is the first time the application was run, `existingGame` will be `nil`. Additionally,
    if an exception occurred, we set `existingGame` to `nil` as well, because we know
    that calling `setPreviousGame` on `gameController` can handle a `nil` value. To
    complete the cycle, let’s take a look at `GameController` and see what it does
    with this unarchived `CoinsGame, as shown` in [Listing 3-21](#9781430244226_Ch03.xhtml#list21).    **[Listing
    3-21](#9781430244226_Ch03.xhtml#_list21).** GameController.m(setPreviousGame:)    ```
    -(void)setPreviousGame:(CoinsGame*)aCoinsGame{     previousGame = [aCoinsGame
    retain];      if (previousGame != nil && [previousGame remaingTurns] > 0){         [continueButton
    setHidden:NO];     } else {         [continueButton setHidden:YES];     } } ```    In
    [Listing 3-21](#9781430244226_Ch03.xhtml#list21), we see that the passed in `CoinsGame`
    is saved as the local field `previousGame` and retained. If `previousGame` is
    not `nil` and there are turns remaining, we display the button `continueButton`;
    otherwise, we hide it. Once the user is shown the Welcome view, they will be able
    to continue playing the game where they left off.    Summary    In this chapter,
    we explored supporting elements required by a complete game. These included establishing
    a flow of an application and managing the views that constitute this flow. We
    looked at a way to coordinate the game behaviors, such as a change in score, or
    the end of a game with the rest of the application using the delegate pattern.
    We also looked at two ways of persisting data: through the user settings or by
    storing an object on disk. Both techniques use the same archiving and unarchiving
    techniques provided by the protocol `NSCoding`.    Chapter     4    Quickly Build
    an Input-Driven Game    All games are driven by user input, but depending on how
    the game behaves between user actions, a game may be one of two types. One type
    is the action game, in which the events on the screen unfold whether or not the
    user provides any input. Action games are explored in [Chapter 5](#9781430244226_Ch05.xhtml).
    In this chapter, we are going to look at games that wait for the user to make
    a choice. Games of this type include puzzle games and strategy games. In this
    chapter, we refer to them as input-driven games.    Although the coolness factor
    of input-driven games is definitely less than that of action games, many successful
    games of this type are on the market. From Minesweeper to Sudoku to Angry Birds,
    these types of games have captured large audiences, and so it is important to
    understand how this type of game is implemented. [Figure 4-1](#9781430244226_Ch04.xhtml#Fig1)
    shows the typical life cycle of an input-driven game.    ![9781430244226_Fig04-01.jpg](images/9781430244226_Fig04-01.jpg)    [Figure
    4-1.](#9781430244226_Ch04.xhtml#_Fig1)  Coin Sorter—a simple input-driven game    In
    [Figure 4-1](#9781430244226_Ch04.xhtml#Fig1), after any initial setup, the application
    waits for a user to take some action. When the user does something, the game state
    is updated, and animations are created to reflect the user’s action. The animation
    created by this user action can be simple, such as highlighting a selection, or
    complex, like an entire physics simulation. After the animation is completed,
    the application tests to see whether the end of the game has been reached. If
    it has not, the application once again waits for user input.    In this chapter,
    you will explore how to create a game that follows the process outlined in [Figure
    4-1](#9781430244226_Ch04.xhtml#Fig1). You will also look at the details of getting
    content onto the screen and creating animations.    **Exploring How to Get Content
    on the Screen**    In the preceding chapter, we assembled views to create a complete
    application.'
  trans: "\n其同级任务`applicationDidEnterBackground:`类似，但在应用被发送到后台时调用。如果你的应用支持后台执行（新项目中的默认设置），则不会调用`applicationWillTerminate:`；你必须将归档逻辑放在`applicationDidEnterBackground:`中。这是因为用户可能随时在后台退出应用，因此在应用完全活跃时预先处理记账工作是合理的。应用委托还有许多其他生命周期任务可用。当你在\
    \ Xcode 中创建新项目时，这些任务会自动添加到你的应用委托类中，并附有良好的文档。\n\n### 实现生命周期任务\n\n由于我们的应用支持后台执行，我们将归档逻辑放入`applicationDidEnterBackground:`任务中，如清单\
    \ 3-18 所示。\n\n**清单 3-18.** `Sample_03AppDelegate.m` (`applicationDidEnterBackground:`)\n\
    \n```objective-c\n- (void)applicationDidEnterBackground:(UIApplication *)application\
    \ {\n    NSString* gameArchivePath = [self gameArchivePath];\n    [NSKeyedArchiver\
    \ archiveRootObject:[gameController currentGame] toFile: gameArchivePath];\n}\n\
    ```\n\n为了归档游戏状态，清单 3-18 显示我们再次使用`NSKeyedArchiver`类归档`CoinsGame`对象，但这次将其归档到文件中。变量`gameArchivePath`是我们将用作存档的文件的路径。我们通过调用任务`gameArchivePath`获得此路径，如清单\
    \ 3-19 所示。\n\n**清单 3-19.** `Sample_03AppDelegate.m` (`gameArchivePath`)\n\n```objective-c\n\
    -(NSString*)gameArchivePath{\n    NSArray* paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString* documentDirPath = [paths objectAtIndex:0];\n\
    \    return [documentDirPath stringByAppendingPathComponent:@\"GameArchive\"];\n\
    }\n```\n\n清单 3-19 中的`gameArchivePath`任务显示，我们使用函数`NSSearchPathForDirectoriesInDomains`，并传入`NSDocumentDirectory`，与`NSUserDomainMask`进行掩码操作。结尾的`YES`表示我们希望用于指示用户主目录的波浪号被扩展为完整路径。iOS\
    \ 设备上的每个应用都有一个根目录，可以从中读取和写入文件。通过获取路径`NSArray`中的第零个元素，我们可以访问该目录。我们只需指定要使用的文件名，将`NSString`传递给`documentDirPath`的`stringByAppendingPathComponent`任务即可。\n\
    \n当我们解归档`CoinsGame`对象时，显然也需要存档文件的路径。清单 3-20 显示了我们在何处解归档此对象。\n\n**清单 3-20.** `Sample_03AppDelegate.m`\
    \ (`application:didFinishLaunchingWithOptions:`)\n\n```objective-c\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \    NSString* gameArchivePath = [self gameArchivePath];\n    CoinsGame* existingGame;\n\
    \    @try {\n        existingGame = [[NSKeyedUnarchiver unarchiveObjectWithFile:gameArchivePath]\
    \ retain];\n    }\n    @catch (NSException *exception) {\n        existingGame\
    \ = nil;\n    }\n    [gameController setPreviousGame:existingGame];\n    [existingGame\
    \ release];\n    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n\
    在清单 3-20 中，我们看到的是当我们的应用完全加载并准备就绪时调用的任务。你会想起上一章的最后两行：它们将`UIWindow`放到屏幕上，并返回一切正常。任务的前面部分与解归档游戏状态有关。\n\
    \n使用`gameArchivePath`，我们在类`NSKeyedUnarchiver`上调用`unarchiveObjectFromFile`。如果之前归档的`CoinsGame`对象存在，则返回该对象。如果这是应用首次运行，`existingGame`将为`nil`。此外，如果发生异常，我们也将`existingGame`设置为`nil`，因为我们知道在`gameController`上调用`setPreviousGame`可以处理`nil`值。为了完成这个流程，让我们看看`GameController`如何处理这个解归档后的`CoinsGame`，如清单\
    \ 3-21 所示。\n\n**清单 3-21.** `GameController.m` (`setPreviousGame:`)\n\n```objective-c\n\
    -(void)setPreviousGame:(CoinsGame*)aCoinsGame{\n    previousGame = [aCoinsGame\
    \ retain];\n\n    if (previousGame != nil && [previousGame remaingTurns] > 0){\n\
    \        [continueButton setHidden:NO];\n    } else {\n        [continueButton\
    \ setHidden:YES];\n    }\n}\n```\n\n在清单 3-21 中，我们看到传入的`CoinsGame`被保存为本地字段`previousGame`并进行了保留。如果`previousGame`不为`nil`并且还有剩余回合，我们显示按钮`continueButton`；否则将其隐藏。一旦用户看到欢迎视图，他们将能够从之前离开的地方继续玩游戏。\n\
    \n### 总结\n\n在本章中，我们探讨了完整游戏所需的支持元素。这些元素包括建立应用程序的流程以及管理构成此流程的视图。我们研究了一种协调游戏行为的方法，例如分数变化或游戏结束，并使用委托模式与应用程序的其余部分进行交互。我们还研究了两种持久化数据的方式：通过用户设置或在磁盘上存储对象。这两种技术都使用了协议`NSCoding`提供的相同归档和解归档技术。\n\
    \n## 第四章 快速构建一个输入驱动的游戏\n\n所有游戏都由用户输入驱动，但根据游戏在用户操作之间的行为方式，游戏可以分为两种类型。一种是动作游戏，无论用户是否提供输入，屏幕上的事件都会展开。动作游戏将在第\
    \ 5 章中探讨。在本章中，我们将讨论等待用户做出选择的游戏。这类游戏包括益智游戏和策略游戏。在本章中，我们将其称为输入驱动的游戏。\n\n尽管输入驱动游戏的酷炫程度确实低于动作游戏，但市场上有很多成功的此类游戏。从扫雷到数独再到愤怒的小鸟，这类游戏吸引了大量用户，因此了解如何实现此类游戏非常重要。图\
    \ 4-1 展示了输入驱动游戏的典型生命周期。\n\n![9781430244226_Fig04-01.jpg](img/9781430244226_Fig04-01.jpg)\n\
    \n图 4-1. Coin Sorter——一个简单的输入驱动游戏\n\n在图 4-1 中，在任何初始设置之后，应用程序等待用户采取某些操作。当用户执行操作时，游戏状态会更新，并创建动画来反映用户的操作。由此用户操作创建的动画可以很简单，例如高亮选择，也可以很复杂，例如完整的物理模拟。动画完成后，应用程序测试是否已到达游戏结束。如果尚未结束，应用程序将再次等待用户输入。\n\
    \n在本章中，你将探索如何创建遵循图 4-1 概述的流程的游戏。你还将了解将内容显示到屏幕上以及创建动画的细节。\n\n### 探索如何将内容显示到屏幕上\n\
    \n在上一章中，我们组装了视图以创建一个完整的应用程序。\n"
- fmt: "We used Interface Builder to create UI elements, and for the most part, simply\
    \ replaced one view with another to move the user from view to view. In this chapter,\
    \ we are going to take a closer look at the `UIView` and how it can be used to\
    \ programmatically create dynamic content. This includes an exploration of how\
    \ to place components on the screen as well as animate them.\n\n## Understanding\
    \ `UIView`\n\nThe class `UIView` is the base component class of UIKit. All other\
    \ UI elements, such as buttons, switches, and scroll views, to name a few, are\
    \ subclasses of `UIView`. Even the class `UIWindow` is a subclass of `UIView`,\
    \ so when we manipulate content on the screen, a lot of what we will be doing\
    \ is interacting with the `UIView` class.\n\nThe `UIView` class works a lot like\
    \ the base UI component class in other programming environments. Each `UIView`\
    \ defines a region of the screen and has a number of children, or subviews, which\
    \ are drawn relative to their parent. [Figure 4-2](#9781430244226_Ch04.xhtml#Fig2)\
    \ shows an example layout of `UIView` instances.\n\n![9781430244226_Fig04-02.jpg](images/9781430244226_Fig04-02.jpg)\n\
    \n[Figure 4-2.](#9781430244226_Ch04.xhtml#_Fig2) Nested `UIView` instances\n\n\
    In [Figure 4-2](#9781430244226_Ch04.xhtml#Fig2), you can see in the back the root\
    \ `UIWindow` for our sample application. When the user is seeing the game view,\
    \ the `UIWindow` has a single subview, which is the `view` property associated\
    \ with the `GameController` class. The `GameController` places the Portrait Play\
    \ view as a subview of its view when the user clicks the New Game button. The\
    \ Portrait Play view has five subviews, as defined in the XIB file. Four of these\
    \ subviews are `UILabel`s for displaying and tracking the user’s score and remaining\
    \ turns. The fifth `UIView` is the Portrait Game Holder view, which is responsible\
    \ for defining the region where the view from the `CoinsController` is placed.\
    \ The view from the `CoinsController` has several subviews, which make up the\
    \ interactive part of the game. You will be looking at those views in more detail\
    \ later, but for now, understand that those views are added to the scene in exactly\
    \ the same way as the rest of the views.\n\nAnother thing to notice about [Figure\
    \ 4-2](#9781430244226_Ch04.xhtml#Fig2) is that not all of the views are placed\
    \ in the same position relative to their parent. For example, the Portrait Play\
    \ view is placed at the upper left of the `GameController` view, while the Portrait\
    \ Game Holder view is placed about halfway down its parent, the Portrait Play\
    \ view. The property `frame` of the subview dictates where it is placed relative\
    \ to its parent. [Figure 4-3](#9781430244226_Ch04.xhtml#Fig3) shows this in more\
    \ detail.\n\n![9781430244226_Fig04-03.jpg](images/9781430244226_Fig04-03.jpg)\n\
    \n[Figure 4-3.](#9781430244226_Ch04.xhtml#_Fig3) The frame of a `UIView`\n\nAs\
    \ shown in [Figure 4-3](#9781430244226_Ch04.xhtml#Fig3), the frame of a `UIView`\
    \ describes not only the location of a subview, but also the size of the view.\
    \ Generally speaking, the `frame` is said to describe the region of a subview.\
    \ The property `frame` is a struct of type `CGRect` and is composed of two other\
    \ structs, `origin` and `size`. The field `origin` is of type `CGPoint` and describes\
    \ the location of the upper-left corner of the subview in terms of points. The\
    \ field `size` is of type `CGSize` and describes the number of points the subview\
    \ is wide and high.\n\n### Core Graphics Type Definitions\n\nCore Graphics defines\
    \ a number of types, structs, and functions. These include the previously mentioned\
    \ `CGRect`, `CGPoint`, and `CGSize`. [Listing 4-1](#9781430244226_Ch04.xhtml#list1)\
    \ shows the definitions of these three structs.\n\n[**Listing 4-1.**](#9781430244226_Ch04.xhtml#_list1)\
    \ `CGGeometry.h (CGRect, CGPoint, and CGSize)`\n\n```\n/* Points. */\nstruct CGPoint\
    \ {\n  CGFloat x;\n  CGFloat y;\n};\ntypedef struct CGPoint CGPoint;\n\n/* Sizes.\n\
    \n*/\nstruct CGSize {\n  CGFloat width;\n  CGFloat height;\n};\ntypedef struct\
    \ CGSize CGSize;\n\n/* Rectangles*/\n{\n  CGPoint origin;\n  CGSize size;\n};\n\
    typedef struct CGRect CGRect;\n```\n\n[Listing 4-1](#9781430244226_Ch04.xhtml#list1)\
    \ presents each of the core structs that define the region of a subview in relation\
    \ to its parent. These structs are defined in the file `CGGeometry.h`, which is\
    \ part of the Core Graphics framework, a standard part of any iOS project. Notice\
    \ that `x`, `y`, `width`, and `height` values are defined as `CGFloat`. The unit\
    \ for these values is points, not pixels. The difference is subtle at first, but\
    \ the idea here is that the coordinates and sizes you are specifying with these\
    \ values is meant to be resolution independent. Further discussion of points vs.\
    \ pixels can be found in Appendix A.\n\n**Tip:** The letters CG in the names of\
    \ structs such as `CGRect` refer to the Core Graphics framework. So a `CGRect`\
    \ is referred to as a Core Graphics Rect when you want to be precise.\n\nTo create\
    \ any of the base geometric types from [Listing 4-1](#9781430244226_Ch04.xhtml#list1),\
    \ an inline utility function is defined in `CGGeometry.h`, as seen in [Listing\
    \ 4-2](#9781430244226_Ch04.xhtml#list2).\n\n[**Listing 4-2.**](#9781430244226_Ch04.xhtml#_list2)\
    \ `CGGeometry.h (CGPointMake, CGSizeMake, and CGRectMake)`\n\n```\n/*** Definitions\
    \ of inline functions. ***/\n\nCG_INLINE CGPoint CGPointMake(CGFloat x, CGFloat\
    \ y) {\n  CGPoint p; p.x = x; p.y = y; return p;\n}\nCG_INLINE CGSize CGSizeMake(CGFloat\
    \ width, CGFloat height) {\n  CGSize size; size.width = width; size.height = height;\
    \ return size;\n}\nCG_INLINE CGRect CGRectMake(CGFloat x, CGFloat y, CGFloat width,\
    \ CGFloat height) {\n    CGRect rect;\n    rect.origin.x = x; rect.origin.y =\
    \ y;\n    rect.size.width = width; rect.size.height = height;\n    return rect;\n\
    }\n```\n\n[Listing 4-2](#9781430244226_Ch04.xhtml#list2) shows the utility functions\
    \ that can be used to create new geometry values. Only the definition is shown,\
    \ because the declaration of these functions is trivial. The type `CGFloat` is\
    \ defined simply as `float`. Presumably, this could be changed to support a different\
    \ architecture. Also, `CG_INLINE` is simply defined as `static inline`, indicating\
    \ that the compiler may inject a compiled version into the calling code.\n\n###\
    \ Using Core Graphics Types\n\nThe types and functions defined by Core Graphics\
    \ are pretty straightforward. Let’s look at an example to illustrate their use.\
    \ [Listing 4-3](#9781430244226_Ch04.xhtml#list3) shows one `UIView` being added\
    \ to another at a specific region.\n\n[**Listing 4-3.**](#9781430244226_Ch04.xhtml#_list3)\
    \ `Example of Adding a Subview and Specifying the Frame`\n\n```\nUIView* parentView\
    \ = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 480, 320)];\nUIView* subView\
    \ = [UIView new];\n\nCGRect frame = CGRectMake(200, 100, 30, 40);\n[subView setFrame:frame];\n\
    \n[parentView addSubview:subView];\n```\n\nIn [Listing 4-3](#9781430244226_Ch04.xhtml#list3),\
    \ we create two `UIView`s in two different ways. The `UIView parentView` is created\
    \ in the more standard of the two ways, by calling `alloc` and then calling `initWithFrame:`\
    \ and passing in a new `CGRect` to specify its location and size. Another perfectly\
    \ valid way to create a `UIView` is by simply calling `new` and then setting the\
    \ `frame` property, as we do for `subView`. The last thing done in this code snippet\
    \ is to add `subView` to `parentView` by calling `addSubview:`. The result would\
    \ be something like [Figure 4-3](#9781430244226_Ch04.xhtml#Fig3) shown earlier.\n\
    \nNow that you understand the basics of the `UIView` subclasses and how they are\
    \ nested and placed, you can take a look at a few basic animations. This will\
    \ give you the understanding required to explore our simple game.\n\n## Understanding\
    \ Animations\n\nThere are two key components to creating an event-driven game.\
    \ The first is creating animations, and the second is managing the game state.\
    \ There are several ways to create animations in an iOS application."
