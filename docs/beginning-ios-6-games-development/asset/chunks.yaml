  trans: "\n# 支持的图片尺寸\n\n表 A-2 列出了每种支持图片对应的正确尺寸。\n\n![image](img/TableA-2.jpg)\n\n\
    一旦你以正确的尺寸创建文件，就可以将它们拖拽到 Xcode 中的相应位置。Xcode 会自动将这些文件复制到项目目录（如果需要的话），并将它们添加到项目中。旧版本的\
    \ iOS 依赖命名约定来指定每个文件的用途。这种方式相当容易出错且难以维护。新版本的 iOS 和 Xcode 允许你随意命名文件。代码清单 A-2 展示了这些信息是如何在\
    \ `info.plist` 文件中表示的。\n\n**代码清单 A-2.** `Sample A–Info.plist`\n\n```\n<key>CFBundlePrimaryIcon</key>\n\
    \       <dict>\n             <key>CFBundleIconFiles</key>\n             <array>\n\
    \                    <string>my_icon_file.png</string>\n                    <string>my_icon_file_retina.png</string>\n\
    \                    <string>my_icon_file_ipad.png</string>\n             </array>\n\
    \             <key>UIPrerenderedIcon</key>\n             <false/>\n       </dict>\n\
    ```\n\n在代码清单 A-2 中，我们看到文件名被简单地存储在一个数组中。这些文件名是我自己命名的，可以是任何名字——它们并非由 Xcode 分配。\n\
    \n我们看了两个示例，演示了如何拥有一个逻辑图像，但其存在多个不同分辨率的不同版本。下一节将简要讨论如何以最佳方式创建不同分辨率的同一图像。\n\n## 多分辨率图像\n\
    \n在某些情况下，一个应用会有两个不同分辨率的图像文件，它们在应用中被用作同一个逻辑图像。这样做是为了让应用能够根据用户使用的设备提供最佳用户体验。对于任何应用来说，理想情况是以\
    \ 1:1 的比例（图像的像素数与屏幕像素数之比）显示图像。我们希望尽可能地避免缩放，因为缩放会产生质量较低的图像，并且是一种额外的、可能开销较大的操作。\n\
    \n苹果电脑似乎非常擅长缩放图像。如果你有机会，可以尝试在一台新的 27 英寸 iMac 上播放一张老式 DVD（非高清视频）。当以全屏模式播放时，图像被放大了很多，但看起来仍然非常出色。无论这种神奇的缩放算法是什么，它似乎也包含在\
    \ iOS 设备中。因此，人们很容易倾向于对所有内容都使用高清图像，然后让 iOS 在应用运行于低分辨率设备时将其缩小。这种方式是可行的；缩放后的图像质量非常好。然而，在涉及动画时，为低分辨率设备提供较小的图像确实能带来回报。请记住，iPhone\
    \ 3GS 不仅屏幕较小，其计算能力也比 iPhone 4 弱。如果让 iPhone 3GS 来缩小图像，你就相当于要求一台计算能力较弱的设备去做更多工作。在大多数情况下，维护两套图像是值得的。\n\
    \n在创建高分辨率和低分辨率图像集时，我们可以只创建高分辨率集，然后编写一个脚本来缩小每个图像，从而生成低分辨率版本。这种策略固然可以防止较慢的设备进行缩放，但可能会损害图像质量，尤其是在处理文本时。如果你的美术资源是某种渲染过程的一部分——例如，来自\
    \ 3D 表现图或矢量图——那么对每个图像进行两次渲染是合理的，一次用于高分辨率，再一次用于低分辨率。\n\n## 多分辨率示例\n\n让我们来看一个例子。假设你正在使用\
    \ Adobe Illustrator（或类似的应用程序）为你的应用创建一个图标。\n\n如果你创建一个 57 pt × 57 pt 的新文件，你可以将其导出为\
    \ 72 dpi 的图像，得到一个 57 像素 × 57 像素的图像——非常适合用作低分辨率的 iPhone 图标。然后，你可以再次将此图像导出为 144\
    \ dpi，得到一个 114 像素 × 114 像素的图像，这非常适合用于 iPhone 的视网膜屏幕版本。要为 iPad 制作图标，你可以再次导出为 92\
    \ dpi，得到一个 72 像素 × 72 像素的图像。图 A-10 展示了在不同比例下渲染与直接缩小的区别。\n\n![9781430244226_App-10.jpg](img/9781430244226_App-10.jpg)\n\
    \n**图 A-10.** 渲染与缩放\n\n在图 A-10 中，我们看到一个图标的三个不同版本。中间是矢量呈现，光滑漂亮。左侧是由 Illustrator\
    \ 在要求导出中间图像 57x57 版本时生成的图像。这个图像看起来像素化了，因为它是被放大后才让我们看到渲染质量的。右侧的图像是 Illustrator\
    \ 创建 114x114 图像，然后由 GIMP 将其缩小到 57x57（使用 Sinc Lanczos3 算法）的结果。即使是这个简单的两步过程也引入了噪点。请注意右侧字母\
    \ *i* 的点周围那些较亮的像素。也许在这个例子中影响不大，但在我看来，如果你打算花费时间（和金钱）来创建高质量的艺术作品，那么再多付出一些努力来防止这类问题是值得的。\n\
    \n遵循这里关于质量和渲染的理念，下一节将引导你完成一个示例，说明如何为应用选择最终的图像尺寸。\n\n## 创建最终资源\n\n我们已经了解了如何表示具有多分辨率的图像以及为什么这很重要。但是，当涉及到游戏美术时，我们仍然没有回答这个问题：“我的图像应该有多大？”\
    \ 在本节中，我们将以一个同时运行于 iPad 和两款 iPhone 上的示例游戏为例，找出该游戏中图像的最佳尺寸。我们将使用第 3 章中的游戏《Coin\
    \ Sorter》。\n\n由于我们处理的是三种可能的图像尺寸——一种用于 iPad，两种用于 iPhone——我们应该看看这些屏幕的相对尺寸（以像素为单位），并了解它们在尺寸上的差异。图\
    \ A-11 展示了不同的屏幕尺寸。\n\n![9781430244226_App-11.jpg](img/9781430244226_App-11.jpg)\n\
    \n**图 A-11.** 不同屏幕的相对分辨率\n\n在图 A-11 中，我们看到了一个矩形，分别代表了市场上各款 iOS 设备的屏幕尺寸。最左边的图像是\
    \ iPhone 3GS（及其前两代产品）的尺寸。左起第二个矩形显示的是 iPhone 4 的尺寸，其像素数是 iPhone 3GS 的四倍。第三个矩形代表了\
    \ iPad 1 和 iPad 2 的像素尺寸。请注意，iPhone 4 的像素数几乎与 iPad 1 和 iPad 2 相当。最右边的矩形是第三代 iPad\
    \ 的分辨率。接下来，让我们看看这些不同的尺寸如何影响我们布局游戏时的决策。\n\n### 屏幕可用空间\n\n虽然从像素角度看，我们有三种不同的屏幕尺寸，但实际上只有两种不同的宽高比。两款\
    \ iPhone 的宽高比相同，均为 2:3，而 iPad 的宽高比为 3:4。处理这些差异时，我们需要弄清楚如何布局我们的应用，以最大限度地利用屏幕空间。让我们从第\
    \ 3 章中游戏的布局开始看起，如图图 A-12 所示。\n\n![9781430244226_App-12.jpg](img/9781430244226_App-12.jpg)\n\
    \n**图 A-12.**\n"
- fmt: "# Coin Sorter on iPhone (retina) and iPad\n\nIn [Figure A-12](#9781430244226_App.xhtml#Fig12),\
    \ we see on the left the game running on the iPhone in landscape, and on the right\
    \ we see the game running on the iPad in landscape. In both cases, we use the\
    \ game area on the right surrounded by a gray border. Because the game area is\
    \ square, we have to figure out only one dimension, but we still have to figure\
    \ out the best sizes for our coin images based on how much space the game area\
    \ takes up. [Figure A-13](#9781430244226_App.xhtml#Fig13) shows the size of these\
    \ two areas and how it relates to the size of the coins.\n\n![9781430244226_App-13.jpg](images/9781430244226_App-13.jpg)\n\
    \n[Figure A-13.](#9781430244226_App.xhtml#_Fig13) Relative size of game area and\
    \ coin images in pixels\n\nIn [Figure A-13](#9781430244226_App.xhtml#Fig13), we\
    \ see the screen size of our three devices. For the two iPhone versions, the white\
    \ game areas with the thick gray borders are the same size in terms of points,\
    \ 300x300. Of course, the iPhone 4 version is 600x600 pixels versus the 300x300\
    \ pixels of the iPhone 3GS, but because we are concerned with finding the best\
    \ size for our images, we are concerned with pixels and not points. The size of\
    \ the game area on the right for the iPad 1 and iPad 2 is 720 pixels (and points).\
    \ So, to calculate the size of each coin image, we simply divide by 5. We get\
    \ 60x60 for the 3GS, 120x120 for the iPhone 4, and 144x144 for the iPads. [Figure\
    \ A-14](#9781430244226_App.xhtml#Fig14) shows one of the coin images in all three\
    \ sizes.\n\n![9781430244226_App-14.jpg](images/9781430244226_App-14.jpg)\n\n[Figure\
    \ A-14.](#9781430244226_App.xhtml#_Fig14) Coin in three different sizes\n\nIn\
    \ [Figure A-14](#9781430244226_App.xhtml#Fig14), we see three different versions\
    \ of the file `coin_circle0029`. By providing these different resolutions, we\
    \ have ensured that our images get rendered at a 1:1 ratio for the number of pixels\
    \ in the image versus the number of pixels on the screen. This assures we are\
    \ doing our part to render these images as best we can. Next, let’s take a look\
    \ at some of the tools used to create graphic assets.\n\n## Tools\n\nThe following\
    \ is a short description of three open source graphics tools that can be used\
    \ to create compelling graphic assets. These are the tools I have used to create\
    \ the majority of the art files for this book. Not only are these tools open source\
    \ but they run on Windows, OS X, Linux, and probably other platforms as well.\n\
    \n### GIMP\n\nThe GNU Image Manipulation Program (or GIMP) is an open-source image\
    \ editing application. It provides Adobe Photoshop-like functionality with the\
    \ low, low price of free. During game development, it is necessary to have an\
    \ image-manipulation program for many tasks. [Figure A-15](#9781430244226_App.xhtml#Fig15)\
    \ shows an example of the GIMP.\n\n![9781430244226_App-15.jpg](images/9781430244226_App-15.jpg)\n\
    \n[Figure A-15.](#9781430244226_App.xhtml#_Fig15) Adjusting the color of a spaceship\
    \ in GIMP\n\nIn [Figure A-15](#9781430244226_App.xhtml#Fig15), we see our spaceship\
    \ from previous chapters open in GIMP. GIMP allows you to adjust the color of\
    \ an image to make variations of it. In [Figure A-15](#9781430244226_App.xhtml#Fig15),\
    \ we started with a ship that had blue highlights and have converted them to green,\
    \ perhaps for a multi-player scenario.\n\nWith GIMP (`www.gimp.org`) you can:\n\
    \n*   View images\n*   Crop images\n*   Resize images\n*   Adjustment colors\n\
    *   Combine images\n*   Fine-tune images\n*   Perform the other thousand image-related\
    \ tasks in game development\n\n### Blender 3D\n\nBlender 3D is a 3D modeling tool\
    \ designed for creating 3D animations and assisting in 3D game development. For\
    \ 2D game development, Blender provides a great way to create art assets that\
    \ are very consistent.\n\nI personally can’t draw very well, but I have been able\
    \ to learn how to “draw” objects in Blender and let it do the hard work of applying\
    \ lighting, shading, reflections, and the other cool effects you get from a ray-traced\
    \ imaged. [Figure A-16](#9781430244226_App.xhtml#Fig16) shows Blender’s interface.\n\
    \n![9781430244226_App-16.jpg](images/9781430244226_App-16.jpg)\n\n[Figure A-16.](#9781430244226_App.xhtml#_Fig16)\
    \ Blender 3D\n\nIn [Figure A-16](#9781430244226_App.xhtml#Fig16), we see the UI\
    \ for Blender. I will be honest: there is a lot to learn about Blender. But it\
    \ is very rewarding to master each new technique with this application. The folks\
    \ who make Blender recently revamped the entire application, making it easier\
    \ to use. If you tried Blender in the past and got frustrated with it, give it\
    \ another shot. It is now a lot easier to use.\n\nWith Blender (`www.blender.org`)\
    \ you can:\n\n1.  Create 2D images to be used as actors in game\n2.  Pre-render\
    \ high-quality movies for cut scenes\n3.  Render high-quality background images\n\
    4.  Render sequences of image to created animated actors\n5.  Create isometric\
    \ tile sets\n\n### Inkscape\n\nInkscape is a vector drawing application. Although\
    \ most games won’t do a lot of vector drawing at runtime, vector editing applications\
    \ are very good at doing WYSIWYG layout. For laying out all of the great art you\
    \ created with GIMP and Blender, Inkscape can’t be beat. [Figure A-17](#9781430244226_App.xhtml#Fig17)\
    \ shows the Inkscape application.\n\n![9781430244226_App-17.jpg](images/9781430244226_App-17.jpg)\n\
    \n[Figure A-17.](#9781430244226_App.xhtml#_Fig17) Inkscape\n\nThe figure shows\
    \ my early layout work on the Welcome screen for the application Belt Commander.\
    \ As you can see, I have imported the star field image used throughout this book\
    \ and am starting to add the title text.\n\nWith Inkscape (`http://inkscape.org`)\
    \ you can:\n\n1.  Create text images\n2.  Lay out images and text relative to\
    \ each other\n3.  Create Welcome screens, Helps screens, and other static content\n\
    4.  Build wireframes and prototypes\n\n## Summary\n\nWe have reviewed some simple\
    \ concepts regarding style in our games. This appendix highlighted the importance\
    \ of consistent style by showing examples where style was maintained and examples\
    \ where it was not. We continued our discussion of graphics in our application\
    \ by showing how to add some basic support images to your application, including\
    \ an icon and launch screen. We discussed how to determine the correct size for\
    \ final art assets. We discussed why we should first lay out our game and then\
    \ calculate the size that each item will be. Lastly, we reviewed three open-source\
    \ applications that are very useful for creating content for your game.\n\n##\
    \ Index\n\n![images](images/square1.jpg) A\n\n[Abstracted UI](#9781430244226_Ch05.xhtml#cXXX.186)\n\
    * [actors](#9781430244226_Ch05.xhtml#cXXX.187)\n  * [asteroid 02](#9781430244226_Ch05.xhtml#cXXX.112a)\n\
    \  * [controlling actors](#9781430244226_Ch05.xhtml#cXXX.188)\n  * [implementation](#9781430244226_Ch05.xhtml#cXXX.189)\n\
    \  * [on screen](#9781430244226_Ch05.xhtml#cXXX.114a)\n  * [UIImage view](#9781430244226_Ch05.xhtml#cXXX.197)\n\
    \  * [UIView](#9781430244226_Ch05.xhtml#cXXX.196)\n  * [viper02](#9781430244226_Ch05.xhtml#cXXX.191)\n\
    * [Interface builder](#9781430244226_Ch05.xhtml#cXXX.195)\n\n[Actors](#9781430244226_Ch05.xhtml#cXXX.110a)\n\
    * [asteroid](#9781430244226_Ch05.xhtml#cXXX.192)\n* [behaviors](#9781430244226_Ch06.xhtml#cXXX.228)\n\
    * [ImageRepresentation](#9781430244226_Ch06.xhtml#cXXX.221)\n  * [correcting image](#9781430244226_Ch06.xhtml#cXXX.224)\n\
    \  * [delegate tasks](#9781430244226_Ch06.xhtml#cXXX.223)\n  * [powerup](#9781430244226_Ch06.xhtml#cXXX.222)\n\
    \  * [UIImage view](#9781430244226_Ch06.xhtml#cXXX.225)\n  * [updating view](#9781430244226_Ch06.xhtml#cXXX.226)\n\
    * [implementation](#9781430244226_Ch06.xhtml#cXXX."
