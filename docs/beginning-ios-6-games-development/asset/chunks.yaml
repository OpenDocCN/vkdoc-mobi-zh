    \ UI 元素。\n\n## 以通用方式图形化设计你的 UI\n\n在为 iPhone 和 iPad 构建应用程序时，我们必须考虑每种设备屏幕尺寸的差异。由于这两种设备的宽高比不同，我们确实应该为每种设备创建一个布局。在本节中，我们将介绍如何为每种设备类型创建布局，以及如何创建根据应用程序运行设备类型而使用的类。\n\
    \n`Xcode` 提供了一个便捷而强大的工具，用于布置应用程序的图形元素。从历史上看，这是由独立的应用程序 Interface Builder 完成的。在\
    \ `Xcode` 的最近版本中，Interface Builder 的功能已集成到 `Xcode` 中，以提供无缝的开发环境。尽管 Interface Builder\
    \ 不再是一个独立的应用程序，但我仍会继续使用这个术语来指代 `Xcode` 中的 UI 布局工具。这将有助于我们将 `Xcode` 的代码编辑部分与其所见即所得的元素区分开来。\n\
    \n本质上，Interface Builder 是一个用于创建对象集合以及这些对象之间连接集合的工具。这些对象是 UI 组件以及指定行为或数据的对象。这个对象集合保存在一种称为\
    \ XIB 的文件中。\n"
- fmt: '# XIB Files and Interface Builder


    XIB files are read at runtime in order to instantiate the objects defined within.
    The objects that are produced are “wired up” and ready to be used by the application.
    For example, in Interface Builder, you can add a button to the scene and specify
    that it should call a task on a specific object when clicked. This is handy because
    you don’t have to write the code that links the button with the handler object;
    everything is set up just as you defined it in the XIB file.


    **Note**: When searching for help on the Internet regarding Interface Builder,
    keep in mind that XIB files used to be called NIB files. Much of the information
    available uses this old term, but it is still valid. The same is true of Interface
    Builder; articles on the old version still give valuable insight into the new
    version.


    ## A First Look at Interface Builder


    Under the iPhone group in the Project Explorer is a file called `ViewController_iPhone.xib`.
    This file contains the starting visual components used in this project when the
    application is running on an iPhone. Similarly, there is a file called `ViewController_iPad.xib`
    found under the iPad group, which is used when the application is running on an
    iPad. Let’s focus on the iPhone version for now to see what this file is and how
    it works. Click `ViewController_iPhone.xib` and you should see something like
    [Figure 2-12](#9781430244226_Ch02.xhtml#Fig12).


    ![9781430244226_Fig02-12.jpg](images/9781430244226_Fig02-12.jpg)


    [Figure 2-12.](#9781430244226_Ch02.xhtml#_Fig12)  Interface Builder ready to edit
    `ViewController_iPhone.xib`


    In [Figure 2-12](#9781430244226_Ch02.xhtml#Fig12), just to the right of the Project
    Explorer, is a view with four icons (A). These icons represent the root items
    in the XIB file. For more detail about the objects, click the little arrow at
    the bottom of the view (B). This will change the display so it matches the left-most
    view in [Figure 2-13](#9781430244226_Ch02.xhtml#Fig13). As the label indicates,
    the items under Object are the objects defined within this XIB file. The items
    under Placeholders describe relationships to objects not defined in this file.
    In practice, the item File’s Owner is a reference to the object that loads this
    XIB file; this is most often a subclass of `UIViewController`, but more on that
    later.


    ![9781430244226_Fig02-13.jpg](images/9781430244226_Fig02-13.jpg)


    [Figure 2-13.](#9781430244226_Ch02.xhtml#_Fig13)  Xcode configured for UI work


    The other important feature of [Figure 2-13](#9781430244226_Ch02.xhtml#Fig13)
    is the area on the right. It shows a graphic representation of the UI components.
    On the header of Xcode, there are three buttons above the label View (A). When
    working with Interface Builder, I find it helpful to deselect the left button
    and select the right button. This will expose a view that shows the properties
    of the selected items under Objects. When you are done configuring Xcode’s UI,
    you should see something like [Figure 2-13](#9781430244226_Ch02.xhtml#Fig13).


    Under the Objects section of [Figure 2-10](#9781430244226_Ch02.xhtml#Fig10), there
    is a single item named View (D). This View is a `UIView` and will be the root
    view when the application is running. In the center of [Figure 2-10](#9781430244226_Ch02.xhtml#Fig10),
    you can see how this view will look.


    Under the section Placeholders, we see two items. We don’t have to concern ourselves
    with the First Responder at this point. We do, however, want to select File’s
    Owner (B) and make a modification to it. The File’s Owner item is a reference
    to the object that loads this XIB file. In our case, it will be an instance of
    `ViewController_iPhone`, as shown in [Listing 2-2](#9781430244226_Ch02.xhtml#list2).
    To let Interface Builder know that we intend to use a specific subclass of `UIViewController`,
    we enter the class name we want to use on the right side, at item (C). In this
    way, Interface Builder will expose the `IBOutlets` of the class `ViewController_iPhone`.


    We will explore more about `IBOutlets` shortly.


    **Tip**: Technically speaking, an XIB file contains information that is used to
    create an instance of a particular class. In practice, I find myself simply thinking,
    “the XIB file contains an object,” which is not technically correct. Regardless
    of this inaccuracy, the terminology police have not arrested me—yet.


    Now, we have covered what XIB files are and how the objects defined within them
    relate to objects at runtime. The next step is to add content to our XIB files—specifically,
    `UIViews` for landscape and portrait orientations.


    ## Adding UI Elements to an XIB File


    We have looked at the basic elements in an XIB file. We know there is a File’s
    Owner object reference that represents the `UIViewController` loading the XIB
    file. We also know that we have a root `UIView` for the XIB file. We are going
    to add additional `UIViews` to our XIB file and look at how we customize the application
    not only to support the different devices but also to have different layouts based
    on orientation. [Figure 2-14](#9781430244226_Ch02.xhtml#Fig14) shows the iPhone’s
    XIB file with a few items added to it.


    ![9781430244226_Fig02-14.jpg](images/9781430244226_Fig02-14.jpg)


    [Figure 2-14.](#9781430244226_Ch02.xhtml#_Fig14)  iPhone’s XIB file partially
    configured


    In [Figure 2-14](#9781430244226_Ch02.xhtml#Fig14), we see the XIB file with an
    additional `UIView` objects added. To add a new component, you simply drag it
    from the lower right box, either to the Objects list or directly onto the scene
    in the middle. In this case, we added two `UIView` objects named Landscape and
    Portrait as siblings to the `UIView` named View (A). Collectively, we will refer
    to these two `UIView` objects as the orientation views. On each of these new `UIView`
    objects we added a `UILabel` by dragging it from the library at the lower right
    into the visual representation in the middle of the screen (B). The text for each
    label will identify which view we are currently displaying. To make sure our layout
    is correct, the size of the Landscape and Portrait `UIView` objects is set in
    the properties panel to the right (C). In the center of the screen, you can see
    the Landscape `UIView` displayed over the Portrait `UIView` (D).


    The next step is to add a new `UIView` to each orientation view. This new `UIView`
    will describe where our Rock, Paper, Scissors game will be displayed. [Figure
    2-15](#9781430244226_Ch02.xhtml#Fig15) shows this new `UIView` added to the Portrait
    orientation view.


    ![9781430244226_Fig02-15.jpg](images/9781430244226_Fig02-15.jpg)


    [Figure 2-15.](#9781430244226_Ch02.xhtml#_Fig15)  Holder views added to the iPhone’s
    XIB file


    In [Figure 2-15](#9781430244226_Ch02.xhtml#Fig15), we see that we have added two
    new `UIView` objects to the XIB file. The first one is called Portrait Holder
    View (A), and the second is called Landscape Holder View. In the center of the
    screen (B), we see that Portrait Holder View is 300x300 (C) points in size and
    a darker color (red). Landscape Holder View is a subview of Landscape (not shown).


    ## Add a `UIViewController` to a XIB


    There is one last item we need to add to the XIB file before we are done adding
    items. We need to add a `UIViewController` that is responsible for the subviews
    that will be displayed in the holder views we just added. The `UIViewController`
    we are going to add will be of the class `RockPaperScissorsController`, as defined
    earlier in this chapter. [Figure 2-16](#9781430244226_Ch02.xhtml#Fig16) shows
    the XIB file with a new `UIViewController` added.


    ![9781430244226_Fig02-16.jpg](images/9781430244226_Fig02-16.jpg)


    [Figure 2-16.](#9781430244226_Ch02.xhtml#_Fig16)  `RockPaperScissorsController`
    added to XIB file


    In [Figure 2-16](#9781430244226_Ch02.xhtml#Fig16), we see that a View Controller
    was dragged from the library (A) to the Objects section (B) and was set to be
    the class `RockPaperScissorsController` (C).'
