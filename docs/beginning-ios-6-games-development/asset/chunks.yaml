    \ Asteroid，以了解参与物理模拟的 Actor 所需进行的更改。\n\n¹ 无限大，直到浮点数的最大值——我猜，这其实并非真正的无限。\n\n##\
    \ 附录 A\n\n### 设计与创建图形\n\n在本附录中，我们将讨论三个主要主题：设计图形、创建图形以及可使用的开源工具。\n\n在创建电子游戏时，大量工作都投入到游戏图形的制作中。在本附录中，我们将考虑\
    \ 2D 游戏。这些图形包括游戏中角色的图像、背景、按钮及其他装饰。图像是游戏的重要组成部分：它们是人们首先看到的东西，并能决定人们是否会下载游戏。图像是用来吸引人们注意力的。人们记住的是林克或马里奥的形象，而不是碰撞检测算法。但这并不是说没有图形简陋的流行游戏——确实存在这样的情况。但即使是那些图形简陋的成功游戏的创作者，也会花费大量时间来确保他们的美术风格符合统一的设计目标。\n\
    \n除了风格问题，游戏设计师还必须考虑制作适合构建游戏的图像所需的条件。我们必须考虑最终图像的大小，以及图像的排列方式。我们是应该为所有元素使用独立的图像，还是可以为背景创建合成图像？我们如何组织图像以便于修改？我们对可以包含的图像兆字节数有预算吗？这些只是我将在本附录中讨论的几个问题。\n\
    \n本附录的最后部分将快速回顾一些优秀的开源工具，供游戏设计师使用。这些工具不仅对小型游戏开发者很重要，在本书的撰写过程中也至关重要。\n\n### 电子游戏中的美术\n\
    \n在电子游戏被创建之前，有人会对游戏的玩法和外观有一个想法。那个最初的愿景可能会或可能不会出现在最终版本中。无论如何，最好由一个人或一组人负责塑造游戏的美术风格，使其具有一致性。一旦游戏有了美术指导，就会开始构建游戏资源。随着游戏成型，还会创建其他美术作品来支持游戏，例如网站或广告。这些其他作品应保持相同的视觉风格。在本节中，我们将快速回顾什么是艺术风格，以及它如何塑造用户的期望。\n\
    \n### 电子游戏中的风格\n\n电子游戏的风格指的是设计师和艺术家为创建游戏美术以及使这些美术相互融合所做的一切选择。\n\n游戏的风格与其他产品的风格并无不同。例如，考虑一瓶照烧酱。用看起来像远东风格的字形来绘制词语“teriyaki”并非不合理，就像图\
    \ A-1 中的单词那样。\n\n![9781430244226_App-01.jpg](img/9781430244226_App-01.jpg)\n\n\
    图 A-1.  “Teriyaki”以远东风格呈现\n\n图 A-1 展示了一个以符合照烧酱用户期望的风格呈现的单词。多年来，众多照烧酱制造商已经设定了这种期望。但并非所有产品都有社会预期的风格可供借鉴。事实上，如果你正在制作一个新型游戏，用户可能对风格没有任何期望。如果你正在制作一个关于骑士和城堡的游戏，用户会欢迎看起来是中世纪风格的。无论如何，游戏中的美术风格保持一致非常重要。\n\
    \n保持一致的风格并不要求艺术过于精细。目标仅仅是让美术看起来像是出自同一人之手，就像图 A-2 中的例子所示。\n\n![9781430244226_App-02.jpg](img/9781430244226_App-02.jpg)\n\
    \n图 A-2.  《The Exterminator》，由 SUMO Productions 制作。© 2011 Table Mountain Church\n\
    \n在图的左侧，我们看到了游戏的欢迎界面。Phil Hassey 与 Table Mountain Church（版权所有者）的一些年轻人共同开发了这款简单的游戏。由于这款游戏是\
    \ Phil 与一群没有多年图形或游戏设计经验的年轻人合作的成果，他们采用了简单的手绘风格。这一选择使得几个绘画技巧有限的人能够为游戏贡献美术作品。为了在整个游戏中保持这种风格，我们可以看到左侧屏幕角落的四个按钮也是手绘的。右下角的按钮是\
    \ Facebook 按钮。通过制作自己的 Facebook 按钮，他们保持了一致的风格。如果他们使用标准的 Facebook 按钮，将会与整个视觉体验格格不入。我们还应该考虑一款风格不一致的游戏，如图\
    \ A-3 所示。\n\n![9781430244226_App-03.jpg](img/9781430244226_App-03.jpg)\n\n图 A-3.  《Colors\
    \ and Shapes》。© ClayWare Games。背景由 Flickr 上的 txd 提供\n\n在图 A-3 中，我们看到我早年为首款 iPhone\
    \ 创建的一款旧游戏，名为《Colors and Shapes》。左侧是欢迎界面，孩子或家长可以选择三种活动之一。对于每种活动，玩家会通过语音和文字提示，执行一系列涉及彩色气球的简单任务。3D\
    \ 文字和气球是用 Blender 3D 渲染的，我认为它们相当一致。它们都使用了强烈的主色，并具有深度感——虽然不是完美匹配，但相当接近。然而，我认为背景不是一个好选择。虽然这是一张非常漂亮的照片，但它与气球完全不匹配，而且在视觉上分散注意力。\n\
    \n**提示**  知识共享（Creative Commons）有一种许可选项，你只需在游戏致谢中包含署名，即可使用创意作品。Flickr 允许你搜索以这种许可发布的图像。我们就是这样为《Colors\
    \ and Shapes》找到了背景图像。\n\n### 品牌与感知\n\n如前所述，游戏的美术不仅仅是屏幕上移动的图像。人们会记住这些美术并将其与游戏关联起来。图\
    \ A-4 展示了为游戏《Space Attack!!》制作的广告。\n\n![9781430244226_App-04.jpg](img/9781430244226_App-04.jpg)\n\
    \n图 A-4.  《Space Attack!!》"
- fmt: "This flyer was handed out at a convention. When I made this flyer, I was in\
    \ the middle of updating the art for the game, so I decided to use the new art\
    \ for the flyer, even though the game had not been updated in the App Store with\
    \ the new art. So when people downloaded the game, they downloaded the version\
    \ with the old art, as shown in [Figure A-5](#9781430244226_App.xhtml#Fig5).\n\
    \n![9781430244226_App-05.jpg](images/9781430244226_App-05.jpg)\n\n[Figure A-5.](#9781430244226_App.xhtml#_Fig5)\
    \ Space Attack!!, old art\n\nBecause this art did not match the art on the flyer,\
    \ and the art on the game is considerably worse, people felt ripped off, even\
    \ though the game was free! I failed to appreciate my users’ expectations, and\
    \ I paid for it with some negative reviews. This could have easily been avoided\
    \ by either getting the game updated in time for the conference or using the older\
    \ graphics in the ad.\n\nWe have taken a quick look at what style in a video game\
    \ is and why it is important. Let’s now shift our focus to the more practical\
    \ matters of creating the image files. After that, we will review a number of\
    \ excellent tools for creating 2D art.\n\n### Creating the Images Files\n\nRegardless\
    \ of the art direction of your game, at the end of the day you will need a number\
    \ of image files, at a specific size, to actually implement your game. We are\
    \ going to first explore some naming conventions that will help you manage the\
    \ case where you want different images for different devices. Then we will review\
    \ the images required by all iOS applications—things like icons and launch screens.\
    \ We will conclude this section with a discussion of how to pick appropriate image\
    \ sizes.\n\n### Naming Conventions\n\nAt the time of this writing, there are three\
    \ different screen resolutions that must be accounted for when creating an application.\
    \ It is very common to want to use different images based on which one of the\
    \ three resolutions the application is running on. To support these resolutions,\
    \ a naming convention was created to facilitate this in a mostly painless way.\
    \ The idea is that by naming the images in a particular way, a different image\
    \ will be loaded depending on the device. So there is no need to test which device\
    \ you are using in your code. The pattern for this naming convention is:\n\n```\n\
    Basename[@2x][~iphone|~pad].extension\n```\n\nSo, `basename` can be whatever you\
    \ want—for example, `\"background\"`. You can then optionally append an `@2x`\
    \ to indicate that image is for a high-resolution display, like the retina display\
    \ of the iPhone 4. After indicating whether the image is a high-resolution version,\
    \ you can specify a device class, either iPhone or iPad. Lastly, you add the extension\
    \ as you normally would. [Table A-1](#9781430244226_App.xhtml#Tab1) shows how\
    \ this naming convention works for an image that would otherwise be called `background.png`.\n\
    \n[Table A-1](#9781430244226_App.xhtml#_Tab1). Naming Convention for a Background\
    \ Image in Portrait\n\n| Device | Filename | Resolution of image in Pixels |\n\
    | --- | --- | --- |\n| iPhone 3GS, iPod Touch 3^(rd) Generation | `background~iphone.png`\
    \ | 320x480 |\n| iPhone 4, iPod Touch 4^(th) Generation | `background@2x~iphone.png`\
    \ | 640x960 |\n| iPad 1, iPad 2, iPad mini | `background~ipad.png` | 1024x768\
    \ |\n| iPad 3rd and 4th Generation | `background@2x~ipad.png` | 2048x1536 |\n\n\
    In [Table A-1](#9781430244226_App.xhtml#Tab1), we see in the first column a set\
    \ of devices for each row. In order to provide a full-screen, portrait background\
    \ image for each set of devices, we name our background file as shown in the second\
    \ column. The right-most column shows the resolution of the image in pixels. In\
    \ the sample code for this appendix, the background image of the application is\
    \ configured to support the devices available in the emulator. I have changed\
    \ each background image to include text indicating which file is being loaded.\
    \ [Figure A-6](#9781430244226_App.xhtml#Fig6) shows the different devices with\
    \ the different images.\n\n![9781430244226_App-06.jpg](images/9781430244226_App-06.jpg)\n\
    \n[Figure A-6.](#9781430244226_App.xhtml#_Fig6) A different background for each\
    \ device\n\nOn the left of the figure, we see the iPhone running with the same\
    \ display as is found on the iPhone 3GS. In the middle, we see a screen size as\
    \ if it were running on the iPhone 4, relative to the 3GS. On the right is the\
    \ screen size for the first and second iPad. [Listing A-1](#9781430244226_App.xhtml#list1)\
    \ sets the background image for this application.\n\n**[Listing A-1](#9781430244226_App.xhtml#_list1).**\
    \ `ViewController.m (viewDidLoad)`\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
    \    UIImage* image = [UIImage imageNamed:@\"background\"];\n    [backgroundImageView\
    \ setImage:image];\n}\n```\n\nIn [Listing A-1](#9781430244226_App.xhtml#list1),\
    \ we see the `viewDidLoad` task of the class `ViewController`. We load a `UIImage`\
    \ by calling `imageNamed` and passing in just the base name. What is returned\
    \ is the image appropriate for the specific devices based on the filenames of\
    \ the images included in the project. In this case, we have the same filenames\
    \ as those shown in [Table A-1](#9781430244226_App.xhtml#Tab1).\n\nNow let’s take\
    \ a look at how we specify other support images based on device type, such as\
    \ icons and splash screens.\n\n### Support Images\n\nEvery iOS application has\
    \ a number of images that must accompany the application. At the very least, an\
    \ icon must be specified. Optionally, an image can be specified that is displayed\
    \ as the application is launched. It is generally a good idea to provide a launch\
    \ image, especially if your application takes a moment to start. Specifying which\
    \ image to use is very simple: Xcode provides places where images can be dragged\
    \ to specify icons and launch images, as shown in [Figures A-7](#9781430244226_App.xhtml#Fig7)\
    \ and [A-8](#9781430244226_App.xhtml#Fig8).\n\n![9781430244226_App-07.jpg](images/9781430244226_App-07.jpg)\n\
    \n[Figure A-7.](#9781430244226_App.xhtml#_Fig7) Specifying icons and launch images\
    \ for the iPhone\n\n![9781430244226_App-08.jpg](images/9781430244226_App-08.jpg)\n\
    \n[Figure A-8.](#9781430244226_App.xhtml#_Fig8) Specifying icons and launch images\
    \ for the iPad\n\nIn [Figure A-7](#9781430244226_App.xhtml#Fig7), we see four\
    \ places where images can be dragged for the iPhone version of the application;\
    \ [Figure A-8](#9781430244226_App.xhtml#Fig8) shows the iPad version. Note that,\
    \ for the iPad, a landscape and portrait version can be specified, while the iPhone\
    \ only allows a portrait image. In [Figures A-7](#9781430244226_App.xhtml#Fig7)\
    \ and [A-8](#9781430244226_App.xhtml#Fig8), the images are labeled “No image specified.”\
    \ The top two allow you to specify the icon for the application. You are allowed\
    \ to specify a different image for the retina display, so you can provide a high-resolution\
    \ version. To specify an image, simply drag the image into one of these places.\
    \ The image can either be part of the project already, or can be some other image.\
    \ Xcode will check to make sure the image you are dragging into one of these boxes\
    \ is appropriate for that role. If it is not, you will be prompted with an error\
    \ dialog, like the one shown in [Figure A-9](#9781430244226_App.xhtml#Fig9).\n\
    \n![9781430244226_App-09.jpg](images/9781430244226_App-09.jpg)\n\n[Figure A-9.](#9781430244226_App.xhtml#_Fig9)\
    \ Inappropriate image specified as an icon\n\n[Figure A-9](#9781430244226_App.xhtml#Fig9)\
    \ shows an error dialog that is triggered when an image of an incorrect size is\
    \ dragged into the application icon spot in Xcode. Even though a simple drag-and-drop\
    \ interface is provided, it can actually be a little tricky to get all of the\
    \ images formatted correctly. This is tricky because there is incorrect information\
    \ about image sizes on most websites, including Apple’s. I hope that by the time\
    \ you are reading this, Apple has fixed this problem on its site. [Table A-2](#9781430244226_App."
