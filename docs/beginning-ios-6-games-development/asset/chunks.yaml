    \    [delegate drawActor:actor WithContext:context InRect:rect];\n}\n```\n\n在\
    \ Listing 7-10 中，可以看到类`VectorActorView`的实现只有一个方法，即任务`drawRect:`的实现。在这个方法中，我们通过调用`UIGraphicsGetCurrentContext`获取当前图形上下文的引用，并将`context`和`actor`传递给`delegate`，以便在指定的`CGRect`中绘制。现在让我们看一个具体的例子。\n\
    \n## 绘制 HealthBar\n\n如前所述，本例中使用的基于向量的演员在绘制方面是它们自己的委托，因此让我们再次查看`HealthBar`类，看看它如何绘制自身。请参见\
    \ Listing 7-11。\n\n**Listing 7-11. HealthBar.m (drawActor:WithContext:InRect:)**\n\
    \n```objectivec\n-(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context\
    \ InRect:(CGRect)rect{\n    CGContextClearRect(context,rect);\n\n    float height\
    \ = 10;\n\n    CGRect backgroundArea = CGRectMake(0, self.radius-height/2, self.radius*2,\
    \ height);\n    [self.backgroundColor setFill];\n    CGContextFillRect(context,\
    \ backgroundArea);\n\n    CGRect healthArea = CGRectMake(0, self.radius-height/2,\
    \ self.radius*2*percent, height);\n    [self.color setFill];\n    CGContextFillRect(context,\
    \ healthArea);\n}\n```\n\n在 Listing 7-11 中，我们首先调用`CGContextClearRect`。这会擦除给定`rect`中的旧内容，使我们准备好进行实际绘制。要绘制`HealthBar`，我们只需要绘制两个矩形：一个用于背景，另一个位于背景之上，代表健康条的当前百分比。要绘制矩形区域（而不是绘制矩形的边缘），我们通过调用`CGRectMake`定义一个`rect`。然后，通过调用`UIColor`对象`backgroundColor`（这是`HealthBar`的一个属性）上的`setFill`来指定要使用的颜色。\n\
    \n要实际更改正在绘制的`UIView`的像素颜色，我们调用`CGContextFillRect`，传入`context`和`CGRect backgroundArea`。要绘制前景矩形，我们重复该过程，但顶部矩形`healthArea`的宽度根据属性`percent`的值计算。这表明每当`HealthBar`的`percent`发生变化时，都必须重新绘制`HealthBar`。为了确保这一点，我们必须提供自己的`setPercent:`实现，而不是依赖合成属性提供的默认实现。Listing\
    \ 7-12 显示了类`HealthBar`的自定义`setPercent:`实现。\n\n**Listing 7-12. HealthBar.m (setPercent:)**\n\
    \n```objectivec\n-(void)setPercent:(float)aPercent{\n    if (percent != aPercent){\n\
    \        percent = aPercent;\n        if (percent < 0){\n            percent =\
    \ 0;\n        }\n        if (percent > 1){\n            percent = 1;\n       \
    \ }\n        [self setNeedsViewUpdated:YES];\n    }\n}\n```\n\nListing 7-12 显示了我们自定义的`setPercent:`实现。首先检查`percent`（属性的支持变量）和传入的值`aPercent`是否不同。如果不同，则将`percent`设置为`aPercent`，并通过确保其在\
    \ 0 和 1 之间来规范化该值。最后，用`YES`调用`setNeedsViewUpdate:`。这确保了`HealthBar`将在动画的下一步中被重绘。现在让我们来看看`Bullet`类是如何绘制的。\n\
