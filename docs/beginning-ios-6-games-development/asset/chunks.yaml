    \ 11-11](#9781430244226_Ch11.xhtml#list11)中，任务`playAudioInBackground:`负责实际配置`AVAudioPlayer`并最终调用其`play`方法。如前所述，此任务在后台线程中被调用。这样做是因为它极大地提高了应用程序的性能。如果此任务在游戏运行的同一线程中被调用，你会看到游戏动画出现明显的卡顿。\n\
