    a `Highscores` object is archived and unarchived. Note that the object passed
    to both of these arguments is of the same type: `NSCoder`. The class `NSCoder`
    provides tasks for encoding and decoding values. `NSCoder` is very much like other
    iOS classes in that it presents a map-like interface for reading and writing data.
    In the task `encodeWithCoder:`, we use the `NSCoder` task `encodeObject:forKey:`
    to write `theScore` object to the encoder. We pass in a key value `NSString` that
    we will use in `initWithCoder:` to read the `theScores` back out when we unarchive
    this class. Also note that the object that is returned from the `decodeObjectForKey:`
    task is retained. This is done to make sure the object returned is not reclaimed
    at some unspecified time.    When an `NSMutableArray` is encoded with an `NSCoder`,
    it knows to encode the elements in the array, but those elements must know how
    to be encoded. Because `theScores` is an `NSMutableArray` filled with `Score`
    objects, we have to tell the class `Score` how to encode and decode itself for
    this process to work.    The Score Class    `Score` objects represent a date and
    score value. We have seen how the class `Highscores` manages a list of `Score`
    objects. Let’s take a quick look at this simple class. [Listing 3-14](#9781430244226_Ch03.xhtml#list14)
    shows the header of the `Score` class.    **[Listing 3-14](#9781430244226_Ch03.xhtml#_list14).** Score.h    ```
    #import <Foundation/Foundation.h> @interface Score : NSObject  <NSCoding> {     NSDate*
    date;     int score; } @property (nonatomic, retain) NSDate* date; @property (nonatomic)
    int score; +(id)score:(int)aScore At:(NSDate*)aDate; @end ```    As shown in [Listing
    3-14](#9781430244226_Ch03.xhtml#list14), we see that it defines two properties,
    date and score.'
  trans: "\n这让`HighscoreController`能够将最新分数标记为蓝色；其他分数将用黑色绘制。`layoutScores:`中的第一个循环会从`UIView\
    \ highscoreView`中移除所有子视图。接下来的三行代码检查`highscoreView`的大小，并预计算一些稍后会用到的尺寸值。\n\n`layoutScores:`中的第二个循环遍历`highscores`对象包含的所有`Score`对象。针对每个`Score`，创建两个`UILabel`。第一个`UILabel`名为`dateLabel`，使用`CGRect\
    \ dateFrame`创建，该框架定义了`UILabel`的绘制区域。基本上，`dateFrame`指定了`highscoreView`上一行的左半部分。`dateLabel`的文本基于`Score`对象的`date`属性设置。类似地，这个过程会为`UILabel\
    \ scoreLabel`重复；不过，它将显示用户获得的分数，并放置在右侧。\n\n最后，我们检查正在显示的分数是否是`latestScore`对象。如果是，则将`UILabel`的颜色调整为蓝色。\n\
    \n如果我们回顾一下清单 3-9，就会发现最高分是在我们通过调用`saveHighscores`任务更新视图之前保存的，如清单 3-11 所示。\n\n**清单\
    \ 3-11.** `HighscoreController.m` (`saveHighscores`)\n\n```\n-(void)saveHighscores{\n\
    \    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n    NSData*\
    \ highscoresData = [NSKeyedArchiver archivedDataWithRootObject:\nhighscores];\n\
    \    [defaults setObject:highscoresData forKey: KEY_HIGHSCORES];\n    [defaults\
    \ synchronize];\n}\n```\n\n清单 3-11 中所示的`saveHighscores`任务负责归档`highscores`对象并将其写入持久化位置。这里的策略是将`highscores`对象存入该应用的用户偏好设置中。这样，即使用户在与\
    \ iTunes 同步后删除了应用，最高分也能得以保留。要读取用户偏好设置，我们在`NSUserDefaults`类上调用`standardUserDefaults`。`NSUserDefaults`类型的对象本质上是用于存储键值对的映射。键是`NSStrings`，值必须是属性列表。这包括`NSData`、`NSString`、`NSNumber`、`NSDate`、`NSArray`和`NSDictionary`——基本上是\
    \ iOS 的核心对象类型。我们要存储一个`Highscores`类型的对象，但它不在此列表中。为了实现这一点，我们必须根据`highscores`对象中存储的数据创建一个`NSData`对象。\n\
    \n要将对象归档为`NSData`对象，我们使用`NSKeyedArchiver`类，并将`highscores`对象传递给`archivedDataWithRootObject:`任务。顾名思义，`archivedDataWithRootObject`用于归档一个对象图。在我们的例子中，根对象是`highscores`，我们知道它包含多个`Score`对象。所以看起来我们走对了方向。要使对象能被`NSKeyedArchiver`归档，它必须遵循`NSCoding`协议。最后一步是在`defaults`上调用`synchronize`；这能确保我们的更改被保存。\n\
    \n## `Highscores`类\n\n`Highscores`类的实例存储一个排序后的`Score`对象列表，并处理向列表中添加`Score`对象的细节。我们来看看`Highscores`类的头文件，了解这一切是如何工作的，如清单\
    \ 3-12 所示。\n\n**清单 3-12.** `Highscores.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Score.h\"\n@interface Highscores : NSObject <NSCoding> {\n    NSMutableArray*\
    \ theScores;\n}\n@property (nonatomic, retain) NSMutableArray* theScores;\n-(id)initWithDefaults;\n\
    -(void)addScore:(Score*)newScore;\n@end\n```\n\n清单 3-12 展示了`Highscores`类的接口。\n\
    \n正如我们所见，`Highscores`确实遵循了`NSCoding`协议。我们还看到它包含一个名为`theScores`的`NSMutableArray`，该数组作为一个属性可被访问。定义了两个任务：一个用于初始化带有十个默认`Scores`的`Highscore`，另一个用于添加新的`Scores`对象。清单\
    \ 3-13 展示了这个类是如何实现的。\n\n**清单 3-13.** `Highscores.m`\n\n```\n#import \"Highscores.h\"\
    \n@implementation Highscores\n@synthesize theScores;\n-(id)initWithDefaults{\n\
    \    self = [super init];\n    if (self != nil){\n        theScores = [NSMutableArray\
    \ new];\n        for (int i = 0;i <10;i++){\n            [self addScore:[Score\
    \ score:1 At:[NSDate date]]];\n        }\n    }\n    return self;\n}\n-(void)addScore:(Score*)newScore{\n\
    \    [theScores addObject:newScore];\n    [theScores sortUsingSelector:@selector(compare:)];\n\
    \    while ([theScores count] > 10){\n        [theScores removeObjectAtIndex:10];\n\
    \    }\n}\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder encodeObject:theScores\
    \ forKey:@\"theScores\"];\n}\n- (id)initWithCoder:(NSCoder *)decoder{\n    theScores\
    \ = [[decoder decodeObjectForKey:@\"theScores\"] retain];\n    return self;\n\
    }\n-(void)dealloc{\n    for (Score* score in theScores){\n        [score release];\n\
    \    }\n    [theScores release];\n    [super dealloc];\n}\n@end\n```\n\n清单 3-13\
    \ 中所示的`Highscores`类的实现相当简洁。`initWithDefaults`任务初始化`NSMutableArray theScore`，然后用十个新的`Score`对象填充`theScores`。`addScore:`任务向`theScores`添加一个新的`Score`对象，按玩家获得的分数对其进行排序，然后移除任何多余的`Scores`。这可能导致`Score\
    \ newScore`实际上并不在`NSMutableArray theScores`中。然而，这样实现是为了让调用者不必考虑`theScore`可能不够高而不被视为实际最高分。最后两个任务`encodeWithCoder:`和`initWithCoder:`来自`NSCoding`协议。这些任务描述了如何归档和取消归档`Highscores`对象。注意，传递给这两个参数的对象类型相同：`NSCoder`。`NSCoder`类提供了编码和解码值的任务。`NSCoder`与其他\
    \ iOS 类非常相似，它提供了一个类似映射的接口用于读写数据。在`encodeWithCoder:`任务中，我们使用`NSCoder`的任务`encodeObject:forKey:`将`theScore`对象写入编码器。我们传入一个键值`NSString`，在`initWithCoder:`中将使用它来读取`theScores`，以便在取消归档此类时还原。还要注意，从`decodeObjectForKey:`任务返回的对象会被保留。这样做是为了确保返回的对象不会在某个未指定的时间被回收。\n\
    \n当使用`NSCoder`编码`NSMutableArray`时，它知道要编码数组中的元素，但这些元素必须知道如何被编码。因为`theScores`是一个填充了`Score`对象的`NSMutableArray`，我们必须告诉`Score`类如何对自身进行编码和解码，这个过程才能正常工作。\n\
    \n## `Score`类\n\n`Score`对象代表一个日期和一个分数值。我们已经看到`Highscores`类如何管理`Score`对象的列表。我们快速看一下这个简单的类。清单\
    \ 3-14 展示了`Score`类的头文件。\n\n**清单 3-14.** `Score.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    @interface Score : NSObject  <NSCoding> {\n    NSDate* date;\n    int score;\n\
    }\n@property (nonatomic, retain) NSDate* date;\n@property (nonatomic) int score;\n\
    +(id)score:(int)aScore At:(NSDate*)aDate;\n@end\n```\n\n如清单 3-14 所示，我们看到它定义了两个属性：`date`和`score`。\n"
- fmt: "There is also a utility constructor for quickly creating a `Score` object\
    \ with these two properties filled in. As mentioned, the class `Score` must conform\
    \ to the `NSCoding` protocol in order for our archiving process to work. [Listing\
    \ 3-15](#9781430244226_Ch03.xhtml#list15) shows the implementation of the `Score`\
    \ class.\n\n**[Listing 3-15](#9781430244226_Ch03.xhtml#_list15).** Score.m\n```\n\
    #import \"Score.h\"\n\n@implementation Score\n@synthesize date;\n@synthesize score;\n\
    \n+(id)score:(int)aScore At:(NSDate*)aDate{\n    Score* highscore = [[Score alloc]\
    \ init];\n    [highscore setScore:aScore];\n    [highscore setDate:aDate];\n \
    \   return highscore;\n}\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder\
    \ encodeObject:date forKey:@\"date\"];\n    [encoder encodeInt:score forKey:@\"\
    score\"];\n}\n- (id)initWithCoder:(NSCoder *)decoder{\n    date = [[decoder decodeObjectForKey:@\"\
    date\"] retain];\n    score = [decoder decodeIntForKey:@\"score\"];\n    return\
    \ self;\n}\n- (NSComparisonResult)compare:(id)otherObject {\n    Score* otherScore\
    \ = (Score*)otherObject;\n    if (score > [otherScore score]){\n        return\
    \ NSOrderedAscending;\n    } else if (score < [otherScore score]){\n        return\
    \ NSOrderedDescending;\n    } else {\n        return NSOrderedSame;\n    }\n}\n\
    @end\n```\n[Listing 3-15](#9781430244226_Ch03.xhtml#list15) shows us a couple\
    \ of things. We see that the implementation of `score:At:` simply creates a new\
    \ `Score` object and populates the properties. The task `compare:` is used by\
    \ `Highscores` to sort the `Score` objects (see the task `addScore` from [Listing\
    \ 3-13](#9781430244226_Ch03.xhtml#list13)). We also see the now familiar task\
    \ for archiving and unarchiving: `encodeWithCoder:` and `initWithCoder:`. In the\
    \ case of the `Score` class, we store the `NSDate date`, with the object methods\
    \ of `NSCoder`. For the `int score`, we have to use special tasks, because an\
    \ `int` is not an object. `NSCoder` provides a special task for primitive types.\
    \ In our case, we use `decodeInt:ForKey:` and `encodeInt:ForKey:`. There exists\
    \ analog task for the other primitive types, like `BOOL`, `float`, `double`, and\
    \ so on.\n\nWe have looked at the implementation required by a class we wish to\
    \ archive (and unarchive), but we have not looked at how we actually unarchive\
    \ an object from the user’s preferences. [Listing 3-16](#9781430244226_Ch03.xhtml#list16)\
    \ shows how this is done in the class `HighscoreController`.\n\n**[Listing 3-16](#9781430244226_Ch03.xhtml#_list16).**\
    \ HighscoreController (viewDidLoad)\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
    \    [highscores release];\n\n    NSData* highscoresData = [[NSUserDefaults standardUserDefaults]\
    \ dataForKey:KEY_HIGHSCORES];\n\n    if (highscoresData == nil){\n        highscores\
    \ = [[[Highscores alloc] initWithDefaults] retain];\n        [self saveHighscores];\n\
    \    } else {\n        highscores = [[NSKeyedUnarchiver unarchiveObjectWithData:\
    \ highscoresData] retain];\n    }\n    [self layoutScores:nil];\n}\n```\nThe `viewDidLoad`\
    \ task from [Listing 3-16](#9781430244226_Ch03.xhtml#list16) is called when a\
    \ `HighscoreController`’s view is loaded. In this task, we want to prepare the\
    \ `HighscoreController` for use. This means making sure `highscores` is in a usable\
    \ and accurate state, and we want to lay out the current set of high scores in\
    \ case this view is displayed before a new `Score` is added. In order to retrieve\
    \ the current high scores, we read a `NSData` object from the `NSUserDefaults`\
    \ object returned by the call to `standardUserDefaults`. If the `NSData` object\
    \ is `nil`, which will happen the first time you run the application, we initialize\
    \ a new `Highscores` object and immediately save it. If the `NSData` object is\
    \ not `nil`, we unarchive it with a call to `NSKeyedUnarchiver`’s task `unarchiveObjectWithData`\
    \ and retain the results.\n\nWe have looked at how an object can be archived and\
    \ unarchived in this section. We will now use the same principles to show how\
    \ we can archive and unarchive our game state.\n\n## Preserving Game State\n\n\
    With the advent of background execution on iOS devices, the importance of preserving\
    \ game or application state is a bit reduced. But a fully functional and user-friendly\
    \ application should be able to gracefully handle restoring state if the application\
    \ is terminated. The steps required to preserve state are really not that different\
    \ from storing other types of data. This is a critical feature of many applications.\n\
    \nThe first thing we need to understand is when we should be trying to restore\
    \ state or archive state. [Figure 3-11](#9781430244226_Ch03.xhtml#Fig11) is a\
    \ flowchart describing our sample application’s life cycle in terms of initialization.\n\
    \n![9781430244226_Fig03-11.jpg](images/9781430244226_Fig03-11.jpg)\n\n[Figure\
    \ 3-11.](#9781430244226_Ch03.xhtml#_Fig11)  Initialization life cycle of our example\
    \ application\n\nIn [Figure 3-11](#9781430244226_Ch03.xhtml#Fig11), we see that\
    \ all applications start by the user’s clicking on the application icon. From\
    \ there, one of two things happen: either the application, if already running\
    \ in the background, will be brought to the foreground; or the application will\
    \ start fresh. If the application was already running, it will show up on the\
    \ screen exactly as the user left it; no code is required on our part to reestablish\
    \ state. In an action game, you might want to pause the game when the application\
    \ is brought to the foreground; this will give the user a chance to reorient before\
    \ play resumes. Either way, we return to the application flow presented in [Figure\
    \ 3-1](#9781430244226_Ch03.xhtml#Fig1).\n\nIf the application was not already\
    \ running, we show the load screen as normal, and then we check to see if the\
    \ game state was archived. If yes, we want to unarchive the game state and show\
    \ the Continue button. We then continue with the flow presented in [Figure 3-1](#9781430244226_Ch03.xhtml#Fig1).\
    \ To support the case where we need to unarchive the game state, we obviously\
    \ need to archive it at some point. Let’s start by looking at the archive logic,\
    \ and then looking at the unarchive logic.\n\n## Archiving and Unarchiving Game\
    \ State\n\nIn our sample application, we store the state of our game in a class\
    \ called `CoinsGame`. We are going to save some of the implementation details\
    \ of this class for the next chapter, but because we know it is being archived\
    \ and unarchived, we know it probably conforms to the `NSCoding` protocol. And\
    \ indeed it does—[Listing 3-17](#9781430244226_Ch03.xhtml#list17) shows the implementation\
    \ of the two `NSCoding` tasks.\n\n**[Listing 3-17](#9781430244226_Ch03.xhtml#_list17).**\
    \ CoinsGame.m (encodeWithCoder: and initWithCoder:)\n```\n- (void)encodeWithCoder:(NSCoder\
    \ *)encoder{\n    [encoder encodeObject:coins forKey:@\"coins\"];\n    [encoder\
    \ encodeInt:remaingTurns forKey:@\"remaingTurns\"];\n    [encoder encodeInt:score\
    \ forKey:@\"score\"];\n    [encoder encodeInt:colCount forKey:@\"colCount\"];\n\
    \    [encoder encodeInt:rowCount forKey:@\"rowCount\"];\n}\n- (id)initWithCoder:(NSCoder\
    \ *)decoder{\n    coins = [[decoder decodeObjectForKey:@\"coins\"] retain];\n\
    \    remaingTurns = [decoder decodeIntForKey:@\"remaingTurns\"];\n    score =\
    \ [decoder decodeIntForKey:@\"score\"];\n    colCount = [decoder decodeIntForKey:@\"\
    colCount\"];\n    rowCount = [decoder decodeIntForKey:@\"rowCount\"];\n    return\
    \ self;\n}\n```\nIn [Listing 3-17](#9781430244226_Ch03.xhtml#list17), we see the\
    \ task used by `CoinsGame` to support archiving and unarchiving. In each task,\
    \ a number of properties are encoded or decoded—nothing too surprising there,\
    \ presumably. An object can be archived at any point in the application life cycle,\
    \ but there are special tasks that are called when an application is either closing\
    \ or terminating. These are the following:\n\n```\n- (void)applicationWillTerminate:(UIApplication\
    \ *)application\n- (void)applicationDidEnterBackground:(UIApplication *)application\n\
    ```\n\nThe task `applicationWillTerminate:` is called just before the application\
    \ is terminated."
