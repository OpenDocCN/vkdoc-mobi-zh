    6-6](#9781430244226_Ch06.xhtml#list6), you can see two very simple tasks: `addActor`
    and `removeActor`. In `addActor`, the passed-in actor has its added property set
    to YES before the actor is added to the `NSMutableSet actorsToBeAdded`. Similarly,
