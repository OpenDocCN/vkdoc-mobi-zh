    \ called when the user touches the Done button on both the About view and the\
    \ High Score view. These tasks are very similar to the tasks in [Listing 3-4](#9781430244226_Ch03.xhtml#list4).\
    \ The only real difference is that we remove the About and High Score views and\
    \ then add the Welcome view. This is a reversal of the tasks in [Listing 3-4](#9781430244226_Ch03.xhtml#list4).\n\
    \nWhen the user navigates to the Play view, they stay on that view until their\
    \ game is done. This application is set up to automatically change views in this\
    \ case.\n\nThe next section explains how `GameController` interacts with the `CoinsController`,\
    \ not only to know when to transition the user to the High Score view but also\
    \ when to update the remaining turns and score labels.\n\n## Using a Delegate\
    \ to Communicate Application State\n\nA common pattern for one object to communicate\
    \ with another in iOS development is the delegate pattern. A delegate is simply\
    \ any object that conforms to some predefined protocol that another object knows\
    \ about. For example, say we have class A and it has a property called delegate\
    \ that must conform to the protocol P. We can assign an instance of class B to\
    \ the delegate property of A, if class B conforms to the protocol P. The delegate\
    \ pattern is very much like the listener pattern found in other languages, like\
    \ Java.\n\n### Declaring `CoinsControllerDelegate`\n\nIn order for our `CoinsController`\
    \ class to communicate its state with the class `GameController`, we create a\
    \ protocol that describes this relationship. [Listing 3-6](#9781430244226_Ch03.xhtml#list6)\
    \ shows the declaration of the protocol `CoinsControllerDelegate` found in the\
    \ file `CoinsController.h`.\n\n**[Listing 3-6](#9781430244226_Ch03.xhtml#_list6).**\
    \ `CoinsControllerDelegate` (from `CoinsController.h`)\n\n```objc\n@protocol CoinsControllerDelegate\
    \ < NSObject>\n-(void)gameDidStart:(CoinsController*)aCoinsController with:(CoinsGame*)game;\n\
    -(void)scoreIncreases:(CoinsController*)aCoinsController with:(int)newScore;\n\
    -(void)turnsRemainingDecreased:(CoinsController*)aCoinsController with:(int)turnsRemaining;\n\
    -(void)gameOver:(CoinsController*)aCoinsController with:(CoinsGame*)game;\n@end\n\
    ```\n\nAs can be seen in [Listing 3-6](#9781430244226_Ch03.xhtml#list6), a protocol\
    \ is a pretty simple thing. The name of the protocol comes after the `@protocol`.\
    \ The `<NSObject>` specifies what types of objects can conform to this protocol.\
    \ Between the `@protocol` and the `@end`, a number of tasks are declared. These\
    \ are the messages that are going to be sent to the delegate object, so the delegate\
    \ object should implement each of these tasks. The delegate field is declared\
    \ in the interface section of the `CoinsController` like this:\n\n```objc\nIBOutlet\
    \ id <CoinsControllerDelegate> delegate;\n```\n\nWe also define a property for\
    \ this field, with the property declaration:\n\n```objc\n@property (nonatomic,\
    \ retain) id <CoinsControllerDelegate> delegate;\n```\n\nThere are two things\
    \ to notice about the declaration of the `delegate` property. First, we can assign\
    \ any object as the delegate. Because it is type `id`, we will get a compiler\
    \ warning if the assigned object is known not to conform to the protocol `CoinsControllerDelegate`.\
    \ The second thing to notice is that we defined it as an `IBOutlet`, which allows\
    \ us to actually set the relationship between the `GameController` object and\
    \ the `CoinsController` object in Interface Builder. This is not required, but\
    \ it can be a handy addition if you are planning on writing code consumed by other\
    \ developers.\n\nLooking at the declaration of the class `GameController`, we\
    \ can see that it conforms to the protocol `CoinsControllerDelegate`, as such:\n\
    \n```objc\n@interface GameController : UIViewController <CoinsControllerDelegate>\
    \ {\n```\n\n### Implementing the Defined Tasks\n\nSimply stating that a class\
    \ conforms to a protocol is just the first step. The conforming class should also\
    \ implement each task defined in the protocol. [Listing 3-7](#9781430244226_Ch03.xhtml#list7)\
    \ shows the implementation of the `CoinsControllerDelegate` protocol in the `GameController.m`\
    \ file.\n\n**[Listing 3-7](#9781430244226_Ch03.xhtml#_list7).** `GameController.m`\
    \ (Implementation of `CoinsControllerDelegate`)"
