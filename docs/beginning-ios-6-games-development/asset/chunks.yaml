    \n```objc\n+(AsteroidRepresentationDelegate*)instance{\n    static AsteroidRepresentationDelegate*\
    \ instance;\n    @synchronized(self) {\n        if(!instance) {\n            instance\
    \ = [AsteroidRepresentationDelegate new];\n        }\n    }\n    return instance;\n\
    }\n-(int)getFrameCountForVariant:(int)aVariant AndState:(int)aState{\n    return\
    \ 31;\n}\n-(NSString*)getNameForVariant:(int)aVariant{\n    if (aVariant == VARIATION_A){\n\
    \        return @\"A\";\n    } else if (aVariant == VARIATION_B){\n        return\
    \ @\"B\";\n    } else if (aVariant == VARIATION_C){\n        return @\"C\";\n\
    \    } else {\n        return nil;\n    }\n}\n-(NSString*)baseImageName{\n   \
    \ return @\"Asteroid\";\n}\n```\n\nIn [Listing 7-19](#9781430244226_Ch07.xhtml#_list19),\
    \ we see the expected tasks for defining an image-based actor. We see that image\
    \ files will start with the string `\"Asteroid\"` as shown in the task `baseImageName`.\
    \ We also see that there are 31 images for each of the three variants, as shown\
    \ in `getFramesCountForVariant:AndState:` and `getNameForVariant:`.\n\nThe task\
    \ `instance` in [Listing 7-19](#9781430244226_Ch07.xhtml#_list19), is something\
    \ new for us. This task represents a way for us to create a singleton of the class\
    \ `AsteroidRepresentationDelegate`. We do this by synchronizing on the class object\
    \ for `Asteroid` and only creating a new `AsteroidRepresentationDelegate` if the\
    \ variable instance is `nil`. This allows us to only create one instance of this\
    \ class, even though we could have hundreds of `Asteroids` and `Particles` using\
    \ it to specify how they look. Let’s now put all the pieces together and look\
    \ at how an `Asteroid` is destroyed.\n\n### Destroying an Asteroid\n\nWe have\
    \ set the groundwork for understanding how an `Asteroid` is created and represented\
    \ on the screen. Let’s take a look at the task `doHit:` to understand how these\
    \ pieces are brought together to create the desired behavior. See [Listing 7-20](#9781430244226_Ch07.xhtml#list20).\n\
    \n**[Listing 7-20.](#9781430244226_Ch07.xhtml#_list20)  Asteroid.m (doHit:)**\n\
    \n```objc\n-(void)doHit:(GameController*)controller{\n    if (level > 1){\n  \
    \      int count = arc4random()%3+1;\n        for (int i=0;i<count;i++){\n   \
    \         Asteroid* newAst = [Asteroid asteroidOfLevel:level-1 At:self.\n```"
