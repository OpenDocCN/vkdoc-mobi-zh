    we see the header file for the class `Actor02`. There are five properties that
    represent the basic attributes required for this example. The property `actorId`
    is used to identify the actor; we will see how we use this to map each `Actor02`
    to an `UIImageView`. The property `center` tells us the location of each `Actor02`.
    The property `speed` indicates how fast this actor moves. The property `radius`
    represents the size of this actor. Finally, the property `imageName` describes
    how this actor should be drawn on the screen.    The type of the property `center`
    is `CGPoint`. Strictly speaking, we will not be directly using this `CGPoint`
    to set the location of a `UIView` or other Core Graphics component. But `CGPoint`
    is a simple way to wrap an X and Y value, and we are already familiar with it.
    For this example, it makes little difference if we use `CGPoint` or a struct of
    our creation to represent a point. However, if you wanted to make sure your code
    was not dependent on Core Graphics in any way, you would want to define your own
