    set to true (implementation not shown). The class task *readFromDefaults* is used
    to pull a *GameParameter* out of the default *NSUserDefaults*, whereas *writeToDefaults*
    is used to serialize a *GameParameter* back to the default *NSUserDefautls*. [Listing
    10-5](#9781430244226_Ch10.xhtml#_list5) shows both *readFromDefaults* and *writeToDeafaults*.    **[Listing
    10-5](#9781430244226_Ch10.xhtml#_list5).** GameParameters.'
  trans: "\n现在让我们看一个具体的例子，我们将为游戏《皮带指挥官》实现非消耗型应用内购买功能。我们要实现图 10-1 中的视图，让用户可以选择哪些角色参与游戏，并购买新角色以解锁使用。\n\
    \n## 应用内购买实现\n\n如前所述，购买过程实际上只需向 iTunes Store 发起两次调用。在本节中我们将看到，这实际上只涉及少数几个类。在我们的示例中，大部分\
    \ StoreKit 交互细节和 UI 处理工作都将在名为`ExtrasController`的单个类中完成，其头文件如代码清单 10-1 所示。\n\n\
    **代码清单 10-1.** ExtrasController.h\n\n```\n@interface ExtrasController : UIViewController<SKPaymentTransactionObserver,\
    \ SKProductsRequestDelegate>{\n    GameParameters* gameParams;\n    NSMutableDictionary*\
    \ idsToProducts;\n}\n@property (strong, nonatomic) IBOutlet UIButton *asteroidButton;\n\
    @property (strong, nonatomic) IBOutlet UIButton *saucerButton;\n@property (strong,\
    \ nonatomic) IBOutlet UIButton *powerupButton;\n\n-(void)setGameParams:(GameParameters*)params;\n\
    @end\n```\n\n在代码清单 10-1 中，我们看到了`ExtrasController`类的头文件。`ExtrasController`类扮演两个角色：管理购买流程并相应地更新三个按钮。\n\
    \n`gameParams`对象负责存储游戏中已启用的角色以及已完成的购买记录。`idsToProducts`对象用于将我们的购买 ID 映射到苹果返回的有效`SKProduct`对象；稍后我们将了解如何使用这些对象。\n\
    \n为了与 StoreKit 交互，`ExtrasController`遵循`SKPaymentTransactionObserver`和`SKProductsRequestDelegate`这两个协议。这些协议提供了应用程序响应商店交互所需的一切功能。我们将在代码中看到`ExtrasController`如何实现这两个协议中的任务。\n\
    \n使用 StoreKit 的第一步是设置一个响应购买状态变化的对象。我们通过向默认的`SKPaymentQueue`添加观察者来创建响应购买变化的对象，如代码清单\
    \ 10-2 所示。\n\n**代码清单 10-2.** ExtrasController.m (viewDidLoad)\n\n```\n#define\
    \ PURCHASE_INGAME_SAUCERS @\"com.beltcommander.ingame.saucers\"\n#define PURCHASE_INGAME_POWERUPS\
    \ @\"com.beltcommander.ingame.powerups\"\n//....\n- (void)viewDidLoad {\n    [super\
    \ viewDidLoad];\n    idsToProducts = [NSMutableDictionary new];\n    [[SKPaymentQueue\
    \ defaultQueue] addTransactionObserver:self];\n\n    //获取产品 ID 集合\n    NSSet*\
    \ potentialProducts = [NSSet setWithObjects:PURCHASE_INGAME_POWERUPS, PURCHASE_INGAME_SAUCERS,\
    \ nil];\n\n    SKProductsRequest* request = [[SKProductsRequest alloc] initWithProductIdentifiers:potentialProducts];\n\
    \    [request setDelegate:self];\n    [request start];\n\n    [self setGameParams:\
    \ [GameParameters readFromDefaults]];\n}\n```\n\n在代码清单 10-2 中，我们看到了`ExtrasController`类的`viewDidLoad`任务。在该任务中，我们首先创建`idsToProducts`映射，并通过调用`defaultQueue`获取默认的`SKPaymentQueue`，将`self`添加为观察者。由于`self`遵循`SKPaymentTransactionObserver`协议，我们的`ExtrasController`将获知所有购买状态的变化。注册观察者后，我们创建一个已知产品\
    \ ID 的集合。在本例中，`NSSet`类型的`potentialProducts`由两个常量创建：`PURCHASE_INGAME_POWERUPS`和`PURCHASE_INGAME_SAUCERS`。如我们所见，这些常量与我们在\
    \ iTunes Connect 中创建产品时指定的字符串相同。\n\n指定潜在产品集合后，我们创建一个`SKProductsRequest`，将`self`设置为委托，并调用其`start`方法。在\
    \ StoreKit 处理哪些产品 ID 有效的同时，我们调用`setGameParams`，指定应使用存储在默认`NSUserDefaults`中的`GameParameters`对象。当\
    \ StoreKit 返回结果时，会触发`productsRequest:didReceiveResponse:`任务，如代码清单 10-3 所示。\n\n\
    **代码清单 10-3.** ExtrasController.m (productsRequest:didReceiveResponse:)\n\n```\n\
    - (void)productsRequest:(SKProductsRequest *)request didReceiveResponse:(SKProductsResponse\
    \ *)response {\n    for (SKProduct* aProduct in response.products){\n        if\
    \ ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_SAUCERS]){\n  \
    \          [saucerButton setEnabled:YES];\n            [saucerButton setHidden:NO];\n\
    \            [idsToProducts setObject:aProduct forKey:PURCHASE_INGAME_SAUCERS];\n\
    \        } else if ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_POWERUPS]){\n\
    \            [powerupButton setEnabled:YES];\n            [powerupButton setHidden:NO];\n\
    \            [idsToProducts setObject:aProduct forKey:PURCHASE_INGAME_POWERUPS];\n\
    \        }\n    }\n}\n```\n\n在代码清单 10-3 中，我们看到`productsRequest:didReceiveResponse:`任务，当获取到有效产品\
    \ ID 集合时会被调用。在该任务中，我们简单遍历所有返回的产品，并使购买飞碟和能量增强的按钮可见。通过这种方式，我们确保用户只能看到可行的购买选项。\n\n\
    我们还将每个有效产品 ID 映射到对应的`SKProduct`对象并存储到应用程序中。这样，当用户进行购买时，我们可以提取出苹果发送给我们的精确对象，确保向用户展示正确的数据。\n\
    \n我们已经了解了如何判断哪些购买项目有效。在探讨实际购买流程之前，应该先研究一下`GameParameters`类。`GameParameters`类负责存储哪些产品已被购买以及用户希望在游戏中出现哪些角色。\n\
    \n## 根据已有购买记录驱动 UI\n\n图 10-1 中显示的三个按钮，允许用户选择哪些角色可在游戏中出现。相同的 UI 也支持用户购买新角色。为了跟踪这些信息，我们创建了模型类`GameParameters`，其头文件如代码清单\
    \ 10-4 所示。\n\n**代码清单 10-4.** GameParameters.h\n\n```\n@interface GameParameters\
    \ : NSObject<NSCoding>\n\n@property (nonatomic) BOOL includeAsteroids;\n@property\
    \ (nonatomic) BOOL includeSaucers;\n@property (nonatomic) BOOL includePowerups;\n\
    @property (nonatomic, retain) NSMutableSet* purchases;\n\n+(id)gameParameters;\n\
    +(id)readFromDefaults;\n-(void)writeToDefaults;\n@end\n```\n\n在代码清单 10-4 中，我们看到了`GameParameters`类的头文件。我们使用三个`BOOL`属性来跟踪用户希望在游戏中出现的角色。同时还有一个名为`purchases`的`NSMutableSet`，用于存储产品\
    \ ID 字符串的集合。构造方法`gameParameters`将创建一个新的`GameParameters`对象，其中没有购买记录，只有`includeAsteroids`设置为\
    \ true（实现代码未显示）。类方法`readFromDefaults`用于从默认的`NSUserDefaults`中提取`GameParameters`对象，而`writeToDefaults`用于将`GameParameters`对象序列化回默认的`NSUserDefaults`。代码清单\
    \ 10-5 显示了`readFromDefaults`和`writeToDefaults`两个方法。\n\n**代码清单 10-5.** GameParameters。\n"
- fmt: "`readFromDefaults`和`writeToDefaults`这两个任务方法：\n\n```\n+(id)readFromDefaults{\n\
    \    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n    NSData*\
    \ data = [defaults objectForKey:GAME_PARAM_KEY];\n    if (data == nil){\n    \
    \    GameParameters* params = [GameParameters gameParameters];\n        [params\
    \ writeToDefaults];\n        return params;\n    } else{\n        return [NSKeyedUnarchiver\
    \ unarchiveObjectWithData: data];\n    }\n}\n-(void)writeToDefaults{\n    NSData*\
    \ data = [NSKeyedArchiver archivedDataWithRootObject:self];\n    NSUserDefaults*\
    \ defaults = [NSUserDefaults standardUserDefaults];\n    [defaults setObject:data\
    \ forKey:GAME_PARAM_KEY];\n    [defaults synchronize];\n}\n```\n\n在[Listing 10-5](#9781430244226_Ch10.xhtml#_list5)中，我们看到了`readFromDefaults`和`writeToDefaults`这两个任务。这两个任务是互逆的：`readFromDefaults`会返回存储在用户默认设置中、对应键`GAME_PARAM_KEY`的`GameParameter`对象。而`writeToDefaults`任务则将一个`GameParameter`对象写入用户默认设置中，对应的键也是`GAME_PARAM_KEY`。这两个任务的核心思想是，通过将`GameParameter`对象存储在用户默认设置中，来记录用户购买的商品（通过`purchases`属性中的键来记录）。`GameParameters`类可以被存储在`NSUserDefaults`中，因为它实现了`NSCoder`协议中的任务。关于该过程的描述，请参见[第2章](#9781430244226_Ch02.xhtml)。\n\
    \n现在，让我们看看如何使用这个类来驱动用户界面，并设置[图10-1](#9781430244226_Ch10.xhtml#Fig1)中三个不同按钮的状态。这些操作在`setGameParameters:`任务中处理，如[Listing\
    \ 10-6](#9781430244226_Ch10.xhtml#_list6)所示。\n\n**[Listing 10-6](#9781430244226_Ch10.xhtml#_list6).**\
    \ GameParameters.m (setGameParameters:)\n\n```\n-(void)setGameParams:(GameParameters*)params{\n\
    \    gameParams = params;\n    NSSet* purchases = [gameParams purchases];\n  \
    \  if ([params includeAsteroids]){\n        [asteroidButton setImage:[UIImage\
    \ imageNamed:@\"asteroid_active\"] forState:UIControlStateNormal];\n    } else\
    \ {\n        [asteroidButton setImage:[UIImage imageNamed:@\"asteroid_inactive\"\
    ] forState:UIControlStateNormal];\n    }\n    if ([purchases containsObject:PURCHASE_INGAME_SAUCERS]){\n\
    \        if ([params includeSaucers]){\n            [saucerButton setImage:[UIImage\
    \ imageNamed:@\"saucer_active\"] forState:UIControlStateNormal];\n        } else\
    \ {\n            [saucerButton setImage:[UIImage imageNamed:@\"saucer_inactive\"\
    ] forState:UIControlStateNormal];\n        }\n    } else {\n        [saucerButton\
    \ setImage:[UIImage imageNamed:@\"saucer_purchase\"] forState:UIControlStateNormal];\n\
    \    }\n    if ([purchases containsObject:PURCHASE_INGAME_POWERUPS]){\n      \
    \  if ([params includePowerups]){\n            [powerupButton setImage:[UIImage\
    \ imageNamed:@\"powerup_active\"] forState:UIControlStateNormal];\n        } else\
    \ {\n            [powerupButton setImage:[UIImage imageNamed:@\"powerup_inactive\"\
    ] forState:UIControlStateNormal];\n        }\n    } else {\n        [powerupButton\
    \ setImage:[UIImage imageNamed:@\"powerup_purchase\"] forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\n在[Listing 10-6](#9781430244226_Ch10.xhtml#_list6)中，我们看到了`setGameParameters`任务。这个任务负责让用户界面反映传入的`GameParameters`对象（名为`param`）的状态。对于`asteroidButton`，我们根据`includeAsteroids`属性的值，简单地指明要显示哪个图像。对于`saucerButton`，我们执行类似的检查，但仅在飞碟的产品ID包含在`NSSet\
    \ purchases`中的情况下才进行。如果产品ID不存在，我们则将按钮的图像设置为显示购买版本。我们对`UIButton` `powerButton`进行了类似的处理，将其背景设置为活动、非活动或购买状态。\n\
    \n## 发起购买\n\n现在我们已经了解了按钮状态是如何管理的，接下来看看点击其中一个购买按钮是如何触发购买的。[Listing 10-7](#9781430244226_Ch10.xhtml#_list7)\
    \ 展示了用户按下飞碟按钮时运行的代码。\n\n**[Listing 10-7](#9781430244226_Ch10.xhtml#_list7).**\
    \ ExtrasController.m (saucerButtonClicked:)\n\n```\n- (IBAction)saucerButtonClicked:(id)sender\
    \ {\n    if ([gameParams.purchases containsObject:PURCHASE_INGAME_SAUCERS]){\n\
    \        [gameParams setIncludeSaucers:![gameParams includeSaucers]];\n      \
    \  [self setGameParams:gameParams];\n        [gameParams writeToDefaults];\n \
    \   } else {\n        SKProduct* product = [idsToProducts objectForKey:PURCHASE_INGAME_SAUCERS];\n\
    \        SKPayment* payRequest = [SKPayment paymentWithProduct: product];\n  \
    \      [[SKPaymentQueue defaultQueue] addPayment:payRequest];\n    }\n}\n```\n\
    \n在[Listing 10-7](#9781430244226_Ch10.xhtml#_list7)中，我们看到了`saucerButtonClicked`任务，它在用户点击飞碟按钮时被调用。如果已经购买了飞碟功能，我们知道用户只是想切换是否显示飞碟。对此，我们通过翻转`includeSaucers`的值、调用`setGameParams`来更新UI，并将更改写入磁盘来响应。如果用户尚未购买飞碟功能，则说明他/她想要进行购买。为了启动此过程，我们从`idsToProducts`中检索我们的`SKProduct`对象，然后使用该`SKProduct`创建一个`SKPayment`对象。最后，我们将`SKPayment`对象添加到默认的`SKPaymentQueue`中。这会触发对话框流程，如图[图10-7](#9781430244226_Ch10.xhtml#Fig7)所示。管理道具功能的代码与[Listing\
    \ 10-7](#9781430244226_Ch10.xhtml#_list7)中的代码几乎相同，因此不值得再看。接下来，让我们看看如何响应成功的购买。\n\
    \n## 响应成功购买\n\n为了响应成功的购买，我们之前在[Listing 10-2](#9781430244226_Ch10.xhtml#_list2)中向默认的`SKPaymentQueue`添加了一个`SKPaymentTransactionObserver`实例。现在我们准备看看当`SKPaymentQueue`成功处理一次购买时调用的代码，如[Listing\
    \ 10-8](#9781430244226_Ch10.xhtml#_list8)所示。\n\n**[Listing 10-8](#9781430244226_Ch10.xhtml#_list8).**\
    \ ExtrasController.m (paymentQueue: updatedTransactions:)\n\n```\n- (void)paymentQueue:(SKPaymentQueue\
    \ *)queue updatedTransactions:(NSArray *)transactions{\n    for (SKPaymentTransaction*\
    \ transaction in transactions){\n        if (transaction.transactionState == SKPaymentTransactionStatePurchased\
    \ || transaction.transactionState == SKPaymentTransactionStateRestored){\n   \
    \         NSString* productIdentifier = transaction.payment.productIdentifier;\n\
    \            [[gameParams purchases] addObject: productIdentifier];\n        \
    \    [gameParams writeToDefaults];\n            [self setGameParams:gameParams];\n\
    \            [queue finishTransaction:transaction];\n        }\n    }\n}\n```\n\
    \n在[Listing 10-8](#9781430244226_Ch10.xhtml#_list8)中，我们看到了由`ExtrasController`类实现的`paymentQueue:updatedTransactions:`任务。在这个任务中，我们遍历事务数组（`transactions`）中的每一个`SKPaymentTransaction`。对于每个`SKPaymentTransaction`，我们检查其状态是否为`SKPaymentTransactionStatePurchased`或`SKPaymentTransactionStateRestored`。如果是，我们将事务的产品ID添加到`gameParams`的`purchases`属性中并保存。我们还通过调用`setGameParams:`来更新UI。最后，我们通过调用`finishTransaction:`通知队列我们已完成对该事务的处理。\n\
    \n从技术上讲，如果`paymentQueue:updatedTransactions:`任务是由用户发起新购买引起的，那么事务的状态将是`SKPaymentTransactionStatePurchased`。但由于我们使用的产品类型是非消耗型的，我们需要确保用户能够恢复其购买记录，以防其设备被重置或他/她是在另一台iOS设备上进行的购买。为了处理这种情况，我们确保允许事务状态为`SKPaymentTransactionStateRestored`，并将其视为与新购买相同来处理。"
