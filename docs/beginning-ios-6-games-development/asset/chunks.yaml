  trans: "\n# `BeltCommanderController` 设置与游戏逻辑\n\n与`BeltCommanderController`类相关的任务有很多。目前我们只需要关注`doNewGame:`和`tapGesture:`这两个；其他任务我们将在逐步实现的过程中介绍。`doNewGame:`任务由`RootViewController`调用以开始新游戏——我们稍后会查看其实现。`tapGesture:`任务在`UITapGestureRecognizer`检测到屏幕点击时被调用；我们稍后也会看到这一点。关于手势工作原理的更多内容，请参阅第\
    \ 8 章。让我们先聚焦于设置。\n\n## 理解设置过程\n\n要让`BeltCommanderController`完成设置，我们需要执行几个步骤。既然我们知道`BeltCommanderController`继承自`GameController`，那么它应该实现一个`doSetup`任务，如代码清单\
    \ 12-8 所示。\n\n**代码清单 12-8.** `BeltCommanderController.m` (`doSetup`)\n\n```\n\
    -(BOOL)doSetup{\n    if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(480,\
    \ 320)];\n        [self setIsPaused:YES];\n        \n        NSMutableArray* classes\
    \ = [NSMutableArray new];\n        [classes addObject:[Saucer class]];\n     \
    \   [classes addObject:[Bullet class]];\n        [classes addObject:[Asteroid\
    \ class]];\n        [classes addObject:[Powerup class]];\n        [self setSortedActorClasses:classes];\n\
    \        \n        UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(tapGesture:)];\n        \n     \
    \   [self prepareAudio: AUDIO_BLIP];\n        [self prepareAudio: AUDIO_GOT_POWERUP];\n\
    \        [self prepareAudio: AUDIO_VIPER_EXPLOSION];\n        [self playBackgroundAudio:\
    \ AUDIO_BC_THEME];\n    \n        [actorsView addGestureRecognizer:tapRecognizer];\n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\n在代码清单 12-8 中，我们看到了`BeltCommanderController`类定义的`doSetup`任务。在此任务中，我们将游戏尺寸定义为\
    \ 480x320，这恰好是 iPhone 屏幕的原始点（point）尺寸。同时，我们将`isPaused`属性设置为`YES`，因此在后续`doNewGame:`被调用之前，不会有任何动画运行。下一步是指定我们希望随着游戏进程方便访问的`Actors`（角色）类。在此例中，我们指定了`Saucer`、`Bullet`、`Asteroid`和`Powerup`这些类。请记住，游戏中只有一个`Viper`，并且我们在头文件中已经有了对它的引用。我们做的最后一件事是创建一个`UITapGestureRecognizer`并将其添加到`actorsView`中。这样，当用户点击屏幕时，`tapGesture:`任务就会被调用。在此之前，我们需要了解新游戏是如何创建的。\n\
    \n## 新游戏\n\n无论我们运行的是第一局游戏还是第一百局，它们都是从`doNewGame:`任务开始的，如代码清单 12-9 所示。\n\n**代码清单\
    \ 12-9.** `BeltCommanderController.m` (`doNewGame:`)\n\n```\n-(void)doNewGame:(GameParameters*)aGameParameters{\n\
    \    gameParameters = aGameParameters;\n    \n    [self removeAllActors];\n  \
    \  \n    [self setScore:0];\n    [self setStepNumber:0];\n    [self setScoreChangedOnStep:0];\n\
    \    \n    viper = [Viper viper:self];\n    [self addActor:viper];\n    \n   \
    \ asteroids_destroyed = 0;\n    \n    [self setIsPaused:NO];\n    [delegate gameStarted:self];\n\
    }\n```\n\n在代码清单 12-9 中，我们看到了`doNewGame:`任务，它由`RootViewController`调用来开始新游戏。在此任务中，我们设置了`gameParameters`以供后续引用。然后我们必须重置此对象，使其为新游戏做好准备。为了移除所有`Actors`，我们调用`removeAllActors`。我们还需要重置分数、步骤数以及已摧毁的小行星数量。我们还创建了一个`Viper`对象并将其存储在变量`viper`中。\n\
    \n重置完成后，我们将`isPaused`设置为`NO`，并通知`delegate`游戏已开始。让我们来看看我们如何处理输入，然后我们就准备好进行设置之外的工作了。\n\
    \n## 处理输入\n\n一旦`isPaused`被设置为`NO`，游戏就启动并运行了。此时，游戏中唯一的`actor`就是`Viper`。让我们花点时间来理解我们是如何截获输入，让`Viper`在小行星和外星人出现之前移动的。`tapGesture:`任务如代码清单\
    \ 12-10 所示。\n\n**代码清单 12-10.** `BeltCommanderController.m` (`tapGesture:`)\n\n\
    ```\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer{\n    if (![self\
    \ isPaused]){\n        \n        CGSize gameSize = [self gameAreaSize];\n    \
    \    CGSize viewSize = [actorsView frame].size;\n        float xRatio = gameSize.width/viewSize.width;\n\
    \        float yRatio = gameSize.height/viewSize.height;\n        \n        CGPoint\
    \ locationInView = [tapRecognizer locationInView:actorsView];\n        CGPoint\
    \ pointInGame = CGPointMake(locationInView.x*xRatio, locationInView.y*yRatio);\n\
    \        [viper setMoveToPoint: pointInGame within:self];\n    }\n}\n```\n\n在代码清单\
    \ 12-10 中，我们看到了`tapGesture:`任务，它在用户点击屏幕时被调用。在此任务中，检查是否处于暂停状态后，我们必须将触摸点转换为游戏坐标。在\
    \ iPhone 上，这不是严格必需的，因为`actorsView`视图的宽度和高度（点）与游戏尺寸相同。然而，当我们在 iPad 上玩这个游戏时，`actorsView`的尺寸是\
    \ 1024x682，而我们的游戏仍然是 640x480。为了从一个坐标空间转换到另一个坐标空间，我们将游戏宽度除以`actorsView`的宽度，然后乘以触摸点的*X*位置。我们对高度和*Y*值重复此过程。一旦我们计算出点的位置，我们在`Viper`上调用`setMoveToPoint:within:`，这会使它开始移动。我们将在下一节仔细研究`Viper`类时，查看`setMoveToPoint:within:`的实现。\n\
    \n我们已经介绍了所有关于设置`BeltCommanderController`来运行游戏所需了解的内容。一切就绪，可以开始处理用户输入并向场景中添加新的`Actors`了。下一节将描述`BeltCommanderController`如何检查结束条件、添加`Actors`以及执行其他适用于`BeltCommanderController`类的任务。\n\
    \n## `BeltCommanderController`，一步一步来\n\n我们已经设置好了`BeltCommanderController`类，准备运行游戏。我们将查看每一步执行的代码，以管理游戏的整体状态。我们将了解如何测试结束条件、如何向场景中添加新的`Actors`，以及如何管理`Actors`之间的交互。由于`BeltCommanderController`是`GameController`的子类，我们从`applyGameLogic`任务中的游戏逻辑开始，如代码清单\
    \ 12-11 所示。\n\n**代码清单 12-11.** `BeltCommanderController.m` (`applyGameLogic`)\n\
    \n```\n-(void)applyGameLogic{\n    if ([viper health] <= 0.0f){\n      [self playAudio:AUDIO_VIPER_EXPLOSION];\n\
    \        [self doEndGame];\n    } else {\n        \n        [self doAddNewTrouble];\n\
    \        [self doCollisionDetection];\n        [self doUpdateHUD];\n        \n\
    \        if ([self stepNumber]%30 == 0){\n            [self checkAchievements];\n\
    \        }\n    }\n}\n```\n\n在代码清单 12-11 中，我们看到了`applyGameLogic`任务，它在游戏的每一步都被调用一次。我们做的第一件事是检查`Viper`的生命值是否低于\
    \ 0.0。如果低于 0.0，我们就播放爆炸音效并结束游戏——就这么简单。如果`Viper`仍然存活，我们继续调用`doAddNewTrouble`、`doCollisionDetection`和`doUpdateHUD`。\n"
- fmt: "对`checkAchievements`的调用每30步只执行一次。这是出于性能考虑——我们并不希望每一步都进行这些额外的调用。这确实有一个缺点：玩家可能达成了成就，但未能被记录。对于更复杂的游戏，我们会指定哪些成就应该在何时进行测试。\n\
    \n我们刚刚列举了大量任务，接下来将逐一处理，从`doEndGame`任务开始，如[清单12-12](#9781430244226_Ch12.xhtml#list12)所示。\n\
    \n**[清单12-12](#9781430244226_Ch12.xhtml#_list12).** `BeltCommanderController.m`\
    \ (`doEndGame`)\n\n```\n-(void)doEndGame{\n    [self setIsPaused:YES];\n    [delegate\
    \ gameOver:self];\n}\n```\n\n在[清单12-12](#9781430244226_Ch12.xhtml#list12)中，我们看到了非常简单的`doEndGame`任务，它只是暂停游戏并调用委托对象的`gameOver:`方法。`gameOver:`任务由`RootViewController`实现，可以在[清单12-5](#9781430244226_Ch12.xhtml#list5)中看到。接下来，让我们回顾一下`Actor`是如何添加到游戏中的。\n\
    \n### 添加Actor\n\n根据经验，我们知道`Actor`是通过调用`addActor:`方法添加的。然而，要制作一个游戏，我们必须包含一些逻辑来规定何时以及如何添加`Actor`。让我们继续，看看在`doAddNewTrouble`任务中如何向游戏添加新的`Actor`，如[清单12-13](#9781430244226_Ch12.xhtml#list13)所示。\n\
    \n**[清单12-13](#9781430244226_Ch12.xhtml#_list13).** `BeltCommanderController.m`\
    \ (`doAddNewTrouble`)\n\n```\n-(void)doAddNewTrouble{\n    if ([gameParameters\
    \ includeAsteroids] && arc4random() % (5*60) == 0){\n        if ([[self actorsOfType:[Asteroid\
    \ class]] count] < 20){\n            [self addActor:[Asteroid asteroid:self]];\n\
    \        }\n    }\n    if ([gameParameters includeSaucers] && arc4random() % (10*60)\
    \ == 0){\n        if ([[self actorsOfType:[Saucer class]] count] < 3){\n     \
    \       [self addActor:[Saucer saucer:self]];\n        }\n    }\n    if ([gameParameters\
    \ includePowerups] && arc4random() % (20*60) == 0){\n        [self addActor:[Powerup\
    \ powerup:self]];\n    }\n}\n```\n\n在[清单12-13](#9781430244226_Ch12.xhtml#list13)中，我们看到了负责向游戏添加新`Actor`的`doAddNewTrouble`任务。对于可能添加的三种`Actor`类型中的每一种，我们首先检查`gameParameters`是否指示应该添加该类型。如果`gameParameters`指示应添加特定类型的`Actor`，我们会进行随机检查来确定是否真的添加它。例如，`Asteroid`被添加的概率是1/300。为了添加每个`Actor`，我们创建它并调用`addActor:`方法。`Actor`的构造方法负责处理每个`Actor`如何以及在哪里创建的细节。接下来，我们将研究`Actor`如何相互交互。\n\
    \n### 碰撞检测\n\n现在我们已经知道每个`Actor`是如何添加到场景中的。接下来让我们看看它们是如何交互的。如果我们考虑这个游戏中的五个主要`Actor`，有几种交互必须被考虑，如下所示：\n\
    \n*   `Bullet`和`Asteroid`\n*   `Asteroid`和`Viper`\n*   `Bullet`和`Viper`\n*   `Bullet`和`Saucer`\n\
    *   `Powerup`和`Viper`\n\n这些交互在`doCollisionDetection`任务中处理，其第一部分如[清单12-14](#9781430244226_Ch12.xhtml#list14)所示。\n\
    \n**[清单12-14](#9781430244226_Ch12.xhtml#_list14).** `BeltCommanderController.m`\
    \ (`doCollisionDetection`, 第一部分)\n\n```\n-(void)doCollisionDetection{\n    NSSet*\
    \ bullets = [self actorsOfType:[Bullet class]];\n    NSSet* asteroids = [self\
    \ actorsOfType:[Asteroid class]];\n    NSSet* saucers = [self actorsOfType:[Saucer\
    \ class]];\n    NSSet* powerups = [self actorsOfType:[Powerup class]];\n    \n\
    \    for (Asteroid* asteroid in asteroids){\n        for (Bullet* bullet in bullets){\n\
    \            if ([bullet overlapsWith:asteroid]){\n                [bullet decrementDamage:\
    \ self];\n                \n                asteroids_destroyed++;\n         \
    \       [asteroid doHit:self];\n                [self incrementScore: [asteroid\
    \ level]*10];\n                break;\n            }\n        }\n        if ([asteroid\
    \ overlapsWith:viper]){\n            [viper decrementHealth: [asteroid level]*2];\n\
    \            \n            Shield* shield = [Shield shieldProtecting:viper From:\
    \ asteroid];\n            [self addActor:shield];\n            \n            asteroids_destroyed++;\n\
    \            [asteroid doHit:self];\n        }\n    }\n```\n\n在[清单12-14](#9781430244226_Ch12.xhtml#list14)中，我们看到了`doCollisionDetection`任务的第一部分，这里处理了与Asteroid相关的交互。在这个任务中，我们首先要做的第一件事是获取我们将要交互的所有不同`Actor`的引用。一旦我们拥有了所有`Asteroid`、`Bullet`和`Viper`的引用，我们就可以开始测试是否有碰撞发生。在[清单12-14](#9781430244226_Ch12.xhtml#list14)的最外层循环中，我们首先测试每个`Asteroid`是否与每个`Bullet`重叠。如果发生重叠，就让`Bullet`减少`Asteroid`的伤害值，这通常会将`Asteroid`从游戏中移除，但稍后会详细介绍。在调用`Asteroid`的`doHit:`方法之前，我们还会记录已摧毁了另一个Asteroid。最后，我们增加分数。\n\
    \n在[清单12-14](#9781430244226_Ch12.xhtml#list14)中，在考虑了每个`Asteroid`和`Bullet`之间的关系之后，我们检查`Asteroid`是否与`Viper`重叠。如果重叠，则减少`Viper`的生命值并向场景中添加一个`Shield`。`Shield`是一个仅用于装饰的`Actor`，除此之外没有游戏功能；它的外观像是飞船升起了一个护盾。\n\
    \n让我们看看`doCollisionDetection`任务的其余部分，并了解其余 Actor 间的关系是如何处理的。该任务在[清单12-15](#9781430244226_Ch12.xhtml#list15)中继续。\n\
    \n**[清单12-15](#9781430244226_Ch12.xhtml#_list15).** `BeltCommanderController.m`\
    \ (`doCollisionDetection`, 第二部分)\n\n```\n    for (Bullet* bullet in bullets){\n\
    \        if ([[bullet source] isKindOfClass:[Saucer class]]){\n            if\
    \ ([viper overlapsWith: bullet]){\n                [viper decrementHealth: [bullet\
    \ damage]];\n                \n                Shield* shield = [Shield shieldProtecting:viper\
    \ From: bullet];\n                [self addActor:shield];\n                \n\
    \                [self removeActor:bullet];\n                break;\n        \
    \    }\n        } else {\n            for (Saucer* saucer in saucers){\n     \
    \           if ([saucer overlapsWith: bullet]){\n                    [saucer decrementHealth:[bullet\
    \ damage]];\n                    Shield* shield = [Shield shieldProtecting:saucer\
    \ From:bullet];\n                    [self addActor:shield];\n               \
    \     [self removeActor:bullet];\n                    break;\n               \
    \ }\n            }\n        }\n    }\n    \n    for (Powerup* powerup in powerups){\n\
    \        if ([powerup overlapsWith:viper]){\n            [self playAudio:AUDIO_GOT_POWERUP];\n\
    \            [powerup doHitOn:viper in:self];\n        }\n    }\n}\n```\n\n在[清单12-15](#9781430244226_Ch12.xhtml#list15)中，我们继续查看`doCollisionDetection`任务。在遍历所有`Bullet`时，我们首先考虑`Bullet`和`Viper`之间的交互。我们通过检查`Bullet`的`source`属性来实现这一点。"
  raw: 'The call to `checkAchievements` is done only once every 30 steps. This is
    done for performance reasons—we don’t really want to make these extra calls for
    every step. This does have the drawback that achievements might be reached by
    the player but not recorded. For a more sophisticated game, we would designate
    which achievements are tested when.    We just listed off a good number of tasks,
    and we will take each in turn, starting with the task `doEndGame`, as shown in
    [Listing 12-12](#9781430244226_Ch12.xhtml#list12).    **[Listing 12-12](#9781430244226_Ch12.xhtml#_list12).** `BeltCommanderController`.m
    (`doEndGame`)    ``` -(void)doEndGame{     [self setIsPaused:YES];     [delegate
    gameOver:self]; } ```    In [Listing 12-12](#9781430244226_Ch12.xhtml#list12),
    we see the very simple task `doEndGame` where we simply pause the game and call
    `gameOver:` on the delegate. The task `gameOver:` is implemented by `RootViewController`
    and can be seen in [Listing 12-5](#9781430244226_Ch12.xhtml#list5). Next, let’s
    review how `Actors` are added to the game.    Adding Actors    We know from experience
    that Actors are added by calling `addActor` `:`. However, to make a game, we have
    to include some logic that dictates when and how an Actor is added. Let’s continue
    and see how we add new `Actors` to the game in the task `doAddNewTrouble`, as
    shown in [Listing 12-13](#9781430244226_Ch12.xhtml#list13).    **[Listing 12-13](#9781430244226_Ch12.xhtml#_list13).** `BeltCommanderController`.m
    (`doAddNewTrouble`)    ``` -(void)doAddNewTrouble{     if ([gameParameters includeAsteroids]
    && arc4random() % (5*60) == 0){         if ([[self actorsOfType:[Asteroid class]]
    count] < 20){             [self addActor:[Asteroid asteroid:self]];         }
        }     if ([gameParameters includeSaucers] && arc4random() % (10*60) == 0){
            if ([[self actorsOfType:[Saucer class]] count] < 3){             [self
    addActor:[Saucer saucer:self]];         }     }     if ([gameParameters includePowerups]
    && arc4random() % (20*60) == 0){         [self addActor:[Powerup powerup:self]];
        } } ```    In [Listing 12-13](#9781430244226_Ch12.xhtml#list13), we see the
    task `doAddNewTrouble` that is responsible for adding new `Actors` to the game.
    For each of three types of `Actors` we might add, we first check to see if `gameParameters`
    indicates that we should add it. If `gameParameters` indicates that we should
    add an `Actor` of a particular type, we perform a random check to see if we actually
    add it. For example, `Asteroids` have a 1 in 300 chance to be added. To add each
    `Actor` we create it and call `addActor:`. The `Actor’s` constructor handles the
    details of how and where each `Actor` is created. We will now move on and examine
    how Actors interact with each other.    Collision Detection    Now we know how
    each Actor is added to the scene. Let’s move on and look at how they interact.
    If we consider the five main Actors in this game, there are several interactions
    that must be considered, as follows:    *   `Bullets` and `Asteroids` *   `Asteroids`
    and the `Viper` *   `Bullets` and the `Viper` *   `Bullets` and `Saucers` *   `Powerups`
    and the `Viper`    These interactions are handled in the task `doCollisionDetection`,
    the first part of which is shown in [Listing 12-14](#9781430244226_Ch12.xhtml#list14).    **[Listing
    12-14](#9781430244226_Ch12.xhtml#_list14).** `BeltCommanderController.


    m` (`doCollisionDetection, part 1`)    ``` -(void)doCollisionDetection{     NSSet*
    bullets = [self actorsOfType:[Bullet class]];     NSSet* asteroids = [self actorsOfType:[Asteroid
    class]];     NSSet* saucers = [self actorsOfType:[Saucer class]];     NSSet* powerups
    = [self actorsOfType:[Powerup class]];           for (Asteroid* asteroid in asteroids){
            for (Bullet* bullet in bullets){             if ([bullet overlapsWith:asteroid]){
                    [bullet decrementDamage: self];                                   asteroids_destroyed++;
                    [asteroid doHit:self];                 [self incrementScore: [asteroid
    level]*10];                 break;             }         }         if ([asteroid
    overlapsWith:viper]){             [viper decrementHealth: [asteroid level]*2];
                              Shield* shield = [Shield shieldProtecting:viper From:
    asteroid];             [self addActor:shield];                           asteroids_destroyed++;
                [asteroid doHit:self];         }     } ```    In [Listing 12-14](#9781430244226_Ch12.xhtml#list14),
    we see the first part of the task `doCollisionDetection` where we handle the interaction
    concerning Asteroids. The first thing we do in this task is to get a reference
    to all of the different `Actors` we are going to need to interact with. Once we
    have reference to all of the `Asteroids`, `Bullets`, and the `Viper`, we can start
    testing to see if there are collisions. Inside the outermost loop in [Listing
    12-14](#9781430244226_Ch12.xhtml#list14), we start by testing to see if each `Asteroid`
    overlaps with each `Bullet`. If they do, we have the bullet decrement the Asteroid’s
    damage, which usually removes the Asteroid from the game, but more on that later.
    We also record that we have destroyed another Asteroid before calling `doHit;`
    on the `Asteroid`. Lastly, we increment the score.    In [Listing 12-14](#9781430244226_Ch12.xhtml#list14),
    after we have considered the relation between each `Asteroid` and `Bullet`, we
    check to see if the `Asteroid` is overlapping the `Viper`. If it is, we decrement
    the health of the `Viper` and add a `Shield` to the scene. The `Shield` is an
    `Actor` that is just decoration and has no game function beyond that; it looks
    like a shield went up to protect the spaceship.    Let’s look at the rest of the
    `doCollisionDetection` task and understand how the rest of the inter-Actor relationships
    are handled. The task continues in [Listing 12-15](#9781430244226_Ch12.xhtml#list15).    **[Listing
    12-15](#9781430244226_Ch12.xhtml#_list15).** `BeltCommanderController.m` (`doCollisionDetection,
    part` 2)    ```     for (Bullet* bullet in bullets){         if ([[bullet source]
    isKindOfClass:[Saucer class]]){             if ([viper overlapsWith: bullet]){
                    [viper decrementHealth: [bullet damage]];                                   Shield*
    shield = [Shield shieldProtecting:viper From: bullet];                 [self addActor:shield];
                                      [self removeActor:bullet];                 break;
                }         } else {             for (Saucer* saucer in saucers){                 if
    ([saucer overlapsWith: bullet]){                     [saucer decrementHealth:[bullet
    damage]];                     Shield* shield = [Shield shieldProtecting:saucer
    From:bullet];                     [self addActor:shield];                     [self
    removeActor:bullet];                     break;                 }             }
            }     }           for (Powerup* powerup in powerups){         if ([powerup
    overlapsWith:viper]){             [self playAudio:AUDIO_GOT_POWERUP];             [powerup
    doHitOn:viper in:self];         }     } } ```    In [Listing 12-15](#9781430244226_Ch12.xhtml#list15),
    we continue looking at the task `doCollisionDetection`. While iterating over all
    of the `Bullets`, we start by considering the interactions between `Bullets` and
    the `Vipers`. We do this by checking the `source` property on the `Bullet`.'
  trans: "\n对`checkAchievements`的调用每 30 步只执行一次。这是出于性能考虑——我们并不希望每一步都进行这些额外的调用。这确实有一个缺点：玩家可能达成了成就，但未能被记录。对于更复杂的游戏，我们会指定哪些成就应该在何时进行测试。\n\
    \n我们刚刚列举了大量任务，接下来将逐一处理，从`doEndGame`任务开始，如清单 12-12 所示。\n\n**清单 12-12.** `BeltCommanderController.m`\
    \ (`doEndGame`)\n\n```\n-(void)doEndGame{\n    [self setIsPaused:YES];\n    [delegate\
    \ gameOver:self];\n}\n```\n\n在清单 12-12 中，我们看到了非常简单的`doEndGame`任务，它只是暂停游戏并调用委托对象的`gameOver:`方法。`gameOver:`任务由`RootViewController`实现，可以在清单\
    \ 12-5 中看到。接下来，让我们回顾一下`Actor`是如何添加到游戏中的。\n\n### 添加 Actor\n\n根据经验，我们知道`Actor`是通过调用`addActor:`方法添加的。然而，要制作一个游戏，我们必须包含一些逻辑来规定何时以及如何添加`Actor`。让我们继续，看看在`doAddNewTrouble`任务中如何向游戏添加新的`Actor`，如清单\
    \ 12-13 所示。\n\n**清单 12-13.** `BeltCommanderController.m` (`doAddNewTrouble`)\n\
    \n```\n-(void)doAddNewTrouble{\n    if ([gameParameters includeAsteroids] && arc4random()\
    \ % (5*60) == 0){\n        if ([[self actorsOfType:[Asteroid class]] count] <\
    \ 20){\n            [self addActor:[Asteroid asteroid:self]];\n        }\n   \
    \ }\n    if ([gameParameters includeSaucers] && arc4random() % (10*60) == 0){\n\
    \        if ([[self actorsOfType:[Saucer class]] count] < 3){\n            [self\
    \ addActor:[Saucer saucer:self]];\n        }\n    }\n    if ([gameParameters includePowerups]\
    \ && arc4random() % (20*60) == 0){\n        [self addActor:[Powerup powerup:self]];\n\
    \    }\n}\n```\n\n在清单 12-13 中，我们看到了负责向游戏添加新`Actor`的`doAddNewTrouble`任务。对于可能添加的三种`Actor`类型中的每一种，我们首先检查`gameParameters`是否指示应该添加该类型。如果`gameParameters`指示应添加特定类型的`Actor`，我们会进行随机检查来确定是否真的添加它。例如，`Asteroid`被添加的概率是\
    \ 1/300。为了添加每个`Actor`，我们创建它并调用`addActor:`方法。`Actor`的构造方法负责处理每个`Actor`如何以及在哪里创建的细节。接下来，我们将研究`Actor`如何相互交互。\n\
    \n### 碰撞检测\n\n现在我们已经知道每个`Actor`是如何添加到场景中的。接下来让我们看看它们是如何交互的。如果我们考虑这个游戏中的五个主要`Actor`，有几种交互必须被考虑，如下所示：\n\
    \n*   `Bullet`和`Asteroid`\n*   `Asteroid`和`Viper`\n*   `Bullet`和`Viper`\n*   `Bullet`和`Saucer`\n\
    *   `Powerup`和`Viper`\n\n这些交互在`doCollisionDetection`任务中处理，其第一部分如清单 12-14 所示。\n\
    \n**清单 12-14.** `BeltCommanderController.m` (`doCollisionDetection`, 第一部分)\n\n\
    ```\n-(void)doCollisionDetection{\n    NSSet* bullets = [self actorsOfType:[Bullet\
    \ class]];\n    NSSet* asteroids = [self actorsOfType:[Asteroid class]];\n   \
    \ NSSet* saucers = [self actorsOfType:[Saucer class]];\n    NSSet* powerups =\
    \ [self actorsOfType:[Powerup class]];\n    \n    for (Asteroid* asteroid in asteroids){\n\
    \        for (Bullet* bullet in bullets){\n            if ([bullet overlapsWith:asteroid]){\n\
    \                [bullet decrementDamage: self];\n                \n         \
    \       asteroids_destroyed++;\n                [asteroid doHit:self];\n     \
    \           [self incrementScore: [asteroid level]*10];\n                break;\n\
    \            }\n        }\n        if ([asteroid overlapsWith:viper]){\n     \
    \       [viper decrementHealth: [asteroid level]*2];\n            \n         \
    \   Shield* shield = [Shield shieldProtecting:viper From: asteroid];\n       \
    \     [self addActor:shield];\n            \n            asteroids_destroyed++;\n\
    \            [asteroid doHit:self];\n        }\n    }\n```\n\n在清单 12-14 中，我们看到了`doCollisionDetection`任务的第一部分，这里处理了与\
    \ Asteroid 相关的交互。在这个任务中，我们首先要做的第一件事是获取我们将要交互的所有不同`Actor`的引用。一旦我们拥有了所有`Asteroid`、`Bullet`和`Viper`的引用，我们就可以开始测试是否有碰撞发生。在清单\
    \ 12-14 的最外层循环中，我们首先测试每个`Asteroid`是否与每个`Bullet`重叠。如果发生重叠，就让`Bullet`减少`Asteroid`的伤害值，这通常会将`Asteroid`从游戏中移除，但稍后会详细介绍。在调用`Asteroid`的`doHit:`方法之前，我们还会记录已摧毁了另一个\
    \ Asteroid。最后，我们增加分数。\n\n在清单 12-14 中，在考虑了每个`Asteroid`和`Bullet`之间的关系之后，我们检查`Asteroid`是否与`Viper`重叠。如果重叠，则减少`Viper`的生命值并向场景中添加一个`Shield`。`Shield`是一个仅用于装饰的`Actor`，除此之外没有游戏功能；它的外观像是飞船升起了一个护盾。\n\
    \n让我们看看`doCollisionDetection`任务的其余部分，并了解其余 Actor 间的关系是如何处理的。该任务在清单 12-15 中继续。\n\
    \n**清单 12-15.** `BeltCommanderController.m` (`doCollisionDetection`, 第二部分)\n\n\
    ```\n    for (Bullet* bullet in bullets){\n        if ([[bullet source] isKindOfClass:[Saucer\
    \ class]]){\n            if ([viper overlapsWith: bullet]){\n                [viper\
    \ decrementHealth: [bullet damage]];\n                \n                Shield*\
    \ shield = [Shield shieldProtecting:viper From: bullet];\n                [self\
    \ addActor:shield];\n                \n                [self removeActor:bullet];\n\
    \                break;\n            }\n        } else {\n            for (Saucer*\
    \ saucer in saucers){\n                if ([saucer overlapsWith: bullet]){\n \
    \                   [saucer decrementHealth:[bullet damage]];\n              \
    \      Shield* shield = [Shield shieldProtecting:saucer From:bullet];\n      \
    \              [self addActor:shield];\n                    [self removeActor:bullet];\n\
    \                    break;\n                }\n            }\n        }\n   \
    \ }\n    \n    for (Powerup* powerup in powerups){\n        if ([powerup overlapsWith:viper]){\n\
    \            [self playAudio:AUDIO_GOT_POWERUP];\n            [powerup doHitOn:viper\
    \ in:self];\n        }\n    }\n}\n```\n\n在清单 12-15 中，我们继续查看`doCollisionDetection`任务。在遍历所有`Bullet`时，我们首先考虑`Bullet`和`Viper`之间的交互。我们通过检查`Bullet`的`source`属性来实现这一点。\n"
- fmt: "# 排版后内容\n\n如果`source`是`Saucer`，那么`Bullet`原本是针对`Viper`的，不能伤害`Saucer`。如果`Bullet`与`Viper`重叠，则减少`Viper`的生命值，添加`Shield`，并将`Bullet`从游戏中移除。如果`Bullet`不是由`Saucer`发射的，那它一定来自`Viper`。因此我们检查`Bullet`是否与任何`Saucer`重叠。如果重叠，则减少`Saucer`的生命值，为`Saucer`添加`Shield`，并移除`Bullet`。\n\
    \n在`doCollisionDetection`中，最后一个需要考虑的关系是`Powerups`与`Viper`之间的关系。我们遍历游戏中所有的`Powerups`，检查它们是否与`Viper`重叠。如果重叠，则在`Powerup`上调用`doHitOn:in:`来应用奖励。`doHit:in:`的实现将在详细讨论`Powerup`类时介绍。\n\
    \n现在我们已经了解了所有不同Actor之间的交互。在详细研究每个不同的Actor类之前，让我们先看看如何更新屏幕上的分数和生命值条。\n\n## 更新HUD\n\
    \n在游戏的每一步中，分数或生命值条都可能发生变化。这两个组件统称为平视显示器（HUD）。回顾[清单12-7](#9781430244226_Ch12.xhtml#list7)，我们看到这两个组件通过`IBOutlet`连接到`BeltCommanderController`。我们看到`scoreLabel`是一个简单的`UILabel`，但`HealthBarView`类并不熟悉。我们稍后将讨论`HealthBarView`类；首先，让我们看看在`doUpdateHUD`任务中更新这些组件的代码，如[清单12-16](#9781430244226_Ch12.xhtml#list16)所示。\n\
    \n**[清单12-16](#9781430244226_Ch12.xhtml#_list16).** `BeltCommanderController.m`（`doUpdateHUD`）\n\
    \n```\n-(void)doUpdateHUD{\n    if ([self stepNumber] == [self scoreChangedOnStep]){\n\
    \        [scoreLabel setText: [[NSNumber numberWithLong:[self score]] stringValue]\
    \ ];\n    }\n    [healthBarView setHealth:[viper health]/[viper maxHealth]];\n\
    }\n```\n\n在[清单12-16](#9781430244226_Ch12.xhtml#list16)中，我们看到任务`doUpdateHUD`在游戏的每一步中被调用。在这个任务中，我们检查当前的`stepNumber`是否等于属性`scoreChangedOnStep`。属性`scoreChangedOnStep`是上次更新分数时的`stepNumber`值。因此，如果`stepNumber`等于`scoreChangedOnStep`，我们就知道分数在这一步被修改了，因此需要更新`scoreLabel`。要更新`scoreLabel`，我们只需调用`setText:`并传入分数的`NSString`版本。\n\
    \n在[清单12-16](#9781430244226_Ch12.xhtml#list16)中，我们还在`healthBarView`上调用`setHealth:`来更新生命值条的绘制方式。对象`healthBarView`是`HealthBarView`类型，它只是一个带有自定义`drawRect:`任务的`UIView`，如[清单12-17](#9781430244226_Ch12.xhtml#list17)所示。\n\
    \n**[清单12-17](#9781430244226_Ch12.xhtml#_list17).** `HealthBarView.m`（`drawRect:`）\n\
    \n```\n- (void)drawRect:(CGRect)rect {\n    [self setDefaults];\n    int index\
    \ = 0;\n    \n    float marker = [[percents objectAtIndex:index] floatValue];\n\
    \    \n    while (percent > marker) {\n        marker = [[percents objectAtIndex:++index]\
    \ floatValue];\n    }\n    \n    UIColor* baseColor = [colors objectAtIndex:index];\n\
    \    const float* rgb = CGColorGetComponents( baseColor.CGColor );\n    \n   \
    \ UIColor* frameColor = [UIColor colorWithRed:rgb[0] green:rgb[1] blue:rgb[2]\
    \ alpha:.8f];\n    UIColor* healthColor = [UIColor colorWithRed:rgb[0] green:rgb[1]\
    \ blue:rgb[2] alpha:.5f];\n    \n    [frameColor setStroke];\n    [healthColor\
    \ setFill];\n    \n    CGSize size = [self frame].size;\n    CGContextRef context\
    \ = UIGraphicsGetCurrentContext();\n    \n    CGRect frameRect = CGRectMake(1,\
    \ 1, size.width-2, size.height-2);\n    CGContextStrokeRect(context, frameRect);\n\
    \    \n    CGRect heatlhRect = CGRectMake(1, 1, (size.width-2)*percent, size.height-2);\n\
    \    CGContextFillRect(context, heatlhRect);\n}\n```\n\n在[清单12-17](#9781430244226_Ch12.xhtml#list17)中，我们看到`HealthBarView`类的任务`drawRect:`。在这个任务中，我们绘制了两个矩形。第一个矩形是填充的，第二个只是外框。除了绘制矩形之外，我们还希望调整矩形的颜色，以反映飞船的受损程度。为了确定应该使用哪种颜色作为`baseColor`，我们遍历`NSArray\
    \ percents`，直到要绘制的百分比高于数组中索引位置的百分比。\n\n一旦我们有了基础颜色，我们就用它创建两种修改后的颜色。第一种颜色是`frameColor`，用于生命值条的外框，其alpha值为0.8。第二种颜色是`healthColor`，用于绘制生命值条的内部，其alpha值为0.5。\n\
    \n为了绘制矩形，我们首先通过调用`CGRectMake`来定义它们。创建`CGRect`后，我们分别调用`CGContextStrokeRect`和`CGContextFillRect`。\n\
    \n我们已经研究了`BeltCommanderController`类，并了解了它的工作原理。在下一节中，我们将研究四个主要的Actor，并理解它们如何拥有各自的功能。\n\
    \n## 实现Actor\n\n我们已经回顾了`BeltCommanderController`类如何处理全局问题。它控制着`Actor`的创建时间和方式，并管理它们之间的交互。然而，游戏的许多功能是在构成不同`Actor`的类中实现的。在本节中，我们将逐一研究四个主要的`Actor`，并理解使它们按我们期望方式工作的关键自定义设置。在前几章中，我们已经实现了不同类型的Actor。因此，我们只关注使每个Actor具有其有趣特性的代码片段。如果您想回顾如何实现Actor，请查看第6章和第7章。此外，您随时可以查看完整的源代码。让我们从`Viper`类开始。\n\
    \n### Viper Actor\n\n`Viper`类代表屏幕左侧的飞船。这是用户控制以获得高分的`Actor`。`Viper`持续向右发射`Bullet`。要移动`Viper`，用户轻触屏幕，指示一个在`Viper`上方或下方的目标点。移动时，图形会发生变化，显示飞船顶部或底部的推进器。此外，`Viper`可以拦截`Powerup`来升级其武器。最后，`Viper`拥有固定数量的生命值，并且会缓慢恢复。总结如下，`Viper`的关键特性包括：\n\
    \n- 移动到用户指定的点。\n- 飞船移动时推进器点火。\n- 持续发射子弹。\n- 在“强化”时提升子弹质量。\n- 拥有能自行恢复的生命值。\n\n\
    让我们查看源代码，了解如何实现这些特性，首先从上下文相关的头文件开始，如[清单12-18](#9781430244226_Ch12.xhtml#list18)所示。\n\
    \n**[清单12-18](#9781430244226_Ch12.xhtml#_list18).** `Viper.h`"
  raw: 'If the `source` was a `Saucer`, then the `Bullet` was intended for the `Viper`
    and cannot hurt a `Saucer`. If the `Bullet` overlaps with the `Viper`, we decrement
    the `Viper''s` health, add a `Shield`, and remove the `Bullet` from the game.    If
    the `Bullet` was not shot by a `Saucer`, it must have come from the `Viper`. So
    we check to see if the Bullet overlaps with any of the `Saucers`. If it does,
    we decrement the health of the `Saucer`, add a `Shield` to the `Saucer`, and remove
    the `Bullet`.    The last relationship we have to consider in `doCollisionDetection`
    is that between `Powerups` and the `Viper`. We iterate over all of the `Powerups`
    in the game and check if they overlap. If they do, we call `doHitOn:in:` on the
    `Powerup` to apply the bonus. The implementation of `doHit:in:` will be described
    when we consider the `Powerup` class in detail.    We have now looked at all of
    the interactions between the different Actors. Before looking at each of the different
    Actor classes, let’s take a look how we update the score and the health bar on
    the screen.    Updating the HUD    For every step of the game, the score or the
    health meter might change. Collectively, these two components are called the heads-up
    display (HUD). Looking back to [Listing 12-7](#9781430244226_Ch12.xhtml#list7),
    we see that these two components are connected to the `BeltCommanderController`
    though an `IBOutlet`. We see that the `scoreLabel` is a simple `UILabel`, but
    the class `HealthBarView` is unfamiliar. We will discuss the class `HealthBarView`
    in a moment; first, let’s look at the code that updates these components in the
    task `doUpdateHUD`, as shown in [Listing 12-16](#9781430244226_Ch12.xhtml#list16).    **[Listing
    12-16](#9781430244226_Ch12.xhtml#_list16).** `BeltCommanderController.m` (`doUpdateHUD`)    ```
    -(void)doUpdateHUD{     if ([self stepNumber] == [self scoreChangedOnStep]){         [scoreLabel
    setText: [[NSNumber numberWithLong:[self score]] stringValue] ];     }     [healthBarView
    setHealth:[viper health]/[viper maxHealth]]; } ```    In [Listing 12-16](#9781430244226_Ch12.xhtml#list16),
    we see the task `doUpdateHUD` that is called for every step of the game. In this
    task, we check to see if the current `stepNumber` is equal to the property `scoreChangedOnStep`.
    The property `scoreChangedOnStep` is the value of `stepNumber` when the score
    was last updated. So, if `stepNumber` is equal to `scoreChangedOnStep`, we know
    that the score was changed in this step and, hence, `scoreLabel` needs to be updated.
    To update `scoreLabel`, we simply call `setText:` and pass in an `NSString` version
    of the score.    In [Listing 12-16](#9781430244226_Ch12.xhtml#list16), we also
