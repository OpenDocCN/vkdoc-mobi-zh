    with the workflow shown in [Figure 10-6](#9781430244226_Ch10.xhtml#Fig6), at some
    point the user will click a button to purchase an item. When this happens, we
    simply create a payment request and submit it, at which point the user will be
    prompted with a number of dialogs confirming the purchase. If all goes well, we
    will get a callback letting us know that purchase was successful. When this happens,
    we need to record that the purchase has been made. We can do this simply by sticking
    the Product ID in the standard *NSUserDefaults*, or we can do something more sophisticated,
    like save it to a web service. The dialogs that the user must work through in
    order to confirm a purchase are shown in [Figure 10-7](#9781430244226_Ch10.xhtml#Fig7).    ![9781430244226_Fig10-07.jpg](images/9781430244226_Fig10-07.jpg)    [Figure
    10-7.](#9781430244226_Ch10.xhtml#_Fig7)  Making a purchase    The dialog on the
    upper left side of the figure will always be shown, as well as the one on the
    lower right. The other two dialogs will be shown between the first and last dialog
    if the user has to log in with his Apple ID. It is important to remember that,
    as a developer, we have no control over exactly which dialogs will be displayed
    or how long the user will take to complete the process. It is important not to
    expect the user to complete this process while the action of the game is in process.'
  trans: '

    ### 在 iTunes Connect 中启用 App 内购买


    ![9781430244226_Fig10-02.jpg](img/9781430244226_Fig10-02.jpg)


    图 10-2. 在 iTunes Connect 中启用 App 内购买


    在图 10-2 中，我们看到了 iTunes Connect 中用于配置应用程序的界面。项目 A 显示了用于启用 App 内购买的按钮。点击此按钮后，您将能够向应用程序中添加用户可以购买的项目。图
    10-3 显示了我为 Belt Commander 准备的项目。


    ![9781430244226_Fig10-03.jpg](img/9781430244226_Fig10-03.jpg)


    图 10-3. 为 Belt Commander 提供的 App 内购买项目


    在图 10-3 中，我们看到了 iTunes Connect 中列出 App 内购买项目的界面。我们可以看到我们添加了两个：分别为用户可以添加到游戏中的每种额外角色类型。对于每个
    App 内购买项目，我们可以看到引用名称、产品 ID、产品类型和产品状态。引用名称用于内部使用——用户不会看到它。产品 ID 是一个唯一名称，在所有 iOS
    应用程序中使用，用于标识该购买项目。在代码中，我们将通过产品 ID 来引用此购买项目。


    类型指的是我们之前讨论过的不同购买类型——在本例中，是非消耗品。状态值表示此项 App 内购买需要满足哪些条件才能获得 Apple 的批准。（Apple 必须审核您创建的每一个
    App 内购买项目，就像每个应用程序在销售前都必须经过审核一样。）在这种情况下，系统提示我们，Apple 正在等待此购买项目的屏幕截图，然后才能进行审核。这些屏幕截图不会显示给用户——它们只是向
    Apple 提供关于该 App 内购买项目是什么的上下文信息。在图 10-4 中，我们看到了 iTunes Connect 中用于创建新 App 内购买的界面。


    ![9781430244226_Fig10-04.jpg](img/9781430244226_Fig10-04.jpg)


    图 10-4. 一个新的 App 内购买项目


    图 10-4 中的项目 A 显示了输入 App 内购买引用名称的位置。项目 B 显示了该 App 内购买的产品 ID。为了创建 App 内购买项目，您必须通过点击“添加语言”按钮（项目
    C）来提供 App 内购买项目的本地化字符串。


    在图 10-4 的“定价与购买可用性”部分，您必须将项目 D 处的项目设置为“已清除销售状态”，才能测试购买。您还必须在项目 E 处指定价格等级。这些价格等级与应用程序的价格等级相同，唯一的区别是没有免费等级。


    一旦您为应用程序定义了 App 内购买项目，您就必须配置一个测试用户，以便测试您的购买。强烈建议您在提交应用程序之前先测试 App 内购买。


    ### 创建测试用户


    一旦您定义了 App 内购买项目，您就需要创建一个测试用户，以便在您的应用程序中“购买”这些项目。这让您有机会使用与真实用户相同的流程来测试启用或禁用每个已购买的功能。图
    10-5 显示了在 iTunes Connect 中开始添加测试用户流程的位置。


    ![9781430244226_Fig10-05.jpg](img/9781430244226_Fig10-05.jpg)


    图 10-5. 创建测试用户


    在图 10-5 中，我们看到了“选择用户类型”视图中的“创建测试用户”选项。该视图可在 iTunes Connect 中点击主屏幕上的“管理用户”按钮后获得。


    **注意** 我强调使用测试用户来调试您的 App 内购买，因为尝试使用真实用户来调试会干扰您的工作。


    一旦您点击了图 10-5 中所示的“测试用户”按钮，系统将提示您创建一个新用户。


    这应该没什么好惊讶的——只需记住，您不应使用当前已是 Apple ID 的电子邮件地址。


    我们已经了解了如何在 iTunes Connect 中向应用程序添加 App 内购买项目，以及如何确保拥有用于调试应用程序的测试用户。接下来，我们将了解 App
    内购买是如何集成到 Belt Commander 中的，以便我们理解所涉及的类以及如何使用它们。


    ### 用于 App 内购买的类与代码


    在 iTunes Connect 中创建 App 内购买项目只是让 App 内购买在应用程序中可用的第一步。下一步是理解 App 内购买实际上是如何被购买的流程，以及涉及哪些类。包含相关类的框架被称为
    `StoreKit`，它是 iOS SDK 安装的一部分。使用这些类，我们将实现如图 10-6 所示的工作流程，该图展示了确定哪些产品可用以及如何处理购买请求的过程。


    ![9781430244226_Fig10-06.jpg](img/9781430244226_Fig10-06.jpg)


    图 10-6. 购买流程


    从图 10-6 的左上角开始，我们首先获取一组我们想要展示给用户的产品的产品 ID。这个列表可能来自一个外部网络服务，或者只是应用程序中硬编码的一组字符串。您如何获取此列表取决于您如何管理应用程序中正在销售的商品。如果您一直在添加新商品，您可能希望从网络服务中拉取产品列表。如果您刚刚开始使用
    App 内购买，固定的列表可能对您有用，但您将需要更新应用程序来更改列表。


    一旦我们有了可能的产品 ID 列表，我们就向 iTunes Store 发出请求，询问我们传递的哪些 ID 是有效的并且准备好销售了。从 iTunes Store
    返回的 ID 代表我们希望提供给用户的项目。iTunes Store 不会返回未知或尚未准备好销售的产品 ID。这确保了我们在展示的项目都是经过 Apple
    审核流程的有效商品。除了让我们知道 ID 是有效的之外，iTunes Store 还会返回与购买关联的本地化字符串，使我们能够向用户显示与在 iTunes
    Connect 中输入的内容完全匹配的、语言适当的文本。


    继续图 10-6 所示的工作流程，在某个时刻用户会点击按钮来购买一个项目。发生这种情况时，我们只需创建一个支付请求并提交它，此时系统将提示用户通过一系列对话框来确认购买。如果一切顺利，我们会收到一个回调，告知我们购买成功。发生这种情况时，我们需要记录购买已经完成。我们可以通过简单地将产品
    ID 存储在标准的 `NSUserDefaults` 中来实现，或者我们可以做一些更复杂的事情，比如将其保存到网络服务。用户为了确认购买而必须操作的对话框如图
    10-7 所示。


    ![9781430244226_Fig10-07.jpg](img/9781430244226_Fig10-07.jpg)


    图 10-7. 进行购买


    图片左上角的对话框将始终显示，右下角的对话框也是如此。如果用户必须使用其 Apple ID 登录，则另外两个对话框将出现在第一个和最后一个对话框之间。作为开发者，务必记住我们无法控制具体显示哪些对话框，也无法控制用户完成流程所需的时间。重要的是，不要期望用户在游戏动作进行的过程中完成此流程。

