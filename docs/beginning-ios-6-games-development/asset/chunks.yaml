- fmt: '# By selecting Universal from the Device list, you are telling Xcode to create
    a project that is ready to run on both the iPhone and the iPad


    For this example, we will not be using Storyboard or Automatic Reference Counting.
    Similarly, we won’t be creating any unit test, so the Include Unit Tests option
    should be unchecked as well. Clicking Next prompts you to save the project. Xcode
    will create a new folder in the selected directory, so you don’t have to manually
    create a folder if you don’t want to. When the new project is saved, you will
    see something similar to [Figure 2-4](#9781430244226_Ch02.xhtml#Fig4).


    ![9781430244226_Fig02-04.jpg](images/9781430244226_Fig02-04.jpg)


    [Figure 2-4.](#9781430244226_Ch02.xhtml#_Fig4)  A newly created project


    On the left side of [Figure 2-4](#9781430244226_Ch02.xhtml#Fig4), there is a tree
    containing the elements of the project with the root-most element selected (A).
    On the right, the Summary tab is selected (B). From the Summary tab, we want to
    select the supported device orientations (C). To support both orientations on
    each device, click the Upside Down button. Scroll down and make sure that all
    of the orientations for the iPad are depressed as well. [Figure 2-5](#9781430244226_Ch02.xhtml#Fig5)
    shows the correct settings. Now that the project is created, it is time to start
    customizing it to fit our needs.


    ![9781430244226_Fig02-05.jpg](images/9781430244226_Fig02-05.jpg)


    [Figure 2-5.](#9781430244226_Ch02.xhtml#_Fig5)  Supporting all device orientations


    ## Customizing a Universal Application


    In order to understand the customizations we will make to this project, it is
    good to know where we start. The empty project is runnable as is, although it
    is obviously not very interesting. Take a moment and run the application. It will
    look something like the app running in [Figure 2-6](#9781430244226_Ch02.xhtml#Fig6).
    Next, we will be removing the status bar and exploring the best place to start
    adding custom code to our project.


    ![9781430244226_Fig02-06.jpg](images/9781430244226_Fig02-06.jpg)


    [Figure 2-6.](#9781430244226_Ch02.xhtml#_Fig6)  A fresh universal iOS application


    In [Figure 2-6](#9781430244226_Ch02.xhtml#Fig6), we see a new universal app running
    on the iPhone simulator. To run the application on the iPad simulator, select
    iPad Simulator from the Scheme pull-down menu to the right of the Stop button
    in Xcode. As we can see, the app is empty; there is only a gray background. Another
    thing to note is that the status bar at the top of the application is displayed.
    Although there are plenty of good reasons to include the status bar in an application,
    many game developers may wish to remove the status bar in order to create a more
    immersive experience. To remove the status bar, click on the root element in the
    Project Navigator (the tree on the left in Xcode). Select the target and then
    click the Info tab on the right. [Figure 2-7](#9781430244226_Ch02.xhtml#Fig7)
    shows the correct view.


    ![9781430244226_Fig02-07.jpg](images/9781430244226_Fig02-07.jpg)


    [Figure 2-7.](#9781430244226_Ch02.xhtml#_Fig7)  Configuring the status bar


    Once you see the view shown in [Figure 2-7](#9781430244226_Ch02.xhtml#Fig7), right-click
    on the top-most element (A) and select Add Row. This will add a new element to
    the list of items. You will want to set the key value to `"Status bar is initially
    hidden"` and the value to `"Yes."` What you are doing here is editing the `plist`
    file found under the group Supporting Files. Xcode is simply providing you with
    a nice interface for editing this configuration file.


    **Tip**  Navigate to the file ending with `info.plist` under the group Supporting
    Files. Right-click on it and select Open As ➤ Source Code. This will show you
    the contents of the `plist` file source. Note that the key values are actually
    stored as constants and not as the human readable text used in the Info editor.


    When we run the application again, the status bar is removed, as shown in [Figure
    2-8](#9781430244226_Ch02.xhtml#Fig8).


    ![9781430244226_Fig02-08.jpg](images/9781430244226_Fig02-08.jpg)


    [Figure 2-8.](#9781430244226_Ch02.xhtml#_Fig8)  The default application without
    the status bar


    Now that we have explored a simple way to start customizing our application, it
    is time to investigate just how an iOS application is put together, so we can
    make smart decisions about adding our own functionality.


    ## How an iOS Application Initializes


    As we know, iOS applications are written largely in Objective C, which is a superset
    of C. Xcode does a good job of hiding the details of how an application is built,
    but under the covers, we know it is using LLVM and other common Unix tools to
    do the real work. Because we know that our project is ultimately a C application,
    we would expect the starting point for our application to be a C `main` function.
    In fact, if you look under the Supporting Files group, you will find the `main.m`,
    as shown in [Listing 2-1](#9781430244226_Ch02.xhtml#list1).


    [**Listing 2-1.**](#9781430244226_Ch02.xhtml#_list1)  `main.m`


    ```objective-c

    #import <UIKit/UIKit.h>


    #import "AppDelegate.h"


    int main(int argc, char *argv[])

    {

        @autoreleasepool {

            return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate
    class]));

        }

    }

    ```


    The `main` function in [Listing 2-1](#9781430244226_Ch02.xhtml#list1) is a C function,
    but you will notice that the body of the function is clearly Objective C syntax.
    An `@autoreleasepool` wraps a call to `UIApplicationMain`. The `@autoreleasepool`
    sets up the memory management context for this application; we don’t really need
    to worry about that. The function `UIApplicationMain` does a lot of handy stuff
    for you: it initializes your application by looking at your `info.plist` file,
    sets up an event loop, and generally gets things going in the right way. In fact,
    I have never had any reason to modify this function because iOS provides a concise
    place to start adding your startup code. The best place to start adding initialization
    code is the task `application:didFinishLaunchingWithOptions:` found in the implementation
    file of your app delegate class. In this example, the app delegate class is called
    `AppDelegate`. [Listing 2-2](#9781430244226_Ch02.xhtml#list2) shows the implementation
    of the `application:didFinishLaunchingWithOptions:` task from `AppDelegate.m`.


    [**Listing 2-2.**](#9781430244226_Ch02.xhtml#_list2)  `application:didFinishLaunchingWithOptions`:


    ```objective-c

    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions

    {

        self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]
    autorelease];

        // Override point for customization after application launch.

        if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone)
    {

            self.viewController = [[[ViewController_iPhone alloc] initWithNibName:@"ViewController_iPhone"
    bundle:nil] autorelease];

        } else {

            self.viewController = [[[ViewController_iPad alloc] initWithNibName:@"ViewController_iPad"
    bundle:nil] autorelease];

        }

        self.window.rootViewController = self.viewController;

        [self.window makeKeyAndVisible];

        return YES;

    }

    ```


    When an application is fully initialized and ready to start running the code that
    comprises it, the task `application:didFinishLaunchingWithOptions:` is called,
    as seen in [Listing 2-2](#9781430244226_Ch02.xhtml#list2). This task, besides
    having an incredibly long name, takes an instance of `UIApplication` and `NSDictionary`
    as arguments. The `UIApplication` is an object that represents the state of the
    running application. The instance of `AppDelegate` that receives this message
    is the delegate to the `UIApplication` object. This means that we modify the application’s
    behavior by implementing tasks in `AppDelegate`. The protocol `UIApplicationDelegate`,
    which `AppDelegate` implements, defines the tasks that will be called on the application’s
    behalf.'
