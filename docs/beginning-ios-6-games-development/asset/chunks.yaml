- fmt: "There should be no surprises at this point—we know that the task `rotationGesture`:\
    \ will be called as the object `rotationRecognizer` detects touch events that\
    \ can be interpreted as a rotation gesture. Let’s take a look at the task `rotationGesture`:,\
    \ as shown in [Listing 8-22](#9781430244226_Ch08.xhtml#list22).\n\n**[Listing\
    \ 8-22](#9781430244226_Ch08.xhtml#_list22).** `RotationGestureController.m (rotationGesture:)`\n\
    \n```\n-(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer{\n\
    \    if ([rotationRecognizer state] == UIGestureRecognizerStateBegan){\n     \
    \   startRotation = [viper rotation];\n    } else if ([rotationRecognizer state]\
    \ == UIGestureRecognizerStateChanged){\n        float rotation = [rotationRecognizer\
    \ rotation];\n        float finalRotation = startRotation + rotation*2.0;\n  \
    \      if (finalRotation > [viper rotation]){\n            [viper setState:VPR_STATE_CLOCKWISE];\n\
    \        } else {\n            [viper setState:VPR_STATE_COUNTER_CLOCKWISE];\n\
    \        }\n        [viper setRotation: finalRotation];\n    } else if ([rotationRecognizer\
    \ state] == UIGestureRecognizerStateEnded){\n        [viper setState:VPR_STATE_STOPPED];\n\
    \    } else if ([rotationRecognizer state] == UIGestureRecognizerStateCancelled){\n\
    \        [viper setState:VPR_STATE_STOPPED];\n        [viper setRotation:startRotation];\n\
    \    }\n}\n```\n\n[Listing 8-22](#9781430244226_Ch08.xhtml#list22) shows the `rotationGesture`:\
    \ task for the class `RotationGestureController`. In this task, we perform the\
    \ now familiar tasks based on the state of the `rotationRecognizer`. If the state\
    \ is `UIGestureRecognizerStateBegan`, we simply record the starting rotation of\
    \ actor `Viper`. If the state is `UIGestureRecognizerStateChanged`, we get the\
    \ rotation value from `rotationRecognizer`. The value of rotation is relative\
    \ to where the user first placed his or her fingers. Since the value of rotation\
    \ is relative to `startRotation`, we have to add rotation to `startRotation` to\
    \ have the ship turn like a knob. We multiply the rotation by `2.0` to make the\
    \ rotation faster and more responsive. This is only done because we might use\
    \ this technique in an action game, where we want the user to be able to rotate\
    \ the ship pretty quickly. Once the value of `finalRotation` is calculated, we\
    \ see if it is bigger or smaller than the current rotation. This allows us to\
    \ set the state of `Viper` to either `VPR_STATE_CLOCKWISE` or `VPR_STATE_COUNTER_CLOCKWISE`.\n\
    \nWhen the gesture is over, we simply set the state of `Viper` back to `VPR_STATE_STOPPED`.\
    \ Additionally, if the gesture was cancelled, we reset the rotation of the ship\
    \ back to the `startRotation`.\n\nThe next example is more similar to the tap\
    \ example than to the previous example because it handles what it is called a\
    \ long press.\n\n## Long Press Gesture\n\nThe long press gesture is a gesture\
    \ where the user touches a point on the phone and holds it for a bit. It is sort\
    \ of like a tap, but longer—as the name implies. Users often invoke the long press\
    \ gesture when they want to rearrange their apps; when you press an app to make\
    \ them all start shaking, it is a long press. You also use a long press when pressing\
    \ a key on the keyboard that has sub-items. For example, open Safari and tap on\
    \ the address field. Once the keyboard shows up, put your finger on the “.com”\
    \ button. After a moment, five alternative top-level domains are displayed. For\
    \ this example, we are going to combine taps with long presses to change which\
    \ size bullet a spaceship fires, as shown in [Figure 8-6](#9781430244226_Ch08.xhtml#Fig6).\n\
    \n![9781430244226_Fig08-06.jpg](images/9781430244226_Fig08-06.jpg)\n\n[Figure\
    \ 8-6.](#9781430244226_Ch08.xhtml#_Fig6) A spaceship shooting three different\
    \ sized bullets\n\nIn [Figure 8-6](#9781430244226_Ch08.xhtml#Fig6), we see a spaceship\
    \ toward the bottom of the screen. There are a number of circles above the spaceship;\
    \ these are bullets that are shot out of the spaceship based on user gestures.\
    \ The cluster of three circles toward the upper left are the basic bullets, created\
    \ from a simple tap. The circle closest to the bottom is a bigger bullet, created\
    \ when the user does a long press. If the user does a touch that is longer than\
    \ two seconds, an even bigger bullet is fired, as can be seen in the upper right\
    \ of [Figure 8-6](#9781430244226_Ch08.xhtml#Fig6). Let’s take a look at the header\
    \ file for the class `LongPressController` in [Listing 8-23](#9781430244226_Ch08.xhtml#list23).\n\
    \n**[Listing 8-23](#9781430244226_Ch08.xhtml#_list23).** `LongPressController.h`\n\
    \n```\n@interface LongPressController : GameController{\n    Viper* viper;\n \
    \   NSDate* longStart;\n}\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;\n\
    -(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer;\n\
    -(void)fireBulletAt:(CGPoint)point WithDamage:(float)bulletSize;\n@end\n```\n\n\
    In [Listing 8-23](#9781430244226_Ch08.xhtml#list23), we see the header for the\
    \ class `LongPressController`, which shows that we have a reference to the spaceship,\
    \ as well as an `NSDate` that is used to keep track of when a long press gesture\
    \ starts. The task `tapGesture`: is used when the user simply taps the screen\
    \ to fire a small bullet. The task `longPressGesture`: is called when the user\
    \ performs a long press gesture to fire a larger bullet. The last task is used\
    \ to create a `Bullet` actor and add it to the scene. Let’s start by looking at\
    \ the `doSetup` task of `LongPressController`. See in [Listing 8-24](#9781430244226_Ch08.xhtml#list24).\n\
    \n**[Listing 8-24](#9781430244226_Ch08.xhtml#_list24).** `LongPressController.m\
    \ (doSetup)`\n\n```\n-(BOOL)doSetup{\n    if ([super doSetup]){\n        [self\
    \ setGameAreaSize:CGSizeMake(320, 480)];\n        viper = [Viper viper:self];\n\
    \        [self addActor:viper];\n        CGPoint center = [viper center];\n  \
    \      center.y = [self gameAreaSize].height/5.0*4.0;\n        [viper setCenter:center];\n\
    \        UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc]\
    \ initWithTarget:self action:@selector(tapGesture:)];\n        [actorsView addGestureRecognizer:tapRecognizer];\n\
    \        UILongPressGestureRecognizer* longPressRecognizer = [[UILongPressGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(longPressGesture:)];\n        [longPressRecognizer\
    \ setMinimumPressDuration:1.0f];\n        [actorsView addGestureRecognizer: longPressRecognizer];\n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\nIn [Listing 8-24](#9781430244226_Ch08.xhtml#list24),\
    \ we see task `doSetup`. After we perform the usual steps of setting the game\
    \ area size and adding the actor `Viper`, we register two gesture responders.\
    \ The first gesture recognizer is a `UITapGestureRecognizer` that will call `tapGesture`:\
    \ . The second gesture recognizer is a `UILongPressGestureRecognizer` that is\
    \ configured to call `longPressGesture`: . The `UILongPressGestureRecognizer`\
    \ has the property `minimumPressDuration` set to `1.0f`. This means that the user\
    \ must hold the press for one second before this `UILongPressGestureRecognizer`\
    \ will consider the touch a long press. Both gesture recognizers are added to\
    \ `actorsView`.\n\n## Responding to the User\n\nIn the following section, we will\
    \ look at how bullets are added, based on which gesture was triggered. Let’s get\
    \ the tap gesture out of the way first. The implementation of `tapGesture`: is\
    \ shown in [Listing 8-25](#9781430244226_Ch08.xhtml#list25).\n\n**[Listing 8-25](#9781430244226_Ch08.xhtml#_list25).**\
    \ `LongPressController.m (tapGesture:)`\n\n```\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer{\n\
    \    [self fireBulletAt:[tapRecognizer locationInView:actorsView] WithDamage:10];\n\
    }\n```\n\nIn [Listing 8-25](#9781430244226_Ch08.xhtml#list25), we see that every\
    \ time a tap gesture is recognized, we simply call `fireBulletAt:WithDamage`:\
    \ specifying the location of the tap and the damage value of `10`."
  raw: 'There should be no surprises at this point—we know that the task `rotationGesture`:
    will be called as the object `rotationRecognizer` detects touch events that can
    be interpreted as a rotation gesture. Let’s take a look at the task `rotationGesture`:,
    as shown in [Listing 8-22](#9781430244226_Ch08.xhtml#list22).    **[Listing 8-22](#9781430244226_Ch08.xhtml#_list22).** `RotationGestureController.m
    (rotationGesture:)`    ``` -(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer{
        if ([rotationRecognizer state] == UIGestureRecognizerStateBegan){         startRotation
    = [viper rotation];     } else if ([rotationRecognizer state] == UIGestureRecognizerStateChanged){
            float rotation = [rotationRecognizer rotation];         float finalRotation
    = startRotation + rotation*2.0;         if (finalRotation > [viper rotation]){
                [viper setState:VPR_STATE_CLOCKWISE];         } else {             [viper
    setState:VPR_STATE_COUNTER_CLOCKWISE];         }         [viper setRotation: finalRotation];
        } else if ([rotationRecognizer state] == UIGestureRecognizerStateEnded){         [viper
    setState:VPR_STATE_STOPPED];     } else if ([rotationRecognizer state] == UIGestureRecognizerStateCancelled){
            [viper setState:VPR_STATE_STOPPED];         [viper setRotation:startRotation];
        } } ```    [Listing 8-22](#9781430244226_Ch08.xhtml#list22) shows the `rotationGesture`:
    task for the class `RotationGestureController`. In this task, we perform the now
    familiar tasks based on the state of the `rotationRecognizer`. If the state is
    `UIGestureRecognizerStateBegan`, we simply record the starting rotation of actor
    Viper. If the state is `UIGestureRecognizerStateChanged`, we get the rotation
    value from `rotationRecognizer`. The value of rotation is relative to where the
    user first placed his or her fingers. Since the value of rotation is relative
    to `startRotation`, we have to add rotation to `startRotation` to have the ship
    turn like a knob. We multiply the rotation by 2.0 to make the rotation faster
    and more responsive. This is only done because we might use this technique in
    an action game, where we want the user to be able to rotate the ship pretty quickly.
    Once the value of `finalRotation` is calculated, we see if it is bigger or smaller
    than the current rotation. This allows us to set the state of Viper to either
    VPR_STATE_CLOCKWISE or VPR_STATE_COUNTER_CLOCKWISE.    When the gesture is over,
    we simply set the state of Viper back to VPR_STATE_STOPPED. Additionally, if the
    gesture was cancelled, we reset the rotation of the ship back to the `startRotation`.    The
    next example is more similar to the tap example than to the previous example because
    it handles what it is called a long press.    Long Press Gesture    The long press
    gesture is a gesture where the user touches a point on the phone and holds it
    for a bit. It is sort of like a tap, but longer—as the name implies. Users often
    invoke the long press gesture when they want to rearrange their apps; when you
    press an app to make them all start shaking, it is a long press. You also use
    a long press when pressing a key on the keyboard that has sub-items. For example,
    open Safari and tap on the address field. Once the keyboard shows up, put your
    finger on the “.com” button. After a moment, five alternative top-level domains
    are displayed. For this example, we are going to combine taps with long presses
    to change which size bullet a spaceship fires, as shown in [Figure 8-6](#9781430244226_Ch08.xhtml#Fig6).    ![9781430244226_Fig08-06.jpg](images/9781430244226_Fig08-06.jpg)    [Figure
    8-6.](#9781430244226_Ch08.xhtml#_Fig6)  A spaceship shooting three different sized
    bullets    In [Figure 8-6](#9781430244226_Ch08.xhtml#Fig6), we see a spaceship
    toward the bottom of the screen. There are a number of circles above the spaceship;
    these are bullets that are shot out of the spaceship based on user gestures.


    The cluster of three circles toward the upper left are the basic bullets, created
    from a simple tap. The circle closest to the bottom is a bigger bullet, created
    when the user does a long press. If the user does a touch that is longer than
    two seconds, an even bigger bullet is fired, as can be seen in the upper right
    of [Figure 8-6](#9781430244226_Ch08.xhtml#Fig6). Let’s take a look at the header
    file for the class `LongPressController` in [Listing 8-23](#9781430244226_Ch08.xhtml#list23).    **[Listing
    8-23](#9781430244226_Ch08.xhtml#_list23).** `LongPressController.h`    ``` @interface
    LongPressController : GameController{     Viper* viper;     NSDate* longStart;
    } -(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer; -(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer;
    -(void)fireBulletAt:(CGPoint)point WithDamage:(float)bulletSize; @end ```    In
    [Listing 8-23](#9781430244226_Ch08.xhtml#list23), we see the header for the class
    `LongPressController`, which shows that we have a reference to the spaceship,
    as well as an `NSDate` that is used to keep track of when a long press gesture
    starts. The task `tapGesture`: is used when the user simply taps the screen to
    fire a small bullet. The task `longPressGesture`: is called when the user performs
    a long press gesture to fire a larger bullet. The last task is used to create
    a Bullet actor and add it to the scene. Let’s start by looking at the `doSetup`
    task of `LongPressController`. See in [Listing 8-24](#9781430244226_Ch08.xhtml#list24).    **[Listing
    8-24](#9781430244226_Ch08.xhtml#_list24).** `LongPressController.m (doSetup)`    ```
    -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(320,
    480)];         viper = [Viper viper:self];         [self addActor:viper];         CGPoint
    center = [viper center];         center.y = [self gameAreaSize].height/5.0*4.0;
            [viper setCenter:center];         UITapGestureRecognizer* tapRecognizer
    = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(tapGesture:)];
            [actorsView addGestureRecognizer:tapRecognizer];         UILongPressGestureRecognizer*
    longPressRecognizer = [[UILongPressGestureRecognizer alloc] initWithTarget:self
    action:@selector(longPressGesture:)];         [longPressRecognizer setMinimumPressDuration:1.0f];
            [actorsView addGestureRecognizer: longPressRecognizer];         return
    YES;     }     return NO; } ```    In [Listing 8-24](#9781430244226_Ch08.xhtml#list24),
    we see task `doSetup`. After we perform the usual steps of setting the game area
    size and adding the actor Viper, we register two gesture responders. The first
    gesture recognizer is a `UITapGestureRecognizer` that will call `tapGesture`:.
    The second gesture recognizer is a `UILongPressGestureRecognizer` that is configure
    to call `longPressGesture`:. The `UILongPressGestureRecognizer` has the property
    `minimumPressDuration` set to 1.0 f. This means that the user must hold the press
    for one second before this `UILongPressGestureRecognizer` will consider the touch
    a long press. Both gesture recognizers are added to `actorsView`.    Responding
    to the User    In the following section, we will look at how bullets are added,
    based on which gesture was triggered. Let’s get the tap gesture out of the way
    first. The implementation of `tapGesture`: is shown in [Listing 8-25](#9781430244226_Ch08.xhtml#list25).    **[Listing
    8-25](#9781430244226_Ch08.xhtml#_list25).** `LongPressController.m (tapGesture:)`    ```
    -(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer{     [self fireBulletAt:[tapRecognizer
    locationInView:actorsView] WithDamage:10]; } ```    In [Listing 8-25](#9781430244226_Ch08.xhtml#list25),
    we see that every time a tap gesture is recognized, we simply call `fireBulletAt:WithDamage`:
    specifying the location of the tap and the damage value of 10\.'
  trans: "\n至此应该不会有任何意外了——我们已知当对象 `rotationRecognizer`` 检测到可被解释为旋转手势的触摸事件时，任务 `rotationGesture`:\
    \ 就会被调用。现在来看看 `rotationGesture`: 任务，如代码清单 8-22 所示。\n\n**代码清单 8-22.** `RotationGestureController.m\
    \ (rotationGesture:)`\n\n```\n-(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer{\n\
    \    if ([rotationRecognizer state] == UIGestureRecognizerStateBegan){\n     \
    \   startRotation = [viper rotation];\n    } else if ([rotationRecognizer state]\
    \ == UIGestureRecognizerStateChanged){\n        float rotation = [rotationRecognizer\
    \ rotation];\n        float finalRotation = startRotation + rotation*2.0;\n  \
    \      if (finalRotation > [viper rotation]){\n            [viper setState:VPR_STATE_CLOCKWISE];\n\
    \        } else {\n            [viper setState:VPR_STATE_COUNTER_CLOCKWISE];\n\
    \        }\n        [viper setRotation: finalRotation];\n    } else if ([rotationRecognizer\
    \ state] == UIGestureRecognizerStateEnded){\n        [viper setState:VPR_STATE_STOPPED];\n\
    \    } else if ([rotationRecognizer state] == UIGestureRecognizerStateCancelled){\n\
    \        [viper setState:VPR_STATE_STOPPED];\n        [viper setRotation:startRotation];\n\
    \    }\n}\n```\n\n代码清单 8-22 展示了类 `RotationGestureController` 的 `rotationGesture`:\
    \ 任务。在此任务中，我们根据 `rotationRecognizer` 的状态执行了现在熟悉的各项操作。如果状态是 `UIGestureRecognizerStateBegan`，我们只需记录角色\
    \ `Viper` 的起始旋转角度。如果状态是 `UIGestureRecognizerStateChanged`，我们从 `rotationRecognizer`\
    \ 获取旋转值。该旋转值是相对于用户手指最初放置的位置而言的。由于旋转值相对于 `startRotation`，我们必须将旋转值加到 `startRotation`\
    \ 上，才能使飞船像旋钮一样转动。我们将旋转值乘以 `2.0` 以使旋转更快、更灵敏。这样做只是因为在我们可能将这种技术用于动作游戏时，希望用户能够快速旋转飞船。一旦计算出\
    \ `finalRotation` 的值，我们就判断它是否大于或小于当前旋转值。这使我们能够将 `Viper` 的状态设置为 `VPR_STATE_CLOCKWISE`\
    \ 或 `VPR_STATE_COUNTER_CLOCKWISE`。\n\n手势结束时，我们只需将 `Viper` 的状态设回 `VPR_STATE_STOPPED`。此外，如果手势被取消，我们会将飞船的旋转角度重置回\
    \ `startRotation`。\n\n下一个示例与前一个示例相比，更类似于点击示例，因为它处理的是所谓的“长按”。\n\n## 长按手势\n\n长按手势是指用户触摸屏幕上的某一点并按住片刻的手势。顾名思义，这有点像“点击”，但时间更长。用户想要重新排列应用时经常调用长按手势；当你按住一个应用使其所有图标开始抖动时，这就是长按。当你按下键盘上带有子选项的按键时，也会使用长按。例如，打开\
    \ Safari，点击地址栏。一旦键盘出现，将手指放在“.com”按钮上。稍等片刻，会显示五个备选顶级域名。在图 8-6 所示的示例中，我们将把点击和长按结合起来，以改变飞船发射子弹的大小，如图\
    \ 8-6 所示。\n\n![9781430244226_Fig08-06.jpg](img/9781430244226_Fig08-06.jpg)\n\n\
    图 8-6. 一艘发射三种不同尺寸子弹的飞船\n\n在图 8-6 中，我们看到屏幕底部有一艘飞船。飞船上方向有许多圆圈；这些是根据用户手势从飞船射出的子弹。左上角三个圆圈组成的一簇是基础子弹，通过简单点击生成。最靠近底部的大圆圈是更大的子弹，在用户长按时生成。如果用户触摸超过两秒，则会发射更大的子弹，如图\
    \ 8-6 右上角所示。让我们看看代码清单 8-23 中类 `LongPressController` 的头文件。\n\n**代码清单 8-23.** `LongPressController.h`\n\
    \n```\n@interface LongPressController : GameController{\n    Viper* viper;\n \
    \   NSDate* longStart;\n}\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;\n\
    -(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer;\n\
    -(void)fireBulletAt:(CGPoint)point WithDamage:(float)bulletSize;\n@end\n```\n\n\
    在代码清单 8-23 中，我们看到类 `LongPressController` 的头文件，其中显示了我们持有一个飞船引用，以及一个用于跟踪长按手势开始时间的\
    \ `NSDate`。任务 `tapGesture`: 在用户点击屏幕发射小型子弹时调用。任务 `longPressGesture`: 在用户执行长按手势发射更大子弹时调用。最后一个任务用于创建\
    \ `Bullet` 角色并将其添加到场景中。我们先看看 `LongPressController` 的 `doSetup` 任务。见代码清单 8-24。\n\
    \n**代码清单 8-24.** `LongPressController.m (doSetup)`\n\n```\n-(BOOL)doSetup{\n \
    \   if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
    \        viper = [Viper viper:self];\n        [self addActor:viper];\n       \
    \ CGPoint center = [viper center];\n        center.y = [self gameAreaSize].height/5.0*4.0;\n\
    \        [viper setCenter:center];\n        UITapGestureRecognizer* tapRecognizer\
    \ = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(tapGesture:)];\n\
    \        [actorsView addGestureRecognizer:tapRecognizer];\n        UILongPressGestureRecognizer*\
    \ longPressRecognizer = [[UILongPressGestureRecognizer alloc] initWithTarget:self\
    \ action:@selector(longPressGesture:)];\n        [longPressRecognizer setMinimumPressDuration:1.0f];\n\
    \        [actorsView addGestureRecognizer: longPressRecognizer];\n        return\
    \ YES;\n    }\n    return NO;\n}\n```\n\n在代码清单 8-24 中，我们看到任务 `doSetup`。在执行设置游戏区域大小和添加角色\
    \ `Viper` 等常规步骤后，我们注册了两个手势响应器。第一个手势识别器是 `UITapGestureRecognizer`，它将调用 `tapGesture`:。第二个手势识别器是\
    \ `UILongPressGestureRecognizer`，被配置为调用 `longPressGesture`:。`UILongPressGestureRecognizer`\
    \ 的属性 `minimumPressDuration` 被设置为 `1.0f`。这意味着用户必须按住一秒钟，这个 `UILongPressGestureRecognizer`\
    \ 才会将触摸视为长按。两个手势识别器都被添加到了 `actorsView`。\n\n## 响应用户操作\n\n在下一节中，我们将根据触发的手势来查看如何添加子弹。我们先来处理点击手势。`tapGesture`:\
    \ 的实现如代码清单 8-25 所示。\n\n**代码清单 8-25.** `LongPressController.m (tapGesture:)`\n\n\
    ```\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer{\n    [self fireBulletAt:[tapRecognizer\
    \ locationInView:actorsView] WithDamage:10];\n}\n```\n\n在代码清单 8-25 中，我们看到每次识别到点击手势时，我们只需调用\
    \ `fireBulletAt:WithDamage`:，并指定点击位置和伤害值 `10`。\n"
- fmt: "The more interesting interaction is found in the implementation of `longPressGesture:`,\
    \ as shown in [Listing 8-26](#9781430244226_Ch08.xhtml#list26).\n\n**[Listing\
    \ 8-26](#9781430244226_Ch08.xhtml#_list26).** `LongPressController.m (longPressGesture:)`\n\
    \n``` \n-(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer{\
    \     \n    if ([longPressRecognizer state] == UIGestureRecognizerStateBegan){\
    \         \n        [viper setState:VPR_STATE_TRAVELING];         \n        longStart\
    \ = [NSDate date];     \n    } else if ([longPressRecognizer state] == UIGestureRecognizerStateEnded){\
    \         \n        NSDate* now = [NSDate date];         \n        float damage\
    \ = 20;         \n        if ([now timeIntervalSinceDate:longStart] > 1.0f){ \
    \            \n            damage = 30;         \n        }         \n       \
    \ [self fireBulletAt:[longPressRecognizer locationInView:actorsView] WithDamage:damage];\
    \         \n        [viper setState:VPR_STATE_STOPPED];     \n    } \n} \n```\n\
    \nIn [Listing 8-26](#9781430244226_Ch08.xhtml#list26), we use the state of `longPressRecognizer`\
    \ to decide what should be done. If the gesture has been started, we record the\
    \ time in the variable `longStart`; we also set the state of the Viper object\
    \ to `VPR_STATE_TRAVELING`, which causes the thrust of the spaceship to be shown.\
    \ If you have played with the demo application, you will notice that the thrust\
    \ comes on after the one-second delay associated with the gesture. This means\
    \ that `longPressGesture:` does not get called until this minimum time has passed.\n\
    \nIf the state of `longPressRecognizer` is `UIGestureRecognizerStateEnded`, then\
    \ we know the user has lifted his or her finger. When this happens, we see if\
    \ more than a second has passed since the gesture was started. If so, we upgrade\
    \ the damage from 20 to 30. This means that if the user holds a finger down for\
    \ a second, the next bullet will do 20 damage, and if the user holds it down for\
    \ two seconds, the damage will be 30. When the long press gesture is over, we\
    \ set the state of the Viper back to `VPR_STATE_STOPPED` and fire the bullet with\
    \ the appropriate damage.\n\n## Adding the Bullet\n\nLet’s take a look at the\
    \ implementation of `fireBulletAt:WithDamage:` to complete this example. See [Listing\
    \ 8-27](#9781430244226_Ch08.xhtml#list27).\n\n**[Listing 8-27](#9781430244226_Ch08.xhtml#_list27).**\
    \ `LongPressController.m (fireBulletAt:WithDamage:)`\n\n``` \n-(void)fireBulletAt:(CGPoint)point\
    \ WithDamage:(float)damage{     \n    Bullet* bullet = [Bullet bulletAt:[viper\
    \ center] TowardPoint:point];     \n    [bullet setDamage:damage];     \n    [self\
    \ addActor:bullet]; \n} \n```\n\nIn [Listing 8-27](#9781430244226_Ch08.xhtml#list27),\
    \ we see that we simply create a new `Bullet` actor that is configured to travel\
    \ toward a specified point and add it the scene.\n\n## Swipe Gesture\n\nThe swipe\
    \ gesture is probably most recognizable as the gesture used to switch the set\
    \ of apps you see on the home screen. This gesture is often used to switch context,\
    \ as with the home screen. Other examples include the four-finger swipe used to\
    \ switch the foreground application on the `iPad` 2 and 3. It is a bit like pawing\
    \ your way through your running applications. In our example, we are going to\
    \ use swipe gestures to add comets to the scene, as shown in [Figure 8-7](#9781430244226_Ch08.xhtml#Fig7).\n\
    \nIn [Figure 8-7](#9781430244226_Ch08.xhtml#Fig7), we see several comets on the\
    \ screen. Each comet is created by a swipe gesture that determines where the comet\
    \ starts and in which direction it travels. For example, a swipe to the right\
    \ causes a comet to be created on the left and travel to the right. Let’s take\
    \ a look at the `doSetup` task of the `SwipeGestureController` class in [Listing\
    \ 8-28](#9781430244226_Ch08.xhtml#list28).\n\n![9781430244226_Fig08-07.jpg](images/9781430244226_Fig08-07.jpg)\n\
    \n[Figure 8-7.](#9781430244226_Ch08.xhtml#_Fig7) Swipes create comets\n\n**[Listing\
    \ 8-28](#9781430244226_Ch08.xhtml#_list28).** `SwipeGestureController.m (doSetup)`\n\
    \n``` \n-(BOOL)doSetup{     \n    if ([super doSetup]){         \n        [self\
    \ setGameAreaSize:CGSizeMake(320, 480)];  \n  \n        UISwipeGestureRecognizer*\
    \ down = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];\
    \         \n        [down setDirection:UISwipeGestureRecognizerDirectionDown];\
    \         \n        [actorsView addGestureRecognizer:down];  \n  \n        UISwipeGestureRecognizer*\
    \ up = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];\
    \         \n        [up setDirection:UISwipeGestureRecognizerDirectionUp];   \
    \      \n        [actorsView addGestureRecognizer:up];  \n  \n        UISwipeGestureRecognizer*\
    \ left = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];\
    \         \n        [left setDirection:UISwipeGestureRecognizerDirectionLeft];\
    \         \n        [actorsView addGestureRecognizer:left];  \n  \n        UISwipeGestureRecognizer*\
    \ right = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];\
    \         \n        [right setDirection:UISwipeGestureRecognizerDirectionRight];\
    \         \n        [actorsView addGestureRecognizer:right];  \n  \n        return\
    \ YES;     \n    }     \n    return NO; \n} \n```\n\nIn [Listing 8-28](#9781430244226_Ch08.xhtml#list28),\
    \ we see the code that registers the gesture recognizers for this example. We\
    \ see that we create a `UISwipeGestureRecognizer` for each direction we want to\
    \ listen for. The only surprise in this example is that it requires four different\
    \ gesture recognizers to achieve what we want. `UISwipeGestureRecognizer` does\
    \ allow you to specify a single recognizer for multiple directions. However, when\
    \ responding to a swipe gesture, the device has no way to tell which direction\
    \ the gesture took. Only by creating a recognizer for each direction can we tell\
    \ which direction the user’s gesture took.\n\nLet’s look at the task `swipeGesture:`.\
    \ See [Listing 8-29](#9781430244226_Ch08.xhtml#list29).\n\n**[Listing 8-29](#9781430244226_Ch08.xhtml#_list29).**\
    \ `SwipeGestureController.m (swipeGesture:)`\n\n``` \n-(void)swipeGesture:(UISwipeGestureRecognizer*)swipeRecognizer{\
    \     \n    CGSize gameSize = [self gameAreaSize];  \n  \n    UISwipeGestureRecognizerDirection\
    \ direction = [swipeRecognizer direction];     \n    CGPoint locationInView =\
    \ [swipeRecognizer locationInView:actorsView];  \n  \n    CGPoint center = CGPointMake(0,\
    \ 0);     \n    float directionInRadians = DIRECTION_DOWN;  \n  \n    if (direction\
    \ == UISwipeGestureRecognizerDirectionRight){         \n        center.x = −20;\
    \         \n        center.y = locationInView.y;         \n        directionInRadians\
    \ = DIRECTION_RIGHT;     \n    } else if (direction == UISwipeGestureRecognizerDirectionDown){\
    \         \n        center.x = locationInView.x;         \n        center.y =\
    \ −20;         \n        directionInRadians = DIRECTION_DOWN;     \n    } else\
    \ if (direction == UISwipeGestureRecognizerDirectionLeft){         \n        center.x\
    \ = gameSize.width + 20;         \n        center.y = locationInView.y;      \
    \   \n        directionInRadians = DIRECTION_LEFT;     \n    } else if (direction\
    \ == UISwipeGestureRecognizerDirectionUp){         \n        center.x = locationInView.x;\
    \         \n        center.y = gameSize.height + 20;         \n        directionInRadians\
    \ = DIRECTION_UP;     \n    }     \n    Comet* comet = [Comet comet:self withDirection:directionInRadians\
    \ andCenter:center];     \n    [self addActor:comet]; \n} \n```\n\nIn [Listing\
    \ 8-29](#9781430244226_Ch08.xhtml#list29), we see the code that is called when\
    \ a swipe gesture is recognized. To create the effect we want, we are simply going\
    \ to create a new `Comet` actor with the correct location and direction. To figure\
    \ out where the Comet should be placed and in what direction it travels, we simply\
    \ look at the direction property of `swipeRecognizer`.\n\nWe are not going to\
    \ go into the details of how the `Comet` class is implemented; we have discussed\
    \ that at length already. If you are really interested, please review the source\
    \ code provided.\n\nWe have looked at the built-in gesture recognizers available\
    \ in `iOS` and have explored the basics of how they work. In the next section,\
    \ we will explore how movements of the device can be incorporated into an application."
  raw: 'The more interesting interaction is found in the implementation of `longPressGesture`:,
    as shown in [Listing 8-26](#9781430244226_Ch08.xhtml#list26).    **[Listing 8-26](#9781430244226_Ch08.xhtml#_list26).** `LongPressController.m
    (longPressGesture:)`    ``` -(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer{
        if ([longPressRecognizer state] == UIGestureRecognizerStateBegan){         [viper
    setState:VPR_STATE_TRAVELING];         longStart = [NSDate date];     } else if
    ([longPressRecognizer state] == UIGestureRecognizerStateEnded){         NSDate*
    now = [NSDate date];         float damage = 20;         if ([now timeIntervalSinceDate:longStart]
    > 1.0f){             damage = 30;         }         [self fireBulletAt:[longPressRecognizer
    locationInView:actorsView] WithDamage:damage];         [viper setState:VPR_STATE_STOPPED];
        } } ```    In [Listing 8-26](#9781430244226_Ch08.xhtml#list26), we use the
    state of `longPressRecognizer` to decide what should be done. If the gesture has
    been started, we record the time in the variable `longStart`; we also set the
    state of the Viper object to VPR_STATE_TRAVELING, which causes the thrust of the
    spaceship to be shown. If you have played with the demo application, you will
    notice that the thrust comes on after the one-second delay associated with the
    gesture. This means that `longPressGesture`: does not get called until this minimum
    time has passed.    If the state of `longPressRecognizer` is `UIGestureRecognizerStateEnded`,
    then we know the user has lifted his or her finger. When this happens, we see
    if more than a second has passed since the gesture was started. If so, we upgrade
    the damage from 20 to 30\. This means that if the user holds a finger down for
    a second, the next bullet will do 20 damage, and if the user holds it down for
    two seconds, the damage will be 30\. When the long press gesture is over, we set
    the state of the Viper back to VPR_STATE_STOPPED and fire the bullet with the
    appropriate damage.    Adding the Bullet    Let’s take a look at the implementation
    of `fireBulletAt:WithDamage`: to complete this example. See [Listing 8-27](#9781430244226_Ch08.xhtml#list27).    **[Listing
    8-27](#9781430244226_Ch08.xhtml#_list27).** `LongPressController.m (fireBulletAt:WithDamage:)`    ```
    -(void)fireBulletAt:(CGPoint)point WithDamage:(float)damage{     Bullet* bullet
    = [Bullet bulletAt:[viper center] TowardPoint:point];     [bullet setDamage:damage];
        [self addActor:bullet]; } ```    In [Listing 8-27](#9781430244226_Ch08.xhtml#list27),
    we see that we simply create a new Bullet actor that is configured to travel toward
    a specified point and add it the scene.    Swipe Gesture    The swipe gesture
    is probably most recognizable as the gesture used to switch the set of apps you
    see on the home screen. This gesture is often used to switch context, as with
    the home screen. Other examples include the four-finger swipe used to switch the
    foreground application on the `iPad` 2 and 3\. It is a bit like pawing your way
    through your running applications. In our example, we are going to use swipe gestures
    to add comets to the scene, as shown in [Figure 8-7](#9781430244226_Ch08.xhtml#Fig7).    In
    [Figure 8-7](#9781430244226_Ch08.xhtml#Fig7), we see several comets on the screen.
    Each comet is created by a swipe gesture that determines where the comet starts
    and in which direction it travels. For example, a swipe to the right causes a
    comet to be created on the left and travel to the right. Let’s take a look at
    the `doSetup` task of the `SwipeGestureController` class in [Listing 8-28](#9781430244226_Ch08.xhtml#list28).    ![9781430244226_Fig08-07.jpg](images/9781430244226_Fig08-07.jpg)    [Figure
    8-7.](#9781430244226_Ch08.xhtml#_Fig7)  Swipes create comets    **[Listing 8-28](#9781430244226_Ch08.xhtml#_list28).** `SwipeGestureController.


    m (doSetup)`    ``` -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(320,
    480)];          UISwipeGestureRecognizer* down = [[UISwipeGestureRecognizer alloc]
    initWithTarget:self action:@selector(swipeGesture:)];         [down setDirection:UISwipeGestureRecognizerDirectionDown];
            [actorsView addGestureRecognizer:down];          UISwipeGestureRecognizer*
    up = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];
            [up setDirection:UISwipeGestureRecognizerDirectionUp];         [actorsView
    addGestureRecognizer:up];          UISwipeGestureRecognizer* left = [[UISwipeGestureRecognizer
    alloc] initWithTarget:self action:@selector(swipeGesture:)];         [left setDirection:UISwipeGestureRecognizerDirectionLeft];
            [actorsView addGestureRecognizer:left];          UISwipeGestureRecognizer*
    right = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];
            [right setDirection:UISwipeGestureRecognizerDirectionRight];         [actorsView
    addGestureRecognizer:right];          return YES;     }     return NO; } ```    In
    [Listing 8-28](#9781430244226_Ch08.xhtml#list28), we see the code that registers
    the gesture recognizers for this example. We see that we create a `UISwipeGestureRecognizer`
    for each direction we want to listen for. The only surprise in this example is
    that it requires four different gesture recognizers to achieve what we want. `UISwipeGestureRecognizer`
    does allow you to specify a single recognizer for multiple directions. However,
    when responding to a swipe gesture, the device has no way to tell which direction
    the gesture took. Only by creating a recognizer for each direction can we tell
    which direction the user’s gesture took.    Let’s look at the task `swipeGesture`:.
    See [Listing 8-29](#9781430244226_Ch08.xhtml#list29).    **[Listing 8-29](#9781430244226_Ch08.xhtml#_list29).** `SwipeGestureController.m
    (swipeGesture:)`    ``` -(void)swipeGesture:(UISwipeGestureRecognizer*)swipeRecognizer{
        CGSize gameSize = [self gameAreaSize];      UISwipeGestureRecognizerDirection
    direction = [swipeRecognizer direction];     CGPoint locationInView = [swipeRecognizer
    locationInView:actorsView];      CGPoint center = CGPointMake(0, 0);     float
    directionInRadians = DIRECTION_DOWN;      if (direction == UISwipeGestureRecognizerDirectionRight){
            center.x = −20;         center.y = locationInView.y;         directionInRadians
    = DIRECTION_RIGHT;     } else if (direction == UISwipeGestureRecognizerDirectionDown){
            center.x = locationInView.x;         center.y = −20;         directionInRadians
    = DIRECTION_DOWN;     } else if (direction == UISwipeGestureRecognizerDirectionLeft){
            center.x = gameSize.width + 20;         center.y = locationInView.y;         directionInRadians
    = DIRECTION_LEFT;     } else if (direction == UISwipeGestureRecognizerDirectionUp){
            center.x = locationInView.x;         center.y = gameSize.height + 20;
            directionInRadians = DIRECTION_UP;     }     Comet* comet = [Comet comet:self
    withDirection:directionInRadians andCenter:center];     [self addActor:comet];
    } ```    In [Listing 8-29](#9781430244226_Ch08.xhtml#list29), we see the code
    that is called when a swipe gesture is recognized. To create the effect we want,
    we are simply going to create a new Comet actor with the correct location and
    direction. To figure out where the Comet should be placed and in what direction
    it travels, we simply look at the direction property of `swipeRecognizer`.    We
    are not going to go into the details of how the Comet class is implemented; we
    have discussed that at length already. If you are really interested, please review
    the source code provided.    We have looked at the built-in gesture recognizers
    available in `iOS` and have explored the basics of how they work. In the next
    section, we will explore how movements of the device can be incorporated into
    an application.'
