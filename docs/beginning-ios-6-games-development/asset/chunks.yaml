  raw: 'At the top, we see a notification from Game Center letting the user know that
    this game is using GameKit with the user account displayed. We also see the word
    “sandbox.” This is informing us that we’re not using the live version of Game
    Center but, rather, the development version. For the most part, you don’t have
    to worry about this; while developing, you will be using the sandbox exclusively.    To
    enable GameKit in your project, you obviously use classes from GameKit, but you
    also have to tell Apple that you want GameKit support for a given game. The following
    section describes how to set up GameKit in iTunes Connect.    Enabling Game Center
    in iTunes Connect    Game Center is not just an app or set of libraries on your
    iOS device. It is also a set of Web services hosted by Apple that provide much
    of the functionality. In order for your game to use these services, you have to
    configure your application. You will have to create an App ID in the provisioning
    portal, configure Xcode to use the resultant Bundle Identifier, and configure
    your application in iTunes Connect to use Game Center. Let’s assume we are making
    a new game and start with the Provisioning Portal, as shown in [Figure 9-3](#9781430244226_Ch09.xhtml#Fig3).    ![9781430244226_Fig09-03.jpg](images/9781430244226_Fig09-03.jpg)    [Figure
    9-3.](#9781430244226_Ch09.xhtml#_Fig3)  Creating an App ID in the Provisioning
    Portal    In [Figure 9-3](#9781430244226_Ch09.xhtml#Fig3), we see the form used
    to create an App ID. The top field, labeled Description, can be anything you want
    to remind you of why you created this App ID. You can select any Bundle Seed ID
    you want, but I have found an important reason not to just use the default: selecting
    the default Bundle Seed ID removes a number configuration steps when working with
    Xcode.    The last item is the Bundle Identifier. This is used to identify your
    application at runtime. For games that are meant to support Game Center, you have
    to specify a Bundle Identifier without a wildcard. Once you press Submit, you
    should open your game project in Xcode.    The Bundle Identifier must be set on
    Xcode, so iOS knows how to associate the binary running on your device to the
    application defined by iTunes Connect. [Figure 9-4](#9781430244226_Ch09.xhtml#Fig4)
    shows where to set the Bundle Identifier.    ![9781430244226_Fig09-04.jpg](images/9781430244226_Fig09-04.jpg)    [Figure
    9-4.](#9781430244226_Ch09.xhtml#_Fig4)  Bundle Identifier in Xcode    In [Figure
    9-4](#9781430244226_Ch09.xhtml#Fig4), the Identifier field contains our Bundle
    Identifier in Xcode. This value, in combination with the version number, identifies
    to iTunes Connect, which application is running. Once you have set the Bundle
    Identifier, you have to create a new application in iTunes Connect, as shown in
    [Figure 9-5](#9781430244226_Ch09.xhtml#Fig5).    ![9781430244226_Fig09-05.jpg](images/9781430244226_Fig09-05.jpg)    [Figure
    9-5.](#9781430244226_Ch09.xhtml#_Fig5)  New application in iTunes Connect    In
    [Figure 9-5](#9781430244226_Ch09.xhtml#Fig5), we see the first step in creating
    a new application in iTunes Connect. We have specified the App name and selected
    an SKU number. The SKU number can be anything you want; it is included so the
    producer of the game can track sales in his or her internal systems. We also see
    that we can select the Bundle ID from a pull-down menu; this is the value we specified
    when we created a new App ID. There are a few more steps required to create a
    new application in iTunes Connect, but they are just filling in information about
    the app and are not required steps to getting Game Center working. You will be
    asked to provide a description, copyright information, and other details. All
    of the information added at the last step can be skipped and added later.    Once
    the application is created, inspect its details and find the Manage Game Center
    button, as shown in [Figure 9-6](#9781430244226_Ch09.xhtml#Fig6).    !


    [9781430244226_Fig09-06.jpg](images/9781430244226_Fig09-06.jpg)    [Figure 9-6.](#9781430244226_Ch09.xhtml#_Fig6)  Configuration
    buttons for an application in iTunes Connect    In [Figure 9-6](#9781430244226_Ch09.xhtml#Fig6),
    we see the Manage Game Center button (labeled A). Click this, and you will be
    prompted to enable Game Center and create a leaderboard. [Figure 9-7](#9781430244226_Ch09.xhtml#Fig7)
    shows the page for creating or editing a leaderboard.    ![9781430244226_Fig09-07.jpg](images/9781430244226_Fig09-07.jpg)    [Figure
    9-7.](#9781430244226_Ch09.xhtml#_Fig7)  Creating or editing a leaderboard    In
    [Figure 9-7](#9781430244226_Ch09.xhtml#Fig7), we see the web page in iTunes Connect
    for editing and creating a leaderboard. At item A, we see a name for the leaderboard.
    This name is not the display name—it is for internal use only and can be anything
    you want. Item B indicates the ID for the leaderboard. This is the value used
    in code when referring to the leaderboard. Items C and D indicate how the scores
    in this leaderboard should be organized. We have chosen to display our scores
    as an integer value (with no decimal places), and we consider higher scores better.
    Item E shows that we have added display information for one language. New languages
    can be added by clicking the Add Language button and specifying the display name
    of the leaderboard, as well as indicating that the values are called “points”
    in our case. Creating or editing an achievement is very similar to working with
    a leaderboard, as shown in [Figure 9-8](#9781430244226_Ch09.xhtml#Fig8).    ![9781430244226_Fig09-08.jpg](images/9781430244226_Fig09-08.jpg)    [Figure
    9-8.](#9781430244226_Ch09.xhtml#_Fig8)  Creating or editing an achievement    In
    [Figure 9-8](#9781430244226_Ch09.xhtml#Fig8), we see the web page for creating
    and editing an achievement in iTunes Connect. Item A shows the internal name used
    for the achievement. Item B is where the ID for the achievement  is displayed.
    Item C indicates that this achievement is not hidden. By default, achievements
    are viewable to users even if they have not achieved them. However, it can be
    fun to specify some achievements that are listed, so users are surprised when
    they achieve them. Item E shows that we have specified the display text for the
    English language. Of course, text for other languages can be added by clicking
    the Add Language button.    We have looked at how to create a new App ID and a
    new application in iTunes Connect. We also briefly looked at the screens required
    to create a leaderboard and an achievement. Now, let’s look at the code that takes
    advantage of these new resources.    Using Game Center in Your Game    It is surprisingly
    easy to work with GameKit to start using the leaderboard and achievement features
    once Game Center is set up to include them. The following sections will discuss
    how to connect to the user’s Game Center account, submit his or her scores to
    a leaderboard, and earn an achievement.    Enabling Game Center for a User    When
    a game is Game Center-enabled, the user must still opt into the Game Center features.
    The user is required to create an account with Game Center and be authenticated
    on the current iOS device with that account. Thankfully, Apple has made it simple
    to get going with Game Center.    To get started with Game Center, all apps must
    get access to an instance of `GKLocalPlayer` that represents the local player
    and authenticate them. [Listing 9-1](#9781430244226_Ch09.xhtml#list1) shows the
    canonical example of doing this.    **[Listing 9-1](#9781430244226_Ch09.xhtml#_list1).** `RootViewController.m`
    (`initGameCenter`)    ``` -(void)initGameCenter{     Class gkClass = NSClassFromString(@"GKLocalPlayer");
              BOOL iosSupported = [[[UIDevice currentDevice] systemVersion] compare:@"4.1"
    options:NSNumericSearch] !'
  trans: "\n在顶部，我们会看到一个来自 Game Center 的通知，告知用户此游戏正在使用 GameKit，并显示了用户账户。我们还看到了“sandbox”这个词。这表示我们使用的并非\
    \ Game Center 的正式版本，而是开发版本。大多数情况下，您无需为此担心；在开发过程中，您将完全使用沙箱环境。\n\n要在您的项目中启用 GameKit，您显然会使用\
    \ GameKit 中的类，但您还需要告知 Apple 您希望为某个特定游戏启用 GameKit 支持。以下部分描述了如何在 iTunes Connect\
    \ 中设置 GameKit。\n\n### 在 iTunes Connect 中启用 Game Center\n\nGame Center 不仅仅是 iOS\
    \ 设备上的一个应用或一组库。它还是由 Apple 托管的一组 Web 服务，提供了大部分功能。为了让您的游戏使用这些服务，您必须配置您的应用程序。您需要在配置门户中创建一个\
    \ `App ID`，配置 Xcode 使用生成的 `Bundle Identifier`，并在 iTunes Connect 中配置您的应用程序以使用 Game\
    \ Center。假设我们正在制作一个新游戏，并从配置门户开始，如图 Figure 9-3 所示。\n\n![9781430244226_Fig09-03.jpg](img/9781430244226_Fig09-03.jpg)\n\
    \nFigure 9-3.  在配置门户中创建 `App ID`\n\n在 Figure 9-3 中，我们看到了用于创建 `App ID` 的表单。顶部的字段（标记为\
    \ Description）可以是任何您想要的内容，用于提醒您创建此 `App ID` 的目的。您可以选择任何 `Bundle Seed ID`，但我发现有一个重要的原因不推荐使用默认值：选择默认的\
    \ `Bundle Seed ID` 会减少在使用 Xcode 时的一些配置步骤。\n\n最后一项是 `Bundle Identifier`。它用于在运行时标识您的应用程序。对于旨在支持\
    \ Game Center 的游戏，您必须指定一个不带通配符的 `Bundle Identifier`。点击“提交”后，您应该在 Xcode 中打开您的游戏项目。\n\
    \n`Bundle Identifier` 必须在 Xcode 中设置，这样 iOS 才能知道如何将设备上运行的二进制文件与 iTunes Connect\
    \ 定义的应用程序关联起来。Figure 9-4 显示了设置 `Bundle Identifier` 的位置。\n\n![9781430244226_Fig09-04.jpg](img/9781430244226_Fig09-04.jpg)\n\
    \nFigure 9-4.  Xcode 中的 `Bundle Identifier`\n\n在 Figure 9-4 中，`Identifier` 字段包含了我们在\
    \ Xcode 中的 `Bundle Identifier`。这个值，连同版本号，用于向 iTunes Connect 标识正在运行的是哪个应用程序。一旦设置了\
    \ `Bundle Identifier`，您就必须在 iTunes Connect 中创建一个新的应用程序，如图 Figure 9-5 所示。\n\n![9781430244226_Fig09-05.jpg](img/9781430244226_Fig09-05.jpg)\n\
    \nFigure 9-5.  在 iTunes Connect 中创建新应用程序\n\n在 Figure 9-5 中，我们看到了在 iTunes Connect\
    \ 中创建新应用程序的第一步。我们指定了 App 名称并选择了一个 `SKU` 编号。`SKU` 编号可以是任何您想要的内容；它包含在此处是为了让游戏制作方能够在内部系统中跟踪销售情况。我们还可以看到我们可以从一个下拉菜单中选择\
    \ `Bundle ID`；这是我们在创建新 `App ID` 时指定的值。在 iTunes Connect 中创建新应用程序还需要几个步骤，但这些步骤只是填写关于应用程序的信息，并非启用\
    \ Game Center 的必要步骤。系统会要求您提供描述、版权信息和其他详细信息。在最后一步中添加的所有信息都可以跳过，稍后再添加。\n\n一旦应用程序创建完成，检查其详细信息并找到“Manage\
    \ Game Center”按钮，如图 Figure 9-6 所示。\n\n![9781430244226_Fig09-06.jpg](img/9781430244226_Fig09-06.jpg)\n\
    \nFigure 9-6.  iTunes Connect 中应用程序的配置按钮\n\n在 Figure 9-6 中，我们看到了“Manage Game Center”按钮（标记为\
    \ A）。点击此按钮，系统将提示您启用 Game Center 并创建一个排行榜。Figure 9-7 显示了创建或编辑排行榜的页面。\n\n![9781430244226_Fig09-07.jpg](img/9781430244226_Fig09-07.jpg)\n\
    \nFigure 9-7.  创建或编辑排行榜\n\n在 Figure 9-7 中，我们看到了 iTunes Connect 中用于编辑和创建排行榜的网页。在项目\
    \ A 处，我们看到一个排行榜的名称。此名称并非显示名称——它仅供内部使用，可以是任何您想要的内容。项目 B 指示了排行榜的 ID。这是在代码中引用排行榜时使用的值。项目\
    \ C 和 D 指示了该排行榜中分数的排序方式。我们选择将分数显示为整数值（无小数位），并认为分数越高越好。项目 E 显示我们已为一种语言添加了显示信息。可以通过点击“Add\
    \ Language”按钮并指定排行榜的显示名称，以及在本例中说明这些值称为“points”来添加新语言。\n\n创建或编辑成就与处理排行榜非常相似，如图\
    \ Figure 9-8 所示。\n\n![9781430244226_Fig09-08.jpg](img/9781430244226_Fig09-08.jpg)\n\
    \nFigure 9-8.  创建或编辑成就\n\n在 Figure 9-8 中，我们看到了在 iTunes Connect 中用于创建和编辑成就的网页。项目\
    \ A 显示了用于成就的内部名称。项目 B 显示了成就的 ID。项目 C 指示此成就未被隐藏。默认情况下，即使玩家尚未获得成就，这些成就也是可见的。然而，指定一些隐藏的成就可能很有趣，这样当玩家达成时会感到惊喜。项目\
    \ E 显示我们为英语指定了显示文本。当然，可以通过点击“Add Language”按钮来添加其他语言的文本。\n\n我们已经了解了如何创建新的 `App\
    \ ID` 和在 iTunes Connect 中创建新的应用程序。我们还简要了解了创建排行榜和成就所需的界面。现在，让我们来看看利用这些新资源的代码。\n\
    \n### 在游戏中使用 Game Center\n\n一旦 Game Center 设置完成并包含了排行榜和成就功能，使用 GameKit 来开始使用这些功能是出奇地容易。以下部分将讨论如何连接到用户的\
    \ Game Center 账户、将用户的分数提交到排行榜以及获得成就。\n\n### 为用户启用 Game Center\n\n当游戏启用了 Game Center\
    \ 时，用户仍然必须选择使用 Game Center 功能。用户需要在 Game Center 中创建一个账户，并在当前的 iOS 设备上使用该账户进行身份验证。幸运的是，Apple\
    \ 让开始使用 Game Center 变得非常简单。\n\n要开始使用 Game Center，所有应用都必须获取一个代表本地玩家的 `GKLocalPlayer`\
    \ 实例并对其进行身份验证。Listing 9-1 展示了执行此操作的规范示例。\n\n**Listing 9-1.**  `RootViewController.m`（`initGameCenter`）\n\
    \n```\n-(void)initGameCenter{  \n    Class gkClass = NSClassFromString(@\"GKLocalPlayer\"\
    );  \n\n    BOOL iosSupported = [[[UIDevice currentDevice] systemVersion] compare:@\"\
    4.1\" options:NSNumericSearch] != NSOrderedAscending;  \n    if (gkClass && iosSupported)\
    \ {  \n        GKLocalPlayer *localPlayer = [GKLocalPlayer localPlayer];  \n \
    \       [localPlayer authenticateWithCompletionHandler:^(NSError *error) {  \n\
    \            if (localPlayer.isAuthenticated) {  \n                // 执行其他 Game\
    \ Center 操作  \n            } else {  \n                // 如果出现错误，则显示错误提示  \n \
    \           }  \n        }];  \n    }  \n}\n```\n"
- fmt: "```objc\nif (gkClass && iosSupported){\n    localPlayer = [GKLocalPlayer localPlayer];\n\
    \    [localPlayer authenticateWithCompletionHandler:^(NSError *error) {\n    \
    \    if (localPlayer.authenticated){\n            [leaderBoardButton setEnabled:YES];\n\
    \        } else {\n            [leaderBoardButton setEnabled:NO];\n        }\n\
    \    }];\n}\n```\n\nIn [Listing 9-1](#9781430244226_Ch09.xhtml#list1), we see\
    \ the task `initGameCenter` of the class `RootViewController`. This task is called\
    \ once at the beginning of the application launch. It first checks to see if GameKit\
    \ is available on this iOS device by looking for the class `GKLocalPlayer`. The\
    \ tasks also checks to see if the version of iOS is recent enough to support Game\
    \ Center. If yes, we get a pointer to the local player by calling `localPlayer`\
    \ on the class `GKLocalPlayer`.\n\nTo authenticate our local player, we simply\
    \ call `authenticateWithCompletionHandler:` and pass a block that will be executed\
    \ asynchronously when the user has authenticated (or cancelled). A block is simply\
    \ a way of declaring a function that can be passed around as value. In this case,\
    \ we are using a block in the same way we would use an anonymous class on a language\
    \ like Java. The first time this code is run, the user will see something like\
    \ [Figure 9-9](#9781430244226_Ch09.xhtml#Fig9).\n\n![9781430244226_Fig09-09.jpg](images/9781430244226_Fig09-09.jpg)\n\
    \n[Figure 9-9.](#9781430244226_Ch09.xhtml#_Fig9)  First-time authentication with\
    \ Game Center\n\nIn [Figure 9-9](#9781430244226_Ch09.xhtml#Fig9), we see the result\
    \ of calling GameKit’s authentication task. The user is prompted to sign in to\
    \ Game Center with an existing account, create a new account, or cancel. If the\
    \ user cancels enough times, the application will no longer display this dialog.\
    \ The exact number of times that the user must cancel before this happens seems\
    \ to change with different releases. With iOS 5, it is approximately three times.\
    \ Once the user has successfully authenticated, the application is now connected\
    \ to Game Center for that user account. When the application is run again, calls\
    \ to `authenticateWithCompletionHandler:` will call the handler code without pestering\
    \ the user to sign in again. The user will see something like [Figure 9-2](#9781430244226_Ch09.xhtml#Fig2).\n\
    \nOnce Game Center is enabled, we will want to start taking advantage of its features.\
    \ The following section looks at how to report a score to a leaderboard.\n\n##\
    \ Submitting Scores to a Leaderboard\n\nOne of the best features that Game Center\
    \ provides is a built-in mechanism for tracking a user’s high scores across devices.\
    \ It allows users to compare their scores with their friends’ scores, as well\
    \ as with other players globally. The code for submitting a score is straightforward,\
    \ as shown in [Listing 9-2](#9781430244226_Ch09.xhtml#list2).\n\n**[Listing 9-2](#9781430244226_Ch09.xhtml#_list2).**\
    \ `RootViewController.m` (`notifyGameCenter`)\n\n```objc\n-(void)notifyGameCenter{\n\
    \    if ([localPlayer isAuthenticated]){\n        GKScore* score = [[GKScore alloc]\
    \ initWithCategory:@\"beltcommander.highscores\"];\n        score.value = ([beltCommanderController\
    \ score];\n        \n        [score reportScoreWithCompletionHandler:^(NSError\
    \ *error){\n            if (error){\n                //handle error\n        \
    \    }\n        }];\n    }\n}\n```\n\nIn [Listing 9-2](#9781430244226_Ch09.xhtml#list2),\
    \ we see the task `notifyGameCenter`, which is called every time a game ends.\
    \ In this task, we check to see if the `localPlayer` is authenticated. If so,\
    \ we simply create a `GKScore` object, specifying the ID of the leaderboard to\
    \ which we are submitting the score—in this case, \"`beltcommander.highscores`\"\
    . Once we have a reference to the `GKScore` object, we set the score property\
    \ to the score from the last game. The property score can by any type of number—in\
    \ this case, it is a `long`.\n\nLastly, we call `reportScoreWithCompletionHandler:`\
    \ and pass a block to handle any error. In our example, we don’t do anything with\
    \ the error.\n\n**Note**  If the user is offline or there was some sort of network\
    \ issue, GameKit will automatically resubmit scores when it is run in the future,\
    \ ensuring that a player’s hard work is properly recorded.\n\n[Figure 9-10](#9781430244226_Ch09.xhtml#Fig10)\
    \ shows a score on the leaderboard.\n\n![9781430244226_Fig09-10.jpg](images/9781430244226_Fig09-10.jpg)\n\
    \n[Figure 9-10.](#9781430244226_Ch09.xhtml#_Fig10)  A leaderboard with a sample\
    \ score\n\nIn [Figure 9-10](#9781430244226_Ch09.xhtml#Fig10), we see a score displayed\
    \ on a leaderboard. There is only one score at the moment, because the screenshot\
    \ was taken during development of the game. At the top, we can see three options\
    \ for viewing high scores: Today, This Week, or All Time. The component that is\
    \ displaying the high scores is a pre-built component called `GKLeaderboardViewController`\
    \ that comes with GameKit; the code to bring up this component is shown in [Listing\
    \ 9-3](#9781430244226_Ch09.xhtml#list3).\n\n**[Listing 9-3](#9781430244226_Ch09.xhtml#_list3).**\
    \ `RootViewController.m` (`leaderBoardClicked:`)\n\n```objc\n- (IBAction)leaderBoardClicked:(id)sender\
    \ {\n        GKLeaderboardViewController* leaderBoardController = [[GKLeaderboardViewController\
    \ alloc] init];\n        leaderBoardController.category = @\"beltcommander.highscores\"\
    ;\n        leaderBoardController.leaderboardDelegate = self;\n        [self presentModalViewController:leaderBoardController\
    \ animated:YES];\n}\n```\n\nIn [Listing 9-3](#9781430244226_Ch09.xhtml#list3),\
    \ we see the task `leaderBoardClicked:`, which is called when the user clicks\
    \ the Leaderboard button. This class is called on an instance of `RootViewController`,\
    \ which is the main `UIViewController` for our example game Belt Commander. We\
    \ don’t have to know much about `RootViewController` except that it is a `UIViewContoller`\
    \ and conforms to `GKLeaderboardViewControllerDelegate`. To display the view shown\
    \ in [Figure 9-10](#9781430244226_Ch09.xhtml#Fig10), first create a `GKLeaderboardView`\
    \ and set the `category` property to the ID of our leaderboard. Then call `presentModalViewController:animated:`\
    \ on `self`, which will display the Leaderboard view. In order to remove the leaderboard\
    \ when the user clicks Done, set `self` as the `leaderbordDelegate`, which means\
    \ the task `leaderboardViewControllerDidFinish:` from `GKLeaderboardViewControllerDelegate`\
    \ will be called when the user is done. The implementation `leaderboadViewControllerDidFinish:`\
    \ should be as follows, shown in [Listing 9-4](#9781430244226_Ch09.xhtml#list4).\n\
    \n**[Listing 9-4](#9781430244226_Ch09.xhtml#_list4).** `RootViewController.m`\
    \ (`leaderboardViewControllerDidFinish:`)\n\n```objc\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController\
    \ *)viewController{\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
    \nIn [Listing 9-4](#9781430244226_Ch09.xhtml#list4), we see our implementation\
    \ of `leaderboardViewControllerDidFinish:`, where we simply call `dismissModalViewControllerAnimated:`\
    \ to remove the Leaderboard view from the screen.\n\nAs you can see, working with\
    \ scores and leaderboards with GameKit is pretty simple—it takes less than 10\
    \ lines for code to get things going. Next, let’s look at working with achievements\
    \ and seeing how they are awarded to a user.\n\n## Awarding Achievements\n\nAchievements\
    \ are little milestones that are reached throughout a game. They are intended\
    \ to encourage users to continue playing by indicating that they have achieved\
    \ something. In addition to providing a sense of progress, you can also make players\
    \ feel clever by awarding secrete achievements. Previously, we looked at how to\
    \ add an achievement in iTunes Connect (see [Figure 9-8](#9781430244226_Ch09.xhtml#Fig8)).\
    \ In our sample game, Belt Commander, the player destroys wave after wave of asteroids."
