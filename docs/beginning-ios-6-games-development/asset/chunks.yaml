    panRecognizer = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(panGesture:)];
            [panRecognizer setMinimumNumberOfTouches:1];         [actorsView addGestureRecognizer:panRecognizer];
            return YES;     }     return NO; } ```    In [Listing 8-18](#9781430244226_Ch08.xhtml#list18),
    we see the task `doSetup` for the class `PanGestureController`. The first thing
    we do after specifying the size of the game area is specify the `minYValue` and
    the `maxYValue` for the asteroids, so they cannot move within 72 points of the
    top or bottom of the screen. Next, we create our three Asteroid objects, add them
    to the scene, and add them to the `NSMutableArray asteroids`. Each Asteroid starts
    at the top of the screen.    The last thing we do in `doSetup` is create a `UIPanGestureRecognizer`,
    configure it to call `panGesture`:, and add it to `actorsView`. The next section
    explains how we respond to these gestures to create the desired behavior.    Responding
    to Pan Gestures    We have reviewed how to set up the class `UIPanGestureController`.
    Now we will explore how to respond to this gesture in the task `panGesture`:,
    as shown in [Listing 8-19](#9781430244226_Ch08.xhtml#list19).    **[Listing 8-19](#9781430244226_Ch08.xhtml#_list19).** `PanGestureController.m
    (panGesture:)`    ``` -(void)panGesture:(UIPanGestureRecognizer*)panRecognizer{
        if ([panRecognizer state] == UIGestureRecognizerStateBegan){         CGSize
    gameAreaSize = [self gameAreaSize];         CGPoint locationInView =  [panRecognizer
    locationInView:actorsView];         if (locationInView.x < gameAreaSize.width/3.0){
                asteroidIndex = 0;         } else if (locationInView.x > gameAreaSize.width/3.0*2){
                asteroidIndex = 2;         } else {             asteroidIndex = 1;
            }         Asteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];
            startCenter = [asteroid center];         [asteroid setAnimationPaused:YES];
        } else if ([panRecognizer state] == UIGestureRecognizerStateChanged){         Asteroid*
    asteroid = [asteroids objectAtIndex:asteroidIndex];         CGPoint locationInView
    =  [panRecognizer locationInView:actorsView];         CGPoint center = [asteroid
    center];         center.y = locationInView.y;         if (center.y < [self minYValue]){
                center.y = [self minYValue];         }         if (center.y > [self
    maxYValue]){             center.y = [self maxYValue];         }         [asteroid
    setCenter:center];     } else if ([panRecognizer state] == UIGestureRecognizerStateEnded){
            Asteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];         [asteroid
    setAnimationPaused:NO];     } else if ([panRecognizer state] == UIGestureRecognizerStateCancelled){
            Asteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];         [asteroid
    setAnimationPaused:NO];         [asteroid setCenter:startCenter];     } } ```    In
    [Listing 8-19](#9781430244226_Ch08.xhtml#list19), we can see that the task `panGesture`:
    is broken up by the state of `panRecognizer` in the same way as for the pinch-out
    example. If the state of `panRecognizer` equals `UIGestureRecognizerStateBegan`,
    we calculate which of the three asteroids the gesture is closest to horizontally.
    Once we record which asteroid we are working with in `asteroidIndex`, we can get
    the active Asteroid object from the `NSMutableArray` asteroids and record its
    location in `startCenter`.


    Lastly, we stop it from spinning by setting `animationPaused` to No.    In subsequent
    calls to `panGesture`, the `panRecognizer` will have the state of `UIGestureRecognizerStateChanged`.
    When this happens, we simply set the Y value of the selected asteroid to the Y
    value of the gesture, using the task `locationInView of panRecognizer`.    As
    with our previous example, the gesture terminates with the states either `UIGestureRecognizerStateEnded`
    or `UIGestureRecognizerStateCancelled`. In both cases, we want to restart the
    animation, in the cancel state; we also want to revert the center of the selected
    asteroid to `startCenter`.    I hope by this point a pattern is emerging as to
    how these gesture recognizers work. The basic pattern is to set up the recognizer
    to detect gestures on a `UIView`, configure the callback task to record the starting
    state of whatever is being manipulated (saucer, asteroid, and so on), then apply
    changes to the scene or roll back the changes in the case of cancellation. Let’s
    look at the rotation gesture next.    Rotation Gesture    The rotation gesture
    is not as common as the previously covered gestures in the core `iOS` applications.
    In fact, I could not find a single example in the applications that ship with
    the `iPhone`, but I may be overlooking something. The rotation gesture, however,
    does show up in a number puzzle games, where you need to rotate an object this
    way or that. The rotation gesture is performed by putting two fingers on the screen
    and spinning your hand, like you are opening a bottle. [Figure 8-5](#9781430244226_Ch08.xhtml#Fig5)
    shows a rotation example.    In [Figure 8-5](#9781430244226_Ch08.xhtml#Fig5) we
    see a spaceship being rotated counterclockwise. We know the ship is being rotated
    counterclockwise because its starboard-maneuvering thruster is firing. If the
    ship were rotating clockwise, we would see the port-maneuvering thruster firing.
    The class that is responsible for this example is `RotationGestureController`,
    whose header file is shown in [Listing 8-20](#9781430244226_Ch08.xhtml#list20).    ![9781430244226_Fig08-05.jpg](images/9781430244226_Fig08-05.jpg)    [Figure
    8-5.](#9781430244226_Ch08.xhtml#_Fig5)  Rotating a spaceship with the rotation
    gesture    **[Listing 8-20](#9781430244226_Ch08.xhtml#_list20).** `RotationGestureController.h`    ```
    @interface RotationGestureController : GameController{     Viper* viper;     float
    startRotation; } -(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer;
    @end ```    In [Listing 8-20](#9781430244226_Ch08.xhtml#list20), we see the header
    file for the class `RotationGestureController`. We see that we have a reference
    to the spaceship, called Viper. We also keep track of the starting rotation of
    the spaceship in the variable `startRotation`. The task `rotationGesture`: is
    called when a `UIRotationGestureRecognizer` recognizes a gesture. Let’s take a
    quick look at the `doSetup` task for the class `RotationGestureController` so
    we understand how the `UIRotationGestureRecognizer` is set up. See [Listing 8-21](#9781430244226_Ch08.xhtml#list21).    **[Listing
    8-21](#9781430244226_Ch08.xhtml#_list21).** `RotationGestureController.m (doSetup)`    ```
    -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(320,
    480)];         viper = [Viper viper:self];         [self addActor:viper];         UIRotationGestureRecognizer*
    rotationRecognizer = [[UIRotationGestureRecognizer alloc] initWithTarget:self
    action:@selector(rotationGesture:)];         [actorsView addGestureRecognizer:rotationRecognizer];
            return YES;     }     return NO; } ```    In [Listing 8-21](#9781430244226_Ch08.xhtml#list21),
    we can see that the `doSetup` task of `RotationGestureController` is very simple.
    We add a new Viper object and register a `UIRotationGestureRecognizer`.'
