        float yFactor = actorsView.frame.size.height/self.gameAreaSize.height;      float
    x = (actor.center.x-actor.radius)*xFactor;     float y = (actor.center.y-actor.radius)*yFactor;
        float width = actor.radius*xFactor*2;     float height = actor.radius*yFactor*2;
        CGRect frame = CGRectMake(x, y, width, height);      actorView.transform =
    CGAffineTransformIdentity;     [actorView setFrame:frame];     actorView.transform
    = CGAffineTransformRotate(actorView.transform, [actor rotation]);      [actorView
    setAlpha:[actor alpha]]; } ```    The task `updateViewForActor`: is responsible
    for managing the `UIView` associated with each actor. In the first line of this
    task, we get the actor’s representation property and store it in the variable
    rep. The variable rep is an `NSObject` that conforms to the protocol Representation.
    The protocol `Representation` is defined in `Actor.h` (shown later in [Listing
    6-9](#9781430244226_Ch06.xhtml#list9)) and describes how a `UIView` for a given
    actor is created and updated. `UIViews` are created when `getViewForActor:In`:
    is called. When a `UIView` is updated to reflect a change to an actor, the task
    `updateView:ForActor:In`: is called. These two tasks are discussed later in this
    chapter.    After the `UIView actorView` is identified, we calculate the region
    of its parent view that it should take up. The details of this calculation were
    described in [Chapter 5](#9781430244226_Ch05.xhtml). We add two new features,
    however; we rotate `actorView` based on the actor’s rotation property, and we
    also set the alpha value of `actorView`, allowing actors to change their opacity
    during a game.    Now that we have looked at the class `GameController` and how
    it manages the actors in a game, let’s look at the class `Actor` so you can understand
    how it allows for many different types of actors in any game.    The Actor Class    The
    class `Actor` is the super-class for all actors in your game.'
  trans: "\n`m (doAddActors` 和 `doRemoveActors` 方法)\n\n```\n-(void)doAddActors{\n\
    \    for (Actor* actor in actorsToBeAdded){\n        [actors addObject:actor];\n\
    \        UIView* view = [[actor representation] getViewForActor:actor In:self];\n\
    \        [view setFrame:CGRectMake(0, 0, 0, 0)];\n        [actorsView addSubview:view];\n\
    \        NSMutableSet* sorted = [actorClassToActorSet valueForKey:[[actor class]\
    \ description]];\n        [sorted addObject:actor];\n    }\n    [actorsToBeAdded\
    \ removeAllObjects];\n}\n-(void)doRemoveActors{\n    for (Actor* actor in actorsToBeRemoved){\n\
    \        UIView* view = [[actor representation] getViewForActor:actor In:self];\n\
    \        [view removeFromSuperview];\n        NSMutableSet* sorted = [actorClassToActorSet\
    \ valueForKey:[[actor class] description]];\n        [sorted removeObject:actor];\n\
    \        [actors removeObject:actor];\n    }\n    [actorsToBeRemoved removeAllObjects];\n\
    }\n```\n\n任务`doAddActors`遍历`NSMutableSet actorsToBeAdded`中的所有演员，并将每个演员添加到`NSMutableSet\
    \ actors`中。此外，它还会从演员的`representation`属性中获取每个演员的`UIView`，并将其作为`actorsView`的子视图添加。属性`representation`是一个符合`Representation`协议（如`Actor.h`中定义，见清单\
    \ 6-9）的`NSObject`。添加视图后，我们在`NSMutableDictionary actorClassToActorSet`中找到对应于该演员类的`NSMutableSet\
    \ sorted`，然后将该演员添加到其中。这样，我们之后就可以通过在`NSMutableDictionary actorClassToActorSet`中快速查找，找到特定类型的所有演员。`doAddActors`的最后一步是从集合`actorsToBeAdded`中移除所有演员。\n\
    \n在前面的代码清单中，我们看到与任务`doAddActors`并行的任务`doRemoveActors`。在`doRemoveActors`中，`NSMutableSet\
    \ actorsToBeRemoved`中的每个演员，其关联的`UIView`会从其父视图中移除，并从相应的`NSMutableSet sorted`中移除。每个演员也会从`NSMutableSet\
    \ actors`中移除。最后，通过调用`removeAllObjects`清空`NSMutableSet actorsToBeRemoved`中的所有演员。\n\
    \n## 添加和移除演员\n\n要向游戏中添加或移除演员，我们分别调用`addActor`或`removeActor`，如清单 6-6 所示。\n\n**清单\
    \ 6-6. `GameController.m (addActor` 和 `removeActor 方法)`**\n\n```\n-(void)addActor:(Actor*)actor{\n\
    \    [actor setAdded:YES];\n    [actorsToBeAdded addObject:actor];\n}\n-(void)removeActor:(Actor*)actor{\n\
    \    [actor setRemoved:YES];\n    [actorsToBeRemoved addObject:actor];\n}\n```\n\
    \n在清单 6-6 中，您可以看到两个非常简单的任务：`addActor`和`removeActor`。在`addActor`中，传入的演员在添加到`NSMutableSet\
    \ actorsToBeAdded`之前，其`added`属性被设置为`YES`。类似地，在`removeActor`任务中，传入的演员的`removed`属性被设置为`YES`，并被添加到`NSMutableSet\
    \ actorsToBeRemoved`中。\n\n之前，在清单 6-5 中，当演员被添加或移除时，我们也将其从存储在`NSMutableDictionary\
    \ actorClassToActorSet`中的集合中添加或移除。这样做是为了无需遍历整个`actors`集合就能找到给定类型的所有演员。然而，我们并不希望为游戏中的每种演员类型都维护一个独立的集合。我们只想跟踪游戏逻辑中需要访问的演员类型。\n\
    \n## 排序演员\n\n`setSortedActorClasses`任务用于指定哪些演员应该被排序，如清单 6-7 所示。\n\n**清单 6-7. `GameController.m\
    \ (setSortedActorClasses:)`**\n\n```\n-(void)setSortedActorClasses:(NSMutableArray\
    \ *)aSortedActorClasses{\n    [sortedActorClasses removeAllObjects];\n    sortedActorClasses\
    \ = aSortedActorClasses;\n\n    [actorClassToActorSet removeAllObjects];\n   \
    \ actorClassToActorSet = [NSMutableDictionary new];\n\n    for (Class class in\
    \ sortedActorClasses){\n        [actorClassToActorSet setValue: [NSMutableSet\
    \ new] forKey:[class description]];\n    }\n\n    for (Actor* actor in actors){\n\
    \        NSMutableSet* sorted = [actorClassToActorSet objectForKey:[[actor class]\
    \ description]];\n        [sorted addObject:actor];\n    }\n}\n```\n\n我们首先进行一些内存管理，移除`NSMutableArray\
    \ sortedActorClasses`中的所有对象，释放它，然后将`sortedActorClasses`重新赋值为传入的`NSMutableArray\
    \ aSortedActorClasses`。接下来，我们清理旧的`NSMutableDictionary actorClassToActorSet`。完成记账工作后，我们为`sortedActorClasses`中的每个类向`actorClassToActorSet`添加一个新的`NSMutableSet`。最后，我们遍历所有演员，并将每个演员添加到相应的`NSMutableSet`中。最后这一步是必要的，以允许在应用程序中多次调用`setSortedActorClasses`。但考虑到这是一个相对昂贵的操作，最好在游戏开始时只调用一次`setSortedActorClasses`。\n\
    \n## 管理`UIView`\n\n对`GameController`类的最后一项改进是`updateViewForActor:`任务，如清单 6-8 所示。\n\
    \n**清单 6-8. `GameController.m (updateViewForActor:)`**\n\n```\n-(void)updateViewForActor:(Actor*)actor{\n\
    \    NSObject<Representation>* rep = [actor representation];\n\n    UIView* actorView\
    \ = [rep getViewForActor:actor In:self];\n    [rep updateView:actorView ForActor:actor\
    \ In:self];\n\n    float xFactor = actorsView.frame.size.width/self.gameAreaSize.width;\n\
    \    float yFactor = actorsView.frame.size.height/self.gameAreaSize.height;\n\n\
    \    float x = (actor.center.x-actor.radius)*xFactor;\n    float y = (actor.center.y-actor.radius)*yFactor;\n\
    \    float width = actor.radius*xFactor*2;\n    float height = actor.radius*yFactor*2;\n\
    \    CGRect frame = CGRectMake(x, y, width, height);\n\n    actorView.transform\
    \ = CGAffineTransformIdentity;\n    [actorView setFrame:frame];\n    actorView.transform\
    \ = CGAffineTransformRotate(actorView.transform, [actor rotation]);\n\n    [actorView\
    \ setAlpha:[actor alpha]];\n}\n```\n\n任务`updateViewForActor:`负责管理与每个演员关联的`UIView`。在该任务的第一行，我们获取演员的`representation`属性并将其存储在变量`rep`中。变量`rep`是一个符合`Representation`协议的`NSObject`。协议`Representation`在`Actor.h`中定义（稍后见清单\
    \ 6-9），描述了如何创建和更新给定演员的`UIView`。当调用`getViewForActor:In:`时会创建`UIView`。当`UIView`需要更新以反映演员的变化时，会调用`updateView:ForActor:In:`任务。这两个任务将在本章后面讨论。\n\
    \n确定`UIView actorView`后，我们计算其父视图中它应该占据的区域。此计算的细节已在第 5 章中描述。然而，我们添加了两个新特性：我们根据演员的`rotation`属性旋转`actorView`，并且设置了`actorView`的`alpha`值，允许演员在游戏过程中改变其不透明度。\n\
    \n现在我们已经了解了`GameController`类以及它如何管理游戏中的演员，接下来让我们看看`Actor`类，以便您理解它如何允许多种不同类型演员在任何游戏中存在。\n\
    \n## Actor 类\n\n`Actor`类是游戏所有演员的超类。\n"
- fmt: "它主要提供关于角色位置的信息，但也描述了指示角色如何行为以及在屏幕上如何呈现的协议。在本节中，我们将查看`Actor`是如何实现的，然后看一些具体的例子。首先，我们来看一下`Actor`类的头文件，如[列表6-9](#9781430244226_Ch06.xhtml#list9)所示。\n\
    \n**[列表6-9.](#9781430244226_Ch06.xhtml#_list9) `Actor.h`**\n\n```objectivec\n\
    #import <Foundation/Foundation.h>\n\n@class GameController, Actor;\n\n@protocol\
    \ Representation\n-(UIView*)getViewForActor:(Actor*)anActor In:(GameController*)aController;\n\
    -(void)updateView:(UIView*)aView ForActor:(Actor*)anActor In:(GameController*)aController;\n\
    @end\n\n@protocol Behavior\n-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController;\n\
    @end\n\nlong nextId;\n@interface Actor : NSObject {\n\n}\n//State\n@property (nonatomic,\
    \ strong) NSNumber* actorId;\n@property (nonatomic) BOOL added;\n@property (nonatomic)\
    \ BOOL removed;\n\n//Geometry\n@property (nonatomic) CGPoint center;\n@property\
    \ (nonatomic) float rotation;\n@property (nonatomic) float speed;\n@property (nonatomic)\
    \ float radius;\n\n//Behavoir\n@property (nonatomic, strong) NSMutableArray<Behavior>*\
    \ behaviors;\n\n//Representation\n@property (nonatomic) BOOL needsViewUpdated;\n\
    @property (nonatomic, strong) NSObject<Representation>* representation;\n@property\
    \ (nonatomic) int variant;\n@property (nonatomic) int state;\n@property (nonatomic)\
    \ float alpha;\n\n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius AndRepresentation:(NSObject<Representation>*)aRepresentation;\n\
    -(void)step:(GameController*)controller;\n-(BOOL)overlapsWith: (Actor*) actor;\n\
    -(void)addBehavior:(NSObject<Behavior>*)behavior;\n\n+(CGPoint)randomPointAround:(CGPoint)aCenter\
    \ At:(float)aRadius;\n@end\n```\n\n在这里，定义了协议`Representation`。任何负责管理与角色关联的`UIView`的对象都必须遵循此协议。这里的想法是，至少有两种`UIView`用于绘制角色：基于图像的视图和基于程序化绘图的视图。还可以有其他方式来实现代表角色的`UIView`，例如包含子视图的`UIView`。本章不涉及这个例子，但我们会在本章讨论基于图像的角色，并在下一章讨论基于矢量的角色。\n\
    \n无论角色的`UIView`如何实现，`GameController`类都需要知道如何获取正确`UIView`的引用，并给`Representation`更新其外观的机会。因此，我们有两个必需的任务：`getViewForActor:In:`和`updateView:ForActor:In:`。\n\
    \n在前面的列表中，我们看到了第二个名为`Behavior`的协议。我们将创建一些简单的类来描述角色的特定行为，这些行为可以在不同类型的角色之间共享。例如，我们将创建一个名为`LinearMotion`的行为，它描述角色如何在屏幕上移动。几种类型的角色将使用此行为。这就是`Behavior`协议的作用所在；它提供了一个必需的单一任务`applyToActor:From:`，该任务将在游戏的每一步由`GameController`调用。\n\
    \n该列表还显示了许多属性。其中许多属性应该在前一章中已经熟悉——包括`center`、`speed`和`radius`。还添加了一些新属性，以使`Actor`类尽可能可重用。添加的属性`added`和`removed`用于跟踪角色是否已从游戏中添加或移除。\n\
    \n属性`behaviors`是一个`NSMutableArray`，包含遵循`Behavior`协议的对象。通过向`behaviors`属性添加`Behavior`对象，我们可以自定义每个角色的行为方式。这可以简单到描述角色的运动，也可以复杂到实现人工智能。\n\
    \n我们提供了一个名为`addBehavior:`的特殊任务，它是获取`NSMutableArray` `behaviors`并添加`Behavior`对象的简写方式。`addBehavior:`任务还让我们有机会延迟加载`NSMutableArray`\
    \ `behaviors`，这样如果我们不需要它，就不会创建它。\n\n你还可以在[列表6-9](#9781430244226_Ch06.xhtml#list9)中看到，我们添加了`variant`和`state`属性。角色通常需要这两个属性，因此为了简单起见，它们被包含在`Actor`类中。属性`variant`可用于描述属于同一类、行为相同但颜色可能不同的角色——例如，吃豆人游戏中不同颜色的幽灵。属性`state`用于跟踪角色在其生命周期中可能具有的不同状态。再次以幽灵为例，状态可能包括“在监狱中”、“追击中”和“逃跑中”。最后一个属性是`alpha`，用于描述角色在屏幕上的透明度。\n\
    \n[列表6-9](#9781430244226_Ch06.xhtml#list9)中定义的任务基本上与前一章中为`Actor`类描述的任务相同。这里唯一的实际区别是，当角色被初始化时，必须传入一个`Representation`。我们还添加了一个实用任务`randomPointAround:At:`，用于在围绕点`aPoint`、半径为`aRadius`的圆上创建一个随机点。\n\
    \n## 实现Actor\n\n`Actor`类的实现如[列表6-10](#9781430244226_Ch06.xhtml#list10)所示。\n\n\
    **[列表6-10.](#9781430244226_Ch06.xhtml#_list10) `Actor.m`**\n\n```objectivec\n\
    #import \"Actor.h\"\n\n@implementation Actor\n@synthesize actorId;\n@synthesize\
    \ added;\n@synthesize removed;\n@synthesize center;\n@synthesize rotation;\n@synthesize\
    \ speed;\n@synthesize radius;\n@synthesize needsViewUpdated;\n@synthesize representation;\n\
    @synthesize variant;\n@synthesize state;\n@synthesize alpha;\n@synthesize behaviors;\n\
    \n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius AndRepresentation:(NSObject<Representation>*)aRepresentation{\n\
    \    self = [super init];\n    if (self != nil){\n        [self setActorId:[NSNumber\
    \ numberWithLong:nextId++]];\n        [self setCenter:aPoint];\n        [self\
    \ setRotation:0];\n        [self setRadius:aRadius];\n        [self setRepresentation:aRepresentation];\n\
    \        [self setAlpha:1.0];\n    }\n    return self;\n}\n-(void)step:(GameController*)controller{\n\
    \    //implemented by subclasses.\n}\n-(BOOL)overlapsWith: (Actor*) actor {\n\
    \        float xdist = abs(self.center.x - actor.center.x);\n        float ydist\
    \ = abs(self.center.y - actor.center.y);\n    float distance = sqrtf(xdist*xdist+ydist*ydist);\n\
    \    return distance < self.radius + actor.radius;\n}\n-(void)setVariant:(int)aVariant{\n\
    \    if (aVariant != variant){\n        variant = aVariant;\n        needsViewUpdated\
    \ = YES;\n    }\n}\n-(void)setState:(int)aState{\n    if (aState != state){\n\
    \        state = aState;\n        needsViewUpdated = YES;\n    }\n}\n-(void)addBehavior:(NSObject<Behavior>*)behavior{\n\
    \    if (behaviors == nil){\n        behaviors = [NSMutableArray new];\n    }\n\
    \    [behaviors addObject:behavior];\n}\n\n+(CGPoint)randomPointAround:(CGPoint)aCenter\
    \ At:(float)aRadius{\n    float direction = arc4random()%1000/1000.0 * M_PI*2;\n\
    \    return CGPointMake(aCenter.x + cosf(direction)*aRadius, aCenter.y + sinf(direction)*aRadius);\n\
    }\n@end\n```\n\n在此文件顶部，我们看到我们简单地为类的每个属性使用了`@synthesize`来创建 getter 和 setter 任务，但`state`和`variant`属性除外。我们为`state`和`variant`属性的\
    \ setter 任务定义了自定义实现，以便当这些值改变时，将`needsViewUpdated`设置为`YES`。这样做是为了确保当角色的`state`或`variant`属性发生变化时，角色的`Representation`会更新代表该角色的`UIView`。\n\
    \n任务`initAt:WithRadius:AndRepresentation:`简单地初始化角色并设置传入的属性。我们还将`alpha`属性设置为1。"
  raw: 'It primarily provides information about an actor’s location, but it also describes
    protocols that indicate how an actor behaves and is represented on the screen.
    In this section, we will look at how `Actor` is implemented, followed by some
    concrete examples. Let’s start by taking a look at the header file of the `Actor`
    class, shown in [Listing 6-9](#9781430244226_Ch06.xhtml#list9).    **[Listing
    6-9.](#9781430244226_Ch06.xhtml#_list9) `Actor.h`**    ``` #import <Foundation/Foundation.h>  @class
    GameController, Actor;  @protocol Representation -(UIView*)getViewForActor:(Actor*)anActor
    In:(GameController*)aController; -(void)updateView:(UIView*)aView ForActor:(Actor*)anActor
    In:(GameController*)aController; @end  @protocol Behavior -(void)applyToActor:(Actor*)anActor
    In:(GameController*)gameController; @end  long nextId; @interface Actor : NSObject
    {  } //State @property (nonatomic, strong) NSNumber* actorId; @property (nonatomic)
    BOOL added; @property (nonatomic) BOOL removed;  //Geometry @property (nonatomic)
    CGPoint center; @property (nonatomic) float rotation; @property (nonatomic) float
    speed; @property (nonatomic) float radius;  //Behavoir @property (nonatomic, strong)
    NSMutableArray<Behavior>* behaviors;  //Representation @property (nonatomic) BOOL
    needsViewUpdated; @property (nonatomic, strong) NSObject<Representation>* representation;
    @property (nonatomic) int variant; @property (nonatomic) int state; @property
    (nonatomic) float alpha;  -(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius
    AndRepresentation:(NSObject<Representation>*)aRepresentation; -(void)step:(GameController*)controller;
    -(BOOL)overlapsWith: (Actor*) actor; -(void)addBehavior:(NSObject<Behavior>*)behavior;  +(CGPoint)randomPointAround:(CGPoint)aCenter
    At:(float)aRadius; @end ```    Here, the protocol `Representation` is defined.
    Any object that is to manage the `UIView` associated with an actor must conform
    to this protocol. The idea here is that there are at least two kinds of `UIViews`
    used to draw an actor: those based on images and those based on programmatic drawing.
    There can be other ways to implement a `UIView` that represents an actor, such
    as a `UIView` with sub-views. We don’t cover that example in this chapter, but
    we do look at image-based actors in this chapter and vector-based actors in the
    next chapter.    Regardless of how an actor’s `UIView` is implemented, the class
    `GameController` is going to have to know how to get a reference to the correct
    `UIView` and give the `Representation` the chance to update how it looks.  Hence,
    we have the two required tasks`: getViewForActor:In`: and `updateView:ForActor:In`:.    In
    the preceding listing, we see a second protocol named Behavior. We are going to
    create some simple classes that describe a particular behavior of an actor that
    can be shared among different types of actors. For example, we will create a behavior
    called `LinearMotion` that describes how an actor can move across the screen.
    Several types of actors will use this behavior. This is where the protocol Behavior
    comes in; it provides us with a single required task called `applyToActor:From`:
    that will be called by a `GameController` for every step of the game.    The listing
    also shows a number of properties. Many of these should be familiar from the previous
    chapter—including center, speed, and radius. Some new properties have also been
    added to make the `Actor` class as reusable as possible. The two properties added
    and removed are used to keep track of whether the actor has been added or removed
    from game.    The property behaviors is an `NSMutableArray` containing objects
    that conform to the protocol Behavior. By adding Behavior objects to the property
    behaviors, we can customize how each actor behaves. This can be as simple as describing
    the actor’s motion or as sophisticated as artificial intelligence.


    We provide a special task called `addBehavior`:, which is shorthand for getting
    the `NSMutableArray` behaviors and adding a Behavior object. The `addBehavior`:
    task also gives us a chance to lazy-load the `NSMutableArray` behaviors so we
    don’t create it if we don’t need it.    You can also see in [Listing 6-9](#9781430244226_Ch06.xhtml#list9)
    that we added a variant and state property. It is very common for actors to require
    these two properties, so they are included in the class `Actor` for simplicity.
    The property variant can be used to describe actors that are the same class, behave
    the same, but are perhaps different colors—for example, the different color ghosts
    in Pac-Man. The property state is used to track the different states an actor
    may have during its lifetime. Using the ghost example again, the states might
    include in jail, pursuing, and running. The last property is alpha, which is used
    to describe the transparency of the actor on the screen.    The tasks defined
    in [Listing 6-9](#9781430244226_Ch06.xhtml#list9) are basically the same as the
    task described in the preceding chapter for the class `Actor`. The only real difference
    here is that when an actor is initialized, a `Representation` must be passed-in.
    We have also added a utility task, `randomPointAround:At`:, which is used to create
    a random point on a circle of `aRadius` size around point `aPoint`.    Implementing
    Actor    The implementation of the class Actor is shown in [Listing 6-10](#9781430244226_Ch06.xhtml#list10).    **[Listing
    6-10.](#9781430244226_Ch06.xhtml#_list10) `Actor.m`**    ``` #import "Actor.h"  @implementation
    Actor @synthesize actorId; @synthesize added; @synthesize removed; @synthesize
    center; @synthesize rotation; @synthesize speed; @synthesize radius; @synthesize
    needsViewUpdated; @synthesize representation; @synthesize variant; @synthesize
    state; @synthesize alpha; @synthesize behaviors;    -(id)initAt:(CGPoint)aPoint
    WithRadius:(float)aRadius AndRepresentation:(NSObject<Representation>*)aRepresentation{
        self = [super init];     if (self != nil){         [self setActorId:[NSNumber
    numberWithLong:nextId++]];         [self setCenter:aPoint];         [self setRotation:0];
            [self setRadius:aRadius];         [self setRepresentation:aRepresentation];
            [self setAlpha:1.0];     }     return self; } -(void)step:(GameController*)controller{
        //implemented by subclasses. } -(BOOL)overlapsWith: (Actor*) actor {         float
    xdist = abs(self.center.x - actor.center.x);         float ydist = abs(self.center.y
    - actor.center.y);     float distance = sqrtf(xdist*xdist+ydist*ydist);     return
    distance < self.radius + actor.radius; } -(void)setVariant:(int)aVariant{     if
