- fmt: "In this way, when this XIB file is instantiated, an instance of `RockPaperScissorsController`\
    \ will be created as well. This raises the question: how do we access the items\
    \ within a XIB file programmatically? The answer lies in creating `IBOutlets`,\
    \ as the next section discusses.\n\n## Creating New IBOutlets from Interface Builder\n\
    \nAn `IBOutlet` is a connection between an item defined in a XIB file and a variable\
    \ declared in a class. To specify a field as an `IBOutlet`, you simply put the\
    \ keyword before the declaration of a field in a classes header file. Another\
    \ way to create an `IBOutlet` is to create it through Interface Builder. [Figure\
    \ 2-17](#9781430244226_Ch02.xhtml#Fig17) shows how to create an `IBOutlet` in\
    \ Interface Builder.\n\n![9781430244226_Fig02-17.jpg](images/9781430244226_Fig02-17.jpg)\n\
    \n[Figure 2-17.](#9781430244226_Ch02.xhtml#_Fig17) Creating an IBOutlet in Interface\
    \ Builder\n\nIn [Figure 2-17](#9781430244226_Ch02.xhtml#Fig17), we see the steps\
    \ to create an IBOutlet in Interface Builder. The first thing to notice is that\
    \ the view on the right is split between Interface Builder and a code window.\
    \ To enable this split view, press `command+option+return`. To create the IBOutlet,\
    \ start by right-clicking on the object you want to create an IBOutlet for (A)—in\
    \ this case, the Portrait Holder view. From the dialog that pops up, drag your\
    \ mouse from the little circle to the right of New Referencing Outlet (B) to the\
    \ place in the code where you want the `IBOutlet` created (C). As can be seen\
    \ in [Figure 2-17](#9781430244226_Ch02.xhtml#Fig17), a number of `IBOutlet` references\
    \ are already created. Note that the header file where these `IBOutlet` references\
    \ are created is `ViewController.h`. We use this file `ViewController_iPhone`,\
    \ and `ViewController_iPad` will inherit them. Lets take a look at the complete\
    \ version of `ViewController.h` in [Listing 2-5](#9781430244226_Ch02.xhtml#list5).\n\
    \n**[Listing 2-5.](#9781430244226_Ch02.xhtml#_list5)** `ViewController.h`\n\n\
    ```\n#import <UIKit/UIKit.h>\n#import \"RockPaperScissorsController.h\"\n \n@interface\
    \ ViewController : UIViewController{\n    IBOutlet UIView *landscapeView;\n  \
    \  IBOutlet UIView *landscapeHolderView;\n    IBOutlet UIView *portraitView;\n\
    \    IBOutlet UIView *portraitHolderView;\n    IBOutlet RockPaperScissorsController\
    \ *rockPaperScissorsController;\n}\n@end\n```\n\nIn [Listing 2-5](#9781430244226_Ch02.xhtml#list5),\
    \ we see that we have reference to five `IBOutlet` references. These will give\
    \ us programmatic access to these items at runtime. When Interface Builder created\
    \ these references, it also created some cleanup code in the implementation of\
    \ `ViewController`. [Listing 2-6](#9781430244226_Ch02.xhtml#list6) shows this\
    \ automatically generated code.\n\n**[Listing 2-6.](#9781430244226_Ch02.xhtml#_list6)**\
    \ `ViewController.m` (partial)\n\n```\n- (void)viewDidUnload {\n    [landscapeView\
    \ release];\n    landscapeView = nil;\n    [landscapeHolderView release];\n  \
    \  landscapeHolderView = nil;\n    [portraitView release];\n    portraitView =\
    \ nil;\n    [portraitHolderView release];\n    portraitHolderView = nil;\n   \
    \ [rockPaperScissorsController release];\n    rockPaperScissorsController = nil;\n\
    \    [super viewDidUnload];\n    // Release any retained subviews of the main\
    \ view.\n    // e.g. self.myOutlet = nil;\n}\n//...\n- (void)dealloc {\n    [landscapeView\
    \ release];\n    [landscapeHolderView release];\n    [portraitView release];\n\
    \    [portraitHolderView release];\n    [rockPaperScissorsController release];\n\
    \    [super dealloc];\n}\n```\n\nIn [Listing 2-6](#9781430244226_Ch02.xhtml#list6),\
    \ we see code generated by Interface Builder for each `IBOutlet` created. In the\
    \ task `viewDidUnload`, we see that each view is released and set to `nil`. Similarly,\
    \ in the task `dealloc`, we see that each view is released. In the next section,\
    \ we are going to review how we respond to orientation change; this same code\
    \ will be responsible for getting the different views we have been working with\
    \ onto the screen.\n\n## Responding to Changes in Orientation\n\nThe last thing\
    \ we have to do is add some logic that changes which `UIView` is displayed based\
    \ on the orientation of the device. The class `UIViewController` specifies a task\
    \ that is called after the device rotates. This task is called `didRotateFromInterfaceOrientation:`\
    \ and it is passed a constant indicating the orientation that the device was in.\
    \ By adding logic to this task, we can update the UI to reflect our new orientation.\
    \ The new orientation can be found by working with the class `UIDevice`. [Listing\
    \ 2-7](#9781430244226_Ch02.xhtml#list7) shows the implementation that gives us\
    \ the behavior we want.\n\n**[Listing 2-7.](#9781430244226_Ch02.xhtml#_list7)**\
    \ `GameController.m` (`shouldAutorotateToInterfaceOrientation:`)\n\n```\n-(void)didRotateFromInterfaceOrientation:(UIInterfaceOrientation)fromInterfaceOrientation{\n\
    \    UIDevice* device = [UIDevice currentDevice];\n    [self setOrientation: [device\
    \ orientation]];\n}\n-(void)setOrientation:(UIInterfaceOrientation)interfaceOrientation{\n\
    \    if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft || interfaceOrientation\
    \ == UIInterfaceOrientationLandscapeRight){\n        [portraitView removeFromSuperview];\n\
    \        [self.view addSubview:landscapeView];\n        \n        [rockPaperScissorsController\
    \ setup:landscapeHolderView.frame.size];\n        [landscapeHolderView addSubview:rockPaperScissorsController.view];\n\
    \        \n    } else {\n        [landscapeView removeFromSuperview];\n      \
    \  [self.view addSubview:portraitView];\n        \n        [rockPaperScissorsController\
    \ setup:portraitHolderView.frame.size];\n        [portraitHolderView addSubview:rockPaperScissorsController.view];\n\
    \    }\n}\n```\n\nIn [Listing 2-7](#9781430244226_Ch02.xhtml#list7), we see that\
    \ this task has passed the variable `fromInterfaceOrientation`, indicating the\
    \ old orientation of the device. We don’t really care about the old orientation\
    \ in our application, so we find the current (post-rotation) orientation by getting\
    \ the current device from the class `UIDevice` and then reading the property `orientation`.\
    \ Once we get the orientation, we call `setOrientation:`, which is also defined\
    \ in [Listing 2-7](#9781430244226_Ch02.xhtml#list7).\n\nThe task `setOrientation:`\
    \ will update UI to use whichever orientation is passed in. If the device is now\
    \ in landscape orientation, we remove the `portraitView` from its super-view,\
    \ meaning that we take it off the screen. We then add the view `landscapeView`\
    \ to the root-most view. We call setup on `rockPaperScissorsController` to give\
    \ it a chance to lay out its subviews, if it has not already done so. Lastly,\
    \ we add `rockPaperScissorsController`'s view property to `landscapeHolder` as\
    \ a subview.\n\nThe reason we want our layout logic in a separate task is that\
    \ we also want to call this task when the view controller first loads, so the\
    \ UI is correctly set up when the game starts. This lets us put all of our orientation\
    \ logic in one place.\n\nThe first time, the state of these objects will be different.\
    \ For example, the first time this task is called, neither the `portraitView`\
    \ nor the `landscapeView` is attached to the scene, so the call to `removeFromSubview`\
    \ will be a nonoperation, without error. When this task is called on subsequent\
    \ rotations, `rockPaperScissorsController`'s view will be attached to the scene;\
    \ however, when a view is added as a subview, it is automatically removed from\
    \ its parent view, if it has one.\n\nThe fact that `removeFromSuperview` and `addSubview:`\
    \ have these reasonable default behaviors makes life pretty easy when it comes\
    \ to manipulating views. It cuts down on error-prone cleanup code. [Listing 2-8](#9781430244226_Ch02.xhtml#list8)\
    \ shows how we call `setOrientation:` when the application first starts.\n\n**[Listing\
    \ 2-8.](#9781430244226_Ch02.xhtml#_list8)** `ViewController.` (incomplete)"
  raw: 'In this way, when this XIB file is instantiated, an instance of `RockPaperScissorsController`
    will be created as well. This raises the question: how do we access the items
    within a XIB file programmatically? The answer lies in creating `IBOutlets`, as
    the next section discusses.    Creating New IBOutlets from Interface Builder    An
    `IBOutlet` is a connection between an item defined in a XIB file and a variable
    declared in a class. To specify a field as an `IBOutlet`, you simply put the keyword
    before the declaration of a field in a classes header file. Another way to create
    an `IBOutlet` is to create it through Interface Builder. [Figure 2-17](#9781430244226_Ch02.xhtml#Fig17)
    shows how to create an `IBOutlet` in Interface Builder.    ![9781430244226_Fig02-17.jpg](images/9781430244226_Fig02-17.jpg)    [Figure
    2-17.](#9781430244226_Ch02.xhtml#_Fig17)  Creating an IBOutlet in Interface Builder    In
    [Figure 2-17](#9781430244226_Ch02.xhtml#Fig17), we see the steps to create an
    IBOutlet in Interface Builder. The first thing to notice is that the view on the
    right is split between Interface Builder and a code window. To enable this split
    view, press command+option+return. To create the IBOutlet, start by right-clicking
    on the object you want to create an IBOutlet for (A)—in this case, the Portrait
    Holder view. From the dialog that pops up, drag your mouse from the little circle
    to the right of New Referencing Outlet (B) to the place in the code where you
    want the `IBOutlet` created (C). As can be seen in [Figure 2-17](#9781430244226_Ch02.xhtml#Fig17),
    a number of `IBOutlet` references are already created. Note that the header file
    where these `IBOutlet` references are created is `ViewController.h`. We use this
    file `ViewController_iPhone`, and `ViewController_iPad` will inherit them. Lets
    take a look at the complete version of ViewControler.h in [Listing 2-5](#9781430244226_Ch02.xhtml#list5).    [**Listing
    2-5.**](#9781430244226_Ch02.xhtml#_list5)  `ViewController.h`    ``` #import <UIKit/UIKit.h>
    #import "RockPaperScissorsController.h"   @interface ViewController : UIViewController{
        IBOutlet UIView *landscapeView;     IBOutlet UIView *landscapeHolderView;
        IBOutlet UIView *portraitView;     IBOutlet UIView *portraitHolderView;     IBOutlet
    RockPaperScissorsController *rockPaperScissorsController; } @end ```    In [Listing
    2-5](#9781430244226_Ch02.xhtml#list5), we see that we have reference to five `IBOutlet`
    references. These will give us programmatic access to these items at runtime.
    When Interface Builder created these references, it also created some cleanup
    code in the implementation of `ViewController`. [Listing 2-6](#9781430244226_Ch02.xhtml#list6)
    shows this automatically generated code.    [**Listing 2-6.**](#9781430244226_Ch02.xhtml#_list6)  ViewController.m
    (partial)    ``` - (void)viewDidUnload {     [landscapeView release];     landscapeView
    = nil;     [landscapeHolderView release];     landscapeHolderView = nil;     [portraitView
    release];     portraitView = nil;     [portraitHolderView release];     portraitHolderView
    = nil;     [rockPaperScissorsController release];     rockPaperScissorsController
    = nil;     [super viewDidUnload];     // Release any retained subviews of the
    main view.     // e.g. self.myOutlet = nil; } ///... - (void)dealloc {     [landscapeView
    release];     [landscapeHolderView release];     [portraitView release];     [portraitHolderView
    release];     [rockPaperScissorsController release];     [super dealloc]; } ```    In
    [Listing 2-6](#9781430244226_Ch02.xhtml#list6), we see code generated by Interface
    Builder for each `IBOutlet` created. In the task `viewDidUnload`, we see that
    each view is released and set to nil. Similarly, in the task `dealloc`, we see
    that each view is released. In the next section, we are going to review how we
    respond to orientation change; this same code will be responsible for getting
    the different views we have been working with onto the screen.


    Responding to Changes in Orientation    The last thing we have to do is add some
    logic that changes which `UIView` is displayed based on the orientation of the
    device. The class `UIViewController` specifies a task that is called after the
    device rotates. This task is called `didRotateFromInterfaceOrientation:` and it
    is passed a constant indicating the orientation that the device was in. By adding
    logic to this task, we can update the UI to reflect our new orientation. The new
    orientation can be found by working with the class `UIDevice`. [Listing 2-7](#9781430244226_Ch02.xhtml#list7)
    shows the implementation that gives us the behavior we want.    [**Listing 2-7.**](#9781430244226_Ch02.xhtml#_list7)  GameController.m
    (shouldAutorotateToInterfaceOrientation:)    ``` -(void)didRotateFromInterfaceOrientation:(UIInterfaceOrientation)fromInterfaceOrientation{
        UIDevice* device = [UIDevice currentDevice];     [self setOrientation: [device
    orientation]]; } -(void)setOrientation:(UIInterfaceOrientation)interfaceOrientation{
        if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft || interfaceOrientation
    == UIInterfaceOrientationLandscapeRight){         [portraitView removeFromSuperview];
            [self.view addSubview:landscapeView];                   [rockPaperScissorsController
    setup:landscapeHolderView.frame.size];         [landscapeHolderView addSubview:rockPaperScissorsController.view];
                  } else {         [landscapeView removeFromSuperview];         [self.view
    addSubview:portraitView];                   [rockPaperScissorsController setup:portraitHolderView.frame.size];
            [portraitHolderView addSubview:rockPaperScissorsController.view];     }
    } ```    In [Listing 2-7](#9781430244226_Ch02.xhtml#list7), we see that this task
    has passed the variable `fromInterfaceOrientation`, indicating the old orientation
    of the device. We don’t really care about the old orientation in our application,
    so we find the current (post-rotation) orientation by getting the current device
    from the class `UIDevice` and then reading the property `orientation`. Once we
    get the orientation, we call `setOrientation:`, which is also defined in [Listing
    2-7](#9781430244226_Ch02.xhtml#list7).    The task `setOrientation:` will update
    UI to use which ever orientation is passed in. If the device is now in landscape
    orientation, we remove the `portraitView` from its super-view, meaning that we
    take it off the screen. We then add the view `landscapeView` to the root-most
    view. We call setup on rockpaperScissorsController to give it a chance to lay
    out its subviews, if it has not already done so. Lastly, we add ``rockPaperScissorsController''s
    view property to `landscapeHolder` as a subview.``   ````The reason we want our
    layout logic in a separate task is that we also want to call this task when the
    view controller first loads, so the UI is correctly set up when the game starts.
    This lets us put all of our orientation logic in one place.    The first time,
    the state of these objects will be different. For example, the first time this
    task is called, neither the `portraitView` nor the `landscapeView` is attached
    to the scene, so the call to `removeFromSubview` will be a nonoperation, without
    error. When this task is called on subsequent rotations, `rockPaperScissorsController''s`
    view will be attached to the scene; however, when a view is added as a subview,
    it is automatically removed from its parent view, if it has one.    The fact that
    `removeFromSuperview` and `addSubview:` have these reasonable default behaviors
    makes life pretty easy when it comes to manipulating views. It cuts down on error-prone
    cleanup code. [Listing 2-8](#9781430244226_Ch02.xhtml#list8) shows how we call
    setOrientation: when the application first starts.    [**Listing 2-8.**](#9781430244226_Ch02.xhtml#_list8)  ViewController.'
  trans: "\n这样一来，当 XIB 文件被实例化时，`RockPaperScissorsController` 的一个实例也会随之创建。这引发了一个问题：我们如何通过编程方式访问\
    \ XIB 文件中的条目？答案在于创建 `IBOutlet`，这将在下一节中讨论。\n\n## 从 Interface Builder 创建新的 IBOutlet\n\
    \n`IBOutlet` 是 XIB 文件中定义的条目与类中声明的变量之间的连接。要将某个字段指定为 `IBOutlet`，只需在类头文件的字段声明前加上该关键字。另一种创建\
    \ `IBOutlet` 的方法是通过 Interface Builder 创建。图 2-17 展示了如何在 Interface Builder 中创建 `IBOutlet`。\n\
    \n![9781430244226_Fig02-17.jpg](img/9781430244226_Fig02-17.jpg)\n\n图 2-17. 在 Interface\
    \ Builder 中创建 IBOutlet\n\n在图 2-17 中，我们看到了在 Interface Builder 中创建 IBOutlet 的步骤。首先需要注意的是，右侧的视图被分割为\
    \ Interface Builder 和一个代码窗口。要启用这种分割视图，请按 `command+option+return`。要创建 IBOutlet，首先右键单击你想要创建\
    \ IBOutlet 的对象（A）——在本例中，是 Portrait Holder 视图。从弹出的对话框中，将鼠标从 New Referencing Outlet（B）右侧的小圆圈拖到你希望创建\
    \ `IBOutlet` 的代码位置（C）。如图 2-17 所示，已经创建了一些 `IBOutlet` 引用。请注意，这些 `IBOutlet` 引用所在头文件是\
    \ `ViewController.h`。我们使用这个文件，而 `ViewController_iPhone` 和 `ViewController_iPad`\
    \ 将继承这些引用。让我们在代码清单 2-5 中查看 `ViewController.h` 的完整版本。\n\n**代码清单 2-5.** `ViewController.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"RockPaperScissorsController.h\"\n \n\
    @interface ViewController : UIViewController{\n    IBOutlet UIView *landscapeView;\n\
    \    IBOutlet UIView *landscapeHolderView;\n    IBOutlet UIView *portraitView;\n\
    \    IBOutlet UIView *portraitHolderView;\n    IBOutlet RockPaperScissorsController\
    \ *rockPaperScissorsController;\n}\n@end\n```\n\n在代码清单 2-5 中，我们看到我们引用了五个 `IBOutlet`\
    \ 引用。这些引用将使我们能够在运行时以编程方式访问这些条目。当 Interface Builder 创建这些引用时，它还在 `ViewController`\
    \ 的实现中创建了一些清理代码。代码清单 2-6 展示了这些自动生成的代码。\n\n**代码清单 2-6.** `ViewController.m`（部分）\n\
    \n```\n- (void)viewDidUnload {\n    [landscapeView release];\n    landscapeView\
    \ = nil;\n    [landscapeHolderView release];\n    landscapeHolderView = nil;\n\
    \    [portraitView release];\n    portraitView = nil;\n    [portraitHolderView\
    \ release];\n    portraitHolderView = nil;\n    [rockPaperScissorsController release];\n\
    \    rockPaperScissorsController = nil;\n    [super viewDidUnload];\n    // 释放主视图的所有保留子视图。\n\
    \    // 例如 self.myOutlet = nil;\n}\n//...\n- (void)dealloc {\n    [landscapeView\
    \ release];\n    [landscapeHolderView release];\n    [portraitView release];\n\
    \    [portraitHolderView release];\n    [rockPaperScissorsController release];\n\
    \    [super dealloc];\n}\n```\n\n在代码清单 2-6 中，我们看到 Interface Builder 为每个创建的 `IBOutlet`\
    \ 生成的代码。在任务 `viewDidUnload` 中，我们看到每个视图都被释放并设置为 `nil`。同样，在任务 `dealloc` 中，我们看到每个视图都被释放。在下一节中，我们将回顾如何响应方向变化；同样的代码将负责将在我们一直使用的不同视图显示到屏幕上。\n\
    \n## 响应方向变化\n\n我们要做的最后一件事是添加一些逻辑，根据设备的方向切换显示的 `UIView`。类 `UIViewController` 指定了一个在设备旋转后被调用的任务。这个任务名为\
    \ `didRotateFromInterfaceOrientation:`，它会收到一个常量，指示设备之前的方向。通过向此任务添加逻辑，我们可以更新 UI\
    \ 以反映新方向。新的方向可以通过使用 `UIDevice` 类来获取。代码清单 2-7 展示了实现我们所需行为的代码。\n\n**代码清单 2-7.**\
    \ `GameController.m` (`shouldAutorotateToInterfaceOrientation:`)\n\n```\n-(void)didRotateFromInterfaceOrientation:(UIInterfaceOrientation)fromInterfaceOrientation{\n\
    \    UIDevice* device = [UIDevice currentDevice];\n    [self setOrientation: [device\
    \ orientation]];\n}\n-(void)setOrientation:(UIInterfaceOrientation)interfaceOrientation{\n\
    \    if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft || interfaceOrientation\
    \ == UIInterfaceOrientationLandscapeRight){\n        [portraitView removeFromSuperview];\n\
    \        [self.view addSubview:landscapeView];\n        \n        [rockPaperScissorsController\
    \ setup:landscapeHolderView.frame.size];\n        [landscapeHolderView addSubview:rockPaperScissorsController.view];\n\
    \        \n    } else {\n        [landscapeView removeFromSuperview];\n      \
    \  [self.view addSubview:portraitView];\n        \n        [rockPaperScissorsController\
    \ setup:portraitHolderView.frame.size];\n        [portraitHolderView addSubview:rockPaperScissorsController.view];\n\
    \    }\n}\n```\n\n在代码清单 2-7 中，我们看到此任务传递了变量 `fromInterfaceOrientation`，它指示设备之前的方向。在我们的应用中，我们并不关心之前的方向，因此我们通过从\
    \ `UIDevice` 类获取当前设备，然后读取属性 `orientation` 来找到当前的（旋转后的）方向。一旦获得方向，我们就调用 `setOrientation:`，该方法也在代码清单\
    \ 2-7 中定义。\n\n任务 `setOrientation:` 将更新 UI 以使用传入的任何一个方向。如果设备现在处于横向方向，我们将 `portraitView`\
    \ 从其父视图中移除，这意味着将其从屏幕上移除。然后我们将视图 `landscapeView` 添加到最根部的视图中。我们对 `rockPaperScissorsController`\
    \ 调用 `setup`，以便让它有机会布置其子视图（如果它尚未这样做）。最后，我们将 `rockPaperScissorsController` 的视图属性作为子视图添加到\
    \ `landscapeHolder` 中。\n\n我们希望将布局逻辑放在单独任务中的原因是，我们希望当视图控制器首次加载时也调用此任务，这样当游戏启动时\
    \ UI 就能正确设置。这允许我们将所有方向逻辑放在一个地方。\n\n第一次时，这些对象的状态会不同。例如，第一次调用此任务时， `portraitView`\
    \ 和 `landscapeView` 都尚未附加到场景中，因此对 `removeFromSubview` 的调用将是一个空操作，不会出错。当在后续的旋转中调用此任务时，`rockPaperScissorsController`\
    \ 的视图将附加到场景中；然而，当一个视图被添加为子视图时，如果它有父视图，它会自动从其父视图中移除。\n\n`removeFromSuperview` 和\
    \ `addSubview:` 具有这些合理的默认行为这一事实，使得在操作视图时变得相当容易。它减少容易出错的清理代码。代码清单 2-8 展示了我们在应用首次启动时如何调用\
    \ `setOrientation:`。\n\n**代码清单 2-8.** `ViewController.`（不完整）\n"
- fmt: "`- (void)viewDidLoad {  \n    [super viewDidLoad];  \n    UIDevice* device\
    \ = [UIDevice currentDevice];  \n    [self setOrientation: [device orientation]];\
    \  \n}`\n\n在[清单 2-8](#9781430244226_Ch02.xhtml#list8) 中，`viewDidLoad` 任务在 `ViewController`\
    \ 完成初始化并显示在屏幕上时被调用。此处，我们简单地获取当前设备的朝向，并将该值传递给`setOrientation:`，确保应用程序启动时界面方向正确。\n\
    \n如果运行该项目，您会看到应用同时在 iPad 和 iPhone 上运行，并会根据朝向改变布局。\n\n## 总结\n\n在本章中，我们探讨了如何创建适用于开发通用应用的\
    \ Xcode 项目。我们研究了 iOS 应用的初始化过程，并了解了从何处开始修改项目以创建所需应用。我们了解了 XIB 文件与类如何交互，以及 iOS 如何通过`UIViewController`类利用\
    \ MVC 模式。我们创建了一个应用，使其在 iPhone 或 iPad 上以所有方向无缝运行，为游戏开发奠定了基础。\n\n# 第3章 探索游戏应用生命周期\n\
    \n游戏不仅仅包含有趣的部分。市场上几乎所有游戏，尤其是大型作品，都涉及多个视图和相当复杂的生命周期。本章将探讨如何将一个简单的游戏转变为一个完整的应用。我们将研究典型游戏如何组织构成其的各个视图，包括加载视图、欢迎视图、高分视图以及游戏本身。\n\
    \n除了用户导航，应用也有其生命周期。在 iOS 上，该生命周期包括响应应用被终止、从后台恢复或首次启动。当应用在其生命周期中移动时，它需要保存用户数据的元素，如高分和游戏状态。关注这些细节将使您的游戏看起来精致而非业余和恼人。\n\
    \n虽然这里展示的游戏并不令人兴奋，且图像也承认是业余水平，但您可以采用此处展示的基本框架，并将自己的游戏融入其中。不过，建议您更新自己的图像！\n\n##\
    \ 理解游戏中的视图\n\n本章介绍的游戏名为 Coin Sorter。这是一个简单的益智游戏，玩家将硬币按行和列排序。玩家有十次机会尽可能多地匹配行或列。这个游戏的有趣部分几乎就是\
    \ iOS 游戏能有的最简单形式。游戏的可玩部分仅由两个类组成：`CoinsController`和`CoinsGame`。正如这两个类的名称所示，`CoinsController`负责将游戏渲染到屏幕并解释玩家操作。`CoinsGame`负责存储游戏状态并提供一些操作该状态的实用方法。这两个类如何工作的细节将在第\
    \ 4 章中全面探讨。在本章中，我们将研究支持这两个类以创建完整应用的所有周边代码。\n\n大多数游戏包含多个视图——不仅仅是游戏主要动作发生的视图。这些视图通常包括欢迎视图、高分视图，可能还有一些其他视图。本章附带的示例代码旨在概述如何管理这些支持视图。[图\
    \ 3-1](#9781430244226_Ch03.xhtml#Fig1) 是此游戏中视图的流程图。\n\n![9781430244226_Fig03-01.jpg](images/9781430244226_Fig03-01.jpg)\n\
    \n[图 3-1.](#9781430244226_Ch03.xhtml#_Fig1) CoinSorter 应用流程\n\n在[图 3-1](#9781430244226_Ch03.xhtml#Fig1)\
    \ 中，每个矩形都是游戏中的一个视图。箭头指示这些视图之间的转换。\n\n从左侧开始，有一个标题为“启动图像”的框。此视图与其他视图不同，它只是一个 PNG\
    \ 文件，在应用控制权传递给应用委托之前显示。配置此图像的详细信息见附录 A。当应用完全加载后，我们会显示加载视图。此视图会在屏幕上停留几秒钟，同时应用预加载一些图像。图像加载完成后，我们会向用户显示欢迎视图。\n\
    \n[图 3-1](#9781430244226_Ch03.xhtml#Fig1) 中的欢迎视图为玩家提供了多个选项。他们可以继续旧游戏、开始新游戏、查看高分或查看游戏信息。如果用户玩游戏，他们会被引导至游戏视图，这是应用主要动作发生的地方。游戏结束后，用户会看到高分视图。当他们查看完高分后，会被送回欢迎视图，以便再次从可用选项中选择。\n\
    \n[图 3-1](#9781430244226_Ch03.xhtml#Fig1) 中展示的应用流程绝非唯一选择，但它展示了一种常见模式。一旦您理解每个视图的作用以及应用状态如何管理，扩展或修改此示例应该非常简单。\n\
    \n> **注意** 虽然使用 Xcode 的 Storyboard 功能来布置此类工作流可能很吸引人，但支持多种方向和多种设备使得 Storyboard\
    \ 不实用。理想情况下，Storyboard 将在未来版本的 Xcode 中改进，并成为管理应用生命周期的唯一工具。\n\n## 探索每个视图扮演的角色\n\
    \n应用中的每个视图都有不同的用途。通过理解每个视图的作用，您将理解此示例为何如此组织。让我们先看[图 3-2](#9781430244226_Ch03.xhtml#Fig2)，它展示了启动图像和加载视图。\n\
    \n![9781430244226_Fig03-02.jpg](images/9781430244226_Fig03-02.jpg)\n\n[图 3-2.](#9781430244226_Ch03.xhtml#_Fig2)\
    \ 启动图像和加载视图\n\n在[图 3-2](#9781430244226_Ch03.xhtml#Fig2) 中，我们看到左侧的启动图像，它在初始化过程控制权传递给应用委托时出现。我们在[图\
    \ 3-2](#9781430244226_Ch03.xhtml#Fig2) 的右侧看到加载视图。在此例中，加载视图有一个`UIImageView`，其图像与启动图像相同。这不是必须的，但这是为用户提供无缝视觉体验的好方法。在更复杂的应用中，您可能希望在加载图像时显示进度条。对于如此简单的应用，您实际上并不需要加载屏幕，因为使用的图像数量和大小都很小。在我们的案例中，我们简单地在加载视图中添加了一个带有文本“加载中...”的`UILabel`。一旦应用的初始资源加载完成，就会显示欢迎视图，如[图\
    \ 3-3](#9781430244226_Ch03.xhtml#Fig3) 所示。\n\n![9781430244226_Fig03-03.jpg](images/9781430244226_Fig03-03.jpg)\n\
    \n[图 3-3.](#9781430244226_Ch03.xhtml#_Fig3) 显示“继续游戏”按钮的欢迎视图\n\n[图 3-3](#9781430244226_Ch03.xhtml#Fig3)\
