    that the compiler may inject a compiled version into the calling code.    Using
    Core Graphics Types    The types and functions defined by Core Graphics are pretty
    straightforward. Let’s look at an example to illustrate their use. [Listing 4-3](#9781430244226_Ch04.xhtml#list3)
    shows one `UIView` being added to another at a specific region.    [**Listing
    4-3.**](#9781430244226_Ch04.xhtml#_list3)  `Example of Adding a Subview and Specifying
    the Frame`    ``` UIView* parentView = [[UIView alloc] initWithFrame:CGRectMake(0,
    0, 480, 320)]; UIView* subView = [UIView new];  CGRect frame = CGRectMake(200,
    100, 30, 40); [subView setFrame:frame];  [parentView addSubview:subView]; ```    In
    [Listing 4-3](#9781430244226_Ch04.xhtml#list3), we create two `UIView`s in two
    different ways. The `UIView parentView` is created in the more standard of the
    two ways, by calling `alloc` and then calling `initWithFrame:` and passing in
    a new `CGRect` to specify its location and size. Another perfectly valid way to
    create a `UIView` is by simply calling new and then setting the `frame` property,
    as we do for `subView`. The last thing done in this code snippet is to add `subView`
    to `parentView` by calling `addSubview:`. The result would be something like [Figure
    4-3](#9781430244226_Ch04.xhtml#Fig3) shown earlier.    Now that you understand
    the basics of the `UIView` subclasses and how they are nested and placed, you
    can take a look at a few basic animations. This will give you the understanding
    required to explore our simple game.    Understanding Animations    There are
    two key components to creating an event-driven game. The first is creating animations,
    and the second is managing the game state. There are several ways to create animations
    in an iOS application.'
  trans: "\n我们曾使用 Interface Builder 创建 UI 元素，并且大多数情况下只是通过将一个视图替换为另一个视图来引导用户在不同视图间切换。在本章中，我们将深入探究\
    \ `UIView`，以及如何利用它以编程方式创建动态内容。这包括探索如何在屏幕上放置组件以及为它们添加动画效果。\n\n## 理解 `UIView`\n\n\
    `UIView` 类是 UIKit 的基础组件类。其他所有 UI 元素，如按钮、开关和滚动视图等，都是 `UIView` 的子类。甚至 `UIWindow`\
    \ 类本身也是 `UIView` 的子类，因此当我们在屏幕上操作内容时，大部分工作实际上都是在与 `UIView` 类进行交互。\n\n`UIView` 类的工作方式与其他编程环境中的基础\
    \ UI 组件类非常相似。每个 `UIView` 都定义了屏幕上的一个区域，并拥有若干子视图（subviews），这些子视图是相对于其父视图进行绘制的。图\
    \ 4-2 展示了 `UIView` 实例的示例布局。\n\n![9781430244226_Fig04-02.jpg](img/9781430244226_Fig04-02.jpg)\n\
    \n图 4-2. 嵌套的 `UIView` 实例\n\n在图 4-2 中，你可以在背景中看到示例应用的根 `UIWindow`。当用户看到游戏视图时，`UIWindow`\
    \ 有一个子视图，即与 `GameController` 类关联的 `view` 属性。当用户点击“新游戏”按钮时，`GameController` 会将纵向游戏视图（Portrait\
    \ Play view）作为其视图的子视图添加。纵向游戏视图有五个子视图，这些子视图在 XIB 文件中定义。其中四个子视图是用于显示和追踪用户得分及剩余回合数的\
    \ `UILabel`。第五个 `UIView` 是纵向游戏容器视图（Portrait Game Holder view），它负责定义来自 `CoinsController`\
    \ 的视图所放置的区域。来自 `CoinsController` 的视图有多个子视图，它们构成了游戏的交互部分。稍后你将更详细地了解这些视图，但现在只需明白，这些视图的添加方式与其他视图完全相同。\n\
    \n关于图 4-2，另一点需要注意的是，并非所有视图都放置在相对于其父视图的相同位置上。例如，纵向游戏视图位于 `GameController` 视图的左上角，而纵向游戏容器视图则大致放置在其父视图（纵向游戏视图）的中间偏下位置。子视图的\
    \ `frame` 属性决定了它相对于父视图的位置。图 4-3 更详细地展示了这一点。\n\n![9781430244226_Fig04-03.jpg](img/9781430244226_Fig04-03.jpg)\n\
    \n图 4-3. `UIView` 的 frame\n\n如图 4-3 所示，`UIView` 的 frame 不仅描述了子视图的位置，还描述了视图的大小。通常来说，`frame`\
    \ 用于描述子视图的区域。`frame` 属性是一个 `CGRect` 类型的结构体，由另外两个结构体 `origin` 和 `size` 组成。`origin`\
    \ 字段是 `CGPoint` 类型，以点（points）为单位描述了子视图左上角的位置。`size` 字段是 `CGSize` 类型，描述了子视图的宽度和高度（以点为单位）。\n\
    \n### 核心图形类型定义\n\nCore Graphics 定义了许多类型、结构体和函数。其中包括前面提到的 `CGRect`、`CGPoint` 和\
    \ `CGSize`。代码清单 4-1 展示了这三个结构体的定义。\n\n**代码清单 4-1.** `CGGeometry.h (CGRect、CGPoint\
    \ 和 CGSize)`\n\n```\n/* 点。 */\nstruct CGPoint {\n  CGFloat x;\n  CGFloat y;\n\
    };\ntypedef struct CGPoint CGPoint;\n\n/* 尺寸。\n\n*/\nstruct CGSize {\n  CGFloat\
    \ width;\n  CGFloat height;\n};\ntypedef struct CGSize CGSize;\n\n/* 矩形 */\n{\n\
    \  CGPoint origin;\n  CGSize size;\n};\ntypedef struct CGRect CGRect;\n```\n\n\
    代码清单 4-1 列出了定义子视图相对于其父视图区域的核心结构体。这些结构体定义于 `CGGeometry.h` 文件中，该文件属于 Core Graphics\
    \ 框架，是任何 iOS 项目的标准组成部分。注意，`x`、`y`、`width` 和 `height` 值的类型被定义为 `CGFloat`。这些值的单位是点（points），而非像素（pixels）。这种差异起初可能不易察觉，但其含义在于，你通过这些值指定的坐标和大小是与分辨率无关的。关于点与像素的进一步讨论，请参见附录\
    \ A。\n\n**提示：** 在诸如 `CGRect` 这样的结构体名称中，字母 CG 指的是 Core Graphics 框架。因此，当需要精确表达时，`CGRect`\
    \ 被称为 Core Graphics 矩形。\n\n要创建代码清单 4-1 中的任何基本几何类型，可以在 `CGGeometry.h` 中使用内联实用函数，如代码清单\
    \ 4-2 所示。\n\n**代码清单 4-2.** `CGGeometry.h (CGPointMake、CGSizeMake 和 CGRectMake)`\n\
    \n```\n/*** 内联函数定义。 ***/\n\nCG_INLINE CGPoint CGPointMake(CGFloat x, CGFloat y)\
    \ {\n  CGPoint p; p.x = x; p.y = y; return p;\n}\nCG_INLINE CGSize CGSizeMake(CGFloat\
    \ width, CGFloat height) {\n  CGSize size; size.width = width; size.height = height;\
    \ return size;\n}\nCG_INLINE CGRect CGRectMake(CGFloat x, CGFloat y, CGFloat width,\
    \ CGFloat height) {\n    CGRect rect;\n    rect.origin.x = x; rect.origin.y =\
    \ y;\n    rect.size.width = width; rect.size.height = height;\n    return rect;\n\
    }\n```\n\n代码清单 4-2 展示了可用于创建新几何值的实用函数。这里只展示了定义，因为这些函数的声明很简单。`CGFloat` 类型被简单地定义为\
    \ `float`。推测这样做是为了将来可能更改以支持不同的架构。另外，`CG_INLINE` 只是被定义为 `static inline`，表示编译器可能会将编译后的版本内联到调用代码中。\n\
    \n### 使用 Core Graphics 类型\n\nCore Graphics 定义的类型和函数非常直观。让我们看一个例子来说明它们的用法。代码清单\
    \ 4-3 展示了将一个 `UIView` 添加到另一个 `UIView` 的特定区域。\n\n**代码清单 4-3.** `添加子视图并指定 frame\
    \ 的示例`\n\n```\nUIView* parentView = [[UIView alloc] initWithFrame:CGRectMake(0,\
    \ 0, 480, 320)];\nUIView* subView = [UIView new];\n\nCGRect frame = CGRectMake(200,\
    \ 100, 30, 40);\n[subView setFrame:frame];\n\n[parentView addSubview:subView];\n\
    ```\n\n在代码清单 4-3 中，我们以两种不同的方式创建了两个 `UIView`。`UIView parentView` 是通过更标准的方式创建的：调用\
    \ `alloc`，然后调用 `initWithFrame:` 并传入一个新的 `CGRect` 来指定其位置和尺寸。另一种完全有效的创建 `UIView`\
    \ 的方式是直接调用 `new`，然后设置 `frame` 属性，正如我们对 `subView` 所做的。这段代码片段的最后一步是通过调用 `addSubview:`\
    \ 将 `subView` 添加到 `parentView`。结果将类似于前面展示的图 4-3。\n\n既然你已经了解了 `UIView` 子类的基本概念，以及它们如何嵌套和放置，现在可以看看一些基本的动画效果。这将为你理解我们简单游戏所需的知识打下基础。\n\
    \n## 理解动画\n\n创建一个事件驱动的游戏有两个关键组成部分：第一是创建动画，第二是管理游戏状态。在 iOS 应用中有多种创建动画的方式。\n"
- fmt: "在前一章中，我们实现了视图之间的过渡动画。在本节中，我们将回顾这些动画的实现方式，并展示一个类似的示例以加深你的理解。在本章末尾，你将了解第三种技术，该技术探讨了前两个示例所使用的支持类。\n\
    \n## UIView 的静态动画任务\n\n类`UIView`提供了静态任务，旨在简化基本动画的创建。这些任务同样可用于触发预设动画，例如切换视图时的过渡效果。[图\
    \ 4-4](#9781430244226_Ch04.xhtml#Fig4) 展示了用户从高分视图切换到欢迎视图时发生的预设动画。\n\n![9781430244226_Fig04-04.jpg](images/9781430244226_Fig04-04.jpg)\n\
    \n[图 4-4.](#9781430244226_Ch04.xhtml#_Fig4) 翻转动画\n\n从[图 4-4](#9781430244226_Ch04.xhtml#Fig4)\
    \ 的左上角开始，高分视图从左向右翻转，直到变成一条细线。动画继续，以平滑且视觉上吸引人的过渡方式显示欢迎视图。这只是 iOS 众多内置动画之一。用户已学会这种标准过渡表示上下文的变化。要理解此动画如何触发，让我们先查看[第\
    \ 3 章](#9781430244226_Ch03.xhtml)中用于从高分视图切换到欢迎视图的步骤。这些步骤如[代码清单 4-4](#9781430244226_Ch04.xhtml#list4)\
    \ 所示。\n\n[**代码清单 4-4.**](#9781430244226_Ch04.xhtml#_list4) `GameController.m (highscoreDoneClicked:)`\n\
    \n```objc\n- (IBAction)highscoreDoneClicked:(id)sender {\n    [UIView beginAnimations:@\"\
    AnimationId\" context:@\"flipTransitionToBack\"];\n    [UIView setAnimationDuration:1.0];\n\
    \    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromLeft forView:self.view\
    \ cache:YES];\n    [highscoreController.view removeFromSuperview];\n    [self.view\
    \ addSubview: welcomeView];\n    [UIView commitAnimations];\n}\n```\n\n[代码清单 4-4](#9781430244226_Ch04.xhtml#list4)\
    \ 显示了用户在“完成”按钮上触摸时调用的任务。该任务的第一行调用了静态任务`beginAnimations:context:`。这个任务有点像启动数据库事务，因为它创建了一个动画对象，并且在调用`commitAnimations`之前对`UIView`实例所做的任何更改都将成为此动画的一部分。传递给`beginAnimations:context:`的第一个`NSString`是支持动画对象的标识符。第二个`NSString`与之类似，用于提供有关动画创建时间的额外上下文。在此示例中，这两个字符串可以为`nil`，因为定义动画后我们并不真正关心它。在下一个示例中，我们将利用这些字符串来定义动画完成时要运行的代码。\n\
    \n调用`beginAnimations:context:`之后，通过调用`setAnimationDuration:`来定义动画的持续时间。传入的值是动画应运行的秒数。调用`setAnimationTransition:forView:cache:`表示我们希望使用\
    \ iOS 提供的某种预设动画。我们选择的动画是`UIViewAnimationFlipFromLeftForView`。由于这是一个过渡动画，我们指定视图`self.view`，即内容正在变化的父视图。\n\
    \n设置动画后，下一步（如[代码清单 4-4](#9781430244226_Ch04.xhtml#list4) 所示）是对场景进行我们想要动画化的更改。由于此任务负责将显示的视图从高分视图切换到欢迎视图，我们只需从父视图（`self.view`）中移除视图`highscoreController.view`，并将`welcomeView`添加到`self.view`。最后，我们提交动画，使其显示给用户。\n\
    \n我们可以使用`UIView`的这些静态任务来创建其他动画，而不仅仅是 iOS 提供的那些。让我们更新从欢迎屏幕到高分屏幕的过渡，使其像[图 4-5](#9781430244226_Ch04.xhtml#Fig5)\
    \ 所示那样淡入淡出。\n\n![9781430244226_Fig04-05.jpg](images/9781430244226_Fig04-05.jpg)\n\
    \n[图 4-5.](#9781430244226_Ch04.xhtml#_Fig5) 淡入淡出过渡动画\n\n在此淡入淡出过渡中，欢迎视图被高分视图替换。这是通过在一段时间内改变每个视图的不透明度来实现的。在此动画期间，两个视图都是场景的一部分。结束时，我们想要移除欢迎视图，以与游戏中管理视图的方式保持一致。创建此过渡的代码如[代码清单\
    \ 4-5](#9781430244226_Ch04.xhtml#list5) 所示。\n\n[**代码清单 4-5.**](#9781430244226_Ch04.xhtml#_list5)\
    \ `GameController.m (highScoresClicked:)`\n\n```objc\n- (IBAction)highScoresClicked:(id)sender\
    \ {\n    //Make high score view 100% clear and add it on top of the welcome view.\n\
    \    [highscoreController.view setAlpha:0.0];\n    [self.view addSubview:highscoreController.view];\n\
    \    //set up animation\n    [UIView beginAnimations:nil context:@\"fadeInHighScoreView\"\
    ];\n    [UIView setAnimationDuration:1.0];\n    [UIView setAnimationDelegate:self];\n\
    \    [UIView setAnimationDidStopSelector:@selector(animationDidStop:finished:context:)];\n\
    \    //make changes\n    [welcomeView setAlpha:0.0];\n    [highscoreController.view\
    \ setAlpha:1.0];\n    [UIView commitAnimations];\n}\n```\n\n[代码清单 4-5](#9781430244226_Ch04.xhtml#list5)\
    \ 中所示的任务在用户点击主视图中的“Highscores”按钮时调用。为了创建淡入淡出效果，我们利用了`UIView`类的静态动画任务，但首先需要设置一些东西。我们首先将与`highscoreController`关联的视图的`alpha`属性设置为`0.0`，即完全透明。然后，我们将高分视图添加到根视图。这将其放置到已存在的`welcomeView`之上，但由于它是透明的，我们只能看到欢迎屏幕。\n\
    \n通过调用任务`beginAnimations:context:`来设置动画，持续时间通过任务`setAnimationDuration:`设置。下一步是为正在创建的动画设置一个委托。我们还想通过调用`setAnimationDidStopSelector:`来设置动画完成时应调用的任务。动画设置完成后，我们只需将`welcomeView`的`alpha`属性设置为`0.0`，并将高分视图的`alpha`设置为`1.0`。这表明在动画结束时，我们希望欢迎视图透明，高分视图完全不透明。然后，我们通过调用`commitAnimations`指示已设置完成状态。\n\
    \n我们将`self`设置为动画的委托，并设置任务`animationDidStop:finished:context:`在动画结束时被调用。这样做的目的是在动画结束时进行一些清理工作，并确保应用程序处于正确状态。[代码清单\
    \ 4-6](#9781430244226_Ch04.xhtml#list6) 展示了此回调方法的实现。\n\n[**代码清单 4-6.**](#9781430244226_Ch04.xhtml#_list6)\
    \ `GameController.m (animationDidStop:finished:context:)`\n\n```objc\n- (void)animationDidStop:(NSString\
    \ *)animationID finished:(NSNumber *)finished context:(void *)context{\n    if\
    \ ([@\"fadeInHighScoreView\" isEqual:context]){\n        [welcomeView removeFromSuperview];\n\
    \        [welcomeView setAlpha:1.0];\n    }\n}\n```\n\n[代码清单 4-6](#9781430244226_Ch04.xhtml#list6)\
    \ 中的任务在淡入淡出动画结束时被调用。在此任务中，我们想要从场景中移除`welcomeView`，并将其`alpha`重置为`1.0`。我们将其移除，因为这是其他过渡的预期状态。将`alpha`重置回`1.0`确保`welcomeView`在重新添加回场景时是可见的。"
  raw: 'In the preceding chapter, we implemented animations to transition from view
    to view. In this section, we will review how that was done and show a similar
    example to flesh out your understanding. At the end of this chapter, you will
    take a look at yet a third technique that explores the backing classes used by
    the first two examples.    The Static Animation Tasks of UIView    The class `UIView`
    has static tasks designed to simplify the creation of basic animations. These
    same tasks can be used to trigger canned animations, such as the transitions used
    to switch from one view to another. [Figure 4-4](#9781430244226_Ch04.xhtml#Fig4)
    shows the canned animation that occurs when the user switches from the High Score
    view to the Welcome view.    ![9781430244226_Fig04-04.jpg](images/9781430244226_Fig04-04.jpg)    [Figure
    4-4.](#9781430244226_Ch04.xhtml#_Fig4)  Flip animation    Starting at the upper
    left of [Figure 4-4](#9781430244226_Ch04.xhtml#Fig4), the High Score view flips
    from left to right until it becomes just a sliver. The animation continues, revealing
    the Welcome view in a smooth, visually appealing transition. This is just one
    of the many built-in animations in iOS. Users have learned that this standard
    transition indicates a change in context. To understand how this animation was
    triggered, let’s start by looking at the steps preformed in [Chapter 3](#9781430244226_Ch03.xhtml)
    to switch from the High Score view to the Welcome view. These steps are shown
    in [Listing 4-4](#9781430244226_Ch04.xhtml#list4).    [**Listing 4-4.**](#9781430244226_Ch04.xhtml#_list4)  `GameController.m
    (highscoreDoneClicked:)`    ``` - (IBAction)highscoreDoneClicked:(id)sender {
        [UIView beginAnimations:@"AnimationId" context:@"flipTransitionToBack"];     [UIView
    setAnimationDuration:1.0];     [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromLeft
    forView:self.view cache:YES];      [highscoreController.view removeFromSuperview];
        [self.view addSubview: welcomeView];      [UIView commitAnimations]; } ```    [Listing
    4-4](#9781430244226_Ch04.xhtml#list4) shows the task called when the user touches
    the Done button in the High Score view. The first line of this task calls the
    static task `beginAnimations:context:`. This task is sort of like starting a database
    transaction, in that it is creating an animation object, and any change that occurs
    to `UIView instances` before `commitAnimations` is called is part of this animation.
    The first `NSString` passed to `beginAnimations:context:` is an identifier for
    the backing animation object. The second `NSString` is similar to the first in
    that it is used to give additional context about when the animation was created.
    These two strings could be `nil` in this example, because we don’t really care
    much about this animation after we define it. In the next example, we will take
    advantage of these strings to define code to be run when the animation is done.    After
    the call to `beginAnimations:context:`, the duration of the animation is defined
    by calling `setAnimationDuration:`. The value passed in is the number of seconds
    the animation should run. The call to `setAnimationTransition:forView:cache:`
    indicates that we want to use one of the canned animations that comes with iOS.
    The animation we have selected is `UIViewAnimationFlipFromLeftForView`. Because
    this is a transition animation, we specify the view `self.view`, which is the
    super view whose content is changing.    After the animation is set up, the next
    thing we do (as shown in [Listing 4-4](#9781430244226_Ch04.xhtml#list4)) is make
    the changes to our scene that we want animated. Because this task is responsible
    for switching the displayed view from the High Score view to the Welcome view,
    we simply remove the view `highscoreController.view` from its super view (`self.vew`)
    and add the welcomeView to `self.view`. Finally, we commit the animation, causing
    it to be displayed to the user.


    We can use these static tasks of `UIView` to create other animations, not just
    the ones provided by iOS. Let’s update the transition from the Welcome screen
    to the High Score screen so one fades into the other, as seen in [Figure 4-5](#9781430244226_Ch04.xhtml#Fig5).    ![9781430244226_Fig04-05.jpg](images/9781430244226_Fig04-05.jpg)    [Figure
    4-5.](#9781430244226_Ch04.xhtml#_Fig5)  Fade transition animation    In this fade
    transition, the Welcome view is replaced with the High Score view. This is accomplished
    by changing the opacity of each view over a period of time. During this animation,
    both views are part of the scene. At the end, we want to remove the Welcome view,
    to stay consistent with how we are managing views in the game. The code that creates
    this transition is shown in [Listing 4-5](#9781430244226_Ch04.xhtml#list5).    [**Listing
    4-5.**](#9781430244226_Ch04.xhtml#_list5)  `GameController.m (highScoresClicked:)`    ```
    - (IBAction)highScoresClicked:(id)sender {      //Make high score view 100% clear
    and add it on top of the welcome view.     [highscoreController.view setAlpha:0.0];
        [self.view addSubview:highscoreController.view];      //set up animation     [UIView
    beginAnimations:nil context:@"fadeInHighScoreView"];     [UIView setAnimationDuration:1.0];
        [UIView setAnimationDelegate:self];     [UIView setAnimationDidStopSelector:@selector(animationDidStop:finished:context:)];
        //make changes     [welcomeView setAlpha:0.0];     [highscoreController.view
    setAlpha:1.0];      [UIView commitAnimations]; } ```    The task shown in [Listing
    4-5](#9781430244226_Ch04.xhtml#list5) is called when the user touches the Highscores
    button in the Home view. To create the fade effect, we utilize the static animation
    task from the class `UIView`, but first we have to set up a few things. We start
    by setting the `alpha` property of the view associated with the `highscoreController`
    to 0.0, or completely translucent. We then add the High Score view to the root
    view. This places it onto the already present `welcomeView`, but because it is
    clear, we see only the Welcome screen.    The animation is set up by calling the
    task `beginAnimations:context:`, and  the duration is set with the task `setAnimationDuration:`.
    The next step is to set a delegate for the animation that is being created. We
    also want to set which task should be called when the animation is complete by
    calling `setAnimationDidStopSelector:`. After the animation is set up, we simply
    set the `alpha` property of welcomeView to 0.0 and set the High Score view’s `alpha`
    to 1.0\. This indicates that at the end of the animation, we want the Welcome
    view to be transparent and the High Score view to be fully opaque. We then indicate
    that we have set our finished state by calling `commitAnimations`.    We set self
    to be the delegate for the animation and set up the task `animationDidStop:finished:context:`
    to be called when we want the animation to be over. We did this so we could do
    a little cleanup at the end of the animation and ensure that our application is
    in the correct state. [Listing 4-6](#9781430244226_Ch04.xhtml#list6) shows the
    implementation of this callback method.    [**Listing 4-6.**](#9781430244226_Ch04.xhtml#_list6)  `GameController.m
    (animationDidStop:finished:context:)`    ``` - (void)animationDidStop:(NSString
    *)animationID finished:(NSNumber *)finished context:(void *)context{     if ([@"fadeInHighScoreView"
    isEqual:context]){         [welcomeView removeFromSuperview];         [welcomeView
    setAlpha:1.0];     } } ```    The task in [Listing 4-6](#9781430244226_Ch04.xhtml#list6)
    is called at the end of the fade animation. In this task, we want to remove `welcomeView`
    from the scene and reset its `alpha` to 1.0\. We remove it, because that is the
    expected state for the other transitions. Setting the `alpha` back to 1.0 ensures
    that `welcomeView` is visible when it is added back into the scene.'
  trans: "\n在前一章中，我们实现了视图之间的过渡动画。在本节中，我们将回顾这些动画的实现方式，并展示一个类似的示例以加深你的理解。在本章末尾，你将了解第三种技术，该技术探讨了前两个示例所使用的支持类。\n\
    \n## UIView 的静态动画任务\n\n类`UIView`提供了静态任务，旨在简化基本动画的创建。这些任务同样可用于触发预设动画，例如切换视图时的过渡效果。图\
    \ 4-4 展示了用户从高分视图切换到欢迎视图时发生的预设动画。\n\n![9781430244226_Fig04-04.jpg](img/9781430244226_Fig04-04.jpg)\n\
    \n图 4-4. 翻转动画\n\n从图 4-4 的左上角开始，高分视图从左向右翻转，直到变成一条细线。动画继续，以平滑且视觉上吸引人的过渡方式显示欢迎视图。这只是\
    \ iOS 众多内置动画之一。用户已学会这种标准过渡表示上下文的变化。要理解此动画如何触发，让我们先查看第 3 章中用于从高分视图切换到欢迎视图的步骤。这些步骤如代码清单\
    \ 4-4 所示。\n\n**代码清单 4-4.** `GameController.m (highscoreDoneClicked:)`\n\n```objc\n\
    - (IBAction)highscoreDoneClicked:(id)sender {\n    [UIView beginAnimations:@\"\
    AnimationId\" context:@\"flipTransitionToBack\"];\n    [UIView setAnimationDuration:1.0];\n\
    \    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromLeft forView:self.view\
    \ cache:YES];\n    [highscoreController.view removeFromSuperview];\n    [self.view\
    \ addSubview: welcomeView];\n    [UIView commitAnimations];\n}\n```\n\n代码清单 4-4\
    \ 显示了用户在“完成”按钮上触摸时调用的任务。该任务的第一行调用了静态任务`beginAnimations:context:`。这个任务有点像启动数据库事务，因为它创建了一个动画对象，并且在调用`commitAnimations`之前对`UIView`实例所做的任何更改都将成为此动画的一部分。传递给`beginAnimations:context:`的第一个`NSString`是支持动画对象的标识符。第二个`NSString`与之类似，用于提供有关动画创建时间的额外上下文。在此示例中，这两个字符串可以为`nil`，因为定义动画后我们并不真正关心它。在下一个示例中，我们将利用这些字符串来定义动画完成时要运行的代码。\n\
    \n调用`beginAnimations:context:`之后，通过调用`setAnimationDuration:`来定义动画的持续时间。传入的值是动画应运行的秒数。调用`setAnimationTransition:forView:cache:`表示我们希望使用\
    \ iOS 提供的某种预设动画。我们选择的动画是`UIViewAnimationFlipFromLeftForView`。由于这是一个过渡动画，我们指定视图`self.view`，即内容正在变化的父视图。\n\
    \n设置动画后，下一步（如代码清单 4-4 所示）是对场景进行我们想要动画化的更改。由于此任务负责将显示的视图从高分视图切换到欢迎视图，我们只需从父视图（`self.view`）中移除视图`highscoreController.view`，并将`welcomeView`添加到`self.view`。最后，我们提交动画，使其显示给用户。\n\
    \n我们可以使用`UIView`的这些静态任务来创建其他动画，而不仅仅是 iOS 提供的那些。让我们更新从欢迎屏幕到高分屏幕的过渡，使其像图 4-5 所示那样淡入淡出。\n\
    \n![9781430244226_Fig04-05.jpg](img/9781430244226_Fig04-05.jpg)\n\n图 4-5. 淡入淡出过渡动画\n\
    \n在此淡入淡出过渡中，欢迎视图被高分视图替换。这是通过在一段时间内改变每个视图的不透明度来实现的。在此动画期间，两个视图都是场景的一部分。结束时，我们想要移除欢迎视图，以与游戏中管理视图的方式保持一致。创建此过渡的代码如代码清单\
    \ 4-5 所示。\n\n**代码清单 4-5.** `GameController.m (highScoresClicked:)`\n\n```objc\n\
    - (IBAction)highScoresClicked:(id)sender {\n    //Make high score view 100% clear\
    \ and add it on top of the welcome view.\n    [highscoreController.view setAlpha:0.0];\n\
    \    [self.view addSubview:highscoreController.view];\n    //set up animation\n\
    \    [UIView beginAnimations:nil context:@\"fadeInHighScoreView\"];\n    [UIView\
    \ setAnimationDuration:1.0];\n    [UIView setAnimationDelegate:self];\n    [UIView\
    \ setAnimationDidStopSelector:@selector(animationDidStop:finished:context:)];\n\
    \    //make changes\n    [welcomeView setAlpha:0.0];\n    [highscoreController.view\
    \ setAlpha:1.0];\n    [UIView commitAnimations];\n}\n```\n\n代码清单 4-5 中所示的任务在用户点击主视图中的“Highscores”按钮时调用。为了创建淡入淡出效果，我们利用了`UIView`类的静态动画任务，但首先需要设置一些东西。我们首先将与`highscoreController`关联的视图的`alpha`属性设置为`0.0`，即完全透明。然后，我们将高分视图添加到根视图。这将其放置到已存在的`welcomeView`之上，但由于它是透明的，我们只能看到欢迎屏幕。\n\
    \n通过调用任务`beginAnimations:context:`来设置动画，持续时间通过任务`setAnimationDuration:`设置。下一步是为正在创建的动画设置一个委托。我们还想通过调用`setAnimationDidStopSelector:`来设置动画完成时应调用的任务。动画设置完成后，我们只需将`welcomeView`的`alpha`属性设置为`0.0`，并将高分视图的`alpha`设置为`1.0`。这表明在动画结束时，我们希望欢迎视图透明，高分视图完全不透明。然后，我们通过调用`commitAnimations`指示已设置完成状态。\n\
    \n我们将`self`设置为动画的委托，并设置任务`animationDidStop:finished:context:`在动画结束时被调用。这样做的目的是在动画结束时进行一些清理工作，并确保应用程序处于正确状态。代码清单\
    \ 4-6 展示了此回调方法的实现。\n\n**代码清单 4-6.** `GameController.m (animationDidStop:finished:context:)`\n\
    \n```objc\n- (void)animationDidStop:(NSString *)animationID finished:(NSNumber\
    \ *)finished context:(void *)context{\n    if ([@\"fadeInHighScoreView\" isEqual:context]){\n\
    \        [welcomeView removeFromSuperview];\n        [welcomeView setAlpha:1.0];\n\
    \    }\n}\n```\n\n代码清单 4-6 中的任务在淡入淡出动画结束时被调用。在此任务中，我们想要从场景中移除`welcomeView`，并将其`alpha`重置为`1.0`。我们将其移除，因为这是其他过渡的预期状态。将`alpha`重置回`1.0`确保`welcomeView`在重新添加回场景时是可见的。\n"
- fmt: "你已经了解到，通过使用 `frame` 属性可以将一个视图添加到其父视图中。你也学会了如何通过探索淡入淡出转场来创建影响 `UIView` 属性的动画。我们将结合这些概念，向你展示如何为游戏中的金币制作动画，但首先你需要了解我们是如何设置相关类，以使这一切有意义的。\n\
    \n## 构建游戏 Coin Sorter\n\n到目前为止，我们已经了解了将内容显示到屏幕上的部分细节。在前几章中，我们探讨了控制器类的作用，以及它们如何管理数据与视图之间的关系。创建\
    \ Coin Sorter 游戏的最后一步就是结合这些概念。本节将介绍 `CoinController` 类的生命周期，并涉及我们已经探讨过的基础概念。[Figure\
    \ 4-6](#9781430244226_Ch04.xhtml#Fig6) 展示了由 `CoinController` 类控制的屏幕区域。\n\n在这个\
    \ 5×5 的金币网格中，用户可以选择两个金币进行交换。目标是创建由相同金币组成的行或列，以形成匹配集。当匹配成功时，金币会在屏幕上产生动画效果，并且用户的得分会增加。用户有\
    \ 10 次机会来尽可能多地完成匹配。[Figure 4-7](#9781430244226_Ch04.xhtml#Fig7) 展示了游戏的生命周期。\n\n\
    ![9781430244226_Fig04-06.jpg](images/9781430244226_Fig04-06.jpg)\n\n[Figure 4-6.](#9781430244226_Ch04.xhtml#_Fig6)\
    \  `CoinController` 的视图\n\n[Figure 4-7](#9781430244226_Ch04.xhtml#Fig7) 展示了单次游戏的应用程序流程。设置完成后，应用程序等待用户选择一枚金币。如果未选择第一枚金币，应用程序仅会记录被选中的金币，然后返回等待用户操作。当用户第二次选择金币时，应用程序会检查此次选中的金币是否与第一枚相同。如果是，则取消选择该金币，这允许用户改变主意。如果用户选择了不同的金币，游戏状态会通过修改\
    \ `CoinGame` 对象来更新，并创建动画显示两枚金币交换位置。当金币交换动画完成后，应用程序会检查是否存在任何匹配。如果存在，则播放移除匹配金币的动画，并用新金币更新\
    \ `CoinGame` 以替换刚被移除的那些金币。由于添加新金币可能会产生更多匹配，应用程序会再次检查匹配。理论上，这个过程可能无限循环，但实际上不会。最终，将没有匹配需要移除。\n\
    \n当没有匹配时，应用程序会检查用户是否还有剩余回合。如果有，则返回等待用户输入。如果没有，游戏结束。\n\n![9781430244226_Fig04-07.jpg](images/9781430244226_Fig04-07.jpg)\n\
    \n[Figure 4-7.](#9781430244226_Ch04.xhtml#_Fig7)  Coin Sorter 生命周期\n\n## 实现游戏状态\n\
    \n[Figure 4-7](#9781430244226_Ch04.xhtml#Fig7) 中展示的逻辑在 `CoinsController` 类中实现。为了帮助你理解\
    \ `CoinsController` 类如何创建 Coin Sorter 游戏，让我们来看看头文件。你可以从中获得该类的概览，如 [Listing 4-7](#9781430244226_Ch04.xhtml#list7)\
    \ 所示。\n\n**[Listing 4-7.](#9781430244226_Ch04.xhtml#_list7)**  `CoinsController.h`\n\
    \n```objective-c\n#import <UIKit/UIKit.h>\n#import \"CoinsGame.h\"\n\n@class CoinsController;\n\
    @protocol CoinsControllerDelegate <NSObject>\n\n-(void)gameDidStart:(CoinsController*)aCoinsController\
    \ with:(CoinsGame*)game;\n-(void)scoreIncreases:(CoinsController*)aCoinsController\
    \ with:(int)newScore;\n-(void)turnsRemainingDecreased:(CoinsController*)aCoinsController\
    \ with:(int)turnsRemaining;\n-(void)gameOver:(CoinsController*)aCoinsController\
    \ with:(CoinsGame*)game;\ns\n@end\n\n@interface CoinsController : UIViewController\
    \ {\n    CoinsGame* coinsGame;\n    UIView* coinsView;\n    NSMutableArray* imageSequences;\n\
    \    BOOL isFirstCoinSelected;\n    Coord firstSelectedCoin;\n    Coord secondSelectedCoin;\n\
    \    BOOL acceptingInput;\n    UIImageView* coinViewA;\n    UIImageView* coinViewB;\n\
    \    NSMutableArray* matchingRows;\n    NSMutableArray* matchingCols;\n    IBOutlet\
    \ id <CoinsControllerDelegate> delegate;\n}\n@property (nonatomic, retain) CoinsGame*\
    \ coinsGame;\n@property (nonatomic, retain) id <CoinsControllerDelegate> delegate;\n\
    +(NSArray*)fillImageArray:(int)coin;\n\n-(void)loadImages;\n-(void)newGame;\n\
    -(void)continueGame:(CoinsGame*)aCoinsGame;\n-(void)createAndLayoutImages;\n-(void)tapGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer;\n-(Coord)coordFromLocation:(CGPoint) location;\n-(void)doSwitch:(Coord)coordA\
    \ With:(Coord)coordB;\n-(void)checkMatches;\n-(void)updateCoinViews;\n\n-(void)spinCoinAt:(Coord)coord;\n\
    -(void)stopCoinAt:(Coord)coord;\n\n-(void)doEndGame;\n@end\n```\n\n`CoinsController`\
    \ 类的这个头文件描述了这个类以及委托协议 `CoinsControllerDelegate`，该协议在 [Chapter 3](#9781430244226_Ch03.xhtml)\
    \ 中已讨论过。`CoinsGame` 字段用于存储游戏状态。该对象可以被归档以保存游戏状态，或者传递给 `CoinsController` 的实例以恢复游戏。`UIView\
    \ coinsView` 是白色的游戏区域。`BOOL isFirstCoinSelected` 用于记录用户是否已经选择了一枚金币。两个 `Coord`\
    \ 结构体记录了哪些金币被选中。我们很快会看一下 `Coord` 结构体。`BOOL acceptingInput` 用于在动画播放时阻止用户输入。\n\n\
    两个 `UIImageView` 字段 `coinViewA` 和 `coinViewB`，以及 `NSMutableArray` 变量 `matchingRows`\
    \ 和 `matchingCols` 在动画期间用于跟踪正在被动画化的内容。最后一个字段是该类的委托，它必须实现 `CoinsControllerDelegate`\
    \ 协议。\n\n## 初始化与设置\n\n`CoinController` 对象的生命周期始于调用 `viewDidLoad` 任务时。由于我们在 XIB\
    \ 文件中拥有一个 `CoinController` 实例，该任务会被自动调用。[Listing 4-8](#9781430244226_Ch04.xhtml#list8)\
    \ 展示了这个任务。\n\n**[Listing 4-8.](#9781430244226_Ch04.xhtml#_list8)**  `CoinController.m\
    \ (viewDidLoad)`\n\n```objective-c\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
    \    [self.view setBackgroundColor:[UIColor clearColor]];\n    CGRect viewFrame\
    \ = [self.view frame];\n    //border is 3.125%\n    float border = viewFrame.size.width*.03125;\n\
    \    float coinsViewWidth = viewFrame.size.width-border*2;\n    CGRect coinsFrame\
    \ = CGRectMake(border, border, coinsViewWidth, coinsViewWidth);\n    coinsView\
    \ = [[UIView alloc] initWithFrame: coinsFrame];\n    [coinsView setBackgroundColor:[UIColor\
    \ whiteColor]];\n    [coinsView setClipsToBounds:YES];\n    [self.view addSubview:coinsView];\n\
    \    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc] initWithTarget:self\
    \ action:@selector(tapGesture:)];\n    [tapRecognizer setNumberOfTapsRequired:1];\n\
    \    [tapRecognizer setNumberOfTouchesRequired:1];\n    [coinsView addGestureRecognizer:tapRecognizer];\n\
    }\n```\n\n在 `viewDidLoad` 任务中，我们需要处理几个小问题。首先，我们调用 `viewDidLoad` 的父类实现。虽然这不是严格必需的，但这是一个好习惯。如果我们将来想要更改\
    \ `CoinsController` 的父类，我们可能会花费大量时间排查为何初始化不正确的各种问题。"
  raw: 'You have seen how a view is added to a super view by using the property `frame`.
    You have also learned how to create animations that affect the properties of a
    `UIView` by exploring the fade transition. We are going to combine these concepts
    to show you how to animate the coins within the game, but first you have to take
    look at how we set up the related classes so that this all makes sense.    Building
    the Game Coin Sorter    Thus far we have looked at some of the finer points of
    getting content onto the screen. In previous chapters, we explored the role of
    the controller classes and how they manage the relationship between data and the
    view. The last step in creating the game Coin Sorter is combining these concepts.
    This section will walk through the life cycle of the `CoinController` class, touching
    on the basic concepts we have explored. [Figure 4-6](#9781430244226_Ch04.xhtml#Fig6)
    shows just the area of the screen controlled by the class `CoinController`.    In
    this five-by-five grid of coins, the user can select two coins to trade places.
    The goal is to create rows or columns of like coins to create a matching set.
    When a match is created, the coins are animated on the screen, and the user’s
    score is increased. The user has 10 turns to make as many matches as possible.
    [Figure 4-7](#9781430244226_Ch04.xhtml#Fig7) shows the life cycle of the game.    ![9781430244226_Fig04-06.jpg](images/9781430244226_Fig04-06.jpg)    [Figure
    4-6.](#9781430244226_Ch04.xhtml#_Fig6)  CoinController’s view    [Figure 4-7](#9781430244226_Ch04.xhtml#Fig7)
    shows the flow of the application for a single game. After setup, the application
    waits for the user to select a coin. If a first coin is not selected, the application
    simply keeps track that the coin was selected and goes back to waiting for the
    user. When the user selects a coin a second time, the application checks whether
    the coin just selected is the same coin as the first one selected. If so, the
    application unselects the coin. This allows the user to change his mind. If the
    user selects a different coin, the game state updates by modifying the CoinGame
    object, and animations are created, showing the two coins trading places. When
    the coin-swapping animation is done, the application checks whether any matches
    exist. If so, it animates their removal and updates CoinGame with new coins to
    replace those just removed. Because adding new coins could create additional matches,
    the application checks again for matches. This process could theoretically go
    on forever, but in practice it does not. Eventually, there will be no matches
    to remove.    When there are no matches, the application checks whether the user
    has any turns remaining. If the user does, it goes back to waiting for the user’s
    input. If the user does not, the game is over.    ![9781430244226_Fig04-07.jpg](images/9781430244226_Fig04-07.jpg)    [Figure
    4-7.](#9781430244226_Ch04.xhtml#_Fig7)  Coin Sorter life cycle    Implementing
    Game State    The logic presented in [Figure 4-7](#9781430244226_Ch04.xhtml#Fig7)
    is implemented in the class `CoinsController`. To help you understand how the
    class `CoinsController` creates the Coin Sorter game, let’s take a look at the
    header file. There you can get an overview of the class, shown in [Listing 4-7](#9781430244226_Ch04.xhtml#list7).    [**Listing
    4-7.**](#9781430244226_Ch04.xhtml#_list7)  `CoinsController.h`    ``` #import
    <UIKit/UIKit.h> #import "CoinsGame.


    h"  @class CoinsController; @protocol CoinsControllerDelegate <NSObject>  -(void)gameDidStart:(CoinsController*)aCoinsController
    with:(CoinsGame*)game; -(void)scoreIncreases:(CoinsController*)aCoinsController
    with:(int)newScore; -(void)turnsRemainingDecreased:(CoinsController*)aCoinsController
    with:(int)turnsRemaining; -(void)gameOver:(CoinsController*)aCoinsController with:(CoinsGame*)game;
    s @end  @interface CoinsController : UIViewController {     CoinsGame* coinsGame;
        UIView* coinsView;      NSMutableArray* imageSequences;      BOOL isFirstCoinSelected;
        Coord firstSelectedCoin;     Coord secondSelectedCoin;     BOOL acceptingInput;
        UIImageView* coinViewA;      UIImageView* coinViewB;     NSMutableArray* matchingRows;
        NSMutableArray* matchingCols;      IBOutlet id <CoinsControllerDelegate> delegate;
    } @property (nonatomic, retain) CoinsGame* coinsGame; @property (nonatomic, retain)
    id <CoinsControllerDelegate> delegate; +(NSArray*)fillImageArray:(int)coin;  -(void)loadImages;
    -(void)newGame; -(void)continueGame:(CoinsGame*)aCoinsGame; -(void)createAndLayoutImages;
    -(void)tapGesture:(UIGestureRecognizer *)gestureRecognizer; -(Coord)coordFromLocation:(CGPoint)
    location; -(void)doSwitch:(Coord)coordA With:(Coord)coordB; -(void)checkMatches;
    -(void)updateCoinViews;  -(void)spinCoinAt:(Coord)coord; -(void)stopCoinAt:(Coord)coord;  -(void)doEndGame;
    @end ```    This header file for the class `CoinsController` describes the class
    as well as the delegate protocol `CoinsControllerDelegate`, discussed in [Chapter
    3](#9781430244226_Ch03.xhtml). The field `CoinsGame` is used to store the state
    of the game. This object can be archived to save the game state or it can be passed
    to an instance of `CoinsController` to resume a game. The `UIView coinsView` is
    the white play area. The `BOOL isFirstCoinSelected` is used to keep track of whether
    the user has already selected a coin. The two `Coord` structs record which coins
    are selected. We will take a look at the `Coord` struct shortly. The `BOOL acceptingInput`
    is used to block user input when animations are happening.    The two `UIImageView`
    fields, `coinViewA` and `coinViewB`, along with the `NSMutableArray` variables
    `matchingRows` and `matchingCols` are used during animations to keep track of
    what is being animated. The last field is the delegate for this class and must
    implement the protocol `CoinsControllerDelegate`.    Initialization and Setup    The
    life of a `CoinController` object starts when the task `viewDidLoad` is called.
    This is called automatically because we have an instance of `CoinController` in
    our XIB files. [Listing 4-8](#9781430244226_Ch04.xhtml#list8) shows this task.    [**Listing
    4-8.**](#9781430244226_Ch04.xhtml#_list8)  `CoinController.m (viewDidLoad)`    ```
    - (void)viewDidLoad {     [super viewDidLoad];      [self.view setBackgroundColor:[UIColor
    clearColor]];      CGRect viewFrame = [self.view frame];      //border is 3.125%
        float border = viewFrame.size.width*.03125;     float coinsViewWidth = viewFrame.size.width-border*2;
        CGRect coinsFrame = CGRectMake(border, border, coinsViewWidth, coinsViewWidth);      coinsView
    = [[UIView alloc] initWithFrame: coinsFrame];     [coinsView setBackgroundColor:[UIColor
    whiteColor]];     [coinsView setClipsToBounds:YES];      [self.view addSubview:coinsView];
        UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc] initWithTarget:self
    action:@selector(tapGesture:)];     [tapRecognizer setNumberOfTapsRequired:1];
        [tapRecognizer setNumberOfTouchesRequired:1];      [coinsView addGestureRecognizer:tapRecognizer];
    } ```    In the `viewDidLoad` task, we have several small items to attend to.
    First, we call the super implementation of `viewDidLoad`. This is not strictly
    necessary but is just good practice. If we ever wanted to change the super class
    of `CoinsController`, we might spend a lot of time figuring out why things are
    not initializing correctly.'
  trans: "\n你已经了解到，通过使用 `frame` 属性可以将一个视图添加到其父视图中。你也学会了如何通过探索淡入淡出转场来创建影响 `UIView`\
    \ 属性的动画。我们将结合这些概念，向你展示如何为游戏中的金币制作动画，但首先你需要了解我们是如何设置相关类，以使这一切有意义的。\n\n## 构建游戏 Coin\
    \ Sorter\n\n到目前为止，我们已经了解了将内容显示到屏幕上的部分细节。在前几章中，我们探讨了控制器类的作用，以及它们如何管理数据与视图之间的关系。创建\
    \ Coin Sorter 游戏的最后一步就是结合这些概念。本节将介绍 `CoinController` 类的生命周期，并涉及我们已经探讨过的基础概念。Figure\
    \ 4-6 展示了由 `CoinController` 类控制的屏幕区域。\n\n在这个 5×5 的金币网格中，用户可以选择两个金币进行交换。目标是创建由相同金币组成的行或列，以形成匹配集。当匹配成功时，金币会在屏幕上产生动画效果，并且用户的得分会增加。用户有\
    \ 10 次机会来尽可能多地完成匹配。Figure 4-7 展示了游戏的生命周期。\n\n![9781430244226_Fig04-06.jpg](img/9781430244226_Fig04-06.jpg)\n\
    \nFigure 4-6.  `CoinController` 的视图\n\nFigure 4-7 展示了单次游戏的应用程序流程。设置完成后，应用程序等待用户选择一枚金币。如果未选择第一枚金币，应用程序仅会记录被选中的金币，然后返回等待用户操作。当用户第二次选择金币时，应用程序会检查此次选中的金币是否与第一枚相同。如果是，则取消选择该金币，这允许用户改变主意。如果用户选择了不同的金币，游戏状态会通过修改\
    \ `CoinGame` 对象来更新，并创建动画显示两枚金币交换位置。当金币交换动画完成后，应用程序会检查是否存在任何匹配。如果存在，则播放移除匹配金币的动画，并用新金币更新\
    \ `CoinGame` 以替换刚被移除的那些金币。由于添加新金币可能会产生更多匹配，应用程序会再次检查匹配。理论上，这个过程可能无限循环，但实际上不会。最终，将没有匹配需要移除。\n\
    \n当没有匹配时，应用程序会检查用户是否还有剩余回合。如果有，则返回等待用户输入。如果没有，游戏结束。\n\n![9781430244226_Fig04-07.jpg](img/9781430244226_Fig04-07.jpg)\n\
    \nFigure 4-7.  Coin Sorter 生命周期\n\n## 实现游戏状态\n\nFigure 4-7 中展示的逻辑在 `CoinsController`\
    \ 类中实现。为了帮助你理解 `CoinsController` 类如何创建 Coin Sorter 游戏，让我们来看看头文件。你可以从中获得该类的概览，如\
    \ Listing 4-7 所示。\n\n**Listing 4-7.**  `CoinsController.h`\n\n```objective-c\n\
    #import <UIKit/UIKit.h>\n#import \"CoinsGame.h\"\n\n@class CoinsController;\n\
    @protocol CoinsControllerDelegate <NSObject>\n\n-(void)gameDidStart:(CoinsController*)aCoinsController\
    \ with:(CoinsGame*)game;\n-(void)scoreIncreases:(CoinsController*)aCoinsController\
    \ with:(int)newScore;\n-(void)turnsRemainingDecreased:(CoinsController*)aCoinsController\
    \ with:(int)turnsRemaining;\n-(void)gameOver:(CoinsController*)aCoinsController\
    \ with:(CoinsGame*)game;\ns\n@end\n\n@interface CoinsController : UIViewController\
    \ {\n    CoinsGame* coinsGame;\n    UIView* coinsView;\n    NSMutableArray* imageSequences;\n\
    \    BOOL isFirstCoinSelected;\n    Coord firstSelectedCoin;\n    Coord secondSelectedCoin;\n\
    \    BOOL acceptingInput;\n    UIImageView* coinViewA;\n    UIImageView* coinViewB;\n\
    \    NSMutableArray* matchingRows;\n    NSMutableArray* matchingCols;\n    IBOutlet\
    \ id <CoinsControllerDelegate> delegate;\n}\n@property (nonatomic, retain) CoinsGame*\
    \ coinsGame;\n@property (nonatomic, retain) id <CoinsControllerDelegate> delegate;\n\
    +(NSArray*)fillImageArray:(int)coin;\n\n-(void)loadImages;\n-(void)newGame;\n\
    -(void)continueGame:(CoinsGame*)aCoinsGame;\n-(void)createAndLayoutImages;\n-(void)tapGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer;\n-(Coord)coordFromLocation:(CGPoint) location;\n-(void)doSwitch:(Coord)coordA\
    \ With:(Coord)coordB;\n-(void)checkMatches;\n-(void)updateCoinViews;\n\n-(void)spinCoinAt:(Coord)coord;\n\
    -(void)stopCoinAt:(Coord)coord;\n\n-(void)doEndGame;\n@end\n```\n\n`CoinsController`\
    \ 类的这个头文件描述了这个类以及委托协议 `CoinsControllerDelegate`，该协议在 Chapter 3 中已讨论过。`CoinsGame`\
    \ 字段用于存储游戏状态。该对象可以被归档以保存游戏状态，或者传递给 `CoinsController` 的实例以恢复游戏。`UIView coinsView`\
    \ 是白色的游戏区域。`BOOL isFirstCoinSelected` 用于记录用户是否已经选择了一枚金币。两个 `Coord` 结构体记录了哪些金币被选中。我们很快会看一下\
    \ `Coord` 结构体。`BOOL acceptingInput` 用于在动画播放时阻止用户输入。\n\n两个 `UIImageView` 字段 `coinViewA`\
    \ 和 `coinViewB`，以及 `NSMutableArray` 变量 `matchingRows` 和 `matchingCols` 在动画期间用于跟踪正在被动画化的内容。最后一个字段是该类的委托，它必须实现\
    \ `CoinsControllerDelegate` 协议。\n\n## 初始化与设置\n\n`CoinController` 对象的生命周期始于调用 `viewDidLoad`\
    \ 任务时。由于我们在 XIB 文件中拥有一个 `CoinController` 实例，该任务会被自动调用。Listing 4-8 展示了这个任务。\n\n\
    **Listing 4-8.**  `CoinController.m (viewDidLoad)`\n\n```objective-c\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    [self.view setBackgroundColor:[UIColor clearColor]];\n\
    \    CGRect viewFrame = [self.view frame];\n    //border is 3.125%\n    float\
    \ border = viewFrame.size.width*.03125;\n    float coinsViewWidth = viewFrame.size.width-border*2;\n\
    \    CGRect coinsFrame = CGRectMake(border, border, coinsViewWidth, coinsViewWidth);\n\
    \    coinsView = [[UIView alloc] initWithFrame: coinsFrame];\n    [coinsView setBackgroundColor:[UIColor\
    \ whiteColor]];\n    [coinsView setClipsToBounds:YES];\n    [self.view addSubview:coinsView];\n\
    \    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc] initWithTarget:self\
    \ action:@selector(tapGesture:)];\n    [tapRecognizer setNumberOfTapsRequired:1];\n\
    \    [tapRecognizer setNumberOfTouchesRequired:1];\n    [coinsView addGestureRecognizer:tapRecognizer];\n\
    }\n```\n\n在 `viewDidLoad` 任务中，我们需要处理几个小问题。首先，我们调用 `viewDidLoad` 的父类实现。虽然这不是严格必需的，但这是一个好习惯。如果我们将来想要更改\
    \ `CoinsController` 的父类，我们可能会花费大量时间排查为何初始化不正确的各种问题。\n"
- fmt: "任务`viewDidLoad`的下一步是设置一些`UIView`实例来完成我们想要的操作。参考[图4-6](#9781430244226_Ch04.xhtml#Fig6)，我们看到包含硬币的白色区域周围有一个半透明的边框。这个半透明视图实际上是容器视图（`holder\
    \ view`），为了确保其可见，我们将该类的根视图设置为完全透明。白色方形区域是名为`coinsView`的`UIView`，它是作为硬币的子视图的父视图。我们根据父视图的`frame`计算`coinsView`的大小。在iPhone上，`coinsViewWidth`的值为300点；在iPad上，`coinsViewWidth`的值为720点。将`coinsView`的背景设置为白色后，我们将`clipToBounds`属性设置为`true`。这将防止硬币在动画移出屏幕时被绘制到白色区域之外。\n\
    \n`viewDidLoad`中最后一项任务是向`coinsView`注册一个手势识别器。在这里，我们希望在用户点击`coinsView`时得到通知，因此我们使用一个名为`tapRecognizer`的`UITapGestureRecognizer`。初始化`tapRecognizer`时，我们将`self`设置为目标，并指定任务`tapGesture:`作为`tapRecognizer`检测到点击手势时要调用的任务。通过设置所需的点击次数和触摸次数，我们确保拾取到用户发出的正确手势。将`tapRecognizer`添加到`coinsView`完成了手势识别器的设置。关于iOS如何处理手势的更多信息，请参见[第8章](#9781430244226_Ch08.xhtml)。\n\
    \n## 开始新游戏\n\n在调用`viewDidLoad`之后，`CoinsController`将用于开始新游戏或继续旧游戏。我们先来看一下`newGame`任务，如[代码清单4-9](#9781430244226_Ch04.xhtml#list9)所示。\n\
    \n**[代码清单4-9.](#9781430244226_Ch04.xhtml#_list9)** `CoinsController.m (newGame)`\n\
    \n```\n-(void)newGame{\n    for (UIView* view in [coinsView subviews]){\n    \
    \    [view removeFromSuperview];\n    }\n\n    [coinsGame release];\n    coinsGame\
    \ = [[CoinsGame alloc] initRandomWithRows:5 Cols:5];\n    [self createAndLayoutImages];\n\
    \    [delegate gameDidStart:self with: coinsGame];\n\n    acceptingInput = YES;\n\
    }\n```\n\n当欢迎界面上点击“新游戏”按钮时，会调用`newGame`任务。首先要做的是从`coinsView`中移除旧的子视图。（如果用户刚刚启动应用程序，可能没有任何子视图需要移除。）`coinsGame`对象先被释放，然后被设置为一个预填充了随机硬币值的新实例。下一步是调用`createAndLayoutImages`，它将在屏幕上放置硬币。`continueGame:`和`newGame`都会调用此任务，因此我们将在查看`continueGame:`之后再看它。最后要做的是通知所有代理新游戏已开始，并将`acceptingInput`设置为`YES`。\n\
    \n## 继续游戏\n\n如果用户上次退出时游戏正在进行中，用户可能希望从上次停止的地方继续游戏。这可以通过点击欢迎视图中的“继续”按钮来完成。按下该按钮时，会调用`continueGame`任务，它与`newGame`非常相似。[代码清单4-10](#9781430244226_Ch04.xhtml#list10)展示了`continueGame:`。\n\
    \n**[代码清单4-10.](#9781430244226_Ch04.xhtml#_list10)** `CoinsController.m (continueGame:)`\n\
    \n```\n-(void)continueGame:(CoinsGame*)aCoinsGame{\n    for (UIView* view in [coinsView\
    \ subviews]){\n        [view removeFromSuperview];\n    }\n    [coinsGame release];\n\
    \    coinsGame = aCoinsGame;\n\n    [self createAndLayoutImages];\n    [delegate\
    \ gameDidStart:self with: coinsGame];\n\n    acceptingInput = YES;\n}\n```\n\n\
    任务`continueGame:`接受一个`CoinsGame`对象作为参数，参数名为`aCoinsGame`。清除`coinsView`的旧子视图后，我们将`coinsGame`设置为传入的`aCoinsGame`对象。然后调用`createAndLayoutImages`，将硬币添加到场景中。我们调用代理任务`gameDidStart:coinsGame:`，以便代理有机会更新跟踪当前分数和剩余回合的`UILabel`对象。最后，我们将`acceptingInput`设置为`YES`。\n\
    \n## 为每个硬币初始化UIView\n\n如前所述，`newGame`和`continueGame:`都会调用`createAndLayoutImages`任务。此任务负责游戏的初始设置，主要是为游戏中的每个硬币创建一个`UIImageView`。该任务如[代码清单4-11](#9781430244226_Ch04.xhtml#list11)所示。\n\
    \n**[代码清单4-11.](#9781430244226_Ch04.xhtml#_list11)** `CoinsController.m (createAndLayoutImages)`\n\
    \n```\n-(void)createAndLayoutImages{\n    int rowCount = [coinsGame rowCount];\n\
    \    int colCount = [coinsGame colCount];\n\n    CGRect coinsFrame = [coinsView\
    \ frame];\n    float width = coinsFrame.size.width/colCount;\n    float height\
    \ = coinsFrame.size.height/rowCount;\n\n    for (int r = 0;r < rowCount;r++){\n\
    \        for (int c = 0;c < colCount;c++){\n\n            UIImageView* imageView\
    \ = [[UIImageView alloc] init];\n            CGRect frame = NnCGRectMake(c*width,\
    \ r*height, width, height);\n            [imageView setFrame:frame];\n\n     \
    \       [coinsView addSubview: imageView];\n            [self spinCoinAt:CoordMake(r,\
    \ c)];\n        }\n    }\n}\n```\n\n[代码清单4-11](#9781430244226_Ch04.xhtml#list11)显示了游戏中要使用的行数和列数。在此示例中，两者都是5。`coinsView`的`frame`存储在变量`coinsFrame`中以便引用，并计算每个硬币视图的`width`和`height`。两个`for`循环为每一行和每一列创建一个`imageView`，设置其`frame`，并将其添加到`coinsView`中。在嵌套循环中，调用了`spinCoinAt:`，它创建了硬币旋转效果。请注意，传递给`spinCoinAt:`的参数是函数`CoordMake`的结果。我们在查看`spinCoinAt:`（如[代码清单4-12](#9781430244226_Ch04.xhtml#list12)所示）之后，再查看这个函数和`CoinsGame`类。\n\
    \n**[代码清单4-12.](#9781430244226_Ch04.xhtml#_list12)** `CoinsController.m (spinCoinAt:)`\n\
    \n```\n-(void)spinCoinAt:(Coord)coord{\n    UIImageView* coinView = [[coinsView\
    \ subviews] objectAtIndex:[coinsGame indexForCoord:coord]];\n\n    NSNumber* coin\
    \ = [coinsGame coinForCoord:coord];\n    NSArray* images = [imageSequences objectAtIndex:[coin\
    \ intValue]];\n    [coinView setAnimationImages: images];\n    NSTimeInterval\
    \ interval = (random()%4)/10.0 + .6;\n    [coinView setAnimationDuration: interval];\n\
    \    [coinView startAnimating];\n}\n```\n\n你可以看到`spinCoinAt:`接受一个`Coord`类型的参数。该类型在`CoinsGame.h`中定义，是一个表示特定行和列上硬币的结构体。在此任务的第一行中，使用`Coord`结构体来查找代表该特定硬币的`UIView`的索引。之所以能这样做，是因为每个硬币恰好对应一个`UIImageView`（这是在[代码清单4-11](#9781430244226_Ch04.xhtml#list11)中设置的）。找到正确的`UIImageView`后，我们从`coinsGame`对象中获取该硬币的值。`NSNumber\
    \ coin`表示这组特定坐标的硬币类型——要么是三角形、正方形，要么是圆形。使用`coin`的`intValue`，我们从`imageSequences`中取出一个名为`images`的`NSArray`。`NSArray\
    \ image`存储了构成旋转硬币动画的所有图片。通过在`UIImageView coinView`上调用`setAnimationImages:`，我们指示这个`UIIMageView`循环遍历`images`中的每个`UIIMage`以产生动画效果。将动画持续时间设置为随机值并调用`startAnimating`，就创建了旋转效果。在设置的这一阶段，应用程序看起来会非常像之前显示的[图4-6](#9781430244226_Ch04.xhtml#Fig6)。我们现在已经准备好开始接受用户输入。"
  raw: 'The next part of the task `viewDidLoad` is to set up some `UIView` instances
    to do what we want. Looking at [Figure 4-6](#9781430244226_Ch04.xhtml#Fig6), we
    see that there is a partially transparent border around the white area containing
    the coins. This partially transparent view is actually the holder view, so to
    make sure this is visible, we set the root view for this class to be completely
    transparent.    The white square area is the `UIView` called `coinsView`, which
    is the parent view for the views that will be the coins. We calculate the size
    of `coinsView` based on the frame of the parent view. On the iPhone, the value
    of `coinsViewWidth` turns out to be 300 points; on the iPad, `coinsViewWidth`
    is 720 points. After setting the background of `coinsView` to white, we set the
    property `clipToBounds` to be true. This will prevent the coins from being drawn
    outside the white area when they are animated offscreen.    The last order of
    business in `viewDidLoad` is to register a gesture recognizer to the `coinsView`.
    In this case, we want to know anytime the user taps on the `coinsView`, so we
    use a `UITapGestureRecognizer` called `tapRecognizer`. When `tapRecognizer` is
    initialized, we set self as the target and specify the task `tapGesture:` as the
    task to be called when `tapRecognizer` detects the tap gesture. By setting the
    number of required taps and the number of required touches, we make sure we pick
    up the correct gestures that the user makes. Adding `tapRecognizer` to `coinsView`
    finishes setting up our gesture recognizer. More information about how gestures
    work on iOS can be found in [Chapter 8](#9781430244226_Ch08.xhtml).    Starting
    a New Game    After `viewDidLoad` is called, the `CoinsController` will be used
    either to play a new game or to continue an old game. Let’s take a look at the
    task `newGame` first, as shown in [Listing 4-9](#9781430244226_Ch04.xhtml#list9).    [**Listing
    4-9.**](#9781430244226_Ch04.xhtml#_list9)  `CoinsController.m (newGame)`    ```
    -(void)newGame{     for (UIView* view in [coinsView subviews]){         [view
    removeFromSuperview];     }      [coinsGame release];     coinsGame = [[CoinsGame
    alloc] initRandomWithRows:5 Cols:5];     [self createAndLayoutImages];     [delegate
    gameDidStart:self with: coinsGame];      acceptingInput = YES; } ```    The task
    `newGame` is called when the New Game button is clicked on the Welcome screen.
    The first thing to do is remove the old subviews from `coinsView`. (There may
    not be any subviews to remove if the user just launched the application.) The
    object `coinsGame` is released before being set to a new instance prepopulated
    with random coin values. The next step is to call `createAndLayoutImages`, which
    will place the coins on the screen. This task is called by both `continueGame:`
    and `newGame`, so we will look at it after looking at `continueGame:`. The last
    thing to do is inform any delegate that a new game has started and set acceptingInput
    to `YES`.    Continuing a Game    If a game was in progress when a user last quit,
    that user may wish to continue the game from where it left off. This is done by
    clicking the Continue button in the Welcome view. When that button is pressed,
    the task `continueGame` is called, which is pretty similar to `newGame`. [Listing
    4-10](#9781430244226_Ch04.xhtml#list10) shows `continueGame:`.    [**Listing 4-10.**](#9781430244226_Ch04.xhtml#_list10)  `CoinsController.m
    (continueGame:)`    ``` -(void)continueGame:(CoinsGame*)aCoinsGame{     for (UIView*
    view in [coinsView subviews]){         [view removeFromSuperview];     } y    [coinsGame
    release];     coinsGame = aCoinsGame;      [self createAndLayoutImages];     [delegate
    gameDidStart:self with: coinsGame];      acceptingInput = YES; } ```    The task
    `continueGame:` takes a `CoinsGame` object as an argument called `aCoinsGame`.
    After clearing away the old subviews of `coinsView`, we set `coinsGame` to the
    passed-in `aCoinsGame` object.


    A call to `createAndLayoutImages` is made, to add the coins to the scene. We call
    the delegate task `gameDidStart:coinsGame:` so the delegate has a chance to update
    the `UILabel` objects that track the current score and remaining turn. Finally,
    we set `acceptingInput` to `YES`.    Initializing the UIViews for Each Coin    As
    mentioned, the task `createAndLayoutImages` is called by both `newGame` and `continueGame:`.
    This task is responsible for the initial setup of the game, primarily creating
    a `UIImageView` for each coin in the game. This task is shown in [Listing 4-11](#9781430244226_Ch04.xhtml#list11).    [**Listing
    4-11.**](#9781430244226_Ch04.xhtml#_list11)  `CoinsController.m (createAndLayoutImages)`    ```
    -(void)createAndLayoutImages{     int rowCount = [coinsGame rowCount];     int
    colCount = [coinsGame colCount];      CGRect coinsFrame = [coinsView frame];     float
    width = coinsFrame.size.width/colCount;     float height = coinsFrame.size.height/rowCount;      for
    (int r = 0;r < rowCount;r++){         for (int c = 0;c < colCount;c++){              UIImageView*
    imageView = [[UIImageView alloc] init];             CGRect frame = NnCGRectMake(c*width,
    r*height, width, height);             [imageView setFrame:frame];              [coinsView
    addSubview: imageView];             [self spinCoinAt:CoordMake(r, c)];         }
        } } ```    [Listing 4-11](#9781430244226_Ch04.xhtml#list11) shows the number
    of rows and columns to be used in the game. In this example, these are both five.
    The `frame` of `coinsView` is stored in the variable `coinsFrame` for easy reference,
    and the `width` and `height` of each coin view is calculated. The two for loops
    create an `imageView`, set its `frame`, and add it to `coinsView` for each row
    and column. In the nested loops, `spinCoinAt:` is called, which creates the spinning
    coin effect. Note that the argument being passed to `spinCoinAt:` is the result
    of the function `CoordMake`. We will take a look at this function and the class
    `CoinsGame` after looking at `spinCoinAt:`, shown in [Listing 4-12](#9781430244226_Ch04.xhtml#list12).    [**Listing
    4-12.**](#9781430244226_Ch04.xhtml#_list12)  `CoinsController.m (spinCoinAt:)`    ```
    -(void)spinCoinAt:(Coord)coord{     UIImageView* coinView = [[coinsView subviews]
    objectAtIndex:[coinsGame indexForCoord:coord]];      NSNumber* coin = [coinsGame
    coinForCoord:coord];     NSArray* images = [imageSequences objectAtIndex:[coin
    intValue]];     [coinView setAnimationImages: images];     NSTimeInterval interval
    = (random()%4)/10.0 + .6;     [coinView setAnimationDuration: interval];     [coinView
    startAnimating]; } ```    You can see that `spinCoinAt:` takes an argument of
    type `Coord`. This is defined in `CoinsGame.h` and is a struct that represents
    a coin at a particular row and column. In the first line of this task, the struct
    `Coord` is used to find the index of the `UIView` that represents this particular
    coin. This works because there is exactly one `UIImageView` for each coin. (This
    was set up in [Listing 4-11](#9781430244226_Ch04.xhtml#list11).) After the correct
    `UIImageView` is found, we get the value of the coin from the `coinsGame` object.
    The `NSNumber coin` represents the type of coin for this particular set of coordinates—either
    a triangle, square, or circle. Using the `intValue` of the `coin`, we pull out
    an `NSArray` from `imageSequences` called `images`. The `NSArray image` stores
    all of the images that make up the spinning coin animation. By calling `setAnimationImages:`
    on the `UIImageView coinView`, we indicate that we want this `UIIMageView` to
    cycle though each `UIIMage` in images to produce the animation effect. Setting
    the animation duration to a random value and calling `startAnimating` creates
    the spinning effect. At this point in the setup, the application will look very
    much like [Figure 4-6](#9781430244226_Ch04.xhtml#Fig6) shown earlier. We are ready
    to start accepting user input.'
  trans: "```markdown\n任务`viewDidLoad`的下一步是设置一些`UIView`实例来完成我们想要的操作。参考图 4-6，我们看到包含硬币的白色区域周围有一个半透明的边框。这个半透明视图实际上是容器视图（`holder\
    \ view`），为了确保其可见，我们将该类的根视图设置为完全透明。白色方形区域是名为`coinsView`的`UIView`，它是作为硬币的子视图的父视图。我们根据父视图的`frame`计算`coinsView`的大小。在\
    \ iPhone 上，`coinsViewWidth`的值为 300 点；在 iPad 上，`coinsViewWidth`的值为 720 点。将`coinsView`的背景设置为白色后，我们将`clipToBounds`属性设置为`true`。这将防止硬币在动画移出屏幕时被绘制到白色区域之外。\n\
    \n`viewDidLoad`中最后一项任务是向`coinsView`注册一个手势识别器。在这里，我们希望在用户点击`coinsView`时得到通知，因此我们使用一个名为`tapRecognizer`的`UITapGestureRecognizer`。初始化`tapRecognizer`时，我们将`self`设置为目标，并指定任务`tapGesture:`作为`tapRecognizer`检测到点击手势时要调用的任务。通过设置所需的点击次数和触摸次数，我们确保拾取到用户发出的正确手势。将`tapRecognizer`添加到`coinsView`完成了手势识别器的设置。关于\
    \ iOS 如何处理手势的更多信息，请参见第 8 章。\n\n## 开始新游戏\n\n在调用`viewDidLoad`之后，`CoinsController`将用于开始新游戏或继续旧游戏。我们先来看一下`newGame`任务，如代码清单\
    \ 4-9 所示。\n\n**代码清单 4-9.** `CoinsController.m (newGame)`\n\n```\n-(void)newGame{\n\
    \    for (UIView* view in [coinsView subviews]){\n        [view removeFromSuperview];\n\
    \    }\n\n    [coinsGame release];\n    coinsGame = [[CoinsGame alloc] initRandomWithRows:5\
    \ Cols:5];\n    [self createAndLayoutImages];\n    [delegate gameDidStart:self\
    \ with: coinsGame];\n\n    acceptingInput = YES;\n}\n```\n\n当欢迎界面上点击“新游戏”按钮时，会调用`newGame`任务。首先要做的是从`coinsView`中移除旧的子视图。（如果用户刚刚启动应用程序，可能没有任何子视图需要移除。）`coinsGame`对象先被释放，然后被设置为一个预填充了随机硬币值的新实例。下一步是调用`createAndLayoutImages`，它将在屏幕上放置硬币。`continueGame:`和`newGame`都会调用此任务，因此我们将在查看`continueGame:`之后再看它。最后要做的是通知所有代理新游戏已开始，并将`acceptingInput`设置为`YES`。\n\
    \n## 继续游戏\n\n如果用户上次退出时游戏正在进行中，用户可能希望从上次停止的地方继续游戏。这可以通过点击欢迎视图中的“继续”按钮来完成。按下该按钮时，会调用`continueGame`任务，它与`newGame`非常相似。代码清单\
    \ 4-10 展示了`continueGame:`。\n\n**代码清单 4-10.** `CoinsController.m (continueGame:)`\n\
    \n```\n-(void)continueGame:(CoinsGame*)aCoinsGame{\n    for (UIView* view in [coinsView\
    \ subviews]){\n        [view removeFromSuperview];\n    }\n    [coinsGame release];\n\
    \    coinsGame = aCoinsGame;\n\n    [self createAndLayoutImages];\n    [delegate\
    \ gameDidStart:self with: coinsGame];\n\n    acceptingInput = YES;\n}\n```\n\n\
    任务`continueGame:`接受一个`CoinsGame`对象作为参数，参数名为`aCoinsGame`。清除`coinsView`的旧子视图后，我们将`coinsGame`设置为传入的`aCoinsGame`对象。然后调用`createAndLayoutImages`，将硬币添加到场景中。我们调用代理任务`gameDidStart:coinsGame:`，以便代理有机会更新跟踪当前分数和剩余回合的`UILabel`对象。最后，我们将`acceptingInput`设置为`YES`。\n\
    \n## 为每个硬币初始化 UIView\n\n如前所述，`newGame`和`continueGame:`都会调用`createAndLayoutImages`任务。此任务负责游戏的初始设置，主要是为游戏中的每个硬币创建一个`UIImageView`。该任务如代码清单\
    \ 4-11 所示。\n\n**代码清单 4-11.** `CoinsController.m (createAndLayoutImages)`\n\n```\n\
    -(void)createAndLayoutImages{\n    int rowCount = [coinsGame rowCount];\n    int\
    \ colCount = [coinsGame colCount];\n\n    CGRect coinsFrame = [coinsView frame];\n\
    \    float width = coinsFrame.size.width/colCount;\n    float height = coinsFrame.size.height/rowCount;\n\
    \n    for (int r = 0;r < rowCount;r++){\n        for (int c = 0;c < colCount;c++){\n\
    \n            UIImageView* imageView = [[UIImageView alloc] init];\n         \
    \   CGRect frame = NnCGRectMake(c*width, r*height, width, height);\n         \
    \   [imageView setFrame:frame];\n\n            [coinsView addSubview: imageView];\n\
    \            [self spinCoinAt:CoordMake(r, c)];\n        }\n    }\n}\n```\n\n\
    代码清单 4-11 显示了游戏中要使用的行数和列数。在此示例中，两者都是 5。`coinsView`的`frame`存储在变量`coinsFrame`中以便引用，并计算每个硬币视图的`width`和`height`。两个`for`循环为每一行和每一列创建一个`imageView`，设置其`frame`，并将其添加到`coinsView`中。在嵌套循环中，调用了`spinCoinAt:`，它创建了硬币旋转效果。请注意，传递给`spinCoinAt:`的参数是函数`CoordMake`的结果。我们在查看`spinCoinAt:`（如代码清单\
    \ 4-12 所示）之后，再查看这个函数和`CoinsGame`类。\n\n**代码清单 4-12.** `CoinsController.m (spinCoinAt:)`\n\
    \n```\n-(void)spinCoinAt:(Coord)coord{\n    UIImageView* coinView = [[coinsView\
    \ subviews] objectAtIndex:[coinsGame indexForCoord:coord]];\n\n    NSNumber* coin\
    \ = [coinsGame coinForCoord:coord];\n    NSArray* images = [imageSequences objectAtIndex:[coin\
    \ intValue]];\n    [coinView setAnimationImages: images];\n    NSTimeInterval\
    \ interval = (random()%4)/10.0 + .6;\n    [coinView setAnimationDuration: interval];\n\
    \    [coinView startAnimating];\n}\n```\n\n你可以看到`spinCoinAt:`接受一个`Coord`类型的参数。该类型在`CoinsGame.h`中定义，是一个表示特定行和列上硬币的结构体。在此任务的第一行中，使用`Coord`结构体来查找代表该特定硬币的`UIView`的索引。之所以能这样做，是因为每个硬币恰好对应一个`UIImageView`（这是在代码清单\
    \ 4-11 中设置的）。找到正确的`UIImageView`后，我们从`coinsGame`对象中获取该硬币的值。`NSNumber coin`表示这组特定坐标的硬币类型——要么是三角形、正方形，要么是圆形。使用`coin`的`intValue`，我们从`imageSequences`中取出一个名为`images`的`NSArray`。`NSArray\
    \ image`存储了构成旋转硬币动画的所有图片。通过在`UIImageView coinView`上调用`setAnimationImages:`，我们指示这个`UIIMageView`循环遍历`images`中的每个`UIIMage`以产生动画效果。将动画持续时间设置为随机值并调用`startAnimating`，就创建了旋转效果。在设置的这一阶段，应用程序看起来会非常像之前显示的图\
    \ 4-6。我们现在已经准备好开始接受用户输入。\n```"
- fmt: "在开始之前，我们先仔细看看`CoinsGame`类，以便理解我们是如何表示这25枚硬币及其类型的。  \n**模型**  \n你已经看过了设置代码，它使用`UIViews`和`UIImageViews`在屏幕上创建了表示游戏的场景。你知道游戏由25枚硬币组成，排列成5x5的网格。现在，我们来看看负责管理这些数据的类，让我们先看`CoinsGame.h`，如[清单4-13](#9781430244226_Ch04.xhtml#list13)所示。\n\
    \n**[清单4-13.]** `CoinsGame.h`\n\n```objc\n#import <Foundation/Foundation.h>\n\n\
    #define COIN_TRIANGLE 0\n#define COIN_SQUARE 1\n#define COIN_CIRCLE 2\n\nstruct\
    \ Coord {\n    int row;\n    int col;\n};\ntypedef struct Coord Coord;\n\nCG_INLINE\
    \ Coord CoordMake(int r, int c) {\n    Coord coord;\n    coord.row = r;\n    coord.col\
    \ = c;\n    return coord;\n}\n\nCG_INLINE BOOL CoordEqual(Coord a, Coord b) {\n\
    \    return a.col == b.col && a.row == b.row;\n}\n\n@interface CoinsGame : NSObject\
    \ < NSCoding > {\n    NSMutableArray* coins;\n    int remaingTurns;\n    int score;\n\
    \    int colCount;\n    int rowCount;\n}\n\n@property (nonatomic, retain) NSMutableArray*\
    \ coins;\n@property (nonatomic) int remaingTurns;\n@property (nonatomic) int score;\n\
    @property (nonatomic) int colCount;\n@property (nonatomic) int rowCount;\n\n-(id)initRandomWithRows:(int)rows\
    \ Cols:(int)cols;\n\n-(NSNumber*)coinForCoord:(Coord)coord;\n-(int)indexForCoord:(Coord)coord;\n\
    \n-(void)swap:(Coord)coordA With:(Coord)coordB;\n-(NSMutableArray*)findMatchingRows;\n\
    -(NSMutableArray*)findMatchingCols;\n-(void)randomizeRows:(NSMutableArray*)matchingRows;\n\
    -(void)randomizeCols:(NSMutableArray*)matchingCols;\n\n@end\n```\n\n[清单4-13](#9781430244226_Ch04.xhtml#list13)展示了`CoinsGame`类的头文件。在类的顶部，我们定义了三个常量：`COIN_TRIANGLE`、`COIN_SQUARE`和`COIN_CIRCLE`。这些值代表了游戏中三种类型的硬币。我们还定义了一个名为`Coord`的结构体，用于存储行/列值对。`Coord`结构体早在[清单4-12](#9781430244226_Ch04.xhtml#list12)中就已用于标识特定的硬币。还有两个与`Coord`结构体配合使用的函数。第一个名为`CoordMake`，用于创建包含相应行和列值的`Coord`。第二个名为`CoordEqual`，用于判断两个`Coord`是否指向同一枚硬币。\n\
    \n[清单4-13](#9781430244226_Ch04.xhtml#list13)中显示的`CoinsGame`类接口声明遵循了`NSCoding`协议，因此我们知道可以对该类的实例进行归档和解档。我们还看到定义了一个名为`coins`的`NSMutableArray`。`coins`对象用于存储表示每个坐标上硬币类型的`NSNumber`值。此外，使用`int`类型来跟踪剩余回合数、分数以及本游戏中使用的行数和列数。\n\
    \n`CoinsGame`类定义了多种任务，希望其中一些已经很明确了。我们知道需要一种方法来交换两枚硬币，因此使用`swap:With:`任务是有意义的。还有两个任务，`findMatchingRows`和`findMatchingCols`，用于判断是否存在匹配。在找到匹配后，使用`randomizeRows`和`randomizeCols`任务来设置新的硬币值。请注意，`findMatchingRows`返回一个`NSMutableArray`，而`randomizeRows`接受一个`NSMutableArray`。这里的思路是，在找到匹配并且动画完成后，我们可以使用表示该匹配的同一个`NSMutableArray`来指示哪些硬币应该被随机化。\n\
    \n[清单4-13](#9781430244226_Ch04.xhtml#list13)还有两个以`Coord`为参数的任务。第一个是`coinForCoord:`，它接受一个`Coord`并返回`NSNumber`，表示该坐标处的硬币类型。\n\
    \n第二个任务是`indexForCoord`，用于将`Coord`转换为适合用作数组索引的`int`类型。该任务在`coinForCoord`中用于查找硬币对应的`NSNumber`，同时也被`CoinsController`用来查找硬币对应的正确`UIImageView`。\n\
    \n我们来看一些任务的实现，因为`CoinsController`会在不同阶段调用它们。我们从`initRandomWithRow:Col:`开始，如[清单4-14](#9781430244226_Ch04.xhtml#list14)所示。\n\
    \n**[清单4-14.]** `CoinsGame.m (initRandomWithRows:Cols:)`\n\n```objc\n-(id)initRandomWithRows:(int)rows\
    \ Cols:(int)cols{\n    self = [super init];\n    if (self != nil){\n        coins\
    \ = [NSMutableArray new];\n\n        colCount = cols;\n        rowCount = rows;\n\
    \n        int numberOfCoins = colCount*rowCount;\n\n        for (int i=0;i<numberOfCoins;i++){\n\
    \            int result = arc4random()%3;\n            [coins addObject:[NSNumber\
    \ numberWithInt:result]];\n        }\n\n        //Ensure we don't start with any\
    \ matching rows and cols.\n        NSMutableArray* matchingRows = [self findMatchingRows];\n\
    \        NSMutableArray* matchingCols = [self findMatchingCols];\n        while\
    \ ([matchingCols count] > 0 || [matchingRows count] > 0){\n            [self randomizeRows:\
    \ matchingRows];\n            [self randomizeCols: matchingCols];\n\n        \
    \    matchingRows = [self findMatchingRows];\n            matchingCols = [self\
    \ findMatchingCols];\n        }\n\n        remaingTurns = 10;\n        score =\
    \ 0;\n    }\n    return self;\n}\n```\n\n在[清单4-14](#9781430244226_Ch04.xhtml#list14)中，我们看到了用于创建包含随机硬币的`CoinsGame`对象的初始化任务。在创建了一个新的`NSMutableArray`并将其赋值给变量`coins`后，我们用游戏中所有硬币的总数填充它。结果的值将为0、1或2。设置完第一组随机值后，我们需要确保游戏开始时没有任何匹配。这通过首先调用`findMatchingRows`和`findMatchingCols`并检查它们是否包含内容来实现。如果包含，我们就对这些匹配进行随机化，直到找不到更多的匹配。最后，我们将剩余回合数设置为10，并确保分数从0开始。继续探索`CoinsGame`类，我们来看看`coinForCoord:`，如[清单4-15](#9781430244226_Ch04.xhtml#list15)所示。\n\
    \n**[清单4-15.]** `CoinsGame.m (coinForCoord:)`\n\n```objc\n-(NSNumber*)coinForCoord:(Coord)coord{\n\
    \    int index = [self indexForCoord:coord];\n    return [coins objectAtIndex:index];\n\
    }\n```\n\n任务`coinForCoord:`接受一个`Coord`并返回该位置处的硬币类型。这是通过查找`NSMutableArray coins`中给定索引处的`NSNumber`对象来实现的。该`index`由调用`indexForCoord:`确定，如[清单4-16](#9781430244226_Ch04.xhtml#list16)所示。\n\
    \n**[清单4-16.]** `CoinsGame.m (indexForCoord:)`\n\n```objc\n-(int)indexForCoord:(Coord)coord{\n\
    \    return coord.row*colCount + coord.col;\n}\n```\n\n任务`indexForCoord:`接受一个`Coord`结构体。这个简单的任务将游戏中的列数乘以`coord`的行值，再加上列值。\n\
    \n`CoinsGame.m`中还有几个任务需要探讨，以帮助您理解`CoinsController`在其生命周期不同阶段的行为。我们接着看任务`swap:With:`，如[清单4-17](#9781430244226_Ch04.xhtml#list17)所示。\n\
    \n**[清单4-17.]** `CoinsGame.m (swap:With:)`"
