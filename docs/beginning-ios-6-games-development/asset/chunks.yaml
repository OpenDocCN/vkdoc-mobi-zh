    \ (longPressGesture:)`\n\n``` \n-(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer{\
    \     \n    if ([longPressRecognizer state] == UIGestureRecognizerStateBegan){\
    \         \n        [viper setState:VPR_STATE_TRAVELING];         \n        longStart\
    \ = [NSDate date];     \n    } else if ([longPressRecognizer state] == UIGestureRecognizerStateEnded){\
    \         \n        NSDate* now = [NSDate date];         \n        float damage\
    \ = 20;         \n        if ([now timeIntervalSinceDate:longStart] > 1.0f){ \
    \            \n            damage = 30;         \n        }         \n       \
    \ [self fireBulletAt:[longPressRecognizer locationInView:actorsView] WithDamage:damage];\
    \         \n        [viper setState:VPR_STATE_STOPPED];     \n    } \n} \n```\n\
    \n在代码清单 8-26 中，我们根据`longPressRecognizer`的状态决定执行什么操作。如果手势已经开始，我们将时间记录在变量`longStart`中，同时将\
    \ Viper 对象的状态设置为`VPR_STATE_TRAVELING`，这会显示飞船的推进效果。如果你体验过演示应用，就会注意到推进效果是在手势触发的一秒延迟后才出现的。这意味着`longPressGesture:`方法要等到这段最短时间过后才会被调用。\n\
    \n如果`longPressRecognizer`的状态是`UIGestureRecognizerStateEnded`，我们就知道用户已经抬起了手指。此时，我们会检查自手势开始是否已经超过一秒。如果是，则将伤害值从\
    \ 20 提升到 30。这意味着如果用户按住手指一秒钟，下一颗子弹造成 20 点伤害；如果按住两秒钟，伤害则为 30。当长按手势结束时，我们将 Viper\
    \ 的状态重置为`VPR_STATE_STOPPED`，并以相应的伤害值发射子弹。\n\n## 添加子弹\n\n让我们来看一下`fireBulletAt:WithDamage:`的实现，以完成这个示例。参见代码清单\
    \ 8-27。\n\n**代码清单 8-27.** `LongPressController.m (fireBulletAt:WithDamage:)`\n\
    \n``` \n-(void)fireBulletAt:(CGPoint)point WithDamage:(float)damage{     \n  \
    \  Bullet* bullet = [Bullet bulletAt:[viper center] TowardPoint:point];     \n\
    \    [bullet setDamage:damage];     \n    [self addActor:bullet]; \n} \n```\n\n\
    在代码清单 8-27 中，我们看到只是简单地创建了一个新的`Bullet` actor，它被配置为向指定点移动，并将其添加到场景中。\n\n## 轻扫手势\n\
    \n轻扫手势最广为人知的用途大概是在主屏幕上切换应用显示集。这种手势常用于切换上下文，就像在主屏幕上那样。其他例子包括在`iPad` 2 和 3 上用于切换前台应用的四指轻扫。这有点像在你的运行应用中翻阅。在我们的示例中，将使用轻扫手势向场景中添加彗星，如图\
    \ 8-7 所示。\n\n在图 8-7 中，我们看到屏幕上有几颗彗星。每颗彗星都是由一个轻扫手势创建的，该手势决定了彗星从何处开始以及向哪个方向移动。例如，向右轻扫会使彗星从左侧创建并向右移动。让我们看一下代码清单\
    \ 8-28 中`SwipeGestureController`类的`doSetup`任务。\n\n![9781430244226_Fig08-07.jpg](img/9781430244226_Fig08-07.jpg)\n\
    \n图 8-7. 轻扫手势创建彗星\n\n**代码清单 8-28.** `SwipeGestureController.m (doSetup)`\n\n```\
    \ \n-(BOOL)doSetup{     \n    if ([super doSetup]){         \n        [self setGameAreaSize:CGSizeMake(320,\
    \ 480)];  \n  \n        UISwipeGestureRecognizer* down = [[UISwipeGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(swipeGesture:)];         \n    \
    \    [down setDirection:UISwipeGestureRecognizerDirectionDown];         \n   \
    \     [actorsView addGestureRecognizer:down];  \n  \n        UISwipeGestureRecognizer*\
    \ up = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];\
    \         \n        [up setDirection:UISwipeGestureRecognizerDirectionUp];   \
    \      \n        [actorsView addGestureRecognizer:up];  \n  \n        UISwipeGestureRecognizer*\
    \ left = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];\
    \         \n        [left setDirection:UISwipeGestureRecognizerDirectionLeft];\
    \         \n        [actorsView addGestureRecognizer:left];  \n  \n        UISwipeGestureRecognizer*\
    \ right = [[UISwipeGestureRecognizer alloc] initWithTarget:self action:@selector(swipeGesture:)];\
    \         \n        [right setDirection:UISwipeGestureRecognizerDirectionRight];\
    \         \n        [actorsView addGestureRecognizer:right];  \n  \n        return\
    \ YES;     \n    }     \n    return NO; \n} \n```\n\n在代码清单 8-28 中，我们看到了注册此示例手势识别器的代码。我们看到为每个想要监听的方向创建了一个`UISwipeGestureRecognizer`。此示例中唯一的意外之处是，需要四个不同的手势识别器才能实现我们的目的。`UISwipeGestureRecognizer`确实允许你为多个方向指定一个识别器。然而，在响应轻扫手势时，设备无法判断手势的方向。只有为每个方向创建一个识别器，我们才能判断用户手势的方向。\n\
    \n让我们来看一下任务`swipeGesture:`。参见代码清单 8-29。\n\n**代码清单 8-29.** `SwipeGestureController.m\
    \ (swipeGesture:)`\n\n``` \n-(void)swipeGesture:(UISwipeGestureRecognizer*)swipeRecognizer{\
    \     \n    CGSize gameSize = [self gameAreaSize];  \n  \n    UISwipeGestureRecognizerDirection\
    \ direction = [swipeRecognizer direction];     \n    CGPoint locationInView =\
    \ [swipeRecognizer locationInView:actorsView];  \n  \n    CGPoint center = CGPointMake(0,\
    \ 0);     \n    float directionInRadians = DIRECTION_DOWN;  \n  \n    if (direction\
    \ == UISwipeGestureRecognizerDirectionRight){         \n        center.x = −20;\
    \         \n        center.y = locationInView.y;         \n        directionInRadians\
    \ = DIRECTION_RIGHT;     \n    } else if (direction == UISwipeGestureRecognizerDirectionDown){\
    \         \n        center.x = locationInView.x;         \n        center.y =\
    \ −20;         \n        directionInRadians = DIRECTION_DOWN;     \n    } else\
    \ if (direction == UISwipeGestureRecognizerDirectionLeft){         \n        center.x\
    \ = gameSize.width + 20;         \n        center.y = locationInView.y;      \
    \   \n        directionInRadians = DIRECTION_LEFT;     \n    } else if (direction\
    \ == UISwipeGestureRecognizerDirectionUp){         \n        center.x = locationInView.x;\
    \         \n        center.y = gameSize.height + 20;         \n        directionInRadians\
    \ = DIRECTION_UP;     \n    }     \n    Comet* comet = [Comet comet:self withDirection:directionInRadians\
    \ andCenter:center];     \n    [self addActor:comet]; \n} \n```\n\n在代码清单 8-29\
    \ 中，我们看到了当识别到轻扫手势时调用的代码。为了达到我们想要的效果，我们只需创建一个新的`Comet` actor，并为其设置正确的位置和方向。要确定彗星应该放置在哪里以及向哪个方向移动，我们只需查看`swipeRecognizer`的方向属性即可。\n\
    \n我们不会深入探讨`Comet`类是如何实现的细节；这个话题我们已经详细讨论过了。如果你确实感兴趣，请查阅提供的源代码。\n\n我们已经了解了`iOS`中内置的手势识别器，并探索了它们工作原理的基础知识。在下一节中，我们将探讨如何将设备的运动集成到应用程序中。\n"
- fmt: "# Interpreting Device Movements\n\nStarting with the `iPhone` 4, `iOS` devices\
    \ have an accelerometer and a gyroscopic sensor built into them. There are several\
    \ ways to use these sensors in an application. The two most common ways are to\
    \ simply respond to a motion event, which corresponds to shaking the device. The\
    \ other and more fine-tuned way is to access the orientation data of these sensors\
    \ directly through the `UIAccelerometer` class. Let’s take a look at the shaking\
    \ example first.\n\n## Responding to a Motion Event (Shaking)\n\nWhenever an `iOS`\
    \ device is shaken, a motion event is generated for the application to consume.\
    \ Personally, I find using the shake in an application to be super annoying; however,\
    \ some people think it is a good idea, so let’s look at how we can take advantage\
    \ of this feature. [Figure 8-8](#9781430244226_Ch08.xhtml#Fig8) shows our example.\n\
    \n![9781430244226_Fig08-08.jpg](images/9781430244226_Fig08-08.jpg)\n\n[Figure\
    \ 8-8.](#9781430244226_Ch08.xhtml#_Fig8)  Asteroids breaking apart from a device\
    \ shake\n\nIn [Figure 8-8](#9781430244226_Ch08.xhtml#Fig8), we see a number of\
    \ asteroids. These asteroids used to be a single asteroid, but a few shake events\
    \ caused it to break apart. The class for this example is called `ShakeController`\
    \ and extends `GameController`. There is nothing particularly interesting about\
    \ its header file, so let’s just jump to its `doSetup` task, shown in [Listing\
    \ 8-30](#9781430244226_Ch08.xhtml#list30).\n\n**[Listing 8-30](#9781430244226_Ch08.xhtml#_list30).** `ShakeController.m\
    \ (doSetup)`\n\n```\n-(BOOL)doSetup{\n    if ([super doSetup]){\n        [self\
    \ setGameAreaSize:CGSizeMake(320, 480)];\n        NSMutableArray* classes = [NSMutableArray\
    \ new];\n        [classes addObject:[Asteroid class]];\n        [self setSortedActorClasses:classes];\n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\nIn [Listing 8-30](#9781430244226_Ch08.xhtml#list30),\
    \ we see the task `doSetup` that configures the `ShakeController`, marking `Asteroid`\
    \ as a class of actor we will want to get access to later. We add our `Asteroid`\
    \ in the task `updateScene`. We do this since we want to add a new `Asteroid`\
    \ only when there are no `Asteroid` objects in the scene, as can be seen in [Listing\
    \ 8-31](#9781430244226_Ch08.xhtml#list31).\n\n**[Listing 8-31](#9781430244226_Ch08.xhtml#_list31).** `ShakeController\
    \ (updateScene)`\n\n```\n-(void)updateScene{\n    if ([[self actorsOfType:[Asteroid\
    \ class]] count] ==0 ){\n        Asteroid* asteroid = [Asteroid asteroid:self];\n\
    \        [self addActor:asteroid];\n    }\n    [super updateScene];\n}\n```\n\n\
    In [Listing 8-31](#9781430244226_Ch08.xhtml#list31), we see the `updateScene`\
    \ task that is called in order to move the game forward through each step of the\
    \ animation. In this task, we check to see if there are `Asteroid` objects in\
    \ the scene; if there are none, we go ahead and add one. Lastly, we call the super-implementation\
    \ of `updateScene` to drive the game forward.\n\nNow the question is, How do we\
    \ respond to shake events so we can blow up the asteroid? By informing the application\
    \ that the top view can become the “first responder” and implement the appropriate\
    \ method to respond to a motion event, we achieve this. A `UIView` that is the\
    \ first responder is a `UIView` that gets the first crack at interpreting user\
    \ input. There are two steps to getting a view to be first responder: first, you\
    \ have to inform the application that the view property of a `UIViewController`\
    \ can be the first responder; then, you have to make a request to become first\
    \ responder. [Listing 8-32](#9781430244226_Ch08.xhtml#list32) shows the code to\
    \ accomplish this.\n\n**[Listing 8-32](#9781430244226_Ch08.xhtml#_list32).** `ShakeController\
    \ (first responder related tasks)`\n\n```\n-(BOOL)canBecomeFirstResponder {\n\
    \    return YES;\n}\n-(void)viewDidAppear:(BOOL)animated {\n    [super viewDidAppear:animated];\n\
    \    [self becomeFirstResponder];\n}\n- (void)viewWillDisappear:(BOOL)animated\
    \ {\n    [self resignFirstResponder];\n    [super viewWillDisappear:animated];\n\
    }\n```\n\nIn [Listing 8-32](#9781430244226_Ch08.xhtml#list32), we see three tasks.\
    \ The first task, `canBecomeFirstResponder`, simply informs the application that\
    \ the view property of this `UIViewController` is eligible to be first responder,\
    \ and that this `UIViewController` will handle its events. The next two tasks\
    \ are part of a `UIViewController`'s life cycle. When `viewDidAppear:` is called\
    \ and this `UIViewController`'s view property is displayed, we can become first\
    \ responder by calling `becomeFirstResponder`. Or, when this `UIViewController`\
    \ is removed from the screen, we no longer want this `UIViewController` to be\
    \ first responder, so we call `resignFirstResponder`. These three tasks simply\
    \ make this class eligible to receive motion events; they are handled in the implementation\
    \ of the task `motionBegan:withEvent:` and `motionEnded:withEvent:`. We only need\
    \ to implement one of these in our example: the implementation of `motionBegan:withEvent:`\
    \ is shown in [Listing 8-33](#9781430244226_Ch08.xhtml#list33).\n\n**[Listing\
    \ 8-33](#9781430244226_Ch08.xhtml#_list33).** `ShakeController.m (motionBegan:withEvent:)`\n\
    \n```\n- (void)motionBegan:(UIEventSubtype)motion withEvent:(UIEvent *)event {\n\
    \    if (motion == UIEventSubtypeMotionShake)\n    {\n        for (Asteroid* asteroid\
    \ in [self actorsOfType:[Asteroid class]]){\n            [asteroid doHit:self];\n\
    \        }\n    }\n}\n```\n\nIn [Listing 8-33](#9781430244226_Ch08.xhtml#list33),\
    \ we see the task `motionBegan:withEvent:`, where we first check that the motion\
    \ sub-type is a `UIEventSubtypeMotionShake`. If it is, we simply iterate over\
    \ all of the asteroids in the scene and call `doHit:` on them. The task `doHit:`\
    \ causes each asteroid to break apart into a number of smaller asteroids. The\
    \ details of `doHit:` are discussed in [Chapter 7](#9781430244226_Ch07.xhtml).\n\
    \nAs we can see, responding to shake events is pretty simple—very much like responding\
    \ to touch events. I find it a little weird that shake events are not implemented\
    \ as a gesture. I suspect the reason is that shake events have been around before\
    \ the many different gesture recognizers made it into the SDK.\n\n## Responding\
    \ to Accelerometer Data\n\nAs a developer, being able to know the orientation\
    \ of the device is really cool to me. It allows things like augmented reality\
    \ to be possible, as well as a bunch of other cool things. The last example in\
    \ this chapter will use the accelerometer to manipulate actors in our scene. I\
    \ can’t promise it will be as cool as an augmented reality game, but it should\
    \ help to pave the way for other developers. [Figure 8-9](#9781430244226_Ch08.xhtml#Fig9)\
    \ shows the accelerometer example being run.\n\n![9781430244226_Fig08-09.jpg](images/9781430244226_Fig08-09.jpg)\n\
    \n[Figure 8-9.](#9781430244226_Ch08.xhtml#_Fig9)  Multiple screen of accelerometer\
    \ demo\n\nIn [Figure 8-9](#9781430244226_Ch08.xhtml#Fig9), we see several screenshots\
    \ of this example superimposed. In this example, the location of the `Viper` is\
    \ based on the X and Y accelerometer values, so when the `iPhone` is flat on its\
    \ back, the spaceship should be in the center of the game area. When the device\
    \ is tilted to the left, the ship moves to the left. When the device is tilted\
    \ up, the ship will move up, and so on. [Figure 8-9](#9781430244226_Ch08.xhtml#Fig9)\
    \ highlights how jumpy the accelerometer data are. These were all taken while\
    \ I was trying to hold the device flat (though I was trying to take screenshots\
    \ at the same time). For a real application, the accelerometer data would need\
    \ to be massaged."
  raw: 'Interpreting Device Movements    Starting with the `iPhone` 4, `iOS` devices
    have an accelerometer and a gyroscopic sensor built into them. There are several
    ways to use these sensors in an application. The two most common ways are to simply
    respond to a motion event, which corresponds to shaking the device. The other
    and more fine-tuned way is to access the orientation data of these sensors directly
    through the `UIAccelerometer` class. Let’s take a look at the shaking example
    first.    Responding a to Motion Event (Shaking)    Whenever an `iOS` device is
    shaken, a motion event is generated for the application to consume. Personally,
    I find using the shake in an application to be super annoying; however, some people
    think it is a good idea, so let’s look at how we can take advantage of this feature.
    [Figure 8-8](#9781430244226_Ch08.xhtml#Fig8) shows our example.    ![9781430244226_Fig08-08.jpg](images/9781430244226_Fig08-08.jpg)    [Figure
    8-8.](#9781430244226_Ch08.xhtml#_Fig8)  Asteroids breaking apart from a device
    shake    In [Figure 8-8](#9781430244226_Ch08.xhtml#Fig8), we see a number of asteroids.
    These asteroids used to be a single asteroid, but a few shake events caused it
    to break apart. The class for this example is called `ShakeController` and extends
    `GameController`. There is nothing particularly interesting about its header file,
    so let’s just jump to its `doSetup` task, shown in [Listing 8-30](#9781430244226_Ch08.xhtml#list30).    **[Listing
    8-30](#9781430244226_Ch08.xhtml#_list30).** `ShakeController.m (doSetup)`    ```
    -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(320,
    480)];          NSMutableArray* classes = [NSMutableArray new];         [classes
    addObject:[Asteroid class]];          [self setSortedActorClasses:classes];          return
    YES;     }     return NO; } ```    In [Listing 8-30](#9781430244226_Ch08.xhtml#list30),
    we see the task `doSetup` that configures the `ShakeController`, marking Asteroid
    as a class of actor we will want to get access to later. We add our Asteroid in
    the task `updateScene`. We do this since we want to add a new Asteroid only when
    there are no Asteroid objects in the scene, as can be seen in [Listing 8-31](#9781430244226_Ch08.xhtml#list31).    **[Listing
    8-31](#9781430244226_Ch08.xhtml#_list31).** `ShakeController (updateScene)`    ```
    -(void)updateScene{     if ([[self actorsOfType:[Asteroid class]] count] ==0 ){
            Asteroid* asteroid = [Asteroid asteroid:self];         [self addActor:asteroid];
        }     [super updateScene]; } ```    In [Listing 8-31](#9781430244226_Ch08.xhtml#list31),
    we see the `updateScene` task that is called in order to move the game forward
    through each step of the animation. In this task, we check to see if there are
    Asteroid objects in the scene; if there are none, we go ahead and add one. Lastly,
    we call the super-implementation of `updateScene` to drive the game forward.    Now
    the question is, How do we respond to shake events so we can blow up the asteroid?
    By informing the application that the top view can become the “first responder”
    and implement the appropriate method to respond to a motion event, we achieve
    this. A `UIView` that is the first responder is a `UIView` that gets the first
    crack at interpreting user input. There are two steps to getting a view to be
    first responder: first, you have to inform the application that the view property
    of a `UIViewController` can be the first responder; then, you have to make a request
    to become first responder. [Listing 8-32](#9781430244226_Ch08.xhtml#list32) shows
    the code to accomplish this.    **[Listing 8-32](#9781430244226_Ch08.xhtml#_list32).


    ** `ShakeController (first responder related tasks` `)`    ``` -(BOOL)canBecomeFirstResponder
    {     return YES; } -(void)viewDidAppear:(BOOL)animated {     [super viewDidAppear:animated];
        [self becomeFirstResponder]; } - (void)viewWillDisappear:(BOOL)animated {
        [self resignFirstResponder];     [super viewWillDisappear:animated]; } ```    In
    [Listing 8-32](#9781430244226_Ch08.xhtml#list32), we see three tasks. The first
    task, `canBecomeFirstResponder`, simply informs the application that the view
    property of this `UIViewController` is eligible to be first responder, and that
    this `UIViewController` will handle its events. The next two tasks are part of
    a `UIViewController''s` life cycle. When `viewDidAppear`: is called and this `UIViewController''s`
    view property is displayed,  we can become first responder by calling `becomeFirstResponder`.
    Or,  when this `UIViewsController` is removed from the screen, we no longer want
    this `UIViewController` to be first responder, so we call `resignFirstResponder`.
    These three tasks simply make this class eligible to receive motion events; they
    are handled in the implementation of the task `motionBegan:withEvent`: and `motionEnded:withEvent`:.
    We only need to implement one of these in our example: the implementation of `motionBegan:withEvent`:
    is shown in [Listing 8-33](#9781430244226_Ch08.xhtml#list33).    **[Listing 8-33](#9781430244226_Ch08.xhtml#_list33).** `ShakeController.m
    (motionBegan:withEvent:` `)`    ``` - (void)motionBegan:(UIEventSubtype)motion
    withEvent:(UIEvent *)event {     if (motion == UIEventSubtypeMotionShake)     {
            for (Asteroid* asteroid in [self actorsOfType:[Asteroid class]]){             [asteroid
    doHit:self];         }     } } ```    In [Listing 8-33](#9781430244226_Ch08.xhtml#list33),
    we see the task `motionBegan:withEvent`:, where we first check that the motion
    sub-type is a `UIEventSubtypeMotionShake`. If it is, we simply iterate over all
    of the asteroids in the scene and call `doHit`: on them. The task `doHit`: causes
    each asteroid to break apart into a number of smaller asteroids. The details of
    `doHit`: are discussed in [Chapter 7](#9781430244226_Ch07.xhtml).    As we can
    see, responding to shake events is pretty simple—very much like responding to
    touch events. I find it a little weird that shake events are not implemented as
    a gesture. I suspect the reason is that shake events have been around before the
    many different gesture recognizers made it into the SDK.    Responding to Accelerometer
    Data    As a developer, being able to know the orientation of the device is really
    cool to me. It allows things like augmented reality to be possible, as well as
    a bunch of other cool things. The last example in this chapter will use the accelerometer
    to manipulate actors in our scene. I can’t promise it will be as cool as an augmented
    reality game, but it should help to pave the way for other developers. [Figure
    8-9](#9781430244226_Ch08.xhtml#Fig9) shows the accelerometer example being run.    ![9781430244226_Fig08-09.jpg](images/9781430244226_Fig08-09.jpg)    [Figure
    8-9.](#9781430244226_Ch08.xhtml#_Fig9)  Multiple screen of accelerometer demo    In
    [Figure 8-9](#9781430244226_Ch08.xhtml#Fig9), we see several screenshots of this
    example superimposed. In this example, the location of the Viper is based on the
    X and Y accelerometer values, so when the `iPhone` is flat on its back, the spaceship
    should be in the center of the game area. When the device is tilted to the left,
    the ship moves to the left. When the device is tilted up, the ship will move up,
    and so on. [Figure 8-9](#9781430244226_Ch08.xhtml#Fig9) highlights how jumpy the
    accelerometer data are. These were all taken while I was trying to hold the device
    flat (though I was trying to take screenshots at the same time). For a real application,
    the accelerometer data would need to be massaged.'
  trans: "\n# 解读设备运动\n\n从 `iPhone` 4 开始，`iOS` 设备内置了加速度计和陀螺仪传感器。在应用程序中，有几种方法可以使用这些传感器。最常见的两种方法是：简单地响应运动事件（对应摇动设备），以及更精细的方法——通过\
    \ `UIAccelerometer` 类直接访问这些传感器的方向数据。我们先来看一下摇动示例。\n\n## 响应运动事件（摇动）\n\n每当 `iOS`\
    \ 设备被摇动时，就会生成一个运动事件供应用程序消费。就我个人而言，我觉得在应用程序中使用摇动功能非常烦人；不过，有些人认为这是个好主意，所以我们来看看如何利用这一特性。图\
    \ 8-8 展示了我们的示例。\n\n![9781430244226_Fig08-08.jpg](img/9781430244226_Fig08-08.jpg)\n\
    \n图 8-8.  小行星因设备摇动而碎裂\n\n在图 8-8 中，我们看到许多小行星。这些小行星原本是一颗，但几次摇动事件使其碎裂。该示例的类名为 `ShakeController`，继承自\
    \ `GameController`。它的头文件没有什么特别之处，所以我们直接跳到 `doSetup` 任务，如代码清单 8-30 所示。\n\n**代码清单\
    \ 8-30.** `ShakeController.m (doSetup)`\n\n```\n-(BOOL)doSetup{\n    if ([super\
    \ doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n        NSMutableArray*\
    \ classes = [NSMutableArray new];\n        [classes addObject:[Asteroid class]];\n\
    \        [self setSortedActorClasses:classes];\n        return YES;\n    }\n \
    \   return NO;\n}\n```\n\n在代码清单 8-30 中，我们看到 `doSetup` 任务配置了 `ShakeController`，将\
    \ `Asteroid` 标记为我们稍后要访问的 actor 类。我们在 `updateScene` 任务中添加 `Asteroid`。这样做是因为只有当场景中没有\
    \ `Asteroid` 对象时，我们才想添加一个新的 `Asteroid`，如代码清单 8-31 所示。\n\n**代码清单 8-31.** `ShakeController\
    \ (updateScene)`\n\n```\n-(void)updateScene{\n    if ([[self actorsOfType:[Asteroid\
    \ class]] count] ==0 ){\n        Asteroid* asteroid = [Asteroid asteroid:self];\n\
    \        [self addActor:asteroid];\n    }\n    [super updateScene];\n}\n```\n\n\
    在代码清单 8-31 中，我们看到 `updateScene` 任务被调用，以便在动画的每一步中推动游戏前进。在此任务中，我们检查场景中是否存在 `Asteroid`\
    \ 对象；如果没有，就添加一个。最后，我们调用 `updateScene` 的父类实现来推动游戏前进。\n\n现在的问题是，我们如何响应摇动事件来炸毁小行星？通过告知应用程序顶层视图可以成为“第一响应者”，并实现相应的方法来响应运动事件，我们就能实现这一点。作为第一响应者的\
    \ `UIView` 拥有优先处理用户输入的权利。让视图成为第一响应者需要两个步骤：首先，你必须告知应用程序 `UIViewController` 的视图属性可以作为第一响应者；然后，你需要发出成为第一响应者的请求。代码清单\
    \ 8-32 展示了实现这一点的代码。\n\n**代码清单 8-32.** `ShakeController（与第一响应者相关的任务）`\n\n```\n\
    -(BOOL)canBecomeFirstResponder {\n    return YES;\n}\n-(void)viewDidAppear:(BOOL)animated\
    \ {\n    [super viewDidAppear:animated];\n    [self becomeFirstResponder];\n}\n\
    - (void)viewWillDisappear:(BOOL)animated {\n    [self resignFirstResponder];\n\
    \    [super viewWillDisappear:animated];\n}\n```\n\n在代码清单 8-32 中，我们看到三个任务。第一个任务\
    \ `canBecomeFirstResponder` 仅仅告知应用程序该 `UIViewController` 的视图属性有资格成为第一响应者，并且该 `UIViewController`\
    \ 将处理其事件。接下来的两个任务是 `UIViewController` 生命周期的一部分。当调用 `viewDidAppear:` 并且该 `UIViewController`\
    \ 的视图属性被显示时，我们可以通过调用 `becomeFirstResponder` 成为第一响应者。或者，当该 `UIViewController` 从屏幕中移除时，我们不再希望它是第一响应者，因此调用\
    \ `resignFirstResponder`。这三个任务只是使该类能够接收运动事件；这些事件是在 `motionBegan:withEvent:` 和\
    \ `motionEnded:withEvent:` 任务的实现中处理的。在我们的示例中，只需要实现其中一个：`motionBegan:withEvent:`\
    \ 的实现如代码清单 8-33 所示。\n\n**代码清单 8-33.** `ShakeController.m (motionBegan:withEvent:)`\n\
    \n```\n- (void)motionBegan:(UIEventSubtype)motion withEvent:(UIEvent *)event {\n\
    \    if (motion == UIEventSubtypeMotionShake)\n    {\n        for (Asteroid* asteroid\
    \ in [self actorsOfType:[Asteroid class]]){\n            [asteroid doHit:self];\n\
    \        }\n    }\n}\n```\n\n在代码清单 8-33 中，我们看到 `motionBegan:withEvent:` 任务，我们首先检查运动子类型是否为\
    \ `UIEventSubtypeMotionShake`。如果是，我们只需遍历场景中的所有小行星并对其调用 `doHit:`。`doHit:` 任务会使每颗小行星碎裂成许多更小的小行星。`doHit:`\
    \ 的细节在第 7 章中讨论。\n\n正如我们所见，响应摇动事件非常简单——非常类似于响应触摸事件。我觉得有点奇怪的是，摇动事件没有作为手势来实现。我怀疑原因是摇动事件在多种手势识别器加入\
    \ SDK 之前就已经存在了。\n\n## 响应加速度计数据\n\n作为开发者，能够了解设备的方向对我来说真的很酷。它使增强现实等成为可能，同时也支持许多其他酷炫的功能。本章的最后一个示例将使用加速度计来操控场景中的\
    \ actor。我不能保证它会像增强现实游戏一样酷，但它应该能为其他开发者铺平道路。图 8-9 展示了加速度计示例的运行情况。\n\n![9781430244226_Fig08-09.jpg](img/9781430244226_Fig08-09.jpg)\n\
    \n图 8-9.  加速度计演示的多个屏幕\n\n在图 8-9 中，我们看到此示例的几个截图叠加在一起。在此示例中，`Viper` 的位置基于 X 和 Y\
    \ 轴的加速度计值，因此当 `iPhone` 平放时，飞船应位于游戏区域中央。当设备向左倾斜时，飞船向左移动。当设备向上倾斜时，飞船向上移动，依此类推。图\
    \ 8-9 突出显示了加速度计数据的不稳定性。这些都是在尝试保持设备平放时（尽管同时还在尝试截取屏幕截图）获取的。对于真正的应用程序，加速度计数据需要经过处理。\n"
- fmt: "The class responsible for our example is the class `AccelermoterController`,\
    \ the header of which is shown in [Listing 8-34](#9781430244226_Ch08.xhtml#list34).\n\
    \n**[Listing 8-34](#9781430244226_Ch08.xhtml#_list34).** `AccelerometerController.h`\n\
    \n```\n@interface AccelerometerController : GameController < UIAccelerometerDelegate\
    \ > {\n    Viper* viper;\n}\n@end\n```\n\nIn [Listing 8-34](#9781430244226_Ch08.xhtml#list34),\
    \ we see the header for the class `AccelerometerController`. The things to note\
    \ here are that the class `AccelerometerController` conforms to the protocol `UIAccelerometerDelegate`,\
    \ and that it has a reference to the Viper that will be moving around the screen.\
    \ Conforming the protocol allows `AccelerometerController` to receive data from\
    \ the accelerometer in real time, as we will see in a bit. Let’s first look at\
    \ how I set up the class `AccelerometerController` so it receives data, as shown\
    \ in [Listing 8-35](#9781430244226_Ch08.xhtml#list35).\n\n**[Listing 8-35](#9781430244226_Ch08.xhtml#_list35).**\
    \ `AccelerometerController.m (doSetup)`\n\n```\n-(BOOL)doSetup{\n    if ([super\
    \ doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\n       \
    \ viper = [Viper viper:self];\n        [self addActor:viper];\n\n        UIAccelerometer*\
    \  theAccelerometer = [UIAccelerometer sharedAccelerometer];\n\n        theAccelerometer.updateInterval\
    \ = 1 / 50.0;\n        theAccelerometer.delegate = self;\n        return YES;\n\
    \    }\n    return NO;\n}\n```\n\nIn [Listing 8-35](#9781430244226_Ch08.xhtml#list35),\
    \ we do the usual setup, specifying the game size area and adding the Viper that\
    \ we will be moving around with accelerometer data. To start receiving accelerometer\
    \ data, we have to get access to the singleton `UIAccelerometer` associated with\
    \ the running application. To do this, we use the static task `sharedAccelermoter`\
    \ of the class `UIAccelermoter`, and then we simply set self as the delegate.\
    \ Another thing to note is that we have to specify the frequency at which we get\
    \ data. In this case, we are requesting data 50 times a second, which is plenty\
    \ fast for real-time input. The data is actually received by a call to `accelerometer:didAccelerate:`,\
    \ as shown in [Listing 8-36](#9781430244226_Ch08.xhtml#list36).\n\n**[Listing\
    \ 8-36](#9781430244226_Ch08.xhtml#_list36).** `AccelerometerController.m (accelerometer:didAccelerate:)`\n\
    \n```\n- (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration\
    \ *)acceleration{\n    CGSize size = [self gameAreaSize];\n\n    UIAccelerationValue\
    \ x, y, z;\n    x = acceleration.x;\n    y = acceleration.y;\n    z = acceleration.z;\n\
    \    NSLog(@\"x = %f y = %f z = %f\", x, y, z);\n\n    CGPoint center = CGPointMake(size.width/2.0\
    \ * x + size.width/2.0, size.height/2.0 * y + size.height/2.0);\n    [viper setCenter:center];\n\
    }\n```\n\nIn [Listing 8-36](#9781430244226_Ch08.xhtml#list36), we simply get the\
    \ X, Y, and Z values from the `UIAcceleration` acceleration. These values range\
    \ from −1.0 to 1.0, based on the orientation of the device. Because the X value\
    \ corresponds to the device being tilted left or right (in portrait), we can simply\
    \ use the value of X to specify the X value of our new center value. We do the\
    \ same for the Y value, and set the center property of Viper.\n\nThis is a very\
    \ simple example, but I hope it will get you headed down the right track. It seems\
    \ to me that getting basic functionality working is pretty simple, as in this\
    \ example, but getting more complex user interactions just right is considerably\
    \ more work. I recommend reading the document entitled “Event Handling Guide for\
    \ `iOS`,” which is available at `http://developer.apple.com`.\n\n## Summary\n\n\
    In this chapter, we explored how to respond to basic touch events. We also looked\
    \ at how the subclasses of `UIGestureResponder` can be used to interpret those\
    \ touch events as concise gestures, such as pinches, long presses, rotations,\
    \ and more. In the last section, we looked at two ways to use the accelerometer\
    \ to control game actors.\n\nThe first method allowed us to simply respond to\
    \ a shake event. The second technique showed how we could get direct access to\
    \ accelerometer data to control our application, laying the groundwork for motion-based\
    \ gestures more complex than a simple shake.\n\n# Chapter 9: Game Center and Social\
    \ Media\n\nOne of the key ways to market your game these days is to integrate\
    \ your application with one or more social media services. The idea is that users\
    \ will promote your game as they play and share their experience with their friends.\
    \ To get users to play your game more often, it is also very common to provide\
    \ a mechanism for users to compare their scores with other players. Providing\
    \ a way for users to track their scores against others and to post their progress\
    \ is so common in game development that Apple provides libraries to support these\
    \ requirements.\n\nThe primary service provided by Apple is called Game Center,\
    \ which is implemented in the library called GameKit. Game Center is a service\
    \ that allows users to compare their scores with other players on what is called\
    \ a leaderboard. Game Center also allows users to reach what are called achievements.\
    \ Achievements are defined by each game and are intended as incentives to keep\
    \ people playing. For example, if you have an achievement that is hard to achieve,\
    \ people will want to earn it to set themselves apart from their friends playing\
    \ the same game. Game Center also provides a mechanism for multiplayer games,\
    \ but we will focus on the social aspects of its services in this chapter.\n\n\
    To broadcast a player’s progress in a game, it is common to use an existing social\
    \ media site such as Twitter or Facebook, so the user’s friends will be notified.\
    \ A new feature in iOS 5 was the inclusion of a built-in Twitter account. In this\
    \ chapter, we will look at how to use the classes that expose a Twitter account\
    \ to send a tweet on behalf of the user. New to iOS 6 is built-in Facebook support.\
    \ We will look at how Twitter and Facebook supports are wrapped into a library\
    \ called Social Framework. We will look at how we can use this library to make\
    \ posts to Facebook on behalf of the user.\n\nThe examples in this chapter are\
    \ taken from the project Belt Commander. We will continue using what you learn\
    \ in the following pages as examples for the final two chapters, as we explore\
    \ a complete game.\n\n## Game Center\n\nGame Center, as the user sees it, is an\
    \ application on an iOS device where information about a user’s games is aggregated.\
    \ This information includes a place to log in and manage your account, a list\
    \ of friends, and a list of games. For each listed game, there are a number of\
    \ leaderboards for displaying scores, as well as a list of the achievements available\
    \ in the game. [Figure 9-1](#9781430244226_Ch09.xhtml#Fig1) shows a typical Game\
    \ Center screen.\n\n![9781430244226_Fig09-01.jpg](images/9781430244226_Fig09-01.jpg)\n\
    \n[Figure 9-1.](#9781430244226_Ch09.xhtml#_Fig1) Game Center showing games\n\n\
    In [Figure 9-1](#9781430244226_Ch09.xhtml#Fig1), we see nine installed games that\
    \ support Game Center. Select a game to view its leaderboards and any achievements\
    \ the user has earned.\n\nFrom a developer’s perspective, Game Center is a set\
    \ of classes used to interact with Game Center to define the leaderboards and\
    \ achievements. Collectively, these classes are called GameKit, which is available\
    \ as part of your standard iOS SDK installation. Once GameKit is integrated with\
    \ your game, will be able to sign the user in and perform GameKit operations on\
    \ his or her behalf. [Figure 9-2](#9781430244226_Ch09.xhtml#Fig2) shows the user\
    \ being signed into GameKit.\n\n![9781430244226_Fig09-02.jpg](images/9781430244226_Fig09-02.jpg)\n\
    \n[Figure 9-2.](#9781430244226_Ch09.xhtml#_Fig2) Signing into GameKit\n\nIn [Figure\
    \ 9-2](#9781430244226_Ch09.xhtml#Fig2), we see the Welcome screen for the game\
    \ Belt Commander."
