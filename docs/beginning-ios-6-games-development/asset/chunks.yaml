    = [GKLocalPlayer localPlayer];         [localPlayer authenticateWithCompletionHandler:^(NSError
    *error) {             if (localPlayer.authenticated){                 [leaderBoardButton
    setEnabled:YES];             } else {                 [leaderBoardButton setEnabled:NO];
                }         }];     } } ```    In [Listing 9-1](#9781430244226_Ch09.xhtml#list1),
    we see the task `initGameCenter` of the class `RootViewController`. This task
    is called once at the beginning of the application launch. It first checks to
    see if GameKit is available on this iOS device by looking for the class `GKLocalPlayer`.
    The tasks also checks to see if the version of iOS is recent enough to support
    Game Center. If yes, we get a pointer to the local player by calling `localPlayer`
    on the class `GKLocalPlayer`.    To authenticate our local player, we simply call
    `authenticateWithCompletionHandler`: and pass a block that will be executed asynchronously
    when the user has authenticated (or cancelled). A block is simply a way of declaring
    a function that can be passed around as value. In this case, we are using a block
    in the same way we would use an anonymous class on a language like Java. The first
    time this code is run, the user will see something like [Figure 9-9](#9781430244226_Ch09.xhtml#Fig9).    ![9781430244226_Fig09-09.jpg](images/9781430244226_Fig09-09.jpg)    [Figure
    9-9.](#9781430244226_Ch09.xhtml#_Fig9)  First-time authentication with Game Center    In
    [Figure 9-9](#9781430244226_Ch09.xhtml#Fig9), we see the result of calling GameKit’s
    authentication task. The user is prompted to sign in to Game Center with an existing
    account, create a new account, or cancel. If the user cancels enough times, the
    application will no longer display this dialog. The exact number of times that
    the user must cancel before this happens seems to change with different releases.
    With iOS 5, it is approximately three times. Once the user has successfully authenticated,
    the application is now connected to Game Center for that user account. When the
    application is run again, calls to `authenticateWithCompletionHandler`: will call
    the handler code without pestering the user to sign in again. The user will see
    something like [Figure 9-2](#9781430244226_Ch09.xhtml#Fig2).    Once Game Center
    is enabled, we will want to start taking advantage of its features. The following
    section looks at how to report a score to a leaderboard.    Submitting Scores
    to a Leaderboard    One of the best features that Game Center provides is a built-in
    mechanism for tracking a user’s high scores across devices. It allows users to
    compare their scores with their friends’ scores, as well as with other players
    globally. The code for submitting a score is straightforward, as shown in [Listing
    9-2](#9781430244226_Ch09.xhtml#list2).    **[Listing 9-2](#9781430244226_Ch09.xhtml#_list2).** `RootViewController.m`
    (`notifyGameCenter`)    ``` -(void)notifyGameCenter{     if ([localPlayer isAuthenticated]){
            GKScore* score = [[GKScore alloc] initWithCategory:@"beltcommander.highscores"];
            score.value = ([beltCommanderController score];                   [score
    reportScoreWithCompletionHandler:^(NSError *error){             if (error){                 //handle
    error             }         }];     } } ```    In [Listing 9-2](#9781430244226_Ch09.xhtml#list2),
    we see the task `notifyGameCenter`, which is called every time a game ends. In
    this task, we check to see if the `localPlayer` is authenticated. If so, we simply
    create a `GKScore` object, specifying the ID of the leaderboard to which we are
    submitting the score—in this case, “`beltcommander.highscores`.” Once we have
    a reference to the `GKScore` object, we set the score property to the score from
    the last game. The property score can by any type of number—in this case, it is
    a `long`.


    Lastly, we call `reportScoreWithCompletionHandler`: and pass a block to handle
    any error. In our example, we don’t do anything with the error.    **Note**  If
    the user is offline or there was some sort of network issue, GameKit will automatically
    resubmit scores when it is run in the future, ensuring that a player’s hard work
    is properly recorded.    [Figure 9-10](#9781430244226_Ch09.xhtml#Fig10) shows
    a score on the leaderboard.    ![9781430244226_Fig09-10.jpg](images/9781430244226_Fig09-10.jpg)    [Figure
    9-10.](#9781430244226_Ch09.xhtml#_Fig10)  A leaderboard with a sample score    In
    [Figure 9-10](#9781430244226_Ch09.xhtml#Fig10), we see a score displayed on a
    leaderboard. There is only one score at the moment, because the screenshot was
    taken during development of the game. At the top, we can see three options for
    viewing high scores: Today, This Week, or All Time. The component that is displaying
    the high scores is a pre-built component called `GKLeaderboardViewController`
    that comes with GameKit; the code to bring up this component is shown in [Listing
    9-3](#9781430244226_Ch09.xhtml#list3).    **[Listing 9-3](#9781430244226_Ch09.xhtml#_list3). **
    `RootViewController.m` (`leaderBoardClicked:`)    ``` - (IBAction)leaderBoardClicked:(id)sender
    {         GKLeaderboardViewController* leaderBoardController = [[GKLeaderboardViewController
    alloc] init];         leaderBoardController.category = @"beltcommander.highscores";
            leaderBoardController.leaderboardDelegate = self;         [self presentModalViewController:leaderBoardController
    animated:YES]; } ```    In [Listing 9-3](#9781430244226_Ch09.xhtml#list3), we
    see the task `leaderBoardClicked:`, which is called when the user clicks the Leaderboard
    button. This class is called on an instance of `RootViewController`, which is
    the main `UIViewController` for our example game Belt Commander. We don’t have
    to know much about `RootViewController` except that it is a `UIViewContoller`
    and conforms to `GKLeaderboardViewControllerDelegate`. To display the view shown
    in [Figure 9-10](#9781430244226_Ch09.xhtml#Fig10), first create a `GKLeaderboardView`
    and set the `category` property to the ID of our leaderboard. Then call `presentModalViewController:animated:`
    on `self`, which will display the Leaderboard view. In order to remove the leaderboard
    when the user clicks Done, set `self` as the `leaderbordDelegate`, which means
    the task `leaderboardViewControllerDidFinish:` from `GKLeaderboardViewControllerDelegate`
    will be called when the user is done. The implementation `leaderboadViewControllerDidFinish:`
    should be as follows, shown in [Listing 9-4](#9781430244226_Ch09.xhtml#list4).    **[Listing
    9-4](#9781430244226_Ch09.xhtml#_list4). ** `RootViewController.m` (`leaderboardViewControllerDidFinish:`)    ```
    - (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController *)viewController{
        [self dismissModalViewControllerAnimated:YES]; } ```    In [Listing 9-4](#9781430244226_Ch09.xhtml#list4),
    we see our implementation of `leaderboardViewControllerDidFinish:`, where we simply
    call `dismissModalViewControllerAnimated:` to remove the Leaderboard view from
    the screen.    As you can see, working with scores and leaderboards with GameKit
    is pretty simple—it takes less than 10 lines for code to get things going. Next,
    let’s look at working with achievements and seeing how they are awarded to a user.    Awarding
    Achievements    Achievements are little milestones that are reached throughout
    a game. They are intended to encourage users to continue playing by indicating
    that they have achieved something. In addition to providing a sense of progress,
    you can also make players feel clever by awarding secrete achievements. Previously,
    we looked at how to add an achievement in iTunes Connect (see [Figure 9-8](#9781430244226_Ch09.xhtml#Fig8)).
    In our sample game, Belt Commander, the player destroys wave after wave of asteroids.'
  trans: "\n```objc\nif (gkClass && iosSupported){\n    localPlayer = [GKLocalPlayer\
    \ localPlayer];\n    [localPlayer authenticateWithCompletionHandler:^(NSError\
    \ *error) {\n        if (localPlayer.authenticated){\n            [leaderBoardButton\
    \ setEnabled:YES];\n        } else {\n            [leaderBoardButton setEnabled:NO];\n\
    \        }\n    }];\n}\n```\n\n在代码清单 9-1 中，我们看到 `RootViewController` 类的任务 `initGameCenter`。该任务在应用程序启动时被调用一次。它首先通过查找\
    \ `GKLocalPlayer` 类来检查当前 iOS 设备是否支持 GameKit。该任务还会检查 iOS 版本是否足够新以支持 Game Center。如果满足条件，我们通过调用\
    \ `GKLocalPlayer` 类的 `localPlayer` 方法获取本地玩家指针。\n\n要验证本地玩家身份，我们只需调用 `authenticateWithCompletionHandler:`\
    \ 并传入一个块（block），当用户完成验证（或取消）时，该块会异步执行。块本质上是一种将函数声明为可传递值的方式。这里我们使用块的方式类似于在 Java\
    \ 等语言中使用匿名类。首次运行此代码时，用户会看到类似图 9-9 的界面。\n\n![9781430244226_Fig09-09.jpg](img/9781430244226_Fig09-09.jpg)\n\
    \n图 9-9. 首次使用 Game Center 进行身份验证\n\n在图 9-9 中，我们看到调用 GameKit 身份验证任务的结果。系统会提示用户使用现有账户登录\
    \ Game Center、创建新账户或取消登录。如果用户多次取消，应用程序将不再显示此对话框。用户必须取消多少次才会停止显示，具体次数似乎随不同版本而变化。在\
    \ iOS 5 中，大约为三次。一旦用户成功通过验证，应用程序就会为该用户账户连接到 Game Center。当应用程序再次运行时，调用 `authenticateWithCompletionHandler:`\
    \ 会执行处理代码，而不会再次打扰用户登录。用户会看到类似图 9-2 的界面。\n\n启用 Game Center 后，我们就可以开始利用其功能了。下一节将介绍如何向排行榜报告分数。\n\
    \n## 向排行榜提交分数\n\nGame Center 提供的最佳功能之一是内置的跨设备跟踪用户最高分数的机制。它允许用户将自己的分数与好友分数以及全球其他玩家的分数进行比较。提交分数的代码非常简单，如代码清单\
    \ 9-2 所示。\n\n**代码清单 9-2.** `RootViewController.m` (`notifyGameCenter`)\n\n```objc\n\
    -(void)notifyGameCenter{\n    if ([localPlayer isAuthenticated]){\n        GKScore*\
    \ score = [[GKScore alloc] initWithCategory:@\"beltcommander.highscores\"];\n\
    \        score.value = ([beltCommanderController score];\n        \n        [score\
    \ reportScoreWithCompletionHandler:^(NSError *error){\n            if (error){\n\
    \                //处理错误\n            }\n        }];\n    }\n}\n```\n\n在代码清单 9-2\
    \ 中，我们看到任务 `notifyGameCenter`，它在每局游戏结束时被调用。在该任务中，我们检查 `localPlayer` 是否已通过验证。如果是，我们只需创建一个\
    \ `GKScore` 对象，指定要提交分数的排行榜 ID——在本例中为 \"`beltcommander.highscores`\"。获得 `GKScore`\
    \ 对象的引用后，我们将分数属性设置为上一局游戏的分数。该分数属性可以是任何类型的数字——在本例中是一个 `long` 类型。\n\n最后，我们调用 `reportScoreWithCompletionHandler:`\
    \ 并传入一个块来处理任何错误。在我们的示例中，我们对错误不做任何处理。\n\n**注意**  如果用户处于离线状态或出现某种网络问题，GameKit 会在未来运行时自动重新提交分数，确保玩家的努力被正确记录。\n\
    \n图 9-10 展示了排行榜上的一个分数。\n\n![9781430244226_Fig09-10.jpg](img/9781430244226_Fig09-10.jpg)\n\
    \n图 9-10. 带有示例分数的排行榜\n\n在图 9-10 中，我们看到排行榜上显示了一个分数。目前只有一个分数，因为截图是在游戏开发期间拍摄的。顶部我们可以看到三个查看最高分的选项：今日、本周和全部时间。显示最高分的组件是\
    \ GameKit 自带的预构建组件 `GKLeaderboardViewController`；调出该组件的代码如代码清单 9-3 所示。\n\n**代码清单\
    \ 9-3.** `RootViewController.m` (`leaderBoardClicked:`)\n\n```objc\n- (IBAction)leaderBoardClicked:(id)sender\
    \ {\n        GKLeaderboardViewController* leaderBoardController = [[GKLeaderboardViewController\
    \ alloc] init];\n        leaderBoardController.category = @\"beltcommander.highscores\"\
    ;\n        leaderBoardController.leaderboardDelegate = self;\n        [self presentModalViewController:leaderBoardController\
    \ animated:YES];\n}\n```\n\n在代码清单 9-3 中，我们看到任务 `leaderBoardClicked:`，当用户点击排行榜按钮时被调用。该类在\
    \ `RootViewController` 实例上被调用，该实例是我们示例游戏 Belt Commander 的主 `UIViewController`。我们不需要了解\
    \ `RootViewController` 的太多细节，只需知道它是一个 `UIViewContoller` 并遵循 `GKLeaderboardViewControllerDelegate`\
    \ 协议。要显示图 9-10 中的视图，首先创建一个 `GKLeaderboardView`，并将 `category` 属性设置为排行榜的 ID。然后在\
    \ `self` 上调用 `presentModalViewController:animated:`，这将显示排行榜视图。为了在用户点击“完成”时移除排行榜，将\
    \ `self` 设置为 `leaderbordDelegate`，这意味着当用户完成操作时，将调用 `GKLeaderboardViewControllerDelegate`\
    \ 协议中的任务 `leaderboardViewControllerDidFinish:`。`leaderboadViewControllerDidFinish:`\
    \ 的实现应如下所示，如代码清单 9-4 所示。\n\n**代码清单 9-4.** `RootViewController.m` (`leaderboardViewControllerDidFinish:`)\n\
    \n```objc\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController\
    \ *)viewController{\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
    \n在代码清单 9-4 中，我们看到 `leaderboardViewControllerDidFinish:` 的实现，我们只需调用 `dismissModalViewControllerAnimated:`\
    \ 将排行榜视图从屏幕上移除。\n\n如你所见，使用 GameKit 处理分数和排行榜非常简单——只需不到 10 行代码就能让一切运转起来。接下来，让我们看看如何处理成就以及如何将成就授予用户。\n\
    \n## 授予成就\n\n成就是游戏中达成的小里程碑。它们旨在通过表明玩家有所成就来鼓励用户继续游戏。除了提供进步感之外，你还可以通过授予秘密成就来让玩家感到机智。之前，我们了解了如何在\
    \ iTunes Connect 中添加成就（参见图 9-8）。在我们的示例游戏 Belt Commander 中，玩家需要摧毁一波又一波的小行星。"
- fmt: "We want to give the user an achievement when he destroys his first 10 asteroids—an\
    \ easy achievement, which will remind the user early in the game that there are\
    \ other achievements to earn. [Figure 9-11](#9781430244226_Ch09.xhtml#Fig11) shows\
    \ the achievement in the Game Center app.  \n![9781430244226_Fig09-11.jpg](images/9781430244226_Fig09-11.jpg)\
    \  \n[Figure 9-11.](#9781430244226_Ch09.xhtml#_Fig11)  First achievement in the\
    \ Game Center app  \n\nIn [Figure 9-11](#9781430244226_Ch09.xhtml#Fig11), we see\
    \ a screenshot from the Game Center app displaying the achievements for Belt Commander.\
    \ We can see that the achievement in this view was awarded. [Listing 9-5](#9781430244226_Ch09.xhtml#list5)\
    \ shows the code that awards the achievement.  \n\n**[Listing 9-5](#9781430244226_Ch09.xhtml#_list5).**\
    \ `BeltCommanderController.m` (`checkAchievements`)  \n\n```\n-(void)checkAchievements{\n\
    \    if (asteroids_destroyed >= 10){\n        \n        GKAchievement* achievement\
    \ = [[GKAchievement alloc] initWithIdentifier:@\"beltcommander.10asteroids\"];\n\
    \        achievement.percentComplete = 100.0;\n        \n        [achievement\
    \ reportAchievementWithCompletionHandler:^(NSError *error) {\n            if (error){\n\
    \                // report error\n            }\n        }];\n    }\n}\n```\n\n\
    In [Listing 9-5](#9781430244226_Ch09.xhtml#list5), we see the task `checkAchievements`\
    \ from the class `BeltCommanderController`, which is responsible for handling\
    \ the in-play game logic. The first thing we do is check if the `asteroids_destroyed`\
    \ is bigger or equal to 10. The variable `asteroids_destroyed` is simply incremented\
    \ whenever an asteroid in the game is destroyed. If `asteroids_destroyed` is at\
    \ least 10, we get a reference to a `GKAchievement` by passing the achievement’s\
    \ ID (as defined in iTunes Connect) to the `initWithIdentifier` task of `GKAchievement`.\
    \ Once we have a reference, we simply assign 100 to the property `percentComplete`,\
    \ call `reportAchievementWithCompletionHander`, and we are done.  \n\nThere are\
    \ a few things to note about achievements. First, as shown in [Listing 9-5](#9781430244226_Ch09.xhtml#list5),\
    \ achievements can be partially complete. We could have set `percentComplete`\
    \ to 30 or 50. This is an important feature for long-running achievements. Say,\
    \ for example, our achievement was to destroy 10,000 asteroids. We would want\
    \ to let users know how far they have progressed to date or they may not pursue\
    \ it further.  \n\nAnother thing to note about achievements is that each has a\
    \ value. Our achievement is worth 5 points, as shown in [Figure 9-11](#9781430244226_Ch09.xhtml#Fig11).\
    \ The value of an achievement can be whatever the developer wants. However, you\
    \ are limited to a total of 1,000 points of achievements for a given game. This\
    \ is so users know that they have achieved all the achievements for a given game\
    \ when they hit 1,000 achievement points. It prevents the users from having to\
    \ relearn the relative values of an achievement for a given game. Users know that\
    \ a 1- or 5-point achievement is not really a big deal, but that a 100-point achievement\
    \ is a real accomplishment.  \n\nWe have looked at Game Center and GameKit and\
    \ how to work with leaderboards and achievements. As mentioned, GameKit can also\
    \ be used to coordinate multiplayer games. We are not going to get into that topic\
    \ here, as I believe it is too advanced for this book. However, I encourage you\
    \ to follow up on GameKit’s support for multiplayer games, as it should simplify\
    \ your life considerably. Next, let’s look at the Twitter integration, which is\
    \ new to iOS 5.  \n\n## Twitter Integration  \n\nLove it or hate it, Twitter exists.\
    \ As a mobile application developer, you need to be aware that it is more and\
    \ more common for clients to ask for social media integration in their apps. On\
    \ the short list of everyone’s social services is Twitter. Twitter provides a\
    \ very nice and useful REST service that can be used to tweet on behalf of a user.\
    \ New to iOS 6 is the Social Framework.  \n\nThis framework extends and replaces\
    \ the Twitter API from iOS 5. The Social Framework allows a user to do a sort\
    \ of single sign-on with their Twitter or Facebook account, making it simple for\
    \ application developers to request access to this global account. This feature\
    \ is great for users, because they have to authenticate only once with the device,\
    \ and they still have control over which applications are allowed to tweet for\
    \ them.  \n\nThis feature is also great for developers. It makes tweeting really,\
    \ really easy. If you have ever worked with any OAuth service on an embedded device,\
    \ you know there is a bit of a disconnect between how OAuth works and how native\
    \ applications operate. In short, OAuth was designed to work within a browser,\
    \ and our application was not written on HTML. One solution was to pop up a `UIWebView`\
    \ and do the authentication through it. This works, but it is clumsy. This new\
    \ approach is much better.  \n\nNot only does this new Twitter API provide a simple\
    \ way to authenticate, it also has a simple component where users can enter their\
    \ tweets, as shown in [Figure 9-12](#9781430244226_Ch09.xhtml#Fig12).  \n\n![9781430244226_Fig09-12.jpg](images/9781430244226_Fig09-12.jpg)\
    \  \n[Figure 9-12.](#9781430244226_Ch09.xhtml#_Fig12)  Tweeting from Belt Commander\
    \  \n\nIn [Figure 9-12](#9781430244226_Ch09.xhtml#Fig12), we see the built-in\
    \ component for tweeting on iOS. On the top, we have the place where the 120 characters\
    \ can be typed. To the right, there is a paperclip holding a Safari icon. This\
    \ indicates that a link was attached to this tweet. The user can also add a location,\
    \ cancel, or send the tweet. The code to populate this view with default values\
    \ and display them is shown in [Listing 9-6](#9781430244226_Ch09.xhtml#list6).\
    \  \n\n**[Listing 9-6](#9781430244226_Ch09.xhtml#_list6).** `RootViewController.m`\
    \ (`tweetButtonClicked:`)  \n\n```\n- (IBAction)tweetButtonClicked:(id)sender\
    \ {\n        SLComposeViewController* twitterSheet = [SLComposeViewController\
    \ composeViewControllerForServiceType:SLServiceTypeTwitter];\n    [twitterSheet\
    \ setInitialText:@\"Check out this iOS game, Belt Commander!\"];\n    [twitterSheet\
    \ addURL:[NSURL URLWithString:@\" http://itunes.apple.com/us/app/belt-commander/id460769032?ls=1&mt=8\
    \ \"]];\n    [self presentViewController:twitterSheet animated:YES completion:^(void){\n\
    \        NSLog(@\"twitter done\");\n    }];\n}\n```\n\nIn [Listing 9-6](#9781430244226_Ch09.xhtml#list6),\
    \ we see the `tweetButtonClicked`: task of the class `RootViewController`. This\
    \ task is called when a user clicks the Tweet button. To display the Twitter component,\
    \ we simply create a new `SLComposeViewController` and indicate that we are interested\
    \ in the Twitter service. After specifying the initial text and attaching a URL,\
    \ we simply pass `twitterSheet` to `presentModalViewController`. If we want to\
    \ know whether the tweet was sent, we can assign a block to the value `completionHandler`\
    \ of `twitterSheet`.  \n\nOf course, not every user will have Twitter set up on\
    \ his or her device. As a developer, you want to be able to test this, which turns\
    \ out to be as simple as the code in [Listing 9-7](#9781430244226_Ch09.xhtml#list7).\
    \  \n\n**[Listing 9-7](#9781430244226_Ch09.xhtml#_list7).** `RootViewController.m`\
    \ (`initTwitter`)  \n\n```\n-(void)initTwitter{\n    [tweetButton setEnabled:[SLComposeViewController\
    \ isAvailableForServiceType:SLServiceTypeTwitter]];\n}\n```\n\nIn [Listing 9-7](#9781430244226_Ch09.xhtml#list7),\
    \ we see the simple task `initTwitter`, which is called when the containing `UIViewController`\
    \ is loaded. In this task, we simply call `isAvailableForServiceType` to see if\
    \ we can tweet. By using the returned value to set the enabled status of `tweetButton`,\
    \ we prevent the user from being able to click the button until Twitter is enabled\
    \ on the device.  \n\nThe Twitter integration is great. It makes life very simple\
    \ to include this feature. Next, let’s explore how the Social Framework makes\
    \ working with Facebook just as easy."
