    \  \n\n## Saucer 类  \n\n`Saucer`类主要是一个麻烦制造者。它出现在屏幕顶部或底部，向`Viper`射击`Bullet`。`Saucer`类之所以令人头疼，是因为`Bullet`通常会将`Asteroid`击碎，形成难以预测的格局。本章中`Saucer`类的实现与其他章节的实现非常相似。不过，任务`step:`进行了一些修改，如[清单\
