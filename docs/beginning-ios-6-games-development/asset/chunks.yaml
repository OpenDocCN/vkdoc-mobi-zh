  trans: '

    以下是属性的完整列表：


    - **类型** – 取值包括静态、运动或动态

    - **位置** – 世界坐标系中的一个点

    - **角度** – 物体的旋转角度

    - **线速度** – 描述物体当前速度的向量

    - **角速度** – 描述物体旋转速度的向量

    - **线性阻尼** – 线速度随时间衰减的程度

    - **角阻尼** – 角速度随时间衰减的程度

    - **允许休眠** – 一个标志，指示物理世界可以在适当时机使用优化手段忽略该物体

    - **唤醒** – 一个标志，指示该物体当前正在模拟中使用（未休眠）

    - **固定旋转** – 一个标志，用于防止物体旋转

    - **子弹** – 一个标志，指示模拟系统应特别注意这个快速移动的物体，以防止“隧道效应”

    - ****活动** – 一个标志，指示该物体是否参与模拟。如果物体不活动，则它不会参与模拟，直到用户代码将其 active 设置为 true

    - **用户数据** – 用于向物体附加额外数据的位置

    - **重力缩放** – 重力对物体的影响程度


    上述列表中有几个项目需要稍作解释。物体的类型决定了它如何与世界中的其他物体交互。一个静态物体永远不会移动或旋转，但其他物体可以撞击它并从它身上弹开。运动物体与静态物体类似，但会根据速度移动，比如游戏中的移动平台。运动物体不会与其他静态或运动物体发生碰撞。动态物体根据物理定律移动；它会与所有其他类型的物体发生碰撞。在游戏中，动态物体可以是一个方块、球、鸟、猪或任何其他东西。


    `Allow Sleep` 和 `Awake` 属性由模拟引擎用于进行一些优化。由于模拟一个物体的计算成本很高，跳过那些不动的物体是合理的。如果 `Allow
    Sleep` 设置为 `true`，模拟系统会在物体静止时将其置于休眠状态（`Awake` = `false`），暂时将其从模拟中移除。如果一个物体被另一个物体撞击，它会被唤醒并继续参与模拟。通常，你只在希望标记一个物体不允许休眠时才使用这些标志。你可能这样做是因为该物体是游戏中特别重要的一部分。`Active`
    属性与 `Awake` 类似，不活动的物体非常类似于休眠的物体——它不参与模拟。然而，模拟系统永远不会自动激活一个不活动的物体；你必须在代码中手动激活它。


    你会注意到在上述列表中没有提到形状、密度或其他物理特性。这些其他属性由夹具的概念涵盖，将在下一节中讨论。


    ## 夹具


    夹具将一个形状以及一些额外的物理属性附加到一个物体上。这些属性包括：


    - **形状** – 物体的形状

    - **用户数据** – 用于附加游戏特定数据的位置

    - **摩擦系数** – 摩擦系数——当物体在另一个物体上滑动时，其速度减缓的程度

    - **恢复系数** – 物体的弹性程度

    - **密度** – 物体的密度，单位为 k/m²

    - **是否为传感器** – 一种传感器，用于记录物体与其他物体接触但没有产生碰撞——即非实体物体


    夹具的形状可以是凸多边形或圆形。也可以选择将形状设置为链或边（与链一起使用）。在我们的示例中，我们只会使用圆形，但这些其他形状可以用来制作一些有趣的游戏。摩擦系数、恢复系数（非法律意义上的）和密度都描述了物体的额外物理特性。摩擦系数描述了物体在另一个物体上滑动时的减速情况。


    这与线性阻尼不同，线性阻尼更像是空气阻力。恢复系数描述了物体在与另一个物体碰撞后停止运动的方式；低恢复系数意味着物体不会弹起太多，而高恢复系数则非常具有弹性，像超级球一样。密度是基于动态物体形状的面积来计算其质量的。注意，密度是以
    m² 为单位的，因为我们是在二维世界中工作。


    我们已经了解了世界、物体和夹具。虽然 Box2D 还提供了更多功能，例如关节、链以及其他一些特性，但我们已有的背景知识已经足够探索构成我们示例的代码。我把更详细地探索
    Box2D 文档和示例的任务留给感兴趣的读者。要全面详细地介绍一个物理引擎，那需要一整本书！


    ## 将 Box2D 添加到 Xcode 项目


    如前所述，Box2D 是用 C++ 编写的；它以源代码形式分发，而不是以易于使用的库形式。这样做是为了使 Box2D 能够集成到任何基于 C 的项目中。然而，这确实让我们需要做一些实际工作，将其导入我们的项目并进行编译。不必强制自己跟随本节中的所有步骤；请随意使用提供的示例项目作为你自己项目的起点。


    第一步是从 `http://code.google.com/p/box2d/downloads/list` 下载 Box2D 源代码。你需要文件 `Box2D_v2.2.1.zip`。解压后，你应该会看到如图
    13-2 所示的文件。


    ![9781430244226_Fig13-02.jpg](img/9781430244226_Fig13-02.jpg)


    图 13-2.  下载并解压后的 Box2D 源代码


    在 图 13-2 中，注意顶部展开的 Box2D 目录。这就是你要添加到 Xcode 项目的目录。我通过先将 `Box2D` 目录复制到项目文件夹中，然后使用
    Xcode 的“添加文件到...”功能来实现。这确保了添加到项目的文件会保留在一个名为 `Box2D` 的文件夹中。这并非绝对必要，但它可以简化后续的导入和编译工作。


    添加源代码后，确保所有的 `.cpp` 文件都被视为“默认 – C++ 源代码”，如图 13-3 所示。


    ![9781430244226_Fig13-03.jpg](img/9781430244226_Fig13-03.jpg)


    图 13-3.  cpp 文件的详细信息


    另外，确保所有的 `.cpp` 文件都包含在你的主要构建目标中，如图 13-3 底部的复选框所示。此时，你的项目还无法编译；你需要将**头文件搜索路径**设置为
    `../**`，如图 13-4 所示。


    ![9781430244226_Fig13-04.jpg](img/9781430244226_Fig13-04.jpg)


    图 13-4.  编译 Box2D 的正确头文件搜索路径


    此时，你的项目应该可以编译了。要使用 Box2D 类，你可以像这样导入：


    ```

    #import <Box2D/Box2D.h>

    ```


    然而，你很可能会在 Objective C 类中导入 Box2D，所以你必须告诉 Xcode 它应该期望混合 C++ 和 Objective C 代码。这可以通过将文件类型更改为“Objective-C++
    源代码”来实现，如图 13-5 所示。


    ![9781430244226_Fig13-05.jpg](img/9781430244226_Fig13-05.jpg)


    图 13-5.  导入 Box2D 的 Objective C `.m` 文件的正确类型


    现在，你就可以在你的项目中使用 Box2D 类了。不过我必须警告未来的读者，这个过程是从各种谷歌搜索的来源拼凑而成的，这些来源描述的是旧版本的 Xcode
    和 Box2D。我向你保证，这个设置会在未来版本的 Xcode 中发生变化。

    '
- fmt: "现在你对 Box2D 有了一定了解，并且知道如何将 Box2D 源代码集成到我们的项目中，接下来我们看看如何扩展`GameController`类，使我们的游戏能够利用物理效果。\n\
    \n## 理解示例\n\n在这个示例中，场景中有许多大小不同的小行星，它们以物理方式相互碰撞弹开。根据之前对 Box2D 的描述，我们知道需要定义物理世界。让我们直接进入正题，看看如何在`PhysicsViewController`类中实现这一点，如[代码清单\
    \ 13-1](#9781430244226_Ch13.xhtml#list1)所示。\n\n**[代码清单 13-1](#9781430244226_Ch13.xhtml#_list1).**\
    \ `createPhysicsWorld` (`PhysicsViewController.m`)\n\n```\n- (void)createPhysicsWorld\
    \ {\n       b2Vec2 gravity;\n       gravity.Set(0.0f, 0.0f);\n     \n       world\
    \ = new b2World(gravity);\n       world->SetAllowSleeping(false);\n       world->SetContinuousPhysics(true);\n\
    }\n```\n\n在[代码清单 13-1](#9781430244226_Ch13.xhtml#list1)中，我们首先创建了一个名为`gravity`的`b2Vec2`，并将其在\
    \ X 和 Y 方向上的力都设置为`0.0f`。`b2Vec2`结构体被 Box2D 用于所有向量数据类型，包括力、速度等。接着，使用`gravity`创建了一个新的`b2World`对象，并将其存储在变量`world`中。`world`在`PhysicsViewController`的头文件中定义（未显示），因为在模拟的整个生命周期中，我们需要保持对此对象的引用。`world`的最后两个方法调用——`SetAllowSleeping`和`SetContinuousPhysics`——仅用于演示，并非强制要求。你可以随意更改这些值，看看是否能在模拟中察觉到任何差异。对于这个简单的示例，它们似乎没有产生我能分辨出的效果，尽管我确信它们对于使复杂场景能够高效运行至关重要。现在，让我们看看如何定义主视图控制器来使用这个新的\
    \ Box2D 世界。\n\n## 扩展`GameController`\n\n让我们通过查看`createPhysicsWorld`的调用位置，来了解如何开始使用这个在`createPhysicsWorld`中创建的\
    \ Box2D 世界。我们在`PhysicsViewController`类的`doSetup`任务中调用`createPhysicsWorld`，如[代码清单\
    \ 13-2](#9781430244226_Ch13.xhtml#list2)所示。\n\n**[代码清单 13-2](#9781430244226_Ch13.xhtml#_list2).**\
    \ `doSetup` (`PhysicsViewController.m`)\n\n```\n-(BOOL)doSetup{\n    if ([super\
    \ doSetup]){\n        [self setGameAreaSize:CGSizeMake(1024, 768)];\n        [self\
    \ createPhysicsWorld];\n        \n        for (int i=0;i<30;i++){\n          \
    \  float startY = rand()%(int)self.gameAreaSize.height;\n            float startX\
    \ = rand()%(int)self.gameAreaSize.width;\n            \n            CGPoint center\
    \ = CGPointMake(startX, startY);\n    \n            int level = 1 + rand()%4;\n\
    \            \n            Asteroid* asteroid = [Asteroid asteroidOfLevel:level\
    \ At: center];\n            [self addActor: asteroid];\n        }\n        \n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\n在[代码清单 13-2](#9781430244226_Ch13.xhtml#list2)中，我们指定了游戏区域大小并创建了物理世界。游戏区域大小不被\
    \ Box2D 考虑。Box2D 没有游戏在内部发生的固定边界的概念，除了用浮点值限制来表示世界内的坐标。接下来，我们创建了 30 个小行星，并将它们随机放置在场景中。然后使用熟悉的`addActor:`方法添加每个小行星。\n\
    \n此时你可能会注意到，除了创建世界对象之外，我们实际上并没有对 Box2D 做任何操作。我们似乎只是在向`GameController`添加角色，就像前几章所做的那样。之所以看起来如此，是因为我们做了两件事来启用物理效果，同时又没有过多地破坏现有的框架。我们在`PhysicsViewController`中重写了`GameController`的几个任务，并创建了一个名为`PhysicsActor`的新角色类型，`Asteroid`现在继承自它。这两个修改协同工作，共同启用了物理效果。\n\
    \n让我们从对`GameController`的修改开始，了解这一切是如何结合在一起的。\n\n**[代码清单 13-3](#9781430244226_Ch13.xhtml#_list3).**\
    \ `addActor`: (`PhysicsViewController.m`)\n\n```\n-(void)addActor:(Actor *)actor{\n\
    \    if ([actor isKindOfClass:[PhysicsActor class]]){\n        PhysicsActor* physicsActor\
    \ = (PhysicsActor*)actor;\n        b2BodyDef bodyDef = [physicsActor createBodyDef];\n\
    \        \n        b2Body* body = world->CreateBody(&bodyDef);\n        \n   \
    \     b2CircleShape circle;\n        circle.m_p.Set(0.0f, 0.0f);\n        circle.m_radius\
    \ = [PhysicsViewController convertDistanceToB2:[actor radius]];\n        \n  \
    \      b2FixtureDef fixtureDef;\n        \n        fixtureDef.shape = &circle;\n\
    \        fixtureDef.density = [physicsActor radius];\n        fixtureDef.friction\
    \ = 0.1f;\n        fixtureDef.restitution = .8;\n        \n        body->CreateFixture(&fixtureDef);\n\
    \        [physicsActor setBody:body];\n    }\n    [super addActor:actor];\n}\n\
    ```\n\n在[代码清单 13-3](#9781430244226_Ch13.xhtml#list3)中，我们看到了被重写的任务`addActor:`。在此任务中，我们首先检查正在添加的角色是否是`PhysicsActor`。如果是，我们需要做一些工作来在我们的世界对象中创建一个\
    \ Box2D 刚体，以便我们的角色能够参与物理模拟。我们还需要创建一个夹具，使刚体具有大小和质量。让我们逐步分析一下。\n\n在 Box2D 中创建刚体时，我们在`b2BodyDef`类型的结构体中指定刚体的初始值。该结构体指定了刚体的所有属性，如本章前面所述。由于刚体位置等属性由`physicsActor`驱动，我们通过调用`createBodyDef`来获取`b2BodyDef`，并将值存储在`bodyDef`中。一旦有了`bodyDef`，我们就调用`world`对象上的`CreateBody`方法，并将结果存储在`b2Body`变量`body`中。`CreateBody`任务既创建了刚体，又将其添加到模拟中。请注意，我们使用的是`world`上的方法来创建`b2Body`，而不是自己实例化它。这样做是因为\
    \ Box2D 有非常特殊的内存管理要求，建议始终使用其提供的工厂方法。\n\n继续看[代码清单 13-3](#9781430244226_Ch13.xhtml#list3)，接下来我们创建一个名为`circle`的`b2CircleShape`。我们通过调用`Set`并传入`0.0f`作为\
    \ X 和 Y 位置，将圆形居中于刚体上。我们还指定了圆形的半径。逻辑上，我们知道希望圆形的半径与`physicsActor`的半径相同，但 Box2D 建议不要让一个点等于\
    \ Box2D 中的一个单位。在这种情况下，我们调用实用方法`convertDistanceToB2`来创建一个适合 Box2D 坐标系的缩放值。总共有四个这样方便的转换方法，稍后我们会更详细地介绍它们。\n\
    \n有了圆形之后，我们通过创建一个名为`fixtureDef`的`b2FixtureDef`将其附加到刚体上。夹具遵循与 Box2D 中刚体相同的模式：它们使用定义其初始值的结构体创建，然后通过调用适当的工厂方法（此处为`body`上的`CreateFixture`）实际创建它们。\n\
    \n在`fixtureDef`上，我们还指定了密度、摩擦力和恢复系数。在我们的示例中，这些值是通过反复试验设定的，以获得看起来不错的效果。例如，请注意密度是基于小行星的半径。这显然不太现实；人们可能会期望一批小行星如果由相同物质构成，它们的密度即使不相同也是相似的。但在模拟运行时，我喜欢改变密度让小行星获得更多弹跳效果。你可以随意调整这些值，看看它如何改变模拟结果。\n\
    \n一旦创建了刚体及其夹具，我们就将该对象存储在`physicsActor`的`body`属性中。通过这种方式，`physicsActor`可以引用其在 Box2D\
    \ 世界中的表示，并相应地更新其状态。"
  raw: 'Now that you know a little about Box2D, and how to get Box2D source code working
    in our project, let’s take a look at how we can extend our `GameController` class
    to take advantage of physics in our games.    Understanding the Example    In
    this example, we have a bunch of different-size asteroids in our scene that bounce
    off each other in a physical way. From the previous description of Box2D, we know
    that we need to define our world. Let’s jump right in and see how we do that in
    the class PhysicsViewController, as shown in [Listing 13-1](#9781430244226_Ch13.xhtml#list1).    **[Listing
    13-1](#9781430244226_Ch13.xhtml#_list1)**. createPhysicsWorld (PhysicsViewController.m)    ```
    - (void)createPhysicsWorld {        b2Vec2 gravity;        gravity.Set(0.0f, 0.0f);
                 world = new b2World(gravity);        world->SetAllowSleeping(false);
           world->SetContinuousPhysics(true); } ```    In [Listing 13-1](#9781430244226_Ch13.xhtml#list1),
    we start by creating a b2Vec2 named gravity and set its force to 0.0f in both
    the X and Y directions. The struct b2Vec2 is used by Box2D for all vector data
    types; this includes forces, velocity, and so on. Using gravity, we create a new
    b2World object and store it at the variable world. World is defined in the header
    (not shown) for `PhysicsViewController` because we need to keep a reference to
    this object for the lifetime of our simulation. The last two method calls in world—`SetAllowSleeping`
    and `SetContinuousPhysics`—are just there for demonstration and not strictly required.
    Feel free to change these values and see if you tell any difference in the simulation.
    For an example this simple, they seemed to have no effect I could discern, though
    I am sure they are critical to making a complex scene efficient enough to play.
    Let’s now look at how we define our main view controller to make use of this new
    Box2D world.    Extending GameController    Let’s look at how we start to use
    this Box2D world created in `createPhysicsWorld` by seeing where it is called.
    We call `createPhysicsWorld` from the task `doSetup` of the class `PhysicsViewController`,
    as shown in [Listing 13-2](#9781430244226_Ch13.xhtml#list2).    **[Listing 13-2](#9781430244226_Ch13.xhtml#_list2).**
    `doSetup` (`PhysicsViewController.m`)    ``` -(BOOL)doSetup{     if ([super doSetup]){
            [self setGameAreaSize:CGSizeMake(1024, 768)];         [self createPhysicsWorld];
                      for (int i=0;i<30;i++){             float startY = rand()%(int)self.gameAreaSize.height;
                float startX = rand()%(int)self.gameAreaSize.width;                           CGPoint
    center = CGPointMake(startX, startY);               int level = 1 + rand()%4;
                              Asteroid* asteroid = [Asteroid asteroidOfLevel:level
    At: center];             [self addActor: asteroid];         }                   return
    YES;     }     return NO; } ```    In [Listing 13-2](#9781430244226_Ch13.xhtml#list2),
    we specify the game area size and create our physics world. The game area size
    is not considered by Box2D. Box2D does not contain the idea of a fixed boundary
    for the game to happen within, except for limits of a float value to represent
    coordinates within the world. Next, we create 30 Asteroids and position them randomly
    in the scene. Each Asteroid is then added with the familiar `addActor:` method.    You
    may notice at this point that we have not really done anything with Box2D except
    create the world object.  We appear to be adding actors to a `GameController`,
    just as we did in previous chapters. The reason it looks this way is that we have
    done two things to enable physics, while not upsetting our framework too much.
    We have overridden a few of `GameController''s` tasks in `PhysicsViewController`
    and have created a new actor type called `PhysicsActor`, which Asteroid now extends.
    These two modifications work together to enable physics.


    Let’s start with modifications to `GameController` and understand how this all
    fits together.    **[Listing 13-3](#9781430244226_Ch13.xhtml#_list3).** `addActor`:
    (`PhysicsViewController.m`)    ``` -(void)addActor:(Actor *)actor{     if ([actor
    isKindOfClass:[PhysicsActor class]]){         PhysicsActor* physicsActor = (PhysicsActor*)actor;
            b2BodyDef bodyDef = [physicsActor createBodyDef];                   b2Body*
    body = world->CreateBody(&bodyDef);                   b2CircleShape circle;         circle.m_p.Set(0.0f,
    0.0f);         circle.m_radius = [PhysicsViewController convertDistanceToB2:[actor
    radius]];                   b2FixtureDef fixtureDef;                   fixtureDef.shape
    = &circle;         fixtureDef.density = [physicsActor radius];         fixtureDef.friction
    = 0.1f;         fixtureDef.restitution = .8;                   body->CreateFixture(&fixtureDef);
            [physicsActor setBody:body];     }     [super addActor:actor]; } ```    In
    [Listing 13-3](#9781430244226_Ch13.xhtml#list3), we see the overridden task `addActor:`.
    In this task, we first check to see if the actor being added is a `PhysicsActor`.
    If it is, we need to do a little work to create a Box2D body within our world
    object so we can have our Actor participate in the physics simulation. We also
    need to create a fixture so the body has size and mass. Let’s look at this step
    by step.    When creating a body in Box2D, we specify the starting values of body
    in a struct of type b2BodyDef. This struct specifies all of the properties of
    a body, as described earlier in this chapter. Since things like the location of
    the body are driven by the `physicsActor`, we ask it for the b2BodyDef by calling
    `createBodyDef` and storing the value in `bodyDef`. Once we have a `bodyDef`,
    we call the method `CreateBody` on the object world and store the result in the
    b2Body variable body. The task `CreateBody` both creates the body and adds it
    to the simulation. Note that we are using a method on world to create a b2Body
    instead of instantiating it ourselves. This is done because Box2D has very particular
    memory-management requirements, and it is recommended to always use the factory
    methods provided.    Continuing with [Listing 13-3](#9781430244226_Ch13.xhtml#list3),
    we next create a b2CircleShape called circle. We center the circle on our body
    by calling Set and passing in 0.0f for both X and Y locations. We also specify
    the radius of the circle. Logically, we know we want the circle to be the same
    radius as our `physicsActor`, but Box2D recommends that we don’t make one point
    equal to one unit in Box2D. In this case, we call a utility method convertDistanceToB2
    to create a scaled value suitable for the Box2D coordinate system. There are four
    of these handy conversion methods, and we will look at them more closely in a
    bit.    Once we have our circle, we attach it to our body by creating a b2FixtureDef
    called `fixtureDef`. Fixtures follow the same pattern as bodies in Box2D; they
    are created with a struct that defines their starting values and then actually
    creates them by calling an appropriate factory method—in this case, `CreateFixture`
    on body.    On `fixtureDef`, we also specify the density, friction, and restitution.
    In our example, these values were set by trial and error to see what looked good.
    Notice, for example, that the density is based on the radius of the asteroid.
    This is obviously not very realistic; one would expect a bunch of asteroids to
    have, if not identical, similar densities if they are made out of the same stuff.
    But when playing with the simulation, I liked how changing the densities gave
    the little asteroids more bounce. Feel free to play with these values and see
    how it changes the simulation.    Once we have created a body and a fixture for
    it, we store that object in the body property of `physicsActor`. In this way,
    the `physicsActor` has reference to its representation in the Box2D world and
    can update its state accordingly.'
