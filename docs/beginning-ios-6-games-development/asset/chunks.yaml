    shows the example in action.    ![9781430244226_Fig11-02.jpg](images/9781430244226_Fig11-02.jpg)    [Figure
    11-2.](#9781430244226_Ch11.xhtml#_Fig2)  Sample 11 in Action    In [Figure 11-2](#9781430244226_Ch11.xhtml#Fig2),
    we see four elements on our familiar space background. We see two power-ups on
    the screen. These are being generated off the right side of the screen and move
    to the left. We also see a spaceship on the left that will be hit by power-ups
    that happen to be created midway up the screen. When a power-up collides with
    the spaceship, a sound is produced indicating the user got the power-up. The power-ups
    also start blinking when they get about halfway across the screen. Each time they
    blink off, a quick little click sound is made. When you run this example, you
    will also hear a background sound track that plays continuously while the game
    is running. The switch on the upper left controls whether such sound effects,
    like the blinking sound, should be heard regardless of other audio being played.'
  trans: "\n我们还将探讨如何扩展 `GameController` 类，为你的游戏提供简单的音频框架。\n\n## 设置音频\n\n任何游戏在音频方面首先要做的，就是定义应用程序应如何播放音频。iOS\
    \ 提供了多种不同的应用程序播放声音的方式，以支持不同类型的应用。例如，内置的音乐应用会在其他应用处于活动状态时播放音频。此外，声音编辑应用或 GarageBand\
    \ 则有不同的需求。而游戏应用又有另一套不同的需求。代码清单 11-2 展示了游戏应如何初始化其音频会话。\n\n**代码清单 11-2.** `initializeAudio:`\
    \ (`GameController.m`)\n\n```\n-(void)initializeAudio{\n    AVAudioSession* session\
    \ = [AVAudioSession sharedInstance];\n    [session setCategory: AVAudioSessionCategoryAmbient\
    \ error: nil];\n    [session setDelegate:self];\n    \n    UInt32 otherAudioIsPlayingVal;\n\
    \    UInt32 propertySize = sizeof (otherAudioIsPlayingVal);\n    \n    AudioSessionGetProperty\
    \ (kAudioSessionProperty_OtherAudioIsPlaying,\n                             &propertySize,\n\
    \                             &otherAudioIsPlayingVal\n                      \
    \       );\n    otherAudioIsPlaying = (BOOL)otherAudioIsPlayingVal;\n    if (otherAudioIsPlaying){\n\
    \        [backgroundPlayer pause];\n    } else {\n        [backgroundPlayer play];\n\
    \    }\n}\n```\n\n在代码清单 11-2 中，我们首先通过调用 `sharedInstance` 获取 `AVAudioSession` 的引用。然后通过调用\
    \ `setCategory` 并指定 `AVAudioSessionCategoryAmbient` 来为此应用分配一个类别。这表明该游戏允许播放其他应用（例如用户的音乐）的音频，并且此应用的音频应与其他应用的音频混合。\n\
    \n一旦指定了应用的类别，我们就测试音频是否正在播放。我们通过调用 C 函数 `AudioSessionGetProperty` 并将 `UInt32 otherAudioIsPlayingVal`\
    \ 填充为 0 或 1 来实现这一点。我们将此 `UInt32` 转换为更适合 Objective-C 的 `BOOL`，并将值存储在 `otherAudioIsPlaying`\
    \ 中。\n\n最后，我们根据其他音频是否正在播放，选择播放或暂停背景音乐。我们通过调用 `backgroundPlayer` 上的相应任务来实现这一点，`backgroundPlayer`\
    \ 是在别处定义的一个 `AVAudioPlayer`。（我们将在本章后面回到 `backgroundPlayer` 的讨论。）\n\n`initializeAudio`\
    \ 在 `GameController` 的 `doSetup` 任务中被调用，因此我们知道它会在游戏开始前被调用。然而，用户在游戏初始化后可能会启动或停止他们的音频。下一节将展示我们如何确保我们的应用始终处于与用户音频选择相关的正确状态。\n\
    \n## 响应其他音频变化\n\n假设用户在没有播放自己音频的情况下启动游戏，玩了一会儿，然后决定听自己的音频。他可能会按两下 Home 键，滑动到音频控制项，点击播放，然后再按两下\
    \ Home 键返回游戏。因此，我们希望确保我们相应地调整了应用的音频行为。图 11-1 展示了正在执行此操作的 iPhone。\n\n![9781430244226_Fig11-01.jpg](img/9781430244226_Fig11-01.jpg)\n\
    \n**图 11-1.** 用户从后台菜单播放其他音频\n\n在图 11-1 中，用户已双击 Home 键，正准备点击播放并聆听野兽男孩乐队的歌曲。在这张图中你看不到的是，游戏音频在后台菜单打开时立即停止了，游戏也暂停了。\n\
    \n此外，在用户点击播放并返回游戏后，游戏将恢复，但游戏不再生成任何声音。ON/OFF 开关控制是否在播放野兽男孩乐队歌曲的同时播放非背景音效，但稍后会详细说明。\n\
    \n要了解应用如何响应后台菜单的打开和关闭，请查看代码清单 11-3 中的代码。\n\n**代码清单 11-3.** 来自 `AppDelegate.m`\
    \ 的 `UIApplicationDelegate` 任务\n\n```\n- (void)applicationWillResignActive:(UIApplication\
    \ *)application {\n    [self.viewController applicationWillResignActive];\n}\n\
    - (void)applicationDidBecomeActive:(UIApplication *)application {\n    [self.viewController\
    \ applicationDidBecomeActive];\n}\n```\n\n在代码清单 11-3 中，我们看到 `AppDelegate` 类的 `applicationWillResignActive`\
    \ 和 `applicationDidBecomeActive` 任务。每当应用即将变为非活动状态或刚刚变为活动状态时，都会调用这些方法。我们只需在我们的\
    \ `GameController` 上调用一个对应的方法——在此例中，通过 `this.viewController` 引用。代码清单 11-4 展示了我们的\
    \ `GameController` 如何响应这些事件。\n\n**代码清单 11-4.** `applicationWillResignActive` 和\
    \ `applicationDidBecomeActive` (`GameController.m`)\n\n```\n-(void)applicationWillResignActive{\n\
    \    [self setIsPaused:YES];\n    [backgroundPlayer pause];\n}\n-(void)applicationDidBecomeActive{\n\
    \    [self setIsPaused:NO];\n    [self initializeAudio];\n}\n```\n\n在代码清单 11-4\
    \ 中，`applicationWillResignActive` 任务通过调用 `self` 上的 `setIsPaused` 和 `AVAudioPlayer\
    \ backgroundPlayer` 上的 `pause` 来简单地暂停游戏。当应用再次变为活动状态时，我们恢复游戏，然后调用代码清单 11-2 中的 `initializeAudio`。通过再次调用\
    \ `initializeAudio`，我们有机会重新检查其他音频是否正在播放，从而确保我们的游戏尊重用户在声音方面的意愿。\n\n通过遵循上面的简单方法，我们可以确保任何游戏在音频方面都能正确运行。在你的\
    \ iPhone 上运行示例应用，并尝试上面概述的一些不同用户场景。插入耳机，按两下 Home 键，调整音量，然后开始播放一个播客。一切应该都按预期工作，并且符合苹果的指导原则。\n\
    \n在下一节中，我们将更详细地查看示例应用，并了解游戏如何使用所有这些音频内容来发出哔哔声和嘟嘟声。\n\n## 游戏中的音频\n\n本章附带的示例应用是一个简单的演示，展示了如何将声音融入游戏中。图\
    \ 11-2 展示了运行中的示例。\n\n![9781430244226_Fig11-02.jpg](img/9781430244226_Fig11-02.jpg)\n\
    \n**图 11-2.** 运行中的示例 11\n\n在图 11-2 中，我们在熟悉的太空背景上看到四个元素。我们在屏幕上看到两个能量道具。它们是从屏幕右侧生成并向左移动的。我们还看到左侧有一艘飞船，会被刚好在屏幕中间位置生成的能量道具击中。当一个能量道具与飞船碰撞时，会发出一个声音，指示用户获得了该能量道具。当能量道具移动到大约屏幕一半的位置时，它们还会开始闪烁。每次它们闪烁熄灭时，都会发出一个快速的咔嗒声。当你运行此示例时，你还会听到一个背景音轨，在游戏运行期间持续播放。左上角的开关控制是否应忽略其他音频的播放而听到此类音效（如闪烁声）。\n"
- fmt: "## 排版后内容\n\n显然，我们不会在游戏进行时将这样的开关显示在屏幕上，但它可能是某个设置屏幕上的一个不错选项，可能默认设置为`OFF`。如前所述，除了音效之外，还会播放背景配乐。正如您将在以下章节中看到的，这两种类型的音频以不同的方式处理，以便让开发者的工作更轻松。接下来的章节将逐一讲解这个示例，重点介绍音效的播放方式。\n\
    \n### 设置`GameController`\n\n与本游戏中的许多示例一样，我们首先扩展`GameController`来指定我们游戏特定的功能——即游戏的业务逻辑。清单11-5展示了我们如何设置这个示例。\n\
    \n**清单 11-5.** `doSetup` (`ViewController.m`)\n\n```\n-(BOOL)doSetup{\n    if\
    \ ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(480, 320)];\n \
    \       [self setIsPaused: NO];\n        \n        NSMutableArray* classes = [NSMutableArray\
    \ new];\n        [classes addObject:[Powerup class]];\n        [self setSortedActorClasses:classes];\n\
    \    \n        viper = [Viper viper:self];\n        [self addActor: viper];\n\
    \        \n        [self prepareAudio: AUDIO_POWERUP_BLINK];\n        [self prepareAudio:\
    \ AUDIO_GOT_POWERUP];\n        [self playBackgroundAudio: AUDIO_BC_THEME];\n \
    \       \n        return YES;\n    }\n    return NO;\n}\n```\n\n在清单11-5中，我们看到了标准的`GameController`设置代码。我们指定了游戏区域的大小，表示我们希望跟踪`Powerup`角色，并创建和添加了一个`Viper`。我们在`doSetup`中最后做的几件事是设置我们想要播放的音频。我们调用`prepareAudio:`，然后传入`NSString`常量`AUDIO_POWERUP_BLINK`和`AUDIO_GOT_POWER`。我们稍后将查看任务`prepareAudio:`。为了完整性，让我们快速看一下清单11-6中定义的三个`NSString`常量。\n\
    \n**清单 11-6.** `Sample 11-Prefix.pch`（部分）\n\n```\n#define AUDIO_POWERUP_BLINK\
    \ @\"powerup_blink\"\n#define AUDIO_GOT_POWERUP @\"got_powerup\"\n#define AUDIO_BC_THEME\
    \ @\"bc_theme\"\n```\n\n在清单11-6中，我们看到定义了三个常量。每个常量只是一个字符串，指向项目中包含的音频文件的名称（不包括文件扩展名）。图11-3显示了Xcode项目中的这些文件。\n\
    \n![9781430244226_Fig11-03.jpg](images/9781430244226_Fig11-03.jpg)\n\n**图 11-3.**\
    \ 在Xcode项目中包含音频\n\n在图11-3中，我们看到，要在项目中包含音频，我们只需像添加任何其他资源一样添加文件。另外，请注意它们都是`m4a`文件。iOS能够播放多种类型的音频文件，但推荐使用AAC编码的文件，而这些正是这种文件。在我们的示例中，假定扩展名为`m4a`。[¹]\n\
    \n回顾清单11-5，我们看到我们将这些常量传递给了两个不同的任务：`prepareAudio:`和`playBackgroundAudio:`。任务`prepareAudio:`准备好一个音频文件，以便当游戏事件需要音效时，音频能够立即播放。任务`playBackgroundAudio:`循环播放单个音轨，为游戏提供背景音乐。让我们从清单11-7所示的`prepareAudio:`开始。\n\
    \n**清单 11-7.** `prepareAudio:` (`GameController.m`)\n\n```\n-(AVAudioPlayer*)prepareAudio:(NSString*)audioName{\n\
    \    if (audioNameToPlayer == nil){\n        audioNameToPlayer = [NSMutableDictionary\
    \ new];\n    }\n    NSURL *url = [NSURL fileURLWithPath:[[NSBundle mainBundle]\
    \ pathForResource:audioName ofType:@\"m4a\"]];\n    \n    AVAudioPlayer* player\
    \ = [[AVAudioPlayer alloc] initWithContentsOfURL:url error: nil];\n    [player\
    \ prepareToPlay];\n    \n    [audioNameToPlayer setValue:player forKey: audioName];\n\
    \    return player;\n}\n```\n\n在清单11-7中，我们看到了任务`prepareAudio:`。此任务负责为传入的每个音频文件创建一个`AVAudioPlayer`。我们首先惰性初始化一个名为`audioNameToPlayer`的`NSMutableDictionary`，它将`NSString\
    \ audioName`映射到构造后的`AVAudioPlayer`。为了创建一个`NSAudioPlayer`，我们首先创建一个指向项目中所需`m4a`文件的`NSURL`。为了构造`NSAudioPlayer`，我们只需调用`initWithContentsOfURL:error:`，并忽略任何错误。\n\
    \n我们在新创建的`player`上调用`prepareToPlay`，以确保文件已加载并准备好，以便稍后我们对其调用`play`时能够立即发声。\n\n\
    在`doSetup`任务中调用的另一个与声音相关的任务（来自清单11-5）是`playBackgroundAudio:`，如清单11-8所示。\n\n**清单\
    \ 11-8.** `playBackgroundAudio:` (`GameController.m`)\n\n```\n-(void)playBackgroundAudio:(NSString*)audioName{\n\
    \    if (backgroundPlayer != nil){\n        [backgroundPlayer stop];\n    }\n\
    \    backgroundPlayer = [self prepareAudio:audioName];\n    [backgroundPlayer\
    \ setNumberOfLoops:-1];\n    \n    if (!otherAudioIsPlaying){\n        [backgroundPlayer\
    \ play];\n    }\n}\n```\n\n在清单11-8中，任务`playBackgroundAudio:`接受一个音频文件的名称。如果存在现有的`AVAudioPlayer\
    \ backgroundPlayer`，我们将其停止。接下来，我们调用`prepareAudio:`来构造并初始化一个`AVAudioPlayer`。为了让音频无限期播放，我们调用`setNumberOfLoops:`并指定`-1`。虽然我们希望背景音频连续播放，但我们也可以使用`setNumberOfLoops:`来让音频文件播放固定次数。任务`setNumberOfLoops:`的命名有点奇怪；它表示一个音轨被额外播放的次数。因此，例如，如果您指定了`0`，音频将播放一次（默认次数）。如果您指定了`3`，音频将播放`4`次。基本上，`setNumberOfLoops:`指定了音频应被**额外**播放的次数。\n\
    \n`playBackgroundAudio:`中要做的最后一件事是检查是否没有其他音频在播放，然后通过调用`backgroundPlayer`的`play`来启动音频。\n\
    \n我们已经了解了如何指定我们希望在游戏生命周期中能够播放的音频。我们也了解了如何设置一个无限循环播放的背景音轨，并考虑了其他音频的播放。接下来，我们将看到如何播放由游戏内事件驱动的音效。\n\
    \n### 游戏内事件的音效\n\n至此，我们已经做了大量设置工作，以确保我们的应用程序正确播放音频。我们还做了一些工作，使游戏相关的类能够轻松播放音效。在本节中，我们将查看一些游戏逻辑，并看看如何播放由游戏内事件驱动的音效。\n\
    \n回顾一下，在本章的示例中，我们有一些能量道具在屏幕上移动。当其中一个能量道具与飞船碰撞时，我们会播放一个音效。驱动此行为的逻辑见清单11-9。\n\n\
    **清单 11-9.** `applyGameLogic` (`ViewController.m`)\n\n```\n-(void)applyGameLogic{\n\
    \    if (self."
  raw: 'Obviously, we would not include a switch like this on the screen while your
    game is playing, but it might be a good option on a setting screen someplace,
    probably defaulting to OFF.    As mentioned, there is a background sound track
    that plays in addition to the sound effects. As you will see in the following
    sections, these two types of audio are handled differently to make the developer’s
    life a little easier.    The following sections will go over this example piece
    by piece, highlighting how sound effects are played    Setting up the GameController    Like
    many of the examples in this game, we start by extending GameController to specify
    our game specific features—the business logic of the game, if you will. [Listing
    11-5](#9781430244226_Ch11.xhtml#list5) shows how we set up this example.    [**Listing
    11-5**](#9781430244226_Ch11.xhtml#_list5). `doSetup` (`ViewController.m`)    ```
    -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(480,
    320)];         [self setIsPaused: NO];                   NSMutableArray* classes
    = [NSMutableArray new];         [classes addObject:[Powerup class]];         [self
    setSortedActorClasses:classes];           viper = [Viper viper:self];         [self
    addActor: viper];                   [self prepareAudio: AUDIO_POWERUP_BLINK];
            [self prepareAudio: AUDIO_GOT_POWERUP];         [self playBackgroundAudio:
    AUDIO_BC_THEME];                   return YES;     }     return NO; } ```    In
    [Listing 11-5](#9781430244226_Ch11.xhtml#list5), we see our standard `GameController`
    setup code. We specify the size of the game area, indicate that we want to keep
    track of `Powerup` actors, and we create and add a `Viper`. The last few things
    we do in doSetup is to set up the audio we want to play. We call `prepareAudio`:,
    then pass in the `NSString` constants `AUDIO_POWERUP_BLINK` and `AUDIO_GOT_POWER`.
    We will look at the task `prepareAudio`: shortly. For completeness, let’s take
    a quick look at the three `NSString` constants that are defined in [Listing 11-6](#9781430244226_Ch11.xhtml#list6).    [**Listing
    11-6**](#9781430244226_Ch11.xhtml#_list6). `Sample 11-Prefix.pch` (partial)    ```
    #define AUDIO_POWERUP_BLINK @"powerup_blink" #define AUDIO_GOT_POWERUP @"got_powerup"
    #define AUDIO_BC_THEME @"bc_theme" ```    In [Listing 11-6](#9781430244226_Ch11.xhtml#list6),
    we see that we have defined three constants. Each is simply a string referring
    to the name of an audio file included in the project, excluding the file extension.
    [Figure 11-3](#9781430244226_Ch11.xhtml#Fig3) shows these files in the Xcode project.    ![9781430244226_Fig11-03.jpg](images/9781430244226_Fig11-03.jpg)    [Figure
    11-3.](#9781430244226_Ch11.xhtml#_Fig3)  Including Audio in an Xcode Project    In
    [Figure 11-3](#9781430244226_Ch11.xhtml#Fig3), we see that, to include audio in
    a project, we simply add the files as we would any other resource. Also, note
    that they are all m4a files. iOS is capable of playing many types of audio files,
    but AAC-encoded files are recommended, which these are. In our example, the m4a
    extension is assumed. [¹](#9781430244226_Ch11.xhtml#Fn1)    Looking back at [Listing
    11-5](#9781430244226_Ch11.xhtml#list5), we see that we pass these constants to
    two different tasks, `prepareAudio`: and `playBackgroundAudio`:.  The task `prepareAudio`:
    gets an audio file ready so that the audio is played promptly when a game event
    requires a sound effect. The task `playBackgroundAudio`: loops a single track
    forever to provide background music for a game. Let’s start with `prepareAudio`:,
    as shown on [Listing 11-7](#9781430244226_Ch11.xhtml#list7).    [**Listing 11-7**](#9781430244226_Ch11.xhtml#_list7). `prepareAudio:`
    (`GameController.


    m`)    ``` -(AVAudioPlayer*)prepareAudio:(NSString*)audioName{     if (audioNameToPlayer
    == nil){         audioNameToPlayer = [NSMutableDictionary new];     }     NSURL
    *url = [NSURL fileURLWithPath:[[NSBundle mainBundle] pathForResource:audioName
    ofType:@"m4a"]];           AVAudioPlayer* player = [[AVAudioPlayer alloc] initWithContentsOfURL:url
    error: nil];     [player prepareToPlay];           [audioNameToPlayer setValue:player
    forKey: audioName];     return player; } ```    In [Listing 11-7](#9781430244226_Ch11.xhtml#list7),
    we see the task `prepareAudio`:. This task is responsible for creating an `AVAudioPlayer`
    for each audio file passed in. We do this by first lazily initializing an `NSMutableDictionary`
    called `audioNameToPlayer`, which maps the `NSString audioName` to an `AVAudioPlayer`
    once constructed. To create an `NSAudioPlayer`, we first create an `NSURL` pointing
    to the desired m4a file in the project. To construct the NSAudioPlayer, we simply
    call `initWithContentsOfURL:error:`, ignoring any error.    We call `prepareToPlay`
    on the newly created `player` in order to make sure that the file is loaded and
    ready to make sound as soon as we call `play` on it sometime later.    The other
    sound-related task called in our `doSetup` task, from [Listing 11-5](#9781430244226_Ch11.xhtml#list5),
    is `playBackgroundAudio`:, which is shown in [Listing 11-8](#9781430244226_Ch11.xhtml#list8).    [**Listing
    11-8**](#9781430244226_Ch11.xhtml#_list8). `playBackgroundAudio:` (`GameController`.m)    ```
    -(void)playBackgroundAudio:(NSString*)audioName{     if (backgroundPlayer != nil){
            [backgroundPlayer stop];     }     backgroundPlayer = [self prepareAudio:audioName];
        [backgroundPlayer setNumberOfLoops:-1];           if (!otherAudioIsPlaying){
            [backgroundPlayer play];     } } ```    In [Listing 11-8](#9781430244226_Ch11.xhtml#list8),
    the task `playBackgroundAudio`: takes the name of an audio file. If an existing
    `AVAudioPlayer backgroundPlayer` exits, we stop it. Next, we call `prepareAudio:`
    to construct and initialize an `AVAudioPlayer`. To make the audio play indefinitely,
    we call `setNumberOfLoops:` and specify −1\. While we want the background audio
    to play continuously, we can instead use `setNumberOfLoops:` to play an audio
    file a fixed number of times. The naming of the task `setNumberOfLoops:` is a
    little weird; it indicates the number of extra times a track is played. So, for
    example, if you specified 0, the audio would play once (the default number of
    times). If you specified 3, the audio track would play 4 times. Basically, `setNumberOfLoops:`
    specifies the number of `additional` times the audio should be played.    The
    last thing to do in `playBackgroundAudio:` is check if there is no other audio
    playing and start the audio by calling `play` on `backgroundPlayer`.    We have
    looked at how to specify what audio we will want to be able to play during the
    life of our game. We have also looked at how to set up a background audio track
    that plays indefinitely and with regard to other audio being played. Next, we
    will see how we play sound effects that are driven by in-game events.    Sound
    Effects for In-game Events    At this point, we have done a lot of setup to make
    sure our application plays audio correctly. We have also done a little work to
    make it easy for our game-related classes to play sound effects. In this section,
    we will look at some game logic and see how we play sound effects driven by an
    in-game event.    To review, in the chapter’s example,  we have a number of power-ups
    that travel across the screen. When one of these power-ups collides with the spaceship,
    we play a sound effect. The logic that drives this behavior is found in [Listing
    11-9](#9781430244226_Ch11.xhtml#list9).    [**Listing 11-9**](#9781430244226_Ch11.xhtml#_list9). `applyGameLogi`c
    (`ViewController`.m)    ``` -(void)applyGameLogic{     if (self.'
  trans: "\n## 排版后内容\n\n显然，我们不会在游戏进行时将这样的开关显示在屏幕上，但它可能是某个设置屏幕上的一个不错选项，可能默认设置为`OFF`。如前所述，除了音效之外，还会播放背景配乐。正如您将在以下章节中看到的，这两种类型的音频以不同的方式处理，以便让开发者的工作更轻松。接下来的章节将逐一讲解这个示例，重点介绍音效的播放方式。\n\
    \n### 设置`GameController`\n\n与本游戏中的许多示例一样，我们首先扩展`GameController`来指定我们游戏特定的功能——即游戏的业务逻辑。清单\
    \ 11-5 展示了我们如何设置这个示例。\n\n**清单 11-5.** `doSetup` (`ViewController.m`)\n\n```\n\
    -(BOOL)doSetup{\n    if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(480,\
