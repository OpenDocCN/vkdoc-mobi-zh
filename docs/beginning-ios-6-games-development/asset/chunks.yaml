    alloc] initAt:center WithRadius:32 AndRepresentation:rep];     [rep setDelegate:powerup];
        float rotation = arc4random()%100/100.0 * M_PI*2;     [powerup setRotation:rotation];
        [powerup setVariant:arc4random()%PWR_VARIATION_COUNT];    //Section Omitted
    , see Listing 6-21      return powerup; } ```    The first thing we have to do
    is figure out values that will be passed to `Actor`’s `initAt:WithRadius:AndRepresentation`
    task. After we have those values figured out, we create a new power-up and then
    set a few starting values, such as the rotation and variation of the power-up.
    In an omitted section of [Listing 6-13](#9781430244226_Ch06.xhtml#list13), we
    set up the behavior of the power-up. This code can be found in [Listing 6-21](#9781430244226_Ch06.xhtml#list21)
    and is discussed later in this section.    Let’s take a quick look at how we calculate
    the center of the power-up before diving into the details of `ImageRepresentation`.
    The `CGPoint` center is created by picking a random point on a circle just beyond
    the bounds of the screen, as shown in [Figure 6-3](#9781430244226_Ch06.xhtml#Fig3).    ![9781430244226_Fig06-03.jpg](images/9781430244226_Fig06-03.jpg)    [Figure
    6-3.](#9781430244226_Ch06.xhtml#_Fig3)  Random point offscreen    In this image,
    you can see the gray rectangle, which is the same size as the variable `gameSize`.
    The dot in the middle is the `CGpoint gameCenter`. The black line going from `gameCenter`
    to the upper-left corner of `gameSize` is of the length `distanceFromCenter`.
    The value of `distanceFromCenter` is calculated based on the X and Y components
    of `gameCenter`, using the Pythagorean theorem. Using `gameCenter` and `distanceFromCenter`,
    we can get a random point on the outer circle by calling `randomPointAround:At`:
    from the class `Actor` (shown earlier in [Listing 6-10](#9781430244226_Ch06.xhtml#list10)).'
  trans: "\n0，因此默认情况下角色完全不透明。\n\n## 使用强化道具角色\n\n在前一节中，我们研究了`GameController`和`Actor`类，了解到`Actor`类需要`Representation`对象才能显示。`Representation`协议描述了类在管理与角色关联的`UIView`时需要满足的要求。在本节中，我们将探讨`ImageRepresentation`类，并了解它如何使用图像来表示角色。在上一章中，我们使用图像绘制了不同的角色。在本节中，我们将展示如何将这些技术整合到一个简单、可重用的`ImageRepresentation`类中。\n\
    \n为了说明`ImageRepresentation`，在我们的第一个示例中，我们将创建强化道具并让它们在屏幕上动画显示，如图 6-1 所示。\n\n![9781430244226_Fig06-01.jpg](img/9781430244226_Fig06-01.jpg)\n\
    \n图 6-1.  示例 1——强化道具\n\n在图像中，您可以看到几个圆柱体，上面有三个符号：美元符号、点和叉号。当此示例运行时，每个圆柱体沿直线移动。当一个圆柱体到达屏幕边缘时，它会环绕到对侧边缘。当每个圆柱体移动时，它还会看起来绕自身旋转或翻滚。几秒钟后，每个圆柱体上的条纹和符号将开始闪烁，提示它即将消失。当您启动示例时，屏幕上不会有强化道具，但每\
    \ 5 秒，就会有一个新的强化道具在`屏幕外`生成并漂入视野。让我们仔细看看用于创建此动画的图像。参见 图 6-2。\n\n![9781430244226_Fig06-02.jpg](img/9781430244226_Fig06-02.jpg)\n\
    \n图 6-2.  强化道具细节\n\n图 6-2 的顶部展示了构成带发光效果的旋转“生命”强化道具的 63 幅图像的起始和结束。在示例代码中，您将找到六组图像：每种类型的强化道具都有一个发光版本和一个`不发光`版本。通过在发光版本和`不发光`版本之间切换，我们可以创建闪烁效果。\n\
    \n## 实现我们的强化道具角色\n\n为了实现我们的强化道具角色，我们必须配置`GameController`的子类`Example01Controller`，以便将强化道具添加到场景中。我们还需要实现强化道具角色本身，为其提供绘制自身以及定义其运动和行为的途径。关键类是`ImageRepresentation`和`Powerup`，但我们应该从`Example01Controller`类的`updateScene`任务开始，如\
    \ 代码清单 6-11 所示。\n\n**代码清单 6-11.  `Example01Controller.m (updateScene)`**\n\n```\
    \  \n-(void)updateScene{  \n    if (self.stepNumber % (60*5) == 0){  \n      \
    \  [self addActor:[Powerup powerup: self]];  \n    }  \n    [super updateScene];\
    \  \n}  \n```\n\n这里您可以看到`Example01Controller`类中定义的`updateScene`任务。`Example01Controller`类继承自`GameController`，因此它继承了该类中定义的游戏引擎逻辑。`updateScene`任务简单地每\
    \ 5 秒添加一个新的强化道具，然后调用`updateScene`的父类实现。`Powerup`类的头文件如 代码清单 6-12 所示。\n\n**代码清单\
    \ 6-12.  `Powerup.h`**\n\n```  \n#import <Foundation/Foundation.h>  \n#import\
    \ \"Actor.h\"  \n#import \"ImageRepresentation.h\"  \n#import \"ExpireAfterTime.h\"\
    \  \n\nenum{  \n    STATE_GLOW = 0,  \n    STATE_NO_GLOW,  \n    PWR_STATE_COUNT\
    \  \n};  \n\nenum{  \n    VARIATION_HEALTH = 0,  \n    VARIATION_CASH,  \n   \
    \ VARIATION_DAMAGE,  \n    PWR_VARIATION_COUNT  \n};  \n\n@interface Powerup :\
    \ Actor <ImageRepresentationDelegate,ExpireAfterTimeDelegate>{  \n\n}  \n\n+(id)powerup:(GameController*)aController;\
    \  \n\n@end  \n```\n\n此头文件首先定义了两个枚举。第一个枚举定义了`Powerup`的两种状态`STATE_GLOW`或`STATE_NO_GLOW`的值。第二个枚举定义了`Powerup`的三种变体的值。这两个枚举都以包含`COUNT`一词的值结尾。对于不是来自\
    \ C 背景的开发者来说，这是一种用于为枚举中项目数量创建常量的老技巧。例如，在第一个枚举中，`STATE_GLOW`的值为 0，因此`STATE_NO_GLOW`的值为\
    \ 1。这使`PWR_STATE_COUNT`的值为 2，也就是状态的数量。很巧妙，不是吗？\n\n代码清单 6-12 中定义的`Powerup`类继承自`Actor`。它还符合`ImageRepresentationDelegate`和`ExpireAfterTimeDelegate`协议。当我们研究`ImageRepresentation`和`ExpireAfterTime`的细节时，我们将查看这些协议附带的任务。为`Powerup`类定义的唯一新任务是构造函数`powerup:`。让我们在\
    \ 代码清单 6-13 中看一看这个任务。\n\n**代码清单 6-13.  `Powerup.m (powerup: (partial))`**\n\n\
    ```  \n+(id)powerup:(GameController*)aController{  \n    CGSize gameSize = [aController\
    \ gameAreaSize];  \n    CGPoint gameCenter = CGPointMake(gameSize.width/2.0, gameSize.height/2.0);\
    \  \n    float distanceFromCenter = sqrtf(gameCenter.x*gameCenter.x + gameCenter.y*gameCenter.y);\
    \  \n    CGPoint center = [Actor randomPointAround:gameCenter At:distanceFromCenter];\
    \  \n\n    ImageRepresentation* rep = [ImageRepresentation imageRep];  \n    [rep\
    \ setBackwards:arc4random()%2 == 0];  \n    [rep setStepsPerFrame:1 + arc4random()%3];\
    \  \n\n    Powerup* powerup = [[Powerup alloc] initAt:center WithRadius:32 AndRepresentation:rep];\
    \  \n    [rep setDelegate:powerup];  \n    float rotation = arc4random()%100/100.0\
    \ * M_PI*2;  \n    [powerup setRotation:rotation];  \n    [powerup setVariant:arc4random()%PWR_VARIATION_COUNT];\
    \  \n\n  //省略了部分内容，参见代码清单 6-21  \n\n    return powerup;  \n}  \n```\n\n我们首先要做的是计算出将传递给`Actor`的`initAt:WithRadius:AndRepresentation`任务的值。计算出这些值后，我们会创建一个新的强化道具，然后设置一些初始值，例如强化道具的旋转和变体。在\
    \ 代码清单 6-13 的省略部分中，我们设置了强化道具的行为。这段代码可以在 代码清单 6-21 中找到，将在本节后面讨论。\n\n在深入探讨`ImageRepresentation`的细节之前，让我们快速了解一下我们如何计算强化道具的中心位置。`CGPoint`中心是通过在屏幕边界外的一个圆上选取随机点来创建的，如图\
    \ 6-3 所示。\n\n![9781430244226_Fig06-03.jpg](img/9781430244226_Fig06-03.jpg)\n\n\
    图 6-3.  屏幕外的随机点\n\n在此图像中，您可以看到灰色的矩形，其大小与变量`gameSize`相同。中间的圆点是`CGPoint gameCenter`。从`gameCenter`延伸到`gameSize`左上角的黑线长度为`distanceFromCenter`。`distanceFromCenter`的值基于`gameCenter`的\
    \ X 和 Y 分量，使用勾股定理计算得出。利用`gameCenter`和`distanceFromCenter`，我们可以通过调用`Actor`类的`randomPointAround:At:`（如前面的\
    \ 代码清单 6-10 所示）在外圆上获得一个随机点。"
- fmt: "在`[Listing 6-13]`中，计算中心点并选择半径为`32`后，我们必须创建一个`Representation`对象来处理这个增强道具的绘制。因为我们想使用一系列图像来表示增强道具，所以创建了一个名为`rep`的`ImageRepresentation`实例，并设置了`backwards`和`stepsPerFrame`属性。`ImageRepresentation`被传递给`Actor`的`initAt:WithRadius:AndRepresentation:`任务，以将`rep`设置为该增强道具的表示。还要注意，我们将`Powerup`设置为`rep`的委托。这意味着我们正在创建的`Powerup`实例将用于指定关于如何绘制该角色的信息。\n\
    \n**检查`ImageRepresentation`**\n\n为了将角色的游戏逻辑与其绘制方式分离，我们引入了`ImageRepresentation`类。此类负责创建使用`UIView`渲染角色所需的对象。主要是，`ImageRepresentation`将使用PNG文件创建`UIImageViews`来绘制我们的角色。让我们看看`ImageRepresentation`的头文件，如`[Listing\
    \ 6-14]`所示。\n\n**[Listing 6-14] `ImageRepresentation.h`**\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Actor.h\"\n\n@protocol ImageRepresentationDelegate\n\n@required\n-(NSString*)baseImageName;\n\
    \n@optional\n-(int)getFrameCountForVariant:(int)aVariant AndState:(int)aState;\n\
    -(NSString*)getNameForVariant:(int)aVariant;\n-(NSString*)getNameForState:(int)aState;\n\
    \n@end\n\n@interface ImageRepresentation : NSObject<Representation> {\n    UIView*\
    \ view;\n}\n@property (nonatomic, assign) NSObject<ImageRepresentationDelegate>*\
    \ delegate;\n@property (nonatomic, strong) NSString* baseImageName;\n@property\
    \ (nonatomic) int currentFrame;\n@property (nonatomic) BOOL backwards;\n@property\
    \ (nonatomic) int stepsPerFrame;\n\n+(id)imageRep;\n+(id)imageRepWithName:(NSString*)aBaseImageName;\n\
    +(id)imageRepWithDelegate:(NSObject<ImageRepresentationDelegate>*)aDelegate;\n\
    -(void)advanceFrame:(Actor*)actor ForStep:(int)step;\n-(NSString*)getImageNameForActor:(Actor*)actor;\n\
    -(UIImage*)getImageForActor:(Actor*)actor;\n\n@end\n```\n\n`ImageRepresentation`类的目标是封装处理使用图像表示角色的常见方式的代码。这些方式包括以下情况：\n\
    \n- 单张图像表示角色\n- 一系列图像表示角色\n- 具有多种状态的角色\n- 具有多种变体的角色\n- 对于每种状态和变体的组合，具有不同数量图像的角色\n\
    \n我们创建的每个使用`ImageRepresentation`的角色都将符合上述情况之一。通过设置一个类型为`ImageRepresentationDelegate`的委托，我们指示我们想要使用哪种情况，如`[Listing\
    \ 6-14]`所示。这允许`ImageRepresentationDelegate`的实例指示在任何给定时间应使用的图像名称。\n\n`ImageRepresentationDelegate`必须指定一个`baseImageName`，该名称用于`ImageRepresentation`的所有用例。如果`ImageRepresentationDelegate`只实现了`baseImageName:`，则表示角色的所有实例都将使用单个图像。如果要使用一系列图像，则委托对象必须实现任务`getFrameCountForVariant:AndState:`。如果要根据角色的状态或变体使用不同的图像序列，则委托必须分别实现`getNameForState:`和`getNameForVariant:`。从技术上讲，如果只使用单个图像来表示特定类型的所有角色，则不需要为`ImageRepresentation`指定委托。但是，`ImageRepresentation`仍然需要指定`baseImageName`。\n\
    \n**创建`Powerup`的实现**\n\n`Powerup`类必须定义其绘制方式以及基本行为。由于`Powerup`类将对状态和变体的每种组合使用不同的图像序列，因此`ImageRepresentation`的委托必须实现所有这四个任务。为简单起见，我们指定`Powerup`类遵循`ImageRepresentationDelegate`协议。让我们看看`[Listing\
    \ 6-15]`中这些方法的实现。\n\n**[Listing 6-15] `Powerup.m（ImageRepresentationDelegate任务）`**\n\
    \n```\n-(NSString*)baseImageName{\n    return @\"powerup\";\n}\n-(int)getFrameCountForVariant:(int)aVariant\
    \ AndState:(int)aState{\n    return 63;\n}\n-(NSString*)getNameForVariant:(int)aVariant{\n\
    \    if (aVariant == VARIATION_HEALTH){\n        return @\"health\";\n    } else\
    \ if (aVariant == VARIATION_CASH){\n        return @\"cash\";\n    } else if (aVariant\
    \ == VARIATION_DAMAGE){\n        return @\"damage\";\n    } else {\n        return\
    \ nil;\n    }\n}\n-(NSString*)getNameForState:(int)aState{\n    if (aState ==\
    \ STATE_GLOW){\n        return @\"glow\";\n    } else if (aState == STATE_NO_GLOW){\n\
    \        return @\"noglow\";\n    } else {\n        return nil;\n    }\n}\n```\n\
    \n在此列表中，我们看到`ImageRepresentationDelegate`所需的四个任务，用于创建一个由每种状态和变体组合的不同图像序列表示的角色。任务`baseImageName`返回`NSString\
    \ \"powerup\"`，表示此角色的所有图像都将以`\"powerup\"`开头。任务`getFrameCountForVariant:AndState:`直接返回`63`，因为每种状态和变体组合都有`63`张图像。其他类型的角色可能希望为每种状态和变体组合拥有不同数量的图像，并且可以自由地在`getFrameCountForVariant:AndState:`中返回不同的数字。\n\
    \n任务`getNameForVariant:`和`getNameForState:`返回适用于增强道具的每种变体和状态的字符串表示，并允许`ImageRepresentation`确定在给定时间应使用哪张图像。\n\
    \n**为角色查找正确的图像**\n\n让我们看看`ImageRepresentation`的任务`getImageNameForActor:`，以便您了解如何使用`ImageRepresentationDelegate`的四个任务来识别图像名称。请参阅`[Listing\
    \ 6-16]`。\n\n**[Listing 6-16] `ImageRepresentation.m（getImageNameForActor:）`**\n\
    \n```\n-(NSString*)getImageNameForActor:(Actor*)actor{\n    NSString* imageName\
    \ = baseImageName;\n\n    if (imageName == nil){\n        imageName = [delegate\
    \ baseImageName];\n    }\n    NSString* variant = nil;\n    if ([delegate respondsToSelector:@selector(getNameForVariant:)]){\n\
    \        variant = [delegate getNameForVariant:[actor variant]];\n    }\n    NSString*\
    \ state = nil;\n    if ([delegate respondsToSelector:@selector(getNameForState:)]){\n\
    \        state = [delegate getNameForState:[actor state]];\n    }\n    int frameCount\
    \ = 0;\n    if ([delegate respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n\
    \        frameCount = [delegate getFrameCountForVariant:[actor variant] AndState:[actor\
    \ state]];\n    }\n    if (variant != nil){\n        imageName = [[imageName stringByAppendingString:@\"\
    _\"] stringByAppendingString:variant];\n    }\n    if (state != nil){\n      \
    \  imageName = [[imageName stringByAppendingString:@\"_\"] stringByAppendingString:state];\n\
    \    }\n    if (frameCount != 0){\n        imageName = [[imageName stringByAppendingString:@\"\
    _\"] stringByAppendingString:[NSString stringWithFormat:@\"%04d\", currentFrame]\
    \ ];\n    }\n    return imageName;\n}\n```\n\n这里的目标是确定应该用于表示角色的正确图像名称。最终的图像名称将存储在变量`imageName`中。我们首先要做的是建立`baseImageName`。"
  raw: 'In [Listing 6-13](#9781430244226_Ch06.xhtml#list13), after calculating the
    center point and picking a radius of 32, we have to create a `Representation`
    object to handle the drawing of this power-up. Because we want to use a series
    of images to represent power-ups, we create an instance of `ImageRepresentation`
    called rep and set the properties backwards and `stepsPerFrame`. `ImageRrepresentation`
    is passed to `Actor`’s `initAt:WithRadius:AndRepresentation`: task to set rep
    as the power-up’s representation. Also note that we set the `Powerup` as the rep’s
    delegate. This means that the instance of `Powerup` we are creating will be used
    to specify information about how to draw this actor.    Inspecting `ImageRepresentation`    Because
    we want to separate the game logic regarding an actor and how it is drawn, we
    are introducing the class `ImageRepresentation`. This class is responsible for
    creating the objects necessary for rendering an actor with a `UIView.` Primarily,
    `ImageRepresentation` will be created `UIImageViews` with the PNG files in order
    to draw our actors. Let’s take a look at the header of `ImageRepresentation`,
    shown in [Listing 6-14](#9781430244226_Ch06.xhtml#list14).    **[Listing 6-14.](#9781430244226_Ch06.xhtml#_list14) ImageRepresentation.h**    ```
    #import <Foundation/Foundation.h> #import "Actor.h"  @protocol ImageRepresentationDelegate  @required
    -(NSString*)baseImageName;  @optional -(int)getFrameCountForVariant:(int)aVariant
    AndState:(int)aState; -(NSString*)getNameForVariant:(int)aVariant; -(NSString*)getNameForState:(int)aState;  @end  @interface
    ImageRepresentation : NSObject<Representation> {     UIView* view; } @property
    (nonatomic, assign) NSObject<ImageRepresentationDelegate>* delegate; @property
    (nonatomic, strong) NSString* baseImageName; @property (nonatomic) int currentFrame;
    @property (nonatomic) BOOL backwards; @property (nonatomic) int stepsPerFrame;  +(id)imageRep;
    +(id)imageRepWithName:(NSString*)aBaseImageName; +(id)imageRepWithDelegate:(NSObject<ImageRepresentationDelegate>*)aDelegate;
    -(void)advanceFrame:(Actor*)actor ForStep:(int)step; -(NSString*)getImageNameForActor:(Actor*)actor;
    -(UIImage*)getImageForActor:(Actor*)actor;  @end ```    The goal of the `ImageRepresentation`
    class is to encapsulate code for handling the common ways images will be used
    to represent an actor. These include the following cases:    *   A single image
    representing the actor *   A series of images representing the actor *   Actors
    with multiple states *   Actors with multiple variations *   Actors with a different
    number of images for every combination of states and variations    Each actor
    we create that uses an `ImageRepresentation` will fit one of the preceding cases.
    We indicate which one of these cases we intend by setting a delegate of type I`mageRepresentationDelegate`,
    as shown in [Listing 6-14](#9781430244226_Ch06.xhtml#list14). This allows an instance
    of `ImageRepresentationDelegate` to indicate the name of the image that should
    be used at any given time.    The `ImageRepresentationDelegate` must specify a
    `baseImageName`, which is used in all of the use cases of `ImageRepresentation`.
    If the `ImageRepresentationDelegate` implements only `baseImageName`:, this indicates
    that a single image will be used for all instances of the actor. If a sequence
    of images is to be used, the delegate object must implement the task `getFrameCountForVariant:AndState`:.
    If a different sequence of images is to be used based on the state or variant
    of the actor, the delegate must implement `getNameForState`: and `getNameForVariant`:,
    respectively. Technically speaking, if just a single image is going to be used
    to represent all actors of a particular type, it is not required to specify a
    delegate to an `ImageRepresentation`. However, the `ImageRepresentation` still
    requires `baseImageName` to be specified.


    Creating the Implementation of `Powerup`    The class `Powerup` must define how
    it is drawn, as well as its basic behavior. Because the class `Powerup` will use
    a different sequence of images for each combination of state and variation, the
    delegate for `ImageRepresentation` must implement all four of these tasks. For
    simplicity, we specified that the class `Powerup` conforms to the protocol `ImageRepresentationDelegate`.
    Let’s take a look at the implementation of these methods in [Listing 6-15](#9781430244226_Ch06.xhtml#list15).    **[Listing
    6-15.](#9781430244226_Ch06.xhtml#_list15) `Powerup.m (ImageRepresentationDelegate
    tasks)`**    ``` -(NSString*)baseImageName{     return @"powerup"; } -(int)getFrameCountForVariant:(int)aVariant
    AndState:(int)aState{     return 63; } -(NSString*)getNameForVariant:(int)aVariant{
        if (aVariant == VARIATION_HEALTH){         return @"health";     } else if
    (aVariant == VARIATION_CASH){         return @"cash";     } else if (aVariant
    == VARIATION_DAMAGE){         return @"damage";     } else {         return nil;
        } } -(NSString*)getNameForState:(int)aState{     if (aState == STATE_GLOW){
            return @"glow";     } else if (aState == STATE_NO_GLOW){         return
    @"noglow";     } else {         return nil;     } } ```    In this listing, we
    see the four tasks required by an `ImageRepresentationDelegate` to create an actor
    represented by a different sequence of images for each combination of states and
    variations. The task `baseImageName` returns the `NSString "powerup"`, indicating
    that all of the images for this actor will start with “`powerup`”. The task `getFrameCountForVariant:AndState`:
    simply returns 63, because there are 63 images for each combination of state and
    variation. Other types of actors may wish to have a different number of images
    for each combination of state and variation and are free to return different numbers
    in `getFrameCountForVariant:AndState`:.    The tasks `getNameForVariant`: and
    `getNameForState`: return string representations for each variation and state
    that apply to power-ups and allow `ImageRepresentation` to figure out exactly
    what image should be used at a given time.    Finding the Correct Image for an
    Actor    Let’s take a look at `ImageRepresentation''s` task `getImageNameForActor`:
    so you can understand how the four tasks from `ImageRepresentationDelegate` are
    used to identify an image name. See [Listing 6-16](#9781430244226_Ch06.xhtml#list16).    **[Listing
    6-16.](#9781430244226_Ch06.xhtml#_list16) `ImageRepresentation.m (getImageNameForActor:)`**    ```
    -(NSString*)getImageNameForActor:(Actor*)actor{     NSString* imageName = baseImageName;      if
    (imageName == nil){         imageName = [delegate baseImageName];     }     NSString*
    variant = nil;     if ([delegate respondsToSelector:@selector(getNameForVariant:)]){
            variant = [delegate getNameForVariant:[actor variant]];     }     NSString*
