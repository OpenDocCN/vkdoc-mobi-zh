    # About the Author


    ![image](images/9781430244226_unFM-01.jpg)


    **Lucas L. Jordan** is a lifelong computer enthusiast who has worked for many
    years as a developer, with a focus on user interface. He is the author of *JavaFX
    Special Effects: Taking Java RIA to the Extreme with Animation, Multimedia, and
    Game Elements* and the co-author of *Practical Android Projects*, both by Apress.
    Lucas is interested in mobile application development in its many forms. He has
    recently quit his day job to pursue a career developing apps under the name ClayWare,
    LLC. Learn more at `http://claywaregames.com`.


    # About the Technical Reviewer


    ![image](images/9781430244226_unFM-02.jpg)


    **Tony Hillerson** is a mobile developer and cofounder at Tack Mobile. He graduated
    from Ambassador University with a BA in MIS. On any given day he may be working
    with `Objective-C`, `Java`, `Ruby`, `Coffeescript`, `Javascript`, `HTML`, or shell
    scripts. Tony has spoken at RailsConf, AnDevCon, 360|Flex, and has created popular
    O’Reilly Android screencasts.


    In his free time Tony enjoys playing the bass and Warr Guitar, and making electronic
    music. Tony lives outside Denver, CO with his wife Lori and sons Titus and Lincoln.


    # Acknowledgments


    As always this book would not exists without the fine people at Apress who can
    turn a bunch of Word documents into a book. Amazing! Specifically, Katie Sullivan
    did a great job keeping me on track. Tom Welsh helped track down those elusive
    Code Inline formatting issues. Tony Hillerson ran the code and insured I wasn''t
    just making stuff up. Thank you all.


    # Chapter 1: A Simple First Game


    In this book you are going to learn a lot about working with iOS. The goal, of
    course, is to be able to build a game that runs on iOS. To do that, you must learn
    about a lot of different elements that a full game will incorporate, such as basic
    UI widgets, audio, complex touch input, Game Center, in-app purchases, and of
    course graphics. This book will explore these concepts and many others. Think
    of it as a guide to the building blocks that you will need to make a compelling
    game that is specific to iOS and Apple''s mobile devices. All iOS applications
    have one thing in common—the application `Xcode`—so it makes sense to start with
    that.


    In this first chapter, we are going to build a very simple game of Rock, Paper,
    Scissors. We will use the Storyboard feature of `Xcode` to create an application
    with two views and the navigation between them.'
