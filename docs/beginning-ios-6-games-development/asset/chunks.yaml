- fmt: "0, so that actors are fully opaque by default.  \n\n## Working with the Power-Up\
    \ Actor  \n\nIn the previous section, we looked at the classes `GameController`\
    \ and `Actor` and learned that the `Actor` class requires a `Representation` object\
    \ to be displayed. The `Representation` protocol describes what is required of\
    \ a class to manage the `UIView` associated with an actor. In this section, we\
    \ will explore the class `ImageRepresentation` and see how it uses images to represent\
    \ an actor. In the preceding chapter, we used images to draw different actors.\
    \ In this section, we will show how we can combine those techniques into a simple,\
    \ reusable class called `ImageRepresentation`.  \n\nTo illustrate `ImageRepresentation`,\
    \ in our first example we will create power-ups and animate them across the screen,\
    \ as shown in [Figure 6-1](#9781430244226_Ch06.xhtml#Fig1).  \n\n![9781430244226_Fig06-01.jpg](images/9781430244226_Fig06-01.jpg)\
    \  \n\n[Figure 6-1.](#9781430244226_Ch06.xhtml#_Fig1)  Example 1—power-ups  \n\
    \nIn the image, you can see several cylinders with three symbols: a dollar sign,\
    \ a dot, and a cross. When this example is running, each cylinder travels in a\
    \ straight line. When a cylinder reaches the edge of the screen, it wraps around\
    \ to the opposite edge. As each cylinder travels, it also appears to spin or tumble\
    \ about itself. After a few seconds, the bands and symbol on each cylinder will\
    \ start flashing, announcing that it is about to disappear. When you start the\
    \ example, there will be no power-ups on the screen, but every 5 seconds, a new\
    \ one is added just `offscreen` and will drift into view. Let’s take a closer\
    \ look at the images used to create this animation. See [Figure 6-2](#9781430244226_Ch06.xhtml#Fig2).\
    \  \n\n![9781430244226_Fig06-02.jpg](images/9781430244226_Fig06-02.jpg)  \n\n\
    [Figure 6-2.](#9781430244226_Ch06.xhtml#_Fig2)  Power-up detail  \n\nThe top of\
    \ [Figure 6-2](#9781430244226_Ch06.xhtml#Fig2) shows the beginning and the end\
    \ of the 63 images that make up the rotating Health power-up with glow. In the\
    \ example code, you will find six series of images: a glowing version and a `nonglowing`\
    \ version for each of the three types of power-ups. By switching between the glowing\
    \ version and the `nonglowing` version, we can create the blinking effect.  \n\
    \n## Implementing Our Power-Up Actor  \n\nTo implement our power-up actor, we\
    \ have to configure our `GameController` subclass, `Example01Controller`, to add\
    \ power-ups to our scene. We also have to implement the power-up actor itself,\
    \ giving it a way to draw itself and define its motion and behavior. The key classes\
    \ are `ImageRepresentation` and `Powerup`, but we should start with the `updateScene`\
    \ task from the class `Example01Controller`, as shown in [Listing 6-11](#9781430244226_Ch06.xhtml#list11).\
    \  \n\n**[Listing 6-11.](#9781430244226_Ch06.xhtml#_list11) `Example01Controller.m\
    \ (updateScene)`**  \n\n```  \n-(void)updateScene{  \n    if (self.stepNumber\
    \ % (60*5) == 0){  \n        [self addActor:[Powerup powerup: self]];  \n    }\
    \  \n    [super updateScene];  \n}  \n```  \n\nHere you can see the `updateScene`\
    \ task as defined in the class `Example01Controller`. The class `Example01Controller`\
    \ extends `GameController` so it inherits the game engine logic defined in that\
    \ class. The `updateScene` task simply adds a new power-up every 5 seconds and\
    \ then calls the super-implementation of `updateScene`. The header file for the\
    \ class `Powerup` is shown in [Listing 6-12](#9781430244226_Ch06.xhtml#list12).\
    \  \n\n**[Listing 6-12.](#9781430244226_Ch06.xhtml#_list12) `Powerup.h`**  \n\n\
    ```  \n#import <Foundation/Foundation.h>  \n#import \"Actor.h\"  \n#import \"\
    ImageRepresentation.h\"  \n#import \"ExpireAfterTime.h\"  \n\nenum{  \n    STATE_GLOW\
    \ = 0,  \n    STATE_NO_GLOW,  \n    PWR_STATE_COUNT  \n};  \n\nenum{  \n    VARIATION_HEALTH\
    \ = 0,  \n    VARIATION_CASH,  \n    VARIATION_DAMAGE,  \n    PWR_VARIATION_COUNT\
    \  \n};  \n\n@interface Powerup : Actor <ImageRepresentationDelegate,ExpireAfterTimeDelegate>{\
    \  \n\n}  \n\n+(id)powerup:(GameController*)aController;  \n\n@end  \n```  \n\n\
    This header file starts by defining two enumerations. The first enumeration defines\
    \ the values for the two states of `Powerup`, `STATE_GLOW` or `STATE_NO_GLOW`.\
    \ The second enumeration defines the values for the three variations of `Powerup`.\
    \ Both of these enumerations end with a value that has the word `COUNT` in it.\
    \ For those developers who are not coming from a C background, this is an old\
    \ trick used to create a constant for the number of items in an enumeration. For\
    \ example, in the first enumeration, `STATE_GLOW` has a value of 0, so `STATE_NO_GLOW`\
    \ has a value of 1. This gives `PWR_STATE_COUNT` a value of 2, which is the number\
    \ of states there are. Clever, no?  \n\nThe class `Powerup` as defined in [Listing\
    \ 6-12](#9781430244226_Ch06.xhtml#list12) extends `Actor`. It also conforms to\
    \ the protocols `ImageRepresentationDelegate` and `ExpireAfterTimeDelegate`. We\
    \ will look at the tasks that come with these protocols when we look at the details\
    \ of the `ImageRepresentation` and `ExpireAfterTime`. The only new task defined\
    \ for the `Powerup` class is the constructor `powerup:`. Let’s take a look at\
    \ that task in [Listing 6-13](#9781430244226_Ch06.xhtml#list13).  \n\n**[Listing\
    \ 6-13.](#9781430244226_Ch06.xhtml#_list13) `Powerup.m (powerup: (partial))`**\
    \  \n\n```  \n+(id)powerup:(GameController*)aController{  \n    CGSize gameSize\
    \ = [aController gameAreaSize];  \n    CGPoint gameCenter = CGPointMake(gameSize.width/2.0,\
    \ gameSize.height/2.0);  \n    float distanceFromCenter = sqrtf(gameCenter.x*gameCenter.x\
    \ + gameCenter.y*gameCenter.y);  \n    CGPoint center = [Actor randomPointAround:gameCenter\
    \ At:distanceFromCenter];  \n\n    ImageRepresentation* rep = [ImageRepresentation\
    \ imageRep];  \n    [rep setBackwards:arc4random()%2 == 0];  \n    [rep setStepsPerFrame:1\
    \ + arc4random()%3];  \n\n    Powerup* powerup = [[Powerup alloc] initAt:center\
    \ WithRadius:32 AndRepresentation:rep];  \n    [rep setDelegate:powerup];  \n\
        float rotation = arc4random()%100/100.0 * M_PI*2;  \n    [powerup setRotation:rotation];\
    \  \n    [powerup setVariant:arc4random()%PWR_VARIATION_COUNT];  \n\n  //Section\
    \ Omitted, see Listing 6-21  \n\n    return powerup;  \n}  \n```  \n\nThe first\
    \ thing we have to do is figure out values that will be passed to `Actor`’s `initAt:WithRadius:AndRepresentation`\
    \ task. After we have those values figured out, we create a new power-up and then\
    \ set a few starting values, such as the rotation and variation of the power-up.\
    \ In an omitted section of [Listing 6-13](#9781430244226_Ch06.xhtml#list13), we\
    \ set up the behavior of the power-up. This code can be found in [Listing 6-21](#9781430244226_Ch06.xhtml#list21)\
    \ and is discussed later in this section.  \n\nLet’s take a quick look at how\
    \ we calculate the center of the power-up before diving into the details of `ImageRepresentation`.\
    \ The `CGPoint` center is created by picking a random point on a circle just beyond\
    \ the bounds of the screen, as shown in [Figure 6-3](#9781430244226_Ch06.xhtml#Fig3).\
    \  \n\n![9781430244226_Fig06-03.jpg](images/9781430244226_Fig06-03.jpg)  \n\n\
    [Figure 6-3.](#9781430244226_Ch06.xhtml#_Fig3)  Random point offscreen  \n\nIn\
    \ this image, you can see the gray rectangle, which is the same size as the variable\
    \ `gameSize`. The dot in the middle is the `CGPoint gameCenter`. The black line\
    \ going from `gameCenter` to the upper-left corner of `gameSize` is of the length\
    \ `distanceFromCenter`. The value of `distanceFromCenter` is calculated based\
    \ on the X and Y components of `gameCenter`, using the Pythagorean theorem. Using\
    \ `gameCenter` and `distanceFromCenter`, we can get a random point on the outer\
    \ circle by calling `randomPointAround:At:` from the class `Actor` (shown earlier\
    \ in [Listing 6-10](#9781430244226_Ch06.xhtml#list10))."
