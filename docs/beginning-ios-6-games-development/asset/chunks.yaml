    about a lot of different elements that a full game will incorporate, such as basic
    UI widgets, audio, complex touch input, Game Center, in-app purchases, and of
    course graphics. This book will explore these concepts and many others. Think
    of it as a guide to the building blocks that you will need to make a compelling
    game that is specific to iOS and Apple’s mobile devices. All iOS applications
    have one thing in common—the application Xcode—so it makes sense to start with
    that.


    In this first chapter, we are going to build a very simple game of Rock, Paper,
    Scissors. We will use the Storyboard feature of Xcode to create an application
    with two views and the navigation between them.'
