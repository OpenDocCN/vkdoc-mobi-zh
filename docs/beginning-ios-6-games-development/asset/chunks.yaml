    -(void)addActor:(Actor*)actor;\n-(void)updateViewForActor:(Actor*)actor;\n\n-(void)doAddActors;\n\
    -(void)doRemoveActors;\n-(NSMutableSet*)actorsOfType:(Class)class;\n@end\n```\n\
    \n如你所见，类 `GameController` 的头文件继承自类 `UIViewController`。名为 `actorsView` 的 `UIView`\
    \ 是一个 `IBOutlet`，它是游戏中每个角色的视图容器。我们不希望使用属性 `view` 作为角色的根视图，因为 `GameController`\
    \ 可能还需要关联其他视图，例如背景图片或游戏上层的其他 `UIView`。我们将在后续章节利用这一设计。现在你只需要知道，`UIView actorsView`\
    \ 是属性 `view` 的子视图，并且将包含所有角色的视图。\n\n在这个代码清单中，你还可以看到熟悉的 `CADisplayLink`，以及各种集合。`NSMutableSet\
    \ actor` 存储了游戏中所有角色。`NSMutableDictionary actorClassToActorSet` 用于跟踪特定类型的角色。两个\
    \ `NSMutableSets`（`actorsToBeAdded` 和 `actorsToBeRemoved`）用于跟踪在游戏单步执行期间创建的角色，以及当前步骤结束后应移除的角色。\n\
    \n最后声明的字段是布尔值 `workComplete`。它用于调试，将在本章后续探讨如何使用 `CADisplayLink` 时说明。除列表 6-1 中声明的字段外，我们还看到四个属性。第一个属性\
    \ `stepNumber` 记录游戏开始后经过的步数。`CGSize gameAreaSize` 是游戏坐标系下游戏区域的大小。布尔值 `isSetup`\
    \ 记录 `GameController` 是否已完成设置。最后一个属性 `sortedActorClasses` 用于告知 `GameController`\
    \ 应跟踪哪些类型的角色。\n\n## 设置 `GameController`\n\n当你审视类 `GameController` 的实现时，列表 6-1\
    \ 中所有字段和属性的用途将变得清晰。我们先从列表 6-2 所示的 `doSetup` 任务开始。\n\n**列表 6-2. `GameController.m\
    \ (doSetup)`**\n\n```objc\n-(BOOL)doSetup {\n    if (!isSetup){\n        gameAreaSize\
    \ = CGSizeMake(1024, 768);\n        actors = [NSMutableSet new];\n        actorsToBeAdded\
    \ = [NSMutableSet new];\n        actorsToBeRemoved = [NSMutableSet new];\n   \
    \     stepNumber = 0;\n        workComplete = true;\n        displayLink = [CADisplayLink\
    \ displayLinkWithTarget:self selector: @selector(displayLinkCalled)];\n      \
    \  [displayLink addToRunLoop:[NSRunLoop currentRunLoop] forMode:NSDefaultRunLoopMode];\n\
    \        [displayLink setFrameInterval:1];\n        isSetup = YES;\n        return\
    \ YES;\n    }\n    return NO;\n}\n```\n\n这里可以看到类 `GameController` 的设置代码。由于我们只希望设置一次\
    \ `GameController`，因此将设置代码放在由变量 `isSetup` 控制的 if 语句中。如果执行了设置，`isSetup` 任务将返回 YES；如果未执行设置，则返回\
    \ NO。\n\n关于类的实际设置，我们需要初始化几个变量。首先将属性 `gameSizeArea` 设置为默认大小。然后初始化集合 `actors`、`actorsToBeAdded`\
    \ 和 `actorsToBeRemoved`。最后将 `stepNumber` 设置为零。\n\n## 调用 `displayLinkCalled` 和\
    \ `updateScene`\n\n在列表 6-2 中，最后一步需要设置 `CADisplayLink`。在本章中，我们设置 `CADisplayLink`\
    \ 的方式与之前的示例略有不同。我们没有让 `CADisplayLink` 直接调用 `updateScene`，而是让它调用 `displayLinkCalled`，再由后者调用\
    \ `updateScene`，如列表 6-3 所示。\n\n**列表 6-3. `GameController.m (displayLinkCalled)`**\n\
    \n```objc\n-(void)displayLinkCalled{\n    if (workComplete){\n        workComplete\
    \ = false;\n        @try {\n            [self updateScene];\n            workComplete\
    \ = true;\n        }\n        @catch (NSException *exception) {\n            NSLog(@\"\
    %@\", [exception reason]);\n            NSLog(@\"%@\", [exception userInfo]);//此处设置断点\n\
    \        }\n    }\n}\n```\n\n任务 `displayLinkCalled` 仅在变量 `workComplete` 为 true\
    \ 时才调用 `updateScene`。变量 `workComplete` 为 true 的情况仅包括：`displayLinkCalled` 首次被调用时，或者\
    \ `updateScene` 已成功完成时。如果 `updateScene` 抛出异常，该异常会被记录，并且 `workComplete` 不会重置为 true。实际上，这会导致游戏在出现任何错误时停止。这样做是理想的，因为\
    \ `CADisplayLink` 调用的任务所引发的异常会被静默吞噬。为了便于调试 `displayLinkCalled` 任务，既需要记录异常，也需要暂停游戏，从而让测试人员知晓出现了问题。在生产环境中，你可能希望改变这种行为；即使出现错误，让应用继续运行或许更好。具体所需的行为取决于应用场景。\n\
    \n## 更新 `updateScene`\n\n任务 `updateScene` 也相比前一章进行了更新，如列表 6-4 所示。\n\n**列表 6-4.\
    \ `GameController.m (updateScene)`**\n\n```objc\n-(void)updateScene{\n    for\
    \ (Actor* actor in actors){\n        [actor step:self];\n    }\n    for (Actor*\
    \ actor in actors){\n        for (NSObject<Behavior>* behavoir in [actor behaviors]){\n\
    \            [behavoir applyToActor:actor In:self];\n        }\n    }\n    for\
    \ (Actor* actor in actors){\n        [self updateViewForActor:actor];\n    }\n\
    \    [self doAddActors];\n    [self doRemoveActors];\n    stepNumber++;\n}\n```\n\
    \n在此代码清单中，我们对游戏中的所有角色迭代了三次。在第一个循环中，我们对每个角色调用 `step:`，给它一个机会执行任何自定义代码。在第二个循环中，我们应用与角色关联的每个\
    \ `Behavior`。`Behavior` 是一个描述角色间某些共享行为的协议（该协议定义在 `Actor.h` 中，后续在列表 6-9 中展示）。在第三个循环中，我们通过调用\
    \ `updateViewForActor:` 更新代表每个角色的 `UIView`。\n\n由于角色和行为可以自由添加或移除其他角色，并且我们不希望在迭代\
    \ `NSMutableSet actors` 集合的同时修改它，因此我们必须分两步来添加和移除角色。为了实现这一两步过程，我们将新添加的角色存储在 `NSMutableSet\
    \ actorsToBeAdded` 中，然后在任务 `doAddActors` 中处理该集合中的每个角色。对于要移除的角色，我们采用完全相同的模式：将它们存储在\
    \ `NSMutableSet actorsToBeRemoved` 中，然后在任务 `doRemoveActors` 中处理它们。\n\n## 调用 `doAddActors`\
    \ 和 `doRemoveActors`\n\n我们在 `updateScene` 中执行的最后一步是调用 `doAddActors` 和 `doRemoveActors`，如列表\
    \ 6-5 所示。\n\n**列表 6-5. `GameController.`**"
- fmt: "`m (doAddActors` and `doRemoveActors`)\n\n```\n-(void)doAddActors{\n    for\
    \ (Actor* actor in actorsToBeAdded){\n        [actors addObject:actor];\n    \
    \    UIView* view = [[actor representation] getViewForActor:actor In:self];\n\
    \        [view setFrame:CGRectMake(0, 0, 0, 0)];\n        [actorsView addSubview:view];\n\
    \        NSMutableSet* sorted = [actorClassToActorSet valueForKey:[[actor class]\
    \ description]];\n        [sorted addObject:actor];\n    }\n    [actorsToBeAdded\
    \ removeAllObjects];\n}\n-(void)doRemoveActors{\n    for (Actor* actor in actorsToBeRemoved){\n\
    \        UIView* view = [[actor representation] getViewForActor:actor In:self];\n\
    \        [view removeFromSuperview];\n        NSMutableSet* sorted = [actorClassToActorSet\
    \ valueForKey:[[actor class] description]];\n        [sorted removeObject:actor];\n\
    \        [actors removeObject:actor];\n    }\n    [actorsToBeRemoved removeAllObjects];\n\
    }\n```\n\n任务`doAddActors`遍历`NSMutableSet actorsToBeAdded`中的所有演员，并将每个演员添加到`NSMutableSet\
    \ actors`。此外，从演员的`representation`属性中获取每个演员的`UIView`，并将其作为`actorsView`的子视图添加。属性`representation`是一个符合`Representation`协议（如`Actor.h`中定义，见[清单\
    \ 6-9](#9781430244226_Ch06.xhtml#list9)）的`NSObject`。添加视图后，我们在`NSMutableDictionary\
    \ actorClassToActorSet`中找到对应于该演员类的`NSMutableSet sorted`。然后将该演员添加到`NSMutableSet\
    \ sorted`中。这样，我们之后可以通过在`NSMutableDictionary actorClassToActorSet`中快速查找，找到特定类型的所有演员。`doAddActors`的最后一步是从集合`actorsToBeRemoved`中移除所有演员。\n\
    \n在前面的清单中，我们看到与任务`doAddActors`并行的任务`doRemoveActors`。在`doRemoveActors`中，`NSMutableSet\
    \ actorsToBeRemoved`中的每个演员，其关联的`UIView`会从其父视图中移除，并从相应的`NSMutableSet sorted`中移除。每个演员也会从`NSMutableSet\
    \ actors`中移除。最后，通过调用`removeAllObjects`清空`NSMutableSet actorsToBeRemoved`中的所有演员。\n\
    \n## 添加和移除演员\n\n要向游戏中添加或移除演员，我们分别调用`addActor`或`removeActor`，如[清单 6-6](#9781430244226_Ch06.xhtml#list6)所示。\n\
    \n**[清单 6-6.](#9781430244226_Ch06.xhtml#_list6) `GameController.m (addActor` 和\
    \ `removeActor)`**\n\n```\n-(void)addActor:(Actor*)actor{\n    [actor setAdded:YES];\n\
    \    [actorsToBeAdded addObject:actor];\n}\n-(void)removeActor:(Actor*)actor{\n\
    \    [actor setRemoved:YES];\n    [actorsToBeRemoved addObject:actor];\n}\n```\n\
    \n在[清单 6-6](#9781430244226_Ch06.xhtml#list6)中，您可以看到两个非常简单的任务：`addActor`和`removeActor`。在`addActor`中，传入的演员在添加到`NSMutableSet\
    \ actorsToBeAdded`之前，其`added`属性被设置为`YES`。类似地，在任务`removeActor`中，传入的演员的`removed`属性被设置为`YES`，并被添加到`NSMutableSet\
    \ actorsToBeRemoved`。\n\n之前，在[清单 6-5](#9781430244226_Ch06.xhtml#list5)中，当演员被添加或移除时，我们也将其从存储在`NSMutableDictionary\
    \ actorClassToActorSet`中的集合中添加或移除。这样做是为了无需遍历整个`actors`集合就能找到给定类型的所有演员。然而，我们并不希望为游戏中的每种演员类型都维护一个独立的集合。我们只想跟踪游戏逻辑中需要访问的演员类型。\n\
    \n## 排序演员\n\n任务`setSortedActorClasses`用于指定哪些演员应该被排序，如[清单 6-7](#9781430244226_Ch06.xhtml#list7)所示。\n\
    \n**[清单 6-7.](#9781430244226_Ch06.xhtml#_list7) `GameController.m (setSortedActorClasses:)`**\n\
    \n```\n-(void)setSortedActorClasses:(NSMutableArray *)aSortedActorClasses{\n \
    \   [sortedActorClasses removeAllObjects];\n    sortedActorClasses = aSortedActorClasses;\n\
    \n    [actorClassToActorSet removeAllObjects];\n    actorClassToActorSet = [NSMutableDictionary\
    \ new];\n\n    for (Class class in sortedActorClasses){\n        [actorClassToActorSet\
    \ setValue: [NSMutableSet new] forKey:[class description]];\n    }\n\n    for\
    \ (Actor* actor in actors){\n        NSMutableSet* sorted = [actorClassToActorSet\
    \ objectForKey:[[actor class] description]];\n        [sorted addObject:actor];\n\
    \    }\n}\n```\n\n我们首先进行一些内存管理，移除`NSMutableArray sortedActorClasses`中的所有对象，释放它，然后将`sortedActorClasses`重新赋值为传入的`NSMutableArray\
    \ aSortedActorClasses`。接下来，我们清理旧的`NSMutableDictionary actorClassToActorSet`。完成记账工作后，我们为`sortedActorClass`中的每个类向`actorClassToActorSet`添加一个新的`NSMutableSet`。最后，我们遍历所有演员，并将每个演员添加到相应的`NSMutableSet`中。最后这一步是必要的，以允许在应用程序中多次调用`setSortedActorClasses`。但考虑到这是一个相对昂贵的操作，最好在游戏开始时只调用一次`setSortedActorClasses`。\n\
    \n## 管理`UIView`\n\n对`GameController`类的最后一项改进是任务`updateViewForActor:`，如[清单 6-8](#9781430244226_Ch06.xhtml#list8)所示。\n\
    \n**[清单 6-8.](#9781430244226_Ch06.xhtml#_list8) `GameController.m (updateViewForActor:)`**\n\
    \n```\n-(void)updateViewForActor:(Actor*)actor{\n    NSObject<Representation>*\
    \ rep = [actor representation];\n\n    UIView* actorView = [rep getViewForActor:actor\
    \ In:self];\n    [rep updateView:actorView ForActor:actor In:self];\n\n    float\
    \ xFactor = actorsView.frame.size.width/self.gameAreaSize.width;\n    float yFactor\
    \ = actorsView.frame.size.height/self.gameAreaSize.height;\n\n    float x = (actor.center.x-actor.radius)*xFactor;\n\
    \    float y = (actor.center.y-actor.radius)*yFactor;\n    float width = actor.radius*xFactor*2;\n\
    \    float height = actor.radius*yFactor*2;\n    CGRect frame = CGRectMake(x,\
    \ y, width, height);\n\n    actorView.transform = CGAffineTransformIdentity;\n\
    \    [actorView setFrame:frame];\n    actorView.transform = CGAffineTransformRotate(actorView.transform,\
    \ [actor rotation]);\n\n    [actorView setAlpha:[actor alpha]];\n}\n```\n\n任务`updateViewForActor:`负责管理与每个演员关联的`UIView`。在该任务的第一行，我们获取演员的`representation`属性并将其存储在变量`rep`中。变量`rep`是一个符合`Representation`协议的`NSObject`。协议`Representation`在`Actor.h`中定义（稍后见[清单\
    \ 6-9](#9781430244226_Ch06.xhtml#list9)），描述了如何创建和更新给定演员的`UIView`。当调用`getViewForActor:In:`时会创建`UIView`。当`UIView`需要更新以反映演员的变化时，会调用任务`updateView:ForActor:In:`。这两个任务将在本章后面讨论。\n\
    \n确定`UIView actorView`后，我们计算其父视图中它应该占据的区域。此计算的细节已在[第 5 章](#9781430244226_Ch05.xhtml)中描述。然而，我们添加了两个新特性：我们根据演员的`rotation`属性旋转`actorView`，并且设置了`actorView`的`alpha`值，允许演员在游戏过程中改变其不透明度。\n\
    \n现在我们已经了解了`GameController`类以及它如何管理游戏中的演员，接下来让我们看看`Actor`类，以便您理解它如何允许多种不同类型演员在任何游戏中存在。\n\
    \n## Actor 类\n\n`Actor`类是游戏所有演员的超类。"
