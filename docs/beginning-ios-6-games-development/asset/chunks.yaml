    \  \n\n## Chapter 12 — A Completed Game: Belt Commander  \n\nThroughout this book,\
    \ we have covered a number of techniques for building iOS games. We looked at\
    \ how to build the basic application flow for a game in [Chapter 3](#9781430244226_Ch03.xhtml).\
    \ We learned how to build a basic turn-by-turn game when we looked at Coin Sorter\
    \ in [Chapter 4](#9781430244226_Ch04.xhtml). Then we moved into frame-by-frame\
    \ games and learned how to build a game that is in constant motion in [Chapter\
    \ 5](#9781430244226_Ch05.xhtml). In [Chapters 6](#9781430244226_Ch06.xhtml) and\
    \ [7](#9781430244226_Ch07.xhtml), we looked at how to create different types of\
    \ actors to populate our game. [Chapter 8](#9781430244226_Ch08.xhtml) covered\
    \ how to capture user input that manipulates in-game elements, and [Chapter 9](#9781430244226_Ch09.xhtml)\
    \ looked at how to reach out to our players with Game Center and other social\
    \ media services. In [Chapter 10](#9781430244226_Ch10.xhtml), we discussed how\
    \ to add in-app purchases and to help make some money with our game. In [Chapter\
    \ 11](#9781430244226_Ch11.xhtml), we added sound effects to our game. In this\
    \ chapter, we are going to bring all of these elements together into one full-featured\
    \ game, Belt Commander. The title graphic is shown in [Figure 12-1](#9781430244226_Ch12.xhtml#Fig1).\
    \  \n\n![9781430244226_Fig12-01.jpg](images/9781430244226_Fig12-01.jpg)  \n\n\
    [Figure 12-1.](#9781430244226_Ch12.xhtml#_Fig1)  Title graphic for Belt Commander\
    \  \n\nIn this chapter, we are going to take a high-level look at the game Belt\
