    \n## 使用 Core Animation 对视图进行动画处理\n\n之前我们探讨了`UIView`类中用于创建动画的任务。这些任务提供了 iOS 上动画实现方式的不透明视图。本节将更深入地探讨如何利用称为\
    \ Core Animation 的框架来定义动画。Core Animation 是负责 iOS 设备上大多数动画的框架，也是静态`UIView`任务在底层使用的框架。\n\
    \n理解 Core Animation 的最佳方式是继续我们的示例，看看如何创建硬币交换位置的动画。[图 4-8](#9781430244226_Ch04.xhtml#Fig8)展示了硬币交换位置的动画。\n\
    \n![9781430244226_Fig04-08.jpg](images/9781430244226_Fig04-08.jpg)\n\n**[图 4-8.](#9781430244226_Ch04.xhtml#_Fig8)**\
    \ 硬币交换位置\n\n第一列第二行的一个正方形硬币与第二列最后一行的一个三角形硬币进行交换。每个硬币先缩小到几乎看不见，然后交换硬币类型，再恢复到正常大小。这通过在`doSwitch:With:`任务中实现，如[清单\
    \ 4-25](#9781430244226_Ch04.xhtml#_list25)所示。\n\n**[清单 4-25.](#9781430244226_Ch04.xhtml#_list25)**\
    \ `CoinsController.m (doSwitch:With:)`\n\n```\n-(void)doSwitch:(Coord)coordA With:(Coord)coordB\
    \ {\n    [coinsGame swap:coordA With:coordB];\n    \n    coinViewA = [[coinsView\
    \ subviews] objectAtIndex:[coinsGame indexForCoord:coordA]];\n    coinViewB =\
    \ [[coinsView subviews] objectAtIndex:[coinsGame indexForCoord:coordB]];\n   \
    \ \n    for (UIView* coinView in [NSArray arrayWithObjects:coinViewA, coinViewB,\
    \ nil]){\n        CABasicAnimation* animScaleDown = [CABasicAnimation animationWithKeyPath:@\"\
    transform.scale\"];\n        [animScaleDown setValue:@\"animScaleDown\" forKey:@\"\
    name\"];\n        animScaleDown.fromValue = [NSNumber numberWithFloat:1.0f];\n\
    \        animScaleDown.toValue = [NSNumber numberWithFloat:0.0f];\n        animScaleDown.duration\
    \ = 1.0;\n        animScaleDown.timingFunction = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseIn];\n\
    \        \n        CABasicAnimation* animScaleUp = [CABasicAnimation animationWithKeyPath:@\"\
    transform.scale\"];\n        [animScaleUp setValue:@\"animScaleUp\" forKey:@\"\
    name\"];\n        animScaleUp.fromValue = [NSNumber numberWithFloat:0.0f];\n \
    \       animScaleUp.toValue = [NSNumber numberWithFloat:1.0f];\n        animScaleUp.duration\
    \ = 1.0;\n        animScaleUp.beginTime = CACurrentMediaTime() + 1.0;\n      \
    \  animScaleUp.timingFunction = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseOut];\n\
    \        \n        if (coinViewA == coinView){\n            [animScaleDown setDelegate:self];\n\
    \            [animScaleUp setDelegate:self];\n        }\n        \n        [coinView.layer\
    \ addAnimation:animScaleDown forKey:@\"animScaleDown\"];\n        [coinView.layer\
    \ addAnimation:animScaleUp forKey:@\"animScaleUp\"];\n    }\n}\n```\n\n`doSwitch:With:`任务负责更新模型和创建动画。为了更新模型，我们只需在`coinsGame`上调用`swap:With:`。为了创建动画，我们需要使用名为`CABasicAnimation`的类。`CABasicAnimation`对象描述了`CALayer`中的变化。`CALayer`是代表`UIView`视觉内容的对象。\n\
    \n到目前为止，我们一直说`UIView`提供屏幕上的内容，这仍然是正确的，但`UIView`使用 Core Animation 层来实现它的绘制方式。因此，每个`UIView`都有一个类型为`CALayer`的`layer`属性。你需要理解这一点才能明白`CABasicAnimation`的工作原理。查看[清单\
    \ 4-25](#9781430244226_Ch04.xhtml#list25)，你可以看到`CABasicAnimation`是通过指定路径来创建的。在我们的例子中，路径是`transform.scale`。这是指向我们想要动画化的`UIView`所关联的`CALayer`对象的路径。\n\
    \n对于每个`UIView`（`coinViewA`和`coinViewB`），我们都会创建两个`CABasicAnimation`对象。当我们创建`CABasicAnimation`对象`animScaleDown`时，我们指定该`CABasicAnimation`将操纵`transform`属性上的`scale`值。我们通过设置`animScaleDown`的`fromValue`来指定`scale`的起始值，并通过设置`toValue`来指定结束值。`duration`值表示我们希望此动画持续多少秒。通过指定`timingFunction`，我们控制此动画的播放速率。在这种情况下，我们指定`kCAMediaTimingFunctionEaseIn`，告诉`CABasicAnimation`先慢后快。\n\
    \n`CABasicAnimation animScaleUp`与`animScaleDown`类似。主要区别在于`fromValue`和`toValue`相反。我们还将`beginTime`的值设置为未来1秒。这里的思路是，我们希望`animScaleDown`动画运行一秒，使硬币缩小到消失，然后当`animScaleDown`完成时，运行`animScaleUp`动画，将硬币缩放回正常大小。关键在于在这两个动画之间交换两个硬币视图所使用的图像。"
