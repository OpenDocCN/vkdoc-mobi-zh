    in the simulation.    Summary    In this chapter we explored some of the core
    features of Box2D, a game physics engine. We learned how to create a world and
    simulate the motion of bodies in that world. We also looked at how to extend our
    `GameController` class to enable physics within our existing game framework. We
    looked at the class `PhysicsActor` and a new version of Asteroid to see what changes
    are required to Actors that participate in the physics simulation.    [¹](#9781430244226_Ch13.xhtml#_Fn1)
    Infinite up to the maximum value of a float—which, I guess, is not really all
    that infinite.    Appendix     A    Designing and Creating Graphics    In this
    appendix, we’ll cover three main topics: designing graphics, creating graphics,
    and some open-source tools to use in doing so.    When creating a video game,
    a lot of the work is put into creating the graphics used in the game. In this
    appendix, we will be considering 2D games. These graphics will be images for the
    actors in the game, backgrounds, buttons, and other decorations. The images are
    a large part of the game: they are the first thing people see, and they can dictate
    whether people are going to download the game. Images are what grab people’s attention.
    It is the image of Link or Mario that people remember, not the collision detection
    algorithm. It is not to say that there aren’t popular games with simple graphics—because
    there definitely are. But even creators of successful games with simple graphics
    spend a lot of time making sure their art conforms to a unified design goal.    In
    addition to concerns of style, a game designer must also consider what is required
    to create images suitable for building a game. We must consider the size of the
    final images, as well as how the images are organized. Should we use separate
    images for everything, or can we create a composite image for backgrounds? How
    do we organize our images so we can easily make changes? Do we have a budget for
    how many megabytes of images we can include? These are just a couple of the questions
    I will be addressing in this appendix.    The last part of this appendix will
    be a quick review of some of the great open-source tools available to a game designer.
    These tools are not only important for small game developers but also were critical
    in the writing of this book.    The Art in Video Games    Before a video game
    is created, someone has an idea about how the game is played and what it looks
    like. That initial vision may or may not make it into the final release. In any
    case, it is ideal to have a single person, or group of people, responsible for
    shaping the art of the game so it has a consistent style. Once a game has art
    direction, work will commence on building the assets for the game. As the game
    comes together, other pieces of artwork will be created to support the game, such
    as a website or an advertisement. These other pieces of work should be in the
    same visual style. In this section, we will do a quick review of what art style
    is and how that shapes user expectations.    Style in Video Games    The style
    of a video game refers to all of the choices the designers and artists made to
    create the art in a game, and how that art fits together.


    The style of a game is no different from style in other products. For example,
    consider a bottle of teriyaki sauce. It would not be unreasonable for the word
    *teriyaki* to be drawn in a typeface that looks like it came from the Far East,
    perhaps like the word in [Figure A-1](#9781430244226_App.xhtml#Fig1).    ![9781430244226_App-01.jpg](images/9781430244226_App-01.jpg)    [Figure
    A-1.](#9781430244226_App.xhtml#_Fig1)  “Teriyaki” rendered in a Far Eastern style    [Figure
    A-1](#9781430244226_App.xhtml#Fig1) shows a word rendered in a style that matches
    the expectations of the users of teriyaki sauce. The many makers of teriyaki sauce
    have set this expectation over the years. But not all products have a socially
    expected style to draw from. In fact, if you are making a new game in a new genre,
    users may have no expectations at all about the style. If you are making a game
    about knights and castles, the user will welcome a style that looks medieval.
    In any case, it is important that the style of the art be consistent throughout
    the game.    Having a consistent style does not require the art to be overly elaborate.
    The goal is simply to make the art appear to be created by a single hand, as the
    example in [Figure A-2](#9781430244226_App.xhtml#Fig2) shows.    ![9781430244226_App-02.jpg](images/9781430244226_App-02.jpg)    [Figure
    A-2.](#9781430244226_App.xhtml#_Fig2)  The Exterminator, by SUMO Productions.
    © 2011 Table Mountain Church    On the left side of the figure, we see the Welcome
    screen for the game. Phil Hassey developed this simple game with a number of teens
    from Table Mountain Church (who owns the copyright). Because this game was a collaboration
    between Phil and a number of young people without years of graphics or game design
    experience, they adopted a simple hand-drawn style. This choice allowed several
    people with limited drawing skills to contribute art to the game. In order to
    maintain the style throughout the game, we can see that four buttons, in the corners
    of the left screen, are also drawn by hand. The bottom right button is a Facebook
    button. By making their own Facebook button, they maintain a consistent style.
    If they used one of the stock Facebook buttons, it would clash with the entire
    visual experience. We should also consider a game that does not have a consistent
    style, as shown in [Figure A-3](#9781430244226_App.xhtml#Fig3).    ![9781430244226_App-03.jpg](images/9781430244226_App-03.jpg)    [Figure
    A-3.](#9781430244226_App.xhtml#_Fig3)  Colors and Shapes. © ClayWare Games. Background
    by txd on Flickr    In [Figure A-3](#9781430244226_App.xhtml#Fig3), we see an
    old game I created for the original iPhone, called Colors and Shapes. On the left
    is the Welcome screen, where a child or parent can pick one of three activities.
    For each activity, the player is directed by voice and text to perform a number
    of simple tasks involving colored balloons. The 3D text and the balloons were
    rendered with Blender 3D, and I think are pretty consistent. They both use strong
    primary colors and have a sense of depth—not a perfect match, but pretty close.
    However, I don’t think the background was a good choice. While it is a very nice
    photo, it doesn’t match the balloons at all, and is visually distracting.    **Tip**  Creative
    Commons has a license option by which all you have to do to use a creative work
    in your game is to include a byline in your credits. Flickr allows you to search
    for images that are published with this license. We found the background image
    for Colors and Shapes this way.    Branding and Perception    As mentioned, the
    art for a game is more than just images moving about the screen. People remember
    the art and associate it with the game. [Figure A-4](#9781430244226_App.xhtml#Fig4)
    shows an advertisement created for the game Space Attack!!    ![9781430244226_App-04.jpg](images/9781430244226_App-04.jpg)    [Figure
    A-4.](#9781430244226_App.xhtml#_Fig4)  Space Attack!!'
