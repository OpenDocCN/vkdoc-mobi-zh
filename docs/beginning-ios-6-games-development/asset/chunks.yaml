    \ class]]){\n        PhysicsActor* physicsActor = (PhysicsActor*)actor;\n    \
    \    b2Body* body = [physicsActor body];\n        world->DestroyBody(body);\n\
    \    }\n    [super removeActor:actor];\n}\n```\n\n在[列表 13-9](#9781430244226_Ch13.xhtml#list9)中，我们看到任务`removeActor:`，当我们想要从场景中移除一个`Actor`时就会调用它。与[列表\
    \ 13-3](#9781430244226_Ch13.xhtml#list3)中的任务`addActor:`一样，我们首先检查该`Actor`是否是`PhysicsActor`。如果是，我们获取对`body`属性的引用，并调用`DestroyBody`将其从Box2D世界对象中移除。通过这种方式，我们保持场景中的Actors与模拟中的bodies同步。\n\
    \n## 总结\n\n在本章中，我们探讨了Box2D（一个游戏物理引擎）的一些核心特性。我们学习了如何创建一个世界，并模拟世界中物体的运动。我们还研究了如何扩展`GameController`类，以在现有游戏框架中启用物理功能。我们查看了`PhysicsActor`类和一个新版本的Asteroid，以了解参与物理模拟的Actor所需进行的更改。\n\
    \n[¹](#9781430244226_Ch13.xhtml#_Fn1) 无限大，直到浮点数的最大值——我猜，这其实并非真正的无限。\n\n## 附录 A\n\
    \n### 设计与创建图形\n\n在本附录中，我们将讨论三个主要主题：设计图形、创建图形以及可使用的开源工具。\n\n在创建电子游戏时，大量工作都投入到游戏图形的制作中。在本附录中，我们将考虑2D游戏。这些图形包括游戏中角色的图像、背景、按钮及其他装饰。图像是游戏的重要组成部分：它们是人们首先看到的东西，并能决定人们是否会下载游戏。图像是用来吸引人们注意力的。人们记住的是林克或马里奥的形象，而不是碰撞检测算法。但这并不是说没有图形简陋的流行游戏——确实存在这样的情况。但即使是那些图形简陋的成功游戏的创作者，也会花费大量时间来确保他们的美术风格符合统一的设计目标。\n\
    \n除了风格问题，游戏设计师还必须考虑制作适合构建游戏的图像所需的条件。我们必须考虑最终图像的大小，以及图像的排列方式。我们是应该为所有元素使用独立的图像，还是可以为背景创建合成图像？我们如何组织图像以便于修改？我们对可以包含的图像兆字节数有预算吗？这些只是我将在本附录中讨论的几个问题。\n\
    \n本附录的最后部分将快速回顾一些优秀的开源工具，供游戏设计师使用。这些工具不仅对小型游戏开发者很重要，在本书的撰写过程中也至关重要。\n\n### 电子游戏中的美术\n\
    \n在电子游戏被创建之前，有人会对游戏的玩法和外观有一个想法。那个最初的愿景可能会或可能不会出现在最终版本中。无论如何，最好由一个人或一组人负责塑造游戏的美术风格，使其具有一致性。一旦游戏有了美术指导，就会开始构建游戏资源。随着游戏成型，还会创建其他美术作品来支持游戏，例如网站或广告。这些其他作品应保持相同的视觉风格。在本节中，我们将快速回顾什么是艺术风格，以及它如何塑造用户的期望。\n\
    \n### 电子游戏中的风格\n\n电子游戏的风格指的是设计师和艺术家为创建游戏美术以及使这些美术相互融合所做的一切选择。\n\n游戏的风格与其他产品的风格并无不同。例如，考虑一瓶照烧酱。用看起来像远东风格的字形来绘制词语“teriyaki”并非不合理，就像[图\
    \ A-1](#9781430244226_App.xhtml#Fig1) 中的单词那样。\n\n![9781430244226_App-01.jpg](images/9781430244226_App-01.jpg)\n\
    \n[图 A-1.](#9781430244226_App.xhtml#_Fig1)  “Teriyaki”以远东风格呈现\n\n[图 A-1](#9781430244226_App.xhtml#Fig1)\
    \ 展示了一个以符合照烧酱用户期望的风格呈现的单词。多年来，众多照烧酱制造商已经设定了这种期望。但并非所有产品都有社会预期的风格可供借鉴。事实上，如果你正在制作一个新型游戏，用户可能对风格没有任何期望。如果你正在制作一个关于骑士和城堡的游戏，用户会欢迎看起来是中世纪风格的。无论如何，游戏中的美术风格保持一致非常重要。\n\
    \n保持一致的风格并不要求艺术过于精细。目标仅仅是让美术看起来像是出自同一人之手，就像[图 A-2](#9781430244226_App.xhtml#Fig2)\
    \ 中的例子所示。\n\n![9781430244226_App-02.jpg](images/9781430244226_App-02.jpg)\n\n\
    [图 A-2.](#9781430244226_App.xhtml#_Fig2)  《The Exterminator》，由SUMO Productions制作。©\
    \ 2011 Table Mountain Church\n\n在图的左侧，我们看到了游戏的欢迎界面。Phil Hassey与Table Mountain\
    \ Church（版权所有者）的一些年轻人共同开发了这款简单的游戏。由于这款游戏是Phil与一群没有多年图形或游戏设计经验的年轻人合作的成果，他们采用了简单的手绘风格。这一选择使得几个绘画技巧有限的人能够为游戏贡献美术作品。为了在整个游戏中保持这种风格，我们可以看到左侧屏幕角落的四个按钮也是手绘的。右下角的按钮是Facebook按钮。通过制作自己的Facebook按钮，他们保持了一致的风格。如果他们使用标准的Facebook按钮，将会与整个视觉体验格格不入。我们还应该考虑一款风格不一致的游戏，如[图\
    \ A-3](#9781430244226_App.xhtml#Fig3) 所示。\n\n![9781430244226_App-03.jpg](images/9781430244226_App-03.jpg)\n\
    \n[图 A-3.](#9781430244226_App.xhtml#_Fig3)  《Colors and Shapes》。© ClayWare Games。背景由Flickr上的txd提供\n\
    \n在[图 A-3](#9781430244226_App.xhtml#Fig3) 中，我们看到我早年为首款iPhone创建的一款旧游戏，名为《Colors\
    \ and Shapes》。左侧是欢迎界面，孩子或家长可以选择三种活动之一。对于每种活动，玩家会通过语音和文字提示，执行一系列涉及彩色气球的简单任务。3D文字和气球是用Blender\
    \ 3D渲染的，我认为它们相当一致。它们都使用了强烈的主色，并具有深度感——虽然不是完美匹配，但相当接近。然而，我认为背景不是一个好选择。虽然这是一张非常漂亮的照片，但它与气球完全不匹配，而且在视觉上分散注意力。\n\
    \n**提示**  知识共享（Creative Commons）有一种许可选项，你只需在游戏致谢中包含署名，即可使用创意作品。Flickr允许你搜索以这种许可发布的图像。我们就是这样为《Colors\
    \ and Shapes》找到了背景图像。\n\n### 品牌与感知\n\n如前所述，游戏的美术不仅仅是屏幕上移动的图像。人们会记住这些美术并将其与游戏关联起来。[图\
    \ A-4](#9781430244226_App.xhtml#Fig4) 展示了为游戏《Space Attack!!》制作的广告。\n\n![9781430244226_App-04.jpg](images/9781430244226_App-04.jpg)\n\
    \n[图 A-4.](#9781430244226_App.xhtml#_Fig4)  《Space Attack!!》"
