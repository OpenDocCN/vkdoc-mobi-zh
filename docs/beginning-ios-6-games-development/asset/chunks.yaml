  trans: "```markdown\n在`[Listing 6-13]`中，计算中心点并选择半径为`32`后，我们必须创建一个`Representation`对象来处理这个增强道具的绘制。因为我们想使用一系列图像来表示增强道具，所以创建了一个名为`rep`的`ImageRepresentation`实例，并设置了`backwards`和`stepsPerFrame`属性。`ImageRepresentation`被传递给`Actor`的`initAt:WithRadius:AndRepresentation:`任务，以将`rep`设置为该增强道具的表示。还要注意，我们将`Powerup`设置为`rep`的委托。这意味着我们正在创建的`Powerup`实例将用于指定关于如何绘制该角色的信息。\n\
    \n**检查`ImageRepresentation`**\n\n为了将角色的游戏逻辑与其绘制方式分离，我们引入了`ImageRepresentation`类。此类负责创建使用`UIView`渲染角色所需的对象。主要是，`ImageRepresentation`将使用\
    \ PNG 文件创建`UIImageViews`来绘制我们的角色。让我们看看`ImageRepresentation`的头文件，如`[Listing 6-14]`所示。\n\
    \n**[Listing 6-14] `ImageRepresentation.h`**\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Actor.h\"\n\n@protocol ImageRepresentationDelegate\n\n@required\n-(NSString*)baseImageName;\n\
    \n@optional\n-(int)getFrameCountForVariant:(int)aVariant AndState:(int)aState;\n\
    -(NSString*)getNameForVariant:(int)aVariant;\n-(NSString*)getNameForState:(int)aState;\n\
    \n@end\n\n@interface ImageRepresentation : NSObject<Representation> {\n    UIView*\
    \ view;\n}\n@property (nonatomic, assign) NSObject<ImageRepresentationDelegate>*\
    \ delegate;\n@property (nonatomic, strong) NSString* baseImageName;\n@property\
    \ (nonatomic) int currentFrame;\n@property (nonatomic) BOOL backwards;\n@property\
    \ (nonatomic) int stepsPerFrame;\n\n+(id)imageRep;\n+(id)imageRepWithName:(NSString*)aBaseImageName;\n\
    +(id)imageRepWithDelegate:(NSObject<ImageRepresentationDelegate>*)aDelegate;\n\
    -(void)advanceFrame:(Actor*)actor ForStep:(int)step;\n-(NSString*)getImageNameForActor:(Actor*)actor;\n\
    -(UIImage*)getImageForActor:(Actor*)actor;\n\n@end\n```\n\n`ImageRepresentation`类的目标是封装处理使用图像表示角色的常见方式的代码。这些方式包括以下情况：\n\
    \n- 单张图像表示角色\n- 一系列图像表示角色\n- 具有多种状态的角色\n- 具有多种变体的角色\n- 对于每种状态和变体的组合，具有不同数量图像的角色\n\
    \n我们创建的每个使用`ImageRepresentation`的角色都将符合上述情况之一。通过设置一个类型为`ImageRepresentationDelegate`的委托，我们指示我们想要使用哪种情况，如`[Listing\
    \ 6-14]`所示。这允许`ImageRepresentationDelegate`的实例指示在任何给定时间应使用的图像名称。\n\n`ImageRepresentationDelegate`必须指定一个`baseImageName`，该名称用于`ImageRepresentation`的所有用例。如果`ImageRepresentationDelegate`只实现了`baseImageName:`，则表示角色的所有实例都将使用单个图像。如果要使用一系列图像，则委托对象必须实现任务`getFrameCountForVariant:AndState:`。如果要根据角色的状态或变体使用不同的图像序列，则委托必须分别实现`getNameForState:`和`getNameForVariant:`。从技术上讲，如果只使用单个图像来表示特定类型的所有角色，则不需要为`ImageRepresentation`指定委托。但是，`ImageRepresentation`仍然需要指定`baseImageName`。\n\
    \n**创建`Powerup`的实现**\n\n`Powerup`类必须定义其绘制方式以及基本行为。由于`Powerup`类将对状态和变体的每种组合使用不同的图像序列，因此`ImageRepresentation`的委托必须实现所有这四个任务。为简单起见，我们指定`Powerup`类遵循`ImageRepresentationDelegate`协议。让我们看看`[Listing\
    \ 6-15]`中这些方法的实现。\n\n**[Listing 6-15] `Powerup.m（ImageRepresentationDelegate 任务）`**\n\
    \n```\n-(NSString*)baseImageName{\n    return @\"powerup\";\n}\n-(int)getFrameCountForVariant:(int)aVariant\
    \ AndState:(int)aState{\n    return 63;\n}\n-(NSString*)getNameForVariant:(int)aVariant{\n\
    \    if (aVariant == VARIATION_HEALTH){\n        return @\"health\";\n    } else\
    \ if (aVariant == VARIATION_CASH){\n        return @\"cash\";\n    } else if (aVariant\
    \ == VARIATION_DAMAGE){\n        return @\"damage\";\n    } else {\n        return\
    \ nil;\n    }\n}\n-(NSString*)getNameForState:(int)aState{\n    if (aState ==\
    \ STATE_GLOW){\n        return @\"glow\";\n    } else if (aState == STATE_NO_GLOW){\n\
    \        return @\"noglow\";\n    } else {\n        return nil;\n    }\n}\n```\n\
    \n在此列表中，我们看到`ImageRepresentationDelegate`所需的四个任务，用于创建一个由每种状态和变体组合的不同图像序列表示的角色。任务`baseImageName`返回`NSString\
    \ \"powerup\"`，表示此角色的所有图像都将以`\"powerup\"`开头。任务`getFrameCountForVariant:AndState:`直接返回`63`，因为每种状态和变体组合都有`63`张图像。其他类型的角色可能希望为每种状态和变体组合拥有不同数量的图像，并且可以自由地在`getFrameCountForVariant:AndState:`中返回不同的数字。\n\
    \n任务`getNameForVariant:`和`getNameForState:`返回适用于增强道具的每种变体和状态的字符串表示，并允许`ImageRepresentation`确定在给定时间应使用哪张图像。\n\
    \n**为角色查找正确的图像**\n\n让我们看看`ImageRepresentation`的任务`getImageNameForActor:`，以便您了解如何使用`ImageRepresentationDelegate`的四个任务来识别图像名称。请参阅`[Listing\
    \ 6-16]`。\n\n**[Listing 6-16] `ImageRepresentation.m（getImageNameForActor:）`**\n\
    \n```\n-(NSString*)getImageNameForActor:(Actor*)actor{\n    NSString* imageName\
    \ = baseImageName;\n\n    if (imageName == nil){\n        imageName = [delegate\
    \ baseImageName];\n    }\n    NSString* variant = nil;\n    if ([delegate respondsToSelector:@selector(getNameForVariant:)]){\n\
    \        variant = [delegate getNameForVariant:[actor variant]];\n    }\n    NSString*\
    \ state = nil;\n    if ([delegate respondsToSelector:@selector(getNameForState:)]){\n\
    \        state = [delegate getNameForState:[actor state]];\n    }\n    int frameCount\
    \ = 0;\n    if ([delegate respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n\
    \        frameCount = [delegate getFrameCountForVariant:[actor variant] AndState:[actor\
    \ state]];\n    }\n    if (variant != nil){\n        imageName = [[imageName stringByAppendingString:@\"\
    _\"] stringByAppendingString:variant];\n    }\n    if (state != nil){\n      \
    \  imageName = [[imageName stringByAppendingString:@\"_\"] stringByAppendingString:state];\n\
    \    }\n    if (frameCount != 0){\n        imageName = [[imageName stringByAppendingString:@\"\
    _\"] stringByAppendingString:[NSString stringWithFormat:@\"%04d\", currentFrame]\
    \ ];\n    }\n    return imageName;\n}\n```\n\n这里的目标是确定应该用于表示角色的正确图像名称。最终的图像名称将存储在变量`imageName`中。我们首先要做的是建立`baseImageName`。\n\
    ```"
- fmt: "This can be either the `baseImageName` property of the `ImageRepresentation`\
    \ or from the delegate.\n\nThe next step is to get the string representation of\
    \ the actor’s variation. We test to see whether the delegate responds to the task\
    \ `getNameForVariant`. If it does, we assign `variant` to the result. We follow\
    \ the same pattern to get a string representation for `state`.\n\nThe last thing\
    \ we need the delegate for is to establish whether this actor is represented by\
    \ a single image or by a sequence of images for this particular state and variation.\
    \ If the delegate responds to `getFrameCountForVariation:AndState:`, we record\
    \ the value in `frameCount`. If the delegate does not respond to `getFrameCountForVariation:AndState:`,\
    \ or if `getFrameCountForVariation:AndState:` returned zero, this indicates that\
    \ we should not include a frame number in the final image name.\n\nAfter calling\
    \ `getFrameCountForVariation:AndState:`, we have all of the information we require\
    \ to establish the final name of the image. If the string representation of `variant`\
    \ is not nil, we append `\"_\"` and `variation` to the `NSString imageName`. Similarly,\
    \ if `state` is not nil, we append `\"_\"` and `state` to `imageName`. Finally,\
    \ if `frameCount` is not zero, we append the `currentFrame` number to the image\
    \ name. We don’t have to append the file extension to the image name because `UIImage`\
    \ will automatically find the correct image based on the name. This task will\
    \ find image files of the following patterns:\n\n*   baseImageName.png\n*   baseImageName_variant.png\n\
    *   baseImageName_state.png\n*   baseImageName_variant_state.png\n*   baseImageName_00FN.png\n\
    *   baseImageName_state_00FN.png\n*   baseImageName_variant_00FN.png\n*   baseImageName_variant_state_00FN.png\n\
    \nNow you know how `ImageRepresentation` and `ImageRepresentationDelegate` are\
    \ used to specify which image should be used for a particular actor at a given\
    \ time. Looking back at [Listing 6-8](#9781430244226_Ch06.xhtml#list8), you can\
    \ see that an actor’s representation is responsible for creating and updating\
    \ the `UIView` associated with the actor.\n\n## Creating the `UIImageView` for\
    \ an Actor\n\nThe ultimate goal of `ImageRepresentation` is to create a `UIView`\
    \ that represents the actor. This is done by instantiating a `UIImageView` that\
    \ uses the correct image to represent the actor, given its type, state, and variation.\
    \ We have reviewed how to find the correct image. All that is left is to create\
    \ `UIImageView`. This work is done in the task `getViewForActor:In:`, shown in\
    \ [Listing 6-17](#9781430244226_Ch06.xhtml#list17).\n\n**[Listing 6-17.](#9781430244226_Ch06.xhtml#_list17)\
    \ `ImageRepresentation.m (getViewForActor:In:)`**\n\n```\n-(UIView*)getViewForActor:(Actor*)actor\
    \ In:(GameController*)aController{\n    if (view == nil){\n        UIImage* image\
    \ = [self getImageForActor: actor];\n        view = [[UIImageView alloc] initWithImage:\
    \ image];\n    }\n    return view;\n}\n```\n\n`ImageRepresentation` simply tests\
    \ to see whether `view` has been created, and creates it if it has not. To create\
    \ the `UIImageView`, we call `getImageForActor:` and then create `UIImageView`\
    \ with the `UIImage` that was returned. The task `getImageForActor:` is shown\
    \ in [Listing 6-18](#9781430244226_Ch06.xhtml#list18).\n\n**[Listing 6-18.](#9781430244226_Ch06.xhtml#_list18)\
    \ `ImageRepresentation.m (getImageForActor:)`**\n\n```\n-(UIImage*)getImageForActor:(Actor*)actor{\n\
    \    NSString* imageName = [self getImageNameForActor:actor];\n\n    UIImage*\
    \ result = [UIImage imageNamed: imageName];\n    if (result == nil){\n       \
    \ NSLog(@\"Image Not Found: %@\", imageName);\n    }\n        return result;\n\
    }\n```\n\nThe task `getImageForActor:` simply calls `getImageNameForActor` and\
    \ creates a `UIImage` based on that name. If no image exists with the given name,\
    \ the result will be nil. Placing a break point on that `NSLog` statement will\
    \ save you a lot of trouble when debugging your app, as you will be notified immediately\
    \ when an actor is being drawn with a nonexisting image.\n\n## Updating Our Views\n\
    \nNow that we have looked at how `ImageRepresentation` creates a `UIView` used\
    \ to draw an actor, let’s take a look at how `ImageRepresentation` updates that\
    \ `UIView` to create the cycling animations and responds to a change in state\
    \ or variation. [Listing 6-19](#9781430244226_Ch06.xhtml#list19) shows the task\
    \ `updateView:ForActor:In:` for `ImageRepresentation`.\n\n**[Listing 6-19](#9781430244226_Ch06.xhtml#_list19).\
    \ `ImageRepresentation.m (updateView:ForActor:In:)`**\n\n```\n-(void)updateView:(UIView*)aView\
    \ ForActor:(Actor*)anActor In:(GameController*)aController{\n\n    if ([delegate\
    \ respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n       \
    \ [self advanceFrame: anActor ForStep:[aController stepNumber]];\n    }\n\n  \
    \  if ([anActor needsViewUpdated]){\n\n        UIImageView* imageView = (UIImageView*)aView;\n\
    \        UIImage* image = [self getImageForActor: anActor];\n\n        [imageView\
    \ setImage:image];\n        [anActor setNeedsViewUpdated:NO];\n    }\n}\n```\n\
    \nThe task `updateView:ForActor:In:` is responsible for making sure that the correct\
    \ image is being used to represent the actor `anActor`. The first step is to see\
    \ whether `ImageRepresentation` is managing a series of images by checking if\
    \ the delegate responds to `getFrameCountForVariation:AndState:`. If a series\
    \ of images is being used, we call `advanceFrame:ForStep:` to advance the current\
    \ frame for the actor, as shown in [Listing 6-20](#9781430244226_Ch06.xhtml#list20).\n\
    \n**[Listing 6-20.](#9781430244226_Ch06.xhtml#_list20) `ImageRepresentation.m\
    \ (advanceFrame:ForTick:)`**\n\n```\n-(void)advanceFrame:(Actor*)actor ForStep:(int)step{\n\
    \    if (step % self.stepsPerFrame == 0){\n        if (self.backwards){\n    \
    \        self.currentFrame -= 1;\n        } else {\n            self.currentFrame\
    \ += 1;\n        }\n\n        int frameCount = [delegate getFrameCountForVariant:[actor\
    \ variant] AndState:[actor state]];\n        if (self.currentFrame>frameCount){\n\
    \            self.currentFrame = 1;\n        }\n        if (self.currentFrame<1){\n\
    \            self.currentFrame = frameCount;\n        }\n\n        [actor setNeedsViewUpdated:YES];\n\
    \    }\n}\n```\n\nWe change the current frame only if the modulus of `step` by\
    \ `stepsPerFrame` is zero. If `backwards` is true, we subtract 1 from the `currentFrame`;\
    \ conversely, we add 1. If we change `currentFrame`'s value, we have to make sure\
    \ we don’t have a value less than 1 or greater than the number of frames. Note\
    \ here that `currentFrame` is one based, not zero based. This was done so the\
    \ value of `currentFrame` matches identically with our naming convention for image\
    \ file names, which is based on how the 3D modeling application Blender names\
    \ files. This makes life easier when debugging, since you don’t have to remember\
    \ to add or subtract. The last thing we do in `advanceFrame:ForStep:` is to mark\
    \ this actor as needing its view updated.\n\nLooking back at [Listing 6-19](#9781430244226_Ch06.xhtml#list19),\
    \ after calling `advanceFrame:ForStep:`, we check to see whether `needsViewUpdated`\
    \ is true. If we had adjusted the `currentFrame` value in `advanceFrame:ForStep:`,\
    \ then `needsViewUpdated` will be true. The value of `needsViewUpdated` could\
    \ also be true for other reasons (perhaps the actor’s state or variation has changed).\
    \ Regardless of how `needsViewUpdates` was set to YES, we simply find the correct\
    \ image for the actor by calling `getImageForActor:` and updating `imageView`.\
    \ Finally, we set `needsViewUpdated` to NO, because we know at this moment that\
    \ we have exactly the right image and we don’t need to find a different image\
    \ during the next step unless something sets `needsViewUpdated` back to YES.\n\
    \nWe have reviewed the class `ImageRepresentation` and how it is used to coordinate\
    \ the various states of the actor with the image intended to represent it. The\
    \ goal in designing this class was to make it easy to facilitate creating new\
    \ `Actor` classes that use it."
