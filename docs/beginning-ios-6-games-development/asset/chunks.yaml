    \ 7-14](#9781430244226_Ch07.xhtml#list14)展示了`Example03Controller`的重要部分。\n\n[**Listing\
    \ 7-14.**](#9781430244226_Ch07.xhtml#_list14)  `Example03Controller.m`（`doSetup`和`updateScene`）\n\
    \n```\n-(BOOL)doSetup{\n    if([super doSetup]){\n        NSMutableArray* classes\
