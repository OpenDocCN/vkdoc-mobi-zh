  trans: "\n# 通过示例理解行为\n\n在这个示例中，我们有能量块在屏幕上翻滚。最终在它们消失前，会开始闪烁。这两种不同的行为可以通过在 `Powerup`\
    \ 类中提供任务步骤来实现。在上一章中，我们就是这样实现不同角色的不同行为的。在本章中，我们将引入一种通用机制来定义行为，这些行为可以在不同类型的角色之间共享，或根据单个角色的状态进行更改。\n\
    \n在之前的列表 6-13 中，我们省略了 `Powerup` 类构造函数中处理行为的部分。列表 6-21 展示了这段被省略的代码。\n\n**列表 6-21\
    \ `Powerup.m (powerup：（部分）)`**\n\n```objc\n//Powerup* powerup = ...\nfloat direction\
    \ = arc4random()%100/100.0 * M_PI*2;\nLinearMotion* motion = [LinearMotion linearMotionInDirection:direction\
    \ AndSpeed:1];\n[motion setWrap:YES];\n[powerup addBehavior: motion];\n\nExpireAfterTime*\
    \ expire = [ExpireAfterTime expireAfter:60*30];\n[expire setDelegate: powerup];\n\
    [powerup addBehavior: expire];\n\nreturn powerup;\n```\n\n我们刚刚创建了一个名为 `powerup`\
    \ 的新 `Powerup` 对象，并设置了一些基本属性。下一步是创建 `Behavior` 对象，将它们添加到新创建的 `Powerup` 中，然后返回该对象。我们创建的第一个行为是一个名为\
    \ `motion` 的 `LinearMotion` 对象，通过任务 `addBehavior`：将其添加到 `powerup` 中。第二个行为是一个名为\
    \ `expire` 的 `ExpireAfterTime` 对象。在将 `expire` 添加到 `powerup` 之前，我们将 `powerup` 注册为\
    \ `expire` 的委托。这为我们提供了一种简单的方法，让能量块在接近过期时闪烁。\n\n## 行为：线性运动\n\n这两个行为都将与其他 `Actor`\
    \ 类一起复用，因此值得详细探讨。让我们从 `LinearMotion` 类开始，其头文件如列表 6-22 所示。\n\n**列表 6-22 `LinearMotion.h`**\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import \"Actor.h\"\n\n@interface\
    \ LinearMotion : NSObject <Behavior>{\n    float deltaX;\n    float deltaY;\n\
    }\n\n@property (nonatomic) float speed;\n@property (nonatomic) float direction;\n\
    @property (nonatomic) BOOL wrap;\n\n+(id)linearMotionInDirection:(float)aDirection\
    \ AtSpeed:(float)aSpeed;\n+(id)linearMotionRandomDirectionAndSpeed;\n\n@end\n\
    ```\n\n`LinearMotion` 类继承自 `NSObject` 并遵循 `Behavior` 协议，该协议从 `Actor.h` 中导入。`LinearMotion`\
    \ 类有三个属性：`speed`、`direction` 和 `wrap`。`speed` 和 `direction` 属性顾名思义。`wrap` 属性表示角色离开游戏区域后是否应从另一侧重新进入游戏区域。这两个任务是用于创建\
    \ `LinearMotion` 对象的构造函数。我们或许可以想到这个类中更多实用的构造函数，但对于本章来说，这两个已经足够了。\n\n让我们通过查看列表\
    \ 6-23 中展示的这两个构造函数，开始探索 `LinearMotion` 类的实现。\n\n**列表 6-23 `LinearMotion.m（构造函数）`**\n\
    \n```objc\n+(id)linearMotionInDirection:(float)aDirection AtSpeed:(float)aSpeed{\n\
    \    LinearMotion* motion = [LinearMotion new];\n    [motion setDirection:aDirection];\n\
    \    [motion setSpeed:aSpeed];\n\n    return motion;\n}\n\n+(id)linearMotionRandomDirectionAndSpeed{\n\
    \    float direction = (arc4random()%100/100.0)*M_PI*2;\n    float speed = (arc4random()%100/100.0)*3;\n\
    \n    return [LinearMotion linearMotionInDirection:direction AtSpeed:speed];\n\
    }\n```\n\n构造函数 `linearMotionInDirection:AtSpeed`：只是创建一个新的 `LinearMotion` 对象并设置这两个属性。构造函数\
    \ `linearMotionRandomDirectionAndSpeed` 为 `direction` 和 `speed` 创建随机值，然后直接调用构造函数\
    \ `linearMotionInDirection:AtSpeed`：。\n\n列表 6-24 展示了 `LinearMotion` 类实现的其余部分。\n\
    \n**列表 6-24 `LinearMotion.m`**\n\n```objc\n-(void)setSpeed:(float)aSpeed{\n  \
    \  speed = aSpeed;\n    deltaX = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n\
    }\n\n-(void)setDirection:(float)aDirection{\n    direction = aDirection;\n   \
    \ deltaX = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n}\n\n\
    -(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n    CGPoint\
    \ center = anActor.center;\n    center.x += deltaX;\n    center.y += deltaY;\n\
    \n    if (wrap){\n        CGSize gameSize = [gameController gameAreaSize];\n \
    \       float radius = [anActor radius];\n\n        if (center.x < -radius &&\
    \ deltaX < 0){\n            center.x = gameSize.width + radius;\n        } else\
    \ if (center.x > gameSize.width + radius && deltaX > 0){\n            center.x\
    \ = -radius;\n        }\n\n        if (center.y < -radius && deltaY < 0){\n  \
    \          center.y = gameSize.height + radius;\n        } else if (center.y >\
    \ gameSize.height + radius && deltaY > 0){\n            center.y = -radius;\n\
    \        }\n    }\n    [anActor setCenter:center];\n}\n```\n\n每次设置 `speed` 或 `direction`\
    \ 值时，我们都会计算 `deltaX` 和 `deltaY` 的值。任务 `applyToActor:In`：由 `Behavior` 协议定义，并由 `GameController`\
    \ 调用，使 `Behavior` 有机会修改角色。在 `LinearMotion` 类的 `applyToActor:In`：实现中，我们首先获取角色的当前中心点，然后将\
    \ X 和 Y 分量增加 `deltaX` 和 `deltaY`。\n\n如果 `wrap` 为真，我们需要检查角色是否位于游戏区域之外。这比简单地检查 `center`\
    \ 是否在 `gameArea` 内要复杂一些，因为我们还需要考虑角色的半径。我们希望角色看起来像是在屏幕外移动，而不是在碰到屏幕边缘时直接消失。此外，只有当角色正在远离游戏区域时才移动它。考虑到这两点，我们测试\
    \ `center` 的 X 值是否小于 `radius` 且 `deltaX` 为负值。这意味着角色位于游戏区域的左侧并且正在向左移动，远离游戏区域。因此，我们最好将其移动到游戏区域的右侧，这样角色向左移动时就会从屏幕右侧重新进入。如果\
    \ `center` 的 X 值大于游戏区域的宽度且正在向右移动，则执行相反的操作，将角色移动到屏幕左侧。对中心点的 Y 值重复这两项测试。\n\n`LinearMotion`\
    \ 的实现非常简单，只是因环绕概念而略微复杂。接下来，我们将探讨 `ExpireAfterTime` 类，它用于在指定时间后将角色从场景中移除。\n\n##\
    \ 行为：`ExpireAfterTime`\n\n`Powerup` 使用 `ExpireAfterTime` 类在走过一定步骤后将其从场景中移除。在能量块被移除之前，我们希望通过将其状态从发光变为不发光来使其闪烁。为了支持这第二个特性，我们需要在\
    \ `ExpireAfterTime` 对象和它所作用的角色之间建立某种通信。列表 6-25 展示了 `ExpireAfterTime` 类的头文件。\n\n\
    **列表 6-25 `ExpireAfterTime.h`**\n\n```objc\n#import <Foundation/Foundation.h>\n\
    #import \"Actor.h\"\n```\n"
- fmt: "`@class ExpireAfterTime`; `@protocol ExpireAfterTimeDelegate -(void)stepsUpdated:(ExpireAfterTime*)expire\
    \ In:(GameController*)controller; @end` `@interface ExpireAfterTime : NSObject\
    \ <Behavior> {  } @property (nonatomic) long stepsRemaining; @property (nonatomic,\
    \ assign) Actor<ExpireAfterTimeDelegate>* delegate; +(id)expireAfter:(long)aNumberOfSteps;\
    \ @end`\n\nHere the class `ExpireAfterTime` conforms to the protocol `Behavior`,\
    \ just like the class `LinearMotion` does. `ExpireAfterTime` also defines a new\
    \ protocol called `ExpireAfterTimeDelegate` that defines the task `stepsUpdated:In:`,\
    \ which will be called by the `ExpireAfterTime` on its delegate every time `applyToActor:In:`\
    \ is called, as shown in [Listing 6-26](#9781430244226_Ch06.xhtml#list26).\n\n\
    **[Listing 6-26.](#9781430244226_Ch06.xhtml#_list26) `ExpireAfterTime.m`**\n\n\
    ```\n#import \"ExpireAfterTime.h\"\n#import \"GameController.h\"\n\n@implementation\
    \ ExpireAfterTime\n@synthesize stepsRemaining;\n@synthesize delegate;\n\n+(id)expireAfter:(long)aNumberOfSteps\
    \ {\n    ExpireAfterTime* expires = [ExpireAfterTime new];\n    [expires setStepsRemaining:\
    \ aNumberOfSteps];\n    return expires;\n}\n\n-(void)applyToActor:(Actor*)anActor\
    \ In:(GameController*)gameController{\n    stepsRemaining--;\n\n    [delegate\
    \ stepsUpdated:self In:gameController];\n\n    if (stepsRemaining <= 0){\n   \
    \     [gameController removeActor:anActor];\n    }\n}\n@end\n```\n\nIn this implementation\
    \ of the class `ExpireAfterTime`, the constructor `expireAfter:` simply creates\
    \ a new `ExpireAfterTime` object and sets the `stepsRemaining` property. The task\
    \ `applyToActor:In:` is called by a `GameController` for each step of the game.\
    \ In this task, we decrement `stepsRemaining` and update the delegate that the\
    \ number of steps was updated. If `stepsRemaining` is zero or less, we remove\
    \ the actor from the `GameController`.\n\nBefore we add `ExpireAfterTime` to the\
    \ `Powerup` object, we set the `Powerup` object as the delegate to `ExpireAfterTime`.\
    \ This causes `ExpireAfterTime` to call `stepsUpdated:In:` on the `Powerup` object.\
    \ [Listing 6-27](#9781430244226_Ch06.xhtml#list27) shows the implementation of\
    \ `stepsUpdated:In:` for the class `Powerup`.\n\n**[Listing 6-27.](#9781430244226_Ch06.xhtml#_list27)\
    \ `Powerup.m (stepsUpdated:In:)`**\n\n```\n-(void)stepsUpdated:(ExpireAfterTime*)expire\
    \ In:(GameController*)controller{\n    long stepsRemaining = [expire stepsRemaining];\n\
    \    if (stepsRemaining<60*5){\n        if (stepsRemaining % 25 == 0){\n     \
    \       if (self.state == STATE_GLOW){\n                self.state = STATE_NO_GLOW;\n\
    \            } else {\n                self.state = STATE_GLOW;\n            }\n\
    \        }\n    }\n}\n```\n\nIn this listing, we check how many steps are remaining\
    \ for the `ExpireAfterTime` object. If that value is fewer than 300 steps (5 seconds\
    \ at 60 frames per second), we want to apply our blinking logic. To make the power-up\
    \ blink, we swap the state of `Powerup` from `STATE_GLOW` to `STATE_NO_GLOW`,\
    \ or vice versa.\n\nChanging the state is all that is required to change which\
    \ image represents the `Powerup` actor because (looking back at [Listing 6-10](#9781430244226_Ch06.xhtml#list10))\
    \ we know that setting the state of an actor sets its `needViewUpdated` property\
    \ to `YES`. Further, if an actor’s `needViewUpdated` property is `YES` and that\
    \ actor is using an `ImageRepresentation`, that `ImageRepresentation` will fetch\
    \ the correct image for the actor in the task `updateView:In:` (as shown earlier\
    \ in [Listing 6-19](#9781430244226_Ch06.xhtml#list19)).\n\n## Summary\n\nIn this\
    \ chapter, we looked at our base game engine classes `GameController` and `Actor`\
    \ and learned how to use these classes to create a simple scene exercising our\
    \ new actor, the power-up. We looked at the protocol `Behavior`, which provides\
    \ us with a framework for creating reusable bits of game logic to be applied to\
    \ our actors. We also consolidated the logic required to render an image-based\
    \ actor into the class `ImageRepresentation`.\n\nThis also set the stage for vector-based\
    \ actors, which will be discussed in the following chapter.\n\n## Chapter 7: Build\
    \ Your Game: Vector Actors and Particles\n\nCore Graphics is a powerful 2D drawing\
    \ library that is responsible for rendering large portions of iOS and OS X. In\
    \ this chapter, we see how to use this library to draw actors in our game. The\
    \ goal is to have actors that are drawn dynamically based on game state. To illustrate\
    \ this, we’ll create two example actors drawn with Core Graphics: a health bar\
    \ that shows the amount of health remaining for an actor, and a bullet that is\
    \ drawn in a particular color depending on how powerful it is. These two examples\
    \ will illustrate how to use Core Graphics within the context of the simple game\
    \ engine we have started.\n\nWe will accomplish this by creating a new class called\
    \ `VectorRepresentation`, which is analogous to the class `ImageRepresentation`\
    \ from the previous chapter. The class `VectorRepresentation` will be used to\
    \ create a `UIView` to represent our actor, and be drawn with custom code using\
    \ Core Graphics.\n\nWe’ll also look at another popular technique used in games\
    \ to create a compelling visual: the particle system. Stated simply, a particle\
    \ system is anything in a game that generates lots of little graphics that, when\
    \ composed on the screen, create an overall effect more interesting than the sum\
    \ of its parts. Particle systems are used in games to create fire effects, water\
    \ effects, and spell effects, to name a few.\n\nIn this chapter, we use particle\
    \ systems to create comets that are composed of a large number of simple particle\
    \ actors to give the comets a glowing, fluid feel. We are also going to use this\
    \ technique to illustrate a little realism when an asteroid breaks apart.\n\n\
    The sample code for this chapter can be found in the Xcode project Sample 06+07.\n\
    \n## Saucers, Bullets, Shields, and Health Bars\n\nIn this example, we will look\
    \ at four new actors: saucers, bullets, shields, and health bars. The code for\
    \ this section is found under the group Example 2, in the Xcode project Sample\
    \ 06+07.\n\nThe health bar and bullet actors will be rendered programmatically\
    \ with Core Graphics instead of using a pre-rendered image. The other actors—saucers\
    \ and shields—exist in this example to provide a little context (got to have something\
    \ to shoot with the bullets) and flesh out our example from the last chapter in\
    \ terms of behaviors. [Figure 7-1](#9781430244226_Ch07.xhtml#Fig1) shows the saucers,\
    \ bullets, shields, and health bars in action.\n\n![9781430244226_Fig07-01.jpg](images/9781430244226_Fig07-01.jpg)\n\
    \n[Figure 7-1.](#9781430244226_Ch07.xhtml#_Fig1)  Saucers, bullets, shields, and\
    \ health bars\n\nIn [Figure 7-1](#9781430244226_Ch07.xhtml#Fig1), we see a flying\
    \ saucer in the middle of the screen. Coming from the right and traveling left\
    \ are a number of circular bullets. The bullets come in three different sizes,\
    \ which reflect their potential for damage. If a bullet collides with the saucer,\
    \ a shield effect is added to the flying saucer and the health bar goes down,\
    \ indicating the damage done. In this example, the bullets will keep coming until\
    \ the saucer’s health is zero, at which point it is removed and a new flying saucer\
    \ is added. [Figure 7-2](#9781430244226_Ch07.xhtml#Fig2) shows the three difference\
    \ saucers used in this example, as well as the graphic used for the shield.\n\n\
    ![9781430244226_Fig07-02.jpg](images/9781430244226_Fig07-02.jpg)\n\n[Figure 7-2.](#9781430244226_Ch07.xhtml#_Fig2)\
    \  Three saucers and a shield\n\nThe shield image is partially transparent and\
    \ is designed be drawn over a saucer, as can be seen in the scaled up saucer with\
    \ the shield drawn over it.\n\nTo understand how all the parts and pieces of this\
    \ example fit together, we will start by looking at the implementation of the\
    \ class `Example02Controller`, starting with the `doSetup` task, shown in [Listing\
    \ 7-1](#9781430244226_Ch07.xhtml#list1).\n\n[**Listing 7-1.**](#9781430244226_Ch07."
