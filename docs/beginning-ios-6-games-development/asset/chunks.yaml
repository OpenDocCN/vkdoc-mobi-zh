    dyf;         if (abs(moveToPoint.x - c.x) < self.speed && abs(moveToPoint.y -
    c.y) < self.speed){             c.x = moveToPoint.x;             c.y = moveToPoint.y;
                self.state = STATE_STOPPED;             self.needsImageUpdated = YES;
            }         [self setCenter:c];     } } ```    In [Listing 5-25](#9781430244226_Ch05.xhtml#list25),
    we see that we now have a set of `if` statements that controls the ship’s behavior
    based on its state. If the ship is stopped, we check to see if it should stay
    stopped; if not, we switch to the turning state and indicate that we need the
    image updated by setting `needsImageUpdated` to `YES`.    If the ship is in the
    turning state, calculate the angle we are turning toward based on `moveToPoint`
    and store the result in the variable `theta`. Because `atan` only returns a value
    between -π /2 and π /2, we test to see if we should add π to get our `targetRotation`.
    Once we have our `targetRotation` value, we check to see how close the `targetRotation`
    is to the current rotation. If they are close, we simply set `rotate` and to `targetRotation`
    and change `state` to `STATE_TRAVELING`. If we have not yet reached our `targetRotation`
    value, we rotate the ship a little way toward our `targetRotation`. If the ship
    is traveling, it moves toward the `moveToPoint` just as it did before.


    Summary    In this chapter, we explored how to create a frame-by-frame animation
    where the items or actors in the game update their location incrementally, many
    times a second. You learned how to synchronize an animation loop with the refresh
    rate of the device screen, and how to describe the state of a game in a display-agnostic
    way, freeing you from the coordinate system of the host `UIView`. We continued
    our exploration of this type of game by looking at some simple techniques to create
    animations and adding life to our actors.    Chapter     6    Create Your Characters:
    Game Engine, Image Actors, and Behaviors    In this chapter and the next, we will
    be creating classes for characters that will be used in the complete game presented
    in this book. But first, we need to refactor the code from the previous chapters
    to create reusable classes that make up a simple game engine. We will explore
    the classes and protocols that make up this game engine so you can understand
    how they fit together.    We will further abstract how actors are drawn on the
    screen by introducing the protocol `Representation`, which will allow us to create
    image-based actors as well as actors that are programmatically drawn (presented
    in the following chapter). The protocol `Representation` will provide us with
    a shared API for working with these two different types of on-screen actors.    We
    will also introduce the concept of behavior through the protocol `Behavior`. This
    protocol provides us with a pattern for describing what an actor does in the game
    in a reusable way.    By building our first character, the power-up, you will
    start to learn how to use a game engine. We will create an example `GameController`
    subclass that lets a bunch of power-ups loose on the screen, so you can get a
    feel for how this character looks and behaves.    Understanding the Game Engine
    Classes    Our simple game engine starts with two core classes: `GameController`
    and `Actor`. `GameController` is very much like the controller classes from the
    preceding chapter, except that it has been refined for more general use. The `Actor`
    class has similarly been improved to accommodate a greater number of `Actor` types.
    The `Actor` class also defines two protocols, `Representation` and `Behavior`
    that are used to describe each actor in different ways. The protocol `Representation`
    describes the tasks required to create and update an actor’s `UIView`. The protocol
    `Behavior` describes a task to be implemented by any class that wishes to create
    a shared, reusable behavior. These classes and protocols are covered in detail
    in the following sections.    The `GameController` Class    The `GameController`
    class coordinates the actors in the game and is ultimately responsible for rendering
    each actor on the screen. This includes setting up `GameController` as a `UIViewController`,
    defining a way to call our `updateScene` task repeated with a `CADisplayLink`,
    and finally reviewing how `updateScene` manages the actors in the scene. `GameController`
    also provides a mechanism for adding and removing actors. Let’s take a look at
    the header for the class `GameController`, shown in [Listing 6-1](#9781430244226_Ch06.xhtml#list1).    *[**Listing
    6-1**.](#9781430244226_Ch06.xhtml#_list1) `GameController.h`*    ``` #import <UIKit/UIKit.h>
    #import <QuartzCore/CADisplayLink.h> #import "Actor.'
  trans: "\n# 排版后的内容\n\n[内容]\n\n**清单 5-24.** `Viper03.m` (`imageName`) 展示了`imageName`任务在`Viper03`类中的实现。\n\
    \n```\n-(NSString*)imageName{ \n    if (self.state == STATE_STOPPED){\n      \
    \  return @\"viper_stopped\";\n    } else if (self.state == STATE_TURNING){\n\
    \        if (self.clockwise){\n          return @\"viper_clockwise\";\n      \
    \  } else {\n          return @\"viper_counterclockwise\";\n        }\n    } else\
    \ {//STATE_TRAVELING\n        return @\"viper_traveling\";\n    }\n}\n```\n\n\
    在清单 5-24 中，`viper`名称任务简单地根据对象的状态返回图像名称。如果`state`是`STATE_TURNING`，我们检查属性`clockwise`来决定使用哪个图像。为了实现行为的变化，我们需要查看任务`step:`的新实现，如清单\
    \ 5-25 所示。\n\n**清单 5-25.** `Viper03.m` (`step:`)\n\n```\n-(void)step:(Example03Controller*)controller{\n\
    \    CGPoint c = [self center];\n    if (self.state == STATE_STOPPED){\n     \
