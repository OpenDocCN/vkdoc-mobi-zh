    9-15.](#9781430244226_Ch09.xhtml#_Fig15)  A Successful Post    Summary    In this
    chapter, we explored Game Center and introduced what services it provides to the
    user. We explored those features in terms of GameKit to see how we can post the
    user’s score to a leaderboard and award achievements. Continuing with the social
    trend, we looked at the built-in support for Twitter in iOS 6\. Lastly, we looked
    at integrating Facebook into an iOS application. We covered how to handle authentication
    and post a simple message to the user’s feed.    Chapter     10    Monetizing
    via the Apple App Store    There are three main ways to make money by having apps
    in the Apple App Store. The most obvious way is to simply charge for the application.
    The second is to give the app away for free, but include ads. Another way, which
    can work for free and paid apps, is to include things for sale within the app.
    These are called in-app purchases, and are very popular with some styles of games.    This
    chapter will not cover what makes a good in-app purchase or whether your application
    should be free or available for a fee. It will cover the basics of setting up
    in-app purchases and explain the different types of purchases available.    In-App
    Purchases    In-app purchases are virtual items or services found within an app
    that are available for a fee. Many different applications take advantage of in-app
    purchases to make money—not just games. Some nongame examples include downloading
    articles or comics, cooking recipes, and detailed map data. Some in-game examples
    include additional levels, new powers, extra game money, and novelty items for
    customizing the look of the game.    We will look at the example code from the
    game Belt Commander. The source code can be found in the Belt Commander folder
    in the sample code for this book. In [Figure 10-1](#9781430244226_Ch10.xhtml#Fig1),
    you can see the in-app purchase options for Belt Commander.    In [Figure 10-1](#9781430244226_Ch10.xhtml#Fig1),
    we see a screenshot from the game Belt Commander. There are three buttons, each
    specifying which type of actors should be present in the game when it is played.
    The game comes with asteroids available by default; the two buttons on the right
    are used to purchase additional types of actors in the game. The button in the
    middle is for saucers, which were already purchased but won’t be included  the
    next time the game is played (Inactive).


    The button to the right indicates that the user may choose to purchase the ability
    to include power-up actors in the game. The user initiates the purchase by clicking
    the button and walking through the purchase dialogs.    ![9781430244226_Fig10-01.jpg](images/9781430244226_Fig10-01.jpg)    [Figure
    10-1.](#9781430244226_Ch10.xhtml#_Fig1)  In-app purchases in Belt Commander    Before
    we implement these features, we will look at the different types of in-app purchases
    available and how to enable in-app purchases in our application.    Overview of
    Purchase Types    There are four distinct types of in-app purchases, each supporting
    a different business need. If these four types of in-app purchases do not fit
    your business needs, you will have to roll your own. Writing your own in-app purchase
    service could be very time-consuming. I would recommend seeing if your business
    needs can be adapted to fit Apple’s model. The benefit is not only a decrease
    in development time but also  a benefit for the user. When you use Apple’s system,
    your user will see a familiar interface and login with a familiar set of credentials:
    the user’s Apple ID. The five types of in-app purchases are as follows:    *   Nonconsumable
    *   Consumable *   Free subscriptions *   Auto-renewing subscriptions *   Nonrenewing
    subscriptions    Let’s take a closer look at each of the five types of in-app
    purchases.    Nonconsumable    Nonconsumable in-app purchases are items that are
    purchased once and grant persistent access to some item or service. Nonconsumable
    items can be downloaded again by the user, and should be available on all of the
    user’s devices. Nonconsumable purchase can include additional game levels, new
    types of enemies to fight, or silly hats to customize your user’s game character.    Consumable    Consumable
    in-app purchases are designed to support items or services that are consumed.
    In a game, this might include additional lives, points for buying in-game items,
    or other things that can be used up. Consumable purchases are designed to be repeated.    Consumable
    purchases cannot be downloaded again, so by their nature they will not be available
    across a user’s devices unless you implement your own service to share this information
    across accounts.    Free Subscriptions    Free subscriptions are a way to offer
    freely available content in the Newstand application. This particular type of
    in-app purchase really has nothing to do with games or apps.    Auto-Renewing
    Subscriptions    Auto-renewing subscriptions are a way for users to purchase a
    feature or gain access to content for a set amount of time. You can think of this
    as a magazine subscription that automatically charges your credit card every year.    Nonrenewing
    Subscriptions    Nonrenewing subscriptions are subscriptions that will not automatically
    charge the user to renew the subscription. This type of in-app purchase exists
    because Apple is picky about which features or content are suitable as auto-renewing
    subscriptions. The nonrenewing subscription is sort of a compromise, allowing
    subscriptions in an app that Apple would not otherwise feel is suitable for an
    auto-renewing subscription.    Now let’s look at what is required to ready an
    application for in-app purchases.    Preparing for In-app Purchases    Much like
    Game Center, an application must be enabled in iTunes Connect to include in-app
    purchases. The requirements are exactly the same: you have to use an App ID that
    does not have a wildcard. In [Chapter 9](#9781430244226_Ch09.xhtml), we covered
    the process of creating an App ID in your provisioning center that works with
    Game Center. You can follow the directions to create a second App ID, or simply
    add in-app purchases to that same game.    Enabling and Creating In-App Purchases    Once
    you have an app in iTunes Connect, enabling in-app purchases is done by pressing
    the Manage In-App Purchases button, as shown in [Figure 10-2](#9781430244226_Ch10.xhtml#Fig2).    !'
  trans: "```objective-c\naccount = facebookAccount;\n[request performRequestWithHandler:^(NSData\
    \ *responseData, NSHTTPURLResponse *urlResponse, NSError *error) {\n    if (error){\n\
    \        NSLog(@\"%@\", error);\n    } else {\n        //Success\n    }\n}];\n\
    ```\n\n在列表 9-8 中，我们首先检查对象 `facebookAccount` 是否已设置；如果已设置，我们创建一个名为 `params` 的 `NSDictionary`，并用帖子内容填充它。`params`\
    \ 中的项特定于你向 Facebook 发布的帖子类型。请查阅 Facebook 文档以确认具体哪些项是必需或允许的。接下来，我们创建一个指向 Facebook\
    \ 社交图谱中发布位置的 `NSURL`。在此例中，这是当前用户的动态。\n\n一旦我们准备好发布帖子的所有内容，就创建一个 `SLRequest` 对象，确保指定正确的\
    \ `requestMethod`（`SLRequestMethodPOST`）。我们还指定该请求应与对象 `facebookAccount` 关联。这可确保请求使用预期账户正确配置。最后，我们调用\
    \ `performRequestWithHandler` 并传入处理程序块。\n\n在我们的例子中，处理程序块中除了记录问题外，没有太多操作。如果一切顺利，用户将在其时间线中看到类似图\
    \ 9-15 的内容。\n\n![9781430244226_Fig09-15.jpg](img/9781430244226_Fig09-15.jpg)\n\
    \n图 9-15.  发布成功\n\n## 总结\n\n在本章中，我们探索了 Game Center，并介绍了它为用户提供的服务。我们基于 GameKit\
    \ 探讨了这些功能，了解如何将用户分数发布到排行榜以及授予成就。延续社交趋势，我们研究了 iOS 6 中对 Twitter 的内置支持。最后，我们探讨了如何将\
    \ Facebook 集成到 iOS 应用程序中。我们介绍了如何处理身份验证以及向用户动态发布简单消息。\n\n## 第 10 章 通过 Apple App\
    \ Store 盈利\n\n通过 Apple App Store 中的应用赚钱主要有三种方式。最直接的方式是直接对应用收费。第二种是免费提供应用，但包含广告。另一种方式（适用于免费和付费应用）是在应用内销售物品。这些称为应用内购买，在某些类型的游戏中非常流行。\n\
    \n本章不会讨论什么样的应用内购买是好的，或者你的应用应该免费还是收费。它将介绍设置应用内购买的基础知识，并解释可用的不同购买类型。\n\n### 应用内购买\n\
    \n应用内购买是应用内需要付费的虚拟物品或服务。许多不同类型的应用（不仅仅是游戏）都利用应用内购买来赚钱。一些非游戏示例包括下载文章或漫画、烹饪食谱以及详细的地图数据。一些游戏内示例包括额外关卡、新能力、额外游戏货币以及用于自定义游戏外观的新颖物品。\n\
    \n我们将查看游戏 Belt Commander 的示例代码。源代码可以在本书示例代码的 Belt Commander 文件夹中找到。在图 10-1 中，你可以看到\
    \ Belt Commander 的应用内购买选项。\n\n在图 10-1 中，我们看到来自游戏 Belt Commander 的截图。有三个按钮，每个按钮指定游戏运行时应该出现哪种类型的角色。游戏默认提供小行星；右侧的两个按钮用于购买游戏中的额外角色类型。中间的按钮用于飞碟，该内容已购买，但下次游戏运行时将不会包含（未激活）。\n\
    \n右侧的按钮表示用户可以选择购买在游戏中包含能力增强角色的功能。用户通过单击按钮并完成购买对话框来发起购买。\n\n![9781430244226_Fig10-01.jpg](img/9781430244226_Fig10-01.jpg)\n\
    \n图 10-1.  Belt Commander 中的应用内购买\n\n在实现这些功能之前，我们将了解可用的不同类型应用内购买以及如何在我们的应用中启用应用内购买。\n\
    \n### 购买类型概览\n\n有四种不同的应用内购买类型，每种类型支持不同的业务需求。如果这四种应用内购买类型不适合你的业务需求，你将需要自行实现。编写自己的应用内购买服务可能非常耗时。我建议检查你的业务需求是否可以适配\
    \ Apple 的模型。这样做的好处不仅是缩短开发时间，而且对用户也有利。当你使用 Apple 的系统时，用户将看到一个熟悉的界面，并使用一组熟悉的凭据（用户的\
    \ Apple ID）登录。五种应用内购买类型如下：\n\n*   非消耗型\n*   消耗型\n*   免费订阅\n*   自动续订订阅\n*   非续订订阅\n\
    \n让我们仔细看看每种应用内购买类型。\n\n#### 非消耗型\n\n非消耗型应用内购买是指一次性购买、并授予对某些物品或服务的持久访问权限的物品。用户可以重新下载非消耗型物品，并且这些物品应在用户的所有设备上可用。非消耗型购买可以包括额外游戏关卡、新类型的敌人或用于自定义用户游戏角色的滑稽帽子。\n\
    \n#### 消耗型\n\n消耗型应用内购买旨在支持会被消耗的物品或服务。在游戏中，这可能包括额外生命、用于购买游戏内物品的点数或其他可被用完的东西。消耗型购买设计为可重复进行。\n\
    \n消耗型购买无法重新下载，因此除非你实现自己的服务来跨账户共享此信息，否则它们本质上不会在用户设备间可用。\n\n#### 免费订阅\n\n免费订阅是一种在\
    \ Newsstand 应用程序中提供免费内容的方式。这种特定类型的应用内购买实际上与游戏或应用无关。\n\n#### 自动续订订阅\n\n自动续订订阅是一种让用户购买某个功能或在设定时间内获得内容访问权限的方式。你可以将其视为每年自动从信用卡扣费的杂志订阅。\n\
    \n#### 非续订订阅\n\n非续订订阅是指不会自动向用户收费以续订的订阅。这种类型的应用内购买之所以存在，是因为 Apple 对哪些功能或内容适合作为自动续订订阅要求严格。非续订订阅是一种折中方案，允许在\
    \ Apple 认为不适合进行自动续订订阅的应用中使用订阅。\n\n现在，让我们看看为应用内购买准备应用所需的内容。\n\n### 准备应用内购买\n\n\
    与 Game Center 非常相似，必须在 iTunes Connect 中启用应用才能包含应用内购买。要求完全相同：你必须使用不含通配符的 App ID。在第\
    \ 9 章中，我们介绍了在配置中心创建支持 Game Center 的 App ID 的过程。你可以按照说明创建第二个 App ID，或者直接将应用内购买添加到同一款游戏中。\n\
    \n### 启用和创建应用内购买\n\n一旦在 iTunes Connect 中有了应用，通过按下“管理应用内购买”按钮即可启用应用内购买，如图图 10-2\
    \ 所示。"
- fmt: '### Enabling In-App Purchases in iTunes Connect


    ![9781430244226_Fig10-02.jpg](images/9781430244226_Fig10-02.jpg)


    [Figure 10-2.](#9781430244226_Ch10.xhtml#_Fig2) Enabling In-app Purchases in iTunes
    Connect


    In [Figure 10-2](#9781430244226_Ch10.xhtml#Fig2), we see the view in iTunes Connect
    for configuring an application. Item A shows the button to click to enable in-app
    purchases. After clicking this button, you will be able to add items to your app
    that users may purchase. [Figure 10-3](#9781430244226_Ch10.xhtml#Fig3) shows the
    items I prepared for Belt Commander.


    ![9781430244226_Fig10-03.jpg](images/9781430244226_Fig10-03.jpg)


    [Figure 10-3.](#9781430244226_Ch10.xhtml#_Fig3) In-App purchases available for
    Belt Commander


    In [Figure 10-3](#9781430244226_Ch10.xhtml#Fig3), we see the screen in iTunes
    Connect where in-app purchases are listed. We can see that we added two: one for
    each additional type of actor the user can add to the game. For each in-app purchase,
    we see a reference name, a product ID, a product type, and the product status.
    The reference name is for internal use—it will not be seen by the user. The product
    ID is a unique name, used across all iOS applications, that identifies the purchase.
    The product ID will be how we reference this purchase in code.


    The type refers to the different purchase types we discussed earlier—in this case,
    nonconsumable. The status value indicates what is required for this in-app purchase
    to be accepted by Apple. (Apple must review each in-app purchase you create, much
    like how each app must be reviewed before sale.) In this case, we are informed
    that Apple is waiting for screenshots of the purchase before it will review it.
    The screenshots are not shown to the user—they just give context to Apple about
    what the in-app purchase is. In [Figure 10-4](#9781430244226_Ch10.xhtml#Fig4),
    we see the view in iTunes Connect that is used to create a new in-app purchase.


    ![9781430244226_Fig10-04.jpg](images/9781430244226_Fig10-04.jpg)


    [Figure 10-4.](#9781430244226_Ch10.xhtml#_Fig4) A new in-app purchase


    Item A in [Figure 10-4](#9781430244226_Ch10.xhtml#Fig4) shows where we enter our
    reference name for the in-app purchase. Item B shows the Product ID for the in-app
    purchase. In order for you to create the in-app purchase, you must provide the
    localized strings for the in-app purchase by clicking the Add Language button
    (item C).


    Under the Pricing and Availability section of [Figure 10-4](#9781430244226_Ch10.xhtml#Fig4),
    you must set the item as cleared for sale, at item D, for you to test the purchase.
    You must also specify a Price Tier at item E. The price tiers are the same as
    the tiers for an application, with the exception that there is no free tier.


    Once you have in-app purchases defined for you application, you must configure
    a test user so you can test your purchases. It is highly recommended that you
    test your in-app purchases before you submit your application.


    ### Creating a Test User


    Once you have in-app purchases defined, you will want to create a test user to
    “purchase” those items in your application. This give you a chance to test enabling
    or disabling each purchased feature with the same workflow that a real user will
    experience. [Figure 10-5](#9781430244226_Ch10.xhtml#Fig5) shows where you start
    the process of adding a test user in iTunes Connect.


    ![9781430244226_Fig10-05.jpg](images/9781430244226_Fig10-05.jpg)


    [Figure 10-5.](#9781430244226_Ch10.xhtml#_Fig5) Creating a test user


    In [Figure 10-5](#9781430244226_Ch10.xhtml#Fig5), we see the option to create
    a test user from the Select User Type view. This view is available in iTunes Connect
    by clicking on the Manage Users button found on the home screen.


    **Note** I emphasize using a test user to debug your in-app purchases because
    trying to debug with a real user will confound your efforts.


    Once you click the Test User button shown in [Figure 10-5](#9781430244226_Ch10.xhtml#Fig5),
    you will be prompted to create a new user.


    There should be nothing surprising—just keep in mind that you should not use an
    e-mail address that is currently an Apple ID.


    We have looked at adding in-app purchases to our application in iTunes Connect
    and how to make sure we have a test user to debug our application. Next, we will
    look how in-app purchases are integrated into Belt Commander, giving us an understanding
    of the classes involved and how to use them.


    ### Class and Code for In-App Purchases


    Creating in-app purchases in iTunes Connect is just the first step in actually
    having in-app purchases available in your application. The next step is to understand
    the process of how in-app purchases are actually purchased and what classes are
    involved. The framework that contains the pertinent classes is called `StoreKit`,
    and is available as part of you iOS SDK installation. Using these classes, we
    are going to implement the workflow as shown in [Figure 10-6](#9781430244226_Ch10.xhtml#Fig6),
    which shows the process of determining which products are available and how to
    handle the request to make a purchase.


    ![9781430244226_Fig10-06.jpg](images/9781430244226_Fig10-06.jpg)


    [Figure 10-6.](#9781430244226_Ch10.xhtml#_Fig6) Purchase Process


    Starting at the top-left of [Figure 10-6](#9781430244226_Ch10.xhtml#Fig6), we
    begin by getting a set of Product IDs for products we want to present to the user.
    This list might come from an external web service or just be a hardwired set of
    strings in the application. How you get this list will depend on how you are managing
    what is for sale in your app. If you are adding new products all the time, you
    probably want to pull the list of products from a web service. If you are just
    getting started with in-app purchases, a fixed list might work for you, but you
    will have to update your app to change the list.


    Once we have our list of possible Product IDs, we make a request to the iTunes
    Store, asking which of the IDs we have passed along are valid and ready for sale.
    The IDs returned from the iTunes Store represent the items we want to make available
    to the user. The iTunes Store will not return Product IDs that are unknown or
    not ready for sale. This ensures that we are presenting only valid items that
    have gone through Apple’s review process. In addition to letting us know that
    the IDs are valid, the iTunes Store returns the localized strings associated with
    the purchase, allowing us to present language-appropriate text to the user that
    matches exactly what was entered into iTunes Connect.


    Continuing with the workflow shown in [Figure 10-6](#9781430244226_Ch10.xhtml#Fig6),
    at some point the user will click a button to purchase an item. When this happens,
    we simply create a payment request and submit it, at which point the user will
    be prompted with a number of dialogs confirming the purchase. If all goes well,
    we will get a callback letting us know that purchase was successful. When this
    happens, we need to record that the purchase has been made. We can do this simply
    by sticking the Product ID in the standard `NSUserDefaults`, or we can do something
    more sophisticated, like save it to a web service. The dialogs that the user must
    work through in order to confirm a purchase are shown in [Figure 10-7](#9781430244226_Ch10.xhtml#Fig7).


    ![9781430244226_Fig10-07.jpg](images/9781430244226_Fig10-07.jpg)


    [Figure 10-7.](#9781430244226_Ch10.xhtml#_Fig7) Making a purchase


    The dialog on the upper left side of the figure will always be shown, as well
    as the one on the lower right. The other two dialogs will be shown between the
    first and last dialog if the user has to log in with his Apple ID. It is important
    to remember that, as a developer, we have no control over exactly which dialogs
    will be displayed or how long the user will take to complete the process. It is
    important not to expect the user to complete this process while the action of
    the game is in process.'
