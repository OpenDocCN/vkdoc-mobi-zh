    \ 时，`ExpireAfterTime` 都会在其委托上调用此任务，如列表 6-26 所示。\n\n**列表 6-26. `ExpireAfterTime.m`**\n\
    \n```\n#import \"ExpireAfterTime.h\"\n#import \"GameController.h\"\n\n@implementation\
    \ ExpireAfterTime\n@synthesize stepsRemaining;\n@synthesize delegate;\n\n+(id)expireAfter:(long)aNumberOfSteps\
    \ {\n    ExpireAfterTime* expires = [ExpireAfterTime new];\n    [expires setStepsRemaining:\
    \ aNumberOfSteps];\n    return expires;\n}\n\n-(void)applyToActor:(Actor*)anActor\
    \ In:(GameController*)gameController{\n    stepsRemaining--;\n\n    [delegate\
    \ stepsUpdated:self In:gameController];\n\n    if (stepsRemaining <= 0){\n   \
    \     [gameController removeActor:anActor];\n    }\n}\n@end\n```\n\n在这个 `ExpireAfterTime`\
    \ 类的实现中，构造器 `expireAfter:` 简单地创建一个新的 `ExpireAfterTime` 对象并设置 `stepsRemaining`\
    \ 属性。在游戏的每一步中，`GameController` 都会调用任务 `applyToActor:In:`。在此任务中，我们递减 `stepsRemaining`\
    \ 并更新委托，通知其步数已更新。如果 `stepsRemaining` 小于等于零，则从 `GameController` 中移除该角色。\n\n在将 `ExpireAfterTime`\
    \ 添加到 `Powerup` 对象之前，我们将 `Powerup` 对象设置为 `ExpireAfterTime` 的委托。这会导致 `ExpireAfterTime`\
    \ 在 `Powerup` 对象上调用 `stepsUpdated:In:`。列表 6-27 显示了类 `Powerup` 中 `stepsUpdated:In:`\
    \ 的实现。\n\n**列表 6-27. `Powerup.m (stepsUpdated:In:)`**\n\n```\n-(void)stepsUpdated:(ExpireAfterTime*)expire\
    \ In:(GameController*)controller{\n    long stepsRemaining = [expire stepsRemaining];\n\
    \    if (stepsRemaining<60*5){\n        if (stepsRemaining % 25 == 0){\n     \
    \       if (self.state == STATE_GLOW){\n                self.state = STATE_NO_GLOW;\n\
    \            } else {\n                self.state = STATE_GLOW;\n            }\n\
    \        }\n    }\n}\n```\n\n在此列表中，我们检查 `ExpireAfterTime` 对象还剩余多少步。如果该值少于 300\
    \ 步（在每秒 60 帧的情况下相当于 5 秒），我们将应用闪烁逻辑。为了使能量道具闪烁，我们在 `STATE_GLOW` 和 `STATE_NO_GLOW`\
    \ 状态之间切换 `Powerup` 的状态。\n\n更改状态就足以改变表示 `Powerup` 角色的图像，因为（回顾列表 6-10）我们知道设置角色的状态会将其\
    \ `needViewUpdated` 属性设置为 `YES`。此外，如果角色的 `needViewUpdated` 属性为 `YES`，并且该角色正在使用\
    \ `ImageRepresentation`，那么该 `ImageRepresentation` 将在任务 `updateView:In:` 中获取该角色的正确图像（如前文列表\
    \ 6-19 所示）。\n\n## 总结\n\n在本章中，我们研究了基础游戏引擎类 `GameController` 和 `Actor`，并学习了如何使用这些类来创建一个简单的场景，以运行我们的新角色——能量道具。我们了解了\
    \ `Behavior` 协议，它为我们提供了一个框架，用于创建可重用的游戏逻辑片段，以应用于我们的角色。我们还把渲染基于图像的角色所需的逻辑整合到了类 `ImageRepresentation`\
    \ 中。\n\n这也为下一章将要讨论的基于矢量的角色奠定了基础。\n\n## 第 7 章：构建你的游戏：矢量角色与粒子系统\n\nCore Graphics\
    \ 是一个强大的 2D 绘图库，负责渲染 iOS 和 OS X 的大部分界面。在本章中，我们将了解如何使用这个库来绘制游戏中的角色。目标是让角色能够根据游戏状态动态绘制。为了说明这一点，我们将创建两个使用\
    \ Core Graphics 绘制的示例角色：一个显示角色剩余生命值的生命条，以及一个根据其威力大小以特定颜色绘制的子弹。这两个示例将展示如何在我们已开始的简单游戏引擎上下文中使用\
    \ Core Graphics。\n\n我们将通过创建一个名为 `VectorRepresentation` 的新类来实现这一点，该类类似于上一章的 `ImageRepresentation`\
    \ 类。`VectorRepresentation` 类将用于创建一个 `UIView` 来表示我们的角色，并使用 Core Graphics 通过自定义代码进行绘制。\n\
    \n我们还将研究游戏中用于创造引人入胜视觉效果的另一项流行技术：粒子系统。简单地说，粒子系统是游戏中用于生成大量小图形的任何东西，当这些小图形在屏幕上组合时，会产生比各部分总和更有趣的整体效果。粒子系统在游戏中用于创建火焰效果、水效果以及法术效果等等。\n\
    \n在本章中，我们将使用粒子系统来创建由大量简单粒子角色组成的彗星，从而赋予彗星一种发光、流动的感觉。当小行星碎裂时，我们还会使用这种技术来表现一些真实感。\n\
    \n本章的示例代码可以在 Xcode 项目 Sample 06+07 中找到。\n\n## 飞碟、子弹、护盾和生命条\n\n在这个示例中，我们将了解四个新角色：飞碟、子弹、护盾和生命条。本节代码位于\
    \ Xcode 项目 Sample 06+07 的 Example 2 组中。\n\n生命条和子弹角色将使用 Core Graphics 以编程方式渲染，而不是使用预先渲染的图像。其他角色——飞碟和护盾——在这个示例中存在是为了提供一些背景（总得有些东西来发射子弹），并从行为的角度充实我们上一章的示例。图\
    \ 7-1 展示了运行中的飞碟、子弹、护盾和生命条。\n\n![9781430244226_Fig07-01.jpg](img/9781430244226_Fig07-01.jpg)\n\
    \n图 7-1. 飞碟、子弹、护盾和生命条\n\n在图 7-1 中，我们看到屏幕中央有一个飞碟。从右侧向左移动的是许多圆形子弹。这些子弹有三种不同的大小，反映了它们的潜在伤害力。如果子弹与飞碟碰撞，飞碟上会添加一个护盾效果，同时生命条会下降，表示受到了伤害。在这个示例中，子弹会持续出现，直到飞碟的生命值为零，此时它会被移除，并添加一个新的飞碟。图\
    \ 7-2 显示了本示例中使用的三种不同的飞碟，以及用于护盾的图形。\n\n![9781430244226_Fig07-02.jpg](img/9781430244226_Fig07-02.jpg)\n\
    \n图 7-2. 三种飞碟和一个护盾\n\n护盾图像是部分透明的，设计用于覆盖在飞碟之上，如下图所示，在一个放大的飞碟上覆盖着护盾。\n\n为了理解此示例中所有部分如何组合在一起，我们将从查看类\
    \ `Example02Controller` 的实现开始，首先从 `doSetup` 任务入手，如列表 7-1 所示。\n\n**列表 7-1.** \n"
- fmt: "# 示例排版\n\n## `doSetup`任务\n\n```objective-c\n-(BOOL)doSetup {\n    if ([super\
