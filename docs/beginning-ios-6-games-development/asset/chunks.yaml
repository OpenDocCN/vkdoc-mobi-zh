    defaults = [NSUserDefaults standardUserDefaults];   NSData* data = [defaults objectForKey:GAME_PARAM_KEY];
      if (data == nil){       GameParameters* params = [GameParameters gameParameters];
          [params writeToDefaults];         return params;     } else{       return
    [NSKeyedUnarchiver unarchiveObjectWithData: data];     } } -(void)writeToDefaults{
      NSData* data = [NSKeyedArchiver archivedDataWithRootObject:self];   NSUserDefaults*
    defaults = [NSUserDefaults standardUserDefaults];   [defaults setObject:data forKey:GAME_PARAM_KEY];
      [defaults synchronize]; } ```    In [Listing 10-5](#9781430244226_Ch10.xhtml#_list5),
    we see the tasks *readFromDefaults* and *writeToDefaults*. These two tasks are
    opposites: *readFromDefaults* will return a *GameParameter* for the key *GAME_PARAM_KEY*
    as stored in the user defaults. The task writeToDefaults writes a *GameParameter*
    to the user defaults for the key *GAME_PARAM_KEY*. The key idea to both of these
    tasks is that we store a *GameParameter* in the user defaults to remember the
    user’s purchases by recording the keys in the property purchases. The class *GameParameters*
    can be stored in an NSUserDefaults, because it implements the tasks from the protocol
    NSCoder. See [Chapter 2](#9781430244226_Ch02.xhtml) for a description of that
    process.    Let’s take a look at how we use this class to drive the UI and set
    the states of the three different buttons from [Figure 10-1](#9781430244226_Ch10.xhtml#Fig1).
    This is handled in the task `setGameParameters`:, as shown in [Listing 10-6](#9781430244226_Ch10.xhtml#_list6).    **[Listing
    10-6](#9781430244226_Ch10.xhtml#_list6).** GameParameters.m (setGameParameters:)    ```
    -(void)setGameParams:(GameParameters*)params{   gameParams = params;   NSSet*
    purchases = [gameParams purchases];    if ([params includeAsteroids]){       [asteroidButton
    setImage:[UIImage imageNamed:@"asteroid_active"] forState:UIControlStateNormal];
      } else {     [asteroidButton setImage:[UIImage imageNamed:@"asteroid_inactive"]
    forState:UIControlStateNormal];   }    if ([purchases containsObject:PURCHASE_INGAME_SAUCERS]){
         if ([params includeSaucers]){          [saucerButton setImage:[UIImage imageNamed:@"saucer_active"]
    forState:UIControlStateNormal];      } else {        [saucerButton setImage:[UIImage
    imageNamed:@"saucer_inactive"] forState:UIControlStateNormal];      }   } else
    {     [saucerButton setImage:[UIImage imageNamed:@"saucer_purchase"] forState:UIControlStateNormal];
      }    if ([purchases containsObject:PURCHASE_INGAME_POWERUPS]){      if ([params
    includePowerups]){          [powerupButton setImage:[UIImage imageNamed:@"powerup_active"]
    forState:UIControlStateNormal];      } else {        [powerupButton setImage:[UIImage
    imageNamed:@"powerup_inactive"] forState:UIControlStateNormal];      }   } else
    {     [powerupButton setImage:[UIImage imageNamed:@"powerup_purchase"] forState:UIControlStateNormal];
        } } ```    In [Listing 10-6](#9781430244226_Ch10.xhtml#_list6), we see the
    task *setGameParameters*. This task is responsible for making the UI reflect the
    state of the passed in *GameParameters* object called *param*. For the asteroidButton,
    we simply indicate which image should be displayed depending on the value of the
    property *includeAsteroids*. For *saucerButton*, we perform a similar test, but
    only if the product ID for the saucers is included in the *NSSet purchases*. If
    the product ID is not present, we set the image on the button to display the purchase
    version. We give the *UIButton* *powerButton* a similar treatment by setting the
    background to be active, inactive, or purchase.    Making the Purchase    Now
    that we know how the button state is managed, let’s look at how clicking one of
    the purchase buttons triggers a purchase. [Listing 10-7](#9781430244226_Ch10.xhtml#_list7)
    shows the code that is run when a user presses the saucer button.


    **[Listing 10-7](#9781430244226_Ch10.xhtml#_list7).** ExtrasController.m (saucerButtonClicked:)    ```
    - (IBAction)saucerButtonClicked:(id)sender {    if ([gameParams.purchases containsObject:PURCHASE_INGAME_SAUCERS]){
           [gameParams setIncludeSaucers:![gameParams includeSaucers]];        [self
    setGameParams:gameParams];        [gameParams writeToDefaults];    } else {     
    SKProduct* product = [idsToProducts objectForKey:PURCHASE_INGAME_SAUCERS];     
    SKPayment* payRequest = [SKPayment paymentWithProduct: product];   [[SKPaymentQueue
    defaultQueue] addPayment:payRequest];    } } ```    In [Listing 10-7](#9781430244226_Ch10.xhtml#_list7),
    we see the task saucerButtonClicked that is called when the user clicks the saucer
    button. If we have already purchased the saucer feature, we know that the user
    is simply looking to toggle if saucers are included. We respond to this by flipping
    the value of includeSaucers, updating the UI by calling *setGameParams*, and writing
    the change to disk. If the user has not yet purchased the saucer feature, we know
    he or she wants to make a purchase. To start this process, we retrieve our *SKProduct*
    object from idsToProducts, and then we create an *SKPayment* object with that
    *SKProduct*. Lastly, we add the *SKPayment* object to the default *SKPaymentQueue*.
    This triggers the dialog process, as shown in [Figure 10-7](#9781430244226_Ch10.xhtml#Fig7).
    The code to manage the power-ups is almost identical to the code in [Listing 10-7](#9781430244226_Ch10.xhtml#_list7),
    and it’s not worth looking at. Next, let’s look at how we respond to a successful
    purchase.    Responding to a Successful Purchase    In order to respond to a successful
    purchase, we had to add an instance of *SKPaymentTransactionObserver* to the default
    *SKPaymentQueue* back in [Listing 10-2](#9781430244226_Ch10.xhtml#_list2). We
    are now ready to look at the code that gets called when the *SKPaymentQueue* successfully
    processes a purchase, as shown in [Listing 10-8](#9781430244226_Ch10.xhtml#_list8).    **[Listing
    10-8](#9781430244226_Ch10.xhtml#_list8).** ExtrasController.m (paymentQueue: updatedTransactions:)    ```
    - (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray *)transactions{
       for (SKPaymentTransaction* transaction in transactions){       if (transaction.transactionState
    == SKPaymentTransactionStatePurchased || transaction.transactionState == SKPaymentTransactionStateRestored){
              NSString* productIdentifier = transaction.payment.productIdentifier;            [[gameParams
    purchases] addObject: productIdentifier];           [gameParams writeToDefaults];            [self
    setGameParams:gameParams];            [queue finishTransaction:transaction];         }
        } } ```    In [Listing 10-8](#9781430244226_Ch10.xhtml#_list8), we see the
    tasks *paymentQueue:updatedTransactions:* as implemented by the class *ExtrasController*.
    In this task, we iterate through each *SKPaymentTransaction* in the array transactions.
    For each *SKPaymentTransaction* we check to see if the state is *SKPaymentTransactionStatePurchase*
    or *SKPaymentTransactionStateRestore*. If it is, we add the product ID of the
    transaction to our *gamePagam*’s purchases property and save it. We also update
    the UI by calling *setGameParams:*. Lastly, we inform the queue that we are done
    working with the transaction by calling *finishTransaction:*.    Technically speaking,
    if the task *paymentQueue:updatedTransactions:* is a result of the user making
    a new purchase the state of the transaction would be *SKPaymentTransactionStatePurchased*.
    But because the type of products we are using are non-consumable, we need to make
    sure the user has a way to restore his purchases if his device is reset or if
    he made the purchase on another iOS device. In order to handle this, we make sure
    we allow the transaction state to be *SKPaymentTransactionStateRestored* and treat
    it the same as a new purchase.'
  trans: "\n`readFromDefaults`和`writeToDefaults`这两个任务方法：\n\n```\n+(id)readFromDefaults{\n\
    \    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n    NSData*\
    \ data = [defaults objectForKey:GAME_PARAM_KEY];\n    if (data == nil){\n    \
    \    GameParameters* params = [GameParameters gameParameters];\n        [params\
    \ writeToDefaults];\n        return params;\n    } else{\n        return [NSKeyedUnarchiver\
    \ unarchiveObjectWithData: data];\n    }\n}\n-(void)writeToDefaults{\n    NSData*\
    \ data = [NSKeyedArchiver archivedDataWithRootObject:self];\n    NSUserDefaults*\
    \ defaults = [NSUserDefaults standardUserDefaults];\n    [defaults setObject:data\
    \ forKey:GAME_PARAM_KEY];\n    [defaults synchronize];\n}\n```\n\n在 Listing 10-5\
    \ 中，我们看到了`readFromDefaults`和`writeToDefaults`这两个任务。这两个任务是互逆的：`readFromDefaults`会返回存储在用户默认设置中、对应键`GAME_PARAM_KEY`的`GameParameter`对象。而`writeToDefaults`任务则将一个`GameParameter`对象写入用户默认设置中，对应的键也是`GAME_PARAM_KEY`。这两个任务的核心思想是，通过将`GameParameter`对象存储在用户默认设置中，来记录用户购买的商品（通过`purchases`属性中的键来记录）。`GameParameters`类可以被存储在`NSUserDefaults`中，因为它实现了`NSCoder`协议中的任务。关于该过程的描述，请参见第\
    \ 2 章。\n\n现在，让我们看看如何使用这个类来驱动用户界面，并设置图 10-1 中三个不同按钮的状态。这些操作在`setGameParameters:`任务中处理，如\
    \ Listing 10-6 所示。\n\n**Listing 10-6.** GameParameters.m (setGameParameters:)\n\
    \n```\n-(void)setGameParams:(GameParameters*)params{\n    gameParams = params;\n\
    \    NSSet* purchases = [gameParams purchases];\n    if ([params includeAsteroids]){\n\
    \        [asteroidButton setImage:[UIImage imageNamed:@\"asteroid_active\"] forState:UIControlStateNormal];\n\
    \    } else {\n        [asteroidButton setImage:[UIImage imageNamed:@\"asteroid_inactive\"\
    ] forState:UIControlStateNormal];\n    }\n    if ([purchases containsObject:PURCHASE_INGAME_SAUCERS]){\n\
    \        if ([params includeSaucers]){\n            [saucerButton setImage:[UIImage\
    \ imageNamed:@\"saucer_active\"] forState:UIControlStateNormal];\n        } else\
    \ {\n            [saucerButton setImage:[UIImage imageNamed:@\"saucer_inactive\"\
    ] forState:UIControlStateNormal];\n        }\n    } else {\n        [saucerButton\
    \ setImage:[UIImage imageNamed:@\"saucer_purchase\"] forState:UIControlStateNormal];\n\
    \    }\n    if ([purchases containsObject:PURCHASE_INGAME_POWERUPS]){\n      \
    \  if ([params includePowerups]){\n            [powerupButton setImage:[UIImage\
    \ imageNamed:@\"powerup_active\"] forState:UIControlStateNormal];\n        } else\
    \ {\n            [powerupButton setImage:[UIImage imageNamed:@\"powerup_inactive\"\
    ] forState:UIControlStateNormal];\n        }\n    } else {\n        [powerupButton\
    \ setImage:[UIImage imageNamed:@\"powerup_purchase\"] forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\n在 Listing 10-6 中，我们看到了`setGameParameters`任务。这个任务负责让用户界面反映传入的`GameParameters`对象（名为`param`）的状态。对于`asteroidButton`，我们根据`includeAsteroids`属性的值，简单地指明要显示哪个图像。对于`saucerButton`，我们执行类似的检查，但仅在飞碟的产品\
    \ ID 包含在`NSSet purchases`中的情况下才进行。如果产品 ID 不存在，我们则将按钮的图像设置为显示购买版本。我们对`UIButton`\
    \ `powerButton`进行了类似的处理，将其背景设置为活动、非活动或购买状态。\n\n## 发起购买\n\n现在我们已经了解了按钮状态是如何管理的，接下来看看点击其中一个购买按钮是如何触发购买的。Listing\
    \ 10-7 展示了用户按下飞碟按钮时运行的代码。\n\n**Listing 10-7.** ExtrasController.m (saucerButtonClicked:)\n\
    \n```\n- (IBAction)saucerButtonClicked:(id)sender {\n    if ([gameParams.purchases\
    \ containsObject:PURCHASE_INGAME_SAUCERS]){\n        [gameParams setIncludeSaucers:![gameParams\
    \ includeSaucers]];\n        [self setGameParams:gameParams];\n        [gameParams\
    \ writeToDefaults];\n    } else {\n        SKProduct* product = [idsToProducts\
    \ objectForKey:PURCHASE_INGAME_SAUCERS];\n        SKPayment* payRequest = [SKPayment\
    \ paymentWithProduct: product];\n        [[SKPaymentQueue defaultQueue] addPayment:payRequest];\n\
    \    }\n}\n```\n\n在 Listing 10-7 中，我们看到了`saucerButtonClicked`任务，它在用户点击飞碟按钮时被调用。如果已经购买了飞碟功能，我们知道用户只是想切换是否显示飞碟。对此，我们通过翻转`includeSaucers`的值、调用`setGameParams`来更新\
    \ UI，并将更改写入磁盘来响应。如果用户尚未购买飞碟功能，则说明他/她想要进行购买。为了启动此过程，我们从`idsToProducts`中检索我们的`SKProduct`对象，然后使用该`SKProduct`创建一个`SKPayment`对象。最后，我们将`SKPayment`对象添加到默认的`SKPaymentQueue`中。这会触发对话框流程，如图图\
    \ 10-7 所示。管理道具功能的代码与 Listing 10-7 中的代码几乎相同，因此不值得再看。接下来，让我们看看如何响应成功的购买。\n\n## 响应成功购买\n\
    \n为了响应成功的购买，我们之前在 Listing 10-2 中向默认的`SKPaymentQueue`添加了一个`SKPaymentTransactionObserver`实例。现在我们准备看看当`SKPaymentQueue`成功处理一次购买时调用的代码，如\
    \ Listing 10-8 所示。\n\n**Listing 10-8.** ExtrasController.m (paymentQueue: updatedTransactions:)\n\
    \n```\n- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray\
    \ *)transactions{\n    for (SKPaymentTransaction* transaction in transactions){\n\
    \        if (transaction.transactionState == SKPaymentTransactionStatePurchased\
    \ || transaction.transactionState == SKPaymentTransactionStateRestored){\n   \
    \         NSString* productIdentifier = transaction.payment.productIdentifier;\n\
    \            [[gameParams purchases] addObject: productIdentifier];\n        \
    \    [gameParams writeToDefaults];\n            [self setGameParams:gameParams];\n\
    \            [queue finishTransaction:transaction];\n        }\n    }\n}\n```\n\
    \n在 Listing 10-8 中，我们看到了由`ExtrasController`类实现的`paymentQueue:updatedTransactions:`任务。在这个任务中，我们遍历事务数组（`transactions`）中的每一个`SKPaymentTransaction`。对于每个`SKPaymentTransaction`，我们检查其状态是否为`SKPaymentTransactionStatePurchased`或`SKPaymentTransactionStateRestored`。如果是，我们将事务的产品\
    \ ID 添加到`gameParams`的`purchases`属性中并保存。我们还通过调用`setGameParams:`来更新 UI。最后，我们通过调用`finishTransaction:`通知队列我们已完成对该事务的处理。\n\
    \n从技术上讲，如果`paymentQueue:updatedTransactions:`任务是由用户发起新购买引起的，那么事务的状态将是`SKPaymentTransactionStatePurchased`。但由于我们使用的产品类型是非消耗型的，我们需要确保用户能够恢复其购买记录，以防其设备被重置或他/她是在另一台\
    \ iOS 设备上进行的购买。为了处理这种情况，我们确保允许事务状态为`SKPaymentTransactionStateRestored`，并将其视为与新购买相同来处理。\n"
- fmt: "为了允许用户恢复购买，我们提供了恢复购买按钮，该按钮会调用[列表10-9](#9781430244226_Ch10.xhtml#_list9)中的代码。\n\
    \n[列表10-9](#9781430244226_Ch10.xhtml#list9) `ExtrasController.m` (`restorePurchasesClicked:`)\n\
    ```\n- (IBAction)restorePurchasesClicked:(id)sender {\n    [[SKPaymentQueue defaultQueue]\
    \ restoreCompletedTransactions];\n}\n```\n\n在[列表10-9](#9781430244226_Ch10.xhtml#_list9)中，我们看到当用户点击恢复购买按钮时调用的任务`restorePurchasesClicked`。在此任务中，我们简单地调用默认`SKPaymentQueue`上的`restoreCompletedTransactions`。这会使StoreKit联系iTunes\
    \ Store，并为当前应用和用户重新下载所有产品ID。完成后，它会调用`paymentQueue:updatedTransaction:`，如[列表10-8](#9781430244226_Ch10.xhtml#_list8)所示。这就是允许用户重新访问其购买所需的一切。\n\
    \n## 总结\n\n在本章中，我们回顾了什么是应用内购买以及五种不同的类型。我们还研究了如何在Belt Commander游戏中实现应用内产品的购买。我们回顾了如何从iTunes\
    \ Store获取有效的产品ID列表，以及如何基于该列表创建UI。我们还探讨了如何触发购买流程，以及如何响应成功完成，同时牢记如何为用户存储购买记录。\n\n\
    # 第11章 为你的游戏添加声音\n\n没有声音的游戏是不完整的。这包括背景音乐和音效。在任何操作系统中播放音效都是一件相当简单的事情，但确保你的应用或游戏与iOS系统的其他部分良好协同可能有点棘手。考虑到游戏应允许用户播放自己的音乐、响应中断和通知以及遵循静音开关，你会发现这不仅仅是播放音轨那么简单。\n\
    \n在本章中，我们将探讨如何确保你的游戏在iOS上是一个“好公民”，以及播放声音的基础知识。我们不会涉及高级声音概念或OpenAL，因为这些是复杂的话题，我们没有足够的篇幅在此充分讨论。项目Sample\
    \ 11包含本章的代码。\n\n## 如何播放声音\n\n在我们深入讨论完整应用的一些细节之前，让我们快速了解一下用于播放音频的基本类`AVAudioPlayer`。[列表11-1](#9781430244226_Ch11.xhtml#list1)展示了播放声音的最简单代码。\n\
    \n**[列表11-1](#9781430244226_Ch11.xhtml#_list1)**. `AVAudioPlayer`示例\n```\nNSURL\
    \ *url = [NSURL fileURLWithPath:[[NSBundle mainBundle] pathForResource:@\"viper_explosion\"\
    \ ofType:@\"m4a\"]];\nAVAudioPlayer* player = [[AVAudioPlayer alloc] initWithContentsOfURL:url\
    \ error: nil];\n[player play];\n```\n\n在[列表11-1](#9781430244226_Ch11.xhtml#list1)中，我们看到`AVAudioPlayer`实例`player`是通过`NSURL`初始化的。该`NSURL`是从应用的主`NSBundle`中，为文件`viper_explosion.m4a`构建的。文件`viper_explosion.m4a`只是一个添加到Xcode项目中的文件。为了实际播放声音，我们在`player`上调用`play`。这将以默认音量和声像播放音频一次。有很多方法可以改进这段基本代码，使其更适合游戏。但在深入这些细节之前，让我们先了解iOS应用中的声音如何在iPhone或iPad上成为一个“好公民”。\n\
    \n## 正确的音频行为\n\nApple的人机界面指南解释了他们对应用在音频方面的行为期望。这一点值得一读，可以在此处找到：`http://goo.gl/L0vYH.`\n\
    \n在不逐条讨论Apple指南的前提下，让我们看一下其中与游戏相关的一些重点。\n\n在开始之前，我必须说，这些要点似乎更适用于iPhone而非iPad，因为iPhone的使用场景更为敏感。人们总是随身携带手机，并且经常处于需要特定行为的社交场合。如果你在婚礼或其他活动中，即使将静音开关设置为静音，你肯定也不希望手机开始发出蜂鸣声。这引出了我们的第一点。\n\
    \n### 用户希望将设备切换至静音时就能静音\n\niPhone或iPad上用来关闭铃声的开关称为静音开关。尽管可以编写一个即使此开关设置为静音也能播放声音的iOS应用，但我想不出任何合理的理由这样做。可能会有例外，但你需要一个*非常*充分的理由。对于大多数普通的消磨时间游戏（我的最爱），我希望能够关闭声音。事实上，我几乎都是静音玩所有游戏的。\n\
    \n然而，这个规则有一个例外。如果用户戴了耳机，那么游戏无论静音开关设置如何，都应播放音频。此外，如果用户戴了耳机，他们希望游戏的音频从耳机输出。这听起来显而易见，但有很多游戏和应用在这方面做得不对。\n\
    \n关于这个话题的最后一点涉及设备的音量控制。游戏应尊重手机的音量级别。因此，当用户调整设备侧面的按钮来降低游戏音量时，音量应该相应降低。再次强调，这听起来显而易见，但关注这些细节将确保你的游戏与系统的其他部分良好协作，并满足用户的期望。\n\
    \n### 你的游戏可能不是唯一发出声音的应用\n\n许多用户喜欢在通过iOS设备播放音乐或其他音频的同时玩游戏。重要的是，你的游戏在运行时允许这些其他音频继续播放。Apple建议，对于声音不是体验关键部分的游戏（或其他应用），如果其他音频正在播放，则应保持静音。就个人而言，我稍微偏离这一理念。如果你的游戏有背景音乐，那么我同意音轨应让位于用户的音乐或播客。然而，游戏中的其他类型声音可能有必要在用户音频之上播放。例如，警告用户有Boss战的声音可能就是这个规则的一个很好的例外。你可以论证某些声音无论用户选择了哪种背景音乐都应该播放。\n\
    \n### 你的游戏不是唯一运行的应用\n\n除了尊重背景音乐之外，游戏还应考虑可能被中断的不同方式，并仍能正确运行。考虑游戏可能被中断的几种方式：\n\n\
    1. 用户通过Home键退出游戏。\n2. 用户双击Home键显示后台应用。\n3. 用户进行四指滑动（仅限iPad）切换到另一个应用。\n4. 用户收到弹出警告，例如电量过低。\n\
    5. 用户接到电话。\n\n所有这些事件都可以概括为游戏“失去活跃状态”。相反，当用户返回游戏时，它被称为“变为活跃状态”。当然，这些概念体现在`UIApplicationDelegate`类的`applicationWillResignActive:`和`applicationDidBecomeActive:`任务中。在下一节中，我们将回顾如何使用这些任务来确保正确的应用行为。\n\
    \n## 在你的游戏中实现声音\n\n我们已经讨论了iOS游戏中音频的一些细节。我们研究了关于硬件控制、耳机以及游戏与其他应用交互的不同方式的预期行为。在本节中，我们将探讨如何在代码中处理这些问题。"
  raw: 'In order to allow the user to restore we provide a restore purchases button
    that calls the code in [Listing 10-9](#9781430244226_Ch10.xhtml#_list9).    [Listing
    10-9](#9781430244226_Ch10.xhtml#list9). ExtrasController.m (restorePurchasesClicked:)    ```
    - (IBAction)restorePurchasesClicked:(id)sender {    [[SKPaymentQueue defaultQueue]
    restoreCompletedTransactions]; } ```    In [Listing 10-9](#9781430244226_Ch10.xhtml#_list9),
    we see the task *trestorePurchasesClicked* that gets called when the user clicks
    the restore purchases button. In this task, we simply call *restoreCompletedTransactions*
    on the default *SKPaymentQueue*. This causes StoreKit to contact the iTunes Store
    and re-download all product IDs for the current app and user. When it has done
    that, it *calls paymentQueue:updatedTransaction:*, as shown in [Listing 10-8](#9781430244226_Ch10.xhtml#_list8).
    This is all that is required to allow the user to get access to her purchases.    Summary    In
    this chapter, we reviewed what in-app purchases are and the five different types.
    We also looked at how we implemented the purchasing of in-app products in our
    Belt Commander game. We reviewed how to get a valid list of product IDs from the
    iTunes Store and how to create a UI based on that list. We also looked at how
    to trigger a purchase process and how to respond to a successful completion, keeping
    in mind how to store a record of that purchase for the user.    Chapter     11    Add
    Sound to Your Game    No game is complete without sound. This includes both background
    music and sound effects. Playing a sound effect in any OS is a pretty simple thing,
    but making sure your application or game plays nice with the rest of the iOS system
    can be a little tricky. If you consider that the game should allow users to play
    their own music, respond to interrupts and notifications, and honor the Silence
    switch, you can see that there is more to it than just playing an audio track.    In
    this chapter we will explore how to make sure your game is a good citizen on iOS,
    as well as the basics for playing sound. We will not be covering advanced sound
    concepts or OpenAL, as those are sophisticated topics and we don’t have the space
    to do them justice here. The project Sample 11 contains the code for this chapter.    How
    to Play Sound    Before we get into some of the details of a full application,
    let’s quickly look at the basic class for playing audio, `AVAudioPlayer`. [Listing
    11-1](#9781430244226_Ch11.xhtml#list1) shows the simplest code to play a sound.    **[Listing
    11-1](#9781430244226_Ch11.xhtml#_list1)**. `AVAudioPlayer Example`    ``` NSURL
    *url = [NSURL fileURLWithPath:[[NSBundle mainBundle] pathForResource:@" viper_explosion"
    ofType:@"m4a"]];       AVAudioPlayer* player = [[AVAudioPlayer alloc] initWithContentsOfURL:url
    error: nil]; [player play]; ```    In [Listing 11-1](#9781430244226_Ch11.xhtml#list1),
    we see the `AVAudioPlayer player`, instantiated with an `NSURL`. The `NSURL` is
    constructed from the applications main `NSBundle` for the file `viper_explosion.m4a`.
    The file `viper_explosion.m4a` is simply a file added the Xcode project. In order
    to actually play the sound, we call `play` on `player`. This plays the audio once
    at the default volume and pan. There are a number of ways we can improve on this
    basic code to make it more suitable for a game. But before we get into those details,
    let’s understand how sound in an iOS application works in terms of being a good
    citizen on the iPhone or iPad.    Correct Audio Behavior    Apple’s Human Interface
    Guidelines explain how they expect applications to behave in terms of audio. This
    is worth a read at some point, and can be found here: `http://goo.gl/L0vYH.`    Without
    going over Apple’s guidelines point by point, let’s look at some of the highlights
    in regard to how they apply to games.


    Before we get started, I must say that these points seem to apply more to the
    iPhone than to the iPad, since the usage of the iPhone is more sensitive. People
    always have their phones on them and often are in social situations that demand
    a specific behavior. If you are at a wedding or some other event, you really don’t
    want your phone to start beeping even when you have the Silent switch set to silence.
    Which brings us to our first point.    Users Switch Their Devices to Silent When
    They Want To    The switch on the iPhone or iPad that turns off the ringer is
    called the Silent switch. Although it is possible to write an iOS application
    that plays sound even though this switch is set to silent, I can’t think of any
    circumstances that would justify doing so. There may be exceptions, but you would
    need a *really* good reason. For most run-of-the-mill time-waster games (my favorite),
    I want to be able to kill sound. In fact, I play almost all of my games on silent.    There
    is one exception to this rule, however. If the user has headphones on, then the
    game is expected to play its audio regardless of the setting of the Silent switch.
    In addition, if users have their headphones on, they expect the audio for the
    game to come out of the headphones. Sounds obvious, but there are many games and
    applications that do this wrong.    The last point on this topic concerns the
    volume controls for the device. A game should honor the volume levels of the phone.
    So when users adjust the buttons on the side of the device to lower the volume
    of the game, the volume should go lower. Again, it sounds obvious, but paying
    attention to these little details will ensure your game plays well with the rest
    of the system and meets  user expectations.    Your Game May Not Be the Only Application
    Making Sound    Many users like to play games while listening to music or other
    audio that’s playing through their iOS devices. It is important that your game
    allow this other audio to play while your game is running. Apple recommends that
    a game (or other application) in which the sound is not a critical part of the
    experience should remain silent if other audio is playing. Personally, I deviate
    slightly from this philosophy. If your game has background music, then I agree
    that the audio track should yield to the user’s music or podcast. However, there
    are other types of sound in a game that might make sense to play over the user’s
    audio. Perhaps a sound that warns the user of a boss fight might be a good exception
    to this rule. You can make the case that some sounds should be played regardless
    of which background music the user has selected.    Your Game Is Not the Only
    Application    In addition to honoring the background music, the game should  consider
    the different ways that the game can be interrupted and still behave correctly.
    Consider the ways that a game may be interrupted:    1.  The user exits the game
    with the Home button. 2.  The user double-clicks the Home button to reveal the
    background applications. 3.  The user does a four-finger swipe (iPad only) to
    switch to another application. 4.  The user receives a popup warning, such as
    low power. 5.  The user receives a phone call.    All of these events can be summarized
    as the game’s resigning its active status. Conversely, when the user returns to
    the game, it is said to become active. These ideas, of course, are captured in
    the tasks `applicationWillResignActive`: and `applicationDidBecomeActive`: of
    the class `UIApplicationDelegate`. In the following section, we will review how
    we use these tasks to ensure correct application behavior.    Implementing Sound
    in Your Game    We have discussed some of the finer points of audio in an iOS
    game. We have looked at the expected behavior concerning the hardware controls,
    headphones, and different ways a game interacts with other applications. In this
    section, we will explore how these concerns are addressed in code.'
  trans: "\n为了允许用户恢复购买，我们提供了恢复购买按钮，该按钮会调用列表 10-9 中的代码。\n\n列表 10-9 `ExtrasController.m`\
    \ (`restorePurchasesClicked:`)\n```\n- (IBAction)restorePurchasesClicked:(id)sender\
    \ {\n    [[SKPaymentQueue defaultQueue] restoreCompletedTransactions];\n}\n```\n\
    \n在列表 10-9 中，我们看到当用户点击恢复购买按钮时调用的任务`restorePurchasesClicked`。在此任务中，我们简单地调用默认`SKPaymentQueue`上的`restoreCompletedTransactions`。这会使\
    \ StoreKit 联系 iTunes Store，并为当前应用和用户重新下载所有产品 ID。完成后，它会调用`paymentQueue:updatedTransaction:`，如列表\
    \ 10-8 所示。这就是允许用户重新访问其购买所需的一切。\n\n## 总结\n\n在本章中，我们回顾了什么是应用内购买以及五种不同的类型。我们还研究了如何在\
    \ Belt Commander 游戏中实现应用内产品的购买。我们回顾了如何从 iTunes Store 获取有效的产品 ID 列表，以及如何基于该列表创建\
    \ UI。我们还探讨了如何触发购买流程，以及如何响应成功完成，同时牢记如何为用户存储购买记录。\n\n# 第 11 章 为你的游戏添加声音\n\n没有声音的游戏是不完整的。这包括背景音乐和音效。在任何操作系统中播放音效都是一件相当简单的事情，但确保你的应用或游戏与\
    \ iOS 系统的其他部分良好协同可能有点棘手。考虑到游戏应允许用户播放自己的音乐、响应中断和通知以及遵循静音开关，你会发现这不仅仅是播放音轨那么简单。\n\
    \n在本章中，我们将探讨如何确保你的游戏在 iOS 上是一个“好公民”，以及播放声音的基础知识。我们不会涉及高级声音概念或 OpenAL，因为这些是复杂的话题，我们没有足够的篇幅在此充分讨论。项目\
    \ Sample 11 包含本章的代码。\n\n## 如何播放声音\n\n在我们深入讨论完整应用的一些细节之前，让我们快速了解一下用于播放音频的基本类`AVAudioPlayer`。列表\
    \ 11-1 展示了播放声音的最简单代码。\n\n**列表 11-1**. `AVAudioPlayer`示例\n```\nNSURL *url = [NSURL\
    \ fileURLWithPath:[[NSBundle mainBundle] pathForResource:@\"viper_explosion\"\
    \ ofType:@\"m4a\"]];\nAVAudioPlayer* player = [[AVAudioPlayer alloc] initWithContentsOfURL:url\
    \ error: nil];\n[player play];\n```\n\n在列表 11-1 中，我们看到`AVAudioPlayer`实例`player`是通过`NSURL`初始化的。该`NSURL`是从应用的主`NSBundle`中，为文件`viper_explosion.m4a`构建的。文件`viper_explosion.m4a`只是一个添加到\
    \ Xcode 项目中的文件。为了实际播放声音，我们在`player`上调用`play`。这将以默认音量和声像播放音频一次。有很多方法可以改进这段基本代码，使其更适合游戏。但在深入这些细节之前，让我们先了解\
    \ iOS 应用中的声音如何在 iPhone 或 iPad 上成为一个“好公民”。\n\n## 正确的音频行为\n\nApple 的人机界面指南解释了他们对应用在音频方面的行为期望。这一点值得一读，可以在此处找到：`http://goo.gl/L0vYH.`\n\
    \n在不逐条讨论 Apple 指南的前提下，让我们看一下其中与游戏相关的一些重点。\n\n在开始之前，我必须说，这些要点似乎更适用于 iPhone 而非 iPad，因为\
    \ iPhone 的使用场景更为敏感。人们总是随身携带手机，并且经常处于需要特定行为的社交场合。如果你在婚礼或其他活动中，即使将静音开关设置为静音，你肯定也不希望手机开始发出蜂鸣声。这引出了我们的第一点。\n\
    \n### 用户希望将设备切换至静音时就能静音\n\niPhone 或 iPad 上用来关闭铃声的开关称为静音开关。尽管可以编写一个即使此开关设置为静音也能播放声音的\
    \ iOS 应用，但我想不出任何合理的理由这样做。可能会有例外，但你需要一个*非常*充分的理由。对于大多数普通的消磨时间游戏（我的最爱），我希望能够关闭声音。事实上，我几乎都是静音玩所有游戏的。\n\
    \n然而，这个规则有一个例外。如果用户戴了耳机，那么游戏无论静音开关设置如何，都应播放音频。此外，如果用户戴了耳机，他们希望游戏的音频从耳机输出。这听起来显而易见，但有很多游戏和应用在这方面做得不对。\n\
    \n关于这个话题的最后一点涉及设备的音量控制。游戏应尊重手机的音量级别。因此，当用户调整设备侧面的按钮来降低游戏音量时，音量应该相应降低。再次强调，这听起来显而易见，但关注这些细节将确保你的游戏与系统的其他部分良好协作，并满足用户的期望。\n\
    \n### 你的游戏可能不是唯一发出声音的应用\n\n许多用户喜欢在通过 iOS 设备播放音乐或其他音频的同时玩游戏。重要的是，你的游戏在运行时允许这些其他音频继续播放。Apple\
    \ 建议，对于声音不是体验关键部分的游戏（或其他应用），如果其他音频正在播放，则应保持静音。就个人而言，我稍微偏离这一理念。如果你的游戏有背景音乐，那么我同意音轨应让位于用户的音乐或播客。然而，游戏中的其他类型声音可能有必要在用户音频之上播放。例如，警告用户有\
    \ Boss 战的声音可能就是这个规则的一个很好的例外。你可以论证某些声音无论用户选择了哪种背景音乐都应该播放。\n\n### 你的游戏不是唯一运行的应用\n\
    \n除了尊重背景音乐之外，游戏还应考虑可能被中断的不同方式，并仍能正确运行。考虑游戏可能被中断的几种方式：\n\n1. 用户通过 Home 键退出游戏。\n\
    2. 用户双击 Home 键显示后台应用。\n3. 用户进行四指滑动（仅限 iPad）切换到另一个应用。\n4. 用户收到弹出警告，例如电量过低。\n5.\
    \ 用户接到电话。\n\n所有这些事件都可以概括为游戏“失去活跃状态”。相反，当用户返回游戏时，它被称为“变为活跃状态”。当然，这些概念体现在`UIApplicationDelegate`类的`applicationWillResignActive:`和`applicationDidBecomeActive:`任务中。在下一节中，我们将回顾如何使用这些任务来确保正确的应用行为。\n\
    \n## 在你的游戏中实现声音\n\n我们已经讨论了 iOS 游戏中音频的一些细节。我们研究了关于硬件控制、耳机以及游戏与其他应用交互的不同方式的预期行为。在本节中，我们将探讨如何在代码中处理这些问题。\n"
- fmt: "We will also look at how the class `GameController` can be extended to provide\
    \ a simple audio framework for your game.\n\n## Setting Up Audio\n\nThe first\
    \ thing that any game should do regarding audio is to define how audio should\
    \ be played by the application. iOS offers many different ways that applications\
    \ can play sound to support different categories of applications. For example,\
    \ the built-in Music application plays audio while other applications are active.\
    \ Further, a sound-editing application or Garage Band has different requirements.\
    \ A game application has yet a different set of requirements. [Listing 11-2](#9781430244226_Ch11.xhtml#list2)\
    \ shows how a game should initialize its audio session.\n\n**[Listing 11-2](#9781430244226_Ch11.xhtml#_list2).**\
    \ `initializeAudio:` (`GameController.m`)\n\n```\n-(void)initializeAudio{\n  \
    \  AVAudioSession* session = [AVAudioSession sharedInstance];\n    [session setCategory:\
    \ AVAudioSessionCategoryAmbient error: nil];\n    [session setDelegate:self];\n\
    \    \n    UInt32 otherAudioIsPlayingVal;\n    UInt32 propertySize = sizeof (otherAudioIsPlayingVal);\n\
    \    \n    AudioSessionGetProperty (kAudioSessionProperty_OtherAudioIsPlaying,\n\
    \                             &propertySize,\n                             &otherAudioIsPlayingVal\n\
    \                             );\n    otherAudioIsPlaying = (BOOL)otherAudioIsPlayingVal;\n\
    \    if (otherAudioIsPlaying){\n        [backgroundPlayer pause];\n    } else\
    \ {\n        [backgroundPlayer play];\n    }\n}\n```\n\nIn [Listing 11-2](#9781430244226_Ch11.xhtml#list2),\
    \ the first thing we do is get a reference to an `AVAudioSession` by calling `sharedInstance`.\
    \ We assign a category to this application by calling `setCategory` and specifying\
    \ `AVAudioSessionCategoryAmbient`. This indicates that the game is willing to\
    \ allow audio from other applications to play (such as the user’s music) and that\
    \ the audio from this application should be mixed with the audio from the other\
    \ application.\n\nOnce we indicate the category of this application, we test to\
    \ see if the audio is playing. We do this by calling the C function `AudioSessionGetProperty`\
    \ and populating the `UInt32 otherAudioIsPlayingVal` with either a 0 or 1. We\
    \ cast this `UInt32` to a more Objective-C friendly `BOOL` and store the value\
    \ in `otherAudioIsPlaying`.\n\nLastly, we either play or pause our background\
    \ music depending on whether the other audio is playing. We do this by calling\
    \ the appropriate task on `backgroundPlayer`, which is an `AVAudioPlayer` defined\
    \ elsewhere. (We will get back to `backgroundPlayer` later in this chapter.)\n\
    \n`initializeAudio` is called in the `doSetup` task of `GameController`, so we\
    \ know it will be called before our game gets under way. However, it is possible\
    \ for users to start or stop their audio after the game has been initialized.\
    \ The following section shows how we make sure our application is always in the\
    \ correct state regarding the user’s choice of audio.\n\n## Responding to Other\
    \ Audio Changes\n\nSay the user starts the game without his own audio, plays for\
    \ a while, and then decides to listen to his own audio. He might do this by hitting\
    \ the Home button twice, swiping over to the audio controls, hitting Play, and\
    \ then hitting Home twice again to return to the game. Therefore, we want to make\
    \ sure we adjust the audio behavior of our application appropriately. [Figure\
    \ 11-1](#9781430244226_Ch11.xhtml#Fig1) shows an iPhone in the processing of doing\
    \ just this.\n\n![9781430244226_Fig11-01.jpg](images/9781430244226_Fig11-01.jpg)\n\
    \n**[Figure 11-1.](#9781430244226_Ch11.xhtml#_Fig1)** User Playing Other Audio\
    \ from the Background Menu\n\nIn [Figure 11-1](#9781430244226_Ch11.xhtml#Fig1),\
    \ the user has double-clicked the Home button and is about to press Play and listen\
    \ to the Beastie Boys. What you can’t see in this picture is that the audio of\
    \ the game stopped as soon as the Background menu opened. The game also paused.\n\
    \nAdditionally, after the user hits Play and returns to the game, the game will\
    \ resume, but no more sound will be produced by the game. The ON/OFF switch controls\
    \ whether or not nonbackground sound effects will be played over the Beastie Boys,\
    \ but more on that later.\n\nTo understand how the application responds to the\
    \ Background menu’s opening and closing, look at the code in [Listing 11-3](#9781430244226_Ch11.xhtml#list3).\n\
    \n**[Listing 11-3](#9781430244226_Ch11.xhtml#_list3).** `UIApplicationDelegate`\
    \ Tasks from `AppDelegate.m`\n\n```\n- (void)applicationWillResignActive:(UIApplication\
    \ *)application {\n    [self.viewController applicationWillResignActive];\n}\n\
    - (void)applicationDidBecomeActive:(UIApplication *)application {\n    [self.viewController\
    \ applicationDidBecomeActive];\n}\n```\n\nIn [Listing 11-3](#9781430244226_Ch11.xhtml#list3),\
    \ we see the tasks `applicationWillResignActive` and `applicationDidBecomeActive`\
    \ of the class `AppDelegate`. These are called whenever the application resigns\
    \ being active or just becomes active. We simply call a corresponding method on\
    \ our `GameController` — in this case, referenced by `this.viewController`. [Listing\
    \ 11-4](#9781430244226_Ch11.xhtml#list4) shows how our `GameController` responds\
    \ to these events.\n\n**[Listing 11-4](#9781430244226_Ch11.xhtml#_list4).** `applicationWillResignActive`\
    \ and `applicationDidBecomeActive` (`GameController.m`)\n\n```\n-(void)applicationWillResignActive{\n\
    \    [self setIsPaused:YES];\n    [backgroundPlayer pause];\n}\n-(void)applicationDidBecomeActive{\n\
    \    [self setIsPaused:NO];\n    [self initializeAudio];\n}\n```\n\nIn [Listing\
    \ 11-4](#9781430244226_Ch11.xhtml#list4), the task `applicationWillResignActive`\
    \ simply pauses the game by calling `setIsPaused` on `self` and `pause` on the\
    \ `AVAudioPlayer backgroundPlayer`. When the application becomes active again,\
    \ we resume the game and then call `initializeAudio` from [Listing 11-2](#9781430244226_Ch11.xhtml#list2).\
    \ By calling `initializeAudio` again, we have the chance to recheck if other audio\
    \ is playing or not, ensuring our game respects the user’s wishes regarding sound.\n\
    \nBy following the simple recipe above, we can ensure that any game will behave\
    \ in a correct way regarding audio. Run the example app on your iPhone and play\
    \ with some of the different user scenarios outlined above. Plug in your headphones,\
    \ hit the Home button twice, adjust the volume, and start up a podcast. It all\
    \ should be working as expected and in accordance with Apple’s guidelines.\n\n\
    In the following section, we will look at the example application in more detail\
    \ and see how all of this audio stuff is used by a game to make bleeps and bloops.\n\
    \n## Audio in a Game\n\nThe sample application that accompanies this chapter is\
    \ a simple demonstration showing how sound can be incorporated in a game. [Figure\
    \ 11-2](#9781430244226_Ch11.xhtml#Fig2) shows the example in action.\n\n![9781430244226_Fig11-02.jpg](images/9781430244226_Fig11-02.jpg)\n\
    \n**[Figure 11-2.](#9781430244226_Ch11.xhtml#_Fig2)** Sample 11 in Action\n\n\
    In [Figure 11-2](#9781430244226_Ch11.xhtml#Fig2), we see four elements on our\
    \ familiar space background. We see two power-ups on the screen. These are being\
    \ generated off the right side of the screen and move to the left. We also see\
    \ a spaceship on the left that will be hit by power-ups that happen to be created\
    \ midway up the screen. When a power-up collides with the spaceship, a sound is\
    \ produced indicating the user got the power-up. The power-ups also start blinking\
    \ when they get about halfway across the screen. Each time they blink off, a quick\
    \ little click sound is made. When you run this example, you will also hear a\
    \ background sound track that plays continuously while the game is running. The\
    \ switch on the upper left controls whether such sound effects, like the blinking\
    \ sound, should be heard regardless of other audio being played."
  raw: 'We will also look at how the class `GameController` can be extended to provide
    a simple audio framework for your game.    Setting Up Audio    The first thing
    that any game should do regarding audio is to define how audio should be played
    by the application. iOS offers many different ways that applications can play
    sound to support different categories of applications. For example, the built-in
    Music application plays audio while other applications are active. Further, a
    sound-editing application or Garage Band has different requirements. A game application
    has yet a different set of requirements. [Listing 11-2](#9781430244226_Ch11.xhtml#list2)
    shows how a game should initialize its audio session.    [**Listing 11-2**](#9781430244226_Ch11.xhtml#_list2). i`nitializeAudio:`
    (`GameController.m`)    ``` -(void)initializeAudio{     AVAudioSession* session
    = [AVAudioSession sharedInstance];     [session setCategory: AVAudioSessionCategoryAmbient
    error: nil];     [session setDelegate:self];           UInt32 otherAudioIsPlayingVal;
        UInt32 propertySize = sizeof (otherAudioIsPlayingVal);           AudioSessionGetProperty
    (kAudioSessionProperty_OtherAudioIsPlaying,                              &propertySize,
                                 &otherAudioIsPlayingVal                             
    );     otherAudioIsPlaying = (BOOL)otherAudioIsPlayingVal;     if (otherAudioIsPlaying){
            [backgroundPlayer pause];     } else {         [backgroundPlayer play];
        } } ```    In [Listing 11-2](#9781430244226_Ch11.xhtml#list2), the first thing
    we do is get a reference to an `AVAudioSession` by calling `sharedInstance`. We
    assign a category to this application by calling `setCategory` and specifying
    `AVAudioSessionCategoryAmbient`. This indicates that the game is willing to allow
    audio from other applications to play (such as the user’s music) and that the
    audio from this application should be mixed with the audio from the other application.    Once
    we indicate the category of this application, we test to see if the audio is playing.
    We do this by calling the C function `AudioSessionGetProperty` and populating
    the `UInt32 otherAudioIsPlayingVal` with either a 0 or 1\. We cast this `UInt32`
    to a more Objective-C friendly `BOOL` and store the value in `otherAudioIsPlaying`.    Lastly,
    we either play or pause our background music depending on whether the other audio
    is playing. We do this by calling the appropriate task on `backgroundPlayer`,
    which is an `AVAudioPlayer` defined elsewhere. (We will get back to `backgroundPlayer`
    later in this chapter.)    `initializeAudio` is called in the `doSetup` task of
    `GameController`, so we know it will be called before our game gets under way.
    However, it is possible for users to start or stop their audio after the game
    has been initialized.  The following section shows how we make sure our application
    is always in the correct state regarding the user’s choice of audio.    Responding
    to Other Audio Changes    Say the user starts the game without his own audio,
    plays for a while, and then decides to listen to his own audio. He might do this
    by hitting the Home button twice, swiping over to the audio controls, hitting
    Play, and then hitting Home twice again to return to the game. Therefore, we want
    to make sure we adjust the audio behavior of our application appropriately. [Figure
    11-1](#9781430244226_Ch11.xhtml#Fig1) shows an iPhone in the processing of doing
    just this.    ![9781430244226_Fig11-01.jpg](images/9781430244226_Fig11-01.jpg)    [Figure
    11-1.](#9781430244226_Ch11.xhtml#_Fig1)  User Playing Other Audio from the Background
    Menu    In [Figure 11-1](#9781430244226_Ch11.xhtml#Fig1), the user has double-clicked
    the Home button and is about to press Play and listen to the Beastie Boys. What
    you can’t see in this picture is that the audio of the game stopped as soon as
    the Background menu opened. The game also paused.


    Additionally, after the user hits Play and returns to the game, the game will
    resume, but no more sound will be produced by the game. The ON/OFF switch controls
    whether or not nonbackground sound effects will be played over the Beastie Boys,
    but more on that later.    To understand how the application responds to the Background
    menu’s opening and closing, look at the code in [Listing 11-3](#9781430244226_Ch11.xhtml#list3).    [**Listing
    11-3**](#9781430244226_Ch11.xhtml#_list3). `UIApplicationDelegate` Tasks from
    `AppDelegate.m`    ``` - (void)applicationWillResignActive:(UIApplication *)application
    {     [self.viewController applicationWillResignActive]; } - (void)applicationDidBecomeActive:(UIApplication
    *)application {     [self.viewController applicationDidBecomeActive]; } ```    In
    [Listing 11-3](#9781430244226_Ch11.xhtml#list3), we see the tasks `applicationWillResignActive`
    and `applicationDidBecomeActive` of the class `AppDelegate`. These are called
    whenever the application resigns being active or just becomes active. We simply
    call a corresponding method on our `GameController`—in this case, referenced by
    `this.viewController`. [Listing 11-4](#9781430244226_Ch11.xhtml#list4) shows how
    our GameController responds to these events.    [**Listing 11-4**](#9781430244226_Ch11.xhtml#_list4). `applicationWillResignActive`
    and `applicationDidBecomeActive` (`GameController.m`)    ``` -(void)applicationWillResignActive{
        [self setIsPaused:YES];     [backgroundPlayer pause]; } -(void)applicationDidBecomeActive{
        [self setIsPaused:NO];     [self initializeAudio]; } ```    In [Listing 11-4](#9781430244226_Ch11.xhtml#list4),
    the task `applicationWillResignActive` simply pauses the game by calling `setIsPaused`
    on `self` and `pause` on the `AVAudioPlayer backgroundPlayer`. When the application
    becomes active again, we resume the game and then call `initializeAudio` from
    [Listing 11-2](#9781430244226_Ch11.xhtml#list2). By calling `initializeAudio`
    again, we have the chance to recheck if other audio is playing or not, ensuring
    our game respects the user’s wishes regarding sound.    By following the simple
