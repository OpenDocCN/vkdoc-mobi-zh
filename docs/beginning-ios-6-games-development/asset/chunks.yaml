    \            self.needsImageUpdated = YES;\n        } else {\n            self.rotation\
    \ -= .1;\n            self.clockwise = NO;\n            self.needsImageUpdated\
    \ = YES;\n        }\n    } else {//STATE_TRAVELING\n        float dx = (moveToPoint.x\
    \ - c.x);\n        float dy = (moveToPoint.y - c.y);\n        float theta = atan(dy/dx);\n\
    \        float dxf = cos(theta) * self.speed;\n        float dyf = sin(theta)\
    \ * self.speed;\n        if (dx < 0){\n            dxf *= -1;\n            dyf\
    \ *= -1;\n        }\n        c.x += dxf;\n        c.y += dyf;\n        if (abs(moveToPoint.x\
    \ - c.x) < self.speed && abs(moveToPoint.y - c.y) < self.speed){\n           \
    \ c.x = moveToPoint.x;\n            c.y = moveToPoint.y;\n            self.state\
