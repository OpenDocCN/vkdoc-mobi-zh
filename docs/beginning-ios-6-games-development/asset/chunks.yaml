  trans: "\n它可以是 `ImageRepresentation` 的 `baseImageName` 属性，也可以来自委托。\n\n下一步是获取角色变体的字符串表示。我们测试委托是否响应\
    \ `getNameForVariant` 任务。如果是，则将结果赋值给 `variant`。我们遵循相同的模式来获取 `state` 的字符串表示。\n\n\
    我们需要委托做的最后一件事是，确定该角色对于特定状态和变体是由单个图像表示，还是由一系列图像表示。如果委托响应 `getFrameCountForVariation:AndState:`，我们将该值记录在\
    \ `frameCount` 中。如果委托不响应 `getFrameCountForVariation:AndState:`，或者 `getFrameCountForVariation:AndState:`\
    \ 返回零，则表示我们不应在最终图像名称中包含帧编号。\n\n调用 `getFrameCountForVariation:AndState:` 后，我们就拥有了确定最终图像名称所需的全部信息。如果\
    \ `variant` 的字符串表示不为 nil，我们将 `\"_\"` 和 `variation` 附加到 `NSString imageName`。类似地，如果\
    \ `state` 不为 nil，我们将 `\"_\"` 和 `state` 附加到 `imageName`。最后，如果 `frameCount` 不为零，我们将\
    \ `currentFrame` 数字附加到图像名称。我们不必将文件扩展名附加到图像名称，因为 `UIImage` 会根据名称自动找到正确的图像。此任务会查找以下模式的图像文件：\n\
    \n*   baseImageName.png\n*   baseImageName_variant.png\n*   baseImageName_state.png\n\
    *   baseImageName_variant_state.png\n*   baseImageName_00FN.png\n*   baseImageName_state_00FN.png\n\
    *   baseImageName_variant_00FN.png\n*   baseImageName_variant_state_00FN.png\n\
    \n现在你知道了如何使用 `ImageRepresentation` 和 `ImageRepresentationDelegate` 来指定在给定时间点应为特定角色使用哪个图像。回顾清单\
    \ 6-8，你可以看到一个角色的表示负责创建和更新与该角色关联的 `UIView`。\n\n## 为角色创建 `UIImageView`\n\n`ImageRepresentation`\
    \ 的最终目标是创建一个表示角色的 `UIView`。这是通过实例化一个 `UIImageView` 来完成的，该视图根据角色的类型、状态和变体使用正确的图像来表示角色。我们已经回顾了如何找到正确的图像。剩下的就是创建\
    \ `UIImageView`。这项工作在任务 `getViewForActor:In:` 中完成，如清单 6-17 所示。\n\n**清单 6-17. `ImageRepresentation.m\
    \ (getViewForActor:In:)`**\n\n```\n-(UIView*)getViewForActor:(Actor*)actor In:(GameController*)aController{\n\
    \    if (view == nil){\n        UIImage* image = [self getImageForActor: actor];\n\
    \        view = [[UIImageView alloc] initWithImage: image];\n    }\n    return\
    \ view;\n}\n```\n\n`ImageRepresentation` 简单地检查 `view` 是否已被创建，如果未创建则创建它。为了创建 `UIImageView`，我们调用\
    \ `getImageForActor:`，然后使用返回的 `UIImage` 创建 `UIImageView`。任务 `getImageForActor:`\
    \ 如清单 6-18 所示。\n\n**清单 6-18. `ImageRepresentation.m (getImageForActor:)`**\n\n\
    ```\n-(UIImage*)getImageForActor:(Actor*)actor{\n    NSString* imageName = [self\
    \ getImageNameForActor:actor];\n\n    UIImage* result = [UIImage imageNamed: imageName];\n\
    \    if (result == nil){\n        NSLog(@\"Image Not Found: %@\", imageName);\n\
    \    }\n        return result;\n}\n```\n\n任务 `getImageForActor:` 简单地调用 `getImageNameForActor`\
    \ 并根据该名称创建一个 `UIImage`。如果不存在具有给定名称的图像，则结果将为 nil。在调试应用时，在该 `NSLog` 语句上设置断点将为你省去很多麻烦，因为一旦角色尝试使用不存在的图像进行绘制，你会立即收到通知。\n\
    \n## 更新我们的视图\n\n现在我们已经了解了 `ImageRepresentation` 如何创建用于绘制角色的 `UIView`，让我们来看看 `ImageRepresentation`\
    \ 如何更新该 `UIView` 以创建循环动画并响应状态或变体的变化。清单 6-19 显示了 `ImageRepresentation` 的任务 `updateView:ForActor:In:`。\n\
    \n**清单 6-19. `ImageRepresentation.m (updateView:ForActor:In:)`**\n\n```\n-(void)updateView:(UIView*)aView\
    \ ForActor:(Actor*)anActor In:(GameController*)aController{\n\n    if ([delegate\
    \ respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n       \
    \ [self advanceFrame: anActor ForStep:[aController stepNumber]];\n    }\n\n  \
    \  if ([anActor needsViewUpdated]){\n\n        UIImageView* imageView = (UIImageView*)aView;\n\
    \        UIImage* image = [self getImageForActor: anActor];\n\n        [imageView\
    \ setImage:image];\n        [anActor setNeedsViewUpdated:NO];\n    }\n}\n```\n\
    \n任务 `updateView:ForActor:In:` 负责确保使用正确的图像来表示角色 `anActor`。第一步是通过检查委托是否响应 `getFrameCountForVariation:AndState:`\
    \ 来确定 `ImageRepresentation` 是否管理一系列图像。如果正在使用一系列图像，我们调用 `advanceFrame:ForStep:`\
    \ 来推进角色的当前帧，如清单 6-20 所示。\n\n**清单 6-20. `ImageRepresentation.m (advanceFrame:ForTick:)`**\n\
    \n```\n-(void)advanceFrame:(Actor*)actor ForStep:(int)step{\n    if (step % self.stepsPerFrame\
    \ == 0){\n        if (self.backwards){\n            self.currentFrame -= 1;\n\
    \        } else {\n            self.currentFrame += 1;\n        }\n\n        int\
    \ frameCount = [delegate getFrameCountForVariant:[actor variant] AndState:[actor\
    \ state]];\n        if (self.currentFrame>frameCount){\n            self.currentFrame\
    \ = 1;\n        }\n        if (self.currentFrame<1){\n            self.currentFrame\
    \ = frameCount;\n        }\n\n        [actor setNeedsViewUpdated:YES];\n    }\n\
    }\n```\n\n只有当 `step` 对 `stepsPerFrame` 取模为零时，我们才会改变当前帧。如果 `backwards` 为真，我们从 `currentFrame`\
    \ 减去 1；反之，则加 1。如果我们更改了 `currentFrame` 的值，必须确保该值不小于 1 且不大于帧数。请注意，这里的 `currentFrame`\
    \ 是基于 1 的，而不是基于 0 的。这样做是为了使 `currentFrame` 的值与我们的图像文件命名约定完全匹配，该约定基于 3D 建模应用 Blender\
    \ 的命名方式。这使调试时生活更轻松，因为你无需记住加或减。我们在 `advanceFrame:ForStep:` 中做的最后一件事是标记此角色需要更新其视图。\n\
    \n回顾清单 6-19，在调用 `advanceFrame:ForStep:` 之后，我们检查 `needsViewUpdated` 是否为真。如果我们在\
    \ `advanceFrame:ForStep:` 中调整了 `currentFrame` 值，那么 `needsViewUpdated` 将为真。`needsViewUpdated`\
    \ 也可能出于其他原因为真（例如角色的状态或变体发生了变化）。无论 `needsViewUpdates` 是如何被设置为 YES 的，我们只需通过调用 `getImageForActor:`\
    \ 并更新 `imageView` 来为角色找到正确的图像。最后，我们将 `needsViewUpdated` 设置为 NO，因为我们知道此时我们已经得到了完全正确的图像，并且在下一步中无需寻找不同的图像，除非某些操作将\
    \ `needsViewUpdated` 重新设置为 YES。\n\n我们已经回顾了 `ImageRepresentation` 类，以及它如何用于将角色的各种状态与旨在表示它的图像协调起来。设计此类的目标是使其易于创建使用它新的\
    \ `Actor` 类。"
- fmt: "# Understanding Behaviors by Example\n\nIn this example, we have power-ups\
    \ tumbling across the screen. Eventually they start blinking, just before they\
    \ vanish. These two distinct behaviors could simply be implemented by providing\
    \ the task step: in the class `Powerup`. In the previous chapter, this is how\
    \ we implemented the different behaviors of the different actors. In this chapter,\
    \ we are introducing a general mechanism for defining behaviors that can be shared\
    \ across different types of actors or changed based on a single actor’s state.\n\
    \nIn [Listing 6-13](#9781430244226_Ch06.xhtml#list13) earlier, we omitted the\
    \ section of the class `Powerup`'s constructor that dealt with behaviors. [Listing\
    \ 6-21](#9781430244226_Ch06.xhtml#list21) shows this omitted code.\n\n**[Listing\
    \ 6-21.](#9781430244226_Ch06.xhtml#_list21) `Powerup.m (powerup: (partial))`**\n\
    \n```objc\n//Powerup* powerup = ...\nfloat direction = arc4random()%100/100.0\
    \ * M_PI*2;\nLinearMotion* motion = [LinearMotion linearMotionInDirection:direction\
    \ AndSpeed:1];\n[motion setWrap:YES];\n[powerup addBehavior: motion];\n\nExpireAfterTime*\
    \ expire = [ExpireAfterTime expireAfter:60*30];\n[expire setDelegate: powerup];\n\
    [powerup addBehavior: expire];\n\nreturn powerup;\n```\n\nWe have just created\
    \ a new `Powerup` object called `powerup` and set a few basic properties. The\
    \ next step is to create `Behavior` objects and add them to the newly created\
    \ `Powerup` before returning the objects. The first behavior we create is a `LinearMotion`\
    \ object called `motion`, which we add to the `powerup` with the task `addBehavior`:\
    \ . The second behavior is an `ExpireAfterTime` object called `expire`. Before\
    \ adding `expire` to `powerup`, we register `powerup` as a delegate to `expire`.\
    \ This gives us an easy way to make the power-up blink when it gets close to its\
    \ expiration.\n\n## Behavior: Linear Motion\n\nBoth of these behaviors will be\
    \ reused with other `Actor` classes, so they are worth looking at in some detail.\
    \ Let’s start with the class `LinearMotion`, whose header is shown in [Listing\
    \ 6-22](#9781430244226_Ch06.xhtml#list22).\n\n**[Listing 6-22.](#9781430244226_Ch06.xhtml#_list22)\
    \ `LinearMotion.h`**\n\n```objc\n#import <Foundation/Foundation.h>\n#import \"\
    Actor.h\"\n\n@interface LinearMotion : NSObject <Behavior>{\n    float deltaX;\n\
    \    float deltaY;\n}\n\n@property (nonatomic) float speed;\n@property (nonatomic)\
    \ float direction;\n@property (nonatomic) BOOL wrap;\n\n+(id)linearMotionInDirection:(float)aDirection\
    \ AtSpeed:(float)aSpeed;\n+(id)linearMotionRandomDirectionAndSpeed;\n\n@end\n\
    ```\n\nThe class `LinearMotion` extends `NSObject` and conforms to the protocol\
    \ `Behavior`, which was imported from `Actor.h`. The class `LinearMotion` has\
    \ three properties: `speed`, `direction`, and `wrap`. The properties `speed` and\
    \ `direction` are, we hope, obvious. The `wrap` property indicates whether the\
    \ actor should reenter the game area on the opposite side after leaving the game\
    \ area. The two tasks are constructors for creating `LinearMotion` objects. We\
    \ could probably think of a few more handy constructors for this class, but these\
    \ two are all we need for this chapter.\n\nLet’s start exploring the implementation\
    \ of the class `LinearMotion` by looking at these two constructors, shown in [Listing\
    \ 6-23](#9781430244226_Ch06.xhtml#list23).\n\n**[Listing 6-23.](#9781430244226_Ch06.xhtml#_list23)\
    \ `LinearMotion.m (constructors)`**\n\n```objc\n+(id)linearMotionInDirection:(float)aDirection\
    \ AtSpeed:(float)aSpeed{\n    LinearMotion* motion = [LinearMotion new];\n   \
    \ [motion setDirection:aDirection];\n    [motion setSpeed:aSpeed];\n\n    return\
    \ motion;\n}\n\n+(id)linearMotionRandomDirectionAndSpeed{\n    float direction\
    \ = (arc4random()%100/100.0)*M_PI*2;\n    float speed = (arc4random()%100/100.0)*3;\n\
    \n    return [LinearMotion linearMotionInDirection:direction AtSpeed:speed];\n\
    }\n```\n\nThe constructor `linearMotionInDirection:AtSpeed`: simply creates a\
    \ new `LinearMotion` object and sets the two properties. The constructor `linearMotionRandomDirectionAndSpeed`\
    \ creates random values for `direction` and `speed`, and then simply calls the\
    \ constructor `linearMotionInDirection:AtSpeed`:.\n\n[Listing 6-24](#9781430244226_Ch06.xhtml#list24)\
    \ shows the rest of the implementation of the class `LinearMotion`.\n\n**[Listing\
    \ 6-24.](#9781430244226_Ch06.xhtml#_list24) `LinearMotion.m`**\n\n```objc\n-(void)setSpeed:(float)aSpeed{\n\
    \    speed = aSpeed;\n    deltaX = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n\
    }\n\n-(void)setDirection:(float)aDirection{\n    direction = aDirection;\n   \
    \ deltaX = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n}\n\n\
    -(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n    CGPoint\
    \ center = anActor.center;\n    center.x += deltaX;\n    center.y += deltaY;\n\
    \n    if (wrap){\n        CGSize gameSize = [gameController gameAreaSize];\n \
    \       float radius = [anActor radius];\n\n        if (center.x < -radius &&\
    \ deltaX < 0){\n            center.x = gameSize.width + radius;\n        } else\
    \ if (center.x > gameSize.width + radius && deltaX > 0){\n            center.x\
    \ = -radius;\n        }\n\n        if (center.y < -radius && deltaY < 0){\n  \
    \          center.y = gameSize.height + radius;\n        } else if (center.y >\
    \ gameSize.height + radius && deltaY > 0){\n            center.y = -radius;\n\
    \        }\n    }\n    [anActor setCenter:center];\n}\n```\n\nWe calculate the\
    \ values `deltaX` and `deltaY` each time the `speed` or `direction` values are\
    \ set. The task `applyToActor:In`: is defined by the protocol `Behavior` and is\
    \ called by a `GameController` to give a `Behavior` a chance to modify an actor.\
    \ In the implementation of `applyToActor:In`: for the class `LinearMotion`, we\
    \ start by getting the current center of the actor and increase the X and Y components\
    \ by `deltaX` and `deltaY`.\n\nIf `wrap` is true, we have to see whether the actor\
    \ is outside the game area. This is a little more complex than simply checking\
    \ whether `center` is inside `gameArea` or not, because we have to take into account\
    \ the radius of the actor as well. We want an actor to appear as though it is\
    \ traveling `offscreen` instead of simply vanishing when it touches the edge of\
    \ the screen. Also, we want to move an actor only if it is moving away from the\
    \ game area. Keeping these two things in mind, we test whether the X value of\
    \ `center` is less than `radius` and has a negative `deltaX`. This means the actor\
    \ is to the left of the game area and moving left, away from the game area. So\
    \ we had better move it to the right of the game area, so its leftward motion\
    \ brings the actor back onto the right side of the screen. We perform the opposite\
    \ operation if the X value of `center` is greater than the width of the game area\
    \ and is moving to the right, moving the actor to the left side of the screen.\
    \ These two tests are repeated for the center’s Y value.\n\nThe implementation\
    \ of `LinearMotion` is pretty simple, only slightly complicated by the notion\
    \ of wrapping. Next, we will explore the class `ExpireAfterTime`, which is used\
    \ to remove actors from the scene after a given time.\n\n## Behavior: `ExpireAfterTime`\n\
    \nThe class `ExpireAfterTime` is used by `Powerup` to remove it from the scene\
    \ after a number of steps have passed by. Before the power-up is removed, we want\
    \ to make the power-up blink by changing its state from glowing to not glowing.\
    \ To support this second feature, we will want to have some sort of communication\
    \ between the `ExpireAfterTime` object and the actor it is acting on. [Listing\
    \ 6-25](#9781430244226_Ch06.xhtml#list25) shows the header of the class `ExpireAfterTime`.\n\
    \n**[Listing 6-25.](#9781430244226_Ch06.xhtml#_list25) `ExpireAfterTime.h`**\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import \"Actor.h\"\n```"
