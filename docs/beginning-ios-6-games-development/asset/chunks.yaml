    implementation of the task `updateLocation:` from the class `Actor01`, as shown
    in [Listing 5-5](#9781430244226_Ch05.xhtml#list5).    The last task in [Listing
    5-10](#9781430244226_Ch05.xhtml#list10) is the task `doCollision:In:`, which is
    called when this `Viper02` is overlapping with an `Asteroid02`. This task resets
    the `Viper02` back to the starting location at the center of the game area and
    removes the offending `Asteroid02` from the game.'
  trans: "\n# Listing 5-7 与 `Actor02` 类\n\n`Listing 5-7` 展示了 `Actor02` 类的头文件。  \n\
    ```\n#import <Foundation/Foundation.h>\n@class Example02Controller;\n\nlong nextId;\n\
    @interface Actor02 : NSObject {\n}\n@property (nonatomic, retain) NSNumber* actorId;\n\
    @property (nonatomic) CGPoint center;\n@property (nonatomic) float speed;\n@property\
    \ (nonatomic) float radius;\n@property (nonatomic, retain) NSString* imageName;\n\
    \n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius AndImage:(NSString*)anImageName;\n\
    -(void)step:(Example02Controller*)controller;\n-(BOOL)overlapsWith: (Actor02*)\
    \ actor;\n@end\n```\n\n在 `Listing 5-7` 中，我们看到 `Actor02` 类的头文件。它有五个属性，代表了本示例所需的基本属性。`actorId`\
    \ 属性用于标识演员；我们稍后将看到如何使用它将每个 `Actor02` 映射到一个 `UIImageView`。`center` 属性告诉我们每个 `Actor02`\
    \ 的位置。`speed` 属性表示该演员移动的速度。`radius` 属性代表演员的大小。最后，`imageName` 属性描述了演员应如何在屏幕上绘制。\n\
    \n`center` 属性的类型是 `CGPoint`。严格来说，我们不会直接使用这个 `CGPoint` 来设置 `UIView` 或其他 Core Graphics\
    \ 组件的位置。但 `CGPoint` 是一种封装 X 和 Y 值的简单方式，并且我们已经对它很熟悉。在本示例中，使用 `CGPoint` 或我们自己定义的结构体来表示一个点，差别不大。不过，如果你希望代码完全不依赖\
    \ Core Graphics，你需要定义自己的类型来表示点。\n\n在 `Listing 5-7` 中还需注意，`Actor02` 没有宽度或高度，只有\
    \ `radius`。这样做是为了简化示例，也因为许多游戏只需要一个维度来描述演员的大小。如果你构建自己的游戏框架，你可能会选择让演员包含宽度和高度——这实际上取决于游戏本身。当然，如果你研究预制的游戏引擎，你会发现它们的基础类型包含了各种你可能用到也可能用不到的特性。使用游戏引擎可能很有意义，但在这里，我们以复杂性换取理解。\n\
    \n## 一个简单的演员\n\n`Listing 5-7` 显示 `Actor02` 定义了三个任务。`Listing 5-8` 展示了这些任务的实现。\n\
    \n**Listing 5-8.**  `Actor02.m`\n```\n#import \"Actor02.h\"\n\n@implementation\
    \ Actor02\n@synthesize actorId;\n@synthesize center;\n@synthesize speed;\n@synthesize\
    \ radius;\n@synthesize imageName;\n\n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius\
    \ AndImage:(NSString*)anImageName{\n    self = [super init];\n    if (self !=\
    \ nil){\n        [self setActorId:[NSNumber numberWithLong:nextId++]];\n     \
    \   [self setCenter:aPoint];\n        [self setRadius:aRadius];\n        [self\
    \ setImageName:anImageName];\n    }\n    return self;\n}\n-(void)step:(Example02Controller*)controller{\n\
    \    //implemented by subclasses.\n}\n-(BOOL)overlapsWith: (Actor02*) actor {\n\
    \    float xdist = abs(self.center.x - actor.center.x);\n    float ydist = abs(self.center.y\
    \ - actor.center.y);\n    float distance = sqrtf(xdist*xdist + ydist*ydist);\n\
    \    return distance < self.radius + actor.radius;\n}\n@end\n```\n\n在 `Listing\
    \ 5-8` 中，我们看到了 `Actor02` 类的实现。任务 `initAt:WithRadius:AndImage:` 用于用一些基本信息初始化一个\
    \ `Actor02`。该任务还通过使用 `nextId` 值并递增它来分配一个随机的 `actorId` 值。由于 `nextId` 是 `long` 类型，你必须创建极其大量的演员，才可能让两个演员拥有相同的\
    \ ID。\n\n任务 `step:` 接受一个 `Example02Controller` 实例，并用于增量更新该 `Actor02` 的位置和状态。子类将提供该任务的实现，以实现自定义行为和动画。\n\
    \n最后一个任务 `overlapsWith:` 用于检查该 `Actor02` 是否与另一个 `Actor02` 重叠。在本示例中，该任务用于检测碰撞。\n\
    \n## 演员子类：`Viper02`\n\n我们知道，本示例中有两种类型的演员：小行星和宇宙飞船。让我们看看 `Viper02` 类，以及它与 `Viper01`\
    \ 的不同之处。`Viper02` 的头文件如 `Listing 5-9` 所示。\n\n**Listing 5-9.**  `Viper02.h`\n```\n\
    @class Example02Controller;\n@interface Viper02 : Actor02 {\n}\n@property CGPoint\
    \ moveToPoint;\n\n+(id)viper:(Example02Controller*)controller;\n-(void)doCollision:(Actor02*)actor\
    \ In:(Example02Controller*)controller;\n@end\n```\n\n在 `Listing 5-9` 中，我们看到 `Viper02`\
    \ 的头文件与 `Viper01` 差别不大，后者如 `Listing 5-2` 所示。`Viper02` 扩展了 `Actor02` 类，而不是 `UIImageView`。我们有\
    \ `moveToPoint` 属性，与之前相同，但 `speed` 属性不存在，因为它继承自 `Actor02`。我们有一个新的构造函数来简化 `Viper02`\
    \ 的创建，以及一个名为 `doCollision:In:` 的新任务，用于处理与小行星碰撞的新功能。`Listing 5-10` 展示了 `Viper02`\
    \ 类的实现。\n\n**Listing 5-10.**  `Viper02.m`\n```\n#import \"Viper02.h\"\n#import\
    \ \"Example02Controller.h\"\n\n@implementation Viper02\n@synthesize moveToPoint;\n\
    \n+(id)viper:(Example02Controller*)controller{\n    CGSize gameAreaSize = [controller\
    \ gameAreaSize];\n    CGPoint center = CGPointMake(gameAreaSize.width/2, gameAreaSize.height/2);\n\
    \n    Viper02* viper = [[Viper02 alloc] initAt:center WithRadius:16 AndImage:@\"\
    viper\"];\n    [viper setMoveToPoint:center];\n    [viper setSpeed:.8];\n\n  \
    \  return [viper autorelease];\n}\n\n-(void)step:(Example02Controller*)controller{\n\
    \    CGPoint c = [self center];\n\n    float dx = (moveToPoint.x - c.x);\n   \
    \ float dy = (moveToPoint.y - c.y);\n    float theta = atan(dy/dx);\n\n    float\
    \ dxf = cos(theta) * self.speed;\n    float dyf = sin(theta) * self.speed;\n \
    \   if (dx < 0){\n        dxf *= -1;\n        dyf *= -1;\n    }\n\n    c.x +=\
    \ dxf;\n    c.y += dyf;\n\n    if (abs(moveToPoint.x - c.x) < self.speed && abs(moveToPoint.y\
    \ - c.y) < self.speed){\n        c.x =  moveToPoint.x;\n        c.y =  moveToPoint.y;\n\
    \    }\n    [self setCenter:c];\n}\n-(void)doCollision:(Actor02*)actor In:(Example02Controller*)controller{\n\
    \    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint centerOfGame\
    \ = CGPointMake(gameAreaSize.width/2, gameAreaSize.height/2);\n    self.center\
    \ = centerOfGame;\n    self.moveToPoint = centerOfGame;\n\n    [controller removeActor:actor];\n\
    }\n@end\n```\n\n在 `Listing 5-10` 中，我们看到构造函数任务 `viper:` 创建了一个新的 `Viper02` 对象，并使用超类任务\
    \ `initAt:WithRadius:AndImage:` 来设置对象的基本属性。此外，`moveToPoint` 属性被设置为当前位置，速度被设置为\
    \ `.8`。\n\n任务 `step:` 是每帧动画中被调用的任务。该任务的实现与 `Actor01` 类中任务 `updateLocation:` 的实现完全相同，如\
    \ `Listing 5-5` 所示。\n\n`Listing 5-10` 中的最后一个任务是 `doCollision:In:`，当该 `Viper02`\
    \ 与一个 `Asteroid02` 重叠时被调用。该任务将 `Viper02` 重置回游戏区域中心的起始位置，并从游戏中移除碰撞到的 `Asteroid02`。\n"
- fmt: "# Actor Subclass: `Asteroid02`\n\nAfter looking at the class `Viper02`, you\
    \ may not see exactly how this is different from the `Viper01`. Sure, some things\
    \ have moved around, but it looks very similar: it is still basically responsible\
    \ for updating a center point. After we look at the class `Asteroid02`, we will\
    \ see how these actor classes are used to describe a scene, versus being the scene\
    \ itself. The header to the class `Asteroid02` is shown in [Listing 5-11](#9781430244226_Ch05.xhtml#list11).\n\
    \n[**Listing 5-11.**](#9781430244226_Ch05.xhtml#_list11) `Asteroid02.h`\n\n```objectivec\n\
    #import <Foundation/Foundation.h>\n#import \"Actor02.h\"\n\nNSMutableArray* imageNameVariations;\n\
    \n@interface Asteroid02 : Actor02 {\n}\n+(NSMutableArray*)imageNameVariations;\n\
    +(id)asteroid:(Example02Controller*)controller;\n@end\n```\n\nIn [Listing 5-11](#9781430244226_Ch05.xhtml#list11),\
    \ the header file for the class `Asteroid02` shows that it extends `Actor02` and\
    \ has two static tasks. There is also an array called `imageNameVariations`. The\
    \ array, in combination with the task `imageNameVariations`, allows us to create\
    \ `Asteroid02` with similar, but different graphics. Let’s take a look at the\
    \ implementation of this class and see what that means, as shown in [Listing 5-12](#9781430244226_Ch05.xhtml#list12).\n\
    \n[**Listing 5-12.**](#9781430244226_Ch05.xhtml#_list12) `Asteroid02.m`\n\n```objectivec\n\
    #import \"Asteroid02.h\"\n#import \"Example02Controller.h\"\n\n@implementation\
    \ Asteroid02\n\n+(id)asteroid:(Example02Controller*)controller{\n    CGSize gameAreaSize\
    \ = [controller gameAreaSize];\n    float radius = arc4random()%8 + 8;\n    float\
    \ x = radius + arc4random()%(int)(gameAreaSize.width + radius*2);\n    CGPoint\
    \ center = CGPointMake(x, -radius);\n    NSString* imageName = [[Asteroid02 imageNameVariations]\
    \ objectAtIndex:arc4random()%3];\n\n    Asteroid02* asteroid = [[Asteroid02 alloc]\
    \ initAt:center WithRadius:radius AndImage: imageName];\n    float speed = (arc4random()%10)/10.0\
    \ + .1;\n    [asteroid setSpeed: speed];\n    return asteroid;\n}\n+(NSMutableArray*)imageNameVariations{\n\
    \    if (imageNameVariations == nil){\n        imageNameVariations = [NSMutableArray\
    \ new];\n        [imageNameVariations addObject:@\"AsteroidA\"];\n        [imageNameVariations\
    \ addObject:@\"AsteroidB\"];\n        [imageNameVariations addObject:@\"AsteroidC\"\
    ];\n    }\n    return imageNameVariations;\n}\n\n-(void)step:(Example02Controller*)controller{\n\
    \    CGPoint newCenter = self.center;\n    newCenter.y + = self.speed;\n    self.center\
    \ = newCenter;\n\n    if (newCenter.y - self.radius > controller.gameAreaSize.height){\n\
    \        [controller removeActor: self];\n    }\n}\n@end\n```\n\nIn [Listing 5-12](#9781430244226_Ch05.xhtml#list12),\
    \ the constructor task `asteroid:` creates a new `Asteroid02` object and sets\
    \ up its starting state. For variety, each asteroid is assigned a random `radius`\
    \ and a random X location. The starting Y location is set to negative `radius`,\
    \ so the asteroid starts just off the top of the game area. Each `Asteroid02`\
    \ is also assigned a random `speed`.\n\nThe task `step:` implements the motion\
    \ of the `Asteroid02`—it simply increases the Y value of the property `center`\
    \ by `speed` until it reaches the bottom of the game area, where it removes itself\
    \ from the game.\n\nAs mentioned, we want the graphic used to represent the `Asteroid02`\
    \ to have some variety as well. To implement this, we have the task `imageNameVariations`\
    \ that lazily populates the global `NSMutableArray imageNameVariations`. In the\
    \ task `asteroid:`, a random string is pulled from this array and set as the Asteroids.\
    \ [Figure 5-8](#9781430244226_Ch05.xhtml#Fig8) shows the image files used in this\
    \ example.\n\n![9781430244226_Fig05-08.jpg](images/9781430244226_Fig05-08.jpg)\n\
    \n[Figure 5-8.](#9781430244226_Ch05.xhtml#_Fig8) Images used for actors\n\nIn\
    \ [Figure 5-8](#9781430244226_Ch05.xhtml#Fig8), we see the images used for the\
    \ actors in this example. Each of these images is specified by the property `imageName`\
    \ of class `Actor02`.\n\nIn the case of the asteroids, we provide three different\
    \ images that are assigned randomly to each new `Asteroid02` object.\n\nWe have\
    \ taken a look at the actor class and seen how they store the basic information\
    \ for each item in the game. We now want to take look at how these classes are\
    \ drawn on the screen.\n\n# Drawing Actors on the Screen\n\nWe now have a basic\
    \ presentation of the actors involved in this example. The class that binds them\
    \ together to create our game is `Example02Controller`. Like other `UIViewController`\
    \ classes, `Example02Controller` is responsible for displaying data on the screen—in\
    \ our case, the different actors. The trick in `Example02Controller` will be to\
    \ create and update a number of `UIImageViews`, one for each actor. [Figure 5-9](#9781430244226_Ch05.xhtml#Fig9)\
    \ shows how the iPhone version of this class is set up in Interface Builder.\n\
    \n![9781430244226_Fig05-09.jpg](images/9781430244226_Fig05-09.jpg)\n\n[Figure\
    \ 5-9.](#9781430244226_Ch05.xhtml#_Fig9) `Example02Controller_iPhone.xib` in Interface\
    \ Builder\n\nIn [Figure 5-9](#9781430244226_Ch05.xhtml#Fig9), we see on the left\
    \ that the root view for this `UIViewController` has two sub-views. The first\
    \ is called Actor view and is the white region in the middle of the gray region\
    \ on the right. This is the view where the game will take place—all actors will\
    \ be represented as `UIImageViews` that are sub-views of Actor view. The other\
    \ component is the `UISlider` at the bottom of the gray area. This is used to\
    \ control the size of the Actor view, allowing us to demonstrate that we have\
    \ indeed abstracted the representation of the game from the game itself. The header\
    \ to the class `Example02Controller` will give us an overview of how this is achieved,\
    \ and is shown in [Listing 5-13](#9781430244226_Ch05.xhtml#list13).\n\n[**Listing\
    \ 5-13.**](#9781430244226_Ch05.xhtml#_list13) `Example02Controller.h`\n\n```objectivec\n\
    #import < UIKit/UIKit.h>\n#import < QuartzCore/CADisplayLink.h>\n#import \"Viper02.h\"\
    \n#import \"Actor02.h\"\n#import \"Asteroid02.h\"\n\n@interface Example02Controller\
    \ : UIViewController {\n    IBOutlet UIView *actorView;\n    CADisplayLink* displayLink;\n\
    \n    //Managing Actors\n    NSMutableArray* actors;\n    NSMutableDictionary*\
    \ actorViews;\n    NSMutableArray* toBeRemoved;\n\n    //Game Logic\n    Viper02*\
    \ viper;\n    long stepNumber;\n\n}\n\n@property (nonatomic) CGSize gameAreaSize;\n\
    \n-(void)updateScene;\n-(void)removeActor:(Actor02*)actor;\n-(void)addActor:(Actor02*)actor;\n\
    -(void)updateActorView:(Actor02*)actor;\n-(void)tapGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer;\n-(IBAction)sliderValueChanged:(id)sender;\n-(void)doRemove;\n\
    \n@end\n```\n\nIn [Listing 5-13](#9781430244226_Ch05.xhtml#list13), we see the\
    \ `UIView actorView` and that it is an `IBoutlet` wired up from the XIB file shown\
    \ in [Figure 5-9](#9781430244226_Ch05.xhtml#Fig9). At the bottom of the file,\
    \ we see the task `sliderValueChanged:`, which is called when the slider from\
    \ [Figure 5-9](#9781430244226_Ch05.xhtml#Fig9) is moved. We also see the familiar\
    \ `displayLink` object of type `CADisplayLink` that will be used to configure\
    \ redrawing the screen. The `NSMutableArray actors` is used to store all current\
    \ actors in the game, which are added and removed with the tasks `addActor:`.\
    \ The `NSMutableArray toBeRemoved` is used to hold actors that are marked to be\
    \ removed with the task `removeActor:`. The task `doRemove` is called at the end\
    \ each call to `updateScene` to do the actual removal of each actor. The `NSMutableDictionary\
    \ actorViews` is used to map each actor to each `UIImageView` that represents\
    \ it. The variable `viper` of type `Viper02` is a references to our spaceship,\
    \ and the last variable, `stepNumber`, keeps track of how many frames of the game\
    \ we have stepped through. Like most `UIViewController` classes, understanding\
    \ how it works starts by looking at the `viewDidLoad` task shown in [Listing 5-14](#9781430244226_Ch05.xhtml#list14).\n\
    \n[**Listing 5-14.**](#9781430244226_Ch05.xhtml#_list14) `Example02Controller.`"
