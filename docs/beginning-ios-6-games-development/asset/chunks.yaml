    asteroid:self]];     }     for (Actor02* actor in actors){         [actor step:self];
        }     for (Actor02* actor in actors){         if ([actor isKindOfClass:[Asteroid02
    class]]){             if ([viper overlapsWith:actor]){                 [viper
    doCollision:actor In:self];                 break;             }         }     }
        for (Actor02* actor in actors){         [self updateActorView:actor];     }
        [self doRemove];     stepNumber++; } ```    In [Listing 5-16](#9781430244226_Ch05.xhtml#list16),
    we see the task `updateScene`,  the heartbeat of the game, it gets called about
    60 times a second and is where we advance the game along. The first thing we do
    is check to see if we want to add a new asteroid to the game. This is done by
    taking `stepNumber` and moding it by 600 and seeing if the value is zero. In effect,
    this adds a new `Asteroid02` to the scene every 10 seconds, since the game is
    running at about 60 frames a second.    After testing if a new asteroid should
    be added, we iterate through all of the actors in the game and call `step:` on
    them. This gives each actor a chance to advance its state based on its particular
    behavior. The background will do nothing, the asteroids will move downward, and
    the spaceship will move toward its `moveToPoint`. After updating the location
    of each actor, we want to test to see if there was a collision. This is done by
    again iterating through all of the actors, finding the ones that are asteroids,
    and checking for a collision state. For this simple example, iterating over all
    of the actors to find a collision is okay. However, in a more complex application,
    it is probably important to improve this algorithm (such as it is). Improvements
    can include keeping track of all asteroids in their own array and possibly sorting
    them by location.    Updating the UIView for Each Actor    We have tested if there
    were any collisions, and now we have to figure out the new location of each actor’s
    `UIImageView`. This is done in the `updateActorView:` task, as shown in [Listing
    5-17](#9781430244226_Ch05.xhtml#list17).    [**Listing 5-17.**](#9781430244226_Ch05.xhtml#_list17)  Example02Controller.'
