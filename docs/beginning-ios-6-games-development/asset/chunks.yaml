    \        return YES;\n    }\n    return NO;\n}\n```\n\n在代码清单 13-2 中，我们指定了游戏区域大小并创建了物理世界。游戏区域大小不被\
    \ Box2D 考虑。Box2D 没有游戏在内部发生的固定边界的概念，除了用浮点值限制来表示世界内的坐标。接下来，我们创建了 30 个小行星，并将它们随机放置在场景中。然后使用熟悉的`addActor:`方法添加每个小行星。\n\
    \n此时你可能会注意到，除了创建世界对象之外，我们实际上并没有对 Box2D 做任何操作。我们似乎只是在向`GameController`添加角色，就像前几章所做的那样。之所以看起来如此，是因为我们做了两件事来启用物理效果，同时又没有过多地破坏现有的框架。我们在`PhysicsViewController`中重写了`GameController`的几个任务，并创建了一个名为`PhysicsActor`的新角色类型，`Asteroid`现在继承自它。这两个修改协同工作，共同启用了物理效果。\n\
    \n让我们从对`GameController`的修改开始，了解这一切是如何结合在一起的。\n\n**代码清单 13-3.** `addActor`: (`PhysicsViewController.m`)\n\
    \n```\n-(void)addActor:(Actor *)actor{\n    if ([actor isKindOfClass:[PhysicsActor\
    \ class]]){\n        PhysicsActor* physicsActor = (PhysicsActor*)actor;\n    \
    \    b2BodyDef bodyDef = [physicsActor createBodyDef];\n        \n        b2Body*\
    \ body = world->CreateBody(&bodyDef);\n        \n        b2CircleShape circle;\n\
    \        circle.m_p.Set(0.0f, 0.0f);\n        circle.m_radius = [PhysicsViewController\
    \ convertDistanceToB2:[actor radius]];\n        \n        b2FixtureDef fixtureDef;\n\
    \        \n        fixtureDef.shape = &circle;\n        fixtureDef.density = [physicsActor\
    \ radius];\n        fixtureDef.friction = 0.1f;\n        fixtureDef.restitution\
    \ = .8;\n        \n        body->CreateFixture(&fixtureDef);\n        [physicsActor\
    \ setBody:body];\n    }\n    [super addActor:actor];\n}\n```\n\n在代码清单 13-3 中，我们看到了被重写的任务`addActor:`。在此任务中，我们首先检查正在添加的角色是否是`PhysicsActor`。如果是，我们需要做一些工作来在我们的世界对象中创建一个\
    \ Box2D 刚体，以便我们的角色能够参与物理模拟。我们还需要创建一个夹具，使刚体具有大小和质量。让我们逐步分析一下。\n\n在 Box2D 中创建刚体时，我们在`b2BodyDef`类型的结构体中指定刚体的初始值。该结构体指定了刚体的所有属性，如本章前面所述。由于刚体位置等属性由`physicsActor`驱动，我们通过调用`createBodyDef`来获取`b2BodyDef`，并将值存储在`bodyDef`中。一旦有了`bodyDef`，我们就调用`world`对象上的`CreateBody`方法，并将结果存储在`b2Body`变量`body`中。`CreateBody`任务既创建了刚体，又将其添加到模拟中。请注意，我们使用的是`world`上的方法来创建`b2Body`，而不是自己实例化它。这样做是因为\
    \ Box2D 有非常特殊的内存管理要求，建议始终使用其提供的工厂方法。\n\n继续看代码清单 13-3，接下来我们创建一个名为`circle`的`b2CircleShape`。我们通过调用`Set`并传入`0.0f`作为\
    \ X 和 Y 位置，将圆形居中于刚体上。我们还指定了圆形的半径。逻辑上，我们知道希望圆形的半径与`physicsActor`的半径相同，但 Box2D 建议不要让一个点等于\
    \ Box2D 中的一个单位。在这种情况下，我们调用实用方法`convertDistanceToB2`来创建一个适合 Box2D 坐标系的缩放值。总共有四个这样方便的转换方法，稍后我们会更详细地介绍它们。\n\
    \n有了圆形之后，我们通过创建一个名为`fixtureDef`的`b2FixtureDef`将其附加到刚体上。夹具遵循与 Box2D 中刚体相同的模式：它们使用定义其初始值的结构体创建，然后通过调用适当的工厂方法（此处为`body`上的`CreateFixture`）实际创建它们。\n\
    \n在`fixtureDef`上，我们还指定了密度、摩擦力和恢复系数。在我们的示例中，这些值是通过反复试验设定的，以获得看起来不错的效果。例如，请注意密度是基于小行星的半径。这显然不太现实；人们可能会期望一批小行星如果由相同物质构成，它们的密度即使不相同也是相似的。但在模拟运行时，我喜欢改变密度让小行星获得更多弹跳效果。你可以随意调整这些值，看看它如何改变模拟结果。\n\
    \n一旦创建了刚体及其夹具，我们就将该对象存储在`physicsActor`的`body`属性中。通过这种方式，`physicsActor`可以引用其在 Box2D\
    \ 世界中的表示，并相应地更新其状态。\n"
- fmt: "在`addActor`中，我们做的最后一件事是调用超类的实现，以便将角色附加到`GameController`的场景中，这与前几章相同。接下来的部分将探讨我们的新型角色——`PhysicsActor`——并了解如何将其Box2D实体与场景链接起来。\n\
    \n## 物理角色\n\n`PhysicsActor`类旨在成为任何希望参与物理模拟的角色的超类。其核心理念是将大部分Box2D功能封装在一个类中，这样在处理角色时就不必过于担心。当我们查看`Asteroid`类时，会发现我们打破了这种封装，但我认为这样代码更容易作为示例理解。总之，我们先来看`PhysicsActor`的头文件，如[列表13-4](#9781430244226_Ch13.xhtml#list4)所示。\n\
    \n**[列表13-4](#9781430244226_Ch13.xhtml#_list4).** `PhysicsActor.h`\n\n```objc\n\
    #import <Foundation/Foundation.h>\n#import <Box2D/Box2D.h>\n#import \"Actor.h\"\
    \n#import \"PhysicsViewController.h\"\n\n@interface PhysicsActor : Actor\n\n@property\
    \ (nonatomic) b2Body* body;\n\n-(b2BodyDef)createBodyDef;\n@end\n```\n\n在[列表13-4](#9781430244226_Ch13.xhtml#list4)中，我们看到`PhysicsActor`继承了`Actor`。它还添加了一个名为`body`的新属性，用于存储在Box2D世界中表示它的`b2Body`。你还可以看到在[列表13-3](#9781430244226_Ch13.xhtml#list3)中将角色添加到场景时使用的任务`createBodyDef`的声明。我们快速查看一下`createBodyDef`的实现，如[列表13-5](#9781430244226_Ch13.xhtml#list5)所示。\n\
    \n**[列表13-5](#9781430244226_Ch13.xhtml#_list5).** `createBodyDef` (`PhysicsActor.m`)\n\
    \n```objc\n-(b2BodyDef)createBodyDef{\n    b2BodyDef bodyDef;\n    bodyDef.type\
    \ = b2_dynamicBody;\n    bodyDef.position = [PhysicsViewController convertPointToB2:self.center];\n\
    \    return bodyDef;\n}\n```\n\n在[列表13-5](#9781430244226_Ch13.xhtml#list5)中，我们声明了一个新的`b2BodyDef`，然后将其类型设置为`b2_dynamicBody`，以便此`b2BodyDef`创建的`b2Body`能完全参与模拟。我们还通过使用任务`convertPointToB2`将角色的中心点转换为`b2Vec2`来指定位置。再次强调，这样做是因为我们希望在Box2D与用于表示场景中角色的坐标之间使用不同的比例。最后，我们直接返回它。\n\
    \n`PhysicsActor`实际上有两个任务。第一个任务是在将角色添加到场景时提供一个`b2BodyDef`。第二个任务是在模拟过程中，当相应的`b2Body`的位置和旋转发生变化时，更新角色的属性。这通过`step:`任务完成，如[列表13-6](#9781430244226_Ch13.xhtml#list6)所示。\n\
    \n**[列表13-6](#9781430244226_Ch13.xhtml#_list6).** `step:` (`PhysicsActor.m`)\n\
    \n```objc\n-(void)step:(GameController *)controller{\n    b2Vec2 position = body->GetPosition();\n\
    \    CGPoint center = [PhysicsViewController convertPointToCG:position];\n   \
    \ [self setCenter: center];\n    [self setRotation:body->GetAngle()];\n}\n```\n\
    \n在[列表13-6](#9781430244226_Ch13.xhtml#list6)中，我们需要根据`body`属性的状态来更改角色的位置和旋转。如你所见，这非常简单。我们只需使用`convertPointToGC`:将实体的位置转换为`GameController`坐标系中的`CGPoint`；然后将这个新的中心值赋值给角色。接着，使用`GetAngle`将角色的旋转设置为实体的角度。无需进行转换，因为角色的`rotation`属性和实体的`angle`属性都是以弧度为单位。\n\
    \n接下来，让我们探讨如何扩展`PhysicsActor`，使其像示例中的小行星一样运行。\n\n## 扩展 PhysicsActor\n\n我们有了`PhysicsActor`类，它为希望参与物理模拟的角色提供了基本支持。\n\
    \n在本节中，我们将查看`Asteroid`类，并了解如何修改其行为以实现我们的需求。\n\n回顾`PhysicsActor`，请注意我们并未提及模拟中实体的初始速度。让我们看看如何自定义`Asteroid`，使其一开始就在场景中快速移动。[列表13-7](#9781430244226_Ch13.xhtml#list7)展示了如何实现这一点。\n\
    \n**[列表13-7](#9781430244226_Ch13.xhtml#_list7).** `createBodyDef` (`Asteroid.m`)\n\
    \n```objc\n-(b2BodyDef)createBodyDef{\n    b2BodyDef bodyDef = [super createBodyDef];\n\
    \    bodyDef.linearVelocity.Set(−20+rand()%40, -20+rand()%40);\n    \n    return\
    \ bodyDef;\n}\n```\n\n在[列表13-7](#9781430244226_Ch13.xhtml#list7)中，我们调用了`PhysicsActor`的`createBodyDef`实现，因为它已经完成了我们在此所需的大部分工作，例如设置起始位置。然后，我们只需将线速度设置为某个随机值。在这个示例中，每个X和Y分量的范围是−20到20。这样，所有新添加的小行星都会被赋予一个初始速度。\n\
    \n关于小行星的另一个独特行为是，当它们离开屏幕边缘时，会从另一侧重新出现。从Box2D世界的角度来看，这个概念没有太大意义，因为Box2D只是一个无限平面。[¹](#9781430244226_Ch13.xhtml#Fn1)\
    \ [列表13-8](#9781430244226_Ch13.xhtml#list8)展示了当每个小行星离开屏幕时，我们如何更新其位置。\n\n**[列表13-8](#9781430244226_Ch13.xhtml#_list8).**\
    \ `step:` (`Asteroid.m`)\n\n```objc\n-(void)step:(GameController *)controller{\n\
    \    if (self.center.x < −self.radius){\n        CGPoint center = CGPointMake(controller.gameAreaSize.width+self.radius,\
    \ self.center.y);\n        self.body->SetTransform([PhysicsViewController convertPointToB2:\
    \ center],\n    self.body->GetAngle());\n    } else if (self.center.x > controller.gameAreaSize.width\
    \ + self.radius){\n        CGPoint center = CGPointMake(−self.radius, self.center.y);\n\
    \        self.body->SetTransform([PhysicsViewController convertPointToB2: center],\n\
    \    self.body->GetAngle());\n    }\n    if (self.center.y < −self.radius){\n\
    \        CGPoint center = CGPointMake(self.center.x, controller.gameAreaSize.height\
    \ + self.radius);\n        self.body->SetTransform([PhysicsViewController convertPointToB2:\
    \ center],\n    self.body->GetAngle());\n    } else if (self.center.y > controller.gameAreaSize.height\
    \ + self.radius){\n        CGPoint center = CGPointMake(self.center.x, -self.radius);\n\
    \        self.body->SetTransform([PhysicsViewController convertPointToB2: center],\n\
    \    self.body->GetAngle());\n    }\n    \n    [super step: controller];\n}\n\
    ```\n\n在[列表13-8](#9781430244226_Ch13.xhtml#list8)中，对于X和Y轴，我们检查小行星是否已超出屏幕超过其`radius`个点。如果是，我们只需在屏幕的另一侧指定一个新的中心值。然后，我们将这个新的中心值转换为适合Box2D的值，并在`body`属性上调用`SetTransform`方法。注意，我们同时传入了实体的当前角度，因为`SetTransform`需要该值来更改其位置。\n\
    \n自定义`Asteroid`使其按我们的意愿运行就是这么简单。在这个示例中，我们没有从场景中移除任何角色，但这很可能是人们想要做的。下一节将简要介绍清理工作。\n\
    \n## 一点清理工作\n\n虽然在这个示例中我们没有移除任何角色，但让我们看看如何实现。[列表13-9](#9781430244226_Ch13.xhtml#list9)展示了具体方法。\n\
    \n**[列表13-9](#9781430244226_Ch13.xhtml#_list9).** `removeActor`: (`PhysicsViewController.`)"
  raw: 'The last thing we do in `addActor`: is call the super-implementation so that
    the actor is attached to the `GameController''s` scene, as in previous chapters.
    The following section will explore our new type of actor—the `PhysicsActor`—and
    see how we link its Box2D body with our scene.    The Physics Actors    The Class
    `PhysicsActor` is intended to be a super-class for any Actor that wishes to participate
    in the physics simulation. The idea here is that we can encapsulate most of the
    Box2D functionality in a single class so we don’t have to worry too much about
    it when working with our Actors. When we look at the class Asteroid, we will see
    that we do break this encapsulation, but I thought the code was easier to understand
    as an example. Anyway, let’s start by looking at the header of `PhysicsActor`,
    shown in [Listing 13-4](#9781430244226_Ch13.xhtml#list4).    **[Listing 13-4](#9781430244226_Ch13.xhtml#_list4).**
    `PhysicsActor.h`    ``` #import <Foundation/Foundation.h> #import <Box2D/Box2D.h>
    #import "Actor.h" #import "PhysicsViewController.h"   @interface PhysicsActor
    : Actor   @property (nonatomic) b2Body* body;   -(b2BodyDef)createBodyDef; @end
    ```    In [Listing 13-4](#9781430244226_Ch13.xhtml#list4), we see that `PhysicsActor`
    extends Actor. It also adds a new property called body that is used to store b2Body
    that represents it in the Box2D world. You can also see the declaration of the
    task `createBodyDef` that was used in [Listing 13-3](#9781430244226_Ch13.xhtml#list3)
    when adding the Actor to the scene. Let’s take a quick look at the implementation
    of `createBodyDef`, shown in [Listing 13-5](#9781430244226_Ch13.xhtml#list5).    **[Listing
    13-5](#9781430244226_Ch13.xhtml#_list5)**. `createBodyDef` (`PhysicsActor.m`)    ```
    -(b2BodyDef)createBodyDef{     b2BodyDef bodyDef;     bodyDef.type = b2_dynamicBody;
        bodyDef.position = [PhysicsViewController convertPointToB2:self.center];     return
    bodyDef; } ```    In [Listing 13-5](#9781430244226_Ch13.xhtml#list5), we declare
    a new b2BodyDef and then set its type to b2_dynamicBody so this b2Body created
    by this b2BodyDef will participate fully in the simulation. We also specify position
    by converting the Actor’s center to a b2Vec2 using the task convertPointToB2\.
    Again, this is done because we want a different scale between the Box2D and the
    coordinates we are using to represent our Actors in the scene. Lastly, we simply
    return it.    `PhysicsActor` really has two jobs. The first job is to provide
    a b2BodyDef to be used when adding the Actor to the scene. The second job is to
    update the properties of the Actor as the location and rotation of the corresponding
    b2Body moves about in the simulation. This is done in the step: task, shown in
    [Listing 13-6](#9781430244226_Ch13.xhtml#list6).    **[Listing 13-6](#9781430244226_Ch13.xhtml#_list6)**.
    step: (`PhysicsActor.m`)    ``` -(void)step:(GameController *)controller{     b2Vec2
    position = body->GetPosition();     CGPoint center = [PhysicsViewController convertPointToCG:position];
        [self setCenter: center];     [self setRotation:body->GetAngle()]; } ```    In
    [Listing 13-6](#9781430244226_Ch13.xhtml#list6), we need to change the location
    and rotation of the Actor based on the state of the body property. As you can
    see, this is pretty simple. We just convert the position of the body to a `CGPoint`
    in the `GameController''s` coordinate system using `convertPointToGC`:; this new
    center value is assigned to the Actor. Then, we set the rotation of the Actor
    to the angle of the body, using `GetAngle`. No conversion is required, as the
    rotation property of Actor and the angle property of body are both in radians.    Next,
    let’s explore the how we can extend `PhysicsActor` so it behaves like the asteroids
    in our example.    Extending Physics Actor    We have the class `PhysicsActor`
    that provides basic support for an Actor that wishes to participate in the physics
    simulation.


    In this section, we will look at the class Asteroid and understand how we can
    modify its behavior to do what we want.    Looking back at the `PhysicsActor`,
    note that we didn’t mention the starting velocities of the bodies in the simulation.
    Let’s look at how we customize Asteroid so things start out zipping around our
    scene. [Listing 13-7](#9781430244226_Ch13.xhtml#list7) shows how we do this.    **[Listing
    13-7](#9781430244226_Ch13.xhtml#_list7).** `createBodyDef` (`Asteroid.m`)    ```
    -(b2BodyDef)createBodyDef{     b2BodyDef bodyDef = [super createBodyDef];     bodyDef.linearVelocity.Set(−20+rand()%40,
    -20+rand()%40);           return bodyDef; } ```    In [Listing 13-7](#9781430244226_Ch13.xhtml#list7),
    we call `PhysicsActor''s` implementation of `createBodyDef`, since that does a
    lot of the work we would want to do here anyway, such as setting the starting
    position. We then simply set the linear velocity to be some random value. In this
    example, each X and Y component is from −20 to 20\. In this way, all newly added
    Asteroids are given an initial velocity.    The other unique behavior about our
    Asteroids is that when they leave the edge of the screen, they reappear on the
    other side. From the perspective of the Box2D world, this concept does not make
    a lot of sense, since the Box2D is just an infinite plane. [¹](#9781430244226_Ch13.xhtml#Fn1)
    [Listing 13-8](#9781430244226_Ch13.xhtml#list8) shows how we update the location
    of each Asteroid as it leaves the screen.    **[Listing 13-8](#9781430244226_Ch13.xhtml#_list8).**
    step: (`Asteroid.m`)    ``` -(void)step:(GameController *)controller{     if (self.center.x
    < −self.radius){         CGPoint center = CGPointMake(controller.gameAreaSize.width+self.radius,
    self.center.y);         self.body->SetTransform([PhysicsViewController convertPointToB2:
    center],     self.body->GetAngle());     } else if (self.center.x > controller.gameAreaSize.width
    + self.radius){         CGPoint center = CGPointMake(−self.radius, self.center.y);
            self.body->SetTransform([PhysicsViewController convertPointToB2: center],
        self.body->GetAngle());     }     if (self.center.y < −self.radius){         CGPoint
    center = CGPointMake(self.center.x, controller.gameAreaSize.height + self.radius);
            self.body->SetTransform([PhysicsViewController convertPointToB2: center],
        self.body->GetAngle());     } else if (self.center.y > controller.gameAreaSize.height
    + self.radius){         CGPoint center = CGPointMake(self.center.x, -self.radius);
            self.body->SetTransform([PhysicsViewController convertPointToB2: center],
        self.body->GetAngle());     }           [super step: controller]; } ```    In
    [Listing 13-8](#9781430244226_Ch13.xhtml#list8), for each axis X and Y, we check
    to see if the Asteroid has gone outside of the screen by more than radius points.
    If so, we simply specify a new center value on the other side of the screen. We
    then convert this new center into a value suitable for Box2D, and call the `SetTransform`
    method on the body property. Note that we also pass in the current angle of the
    body, since `SetTransform` requires that value to change its location.    This
    is all there is to customizing Asteroid to make it behave the way we want. In
    this example, we don’t remove any Actors from the scene, but that is something
    people very well might want to do. The next section covers a little bit about
    cleaning up.    A Little Cleanup    Though we don’t remove any Actors in this
    example, let’s take a look at how we would do that. [Listing 13-9](#9781430244226_Ch13.xhtml#list9)
    shows how.    **[Listing 13-9](#9781430244226_Ch13.xhtml#_list9).** `removeActor`:
