    @end ```    As can be seen in [Listing 3-6](#9781430244226_Ch03.xhtml#list6),
    a protocol is a pretty simple thing. The name of the protocol comes after the
    `@protocol`. The `<NSObject`> specifies what types of objects can conform to this
    protocol. Between the `@protocol` and the `@end`, a number of tasks are declared.
    These are the messages that are going to be sent to the delegate object, so the
