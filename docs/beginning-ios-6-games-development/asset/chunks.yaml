    \  [classes addObject:[Saucer class]];\n        [classes addObject:[Bullet class]];\n\
    \        [self setSortedActorClasses:classes];\n        return YES;\n    }\n \
    \   return NO;\n}\n```\n\n在[Listing 7-1](#9781430244226_Ch07.xhtml#list1)中，我们看到类`Example02Controller`的`doSetup`任务。这个方法简单地表示我们希望将类型为`Saucer`和`Bullet`的角色排序，以便日后轻松访问。我们通过创建一个名为`classes`的`NSMutableArray`，并添加我们感兴趣的两个类的类对象来实现这一点。然后，`NSMutableArray\
    \ classes`被传递给`setSortedActorClasses:`。这样，当我们在未来调用`actorsOfType:`时，就不必对所有角色进行排序来找到它们。接下来，我们来看一下描述此示例中动作的代码，该代码位于类`Example02Controller`的`updateScene`任务中。请参见[Listing\
    \ 7-2](#9781430244226_Ch07.xhtml#list2)。\n\n## `updateScene`任务\n\n```objective-c\n\
    -(void)updateScene{\n    NSMutableSet* suacers = [self actorsOfType:[Saucer class]];\n\
