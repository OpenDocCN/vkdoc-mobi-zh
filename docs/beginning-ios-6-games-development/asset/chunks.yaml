    `asteroids_destroyed` is simply incremented whenever an asteroid in the game is
    destroyed. If `asteroids_destroyed` is at least 10, we get a reference to a `GKAchievement`
    by passing the achievement’s ID (as defined in iTunes Connect) to the `initWithIdentifier`
    task of `GKAchievement`. Once we have a reference, we simply assign 100 to the
    property `percentComplete`, call `reportAchievementWithCompletionHander`, and
    we are done.    There are a few things to note about achievements. First, as shown
    in [Listing 9-5](#9781430244226_Ch09.xhtml#list5), achievements can be partially
    complete. We could have set `percentComplete` to 30 or 50\. This is an important
    feature for long-running achievements. Say, for example, our achievement was to
    destroy 10,000 asteroids. We would want to let users know how far they have progressed
    to date or they may not  pursue it further.    Another thing to note about achievements
    is that each has a value. Our achievement is worth 5 points, as shown in [Figure
    9-11](#9781430244226_Ch09.xhtml#Fig11). The value of an achievement can be whatever
    the developer wants. However, you are limited to a total of 1,000 points of achievements
    for a given game. This is so users know that they have achieved all the achievements
    for a given game when they hit 1,000 achievement points. It prevents the users
    from having to relearn the relative values of an achievement for a given game.
    Users know that a 1- or 5-point achievement is not really a big deal, but that
    a 100-point achievement is a real accomplishment.    We have looked at Game Center
    and GameKit and how to work with leaderboards and achievements. As mentioned,
    GameKit can also be used to coordinate multiplayer games. We are not going to
    get into that topic here, as I believe it is too advanced for this book. However,
    I encourage you to follow up on GameKit’s support for multiplayer games, as it
    should simplify your life considerably. Next, let’s look at the Twitter integration,
    which is new to iOS 5.    Twitter Integration    Love it or hate it, Twitter exists.
    As a mobile application developer, you need to be aware that it is  more and more
    common for clients to ask for social media integration in their apps. On the short
    list of everyone’s social services is Twitter. Twitter provides a very nice and
    useful REST service that can be used to tweet on behalf of a user. New to iOS
    6 is the Social Framework.


    This framework extends and replaces the Twitter API from iOS 5\. The Social Framework
    allows a user to do a sort of single sign-on with their Twitter or Facebook account,
    making it simple for application developers to request access to this global account.
    This feature is great for users, because they have to authenticate only once with
    the device, and they still have control over which applications are allowed to
    tweet for them.    This feature is also great for developers. It makes tweeting
    really, really easy. If you have ever worked with any OAuth service on an embedded
    device, you know there is a bit of a disconnect between how OAuth works and how
    native applications operate. In short, OAuth was designed to work within a browser,
    and our application was not written on HTML. One solution was to pop up a `UIWebView`
    and do the authentication through it. This works, but it is clumsy. This new approach
    is much better.    Not only does this new Twitter API provide a simple way to
    authenticate, it also has a simple component where users can enter their tweets,
    as shown in [Figure 9-12](#9781430244226_Ch09.xhtml#Fig12).    ![9781430244226_Fig09-12.jpg](images/9781430244226_Fig09-12.jpg)    [Figure
    9-12.](#9781430244226_Ch09.xhtml#_Fig12)  Tweeting from Belt Commander    In [Figure
    9-12](#9781430244226_Ch09.xhtml#Fig12), we see the built-in component for tweeting
    on iOS. On the top, we have the place where the 120 characters can be typed. To
    the right, there is a paperclip holding a Safari icon. This indicates that a link
    was attached to this tweet. The user can also add a location, cancel, or send
    the tweet. The code to populate this view with default values and display them
    is shown in [Listing 9-6](#9781430244226_Ch09.xhtml#list6).    **[Listing 9-6](#9781430244226_Ch09.xhtml#_list6). **
    `RootViewController.m` (`tweetButtonClicked:`)    ``` - (IBAction)tweetButtonClicked:(id)sender
    {         SLComposeViewController* twitterSheet = [SLComposeViewController composeViewControllerForServiceType:SLServiceTypeTwitter];
        [twitterSheet setInitialText:@"Check out this iOS game, Belt Commander!"];
        [twitterSheet addURL:[NSURL URLWithString:@" http://itunes.apple.com/us/app/belt-commander/id460769032?ls=1&mt=8
    "]];     [self presentViewController:twitterSheet animated:YES completion:^(void){
            NSLog(@"twitter done");     }]; } ```    In [Listing 9-6](#9781430244226_Ch09.xhtml#list6),
    we see the `tweetButtonClicked`: task of the class `RootViewController`. This
    task is called when a user clicks the Tweet button. To display the Twitter component,
    we simply create a new `SLComposeViewController` and indicate that we are interested
    in the Twitter service. After specifying the initial text and attaching a URL,
    we simply pass `twitterSheet` to `presentModalViewController`. If we want to know
    whether the tweet was sent, we can assign a block to the value `completionHandler`
    of `twitterSheet`.    Of course, not every user will have Twitter set up on his
    or her device. As a developer, you want to be able to test this, which turns out
    to be as simple as the code in [Listing 9-7](#9781430244226_Ch09.xhtml#list7).    **[Listing
    9-7](#9781430244226_Ch09.xhtml#_list7). ** `RootViewController`.m (`initTwitter`)    ```
    -(void)initTwitter{     [tweetButton setEnabled:[SLComposeViewController isAvailableForServiceType:SLServiceTypeTwitter]];
    } ```    In [Listing 9-7](#9781430244226_Ch09.xhtml#list7), we see the simple
    task `initTwitter`, which is called when the containing `UIViewController` is
    loaded. In this task, we simply call `isAvailableForServiceType` to see if we
    can tweet. By using the returned value to set the enabled status of `tweetButton`,
    we prevent the user from being able to click the button until Twitter is enabled
    on the device.    The Twitter integration is great. It makes life very simple
    to include this feature. Next, let’s explore how the Social Framework makes working
    with Facebook just as easy.'
  trans: "\n我们希望玩家在摧毁前 10 颗小行星时获得一项成就——这是一个简单的成就，旨在游戏初期就提醒玩家还有其他成就可以获取。图 9-11 展示了\
    \ Game Center 应用中的这项成就。  \n![9781430244226_Fig09-11.jpg](img/9781430244226_Fig09-11.jpg)\
    \  \n图 9-11.  Game Center 应用中的首个成就  \n\n在图 9-11 中，我们看到 Game Center 应用显示 Belt Commander\
    \ 成就的截图。可以看到，该视图中的成就已被授予。代码清单 9-5 展示了授予成就的代码。  \n\n**代码清单 9-5.** `BeltCommanderController.m`\
    \ (`checkAchievements`)  \n\n```\n-(void)checkAchievements{\n    if (asteroids_destroyed\
    \ >= 10){\n        \n        GKAchievement* achievement = [[GKAchievement alloc]\
    \ initWithIdentifier:@\"beltcommander.10asteroids\"];\n        achievement.percentComplete\
    \ = 100.0;\n        \n        [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error) {\n            if (error){\n                // report error\n      \
    \      }\n        }];\n    }\n}\n```\n\n在代码清单 9-5 中，我们看到来自`BeltCommanderController`类的任务`checkAchievements`，该类负责处理游戏中的逻辑。我们首先检查`asteroids_destroyed`是否大于或等于\
    \ 10。变量`asteroids_destroyed`会在游戏中的小行星被摧毁时递增。如果`asteroids_destroyed`至少为 10，我们通过将成就\
    \ ID（在 iTunes Connect 中定义）传递给`GKAchievement`的`initWithIdentifier`任务来获取对`GKAchievement`的引用。获取引用后，只需将`percentComplete`属性设为\
    \ 100，调用`reportAchievementWithCompletionHander`即可完成。  \n\n关于成就，有几点需要注意。首先，如代码清单\
    \ 9-5 所示，成就可以部分完成。我们可以将`percentComplete`设为 30 或 50。这对于长期成就来说是一个重要功能。例如，假设我们的成就是摧毁\
    \ 10,000 颗小行星。我们希望让用户了解他们当前的进度，否则他们可能不会继续追求。  \n\n关于成就的另一点是每个成就都有分值。如图 9-11 所示，我们的成就价值\
    \ 5 分。成就的分值可以由开发者任意设定。但是，每个游戏的总成就点数限制为 1,000 分。这样用户就知道，当他们达到 1,000 成就点时，已经获得了该游戏的所有成就。这避免了用户需要重新了解每个游戏中成就的相对价值。用户知道\
    \ 1 分或 5 分的成就无关紧要，而 100 分的成就才是真正的成就。  \n\n我们已经了解了 Game Center 和 GameKit，以及如何使用排行榜和成就。如前所述，GameKit\
    \ 还可以用于协调多人游戏。这里我们不打算深入探讨这个话题，因为我认为对于本书来说过于高级。但我鼓励你跟进 GameKit 对多人游戏的支持，因为它应该能大大简化你的开发工作。接下来，让我们看看\
    \ iOS 5 中新增的 Twitter 集成功能。  \n\n## Twitter 集成  \n\n无论你喜欢与否，Twitter 都存在。作为移动应用开发者，你需要意识到客户在应用中集成社交媒体的需求越来越普遍。每个人短名单上的社交服务中都有\
    \ Twitter。Twitter 提供了一个非常优秀且实用的 REST 服务，可用于代表用户发推文。iOS 6 新增了 Social Framework。\
    \  \n\n这个框架扩展并取代了 iOS 5 的 Twitter API。Social Framework 允许用户通过 Twitter 或 Facebook\
    \ 账户进行某种形式的单点登录，使应用开发者能够轻松请求访问这一全局账户。这个功能对用户非常有利，因为他们只需在设备上认证一次，同时仍能控制哪些应用允许为他们发推文。\
    \  \n\n这个功能对开发者也非常有利。它让发推文变得极其简单。如果你曾在嵌入式设备上使用过 OAuth 服务，就会知道 OAuth 的工作原理与原生应用的操作方式之间存在一些脱节。简而言之，OAuth\
    \ 设计用于浏览器环境，而我们的应用并非基于 HTML 编写。一种解决方案是弹出一个`UIWebView`并通过它进行认证。这种方法可行，但很笨拙。而新方法要好得多。\
    \  \n\n这个新的 Twitter API 不仅提供了简单的认证方式，还包含一个简单的组件，用户可以在其中输入推文，如图 9-12 所示。  \n\n\
    ![9781430244226_Fig09-12.jpg](img/9781430244226_Fig09-12.jpg)  \n图 9-12.  从 Belt\
    \ Commander 发推文  \n\n在图 9-12 中，我们看到 iOS 内置的发推文组件。顶部是输入 120 个字符的区域。右侧有一个回形针夹着 Safari\
    \ 图标，表示这条推文附带了链接。用户还可以添加位置、取消或发送推文。用默认值填充此视图并显示它的代码如代码清单 9-6 所示。  \n\n**代码清单 9-6.**\
    \ `RootViewController.m` (`tweetButtonClicked:`)  \n\n```\n- (IBAction)tweetButtonClicked:(id)sender\
    \ {\n        SLComposeViewController* twitterSheet = [SLComposeViewController\
    \ composeViewControllerForServiceType:SLServiceTypeTwitter];\n    [twitterSheet\
    \ setInitialText:@\"Check out this iOS game, Belt Commander!\"];\n    [twitterSheet\
    \ addURL:[NSURL URLWithString:@\" http://itunes.apple.com/us/app/belt-commander/id460769032?ls=1&mt=8\
    \ \"]];\n    [self presentViewController:twitterSheet animated:YES completion:^(void){\n\
    \        NSLog(@\"twitter done\");\n    }];\n}\n```\n\n在代码清单 9-6 中，我们看到`RootViewController`类的`tweetButtonClicked`:任务。当用户点击“发推文”按钮时，会调用此任务。要显示\
    \ Twitter 组件，我们只需创建一个新的`SLComposeViewController`，并指定我们对 Twitter 服务感兴趣。在指定初始文本并附加\
    \ URL 后，只需将`twitterSheet`传递给`presentModalViewController`即可。如果我们想知道推文是否已发送，可以为`twitterSheet`的`completionHandler`值分配一个代码块。\
    \  \n\n当然，并非每个用户都在其设备上设置了 Twitter。作为开发者，你希望能够测试这一点，结果证明这就像代码清单 9-7 中的代码一样简单。 \
    \ \n\n**代码清单 9-7.** `RootViewController.m` (`initTwitter`)  \n\n```\n-(void)initTwitter{\n\
    \    [tweetButton setEnabled:[SLComposeViewController isAvailableForServiceType:SLServiceTypeTwitter]];\n\
    }\n```\n\n在代码清单 9-7 中，我们看到简单的任务`initTwitter`，它在包含它的`UIViewController`加载时被调用。在此任务中，我们只需调用`isAvailableForServiceType`来检查是否可以发推文。通过使用返回值设置`tweetButton`的启用状态，我们防止用户在设备启用\
    \ Twitter 之前点击该按钮。  \n\nTwitter 集成非常出色，它让包含此功能变得极为简单。接下来，让我们探索 Social Framework\
    \ 如何让集成 Facebook 也同样简单。  \n"
- fmt: "## Facebook Integration\n\nIt is hard to say if Twitter integration or Facebook\
    \ integration is a more common request. Thankfully, the new Social Framework makes\
    \ working with Facebook as easy as working with Twitter. In the Twitter example,\
    \ we looked at using a built-in widget to display a tweet. That example would\
    \ work just as well swapping out `SLServiceTypeTwitter` for `SLServiceTypeFacebook`,\
    \ and users would be posting to their Facebook accounts instead. However, we are\
    \ going to work with the Social Framework in conjunction with the Accounts Framework\
    \ to post directly to the users’ timelines without presenting them with a UI element.\
    \ The Accounts Framework is a companion set of APIs that allow more sophisticated\
    \ control when working with a social media service.\n\nIn this section, we will\
    \ see how users can request that high scores be posted on their timelines by clicking\
    \ the Facebook button from [Figure 9-2](#9781430244226_Ch09.xhtml#Fig2). Before\
    \ we can look at the source code, though, we need to go to our Facebook account\
    \ and create a Facebook application.\n\n### Creating a Facebook Application\n\n\
    The Facebook application can be thought of as the Facebook component of our application.\
    \ Facebook has us do this so there is an identity associated with any Facebook\
    \ action performed on behalf of the user. Facebook also uses the Facebook application\
    \ as a security context. When users agree to let our application make posts, they\
    \ are saying that our new Facebook application is allowed to make posts. [Figure\
    \ 9-13](#9781430244226_Ch09.xhtml#Fig13) shows the Facebook application I created\
    \ for the sample game Belt Commander.\n\n![9781430244226_Fig09-13.jpg](images/9781430244226_Fig09-13.jpg)\n\
    \n[Figure 9-13.](#9781430244226_Ch09.xhtml#_Fig13) Facebook application\n\nIn\
    \ [Figure 9-13](#9781430244226_Ch09.xhtml#Fig13), we see the settings page for\
    \ a Facebook application. At item A, you can see the App ID. We will use this\
    \ value in our code when we authenticate with Facebook. At Item B, you will notice\
    \ that Facebook wants to you add the iOS Bundle ID, which must match the Bundle\
    \ ID you have set in your Xcode project. Creating a Facebook application is not\
    \ hard, but I don’t want to document it here, because the process seems to change\
    \ every few months. Basically, you need to register your Facebook account as a\
    \ developer and add a new application. Directions can be found at `https://developers.facebook.com/apps`.\n\
    \nNext, let’s look at how we use the Social Framework and the Accounts Framework\
    \ to connect with Facebook and post a high score to the user’s timeline.\n\n###\
    \ Authenticating with Facebook\n\nIn order to post a message to the user’s timeline,\
    \ we first have to check with Facebook to see if this is something the user is\
    \ allowing our application to do. Let’s jump right into the code that is called\
    \ when a user touches the Facebook button, as shown in [Listing 9-7](#9781430244226_Ch09.xhtml#list7a).\n\
    \n[**Listing 9-7**](#9781430244226_Ch09.xhtml#_list7a). `facebookButtonClicked.m`\
    \ (`RootViewController.m`)\n\n```\n- (IBAction)facebookButtonClicked:(id)sender\
    \ {\n    accountStore = [[ACAccountStore alloc] init];\n    ACAccountType* facebookAccountType\
    \ = [accountStore accountTypeWithAccountTypeIdentifier: ACAccountTypeIdentifierFacebook];\n\
    \    \n    NSDictionary *dict = @{\n        ACFacebookAppIdKey: FB_APP_ID,\n \
    \       ACFacebookPermissionsKey: @[@\"publish_stream\"],\n        ACFacebookAudienceKey:\
    \ ACFacebookAudienceFriends\n    };\n    \n    [accountStore requestAccessToAccountsWithType:facebookAccountType\
    \ options:dict completion:^(BOOL granted, NSError *error) {\n        \n      \
    \  if (granted){\n            \n            NSArray* accounts = [accountStore\
    \ accountsWithAccountType:facebookAccountType];\n            facebookAccount =\
    \ [accounts lastObject];\n            \n        } else {\n            NSLog(@\"\
    Could not get permission to access FB: %@\", error);\n        }\n        \n  \
    \  }];\n}\n```\n\nIn [Listing 9-7](#9781430244226_Ch09.xhtml#list7), we start\
    \ by creating an instance of `ACAccountStore`; note that we are storing this object\
    \ in a member field of the `RootViewController`. Next, we create an `ACAccountType`\
    \ called `facebookAccountType` using the `accountTypeWithAccountIdentifier`: task\
    \ of `accountStore`. The object `facebookAccountType` will be used in subsequent\
    \ calls to `accountStore` to indicate which social service we are trying to work\
    \ with. The next step is to create an `NSDictionary` that contains details about\
    \ how we wish to work with Facebook. The first item in the `NSDictionary` is the\
    \ Facebook App ID specified by the key `ACFacebookAppIdKey`. This is the key we\
    \ created when we created a Facebook App in the previous section.\n\nThe second\
    \ key, `ACFacebookPermissionsKey`, specifies which Facebook actions we are asking\
    \ to perform. In this case, we just want to be able to write on the user’s timeline,\
    \ which is controlled by the permission `publish_stream`. (More information about\
    \ Facebook permissions can be found at `http://goo.gl/OOEDG`.) The last key in\
    \ `dict` is `ACFacebookAudienceKey`, which indicates who will be able to see any\
    \ posts we create. In this case, `ACFacebookAudienceFriends` indicates that only\
    \ friends of the user will be able to see the great posts by Belt Commander.\n\
    \nAt this point, we are ready to make a call to Facebook and ask if it is OK for\
    \ us to make posts. We do this by calling `requestAccessToAccountsWithType:options:completion:`,\
    \ passing in `facebookAccountType`, `dict`, and a block which is called on completion\
    \ of the call.\n\nIn the completion block, we check to see if `granted` is true;\
    \ if so, we ask `accountStore` for all accounts that are Facebook accounts. In\
    \ iOS 6, a user can have only one Facebook account associated with each device.\
    \ So, we just grab the last (and only) account and assign it to `facebookAccount`,\
    \ which is an `ACAccount` object, defined in the header (source not shown).\n\n\
    If this is the first time we have called `requestAccessToAccountsWithType:options:completion:`,\
    \ then the user will be prompted with a dialog like the one shown in [Figure 9-14](#9781430244226_Ch09.xhtml#Fig15).\n\
    \n![9781430244226_Fig09-14.jpg](images/9781430244226_Fig09-14.jpg)\n\n[Figure\
    \ 9-14.](#9781430244226_Ch09.xhtml#_Fig14) User Being Asked to Grant Permission\n\
    \nIf the user touches the OK button in [Figure 9-14](#9781430244226_Ch09.xhtml#Fig14),\
    \ the application has permission to make posts on their behalf. Next, let’s take\
    \ a look at how Belt Commander uses this permission to make those posts.\n\n###\
    \ Making Posts to Facebook\n\nWe just explored how an application requests permission\
    \ to make Facebook posts. In Belt Commander, we are going to make a Facebook post\
    \ whenever a player’s game is over, reporting the score. We do this in the task\
    \ `reportToFacebook`, as shown in [Listing 9-8](#9781430244226_Ch09.xhtml#_list8).\n\
    \n[**Listing 9-8**](#9781430244226_Ch09.xhtml#list8). `notifyFacebook` (`RootViewController.m`)\n\
    \n```\n-(void)notifyFacebook{\n    if (facebookAccount){\n        \n        NSString*\
    \ desc = [NSString stringWithFormat:@\"I just scored %ld points on Belt Commander.\"\
    , [beltCommanderController score]];\n        \n        NSDictionary* params =\
    \ @{\n        @\"link\": @\" http://itunes.apple.com/us/app/belt-commander/id460769032\
    \ \",\n        @\"caption\": @\"Presented by ClayWare Games, LLC\",\n        @\"\
    description\": desc,\n        @\"message\": @\"A new high score!\"\n        };\n\
    \        NSURL* feedURL = [NSURL URLWithString:@\" https://graph.facebook.com/me/feed\
    \ \"];\n        \n        SLRequest* request = [SLRequest requestForServiceType:SLServiceTypeFacebook\
    \ requestMethod:SLRequestMethodPOST URL:feedURL parameters:params];\n        \n\
    \        request.\n```"
