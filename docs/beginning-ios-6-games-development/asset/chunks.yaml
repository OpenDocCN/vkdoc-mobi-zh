    ```    In [Listing 5-17](#9781430244226_Ch05.xhtml#list17), the first thing we
    do is find which `UIImageView` is representing the actor that was passed in. We
    find it by looking up the `UIImageView` in the `NSMutableArray actorViews`, using
    the actor’s `actorId` as the key. If we don’t find a `UIImageView`, then this
    actor must have just been added, so we have to create it.    Creating the `UIImageView`
    is as simple as creating a `UIImage` based on the `imageName` of the actor and
    creating a new `UIImageView` with it. We then put the `UIImageView` into the `NSMutableDictionary
    actorViews`, again using the actor’s ID as the key. Lastly, we add the new `UIImageView`
    to `actorView`. We set the frame of the new `UIImageView` to a size zero frame
    to prevent some redraw issues. The frame will be updated shortly anyway.    Placing
    UIImageView in the Screen    After creating the `UIImageView` (if required), we
    have to figure out where on the screen it should be drawn. The first step is to
    figure out the relationship between the size of the game area and the actual size
    of `actorView` on the screen. We can simply divide the width of the `actorView`
    by the width of the game area to establish our `xFactor`. We do the same operation
    with the heights to figure out our `yFactor`. Once we have these ratios, we can
    calculate the `frame` of the `UIImageView`. Once we have the four values that
    make up the new `frame` of the `UIImageView,` we set it. [Figure 5-10](#9781430244226_Ch05.xhtml#Fig10)
    illustrates how these values are calculated.    ![9781430244226_Fig05-10.jpg](images/9781430244226_Fig05-10.jpg)    [Figure
    5-10.](#9781430244226_Ch05.xhtml#_Fig10)  Converting game coordinates into screen
    coordinates    In [Figure 5-10](#9781430244226_Ch05.xhtml#Fig10), on the left
    we see the game area and on the right is the `CGRect` that describes the `actorView`’s
    `frame`. The circle on the left is an `Actor02` that needs to be converted into
    `CGRect` on `actorView`. We start by figuring out the origin of the `GCFrame`
    by first finding the upper-left point of the `Actor02`. We find the X value of
    the upper-left point by subtracting the `radius` of the `Actor02` from the `Actor02`’s
    `center` X value. To find the Y value, we subtract the `radius` from the `Actor02`’s
    `center` Y value. To convert these points into the coordinate space of `actorView`,
    we simply multiple by the X value of the upper left point by `xFactor` and multiple
    the Y value by `yFactor`. The values `xFactor` and `yFactor` are the ratios between
    the `gameAreaSizes` width and height and the `actorView`’s `frame`’s width and
    height. To find the size of `actorView`’s frame, we simply multiply the radius
    by `xFactor` and `yFactor` to find the width and height.    When the user touches
    the `UIView actorView`, we have to do this process in reverse: convert the point
    on the `actorView` to a point with our game space. This conversion happens in
    the task `tapGesture:`, as shown in [Listing 5-18](#9781430244226_Ch05.xhtml#list18).    [**Listing
    5-18.**](#9781430244226_Ch05.xhtml#_list18)  Example02Controller.


    h (tapGuesture:)    ``` - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{
        UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;      CGPoint
    pointOnView = [tapRecognizer locationInView:actorView];      float xFactor = actorView.frame.size.width/self.gameAreaSize.width;
        float yFactor = actorView.frame.size.height/self.gameAreaSize.height;      CGPoint
    pointInGame = CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);      [viper
    setMoveToPoint:pointInGame]; } ```    In [Listing 5-18](#9781430244226_Ch05.xhtml#list18),
    we find where the user touched by calling `locationInView:` on `tapRecognizer`
    and passing in `actorView` and storing the result in `pointOnView`. After recalculating
    `xFactor` and `yFactor` values, we simply divide `pointOnView`’s X and Y values
    by `xFactor` and `yFactor`, giving us `pointInGame`. Using this value we simply,
    set the `moveToPoint` property of viper with `pointInGame`.    To wrap up this
    example, let’s take a look at the code that changes the size of `actorView`, as
    shown in [Listing 5-19](#9781430244226_Ch05.xhtml#list19).    [**Listing 5-19.**](#9781430244226_Ch05.xhtml#_list19)  Example02Controller.m
    (sliderValueChanged:)    ``` - (IBAction)sliderValueChanged:(id)sender {     UISlider*
    slider = (UISlider*)sender;     float newWidth = [slider value];     float newHeight
    = gameAreaSize.height/gameAreaSize.width*newWidth;      CGRect parentFrame = [[actorView
    superview] frame];     float newX = (parentFrame.size.width-newWidth)/2.0;     float
    newY = (parentFrame.size.height-newHeight)/2.0;      CGRect newFrame = CGRectMake(newX,
    newY, newWidth, newHeight);     [actorView setFrame:newFrame]; } ```    The task
    `sliderValueChanged:` in [Listing 5-19](#9781430244226_Ch05.xhtml#list19) is called
    when the user adjusts the slider at the bottom of the screen. The slider is configured
    to have a value between 80 and 320, which we use as the value as `newWidth`. We
    calculate the `newHeight` based on the `newWidth`, preserving our aspect ratio.
    Once we have the new width and height for `actorView`, we find the X and Y values
    that will keep `actorView` centered. Once we have all of the value values for
    the `actorView`’s new frame, we simply set it.    Actor State and Animations    Now
    that we have a basic set of animations, it is time to add a little life to the
    actors. We are going to expand on the last examples and add two effects. The first
    is to make the asteroids look like they are tumbling through space. The second
    is to make the spaceship rotate before moving. Both of these techniques will update
    the image used to represent each actor to create the visual effect. We will also
    add some state logic to the spaceship so we can keep track of what the ship should
    be dong—staying put, rotating, or traveling to the target point. [Figure 5-10](#9781430244226_Ch05.xhtml#Fig10)
    shows this next example in action.    The Tumbling Effect    In [Figure 5-11](#9781430244226_Ch05.xhtml#Fig11)
    we see the spaceship thrusting toward some point at the upper left. There are
    four asteroids in the scene, each with a different graphic. When you run the example,
    you will see that they appear to be tumbling. This tumbling effect is achieved
    by changing the image used to represent the asteroid every few frames of the animation.
    That is, the images used create an animation, like a flipbook. [Figure 5-12](#9781430244226_Ch05.xhtml#Fig12)
    shows the images used to create the animation.    ![9781430244226_Fig05-11.jpg](images/9781430244226_Fig05-11.jpg)    [Figure
    5-11.](#9781430244226_Ch05.xhtml#_Fig11)  Adding animations and state to actors    ![9781430244226_Fig05-12.jpg](images/9781430244226_Fig05-12.jpg)    [Figure
    5-12.](#9781430244226_Ch05.xhtml#_Fig12)  Images that make up the animation for
    asteroid variant B    In [Figure 5-12](#9781430244226_Ch05.xhtml#Fig12), we see
    31 images of asteroids.'
  trans: "\n# `updateActorView:`\n\n```objective-c\n-(void)updateActorView:(Actor02*)actor{\n\
    \    UIImageView* imageView = [actorViews objectForKey:[actor actorId]];\n   \
    \ if (imageView == nil){\n        UIImageView* imageView = [[UIImageView alloc]\
    \ initWithImage:[UIImage imageNamed:[actor imageName]]];\n        [actorViews\
    \ setObject:imageView forKey:[actor actorId]];\n        [imageView setFrame:CGRectMake(0,\
    \ 0, 0, 0)];\n        [actorView addSubview:imageView];\n    }\n\n    float xFactor\
    \ = actorView.frame.size.width/self.gameAreaSize.width;\n    float yFactor = actorView.frame.size.height/self.gameAreaSize.height;\n\
    \n    float x = (actor.center.x-actor.radius)*xFactor;\n    float y = (actor.center.y-actor.radius)*yFactor;\n\
    \    float width = actor.radius*xFactor*2;\n    float height = actor.radius*yFactor*2;\n\
    \    CGRect frame = CGRectMake(x, y, width, height);\n    [imageView setFrame:frame];\n\
    }\n```\n\n在列表 5-17 中，我们首先找到表示传入演员的`UIImageView`。我们通过使用演员的`actorId`作为键，在`NSMutableArray\
    \ actorViews`中查找`UIImageView`。如果没有找到`UIImageView`，则说明这个演员刚刚被添加，因此我们必须创建它。\n\n\
    创建`UIImageView`很简单：基于演员的`imageName`创建一个`UIImage`，然后用它创建一个新的`UIImageView`。然后我们将`UIImageView`放入`NSMutableDictionary\
    \ actorViews`中，同样使用演员的 ID 作为键。最后，我们将新的`UIImageView`添加到`actorView`。我们将新的`UIImageView`的`frame`设置为零大小，以防止一些重绘问题。这个`frame`很快就会更新。\n\
    \n## 在屏幕上放置`UIImageView`\n\n创建`UIImageView`（如果需要）之后，我们必须确定它在屏幕上的绘制位置。第一步是找出游戏区域大小与屏幕上`actorView`实际大小之间的关系。我们可以简单地将`actorView`的宽度除以游戏区域的宽度来计算`xFactor`。对高度进行同样的操作来计算`yFactor`。一旦有了这些比例，我们就可以计算`UIImageView`的`frame`。当我们计算出构成`UIImageView`新`frame`的四个值后，就设置它。图\
    \ 5-10 说明了如何计算这些值。\n\n![9781430244226_Fig05-10.jpg](img/9781430244226_Fig05-10.jpg)\n\
    \n**图 5-10.** 将游戏坐标转换为屏幕坐标\n\n在图 5-10 中，左侧我们看到游戏区域，右侧是描述`actorView`的`frame`的`CGRect`。左侧的圆形是一个需要转换为`actorView`上`CGRect`的`Actor02`。我们首先通过找到`Actor02`的左上角点来确定`GCFrame`的原点。通过从`Actor02`的`center`\
    \ X 值减去`Actor02`的`radius`来找到左上角点的 X 值。要找到 Y 值，我们从`Actor02`的`center` Y 值减去`radius`。为了将这些点转换为`actorView`的坐标空间，我们只需将左上角点的\
    \ X 值乘以`xFactor`，并将 Y 值乘以`yFactor`。`xFactor`和`yFactor`值是`gameAreaSize`的宽度和高度与`actorView`的`frame`的宽度和高度之间的比例。要找到`actorView`的`frame`的大小，我们只需将`radius`乘以`xFactor`和`yFactor`来得到宽度和高度。\n\
    \n当用户触摸`UIView actorView`时，我们必须反向进行这个过程：将`actorView`上的点转换为游戏空间中的点。这个转换发生在`tapGesture:`任务中，如列表\
    \ 5-18 所示。\n\n**列表 5-18.** Example02Controller.h (`tapGesture:`)\n\n```objective-c\n\
    - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{\n    UITapGestureRecognizer*\
    \ tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;\n\n    CGPoint pointOnView\
    \ = [tapRecognizer locationInView:actorView];\n\n    float xFactor = actorView.frame.size.width/self.gameAreaSize.width;\n\
    \    float yFactor = actorView.frame.size.height/self.gameAreaSize.height;\n\n\
    \    CGPoint pointInGame = CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);\n\
    \n    [viper setMoveToPoint:pointInGame];\n}\n```\n\n在列表 5-18 中，我们通过调用`tapRecognizer`上的`locationInView:`并传入`actorView`，将结果存储在`pointOnView`中，来找到用户触摸的位置。重新计算`xFactor`和`yFactor`值后，我们简单地将`pointOnView`的\
    \ X 和 Y 值除以`xFactor`和`yFactor`，得到`pointInGame`。使用这个值，我们只需设置`viper`的`moveToPoint`属性为`pointInGame`。\n\
    \n为了结束这个示例，让我们看一下改变`actorView`大小的代码，如列表 5-19 所示。\n\n**列表 5-19.** Example02Controller.m\
    \ (`sliderValueChanged:`)\n\n```objective-c\n- (IBAction)sliderValueChanged:(id)sender\
    \ {\n    UISlider* slider = (UISlider*)sender;\n    float newWidth = [slider value];\n\
    \    float newHeight = gameAreaSize.height/gameAreaSize.width*newWidth;\n\n  \
    \  CGRect parentFrame = [[actorView superview] frame];\n    float newX = (parentFrame.size.width-newWidth)/2.0;\n\
    \    float newY = (parentFrame.size.height-newHeight)/2.0;\n\n    CGRect newFrame\
    \ = CGRectMake(newX, newY, newWidth, newHeight);\n    [actorView setFrame:newFrame];\n\
    }\n```\n\n列表 5-19 中的`sliderValueChanged:`任务在用户调整屏幕底部的滑块时被调用。滑块被配置为在 80 到 320 之间的值，我们将其用作`newWidth`的值。我们基于`newWidth`计算`newHeight`，保持宽高比。一旦有了`actorView`的新宽度和高度，我们找到使`actorView`保持居中的\
    \ X 和 Y 值。一旦我们有了`actorView`新`frame`的所有必要值，就设置它。\n\n## 演员状态与动画\n\n现在我们有了基本的动画集，是时候为演员增加一些活力了。我们将在上一个示例的基础上进行扩展，并添加两种效果。第一种是让小行星看起来像是在太空中翻滚。第二种是让飞船在移动之前旋转。这两种技术都会更新每个演员使用的图像，以产生视觉效果。我们还会为飞船添加一些状态逻辑，以便能够跟踪飞船应该做什么——保持不动、旋转或移动到目标点。图\
    \ 5-10 展示了这个下一个示例的实际效果。\n\n### 翻滚效果\n\n在图 5-11 中，我们看到飞船正在向左上角的某个点推进。场景中有四个小行星，每个都有不同的图形。当你运行示例时，你会看到它们似乎在翻滚。这种翻滚效果是通过每隔几帧动画更改表示小行星的图像来实现的。也就是说，所使用的图像创建了动画，就像翻页书一样。图\
    \ 5-12 显示了用于创建动画的图像。\n\n![9781430244226_Fig05-11.jpg](img/9781430244226_Fig05-11.jpg)\n\
    \n**图 5-11.** 为演员添加动画和状态\n\n![9781430244226_Fig05-12.jpg](img/9781430244226_Fig05-12.jpg)\n\
    \n**图 5-12.** 构成小行星变体 B 动画的图像\n\n在图 5-12 中，我们看到小行星的 31 张图像。\n"
- fmt: "# 排版后的内容\n\n如果图像按顺序显示，从左上角移动到右下角，那么小行星看起来就像在滚动。动画是一个循环，因此最后一幅图像之后可以显示第一幅图像，从而创建平滑的动画。为了理解我们如何实现这个动画，让我们看一下更新类`Actor03`的头文件，如[清单5-20](#9781430244226_Ch05.xhtml#list20)所示。\n\
    \n**清单5-20.**  `Actor03.h`\n\n```objc\n#import <Foundation/Foundation.h>\n\n@class\
    \ Example03Controller;\nlong nextId;\n@interface Actor03 : NSObject {\n  \n}\n\
    @property (nonatomic, retain) NSNumber* actorId;\n@property (nonatomic) CGPoint\
    \ center;\n@property float rotation;\n@property (nonatomic) float speed;\n@property\
    \ (nonatomic) float radius;\n@property (nonatomic, retain) NSString* imageName;\n\
    @property (nonatomic) BOOL needsImageUpdated;\n\n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius\
    \ AndImage:(NSString*)anImageName;\n-(void)step:(Example03Controller*)controller;\n\
    -(BOOL)overlapsWith: (Actor03*) actor;\n\n@end\n```\n\n在[清单5-20](#9781430244226_Ch05.xhtml#list20)中，我们看到一些小的变化。我们添加了两个新属性：`rotation`和`needsImageUpdate`。`rotation`属性并不是指小行星的旋转；`rotation`属性将由更新后的`Viper03`类用于指示它面向的方向。属性`needsImageUpdated`是一个指示符，表示应为此角色使用新的`UIImage`。通过将此值设置为`YES`，我们使每个小行星在动画过程中请求新图像。让我们看看利用此属性的`Asteroid03`类中的变化——参见[清单5-21](#9781430244226_Ch05.xhtml#list21)。\n\
    \n**清单5-21.**  `Asteroid03.h`和`Asteroid03.m`（部分）\n\n```objc\n//From Asteroid.h\n\
    #define NUMBER_OF_IMAGES 31\n...\n@property (nonatomic) int imageNumber;\n@property\
    \ (nonatomic, retain) NSString* imageVariant;\n\n//From Asteroid.m\n-(NSString*)imageName{\n\
    \    return [[imageVariant stringByAppendingString:@\"_\"] stringByAppendingString:[NSString\
    \ stringWithFormat:@\"%04d\", self.imageNumber]];\n}\n\n-(void)step:(Example03Controller*)controller{\n\
    \    if ([controller stepNumber]%2 == 0){\n        self.imageNumber = imageNumber\
    \ + 1;\n        if (self.imageNumber > NUMBER_OF_IMAGES) {\n            self.imageNumber\
    \ = 1;\n        }\n        self.needsImageUpdated = YES;\n    } else {\n     \
    \   self.needsImageUpdated = NO;\n    }\n\n    CGPoint newCenter = self.center;\n\
    \    newCenter.y + = self.speed;\n    self.center = newCenter;\n\n    if (newCenter.y\
    \ - self.radius > controller.gameAreaSize.height){\n        [controller removeActor:\
    \ self];\n    }\n}\n```\n\n在[清单5-12](#9781430244226_Ch05.xhtml#list12)中，我们向小行星类添加了两个新属性：`imageNumber`和`imageVariant`。属性`imageNumber`跟踪应显示的当前图像。与前面的示例一样，有三种类型的小行星：A、B和C。属性`imageVariant`记录应使用这些图像序列中的哪一个。\n\
    \n在[清单5-12](#9781430244226_Ch05.xhtml#list12)中，我们可以看到我们添加了一个名为`imageName`的新任务。此任务覆盖由`Actor03`定义的合成任务。通过这种方式，我们更改了返回的图像名称。我们获取`imageVariant`并附加图像编号，创建一个形式为“`Asteroid_B_0004`”的字符串（如果小行星是B类型且`imageNumber`等于4）。\n\
    \n查看[清单5-12](#9781430244226_Ch05.xhtml#list12)中的`step`任务，我们看到我们在开头添加了一个新部分，用于更新应显示的图像。每隔一帧，我们将`imageNumber`的值增加1，当它超过常量`NUMBER_OF_IMAGES`时重置回1。每次更改`imageNumber`时，我们都希望将`needsImageUpdated`设置为`YES`；否则，我们将其设置为`NO`。\n\
    \n让我们看一下`updateActorView:`任务，了解`Example03Controller`如何使用此信息来确保显示正确的图像。参见[清单5-22](#9781430244226_Ch05.xhtml#list22)。\n\
    \n**清单5-22.**  `Example03Controller.m`（`updateActorView:`）\n\n```objc\n-(void)updateActorView:(Actor03*)actor{\n\
    \    UIImageView* imageView = [actorViews objectForKey:[actor actorId]];\n\n \
    \   if (imageView == nil){\n        UIImageView* imageView = [[UIImageView alloc]\
    \ initWithImage:[UIImage imageNamed:[actor imageName]]];\n        [actorViews\
    \ setObject:imageView forKey:[actor actorId]];\n        [imageView setFrame:CGRectMake(0,\
    \ 0, 0, 0)];\n        [actorView addSubview:imageView];\n    } else {\n      \
    \  if ([actor needsImageUpdated]){\n            [imageView setImage:[UIImage imageNamed:[actor\
    \ imageName]]];\n        }\n    }\n\n    float xFactor = actorView.frame.size.width/self.gameAreaSize.width;\n\
    \n    float yFactor = actorView.frame.size.height/self.gameAreaSize.height;\n\
    \    float x = (actor.center.x-actor.radius)*xFactor;\n    float y = (actor.center.y-actor.radius)*yFactor;\n\
    \    float width = actor.radius*xFactor*2;\n    float height = actor.radius*yFactor*2;\n\
    \    CGRect frame = CGRectMake(x, y, width, height);\n\n    imageView.transform\
    \ = CGAffineTransformIdentity;\n    [imageView setFrame:frame];\n    imageView.transform\
    \ = CGAffineTransformRotate(imageView.transform, [actor rotation]);\n}\n```\n\n\
    在[清单5-22](#9781430244226_Ch05.xhtml#list22)中，如果属性`needsImageUpdated`设置为`YES`，我们只需再次在角色上调用`imageName`来更新`imageView`的图像。这就是让小行星看起来在太空中滚动所需的全部操作。\n\
    \n## 旋转效果\n\n现在我们有办法指示应更新角色的图像，我们可以使用相同的功能为飞船赋予一些生命力。在[清单5-22](#9781430244226_Ch05.xhtml#list22)的底部，我们可以看到`imageView`的变换首先被修改为单位变换，然后设置其`frame`，最后再次修改变换，应用旋转。\n\
    \n在[清单5-22](#9781430244226_Ch05.xhtml#list22)中添加旋转逻辑使我们能够创建一个在移动到目标点`moveToPoint`之前旋转朝向它的飞船。[图5-13](#9781430244226_Ch05.xhtml#Fig13)显示了飞船在不同状态下将使用的精灵。\n\
    \n![9781430244226_Fig05-13.jpg](images/9781430244226_Fig05-13.jpg)\n\n**图5-13.**\
    \  用于不同飞船状态的图像\n\n在[图5-13](#9781430244226_Ch05.xhtml#Fig13)中，我们看到四个图像。左边的图像在飞船停止时使用。左起第二个图像在飞船运动时使用。右边的两个图像在飞船转弯时使用——每个方向一个。让我们看一下类`Viper03`的头文件，了解需要进行哪些更改才能使其工作。参见[清单5-23](#9781430244226_Ch05.xhtml#list23)。\n\
    \n**清单5-23.**  `Viper03.h`\n\n```objc\n#define STATE_STOPPED 0\n#define STATE_TURNING\
    \ 1\n#define STATE_TRAVELING 2\n\n#import <Foundation/Foundation.h>\n#import \"\
    Actor03.h\"\n\n@interface Viper03 : Actor03 {\n  \n}\n@property CGPoint moveToPoint;\n\
    @property int state;\n@property BOOL clockwise;\n\n+(id)viper:(Example03Controller*)controller;\n\
    -(void)doCollision:(Actor03*)actor In:(Example03Controller*)controller;\n@end\n\
    ```\n\n在[清单5-23](#9781430244226_Ch05.xhtml#list23)中，我们看到我们定义了一些表示三种状态的常量。我们还添加了一个新的`state`属性来记录`Viper03`的当前状态。我们还添加了属性`clockwise`来跟踪我们转弯的方向。因此，从`Asteroid03`类我们知道，我们将在任务`imageName`中指定将使用的图像，参见[清单5-24](#9781430244226_Ch05.xhtml#list24)。"
  raw: 'If the images are showed in succession, moving from the top left to the bottom
    right, it will appear as if the asteroid is rolling. The animation is a loop,
    so the first image can be shown after the last, creating a smooth animation. To
    understand how we implement this animation, let’s take a look at the header file
    for the update class `Actor03`, as shown in [Listing 5-20](#9781430244226_Ch05.xhtml#list20).    [**Listing
    5-20.**](#9781430244226_Ch05.xhtml#_list20)  Actor03.h    ``` #import <Foundation/Foundation.h>  @class
    Example03Controller; long nextId; @interface Actor03 : NSObject {  } @property
    (nonatomic, retain) NSNumber* actorId; @property (nonatomic) CGPoint center; @property
    float rotation; @property (nonatomic) float speed; @property (nonatomic) float
    radius; @property (nonatomic, retain) NSString* imageName; @property (nonatomic)
    BOOL needsImageUpdated;  -(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius
    AndImage:(NSString*)anImageName; -(void)step:(Example03Controller*)controller;
    -(BOOL)overlapsWith: (Actor03*) actor;  @end ```    In [Listing 5-20](#9781430244226_Ch05.xhtml#list20),
    we see a number of small changes. We have added two new properties: `rotation`
    and `needsImageUpdate`. The `rotation` property does not refer to the `rotation`
    of the asteroid; the `rotation` property will be used by the updated `Viper03`
    class to indicate what direction it is facing. The property `needsImageUpdated`
    is a property that indicates that a new `UIImage` used should be used for this
    actor. By setting this value to `YES`, we cause each asteroid to ask for a new
    image while it is being animated. Let’s take a look at the changes in the `Asteroid03`
    class that take advantage of this property—see [Listing 5-21](#9781430244226_Ch05.xhtml#list21).    [**Listing
    5-21.**](#9781430244226_Ch05.xhtml#_list21)  Asteroid03.h and Asteroid03.m (partial)    ```
    //From Asteroid.h #define NUMBER_OF_IMAGES 31 ... @property (nonatomic) int imageNumber;
    @property (nonatomic, retain) NSString* imageVariant; //From Asteroid.m -(NSString*)imageName{
        return [[imageVariant stringByAppendingString:@"_"] stringByAppendingString:[NSString
    stringWithFormat:@"%04d", self.imageNumber]]; }  -(void)step:(Example03Controller*)controller{
        if ([controller stepNumber]%2 == 0){         self.imageNumber = imageNumber
    + 1;         if (self.imageNumber > NUMBER_OF_IMAGES) {             self.imageNumber
    = 1;         }         self.needsImageUpdated = YES;     } else {         self.needsImageUpdated
    = NO;     }      CGPoint newCenter = self.center;     newCenter.y + = self.speed;
        self.center = newCenter;      if (newCenter.y - self.radius > controller.gameAreaSize.height){
            [controller removeActor: self];     } } ```    In [Listing 5-12](#9781430244226_Ch05.xhtml#list12),
    we added two new properties to the asteroid class: `imageNumber` and `imageVariant`.
    The property `imageNumber` keeps track of the current image that should be displayed.
    Like the previous example, there are three types of asteroids: A, B, and C. The
    property `imageVariant` records which one of these sequences of images should
    be used.    In [Listing 5-12](#9781430244226_Ch05.xhtml#list12), we can see that
    we added a new task called `imageName`. This task overrides the synthetic task
    as defined by `Actor03`. In this way, we alter the name of the image that is returned.
    We take the `imageVariant` and append the image number to it, creating a string
    that is of the form “`Asteroid_B_0004`” if the asteroid is of the B variety and
    if `imageNumber` is equal to 4.    Looking at the task step in [Listing 5-12](#9781430244226_Ch05.xhtml#list12),
    we see that we added a new section at the beginning that updates which image should
    be displayed. Every other frame, we increase the value of `imageNumber` by one,
    resetting  back to one when it exceeds the constant `NUMBER_OF_IMAGES`. Each time
    we change `imageNumber,` we want to set `needsImageUpdated` to `YES;` otherwise
    we set it to `NO`.


    Let’s take a look at the task `updateActorView:` and see how `Example03Controller`
    uses this information to make sure the correct image is displayed. See [Listing
    5-22](#9781430244226_Ch05.xhtml#list22).    [**Listing 5-22.**](#9781430244226_Ch05.xhtml#_list22)  Example03Controller.m
    (updateActorView:)    ``` -(void)updateActorView:(Actor03*)actor{     UIImageView*
    imageView = [actorViews objectForKey:[actor actorId]];      if (imageView == nil){
            UIImageView* imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:[actor
    imageName]]];         [actorViews setObject:imageView forKey:[actor actorId]];
            [imageView setFrame:CGRectMake(0, 0, 0, 0)];         [actorView addSubview:imageView];
        } else {         if ([actor needsImageUpdated]){             [imageView setImage:[UIImage
    imageNamed:[actor imageName]]];         }     }      float xFactor = actorView.frame.size.width/self.gameAreaSize.width;      float
    yFactor = actorView.frame.size.height/self.gameAreaSize.height;     float x =
    (actor.center.x-actor.radius)*xFactor;     float y = (actor.center.y-actor.radius)*yFactor;
        float width = actor.radius*xFactor*2;     float height = actor.radius*yFactor*2;
        CGRect frame = CGRectMake(x, y, width, height);      imageView.transform =
    CGAffineTransformIdentity;     [imageView setFrame:frame];     imageView.transform
    = CGAffineTransformRotate(imageView.transform, [actor rotation]);  } ```    In
    [Listing 5-22](#9781430244226_Ch05.xhtml#list22), we update the image of the `imageView`
    if the property `needsImageUpdated` is set to `YES` by simply calling `imageName`
    on the actor again. That’s all it takes to make the asteroids appear to roll through
    space.    The Rotating Effect    Now that we have a way to indicate that the image
    of an actor should be updated, we can use that same feature to give some life
    to the spaceship. At the bottom of [Listing 5-22](#9781430244226_Ch05.xhtml#list22),
    we can see that the transformation of the `imageView` is first modified to an
    identify transformation, then its `frame` is set, and finally the transform is
    modified again, applying the rotation.    The addition of the rotation logic in
    [Listing 5-22](#9781430244226_Ch05.xhtml#list22) allows us to create a spaceship
    that rotates toward its `moveToPoint` before traveling to it. [Figure 5-13](#9781430244226_Ch05.xhtml#Fig13)
    shows the sprites we are going to use while the ship is in different states.    ![9781430244226_Fig05-13.jpg](images/9781430244226_Fig05-13.jpg)    [Figure
    5-13.](#9781430244226_Ch05.xhtml#_Fig13)  Images used for different spaceship
    states    In [Figure 5-13](#9781430244226_Ch05.xhtml#Fig13), we see four images.
    The image on the left is used when the spaceship is stopped. The second image
    from the left is used while the ship is in motion. The two images on the right
    are used when the ship is turning—one for each direction the ship will turn. Let’s
    take a look at the header file for the class `Viper03` and see what changes are
    required to make this work. See [Listing 5-23](#9781430244226_Ch05.xhtml#list23).    [**Listing
    5-23.**](#9781430244226_Ch05.xhtml#_list23)  Viper03.h    ``` #define STATE_STOPPED
    0 #define STATE_TURNING 1 #define STATE_TRAVELING 2  #import <Foundation/Foundation.h>
    #import "Actor03.h"  @interface Viper03 : Actor03 {  } @property CGPoint moveToPoint;
    @property int state; @property BOOL clockwise;  +(id)viper:(Example03Controller*)controller;
    -(void)doCollision:(Actor03*)actor In:(Example03Controller*)controller; @end ```    In
    [Listing 5-23](#9781430244226_Ch05.xhtml#list23), we see that we define some constants
    representing our three states. We have also added a new `state` property to record
    the current state of the `Viper03`. We also added the property `clockwise` to
    keep track of which direction we are turning. So we know from the `Asteroid03`
    class that we will be specifying which image we will be using in the task `imageName`,
    [Listing 5-24](#9781430244226_Ch05.'
