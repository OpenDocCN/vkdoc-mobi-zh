    But, this is an exercise for another time.    The last `Actor` we are looking
    at is `Powerup`.    The Powerup Class    The `Powerup` class is pretty simple,
    really. It is just an `Actor` that moves from the right to the left. We have reviewed
    in other chapters how it appears to be spinning and how it flashes at the end
    of its life. In this game, the interesting thing is the effect it has on a `Viper`.
    This feature is implemented in the task `doHitOn:in:`, as shown in [Listing 12-23](#9781430244226_Ch12.xhtml#list23).    **[Listing
    12-23](#9781430244226_Ch12.xhtml#_list23).** `Powerup.m` (`doHitOn:in:`)    ```
    -(void)doHitOn:(Viper*)viper in:(GameController*)gameController{     if (self.variant
