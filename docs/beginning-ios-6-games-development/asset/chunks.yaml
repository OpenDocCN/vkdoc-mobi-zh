    \n指定 `gameAreaSize` 后，我们初始化了 `actors` 和 `actorViews`。然后我们添加了第一个演员。为了在其他演员后面添加星空背景，我们可以向场景中添加一个新的\
    \ `Actor02`，并指定 `star_field_iphone` 图像。由于基类 `Actor02` 没有指定任何行为，这个演员将简单地停留在背景中，提供漂亮的星空。使用演员作为背景的好处是它会与其他演员一起缩放和拉伸。缺点则是它会像游戏中的其他演员一样被对待，并消耗一点计算时间。\n\
    \n添加背景后，我们创建了 `Viper02`，将其赋值给变量 `viper`，并将其添加到场景中。我们保留了对它的引用，以便在用户触摸屏幕时可以轻松访问它。我们知道这将是一个频繁执行的操作，所以每次都遍历所有演员来查找正确的对象是没有意义的。对于任何特定的游戏，都需要仔细考虑哪些演员需要以特殊方式引用。在编程便捷性、执行速度和内存使用之间需要找到一个平衡点。遗憾的是，关于应该创建哪些额外的数据结构，并没有硬性规定。在第一次开发游戏（或应用程序）时，我会尽量少做优化，等到游戏更完整时再找出应用中的热点。在开发过程的早期进行优化可能会使功能开发复杂化；然而，在开发结束时进行优化可能会更加复杂，甚至可能永远无法完成。Listing\
    \ 5-14 中的两个步骤是向 `actorView` 添加一个 `UITapGestureRecognizer`，以及设置 `CADisplayLink`。这些步骤的执行方式与第一个示例完全相同。\n\
    \n在查看场景如何更新之前，我们先看看 `addActor:` 和 `removeActor:` 这两个任务，以便我们能够完整理解演员是如何从场景中添加和移除的。Listing\
    \ 5-15 展示了这两个任务。\n\n**Listing 5-15.**  Example02Controller.m (addActor: 和 removeActor:)\n\
    \n```\n-(void)removeActor:(Actor02*)actor{\n    [toBeRemoved addObject:actor];\n\
    }\n-(void)doRemove{\n    for (Actor02* actor in toBeRemoved){\n        UIImageView*\
    \ imageView = [actorViews objectForKey:[actor actorId]];\n        [actorViews\
    \ removeObjectForKey:actor];\n        [imageView removeFromSuperview];\n     \
    \   [actors removeObject:actor];\n    }\n    [toBeRemoved removeAllObjects];\n\
    }\n```\n\n在 Listing 5-15 中，`addActor` 任务只是将演员添加到 `NSMutableArray actors` 中。如果你想跟踪添加的演员，这就是你该做的地方。同样地，`removeActor`\
    \ 任务只是将演员添加到 `NSMutableArray toBeRemoved` 中，以便稍后清理。`doRemove` 任务找到用于在屏幕上绘制该演员的\
    \ `UIImageView`，并将其从 `UIView actorViews` 中移除。通过调用 `removeFromSuperview`，该 `UIImageView`\
    \ 也会从场景中被移除。对象 `actor` 也会从 `NSMutableArray actors` 中被移除。现在我们已经了解了演员是如何从游戏中添加和移除的，接下来我们看一下\
    \ `updateScene` 任务，它会被定期调用来将游戏推进一帧，如 Listing 5-16 所示。\n\n**Listing 5-16.**  Example02Controller.m\
    \ (updateScene)\n\n```\n-(void)updateScene{\n    if (stepNumber % (60*10) == 0){\n\
    \        [self addActor:[Asteroid02 asteroid:self]];\n    }\n    for (Actor02*\
    \ actor in actors){\n        [actor step:self];\n    }\n    for (Actor02* actor\
    \ in actors){\n        if ([actor isKindOfClass:[Asteroid02 class]]){\n      \
    \      if ([viper overlapsWith:actor]){\n                [viper doCollision:actor\
    \ In:self];\n                break;\n            }\n        }\n    }\n    for\
    \ (Actor02* actor in actors){\n        [self updateActorView:actor];\n    }\n\
    \    [self doRemove];\n    stepNumber++;\n}\n```\n\n在 Listing 5-16 中，我们看到了 `updateScene`\
    \ 任务，这是游戏的心脏，它每秒被调用大约 60 次，我们在这里推进游戏进程。我们要做的第一件事是检查是否要向游戏中添加一颗新小行星。这是通过对 `stepNumber`\
    \ 取模 600 并检查结果是否为零来完成的。实际上，由于游戏以大约每秒 60 帧的速度运行，这相当于每 10 秒向场景中添加一个新的 `Asteroid02`。\n\
    \n在测试完是否应该添加新小行星后，我们遍历游戏中的所有演员，并对它们调用 `step:`。这给了每个演员一个根据其特定行为推进状态的机会。背景将不做任何事，小行星会向下移动，而飞船则会朝其\
    \ `moveToPoint` 移动。在更新完每个演员的位置后，我们需要测试是否发生碰撞。这通过再次遍历所有演员，找到那些是小行星的演员，并检查碰撞状态来完成。对于这个简单的例子，遍历所有演员来寻找碰撞是可以接受的。然而，在一个更复杂的应用程序中，改进这个算法（哪怕是当前这样的算法）可能很重要。改进措施包括将所有小行星保存在它们自己的数组中，并可能按位置进行排序。\n\
    \n## 为每个演员更新 UIView\n\n我们已经测试了是否发生碰撞，现在我们必须确定每个演员的 `UIImageView` 的新位置。这通过 `updateActorView:`\
    \ 任务完成，如 Listing 5-17 所示。\n\n**Listing 5-17.**  Example02Controller.\n\n"
- fmt: "# `updateActorView:`\n\n```objective-c\n-(void)updateActorView:(Actor02*)actor{\n\
    \    UIImageView* imageView = [actorViews objectForKey:[actor actorId]];\n   \
    \ if (imageView == nil){\n        UIImageView* imageView = [[UIImageView alloc]\
    \ initWithImage:[UIImage imageNamed:[actor imageName]]];\n        [actorViews\
    \ setObject:imageView forKey:[actor actorId]];\n        [imageView setFrame:CGRectMake(0,\
    \ 0, 0, 0)];\n        [actorView addSubview:imageView];\n    }\n\n    float xFactor\
    \ = actorView.frame.size.width/self.gameAreaSize.width;\n    float yFactor = actorView.frame.size.height/self.gameAreaSize.height;\n\
    \n    float x = (actor.center.x-actor.radius)*xFactor;\n    float y = (actor.center.y-actor.radius)*yFactor;\n\
    \    float width = actor.radius*xFactor*2;\n    float height = actor.radius*yFactor*2;\n\
    \    CGRect frame = CGRectMake(x, y, width, height);\n    [imageView setFrame:frame];\n\
    }\n```\n\n在[列表5-17](#9781430244226_Ch05.xhtml#list17)中，我们首先找到表示传入演员的`UIImageView`。我们通过使用演员的`actorId`作为键，在`NSMutableArray\
    \ actorViews`中查找`UIImageView`。如果没有找到`UIImageView`，则说明这个演员刚刚被添加，因此我们必须创建它。\n\n\
    创建`UIImageView`很简单：基于演员的`imageName`创建一个`UIImage`，然后用它创建一个新的`UIImageView`。然后我们将`UIImageView`放入`NSMutableDictionary\
    \ actorViews`中，同样使用演员的ID作为键。最后，我们将新的`UIImageView`添加到`actorView`。我们将新的`UIImageView`的`frame`设置为零大小，以防止一些重绘问题。这个`frame`很快就会更新。\n\
    \n## 在屏幕上放置`UIImageView`\n\n创建`UIImageView`（如果需要）之后，我们必须确定它在屏幕上的绘制位置。第一步是找出游戏区域大小与屏幕上`actorView`实际大小之间的关系。我们可以简单地将`actorView`的宽度除以游戏区域的宽度来计算`xFactor`。对高度进行同样的操作来计算`yFactor`。一旦有了这些比例，我们就可以计算`UIImageView`的`frame`。当我们计算出构成`UIImageView`新`frame`的四个值后，就设置它。[图5-10](#9781430244226_Ch05.xhtml#Fig10)说明了如何计算这些值。\n\
    \n![9781430244226_Fig05-10.jpg](images/9781430244226_Fig05-10.jpg)\n\n**图5-10.**\
    \ 将游戏坐标转换为屏幕坐标\n\n在[图5-10](#9781430244226_Ch05.xhtml#Fig10)中，左侧我们看到游戏区域，右侧是描述`actorView`的`frame`的`CGRect`。左侧的圆形是一个需要转换为`actorView`上`CGRect`的`Actor02`。我们首先通过找到`Actor02`的左上角点来确定`GCFrame`的原点。通过从`Actor02`的`center`\
    \ X值减去`Actor02`的`radius`来找到左上角点的X值。要找到Y值，我们从`Actor02`的`center` Y值减去`radius`。为了将这些点转换为`actorView`的坐标空间，我们只需将左上角点的X值乘以`xFactor`，并将Y值乘以`yFactor`。`xFactor`和`yFactor`值是`gameAreaSize`的宽度和高度与`actorView`的`frame`的宽度和高度之间的比例。要找到`actorView`的`frame`的大小，我们只需将`radius`乘以`xFactor`和`yFactor`来得到宽度和高度。\n\
    \n当用户触摸`UIView actorView`时，我们必须反向进行这个过程：将`actorView`上的点转换为游戏空间中的点。这个转换发生在`tapGesture:`任务中，如[列表5-18](#9781430244226_Ch05.xhtml#list18)所示。\n\
    \n**列表5-18.** Example02Controller.h (`tapGesture:`)\n\n```objective-c\n- (void)tapGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer{\n    UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;\n\
    \n    CGPoint pointOnView = [tapRecognizer locationInView:actorView];\n\n    float\
    \ xFactor = actorView.frame.size.width/self.gameAreaSize.width;\n    float yFactor\
    \ = actorView.frame.size.height/self.gameAreaSize.height;\n\n    CGPoint pointInGame\
    \ = CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);\n\n    [viper setMoveToPoint:pointInGame];\n\
    }\n```\n\n在[列表5-18](#9781430244226_Ch05.xhtml#list18)中，我们通过调用`tapRecognizer`上的`locationInView:`并传入`actorView`，将结果存储在`pointOnView`中，来找到用户触摸的位置。重新计算`xFactor`和`yFactor`值后，我们简单地将`pointOnView`的X和Y值除以`xFactor`和`yFactor`，得到`pointInGame`。使用这个值，我们只需设置`viper`的`moveToPoint`属性为`pointInGame`。\n\
    \n为了结束这个示例，让我们看一下改变`actorView`大小的代码，如[列表5-19](#9781430244226_Ch05.xhtml#list19)所示。\n\
    \n**列表5-19.** Example02Controller.m (`sliderValueChanged:`)\n\n```objective-c\n\
    - (IBAction)sliderValueChanged:(id)sender {\n    UISlider* slider = (UISlider*)sender;\n\
    \    float newWidth = [slider value];\n    float newHeight = gameAreaSize.height/gameAreaSize.width*newWidth;\n\
    \n    CGRect parentFrame = [[actorView superview] frame];\n    float newX = (parentFrame.size.width-newWidth)/2.0;\n\
    \    float newY = (parentFrame.size.height-newHeight)/2.0;\n\n    CGRect newFrame\
    \ = CGRectMake(newX, newY, newWidth, newHeight);\n    [actorView setFrame:newFrame];\n\
    }\n```\n\n[列表5-19](#9781430244226_Ch05.xhtml#list19)中的`sliderValueChanged:`任务在用户调整屏幕底部的滑块时被调用。滑块被配置为在80到320之间的值，我们将其用作`newWidth`的值。我们基于`newWidth`计算`newHeight`，保持宽高比。一旦有了`actorView`的新宽度和高度，我们找到使`actorView`保持居中的X和Y值。一旦我们有了`actorView`新`frame`的所有必要值，就设置它。\n\
    \n## 演员状态与动画\n\n现在我们有了基本的动画集，是时候为演员增加一些活力了。我们将在上一个示例的基础上进行扩展，并添加两种效果。第一种是让小行星看起来像是在太空中翻滚。第二种是让飞船在移动之前旋转。这两种技术都会更新每个演员使用的图像，以产生视觉效果。我们还会为飞船添加一些状态逻辑，以便能够跟踪飞船应该做什么——保持不动、旋转或移动到目标点。[图5-10](#9781430244226_Ch05.xhtml#Fig10)展示了这个下一个示例的实际效果。\n\
    \n### 翻滚效果\n\n在[图5-11](#9781430244226_Ch05.xhtml#Fig11)中，我们看到飞船正在向左上角的某个点推进。场景中有四个小行星，每个都有不同的图形。当你运行示例时，你会看到它们似乎在翻滚。这种翻滚效果是通过每隔几帧动画更改表示小行星的图像来实现的。也就是说，所使用的图像创建了动画，就像翻页书一样。[图5-12](#9781430244226_Ch05.xhtml#Fig12)显示了用于创建动画的图像。\n\
    \n![9781430244226_Fig05-11.jpg](images/9781430244226_Fig05-11.jpg)\n\n**图5-11.**\
    \ 为演员添加动画和状态\n\n![9781430244226_Fig05-12.jpg](images/9781430244226_Fig05-12.jpg)\n\
    \n**图5-12.** 构成小行星变体B动画的图像\n\n在[图5-12](#9781430244226_Ch05.xhtml#Fig12)中，我们看到小行星的31张图像。"
