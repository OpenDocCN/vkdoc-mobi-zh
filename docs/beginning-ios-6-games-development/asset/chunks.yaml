    足够灵活，并不强制您这样做，但我曾多次因这种灵活性而吃亏。好了，既然我们已将所需的类添加到项目中，接下来就让我们连接界面以包含它。


    ### 自定义 UIView


    准备简单应用程序的最后一步是在界面中创建一个属于`RockPaperScissorsView`类的新`UIView`。Figure 1-9 展示了如何做到这一点。


    ![9781430244226_Fig01-09.jpg](img/9781430244226_Fig01-09.jpg)


    *Figure 1-9. 自定义的 UIView*


    在 Figure 1-9 中，我们看到在右侧视图中添加了一个`UIView`。我们通过将项目 A 中的图标拖到项目 B 中的故事板上来实现。调整新`UIView`的大小后，我们将其类设置为`RockPaperScissorsView`，如项目
    C 所示。至此，技术上我们已经完成了。我们创建了我们的第一个游戏！显然，我们还没有查看`RockPaperScissorsView`的实现，这将在下一章讨论。


    本书的其余部分将以示例 1 作为起点。您将学习许多新技术来定制一个简单的应用程序，以制作一个真正完整的游戏。


    ### 总结


    在本章中，我们快速浏览了 Xcode，学习了如何用它创建项目，并使用 Storyboard 构建简单的导航。后续章节将在这些基础知识上补充内容，向您展示如何构建一个完整的游戏。


    ## 第二章 设置您的游戏项目


    与所有软件项目一样，iOS 游戏开发受益于良好的开端。在本章中，我们将讨论设置一个新的 Xcode 项目，作为许多游戏的合适起点。这将包括创建一个可用于在
    iPhone 和 iPad 上部署的项目，同时处理横屏和竖屏方向。


    我们将研究 iOS 应用程序是如何初始化的，以及我们可以在何处开始自定义行为，以匹配我们对应用程序应该如何执行的期望。我们还将探索 iOS 应用程序中用户界面(UI)元素的创建和修改方式，特别关注管理不同设备和方向。


    我们将在本章创建的游戏与第一章中的简单示例非常相似——事实上，玩法完全相同。但我们将为后续章节打下基础，同时练习一些关键技巧，例如使用`UIViewControllers`和
    Interface Builder。


    我们将探索 iOS 应用程序是如何组合在一起的，并解释关键的类。我们还将创建新的 UI 元素，并学习如何使用 Interface Builder 自定义它们。我们还将探索使用
    MVC 模式创建灵活、可重用的代码元素。到本章结束时，我们将创建如图 Figure 2-1 所示的“Rock, Paper, Scissors”应用程序。


    ![9781430244226_Fig02-01.jpg](img/9781430244226_Fig02-01.jpg)


    *Figure 2-1. 适用于 iPhone 和 iPad 所有方向的应用程序设计*


    Figure 2-1 展示了在 iPhone 和 iPad 模拟器上运行的应用程序。这是一个所谓的通用应用程序：它可以在这两种设备上运行，并以此方式在 App
    Store 中呈现。除非有特定的商业理由编写仅适用于 iPhone 或 iPad 的应用程序，否则将您的应用程序做成通用版是很有意义的。即使您最初只打算在其中一个设备上发布应用，从长远来看，这也会为您节省时间。


    我们的示例应用程序非常简单，以至于可能很难看出 Figure 2-1 中呈现的四种状态之间的差异。在左上角（iPhone 竖屏方向），灰色区域的位置与左下角
    iPhone 横屏时的布局不同。文本的布局也不同。应用程序在 iPad 上运行时，横屏与竖屏的情况也是如此。让我们开始了解如何设置一个项目来适应这些不同的设备和方向。


    ### 创建您的游戏项目


    要开始我们的示例游戏，我们首先必须在 Xcode 中创建一个新项目。


    通过选择 File ➤ New ➤ New Project...来创建一个新项目。这将打开一个向导，允许您选择所需项目的类型，如 Figure 2-2 所示。


    ![9781430244226_Fig02-02.jpg](img/9781430244226_Fig02-02.jpg)


    *Figure 2-2. 创建新的 Single View Application*


    在 Figure 2-2 的左侧，我们从 iOS 部分选择了 Application。右侧是可用于创建 iOS 应用程序的项目类型。这里提供的选择通过为开发人员提供一个合理的起点来帮助他们。这对于刚接触
    iOS 的开发人员尤其有帮助，因为这些模板为多种常见的应用导航风格提供了起点。我们将选择 Single View Application，因为我们只需要一个非常简洁的起点，并且
    Single View Application 为通用应用程序提供了良好的支持。点击 Next 后，我们看到 Figure 2-3 所示的选项。


    ![9781430244226_Fig02-03.jpg](img/9781430244226_Fig02-03.jpg)


    *Figure 2-3. 新项目的详细信息*


    我们要做的第一件事是命名我们的产品。您可以选择任何您喜欢的名称。公司标识符将在应用提交过程中用于标识应用。您可以输入任何值作为公司标识符，但通常的做法是使用反向域名。如
    Figure 2-3 所示，Bundle Identifier 是产品名称和公司标识符的组合。Bundle Identifier 稍后可以更改——向导只是显示默认值。当您将游戏提交到
    App Store 时，Bundle Identifier 用于指示您正在上传的是哪个应用程序。

