    \  \n\n我们最后要查看的`Actor`是`Powerup`。  \n\n## Powerup 类  \n\n`Powerup`类实际上非常简单。它只是一个从右向左移动的`Actor`。我们在其他章节中已经介绍过它如何旋转以及如何在生命周期结束时闪烁。在本游戏中，有趣之处在于它对`Viper`的影响。此功能在任务`doHitOn:in:`中实现，如[清单\
    \ 12-23](#9781430244226_Ch12.xhtml#list23) 所示。  \n\n**[清单 12-23](#9781430244226_Ch12.xhtml#_list23).**\
    \ `Powerup.m` (`doHitOn:in:`)  \n\n```  \n-(void)doHitOn:(Viper*)viper in:(GameController*)gameController{\
    \  \n    if (self.variant == VARIATION_HEALTH){  \n        [viper incrementHealth:30];\
