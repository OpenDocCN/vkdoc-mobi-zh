    to the `NSMutableSet` sorted. In this way, we can later find all actors of a particular
    type with a quick lookup in the `NSMutableDictionary actorClassToActorSet`. The
    last step in `doAddActors` is to remove all of the actors from the set `actorsToBeRemoved`.    In
    the preceding listing, we see the task `doRemoveActors` that parallels the task
    `doAddActors`. In `doRemoveActors`, each actor in the `NSMutableSet actorsToBeRemoved`
