    \ 4 章——目前你只需知道它会加载所有用于显示硬币的图像即可。加载完成后，我们移除 `loadingView` 并添加 `welcomeView`。\n\n\
    欢迎视图才是用户真正开始使用应用程序的地方。从这里开始，用户可以访问应用程序中感兴趣的部分。\n\n## 响应用户操作切换视图\n\n一旦显示欢迎视图，用户便会看到多个按钮（该视图如图\
    \ 3-3 所示）。顶部的“继续游戏”按钮仅在用户退出应用程序时游戏尚未完成的情况下才会出现。每个按钮都会引导用户导航至一个新视图。实现方式是先建立一个当用户触摸按钮时会被调用的任务。在代码清单\
    \ 3-1 中，我们看到 `GameController.h` 文件中声明了许多任务。以 `IBAction` 开头的任务就是按钮被触摸时会被调用的任务。在头文件中声明这些任务后，你就可以将每个按钮连接到对应的任务。图\
    \ 3-9 展示了连接按钮的第一步。\n\n![9781430244226_Fig03-09.jpg](img/9781430244226_Fig03-09.jpg)\n\
    \n图 3-9.  将 `aboutClicked:` 操作连接到“关于”按钮\n\n在图 3-9 中，我们看到通过右键点击“文件所有者”显露出的“连接”菜单。通过从\
