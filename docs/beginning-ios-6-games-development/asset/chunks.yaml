    numberWithFloat:0.0f];         animScaleUp.toValue = [NSNumber numberWithFloat:1.0f];
            animScaleUp.duration = 1.0;         animScaleUp.beginTime = CACurrentMediaTime()
    + 1.0;         animScaleUp.timingFunction = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseOut];          if
    (coinViewA == coinView){             [animScaleDown setDelegate:self];             [animScaleUp
    setDelegate:self];         }          [coinView.layer addAnimation:animScaleDown
    forKey:@"animScaleDown"];         [coinView.layer addAnimation:animScaleUp forKey:@"animScaleUp"];
        } } ```    The task `doSwitch:With:` is responsible for updating the model
    and creating the animations. To update the model, we simply call `swap:With:`
    on `coinsGame`. To create the animations, we have to work with a class called
    `CABasicAnimation`. A `CABasicAnimation` object describes a change in a `CALayer`.
    A `CALayer` is an object that represents the visual content of a `UIView`.    Up
    until this point, we have said that a `UIView` provides the content on the screen,
    and that is still true, but a `UIView` uses the Core Animation layer to implement
    how it is drawn. As such, each `UIView` has a `layer` property of type `CALayer`.
    You need to understand this in order to understand how `CABasicAnimation` works.
    Looking at [Listing 4-25](#9781430244226_Ch04.xhtml#list25), you can see that
    a `CABasicAnimation` is created by specifying a path. In our case, the path is
    `transform.scale`. This is a path into the `CALayer` object associated with the
    `UIView` we wish to animate.    For each `UIView`, `coinViewA` and `coinViewB`,
    we will be creating two `CABasicAnimation` objects. When we create the `CABasicAnimation`
    object `animScaleDown`, we specify that this `CABasicAnimation` will be manipulating
    the value of `scale` on the property `transform`. We specify the starting value
    of the `scale` by setting the `fromValue` of `animScaleDown`, and we specify the
    ending value by setting the `toValue`. The value duration indicates how many seconds
    we want this animation to take. By specifying the `timingFunction`, we control
    the rate at which this animation will take place. In this case, we indicate `kCAMediaTimingFunctionEaseIn`,
    which tells the `CABasicAnimation` to start out slow and then speed up.    The
    `CABasicAnimation animScaleUp` is similar to `animScaleDown`. The big difference
    is that the `fromValue` and `toValue` are opposite. We also set the value for
    `beginTime` to 1 second in the future. The idea here is that we want the animation
    `animScaleDown` to run for a second, making the coin get small enough to vanish,
    and then we want the animation `animScaleUp` to run when `animScaleDown` is done,
    scaling the coin back up. The trick will be to swap the images used by the two
    coin views between these two animations.'
  trans: "```objective-c\n`UIImage* imageForCoin(int coin) {  \n    if (coin == COIN_TRIANGLE)\
    \ {  \n        return [UIImage imageNamed:@\"coin_triangle0001\"];  \n    } else\
    \ if (coin == COIN_SQUARE) {  \n        return [UIImage imageNamed:@\"coin_square0001\"\
    ];  \n    } else if (coin == COIN_CIRCLE) {  \n        return [UIImage imageNamed:@\"\
    coin_circle0001\"];  \n    }  \n    return nil;  \n}`\n```\n\n在清单 4-24 中，我们可以看到当之前选择了一个硬币时执行的代码。\n\
    \n**清单 4-24.** `CoinsController.m (tapGesture:, continued)`\n\n```\nif (CoordEqual(firstSelectedCoin,\
    \ coinCoord)){\n    // 重新选中了第一个硬币\n    isFirstCoinSelected = false;\n    [self\
    \ spinCoinAt:firstSelectedCoin];\n} else {\n    // 选中了另一个硬币，执行交换操作\n    acceptingInput\
    \ = false;\n    [coinsGame setRemaingTurns: [coinsGame remaingTurns] - 1];\n \
    \   [delegate turnsRemainingDecreased:self with: [coinsGame remaingTurns]];\n\
    \    \n    isFirstCoinSelected = false;\n    secondSelectedCoin = coinCoord;\n\
    \    [self stopCoinAt:secondSelectedCoin];\n    [self doSwitch:firstSelectedCoin\
    \ With:secondSelectedCoin];\n}\n```\n\n如果用户选择了同一个硬币，我们只需再次旋转该硬币并将`isFirstCoinSelected`设置为`false`。然而，如果用户选择了不同的硬币，则需要进行交换。首先将`acceptingInput`设置为`false`，这样在动画进行时用户无法中断。我们还需要减少剩余回合数，并通知委托。接着将`isFirstCoinSelected`设置为`false`，以便下次调用该方法时不会选中任何硬币。在将第二个硬币的坐标记录到变量`secondSelectedCoin`后，停止选中的硬币并调用`doSwitch:With:`，传入第一个和第二个选中的硬币。`doSwitch`任务将在下一节的清单\
    \ 4-25 中展示，负责创建硬币交换位置的动画。\n\n接下来讨论如何在不使用前面描述的静态`UIView`任务的情况下创建动画。\n\n## 使用 Core\
    \ Animation 对视图进行动画处理\n\n之前我们探讨了`UIView`类中用于创建动画的任务。这些任务提供了 iOS 上动画实现方式的不透明视图。本节将更深入地探讨如何利用称为\
    \ Core Animation 的框架来定义动画。Core Animation 是负责 iOS 设备上大多数动画的框架，也是静态`UIView`任务在底层使用的框架。\n\
    \n理解 Core Animation 的最佳方式是继续我们的示例，看看如何创建硬币交换位置的动画。图 4-8 展示了硬币交换位置的动画。\n\n![9781430244226_Fig04-08.jpg](img/9781430244226_Fig04-08.jpg)\n\
    \n**图 4-8.** 硬币交换位置\n\n第一列第二行的一个正方形硬币与第二列最后一行的一个三角形硬币进行交换。每个硬币先缩小到几乎看不见，然后交换硬币类型，再恢复到正常大小。这通过在`doSwitch:With:`任务中实现，如清单\
    \ 4-25 所示。\n\n**清单 4-25.** `CoinsController.m (doSwitch:With:)`\n\n```\n-(void)doSwitch:(Coord)coordA\
    \ With:(Coord)coordB {\n    [coinsGame swap:coordA With:coordB];\n    \n    coinViewA\
    \ = [[coinsView subviews] objectAtIndex:[coinsGame indexForCoord:coordA]];\n \
    \   coinViewB = [[coinsView subviews] objectAtIndex:[coinsGame indexForCoord:coordB]];\n\
    \    \n    for (UIView* coinView in [NSArray arrayWithObjects:coinViewA, coinViewB,\
    \ nil]){\n        CABasicAnimation* animScaleDown = [CABasicAnimation animationWithKeyPath:@\"\
    transform.scale\"];\n        [animScaleDown setValue:@\"animScaleDown\" forKey:@\"\
    name\"];\n        animScaleDown.fromValue = [NSNumber numberWithFloat:1.0f];\n\
    \        animScaleDown.toValue = [NSNumber numberWithFloat:0.0f];\n        animScaleDown.duration\
    \ = 1.0;\n        animScaleDown.timingFunction = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseIn];\n\
    \        \n        CABasicAnimation* animScaleUp = [CABasicAnimation animationWithKeyPath:@\"\
    transform.scale\"];\n        [animScaleUp setValue:@\"animScaleUp\" forKey:@\"\
    name\"];\n        animScaleUp.fromValue = [NSNumber numberWithFloat:0.0f];\n \
    \       animScaleUp.toValue = [NSNumber numberWithFloat:1.0f];\n        animScaleUp.duration\
    \ = 1.0;\n        animScaleUp.beginTime = CACurrentMediaTime() + 1.0;\n      \
    \  animScaleUp.timingFunction = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseOut];\n\
    \        \n        if (coinViewA == coinView){\n            [animScaleDown setDelegate:self];\n\
    \            [animScaleUp setDelegate:self];\n        }\n        \n        [coinView.layer\
    \ addAnimation:animScaleDown forKey:@\"animScaleDown\"];\n        [coinView.layer\
    \ addAnimation:animScaleUp forKey:@\"animScaleUp\"];\n    }\n}\n```\n\n`doSwitch:With:`任务负责更新模型和创建动画。为了更新模型，我们只需在`coinsGame`上调用`swap:With:`。为了创建动画，我们需要使用名为`CABasicAnimation`的类。`CABasicAnimation`对象描述了`CALayer`中的变化。`CALayer`是代表`UIView`视觉内容的对象。\n\
    \n到目前为止，我们一直说`UIView`提供屏幕上的内容，这仍然是正确的，但`UIView`使用 Core Animation 层来实现它的绘制方式。因此，每个`UIView`都有一个类型为`CALayer`的`layer`属性。你需要理解这一点才能明白`CABasicAnimation`的工作原理。查看清单\
    \ 4-25，你可以看到`CABasicAnimation`是通过指定路径来创建的。在我们的例子中，路径是`transform.scale`。这是指向我们想要动画化的`UIView`所关联的`CALayer`对象的路径。\n\
    \n对于每个`UIView`（`coinViewA`和`coinViewB`），我们都会创建两个`CABasicAnimation`对象。当我们创建`CABasicAnimation`对象`animScaleDown`时，我们指定该`CABasicAnimation`将操纵`transform`属性上的`scale`值。我们通过设置`animScaleDown`的`fromValue`来指定`scale`的起始值，并通过设置`toValue`来指定结束值。`duration`值表示我们希望此动画持续多少秒。通过指定`timingFunction`，我们控制此动画的播放速率。在这种情况下，我们指定`kCAMediaTimingFunctionEaseIn`，告诉`CABasicAnimation`先慢后快。\n\
    \n`CABasicAnimation animScaleUp`与`animScaleDown`类似。主要区别在于`fromValue`和`toValue`相反。我们还将`beginTime`的值设置为未来\
    \ 1 秒。这里的思路是，我们希望`animScaleDown`动画运行一秒，使硬币缩小到消失，然后当`animScaleDown`完成时，运行`animScaleUp`动画，将硬币缩放回正常大小。关键在于在这两个动画之间交换两个硬币视图所使用的图像。"
- fmt: "我们可以通过将`self`设置为动画`animScaleDown`的`delegate`来实现此操作，前提是我们正在处理`coinViewA`，因为我们只需要被通知一次。我们还希望在所有这些动画结束时得到通知，因此也将`self`设置为`animScaleUp`的`delegate`。已设置委托的动画在完成后将调用任务`animationDidStop:finished:`，如[清单\
    \ 4-26](#9781430244226_Ch04.xhtml#list26)所示。\n\n**清单 4-26.** `CoinsController\
    \ (animationDidStop:finished:)`\n\n```objc\n- (void)animationDidStop:(CAAnimation\
    \ *)theAnimation finished:(BOOL)flag{\n    if ([[theAnimation valueForKey:@\"\
    name\"] isEqual:@\"animScaleDown\"]){\n        UIImage* imageA = [coinViewA image];\n\
    \        [coinViewA setImage:[coinViewB image]];\n        [coinViewB setImage:imageA];\n\
    \    } else if ([[theAnimation valueForKey:@\"name\"] isEqual:@\"animScaleUp\"\
    ]){\n        [self checkMatches];\n        [self spinCoinAt:firstSelectedCoin];\n\
    \        [self spinCoinAt:secondSelectedCoin];\n    } else if ([[theAnimation\
    \ valueForKey:@\"name\"] isEqual:@\"animateOffScreen\"]){\n        [coinsGame\
    \ randomizeRows: matchingRows];\n        [coinsGame randomizeCols: matchingCols];\n\
    \        [self updateCoinViews];\n    }\n}\n```\n\n这里我们看到了任务`animationDidStop:finished:`。注意有三个动画调用了此任务。前两个`if`语句用于处理[清单\
    \ 4-25](#9781430244226_Ch04.xhtml#list25)中描述的动画。当`animScaleDown`动画完成时，我们交换`UIImageViews`所使用的`UIImages`，以表示两个被选中的硬币。\n\
    \n当动画`animScaleUp`完成时，我们希望检查是否存在匹配。调用`checkMatches`即可实现。我们还希望重新开始旋转最近选中的硬币。`checkMatches`的实现如[清单\
    \ 4-27](#9781430244226_Ch04.xhtml#list27)所示。\n\n**清单 4-27.** `CoinsController.m\
    \ (checkMatches)`\n\n```objc\n-(void)checkMatches{\n    matchingRows = [coinsGame\
    \ findMatchingRows];\n    matchingCols = [coinsGame findMatchingCols];\n    int\
    \ rowCount = [coinsGame rowCount];\n    int colCount = [coinsGame colCount];\n\
    \    BOOL isDelegateSet = NO;\n\n    if ([matchingRows count] > 0){\n        for\
    \ (NSNumber* row in matchingRows){\n            for (int c = 0;c < colCount;c++){\n\
    \                CABasicAnimation* animateOffScreen = [CABasicAnimation animationWithKeyPath:@\"\
    position.x\"];\n                [animateOffScreen setValue:@\"animateOffScreen\"\
    \ forKey:@\"name\"];\n                animateOffScreen.byValue = [NSNumber numberWithFloat:coinsView.frame.size.width];\n\
    \                animateOffScreen.duration = 2.0;\n                animateOffScreen.timingFunction\
    \ = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseIn];\n \
    \               Coord coord = CoordMake([row intValue], c);\n                int\
    \ index = [coinsGame indexForCoord:coord];\n                UIImageView* coinView\
    \ = [[coinsView subviews] objectAtIndex: index];\n                if (c == 0){\n\
    \                    [animateOffScreen setDelegate:self];\n                  \
    \  isDelegateSet = YES;\n                }\n                [coinView.layer addAnimation:animateOffScreen\
    \ forKey:@\"animateOffScreenX\"];\n            }\n        }\n    }\n\n    if ([matchingCols\
    \ count] > 0){\n        for (NSNumber* col in matchingCols){\n            for\
    \ (int r = 0;r < rowCount;r++){\n                CABasicAnimation* animateOffScreen\
    \ = [CABasicAnimation animationWithKeyPath:@\"position.y\"];\n               \
    \ [animateOffScreen setValue:@\"animateOffScreen\" forKey:@\"name\"];\n      \
    \          animateOffScreen.byValue = [NSNumber numberWithFloat:coinsView.frame.size.height];\n\
    \                animateOffScreen.duration = 2.0;\n                animateOffScreen.timingFunction\
    \ = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseIn];\n \
    \               Coord coord = CoordMake(r, [col intValue]);\n                int\
    \ index = [coinsGame indexForCoord:coord];\n                UIImageView* coinView\
    \ = [[coinsView subviews] objectAtIndex: index];\n                if (!isDelegateSet\
    \ && r == 0){\n                    [animateOffScreen setDelegate:self];\n    \
    \            }\n                [coinView.layer addAnimation:animateOffScreen\
    \ forKey:@\"animateOffScreenY\"];\n            }\n        }\n    }\n\n    int\
    \ totalMatches = [matchingCols count] + [matchingRows count];\n    if (totalMatches\
    \ > 0){\n        [coinsGame setScore:[coinsGame score] + totalMatches];\n    \
    \    [delegate scoreIncreases:self with:[coinsGame score]];\n    } else {\n  \
    \      if ([coinsGame remaingTurns] <= 0){\n            // delay calling gameOver\
    \ on the delegate so the coin's UIImageViews show the correct coin.\n        \
    \    [NSTimer scheduledTimerWithTimeInterval:1 target:self selector:@selector(doEndGame)\
    \ userInfo:nil repeats:FALSE];\n        } else {\n            // all matches are\
    \ done animating and we have turns left.\n            acceptingInput = YES;\n\
    \        }\n    }\n}\n```\n\n我们通过在`coinsGame`上调用`findMatchingRows`和`findMatchinCols`来找出所有匹配的行和列。获得这些匹配数组后，我们希望将所有参与匹配的硬币动画移出屏幕。如果存在`matchingRows`，我们为每个硬币创建一个新的`CABasicAnimation`，用于修改底层`CALayer`对象的`x`位置值。我们不需要设置`x`的确切起始值和结束值，只需指定`byValue`，并将其设置为`coinsView`的`width`。通过指定`byValue`，我们可以将此动画用于行中的所有硬币，因为该动画将简单地将`fromValue`推断为每个硬币视图的起始`x`值，而`toValue`将是`fromValue`\
    \ + `byValue`。\n\n创建匹配行和列的动画后，我们检查本轮总共生成了多少个匹配。如果该值大于零，我们更新`coinsGame`对象的分数，并通知`delegate`分数已更改。如果没有找到匹配，我们检查游戏是否结束。如果游戏结束，我们使用`NSTimer`类在1秒后调用`doEndGame`。此延迟是出于美观原因；在显示高分之前稍作停顿是很好的。如果游戏尚未结束，我们只需再次开始接受输入。[清单\
