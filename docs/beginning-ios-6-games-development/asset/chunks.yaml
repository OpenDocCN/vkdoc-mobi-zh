  trans: "\n这份宣传单是在某次大会上分发的。制作这份宣传单时，我正忙于更新游戏的画面，因此决定在宣传单上使用新画风，尽管当时 App Store 中的游戏尚未用新画风进行更新。所以，当人们下载游戏后，他们下载到的是旧画风的版本，如图\
    \ A-5 所示。\n\n![9781430244226_App-05.jpg](img/9781430244226_App-05.jpg)\n\n图 A-5.\
    \ 《太空攻击！！》，旧画风\n\n由于游戏画面与宣传单上的画面不符，而且游戏画面明显更差，人们感觉被欺骗了，尽管游戏是免费的！我未能重视用户的期望，也因此付出了一些差评的代价。如果我能及时在大会前更新游戏，或者在广告中使用旧版画面，这种情况本可以轻易避免。\n\
    \n我们快速了解了电子游戏中的风格是什么以及它为何重要。现在，让我们将焦点转向创建图像文件这类更实际的问题。之后，我们将会回顾一些用于创建 2D 美术的出色工具。\n\
    \n### 创建图像文件\n\n无论你的游戏美术方向如何，最终你都需要一些特定尺寸的图像文件来真正实现你的游戏。我们将首先探索一些命名规范，这些规范能帮助你在需要为不同设备提供不同图像时进行管理。接着，我们将回顾所有\
    \ iOS 应用都需要的图像——比如图标和启动画面。最后，我们将讨论如何选择合适的图像尺寸来结束本节内容。\n\n### 命名规范\n\n在撰写本文时，创建应用程序时必须考虑三种不同的屏幕分辨率。根据应用程序运行在三种分辨率中的哪一种来使用不同的图像，这是非常普遍的需求。为了支持这些分辨率，人们创建了一种命名规范，以便以尽可能简单的方式实现这一点。其思路是，通过以特定方式命名图像，设备会根据自身情况加载不同的图像。因此，无需在代码中测试你使用的是哪种设备。这种命名规范的格式如下：\n\
    \n```\n基本文件名[@2x][~iphone|~pad].扩展名\n```\n\n因此，`基本文件名`可以是任意名称——例如，`\"background\"\
    `。然后你可以选择性地附加一个`@2x`，以表示该图像适用于高分辨率显示屏，例如 iPhone 4 的 Retina 显示屏。在指明图像是否为高分辨率版本之后，你可以指定设备类别，即\
    \ iPhone 或 iPad。最后，像平常一样加上扩展名。表 A-1 展示了对于一张原本会被称为 `background.png` 的图像，此命名规范是如何工作的。\n\
    \n表 A-1. 竖屏背景图像命名规范\n\n| 设备 | 文件名 | 图像像素分辨率 |\n| --- | --- | --- |\n| iPhone 3GS,\
    \ iPod Touch 第三代 | `background~iphone.png` | 320x480 |\n| iPhone 4, iPod Touch\
    \ 第四代 | `background@2x~iphone.png` | 640x960 |\n| iPad 1, iPad 2, iPad mini |\
    \ `background~ipad.png` | 1024x768 |\n| iPad 第三、四代 | `background@2x~ipad.png`\
    \ | 2048x1536 |\n\n在表 A-1 中，我们看到第一列列出了每一行对应的设备集合。为了给每组设备提供全屏的竖屏背景图像，我们需要按照第二列所示的方式命名背景文件。最右边一列显示了图像的像素分辨率。在本附录的示例代码中，应用程序的背景图像被配置为支持模拟器中可用的设备。我更改了每个背景图像，使其包含文本信息，以指示正在加载的是哪个文件。图\
    \ A-6 展示了不同设备加载不同图像的效果。\n\n![9781430244226_App-06.jpg](img/9781430244226_App-06.jpg)\n\
    \n图 A-6. 为每台设备设置不同的背景\n\n在图的左侧，我们看到 iPhone 运行时的显示效果与 iPhone 3GS 相同。中间部分显示的是相对于\
    \ 3GS 而言，如同在 iPhone 4 上运行时的屏幕尺寸。右侧则是第一代和第二代 iPad 的屏幕尺寸。代码清单 A-1 为该应用程序设置了背景图像。\n\
    \n**代码清单 A-1.** `ViewController.m (viewDidLoad)`\n\n```\n- (void)viewDidLoad {\n\
    \    [super viewDidLoad];\n    UIImage* image = [UIImage imageNamed:@\"background\"\
    ];\n    [backgroundImageView setImage:image];\n}\n```\n\n在代码清单 A-1 中，我们看到类 `ViewController`\
    \ 的 `viewDidLoad` 任务。我们通过调用 `imageNamed` 并仅传入基本文件名来加载一个 `UIImage`。返回的是根据项目中包含的图像文件名、适用于特定设备的图像。在本例中，我们使用的文件名与表\
    \ A-1 中显示的相同。\n\n现在让我们来看看如何根据设备类型指定其他支持图像，例如图标和启动画面。\n\n### 支持图像\n\n每个 iOS 应用都必须附带一些图像文件。最起码，必须指定一个图标。另外，还可以指定一个在应用启动时显示的图像。通常，提供启动图像是一个好主意，尤其是当你的应用启动需要一些时间时。指定要使用的图像非常简单：Xcode\
    \ 提供了可以拖拽图像以指定图标和启动图像的位置，如图 A-7 和 A-8 所示。\n\n![9781430244226_App-07.jpg](img/9781430244226_App-07.jpg)\n\
    \n图 A-7. 为 iPhone 指定图标和启动图像\n\n![9781430244226_App-08.jpg](img/9781430244226_App-08.jpg)\n\
    \n图 A-8. 为 iPad 指定图标和启动图像\n\n在图 A-7 中，我们看到有四个地方可以拖入 iPhone 版应用的图像；图 A-8 则显示了 iPad\
    \ 版的情况。请注意，对于 iPad，可以指定横屏和竖屏版本，而 iPhone 只允许竖屏图像。在图 A-7 和 A-8 中，图像被标记为“未指定图像”。最上面的两个允许你指定应用的图标。你可以为\
    \ Retina 显示屏指定不同的图像，因此可以提供高分辨率版本。要指定图像，只需将图像拖拽到其中一个位置即可。该图像可以是项目中已有的，也可以是其他图像。Xcode\
    \ 会检查你拖入这些框中的图像是否适合其角色。如果不适合，系统会弹出一个错误对话框，如图 A-9 所示。\n\n![9781430244226_App-09.jpg](img/9781430244226_App-09.jpg)\n\
    \n图 A-9. 指定了不合适的图像作为图标\n\n图 A-9 显示了一个错误对话框，当一张尺寸不正确的图像被拖入 Xcode 中的应用图标位置时会触发该对话框。尽管提供了简单的拖放界面，但要正确格式化所有图像实际上可能有些棘手。之所以棘手，是因为大多数网站（包括\
    \ Apple 的网站）上关于图像尺寸的信息都是错误的。我希望在你读到这篇文章时，Apple 已经在其网站上修复了这个问题。[表 A-2](#9781430244226_App.\n"
- fmt: "# Support Image Sizes\n\n[Table A-2](#9781430244226_App.xhtml#_Tab2) lists\
    \ the correct image sizes for each support image.\n\n![image](images/TableA-2.jpg)\n\
    \nOnce you create the files in the correct size, you can drag them into the appropriate\
    \ spots on Xcode. Xcode will automatically copy the files into the project directory\
    \ (if required) and add the files to the project. Older versions of iOS relied\
    \ on a naming convention to specify which file was which. This was pretty buggy\
    \ and hard to maintain. The newer versions of iOS and Xcode allow you to name\
    \ your files anything you want. [Listing A-2](#9781430244226_App.xhtml#list2)\
    \ shows how this information is represented in our `info.plist` file.\n\n**[Listing\
    \ A-2](#9781430244226_App.xhtml#_list2).** `Sample A–Info.plist`\n\n```\n<key>CFBundlePrimaryIcon</key>\n\
    \       <dict>\n             <key>CFBundleIconFiles</key>\n             <array>\n\
    \                    <string>my_icon_file.png</string>\n                    <string>my_icon_file_retina.png</string>\n\
    \                    <string>my_icon_file_ipad.png</string>\n             </array>\n\
    \             <key>UIPrerenderedIcon</key>\n             <false/>\n       </dict>\n\
    ```\n\nIn [Listing A-2](#9781430244226_App.xhtml#list2), we see that the filenames\
    \ are simply stored in an array. The names of files are the names I gave them,\
    \ and they can be anything—they are not names assigned by Xcode.\n\nWe have looked\
    \ at two examples of how we can have a single logical image, but with a few different\
    \ versions of it at different resolutions. The following section talks briefly\
    \ about how best to create the same image at different resolutions.\n\n## Multi-Resolution\
    \ Images\n\nThere are several cases where an application has two different images\
    \ files, at different resolutions, that are being used as the same logical image\
    \ in the application. This is done so that the application can provide the best\
    \ user experience based on which device the user has. The ideal situation for\
    \ any application is to display images at a 1:1 ratio (number of pixels in the\
    \ image to the number of pixels on the screen). We want to avoid scaling wherever\
    \ possible, because the scaling produces lower-quality images and is an extra\
    \ and potentially expensive operation.\n\nApple computers seem to really excel\
    \ at scaling images. If you have the opportunity, try playing an old-fashioned\
    \ DVD (not a high-definition video) on one of the new 27–inch iMacs. When played\
    \ in full-screen mode, the images are scaled up a lot, yet still look excellent.\
    \ Whatever this magic scaling algorithm is, it seems to be included in iOS devices\
    \ as well. As a result, it is tempting to simply use high-definition images for\
    \ everything and let iOS scale the images down when the application is running\
    \ on a lower-resolution device. This will work; the quality of the scaled images\
    \ is very good. However, when it comes to animations, it really starts to pay\
    \ off to provide those smaller images for the low-res device. Remember that the\
    \ iPhone 3GS not only has a smaller screen but it also is less of a computer than\
    \ the iPhone 4. By having the iPhone 3GS scale down the images, you are asking\
    \ a device with less computing power to do more. It is worth the trouble to maintain\
    \ two sets of images in most cases.\n\nWhen creating high-resolution and low-resolution\
    \ sets of images, we could just create the high-resolution set and create a script\
    \ that scales down each one to make a low-res version. This strategy will definitely\
    \ prevent the slower device from having to do the scaling, but it can hurt quality,\
    \ especially with text. If your art assets are part of a rendering process of\
    \ any kind—say, from a 3D representation or from vector art—it makes sense to\
    \ render each image twice, once for high resolution and then again for low resolution.\n\
    \n## A Multi-Resolution Example\n\nLet’s look at an example. Say you are creating\
    \ an icon for your application with Adobe Illustrator (or similar application).\n\
    \nIf you create a new file that is 57 pt x 57 pt, you can export this file at\
    \ 72 dpi and get an image that is 57 pixels x 57 pixels—perfect for the low-res\
    \ iPhone icon. You can then export this image again at 144 dpi and get an image\
    \ that is 114 pixels x 114 pixels, which is perfect for the retina version of\
    \ the iPhone. To make the icon for the iPad, you can export again at 92 dpi, making\
    \ an image that is 72 pixels x 72 pixels. [Figure A-10](#9781430244226_App.xhtml#Fig10)\
    \ shows the difference between rendering at different scales and scaling down.\n\
    \n![9781430244226_App-10.jpg](images/9781430244226_App-10.jpg)\n\n**[Figure A-10.](#9781430244226_App.xhtml#_Fig10)**\
    \ Rendering verses scaling\n\nIn [Figure A-10](#9781430244226_App.xhtml#Fig10),\
    \ we see three different versions of an icon. In the middle is a vector presentation,\
    \ nice and smooth. On the left is the image produced by Illustrator when asked\
    \ to export a 57x57 version of the image in the middle. The image looks pixelated\
    \ because it is scaled up so we can see the quality of the rendering. The image\
    \ on the right is the result of Illustrator creating an 114x114 image and then\
    \ having GIMP scale it down to 57x57 (Sinc Lanczos3). Even this simple two-step\
    \ process introduces noise. Notice the lighter pixels around the dot of the *i*\
    \ on the right. Maybe in this case it doesn’t matter too much, but it seems to\
    \ me that if you are going to spend the time (and money) to create high-quality\
    \ art, it is worth going the extra mile and preventing this type of issue.\n\n\
    Keeping with the ideas presented here about quality and rendering, the following\
    \ section walks you through an example of how to select the final image size for\
    \ an application.\n\n## Creating Final Assets\n\nWe have taken a look at how to\
    \ represent images with multiple resolutions and why that is important. But when\
    \ it comes to game art, we still have not answered the question, “How big should\
    \ my images be?” In this section, we will take an example game that runs on both\
    \ the iPad and both versions of the iPhone, and figure out the best sizes for\
    \ images used in that game. We will be using the game from [Chapter 3](#9781430244226_Ch03.xhtml),\
    \ Coin Sorter.\n\nBecause we are working with three possible image sizes—one for\
    \ the iPad and two for iPhone—we should look at the relative sizes (in pixels)\
    \ of these screens and get sense of the differences in size. [Figure A-11](#9781430244226_App.xhtml#Fig11)\
    \ shows the different screen sizes.\n\n![9781430244226_App-11.jpg](images/9781430244226_App-11.jpg)\n\
    \n**[Figure A-11.](#9781430244226_App.xhtml#_Fig11)** Relative resolution of the\
    \ different screens\n\nIn [Figure A-11](#9781430244226_App.xhtml#Fig11), we see\
    \ a rectangle representing the screen size for each of the iOS devices on the\
    \ market. The left-most image is the size of the iPhone 3GS (and its two predecessors).\
    \ The second rectangle from the left shows the size of the iPhone 4, which has\
    \ four times as many pixels as the iPhone 3GS. The third rectangle represents\
    \ the size, in pixels, of the iPad 1 and iPad 2. Note that the iPhone 4 has almost\
    \ as many pixels as the iPad 1 and iPad 2. The rectangle all the way on the right\
    \ is the resolution for the iPad 3rd Generation. Let’s take a look at how these\
    \ different sizes affect our decisions when it comes to laying out our game.\n\
    \n### Screen Real Estate\n\nThough we have three different screen sizes in terms\
    \ of pixels, we have only two different aspect ratios. The aspect ratio of the\
    \ two iPhones is the same at 2:3, while the aspect ratio of the iPad is 3:4. Working\
    \ with these differences, we want to figure out how to lay out our applications\
    \ to make the best use of the screen space. Let’s start by looking at the layout\
    \ of the game from [Chapter 3](#9781430244226_Ch03.xhtml), as shown in [Figure\
    \ A-12](#9781430244226_App.xhtml#Fig12).\n\n![9781430244226_App-12.jpg](images/9781430244226_App-12.jpg)\n\
    \n**[Figure A-12.](#9781430244226_App.xhtml)**"
