    In:(GameController*)aController{     if ([anActor needsViewUpdated]){         [aView
    setNeedsDisplay];         [anActor setNeedsViewUpdated:NO];     } } @end ```    In
    [Listing 7-8](#9781430244226_Ch07.xhtml#list8), we see the implementation of the
    class `VectorRepresentation` and that it has a trivial constructor. We also see
    that it implements the tasks `getViewForActor:In:`  and `updateView:In:` as defined
    by the protocol `Representation`. In the task `getViewForActor:In:` we create
    a new `VectorActorView`, and specify the actor and delegate that should be used
    to draw. Then we call `setNeedsViewUpdated`, making sure the actor’s drawing code
    is called at least once.    In the task, `updateView:In:` we check to see if the
    actor needs updating; if so, we call `setNeedsDisplay` on the `UIView aView`.
    The task `setNeedsDisplay` is defined by the class `UIView` and indicates to the
    underlying graphics system that the `UIView` should be redrawn. In effect, this
    causes the `drawRect:` task of our `VectorActorView` to be called, which in turn
    will call the `drawActor:WithContext:InRect:` of our actor. Next we want to look
    at the details of the class `VectorActorView`.    A UIView for Vector-Based Actors:
    VectorActorView    The class `VectorActorView` is a subclass of `UIView` and is
    used to represent the actor in the scene in much the same way as we use `UIImageView`
    instances to represent image-based `Actor`s. Let’s take a look at the class `VectorActorView`
    and see how it all fits together, starting with the header. See [Listing 7-9](#9781430244226_Ch07.xhtml#list9).    [**Listing
    7-9.**](#9781430244226_Ch07.xhtml#_list9)  VectorActorView.h    ``` #import <UIKit/UIKit.h>
    #import "Actor.h" #import "VectorRepresentation.h"  @interface VectorActorView
    : UIView {  } @property (nonatomic, retain) Actor* actor; @property (nonatomic,
    retain) NSObject<VectorRepresentationDelegate>* delegate;  @end ```    In [Listing
    7-9](#9781430244226_Ch07.xhtml#list9), we see that `VectorActorView` extends `UIView`
    and has two properties. The first is the `Actor` that is to be drawn. The second
    property is the `VectorRepresentationDelegate` that is responsible for actually
    drawing the `Actor`. In this example, these two objects—the `actor` and the `delegate`—will
    be the same object, either a `Bullet` or a `HealthBar`. However, this is not a
    requirement. I like to keep all the code related to an actor in the actor’s class.
    The delegate could be its own class responsible for drawing the actor. This would
    make sense if you wanted to use a single `VectorRepresentationDelegate` to draw
    multiple types of actors. The implementation of the class `VectorActorView` is
    very simple, as can be seen in [Listing 7-10](#9781430244226_Ch07.xhtml#list10).    [**Listing
    7-10.**](#9781430244226_Ch07.xhtml#_list10)  VectorActorView.m    ``` - (void)drawRect:(CGRect)rect
    {     CGContextRef context = UIGraphicsGetCurrentContext();     [delegate drawActor:actor
    WithContext:context InRect:rect]; } ```    In [Listing 7-10](#9781430244226_Ch07.xhtml#list10),
    we see that the implementation is the class `VectorActorView` a single method,
    the implementation of the task `drawRect:`. In this method, we get a reference
    to the current graphics context by calling `UIGraphicsGetCurrentContext` and passing
    the `context` and the `actor` to the `delegate` to be drawn in the `CGRect` specified.
    Let’s now take a look at a specific example.


    Drawing a HealthBar    As mentioned, the vector-based actors used in this example
    are their own delegates in terms of drawing, so let’s look at the `HealthBar`
    class again and see how it draws itself. See [Listing 7-11](#9781430244226_Ch07.xhtml#list11).    [**Listing
    7-11.**](#9781430244226_Ch07.xhtml#_list11)  HealthBar.m (drawActor:WithContext:InRect:)    ```
    -(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect{
        CGContextClearRect(context,rect);      float height = 10;      CGRect backgroundArea
    = CGRectMake(0, self.radius-height/2, self.radius*2, height);     [self.backgroundColor
    setFill];     CGContextFillRect(context, backgroundArea);      CGRect healthArea
    = CGRectMake(0, self.radius-height/2, self.radius*2*percent, height);     [self.color
    setFill];     CGContextFillRect(context, healthArea);  } ```    In [Listing 7-11](#9781430244226_Ch07.xhtml#list11),
    we start by calling `CGContectClearRect.` This erases any old content in the given
    `rect`, getting us ready to do our real drawing. To draw the `HealthBar`, all
    we have to do is draw two rectangles, one for the background and another on top
    of the background representing the current percentage of the health bar. To draw
    a rectangular area (as apposed to drawing the edges of a rectangle), we define
    a `rect` by calling `CGRectMake`. Then we specify the color to be used by calling
    `setFill` on the `UIColor` object `backgroundColor`, which is a property of `HealthBar`.    To
    actually change the color of the pixels of the `UIView` being drawn, we call `CGContextFillRect`
    passing in our `context` and the `CGRect backgroundArea`. To draw the foreground
    rectangle, we repeat the process, but the width of our top rectangle, `healthArea`,
    is calculated based the value of the property `percent`. This indicates that every
    time the `percent` of the `HealthBar` changes, we have to redraw the `HealthBar`.
    To make sure this happens, we have to provide our own implementation of `setPercent:`
    instead of relying on the default implementation that would be provided by a synthesized
    property. [Listing 7-12](#9781430244226_Ch07.xhtml#list12) shows the custom implementation
    of `setPercent:` for the class `HealthBar`.    [**Listing 7-12.**](#9781430244226_Ch07.xhtml#_list12)  HealthBar.m
    (setPercent:)    ``` -(void)setPercent:(float)aPercent{     if (percent != aPercent){
            percent = aPercent;         if (percent < 0){             percent = 0;
            }         if (percent > 1){             percent = 1;         }         [self
    setNeedsViewUpdated:YES];     } } ```    [Listing 7-12](#9781430244226_Ch07.xhtml#list12)
    shows our custom implementation of `setPercent:`. First we check to see if the
    values of `percent` (the backing variable for the property) and the passed in
    value `aPercent` have different values. If they do, we set `percent` to `aPercent`
    and we normalize the values by ensuring it is between the values 0 and 1\. Lastly,
    we call `setNeedsViewUpdate:` with `YES`. This ensures that the `HealthBar` will
    be redrawn during the next step in the animation. Let’s now take a look at how
    the `Bullet` class is drawn.    Drawing the Bullet Class    We have looked at
    the class `HealthBar` and inspected how it is drawn. We only used a single drawing
    function, `CGContextFillRect`, to create our visual effect. Of course, there are
    many, many more drawing functions that allow you to create any visual effect you
    want. We are not going to cover all of these functions, but there is fantastic
    documentation available online. That being said, let’s take a look at the drawing
    implementation of the class `Bullet`. See [Listing 7-13](#9781430244226_Ch07.xhtml#list13).    [**Listing
    7-13.**](#9781430244226_Ch07.xhtml#_list13)  Bullet.'
