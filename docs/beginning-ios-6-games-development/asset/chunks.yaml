    \n-(void)swap:(Coord)coordA With:(Coord)coordB;\n-(NSMutableArray*)findMatchingRows;\n\
    -(NSMutableArray*)findMatchingCols;\n-(void)randomizeRows:(NSMutableArray*)matchingRows;\n\
    -(void)randomizeCols:(NSMutableArray*)matchingCols;\n\n@end\n```\n\n清单 4-13 展示了`CoinsGame`类的头文件。在类的顶部，我们定义了三个常量：`COIN_TRIANGLE`、`COIN_SQUARE`和`COIN_CIRCLE`。这些值代表了游戏中三种类型的硬币。我们还定义了一个名为`Coord`的结构体，用于存储行/列值对。`Coord`结构体早在清单\
    \ 4-12 中就已用于标识特定的硬币。还有两个与`Coord`结构体配合使用的函数。第一个名为`CoordMake`，用于创建包含相应行和列值的`Coord`。第二个名为`CoordEqual`，用于判断两个`Coord`是否指向同一枚硬币。\n\
    \n清单 4-13 中显示的`CoinsGame`类接口声明遵循了`NSCoding`协议，因此我们知道可以对该类的实例进行归档和解档。我们还看到定义了一个名为`coins`的`NSMutableArray`。`coins`对象用于存储表示每个坐标上硬币类型的`NSNumber`值。此外，使用`int`类型来跟踪剩余回合数、分数以及本游戏中使用的行数和列数。\n\
    \n`CoinsGame`类定义了多种任务，希望其中一些已经很明确了。我们知道需要一种方法来交换两枚硬币，因此使用`swap:With:`任务是有意义的。还有两个任务，`findMatchingRows`和`findMatchingCols`，用于判断是否存在匹配。在找到匹配后，使用`randomizeRows`和`randomizeCols`任务来设置新的硬币值。请注意，`findMatchingRows`返回一个`NSMutableArray`，而`randomizeRows`接受一个`NSMutableArray`。这里的思路是，在找到匹配并且动画完成后，我们可以使用表示该匹配的同一个`NSMutableArray`来指示哪些硬币应该被随机化。\n\
    \n清单 4-13 还有两个以`Coord`为参数的任务。第一个是`coinForCoord:`，它接受一个`Coord`并返回`NSNumber`，表示该坐标处的硬币类型。\n\
    \n第二个任务是`indexForCoord`，用于将`Coord`转换为适合用作数组索引的`int`类型。该任务在`coinForCoord`中用于查找硬币对应的`NSNumber`，同时也被`CoinsController`用来查找硬币对应的正确`UIImageView`。\n\
    \n我们来看一些任务的实现，因为`CoinsController`会在不同阶段调用它们。我们从`initRandomWithRow:Col:`开始，如清单\
    \ 4-14 所示。\n\n**[清单 4-14.]** `CoinsGame.m (initRandomWithRows:Cols:)`\n\n```objc\n\
    -(id)initRandomWithRows:(int)rows Cols:(int)cols{\n    self = [super init];\n\
    \    if (self != nil){\n        coins = [NSMutableArray new];\n\n        colCount\
    \ = cols;\n        rowCount = rows;\n\n        int numberOfCoins = colCount*rowCount;\n\
    \n        for (int i=0;i<numberOfCoins;i++){\n            int result = arc4random()%3;\n\
    \            [coins addObject:[NSNumber numberWithInt:result]];\n        }\n\n\
    \        //确保初始状态没有匹配的行和列\n        NSMutableArray* matchingRows = [self findMatchingRows];\n\
    \        NSMutableArray* matchingCols = [self findMatchingCols];\n        while\
    \ ([matchingCols count] > 0 || [matchingRows count] > 0){\n            [self randomizeRows:\
    \ matchingRows];\n            [self randomizeCols: matchingCols];\n\n        \
    \    matchingRows = [self findMatchingRows];\n            matchingCols = [self\
    \ findMatchingCols];\n        }\n\n        remaingTurns = 10;\n        score =\
    \ 0;\n    }\n    return self;\n}\n```\n\n在清单 4-14 中，我们看到了用于创建包含随机硬币的`CoinsGame`对象的初始化任务。在创建了一个新的`NSMutableArray`并将其赋值给变量`coins`后，我们用游戏中所有硬币的总数填充它。结果的值将为\
    \ 0、1 或 2。设置完第一组随机值后，我们需要确保游戏开始时没有任何匹配。这通过首先调用`findMatchingRows`和`findMatchingCols`并检查它们是否包含内容来实现。如果包含，我们就对这些匹配进行随机化，直到找不到更多的匹配。最后，我们将剩余回合数设置为\
    \ 10，并确保分数从 0 开始。继续探索`CoinsGame`类，我们来看看`coinForCoord:`，如清单 4-15 所示。\n\n**[清单 4-15.]**\
    \ `CoinsGame.m (coinForCoord:)`\n\n```objc\n-(NSNumber*)coinForCoord:(Coord)coord{\n\
    \    int index = [self indexForCoord:coord];\n    return [coins objectAtIndex:index];\n\
    }\n```\n\n任务`coinForCoord:`接受一个`Coord`并返回该位置处的硬币类型。这是通过查找`NSMutableArray coins`中给定索引处的`NSNumber`对象来实现的。该`index`由调用`indexForCoord:`确定，如清单\
    \ 4-16 所示。\n\n**[清单 4-16.]** `CoinsGame.m (indexForCoord:)`\n\n```objc\n-(int)indexForCoord:(Coord)coord{\n\
    \    return coord.row*colCount + coord.col;\n}\n```\n\n任务`indexForCoord:`接受一个`Coord`结构体。这个简单的任务将游戏中的列数乘以`coord`的行值，再加上列值。\n\
    \n`CoinsGame.m`中还有几个任务需要探讨，以帮助您理解`CoinsController`在其生命周期不同阶段的行为。我们接着看任务`swap:With:`，如清单\
    \ 4-17 所示。\n\n**[清单 4-17.]** `CoinsGame.m (swap:With:)`\n"
- fmt: "# `swap:With:`\n\n```objectivec\n-(void)swap:(Coord)coordA With:(Coord)coordB{\n\
    \    int indexA = [self indexForCoord:coordA];\n    int indexB = [self indexForCoord:coordB];\n\
    \    \n    NSNumber* coinA = [coins objectAtIndex:indexA];\n    NSNumber* coinB\
    \ = [coins objectAtIndex:indexB];\n    \n    [coins replaceObjectAtIndex:indexA\
    \ withObject:coinB];\n    [coins replaceObjectAtIndex:indexB withObject:coinA];\n\
    }\n```\n\nThe task `swap:With:` takes two `Coords`, `coordA` and `coordB`. This\
    \ task switches the type of coins at these two coordinates by finding the index\
    \ of each coordinate, the current value of that index in `coins`, and switching\
    \ them. We know that after coins are swapped, `CoinsController` will have to look\
    \ for any matches. This is done with the tasks `findMatchingRows` and `findMatchingCols`.\
    \ [Listing 4-18](#9781430244226_Ch04.xhtml#list18) shows `findMatchingRows`.\n\
    \n**[Listing 4-18.](#9781430244226_Ch04.xhtml#_list18)**  `CoinsGame.m (findMatchingRows)`\n\
    \n```objectivec\n-(NSMutableArray*)findMatchingRows{\n    NSMutableArray* matchingRows\
    \ = [NSMutableArray new];\n    \n    for (int r=0;r<rowCount;r++){\n        NSNumber*\
    \ coin0 = [self coinForCoord:CoordMake(r, 0)];\n        BOOL mismatch = false;\n\
    \        \n        for (int c=1;c<colCount;c++){\n            NSNumber* coinN\
    \ = [self coinForCoord:CoordMake(r,c)];\n            if (![coin0 isEqual:coinN]){\n\
    \                mismatch = true;\n                break;\n            }\n   \
    \     }\n        if (!mismatch){\n            [matchingRows addObject:[NSNumber\
    \ numberWithInt:r]];\n        }\n    }\n    return matchingRows;\n}\n```\n\nThe\
    \ task `findMatchingRows` creates a new `NSMutableArray` called `matchingRows`\
    \ to store any results. Matching rows are found by looking at each row in turn\
    \ and inspecting the coin at each column. This is done by storing the coin at\
    \ column 0 as the variable `coin0` and then by comparing `coin0` to each coin\
    \ in the other columns. If a coin is found that does not match `coin0`, we know\
    \ that there is no match, and `mismatch` is set to `true`. If no mismatches are\
    \ found, we add the value `r` to the `NSMutableArray matchingRows`, which is the\
    \ result of this task. The implementation for `findMatchingCols` is trivially\
    \ different and is omitted for brevity.\n\nWe also know that after matching rows\
    \ are found, `CoinsController` will have to randomize any matches to prepare for\
    \ the next turn the user takes. This is done with the tasks `randomizeRows:` and\
    \ `randomizeCols:`. The task `randomizeRows:` is shown in [Listing 4-19](#9781430244226_Ch04.xhtml#list19).\n\
    \n**[Listing 4-19.](#9781430244226_Ch04.xhtml#_list19)**  `CoinsGame.m (randomizeRows:)`\n\
    \n```objectivec\n-(void)randomizeRows:(NSMutableArray*)matchingRows{\n    for\
    \ (NSNumber* row in matchingRows){\n        for (int c=0;c<colCount;c++){\n  \
    \          int index = [self indexForCoord:CoordMake([row intValue], c)];\n  \
    \          int newCoin = arc4random()%3;\n            [coins replaceObjectAtIndex:index\
    \ withObject:[NSNumber numberWithInt:newCoin]];\n        }\n    }\n}\n```\n\n\
    The task `randomizeRows:` takes an `NSMutableArray` filled with `NSNumbers`. Each\
    \ `NSNumber` is a row. By iterating over each row, we set a new random value for\
    \ every coin in that row. The implementation of `randomizeCols:` is similar; we\
    \ simply randomize each coin for the columns passed in.\n\nNow that you have an\
    \ understanding of the class `CoinsGame`, you can take a further look at `CoinsController`\
    \ and see how this class used the data stored in `CoinsGame` to interpret user\
    \ input, manage the views representing the coins, and create animations based\
    \ on game state.\n\n## Interpreting User Input\n\nWhen the user touches one of\
    \ the coins, we want to mark it as selected. Looking back at [Listing 4-8](#9781430244226_Ch04.xhtml#list8),\
    \ we know that a `UITapGestureRecognizer` was created and added to the `UIView\
    \ coinsView`. This `UITapGestureRecognizer` calls the task `tapGesture:` whenever\
    \ it registers a tap gesture. Let’s look at the first part of `tapGesture:` in\
    \ [Listing 4-20](#9781430244226_Ch04.xhtml#list20).\n\n**[Listing 4-20.](#9781430244226_Ch04.xhtml#_list20)**\
    \  `CoinsController.m (tapGesture:, partial)`\n\n```objectivec\n- (void)tapGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer{\n    \n    if ([coinsGame remainingTurns] > 0 && acceptingInput){\n\
    \        UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;\n\
    \        CGPoint location = [tapRecognizer locationInView:coinsView];\n      \
    \  Coord coinCoord = [self coordFromLocation:location];\n        \n        if\
    \ (!isFirstCoinSelected){//first of the pair\n            isFirstCoinSelected\
    \ = true;\n            firstSelectedCoin = coinCoord;\n            [self stopCoinAt:\
    \ firstSelectedCoin];\n        } else {\n          //shown in Listing 4-24\n \
    \       }\n    }\n}\n```\n\n[Listing 4-20](#9781430244226_Ch04.xhtml#list20) takes\
    \ the `UIGestureRecognizer` that triggered this event as an argument. We will\
    \ use this object to figure out where the user tapped. The first `if` statement\
    \ in this task checks that there are remaining turns and that we are currently\
    \ accepting input. The variable `acceptingInput` is set to `false` during animations\
    \ in order to prevent the user from selecting coins midtransition, which would\
    \ probably cause the user some confusion. After casting `gestureRecognizer` to\
    \ a `UITapGestureRecognizer` called `tapRecognizer`, we get the location of the\
    \ tap by calling `locationInView` and passing in `coinsView`. The location of\
    \ the tap is returned as a `CGPoint` called `location`. In order to know which\
    \ coin was tapped, we convert `location` to `Coord` by calling `coordFromLocation`,\
    \ shown in [Listing 4-21](#9781430244226_Ch04.xhtml#list21).\n\n**[Listing 4-21.](#9781430244226_Ch04.xhtml#_list21)**\
    \  `CoinsController.m (coordFromLocation:)`\n\n```objectivec\n-(Coord)coordFromLocation:(CGPoint)\
    \ location{\n    CGRect coinsFrame = [coinsView frame];\n    Coord result;\n \
    \   result.col = location.x / coinsFrame.size.width * [coinsGame colCount];\n\
    \    result.row = location.y / coinsFrame.size.height * [coinsGame rowCount];\n\
    \    \n    return result;\n}\n```\n\nThe task `coordFromLocation:` takes a `CGPoint`\
    \ and converts it into a `Coord` that will tell us which coin the user tapped.\
    \ To find the coin, the `x` value of the `location` is divided by the `width`\
    \ of the `coinsView` and then multiplied by the number of columns. The `row` is\
    \ calculated in a similar way.\n\nIn [Listing 4-20](#9781430244226_Ch04.xhtml#list20),\
    \ after we determine which coin was tapped and store the result as the variable\
    \ `coinCoord`, we check whether the coin was previously selected. If not, we set\
    \ `isFirstCoinSelected` to `true`, record which coin was selected, and call `stopCoinAt:`,\
    \ shown in [Listing 4-22](#9781430244226_Ch04.xhtml#list22).\n\n**[Listing 4-22.](#9781430244226_Ch04.xhtml#_list22)**\
    \  `CoinsController.m (stopCoinAt:)`\n\n```objectivec\n-(void)stopCoinAt:(Coord)coord{\n\
    \    UIImageView* coinView = [[coinsView subviews] objectAtIndex:[coinsGame indexForCoord:coord]];\n\
    \    NSNumber* coin = [coinsGame coinForCoord:coord];\n    \n    UIImage* image\
    \ = imageForCoin([coin intValue]);\n    [coinView stopAnimating];\n    [coinView\
    \ setImage: image];\n}\n```\n\nThe task `stopCoinAt:` takes the coordinate of\
    \ the coin to stop spinning. This is done by first finding the appropriate `UIImageView`\
    \ representing the coin to be stopped, called `coinView`. We stop the spinning\
    \ animation by calling `stopAnimating`, but we don’t want to just stop it, we\
    \ want to display the face of the coin. We can find the correct image to use by\
    \ first calling `coinForCoord` in `coinsGame` to figure out the type of coin it\
    \ is and then calling `imageForCoin` to return the `UIImage` we want to use. We\
    \ simply call `setImage` on `coinView` and pass in the `UIImage` named `image`.\
    \ The function `imageForCoin` simply returns a `UIImage` based on the `int` that\
    \ is passed in, as shown in [Listing 4-23](#9781430244226_Ch04.xhtml#list23).\n\
    \n**[Listing 4-23.](#9781430244226_Ch04.xhtml#_list23)**  `CoinsController."
