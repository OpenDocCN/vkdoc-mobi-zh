    -(void)loadImages;\n-(void)showPlayView:(UIInterfaceOrientation)interfaceOrientation;\n\
    @end\n```\n\nIn [Listing 3-1](#9781430244226_Ch03.xhtml#list1), we import three\
    \ other classes defined in this project, including the default import statement\
    \ for UIKit. The rest of the `IBOutlet` statements are basic declarations, allowing\
    \ a number of different views to be accessed. The `IBOutletCollection` definitions\
    \ represent a new type of connection for us. An `IBOutletCollection` acts very\
    \ much like an `IBOutlet`, except it allows you to connect multiple items to a\
    \ single `NSArray`. In our case, we have two labels for displaying the score:\
    \ landscape and portrait. Instead of having an `IBOutlet` (and variable) for each\
    \ of these, we can simply use an `IBOutletCollection`, so the `NSArray scoreLabels`\
    \ will contain both of these labels at runtime. When it is time to update the\
    \ UI with a new score, we simply update the text of all of the `UILabels` in the\
    \ array `scoreLabels`. We follow the same pattern for the labels that display\
    \ the remaining turns, where each is stored in the `NSArray remainingTurnsLabels`.\n\
    \n## Bringing the Views onto the Screen\n\nThat completes our overview of how\
    \ the different views are defined. Now let's take a look at how each of these\
    \ views is brought onto the screen, starting with the Loading view.\n\nWe know\
    \ that the Main view for the class `GameController` is displayed when the application\
    \ loads, just as it did in [Chapter 2](#9781430244226_Ch02.xhtml). However, the\
    \ Main view for `GameController` is empty—it is effectively the root component\
    \ for our application. When we change views in the application, we will be adding\
    \ and removing views from this root view. [Listing 3-2](#9781430244226_Ch03.xhtml#list2)\
    \ shows the `viewDidLoad` task from `GameController`, where we add the first view\
    \ we want the user to see.\n\n**[Listing 3-2](#9781430244226_Ch03.xhtml#_list2).**\
    \ GameController.m (viewDidLoad)\n\n```objc\n- (void)viewDidLoad {\n    [super\
    \ viewDidLoad];\n    [self.view addSubview:loadingView];\n    [self performSelectorInBackground:@selector(loadImages)\
    \ withObject:nil];\n}\n```\n\nThe `viewDidLoad` tasks, as shown in [Listing 3-2](#9781430244226_Ch03.xhtml#list2),\
    \ is called when an instance of `GameController` is loaded from an XIB file. Because\
    \ an instance of `GameController` is in each `MainWindow` XIB file, this happens\
    \ as soon as the application starts. After calling the super implementation of\
    \ `viewDidLoad`, which is required, we add the `UIView loadingView` to the main\
    \ view of the `GameController` class. The task `addSubview:` displays the new\
    \ sub-view at the location and size as defined by the sub-views `frame` property.\
    \ Because `loadingView` is defined in the XIB file, its `frame` is defined there.\n\
    \nAfter we get the Loading view on the screen, we want to load any initial resources\
    \ so we can prevent an untimed pause later in the application life cycle.\n\n\
    It is not technically required in this app to load the images asynchronously,\
    \ but if we wanted to display a progress bar, this would be required. In order\
    \ to perform a task asynchronously, we simply call `performSelectorInBackground:withObject:`\
    \ and pass in the task `loadImages`. The task `loadImage` will then be run in\
    \ the background; it is shown in [Listing 3-3](#9781430244226_Ch03.xhtml#list3).\n\
    \n**[Listing 3-3](#9781430244226_Ch03.xhtml#_list3).** GameController.m (loadImage)\n\
    \n```objc\n-(void)loadImages {\n    //sleeping so we can see the loading view.\
    \ In a production app, don't sleep :)\n    [NSThread sleepForTimeInterval:1.0];\n\
    \    [coinsController loadImages];\n    [loadingView removeFromSuperview];\n \
    \   [self.view addSubview:welcomeView];\n}\n```\n\nThe `loadImage` task calls\
    \ `sleepForTimeInterval` and causes the current thread to sleep for a second.\
    \ This is done to make sure you can actually see the loading view in the sample\
    \ code; delete anything like this in production code. After the sleep, call `loadImages`\
    \ on `coinsController`. The details of `CoinsController`'s implementation of `loadImages`\
    \ is described in [Chapter 4](#9781430244226_Ch04.xhtml)—all you need to know\
    \ now is that it loads all of the images used to display the coins. When we are\
    \ done loading, we remove the `loadingView` and add the `welcomeView`.\n\nThe\
    \ Welcome view is really where the application starts for the user. From there,\
    \ the user can access the interesting parts of the application.\n\n## Changing\
    \ Views in Response to User Actions\n\nOnce the Welcome view is displayed, the\
    \ user is presented with a number of buttons (this view is shown in [Figure 3-3](#9781430244226_Ch03.xhtml#Fig3)).\
    \ The top button, Continue Game, is only present if the user was partially through\
    \ a game when they exited the application. Each button causes the user to navigate\
    \ to a new view. This is done by first establishing a task that will be called\
    \ when the user touches a button. In [Listing 3-1](#9781430244226_Ch03.xhtml#list1),\
    \ we see a number of tasks declared in the `GameController.h` file. The ones starting\
    \ with `IBAction` are tasks that are called when a button is touched. Once the\
    \ tasks are declared in the header file, you can wire up each button to each task.\
    \ [Figure 3-9](#9781430244226_Ch03.xhtml#Fig9) shows the first step in wiring\
    \ up a button.\n\n![9781430244226_Fig03-09.jpg](images/9781430244226_Fig03-09.jpg)\n\
    \n[Figure 3-9.](#9781430244226_Ch03.xhtml#_Fig9)  Wiring the `aboutClicked:` action\
    \ to the About button\n\nIn [Figure 3-9](#9781430244226_Ch03.xhtml#Fig9), we see\
    \ the Connections menu of File Owner exposed by right-clicking on File Owner.\
    \ By dragging from the circle to the right of `aboutClicked:` to the correct button\
    \ on the left, you can select the action that triggers the task `aboutClicked:`.\
    \ When you let go of the button, a second pop-up menu is presented, allowing you\
    \ to select the specific user action. [Figure 3-10](#9781430244226_Ch03.xhtml#Fig10)\
    \ shows the selection of the action Touch Up Inside, which is typically the desired\
    \ action for a button.\n\n![9781430244226_Fig03-10.jpg](images/9781430244226_Fig03-10.jpg)\n\
    \n[Figure 3-10.](#9781430244226_Ch03.xhtml#_Fig10)  Selecting the action Touch\
    \ Up Inside\n\nOnce a button's action is wired up in the XIB, you have to provide\
    \ and implement the task for the button to do anything. In our sample application,\
    \ we want each button to change the current view. [Listing 3-4](#9781430244226_Ch03.xhtml#list4)\
    \ shows the implementation of these action tasks in `GameController.m`.\n\n**[Listing\
    \ 3-4](#9781430244226_Ch03.xhtml#_list4).** GameController.m (IBAction tasks)\n\
    \n```objc\n- (IBAction)continueGameClicked:(id)sender {\n    [UIView beginAnimations:nil\
    \ context:@\"flipTransitionToBack\"];\n    [UIView setAnimationDuration:1.2];\n\
    \    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromRight forView:self.\n\
    ```"
