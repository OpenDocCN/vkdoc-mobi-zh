    after calling the super-implementation of `viewDidLoad`, we set the property `gameAreaSize`.
    In the first example, we used the coordinate space of a `UIView` to describe the
    location of our spaceship. In this example, we have to specify the size of play
    area independent of any `UIView`. Note, however, that the size 160 x 240 is exactly
    one quarter of the number of points of an iPhone. Even though we want to separate
    the coordinate system of our game from the coordinate system of the `UIView` hierarchy,
    the fact is that an iPhone has a screen ration of 2:3, and any game we want to
    play on that device should consider that.    After specifying the `gameAreaSize`,
    we initialize `actors` and `actorViews`. Then we add our first actor. To add the
    star field behind the other actors, we can add new `Actor02` to the scene, specifying
    the `star_field_iphone` image. Because the base `Actor02` class does not specify
    any behavior, this actor will simply sit in the background, providing the nice
    stars. The advantage to using an actor for the background is that it will scale
    and stretch along with the other actors. The disadvantage is that it will be treated
    like the other actors in the game and consume a little computation time.    After
    adding the background, we create our `Viper02`, set it to the variable `viper`,
    and add it to the scene. We store a reference to it so we can access it easily
    when the user touches the screen. This is an operation we know we are going to
    do a lot, so there is no point searching though all of the actors each time to
    find the correct one. For any given game, some thought will have to be put into
    which actors are referenced in special ways. There is a balance among ease of
    programming, speed of execution, and memory usage that must be considered. Unfortunately,
    there are no hard-and-fast rules about what additional data structures should
    be created. I try  to do as little optimization as possible on my first pass through
    a game (or application) and wait until the game is more complete to figure out
    the hot spots in an application. Optimizations early in the development process
    can complicate feature development; however, optimization at the end of development
    can be a lot more complicated and might never get done. The two steps in [Listing
    5-14](#9781430244226_Ch05.xhtml#list14) are to add a `UITapGestureRecognizer`
    to the `actorView` and to set up the `CADisplayLink`. These steps are done in
    exactly the same way as they were done in the first example.    Before we look
    at how the scene is updated, let’s take a look at the tasks `addActor:` and `removeActor:`
    so we can complete our understanding of how actors are added and removed from
    the scene. [Listing 5-15](#9781430244226_Ch05.xhtml#list15) shows these two tasks.    [**Listing
    5-15.**](#9781430244226_Ch05.xhtml#_list15)  Example02Controller.


    m (addActor: and removeActor:)    ``` -(void)removeActor:(Actor02*)actor{     [toBeRemoved
    addObject:actor]; } -(void)doRemove{     for (Actor02* actor in toBeRemoved){
            UIImageView* imageView = [actorViews objectForKey:[actor actorId]];         [actorViews
    removeObjectForKey:actor];          [imageView removeFromSuperview];          [actors
    removeObject:actor];      }     [toBeRemoved removeAllObjects]; } ```    In [Listing
    5-15](#9781430244226_Ch05.xhtml#list15), the task `addActor` simply adds the actor
    to the `NSMutableArray actors`. If you wanted to keep track of actors as they
    were added, this is where you would do that. Likewise, the task `removeActor`
    simply adds the actor to the `NSMutableArray toBeRemoved`, so it can be cleaned
    up later. The task `doRemove` finds the `UIImageView` used to draw it on the screen
    and removes it from the `UIView actorViews`. The `UIImageView` is also removed
    from the scene by calling `removeFromSuperview`. The object `actor` is also removed
    from the `NSMutableArray actors`. Now that we see how actors are added and removed
    from the game, let’s take a look at the task `updateScene` that is called periodically
    to advance our game a single frame, as shown in [Listing 5-16](#9781430244226_Ch05.xhtml#list16).    [**Listing
    5-16.**](#9781430244226_Ch05.xhtml#_list16)  Example02Controller.m (updateScene)    ```
