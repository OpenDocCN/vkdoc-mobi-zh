    removeActor:actor]; } ```    In [Listing 13-9](#9781430244226_Ch13.xhtml#list9),
    we see the task `removeActor`:, which is called anytime we want to remove an Actor
    from the scene. As with the task `addActor`: from [Listing 13-3](#9781430244226_Ch13.xhtml#list3),
    we first check to see if the Actor is a `PhysicsActor`. If so, we get a reference
