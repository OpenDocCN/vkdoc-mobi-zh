    \ some ways, this chapter is a review of the techniques we learned in previous\
    \ chapters. However, exploring how these techniques fit together will give you\
    \ a roadmap that will help you put together your own games.  \n\nIn fact, feel\
    \ free to start out with the sample code for this chapter for your own game. It\
    \ is my intention to do just that and release a commercial version of Belt Commander\
    \ in the iTunes Store. So let’s get started.  \n\n### Belt Commander: Game Recap\
    \  \n\nBelt Commander is an action game in which you control a spaceship that\
    \ is traveling through an asteroid belt. Destroying asteroids and alien flying\
    \ saucers rewards the player with points. During play, a power-up occasionally\
    \ floats onto the screen, giving the player a chance to heal some damage, earn\
    \ some bonus points, or upgrade weapons. This is a relatively fast-paced game\
    \ with simple interactions. Let’s take a look at the opening screen of the game,\
    \ shown in [Figure 12-2](#9781430244226_Ch12.xhtml#Fig2).  \n\n![9781430244226_Fig12-02.jpg](images/9781430244226_Fig12-02.jpg)\
    \  \n\n[Figure 12-2.](#9781430244226_Ch12.xhtml#_Fig2)  Belt Commander’s opening\
    \ screen  \n\nIn [Figure 12-2](#9781430244226_Ch12.xhtml#Fig2), we see the first\
    \ screen of the game. We have a title at the top of the screen as well as a number\
    \ of buttons. The Facebook, Tweet, and Leaderboards buttons enable the various\
    \ social functions that we discussed in [Chapter 9](#9781430244226_Ch09.xhtml).\
    \ The extras button allows the user to configure the game and purchase new parts\
    \ of the game. How purchases are handled is described in [Chapter 10](#9781430244226_Ch10.xhtml).\
    \ For this chapter, we will assume all of the extras are purchased. The Play button\
    \ will take the user into the action part of the game, as shown in [Figure 12-3](#9781430244226_Ch12.xhtml#Fig3).\
    \  \n\n![9781430244226_Fig12-03.jpg](images/9781430244226_Fig12-03.jpg)  \n\n\
    [Figure 12-3.](#9781430244226_Ch12.xhtml#_Fig3)  Belt Commander in action  \n\n\
    In [Figure 12-3](#9781430244226_Ch12.xhtml#Fig3), we see the action part of the\
    \ game. On the left is the spaceship controlled by the user. The user can tap\
    \ on the screen and the ship will travel up or down to the location of the tap.\
    \ This is how the user can avoid the many asteroids that travel from the right\
    \ side of the screen to the left. In addition to the asteroids, there are alien\
    \ saucers that travel up and down on the screen, shooting bullets at the user’s\
    \ ship. Both the asteroids and the saucers’ bullets do damage to the ship when\
