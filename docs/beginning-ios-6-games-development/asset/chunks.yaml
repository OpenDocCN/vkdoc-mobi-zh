    \n## 为游戏添加粒子系统\n\n游戏中的粒子系统是由许多（通常是很小的）图像集合在一起绘制而成的，以产生整体效果。粒子系统在计算机图形学中有多种不同的用途；常见的例子有火、水、头发和草地。\n\
    \n在我们的示例中，将创建一个名为`Particle`的新角色，用于绘制彗星角色，并通过让流星角色看起来像破裂来改进它。[图7-3](#9781430244226_Ch07.xhtml#Fig3)展示了这个下一个示例的实际效果。\n\
