    is `ACFacebookAudienceKey`, which indicates who will be able to see any posts
    we create. In this case, `ACFacebookAudienceFriends` indicates that only friends
    of the user will be able to see the great posts by Belt Commander.    At this
    point, we are ready to make a call to Facebook and ask if it is OK for us to make
