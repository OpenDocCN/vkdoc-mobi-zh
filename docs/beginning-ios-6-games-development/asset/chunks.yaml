  trans: "\n# 在设备列表中选择\"通用\"(Universal)，即告知 Xcode 创建一个可在 iPhone 和 iPad 上同时运行的项目\n\n\
    在本例中，我们将不会使用 Storyboard 或自动引用计数（Automatic Reference Counting）。同样地，我们也不会创建任何单元测试，因此\"\
    包含单元测试\"(Include Unit Tests)选项也应取消勾选。点击\"下一步\"(Next)会提示您保存项目。Xcode 会在所选目录中创建一个新文件夹，因此如果不需要，您无需手动创建文件夹。当新项目保存完成后，您将看到类似图\
    \ 2-4 的界面。\n\n![9781430244226_Fig02-04.jpg](img/9781430244226_Fig02-04.jpg)\n\n\
    图 2-4.  新创建的项目\n\n在图 2-4 的左侧，有一个包含项目元素的树状结构，其中根元素处于选中状态 (A)。在右侧，则选中了\"摘要\"(Summary)标签页\
    \ (B)。在\"摘要\"标签页中，我们需要选择支持的设备方向 (C)。要支持每种设备上的两种方向，请点击\"倒置\"(Upside Down)按钮。向下滚动，并确保\
    \ iPad 的所有方向也都已按下。图 2-5 显示了正确的设置。既然项目已经创建完成，现在就可以开始根据我们的需求对其进行定制了。\n\n![9781430244226_Fig02-05.jpg](img/9781430244226_Fig02-05.jpg)\n\
    \n图 2-5.  支持所有设备方向\n\n## 定制通用应用程序\n\n为了理解我们将要对这个项目进行的定制，有必要先了解我们的起点。这个空项目本身即可运行，尽管它显然并不有趣。花点时间运行一下这个应用程序。它看起来会类似于图\
    \ 2-6 中运行的应用。接下来，我们将移除状态栏，并探索在项目中开始添加自定义代码的最佳位置。\n\n![9781430244226_Fig02-06.jpg](img/9781430244226_Fig02-06.jpg)\n\
    \n图 2-6.  一个全新的通用 iOS 应用程序\n\n在图 2-6 中，我们看到一个全新的通用应用正在 iPhone 模拟器上运行。要在 iPad 模拟器上运行该应用，请从\
    \ Xcode 中停止按钮右侧的方案下拉菜单中选择 iPad 模拟器。正如我们所见，这个应用是空的，只有一个灰色背景。另外值得注意的是，应用顶部的状态栏是显示的。尽管在应用中包含状态栏有很多充分的理由，但许多游戏开发者可能希望移除状态栏，以营造更具沉浸感的体验。要移除状态栏，请点击项目导航器（Xcode\
    \ 左侧的树状结构）中的根元素。选择目标（Target），然后点击右侧的\"信息\"(Info)标签页。图 2-7 显示了正确的视图。\n\n![9781430244226_Fig02-07.jpg](img/9781430244226_Fig02-07.jpg)\n\
    \n图 2-7.  配置状态栏\n\n当您看到图 2-7 所示的视图后，右键点击最顶部的元素 (A) 并选择\"添加行\"(Add Row)。这将在项目列表中添加一个新元素。您需要将键值设置为\
    \ `\"Status bar is initially hidden\"`，并将值设置为 `\"Yes.\"`。您在这里所做的实际上是编辑位于 Supporting\
    \ Files 分组下的 `plist` 文件。Xcode 只是为您提供了一个友好的界面来编辑这个配置文件。\n\n**提示**  导航到 Supporting\
    \ Files 分组下以 `info.plist` 结尾的文件。右键点击它，选择\"打开方式\"➤\"源代码\"(Open As ➤ Source Code)。这将向您展示\
    \ `plist` 文件的源码内容。请注意，这些键值实际上是以常量的形式存储的，而不是 Info 编辑器中使用的可读文本。\n\n当我们再次运行应用程序时，状态栏就被移除了，如图\
    \ 2-8 所示。\n\n![9781430244226_Fig02-08.jpg](img/9781430244226_Fig02-08.jpg)\n\n\
    图 2-8.  移除状态栏后的默认应用程序\n\n既然我们已经探索了一种开始定制应用的简单方法，那么接下来是时候研究一下 iOS 应用是如何组合起来的，以便我们能够明智地决定如何添加自己的功能。\n\
    \n## iOS 应用程序的初始化过程\n\n众所周知，iOS 应用程序主要用 Objective-C 编写，而 Objective-C 是 C 语言的超集。Xcode\
    \ 很好地隐藏了应用的构建细节，但在底层，我们知道它使用了 LLVM 和其他常见的 Unix 工具来完成实际工作。由于我们知道项目本质上是一个 C 应用程序，因此可以预期应用程序的入口点是一个\
    \ C 语言的 `main` 函数。事实上，如果你查看 Supporting Files 分组，你会找到 `main.m` 文件，如代码清单 2-1 所示。\n\
    \n**代码清单 2-1.**  `main.m`\n\n```objective-c\n#import <UIKit/UIKit.h>\n\n#import\
    \ \"AppDelegate.h\"\n\nint main(int argc, char *argv[])\n{\n    @autoreleasepool\
    \ {\n        return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate\
    \ class]));\n    }\n}\n```\n\n代码清单 2-1 中的 `main` 函数是一个 C 函数，但你会注意到函数体明显是 Objective-C\
    \ 语法。一个 `@autoreleasepool` 包裹着对 `UIApplicationMain` 的调用。`@autoreleasepool` 为这个应用程序设置了内存管理上下文，我们无需过分担心这一点。`UIApplicationMain`\
    \ 函数为你做了很多有用的事情：它通过查看你的 `info.plist` 文件来初始化应用程序，建立一个事件循环，并通常能让一切以正确的方式启动。事实上，我从未有过修改这个函数的理由，因为\
    \ iOS 提供了一个明确的位置来开始添加你的启动代码。添加初始化代码的最佳位置是在应用委托类的实现文件中的 `application:didFinishLaunchingWithOptions:`\
    \ 任务里。在这个例子中，应用委托类名为 `AppDelegate`。代码清单 2-2 展示了来自 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:`\
    \ 任务的实现。\n\n**代码清单 2-2.**  `application:didFinishLaunchingWithOptions:`:\n\n```objective-c\n\
    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]] autorelease];\n    // Override point for customization\
    \ after application launch.\n    if ([[UIDevice currentDevice] userInterfaceIdiom]\
    \ == UIUserInterfaceIdiomPhone) {\n        self.viewController = [[[ViewController_iPhone\
    \ alloc] initWithNibName:@\"ViewController_iPhone\" bundle:nil] autorelease];\n\
    \    } else {\n        self.viewController = [[[ViewController_iPad alloc] initWithNibName:@\"\
    ViewController_iPad\" bundle:nil] autorelease];\n    }\n    self.window.rootViewController\
    \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n```\n\n当一个应用程序完全初始化并准备好开始运行构成它的代码时，`application:didFinishLaunchingWithOptions:`\
    \ 任务就会被调用，如代码清单 2-2 所示。这个任务除了名字特别长之外，还接收一个 `UIApplication` 实例和一个 `NSDictionary`\
    \ 作为参数。`UIApplication` 是一个代表正在运行的应用程序状态的对象。接收此消息的 `AppDelegate` 实例是 `UIApplication`\
    \ 对象的委托。这意味着我们通过在 `AppDelegate` 中实现任务来修改应用程序的行为。`AppDelegate` 所实现的协议 `UIApplicationDelegate`\
    \ 定义了那些将代表应用程序被调用的任务。\n"
- fmt: "# 排版后的内容\n\nIf we take a look at the implementation of `application:didFinishLaunchingWithOptions:`,\
    \ we start by creating a new `UIWindow` with a size equal to the size of the screen.\
    \ Once the `UIWindow` is instantiated, we need to create a `UIViewController`\
    \ that will manage the UI of our application. A new Xcode project, like the one\
    \ we created, starts out with a single `ViewController` class to manage our UI.\
    \ We are going to create device-specific subclasses of our `ViewController`, so\
    \ that we have a place to put device-specific code. We will look at the process\
    \ of creating these subclasses shortly. To make sure that we instantiate the correct\
    \ `ViewController` subclass, we need to add the bold code in [Listing 2-2](#9781430244226_Ch02.xhtml#list2).\n\
    \nOnce our `ViewController` is created, we set it as the `rootViewController`\
    \ of `window` and call `makeKeyAndVisible`. The window object is an instance of\
    \ `UIWindow` and is the root graphical component of your application. The task\
    \ `makeKeyAndVisible` essentially displays the window. Any custom components we\
    \ add to our application will be subviews of this `window` object.\n\nIf your\
    \ application requires that configuration be done before the UI is loaded, you\
    \ put that initialization code before the call to `makeKeyAndVisible`. This might\
    \ include reading an app-specific configuration file, initializing a database,\
    \ setting up the location service, or any number of other things.\n\nNext, we\
    \ will take a general look at how a UI is organized in an iOS application before\
    \ looking at the details of working with Interface Builder.\n\n## Understanding\
    \ UIViewControllers\n\niOS development and the associated libraries make heavy\
    \ use of the Model View Controller (MVC) pattern. In general, MVC is a strategy\
    \ for separating the presentation (View), data (Model), and business logic (Controller).\
    \ In specific terms, the model is simply data, like a `Person` class or an `Address`.\
    \ The view is responsible for rendering the data to the screen. In iOS development,\
    \ that means a subclass of `UIView`. iOS provides a special class to act as the\
    \ controller for a `UIView`, which is aptly named `UIViewController`.\n\n`UIViewController`\
    \ has two key characteristics: it is often associated with an XIB file, and it\
    \ has a property called “view” that is of type `UIView`. By creating a subclass\
    \ of `UIViewController`, we can also make an XIB file with the same name as the\
    \ class. By default, when you instantiate a `UIViewController` subclass, it will\
    \ load a XIB with the same name. The root `UIView` in the XIB will be wired up\
    \ as the `view` property of `UIViewController`.\n\nBesides providing a clean separation\
    \ between the UI layout and the logic that drives it, iOS provides a number of\
    \ `UIViewController` subclasses that expect to work with other `UIViewControllers`\
    \ instead of `UIViews`. An example of this is the `UINavigationController` that\
    \ implements the type of navigation found in the Settings app. In code, when you\
    \ want to advance to the next view, you pass a `UIViewController` and not a `UIView`,\
    \ though it is the `view` property of the `UIViewController` that is displayed\
    \ on the screen.\n\nAdmittedly, for our example application in this chapter, it\
    \ does not make a lot of difference if we use a `UIViewController`. In [Chapter\
    \ 1](#9781430244226_Ch01.xhtml), we extended `UIView` when we created the `RockPaperScissorsView`\
    \ class and it worked fine. However, understanding how `UIViewControllers` and\
    \ their views work together will make life easier in [Chapter 3](#9781430244226_Ch03.xhtml),\
    \ where we explore a game’s application life cycle.\n\nUsing the `RockPaperScissorsView`\
    \ from [Chapter 1](#9781430244226_Ch01.xhtml), let’s take a look at how this functionality\
    \ would appear if it were implemented as a `UIViewController`. [Listing 2-3](#9781430244226_Ch02.xhtml#list3)\
    \ shows the file `RockPaperScissorsController`.\n\n[**Listing 2-3.**](#9781430244226_Ch02.xhtml#_list3)\
    \  `RockPaperScissorsController.h`\n\n```\n@interface RockPaperScissorsController\
    \ : UIViewController {\n    UIView* buttonView;\n    UIButton* rockButton;\n \
    \   UIButton* paperButton;\n    UIButton* scissersButton;\n\n    UIView* resultView;\n\
    \    UILabel* resultLabel;\n    UIButton* continueButton;\n\n    BOOL isSetup;\n\
    }\n-(void)setup:(CGSize)size;\n-(void)userSelected:(id)sender;\n-(void)continueGame:(id)sender;\n\
    \n-(NSString*)getLostTo:(NSString*)selection;\n-(NSString*)getWonTo:(NSString*)selection;\n\
    @end\n```\n\nIn [Listing 2-3](#9781430244226_Ch02.xhtml#list3), we see the class\
    \ `RockPaperScissorsController` extends `UIViewController`. Among other things,\
    \ this means that `RockPaperScissorsController` has a property called `view` that\
    \ will be the root `UIView` for this controller. Like `RockPaperScissorsView`,\
    \ we will have other `UIViews` that are subviews of the root `view`, such as the\
    \ buttons for selecting your choice. Although these buttons could conceivably\
    \ have their own `UIViewControllers`, there comes a point when it makes sense\
    \ to allow a `UIViewController` to manage all of the `UIViews` with which it is\
    \ concerned. There are very few changes required on the implementation side of\
    \ things to complete this transition from `UIView` to `UIViewController`. Basically,\
    \ wherever we used the keyword `self`, we simply say `self.view` instead. [Listing\
    \ 2-4](#9781430244226_Ch02.xhtml#list4) shows the required changes."
  raw: 'If we take a look at the implementation of `application:didFinishLaunchingWithOptions:`,
    we start by creating a new `UIWindow` with a size equal to the size of the screen.
    Once the `UIWindow` is instantiated, we need to create a `UIViewController` that
    will manage the UI of our application. A new Xcode project, like the one we created,
    starts out with a single `ViewController` class to manage our UI. We are going
    to create device-specific subclasses of our `ViewController`, so that we have
    a place to put device-specific code. We will look at the process of creating these
    subclasses shortly. To make sure that we instantiate the correct ViewController
    subclass, we need to add the bold code in [Listing 2-2](#9781430244226_Ch02.xhtml#list2).


    Once our `ViewController` is created, we set it as the `rootViewController` of
    `window` and call `makeKeyAndVisible`. The window object is an instance of `UIWindow`
    and is the root graphical component of your application. The task `makeKeyAndVisible`
    essentially displays the window. Any custom components we add to our application
    will be subviews of this `window` object.


    If your application requires that configuration be done before the UI is loaded,
    you put that initialization code before the call to `makeKeyAndVisible`. This
    might include reading an app-specific configuration file, initializing a database,
    setting up the location service, or any number of other things.


    Next, we will take a general look at how a UI is organized in an iOS application
    before looking at the details of working with Interface Builder.


    Understanding UIViewControllers


    iOS development and the associated libraries make heavy use of the Model View
    Controller (MVC) pattern. In general, MVC is a strategy for separating the presentation
    (View), data (Model), and business logic (Controller). In specific terms, the
    model is simply data, like a `Person` class or an `Address`. The view is responsible
    for rendering the data to the screen. In iOS development, that means a subclass
    of `UIView`. iOS provides a special class to act as the controller for a `UIView`,
    which is aptly named `UIViewController`.


    `UIViewController` has two key characteristics: it is often associated with an
    XIB file, and it has a property called “view” that is of type `UIView`. By creating
    a subclass of `UIViewController`, we can also make an XIB file with the same name
    as the class. By default, when you instantiate a `UIViewController` subclass,
    it will load a XIB with the same name. The root `UIView` in the XIB will be wired
    up as the `view` property of `UIViewController`.


    Besides providing a clean separation between the UI layout and the logic that
    drives it, iOS provides a number of `UIViewController` subclasses that expect
    to work with other `UIViewControllers` instead of `UIViews`. An example of this
    is the `UINavigationController` that implements the type of navigation found in
    the Settings app. In code, when you want to advance to the next view, you pass
    a `UIViewController` and not a `UIView`, though it is the `view` property of the
    `UIViewController` that is displayed on the screen.


    Admittedly, for our example application in this chapter, it does not make a lot
    of difference if we use a `UIViewController`. In [Chapter 1](#9781430244226_Ch01.xhtml),
    we extended `UIView` when we created the `RockPaperScissorsView` class and it
    worked fine. However, understanding how `UIViewControllers` and their views work
    together will make life easier in [Chapter 3](#9781430244226_Ch03.xhtml), where
    we explore a game’s application life cycle.


    Using the `RockPaperScissorsView` from [Chapter 1](#9781430244226_Ch01.xhtml),
    let’s take a look at how this functionality would appear if it were implemented
    as a `UIViewController`. [Listing 2-3](#9781430244226_Ch02.xhtml#list3) shows
    the file `RockPaperScissorsController`


    [**Listing 2-3.**](#9781430244226_Ch02.xhtml#_list3)  `RockPaperScissorsController.h`


    ```

    @interface RockPaperScissorsController : UIViewController {

        UIView* buttonView;

            UIButton* rockButton;

            UIButton* paperButton;

            UIButton* scissersButton;


    UIView* resultView;

            UILabel* resultLabel;

            UIButton* continueButton;


    BOOL isSetup;

    }

    -(void)setup:(CGSize)size;

    -(void)userSelected:(id)sender;

    -(void)continueGame:(id)sender;


    -(NSString*)getLostTo:(NSString*)selection;

    -(NSString*)getWonTo:(NSString*)selection;

    @end

    ```


    In [Listing 2-3](#9781430244226_Ch02.xhtml#list3), we see the class `RockPaperScissorsController`
    extends `UIViewController`. Among other things, this means that `RockPaperScissorsController`
    has a property called "`view`" that will be the root `UIView` for this controller.
    Like `RockPaperScissorsView`, we will have other `UIViews` that are subviews of
    the root `view`, such as the buttons for selecting your choice. Although these
    buttons could conceivably have their own `UIViewControllers`, there comes a point
    when it makes sense to allow a `UIViewController` to manage all of the `UIViews`
    with which it is concerned. There are very few changes required on the implementation
    side of things to complete this transition from `UIView` to ``UIViewController.
    Basically, wherever we used the keyword "`self`," we simply say `self.view` instead.
    [Listing 2-4](#9781430244226_Ch02.xhtml#list4) shows the required changes.``'
  trans: "\n# 排版后的内容\n\n如果我们来看一下 `application:didFinishLaunchingWithOptions:` 的实现，我们首先会创建一个新的\
    \ `UIWindow`，其大小与屏幕尺寸相同。一旦 `UIWindow` 被实例化，我们就需要创建一个 `UIViewController` 来管理我们应用程序的用户界面。像我们刚创建的这个新\
    \ Xcode 项目，一开始会有一个单独的 `ViewController` 类来管理我们的用户界面。我们将为 `ViewController` 创建设备特定的子类，这样就有了存放设备特定代码的空间。稍后我们会介绍创建这些子类的过程。为了确保我们实例化正确的\
    \ `ViewController` 子类，我们需要添加 清单 2-2 中加粗的代码。\n\n一旦 `ViewController` 被创建，我们将其设置为\
    \ `window` 的 `rootViewController`，并调用 `makeKeyAndVisible`。这个 window 对象是 `UIWindow`\
    \ 的一个实例，也是应用程序的根图形组件。`makeKeyAndVisible` 任务本质上就是显示该窗口。我们添加到应用程序中的任何自定义组件，都将是这个\
    \ `window` 对象的子视图。\n\n如果你的应用程序需要在用户界面加载之前完成配置，你应该将那些初始化代码放在调用 `makeKeyAndVisible`\
    \ 之前。这可能包括读取应用程序特定的配置文件、初始化数据库、设置位置服务，或任何其他操作。\n\n接下来，我们将在查看 Interface Builder\
    \ 的具体细节之前，先大致了解一下 iOS 应用程序中的用户界面是如何组织的。\n\n## 理解 UIViewControllers\n\niOS 开发及其相关库大量使用了模型-视图-控制器（MVC）模式。总的来说，MVC\
    \ 是一种将表现层（View）、数据（Model）和业务逻辑（Controller）分离的策略。具体来说，模型就是数据，比如一个 `Person` 类或一个\
    \ `Address`。视图负责将数据渲染到屏幕上。在 iOS 开发中，这意味着 `UIView` 的一个子类。iOS 提供了一个特殊的类来充当 `UIView`\
    \ 的控制器，这个类恰如其分地被命名为 `UIViewController`。\n\n`UIViewController` 有两个关键特征：它通常与一个 XIB\
    \ 文件相关联，并且它有一个名为“view”的属性，类型为 `UIView`。通过创建 `UIViewController` 的子类，我们也可以创建一个与类同名的\
    \ XIB 文件。默认情况下，当你实例化一个 `UIViewController` 子类时，它会加载一个同名的 XIB。XIB 中的根 `UIView` 会被连接为\
    \ `UIViewController` 的 `view` 属性。\n\n除了提供用户界面布局与其驱动逻辑之间的清晰分离之外，iOS 还提供了许多期望与其他\
    \ `UIViewControllers` 而非 `UIViews` 一起工作的 `UIViewController` 子类。一个例子是 `UINavigationController`，它实现了在“设置”应用中找到的那种导航方式。在代码中，当你想前进到下一个视图时，你传递的是一个\
    \ `UIViewController` 而不是一个 `UIView`，尽管屏幕上显示的是 `UIViewController` 的 `view` 属性。\n\
    \n不可否认，对于我们本章的示例应用来说，使用 `UIViewController` 并没有太大区别。在第 1 章中，我们创建 `RockPaperScissorsView`\
    \ 类时扩展了 `UIView`，并且效果良好。然而，理解 `UIViewControllers` 及其视图如何协同工作，将让我们在第 3 章（我们将探讨游戏的应用生命周期）中更轻松。\n\
    \n使用第 1 章中的 `RockPaperScissorsView`，让我们来看看如果将此功能实现为 `UIViewController` 会是什么样子。清单\
    \ 2-3 展示了文件 `RockPaperScissorsController`。\n\n**清单 2-3.**  `RockPaperScissorsController.h`\n\
    \n```\n@interface RockPaperScissorsController : UIViewController {\n    UIView*\
    \ buttonView;\n    UIButton* rockButton;\n    UIButton* paperButton;\n    UIButton*\
    \ scissersButton;\n\n    UIView* resultView;\n    UILabel* resultLabel;\n    UIButton*\
    \ continueButton;\n\n    BOOL isSetup;\n}\n-(void)setup:(CGSize)size;\n-(void)userSelected:(id)sender;\n\
    -(void)continueGame:(id)sender;\n\n-(NSString*)getLostTo:(NSString*)selection;\n\
    -(NSString*)getWonTo:(NSString*)selection;\n@end\n```\n\n在清单 2-3 中，我们看到类 `RockPaperScissorsController`\
    \ 扩展了 `UIViewController`。除其他事项外，这意味着 `RockPaperScissorsController` 有一个名为 `view`\
    \ 的属性，该属性将是此控制器的根 `UIView`。与 `RockPaperScissorsView` 相同，我们会有其他作为根 `view` 子视图的\
    \ `UIViews`，例如用于选择选项的按钮。虽然这些按钮理论上可能拥有自己的 `UIViewControllers`，但最终会有一个点让允许一个 `UIViewController`\
    \ 管理所有与其相关的 `UIViews` 变得合理。在实现方面，完成从 `UIView` 到 `UIViewController` 的转换几乎不需要什么改动。基本上，只要把原来使用关键字\
    \ `self` 的地方替换为 `self.view` 即可。清单 2-4 展示了所需的改动。\n"
