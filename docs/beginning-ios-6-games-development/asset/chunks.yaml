    the header of which is shown in [Listing 8-34](#9781430244226_Ch08.xhtml#list34).    **[Listing
    8-34](#9781430244226_Ch08.xhtml#_list34).** `AccelerometerController.h`    ```
    @interface AccelerometerController : GameController < UIAccelerometerDelegate
    > {     Viper* viper; } @end ```    In [Listing 8-34](#9781430244226_Ch08.xhtml#list34),
    we see the header for the class `AccelerometerController`. The things to note
    here are that the class `AccelerometerController` conforms to the protocol `UIAccelerometerDelegate`,
    and that it has a reference to the Viper that will be moving around the screen.
    Conforming the protocol allows `AccelerometerController` to receive data from
    the accelerometer in real time, as we will see in a bit. Let’s first look at how
    I set up the class `AccelerometerController` so it receives data, as shown in
    [Listing 8-35](#9781430244226_Ch08.xhtml#list35).    **[Listing 8-35](#9781430244226_Ch08.xhtml#_list35).** `AccelerometerController.m
    (doSetup)`    ``` -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(320,
    480)];          viper = [Viper viper:self];         [self addActor:viper];          UIAccelerometer*  theAccelerometer
    = [UIAccelerometer sharedAccelerometer];          theAccelerometer.updateInterval
    = 1 / 50.0;         theAccelerometer.delegate = self;         return YES;     }
        return NO; } ```    In [Listing 8-35](#9781430244226_Ch08.xhtml#list35), we
    do the usual setup, specifying the game size area and adding the Viper that we
    will be moving around with accelerometer data. To start receiving accelerometer
    data, we have to get access to the singleton `UIAccelerometer` associated with
    the running application. To do this, we use the static task `sharedAccelermoter`
    of the class `UIAccelermoter`, and then we simply set self as the delegate. Another
    thing to note is that we have to specify the frequency at which we get data. In
    this case, we are requesting data 50 times a second, which is plenty fast for
    real-time input. The data is actually received by a call to `accelerometer:didAccelerate`:,
    as shown in [Listing 8-36](#9781430244226_Ch08.xhtml#list36).    **[Listing 8-36](#9781430244226_Ch08.xhtml#_list36).** `AccelerometerController.m
    (accelerometer:didAccelerate:``)`    ``` - (void)accelerometer:(UIAccelerometer
    *)accelerometer didAccelerate:(UIAcceleration *)acceleration{     CGSize size
    = [self gameAreaSize];      UIAccelerationValue x, y, z;     x = acceleration.x;
        y = acceleration.y;     z = acceleration.z;     NSLog(@"x = %f y = %f z =
    %f", x, y, z);      CGPoint center = CGPointMake(size.width/2.0 * x + size.width/2.0,
    size.height/2.0 * y + size.height/2.0);     [viper setCenter:center]; } ```    In
    [Listing 8-36](#9781430244226_Ch08.xhtml#list36), we simply get the X, Y, and
    Z values from the `UIAcceleration` acceleration. These values range from −1.0
    to 1.0, based on the orientation of the device. Because the X value corresponds
    to the device being tilted left or right (in portrait), we can simply use the
    value of X to specify the X value of our new center value. We do the same for
    the Y value, and set the center property of Viper.    This is a very simple example,
    but I hope it will get you headed down the right track. It seems to me that getting
    basic functionality working is pretty simple, as in this example, but getting
    more complex user interactions just right is considerably more work. I recommend
    reading the document entitled “Event Handling Guide for `iOS`,” which is available
    at `http://developer.apple.com`.    Summary    In this chapter, we explored how
    to respond to basic touch events. We also looked at how the subclasses of `UIGestureResponder`
    can be used to interpret those touch events as concise gestures, such as pinches,
    long presses, rotations, and more. In the last section, we looked at two ways
    to use the accelerometer to control game actors.


    The first method allowed us to simply respond to a shake event. The second technique
    showed how we could get direct access to accelerometer data to control our application,
    laying the groundwork for motion-based gestures more complex than a simple shake.    Chapter
        9    Game Center and Social Media    One of the key ways to market your game
    these days is to integrate your application with one or more social media services.
    The idea is that users will promote your game as they play and share their experience
    with their friends. To get users to play your game more often, it is also very
    common to provide a mechanism for users to compare their scores with other players.
    Providing a way for users to track their scores against others and to post their
    progress is so common in game development that Apple provides libraries to support
    these requirements.    The primary service provided by Apple is called Game Center,
    which is implemented in the library called GameKit. Game Center is a service that
    allows users to compare their scores with other players on what is called a leaderboard.
    Game Center also allows users to reach what are called achievements. Achievements
    are defined by each game and are intended as incentives to keep people playing.
    For example, if you have an achievement that is hard to achieve, people will want
    to earn it to set themselves apart from their friends playing the same game. Game
    Center also provides a mechanism for multiplayer games, but we will focus on the
    social aspects of its services in this chapter.    To broadcast a player’s progress
    in a game, it is common to use an existing social media site such as Twitter or
    Facebook, so the user’s friends will be notified. A new feature in iOS 5 was the
    inclusion of a built-in Twitter account. In this chapter, we will look at how
    to use the classes that expose a Twitter account to send a tweet on behalf of
    the user. New to iOS 6 is built-in Facebook support. We will look at how Twitter
    and Facebook supports are wrapped into a library called Social Framework. We will
    look at how we can use this library to make posts to Facebook on behalf of the
    user.    The examples in this chapter are taken from the project Belt Commander.
    We will continue using what you learn in the following pages as examples for the
    final two chapters, as we explore a complete game.    Game Center    Game Center,
    as the user sees it, is an application on an iOS device where information about
    a user’s games is aggregated. This information includes a place to log in and
    manage your account, a list of friends, and a list of games. For each listed game,
    there are a number of leaderboards for displaying scores, as well as a list of
    the achievements available in the game. [Figure 9-1](#9781430244226_Ch09.xhtml#Fig1)
    shows a typical Game Center screen.    ![9781430244226_Fig09-01.jpg](images/9781430244226_Fig09-01.jpg)    [Figure
    9-1.](#9781430244226_Ch09.xhtml#_Fig1)  Game Center showing games    In [Figure
    9-1](#9781430244226_Ch09.xhtml#Fig1), we see nine installed games that support
    Game Center. Select a game to view its leaderboards and any achievements the user
    has earned.    From a developer’s perspective, Game Center is a set of classes
    used to interact with Game Center to define the leaderboards and achievements.
    Collectively, these classes are called GameKit, which is available as part of
    your standard iOS SDK installation. Once GameKit is integrated with your game,
    will be able to sign the user in and perform GameKit operations on his or her
    behalf. [Figure 9-2](#9781430244226_Ch09.xhtml#Fig2) shows the user being signed
    into GameKit.    ![9781430244226_Fig09-02.jpg](images/9781430244226_Fig09-02.jpg)    [Figure
    9-2.](#9781430244226_Ch09.xhtml#_Fig2)  Signing into GameKit    In [Figure 9-2](#9781430244226_Ch09.xhtml#Fig2),
    we see the Welcome screen for the game Belt Commander.'
  trans: "\n本示例中的负责类为 `AccelermoterController`，其头文件如代码清单 8-34 所示。\n\n**代码清单 8-34.**\
    \ `AccelerometerController.h`\n\n```\n@interface AccelerometerController : GameController\
    \ < UIAccelerometerDelegate > {\n    Viper* viper;\n}\n@end\n```\n\n在代码清单 8-34\
    \ 中，我们看到了 `AccelerometerController` 类的头文件。这里需要注意：`AccelerometerController` 类遵循了\
    \ `UIAccelerometerDelegate` 协议，并且持有一个将在屏幕上移动的 Viper 对象的引用。遵循该协议使得 `AccelerometerController`\
    \ 能够实时接收来自加速计的数据，我们稍后将看到这一点。首先来看看我如何设置 `AccelerometerController` 类以使其能够接收数据，如代码清单\
    \ 8-35 所示。\n\n**代码清单 8-35.** `AccelerometerController.m (doSetup)`\n\n```\n-(BOOL)doSetup{\n\
    \    if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
    \n        viper = [Viper viper:self];\n        [self addActor:viper];\n\n    \
    \    UIAccelerometer*  theAccelerometer = [UIAccelerometer sharedAccelerometer];\n\
    \n        theAccelerometer.updateInterval = 1 / 50.0;\n        theAccelerometer.delegate\
    \ = self;\n        return YES;\n    }\n    return NO;\n}\n```\n\n在代码清单 8-35 中，我们进行了常规设置，指定了游戏区域大小并添加了将根据加速计数据移动的\
    \ Viper。要开始接收加速计数据，我们必须获取与当前运行应用程序关联的单例 `UIAccelerometer`。为此，我们使用 `UIAccelerometer`\
    \ 类的静态方法 `sharedAccelerometer`，然后将 self 设置为代理。另一件需要注意的事是，我们必须指定接收数据的频率。在这个案例中，我们要求每秒接收\
    \ 50 次数据，这对于实时输入来说已经足够快了。实际数据是通过调用 `accelerometer:didAccelerate:` 接收的，如代码清单 8-36\
    \ 所示。\n\n**代码清单 8-36.** `AccelerometerController.m (accelerometer:didAccelerate:)`\n\
    \n```\n- (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration\
    \ *)acceleration{\n    CGSize size = [self gameAreaSize];\n\n    UIAccelerationValue\
    \ x, y, z;\n    x = acceleration.x;\n    y = acceleration.y;\n    z = acceleration.z;\n\
    \    NSLog(@\"x = %f y = %f z = %f\", x, y, z);\n\n    CGPoint center = CGPointMake(size.width/2.0\
    \ * x + size.width/2.0, size.height/2.0 * y + size.height/2.0);\n    [viper setCenter:center];\n\
    }\n```\n\n在代码清单 8-36 中，我们简单地从 `UIAcceleration` 加速度对象中获取了 X、Y、Z 值。这些值的范围从 -1.0\
    \ 到 1.0，具体取决于设备的朝向。由于 X 值对应设备向左或向右倾斜（竖屏模式），我们可以直接使用 X 值来设定新的中心点的 X 坐标。我们对 Y 值也做同样的处理，然后设置\
    \ Viper 的中心属性。\n\n这是一个非常简单的示例，但我希望它能引导你走上正确的轨道。在我看来，实现基本功能相当简单，就像这个示例一样，但要让更复杂的用户交互工作完美运行，则需要付出更多努力。我建议阅读标题为“`iOS`\
    \ 事件处理指南”的文档，该文档可在 `http://developer.apple.com` 获取。\n\n## 总结\n\n在本章中，我们探讨了如何响应基本的触摸事件。我们还研究了如何使用\
    \ `UIGestureRecognizer` 的子类将这些触摸事件解释为简洁的手势，例如捏合、长按、旋转等。在最后一节中，我们研究了使用加速计控制游戏角色的两种方法。\n\
    \n第一种方法允许我们简单地对摇动事件做出响应。第二种技术展示了如何直接访问加速计数据来控制我们的应用，为比简单摇动更复杂的基于运动的手势奠定了基础。\n\n\
    # 第 9 章：Game Center 与社交媒体\n\n如今，推广游戏的关键方式之一是将你的应用与一个或多个社交媒体服务集成。其理念是，用户会在游戏过程中推广你的游戏，并与朋友分享体验。为了让用户更频繁地玩你的游戏，通常还需要提供一种机制，让用户能够与其他玩家比较分数。提供一种让用户追踪与他人分数差距并发布进度的方式，在游戏开发中非常普遍，以至于苹果提供了库来支持这些需求。\n\
    \n苹果提供的主要服务叫做 Game Center，它在名为 GameKit 的库中实现。Game Center 是一项允许用户与排行榜上的其他玩家比较分数的服务。Game\
    \ Center 还允许用户达成所谓的成就。成就是由每个游戏定义的，旨在激励人们持续游玩。例如，如果你有一个很难达成的成就，玩家就会想要获得它，以便将自己与玩同一游戏的朋友区分开来。Game\
    \ Center 还提供了多人游戏的机制，但我们本章将重点关注其服务中的社交方面。\n\n为了广播玩家在游戏中的进度，通常会使用现有的社交媒体网站（如 Twitter\
    \ 或 Facebook），以便用户的朋友能收到通知。iOS 5 的一个新功能是内置了 Twitter 账户。在本章中，我们将学习如何使用公开 Twitter\
    \ 账户的类代表用户发送推文。iOS 6 新增了内置的 Facebook 支持。我们将了解 Twitter 和 Facebook 的支持是如何被封装到名为\
    \ Social Framework 的库中的。我们将学习如何使用这个库代表用户在 Facebook 上发布内容。\n\n本章的示例取自 Belt Commander\
    \ 项目。在接下来的两章中，我们将继续使用你在以下章节中学到的内容作为示例，探讨一个完整的游戏。\n\n## Game Center\n\n从用户的角度看，Game\
    \ Center 是 iOS 设备上的一个应用程序，汇集了有关用户游戏的信息。这些信息包括一个登录和管理账户的地方、好友列表以及游戏列表。对于列出的每个游戏，都有若干用于显示分数的排行榜，以及游戏中可获得的成就列表。图\
    \ 9-1 展示了一个典型的 Game Center 屏幕。\n\n![9781430244226_Fig09-01.jpg](img/9781430244226_Fig09-01.jpg)\n\
    \n图 9-1. 显示游戏的 Game Center\n\n在图 9-1 中，我们看到九个已安装的、支持 Game Center 的游戏。选择一个游戏即可查看其排行榜以及用户已获得的任何成就。\n\
    \n从开发者的角度来看，Game Center 是一组用于与 Game Center 交互以定义排行榜和成就的类。这些类统称为 GameKit，作为标准 iOS\
    \ SDK 安装的一部分提供。一旦 GameKit 与你的游戏集成，你就可以让用户登录，并代表他或她执行 GameKit 操作。图 9-2 展示了用户登录\
    \ GameKit 的过程。\n\n![9781430244226_Fig09-02.jpg](img/9781430244226_Fig09-02.jpg)\n\
    \n图 9-2. 登录 GameKit\n\n在图 9-2 中，我们看到了游戏 Belt Commander 的欢迎屏幕。\n"
- fmt: "在顶部，我们会看到一个来自 Game Center 的通知，告知用户此游戏正在使用 GameKit，并显示了用户账户。我们还看到了“sandbox”这个词。这表示我们使用的并非\
    \ Game Center 的正式版本，而是开发版本。大多数情况下，您无需为此担心；在开发过程中，您将完全使用沙箱环境。\n\n要在您的项目中启用 GameKit，您显然会使用\
    \ GameKit 中的类，但您还需要告知 Apple 您希望为某个特定游戏启用 GameKit 支持。以下部分描述了如何在 iTunes Connect\
    \ 中设置 GameKit。\n\n### 在 iTunes Connect 中启用 Game Center\n\nGame Center 不仅仅是 iOS\
    \ 设备上的一个应用或一组库。它还是由 Apple 托管的一组 Web 服务，提供了大部分功能。为了让您的游戏使用这些服务，您必须配置您的应用程序。您需要在配置门户中创建一个\
    \ `App ID`，配置 Xcode 使用生成的 `Bundle Identifier`，并在 iTunes Connect 中配置您的应用程序以使用 Game\
    \ Center。假设我们正在制作一个新游戏，并从配置门户开始，如图 [Figure 9-3](#9781430244226_Ch09.xhtml#Fig3)\
    \ 所示。\n\n![9781430244226_Fig09-03.jpg](images/9781430244226_Fig09-03.jpg)\n\n\
    [Figure 9-3.](#9781430244226_Ch09.xhtml#_Fig3)  在配置门户中创建 `App ID`\n\n在 [Figure\
    \ 9-3](#9781430244226_Ch09.xhtml#Fig3) 中，我们看到了用于创建 `App ID` 的表单。顶部的字段（标记为 Description）可以是任何您想要的内容，用于提醒您创建此\
    \ `App ID` 的目的。您可以选择任何 `Bundle Seed ID`，但我发现有一个重要的原因不推荐使用默认值：选择默认的 `Bundle Seed\
    \ ID` 会减少在使用 Xcode 时的一些配置步骤。\n\n最后一项是 `Bundle Identifier`。它用于在运行时标识您的应用程序。对于旨在支持\
    \ Game Center 的游戏，您必须指定一个不带通配符的 `Bundle Identifier`。点击“提交”后，您应该在 Xcode 中打开您的游戏项目。\n\
    \n`Bundle Identifier` 必须在 Xcode 中设置，这样 iOS 才能知道如何将设备上运行的二进制文件与 iTunes Connect\
    \ 定义的应用程序关联起来。[Figure 9-4](#9781430244226_Ch09.xhtml#Fig4) 显示了设置 `Bundle Identifier`\
    \ 的位置。\n\n![9781430244226_Fig09-04.jpg](images/9781430244226_Fig09-04.jpg)\n\n\
    [Figure 9-4.](#9781430244226_Ch09.xhtml#_Fig4)  Xcode 中的 `Bundle Identifier`\n\
    \n在 [Figure 9-4](#9781430244226_Ch09.xhtml#Fig4) 中，`Identifier` 字段包含了我们在 Xcode\
    \ 中的 `Bundle Identifier`。这个值，连同版本号，用于向 iTunes Connect 标识正在运行的是哪个应用程序。一旦设置了 `Bundle\
    \ Identifier`，您就必须在 iTunes Connect 中创建一个新的应用程序，如图 [Figure 9-5](#9781430244226_Ch09.xhtml#Fig5)\
    \ 所示。\n\n![9781430244226_Fig09-05.jpg](images/9781430244226_Fig09-05.jpg)\n\n\
    [Figure 9-5.](#9781430244226_Ch09.xhtml#_Fig5)  在 iTunes Connect 中创建新应用程序\n\n\
    在 [Figure 9-5](#9781430244226_Ch09.xhtml#Fig5) 中，我们看到了在 iTunes Connect 中创建新应用程序的第一步。我们指定了\
    \ App 名称并选择了一个 `SKU` 编号。`SKU` 编号可以是任何您想要的内容；它包含在此处是为了让游戏制作方能够在内部系统中跟踪销售情况。我们还可以看到我们可以从一个下拉菜单中选择\
    \ `Bundle ID`；这是我们在创建新 `App ID` 时指定的值。在 iTunes Connect 中创建新应用程序还需要几个步骤，但这些步骤只是填写关于应用程序的信息，并非启用\
    \ Game Center 的必要步骤。系统会要求您提供描述、版权信息和其他详细信息。在最后一步中添加的所有信息都可以跳过，稍后再添加。\n\n一旦应用程序创建完成，检查其详细信息并找到“Manage\
    \ Game Center”按钮，如图 [Figure 9-6](#9781430244226_Ch09.xhtml#Fig6) 所示。\n\n![9781430244226_Fig09-06.jpg](images/9781430244226_Fig09-06.jpg)\n\
    \n[Figure 9-6.](#9781430244226_Ch09.xhtml#_Fig6)  iTunes Connect 中应用程序的配置按钮\n\n\
    在 [Figure 9-6](#9781430244226_Ch09.xhtml#Fig6) 中，我们看到了“Manage Game Center”按钮（标记为\
    \ A）。点击此按钮，系统将提示您启用 Game Center 并创建一个排行榜。[Figure 9-7](#9781430244226_Ch09.xhtml#Fig7)\
    \ 显示了创建或编辑排行榜的页面。\n\n![9781430244226_Fig09-07.jpg](images/9781430244226_Fig09-07.jpg)\n\
    \n[Figure 9-7.](#9781430244226_Ch09.xhtml#_Fig7)  创建或编辑排行榜\n\n在 [Figure 9-7](#9781430244226_Ch09.xhtml#Fig7)\
    \ 中，我们看到了 iTunes Connect 中用于编辑和创建排行榜的网页。在项目 A 处，我们看到一个排行榜的名称。此名称并非显示名称——它仅供内部使用，可以是任何您想要的内容。项目\
    \ B 指示了排行榜的 ID。这是在代码中引用排行榜时使用的值。项目 C 和 D 指示了该排行榜中分数的排序方式。我们选择将分数显示为整数值（无小数位），并认为分数越高越好。项目\
    \ E 显示我们已为一种语言添加了显示信息。可以通过点击“Add Language”按钮并指定排行榜的显示名称，以及在本例中说明这些值称为“points”来添加新语言。\n\
    \n创建或编辑成就与处理排行榜非常相似，如图 [Figure 9-8](#9781430244226_Ch09.xhtml#Fig8) 所示。\n\n![9781430244226_Fig09-08.jpg](images/9781430244226_Fig09-08.jpg)\n\
    \n[Figure 9-8.](#9781430244226_Ch09.xhtml#_Fig8)  创建或编辑成就\n\n在 [Figure 9-8](#9781430244226_Ch09.xhtml#Fig8)\
    \ 中，我们看到了在 iTunes Connect 中用于创建和编辑成就的网页。项目 A 显示了用于成就的内部名称。项目 B 显示了成就的 ID。项目 C\
    \ 指示此成就未被隐藏。默认情况下，即使玩家尚未获得成就，这些成就也是可见的。然而，指定一些隐藏的成就可能很有趣，这样当玩家达成时会感到惊喜。项目 E 显示我们为英语指定了显示文本。当然，可以通过点击“Add\
    \ Language”按钮来添加其他语言的文本。\n\n我们已经了解了如何创建新的 `App ID` 和在 iTunes Connect 中创建新的应用程序。我们还简要了解了创建排行榜和成就所需的界面。现在，让我们来看看利用这些新资源的代码。\n\
    \n### 在游戏中使用 Game Center\n\n一旦 Game Center 设置完成并包含了排行榜和成就功能，使用 GameKit 来开始使用这些功能是出奇地容易。以下部分将讨论如何连接到用户的\
    \ Game Center 账户、将用户的分数提交到排行榜以及获得成就。\n\n### 为用户启用 Game Center\n\n当游戏启用了 Game Center\
    \ 时，用户仍然必须选择使用 Game Center 功能。用户需要在 Game Center 中创建一个账户，并在当前的 iOS 设备上使用该账户进行身份验证。幸运的是，Apple\
    \ 让开始使用 Game Center 变得非常简单。\n\n要开始使用 Game Center，所有应用都必须获取一个代表本地玩家的 `GKLocalPlayer`\
    \ 实例并对其进行身份验证。[Listing 9-1](#9781430244226_Ch09.xhtml#list1) 展示了执行此操作的规范示例。\n\n\
    **[Listing 9-1](#9781430244226_Ch09.xhtml#_list1).**  `RootViewController.m`（`initGameCenter`）\n\
    \n```\n-(void)initGameCenter{  \n    Class gkClass = NSClassFromString(@\"GKLocalPlayer\"\
    );  \n\n    BOOL iosSupported = [[[UIDevice currentDevice] systemVersion] compare:@\"\
