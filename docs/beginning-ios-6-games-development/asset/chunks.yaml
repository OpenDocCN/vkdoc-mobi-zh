    \n## 使用委托来传递应用程序状态\n\n在 iOS 开发中，一个对象与另一个对象通信的常见模式是委托模式。委托就是符合另一个对象所知的某个预定义协议的任何对象。例如，假设我们有一个类\
    \ A，它有一个必须符合协议 P 的属性 `delegate`。如果类 B 符合协议 P，我们就可以将类 B 的实例分配给类 A 的 `delegate`\
    \ 属性。这种委托模式与其他语言（如 Java）中的监听器模式非常相似。\n\n### 声明 `CoinsControllerDelegate`\n\n为了让\
    \ `CoinsController` 类将其状态传达给 `GameController` 类，我们创建一个描述这种关系的协议。清单 3-6 展示了文件 `CoinsController.h`\
    \ 中协议 `CoinsControllerDelegate` 的声明。\n\n**清单 3-6.** `CoinsControllerDelegate`（来自\
    \ `CoinsController.h`）\n\n```objc\n@protocol CoinsControllerDelegate < NSObject>\n\
    -(void)gameDidStart:(CoinsController*)aCoinsController with:(CoinsGame*)game;\n\
    -(void)scoreIncreases:(CoinsController*)aCoinsController with:(int)newScore;\n\
    -(void)turnsRemainingDecreased:(CoinsController*)aCoinsController with:(int)turnsRemaining;\n\
    -(void)gameOver:(CoinsController*)aCoinsController with:(CoinsGame*)game;\n@end\n\
    ```\n\n如清单 3-6 所示，协议非常简单。协议的名称跟在 `@protocol` 之后。`<NSObject>` 指定了哪些类型的对象可以符合这个协议。在\
    \ `@protocol` 和 `@end` 之间声明了一些任务。这些是将要发送给委托对象的消息，因此委托对象应该实现这些任务中的每一个。委托字段在 `CoinsController`\
    \ 的接口部分中声明如下：\n\n```objc\nIBOutlet id <CoinsControllerDelegate> delegate;\n```\n\
    \n我们还为此字段定义了一个属性，属性声明如下：\n\n```objc\n@property (nonatomic, retain) id <CoinsControllerDelegate>\
    \ delegate;\n```\n\n关于 `delegate` 属性的声明，需要注意两点。第一，我们可以将任何对象分配为委托。由于它是 `id` 类型，如果分配的对象已知不符合\
    \ `CoinsControllerDelegate` 协议，我们将收到编译器警告。第二，我们将其定义为 `IBOutlet`，这允许我们在 Interface\
    \ Builder 中实际设置 `GameController` 对象和 `CoinsController` 对象之间的关系。这并不是必需的，但如果你打算编写供其他开发者使用的代码，这会是一个方便的补充。\n\
    \n查看 `GameController` 类的声明，我们可以看到它符合 `CoinsControllerDelegate` 协议，如下所示：\n\n```objc\n\
    @interface GameController : UIViewController <CoinsControllerDelegate> {\n```\n\
