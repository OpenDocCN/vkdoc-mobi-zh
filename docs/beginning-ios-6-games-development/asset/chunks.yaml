    [UIColor colorWithRed:1.0 green:1.0 blue:0.0 alpha:c2alpha];         color3 =
    [UIColor colorWithRed:1.0 green:1.0 blue:0.0 alpha:c3aplha];     }     UIColor*
    color4 = [UIColor colorWithRed:0.0 green:0.0 blue:0.0 alpha:0.0];      CGColorRef
    clr[] = { [color1 CGColor], [color2 CGColor] , [color3 CGColor], [color4 CGColor]};
        CFArrayRef colors = CFArrayCreate(NULL, (const void**)clr, sizeof(clr) / sizeof(CGColorRef),
    &kCFTypeArrayCallBacks);      CGGradientRef grad = CGGradientCreateWithColors(space,
    colors, locations);     CGColorSpaceRelease(space);      CGContextDrawRadialGradient(context,
    grad, CGPointMake(self.radius, self.radius), 0, CGPointMake(self.


    radius, self.radius), self.radius, 0);      CGGradientRelease(grad); } ```    In
    [Listing 7-25](#9781430244226_Ch07.xhtml#list25), we want to draw a simple radial
    gradient with the color appropriate to the variant at the center and transparent
    at the edge. We have to create a four-color gradient to achieve a nice-looking
    Comet. The first color is mostly white and fully opaque, the next two colors are
    the color of the variant with two different alpha values. The last color will
    be completely transparent. The function `CGContextDrawRadialGradient` draws the
    radial gradient at the center of the actor with the first color and creates a
    smooth transition to the transparent edge of the actor.    Now that we can see
    how each particle is drawn, we should look how the particles are created, [Listing
    7-26](#9781430244226_Ch07.xhtml#list26) shows the implementation of `Comet''s
    step:` task.    [**Listing 7-26.**](#9781430244226_Ch07.xhtml#_list26)  Comet.m
    (step:)    ``` -(void)step:(GameController*)controller{     if ([controller stepNumber]%3
    == 0){         VectorRepresentation* rep = [VectorRepresentation vectorRepresentation];
            [rep setDelegate:self];          int totalStepsAlive = arc4random()%60
    + 60;         Particle* particle = [Particle particleAt:self.center WithRep:rep
    Steps:totalStepsAlive];         [particle setRadius:self.radius];         [controller
    addActor: particle];     } } ```    In [Listing 7-26](#9781430244226_Ch07.xhtml#list26),
    the step: task creates a new `Particle` every three steps in the animation. For
    each new `Particle`, a `VectorRepresentation` is created, but note that the `delegate`
    is the `Comet` object. The `Particle` is created with a random life span from
    1 to 2 seconds. This randomness creates the slight flickering variation in the
    tail of the comet. Notice that the `Particle` has no additional behaviors added
    at this point; this causes the `Particle` to just sit in one place and fade away.    Summary    In
    this chapter we looked at a technique to create actors in our game that are drawn
    programmatically. We created a new class called `VectorRepresentation` to handle
    the details of creating a `UIView` for our code to draw on. We used these new
    vector-based actors to create a health bar and a simple bullet. The chapter continued
    by showing two simple examples of creating particle systems. The first example
    reused the art for the asteroids to create a sense of debris when we exploded
    the asteroids. The second example used vector-based particles to create comets
    with glowing tails. The actors created in this and the previous chapter will be
    used to create a complete game in [Chapter 12](#9781430244226_Ch12.xhtml).    Chapter
        8    Building Your Game: Understanding Gestures and Movements    The really
    neat thing about creating games for mobile devices is the unique way that the
    user interacts with the game. The complex gestures supported by `iOS` are a relatively
    new way to interact with a computer, and new interface techniques can give users
    trouble if they are unfamiliar with them. However, users of `iOS` are already
    familiar with the concepts of double taps, pinches, and swipes, so including these
    gestures in your game does not present a usability problem.    In this chapter,
    we will explore how you can add gestures to your application or game using the
    built-in libraries provided by `iOS`. We will also explore how to attach specific
    gestures to specific actors in a game. By the end of this chapter, you will know
    how to work with all supported gestures and be able to use them to drive user
    interaction in a game. We will be using the familiar classes of `GameController`,
    Actor, and the rest, in our examples. So your understanding of these gesture events
    will be tied directly into what you have learned in the previous chapters.    Beyond
    simply touching the screen, users can interact with `iOS` 6 applications through
    the accelerometer or the gyroscope included in the newer devices.'
