    triangle, square, and circle represents a different type of coin. The object of
    the game is to create columns and rows of like coins. The only way to rearrange
    the coins is by selecting two to trade places. When a row or column of like coins
    is created, the player’s score is incremented and new coins appear to replace
    those in the matching column or row. The player can only swap coins ten times
    before the game is over, but with careful planning, a player can create multiple
    matches per swap. When the game is over, the High Score view is shown, highlighting
    any new high score the player may have achieved. [Figure 3-5](#9781430244226_Ch03.xhtml#Fig5)
    shows the High Score view.    ![9781430244226_Fig03-05.jpg](images/9781430244226_Fig03-05.jpg)    [Figure
    3-5.](#9781430244226_Ch03.xhtml#_Fig5)  The High Score view    In [Figure 3-5](#9781430244226_Ch03.xhtml#Fig5),
    you can see the High Score view; it highlights the score of the last game played,
    which is the third score from the top (it is slightly lighter than the others
    in the black and white image). The high scores presented in this view are saved
    between application sessions. Later in this chapter, we will explore how the High
    Score data are saved. When the user is done inspecting their past and current
    successes, they can select the Done button to be directed back to the Welcome
    view. From the Welcome view, they can click the About button and view some information
    about the game, as shown in [Figure 3-6](#9781430244226_Ch03.xhtml#Fig6).    ![9781430244226_Fig03-06.jpg](images/9781430244226_Fig03-06.jpg)    [Figure
    3-6.](#9781430244226_Ch03.xhtml#_Fig6)  The Welcome view    The Welcome view presented
    in [Figure 3-6](#9781430244226_Ch03.xhtml#Fig6) is very much a placeholder. You
    would want to replace the “Lorem ipsem . . . ” with a description of your game.    In
    the [Chapter 2](#9781430244226_Ch02.xhtml), we explored how to configure an XIB
    file containing the various UI elements in the game. With this game, we follow
    a very similar pattern.    Understanding the Project’s Structure    Even a simple
    game can have a surprising number of artifacts in the Xcode project. Exploring
    what these items are helps you understand where each piece of the application
    is defined and how they fit together. [Figure 3-7](#9781430244226_Ch03.xhtml#Fig7)
    shows the Project Explorer in Xcode, which lists a number of the files used in
    this project.    ![9781430244226_Fig03-07.jpg](images/9781430244226_Fig03-07.jpg)    [Figure
    3-7.](#9781430244226_Ch03.xhtml#_Fig7)  Project files for the Project Sample 03    The
    project files shown in [Figure 3-7](#9781430244226_Ch03.xhtml#Fig7) follows the
    same pattern as the project from [Chapter 2](#9781430244226_Ch02.xhtml). There
    are the shared classes under the group `Sample 03`, while device-specific classes
    are stored under the groups iPhone and iPad. The class `Sample_03AppDelegate`
    contains the initialization code for the application and code for saving the user
    state when a player exits the application. The XIB files are also wired up very
    much like the XIB files from [Chapter 2](#9781430244226_Ch02.xhtml): the XIB files
    starting with `MainWindow` each contain a `GameController` of the appropriate
    subclass. The class `GameController` contains all of the logic for managing the
    state of the application, while the XIB files for each subclass contain the UI
    elements suitable for each device.    The class `CoinsController` describes the
    fun part of the game and the class `CoinGame` is a model class that describes
    which type of coins are where, and also the current score and remaining turns.


    By archiving an object of the class `CoinGame`, we can save the state of the current
    game when the application quits.    The class `HighscoreController` manages the
    High Score view and displays the data found in the class `Highscores`. The class
    `Highscores` contains an array of `Score` objects, where each `Score` object represents
    a score and the date that score was achieved. By serializing an instance of `Highscores`,
    we can preserve a user’s high scores between play sessions.    The meat of the
    view configuration is defined in the two `GameController` XIB files. Let’s take
    a look at those.    Configuring an Application for Multiple Views    While this
    application works equally well on the iPhone and the iPad, let’s just look at
    the iPhone version of the GameController XIB file, shown in [Figure 3-8](#9781430244226_Ch03.xhtml#Fig8).    ![9781430244226_Fig03-08.jpg](images/9781430244226_Fig03-08.jpg)    [Figure
    3-8.](#9781430244226_Ch03.xhtml#_Fig8)  GameController_iPhone.xib    In [Figure
    3-8](#9781430244226_Ch03.xhtml#Fig8), we see the details of the file `GameController_iPhone.xib`
    on the left. On the right, we see the `IBOutlets` and `IBActions` defined in the
    file `GameController.h`.    Reviewing GameController_iPhone.xib    Under the Objects
    section on the left, we see a number of `UIViews`. The Landscape Play view and
    the Portrait Play view are shown when the game is being played, which is the only
    time this application supports both orientations. For simplicity, the rest of
    the views are for portrait orientation only.    When the application initializes,
    we know that the first view the user sees is the Loading view. After that, the
    user is directed to the Welcome view. In [Figure 3-8](#9781430244226_Ch03.xhtml#Fig8),
    we can see that both of these views are defined in the XIB file. We also see that
    the About view is defined in the XIB file. For the actual game and the High Score
    view, we see corresponding `UIViewControllers` in the XIB. These two views are
    handled with a `UIViewController` because the each contributes a reasonable amount
    of functionality, so it makes sense to define their behaviors in their own `UIViewController`
    classes. As a side effect of this design decision, we can reuse High Score `UIViewController`
    in other applications.    Reviewing GameController.h    On the right of [Figure
