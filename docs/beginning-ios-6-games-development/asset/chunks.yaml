    \n在代码清单 8-12 中，我们看到了`TemporaryBehavior`类的实现。构造函数只是创建一个`TemporaryBehavior`对象并用提供的参数填充它。任务`applyToActor:In:`来自协议`Behavior`（`TemporaryBehavior`遵循该协议），并在游戏的每一步被调用。在此任务中，我们只是将提供的行为应用于角色，并告知委托此工作已完成。继续点击手势的例子，让我们看看`TapGestureController`如何响应任务`stepsUpdatedOn:By:In:`，如代码清单\
    \ 8-13 所示。\n\n**代码清单 8-13.** `TapGestureController.m (stepsUpdatedOn:By:In:)`\n\
    \n```\n-(void)stepsUpdatedOn:(Actor*)anActor By:(TemporaryBehavior*)tempBehavior\
    \ In:(GameController*)controller{\n    if ([tempBehavior stepsRemaining]==0){\n\
    \        [anActor setState:STATE_NO_GLOW];\n    }\n}\n```\n\n在代码清单 8-13 中，我们看到了`TapGestureController`类定义的任务`stepsUpdatedOn:By:In:`。在此任务中，我们只是检查`TemporaryBehavior`（即`tempBehavior`）是否已到生命周期终点。如果是，我们便将角色的状态设置为`STATE_NO_GLOW`，从而停止增强道具的旋转。\n\
    \n我们已经详细研究了`UITapGestureRecognizer`可用的不同配置。下一节将探讨一种新的手势：捏合。\n\n## 捏合手势\n\n捏合手势在`iOS`中通常用于放大、缩小或缩放屏幕上的内容。这种手势通过放置两根手指，然后让它们相互靠近或远离来触发。图\
    \ 8-3 展示了这种手势的实际效果。\n\n![9781430244226_Fig08-03.jpg](img/9781430244226_Fig08-03.jpg)\n\
    \n图 8-3. 捏合手势改变飞碟的大小\n\n在图 8-3 中，我们看到了使用捏合手势的示例。左侧，飞碟因向外捏合手势而被放大。右侧，同一个飞碟因向内捏合手势而被缩小。在飞碟被缩放时，它会停止旋转。我们利用捏合手势的不同状态来暂停和恢复旋转。\n\
    \n通过将`UIPinchGestureRecognizer`实例添加到`UIView`可以检测捏合手势。`UIPinchGestureRecognizer`不仅会在捏合手势发生时通知你，还会报告与手势相关的缩放比例和速度值。由`UIPinchGestureRecognizer`报告缩放比例非常方便，因为这是捏合手势最常见的用途。\n\
    \n此示例在`PinchGestureController`类中实现。让我们快速查看一下头文件，如代码清单 8-14 所示。\n\n**代码清单 8-14.**\
    \ `PinchGestureController.h`\n"
- fmt: "```objectivec\n@interface PinchGestureController : GameController{\n    Saucer*\
    \ saucer;\n    float startRadius;\n}\n-(void)pinchGesture:(UIPinchGestureRecognizer*)sender;\n\
    @end\n```\n\n在[列表 8-14](#9781430244226_Ch08.xhtml#list14)中，我们看到了`PinchGestureController`类的头文件。与之前的示例类似，它继承自`GameController`。它还维护了对`Saucer`对象的引用，以及手势开始时`Saucer`对象的半径。任务`pinchGesture:`由手势识别器调用。该类的实现将进一步揭示此示例的工作原理，首先从`doSetup`任务开始，如[列表\
    \ 8-15](#9781430244226_Ch08.xhtml#list15)所示。\n\n**[列表 8-15](#9781430244226_Ch08.xhtml#_list15).**\
    \ `PinchGestureController (doSetup)`\n\n```objectivec\n-(BOOL)doSetup{\n    if\
    \ ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\n\
    \        saucer = [Saucer saucer:self];\n        [self addActor:saucer];\n   \
    \     UIPinchGestureRecognizer* pinchRecognizer = [[UIPinchGestureRecognizer alloc]\
    \ initWithTarget:self action:@selector(pinchGesture:)];\n        [actorsView addGestureRecognizer:pinchRecognizer];\n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\n在[列表 8-15](#9781430244226_Ch08.xhtml#list15)中，我们为`PinchGestureController`类实现了一个非常简单的`doSetup`任务。我们只是简单添加了一个新的飞碟，并设置了一个`UIPinchGestureRecognizer`，以便在识别到捏合手势时调用`pinchGesture:`。接下来，让我们看看如何响应这个手势。\n\
    \n## 响应捏合手势\n\n我们已经了解了如何注册捏合手势识别器。`pinchGesture:`的实现如[列表 8-16](#9781430244226_Ch08.xhtml#list16)所示。\n\
    \n**[列表 8-16](#9781430244226_Ch08.xhtml#_list16).** `PinchGestureController (pinchGesture:)`\n\
    \n```objectivec\n-(void)pinchGesture:(UIPinchGestureRecognizer*)pinchRecognizer{\n\
    \    if (pinchRecognizer.state == UIGestureRecognizerStateBegan){\n        startRadius\
    \ = [saucer radius];\n        [saucer setAnimationPaused:YES];\n    } else if\
    \ (pinchRecognizer.state == UIGestureRecognizerStateChanged){\n        float scale\
    \ = [pinchRecognizer scale];\n        float velocity =  [pinchRecognizer velocity];\n\
    \        NSLog(@\"Scale: %f Velocty: %f\",scale, velocity);\n        float radius\
    \ = startRadius*scale;\n        if (radius < 8){\n            radius =  8;\n \
    \       } else if (radius > 128.0){\n            radius = 128;\n        }\n  \
    \      [saucer setRadius:radius];\n    } else if (pinchRecognizer.state == UIGestureRecognizerStateEnded){\n\
    \        [saucer setAnimationPaused:NO];\n    } else if (pinchRecognizer.state\
    \ == UIGestureRecognizerStateCancelled){\n        [saucer setRadius:startRadius];\n\
    \        [saucer setAnimationPaused:NO];\n    }\n}\n```\n\n在[列表 8-16](#9781430244226_Ch08.xhtml#list16)中，我们看到了当在`UIView\
    \ actorsView`上检测到捏合手势时调用的任务`pinchGesture:`。在这个示例中，我们检查手势识别器的状态。状态信息指示手势是刚刚开始（`UIGestureRecognizerStateBegan`）、正在进行（`UIGestureRecognizerStateChanged`），还是已经终止（`UIGestureRecognizerStateEnded`或`UIGestureRecognizerStateCancelled`）。\n\
    \n手势开始时，我们记录飞碟的半径并存储在变量`startRadius`中。我们还在飞碟上调用`setAnimationPaused:`，以在缩放时停止其动画。这不是必须的，我们这样做只是为了在手机上运行示例时，能够观察手势识别器状态的变化。\n\
    \n手势进行时，我们获取手势的缩放比例和速度。缩放值是从手势开始到当前时刻的变化量。换句话说，缩放是累积的，这就是为什么我们将缩放应用于`startRadius`，而不是飞碟的当前半径。计算出新的半径后，我们将其应用于飞碟。\n\
    \n速度是每秒的缩放因子。这个值可用于计算手势结束后动画的惯性量。我们在这里除了记录日志外并未使用该值。\n\n手势正常结束时，我们简单地将飞碟的`animationPaused`属性设为`NO`，这将重新启动飞碟的动画。如果手势被取消，我们将飞碟重置回原始半径并取消暂停动画。要测试取消状态，可以先将飞碟缩到最小，然后用一只手开始放大，同时另一只手按下`iPhone`顶部的电源键。这将使您退出应用程序。然后重新启动示例应用程序，注意飞碟已恢复到原始的小尺寸。\n\
    \n捏合手势是我们在本章中介绍的第一个多状态手势。接下来我们将介绍平移或拖动手势，这是另一个多状态手势。我们会看到它的行为与捏合手势非常相似。\n\n##\
    \ 平移（或拖动）手势\n\n平移手势是您在地图应用中用来查看地图不同部分的那种手势。拖动手势也用于解锁手机或下拉通知中心。如果您仔细想想，这些手势本质上是一样的：用户将手指放下，沿近似直线移动，然后抬起。区别在于应用程序的响应方式。当视图平移过某些内容（例如地图或图像）时，我们称之为平移手势。当您在屏幕上移动一个UI组件（例如滑块旋钮）时，我们称之为拖动。无论我们在描述中如何称呼它，这个手势都是通过`UIPanGestureRecognizer`类实现的（抱歉，还是拖动）。[图\
    \ 8-4](#9781430244226_Ch08.xhtml#Fig4) 展示了一个使用`UIPanGestureRecognizer`的示例。\n\n\
    ![9781430244226_Fig08-04.jpg](images/9781430244226_Fig08-04.jpg)\n\n[图 8-4.](#9781430244226_Ch08.xhtml#_Fig4)\
    \ 平移或拖动示例\n\n在[图 8-4](#9781430244226_Ch08.xhtml#Fig4) 中，我们看到三个小行星。每个小行星都可以沿着一条不可见的路径上下拖动。拖动小行星时，您可以将手指一直向右或向左移动。这使得操作起来容易得多，因为用户一旦让选中的小行星开始移动，就不必太在意手指的移动位置。这个简单的示例从`PanGestureController`类的头文件开始，如[列表\
    \ 8-17](#9781430244226_Ch08.xhtml#list17)所示。\n\n**[列表 8-17](#9781430244226_Ch08.xhtml#_list17).**\
