    \ rowCount];\n    int colCount = [coinsGame colCount];\n\n    for (NSNumber* row\
    \ in matchingRows){\n        for (int c = 0;c < colCount;c++){\n            Coord\
    \ coord = CoordMake([row intValue], c);\n            [self spinCoinAt:coord];\n\
    \        }\n    }\n\n    for (NSNumber* col in matchingCols){\n        for (int\
    \ r = 0;r < rowCount;r++){\n            Coord coord = CoordMake(r, [col intValue]);\n\
    \            [self spinCoinAt:coord];\n        }\n    }\n\n    [self checkMatches];\n\
    }\n```\n\n任务`updateCoinView`在代表硬币的`UIImageViews`完全移出屏幕后被调用。"
  raw: 'We can do this by setting self as the `delegate` to the animation `animScaleDown`,
    if we are working with `coinViewA`, because we need to be notified only once.
    We also want to know when all of these animations are over, so we also use `self`
    as the `delegate` to `animScaleUp`. The animations that have had their delegates
    set will call the task `animationDidStop:finished:` when they are done, as shown
    in [Listing 4-26](#9781430244226_Ch04.xhtml#list26).    [**Listing 4-26.**](#9781430244226_Ch04.xhtml#_list26)  `CoinsController
    (animationDidStop:finished:)`    ``` - (void)animationDidStop:(CAAnimation *)theAnimation
    finished:(BOOL)flag{     if ([[theAnimation valueForKey:@"name"] isEqual:@"animScaleDown"]){          UIImage*
    imageA = [coinViewA image];         [coinViewA setImage:[coinViewB image]];         [coinViewB
    setImage:imageA];      } else if ([[theAnimation valueForKey:@"name"] isEqual:@"animScaleUp"]){
            [self checkMatches];         [self spinCoinAt:firstSelectedCoin];         [self
    spinCoinAt:secondSelectedCoin];      } else if ([[theAnimation valueForKey:@"name"]
    isEqual:@"animateOffScreen"]){         [coinsGame randomizeRows: matchingRows];
            [coinsGame randomizeCols: matchingCols];         [self updateCoinViews];
        } } ```    Here we can see the task `animationDidStop:finished:`. Notice that
    three animations call this task. The first two if statements are for handling
    the animations described in [Listing 4-25](#9781430244226_Ch04.xhtml#list25).
    When the `animScaleDown` animation is done, we swap the `UIImages` used by `UIImageViews`
    to represent the two selected coins.    When the animation `animScaleUp` is done,
    we want to check whether there are any matches. Calling `checkMatches` does this.
    We also want to start the recently selected coins spinning again. The implementation
    of `checkMatches` is shown in [Listing 4-27](#9781430244226_Ch04.xhtml#list27).    [**Listing
    4-27.**](#9781430244226_Ch04.xhtml#_list27)  `CoinsController.m (checkMatches)`    ```
    -(void)checkMatches{       matchingRows = [coinsGame findMatchingRows];     matchingCols
    = [coinsGame findMatchingCols];      int rowCount = [coinsGame rowCount];     int
    colCount = [coinsGame colCount];      BOOL isDelegateSet = NO;      if ([matchingRows
    count] > 0){          for (NSNumber* row in matchingRows){             for (int
    c = 0;c < colCount;c++){                 CABasicAnimation* animateOffScreen =
    [CABasicAnimation animationWithKeyPath:@"position.x"];                 [animateOffScreen
    setValue:@"animateOffScreen" forKey:@"name"];                 animateOffScreen.byValue
    = [NSNumber numberWithFloat:coinsView.frame.size.width];                 animateOffScreen.duration
    = 2.0;                 animateOffScreen.timingFunction = [CAMediaTimingFunction
    functionWithName:kCAMediaTimingFunctionEaseIn];                 Coord coord =
    CoordMake([row intValue], c);                 int index = [coinsGame indexForCoord:coord];
                    UIImageView* coinView = [[coinsView subviews] objectAtIndex: index];
                    if (c == 0){                     [animateOffScreen setDelegate:self];
                        isDelegateSet = YES;                 }                 [coinView.layer
    addAnimation:animateOffScreen forKey:@"animateOffScreenX"];             }         }
        }     if ([matchingCols count] > 0){         for (NSNumber* col in matchingCols){
                for (int r = 0;r < rowCount;r++){                 CABasicAnimation*
    animateOffScreen = [CABasicAnimation animationWithKeyPath:@"position.y"];                 [animateOffScreen
    setValue:@"animateOffScreen" forKey:@"name"];                 animateOffScreen.byValue
    = [NSNumber numberWithFloat:coinsView.frame.size.height];                 animateOffScreen.duration
    = 2.0;                 animateOffScreen.


    timingFunction = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseIn];
                    Coord coord = CoordMake(r, [col intValue]);                 int
    index = [coinsGame indexForCoord:coord];                 UIImageView* coinView
    = [[coinsView subviews] objectAtIndex: index];                 if (!isDelegateSet
    && r == 0){                     [animateOffScreen setDelegate:self];                 }
                    [coinView.layer addAnimation:animateOffScreen forKey:@"animateOffScreenY"];
                }         }     }     int totalMatches = [matchingCols count] + [matchingRows
    count];     if (totalMatches > 0){         [coinsGame setScore:[coinsGame score]
    + totalMatches];         [delegate scoreIncreases:self with:[coinsGame score]];
        } else {         if ([coinsGame remaingTurns] <= 0){             //delay calling
    gameOver on the delegate so the coin''s UIImageViews show the correct coin.             [NSTimer
    scheduledTimerWithTimeInterval:1 target:self selector:@selector(doEndGame) userInfo:nil
    repeats:FALSE];         } else {             //all matches are done animating
    and we have turns left.             acceptingInput = YES;         }     } ```    We
    find all matching rows and columns by calling `findMatchingRows` and `findMatchinCols`
    on `coinsGame`. After we have these arrays of matches, we want to animate all
    of the coins involved in a match of the screen. If there are `matchingRows`, we
    create a new `CABasicAnimation` for each coin that modifies the position value
    of x of the underlying `CALayer` object. Instead of setting the exact starting
    and ending values of x, we can simply specify the `byValue`, which we make the
    `width` of the `coinsView`. By specifying the `byValue`, we can use this animation
    for all coins in the row, because this animation will simply infer that the `fromValue`
    is the starting `x` value for each coin view, and the `toValue` with be `fromValue`
    + `byValue`.    After the animations for matching rows and columns are created,
    we check to see how many matches in total were created on this turn. If this value
    is bigger than zero, we update the score of the `coinsGame` object and inform
    the `delegate` that the score has changed. If no matches are found, we check whether
    the game is over. If it is over, we use the `NSTimer` class to call `doEndGame`
    in 1 second. This delay is for aesthetic reasons; it is nice to have a little
    pause before the high scores are shown. If it is not the end of the game, we simply
    start accepting input again. [Listing 4-28](#9781430244226_Ch04.xhtml#list28)
    shows the task `doEndGame`, which simply informs the delegate that the game is
    over.    [**Listing 4-28. **](#9781430244226_Ch04.xhtml#_list28)CoinsController.m
    (doEndGame)    ``` -(void)doEndGame{     [delegate gameOver:self with: coinsGame];
    } ```    The animations created earlier in [Listing 4-27](#9781430244226_Ch04.xhtml#list27)
    will call the task `animationDidStop:finished:` when they are done, in the same
    way the scaling animations did. We use this callback to randomize the matches
    and call `updateCoinViews`, shown in [Listing 4-29](#9781430244226_Ch04.xhtml#list29).    [**Listing
    4-29.**](#9781430244226_Ch04.xhtml#_list29)  `CoinsController.m (updateCoinViews)`    ```
    -(void)updateCoinViews{     int rowCount = [coinsGame rowCount];     int colCount
    = [coinsGame colCount];      for (NSNumber* row in matchingRows){         for
    (int c = 0;c < colCount;c++){             Coord coord = CoordMake([row intValue],
    c);             [self spinCoinAt:coord];         }     }     for (NSNumber* col
    in matchingCols){         for (int r = 0;r < rowCount;r++){             Coord
    coord = CoordMake(r, [col intValue]);             [self spinCoinAt:coord];         }
        }     [self checkMatches]; } ```    The task `updateCoinView` is called when
    the `UIImageViews` that represent the coins are fully offscreen.'
  trans: "\n我们可以通过将`self`设置为动画`animScaleDown`的`delegate`来实现此操作，前提是我们正在处理`coinViewA`，因为我们只需要被通知一次。我们还希望在所有这些动画结束时得到通知，因此也将`self`设置为`animScaleUp`的`delegate`。已设置委托的动画在完成后将调用任务`animationDidStop:finished:`，如清单\
    \ 4-26 所示。\n\n**清单 4-26.** `CoinsController (animationDidStop:finished:)`\n\n\
    ```objc\n- (void)animationDidStop:(CAAnimation *)theAnimation finished:(BOOL)flag{\n\
    \    if ([[theAnimation valueForKey:@\"name\"] isEqual:@\"animScaleDown\"]){\n\
    \        UIImage* imageA = [coinViewA image];\n        [coinViewA setImage:[coinViewB\
    \ image]];\n        [coinViewB setImage:imageA];\n    } else if ([[theAnimation\
    \ valueForKey:@\"name\"] isEqual:@\"animScaleUp\"]){\n        [self checkMatches];\n\
    \        [self spinCoinAt:firstSelectedCoin];\n        [self spinCoinAt:secondSelectedCoin];\n\
    \    } else if ([[theAnimation valueForKey:@\"name\"] isEqual:@\"animateOffScreen\"\
    ]){\n        [coinsGame randomizeRows: matchingRows];\n        [coinsGame randomizeCols:\
    \ matchingCols];\n        [self updateCoinViews];\n    }\n}\n```\n\n这里我们看到了任务`animationDidStop:finished:`。注意有三个动画调用了此任务。前两个`if`语句用于处理清单\
    \ 4-25 中描述的动画。当`animScaleDown`动画完成时，我们交换`UIImageViews`所使用的`UIImages`，以表示两个被选中的硬币。\n\
    \n当动画`animScaleUp`完成时，我们希望检查是否存在匹配。调用`checkMatches`即可实现。我们还希望重新开始旋转最近选中的硬币。`checkMatches`的实现如清单\
    \ 4-27 所示。\n\n**清单 4-27.** `CoinsController.m (checkMatches)`\n\n```objc\n-(void)checkMatches{\n\
    \    matchingRows = [coinsGame findMatchingRows];\n    matchingCols = [coinsGame\
    \ findMatchingCols];\n    int rowCount = [coinsGame rowCount];\n    int colCount\
    \ = [coinsGame colCount];\n    BOOL isDelegateSet = NO;\n\n    if ([matchingRows\
    \ count] > 0){\n        for (NSNumber* row in matchingRows){\n            for\
    \ (int c = 0;c < colCount;c++){\n                CABasicAnimation* animateOffScreen\
    \ = [CABasicAnimation animationWithKeyPath:@\"position.x\"];\n               \
    \ [animateOffScreen setValue:@\"animateOffScreen\" forKey:@\"name\"];\n      \
    \          animateOffScreen.byValue = [NSNumber numberWithFloat:coinsView.frame.size.width];\n\
    \                animateOffScreen.duration = 2.0;\n                animateOffScreen.timingFunction\
    \ = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseIn];\n \
    \               Coord coord = CoordMake([row intValue], c);\n                int\
    \ index = [coinsGame indexForCoord:coord];\n                UIImageView* coinView\
    \ = [[coinsView subviews] objectAtIndex: index];\n                if (c == 0){\n\
    \                    [animateOffScreen setDelegate:self];\n                  \
    \  isDelegateSet = YES;\n                }\n                [coinView.layer addAnimation:animateOffScreen\
    \ forKey:@\"animateOffScreenX\"];\n            }\n        }\n    }\n\n    if ([matchingCols\
    \ count] > 0){\n        for (NSNumber* col in matchingCols){\n            for\
    \ (int r = 0;r < rowCount;r++){\n                CABasicAnimation* animateOffScreen\
    \ = [CABasicAnimation animationWithKeyPath:@\"position.y\"];\n               \
    \ [animateOffScreen setValue:@\"animateOffScreen\" forKey:@\"name\"];\n      \
    \          animateOffScreen.byValue = [NSNumber numberWithFloat:coinsView.frame.size.height];\n\
    \                animateOffScreen.duration = 2.0;\n                animateOffScreen.timingFunction\
    \ = [CAMediaTimingFunction functionWithName:kCAMediaTimingFunctionEaseIn];\n \
    \               Coord coord = CoordMake(r, [col intValue]);\n                int\
    \ index = [coinsGame indexForCoord:coord];\n                UIImageView* coinView\
    \ = [[coinsView subviews] objectAtIndex: index];\n                if (!isDelegateSet\
    \ && r == 0){\n                    [animateOffScreen setDelegate:self];\n    \
    \            }\n                [coinView.layer addAnimation:animateOffScreen\
    \ forKey:@\"animateOffScreenY\"];\n            }\n        }\n    }\n\n    int\
    \ totalMatches = [matchingCols count] + [matchingRows count];\n    if (totalMatches\
    \ > 0){\n        [coinsGame setScore:[coinsGame score] + totalMatches];\n    \
    \    [delegate scoreIncreases:self with:[coinsGame score]];\n    } else {\n  \
    \      if ([coinsGame remaingTurns] <= 0){\n            // delay calling gameOver\
    \ on the delegate so the coin's UIImageViews show the correct coin.\n        \
    \    [NSTimer scheduledTimerWithTimeInterval:1 target:self selector:@selector(doEndGame)\
    \ userInfo:nil repeats:FALSE];\n        } else {\n            // all matches are\
    \ done animating and we have turns left.\n            acceptingInput = YES;\n\
    \        }\n    }\n}\n```\n\n我们通过在`coinsGame`上调用`findMatchingRows`和`findMatchinCols`来找出所有匹配的行和列。获得这些匹配数组后，我们希望将所有参与匹配的硬币动画移出屏幕。如果存在`matchingRows`，我们为每个硬币创建一个新的`CABasicAnimation`，用于修改底层`CALayer`对象的`x`位置值。我们不需要设置`x`的确切起始值和结束值，只需指定`byValue`，并将其设置为`coinsView`的`width`。通过指定`byValue`，我们可以将此动画用于行中的所有硬币，因为该动画将简单地将`fromValue`推断为每个硬币视图的起始`x`值，而`toValue`将是`fromValue`\
    \ + `byValue`。\n\n创建匹配行和列的动画后，我们检查本轮总共生成了多少个匹配。如果该值大于零，我们更新`coinsGame`对象的分数，并通知`delegate`分数已更改。如果没有找到匹配，我们检查游戏是否结束。如果游戏结束，我们使用`NSTimer`类在\
    \ 1 秒后调用`doEndGame`。此延迟是出于美观原因；在显示高分之前稍作停顿是很好的。如果游戏尚未结束，我们只需再次开始接受输入。清单 4-28 显示了任务`doEndGame`，它只是通知委托游戏结束。\n\
    \n**清单 4-28.** `CoinsController.m (doEndGame)`\n\n```objc\n-(void)doEndGame{\n\
    \    [delegate gameOver:self with: coinsGame];\n}\n```\n\n之前清单 4-27 中创建的动画，在完成时会像缩放动画一样调用任务`animationDidStop:finished:`。我们利用这个回调来随机化匹配并调用`updateCoinViews`，如清单\
    \ 4-29 所示。\n\n**清单 4-29.** `CoinsController.m (updateCoinViews)`\n\n```objc\n\
    -(void)updateCoinViews{\n    int rowCount = [coinsGame rowCount];\n    int colCount\
    \ = [coinsGame colCount];\n\n    for (NSNumber* row in matchingRows){\n      \
    \  for (int c = 0;c < colCount;c++){\n            Coord coord = CoordMake([row\
    \ intValue], c);\n            [self spinCoinAt:coord];\n        }\n    }\n\n \
    \   for (NSNumber* col in matchingCols){\n        for (int r = 0;r < rowCount;r++){\n\
    \            Coord coord = CoordMake(r, [col intValue]);\n            [self spinCoinAt:coord];\n\
    \        }\n    }\n\n    [self checkMatches];\n}\n```\n\n任务`updateCoinView`在代表硬币的`UIImageViews`完全移出屏幕后被调用。\n"
- fmt: "This task goes though each set of rows and columns from the previously matched\
    \ sets and starts the coins spinning again in their original locations, but with\
    \ images that match the new values. Finally, `checkMatches` is called again, to\
    \ handle any cases of the new random values creating new matches.\n\n## Summary\n\
    \nIn this chapter, we explored how to create an input-driven game. This included\
    \ understanding the management of a game state, the basics of user input, and\
    \ the use of core animation to create animations. Game state is managed by creating\
    \ a class to hold the data required to re-create the game in a display-agnostic\
    \ way. To allow the user to interact with the game, basic gesture recognizers\
    \ must be added to the correct views. A controller class interprets each user\
    \ gesture in a game-specific context and produces animations that reflect a change\
    \ in the game state.\n\n## Chapter 5: Quickly Build a Frame-by-Frame Game\n\n\
    We have already looked at a simple game where the action is solely driven by user\
    \ input. In this chapter, we will be looking at games that animate continuously,\
    \ regardless of whether the user provides input. Action games are typical examples\
    \ of such games. We are not going to make a full game in this chapter, but will\
    \ implement part of one. [Figure 5-1](#9781430244226_Ch05.xhtml#Fig1) shows one\
    \ of the scenes we will create.\n\n![9781430244226_Fig05-01.jpg](images/9781430244226_Fig05-01.jpg)\n\
    \n[Figure 5-1.](#9781430244226_Ch05.xhtml#_Fig1) A frame-by-frame space game\n\
    \nIn [Figure 5-1](#9781430244226_Ch05.xhtml#Fig1), we see a spaceship dodging\
    \ some asteroids. You will learn how to animate the different items in the scene,\
    \ move the ship based on user input, and detect the collisions between the ship\
    \ and asteroids.\n\nThere are many different technologies that have been used\
    \ over the years to create these types of games. These different technologies\
    \ concern themselves with how content is drawn on the screen. An example is `OpenGL`,\
    \ which provides low-level access to a display. The classes provided by `UIKit`\
    \ (`UIView` and the like) are perfectly suited for these types of games as well.\
    \ Regardless of which technology is used to update the screen, these types of\
    \ games generally work in the same way, by creating the loop shown in [Figure\
    \ 5-2](#9781430244226_Ch05.xhtml#Fig2).\n\n![9781430244226_Fig05-02.jpg](images/9781430244226_Fig05-02.jpg)\n\
    \n[Figure 5-2.](#9781430244226_Ch05.xhtml#_Fig2) Typical frame-by-frame application\
    \ loop\n\nIn [Figure 5-2](#9781430244226_Ch05.xhtml#Fig2), we see that, after\
    \ the application is set up, a loop is created that is responsible for processing\
    \ user events, updating the game state, updating the scene on the screen, and,\
    \ finally, checking if the game is over. When creating an application on iOS that\
    \ functions this way, we don’t have to explicitly create a loop—the application\
    \ is already running a loop very similar to the one described in [Figure 5-1](#9781430244226_Ch05.xhtml#Fig1).\
    \ Let’s take a closer look at how we set up an iOS application to accomplish frame-by-frame\
    \ animations.\n\n### Setting Up Your First Frame-by-Frame Animation\n\nThe sample\
    \ code accompanying this chapter is a collection of three examples. Each example\
    \ builds on the last to illustrate different concepts. When you run the sample\
    \ code you will see a screen similar to [Figure 5-3](#9781430244226_Ch05.xhtml#Fig3).\n\
    \n![9781430244226_Fig05-03.jpg](images/9781430244226_Fig05-03.jpg)\n\n[Figure\
    \ 5-3.](#9781430244226_Ch05.xhtml#_Fig3) Examples menu\n\nIn [Figure 5-3](#9781430244226_Ch05.xhtml#Fig3),\
    \ we see the buttons for each of our three examples. Clicking each button will\
    \ animate the screen and display the example. Let’s start at the top with Simple\
    \ Movement.\n\n#### Simple Movement\n\nSimple Movement sets up the application\
    \ to continuously update the position of a spaceship. The spaceship will move\
    \ to any point the user taps, as shown in [Figure 5-4](#9781430244226_Ch05.xhtml#Fig4).\n\
    \n![9781430244226_Fig05-04.jpg](images/9781430244226_Fig05-04.jpg)\n\n[Figure\
    \ 5-4.](#9781430244226_Ch05.xhtml#_Fig4) Simple Movement\n\nIn [Figure 5-4](#9781430244226_Ch05.xhtml#Fig4),\
    \ we see a spaceship from a top-down perspective with a star field in the background.\
    \ When the user touches any point on the screen, the ship will animate to that\
    \ point. This type of animation could easily be accomplished using the type of\
    \ animations presented in the previous chapter, but this will not provide us with\
    \ a good starting point. In terms of views, what you are seeing in [Figure 5-4](#9781430244226_Ch05.xhtml#Fig4),\
    \ ignoring the top navigation bar, is a `UIView` with two `UIImageView` subviews.\
    \ One of the `UIImageView`s is the background star field and the other is the\
    \ spaceship. The basic idea here is that we can periodically update the location\
    \ of the `UIImageView` of the spaceship to create an animation. Like our other\
    \ examples, the logic for managing the state of these different `UIView`s is located\
    \ in a `UIViewController` subclass. For this example, the class is called `Example01Controller`\
    \ and its header files are shown in [Listing 5-1](#9781430244226_Ch05.xhtml#list1).\n\
    \n[**Listing 5-1.**](#9781430244226_Ch05.xhtml#_list1) `Example01Controller.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <QuartzCore/CADisplayLink.h>\n#import\
    \ \"Viper01.h\"\n\n@interface Example01Controller : UIViewController {\n    CADisplayLink*\
    \ displayLink;\n    Viper01* viper;\n}\n-(void)updateScene;\n-(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer;\n\
    @end\n```\n\nWe see in [Listing 5-1](#9781430244226_Ch05.xhtml#list1) that the\
    \ class extends `UIViewController` and has two fields. The first field is called\
    \ `displayLink` and is of type `CADisplayLink` that is imported from the QuartzCore\
    \ framework. The second field is called `viper` and is of type `Viper01`. It is\
    \ used to represent the spaceship. There are also two tasks defined: the first\
    \ is called `updateScene` and will be used to update the `UIViews` that make up\
    \ the scene. The second is called `viewTapped`, and it is used to manage user\
    \ input. Let’s take a look at the `Viper01` header file in [Listing 5-2](#9781430244226_Ch05.xhtml#list2)\
    \ and see how we are representing the spaceship.\n\n[**Listing 5-2.**](#9781430244226_Ch05.xhtml#_list2)\
    \ `Viper01.h`\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Viper01\
    \ : UIImageView {\n\n}\n@property float speed;\n@property CGPoint moveToPoint;\n\
    -(void)updateLocation;\n@end\n```\n\nIn [Listing 5-2](#9781430244226_Ch05.xhtml#list2),\
    \ we see that `Viper01` extends `UIImageView` and has two properties. The speed\
    \ property describes how fast the viper will move, and the `moveToPoint` property\
    \ keeps track of which point on the screen the spaceship is moving. The task `updateLocation`\
    \ does the work of incrementally updating the location of the spaceship.\n\n####\
    \ Implementing the Classes\n\nNow that we have seen the definitions of the classes\
    \ we will be using in this example, let’s take a look at the implementation, starting\
    \ with the `viewDidLoad` task of `Example01Controller` class shown in [Listing\
    \ 5-3](#9781430244226_Ch05.xhtml#list3).\n\n[**Listing 5-3.**](#9781430244226_Ch05.xhtml#_list3)\
    \ `Example01Controller.m` (`viewDidLoad`)\n\n```\n- (void)viewDidLoad {\n    [super\
    \ viewDidLoad];\n\n    [self setTitle:@\"Simple Movement\"];\n\n    UITapGestureRecognizer*\
    \ tapRecognizer = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(viewTapped:)];\n\
    \    [self.view addGestureRecognizer:tapRecognizer];\n\n    viper = [Viper01 new];\n\
    \    CGRect frame = [self.view frame];\n    viper.center = CGPointMake(frame.size.width/2.0,\
    \ frame.size.height/2.0);\n    [self.view addSubview:viper];\n    [viper setMoveToPoint:viper.center];\n\
    \n    displayLink = [CADisplayLink displayLinkWithTarget:self selector:@selector(updateScene)];\n\
    \    [displayLink addToRunLoop:[NSRunLoop currentRunLoop] forMode:NSDefaultRunLoopMode];\n\
    }\n```\n\nIn [Listing 5-3](#9781430244226_Ch05.xhtml#list3), we..."
