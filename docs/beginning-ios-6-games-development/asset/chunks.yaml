    fades. In this simple implementation, each particle simply fades in a linear way.    We
    have looked at the implementation of `Asteroid` and `Particle,` and see that it
    is pretty simple to create a particle effect in our scene. In the next section,
    we will look at the Comet actor and see a more visually striking example, though
    the implementation will be just as simple.    Creating Based Vector-Based Particles    In
    the previous example, we looked at `Particles` that were represented by a sequence
    of images. Because we have a flexible way of rendering actors, we can just as
