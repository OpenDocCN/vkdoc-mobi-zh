    \ tempBehav = [TemporaryBehavior temporaryBehavior:nil for:60*5];\n    [tempBehav\
    \ setDelegate:self];\n\n    NSMutableArray* behaviors = [powerup behaviors];\n\
    \n    [behaviors removeAllObjects];\n    [behaviors addObject:tempBehav];\n\n\
    \    [powerup setState:STATE_GLOW];\n}\n```\n\n在代码清单 8-10 中，我们看到任务`tapGesture:`会在\
    \ 12 个`UITapGestureRecognizers`中的任意一个识别到点击手势时被调用。请注意，我们并没有检查`UITapGestureRecognizer`的状态；这是因为点击手势被视为离散手势，不会使用状态信息。我们使用任务`numberOfTapsRequired`和`numberOfTouches`来确定是哪个`UITapGestureRecognizer`响应了，并将这些值分别存储在\
    \ taps 和 touches 中。这些值告诉我们应启用的`Powerup`在`NSMutableArray powerups`中的索引。一旦找到正确的`Powerup`，我们就创建一个`TemporaryBehavior`并将`self`设置为委托。然后，该增强道具的\
    \ behavior 会被设置为新创建的`TemporaryBehavior`，同时其状态被设置为`STATE_GLOW`。这会触发增强道具开始旋转。接下来，让我们更详细地了解`TemporaryBehavior`类。\n\
    \n## `TemporaryBehavior`类\n\n`TemporaryBehavior`类会在固定的步数内为角色应用一个行为。在本例中，我们实际上并不想应用任何行为；我们只是想知道何时过去了五秒钟。让我们快速查看一下`TemporaryBehavior`类，看看它是如何工作的。`TemporaryBehavior`的声明如代码清单\
    \ 8-11 所示。\n\n**代码清单 8-11.** `TemporaryBehavior.h`\n\n```\n@class TemporaryBehavior;\n\
    @protocol TemporaryBehaviorDelegate\n-(void)stepsUpdatedOn:(Actor*)anActor By:(TemporaryBehavior*)tempBehavior\
    \ In:(GameController*)controller;\n@end\n\n@interface TemporaryBehavior : NSObject\
    \ <Behavior> {\n\n}\n@property (nonatomic) long stepsRemaining;\n@property (nonatomic,\
    \ strong) NSObject <Behavior> * behavior;\n@property (nonatomic, strong) NSObject\
