    7-4.**](#9781430244226_Ch07.xhtml#_list4)  HealthBar.m (healthBar:)    ``` +(id)healthBar:(Actor*)anActor{      VectorRepresentation*
    rep = [VectorRepresentation vectorRepresentation];      HealthBar* healthBar =
    [[HealthBar alloc] initAt:anActor.center WithRadius:anActor.radius AndRepresentation:rep];
        [rep setDelegate:healthBar];     [healthBar setColor:[UIColor blueColor]];
        [healthBar setBackgroundColor:[UIColor colorWithRed:0 green:0 blue:0 alpha:.5]];      FollowActor*
    follow = [FollowActor followActor:anActor];     [follow setYOffset:[anActor radius]];
        [healthBar addBehavior:follow];      return healthBar; } ```    In [Listing
    7-4](#9781430244226_Ch07.xhtml#list4), we see the constructor task `healthBar:`
    and that it takes an `Actor` as an argument. The `Actor anActor` is the actor
    that this `HealthBar` will stay under if `anActor` moves.'
  trans: "\n# 示例排版\n\n## `doSetup`任务\n\n```objective-c\n-(BOOL)doSetup {\n    if ([super\
    \ doSetup]){\n        NSMutableArray* classes = [NSMutableArray new];\n      \
    \  [classes addObject:[Saucer class]];\n        [classes addObject:[Bullet class]];\n\
    \        [self setSortedActorClasses:classes];\n        return YES;\n    }\n \
    \   return NO;\n}\n```\n\n在 Listing 7-1 中，我们看到类`Example02Controller`的`doSetup`任务。这个方法简单地表示我们希望将类型为`Saucer`和`Bullet`的角色排序，以便日后轻松访问。我们通过创建一个名为`classes`的`NSMutableArray`，并添加我们感兴趣的两个类的类对象来实现这一点。然后，`NSMutableArray\
    \ classes`被传递给`setSortedActorClasses:`。这样，当我们在未来调用`actorsOfType:`时，就不必对所有角色进行排序来找到它们。接下来，我们来看一下描述此示例中动作的代码，该代码位于类`Example02Controller`的`updateScene`任务中。请参见\
    \ Listing 7-2。\n\n## `updateScene`任务\n\n```objective-c\n-(void)updateScene{\n\
    \    NSMutableSet* suacers = [self actorsOfType:[Saucer class]];\n    if ([suacers\
    \ count] == 0){\n        Saucer* saucer = [Saucer saucer:self];\n        [self\
    \ addActor: saucer];\n    }\n    if (self.stepNumber % (30) == 0){\n        float\
    \ direction = M_PI - M_PI/30.0;\n        float rand = (arc4random()%100)/100.0\
    \ * M_PI/15.0;\n        direction += rand;\n        Bullet* bullet = [Bullet bulletAt:CGPointMake(1000,\
    \ 768/2) WithDirection:direction];\n        [self addActor: bullet];\n       \
    \ if (arc4random()%4 == 0){\n            if (arc4random()%2 == 0){\n         \
    \       [bullet setDamage:20.0];\n            } else {\n                [bullet\
    \ setDamage:30.0];\n            }\n        }\n    }\n    NSMutableSet* bullets\
    \ = [self actorsOfType:[Bullet class]];\n    for (Bullet* bullet in bullets){\n\
    \        for (Saucer* saucer in suacers){\n            if ([bullet overlapsWith:saucer]){\n\
    \               [saucer doHit:bullet with:self];\n            }\n        }\n \
    \   }\n    [super updateScene];\n}\n```\n\n在 Listing 7-2 中，我们首先获取场景中所有`Saucer`的实例，并检查是否存在。如果没有，我们创建一个新的`Saucer`，并使用`addActor:`任务将其添加到场景中。这确保了屏幕中央始终只有一个`Saucer`。然后，每\
    \ 30 步，我们使用`bulatAt:WithDirection:`任务创建一个新的`Bullet`。`bullet`的位置以游戏坐标指定，位于最右侧点的垂直中心。指定的方向会使`Bullet`向左移动，可能击中`Saucer`。一旦`bullet`被添加到场景中，其伤害值会被随机分配。每个`Bullet`造成的伤害也会决定我们如何绘制它。`Bullet`造成的伤害越大，它被绘制得越大。\n\
    \n`updateScene`任务最后要做的检查是是否有任何`Bullet`与`Saucer`发生碰撞。这是通过调用`actorsOfType:`并获取存储在`NSMutableSet*\
    \ bullets`中的场景中所有`Bullet`对象完成的。我们简单地遍历每个`Bullet`和`Saucer`，并通过调用`overlapsWith:`检查是否有碰撞。如果有碰撞，我们调用`Saucer`类的`doHit:with:`任务。\n\
    \n让我们更仔细地看一下此示例中使用的`Actor`类的实现。\n\n## Actor 类\n\n在本节中，我们将学习`Saucer`角色和`HealthBar\
    \ actor`类。`HealthBar`与我们至今为止看到的其他`actors`不同。它的不同之处在于其在场景中的位置依赖于另一个`Actor`的位置——在本例中，是一个`Saucer`。\n\
    \n在回顾了`Saucer`和`HealthBar`类之后，我们将查看`Behavior`类`FollowActor`，并了解如何实现此功能。\n\n###\
    \ 实例化 Saucer 类\n\n我们将从查看`Saucer`类的构造函数开始。我们之所以要从`Saucer`的构造函数开始，是因为这是我们创建`HealthBar`的地方。这样，我们就不必担心在创建新`Saucer`时添加`HealthBar`，因为每次创建`Saucer`时都会自动创建一个。`Saucer`的构造函数如\
    \ Listing 7-3 所示。\n\n```objective-c\n+(id)saucer:(GameController*)controller{\n\
    \    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint gameCenter\
    \ = CGPointMake(gameAreaSize.width/2.0, gameAreaSize.height/2.0);\n    ImageRepresentation*\
    \ rep = [ImageRepresentation imageRep];\n    [rep setBackwards:arc4random()%2\
    \ == 0];\n    [rep setStepsPerFrame:3];\n    Saucer* saucer = [[Saucer alloc]\
    \ initAt:gameCenter WithRadius:32 AndRepresentation:rep];\n    [rep setDelegate:saucer];\n\
    \    [saucer setVariant:arc4random()%VARIATION_COUNT];\n    [saucer setMaxHealth:100];\n\
    \    [saucer setCurrentHealth:100];\n    HealthBar* healthBar = [HealthBar healthBar:saucer];\n\
    \    [healthBar setPercent:1];\n    [saucer setHealthBar:healthBar];\n    [controller\
    \ addActor:healthBar];\n    return saucer;\n}\n```\n\n在 Listing 7-3 中，我们首先找到游戏区域的中心，并将该值存储在`CGPoint\
    \ gameCenter`中。接下来，我们创建一个名为`rep`的`ImageRepresentation`。我们指示`rep`应该以每帧动画 3 步的速度，一半时间向后旋转`Saucer`。`CGRect\
    \ gameCenter`和`ImageRepresentation rep`被传递给超类初始化器`initAt:WithRadius:AndRepresenation:`，以创建一个半径为\
    \ 32 的`Saucer`对象。然后将对象`saucer`设置为`ImageRepresenation`的委托，以便我们可以通过类`Saucer`指定表示细节。这与第\
    \ 6 章中的角色工作原理完全相同。请查看源代码以了解这些任务是如何实现的。\n\n一旦创建了`saucer`对象，我们就想用一些细节来初始化它。我们通过调用`saucer`上的`setVariant:`来设置我们要使用的三个变体之一。我们还将最大生命值和当前生命值属性设置为\
    \ 100。接下来，让我们转到`HealthBar`类。\n\n### 实例化 HealthBar 类\n\n为了在飞碟下方渲染生命条，我们创建一个`HealthBar`对象，并传入它要跟随的对象，即角色`saucer`。我们还将`saucer`的`healthBar`属性设置为新创建的`healthBar`，以便`saucer`对象在受到伤害时可以更新`healthBar`显示的百分比。最后，`healthBar`被添加到场景中。让我们看一下`HealthBar`的构造函数，了解它是如何设置和表现其行为的。参见\
    \ Listing 7-4。\n\n```objective-c\n+(id)healthBar:(Actor*)anActor{\n    VectorRepresentation*\
    \ rep = [VectorRepresentation vectorRepresentation];\n    HealthBar* healthBar\
    \ = [[HealthBar alloc] initAt:anActor.center WithRadius:anActor.radius AndRepresentation:rep];\n\
    \    [rep setDelegate:healthBar];\n    [healthBar setColor:[UIColor blueColor]];\n\
    \    [healthBar setBackgroundColor:[UIColor colorWithRed:0 green:0 blue:0 alpha:.5]];\n\
    \    FollowActor* follow = [FollowActor followActor:anActor];\n    [follow setYOffset:[anActor\
    \ radius]];\n    [healthBar addBehavior:follow];\n    return healthBar;\n}\n```\n\
    \n在 Listing 7-4 中，我们看到了构造函数任务`healthBar:`，它接受一个`Actor`作为参数。`Actor anActor`是此`HealthBar`将紧随其下的角色（如果`anActor`移动）。\n"
- fmt: "在这个例子中，与`Saucer`关联的对象不会移动，但我们将在未来的示例中使用这个类，届时它的`actor`会移动。在探讨`FollowActor`行为之前，请注意`HealthBar`是通过传入`VectorRepresentation`实例而非`ImageRepresentation`对象来初始化的。这表明我们希望以编程方式绘制该对象。我们将在下一节了解其工作原理。现在，让我们继续探索这个例子。接下来要检查的类是`FollowActor`。\n\
    \n### FollowActor行为类\n\n负责将`HealthBar`保持在`Saucer`附近的类是`FollowActor`。这个类是一种`Behavior`，提供了与其他`Behavior`类类似的抽象。让我们通过查看`FollowActor`类来了解这一切如何协同工作。参见[列表\
    \ 7-5](#9781430244226_Ch07.xhtml#list5)。\n\n**[列表 7-5.](#9781430244226_Ch07.xhtml#_list5)\
    \ `FollowActor.m`**\n\n```objectivec\n#import \"FollowActor.h\"\n#import \"GameController.h\"\
    \n\n@implementation FollowActor\n@synthesize actorToFollow;\n@synthesize xOffset;\n\
    @synthesize yOffset;\n\n+(id)followActor:(Actor*)anActorToFollow{\n    FollowActor*\
    \ follow = [FollowActor new];\n    [follow setActorToFollow:anActorToFollow];\n\
    \    return follow;\n}\n-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n\
    \    if (![actorToFollow removed]){\n        CGPoint c = [actorToFollow center];\n\
    \        c.x += xOffset;\n        c.y += yOffset;\n\n        [anActor setCenter:\
    \ c];\n    } else {\n        [gameController removeActor:anActor];\n    }\n}\n\
    @end\n```\n\n在[列表 7-5](#9781430244226_Ch07.xhtml#list5)中，我们看到了`FollowActor`类的完整实现。它通过任务`followActor:`构造，该任务接受要跟随的`actor`作为参数。游戏每一步都会调用任务`applyToActor:In:`，负责重新定位与该`behavior`关联的`actor`。为此，我们只需将`anActor`的`center`属性设置为我们正在跟随的`Actor`的`center`属性，并调整`xOffest`和`yOffset`。查看[列表\
    \ 7-4](#9781430244226_Ch07.xhtml#list4)，我们看到`HealthBar`被配置为以等于`saucer`的`radius`的`xOffset`跟随`saucer`。这使`HealthBar`保持在`saucer`下方居中。现在让我们探讨`Bullet`类。\n\
    \n### Bullet类\n\n我们已经了解了`Saucer`和`HealthBar`类如何协同工作。现在让我们看看`Bullet`类，并理解其行为方式。[列表\
    \ 7-6](#9781430244226_Ch07.xhtml#list6)展示了`Bullet`的构造函数。\n\n**[列表 7-6.](#9781430244226_Ch07.xhtml#_list6)\
    \ `Bullet.m`（`bulletAt:WithDirection:`）**\n\n```objectivec\n+(id)bulletAt:(CGPoint)aCenter\
    \ WithDirection:(float)aDirection{\n    VectorRepresentation* rep = [VectorRepresentation\
    \ vectorRepresentation];\n    Bullet* bullet = [[Bullet alloc] initAt:aCenter\
    \ WithRadius:4 AndRepresentation:rep];\n    [rep setDelegate:bullet];\n\n    [bullet\
    \ setDamage: 10];\n    LinearMotion* motion = [LinearMotion linearMotionInDirection:aDirection\
    \ AtSpeed:3];\n    [motion setWrap:YES];\n    [bullet addBehavior: motion];\n\n\
    \    ExpireAfterTime* expires = [ExpireAfterTime expireAfter:240];\n    [bullet\
    \ addBehavior:expires];\n\n    return bullet;\n}\n```\n\n在[列表 7-6](#9781430244226_Ch07.xhtml#list6)中，我们看到该类由熟悉的构建块组成。它通过现在熟悉的`initAt:WithRadius:AndRepresentation:`任务初始化，并且我们添加了类型为`LinearMotion`和`ExpiresAfterTime`的`behavior`对象。这两个`behavior`对象被`Powerup`类使用，并在[第6章](#9781430244226_Ch06.xhtml)中有详细描述。`Bullet`类中唯一的新特性是`VectorRepresentation`类，它也被`HealthBar`类使用，以表明这种类型的`actor`将使用Core\
    \ Graphics绘制。\n\n让我们更仔细地看看`VectorRepresentation`类，以及它如何与我们的游戏引擎和`actor`交互，为使用Core\
    \ Graphics渲染`actor`提供简单方法。\n\n### 通过VectorRepresentation使用Core Graphics绘制Actor\n\
    \nCore Graphics库很有趣，因为它不是一个矢量图形库（如SVG），但它在光栅化矢量数据结构方面表现出色。考虑到Core Graphics最初基于PDF，这很有道理。Core\
    \ Graphics是一个出色的库，用于以分辨率无关的方式渲染高质量图形。对我们而言，这意味着代码不会指定哪个像素是什么颜色，而是描述形状及其填充方式。Core\
    \ Graphics也被称为Quartz。可用的绘图函数完整描述参见：`http://goo.gl/6i5gr`。\n\n在iOS中，`UIView`可以通过重写任务`drawRect:`来指定其绘制方式，获取其图形上下文引用，然后调用一系列绘制方法。由于我们的游戏引擎使用`UIView`来表示每个`actor`，我们知道最终我们将创建一个`UIView`的子类，并为基于矢量的`actor`调用绘制代码。`VectorRepresentation`类负责管理`actor`与在屏幕上绘制它的视图之间的关系。\n\
    \n### VectorRepresentation类\n\n`VectorRepresentation`类负责创建适合绘制`actor`的`UIView`。让我们从`VectorRepresentation`的头文件开始探索该类。参见[列表\
    \ 7-7](#9781430244226_Ch07.xhtml#list7)。\n\n**[列表 7-7.](#9781430244226_Ch07.xhtml#_list7)\
    \ `VectorRepresentation.h`**\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import \"Actor.h\"\n\n@class VectorActorView;\n\n@protocol VectorRepresentationDelegate\n\
    -(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect;\n\
    @end\n\n@interface VectorRepresentation : NSObject<Representation> {\n    VectorActorView*\
    \ view;\n}\n@property (nonatomic, assign) NSObject<VectorRepresentationDelegate>*\
    \ delegate;\n+(id)vectorRepresentation;\n@end\n```\n\n在[列表 7-7](#9781430244226_Ch07.xhtml#list7)中，我们看到`VectorRepresentation`类定义了一个名为`VectorRepresentationDelegate`的协议，每个基于矢量的`actor`都必须遵循该协议。该协议要求所有遵循它的类实现任务`drawActor:WithContext:InRect:`，实际的绘制代码应放置在此处。\n\
    \n`VectorRepresentation`类扩展了`NSObject`并遵循`Representation`协议，就像`ImageRepresentation`类一样。这里的想法是，大部分代码不应关心我们使用哪种类型的表示——矢量还是图像。我们只需创建正确的`Representation`对象，并将其与每个`actor`关联。\n\
    \n我们还看到`VectorRepresentation`类有一个单一属性`view`，类型为`VectorActorView`。`VectorActorView`是`UIView`的子类，最终将调用由`VectorRepresentationDelegate`协议定义的`drawActor:WithContext:InRect:`任务。在查看`VectorActorView`类之前，让我们看看`VectorRepresentation`的实现，如[列表\
    \ 7-8](#9781430244226_Ch07.xhtml#list8)所示。\n\n**[列表 7-8.](#9781430244226_Ch07.xhtml#_list8)\
    \ `VectorRepresentation.m`**\n\n```objectivec\n#import \"VectorRepresentation.h\"\
    \n#import \"VectorActorView.\n```"
  raw: 'In this example, the `Saucer` associated with it does not move, but we are
    going to use this class in future examples, where its actor does move. Before
    we look at the behavior `FollowActor`, notice that `HealthBar` is initialized
    by passing an instance of `VectorRepresentation` instead of an `ImageRepresentation`
    object. This indicates that we want to draw this object programmatically. We will
    look at how this works in the next section. For now, let’s continue to explore
    this example. The next class we want to inspect is `FollowActor`.    The Behavior
    FollowActor Class    The class responsible for keeping the `HealthBar` near the
    `Saucer` is the class `FollowActor`. This class is a `Behavior` and provides the
    same sort of abstraction we found with the other `Behavior` classes. Let’s see
    how all of this fits together by looking at the class `FollowActor`. See [Listing
    7-5](#9781430244226_Ch07.xhtml#list5).    [**Listing 7-5.**](#9781430244226_Ch07.xhtml#_list5)  FollowActor.m    ```
    #import "FollowActor.h" #import "GameController.h"  @implementation FollowActor
    @synthesize actorToFollow; @synthesize xOffset; @synthesize yOffset;  +(id)followActor:(Actor*)anActorToFollow{
        FollowActor* follow = [FollowActor new];     [follow setActorToFollow:anActorToFollow];
        return follow; } -(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{
        if (![actorToFollow removed]){         CGPoint c = [actorToFollow center];
            c.x += xOffset;         c.y += yOffset;          [anActor setCenter: c];
        } else {         [gameController removeActor:anActor];     } } @end ```    In
    [Listing 7-5](#9781430244226_Ch07.xhtml#list5), we see the entire implementation
    of the class `FollowActor`. It is constructed with the task `followActor:`, which
    takes the actor to follow as an argument. The task `applyToActor:In:` is called
    for every step of the game and is responsible for repositioning the actor this
    `behavior` is associated with. To do this, we simply set the property `center`
    of `anActor` to the property `center` of the `Actor` we are following, adjusting
    by `xOffest` and `yOffset`. Looking at [Listing 7-4](#9781430244226_Ch07.xhtml#list4),
    we see that the `HealthBar` is configured to follow the `saucer` at an `xOffset`
    equal to the `radius` of `saucer`. This keeps the `HealthBar` centered below `saucer`.
    Now let’s explore the `Bullet` class.    The Bullet Class    We have seen how
    the `Saucer` and the `HealthBar` classes work together. We now want to look at
    the `Bullet` class and understand why it behaves the way it does. [Listing 7-6](#9781430244226_Ch07.xhtml#list6)
    shows `Bullet`’s constructor.    [**Listing 7-6.**](#9781430244226_Ch07.xhtml#_list6)  Bullet.m
    (bulletAt:WithDirection:)    ``` +(id)bulletAt:(CGPoint)aCenter WithDirection:(float)aDirection{      VectorRepresentation*
    rep = [VectorRepresentation vectorRepresentation];      Bullet* bullet = [[Bullet
    alloc] initAt:aCenter WithRadius:4 AndRepresentation:rep];     [rep setDelegate:bullet];      [bullet
    setDamage: 10];      LinearMotion* motion = [LinearMotion linearMotionInDirection:aDirection
    AtSpeed:3];     [motion setWrap:YES];      [bullet addBehavior: motion];      ExpireAfterTime*
    expires = [ExpireAfterTime expireAfter:240];     [bullet addBehavior:expires];      return
    bullet; } ```    In [Listing 7-6](#9781430244226_Ch07.xhtml#list6), we see the
    class is composed of familiar building blocks. It is initialized with the now
    familiar task `initAt:WithRadius:AndRepresentation:`, and we are adding the `behavior`
    objects of type `LinearMotion` and `ExpiresAfterTime`. These two `behavior` objects
    are used by the class `Powerup` and are fully described in [Chapter 6](#9781430244226_Ch06.xhtml).
    The only new feature in the `Bullet` class is the class `VectorRepresentation`,
    which was also used by the class `HealthBar` to indicate that this type of actor
    will be drawn using Core Graphics.


    Let’s take a closer look at the class `VectorRepresentation` and see how it interacts
    with our game engine and actors to provide a simple method for rendering our actors
    with Core Graphics.    Drawing Actors with Core Graphics via VectorRepresentation    The
    Core Graphics library is interesting because it is not a vector graphics library
    (like SVG), but it is excellent at rasterizing vector data structures. This makes
    a lot of sense if you consider that Core Graphics was originally based on PDF.
    Core Graphics is a great library for rendering high-quality graphics in a resolution-independent
    way. What this means for us is that our code will not be specifying which pixel
    is which color, but instead will be describing shapes and how they should be filled.
    Core Graphics is also known as Quartz. A complete description of the available
    drawing functions can be found here: `http://goo.gl/6i5gr` `.`    In iOS, a `UIView`
    can specify how it is drawn by overriding the task `drawRect:`, getting a reference
    to its graphics context and then calling a number drawing methods. Because our
    game engine uses `UIView`’s to represent each actor, we know that ultimately we
    will be creating a subclass of `UIView` and calling the drawing code for our vector-based
    actors. It is the job the class `VectorRepresentation` to manage the relationship
    between the actor and the view that draws it on the screen.    The VectorRepresentation
    Class    The `VectorRepresentation` class is responsible for creating a `UIView`
    suitable to draw our actor on. Let’s start exploring this class with the header
    for `VectorRepresentation`. See [Listing 7-7](#9781430244226_Ch07.xhtml#list7).    [**Listing
    7-7.**](#9781430244226_Ch07.xhtml#_list7)  VectorRepresentation.h    ``` #import
    <Foundation/Foundation.h> #import "Actor.h"  @class VectorActorView;  @protocol
    VectorRepresentationDelegate -(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context
    InRect:(CGRect)rect; @end  @interface VectorRepresentation : NSObject<Representation>
    {     VectorActorView* view; } @property (nonatomic, assign) NSObject<VectorRepresentationDelegate>*
    delegate; +(id)vectorRepresentation; @end ```    In [Listing 7-7](#9781430244226_Ch07.xhtml#list7),
    we see that the class `VectorRepresentation` defines a protocol called `VectorRepresentationDelegate`
    to which each vector-based actor must conform. This protocol requires the task
    `drawActor:WithContext:InRect:` to be implemented by all classes that conform
    to it, and is where the actual drawing code should be placed.    The class `VectorRepresentation`
    extends `NSObject` and conforms to the protocol `Representation`, just like the
    class `ImageRepresentation` does. The idea here is that most of the code should
    not care which type of representation we use—vector or image. We simply create
    the correct `Representation` object and associate it with each actor.    We also
    see that the class `VectorRepresentation` has a single property view of type `VectorActorView`.
    A `VectorActorView` is a subclass of `UIView` and will ultimately call the task
    `drawActor:WithContext:InRect:` as defined by the protocol `VectorRepresentationDelegate`.
    Before looking at the class `VectorActorView`, let’s look at the implementation
    of `VectorRepresentation` as shown in [Listing 7-8](#9781430244226_Ch07.xhtml#list8).    [**Listing
    7-8.**](#9781430244226_Ch07.xhtml#_list8)  VectorRepresentation.m    ``` #import
    "VectorRepresentation.h" #import "VectorActorView.'
  trans: "\n在这个例子中，与`Saucer`关联的对象不会移动，但我们将在未来的示例中使用这个类，届时它的`actor`会移动。在探讨`FollowActor`行为之前，请注意`HealthBar`是通过传入`VectorRepresentation`实例而非`ImageRepresentation`对象来初始化的。这表明我们希望以编程方式绘制该对象。我们将在下一节了解其工作原理。现在，让我们继续探索这个例子。接下来要检查的类是`FollowActor`。\n\
    \n### FollowActor 行为类\n\n负责将`HealthBar`保持在`Saucer`附近的类是`FollowActor`。这个类是一种`Behavior`，提供了与其他`Behavior`类类似的抽象。让我们通过查看`FollowActor`类来了解这一切如何协同工作。参见列表\
    \ 7-5。\n\n**列表 7-5. `FollowActor.m`**\n\n```objectivec\n#import \"FollowActor.h\"\
    \n#import \"GameController.h\"\n\n@implementation FollowActor\n@synthesize actorToFollow;\n\
    @synthesize xOffset;\n@synthesize yOffset;\n\n+(id)followActor:(Actor*)anActorToFollow{\n\
    \    FollowActor* follow = [FollowActor new];\n    [follow setActorToFollow:anActorToFollow];\n\
    \    return follow;\n}\n-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n\
    \    if (![actorToFollow removed]){\n        CGPoint c = [actorToFollow center];\n\
    \        c.x += xOffset;\n        c.y += yOffset;\n\n        [anActor setCenter:\
    \ c];\n    } else {\n        [gameController removeActor:anActor];\n    }\n}\n\
    @end\n```\n\n在列表 7-5 中，我们看到了`FollowActor`类的完整实现。它通过任务`followActor:`构造，该任务接受要跟随的`actor`作为参数。游戏每一步都会调用任务`applyToActor:In:`，负责重新定位与该`behavior`关联的`actor`。为此，我们只需将`anActor`的`center`属性设置为我们正在跟随的`Actor`的`center`属性，并调整`xOffest`和`yOffset`。查看列表\
    \ 7-4，我们看到`HealthBar`被配置为以等于`saucer`的`radius`的`xOffset`跟随`saucer`。这使`HealthBar`保持在`saucer`下方居中。现在让我们探讨`Bullet`类。\n\
    \n### Bullet 类\n\n我们已经了解了`Saucer`和`HealthBar`类如何协同工作。现在让我们看看`Bullet`类，并理解其行为方式。列表\
    \ 7-6 展示了`Bullet`的构造函数。\n\n**列表 7-6. `Bullet.m`（`bulletAt:WithDirection:`）**\n\
    \n```objectivec\n+(id)bulletAt:(CGPoint)aCenter WithDirection:(float)aDirection{\n\
    \    VectorRepresentation* rep = [VectorRepresentation vectorRepresentation];\n\
    \    Bullet* bullet = [[Bullet alloc] initAt:aCenter WithRadius:4 AndRepresentation:rep];\n\
    \    [rep setDelegate:bullet];\n\n    [bullet setDamage: 10];\n    LinearMotion*\
    \ motion = [LinearMotion linearMotionInDirection:aDirection AtSpeed:3];\n    [motion\
    \ setWrap:YES];\n    [bullet addBehavior: motion];\n\n    ExpireAfterTime* expires\
    \ = [ExpireAfterTime expireAfter:240];\n    [bullet addBehavior:expires];\n\n\
    \    return bullet;\n}\n```\n\n在列表 7-6 中，我们看到该类由熟悉的构建块组成。它通过现在熟悉的`initAt:WithRadius:AndRepresentation:`任务初始化，并且我们添加了类型为`LinearMotion`和`ExpiresAfterTime`的`behavior`对象。这两个`behavior`对象被`Powerup`类使用，并在第\
    \ 6 章中有详细描述。`Bullet`类中唯一的新特性是`VectorRepresentation`类，它也被`HealthBar`类使用，以表明这种类型的`actor`将使用\
    \ Core Graphics 绘制。\n\n让我们更仔细地看看`VectorRepresentation`类，以及它如何与我们的游戏引擎和`actor`交互，为使用\
    \ Core Graphics 渲染`actor`提供简单方法。\n\n### 通过 VectorRepresentation 使用 Core Graphics\
    \ 绘制 Actor\n\nCore Graphics 库很有趣，因为它不是一个矢量图形库（如 SVG），但它在光栅化矢量数据结构方面表现出色。考虑到 Core\
    \ Graphics 最初基于 PDF，这很有道理。Core Graphics 是一个出色的库，用于以分辨率无关的方式渲染高质量图形。对我们而言，这意味着代码不会指定哪个像素是什么颜色，而是描述形状及其填充方式。Core\
    \ Graphics 也被称为 Quartz。可用的绘图函数完整描述参见：`http://goo.gl/6i5gr`。\n\n在 iOS 中，`UIView`可以通过重写任务`drawRect:`来指定其绘制方式，获取其图形上下文引用，然后调用一系列绘制方法。由于我们的游戏引擎使用`UIView`来表示每个`actor`，我们知道最终我们将创建一个`UIView`的子类，并为基于矢量的`actor`调用绘制代码。`VectorRepresentation`类负责管理`actor`与在屏幕上绘制它的视图之间的关系。\n\
    \n### VectorRepresentation 类\n\n`VectorRepresentation`类负责创建适合绘制`actor`的`UIView`。让我们从`VectorRepresentation`的头文件开始探索该类。参见列表\
    \ 7-7。\n\n**列表 7-7. `VectorRepresentation.h`**\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import \"Actor.h\"\n\n@class VectorActorView;\n\n@protocol VectorRepresentationDelegate\n\
    -(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect;\n\
    @end\n\n@interface VectorRepresentation : NSObject<Representation> {\n    VectorActorView*\
    \ view;\n}\n@property (nonatomic, assign) NSObject<VectorRepresentationDelegate>*\
    \ delegate;\n+(id)vectorRepresentation;\n@end\n```\n\n在列表 7-7 中，我们看到`VectorRepresentation`类定义了一个名为`VectorRepresentationDelegate`的协议，每个基于矢量的`actor`都必须遵循该协议。该协议要求所有遵循它的类实现任务`drawActor:WithContext:InRect:`，实际的绘制代码应放置在此处。\n\
    \n`VectorRepresentation`类扩展了`NSObject`并遵循`Representation`协议，就像`ImageRepresentation`类一样。这里的想法是，大部分代码不应关心我们使用哪种类型的表示——矢量还是图像。我们只需创建正确的`Representation`对象，并将其与每个`actor`关联。\n\
    \n我们还看到`VectorRepresentation`类有一个单一属性`view`，类型为`VectorActorView`。`VectorActorView`是`UIView`的子类，最终将调用由`VectorRepresentationDelegate`协议定义的`drawActor:WithContext:InRect:`任务。在查看`VectorActorView`类之前，让我们看看`VectorRepresentation`的实现，如列表\
    \ 7-8 所示。\n\n**列表 7-8. `VectorRepresentation.m`**\n\n```objectivec\n#import \"\
    VectorRepresentation.h\"\n#import \"VectorActorView.\n```\n"
- fmt: "```objectivec\n@implementation VectorRepresentation\n@synthesize delegate;\n\
    \n+(id)vectorRepresentation{\n    return [VectorRepresentation new];\n}\n\n-(UIView*)getViewForActor:(Actor*)anActor\
    \ In:(GameController*)aController{\n    if (view == nil){\n        view = [VectorActorView\
    \ new];\n        [view setBackgroundColor:[UIColor clearColor]];\n        [view\
    \ setActor: anActor];\n        [view setDelegate:delegate];\n        [anActor\
    \ setNeedsViewUpdated:YES];\n    }\n    return view;\n}\n\n-(void)updateView:(UIView*)aView\
    \ ForActor:(Actor*)anActor In:(GameController*)aController{\n    if ([anActor\
    \ needsViewUpdated]){\n        [aView setNeedsDisplay];\n        [anActor setNeedsViewUpdated:NO];\n\
    \    }\n}\n@end\n```\n\n在[Listing 7-8](#9781430244226_Ch07.xhtml#list8)中，可以看到类`VectorRepresentation`的实现及其简单的构造方法。还可以看到它实现了协议`Representation`定义的任务`getViewForActor:In:`和`updateView:In:`。在任务`getViewForActor:In:`中，我们创建了一个新的`VectorActorView`，并指定了用于绘制的演员和委托。然后调用`setNeedsViewUpdated`，确保至少调用一次演员的绘制代码。\n\
    \n在任务`updateView:In:`中，我们检查演员是否需要更新；如果需要，则在`UIView aView`上调用`setNeedsDisplay`。任务`setNeedsDisplay`由类`UIView`定义，指示底层图形系统应重新绘制`UIView`。实际上，这会导致调用`VectorActorView`的`drawRect:`任务，进而调用演员的`drawActor:WithContext:InRect:`。接下来我们来看类`VectorActorView`的细节。\n\
    \n## 基于向量的演员的UIView: VectorActorView\n\n类`VectorActorView`是`UIView`的子类，用于在场景中表示演员，这与我们使用`UIImageView`实例表示基于图像的`Actor`的方式非常相似。让我们看一下类`VectorActorView`，从头部开始，看看它如何协同工作。请参见[Listing\
    \ 7-9](#9781430244226_Ch07.xhtml#list9)。\n\n**[Listing 7-9.](#9781430244226_Ch07.xhtml#_list9)\
    \ VectorActorView.h**\n\n```objectivec\n#import <UIKit/UIKit.h>\n#import \"Actor.h\"\
    \n#import \"VectorRepresentation.h\"\n\n@interface VectorActorView : UIView {\n\
    \n}\n@property (nonatomic, retain) Actor* actor;\n@property (nonatomic, retain)\
    \ NSObject<VectorRepresentationDelegate>* delegate;\n\n@end\n```\n\n在[Listing\
    \ 7-9](#9781430244226_Ch07.xhtml#list9)中，可以看到`VectorActorView`继承自`UIView`并拥有两个属性。第一个是要绘制的`Actor`。第二个属性是`VectorRepresentationDelegate`，负责实际绘制`Actor`。在这个例子中，这两个对象——`actor`和`delegate`——将是同一个对象，要么是`Bullet`，要么是`HealthBar`。然而，这不是强制要求。我喜欢将所有与演员相关的代码保留在演员类中。委托可以是其自己的类，负责绘制演员。如果你希望使用一个`VectorRepresentationDelegate`来绘制多种类型的演员，这将很有意义。类`VectorActorView`的实现非常简单，如[Listing\
    \ 7-10](#9781430244226_Ch07.xhtml#list10)所示。\n\n**[Listing 7-10.](#9781430244226_Ch07.xhtml#_list10)\
    \ VectorActorView.m**\n\n```objectivec\n- (void)drawRect:(CGRect)rect {\n    CGContextRef\
    \ context = UIGraphicsGetCurrentContext();\n    [delegate drawActor:actor WithContext:context\
    \ InRect:rect];\n}\n```\n\n在[Listing 7-10](#9781430244226_Ch07.xhtml#list10)中，可以看到类`VectorActorView`的实现只有一个方法，即任务`drawRect:`的实现。在这个方法中，我们通过调用`UIGraphicsGetCurrentContext`获取当前图形上下文的引用，并将`context`和`actor`传递给`delegate`，以便在指定的`CGRect`中绘制。现在让我们看一个具体的例子。\n\
    \n## 绘制HealthBar\n\n如前所述，本例中使用的基于向量的演员在绘制方面是它们自己的委托，因此让我们再次查看`HealthBar`类，看看它如何绘制自身。请参见[Listing\
    \ 7-11](#9781430244226_Ch07.xhtml#list11)。\n\n**[Listing 7-11.](#9781430244226_Ch07.xhtml#_list11)\
    \ HealthBar.m (drawActor:WithContext:InRect:)**\n\n```objectivec\n-(void)drawActor:(Actor*)anActor\
    \ WithContext:(CGContextRef)context InRect:(CGRect)rect{\n    CGContextClearRect(context,rect);\n\
    \n    float height = 10;\n\n    CGRect backgroundArea = CGRectMake(0, self.radius-height/2,\
    \ self.radius*2, height);\n    [self.backgroundColor setFill];\n    CGContextFillRect(context,\
    \ backgroundArea);\n\n    CGRect healthArea = CGRectMake(0, self.radius-height/2,\
    \ self.radius*2*percent, height);\n    [self.color setFill];\n    CGContextFillRect(context,\
    \ healthArea);\n}\n```\n\n在[Listing 7-11](#9781430244226_Ch07.xhtml#list11)中，我们首先调用`CGContextClearRect`。这会擦除给定`rect`中的旧内容，使我们准备好进行实际绘制。要绘制`HealthBar`，我们只需要绘制两个矩形：一个用于背景，另一个位于背景之上，代表健康条的当前百分比。要绘制矩形区域（而不是绘制矩形的边缘），我们通过调用`CGRectMake`定义一个`rect`。然后，通过调用`UIColor`对象`backgroundColor`（这是`HealthBar`的一个属性）上的`setFill`来指定要使用的颜色。\n\
    \n要实际更改正在绘制的`UIView`的像素颜色，我们调用`CGContextFillRect`，传入`context`和`CGRect backgroundArea`。要绘制前景矩形，我们重复该过程，但顶部矩形`healthArea`的宽度根据属性`percent`的值计算。这表明每当`HealthBar`的`percent`发生变化时，都必须重新绘制`HealthBar`。为了确保这一点，我们必须提供自己的`setPercent:`实现，而不是依赖合成属性提供的默认实现。[Listing\
    \ 7-12](#9781430244226_Ch07.xhtml#list12)显示了类`HealthBar`的自定义`setPercent:`实现。\n\
    \n**[Listing 7-12.](#9781430244226_Ch07.xhtml#_list12) HealthBar.m (setPercent:)**\n\
    \n```objectivec\n-(void)setPercent:(float)aPercent{\n    if (percent != aPercent){\n\
    \        percent = aPercent;\n        if (percent < 0){\n            percent =\
    \ 0;\n        }\n        if (percent > 1){\n            percent = 1;\n       \
    \ }\n        [self setNeedsViewUpdated:YES];\n    }\n}\n```\n\n[Listing 7-12](#9781430244226_Ch07.xhtml#list12)显示了我们自定义的`setPercent:`实现。首先检查`percent`（属性的支持变量）和传入的值`aPercent`是否不同。如果不同，则将`percent`设置为`aPercent`，并通过确保其在0和1之间来规范化该值。最后，用`YES`调用`setNeedsViewUpdate:`。这确保了`HealthBar`将在动画的下一步中被重绘。现在让我们来看看`Bullet`类是如何绘制的。\n\
    \n## 绘制Bullet类\n\n我们已经查看了`HealthBar`类，并检查了它是如何绘制的。我们只使用了一个绘图函数`CGContextFillRect`来创建视觉效果。当然，还有很多很多绘图函数可以让您创建任何想要的视觉效果。我们不打算涵盖所有这些函数，但网上有很好的文档可用。话虽如此，让我们看一下类`Bullet`的绘制实现。请参见[Listing\
    \ 7-13](#9781430244226_Ch07.xhtml#list13)。\n\n**[Listing 7-13.](#9781430244226_Ch07.xhtml#_list13)\
    \ Bullet.**"
