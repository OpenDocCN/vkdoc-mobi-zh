  trans: "\n\n`xhtml#list1`) 还表明，类 `RootViewController` 为两个按钮拥有 `IBOutlet` 属性：`leaderBoardButton`\
    \ 和 `tweetButton`。需要引用这些对象，因为它们将在运行时被启用或禁用。`GKLocalPlayer` 用于管理 Game Center，而\
    \ `ACAccountStore` 和 `ACAccount` 对象则用于管理与 Facebook 的交互。\n\n接下来，我们来看看如何处理视图间的导航。\n\
    \n## 视图导航\n\n为了在用户点击按钮时切换视图，我们在 `RootViewController` 的实现中创建了一系列 `IBAction` 任务，并在\
    \ XIB 文件中将它们连接到对应的按钮。列表 12-2 展示了其中两个 `IBAction` 任务。\n\n**列表 12-2.** `RootViewController.m`（`extrasButtonClicked:`\
    \ 和 `playButtonClicked:`）\n\n```\n- (IBAction)extrasButtonClicked:(id)sender {\n\
    \    [self pushViewController:extrasController animated:YES];\n}\n- (IBAction)playButtonClicked:(id)sender\
    \ {\n    [self pushViewController:beltCommanderController animated:YES];\n   \
    \ [beltCommanderController doNewGame: [extrasController gameParams]];\n}\n```\n\
    \n在列表 12-2 中，我们看到了两个负责处理按钮点击的任务。当用户按下“开始”视图上的“附加功能”按钮时，会调用 `extrasButtonClicked:`\
    \ 任务。该任务简单地使用 `UINavigationController` 定义的 `pushViewController:animated:` 方法，来展示与\
    \ `extrasController` 关联的视图。类似地，任务 `playButtonClicked:` 使用相同的方法显示与 `beltCommandController`\
    \ 关联的视图，并调用 `beltCommanderController` 上的 `doNewGame:` 方法。\n\n列表 12-3 展示了我们如何导航回“开始”视图。\n\
    \n**列表 12-3.** `RootViewController.m`（`backFromExtras:`）\n\n```\n- (IBAction)backFromExtras:(id)sender\
    \ {\n    [self popViewControllerAnimated:YES];\n}\n```\n\n在列表 12-3 中，我们看到当用户在“附加功能”视图上点击“返回”按钮时，会调用任务\
    \ `backFromExtras:`。为了导航回“开始”视图，我们调用 `popViewControllerAnimated:` 来移除“附加功能”视图，从而显示“开始”视图。任务\
    \ `popViewControllerAnimated:` 由 `UINavigationController` 定义，而 `RootViewController`\
    \ 是其子类。\n\n处理导航的最后一段代码是响应游戏视图上出现的两个对话框的代码，如列表 12-4 所示。\n\n**列表 12-4.** `RootViewController.m`（`alertView:clickedButtonIndex:`）\n\
    \n```\n- (void)alertView:(UIAlertView *)alertView   clickedButtonAtIndex:(NSInteger)buttonIndex{\n\
    \    if (alertView == pauseGameAlerTView){\n        if (buttonIndex == 0) {\n\
    \            [self endOfGameCleanup];\n            [self popViewControllerAnimated:YES];\n\
    \        } else {\n            [beltCommanderController setIsPaused:NO];\n   \
    \     }\n    }\n    if (alertView == newGameAlertView){\n        if (buttonIndex\
    \ == 0) {\n            [beltCommanderController doNewGame: [extrasController gameParams]];\n\
    \        } else {\n            [self popViewControllerAnimated:YES];\n       \
    \ }\n    }\n}\n```\n\n在列表 12-4 中，我们看到了任务 `alertView:clickedButtonAtIndex:`，它由协议\
    \ `UIAlertViewDelegate` 定义并由 `RootViewController` 实现。在该任务中，我们首先检查点击的是哪个 `UIAlertView`。\n\
    \n如果 `alertView` 等于 `pauseGameAlertView`，那么我们知道用户点击了游戏视图上的“暂停”按钮，并正在对呈现的对话框做出响应。如果用户点击了对话框上的“是”（`buttonIndex\
    \ == 0`），则用户想要退出当前游戏。我们调用 `endOfGameCleanup` 和 `popViewControllerAnimated:`；后者当然会将我们带回“开始”视图。\n\
    \n任务 `endOfGameCleanup` 负责向社交媒体服务报告信息，我们稍后会查看它。如果用户点击了“否”，我们只需通过调用 `setIsPaused:`\
    \ 并传入 `NO` 来取消暂停游戏，该调用作用于 `beltCommanderController`。\n\n在列表 12-4 中，有两个可能的 `UIAlertView`\
    \ 可能导致调用 `alertView:clickedButtonAtIndex:`。我们查看了 `UIAlertView pauseGameAlertView`\
    \ 的情况；另一种可能是 `newGameAlertView`。这个 `UIAlertView` 在游戏结束时显示，即当用户的飞船耗尽所有生命值时。该对话框允许用户简单地开始新游戏或返回“开始”视图。可以看到，开始新游戏只需调用\
    \ `beltCommanderController` 上的 `doNewGame:` 即可。要返回“开始”视图，我们使用现已熟悉的任务 `popViewControllerAnimated:`。\n\
    \n负责显示两种不同 `UIAlertView` 的代码非常相似；我们只看其中一个来理解它。在游戏结束时显示 `UIAlertView` 的代码如列表 12-5\
    \ 所示。\n\n**列表 12-5.** `RootViewController.m`（`gameOver:`）\n\n```\n-(void)gameOver:(BeltCommanderController*)aBeltCommanderController{\n\
    \    if (newGameAlertView == nil){\n        newGameAlertView = [[UIAlertView alloc]\
    \ initWithTitle:@\"Your Game Is\n        Over.\" message:@\"Play Again?\" delegate:self\
    \ cancelButtonTitle:@\"Yes\"\n        otherButtonTitles:@\"No\", nil];\n    }\n\
    \    [newGameAlertView show];\n       \n    [self endOfGameCleanup];\n}\n```\n\
    \n在列表 12-5 中，我们看到了由 `RootViewController` 实现的任务 `gameOver:`。任务 `gameOver:` 由协议\
    \ `BeltCommanderDelegate` 定义，该委托协议用于在游戏启动或停止时在 `RootViewController` 和 `BeltCommanderController`\
    \ 之间进行通信。也就是说，`RootViewController` 是 `beltCommanderView` 的委托。这种关系在 XIB 文件中定义。在这个例子中，我们查看的是游戏结束时调用的代码。在此任务中，我们懒加载创建\
    \ `UIAlertView newGameAlertView`，指定要显示的文本，并将 `self` 用作委托。要显示 `UIAlertView`，我们调用\
    \ `show`，从而在用户屏幕上弹出视图。我们做的最后一件事是调用 `endOfGameCleanup`，如列表 12-6 所示。\n\n**列表 12-6.**\
    \ `RootViewController.m`（`endOfGameCleanup`）\n\n```\n-(void)endOfGameCleanup{\n\
    \    isPlaying = NO;\n    [self notifyGameCenter];\n    [self notifyFacebook];\n\
    }\n```\n\n在列表 12-6 中，我们看到了任务 `endOfGameCleanup`，它在游戏结束时被调用，无论是由于用户飞船耗尽所有生命值，还是用户通过暂停对话框退出当前游戏。在此任务中，我们通过将\
    \ `isPlaying` 设置为 `NO` 来记录我们不再进行游戏。任务 `notifyGameCenter` 和 `notifyFacebook` 将用户的分数通知给这两个服务，这将在第\
    \ 9 章中描述。\n\n我们已经通过检查 XIB 文件、理解应用程序的流程以及我们如何实现它，了解了应用程序是如何组织的。接下来，我们想看看游戏本身，并理解\
    \ `BeltCommanderController` 类以及 `Actor` 子类是如何创建游戏的。\n\n## 实现游戏\n\n我们已经大致了解了应用程序是如何组合在一起的。我们知道视图如何出现在屏幕上，并了解了应用程序的生命周期。在本节中，我们将重点关注游戏机制。我们将看看如何让角色进入游戏，它们如何行动，以及它们如何交互。\n\
    \n首先，我们将回顾本书中创建的用于构建简单游戏框架的类。\n\n"
- fmt: "# Game Classes\n\nWe will then explore the class `BeltCommanderController`\
    \ and understand how it manages the game. Lastly, we will look at each `actor`\
    \ and understand how its implementation makes it work the way that it does.\n\n\
    ## Game Classes\n\nIn previous chapters, we have built a collection of classes\
    \ for implementing a game. We have the class `GameController` that is responsible\
    \ for adding and removing actors from the game, as well as rendering them into\
    \ the screen. We also have the class `Actor` that represents the characters and\
    \ interactive elements of the game. Subclasses of `Actor` specify a `Representation`,\
    \ a collection of `Behaviors`, and some custom code. The following is a review\
    \ of these classes.\n\nThe class `GameController` is the beating heart of the\
    \ game; subclasses of this class need only add `Actors` and animations will start\
    \ happening. To customize the `GameController`, subclasses should implement the\
    \ task `applyGameLogic` to perform any game-specific logic, such as add or remove\
    \ `Actors`, check for victory or failure conditions, or anything else unique to\
    \ a particular game.\n\nIn addition to updating the `Actors` and game logic, `GameController`\
    \ is responsible for rendering the `Actors` to the screen. `GameController` does\
    \ this in two ways. First, `GameController` extends `UIControllerView` so it has\
    \ a primary `UIView` called `view`, which can be part of an application's scene.\
    \ Second, `GameController` has a `UIView` called `actorsView`, which is the super-view\
    \ for all of the `UIViews` that represent actors in the game. By specifying the\
    \ `view` and `actorsView` in a XIB file, an instance of `GameController` can draw\
    \ to the screen. The second way that `GameController` is responsible for rendering\
    \ the game is by working with the `Representation` of each `Actor` to create a\
    \ `UIView` to add as a child to `actorsView`. For each step of the animation,\
    \ `GameController` changes the location, scale, and transparency for each Actor’s\
    \ `UIView`. The key tasks for `GameController` are as follows:\n\n- `doSetup`.\
    \ In the task `doSetup`, a subclass of `GameController` should specify the subclasses\
    \ of `Actor` that should be kept sorted by calling `setSortedActorClasses:`. Also,\
    \ any audio files to be played should be prepared by calling `prepareAudio:`.\n\
    - `applyGameLogic`. The task `applyGameLogic` is called once for every step of\
    \ the animation. It is in this task that subclasses should implement all game\
    \ logic, including:\n    - Setting end-of-game conditions\n    - Adding and removing\
    \ Actors\n    - Keeping score\n    - Tracking achievements\n    - Updating heads-up\
    \ display (HUD)\n    - Managing user input (touches, gestures, and so on)\n- `actorsOfType:`.\
    \ The task `actorsOfType:` is used inside of the `applyGameLogic` to find all\
    \ `Actors` of a particular class. The type of actor requested needs to be specified\
    \ during `doSetup` with the `setSortedActorClasses:` task.\n- `addActor:`/`removeActor:`.\
    \ The tasks `addActor:` and `removeActor:` are how actors get added and removed\
    \ from the game. These tasks collect all `Actors` added or removed during an animation\
    \ step, and then apply those changes all at once at the end of the animation loop.\
    \ This prevents modification of the collections that hold the actors, so any subclass\
    \ of `Actor` or `GameController` can add or remove any `Actor` during their apply\
    \ task.\n\n## Actor\n\nThe `Actor` class represents anything that is dynamic in\
    \ a game. In our example, the ship, asteroids, saucers, power-ups, health bars,\
    \ particles, and bullets are all actors. When creating a game, a subclass of `GameController`\
    \ will handle the big details about the game, but it is the subclasses of `Actor`\
    \ that provide the unique and interesting behaviors of each item in the game.\
    \ In practice, each `Actor` in the game is a composition of its properties, how\
    \ it is drawn (`Representation`), how it behaves (`Behaviors`), and the custom\
    \ code defined in a subclass. We will look at `Representations` and `Behaviors`\
    \ after we look at the class `Actor`.\n\nThe following is a list of the properties\
    \ of an `Actor` and what each means.\n\n- `long actorId`: The `actorId` is a unique\
    \ number assigned to each `Actor`. This value can be used to provide a soft reference\
    \ to `Actors` in the game.\n- `BOOL added`/`removed`: The properties `added` and\
    \ `removed` can be used to test if an `Actor` has successfully been added or removed\
    \ from a game.\n- `CGPoint center`: The property `center` defines the location\
    \ of the center of the `Actor` in game coordinates.\n- `float rotation`: The `rotation`\
    \ property indicates the rotation of the `Actor` in radians.\n- `float radius`:\
    \ The `radius` of the `Actor` describes how big it is. Together, `center` and\
    \ `radius` describe the area of the game occupied by the `Actor`.\n- `NSMutableArray*\
    \ behaviors`: The `behaviors` property is a collection of `Behavior` objects.\
    \ A `Behavior` object describes some sort of aspect of an `Actor`. It might describe\
    \ how it moves or when it is removed from the game. Each `Behavior` in the `behaviors`\
    \ array will be applied to the `Actor` on each step of the game.\n- `BOOL needsViewUpdated`:\
    \ Throughout a step of the game, an `Actor` may undergo changes that require its\
    \ `UIView` to be updated. These might include advancing the image that should\
    \ represent it or a change in state. This flag informs the `GameController` that\
    \ work is required to synchronize the `Actor` with its representation.\n- `NSObject<Representation>\
    \ representation`: Each `Actor` in the game requires an object conforming to `Representation`\
    \ to describe how to create a `UIView` to represent it in the game. `Representations`\
    \ are discussed in the next section.\n- `int variant`: It is common to have `Actors`\
    \ in a game that differ only slightly. Perhaps they are a different color or have\
    \ a slightly different behavior. Since this is a common requirement, the property\
    \ `variant` provides a simple way of distinguishing `Actors` of the same class.\n\
    - `int state`: The property `state` is used to describe the state of an `Actor`.\
    \ This state can be anything, and is up to the subclass to define exactly what\
    \ this indicates. The property `state` and `variant` work with the class `ImageRepresentation`\
    \ to figure out which image should be used for an `Actor`.\n- `float alpha`: The\
    \ property `alpha` describes how opaque an `Actor` is. An `Actor` with an `alpha`\
    \ of 0.0 is fully transparent, while an `alpha` value of 1.0 is fully opaque.\
    \ Transparent regions in an `Actor's` representation are unaffected.\n- `BOOL\
    \ animationPaused`: The property `animationPaused` is used to pause any animation\
    \ that is being applied to the `Actor`. It is up to the implementation of the\
    \ animation to honor this value. `ImageRepresentation` will not update the image,\
    \ in a sequence of images, used to represent an `Actor` if this property is true.\n\
    \nIn addition to the properties that define an `Actor`, there are a handful of\
    \ tasks that come with the class `Actor`. These are the following:\n\n- `-(id)initAt:(CGPoint)aPoint\
    \ WithRadius:(float)aRadius AndRepresentation:(NSObject<Representation>*)aRepresentation`:\
    \ This task is the designated constructor for the class `Actor`. It requires that\
    \ each `Actor` has a center, a radius, and a representation. All subclasses of\
    \ `Actor` should be sure that this task gets called when the `Actor` is created.\n\
    - `-(void)step:(GameController*)controller`: The task `step:` is called once per\
    \ game step by the `GameController`. Subclasses of `Actor` can provide custom\
    \ logic in their implementation of this task.\n- `-(BOOL)overlapsWith:(Actor*)actor`:\
    \ The task `overlapsWith:` is used to test if an `Actor` occupies any of the same\
    \ space as another `Actor`. This can be used to implement simple collision detection.\n\
    - `-(void)addBehavior:(NSObject<Behavior>*)behavior`: The task `addBehavior:`\
    \ is a utility method for adding `Behaviors` to an `Actor` in a single step.\n\
    \n## Representation\n\nEach `Actor` has to describe how the `GameController` should\
    \ render it."
  raw: 'We will then explore the class `BeltCommanderController` and understand how
    it manages the game. Lastly, we will look at each `actor` and understand how its
    implementation makes it work the way that it does.    Game Classes    In previous
    chapters, we have built a collection of classes for implementing a game. We have
    the class GameController that is responsible for adding and removing actors from
    the game, as well as rendering them into the screen. We also have the class Actor
    that represents the characters and interactive elements of the game. Subclasses
    of Actor specify a Representation, a collection of Behaviors, and some custom
    code. The following is a review of these classes.    The class `GameController`
    is the beating heart of the game; subclasses of this class need only add `Actors`
    and animations will start happening. To customize the `GameController`, subclasses
    should implement the task `applyGameLogic` to perform any game-specific logic,
    such as add or remove `Actors`, check for victory or failure conditions, or anything
    else unique to a particular game.    In addition to updating the `Actors` and
    game logic, `GameController` is responsible for rendering the `Actors` to the
    screen. `GameController` does this in two ways. First, `GameController` extends
    `UIControllerView` so it has a primary UIView called `view`, which can be part
    of an applications scene. Second, `GameController` has a `UIView` called `actorsView`,
    which is the super-view for all of the `UIViews` that represent actors in the
    game. By specifying the `view` and `actorsView` in a XIB file, an instance of
    `GameController` can draw to the screen. The second way that GameController is
    responsible for rendering the game is by working with the `Representation` of
    each `Actor` to create a `UIView` to add as a child to `actorsView`. For each
    step of the animation, `GameController` changes the location, scale, and transparency
    for each Actor’s `UIView`. The key tasks for `GameController` are as follows:    *   `doSetup`.
    In the task `doSetup`, a subclass of `GameController` should specify the subclasses
    of Actor that should be kept sorted by calling `setSortedActorClasses:`. Also,
    any audio files to be played should be prepared by calling `prepareAudio:`. *   `applyGameLogic`.
    The task `applyGameLogic` is called once for every step of the animation. It is
    in this task that subclasses should implement all game logic, including:     *   Setting
    end-of-game conditions     *   Adding and removing Actors     *   Keeping score     *   Tracking
    achievements     *   Updating heads-up display (HUD)     *   Managing user input
    (touches, gestures, and so on) *   `actorsOfType:`. The task `actorsOfType`: is
    used inside of the `applyGameLogic` to find all Actors of a particular class.
    The type of actor requested needs to be specified during `doSetup` with the `setSortedActorClasses`:
    task. *   `addActor`:/`removeActor`:. The tasks `addActor`: and `removeActor`:
    are how actors get added and removed from the game. These tasks collect all `Actors`
    added or removed during an animation step, and then apply those changes all at
    once at the end of the animation loop. This prevents modification of the collections
    that hold the actors, so any subclass of `Actor` or `GameController` can add or
    remove any `Actor` during their apply task.    Actor    The Actor class represents
    anything that is dynamic in a game. In our example, the ship, asteroids, saucers,
    power-ups, health bars, particles, and bullets are all actors. When creating a
    game, a subclass of `GameController` will handle the big details about the game,
    but it is the subclasses of Actor that provide the unique and interesting behaviors
    of each item in the game. In practice, each Actor in the game is a composition
    of its properties, how it is drawn (Representation), how it behaves (Behaviors),
    and the custom code defined in a subclass. We will look at Representations and
    Behaviors after we look at the class Actor.


    The following is a list of the properties of an Actor and what each means.    *   `long
    actorId`: The `actorId` is a unique number assigned to each Actor. This value
    can be used to provide a soft reference to `Actors` in the game. *   `BOOL added`/`removed`:
    The properties `added` and `removed` can be used to test if an `Actor` has successfully
    been added or removed from a game. *   `CGPoint center`: The property `center`
    defines the location of the center of the Actor in game coordinates. *   `float
    rotation`: The `rotation` property indicates the rotation of the Actor in radians.
    *   `float radius`: The `radius` of the Actor describes how big it is. Together,
    `center` and `radius` describe the area of the game occupied by the `Actor`. *   `NSMutableArray*
    behaviors`: The `behaviors` property is a collection of `Behavior` objects. A
    `Behavior` object describes some sort of aspect of an Actor. It might describe
    how it moves or when it is removed from the game. Each `Behavior` in the `behaviors`
    array will be applied to the `Actor` on each step of the game. *   `BOOL needsViewUpdated`:
    Throughout a step of the game, an `Actor` may undergo changes that require its
    `UIView` to be updated. These might include advancing the image that should represent
    it or a change in state. This flag informs the `GameController` that work is required
    to synchronize the `Actor` with its representation. *   `NSObject`<`Representation`>
    `representation`: Each `Actor` in the game requires an object conforming to `Representation`
    to describe how to create a `UIView` to represent it in the game. `Representations`
    are discussed in the next section. *   `int variant`: It is common to have `Actors`
    in a game that differ only slightly. Perhaps they are a different color or have
    a slightly different behavior. Since this is a common requirement, the property
    `variant` provides a simple way of distinguishing `Actors` of the same class.
    *   `int state`: The property `state` is used to describe the state of an `Actor`.
    This state can be anything, and is up to the subclass to define exactly what this
    indicates. The property `state` and `variant` work with the class `ImageRepresentation`
    to figure out which image should be used for an `Actor`. *   `float alpha`: The
    property `alpha` describes how opaque an `Actor` is. An `Actor` with an `alpha`
    of 0.0 is fully transparent, while an `alpha` value of 1.0 is fully opaque. Transparent
    regions in an `Actor''s` representation are unaffected. *   `BOOL animationPaused`:
    The property `animationPaused` is used to pause any animation that is being applied
    to the Actor. It is up to the implementation of the animation to honor this value.
    `ImageRepresentation` will not update the image, in a sequence of images, used
    to represent an `Actor` if this property is true.    In addition to the properties
    that define an Actor, there are a handful of tasks that come with the class Actor.
    These are the following:    *   `-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius
    AndRepresentation:(NSObject<Representation>*)aRepresentation`: This task is the
    designated constructor for the class `Actor`. It requires that each Ac`t`or has
    a center, a radius, and a representation. All subclasses of `Actor` should be
    sure that this task gets called when the `Actor` is created. *   `-(void)step:(GameController*)controller`:
    The task `step:` is called once per game step by the `GameController`. Subclasses
    of `Actor` can provide custom logic in their implementation of this task. *   `-(BOOL)overlapsWith:
    (Actor*) actor`: The task `overlapsWith`: is used to test if an `Actor` occupies
    any of the same space as another `Actor`. This can be used to implement simple
    collision detection. *   `-(void)addBehavior:(NSObject<Behavior>*)behavior`: The
    task `addBehavior`: is a utility method for adding `Behaviors` to an `Actor` in
    a single step.    Representation    Each `Actor` has to describe how the `GameController`
    should render it.'
  trans: "\n# 游戏类\n\n接下来我们将探索 `BeltCommanderController` 类，了解它如何管理游戏。最后，我们将逐一查看每个 `actor`，理解其实现如何使其按预期方式工作。\n\
    \n## 游戏类\n\n在前面的章节中，我们构建了一系列用于实现游戏的类。我们有一个 `GameController` 类，负责在游戏中添加和移除 actors，以及将它们渲染到屏幕上。我们还有一个\
    \ `Actor` 类，代表游戏中的角色和交互元素。`Actor` 的子类需要指定一个 `Representation`、一组 `Behaviors` 以及一些自定义代码。以下是对这些类的回顾。\n\
    \n`GameController` 类是游戏的核心；该类的子类只需添加 `Actors`，动画就会自动开始运行。为了自定义 `GameController`，子类应实现\
    \ `applyGameLogic` 任务，以执行任何特定于游戏的逻辑，例如添加或移除 `Actors`、检查胜利或失败条件，或任何其他特定于某款游戏的独特功能。\n\
    \n除了更新 `Actors` 和游戏逻辑外，`GameController` 还负责将 `Actors` 渲染到屏幕上。`GameController`\
    \ 通过两种方式完成此操作。首先，`GameController` 继承自 `UIControllerView`，因此它有一个名为 `view` 的主 `UIView`，可以作为应用场景的一部分。其次，`GameController`\
    \ 有一个名为 `actorsView` 的 `UIView`，它是游戏中所有代表 actors 的 `UIViews` 的父视图。通过在 XIB 文件中指定\
    \ `view` 和 `actorsView`，`GameController` 的实例可以绘制到屏幕上。`GameController` 负责渲染游戏的第二种方式是与每个\
    \ `Actor` 的 `Representation` 协作，创建一个 `UIView` 作为子视图添加到 `actorsView` 中。在每个动画步骤中，`GameController`\
    \ 会改变每个 Actor 的 `UIView` 的位置、缩放和透明度。`GameController` 的关键任务如下：\n\n- `doSetup`。在\
    \ `doSetup` 任务中，`GameController` 的子类应通过调用 `setSortedActorClasses:` 来指定需要保持排序的\
    \ `Actor` 子类。此外，应通过调用 `prepareAudio:` 来准备任何要播放的音频文件。\n- `applyGameLogic`。`applyGameLogic`\
    \ 任务在每个动画步骤中被调用一次。子类应在此任务中实现所有游戏逻辑，包括：\n    - 设置游戏结束条件\n    - 添加和移除 Actors\n \
    \   - 计分\n    - 追踪成就\n    - 更新抬头显示器 (HUD)\n    - 管理用户输入（触摸、手势等）\n- `actorsOfType:`。`actorsOfType:`\
    \ 任务在 `applyGameLogic` 内部使用，用于查找特定类别的所有 `Actors`。所请求的 actor 类型需要在 `doSetup` 期间通过\
    \ `setSortedActorClasses:` 任务指定。\n- `addActor:`/`removeActor:`。`addActor:` 和 `removeActor:`\
    \ 任务用于在游戏中添加和移除 actors。这些任务会收集在一个动画步骤中添加或移除的所有 `Actors`，然后在动画循环结束时一次性应用这些更改。这防止了对保存\
    \ actors 的集合进行修改，因此任何 `Actor` 或 `GameController` 的子类都可以在其应用任务期间添加或移除任何 `Actor`。\n\
    \n## Actor\n\n`Actor` 类代表游戏中任何动态的元素。在我们的示例中，飞船、小行星、飞碟、能量道具、血条、粒子效果和子弹都是 actors。在创建游戏时，`GameController`\
    \ 的子类会处理游戏的宏观细节，但提供游戏中每个物品独特且有趣行为的，是 `Actor` 的子类。实践中，游戏中的每个 `Actor` 都由其属性、绘制方式（`Representation`）、行为方式（`Behaviors`）以及在子类中定义的自定义代码组合而成。在查看类\
    \ `Actor` 之后，我们将研究 `Representations` 和 `Behaviors`。\n\n以下是 `Actor` 的属性列表及其含义。\n\
    \n- `long actorId`：`actorId` 是分配给每个 `Actor` 的唯一数字。此值可用于提供对游戏中 `Actors` 的软引用。\n\
    - `BOOL added`/`removed`：`added` 和 `removed` 属性可用于测试一个 `Actor` 是否已成功添加到游戏或从游戏中移除。\n\
    - `CGPoint center`：`center` 属性定义了 `Actor` 中心点在游戏坐标中的位置。\n- `float rotation`：`rotation`\
    \ 属性表示 `Actor` 以弧度为单位的旋转角度。\n- `float radius`：`Actor` 的 `radius` 描述了它的大小。`center`\
    \ 和 `radius` 共同描述了 `Actor` 在游戏中所占的区域。\n- `NSMutableArray* behaviors`：`behaviors`\
    \ 属性是一组 `Behavior` 对象。一个 `Behavior` 对象描述了 `Actor` 的某种特性。它可能描述其移动方式或何时从游戏中移除。`behaviors`\
    \ 数组中的每个 `Behavior` 将在游戏的每一步应用于该 `Actor`。\n- `BOOL needsViewUpdated`：在游戏的一个步骤中，`Actor`\
    \ 可能会经历需要更新其 `UIView` 的变化。这些变化可能包括推进其表示的图像或状态改变。此标志通知 `GameController` 需要执行工作以使\
    \ `Actor` 与其表示同步。\n- `NSObject<Representation> representation`：游戏中的每个 `Actor`\
    \ 都需要一个符合 `Representation` 协议的对象来描述如何创建一个 `UIView` 来在游戏中表示它。`Representations`\
    \ 将在下一节讨论。\n- `int variant`：游戏中经常出现仅略有差异的 `Actors`。它们可能颜色不同或行为稍有不同。由于这是一种常见需求，`variant`\
    \ 属性提供了一种区分同一类 `Actors` 的简单方法。\n- `int state`：`state` 属性用于描述 `Actor` 的状态。此状态可以是任何内容，由子类来确切定义其含义。`state`\
    \ 和 `variant` 属性与 `ImageRepresentation` 类协同工作，以确定应为 `Actor` 使用哪个图像。\n- `float\
    \ alpha`：`alpha` 属性描述了 `Actor` 的不透明度。`alpha` 值为 0.0 的 `Actor` 是完全透明的，而 `alpha`\
    \ 值为 1.0 则完全不透明。`Actor` 表示中的透明区域不受影响。\n- `BOOL animationPaused`：`animationPaused`\
    \ 属性用于暂停应用于 `Actor` 的任何动画。动画的实现需要遵守此值。如果此属性为 true，`ImageRepresentation` 将不会更新用于表示\
    \ `Actor` 的图像序列中的图像。\n\n除了定义 `Actor` 的属性外，`Actor` 类还附带了一些任务。如下所示：\n\n- `-(id)initAt:(CGPoint)aPoint\
    \ WithRadius:(float)aRadius AndRepresentation:(NSObject<Representation>*)aRepresentation`：此任务是\
    \ `Actor` 类的指定构造器。它要求每个 `Actor` 都有一个中心点、一个半径和一个表示。所有 `Actor` 的子类应确保在创建 `Actor`\
    \ 时调用了此任务。\n- `-(void)step:(GameController*)controller`：`step:` 任务由 `GameController`\
    \ 在每个游戏步骤调用一次。`Actor` 的子类可以在其对此任务的实现中提供自定义逻辑。\n- `-(BOOL)overlapsWith:(Actor*)actor`：`overlapsWith:`\
    \ 任务用于测试一个 `Actor` 是否与另一个 `Actor` 占据相同空间。这可用于实现简单的碰撞检测。\n- `-(void)addBehavior:(NSObject<Behavior>*)behavior`：`addBehavior:`\
    \ 是一个实用方法，用于在单一步骤中向 `Actor` 添加 `Behaviors`。\n\n## Representation\n\n每个 `Actor`\
    \ 都必须描述 `GameController` 应如何渲染它。\n"
- fmt: "`Representation`协议（定义在`Actor.h`中）描述了`GameController`如何为每个`Actor`获取和更新`UIView`。`Representation`有两个具体实现：`ImageRepresentation`和`VectorRepresentation`。`ImageRepresentation`类使用`UIImages`和`UIImageViews`来创建适合呈现`Actor`的`UIView`。`VectorRepresentation`类使用Core\
    \ Graphics动态绘制`Actor`。`ImageRepresentation`的细节在第6章中介绍，而`VectorRepresentation`的实现则在第7章中介绍。\n\
    \n该协议定义了两个任务：\n- `-(UIView*)getViewForActor:(Actor*)anActor In:(GameController*)aController`：此任务在`Actor`被添加到`GameController`后不久被调用一次。它负责创建并返回一个适合渲染该`Actor`的`UIView`。\n\
    - `-(void)updateView:(UIView*)aView ForActor:(Actor*)anActor In:(GameController*)aController`：此任务在`Actor`的`needsViewUpdated`属性为`true`时被调用。此任务应对`UIView`进行必要的更改，使其准确表示该`Actor`。\n\
    \n**行为**\n\n在创建游戏时，许多不同的`Actor`将需要非常相似的代码来实现。虽然构建一个为每个类提供恰当代码的类层次结构是可行的，但我觉得这很繁琐。一种解决方案是`Behavior`协议及其实现类。`Behavior`协议的每个实例负责为`Actor`应用一些逻辑，每一步一次。`Behavior`协议定义了一个单一任务：\n\
    - `-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController;`\n\
    `applyToActor:In:`任务由符合此协议的类实现，为它们所附加的`Actor`提供某种行为。\n\nBelt Commander游戏中包含了几个`Behavior`的实现，它们是：\n\
    - `LinearMotion`：`LinearMotion`类用于在游戏期间沿直线移动`Actor`。该类提供了几个实用构造器，以便基于方向或目标点轻松定义运动。\n\
    - `ExpireAfterTime`：`ExpireAfterTime`类用于在经过给定步数后移除`Actor`。这对粒子效果很方便，你可以创建它们，将其添加到场景中，然后不再管理它们。\n\
    - `FollowActor`：此类用于使一个`Actor`与另一个`Actor`保持固定距离。它被附加到Saucer上的HealthBar使用，以保持它们在一起。\n\
    \n现在我们已经回顾了用于创建Belt Commander游戏的核心类，是时候看看我们刚刚描述的类的子类了，以了解如何扩展和定制它们来创建Belt Commander游戏。\n\
    \n**理解BeltCommanderController**\n\n在前面的章节中，我们扩展了`GameController`类来制作示例。为了创建一个完整的游戏，我们将通过创建`BeltCommanderController`类来做同样的事情。`BeltCommanderController`类负责管理游戏中的`Actor`、确定结束条件、更新生命值和分数，以及解释来自用户的输入。让我们再次审视游戏中的动作，回顾游戏是如何进行的以及玩家面临哪些挑战。游戏的截图如图12-9所示。\n\
    \n![9781430244226_Fig12-09.jpg](images/9781430244226_Fig12-09.jpg)\n\n**图12-9**  Belt\
    \ Commander，游戏中期\n\n在图12-9中，我们看到Belt Commander游戏。玩家通过点击屏幕来控制左侧的飞船。飞船将移动到与点击相同的高度。\n\
    \n飞船持续向右发射子弹，由背景中亮星右下方稍处的圆圈表示。从右侧，向左移动，是无尽的波次的小行星。如果子弹与小行星相撞，小行星会碎成更小的碎片，并且分数增加。如果小行星与飞船相撞，小行星会被摧毁，但飞船的生命值会减少。为了给游戏增加一点混乱，飞碟出现在游戏右侧并上下移动，向飞船发射子弹。子弹会摧毁小行星，但主要目的是击中飞船并减少其生命值。为了帮助我们可怜的飞船，三种类型的能量道具从右侧出现并向左移动。如果飞船幸运地处于能量道具的路径上，它就会获得增益。这些增益包括增加生命值、更强大的子弹和额外分数。游戏持续进行，直到飞船生命值降为零。\n\
    \n现在我们已经了解了游戏如何进行的概况，我们将查看`BeltCommanderController`类，首先考察新游戏是如何设置的，然后查看每步游戏运行的代码。\n\
    \n**BeltCommanderController：开始**\n\n要了解这个游戏是如何实现的，我们需要了解`BeltCommanderController`是如何被设置来玩游戏的。以下部分概述了启动并运行游戏所需的初始代码。让我们从`BeltCommanderController`类的头文件开始，如清单12-7所示。\n\
    \n**清单12-7.** `BeltCommanderController.h`\n\n```\n@class BeltCommanderDelegate,\
    \ BeltCommanderController;\n\n@protocol BeltCommanderDelegate\n@required\n-(void)gameStarted:(BeltCommanderController*)aBeltCommanderController;\n\
    -(void)gameOver:(BeltCommanderController*)aBeltCommanderController;\n@end\n\n\
    @interface BeltCommanderController : GameController{\n    IBOutlet HealthBarView*\
    \ healthBarView;\n    IBOutlet UILabel* scoreLabel;\n    \n    GameParameters*\
    \ gameParameters;\n    Viper* viper;\n    \n    //achievement tracking\n    int\
    \ asteroids_destroyed;\n}\n@property (nonatomic, retain) IBOutlet NSObject<BeltCommanderDelegate>*\
    \ delegate;\n-(void)doNewGame:(GameParameters*)aGameParameters;\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;\n\
    \n-(void)doEndGame;\n-(void)doAddNewTrouble;\n-(void)doCollisionDetection;\n-(void)doUpdateHUD;\n\
    -(void)checkAchievements;\n\n-(Viper*)viper;\n@end\n```\n\n在清单12-7中，我们看到了`BeltCommanderController`类的头文件。正如预期的那样，该类扩展了`GameController`。它还定义了一个名为`BeltCommanderDelegate`的协议。该协议由`RootViewController`实现，用于传递游戏状态。该类关联了两个`IBOutlet`。第一个是`HealthBarView`，它是负责在屏幕右上角渲染生命值条的`UIView`子类。第二个是`scoreLabel`，用于在游戏进行时显示玩家的分数。\n\
    \n在清单12-7中，我们看到有一个`GameParameters`对象，名为`gameParameters`。此对象用于确定游戏中应包含哪些类型的`Actor`。其想法是游戏免费，玩家可以购买不同类型的`Actor`，使其更有趣（也更有利可图）。此类应用内购买在第10章中讨论。在本章中，我们假设所有应用内购买均已进行。\n\
    \n`Viper`对象用于保留对游戏中飞船的引用。由于我们希望方便地访问此对象，因此仅保留指向它的指针是有意义的，而不是在其他`Actor`中搜索它。最后一个字段名为`asteroids_destroyed`，用于追踪成就，如第9章所述。"
  raw: 'The protocol `Representation` (defined in Actor.h) describes how a `GameController`
    can get and update a `UIView` for each `Actor`. There are two concrete implementations
    of `Representation`: `ImageRepresentation` and `VectorRepresentation`. The class
    ImageRepresentation uses `UIImages` and `UIImageViews` to create a `UIView` suitable
    for presenting the `Actor`. The class `VectorRepresentation` draws the `Actor`
    dynamically using Core Graphics. The details for how `ImageRepresentation` are
    covered in [Chapter 6](#9781430244226_Ch06.xhtml), while the implementation of
    `VectorRepresentation` is covered [Chapter 7](#9781430244226_Ch07.xhtml). There
    are two tasks defined by the protocol:    *   `-(UIView*)getViewForActor:(Actor*)anActor
    In:(GameController*)aController`: This task is called once shortly after an `Actor`
    is added to a GameController. It is responsible for creating and returning a `UIView`
    suitable for rendering the `Actor`. *   `-(void`)`updateView:(UIView*)aView ForActor:(Actor*)anActor
    In:(GameController*)aController`: This task is called whenever an `Actor''s needsViewUpdated`
    property is true. This task should make any changes to the `UIView` required to
    make it accurately represent the `Actor`.    Behavior    When creating a game,
    a lot of different Actors will require very similar code to implement. While it
    is definitely possible to construct a class hierarchy that provides just the right
    code for each class, I find this cumbersome. One solution is the Behavior protocol
    and the classes that implement it. Each instance of the protocol Behavior is responsible
    for applying some logic to an Actor, one per step. The protocol Behavior defines
    a single task:    *   `-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController;`
    *   The task `applyToActor:In:` is implement by the classes that conform to this
    protocol to provide some sort of behavior to the Actors they are attached to.
    There are several implementations of Behavior included in the game Belt Commander;
    those are: *   `LinearMotion`: The class `LinearMotion` is used to move an Actor
    in a straight line during the game. The class provides several utility constructors
    to make it easy to define the motion based on a direction or a target point. *   `ExpireAfterTime`:
    The class `ExpireAfterTime` is used to remove an Actor after a given number of
    steps. This is handy for Particles, where you want to create them, add them to
    the scene, and then forget about them. *   `FollowActor`: This class is used to
    keep one Actor at a fixed distant from another Actor. This is used by the HealthBars
    attached to the Saucers to keep them together.    Now that we have reviewed the
    core classes used to create the game Belt Commander, it is time to look at the
    subclasses of the classes we just described to understand how we can extend and
    customize them to create the game Belt Commander.    Understanding BeltCommanderController    In
    previous chapters, we have extended the class `GameController` to make our examples.
    To create a whole game, we are going to do the same thing by creating the class
    `BeltCommanderController`. The class `BeltCommanderController` is responsible
    for managing the Actors in the game, determining the end condition, updating the
    health and score, and interpreting input from the user. Let’s take a look again
    at the action in the game and review how the game is played and what challenges
    confront the player. A screenshot of the game is shown in [Figure 12-9](#9781430244226_Ch12.xhtml#Fig9).    ![9781430244226_Fig12-09.jpg](images/9781430244226_Fig12-09.jpg)    [Figure
    12-9.](#9781430244226_Ch12.xhtml#_Fig9)  Belt Commander, mid-game    In [Figure
    12-9](#9781430244226_Ch12.xhtml#Fig9), we see the game Belt Commander. The player
    controls the ship on the left by tapping the screen. The ship will move to the
    same height as the tap.


    The ship constantly fires bullets to the right, as represented by the circle just
    to the lower right of the bright star in the background. From the right, moving
    left, come an endless wave of asteroids. If a bullet collides with an asteroid,
    the asteroid breaks into smaller parts, and the score is incremented. If an asteroid
    collides with the ship, the asteroid is destroyed, but the ship’s health is decremented.
    To add a little chaos to the game, saucers appear on the right side of the game
    and travel up and down, firing bullets at the ship. The bullets will destroy asteroids,
    but their main purpose is to hit the ship and reduce its health. To help out our
    poor ship, three types of power-ups come from the right and travel to the left.
    If the ship is lucky enough to be in the path of a power-up, it gains its benefit.
    These benefits are increased health, more powerful bullets, and extra points.
    The game continues until the ship’s health is reduced to zero.    Now that we
    have an overview of how the game is played, we are going to look at the class
    `BeltCommanderController`, first examining at how a new game is set up and then
    looking at the code that runs every step of the game.    BeltCommanderController:
    Getting Started    To understand how this game is implemented, we need to understand
    how the `BeltComanderController` gets set up to play the game. The following section
    provides an overview of the initial code required to get a game up and running.
    Let’s start with the header file for the class `BeltCommanderController`, as shown
    in [Listing 12-7](#9781430244226_Ch12.xhtml#list7).    **[Listing 12-7](#9781430244226_Ch12.xhtml#_list7).** `BeltCommanderController.h`    ```
    @class BeltCommanderDelegate, BeltCommanderController;   @protocol BeltCommanderDelegate
    @required -(void)gameStarted:(BeltCommanderController*)aBeltCommanderController;
    -(void)gameOver:(BeltCommanderController*)aBeltCommanderController; @end   @interface
    BeltCommanderController : GameController{     IBOutlet HealthBarView* healthBarView;
        IBOutlet UILabel* scoreLabel;           GameParameters* gameParameters;     Viper*
    viper;           //achievement tracking     int asteroids_destroyed; } @property
    (nonatomic, retain) IBOutlet NSObject<BeltCommanderDelegate>* delegate; -(void)doNewGame:(GameParameters*)aGameParameters;
    -(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;   -(void)doEndGame;
    -(void)doAddNewTrouble; -(void)doCollisionDetection; -(void)doUpdateHUD; -(void)checkAchievements;
      -(Viper*)viper; @end ```    In [Listing 12-7](#9781430244226_Ch12.xhtml#list7),
    we see the header file for the class `BeltCommanderController`. As expected, the
    class extends `GameController`. It also defines a protocol called `BeltCommanderDelegate`.
    This protocol is implemented by `RootViewController` and is used to pass game
    state. There are two `IBOutlets` associated with this class. The first, `HealthBarView`,
    is the `UIView` subclass that is responsible for rendering the health bar at the
    upper right of the screen. The second, `scoreLabel`, is used to display the player’s
    score as the game is played.    In [Listing 12-7](#9781430244226_Ch12.xhtml#list7),
    we see that there is a `GameParameters` object called `gameParameters`. This object
    is used to determine which types of `Actors` should be included in the game. The
    idea is that this game would be free and the player could purchase different types
    of `Actors` to make it more fun (and profitable). Such in-app purchases are discussed
    in [Chapter 10](#9781430244226_Ch10.xhtml). For this chapter, we are assuming
    all in-app purchases have been made.    The `Viper` object is used to keep a reference
    to the ship in the game. Since we will want easy access to this object, it makes
    sense just to keep a pointer to it, instead of searching for it in with the other
    `Actors`. The last field is called `asteroids_destroyed` and is used to track
    achievements, as described in [Chapter 9](#9781430244226_Ch09.xhtml).'
  trans: "\n`Representation`协议（定义在`Actor.h`中）描述了`GameController`如何为每个`Actor`获取并更新`UIView`。`Representation`有两个具体实现：`ImageRepresentation`和`VectorRepresentation`。`ImageRepresentation`类使用`UIImages`和`UIImageViews`来创建适合呈现`Actor`的`UIView`。`VectorRepresentation`类使用\
    \ Core Graphics 动态绘制`Actor`。`ImageRepresentation`的细节将在第 6 章中介绍，而`VectorRepresentation`的实现则会在第\
    \ 7 章中说明。\n\n该协议定义了两个任务：\n- `-(UIView*)getViewForActor:(Actor*)anActor In:(GameController*)aController`：此任务在`Actor`被添加到`GameController`后不久被调用一次。它负责创建并返回一个适合渲染该`Actor`的`UIView`。\n\
    - `-(void)updateView:(UIView*)aView ForActor:(Actor*)anActor In:(GameController*)aController`：此任务在`Actor`的`needsViewUpdated`属性为`true`时被调用。此任务应对`UIView`进行必要的更改，使其准确表示该`Actor`。\n\
    \n**行为**\n\n在创建游戏时，许多不同的`Actor`将需要非常相似的代码来实现。虽然构建一个为每个类提供恰当代码的类层次结构是可行的，但我认为这很繁琐。一种解决方案是`Behavior`协议及其实现类。`Behavior`协议的每个实例负责为`Actor`应用一些逻辑，每一步一次。`Behavior`协议定义了一个单一任务：\n\
    - `-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController;`\n\
    `applyToActor:In:`任务由符合此协议的类实现，为它们所附加的`Actor`提供某种行为。\n\nBelt Commander 游戏中包含了几个`Behavior`的实现，它们是：\n\
    - `LinearMotion`：`LinearMotion`类用于在游戏期间沿直线移动`Actor`。该类提供了几个实用构造器，以便基于方向或目标点轻松定义运动。\n\
    - `ExpireAfterTime`：`ExpireAfterTime`类用于在经过给定步数后移除`Actor`。这对粒子效果很方便，你可以创建它们，将其添加到场景中，然后不再管理它们。\n\
    - `FollowActor`：此类用于使一个`Actor`与另一个`Actor`保持固定距离。它被附加到 Saucer 上的 HealthBar 使用，以保持它们在一起。\n\
    \n现在我们已经回顾了用于创建 Belt Commander 游戏的核心类，是时候看看我们刚刚描述的类的子类了，以了解如何扩展和定制它们来创建 Belt Commander\
    \ 游戏。\n\n**理解 BeltCommanderController**\n\n在前面的章节中，我们扩展了`GameController`类来制作示例。为了创建一个完整的游戏，我们将通过创建`BeltCommanderController`类来做同样的事情。`BeltCommanderController`类负责管理游戏中的`Actor`、确定结束条件、更新生命值和分数，以及解释来自用户的输入。让我们再次审视游戏中的动作，回顾游戏是如何进行的以及玩家面临哪些挑战。游戏的截图如图\
    \ 12-9 所示。\n\n![9781430244226_Fig12-09.jpg](img/9781430244226_Fig12-09.jpg)\n\n\
    **图 12-9**  Belt Commander，游戏中期\n\n在图 12-9 中，我们看到 Belt Commander 游戏。玩家通过点击屏幕来控制左侧的飞船。飞船将移动到与点击相同的高度。\n\
    \n飞船持续向右发射子弹，由背景中亮星右下方稍处的圆圈表示。从右侧，向左移动，是无尽的波次的小行星。如果子弹与小行星相撞，小行星会碎成更小的碎片，并且分数增加。如果小行星与飞船相撞，小行星会被摧毁，但飞船的生命值会减少。为了给游戏增加一点混乱，飞碟出现在游戏右侧并上下移动，向飞船发射子弹。子弹会摧毁小行星，但主要目的是击中飞船并减少其生命值。为了帮助我们可怜的飞船，三种类型的能量道具从右侧出现并向左移动。如果飞船幸运地处于能量道具的路径上，它就会获得增益。这些增益包括增加生命值、更强大的子弹和额外分数。游戏持续进行，直到飞船生命值降为零。\n\
    \n现在我们已经了解了游戏如何进行的概况，我们将查看`BeltCommanderController`类，首先考察新游戏是如何设置的，然后查看每步游戏运行的代码。\n\
    \n**BeltCommanderController：开始**\n\n要了解这个游戏是如何实现的，我们需要了解`BeltCommanderController`是如何被设置来玩游戏的。以下部分概述了启动并运行游戏所需的初始代码。让我们从`BeltCommanderController`类的头文件开始，如清单\
    \ 12-7 所示。\n\n**清单 12-7.** `BeltCommanderController.h`\n\n```\n@class BeltCommanderDelegate,\
    \ BeltCommanderController;\n\n@protocol BeltCommanderDelegate\n@required\n-(void)gameStarted:(BeltCommanderController*)aBeltCommanderController;\n\
    -(void)gameOver:(BeltCommanderController*)aBeltCommanderController;\n@end\n\n\
    @interface BeltCommanderController : GameController{\n    IBOutlet HealthBarView*\
    \ healthBarView;\n    IBOutlet UILabel* scoreLabel;\n    \n    GameParameters*\
    \ gameParameters;\n    Viper* viper;\n    \n    //achievement tracking\n    int\
    \ asteroids_destroyed;\n}\n@property (nonatomic, retain) IBOutlet NSObject<BeltCommanderDelegate>*\
    \ delegate;\n-(void)doNewGame:(GameParameters*)aGameParameters;\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;\n\
    \n-(void)doEndGame;\n-(void)doAddNewTrouble;\n-(void)doCollisionDetection;\n-(void)doUpdateHUD;\n\
    -(void)checkAchievements;\n\n-(Viper*)viper;\n@end\n```\n\n在清单 12-7 中，我们看到了`BeltCommanderController`类的头文件。正如预期的那样，该类扩展了`GameController`。它还定义了一个名为`BeltCommanderDelegate`的协议。该协议由`RootViewController`实现，用于传递游戏状态。该类关联了两个`IBOutlet`。第一个是`HealthBarView`，它是负责在屏幕右上角渲染生命值条的`UIView`子类。第二个是`scoreLabel`，用于在游戏进行时显示玩家的分数。\n\
    \n在清单 12-7 中，我们看到有一个`GameParameters`对象，名为`gameParameters`。此对象用于确定游戏中应包含哪些类型的`Actor`。其想法是游戏免费，玩家可以购买不同类型的`Actor`，使其更有趣（也更有利可图）。此类应用内购买在第\
    \ 10 章中讨论。在本章中，我们假设所有应用内购买均已进行。\n\n`Viper`对象用于保留对游戏中飞船的引用。由于我们希望方便地访问此对象，因此仅保留指向它的指针是有意义的，而不是在其他`Actor`中搜索它。最后一个字段名为`asteroids_destroyed`，用于追踪成就，如第\
    \ 9 章所述。\n"
- fmt: "# `BeltCommanderController` Setup and Game Logic\n\nThere are a number of\
    \ tasks associated with the class `BeltCommanderController`. The only ones we\
    \ need to worry about at this point are `doNewGame:` and `tapGesture:`; the others\
    \ we will cover as we go through the implementation. The task `doNewGame:` is\
    \ called by `RootViewController` to start a new game—we will look at the implementation\
    \ shortly. The task `tapGesture:` is called when a `UITapGestureRecognizer` detects\
    \ a tap on the screen; we will see this shortly as well. More about how gestures\
    \ work is covered in [Chapter 8](#9781430244226_Ch08.xhtml). Let’s focus on the\
    \ setup first.\n\n## Understanding the Setup\n\nThere are few steps that we must\
    \ take to get `BeltCommanderController` set up. Since we know that `BeltCommanderController`\
    \ extends `GameController`, we know that it should implement a `doSetup` task,\
    \ as shown in [Listing 12-8](#9781430244226_Ch12.xhtml#list8).\n\n**[Listing 12-8](#9781430244226_Ch12.xhtml#_list8).**\
    \ `BeltCommanderController.m` (`doSetup`)\n\n```\n-(BOOL)doSetup{\n    if ([super\
    \ doSetup]){\n        [self setGameAreaSize:CGSizeMake(480, 320)];\n        [self\
    \ setIsPaused:YES];\n        \n        NSMutableArray* classes = [NSMutableArray\
    \ new];\n        [classes addObject:[Saucer class]];\n        [classes addObject:[Bullet\
    \ class]];\n        [classes addObject:[Asteroid class]];\n        [classes addObject:[Powerup\
    \ class]];\n        [self setSortedActorClasses:classes];\n        \n        UITapGestureRecognizer*\
    \ tapRecognizer = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(tapGesture:)];\n\
    \        \n        [self prepareAudio: AUDIO_BLIP];\n        [self prepareAudio:\
    \ AUDIO_GOT_POWERUP];\n        [self prepareAudio: AUDIO_VIPER_EXPLOSION];\n \
    \       [self playBackgroundAudio: AUDIO_BC_THEME];\n    \n        [actorsView\
    \ addGestureRecognizer:tapRecognizer];\n        return YES;\n    }\n    return\
    \ NO;\n}\n```\n\nIn [Listing 12-8](#9781430244226_Ch12.xhtml#list8), we see the\
    \ task `doSetup` as defined by the class `BeltCommanderController`. In this task,\
    \ we define the size of the game to be 480x320, which happens to be the native\
    \ size of the iPhone screen in points. We also set the property `isPaused` to\
    \ `YES`, so nothing is animating until `doNewGame:` is called later. The next\
    \ step is to indicate which classes of `Actors` we want easy access to as the\
    \ game progresses. In this case, we specify the classes `Saucer`, `Bullet`, `Asteroid`,\
    \ and `Powerup`. Keep in mind that there is only one `Viper` in the game, and\
    \ we have a reference to it in the header file. The last thing we do is to create\
    \ a `UITapGestureRecognizer` and add it to `actorsView`. In this way, the task\
    \ `tapGesture:` will be called when the user taps on the screen. Before any of\
    \ that can happen, we need to understand how a new game is created.\n\n## A New\
    \ Game\n\nWhether we are running the first game or the hundredth, they all start\
    \ with the task `doNewGame:`, as shown in [Listing 12-9](#9781430244226_Ch12.xhtml#list9).\n\
    \n**[Listing 12-9](#9781430244226_Ch12.xhtml#_list9).** `BeltCommanderController.m`\
    \ (`doNewGame:`)\n\n```\n-(void)doNewGame:(GameParameters*)aGameParameters{\n\
    \    gameParameters = aGameParameters;\n    \n    [self removeAllActors];\n  \
    \  \n    [self setScore:0];\n    [self setStepNumber:0];\n    [self setScoreChangedOnStep:0];\n\
    \    \n    viper = [Viper viper:self];\n    [self addActor:viper];\n    \n   \
    \ asteroids_destroyed = 0;\n    \n    [self setIsPaused:NO];\n    [delegate gameStarted:self];\n\
    }\n```\n\nIn [Listing 12-9](#9781430244226_Ch12.xhtml#list9), we see the task\
    \ `doNewGame:`, which is called by the `RootViewController` to start a new game.\
    \ In this task, we set the `gameParameters` for future reference. Then we have\
    \ to reset this object so that it is ready for a new game. To remove all `Actors`,\
    \ we call `removeAllActors`. We also want to reset the score, the number of steps,\
    \ and the number of Asteroids destroyed. We also create a `Viper` object and store\
    \ it in the variable `viper`.\n\nOnce we are reset, we set `isPaused` to `NO`\
    \ and inform the `delegate` that the game has started. Let’s take a look at how\
    \ we handle input and then we will be ready to move beyond the setup.\n\n## Handling\
    \ Input\n\nAs soon as `isPaused` is set to `NO`, the game is up and running. At\
    \ this point, the only `actor` in the game is the `Viper`. Let’s take a moment\
    \ to understand how we intercept input to make it move before the Asteroids and\
    \ aliens show up. The task `tapGesture:` is shown in [Listing 12-10](#9781430244226_Ch12.xhtml#list10).\n\
    \n**[Listing 12-10](#9781430244226_Ch12.xhtml#_list10).** `BeltCommanderController.m`\
    \ (`tapGesture:`)\n\n```\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer{\n\
    \    if (![self isPaused]){\n        \n        CGSize gameSize = [self gameAreaSize];\n\
    \        CGSize viewSize = [actorsView frame].size;\n        float xRatio = gameSize.width/viewSize.width;\n\
    \        float yRatio = gameSize.height/viewSize.height;\n        \n        CGPoint\
    \ locationInView = [tapRecognizer locationInView:actorsView];\n        CGPoint\
    \ pointInGame = CGPointMake(locationInView.x*xRatio, locationInView.y*yRatio);\n\
    \        [viper setMoveToPoint: pointInGame within:self];\n    }\n}\n```\n\nIn\
    \ [Listing 12-10](#9781430244226_Ch12.xhtml#list10), we see the task `tapGesture:`\
    \ that is called when the user taps the screen. In this task, after checking if\
    \ we are paused, we have to convert the point of the touch into game coordinates.\
    \ On the iPhone, this is not strictly necessary because the view `actorsView`\
    \ is the same number of points wide and high as the size of our game. However,\
    \ when we play this game on the iPad, the `actorsView` is 1024x682, while our\
    \ game is still 640x480. In order to convert from one coordinate space to the\
    \ other, we divide the game width by the width of `actorsView` and multiply it\
    \ by the *X* location of the touch. We repeat the process for the height and *Y*\
    \ value. Once we have the point figured out, we call `setMoveToPoint:within:`\
    \ on Viper, which sets it in motion. We will look at the implementation of `setMoveToPoint:within:`\
    \ when we take a closer look at the class `Viper` in the next section.\n\nWe have\
    \ covered all there is to know about getting `BeltCommanderController` setup to\
    \ play the game. Everything is ready to start processing user input and adding\
    \ new `Actors` to the mix. The following section describes how `BeltCommanderController`\
    \ checks for an end condition, adds `Actors`, and performs other task appropriate\
    \ for the `BeltCommanderController` class.\n\n## `BeltCommanderController`, One\
    \ Step at a Time\n\nWe have our `BeltCommanderController` class all set up and\
    \ ready to play the game. We are going to look at the code that is run for every\
    \ step to manage the overall state of the game. We will look at how the end condition\
    \ is tested for, how we add new `Actors` to the scene, and how we manage the interactions\
    \ between the `Actors`. Since `BeltCommanderController` is a subclass of `GameController`,\
    \ we start out in game logic in the task `applyGameLogic`, as shown in [Listing\
    \ 12-11](#9781430244226_Ch12.xhtml#list11).\n\n**[Listing 12-11](#9781430244226_Ch12.xhtml#_list11).**\
    \ `BeltCommanderController.m` (`applyGameLogic`)\n\n```\n-(void)applyGameLogic{\n\
    \    if ([viper health] <= 0.0f){\n      [self playAudio:AUDIO_VIPER_EXPLOSION];\n\
    \        [self doEndGame];\n    } else {\n        \n        [self doAddNewTrouble];\n\
    \        [self doCollisionDetection];\n        [self doUpdateHUD];\n        \n\
    \        if ([self stepNumber]%30 == 0){\n            [self checkAchievements];\n\
    \        }\n    }\n}\n```\n\nIn [Listing 12-11](#9781430244226_Ch12.xhtml#list11),\
    \ we see the task `applyGameLogic` that is called once for every step of the game.\
    \ The first thing we do is check to see if the `Viper`’s health is below 0.0.\
    \ If it is, we play the explosion sound and end the game—simple as that. If the\
    \ `Viper` is still alive, we continue by calling `doAddNewTrouble`, `doCollisionDetection`,\
    \ and `doUpdateHUD`."
