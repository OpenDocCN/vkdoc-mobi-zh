    \ `viewDidLoad` 的父类实现（此为必需步骤）之后，我们将 `UIView loadingView` 添加到 `GameController`\
    \ 类的主视图中。`addSubview:` 任务会根据子视图的 `frame` 属性所定义的位置和大小来显示这个新的子视图。因为 `loadingView`\
    \ 是在 XIB 文件中定义的，所以它的 `frame` 也在那里定义。\n\n在屏幕显示加载视图后，我们需要加载初始资源，以避免应用程序生命周期后期出现无法预期的暂停。\n\
    \n从技术上讲，此应用程序中并非必须异步加载图像，但如果我们想显示进度条，则需要这样做。为了异步执行任务，我们只需调用 `performSelectorInBackground:withObject:`\
    \ 并传入任务 `loadImages` 即可。随后，`loadImage` 任务将在后台运行，如代码清单 3-3 所示。\n\n**代码清单 3-3.**\
    \ GameController.m (loadImage)\n\n```objc\n-(void)loadImages {\n    //sleeping\
    \ so we can see the loading view. In a production app, don't sleep :)\n    [NSThread\
