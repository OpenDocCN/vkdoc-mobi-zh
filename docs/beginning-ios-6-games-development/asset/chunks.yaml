    \  \n\nIn this chapter, we reviewed how to set up a game to be a good iOS citizen\
    \ by responding correctly to the user’s behaviors and expectations. We also looked\
    \ at some framework code in `GameController` to make playing audio easier for\
    \ our particular games. We looked at differentiating background music from sound\
    \ effects. Lastly, we looked at how we use this framework by exploring a simple\
