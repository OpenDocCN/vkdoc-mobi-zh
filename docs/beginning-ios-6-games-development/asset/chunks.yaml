    \ 1 到 2 秒。这种随机性造成了彗星尾部轻微的闪烁变化。请注意`Particle`此时没有添加额外的行为；这会导致`Particle`只是停留在一个位置并逐渐淡出。\n\
    \n## 总结\n\n在本章中，我们研究了一种在游戏中以编程方式创建 actor 的技术。我们创建了一个名为`VectorRepresentation`的新类，来处理为我们代码绘制而创建`UIView`的细节。我们使用这些新的基于向量的\
    \ actor 创建了一个生命条和一个简单的子弹。本章接着展示了两个创建粒子系统的简单示例。第一个示例重用了小行星的艺术资源，在爆炸小行星时营造出碎片感。第二个示例使用基于向量的粒子创建了带有发光尾巴的彗星。本章和上一章创建的\
    \ actor 将用于在第 12 章中构建一个完整的游戏。\n\n# 第 8 章\n\n# 构建你的游戏：理解手势与运动\n\n为移动设备创建游戏真正令人兴奋的地方在于用户与游戏互动的独特方式。`iOS`支持的复杂手势是一种相对较新的与计算机交互的方式，如果用户不熟悉，新的界面技术可能会给他们带来麻烦。然而，`iOS`的用户已经熟悉双击、捏合和滑动等概念，因此在游戏中加入这些手势不会带来可用性问题。\n\
    \n在本章中，我们将探讨如何利用`iOS`提供的内置库，将手势添加到你的应用程序或游戏中。我们还将探讨如何将特定手势附加到游戏中的特定 actor 上。到本章结束时，你将知道如何处理所有支持的手势，并能够使用它们来驱动游戏中的用户交互。在我们的示例中，我们将使用熟悉的`GameController`、`Actor`等类。因此，你对这些手势事件的理解将直接与你在前几章中学到的知识联系起来。\n\
    \n除了单纯的触摸屏幕，用户还可以通过新设备中包含的加速度计或陀螺仪与`iOS` 6 应用程序进行交互。\n"
- fmt: "使用设备的运动作为游戏输入为用户体验开辟了新的维度。我们将探索如何使用传感器并将其与游戏事件联系起来。\n\n## 触摸输入：基础\n\n实际上有三种方式接受用户的触摸输入。第一种是使用按钮或其他预构建的组件，并实现响应用户事件的任务。我不打算详细介绍这种输入类型，因为它是最基础的，并且在所有`iOS`入门书籍中都有详细介绍。第二种方法是创建`UIView`的子类并实现许多与触摸相关的任务。最后一种技术是将六个`UIGestureRecognizer`类之一连接到`UIView`上，并注册一个对象来响应不同的手势。\n\
    \n我认为最后一种技术在大多数情况下最为稳健，因为它为用户提供了一种使用一组已知手势与应用程序交互的方式。然而，使用第二种技术（实现与触摸相关的任务）也有充分的理由，特别是当你想要实现的用户交互本身并不是一种手势时。例如，一个绘图应用程序，你只想获取屏幕上所有接触点来进行绘制。\n\
    \n接下来的部分将回顾`UIView`的触摸相关任务。然后我们将继续探索`UIGestureRecognizer`类和运动事件。\n\n本章附带的示例代码可以在项目`Sample\
    \ 08`中找到。虽然本书中的大部分代码既可以在设备上运行，也可以在模拟器上运行，但我强烈建议你在`iPhone`（或iPod touch）上运行此代码——如果可能的话，使用`iOS`\
    \ 4.2或更高版本——因为复杂的手势很难在模拟器上模拟。要真正获得用户体验的感觉，最好用手实际操作手势，感受每种手势的效果。\n\n## 扩展`UIView`以接收触摸事件\n\
    \n当用户触摸屏幕上的`UIView`时，`UIView`有四个会被调用的任务。我统称它们为触摸相关任务。它们如[清单8-1](#9781430244226_Ch08.xhtml#list1)所示。\n\
    \n**[清单8-1](#9781430244226_Ch08.xhtml#_list1).** `四个触摸相关的任务`\n\n```\n-(void)touchesBegan:withEvent:\n\
    -(void)touchesCancelled:withEvent:\n-(void)touchesEnded:withEvent:\n-(void)touchesMoved:withEvent:\n\
    ```\n\n每个任务的第一个参数是一个`NSSet`，其中包含屏幕上每次离散触摸对应的`UITouch`。第二个参数是一个`UIEvent`，它基本上是`iOS`上三种不同输入类型（触摸事件、运动事件和远程控制事件）的通用包装器。我们不会涵盖远程控制事件；这些是由配件（如外部键盘）生成的事件。\n\
    \n任务`touchesBegan:withEvent:`在手指（或手指们）触摸屏幕时立即被调用。任务`touchesEnded:withEvent:`在手指移开时被调用。如果手指滑动，则会调用`touchesMoved:withEvent:`。如果系统必须接管屏幕控制权，则会调用任务`touchesCancelled:withEvent:`。例如，当另一个应用程序被启动时，会在控制权移交给新应用程序之前，在第一个应用程序上调用`touchesCancelled:withEvent:`。示例代码提供了使用这些任务的例子，如图[8-1](#9781430244226_Ch08.xhtml#Fig1)所示。\n\
    \n![9781430244226_Fig08-01.jpg](images/9781430244226_Fig08-01.jpg)\n\n[图8-1.](#9781430244226_Ch08.xhtml#_Fig1)\
    \ 触摸事件\n\n在图[8-1](#9781430244226_Ch08.xhtml#Fig1)中，我们看到了几条由点组成的线。每条线都是手指在屏幕上拖动的结果。最上面的线是单根手指在屏幕上移动产生的——它由红点绘制。第二条线是由两根手指拖过屏幕产生的，下面的一条也是，两者都由绿点绘制。\n\
    \n最下面的三条线是由三根手指绘制的，由蓝点组成。如果你能看到彩色版的图[8-1](#9781430244226_Ch08.xhtml#Fig1)（如果你有`ebook`），看看最下面一行最左边的点。注意一个是红色的，另一个是绿色的。这是因为我没有让三根手指同时落在屏幕上。\n\
    \n在第一个示例中，除了用手指绘制点之外，你还可以通过分别单击一根或两根手指来放大或缩小点。缩放功能演示了触摸事件和手势如何协同工作。一旦我们理解了触摸事件的基础知识，我们将更详细地探讨这一点。\n\
    \n## 查看事件代码\n\n这个简单演示的实现展示了我们如何接收触摸事件并为屏幕上的每次触摸创建演员。涉及两个类：继承自`GameController`的`TouchEventsController`和继承自`UIView`的`TouchEventsView`。让我们从查看`TouchEventsView`类开始。其头文件如[清单8-2](#9781430244226_Ch08.xhtml#list2)所示。\n\
    \n**[清单8-2](#9781430244226_Ch08.xhtml#_list2).** `TouchEventsView.h`\n\n```\n\
    @interface TouchEventsView : UIView{\n    IBOutlet TouchEventsController* controller;\n\
    \    NSMutableArray* sparks;\n}\n@end\n```\n\n在[清单8-2](#9781430244226_Ch08.xhtml#list2)中，我们看到一个`IBOutlet`，这样我们就可以将`TouchEventsView`连接到`TouchEventsController`。我们还看到一个名为`sparks`的`NSMutableArray`。这个集合用于跟踪正在添加的spark；如前所述，触摸事件可能会被取消。通过跟踪我们添加的spark，我们可以在调用`touchCancelled:withEvent:`之前清理任何已添加的spark。让我们看一下`TouchEventsView`类的实现，如[清单8-3](#9781430244226_Ch08.xhtml#list3)所示。\n\
    \n**[清单8-3](#9781430244226_Ch08.xhtml#_list3).** `TouchEventsView.m`\n\n```\n\
    @implementation TouchEventsView\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent\
    \ *)event{\n    NSLog(@\"Begin: %i\", [touches count]);\n    sparks = [NSMutableArray\
    \ new];\n}\n- (void)touchesCancelled:(NSSet *)touches withEvent:(UIEvent *)event{\n\
    \    NSLog(@\"Cancelled: %i\", [touches count]);\n    for (Spark* spark in sparks){\n\
    \        [controller removeActor:spark];\n    }\n    [sparks removeAllObjects];\n\
    }\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event{\n    NSLog(@\"\
    Ended: %i\", [touches count]);\n    int count = [touches count];\n    for (UITouch*\
    \ touch in touches){\n        Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];\n\
    \        [controller addActor:spark];\n        [sparks addObject:spark];\n   \
    \ }\n    [sparks removeAllObjects];\n}\n- (void)touchesMoved:(NSSet *)touches\
    \ withEvent:(UIEvent *)event{\n    NSLog(@\"Moved: %i\", [touches count]);\n \
    \   int count = [touches count];\n    for (UITouch* touch in touches){\n     \
    \   Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];\n   \
    \     [controller addActor:spark];\n        [sparks addObject:spark];\n    }\n\
    }\n@end\n```\n\n在[清单8-3](#9781430244226_Ch08.xhtml#list3)中，我们看到了之前讨论的四个任务。类`UIResponder`定义了每个任务，它是`UIView`的超类。这些方法在用户与屏幕交互时被调用。通过实现它们，我们可以添加自定义行为。任务`touchesBegan:withEvent:`在手指触摸屏幕时被调用。发生这种情况时，我们会创建一个新的`NSMutableArray`来跟踪所有将要添加的spark。接下来可能调用其他三个任务中的任何一个。如果用户移动他的手指，或者将另一根新手指放在屏幕上，则会调用任务`touchesMoved:withEvent:`。在这个任务中，我们为每次触摸创建一个新的spark。我们使用触摸次数减1来指定spark的变体或颜色，然后将其添加到场景中。"
  raw: 'Using the motion of the device as input to a game opens up a new dimension
    to the user experience. We will explore how to use the sensors and tie them into
    game events.    Touch Input: The Basics    There are really three ways to accept
    touch input from the user. The first is to use buttons or other prebuilt widgets
    and implement tasks that respond to the user events. I am not going to go through
    the details of this type of input, as it is the most basic, and is well covered
    in all `iOS` introductory books. The second method is to create subclasses of
    `UIView` and implement a number of touch-related tasks. The last technique is
    to wire up one of the six `UIGestureRecognizer` classes to a `UIView` and register
    an object to respond to the different gestures.    I think the last technique
    is the most robust in most cases, because it provides a way for users to interact
    with your application using a set of known gestures. However, there are perfectly
    good reasons to use the second technique, implementing the touch-related tasks,
    especially if the user interaction you are shooting for is not a gesture per se.
    An example might be a drawing application, where you simply want access to all
    points of contact on the screen to do your drawing.    The following section will
    review the touch-related tasks of `UIView`. We will then move on and explore `UIGestureRecognizer`
    classes and motion events.    The sample code that accompanies this chapter is
    found in the project Sample 08\. While most of the code in this book can be run
    on either a device or the emulator, I highly recommend running this code on an
    `iPhone` (or iPod touch)—if possible, `iOS` 4.2 or later—because the complex gestures
    are hard to simulate on the emulator. To really get a feel for the user experience,
    it is best to perform the actual gestures with your hand and see how each one
    feels.    Extending `UIView` to Receive Touch Events    `UIView` has four tasks
    that get called when a user touches it on the screen. I am collectively calling
    these the touch-related tasks. They are shown in [Listing 8-1](#9781430244226_Ch08.xhtml#list1).    **[Listing
    8-1](#9781430244226_Ch08.xhtml#_list1).** `The four touch-related tasks`    ```
    -(void)touchesBegan:withEvent: -(void)touchesCancelled:withEvent: -(void)touchesEnded:withEvent:
    -(void)touchesMoved:withEvent: ```    The first argument of each of these tasks
    is an `NSSet` that contains a `UITouch` for each discrete touch on the screen.
    The second argument is a `UIEvent` that is basically a generic wrapper for the
    three different input types available on `iOS`: touch events, motion events, and
    remote-control events. We won’t be covering remote-control events; those are events
    generated by accessories, like an external keyboard.    The task `touchesBegan:withEvent`:
    is called as soon as a finger (or fingers) touch the screen. The task `touchesEnded:withEvent`:
    is called when the fingers are removed. If the fingers slide around, the `touchesMoved:withEvent`:
    would be called. The task `touchesCancelled:withEvent`: is called if the system
    has to take control of the screen. For example, if another application is launched,
    the `touchesCancelled:withEvent`: is called on the first application before control
    is passed to the new app. The sample code provides an example of using these tasks,
    as shown in [Figure 8-1](#9781430244226_Ch08.xhtml#Fig1).    ![9781430244226_Fig08-01.jpg](images/9781430244226_Fig08-01.jpg)    [Figure
    8-1.](#9781430244226_Ch08.xhtml#_Fig1)  Touch events    In [Figure 8-1](#9781430244226_Ch08.xhtml#Fig1),
    we see a several lines composed of dots. Each one of these lines is the result
    of a finger being dragged across the screen. The topmost line was created when
    a single figure was moved across the screen—it is drawn with red dots. The second
    topmost line was created by dragging two fingers across the screen, as was the
    one below it, and both are drawn with green dots.


    The bottom three lines were drawn with three fingers, and it is made of blue dots.
    If you can see [Figure 8-1](#9781430244226_Ch08.xhtml#Fig1) in color (if you have
    the `ebook`), take a look at the left-most dots on the bottom line. Notice that
    one is red and the other is green. This is because I did not get all three of
    my fingers to land on the screen at the same time.    In this first example, besides
    drawing dots with your finger, you can scale the dots up or down by tapping with
    a single finger or two fingers, respectively. The scaling feature demonstrates
    how touch events and gestures can work together. We will explore this in more
    detail once we understand the basics of the touch events.    Looking At the Event
    Code    The implementation of this simple demonstration shows how we receive the
    touch events and create actors out of each touch on the screen. There are two
    classes involved: `TouchEventsController` that extends `GameController` and `TouchEventsView`
    that extends `UIView`. Let’s start by looking the class `TouchEventsView`. The
    header is shown in [Listing 8-2](#9781430244226_Ch08.xhtml#list2).    **[Listing
    8-2](#9781430244226_Ch08.xhtml#_list2).** `TouchEventsView.h`    ``` @interface
    TouchEventsView : UIView{     IBOutlet TouchEventsController* controller;     NSMutableArray*
    sparks; } @end ```    In [Listing 8-2](#9781430244226_Ch08.xhtml#list2), we see
    an `IBOutlet` so we can wire the `TouchEventsView` up to a `TouchEventsController`.
    We also see an `NSMutableArray` called `sparks`. This collection is used to keep
    track of sparks as they are being added; as mentioned, the touch event can be
    cancelled. By keeping track of the sparks that we add, we can clean up any sparks
    that are added before `touchCancelled:withEvent`: is called. Let’s take a look
    at the implementation of the class `TouchEventsView`, as shown on [Listing 8-3](#9781430244226_Ch08.xhtml#list3).    **[Listing
    8-3](#9781430244226_Ch08.xhtml#_list3).** `TouchEventsView.m`    ``` @implementation
    TouchEventsView - (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event{
        NSLog(@"Begin: %i", [touches count]);     sparks = [NSMutableArray new]; }
    - (void)touchesCancelled:(NSSet *)touches withEvent:(UIEvent *)event{     NSLog(@"Cancelled:
    %i", [touches count]);     for (Spark* spark in sparks){         [controller removeActor:spark];
        }     [sparks removeAllObjects]; } - (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent
    *)event{     NSLog(@"Ended: %i", [touches count]);     int count = [touches count];
        for (UITouch* touch in touches){         Spark* spark = [Spark spark:count-1
    At:[touch locationInView:self]];         [controller addActor:spark];         [sparks
    addObject:spark];     }     [sparks removeAllObjects]; } - (void)touchesMoved:(NSSet
    *)touches withEvent:(UIEvent *)event{     NSLog(@"Moved: %i", [touches count]);
        int count = [touches count];     for (UITouch* touch in touches){         Spark*
    spark = [Spark spark:count-1 At:[touch locationInView:self]];         [controller
    addActor:spark];         [sparks addObject:spark];     } } @end ```    In [Listing
    8-3](#9781430244226_Ch08.xhtml#list3), we see the four tasks discussed earlier.
    The class `UIResponder` defines each task, which is the super-class of `UIView`.
    These methods are called as the user interacts with the screen. By implementing
    them, we can add our custom behavior. The task `touchesBegan:withEvent`: is called
    when a finger touches the screen. When this happens, we create a new `NSMutableArray`
    to keep track of all of the sparks we are going to add. Any of the other three
    tasks could be called next. If the user moves his or her finger, or places another
    new finger on the screen, the task `touchesMoved:withEvent`: is called. In this
    task, we create and a new spark for each touch. We use the number of touches minus
    1, to specify the variant or color of the spark, which is then added the scene.'
  trans: "\n使用设备的运动作为游戏输入为用户体验开辟了新的维度。我们将探索如何使用传感器并将其与游戏事件联系起来。\n\n## 触摸输入：基础\n\n\
    实际上有三种方式接受用户的触摸输入。第一种是使用按钮或其他预构建的组件，并实现响应用户事件的任务。我不打算详细介绍这种输入类型，因为它是最基础的，并且在所有`iOS`入门书籍中都有详细介绍。第二种方法是创建`UIView`的子类并实现许多与触摸相关的任务。最后一种技术是将六个`UIGestureRecognizer`类之一连接到`UIView`上，并注册一个对象来响应不同的手势。\n\
    \n我认为最后一种技术在大多数情况下最为稳健，因为它为用户提供了一种使用一组已知手势与应用程序交互的方式。然而，使用第二种技术（实现与触摸相关的任务）也有充分的理由，特别是当你想要实现的用户交互本身并不是一种手势时。例如，一个绘图应用程序，你只想获取屏幕上所有接触点来进行绘制。\n\
    \n接下来的部分将回顾`UIView`的触摸相关任务。然后我们将继续探索`UIGestureRecognizer`类和运动事件。\n\n本章附带的示例代码可以在项目`Sample\
    \ 08`中找到。虽然本书中的大部分代码既可以在设备上运行，也可以在模拟器上运行，但我强烈建议你在`iPhone`（或 iPod touch）上运行此代码——如果可能的话，使用`iOS`\
    \ 4.2 或更高版本——因为复杂的手势很难在模拟器上模拟。要真正获得用户体验的感觉，最好用手实际操作手势，感受每种手势的效果。\n\n## 扩展`UIView`以接收触摸事件\n\
    \n当用户触摸屏幕上的`UIView`时，`UIView`有四个会被调用的任务。我统称它们为触摸相关任务。它们如清单 8-1 所示。\n\n**清单 8-1.**\
    \ `四个触摸相关的任务`\n\n```\n-(void)touchesBegan:withEvent:\n-(void)touchesCancelled:withEvent:\n\
    -(void)touchesEnded:withEvent:\n-(void)touchesMoved:withEvent:\n```\n\n每个任务的第一个参数是一个`NSSet`，其中包含屏幕上每次离散触摸对应的`UITouch`。第二个参数是一个`UIEvent`，它基本上是`iOS`上三种不同输入类型（触摸事件、运动事件和远程控制事件）的通用包装器。我们不会涵盖远程控制事件；这些是由配件（如外部键盘）生成的事件。\n\
    \n任务`touchesBegan:withEvent:`在手指（或手指们）触摸屏幕时立即被调用。任务`touchesEnded:withEvent:`在手指移开时被调用。如果手指滑动，则会调用`touchesMoved:withEvent:`。如果系统必须接管屏幕控制权，则会调用任务`touchesCancelled:withEvent:`。例如，当另一个应用程序被启动时，会在控制权移交给新应用程序之前，在第一个应用程序上调用`touchesCancelled:withEvent:`。示例代码提供了使用这些任务的例子，如图\
    \ 8-1 所示。\n\n![9781430244226_Fig08-01.jpg](img/9781430244226_Fig08-01.jpg)\n\n\
    图 8-1. 触摸事件\n\n在图 8-1 中，我们看到了几条由点组成的线。每条线都是手指在屏幕上拖动的结果。最上面的线是单根手指在屏幕上移动产生的——它由红点绘制。第二条线是由两根手指拖过屏幕产生的，下面的一条也是，两者都由绿点绘制。\n\
    \n最下面的三条线是由三根手指绘制的，由蓝点组成。如果你能看到彩色版的图 8-1（如果你有`ebook`），看看最下面一行最左边的点。注意一个是红色的，另一个是绿色的。这是因为我没有让三根手指同时落在屏幕上。\n\
    \n在第一个示例中，除了用手指绘制点之外，你还可以通过分别单击一根或两根手指来放大或缩小点。缩放功能演示了触摸事件和手势如何协同工作。一旦我们理解了触摸事件的基础知识，我们将更详细地探讨这一点。\n\
    \n## 查看事件代码\n\n这个简单演示的实现展示了我们如何接收触摸事件并为屏幕上的每次触摸创建演员。涉及两个类：继承自`GameController`的`TouchEventsController`和继承自`UIView`的`TouchEventsView`。让我们从查看`TouchEventsView`类开始。其头文件如清单\
    \ 8-2 所示。\n\n**清单 8-2.** `TouchEventsView.h`\n\n```\n@interface TouchEventsView\
    \ : UIView{\n    IBOutlet TouchEventsController* controller;\n    NSMutableArray*\
    \ sparks;\n}\n@end\n```\n\n在清单 8-2 中，我们看到一个`IBOutlet`，这样我们就可以将`TouchEventsView`连接到`TouchEventsController`。我们还看到一个名为`sparks`的`NSMutableArray`。这个集合用于跟踪正在添加的\
    \ spark；如前所述，触摸事件可能会被取消。通过跟踪我们添加的 spark，我们可以在调用`touchCancelled:withEvent:`之前清理任何已添加的\
    \ spark。让我们看一下`TouchEventsView`类的实现，如清单 8-3 所示。\n\n**清单 8-3.** `TouchEventsView.m`\n\
    \n```\n@implementation TouchEventsView\n- (void)touchesBegan:(NSSet *)touches\
    \ withEvent:(UIEvent *)event{\n    NSLog(@\"Begin: %i\", [touches count]);\n \
    \   sparks = [NSMutableArray new];\n}\n- (void)touchesCancelled:(NSSet *)touches\
    \ withEvent:(UIEvent *)event{\n    NSLog(@\"Cancelled: %i\", [touches count]);\n\
    \    for (Spark* spark in sparks){\n        [controller removeActor:spark];\n\
    \    }\n    [sparks removeAllObjects];\n}\n- (void)touchesEnded:(NSSet *)touches\
    \ withEvent:(UIEvent *)event{\n    NSLog(@\"Ended: %i\", [touches count]);\n \
    \   int count = [touches count];\n    for (UITouch* touch in touches){\n     \
    \   Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];\n   \
    \     [controller addActor:spark];\n        [sparks addObject:spark];\n    }\n\
    \    [sparks removeAllObjects];\n}\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent\
    \ *)event{\n    NSLog(@\"Moved: %i\", [touches count]);\n    int count = [touches\
    \ count];\n    for (UITouch* touch in touches){\n        Spark* spark = [Spark\
    \ spark:count-1 At:[touch locationInView:self]];\n        [controller addActor:spark];\n\
    \        [sparks addObject:spark];\n    }\n}\n@end\n```\n\n在清单 8-3 中，我们看到了之前讨论的四个任务。类`UIResponder`定义了每个任务，它是`UIView`的超类。这些方法在用户与屏幕交互时被调用。通过实现它们，我们可以添加自定义行为。任务`touchesBegan:withEvent:`在手指触摸屏幕时被调用。发生这种情况时，我们会创建一个新的`NSMutableArray`来跟踪所有将要添加的\
    \ spark。接下来可能调用其他三个任务中的任何一个。如果用户移动他的手指，或者将另一根新手指放在屏幕上，则会调用任务`touchesMoved:withEvent:`。在这个任务中，我们为每次触摸创建一个新的\
    \ spark。我们使用触摸次数减 1 来指定 spark 的变体或颜色，然后将其添加到场景中。"
- fmt: "`Spark`只是一个简单的类，类似于粒子，会在五秒后自行移除。触摸事件有两种结束方式。第一种方式是当用户移开所有手指后，调用`touchesEnded:withEvent:`时。在这种情况下，我们执行与`touchesMoved:withEvent:`中相同的操作：为每个触摸创建一个`Spark`。我们还清空`NSMutableArray`\
    \ `sparks`，以移除对火花对象的引用。\n\n另一种结束触摸事件的方式是事件被取消。当系统中发生其他事件，导致完成当前事件不合适时，事件会被取消。当调用此任务时，我们会移除自上次调用`touchesBegan:withEvent:`以来创建的所有`Spark`对象，从而撤销到目前为止所做的工作。\n\
    \n`touchesCancelled:withEvent:`任务可能在切换应用或弹出对话框时被调用。另一种更常见的触摸事件取消方式是手势识别器被触发。手势识别器，由`UIGestureRecognizer`类定义，是一个检查`UIView`上触摸事件的对象，当触摸可以被视为特定手势（如轻点、捏合或滑动）时做出响应。\n\
    \n为了试验`touchesCancelled:withEvent:`任务，请进行双指双击操作。注意，第一次轻点后，你手指接触的地方会出现两个火花。第二次轻点后，之前添加的`Spark`对象将被移除。这是因为当双指双击手势识别器被触摸事件激活时，`touchesCancelled:withEvent:`被调用了。\n\
    \n手势识别器能够取消触摸事件这一特性，允许开发者在`UIView`上混合搭配任意数量的手势，而无需担心手势冲突。除了取消触摸事件，手势之间也可以相互取消。例如，捏合手势和双指拖拽手势的起始方式相同：两个手指大约同时接触屏幕。如果没有一种机制来相互取消，这两种手势很容易发生冲突。让我们继续看看这些触摸事件如何应用于与游戏相关的类。\n\
    \n## 将触摸事件应用于角色\n\n让我们快速看一下`TouchEventsController`类，以及我们如何设置演示程序来响应轻点手势。`TouchEventsController.m`的重要部分如[代码清单8-4](#9781430244226_Ch08.xhtml#list4)所示。\n\
    \n**[代码清单 8-4](#9781430244226_Ch08.xhtml#_list4).** `TouchEventsController.m (doSetup)`\n\
    \n```\n-(BOOL)doSetup{\n    if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320,\
    \ 480)];\n        [self setSortedActorClasses:[NSMutableArray arrayWithObject:[Spark\
    \ class]]];\n        UITapGestureRecognizer* doubleTapTwoTouch = [[UITapGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapTwoTouch\
    \ setNumberOfTapsRequired:2];\n        [doubleTapTwoTouch setNumberOfTouchesRequired:2];\n\
    \        UITapGestureRecognizer* doubleTapOneTouch = [[UITapGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapOneTouch\
    \ setNumberOfTapsRequired:2];\n        [doubleTapOneTouch setNumberOfTouchesRequired:1];\n\
    \        [actorsView addGestureRecognizer:doubleTapOneTouch];\n        [actorsView\
    \ addGestureRecognizer:doubleTapTwoTouch];\n        return YES;\n    }\n    return\
    \ NO;\n}\n```\n\n在[代码清单8-4](#9781430244226_Ch08.xhtml#list4)中，我们看到了来自`TouchEventsController`类的任务`doSetup`。当这个`UIViewController`实例的视图被加载时，会调用此任务。在设置游戏区域大小并将`Spark`类标记为已排序的角色类之后，我们创建了两个`UITapGestureRecognizer`实例。第一个`UITapGestureRecognizer`实例名为`doubleTapTwoTouch`，配置为在双指双击时响应。\n\
    \n第二个`UITapGestureRecognizer`实例名为`doubleTapOneTouch`，配置为响应单指双击。这两个`UITapGestureRecognizer`都通过`addGestureRecognizer:`任务添加到`actorsView`中。\n\
    \n查看用于创建这些手势识别器的构造方法，我们看到了一个引用`doubleTap:`任务的选择器。每当这两个任务中的任何一个识别出手势时，就会调用此任务。我们本可以让每个手势识别器调用不同的任务，在更复杂的应用中这可能是可取的。在此示例中，如[代码清单8-5](#9781430244226_Ch08.xhtml#list5)所示，在`doubleTap:`任务中区分这两个手势识别器已经足够简单。\n\
    \n**[代码清单 8-5](#9781430244226_Ch08.xhtml#_list5).** `TouchEventsController.m (doubleTap:)`\n\
    \n```\n-(void)doubleTap:(UITapGestureRecognizer*)doubleTap{\n    float scale;\n\
    \    if ([doubleTap numberOfTouches] == 1){\n        scale = 2.0;\n    } else\
    \ {\n        scale = 0.5;\n    }\n    NSLog(@\"Touches: %i\", [doubleTap numberOfTouches]);\n\
    \    for (Spark* spark in [self actorsOfType:[Spark class]]){\n        float radius\
    \ = [spark radius]*scale;\n        if (radius < 2){\n            radius = 2;\n\
    \        } else if (radius > 128){\n            radius = 128;\n        }\n   \
    \     [spark setRadius:radius];\n    }\n}\n```\n\n在[代码清单8-5](#9781430244226_Ch08.xhtml#list5)中，我们检查触发此任务的`UITapGestureRecognizer`\
    \ `doubleTap`是否配置为单次触摸。根据此检查的结果，我们将`scale`的值设置为2.0或0.5。通过这种方式，单指双击会增加`Spark`对象的缩放比例，而双指双击则会减小`Spark`对象的大小。一旦我们得到`scale`的正确值，我们就简单地遍历场景中所有的`Spark`对象，并根据`scale`调整它们的半径。\n\
    \n我们已经了解了触摸事件，以便理解触摸事件的生命周期。我们还快速了解了`UITapGestureRecognizer`类。下一节将更详细地讨论`UITapGestureRecognizer`。\n\
    \n## 理解手势识别器\n\n`iOS`允许用户通过丰富的手势集与应用程序交互。这些手势包括轻点、滑动、捏合等。每个手势都包含相当复杂的逻辑，用于将触摸事件解释为一个连贯的手势。如果将这项工作交给每个开发者去实现，用户体验将会非常糟糕，因为每个开发者不可避免地会对每个手势做出不同的假设。例如，长按手势有一个默认持续时间。我们希望所有应用程序都保持一致，因为我们不想让用户为每个应用程序重新学习什么是长按。本着这种精神，苹果提供了许多类，用于识别开发者最常用的手势。每个手势识别器都继承自抽象基类`UIGestureRecognizer`，如[代码清单8-6](#9781430244226_Ch08.xhtml#list6)所示。\n\
    \n**[代码清单 8-6](#9781430244226_Ch08.xhtml#_list6).** `UIGestureRecognizer`的具体实现\n\
    \n```\nUITapGestureRecognizer\nUIPinchGestureRecognizer\nUIRotateGestureRecognizer\n\
    UISwipeGestureRecognizer\nUIPanGestureRecognizer\nUILongPressGestureRecognizer\n\
    ```\n\n在[代码清单8-6](#9781430244226_Ch08.xhtml#list6)中，我们看到了内置在`iOS` 6中的每个`UIGestureRecognizer`子类。轻点可能是`iOS`中最常见的手势，无需描述。捏合手势是指两个手指相互靠近或远离。旋转手势是指两个手指在屏幕上移动，就像拧开番茄酱瓶盖一样。滑动手势是指一个或多个手指在屏幕上快速划过，就像翻杂志页。平移手势类似于滑动，但速度更慢，动作更刻意。长按手势很像轻点，但手指在屏幕上停留的时间更长。"
  raw: 'The spark is just a simple particle-like class that removes itself after five
    seconds.    There are two ways that a touch event can end. The first way is when
    `touchesEnded:withEvent`: is called after the user has removed all of his fingers.
    In this case, we do the same thing we did in `touchesMoved:withEvent:`: we create
    a spark for each touch. We also clear the `NSMutableArray` sparks, to remove reference
    to the spark objects.    The other way a touch event can end is by it being cancelled.
    An event is cancelled when something else in the system happens that makes completing
    the event inappropriate. When this tasks is called, we removed all of the Spark
    objects we have created since `touchesBegan:withEvent`: was last called, undoing
    the work we have done up until this point.    The `touchesCancelled:withEvent`:
    task can be called when switching applications or having a dialog popup. Another
    perhaps more common way for touch events to be cancelled is if a gesture recognizer
    is triggered. A gesture recognizer, as defined by the class `UIGestureRecognizer`,
    is an object that inspects the touch events on a `UIView` and responds when the
    touches can be considered a specific gesture, like a tap, pinch, or swipe.    To
    experiment with the `touchesCancelled:withEvent`: tasks, do a two-finger double
    tap. Notice that after the first tap, there are two sparks where you fingers touched.
    After the second tap, the Spark objects that where added get removed. This is
    because `touchesCancelled:withEvent`: was called when the two-figure double-tap
    gesture recognizer was activated by the touch events.    The fact that gesture
    recognizers are able to cancel touch events allows developers to mix and match
    any number of gestures on a `UIView` without worrying about the gestures conflicting.
    In addition to canceling the touch events, gestures can also cancel each other.
    For example, a pinch gesture and a two-finger drag gesture both start the same
    way, with two fingers landing on the screen at about the same time. These two
    gestures could easily conflict if there was no mechanism in place to cancel each
    other. Let’s move on a see how these touch events apply to the game-related classes.    Applying
    Touch Events to Actors    Let’s take a quick look at the class `TouchEventsController`
    and see how we set up the demo to respond to tap gestures. The important part
    of `TouchEventsController.m` is shown in [Listing 8-4](#9781430244226_Ch08.xhtml#list4).    **[Listing
    8-4](#9781430244226_Ch08.xhtml#_list4).** `TouchEventsController.m (doSetup)`    ```
    -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(320,
    480)];         [self setSortedActorClasses:[NSMutableArray arrayWithObject:[Spark
    class]]];         UITapGestureRecognizer* doubleTapTwoTouch = [[UITapGestureRecognizer
    alloc] initWithTarget:self action:@selector(doubleTap:)];         [doubleTapTwoTouch
    setNumberOfTapsRequired:2];         [doubleTapTwoTouch setNumberOfTouchesRequired:2];
            UITapGestureRecognizer* doubleTapOneTouch = [[UITapGestureRecognizer alloc]
    initWithTarget:self action:@selector(doubleTap:)];         [doubleTapOneTouch
    setNumberOfTapsRequired:2];         [doubleTapOneTouch setNumberOfTouchesRequired:1];
            [actorsView addGestureRecognizer:doubleTapOneTouch];         [actorsView
    addGestureRecognizer:doubleTapTwoTouch];         return YES;     }     return
    NO; } ```    In [Listing 8-4](#9781430244226_Ch08.xhtml#list4), we see the task
    `doSetup`, from the class `TouchEventsController`. This task is called when this
    `UIViewController` instance’s view is loaded. After setting up the game area size
    and marking the class Spark as a sorted actor class, we create two instances of
    `UITapGestureRecognizer`. The first instance of `UITapGestureRecognizer` is called
    `doubleTapTwoTouch` and is configured to respond when two fingers do a double
    tap.


    The second `UITapGestureRecognizer` is called `doubleTapOneTouch` and is configured
    for a single-finger double tap. Both of these `UITapGestureRecognizer` are added
    to `actorsView` with the task `addGestureRecognizer`:.    Looking at the constructor
    used to create these gesture recognizers, we see a selector referencing the task
    `doubleTap`:. This task is called whenever one of these two tasks recognizes a
    gesture. We could have had each gesture recognizer call different tasks, and that
    may be desirable in a more complex application. In this example, it is easy enough
    to distinguish these two gesture recognizers in the `doubleTap`: tasks, as shown
    in [Listing 8-5](#9781430244226_Ch08.xhtml#list5).    **[Listing 8-5](#9781430244226_Ch08.xhtml#_list5).** `TouchEventsController.m
    (doubleTap:)`    ``` -(void)doubleTap:(UITapGestureRecognizer*)doubleTap{     float
    scale;     if ([doubleTap numberOfTouches] == 1){         scale = 2.0;     } else
    {         scale = 0.5;     }     NSLog(@"Touches: %i", [doubleTap numberOfTouches]);
        for (Spark* spark in [self actorsOfType:[Spark class]]){         float radius
    = [spark radius]*scale;         if (radius < 2){             radius = 2;         }
    else if (radius > 128){             radius = 128;         }         [spark setRadius:radius];
        } } ```    In [Listing 8-5](#9781430244226_Ch08.xhtml#list5), we check to
    see if the `UITapGestureRecognizer` `doubleTap` that triggered this task is configured
    for a single touch. Based on this result of this check, we set the value of scale
    to either 2.0 or 0.5\. In this way, a single-finger double tap will increase the
    scale of the Spark objects, and a two-finger double tap will reduce the size of
    the Spark objects. Once we have the correct value for scale, we simply iterate
    over all of the Spark objects in the scene and adjust their radius based on scale.    We
    have looked at touch events so we can understand the touch event lifecycle. We
    also took a quick look at the `UITapGestureRecognizer` class. The following section
    will discuss the `UITapGestureRecognizer` in more detail.    Understanding Gesture
    Recognizers    `iOS` allows the user to interact with an application with a rich
    set of gestures. These include taps, swipes, pinches, and so on. Each of these
    gestures comprises some reasonably complex logic to interpret touch events into
    a cohesive gesture. If this was left up to each developer to implement, the user
    experience would be pretty bad, as each developer would inevitably make different
    assumptions about each gesture. For example, the long press gesture has a default
    duration. We would want this consistent across all applications because we don’t
    want to “retrain” each user for each application as to what a long press is. In
    this spirit, Apple provides a number of classes that are designed to identify
    the most common gestures a developer is going need. Each of the gesture recognizers
    extends the abstract base class `UIGestureRecognizer` and is shown in [Listing
    8-6](#9781430244226_Ch08.xhtml#list6).    **[Listing 8-6](#9781430244226_Ch08.xhtml#_list6).** `Concrete
    Implementations of UIGestureRecognizer`    ``` UITapGestureRecognizer UIPinchGestureRecognizer
    UIRotateGestureRecognizer UISwipeGestureRecognizer UIPanGestureRecognizer UILongPressGestureRecognizer
    ```    In [Listing 8-6](#9781430244226_Ch08.xhtml#list6), we see each subclass
    of `UIGestureRecognizer` that is built into `iOS` 6\. Tap is probably the most
    common gesture in `iOS`, and needs no description. The pinch gesture is when two
    fingers either move closer or farther away from each other. The rotation gesture
    is when two fingers move on the screen like you are opening a bottle of ketchup.
    The swipe gesture is when one or more fingers are flicked across the screen, as
    if turning a page in a magazine. The pan gesture is similar to swipe, but slower
    and more deliberate. The long press gesture is much like a tap, but the finger
    is held to the screen longer.'
  trans: "\n`Spark`只是一个简单的类，类似于粒子，会在五秒后自行移除。触摸事件有两种结束方式。第一种方式是当用户移开所有手指后，调用`touchesEnded:withEvent:`时。在这种情况下，我们执行与`touchesMoved:withEvent:`中相同的操作：为每个触摸创建一个`Spark`。我们还清空`NSMutableArray`\
    \ `sparks`，以移除对火花对象的引用。\n\n另一种结束触摸事件的方式是事件被取消。当系统中发生其他事件，导致完成当前事件不合适时，事件会被取消。当调用此任务时，我们会移除自上次调用`touchesBegan:withEvent:`以来创建的所有`Spark`对象，从而撤销到目前为止所做的工作。\n\
    \n`touchesCancelled:withEvent:`任务可能在切换应用或弹出对话框时被调用。另一种更常见的触摸事件取消方式是手势识别器被触发。手势识别器，由`UIGestureRecognizer`类定义，是一个检查`UIView`上触摸事件的对象，当触摸可以被视为特定手势（如轻点、捏合或滑动）时做出响应。\n\
    \n为了试验`touchesCancelled:withEvent:`任务，请进行双指双击操作。注意，第一次轻点后，你手指接触的地方会出现两个火花。第二次轻点后，之前添加的`Spark`对象将被移除。这是因为当双指双击手势识别器被触摸事件激活时，`touchesCancelled:withEvent:`被调用了。\n\
    \n手势识别器能够取消触摸事件这一特性，允许开发者在`UIView`上混合搭配任意数量的手势，而无需担心手势冲突。除了取消触摸事件，手势之间也可以相互取消。例如，捏合手势和双指拖拽手势的起始方式相同：两个手指大约同时接触屏幕。如果没有一种机制来相互取消，这两种手势很容易发生冲突。让我们继续看看这些触摸事件如何应用于与游戏相关的类。\n\
    \n## 将触摸事件应用于角色\n\n让我们快速看一下`TouchEventsController`类，以及我们如何设置演示程序来响应轻点手势。`TouchEventsController.m`的重要部分如代码清单\
    \ 8-4 所示。\n\n**代码清单 8-4.** `TouchEventsController.m (doSetup)`\n\n```\n-(BOOL)doSetup{\n\
    \    if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
    \        [self setSortedActorClasses:[NSMutableArray arrayWithObject:[Spark class]]];\n\
    \        UITapGestureRecognizer* doubleTapTwoTouch = [[UITapGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapTwoTouch\
    \ setNumberOfTapsRequired:2];\n        [doubleTapTwoTouch setNumberOfTouchesRequired:2];\n\
    \        UITapGestureRecognizer* doubleTapOneTouch = [[UITapGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapOneTouch\
    \ setNumberOfTapsRequired:2];\n        [doubleTapOneTouch setNumberOfTouchesRequired:1];\n\
    \        [actorsView addGestureRecognizer:doubleTapOneTouch];\n        [actorsView\
    \ addGestureRecognizer:doubleTapTwoTouch];\n        return YES;\n    }\n    return\
    \ NO;\n}\n```\n\n在代码清单 8-4 中，我们看到了来自`TouchEventsController`类的任务`doSetup`。当这个`UIViewController`实例的视图被加载时，会调用此任务。在设置游戏区域大小并将`Spark`类标记为已排序的角色类之后，我们创建了两个`UITapGestureRecognizer`实例。第一个`UITapGestureRecognizer`实例名为`doubleTapTwoTouch`，配置为在双指双击时响应。\n\
    \n第二个`UITapGestureRecognizer`实例名为`doubleTapOneTouch`，配置为响应单指双击。这两个`UITapGestureRecognizer`都通过`addGestureRecognizer:`任务添加到`actorsView`中。\n\
    \n查看用于创建这些手势识别器的构造方法，我们看到了一个引用`doubleTap:`任务的选择器。每当这两个任务中的任何一个识别出手势时，就会调用此任务。我们本可以让每个手势识别器调用不同的任务，在更复杂的应用中这可能是可取的。在此示例中，如代码清单\
    \ 8-5 所示，在`doubleTap:`任务中区分这两个手势识别器已经足够简单。\n\n**代码清单 8-5.** `TouchEventsController.m\
    \ (doubleTap:)`\n\n```\n-(void)doubleTap:(UITapGestureRecognizer*)doubleTap{\n\
    \    float scale;\n    if ([doubleTap numberOfTouches] == 1){\n        scale =\
    \ 2.0;\n    } else {\n        scale = 0.5;\n    }\n    NSLog(@\"Touches: %i\"\
    , [doubleTap numberOfTouches]);\n    for (Spark* spark in [self actorsOfType:[Spark\
    \ class]]){\n        float radius = [spark radius]*scale;\n        if (radius\
    \ < 2){\n            radius = 2;\n        } else if (radius > 128){\n        \
    \    radius = 128;\n        }\n        [spark setRadius:radius];\n    }\n}\n```\n\
    \n在代码清单 8-5 中，我们检查触发此任务的`UITapGestureRecognizer` `doubleTap`是否配置为单次触摸。根据此检查的结果，我们将`scale`的值设置为\
    \ 2.0 或 0.5。通过这种方式，单指双击会增加`Spark`对象的缩放比例，而双指双击则会减小`Spark`对象的大小。一旦我们得到`scale`的正确值，我们就简单地遍历场景中所有的`Spark`对象，并根据`scale`调整它们的半径。\n\
    \n我们已经了解了触摸事件，以便理解触摸事件的生命周期。我们还快速了解了`UITapGestureRecognizer`类。下一节将更详细地讨论`UITapGestureRecognizer`。\n\
    \n## 理解手势识别器\n\n`iOS`允许用户通过丰富的手势集与应用程序交互。这些手势包括轻点、滑动、捏合等。每个手势都包含相当复杂的逻辑，用于将触摸事件解释为一个连贯的手势。如果将这项工作交给每个开发者去实现，用户体验将会非常糟糕，因为每个开发者不可避免地会对每个手势做出不同的假设。例如，长按手势有一个默认持续时间。我们希望所有应用程序都保持一致，因为我们不想让用户为每个应用程序重新学习什么是长按。本着这种精神，苹果提供了许多类，用于识别开发者最常用的手势。每个手势识别器都继承自抽象基类`UIGestureRecognizer`，如代码清单\
    \ 8-6 所示。\n\n**代码清单 8-6.** `UIGestureRecognizer`的具体实现\n\n```\nUITapGestureRecognizer\n\
    UIPinchGestureRecognizer\nUIRotateGestureRecognizer\nUISwipeGestureRecognizer\n\
    UIPanGestureRecognizer\nUILongPressGestureRecognizer\n```\n\n在代码清单 8-6 中，我们看到了内置在`iOS`\
    \ 6 中的每个`UIGestureRecognizer`子类。轻点可能是`iOS`中最常见的手势，无需描述。捏合手势是指两个手指相互靠近或远离。旋转手势是指两个手指在屏幕上移动，就像拧开番茄酱瓶盖一样。滑动手势是指一个或多个手指在屏幕上快速划过，就像翻杂志页。平移手势类似于滑动，但速度更慢，动作更刻意。长按手势很像轻点，但手指在屏幕上停留的时间更长。\n"
- fmt: "Each of these classes provides an easy way for a developer to request that\
    \ a task be called should any of the gestures happen on a particular `UIView`.\
    \ In addition to calling a task, each gesture happens over time and will be in\
    \ one of several states as the callback task is called. These states are shown\
    \ in [Listing 8-7](#9781430244226_Ch08.xhtml#list7).\n\n**[Listing 8-7](#9781430244226_Ch08.xhtml#_list7).**\
    \ `Values for the enum UIGestureRecognizerState`\n\n```\nUIGestureRecognizerStatePossible\n\
    UIGestureRecognizerStateBegan\nUIGestureRecognizerStateChanged\nUIGestureRecognizerStateEnded\n\
    UIGestureRecognizerStateCancelled\nUIGestureRecognizerStateFailed\nUIGestureRecognizerStateRecognized\
    \ = UIGestureRecognizerStateEnded\n```\n\nIn [Listing 8-7](#9781430244226_Ch08.xhtml#list7),\
    \ we see the seven possible states for a gesture recognizer to be in, and these\
    \ are analogous to four tasks that are called touch events (see [Listing 8-1](#9781430244226_Ch08.xhtml#list1)).\
    \ The default state is `UIGestureRecognizerStatePossible` and is the state that\
    \ all `UIGestureRecignizer` instances will be in if no touch events are happening.\
    \ `UIGestureRecognizerStateBegan` is the state when a gesture has started, but\
    \ not yet changed or completed. For a pinch gesture, this would be when both fingers\
    \ have landed on the screen. `UIGestureRecognizerStateChanged` is the state of\
    \ gesture in progress. A gesture will be over when one of the three following\
    \ states has occurred: `UIGestureRecognizerStateEnded`, `UIGestureRecognizerStateCancelled`,\
    \ or `UIGestureRecognizerStateFailed`. The state `UIGestureRecognizerStateEnded`\
    \ corresponds the successful completion of a gesture. `UIGestureRecognizerStateCancelled`\
    \ is the state of a gesture that cannot be completed. `UIGestureRecognizerStateFailed`\
    \ is the state of a gesture that has received touch events in contradiction to\
    \ the gesture. The last state, `UIGestureRecognizerStateRecognized`, has the same\
    \ value as `UIGestureRecognizerStateEnded` and simply provides a semantic difference\
    \ that might be useful in code.\n\nWhile the states in [Listing 8-7](#9781430244226_Ch08.xhtml#list7)\
    \ provided a comprehensive description of the states a gesture recognizer can\
    \ go through, not all gesture recognizers use all of these states. For example,\
    \ `UITapGestureRecognizer` is known as a “discrete” gesture recognizer and does\
    \ not report changes. Further, discrete gestures cannot fail or be cancelled.\
    \ They simply call the selector task once, with the state of `UIGestureRecognizerStateRecognized`\
    \ (e.g., `UIGestureRecognizerStateEnded`).\n\nIt is possible to implement a new\
    \ `UIGestureRecognizer`, but we will not be covering that. We will, however, take\
    \ each gesture recognizer and explore how it works with an example.\n\n## Tap\
    \ Gestures\n\nTap gestures are used throughout `iOS`. From launching an application\
    \ to dropping a pin in the Maps application, tap gestures are the backbone of\
    \ the `iOS` interface. This makes sense because they are very similar to mouse\
    \ clicks on desktop operating systems. There are similarities between the tap\
    \ gesture and the mouse click; for example, launching an application from the\
    \ system dock in OS X is done with a single click, while launching an `iOS` application\
    \ is done with a single tap. The analogy continues if we consider the “secondary\
    \ click” (also known as a control click or right click) on OS X; this is similar\
    \ to the two-finger tap in `iOS`. In fact, if you are using a Mac laptop, the\
    \ touch pad can be configured to treat a two-finger tap as a “secondary click.”\n\
    \nFor this example, we are going to configure a bunch of `UITapGestureRecognizers`\
    \ to respond to different combinations of tap counts and the number of fingers\
    \ involved (touches). [Figure 8-2](#9781430244226_Ch08.xhtml#Fig2) shows this\
    \ example in action.\n\n![9781430244226_Fig08-02.jpg](images/9781430244226_Fig08-02.jpg)\n\
    \n**[Figure 8-2.](#9781430244226_Ch08.xhtml#_Fig2)**  Power-ups activated by tap\
    \ gestures\n\nIn [Figure 8-2](#9781430244226_Ch08.xhtml#Fig2), we see 12 power-ups\
    \ organized into three columns and four rows. The power-ups start disabled, like\
    \ the one in the lower right. When the user taps the screen, a power-up enables,\
    \ becoming brighter and spinning. The power-up that is enabled is based on the\
    \ number of fingers used in the gesture and whether one, two, or three fingers\
    \ are used. For example, a two-finger triple tap enabled the right-most power-up\
    \ on the second row. Similarly, a three-finger single tap enabled the left-most\
    \ power-up on the third row. So, in short, the columns show the number of taps\
    \ and the rows the number fingers involved. If you want to waste an hour of your\
    \ life, try to get all of the power-ups spinning. I think I got it to happen,\
    \ but I could not get a screenshot in time to prove it.\n\nThis demo is implemented\
    \ in the class `TapGestureController`. [Listing 8-8](#9781430244226_Ch08.xhtml#list8)\
    \ shows the file `TapGestureController.h`.\n\n**[Listing 8-8](#9781430244226_Ch08.xhtml#_list8).**\
    \ `TapGestureController.h`\n\n```\n@interface TapGesutureController : GameController\
    \ < TemporaryBehaviorDelegate > {\n    NSMutableArray* powerups;\n}\n\n- (void)tapGesture:(UITapGestureRecognizer\
    \ *)sender;\n\n@end\n```\n\nIn [Listing 8-8](#9781430244226_Ch08.xhtml#list8),\
    \ we see the header for the class `TapGestureController` and that it extends `GameController`\
    \ and conforms to the protocol `TemporaryBehaviorDelegate`. We also see that there\
    \ is an `NSMutableArray` called `powerups` that is used to store the 12 power-ups\
    \ in this example. In other examples, we have relied on `GameController` to keep\
    \ track of different types of actors by specifying classes that should be sorted.\
    \ In this example, we are using a separate `NSMutableArray` because we want to\
    \ use the order of the `Powerup` objects in `powerups` to keep track of the row\
    \ and column. Lastly, we see the declaration of the task `tapGesture`: that is\
    \ called when a `UITapGestureRecognizer` recognizes a gesture. The implementation\
    \ of the setup code for `TapGestureController` is shown in [Listing 8-9](#9781430244226_Ch08.xhtml#list9).\n\
    \n**[Listing 8-9](#9781430244226_Ch08.xhtml#_list9).** `TapGestureController.m\
    \ (doSetup)`\n\n```\n-(BOOL)doSetup{\n    if ([super doSetup]){\n        [self\
    \ setGameAreaSize:CGSizeMake(320, 480)];\n        powerups = [NSMutableArray new];\n\
    \        for (int tap = 0;tap<=2;tap++){\n            for (int touch = 0;touch<=3;touch++){\n\
    \                float x = 320.0/6.0 + tap*320.0/3;\n                float y =\
    \ 480.0/8.0 + touch*480/4;\n                CGPoint center = CGPointMake(x, y);\n\
    \                Powerup* powerup = [Powerup powerup:self At:center];\n      \
    \          [self addActor: powerup];\n                [powerups addObject:powerup];\n\
    \            }\n        }\n        for (int touch = 1;touch<=4;touch++){\n   \
    \         UITapGestureRecognizer* tripleTap = [[UITapGestureRecognizer alloc]\
    \ initWithTarget:self action:@selector(tapGesture:)];\n            [tripleTap\
    \ setNumberOfTapsRequired:3];\n            [tripleTap setNumberOfTouchesRequired:touch];\n\
    \            UITapGestureRecognizer* doubleTap = [[UITapGestureRecognizer alloc]\
    \ initWithTarget:self action:@selector(tapGesture:)];\n            [doubleTap\
    \ setNumberOfTapsRequired:2];\n            [doubleTap setNumberOfTouchesRequired:touch];\n\
    \            [doubleTap requireGestureRecognizerToFail:tripleTap];\n         \
    \   UITapGestureRecognizer* singleTap = [[UITapGestureRecognizer alloc] initWithTarget:self\
    \ action:@selector(tapGesture:)];\n            [singleTap setNumberOfTapsRequired:1];\n\
    \            [singleTap setNumberOfTouchesRequired:touch];\n            [singleTap\
    \ requireGestureRecognizerToFail:doubleTap];\n            [actorsView addGestureRecognizer:tripleTap];\n\
    \            [actorsView addGestureRecognizer:doubleTap];\n            [actorsView\
    \ addGestureRecognizer:singleTap];\n        }\n        return YES;\n    }\n  \
    \  return NO;\n}\n```\n\nIn [Listing 8-9](#9781430244226_Ch08.xhtml#list9), we\
    \ see the task `doSetup` for the class `TapGestureController`."
