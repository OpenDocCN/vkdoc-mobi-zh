    \t[particle addBehavior:expire];\n\n\treturn particle;\n}\n-(void)stepsUpdated:(ExpireAfterTime*)expire\
    \ In:(GameController*)controller{\n  self.alpha = [expire stepsRemaining]/totalStepsAlive;\n\
