    of `Example01Controller` class shown in [Listing 5-3](#9781430244226_Ch05.xhtml#list3).    [**Listing
    5-3.**](#9781430244226_Ch05.xhtml#_list3)  Example01Controller.m (viewDidLoad)    ```
    - (void)viewDidLoad {     [super viewDidLoad];      [self setTitle:@"Simple Movement"];      UITapGestureRecognizer*
    tapRecognizer = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(viewTapped:)];
        [self.view addGestureRecognizer:tapRecognizer];     viper = [Viper01 new];      CGRect
    frame = [self.view frame];      viper.center = CGPointMake(frame.size.width/2.0,
    frame.size.height/2.0);     [self.view addSubview:viper];     [viper setMoveToPoint:viper.center];      displayLink
    = [CADisplayLink displayLinkWithTarget:self selector:@selector(updateScene)];
            [displayLink addToRunLoop:[NSRunLoop currentRunLoop] forMode:NSDefaultRunLoopMode];
    } ```    In [Listing 5-3](#9781430244226_Ch05.'
  trans: "\n此任务会遍历之前匹配的每组行列，并在原始位置让硬币重新旋转，但会显示与新值匹配的图像。最后，再次调用 `checkMatches`，以处理新随机值可能产生新匹配的情况。\n\
    \n## 总结\n\n在本章中，我们探讨了如何创建一款输入驱动的游戏。这包括理解游戏状态的管理、用户输入的基础知识，以及使用核心动画来创建动画。游戏状态通过创建一个类来管理，这个类以与显示无关的方式保存重新创建游戏所需的数据。为了让用户能够与游戏交互，必须为正确的视图添加基本手势识别器。控制器类在特定游戏上下文中解读每个用户手势，并生成反映游戏状态变化的动画。\n\
    \n## 第 5 章：快速构建逐帧游戏\n\n我们已经看过一个完全由用户输入驱动的简单游戏。在本章中，我们将研究那些无论用户是否提供输入都会持续动画化的游戏。动作游戏就是这类游戏的典型例子。我们不会在本章中制作一个完整的游戏，而是实现其中的一部分。图\
    \ 5-1 展示了我们将要创建的一个场景。\n\n![9781430244226_Fig05-01.jpg](img/9781430244226_Fig05-01.jpg)\n\
    \n图 5-1 一款逐帧太空游戏\n\n在图 5-1 中，我们看到一艘宇宙飞船正在躲避一些小行星。你将学习如何为场景中的不同元素制作动画、如何根据用户输入移动飞船，以及如何检测飞船与小行星之间的碰撞。\n\
    \n多年来，用来创建这类游戏的技术有很多种。这些不同的技术关注的是如何在屏幕上绘制内容。例如，`OpenGL` 提供了对显示器的底层访问。`UIKit` 提供的类（如\
    \ `UIView`）也非常适合这类游戏。无论使用哪种技术来更新屏幕，这类游戏通常都以相同的方式工作，即创建图 5-2 所示的循环。\n\n![9781430244226_Fig05-02.jpg](img/9781430244226_Fig05-02.jpg)\n\
    \n图 5-2 典型的逐帧应用循环\n\n在图 5-2 中，我们看到，在应用程序设置好之后，会创建一个循环，负责处理用户事件、更新游戏状态、更新屏幕上的场景，最后检查游戏是否结束。在\
    \ iOS 上创建以这种方式运行的应用程序时，我们不必显式地创建一个循环——应用程序本身已经在运行一个与图 5-1 中描述的非常相似的循环。让我们仔细看看如何设置一个\
    \ iOS 应用程序来实现逐帧动画。\n\n### 设置你的第一个逐帧动画\n\n本章附带的示例代码包含三个示例。每个示例都建立在前一个示例的基础上，以阐述不同的概念。当你运行示例代码时，你将看到一个类似于图\
    \ 5-3 的屏幕。\n\n![9781430244226_Fig05-03.jpg](img/9781430244226_Fig05-03.jpg)\n\n\
    图 5-3 示例菜单\n\n在图 5-3 中，我们看到了三个示例各自的按钮。单击每个按钮将播放动画并显示该示例。让我们从最上方的“简单移动”开始。\n\n\
    #### 简单移动\n\n“简单移动”将应用程序设置为持续更新宇宙飞船的位置。飞船将移动到用户点击的任何点，如图 5-4 所示。\n\n![9781430244226_Fig05-04.jpg](img/9781430244226_Fig05-04.jpg)\n\
    \n图 5-4 简单移动\n\n在图 5-4 中，我们看到一艘从俯视角度观察的宇宙飞船，背景是星空。当用户触摸屏幕上的任何点时，飞船将动画移动到该点。这种动画可以很容易地使用前一章介绍的动画类型来实现，但这并不能成为一个好的起点。就视图而言，忽略顶部导航栏，你在图\
    \ 5-4 中看到的是一个带有两个 `UIImageView` 子视图的 `UIView`。其中一个 `UIImageView` 是背景星空，另一个是宇宙飞船。这里的基本思路是，我们可以定期更新宇宙飞船的\
    \ `UIImageView` 的位置，从而创建动画。与其他示例一样，管理这些不同 `UIView` 状态的逻辑位于一个 `UIViewController`\
    \ 子类中。对于这个示例，该类名为 `Example01Controller`，其头文件如代码清单 5-1 所示。\n\n**代码清单 5-1** `Example01Controller.h`\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <QuartzCore/CADisplayLink.h>\n#import\
    \ \"Viper01.h\"\n\n@interface Example01Controller : UIViewController {\n    CADisplayLink*\
    \ displayLink;\n    Viper01* viper;\n}\n-(void)updateScene;\n-(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer;\n\
    @end\n```\n\n在代码清单 5-1 中，我们看到该类继承了 `UIViewController`，并且有两个字段。第一个字段名为 `displayLink`，类型为\
    \ `CADisplayLink`，从 QuartzCore 框架中导入。第二个字段名为 `viper`，类型为 `Viper01`，用于表示宇宙飞船。该类还定义了两个任务：第一个任务名为\
    \ `updateScene`，用于更新构成场景的 `UIViews`；第二个任务名为 `viewTapped`，用于管理用户输入。让我们看看代码清单 5-2\
    \ 中的 `Viper01` 头文件，看看我们是如何表示宇宙飞船的。\n\n**代码清单 5-2** `Viper01.h`\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Viper01 : UIImageView {\n\n}\n@property\
    \ float speed;\n@property CGPoint moveToPoint;\n-(void)updateLocation;\n@end\n\
    ```\n\n在代码清单 5-2 中，我们看到 `Viper01` 继承了 `UIImageView`，并有两个属性。`speed` 属性描述了“毒蛇”飞船的移动速度，`moveToPoint`\
    \ 属性则跟踪飞船在屏幕上的目标移动点。`updateLocation` 任务负责递增地更新飞船的位置。\n\n#### 实现这些类\n\n现在我们已经了解了本例中将使用的类的定义，接下来让我们看看它们的实现，从代码清单\
    \ 5-3 中展示的 `Example01Controller` 类的 `viewDidLoad` 任务开始。\n\n**代码清单 5-3** `Example01Controller.m`\
    \ (`viewDidLoad`)\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\n\
    \    [self setTitle:@\"Simple Movement\"];\n\n    UITapGestureRecognizer* tapRecognizer\
    \ = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(viewTapped:)];\n\
    \    [self.view addGestureRecognizer:tapRecognizer];\n\n    viper = [Viper01 new];\n\
    \    CGRect frame = [self.view frame];\n    viper.center = CGPointMake(frame.size.width/2.0,\
    \ frame.size.height/2.0);\n    [self.view addSubview:viper];\n    [viper setMoveToPoint:viper.center];\n\
    \n    displayLink = [CADisplayLink displayLinkWithTarget:self selector:@selector(updateScene)];\n\
    \    [displayLink addToRunLoop:[NSRunLoop currentRunLoop] forMode:NSDefaultRunLoopMode];\n\
    }\n```\n\n在代码清单 5-3 中，我们..."
- fmt: "在设置标题后，我们创建一个`UITapGestureRecognizer`并将其添加到与此`UIViewController`关联的根`UIView`上。将`UITapGestureRecognizer`添加到`UIView`后，当用户点击屏幕时，将调用任务`viewTapped:`，使我们有机会更新飞船移动的目标位置。下一步是创建一个新的`Viper01`实例，并将其放置在根`UIView`的中心。我们还将`viper`的`moveToPoint`属性设置为屏幕中心，这样飞船一开始就是静止的。最后要做的是指定一个定期调用的任务，以便我们可以更新飞船的位置并创建动画。我们通过创建一个`CADisplayLink`并指定任务`updateScene`来实现这一点。一旦调用`addToRunLoop`，`updateScene`将在每次屏幕刷新时被调用。在下一节中，我们将研究`CADisplayLink`和`NSRunLoop`类，了解它们的用途。接下来让我们看看`updateScene`，如[清单5-4](#9781430244226_Ch05.xhtml#list4)所示。\n\
    \n**[清单5-4.](#9781430244226_Ch05.xhtml#_list4)** Example01Controller.m (updateScene)\n\
    \n```\n-(void)updateScene{\n    [viper updateLocation];\n}\n```\n\n在[清单5-4](#9781430244226_Ch05.xhtml#list4)中，在任务`updateScene`里，我们只是在对象`viper`上调用了`updateLocation`。在未来的示例中，我们会在任务`updateScene`中做更多的事情，但现在让我们先看看如何实现移动这一艘飞船。\n\
    \n## 移动飞船\n\n每次调用`updateScene`时，我们都必须更新飞船的位置。这需要通过一点几何计算来确定动画每一帧中飞船的新位置。让我们看一下`updateLocation`，了解该任务如何移动飞船。请参见[清单5-5](#9781430244226_Ch05.xhtml#list5)。\n\
    \n**[清单5-5.](#9781430244226_Ch05.xhtml#_list5)** Viper01.m (updateLocation)\n\n\
    ```\n-(void)updateLocation{\n    CGPoint c = [self center];\n    float dx = (moveToPoint.x\
    \ - c.x);\n    float dy = (moveToPoint.y - c.y);\n    float theta = atan(dy/dx);\n\
    \n    float dxf = cos(theta) * self.speed;\n    float dyf = sin(theta) * self.speed;\n\
    \n    if (dx < 0){\n        dxf *= −1;\n        dyf *= −1;\n    }\n    c.x +=\
    \ dxf;\n    c.y += dyf;\n\n    if (abs(moveToPoint.x - c.x) < speed && abs(moveToPoint.y\
    \ - c.y) < speed){\n        c.x = moveToPoint.x;\n        c.y = moveToPoint.y;\n\
    \    }\n\n    [self setCenter:c];\n}\n```\n\n在[清单5-5](#9781430244226_Ch05.xhtml#list5)中，我们看到了类`Viper01`的任务`updateLocation`。此任务负责将飞船向目标点`moveToPoint`移动一帧的距离。由于类`Viper01`继承自`UIImageView`，我们可以通过简单地设置用于指定其相对于父视图位置的标准属性来移动它。我们可以使用`frame`属性，但还有一个名为`center`的属性，它是操作`UIView`框架的简写方式。\n\
    \n我们首先获取飞船当前`center`的副本并将其存储在变量`c`中，然后开始计算飞船的新`center`位置。接下来，我们计算当前位置与目标位置在X轴和Y轴上的差值，并将值存储在`dx`和`dy`中。查阅高中数学课本中的公式后，我们通过将`dy`除以`dx`并将结果传递给`atan`（反正切）函数来计算描述移动方向的角度，并将结果存储为`theta`。\n\
    \n我们希望将飞船沿`theta`方向移动`speed`个点。要计算这在X和Y坐标上意味着什么，我们需要做一些几何运算。为了计算我们将要移动的X点数，我们取`theta`的余弦值乘以`speed`，并将值存储在`dxf`中。类似地，为了计算在此`frame`中必须移动的Y点数，我们取`theta`的正弦值乘以`speed`，并将结果存储为`dyf`。为了最终确定这些值，我们检查`dx`是否为负数；如果是，则翻转`dxf`和`dyf`的符号。\n\
    \n一旦计算完`dxf`和`dyf`，我们将这些值加到变量`c`的`x`和`y`部分。我们要做的最后一件事是使用`c`中存储的新值设置`center`属性。但是，如果我们距离`moveToPoint`小于`speed`个点，我们将会超过它。我们不希望超过目标点，因为在下一帧中，我们会在相反的方向上再次超调，从而导致飞船在屏幕上抖动。为了解决这个问题，如果我们接近`moveToPoint`，我们只需将`X`和`Y`值设置为与`moveToPoint`的`X`和`Y`值相同。[图5-5](#9781430244226_Ch05.xhtml#Fig5)展示了一些相关的几何关系。\n\
    \n![9781430244226_Fig05-05.jpg](images/9781430244226_Fig05-05.jpg)\n\n**[图5-5.](#9781430244226_Ch05.xhtml#_Fig5)**\
    \ updateLocation任务中涉及的几何关系\n\n在[图5-5](#9781430244226_Ch05.xhtml#Fig5)中，我们看到X轴和Y轴，原点位于左上角，Y轴正方向向下。飞船的框架显示为一个灰色矩形，起始中心点位于其中间。虚线三角形说明了如何根据`dx`、`dy`和移动目标点的位置来计算`theta`。黑色的箭头长度为`speed`，显示单帧后中心应位于的位置。点线三角形显示了如何根据角度计算`dxf`和`dyf`。\n\
    \n## 响应用户点击\n\n我们现在知道了如何让飞船一帧一帧地移动。但我们还没有研究如何告诉飞船要移动到何处。回顾一下，我们在`Example01Controller`的根`UIView`上注册了一个`UITapGestureRecognizer`。这个`UITapGestureRecognizer`被配置为调用任务`viewTapped:`。这如[清单5-6](#9781430244226_Ch05.xhtml#list6)所示。\n\
    \n**[清单5-6.](#9781430244226_Ch05.xhtml#_list6)** Example01Controller.m (viewTapped:)\n\
    \n```\n-(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer{\n    UITapGestureRecognizer*\
    \ tapRecognizer = (UITapGestureRecognizer*)aGestureRecognizer;\n    CGPoint tapPoint\
    \ = [tapRecognizer locationInView:self.view];\n    [viper setMoveToPoint: tapPoint];\n\
    }\n```\n\n在[清单5-6](#9781430244226_Ch05.xhtml#list6)中，我们在`viewTapped:`中做的第一件事是将传入的`UIGestureRecognizer`强制转换为`UITapGestureRecognizer`。然后，通过调用`locationInView:`，找到点击在根视图中发生的位置。一旦得到点击发生的位置，我们只需在`viper`对象上设置`moveToPoint`属性。请注意，我们不必中断任何现有的动画——我们只是更新了`viper`对象的状态，当它的`updateLocation`任务再次被调用时，它将开始向这个新点移动。这是一个非常简单的例子，但我希望它能说明逐帧动画相对于我们在上一章中看到的预定义动画的一个优势。\n\
    \n我们研究了如何设置这个简单动画，以及如何通过重复调用[清单5-4](#9781430244226_Ch05.xhtml#list4)中的`updateScene`来驱动它。我们应该花点时间了解负责进行这些重复调用的类。\n\
    \n## 理解CADisplayLink和NSRunLoop\n\n通常，要创建流畅的动画，每秒至少需要更新25张图片，以避免眼睛看到单个帧。这意味着我们的游戏必须找到一种方法，以每秒25次的速度调用`updateScene`来实现流畅的动画。这可以通过创建一个`NSTimer`来实现，该`NSTimer`以我们选择的任何速率调用`updateScene`。"
  raw: 'xhtml#list3), after setting the title, we create a `UITapGestureRecognizer`
    and add it to the root `UIView` associated with this `UIViewController`. Adding
    the `UITapGestureRecognizer` to the `UIView` will cause the task `viewTapped:`
    to be called when the user taps the screen, giving us a chance to update the location
    to which the spaceship is moving.    The next step is to create a new instance
    of `Viper01` and place it in the center of the root `UIView`. We also set the
    `moveToPoint` property of viper to the center of the screen, so the viper starts
    out stationary.    The last thing we have to do is specify a task that we want
    called periodically so we can update the location of the spaceship and create
    our animation. We do this by creating a `CADisplayLink` and specifying the task
    `updateScene`. Once we call `addToRunLoop`, `updateScene` will be called every
    time the screen refreshes. In the next section we will look at the class `CADisplayLink`
    and `NSRunLoop` and see what they are all about. Let’s look next at the `updateScene`,
    as shown in [Listing 5-4](#9781430244226_Ch05.xhtml#list4).    [**Listing 5-4.**](#9781430244226_Ch05.xhtml#_list4)  Example01Controller.m
    (updateScene)    ``` -(void)updateScene{     [viper updateLocation]; } ```    In
    [Listing 5-4](#9781430244226_Ch05.xhtml#list4), in the task `updateScene`, we
    simply call `updateLocation` on the object `viper`. In future examples we will
    do more in the task `updateScene`, but for now let’s just look at how we implement
    moving the one ship.    Moving the Spaceship    Each time `updateScene` is called,
    we have to update the location of the spaceship. This is accomplished with a little
    geometry to figure out the new location of the ship for each frame of the animation.
    Let’s just look at `updateLocation` and understand how that task moves the spaceship.
    See [Listing 5-5](#9781430244226_Ch05.xhtml#list5).    [**Listing 5-5.**](#9781430244226_Ch05.xhtml#_list5)  Viper01.m
    (updateLocation)    ``` -(void)updateLocation{     CGPoint c = [self center];
        float dx = (moveToPoint.x - c.x);     float dy = (moveToPoint.y - c.y);     float
    theta = atan(dy/dx);      float dxf = cos(theta) * self.speed;     float dyf =
    sin(theta) * self.speed;      if (dx < 0){         dxf * = −1;         dyf * =
    −1;     }     c.x + = dxf;     c.y + = dyf;      if (abs(moveToPoint.x - c.x)
    < speed && abs(moveToPoint.y - c.y) < speed){         c.x = moveToPoint.x;         c.y
    = moveToPoint.y;     }      [self setCenter:c]; } ```    In [Listing 5-5](#9781430244226_Ch05.xhtml#list5),
    we see the `updateLocation` task of the class `Viper01`. This task is responsible
    for moving the spaceship one frame’s worth of movement toward the point `moveToPoint`.
    Because the class `Viper01` extends `UIImageView`, we can move it by simply setting
    the standard properties used to specify its location relative to its parent. We
    could use the `frame` property, but there is a property called `center` that is
    a shorthand way of manipulating a `UIView`’s frame.    We start calculating the
    spaceship’s new `center` location by first getting a copy of its current `center`
    and storing that in the variable `c`. Next, we calculate the difference between
    the current location and the location we are moving to for both the X and Y axis,
    storing the values in `dx` and `dy`. After looking up the formula in our high
    school geometry books, we calculate the angle that describes the direction we
    are moving, by dividing `dy` by `dx` and passing the result to the `atan` (arc
    tangent) function, storing the result as `theta`.    We want to move the spaceship
    speed a number of points in the direction of theta. To calculate what that means
    in terms X and Y points, we have to do a little geometry. To calculate the number
    of X points we will be moving, we take the cosine of `theta` and multiply it by
    `speed`, storing the value in `dxf`.


    Similarly, to calculate the number of Y points we have to move in this `frame`,
    we take the sine of `theta` and multiple by `speed`, storing the result in `dyf`.
    To finalize these values, we check to see if `dx` is negative; if it is, we switch
    the signs of `dxf` and `dyf`.    Once `dxf` and `dyf` are calculated, we add those
    values to the `x` and `y` parts of the variable `c`. The last thing we are going
    to do is set the `center` property with the new value stored in `c`. However,
    if we are less than `speed` points from the `moveToPoint`, we will overshoot it.
    We don’t want to overshoot the point because, come next frame, we will overshoot
    again in the opposite direction, causing the spaceship to jitter on the screen.
    To fix this, we simply set the `X` and `Y` values to be identical to `moveToPoint`’s
    `X` and `Y` values if we are close to it. [Figure 5-5](#9781430244226_Ch05.xhtml#Fig5)
    shows some of the geometry involved.    ![9781430244226_Fig05-05.jpg](images/9781430244226_Fig05-05.jpg)    [Figure
    5-5.](#9781430244226_Ch05.xhtml#_Fig5)  Geometric relations involved in the updateLocation
    task    In [Figure 5-5](#9781430244226_Ch05.xhtml#Fig5), we see the X and the
    Y axis with the origin on the upper left and the positive Y axis going down. The
    frame of the spaceship is shown as a gray rectangle with the starting center point
    in the middle of it. The dashed triangle illustrates how `theta` is calculated
    based on the values of `dx`, `dy`, and the location of the move to point. The
    black arrow is of length speed and shows where the center should be located after
    a single frame. The dotted triangle shows how `dxf` and `dyf` are calculated based
    on the angle.    Responding to a User Tap    We now know we can make the ship
    move, one frame at a time. But we have not looked at how we tell the ship where
    to move. Recall that we registered a `UITapGestureRecognizer` on the root `UIView`
    of `Example01Controlller`. This `UITapGestureRecognizer` is configured to call
    the task `viewTapped:`. This is shown in [Listing 5-6](#9781430244226_Ch05.xhtml#list6).    [**Listing
    5-6.**](#9781430244226_Ch05.xhtml#_list6)  Example01Controller.m (viewTapped:)    ```
    -(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer{     UITapGestureRecognizer*
    tapRecognizer = (UITapGestureRecognizer*)aGestureRecognizer;     CGPoint tapPoint
    = [tapRecognizer locationInView:self.view];     [viper setMoveToPoint: tapPoint];
    } ```    In [Listing 5-6](#9781430244226_Ch05.xhtml#list6), the first thing we
    do in `viewTapped:` is to cast the passed in `UIGestureRecognizer` to `UITapGestureRecognizer`.
    We then find the point where the tap occurred in the root view by calling `locationInView:`.
    Once we have the point where the tap occurred, we simply set the `moveToPoint`
    property on the `viper` object. Notice that we did not have to interrupt any existing
    animation—we simply update the state of the `viper` object and, when its `updateLocation`
    task is called again, it will start moving toward this new point. This is a very
    simple example, but I hope it illustrates an advantage that frame-by-frame animations
    have over the predefined animations we looked at in the last chapter.    We have
    looked at how this simple animation is set up and how it is driven by repeated
    calls to `updateScene` from [Listing 5-4](#9781430244226_Ch05.xhtml#list4). We
    should take a little time and understand the classes responsible for making these
    repeated calls.    Understanding CADisplayLink and NSRunLoop    In general, to
    create a smooth-looking animation, a picture has to be updated at least 25 times
    a second to avoid the eyes seeing each individual frame. That means our game must
    find a way to call `updateScene` at 25 times a second to achieve a smooth animation.
    This could be done by creating an `NSTimer` that calls `updateScene` at any rate
    we choose.'
  trans: "在设置标题后，我们创建一个`UITapGestureRecognizer`并将其添加到与此`UIViewController`关联的根`UIView`上。将`UITapGestureRecognizer`添加到`UIView`后，当用户点击屏幕时，将调用任务`viewTapped:`，使我们有机会更新飞船移动的目标位置。下一步是创建一个新的`Viper01`实例，并将其放置在根`UIView`的中心。我们还将`viper`的`moveToPoint`属性设置为屏幕中心，这样飞船一开始就是静止的。最后要做的是指定一个定期调用的任务，以便我们可以更新飞船的位置并创建动画。我们通过创建一个`CADisplayLink`并指定任务`updateScene`来实现这一点。一旦调用`addToRunLoop`，`updateScene`将在每次屏幕刷新时被调用。在下一节中，我们将研究`CADisplayLink`和`NSRunLoop`类，了解它们的用途。接下来让我们看看`updateScene`，如清单\
    \ 5-4 所示。\n\n**清单 5-4.** Example01Controller.m (updateScene)\n\n```\n-(void)updateScene{\n\
    \    [viper updateLocation];\n}\n```\n\n在清单 5-4 中，在任务`updateScene`里，我们只是在对象`viper`上调用了`updateLocation`。在未来的示例中，我们会在任务`updateScene`中做更多的事情，但现在让我们先看看如何实现移动这一艘飞船。\n\
    \n## 移动飞船\n\n每次调用`updateScene`时，我们都必须更新飞船的位置。这需要通过一点几何计算来确定动画每一帧中飞船的新位置。让我们看一下`updateLocation`，了解该任务如何移动飞船。请参见清单\
    \ 5-5。\n\n**清单 5-5.** Viper01.m (updateLocation)\n\n```\n-(void)updateLocation{\n\
    \    CGPoint c = [self center];\n    float dx = (moveToPoint.x - c.x);\n    float\
    \ dy = (moveToPoint.y - c.y);\n    float theta = atan(dy/dx);\n\n    float dxf\
    \ = cos(theta) * self.speed;\n    float dyf = sin(theta) * self.speed;\n\n   \
    \ if (dx < 0){\n        dxf *= −1;\n        dyf *= −1;\n    }\n    c.x += dxf;\n\
    \    c.y += dyf;\n\n    if (abs(moveToPoint.x - c.x) < speed && abs(moveToPoint.y\
    \ - c.y) < speed){\n        c.x = moveToPoint.x;\n        c.y = moveToPoint.y;\n\
    \    }\n\n    [self setCenter:c];\n}\n```\n\n在清单 5-5 中，我们看到了类`Viper01`的任务`updateLocation`。此任务负责将飞船向目标点`moveToPoint`移动一帧的距离。由于类`Viper01`继承自`UIImageView`，我们可以通过简单地设置用于指定其相对于父视图位置的标准属性来移动它。我们可以使用`frame`属性，但还有一个名为`center`的属性，它是操作`UIView`框架的简写方式。\n\
    \n我们首先获取飞船当前`center`的副本并将其存储在变量`c`中，然后开始计算飞船的新`center`位置。接下来，我们计算当前位置与目标位置在 X\
    \ 轴和 Y 轴上的差值，并将值存储在`dx`和`dy`中。查阅高中数学课本中的公式后，我们通过将`dy`除以`dx`并将结果传递给`atan`（反正切）函数来计算描述移动方向的角度，并将结果存储为`theta`。\n\
    \n我们希望将飞船沿`theta`方向移动`speed`个点。要计算这在 X 和 Y 坐标上意味着什么，我们需要做一些几何运算。为了计算我们将要移动的 X\
    \ 点数，我们取`theta`的余弦值乘以`speed`，并将值存储在`dxf`中。类似地，为了计算在此`frame`中必须移动的 Y 点数，我们取`theta`的正弦值乘以`speed`，并将结果存储为`dyf`。为了最终确定这些值，我们检查`dx`是否为负数；如果是，则翻转`dxf`和`dyf`的符号。\n\
    \n一旦计算完`dxf`和`dyf`，我们将这些值加到变量`c`的`x`和`y`部分。我们要做的最后一件事是使用`c`中存储的新值设置`center`属性。但是，如果我们距离`moveToPoint`小于`speed`个点，我们将会超过它。我们不希望超过目标点，因为在下一帧中，我们会在相反的方向上再次超调，从而导致飞船在屏幕上抖动。为了解决这个问题，如果我们接近`moveToPoint`，我们只需将`X`和`Y`值设置为与`moveToPoint`的`X`和`Y`值相同。图\
    \ 5-5 展示了一些相关的几何关系。\n\n![9781430244226_Fig05-05.jpg](img/9781430244226_Fig05-05.jpg)\n\
    \n**图 5-5.** updateLocation 任务中涉及的几何关系\n\n在图 5-5 中，我们看到 X 轴和 Y 轴，原点位于左上角，Y 轴正方向向下。飞船的框架显示为一个灰色矩形，起始中心点位于其中间。虚线三角形说明了如何根据`dx`、`dy`和移动目标点的位置来计算`theta`。黑色的箭头长度为`speed`，显示单帧后中心应位于的位置。点线三角形显示了如何根据角度计算`dxf`和`dyf`。\n\
    \n## 响应用户点击\n\n我们现在知道了如何让飞船一帧一帧地移动。但我们还没有研究如何告诉飞船要移动到何处。回顾一下，我们在`Example01Controller`的根`UIView`上注册了一个`UITapGestureRecognizer`。这个`UITapGestureRecognizer`被配置为调用任务`viewTapped:`。这如清单\
    \ 5-6 所示。\n\n**清单 5-6.** Example01Controller.m (viewTapped:)\n\n```\n-(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer{\n\
    \    UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)aGestureRecognizer;\n\
    \    CGPoint tapPoint = [tapRecognizer locationInView:self.view];\n    [viper\
    \ setMoveToPoint: tapPoint];\n}\n```\n\n在清单 5-6 中，我们在`viewTapped:`中做的第一件事是将传入的`UIGestureRecognizer`强制转换为`UITapGestureRecognizer`。然后，通过调用`locationInView:`，找到点击在根视图中发生的位置。一旦得到点击发生的位置，我们只需在`viper`对象上设置`moveToPoint`属性。请注意，我们不必中断任何现有的动画——我们只是更新了`viper`对象的状态，当它的`updateLocation`任务再次被调用时，它将开始向这个新点移动。这是一个非常简单的例子，但我希望它能说明逐帧动画相对于我们在上一章中看到的预定义动画的一个优势。\n\
    \n我们研究了如何设置这个简单动画，以及如何通过重复调用清单 5-4 中的`updateScene`来驱动它。我们应该花点时间了解负责进行这些重复调用的类。\n\
    \n## 理解 CADisplayLink 和 NSRunLoop\n\n通常，要创建流畅的动画，每秒至少需要更新 25 张图片，以避免眼睛看到单个帧。这意味着我们的游戏必须找到一种方法，以每秒\
    \ 25 次的速度调用`updateScene`来实现流畅的动画。这可以通过创建一个`NSTimer`来实现，该`NSTimer`以我们选择的任何速率调用`updateScene`。"
- fmt: '# 排版后的内容


    If we do that, however, our code that updates the scene will not necessarily be
    in sync with the hardware’s native refresh rate of the screen. The framework Core
    Animation provides a class specifically designed for creating the type of animation
    we are trying to create: `CADisplayLink`. In [Listing 5-3](#9781430244226_Ch05.xhtml#list3),
    we created a `CADisplayLink`, specifying that it should call `updateScene` whenever
    the screen is ready to redraw. We then added the `CADisplayLink` to the same run
    loop that called `viewDidLoad` by calling `currentRunLoop` on the class `NSRunLoop`.
    The class `NSRunLoop` manages a thread to produce the kind of loop shown in [Figure
    5-1](#9781430244226_Ch05.xhtml#Fig1). An `NSRunLoop` is responsible for processing
    input from the user and from the `CADisplayLink` and scheduling when the corresponding
    task in `Example01Controller` should be called. We don’t have to understand too
    much about how `NSRunLoop` works; we just have to understand that the tasks `viewTapped:`
    and `updateScene` will be called by the same thread so we don’t have to worry
    about multi-threaded complexity.


    As mentioned, `CADisplayLink`—working with our main threads `NSRunLoop`—causes
    the task `updateScene` to be called once for each time the screen redraws. The
    property `duration` of `CADisplayLink` reports, in seconds, the time between each
    screen redraw. A little investigation shows that this property reports a slightly
    different value each time `updateScene` is called, but hovers around the value
    0.0166648757. This value is just shy of 60 frames per second, so we are well above
    the required 25 frames per second.


    In more complex applications, it is entirely likely that the state of the game
    cannot be updated in 1.5 milliseconds; there may simply be too much bookkeeping.
    If this is the case, you can set the `frameInterval` property of `CADisplayLink`
    to value greater than one. This will cause `CADisplayLink` to skip screen redraws.
    [Figure 5-6](#9781430244226_Ch05.xhtml#Fig6) shows four different scenarios that
    can occur when using the `CADisplayLink`.


    ![9781430244226_Fig05-06.jpg](images/9781430244226_Fig05-06.jpg)


    [Figure 5-6.](#9781430244226_Ch05.xhtml#_Fig6)  Screen refresh scenarios


    In [Figure 5-6](#9781430244226_Ch05.xhtml#Fig6), we see four scenarios listed
    on the left. To the right of each scenario are a number of dots representing screen
    refreshes for that scenario. Looking at the top scenario, where there is no work
    to be done between screen refreshes, each dot is equally spaced, meaning that
    the screen refreshes happen at even intervals as time progresses to the right.
    The second scenario shows the case when there is a little bit of work to do between
    screen refreshes, indicated by the lines coming off to the right of each dot.
    The length of each line is shorter than the distance between each dot, indicating
    that the work is done in the time between screen refreshes. The third scenario
    shows the case where there is too much work to get done between screen refreshes,
    but the programmer did not account for this. Each time the work exceeds the normal
    amount of time between screen refreshes, the drawing of the next screen is delayed.
    Because the amount of time it takes to update a game between frames varies, the
    rate at which the screen is refreshed becomes irregular. When the screen refresh
    is irregular, the animation looks choppy and is perceived poorly by the user.
    To avoid this, we configure `CADisplayLink` to only trigger an update every other
    frame by setting `frameInterval` to 2. This doubles the amount of time we have
    to get our work done, allowing for a smooth animation.


    This strategy can seem counterintuitive to some developers because, in the fourth
    scenario, there can be long stretches of time when no work is being done. In fact,
    for a given stretch of time, scenario 3 gets more frames rendered than scenario
    4.


    The fact is that the choppy updates are almost always more annoying to a user
    than a game that does not move as fast. Also keep in mind that the native refresh
    rate for iOS devices is 60 frames a second, so if every other frame is skipped,
    the animation rate is still 30 frames per second. That’s plenty to create a convincing
    animation.


    We have looked at a simple frame-by-frame animation, and you should now understand
    the basic principles. The next two examples will build on this pattern to create
    animations with more than one thing on the screen, as well as do a little refactoring
    to start making a framework suitable for complex games.


    ## Abstracting the UI


    In the previous example, we looked at the basics of creating a frame-by-frame
    animation. We looked how we can use the class `CADisplayLink` in conjunction with
    the existing event loop to call a task where we can implement our animation. We
    animated a single image around the screen based on user input. That was a very
    simple example. I left out a number of practical considerations so we could focus
    on the basic idea of creating animations in this way. In this section, we will
    do a little refactoring in order to better support more complicated games. [Figure
    5-7](#9781430244226_Ch05.xhtml#Fig7) shows the example we will be building.


    ![9781430244226_Fig05-07.jpg](images/9781430244226_Fig05-07.jpg)


    [Figure 5-7.](#9781430244226_Ch05.xhtml#_Fig7)  Abstracted UI


    In [Figure 5-7](#9781430244226_Ch05.xhtml#Fig7), we see some differences from
    the first example. The first thing to note is that the play area of the game does
    not take up the full screen. The slider at the bottom of the screen changes the
    size of the play area without changing how the game plays. There is also a second
    item on the screen, an asteroid. Asteroids are created every 10 seconds and start
    at the top of the screen, moving straight down. If an asteroid collides with the
    spaceship, the spaceship resets to the center of the screen and the asteroid is
    removed. The object of this simple game is to avoid the incoming asteroids.


    One of the goals of this section is to explain how the game logic can be separated
    from how the game is drawn on the screen. In the first example, we simply extended
    `UIImageView` and added our logic about the spaceship. This worked well enough,
    but there are lots of good reasons for separating the logic of the game from the
    how it is displayed. For starters, if you want to run this game on an iPad instead
    of an iPhone, you probably want to make the play area bigger. Also, to support
    things like zooming into the game or showing a mini map, it makes sense to have
    the location of each item in the game stored in a display-agnostic way. Down the
    road, you may decide you want to port your game to another platform. Having a
    clean separation of game logic from display logic will save you a lot of work
    in such a case.


    To support this abstraction between the game logic and the display logic we introduce
    a new class called `Actor02`. Normally this class would simply be called `Actor`.
    The 02 in the name simply indicates it is part of the second example in this chapter.
    The following section explains what an actor is and how it helps implement an
    abstraction between the game logic and the display.


    ### Understanding Actors


    Actors are the moving items in a game. In our case, the spaceship and the asteroid
    are actors. This is distinguished from other things that might be in a game, like
    a label for displaying the score or other components.


    Actors are sometimes called sprites, but I prefer the term actor because the word
    *sprite* can also describe the image used to display the game item. In causal
    conversation, it makes little difference what term you use—but let’s call them
    actors.


    ### Example2Controller Overview


    In our example, we will define the class `Actor02` and show how we can subclass
    `Actor02` to create our game items, the spaceship and the asteroids.'
