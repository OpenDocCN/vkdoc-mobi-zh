    YES;     } } -(void)setState:(int)aState{     if (aState != state){         state
    = aState;         needsViewUpdated = YES;     } } -(void)addBehavior:(NSObject<Behavior>*)behavior{
        if (behaviors == nil){         behaviors = [NSMutableArray new];     }     [behaviors
    addObject:behavior]; }  +(CGPoint)randomPointAround:(CGPoint)aCenter At:(float)aRadius{
        float direction = arc4random()%1000/1000.0 * M_PI*2;     return CGPointMake(aCenter.x
    + cosf(direction)*aRadius, aCenter.y + sinf(direction)*aRadius); } @end ```    At
    the top of this file, we see that we simply use @synthesize for each of the class’s
    properties to create the getter and setter tasks, with the exception of the property
    state and variant. We define our own implementation for the setter task for the
    properties state and variant, so we can set `needsViewUpdated` to YES when these
    values change. This is done to ensure that the actor’s `Representation` updates
    the `UIView` representing this actor when the actor’s state or variant property
    changes.    The task `initAt:WithRadius:AndRepresentation`: simply initializes
