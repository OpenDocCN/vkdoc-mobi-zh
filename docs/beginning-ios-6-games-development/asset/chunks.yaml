    for the enum UIGestureRecognizerState`    ``` UIGestureRecognizerStatePossible
    UIGestureRecognizerStateBegan UIGestureRecognizerStateChanged UIGestureRecognizerStateEnded
    UIGestureRecognizerStateCancelled UIGestureRecognizerStateFailed UIGestureRecognizerStateRecognized
    = UIGestureRecognizerStateEnded ```    In [Listing 8-7](#9781430244226_Ch08.xhtml#list7),
    we see the seven possible states for a gesture recognizer to be in, and these
    are analogous to four tasks that are called touch events (see [Listing 8-1](#9781430244226_Ch08.xhtml#list1)).
    The default state is `UIGestureRecognizerStatePossible` and is the state that
    all `UIGestureRecignizer` instances will be in if no touch events are happening.
    `UIGestureRecognizerStateBegan` is the state when a gesture has started, but not
    yet changed or completed. For a pinch gesture, this would be when both fingers
    have landed on the screen. `UIGestureRecognizerStateChanged` is the state of gesture
    in progress. A gesture will be over when one of the three following states has
    occurred: `UIGestureRecognizerStateEnded`, `UIGestureRecognizerStateCancelled`,
    or `UIGestureRecognizerStateFailed`. The state `UIGestureRecognizerStateEnded`
    corresponds the successful completion of a gesture. `UIGestureRecognizerStateCancelled`
    is the state of a gesture that cannot be completed. `UIGestureRecognizerStateFailed`
    is the state of a gesture that has received touch events in contradiction to the
    gesture. The last state, `UIGestureRecognizerStateRecognized`, has the same value
    as `UIGestureRecognizerStateEnded` and simply provides a semantic difference that
    might be useful in code.    While the states in [Listing 8-7](#9781430244226_Ch08.xhtml#list7)
    provided a comprehensive description of the states a gesture recognizer can go
    through, not all gesture recognizers use all of these states. For example, `UITapGestureRecognizer`
    is known as a “discrete” gesture recognizer and does not report changes. Further,
    discrete gestures cannot fail or be cancelled. They simply call the selector task
    once, with the state of `UIGestureRecognizerStateRecognized` (e.g., `UIGestureRecognizerStateEnded`).    It
    is possible to implement a new `UIGestureRecognizer`, but we will not be covering
    that. We will, however, take each gesture recognizer and explore how it works
    with an example.    Tap Gestures    Tap gestures are used throughout `iOS`. From
    launching an application to dropping a pin in the Maps application, tap gestures
    are the backbone of the `iOS` interface. This makes sense because they are very
    similar to mouse clicks on desktop operating systems. There are similarities between
    the tap gesture and the mouse click; for example, launching an application from
    the system dock in OS X is done with a single click, while launching an `iOS`
    application is done with a single tap. The analogy continues if we consider the
    “secondary click” (also known as a control click or right click) on OS X; this
    is similar to the two-finger tap in `iOS`. In fact, if you are using a Mac laptop,
    the touch pad can be configured to treat a two-finger tap as a “secondary click.”    For
    this example, we are going to configure a bunch of `UITapGestureRecognizers` to
    respond to different combinations of tap counts and the number of fingers involved
    (touches). [Figure 8-2](#9781430244226_Ch08.xhtml#Fig2) shows this example in
    action.    ![9781430244226_Fig08-02.jpg](images/9781430244226_Fig08-02.jpg)    [Figure
    8-2.](#9781430244226_Ch08.xhtml#_Fig2)  Power-ups activated by tap gestures    In
    [Figure 8-2](#9781430244226_Ch08.


    xhtml#Fig2), we see 12 power-ups organized into three columns and four rows. The
    power-ups start disabled, like the one in the lower right. When the user taps
    the screen, a power-up enables, becoming brighter and spinning. The power-up that
    is enabled is based on the number of fingers used in the gesture and whether one,
    two, or three fingers are used. For example, a two-finger triple tap enabled the
    right-most power-up on the second row. Similarly, a three-finger single tap enabled
    the left-most power-up on the third row. So, in short, the columns show the number
    of taps and the rows the number fingers involved. If you want to waste an hour
    of your life, try to get all of the power-ups spinning. I think I got it to happen,
    but I could not get a screenshot in time to prove it.    This demo is implemented
    in the class `TapGestureController`. [Listing 8-8](#9781430244226_Ch08.xhtml#list8)
    shows the file `TapGestureController.h`.    **[Listing 8-8](#9781430244226_Ch08.xhtml#_list8).** `TapGestureController.h`    ```
    @interface TapGesutureController : GameController < TemporaryBehaviorDelegate
    > {     NSMutableArray* powerups; }  - (void)tapGesture:(UITapGestureRecognizer
    *)sender;  @end ```    In [Listing 8-8](#9781430244226_Ch08.xhtml#list8), we see
    the header for the class `TapGestureController` and that it extends `GameController`
    and conforms to the protocol `TemporaryBehaviorDelegate`. We also see that there
    is an `NSMutableArray` called `powerups` that is used to store the 12 power-ups
    in this example. In other examples, we have relied on `GameController` to keep
    track of different types of actors by specifying classes that should be sorted.
    In this example, we are using a separate `NSMutableArray` because we want to use
    the order of the `Powerup` objects in `powerups` to keep track of the row and
    column. Lastly, we see the declaration of the task `tapGesture`: that is called
    when a `UITapGestureRecognizer` recognizes a gesture. The implementation of the
    setup code for `TapGestureController` is shown in [Listing 8-9](#9781430244226_Ch08.xhtml#list9).    **[Listing
    8-9](#9781430244226_Ch08.xhtml#_list9).** `TapGestureController.m (doSetup)`    ```
    -(BOOL)doSetup{     if ([super doSetup]){         [self setGameAreaSize:CGSizeMake(320,
    480)];         powerups = [NSMutableArray new];         for (int tap = 0;tap<=2;tap++){
                for (int touch = 0;touch<=3;touch++){                 float x = 320.0/6.0
    + tap*320.0/3;                 float y = 480.0/8.0 + touch*480/4;                 CGPoint
    center = CGPointMake(x, y);                 Powerup* powerup = [Powerup powerup:self
    At:center];                 [self addActor: powerup];                 [powerups
    addObject:powerup];             }         }         for (int touch = 1;touch<=4;touch++){
                UITapGestureRecognizer* tripleTap = [[UITapGestureRecognizer alloc]
    initWithTarget:self action:@selector(tapGesture:)];             [tripleTap setNumberOfTapsRequired:3];
                [tripleTap setNumberOfTouchesRequired:touch];             UITapGestureRecognizer*
    doubleTap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(tapGesture:)];
                [doubleTap setNumberOfTapsRequired:2];             [doubleTap setNumberOfTouchesRequired:touch];
                [doubleTap requireGestureRecognizerToFail:tripleTap];             UITapGestureRecognizer*
    singleTap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(tapGesture:)];
                [singleTap setNumberOfTapsRequired:1];             [singleTap setNumberOfTouchesRequired:touch];
                [singleTap requireGestureRecognizerToFail:doubleTap];             [actorsView
    addGestureRecognizer:tripleTap];             [actorsView addGestureRecognizer:doubleTap];
                [actorsView addGestureRecognizer:singleTap];         }         return
    YES;     }     return NO; } ```    In [Listing 8-9](#9781430244226_Ch08.xhtml#list9),
    we see the task `doSetup` for the class `TapGestureController`.'
  trans: "\n每个类都为开发者提供了一种简便方式，当特定`UIView`上发生任何手势时，可以请求调用某个任务。除了调用任务外，每个手势都会随时间推移而发生，并且在回调任务被调用时将处于若干状态之一。这些状态如代码清单\
    \ 8-7 所示。\n\n**代码清单 8-7.** `UIGestureRecognizerState` 枚举值\n\n```\nUIGestureRecognizerStatePossible\n\
    UIGestureRecognizerStateBegan\nUIGestureRecognizerStateChanged\nUIGestureRecognizerStateEnded\n\
    UIGestureRecognizerStateCancelled\nUIGestureRecognizerStateFailed\nUIGestureRecognizerStateRecognized\
    \ = UIGestureRecognizerStateEnded\n```\n\n在代码清单 8-7 中，我们看到手势识别器可能处于的七种状态，这类似于调用触摸事件时的四个任务（见代码清单\
    \ 8-1）。默认状态是 `UIGestureRecognizerStatePossible`，如果没有触摸事件发生，所有`UIGestureRecignizer`实例都将处于此状态。`UIGestureRecognizerStateBegan`\
    \ 是手势开始但尚未改变或完成时的状态。对于捏合手势，这表示两根手指都已落在屏幕上。`UIGestureRecognizerStateChanged` 是手势进行中的状态。当出现以下三种状态之一时，手势将结束：`UIGestureRecognizerStateEnded`、`UIGestureRecognizerStateCancelled`\
    \ 或 `UIGestureRecognizerStateFailed`。状态 `UIGestureRecognizerStateEnded` 对应手势成功完成。`UIGestureRecognizerStateCancelled`\
    \ 是手势无法完成时的状态。`UIGestureRecognizerStateFailed` 是手势接收到与手势本身矛盾的触摸事件时的状态。最后一个状态 `UIGestureRecognizerStateRecognized`\
    \ 与 `UIGestureRecognizerStateEnded` 具有相同的值，仅提供语义上的差异，这在代码中可能有用。\n\n虽然代码清单 8-7\
    \ 中的状态全面描述了手势识别器可能经历的状态，但并非所有手势识别器都会使用所有这些状态。例如，`UITapGestureRecognizer` 被称为“离散”手势识别器，它不会报告变化。此外，离散手势无法失败或被取消。它们只调用选择器任务一次，状态为\
    \ `UIGestureRecognizerStateRecognized`（例如，`UIGestureRecognizerStateEnded`）。\n\n\
    可以实现一个新的 `UIGestureRecognizer`，但我们不会涉及这部分内容。不过，我们将逐一介绍每个手势识别器，并通过示例探讨其工作方式。\n\n\
    ## 轻点手势\n\n轻点手势在 `iOS` 中广泛使用。从启动应用到在“地图”应用中放置大头针，轻点手势是 `iOS` 界面的核心。这很合理，因为它们与桌面操作系统中的鼠标点击非常相似。轻点手势和鼠标点击之间存在相似之处；例如，在\
    \ OS X 中从系统 Dock 启动应用程序需要单击一次，而在 `iOS` 中启动应用程序则需要轻点一次。如果我们考虑 OS X 中的“辅助点击”（也称为\
    \ Control 点击或右键点击），这种类比仍然成立；这类似于 `iOS` 中的双指轻点。事实上，如果你使用的是 Mac 笔记本电脑，触控板可以配置为将双指轻点视为“辅助点击”。\n\
    \n在这个示例中，我们将配置一组 `UITapGestureRecognizer`，以响应轻点次数和涉及的手指数量（触摸点）的不同组合。图 8-2 展示了这个示例的运行效果。\n\
    \n![9781430244226_Fig08-02.jpg](img/9781430244226_Fig08-02.jpg)\n\n**图 8-2.**\
    \ 由轻点手势激活的技能增强\n\n在图 8-2 中，我们看到 12 个技能增强，排列成三列四行。这些技能增强最初是禁用的，就像右下角那个一样。当用户轻点屏幕时，一个技能增强会启用，变得更亮并开始旋转。启用的技能增强取决于手势中使用的手指数量以及使用了一根、两根还是三根手指。例如，双指三次轻点启用了第二行最右边的技能增强。同样，三指单次轻点启用了第三行最左边的技能增强。简而言之，列表示轻点次数，行表示涉及的手指数量。如果你想浪费一个小时的时间，可以尝试让所有技能增强都旋转起来。我想我成功做到了，但没能及时截屏来证明。\n\
    \n这个演示是在 `TapGestureController` 类中实现的。代码清单 8-8 展示了 `TapGestureController.h` 文件。\n\
    \n**代码清单 8-8.** `TapGestureController.h`\n\n```\n@interface TapGesutureController\
    \ : GameController < TemporaryBehaviorDelegate > {\n    NSMutableArray* powerups;\n\
    }\n\n- (void)tapGesture:(UITapGestureRecognizer *)sender;\n\n@end\n```\n\n在代码清单\
    \ 8-8 中，我们看到了`TapGestureController`类的头文件，它继承自 `GameController` 并遵循 `TemporaryBehaviorDelegate`\
    \ 协议。我们还看到有一个名为 `powerups` 的 `NSMutableArray`，用于存储本例中的 12 个技能增强。在其他示例中，我们通过指定应排序的类，依赖\
    \ `GameController` 来跟踪不同类型的角色。在这个示例中，我们使用单独的 `NSMutableArray`，因为我们想利用 `powerups`\
    \ 中 `Powerup` 对象的顺序来跟踪行和列。最后，我们看到了任务 `tapGesture` 的声明：当 `UITapGestureRecognizer`\
    \ 识别到一个手势时，会调用该任务。代码清单 8-9 展示了 `TapGestureController` 设置代码的实现。\n\n**代码清单 8-9.**\
    \ `TapGestureController.m (doSetup)`\n\n```\n-(BOOL)doSetup{\n    if ([super doSetup]){\n\
    \        [self setGameAreaSize:CGSizeMake(320, 480)];\n        powerups = [NSMutableArray\
    \ new];\n        for (int tap = 0;tap<=2;tap++){\n            for (int touch =\
    \ 0;touch<=3;touch++){\n                float x = 320.0/6.0 + tap*320.0/3;\n \
    \               float y = 480.0/8.0 + touch*480/4;\n                CGPoint center\
    \ = CGPointMake(x, y);\n                Powerup* powerup = [Powerup powerup:self\
    \ At:center];\n                [self addActor: powerup];\n                [powerups\
    \ addObject:powerup];\n            }\n        }\n        for (int touch = 1;touch<=4;touch++){\n\
    \            UITapGestureRecognizer* tripleTap = [[UITapGestureRecognizer alloc]\
    \ initWithTarget:self action:@selector(tapGesture:)];\n            [tripleTap\
    \ setNumberOfTapsRequired:3];\n            [tripleTap setNumberOfTouchesRequired:touch];\n\
    \            UITapGestureRecognizer* doubleTap = [[UITapGestureRecognizer alloc]\
    \ initWithTarget:self action:@selector(tapGesture:)];\n            [doubleTap\
    \ setNumberOfTapsRequired:2];\n            [doubleTap setNumberOfTouchesRequired:touch];\n\
    \            [doubleTap requireGestureRecognizerToFail:tripleTap];\n         \
    \   UITapGestureRecognizer* singleTap = [[UITapGestureRecognizer alloc] initWithTarget:self\
    \ action:@selector(tapGesture:)];\n            [singleTap setNumberOfTapsRequired:1];\n\
    \            [singleTap setNumberOfTouchesRequired:touch];\n            [singleTap\
    \ requireGestureRecognizerToFail:doubleTap];\n            [actorsView addGestureRecognizer:tripleTap];\n\
    \            [actorsView addGestureRecognizer:doubleTap];\n            [actorsView\
    \ addGestureRecognizer:singleTap];\n        }\n        return YES;\n    }\n  \
    \  return NO;\n}\n```\n\n在代码清单 8-9 中，我们看到了 `TapGestureController` 类的 `doSetup`\
    \ 任务。\n"
- fmt: "# In this task, we generate the 12 `Powerup` objects and add them as actors.\
    \ We also keep track of each `Powerup` in the `NSMutableArray powerups` . After\
    \ creating the `Powerup` objects, we create 12 `UITapGestureRecognizers` —done\
    \ for each `Powerup`. Each `UITapGestureRecognizer` is added to `actorsView` with\
    \ the task `addGestureRecognizer:` . Note that we are creating a `UITapGestureRecognizer`\
    \ for each possible combination of taps and touches, instead of trying to use\
    \ a single `UITapGestureRecognizer` to recognize the various combinations. Although\
    \ it is possible in some cases to do this, everything works a lot better when\
    \ you are as concise as possible with `UIGestureRecognizers`, as there are some\
    \ subtle interactions between gesture recognizers. For example, the recognizer\
    \ responsible for detecting triple taps has to cancel those responsible for double\
    \ and single taps.\n\nEach `UITapGestureRecognizer` is configured to call `tapGesture:`\
    \ when a gesture is recognized, as shown in [Listing 8-10](#9781430244226_Ch08.xhtml#list10).\n\
    \n**[Listing 8-10](#9781430244226_Ch08.xhtml#_list10).** `TapGestureController.m\
    \ (tapGesture:)`\n\n```\n- (void)tapGesture:(UITapGestureRecognizer *)sender{\n\
    \    int taps = [sender numberOfTapsRequired];\n    int touches = [sender numberOfTouches];\n\
    \n    int index = (taps-1)*4 + (touches-1);\n    Powerup* powerup = [powerups\
    \ objectAtIndex:index];\n\n    TemporaryBehavior* tempBehav = [TemporaryBehavior\
    \ temporaryBehavior:nil for:60*5];\n    [tempBehav setDelegate:self];\n\n    NSMutableArray*\
    \ behaviors = [powerup behaviors];\n\n    [behaviors removeAllObjects];\n    [behaviors\
    \ addObject:tempBehav];\n\n    [powerup setState:STATE_GLOW];\n}\n```\n\nIn [Listing\
    \ 8-10](#9781430244226_Ch08.xhtml#list10), we see the task `tapGesture:` , which\
    \ is called whenever one of the 12 `UITapGestureRecognizers` recognizes a tap\
    \ gesture. Note that we are not checking the state of the `UITapGestureRecognizer`;\
    \ this is because tap gestures are considered discrete and don’t use the state\
    \ information. We use the tasks `numberOfTapsRequired` and `numberOfTouches` to\
    \ figure out which `UITapGestureRecognizer` has responded and store these values\
    \ in taps and touches, respectively. These values tell us the index of the `Powerup`\
    \ that should be enabled and is found in the `NSMutableArray powerups` . Once\
    \ we have the correct `Powerup`, we create a `TemporaryBehavior` and set `self`\
    \ as the delegate. The power-up then has its behavior set to the newly created\
    \ `TemporaryBehavior`, as well as having its state set to `STATE_GLOW`. This starts\
    \ the power-up spinning. Let’s take a closer look at the class `TemporaryBehavior`.\n\
    \n## The `TemporaryBehavior` Class\n\nThe class `TemporaryBehavior` applies a\
    \ behavior to an actor for a fixed number of steps. In this case, we don’t really\
    \ want to apply any behaviors; we just want to know when five seconds has gone\
    \ by. Let’s take a quick look the class `TemporaryBehavior` and see how this works.\
    \ The declaration of `TemporaryBehavior` is shown in [Listing 8-11](#9781430244226_Ch08.xhtml#list11).\n\
    \n**[Listing 8-11](#9781430244226_Ch08.xhtml#_list11).** `TemporaryBehavior.h`\n\
    \n```\n@class TemporaryBehavior;\n@protocol TemporaryBehaviorDelegate\n-(void)stepsUpdatedOn:(Actor*)anActor\
    \ By:(TemporaryBehavior*)tempBehavior In:(GameController*)controller;\n@end\n\n\
    @interface TemporaryBehavior : NSObject <Behavior> {\n\n}\n@property (nonatomic)\
    \ long stepsRemaining;\n@property (nonatomic, strong) NSObject <Behavior> * behavior;\n\
    @property (nonatomic, strong) NSObject <TemporaryBehaviorDelegate> * delegate;\n\
    \n+(id)temporaryBehavior:(NSObject <Behavior> *)aBehavior for:(long)aNumberOfSteps;\n\
    \n@end\n```\n\nIn [Listing 8-11](#9781430244226_Ch08.xhtml#list11), we see this\
    \ definition of the class `TemporaryBehavior`. We see that it defines a protocol\
    \ called `TemporaryBehaviorDelegate`, which `TapGestureController` conforms to\
    \ (see [Listing 8-8](#9781430244226_Ch08.xhtml#list8)).\n\nThe constructor for\
    \ `TemporaryBehavior` takes a behavior and a number of steps as arguments. [Listing\
    \ 8-12](#9781430244226_Ch08.xhtml#list12) shows the implementation of `TemporaryBehavior`.\n\
    \n**[Listing 8-12](#9781430244226_Ch08.xhtml#_list12).** `TemporaryBehavior.m`\n\
    \n```\n+(id)temporaryBehavior:(NSObject < Behavior > *)aBehavior for:(long)aNumberOfSteps{\n\
    \    TemporaryBehavior* temp = [TemporaryBehavior new];\n    [temp setBehavior:aBehavior];\n\
    \    [temp setStepsRemaining:aNumberOfSteps];\n    return temp;\n}\n-(void)applyToActor:(Actor*)anActor\
    \ In:(GameController*)gameController{\n    stepsRemaining--;\n    [behavior applyToActor:anActor\
    \ In:gameController];\n    [delegate stepsUpdatedOn:anActor By:self In:gameController];\n\
    \    if (stepsRemaining <= 0){\n        [[anActor behaviors] removeObject:self];\n\
    \    }\n}\n@end\n```\n\nIn [Listing 8-12](#9781430244226_Ch08.xhtml#list12), we\
    \ see the implementation of the class `TemporaryBehavior`. The constructor simply\
    \ creates a `TemporaryBehavior` object and populates it with the provided arguments.\
    \ The task, `applyToActor:In:` , comes from the protocol `Behavior` (which `TemporaryBehavior`\
    \ conforms to), and is called for every step of the game. In this task, we simply\
    \ apply the provided behavior to the actor and inform the delegate that this work\
    \ has been done. Continuing with the tap gesture example, let’s look at how `TapGestureController`\
    \ responds to the task `stepsUpdatedOn:By:In:` , as shown in [Listing 8-13](#9781430244226_Ch08.xhtml#list13).\n\
    \n**[Listing 8-13](#9781430244226_Ch08.xhtml#_list13).** `TapGestureController.m\
    \ (stepsUpdatedOn:By:In:)`\n\n```\n-(void)stepsUpdatedOn:(Actor*)anActor By:(TemporaryBehavior*)tempBehavior\
    \ In:(GameController*)controller{\n    if ([tempBehavior stepsRemaining]==0){\n\
    \        [anActor setState:STATE_NO_GLOW];\n    }\n}\n```\n\nIn [Listing 8-13](#9781430244226_Ch08.xhtml#list13),\
    \ we see the task `stepsUpdatedOn:By:In:` as defined by the class `TapGestureController`.\
    \ In this task, we simply see if the `TemporaryBehavior`, `tempBehavior`, is at\
    \ the end of its life. If it is, we set the actor’s state to `STATE_NO_GLOW`,\
    \ which stops the power-up from spinning.\n\nWe have looked in detail at the different\
    \ configurations available for `UITapGestureRecognizer`. The following section\
    \ will explore a new one: the pinch.\n\n## Pinch Gestures\n\nPinch gestures show\
    \ up in `iOS` usually as a way of zooming in and out or scaling something on the\
    \ screen. This gesture is started by placing two fingers down and then by moving\
    \ them either toward each other or away. [Figure 8-3](#9781430244226_Ch08.xhtml#Fig3)\
    \ shows this gesture in action.\n\n![9781430244226_Fig08-03.jpg](images/9781430244226_Fig08-03.jpg)\n\
    \n[Figure 8-3.](#9781430244226_Ch08.xhtml#_Fig3) Pinch gesture changing the size\
    \ of a saucer\n\nIn [Figure 8-3](#9781430244226_Ch08.xhtml#Fig3), we see our example\
    \ of using pinch gestures. On the left, the saucer is scaled up as the result\
    \ of a pinch-out gesture. On the right we see the same saucer scaled down as the\
    \ result of a pinch-in gesture. As the saucer is being scaled, it stops spinning.\
    \ We take advantage of the different states of the pinch gesture to stop and start\
    \ the spinning.\n\nA pinch gesture can be detected by adding an instance of `UIPinchGestureRecognizer`\
    \ to a `UIView`. A `UIPinchGestureRecognizer` will not only inform you when a\
    \ pinch gesture occurs but will also report a scale and velocity value associated\
    \ with the gesture. Having the scale reported by a `UIPinchGestureRecognizer`\
    \ is very handy because this is such a common use of the pinch gesture.\n\nThis\
    \ example is implemented in the class `PinchGestureController`. Let’s take a quick\
    \ look at the header file, as shown in [Listing 8-14](#9781430244226_Ch08.xhtml#list14).\n\
    \n**[Listing 8-14](#9781430244226_Ch08.xhtml#_list14).** `PinchGestureController.h`"
  raw: 'In this task, we generate the 12 `Powerup` objects and add them as actors.
    We also keep track of each `Powerup` in the `NSMutableArray powerups`. After creating
    the `Powerup` objects, we create 12 `UITapGestureRecognizers`—done for each `Powerup`.
    Each `UITapGestureRecognizer` is added to `actorsView` with the task `addGestureRecognizer`:.
    Note that we are creating a `UITapGestureRecognizer` for each possible combination
    of taps and touches, instead of trying to use a single `UITapGestureRecognizer`
    to recognize the various combinations. Although it is possible in some cases to
    do this, everything works a lot better when you are as concise as possible with
    `UIGestureRecognizers`, as there are some subtle interactions between gesture
    recognizers. For example, the recognizer responsible for detecting triple taps
    has to cancel those responsible for double and single taps.    Each `UITapGestureRecognizer`
    is configured to call tapGesture: when a gesture is recognized, as shown in [Listing
    8-10](#9781430244226_Ch08.xhtml#list10).    **[Listing 8-10](#9781430244226_Ch08.xhtml#_list10).** `TapGestureController.m
    (tapGesture:)`    ``` - (void)tapGesture:(UITapGestureRecognizer *)sender{     int
    taps = [sender numberOfTapsRequired];     int touches = [sender numberOfTouches];      int
    index = (taps-1)*4 + (touches-1);     Powerup* powerup = [powerups objectAtIndex:index];      TemporaryBehavior*
    tempBehav = [TemporaryBehavior temporaryBehavior:nil for:60*5];     [tempBehav
    setDelegate:self];      NSMutableArray* behaviors = [powerup behaviors];      [behaviors
    removeAllObjects];     [behaviors addObject:tempBehav];      [powerup setState:STATE_GLOW];
    } ```    In [Listing 8-10](#9781430244226_Ch08.xhtml#list10), we see the task
    `tapGesture`:, which is called whenever one of the 12 `UITapGestureRecognizers`
    recognizes a tap gesture. Note that we are not checking the state of the `UITapGestureRecognizer`;
    this is because tap gestures are considered discrete and don’t use the state information.
    We use the tasks `numberOfTapsRequired` and `numberOfTouches` to figure out which
    `UITapGestureRecognizer` has responded and store these values in taps and touches,
    respectively. These values tell us the index of the `Powerup` that should be enabled
    and is found in the `NSMutableArray powerups`. Once we have the correct `Powerup`,
    we create a `TemporaryBehavior` and set `self` as the delegate. The power-up then
    has its behavior set to the newly created `TemporaryBehavior`, as well as having
    its state set to STATE_GLOW. This starts the power-up spinning. Let’s take a closer
    look at the class `TemporaryBehavior`.    The `TemporaryBehavior` Class    The
    class `TemporaryBehavior` applies a behavior to an actor for a fixed number of
    steps. In this case, we don’t really want to apply any behaviors; we just want
    to know when five seconds has gone by. Let’s take a quick look the class `TemporaryBehavior`
    and see how this works. The declaration of `TemporaryBehavior` is shown in [Listing
    8-11](#9781430244226_Ch08.xhtml#list11).    **[Listing 8-11](#9781430244226_Ch08.xhtml#_list11).** `TemporaryBehavior.h`    ```
    @class TemporaryBehavior; @protocol TemporaryBehaviorDelegate -(void)stepsUpdatedOn:(Actor*)anActor
    By:(TemporaryBehavior*)tempBehavior In:(GameController*)controller; @end  @interface
    TemporaryBehavior : NSObject <Behavior> {  } @property (nonatomic) long stepsRemaining;
    @property (nonatomic, strong) NSObject <Behavior> * behavior; @property (nonatomic,
    strong) NSObject <TemporaryBehaviorDelegate> * delegate;  +(id)temporaryBehavior:(NSObject
    <Behavior> *)aBehavior for:(long)aNumberOfSteps;  @end ```    In [Listing 8-11](#9781430244226_Ch08.xhtml#list11),
    we see this definition of the class `TemporaryBehavior`. We see that it defines
    a protocol called `TemporaryBehaviorDelegate`, which `TapGestureController` conforms
    to (see [Listing 8-8](#9781430244226_Ch08.xhtml#list8)).


    The constructor for `TemporaryBehavior` takes a behavior and a number of steps
    as arguments. [Listing 8-12](#9781430244226_Ch08.xhtml#list12) shows the implementation
    of `TemporaryNehavior`.    **[Listing 8-12](#9781430244226_Ch08.xhtml#_list12).** `TemporaryBehavior.m`    ```
    +(id)temporaryBehavior:(NSObject < Behavior > *)aBehavior for:(long)aNumberOfSteps{
        TemporaryBehavior* temp = [TemporaryBehavior new];     [temp setBehavior:aBehavior];
        [temp setStepsRemaining:aNumberOfSteps];     return temp; } -(void)applyToActor:(Actor*)anActor
    In:(GameController*)gameController{     stepsRemaining--;     [behavior applyToActor:anActor
    In:gameController];     [delegate stepsUpdatedOn:anActor By:self In:gameController];
        if (stepsRemaining <= 0){         [[anActor behaviors] removeObject:self];
        } } @end ```    In [Listing 8-12](#9781430244226_Ch08.xhtml#list12), we see
    the implementation of the class `TemporaryBehavior`. The constructor simply creates
    a `TemporaryBehavior` object and populates it with the provided arguments. The
    task, `applyToActor:In`:, comes from the protocol Behavior (which `TemporaryBehavior`
    conforms to), and is called for every step of the game. In this task, we simply
    apply the provided behavior to the actor and inform the delegate that this work
    has been done. Continuing with the tap gesture example, let’s look at how `TapGestureController`
    responds to the task `stepsUpdatedOn:By:In`:, as shown in [Listing 8-13](#9781430244226_Ch08.xhtml#list13).    **[Listing
    8-13](#9781430244226_Ch08.xhtml#_list13).** `TapGestureController.m (stepsUpdatedOn:By:In:)`    ```
    -(void)stepsUpdatedOn:(Actor*)anActor By:(TemporaryBehavior*)tempBehavior In:(GameController*)controller{
        if ([tempBehavior stepsRemaining]==0){         [anActor setState:STATE_NO_GLOW];
        } } ```    In [Listing 8-13](#9781430244226_Ch08.xhtml#list13), we see the
    task `stepsUpdatedOn:By:In`: as defined by the class `TapGestureController`. In
    this task, we simply see if the `TemporaryBehavior, tempBehavior`, is at the end
    of its life. If it is, we set the actor’s state to STATE_NO_GLOW, which stops
    the power-up from spinning.    We have looked in detail at the different configurations
    available for `UITapGestureRecognizer`. The following section will explore a new
    one: the pinch.    Pinch Gestures    Pinch gestures show up in `iOS` usually as
    a way of zooming in and out or scaling something on the screen. This gesture is
    started by placing two fingers down and then by moving them either toward each
    other or away. [Figure 8-3](#9781430244226_Ch08.xhtml#Fig3) shows this gesture
    in action.    ![9781430244226_Fig08-03.jpg](images/9781430244226_Fig08-03.jpg)    [Figure
    8-3.](#9781430244226_Ch08.xhtml#_Fig3)  Pinch gesture changing the size of a saucer    In
    [Figure 8-3](#9781430244226_Ch08.xhtml#Fig3), we see our example of using pinch
    gestures. On the left, the saucer is scaled up as the result of a pinch-out gesture.
    On the right we see the same saucer scaled down as the result of a pinch-in gesture.
    As the saucer is being scaled, it stops spinning. We take advantage of the different
    states of the pinch gesture to stop and start the spinning.    A pinch gesture
    can be detected by adding an instance of `UIPinchGestureRecognizer` to a `UIView`.
    A `UIPinchGestureRecognizer` will not only inform you when a pinch gesture occurs
    but will also report a scale and velocity value associated with the gesture. Having
    the scale reported by a `UIPinchGestureRecognizer` is very handy because this
    is such a common use of the pinch gesture.    This example is implemented in the
    class `PinchGestureController`. Let’s take a quick look at the header file, as
    shown in [Listing 8-14](#9781430244226_Ch08.xhtml#list14).    **[Listing 8-14](#9781430244226_Ch08.xhtml#_list14).** `PinchGestureController.'
  trans: "\n# 在此任务中，我们生成了 12 个`Powerup`对象并将其添加为角色。我们还通过`NSMutableArray powerups`来跟踪每个`Powerup`。创建完`Powerup`对象后，我们为每个`Powerup`创建了\
    \ 12 个`UITapGestureRecognizers`，并将每个`UITapGestureRecognizer`通过`addGestureRecognizer:`方法添加到`actorsView`中。请注意，我们是为每次点击和触摸的每种可能组合分别创建`UITapGestureRecognizer`，而不是试图用一个`UITapGestureRecognizer`来识别各种组合。尽管在某些情况下可以这样做，但当你尽可能精确地使用`UIGestureRecognizers`时，一切都会顺畅得多，因为手势识别器之间存在一些微妙的交互。例如，负责检测三次点击的识别器必须取消负责检测双击和单击的识别器。\n\
    \n每个`UITapGestureRecognizer`都被配置为在识别到手势时调用`tapGesture:`，如代码清单 8-10 所示。\n\n**代码清单\
    \ 8-10.** `TapGestureController.m (tapGesture:)`\n\n```\n- (void)tapGesture:(UITapGestureRecognizer\
