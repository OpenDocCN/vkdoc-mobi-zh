    \ = STATE_GLOW;  \n    }  \n}  \n```  \n\n在代码清单 11-12 中，我们看到了`Powerup`类的`step:`任务。该任务在游戏中的每一步都会被调用，是角色可以指定其自身行为的地方。该任务中的第一个测试仅检查`Powerup`是否已移出屏幕左边界，如果是则将其自身移除。第二个测试检查`Powerup`是否应开始闪烁；如果是，则每\
    \ 25 步在`STATE_GLOW`和`STATE_NO_GLOW`状态之间交替。如果`Powerup`刚切换到`STATE_NO_GLOW`状态，则播放音频`AUDIO_POWERUP_BLINK`。请注意，此音频的`pan`值基于`Powerup`的\
    \ *x* 坐标。这会使闪烁声听起来像是来自屏幕的一侧或另一侧。要观察此效果，请戴上耳机运行示例代码。  \n\n## 总结  \n\n在本章中，我们回顾了如何通过正确响应用户的行为和期望，将游戏打造成一个优秀的\
    \ iOS 应用程序。我们还研究了`GameController`中的一些框架代码，以便为我们的特定游戏更轻松地播放音频。我们探讨了如何区分背景音乐和音效。最后，我们通过探索一个简单的示例（该示例播放由游戏中不同事件驱动的两种不同音效）来了解如何使用此框架。\
    \  \n\n¹关于音频格式和编码，还有更多知识需要了解。以下是一个了解 Apple Core Audio 格式的良好起点：`http://en.wikipedia.org/wiki/Core_Audio_Format`。\
    \  \n\n## 第 12 章 — 一个完整的游戏：Belt Commander  \n\n在本书中，我们介绍了许多构建 iOS 游戏的技术。我们在第 3\
    \ 章中学习了如何为游戏构建基本的应用程序流程。在第 4 章中，我们通过 Coin Sorter 学习了如何构建一个基本的回合制游戏。然后，我们转向逐帧游戏，并在第\
    \ 5 章中学习了如何构建一个持续运动的游戏。在第 6 章和第 7 章中，我们研究了如何创建不同类型的角色来填充我们的游戏。第 8 章介绍了如何捕获用户输入来操控游戏内元素，而第\
    \ 9 章则探讨了如何通过 Game Center 和其他社交媒体服务接触我们的玩家。在第 10 章中，我们讨论了如何添加应用内购买，并借助游戏赚取一些收入。在第\
    \ 11 章中，我们为游戏添加了音效。在本章中，我们将所有这些元素整合到一个功能完整的游戏——Belt Commander 中。标题画面如图 12-1 所示。\
    \  \n\n![9781430244226_Fig12-01.jpg](img/9781430244226_Fig12-01.jpg)  \n\n图 12-1.  Belt\
    \ Commander 的标题画面  \n\n在本章中，我们将从宏观层面审视游戏 Belt Commander。我们还将逐步讲解游戏是如何组合在一起的，包括视图的组织方式以及应用程序游戏逻辑的实现方式。我们将讨论游戏中的不同角色及其添加方式。从某些方面来看，本章是对前几章所学技术的回顾。然而，探索这些技术如何融合在一起，将为您构建自己的游戏提供一条路线图。\
    \  \n\n事实上，您可以自由地以本章的示例代码作为起点来开发自己的游戏。我本人正有此计划，并打算在 iTunes Store 中发布 Belt Commander\
    \ 的商业版本。那么，让我们开始吧。  \n\n### Belt Commander：游戏概述  \n\nBelt Commander 是一款动作游戏，在游戏中您需要控制一艘飞船穿越小行星带。摧毁小行星和外星飞碟可为玩家赢得分数。在游戏过程中，偶尔会有强化道具飘入屏幕，为玩家提供恢复部分生命值、获得额外积分或升级武器的机会。这是一款节奏相对较快、交互简单的游戏。让我们看看游戏的初始画面，如图\
    \ 12-2 所示。  \n\n![9781430244226_Fig12-02.jpg](img/9781430244226_Fig12-02.jpg)\
    \  \n\n图 12-2.  Belt Commander 的初始画面  \n\n在图 12-2 中，我们看到了游戏的第一个画面。屏幕顶部有一个标题以及多个按钮。Facebook、Tweet\
    \ 和排行榜按钮启用了我们在第 9 章中讨论的各种社交功能。附加内容按钮允许用户配置游戏并购买游戏的新部分。购买的处理方式在第 10 章中进行了描述。在本章中，我们假设所有附加内容均已购买。点击“Play”按钮将进入游戏的战斗部分，如图\
    \ 12-3 所示。  \n\n![9781430244226_Fig12-03.jpg](img/9781430244226_Fig12-03.jpg)\
    \  \n\n图 12-3.  Belt Commander 战斗场景  \n\n在图 12-3 中，我们看到了游戏的战斗部分。左侧是玩家控制的飞船。玩家可以点击屏幕，飞船将向上或向下移动到点击的位置。通过这种方式，玩家可以躲避从屏幕右侧向左移动的众多小行星。除了小行星，还有外星飞碟在屏幕上上下移动，向玩家的飞船发射子弹。无论是小行星还是飞碟的子弹，击中飞船都会造成伤害。游戏会持续进行，直到飞船因伤害累积而损毁。为了帮助玩家，强化道具会从右侧出现并向左移动。如果玩家能够截获强化道具，就能获得其提供的奖励：生命值、更高伤害或额外积分。\
    \  \n\n在图 12-3 的右下角，我们看到一个暂停按钮 (II)。点击它会暂停游戏，并允许玩家退出或继续游戏，如图 12-4 所示。  \n\n![9781430244226_Fig12-04.jpg](img/9781430244226_Fig12-04.jpg)\
    \  \n\n图 12-4.  Belt Commander 暂停画面  \n\n在图 12-4 中，我们看到了用户点击屏幕右下角触摸按钮时弹出的对话框。该对话框允许用户选择“Yes”退出游戏，或选择“No”继续游戏。如果用户在游戏过程中，因启动其他应用而导致本应用被发送到后台，那么当用户将游戏重新调回前台时，也会显示此对话框。当玩家的飞船生命值归零时，游戏结束。这时会出现图\
    \ 12-5 所示的对话框。  \n\n![9781430244226_Fig12-05.jpg](img/9781430244226_Fig12-05.jpg)\
    \  \n\n图 12-5.  游戏结束  \n\n在图 12-5 中，我们看到了游戏结束时弹出的对话框。此对话框允许用户点击“Yes”立即重新开始游戏。如果用户点击“No”，则会返回到游戏的初始画面。整个应用程序的流程如图\
    \ 12-6 所示。  \n\n![9781430244226_Fig12-06.jpg](img/9781430244226_Fig12-06.jpg)\n"
- fmt: "## 图形与视图导航\n\n`![9781430244226_Fig12-06.jpg](images/9781430244226_Fig12-06.jpg)`\
    \  \n[Figure 12-6.](#9781430244226_Ch12.xhtml#_Fig6)  应用流程图\n\n在[Figure 12-6](#9781430244226_Ch12.xhtml#Fig6)中，我们看到了游戏的八个屏幕。箭头指示了用户如何从一个视图导航到另一个视图。每个过渡都用字母标记，具体描述如下：\n\
    \n- 应用从A点开始，即`Start`视图。这是用户首先看到的内容。\n- 按下`Extras`按钮后，用户进入`Extras`视图，在此处可以选择游戏中的角色：小行星、飞碟和强化道具。用户通过点击`Back`按钮返回`Start`视图。\n\
    - 点击`Leaderboard`按钮会弹出标准的排行榜视图。点击右上角的`Done`按钮返回`Start`视图。\n- 点击`Tweet`按钮会弹出Twitter对话框。严格来说，这并非一个独立的视图，因为推特对话框是弹出窗口，但它仍占据大部分屏幕。点击`Send`或`Cancel`按钮将用户带回`Start`视图。\n\
    - 点击`Facebook`按钮将退出应用，并弹出Facebook认证屏幕。用户在输入凭证后，会被带回到`Start`视图。\n- 点击`Play`按钮开始游戏。在`Action`视图中，用户进行游戏。玩家上下移动飞船，通过摧毁小行星和飞碟来尽可能多地获取分数。\n\
    - 游戏过程中，用户可以点击`Pause`按钮暂停游戏。按下`Pause`按钮后，会弹出一个对话框，询问用户是否退出游戏。如果游戏进行中应用被发送到后台，也会弹出此对话框。\n\
    - 当飞船的生命值降至零时，游戏结束。此时会弹出一个对话框，询问用户是否重新开始游戏。\n- 如果用户暂停游戏并选择不结束游戏，将被带回`Start`视图。同样，当游戏结束时，如果用户选择不再玩一次，也会被带回主视图。\n\
    \n我们已经了解了构成游戏的各个视图，并对游戏如何在视图间流转有了概念。接下来，让我们看看这种导航是如何实现的，从构成游戏的XIB文件开始。\n\n## 实现视图到视图的导航\n\
    \n我们已经介绍了`Belt Commander`中涉及的视图。让我们更详细地了解游戏是如何初始化的，构成游戏的XIB文件，以及如何以编程方式处理导航。这些信息将帮助你构建自己的游戏，因为这里运用了多种不同的技术。首先，我们来看看如何启动应用。\n\
    \n### 启动应用\n\n与所有iOS应用程序一样，起点是`main.m`文件中的`main`函数。但是，在这个应用中，我们没有对`main`函数进行任何自定义，因此可以跳过描述。该应用真正的起点是plist文件`Belt\
    \ Commander-Info.plist`。[Figure 12-7](#9781430244226_Ch12.xhtml#Fig7)显示了Xcode对该文件的表示。\n\
    \n`![9781430244226_Fig12-07.jpg](images/9781430244226_Fig12-07.jpg)`  \n[Figure\
    \ 12-7.](#9781430244226_Ch12.xhtml#_Fig7)  Xcode中的`Belt Commander-Info.plist`\n\
    \n在[Figure 12-7](#9781430244226_Ch12.xhtml#Fig7)中，我们看到了Xcode呈现的`Belt Commander-Info.plist`文件。在该文件中，我们看到一个相当标准的iOS应用程序设置。我们看到Bundle标识符为`com.claywaregames.beltcommander`，这与我们在iTunes\
    \ Connect中创建的、支持应用内购买和Game Center的应用相对应。该文件与本书中其他示例的一个不同之处在于，我们在该文件中指定了起始XIB文件。起始XIB文件由键值`Main\
    \ nib file base name (iPad)`和`Main nib file base name (iPhone)`指示。这些键分别设置为`Window_iPad`和`Window_iPhone`。\n\
    \n通过设置这些值，我们请求iOS应用程序自动使用这些文件来创建主`UIWindow`并对其调用`makeKeyAndVisible`。这样，我们就不需要在应用代理的`application:didFinishLaunchingWithOptions:`任务中编写任何代码。为了理解其他对象在应用中如何相互关联，让我们来看一下这个游戏的XIB文件。\n\
    \n### XIB文件\n\n此应用程序中的XIB文件将关键类的实例绑定在一起，并允许它们进行协调。虽然此应用是通用应用，可在iPhone和iPad上运行，但我们将重点介绍iPhone\
    \ XIB文件，因为iPad版本仅在布局上有所不同。通过查看此XIB文件的内容，我们将了解应用程序是如何组合在一起的。[Figure 12-8](#9781430244226_Ch12.xhtml#Fig8)显示了一个概览。\n\
    \n`![9781430244226_Fig12-08.jpg](images/9781430244226_Fig12-08.jpg)`  \n[Figure\
    \ 12-8.](#9781430244226_Ch12.xhtml#_Fig8)  iPhone XIB文件概览\n\n在[Figure 12-8](#9781430244226_Ch12.xhtml#Fig8)中，我们看到了此游戏iPhone版本的XIB文件的完全展开视图。左侧的A项显示了对游戏主`UIWindow`的引用，以及对`AppDelegate`的引用。B项处的视图控制器是`RootViewController`类的一个实例，它是`UINavigationController`的子类。视图控制器`RootViewController`与窗口连接，作为根控制器；这将导致显示`RootViewController`的顶级`UIViewController`。简而言之，一切已连接好，使得E项处的视图在启动时显示。\n\
    \n在[Figure 12-8](#9781430244226_Ch12.xhtml#Fig8)中，我们看到还有两个其他`UIViewController`：C项处的`Extras\
    \ Controller`和D项处的`Belt Commander Controller`。`Extras Controller`对象对应于G项处的视图，而`BeltCommanderController`对象也对应于G项处的视图。这两个控制器在我们的`RootViewController`类中都有一个`IBOutlet`，以便可以引用它们。事实上，XIB文件中的许多对象都连接到`RootViewController`，如[Listing\
    \ 12-1](#9781430244226_Ch12.xhtml#list1)所示。\n\n**[Listing 12-1](#9781430244226_Ch12.xhtml#_list1).**\
    \ `RootViewController.m`\n\n```\n@interface RootViewController : UINavigationController<BeltCommanderDelegate,\
    \  UIAlertViewDelegate, GKLeaderboardViewControllerDelegate>{\n    IBOutlet UIViewController*\
    \ welcomeController;\n    IBOutlet BeltCommanderController* beltCommanderController;\n\
    \    IBOutlet ExtrasController *extrasController;\n    IBOutlet UIButton *leaderBoardButton;\n\
    \     \n    IBOutlet UIButton *tweetButton;\n    IBOutlet UIButton *facebookButton;\n\
    \     \n    UIAlertView* newGameAlertView;\n    UIAlertView* pauseGameAlerTView;\n\
    \     \n    GKLocalPlayer* localPlayer;\n     \n    ACAccountStore* accountStore;\n\
    \    ACAccount* facebookAccount;\n     \n    BOOL isPlaying;\n}\n-(void)doPause;\n\
    -(void)endOfGameCleanup;\n \n-(void)initGameCenter;\n-(void)initFacebook;\n-(void)initTwitter;\n\
    \ \n-(void)notifyGameCenter;\n-(void)notifyFacebook;\n \n-(BOOL)handleOpenURL:(NSURL\
    \ *)url;\n \n-(void)applicationWillResignActive;\n-(void)applicationDidBecomeActive;\n\
    @end\n```\n\n在[Listing 12-1](#9781430244226_Ch12.xhtml#list1)中，我们看到了`RootViewController`类的头文件。`RootViewController`类负责管理与实际游戏操作无关的应用状态，包括视图间的转换、处理应用程序启动以及管理[第9章](#9781430244226_Ch09.xhtml)中的社交服务。正如我们在[Listing\
    \ 12-1](#9781430244226_Ch12.xhtml#list1)中看到的，我们有三个`UIViewController`的`IBOutlet`：`welcomeController`、`beltCommanderController`和`extrasController`。\n\
    \n[Listing 12-1](#9781430244226_Ch12.xhtml#list1)"
  raw: 'jpg](images/9781430244226_Fig12-06.jpg)    [Figure 12-6.](#9781430244226_Ch12.xhtml#_Fig6)  Application
    flow    In [Figure 12-6](#9781430244226_Ch12.xhtml#Fig6), we see the eight screens
    of the game. The arrows indicate how the user navigates from one view to another.
    Each transition is lettered as described in the following:    The application
    starts at A, the Start view. This is the first thing the user sees.    By pressing
    the Extras button, the user is taken to the Extras view, where he can select which
    actors are in the game: asteroids, saucers, and power-ups. The user returns to
    the Start view by clicking the Back button.    Clicking the Leaderboard button
    brings up the standard Leaderboard view. Clicking Done on the upper right returns
    the user to the Start view.    The Tweet button brings up the Twitter dialog.
    While not technically a separate view, since the Tweet dialog is a pop-up, it
    still takes up most of the screen. The Send or Cancel button returns the user
    to the Start view.    Clicking the Facebook button will exit the app and bring
    up a Facebook authentication screen. When the user enters her credentials, he
    is brought back to the Start view.    Clicking the Play button starts the game
    proper. In the Action view, the user plays the game. He moves the ship up and
    down, trying to score as many points as possible by destroying asteroids and saucers.    While
    playing, the user may click the Pause button to stop the game. When the Pause
    button is pressed, a dialog pops up asking the user if he would like to exit the
    game or not. This dialog is also brought up if the application is sent to the
    background while the game is in progress.    When the ship’s health reaches zero,
    the game ends. When this happens, a dialog is presented asking the user if he
    would like to play again or not.    If the user has paused the game and selected
    not to end it, he is brought back to the Start view. Similarly, when the game
    is over, if the user chooses not to play again, he is brought back to the main
    view.    We have looked at the views that make up the game and have a sense of
    how the game flows from view to view. Next, let’s take a look at how this navigation
    is implemented, starting with the XIB files that make up the game.    Implementing
    View-to-View Navigation    We have gone over the views involved in Belt Commander.
    Let’s take a closer look at the how the game is initialized, at the XIB files
    that make up the game, and how we handle navigation programmatically. This information
    will help you when you are building your own game, as there are a number of different
    techniques at work here. Let’s start by looking at how we launch the application.    Launching
    the Application    Like all iOS applications, the starting place is the `main`
    function found in the file `main.m`. However, in this application, we don’t customize
    that at all, so we can skip describing it. The real starting place for this application
    is the plist file, `Belt Commander-Info.plist`. [Figure 12-7](#9781430244226_Ch12.xhtml#Fig7)
    shows Xcode’s representation of this file.    ![9781430244226_Fig12-07.jpg](images/9781430244226_Fig12-07.jpg)    [Figure
    12-7.](#9781430244226_Ch12.xhtml#_Fig7)  Belt Commander-Info.plist in Xcode    In
    [Figure 12-7](#9781430244226_Ch12.xhtml#Fig7), we see file `Belt Commander-Info.plist`
    as presented by Xcode. In this file, we see a pretty standard setup for an iOS
    application. We see that the Bundle identifier is `com.claywaregames.beltcommander`
    that corresponds to the application we created in iTunes Connect that supports
    in-app purchases and Game Center. What is a little different in this file from
    the other samples in this book is that we specify the starting XIB files in this
    file. The starting XIB files are indicated by the key values “Main nib file base
    name (iPad)” and “Main nib file base name (iPhone).” These keys are set to the
    values “Window_iPad” and “Window_iPhone,” respectively.


    By setting these values, we are requesting that the iOS application automatically
    use these files to create our main `UIWindow` and call `makeKeyAndVisible` on
    it. This removes the need for us to put any code in our application delegate’s
    application:`didFinishLaunchingWithOptions:` task. To understand how the other
    objects in the application relate to each other, let’s take a look at XIB files
    for this game.    The XIB Files    The XIB files in this application bind instances
    of the key classes together and allow them to coordinate. While this application
    is a universal one, and runs on both the iPhone and iPad, we are going to focus
    on the iPhone XIB file because the iPad version is different only in layout. By
    looking at the contents of this XIB file, we will understand how the application
    is put together. An overview is shown in [Figure 12-8](#9781430244226_Ch12.xhtml#Fig8).    ![9781430244226_Fig12-08.jpg](images/9781430244226_Fig12-08.jpg)    [Figure
    12-8.](#9781430244226_Ch12.xhtml#_Fig8)  Overview of iPhone XIB file    In [Figure
    12-8](#9781430244226_Ch12.xhtml#Fig8), we see the XIB file for the iPhone version
    of this game fully expanded. On the left, at item A, we see a reference to the
    main `UIWindow` of the game, as well as a reference to the `AppDelegate`. The
    view controller at item B is an instance of the class `RootViewController`, which
    is a subclass of `UINavigationController`. The view controller RootViewController
    is wired up to the Window so that it is the root controller; this causes the `RootViewController''s`
    top-level `UIViewController` to be displayed. In short, everything is wired up
    so the view at item E is displayed at launch.    In [Figure 12-8](#9781430244226_Ch12.xhtml#Fig8),
    we see that there are two other `UIViewControllers: Extras Controller` at item
    C and `Belt Commander Controller` at item D. The object `Extras Controller` corresponds
    to the view at item G, while the object `BeltCommanderController` corresponds
    to the view at item G. Both of these controllers have an `IBOutlet` in our class
    `RootViewController` so they can be referenced. In fact, many of the objects in
    the XIB file are connected to the `RootViewController`, as shown in [Listing 12-1](#9781430244226_Ch12.xhtml#list1).    **[Listing
    12-1](#9781430244226_Ch12.xhtml#_list1).** `RootViewController.m`    ``` @interface
    RootViewController : UINavigationController<BeltCommanderDelegate,  UIAlertViewDelegate,
    GKLeaderboardViewControllerDelegate>{     IBOutlet UIViewController* welcomeController;
        IBOutlet BeltCommanderController* beltCommanderController;     IBOutlet ExtrasController
    *extrasController;     IBOutlet UIButton *leaderBoardButton;           IBOutlet
    UIButton *tweetButton;     IBOutlet UIButton *facebookButton;           UIAlertView*
    newGameAlertView;     UIAlertView* pauseGameAlerTView;           GKLocalPlayer*
    localPlayer;           ACAccountStore* accountStore;     ACAccount* facebookAccount;
              BOOL isPlaying; } -(void)doPause; -(void)endOfGameCleanup;   -(void)initGameCenter;
    -(void)initFacebook; -(void)initTwitter;   -(void)notifyGameCenter; -(void)notifyFacebook;
      -(BOOL)handleOpenURL:(NSURL *)url;   -(void)applicationWillResignActive; -(void)applicationDidBecomeActive;
    @end ```    In [Listing 12-1](#9781430244226_Ch12.xhtml#list1), we see the header
    for the class `RootViewController`. The class `RootViewController` is responsible
    for managing the application state that does not involve the actual playing of
    the game. This includes transitioning from view to view, handling the application
    startup, and managing the social services from [Chapter 9](#9781430244226_Ch09.xhtml).
    As we can see in [Listing 12-1](#9781430244226_Ch12.xhtml#list1), we have `IBOutlets`
    for the three `UIViewControllers`: `welcomeController`, `beltCommanderController`,
    and `extrasController`.    [Listing 12-1](#9781430244226_Ch12.'
  trans: "\n## 图形与视图导航\n\n`![9781430244226_Fig12-06.jpg](img/9781430244226_Fig12-06.jpg)`\
    \  \n图 12-6. 应用流程图\n\n在图 12-6 中，我们看到了游戏的八个屏幕。箭头指示了用户如何从一个视图导航到另一个视图。每个过渡都用字母标记，具体描述如下：\n\
    \n- 应用从 A 点开始，即`Start`视图。这是用户首先看到的内容。\n- 按下`Extras`按钮后，用户进入`Extras`视图，在此处可以选择游戏中的角色：小行星、飞碟和强化道具。用户通过点击`Back`按钮返回`Start`视图。\n\
    - 点击`Leaderboard`按钮会弹出标准的排行榜视图。点击右上角的`Done`按钮返回`Start`视图。\n- 点击`Tweet`按钮会弹出 Twitter\
    \ 对话框。严格来说，这并非一个独立的视图，因为推特对话框是弹出窗口，但它仍占据大部分屏幕。点击`Send`或`Cancel`按钮将用户带回`Start`视图。\n\
    - 点击`Facebook`按钮将退出应用，并弹出 Facebook 认证屏幕。用户在输入凭证后，会被带回到`Start`视图。\n- 点击`Play`按钮开始游戏。在`Action`视图中，用户进行游戏。玩家上下移动飞船，通过摧毁小行星和飞碟来尽可能多地获取分数。\n\
    - 游戏过程中，用户可以点击`Pause`按钮暂停游戏。按下`Pause`按钮后，会弹出一个对话框，询问用户是否退出游戏。如果游戏进行中应用被发送到后台，也会弹出此对话框。\n\
    - 当飞船的生命值降至零时，游戏结束。此时会弹出一个对话框，询问用户是否重新开始游戏。\n- 如果用户暂停游戏并选择不结束游戏，将被带回`Start`视图。同样，当游戏结束时，如果用户选择不再玩一次，也会被带回主视图。\n\
    \n我们已经了解了构成游戏的各个视图，并对游戏如何在视图间流转有了概念。接下来，让我们看看这种导航是如何实现的，从构成游戏的 XIB 文件开始。\n\n##\
    \ 实现视图到视图的导航\n\n我们已经介绍了`Belt Commander`中涉及的视图。让我们更详细地了解游戏是如何初始化的，构成游戏的 XIB 文件，以及如何以编程方式处理导航。这些信息将帮助你构建自己的游戏，因为这里运用了多种不同的技术。首先，我们来看看如何启动应用。\n\
    \n### 启动应用\n\n与所有 iOS 应用程序一样，起点是`main.m`文件中的`main`函数。但是，在这个应用中，我们没有对`main`函数进行任何自定义，因此可以跳过描述。该应用真正的起点是\
    \ plist 文件`Belt Commander-Info.plist`。图 12-7 显示了 Xcode 对该文件的表示。\n\n`![9781430244226_Fig12-07.jpg](img/9781430244226_Fig12-07.jpg)`\
    \  \n图 12-7. Xcode 中的`Belt Commander-Info.plist`\n\n在图 12-7 中，我们看到了 Xcode 呈现的`Belt\
    \ Commander-Info.plist`文件。在该文件中，我们看到一个相当标准的 iOS 应用程序设置。我们看到 Bundle 标识符为`com.claywaregames.beltcommander`，这与我们在\
    \ iTunes Connect 中创建的、支持应用内购买和 Game Center 的应用相对应。该文件与本书中其他示例的一个不同之处在于，我们在该文件中指定了起始\
    \ XIB 文件。起始 XIB 文件由键值`Main nib file base name (iPad)`和`Main nib file base name\
    \ (iPhone)`指示。这些键分别设置为`Window_iPad`和`Window_iPhone`。\n\n通过设置这些值，我们请求 iOS 应用程序自动使用这些文件来创建主`UIWindow`并对其调用`makeKeyAndVisible`。这样，我们就不需要在应用代理的`application:didFinishLaunchingWithOptions:`任务中编写任何代码。为了理解其他对象在应用中如何相互关联，让我们来看一下这个游戏的\
    \ XIB 文件。\n\n### XIB 文件\n\n此应用程序中的 XIB 文件将关键类的实例绑定在一起，并允许它们进行协调。虽然此应用是通用应用，可在\
    \ iPhone 和 iPad 上运行，但我们将重点介绍 iPhone XIB 文件，因为 iPad 版本仅在布局上有所不同。通过查看此 XIB 文件的内容，我们将了解应用程序是如何组合在一起的。图\
    \ 12-8 显示了一个概览。\n\n`![9781430244226_Fig12-08.jpg](img/9781430244226_Fig12-08.jpg)`\
    \  \n图 12-8. iPhone XIB 文件概览\n\n在图 12-8 中，我们看到了此游戏 iPhone 版本的 XIB 文件的完全展开视图。左侧的\
    \ A 项显示了对游戏主`UIWindow`的引用，以及对`AppDelegate`的引用。B 项处的视图控制器是`RootViewController`类的一个实例，它是`UINavigationController`的子类。视图控制器`RootViewController`与窗口连接，作为根控制器；这将导致显示`RootViewController`的顶级`UIViewController`。简而言之，一切已连接好，使得\
    \ E 项处的视图在启动时显示。\n\n在图 12-8 中，我们看到还有两个其他`UIViewController`：C 项处的`Extras Controller`和\
    \ D 项处的`Belt Commander Controller`。`Extras Controller`对象对应于 G 项处的视图，而`BeltCommanderController`对象也对应于\
    \ G 项处的视图。这两个控制器在我们的`RootViewController`类中都有一个`IBOutlet`，以便可以引用它们。事实上，XIB 文件中的许多对象都连接到`RootViewController`，如代码清单\
    \ 12-1 所示。\n\n**代码清单 12-1.** `RootViewController.m`\n\n```\n@interface RootViewController\
    \ : UINavigationController<BeltCommanderDelegate,  UIAlertViewDelegate, GKLeaderboardViewControllerDelegate>{\n\
    \    IBOutlet UIViewController* welcomeController;\n    IBOutlet BeltCommanderController*\
    \ beltCommanderController;\n    IBOutlet ExtrasController *extrasController;\n\
    \    IBOutlet UIButton *leaderBoardButton;\n     \n    IBOutlet UIButton *tweetButton;\n\
    \    IBOutlet UIButton *facebookButton;\n     \n    UIAlertView* newGameAlertView;\n\
    \    UIAlertView* pauseGameAlerTView;\n     \n    GKLocalPlayer* localPlayer;\n\
    \     \n    ACAccountStore* accountStore;\n    ACAccount* facebookAccount;\n \
    \    \n    BOOL isPlaying;\n}\n-(void)doPause;\n-(void)endOfGameCleanup;\n \n\
    -(void)initGameCenter;\n-(void)initFacebook;\n-(void)initTwitter;\n \n-(void)notifyGameCenter;\n\
    -(void)notifyFacebook;\n \n-(BOOL)handleOpenURL:(NSURL *)url;\n \n-(void)applicationWillResignActive;\n\
    -(void)applicationDidBecomeActive;\n@end\n```\n\n在代码清单 12-1 中，我们看到了`RootViewController`类的头文件。`RootViewController`类负责管理与实际游戏操作无关的应用状态，包括视图间的转换、处理应用程序启动以及管理第\
    \ 9 章中的社交服务。正如我们在代码清单 12-1 中看到的，我们有三个`UIViewController`的`IBOutlet`：`welcomeController`、`beltCommanderController`和`extrasController`。\n\
    \n代码清单 12-1\n"
- fmt: "\n`xhtml#list1`) also shows that the class `RootViewController` has `IBOutlets`\
    \ for two buttons: `leaderBoardButton` and `tweetButton`. A reference to these\
    \ objects is required, as they will be enabled or disabled at runtime. The `GKLocalPlayer`\
    \ is used to manage Game Center and the `ACAccountStore` and `ACAccount` objects\
    \ are used to manage interactions with Facebook.\n\nLet’s take a look at how we\
    \ handle the navigation across views.\n\n## View Navigation\n\nIn order to change\
    \ views when a user clicks a button, we have created a number of `IBAction` tasks\
    \ in the implementation of `RootViewController` and are wired up in the XIB file\
    \ to the corresponding buttons. [Listing 12-2](#9781430244226_Ch12.xhtml#list2)\
    \ shows two of these `IBAction` tasks.\n\n**[Listing 12-2](#9781430244226_Ch12.xhtml#_list2).**\
    \ `RootViewController.m` (`extrasButtonClicked:` and `playButtonClicked:`)\n\n\
    ```\n- (IBAction)extrasButtonClicked:(id)sender {\n    [self pushViewController:extrasController\
    \ animated:YES];\n}\n- (IBAction)playButtonClicked:(id)sender {\n    [self pushViewController:beltCommanderController\
    \ animated:YES];\n    [beltCommanderController doNewGame: [extrasController gameParams]];\n\
    }\n```\n\nIn [Listing 12-2](#9781430244226_Ch12.xhtml#list2), we see two tasks\
    \ responsible for handling a button click. The task `extrasButtonClicked`: is\
    \ called when the user presses the Extras button on the Start view. This task\
    \ simply uses task `pushViewController:animated:`, as defined by `UINavigationController`,\
    \ to present the view associated with `extrasController`. Similarly, the task\
    \ `playButtonClicked`: uses the same task to display the view associated with\
    \ `beltCommandController`, as well as calls `doNewGame:` on `beltCommanderController`.\n\
    \n[Listing 12-3](#9781430244226_Ch12.xhtml#list3) shows how we navigate back to\
    \ the Start view.\n\n**[Listing 12-3](#9781430244226_Ch12.xhtml#_list3).** `RootViewController.m`\
    \ (`backFromExtras:`)\n\n```\n- (IBAction)backFromExtras:(id)sender {\n    [self\
    \ popViewControllerAnimated:YES];\n}\n```\n\nIn [Listing 12-3](#9781430244226_Ch12.xhtml#list3),\
    \ we see the task `backFromExtras:` that is called when the user clicks the Back\
    \ button on the Extras view. To navigate back to the Start view, we call `popViewControllerAnimated:`\
    \ to remove the Extras view showing the Start view. The task `popViewControllerAnimated:`\
    \ is defined by `UINavigationController`, of which `RootViewController` is a subclass.\n\
    \nThere is one last piece of code that handles navigation, and that is the code\
    \ that responds to the two dialogs that appear on the game view, as shown in [Listing\
    \ 12-4](#9781430244226_Ch12.xhtml#list4).\n\n**[Listing 12-4](#9781430244226_Ch12.xhtml#_list4).**\
    \ `RootViewController.m` (`alertView:clickedButtonIndex:`)\n\n```\n- (void)alertView:(UIAlertView\
    \ *)alertView   clickedButtonAtIndex:(NSInteger)buttonIndex{\n    if (alertView\
    \ == pauseGameAlerTView){\n        if (buttonIndex == 0) {\n            [self\
    \ endOfGameCleanup];\n            [self popViewControllerAnimated:YES];\n    \
    \    } else {\n            [beltCommanderController setIsPaused:NO];\n       \
    \ }\n    }\n    if (alertView == newGameAlertView){\n        if (buttonIndex ==\
    \ 0) {\n            [beltCommanderController doNewGame: [extrasController gameParams]];\n\
    \        } else {\n            [self popViewControllerAnimated:YES];\n       \
    \ }\n    }\n}\n```\n\nIn [Listing 12-4](#9781430244226_Ch12.xhtml#list4), we see\
    \ the task `alertView:clickedButtonAtIndex:`, which is defined by the protocol\
    \ `UIAlertViewDelegate` and implemented by `RootViewController`. In this task,\
    \ we first check which `UIAlertView` was clicked.\n\nIf `alertView` is equal to\
    \ `pauseGameAlertView`, then we know that the user has clicked the Pause button\
    \ on the Game view and is responding to the dialog that is presented. If the user\
    \ clicks Yes on the dialog (`buttonIndex == 0`), then the user wants to exit the\
    \ current game. We call `endOfGameCleanup` and `popViewControllerAnimated:`; the\
    \ latter, of course, returns us to the Start view.\n\nThe task `endOfGameCleanup`\
    \ is responsible for reporting on the social media services, and we will look\
    \ at it shortly. If the user had clicked No, we simply unpause the game by calling\
    \ `setIsPaused`: and `beltCommanderController` and pass in `NO`.\n\nIn [Listing\
    \ 12-4](#9781430244226_Ch12.xhtml#list4), there are two possible `UIAlertViews`\
    \ that might be responsible for `alertView:clickedButtonAtIndex:` being called.\
    \ We looked at the case for the `UIAlertView pauseGameAlertView`; the other option\
    \ is that the `newGameAlertView` is responsible. This `UIAlertView` is displayed\
    \ at the end of a game when the user’s ship has lost all of its health. This dialog\
    \ allows the user to simply start a new game or return to the Start view. As can\
    \ be seen, starting a new game is as simple as calling `doNewGame:` on `beltCommanderController`.\
    \ To return to the Start view, we use the now familiar task `popViewControllerAnimated:`.\n\
    \nThe code responsible for displaying the two different `UIAlertView` is very\
    \ similar; let’s just look at one of those to understand it. The code that displays\
    \ the `UIAlertVIew` at the end of a game is shown in [Listing 12-5](#9781430244226_Ch12.xhtml#list5).\n\
    \n**[Listing 12-5](#9781430244226_Ch12.xhtml#_list5).** `RootViewController.m`\
    \ (`gameOver:`)\n\n```\n-(void)gameOver:(BeltCommanderController*)aBeltCommanderController{\n\
    \    if (newGameAlertView == nil){\n        newGameAlertView = [[UIAlertView alloc]\
    \ initWithTitle:@\"Your Game Is\n        Over.\" message:@\"Play Again?\" delegate:self\
    \ cancelButtonTitle:@\"Yes\"\n        otherButtonTitles:@\"No\", nil];\n    }\n\
    \    [newGameAlertView show];\n       \n    [self endOfGameCleanup];\n}\n```\n\
    \nIn [Listing 12-5](#9781430244226_Ch12.xhtml#list5), we see the task `gameOver:`\
    \ as implemented by `RootViewController`. The task `gameOver:` is defined by the\
    \ protocol `BeltCommanderDelegate`, which is the delegate protocol used to communicate\
    \ between the `RootViewController` and the `BeltCommanderController` when a game\
    \ starts or stops. That is to say, the `RootViewController` is a delegate of `beltCommanderView`.\
    \ This relationship is defined in the XIB file. In this case, we are looking at\
    \ the code that is called when the game is over. In this task, we lazily create\
    \ the `UIAlertView newGameAlertView`, specifying the text to be displayed and\
    \ that `self` should be used as the delegate. To display the `UIAlertView` we\
    \ call `show`, causing the view to pop up on the user’s screen. The last thing\
    \ we do is call `endOfGameCleanup`, as shown in [Listing 12-6](#9781430244226_Ch12.xhtml#list6).\n\
    \n**[Listing 12-6](#9781430244226_Ch12.xhtml#_list6).** `RootViewController.m`\
    \ (`endOfGameCleanup`)\n\n```\n-(void)endOfGameCleanup{\n    isPlaying = NO;\n\
    \    [self notifyGameCenter];\n    [self notifyFacebook];\n}\n```\n\nIn [Listing\
    \ 12-6](#9781430244226_Ch12.xhtml#list6), we see the task `endOfGameCleanup` that\
    \ is called when the game ends, either by the user’s losing all her ship’s health\
    \ or by quitting her active game from the pause dialog. In this task, we record\
    \ that we are no longer playing by setting `isPlaying` to `NO`. The tasks `notifyGameCenter`\
    \ and `notifyFacebook` inform those two services of the user’s score, and are\
    \ described in [Chapter 9](#9781430244226_Ch09.xhtml).\n\nWe have looked at how\
    \ the application is organized by inspecting the XIB file, understanding the flow\
    \ of the application and how we implemented it. Next, we want to look at the game\
    \ itself and understand how the class `BeltCommanderController`, along with the\
    \ `Actor` subclasses, creates the game.\n\n## Implementing the Game\n\nWe have\
    \ looked at an overview of how the application is put together. We know how the\
    \ views got on the screen and looked at the life cycle of the application. In\
    \ this section, we are going to focus on just the game mechanics. We will look\
    \ at how we get actors into the game, how they behave, and how they interact.\n\
    \nFirst, we will review the classes we created throughout this book to build a\
    \ simple game framework.\n"
