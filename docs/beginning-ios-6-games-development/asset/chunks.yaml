    \    }\n}\n-(void)scoreIncreases:(CoinsController*)aCoinsController with:(int)newScore{\n\
    \    for (UILabel* label in scoreLabels){\n        [label setText:[NSString stringWithFormat:@\"\
    %d\", newScore]];\n    }\n}\n-(void)turnsRemainingDecreased:(CoinsController*)aCoinsController\
    \ with:(int)turnsRemaining{\n    for (UILabel* label in remainingTurnsLabels){\n\
    \        [label setText:[NSString stringWithFormat:@\"%d\", turnsRemaining]];\n\
    \    }\n}\n-(void)gameOver:(CoinsController*)aCoinsController with:(CoinsGame*)game{\n\
    \    [continueButton setHidden:YES];\n    Score* score = [Score score:[game score]\
    \ At:[NSDate date]];\n    [highscoreController addScore:score];\n    UIWindow*\
    \ window = [[[UIApplication sharedApplication] windows] objectAtIndex:0];\n  \
    \  window.rootViewController = nil;\n    window.rootViewController = self;\n \
    \   [UIView beginAnimations:nil context:@\"flipTransitionToBack\"];\n    [UIView\
    \ setAnimationDuration:1.2];\n    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromRight\
    \ forView:self.view cache:YES];\n    [coinsController.view removeFromSuperview];\n\
    \    [self.view addSubview:highscoreController.view];\n    [UIView commitAnimations];\n\
    }\n```\n\n清单 3-7 展示了 `GameController` 类对 `CoinsControllerDelegate` 协议所定义任务的每个实现。当\
    \ `CoinsController` 开始一个新游戏时，它会调用 `delegate` 对象上的 `gameDidStart:with:` 方法。在我们的场景中，我们要确保剩余回合标签和分数标签能够反映游戏的初始值。这些值可能是任何数值，因为我们不知道是开始一个新游戏还是继续一个旧游戏。同样地，每当调用\
    \ `scoreIncreases:with:` 和 `turnsRemainingDecreased:with:` 任务时，这些标签也会被更新。\n\n\
    最后，在清单 3-7 中，当游戏结束时，会调用 `gameOver:with:` 任务。在此任务中，我们记录最高分并切换到最高分视图。由于我们允许游戏在横屏或竖屏模式下进行，游戏结束时手机可能处于横屏状态。如果是这种情况，我们需要确保界面方向正确，以便最高分视图能够正确显示。一种方法是简单地重置\
    \ `UIWindow` 的 `rootViewController` 属性。这会触发调用 `shouldAutorotateToInterfaceOrientation:`，从而确保我们的视图以正确的方向显示。\n\
    \n## HighscoreController：一个简单可复用的组件\n\n`HighscoreController` 类负责管理用于显示最高分的视图，以及持久化存储这些最高分。`HighscoreController`\
    \ 是一个相当简单的类——该类的头文件如清单 3-8 所示。\n\n**清单 3-8.** HighscoreController.h\n\n```objc\n\
    #define KEY_HIGHSCORES @\"KEY_HIGHSCORES\"\n#import <UIKit/UIKit.h>\n#import \"\
    Highscores.h\"\n#import \"Score.h\"\n@interface HighscoreController : UIViewController\
    \ {\n    IBOutlet UIView* highscoresView;\n    Highscores* highscores;\n}\n-(void)saveHighscores;\n\
    -(void)layoutScores:(Score*)latestScore;\n-(void)addScore:(Score*)newScore;\n\
    @end\n```\n\n如清单 3-8 所示，`HighscoreController` 有两个字段。第一个字段 `highscoresView` 是一个\
    \ `IBoutlet`。这是一个 `UIView`，用于在屏幕上布局实际的分数。`UIView highscoresView` 被假定为 `UIViewController`\
    \ 类自带视图属性的子视图。\n\n它不一定是直接子视图——只需出现在视图层次结构中的某个位置即可。这与我们之前看到的其他 `UIViewControllers`\
    \ 的模式略有不同。之所以这样做，是为了让 `HighscoreController` 的实例能够同时添加到 iPhone 和 iPad 的 XIB 文件中，从而可以在其中控制视图的布局。查看\
    \ iPhone XIB 文件，你会看到最高分视图的布局直接定义在 `HighscoreController` 内部。\n\n字段 `highscores`\
    \ 的类型是 `Highscores`。这是一个简单的类，包含一个 `Score` 对象数组。在查看了 `HighscoreController` 中定义的三个任务的实现之后，我们将更仔细地研究\
    \ `Highscores` 和 `Score` 类。\n\n## HighscoreController 的实现与布局\n\n一旦应用程序将 `HighscoreController`\
    \ 的视图连接好，最重要的任务就是 `addScore:` 方法。当游戏结束时，会调用此方法，应用程序应更新最高分视图，并确保最高分信息被存储。清单 3-9\
    \ 展示了 `addScore:` 的实现。\n\n**清单 3-9.** HighscoreController.m (addScore:)\n\n```objc\n\
    -(void)addScore:(Score*)newScore{\n    [highscores addScore:newScore];\n    [self\
    \ saveHighscores];\n    [self layoutScores: newScore];\n}\n```\n\n在清单 3-9 中，我们看到\
    \ `addScore:` 方法接受一个新的 `Score` 作为参数。`newScore` 对象被传递给 `highscores` 对象的 `addScore:`\
    \ 方法，在那里，如果分数不够高而无法成为最高分，它将被丢弃；否则，它会被插入到 `highscores` 中存储的十个 `Score` 对象的数组中。我们还可以看到，清单\
    \ 3-9 中的任务调用了 `saveHighscores` 方法，然后通过调用 `layoutScores:` 更新视图布局。在查看如何保存最高分之前，我们先来看看视图是如何更新的。清单\
    \ 3-10 展示了 `layoutScores:` 的实现。\n\n**清单 3-10.** HighscoreController.m (layoutScores:)\n\
    \n```objc\n-(void)layoutScores:(Score*)latestScore{\n    for (UIView* subview\
    \ in [highscoresView subviews]){\n        [subview removeFromSuperview];\n   \
    \ }\n    CGRect hvFrame = [highscoresView frame];\n    float oneTenthHeight =\
    \ hvFrame.size.height/10.0;\n    float halfWidth = hvFrame.size.width/2.0;\n \
    \   NSDateFormatter *dateFormat = [[NSDateFormatter alloc] init];\n    [dateFormat\
    \ setDateFormat:@\"yyyy-MM-dd\"];\n    int index = 0;\n    for (Score* score in\
    \ [highscores theScores]){\n        CGRect dateFrame = CGRectMake(0, index*oneTenthHeight,\
    \ halfWidth, oneTenthHeight);\n        UILabel* dateLabel = [[UILabel alloc] initWithFrame:dateFrame];\n\
    \        [dateLabel setText: [dateFormat stringFromDate:[score date]]];\n    \
    \    [dateLabel setTextAlignment:UITextAlignmentLeft];\n        [highscoresView\
    \ addSubview:dateLabel];\n        CGRect scoreFrame = CGRectMake(halfWidth, index*oneTenthHeight,\
    \ halfWidth, oneTenthHeight);\n        UILabel* scoreLabel = [[UILabel alloc]\
    \ initWithFrame:scoreFrame];\n        [scoreLabel setText:[NSString stringWithFormat:@\"\
    %d\", [score score]]];\n        [scoreLabel setTextAlignment:UITextAlignmentRight];\n\
    \        [highscoresView addSubview:scoreLabel];\n        if (latestScore != nil\
    \ && latestScore == score){\n            [dateLabel setTextColor:[UIColor blueColor]];\n\
    \            [scoreLabel setTextColor:[UIColor blueColor]];\n        } else {\n\
    \            [dateLabel setTextColor:[UIColor blackColor]];\n            [scoreLabel\
    \ setTextColor:[UIColor blackColor]];\n        }\n        index++;\n    }\n}\n\
    ```\n\n来自清单 3-10 的 `layoutScores:` 方法接受一个 `Score` 对象作为参数。这个 `Score` 对象表示玩家最近获得的一个分数。\n"
- fmt: "This allows `HighscoreController` to mark the newest score in blue; the other\
    \ scores will be drawn in black. The first loop in `layoutScores:` simply removes\
    \ all sub-views from the `UIView highscoreView`. The next three lines inspect\
    \ the size of `highscoreView` and pre-compute some size values that will be used\
    \ later.\n\nThe second loop in `layoutScores:` iterates through all of the `Score`\
    \ objects contained in the `highscores` object. For each `Score`, two `UILabels`\
    \ are created. The first `UILabel`, called `dateLabel` is created with the `CGRect\
    \ dateFrame`, which defines the region where the `UILabel` should be drawn. Basically,\
    \ `dateFrame` specifies the left half of a row on `highscoreView`. The text for\
    \ `dateLabel` is set based on the `date` property of the `Score` object. Similarly,\
    \ this process is repeated for the `UILabel scoreLabel`; however, it will display\
    \ the score the user achieved and will be placed on the right.\n\nLastly, we check\
    \ to see if the score we are displaying is the object `latestScore`. If it is,\
    \ we adjust the colors of the `UILabel`s to blue.\n\nIf we take a look back at\
    \ [Listing 3-9](#9781430244226_Ch03.xhtml#list9), we see that the high scores\
    \ are saved before we update the views by calling the task `saveHighscores`, as\
    \ shown in [Listing 3-11](#9781430244226_Ch03.xhtml#list11).\n\n**[Listing 3-11](#9781430244226_Ch03.xhtml#_list11).**\
    \ `HighscoreController.m` (`saveHighscores`)\n\n```\n-(void)saveHighscores{\n\
    \    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n    NSData*\
    \ highscoresData = [NSKeyedArchiver archivedDataWithRootObject:\nhighscores];\n\
    \    [defaults setObject:highscoresData forKey: KEY_HIGHSCORES];\n    [defaults\
    \ synchronize];\n}\n```\n\nThe `saveHighscores` task, shown in [Listing 3-11](#9781430244226_Ch03.xhtml#list11),\
    \ is responsible for archiving the `highscores` object and writing it somewhere\
    \ permanent. The strategy here is to stick the `highscores` object into the user’s\
    \ preferences for this application. This way, the high scores will be preserved\
    \ if the user deletes the app after a sync with iTunes. To know the user’s preferences,\
    \ we call `standardUserDefaults` on the class `NSUserDefaults`. Objects of type\
    \ `NSUserDefaults` are basically maps for storing key value pairs. The keys are\
    \ `NSStrings` and the values must be a property list. This includes `NSData`,\
    \ `NSString`, `NSNumber`, `NSDate`, `NSArray`, and `NSDictionary`—basically the\
    \ core iOS objects types. We want to store an object of type `Highscores`, which\
    \ is not included in this list. In order accomplish this, we must create an `NSData`\
    \ object from the data stored in the `highscores` object.\n\nTo archive an object\
    \ to an `NSData` object, we use the class `NSKeyedArchiver` and pass the `highscores`\
    \ object to the tasks `archivedDataWithRootObject:`. As the name implies, `archivedDataWithRootObject`\
    \ is designed to archive a graph of objects. In our case, the root object is `highscores`\
    \ and we know it contains a number of `Score` objects. So it looks like we are\
    \ on the right track. In order for an object to be archived by an `NSKeyedArchiver`,\
    \ it must conform to the protocol `NSCoding`. The final step is to call `synchronize`\
    \ on `defaults`; this makes sure our changes are saved.\n\n## The `Highscores`\
    \ Class\n\nInstances of the class `Highscores` store a sorted list of `Score`\
    \ objects and handle the details of adding `Score` object to the list. Let’s take\
    \ a look at the header file for the class `Highscores` and see how this all works,\
    \ as shown in [Listing 3-12](#9781430244226_Ch03.xhtml#list12).\n\n**[Listing\
    \ 3-12](#9781430244226_Ch03.xhtml#_list12).** `Highscores.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Score.h\"\n@interface Highscores : NSObject <NSCoding> {\n    NSMutableArray*\
    \ theScores;\n}\n@property (nonatomic, retain) NSMutableArray* theScores;\n-(id)initWithDefaults;\n\
    -(void)addScore:(Score*)newScore;\n@end\n```\n\n[Listing 3-12](#9781430244226_Ch03.xhtml#list12)\
    \ shows the interface for the class `Highscores`.\n\nAs we can see, `Highscores`\
    \ does in fact conform to the protocol `NSCoding`. We also see that it contains\
    \ an `NSMutableArray` called `theScores`, which is accessible as a property. There\
    \ are two tasks defined: one for initializing a `Highscore` with ten default `Scores`\
    \ and one for adding a new `Scores` object. [Listing 3-13](#9781430244226_Ch03.xhtml#list13)\
    \ shows how this class is implemented.\n\n**[Listing 3-13](#9781430244226_Ch03.xhtml#_list13).**\
    \ `Highscores.m`\n\n```\n#import \"Highscores.h\"\n@implementation Highscores\n\
    @synthesize theScores;\n-(id)initWithDefaults{\n    self = [super init];\n   \
    \ if (self != nil){\n        theScores = [NSMutableArray new];\n        for (int\
    \ i = 0;i <10;i++){\n            [self addScore:[Score score:1 At:[NSDate date]]];\n\
    \        }\n    }\n    return self;\n}\n-(void)addScore:(Score*)newScore{\n  \
    \  [theScores addObject:newScore];\n    [theScores sortUsingSelector:@selector(compare:)];\n\
    \    while ([theScores count] > 10){\n        [theScores removeObjectAtIndex:10];\n\
    \    }\n}\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder encodeObject:theScores\
    \ forKey:@\"theScores\"];\n}\n- (id)initWithCoder:(NSCoder *)decoder{\n    theScores\
    \ = [[decoder decodeObjectForKey:@\"theScores\"] retain];\n    return self;\n\
    }\n-(void)dealloc{\n    for (Score* score in theScores){\n        [score release];\n\
    \    }\n    [theScores release];\n    [super dealloc];\n}\n@end\n```\n\nThe implementation\
    \ of the class `Highscores` shown in [Listing 3-13](#9781430244226_Ch03.xhtml#list13)\
    \ is pretty compact. The task `initWithDefaults` initializes the `NSMutableArray\
    \ theScore` and then fills `theScores` with ten new `Score` objects. The task\
    \ `addScore:` adds a new `Score` object to the `theScores`, sorts it by the score\
    \ achieved by the player, and then removes any extra `Scores`. This may result\
    \ in the `Score newScore` not actually being in the `NSMutableArray theScores`.\
    \ However, it is implemented in this way so the caller does not have to consider\
    \ the fact that the `theScore` might not be high enough to be considered an actual\
    \ high score. The last two tasks, `encodeWithCoder:` and `initWithCoder:`, are\
    \ from the protocol `NSCoding`. These tasks describe how a `Highscores` object\
    \ is archived and unarchived. Note that the object passed to both of these arguments\
    \ is of the same type: `NSCoder`. The class `NSCoder` provides tasks for encoding\
    \ and decoding values. `NSCoder` is very much like other iOS classes in that it\
    \ presents a map-like interface for reading and writing data. In the task `encodeWithCoder:`,\
    \ we use the `NSCoder` task `encodeObject:forKey:` to write `theScore` object\
    \ to the encoder. We pass in a key value `NSString` that we will use in `initWithCoder:`\
    \ to read the `theScores` back out when we unarchive this class. Also note that\
    \ the object that is returned from the `decodeObjectForKey:` task is retained.\
    \ This is done to make sure the object returned is not reclaimed at some unspecified\
    \ time.\n\nWhen an `NSMutableArray` is encoded with an `NSCoder`, it knows to\
    \ encode the elements in the array, but those elements must know how to be encoded.\
    \ Because `theScores` is an `NSMutableArray` filled with `Score` objects, we have\
    \ to tell the class `Score` how to encode and decode itself for this process to\
    \ work.\n\n## The `Score` Class\n\n`Score` objects represent a date and score\
    \ value. We have seen how the class `Highscores` manages a list of `Score` objects.\
    \ Let’s take a quick look at this simple class. [Listing 3-14](#9781430244226_Ch03.xhtml#list14)\
    \ shows the header of the `Score` class.\n\n**[Listing 3-14](#9781430244226_Ch03.xhtml#_list14).**\
    \ `Score.h`\n\n```\n#import <Foundation/Foundation.h>\n@interface Score : NSObject\
    \  <NSCoding> {\n    NSDate* date;\n    int score;\n}\n@property (nonatomic, retain)\
    \ NSDate* date;\n@property (nonatomic) int score;\n+(id)score:(int)aScore At:(NSDate*)aDate;\n\
    @end\n```\n\nAs shown in [Listing 3-14](#9781430244226_Ch03.xhtml#list14), we\
    \ see that it defines two properties, `date` and `score`."
