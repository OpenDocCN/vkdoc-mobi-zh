            [self setCenter:aPoint];         [self setRadius:aRadius];         [self
    setImageName:anImageName];     }     return self; } -(void)step:(Example02Controller*)controller{
        //implemented by subclasses. } -(BOOL)overlapsWith: (Actor02*) actor {  float
    xdist = abs(self.center.x - actor.center.x);  float ydist = abs(self.center.y
    - actor.center.y);     float distance = sqrtf(xdist*xdist + ydist*ydist);     return
    distance < self.radius + actor.radius; } @end ```    In [Listing 5-8](#9781430244226_Ch05.xhtml#list8),
    we see the implementation of the class `Actor02`. The task `initAt:WithRadius:AndImage:`
    is used to initialize an `Actor02` with some basic information. This task also
    assigns a random `actorId` value by using the value `nextId` and incrementing
    it. Because `nextId` is of type long, you will have to create an incredible number
    of actors before you get two actors with the same ID.


    The task `step:` takes an instance of `Example02Controller` and is used incrementally
    to update the location and state of this `Actor02`. Subclasses will provide an
    implementation to this task to provide custom behavior and animations.    The
    last task, `overlapsWith:`, is used to check to see if this `Actor02` overlaps
    with another `Actor02`. This task is used to check for collisions in this example.    Actor
    Subclasses: Viper02    As we know, there are two types of actors in this example,
