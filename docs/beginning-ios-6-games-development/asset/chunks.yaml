    values. The second, called `CoordEqual`, is used to evaluate whether two `Coords`
    are referring to the same coin.    The interface declaration for the class `CoinsGame`,
    shown in [Listing 4-13](#9781430244226_Ch04.xhtml#list13), conforms to the protocol
