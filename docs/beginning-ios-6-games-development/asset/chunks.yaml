    == VARIATION_DAMAGE){         [viper incrementDamage:gameController];     } else
    if (self.variant == VARIATION_CASH){         [gameController incrementScore:1000];
        }     [gameController removeActor:self]; } ```    In [Listing 12-23](#9781430244226_Ch12.xhtml#list23),
    we see the task `doHitOn:in:` of the class `Powerup`. This is called when a `Powerup`
    collides with the `Viper`. The implementation could not be more straightforward:
    we simply check the variant of the `Powerup` and apply the correct effect. For
    `VARIATION_HEALTH`, we increment the `Viper’s` health by 30\. For `VARIATION _DAMAGE`,
    we increment the `Viper''s damage`. Lastly, for `VARIATION_CASH`, we just increment
    the score by 1,000\. I think the simplicity of this task is a direct byproduct
    of using `Actors` the way we do. It turned out to be a strong OO model.    Summary    In
    this chapter, we brought together all of the techniques we have discussed in this
    book. We started by exploring what our game, Belt Commander, is and how it is
    played. We then reviewed the flow of the application and looked at how we used
    the `UINavigationController` class to implement switching between views. We continued
    by looking at the class `BeltCommanderController` and learned how to implement
    the major parts of the game. Lastly, we looked at a few specific implementation
    choices that added life to our `Actors`.    When creating a game, there will always
    be unique code and techniques involved. Each game is one of a kind and requires
    a unique effort to bring it to life. It would be impossible to write a book that
    explains every possible challenge a game developer can face. However, many developers
    and game designers are going to face requirements that are very similar to what
    I have outlined here. It is my hope that this book shows how to work through a
    number of these common challenges. From the most basic issue of switching screens
    and saving user data, to the more complex topics like particle animations and
    in-app purchases, I think of this book as a map of the code and classes that are
    the infrastructure of a game. Ultimately, it is up to each developer to fill in
    the middle parts and create a new game. Thank you for reading this book.    Chapter
        13    Physics!    There are many games for iOS that utilize a physics simulator
    to control the motion of actors. In general, this usually means some library is
    included in the game that describes the motion of bodies in a realistic way, using
    real physics formulas and concepts like mass, momentum, velocity, and other principles
    used to describe the real world. Do physics engines provide a perfect simulation
    of how objects move? Not really. For starters, we will be working with the library
    Box2D.'
