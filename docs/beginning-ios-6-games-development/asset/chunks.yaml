    \ newCenter];`  \n`[controller addActor:newAst];`  \n\n```  \nint particles =\
    \ arc4random()%4+1;  \nfor (int i=0;i<particles;i++){  \n    ImageRepresentation*\
    \ rep = [ImageRepresentation imageRepWithDelegate:[AsteroidRepresentationDelegate\
    \ instance]];  \n    Particle* particle = [Particle particleAt:self.center WithRep:rep\
    \ Steps:25];  \n    [particle setRadius:6];  \n    [particle setVariant:arc4random()%AST_VARIATION_COUNT];\
    \  \n    [particle setRotation: (arc4random()%100)/100.0*M_PI*2];  \n\n    LinearMotion*\
    \ motion = [LinearMotion linearMotionRandomDirectionAndSpeed];  \n    [particle\
    \ addBehavior:motion];  \n\n    [controller addActor: particle];  \n}  \n[controller\
    \ removeActor:self];  \n```  \n\n在清单 12-21 中，我们看到类`Asteroid`实现的任务`doHit:`。在该任务中，我们检查当前处理的`Asteroid`是否高于一级。如果是，则需要创建子`Asteroid`来替换当前对象。在其他示例中，我们只是随机选取要创建的子`Asteroid`数量。然而，在《Belt\
    \ Commander》的试玩测试中，这种方式并不理想，因为生成的`Asteroid`数量过多。为了减少`Asteroid`的生成数量，我们为`count`的每个可能值设定了一个百分比。因此，只有\
    \ 10% 的情况下`Asteroid`会创建三个子`Asteroid`，40% 的情况下会创建两个子`Asteroid`，其余情况下只创建一个`Asteroid`。通过这种方式，游戏达到了平衡，保持了趣味性和可玩性。\
    \  \n\n关于任务`doHit:`的另一有趣之处，如清单 12-21 所示，在于它如何创建`Particle`来强调父`Asteroid`的毁灭。通过创建\
    \ 1 到 5 个外观与`Asteroid`相同的`Particle`，并将其随机方向发射出去，我们实现了非常令人满意的爆炸效果。  \n\n接下来，我们来探索一下类`Saucer`。\
    \  \n\n## Saucer 类  \n\n`Saucer`类主要是一个麻烦制造者。它出现在屏幕顶部或底部，向`Viper`射击`Bullet`。`Saucer`类之所以令人头疼，是因为`Bullet`通常会将`Asteroid`击碎，形成难以预测的格局。本章中`Saucer`类的实现与其他章节的实现非常相似。不过，任务`step:`进行了一些修改，如清单\
    \ 12-22 所示。  \n\n**清单 12-22.** `Saucer.m` (`step:`)  \n\n```  \n-(void)step:(GameController*)gameController{\
    \  \n    if (health <= 0){  \n        [gameController incrementScore:[self radius]*10];\
    \  \n        [gameController removeActor:self];  \n        return;  \n    }  \n\
    \n    CGSize gameAreaSize = [gameController gameAreaSize];  \n    CGPoint center\
    \ = [self center];  \n\n    if (center.y < -[self radius]){  \n        [linearMotion\
    \ setDirection:DIRECTION_DOWN];  \n    } else if (center.y > gameAreaSize.height\
    \ + [self radius]){  \n        [linearMotion setDirection:DIRECTION_UP];  \n \
    \   }  \n    if (arc4random()%180 == 0){  \n        BeltCommanderController* bc\
    \ = (BeltCommanderController*)gameController;  \n\n        [gameController addActor:[Bullet\
    \ bulletAt:[self center] TowardPoint:[bc viper].center From:self]];  \n    } \
    \ \n}  \n```  \n\n在清单 12-22 中，我们看到了类`Saucer`中任务`step:`的实现。在该任务中，我们检查`Saucer`的生命值是否低于零。如果是，则增加`gameController`的得分并从游戏中移除`Saucer`。任务`step:`的下一部分是判断`Saucer`是否因离开屏幕而需要改变方向。任务`step:`的最后一部分负责发射`Bullet`。\
    \  \n\n为此，我们获取`gameController`的`viper`属性，以便将`Bullet`瞄准它。这是第一次需要将`gameController`强制转换为`BeltCommanderController`。这引出了一个问题：如何在不依赖类定义的情况下，添加一种通用方式来引用特定参与者（如`Viper`）。不过，这是下次再讨论的练习。\
    \  \n\n我们最后要查看的`Actor`是`Powerup`。  \n\n## Powerup 类  \n\n`Powerup`类实际上非常简单。它只是一个从右向左移动的`Actor`。我们在其他章节中已经介绍过它如何旋转以及如何在生命周期结束时闪烁。在本游戏中，有趣之处在于它对`Viper`的影响。此功能在任务`doHitOn:in:`中实现，如清单\
    \ 12-23 所示。  \n\n**清单 12-23.** `Powerup.m` (`doHitOn:in:`)  \n\n```  \n-(void)doHitOn:(Viper*)viper\
    \ in:(GameController*)gameController{  \n    if (self.variant == VARIATION_HEALTH){\
    \  \n        [viper incrementHealth:30];  \n    } else if (self.variant == VARIATION_DAMAGE){\
    \  \n        [viper incrementDamage:gameController];  \n    } else if (self.variant\
    \ == VARIATION_CASH){  \n        [gameController incrementScore:1000];  \n   \
    \ }  \n    [gameController removeActor:self];  \n}  \n```  \n\n在清单 12-23 中，我们看到了类`Powerup`的任务`doHitOn:in:`。当`Powerup`与`Viper`碰撞时，会调用此方法。实现非常直接：我们只需检查`Powerup`的变体并应用相应的效果。对于`VARIATION_HEALTH`，我们将`Viper`的生命值增加\
    \ 30。对于`VARIATION_DAMAGE`，我们增加`Viper`的伤害值。最后，对于`VARIATION_CASH`，我们只是将得分增加 1000。我认为这个任务的简洁性是我们使用`Actor`方式的直接结果。它被证明是一个强大的面向对象模型。\
    \  \n\n## 总结  \n\n在本章中，我们整合了本书中讨论的所有技术。我们首先探讨了我们的游戏《Belt Commander》是什么以及如何游玩。然后我们回顾了应用程序的流程，并了解了如何使用`UINavigationController`类来实现视图之间的切换。接着，我们查看了`BeltCommanderController`类，并学习了如何实现游戏的主要部分。最后，我们研究了一些特定的实现选择，这些选择为我们的`Actor`增添了活力。\
    \  \n\n在创建游戏时，总会涉及独特的代码和技术。每款游戏都是独一无二的，需要独特的工作才能将其变为现实。编写一本解释游戏开发者可能面临的所有挑战的书是不可能的。然而，许多开发者和游戏设计师将会遇到与我在本书中概述的需求非常相似的需求。我希望这本书能展示如何应对这些常见挑战。从切换屏幕和保存用户数据这样最基础的问题，到粒子动画和应用内购买等更复杂的主题，我将这本书视为游戏基础设施的代码和类的地图。最终，每个开发者需要填补中间部分，创建出一款新游戏。感谢您阅读本书。\
    \  \n\n# 第十三章 物理学！  \n\niOS 上有许多游戏利用物理模拟器来控制参与者的运动。通常，这意味着游戏中包含某个库，该库使用真实的物理公式和概念（如质量、动量、速度以及其他描述真实世界的原理）以逼真的方式描述物体的运动。物理引擎是否提供了物体运动的完美模拟？并非如此。首先，我们将使用`Box2D`库。\n"
- fmt: '# 排版后的内容


    As the name implies, it simulates the interaction of two-dimensional (2D) bodies,
    which is clearly not an accurate representation of reality. However, `Box2D` does
    provide a level of realism that is good enough to trick our monkey brains into
    believing that things in the game are moving in a realistic way.


    In this chapter, you will learn how to add `Box2D` to our game project and understand
    how to integrate its functionality into our existing framework. The code in this
    chapter is taken from the `Sample 13` project.


    I would like to mention that `Box2D` is not the only physics engine suitable for
    iOS development. Another very popular physics library is `Chipmunk Physics`. The
    folks at `Chipmunk Physics` recommend their pro version (at a cost) for iOS development.
    This pro version provides an `Objective C` wrapper for their C-based library,
    which sounds pretty handy. I have not used either `Box2D` or `Chipmunk Physics`
    enough to make a recommendation. However, I would recommend evaluating both of
    these libraries before starting on a complex physics-based game. There are also
    many other open-source projects that may be a good starting point for a physics-based
    game.


    Let’s start by taking a look at `Sample 13` and understand what we are trying
    to build here.


    ## Overview of the Physics-Based Example


    In this chapter we will modify our existing game framework to create a sample
    application that uses physics to simulate the motion of asteroids. [Figure 13-1](#9781430244226_Ch13.xhtml#Fig1)
    shows the example running.


    ![9781430244226_Fig13-01.jpg](images/9781430244226_Fig13-01.jpg)


    [Figure 13-1.](#9781430244226_Ch13.xhtml#_Fig1)  Asteroid motion described by
    physics


    In [Figure 13-1](#9781430244226_Ch13.xhtml#Fig1), we see a number of asteroids
    against the familiar starry background. Each asteroid moves in a random direction,
    and when they exit the screen, they appear again on the opposite side. When the
    asteroids collide, they bounce off each other like pool balls. The smaller asteroids
    are defined to have a lower mass; hence, they tend to bounce off the larger asteroids,
    while the larger asteroids tend to plow through the smaller ones.


    In previous chapters, each actor in the game recorded its state within the game
    scene and then the `GameController` was responsible for using the state of each
    actor to figure out where it should be drawn on the screen. In this chapter, we
    are still following that same pattern, but we are using `Box2D` to tell us where
    each actor is in the scene. Before we look at how this is implemented, let’s get
    an overview of `Box2D` and understand its principles; this will make the explanation
    of the code more clear.


    ## An Overview of Box2D


    `Box2D` is a 2D physics engine for games. It is a library written in C++ so it
    can be used on a wide range of platforms and is available under the permissive
    zlib open-source licenses. In addition to the primary C++ version of `Box2D`,
    there are a large number of ports to other platforms, including Java, C#, JavaScript,
    and a few others. The main developer and driver of the project is Erin Catto,
    who can be contacted through the forum on the `Box2D` website: `http://www.box2d.org.`


    **Note**  Information about the zlib licenses can be found here: `http://en.wikipedia.org/wiki/Zlib_License`


    As mentioned, `Box2D` is written in C++ and not Objective C. This can be a little
    off-putting to a new iOS developer, who is just getting the hang of Objective
    C. Also, there are also some hurdles that must be jumped to make your Xcode project
    play nicely with combined Objective C and C++ code. We will take a brief look
    at setting that up in a moment; for now, though, let’s ignore this hurdle and
    spend some time looking at what `Box2D` is really all about.


    ### The World


    The starting place for all `Box2D` applications is understanding that `Box2D`
    simulates the motion of bodies and joints within a world. Bodies are what you
    would expect—blocks, balls, and other game elements.


    Joints are constraints put on bodies in the world; this includes things like pulleys
    and teeters. We are not going to use joints in our example. These bodies and joints
    are all in a world that describes how they interact with each other. This is analogous
    to how we have Actors in a `GameController`, as in the other chapters in this
    book.


    In addition to being a collection of bodies and joints, a world also describes
    the force of gravity in a simulation. The gravity can be set to any value and
    go in any direction. Since our example is in space, gravity will be set to zero.


    **Note**  Units in the world are assumed to be meters-kilogram-second (MKS). Because
    you probably don’t want one pixel to be one meter, you will want to scale `Box2D`
    coordinates to your display coordinate system.


    A world is also responsible for advancing the simulation, similar to how `GameController`
    advances the location and presentation of each Actor. There are some differences;
    for example, a `Box2D` world advances the simulation a number of seconds (fractions
    of a second, really) into the future, while `GameController` simply advances the
    frame count by 1. This is a subtle distinction, but it means you can adjust how
    much simulated time has passed within the scene. Let’s consider an example to
    see why this is useful. Say you are building a game that runs at 60 frames a second.
    If you are using the `GameController` class, and you adjust the frame rate to
    30 frames a second, the game will appear to be running in slow motion on the device
    (half speed). If you are using the `Box2D` world, and you drop your frame rate
    from 60 to 30 frames a second, you can double the amount of simulated time that
    passes in each frame; this would cause the game to appear to be running at full
    speed—just with lower fidelity in the animations.


    This advantage comes with a price, however. With the `GameController` (and other
    engines that work in the same way), each Actor knows that it has been exactly
    one frame in the animation since the last time it was updated. This makes some
    aspects of game logic very simple; if a particle is supposed to be on the screen
    for 15 frames, you can just count them off and remove the particle. In a `Box2D`
    world, if you want to be able to change the amount of time for a given frame,
    you have to specify the life span of a particle in simulated seconds. Additionally,
    in order to know when to remove the particle, you have to calculate how much time
    has passed since the last time it was checked. This may not seem like a big deal;
    you just have to do a little subtraction. However, if the duration of your particle’s
    life is not evenly divisible by the duration between each frame, your particle
    may exist longer than you intended and can cause some unexpected interactions
    that may be hard to debug.


    Given all this talk about the differences between how `GameController` and a `Box2D`
    world progress the actors in their scenes, you may think that getting these two
    classes to work together is going to be tricky. It is not. We are simply going
    to ignore this issue in this example and not take advantage of this feature of
    `Box2D`. I wanted to point out this difference in case any readers are looking
    to make a complex physics game, in which case they will want to account for this
    early in their design.


    ### The Bodies


    Once a world is created, we want to put something in it—those things are called
    bodies. A body represents the location, angle, velocity, and other physical attributes
    of an object in the world.'
