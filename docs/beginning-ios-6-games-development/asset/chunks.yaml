    \n如果飞船处于转向状态，我们根据`moveToPoint`计算要转向的角度，并将结果存储在变量`theta`中。由于`atan`只返回介于 -π/2 和\
    \ π/2 之间的值，我们测试是否应添加 π 来获得`targetRotation`。一旦获得`targetRotation`值，我们检查`targetRotation`与当前旋转的接近程度。如果它们很接近，我们简单地将`rotation`设置为`targetRotation`，并将`state`更改为`STATE_TRAVELING`。如果尚未达到`targetRotation`值，我们将飞船向`targetRotation`方向旋转一小段。如果飞船正在移动，它会像以前一样向`moveToPoint`移动。\n\
    \n## 总结\n\n在本章中，我们探讨了如何创建逐帧动画，其中游戏中的元素或角色每秒多次逐步更新其位置。您学习了如何将动画循环与设备屏幕的刷新率同步，以及如何以与显示无关的方式描述游戏状态，从而摆脱宿主`UIView`坐标系的束缚。我们通过研究一些创建动画的简单技术并为角色增添生命力，继续深入探讨了这类游戏。\n\
    \n---\n\n## 第 6 章 创建你的角色：游戏引擎、图像角色和行为\n\n在本章和下一章中，我们将为本书中完整游戏使用的角色创建类。但首先，我们需要重构前面章节的代码，以创建构成简单游戏引擎的可重用类。我们将探讨组成该游戏引擎的类和协议，以便您理解它们如何协同工作。\n\
    \n我们将通过引入协议`Representation`来进一步抽象角色在屏幕上的绘制方式，这将允许我们创建基于图像的角色以及程序化绘制的角色（将在下一章中介绍）。协议`Representation`将为我们提供一个共享的\
    \ API，用于处理这两种不同类型的屏幕角色。\n\n我们还将通过协议`Behavior`引入行为的概念。该协议为我们提供了一种模式，用于以可重用的方式描述角色在游戏中的行为。\n\
    \n通过构建我们的第一个角色——能量道具（power-up），您将开始学习如何使用游戏引擎。我们将创建一个示例`GameController`子类，在屏幕上释放一堆能量道具，让您感受这个角色的外观和行为。\n\
    \n### 理解游戏引擎类\n\n我们的简单游戏引擎从两个核心类开始：`GameController`和`Actor`。`GameController`与前一章中的控制器类非常相似，但经过改进以实现更通用的用途。`Actor`类同样得到了改进，以容纳更多类型的`Actor`。`Actor`类还定义了两个协议`Representation`和`Behavior`，用于以不同方式描述每个角色。协议`Representation`描述了创建和更新角色`UIView`所需的任务。协议`Behavior`描述了一个任务，供任何希望创建共享、可重用行为的类来实现。这些类和协议将在以下各节中详细讨论。\n\
    \n### `GameController`类\n\n`GameController`类协调游戏中的角色，并最终负责在屏幕上渲染每个角色。这包括将`GameController`设置为`UIViewController`，定义一种通过`CADisplayLink`重复调用`updateScene`任务的方法，最后回顾`updateScene`如何管理场景中的角色。`GameController`还提供了添加和移除角色的机制。让我们看看`GameController`类的头文件，如清单\
    \ 6-1 所示。\n\n**清单 6-1.** `GameController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <QuartzCore/CADisplayLink.h>\n#import \"Actor.h\"\n```"
- fmt: "```objc\n@interface GameController : UIViewController {\n    IBOutlet UIView*\
    \ actorsView;\n    CADisplayLink* displayLink;\n    NSMutableSet* actors;\n  \
    \  NSMutableDictionary* actorClassToActorSet;\n    NSMutableSet* actorsToBeAdded;\n\
    \    NSMutableSet* actorsToBeRemoved;\n    BOOL workComplete;\n}\n@property (nonatomic)\
    \ long stepNumber;\n@property (nonatomic) CGSize gameAreaSize;\n@property (nonatomic)\
    \ BOOL isSetup;\n@property (nonatomic, strong) NSMutableArray* sortedActorClasses;\n\
    \n-(BOOL)doSetup;\n-(void)displayLinkCalled;\n-(void)updateScene;\n\n-(void)removeActor:(Actor*)actor;\n\
    -(void)addActor:(Actor*)actor;\n-(void)updateViewForActor:(Actor*)actor;\n\n-(void)doAddActors;\n\
    -(void)doRemoveActors;\n-(NSMutableSet*)actorsOfType:(Class)class;\n@end\n```\n\
    \nAs you can see, the header for the class `GameController` extends the class\
    \ `UIViewController`. The `UIView` named `actorsView` is an `IBOutlet` and is\
    \ the `UIView` that contains the views for each actor in the game. We don't want\
    \ to use the Property `view` as the root view for the actors because we may want\
    \ to have other views associated with a `GameController`, such as a background\
    \ image or other `UIViews` placed on top of the game. We will take advantage of\
    \ this setup in a future chapter. For now, all you need to know is that the `UIView\
    \ actorsView` is a sub-view of the Property `view` and will contain all of the\
    \ `actor` views.\n\nIn this listing, you also can see the now familiar `CADisplayLink`,\
    \ as well as various collections. The `NSMutableSet actor` stores all of the actors\
    \ in the game. The `NSMutableDictionary actorClassToActorSet` is used to keep\
    \ track of specific types of actors. The two `NSMutableSets`, `actorsToBeAdded`\
    \ and `actorsToBeRemoved`, are used to keep track of actors that are created during\
    \ a single step of the game and actors that should be removed after the current\
    \ step.\n\nThe last field declared is the BOOL `workComplete`. This is used for\
    \ debugging and will be explained later in this chapter, when we look at how the\
    \ `CADisplayLink` is used. In addition to the fields declared in [Listing 6-1](#9781430244226_Ch06.xhtml#list1),\
    \ we see four properties. The first property, `stepNumber`, keeps track of the\
    \ number of steps that have passed since the game started. `CGSize gameAreaSize`\
    \ is the size of the game area in game coordinates. The BOOL `isSetup` keeps track\
    \ of whether the `GameController` has been set up yet. The last property, `sortedActorClasses`,\
    \ is used to tell the `GameController` which types of actors it should keep track\
    \ of.\n\n## Setting Up `GameController`\n\nThe use of all of the fields and properties\
    \ in [Listing 6-1](#9781430244226_Ch06.xhtml#list1) will be made clear as you\
    \ inspect the implementation of the class `GameController`. Let's start with the\
    \ task `doSetup`, shown in [Listing 6-2](#9781430244226_Ch06.xhtml#list2).\n\n\
    **[Listing 6-2](#9781430244226_Ch06.xhtml#_list2). `GameController.m (doSetup)`**\n\
    \n```objc\n-(BOOL)doSetup {\n    if (!isSetup){\n        gameAreaSize = CGSizeMake(1024,\
    \ 768);\n        actors = [NSMutableSet new];\n        actorsToBeAdded = [NSMutableSet\
    \ new];\n        actorsToBeRemoved = [NSMutableSet new];\n        stepNumber =\
    \ 0;\n        workComplete = true;\n        displayLink = [CADisplayLink displayLinkWithTarget:self\
    \ selector: @selector(displayLinkCalled)];\n        [displayLink addToRunLoop:[NSRunLoop\
    \ currentRunLoop] forMode:NSDefaultRunLoopMode];\n        [displayLink setFrameInterval:1];\n\
    \        isSetup = YES;\n        return YES;\n    }\n    return NO;\n}\n```\n\n\
    Here you can see the setup code for the class `GameController`. Because we want\
    \ to set up a `GameController` only once, we put the setup code inside an if-statement\
    \ governed by the variable `isSetup`. The `isSetup` task will return YES if setup\
    \ was performed, and return NO if setup was not performed.\n\nAs for the actual\
    \ setup of the class, we have to initialize several variables. We start by setting\
    \ the property `gameSizeArea` to a default size. Then we initialize the collection's\
    \ actors, `actorsToBeAdded`, and `actorsToBeRemoved`. Finally, we set the `stepNumber`\
    \ to zero.\n\n## Calling `displayLinkCalled` and `updateScene`\n\nIn [Listing\
    \ 6-2](#9781430244226_Ch06.xhtml#list2), the last step required is to set up the\
    \ `CADisplayLink`. In this chapter, we set up the `CADisplayLink` slightly differently\
    \ from previous examples. Instead of having the `CADisplayLink` call `updateScene`\
    \ directly, we have it call `displayLinkCalled`, which in turn calls `updateScene`,\
    \ as shown in [Listing 6-3](#9781430244226_Ch06.xhtml#list3).\n\n**[Listing 6-3.](#9781430244226_Ch06.xhtml#_list3)\
    \ `GameController.m (displayLinkCalled)`**\n\n```objc\n-(void)displayLinkCalled{\n\
    \    if (workComplete){\n        workComplete = false;\n        @try {\n     \
    \       [self updateScene];\n            workComplete = true;\n        }\n   \
    \     @catch (NSException *exception) {\n            NSLog(@\"%@\", [exception\
    \ reason]);\n            NSLog(@\"%@\", [exception userInfo]);//break point here\n\
    \        }\n    }\n}\n```\n\nThe task `displayLinkCalled` calls `updateScene`\
    \ only if the variable `workComplete` is true. The variable `workComplete` can\
    \ be true only if this is the first time `displayLinkCalled` is called or if `updateScene`\
    \ has completed successfully. If `updateScene` throws an exception, it is logged,\
    \ and `workComplete` is not reset to true. This, in effect, causes the game to\
    \ stop if there are any errors. This is desirable because exceptions raised by\
    \ tasks called by `CADisplayLink` are silently swallowed. To facilitate debugging\
    \ the task `displayLinkCalled`, it is required to both log the exception and halt\
    \ the game, letting the tester know that something has gone wrong. In production,\
    \ you may wish to change this behavior; it might be better to keep the app moving\
    \ even if there was an error. The exact behavior required will depend on the application.\n\
    \n## Updating `updateScene`\n\nThe task `updateScene` is also updated from the\
    \ preceding chapter, as shown in [Listing 6-4](#9781430244226_Ch06.xhtml#list4).\n\
    \n**[Listing 6-4.](#9781430244226_Ch06.xhtml#_list4) `GameController.m (updateScene)`**\n\
    \n```objc\n-(void)updateScene{\n    for (Actor* actor in actors){\n        [actor\
    \ step:self];\n    }\n    for (Actor* actor in actors){\n        for (NSObject<Behavior>*\
    \ behavoir in [actor behaviors]){\n            [behavoir applyToActor:actor In:self];\n\
    \        }\n    }\n    for (Actor* actor in actors){\n        [self updateViewForActor:actor];\n\
    \    }\n    [self doAddActors];\n    [self doRemoveActors];\n    stepNumber++;\n\
    }\n```\n\nIn this listing, we iterate over all of the actors in the game three\
    \ times. In the first loop, we call `step:` on each actor, giving it a chance\
    \ to apply any custom code. In the second loop, we apply each `Behavior` associated\
    \ with the actor. `Behavior` is a protocol that describes some shared behavior\
    \ among actors (this protocol is defined in `Actor.h`, shown later in [Listing\
    \ 6-9](#9781430244226_Ch06.xhtml#list9)). In the third loop, we update the `UIView`\
    \ representing each actor by calling `updateViewForActor:`.\n\nBecause actors\
    \ and behaviors are free to add or remove other actors and we don't want to modify\
    \ the `NSMutableSet actors` while we are iterating over that same collection,\
    \ we have to add and remove actors in two steps. To implement this two-step process,\
    \ we store newly added actors in the `NSMutableSet actorsToBeAdded` and then process\
    \ each actor in that array in the task `doAddActors`. We follow an identical pattern\
    \ for actors to be removed, storing them in the `NSMutableSet actorsToBeRemoved`\
    \ and then processing them in the task `doRemoveActors`.\n\n## Calling `doAddActors`\
    \ and `doRemoveActors`\n\nThe last step we take in `updateScene` is to call `doAddActors`\
    \ and `doRemoveActors`, as shown in [Listing 6-5](#9781430244226_Ch06.xhtml#list5).\n\
    \n**[Listing 6-5.](#9781430244226_Ch06.xhtml#_list5) `GameController.`**"
