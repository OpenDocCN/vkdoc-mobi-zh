  \n图 7-4.  小行星和粒子，放大视图\n\n## Particle 类\n\n我们已经了解了当每个`Asteroid`爆炸时如何创建`Particles`，现在让我们详细看看`Particle`类及其实现。首先从清单\
  \ 7-21 所示的头文件开始。\n\n**清单 7-21.**  Particle.h\n\n```objectivec\n@interface Particle\
  \ : Actor<ExpireAfterTimeDelegate> {\n\t\n}\n@property (nonatomic) float totalStepsAlive;\n\
  +(id)particleAt:(CGPoint)aCenter WithRep:(NSObject<Representation>*)rep Steps:(float)numStepsToLive;\n\
  @end\n```\n\n在清单 7-21 中，`Particle`类的头文件继承了`Actor`并遵守`ExpireAfterTimeDelegate`协议。`Particle`遵守`ExpireAfterTimeDelegate`，因为我们希望在其生命周期内改变粒子的不透明度，使其逐渐淡出。属性`totalStepsAlive`表示粒子在场景中应该存在的时间，它由构造函数`particleAt:WithRep:Steps:`设置。我们还可以看到，粒子需要一个`Representation`作为构造函数的参数传入。`Particle`的实现如清单\
  \ 7-22 所示。\n\n**清单 7-22.**  Particle.m\n\n```objectivec\n@implementation Particle\n\
  @synthesize totalStepsAlive;\n\n+(id)particleAt:(CGPoint)aCenter WithRep:(NSObject<Representation>*)rep\
  \ Steps:(float)numStepsToLive{\n\tParticle* particle = [[Particle alloc] initAt:aCenter\
  \ WithRadius:32 AndRepresentation:rep];\n\n\t[particle setTotalStepsAlive:numStepsToLive];\n\
  \n\tExpireAfterTime* expire = [ExpireAfterTime expireAfter:numStepsToLive];\n\t\
  [expire setDelegate: particle];\n\t[particle addBehavior:expire];\n\n\treturn particle;\n\
  }\n-(void)stepsUpdated:(ExpireAfterTime*)expire In:(GameController*)controller{\n\
  \  self.alpha = [expire stepsRemaining]/totalStepsAlive;\n}\n@end\n```\n\n在清单 7-22\
  \ 中，我们看到构造函数`particleAt:WithRep:Steps:`相当直接。我们创建一个新的`Particle`对象，传入提供的`Representation`对象。我们还设置了属性`totalStepsAlive`，并创建了一个`ExpiresAfterTime\
  \ Behavior`。注意，`particle`被设置为`expire`的`delegate`；这会导致每次执行`expire`时，任务`stepsUpdated:In:`被调用。\n\
  \n在任务`stepsUpdated:In:`中，我们根据`Particle`生命周期所处的阶段，简单地调整其`alpha`值。在一个更复杂的`Particle`实现中，这种淡出行为将是可配置的，不仅仅是开或关，还包括粒子淡出的速率。在这个简单的实现中，每个粒子以线性方式淡出。\n\
  \n我们已经研究了`Asteroid`和`Particle`的实现，发现为场景创建粒子效果相当简单。在下一节中，我们将查看`Comet`角色，并看到一个更具视觉冲击力的示例，尽管其实现同样简单。\n\
