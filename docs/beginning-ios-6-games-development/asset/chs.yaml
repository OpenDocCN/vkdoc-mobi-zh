  ## 第二章 设置您的游戏项目


  与所有软件项目一样，iOS 游戏开发受益于良好的开端。在本章中，我们将讨论设置一个新的 Xcode 项目，作为许多游戏的合适起点。这将包括创建一个可用于在 iPhone
  和 iPad 上部署的项目，同时处理横屏和竖屏方向。


  我们将研究 iOS 应用程序是如何初始化的，以及我们可以在何处开始自定义行为，以匹配我们对应用程序应该如何执行的期望。我们还将探索 iOS 应用程序中用户界面(UI)元素的创建和修改方式，特别关注管理不同设备和方向。


  我们将在本章创建的游戏与第一章中的简单示例非常相似——事实上，玩法完全相同。但我们将为后续章节打下基础，同时练习一些关键技巧，例如使用`UIViewControllers`和
  Interface Builder。


  我们将探索 iOS 应用程序是如何组合在一起的，并解释关键的类。我们还将创建新的 UI 元素，并学习如何使用 Interface Builder 自定义它们。我们还将探索使用
  MVC 模式创建灵活、可重用的代码元素。到本章结束时，我们将创建如图 Figure 2-1 所示的“Rock, Paper, Scissors”应用程序。


  ![9781430244226_Fig02-01.jpg](img/9781430244226_Fig02-01.jpg)


