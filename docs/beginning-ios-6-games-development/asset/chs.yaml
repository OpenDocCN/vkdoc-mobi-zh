  Figure 2-1 展示了在 iPhone 和 iPad 模拟器上运行的应用程序。这是一个所谓的通用应用程序：它可以在这两种设备上运行，并以此方式在 App
  Store 中呈现。除非有特定的商业理由编写仅适用于 iPhone 或 iPad 的应用程序，否则将您的应用程序做成通用版是很有意义的。即使您最初只打算在其中一个设备上发布应用，从长远来看，这也会为您节省时间。


  我们的示例应用程序非常简单，以至于可能很难看出 Figure 2-1 中呈现的四种状态之间的差异。在左上角（iPhone 竖屏方向），灰色区域的位置与左下角 iPhone
  横屏时的布局不同。文本的布局也不同。应用程序在 iPad 上运行时，横屏与竖屏的情况也是如此。让我们开始了解如何设置一个项目来适应这些不同的设备和方向。


