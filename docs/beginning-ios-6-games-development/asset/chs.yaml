  \n## iOS 应用程序的初始化过程\n\n众所周知，iOS 应用程序主要用 Objective-C 编写，而 Objective-C 是 C 语言的超集。Xcode\
  \ 很好地隐藏了应用的构建细节，但在底层，我们知道它使用了 LLVM 和其他常见的 Unix 工具来完成实际工作。由于我们知道项目本质上是一个 C 应用程序，因此可以预期应用程序的入口点是一个\
  \ C 语言的 `main` 函数。事实上，如果你查看 Supporting Files 分组，你会找到 `main.m` 文件，如代码清单 2-1 所示。\n\
  \n**代码清单 2-1.**  `main.m`\n\n```objective-c\n#import <UIKit/UIKit.h>\n\n#import\
  \ \"AppDelegate.h\"\n\nint main(int argc, char *argv[])\n{\n    @autoreleasepool\
  \ {\n        return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate\
  \ class]));\n    }\n}\n```\n\n代码清单 2-1 中的 `main` 函数是一个 C 函数，但你会注意到函数体明显是 Objective-C\
  \ 语法。一个 `@autoreleasepool` 包裹着对 `UIApplicationMain` 的调用。`@autoreleasepool` 为这个应用程序设置了内存管理上下文，我们无需过分担心这一点。`UIApplicationMain`\
  \ 函数为你做了很多有用的事情：它通过查看你的 `info.plist` 文件来初始化应用程序，建立一个事件循环，并通常能让一切以正确的方式启动。事实上，我从未有过修改这个函数的理由，因为\
  \ iOS 提供了一个明确的位置来开始添加你的启动代码。添加初始化代码的最佳位置是在应用委托类的实现文件中的 `application:didFinishLaunchingWithOptions:`\
  \ 任务里。在这个例子中，应用委托类名为 `AppDelegate`。代码清单 2-2 展示了来自 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:`\
  \ 任务的实现。\n\n**代码清单 2-2.**  `application:didFinishLaunchingWithOptions:`:\n\n```objective-c\n\
  - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]] autorelease];\n    // Override point for customization after\
  \ application launch.\n    if ([[UIDevice currentDevice] userInterfaceIdiom] ==\
  \ UIUserInterfaceIdiomPhone) {\n        self.viewController = [[[ViewController_iPhone\
  \ alloc] initWithNibName:@\"ViewController_iPhone\" bundle:nil] autorelease];\n\
  \    } else {\n        self.viewController = [[[ViewController_iPad alloc] initWithNibName:@\"\
  ViewController_iPad\" bundle:nil] autorelease];\n    }\n    self.window.rootViewController\
  \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n```\n\n当一个应用程序完全初始化并准备好开始运行构成它的代码时，`application:didFinishLaunchingWithOptions:`\
  \ 任务就会被调用，如代码清单 2-2 所示。这个任务除了名字特别长之外，还接收一个 `UIApplication` 实例和一个 `NSDictionary`\
  \ 作为参数。`UIApplication` 是一个代表正在运行的应用程序状态的对象。接收此消息的 `AppDelegate` 实例是 `UIApplication`\
  \ 对象的委托。这意味着我们通过在 `AppDelegate` 中实现任务来修改应用程序的行为。`AppDelegate` 所实现的协议 `UIApplicationDelegate`\
  \ 定义了那些将代表应用程序被调用的任务。\n\n\n\n"
