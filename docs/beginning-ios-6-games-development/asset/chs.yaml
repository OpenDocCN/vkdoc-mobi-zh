- '# 第 1 章：第一个简单游戏


  在本章中，你将学习许多关于 iOS 开发的知识。目标当然是能够构建一个在 iOS 上运行的游戏。为此，你必须了解一个完整游戏所包含的许多不同元素，例如基本 UI
  控件、音频、复杂触摸输入、游戏中心、应用内购买，当然还有图形。本书将探讨这些概念以及其他许多内容。你可以将其视为一份构建块指南，这些构建块是你制作一个引人入胜的、专为
  iOS 和 Apple 移动设备量身定制的游戏所必需的。所有 iOS 应用都有一个共同点——应用程序 `Xcode`，因此从它开始是合理的。


  在第一章中，我们将构建一个非常简单的石头-剪刀-布游戏。我们将使用 `Xcode` 的 Storyboard 功能来创建一个包含两个视图以及它们之间导航的应用。




  本书附带示例 Xcode 项目，所有代码示例均直接取自这些项目。这样，您便可以在 Xcode 中逐一跟进。我在创建本书项目时使用了 Xcode 4.5 版本。本章附带的项目名为
  `Sample 1`；您只需按照本章概述的步骤操作，即可轻松自行构建。


  该项目是一个非常简单的游戏，我们使用 Storyboard 创建了两个场景。第一个场景是起始视图，第二个场景是用户玩“石头、剪刀、布”游戏的地方。在第二个场景中，您将添加一个
  `UIView` 并指定其类为 `RockPaperScissorView`。类 `RockPaperScissorView` 的源代码可以在 `Sample
  1` 项目找到。


  我们将逐步介绍这些步骤，但首先让我们快速浏览一下我们的游戏，如 图 1-1 所示。


  ![9781430244226_Fig01-01.jpg](img/9781430244226_Fig01-01.jpg)


  图 1-1.  我们的第一个游戏的两个视图：`Sample 1`


  在 图 1-1 的左侧，我们看到起始视图。它只有一个简单的标题和一个“Play”按钮。当用户点击“Play”按钮时，会转换到图右侧所示的第二个视图。在此视图中，用户可以玩“石头、剪刀、布”。如果用户希望返回起始视图（即主屏幕），可以按下“Back”按钮。这个简单的游戏由
  Xcode 中的 Storyboard 布局和一个实现游戏逻辑的自定义类组成。


  让我们来看看我如何创建这个游戏，以及一些自定义项目的方法。


  ## 在 Xcode 中创建项目：`Sample 1`


  创建这个游戏只需几个步骤，我们将通过它们来初步了解 Xcode。


  首先启动 Xcode。从“File”菜单中选择“New Project”。您将看到一个屏幕，显示可以用 Xcode 创建的项目类型（参见 图 1-2）。


  ![9781430244226_Fig01-02.jpg](img/9781430244226_Fig01-02.jpg)


  图 1-2.  Xcode 中的项目模板


  对于此项目，选择模板“Single View Application”。点击“Next”，系统将提示您为项目命名，如 图 1-3 所示。


  ![9781430244226_Fig01-03.jpg](img/9781430244226_Fig01-03.jpg)


  图 1-3.  命名 Xcode 项目


  为您的项目起任何名字。您给项目起的名字将是包含它的根文件夹的名称。您还需要确保选中“Use Storyboard”和“Use Automatic Reference
  Counting”。


  这次我们将制作一个仅适用于 iPhone 的应用程序，但从“Device Family”下拉菜单中，您也可以选择“iPad”或“Universal”。点击“Next”后，系统会提示您选择一个位置来保存项目。项目可以保存在您电脑上的任何位置。


  在继续之前，让我们花点时间来了解一下 Xcode 项目的组织结构。


  ### 项目的文件结构


  保存新项目后，Xcode 会在您选择的文件夹中创建一个新的单一文件夹。这个单一文件夹将包含该项目。如果需要，您以后可以移动此文件夹，而不会影响项目。图 1-4
  显示了由 Xcode 创建的文件。


  ![9781430244226_Fig01-04.jpg](img/9781430244226_Fig01-04.jpg)


  图 1-4.  Xcode 创建的文件


  在 图 1-4 中，我们看到一个 Finder 窗口，显示了创建的文件结构。我选择了将项目保存在桌面上，因此 Xcode 创建了一个名为 `Sample 1`
  的根文件夹，其中包含 `Sample 1.xcodeproj` 文件。`xcodeproj` 文件是向 Xcode 描述项目的文件，所有资源默认都相对于该文件。保存项目后，Xcode
  会自动打开您的新项目。然后，您可以根据需要开始自定义它。


  ### 自定义您的项目


  我们已经了解了如何创建项目。现在，在继续添加实现游戏逻辑的新 `UIView` 之前，您将学习一些使用 Xcode 自定义项目的知识。


  ### 排列 Xcode 视图以简化操作


  创建新项目后，您可以开始自定义它。此时，您的 Xcode 应该已经打开并显示了新项目。继续点击左侧的 `MainStoryboard.storyboard` 文件，使您的项目看起来像
  图 1-5。


  ![9781430244226_Fig01-05.jpg](img/9781430244226_Fig01-05.jpg)


  图 1-5.  自定义前的 `MainStoryboard.storyboard`


  在 图 1-5 中，我们看到选中了 `MainStoryboard.storyboard` 文件（项目 A）。该文件用于描述多个视图以及它们之间的导航关系。它显示选中的
  storyboard 文件，并描述屏幕右侧的内容。在项目 B 中，我们看到一个名为“View Controller”的项目。这是项目 C 中描述的视图的控制器。项目
  D 处的项目用于放大和缩小 storyboard 视图，对于成功导航至关重要。此外，项目 E 中的按钮用于控制 Xcode 中哪些主面板可见。随意操作这些按钮。


  接下来，让我们看看如何添加一个新视图。


  ### 添加新视图


  当您有机会尝试 Xcode 中可用的不同视图设置后，就可以继续为项目添加新视图了。排列 Xcode，使最右侧的面板可见，如果需要，可以隐藏最左侧的面板。Xcode
  应该看起来像 图 1-6。


  ![9781430244226_Fig01-06.jpg](img/9781430244226_Fig01-06.jpg)


  图 1-6.  包含第二个视图的 Storyboard


  在 图 1-6 中，我们看到已向 storyboard 添加了第二个视图。像任何优秀的 Apple 桌面应用程序一样，大部分工作都是通过拖放完成的。要添加第二个视图，我们在右下角的文本字段（项目
  A）中输入“UIView”。这会过滤列表，以便我们可以将标记为项目 B 的图标拖到中央的工作区域。点击新视图以选中它（参见项目 C），我们可以看到它与项目 D
  中选中的图标相对应。项目 E 显示选中项目的属性。


