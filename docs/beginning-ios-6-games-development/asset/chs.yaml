  \niOS 开发及其相关库大量使用了模型-视图-控制器（MVC）模式。总的来说，MVC 是一种将表现层（View）、数据（Model）和业务逻辑（Controller）分离的策略。具体来说，模型就是数据，比如一个\
  \ `Person` 类或一个 `Address`。视图负责将数据渲染到屏幕上。在 iOS 开发中，这意味着 `UIView` 的一个子类。iOS 提供了一个特殊的类来充当\
  \ `UIView` 的控制器，这个类恰如其分地被命名为 `UIViewController`。\n\n`UIViewController` 有两个关键特征：它通常与一个\
  \ XIB 文件相关联，并且它有一个名为“view”的属性，类型为 `UIView`。通过创建 `UIViewController` 的子类，我们也可以创建一个与类同名的\
  \ XIB 文件。默认情况下，当你实例化一个 `UIViewController` 子类时，它会加载一个同名的 XIB。XIB 中的根 `UIView` 会被连接为\
  \ `UIViewController` 的 `view` 属性。\n\n除了提供用户界面布局与其驱动逻辑之间的清晰分离之外，iOS 还提供了许多期望与其他 `UIViewControllers`\
  \ 而非 `UIViews` 一起工作的 `UIViewController` 子类。一个例子是 `UINavigationController`，它实现了在“设置”应用中找到的那种导航方式。在代码中，当你想前进到下一个视图时，你传递的是一个\
  \ `UIViewController` 而不是一个 `UIView`，尽管屏幕上显示的是 `UIViewController` 的 `view` 属性。\n\n\
