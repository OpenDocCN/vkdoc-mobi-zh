  \ 任务表明我们已经指定了所有想要动画化的 UI 更改，并且应将动画展示给用户。动画类型通过设置 `UIView` 的 `beginAnimations:context:`\
  \ 任务中的上下文字符串来控制。为了实际更改显示的视图，我们只需让 `welcomeView` 通过调用 `removeFromSuperview` 从它的父视图中移除自身，然后通过调用\
