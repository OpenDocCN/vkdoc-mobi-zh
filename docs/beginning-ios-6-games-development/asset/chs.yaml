  \ 5-24。\n\n\n\n"
- "# 排版后的内容\n\n[内容]\n\n**清单 5-24.** `Viper03.m` (`imageName`) 展示了`imageName`任务在`Viper03`类中的实现。\n\
  \n```\n-(NSString*)imageName{ \n    if (self.state == STATE_STOPPED){\n        return\
  \ @\"viper_stopped\";\n    } else if (self.state == STATE_TURNING){\n        if\
  \ (self.clockwise){\n          return @\"viper_clockwise\";\n        } else {\n\
  \          return @\"viper_counterclockwise\";\n        }\n    } else {//STATE_TRAVELING\n\
  \        return @\"viper_traveling\";\n    }\n}\n```\n\n在清单 5-24 中，`viper`名称任务简单地根据对象的状态返回图像名称。如果`state`是`STATE_TURNING`，我们检查属性`clockwise`来决定使用哪个图像。为了实现行为的变化，我们需要查看任务`step:`的新实现，如清单\
  \ 5-25 所示。\n\n**清单 5-25.** `Viper03.m` (`step:`)\n\n```\n-(void)step:(Example03Controller*)controller{\n\
  \    CGPoint c = [self center];\n    if (self.state == STATE_STOPPED){\n       \
  \ if (abs(moveToPoint.x - c.x) < self.speed && abs(moveToPoint.y - c.y) < self.speed){\n\
  \            c.x = moveToPoint.x;\n            c.y = moveToPoint.y;\n          \
  \  [self setCenter:c];\n        } else {\n            self.state = STATE_TURNING;\n\
  \            self.needsImageUpdated = YES;\n        }\n    } else if (self.state\
  \ == STATE_TURNING){\n        float dx = (moveToPoint.x - c.x);\n        float dy\
  \ = (moveToPoint.y - c.y);\n        float theta = -atan(dx/dy);\n        float targetRotation;\n\
  \        if (dy > 0){\n            targetRotation = theta + M_PI;\n        } else\
  \ {\n            targetRotation = theta;\n        }\n        if ( fabsf(self.rotation\
  \ - targetRotation) < .1){\n            self.rotation = targetRotation;\n      \
  \      self.state = STATE_TRAVELING;\n            self.needsImageUpdated = YES;\n\
  \            return;\n        }\n        if (self.rotation - targetRotation < 0){\n\
  \            self.rotation += .1;\n            self.clockwise = YES;\n         \
  \   self.needsImageUpdated = YES;\n        } else {\n            self.rotation -=\
  \ .1;\n            self.clockwise = NO;\n            self.needsImageUpdated = YES;\n\
  \        }\n    } else {//STATE_TRAVELING\n        float dx = (moveToPoint.x - c.x);\n\
  \        float dy = (moveToPoint.y - c.y);\n        float theta = atan(dy/dx);\n\
  \        float dxf = cos(theta) * self.speed;\n        float dyf = sin(theta) *\
  \ self.speed;\n        if (dx < 0){\n            dxf *= -1;\n            dyf *=\
  \ -1;\n        }\n        c.x += dxf;\n        c.y += dyf;\n        if (abs(moveToPoint.x\
  \ - c.x) < self.speed && abs(moveToPoint.y - c.y) < self.speed){\n            c.x\
  \ = moveToPoint.x;\n            c.y = moveToPoint.y;\n            self.state = STATE_STOPPED;\n\
  \            self.needsImageUpdated = YES;\n        }\n        [self setCenter:c];\n\
  \    }\n}\n```\n\n在清单 5-25 中，我们看到现在有一组`if`语句根据飞船的状态来控制其行为。如果飞船处于停止状态，我们检查它是否应保持停止；如果不是，我们切换到转向状态，并通过将`needsImageUpdated`设置为`YES`来指示需要更新图像。\n\
  \n如果飞船处于转向状态，我们根据`moveToPoint`计算要转向的角度，并将结果存储在变量`theta`中。由于`atan`只返回介于 -π/2 和 π/2\
  \ 之间的值，我们测试是否应添加 π 来获得`targetRotation`。一旦获得`targetRotation`值，我们检查`targetRotation`与当前旋转的接近程度。如果它们很接近，我们简单地将`rotation`设置为`targetRotation`，并将`state`更改为`STATE_TRAVELING`。如果尚未达到`targetRotation`值，我们将飞船向`targetRotation`方向旋转一小段。如果飞船正在移动，它会像以前一样向`moveToPoint`移动。\n\
  \n## 总结\n\n在本章中，我们探讨了如何创建逐帧动画，其中游戏中的元素或角色每秒多次逐步更新其位置。您学习了如何将动画循环与设备屏幕的刷新率同步，以及如何以与显示无关的方式描述游戏状态，从而摆脱宿主`UIView`坐标系的束缚。我们通过研究一些创建动画的简单技术并为角色增添生命力，继续深入探讨了这类游戏。\n\
  \n---\n\n## 第 6 章 创建你的角色：游戏引擎、图像角色和行为\n\n在本章和下一章中，我们将为本书中完整游戏使用的角色创建类。但首先，我们需要重构前面章节的代码，以创建构成简单游戏引擎的可重用类。我们将探讨组成该游戏引擎的类和协议，以便您理解它们如何协同工作。\n\
  \n我们将通过引入协议`Representation`来进一步抽象角色在屏幕上的绘制方式，这将允许我们创建基于图像的角色以及程序化绘制的角色（将在下一章中介绍）。协议`Representation`将为我们提供一个共享的\
  \ API，用于处理这两种不同类型的屏幕角色。\n\n我们还将通过协议`Behavior`引入行为的概念。该协议为我们提供了一种模式，用于以可重用的方式描述角色在游戏中的行为。\n\
  \n通过构建我们的第一个角色——能量道具（power-up），您将开始学习如何使用游戏引擎。我们将创建一个示例`GameController`子类，在屏幕上释放一堆能量道具，让您感受这个角色的外观和行为。\n\
  \n## 理解游戏引擎类\n\n我们的简单游戏引擎从两个核心类开始：`GameController`和`Actor`。`GameController`与前一章中的控制器类非常相似，但经过改进以实现更通用的用途。`Actor`类同样得到了改进，以容纳更多类型的`Actor`。`Actor`类还定义了两个协议`Representation`和`Behavior`，用于以不同方式描述每个角色。协议`Representation`描述了创建和更新角色`UIView`所需的任务。协议`Behavior`描述了一个任务，供任何希望创建共享、可重用行为的类来实现。这些类和协议将在以下各节中详细讨论。\n\
  \n### `GameController`类\n\n`GameController`类协调游戏中的角色，并最终负责在屏幕上渲染每个角色。这包括将`GameController`设置为`UIViewController`，定义一种通过`CADisplayLink`重复调用`updateScene`任务的方法，最后回顾`updateScene`如何管理场景中的角色。`GameController`还提供了添加和移除角色的机制。让我们看看`GameController`类的头文件，如清单\
  \ 6-1 所示。\n\n**清单 6-1.** `GameController.h`\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <QuartzCore/CADisplayLink.h>\n#import \"Actor.h\"\n```\n\n```objc\n@interface\
  \ GameController : UIViewController {\n    IBOutlet UIView* actorsView;\n    CADisplayLink*\
  \ displayLink;\n    NSMutableSet* actors;\n    NSMutableDictionary* actorClassToActorSet;\n\
  \    NSMutableSet* actorsToBeAdded;\n    NSMutableSet* actorsToBeRemoved;\n    BOOL\
  \ workComplete;\n}\n@property (nonatomic) long stepNumber;\n@property (nonatomic)\
  \ CGSize gameAreaSize;\n@property (nonatomic) BOOL isSetup;\n@property (nonatomic,\
  \ strong) NSMutableArray* sortedActorClasses;\n\n-(BOOL)doSetup;\n-(void)displayLinkCalled;\n\
  -(void)updateScene;\n\n-(void)removeActor:(Actor*)actor;\n-(void)addActor:(Actor*)actor;\n\
  -(void)updateViewForActor:(Actor*)actor;\n\n-(void)doAddActors;\n-(void)doRemoveActors;\n\
  -(NSMutableSet*)actorsOfType:(Class)class;\n@end\n```\n\n如你所见，类 `GameController`\
  \ 的头文件继承自类 `UIViewController`。名为 `actorsView` 的 `UIView` 是一个 `IBOutlet`，它是游戏中每个角色的视图容器。我们不希望使用属性\
  \ `view` 作为角色的根视图，因为 `GameController` 可能还需要关联其他视图，例如背景图片或游戏上层的其他 `UIView`。我们将在后续章节利用这一设计。现在你只需要知道，`UIView\
  \ actorsView` 是属性 `view` 的子视图，并且将包含所有角色的视图。\n\n在这个代码清单中，你还可以看到熟悉的 `CADisplayLink`，以及各种集合。`NSMutableSet\
  \ actor` 存储了游戏中所有角色。`NSMutableDictionary actorClassToActorSet` 用于跟踪特定类型的角色。两个 `NSMutableSets`（`actorsToBeAdded`\
  \ 和 `actorsToBeRemoved`）用于跟踪在游戏单步执行期间创建的角色，以及当前步骤结束后应移除的角色。\n\n最后声明的字段是布尔值 `workComplete`。它用于调试，将在本章后续探讨如何使用\
  \ `CADisplayLink` 时说明。除列表 6-1 中声明的字段外，我们还看到四个属性。第一个属性 `stepNumber` 记录游戏开始后经过的步数。`CGSize\
  \ gameAreaSize` 是游戏坐标系下游戏区域的大小。布尔值 `isSetup` 记录 `GameController` 是否已完成设置。最后一个属性\
  \ `sortedActorClasses` 用于告知 `GameController` 应跟踪哪些类型的角色。\n\n## 设置 `GameController`\n\
  \n当你审视类 `GameController` 的实现时，列表 6-1 中所有字段和属性的用途将变得清晰。我们先从列表 6-2 所示的 `doSetup` 任务开始。\n\
  \n**列表 6-2. `GameController.m (doSetup)`**\n\n```objc\n-(BOOL)doSetup {\n    if\
  \ (!isSetup){\n        gameAreaSize = CGSizeMake(1024, 768);\n        actors = [NSMutableSet\
  \ new];\n        actorsToBeAdded = [NSMutableSet new];\n        actorsToBeRemoved\
  \ = [NSMutableSet new];\n        stepNumber = 0;\n        workComplete = true;\n\
  \        displayLink = [CADisplayLink displayLinkWithTarget:self selector: @selector(displayLinkCalled)];\n\
  \        [displayLink addToRunLoop:[NSRunLoop currentRunLoop] forMode:NSDefaultRunLoopMode];\n\
  \        [displayLink setFrameInterval:1];\n        isSetup = YES;\n        return\
  \ YES;\n    }\n    return NO;\n}\n```\n\n这里可以看到类 `GameController` 的设置代码。由于我们只希望设置一次\
  \ `GameController`，因此将设置代码放在由变量 `isSetup` 控制的 if 语句中。如果执行了设置，`isSetup` 任务将返回 YES；如果未执行设置，则返回\
  \ NO。\n\n关于类的实际设置，我们需要初始化几个变量。首先将属性 `gameSizeArea` 设置为默认大小。然后初始化集合 `actors`、`actorsToBeAdded`\
  \ 和 `actorsToBeRemoved`。最后将 `stepNumber` 设置为零。\n\n## 调用 `displayLinkCalled` 和 `updateScene`\n\
  \n在列表 6-2 中，最后一步需要设置 `CADisplayLink`。在本章中，我们设置 `CADisplayLink` 的方式与之前的示例略有不同。我们没有让\
  \ `CADisplayLink` 直接调用 `updateScene`，而是让它调用 `displayLinkCalled`，再由后者调用 `updateScene`，如列表\
  \ 6-3 所示。\n\n**列表 6-3. `GameController.m (displayLinkCalled)`**\n\n```objc\n-(void)displayLinkCalled{\n\
  \    if (workComplete){\n        workComplete = false;\n        @try {\n       \
  \     [self updateScene];\n            workComplete = true;\n        }\n       \
  \ @catch (NSException *exception) {\n            NSLog(@\"%@\", [exception reason]);\n\
  \            NSLog(@\"%@\", [exception userInfo]);//此处设置断点\n        }\n    }\n}\n\
  ```\n\n任务 `displayLinkCalled` 仅在变量 `workComplete` 为 true 时才调用 `updateScene`。变量 `workComplete`\
  \ 为 true 的情况仅包括：`displayLinkCalled` 首次被调用时，或者 `updateScene` 已成功完成时。如果 `updateScene`\
  \ 抛出异常，该异常会被记录，并且 `workComplete` 不会重置为 true。实际上，这会导致游戏在出现任何错误时停止。这样做是理想的，因为 `CADisplayLink`\
  \ 调用的任务所引发的异常会被静默吞噬。为了便于调试 `displayLinkCalled` 任务，既需要记录异常，也需要暂停游戏，从而让测试人员知晓出现了问题。在生产环境中，你可能希望改变这种行为；即使出现错误，让应用继续运行或许更好。具体所需的行为取决于应用场景。\n\
  \n## 更新 `updateScene`\n\n任务 `updateScene` 也相比前一章进行了更新，如列表 6-4 所示。\n\n**列表 6-4. `GameController.m\
  \ (updateScene)`**\n\n```objc\n-(void)updateScene{\n    for (Actor* actor in actors){\n\
  \        [actor step:self];\n    }\n    for (Actor* actor in actors){\n        for\
  \ (NSObject<Behavior>* behavoir in [actor behaviors]){\n            [behavoir applyToActor:actor\
  \ In:self];\n        }\n    }\n    for (Actor* actor in actors){\n        [self\
  \ updateViewForActor:actor];\n    }\n    [self doAddActors];\n    [self doRemoveActors];\n\
  \    stepNumber++;\n}\n```\n\n在此代码清单中，我们对游戏中的所有角色迭代了三次。在第一个循环中，我们对每个角色调用 `step:`，给它一个机会执行任何自定义代码。在第二个循环中，我们应用与角色关联的每个\
  \ `Behavior`。`Behavior` 是一个描述角色间某些共享行为的协议（该协议定义在 `Actor.h` 中，后续在列表 6-9 中展示）。在第三个循环中，我们通过调用\
  \ `updateViewForActor:` 更新代表每个角色的 `UIView`。\n\n由于角色和行为可以自由添加或移除其他角色，并且我们不希望在迭代 `NSMutableSet\
  \ actors` 集合的同时修改它，因此我们必须分两步来添加和移除角色。为了实现这一两步过程，我们将新添加的角色存储在 `NSMutableSet actorsToBeAdded`\
  \ 中，然后在任务 `doAddActors` 中处理该集合中的每个角色。对于要移除的角色，我们采用完全相同的模式：将它们存储在 `NSMutableSet actorsToBeRemoved`\
  \ 中，然后在任务 `doRemoveActors` 中处理它们。\n\n## 调用 `doAddActors` 和 `doRemoveActors`\n\n\
  我们在 `updateScene` 中执行的最后一步是调用 `doAddActors` 和 `doRemoveActors`，如列表 6-5 所示。\n\n**列表\
  \ 6-5. `GameController.`**\n\n\n`m (doAddActors` 和 `doRemoveActors` 方法)\n\n```\n\
  -(void)doAddActors{\n    for (Actor* actor in actorsToBeAdded){\n        [actors\
  \ addObject:actor];\n        UIView* view = [[actor representation] getViewForActor:actor\
  \ In:self];\n        [view setFrame:CGRectMake(0, 0, 0, 0)];\n        [actorsView\
  \ addSubview:view];\n        NSMutableSet* sorted = [actorClassToActorSet valueForKey:[[actor\
  \ class] description]];\n        [sorted addObject:actor];\n    }\n    [actorsToBeAdded\
  \ removeAllObjects];\n}\n-(void)doRemoveActors{\n    for (Actor* actor in actorsToBeRemoved){\n\
  \        UIView* view = [[actor representation] getViewForActor:actor In:self];\n\
  \        [view removeFromSuperview];\n        NSMutableSet* sorted = [actorClassToActorSet\
  \ valueForKey:[[actor class] description]];\n        [sorted removeObject:actor];\n\
  \        [actors removeObject:actor];\n    }\n    [actorsToBeRemoved removeAllObjects];\n\
  }\n```\n\n任务`doAddActors`遍历`NSMutableSet actorsToBeAdded`中的所有演员，并将每个演员添加到`NSMutableSet\
  \ actors`中。此外，它还会从演员的`representation`属性中获取每个演员的`UIView`，并将其作为`actorsView`的子视图添加。属性`representation`是一个符合`Representation`协议（如`Actor.h`中定义，见清单\
  \ 6-9）的`NSObject`。添加视图后，我们在`NSMutableDictionary actorClassToActorSet`中找到对应于该演员类的`NSMutableSet\
  \ sorted`，然后将该演员添加到其中。这样，我们之后就可以通过在`NSMutableDictionary actorClassToActorSet`中快速查找，找到特定类型的所有演员。`doAddActors`的最后一步是从集合`actorsToBeAdded`中移除所有演员。\n\
  \n在前面的代码清单中，我们看到与任务`doAddActors`并行的任务`doRemoveActors`。在`doRemoveActors`中，`NSMutableSet\
  \ actorsToBeRemoved`中的每个演员，其关联的`UIView`会从其父视图中移除，并从相应的`NSMutableSet sorted`中移除。每个演员也会从`NSMutableSet\
  \ actors`中移除。最后，通过调用`removeAllObjects`清空`NSMutableSet actorsToBeRemoved`中的所有演员。\n\
  \n## 添加和移除演员\n\n要向游戏中添加或移除演员，我们分别调用`addActor`或`removeActor`，如清单 6-6 所示。\n\n**清单\
  \ 6-6. `GameController.m (addActor` 和 `removeActor 方法)`**\n\n```\n-(void)addActor:(Actor*)actor{\n\
  \    [actor setAdded:YES];\n    [actorsToBeAdded addObject:actor];\n}\n-(void)removeActor:(Actor*)actor{\n\
  \    [actor setRemoved:YES];\n    [actorsToBeRemoved addObject:actor];\n}\n```\n\
  \n在清单 6-6 中，您可以看到两个非常简单的任务：`addActor`和`removeActor`。在`addActor`中，传入的演员在添加到`NSMutableSet\
  \ actorsToBeAdded`之前，其`added`属性被设置为`YES`。类似地，在`removeActor`任务中，传入的演员的`removed`属性被设置为`YES`，并被添加到`NSMutableSet\
  \ actorsToBeRemoved`中。\n\n之前，在清单 6-5 中，当演员被添加或移除时，我们也将其从存储在`NSMutableDictionary\
  \ actorClassToActorSet`中的集合中添加或移除。这样做是为了无需遍历整个`actors`集合就能找到给定类型的所有演员。然而，我们并不希望为游戏中的每种演员类型都维护一个独立的集合。我们只想跟踪游戏逻辑中需要访问的演员类型。\n\
  \n## 排序演员\n\n`setSortedActorClasses`任务用于指定哪些演员应该被排序，如清单 6-7 所示。\n\n**清单 6-7. `GameController.m\
  \ (setSortedActorClasses:)`**\n\n```\n-(void)setSortedActorClasses:(NSMutableArray\
  \ *)aSortedActorClasses{\n    [sortedActorClasses removeAllObjects];\n    sortedActorClasses\
  \ = aSortedActorClasses;\n\n    [actorClassToActorSet removeAllObjects];\n    actorClassToActorSet\
  \ = [NSMutableDictionary new];\n\n    for (Class class in sortedActorClasses){\n\
  \        [actorClassToActorSet setValue: [NSMutableSet new] forKey:[class description]];\n\
  \    }\n\n    for (Actor* actor in actors){\n        NSMutableSet* sorted = [actorClassToActorSet\
  \ objectForKey:[[actor class] description]];\n        [sorted addObject:actor];\n\
  \    }\n}\n```\n\n我们首先进行一些内存管理，移除`NSMutableArray sortedActorClasses`中的所有对象，释放它，然后将`sortedActorClasses`重新赋值为传入的`NSMutableArray\
  \ aSortedActorClasses`。接下来，我们清理旧的`NSMutableDictionary actorClassToActorSet`。完成记账工作后，我们为`sortedActorClasses`中的每个类向`actorClassToActorSet`添加一个新的`NSMutableSet`。最后，我们遍历所有演员，并将每个演员添加到相应的`NSMutableSet`中。最后这一步是必要的，以允许在应用程序中多次调用`setSortedActorClasses`。但考虑到这是一个相对昂贵的操作，最好在游戏开始时只调用一次`setSortedActorClasses`。\n\
  \n## 管理`UIView`\n\n对`GameController`类的最后一项改进是`updateViewForActor:`任务，如清单 6-8 所示。\n\
  \n**清单 6-8. `GameController.m (updateViewForActor:)`**\n\n```\n-(void)updateViewForActor:(Actor*)actor{\n\
  \    NSObject<Representation>* rep = [actor representation];\n\n    UIView* actorView\
  \ = [rep getViewForActor:actor In:self];\n    [rep updateView:actorView ForActor:actor\
  \ In:self];\n\n    float xFactor = actorsView.frame.size.width/self.gameAreaSize.width;\n\
  \    float yFactor = actorsView.frame.size.height/self.gameAreaSize.height;\n\n\
  \    float x = (actor.center.x-actor.radius)*xFactor;\n    float y = (actor.center.y-actor.radius)*yFactor;\n\
  \    float width = actor.radius*xFactor*2;\n    float height = actor.radius*yFactor*2;\n\
  \    CGRect frame = CGRectMake(x, y, width, height);\n\n    actorView.transform\
  \ = CGAffineTransformIdentity;\n    [actorView setFrame:frame];\n    actorView.transform\
  \ = CGAffineTransformRotate(actorView.transform, [actor rotation]);\n\n    [actorView\
  \ setAlpha:[actor alpha]];\n}\n```\n\n任务`updateViewForActor:`负责管理与每个演员关联的`UIView`。在该任务的第一行，我们获取演员的`representation`属性并将其存储在变量`rep`中。变量`rep`是一个符合`Representation`协议的`NSObject`。协议`Representation`在`Actor.h`中定义（稍后见清单\
  \ 6-9），描述了如何创建和更新给定演员的`UIView`。当调用`getViewForActor:In:`时会创建`UIView`。当`UIView`需要更新以反映演员的变化时，会调用`updateView:ForActor:In:`任务。这两个任务将在本章后面讨论。\n\
  \n确定`UIView actorView`后，我们计算其父视图中它应该占据的区域。此计算的细节已在第 5 章中描述。然而，我们添加了两个新特性：我们根据演员的`rotation`属性旋转`actorView`，并且设置了`actorView`的`alpha`值，允许演员在游戏过程中改变其不透明度。\n\
  \n现在我们已经了解了`GameController`类以及它如何管理游戏中的演员，接下来让我们看看`Actor`类，以便您理解它如何允许多种不同类型演员在任何游戏中存在。\n\
  \n## Actor 类\n\n`Actor`类是游戏所有演员的超类。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n它主要提供关于角色位置的信息，但也描述了指示角色如何行为以及在屏幕上如何呈现的协议。在本节中，我们将查看`Actor`是如何实现的，然后看一些具体的例子。首先，我们来看一下`Actor`类的头文件，如列表\
  \ 6-9 所示。\n\n**列表 6-9. `Actor.h`**\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  \n@class GameController, Actor;\n\n@protocol Representation\n-(UIView*)getViewForActor:(Actor*)anActor\
  \ In:(GameController*)aController;\n-(void)updateView:(UIView*)aView ForActor:(Actor*)anActor\
  \ In:(GameController*)aController;\n@end\n\n@protocol Behavior\n-(void)applyToActor:(Actor*)anActor\
  \ In:(GameController*)gameController;\n@end\n\nlong nextId;\n@interface Actor :\
  \ NSObject {\n\n}\n//State\n@property (nonatomic, strong) NSNumber* actorId;\n@property\
  \ (nonatomic) BOOL added;\n@property (nonatomic) BOOL removed;\n\n//Geometry\n@property\
  \ (nonatomic) CGPoint center;\n@property (nonatomic) float rotation;\n@property\
  \ (nonatomic) float speed;\n@property (nonatomic) float radius;\n\n//Behavoir\n\
  @property (nonatomic, strong) NSMutableArray<Behavior>* behaviors;\n\n//Representation\n\
  @property (nonatomic) BOOL needsViewUpdated;\n@property (nonatomic, strong) NSObject<Representation>*\
  \ representation;\n@property (nonatomic) int variant;\n@property (nonatomic) int\
  \ state;\n@property (nonatomic) float alpha;\n\n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius\
  \ AndRepresentation:(NSObject<Representation>*)aRepresentation;\n-(void)step:(GameController*)controller;\n\
  -(BOOL)overlapsWith: (Actor*) actor;\n-(void)addBehavior:(NSObject<Behavior>*)behavior;\n\
  \n+(CGPoint)randomPointAround:(CGPoint)aCenter At:(float)aRadius;\n@end\n```\n\n\
  在这里，定义了协议`Representation`。任何负责管理与角色关联的`UIView`的对象都必须遵循此协议。这里的想法是，至少有两种`UIView`用于绘制角色：基于图像的视图和基于程序化绘图的视图。还可以有其他方式来实现代表角色的`UIView`，例如包含子视图的`UIView`。本章不涉及这个例子，但我们会在本章讨论基于图像的角色，并在下一章讨论基于矢量的角色。\n\
  \n无论角色的`UIView`如何实现，`GameController`类都需要知道如何获取正确`UIView`的引用，并给`Representation`更新其外观的机会。因此，我们有两个必需的任务：`getViewForActor:In:`和`updateView:ForActor:In:`。\n\
  \n在前面的列表中，我们看到了第二个名为`Behavior`的协议。我们将创建一些简单的类来描述角色的特定行为，这些行为可以在不同类型的角色之间共享。例如，我们将创建一个名为`LinearMotion`的行为，它描述角色如何在屏幕上移动。几种类型的角色将使用此行为。这就是`Behavior`协议的作用所在；它提供了一个必需的单一任务`applyToActor:From:`，该任务将在游戏的每一步由`GameController`调用。\n\
  \n该列表还显示了许多属性。其中许多属性应该在前一章中已经熟悉——包括`center`、`speed`和`radius`。还添加了一些新属性，以使`Actor`类尽可能可重用。添加的属性`added`和`removed`用于跟踪角色是否已从游戏中添加或移除。\n\
  \n属性`behaviors`是一个`NSMutableArray`，包含遵循`Behavior`协议的对象。通过向`behaviors`属性添加`Behavior`对象，我们可以自定义每个角色的行为方式。这可以简单到描述角色的运动，也可以复杂到实现人工智能。\n\
  \n我们提供了一个名为`addBehavior:`的特殊任务，它是获取`NSMutableArray` `behaviors`并添加`Behavior`对象的简写方式。`addBehavior:`任务还让我们有机会延迟加载`NSMutableArray`\
  \ `behaviors`，这样如果我们不需要它，就不会创建它。\n\n你还可以在列表 6-9 中看到，我们添加了`variant`和`state`属性。角色通常需要这两个属性，因此为了简单起见，它们被包含在`Actor`类中。属性`variant`可用于描述属于同一类、行为相同但颜色可能不同的角色——例如，吃豆人游戏中不同颜色的幽灵。属性`state`用于跟踪角色在其生命周期中可能具有的不同状态。再次以幽灵为例，状态可能包括“在监狱中”、“追击中”和“逃跑中”。最后一个属性是`alpha`，用于描述角色在屏幕上的透明度。\n\
  \n列表 6-9 中定义的任务基本上与前一章中为`Actor`类描述的任务相同。这里唯一的实际区别是，当角色被初始化时，必须传入一个`Representation`。我们还添加了一个实用任务`randomPointAround:At:`，用于在围绕点`aPoint`、半径为`aRadius`的圆上创建一个随机点。\n\
  \n## 实现 Actor\n\n`Actor`类的实现如列表 6-10 所示。\n\n**列表 6-10. `Actor.m`**\n\n```objectivec\n\
  #import \"Actor.h\"\n\n@implementation Actor\n@synthesize actorId;\n@synthesize\
  \ added;\n@synthesize removed;\n@synthesize center;\n@synthesize rotation;\n@synthesize\
  \ speed;\n@synthesize radius;\n@synthesize needsViewUpdated;\n@synthesize representation;\n\
  @synthesize variant;\n@synthesize state;\n@synthesize alpha;\n@synthesize behaviors;\n\
  \n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius AndRepresentation:(NSObject<Representation>*)aRepresentation{\n\
  \    self = [super init];\n    if (self != nil){\n        [self setActorId:[NSNumber\
  \ numberWithLong:nextId++]];\n        [self setCenter:aPoint];\n        [self setRotation:0];\n\
  \        [self setRadius:aRadius];\n        [self setRepresentation:aRepresentation];\n\
  \        [self setAlpha:1.0];\n    }\n    return self;\n}\n-(void)step:(GameController*)controller{\n\
  \    //implemented by subclasses.\n}\n-(BOOL)overlapsWith: (Actor*) actor {\n  \
  \      float xdist = abs(self.center.x - actor.center.x);\n        float ydist =\
  \ abs(self.center.y - actor.center.y);\n    float distance = sqrtf(xdist*xdist+ydist*ydist);\n\
  \    return distance < self.radius + actor.radius;\n}\n-(void)setVariant:(int)aVariant{\n\
  \    if (aVariant != variant){\n        variant = aVariant;\n        needsViewUpdated\
  \ = YES;\n    }\n}\n-(void)setState:(int)aState{\n    if (aState != state){\n  \
  \      state = aState;\n        needsViewUpdated = YES;\n    }\n}\n-(void)addBehavior:(NSObject<Behavior>*)behavior{\n\
  \    if (behaviors == nil){\n        behaviors = [NSMutableArray new];\n    }\n\
  \    [behaviors addObject:behavior];\n}\n\n+(CGPoint)randomPointAround:(CGPoint)aCenter\
  \ At:(float)aRadius{\n    float direction = arc4random()%1000/1000.0 * M_PI*2;\n\
  \    return CGPointMake(aCenter.x + cosf(direction)*aRadius, aCenter.y + sinf(direction)*aRadius);\n\
  }\n@end\n```\n\n在此文件顶部，我们看到我们简单地为类的每个属性使用了`@synthesize`来创建 getter 和 setter 任务，但`state`和`variant`属性除外。我们为`state`和`variant`属性的\
  \ setter 任务定义了自定义实现，以便当这些值改变时，将`needsViewUpdated`设置为`YES`。这样做是为了确保当角色的`state`或`variant`属性发生变化时，角色的`Representation`会更新代表该角色的`UIView`。\n\
  \n任务`initAt:WithRadius:AndRepresentation:`简单地初始化角色并设置传入的属性。我们还将`alpha`属性设置为 1。\n\
  \n\n\n0，因此默认情况下角色完全不透明。\n\n## 使用强化道具角色\n\n在前一节中，我们研究了`GameController`和`Actor`类，了解到`Actor`类需要`Representation`对象才能显示。`Representation`协议描述了类在管理与角色关联的`UIView`时需要满足的要求。在本节中，我们将探讨`ImageRepresentation`类，并了解它如何使用图像来表示角色。在上一章中，我们使用图像绘制了不同的角色。在本节中，我们将展示如何将这些技术整合到一个简单、可重用的`ImageRepresentation`类中。\n\
  \n为了说明`ImageRepresentation`，在我们的第一个示例中，我们将创建强化道具并让它们在屏幕上动画显示，如图 6-1 所示。\n\n![9781430244226_Fig06-01.jpg](img/9781430244226_Fig06-01.jpg)\n\
  \n图 6-1.  示例 1——强化道具\n\n在图像中，您可以看到几个圆柱体，上面有三个符号：美元符号、点和叉号。当此示例运行时，每个圆柱体沿直线移动。当一个圆柱体到达屏幕边缘时，它会环绕到对侧边缘。当每个圆柱体移动时，它还会看起来绕自身旋转或翻滚。几秒钟后，每个圆柱体上的条纹和符号将开始闪烁，提示它即将消失。当您启动示例时，屏幕上不会有强化道具，但每\
  \ 5 秒，就会有一个新的强化道具在`屏幕外`生成并漂入视野。让我们仔细看看用于创建此动画的图像。参见 图 6-2。\n\n![9781430244226_Fig06-02.jpg](img/9781430244226_Fig06-02.jpg)\n\
  \n图 6-2.  强化道具细节\n\n图 6-2 的顶部展示了构成带发光效果的旋转“生命”强化道具的 63 幅图像的起始和结束。在示例代码中，您将找到六组图像：每种类型的强化道具都有一个发光版本和一个`不发光`版本。通过在发光版本和`不发光`版本之间切换，我们可以创建闪烁效果。\n\
  \n## 实现我们的强化道具角色\n\n为了实现我们的强化道具角色，我们必须配置`GameController`的子类`Example01Controller`，以便将强化道具添加到场景中。我们还需要实现强化道具角色本身，为其提供绘制自身以及定义其运动和行为的途径。关键类是`ImageRepresentation`和`Powerup`，但我们应该从`Example01Controller`类的`updateScene`任务开始，如\
  \ 代码清单 6-11 所示。\n\n**代码清单 6-11.  `Example01Controller.m (updateScene)`**\n\n```\
  \  \n-(void)updateScene{  \n    if (self.stepNumber % (60*5) == 0){  \n        [self\
  \ addActor:[Powerup powerup: self]];  \n    }  \n    [super updateScene];  \n} \
  \ \n```\n\n这里您可以看到`Example01Controller`类中定义的`updateScene`任务。`Example01Controller`类继承自`GameController`，因此它继承了该类中定义的游戏引擎逻辑。`updateScene`任务简单地每\
  \ 5 秒添加一个新的强化道具，然后调用`updateScene`的父类实现。`Powerup`类的头文件如 代码清单 6-12 所示。\n\n**代码清单 6-12.\
  \  `Powerup.h`**\n\n```  \n#import <Foundation/Foundation.h>  \n#import \"Actor.h\"\
  \  \n#import \"ImageRepresentation.h\"  \n#import \"ExpireAfterTime.h\"  \n\nenum{\
  \  \n    STATE_GLOW = 0,  \n    STATE_NO_GLOW,  \n    PWR_STATE_COUNT  \n};  \n\n\
  enum{  \n    VARIATION_HEALTH = 0,  \n    VARIATION_CASH,  \n    VARIATION_DAMAGE,\
  \  \n    PWR_VARIATION_COUNT  \n};  \n\n@interface Powerup : Actor <ImageRepresentationDelegate,ExpireAfterTimeDelegate>{\
  \  \n\n}  \n\n+(id)powerup:(GameController*)aController;  \n\n@end  \n```\n\n此头文件首先定义了两个枚举。第一个枚举定义了`Powerup`的两种状态`STATE_GLOW`或`STATE_NO_GLOW`的值。第二个枚举定义了`Powerup`的三种变体的值。这两个枚举都以包含`COUNT`一词的值结尾。对于不是来自\
  \ C 背景的开发者来说，这是一种用于为枚举中项目数量创建常量的老技巧。例如，在第一个枚举中，`STATE_GLOW`的值为 0，因此`STATE_NO_GLOW`的值为\
  \ 1。这使`PWR_STATE_COUNT`的值为 2，也就是状态的数量。很巧妙，不是吗？\n\n代码清单 6-12 中定义的`Powerup`类继承自`Actor`。它还符合`ImageRepresentationDelegate`和`ExpireAfterTimeDelegate`协议。当我们研究`ImageRepresentation`和`ExpireAfterTime`的细节时，我们将查看这些协议附带的任务。为`Powerup`类定义的唯一新任务是构造函数`powerup:`。让我们在\
  \ 代码清单 6-13 中看一看这个任务。\n\n**代码清单 6-13.  `Powerup.m (powerup: (partial))`**\n\n```\
  \  \n+(id)powerup:(GameController*)aController{  \n    CGSize gameSize = [aController\
  \ gameAreaSize];  \n    CGPoint gameCenter = CGPointMake(gameSize.width/2.0, gameSize.height/2.0);\
  \  \n    float distanceFromCenter = sqrtf(gameCenter.x*gameCenter.x + gameCenter.y*gameCenter.y);\
  \  \n    CGPoint center = [Actor randomPointAround:gameCenter At:distanceFromCenter];\
  \  \n\n    ImageRepresentation* rep = [ImageRepresentation imageRep];  \n    [rep\
  \ setBackwards:arc4random()%2 == 0];  \n    [rep setStepsPerFrame:1 + arc4random()%3];\
  \  \n\n    Powerup* powerup = [[Powerup alloc] initAt:center WithRadius:32 AndRepresentation:rep];\
  \  \n    [rep setDelegate:powerup];  \n    float rotation = arc4random()%100/100.0\
  \ * M_PI*2;  \n    [powerup setRotation:rotation];  \n    [powerup setVariant:arc4random()%PWR_VARIATION_COUNT];\
  \  \n\n  //省略了部分内容，参见代码清单 6-21  \n\n    return powerup;  \n}  \n```\n\n我们首先要做的是计算出将传递给`Actor`的`initAt:WithRadius:AndRepresentation`任务的值。计算出这些值后，我们会创建一个新的强化道具，然后设置一些初始值，例如强化道具的旋转和变体。在\
  \ 代码清单 6-13 的省略部分中，我们设置了强化道具的行为。这段代码可以在 代码清单 6-21 中找到，将在本节后面讨论。\n\n在深入探讨`ImageRepresentation`的细节之前，让我们快速了解一下我们如何计算强化道具的中心位置。`CGPoint`中心是通过在屏幕边界外的一个圆上选取随机点来创建的，如图\
  \ 6-3 所示。\n\n![9781430244226_Fig06-03.jpg](img/9781430244226_Fig06-03.jpg)\n\n图\
  \ 6-3.  屏幕外的随机点\n\n在此图像中，您可以看到灰色的矩形，其大小与变量`gameSize`相同。中间的圆点是`CGPoint gameCenter`。从`gameCenter`延伸到`gameSize`左上角的黑线长度为`distanceFromCenter`。`distanceFromCenter`的值基于`gameCenter`的\
  \ X 和 Y 分量，使用勾股定理计算得出。利用`gameCenter`和`distanceFromCenter`，我们可以通过调用`Actor`类的`randomPointAround:At:`（如前面的\
  \ 代码清单 6-10 所示）在外圆上获得一个随机点。\n\n```markdown\n在`[Listing 6-13]`中，计算中心点并选择半径为`32`后，我们必须创建一个`Representation`对象来处理这个增强道具的绘制。因为我们想使用一系列图像来表示增强道具，所以创建了一个名为`rep`的`ImageRepresentation`实例，并设置了`backwards`和`stepsPerFrame`属性。`ImageRepresentation`被传递给`Actor`的`initAt:WithRadius:AndRepresentation:`任务，以将`rep`设置为该增强道具的表示。还要注意，我们将`Powerup`设置为`rep`的委托。这意味着我们正在创建的`Powerup`实例将用于指定关于如何绘制该角色的信息。\n\
  \n**检查`ImageRepresentation`**\n\n为了将角色的游戏逻辑与其绘制方式分离，我们引入了`ImageRepresentation`类。此类负责创建使用`UIView`渲染角色所需的对象。主要是，`ImageRepresentation`将使用\
  \ PNG 文件创建`UIImageViews`来绘制我们的角色。让我们看看`ImageRepresentation`的头文件，如`[Listing 6-14]`所示。\n\
  \n**[Listing 6-14] `ImageRepresentation.h`**\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Actor.h\"\n\n@protocol ImageRepresentationDelegate\n\n@required\n-(NSString*)baseImageName;\n\
  \n@optional\n-(int)getFrameCountForVariant:(int)aVariant AndState:(int)aState;\n\
  -(NSString*)getNameForVariant:(int)aVariant;\n-(NSString*)getNameForState:(int)aState;\n\
  \n@end\n\n@interface ImageRepresentation : NSObject<Representation> {\n    UIView*\
  \ view;\n}\n@property (nonatomic, assign) NSObject<ImageRepresentationDelegate>*\
  \ delegate;\n@property (nonatomic, strong) NSString* baseImageName;\n@property (nonatomic)\
  \ int currentFrame;\n@property (nonatomic) BOOL backwards;\n@property (nonatomic)\
  \ int stepsPerFrame;\n\n+(id)imageRep;\n+(id)imageRepWithName:(NSString*)aBaseImageName;\n\
  +(id)imageRepWithDelegate:(NSObject<ImageRepresentationDelegate>*)aDelegate;\n-(void)advanceFrame:(Actor*)actor\
  \ ForStep:(int)step;\n-(NSString*)getImageNameForActor:(Actor*)actor;\n-(UIImage*)getImageForActor:(Actor*)actor;\n\
  \n@end\n```\n\n`ImageRepresentation`类的目标是封装处理使用图像表示角色的常见方式的代码。这些方式包括以下情况：\n\n- 单张图像表示角色\n\
  - 一系列图像表示角色\n- 具有多种状态的角色\n- 具有多种变体的角色\n- 对于每种状态和变体的组合，具有不同数量图像的角色\n\n我们创建的每个使用`ImageRepresentation`的角色都将符合上述情况之一。通过设置一个类型为`ImageRepresentationDelegate`的委托，我们指示我们想要使用哪种情况，如`[Listing\
  \ 6-14]`所示。这允许`ImageRepresentationDelegate`的实例指示在任何给定时间应使用的图像名称。\n\n`ImageRepresentationDelegate`必须指定一个`baseImageName`，该名称用于`ImageRepresentation`的所有用例。如果`ImageRepresentationDelegate`只实现了`baseImageName:`，则表示角色的所有实例都将使用单个图像。如果要使用一系列图像，则委托对象必须实现任务`getFrameCountForVariant:AndState:`。如果要根据角色的状态或变体使用不同的图像序列，则委托必须分别实现`getNameForState:`和`getNameForVariant:`。从技术上讲，如果只使用单个图像来表示特定类型的所有角色，则不需要为`ImageRepresentation`指定委托。但是，`ImageRepresentation`仍然需要指定`baseImageName`。\n\
  \n**创建`Powerup`的实现**\n\n`Powerup`类必须定义其绘制方式以及基本行为。由于`Powerup`类将对状态和变体的每种组合使用不同的图像序列，因此`ImageRepresentation`的委托必须实现所有这四个任务。为简单起见，我们指定`Powerup`类遵循`ImageRepresentationDelegate`协议。让我们看看`[Listing\
  \ 6-15]`中这些方法的实现。\n\n**[Listing 6-15] `Powerup.m（ImageRepresentationDelegate 任务）`**\n\
  \n```\n-(NSString*)baseImageName{\n    return @\"powerup\";\n}\n-(int)getFrameCountForVariant:(int)aVariant\
  \ AndState:(int)aState{\n    return 63;\n}\n-(NSString*)getNameForVariant:(int)aVariant{\n\
  \    if (aVariant == VARIATION_HEALTH){\n        return @\"health\";\n    } else\
  \ if (aVariant == VARIATION_CASH){\n        return @\"cash\";\n    } else if (aVariant\
  \ == VARIATION_DAMAGE){\n        return @\"damage\";\n    } else {\n        return\
  \ nil;\n    }\n}\n-(NSString*)getNameForState:(int)aState{\n    if (aState == STATE_GLOW){\n\
  \        return @\"glow\";\n    } else if (aState == STATE_NO_GLOW){\n        return\
  \ @\"noglow\";\n    } else {\n        return nil;\n    }\n}\n```\n\n在此列表中，我们看到`ImageRepresentationDelegate`所需的四个任务，用于创建一个由每种状态和变体组合的不同图像序列表示的角色。任务`baseImageName`返回`NSString\
  \ \"powerup\"`，表示此角色的所有图像都将以`\"powerup\"`开头。任务`getFrameCountForVariant:AndState:`直接返回`63`，因为每种状态和变体组合都有`63`张图像。其他类型的角色可能希望为每种状态和变体组合拥有不同数量的图像，并且可以自由地在`getFrameCountForVariant:AndState:`中返回不同的数字。\n\
  \n任务`getNameForVariant:`和`getNameForState:`返回适用于增强道具的每种变体和状态的字符串表示，并允许`ImageRepresentation`确定在给定时间应使用哪张图像。\n\
  \n**为角色查找正确的图像**\n\n让我们看看`ImageRepresentation`的任务`getImageNameForActor:`，以便您了解如何使用`ImageRepresentationDelegate`的四个任务来识别图像名称。请参阅`[Listing\
  \ 6-16]`。\n\n**[Listing 6-16] `ImageRepresentation.m（getImageNameForActor:）`**\n\
  \n```\n-(NSString*)getImageNameForActor:(Actor*)actor{\n    NSString* imageName\
  \ = baseImageName;\n\n    if (imageName == nil){\n        imageName = [delegate\
  \ baseImageName];\n    }\n    NSString* variant = nil;\n    if ([delegate respondsToSelector:@selector(getNameForVariant:)]){\n\
  \        variant = [delegate getNameForVariant:[actor variant]];\n    }\n    NSString*\
  \ state = nil;\n    if ([delegate respondsToSelector:@selector(getNameForState:)]){\n\
  \        state = [delegate getNameForState:[actor state]];\n    }\n    int frameCount\
  \ = 0;\n    if ([delegate respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n\
  \        frameCount = [delegate getFrameCountForVariant:[actor variant] AndState:[actor\
  \ state]];\n    }\n    if (variant != nil){\n        imageName = [[imageName stringByAppendingString:@\"\
  _\"] stringByAppendingString:variant];\n    }\n    if (state != nil){\n        imageName\
  \ = [[imageName stringByAppendingString:@\"_\"] stringByAppendingString:state];\n\
  \    }\n    if (frameCount != 0){\n        imageName = [[imageName stringByAppendingString:@\"\
  _\"] stringByAppendingString:[NSString stringWithFormat:@\"%04d\", currentFrame]\
  \ ];\n    }\n    return imageName;\n}\n```\n\n这里的目标是确定应该用于表示角色的正确图像名称。最终的图像名称将存储在变量`imageName`中。我们首先要做的是建立`baseImageName`。\n\
  ```\n\n\n它可以是 `ImageRepresentation` 的 `baseImageName` 属性，也可以来自委托。\n\n下一步是获取角色变体的字符串表示。我们测试委托是否响应\
  \ `getNameForVariant` 任务。如果是，则将结果赋值给 `variant`。我们遵循相同的模式来获取 `state` 的字符串表示。\n\n\
  我们需要委托做的最后一件事是，确定该角色对于特定状态和变体是由单个图像表示，还是由一系列图像表示。如果委托响应 `getFrameCountForVariation:AndState:`，我们将该值记录在\
  \ `frameCount` 中。如果委托不响应 `getFrameCountForVariation:AndState:`，或者 `getFrameCountForVariation:AndState:`\
  \ 返回零，则表示我们不应在最终图像名称中包含帧编号。\n\n调用 `getFrameCountForVariation:AndState:` 后，我们就拥有了确定最终图像名称所需的全部信息。如果\
  \ `variant` 的字符串表示不为 nil，我们将 `\"_\"` 和 `variation` 附加到 `NSString imageName`。类似地，如果\
  \ `state` 不为 nil，我们将 `\"_\"` 和 `state` 附加到 `imageName`。最后，如果 `frameCount` 不为零，我们将\
  \ `currentFrame` 数字附加到图像名称。我们不必将文件扩展名附加到图像名称，因为 `UIImage` 会根据名称自动找到正确的图像。此任务会查找以下模式的图像文件：\n\
  \n*   baseImageName.png\n*   baseImageName_variant.png\n*   baseImageName_state.png\n\
  *   baseImageName_variant_state.png\n*   baseImageName_00FN.png\n*   baseImageName_state_00FN.png\n\
  *   baseImageName_variant_00FN.png\n*   baseImageName_variant_state_00FN.png\n\n\
  现在你知道了如何使用 `ImageRepresentation` 和 `ImageRepresentationDelegate` 来指定在给定时间点应为特定角色使用哪个图像。回顾清单\
  \ 6-8，你可以看到一个角色的表示负责创建和更新与该角色关联的 `UIView`。\n\n## 为角色创建 `UIImageView`\n\n`ImageRepresentation`\
  \ 的最终目标是创建一个表示角色的 `UIView`。这是通过实例化一个 `UIImageView` 来完成的，该视图根据角色的类型、状态和变体使用正确的图像来表示角色。我们已经回顾了如何找到正确的图像。剩下的就是创建\
  \ `UIImageView`。这项工作在任务 `getViewForActor:In:` 中完成，如清单 6-17 所示。\n\n**清单 6-17. `ImageRepresentation.m\
  \ (getViewForActor:In:)`**\n\n```\n-(UIView*)getViewForActor:(Actor*)actor In:(GameController*)aController{\n\
  \    if (view == nil){\n        UIImage* image = [self getImageForActor: actor];\n\
  \        view = [[UIImageView alloc] initWithImage: image];\n    }\n    return view;\n\
  }\n```\n\n`ImageRepresentation` 简单地检查 `view` 是否已被创建，如果未创建则创建它。为了创建 `UIImageView`，我们调用\
  \ `getImageForActor:`，然后使用返回的 `UIImage` 创建 `UIImageView`。任务 `getImageForActor:`\
  \ 如清单 6-18 所示。\n\n**清单 6-18. `ImageRepresentation.m (getImageForActor:)`**\n\n```\n\
  -(UIImage*)getImageForActor:(Actor*)actor{\n    NSString* imageName = [self getImageNameForActor:actor];\n\
  \n    UIImage* result = [UIImage imageNamed: imageName];\n    if (result == nil){\n\
  \        NSLog(@\"Image Not Found: %@\", imageName);\n    }\n        return result;\n\
  }\n```\n\n任务 `getImageForActor:` 简单地调用 `getImageNameForActor` 并根据该名称创建一个 `UIImage`。如果不存在具有给定名称的图像，则结果将为\
  \ nil。在调试应用时，在该 `NSLog` 语句上设置断点将为你省去很多麻烦，因为一旦角色尝试使用不存在的图像进行绘制，你会立即收到通知。\n\n## 更新我们的视图\n\
  \n现在我们已经了解了 `ImageRepresentation` 如何创建用于绘制角色的 `UIView`，让我们来看看 `ImageRepresentation`\
  \ 如何更新该 `UIView` 以创建循环动画并响应状态或变体的变化。清单 6-19 显示了 `ImageRepresentation` 的任务 `updateView:ForActor:In:`。\n\
  \n**清单 6-19. `ImageRepresentation.m (updateView:ForActor:In:)`**\n\n```\n-(void)updateView:(UIView*)aView\
  \ ForActor:(Actor*)anActor In:(GameController*)aController{\n\n    if ([delegate\
  \ respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n        [self\
  \ advanceFrame: anActor ForStep:[aController stepNumber]];\n    }\n\n    if ([anActor\
  \ needsViewUpdated]){\n\n        UIImageView* imageView = (UIImageView*)aView;\n\
  \        UIImage* image = [self getImageForActor: anActor];\n\n        [imageView\
  \ setImage:image];\n        [anActor setNeedsViewUpdated:NO];\n    }\n}\n```\n\n\
  任务 `updateView:ForActor:In:` 负责确保使用正确的图像来表示角色 `anActor`。第一步是通过检查委托是否响应 `getFrameCountForVariation:AndState:`\
  \ 来确定 `ImageRepresentation` 是否管理一系列图像。如果正在使用一系列图像，我们调用 `advanceFrame:ForStep:` 来推进角色的当前帧，如清单\
  \ 6-20 所示。\n\n**清单 6-20. `ImageRepresentation.m (advanceFrame:ForTick:)`**\n\n```\n\
  -(void)advanceFrame:(Actor*)actor ForStep:(int)step{\n    if (step % self.stepsPerFrame\
  \ == 0){\n        if (self.backwards){\n            self.currentFrame -= 1;\n  \
  \      } else {\n            self.currentFrame += 1;\n        }\n\n        int frameCount\
  \ = [delegate getFrameCountForVariant:[actor variant] AndState:[actor state]];\n\
  \        if (self.currentFrame>frameCount){\n            self.currentFrame = 1;\n\
  \        }\n        if (self.currentFrame<1){\n            self.currentFrame = frameCount;\n\
  \        }\n\n        [actor setNeedsViewUpdated:YES];\n    }\n}\n```\n\n只有当 `step`\
  \ 对 `stepsPerFrame` 取模为零时，我们才会改变当前帧。如果 `backwards` 为真，我们从 `currentFrame` 减去 1；反之，则加\
  \ 1。如果我们更改了 `currentFrame` 的值，必须确保该值不小于 1 且不大于帧数。请注意，这里的 `currentFrame` 是基于 1 的，而不是基于\
  \ 0 的。这样做是为了使 `currentFrame` 的值与我们的图像文件命名约定完全匹配，该约定基于 3D 建模应用 Blender 的命名方式。这使调试时生活更轻松，因为你无需记住加或减。我们在\
  \ `advanceFrame:ForStep:` 中做的最后一件事是标记此角色需要更新其视图。\n\n回顾清单 6-19，在调用 `advanceFrame:ForStep:`\
  \ 之后，我们检查 `needsViewUpdated` 是否为真。如果我们在 `advanceFrame:ForStep:` 中调整了 `currentFrame`\
  \ 值，那么 `needsViewUpdated` 将为真。`needsViewUpdated` 也可能出于其他原因为真（例如角色的状态或变体发生了变化）。无论\
  \ `needsViewUpdates` 是如何被设置为 YES 的，我们只需通过调用 `getImageForActor:` 并更新 `imageView`\
  \ 来为角色找到正确的图像。最后，我们将 `needsViewUpdated` 设置为 NO，因为我们知道此时我们已经得到了完全正确的图像，并且在下一步中无需寻找不同的图像，除非某些操作将\
  \ `needsViewUpdated` 重新设置为 YES。\n\n我们已经回顾了 `ImageRepresentation` 类，以及它如何用于将角色的各种状态与旨在表示它的图像协调起来。设计此类的目标是使其易于创建使用它新的\
  \ `Actor` 类。\n\n\n## 通过示例理解行为\n\n在这个示例中，我们有能量块在屏幕上翻滚。最终在它们消失前，会开始闪烁。这两种不同的行为可以通过在\
  \ `Powerup` 类中提供任务步骤来实现。在上一章中，我们就是这样实现不同角色的不同行为的。在本章中，我们将引入一种通用机制来定义行为，这些行为可以在不同类型的角色之间共享，或根据单个角色的状态进行更改。\n\
  \n在之前的列表 6-13 中，我们省略了 `Powerup` 类构造函数中处理行为的部分。列表 6-21 展示了这段被省略的代码。\n\n**列表 6-21\
  \ `Powerup.m (powerup：（部分）)`**\n\n```objc\n//Powerup* powerup = ...\nfloat direction\
  \ = arc4random()%100/100.0 * M_PI*2;\nLinearMotion* motion = [LinearMotion linearMotionInDirection:direction\
  \ AndSpeed:1];\n[motion setWrap:YES];\n[powerup addBehavior: motion];\n\nExpireAfterTime*\
  \ expire = [ExpireAfterTime expireAfter:60*30];\n[expire setDelegate: powerup];\n\
  [powerup addBehavior: expire];\n\nreturn powerup;\n```\n\n我们刚刚创建了一个名为 `powerup`\
  \ 的新 `Powerup` 对象，并设置了一些基本属性。下一步是创建 `Behavior` 对象，将它们添加到新创建的 `Powerup` 中，然后返回该对象。我们创建的第一个行为是一个名为\
  \ `motion` 的 `LinearMotion` 对象，通过任务 `addBehavior`：将其添加到 `powerup` 中。第二个行为是一个名为 `expire`\
  \ 的 `ExpireAfterTime` 对象。在将 `expire` 添加到 `powerup` 之前，我们将 `powerup` 注册为 `expire`\
  \ 的委托。这为我们提供了一种简单的方法，让能量块在接近过期时闪烁。\n\n### 行为：线性运动\n\n这两个行为都将与其他 `Actor` 类一起复用，因此值得详细探讨。让我们从\
  \ `LinearMotion` 类开始，其头文件如列表 6-22 所示。\n\n**列表 6-22 `LinearMotion.h`**\n\n```objc\n\
  #import <Foundation/Foundation.h>\n#import \"Actor.h\"\n\n@interface LinearMotion\
  \ : NSObject <Behavior>{\n    float deltaX;\n    float deltaY;\n}\n\n@property (nonatomic)\
  \ float speed;\n@property (nonatomic) float direction;\n@property (nonatomic) BOOL\
  \ wrap;\n\n+(id)linearMotionInDirection:(float)aDirection AtSpeed:(float)aSpeed;\n\
  +(id)linearMotionRandomDirectionAndSpeed;\n\n@end\n```\n\n`LinearMotion` 类继承自 `NSObject`\
  \ 并遵循 `Behavior` 协议，该协议从 `Actor.h` 中导入。`LinearMotion` 类有三个属性：`speed`、`direction`\
  \ 和 `wrap`。`speed` 和 `direction` 属性顾名思义。`wrap` 属性表示角色离开游戏区域后是否应从另一侧重新进入游戏区域。这两个任务是用于创建\
  \ `LinearMotion` 对象的构造函数。我们或许可以想到这个类中更多实用的构造函数，但对于本章来说，这两个已经足够了。\n\n让我们通过查看列表 6-23\
  \ 中展示的这两个构造函数，开始探索 `LinearMotion` 类的实现。\n\n**列表 6-23 `LinearMotion.m（构造函数）`**\n\n\
  ```objc\n+(id)linearMotionInDirection:(float)aDirection AtSpeed:(float)aSpeed{\n\
  \    LinearMotion* motion = [LinearMotion new];\n    [motion setDirection:aDirection];\n\
  \    [motion setSpeed:aSpeed];\n\n    return motion;\n}\n\n+(id)linearMotionRandomDirectionAndSpeed{\n\
  \    float direction = (arc4random()%100/100.0)*M_PI*2;\n    float speed = (arc4random()%100/100.0)*3;\n\
  \n    return [LinearMotion linearMotionInDirection:direction AtSpeed:speed];\n}\n\
  ```\n\n构造函数 `linearMotionInDirection:AtSpeed`：只是创建一个新的 `LinearMotion` 对象并设置这两个属性。构造函数\
  \ `linearMotionRandomDirectionAndSpeed` 为 `direction` 和 `speed` 创建随机值，然后直接调用构造函数\
  \ `linearMotionInDirection:AtSpeed`：。\n\n列表 6-24 展示了 `LinearMotion` 类实现的其余部分。\n\n\
  **列表 6-24 `LinearMotion.m`**\n\n```objc\n-(void)setSpeed:(float)aSpeed{\n    speed\
  \ = aSpeed;\n    deltaX = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n\
  }\n\n-(void)setDirection:(float)aDirection{\n    direction = aDirection;\n    deltaX\
  \ = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n}\n\n-(void)applyToActor:(Actor*)anActor\
  \ In:(GameController*)gameController{\n    CGPoint center = anActor.center;\n  \
  \  center.x += deltaX;\n    center.y += deltaY;\n\n    if (wrap){\n        CGSize\
  \ gameSize = [gameController gameAreaSize];\n        float radius = [anActor radius];\n\
  \n        if (center.x < -radius && deltaX < 0){\n            center.x = gameSize.width\
  \ + radius;\n        } else if (center.x > gameSize.width + radius && deltaX > 0){\n\
  \            center.x = -radius;\n        }\n\n        if (center.y < -radius &&\
  \ deltaY < 0){\n            center.y = gameSize.height + radius;\n        } else\
  \ if (center.y > gameSize.height + radius && deltaY > 0){\n            center.y\
  \ = -radius;\n        }\n    }\n    [anActor setCenter:center];\n}\n```\n\n每次设置\
  \ `speed` 或 `direction` 值时，我们都会计算 `deltaX` 和 `deltaY` 的值。任务 `applyToActor:In`：由\
  \ `Behavior` 协议定义，并由 `GameController` 调用，使 `Behavior` 有机会修改角色。在 `LinearMotion` 类的\
  \ `applyToActor:In`：实现中，我们首先获取角色的当前中心点，然后将 X 和 Y 分量增加 `deltaX` 和 `deltaY`。\n\n如果\
  \ `wrap` 为真，我们需要检查角色是否位于游戏区域之外。这比简单地检查 `center` 是否在 `gameArea` 内要复杂一些，因为我们还需要考虑角色的半径。我们希望角色看起来像是在屏幕外移动，而不是在碰到屏幕边缘时直接消失。此外，只有当角色正在远离游戏区域时才移动它。考虑到这两点，我们测试\
  \ `center` 的 X 值是否小于 `radius` 且 `deltaX` 为负值。这意味着角色位于游戏区域的左侧并且正在向左移动，远离游戏区域。因此，我们最好将其移动到游戏区域的右侧，这样角色向左移动时就会从屏幕右侧重新进入。如果\
  \ `center` 的 X 值大于游戏区域的宽度且正在向右移动，则执行相反的操作，将角色移动到屏幕左侧。对中心点的 Y 值重复这两项测试。\n\n`LinearMotion`\
  \ 的实现非常简单，只是因环绕概念而略微复杂。接下来，我们将探讨 `ExpireAfterTime` 类，它用于在指定时间后将角色从场景中移除。\n\n###\
  \ 行为：`ExpireAfterTime`\n\n`Powerup` 使用 `ExpireAfterTime` 类在走过一定步骤后将其从场景中移除。在能量块被移除之前，我们希望通过将其状态从发光变为不发光来使其闪烁。为了支持这第二个特性，我们需要在\
  \ `ExpireAfterTime` 对象和它所作用的角色之间建立某种通信。列表 6-25 展示了 `ExpireAfterTime` 类的头文件。\n\n\
  **列表 6-25 `ExpireAfterTime.h`**\n\n```objc\n#import <Foundation/Foundation.h>\n\
  #import \"Actor.h\"\n```\n\n\n\n`@class ExpireAfterTime`; `@protocol ExpireAfterTimeDelegate\
  \ -(void)stepsUpdated:(ExpireAfterTime*)expire In:(GameController*)controller; @end`\
  \ `@interface ExpireAfterTime : NSObject <Behavior> {  } @property (nonatomic) long\
  \ stepsRemaining; @property (nonatomic, assign) Actor<ExpireAfterTimeDelegate>*\
  \ delegate; +(id)expireAfter:(long)aNumberOfSteps; @end`\n\n这里的类 `ExpireAfterTime`\
  \ 遵循了 `Behavior` 协议，就像类 `LinearMotion` 一样。`ExpireAfterTime` 还定义了一个名为 `ExpireAfterTimeDelegate`\
  \ 的新协议，该协议定义了任务 `stepsUpdated:In:`，每当调用 `applyToActor:In:` 时，`ExpireAfterTime` 都会在其委托上调用此任务，如列表\
  \ 6-26 所示。\n\n**列表 6-26. `ExpireAfterTime.m`**\n\n```\n#import \"ExpireAfterTime.h\"\
  \n#import \"GameController.h\"\n\n@implementation ExpireAfterTime\n@synthesize stepsRemaining;\n\
  @synthesize delegate;\n\n+(id)expireAfter:(long)aNumberOfSteps {\n    ExpireAfterTime*\
  \ expires = [ExpireAfterTime new];\n    [expires setStepsRemaining: aNumberOfSteps];\n\
  \    return expires;\n}\n\n-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n\
  \    stepsRemaining--;\n\n    [delegate stepsUpdated:self In:gameController];\n\n\
  \    if (stepsRemaining <= 0){\n        [gameController removeActor:anActor];\n\
  \    }\n}\n@end\n```\n\n在这个 `ExpireAfterTime` 类的实现中，构造器 `expireAfter:` 简单地创建一个新的\
  \ `ExpireAfterTime` 对象并设置 `stepsRemaining` 属性。在游戏的每一步中，`GameController` 都会调用任务 `applyToActor:In:`。在此任务中，我们递减\
  \ `stepsRemaining` 并更新委托，通知其步数已更新。如果 `stepsRemaining` 小于等于零，则从 `GameController`\
  \ 中移除该角色。\n\n在将 `ExpireAfterTime` 添加到 `Powerup` 对象之前，我们将 `Powerup` 对象设置为 `ExpireAfterTime`\
  \ 的委托。这会导致 `ExpireAfterTime` 在 `Powerup` 对象上调用 `stepsUpdated:In:`。列表 6-27 显示了类 `Powerup`\
  \ 中 `stepsUpdated:In:` 的实现。\n\n**列表 6-27. `Powerup.m (stepsUpdated:In:)`**\n\n```\n\
  -(void)stepsUpdated:(ExpireAfterTime*)expire In:(GameController*)controller{\n \
  \   long stepsRemaining = [expire stepsRemaining];\n    if (stepsRemaining<60*5){\n\
  \        if (stepsRemaining % 25 == 0){\n            if (self.state == STATE_GLOW){\n\
  \                self.state = STATE_NO_GLOW;\n            } else {\n           \
  \     self.state = STATE_GLOW;\n            }\n        }\n    }\n}\n```\n\n在此列表中，我们检查\
  \ `ExpireAfterTime` 对象还剩余多少步。如果该值少于 300 步（在每秒 60 帧的情况下相当于 5 秒），我们将应用闪烁逻辑。为了使能量道具闪烁，我们在\
  \ `STATE_GLOW` 和 `STATE_NO_GLOW` 状态之间切换 `Powerup` 的状态。\n\n更改状态就足以改变表示 `Powerup`\
  \ 角色的图像，因为（回顾列表 6-10）我们知道设置角色的状态会将其 `needViewUpdated` 属性设置为 `YES`。此外，如果角色的 `needViewUpdated`\
  \ 属性为 `YES`，并且该角色正在使用 `ImageRepresentation`，那么该 `ImageRepresentation` 将在任务 `updateView:In:`\
  \ 中获取该角色的正确图像（如前文列表 6-19 所示）。\n\n## 总结\n\n在本章中，我们研究了基础游戏引擎类 `GameController` 和 `Actor`，并学习了如何使用这些类来创建一个简单的场景，以运行我们的新角色——能量道具。我们了解了\
  \ `Behavior` 协议，它为我们提供了一个框架，用于创建可重用的游戏逻辑片段，以应用于我们的角色。我们还把渲染基于图像的角色所需的逻辑整合到了类 `ImageRepresentation`\
  \ 中。\n\n这也为下一章将要讨论的基于矢量的角色奠定了基础。\n\n"
- "# 第 7 章：构建你的游戏：矢量角色与粒子系统\n\nCore Graphics 是一个强大的 2D 绘图库，负责渲染 iOS 和 OS X 的大部分界面。在本章中，我们将了解如何使用这个库来绘制游戏中的角色。目标是让角色能够根据游戏状态动态绘制。为了说明这一点，我们将创建两个使用\
  \ Core Graphics 绘制的示例角色：一个显示角色剩余生命值的生命条，以及一个根据其威力大小以特定颜色绘制的子弹。这两个示例将展示如何在我们已开始的简单游戏引擎上下文中使用\
  \ Core Graphics。\n\n我们将通过创建一个名为 `VectorRepresentation` 的新类来实现这一点，该类类似于上一章的 `ImageRepresentation`\
  \ 类。`VectorRepresentation` 类将用于创建一个 `UIView` 来表示我们的角色，并使用 Core Graphics 通过自定义代码进行绘制。\n\
  \n我们还将研究游戏中用于创造引人入胜视觉效果的另一项流行技术：粒子系统。简单地说，粒子系统是游戏中用于生成大量小图形的任何东西，当这些小图形在屏幕上组合时，会产生比各部分总和更有趣的整体效果。粒子系统在游戏中用于创建火焰效果、水效果以及法术效果等等。\n\
  \n在本章中，我们将使用粒子系统来创建由大量简单粒子角色组成的彗星，从而赋予彗星一种发光、流动的感觉。当小行星碎裂时，我们还会使用这种技术来表现一些真实感。\n\
  \n本章的示例代码可以在 Xcode 项目 Sample 06+07 中找到。\n\n## 飞碟、子弹、护盾和生命条\n\n在这个示例中，我们将了解四个新角色：飞碟、子弹、护盾和生命条。本节代码位于\
  \ Xcode 项目 Sample 06+07 的 Example 2 组中。\n\n生命条和子弹角色将使用 Core Graphics 以编程方式渲染，而不是使用预先渲染的图像。其他角色——飞碟和护盾——在这个示例中存在是为了提供一些背景（总得有些东西来发射子弹），并从行为的角度充实我们上一章的示例。图\
  \ 7-1 展示了运行中的飞碟、子弹、护盾和生命条。\n\n![9781430244226_Fig07-01.jpg](img/9781430244226_Fig07-01.jpg)\n\
  \n图 7-1. 飞碟、子弹、护盾和生命条\n\n在图 7-1 中，我们看到屏幕中央有一个飞碟。从右侧向左移动的是许多圆形子弹。这些子弹有三种不同的大小，反映了它们的潜在伤害力。如果子弹与飞碟碰撞，飞碟上会添加一个护盾效果，同时生命条会下降，表示受到了伤害。在这个示例中，子弹会持续出现，直到飞碟的生命值为零，此时它会被移除，并添加一个新的飞碟。图\
  \ 7-2 显示了本示例中使用的三种不同的飞碟，以及用于护盾的图形。\n\n![9781430244226_Fig07-02.jpg](img/9781430244226_Fig07-02.jpg)\n\
  \n图 7-2. 三种飞碟和一个护盾\n\n护盾图像是部分透明的，设计用于覆盖在飞碟之上，如下图所示，在一个放大的飞碟上覆盖着护盾。\n\n为了理解此示例中所有部分如何组合在一起，我们将从查看类\
  \ `Example02Controller` 的实现开始，首先从 `doSetup` 任务入手，如列表 7-1 所示。\n\n**列表 7-1.** \n\n\
  \n\n"
- "# 示例排版\n\n### `doSetup`任务\n\n```objective-c\n-(BOOL)doSetup {\n    if ([super doSetup]){\n\
  \        NSMutableArray* classes = [NSMutableArray new];\n        [classes addObject:[Saucer\
  \ class]];\n        [classes addObject:[Bullet class]];\n        [self setSortedActorClasses:classes];\n\
  \        return YES;\n    }\n    return NO;\n}\n```\n\n在 Listing 7-1 中，我们看到类`Example02Controller`的`doSetup`任务。这个方法简单地表示我们希望将类型为`Saucer`和`Bullet`的角色排序，以便日后轻松访问。我们通过创建一个名为`classes`的`NSMutableArray`，并添加我们感兴趣的两个类的类对象来实现这一点。然后，`NSMutableArray\
  \ classes`被传递给`setSortedActorClasses:`。这样，当我们在未来调用`actorsOfType:`时，就不必对所有角色进行排序来找到它们。接下来，我们来看一下描述此示例中动作的代码，该代码位于类`Example02Controller`的`updateScene`任务中。请参见\
  \ Listing 7-2。\n\n### `updateScene`任务\n\n```objective-c\n-(void)updateScene{\n \
  \   NSMutableSet* suacers = [self actorsOfType:[Saucer class]];\n    if ([suacers\
  \ count] == 0){\n        Saucer* saucer = [Saucer saucer:self];\n        [self addActor:\
  \ saucer];\n    }\n    if (self.stepNumber % (30) == 0){\n        float direction\
  \ = M_PI - M_PI/30.0;\n        float rand = (arc4random()%100)/100.0 * M_PI/15.0;\n\
  \        direction += rand;\n        Bullet* bullet = [Bullet bulletAt:CGPointMake(1000,\
  \ 768/2) WithDirection:direction];\n        [self addActor: bullet];\n        if\
  \ (arc4random()%4 == 0){\n            if (arc4random()%2 == 0){\n              \
  \  [bullet setDamage:20.0];\n            } else {\n                [bullet setDamage:30.0];\n\
  \            }\n        }\n    }\n    NSMutableSet* bullets = [self actorsOfType:[Bullet\
  \ class]];\n    for (Bullet* bullet in bullets){\n        for (Saucer* saucer in\
  \ suacers){\n            if ([bullet overlapsWith:saucer]){\n               [saucer\
  \ doHit:bullet with:self];\n            }\n        }\n    }\n    [super updateScene];\n\
  }\n```\n\n在 Listing 7-2 中，我们首先获取场景中所有`Saucer`的实例，并检查是否存在。如果没有，我们创建一个新的`Saucer`，并使用`addActor:`任务将其添加到场景中。这确保了屏幕中央始终只有一个`Saucer`。然后，每\
  \ 30 步，我们使用`bulatAt:WithDirection:`任务创建一个新的`Bullet`。`bullet`的位置以游戏坐标指定，位于最右侧点的垂直中心。指定的方向会使`Bullet`向左移动，可能击中`Saucer`。一旦`bullet`被添加到场景中，其伤害值会被随机分配。每个`Bullet`造成的伤害也会决定我们如何绘制它。`Bullet`造成的伤害越大，它被绘制得越大。\n\
  \n`updateScene`任务最后要做的检查是是否有任何`Bullet`与`Saucer`发生碰撞。这是通过调用`actorsOfType:`并获取存储在`NSMutableSet*\
  \ bullets`中的场景中所有`Bullet`对象完成的。我们简单地遍历每个`Bullet`和`Saucer`，并通过调用`overlapsWith:`检查是否有碰撞。如果有碰撞，我们调用`Saucer`类的`doHit:with:`任务。\n\
  \n让我们更仔细地看一下此示例中使用的`Actor`类的实现。\n\n## Actor 类\n\n在本节中，我们将学习`Saucer`角色和`HealthBar\
  \ actor`类。`HealthBar`与我们至今为止看到的其他`actors`不同。它的不同之处在于其在场景中的位置依赖于另一个`Actor`的位置——在本例中，是一个`Saucer`。\n\
  \n在回顾了`Saucer`和`HealthBar`类之后，我们将查看`Behavior`类`FollowActor`，并了解如何实现此功能。\n\n### 实例化\
  \ Saucer 类\n\n我们将从查看`Saucer`类的构造函数开始。我们之所以要从`Saucer`的构造函数开始，是因为这是我们创建`HealthBar`的地方。这样，我们就不必担心在创建新`Saucer`时添加`HealthBar`，因为每次创建`Saucer`时都会自动创建一个。`Saucer`的构造函数如\
  \ Listing 7-3 所示。\n\n```objective-c\n+(id)saucer:(GameController*)controller{\n\
  \    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint gameCenter =\
  \ CGPointMake(gameAreaSize.width/2.0, gameAreaSize.height/2.0);\n    ImageRepresentation*\
  \ rep = [ImageRepresentation imageRep];\n    [rep setBackwards:arc4random()%2 ==\
  \ 0];\n    [rep setStepsPerFrame:3];\n    Saucer* saucer = [[Saucer alloc] initAt:gameCenter\
  \ WithRadius:32 AndRepresentation:rep];\n    [rep setDelegate:saucer];\n    [saucer\
  \ setVariant:arc4random()%VARIATION_COUNT];\n    [saucer setMaxHealth:100];\n  \
  \  [saucer setCurrentHealth:100];\n    HealthBar* healthBar = [HealthBar healthBar:saucer];\n\
  \    [healthBar setPercent:1];\n    [saucer setHealthBar:healthBar];\n    [controller\
  \ addActor:healthBar];\n    return saucer;\n}\n```\n\n在 Listing 7-3 中，我们首先找到游戏区域的中心，并将该值存储在`CGPoint\
  \ gameCenter`中。接下来，我们创建一个名为`rep`的`ImageRepresentation`。我们指示`rep`应该以每帧动画 3 步的速度，一半时间向后旋转`Saucer`。`CGRect\
  \ gameCenter`和`ImageRepresentation rep`被传递给超类初始化器`initAt:WithRadius:AndRepresenation:`，以创建一个半径为\
  \ 32 的`Saucer`对象。然后将对象`saucer`设置为`ImageRepresenation`的委托，以便我们可以通过类`Saucer`指定表示细节。这与第\
  \ 6 章中的角色工作原理完全相同。请查看源代码以了解这些任务是如何实现的。\n\n一旦创建了`saucer`对象，我们就想用一些细节来初始化它。我们通过调用`saucer`上的`setVariant:`来设置我们要使用的三个变体之一。我们还将最大生命值和当前生命值属性设置为\
  \ 100。接下来，让我们转到`HealthBar`类。\n\n### 实例化 HealthBar 类\n\n为了在飞碟下方渲染生命条，我们创建一个`HealthBar`对象，并传入它要跟随的对象，即角色`saucer`。我们还将`saucer`的`healthBar`属性设置为新创建的`healthBar`，以便`saucer`对象在受到伤害时可以更新`healthBar`显示的百分比。最后，`healthBar`被添加到场景中。让我们看一下`HealthBar`的构造函数，了解它是如何设置和表现其行为的。参见\
  \ Listing 7-4。\n\n```objective-c\n+(id)healthBar:(Actor*)anActor{\n    VectorRepresentation*\
  \ rep = [VectorRepresentation vectorRepresentation];\n    HealthBar* healthBar =\
  \ [[HealthBar alloc] initAt:anActor.center WithRadius:anActor.radius AndRepresentation:rep];\n\
  \    [rep setDelegate:healthBar];\n    [healthBar setColor:[UIColor blueColor]];\n\
  \    [healthBar setBackgroundColor:[UIColor colorWithRed:0 green:0 blue:0 alpha:.5]];\n\
  \    FollowActor* follow = [FollowActor followActor:anActor];\n    [follow setYOffset:[anActor\
  \ radius]];\n    [healthBar addBehavior:follow];\n    return healthBar;\n}\n```\n\
  \n在 Listing 7-4 中，我们看到了构造函数任务`healthBar:`，它接受一个`Actor`作为参数。`Actor anActor`是此`HealthBar`将紧随其下的角色（如果`anActor`移动）。\n\
  \n\n\n在这个例子中，与`Saucer`关联的对象不会移动，但我们将在未来的示例中使用这个类，届时它的`actor`会移动。在探讨`FollowActor`行为之前，请注意`HealthBar`是通过传入`VectorRepresentation`实例而非`ImageRepresentation`对象来初始化的。这表明我们希望以编程方式绘制该对象。我们将在下一节了解其工作原理。现在，让我们继续探索这个例子。接下来要检查的类是`FollowActor`。\n\
  \n### FollowActor 行为类\n\n负责将`HealthBar`保持在`Saucer`附近的类是`FollowActor`。这个类是一种`Behavior`，提供了与其他`Behavior`类类似的抽象。让我们通过查看`FollowActor`类来了解这一切如何协同工作。参见列表\
  \ 7-5。\n\n**列表 7-5. `FollowActor.m`**\n\n```objectivec\n#import \"FollowActor.h\"\
  \n#import \"GameController.h\"\n\n@implementation FollowActor\n@synthesize actorToFollow;\n\
  @synthesize xOffset;\n@synthesize yOffset;\n\n+(id)followActor:(Actor*)anActorToFollow{\n\
  \    FollowActor* follow = [FollowActor new];\n    [follow setActorToFollow:anActorToFollow];\n\
  \    return follow;\n}\n-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n\
  \    if (![actorToFollow removed]){\n        CGPoint c = [actorToFollow center];\n\
  \        c.x += xOffset;\n        c.y += yOffset;\n\n        [anActor setCenter:\
  \ c];\n    } else {\n        [gameController removeActor:anActor];\n    }\n}\n@end\n\
  ```\n\n在列表 7-5 中，我们看到了`FollowActor`类的完整实现。它通过任务`followActor:`构造，该任务接受要跟随的`actor`作为参数。游戏每一步都会调用任务`applyToActor:In:`，负责重新定位与该`behavior`关联的`actor`。为此，我们只需将`anActor`的`center`属性设置为我们正在跟随的`Actor`的`center`属性，并调整`xOffest`和`yOffset`。查看列表\
  \ 7-4，我们看到`HealthBar`被配置为以等于`saucer`的`radius`的`xOffset`跟随`saucer`。这使`HealthBar`保持在`saucer`下方居中。现在让我们探讨`Bullet`类。\n\
  \n### Bullet 类\n\n我们已经了解了`Saucer`和`HealthBar`类如何协同工作。现在让我们看看`Bullet`类，并理解其行为方式。列表\
  \ 7-6 展示了`Bullet`的构造函数。\n\n**列表 7-6. `Bullet.m`（`bulletAt:WithDirection:`）**\n\n\
  ```objectivec\n+(id)bulletAt:(CGPoint)aCenter WithDirection:(float)aDirection{\n\
  \    VectorRepresentation* rep = [VectorRepresentation vectorRepresentation];\n\
  \    Bullet* bullet = [[Bullet alloc] initAt:aCenter WithRadius:4 AndRepresentation:rep];\n\
  \    [rep setDelegate:bullet];\n\n    [bullet setDamage: 10];\n    LinearMotion*\
  \ motion = [LinearMotion linearMotionInDirection:aDirection AtSpeed:3];\n    [motion\
  \ setWrap:YES];\n    [bullet addBehavior: motion];\n\n    ExpireAfterTime* expires\
  \ = [ExpireAfterTime expireAfter:240];\n    [bullet addBehavior:expires];\n\n  \
  \  return bullet;\n}\n```\n\n在列表 7-6 中，我们看到该类由熟悉的构建块组成。它通过现在熟悉的`initAt:WithRadius:AndRepresentation:`任务初始化，并且我们添加了类型为`LinearMotion`和`ExpiresAfterTime`的`behavior`对象。这两个`behavior`对象被`Powerup`类使用，并在第\
  \ 6 章中有详细描述。`Bullet`类中唯一的新特性是`VectorRepresentation`类，它也被`HealthBar`类使用，以表明这种类型的`actor`将使用\
  \ Core Graphics 绘制。\n\n让我们更仔细地看看`VectorRepresentation`类，以及它如何与我们的游戏引擎和`actor`交互，为使用\
  \ Core Graphics 渲染`actor`提供简单方法。\n\n### 通过 VectorRepresentation 使用 Core Graphics\
  \ 绘制 Actor\n\nCore Graphics 库很有趣，因为它不是一个矢量图形库（如 SVG），但它在光栅化矢量数据结构方面表现出色。考虑到 Core\
  \ Graphics 最初基于 PDF，这很有道理。Core Graphics 是一个出色的库，用于以分辨率无关的方式渲染高质量图形。对我们而言，这意味着代码不会指定哪个像素是什么颜色，而是描述形状及其填充方式。Core\
  \ Graphics 也被称为 Quartz。可用的绘图函数完整描述参见：`http://goo.gl/6i5gr`。\n\n在 iOS 中，`UIView`可以通过重写任务`drawRect:`来指定其绘制方式，获取其图形上下文引用，然后调用一系列绘制方法。由于我们的游戏引擎使用`UIView`来表示每个`actor`，我们知道最终我们将创建一个`UIView`的子类，并为基于矢量的`actor`调用绘制代码。`VectorRepresentation`类负责管理`actor`与在屏幕上绘制它的视图之间的关系。\n\
  \n### VectorRepresentation 类\n\n`VectorRepresentation`类负责创建适合绘制`actor`的`UIView`。让我们从`VectorRepresentation`的头文件开始探索该类。参见列表\
  \ 7-7。\n\n**列表 7-7. `VectorRepresentation.h`**\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  #import \"Actor.h\"\n\n@class VectorActorView;\n\n@protocol VectorRepresentationDelegate\n\
  -(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect;\n\
  @end\n\n@interface VectorRepresentation : NSObject<Representation> {\n    VectorActorView*\
  \ view;\n}\n@property (nonatomic, assign) NSObject<VectorRepresentationDelegate>*\
  \ delegate;\n+(id)vectorRepresentation;\n@end\n```\n\n在列表 7-7 中，我们看到`VectorRepresentation`类定义了一个名为`VectorRepresentationDelegate`的协议，每个基于矢量的`actor`都必须遵循该协议。该协议要求所有遵循它的类实现任务`drawActor:WithContext:InRect:`，实际的绘制代码应放置在此处。\n\
  \n`VectorRepresentation`类扩展了`NSObject`并遵循`Representation`协议，就像`ImageRepresentation`类一样。这里的想法是，大部分代码不应关心我们使用哪种类型的表示——矢量还是图像。我们只需创建正确的`Representation`对象，并将其与每个`actor`关联。\n\
  \n我们还看到`VectorRepresentation`类有一个单一属性`view`，类型为`VectorActorView`。`VectorActorView`是`UIView`的子类，最终将调用由`VectorRepresentationDelegate`协议定义的`drawActor:WithContext:InRect:`任务。在查看`VectorActorView`类之前，让我们看看`VectorRepresentation`的实现，如列表\
  \ 7-8 所示。\n\n**列表 7-8. `VectorRepresentation.m`**\n\n```objectivec\n#import \"VectorRepresentation.h\"\
  \n#import \"VectorActorView.\n```\n\n\n```objectivec\n@implementation VectorRepresentation\n\
  @synthesize delegate;\n\n+(id)vectorRepresentation{\n    return [VectorRepresentation\
  \ new];\n}\n\n-(UIView*)getViewForActor:(Actor*)anActor In:(GameController*)aController{\n\
  \    if (view == nil){\n        view = [VectorActorView new];\n        [view setBackgroundColor:[UIColor\
  \ clearColor]];\n        [view setActor: anActor];\n        [view setDelegate:delegate];\n\
  \        [anActor setNeedsViewUpdated:YES];\n    }\n    return view;\n}\n\n-(void)updateView:(UIView*)aView\
  \ ForActor:(Actor*)anActor In:(GameController*)aController{\n    if ([anActor needsViewUpdated]){\n\
  \        [aView setNeedsDisplay];\n        [anActor setNeedsViewUpdated:NO];\n \
  \   }\n}\n@end\n```\n\n在 Listing 7-8 中，可以看到类`VectorRepresentation`的实现及其简单的构造方法。还可以看到它实现了协议`Representation`定义的任务`getViewForActor:In:`和`updateView:In:`。在任务`getViewForActor:In:`中，我们创建了一个新的`VectorActorView`，并指定了用于绘制的演员和委托。然后调用`setNeedsViewUpdated`，确保至少调用一次演员的绘制代码。\n\
  \n在任务`updateView:In:`中，我们检查演员是否需要更新；如果需要，则在`UIView aView`上调用`setNeedsDisplay`。任务`setNeedsDisplay`由类`UIView`定义，指示底层图形系统应重新绘制`UIView`。实际上，这会导致调用`VectorActorView`的`drawRect:`任务，进而调用演员的`drawActor:WithContext:InRect:`。接下来我们来看类`VectorActorView`的细节。\n\
  \n## 基于向量的演员的 UIView: VectorActorView\n\n类`VectorActorView`是`UIView`的子类，用于在场景中表示演员，这与我们使用`UIImageView`实例表示基于图像的`Actor`的方式非常相似。让我们看一下类`VectorActorView`，从头部开始，看看它如何协同工作。请参见\
  \ Listing 7-9。\n\n**Listing 7-9. VectorActorView.h**\n\n```objectivec\n#import <UIKit/UIKit.h>\n\
  #import \"Actor.h\"\n#import \"VectorRepresentation.h\"\n\n@interface VectorActorView\
  \ : UIView {\n\n}\n@property (nonatomic, retain) Actor* actor;\n@property (nonatomic,\
  \ retain) NSObject<VectorRepresentationDelegate>* delegate;\n\n@end\n```\n\n在 Listing\
  \ 7-9 中，可以看到`VectorActorView`继承自`UIView`并拥有两个属性。第一个是要绘制的`Actor`。第二个属性是`VectorRepresentationDelegate`，负责实际绘制`Actor`。在这个例子中，这两个对象——`actor`和`delegate`——将是同一个对象，要么是`Bullet`，要么是`HealthBar`。然而，这不是强制要求。我喜欢将所有与演员相关的代码保留在演员类中。委托可以是其自己的类，负责绘制演员。如果你希望使用一个`VectorRepresentationDelegate`来绘制多种类型的演员，这将很有意义。类`VectorActorView`的实现非常简单，如\
  \ Listing 7-10 所示。\n\n**Listing 7-10. VectorActorView.m**\n\n```objectivec\n- (void)drawRect:(CGRect)rect\
  \ {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    [delegate drawActor:actor\
  \ WithContext:context InRect:rect];\n}\n```\n\n在 Listing 7-10 中，可以看到类`VectorActorView`的实现只有一个方法，即任务`drawRect:`的实现。在这个方法中，我们通过调用`UIGraphicsGetCurrentContext`获取当前图形上下文的引用，并将`context`和`actor`传递给`delegate`，以便在指定的`CGRect`中绘制。现在让我们看一个具体的例子。\n\
  \n## 绘制 HealthBar\n\n如前所述，本例中使用的基于向量的演员在绘制方面是它们自己的委托，因此让我们再次查看`HealthBar`类，看看它如何绘制自身。请参见\
  \ Listing 7-11。\n\n**Listing 7-11. HealthBar.m (drawActor:WithContext:InRect:)**\n\
  \n```objectivec\n-(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context\
  \ InRect:(CGRect)rect{\n    CGContextClearRect(context,rect);\n\n    float height\
  \ = 10;\n\n    CGRect backgroundArea = CGRectMake(0, self.radius-height/2, self.radius*2,\
  \ height);\n    [self.backgroundColor setFill];\n    CGContextFillRect(context,\
  \ backgroundArea);\n\n    CGRect healthArea = CGRectMake(0, self.radius-height/2,\
  \ self.radius*2*percent, height);\n    [self.color setFill];\n    CGContextFillRect(context,\
  \ healthArea);\n}\n```\n\n在 Listing 7-11 中，我们首先调用`CGContextClearRect`。这会擦除给定`rect`中的旧内容，使我们准备好进行实际绘制。要绘制`HealthBar`，我们只需要绘制两个矩形：一个用于背景，另一个位于背景之上，代表健康条的当前百分比。要绘制矩形区域（而不是绘制矩形的边缘），我们通过调用`CGRectMake`定义一个`rect`。然后，通过调用`UIColor`对象`backgroundColor`（这是`HealthBar`的一个属性）上的`setFill`来指定要使用的颜色。\n\
  \n要实际更改正在绘制的`UIView`的像素颜色，我们调用`CGContextFillRect`，传入`context`和`CGRect backgroundArea`。要绘制前景矩形，我们重复该过程，但顶部矩形`healthArea`的宽度根据属性`percent`的值计算。这表明每当`HealthBar`的`percent`发生变化时，都必须重新绘制`HealthBar`。为了确保这一点，我们必须提供自己的`setPercent:`实现，而不是依赖合成属性提供的默认实现。Listing\
  \ 7-12 显示了类`HealthBar`的自定义`setPercent:`实现。\n\n**Listing 7-12. HealthBar.m (setPercent:)**\n\
  \n```objectivec\n-(void)setPercent:(float)aPercent{\n    if (percent != aPercent){\n\
  \        percent = aPercent;\n        if (percent < 0){\n            percent = 0;\n\
  \        }\n        if (percent > 1){\n            percent = 1;\n        }\n   \
  \     [self setNeedsViewUpdated:YES];\n    }\n}\n```\n\nListing 7-12 显示了我们自定义的`setPercent:`实现。首先检查`percent`（属性的支持变量）和传入的值`aPercent`是否不同。如果不同，则将`percent`设置为`aPercent`，并通过确保其在\
  \ 0 和 1 之间来规范化该值。最后，用`YES`调用`setNeedsViewUpdate:`。这确保了`HealthBar`将在动画的下一步中被重绘。现在让我们来看看`Bullet`类是如何绘制的。\n\
  \n## 绘制 Bullet 类\n\n我们已经查看了`HealthBar`类，并检查了它是如何绘制的。我们只使用了一个绘图函数`CGContextFillRect`来创建视觉效果。当然，还有很多很多绘图函数可以让您创建任何想要的视觉效果。我们不打算涵盖所有这些函数，但网上有很好的文档可用。话虽如此，让我们看一下类`Bullet`的绘制实现。请参见\
  \ Listing 7-13。\n\n**Listing 7-13. Bullet.**\n\n好的，作为高级文档工程师和翻译员，我将严格按照您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n`drawRect:WithContext:InRect:` 方法如下：\n\n```\n-(void)drawActor:(Actor*)anActor\
  \ WithContext:(CGContextRef)context InRect:(CGRect)rect{\n    CGContextAddEllipseInRect(context,\
  \ rect);\n    CGContextClip(context);\n    CGFloat locations[2];\n    locations[0]\
  \ = 0.0;\n    locations[1] = 1.0;\n    CGColorSpaceRef space = CGColorSpaceCreateDeviceRGB();\n\
  \    UIColor* color1 = nil;\n    UIColor* color2 = nil;\n    if (damage >= 30){\n\
  \        color1 = [UIColor colorWithRed:1.0 green:0.8 blue:0.8 alpha:1.0];\n   \
  \     color2 = [UIColor colorWithRed:1.0 green:0.0 blue:0.0 alpha:1.0];\n    } else\
  \ if (damage >= 20){\n        color1 = [UIColor colorWithRed:0.8 green:1.0 blue:0.8\
  \ alpha:1.0];\n        color2 = [UIColor colorWithRed:0.0 green:1.0 blue:0.0 alpha:1.0];\n\
  \    } else {\n        color1 = [UIColor colorWithRed:0.8 green:0.8 blue:1.0 alpha:1.0];\n\
  \        color2 = [UIColor colorWithRed:0.0 green:0.0 blue:1.0 alpha:1.0];\n   \
  \ }\n    CGColorRef clr[] = { [color1 CGColor], [color2 CGColor] };\n    CFArrayRef\
  \ colors = CFArrayCreate(NULL, (const void**)clr, sizeof(clr) / sizeof(CGColorRef),\
  \ &kCFTypeArrayCallBacks);\n    CGGradientRef grad = CGGradientCreateWithColors(space,\
  \ colors, locations);\n    CGColorSpaceRelease(space);\n    CGContextDrawLinearGradient(context,\
  \ grad, rect.origin, CGPointMake(rect.origin.x + rect.size.width, rect.origin.y\
  \ + rect.size.height), 0);\n    CGGradientRelease(grad);\n}\n```\n\n在 Listing 7-13\
  \ 中，我们看到了在屏幕上绘制每个子弹的代码。这段代码根据 `Bullet` 的伤害值绘制了一个带有渐变的圆形。在我看来，完成一个如此简单的功能所需的代码量实在太多。让我们逐段分析。任务的第一行基于提供的矩形为图形上下文创建了一个椭圆裁剪区域。这意味着后续的绘制操作仅在这个椭圆区域内可见。\n\
  \n下一步是创建绘制操作所使用的渐变。渐变由两个主要部分组成。第一部分是一个数组，指定了渐变中每种颜色应该应用的位置。在本例中，我们只使用双色渐变，因此创建了一个名为\
  \ `locations` 的数组，将第一个值设为 0，第二个值设为 1。这意味着颜色会从渐变起点到终点均匀混合。\n\n渐变的第二部分是所使用的颜色。在示例中，我们根据\
  \ `damage` 的值指定每种颜色。我们将变量 `color1` 和 `color2` 简单地赋值为要用来绘制 `Bullet` 的颜色。一旦有了颜色，我们就创建一个\
  \ `CFArrayRef` 来存储这些颜色。\n\n在将颜色的位置和颜色本身存储到正确类型的数组后，我们调用 `CGGradientCreateWithColors`\
  \ 并将数组传入，以创建一个名为 `grad` 的 `CGGradientRef`。注意，我们还传递了一个对颜色空间的引用，该引用由 `CGColorSpaceRef`\
  \ 定义，名为 `ref`。这是显示器的默认颜色空间，只有当你的应用程序进行复杂的颜色展示时才需要更改。\n\n一旦 `CGGradientRef` 创建完成，就调用\
  \ `CGContextDrawLinearGradient`。通常情况下，它会用指定的渐变填充整个 `UIView`，但由于我们在任务顶部指定了裁剪区域，因此会得到一个漂亮的圆形，且渐变均匀地绘制在上面。\n\
  \n我们已经了解了如何创建使用 Core Graphics 绘制的角色，从而能够动态绘制角色，避免为角色的每种可能状态都创建图像。在下一节中，我们将探讨另一种绘制角色的策略——基于粒子的绘制。\n\
  \n## 为游戏添加粒子系统\n\n游戏中的粒子系统是由许多（通常是很小的）图像集合在一起绘制而成的，以产生整体效果。粒子系统在计算机图形学中有多种不同的用途；常见的例子有火、水、头发和草地。\n\
  \n在我们的示例中，将创建一个名为 `Particle` 的新角色，用于绘制彗星角色，并通过让流星角色看起来像破裂来改进它。图 7-3 展示了这个下一个示例的实际效果。\n\
  \n![9781430244226_Fig07-03.jpg](img/9781430244226_Fig07-03.jpg)\n\n图 7-3. 彗星和可摧毁的流星\n\
  \n在 图 7-3 中，我们看到三颗彗星划过屏幕。我们还看到许多流星处于各种爆炸状态。流星从屏幕外漂移进入，当你点击屏幕时，它们会爆炸成许多小流星。除了创建新的小流星外，我们还会发出许多看起来像流星的粒子。这为大流星的毁灭增添了一些真实感，因为大块的岩石很少能干净地碎裂成小块。这两种不同的粒子效果——彗星和流星碎片——截然不同，但每种都使用相同的基类\
  \ `Particle` 实现。在深入每个新角色的细节之前，让我们仔细看看 `Example03Controller` 类，以便更好地理解这个示例的工作原理。Listing\
  \ 7-14 展示了 `Example03Controller` 的重要部分。\n\n**Listing 7-14.**  `Example03Controller.m`（`doSetup`\
  \ 和 `updateScene`）\n\n```\n-(BOOL)doSetup{\n    if([super doSetup]){\n        NSMutableArray*\
  \ classes = [NSMutableArray new];\n        [classes addObject:[Asteroid class]];\n\
  \        [self setSortedActorClasses:classes];\n\n        UITapGestureRecognizer*\
  \ tapRecognizer = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(tapGesture:)];\n\
  \        [tapRecognizer setNumberOfTapsRequired:1];\n        [tapRecognizer setNumberOfTouchesRequired:1];\n\
  \n        [actorsView addGestureRecognizer:tapRecognizer];\n\n        return YES;\n\
  \    }\n    return NO;\n}\n\n-(void)updateScene{\n    if (self.stepNumber % (60*5)\
  \ == 0){\n        [self addActor:[Comet comet:self]];\n    }\n\n    if ([[self actorsOfType:[Asteroid\
  \ class]] count] == 0){\n        int count = arc4random()%4+1;\n        for (int\
  \ i=0;i<count;i++){\n            [self addActor:[Asteroid asteroid:self]];\n   \
  \     }\n    }\n\n    [super updateScene];\n}\n```\n\n在 Listing 7-14 中，我们看到 `Example03Controller`\
  \ 类的两个任务：`doSetup` 和 `updateScene`。任务 `doSetup` 遵循我们熟悉的模式，通过调用 `setSortedActorClass:`\
