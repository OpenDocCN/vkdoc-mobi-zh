  \n图 3-10.  选择“Touch Up Inside”操作\n\n一旦在 XIB 中连接好按钮的操作，你就需要提供并实现该按钮要执行的对应任务。在我们的示例应用程序中，我们希望每个按钮都能切换当前视图。代码清单\
  \ 3-4 展示了 `GameController.m` 中这些操作任务的实现。\n\n**代码清单 3-4.** GameController.m (IBAction\
