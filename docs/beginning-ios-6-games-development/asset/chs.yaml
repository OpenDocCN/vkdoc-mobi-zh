  }\n```\n\n列表 5-19 中的`sliderValueChanged:`任务在用户调整屏幕底部的滑块时被调用。滑块被配置为在 80 到 320 之间的值，我们将其用作`newWidth`的值。我们基于`newWidth`计算`newHeight`，保持宽高比。一旦有了`actorView`的新宽度和高度，我们找到使`actorView`保持居中的\
  \ X 和 Y 值。一旦我们有了`actorView`新`frame`的所有必要值，就设置它。\n\n## 演员状态与动画\n\n现在我们有了基本的动画集，是时候为演员增加一些活力了。我们将在上一个示例的基础上进行扩展，并添加两种效果。第一种是让小行星看起来像是在太空中翻滚。第二种是让飞船在移动之前旋转。这两种技术都会更新每个演员使用的图像，以产生视觉效果。我们还会为飞船添加一些状态逻辑，以便能够跟踪飞船应该做什么——保持不动、旋转或移动到目标点。图\
  \ 5-10 展示了这个下一个示例的实际效果。\n\n### 翻滚效果\n\n在图 5-11 中，我们看到飞船正在向左上角的某个点推进。场景中有四个小行星，每个都有不同的图形。当你运行示例时，你会看到它们似乎在翻滚。这种翻滚效果是通过每隔几帧动画更改表示小行星的图像来实现的。也就是说，所使用的图像创建了动画，就像翻页书一样。图\
