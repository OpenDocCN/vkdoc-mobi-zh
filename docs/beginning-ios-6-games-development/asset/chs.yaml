  \ CGPoint c = [self center];\n\n    float dx = (moveToPoint.x - c.x);\n    float\
  \ dy = (moveToPoint.y - c.y);\n    float theta = atan(dy/dx);\n\n    float dxf =\
  \ cos(theta) * self.speed;\n    float dyf = sin(theta) * self.speed;\n    if (dx\
  \ < 0){\n        dxf *= -1;\n        dyf *= -1;\n    }\n\n    c.x += dxf;\n    c.y\
  \ += dyf;\n\n    if (abs(moveToPoint.x - c.x) < self.speed && abs(moveToPoint.y\
  \ - c.y) < self.speed){\n        c.x =  moveToPoint.x;\n        c.y =  moveToPoint.y;\n\
  \    }\n    [self setCenter:c];\n}\n-(void)doCollision:(Actor02*)actor In:(Example02Controller*)controller{\n\
  \    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint centerOfGame\
  \ = CGPointMake(gameAreaSize.width/2, gameAreaSize.height/2);\n    self.center =\
  \ centerOfGame;\n    self.moveToPoint = centerOfGame;\n\n    [controller removeActor:actor];\n\
  }\n@end\n```\n\n在 `Listing 5-10` 中，我们看到构造函数任务 `viper:` 创建了一个新的 `Viper02` 对象，并使用超类任务\
  \ `initAt:WithRadius:AndImage:` 来设置对象的基本属性。此外，`moveToPoint` 属性被设置为当前位置，速度被设置为 `.8`。\n\
  \n任务 `step:` 是每帧动画中被调用的任务。该任务的实现与 `Actor01` 类中任务 `updateLocation:` 的实现完全相同，如 `Listing\
  \ 5-5` 所示。\n\n`Listing 5-10` 中的最后一个任务是 `doCollision:In:`，当该 `Viper02` 与一个 `Asteroid02`\
  \ 重叠时被调用。该任务将 `Viper02` 重置回游戏区域中心的起始位置，并从游戏中移除碰撞到的 `Asteroid02`。\n\n\n\n### Actor\
  \ 子类：`Asteroid02`\n\n在看过 `Viper02` 类之后，你可能无法准确看出它与 `Viper01` 有何不同。确实，虽有部分内容被重新组织，但二者看起来非常相似：本质上都仍负责更新中心点。等我们看完\
  \ `Asteroid02` 类，就会发现这些 actor 类如何被用来描述场景，而非成为场景本身。`Asteroid02` 类的头文件如代码清单 5-11 所示。\n\
  \n**代码清单 5-11.** `Asteroid02.h`\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  #import \"Actor02.h\"\n\nNSMutableArray* imageNameVariations;\n\n@interface Asteroid02\
  \ : Actor02 {\n}\n+(NSMutableArray*)imageNameVariations;\n+(id)asteroid:(Example02Controller*)controller;\n\
  @end\n```\n\n在代码清单 5-11 中，`Asteroid02` 类的头文件显示它继承自 `Actor02` 并包含两个静态任务。此外还有一个名为\
  \ `imageNameVariations` 的数组。该数组结合 `imageNameVariations` 任务，使我们能够创建外观相似但图形不同的 `Asteroid02`。让我们看看这个类的实现，理解其中的含义，如代码清单\
  \ 5-12 所示。\n\n**代码清单 5-12.** `Asteroid02.m`\n\n```objectivec\n#import \"Asteroid02.h\"\
  \n#import \"Example02Controller.h\"\n\n@implementation Asteroid02\n\n+(id)asteroid:(Example02Controller*)controller{\n\
  \    CGSize gameAreaSize = [controller gameAreaSize];\n    float radius = arc4random()%8\
  \ + 8;\n    float x = radius + arc4random()%(int)(gameAreaSize.width + radius*2);\n\
  \    CGPoint center = CGPointMake(x, -radius);\n    NSString* imageName = [[Asteroid02\
  \ imageNameVariations] objectAtIndex:arc4random()%3];\n\n    Asteroid02* asteroid\
  \ = [[Asteroid02 alloc] initAt:center WithRadius:radius AndImage: imageName];\n\
  \    float speed = (arc4random()%10)/10.0 + .1;\n    [asteroid setSpeed: speed];\n\
  \    return asteroid;\n}\n+(NSMutableArray*)imageNameVariations{\n    if (imageNameVariations\
  \ == nil){\n        imageNameVariations = [NSMutableArray new];\n        [imageNameVariations\
  \ addObject:@\"AsteroidA\"];\n        [imageNameVariations addObject:@\"AsteroidB\"\
  ];\n        [imageNameVariations addObject:@\"AsteroidC\"];\n    }\n    return imageNameVariations;\n\
  }\n\n-(void)step:(Example02Controller*)controller{\n    CGPoint newCenter = self.center;\n\
  \    newCenter.y + = self.speed;\n    self.center = newCenter;\n\n    if (newCenter.y\
  \ - self.radius > controller.gameAreaSize.height){\n        [controller removeActor:\
  \ self];\n    }\n}\n@end\n```\n\n在代码清单 5-12 中，构造函数任务 `asteroid:` 创建了一个新的 `Asteroid02`\
  \ 对象并设置了其初始状态。为了增加多样性，每个小行星被分配了随机的 `radius` 和随机的 X 位置。起始 Y 位置被设置为负的 `radius`，因此小行星从游戏区域顶部稍上方开始出现。每个\
  \ `Asteroid02` 还被分配了随机的 `speed`。\n\n任务 `step:` 实现了 `Asteroid02` 的运动——它只是将属性 `center`\
  \ 的 Y 值增加 `speed`，直到到达游戏区域底部，此时它会将自己从游戏中移除。\n\n如前所述，我们希望用于表示 `Asteroid02` 的图形也有一定的变化。为此，我们设计了任务\
  \ `imageNameVariations`，它采用懒加载方式填充全局的 `NSMutableArray imageNameVariations`。在任务 `asteroid:`\
  \ 中，从该数组中随机抽取一个字符串作为小行星的图像。图 5-8 展示了此示例中使用的图像文件。\n\n![9781430244226_Fig05-08.jpg](img/9781430244226_Fig05-08.jpg)\n\
  \n图 5-8. 用于 actor 的图像\n\n在图 5-8 中，我们看到此示例中用于 actor 的图像。这些图像均由 `Actor02` 类的属性 `imageName`\
  \ 指定。\n\n对于小行星，我们提供了三种不同的图像，它们被随机分配给每个新的 `Asteroid02` 对象。\n\n我们已经审视了 actor 类，了解了它们如何存储游戏中每个对象的基本信息。现在我们来看看这些类是如何在屏幕上被绘制的。\n\
  \n## 在屏幕上绘制 Actor\n\n现在，我们对本例中涉及的 actor 有了基本了解。将它们整合起来创建游戏的类是 `Example02Controller`。与其他\
  \ `UIViewController` 类一样，`Example02Controller` 负责在屏幕上显示数据——在本例中，就是显示不同的 actor。`Example02Controller`\
  \ 的技巧在于创建并更新多个 `UIImageViews`，每个 actor 对应一个。图 5-9 展示了如何在 Interface Builder 中设置该类的\
  \ iPhone 版本。\n\n![9781430244226_Fig05-09.jpg](img/9781430244226_Fig05-09.jpg)\n\n\
  图 5-9. Interface Builder 中的 `Example02Controller_iPhone.xib`\n\n在图 5-9 中，我们看到左侧该\
  \ `UIViewController` 的根视图有两个子视图。第一个称为 Actor view，是右侧灰色区域中间的白色区域。这是游戏发生的视图——所有 actor\
  \ 都将表示为作为 Actor view 子视图的 `UIImageViews`。另一个组件是灰色区域底部的 `UISlider`。它用于控制 Actor view\
  \ 的大小，使我们能够证明确实将游戏的表示与游戏本身进行了抽象。`Example02Controller` 类的头文件将概述如何实现这一点，如代码清单 5-13\
  \ 所示。\n\n**代码清单 5-13.** `Example02Controller.h`\n\n```objectivec\n#import < UIKit/UIKit.h>\n\
  #import < QuartzCore/CADisplayLink.h>\n#import \"Viper02.h\"\n#import \"Actor02.h\"\
  \n#import \"Asteroid02.h\"\n\n@interface Example02Controller : UIViewController\
  \ {\n    IBOutlet UIView *actorView;\n    CADisplayLink* displayLink;\n\n    //Managing\
  \ Actors\n    NSMutableArray* actors;\n    NSMutableDictionary* actorViews;\n  \
  \  NSMutableArray* toBeRemoved;\n\n    //Game Logic\n    Viper02* viper;\n    long\
  \ stepNumber;\n\n}\n\n@property (nonatomic) CGSize gameAreaSize;\n\n-(void)updateScene;\n\
  -(void)removeActor:(Actor02*)actor;\n-(void)addActor:(Actor02*)actor;\n-(void)updateActorView:(Actor02*)actor;\n\
  -(void)tapGesture:(UIGestureRecognizer *)gestureRecognizer;\n-(IBAction)sliderValueChanged:(id)sender;\n\
  -(void)doRemove;\n\n@end\n```\n\n在代码清单 5-13 中，我们看到 `UIView actorView`，它是一个从图 5-9\
  \ 所示的 XIB 文件连接的 `IBoutlet`。在文件底部，我们看到任务 `sliderValueChanged:`，当图 5-9 中的滑块被移动时会调用此任务。我们还看到了熟悉的\
  \ `displayLink` 对象，其类型为 `CADisplayLink`，将用于配置屏幕的重绘。`NSMutableArray actors` 用于存储游戏中所有当前的\
  \ actor，通过任务 `addActor:` 和 `removeActor:` 进行添加和移除。`NSMutableArray toBeRemoved` 用于保存标记为通过任务\
  \ `removeActor:` 移除的 actor。任务 `doRemove` 在每次调用 `updateScene` 结束时被调用，以实际移除每个 actor。`NSMutableDictionary\
  \ actorViews` 用于将每个 actor 映射到表示它的 `UIImageView`。类型为 `Viper02` 的变量 `viper` 是对我们飞船的引用，最后一个变量\
  \ `stepNumber` 记录我们已执行的游戏帧数。与大多数 `UIViewController` 类一样，理解其工作原理要从查看 `viewDidLoad`\
  \ 任务开始，如代码清单 5-14 所示。\n\n**代码清单 5-14.** `Example02Controller.`\n\n\n\n\nm (viewDidLoad)\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    [self setGameAreaSize:CGSizeMake(160,\
  \ 240)];\n    actors = [NSMutableArray new];\n    actorViews = [NSMutableDictionary\
  \ new];\n    toBeRemoved = [NSMutableArray new];\n    Actor02* background = [[Actor02\
  \ alloc] initAt:CGPointMake(80, 120) WithRadius:120 AndImage:@\"star_field_iphone\"\
  ];\n    [self addActor: background];\n    viper = [Viper02 viper:self];\n    //\
  \ [viper setMoveToPoint:viper.center];\n    [self addActor:viper];\n    stepNumber\
  \ = 0;\n    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self action:@selector(tapGesture:)];\n    [tapRecognizer setNumberOfTapsRequired:1];\n\
  \    [tapRecognizer setNumberOfTouchesRequired:1];\n    [actorView addGestureRecognizer:tapRecognizer];\n\
  \    displayLink = [CADisplayLink displayLinkWithTarget:self selector:@selector(updateScene)];\n\
  \    [displayLink addToRunLoop:[NSRunLoop currentRunLoop] forMode:NSDefaultRunLoopMode];\n\
  }\n```\n\n在 Listing 5-14 中，调用了 `viewDidLoad` 的父类实现之后，我们设置了 `gameAreaSize` 属性。在第一个示例中，我们使用了\
  \ `UIView` 的坐标空间来描述飞船的位置。在这个示例中，我们必须指定独立于任何 `UIView` 的游戏区域大小。请注意，160 x 240 的大小正好是\
  \ iPhone 点数的四分之一。尽管我们希望将游戏的坐标系与 `UIView` 层级体系的坐标系分离，但事实上 iPhone 屏幕的宽高比为 2:3，因此在该设备上运行任何游戏都需要考虑这一点。\n\
  \n指定 `gameAreaSize` 后，我们初始化了 `actors` 和 `actorViews`。然后我们添加了第一个演员。为了在其他演员后面添加星空背景，我们可以向场景中添加一个新的\
  \ `Actor02`，并指定 `star_field_iphone` 图像。由于基类 `Actor02` 没有指定任何行为，这个演员将简单地停留在背景中，提供漂亮的星空。使用演员作为背景的好处是它会与其他演员一起缩放和拉伸。缺点则是它会像游戏中的其他演员一样被对待，并消耗一点计算时间。\n\
  \n添加背景后，我们创建了 `Viper02`，将其赋值给变量 `viper`，并将其添加到场景中。我们保留了对它的引用，以便在用户触摸屏幕时可以轻松访问它。我们知道这将是一个频繁执行的操作，所以每次都遍历所有演员来查找正确的对象是没有意义的。对于任何特定的游戏，都需要仔细考虑哪些演员需要以特殊方式引用。在编程便捷性、执行速度和内存使用之间需要找到一个平衡点。遗憾的是，关于应该创建哪些额外的数据结构，并没有硬性规定。在第一次开发游戏（或应用程序）时，我会尽量少做优化，等到游戏更完整时再找出应用中的热点。在开发过程的早期进行优化可能会使功能开发复杂化；然而，在开发结束时进行优化可能会更加复杂，甚至可能永远无法完成。Listing\
  \ 5-14 中的两个步骤是向 `actorView` 添加一个 `UITapGestureRecognizer`，以及设置 `CADisplayLink`。这些步骤的执行方式与第一个示例完全相同。\n\
  \n在查看场景如何更新之前，我们先看看 `addActor:` 和 `removeActor:` 这两个任务，以便我们能够完整理解演员是如何从场景中添加和移除的。Listing\
  \ 5-15 展示了这两个任务。\n\n**Listing 5-15.**  Example02Controller.m (addActor: 和 removeActor:)\n\
  \n```\n-(void)removeActor:(Actor02*)actor{\n    [toBeRemoved addObject:actor];\n\
  }\n-(void)doRemove{\n    for (Actor02* actor in toBeRemoved){\n        UIImageView*\
  \ imageView = [actorViews objectForKey:[actor actorId]];\n        [actorViews removeObjectForKey:actor];\n\
  \        [imageView removeFromSuperview];\n        [actors removeObject:actor];\n\
  \    }\n    [toBeRemoved removeAllObjects];\n}\n```\n\n在 Listing 5-15 中，`addActor`\
  \ 任务只是将演员添加到 `NSMutableArray actors` 中。如果你想跟踪添加的演员，这就是你该做的地方。同样地，`removeActor` 任务只是将演员添加到\
  \ `NSMutableArray toBeRemoved` 中，以便稍后清理。`doRemove` 任务找到用于在屏幕上绘制该演员的 `UIImageView`，并将其从\
  \ `UIView actorViews` 中移除。通过调用 `removeFromSuperview`，该 `UIImageView` 也会从场景中被移除。对象\
  \ `actor` 也会从 `NSMutableArray actors` 中被移除。现在我们已经了解了演员是如何从游戏中添加和移除的，接下来我们看一下 `updateScene`\
  \ 任务，它会被定期调用来将游戏推进一帧，如 Listing 5-16 所示。\n\n**Listing 5-16.**  Example02Controller.m\
  \ (updateScene)\n\n```\n-(void)updateScene{\n    if (stepNumber % (60*10) == 0){\n\
  \        [self addActor:[Asteroid02 asteroid:self]];\n    }\n    for (Actor02* actor\
  \ in actors){\n        [actor step:self];\n    }\n    for (Actor02* actor in actors){\n\
  \        if ([actor isKindOfClass:[Asteroid02 class]]){\n            if ([viper\
  \ overlapsWith:actor]){\n                [viper doCollision:actor In:self];\n  \
  \              break;\n            }\n        }\n    }\n    for (Actor02* actor\
  \ in actors){\n        [self updateActorView:actor];\n    }\n    [self doRemove];\n\
  \    stepNumber++;\n}\n```\n\n在 Listing 5-16 中，我们看到了 `updateScene` 任务，这是游戏的心脏，它每秒被调用大约\
  \ 60 次，我们在这里推进游戏进程。我们要做的第一件事是检查是否要向游戏中添加一颗新小行星。这是通过对 `stepNumber` 取模 600 并检查结果是否为零来完成的。实际上，由于游戏以大约每秒\
  \ 60 帧的速度运行，这相当于每 10 秒向场景中添加一个新的 `Asteroid02`。\n\n在测试完是否应该添加新小行星后，我们遍历游戏中的所有演员，并对它们调用\
  \ `step:`。这给了每个演员一个根据其特定行为推进状态的机会。背景将不做任何事，小行星会向下移动，而飞船则会朝其 `moveToPoint` 移动。在更新完每个演员的位置后，我们需要测试是否发生碰撞。这通过再次遍历所有演员，找到那些是小行星的演员，并检查碰撞状态来完成。对于这个简单的例子，遍历所有演员来寻找碰撞是可以接受的。然而，在一个更复杂的应用程序中，改进这个算法（哪怕是当前这样的算法）可能很重要。改进措施包括将所有小行星保存在它们自己的数组中，并可能按位置进行排序。\n\
  \n### 为每个演员更新 UIView\n\n我们已经测试了是否发生碰撞，现在我们必须确定每个演员的 `UIImageView` 的新位置。这通过 `updateActorView:`\
  \ 任务完成，如 Listing 5-17 所示。\n\n**Listing 5-17.**  Example02Controller.\n\n\n\n\n"
- "# `updateActorView:`\n\n```objective-c\n-(void)updateActorView:(Actor02*)actor{\n\
  \    UIImageView* imageView = [actorViews objectForKey:[actor actorId]];\n    if\
  \ (imageView == nil){\n        UIImageView* imageView = [[UIImageView alloc] initWithImage:[UIImage\
  \ imageNamed:[actor imageName]]];\n        [actorViews setObject:imageView forKey:[actor\
  \ actorId]];\n        [imageView setFrame:CGRectMake(0, 0, 0, 0)];\n        [actorView\
  \ addSubview:imageView];\n    }\n\n    float xFactor = actorView.frame.size.width/self.gameAreaSize.width;\n\
  \    float yFactor = actorView.frame.size.height/self.gameAreaSize.height;\n\n \
  \   float x = (actor.center.x-actor.radius)*xFactor;\n    float y = (actor.center.y-actor.radius)*yFactor;\n\
  \    float width = actor.radius*xFactor*2;\n    float height = actor.radius*yFactor*2;\n\
  \    CGRect frame = CGRectMake(x, y, width, height);\n    [imageView setFrame:frame];\n\
  }\n```\n\n在列表 5-17 中，我们首先找到表示传入演员的`UIImageView`。我们通过使用演员的`actorId`作为键，在`NSMutableArray\
  \ actorViews`中查找`UIImageView`。如果没有找到`UIImageView`，则说明这个演员刚刚被添加，因此我们必须创建它。\n\n创建`UIImageView`很简单：基于演员的`imageName`创建一个`UIImage`，然后用它创建一个新的`UIImageView`。然后我们将`UIImageView`放入`NSMutableDictionary\
  \ actorViews`中，同样使用演员的 ID 作为键。最后，我们将新的`UIImageView`添加到`actorView`。我们将新的`UIImageView`的`frame`设置为零大小，以防止一些重绘问题。这个`frame`很快就会更新。\n\
  \n### 在屏幕上放置`UIImageView`\n\n创建`UIImageView`（如果需要）之后，我们必须确定它在屏幕上的绘制位置。第一步是找出游戏区域大小与屏幕上`actorView`实际大小之间的关系。我们可以简单地将`actorView`的宽度除以游戏区域的宽度来计算`xFactor`。对高度进行同样的操作来计算`yFactor`。一旦有了这些比例，我们就可以计算`UIImageView`的`frame`。当我们计算出构成`UIImageView`新`frame`的四个值后，就设置它。图\
  \ 5-10 说明了如何计算这些值。\n\n![9781430244226_Fig05-10.jpg](img/9781430244226_Fig05-10.jpg)\n\
  \n**图 5-10.** 将游戏坐标转换为屏幕坐标\n\n在图 5-10 中，左侧我们看到游戏区域，右侧是描述`actorView`的`frame`的`CGRect`。左侧的圆形是一个需要转换为`actorView`上`CGRect`的`Actor02`。我们首先通过找到`Actor02`的左上角点来确定`GCFrame`的原点。通过从`Actor02`的`center`\
  \ X 值减去`Actor02`的`radius`来找到左上角点的 X 值。要找到 Y 值，我们从`Actor02`的`center` Y 值减去`radius`。为了将这些点转换为`actorView`的坐标空间，我们只需将左上角点的\
  \ X 值乘以`xFactor`，并将 Y 值乘以`yFactor`。`xFactor`和`yFactor`值是`gameAreaSize`的宽度和高度与`actorView`的`frame`的宽度和高度之间的比例。要找到`actorView`的`frame`的大小，我们只需将`radius`乘以`xFactor`和`yFactor`来得到宽度和高度。\n\
  \n当用户触摸`UIView actorView`时，我们必须反向进行这个过程：将`actorView`上的点转换为游戏空间中的点。这个转换发生在`tapGesture:`任务中，如列表\
  \ 5-18 所示。\n\n**列表 5-18.** Example02Controller.h (`tapGesture:`)\n\n```objective-c\n\
  - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{\n    UITapGestureRecognizer*\
  \ tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;\n\n    CGPoint pointOnView\
  \ = [tapRecognizer locationInView:actorView];\n\n    float xFactor = actorView.frame.size.width/self.gameAreaSize.width;\n\
  \    float yFactor = actorView.frame.size.height/self.gameAreaSize.height;\n\n \
  \   CGPoint pointInGame = CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);\n\
  \n    [viper setMoveToPoint:pointInGame];\n}\n```\n\n在列表 5-18 中，我们通过调用`tapRecognizer`上的`locationInView:`并传入`actorView`，将结果存储在`pointOnView`中，来找到用户触摸的位置。重新计算`xFactor`和`yFactor`值后，我们简单地将`pointOnView`的\
  \ X 和 Y 值除以`xFactor`和`yFactor`，得到`pointInGame`。使用这个值，我们只需设置`viper`的`moveToPoint`属性为`pointInGame`。\n\
  \n为了结束这个示例，让我们看一下改变`actorView`大小的代码，如列表 5-19 所示。\n\n**列表 5-19.** Example02Controller.m\
  \ (`sliderValueChanged:`)\n\n```objective-c\n- (IBAction)sliderValueChanged:(id)sender\
  \ {\n    UISlider* slider = (UISlider*)sender;\n    float newWidth = [slider value];\n\
  \    float newHeight = gameAreaSize.height/gameAreaSize.width*newWidth;\n\n    CGRect\
