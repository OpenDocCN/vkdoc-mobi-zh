  @end\n```\n\n在清单 7-16 中，我们看到了`Asteroid`类的声明。可以看到`Asteroid`类继承了`Actor`类，并有两个构造器。构造器`asteroid:`被`Example03Controller`用于向场景中添加最大的`Asteroid`。构造器`asteroidOfLevel:At:`用于在点击事件后的`doHit:`任务中创建并添加更小的`Asteroid`。清单\
