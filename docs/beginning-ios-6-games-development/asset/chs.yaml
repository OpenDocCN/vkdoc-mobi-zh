- "# `@interface GameController : UIViewController <CoinsControllerDelegate>` \n\n\
  ```objc\n{\n    IBOutlet UIView *landscapePlayView;\n    IBOutlet UIView *landscapeGameHolderView;\n\
  \    IBOutlet UIView *portraitPlayView;\n    IBOutlet UIView *portraitGameHolderView;\n\
  \    IBOutlet UIView *loadingView;\n    IBOutlet UIView *welcomeView;\n    IBOutlet\
  \ UIButton *continueButton;\n    IBOutlet UIView *aboutView;\n    IBOutlet CoinsController\
  \ *coinsController;\n    IBOutletCollection(UILabel) NSArray *remainingTurnsLabels;\n\
  \    IBOutletCollection(UILabel) NSArray *scoreLabels;\n    IBOutlet HighscoreController\
  \ *highscoreController;\n    CoinsGame* previousGame;\n    BOOL isPlayingGame;\n\
  }\n-(void)setPreviousGame:(CoinsGame*)aCoinsGame;\n-(CoinsGame*)currentGame;\n-\
  \ (IBAction)continueGameClicked:(id)sender;\n- (IBAction)newGameClicked:(id)sender;\n\
  - (IBAction)highScoresClicked:(id)sender;\n- (IBAction)aboutClicked:(id)sender;\n\
  - (IBAction)aboutDoneClicked:(id)sender;\n- (IBAction)highscoreDoneClicked:(id)sender;\n\
  -(void)loadImages;\n-(void)showPlayView:(UIInterfaceOrientation)interfaceOrientation;\n\
  @end\n```\n\n在代码清单 3-1 中，我们导入了该项目中定义的另外三个类，其中包括 UIKit 的默认导入语句。其余 `IBOutlet` 语句均为基本声明，用于访问多个不同的视图。`IBOutletCollection`\
  \ 定义对我们来说是一种新型的连接方式。`IBOutletCollection` 的行为与 `IBOutlet` 非常相似，区别在于它允许你将多个项目连接到一个\
  \ `NSArray` 中。在我们的案例中，有两个用于显示分数的标签：横屏和竖屏。我们无需为每个标签都分别声明一个 `IBOutlet`（及对应的变量），只需使用一个\
  \ `IBOutletCollection`，这样 `NSArray scoreLabels` 在运行时就会同时包含这两个标签。当需要更新 UI 显示新分数时，我们只需更新数组\
  \ `scoreLabels` 中所有 `UILabel` 的文本即可。对于显示剩余回合数的标签，我们也采用相同的模式，每个标签都存储在 `NSArray remainingTurnsLabels`\
  \ 中。\n\n## 将视图呈现在屏幕上\n\n至此，我们完成了对不同视图定义方式的概述。现在，我们来看看每个视图是如何显示到屏幕上的，先从加载视图开始。\n\n\
  我们知道，当应用程序加载时，`GameController` 类的主视图会显示出来，就像第 2 章中那样。然而，`GameController` 的主视图是空的——它实际上是我们应用程序的根组件。当我们在应用程序中切换视图时，我们会对这个根视图进行子视图的添加和移除操作。代码清单\
  \ 3-2 展示了 `GameController` 中的 `viewDidLoad` 任务，我们在其中添加了希望用户首先看到的视图。\n\n**代码清单 3-2.**\
  \ GameController.m (viewDidLoad)\n\n```objc\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    [self.view addSubview:loadingView];\n    [self performSelectorInBackground:@selector(loadImages)\
  \ withObject:nil];\n}\n```\n\n如代码清单 3-2 所示，当从 XIB 文件加载 `GameController` 实例时，会调用\
  \ `viewDidLoad` 任务。由于每个 `MainWindow` XIB 文件中都包含一个 `GameController` 实例，因此该任务在应用程序启动后会立即执行。在调用\
  \ `viewDidLoad` 的父类实现（此为必需步骤）之后，我们将 `UIView loadingView` 添加到 `GameController` 类的主视图中。`addSubview:`\
  \ 任务会根据子视图的 `frame` 属性所定义的位置和大小来显示这个新的子视图。因为 `loadingView` 是在 XIB 文件中定义的，所以它的 `frame`\
  \ 也在那里定义。\n\n在屏幕显示加载视图后，我们需要加载初始资源，以避免应用程序生命周期后期出现无法预期的暂停。\n\n从技术上讲，此应用程序中并非必须异步加载图像，但如果我们想显示进度条，则需要这样做。为了异步执行任务，我们只需调用\
  \ `performSelectorInBackground:withObject:` 并传入任务 `loadImages` 即可。随后，`loadImage`\
  \ 任务将在后台运行，如代码清单 3-3 所示。\n\n**代码清单 3-3.** GameController.m (loadImage)\n\n```objc\n\
  -(void)loadImages {\n    //sleeping so we can see the loading view. In a production\
  \ app, don't sleep :)\n    [NSThread sleepForTimeInterval:1.0];\n    [coinsController\
  \ loadImages];\n    [loadingView removeFromSuperview];\n    [self.view addSubview:welcomeView];\n\
  }\n```\n\n`loadImage` 任务调用了 `sleepForTimeInterval`，使当前线程休眠一秒钟。这样做是为了确保你能在示例代码中实际看到加载视图；在生产代码中请删除此类代码。休眠结束后，调用\
  \ `coinsController` 上的 `loadImages` 方法。关于 `CoinsController` 实现 `loadImages` 的详细说明，请参阅第\
  \ 4 章——目前你只需知道它会加载所有用于显示硬币的图像即可。加载完成后，我们移除 `loadingView` 并添加 `welcomeView`。\n\n\
  欢迎视图才是用户真正开始使用应用程序的地方。从这里开始，用户可以访问应用程序中感兴趣的部分。\n\n## 响应用户操作切换视图\n\n一旦显示欢迎视图，用户便会看到多个按钮（该视图如图\
  \ 3-3 所示）。顶部的“继续游戏”按钮仅在用户退出应用程序时游戏尚未完成的情况下才会出现。每个按钮都会引导用户导航至一个新视图。实现方式是先建立一个当用户触摸按钮时会被调用的任务。在代码清单\
