  \n图 3-9.  将 `aboutClicked:` 操作连接到“关于”按钮\n\n在图 3-9 中，我们看到通过右键点击“文件所有者”显露出的“连接”菜单。通过从\
  \ `aboutClicked:` 右侧的圆圈拖拽至左侧对应的按钮，你可以选择触发 `aboutClicked:` 任务的操作。松开按钮时，会弹出第二个菜单，允许你选择具体的用户操作。图\
