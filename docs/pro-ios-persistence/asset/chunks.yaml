  trans: "\n首先，为所有 Core Data 实体生成 `NSManagedObject` 类。打开 `SocialNetwork.m` 或 `SocialNetwork.swift`，并实现\
    \ `willTurnIntoFault` 和 `didTurnIntoFault` 方法。在这些方法中，我们不会做任何特殊操作，只会简单地记录它们已被调用，以便验证它们被正确调用。代码清单\
    \ 9-21（Objective-C）和代码清单 9-22（Swift）展示了这些方法的实现。\n\n***代码清单 9-21***. 在 `SocialNetwork.m`\
    \ 中处理故障状态变化\n\n```objc\n- (void)willTurnIntoFault {\n  NSLog(@\"%@ named %@ will\
    \ turn into fault\", [[self class] description], self.name);\n}\n\n- (void)didTurnIntoFault\
    \ {\n  NSLog(@\"%@ did turn into fault\", [[self class] description]);\n}\n```\n\
    \n***代码清单 9-22***. 在 `SocialNetwork.swift` 中处理故障状态变化\n\n```swift\noverride func\
    \ willTurnIntoFault() {\n    println(NSString(format: \"%@ named %@ will turn\
    \ into fault\", self, self.name))\n}\n\noverride func didTurnIntoFault() {\n \
    \   println(NSString(format: \"%@ did turn into fault\", self))\n}\n```\n\n请注意，我们在\
    \ `willTurnIntoFault` 方法中记录了社交网络的名称。然而，在 `didTurnIntoFault` 方法中，我们没有记录名称。为什么？因为我们已经没有名称可以记录了。对象处于故障状态，还记得吗？它的属性（包括名称）都不在内存中。\n\
    \n现在，创建一个名为 `DidFault` 的测试，它遵循 `PerfTest` 协议，然后实现其 `runWithContext:` 方法来执行前面概述的七个步骤。代码清单\
    \ 9-23 展示了 `DidFault.h`，代码清单 9-24 展示了 `DidFault.m`，代码清单 9-25 展示了 `DidFault.swift`。\n\
    \n***代码清单 9-23***. `DidFault.h`\n\n```objc\n#import \"PerfTest.h\"\n\n@interface\
    \ DidFault : NSObject <PerfTest>\n\n@end\n```\n\n***代码清单 9-24***. 实现了故障测试的 `DidFault.m`\n\
    \n```objc\n#import \"DidFault.h\"\n#import \"Selfie.h\"\n#import \"SocialNetwork.h\"\
    \n\n@implementation DidFault\n\n-(NSString *)runTestWithContext:(NSManagedObjectContext\
    \ *)context {\n  NSString *result = nil;\n\n// 1) 获取第一张自拍\n  NSFetchRequest *fetchRequest\
    \ = [NSFetchRequest fetchRequestWithEntityName:@\"Selfie\"];\n  fetchRequest.predicate\
    \ = [NSPredicate predicateWithFormat:@\"name = %@\", @\"Selfie 1\"];\n  NSArray\
    \ *selfies = [context executeFetchRequest:fetchRequest error:nil];\n  if ([selfies\
    \ count] == 1) {\n    Selfie *selfie = selfies[0];\n\n// 2) 从自拍中获取一个社交网络\n   \
    \ SocialNetwork *socialNetwork = [selfie.socialNetworks anyObject];\n    if (socialNetwork\
    \ != nil) {\n      // 3) 检查它是否为故障状态\n      result = [NSString stringWithFormat:@\"\
    Social Network %@ a fault\\n\",\n                [socialNetwork isFault] ? @\"\
    is\" : @\"is not\"];\n\n// 4) 获取名称\n      result = [result stringByAppendingFormat:@\"\
    Social Network is named '%@'\\n\",\n                socialNetwork.name];\n\n//\
    \ 5) 检查它是否为故障状态\n      result = [result stringByAppendingFormat:@\"Social Network\
    \ %@ a fault\\n\",\n                [socialNetwork isFault] ? @\"is\" : @\"is\
    \ not\"];\n\n// 6) 将其恢复为故障状态\n      [context refreshObject:socialNetwork mergeChanges:NO];\n\
    \      result = [result stringByAppendingFormat:@\"Turning Social Network into\
    \ a fault\\n\"];\n\n// 7) 检查它是否为故障状态\n      result = [result stringByAppendingFormat:@\"\
    Social Network %@ a fault\\n\",\n                [socialNetwork isFault] ? @\"\
    is\" : @\"is not\"];\n    } else {\n      result = @\"Couldn't find social networks\
    \ for selfie\";\n    }\n  } else {\n    result = @\"Failed to fetch first selfie\"\
    ;\n  }\n  return result;\n}\n\n@end\n```\n\n***代码清单 9-25***. 实现了故障测试的 `DidFault.swift`\n\
    \n```swift\nimport Foundation\nimport CoreData\n\nclass DidFault : PerfTest {\n\
    \    func runTestWithContext(context: NSManagedObjectContext) -> String! {\n \
    \       var result : String?\n\n// 1) 获取第一张自拍\n        let fetchRequest = NSFetchRequest(entityName:\
    \ \"Selfie\")\n        fetchRequest.predicate = NSPredicate(format: \"name = %@\"\
    , \"Selfie 1\")\n        let selfies = context.executeFetchRequest(fetchRequest,\
    \ error: nil)\n        if selfies?.count == 1 {\n            let selfie = selfies?[0]\
    \ as Selfie\n\n// 2) 从自拍中获取一个社交网络\n            let socialNetwork = selfie.socialNetworks.anyObject()\
    \ as SocialNetwork?\n            if let socialNetwork = socialNetwork {\n    \
    \            // 3) 检查它是否为故障状态\n                result = NSString(format: \"Social\
    \ Network %@ a fault\\n\", socialNetwork.fault ? \"is\" : \"is not\")\n\n// 4)\
    \ 获取名称\n                result = result?.stringByAppendingFormat(\"Social Network\
    \ is named '%@'\\n\", socialNetwork.name)\n\n// 5) 检查它是否为故障状态\n              \
    \  result = result?.stringByAppendingFormat(\"Social Network %@ a fault\\n\",\
    \ socialNetwork.fault ? \"is\" : \"is not\")\n\n// 6) 将其恢复为故障状态\n            \
    \    context.refreshObject(socialNetwork, mergeChanges: false)\n             \
    \   result = result?.stringByAppendingFormat(\"Turning Social Network into a fault\\\
    n\")\n\n// 7) 检查它是否为故障状态\n                result = result?.stringByAppendingFormat(\"\
    Social Network %@ a fault\\n\", socialNetwork.fault ? \"is\" : \"is not\")\n \
    \           }\n            else {\n                result = \"Couldn't find social\
    \ networks for selfie\"\n            }\n        }\n        else {\n          \
    \  result = \"Failed to fetch first selfie\"\n        }\n\nreturn result!\n  \
    \  }\n}\n```\n\n这段代码正如承诺的那样，遵循了七个步骤。在第 4 步中访问社交网络的名称会触发故障，因此第 5 步中社交网络不再是故障状态。当然，第\
    \ 6 步将社交网络恢复为故障状态。\n\n要将这个新测试添加到选择器视图中，以便我们可以选择并运行它，请打开 `ViewController.m`，添加对\
    \ `DidFault.h` 的导入，并将 `DidFault` 的实例添加到 `tests` 数组中，如代码清单 9-26 所示。\n\n***代码清单\
    \ 9-26***. 在 `ViewController.m` 的 `viewDidLoad` 方法中添加 `DidFault` 实例\n\n```objc\n\
    - (void)viewDidLoad {\n  [super viewDidLoad];\n\nself.startTime.text = @\"\";\n\
    \  self.stopTime.text = @\"\";\n  self.elapsedTime.text = @\"\";\n  self.results.text\
    \ = @\"\";\n\nself.tests = @[[[FetchAll alloc] init],\n                 [[DidFault\
    \ alloc] init]];\n}\n```\n\n对于 Swift，请在 `ViewController.swift` 中添加实例，如代码清单 9-27\
    \ 所示。\n\n***代码清单 9-27***. 在 `ViewController.swift` 的 `viewDidLoad` 方法中添加 `DidFault`\
    \ 实例\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\nself.startTime.text\
    \ = \"\"\n    self.stopTime.text = \"\"\n    self.elapsedTime.text = \"\"\n  \
    \  self.results.text = \"\"\n\nself.tests.append(FetchAll())\n    self.tests.append(DidFault())\n\
    }\n```\n\n构建并运行应用程序。你应该能在选择器中看到 `DidFault`。选择它并点击“运行所选测试”。你应该会看到类似如下的输出：\n\n```\n\
    Social Network is a fault\nSocial Network is named 'SocialNetwork 117'\nSocial\
    \ Network is not a fault\nTurning Social Network into a fault\nSocial Network\
    \ is a fault\n```\n\n你还应该会在日志中看到 `willTurnIntoFault` 和 `didTurnIntoFault` 被调用时的输出，如下所示：\n\
    \n```\n2014-11-04 07:25:57.149 PerformanceTuning[38171:2069648] SocialNetwork\
    \ named SocialNetwork 387 will turn into fault\n2014-11-04 07:25:57.151 PerformanceTuning[38171:2069648]\
    \ SocialNetwork did turn into fault\n```\n\n## 掌握控制权：主动触发故障\n"
- fmt: '本文关于故障的讨论一开始就指出，当你自己运行 SQL 查询时，对内存使用有更多的控制权，而不是让 Core Data 来管理数据获取。尽管确实如此，但你也可以通过自己触发故障来对
    Core Data 的故障管理施加一定程度的控制。通过自己触发故障，你可以避免低效的情况，比如 Core Data 必须触发多个小故障来获取你的数据，从而导致多次访问持久化存储。


    Core Data 提供了两种优化触发故障的方法：


    - 批量故障处理

    - 预取


    我们将测试批量故障处理和预取。不过在此之前，我们先创建一个测试来触发单个故障，这样我们就能了解批量故障处理和预取带来的性能提升。添加一个名为`SingleFault`的类，使其遵循`PerfTest`协议。这个测试应该获取所有
    selfie，并逐个循环遍历它们，同时执行以下操作：


