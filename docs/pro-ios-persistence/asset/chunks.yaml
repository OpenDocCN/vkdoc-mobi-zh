    \ }\n    return \"Longest words: \\(list)\\n\"\n}\n```\n\nAfter adding a call\
    \ to this method in `statistics` and running `WordList`, you can see that the\
    \ longest word is the 28-letter gem \"ethylenediaminetetraacetates.\"\n\n## Using\
    \ Subqueries\n\nIn some cases, you want to fetch objects based on criteria that\
    \ pertain to other related objects. Suppose, for example, you want to fetch all\
    \ the word categories that have at least one 25-letter word. Without subqueries,\
    \ you'd normally have to fetch these data in two steps.\n\n1.  Fetch all the word\
    \ categories.\n2.  For each word category, fetch the count of words with 25 letters.\n\
    \nSubquery expressions allow you to combine those steps into a single query. Your\
    \ entire predicate and logic can be expressed as\n\n```\nSUBQUERY(words, $x, $x.length\
    \ == 25).@count > 0\n```\n\nThe general format for subqueries is\n\n```\nSUBQUERY(collection_expression,\
    \ variable_expression, predicate)\n```\n\nThe `collection_expression` parameter\
    \ refers to the collection property in the entity you're fetching, so we use `words`\
    \ to reference the `words` collection. The `variable_expression` can be called\
    \ anything you'd like; it's the variable that will temporarily hold each item\
    \ in the collection as the subquery iterates through the collection. The `predicate`\
    \ is, of course, the test for inclusion in the result set.\n\nAs with other expression\
    \ types, you can create subqueries using the query language, as shown previously,\
    \ or you can build them manually with `NSExpression`. The `NSExpression` class\
    \ has a static initializer called `+expressionForSubQuery:usingIteratorVariable:predicate:`\
    \ (or the Swift counterpart `init(forSubquery expression: NSExpression!, usingIteratorVariable\
    \ variable: String!, predicate predicate: AnyObject!)`) for creating subquery\
    \ expressions. The parameters to that method line up with the query language format:\
    \ the first parameter is the collection expression to evaluate. The second is\
    \ the name of the temporary variable to use during iteration. Finally, the last\
    \ is the predicate to use for evaluation.\n\nThe `wordCategoriesWith25LetterWords`\
    \ method shown in [Listing 3-52](#9781430260288_Ch03.xhtml#list52) (Objective-C)\
    \ and [Listing 3-53](#9781430260288_Ch03.xhtml#list53) (Swift) uses the subquery\
    \ described earlier to get all the categories that have at least one 25-letter\
    \ word. Add a call to it in your `statistics` method to see that two categories,\
    \ \"i\" and \"p,\" have at least one 25-letter word.\n\n[***Listing 3-52***](#9781430260288_Ch03.xhtml#_list52).\
    \ Using a Subquery in Objective-C\n\n```\n- (NSString *)wordCategoriesWith25LetterWords\
    \ {\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
    WordCategory\"];\n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    SUBQUERY(words, $x, $x.length = 25).@count > 0\"];\n  fetchRequest.predicate =\
    \ predicate;\n  NSLog(@\"Subquery Predicate: %@\", [predicate predicateFormat]);\n\
    \  NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest\
    \ error:nil];\n  return [NSString stringWithFormat:@\"Categories with 25-letter\
    \ words: %@\\n\",\n          [[categories valueForKey:@\"firstLetter\"] componentsJoinedByString:@\"\
    ,\"]];\n}\n```\n\n[***Listing 3-53***](#9781430260288_Ch03.xhtml#_list53). Using\
    \ a Subquery in Swift\n\n```\nfunc wordCategoriesWith25LetterWords() -> String\
    \ {\n    var fetchRequest = NSFetchRequest(entityName: \"WordCategory\")\n   \
    \ let predicate = NSPredicate(format: \"SUBQUERY(words, $x, $x.length = 25).@count\
    \ > 0\", argumentArray: [])\n\nprintln(\"Subcategoy predicate: \\(predicate.predicateFormat)\"\
    )\n\nfetchRequest.predicate = predicate\n\nlet list = NSMutableString()\n    var\
    \ error: NSError? = nil\n    if let categories = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
    \ error: &error) {\n        for word in categories {\n            list.appendString(((word\
    \ as NSManagedObject).valueForKey(\"firstLetter\") as String)+\",\")\n       \
    \ }\n    }\n\nreturn \"Categories with 25-letter words: \\(list)\\n\"\n}\n```\n\
    \n## Sorting\n\nUntil now, we've accepted the output order of any fetch request\
    \ as Core Data chose to return it, but Core Data allows you to set a sort order\
    \ for any fetch request. You can select multiple columns for the sort, as well\
    \ as the sort direction for each column. To sort a fetch request, you set the\
    \ fetch request's `sortDescriptors` property to an array of `NSSortDescriptor`\
    \ instances. Each `NSSortDescriptor` stores the column (or property) it sorts\
    \ on, as well as the order to sort.\n\nTo sort all the words that start with \"\
    z\" in ascending length order, for example, you'd create an `NSSortDescriptor`\
    \ as follows:\n\n```\n[NSSortDescriptor sortDescriptorWithKey:@\"length\" ascending:YES]\
    \ // Objective-C\nNSSortDescriptor(key: \"length\", ascending: true) // Swift\n\
    ```\n\nThat would sort the words in ascending length order but arbitrarily sort\
    \ the words that have the same length. We can add another sort descriptor that\
    \ sorts the words in descending alphabetical order, as follows:\n\n```\n[NSSortDescriptor\
    \ sortDescriptorWithKey:@\"text\" ascending:NO] // Objective-C\nNSSortDescriptor(key:\
    \ \"text\", ascending: false) // Swift\n```\n\nThe order in which you put your\
    \ sort descriptors in the array that you use to set your fetch request's `sortDescriptors`\
    \ is significant. The results will be sorted according to the order of the sort\
    \ descriptors. In our example, that means that words of the same length will be\
    \ grouped together, sorted in descending alphabetical order.\n\n[Listing 3-54](#9781430260288_Ch03.xhtml#list54)\
    \ (Objective-C) and [Listing 3-55](#9781430260288_Ch03.xhtml#list55) (Swift) show\
    \ the `zWords` method that sorts the words starting with \"z\" using those two\
    \ sort descriptors.\n\n[***Listing 3-54***](#9781430260288_Ch03.xhtml#_list54).\
    \ Sorting the Results in Objective-C\n\n```\n- (NSString *)zWords {\n  NSFetchRequest\
    \ *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"Word\"];\n  NSPredicate\
    \ *predicate = [NSPredicate predicateWithFormat:@\"text BEGINSWITH 'z'\"];\n \
    \ NSSortDescriptor *lengthSort = [NSSortDescriptor sortDescriptorWithKey:@\"length\"\
    \ ascending:YES];\n  NSSortDescriptor *alphaSort = [NSSortDescriptor sortDescriptorWithKey:@\"\
    text\" ascending:NO];\n\nfetchRequest.predicate = predicate;\n  fetchRequest.sortDescriptors\
    \ = @[lengthSort, alphaSort];\n\nNSLog(@\"Predicate: %@\", predicate);\n  NSArray\
    \ *words = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];\n\
    \  return [NSString stringWithFormat:@\"Z words:\\n%@\\n\",\n          [[words\
    \ valueForKey:@\"text\"] componentsJoinedByString:@\"\\n\"]];\n}\n```\n\n[***Listing\
    \ 3-55***](#9781430260288_Ch03.xhtml#_list55). Sorting the Results in Swift"
