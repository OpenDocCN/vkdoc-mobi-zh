    \ {\n    let account = DBAccountManager.sharedManager().handleOpenURL(url)\n \
    \   if let account = account {\n        println(\"App linked successfully from\
    \ \\(sourceApplication)\")\n        return true\n    }\n    return false\n}\n\
    ```\n\n此时，你需要更新 UI 以显示 Dropbox 账户已链接，并准备好应用程序以启用 Dropbox 连接。我们将在下一节中执行此操作。\n\n\
    ## 使用 Dropbox API 创建和同步数据\n\n现在我们的应用已链接到 Dropbox，接下来使用 Dropbox Persistence API\
    \ 做一些事情。在`ViewController.h`中（针对 Objective-C 版本）声明一个按钮属性，如[代码清单 8-20](#9781430260288_Ch08.xhtml#list20)所示，然后在\
    \ Interface Builder 中将其连接到“Link to Dropbox”按钮。这样，我们就可以适当地更改其文本以反映 Dropbox 的连接状态。\n\
    \n[***代码清单 8-20***](#9781430260288_Ch08.xhtml#_list20) 在`ViewController.h`中声明按钮\n\
    ```objc\n@property (weak, nonatomic) IBOutlet UIButton *theButton;\n```\n\n在`AppDelegate.m`或`AppDelegate.swift`中，修改`application:openURL:sourceApplication:annotation:`方法，使其看起来像[代码清单\
    \ 8-21](#9781430260288_Ch08.xhtml#list21)（Objective-C）或[代码清单 8-22](#9781430260288_Ch08.xhtml#list22)（Swift），以便在成功链接到\
    \ Dropbox 后将按钮的文本设置为“Store”。对于 Objective-C 的`AppDelegate.m`，请添加对`ViewController.h`的导入。\n\
    \n[***代码清单 8-21***](#9781430260288_Ch08.xhtml#_list21) 在`AppDelegate.m`中将按钮标题设置为“Store”\n\
    ```objc\n- (BOOL)application:(UIApplication *)application openURL:(NSURL *)url\
    \ sourceApplication:(NSString *)sourceApplication annotation:(id)annotation {\n\
    \  DBAccount *account = [[DBAccountManager sharedManager] handleOpenURL:url];\n\
    \  if (account) {\n    NSLog(@\"App linked successfully from %@\", sourceApplication);\n\
    \n    ViewController *rvc = (ViewController*)self.window.rootViewController;\n\
    \    [rvc.theButton setTitle:@\"Store\" forState:UIControlStateNormal];\n\n  \
    \  return YES;\n  }\n  return NO;\n}\n```\n\n[***代码清单 8-22***](#9781430260288_Ch08.xhtml#_list22)\
    \ 在`AppDelegate.swift`中将按钮标题设置为“Store”\n```swift\nfunc application(application:\
    \ UIApplication, openURL url: NSURL, sourceApplication: String, annotation: AnyObject?)\
    \ -> Bool {\n    let account = DBAccountManager.sharedManager().handleOpenURL(url)\n\
    \    if let account = account {\n        println(\"App linked successfully from\
    \ \\(sourceApplication)\")\n\n        let controller = self.window?.rootViewController\
    \ as? ViewController\n        controller?.theButton?.setTitle(\"Store\", forState:\
    \ .Normal)\n\n        return true\n    }\n    return false\n}\n```\n\n然后，为了保持一致性，编辑`ViewController.m`或`ViewController.swift`中的`viewDidLoad`方法，将按钮的标签设置为当前链接状态，如[代码清单\
    \ 8-23](#9781430260288_Ch08.xhtml#list23)（Objective-C）或[代码清单 8-24](#9781430260288_Ch08.xhtml#list24)（Swift）所示。\n\
    \n[***代码清单 8-23***](#9781430260288_Ch08.xhtml#_list23) 在`ViewController.m`中设置按钮文本\n\
    ```objc\n- (void)viewDidLoad {\n  [super viewDidLoad];\n\n  if ([[DBAccountManager\
    \ sharedManager] linkedAccount]) {\n    [self.theButton setTitle:@\"Store\" forState:UIControlStateNormal];\n\
    \  }\n  else {\n    [self.theButton setTitle:@\"Link Dropbox\" forState:UIControlStateNormal];\n\
    \  }\n}\n```\n\n[***代码清单 8-24***](#9781430260288_Ch08.xhtml#_list24) 在`ViewController.swift`中设置按钮文本\n\
    ```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\n    if let\
    \ linkedAccount = DBAccountManager.sharedManager().linkedAccount {\n        self.theButton?.setTitle(\"\
    Store\", forState: .Normal)\n    }\n    else {\n        self.theButton?.setTitle(\"\
    Link Dropbox\", forState: .Normal)\n    }\n}\n```\n\n当然，此时我们还没有存储任何内容。如果你运行应用，链接到\
