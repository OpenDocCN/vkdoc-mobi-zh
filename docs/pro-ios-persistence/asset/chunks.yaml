  raw: 'The current Detail view just shows a label: “Detail view content goes here.”
    We want instead to show a table, similar to the Master view, but with `Bug` objects
    instead of `Project` objects. Start by updating the `DetailViewController` class
    header file to subclass `UITableViewController` instead of `UIViewController`.
    You can also get rid of the two properties, `detailItem` and `detailDescriptionLabel`,
    and add a property to store the parent `Project` object for the bugs. [Listing
    5-45](#9781430260288_Ch05.xhtml#list45) shows the updated header file for Objective-C,
    and [Listing 5-46](#9781430260288_Ch05.xhtml#list46) shows the changes for Swift.


    [***Listing 5-45***](#9781430260288_Ch05.xhtml#_list45). `DetailViewController.h`


    ```

    #import <UIKit/UIKit.h>

    @class Project;

    @interface DetailViewController : UITableViewController

    @property (strong, nonatomic) Project *project;

    @end

    ```


    [***Listing 5-46***](#9781430260288_Ch05.xhtml#_list46). `DetailViewController.swift`


    ```

    import UIKit


    class DetailViewController: UITableViewController {


    var project: Project? = nil

      ...

    }

    ```


    You also must update the implementation file to handle the table view. We don’t
    have a fetched results controller this time—we have a `Project` object that the
    fetched results controller gave us. The `Project` object has a set of `Bug` objects
    that we can sort into an array. Using this array to populate a table is standard
    fare in iOS development. We also want to reload the table anytime the view will
    appear, and set the title in the navigation bar to the project name. Finally,
    we want to show a + button on the right of the navigation bar to insert a new
    bug, although we’ll leave the implementation blank for now. [Listing 5-47](#9781430260288_Ch05.xhtml#list47)
    shows the updated `DetailViewController.m` file, and [Listing 5-48](#9781430260288_Ch05.xhtml#list48)
    shows the updated `DetailViewController.swift` file.


    [***Listing 5-47***](#9781430260288_Ch05.xhtml#_list47). `DetailViewController.m`


    ```

    #import "DetailViewController.h"

    #import "Project.h"

    #import "Bug.h"


    @interface DetailViewController ()


    @end


    @implementation DetailViewController


    - (void)viewDidLoad {

      [super viewDidLoad];


    UIBarButtonItem *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd
    target:self action:@selector(insertNewObject:)];

      self.navigationItem.rightBarButtonItem = addButton;

    }


    - (void)viewWillAppear:(BOOL)animated {

      [super viewWillAppear:animated];

      self.title = self.project.name;

      [self.tableView reloadData];

    }


    - (void)didReceiveMemoryWarning {

      [super didReceiveMemoryWarning];

      // Dispose of any resources that can be recreated.

    }


    - (void)insertNewObject:(id)sender {

    }


    #pragma mark - Table View


    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {

      return 1;

    }


    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section
    {

      return [self.project.bugs count];

    }


    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath {

      UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"DetailCell"
    forIndexPath:indexPath];

      [self configureCell:cell atIndexPath:indexPath];

      return cell;

    }


    - (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath
    {

      Bug *bug = [self sortedBugs][indexPath.row];

      cell.textLabel.text = bug.title;

    }


    - (NSArray *)sortedBugs {

      NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@"title"
    ascending:YES];

      return [self.project.bugs sortedArrayUsingDescriptors:@[sortDescriptor]];

    }

    @end

    ```


