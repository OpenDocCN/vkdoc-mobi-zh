      NSData *salt = [data subdataWithRange:NSMakeRange(0, kSaltLength)];\n  NSData\
    \ *iv = [data subdataWithRange:NSMakeRange(kSaltLength, kCCBlockSizeAES128)];\n\
      NSData *text = [data subdataWithRange:NSMakeRange(kSaltLength + kCCBlockSizeAES128,\
    \ [data length] - kSaltLength - kCCBlockSizeAES128)];\n\n// Get the decrypted\
    \ data\n  NSData *decrypted = [self transform:text password:[self password] salt:salt\
    \ iv:iv operation:kCCDecrypt];\n\n// Return only the decrypted string\n  return\
    \ [[NSString alloc] initWithData:decrypted encoding:NSUTF8StringEncoding];\n}\n\
    \n- (NSData *)transform:(NSData *)value\n             password:(NSString *)password\n\
                     salt:(NSData *)salt\n                   iv:(NSData *)iv\n            operation:(CCOperation)operation\
    \ {\n  // Get the key by salting the password\n  NSData *key = [self keyForPassword:password\
