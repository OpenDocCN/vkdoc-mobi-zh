    // End the current group

        [self.managedObjectContext.undoManager endUndoGrouping];

      }


    [self.managedObjectContext.undoManager undo];

      [self saveContext];

    }

    ```


    [***Listing 4-20***](#9781430260288_Ch04.xhtml#_list20). Managing Our Own Undo
    Groups (Swift)


    ```

