    the table, if shown

    *   `numberOfObjects`—the number of objects in the section

    *   `objects`—the actual objects in the section


    To calculate the number of rows in a given section, the `tableView:numberOfRowsInSection:`
    method gets the `NSFetchedResultsSectionInfo` instance for the requested section
