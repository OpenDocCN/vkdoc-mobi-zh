    \n## 处理验证错误\n\n如果你在 Core Data 模型中为任何属性配置了验证参数，并且允许用户输入未自动满足这些验证参数的值，那么你可能会遇到验证错误。验证操作确保数据的完整性；Core\
    \ Data 不会将任何你声明为无效的数据存储到持久化存储中。然而，仅仅因为你创建了验证规则，并不意味着用户知道这些规则——或者他们知道自己可能会违反规则。如果你保留\
    \ Xcode 生成的错误处理机制，即使用户输入了无效数据，他们也不会意识到自己违反了验证规则。结果只会是应用崩溃，并记录一个用户永远看不到的冗长堆栈跟踪。困惑的用户面对崩溃的应用，却不知道原因或如何防止其再次发生。与其在用户输入无效数据时崩溃，不如提醒用户，并给他们纠正数据的机会。\n\
    \n数据库端的验证可能是一个有争议的话题，而且理由充分。你可以通过将验证规则放入数据模型来保护数据的完整性，但这可能会使你的编码任务更加困难。数据模型中的验证规则是一种概念上听起来不错，但在实践中却不太理想的做法。例如，你能想象使用\
    \ Oracle 在 Web 应用中进行字段验证吗？是的，你可以做到，但其他方法可能更简单、更友好且架构更优。在代码中验证用户输入的值，甚至设计防止无效输入的用户界面，都会让你的工作更轻松，也让用户体验更好。\n\
    \n尽管如此，我们仍将继续概述一种处理验证错误的可能策略。不过，别说我们没提醒过你。\n\n## 检测验证错误\n\n检测用户是否输入了无效数据很简单：只需检查传递给托管对象上下文的`save:`方法的`NSError`对象（如果发生错误）。`NSError`对象包含导致`save:`方法失败的错误代码，如果该代码与表\
    \ 4-1 中显示的 Core Data 验证错误代码之一匹配，你就知道尝试保存的部分数据无效。你可以使用`NSError`的`userInfo`字典来查找关于错误原因的更多信息。注意，如果发生了多个错误，错误代码为`1560`（`NSValidationMultipleErrorsError`），并且`userInfo`字典中在键`NSDetailedErrorsKey`下保存了其余的错误代码。\n\
    \n**表 4-1**. Core Data 验证错误\n\n| 常量 | 代码 | 描述 |\n| --- | --- | --- |\n| `NSManagedObjectValidationError`\
    \ | 1550 | 通用验证错误 |\n| `NSValidationMultipleErrorsError` | 1560 | 包含多个验证错误的通用消息\
    \ |\n| `NSValidationMissingMandatoryPropertyError` | 1570 | 非可选属性值为`nil` |\n|\
    \ `NSValidationRelationshipLacksMinimumCountError` | 1580 | 多对多关系中目标对象数量过少 |\n\
    | `NSValidationRelationshipExceedsMaximumCountError` | 1590 | 有界多对多关系中目标对象数量过多\
    \ |\n| `NSValidationRelationshipDeniedDeleteError` | 1600 | 具有`NSDeleteRuleDeny`的关系非空\
    \ |\n| `NSValidationNumberTooLargeError` | 1610 | 某个数值过大 |\n| `NSValidationNumberTooSmallError`\
    \ | 1620 | 某个数值过小 |\n| `NSValidationDateTooLateError` | 1630 | 某个日期值过晚 |\n| `NSValidationDateTooSoonError`\
    \ | 1640 | 某个日期值过早 |\n| `NSValidationInvalidDateError` | 1650 | 某个日期值不匹配日期模式 |\n\
    | `NSValidationStringTooLongError` | 1660 | 某个字符串值过长 |\n| `NSValidationStringTooShortError`\
    \ | 1670 | 某个字符串值过短 |\n| `NSValidationStringPatternMatchingError` | 1680 | 某个字符串值不匹配某个模式\
    \ |\n\n你可以选择实现一个熟悉数据模型、只检查特定错误的错误处理例程，或者编写一个能处理所有验证错误的通用错误处理例程。虽然通用例程扩展性更好，并且无论数据模型如何变化都应能继续工作，但更具体的错误处理例程可能让你在消息和响应中对用户更有帮助。没有哪个答案是正确的——如何处理验证错误的选择权在你手中。\n\
    \n要编写一个真正通用的验证错误处理例程需要做大量工作。需要考虑的一点是，`NSError`对象包含关于所发生错误的大量信息，但可能不足以告诉用户验证失败的原因。例如，假设你有一个实体`Foo`，其属性`bar`必须至少包含五个字符。如果用户为`bar`输入了“abc”，你将收到一条`NSError`消息，其中包含错误代码（`1670`）、实体（`Foo`）、属性（`bar`）以及验证失败的值（abc）。`NSError`对象不会告诉你\
    \ abc 为何太短——它不包含`bar`至少需要五个字符的信息。要得出这一结论，你必须向`Foo`实体询问`bar`属性的`NSPropertyDescription`，获取该属性描述的验证谓词，并遍历这些谓词以查看`bar`的最小长度。这是一个崇高的目标，但繁琐且通常过于复杂。这是违反“不要重复自己”（DRY）原则、让代码了解一些数据模型信息可能是更好答案的一个例子。\n"
- fmt: 'One other strange thing to consider when using validations in your data model
    is that they aren’t enforced when you create a managed object; they’re enforced
    only when you try to save the managed object context that the managed object lives
    in. This makes sense if you think it through, since creating a managed object
    and populating its properties happens in multiple steps. First, you create the
    object in the context, and then you set its attributes and relationships. So,
    for example, if you were creating the managed object for the `Foo` entity in the
    previous paragraph, you’d write code as follows:


    ```

    NSManagedObject *foo = [NSEntityDescription insertNewObjectForEntityForName:@"Foo"
    inManagedObjectContext:context]; // foo is invalid at this point; bar has fewer
    than five characters

    [foo setValue:@"abcde" forKey:@"bar"];

    ```


    The managed object `foo` is created and lives in the managed object context in
    an invalid state, but the managed object context ignores that. The next line of
    code makes the `foo` managed object valid, but it won’t be validated until the
    managed object context is saved.


    ## Handling Validation Errors in BookStore


    In this section, you implement a validation error-handling routine for the `BookStore`
    application. It’s generic in that it doesn’t have any knowledge of which attributes
    have validation rules, but it is specific in that it doesn’t handle all the validation
    errors—just the ones that you know you set on the model. Before doing that, however,
    you need to add some validation rules to `BookStore`’s data model. Add a minimum
    value of 15 to the `price` attribute of the `Book` entity as shown in [Figure
    4-4](#9781430260288_Ch04.xhtml#Fig4).


    ![9781430260288_Fig04-04.jpg](images/9781430260288_Fig04-04.jpg)


    [Figure 4-4](#9781430260288_Ch04.xhtml#_Fig4). Adding a validation rule


    ### Implementing the Validation Error-Handling Routine


    The validation error-handling routine you write should accept a pointer to an
    `NSError` object and return an `NSString` that contains the error messages, separated
    by line feeds. Open `ViewController.m or ViewController.swift`, and add the method
    shown in [Listing 4-33](#9781430260288_Ch04.xhtml#list33) (Objective-C) or [Listing
    4-34](#9781430260288_Ch04.xhtml#list34) (Swift).


    [***Listing 4-33***](#9781430260288_Ch04.xhtml#_list33). Adding a Validation Error-Handling
    Routine (Objective-C)


    ```

    - (NSString *)validationErrorText:(NSError *)error {

      // Create a string to hold all the error messages

      NSMutableString *errorText = [NSMutableString stringWithCapacity:100];

      // Determine whether we''re dealing with a single error or multiples, and put
    them all

      // in an array

      NSArray *errors = [error code] == NSValidationMultipleErrorsError ? [[error
    userInfo] objectForKey:NSDetailedErrorsKey] : [NSArray arrayWithObject:error];


    // Iterate through the errors

      for (NSError *err in errors) {

        // Get the property that had a validation error

        NSString *propName = [[err userInfo] objectForKey:@"NSValidationErrorKey"];

        NSString *message;


    // Form an appropriate error message

        switch ([err code]) {

          case NSValidationNumberTooSmallError:

            message = [NSString stringWithFormat:@"%@ must be at least $15", propName];

            break;

          default:

            message = @"Unknown error. Press Home button to halt.";

          break;

        }


    // Separate the error messages with line feeds

        if ([errorText length] > 0) {

          [errorText appendString:@"\n"];

        }

        [errorText appendString:message];

      }

      return errorText;

    }

    ```


    [***Listing 4-34***](#9781430260288_Ch04.xhtml#_list34). Adding a Validation Error-Handling
    Routine (Swift)


    ```

    func validationErrorText(error : NSError) -> String {

        // Create a string to hold all the error messages

        let errorText = NSMutableString(capacity: 100)

        // Determine whether we''re dealing with a single error or multiples, and
    put them all

        // in an array

        let errors : NSArray = error.code == NSValidationMultipleErrorsError ? error.userInfo?[NSDetailedErrorsKey]
    as NSArray : NSArray(object: error)


    // Iterate through the errors

        for err in errors {

            // Get the property that had a validation error

            let e = err as NSError

            let info = e.userInfo

            let propName : AnyObject? = info!["NSValidationErrorKey"]

            var message : String?


    // Form an appropriate error message

            switch err.code {

            case NSValidationNumberTooSmallError:

                message = "\(propName!) must be at least $15"

            default:

                message = "Unknown error. Press Home button to halt."

            }


    // Separate the error messages with line feeds

            if errorText.length > 0 {

                errorText.appendString("\n")

            }


    errorText.appendString(message!)

        }


    return errorText

    }

    ```


    We now have a method that returns a more useful message to help the user. Let’s
    hook it up to our test code. Since some of the books we insert in the `insertSomeData`
    method have a price lower than $15, the error should kick in.


    Edit the `saveContext` method in the view controller to call the `validationErrorText`
    method, as [Listing 4-35](#9781430260288_Ch04.xhtml#list35) (Objective-C) and
    [Listing 4-36](#9781430260288_Ch04.xhtml#list36) (Swift) show.


    [***Listing 4-35***](#9781430260288_Ch04.xhtml#_list35). Calling the Validation
    Error-Handling Routine (Objective-C)


    ```

    - (void)saveContext {

      NSManagedObjectContext *managedObjectContext = self.managedObjectContext;

      if (managedObjectContext != nil) {

        NSError *error = nil;

        if ([managedObjectContext hasChanges] && ![managedObjectContext save:&error])
    {

          NSString *message = [self validationErrorText:error];

          NSLog(@"Error: %@", message);

        }

      }

    }

    ```


    [***Listing 4-36***](#9781430260288_Ch04.xhtml#_list36). Calling the Validation
    Error-Handling Routine (Swift)


    ```

    func saveContext() {

        var error: NSError? = nil

        if let managedObjectContext = self.managedObjectContext {

            if managedObjectContext.hasChanges && !managedObjectContext.save(&error)
    {

                let message = validationErrorText(error!)

                println("Error: \(message)")

            }

        }

    }

    ```


    Launch the `BookStore` app and you will see the validation errors in the logs
    where the books we tried to insert were invalid.


    ## Summary


    In this chapter, you have seen several techniques to help you manage the quality
    and the integrity of the data. You’ve learned how to help your users deal with
    unexpected failures and how to help manage a smooth landing instead of letting
    your application crash inexplicably. In the next chapter, you will learn how to
    delight your users by integrating the user interface with Core Data, how to smoothly
    migrate your data when upgrading your app, and many more advanced features all
    contributing to the quality of your applications.


    ## Chapter 5: Integrating with the User Interface


    The vaunted Model View Controller (MVC) pattern, which has spawned derivatives
    such as Model View Presenter (MVP) and Model View ViewModel (MVVM), separates
    an application’s data (the model) from the display of that data (the view). Core
    Data, both by name and intent, covers the application data, or model, concerns
    of applications. Storing data usually doesn’t suffice, however—applications usually
    must present that data onscreen. This chapter discusses some classes that take
    data from your Core Data stores and present that data onscreen efficiently and
    responsively. In this chapter, we cover the following:'
