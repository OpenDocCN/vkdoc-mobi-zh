    The only change is to set the `NSPersistentStoreUbiquitousContentNameKey` as an
    option of the persistent store coordinator. A ubiquity container is a component
    that automatically manages syncing files with iCloud. It’s a local representation
    of the iCloud data and sits on the file system outside your app’s sandbox. By
    setting this option, you tell Core Data that the persistent store file resides
    in a ubiquity container and is therefore synced with iCloud.


    If you launched `iCloudApp` before, delete it from the iPhone Simulator so that
    any SQLite database files are removed. Then, launch the app. You’ll notice that
