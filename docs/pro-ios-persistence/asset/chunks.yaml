    Again, the `cancel:` method simply dismisses the modal window, as shown in [Listing
    5-58](#9781430260288_Ch05.xhtml#list58) (Objective-C) and [Listing 5-59](#9781430260288_Ch05.xhtml#list59)
    (Swift).


    [***Listing 5-58***](#9781430260288_Ch05.xhtml#_list58). The `cancel:` Method
    (Objective-C)


    ```

    - (IBAction)cancel:(id)sender {

      [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    [***Listing 5-59***](#9781430260288_Ch05.xhtml#_list59). The `cancel:` Function
    (Swift)


    ```

    @IBAction func cancel(sender: AnyObject) {

      self.dismissViewControllerAnimated(true, completion: nil)

    }

    ```


    In the `save:` method, you determine whether we’re adding a bug (`bug` is `nil`)
    or editing an existing bug (`bug` is non-`nil`). Create a new `Bug` managed object
    if adding, and then update the properties appropriately. Also, if you’re doing
    this project in Swift, be sure to import Core Data appropriately:


    ```

    import CoreData // Swift

    ```


    [Listing 5-60](#9781430260288_Ch05.xhtml#list60) (Objective-C) and [Listing 5-61](#9781430260288_Ch05.xhtml#list61)
    (Swift) show the `save:` method.


    [***Listing 5-60***](#9781430260288_Ch05.xhtml#_list60). The `save:` Method (Objective-C)


    ```

    - (IBAction)save:(id)sender {

      if (self.bug == nil) {

        self.bug = [NSEntityDescription insertNewObjectForEntityForName:@"Bug" inManagedObjectContext:self.project.managedObjectContext];

      }


    self.bug.project = self.project;

      self.bug.title = self.bugTitle.text;

      self.bug.details = self.details.text;


    // Save the context.

      NSError *error = nil;

      if (![self.project.managedObjectContext save:&error]) {

        // Replace this implementation with code to handle the error appropriately.

        // abort() causes the application to generate a crash log and terminate. You
    should not use this function in a shipping application, although it may be useful
    during development.

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

      }


    [self dismissViewControllerAnimated:YES completion:nil];}

      }

    ```


    [***Listing 5-61***](#9781430260288_Ch05.xhtml#_list61). The `save:` Function
    (Swift)


    ```

    @IBAction func save(sender: AnyObject) {

      if let context = self.project?.managedObjectContext {

        if bug == nil {

          self.bug = NSEntityDescription.insertNewObjectForEntityForName("Bug", inManagedObjectContext:
    context) as? Bug

        }


    self.bug?.project = self.project!

        self.bug?.title = self.bugTitle.text

        self.bug?.details = self.details.text


    var error: NSError? = nil

        if context.hasChanges && !context.save(&error) {

          // Replace this implementation with code to handle the error appropriately.

          // abort() causes the application to generate a crash log and terminate.
    You should not use this function in a shipping application, although it may be
    useful during development.

          NSLog("Unresolved error \(error), \(error!.userInfo)")

          abort()

        }

      }


    self.dismissViewControllerAnimated(true, completion: nil)

    }

    ```


    Creating the Screen for Adding and Editing a Bug


    Open `BugViewController.xib` and do the following:


    *   Drag a Navigation Bar from the Object Library to the top of the view, 20 pixels
    from the top.

    *   Change the bar’s title to **Bug**.

    *   Drag two Bar Button Items to the Navigation Bar, one in each corner, and change
    their titles to **Cancel** and **Save**, respectively.

    *   Connect the Bar Button Items to the `cancel:` and `save:` actions.

    *   Drag two Labels to the view and make one read **Title** and the other read
    **Details**.

    *   Drag a Text Field to the view and connect it to the `bugTitle` property.

    *   Drag a Text View to the view and connect it to the `details` property.

    *   With the View selected, select the “Resolve Auto Layout Issues” button and
    select **Add Missing Constraints** in the **All Views in View** section.


    Your view should match [Figure 5-8](#9781430260288_Ch05.xhtml#Fig8).


    ![9781430260288_Fig05-08.jpg](images/9781430260288_Fig05-08.jpg)


