  raw: 'The `fetchObjects` method fetches the objects from the persistent store and
    uses `NSLog` (or `println`) to log them to the console. To fetch objects, we use
    the `NSFetchRequest` class, which represents a fetch request. A fetch request
    is tied to a particular entity and contains all the criteria describing what you
    want to fetch from that entity. With a fetch request, you can do things like set
    limits, specify criteria that objects must match, sort the results, and use advanced
    aggregators to massage the results the fetch request returns. [Chapter 2](#9781430260288_Ch02.xhtml)
    explains more about how to use `NSFetchRequest`, and then [Chapter 3](#9781430260288_Ch03.xhtml)
    goes deeper into the powers of fetching data. At this point, however, we stay
    simple in our usage of `NSFetchRequest` and just fetch all of the objects from
    our `Gadget` entity.


    Before iOS 5.0, you typically created and used an `NSFetchRequest` instance by
    allocating and initializing one, creating an `NSEntityDescription` instance, and
    setting the entity for the `NSFetchRequest` instance to the `NSEntityDescription`
    instance, as shown in [Listing 1-22](#9781430260288_Ch01.xhtml#list22).


    [***Listing 1-22***](#9781430260288_Ch01.xhtml#_list22). Pre-iOS 5.0 `NSFetchRequest`
    Creation


    ```

    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];

    [fetchRequest setEntity:[NSEntityDescription entityForName:@"Gadget"

                                     inManagedObjectContext:self.persistence.managedObjectContext]];

    ```


    In iOS 5.0, Apple added a couple of convenience methods for `NSFetchRequest` so
    you don’t have to create an `NSEntityDescription` instance or take two lines of
    code to tie your `NSFetchRequest` instance to an entity. One is an initializer
    that takes an entity name, and the other is a class method that takes an entity
    name. [Listing 1-23](#9781430260288_Ch01.xhtml#list23) shows two ways to create
    an `NSFetchRequest` instance in iOS 5.0 or later.


    [***Listing 1-23***](#9781430260288_Ch01.xhtml#_list23). Creating `NSFetchRequest`
    Instances in iOS 5.0 and Later


    ```

    NSFetchRequest *fetchRequest1 = [[NSFetchRequest alloc] initWithEntityName:@"Gadget"];

    NSFetchRequest *fetchRequest2 = [NSFetchRequest fetchRequestWithEntityName:@"Gadget"];

    ```


    You can use any of the approaches. You might notice, however, that the pre-iOS
    5.0 approach specified the managed object context for the entity, while the iOS
    5.0-and-later approach does not. How, then, does the `NSFetchRequest` instance
    know which managed object context to use to find the entity?


    The answer to that is that actually executing a fetch request is a method on the
    managed object context. For the later approaches, the managed object context uses
    the fetch request’s entity name to look up the actual `NSEntityDescription` when
    it executes the fetch request. [Listing 1-24](#9781430260288_Ch01.xhtml#list24)
    shows how to execute a fetch request.


    [***Listing 1-24***](#9781430260288_Ch01.xhtml#_list24). Executing a Fetch Request


    ```

    NSError *error;

    NSManagedObjectContext *managedObjectContext = ...; // Get from somewhere

    NSArray *objects = [managedObjectContext executeFetchRequest:fetchRequest error:&error];

    ```


    You can pass `nil` for `error` if you don’t care about any error results, but
    you’ll usually want error information so you can handle the errors. Again, [Chapter
    4](#9781430260288_Ch04.xhtml) covers error handling.


    With this nascent knowledge of fetch requests, we can implement the `fetchObjects`
    method, as shown in [Listing 1-25](#9781430260288_Ch01.xhtml#list25) (Objective-C)
    or [Listing 1-26](#9781430260288_Ch01.xhtml#list26) (Swift). This method creates
    a fetch request, executes it against the managed object context, and displays
    the results in the console.


    [***Listing 1-25***](#9781430260288_Ch01.xhtml#_list25). The Objective-C `fetchObjects`
    Method


    ```

    - (void)fetchObjects {

      // Fetch the objects

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Gadget"];

      NSArray *objects = [self.persistence.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];


    // Log the objects

      for (NSManagedObject *object in objects) {

        NSLog(@"%@", object);

      }

    }

    ```


    [***Listing 1-26***](#9781430260288_Ch01.xhtml#_list26). The Swift `fetchObjects`
    function


    ```

    func fetchObjects() {

      if let persistence = persistence {

        let fetchRequest = NSFetchRequest(entityName: "Gadget")

        var error : NSError?

        let objects = persistence.managedObjectContext!.executeFetchRequest(fetchRequest,
    error: &error) as [NSManagedObject]

        if let error = error {

          println("Something went wrong: \(error.localizedDescription)")

        }


    for object in objects {

          println(object)

        }

      }

      else {

        println("Error, persistence layer not initialized")

      }

    }

    ```


    Build and run the application. You should see a blank screen in the iOS Simulator,
    and in the Xcode Console you should see output that looks something like the following:


    ```

    2014-07-07 21:49:40.537 PersistenceApp[8878:83583] <NSManagedObject: 0x7faa21e380b0>
    (entity: Gadget; id: 0xd000000000040000 <x-coredata://D2570307-5795-4E9A-96C9-7B477D27AB5D/Gadget/p1>
    ; data: {

        name = "iPad Mini";

        price = 329;

    })

    2014-07-07 21:49:40.538 PersistenceApp[8878:83583] <NSManagedObject: 0x7faa21e386a0>
    (entity: Gadget; id: 0xd000000000080000 <x-coredata://D2570307-5795-4E9A-96C9-7B477D27AB5D/Gadget/p2>
    ; data: {

        name = "iPod touch";

        price = 299;

    })

    2014-07-07 21:49:40.538 PersistenceApp[8878:83583] <NSManagedObject: 0x7faa21e38580>
    (entity: Gadget; id: 0xd0000000000c0000 <x-coredata://D2570307-5795-4E9A-96C9-7B477D27AB5D/Gadget/p3>
    ; data: {

        name = iPhone;

        price = 199;

    })

    2014-07-07 21:49:40.538 PersistenceApp[8878:83583] <NSManagedObject: 0x7faa21e37340>
    (entity: Gadget; id: 0xd000000000100000 <x-coredata://D2570307-5795-4E9A-96C9-7B477D27AB5D/Gadget/p4>
    ; data: {

        name = iPad;

        price = 499;

    })

    ```


    If you’re running the Swift version of the app, the output is a little more compact,
    as the following shows:


    ```

    <NSManagedObject: 0x7be633a0> (entity: Gadget; id: 0x7be68180 <x-coredata://9796AAF7-58AA-4B3A-86B8-A1897330E17F/Gadget/p1>
    ; data: {

        name = iPad;

        price = 499;

    })

    <NSManagedObject: 0x7be66d60> (entity: Gadget; id: 0x7be681e0 <x-coredata://9796AAF7-58AA-4B3A-86B8-A1897330E17F/Gadget/p2>
    ; data: {

        name = iPhone;

        price = 199;

    })

    <NSManagedObject: 0x7be666b0> (entity: Gadget; id: 0x7be681d0 <x-coredata://9796AAF7-58AA-4B3A-86B8-A1897330E17F/Gadget/p3>
    ; data: {

        name = "iPad Mini";

        price = 329;

    })

    <NSManagedObject: 0x7be66e20> (entity: Gadget; id: 0x7be68250 <x-coredata://9796AAF7-58AA-4B3A-86B8-A1897330E17F/Gadget/p4>
    ; data: {

        name = "iPod Touch";

        price = 299;

    })

    ```


    As before, you can also explore the SQLite database using `sqlite3`, but the log
    messages evidence that the objects were stored and retrieved.


    Wrapping Up


    In this chapter, you learned what Core Data is and what it’s used for. You learned
    about the importance of persistence for data. You learned about the components
    of Core Data and how they work together. You built two Core Data–based applications:
    one that makes Xcode set up for you, and one in which you set up Core Data for
    yourself. You stored data in your Core Data persistent stores and retrieved them.


    The applications you built in this chapter used anemic object models. In the next
    chapter, we build on the knowledge from this chapter to create more complex object
    models. You’ll also learn about concepts like sorting and using predicates, and
    you’ll understand the power of the Core Data object model.


    Chapter    2


    Building Data Models'
