    location of the data store file. If you open the Terminal application and navigate
    to the `Documents` folder of the app, you will notice that there is no `iCloudApp.sqlite`
    file.


    Instead, there is a `CoreDataUbiquitySupport` directory that was created by iOS
    to attach your file to the ubiquity container. If you navigate through this directory,
    you will find your SQLite file buried deep in the file structure.


