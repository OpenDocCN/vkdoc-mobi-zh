    Summary


    Although changing data models can be painful in other programming environments,
    Core Data makes changing your data models nearly painless. With its support for
    model versions, lightweight migrations, and mapping models for migrations that
    aren’t lightweight, you can change your data models with impunity and let Core
    Data make sure your users’ data stay intact. As with any part of your application,
    however, make sure you test your migrations. Test them extensively. Test them
    even more than you test your application code. Users can handle an occasional
    application crash, but if they upgrade to the latest version of your application
    and lose their data in the process, your application and reputation may never
    recover.


    Chapter    7


    Transforming and Encrypting Data


    Although Core Data offers a reasonable array of supported data types, not all
    data fit neatly into strings, Booleans, numbers, and so on. Core Data offers a
    catch-all data type, Binary Data, that can store any type of binary data. We used
    a Binary Data type in [Chapter 5](#9781430260288_Ch05.xhtml), for example, to
    store images. Core Data marshals any data stored in a Binary Data type to and
    from an `NSData` instance. While this means that Core Data can store any kind
    of arbitrary data in a Binary Data column, it also means that your applications
    must transform `NSData` instances into representations useful to your application,
    and vice versa. While sometimes this may be trivial—with images, for example,
    creating an image from an `NSData` instance is as easy as calling `UIImage imageWithData:`
    and `UIImagePNGRepresentation`—in other cases, you may find your code sprinkled
    with logic to transform raw data to usable data in various places. Wouldn’t it
    be nice to have Core Data do this transformation work for you?


    In this chapter, we explore the Transformable Core Data type, which allows you
    to hand the transformation reins to Core Data. We also explore how you can use
    Transformable in a specific, topical use case: encryption. Using the techniques
    in this chapter, you can keep user data safe in this social media age.


    Using Transformable


    In this section, we build an application that displays a dot on the screen, in
    a random color, for each time the user taps the screen. [Figure 7-1](#9781430260288_Ch07.xhtml#Fig1)
    shows the finished application, with many dots.


    ![9781430260288_Fig07-01.jpg](images/9781430260288_Fig07-01.jpg)


