    Using Subqueries


    In some cases, you want to fetch objects based on criteria that pertain to other
    related objects. Suppose, for example, you want to fetch all the word categories
    that have at least one 25-letter word. Without subqueries, you’d normally have
    to fetch these data in two steps.


