    \ for `UISearchController` (Swift)\n\n```\nclass MasterViewController: UITableViewController,\
    \ NSFetchedResultsControllerDelegate, UISearchResultsUpdating {\n  ...\n  var\
    \ searchController: UISearchController!\n  var searchPredicate: NSPredicate? =\
    \ nil\n  ...\n}\n```\n\nIn your `viewDidLoad:` method, create your `UISearchController`\
    \ instance and assign it to `searchController`. The initializer takes a parameter\
    \ for the view controller that displays the search results; passing `nil` will\
    \ display results in the same view that you’re searching, which in our case is\
