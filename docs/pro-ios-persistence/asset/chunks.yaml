    [Listing 3-44](#9781430260288_Ch03.xhtml#list44) shows the Objective-C code and
    [Listing 3-45](#9781430260288_Ch03.xhtml#list45) shows the Swift code to create
    this expression.


    [***Listing 3-44***](#9781430260288_Ch03.xhtml#_list44). Create an `NSExpression`
    using `+expressionForFunction:arguments:`


    ```

    NSExpression *length = [NSExpression expressionForKeyPath:@"length"];

    NSExpression *average = [NSExpression expressionForFunction:@"average:" arguments:@[length]];

    ```


    [***Listing 3-45***](#9781430260288_Ch03.xhtml#_list45). Create an `NSExpression`
    using `init(forFunction name:` `String``!, arguments parameters: [AnyObject]!)`


    ```

    let length = NSExpression(forKeyPath: "length")

    let average = NSExpression(forFunction: "average:", arguments: [length])

    ```


    Next, we set up an `NSExpressionDescription` instance to describe what we want
    to fetch from our Core Data store. An `NSExpressionDescription` represents a property
    on a Core Data entity that doesn’t actually appear in the Core Data model, which
    is perfect for an expression that fetches the average (since it doesn’t actually
    exist in our model). As a property, an `NSExpressionDescription` has a name and
    a type, as well as an expression. [Listing 3-46](#9781430260288_Ch03.xhtml#list46)
    (Objective-C) and [Listing 3-47](#9781430260288_Ch03.xhtml#list47) (Swift) show
    how to create the `NSExpressionDescription` for fetching the word length average.


    [***Listing 3-46***](#9781430260288_Ch03.xhtml#_list46). Creating an `NSExpressionDescription`
    for the Word Length Average (Objective-C)


    ```

    NSExpressionDescription *averageDescription = [[NSExpressionDescription alloc]
    init];

    averageDescription.name = @"average";

    averageDescription.expression = average;

    averageDescription.expressionResultType = NSFloatAttributeType;

    ```


    [***Listing 3-47***](#9781430260288_Ch03.xhtml#_list47). Creating an `NSExpressionDescription`
    for the Word Length Average (Swift)


    ```

    var averageDescription = NSExpressionDescription()

    averageDescription.name = "average"

    averageDescription.expression = average

    averageDescription.expressionResultType = .FloatAttributeType

    ```


    To finish, we create a fetch request, and then set its `propertiesToFetch` property
    to an array containing the `NSExpressionDescription` we just created. We also
    set the fetch request’s `resultType` property to a dictionary, so we can reference
    the `NSExpressionDescription` we created by the name we set: `"average"`. We execute
    the fetch request and extract the average value from the result dictionary. [Listing
    3-48](#9781430260288_Ch03.xhtml#list48) (Objective-C) and [Listing 3-49](#9781430260288_Ch03.xhtml#list49)
    (Swift) show the complete `averageWordLengthFromExpressionDescription` method.
    Call it from your `statistics` method and run to see that, however you get the
    average, you get 9.09 characters.


    [***Listing 3-48***](#9781430260288_Ch03.xhtml#_list48). Getting the Average Word
    Length Using an Expression Description (Objective-C)


    ```

    - (NSString *)averageWordLengthFromExpressionDescription {

      NSExpression *length = [NSExpression expressionForKeyPath:@"length"];

      NSExpression *average = [NSExpression expressionForFunction:@"average:" arguments:@[length]];


    NSExpressionDescription *averageDescription = [[NSExpressionDescription alloc]
    init];

      averageDescription.name = @"average";

      averageDescription.expression = average;

      averageDescription.expressionResultType = NSFloatAttributeType;


    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Word"];

      fetchRequest.propertiesToFetch = @[averageDescription];

      fetchRequest.resultType = NSDictionaryResultType;

      NSArray *results = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      return [NSString stringWithFormat:@"Average from expression description: %.2f\n",

             [[results[0] valueForKey:@"average"] floatValue]];

    }

    ```


    [***Listing 3-49***](#9781430260288_Ch03.xhtml#_list49). Getting the Average Word
    Length Using an Expression Description (Swift)


    ```

    func averageWordLengthFromExpressionDescription() -> String {

        let length = NSExpression(forKeyPath: "length")

        let average = NSExpression(forFunction: "average:", arguments: [length])


    var averageDescription = NSExpressionDescription()

        averageDescription.name = "average"

        averageDescription.expression = average

        averageDescription.expressionResultType = .FloatAttributeType


    var fetchRequest = NSFetchRequest(entityName: "Word")

        fetchRequest.propertiesToFetch = [averageDescription]

        fetchRequest.resultType = .DictionaryResultType


    var error: NSError? = nil

        let results = self.managedObjectContext!.executeFetchRequest(fetchRequest,
    error: &error)


    var formattedAverage = "0"

        if let results = results {

            if let avg = (words as NSArray).valueForKeyPath("@avg.length") as? Float
    {

                let format = ".2"

                formattedAverage = avg.format(format)

            }

        }

        return "Average from collection: \(formattedAverage)\n"

    }

    ```


    Using a Function as an Rvalue


    You can also use a function in the right side of your predicate. Suppose, for
    example, we wanted to get the text of the longest word from the word list. We
    can’t simply use the `@max(length)` aggregator, because that returns the length
    of the longest word, not the longest word itself. Instead, we want to return the
    word object whose length equals the maximum length value, so the predicate tests
    the length against the `max:` function as follows:


    ```

    length = max:(length)

    ```


    [Listing 3-50](#9781430260288_Ch03.xhtml#list50) (Objective-C) and [Listing 3-51](#9781430260288_Ch03.xhtml#list51)
    (Swift) show the `longestWords` method (after all, you could have more than one
    word with the same length) that uses this predicate. Using SQL Logging, you can
    see that the SQL that Core Data uses has an inner `SELECT` statement, as you’d
    expect. The inner `SELECT` statement gets the maximum length of a word, and the
    outer `SELECT` statement gets all the words with that length.'
