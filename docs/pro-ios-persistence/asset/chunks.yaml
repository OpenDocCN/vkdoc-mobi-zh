    Now you are ready to launch the app. Once you do, you can tap the Link to Dropbox
    button and the Dropbox login screen appears. You can sign in with your own Dropbox
    credentials (note that this screen also handles two-factor authentication if you
    have that set in Dropbox), and control will return to our app. Unfortunately,
    our app doesn’t know quite what to do when control comes back from the Dropbox
    login screen. That is because the Dropbox login screen is performing a callback
    to our application, and that callback is done through the URL we set up earlier.
    We must instruct our app to handle the callback and open from that URL. In order
    to do this, implement `application: openURL:sourceApplication:annotation:` in
    `AppDelegate.m or AppDelegate.swift`, as shown in [Listing 8-18](#9781430260288_Ch08.xhtml#list18)
    (Objective-C) or [Listing 8-19](#9781430260288_Ch08.xhtml#list19) (Swift).


