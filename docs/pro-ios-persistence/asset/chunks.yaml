    ## Adding It Up: Using Compound Predicates


    We’ve been using predicates with one criterion, whether it has been words that
    belong to a certain category or words that match a specific text. You often must
    combine criteria, however, to extract the data you’re really after. You can form
    predicates by combining multiple subpredicates using the logical operators OR,
    AND, and NOT. You might, for example, want to find all the 20-letter words that
    end in "-ing," or words that have a "q" but not a "u." For these types of predicates,
    you need multiple criteria.


    Core Data allows you to build compound predicates using the `NSCompoundPredicate`
    class. You build them using one of the three static initializers (or the same-named
    functions in Swift) shown in [Table 3-5](#9781430260288_Ch03.xhtml#Tab5).


    [Table 3-5](#9781430260288_Ch03.xhtml#_Tab5). Static Initializers for Creating
    Compound Predicates


    | Initializer Name | Query Language Example | Description |

    | --- | --- | --- |

    | `+andPredicateWithSubpredicates:` | `P1 AND P2 AND P3` | Returns `YES` only
    if all subpredicates return `YES` |

    | `+orPredicateWithSubpredicates:` | `P1 OR P2 OR P3` | Returns `YES` if at least
    one of the subpredicates returns `YES` |

    | `+notPredicateWithSubpredicate:` | `NOT P` | Returns `YES` if its only subpredicate
    returns `NO` |


    To get a list of the 20-letter words that end in "-ing," create a method called
    `twentyLetterWordsEndingInIng`, as shown in [Listing 3-38](#9781430260288_Ch03.xhtml#list38)
    (Objective-C) and [Listing 3-39](#9781430260288_Ch03.xhtml#list39) (Swift), and
    add a call to it in the `statistics` method. This code creates a predicate that
    compares the length of each word to 20. It creates another predicate that compares
    the ending of each word to "-ing." It then creates a compound predicate that combines
    the two predicates using the logical operator AND.


    [***Listing 3-38***](#9781430260288_Ch03.xhtml#_list38). Using Compound Predicates
    in Objective-C


    ```

    - (NSString *)twentyLetterWordsEndingInIng {

      // Create a predicate that compares length to 20

      NSExpression *length = [NSExpression expressionForKeyPath:@"length"];

      NSExpression *twenty = [NSExpression expressionForConstantValue:@20];

      NSPredicate *predicateLength = [NSComparisonPredicate predicateWithLeftExpression:length

                                                                    rightExpression:twenty

                                                                modifier:NSDirectPredicateModifier

                                                                    type:NSEqualToPredicateOperatorType

                                                                 options:0];


    // Create a predicate that compares text to "ends with -ing"

      NSExpression *text = [NSExpression expressionForKeyPath:@"text"];

      NSExpression *ing = [NSExpression expressionForConstantValue:@"ing"];

      NSPredicate *predicateIng = [NSComparisonPredicate predicateWithLeftExpression:text

                                                                   rightExpression:ing

                                                               modifier:NSDirectPredicateModifier

