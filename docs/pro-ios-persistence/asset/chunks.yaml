    \ \"Page.h\"\n```\n\nAlso worth noting is that the Objective-C version takes advantage\
    \ of the dynamically-generated `addBooks:` method for adding books. Since Swift\
    \ doesn’t have that support, we instead must retrieve the mutable set of books\
    \ using `NSManagedObject`’s `mutableSetValueForKeyPath` function, and then add\
    \ the books to the `NSManagedSet` object that it returns.\n\n[***Listing 2-11***](#9781430260288_Ch02.xhtml#_list11).\
    \ The Objective-C `initStore` Method for Adding New Objects\n\n```objc\n- (void)initStore\
    \ {\n  BookCategory *fiction = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    BookCategory\" inManagedObjectContext:self.managedObjectContext];\n  fiction.name\
    \ = @\"Fiction\";\n\n  BookCategory *biography = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    BookCategory\" inManagedObjectContext:self.managedObjectContext];\n  biography.name\
    \ = @\"Biography\";\n\n  Book *book1 = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Book\" inManagedObjectContext:self.managedObjectContext];\n  book1.title = @\"\
    The first book\";\n  book1.price = 10;\n\n  Book *book2 = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Book\" inManagedObjectContext:self.managedObjectContext];\n\
    \  book2.title = @\"The second book\";\n  book2.price = 15;\n\n  Book *book3 =\
    \ [NSEntityDescription insertNewObjectForEntityForName:@\"Book\" inManagedObjectContext:self.managedObjectContext];\n\
    \  book3.title = @\"The third book\";\n  book3.price = 10;\n\n  [fiction addBooks:[NSSet\
    \ setWithArray:@[book1, book2]]];\n  [biography addBooks:[NSSet setWithArray:@[book3]]];\n\
    \n  [self.managedObjectContext save:nil];\n}\n```\n\n[***Listing 2-12***](#9781430260288_Ch02.xhtml#_list12).\
    \ The Swift `initStore` function for Adding New Objects\n\n```swift\nfunc initStore()\
    \ {\n  var fiction = NSEntityDescription.insertNewObjectForEntityForName(\"BookCategory\"\
    , inManagedObjectContext: self.managedObjectContext) as BookCategory\n  fiction.name\
