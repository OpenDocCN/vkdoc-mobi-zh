    \ A Method to Show a Core Data Error (Objective-C)\n\n```\n- (void)showCoreDataError\
    \ {\n  UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Error!\" message:@\"\
    BookStore can't continue.\\nPress the Home button to close the app.\" delegate:nil\
    \ cancelButtonTitle:@\"OK\" otherButtonTitles: nil];\n  [alert show];\n}\n```\n\
    \n[***Listing 4-26***](#9781430260288_Ch04.xhtml#_list26). A Method to Show a\
    \ Core Data Error (Swift)\n\n```\nfunc showCoreDataError() {\n    var alert =\
    \ UIAlertController(title: \"Error!\", message: \"BookStore can't continue.\\\
    nPress the Home button to close the app.\", preferredStyle: UIAlertControllerStyle.Alert)\n\
    \    alert.addAction(UIAlertAction(title: \"OK\", style: UIAlertActionStyle.Default,\
    \ handler: nil))\n    self.window?.rootViewController?.presentViewController(alert,\
    \ animated: true, completion: nil)\n}\n```\n\nNow, change the `persistentStoreCoordinator`\
    \ accessor method to use this new method instead of logging and aborting. [Listing\
    \ 4-27](#9781430260288_Ch04.xhtml#list27) (Objective-C) and [Listing 4-28](#9781430260288_Ch04.xhtml#list28)\
    \ (Swift) show the updates to `persistentStoreCoordinator`.\n\n[***Listing 4-27***](#9781430260288_Ch04.xhtml#_list27).\
    \ The Updated `persistentStoreCoordinator` Method (Objective-C)\n\n```\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n    if (_persistentStoreCoordinator != nil)\
    \ {\n        return _persistentStoreCoordinator;\n    }\n\n_persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    BookStoreEnhanced.sqlite\"];\n    NSError *error = nil;\n    if (![_persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:nil error:&error]) {\n      [self showCoreDataError];\n    }\n\nreturn\
    \ _persistentStoreCoordinator;\n}\n```\n\n[***Listing 4-28***](#9781430260288_Ch04.xhtml#_list28).\
    \ The Updated `persistentStoreCoordinator` creation in the `managedObjectContext`\
    \ Function (Swift)\n\n```\nif(persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
    \ configuration: nil, URL: storeURL, options: nil, error: &error) == nil) {\n\
    \    self.showCoreDataError()\n    return nil\n}\n```\n\nTo force this error to\
    \ display, run the BookStore application, and then close it. Go to the data model,\
    \ add an attribute called `foo` of type `String` to the `Book` entity, and then\
    \ run the application again. The persistent store coordinator will be unable to\
    \ open the data store because the model no longer matches, and your new error\
    \ message will display as [Figure 4-3](#9781430260288_Ch04.xhtml#Fig3) shows.\n\
    \n![9781430260288_Fig04-03.jpg](images/9781430260288_Fig04-03.jpg)\n\n[Figure\
    \ 4-3](#9781430260288_Ch04.xhtml#_Fig3). Showing a Core Data Error condition\n\
    \nOf course, at this point your app should mark itself “unstable” so that it prevents\
    \ further attempts to interact with Core Data, or else your users will find themselves\
    \ dealing with a surge of alert boxes to dismiss. You may have noticed that the\
    \ implementation of the `viewDidAppear:` method did not try to insert any new\
    \ data. If it did, you would have to deal with catching more exceptions coming\
    \ from the non-initialized persistent store. This is because we’ve never told\
    \ the app that it was unstable so it keeps on trying to access the persistent\
    \ store. Let’s deal with it.\n\nAdd the following property in `AppDelegate.h`:\n\
    \n```\n@property (nonatomic) BOOL unstable;\n```\n\nOr in `AppDelegate.swift`:\n\
    \n```\nvar unstable: Bool?\n```\n\nWe will set this property as needed in `showCoreDataError`,\
    \ as shown in [Listing 4-29](#9781430260288_Ch04.xhtml#list29) (Objective-C) or\
    \ [Listing 4-30](#9781430260288_Ch04.xhtml#list30) (Swift).\n\n[***Listing 4-29***](#9781430260288_Ch04.xhtml#_list29).\
    \ Marking the App as Unstable (Objective-C)\n\n```\n- (void)showCoreDataError\
    \ {\n  self.unstable = YES;\n\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    Error!\" message:@\"BookStore can't continue.\\nPress the Home button to close\
    \ the app.\" delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles: nil];\n\
    \  [alert show];\n}\n```\n\n[***Listing 4-30***](#9781430260288_Ch04.xhtml#_list30).\
    \ Marking the App as Unstable (Swift)\n\n```\nfunc showCoreDataError() {\n   \
    \ self.unstable = true\n```"
