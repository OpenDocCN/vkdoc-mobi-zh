  trans: '

    # 删除规则设置


    `Delete Rule`（删除规则）设置用于指定当你试图删除此实体类型的托管对象时会发生什么。表 2-3 列出了四种可能性及其含义。


    表 2-3 删除规则选项


    | 规则名称 | 描述 |

    | --- | --- |

    | 级联（Cascade） | 删除源对象，同时也会删除所有相关的目标对象。 |

    | 拒绝（Deny） | 如果源对象与任何目标对象有关联，则删除请求失败，不会删除任何内容。 |

    | 置空（Nullify） | 删除源对象，并将所有相关目标对象的反向关系设置为 nil。 |

    | 无操作（No Action） | 删除源对象，不对任何相关目标对象进行任何更改。 |


    请谨慎设置关系中的 `Delete Rule`。例如，在 `BookStore` 应用中，如果你将 `BookCategory` 实体中 `books` 关系的
    `Delete Rule` 设置为“级联（Cascade）”，那么删除一个类别将会删除所有与该类别相关的图书。这很可能不是你想要的结果。如果你将该规则设置为“拒绝（Deny）”，并且某个类别中包含图书，那么尝试删除该类别将导致任何保存上下文的操作失败，并显示消息“category
    is not valid”。将 `Delete Rule` 设置为“置空（Nullify）”则会保留持久化存储中的图书，尽管它们不再属于任何类别。


    “无操作（No Action）”选项代表了另一种方式，就像不指定反向关系一样，Core Data 允许你承担管理对象图一致性的责任。如果你为 `Delete
    Rule` 指定此值，Core Data 允许你删除源对象，但会向目标对象假装源对象仍然存在。对于 `BookStore` 应用来说，这意味着删除一个类别，但依然告知顾客他们查找的图书是可用的，不过这些图书不属于任何可供顾客浏览的类别。你不太可能找到使用“无操作（No
    Action）”设置的有说服力的理由，除非是出于当你拥有大量目标对象时的性能考虑。第 9 章 讨论了使用 Core Data 进行性能调优的话题。


    # 有序属性


    `Arrangement`（排列）字段用于指定 Core Data 是否应维护实体被添加到关系中的顺序，且仅适用于对多（To Many）关系。为了维护顺序，你需要勾选
    `Ordered`（有序）复选框。以 `BookStore` 应用为例，我们不关心图书被添加到类别中的顺序，因此，为了查看有序关系的示例，请创建一个 `Page`
    实体，并创建一个从 `Book` 到 `Page` 的名为 `pages` 的对多关系。显然，对于页面而言，我们需要维护顺序，因此通过在关系属性中勾选复选框，将
    `pages` 关系的 `Arrangement` 字段设置为“有序（Ordered）”。不要忘记设置反向关系。


    该模型应如图 2-4 所示。


    ![9781430260288_Fig02-04.jpg](img/9781430260288_Fig02-04.jpg)


    图 2-4. 包含三个实体的 BookStore 模型


    通过在模型中选中所有三个实体（单击第一个实体，然后按住 shift 键并单击最后一个实体）来刷新自定义对象，然后在 Xcode 菜单中，选择 Editor
