    \ that match.  \n\n### Aggregating  \n\nAggregating data refers to gathering global\
    \ statistics on a collection using a collection operator. Collection operators\
    \ are part of the Key-Value Coding paradigm and can be added to a key path to\
    \ indicate that an aggregation operation should be executed. The syntax for using\
    \ these aggregation operators is  \n\n```  \n(key path to collection).@(operator).(key\
    \ path to argument property)  \n```  \n\nFor example, to refer to the average\
    \ length of the words in the word list, you’d use  \n\n```  \nwords.@avg.length\
    \  \n```  \n\nThe Apple documentation refers to these operators as Set and Array\
    \ Operators, as you can use them on any collection, not just Core Data result\
    \ sets. You can also use them as part of a predicate; for example, to get all\
    \ the categories that have more than 10,000 words, you’d use a predicate with\
    \ the query language.  \n\n```  \nwords.@count > 10000  \n```  \n\n[Table 3-6](#9781430260288_Ch03.xhtml#Tab6)\
    \ lists the operators, which are the same in Objective-C or Swift.  \n\n**Table\
    \ 3-6.** The Aggregation Operators  \n\n| Operator | Constant | Description |\n\
    | --- | --- | --- |\n| avg | `NSAverageKeyValueOperator` | Computes the average\
    \ of the argument property in the collection |\n| count | `NSCountKeyValueOperator`\
    \ | Computes the number of items in the collection (does not use an argument property)\
    \ |\n| min | `NSMinimumKeyValueOperator` | Computes the minimum value of the argument\
    \ property in the collection |\n| max | `NSMaximumKeyValueOperator` | Computes\
    \ the maximum value of the argument property in the collection |\n| sum | `NSSumKeyValueOperator`\
    \ | Computes the sum value of the argument property in the collection |\n\n###\
    \ Using `@count` to Retrieve Counts  \n\nThe `@count` function returns a count\
    \ of the number of objects that match the predicate. We can use this to return\
    \ a list of letters that have a high number of words, which we arbitrarily set\
