- fmt: "`fetchObjects`方法从持久化存储中获取对象，并使用`NSLog`（或`println`）将其记录到控制台。要获取对象，我们使用`NSFetchRequest`类，它代表一个获取请求。获取请求与特定实体相关联，并包含所有描述你希望从该实体获取内容的准则。通过获取请求，你可以执行诸如设置限制、指定对象必须匹配的准则、对结果进行排序以及使用高级聚合器来处理获取请求返回的结果等操作。第2章更详细地解释了如何使用`NSFetchRequest`，然后第3章更深入地探讨了获取数据的能力。不过，在这一点上，我们保持对`NSFetchRequest`的简单使用，仅从`Gadget`实体中获取所有对象。\n\
    \n在iOS 5.0之前，你通常通过分配和初始化一个`NSFetchRequest`实例、创建一个`NSEntityDescription`实例，并将`NSFetchRequest`实例的实体设置为该`NSEntityDescription`实例来创建和使用它，如代码清单1-22所示。\n\
    \n**代码清单1-22.**  iOS 5.0之前的`NSFetchRequest`创建\n\n```objc\nNSFetchRequest *fetchRequest\
    \ = [[NSFetchRequest alloc] init];\n[fetchRequest setEntity:[NSEntityDescription\
    \ entityForName:@\"Gadget\"\n                                 inManagedObjectContext:self.persistence.managedObjectContext]];\n\
    ```\n\n在iOS 5.0中，Apple为`NSFetchRequest`添加了几个便捷方法，这样你就不必创建`NSEntityDescription`实例或使用两行代码将`NSFetchRequest`实例绑定到实体。一个是接受实体名称的初始化方法，另一个是接受实体名称的类方法。代码清单1-23显示了在iOS\
    \ 5.0或更高版本中创建`NSFetchRequest`实例的两种方法。\n\n**代码清单1-23.**  在iOS 5.0及更高版本中创建`NSFetchRequest`实例\n\
    \n```objc\nNSFetchRequest *fetchRequest1 = [[NSFetchRequest alloc] initWithEntityName:@\"\
    Gadget\"];\nNSFetchRequest *fetchRequest2 = [NSFetchRequest fetchRequestWithEntityName:@\"\
    Gadget\"];\n```\n\n你可以使用任意一种方法。但是，你可能会注意到，iOS 5.0之前的方法为实体指定了托管对象上下文，而iOS 5.0及之后的方法则没有。那么，`NSFetchRequest`实例如何知道使用哪个托管对象上下文来查找实体呢？\n\
    \n答案是，实际执行获取请求是托管对象上下文上的一个方法。对于后来的方法，托管对象上下文在执行获取请求时，会使用获取请求的实体名称来查找实际的`NSEntityDescription`。代码清单1-24展示了如何执行一个获取请求。\n\
    \n**代码清单1-24.**  执行获取请求\n\n```objc\nNSError *error;\nNSManagedObjectContext *managedObjectContext\
    \ = ...; // Get from somewhere\nNSArray *objects = [managedObjectContext executeFetchRequest:fetchRequest\
    \ error:&error];\n```\n\n如果你不关心任何错误结果，可以为`error`传递`nil`，但通常你会需要错误信息以便处理错误。同样，第4章涵盖了错误处理。\n\
    \n凭借这些初步的获取请求知识，我们可以实现`fetchObjects`方法，如代码清单1-25（Objective-C）或代码清单1-26（Swift）所示。该方法创建一个获取请求，针对托管对象上下文执行它，并在控制台中显示结果。\n\
    \n**代码清单1-25.**  Objective-C的`fetchObjects`方法\n\n```objc\n- (void)fetchObjects\
    \ {\n  // Fetch the objects\n  NSFetchRequest *fetchRequest = [NSFetchRequest\
    \ fetchRequestWithEntityName:@\"Gadget\"];\n  NSArray *objects = [self.persistence.managedObjectContext\
    \ executeFetchRequest:fetchRequest error:nil];\n\n  // Log the objects\n  for\
    \ (NSManagedObject *object in objects) {\n    NSLog(@\"%@\", object);\n  }\n}\n\
    ```\n\n**代码清单1-26.**  Swift的`fetchObjects`函数\n\n```swift\nfunc fetchObjects()\
    \ {\n  if let persistence = persistence {\n    let fetchRequest = NSFetchRequest(entityName:\
    \ \"Gadget\")\n    var error : NSError?\n    let objects = persistence.managedObjectContext!.executeFetchRequest(fetchRequest,\
    \ error: &error) as [NSManagedObject]\n    if let error = error {\n      println(\"\
    Something went wrong: \\(error.localizedDescription)\")\n    }\n\n    for object\
    \ in objects {\n      println(object)\n    }\n  }\n  else {\n    println(\"Error,\
    \ persistence layer not initialized\")\n  }\n}\n```\n\n构建并运行应用程序。你应该会在iOS模拟器中看到一个空白屏幕，并且在Xcode控制台中看到类似如下的输出：\n\
    \n```\n2014-07-07 21:49:40.537 PersistenceApp[8878:83583] <NSManagedObject: 0x7faa21e380b0>\
    \ (entity: Gadget; id: 0xd000000000040000 <x-coredata://D2570307-5795-4E9A-96C9-7B477D27AB5D/Gadget/p1>\
    \ ; data: {\n    name = \"iPad Mini\";\n    price = 329;\n})\n2014-07-07 21:49:40.538\
    \ PersistenceApp[8878:83583] <NSManagedObject: 0x7faa21e386a0> (entity: Gadget;\
    \ id: 0xd000000000080000 <x-coredata://D2570307-5795-4E9A-96C9-7B477D27AB5D/Gadget/p2>\
    \ ; data: {\n    name = \"iPod touch\";\n    price = 299;\n})\n2014-07-07 21:49:40.538\
