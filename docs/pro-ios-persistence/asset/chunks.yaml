  raw: 'Your application must link against the Core Data framework, aptly named `CoreData.framework`,
    in order to use Core Data classes. While adding the Core Data framework to your
    project used to require a dozen mouse clicks, Xcode’s recent updates have introduced
    the notion of module imports. To link the Core Data framework to your project,
    simply add an `@import CoreData;` directive when you need access to Core Data
    classes in your Objective-C project, or `import CoreData` in your Swift project.
    Xcode will do the rest of the linking work.


    Adding a Managed Object Model


    A Core Data–based application requires a managed object model, so add a new file
    to the PersistenceApp group using the Core Data ![sym1.jpg](images/sym1.jpg) Data
    Model template. Yes, even Xcode calls it a data model, not a managed object model.
    You can call the model whatever you’d like; you just have to match the name when
    creating your persistence store. For the sake of convention, though, call it `PersistenceApp.xcdatamodeld`.
    When you’re done, you should have an empty Core Data model called `PersistenceApp.xcdatamodeld`,
    as shown in [Figure 1-6](#9781430260288_Ch01.xhtml#Fig6).


    ![9781430260288_Fig01-06.jpg](images/9781430260288_Fig01-06.jpg)


    [Figure 1-6](#9781430260288_Ch01.xhtml#_Fig6). The empty `PersistenceApp.xcdatamodeld`
    managed object model


    We’ll add entities and attributes to the model later. For now, we’ll continue
    to focus on adding everything necessary for Core Data to the application.


    Adding and Initializing the Core Data Stack


    For the PersistenceApp application, we’re going to put all the Core Data stuff
    into a separate class called `Persistence`, and add an instance of that class
    as a property in our `AppDelegate` class. This will allow us to keep our `AppDelegate`
    class’s code cleaner and provide a clean interface for Core Data access.


    Create a new file in the `PersistenceApp` group using the Source ![sym1.jpg](images/sym1.jpg)
    Cocoa Touch Class template, call it `Persistence`, and make it a subclass of `NSObject`.
    Now, if you’re doing this in Objective-C, add the Core Data properties and helper
    method declarations to `Persistence.h`, as shown in [Listing 1-11](#9781430260288_Ch01.xhtml#list11).


    [***Listing 1-11***](#9781430260288_Ch01.xhtml#_list11). `Persistence.h`


    ```

    #import <Foundation/Foundation.h>

    @import CoreData;


    @interface Persistence : NSObject


    @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;

    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;

    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;


    - (void)saveContext;

    - (NSURL *)applicationDocumentsDirectory;


    @end

    ```


    In the implementation file, `Persistence.m`, add implementations for the two helper
    methods, which don’t deviate much from the Xcode-generated versions, as shown
    in [Listing 1-12](#9781430260288_Ch01.xhtml#list12).


    [***Listing 1-12***](#9781430260288_Ch01.xhtml#_list12). Helper Method Implementations
    in `Persistence.m`


    ```

    - (void)saveContext {

      NSError *error;

      if ([self.managedObjectContext hasChanges] && ![self.managedObjectContext save:&error])
    {

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

      }

    }


    - (NSURL *)applicationDocumentsDirectory {

      return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory
    inDomains:NSUserDomainMask] lastObject];

    }

    ```


    Notice that we don’t check whether the `managedObjectContext` property is `nil`
    before saving, because we’re going to create it when the `Persistence` instance
    is initialized so we know it won’t be `nil`. We retain the naive error handling,
    though, for now.


    To initialize the Core Data stack, add an implementation for `init` that creates
    the managed object model, the persistent store coordinator, and the managed object
    context, as shown in [Listing 1-13](#9781430260288_Ch01.xhtml#list13).


    [***Listing 1-13***](#9781430260288_Ch01.xhtml#_list13). Initializing the Core
    Data Stack in `Persistence.m`


    ```

    - (id)init {

      self = [super init];

      if (self != nil) {

        // Initialize the managed object model

        NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"PersistenceApp"
    withExtension:@"momd"];

        _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];


    // Initialize the persistent store coordinator

        NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"PersistenceApp.sqlite"];


    NSError *error = nil;

        _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:self.managedObjectModel];

        if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

                                                      configuration:nil

                                                                URL:storeURL

                                                            options:nil

                                                              error:&error]) {

          NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

          abort();

        }


    // Initialize the managed object context

        _managedObjectContext = [[NSManagedObjectContext alloc] init];

        [_managedObjectContext setPersistentStoreCoordinator:self.persistentStoreCoordinator];

        }

      return self;

    }

    ```


    In [Chapter 9](#9781430260288_Ch09.xhtml), we modify this approach to use threads
    for better performance, but for now we perform all the initialization on the main
    thread.


    To finish initializing the Core Data stack, we add a `Persistence` property to
    the application delegate and create it when the application loads. Open `AppDelegate.h`,
    add a forward declaration for `Persistence`, and add the property, so that the
    file matches [Listing 1-14](#9781430260288_Ch01.xhtml#list14).


    [***Listing 1-14***](#9781430260288_Ch01.xhtml#_list14). `AppDelegate.h`


    ```

    #import <UIKit/UIKit.h>


    @class Persistence;


    @interface AppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;

    @property (strong, nonatomic) Persistence *persistence;


    @end

    ```


    Next, open `AppDelegate.m` and add an import for `Persistence.h`:


    ```

    #import "Persistence.h"

    ```


    As the last step of initializing the Core Data stack, allocate and initialize
    the `persistence` property in the `application:didFinishLaunchingWithOptions`
    method. This method should now match [Listing 1-15](#9781430260288_Ch01.xhtml#list15).


    [***Listing 1-15***](#9781430260288_Ch01.xhtml#_list15). Allocating and Initializing
    the `persistence` Property


    ```

    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {

      self.persistence = [[Persistence alloc] init];

      return YES;

    }

    ```


    If you’re building this project in Swift, your work follows the same sort of pattern,
    albeit without the header files. In your `Persistence` class, add a variable for
    your managed object context. We’ll do all the initialization in the closure for
    this managed object context variable. You also add helpers for saving the context
    and getting the application document directory. [Listing 1-16](#9781430260288_Ch01.xhtml#list16)
    shows the updated `Persistence.swift` file, and [Listing 1-17](#9781430260288_Ch01.xhtml#list17)
    shows the additions to `AppDelegate.swift` to create a `Persistence` instance.
    Note that the Core Data stack will initialize when we create the Persistence instance;
    if we wanted, instead, to initialize Core Data when the managed object context
    is first accessed, we’d simply add the `@lazy` annotation to the managed object
    context variable.


    [***Listing 1-16***](#9781430260288_Ch01.xhtml#_list16). `Persistence.swift` Updated
    for Core Data


    ```

    import Foundation

    import CoreData


    class Persistence: NSObject {'
