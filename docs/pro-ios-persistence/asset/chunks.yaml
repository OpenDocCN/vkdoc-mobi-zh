- fmt: '# Core Data 模型设计


    正如设计面向对象应用程序一样，你应该花时间思考 Core Data 模型所需的细节层次，以设计出正确的模型对象集。以图书库建模为例，我们希望能够按类别快速定位图书馆中的书籍。因此，我们从创建`BookCategory`实体开始。点击
    Xcode 窗口底部的"Add Entity"按钮，并将新创建的实体重命名为`BookCategory`。


    **提示**  在 Objective-C 运行时中已经存在一个名为`Category`的类，因此最好避免使用此名称以防止编译错误。在本书中，我们使用`BookCategory`这个名称。


    Core Data 在运行时将对象表示为`NSManagedObject`的实例。选择`BookCategory`实体并打开"Data Model"检查器。注意`BookCategory`实体默认映射到`NSManagedObject`类。在设计模型时，请记住实体类似于类（因此命名约定也相似）。


    ## 属性


    属性是用于描述实体的特征。想象一下，为了 BookStore 应用程序的目的，需要如何描述类别。我们至少需要为类别赋予一个名称，以便图书管理员能够快速了解该类别所指的内容。要添加名称，请向`BookCategory`实体添加一个名为`name`的新属性，并将其类型更改为`String`。


    **提示**  注意实体名称使用 Pascal 大小写，也称为首字母大写的驼峰命名法（类似于 Objective-C 类名），而属性使用小写字母开头但仍采用驼峰命名法（类似于
    Objective-C 类的属性）。


    此时，你的模型应类似于[图 2-2](#9781430260288_Ch02.xhtml#Fig2)。


    ![9781430260288_Fig02-02.jpg](images/9781430260288_Fig02-02.jpg)


    [图 2-2](#9781430260288_Ch02.xhtml#_Fig2)。带有`name`属性的`BookCategory`实体


    Core Data 支持一组有限的属性类型，如[表 2-1](#9781430260288_Ch02.xhtml#Tab1)（适用于 Objective-C
    代码）和[表 2-2](#9781430260288_Ch02.xhtml#Tab2)（适用于 Swift 代码）所述。


    [表 2-1](#9781430260288_Ch02.xhtml#_Tab1)。Objective-C 中可用的属性类型


    ![Table2-1.jpg](images/Table2-1.jpg)


    [表 2-2](#9781430260288_Ch02.xhtml#_Tab2)。Swift 中可用的属性类型


    ![Table2-2.jpg](images/Table2-2.jpg)


    大多数这些类型都很直观，因为它们直接映射到 Objective-C 数据类型。使用它们只需利用`NSManagedObject`实例的键/值访问器即可。`Transformable`类型是唯一没有
    Objective-C 对应类型的类型。它用于自定义类型，可用来处理 Core Data 尚未支持的任何类型。当你尝试持久化的属性无法很好地归入支持的数据类型之一时，请使用`Transformable`作为类型。例如，如果你的托管对象需要表示颜色并需要持久化它，那么使用`CGColorRef`类型是合理的。在这种情况下，你需要将
    Core Data 类型设置为`transient`和`Transformable`，并向 Core Data 提供将属性转换为支持数据类型的机制。当你创建自己的继承自`NSManagedObject`的托管对象时，使用自定义属性是有意义的，我们将在[第
    7 章](#9781430260288_Ch07.xhtml)中更详细地讨论。


    # 键值编码


    `NSManagedObject`实例符合键值编码（KVC）规范。KVC 是一种使用预定义命名约定访问对象属性的机制。`NSManagedObject`为
    Objective-C 和 Swift 都提供了 KVC 方法的实现。以下是 Objective-C 中的方法声明：


    ```

    - (void)setValue:(id)value forKey:(NSString *)key

    ```


    以及


    ```

    - (id)valueForKey:(NSString *)key

    ```


    以下是它们的 Swift 对应版本：


    ```

    func setValue(_ value: AnyObject!, forKey key: String!)

    ```


    以及


    ```

    func valueForKey(_ key: String!) -> AnyObject!

    ```


    在代码中访问属性变得很简单，如下面的 Objective-C 代码片段所示：


    ```

    NSManagedObject *myCategory = ....

    // 获取 name 属性的当前值

    NSString *name = [myCategory valueForKey:@"name"];

    // 将 name 属性的值设置为 Magazines

    [myCategory setValue:@"Magazines" forKey:@"name"];

    ```


    以下是对应的 Swift 代码：


    ```

    var myCategory = ....

    // 获取 name 属性的当前值

    var name: AnyObject! = myCategory.valueForKey("name")

    // 将 name 属性的值设置为 Magazines

    myCategory.setValue("Magazines", forKey: "name")

    ```


    # 生成类


    你的代码可以一直使用`NSManagedObject`实例和 KVC，但随着模型增长并拥有许多不同的实体，将一切都称为"托管对象"会变得非常混乱。因此，Core
    Data 允许你将实体直接映射到自定义类。所有属性都映射到 Objective-C 的属性，一切都变得更易于管理。


    在 Xcode 中，选择`BookCategory`实体。在菜单中，选择"Editor"![image](images/arrow.jpg)"Create
    NSManagedObject Subclass…"并按照提示操作，直到点击"Create"。


    **提示**  如果你选中"Use scalar properties for primitive data types"复选框，代码生成器将使用原始类型（而非`NSNumber`）来存储数值。在决定是否使用标量值时，请考虑你将如何访问数据。例如，标量值更容易在算术运算中访问和使用，但如果不先包装为`NSNumber`，则无法将它们添加到集合中。


    一个名为`BookCategory`的新类已添加到你的 Xcode 项目中。对于 Objective-C 版本，`BookCategory.h`如[列表 2-1](#9781430260288_Ch02.xhtml#list1)所示。


    [***列表 2-1***](#9781430260288_Ch02.xhtml#_list1)。`BookCategory.h`


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @interface BookCategory : NSManagedObject


    @property (nonatomic, retain) NSString * name;


    @end

    ```


    如果你在 Swift 中创建此项目，则会有一个名为`BookCategory.swift`的文件，如[列表 2-2](#9781430260288_Ch02.xhtml#list2)所示。


    [***列表 2-2***](#9781430260288_Ch02.xhtml#_list2)。`BookCategory.swift`


    ```

    import Foundation

    import CoreData


    class BookCategory: NSManagedObject {


    @NSManaged var name: String


    }

    ```


    无论使用哪种语言，`BookCategory`都是`NSManagedObject`的子类，并且具有一个名为`name`的类型为`NSString`（Objective-C）或`String`（Swift）的简单属性。这与模型相匹配。该类与实体之间的映射保存在模型本身中。返回模型并选择`BookCategory`实体。打开"Data
    Model"检查器，可以看到其关联的类现在是`BookCategory`（新创建的类）。


    如果你在 Swift 中做这个项目，还有一点额外工作要做（除非未来的 Xcode 版本修复了这个问题）。与 Objective-C 不同，Swift 有命名空间。当
    Swift 编译你的类时，它会将它们放入包含模块的命名空间中，该命名空间通常与项目名称匹配。这意味着你的`BookCategory`类实际命名为`BookStoreSwift.BookCategory`（如果你像我们一样将项目命名为`BookStoreSwift`）。然而，Core
    Data 模型只显示`BookCategory`作为类名。如果你现在运行程序，控制台会显示类似如下的错误消息：


    ```

    CoreData: warning: Unable to load class named ''BookCategory'' for entity ''BookCategory''.  Class
    not found, using default NSManagedObject instead.

    ```


    要解决此问题，你可以将 Core Data 模型中的类名更新为`BookStoreSwift.BookCategory`，或者向`BookCategory`类添加一个属性，告诉
    Core Data 该类实际上就是命名为`BookCategory`，如[列表 2-3](#9781430260288_Ch02.xhtml#list3)所示。'
  raw: 'Just as you would when designing an object-oriented application, you should
    take a moment to think about the level of details your Core Data model requires
    in order to design the right set of model objects. In the case of modeling a book
    library, we want to quickly be able to locate books within the library by category.
    So, we start our model with a `BookCategory` entity. Click the Add Entity button
    at the bottom of the Xcode window and rename the newly created entity to `BookCategory`.


    **Tip**  There is already a class called `Category` in the Objective-C runtime,
    so it is best to avoid using this name to prevent compilation errors. In this
    book, we use the name `BookCategory` instead.


    Core Data represents objects in the runtime as instances of `NSManagedObject`.
    Select the `BookCategory` entity and open the Data Model inspector. Note how the
    `BookCategory` entity is mapped to the class `NSManagedObject` by default. While
    designing your models, keep in mind that entities are akin to classes (hence the
    similar naming convention).


    Attribues


    Attributes are the properties used to describe an entity. Imagine what would be
    necessary to describe the category for the purpose of the BookStore application.
    We would want to at least give the category a name so that librarians can quickly
    know what the category refers to. To add a name, add a new attribute called `name`
    to the `BookCategory` entity and change its type to `String`.


    **Tip**  Take note of how entity names use Pascal case, also known as upper camel
    case (similar to Objective-C class names), while attributes use a lowercase first
    letter but are also camel case (like Objective-C class properties).


    At this point, your model should look like [Figure 2-2](#9781430260288_Ch02.xhtml#Fig2).


    ![9781430260288_Fig02-02.jpg](images/9781430260288_Fig02-02.jpg)


    [Figure 2-2](#9781430260288_Ch02.xhtml#_Fig2). The `BookCategory` entity with
    a `name` attribute


    Core Data supports a limited set of attributes types as described in [Table 2-1](#9781430260288_Ch02.xhtml#Tab1)
    (for Objective-C code) and [Table 2-2](#9781430260288_Ch02.xhtml#Tab2) (for Swift
    code).


    [Table 2-1](#9781430260288_Ch02.xhtml#_Tab1). Available Attribute Types in Objective-C


    ![Table2-1.jpg](images/Table2-1.jpg)


    [Table 2-2](#9781430260288_Ch02.xhtml#_Tab2). Available Attribute Types in Swift


    ![Table2-2.jpg](images/Table2-2.jpg)


    Most of these types are straightforward because they map directly to Objective-C
    data types. Using them is just a matter of leveraging the key/value accessors
    of the `NSManagedObject` instances. The `Transformable` type is the only type
    that doesn’t have an Objective-C counterpart. It is used for custom types, which
    you use for any type not already supported by Core Data. Use `Transformable` as
    the type when the attribute you’re trying to persist doesn’t fit neatly into one
    of the supported data types. For example, if your managed object needs to represent
    a color and needs to persist it, it would make sense to use the `CGColorRef` type.
    In this case you need to set the Core Data type to transient and `Transformable`
    and provide Core Data with the mechanism for transforming the attribute into supported
    data types. Custom attributes make sense to use when you create your own managed
    objects that extend from `NSManagedObject`, and we talk about them in more detail
    in [Chapter 7](#9781430260288_Ch07.xhtml).


    Key-Value Coding


    `NSManagedObject` instances are key-value coding (KVC) compliant. KVC is a mechanism
    for accessing the properties of an object using a predefined naming convention.
    `NSManagedObject` provides implementations for KVC methods, both for Objective-C
    and for Swift. Here are the method declarations in Objective-C:


    ```

    - (void)setValue:(id)value forKey:(NSString *)key

    ```


    and


    ```

    - (id)valueForKey:(NSString *)key

    ```


    Here are their Swift counterparts:


    ```

    func setValue(_ value: AnyObject!, forKey key: String!)

    ```


    and


    ```

    func valueForKey(_ key: String!) -> AnyObject!

    ```


    Accessing an attribute in your code becomes a trivial matter, as this Objective-C
    snippet shows:


    ```

    NSManagedObject *myCategory = ....

    // Get the current value for the name attribute

    NSString *name = [myCategory valueForKey:@"name"];

    // Set the value for the name attribute to Magazines

    [myCategory setValue:@"Magazines" forKey:@"name"];

    ```


    Here is the Swift counterpart to that code:


    ```

    var myCategory = ....

    // Get the current value for the name attribute

    var name: AnyObject! = myCategory.valueForKey("name")

    // Set the value for the name attribute to Magazines

    myCategory.setValue("Magazines", forKey: "name")

    ```


    Generating Classes


    Your code can always use `NSManagedObject` instances and KVC, but as your model
    grows and you have many different entities, it will inevitably become very confusing
    to call everything a managed object. For this reason, Core Data allows you to
    map entities directly to custom classes. All their attributes are mapped to Objective-C
    properties and everything becomes a lot simpler to manage.


    In Xcode, select the `BookCategory` entity. In the menu, select Editor ![image](images/arrow.jpg)
    Create NSManagedObject Subclass… and follow the prompts until you click Create.


    **Tip**  If you check the Use scalar properties for primitive data types checkbox,
    the code generator will use primitive types instead of `NSNumber` to store numeric
    values. When deciding whether to use scalar values or not, consider how you are
    going to access the data. For example, scalar values are easier to access and
    use in arithmetic operations, but they cannot be added to a collection without
    being wrapped into an `NSNumber`.


    A new class called `BookCategory` has been added to your Xcode project. As expected
    for the Objective-C version, `BookCategory.h` looks like [Listing 2-1](#9781430260288_Ch02.xhtml#list1).


    [***Listing 2-1***](#9781430260288_Ch02.xhtml#_list1). `BookCategory.h`


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @interface BookCategory : NSManagedObject


    @property (nonatomic, retain) NSString * name;


    @end

    ```


    If you’re creating this project in Swift, you’ll instead have a file called `BookCategory.swift`,
    shown in [Listing 2-2](#9781430260288_Ch02.xhtml#list2).


    [***Listing 2-2***](#9781430260288_Ch02.xhtml#_list2). `BookCategory.swift`


    ```

    import Foundation

    import CoreData


    class BookCategory: NSManagedObject {


    @NSManaged var name: String


    }

    ```


    In either language, `BookCategory` is a subclass of `NSManagedObject` and has
    a simple property of type `NSString` (Objective-C) or `String` (Swift) called
    `name`. This matches the model. The mapping between this class and the entity
    is kept in the model itself. Go back to the model and select the `BookCategory`
    entity. Open the Data Model inspector and see that its associated class is now
    `BookCategory` (the newly created class).


    If you’re doing this project in Swift, you have a little more work to do, unless
    some future version of Xcode corrects this issue. Unlike Objective-C, Swift has
    namespaces. When Swift compiles your classes, it puts them into the namespace
    of their containing modules, which usually matches the project’s name. This means
    that your `BookCategory` class is really named `BookStoreSwift.BookCategory` (if
    you named your project `BookStoreSwift` as we did). The Core Data model, however,
    just shows `BookCategory` for the class. If you run the program now, you’ll get
    an error message in the console that looks something like:


    ```

    CoreData: warning: Unable to load class named ''BookCategory'' for entity ''BookCategory''.  Class
    not found, using default NSManagedObject instead.

    ```


    To correct this issue, you can either update the name of the class in the Core
    Data model to `BookStoreSwift.BookCategory`, or add an attribute to the `BookCategory`
    class to tell Core Data that the class really is named `BookCategory` after all,
    as [Listing 2-3](#9781430260288_Ch02.xhtml#list3) shows.'
