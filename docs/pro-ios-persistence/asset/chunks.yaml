    \ 5-13](#9781430260288_Ch05.xhtml#_Fig13) Searching for “github”\n\n## Conclusion\n\
    \nThe CoreDump application is woefully incomplete, but it demonstrates how to\
    \ easily integrate data and images from a Core Data store into a table view–based\
    \ application. Since most iOS applications use tables and images, you’ll use fetched\
    \ results controllers and external records many times in your application development\
    \ to create applications that perform well.\n\n# Chapter 6\n\n# Versioning and\
    \ Migrating Data\n\nAs you develop Core Data–based applications, you usually don’t\
    \ get your data model exactly right the first time. You start by creating a data\
    \ model that seems to meet your application’s data needs, but as you progress\
    \ through the development of the application, you’ll often find that your data\
    \ model needs to change to serve your growing vision of what your application\
    \ should do. During this stage of your application’s life, changing your data\
    \ model to match your new understanding of the application’s data poses little\
    \ cost: your application will no longer launch, crashing on startup with the following\
    \ message:\n\n```\nThe model used to open the store is incompatible with the one\
    \ used to create the store.\n```\n\nYou resolve this issue either by finding the\
    \ database file on the file system and deleting it or by deleting your fledgling\
    \ application from the iPhone Simulator or your device. Either way, the database\
    \ file that uses your outdated schema disappears, along with data in the persistent\
    \ store, and your application re-creates the database file the next time it launches.\
    \ You’ll probably do this several times during the development of your application.\n\
    \nOnce you release your application, however, and people start using it, they\
    \ will accumulate data they deem important in the persistent stores on their devices.\
    \ Asking them to delete their data stores any time you want to release a new version\
    \ of the application with a changed data model will drop your app instantly to\
    \ one-star status, and the people commenting will decry Apple’s rating system\
    \ for not allowing ratings of zero or even negative stars.\n\nDoes that mean releasing\
    \ your application freezes its data model? That the data model in the 1.0 version\
    \ of your application is permanent? That you’d better get the first public version\
    \ of the data model perfect, because you’ll never be able to change it? Thankfully,\
    \ no. Apple anticipated the need for improving Core Data models over the life\
    \ of applications and built mechanisms for you to change data models and then\
    \ migrate users’ data to the new models, all without Apple’s intervention or even\
    \ awareness. This chapter goes through the process of versioning your data models\
    \ and migrating data across those versions, however complex the changes you’ve\
    \ made to the model.\n\n## Versioning\n\nTo take advantage of Core Data’s support\
    \ for versioning your data model and migrating data from version to version, you\
    \ start by explicitly creating a new version of the data model. To illustrate\
    \ how this works, let’s bring back the BookStore application from [Chapter 4](#9781430260288_Ch04.xhtml).\
    \ Make a copy of it, because you’ll be changing its data model several times in\
    \ this chapter. In the original version of BookStore, you created a data model\
    \ that makes the model appear as shown in [Figure 6-1](#9781430260288_Ch06.xhtml#Fig1).\n\
    \n![9781430260288_Fig06-01.jpg](images/9781430260288_Fig06-01.jpg)\n\n[Figure\
    \ 6-1](#9781430260288_Ch06.xhtml#_Fig1) The single-version data model"
