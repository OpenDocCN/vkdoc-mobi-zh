    The next section, “Comparing Expressions Using Different Predicate Types,” covers
    the different predicate types, including `NSBetweenPredicateOperatorType`.


    Run the WordList application, and you should see a line in the output like the
    following:


    ```

    20-25 letter words: 276

    ```


    You can also see, in the Xcode console, that the predicate’s query language incorporates
    the two constant values in a `BETWEEN` clause, as we’d expect.


    ```

    length BETWEEN {20, 25}

    ```


    Comparing Expressions Using Different Predicate Types


    In addition to expressions, predicates require comparators to evaluate whether
    to include objects in their result sets. The `NSComparisonPredicate` class, a
    subclass of `NSPredicate`, compares two expressions with each other using the
    type of comparator you specify when you create it. You can, for example, require
    that the expressions are equal for the evaluated object to be included in the
    result set. We saw this when comparing `Word` objects with the constant expression
    "zyzzyvas": only words with that exact text were returned.


    We also saw a "between" type comparator with the `wordCountForRange:` method,
    which required that a word have a length between two integers for inclusion in
    the result set. `NSComparisonPredicate` offers a slew of other comparison types
    to fit other comparison needs. See [Table 3-2](#9781430260288_Ch03.xhtml#Tab2)
    for a list of the comparison types. The Query Language and Logical Description
    columns use `L` and `R` to represent the left expression and right expression
    being compared, respectively. The Swift types are the same as the Objective-C
    types, except that the Objective-C types begin with `NS` and the Swift types do
    not.


    [Table 3-2](#9781430260288_Ch03.xhtml#_Tab2). The Comparison Types


    | Objective-C  or Swift Type | Query Language | Logical Description |

    | --- | --- | --- |

    | `(NS)LessThanPredicateOperatorType` | `L < R` | `L` less than `R` |

    | `(NS)LessThanOrEqualToPredicateOperatorType` | `L <= R` | `L` less than or equal
    to `R` |

    | `(NS)GreaterThanPredicateOperatorType` | `L > R` | `L` greater than `R` |

    | `(NS)GreaterThanOrEqualToPredicateOperatorType` | `L >= R` | `L` greater than
    or equal to `R` |

    | `(NS)EqualToPredicateOperatorType` | `L = R` | `L` equal to `R` |

    | `(NS)NotEqualToPredicateOperatorType` | `L != R` | `L` not equal to `R` |

    | `(NS)MatchesPredicateOperatorType` | `L MATCHES R` | `L` matches the `R` regular
    expression |

    | `(NS)``LikePredicateOperatorType` | `L LIKE R` | `L = R` where `R` can contain
    * wildcards |

    | `(NS)BeginsWithPredicateOperatorType` | `L BEGINSWITH R` | `L` begins with `R`
    |

    | `(NS)EndsWithPredicateOperatorType` | `L ENDSWITH R` | `L` ends with `R` |

    | `(NS)InPredicateOperatorType` | `L IN R` | `L` is in the collection `R` |

    | `(NS)ContainsPredicateOperatorType` | `L CONTAINS R` | `L` is a collection that
    contains `R` |

    | `(NS)BetweenPredicateOperatorType` | `L BETWEEN R` | `L` is a value between
    the two values of the array `R` |


    **Note**  *NSLikePredicateOperatorType* is a simplified version of *NSMatchesPredicateOperatorType*.
    While *NSMatchesPredicateOperatorType* can use complex regular expressions, *NSLikePredicateOperatorType*
    uses simple wildcard replacement (*) characters, so that the expression text LIKE
    ‘b*ball’ would match baseball and basketball but not football.


    We can use `NSEndsWithPredicateOperatorType`, for example, to find all the words
    that end with the letters "gry." [Listing 3-32](#9781430260288_Ch03.xhtml#list32)
    shows the `endsWithGryWords` method in Objective-C, and [Listing 3-33](#9781430260288_Ch03.xhtml#list33)
    shows it in Swift, to do just that. Don’t forget to add a call to it in your `statistics`
    method, and then build and run the application to see "puggry, hungry, angry"
    (in no particular order) added to the output.


    [***Listing 3-32***](#9781430260288_Ch03.xhtml#_list32). The `endsWithGryWords`
    Method in Objective-C'
