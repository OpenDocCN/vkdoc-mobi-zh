    ### 排版后的内容


    请注意，我们并未复制发布关系。在 `NSEntityMigrationPolicy` 的 `createRelationshipsForDestinationInstance:`
    方法中，默认情况下关系会被复制。通过不重写该方法，我们让 Core Data 自动帮我们复制这些关系。


    现在让我们回到映射模型。选择名为 `PublicationToPublication` 的实体映射。在右侧面板中，将自定义策略设置为 `PublicationToPublicationMigrationPolicy`（即我们刚刚创建的那个），如图
    6-14 所示。


    ![9781430260288_Fig06-14.jpg](img/9781430260288_Fig06-14.jpg)


    图 6-14。将新的迁移策略设置为映射模型


    您的映射模型已准备好执行迁移。然而，与轻量级迁移一样，您需要在应用委托中添加一些代码，以告诉 Core Data 执行迁移。


    ## 迁移数据


    创建映射模型是执行轻量级迁移无法处理的迁移的关键步骤，但您仍然需要执行实际的迁移。本节将解释如何操作，然后更新 BookStore 应用的代码以实际运行迁移。到本节结束时，您将得到一个
    BookStore 应用，其中包含之前的所有书籍，但此时作者的名字和姓氏已被正确拆分。


    告诉 Core Data 使用您创建的映射模型从旧模型迁移到新模型，与告诉 Core Data 使用轻量级迁移类似。正如您之前所学，告诉 Core Data
    执行轻量级迁移的方式是传递一个选项字典，其中包含两个键，其值为 `YES` 或 `true`。


    - `NSMigratePersistentStoresAutomaticallyOption`

    - `NSInferMappingModelAutomaticallyOption`


    第一个键告诉 Core Data 自动迁移数据，第二个键告诉 Core Data 推断映射模型。


    对于使用您创建的映射模型进行迁移，您显然希望 Core Data 仍然自动执行迁移，因此您仍然将 `NSMigratePersistentStoresAutomaticallyOption`
    设置为 `YES 或 true`。然而，由于您已经创建了映射模型，您不希望 Core Data 推断任何内容；您希望它使用您的映射模型。因此，您将 `NSInferMappingModelAutomaticallyOption`
    设置为 `NO 或 false`，或者将其完全从选项字典中省略。


    那么，如何指定 Core Data 用于执行迁移的映射模型呢？是在选项字典中设置吗？是通过某种方式传递给持久化存储协调器的 `addPersistentStoreWithType:`
    方法吗？是将其设置到持久化存储协调器中？还是设置到托管对象模型或上下文中？


    答案（可能有点令人惊讶）是：您什么都不用做。Core Data 会自行解决。它会搜索您的映射模型，找到适合从源模型迁移到目标模型的模型，并使用它。这使迁移变得异常简单。


    ## 运行您的迁移


    要运行 BookStore 数据存储的迁移，请打开 `AppDelegate.m` 文件或 `AppDelegate.swift` 文件，并从选项字典中移除
    `NSInferMappingModelAutomaticallyOption` 键。这就是让 Core Data 使用您的映射模型 `Model3To4.xcmappingmodel`
    迁移数据所需的全部操作。如果尚未设置，请将当前模型版本设置为 `BookStore 4`，然后构建并运行 BookStore 应用；您应该会看到数据库中之前拥有的所有书籍。只是这一次，如果您查看数据存储，将会看到名称已被正确拆分：


    ```

    sqlite> select ztitle,zfirstname,zlastname,zprice from zpublication;


    ZTITLE           ZFIRSTNAME  ZLASTNAME   ZPRICE    

    ---------------  ----------  ----------  ----------

    The second book  John        Doe         20.0      

    The third book   Jane        Doe         21.0      

    The fourth book  Jack        Brown       23.0      

    The first book   Bill        Smith       22.0

    ```


    ## 自定义迁移


    在大多数数据迁移案例中，使用默认的三步迁移过程（创建目标对象、创建关系、验证并保存）就足够了。数据对象会从前一版本在新数据存储中创建，然后所有关系被创建，最后数据被验证并持久化。然而，在某些情况下，您希望在迁移过程中进行干预。这时就需要自定义迁移。通常，当数据变更超出简单地将数据从旧实体移动到新实体时，您就需要考虑自定义迁移。例如，当迁移的顺序很重要，或者您希望让用户了解迁移进度的状态时，就是这样。


    控制迁移过程的初始化意味着您需要执行所有通常由 Core Data 为您完成的工作。这意味着您需要执行以下操作：


    - 确保确实需要迁移。

    - 设置迁移管理器。

    - 通过将模型拆分为独立部分来运行迁移。


    本节将逐步介绍一个自定义迁移示例，向您展示如何进行非平凡的迁移。在迁移过程中，我们将在控制台日志中显示进度。


    为此示例设置场景。首先，创建数据模型的新版本。此时您应该拥有 `BookStore 5.xcdatamodel`。在新模型中，我们做一些更改来触发迁移。打开
    `Publication` 实体，添加一个名为 `synopsis` 的 `String` 类型的新属性。将 `BookStore 5.xcdatamodel`
    设置为当前模型。


    ### 确保需要迁移


    为了验证模型是否与持久化存储兼容，在将持久化存储添加到协调器之前，您可以使用 `NSManagedObjectModel` 类的 `isConfiguration:compatibleWithStoreMetadata:`
    方法。可以通过使用协调器的 `metadataForPersistentStoreOfType:URL:error:` 方法查询协调器来检索数据存储的元数据。


    打开 `AppDelegate.m` 或 `AppDelegate.swift`，编辑 `persistentStoreCoordinator` 的 getter
    方法，如列表 6-12（Objective-C）或列表 6-13（Swift）所示。


    ***列表 6-12***。确定是否需要迁移（Objective-C）


    ```

    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator {

      if (_persistentStoreCoordinator != nil) {

          return _persistentStoreCoordinator;

      }


    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];

      NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"BookStoreEnhanced.sqlite"];


    NSError *error = nil;

      NSDictionary *sourceMetadata = [NSPersistentStoreCoordinator   metadataForPersistentStoreOfType:NSSQLiteStoreType
    URL:storeURL error:&error];


    NSManagedObjectModel *destinationModel = [_persistentStoreCoordinator managedObjectModel];


    BOOL pscCompatible = [destinationModel isConfiguration:nil   compatibleWithStoreMetadata:sourceMetadata];


    if (!pscCompatible) {

        // 需要迁移


    // ... 在此处执行迁移

      }


    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType  
    configuration:nil URL:storeURL options:nil error:&error]) {

        [self showCoreDataError];

      }


    return _persistentStoreCoordinator;

    }

    ```


    ***列表 6-13***。确定是否需要迁移（Swift）

