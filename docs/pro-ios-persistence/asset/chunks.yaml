    ## 执行加密与解密


    为了实现实际的加密与解密，我们使用 iOS 提供的 Common Crypto 库。本书并非加密专著，因此不会深入探讨加密的具体工作原理。如果你想了解更多，我们鼓励你自行研究加密相关知识。一些
    iOS 加密相关的资源包括：


    *   Apple 的《加密服务指南》，网址为 `https://developer.apple.com/library/mac/documentation/security/conceptual/cryptoservices/Introduction/Introduction.html`

    *   Rob Napier 的博客文章：“Properly Encrypting With AES With CommonCrypto”，网址为 `http://robnapier.net/aes-commoncrypto/`


    就本章而言，你应理解以下几点：


    *   我们使用由用户提供的密码作为密钥进行对称加密。

    *   对于每个要加密的字符串，我们都会生成一个随机盐值，并将其与密码结合，然后使用 SHA1 进行哈希处理。

    *   我们使用 AES 算法进行加密。


    我们使用一个用户提供的密码，并将其存储在应用委托的一个成员变量中，该变量被恰当地命名为 `password`。将其添加到 `AppDelegate.h` 或
    `AppDelegate.swift` 中，如代码清单 7-29（Objective-C）和代码清单 7-30（Swift）所示。


    ***代码清单 7-29***. 在应用委托中添加密码（Objective-C）


    ```

    @property (copy, nonatomic) NSString *password;

    ```


    ***代码清单 7-30***. 在应用委托中添加密码（Swift）


    ```

    var password: String?

    ```


    在我们讨论如何提示用户输入密码、如何验证密码是否正确，以及如何为每个字符串生成并存储盐值之前，我们先来构建实际的值转换器。在构建之前，我们必须了解值转换器的方法及其作用。


    ### 理解 NSValueTransformer 的方法


    `NSValueTransformer` 有四个值得关注的方法：其中两个是静态方法，两个是实例方法。表 7-1 列出了这些方法及其功能。


    表 7-1. `NSValueTransformer` 的方法


    | 方法 | 描述 |

    | --- | --- |

    | `+ (BOOL)allowsReverseTransformation` | 静态方法，若该值转换器支持反向转换则返回 `YES`，否则返回 `NO`。默认值为
    `YES`。 |

    | `+ (Class)transformedValueClass` | 正向转换所返回值的类。 |

    | `- (id)transformedValue:(id)value` | 被调用以将 `value` 转换为新值。 |

    | `- (id)reverseTransformedValue:(id)value` | 被调用以进行反向转换，将 `value` 转换为新值。你的值转换器必须支持反向转换。如果无法通过简单重复调用
    `transformedValue;` 来逆向转换，则应重写此方法。 |


    ### 实现加密/解密值转换器


    对于我们的加密/解密值转换器，我们必须同时支持正向和反向转换——在将数据存入 Core Data 数据存储时进行加密（正向转换），在将数据读取到内存并显示在屏幕上时进行解密（反向转换）。因此，我们分别重写
    `transformedValue:` 和 `reverseTransformedValue:` 来实现加密和解密。我们无需重写 `allowsReverseTransformation`，因为其默认返回值为
    `YES`。我们将 `transformedValueClass` 的返回值设为 `NSData` 类，因为这是 `transformedValue:` 返回的对象类型。


    一个有趣的问题是如何为每个要加密的字符串存储两条数据：盐值（salt）和初始化向量（IV），这两者都是随机数据。这些数据与密码结合使用，可以防止对数据进行彩虹表攻击。我们在加密字符串时创建它们，然后在解密时使用它们。由于解密每个字符串时都必须有盐值和
    IV，因此我们必须为每个加密的字符串存储盐值和 IV。


    你可能会想到在 Core Data 模型的 `Note` 实体中创建属性来存储每个托管对象的盐值和 IV，但请记住，我们是给 Core Data 提供一个派生自
    `NSTransformer` 的类来读写我们的 `Transformable` 属性。实例化并调用转换器的是 Core Data 的代码，而不是我们的代码。此外，我们的转换器类对其被调用时所处的上下文一无所知——它不知道正在被用于哪个托管对象。它只知道接收一个值并返回一个值。我们无法在转换器中读取或写入模型中的其他属性，因为我们不知道正在处理哪个托管对象，甚至不知道正在加密或解密的是哪个属性。


    因此，解决方案是在写入数据时将盐值、IV 和加密后的字符串合并成一个属性，在读取数据时再从数据中解析出盐值、IV 和加密后的字符串，以便执行解密。我们将按以下方式存储数据：


    *   盐值（8 字节）

    *   IV（16 字节）

    *   加密后的字符串（剩余字节）


    对于实际的加密和解密，我们创建一个参数化的辅助方法，名为 `transform:`，该方法允许我们指定是加密还是解密，因为执行这两种操作的代码非常相似。该方法将密码、盐值和
    IV 作为参数。如前所述，我们不讨论实际加密和解密的细节，但在代码中添加了注释，供你参考。

    '
