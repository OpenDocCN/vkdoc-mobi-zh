    Creating Taps


    Anytime the user taps the screen, we create a `Tap` object in the Core Data store.
    We’ll handle the tap in the view controller, `ViewController`, and add a method
    to `Persistence` to actually add the `Tap`. We start in `Persistence`. Open `Persistence.h`,
    if you’re doing this in Objective-C, and add a method declaration for adding a
    `Tap`, as shown in [Listing 7-10](#9781430260288_Ch07.xhtml#list10).


    [***Listing 7-10***](#9781430260288_Ch07.xhtml#_list10). Declaration of a Method
    in `Persistence.h` to Add a Tap


    ```

    #import <UIKit/UIKit.h>


    ...


    - (void)addTap:(CGPoint)point;

    ```


    In `Persistence.m or Persistence.swift`, add the definition of `addTap:`. This
    method creates a `Tap` instance in the managed object context, sets its `x` and
    `y` values to the corresponding values in the specified point, sets color to a
    random color using a helper function, and then saves the managed object context.
    [Listing 7-11](#9781430260288_Ch07.xhtml#list11) shows the Objective-C version
    of this method and the random-color-generating helper, and [Listing 7-12](#9781430260288_Ch07.xhtml#list12)
    shows the Swift version.


    [***Listing 7-11***](#9781430260288_Ch07.xhtml#_list11). Adding a `Tap` in `Persistence.m`


    ```

    #import "Tap.h"


    ...


    - (void)addTap:(CGPoint)point {

      Tap *tap = [NSEntityDescription insertNewObjectForEntityForName:@"Tap" inManagedObjectContext:self.managedObjectContext];

      tap.x = point.x;

      tap.y = point.y;

      tap.color = [self randomColor];

      [self saveContext];

    }


    - (UIColor *)randomColor {

      float red = (arc4random() % 256) / 255.0f;

      float green = (arc4random() % 256) / 255.0f;

      float blue = (arc4random() % 256) / 255.0f;


    return [UIColor colorWithRed:red green:green blue:blue alpha:1.0];

    }

    ```


    [***Listing 7-12***](#9781430260288_Ch07.xhtml#_list12). Adding a Tap in `Persistence.swift`


    ```

    func addTap(point: CGPoint) {

        var tap = NSEntityDescription.insertNewObjectForEntityForName("Tap", inManagedObjectContext:
    self.managedObjectContext!) as? Tap


    tap?.x = Float(point.x)

        tap?.y = Float(point.y)

        tap?.color = self.randomColor()

        self.saveContext()

    }


    func randomColor() -> UIColor {

        let red = CGFloat(arc4random() % UInt32(256)) / 255.0

        let green = CGFloat(arc4random() % UInt32(256)) / 255.0

        let blue = CGFloat(arc4random() % UInt32(256)) / 255.0


    return UIColor(red: red, green: green, blue: blue, alpha: 1.0)

    }

    ```


    Now add a tap gesture recognizer to the view controller that ultimately calls
    the `addTap:` method when you tap the view. [Listing 7-13](#9781430260288_Ch07.xhtml#list13)
    shows the updated `ViewController.m` file, and [Listing 7-14](#9781430260288_Ch07.xhtml#list14)
    shows the updated `ViewController.swift` file.


