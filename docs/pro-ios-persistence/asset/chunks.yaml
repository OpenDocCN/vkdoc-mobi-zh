    Once the undo manager is set into the managed object context, it tracks any changes
    in the managed object context and adds them to the undo stack. You can undo those
    changes by calling the `undo` method of `NSUndoManager`, and each change (actually,
    each undo group, as explained in the section “Undo Groups”) is rolled back from
    the managed object context. You can also replay changes that have been undone
    by calling `NSUndoManager`’s `redo` method.


    The `undo` and `redo` methods perform their magic only if the managed object context
    has any change to undo or redo, so calling them when no changes can be undone
    or redone does nothing. You can check, however, if the undo manager can undo or
    redo any changes by calling the `canUndo` and `canRedo` methods, respectively.


    Undo Groups


    By default, the undo manager groups all changes that happen during a single pass
    through the application’s run loop into a single change that can be undone or
    redone as a unit. This means, for example, that in the WordList application of
    [Chapter 3](#9781430260288_Ch03.xhtml), all word creations belong to the same
    group because they are all created during a for-loop without releasing control
    of the thread until done.


    You can alter this behavior by turning off automatic grouping completely and managing
    the undo groups yourself. To accomplish this, pass `NO` to `setGroupsByEvent`.
    You become responsible, then, for creating all undo groups, because the undo manager
    will no longer create them for you. You create the undo group by calling `beginUndoGrouping`
    to start creating the group and `endUndoGrouping` to complete the undo group.
    These calls must be matched, or an exception of type `NSInternalInconsistencyException`
    is raised. You could, for example, create an undo group for each word creation
    in WordList so that you can undo the creation one word at a time. The grouping
    strategy depends largely on the specific requirements of your application.


    Limiting the Undo Stack


    By default, the undo manager tracks an unlimited number of changes for you to
    undo and redo. This can cause memory issues, especially on iOS devices. You can
    limit the size of the undo stack by calling `NSUndoManager`’s `setLevelsOfUndo:`
    method, passing an unsigned integer that represents the number of undo groups
    to retain on the undo stack. You can inspect the current undo stack size, measured
    in the number of undo groups, by calling `levelsOfUndo`, which returns an unsigned
    integer. A value of 0 represents no limit. If you’ve imposed a limit on the size
    of the undo stack, the oldest undo groups roll off the stack to accommodate the
    newer groups.


    Disabling Undo Tracking


    Once you create an undo manager and set it into the managed object context, any
    changes you make to the managed object context are tracked and can be undone.
    You can disable undo tracking, however, by calling `NSUndoManager`’s `disableUndoRegistration`
    method. To re-enable undo tracking, call `NSUndoManager`’s `enableUndoRegistration`
    method. Disabling and enabling undo tracking use a reference counting mechanism,
    so multiple calls to `disableUndoRegistration` require an equal number of calls
    to `enableUndoRegistration` before undo tracking becomes enabled again.'
