    \ NSDate()\n        self.loadDataWithContext(context)\n        let end2 = NSDate()\n\
    \n// 记录结果\n        result.appendFormat(\"有缓存: %.3f s\\n\", end2.timeIntervalSinceDate(start2))\n\
    \nreturn result\n    }\n\nfunc loadDataWithContext(context: NSManagedObjectContext)\
    \ {\n        // 加载自拍照\n        let fetchRequest = NSFetchRequest(entityName: \"\
    Selfie\")\n        let selfies = context.executeFetchRequest(fetchRequest, error:\
    \ nil) as [Selfie]\n\n// 遍历自拍照\n        for selfie in selfies {\n            //\
    \ 加载自拍照的数据\n            selfie.valueForKey(\"name\")\n\n// 遍历社交网络\n          \
    \  for obj in selfie.socialNetworks {\n                let socialNetwork = obj\
    \ as SocialNetwork\n\n// 加载社交网络的数据\n                socialNetwork.valueForKey(\"\
    name\")\n            }\n        }\n    }\n}\n```\n\n我们来分析一下 `runWithContext:`\
    \ 方法。它执行了两次相同的操作：获取所有自拍照和所有社交网络。第一次执行时，缓存会在每次测试前通过 `ViewController` 中 `runTest:`\
    \ 处理程序调用的 `[context reset]` 或 `context.reset()` 被显式清除。第二次执行时，对象已在缓存中，因此数据返回速度会快得多。`loadDataWithContext:`\
    \ 方法执行实际的获取操作。你显式获取了自拍照和社交网络的 `name` 属性，以强制 Core Data 加载对象的属性，必要时会触发惰值。\n\n在 `ViewController.m`\
    \ 或 `ViewController.swift` 的 `tests` 数组中添加一个 `Cache` 实例，如果使用 Objective-C，还要添加对\
    \ `Cache.h` 的导入。构建应用程序并运行 `Cache` 测试。在我们的 iPhone 5s 上，该测试在无缓存时约需 0.6 秒，有缓存时约需\
    \ 0.09 秒，性能提升了约 85%。由此可见，在管理对象上下文中通过调用 `reset` 来谨慎地使缓存失效非常重要，因为其缓存机制可以显著提升性能。下一节将讨论缓存过期策略。\n\
    \n## 缓存过期\n"
- fmt: '# Cache Expiration and Memory Management in Core Data


    Any time an application uses a cache, the question of cache expiration arises:
    when should objects in the cache expire and be reloaded from the persistent store?
    The difficulty in determining the expiration interval comes from juggling the
    performance gain obtained by caching objects for long intervals versus the extra
    memory consumption this entails and the potential staleness of the cached data.
    This section examines the trade-offs of the two possibilities for expiring the
    cache and freeing some memory.


    ## Memory Consumption


    As more and more objects are put into the cache, memory usage increases. Even
    if a managed object is entirely faulted, you can determine the minimum amount
    of memory an `NSManagedObject` instance uses by calling the following:


    ```objc

    NSLog(@"%zu", class_getInstanceSize(NSManagedObject.class)); // Objective-C

    ```


    ```swift

    println(String(format: "%zu", class_getInstanceSize(NSManagedObject.self))) //
    Swift

    ```


    Note that, for the `class_getInstanceSize()` function, you must import `<objc/objc-runtime.h>`
    in Objective-C. If you’re running on a 32-bit system, you’ll see that the allocated
    size of an unpopulated managed object is 48 bytes. On a 64-bit system, the size
    is 96 bytes. This is because it holds references (i.e., 4-byte or 8-byte pointers,
    depending on the bitness of the operating system) to other objects such as the
    entity description, the context, and the object ID. Even without any actual data,
    a managed object occupies a minimum of 48 bytes (32-bit OS) or 96 bytes (64-bit
    OS). This is a best-case scenario because this approximation does not include
    the memory occupied by the unique object ID, which is populated. This means that
    if you have 100,000 managed objects in the cache, even faulted, you are using
    at least 5MB (32-bit OS) or 10MB (64-bit OS) of memory for things other than your
    data. If you start fetching data without faulting, you can run into memory issues
    quickly.


    The trick to this balancing act is to remove data from the cache when it’s no
    longer needed or if you can afford to pay the price of retrieving the objects
    from the persistent store when you need them again.


    ## Brute-Force Cache Expiration


    If you don’t care about losing all the managed objects, you can reset the context
    entirely. This is rarely the option you want to choose, but it is extremely efficient.
    `NSManagedObjectContext`, as we’ve seen, has a `reset` method that will wipe the
    cache out in one swoop. Once you call `[context reset]` or `context.reset()`,
    your memory footprint will be dramatically smaller, but you will have to pay the
    price of going to the persistent store if you want to retrieve any objects again.
    Please also understand that, as with any other kind of mass destruction mechanism,
    resetting the cache in the middle of a running application has serious side effects
    and collateral damage. For example, any managed objects that you were using prior
    to the reset are now invalid. If you try to do anything with them, your efforts
    will be met with runtime errors.


    ## Expiring the Cache Through Faulting


    Faulting is a more subtle option, as the section on faulting explains. You can
    fault any managed object by calling `[context refreshObject:managedObject mergeChanges:NO]`
    (or the Swift equivalent). After this method call, the object is faulted, and
    therefore the memory it occupies in the cache is minimized, although not zero.
    A non-negligible advantage of this strategy, however, is that when the managed
    object is turned into a fault, any managed object it has a reference to (through
    relationships) is released. If those related managed objects have no other references
    to them, then they will be removed from the cache, further reducing the memory
    footprint. Faulting managed objects in this manner helps prune the entire object
    graph.


    ## Uniquing


    Both business and technology like to turn nouns into verbs, and the pseudoword
    “uniquing” testifies to this weakness. It attempts to define the action of making
    something unique or ensuring uniqueness. Usage suggests not only that Apple didn’t
    invent the term but also that it predates Core Data. Apple embraces the term in
    its Core Data documentation, however, raising fears that one day Apple will call
    the action of listening to music *iPodding*.


    The technology industry uses the term “uniquing” in conjunction with memory objects
    versus their representation in a data store. In *Core Java Data Objects* by Sameer
    Tyagi and Michael Vorburger (Prentice Hall, 2003), it says that uniquing “ensures
    that no matter how many times a persistent object is found, it has only one in-memory
    representation. All references to the same persistent object within the scope
    of the same `PersistenceManager` instance reference the same in-memory object.”


    Martin Fowler, in *Patterns of Enterprise Application Architecture* (Addison-Wesley
    Professional, 2005), gives it a less colorful, more descriptive, and more English-compliant
    name: *identity map*. He explains that an identity map “ensures that each object
    gets loaded only once by keeping every loaded object in a map.” Whatever you call
    it or however you describe it, *uniquing* means that Core Data conserves memory
    use by ensuring the uniqueness of each object in memory and that no two memory
    instances of an object point to the same instance in the persistent store.


    Consider, for example, the Core Data model in the application in this chapter.
    Each `Selfie` instance has a relationship with 500 `Person` instances. When you
    run the application and reference the `Person` instances through any `Selfie`
    instances, you always get the same `Person` instances, as [Figure 9-6](#9781430260288_Ch09.xhtml#Fig6)
    depicts. If Core Data didn’t use uniquing, you could find yourself in the scenario
    shown in [Figure 9-7](#9781430260288_Ch09.xhtml#Fig7), where each `Person` instance
    is represented in memory several times, once for each `Selfie` instance, and each
    `Selfie` instance is represented in memory several times, once for each `Person`
    instance.


    ![9781430260288_Fig09-06.jpg](images/9781430260288_Fig09-06.jpg)


    [Figure 9-6](#9781430260288_Ch09.xhtml#_Fig6). Uniquing selfies and people


    ![9781430260288_Fig09-07.jpg](images/9781430260288_Fig09-07.jpg)


    [Figure 9-7](#9781430260288_Ch09.xhtml#_Fig7). Nonuniquing selfies and people


    Uniquing not only conserves memory but also eliminates data inconsistency issues.
    Think what could happen, for example, if Core Data didn’t employ uniquing and
    the PerformanceTuning application had 500 memory instances of each selfie (one
    for each person). Suppose that `Person 1` changed the rating of a selfie to 5
    and `Person 2` changed the rating of the same selfie to 7. What rating should
    the selfie really have? When the application stores the selfie in the persistent
    store, what rating should it save? You can imagine the data inconsistency bugs
    you’d have to track down if Core Data maintained more than one instance of each
    data object in memory.


    Note that uniquing occurs within a single managed object context only, not across
    managed object contexts. The good news, however, is that Core Data’s default behavior,
    which you can’t change, is to unique. Uniquing comes free with Core Data.'
