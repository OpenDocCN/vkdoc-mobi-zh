    ## 与 Dropbox Datastore API 集成


    在 iOS 上，通常很关注与 iCloud 集成以实现持久化。然而，根据你的应用和目标受众，其他解决方案可能更适合你。Dropbox 发布了其 Datastore
    应用程序编程接口 (API)，允许你将它的云服务用作通用的数据存储。与 iCloud 相比，使用 Dropbox 的一个明显优势是 Dropbox 拥有适用于多个平台的
    API。Dropbox Datastore API 的功能不像 Core Data。它不打算充当在资源之间创建链接的关系数据库。相反，它是一个简单的键/值对存储，非常类似于
    NoSQL 数据库，如 MongoDB 或 Cassandra。一个基本的特性是它允许你在没有模式（schema）的情况下工作，因此你无需过多担心模式更新和迁移。


    ### 设置 API 访问权限


    对于 iOS，设置说明位于 `www.dropbox.com/developers/datastore/sdks/ios`。在你的应用中设置 Dropbox
    的第一步是在 Dropbox 网站上创建一个 Dropbox 应用。登录到你的 Dropbox 账户，然后转到 `www.dropbox.com/developers/apps`
    创建一个新应用。选择 **Dropbox API 应用** 和 **仅数据存储（Datastores only）**，然后为你的应用选择一个名称。对于名称，请确保不要违反
    Dropbox 品牌指南。特别是，不要在应用名称中使用“Dropbox”或类似名称。该名称在所有 Dropbox 应用中必须是唯一的，因此你必须选择一个不同于“iOSPersistenceApp”的名称，这是我们选择的名称（参见图
    8-3）。


    ![9781430260288_Fig08-03.jpg](img/9781430260288_Fig08-03.jpg)


    图 8-3. 创建一个 Dropbox 应用程序


    创建应用后，下一个屏幕会显示你的应用密钥（app key）和应用密码（app secret），你的应用代码中需要这些信息才能与 Dropbox 通信。应用密码，顾名思义，应予以保密。


    我们现在可以创建新应用了。


