    # 本章阐述什么是 Core Data 及其组成部分


    本章阐述什么是 Core Data 及其组成部分。文中概述并解释了 Core Data 使用的基本类以及它们如何协同工作。它展示了如何在你的应用程序中设置
    Core Data，无论你是利用 Xcode 的 Core Data 代码生成功能，还是手动添加 Core Data 功能。同时，还介绍了为对象创建对象模型、存储对象和检索对象的基础知识。


    在本章中，你将构建两个应用程序：一个让 Xcode 为你设置 Core Data，另一个则需要你手动添加 Core Data。这两个应用程序除了空白屏幕外，没有任何界面，但它们都专注于
    Core Data 的交互。后续章节的应用程序将包含实际的用户界面，但请保持耐心，专注于学习 Core Data 的基础知识。你在本章所学的知识将为你阅读本书剩余部分以及开发自己的
    Core Data 项目奠定坚实的基础。


    ## 什么是 Core Data？


    设想一下，如果计算机不能存储数据会怎样。想象一下，每次你启动 iPhone 或 iPad 时，所有应用都需从头开始。你所有的文档都消失了：你的学校论文、预算规划电子表格、为新一轮风险投资融资精心准备的演示文稿，全都化为乌有。你在《愤怒的小鸟》中又回到了第一关。你不再有暴躁猫的图片。你昨晚的短信也不见了（对某些人来说，这可能反而是件好事）。简而言之，你的设备日复一日地变成了一块经典的“白板”（*tabula
    rasa*），空白且没有任何数据，毫无用处。


    那些假想中的计算机所缺乏的就是持久性：即随时间推移存储和检索数据的能力。我们希望持久化存储信息，例如我们的照片、高分记录和文档。苹果提供的持久化解决方案——Core
    Data，允许应用程序持久化存储任何形式的数据并检索它们。


    从技术上讲，Core Data 并非数据库，尽管它通常将数据存储在数据库中（准确地说，是 SQLite 数据库）。它也不是对象关系映射（ORM），尽管它用起来感觉有点像。它实际上是一个对象图，允许你创建、存储和检索那些拥有属性并与其他对象存在关系的对象。它的简洁性和强大功能使你能够持久化任何形式的数据，从基础数据模型到复杂数据模型。


    ## Core Data 组件


    Core Data 的新手常常会对该框架的复杂性感到沮丧，但正如我们将看到的，这种最初的印象是毫无根据的。Cocoa 偏爱长名称的习惯可能导致了这种错误的复杂感；毕竟，`NSPersistentStoreCoordinator`
    这个名字就很拗口。然而，一旦你克服了长名称的障碍，理解了每个类的用途，你就会认识到 Core Data 框架既优雅又简洁。


    我们可以将 Core Data 的类分为两组：一组通常在我们程序启动时设置一次，另一组则在程序运行期间持续使用。此外，Cocoa 还提供了一组 Core Data
    使用的类，这些类并不局限于 Core Data 的范围。Core Data 利用像 `NSPredicate` 和 `NSSortDescriptor` 这样的类来增强其功能，这些类在
    Cocoa 应用程序的其他上下文中也会用到。我们将在本书中涉及这些其他的类。


    首先，我们来讨论程序启动时设置一次的类。这些类包括：


    *   `NSPersistentStore`

    *   `NSPersistentStoreCoordinator`

    *   `NSManagedObjectModel`


    `NSPersistentStore` 类代表一个持久化存储：即设备文件系统中实际存储数据的位置。这通常是一个 SQLite 数据库，尽管 Core Data
    也提供其他类型的持久化存储：


    *   XML（仅限 OS X）

    *   原子存储（Atomic）

    *   内存存储（In-memory）


    XML 存储（如你所料）将数据存储在 XML 文件中，但仅适用于 OS X。原子存储之所以得名，是因为它在访问时会读取和写入整个数据存储，如果你希望创建自己的文件格式来存储文件，它会很有用。Core
    Data 提供了一种名为二进制存储类型的原子存储实现，你也可以基于原子存储创建自定义存储。但请注意，原子存储通常速度较慢，尤其是在数据集变得庞大时，因为它们会原子地写入和读取数据文件。如果你不需要数据在应用程序当前启动之外持久保存，但又想利用
    Core Data 的强大功能与数据交互，那么内存存储会很有用。不过，你的持久化存储大多数（如果不是全部）都将是 SQLite 存储。它们速度很快，因为它们可以读写部分数据，并且能够让你的数据在应用程序多次启动之间持久保存。每个应用程序通常只有一个持久化存储，但也可以有多个。


    `NSPersistentStoreCoordinator` 类代表一个持久化存储协调器，它协调持久化存储、对象模型和对象上下文之间的关系。持久化存储协调器使用一个对象模型（我们接下来会看到），并将其与一个或多个持久化存储关联起来。它还协调一个或多个托管对象上下文与一个或多个持久化存储之间的对象存储和检索。从某种意义上说，它是
    Core Data 的中心枢纽，将所有 Core Data 类连接在一起。幸运的是，创建和配置它都很容易，然后在你的应用程序运行时，它会为你执行所有复杂的魔法。


    `NSManagedObjectModel` 类代表一个托管对象模型，或者更简单地说，一个对象模型。它看起来非常像数据模型，所以你即使将其视为数据模型也是可以理解的。正如实体-关系（ER）图定义了表、列和关系一样，对象模型定义了实体、属性和关系。你可以在代码中创建对象模型，但
    Xcode 提供了一个对象模型编辑器，让你可以可视化地创建你的应用程序加载和使用的对象模型。


    你在应用程序运行期间会使用接下来的两个类。它们是：


    *   `NSManagedObjectContext`

    *   `NSManagedObject`


    `NSManagedObjectContext` 类代表一个托管对象上下文，或者简称为对象上下文。你的应用程序可以使用一个或多个这样的上下文，但通常只会使用一个。对象上下文为对象提供了生存空间，苹果文档将其称为“草稿板”。你在对象上下文中创建对象、从对象上下文中检索对象，并告知对象上下文保存自身。对象上下文负责与持久化存储协调器通信，以实际存储和检索对象。在
    Core Data 应用程序中，你会大量接触到对象上下文。


    `NSManagedObject` 类代表一个托管对象，或者说是由 Core Data 管理的对象。你可以将它们视为数据库中的行。托管对象具有由对象模型定义的属性和关系，并使用键值编码（KVC），以便你可以轻松设置和获取它们的数据。你也可以创建
    `NSManagedObject` 的子类，以创建与你的对象模型匹配的属性，以及用于处理托管对象的便捷方法。


    图 1-1 展示了 Core Data 的各个类以及它们如何协同工作。


    ![9781430260288_Fig01-01.jpg](img/9781430260288_Fig01-01.jpg)


    图 1-1. Core Data 的类


    ## 创建一个新的 Core Data 项目

