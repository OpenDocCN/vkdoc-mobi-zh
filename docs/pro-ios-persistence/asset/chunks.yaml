    The implementation of `MasterViewController` references the `fetchedResultsController`
    several times. The next few sections examine these references.


    Accessing `fetchedResultsController`


    The `MasterViewController` implementation overrides the accessor for `fetchedResultsController`
    to create, initialize, and return it, as shown in [Listing 5-3](#9781430260288_Ch05.xhtml#list3)
