    Batch Updates


    In the pre-iOS Core Data world, if you wanted to update a raft of Core Data objects,
    you had to fetch all the objects you wanted to update, iterate through them, set
    the new value or values, and then save the managed object context. Depending on
    the save of the data set you wish to update, this can be a slow and memory-intensive
    operation, as all the objects had to be fetched into memory and then written to
    in an iterative loop. For large updates—updates too large to fit in memory, perhaps—developers
    had to create custom solutions to break the updates into smaller batches.


    iOS 8 (and OS X Yosemite) introduced batch updates for Core Data to address this
    gap in the form of a class called `NSBatchUpdateRequest`. Surprisingly, the Apple
    documentation (as of Xcode 6.1 and iOS 8.1) omit any documentation for this class
    except to show that it inherits from `NSPersistentStoreRequest`. The header file,
    `NSBatchUpdateRequest.h`, gives us a little info, though. Here are two important
    points we learn from the header file’s comments.


    *   NSBatchUpdateRequest talks directly to the underlying persistent store without
    loading data into memory. Not all persistent stores support this approach, but
    since you’re most likely using a SQLite persistent store, you should be OK.

    *   Because it talks directly to the underlying persistent store, it doesn’t go
    through the validation that the managed object model and managed object context
    provide. You are responsible for enforcing the validation rules yourself.


    To execute a batch update request, you create an `NSBatchUpdateRequest` instance,
    specifying the entity from your model that the request will update. Optionally,
    you set a predicate on the request to filter the objects to update. You set the
    properties to update and the values to update them to. You also set the type of
    result you want returned. Finally, you run the update.


    You specify the properties to update in a dictionary, with the name of the property
    to update as the key and the desired value as the value. This necessarily means
    that you are specifying a single value for a given property that all matching
    objects will be updated to—you can’t specify different values for each object.
    This makes sense; Core Data is going to generate and execute a SQL statement that
    looks something like the following:


    ```

    UPDATE ZMYENTITY SET ZNAME = ?

    ```


    You can, of course, set multiple properties to update.


    For the type of result you want returned from running the batch update, you can
    specify one of three values.


    *   `NSStatusOnlyResultType`—return nothing. This is the default.

    *   `NSUpdateObjectIDsResultType`—return the object IDs of the updated objects.

    *   `NSUpdatedObjectsCountResultType`—return the number of objects that were updated.


    The return type you’ll want to specify depends on your application’s needs, of
    course. The `NSUpdateObjectIDsResultType` can be useful, though, so that you can
    fault the updated objects in your managed object context. Remember that the batch
    update bypasses the managed object context, so if you have the objects in your
    managed object context, they’re sitting there with the old value or values. You
    can fault them and then refetch them to get the updated objects.


    Whatever type you specify, executing the batch update sets the result member of
    the `NSBatchUpdateResult` to the appropriate value.


    To test batch updates, create a `PerfTest`-conforming class called `BatchUpdate`.
    In the test this method implements, we update the rating for all the selfies twice.
    The first time we perform the update, we do it the pre-iOS 8 way: one at a time.
    We fetch all the selfies, then iterate through them to set their rating values
    to 5\. Finally, we save the managed object context. The second time we perform
    the update, we use a batch update to set the rating values to 7\. [Listing 9-49](#9781430260288_Ch09.xhtml#list49)
    shows the Objective-C version, and [Listing 9-50](#9781430260288_Ch09.xhtml#list50)
    shows the Swift version.


