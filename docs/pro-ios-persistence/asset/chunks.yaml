    \ your Swift project, do the following:\n\n1.  Create a dummy Objective-C file\
    \ in your project.\n2.  Xcode will ask you if you want to create a bridge header\
    \ file. Say yes.\n3.  Delete the dummy Objective-C file.\n4.  Open the bridge\
    \ header, `SecureNoteSwift-Bridging-Header.h`, and add these imports:\n\n```\n\
