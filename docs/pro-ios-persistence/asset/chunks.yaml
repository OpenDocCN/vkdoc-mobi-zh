    [***Listing 5-3***](#9781430260288_Ch05.xhtml#_list3). The `fetchedResultsController`
    Accessor (Objective-C)


    ```

    - (NSFetchedResultsController *)fetchedResultsController {

      if (_fetchedResultsController != nil) {

        return _fetchedResultsController;

      }


    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];

      // Edit the entity name as appropriate.

      NSEntityDescription *entity = [NSEntityDescription entityForName:@"Event" inManagedObjectContext:self.managedObjectContext];

      [fetchRequest setEntity:entity];


    // Set the batch size to a suitable number.

      [fetchRequest setFetchBatchSize:20];


    // Edit the sort key as appropriate.

      NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@"timeStamp"
    ascending:NO];

      NSArray *sortDescriptors = @[sortDescriptor];


    [fetchRequest setSortDescriptors:sortDescriptors];


    // Edit the section name key path and cache name if appropriate.

      // nil for section name key path means "no sections".

      NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController
    alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext
    sectionNameKeyPath:nil cacheName:@"Master"];

      aFetchedResultsController.delegate = self;

      self.fetchedResultsController = aFetchedResultsController;


    NSError *error = nil;

      if (![self.fetchedResultsController performFetch:&error]) {

        // Replace this implementation with code to handle the error appropriately.

        // abort() causes the application to generate a crash log and terminate. You
    should not use this function in a shipping application, although it may be useful
    during development.

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

      }


    return _fetchedResultsController;

    }

    ```


