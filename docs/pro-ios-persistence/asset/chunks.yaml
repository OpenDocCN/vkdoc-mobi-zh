    \ Bug 标题文本字段的插座变量（注意：我们将其命名为 `bugTitle`，以避免与 `UIViewController` 已存在的 `title` 属性冲突）\n\
    - 一个用于 Bug 详情文本视图的插座变量\n- 一个接受 `Bug` 和父级 `Project` 参数的初始化方法\n- 一个用于保存 `Bug` 的操作\n\
    - 一个用于取消添加或编辑的操作\n\n清单 5-51 展示了编辑后的 `BugViewController.h` 文件，清单 5-52 展示了编辑后的 `BugViewController.swift`\
    \ 文件。\n\n***清单 5-51***. `BugViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@class Bug;\n@class Project;\n\n@interface BugViewController : UIViewController\n\
    @property (strong, nonatomic) Bug *bug;\n@property (strong, nonatomic) Project\
    \ *project;\n@property (weak, nonatomic) IBOutlet UITextField *bugTitle;\n@property\
    \ (weak, nonatomic) IBOutlet UITextView *details;\n\n- (id)initWithBug:(Bug *)bug\
    \ project:(Project *)project;\n- (IBAction)save:(id)sender;\n- (IBAction)cancel:(id)sender;\n\
    \n@end\n```\n\n***清单 5-52***. `BugViewController.swift`\n\n```\nimport UIKit\n\
    \nclass BugViewController: UIViewController {\n    var project: Project? = nil\n\
    \    var bug: Bug? = nil\n\n    @IBOutlet weak var bugTitle: UITextField!\n  \
    \  @IBOutlet weak var details: UITextView!\n    ...\n}\n```\n\n如果你正在使用 Objective-C，请打开\
    \ `BugViewController.m` 并导入 `Project` 和 `Bug` 的头文件，如 清单 5-53 所示。然后，添加新的初始化方法来存储\
    \ `bug` 和 `project` 参数，如 清单 5-54 所示。如果你正在使用 Swift，请将 清单 5-55 所示的初始化方法添加到 `BugViewController.swift`\
    \ 中。\n\n***清单 5-53***. 添加导入\n\n```\n#import \"Project.h\"\n#import \"Bug.h\"\n\
    ```\n\n***清单 5-54***. `initWithBug:project:` 方法\n\n```\n- (id)initWithBug:(Bug\
