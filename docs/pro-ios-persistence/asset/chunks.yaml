  trans: "\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n   \
    \ // 在这里执行视图加载后的额外设置，通常来自 nib 文件\n    self.configureView()\n}\n\noverride func\
    \ viewWillAppear(animated: Bool) {\n    super.viewWillAppear(animated)\n    self.title\
    \ = self.project?.name\n    self.tableView.reloadData()\n}\n\noverride func didReceiveMemoryWarning()\
    \ {\n    super.didReceiveMemoryWarning()\n    // 释放任何可以重新创建的资源\n}\n\n//MARK: 表格视图\n\
    \noverride func numberOfSectionsInTableView(tableView: UITableView) -> Int {\n\
    \    return 1\n}\n\noverride func tableView(tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n    let result = self.project?.bugs.count\n    return\
    \ result!\n}\n\noverride func tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    DetailCell\") as UITableViewCell\n    self.configureCell(cell, atIndexPath: indexPath)\n\
    \    return cell\n}\n\nfunc configureCell(cell: UITableViewCell, atIndexPath indexPath:\
    \ NSIndexPath) {\n    let bug = sortedBugs()?[indexPath.row]\n    cell.textLabel.text\
    \ = bug?.title\n}\n\nfunc sortedBugs() -> [Bug]? {\n    let sortDescriptor = NSSortDescriptor(key:\
    \ \"title\", ascending: true)\n    let results = self.project?.bugs.sortedArrayUsingDescriptors([sortDescriptor])\n\
    \    return results as [Bug]?\n}\n```\n\n我们还必须在故事板中更新界面。打开故事板 `Main.storyboard`，然后选择详情视图。删除现有的\
    \ View 对象，并拖入一个 Table View 到视图上以替换它。将其 `dataSource` 和 `delegate` 属性连接到详情视图控制器。\n\
    \n接下来，在 Table View 上拖入一个 Table View Cell，在属性检查器中将其样式设置为 `Basic`，配件设置为 `Detail\
    \ Disclosure`。同时，将标识符设置为 `DetailCell`。Figure 5-7 展示了新的布局。\n\n![9781430260288_Fig05-07.jpg](img/9781430260288_Fig05-07.jpg)\n\
    \nFigure 5-7。带表格的详情视图\n\n更新 `MasterViewController.m` 或 `MasterViewController.swift`\
    \ 中的 `prepareForSegue:sender:` 方法，以获取选中的 `Project` 并将其设置到详情视图控制器上，如 Listing 5-49（Objective-C）和\
    \ Listing 5-50（Swift）所示。\n\n***Listing 5-49***。在 Segue 前设置 `project`（Objective-C）\n\
    \n```objc\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\
    \ {\n  if ([[segue identifier] isEqualToString:@\"showDetail\"]) {\n    NSIndexPath\
    \ *indexPath = [self.tableView indexPathForSelectedRow];\n    Project *project\
    \ = [[self fetchedResultsController] objectAtIndexPath:indexPath];\n    [[segue\
    \ destinationViewController] setProject:project];\n  }\n}\n```\n\n***Listing 5-50***。在\
    \ Segue 前设置 `project`（Swift）\n\n```swift\noverride func prepareForSegue(segue:\
    \ UIStoryboardSegue, sender: AnyObject?) {\n  var project : Project?\n  if segue.identifier\
    \ == \"showDetail\" {\n    if let indexPath = self.tableView.indexPathForSelectedRow()\
    \ {\n      project = self.fetchedResultsController.objectAtIndexPath(indexPath)\
    \ as? Project\n      (segue.destinationViewController as DetailViewController).project\
    \ = project\n    }\n  }\n}\n```\n\n你现在可以运行项目，甚至深入查看项目也不会崩溃。然而，由于没有添加 bug 的途径，你在详情视图中看不到任何\
    \ bug。在下一节中，我们将创建用于添加和编辑 bug 的屏幕。这个屏幕将模仿本章前面创建的添加和编辑项目屏幕。\n\n## 创建添加和编辑 Bug 屏幕\n\
    \n与添加和编辑项目屏幕类似，你必须创建一个能接受输入的屏幕，用于添加 bug 或编辑现有 bug。接下来的几个小节将引导你完成创建此屏幕的步骤。\n\n\
    ### 创建用于添加和编辑 Bug 的视图控制器\n"
- fmt: "Create a new Cocoa Touch Class file called `BugViewController` and make it\
    \ a subclass of `UIViewController`. Check the **Also create XIB file** check box,\
    \ select your language, and follow the prompts to create the file. Open `BugViewController.h`\
    \ or `BugViewController.swift` and add the following:\n\n- A property for the\
    \ `Bug` to edit (note: will be `nil` when adding a `Bug`)\n- A property for the\
    \ parent `Project`\n- An outlet for the bug title text field (note that we call\
    \ it `bugTitle` to avoid clash with existing `title` property of `UIViewController`)\n\
    - An outlet for the bug details text view\n- An initializer that takes a `Bug`\
    \ and a parent `Project`\n- An action to save the `Bug`\n- An action to cancel\
    \ adding or editing\n\n[Listing 5-51](#9781430260288_Ch05.xhtml#list51) shows\
    \ the edited `BugViewController.h` file, and [Listing 5-52](#9781430260288_Ch05.xhtml#list52)\
    \ shows the edited `BugViewController.swift` file.\n\n[***Listing 5-51***](#9781430260288_Ch05.xhtml#_list51).\
    \ `BugViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\n@class Bug;\n@class\
    \ Project;\n\n@interface BugViewController : UIViewController\n@property (strong,\
    \ nonatomic) Bug *bug;\n@property (strong, nonatomic) Project *project;\n@property\
    \ (weak, nonatomic) IBOutlet UITextField *bugTitle;\n@property (weak, nonatomic)\
    \ IBOutlet UITextView *details;\n\n- (id)initWithBug:(Bug *)bug project:(Project\
    \ *)project;\n- (IBAction)save:(id)sender;\n- (IBAction)cancel:(id)sender;\n\n\
    @end\n```\n\n[***Listing 5-52***](#9781430260288_Ch05.xhtml#_list52). `BugViewController.swift`\n\
    \n```\nimport UIKit\n\nclass BugViewController: UIViewController {\n    var project:\
    \ Project? = nil\n    var bug: Bug? = nil\n\n    @IBOutlet weak var bugTitle:\
    \ UITextField!\n    @IBOutlet weak var details: UITextView!\n    ...\n}\n```\n\
    \nIf you’re working with Objective-C, open `BugViewController.m` and import the\
    \ header files for `Project` and `Bug`, as [Listing 5-53](#9781430260288_Ch05.xhtml#list53)\
    \ shows. Then, add the new initializer to store the `bug` and `project` parameters,\
    \ as shown in [Listing 5-54](#9781430260288_Ch05.xhtml#list54). If you’re working\
    \ with Swift, add the initializer shown in [Listing 5-55](#9781430260288_Ch05.xhtml#list55)\
    \ to `BugViewController.swift`.\n\n[***Listing 5-53***](#9781430260288_Ch05.xhtml#_list53).\
    \ Adding the Imports\n\n```\n#import \"Project.h\"\n#import \"Bug.h\"\n```\n\n\
    [***Listing 5-54***](#9781430260288_Ch05.xhtml#_list54). The `initWithBug:project:`\
    \ Method\n\n```\n- (id)initWithBug:(Bug *)bug project:(Project *)project {\n \
    \   self = [super init];\n    if (self) {\n        self.bug = bug;\n        self.project\
    \ = project;\n    }\n    return self;\n}\n```\n\n[***Listing 5-55***](#9781430260288_Ch05.xhtml#_list55).\
    \ The `init` Function\n\n```\nconvenience init(project: Project, andBug bug: Bug?)\
    \ {\n    self.init(nibName: \"BugViewController\", bundle: nil)\n    self.project\
    \ = project\n    self.bug = bug\n}\n```\n\nIn the `viewWillAppear:` method, if\
    \ the `bug` property is non-`nil`, transfer the values from `bug` to the appropriate\
    \ text field and text view. Otherwise, clear out any text from the text view.\
    \ See [Listing 5-56](#9781430260288_Ch05.xhtml#list56) for the Objective-C version\
    \ and [Listing 5-57](#9781430260288_Ch05.xhtml#list57) for the Swift version.\n\
    \n[***Listing 5-56***](#9781430260288_Ch05.xhtml#_list56). The `viewWillAppear:`\
    \ Method (Objective-C)\n\n```\n- (void)viewWillAppear:(BOOL)animated {\n    [super\
    \ viewWillAppear:animated];\n    if (self.bug != nil) {\n        self.bugTitle.text\
    \ = self.bug.title;\n        self.details.text = self.bug.details;\n    } else\
    \ {\n        self.details.text = @\"\";\n    }\n}\n```\n\n[***Listing 5-57***](#9781430260288_Ch05.xhtml#_list57).\
    \ The `viewWillAppear:` Function (Swift)\n\n```\noverride func viewWillAppear(animated:\
    \ Bool) {\n    super.viewWillAppear(animated)\n\n    if let bug = self.bug {\n\
    \        self.bugTitle.text = bug.title\n        self.details.text = bug.details\n\
    \    } else {\n        self.details.text = \"\"\n    }\n}\n```\n\nAgain, the `cancel:`\
    \ method simply dismisses the modal window, as shown in [Listing 5-58](#9781430260288_Ch05.xhtml#list58)\
    \ (Objective-C) and [Listing 5-59](#9781430260288_Ch05.xhtml#list59) (Swift).\n\
    \n[***Listing 5-58***](#9781430260288_Ch05.xhtml#_list58). The `cancel:` Method\
    \ (Objective-C)\n\n```\n- (IBAction)cancel:(id)sender {\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\n[***Listing 5-59***](#9781430260288_Ch05.xhtml#_list59).\
    \ The `cancel:` Function (Swift)\n\n```\n@IBAction func cancel(sender: AnyObject)\
    \ {\n    self.dismissViewControllerAnimated(true, completion: nil)\n}\n```\n\n\
    In the `save:` method, you determine whether we’re adding a bug (`bug` is `nil`)\
    \ or editing an existing bug (`bug` is non-`nil`). Create a new `Bug` managed\
    \ object if adding, and then update the properties appropriately. Also, if you’re\
    \ doing this project in Swift, be sure to import Core Data appropriately:\n\n\
    ```\nimport CoreData // Swift\n```\n\n[Listing 5-60](#9781430260288_Ch05.xhtml#list60)\
    \ (Objective-C) and [Listing 5-61](#9781430260288_Ch05.xhtml#list61) (Swift) show\
    \ the `save:` method.\n\n[***Listing 5-60***](#9781430260288_Ch05.xhtml#_list60).\
    \ The `save:` Method (Objective-C)\n\n```\n- (IBAction)save:(id)sender {\n   \
    \ if (self.bug == nil) {\n        self.bug = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Bug\" inManagedObjectContext:self.project.managedObjectContext];\n    }\n\n  \
    \  self.bug.project = self.project;\n    self.bug.title = self.bugTitle.text;\n\
    \    self.bug.details = self.details.text;\n\n    // Save the context.\n    NSError\
    \ *error = nil;\n    if (![self.project.managedObjectContext save:&error]) {\n\
    \        // Replace this implementation with code to handle the error appropriately.\n\
    \        // abort() causes the application to generate a crash log and terminate.\
    \ You should not use this function in a shipping application, although it may\
    \ be useful during development.\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\n[***Listing 5-61***](#9781430260288_Ch05.xhtml#_list61).\
    \ The `save:` Function (Swift)\n\n```\n@IBAction func save(sender: AnyObject)\
    \ {\n    if let context = self.project?.managedObjectContext {\n        if bug\
    \ == nil {\n            self.bug = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Bug\", inManagedObjectContext: context) as? Bug\n        }\n\n        self.bug?.project\
    \ = self.project!\n        self.bug?.title = self.bugTitle.text\n        self.bug?.details\
    \ = self.details.text\n\n        var error: NSError? = nil\n        if context.hasChanges\
    \ && !context.save(&error) {\n            // Replace this implementation with\
    \ code to handle the error appropriately.\n            // abort() causes the application\
    \ to generate a crash log and terminate. You should not use this function in a\
    \ shipping application, although it may be useful during development.\n      \
    \      NSLog(\"Unresolved error \\(error), \\(error!.userInfo)\")\n          \
    \  abort()\n        }\n    }\n\n    self.dismissViewControllerAnimated(true, completion:\
    \ nil)\n}\n```\n\n## Creating the Screen for Adding and Editing a Bug\n\nOpen\
    \ `BugViewController.xib` and do the following:\n\n- Drag a Navigation Bar from\
    \ the Object Library to the top of the view, 20 pixels from the top.\n- Change\
    \ the bar’s title to **Bug**.\n- Drag two Bar Button Items to the Navigation Bar,\
    \ one in each corner, and change their titles to **Cancel** and **Save**, respectively.\n\
    - Connect the Bar Button Items to the `cancel:` and `save:` actions.\n- Drag two\
    \ Labels to the view and make one read **Title** and the other read **Details**.\n\
    - Drag a Text Field to the view and connect it to the `bugTitle` property.\n-\
    \ Drag a Text View to the view and connect it to the `details` property.\n- With\
    \ the View selected, select the “Resolve Auto Layout Issues” button and select\
    \ **Add Missing Constraints** in the **All Views in View** section.\n\nYour view\
    \ should match [Figure 5-8](#9781430260288_Ch05.xhtml#Fig8).\n\n![9781430260288_Fig05-08.jpg](images/9781430260288_Fig05-08.jpg)\n\
    \n[Figure 5-8](#9781430260288_Ch05.xhtml#_Fig8). The Add and Edit Bug screen\n\
    \n## Showing the Bug Screen for Adding a Bug"
