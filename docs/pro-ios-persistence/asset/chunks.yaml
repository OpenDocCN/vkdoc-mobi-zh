    \n## Dealing with Errors\n\nWhen you ask Xcode to generate a Core Data application\
    \ for you, it creates boilerplate code for every vital aspect of talking to your\
    \ Core Data persistent store. This code is more than adequate for setting up your\
    \ persistent store coordinator, your managed object context, and your managed\
    \ object model. In fact, if you go back to a non–Core Data project and add Core\
    \ Data support, you’ll do well to drop in the same code, just as Xcode generates\
    \ it, to manage Core Data interaction. The code is production-ready.\n\nThat is,\
    \ it is production-ready except in one aspect: error handling.\n\nThe Xcode-generated\
    \ code alerts you to this shortcoming with a comment that says the following:\n\
    \n```\n// Replace this implementation with code to handle the error appropriately.\n\
    // abort() causes the application to generate a crash log and terminate. You should\
    \ not use this function in a shipping application, although it may be useful during\
    \ development.\n```\n\nThe Xcode-generated implementation logs the error and aborts\
    \ the application, which is a decidedly unfriendly approach. All users see when\
    \ this happens is your application abruptly disappearing, without any clue as\
    \ to why. If this happens in a live application, you’ll get poor reviews and low\
    \ sales.\n\nHappily, however, you don’t have to fall into this trap of logging\
    \ and crashing. In this section, we explore strategies for handling errors in\
    \ Core Data. No one strategy is the best, but this section should spark ideas\
    \ for your specific applications and audiences and help you devise an error-handling\
    \ strategy that makes sense.\n\nErrors in Core Data can be divided into two major\
    \ categories.\n\n* Errors in normal Core Data operations\n* Validation errors\n\
    \nThe next sections discuss strategies for handling both types of errors.\n\n\
    ### Handling Core Data Operational Errors\n\nAll the examples in this book respond\
    \ to any Core Data errors using the default, Xcode-generated error-handling code,\
    \ dutifully outputting the error message to Xcode’s console and aborting the application.\
    \ This approach has two advantages.\n\n* It helps diagnose issues during development\
    \ and debugging.\n* It’s easy to implement.\n\nThese advantages help only you\
    \ as developer, however, and do nothing good for the application’s users. Before\
    \ you publicly release an application that uses Core Data, you should design and\
    \ implement a better strategy for responding to errors. The good news is that\
    \ the strategy needn’t be large or difficult to implement, because your options\
    \ for how to respond are limited. Although applications are all different, in\
    \ most cases you won’t be able to recover from a Core Data error and should probably\
    \ display an alert and instruct the user to close the application. Doing this\
    \ explains to users what happened and gives them control over when to terminate\
    \ the app. It’s not much control, but hey—it’s better than just having the app\
    \ disappear.\n\nVirtually all Core Data operational errors should be caught during\
    \ development, so careful testing of your app should prevent these scenarios.\n\
    \nCurrently, the BookStore app has user interface, albeit blank. We currently\
    \ load the Core Data stack when the application launches, before the user interface\
    \ displays. If we wait for the user interface to load before initializing Core\
    \ Data, however, we’ll have an easier time displaying an error message. Let’s\
    \ change the application to do that.\n\nIf you’re working with Objective-C, open\
    \ `ViewController.m` and add the imports and methods shown in [Listing 4-21](#9781430260288_Ch04.xhtml#list21).\
    \ If you’re working with Swift, open `ViewController.swift` and add the functions\
    \ that [Listing 4-22](#9781430260288_Ch04.xhtml#list22) shows."
