    \ weak) IBOutlet UITextView *results;\n@property (nonatomic, weak) IBOutlet UIPickerView\
    \ *testPicker;\n\n- (IBAction)runTest:(id)sender;\n\n@end\n```\n\nOpen `ViewController.m`\
