- fmt: "Theory and diagrams work well for gaining an understanding of how something\
    \ works, but actual working code cements the concepts into true comprehension.\
    \ We’ve talked about theory and seen a diagram; now, let’s see Core Data in practice.\
    \ In this section, we create an Xcode project that uses Core Data from its outset.\
    \ Later in this chapter, we show how to add Core Data to an existing project.\n\
    \nThis first application, not so imaginatively named `CoreDataApp`, stores `Person`\
    \ objects with a single attribute, `name`. It has a blank screen for an interface,\
    \ so you can’t interact with it. You run it, it creates data in an SQLite database,\
    \ and then we use the `sqlite3` command-line application to browse the database.\n\
    \n## Creating the Project\n\nLaunch Xcode and create a new single view application\
    \ project. Call it `CoreDataApp` and set the organization identifier to `book.persistence`.\
    \ Make sure the **Use Core Data** check box is checked, as shown in Figure 1-2,\
    \ and create and save the project. Throughout this book, we use Objective-C as\
    \ the primary language, but we include Swift versions of the listings as well.\n\
    \n![9781430260288_Fig01-02.jpg](images/9781430260288_Fig01-02.jpg)\n\nFigure 1-2.\
    \ Creating the `CoreDataApp` project\n\n## Touring the Core Data Components\n\n\
    By checking the **Use Core Data** check box, you’ve instructed Xcode to add the\
    \ Core Data framework to your project. If you selected Objective-C as the project\
    \ language, Xcode has added the Core Data header file, `CoreData/CoreData.h`,\
    \ to the project’s `AppDelegate.h` file. If you selected Swift as the language,\
    \ you’ll find the line `import CoreData` in the project’s `AppDelegate.swift`\
    \ file.\n\nYou’ve also told Xcode to create a model that will be loaded into an\
    \ `NSManagedObjectModel` instance in your application. To see this, expand the\
    \ `CoreDataApp` folder in Xcode’s Project Navigator. You should see an entry called\
    \ `CoreDataApp.xcdatamodeld`, which is a directory that contains the various artifacts\
    \ that make up the project’s data model. When we build the application, Xcode\
    \ will compile this to a directory called `CoreDataApp.momd` inside the application\
    \ bundle. This directory will contain the artifacts that `CoreDataApp` loads to\
    \ create the `NSManagedObjectModel` instance.\n\nFinally, you’ve told Xcode to\
    \ create properties in your application delegate class, `AppDelegate`, to materialize\
    \ the Core Data stack. Open the header file, `AppDelegate.h`, which should match\
    \ Listing 1-1.\n\n***Listing 1-1.*** `AppDelegate.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@property (readonly, strong,\
    \ nonatomic) NSManagedObjectContext *managedObjectContext;\n@property (readonly,\
    \ strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property (readonly,\
    \ strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \nYou should recognize the three Core Data properties: `managedObjectContext`,\
    \ `managedObjectModel`, and `persistentStoreCoordinator`. Xcode puts them all\
    \ in the application delegate class, which works fine, but application delegate\
    \ classes tend to grow to unwieldy sizes. When we add Core Data to an existing\
    \ project later in this chapter, we use a different approach that partitions the\
    \ Core Data stack to a different class.\n\nYou should also notice two methods\
    \ that Xcode has created to help us with Core Data interaction.\n\n```\n- (void)saveContext;\n\
    - (NSURL *)applicationDocumentsDirectory;\n```\n\nThe `saveContext` method gives\
    \ us a central location for saving the managed object context. We can save the\
    \ managed object context from anywhere in the code, of course, but having one\
    \ place to do the save allows us to do things like localize error handling. Chapter\
    \ 4 goes more in depth into error handling. Xcode has generated some default error\
    \ handling in the generated `saveContext` method that works well enough for now.\
    \ Ultimately, the `saveContext` method checks whether we have any changes floating\
    \ in the managed object context by calling its `hasChanges` method, and then calls\
    \ `save`.\n\nThe `applicationDocumentsDirectory` method returns, as you would\
    \ imagine, this application’s documents directory. The persistent store coordinator\
    \ calls this method to determine where on the file system to create the persistent\
    \ store.\n\nThe Swift version of the generated project doesn’t have a header file,\
    \ of course, but it has the same properties, as well as corresponding calls for\
    \ the method declarations we just examined (`saveContext` and `applicationDocumentsDirectory:`).\
    \ The source doesn’t group the properties for the Core Data stack together, but\
    \ if you read through `AppDelegate.swift`, you’ll find them, initialized using\
    \ closures (not shown here), as Listing 1-2 shows.\n\n***Listing 1-2.*** Core\
    \ Data properties in `AppDelegate.swift`\n\n```\nlazy var managedObjectModel:\
    \ NSManagedObjectModel\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\n\
    lazy var managedObjectContext: NSManagedObjectContext?\n```\n\n## Initializing\
    \ the Core Data Components\n\nXcode’s generated code for Core Data initializes\
    \ the Core Data stack lazily, when its components are first accessed. You can\
    \ certainly use this approach for all your Core Data applications, and for `CoreDataApp`\
    \ we’ll leave the default Xcode implementation. You also, however, can set up\
    \ your Core Data stack when your application launches. We also use that approach\
    \ in this book.\n\nThe Core Data stack for `CoreDataApp` initializes when you\
    \ first access the managed object context, materialized by the `managedObjectContext`\
    \ property. Listing 1-3 contains the code for `managedObjectContext`’s Objective-C\
    \ accessor, and Listing 1-4 shows the same accessor in Swift.\n\n***Listing 1-3.***\
    \ The Accessor for `managedObjectContext` in Objective-C\n\n```\n// Returns the\
    \ managed object context for the application.\n// If the context doesn't already\
    \ exist, it is created and bound to the persistent store coordinator for the application.\n\
    - (NSManagedObjectContext *)managedObjectContext\n{\n  if (_managedObjectContext\
    \ != nil) {\n    return _managedObjectContext;\n  }\n\n  NSPersistentStoreCoordinator\
    \ *coordinator = [self persistentStoreCoordinator];\n  if (coordinator != nil)\
    \ {\n    _managedObjectContext = [[NSManagedObjectContext alloc] init];\n    [_managedObjectContext\
    \ setPersistentStoreCoordinator:coordinator];\n  }\n  return _managedObjectContext;\n\
    }\n```\n\n***Listing 1-4.*** The Accessor for `managedObjectContext` in Swift\n\
    \n```\nlazy var managedObjectContext: NSManagedObjectContext? = {\n  // Returns\
    \ the managed object context for the application (which is already bound to the\
    \ persistent store coordinator for the application.) This property is optional\
    \ since there are legitimate error conditions that could cause the creation of\
    \ the context to fail.\n  let coordinator = self.persistentStoreCoordinator\n\
    \  if coordinator == nil {\n    return nil\n  }\n  var managedObjectContext =\
    \ NSManagedObjectContext()\n  managedObjectContext.persistentStoreCoordinator\
    \ = coordinator\n  return managedObjectContext\n}()\n```"
  raw: 'Theory and diagrams work well for gaining an understanding of how something
    works, but actual working code cements the concepts into true comprehension. We’ve
    talked about theory and seen a diagram; now, let’s see Core Data in practice.
    In this section, we create an Xcode project that uses Core Data from its outset.
    Later in this chapter, we show how to add Core Data to an existing project.


    This first application, not so imaginatively named CoreDataApp, stores `Person`
    objects with a single attribute, `name`. It has a blank screen for an interface,
    so you can’t interact with it. You run it, it creates data in an SQLite database,
    and then we use the `sqlite3` command-line application to browse the database.


    Creating the Project


    Launch Xcode and create a new single view application project. Call it CoreDataApp
    and set the organization identifier to `book.persistence`. Make sure the Use Core
    Data check box is checked, as shown in [Figure 1-2](#9781430260288_Ch01.xhtml#Fig2),
    and create and save the project. Throughout this book, we use Objective-C as the
    primary language, but we include Swift versions of the listings as well.


    ![9781430260288_Fig01-02.jpg](images/9781430260288_Fig01-02.jpg)


    [Figure 1-2](#9781430260288_Ch01.xhtml#_Fig2). Creating the CoreDataApp project


    Touring the Core Data Components


    By checking the Use Core Data check box, you’ve instructed Xcode to add the Core
    Data framework to your project. If you selected Objective-C as the project language,
    Xcode has added the Core Data header file, `CoreData/CoreData.h`, to the project’s
    `AppDelegate.h` file. If you selected Swift as the language, you’ll find the line
    `import CoreData` in the project’s `AppDelegate.swift` file.


    You’ve also told Xcode to create a model that will be loaded into an `NSManagedObjectModel`
    instance in your application. To see this, expand the CoreDataApp folder in Xcode’s
    Project Navigator. You should see an entry called `CoreDataApp.xcdatamodeld`,
    which is a directory that contains the various artifacts that make up the project’s
    data model. When we build the application, Xcode will compile this to a directory
    called `CoreDataApp.momd` inside the application bundle. This directory will contain
    the artifacts that CoreDataApp loads to create the `NSManagedObjectModel` instance.


    Finally, you’ve told Xcode to create properties in your application delegate class,
    `AppDelegate`, to materialize the Core Data stack. Open the header file, `AppDelegate.h`,
    which should match [Listing 1-1](#9781430260288_Ch01.xhtml#list1).


    [***Listing 1-1***](#9781430260288_Ch01.xhtml#_list1). `AppDelegate.h`


    ```

    #import <UIKit/UIKit.h>

    #import <CoreData/CoreData.h>


    @interface AppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;


    @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;

    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;

    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;


    - (void)saveContext;

    - (NSURL *)applicationDocumentsDirectory;


    @end

    ```


    You should recognize the three Core Data properties: `managedObjectContext`, `managedObjectModel`,
    and `persistentStoreCoordinator`. Xcode puts them all in the application delegate
    class, which works fine, but application delegate classes tend to grow to unwieldy
    sizes. When we add Core Data to an existing project later in this chapter, we
    use a different approach that partitions the Core Data stack to a different class.


    You should also notice two methods that Xcode has created to help us with Core
    Data interaction.


    ```

    - (void)saveContext;- (NSURL *)applicationDocumentsDirectory;

    ```


    The `saveContext` method gives us a central location for saving the managed object
    context. We can save the managed object context from anywhere in the code, of
    course, but having one place to do the save allows us to do things like localize
    error handling. [Chapter 4](#9781430260288_Ch04.xhtml) goes more in depth into
    error handling. Xcode has generated some default error handling in the generated
    `saveContext` method that works well enough for now. Ultimately, the `saveContext`
    method checks whether we have any changes floating in the managed object context
    by calling its `hasChanges` method, and then calls `save`.


    The `applicationDocumentsDirectory` method returns, as you would imagine, this
    application’s documents directory. The persistent store coordinator calls this
    method to determine where on the file system to create the persistent store.


    The Swift version of the generated project doesn’t have a header file, of course,
    but it has the same properties, as well as corresponding calls for the method
    declarations we just examined (`saveContext` and `applicationDocumentsDirectory:`).
    The source doesn’t group the properties for the Core Data stack together, but
    if you read through `AppDelegate.swift`, you’ll find them, initialized using closures
    (not shown here), as [Listing 1-2](#9781430260288_Ch01.xhtml#list2) shows.


    [***Listing 1-2***](#9781430260288_Ch01.xhtml#_list2). Core Data properties in
    `AppDelegate.swift`


    ```

    lazy var managedObjectModel: NSManagedObjectModel

    lazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?

    lazy var managedObjectContext: NSManagedObjectContext?

    ```


    Initializing the Core Data Components


    Xcode’s generated code for Core Data initializes the Core Data stack lazily, when
    its components are first accessed. You can certainly use this approach for all
    your Core Data applications, and for CoreDataApp we’ll leave the default Xcode
    implementation. You also, however, can set up your Core Data stack when your application
    launches. We also use that approach in this book.


    The Core Data stack for CoreDataApp initializes when you first access the managed
    object context, materialized by the `managedObjectContext` property. [Listing
    1-3](#9781430260288_Ch01.xhtml#list3) contains the code for `managedObjectContext`’s
    Objective-C accessor, and [Listing 1-4](#9781430260288_Ch01.xhtml#list4) shows
    the same accessor in Swift.


    [***Listing 1-3***](#9781430260288_Ch01.xhtml#_list3). The Accessor for `managedObjectContext
    in Objective-``C`


    ```

    // Returns the managed object context for the application.

    // If the context doesn''t already exist, it is created and bound to the persistent
    store coordinator for the application.

    - (NSManagedObjectContext *)managedObjectContext

    {

      if (_managedObjectContext != nil) {

        return _managedObjectContext;

      }


    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];

      if (coordinator != nil) {

        _managedObjectContext = [[NSManagedObjectContext alloc] init];

        [_managedObjectContext setPersistentStoreCoordinator:coordinator];

      }

      return _managedObjectContext;

    }

    ```


    [***Listing 1-4***](#9781430260288_Ch01.xhtml#_list4). The Accessor for `managedObjectContext`
    in Swift


    ```

    lazy var managedObjectContext: NSManagedObjectContext? = {

      // Returns the managed object context for the application (which is already
    bound to the persistent store coordinator for the application.) This property
    is optional since there are legitimate error conditions that could cause the creation
    of the context to fail.

      let coordinator = self.persistentStoreCoordinator

      if coordinator == nil {

        return nil

      }

      var managedObjectContext = NSManagedObjectContext()

      managedObjectContext.persistentStoreCoordinator = coordinator

      return managedObjectContext

    }()

    ```'
  trans: "\n理论与示意图固然能帮助理解事物的工作原理，但真正的代码实践才能将概念转化为扎实的理解。我们已经探讨了理论并看到了示意图，现在让我们看看 Core\
    \ Data 的实际应用。在本节中，我们将创建一个从一开始就使用 Core Data 的 Xcode 项目。本章稍后将展示如何向现有项目添加 Core Data。\n\
    \n第一个应用程序被命名为 `CoreDataApp`（这个名称没什么创意），它存储具有单个属性 `name` 的 `Person` 对象。该应用程序的界面为空白屏幕，因此你无法与其交互。运行它后，它会在\
    \ SQLite 数据库中创建数据，然后我们可以使用 `sqlite3` 命令行应用程序来浏览该数据库。\n\n## 创建项目\n\n启动 Xcode 并创建一个新的单视图应用程序项目。将其命名为\
    \ `CoreDataApp`，并将组织标识符设置为 `book.persistence`。确保勾选**使用 Core Data** 复选框，如图 1-2\
    \ 所示，然后创建并保存项目。在本书中，我们主要使用 Objective-C 作为主要语言，但也会提供 Swift 版本的代码清单。\n\n![9781430260288_Fig01-02.jpg](img/9781430260288_Fig01-02.jpg)\n\
    \n图 1-2. 创建 `CoreDataApp` 项目\n\n## 浏览 Core Data 组件\n\n通过勾选**使用 Core Data** 复选框，你已指示\
    \ Xcode 将 Core Data 框架添加到项目中。如果你选择 Objective-C 作为项目语言，Xcode 已将 Core Data 头文件 `CoreData/CoreData.h`\
    \ 添加到项目的 `AppDelegate.h` 文件中。如果你选择 Swift 作为语言，则会在项目的 `AppDelegate.swift` 文件中找到\
    \ `import CoreData` 这一行。\n\n你还指示 Xcode 创建一个模型，该模型将在你的应用程序中加载到 `NSManagedObjectModel`\
    \ 实例中。要查看此模型，请展开 Xcode 项目导航器中的 `CoreDataApp` 文件夹。你应该会看到一个名为 `CoreDataApp.xcdatamodeld`\
    \ 的条目，这是一个包含构成项目数据模型的各种工件的目录。当我们构建应用程序时，Xcode 会将其编译到应用程序包中名为 `CoreDataApp.momd`\
    \ 的目录中。该目录将包含 `CoreDataApp` 加载以创建 `NSManagedObjectModel` 实例所需的工件。\n\n最后，你已指示 Xcode\
    \ 在你的应用程序委托类 `AppDelegate` 中创建属性，以实例化 Core Data 堆栈。打开头文件 `AppDelegate.h`，其内容应与代码清单\
    \ 1-1 一致。\n\n***代码清单 1-1.*** `AppDelegate.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@property (readonly, strong,\
    \ nonatomic) NSManagedObjectContext *managedObjectContext;\n@property (readonly,\
    \ strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property (readonly,\
    \ strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \n你应该能认出这三个 Core Data 属性：`managedObjectContext`、`managedObjectModel` 和 `persistentStoreCoordinator`。Xcode\
    \ 将它们全部放在应用程序委托类中，这虽然可行，但应用程序委托类往往会变得庞大且难以维护。在本章稍后向现有项目添加 Core Data 时，我们将采用不同的方法，将\
    \ Core Data 堆栈拆分到另一个类中。\n\n你还应该注意到 Xcode 创建的两个用于辅助 Core Data 交互的方法。\n\n```\n-\
    \ (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n```\n\n`saveContext`\
    \ 方法为我们提供了一个保存托管对象上下文的中心位置。当然，我们可以从代码中的任何位置保存托管对象上下文，但有一个统一的保存位置可以让我们进行诸如本地化错误处理之类的操作。第\
    \ 4 章将更深入地探讨错误处理。Xcode 在生成的 `saveContext` 方法中生成了一些默认的错误处理，这些处理目前已经足够好用了。最终，`saveContext`\
    \ 方法会通过调用其 `hasChanges` 方法来检查托管对象上下文中是否有任何更改，然后调用 `save`。\n\n正如你所想的那样，`applicationDocumentsDirectory`\
    \ 方法会返回此应用程序的文档目录。持久化存储协调器会调用此方法来确定在文件系统上的哪个位置创建持久化存储。\n\n生成的项目的 Swift 版本当然没有头文件，但它具有相同的属性，以及我们刚刚讨论过的方法声明（`saveContext`\
    \ 和 `applicationDocumentsDirectory:`）的相应调用。源代码没有将 Core Data 堆栈的属性分组在一起，但如果你通读\
    \ `AppDelegate.swift`，你会找到它们，它们使用闭包（此处未显示）进行初始化，如代码清单 1-2 所示。\n\n***代码清单 1-2.***\
    \ `AppDelegate.swift` 中的 Core Data 属性\n\n```\nlazy var managedObjectModel: NSManagedObjectModel\n\
    lazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\nlazy var managedObjectContext:\
    \ NSManagedObjectContext?\n```\n\n## 初始化 Core Data 组件\n\nXcode 为 Core Data 生成的代码会延迟初始化\
    \ Core Data 堆栈，即在其组件首次被访问时才进行初始化。你当然可以在所有 Core Data 应用程序中使用这种方法，对于 `CoreDataApp`，我们将保留\
    \ Xcode 的默认实现。但是，你也可以在应用程序启动时设置 Core Data 堆栈。本书中也将使用这种方法。\n\n`CoreDataApp` 的 Core\
    \ Data 堆栈在你首次访问托管对象上下文（由 `managedObjectContext` 属性实例化）时进行初始化。代码清单 1-3 包含了 `managedObjectContext`\
    \ 的 Objective-C 访问器代码，代码清单 1-4 展示了相同的 Swift 版本访问器。\n\n***代码清单 1-3.*** Objective-C\
    \ 中 `managedObjectContext` 的访问器\n\n```\n// 返回应用程序的托管对象上下文。\n// 如果上下文不存在，则创建它并将其绑定到应用程序的持久化存储协调器。\n\
    - (NSManagedObjectContext *)managedObjectContext\n{\n  if (_managedObjectContext\
    \ != nil) {\n    return _managedObjectContext;\n  }\n\n  NSPersistentStoreCoordinator\
    \ *coordinator = [self persistentStoreCoordinator];\n  if (coordinator != nil)\
    \ {\n    _managedObjectContext = [[NSManagedObjectContext alloc] init];\n    [_managedObjectContext\
    \ setPersistentStoreCoordinator:coordinator];\n  }\n  return _managedObjectContext;\n\
    }\n```\n\n***代码清单 1-4.*** Swift 中 `managedObjectContext` 的访问器\n\n```\nlazy var\
    \ managedObjectContext: NSManagedObjectContext? = {\n  // 返回应用程序的托管对象上下文（已绑定到应用程序的持久化存储协调器）。此属性是可选的，因为存在合理的错误情况可能导致上下文的创建失败。\n\
    \  let coordinator = self.persistentStoreCoordinator\n  if coordinator == nil\
    \ {\n    return nil\n  }\n  var managedObjectContext = NSManagedObjectContext()\n\
    \  managedObjectContext.persistentStoreCoordinator = coordinator\n  return managedObjectContext\n\
    }()\n```\n"
- fmt: "As the comment generated by Xcode attests, the accessor checks to see whether\
    \ the `managedObjectContext` property (synthesized as `_managedObjectContext`)\
    \ has been created. If so, the accessor returns it. If not, it retrieves the `persistentStoreCoordinator`\
    \ property, allocates and initializes the managed object context, and sets its\
    \ persistent store coordinator to the retrieved `persistentStoreCoordinator`.\n\
    \nThe accessor for `persistentStoreCoordinator`, shown in [Listing 1-5](#9781430260288_Ch01.xhtml#list5)\
    \ (Objective-C) and [Listing 1-6](#9781430260288_Ch01.xhtml#list6) (Swift), does\
    \ its own lazy initialization. Note that we’ve removed the long comment about\
    \ error handling, which [Chapter 4](#9781430260288_Ch04.xhtml) covers. As you\
    \ can see, this code checks whether the `persistentStoreCoordinator` property\
    \ (synthesized as `_persistentStoreCoordinator`) has been created. If not, it\
    \ determines the URL (uniform resource locator) for the persistent store by tacking\
    \ the file name, `CoreDataApp.sqlite (or CoreDataAppSwift.sqlite)`, onto the directory\
    \ returned by the `applicationDocumentsDirectory` helper discussed earlier in\
    \ this chapter, and stores it in `storeURL`. It then allocates the `persistentStoreCoordinator`\
    \ property, initializes it with the managed object model returned by the `managedObjectModel`\
    \ accessor, and adds a persistent store that points to the URL created in `storeURL`.\n\
    \n[***Listing 1-5***](#9781430260288_Ch01.xhtml#_list5). The Objective-C Accessor\
    \ for `persistentStoreCoordinator`\n\n```\n// Returns the persistent store coordinator\
    \ for the application.\n// If the coordinator doesn't already exist, it is created\
    \ and the application's store added to it.\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n  if (_persistentStoreCoordinator != nil) {\n    return _persistentStoreCoordinator;\n\
    \  }\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    CoreDataApp.sqlite\"];\n\nNSError *error = nil;\n  _persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n    /* Comment\
    \ deleted */\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \    abort();\n  }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n[***Listing\
    \ 1-6***](#9781430260288_Ch01.xhtml#_list6). The Swift Accessor for `persistentStoreCoordinator`\n\
    \n```\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator? = {\n\
    \    // The persistent store coordinator for the application. This implementation\
    \ creates and return a coordinator, having added the store for the application\
    \ to it. This property is optional since there are legitimate error conditions\
    \ that could cause the creation of the store to fail.\n    // Create the coordinator\
    \ and store\n    var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:\
    \ self.managedObjectModel)\n    let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
    CoreDataAppSwift.sqlite\")\n    var error: NSError? = nil\n    var failureReason\
    \ = \"There was an error creating or loading the application's saved data.\"\n\
    \    if coordinator!.addPersistentStoreWithType(NSSQLiteStoreType, configuration:\
    \ nil, URL: url, options: nil, error: &error) == nil {\n        coordinator =\
    \ nil\n        // Report any error we got.\n        let dict = NSMutableDictionary()\n\
    \        dict[NSLocalizedDescriptionKey] = \"Failed to initialize the application's\
    \ saved data\"\n        dict[NSLocalizedFailureReasonErrorKey] = failureReason\n\
    \        dict[NSUnderlyingErrorKey] = error\n        error = NSError(domain: \"\
    YOUR_ERROR_DOMAIN\", code: 9999, userInfo: dict)\n        // Replace this with\
    \ code to handle the error appropriately.\n        // abort() causes the application\
    \ to generate a crash log and terminate. You should not use this function in a\
    \ shipping application, although it may be useful during development.\n      \
    \  NSLog(\"Unresolved error \\(error), \\(error!.userInfo)\")\n        abort()\n\
    \    }\n\nreturn coordinator\n}()\n```\n\nWe have one more piece of lazy initialization\
    \ to review, found in the accessor for `managedObjectModel` and shown in [Listing\
    \ 1-7](#9781430260288_Ch01.xhtml#list7) (Objective-C) and [Listing 1-8](#9781430260288_Ch01.xhtml#list8)\
    \ (Swift). This code, like the other accessors, returns the `managedObjectModel`\
    \ property (synthesized as `_managedObjectModel`) if it has been initialized.\
    \ Otherwise, the code initializes it by storing the URL for the compiled managed\
    \ object model, `CoreDataApp.momd` (`CoreDataAppSwift.momd`), in the `modelURL`\
    \ variable, allocating the `managedObjectModel` property, and initializing it\
    \ with the URL to the managed object model.\n\n[***Listing 1-7***](#9781430260288_Ch01.xhtml#_list7).\
    \ The Objective-C Accessor for `managedObjectModel`\n\n```\n// Returns the managed\
    \ object model for the application.\n// If the model doesn't already exist, it\
    \ is created from the application's model.\n- (NSManagedObjectModel *)managedObjectModel\n\
    {\n  if (_managedObjectModel != nil) {\n    return _managedObjectModel;\n  }\n\
    \  NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"CoreDataApp\" withExtension:@\"\
    momd\"];\n  _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n\
    \  return _managedObjectModel;\n}\n```\n\n[***Listing 1-8***](#9781430260288_Ch01.xhtml#_list8).\
    \ The Swift Accessor for `managedObjectModel`\n\n```\nlazy var managedObjectModel:\
    \ NSManagedObjectModel = {\n    // The managed object model for the application.\
    \ This property is not optional. It is a fatal error for the application not to\
    \ be able to find and load its model.\n    let modelURL = NSBundle.mainBundle().URLForResource(\"\
    CoreDataAppSwift\", withExtension: \"momd\")!\n    return NSManagedObjectModel(contentsOfURL:\
    \ modelURL)!\n}()\n```\n\nThe lazy-initialization approach works just fine and\
    \ ensures that all pieces of the Core Data stack get initialized when they’re\
    \ needed. Feel free to continue to use this approach in your Core Data–based applications.\
    \ The second application we build in this chapter, `PersistenceApp`, takes a different\
    \ approach: it contains all the Core Data interactions in a single class, `Persistence`,\
    \ that directly initializes the Core Data stack. Feel free to use either approach\
    \ in your Core Data applications.\n\n## Creating a Managed Object Model"
  raw: 'As the comment generated by Xcode attests, the accessor checks to see whether
    the `managedObjectContext` property (synthesized as `_managedObjectContext`) has
    been created. If so, the accessor returns it. If not, it retrieves the `persistentStoreCoordinator`
    property, allocates and initializes the managed object context, and sets its persistent
    store coordinator to the retrieved `persistentStoreCoordinator`.


    The accessor for `persistentStoreCoordinator`, shown in [Listing 1-5](#9781430260288_Ch01.xhtml#list5)
    (Objective-C) and [Listing 1-6](#9781430260288_Ch01.xhtml#list6) (Swift), does
    its own lazy initialization. Note that we’ve removed the long comment about error
    handling, which [Chapter 4](#9781430260288_Ch04.xhtml) covers. As you can see,
    this code checks whether the `persistentStoreCoordinator` property (synthesized
    as `_persistentStoreCoordinator`) has been created. If not, it determines the
    URL (uniform resource locator) for the persistent store by tacking the file name,
    `CoreDataApp.sqlite (or CoreDataAppSwift.sqlite)`, onto the directory returned
    by the `applicationDocumentsDirectory` helper discussed earlier in this chapter,
    and stores it in `storeURL`. It then allocates the `persistentStoreCoordinator`
    property, initializes it with the managed object model returned by the `managedObjectModel`
    accessor, and adds a persistent store that points to the URL created in `storeURL`.


    [***Listing 1-5***](#9781430260288_Ch01.xhtml#_list5). The Objective-C Accessor
    for `persistentStoreCoordinator`


    ```

    // Returns the persistent store coordinator for the application.

    // If the coordinator doesn''t already exist, it is created and the application''s
    store added to it.

    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator

    {

      if (_persistentStoreCoordinator != nil) {

        return _persistentStoreCoordinator;

      }

        NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"CoreDataApp.sqlite"];


    NSError *error = nil;

      _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];

      if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:nil error:&error]) {

        /* Comment deleted */

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

      }


    return _persistentStoreCoordinator;

    }

    ```


    [***Listing 1-6***](#9781430260288_Ch01.xhtml#_list6). The Swift Accessor for
    `persistentStoreCoordinator`


    ```

    lazy var persistentStoreCoordinator: NSPersistentStoreCoordinator? = {

        // The persistent store coordinator for the application. This implementation
    creates and return a coordinator, having added the store for the application to
    it. This property is optional since there are legitimate error conditions that
    could cause the creation of the store to fail.

        // Create the coordinator and store

        var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:
    self.managedObjectModel)

        let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent("CoreDataAppSwift.sqlite")

        var error: NSError? = nil

        var failureReason = "There was an error creating or loading the application''s
    saved data."

        if coordinator!.addPersistentStoreWithType(NSSQLiteStoreType, configuration:
    nil, URL: url, options: nil, error: &error) == nil {

            coordinator = nil

            // Report any error we got.

            let dict = NSMutableDictionary()

            dict[NSLocalizedDescriptionKey] = "Failed to initialize the application''s
    saved data"

            dict[NSLocalizedFailureReasonErrorKey] = failureReason

            dict[NSUnderlyingErrorKey] = error

            error = NSError(domain: "YOUR_ERROR_DOMAIN", code: 9999, userInfo: dict)

            // Replace this with code to handle the error appropriately.

            // abort() causes the application to generate a crash log and terminate.
    You should not use this function in a shipping application, although it may be
    useful during development.

            NSLog("Unresolved error \(error), \(error!.userInfo)")

            abort()

        }


    return coordinator

    }()

    ```


    We have one more piece of lazy initialization to review, found in the accessor
    for `managedObjectModel` and shown in [Listing 1-7](#9781430260288_Ch01.xhtml#list7)
    (Objective-C) and [Listing 1-8](#9781430260288_Ch01.xhtml#list8) (Swift). This
    code, like the other accessors, returns the `managedObjectModel` property (synthesized
    as `_managedObjectModel`) if it has been initialized. Otherwise, the code initializes
    it by storing the URL for the compiled managed object model, `CoreDataApp.momd`
    (`CoreDataAppSwift.momd`), in the `modelURL` variable, allocating the `managedObjectModel`
    property, and initializing it with the URL to the managed object model.


    [***Listing 1-7***](#9781430260288_Ch01.xhtml#_list7). The Objective-C Accessor
    for `managedObjectModel`


    ```

    // Returns the managed object model for the application.

    // If the model doesn''t already exist, it is created from the application''s
    model.

    - (NSManagedObjectModel *)managedObjectModel

    {

      if (_managedObjectModel != nil) {

        return _managedObjectModel;

      }

      NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"CoreDataApp" withExtension:@"momd"];

      _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];

      return _managedObjectModel;

    }

    ```


    [***Listing 1-8***](#9781430260288_Ch01.xhtml#_list8). The Swift Accessor for
    `managedObjectModel`


    ```

    lazy var managedObjectModel: NSManagedObjectModel = {

        // The managed object model for the application. This property is not optional.
    It is a fatal error for the application not to be able to find and load its model.

        let modelURL = NSBundle.mainBundle().URLForResource("CoreDataAppSwift", withExtension:
    "momd")!

        return NSManagedObjectModel(contentsOfURL: modelURL)!

    }()

    ```


    The lazy-initialization approach works just fine and ensures that all pieces of
    the Core Data stack get initialized when they’re needed. Feel free to continue
    to use this approach in your Core Data–based applications. The second application
    we build in this chapter, PersistenceApp, takes a different approach: it contains
    all the Core Data interactions in a single class, `Persistence`, that directly
    initializes the Core Data stack. Feel free to use either approach in your Core
    Data applications.


