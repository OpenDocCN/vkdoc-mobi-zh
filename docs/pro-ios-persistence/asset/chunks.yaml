    Add a BatchUpdate to your `tests` array, build and run the application, and run
    the BatchUpdate test. On our iPhone 6 Plus, the one-at-a-time update takes about
    0.07 seconds, while the batch update takes about 0.007 seconds. There are two
    things to notice.


    *   The batch update is about 10 times faster.

    *   The one-at-a-time update is still pretty fast.


    We updated only 500 objects in our test, which the pre-iOS 8 approach handled
    in a few hundredths of a second. This tells us that we probably shouldn’t do all
    updates through the batch route, since we’re forsaking the validation that Core
    Data gives us to squeeze out a little performance. Instead, we should save batch
    updates for when we truly need them: when we must update tens of thousands (or
    more) of objects.


    Analyzing Performance


    Although thinking things through before writing code and understanding the implications
    of things such as faulting, prefetching, and memory usage usually nets you solid
    code that performs well, you often need a nonbiased, objective opinion on how
    your application is performing. The least biased and most objective opinion on
    your application’s performance comes from the computer it’s running on, so asking
    your computer to measure the results of your application’s Core Data interaction
    provides essential insight for optimizing performance.


    Apple provides a tool called Instruments that allows you to measure several facets
    of an application, including Core Data–related items. This section shows how to
    use Instruments to measure the Core Data aspects of your application. We encourage
    you to explore the other measurements Instruments offers as well.


    Launching Instruments


    To launch Instruments and begin profiling your application, select Product ![image](images/arrow.jpg)
    Profile from the Xcode menu. This launches Instruments and displays a dialog asking
    you what you want to profile, as [Figure 9-8](#9781430260288_Ch09.xhtml#Fig8)
    shows.


    ![9781430260288_Fig09-08.jpg](images/9781430260288_Fig09-08.jpg)


    [Figure 9-8](#9781430260288_Ch09.xhtml#_Fig8). Instruments asking you to choose
    a template


    Select the Core Data template and click the Choose button. That opens the main
    Instruments window with the Core Data instruments in the left sidebar, as [Figure
    9-9](#9781430260288_Ch09.xhtml#Fig9) shows.


    ![9781430260288_Fig09-09.jpg](images/9781430260288_Fig09-09.jpg)


    [Figure 9-9](#9781430260288_Ch09.xhtml#_Fig9). The main Instruments window with
    the Core Data instruments


    Click the Record button at the top left of the Instruments window to launch the
    iOS Simulator (Instruments does not support profiling Core Data instruments on
    the device) and the PerformanceTuning application.


    Understanding the Results


    The Instruments window shows the Core Data measurements it’s tracking, which include
    the following:


    *   Core Data fetches

    *   Core Data cache misses

    *   Core Data saves


    Run any of the tests in the PerformanceTuning application—say, `Subquery`—and
    wait for the test to complete. When the test finishes, click the Stop button in
    the upper left of Instruments to stop the application and stop recording Core
    Data measurements. You can then review the results from your test to see information
    about saves, fetches, faults, and cache misses. You can save the results to the
    file system for further review by selecting File ![image](images/arrow.jpg) Save
    As from the menu. You reopen them in Instruments using the standard File ![image](images/arrow.jpg)
    Open menu item.


    [Figure 9-10](#9781430260288_Ch09.xhtml#Fig10) shows the Instruments window after
    running `Subquery`. As [Figure 9-10](#9781430260288_Ch09.xhtml#Fig10) shows, by
    selecting Core Data Fetches on the left, you can see the fetch counts and fetch
    durations, which are in microseconds, for the Core Data fetches. The code ran
    three fetch requests (Instruments lists the call for a fetch twice: once when
    the call starts and once when it finishes). The first request, which took 1,192
    microseconds, fetched 500 people, which you can tell from the fetch entity, Person,
    and the fetch count, 500.


    ![9781430260288_Fig09-10.jpg](images/9781430260288_Fig09-10.jpg)


    [Figure 9-10](#9781430260288_Ch09.xhtml#_Fig10). Results from `Subquery`


    You can see the call tree for the fetch request by changing the drop-down in the
    middle of the window from Event List to Call Tree. You can reduce the navigation
    depth required to see the calls in your application’s code by checking the box
    next to Hide System Libraries on the right of the window. [Figure 9-11](#9781430260288_Ch09.xhtml#Fig11)
    shows the call tree for the fetch request. Using the call tree, you can determine
    which parts of your code are fetching data from your Core Data store.


    ![9781430260288_Fig09-11.jpg](images/9781430260288_Fig09-11.jpg)


    [Figure 9-11](#9781430260288_Ch09.xhtml#_Fig11). The call tree for the fetch requests


    This is just a taste of what Instruments can do for you to help you determine
    how your application is using Core Data and how it can lead you to places where
    Core Data performance is slow enough to warrant optimization efforts. We encourage
    you to investigate the Instruments tool further, trying out the other Core Data
    instruments to see things like cache misses and saves so you can determine your
    application’s hot spots.


    Dealing with Multiple Threads


    There inevitably comes a time, when writing a non-trivial app, that you consider
    using multiple threads. Usually it is done for performance reasons—to offload
    tasks to the background—but the performance gains come at the expense of some
    complexity. This section shows you how to recognize some common problems that
    arise when using multiple threads with Core Data and how to solve them.


    Thread Safety


    Most of Apple’s application programming interfaces (APIs) aren’t thread safe unless
    they explicitly state that they are. Core Data, in true Apple fashion, is **not
    thread safe**. But what does this mean anyway? It means that the Core Data developers
    have not taken any precaution to ensure that your code won’t blow up if you let
    two threads share API resources. In our case, it means that you can’t safely share
    `NSManagedObject`, `NSManagedContext`, or any other Core Data object between threads.


    Instead of thinking the non-thread safety reflects a lack of care or quality,
    look at it as delegating responsibility. Apple preferred focusing on keeping things
    simple and on maximizing performance. They delegate the responsibility of managing
    thread safety to you, the developer, whenever you need it.


