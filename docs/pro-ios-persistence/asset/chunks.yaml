- fmt: '# Data Change Notifications


    By far the most useful notification is on data change. If you are displaying a
    book in your user interface and its title changes, you may want to the user interface
    to reflect this change. Since `NSManagedObject` is KVC compliant, all the usual
    principles of key-value observing (KVO) can be applied and notifications can be
    fired on data modifications. The KVO model is very simple and decentralized, with
    only two objects at play: the observer and the observed. The observer must be
    registered with the observed object and the observed object is responsible for
    firing notifications when its data change. The default implementation of `NSManagedObject`
    automatically handles the firing of notifications.


    ## Registering an Observer


    In order to receive change notifications, you must register the observer with
    the observed object using the `addObserver:forKeyPath:options:context:` method.
    The registration is valid for a given key path only, which means that it is valid
    only for the named attribute or relationship. The advantage is that it gives you
    a very fine level of control over which notifications fire.


    The options give you an even finer level of granularity by specifying what information
    you want to receive in your notifications. [Table 2-4](#9781430260288_Ch02.xhtml#Tab4)
    below shows the Objective-C options, which can be combined with a bitwise OR (for
    example, `NSKeyValueObservingOptionOld | NSKeyValueObservingOptionNew` to specify
    both old and new).


    [Table 2-4](#9781430260288_Ch02.xhtml#_Tab4). The Objective-C Notification Options


    | Option | Description |

    | --- | --- |

    | `NSKeyValueObservingOptionOld` | The change dictionary will contain the old
    value under the lookup key `NSKeyValueChangeOldKey` |

    | `NSKeyValueObservingOptionNew` | The change dictionary will contain the new
    value under the lookup key `NSKeyValueChangeNewKey` |


    The Swift versions of these options have briefer names, as [Table 2-5](#9781430260288_Ch02.xhtml#Tab5)
    shows. The keys in the change directory, however, remain the same.


    [Table 2-5](#9781430260288_Ch02.xhtml#_Tab5). The Swift Notification Options


    | Option | Description |

    | --- | --- |

    | `Old` | The change dictionary will contain the old value under the lookup key
    `NSKeyValueChangeOldKey` |

    | `New` | The change dictionary will contain the new value under the lookup key
    `NSKeyValueChangeNewKey` |


    Let’s register the app delegate to be an observer to title changes for the book
    named “The first book.” Open `AppDelegate.m` or `AppDelegate.swift` and edit `showExampleData`,
    returning to the simpler version that fetches the first book, as shown in [Listing
    2-29](#9781430260288_Ch02.xhtml#list29) (Objective-C) and [Listing 2-30](#9781430260288_Ch02.xhtml#list30)
    (Swift). While we’re in the method, after registering for event notification,
    we also change the book title to “The new title.”


    [***Listing 2-29***](#9781430260288_Ch02.xhtml#_list29). Registering for KVO in
    Objective-C


    ```

    - (void)showExampleData {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Book"];

      fetchRequest.predicate = [NSPredicate predicateWithFormat:@"title = ''The first
    book''"];


    NSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];

      for (Book *book in books) {

        NSLog(@"Title: %@, price: %.2f", book.title, book.price);


    // Register this object for KVO

        [book addObserver:self

               forKeyPath:@"title"

                  options:NSKeyValueObservingOptionOld | NSKeyValueObservingOptionNew

                  context:nil];

        book.title = @"The new title";

      }

    }

    ```


    [***Listing 2-30***](#9781430260288_Ch02.xhtml#_list30). Registering for KVO in
    Swift


    ```

    func showExampleData() {

      let fetchRequest = NSFetchRequest(entityName: "Book")

      fetchRequest.predicate = NSPredicate(format: "title=''The first book''")


    let books = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    nil)

      for book in books as [Book] {

        println(String(format: "Title: \(book.title), price: %.2f",  book.price))


    // Register this object for KVO

        book.addObserver(self, forKeyPath: "title", options: .Old | .New, context:
    nil)

        book.title = "The new title"

      }

    }

    ```


    Don’t build and run the application yet, however, as it will crash because you’ve
    registered to receive a notification, but you haven’t yet written code to handle
    the notification once you’ve received it. Read on to the next section to understand
    how to receive notifications you’ve registered for.


    ## Receiving the Notifications


    Registering to receive the change notifications is one thing. Actually receiving
    the notifications is another. To receive change notifications, you override the
    `observeValueForKeyPath:ofObject:change:context:` method in the observer class.
    Still in `AppDelegate.m` or `AppDelegate.swift`, add the method shown in [Listing
    2-31](#9781430260288_Ch02.xhtml#list31) (Objective-C) and [Listing 2-32](#9781430260288_Ch02.xhtml#list32)
    (Swift).


    [***Listing 2-31***](#9781430260288_Ch02.xhtml#_list31). Receiving the Change
    Notification (Objective-C)


    ```

    - (void)observeValueForKeyPath:(NSString *)keyPath

                          ofObject:(id)object

                            change:(NSDictionary *)change

                           context:(void *)context {

      NSLog(@"Changed value for %@: %@ -> %@", keyPath,

            [change objectForKey:NSKeyValueChangeOldKey],

            [change objectForKey:NSKeyValueChangeNewKey]);

    }

    ```


    [***Listing 2-32***](#9781430260288_Ch02.xhtml#_list32). Receiving the Change
    Notification (Swift)


    ```

    override func observeValueForKeyPath(keyPath: String,

      ofObject object: AnyObject,

      change: [NSObject : AnyObject],

      context: UnsafeMutablePointer<()>) {

      println("Changed value for \(keyPath): \(change[NSKeyValueChangeOldKey]!) ->
    \(change[NSKeyValueChangeNewKey]!)")

    }

    ```


    Run the application once again and you will get the following output, indicating
    that the title change notification has been received:


    ```

    Changed value for title: The first book -> The new title

    ```


    ## Conclusion


    For applications that depend on data, which means most applications, the importance
    of designing your data model correctly cannot be overstated. The Xcode data modeling
    tool provides a solid interface for designing and defining your data models, and
    throughout this chapter you have learned to navigate the many options available
    as you create entities, attributes, and relationships. Make sure to understand
    the implications of how you''ve configured your data model, so that your applications
    can run efficiently and correctly.


    In most cases, you should avoid options in your model that wrest control from
    Core Data and make you manage the consistency of the object graph yourself. Core
    Data will almost always do a better job of managing object graph consistency than
    you will. When you must take control, make sure to debug your solutions well to
    prevent application crashes or data corruption.


    While you can work with `NSManagedObject` directly, you will find that as you
    build larger applications, you will inevitably feel the need to use subclasses,
    as we discussed in this chapter, in order to keep your objects and their properties
    clearly delineated in code.


    In the next chapter, we take an in-depth look at building predicates for advanced
    queries.


    # Chapter 3: Advanced Querying


    Simple applications and simple data models can usually skate on simple queries
    to serve up the data specific to the applications’ requirements. Nontrivial applications,
    however, usually have more complex data models and more intricate requirements
    surrounding that data. To meet those application requirements and interact with
    the more complex data, you need more advanced approaches to querying your data.
    This chapter discusses advanced querying techniques for Core Data and will equip
    you with the requisite tools for extracting the data combinations you need for
    your data-rich applications.'
