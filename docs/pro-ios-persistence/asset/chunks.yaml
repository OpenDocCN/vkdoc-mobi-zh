  raw: 'Most of the classes we discuss in this chapter aren’t tied to Core Data but,
    rather, apply to any of the collection classes. You use `NSPredicate`, `NSExpression`,
    `NSSortDescriptor`, aggregation operators, functions, and the lot to filter any
    type of collection, not just Core Data result sets. Some classes, and some methods
    of these classes, in fact, apply only to general collections and don’t work with
    Core Data. Keep in mind, however, that once you have fetched a result set from
    Core Data, you have a standard `NSArray` collection that you can manipulate outside
    Core Data’s confines as you wish.


    Building WordList


    Whether you’re playing Words with Friends, Scrabble, or some other word game,
    you’ll find more success if you know the words that the game you’re playing allows.
    In this chapter, we build an application called WordList that downloads a popular
    word list from the Internet and runs various queries against it to demonstrate
    advanced queries. The application isn’t fancy—you can see the user interface (UI)
    in [Figure 3-1](#9781430260288_Ch03.xhtml#Fig1)—and it won’t guarantee victory
    or even improved scores. You may, however, learn a new word or two that you can
    play in your favorite word game and impress your friends.


    ![9781430260288_Fig03-01.jpg](images/9781430260288_Fig03-01.jpg)


    [Figure 3-1](#9781430260288_Ch03.xhtml#_Fig1). The WordList application


    Creating the Application


    In Xcode, create a new project using the Single View Application template. Set
    the Product Name to WordList, select the language you’d like to use, uncheck Use
    Core Data (we’ll be adding it ourselves), and click Next to let Xcode go to work
    to create your project.


    Next, add Core Data to the WordList application by following the steps outlined
    previously.


    *   Add an @import CoreData (Objective-C) or import CoreData (Swift) directive
    wherever you need access to the Core Data classes.

    *   Add the WordList data model, `WordList.xcdatamodeld`.

    *   Add the `Persistence` class, which encapsulates WordList’s Core Data interaction.


    The header file for the Objective-C `Persistence` class, shown in [Listing 3-1](#9781430260288_Ch03.xhtml#list1),
    declares the properties and methods for realizing the Core Data stack. It should
    look familiar—you saw it first in Chapter 1’s `Persistence` class.


    [***Listing 3-1***](#9781430260288_Ch03.xhtml#_list1). `Persistence.h`


    ```

    @import CoreData;


    @interface Persistence : NSObject


    @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;

    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;

    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;


    - (void)saveContext;

    - (NSURL *)applicationDocumentsDirectory;


    @end

    ```


    [Listing 3-2](#9781430260288_Ch03.xhtml#list2) shows the Objective-C implementation
    file, `Persistence.m`.


    [***Listing 3-2***](#9781430260288_Ch03.xhtml#_list2). `Persistence.m`


    ```

    #import "Persistence.h"


    @implementation Persistence


    - (id)init

    {

      self = [super init];

      if (self != nil) {

        // Initialize the managed object model

        NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"WordList" withExtension:@"momd"];

        _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];


    // Initialize the persistent store coordinator

        NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"WordList.sqlite"];


    NSError *error = nil;

        _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:self.managedObjectModel];

        if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

                                                      configuration:nil

                                                                URL:storeURL

                                                            options:nil

                                                              error:&error]) {

          NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

          abort();

        }


    // Initialize the managed object context

        _managedObjectContext = [[NSManagedObjectContext alloc] init];

        [_managedObjectContext setPersistentStoreCoordinator:self.persistentStoreCoordinator];

      }

      return self;

    }


    #pragma mark - Helper Methods


    - (void)saveContext

    {

      NSError *error = nil;

      if ([self.managedObjectContext hasChanges] && ![self.managedObjectContext save:&error])
    {

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

      }

    }


    - (NSURL *)applicationDocumentsDirectory

    {

      return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory
    inDomains:NSUserDomainMask] lastObject];

    }


    @end

    ```


    Finally, [Listing 3-3](#9781430260288_Ch03.xhtml#list3) shows the Swift implementation,
    `Persistence.swift`. Notice that we sneak in an extension at the bottom of the
    file that we’ll later use to make formatting output simpler.


    [***Listing 3-3***](#9781430260288_Ch03.xhtml#_list3). `Persistence.swift`


    ```

    import Foundation

    import CoreData


    class Persistence: NSObject {


    var managedObjectContext: NSManagedObjectContext = {

        // Initialize the managed object model

        let modelURL = NSBundle.mainBundle().URLForResource("WordListSwift", withExtension:
    "momd")

        let managedObjectModel = NSManagedObjectModel(contentsOfURL: modelURL!)


    // Initialize the persistent store coordinator

        let storeURL = Persistence.applicationDocumentsDirectory.URLByAppendingPathComponent("WordListSwift.sqlite")

        var error: NSError? = nil

        let persistentStoreCoordinator = NSPersistentStoreCoordinator(managedObjectModel:
    managedObjectModel!)

        if persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,
    configuration: nil, URL: storeURL, options: nil, error: &error) == nil {

          abort()

        }


    // Initialize the managed object context

        var managedObjectContext = NSManagedObjectContext()

        managedObjectContext.persistentStoreCoordinator = persistentStoreCoordinator


    return managedObjectContext

      }()


    func saveContext() {

        var error: NSError? = nil

        let managedObjectContext = self.managedObjectContext

        if managedObjectContext != nil {

          if managedObjectContext.hasChanges && !managedObjectContext.save(&error)
    {

            abort()

          }

        }

      }


    class var applicationDocumentsDirectory: NSURL {

        let urls = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory,
    inDomains: .UserDomainMask)

        return urls[urls.endIndex-1] as NSURL

      }

    }


    extension Float {

        func format(f: String) -> String {

            return NSString(format: "%\(f)f", self)

        }

    }

    ```


    In your application delegate, `AppDelegate`, add a `Persistence` property and
    initialize the Core Data stack when WordList launches. For the Objective-C version,
    [Listing 3-4](#9781430260288_Ch03.xhtml#list4) shows the updated `AppDelegate.h`
    file, and [Listing 3-5](#9781430260288_Ch03.xhtml#list5) shows the updated `application:didFinishLaunchingWithOptions:`
    method in `AppDelegate.m`. Be sure to import `Persistence.h` at the top of `AppDelegate.m`.
    For the Swift version, see [Listing 3-6](#9781430260288_Ch03.xhtml#list6).


    [***Listing 3-4***](#9781430260288_Ch03.xhtml#_list4). `AppDelegate.h`


    ```

    #import <UIKit/UIKit.h>


    @class Persistence;


    @interface AppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;

    @property (strong, nonatomic) Persistence *persistence;


    @end

    ```'
