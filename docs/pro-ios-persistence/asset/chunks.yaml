    \ the seed and does not try to apply any updates. In all cases, the complete set\
    \ of seed data is available.\n\n## Undoing and Redoing\n\nGolfers call it a mulligan.\
    \ Schoolyard children call it a do-over. Computer users call it Edit and Undo.\
    \ Whatever you call it, you’ve realized that you’ve blundered and want to take\
    \ back your last action. Not all scenarios afford you that opportunity, to which\
    \ many broken-hearted lovers will attest, but Core Data forgives and allows you\
    \ to undo what you’ve done using the standard Cocoa `NSUndoManager` mechanism.\
    \ This section instructs you how to use it to allow your users to undo their Core\
    \ Data changes.\n\nThe Core Data undo manager, an object of type `NSUndoManager`,\
    \ lives in your managed object context, and `NSManagedObjectContext` provides\
    \ a getter and a setter for the undo manager. Unlike Core Data on Mac OS X, however,\
    \ the managed object context in iOS’s Core Data doesn’t provide an undo manager\
    \ by default for performance reasons. If you want to undo capabilities for your\
    \ Core Data objects, you must set the undo manager in your managed object context\
    \ yourself.\n\nIf you want to support undoing actions in your iOS application,\
    \ you typically create the undo manager when you set up your managed object context,\
    \ which usually happens in the getter for the managed object context. The BookStore\
    \ application, for example, sets up the managed object context in the application\
    \ delegate, as shown in [Listing 4-9](#9781430260288_Ch04.xhtml#list9) (Objective-C)\
    \ or [Listing 4-10](#9781430260288_Ch04.xhtml#list10) (Swift). Simply set the\
    \ undo manager there and you are all set.\n\n**[Listing 4-9](#9781430260288_Ch04.xhtml#_list9).\
    \ Setting up the Undo Manager (Objective-C)**\n\n```\n- (NSManagedObjectContext\
    \ *)managedObjectContext {\n  if (_managedObjectContext != nil) {\n    return\
    \ _managedObjectContext;\n  }\n\nNSPersistentStoreCoordinator *coordinator = [self\
    \ persistentStoreCoordinator];\n  if (!coordinator) {\n    return nil;\n  }\n\
    \  _managedObjectContext = [[NSManagedObjectContext alloc] init];\n [_managedObjectContext\
    \ setPersistentStoreCoordinator:coordinator];\n\n// Add the undo manager\n  [_managedObjectContext\
    \ setUndoManager:[[NSUndoManager alloc] init]];\n\nreturn _managedObjectContext;\n\
    }\n```\n\n**[Listing 4-10](#9781430260288_Ch04.xhtml#_list10). Setting up the\
    \ Undo Manager (Swift)**\n\n```\nlazy var managedObjectContext: NSManagedObjectContext?\
    \ = {\n    // Initialize the managed object model\n    let modelURL = NSBundle.mainBundle().URLForResource(\"\
    BookStoreSwift\", withExtension: \"momd\")\n    let managedObjectModel = NSManagedObjectModel(contentsOfURL:\
    \ modelURL!)\n\n// Initialize the persistent store coordinator\n    let storeURL\
    \ = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"BookStoreEnhancedSwift.sqlite\"\
    )\n    var error: NSError? = nil\n    let persistentStoreCoordinator = NSPersistentStoreCoordinator(managedObjectModel:\
    \ managedObjectModel!)\n\nif(persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
    \ configuration: nil, URL: storeURL, options: nil, error: &error) == nil) {\n\
    \        self.showCoreDataError()\n        return nil\n    }\n\nvar managedObjectContext\
    \ = NSManagedObjectContext()\n    managedObjectContext.persistentStoreCoordinator\
    \ = persistentStoreCoordinator\n\n// Add the undo manager\n    managedObjectContext.undoManager\
    \ = NSUndoManager()\n\nreturn managedObjectContext\n}()\n```\n\nOnce the undo\
    \ manager is set into the managed object context, it tracks any changes in the\
    \ managed object context and adds them to the undo stack. You can undo those changes\
    \ by calling the `undo` method of `NSUndoManager`, and each change (actually,\
    \ each undo group, as explained in the section “Undo Groups”) is rolled back from\
    \ the managed object context. You can also replay changes that have been undone\
    \ by calling `NSUndoManager`’s `redo` method.\n\nThe `undo` and `redo` methods\
    \ perform their magic only if the managed object context has any change to undo\
    \ or redo, so calling them when no changes can be undone or redone does nothing.\
    \ You can check, however, if the undo manager can undo or redo any changes by\
    \ calling the `canUndo` and `canRedo` methods, respectively.\n\n## Undo Groups\n\
    \nBy default, the undo manager groups all changes that happen during a single\
    \ pass through the application’s run loop into a single change that can be undone\
    \ or redone as a unit. This means, for example, that in the WordList application\
    \ of [Chapter 3](#9781430260288_Ch03.xhtml), all word creations belong to the\
    \ same group because they are all created during a for-loop without releasing\
    \ control of the thread until done.\n\nYou can alter this behavior by turning\
    \ off automatic grouping completely and managing the undo groups yourself. To\
    \ accomplish this, pass `NO` to `setGroupsByEvent`. You become responsible, then,\
    \ for creating all undo groups, because the undo manager will no longer create\
    \ them for you. You create the undo group by calling `beginUndoGrouping` to start\
    \ creating the group and `endUndoGrouping` to complete the undo group. These calls\
    \ must be matched, or an exception of type `NSInternalInconsistencyException`\
    \ is raised. You could, for example, create an undo group for each word creation\
    \ in WordList so that you can undo the creation one word at a time. The grouping\
    \ strategy depends largely on the specific requirements of your application.\n\
    \n## Limiting the Undo Stack\n\nBy default, the undo manager tracks an unlimited\
    \ number of changes for you to undo and redo. This can cause memory issues, especially\
    \ on iOS devices. You can limit the size of the undo stack by calling `NSUndoManager`’s\
    \ `setLevelsOfUndo:` method, passing an unsigned integer that represents the number\
    \ of undo groups to retain on the undo stack. You can inspect the current undo\
    \ stack size, measured in the number of undo groups, by calling `levelsOfUndo`,\
    \ which returns an unsigned integer. A value of 0 represents no limit. If you’ve\
    \ imposed a limit on the size of the undo stack, the oldest undo groups roll off\
    \ the stack to accommodate the newer groups.\n\n## Disabling Undo Tracking\n\n\
    Once you create an undo manager and set it into the managed object context, any\
    \ changes you make to the managed object context are tracked and can be undone.\
    \ You can disable undo tracking, however, by calling `NSUndoManager`’s `disableUndoRegistration`\
    \ method. To re-enable undo tracking, call `NSUndoManager`’s `enableUndoRegistration`\
    \ method. Disabling and enabling undo tracking use a reference counting mechanism,\
    \ so multiple calls to `disableUndoRegistration` require an equal number of calls\
    \ to `enableUndoRegistration` before undo tracking becomes enabled again."
