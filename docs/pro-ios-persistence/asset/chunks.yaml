- fmt: '# Performance Considerations in Core Data


    The rest of this chapter explains the various performance considerations imposed
    by Core Data on iOS and the devices it runs on. As you learn about these performance
    considerations, you’ll add tests to the `PerformanceTuning` application. Feel
    free to add your own tests as well so that you always give the users of your applications
    the best possible experience.


    ## Faulting


    When you run SQL queries against a database, you know the depth and range of the
    data you’re pulling. You know if you’re joining tables, you know the columns you’re
    pulling back, and, if you’re careful, you can limit the number of rows you yank
    from the database into working memory. You may have to work harder to get data
    than you do with Core Data, but you have more control. You know about how much
    memory you’re using to hold the data you fetch.


    With Core Data, however, you’ve given up some amount of control in exchange for
    ease of use. In the `PerformanceTuning` model, for example, each `Selfie` instance
    has a relationship to a collection of `Person` instances, which you access in
    an object-oriented, not a data-oriented, way. You don’t have to care whether Core
    Data pulls the `Person` data from the database when the application starts, when
    the `Selfie` loads, or when you first access the `Person` objects. Core Data cares,
    however, and attempts to delay loading data from the persistent store into the
    object graph until necessary, reducing both fetch time and memory usage. It does
    this using what’s termed “faults.”


    Think of a fault like a symlink on a Unix file system, which is not the actual
    file it points to nor does it contain the file’s data. The symlink represents
    the file, though, and when called upon can get to the file and its data, just
    as if it were the file itself. Like a symlink, a fault is a placeholder that can
    get to the persistent store’s data. A fault can represent either a managed object
    or, when it represents a to-many relationship, a collection of managed objects.
    As a link to or a shadow of the data, a fault occupies much less memory than the
    actual data do. See [Figure 9-5](#9781430260288_Ch09.xhtml#Fig5) for a depiction
    of a managed object and a fault. In this case, the managed object is an instance
    of `Selfie`, and the fault points to the related collection of `Person` objects.
    The `Selfie` is boldly depicted, representing the fact that it has been fetched
    from the persistent store and resides in memory. The `Person` objects, represented
    on the “to-many” side of the relationship, are faint and grayed out, because they
    haven’t been fetched from the persistent store and do not reside in memory.


    ![9781430260288_Fig09-05.jpg](images/9781430260288_Fig09-05.jpg)


    [Figure 9-5](#9781430260288_Ch09.xhtml#_Fig5). A selfie and its faulted people


    ## Firing Faults


    Core Data uses the term “firing faults” when it must pull the data from the persistent
    store that a fault points to and then put that data into memory. Core Data has
    “fired” off a request to fetch data from the data store, and the fault has been
    “fired” from its job to represent the actual data. You cause a fault to fire any
    time you request a managed object’s persistent data, whether through `valueForKey:`
    or through methods of a custom class that either return or access the object’s
    persistent data. Methods that access a managed object’s metadata and not any of
    the data stored in the persistent store don’t fire a fault. This means you can
    query a managed object’s class, hash, description, entity, and object ID, among
    other things, and not cause a fault to fire. For the complete list of which methods
    don’t fire a fault, see Apple’s documentation at `http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html`
    under the section “Faulting Behavior.”


    Explicitly asking a managed object for its persistent data causes a fault to fire,
    but so does calling any methods or constructs that access persistent data from
    a managed object. You can, for example, access a collection through a managed
    object’s relationships without causing a fault to fire. Sorting the collection,
    however, will fire a fault because any logical sorting will sort by some of the
    object’s persistent data. The test you build later in this section demonstrates
    this behavior.


    ## Faulting and Caching


    We fibbed a bit when we said that firing faults fetches data from the persistent
    store. That’s often true, but before Core Data treks all the way to the persistent
    store to retrieve data, it first checks its cache for the data it seeks. If Core
    Data finds its intended data in the cache, it pulls the data from cache and skips
    the longer trip to the persistent store. The sections “Caching” and “Expiring
    the Cache” discuss caching in more detail.


    ## Refaulting


    One way to take control of your application’s persistent data and memory use is
    to turn managed objects back into faults, thereby relinquishing the memory their
    data were occupying. You turn objects back into faults by calling the managed
    object context’s `refreshObject:mergeChanges:` method, passing the object you
    want to fault and `NO` for the `mergeChanges:` parameter. If, for example, I had
    a managed object called `foo` that I wanted to turn back into a fault, I would
    use code similar to the following:


    ```

    [context refreshObject:foo mergeChanges:NO]; // Objective-C

    context.refreshObject(foo, mergeChanges:false) // Swift

    ```


    After this call, `foo` is now a fault, and `[foo isFault]` (or `foo.fault` for
    Swift) returns `YES` (or `true` for Swift). Understanding the `mergeChanges` parameter
    is important. Passing `NO` or `false`, as the previous code does, throws away
    any changed data that has not yet been saved to the persistent store. Take care
    when doing this because you lose all data changes in this object you’re faulting,
    and all the objects to which the faulted object relates are released. If any of
    the relationships have changed and the context is then saved, your faulted object
    is out of sync with its relationships, and you have created data integrity issues
    in your persistent store.


    Passing `YES` or `true` for `mergeChanges` doesn’t fault the object. Instead,
    it reloads all the object’s persistent data from the persistent store (or the
    last cached state) and then reapplies any changes that existed before the call
    to `refreshObject:mergeChanges:` that have not yet been saved.


    When you turn a managed object into a fault, Core Data sends two messages to the
    managed object.


    - `willTurnIntoFault:` before the object faults

    - `didTurnIntoFault:` after the object faults


    If you have implemented custom classes for your managed objects, you can implement
    either or both of these methods in your classes to perform some action on the
    object. Suppose, for example, that your custom managed object performs an expensive
    calculation on some persistent values and caches the result, and you want to nullify
    that cached result if the values it depends on aren’t present. You could nullify
    the calculation in `didTurnIntoFault:`.


    ## Building the Faulting Test


    To test what you’ve learned about faulting in this section, build a test that
    will do the following:


    1. Retrieve the first selfie from the persistent store.

    2. Grab a social network from that selfie.

    3. Check whether the social network is a fault.

    4. Get the name of the social network.

    5. Check whether the social network is a fault.

    6. Turn the social network back into a fault.

    7. Check whether the social network is a fault.'
