    Adding an Event


    When you click the + button on the right of the navigation bar, the `insertNewObject:`
    method is called (as configured in the `viewDidLoad`) method. The `insertNewObject`
    method, shown in [Listing 5-11](#9781430260288_Ch05.xhtml#list11) (Objective-C)
    and [Listing 5-12](#9781430260288_Ch05.xhtml#list12) (Swift), does the following:


    1.  Gets the managed object context from `fetchedResultsController`.

    2.  Gets the entity from `fetchedResultsController`.

    3.  Inserts a new managed object of the appropriate entity type into the managed
    object context.

    4.  Configures the managed object.

    5.  Saves the managed object context.


    [***Listing 5-11***](#9781430260288_Ch05.xhtml#_list11). Inserting a New Object
    (Objective-C)


    ```

    - (void)insertNewObject:(id)sender {

      NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];

      NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]
    entity];

      NSManagedObject *newManagedObject = [NSEntityDescription insertNewObjectForEntityForName:[entity
    name] inManagedObjectContext:context];


    // If appropriate, configure the new managed object.

      // Normally you should use accessor methods, but using KVC here avoids the need
    to add a custom class to the template.

      [newManagedObject setValue:[NSDate date] forKey:@"timeStamp"];


    // Save the context.

      NSError *error = nil;

      if (![context save:&error]) {

        // Replace this implementation with code to handle the error appropriately.

        // abort() causes the application to generate a crash log and terminate. You
    should not use this function in a shipping application, although it may be useful
    during development.

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

      }

    }

    ```


    [***Listing 5-12***](#9781430260288_Ch05.xhtml#_list12). Inserting a New Object
    (Swift)


    ```

    func insertNewObject(sender: AnyObject) {

      let context = self.fetchedResultsController.managedObjectContext

      let entity = self.fetchedResultsController.fetchRequest.entity

      let newManagedObject = NSEntityDescription.insertNewObjectForEntityForName(entity.name,
    inManagedObjectContext: context) as NSManagedObject


    // If appropriate, configure the new managed object.

      // Normally you should use accessor methods, but using KVC here avoids the need
    to add a custom class to the template.

      newManagedObject.setValue(NSDate.date(), forKey: "timeStamp")


    // Save the context.

      var error: NSError? = nil

      if !context.save(&error) {

          // Replace this implementation with code to handle the error appropriately.

          // abort() causes the application to generate a crash log and terminate.
    You should not use this function in a shipping application, although it may be
    useful during development.

          //println("Unresolved error \(error), \(error.userInfo)")

          abort()

      }

    }

    ```


    Note that inserting a new object causes the `controllerWillChangeContent:` method
    from the `NSFetchedResultsControllerDelegate` to be called. Remember that the
    delegate for `fetchedResultsController` is the `MasterViewController` instance,
    which implements that method to tell its table view that updates are about to
    begin, as shown in [Listing 5-13](#9781430260288_Ch05.xhtml#list13) (Objective-C)
    and [Listing 5-14](#9781430260288_Ch05.xhtml#list14) (Swift).


    [***Listing 5-13***](#9781430260288_Ch05.xhtml#_list13). The `controllerWillChangeContent:`
    Method (Objective-C)


    ```

    - (void)controllerWillChangeContent:(NSFetchedResultsController *)controller {

      [self.tableView beginUpdates];

    }

    ```


    [***Listing 5-14***](#9781430260288_Ch05.xhtml#_list14). The `controllerWillChangeContent:`
    Method (Swift)


    ```

    func controllerWillChangeContent(controller: NSFetchedResultsController) {

        self.tableView.beginUpdates()

    }

    ```


    Next, another method from the `NSFetchedResultsControllerDelegate` protocol is
    called: `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath. MasterViewController`
    implements that method to animate the insertion of the row in the table, as shown
    in [Listing 5-15](#9781430260288_Ch05.xhtml#list15) (Objective-C) and [Listing
    5-16](#9781430260288_Ch05.xhtml#list16) (Swift). This method also handles animations
    for deleting or moving a row.


    [***Listing 5-15***](#9781430260288_Ch05.xhtml#_list15). Method Called When an
    Object Changes (Objective-C)


    ```

    - (void)controller:(NSFetchedResultsController *)controller didChangeObject:(id)anObject

           atIndexPath:(NSIndexPath *)indexPath forChangeType:(NSFetchedResultsChangeType)type

          newIndexPath:(NSIndexPath *)newIndexPath {

      UITableView *tableView = self.tableView;


    switch(type) {

        case NSFetchedResultsChangeInsert:

          [tableView insertRowsAtIndexPaths:@[newIndexPath] withRowAnimation:UITableViewRowAnimationFade];

          break;


    case NSFetchedResultsChangeDelete:       [tableView deleteRowsAtIndexPaths:@[indexPath]
    withRowAnimation:UITableViewRowAnimationFade];

          break;


    case NSFetchedResultsChangeUpdate:

          [self configureCell:[tableView cellForRowAtIndexPath:indexPath] atIndexPath:indexPath];

          break;


    case NSFetchedResultsChangeMove:

          [tableView deleteRowsAtIndexPaths:@[indexPath] withRowAnimation:UITableViewRowAnimationFade];

          [tableView insertRowsAtIndexPaths:@[newIndexPath] withRowAnimation:UITableViewRowAnimationFade];

          break;

      }

    }

    ```


    [***Listing 5-16***](#9781430260288_Ch05.xhtml#_list16). Method Called When an
    Object Changes (Swift)


    ```

    func controller(controller: NSFetchedResultsController, didChangeObject anObject:
    AnyObject, atIndexPath indexPath: NSIndexPath, forChangeType type: NSFetchedResultsChangeType,
    newIndexPath: NSIndexPath) {

        switch type {

            case .Insert:

                tableView.insertRowsAtIndexPaths([newIndexPath], withRowAnimation:
    .Fade)

            case .Delete:

                tableView.deleteRowsAtIndexPaths([indexPath], withRowAnimation: .Fade)

            case .Update:

                self.configureCell(tableView.cellForRowAtIndexPath(indexPath)!, atIndexPath:
    indexPath)

            case .Move:

                tableView.deleteRowsAtIndexPaths([indexPath], withRowAnimation: .Fade)

                tableView.insertRowsAtIndexPaths([newIndexPath], withRowAnimation:
    .Fade)

            default:

                return

        }

    }

    ```


    In the insertion case, the `NSFetchedResultsChangeInsert` section of the `switch`
    statement is called. This is how the table view updates to display the new `Event`
    managed object.'
  trans: "\n***列表 5-8***. 计算分区中的行数 (Swift)\n```\noverride func tableView(tableView:\
