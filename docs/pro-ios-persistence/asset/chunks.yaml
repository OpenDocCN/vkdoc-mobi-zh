    Using the Seed Store


    The first thing the app does when it starts, before executing any Core Data operations,
    is call the `initStore` method. This is exactly what we want because it’ll allow
    us to place our seed before Core Data initializes.


    Let’s add the `seed.sqlite` file to the project. From your `Desktop` folder drag
    the `seed.sqlite` file onto the Xcode project navigator. Typically, you want to
    add the file to the `Supporting Files` group to keep your project organized.


    When you drop the file into the `Supporting Files` group, Xcode gives you some
    options. Make sure you check `Copy items into destination group''s folder`. In
    the `Add to targets` section, make sure `BookStore` is checked as well.


    Your folder should look something like [Figure 4-1](#9781430260288_Ch04.xhtml#Fig1)
    (Objective-C) or [Figure 4-2](#9781430260288_Ch04.xhtml#Fig2) (Swift).


    ![9781430260288_Fig04-01.jpg](images/9781430260288_Fig04-01.jpg)


    [Figure 4-1](#9781430260288_Ch04.xhtml#_Fig1). Adding the `seed.sqlite` file to
    BookStore (Objective-C)


    ![9781430260288_Fig04-02.jpg](images/9781430260288_Fig04-02.jpg)


    [Figure 4-2](#9781430260288_Ch04.xhtml#_Fig2). Adding the `seed.sqlite` file to
    BookStore (Swift)


    Now we’re ready to create the initial seed. Change the implementation of the `initStore`
    method as shown in [Listing 4-3](#9781430260288_Ch04.xhtml#list3) (Objective-C)
    or [Listing 4-4](#9781430260288_Ch04.xhtml#list4) (Swift).


    [***Listing 4-3***](#9781430260288_Ch04.xhtml#_list3). Initial Seeding in Objective-C


    ```

    - (void)initStore {

      NSFileManager *fm = [NSFileManager defaultManager];


    NSString *seed = [[NSBundle mainBundle] pathForResource: @"seed" ofType: @"sqlite"];

      NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"BookStoreEnhanced.sqlite"];

      if (![fm fileExistsAtPath:[storeURL path]]) {

        NSLog(@"Using the original seed");

        NSError *error = nil;

        if (![fm copyItemAtPath:seed toPath:[storeURL path] error:&error]) {

          NSLog(@"Error seeding: %@", error);

          return;

        }


    NSLog(@"Store successfully initialized using the original seed");

      }

      else {

        NSLog(@"The original seed isn''t needed. There is already a backing store.");

      }

    }

    ```


    [***Listing 4-4***](#9781430260288_Ch04.xhtml#_list4). Initial Seeding in Swift


    ```

    func initStore() {

      let fm = NSFileManager.defaultManager()


    let seed = NSBundle.mainBundle().pathForResource("seed", ofType: "sqlite")

      if let seed = seed {

          let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent("BookStoreEnhancedSwift.sqlite")


    if !fm.fileExistsAtPath(storeURL.path!) {

              println("Using the original seed")

              var error: NSError? = nil

              if !fm.copyItemAtPath(seed, toPath: storeURL.path!, error: &error) {

                  println("Seeding error: \(error?.localizedDescription)")

                  return

              }

              println("Store successfully initialized using the original seed.")

          }

          else {

              println("The seed isn''t needed. There is already a backing store.")

          }

      }

      else {

          println("Could not find the seed.")

      }

    }

    ```


    Now you can launch the app. You’ll notice that even though we’ve removed all the
    hard-coded initialization code, your app will have data from the seed.


    The output should look something like the following:


    ```

    Using the original seed

    Store successfully initialized using the original seed

    Book fetched: The second book

    Title: The second book, price: 15.00

    Book fetched: The third book

    Title: The third book, price: 10.00

    Book fetched: The first book

    Title: The first book, price: 10.00

    ```


    If you quit and launch it again, you should get the following:


    ```

    The original seed isn''t needed. There is already a backing store.

    Book fetched: The second book

    Title: The second book, price: 15.00

    Book fetched: The third book

    Title: The third book, price: 10.00

    Book fetched: The first book

    Title: The first book, price: 10.00

    ```


    We are now at the point were we can create an original seed for your app and it
    populates the seed in a flash, even if you have hundreds of thousands of rows,
    because it does it by copying the whole file at once instead of manually inserting
    each row individually.


    If your seed data never change, you’re done! If on the other hand you want to
    update the seed in the future, keep on reading.


    Updating Seeded Data in Subsequent Releases


    Let’s assume we want to update our seed data with a fourth book. Whether users
    have been using your app for a while or they are getting introduced to the app
    directly from the latest version, they all need to be able to get that fourth
    book.


    There are two parts to keeping everything in working order. First, you need to
    update your `seed.sqlite` so that it contains all the seed data. Second, you need
    to make sure existing users get the additional data.


    Updating the Seed Data Store


    Let’s start with updating the seed. This is the easy part. In order to achieve
    this, all we have to do is add the new book, with code, into the current data
    store, and then use that as the new seed.


    Open `AppDelegate.m` or `AppDelegate.swift` and at the end of the `initStore`
    method, after all the seeding work, add the code in [Listing 4-5](#9781430260288_Ch04.xhtml#list5)
    (Objective-C) or [Listing 4-6](#9781430260288_Ch04.xhtml#list6) (Swift) to add
    the fourth book to one of the categories.


    [***Listing 4-5***](#9781430260288_Ch04.xhtml#_list5). Adding a Fourth Book to
    the Seed (Objective-C)


    ```

    - (void)initStore {

      ...


    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"BookCategory"];

      NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      Category *category = [categories lastObject];

      Book *book4 = [NSEntityDescription insertNewObjectForEntityForName:@"Book" inManagedObjectContext:self.managedObjectContext];

      book4.title = @"The fourth book";

      book4.price = 12;


    [category addBooks:[NSSet setWithObjects:book4, nil]];


    [self saveContext];

    }

    ```


    [***Listing 4-6***](#9781430260288_Ch04.xhtml#_list6). Adding a Fourth Book to
    the Seed (Swift)


    ```

    func initStore() {

      ...


    let fetchRequest = NSFetchRequest(entityName: "BookCategory")

      let categories = self.managedObjectContext?.executeFetchRequest(fetchRequest,
    error: nil)


    let category = categories?.last as BookCategory

      var book4 = NSEntityDescription.insertNewObjectForEntityForName("Book", inManagedObjectContext:
    self.managedObjectContext!) as Book

      book4.title = "The fourth book"

      book4.price = 12'
