    Improve Performance with Better Predicates


    Despite the year in the movie title *2001: A Space Odyssey*, we are still far
    away from our machines having the intelligence to respond with things like “I’m
    sorry, Dave. I’m afraid I can’t do that.” As of the time of writing this book,
    programmers still have to do a lot of hand-holding to walk their machines through
    the process of doing what they are asked to do. This means that how you write
    your code determines how efficient it will be. There are often multiple ways to
    retrieve the same data, but the solution you use can significantly alter the performance
    of your application.


    Using Faster Comparators


    Generally speaking, string comparators perform more slowly than primitive comparators.
    When predicates are compounded using an `OR` operator, it is always more efficient
    to put the primitive comparators first because if they resolve to `TRUE`, then
    the rest of the comparators don’t need to be evaluated. This is because “`TRUE
    OR` anything” is always true. A similar strategy can be used with `AND`-compounded
    predicates. In this case, if the first predicate fails, then the second will not
    be evaluated, because “`FALSE AND` anything” is always false.


    To validate this, add a new test to your performance test application called `Predicate`
    and make it conform to the `PerfTest` protocol. This test consists of two fetch
    requests, which retrieve the same objects using an `OR`-compounded predicate.
    In the first test, the string comparator `LIKE` is used before the primitive comparator.
    In the second test, the comparators are permuted. Run each test 1,000 times in
    order to get significant timings; each time through the loop, the cache is reset
    to keep a clean context. [Listing 9-41](#9781430260288_Ch09.xhtml#list41) shows
    `Predicate.m` and [Listing 9-42](#9781430260288_Ch09.xhtml#list42) shows `Predicate.swift`.


