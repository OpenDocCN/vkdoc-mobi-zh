    Showing the Detail


    You can find the last reference to `fetchedResultsController` in `MasterViewController`
    in the `prepareForSegue:sender:` method, which is called when you tap one of the
    rows in the Master view’s table. This implementation extracts the managed object
    from `fetchedResultsController` for the tapped row and hands it to the Detail
    view controller for display, as shown in [Listing 5-21](#9781430260288_Ch05.xhtml#list21)
    (Objective-C) and [Listing 5-22](#9781430260288_Ch05.xhtml#list22) (Swift).


    [***Listing 5-21***](#9781430260288_Ch05.xhtml#_list21). The `prepareForSegue:sender:`
    Method (Objective-C)


    ```

    - (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender {

      if ([[segue identifier] isEqualToString:@"showDetail"]) {

        NSIndexPath *indexPath = [self.tableView indexPathForSelectedRow];

        NSManagedObject *object = [[self fetchedResultsController] objectAtIndexPath:indexPath];

        [[segue destinationViewController] setDetailItem:object];  }

    }

    ```


