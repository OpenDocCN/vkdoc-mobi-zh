  raw: 'It’s a common reflex among some developers to just dismiss complexity if the
    damage doesn’t appear to be immediate. Maybe you’re thinking that your threads
    are well behaved and well trained, and they won’t fight over resources. Maybe
    you’re thinking your app is not very complex so it should be OK to toss Core Data
    objects across threads. Or, maybe you’re simply feeling lucky. If any of this
    is true, then this section is for you.


    Developers who have had to deal with live production applications over time often
    say that any scenario that can possibly happen will happen when the app is in
    the hands of real users. If two threads could potentially collide, they will.
    If you are not careful, you will have these concurrency problems. This section
    will show you how to recognize some of these problems.


    In order to demonstrate thread concurrency issues, we build a simple app that
    writes a lot of data and also reports progress. One thought you might have is
    that we could write some data, report status, write some more, report more status,
    and so on. It’s true, we could perform writing and reading in serial chunks, but
    this would significantly increase the amount of time it takes to write your data
    and therefore deteriorate the user experience. By using threads, we can perform
    these tasks in parallel and keep the UI responsive.


    Open Xcode and create a new application using the single-view application template.
    Call the application MultiThread. Our first step is to set up and initialize a
    Core Data stack. Create a new data model called `MultiThread.xcdatamodeld`. Add
    a single entity called `MyData` and give it a single attribute called `myValue`
    of type `Integer 16`. Your data model should match [Figure 9-12](#9781430260288_Ch09.xhtml#Fig12).


    ![9781430260288_Fig09-12.jpg](images/9781430260288_Fig09-12.jpg)


    [Figure 9-12](#9781430260288_Ch09.xhtml#_Fig12). The MultiThread data model


    For clarity, we create a class that contains the Core Data setup. Create a new
    class called `Persistence` (a subclass of `NSObject`) and make `Persistence.h`
    look as shown in [Listing 9-51](#9781430260288_Ch09.xhtml#list51).


    [***Listing 9-51***](#9781430260288_Ch09.xhtml#_list51). `Persistence.h`


    ```

    #import <Foundation/Foundation.h>

    @import CoreData;


    @interface Persistence : NSObject


    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;

    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;


    - (NSManagedObjectContext*)createManagedObjectContext;


    @end

    ```


    This header file should look familiar, although you might notice that, instead
    of a managed object context property, we have a method that creates a managed
    object context. We do this for threading purposes, which we explain later in this
    chapter.


    Next, open `Persistence.m` or `Persistence.swift` and implement the initialization
    in a manner similar to what we have done in previous chapters. [Listing 9-52](#9781430260288_Ch09.xhtml#list52)
    shows the Objective-C version and [Listing 9-53](#9781430260288_Ch09.xhtml#list53)
    shows the Swift version.


    [***Listing 9-52***](#9781430260288_Ch09.xhtml#_list52). `Persistence.m`


    ```

    - (instancetype)init {

      self = [super init];

      if (self != nil) {

        // Initialize the managed object model

        NSURL *modelURL = [[NSBundle mainBundle]

                URLForResource:@"MultiThread" withExtension:@"momd"];

        _managedObjectModel = [[NSManagedObjectModel alloc]

                initWithContentsOfURL:modelURL];


    // Initialize the persistent store coordinator

        NSURL *storeURL = [[self applicationDocumentsDirectory]

                URLByAppendingPathComponent:@"MultiThread.sqlite"];


    // Delete the existing store if it exists so we can also start fresh

        NSFileManager *fm = [NSFileManager defaultManager];

        [fm removeItemAtURL:storeURL error:nil];


    NSError *error = nil;

        _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]

                 initWithManagedObjectModel:self.managedObjectModel];

        if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

                                                       configuration:nil

                                                                 URL:storeURL

                                                             options:nil

                                                               error:&error]) {

          NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

          abort();

        }

      }

      return self;

    }


    - (NSURL *)applicationDocumentsDirectory {

      return [[[NSFileManager defaultManager]

            URLsForDirectory:NSDocumentDirectory

            inDomains:NSUserDomainMask] lastObject];

    }


    - (NSManagedObjectContext*)createManagedObjectContext {

      NSManagedObjectContext *managedObjectContext =

            [[NSManagedObjectContext alloc] init];

      [managedObjectContext

            setPersistentStoreCoordinator:self.persistentStoreCoordinator];


    return managedObjectContext;

    }


    @end

    ```


    [***Listing 9-53***](#9781430260288_Ch09.xhtml#_list53). `Persistence.swift`


    ```

    import Foundation

    import CoreData


    class Persistence {

        init() {

            println("Pretending to do a migration");

            NSThread.sleepForTimeInterval(10)

            println("Done with pretending...");

        }


    // MARK: - Core Data stack


    lazy var applicationDocumentsDirectory: NSURL = {

            // The directory the application uses to store the Core Data store file.
    This code uses a directory named "book.persistence.MultiThreadSwift" in the application''s
    documents Application Support directory.

            let urls = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory,
    inDomains: .UserDomainMask)

            return urls[urls.count-1] as NSURL

            }()


    lazy var managedObjectModel: NSManagedObjectModel = {

            // The managed object model for the application. This property is not
    optional. It is a fatal error for the application not to be able to find and load
    its model.

            let modelURL = NSBundle.mainBundle().URLForResource("MultiThreadSwift",
    withExtension: "momd")!

            return NSManagedObjectModel(contentsOfURL: modelURL)!

            }()


    lazy var persistentStoreCoordinator: NSPersistentStoreCoordinator? = {

            // The persistent store coordinator for the application. This implementation
    creates and return a coordinator, having added the store for the application to
    it. This property is optional since there are legitimate error conditions that
    could cause the creation of the store to fail.

            // Create the coordinator and store

            var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:
    self.managedObjectModel)

            let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent("MultiThreadSwift.sqlite")


    // Delete the existing store if it exists so we can also start fresh

            let fm = NSFileManager.defaultManager()

            fm.removeItemAtURL(url, error: nil)'
  trans: "\n某些开发者有一种常见本能：只要问题看起来不会立刻造成损害，就会直接忽略复杂性。也许你觉得自己的线程表现良好且训练有素，不会争抢资源。也许你认为自己的应用并不复杂，所以跨线程传递\
    \ Core Data 对象应该没问题。又或者，你只是单纯觉得自己运气好。如果你符合上述任何一种情况，那么这一节就是为你准备的。\n\n那些长期处理线上生产应用的开发者常说，只要应用真正到了用户手中，任何可能发生的情况都必然会发生。如果两个线程可能发生冲突，它们就一定会冲突。如果不加小心，你必然会遇到这些并发问题。本节将教你如何识别其中一些问题。\n\
    \n为了演示线程并发问题，我们构建了一个简单的应用，它既要写入大量数据，又要报告进度。你可能会想，我们可以先写一些数据，报告状态，再写一些，再报告状态，如此反复。确实，我们可以串行地分块执行写入和读取操作，但这会显著增加写入数据的时间，从而降低用户体验。通过使用线程，我们可以并行执行这些任务，同时保持\
    \ UI 的响应性。\n\n打开 Xcode，使用单视图应用模板创建一个新应用。将其命名为 `MultiThread`。第一步是设置并初始化一个 Core\
