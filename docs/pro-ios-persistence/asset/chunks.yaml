    # About the Authors


    ![9781430260288_unFigFM-01.jpg](images/9781430260288_unFigFM-01.jpg)


    **Michael Privat** is a senior developer at Availity, LLC, located in Jacksonville,
    Florida. He oversees the design and implementation of the various components that
    make up the transaction processing platform. He coauthored *Pro Core Data for
    iOS* (Apress, 2011) and *Beginning OS X Lion Apps Development* (Apress, 2011).
    He has published several iOS apps, including Ghostwriter Notes, Budget Tracker,
    and Fluid Notes. He earned an engineering degree in computer science from the
    University of Nice, France before joining MIT to do research on applied artificial
    intelligence. He currently lives in France with his wife, Kelly, and their children:
    Matthieu and Chloé.


    ![9781430260288_unFigFM-02.jpg](images/9781430260288_unFigFM-02.jpg)


    **Rob Warner** is a senior technical staff member for Availity, LLC, based in
    Jacksonville, Florida, where he works with various technologies to deliver solutions
    in the health care sector. He coauthored *Pro Core Data for iOS* (Apress, 2011),
    *Beginning OS X Lion Apps Development* (Apress, 2011), and *The Definitive Guide
    to SWT and JFace* (Apress, 2004); he blogs at `www.grailbox.com`. He earned his
    bachelor''s degree in English from Brigham Young University and is working on
    his master''s degree in computer science at Georgia Tech. He lives in Jacksonville,
    Florida, with his wife, Sherry, and their five children: Tyson, Jacob, Mallory,
    Camie, and Leila.


    # About the Technical Reviewers


    ![9781430260288_unFigFM-03.jpg](images/9781430260288_unFigFM-03.jpg)


    **Ron Natalie** has 35 years of experience developing large-scale applications
    in C, Objective-C, and C++ on Unix, OS X, and Windows. He has a degree in electrical
    engineering from the Johns Hopkins University and has taught professional courses
    in programming, network design, and computer security. He splits his time between
    Virginia and North Carolina with his wife, Margy.


    ![9781430260288_unFigFM-04.jpg](images/9781430260288_unFigFM-04.jpg)


    **Ethan Mateja** is a software engineer currently working as an iOS mobile architect
    for Ubiquiti Networks and providing private consulting support to a wide variety
    of clients. With 12 years of experience as a full stack engineer, Ethan''s experience
    spans writing server-side software for the U.S. Department of Defense to significant
    mobile projects with Actian Inc, Paypal, Salesforce, and other Bay Area startups.
    As a husband and father of two, Ethan enjoys living in the heart of the San Mateo
    County redwoods where his passion for discovery and wonder of nature are a part
    of daily life. Citing his natural surroundings as an inspiration for his love
    of problem solving, Ethan regularly embraces long hikes in the woods to ponder
    the most impenetrable engineering challenges.


    # Acknowledgments


    Writing a book is a time-consuming effort that takes a lot of time away from the
    family. It''s a sacrifice that my wife, Kelly, and my two children, Matthieu and
    Chloé, allowed me to make with the promise to catch up once the project is complete.
    I am very grateful for their patience and for allowing me to finish this project.
    I am now realizing that the catching up time has come and I am very excited about
    that. With every edition we get new readers who don''t hesitate to let us know
    what they liked or disliked, and what they would like to see in the next edition.
    I am grateful for all the passion some exhibit when talking about this book, and
    I am also grateful for all those who bring their ideas to help us improve with
    each edition. A project like this often seems overwhelming at first. The more
    we think through the chapters, decide how to organize them, and conjecture about
    everything that needs to be said, the more we get the feeling we''ve stretched
    ourselves very thin. But the amazing Apress team has been there for us the whole
    way. They really took a lot of the weight off our shoulders by providing guidance,
    by helping organize our work, and by providing the collaborative tools we needed.
    They are truly a next-generation publishing company. This book would not exist
    without the support of Availity, the company I work for. Everyone from leadership,
    including Trent Gavazzi, Mary Anne Orenchuk, Jack Hunt, and Steve Vaughn, often
    came to check on how the book was going. Some of our engineers also liked offering
    suggestions and voicing their support: Rob McGuinness, Ed McNeil, Herve Devos,
    Kelly Burton. They are all great to work with and I thank them all for their support.'
