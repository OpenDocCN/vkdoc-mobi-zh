    Initializing the Stack on a Different Thread


    It’s a good practice to consider initializing your Core Data stack on a thread
    other than the main thread. While initializing Core Data is typically fast, you
    will find that it may take a long time in some cases, especially if there is a
    large store migration involved. If you initialize in `application:didFinishLaunchingWithOptions:`
    and it takes a while, the app will crash. If you initialized in a controller like
    we did, the UI will become unresponsive. Either way, it’s bad. For this reason,
    we encourage you to consider initializing on a different thread.


    Let’s put all of this into practice with our MultiThread app. First, we’ll simulate
    a long start by adding a 10-second pause. Open `Persistence.m` or `Persistence.swift`
    and add the code shown in [Listing 9-70](#9781430260288_Ch09.xhtml#list70) to
    the end of the `if` block in the `init` method (Objective-C), or create the `init`
    method shown in [Listing 9-71](#9781430260288_Ch09.xhtml#list71) (Swift).


    [***Listing 9-70***](#9781430260288_Ch09.xhtml#_list70). Faking a 10-Second Migration
    (Objective-C)


    ```

    NSLog(@"Pretending to do a migration");

    [NSThread sleepForTimeInterval:10];

    NSLog(@"Done with pretending...");

    ```


    [***Listing 9-71***](#9781430260288_Ch09.xhtml#_list71). Faking a 10-Second Migration
    (Swift)


    ```

    init() {

        println("Pretending to do a migration");

        NSThread.sleepForTimeInterval(10)

        println("Done with pretending...");

    }

    ```


    Now launch the app and notice how long the splash screen shows before the interface
    appears, leaving your user to wonder what might be happening.


    Let’s address this by launching the Core Data stack initialization on a different
    thread in the `initWithCoder:` method of `ViewController` as shown in [Listing
    9-72](#9781430260288_Ch09.xhtml#list72) (Objective-C) or [Listing 9-73](#9781430260288_Ch09.xhtml#list73)
    (Swift).


    [***Listing 9-72***](#9781430260288_Ch09.xhtml#_list72). Initializing Core Data
    on a Separate Thread (Objective-C)


    ```

    - (instancetype)initWithCoder:(NSCoder *)aDecoder {

      self = [super initWithCoder:aDecoder];

      if(self) {

        [self addObserver:self forKeyPath:@"managedObjectContext" options:NSKeyValueObservingOptionNew
    context:NULL];


    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),
    ^{

          self.persistence = [[Persistence alloc] init];

          dispatch_async(dispatch_get_main_queue(), ^{

            self.managedObjectContext = [self.persistence createManagedObjectContext];

          });

        });

      }


    return self;

    }

    ```


