  trans: '

    # 排版后内容


    你可以用最直观的用户界面创建应用程序，让它们执行用户离不开的任务，但如果你没有正确地对数据进行建模，你的应用程序将变得难以维护、性能低下，甚至可能无法使用。本章将解释如何对数据进行建模，以支撑而非破坏你的应用程序。


    在上一章中，你使用 Xcode 的空应用程序模板构建了一个简单的 iOS 应用程序。本章中，我们将对一个书店进行建模，并构建一个应用程序来存储关于我们现有书籍的信息。与上一章相同，我们暂不构建任何用户界面代码，继续将重点放在
    Core Data 上。


    ## 设计你的数据库


    美国哲学家拉尔夫·沃尔多·爱默生曾说过：“愚蠢的一致性是小心眼儿的小妖精。”人们经常引用这句话来为自己的粗心大意或对细节的忽视辩护。我们希望我们不会陷入这种陷阱——当我们前后矛盾地在声称
    Core Data 不是数据库和把它当作数据库之间摇摆不定时。本节将讨论如何设计你的数据结构，并将这个过程类比为对关系数据库进行建模，这不仅极大地有助于讨论，也有助于最终的设计。然而，如同所有的类比一样，这种类比在某些地方会失效，我们将在整个讨论中指出这些地方。


    Core Data 的实体描述在外观、行为、感觉和特性上都与关系数据库中的表极其相似。属性看起来像表中的列，关系感觉像是基于主键和外键的连接，而实体则如同表中的行。如果你的模型位于
    SQLite 持久化存储之上，Core Data 实际上会将实体描述、属性、关系和实体实现为你所期望的数据库结构。但请记住，你的数据也可以只存在于内存中，或者存在于某些没有表、行、列、主键和外键的平面文件原子存储中。Core
    Data 将数据结构从关系数据库结构中抽象出来，简化了你对数据的建模和交互方式。在你的心智模型中要接纳这种抽象，否则你会在 Core Data 模型中塞满冗余，与
    Core Data 背道而驰，并产生次优的数据结构。


    有数据建模经验的新手在接触 Core Data 时，常常抱怨缺少自增字段类型，他们认为自己负有像传统数据建模中那样为每个表定义主键的责任。Core Data
    没有自增类型，因为你根本不需要定义任何主键。Core Data 负责建立并维护每个托管对象的唯一性，无论它是否是表中的一行。


    没有主键也意味着没有外键；Core Data 管理实体（或表）之间的关系，并为你执行任何必要的连接操作。尽快克服因不定义主键和外键而产生的不适感，因为纠结于这个实现细节不值得你花费精力或感到焦虑。


    **提示**  在创建你的 Core Data 模型时，要记住一个经验法则：关注数据本身，而不是数据存储机制。


    ### 关系数据库规范化


    关系数据库理论推崇一个称为规范化的过程，用于设计数据模型。规范化的目标是减少或消除冗余，并提供对数据库内部数据的高效访问。规范化过程分为五个级别或范式，并且仍在继续研究第六范式。这五个范式的定义只有逻辑学家才会喜欢甚至理解；它们读起来像这样：


    *一个关系 R 处于第四范式（4NF），当且仅当，每当 R 中存在一个 MVD（多值依赖），例如 A -> -> B，那么 R 的所有属性也在函数上依赖于
    A。换句话说，R 中唯一的依赖（FDs 或 MVDs）都是 K -> X 的形式（即，从候选键 K 到其他属性 X 的函数依赖）。等价地：R 是 4NF，如果它属于
    BCNF，并且 R 中的所有 MVD 实际上都是 FD。*


    (`www.databasedesign-resource.com/normal-forms.html`)


    我们既没有足够的篇幅，也没有意愿逐一讲解每个范式的形式化定义并解释其含义。相反，本节将描述每个范式与 Core Data 的关系，并提供数据建模建议。请注意，遵守某个给定的范式需要先遵守其之前的所有范式。


    符合第一范式（1NF）的数据库被认为是规范化的。要达到这个规范化级别，数据库中的每一行必须具有相同数量的字段。对于 Core Data 模型来说，这意味着每个托管对象应该具有相同数量的属性。由于
    Core Data 不允许你在实体中创建可变数量的属性，因此你的 Core Data 模型会自动规范化。


    第二范式（2NF）和第三范式（3NF）处理非键字段与键字段之间的关系，规定非键字段应该是对它们所属的整个键字段的描述。由于你的 Core Data 模型没有键字段，你不应该遇到这些问题的困扰。然而，你应该确保给定实体的所有属性都描述该实体本身，而不是其他东西。例如，一个描述书籍类别的
    `Category` 实体不应该有 `author` 字段，因为作者描述的是书，而不是书所属的类别。


    接下来的两个范式，第四范式（4NF）和第五范式（5NF），在 Core Data 世界中可以被视为同一个范式。它们涉及减少或消除数据冗余，促使你将多值属性拆分到单独的实体中，并在实体之间创建对多关系。用
    Core Data 的术语来说，4NF 规定不应使用实体属性来存储多个值。相反，你应该将这些属性移到一个单独的实体中，并在实体之间创建一个对多关系。例如，考虑本章中我们在书店应用程序模型中的类别和书籍。一个会违反
    4NF 和 5NF 的模型会有一个单独的 `Category` 实体，并带有一个额外的 `book` 属性。然后我们会为每本书创建一个新的类别托管对象，这样就会产生多个冗余的
    `Category` 对象。相反，书店数据模型将包含一个 `Category` 实体和独立的 `Book` 实体。


    ### 构建一个简单模型


    在 Xcode 中创建一个新的单视图应用程序项目，这样我们就可以开始构建一个简单的模型。延续我们富有想象力的应用命名系列，将这个新应用程序命名为 `BookStore`，并将语言设置为你选择的语言，如图
    2-1 所示。


    ![9781430260288_Fig02-01.jpg](img/9781430260288_Fig02-01.jpg)


    图 2-1. 创建 `BookStore` 项目


    此时，你应该已经熟悉了第 1 章中描述的所有 Core Data 组件。找到 Xcode 创建的对象模型（名为 `BookStore.xcdatamodeld`）并打开它。正如预期，它是空的。


    **提示**  在第 1 章中，我们向你展示了如何保持应用程序委托没有 Core Data 初始化代码，并将其移到一个像 `Persistence` 这样的类中。你可以选择在本章中复制这种模式，或者保持
    Xcode 模板不变并继续操作。


    ### 实体

