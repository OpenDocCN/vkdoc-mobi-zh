    on the complexity of the data you’re modeling. Relationships allow you to tie
    entities together. Core Data allows you to tune the relationships you create to
    accurately reflect how your data relate to each other. Start with adding a `Book`
    entity to your model. At this point, leave it with no attributes until we figure
    out what needs to go there.


    In the BookStore application, you can see an obvious relationship between a category
    and the books it contains. For now, we will keep the problem reasonably simple
    by stating that a book can belong to only one category. Let’s reflect this relationship
    in the model.


    Select the `BookCategory` entity and in the Relationships section, click the +
    button. Xcode creates a new relationship for you to configure. Enter `books` for
    the name, and select `Book` as the destination, and leave the inverse blank for
    now. In the Data Model inspector tab in Xcode, change the type to To Many to indicate
    that this relationship will point to possibly multiple books. This is called a
    one-to-many relationship. [Figure 2-3](#9781430260288_Ch02.xhtml#Fig3) shows what
    the model looks like so far.


    ![9781430260288_Fig02-03.jpg](images/9781430260288_Fig02-03.jpg)


    [Figure 2-3](#9781430260288_Ch02.xhtml#_Fig3). A one-to-many relationship


    Leaving the Inverse field blank gives you compiler warnings. You can ignore these
    warnings and run your application without specifying an inverse relationship—after
    all, these are compiler warnings, not compiler errors—but you could face unexpected
    consequences. Core Data uses bidirectional relationship information to maintain
    the consistency of the object graph (hence the Consistency Error) and to manage
    undo and redo information. If you leave a relationship without an inverse, you
    imply that you will take care of the object graph consistency and undo/redo management.
    The Apple documentation strongly discourages this, however, especially in the
    case of a To-Many relationship. When you don’t specify an inverse relationship,
    the managed object at the other end of the relationship isn’t marked as changed
    when the managed object at this end of the relationship changes. Consider, for
    example, if a player object is deleted and it has no inverse relationship back
    to its team. Any optionality rules or delete rules aren’t enforced when the object
    graph is saved.


    In order to comply and help Core Data, add the inverse relationship—that is, for
    a given book, the category that it belongs to. Select the `Book` entity and add
    a new relationship. Set the name to `category`, the destination to `BookCategory`,
    and the inverse to `books`. If you go back to the `BookCategory` entity and select
    the `books` relationship, you will see that its inverse is now automatically set
    as well.


    Relationship Properties


    Let’s take a look at the options available for configuring relationships. Select
    the `books` relationship and open the Data Model inspector as shown in [Figure
    2-3](#9781430260288_Ch02.xhtml#Fig3).


    The first field, Name, becomes the name of the key `NSManagedObject` uses to reference
    the relationship. By convention, it’s the name of the referenced entity in lower
    case. In the case of a To Many relationship, the name field conventionally is
    pluralized. Note that these guidelines are conventions only, but you will make
    your data models more understandable, maintainable, and easier to work with if
    you follow them. You can see that the BookStore data model follows these conventions—in
    the `Book` entity, the relationship to the `BookCategory` entity is called `category`.
    In the `BookCategory` entity, the relationship to the `Book` entity, a To Many
    relationship, is called `books`.


    The Properties field has two options, both checkboxes, which you can set independently
    of each other. The first, Transient, allows you to specify that a relationship
    should not be saved to the persistent store. A transient relationship still has
    support for undo and redo operations, but it disappears when the application exits,
    giving the relationship the lifespan of a Hollywood marriage. Some possible uses
    for transient relationships include the following:


    *   Relationships between entities are temporal and shouldn’t survive beyond the
    current run of the application.

    *   Relationship information can be derived from some external source of data,
    whether another Core Data persistent store or some other source of information.


    In most cases, you’ll want your relationships to be persistent and you’ll leave
    the Transient checkbox unchecked.


    The second property checkbox, Optional, specifies whether this relationship requires
    a non-`nil` value. Think of this like a nullable vs. non-nullable column in a
    database. If you check the Optional checkbox, a managed object of this entity
    type can be saved to the persistent store without having anything specified for
    this relationship. If unchecked, however, saving the context will fail. If the
    `Book` entity in the data model for the BookStore application, for example, left
    this checkbox unchecked, every book entity would have to belong to a category.
    Setting the “category” value for a book to `nil` (or never setting it at all)
    would cause all calls to `save:` to fail with the following error description,
    “category is a required value.”


    We cover the next field, Delete Rule, in the section “Delete Rule.”


    The Type field has two options: To Many and To One. To One means that this relationship
    has exactly one managed object (or zero, depending on optionality settings) on
    each end of the relationship. For the BookStore application, making the `books`
    relationship on the `Category` entity a To One type would mean that only one book
    could exist in a given category, which would obviously be counterintuitive for
    a book category. If the entities were `Frame` and `Picture`, however, a To One
    type would make sense, as a frame typically has only one picture in it. Setting
    this field to To Many means the destination entity can have many managed objects
    that relate to each managed object instance of this entity type.


    The next field, Count, sets limits on the number of managed objects of the destination
    entity type that can relate to each managed object of this entity type, and has
    effect only if the type is set to To Many. You can specify values for Minimum
    and/or Maximum, and Core Data will enforce the rules you set. Note that you can
    set one without setting the other—you don’t have to set both. Exceeding the limits
    you set causes the `save:` operation to fail with a “Too many items” or a “Too
    few items” error message. Note that the Optional setting overrides the Minimum
    Count setting: if Optional is checked and Minimum Count is 1, saving the context
    when the relationship count is zero succeeds.


    Delete Rule'
  trans: "\n### 清单 2-3. 使用 `@objc` 属性为 Objective-C 重命名类\n\n```swift\nimport Foundation\n\
    import CoreData\n\n@objc(BookCategory)\nclass BookCategory: NSManagedObject {\n\
    \n    @NSManaged var name: String\n\n}\n```\n\n`@objc(name)` 属性会将类对 Objective-C\
    \ 类暴露的名称改为 `name`，因此我们可以指定模型所需的、不带命名空间的版本。\n\n现在，访问 `name` 属性比之前更简单、更熟悉：\n\n```objc\n\
    BookCategory *myCategory = ....\n// 获取 name 属性的当前值\nNSString *name = myCategory.name;\n\
    // 将 name 属性的值设置为 Magazines\nmyCategory.name = @\"Magazines\";\n```\n\n在 Swift\
    \ 中，代码如下所示：\n\n```swift\nvar myCategory = ....\n// 获取 name 属性的当前值\nvar name: AnyObject!\
    \ = myCategory.name\n// 将 name 属性的值设置为 Magazines\nmyCategory.name = \"Magazines\"\
    \n```\n\n## 关系\n\n在规范化数据模型时，根据所建模数据的复杂程度，你很可能会创建多个实体。关系让你能够将实体连接在一起。Core Data\
    \ 允许你调优所创建的关系，以准确反映数据之间的关联方式。首先，向模型中添加一个 `Book` 实体。此时，先不为其设置任何属性，我们先弄清楚该实体的内容。\n\
    \n在 BookStore 应用程序中，你可以看到类别与其所含书籍之间存在明显的关系。现在，我们将问题保持相对简单：假设一本书只能属于一个类别。让我们在模型中体现这种关系。\n\
    \n选中 `BookCategory` 实体，然后在“关系”部分点击 + 按钮。Xcode 会创建一个新的关系供你配置。将名称设为 `books`，将目标设为\
    \ `Book`，暂时留空反向关系。在 Xcode 的数据模型检查器标签页中，将类型改为“对多”，表示此关系可能指向多个书籍。这称为一对多关系。 图 2-3\
    \ 显示了当前模型的样子。\n\n![9781430260288_Fig02-03.jpg](img/9781430260288_Fig02-03.jpg)\n\
    \n**图 2-3.** 一对多关系\n\n如果留空`反向`字段，编译器会给出警告。你可以忽略这些警告，在不指定反向关系的情况下运行应用程序——毕竟这些是编译器警告，而非编译器错误——但你可能会遇到意外的后果。Core\
    \ Data 使用双向关系信息来维护对象图的一致性（因此会出现“一致性错误”），并管理撤销和重做信息。如果留下一个没有反向关系的关系，就意味着你要自行负责对象图的一致性和撤销/重做管理。然而，Apple\
    \ 文档强烈不鼓励这样做，尤其是在“对多”关系的情况下。当你不指定反向关系时，当此端的管理对象发生更改时，关系另一端的管理对象不会被标记为已更改。例如，假设一个玩家对象被删除，并且它没有指向其队伍的反向关系。当保存对象图时，任何可选性规则或删除规则都不会被强制执行。\n\
    \n为了遵守规范并帮助 Core Data，请添加反向关系——即，对于给定的书籍，它所属的类别。选中 `Book` 实体并添加一个新关系。将名称设为 `category`，目标设为\
    \ `BookCategory`，反向设为 `books`。如果你回到 `BookCategory` 实体并选中 `books` 关系，你会看到其反向关系现在也已自动设置。\n\
    \n## 关系属性\n\n让我们来看看配置关系时可用的选项。选中 `books` 关系，打开数据模型检查器，如图 2-3 所示。\n\n第一个字段“名称”，会成为\
    \ `NSManagedObject` 用来引用该关系的键名。按照惯例，它使用被引用实体的小写名称。对于“对多”关系，名称字段通常使用复数形式。请注意，这些指导方针只是惯例，但如果你遵循它们，你的数据模型将更易于理解、维护和操作。你可以看到\
    \ BookStore 数据模型遵循了这些惯例——在 `Book` 实体中，到 `BookCategory` 实体的关系被称为 `category`。在 `BookCategory`\
    \ 实体中，到 `Book` 实体的关系（一个对多关系）被称为 `books`。\n\n“属性”字段有两个选项，均为复选框，你可以独立设置它们。第一个是“瞬态”，允许你指定一个关系不应保存到持久化存储中。瞬态关系仍然支持撤销和重做操作，但在应用程序退出时消失，其生命周期如同好莱坞的婚姻一般短暂。瞬态关系的一些可能用途包括：\n\
    \n* 实体之间的关系是临时的，不应在当前应用程序运行之外继续存在。\n* 关系信息可以从某些外部数据源派生，无论是另一个 Core Data 持久化存储还是其他信息源。\n\
    \n在大多数情况下，你希望关系是持久的，并且会保持“瞬态”复选框为未选中状态。\n\n第二个属性复选框“可选”，指定此关系是否需要一个非 `nil` 的值。可以将其视为数据库中可空列与不可空列。如果勾选了“可选”复选框，此实体类型的管理对象可以在未为此关系指定任何内容的情况下保存到持久化存储中。但是，如果未勾选，保存上下文将失败。例如，如果\
    \ BookStore 应用程序数据模型中的 `Book` 实体未勾选此复选框，那么每个书籍实体都必须属于一个类别。将某本书的 `\"category\"\
    ` 值设置为 `nil`（或根本不设置）将导致所有对 `save:` 的调用失败，并出现错误描述：“category 是必需值。”\n\n下一个字段“删除规则”，我们将在下一节中介绍。\n\
    \n“类型”字段有两个选项：“对多”和“对一”。“对一”意味着此关系在关系的每一端都恰好有一个管理对象（或零个，取决于可选性设置）。对于 BookStore\
    \ 应用程序，如果将对 `Category` 实体的 `books` 关系设置为“对一”类型，则意味着给定类别中只能存在一本书，这显然对于书籍类别来说是反直觉的。但如果实体是\
    \ `Frame` 和 `Picture`，那么“对一”类型就有意义了，因为一个相框通常只包含一张照片。将此字段设置为“对多”意味着目标实体可以有多个管理对象，这些对象与当前实体类型的每个管理对象实例相关联。\n\
    \n下一个字段“计数”，用于限制可以与当前实体类型的每个管理对象相关联的目标实体类型的管理对象数量，并且仅在类型设置为“对多”时生效。你可以为“最小值”和/或“最大值”指定值，Core\
    \ Data 将强制执行你设置的规则。请注意，你可以只设置其中一个而不设置另一个——不必两者都设置。超出你设置的限制会导致 `save:` 操作失败，并显示“项目过多”或“项目过少”的错误消息。请注意，“可选”设置会覆盖“最小计数”设置：如果勾选了“可选”且“最小计数”为\
    \ 1，则在关系计数为零时保存上下文仍然成功。\n\n### 删除规则\n"
- fmt: '# The Delete Rule Setting


    The `Delete Rule` setting allows you to specify what happens if you try to delete
    a managed object of this entity type. [Table 2-3](#9781430260288_Ch02.xhtml#Tab3)
    lists the four possibilities and what they mean.


    [Table 2-3](#9781430260288_Ch02.xhtml#_Tab3). Delete Rule Options


    | Rule name | Description |

    | --- | --- |

    | Cascade | The source object is deleted and any related destination objects are
    also deleted. |

    | Deny | If the source object is related to any destination objects, the deletion
    request fails and nothing is deleted. |

    | Nullify | The source object is deleted and any related destination objects have
    their inverse relationships set to nil. |

    | No Action | The source object is deleted and nothing changes in any related
    destination objects. |


    Be careful how you set the `Delete Rule` for your relationships. In the `BookStore`
    application, for example, if you set the `Delete Rule` for the `books` relationship
    in the `BookCategory` entity to “Cascade,” deleting a category would delete all
    the books related to it. This is probably not what you want. If you set that rule
    to “Deny” and a category had any books in it, trying to delete the category would
    result in an error on any attempts to save the context with the message “category
    is not valid.” Setting the `Delete Rule` to “Nullify” would preserve the books
    in the persistent store, though they would no longer belong to any category.


    The “No Action” option represents another way, like not specifying an inverse
    relationship, that Core Data allows you to accept responsibility for managing
    object graph consistency. If you specify this value for the `Delete Rule`, Core
    Data allows you to delete the source object but pretends to the destination objects
    that the source object still exists. For the `BookStore` application, this would
    mean removing a category but still telling customers that the books they are looking
    for are available, but they are not in any category for the customers to browse.
    You won’t find many compelling reasons to use the “No Action” setting, except
    perhaps for performance reasons when you have many destination objects. [Chapter
    9](#9781430260288_Ch09.xhtml) discusses performance tuning with Core Data.


    # Ordered Properties


    The `Arrangement` field specifies whether Core Data should maintain the order
    in which entities are added to the relationship, and applies only to a To Many
    relationship. To maintain the order, you check the `Ordered` checkbox. In the
    case of the `BookStore` application, we don’t care about the order in which books
    are added to a category, so to see an example of an ordered relationship, create
    a `Page` entity and create a To Many relationship called `pages` from `Book` to
    `Page`. Obviously in the case of pages, we want to maintain the order, so set
    the `Arrangement` field of the `pages` relationship to Ordered by checking the
    checkbox in the relationship properties. Don’t forget to set the inverse relationship.


    The model should look as shown in [Figure 2-4](#9781430260288_Ch02.xhtml#Fig4).


    ![9781430260288_Fig02-04.jpg](images/9781430260288_Fig02-04.jpg)


    [Figure 2-4](#9781430260288_Ch02.xhtml#_Fig4). The BookStore model with three
    entities


    Refresh the custom objects by selecting all three entities in the model (click
    the first one and shift+click on the last one) and, in the Xcode menu, select
    Editor ![image](images/arrow.jpg) Create `NSManagedObject` Subclass… then follow
    the prompts until you can click Create. Xcode will ask you for permission to replace
    the existing `BookCategory` class. Click Replace and you should have three custom
    Core Data managed objects: `BookCategory`, `Book`, and `Page`. If you have chosen
    to generate these classes in Swift, don’t forget to either update the class names
    in the Core Data model to include the namespace (e.g., `BookStoreSwift.Book`),
    or to add the `@objc()` attribute to the class (e.g., `@objc(Book)`).


    Open `BookCategory.h` and note how the unordered relationship to books is represented
    as an `NSSet`.'
