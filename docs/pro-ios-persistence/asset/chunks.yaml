    Displaying a Project in the Table


    The cells in the table are currently configured to show `Event` objects. You must
    change them to show `Project` objects instead. In each cell, you want to display
    the project’s name and its URL. Tapping the project should drill down into its
    associated bugs, so you still want the disclosure indicator. You want to be able
    to edit the project’s name and URL as well, so when the Master view is in editing
    mode, you want to show the detail disclosure accessory.


    Additionally, you want to display the projects by hosting service, using the section
    names you configured in the fetched results controller. The following sections
    walk you through the changes.


    Updating the Table View Cell to Show Projects


    Open the storyboard file, `Main.storyboard`, and select the table view cell in
    the master screen. Select the Attributes inspector, and do the following:


    *   Change the Style to**Subtitle**.

    *   Change the Editing Acc. to**Detail Disclosure**.


    See [Figure 5-4](#9781430260288_Ch05.xhtml#Fig4) for the appropriate changes in
    the Attributes inspector.


    ![9781430260288_Fig05-04.jpg](images/9781430260288_Fig05-04.jpg)


    [Figure 5-4](#9781430260288_Ch05.xhtml#_Fig4). Configuring the attributes for
    the table view cell


    Now you can update the `configureCell:atIndexPath:` method to use a `Project`
    object instead of an `Event` object. If you’re building Objective-C, import the
    `Project` header file in `MasterViewController.m`.


    ```

    #import "Project.h" // Objective-C

    ```


    Now, update the cell to show the project’s name and its URL, as shown in [Listing
    5-25](#9781430260288_Ch05.xhtml#list25) (Objective-C) and [Listing 5-26](#9781430260288_Ch05.xhtml#list26)
    (Swift).


    [***Listing 5-25***](#9781430260288_Ch05.xhtml#_list25). The Updated `configureCell:atIndexPath:`
    Method (Objective-C)


    ```

    - (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath
    {

      Project *project = [self.fetchedResultsController objectAtIndexPath:indexPath];

      cell.textLabel.text = project.name;

      cell.detailTextLabel.text = project.url;

    }

    ```


    [***Listing 5-26***](#9781430260288_Ch05.xhtml#_list26). The Updated `configureCell:atIndexPath:`
    Function (Swift)


    ```

    func configureCell(cell: UITableViewCell, atIndexPath indexPath: NSIndexPath)
    {

      let project = self.fetchedResultsController.objectAtIndexPath(indexPath) as
    Project

      cell.textLabel.text = project.name

      cell.detailTextLabel?.text = project.url

    }

    ```


    Updating the Table to Group by Hosting Service


    Currently, the table style is **Plain**. To display sections, we must change it
    to **Grouped**, so open `Main.storyboard`, select the table, and show the Attributes
    inspector. Change the style to **Grouped**.


    Additionally, you must provide the names for the sections. Recall that the `NSFetchedResultsSectionInfo`
    protocol provides a `name` property that corresponds to the `sectionNameKeyPath`
    parameter used when creating a fetched results controller. We simply tell our
    table to use that value for section names, as shown in [Listing 5-27](#9781430260288_Ch05.xhtml#list27)
    (Objective-C) and [Listing 5-28](#9781430260288_Ch05.xhtml#list28) (Swift).


    [***Listing 5-27***](#9781430260288_Ch05.xhtml#_list27). Displaying Section Names
