- fmt: '# 排版后内容


    You can create applications with the most intuitive user interfaces that perform
    tasks users can’t live without, but if you don’t model your data correctly, your
    applications will become difficult to maintain, will underperform, and might even
    become unusable. This chapter explains how to model your data to support, not
    undermine, your applications.


    In the previous chapter, you’ve built a simple iOS application using Xcode’s Empty
    Application template. In this chapter, we model a bookstore and build an application
    to store information about the books we have. As in the previous chapter, we don’t
    build any user interface code yet, maintaining the focus on Core Data.


    ## Designing Your Database


    The American philosopher Ralph Waldo Emerson once said, “A foolish consistency
    is the hobgoblin of little minds.” People often wield that quote to defend carelessness
    or inattention to detail. We hope we’re not falling into that trap as we flip-flop
    inconsistently between claiming Core Data is not a database and treating it as
    if it were. This section discusses how to design your data structures, and likening
    this process to modeling a relational database greatly helps not only the discussion
    but also the resulting design. The analogy breaks down in spots, however, as all
    analogies do, and we point out those spots throughout this discussion.


    Core Data entity descriptions look, act, smell, and taste an awful lot like tables
    in a relational database. Attributes seem like columns in the tables, relationships
    feel like joins on primary and foreign keys, and entities appear like rows. If
    your model sits on a SQLite persistent store, Core Data actually realizes the
    entity descriptions, attributes, relationships, and entities as the database structures
    you’d expect. Remember, though, that your data can live in memory only or in some
    flat-file atomic store that has no tables or rows or columns or primary and foreign
    keys. Core Data abstracts the data structure from a relational database structure,
    simplifying both how you model and how you interact with your data. Allow for
    that abstraction in your mental model of how Core Data modeling works or you will
    fill your Core Data model with cruft, work against Core Data, and produce suboptimal
    data structures.


    Newcomers to Core Data who have data modeling experience decry the lack of an
    autoincrement field type, believing that they have the responsibility, as they
    do in traditional data modeling, to define a primary key for each table. Core
    Data has no autoincrement type because you don’t define any primary keys. Core
    Data assumes the responsibility to establish and maintain the uniqueness of each
    managed object, whether it’s a row in a table or not.


    Having no primary keys means having no foreign keys either; Core Data manages
    the relationships between entities, or tables, and performs any necessary joins
    for you. Get over the discomfort of not defining primary and foreign keys quickly,
    because agonizing over this implementation detail isn’t worth your effort or angst.


    **Tip**  Here’s a rule of thumb to remember as you create your Core Data models:
    worry about data, not data storage mechanisms.


    ### Relational Database Normalization


    Relational database theory espouses a process called normalization that’s used
    for designing a data model. Normalization aims to reduce or eliminate redundancy
    and provide efficient access to the data inside the database. The normalization
    process divides into five levels, or forms, and work continues on a sixth form.
    The five normal forms carry definitions only a logician can love, or perhaps even
    understand; they read something like the following:


    *A relation R is in fourth normal form (4NF) if and only if, wherever there exists
    an MVD in R, say A -> -> B, then all attributes of R are also functionally dependent
    on A. In other words, the only dependencies (FDs or MVDs) in R are of the form
    K -> X (i.e. a functional dependency from a candidate key K to some other attribute
    X). Equivalently: R is in 4NF if it is in BCNF and all MVD’s in R are in fact
    FDs.*


    (`www.databasedesign-resource.com/normal-forms.html`)


    We have neither sufficient pages in this book nor the inclination to walk through
    formal definitions for each of the normal forms and then explain what they mean.
    Instead, this section describes each of the normal forms in relation to Core Data
    and provides data modeling advice. Note that adherence to a given normal form
    requires adherence to all the normal forms that precede it.


    A database that conforms to first normal form (1NF) is considered normalized.
    To conform to this level of normalization, each row in the database must have
    the same number of fields. For a Core Data model, this means that each managed
    object should have the same number of attributes. Since Core Data doesn’t allow
    you to create variable numbers of attributes in your entities, your Core Data
    models are automatically normalized.


    Second normal form (2NF) and third normal form (3NF) deal with the relationships
    between non-key fields and key fields, dictating that non-key fields should be
    facts about the entire key field to which they belong. Since your Core Data model
    has no key fields, you shouldn’t run afoul of these concerns. You should, however,
    make sure that all the attributes for a given entity describe that entity, and
    not something else. For example, a `Category` entity that describes a category
    for books shouldn’t have an `author` field since the author describes a book,
    not the category the book belongs to.


    The next two normal forms, fourth normal form (4NF) and fifth normal form (5NF),
    can be considered the same form in the Core Data world. They deal with reducing
    or eliminating data redundancy, pushing you to move multiple-value attributes
    into separate entities and create to-many relationships between the entities.
    In Core Data terms, 4NF says that entity attributes shouldn’t be used to store
    multiple values. Instead, you should move these attributes to a separate entity
    and create a to-many relationship between the entities. Consider, for example,
    the categories and books in the model in the bookstore application we build in
    this chapter. A model that would violate 4NF and 5NF would have a single entity,
    `Category`, with an additional attribute, `book`. We would then create a new category
    managed object for each book, so that we’d have several redundant `Category` objects.
    Instead, the bookstore data model will include a `Category` entity and separate
    `Book` entities.


    ### Building a Simple Model


    Create a new single view application project in Xcode so we can start building
    a simple model. Pursuing our imaginative app naming series, name this new application
    `BookStore` and set the language to your choice as shown in [Figure 2-1](#9781430260288_Ch02.xhtml#Fig1).


    ![9781430260288_Fig02-01.jpg](images/9781430260288_Fig02-01.jpg)


    [Figure 2-1](#9781430260288_Ch02.xhtml#_Fig1). Creating the `BookStore` project


    At this time, you should already be familiar with all the Core Data components
    described in [Chapter 1](#9781430260288_Ch01.xhtml). Find the object model (named
    `BookStore.xcdatamodeld`) Xcode has created and open it. As expected, it is empty.


    **Tip**  In [Chapter 1](#9781430260288_Ch01.xhtml), we showed you how to keep
    your application delegate clean of Core Data initialization and move this over
    to a class like `Persistence`. It is your choice to replicate this pattern in
    this chapter or keep the Xcode template as is and continue.


