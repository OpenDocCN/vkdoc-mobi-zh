    won’t be able to delete or close bugs, for example—but you’ll be more proficient
    at integrating Core Data with your user interfaces (UIs).


    Displaying Table Data with NSFetchedResultController


    From the iPhone’s introduction, many (if not most) iOS applications displayed
    lists of data. Opting to call these single-column lists “tables,” iOS offers a
    table view class (`UITableView`) and a controller (`UITableViewController`) that
    displays lists, allows fast scrolling through the data, and even provides mechanisms
    for tapping cells to drill further into a data hierarchy. This approach is so
    fundamental and essential to displaying data that all iOS developers know how
    to use this class and the classes that support it to display lists of data.


    When using table views to display data from a Core Data store, you could simply
    fetch your data into an array and keep the table view ecosystem ignorant of the
    origin of your data, and indeed many applications do just that. The iOS SDK, however,
    provides a class called `NSFetchedResultsController`, which bridges table views
    and Core Data. `NSFetchedResultsController` pulls managed objects from the persistent
    store, from the entity you specify, caches them to improve performance, and gives
    them to the table view as necessary for display. It also manages adding, removing,
    and moving rows in the table in response to data changes.


    Creating a Fetched Results Controller


    You create a fetched results controller with four parameters.


    *   A fetch request (`NSFetchRequest` instance)

    *   A managed object context (`NSManagedObjectContext` instance)

    *   (Optional) A section name key path

    *   (Optional) A cache name


    The following sections explain these parameters.


    The Fetch Request


    The fetch request that `NSFetchedResultsController` uses defines which data to
    fetch to display in the table. It is almost the same as any fetch request you’ve
    used throughout this book and in any of your Core Data development. It works with
    the entity in your data model that you specify and can optionally have a predicate
    (`NSPredicate`) to filter what it fetches. The one difference in this fetch request
    is that it must have at least one sort descriptor or your application will crash
    with the following message:


    ```

    ''NSInvalidArgumentException'', reason: ''An instance of NSFetchedResultsController
    requires a fetch request with sort descriptors.''

    ```


    This is because the fetched results controller works within the constraints of
    a table, which displays cells in a predictable order, so the fetched results controller
    must also have the data in a predictable order. A sort descriptor provides the
    mechanism required to help sort the data.


    The Managed Object Context


    This is a normal managed object context that holds the managed objects. Saving
    the context saves all the objects in it. You typically use your application’s
    managed object context for this parameter.


    The Section Name Key Path


    iOS divides table views into sections, with some number of rows in each section.
    This structure is fundamental to the operation of table views. A fetched results
    controller is optimized to work in that environment and can divide its data into
    sections that correspond to the table sections. The section name key path, set
    as the `sectionNameKeyPath` parameter, specifies a key path into your Core Data
    model that divides the managed objects for the fetch request’s entity into these
    sections. Typically, you make this `sectionNameKeyPath` parameter point to one
    of the properties of the entity this table displays. Note that if you specify
    a value for the `sectionNameKeyPath` parameter, you also must sort your fetch
    by that value, or else your application will crash with an error. If your table
    view contains only one section, you can pass `nil` for the `sectionNameKeyPath`
    parameter.


    The Cache Name


    The cache name parameter specifies a name for the cache that the fetched results
    controller uses to cache the managed objects it fetches and feeds to the table.
    In the 3.x versions of iOS, you were encouraged to make this cache name unique
    across fetch results controllers, but your application would still work if you
    shared the cache name with other fetch results controllers. As of iOS 4.0, however,
    your application will not work correctly if you share cache names across fetched
    results controllers. Make sure your cache names are unique.


    Note that this parameter is optional; you can set the cache to `nil` and the fetched
    results controller won’t cache the data. This will slow down data display and
    application responsiveness, of course, so you usually won’t set the cache to `nil`.


    Creating the Fetched Results Controller Delegate


    It’s now time to create the fetched results controller delegate.


    Building the CoreDump Application


    To begin exploring fetched results controllers, create a new iOS Master-Detail
    Application project and call it CoreDump. Choose your language and check**Use
    Core Data**, as shown in [Figure 5-1](#9781430260288_Ch05.xhtml#Fig1).


    ![9781430260288_Fig05-01.jpg](images/9781430260288_Fig05-01.jpg)


    [Figure 5-1](#9781430260288_Ch05.xhtml#_Fig1). Creating the CoreDump application


    Xcode creates a project with a storyboard tying together a master and a detail
    screen, a Core Data model containing a single entity (`Event`), and an `NSFetchedResultsController`
    to feed data from the Core Data store to the table view on the master screen.
    Go ahead and run the application, create a few events, drill down into them, and
    get a feel for how the generated application works. Also, poke around in the code
    to see what’s going on. As usual, the Xcode-generated code provides both a good
    starting point for your applications and an excellent way to learn how to use
    Apple’s technologies.


    Examining the `NSFetchedResultsController` in the CoreDump Application


    Let’s make sure we understand how CoreDump implements the fetched results controller
    in the generated code. If you’re building this project in Objective-C, open `MasterViewController.h`
    to see the declaration of the `MasterViewController` class, as shown in [Listing
    5-1](#9781430260288_Ch05.xhtml#list1).


    [***Listing 5-1***](#9781430260288_Ch05.xhtml#_list1). `MasterViewController.h`


    ```

    #import <UIKit/UIKit.h>

    #import <CoreData/CoreData.h>


    @interface MasterViewController : UITableViewController <NSFetchedResultsControllerDelegate>


    @property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;

    @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;


    @end

    ```


    You can see that the `MasterViewController` class subclasses `UITableViewController`
    and that it implements the `NSFetchedResultsControllerDelegate` protocol. It also
    has an `NSFetchedResultsController` property called `fetchedResultsController`,
    and an `NSManagedObjectContext` property called `managedObjectContext`.'
