      NSManagedObject *iPad = [NSEntityDescription insertNewObjectForEntityForName:@"Gadget"
    inManagedObjectContext:self.persistence.managedObjectContext];

      [iPad setValue:@"iPad" forKey:@"name"];

      [iPad setValue:@499.0f forKey:@"price"];


    NSManagedObject *iPadMini = [NSEntityDescription insertNewObjectForEntityForName:@"Gadget"
    inManagedObjectContext:self.persistence.managedObjectContext];

      [iPadMini setValue:@"iPad Mini" forKey:@"name"];

      [iPadMini setValue:@329.0f forKey:@"price"];


    NSManagedObject *iPhone = [NSEntityDescription insertNewObjectForEntityForName:@"Gadget"
    inManagedObjectContext:self.persistence.managedObjectContext];

      [iPhone setValue:@"iPhone" forKey:@"name"];

      [iPhone setValue:@199.0f forKey:@"price"];


    NSManagedObject *iPodTouch = [NSEntityDescription insertNewObjectForEntityForName:@"Gadget"
    inManagedObjectContext:self.persistence.managedObjectContext];

      [iPodTouch setValue:@"iPod touch" forKey:@"name"];

      [iPodTouch setValue:@299.0f forKey:@"price"];


    [self.persistence saveContext];

    }

    ```


    [***Listing 1-21***](#9781430260288_Ch01.xhtml#_list21). The Swift `createObjects`
    function


    ```

