    Displaying the Search Results


    Since we use the same table for both the normal results and the search results,
    to toggle between them we update the methods in the table view datasource to check
    for a non-`nil searchPredicate`. If `searchPredicate` is non-`nil`, we apply it
    to the `fetchedObjects` property in the fetched results controller. Otherwise,
    we use the existing fetched results controller code.


    For the search results, we don’t section the results, so we want to have a single
    section with no section header. [Listing 5-79](#9781430260288_Ch05.xhtml#list79)
    (Objective-C) and [Listing 5-80](#9781430260288_Ch05.xhtml#list80) (Swift) show
    the updated `numberOfSectionsInTableView:` and `tableView:titleForHeaderInSection:`
    methods that return differing results, depending on whether we have a search predicate.


