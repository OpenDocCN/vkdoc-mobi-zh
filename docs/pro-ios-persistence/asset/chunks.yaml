    Storing Images


    Core Data offers a Binary Data type for attributes that stores binary data in
    any format, so it would seem a natural fit for storing images. This approach works,
    and in the case of small images, it probably works well. Storing larger images
    in Core Data, however, can create performance problems, as any access to those
    managed objects must load the image data, whether they’re used or not.


    To address the potential performance problems of storing images in Binary Data
    attributes in Core Data, many developers have instead opted to store the images
    in files in their applications’ Documents directory, and then to store the path
    for each image in a String attribute in Core Data. This approach works as well,
    and it has the advantage that accessing a managed object doesn’t load the entire
    image into memory. Instead, you load the image only when you explicitly want it.
    This two-step approach to loading images (get the image path from Core Data, then
    load that image from disk) has two disadvantages.


    *   Your code becomes a little more complicated, and

    *   Your application can run a little slower, especially in the case of loading
    several small images.


    So, which approach should you use? Should you store your images in Binary Data
    attributes in Core Data? Or should you store your images on disk, and just store
    their paths in String attributes in Core Data? And why should you have to decide,
    anyway? Aren’t iPhones and iPads computers? And aren’t computers better at deciding
    these kinds of things?


    As of iOS 5.0, you can indeed tell Core Data to make this decision for you. If
    your attribute type is Binary Data, a check box appears in the Xcode modeler with
    the label **Allows External Storage**, as shown in [Figure 5-10](#9781430260288_Ch05.xhtml#Fig10).
    This check box corresponds to the `allowsExternalBinaryDataStorage` property of
    `NSAttributeDescription`. If you check that box, Core Data will decide whether
    to store your image (or any other type of binary data) in the data store or in
    an external file, and it will manage all access seamlessly.


    ![9781430260288_Fig05-10.jpg](images/9781430260288_Fig05-10.jpg)


    [Figure 5-10](#9781430260288_Ch05.xhtml#_Fig10). Setting an attribute to Allows
    External Storage in the Attributes inspector


    Adding Screenshots to CoreDump


    A textual description of a bug can help communicate to the developer what’s going
    wrong and what must be fixed, but an actual screenshot displaying the bug and
    its consequences can really help. In the next few sections, we add the ability
    to store screenshots with the bugs in CoreDump.


    Updating the Model to Store Images


    We want to be able to store an optional screenshot with each `Bug` managed object
    in CoreDump. We also want to take advantage of Core Data’s ability to seamlessly
    decide whether to store each image inside the Core Data store or in an external
    record. Open the Core Data model and add an attribute called `screenshot` to the
    `Bug` entity. Make it optional, and set the type to Binary Data. Check the Allows
    External Storage check box. Finally, regenerate the `Bug` class files. Note that,
    as of this writing, Xcode doesn’t actually regenerate the files, even if you select
    to replace the existing files, so be sure to check the files for the inclusion
    of the new `screenshot` property. [Listing 5-66](#9781430260288_Ch05.xhtml#list66)
    shows the updated header file, and [Listing 5-67](#9781430260288_Ch05.xhtml#list67)
    (Objective-C) and [Listing 5-68](#9781430260288_Ch05.xhtml#list68) (Swift) show
    the updated implementation files. You can see that the only difference is a new
    property called `screenshot` of type `NSData`. Nowhere in the class files does
    it refer to allowing external storage, or whether an object is in the Core Data
    store or in a separate file. That’s all part of the Core Data model and runtime,
    and you remain completely oblivious to those complexities. If you’d like, you
    can open the file `CoreDump.xcdatamodeld/CoreDump.xcdatamodel/contents`, and you’ll
    see that a line that looks like the following has been added:


    ```

    <attribute name="screenshot" optional="YES" attributeType="Binary" allowsExternalBinaryDataStorage="YES"
    syncable="YES"/>

    ```


    You can see that the `allowsExternalBinaryDataStorage` property of the `screenshot`
    attribute has been set to `YES`.


