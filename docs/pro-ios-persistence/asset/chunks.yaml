    \ and introduces a new class for searching: `UISearchController`. In the next\
    \ few sections, we show you how to add searching capabilities using `UISearchController`\
    \ to `CoreDump`'s Master view.\n\n### Adding the Search Controller\n\nInterface\
    \ Builder hasn’t yet added the new `UISearchController`, so you must add this\
    \ form of search support via code. Start by declaring that `MasterViewController`\
