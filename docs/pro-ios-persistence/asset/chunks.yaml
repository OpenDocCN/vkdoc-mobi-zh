    \ You should see the log messages in the Xcode console that your program is creating\
    \ the objects and relationships. If you quit the program and run it again, you\
    \ shouldn’t see any such log messages.\n\n## Creating the Testing View\n\nThe\
    \ `PerformanceTuning` application presents a picker with the list of tests you\
    \ can run and buttons to launch the selected test. When you run a test, the application\
    \ lists the start time, stop time, and elapsed time for the test, as well as a\
    \ description of the test’s results. Open `ViewController.h`, declare that it\
    \ implements the protocols for your picker, add properties for the user interface\
    \ (UI) elements, and add a method declaration for running a test, as [Listing\
    \ 9-11](#9781430260288_Ch09.xhtml#list11) shows.\n\n[***Listing 9-11***](#9781430260288_Ch09.xhtml#_list11).\
    \ `ViewController.h`\n\n```objectivec\n@interface ViewController : UIViewController\
    \ <UIPickerViewDataSource, UIPickerViewDelegate>\n\n@property (nonatomic, weak)\
    \ IBOutlet UILabel *startTime;\n@property (nonatomic, weak) IBOutlet UILabel *stopTime;\n\
