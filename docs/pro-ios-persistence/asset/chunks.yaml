- fmt: 'Calling `enableUndoRegistration` when undo tracking is already enabled raises
    an exception of type `NSInternalInconsistencyException`, which will likely crash
    your application. To avoid this embarrassment, you can call `NSUndoManager`’s
    `isUndoRegistrationEnabled`, which returns a `BOOL`, before calling `enableUndoRegistration`.
    For example, the following code checks whether undo tracking is enabled before
    enabling it:


    ```

    if (![undoManager isUndoRegistrationEnabled]) {

        [undoManager enableUndoRegistration];

    }

    ```


    The `isUndoRegistrationEnabled` method disappeared in iOS 8, however, and doesn’t
    exist in Swift, so you’re responsible for keeping track of your disable/enable
    calls. You can clear the undo stack entirely by calling the `removeAllActions`
    method. This method has the side effect of re-enabling undo tracking.


