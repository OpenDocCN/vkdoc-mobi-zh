    SUBQUERY(words, $x, $x.length == 25).@count > 0

    ```


    The general format for subqueries is


    ```

    SUBQUERY(collection_expression, variable_expression, predicate)

    ```


    The `collection_expression` parameter refers to the collection property in the
    entity you’re fetching, so we use `words` to reference the `words` collection.
    The `variable_expression` can be called anything you’d like; it’s the variable
    that will temporarily hold each item in the collection as the subquery iterates
    through the collection. The `predicate` is, of course, the test for inclusion
    in the result set.


    As with other expression types, you can create subqueries using the query language,
    as shown previously, or you can build them manually with `NSExpression`. The `NSExpression`
    class has a static initializer called `+expressionForSubQuery:usingIteratorVariable:predicate:`
    (or the Swift counterpart `init(forSubquery expression: NSExpression!, usingIteratorVariable
    variable:` `String``!, predicate predicate: AnyObject!)`) for creating subquery
    expressions. The parameters to that method line up with the query language format:
    the first parameter is the collection expression to evaluate. The second is the
    name of the temporary variable to use during iteration. Finally, the last is the
    predicate to use for evaluation.


    The `wordCategoriesWith25LetterWords` method shown in [Listing 3-52](#9781430260288_Ch03.xhtml#list52)
    (Objective-C) and [Listing 3-53](#9781430260288_Ch03.xhtml#list53) (Swift) uses
    the subquery described earlier to get all the categories that have at least one
    25-letter word. Add a call to it in your `statistics` method to see that two categories,
    "i" and "p," have at least one 25-letter word.


    [***Listing 3-52***](#9781430260288_Ch03.xhtml#_list52). Using a Subquery in Objective-C


    ```

    - (NSString *)wordCategoriesWith25LetterWords {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"WordCategory"];

      NSPredicate *predicate = [NSPredicate predicateWithFormat:@"SUBQUERY(words,
    $x, $x.length = 25).@count > 0"];

      fetchRequest.predicate = predicate;

      NSLog(@"Subquery Predicate: %@", [predicate predicateFormat]);

      NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      return [NSString stringWithFormat:@"Categories with 25-letter words: %@\n",

              [[categories valueForKey:@"firstLetter"] componentsJoinedByString:@","]];

    }

    ```


    [***Listing 3-53***](#9781430260288_Ch03.xhtml#_list53). Using a Subquery in Swift


    ```

