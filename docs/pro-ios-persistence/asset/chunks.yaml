    That’s all you have to do to migrate the data. Build and run the application,
    which no longer crashes but instead shows all the books you’ve created. Open a
    Terminal and navigate to the directory that contains the SQLite file for the BookStore
    application. Unlike early versions of iOS prior to iOS 5, which kept both the
    pre-migration and the post-migration versions of the database file, recent iOS
    versions keeps only the post-migration version. You’ll find the post-migration
    file, `BookStoreEnhanced.sqlite`. Open it using the `sqlite3` application and
    run the `.schema` command to see the definition for the `ZBOOK` table. You can
    see that the `BookStoreEnhanced.sqlite` file has added a column for the `name`
    attribute: `ZAUTHOR VARCHAR`, as shown.


    ```

    sqlite> .schema ZBOOKCREATE TABLE ZBOOK ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER,
    Z_OPT INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT, ZAUTHOR VARCHAR, ZTITLE VARCHAR);CREATE
    INDEX ZBOOK_ZCATEGORY_INDEX ON ZBOOK (ZCATEGORY);

    ```


    Renaming Entities and Properties


    Lightweight migrations also support renaming entities and properties but require
    a little more effort from you. In addition to changing your model, you must specify
    the old name for the item whose name you changed. You can do this in one of two
    ways.


    *   In the Xcode data modeler

    *   In code


    The Xcode data modeler is the simpler option. When you select an entity or property
    in the Xcode data modeler, general information about that entity or property shows
    in the Utilities panel to the right. With the Utilities panel displayed, open
    the Data Model inspector, and then the Versioning section. In the Renaming ID
    field, enter the old name of whatever you’ve changed (see [Figure 6-6](#9781430260288_Ch06.xhtml#Fig6)).


    ![9781430260288_Fig06-06.jpg](images/9781430260288_Fig06-06.jpg)


    [Figure 6-6](#9781430260288_Ch06.xhtml#_Fig6). The Versioning section with the
    Renaming Identifier field


    If you insist on specifying the old name in code, you’d make a call to the `setRenamingIdentifier:`
    method of `NSEntityDescription` or `NSPropertyDescription`, depending on what
    you’ve renamed, passing the old name for the entity or property. You do this after
    the model has loaded but before the call to open the persistent store (`addPersistentStoreWithType:`).
    If, for example, you want to change the name of the `Book` entity to `Publication`,
    you’d add the following code before the call to `addPersistentStoreWithType:`


    ```

    // Objective-C

    NSEntityDescription *publication = [[managedObjectModel entitiesByName] objectForKey:@"Publication"];

    [publication setRenamingIdentifier:@"Book"];


    // Swift

    if let publication: NSEntityDescription? = managedObjectModel.entitiesByName["Publication"]
    as? NSEntityDescription {

      publication?.renamingIdentifier = "Book"

    }

    ```


    Core Data takes care of migrating the data, but you still have the responsibility
    to update any code in your application that depends on the old name. To see this
    in practice, create a new version of your data model called Bookstore 3, based
    on model Bookstore 2, and set it as the current version. You should now be on
    version 3 (BookStore 3). In this version of the model, you’ll rename the `Book`
    entity to Publication. Go to your new model file, `BookStore 3.xcdatamodel`, and
    rename the `Book` entity to `Publication`. Then, go to the Versioning section
    in the Data Model inspector tab, and type the old name, `Book`, into the Renaming
    ID field so that Core Data will know how to migrate the existing data (as [Figure
    6-7](#9781430260288_Ch06.xhtml#Fig7) shows), and save this model.


    ![9781430260288_Fig06-07.jpg](images/9781430260288_Fig06-07.jpg)


    [Figure 6-7](#9781430260288_Ch06.xhtml#_Fig7). Renaming Book to Publication and
    specifying the Renaming ID


    Wait! Before running the application, remember that you’re responsible for changing
    any code that relies on the old name, `Book`. You could change the custom managed
    object class name from `Book` to `Publication`, change the relationship name in
    the `Page` entity from `book` to `publication`, and change any variable names
    appropriately. Let’s keep it simple here and change the places the BookStore application
    refers to the `Book` entity name. You find them in `ViewController.m or in ViewController.swift,
    in` the calls to `fetchRequestWithEntityName:` and `insertNewObjectForEntityForName:`.
    In those calls, change the entity name string from `Book` to `Publication`.


    You can now build and run the BookStore application; all existing books should
    still exist. You can open the SQLite database and confirm that the schema now
    has a `ZPUBLICATION` table.


    ```

    CREATE TABLE ZPUBLICATION ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZCATEGORY INTEGER, ZPRICE FLOAT, ZAUTHOR VARCHAR, ZTITLE VARCHAR);

    ```


    and no `ZBOOK` table.


    As you’ve seen, lightweight migrations are nearly effortless, at least for you.
    Core Data handles the difficult work of figuring out how to map and migrate the
    data from the old model to new. However, if your model changes don’t fit within
    what lightweight migrations can handle, you must specify your own mapping model.


    Using a Mapping Model'
  trans: "\n-   键为`NSMigratePersistentStoresAutomaticallyOption`、值为`YES`或`true`的选项，它告诉持久化存储协调器自动迁移数据。\n\
    -   键为`NSInferMappingModelAutomaticallyOption`、值为`YES`或`true`的选项，它告诉持久化存储协调器推断映射模型。\n\
    \n然后，你将这个`options`对象（而不是`nil`）作为`options`参数传递给`addPersistentStoreWithType:`调用。打开`AppDelegate.m`文件或`AppDelegate.swift`文件，将`persistentStoreCoordinator`方法修改为代码清单\
    \ 6-1（Objective-C）所示的样子，或者将`managedObjectContext`闭包中初始化`persistentStoreCoordinator`的代码修改为代码清单\
    \ 6-2（Swift）所示的样子。\n\n**代码清单 6-1**. 创建带有迁移选项的持久化存储协调器 (Objective-C)\n\n```\n-\
    \ (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if (_persistentStoreCoordinator\
    \ != nil) {\n        return _persistentStoreCoordinator;\n    }\n\n_persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    BookStoreEnhanced.sqlite\"];\n\nNSDictionary *options = @{\n      NSMigratePersistentStoresAutomaticallyOption:\
    \ @YES,\n      NSInferMappingModelAutomaticallyOption: @YES\n    };\n\nNSError\
    \ *error = nil;\n    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:options error:&error]) {\n      [self\
    \ showCoreDataError];\n    }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n\
    **代码清单 6-2**. 创建带有迁移选项的持久化存储协调器 (Swift)\n\n```\n// 初始化持久化存储协调器\nlet storeURL =\
    \ AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"BookStoreEnhancedSwift.sqlite\"\
    )\nvar error: NSError? = nil\nlet persistentStoreCoordinator = NSPersistentStoreCoordinator(managedObjectModel:\
    \ managedObjectModel!)\n\nlet options = [NSMigratePersistentStoresAutomaticallyOption:\
    \ true, NSInferMappingModelAutomaticallyOption: true]\n\nif(persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
    \ configuration: nil, URL: storeURL, options: options, error: &error) == nil)\
    \ {\n    self.showCoreDataError()\n    return nil\n}\n```\n\n迁移数据只需这些操作。构建并运行应用程序，它不再崩溃，而是显示你创建的所有书籍。打开终端，导航到包含\
    \ BookStore 应用程序 SQLite 文件的目录。与 iOS 5 之前仅保留数据库文件迁移前和迁移后两个版本的早期 iOS 版本不同，较新的 iOS\
    \ 版本只保留迁移后的版本。你会找到迁移后的文件`BookStoreEnhanced.sqlite`。使用`sqlite3`应用程序打开它，并运行`.schema`命令来查看`ZBOOK`表的定义。你可以看到`BookStoreEnhanced.sqlite`文件为`name`属性添加了一列：`ZAUTHOR\
    \ VARCHAR`，如下所示。\n\n```\nsqlite> .schema ZBOOKCREATE TABLE ZBOOK ( Z_PK INTEGER\
    \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT,\
    \ ZAUTHOR VARCHAR, ZTITLE VARCHAR);CREATE INDEX ZBOOK_ZCATEGORY_INDEX ON ZBOOK\
    \ (ZCATEGORY);\n```\n\n## 重命名实体和属性\n\n轻量级迁移也支持重命名实体和属性，但这需要你付出更多一点的努力。除了修改你的模型之外，你还必须指定已重命名项目的旧名称。你可以通过以下两种方式之一来完成此操作。\n\
    \n- 在 Xcode 数据建模器中\n- 在代码中\n\nXcode 数据建模器是更简单的选择。当你在 Xcode 数据建模器中选择一个实体或属性时，该实体或属性的常规信息会显示在右侧的实用工具面板中。显示实用工具面板后，打开数据模型检查器，然后打开版本控制部分。在重命名\
    \ ID 字段中，输入你更改的任何内容的旧名称（请参见图 6-6）。\n\n![9781430260288_Fig06-06.jpg](img/9781430260288_Fig06-06.jpg)\n\
    \n图 6-6. 带有重命名标识符字段的版本控制部分\n\n如果你坚持要在代码中指定旧名称，则需要根据已重命名的内容，调用`NSEntityDescription`或`NSPropertyDescription`的`setRenamingIdentifier:`方法，并传入实体或属性的旧名称。你需要在模型加载之后、但在调用打开持久化存储（`addPersistentStoreWithType:`）之前执行此操作。例如，如果你想将`Book`实体的名称更改为`Publication`，你需要在调用`addPersistentStoreWithType:`之前添加以下代码：\n\
    \n```\n// Objective-C\nNSEntityDescription *publication = [[managedObjectModel\
    \ entitiesByName] objectForKey:@\"Publication\"];\n[publication setRenamingIdentifier:@\"\
    Book\"];\n\n// Swift\nif let publication: NSEntityDescription? = managedObjectModel.entitiesByName[\"\
    Publication\"] as? NSEntityDescription {\n  publication?.renamingIdentifier =\
    \ \"Book\"\n}\n```\n\nCore Data 负责迁移数据，但你仍有责任更新应用程序中任何依赖旧名称的代码。为了在实践中看到这一点，请基于\
    \ Bookstore 2 模型创建一个名为 Bookstore 3 的数据模型新版本，并将其设置为当前版本。你现在应该处于版本 3（BookStore 3）。在此版本的模型中，你将把`Book`实体重命名为`Publication`。进入你的新模型文件`BookStore\
    \ 3.xcdatamodel`，将`Book`实体重命名为`Publication`。然后，转到数据模型检查器选项卡中的版本控制部分，在重命名 ID 字段中输入旧名称`Book`，以便\
    \ Core Data 知道如何迁移现有数据（如图 6-7 所示），并保存此模型。\n\n![9781430260288_Fig06-07.jpg](img/9781430260288_Fig06-07.jpg)\n\
    \n图 6-7. 将 Book 重命名为 Publication 并指定重命名 ID\n\n等等！在运行应用程序之前，请记住，你有责任更改任何依赖旧名称`Book`的代码。你可以将自定义托管对象类名从`Book`更改为`Publication`，将`Page`实体中的关系名称从`book`更改为`publication`，并相应地更改任何变量名。为了简单起见，我们在这里只更改\
    \ BookStore 应用程序中引用`Book`实体名称的地方。你可以在`ViewController.m`或`ViewController.swift`中的`fetchRequestWithEntityName:`和`insertNewObjectForEntityForName:`调用中找到它们。在这些调用中，将实体名字符串从`Book`更改为`Publication`。\n\
    \n现在你可以构建并运行 BookStore 应用程序；所有现有的书籍应该仍然存在。你可以打开 SQLite 数据库，确认模式现在有一个`ZPUBLICATION`表。\n\
    \n```\nCREATE TABLE ZPUBLICATION ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT\
    \ INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT, ZAUTHOR VARCHAR, ZTITLE VARCHAR);\n\
    ```\n\n并且没有`ZBOOK`表。\n\n如你所见，轻量级迁移几乎不费力，至少对你来说是这样。Core Data 处理了弄清楚如何将数据从旧模型映射和迁移到新模型的艰巨工作。但是，如果你的模型更改超出了轻量级迁移所能处理的范围，则必须指定你自己的映射模型。\n\
    \n## 使用映射模型\n"
- fmt: '当您的数据模型变更超出了 Core Data 推断如何将数据从旧模型映射到新模型的能力时，您无法使用轻量级迁移来自动迁移数据。相反，您必须创建一个“映射模型”来告诉
    Core Data 如何执行迁移。本节将引导您完成为迁移创建映射模型所涉及的步骤。映射模型大致类似于数据模型——数据模型包含实体和属性，而映射模型（类型为`NSMappingModel`）包含实体映射（类型为`NSEntityMapping`）和属性映射（类型为`NSPropertyMapping`）。实体映射正如您所期望的那样：它们将源实体映射到目标实体。属性映射也同样如此：将源属性映射到目标属性。映射模型使用这些映射及其关联的类型和策略来执行迁移。


    **注意**  Apple 的文档和代码中互换使用术语“destination”和“target”来指代新数据模型。在本章中，我们也遵循这一惯例，交替使用“destination”和“target”。


    在典型的数据迁移中，大多数实体和属性从旧版本到新版本都没有改变。对于这些情况，实体映射只是将每个实体从源模型复制到目标模型。当您创建一个映射模型时，您会注意到
    Xcode 会生成这些实体映射，以及它能够从您的模型变更中推断出的任何其他内容，并将这些映射存储在映射模型中。这些映射代表了 Core Data 在轻量级迁移中迁移数据的方式。您必须创建新的映射，或调整
    Xcode 生成的映射，以更改数据的迁移方式。


    ## 理解实体映射


    每个实体映射由`NSEntityMapping`实例表示，包含三部分内容：


    *   一个源实体

    *   一个目标实体

    *   一个映射类型


    当 Core Data 执行迁移时，它使用实体映射将源实体移动到目标实体，并使用映射类型来决定如何执行此操作。表6-1列出了映射类型、对应的 Core Data
    常量及其含义。


    | 类型 | Core Data 常量 | 含义 |

    | :--- | :--- | :--- |

    | Add | `NSAddEntityMappingType` | 该实体是目标模型中的新实体——它在源模型中不存在——并且应该被添加。 |

    | Remove | `NSRemoveEntityMappingType` | 该实体在目标模型中不存在，应该被移除。 |

    | Copy | `NSCopyEntityMappingType` | 该实体在源模型和目标模型中均存在且未改变，应原样复制。 |

    | Transform | `NSTransformEntityMappingType` | 该实体在源模型和目标模型中都存在，但有所变更。该映射告诉 Core
    Data 如何将每个源实例迁移到目标实例。 |

    | Custom | `NSCustomEntityMappingType` | 该实体在源模型和目标模型中都存在，但有所变更。 |


    该映射告诉 Core Data 如何将每个源实例迁移到目标实例。`Add`、`Remove` 和 `Copy` 类型不太引人关注，因为轻量级迁移能处理这些实体映射类型。然而，`Transform`
    和 `Custom` 类型正是本书本节存在的必要原因。它们告诉 Core Data，每个源实体实例必须根据任何指定的规则，转换为目标实体的实例。在本章中，您将看到
    `Transform` 和 `Custom` 实体映射类型的示例。如果您为实体的某个属性指定了值表达式，则该实体映射属于 `Transform` 类型。如果您为实体映射指定了自定义迁移策略，则该实体映射变为
    `Custom` 类型。在本章的学习过程中，请注意 Core Data 映射建模器根据您所做的更改对映射模型进行的类型更改。要为 `Custom` 实体映射类型指定规则，您需要创建一个迁移策略，即您编写的继承自`NSEntityMigrationPolicy`的类。然后，您在
    Xcode 映射建模器中将您创建的类设置为该实体映射的自定义策略。


    Core Data 分三个阶段运行您的迁移：


    1.  它根据源模型中的对象，在目标模型中创建对象，包括它们的属性。

    2.  它在目标模型中的对象之间创建关系。

    3.  它验证目标模型中的数据并保存它们。


    您可以通过自定义策略来定制 Core Data 如何执行这三个步骤。`NSEntityMigrationPolicy`类有七个方法，您可以重写它们来定制 Core
    Data 如何将数据从源实体迁移到目标实体，尽管您很少会重写所有方法。这些方法列在`NSEntityMigrationPolicy`类的 Apple 文档中，它们在迁移过程中的各个阶段提供了您可以重写和更改
    Core Data 迁移行为的地方。您可以根据需要重写其中任意数量（或少或多）的方法，尽管一个不重写任何方法的自定义迁移策略是没有意义的。通常，如果您想更改目标实例的创建方式或属性填充数据的方式，您会重写`createDestinationInstancesForSourceInstance:`。如果您想自定义目标实体与其他实体之间的关系如何创建，您会重写`createRelationshipsForDestinationInstance:`。最后，如果您想在迁移过程中执行任何自定义验证，您会重写`performCustomValidationForEntityMapping:`。


    `createDestinationInstancesForSourceInstance:`方法带有一个注意事项：如果您没有调用超类的实现（您很可能不会调用，因为您重写此方法是为了更改默认行为），则必须调用迁移管理器的`associateSourceInstance:withDestinationInstance:forEntityMapping:`方法来将源实例与目标实例关联起来。忘记执行此操作将导致迁移出现问题。您将在本章后面部分，通过
    BookStore 应用程序，学习调用此方法的正确方式。


    ## 理解属性映射


    属性映射与实体映射类似，它告诉 Core Data 如何将源数据迁移到目标数据。属性映射是`NSPropertyMapping`的一个实例，包含以下三部分内容：


    *   源实体中属性的名称

    *   目标实体中属性的名称

    *   一个值表达式，告诉 Core Data 如何从源数据得到目标数据


    要更改属性映射迁移数据的方式，您需要为属性映射提供值表达式。值表达式遵循与谓词相同的语法，并使用以下六个预定义的键来帮助检索值：'
  raw: 'When your data model changes exceed Core Data’s ability to infer how to map
    data from the old model to the new, you can’t use a lightweight migration to automatically
    migrate your data. Instead, you have to create “a mapping model” to tell Core
    Data how to execute the migration. This section walks you through the steps involved
    in creating a mapping model for your migration. A mapping model is roughly analogous
    to a data model—whereas a data model contains entities and properties, a mapping
    model, which is of type `NSMappingModel`, has entity mappings (of type `NSEntityMapping`)
    and property mappings (of type `NSPropertyMapping`). The entity mappings do just
    what you’d expect them to do: they map a source entity to a target entity. The
    property mappings, as well, do what you’d think: map source properties to target
    properties. The mapping model uses these mappings, along with their associated
    types and policies, to perform the migration.


    **Note**  Apple’s documentation and code use the terms “destination” and “target”
    interchangeably to refer to the new data model. In this chapter, we follow suit
    and use both “destination” and “target” interchangeably.


    In a typical data migration, most entities and properties haven’t changed from
    the old version to the new. For these cases, the entity mappings simply copy each
    entity from the source model to the target model. When you create a mapping model,
    you’ll notice that Xcode generates these entity mappings, along with anything
    else it can infer from your model changes, and stores these mappings in the mapping
    model. These mappings represent how Core Data would have migrated your data in
    a lightweight migration. You have to create new mappings, or adjust the mappings
    Xcode generates, to change how your data migrate.


    Understanding Entity Mappings


    Each entity mapping, represented by an `NSEntityMapping` instance, contains three
    things.


    *   A source entity

    *   A destination entity

    *   A mapping type


    When Core Data performs the migration, it uses the entity mapping to move the
    source to the destination, using the mapping type to determine how to do that.
    [Table 6-1](#9781430260288_Ch06.xhtml#Tab1) lists the mapping types, their corresponding
    Core Data constants, and what they mean.


    [Table 6-1](#9781430260288_Ch06.xhtml#_Tab1). The Entity Mapping Types


    | Type | Core Data Constant | Meaning |

    | --- | --- | --- |

    | Add | `NSAddEntityMappingType` | The entity is new in the destination model—it
    doesn’t exist in the source model—and should be added. |

    | Remove | `NSRemoveEntityMappingType` | The entity doesn’t exist in the destination
    model and should be removed. |

    | Copy | `NSCopyEntityMappingType` | The entity exists in both the source and
    destination models unchanged and should be copied as is. |

    | Transform | `NSTransformEntityMappingType` | The entity exists in both the source
    and destination models but with changes. The mapping tells Core Data how to migrate
    each source instance to a destination instance. |

    | Custom | `NSCustomEntityMappingType` | The entity exists in both the source
    and destination models but with changes. |


    The mapping tells Core Data how to migrate each source instance to a destination
    instance. The Add, Remove, and Copy types don’t generate much interest because
    lightweight migrations handle these types of entity mappings. The Transform and
    Custom types, however, are what make this section of the book necessary. They
    tell Core Data that each source entity instance must be transformed, according
    to any specified rules, into an instance of the destination entity. You’ll see
    an example of both a Transform and a Custom entity mapping type in this chapter.
    If you specify a value expression for one of the entity’s properties, the entity
    mapping is of a Transform type. If you specify a custom migration policy for the
    entity mapping, the entity mapping becomes a Custom type. As you work through
    this chapter, pay attention to the types the Core Data mapping modeler makes to
    your mapping model in response to changes you make. To specify the rules for a
    Custom entity mapping type, you create a migration policy, which is a class you
    write that derives from `NSEntityMigrationPolicy`. You then set the class you
    create as the custom policy for the entity mapping in the Xcode mapping modeler.


    Core Data runs your migration in three stages.


    1.  It creates the objects in the destination model, including their attributes,
    based on the objects in the source model.

    2.  It creates the relationships among the objects in the destination model.

    3.  It validates the data in the destination model and saves them.


    You can customize how Core Data performs these three steps through the Custom
    Policy. The `NSEntityMigrationPolicy` class has seven methods you can override
    to customize how Core Data will migrate data from the source entity to the target
    entity, though you’ll rarely override all of them. These methods, listed in Apple’s
    documentation for the `NSEntityMigrationPolicy` class, provide various places
    during the migration that you can override and change Core Data’s migration behavior.
    You can override as few or as many of these methods as you’d like, though a custom
    migration policy that overrides none of the methods is pointless. Typically, you’ll
    override `createDestinationInstancesForSourceInstance:` if you want to change
    how destination instances are created or how their attributes are populated with
    data. You’ll override `createRelationshipsForDestinationInstance:` if you want
    to customize how relationships between the destination entity and other entities
    are created. Finally, you’ll override `performCustomValidationForEntityMapping:`
    if you want to perform any custom validations during your migration.


    The `createDestinationInstancesForSourceInstance:` method carries with it a caveat:
    if you don’t call the superclass’s implementation, which you probably won’t because
    you’re overriding this method to change the default behavior, you must call the
    migration manager’s `associateSourceInstance:withDestinationInstance:forEntityMapping:`
    method to associate the source instance with the destination instance. Forgetting
    to do this will cause problems with your migration. You’ll learn the proper way
    to call this method later in this chapter, with the BookStore application.


    Understanding Property Mappings


    A property mapping, like an entity mapping, tells Core Data how to migrate source
    to destination. A property mapping is an instance of `NSPropertyMapping` and contains
    the following three things:


    *   The name of the property in the source entity

    *   The name of the property in the destination entity

    *   A value expression that tells Core Data how to get from source to destination


    To change the way a property mapping migrates data, you provide the value expression
    for the property mapping to use. Value expressions follow the same syntax as predicates
    and use the following six predefined keys to assist with retrieving values:'
  trans: '

    当您的数据模型变更超出了 Core Data 推断如何将数据从旧模型映射到新模型的能力时，您无法使用轻量级迁移来自动迁移数据。相反，您必须创建一个“映射模型”来告诉
    Core Data 如何执行迁移。本节将引导您完成为迁移创建映射模型所涉及的步骤。映射模型大致类似于数据模型——数据模型包含实体和属性，而映射模型（类型为`NSMappingModel`）包含实体映射（类型为`NSEntityMapping`）和属性映射（类型为`NSPropertyMapping`）。实体映射正如您所期望的那样：它们将源实体映射到目标实体。属性映射也同样如此：将源属性映射到目标属性。映射模型使用这些映射及其关联的类型和策略来执行迁移。


    **注意**  Apple 的文档和代码中互换使用术语“destination”和“target”来指代新数据模型。在本章中，我们也遵循这一惯例，交替使用“destination”和“target”。


    在典型的数据迁移中，大多数实体和属性从旧版本到新版本都没有改变。对于这些情况，实体映射只是将每个实体从源模型复制到目标模型。当您创建一个映射模型时，您会注意到
    Xcode 会生成这些实体映射，以及它能够从您的模型变更中推断出的任何其他内容，并将这些映射存储在映射模型中。这些映射代表了 Core Data 在轻量级迁移中迁移数据的方式。您必须创建新的映射，或调整
    Xcode 生成的映射，以更改数据的迁移方式。


    ## 理解实体映射


    每个实体映射由`NSEntityMapping`实例表示，包含三部分内容：


    *   一个源实体

    *   一个目标实体

    *   一个映射类型


    当 Core Data 执行迁移时，它使用实体映射将源实体移动到目标实体，并使用映射类型来决定如何执行此操作。表 6-1 列出了映射类型、对应的 Core
    Data 常量及其含义。


    | 类型 | Core Data 常量 | 含义 |

    | :--- | :--- | :--- |

    | Add | `NSAddEntityMappingType` | 该实体是目标模型中的新实体——它在源模型中不存在——并且应该被添加。 |

    | Remove | `NSRemoveEntityMappingType` | 该实体在目标模型中不存在，应该被移除。 |

    | Copy | `NSCopyEntityMappingType` | 该实体在源模型和目标模型中均存在且未改变，应原样复制。 |

    | Transform | `NSTransformEntityMappingType` | 该实体在源模型和目标模型中都存在，但有所变更。该映射告诉 Core
    Data 如何将每个源实例迁移到目标实例。 |

    | Custom | `NSCustomEntityMappingType` | 该实体在源模型和目标模型中都存在，但有所变更。 |


    该映射告诉 Core Data 如何将每个源实例迁移到目标实例。`Add`、`Remove` 和 `Copy` 类型不太引人关注，因为轻量级迁移能处理这些实体映射类型。然而，`Transform`
    和 `Custom` 类型正是本书本节存在的必要原因。它们告诉 Core Data，每个源实体实例必须根据任何指定的规则，转换为目标实体的实例。在本章中，您将看到
    `Transform` 和 `Custom` 实体映射类型的示例。如果您为实体的某个属性指定了值表达式，则该实体映射属于 `Transform` 类型。如果您为实体映射指定了自定义迁移策略，则该实体映射变为
    `Custom` 类型。在本章的学习过程中，请注意 Core Data 映射建模器根据您所做的更改对映射模型进行的类型更改。要为 `Custom` 实体映射类型指定规则，您需要创建一个迁移策略，即您编写的继承自`NSEntityMigrationPolicy`的类。然后，您在
    Xcode 映射建模器中将您创建的类设置为该实体映射的自定义策略。


    Core Data 分三个阶段运行您的迁移：


    1.  它根据源模型中的对象，在目标模型中创建对象，包括它们的属性。

    2.  它在目标模型中的对象之间创建关系。

    3.  它验证目标模型中的数据并保存它们。


    您可以通过自定义策略来定制 Core Data 如何执行这三个步骤。`NSEntityMigrationPolicy`类有七个方法，您可以重写它们来定制 Core
    Data 如何将数据从源实体迁移到目标实体，尽管您很少会重写所有方法。这些方法列在`NSEntityMigrationPolicy`类的 Apple 文档中，它们在迁移过程中的各个阶段提供了您可以重写和更改
    Core Data 迁移行为的地方。您可以根据需要重写其中任意数量（或少或多）的方法，尽管一个不重写任何方法的自定义迁移策略是没有意义的。通常，如果您想更改目标实例的创建方式或属性填充数据的方式，您会重写`createDestinationInstancesForSourceInstance:`。如果您想自定义目标实体与其他实体之间的关系如何创建，您会重写`createRelationshipsForDestinationInstance:`。最后，如果您想在迁移过程中执行任何自定义验证，您会重写`performCustomValidationForEntityMapping:`。


    `createDestinationInstancesForSourceInstance:`方法带有一个注意事项：如果您没有调用超类的实现（您很可能不会调用，因为您重写此方法是为了更改默认行为），则必须调用迁移管理器的`associateSourceInstance:withDestinationInstance:forEntityMapping:`方法来将源实例与目标实例关联起来。忘记执行此操作将导致迁移出现问题。您将在本章后面部分，通过
    BookStore 应用程序，学习调用此方法的正确方式。


    ## 理解属性映射


    属性映射与实体映射类似，它告诉 Core Data 如何将源数据迁移到目标数据。属性映射是`NSPropertyMapping`的一个实例，包含以下三部分内容：


    *   源实体中属性的名称

    *   目标实体中属性的名称

    *   一个值表达式，告诉 Core Data 如何从源数据得到目标数据


    要更改属性映射迁移数据的方式，您需要为属性映射提供值表达式。值表达式遵循与谓词相同的语法，并使用以下六个预定义的键来帮助检索值：

    '
- fmt: '*   `$manager`, which represents the migration manager

    *   `$source`, which represents the source entity

    *   `$destination`, which represents the destination entity

    *   `$entityMapping`, which represents the entity mapping

    *   `$propertyMapping`, which represents the property mapping

    *   `$entityPolicy`, which represents the entity migration policy


    As you can see, these keys have names that make deducing their purposes easy.
    When you create a mapping model, you can explore the property mappings Xcode infers
    from your source and target data models to better understand what these keys mean
    and how they''re used.


    The simplest value expressions copy an attribute from the source entity to the
    destination entity. If you have a `Person` entity, for example, that has a `name`
    attribute and the `Person` entity hasn''t changed between your old and your new
    model versions, the value expression for the name attribute in your `PersonToPerson`
    entity mapping would be as follows:


    ```

    $source.name

    ```


    You can also perform manipulations of source data using value expressions. Suppose,
    for example, that the same `Person` entity had an attribute called salary that
    stores each person''s salary. In the new model, you want to give everyone 4% raises.
    Your value expression would look like the following:


    ```

    $source.salary*1.04

    ```


    Since properties represent both attributes and relationships, property mappings
    represent mappings for both attributes and relationships. The typical value expression
    for a relationship calls a function, passing the migration manager, the destination
    instances, the entity mapping, and the name of the source relationship. For example,
    if your old data model had a relationship called staff in the `Person` entity
    that represented everyone who reported to this person and your new model has renamed
    this relationship to reports, the value expression for the reports property would
    look like the following:


    ```

    FUNCTION($manager, "destinationInstancesForEntityMappingNamed:sourceInstances:",
    "PersonToPerson", $source.staff)

    ```


    Note that you use the `$manager` key to pass the migration manager, that you get
    the destination instances from the entity mapping for the source instances, that
    you pass the appropriate entity mapping (`PersonToPerson`), and that you pass
    the old relationship that you get from the `$source` key.


    ## Creating a New Model Version That Requires a Mapping Model


    Lightweight migrations are often enough and you really don''t need to get too
    far into the mechanics of Core Data migrations. There are times, however, when
    you need to get your hands a bit dirty and help the framework figure out what
    to do. This is the case, for example, when you realize you''ve been lazy and you
    have combined data into one field that should really be split into multiples.
    Think about the author field, for example, which is expected to contain the author''s
    full name (e.g., John Doe). If you suddenly realized you wanted to split this
    into a `firstName` and a `lastName` field, you''d have to create a mapping model.
    This is exactly what we will do in this section.


    Before we get to the migration, let''s spend some time populating the `author`
    field in the `Publication` table so it gives us some data to migrate.


    Open `ViewController.m` or `ViewController.swift` and add a new method called
    `populateAuthors`, as shown in [Listing 6-3](#9781430260288_Ch06.xhtml#list3)
    (Objective-C) and [Listing 6-4](#9781430260288_Ch06.xhtml#list4) (Swift).


    [***Listing 6-3***](#9781430260288_Ch06.xhtml#_list3). Populating Authors (Objective-C)

    ```

    - (void)populateAuthors {

      // 1\. Create a list of author names to assign

      NSArray *authors = @[@"John Doe", @"Jane Doe", @"Bill Smith", @"Jack Brown"];


    // 2\. Get all the publications from the data store

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Publication"];

      NSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      for(int i=0; i<books.count; i++) {

        Book *book = books[i];

        book.price = 20+i;


    // 3\. Set the author using one of the names in the array we created

        [book setValue:authors[i % authors.count] forKey:@"author"];

      }


    // 4\. Commit everything to the store

      [self saveContext];

    }

    ```


    [***Listing 6-4***](#9781430260288_Ch06.xhtml#_list4). Populating Authors (Swift)

    ```

    func populateAuthors() {

        // 1\. Create a list of author names to assign

        let authors = ["John Doe", "Jane Doe", "Bill Smith", "Jack Brown"]


    // 2\. Get all the publications from the data store

        let fetchRequest = NSFetchRequest(entityName: "Publication")

        let books = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    nil)

        if let books = books {

            for var i = 0; i<books.count; i++ {

                var book = books[i] as Book

                book.price = 20 + Float(i)

                // 3\. Set the author using one of the names in the array we created

                book.setValue(authors[i % authors.count], forKeyPath: "author")

            }

        }


    // 4\. Commit everything to the store

        saveContext()

    }

    ```


    Note that we also change the price to make sure it is about $15 so that we don''t
    trip the validation rules we had put in place in the original version of BookStore.


    Finally, edit the `viewDidAppear:` method so it looks like [Listing 6-5](#9781430260288_Ch06.xhtml#list5)
    (Objective-C) or [Listing 6-6](#9781430260288_Ch06.xhtml#list6) (Swift).


    [***Listing 6-5***](#9781430260288_Ch06.xhtml#_list5). Making the Call to Populate
    Authors (Objective-C)

    ```

    - (void)viewDidAppear:(BOOL)animated {

      [super viewDidAppear:animated];

      [self populateAuthors];

      [self showExampleData];

    }

    ```


    [***Listing 6-6***](#9781430260288_Ch06.xhtml#_list6). Making the Call to Populate
    Authors (Swift)

    ```

    override func viewDidAppear(animated: Bool) {

        super.viewDidAppear(animated)

        if let managedObjectContext = self.managedObjectContext {

            self.populateAuthors()

            self.showExampleData()

        }

    }

    ```


