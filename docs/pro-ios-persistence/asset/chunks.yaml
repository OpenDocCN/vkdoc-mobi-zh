    \n@end\n```\n\n这个头文件应该看起来很熟悉，不过你可能会注意到，我们用一个创建托管对象上下文的方法代替了托管对象上下文的属性。这样做是为了线程处理，我们将在本章后面解释。\n\
    \n接下来，打开 `Persistence.m` 或 `Persistence.swift`，并以前几章类似的方式实现初始化。代码清单 9-52 展示了 Objective-C\
    \ 版本，代码清单 9-53 展示了 Swift 版本。\n\n***代码清单 9-52***. `Persistence.m`\n\n```\n- (instancetype)init\
    \ {\n  self = [super init];\n  if (self != nil) {\n    // 初始化托管对象模型\n    NSURL\
    \ *modelURL = [[NSBundle mainBundle]\n            URLForResource:@\"MultiThread\"\
    \ withExtension:@\"momd\"];\n    _managedObjectModel = [[NSManagedObjectModel\
    \ alloc]\n            initWithContentsOfURL:modelURL];\n\n// 初始化持久化存储协调器\n   \
    \ NSURL *storeURL = [[self applicationDocumentsDirectory]\n            URLByAppendingPathComponent:@\"\
