- fmt: "### Listing 2-3. Using the `@objc` Attribute to Rename the Class for Objective-C\n\
    \n```swift\nimport Foundation\nimport CoreData\n\n@objc(BookCategory)\nclass BookCategory:\
    \ NSManagedObject {\n\n    @NSManaged var name: String\n\n}\n```\n\nThe `@objc(name)`\
    \ attribute changes the class’s name, as far as any Objective-C classes are concerned,\
    \ to `name`, so we can specify the un-namespaced version that our model specifies.\n\
    \nAccessing the `name` attributes is now even simpler and more familiar than before:\n\
    \n```objc\nBookCategory *myCategory = ....\n// Get the current value for the name\
    \ attribute\nNSString *name = myCategory.name;\n// Set the value for the name\
    \ attribute to Magazines\nmyCategory.name = @\"Magazines\";\n```\n\nIn Swift,\
    \ it looks like the following:\n\n```swift\nvar myCategory = ....\n// Get the\
    \ current value for the name attribute\nvar name: AnyObject! = myCategory.name\n\
    // Set the value for the name attribute to Magazines\nmyCategory.name = \"Magazines\"\
    \n```\n\n## Relationships\n\nAs you normalize your data model, you’ll likely create\
    \ several entities, depending on the complexity of the data you’re modeling. Relationships\
    \ allow you to tie entities together. Core Data allows you to tune the relationships\
    \ you create to accurately reflect how your data relate to each other. Start with\
    \ adding a `Book` entity to your model. At this point, leave it with no attributes\
    \ until we figure out what needs to go there.\n\nIn the BookStore application,\
    \ you can see an obvious relationship between a category and the books it contains.\
    \ For now, we will keep the problem reasonably simple by stating that a book can\
    \ belong to only one category. Let’s reflect this relationship in the model.\n\
    \nSelect the `BookCategory` entity and in the Relationships section, click the\
    \ + button. Xcode creates a new relationship for you to configure. Enter `books`\
    \ for the name, and select `Book` as the destination, and leave the inverse blank\
    \ for now. In the Data Model inspector tab in Xcode, change the type to To Many\
    \ to indicate that this relationship will point to possibly multiple books. This\
    \ is called a one-to-many relationship. [Figure 2-3](#9781430260288_Ch02.xhtml#Fig3)\
    \ shows what the model looks like so far.\n\n![9781430260288_Fig02-03.jpg](images/9781430260288_Fig02-03.jpg)\n\
    \n**Figure 2-3.** A one-to-many relationship\n\nLeaving the `Inverse` field blank\
    \ gives you compiler warnings. You can ignore these warnings and run your application\
    \ without specifying an inverse relationship—after all, these are compiler warnings,\
    \ not compiler errors—but you could face unexpected consequences. Core Data uses\
    \ bidirectional relationship information to maintain the consistency of the object\
    \ graph (hence the Consistency Error) and to manage undo and redo information.\
    \ If you leave a relationship without an inverse, you imply that you will take\
    \ care of the object graph consistency and undo/redo management. The Apple documentation\
    \ strongly discourages this, however, especially in the case of a To-Many relationship.\
    \ When you don’t specify an inverse relationship, the managed object at the other\
    \ end of the relationship isn’t marked as changed when the managed object at this\
    \ end of the relationship changes. Consider, for example, if a player object is\
    \ deleted and it has no inverse relationship back to its team. Any optionality\
    \ rules or delete rules aren’t enforced when the object graph is saved.\n\nIn\
    \ order to comply and help Core Data, add the inverse relationship—that is, for\
    \ a given book, the category that it belongs to. Select the `Book` entity and\
    \ add a new relationship. Set the name to `category`, the destination to `BookCategory`,\
    \ and the inverse to `books`. If you go back to the `BookCategory` entity and\
    \ select the `books` relationship, you will see that its inverse is now automatically\
    \ set as well.\n\n## Relationship Properties\n\nLet’s take a look at the options\
    \ available for configuring relationships. Select the `books` relationship and\
    \ open the Data Model inspector as shown in [Figure 2-3](#9781430260288_Ch02.xhtml#Fig3).\n\
    \nThe first field, Name, becomes the name of the key `NSManagedObject` uses to\
    \ reference the relationship. By convention, it’s the name of the referenced entity\
    \ in lower case. In the case of a To Many relationship, the name field conventionally\
    \ is pluralized. Note that these guidelines are conventions only, but you will\
    \ make your data models more understandable, maintainable, and easier to work\
    \ with if you follow them. You can see that the BookStore data model follows these\
    \ conventions—in the `Book` entity, the relationship to the `BookCategory` entity\
    \ is called `category`. In the `BookCategory` entity, the relationship to the\
    \ `Book` entity, a To Many relationship, is called `books`.\n\nThe Properties\
    \ field has two options, both checkboxes, which you can set independently of each\
    \ other. The first, Transient, allows you to specify that a relationship should\
    \ not be saved to the persistent store. A transient relationship still has support\
    \ for undo and redo operations, but it disappears when the application exits,\
    \ giving the relationship the lifespan of a Hollywood marriage. Some possible\
    \ uses for transient relationships include the following:\n\n* Relationships between\
    \ entities are temporal and shouldn’t survive beyond the current run of the application.\n\
    * Relationship information can be derived from some external source of data, whether\
    \ another Core Data persistent store or some other source of information.\n\n\
    In most cases, you’ll want your relationships to be persistent and you’ll leave\
    \ the Transient checkbox unchecked.\n\nThe second property checkbox, Optional,\
    \ specifies whether this relationship requires a non-`nil` value. Think of this\
    \ like a nullable vs. non-nullable column in a database. If you check the Optional\
    \ checkbox, a managed object of this entity type can be saved to the persistent\
    \ store without having anything specified for this relationship. If unchecked,\
    \ however, saving the context will fail. If the `Book` entity in the data model\
    \ for the BookStore application, for example, left this checkbox unchecked, every\
    \ book entity would have to belong to a category. Setting the `\"category\"` value\
    \ for a book to `nil` (or never setting it at all) would cause all calls to `save:`\
    \ to fail with the following error description, “category is a required value.”\n\
    \nWe cover the next field, Delete Rule, in the next section.\n\nThe Type field\
    \ has two options: To Many and To One. To One means that this relationship has\
    \ exactly one managed object (or zero, depending on optionality settings) on each\
    \ end of the relationship. For the BookStore application, making the `books` relationship\
    \ on the `Category` entity a To One type would mean that only one book could exist\
    \ in a given category, which would obviously be counterintuitive for a book category.\
    \ If the entities were `Frame` and `Picture`, however, a To One type would make\
    \ sense, as a frame typically has only one picture in it. Setting this field to\
    \ To Many means the destination entity can have many managed objects that relate\
    \ to each managed object instance of this entity type.\n\nThe next field, Count,\
    \ sets limits on the number of managed objects of the destination entity type\
    \ that can relate to each managed object of this entity type, and has effect only\
    \ if the type is set to To Many. You can specify values for Minimum and/or Maximum,\
    \ and Core Data will enforce the rules you set. Note that you can set one without\
    \ setting the other—you don’t have to set both. Exceeding the limits you set causes\
    \ the `save:` operation to fail with a “Too many items” or a “Too few items” error\
    \ message. Note that the Optional setting overrides the Minimum Count setting:\
    \ if Optional is checked and Minimum Count is 1, saving the context when the relationship\
    \ count is zero succeeds.\n\n### Delete Rule"
