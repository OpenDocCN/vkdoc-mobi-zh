    Let’s take a moment to examine the method’s logic. First, we grab the Dropbox
    linked account. If there isn’t any (i.e., it is `nil`), then we create one and
    we launch the linking process.


    If the app already has a linked account, then we use it. We set up the Dropbox
    Datastore exactly in the same manner as we explained in the previous section.
    We then create an instance of ParcelKit’s `PKSyncManager`, which is in charge
    of observing changes to Core Data’s managed objects and synching them with Dropbox,
    and also observing changes to object in Dropbox and synching them with Core Data’s
    managed objects. To perform this magic, ParcelKit requires us to tell it which
    Core Data entities we want to observe. In this case, there is only one: the `Event`
    entity, which we want to link with the `Events` table in the Dropbox Datastore.
    Note that though we’ve chosen to match the name of the Core Data entity with the
    Dropbox Datastore table name, they don’t have to match. `PKSyncManager`’s `setTable:forEntityName:`
    allows you to map the two using whatever names you choose.


    Once the `PKSyncManager` instance is fully set up, we must assign it to the `syncManager`
    property in order to keep it alive. Otherwise, it would fall out of scope and
    be destroyed.


    That’s it for all the code we need to write. See, we told you that ParcelKit does
    all the hard work! There is, however, one last bit we need to put in place in
    order to make all this work. ParcelKit requires an additional attribute called
    `syncID` to be set on each entity it observes. This is the key it uses to compare
    the different instances of the entity and ensure that it keeps everything synced
    correctly. Open `DropboxEvents.xcdatamodeld` and add a `syncID` attribute of type
    `String` to the `Event` entity, as shown in [Figure 8-8](#9781430260288_Ch08.xhtml#Fig8).


    ![9781430260288_Fig08-08.jpg](images/9781430260288_Fig08-08.jpg)


    [Figure 8-8](#9781430260288_Ch08.xhtml#_Fig8). The `syncID` attribute set for
    ParcelKit


    Since we’ve modified the Core Data model, you will need to delete the existing
    Core Data data store from the simulator to avoid Core Data model collision. In
    the iPhone simulator, press and hold on the app’s icon. Once it wiggles, press
    the delete button to uninstall it. Then press the home button to exit this mode.


    This time, we’re all set. Launch the application and notice how nothing different
    seems to be happening. Go ahead and add a couple more events. They add without
    any problem. To notice a difference, we need to log into Dropbox’s web view at
    `www.dropbox.com/developers/apps/datastores`. Browse to your data store and you
    should see the events you just created, as illustrated by [Figure 8-9](#9781430260288_Ch08.xhtml#Fig9).


    ![9781430260288_Fig08-09.jpg](images/9781430260288_Fig08-09.jpg)


    [Figure 8-9](#9781430260288_Ch08.xhtml#_Fig9). Dropbox’s Datastore web view


    As you add new events in your app, new records appear in the data store. Now that
    you’ve created a few events, stop the application. Following the same procedure
    as before, uninstall the app from the iPhone simulator. This will erase the local
    Core Data store. With a regular Core Data application, if you launched the app
    again you’d have no events. Go ahead and launch the app and notice how all the
    events are still there. That is because they have been synced with Dropbox’s Datastore
    API.


    Conclusion


    Nowadays, most consumers own multiple devices and they expect their data to be
    omnipresent across those devices. We’ve seen examples of three options for storing
    your data on the cloud and mentioned two more. Many more cloud solutions exist,
    ranging from standard services like the ones we’ve discussed in this chapter to
    custom services that you may develop yourself. No matter which solution you choose,
    the evolution of data storage undeniably leads to a need for cloud storage. People
    will be more likely to download and use your apps if you take care of syncing
    across devices. The decision between iCloud, Dropbox, or other is one that you
    need to make based on your target users, the characteristics specific to your
    app, and whether or not you want to sync data with apps running on non-Apple devices.


    Chapter    9


    Tuning Performance, Memory Usage, and Multithreading


    People want answers. Now. They expect their devices to provide those answers quickly.
    If they believe the applications on their devices are locked up or even just slow,
    they’ll abandon or perhaps even delete them. You can show spinners to indicate
    that your applications are working hard on providing those results, which will
    mollify users somewhat. Giving a visual clue that the device is working beats
    giving no such clue and letting customers think their devices have locked up;
    better still would be to never have episodes of slowness that make users wait.
    You may not always be able to achieve that goal, but you should always try.


    Fetching and storing data in a persistent store can take a long time, especially
    when mounds of data are involved. This chapter will make sure that you understand
    how Core Data helps you—and how you must help yourself—to ensure that you don’t
    pepper your users with “Please Wait” spinners or, worse, an unresponsive application
    that appears locked up while it retrieves or saves large object graphs. You will
    learn how to utilize the various tools and strategies, such as caching, faulting,
    multiple threads, and the Instruments application that comes with Xcode.


    Tuning Performance


    The phrase “tuning performance” conjures an image of a mechanic with a set of
    wrenches, huddled over an engine on his workbench, turning bolts and tweaking
    valves and measuring the effects of his adjustments on the performance of the
    engine. When tuning the performance of your applications, you must have the same
    discipline to make adjustments and measure their effects on overall performance.
    In this chapter, we cover various approaches to improving the performance of your
    applications. You should try out these approaches on the applications you write
    and measure their effects, both in the simulator and on actual iDevices.


