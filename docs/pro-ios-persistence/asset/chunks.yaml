    Prefetching


    Similar to batch faulting, prefetching minimizes the number of times that Core
    Data has to fire faults and go fetch data. With prefetching, though, you tell
    Core Data when you perform a fetch to also fetch the related objects you specify.
    For example, using this chapter’s data model, when you fetch the selfies, you
    can tell Core Data to prefetch the related social networks, people, or both.


    To prefetch related objects, call `NSFetchRequest`’s `setRelationshipKeyPathsForPrefetching:`
    method, passing an array that contains the names of the relationships that you
    want Core Data to prefetch. To prefetch the related social networks and people
    when you fetch the selfies, for example, use the following Objective-C code:


    ```

    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Selfie"];

    [fetchRequest setRelationshipKeyPathsForPrefetching:@[@"socialNetworks", @"people"]];

    NSArray *selfies = [context executeFetchRequest:fetchRequest error:nil];

    ```


    In Swift, it looks like the following:


    ```

    let fetchRequest = NSFetchRequest(entityName: "Selfie")

    fetchRequest.relationshipKeyPathsForPrefetching = ["socialNetwork", "people"]

    let selfies = context.executeFetchRequest(fetchRequest, error: nil) as [Selfie]

    ```


    The lines in bold instruct Core Data to prefetch all the related social networks
    and people when it fetches the selfies. Note that you’ll get no error if the strings
    you pass don’t match any existing relationship names, so check your spelling carefully.
    You may think you’re prefetching relationships, but an errant misspelling may
    be denying your performance gains.


    To test prefetching, create a class called `Prefetch` that conforms to the `PerfTest`
    protocol. In the implementation of `runTestWithContext:`, use essentially the
    same code as `SingleFault`, but this time add a call to `setRelationshipKeyPathsForPrefetching:`,
    passing an array containing the names of the relationships. [Listing 9-35](#9781430260288_Ch09.xhtml#list35)
    shows the code for `Prefetch.m`, and [Listing 9-36](#9781430260288_Ch09.xhtml#list36)
    shows the code for `Prefetch.swift`.


