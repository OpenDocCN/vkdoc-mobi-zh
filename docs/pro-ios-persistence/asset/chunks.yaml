    The `NSOrderedSet` class provides accessors that work with indices, allowing you
    to specify a strict order. [Listing 2-4](#9781430260288_Ch02.xhtml#list4) shows
    the Objective-C method declarations, and [Listing 2-5](#9781430260288_Ch02.xhtml#list5)
