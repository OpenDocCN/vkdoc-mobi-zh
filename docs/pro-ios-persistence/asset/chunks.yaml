  trans: "\n\n最后，调用了`NSFetchedResultsControllerDelegate`的`controllerDidChangeContent:`方法。`MasterViewController`的实现通知表视图结束其更新，如[代码清单\
    \ 5-17]（Objective-C）和[代码清单 5-18]（Swift）所示。\n\n[**代码清单 5-17**] `controllerDidChangeContent:`\
    \ 方法（Objective-C）\n\n```\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller {\n  [self.tableView endUpdates];\n}\n```\n\n[**代码清单 5-18**] `controllerDidChangeContent:`\
    \ 方法（Swift）\n\n```\nfunc controllerDidChangeContent(controller: NSFetchedResultsController)\
    \ {\n    self.tableView.endUpdates()\n}\n```\n\n### 删除事件\n\n生成的应用程序允许您从主表中删除`Event`实例，可以通过在表格单元格上向左滑动并点击出现的删除按钮，或者点击导航栏左侧的编辑链接，点击表格单元格左侧的删除图标，然后点击删除按钮。完成后不要忘记点击完成链接。\n\
    \n当您从表中删除一行时，将调用`tableView:commitEditingStyle:forRowAtIndexPath:`方法，并传入`UITableViewCellEditingStyleDelete`编辑样式。该实现会检查该样式，从`fetchedResultsController`中删除相应的对象，并保存托管对象上下文。[代码清单\
    \ 5-19]（Objective-C）和[代码清单 5-20]（Swift）展示了此代码。\n\n[**代码清单 5-19**] 从表和 Core Data\
    \ 存储中删除一行（Objective-C）\n\n```\n- (void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
    \ forRowAtIndexPath:(NSIndexPath *)indexPath {\n  if (editingStyle == UITableViewCellEditingStyleDelete)\
    \ {\n    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
    \    [context deleteObject:[self.fetchedResultsController objectAtIndexPath:indexPath]];\n\
    \n    NSError *error = nil;\n    if (![context save:&error]) {\n      // 将此实现替换为适当处理错误的代码。\n\
    \      // abort() 会导致应用程序生成崩溃日志并终止。您不应在发布的应用程序中使用此函数，尽管它在开发中可能有用。\n      NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n      abort();\n    }\n\
    \  }\n}\n```\n\n[**代码清单 5-20**] 从表和 Core Data 存储中删除一行（Swift）\n\n```\noverride\
    \ func tableView(tableView: UITableView, commitEditingStyle editingStyle: UITableViewCellEditingStyle,\
    \ forRowAtIndexPath indexPath: NSIndexPath) {\n  if editingStyle == .Delete {\n\
    \      let context = self.fetchedResultsController.managedObjectContext\n    \
    \  context.deleteObject(self.fetchedResultsController.objectAtIndexPath(indexPath)\
    \ as NSManagedObject)\n\n      var error: NSError? = nil\n      if !context.save(&error)\
    \ {\n          // 将此实现替换为适当处理错误的代码。\n          // abort() 会导致应用程序生成崩溃日志并终止。您不应在发布的应用程序中使用此函数，尽管它在开发中可能有用。\n\
    \          //println(\"Unresolved error \\(error), \\(error.userInfo)\")\n   \
    \       abort()\n      }\n  }\n}\n```\n\n与添加行类似，删除行会触发调用前一节“添加事件”中讨论的三个`NSFetchedResultsControllerDelegate`协议方法。\n\
    \n### 显示详情\n\n您可以在`MasterViewController`的`prepareForSegue:sender:`方法中找到对`fetchedResultsController`的最后一次引用，当您点击主视图表中的一行时会调用该方法。此实现从`fetchedResultsController`中提取被点击行的托管对象，并将其交给详情视图控制器进行显示，如[代码清单\
    \ 5-21]（Objective-C）和[代码清单 5-22]（Swift）所示。\n\n[**代码清单 5-21**] `prepareForSegue:sender:`\
    \ 方法（Objective-C）\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\
    \ {\n  if ([[segue identifier] isEqualToString:@\"showDetail\"]) {\n    NSIndexPath\
    \ *indexPath = [self.tableView indexPathForSelectedRow];\n    NSManagedObject\
    \ *object = [[self fetchedResultsController] objectAtIndexPath:indexPath];\n \
    \   [[segue destinationViewController] setDetailItem:object];\n  }\n}\n```\n\n\
    [**代码清单 5-22**] `prepareForSegue:sender:` 方法（Swift）\n\n```\noverride func prepareForSegue(segue:\
    \ UIStoryboardSegue, sender: AnyObject?) {\n  if segue.identifier == \"showDetail\"\
    \ {\n      if let indexPath = self.tableView.indexPathForSelectedRow() {\n   \
    \       let object = self.fetchedResultsController.objectAtIndexPath(indexPath)\
    \ as NSManagedObject\n          (segue.destinationViewController as DetailViewController).detailItem\
    \ = object\n      }\n  }\n}\n```\n\n现在我们准备在生成的应用程序基础上构建 CoreDump 应用程序。\n\n###\
    \ 更新 Core Data 模型\n\n要构建 CoreDump 应用程序，我们必须修改 Core Data 模型以存储我们想要的 bug 追踪器数据。CoreDump\
    \ 将存储项目列表以及每个项目的 bug 列表。对于每个项目，我们存储：\n\n*   项目名称\n*   项目 URL\n*   托管服务\n\n对于每个\
    \ bug，我们存储：\n\n*   Bug 标题\n*   Bug 详情\n\n从 Core Data 模型中删除`Event`实体，并创建两个实体：`Project`和`Bug`。对于`Project`，添加以下属性：\n\
    \n*   `name`——`String`类型的属性\n*   `url`——`String`类型的属性\n*   `host`——`String`类型的属性\n\
    *   `bugs`——一个可选的对`Bug`的**对多**关系，删除规则设置为**级联**\n\n对于`Bug`实体，添加以下属性：\n\n*   `title`——`String`类型的属性\n\
    *   `details`——`String`类型的属性\n*   `project`——一个**必需**的对`Project`的**对一**关系，删除规则设置为**置空**。不要忘记将反向关系设置为`bugs`。\n\
    \n完成更新 Core Data 模型后，它应该看起来像[图 5-3]。\n\n![9781430260288_Fig05-03.jpg](img/9781430260288_Fig05-03.jpg)\n\
    \n[图 5-3] 更新后的 Core Data 模型\n\n不要忘记删除旧数据模型生成的数据库，否则尝试运行时应用程序将崩溃。\n\n### 生成模型类\n\
    \n尽管我们可以在整个 CoreDump 应用程序中使用原始的`NSManagedObject`实例，但我们更倾向于从 Core Data 模型生成类。创建一个新的\
    \ NSManagedObject 子类，选择 CoreDump 数据模型，然后同时选择 Project 和 Bug 实体，以生成`Project`和`Bug`类。如果您使用\
    \ Swift，请记住修复生成类中的命名空间。您的选项是：\n\n*   将项目名称放在 Core Data 模型中每个实体的类字段中（即`CoreDump.Project`和`CoreDump.Bug`）\n\
    *   在生成的类文件中使用`@objc`关键字（即`@objc(Project)`和`@objc(Bug)`）\n\n### 更新获取的结果控制器\n\n"
