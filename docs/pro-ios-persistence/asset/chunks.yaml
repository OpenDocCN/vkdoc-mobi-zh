    The application we build in this chapter is a bug tracker called CoreDump. The
    first screen, the Master view, shows a list of projects—each with a name and a
    uniform resource locator (URL). We group the displayed projects by their URLs’
    domain names, so that BitBucket projects are grouped together, GitHub projects
    are grouped together, and so on. We can then drill into any project to see a list
    of bugs associated with that project. We can add bugs to a project as well. By
