  trans: "\n创建一个名为 `BugViewController` 的新 Cocoa Touch 类文件，并将其设置为 `UIViewController`\
    \ 的子类。勾选**同时创建 XIB 文件**复选框，选择你的语言，然后按照提示创建文件。打开 `BugViewController.h` 或 `BugViewController.swift`，并添加以下内容：\n\
