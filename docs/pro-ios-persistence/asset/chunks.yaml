    # 排版后内容


    最后，我想用一段话献给本书的合著者，他至少在公开场合拒绝承认自己很出色。罗伯·华纳热爱创作高质量的作品。他痴迷于软件设计和语言之美，甚至能将代码转化为散文。我感谢他让我有机会再次与他合作。


    ——迈克尔·普里瓦


    我的女儿莱拉多次提醒我，她应该在这本书中得到比过去作品中更多的“主角”待遇，所以这是我向她和我其余家人展示他们在我的生命中是多么闪耀的星星的机会。我爱我美丽的妻子雪莉，以及我出色的孩子们：泰森、雅各布、马洛里、卡米和莱拉。我感谢他们的鼓励和支持——即使这种鼓励的表现形式是叫我“书呆子”。我无比幸运，你们都在我的生命里。


    我也感谢我的父母，他们为我们买了第一台电脑（一台雅达利 400），鼓励我们学习，并且会购买我写的每一本书，尽管他们从未读过。我的兄弟姐妹和姻亲们总是很擅长询问书的进展，并礼貌地对书中的主题表现出兴趣。我有一个很棒的家庭。


    与 Apress 的出色同仁们一起，这又是一次极好的写作经历，我感谢他们的耐心和洞察力。将一本书付诸实践所需要的庞大团队从未如此显而易见，因此我现在比以往任何时候都更清楚，有许多人为这本书的出版投入了默默无闻的时间和精力。特别感谢史蒂夫·安格林、吉尔·巴尔扎诺、安娜米卡·潘丘、马修·穆迪、道格拉斯·庞迪克、罗恩·纳塔莉，以及所有其他参与本书出版工作的人。


    同样感谢我们所有的读者提出的问题、反馈、赞扬和批评。我们倾注心血，尽力提供最好的信息，并且一直在寻求改进内容或使其更易于理解的方法。


    能与迈克尔再次合作另一个项目，是我莫大的荣幸。我始终希望他不要对我感到厌倦，因为每次与他合作我都学到很多。我感谢他的耐心、奉献、坚持和专业精神。


    我效力于一家很棒的公司。Availity 给了我每天创造价值、做出改变的机会。与如此多的聪明人共事，让我时刻保持警醒！当然，篇幅所限，我无法一一列出他们的名字，但我要特别感谢领导团队（特伦特·加瓦齐、杰克·亨特、玛丽·安妮·奥伦丘克、塔琳·特雷斯卡和史蒂夫·沃恩）的支持。也感谢杰夫·帕克伍德定期检查，确保我们朝着目标稳步推进。我还每天与一个出色的团队——洛里·克里尔、玛丽·霍恩、罗伯特·麦吉尼斯、罗伯特·文特罗内和安伯·威尔逊——一起工作，努力创造卓越。


    ——罗伯·华纳


    # 引言


    世界已经进入移动时代，而 iOS 应用似乎引领着这一潮流。人们使用 iPhone、iPad，很快还将包括 Apple Watch 来消费、生产和存储多样化的信息。当你在这些苹果设备上开发应用时，你会欣赏到苹果在其持久化框架
    Core Data 上所展现的精湛工艺。没有其他移动平台能提供在强大性、易用性或灵活性上比肩 Core Data 的持久化层。随着 iOS 软件开发工具包的每次发布，苹果都在发展和改进
    Core Data 框架。


    随着 Core Data 的持续发展，我们已将本书撰写并重写了多次。去年夏天，就在本书即将完成之际，苹果宣布了其新的 Swift 编程语言，让我们所有人都感到惊讶。经过我们之间的讨论以及与
    Apress 同仁的商议，我们得出结论，应对 Swift 问世的恰当做法是重新编写，并将本书中的每个示例都用 Objective-C 和 Swift 两种语言呈现。当然，这次经历给我们留下了一些“伤痕”，所有
    Swift 的早期采用者都可以作证。随着每个新版本 Xcode 的发布，我们不得不重新审视那些我们认为已经完成的章节，因为有些代码片段在新版 Xcode 下不再能编译通过。我们相信已经捕获了所有错误的
    `?` 和 `!`，但如果有遗漏，我们在此预先致歉。


    ## 你需要准备什么


    要跟随本书学习，你需要一台运行 OS X Mavericks 或 OS X Yosemite 的 Mac 电脑，并且需要 Xcode 6。如果你运行的是 Xcode
    6 的最新点版本（尤其当你使用 Swift 代码示例时），你的体验会最好。Xcode 的每个新版本都在不断改进对 Swift 语言的支持。你可以从 Mac
    App Store 下载最新版本的 Xcode 6。


    本书不涵盖 iOS 开发的入门知识（无论是 Objective-C 还是 Swift），因此你应至少具备 Objective-C 或 Swift 的基础知识，同时了解
    Cocoa Touch 和 iOS 开发。


    ## 你将发现什么


    本书从理论和实践两个角度探讨 iOS 持久化与 Core Data，因此你将了解 Core Data 的一般工作原理及其各个部分的组合方式，同时还将获得分步指导，了解如何将这个强大的持久化框架整合到你的应用中。你将看到我们如何用
    Objective-C 和 Swift 实现所讨论的每个主题。我们涵盖了一系列主题，包括如何构建 Core Data 数据模型、如何查询数据、如何在模型版本间迁移数据、如何加密数据、如何在不同线程上使用
    Core Data、如何在云端存储数据，以及如何调整性能。


    你可以从头到尾通读本书，但为了获得最佳效果，我们建议你在电脑前阅读，亲手输入代码示例，以理解它们的工作原理和功能。我们还建议你将本书作为应对持续遇到的 Core
    Data 需求和挑战的参考书。


    ## 本书的组织方式


    我们将本书组织为从基本原理逐步深入到高级主题，因此从头到尾通读本书，你可能会收获最大。不过，各章的标题清晰地标明了其所包含的主题，因此如果你正在寻找特定主题的信息，可以直接跳到该章。


    ## 源代码与勘误


    你可以从 Apress 网站 `www.apress.com` 下载本书的源代码。我们已在 MIT 许可证 (`http://opensource.org/licenses/MIT`)
    下发布了所有代码，因此你可以在自己的项目（无论是个人项目还是商业项目）中自由使用。请查看 Apress 网站上的勘误部分，以获取对代码或文本的任何更正。


    ## 如何联系我们


    我们期待你的来信！你可以通过以下方式找到我们：


    迈克尔·普里瓦


    电子邮件: `mprivat@mac.com`


    推特: `@michaelprivat`


    博客: `http://michaelprivat.com`


    罗伯·华纳


    电子邮件: `rwarner@grailbox.com`


    推特: `@hoop33`


    App.net: `@hoop33`


    博客: `http://grailbox.com`


    # 第 1 章：初识 Core Data


    你钱包或口袋里的那台电脑——那台据称可以打电话的设备——存储着好几 GB 的数据：照片、电子邮件、短信、推文、餐厅评论、高分成绩、书籍、你的朋友早餐吃了什么，以及无数种其他由
    0 和 1 组成的信息，这些信息每天为你提供信息和娱乐。作为苹果提供的数据管理方案，Core Data 管理者其中很大一部分信息，并且由 Core Data
    管理的 iOS 设备上的信息比例还在持续增长。在本章中，我们将探讨其原因。

