    Sorting


    Until now, we’ve accepted the output order of any fetch request as Core Data chose
    to return it, but Core Data allows you to set a sort order for any fetch request.
    You can select multiple columns for the sort, as well as the sort direction for
    each column. To sort a fetch request, you set the fetch request’s `sortDescriptors`
    property to an array of `NSSortDescriptor` instances. Each `NSSortDescriptor`
    stores the column (or property) it sorts on, as well as the order to sort.


    To sort all the words that start with "z" in ascending length order, for example,
    you’d create an `NSSortDescriptor` as follows:


    ```

    [NSSortDescriptor sortDescriptorWithKey:@"length" ascending:YES] // Objective-C

    NSSortDescriptor(key: "length", ascending: true) // Swift

    ```


    That would sort the words in ascending length order but arbitrarily sort the words
    that have the same length. We can add another sort descriptor that sorts the words
    in descending alphabetical order, as follows:


    ```

    [NSSortDescriptor sortDescriptorWithKey:@"text" ascending:NO] // Objective-C

    NSSortDescriptor(key: "text", ascending: false) // Swift

    ```


    The order in which you put your sort descriptors in the array that you use to
    set your fetch request’s `sortDescriptors` is significant. The results will be
    sorted according to the order of the sort descriptors. In our example, that means
    that words of the same length will be grouped together, sorted in descending alphabetical
    order.


    [Listing 3-54](#9781430260288_Ch03.xhtml#list54) (Objective-C) and [Listing 3-55](#9781430260288_Ch03.xhtml#list55)
    (Swift) show the `zWords` method that sorts the words starting with "z" using
    those two sort descriptors.


    [***Listing 3-54***](#9781430260288_Ch03.xhtml#_list54). Sorting the Results in
