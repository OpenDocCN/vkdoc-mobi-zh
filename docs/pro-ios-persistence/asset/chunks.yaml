- fmt: '# 排版后内容


    Finally, I would like to dedicate a paragraph to the coauthor of this book, who
    refuses to admit, publicly at least, that he’s awesome. Rob Warner loves producing
    quality work. He is infatuated with the beauty of software designs and languages
    and can even turn code into prose. I thank him for the opportunity to work with
    him once again.


    —Michael Priva


    My daughter Leila has reminded me several times that she merits more of a starring
    role in this book than I’ve given her in past books, so this is my opportunity
    to show her and the rest of my family what stars they are in my life. I love my
    beautiful wife, Sherry, and my wonderful children, Tyson, Jacob, Mallory, Camie,
    and Leila. I’m grateful for their encouragement and support—even when said encouragement
    takes the form of calling me a nerd. I’m so blessed y’all are in my life.


    I’m also thankful to my parents, who bought us our first computer (an Atari 400),
    encouraged our learning, and buy copies of every book I write even though they
    never read them. My siblings and in-laws always do a great job of asking how the
    book is coming and politely feigning interest in the subject matter. I have a
    great family.


    This has been another great writing experience with the incredible folks at Apress,
    and I thank them for their patience and insight. The army of folks required to
    bring a book to fruition has never been more apparent, so I’m clearer now than
    I’ve ever been that many people have invested thankless time and effort into this
    book’s publication. Special thanks to Steve Anglin, Jill Balzano, Anamika Panchoo,
    Matthew Moodie, Douglas Pundick, Ron Natalie, and anyone else who had a hand in
    publishing this book.


    Thanks as well to all our readers for their questions, feedback, praise, and criticism.
    We pour our minds and hearts into making this the best information we can, and
    we are always seeking for ways to improve the material or make it more accessible.


    Working with Michael on yet another project is an amazing privilege. I continue
    to hope he doesn’t tire of me, as I learn so much every time I work with him.
    I thank him for his patience, dedication, persistence, and expertise.


    I work for an amazing company. Availity gives me the opportunity to produce and
    make a difference every day. Working with an array of such bright people keeps
    me on my toes! I don’t have space to name them all, of course, but I’ll add a
    particular thanks to the folks in leadership (Trent Gavazzi, Jack Hunt, Mary Anne
    Orenchuk, Taryn Tresca, and Steve Vaughn) for their support. Thanks as well to
    Geoff Packwood for periodically checking in to make sure we’re moving the pile
    forward. I also get to work every day with an awesome team—Lori Creel, Mary Horn,
    Robert McGuinness, Robert Ventrone, and Ambur Wilson—as we try to build greatness.


    —Rob Warner


    # Introduction


    The world has gone mobile, and it seems that iOS apps lead the charge. People
    use their iPhone, iPads, and soon their Apple Watches to consume, produce, and
    store a diversity of information. As you develop applications to run on these
    Apple devices, you’ll appreciate the polish that Apple has spread on its persistence
    framework: Core Data. No other mobile platform offers a persistence layer that
    approaches Core Data’s power, ease of use, or flexibility. With each release of
    the iOS Software Development Kit (SDK), Apple grows and improves the Core Data
    framework.


    We’ve written and rewritten this book several times as Core Data has continued
    to grow. Last summer, as we neared completion of this book, Apple surprised us
    all with the announcement of its new Swift programming language. After discussion
    between ourselves and with the folks at Apress, we concluded that the proper response
    to Swift’s advent was to rewrite anew and incorporate every example in this book
    in both Objective-C and Swift. We have some bruises and scars from that experience,
    of course, as all the Swift early adopters can attest. With each new release of
    Xcode, we had to revisit chapters we thought done because some bits of code no
    longer compiled under the new Xcode. We believe we’ve caught all the errant `?`s
    and `!`s, but apologize in advance if any slipped through.


    ## What You’ll Need


    To follow along with this book, you’ll need a Mac running OS X Mavericks or OS
    X Yosemite, and you’ll need Xcode 6. You’ll be happiest if you’re running the
    latest point version of Xcode 6, particularly if you use the Swift code samples.
    Language support for Swift continues to improve with each release of Xcode. You
    can download the latest version of Xcode 6 from the Mac App Store.


    This text doesn’t cover beginning iOS development, whether in Objective-C or Swift,
    so you should have at least a basic understanding of either Objective-C or Swift,
    and also of Cocoa Touch and iOS development.


    ## What You’ll Find


    This book approaches iOS persistence and Core Data from both theoretical and practical
    perspectives, so you’ll learn generally how Core Data works and how its pieces
    fit together, and also you’ll be guided step-by-step how to incorporate this powerful
    persistence framework into your applications. You’ll see how to implement every
    topic we treat both in Objective-C and in Swift. We cover a range of topics, including
    how to build your Core Data data models, how to query your data, how to migrate
    data across model versions, how to encrypt data, how to use Core Data on different
    threads, how to store data in the cloud, and how to tune performance.


    You can read the book cover to cover, but for the best results we recommend you
    read it in front of your computer, typing in the code samples to understand how
    they work and what they do. We also recommend that you keep this book as a reference
    for your ongoing Core Data needs and challenges.


    ## How This Book Is Organized


    We’ve organized this book to build from basic principles to advanced topics, so
    you’ll probably gain the most if you work through the book from front to back.
    Chapter titles clearly mark the subject matter they contain, however, so if you’re
    looking for information on a specific topic, feel free to jump directly to that
    chapter.


    ## Source Code and Errata


    You can download the source code for this book from the Apress web site at `www.apress.com`.
    We’ve released all the code under the MIT license (`http://opensource.org/licenses/MIT`),
    so feel free to use it in your own projects, whether personal or commercial. Check
    the errata section of the Apress web site for any corrections to code or text.


    ## How to Contact Us


    We’d love to hear from you! You can find us here:


    Michael Privat


    Email: `mprivat@mac.com`


    Twitter: `@michaelprivat`


    Blog: `http://michaelprivat.com`


    Rob Warner


    Email: `rwarner@grailbox.com`


    Twitter: `@hoop33`


    App.net: `@hoop33`


    Blog: `http://grailbox.com`


    # Chapter 1: Touring Core Data


    That computer in your purse or pocket—the one that purportedly places phone calls—stores
    gigabytes’ worth of data: pictures, e-mails, texts, tweets, restaurant reviews,
    high scores, books, what your friends ate for breakfast, and countless other combinations
    of zeros and ones that inform and entertain you every day. As Apple’s offering
    to manage data, Core Data manages much of that information, and the percentage
    of Core Data–managed information on iOS devices continues to grow. In this chapter,
    we’ll discover why.'
