    \n## 处理验证错误\n\n如果你在Core Data模型中为任何属性配置了验证参数，并且允许用户输入未自动满足这些验证参数的值，那么你可能会遇到验证错误。验证操作确保数据的完整性；Core\
    \ Data不会将任何你声明为无效的数据存储到持久化存储中。然而，仅仅因为你创建了验证规则，并不意味着用户知道这些规则——或者他们知道自己可能会违反规则。如果你保留Xcode生成的错误处理机制，即使用户输入了无效数据，他们也不会意识到自己违反了验证规则。结果只会是应用崩溃，并记录一个用户永远看不到的冗长堆栈跟踪。困惑的用户面对崩溃的应用，却不知道原因或如何防止其再次发生。与其在用户输入无效数据时崩溃，不如提醒用户，并给他们纠正数据的机会。\n\
    \n数据库端的验证可能是一个有争议的话题，而且理由充分。你可以通过将验证规则放入数据模型来保护数据的完整性，但这可能会使你的编码任务更加困难。数据模型中的验证规则是一种概念上听起来不错，但在实践中却不太理想的做法。例如，你能想象使用Oracle在Web应用中进行字段验证吗？是的，你可以做到，但其他方法可能更简单、更友好且架构更优。在代码中验证用户输入的值，甚至设计防止无效输入的用户界面，都会让你的工作更轻松，也让用户体验更好。\n\
    \n尽管如此，我们仍将继续概述一种处理验证错误的可能策略。不过，别说我们没提醒过你。\n\n## 检测验证错误\n\n检测用户是否输入了无效数据很简单：只需检查传递给托管对象上下文的`save:`方法的`NSError`对象（如果发生错误）。`NSError`对象包含导致`save:`方法失败的错误代码，如果该代码与[Table\
    \ 4-1](#9781430260288_Ch04.xhtml#Tab1)中显示的Core Data验证错误代码之一匹配，你就知道尝试保存的部分数据无效。你可以使用`NSError`的`userInfo`字典来查找关于错误原因的更多信息。注意，如果发生了多个错误，错误代码为`1560`（`NSValidationMultipleErrorsError`），并且`userInfo`字典中在键`NSDetailedErrorsKey`下保存了其余的错误代码。\n\
    \n**Table 4-1**. Core Data验证错误\n\n| 常量 | 代码 | 描述 |\n| --- | --- | --- |\n| `NSManagedObjectValidationError`\
    \ | 1550 | 通用验证错误 |\n| `NSValidationMultipleErrorsError` | 1560 | 包含多个验证错误的通用消息\
    \ |\n| `NSValidationMissingMandatoryPropertyError` | 1570 | 非可选属性值为`nil` |\n|\
    \ `NSValidationRelationshipLacksMinimumCountError` | 1580 | 多对多关系中目标对象数量过少 |\n\
    | `NSValidationRelationshipExceedsMaximumCountError` | 1590 | 有界多对多关系中目标对象数量过多\
    \ |\n| `NSValidationRelationshipDeniedDeleteError` | 1600 | 具有`NSDeleteRuleDeny`的关系非空\
    \ |\n| `NSValidationNumberTooLargeError` | 1610 | 某个数值过大 |\n| `NSValidationNumberTooSmallError`\
    \ | 1620 | 某个数值过小 |\n| `NSValidationDateTooLateError` | 1630 | 某个日期值过晚 |\n| `NSValidationDateTooSoonError`\
    \ | 1640 | 某个日期值过早 |\n| `NSValidationInvalidDateError` | 1650 | 某个日期值不匹配日期模式 |\n\
    | `NSValidationStringTooLongError` | 1660 | 某个字符串值过长 |\n| `NSValidationStringTooShortError`\
    \ | 1670 | 某个字符串值过短 |\n| `NSValidationStringPatternMatchingError` | 1680 | 某个字符串值不匹配某个模式\
    \ |\n\n你可以选择实现一个熟悉数据模型、只检查特定错误的错误处理例程，或者编写一个能处理所有验证错误的通用错误处理例程。虽然通用例程扩展性更好，并且无论数据模型如何变化都应能继续工作，但更具体的错误处理例程可能让你在消息和响应中对用户更有帮助。没有哪个答案是正确的——如何处理验证错误的选择权在你手中。\n\
    \n要编写一个真正通用的验证错误处理例程需要做大量工作。需要考虑的一点是，`NSError`对象包含关于所发生错误的大量信息，但可能不足以告诉用户验证失败的原因。例如，假设你有一个实体`Foo`，其属性`bar`必须至少包含五个字符。如果用户为`bar`输入了“abc”，你将收到一条`NSError`消息，其中包含错误代码（`1670`）、实体（`Foo`）、属性（`bar`）以及验证失败的值（abc）。`NSError`对象不会告诉你abc为何太短——它不包含`bar`至少需要五个字符的信息。要得出这一结论，你必须向`Foo`实体询问`bar`属性的`NSPropertyDescription`，获取该属性描述的验证谓词，并遍历这些谓词以查看`bar`的最小长度。这是一个崇高的目标，但繁琐且通常过于复杂。这是违反“不要重复自己”（DRY）原则、让代码了解一些数据模型信息可能是更好答案的一个例子。"
