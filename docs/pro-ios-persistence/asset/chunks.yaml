    Creating the View and Displaying the Taps


    To display the `Tap` instances, we first fetch them from Core Data. Then, we iterate
    through them, drawing them on the view using standard drawing primitives. Add
    a method called `taps` to `Persistence` that fetches all the `Tap` instances from
    the Core Data store. This code should be familiar, as it’s standard code for fetching
    objects from Core Data. [Listing 7-15](#9781430260288_Ch07.xhtml#list15) shows
    the method declaration in `Persistence.h`, [Listing 7-16](#9781430260288_Ch07.xhtml#list16)
    shows the Objective-C definition in `Persistence.m`, and [Listing 7-17](#9781430260288_Ch07.xhtml#list17)
    shows the Swift definition in `Persistence.swift`.


    [***Listing 7-15***](#9781430260288_Ch07.xhtml#_list15). Declaring the `taps`
    Method in `Persistence.h`


    ```

    - (NSArray *)taps;

    ```


    [***Listing 7-16***](#9781430260288_Ch07.xhtml#_list16). Fetching All the `Tap`
    Instances in `Persistence.m`


    ```

    - (NSArray *)taps {

      NSError *error = nil;

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Tap"];

      NSArray *taps = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:&error];

      if (taps == nil) {

        NSLog(@"Error fetching taps %@, %@", error, [error userInfo]);

      }

      return taps;

    }

    ```


    [***Listing 7-17***](#9781430260288_Ch07.xhtml#_list17). Fetching All the `Tap`
    Instances in `Persistence.swift`


    ```

    func taps() -> [Tap] {

        var error: NSError? = nil

        let fetchRequest = NSFetchRequest(entityName: "Tap")

        let taps = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    &error)


    return taps as [Tap]

    }

    ```


    Now create a class called `TapView` that extends `UIView`. In the `drawRect:`
    method, fetch the `Tap` instances using the method you just created, and then
    iterate through them to draw them on the screen as circles, centered on their
    x and y values, in the color stored in Core Data. [Listing 7-18](#9781430260288_Ch07.xhtml#list18)
    shows `TapView.h`, [Listing 7-19](#9781430260288_Ch07.xhtml#list19) shows the
    Objective-C `TapView.m`, and [Listing 7-20](#9781430260288_Ch07.xhtml#list20)
    shows the Swift `TapView.swift`.


