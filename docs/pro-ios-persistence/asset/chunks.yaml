    Also worth noting is that the Objective-C version takes advantage of the dynamically-generated
    `addBooks:` method for adding books. Since Swift doesn’t have that support, we
    instead must retrieve the mutable set of books using `NSManagedObject`’s `mutableSetValueForKeyPath`
    function, and then add the books to the `NSManagedSet` object that it returns.


    [***Listing 2-11***](#9781430260288_Ch02.xhtml#_list11). The Objective-C `initStore`
    Method for Adding New Objects


    ```

    - (void)initStore {

      BookCategory *fiction = [NSEntityDescription insertNewObjectForEntityForName:@"BookCategory"
    inManagedObjectContext:self.managedObjectContext];

      fiction.name = @"Fiction";


    BookCategory *biography = [NSEntityDescription insertNewObjectForEntityForName:@"BookCategory"
    inManagedObjectContext:self.managedObjectContext];

      biography.name = @"Biography";


    Book *book1 = [NSEntityDescription insertNewObjectForEntityForName:@"Book" inManagedObjectContext:self.managedObjectContext];

      book1.title = @"The first book";

      book1.price = 10;


    Book *book2 = [NSEntityDescription insertNewObjectForEntityForName:@"Book" inManagedObjectContext:self.managedObjectContext];

      book2.title = @"The second book";

      book2.price = 15;


    Book *book3 = [NSEntityDescription insertNewObjectForEntityForName:@"Book" inManagedObjectContext:self.managedObjectContext];

      book3.title = @"The third book";

      book3.price = 10;


    [fiction addBooks:[NSSet setWithArray:@[book1, book2]]];

      [biography addBooks:[NSSet setWithArray:@[book3]]];


    [self.managedObjectContext save:nil];

    }

    ```


    [***Listing 2-12***](#9781430260288_Ch02.xhtml#_list12). The Swift `initStore`
    function;. for Adding New Objects


    ```

    func initStore() {

      var fiction = NSEntityDescription.insertNewObjectForEntityForName("BookCategory",
    inManagedObjectContext: self.managedObjectContext) as BookCategory

      fiction.name = "Fiction"


    var biography = NSEntityDescription.insertNewObjectForEntityForName("BookCategory",
    inManagedObjectContext: self.managedObjectContext) as BookCategory

      biography.name = "Biography"


    var book1 = NSEntityDescription.insertNewObjectForEntityForName("Book", inManagedObjectContext:
    self.managedObjectContext) as Book

      book1.title = "The first book"

      book1.price = 10


    var book2 = NSEntityDescription.insertNewObjectForEntityForName("Book", inManagedObjectContext:
    self.managedObjectContext) as Book

      book2.title = "The second book"

      book2.price = 15


    var book3 = NSEntityDescription.insertNewObjectForEntityForName("Book", inManagedObjectContext:
    self.managedObjectContext) as Book

      book3.title = "The third book"

      book3.price = 10


    var fictionRelation = fiction.mutableSetValueForKeyPath("books")

      fictionRelation.addObject(book1)

      fictionRelation.addObject(book2)


    var biographyRelation = biography.mutableSetValueForKeyPath("books")

      biographyRelation.addObject(book3)


    self.saveContext()

    }

    ```


    The code is easy to read. Note, however, that you can’t allocate a managed object
    directly. Instead, you must obtain it from the managed object context. That is,
    of course, so the context can manage it.


    The `initStore` method creates two categories and three books. It adds the two
    first books to the “fiction” category and the third book to the “biography” category.
    We purposely overlooked the `Page` entity here to not overcrowd the example.


    Launch the app to execute this code. Once you get the white screen on the simulator,
    you can quit. In [Chapter 1](#9781430260288_Ch01.xhtml) we showed you how to find
    and view the SQLite store that backs your data store. Open the database file,
    `BookStore.sqlite`, with `sqlite3` in a Terminal window.


    The `.schema` command confirms that our data model is correctly created.


    ```

    sqlite> .schema

    CREATE TABLE ZBOOK ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZCATEGORY
    INTEGER, ZPRICE FLOAT, ZTITLE VARCHAR);

    CREATE TABLE ZBOOKCATEGORY ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZNAME VARCHAR);

    CREATE TABLE ZPAGE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZBOOK
    INTEGER, Z_FOK_BOOK INTEGER, ZTEXT VARCHAR);

    CREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST
    BLOB);

    CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER
    INTEGER, Z_MAX INTEGER);

    CREATE INDEX ZBOOK_ZCATEGORY_INDEX ON ZBOOK (ZCATEGORY);

    CREATE INDEX ZPAGE_ZBOOK_INDEX ON ZPAGE (ZBOOK);

    ```


    And a couple of queries show that our data have been loaded:


    ```

    sqlite> .header on

    sqlite> .mode column

    sqlite> select * from ZBOOKCATEGORY;

    Z_PK        Z_ENT       Z_OPT       ZNAME

    ----------  ----------  ----------  ----------

    1           2           1           Biography

    2           2           1           Fiction

    sqlite> select * from ZBOOK;

    Z_PK        Z_ENT       Z_OPT       ZCATEGORY   ZPRICE      ZTITLE

    ----------  ----------  ----------  ----------  ----------  --------------

    1           1           1           1           10.0        The third book

    2           1           1           2           10.0        The first book

    3           1           1           2           15.0        The second boo

    ```


    Of course, we if run the application once again, new entities will be loaded and
    we will have duplicates.


    ```

    sqlite> select * from ZBOOKCATEGORY;

    Z_PK        Z_ENT       Z_OPT       ZNAME

    ----------  ----------  ----------  ----------

    1           2           1           Fiction

    2           2           1           Biography

    3           2           1           Biography

    4           2           1           Fiction

    ```


    This is because the `initStore` method assumes (wrongfully) that the store is
    empty when it runs. We could, of course, create a new persistent store upon startup
    by deleting the `BookStore.sqlite` file, but this might be a little overdone.
    There may be information from previous sessions we might want to use in the future.
    For safety, we will simply clear the entities we care about.'
  trans: "```swift\n@NSManaged var title: String\n@NSManaged var price: Float\n@NSManaged\
    \ var category: BookCategory\n@NSManaged var pages: NSOrderedSet\n```\n\n在 Objective-C\
    \ 版本中，请注意 Core Data 如何自动添加了合适的集合访问器，从而使我们能够轻松地使用对象及其属性。然而，Swift 版本无法生成相应的运行时访问器，因此这些访问器并不存在。\n\
    \n## 插入新的托管对象\n\n在完善了 Core Data 数据模型之后，我们就可以向其填充对象了。应用程序启动时，我们想用一些类别和书籍来填充 Core\
    \ Data 存储。目前，我们将使用硬编码的数据。打开 `AppDelegate.m`（Objective-C）或 `AppDelegate.swift`（Swift），编辑\
    \ `application:didFinishLaunchingWithOptions:` 方法，以调用一个 `initStore` 方法，如 代码清单\
    \ 2-9（Objective-C）或 代码清单 2-10（Swift）所示。\n\n***代码清单 2-9***。创建预加载数据的钩子（Objective-C）\n\
    \n```objc\n- (void)initStore {\n  // 在此处加载数据\n}\n\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \  [self initStore];\n  return YES;\n}\n```\n\n***代码清单 2-10***。创建预加载数据的钩子（Swift）\n\
    \n```swift\nfunc initStore() {\n  // 在此处加载数据\n}\n\nfunc application(application:\
    \ UIApplication!, didFinishLaunchingWithOptions launchOptions: NSDictionary!)\
    \ -> Bool {\n  initStore()\n  return true\n}\n```\n\n现在，我们只需创建对象并将其推送到持久化存储中即可。编辑\
    \ `AppDelegate.m` 或 `AppDelegate.swift` 文件，使 `initStore` 方法看起来像 代码清单 2-11（Objective-C）或\
    \ 代码清单 2-12（Swift）所示。对于 Objective-C 版本，还必须添加以下 `import` 语句：\n\n```objc\n#import\
    \ \"BookCategory.h\"\n#import \"Book.h\"\n#import \"Page.h\"\n```\n\n另外值得注意的是，Objective-C\
    \ 版本利用了动态生成的 `addBooks:` 方法来添加书籍。由于 Swift 不支持这一点，我们必须改用 `NSManagedObject` 的 `mutableSetValueForKeyPath`\
    \ 函数来获取书籍的可变集合，然后将书籍添加到它返回的 `NSManagedSet` 对象中。\n\n***代码清单 2-11***。用于添加新对象的 Objective-C\
    \ `initStore` 方法\n\n```objc\n- (void)initStore {\n  BookCategory *fiction = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"BookCategory\" inManagedObjectContext:self.managedObjectContext];\n\
    \  fiction.name = @\"Fiction\";\n\n  BookCategory *biography = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"BookCategory\" inManagedObjectContext:self.managedObjectContext];\n\
    \  biography.name = @\"Biography\";\n\n  Book *book1 = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Book\" inManagedObjectContext:self.managedObjectContext];\n  book1.title = @\"\
    The first book\";\n  book1.price = 10;\n\n  Book *book2 = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Book\" inManagedObjectContext:self.managedObjectContext];\n\
    \  book2.title = @\"The second book\";\n  book2.price = 15;\n\n  Book *book3 =\
    \ [NSEntityDescription insertNewObjectForEntityForName:@\"Book\" inManagedObjectContext:self.managedObjectContext];\n\
    \  book3.title = @\"The third book\";\n  book3.price = 10;\n\n  [fiction addBooks:[NSSet\
    \ setWithArray:@[book1, book2]]];\n  [biography addBooks:[NSSet setWithArray:@[book3]]];\n\
    \n  [self.managedObjectContext save:nil];\n}\n```\n\n***代码清单 2-12***。用于添加新对象的\
    \ Swift `initStore` 函数\n\n```swift\nfunc initStore() {\n  var fiction = NSEntityDescription.insertNewObjectForEntityForName(\"\
    BookCategory\", inManagedObjectContext: self.managedObjectContext) as BookCategory\n\
    \  fiction.name = \"Fiction\"\n\n  var biography = NSEntityDescription.insertNewObjectForEntityForName(\"\
    BookCategory\", inManagedObjectContext: self.managedObjectContext) as BookCategory\n\
    \  biography.name = \"Biography\"\n\n  var book1 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Book\", inManagedObjectContext: self.managedObjectContext) as Book\n  book1.title\
    \ = \"The first book\"\n  book1.price = 10\n\n  var book2 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Book\", inManagedObjectContext: self.managedObjectContext) as Book\n  book2.title\
    \ = \"The second book\"\n  book2.price = 15\n\n  var book3 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Book\", inManagedObjectContext: self.managedObjectContext) as Book\n  book3.title\
    \ = \"The third book\"\n  book3.price = 10\n\n  var fictionRelation = fiction.mutableSetValueForKeyPath(\"\
    books\")\n  fictionRelation.addObject(book1)\n  fictionRelation.addObject(book2)\n\
    \n  var biographyRelation = biography.mutableSetValueForKeyPath(\"books\")\n \
    \ biographyRelation.addObject(book3)\n\n  self.saveContext()\n}\n```\n\n这段代码很容易理解。但请注意，不能直接分配托管对象。相反，必须从托管对象上下文中获取它。当然，这是为了让上下文能够管理它。\n\
    \n`initStore` 方法创建了两个类别和三本书。它将前两本书添加到“小说”类别中，将第三本书添加到“传记”类别中。我们在此有意忽略了 `Page`\
    \ 实体，以免使示例过于拥挤。\n\n启动应用程序以执行此代码。一旦在模拟器上看到白色屏幕，就可以退出。在第 1 章中，我们向你展示了如何查找和查看支撑数据存储的\
    \ SQLite 存储。在终端窗口中使用 `sqlite3` 打开数据库文件 `BookStore.sqlite`。\n\n`.schema` 命令确认我们的数据模型已正确创建。\n\
    \n```sql\nsqlite> .schema\nCREATE TABLE ZBOOK ( Z_PK INTEGER PRIMARY KEY, Z_ENT\
    \ INTEGER, Z_OPT INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT, ZTITLE VARCHAR);\n\
    CREATE TABLE ZBOOKCATEGORY ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
    \ ZNAME VARCHAR);\nCREATE TABLE ZPAGE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER,\
    \ Z_OPT INTEGER, ZBOOK INTEGER, Z_FOK_BOOK INTEGER, ZTEXT VARCHAR);\nCREATE TABLE\
    \ Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST BLOB);\n\
    CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER\
    \ INTEGER, Z_MAX INTEGER);\nCREATE INDEX ZBOOK_ZCATEGORY_INDEX ON ZBOOK (ZCATEGORY);\n\
    CREATE INDEX ZPAGE_ZBOOK_INDEX ON ZPAGE (ZBOOK);\n```\n\n几个查询表明我们的数据已加载完毕：\n\n\
    ```sql\nsqlite> .header on\nsqlite> .mode column\nsqlite> select * from ZBOOKCATEGORY;\n\
    Z_PK        Z_ENT       Z_OPT       ZNAME\n----------  ----------  ----------\
    \  ----------\n1           2           1           Biography\n2           2  \
    \         1           Fiction\nsqlite> select * from ZBOOK;\nZ_PK        Z_ENT\
    \       Z_OPT       ZCATEGORY   ZPRICE      ZTITLE\n----------  ----------  ----------\
    \  ----------  ----------  --------------\n1           1           1         \
    \  1           10.0        The third book\n2           1           1         \
    \  2           10.0        The first book\n3           1           1         \
    \  2           15.0        The second boo\n```\n\n当然，如果我们再次运行该应用程序，将加载新的实体，并且会出现重复数据。\n\
    \n```sql\nsqlite> select * from ZBOOKCATEGORY;\nZ_PK        Z_ENT       Z_OPT\
    \       ZNAME\n----------  ----------  ----------  ----------\n1           2 \
    \          1           Fiction\n2           2           1           Biography\n\
    3           2           1           Biography\n4           2           1     \
    \      Fiction\n```\n\n这是因为 `initStore` 方法（错误地）假定运行时存储是空的。当然，我们可以在启动时通过删除 `BookStore.sqlite`\
    \ 文件来创建一个新的持久化存储，但这可能有点过头了。过去会话中的某些信息将来可能会用到。为了安全起见，我们只需清除我们关心的实体即可。"
- fmt: "首先创建一个名为`deleteAllObjects`的实用方法，用于通过实体名称清除实体。您可以在[列表2-13](#9781430260288_Ch02.xhtml#list13)中找到此方法的Objective-C代码，在[列表2-14](#9781430260288_Ch02.xhtml#list14)中找到Swift代码。向此方法传递要删除所有对象的实体名称。此方法会获取该实体的所有对象，然后将其删除。\n\
    \n[**列表2-13**](#9781430260288_Ch02.xhtml#_list13) Objective-C `deleteAllObjects`方法\n\
    \n```\n- (void)deleteAllObjects:(NSString *)entityName {\n  NSFetchRequest *fetchRequest\
    \ = [NSFetchRequest fetchRequestWithEntityName:entityName];\n\nNSError *error;\n\
    \  NSArray *items = [self.managedObjectContext executeFetchRequest:fetchRequest\
    \ error:&error];\n\nfor (NSManagedObject *managedObject in items) {\n    [self.managedObjectContext\
    \ deleteObject:managedObject];\n  }\n\nif (![self.managedObjectContext save:&error])\
    \ {\n    NSLog(@\"Error deleting %@ - error:%@\", entityName, error);\n  }\n}\n\
    ```\n\n[**列表2-14**](#9781430260288_Ch02.xhtml#_list14) Swift `deleteAllObjects`函数\n\
    \n```\nfunc deleteAllObjects(entityName: String) {\n  let fetchRequest = NSFetchRequest(entityName:\
    \ entityName)\n\nlet objects = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
    \ error: nil)\n  for object in objects as [NSManagedObject] {\n    self.managedObjectContext?.deleteObject(object)\n\
    \  }\n\nvar error: NSError? = nil\n  if !self.managedObjectContext!.save(&error)\
    \ {\n    println(\"Error deleting \\(entityName) - error:\\(error)\")\n  }\n}\n\
    ```\n\n编辑`initStore`方法，在运行前清除所有图书和分类，在Objective-C方法的开头添加以下两行：\n\n```\n- (void)initStore\
    \ {\n  [self deleteAllObjects:@\"Book\"];\n  [self deleteAllObjects:@\"BookCategory\"\
    ];\n  ...\n}\n```\n\n您的Swift函数应如下所示：\n\n```\nfunc initStore() {\n  deleteAllObjects(\"\
    Book\")\n  deleteAllObjects(\"BookCategory\")\n  ...\n}\n```\n\n现在再次运行应用程序，无论运行多少次，存储都是干净的。\n\
    \n```\nsqlite> select * from ZBOOKCATEGORY;\nZ_PK        Z_ENT       Z_OPT   \
    \    ZNAME\n----------  ----------  ----------  ----------\n3           2    \
    \       1           Fiction\n4           2           1           Biography\nsqlite>\
    \ select * from ZBOOK;\nZ_PK        Z_ENT       Z_OPT       ZCATEGORY   ZPRICE\
    \      ZTITLE\n----------  ----------  ----------  ----------  ----------  --------------\n\
    4           1           1           3           10.0        The first book\n5\
    \           1           1           3           15.0        The second boo\n6\
    \           1           1           4           10.0        The third book\n```\n\
    \n您可能会注意到，主键计数器不会重置（表中的`Z_PK`列）——它会在您添加和删除对象时继续递增。请记住，这是一个实现细节，因此可以忽略。让Core Data来处理它。\n\
    \n## 检索托管对象\n\n我们通过代码示例简要介绍了如何从持久化存储中检索对象。现在让我们更仔细地了解如何提取信息。为此，创建一个名为`showExampleData`的新方法。编辑`application:didFinishLaunchingWithOptions:`，在调用`initStore`之后立即添加对此新方法的调用，如[列表2-15](#9781430260288_Ch02.xhtml#list15)（Objective-C）和[列表2-16](#9781430260288_Ch02.xhtml#list16)（Swift）所示。\n\
    \n[**列表2-15**](#9781430260288_Ch02.xhtml#_list15) 调用`showExampleData`（Objective-C）\n\
    \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n  [self initStore];\n  [self showExampleData];\n  return\
    \ YES;\n}\n```\n\n[**列表2-16**](#9781430260288_Ch02.xhtml#_list16) 调用`showExampleData`（Swift）\n\
    \n```\nfunc application(application: UIApplication!, didFinishLaunchingWithOptions\
    \ launchOptions: NSDictionary!) -> Bool {\n  initStore()\n  showExampleData()\n\
    \  return true\n}\n```\n\n现在添加[列表2-17](#9781430260288_Ch02.xhtml#list17)（Objective-C）和[列表2-18](#9781430260288_Ch02.xhtml#list18)（Swift）中所示的`showExampleData`方法。此方法使用`NSLog`或`println`将持久化存储中的所有图书记录到Xcode控制台。\n\
    \n[**列表2-17**](#9781430260288_Ch02.xhtml#_list17) Objective-C中的`showExampleData`方法\n\
    \n```\n- (void)showExampleData {\n  NSFetchRequest *fetchRequest = [NSFetchRequest\
    \ fetchRequestWithEntityName:@\"Book\"];\n\nNSArray *books = [self.managedObjectContext\
    \ executeFetchRequest:fetchRequest error:nil];\n  for (Book *book in books) {\n\
    \    NSLog(@\"Title: %@, price: %.2f\", book.title, book.price);\n  }\n}\n```\n\
    \n[**列表2-18**](#9781430260288_Ch02.xhtml#_list18) Swift中的`showExampleData`函数\n\
    \n```\nfunc showExampleData() {\n  let fetchRequest = NSFetchRequest(entityName:\
    \ \"Book\")\n\nlet books = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
    \ error: nil)\n  for book in books as [Book] {\n    println(String(format: \"\
    Title: \\(book.title), price: %.2f\", book.price))\n  }\n}\n```\n\n该方法为`Book`实体创建一个新的获取请求并执行它。由于获取请求没有选择条件，它只是返回在持久化存储中找到的所有与给定实体（即`Book`）匹配的对象。如果运行应用程序，您将在控制台中得到以下输出：\n\
    \n```\nBookStore[84975:c07] Title: The first book, price: 10.00\nBookStore[84975:c07]\
    \ Title: The third book, price: 10.00\nBookStore[84975:c07] Title: The second\
    \ book, price: 15.00\n```\n\n您可能会注意到，图书可能有序或无序；例如，在上面的日志中，标题为“The third book”的图书出现在标题为“The\
    \ second book”的图书之前。请记住，`books`关系是无序的，因此顺序是不确定的。\n\n## 谓词\n\n在上面的获取中，我们从`Book`实体中获取了所有图书，没有任何方法可以缩小Core\
    \ Data返回的范围。然而，Core Data确实提供了仅返回数据子集的机制。Core Data使用Foundation框架中的`NSPredicate`类来指定在执行获取请求时如何选择应属于结果集的对象。谓词可以通过两种方式构建：您可以手动构建对象及其图形，也可以使用`NSPredicate`实现的查询语言。您会发现，大多数时候您会更喜欢后一种方法的便利性和可读性。\n\
    \n在本节中，我们针对每个示例研究了构建谓词的两种方式，以帮助您在查询语言和`NSPredicate`对象图形之间建立联系。理解这两种方式将帮助您确定首选方法。您还可以根据应用程序和数据场景混合搭配这些方法。\n\
    \n谓词查询语言从与SQL“WHERE”子句相似的字符串表示形式构建一个`NSPredicate`对象图。从该语言构建谓词的方法是类方法`predicateWithFormat:(NSString\
    \ *)`。例如，如果您想要获取表示图书“The first book”的托管对象，您可以调用`[NSPredicate predicateWithFormat:@\"\
    title = 'The first book'\"]`来构建谓词。\n\n要测试这一点，请修改`showExampleData`方法，如[列表2-19](#9781430260288_Ch02.xhtml#list19)（Objective-C）和[列表2-20](#9781430260288_Ch02.xhtml#list20)（Swift）所示。\n\
    \n[**列表2-19**](#9781430260288_Ch02.xhtml#_list19) 带有谓词的Objective-C `showExampleData`方法\n\
    \n```\n- (void)showExampleData {\n  NSFetchRequest *fetchRequest = [NSFetchRequest\
    \ fetchRequestWithEntityName:@\"Book\"];\n  fetchRequest.predicate = [NSPredicate\
    \ predicateWithFormat:@\"title = 'The first book'\"];\n\nNSArray *books = [self.managedObjectContext\
    \ executeFetchRequest:fetchRequest error:nil];\n  for (Book *book in books) {\n\
    \    NSLog(@\"Title: %@, price: %.2f\", book.title, book.price);\n  }\n}\n```"
  raw: 'First let’s create a utility method, called `deleteAllObjects`, for clearing
    entities by entity name. You can find the Objective-C code for this method in
    [Listing 2-13](#9781430260288_Ch02.xhtml#list13) and the Swift code in [Listing
    2-14](#9781430260288_Ch02.xhtml#list14). You pass this method the name of the
    entity for which you wish to delete all objects. This method fetches all objects
    for that entity and then deletes them.


    [***Listing 2-13***](#9781430260288_Ch02.xhtml#_list13). The Objective-C `deleteAllObjects`
    Method


    ```

    - (void)deleteAllObjects:(NSString *)entityName {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:entityName];


    NSError *error;

      NSArray *items = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:&error];


    for (NSManagedObject *managedObject in items) {

        [self.managedObjectContext deleteObject:managedObject];

      }


    if (![self.managedObjectContext save:&error]) {

        NSLog(@"Error deleting %@ - error:%@", entityName, error);

      }

    }

    ```


    [***Listing 2-14***](#9781430260288_Ch02.xhtml#_list14). The Swift `deleteAllObjects`
    Function


    ```

    func deleteAllObjects(entityName: String) {

      let fetchRequest = NSFetchRequest(entityName: entityName)


    let objects = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    nil)

      for object in objects as [NSManagedObject] {

        self.managedObjectContext?.deleteObject(object)

      }


    var error: NSError? = nil

      if !self.managedObjectContext!.save(&error) {

        println("Error deleting \(entityName) - error:\(error)")

      }

    }

    ```


    Edit the `initStore` method to clear all books and categories before running by
    adding the following two lines at the beginning of the Objective-C method:


    ```

    - (void)initStore {

      [self deleteAllObjects:@"Book"];

      [self deleteAllObjects:@"BookCategory"];

      ...

    }

    ```


    Your Swift function should look like this:


    ```

    func initStore() {

      deleteAllObjects("Book")

      deleteAllObjects("BookCategory")

      ...

    }

    ```


    Now run the application once again and see how the store is clean no matter how
    many times we run it.


    ```

    sqlite> select * from ZBOOKCATEGORY;

    Z_PK        Z_ENT       Z_OPT       ZNAME

    ----------  ----------  ----------  ----------

    3           2           1           Fiction

    4           2           1           Biography

    sqlite> select * from ZBOOK;

    Z_PK        Z_ENT       Z_OPT       ZCATEGORY   ZPRICE      ZTITLE

    ----------  ----------  ----------  ----------  ----------  --------------

    4           1           1           3           10.0        The first book

    5           1           1           3           15.0        The second boo

    6           1           1           4           10.0        The third book

    ```


    You might notice that the primary key counter doesn’t reset (the `Z_PK` column
    in the tables)—it continues to increment as you add and delete objects. Remember
    that this is an implementation detail, so you can ignore it. Let Core Data handle
    it.


    Retrieving Managed Objects


    We’ve briefly touched, through code samples, on how to retrieve objects from the
    persistent store. Let’s take a closer look at how to pull information. For this,
    create a new method called `showExampleData`. Edit `application:didFinishLaunchingWithOptions:`
    to add a call to this new method right after calling `initStore`, as [Listing
    2-15](#9781430260288_Ch02.xhtml#list15) (Objective-C) and [Listing 2-16](#9781430260288_Ch02.xhtml#list16)
    (Swift) show.


    [***Listing 2-15***](#9781430260288_Ch02.xhtml#_list15). Calling `showExampleData`
    (Objective-C)


    ```

    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {

      [self initStore];

      [self showExampleData];

      return YES;

    }

    ```


    [***Listing 2-16***](#9781430260288_Ch02.xhtml#_list16). Calling `showExampleData`
    (Swift)


    ```

    func application(application: UIApplication!, didFinishLaunchingWithOptions launchOptions:
    NSDictionary!) -> Bool {

      initStore()

      showExampleData()

      return true

    }

    ```


    Now add the `showExampleData` method shown in [Listing 2-17](#9781430260288_Ch02.xhtml#list17)
    (Objective-C) and [Listing 2-18](#9781430260288_Ch02.xhtml#list18) (Swift). This
    method uses `NSLog` or `println` to log all the books in the persistent store
    to the Xcode console.


    [***Listing 2-17***](#9781430260288_Ch02.xhtml#_list17). The `showExampleData`
    Method in Objective-C


    ```

    - (void)showExampleData {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Book"];


    NSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];

      for (Book *book in books) {

        NSLog(@"Title: %@, price: %.2f", book.title, book.price);

      }

    }

    ```


    [***Listing 2-18***](#9781430260288_Ch02.xhtml#_list18). The showExampleData Function
    in Swift


    ```

    func showExampleData() {

      let fetchRequest = NSFetchRequest(entityName: "Book")


    let books = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    nil)

      for book in books as [Book] {

        println(String(format: "Title: \(book.title), price: %.2f", book.price))

      }

    }

    ```


    The method creates a new fetch request for the `Book` entity and executes it.
    Because the fetch request has no selection criteria, it simply returns all objects
    it finds in the persistent store that match the given entity (i.e., `Book`). If
    you run the application, you get the following output in the console:


    ```

    BookStore[84975:c07] Title: The first book, price: 10.00

    BookStore[84975:c07] Title: The third book, price: 10.00

    BookStore[84975:c07] Title: The second book, price: 15.00

    ```


    You may notice that the books may or may not be in order; in the preceding log,
    for example, the book with the title “The third book” comes before the book with
    the title “The second book.” Remember that the `books` relationship is not ordered,
    so the order isn’t deterministic.


    Predicates


    In the preceding fetch, we fetched all books from the `Book` entity, without any
    way to narrow the scope of what Core Data returned. Core Data does have mechanisms,
    however, to return only subsets of data. Core Data uses the `NSPredicate` class
    from the Foundation framework to specify how to select the objects that should
    be part of the result set when executing a fetch request. Predicates can be built
    in two ways: you can either build the object and its graph manually or you can
    use the query language `NSPredicate` implements. You will find that most of the
    time you will prefer the convenience and readability of the latter method.


    In this section we look at both ways of building predicates for each example in
    order to help draw a parallel between the query language and the `NSPredicate`
    object graph. Understanding both ways will help you determine your preferred approach.
    You can also mix and match the approaches depending on your applications and data
    scenarios.


    The predicate query language builds an `NSPredicate` object graph from a string
    representation that has similarities to an SQL ‘WHERE’ clause. The method that
    builds a predicate from the language is the class method `predicateWithFormat:(NSString
    *)`. For instance, if you want to get the managed object that represents the book
    “The first book,” you build the predicate by calling `[NSPredicate predicateWithFormat:@"title
    = ''The first book''"]`.


    To test this, modify the `showExampleData` method as shown in [Listing 2-19](#9781430260288_Ch02.xhtml#list19)
    (Objective-C) and [Listing 2-20](#9781430260288_Ch02.xhtml#list20) (Swift).


    [***Listing 2-19***](#9781430260288_Ch02.xhtml#_list19). The Objective-C `showExampleData`
    Method with a Predicate


    ```

    - (void)showExampleData {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Book"];

      fetchRequest.predicate = [NSPredicate predicateWithFormat:@"title = ''The first
    book''"];


    NSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];

      for (Book *book in books) {

        NSLog(@"Title: %@, price: %.2f", book.title, book.price);

      }

    }

    ```'
