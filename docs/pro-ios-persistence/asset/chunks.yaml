    ### 同步内容


    至此，我们有了一个将数据存储保存在 iCloud 中的应用。这对于备份数据来说是个很好的解决方案，但如果你在多台设备上使用应用，则效果不佳。不幸的是，云只会保留你最后使用的那台设备保存的数据，可能会覆盖你其他设备保存的数据。


    为了让你的代码跨设备同步数据，你需要订阅 Core Data 为 iCloud 同步发送的通知。表 8-1 列出了这些通知。


    ### 表 8-1. 可用的通知类型


    | **通知类型** | **描述** |

    | --- | --- |

    | `NSPersistentStoreUbiquitousTransitionTypeAccountAdded` | 当应用运行时添加了新的 iCloud
    账户时发送。这有助于将存储迁移到新账户。 |

    | `NSPersistentStoreUbiquitousTransitionTypeAccountRemoved` | 当应用运行时从设备移除了现有 iCloud
    账户时发送。这告诉你持久化存储正在过渡到本地存储。 |

    | `NSPersistentStoreUbiquitousTransitionTypeContentRemoved` | 当用户清除了 iCloud 账户的内容时发送，通常是通过设置中的“文稿与数据”使用“删除全部”操作。Core
    Data 集成将因此过渡到一个空的存储文件。 |

    | `NSPersistentStoreUbiquitousTransitionTypeInitialImportCompleted` | 当 Core Data
    完成构建与 iCloud 账户内容一致的存储文件时发送。 |


    你可以通过使用存储通知，确保你的应用能响应 iCloud 的变化，从而正确合并所有内容。


    打开 `AppDelegate.m` 或 `AppDelegate.swift`，在创建持久化存储之后、将其添加到协调器之前，立即向 `persistentStoreCoordinator`
    方法中添加适当的通知。该方法应如列表 8-5（Objective-C）或列表 8-6（Swift）所示。

