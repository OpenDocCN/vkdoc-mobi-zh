    Hey, Wait a Minute! How Did My Color Transform?


    You might notice that we didn’t write any transformation code to transform our
    `UIColor` instance into or out of the Core Data store. How did Core Data know
    how to transform it?


    In pre-iOS 5 days, we would have had to write a custom transformer class to perform
    transformations for `UIColor` instances. As of iOS 5, however, `UIColor` adheres
    to the `NSCoding` protocol, so it’s automatically encoded and decoded properly.
    It’s so easy, it almost feels like cheating.


    We won’t be so lucky with our encryption transformation, however, and will have
    to write a custom transformation class to encrypt and decrypt our data. We do
    this in the next section.


    **Encrypting Data**


    In this age of social media, identity theft, and NSA (National Security Agency)
    snooping, people increasingly value privacy. Keeping your device physically secure
    can protect your data—until you leave your iPhone in a bar or a thief steals it.
    In the event that someone else gains control of your iPhone or iPad, that person
    can siphon off the SQLite databases that Core Data uses in various applications
    and, using tools like the ones we’re using in this book, read all your data—including
    the private, sensitive bits that can make you blush, or can even destroy your
    life.


    One way to safeguard that data is to encrypt them using known, industry-strength
    encryption algorithms. In the rest of this chapter, we create a secure note-taking
    application called SecureNote that stores all notes in encrypted format. We use
    Core Data’s `Transformable` data type and a custom transformation class to manage
    the encryption and decryption of the data. The finished application will resemble
    [Figure 7-2](#9781430260288_Ch07.xhtml#Fig2).


    ![9781430260288_Fig07-02.jpg](images/9781430260288_Fig07-02.jpg)


    [Figure 7-2](#9781430260288_Ch07.xhtml#_Fig2). The SecureNote application


    Creating the Project and Setting Up the Core Data Model


    Create a new project in Xcode using the Master-Detail Application. Call it SecureNote
    and make sure the Use Core Data check box is checked. Once Xcode creates your
    project, open the Core Data model, `SecureNote.xcdatamodeld`, and delete the `Event`
    entity that Xcode created for you. Then, add an entity called `Note` and give
    it three attributes.


    *   `timeStamp` (`Date`)

    *   `title` (`Transformable`)

    *   `body` (`Transformable`)


    We leave `timeStamp` unencrypted, but we will encrypt `title` and `body` using
    a custom transformer class. The next section discusses encryption and decryption
    and then builds a custom transformer class that Core Data will use for encrypting
    and decrypting `title` and `body`.


    Before we move on to encryption and decryption, however, update the `NSFetchedResultsController`
    that Xcode generated for you to fetch `Note` instances. You’ll find this code
    in `MasterViewController.m` or `MasterViewController.swift` in the `fetchedResultsController`
    accessor. Change it to match [Listing 7-21](#9781430260288_Ch07.xhtml#list21).


    [***Listing 7-21***](#9781430260288_Ch07.xhtml#_list21). Fetching `Note` Instances


    ```

    NSEntityDescription *entity = [NSEntityDescription entityForName:@"Note" inManagedObjectContext:self.managedObjectContext];
    // Objective-C


    let entity = NSEntityDescription.entityForName("Note", inManagedObjectContext:
    self.managedObjectContext!) // Swift

    ```


    Generate an `NSManagedObject` subclass for the `Note` entity. The generated class
    will set the type of `body` and `title` to `id (Objective-C) or AnyObject (Swift)`,
    because it doesn’t know what else to set it to, but you can change the type for
    both to `NSString * (Objective-C) or String (Swift)`. [Listing 7-22](#9781430260288_Ch07.xhtml#list22)
    shows the `Note.h` header file, [Listing 7-23](#9781430260288_Ch07.xhtml#list23)
    shows the `Note.m` Objective-C implementation file, and [Listing 7-24](#9781430260288_Ch07.xhtml#list24)
    shows the `Note.swift` Swift implementation file.


    [***Listing 7-22***](#9781430260288_Ch07.xhtml#_list22). `Note.h`


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @interface Note : NSManagedObject


    @property (nonatomic, retain) NSString *body;

    @property (nonatomic, retain) NSDate *timeStamp;

    @property (nonatomic, retain) NSString *title;


    @end

    ```


    [***Listing 7-23***](#9781430260288_Ch07.xhtml#_list23). `Note.m`


    ```

    #import "Note.h"


    @implementation Note


    @dynamic body;

    @dynamic timeStamp;

    @dynamic title;


    @end

    ```


    [***Listing 7-24***](#9781430260288_Ch07.xhtml#_list24). `Note.swift`


    ```

    import Foundation

    import CoreData


    @objc(Note)

    class Note: NSManagedObject {


    @NSManaged var timeStamp: NSDate

        @NSManaged var title: String

        @NSManaged var body: String


    }

    ```


    We want the master view to show the note’s title, with the timestamp displayed
    below it, so open the storyboard (`Main.storyboard`), select the prototype cell
