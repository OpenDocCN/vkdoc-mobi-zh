    ## 使用 `NSFetchedResultsController` 显示表格数据


    从 iPhone 问世以来，许多（如果不是大多数）iOS 应用程序都显示数据列表。iOS 将这些单列列表称为“表格”，并提供了表格视图类（`UITableView`）和控制器（`UITableViewController`），用于显示列表、支持快速滚动浏览数据，甚至提供了点击单元格以深入数据层次结构的机制。这种方法对于显示数据如此基础和重要，以至于所有
    iOS 开发人员都知道如何使用此类及其支持类来显示数据列表。


    当使用表格视图显示来自 Core Data 存储的数据时，你可以简单地将数据获取到数组中，并让表格视图生态系统忽略数据的来源，实际上许多应用程序正是这样做的。然而，iOS
    SDK 提供了一个名为`NSFetchedResultsController`的类，它连接了表格视图和 Core Data。`NSFetchedResultsController`从持久化存储中拉取托管对象，从你指定的实体中获取，缓存它们以提高性能，并在需要时将它们提供给表格视图进行显示。它还管理表格中行的添加、移除和移动，以响应数据变化。


    ## 创建获取结果控制器


    你可以通过四个参数创建一个获取结果控制器：


    * 一个获取请求（`NSFetchRequest`实例）

    * 一个托管对象上下文（`NSManagedObjectContext`实例）

    * （可选）一个分区名称键路径

    * （可选）一个缓存名称


    以下章节解释这些参数。


    ### 获取请求


    `NSFetchedResultsController`使用的获取请求定义了要在表格中显示的数据。它与你在此书中以及在任何 Core Data 开发中使用的任何获取请求几乎相同。它与你在数据模型中指定的实体配合使用，并且可以选择使用谓词（`NSPredicate`）来过滤获取的内容。此获取请求的一个不同之处在于，它必须至少有一个排序描述符，否则你的应用程序将崩溃并显示以下消息：


    ```

    ''NSInvalidArgumentException'', reason: ''An instance of NSFetchedResultsController
    requires a fetch request with sort descriptors.''

    ```


    这是因为获取结果控制器在表格的约束下工作，表格以可预测的顺序显示单元格，因此获取结果控制器也必须以可预测的顺序获取数据。排序描述符提供了帮助排序数据的必要机制。


    ### 托管对象上下文


    这是一个普通的托管对象上下文，用于保存托管对象。保存上下文会保存其中的所有对象。通常，你使用应用程序的托管对象上下文作为此参数。


    ### 分区名称键路径


    iOS 将表格视图划分为多个分区，每个分区有若干行。这种结构对表格视图的操作至关重要。获取结果控制器针对在这种环境下工作进行了优化，并可以将数据划分为与表格分区相对应的分区。分区名称键路径，作为`sectionNameKeyPath`参数设置，指定了一个键路径，进入你的
    Core Data 模型，将获取请求实体的托管对象划分为这些分区。通常，你将此`sectionNameKeyPath`参数指向该表格显示的实体的某个属性。请注意，如果你为`sectionNameKeyPath`参数指定了值，你还必须按该值对获取结果进行排序，否则你的应用程序将因错误而崩溃。如果你的表格视图只包含一个分区，你可以为`sectionNameKeyPath`参数传入`nil`。


    ### 缓存名称


    缓存名称参数指定了缓存的名称，获取结果控制器使用该缓存来缓存它获取并提供给表格的托管对象。在 iOS 3.x 版本中，鼓励你使此缓存名称在获取结果控制器之间唯一，但即使与其他获取结果控制器共享缓存名称，你的应用程序仍然可以工作。然而，从
    iOS 4.0 开始，如果你在获取结果控制器之间共享缓存名称，你的应用程序将无法正常工作。请确保你的缓存名称是唯一的。


    请注意，此参数是可选的；你可以将缓存设置为`nil`，这样获取结果控制器就不会缓存数据。这当然会降低数据显示和应用程序的响应速度，因此你通常不会将缓存设置为`nil`。


