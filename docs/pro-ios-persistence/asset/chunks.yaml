    \n## 处理多线程\n\n在编写非平凡应用程序时，你难免会考虑使用多线程。通常这是出于性能原因——将任务卸载到后台——但性能提升是以增加复杂性为代价的。本节将展示如何识别在使用\
    \ Core Data 配合多线程时常见的一些问题，以及如何解决它们。\n\n### 线程安全\n\n大多数苹果应用程序编程接口（API）都不是线程安全的，除非它们明确声明。与苹果的一贯风格一致，Core\
    \ Data **并非线程安全**。但这到底意味着什么？它意味着 Core Data 的开发人员没有采取任何预防措施来确保当你让两个线程共享 API 资源时代码不会崩溃。在我们的案例中，它意味着你不能在线程之间安全地共享\
    \ `NSManagedObject`、`NSManagedContext` 或任何其他 Core Data 对象。\n\n不要将非线程安全视为缺乏关注或质量，而应将其视为责任的委托。苹果更倾向于保持简单并最大化性能。他们将管理线程安全的责任委托给你——开发者——在你需要的时候。\n\
    \n哦，拜托，能出什么乱子呢？"
