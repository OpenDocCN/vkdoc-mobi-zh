    ```\n\n**Listing 1-17** The Updated `AppDelegate.swift`\n\n```\nimport UIKit\n\
    import CoreData\n\n@UIApplicationMain\nclass AppDelegate: UIResponder, UIApplicationDelegate\
    \ {\n\n    var window: UIWindow?\n    var persistence: Persistence?\n\n    func\
    \ application(application: UIApplication!, didFinishLaunchingWithOptions launchOptions:\
    \ NSDictionary!) -> Bool {\n        persistence = Persistence()\n        return\
    \ true\n    }\n    /* Code snipped */\n}\n```\n\nThe Core Data stack now properly\
    \ initializes when the application runs, but without an object model or any objects\
    \ in it, we can’t really see evidence of that. The next step is to create an object\
    \ model.\n\n## Creating the Object Model\n\nAt this point, we’ve added all the\
    \ Core Data pieces to the application that Xcode would have done for us had we\
    \ checked the Use Core Data check box. For an application that you manually add\
    \ Core Data to, you create the object model in the same way that you did for an\
    \ application for which you checked Xcode’s Use Core Data check box.\n\nFor `PersistenceApp`,\
    \ we store gadgets that have a name and a price. Open the object model, `PersistenceApp.xcdatamodeld`,\
    \ in Xcode’s Project Navigator, and add a `Gadget` entity with a `String` attribute\
    \ called `name` and a `Float` attribute called `price`. Your data model should\
    \ match Figure 1-7.\n\n![9781430260288_Fig01-07.jpg](images/9781430260288_Fig01-07.jpg)\n\
    \n**Figure 1-7** The `Gadget` entity in the `PersistenceApp.xcdatamodeld` managed\
    \ object model\n\nNow that we have an object model, we can create some objects\
    \ in it.\n\n## Adding Objects to PersistenceApp\n\nOnce again, we use the `application:didFinishLaunchingWithOptions`\
    \ method to add objects to the object model. This time, however, we’ll do that\
    \ work in another method that we call from `application:didFinishLaunchingWithOptions`.\
    \ Also, instead of relying on the `sqlite3` command-line tool to view the stored\
    \ data, we fetch the objects from the persistent store and log them to the console—again,\
    \ from a separate method. To begin, add calls to the two methods that we will\
    \ create in `application:didFinishLaunchingWithOptions`, so that the code matches\
    \ Listing 1-18 (Objective-C) or Listing 1-19 (Swift).\n\n**Listing 1-18** Adding\
    \ Calls to Create and Fetch Objects (Objective-C)\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \    self.persistence = [[PAPersistence alloc] init];\n    [self createObjects];\n\
    \    [self fetchObjects];\n\n    return YES;\n}\n```\n\n**Listing 1-19** Adding\
    \ Calls to Create and Fetch Objects (Swift)\n\n```\nfunc application(application:\
    \ UIApplication!, didFinishLaunchingWithOptions launchOptions: NSDictionary!)\
    \ -> Bool {\n    persistence = Persistence()\n\n    createObjects()\n    fetchObjects()\n\
    \n    return true\n}\n```\n\nThen, create implementations for the new methods.\
    \ The `createObjects` method should look familiar; as before, you create the objects\
    \ in the managed object context, then save the context. This code creates four\
    \ `Gadget` instances: an iPad, an iPad Mini, an iPhone, and an iPod touch. The\
    \ prices for them are in US dollars, and may or may not be accurate! Listing 1-20\
    \ shows the Objective-C code, and Listing 1-21 shows the Swift code. One thing\
    \ to notice: since KVC requires object values, not primitives, the prices we set\
    \ on the objects are `NSNumber` instances, not primitive floats.\n\n**Listing\
    \ 1-20** The Objective-C `createObjects` Method\n\n```\n- (void)createObjects\
    \ {\n    NSManagedObject *iPad = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Gadget\" inManagedObjectContext:self.persistence.managedObjectContext];\n    [iPad\
