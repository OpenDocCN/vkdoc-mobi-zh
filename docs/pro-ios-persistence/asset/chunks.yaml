    ### 配置回调 URL


    为了使你的应用能够针对 Dropbox 进行身份验证，你的应用会将控制权交给 Dropbox SDK 提供的 Dropbox 身份验证控制器。此身份验证控制器显示
    Dropbox 登录屏幕，并在成功验证用户身份后，通过统一资源定位符 (URL) 回调的方式将控制权返回给你的应用。你的应用必须将其自身注册为该 URL 方案（scheme）的处理程序，以便
    iOS 能够正确地将控制权交还给你的应用。


    要将你的应用注册为 URL 方案的处理程序，请转到 Xcode，在“TARGETS”下选择你的项目，然后转到“Info”选项卡。展开“URL Types”部分，然后按
    + 按钮创建一个新的 URL 类型。在“URL Schemes”字段中，输入 **db-应用密钥**，但要将“应用密钥”替换为 Dropbox 在创建应用时提供给你的应用密钥。它看起来应该像
    **db-vp4jwudouxvhzz9**。保持其他字段不变。当你的应用安装后（无论是在模拟器还是真实设备上），它都会正确地进行注册。


