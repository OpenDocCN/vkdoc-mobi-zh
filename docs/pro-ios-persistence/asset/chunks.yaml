    ## Creating a Mapping Model


    To create a mapping model, create a new file in Xcode. In the ensuing dialog box,
    select Core Data under iOS on the left, and select Mapping Model on the right,
    as shown in [Figure 6-9](#9781430260288_Ch06.xhtml#Fig9). Click Next.


    ![9781430260288_Fig06-09.jpg](images/9781430260288_Fig06-09.jpg)


    [Figure 6-9](#9781430260288_Ch06.xhtml#_Fig9). Creating a Mapping Model file


    The next step is to select the source model. Select `BookStore 3.xcdatamodel`,
    as shown in [Figure 6-10](#9781430260288_Ch06.xhtml#Fig10), and click Next. You
    are then asked to select the target model. Select `BookStore 4.xcdatamodel` for
    the destination, as shown in [Figure 6-11](#9781430260288_Ch06.xhtml#Fig11), and
    click Next. The last step is to name the mapping model. Name it `Model3To4.xcmappingmodel`
    and click Create.


    ![9781430260288_Fig06-10.jpg](images/9781430260288_Fig06-10.jpg)


    [Figure 6-10](#9781430260288_Ch06.xhtml#_Fig10). Selecting the source data model


    ![9781430260288_Fig06-11.jpg](images/9781430260288_Fig06-11.jpg)


    [Figure 6-11](#9781430260288_Ch06.xhtml#_Fig11). Selecting the destination data
    model


    You should now see Xcode with your mapping model created, including all the entity
    mappings and property mappings that Core Data could infer, as shown in [Figure
    6-12](#9781430260288_Ch06.xhtml#Fig12).


    ![9781430260288_Fig06-12.jpg](images/9781430260288_Fig06-12.jpg)


    [Figure 6-12](#9781430260288_Ch06.xhtml#_Fig12). The new mapping model


    Notice that Xcode has already done some work to help with the migration. Creating
    a mapping model puts you in the same place you’d be with a lightweight migration,
    with mappings that Core Data can infer from your source and target data models.
    Where it found entities to match up, it automatically set the new attribute value
    to be a copy of the source. Since we removed the `author` attribute and added
    two new ones, it doesn’t quite know what to do. This is where you come in.


    The next step is to customize the mapping model to migrate publications. Start
    by creating the custom policy you’ll use, which is a subclass of `NSEntityMigrationPolicy`.
    Create a new Cocoa Touch class called `PublicationToPublicationMigrationPolicy`
    that subclasses `NSEntityMigrationPolicy`, as shown in [Figure 6-13](#9781430260288_Ch06.xhtml#Fig13).


    ![9781430260288_Fig06-13.jpg](images/9781430260288_Fig06-13.jpg)


    [Figure 6-13](#9781430260288_Ch06.xhtml#_Fig13). Creating a new migration policy


    In the implementation file, either `PublicationToPublicationMigrationPolicy.m
    or PublicationToPublicationMigrationPolicy.swift`, you want to override the `createDestinationInstancesForSourceInstance:`
    method. While performing the migration, Core Data will call this method each time
    it goes to create a `Publication` instance from a source `Publication` instance.
    In your implementation, you create a `Publication` instance, copy the price and
    title, and separate the first name from the last name. Of course, our name splitting
    is a bit rudimentary, but that is off topic here. This simple implementation will
    perfectly illustrate what we are trying to do.


    Finally, you tell the migration manager about the relationship between the source’s
    `Publication` instance and the target’s new `Publication` instance, which is an
    important step for the migration to occur properly. [Listing 6-10](#9781430260288_Ch06.xhtml#list10)
    shows Objective-C version, and [Listing 6-11](#9781430260288_Ch06.xhtml#list11)
    shows the Swift version.


    [**Listing 6-10**](#9781430260288_Ch06.xhtml#_list10). Custom Migration Mapping
    (Objective-C)


    ```

    - (BOOL)createDestinationInstancesForSourceInstance:(NSManagedObject *)sourceInstance
    entityMapping:(NSEntityMapping *)mapping manager:(NSMigrationManager *)manager
    error:(NSError **)error {

      // Create the book managed object

      NSManagedObject *book =

      [NSEntityDescription insertNewObjectForEntityForName:[mapping destinationEntityName]


    inManagedObjectContext:[manager destinationContext]];

      [book setValue:[sourceInstance valueForKey:@"title"] forKey:@"title"];

      [book setValue:[sourceInstance valueForKey:@"price"] forKey:@"price"];


    // Get the author name from the source

      NSString *author = [sourceInstance valueForKey:@"author"];


    // Split the author name into first name and last name

      NSRange firstSpace = [author rangeOfString:@" "];

      NSString *firstName = [author substringToIndex:firstSpace.location];

      NSString *lastName = [author substringFromIndex:firstSpace.location+1];


    // Set the first and last names into the bbok

      [book setValue:firstName forKey:@"firstName"];

      [book setValue:lastName forKey:@"lastName"];


    // Set up the association between the old Publication and the new Publication
    for the migration manager

      [manager associateSourceInstance:sourceInstance withDestinationInstance:book    
    forEntityMapping:mapping];

      return YES;

    }

    ```


    [**Listing 6-11**](#9781430260288_Ch06.xhtml#_list11). Custom Migration Mapping
    (Swift)


    ```

    override func createDestinationInstancesForSourceInstance(sInstance: NSManagedObject!,
    entityMapping mapping: NSEntityMapping!, manager: NSMigrationManager!, error:
    NSErrorPointer) -> Bool {

        // Create the book managed object


    var book = NSEntityDescription.insertNewObjectForEntityForName(mapping.destinationEntityName,
    inManagedObjectContext: manager.destinationContext) as NSManagedObject!


    book.setValue(sInstance.valueForKey("title"), forKey: "title")

        book.setValue(sInstance.valueForKey("price"), forKey: "price")


    // Get the author name from the source

        let author = sInstance.valueForKey("author") as String?


    // Split the author name into first name and last name

        let firstSpace = author?.rangeOfString(" ")

        if let firstSpace = firstSpace {

            let firstName = author?.substringToIndex(firstSpace.startIndex)

            let lastName = author?.substringFromIndex(firstSpace.endIndex)


    // Set the first and last names into the bbok

            book.setValue(firstName, forKeyPath: "firstName")

            book.setValue(lastName, forKeyPath: "lastName")

        }


    // Set up the association between the old Publication and the new Publication
    for the migration manager

        manager.associateSourceInstance(sInstance, withDestinationInstance: book,
    forEntityMapping: mapping)

        return true

    }

    ```'
