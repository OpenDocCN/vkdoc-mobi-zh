- fmt: "@NSManaged var color: UIColor  \n`@NSManaged var x: Float`  \n`@NSManaged\
    \ var y: Float`  \n\n## Creating Taps\n\nAnytime the user taps the screen, we\
    \ create a `Tap` object in the Core Data store. We’ll handle the tap in the view\
    \ controller, `ViewController`, and add a method to `Persistence` to actually\
    \ add the `Tap`. We start in `Persistence`. Open `Persistence.h`, if you’re doing\
    \ this in Objective-C, and add a method declaration for adding a `Tap`, as shown\
    \ in [Listing 7-10](#9781430260288_Ch07.xhtml#list10).\n\n[***Listing 7-10***](#9781430260288_Ch07.xhtml#_list10).\
    \ Declaration of a Method in `Persistence.h` to Add a Tap\n\n```\n#import <UIKit/UIKit.h>\n\
    ...\n- (void)addTap:(CGPoint)point;\n```\n\nIn `Persistence.m` or `Persistence.swift`,\
    \ add the definition of `addTap:`. This method creates a `Tap` instance in the\
    \ managed object context, sets its `x` and `y` values to the corresponding values\
    \ in the specified point, sets `color` to a random color using a helper function,\
    \ and then saves the managed object context. [Listing 7-11](#9781430260288_Ch07.xhtml#list11)\
    \ shows the Objective-C version of this method and the random-color-generating\
    \ helper, and [Listing 7-12](#9781430260288_Ch07.xhtml#list12) shows the Swift\
    \ version.\n\n[***Listing 7-11***](#9781430260288_Ch07.xhtml#_list11). Adding\
    \ a `Tap` in `Persistence.m`\n\n```\n#import \"Tap.h\"\n...\n- (void)addTap:(CGPoint)point\
    \ {\n    Tap *tap = [NSEntityDescription insertNewObjectForEntityForName:@\"Tap\"\
    \ inManagedObjectContext:self.managedObjectContext];\n    tap.x = point.x;\n \
    \   tap.y = point.y;\n    tap.color = [self randomColor];\n    [self saveContext];\n\
    }\n\n- (UIColor *)randomColor {\n    float red = (arc4random() % 256) / 255.0f;\n\
    \    float green = (arc4random() % 256) / 255.0f;\n    float blue = (arc4random()\
    \ % 256) / 255.0f;\n    return [UIColor colorWithRed:red green:green blue:blue\
    \ alpha:1.0];\n}\n```\n\n[***Listing 7-12***](#9781430260288_Ch07.xhtml#_list12).\
    \ Adding a Tap in `Persistence.swift`\n\n```\nfunc addTap(point: CGPoint) {\n\
    \    var tap = NSEntityDescription.insertNewObjectForEntityForName(\"Tap\", inManagedObjectContext:\
    \ self.managedObjectContext!) as? Tap\n    tap?.x = Float(point.x)\n    tap?.y\
    \ = Float(point.y)\n    tap?.color = self.randomColor()\n    self.saveContext()\n\
    }\n\nfunc randomColor() -> UIColor {\n    let red = CGFloat(arc4random() % UInt32(256))\
    \ / 255.0\n    let green = CGFloat(arc4random() % UInt32(256)) / 255.0\n    let\
    \ blue = CGFloat(arc4random() % UInt32(256)) / 255.0\n    return UIColor(red:\
    \ red, green: green, blue: blue, alpha: 1.0)\n}\n```\n\nNow add a tap gesture\
    \ recognizer to the view controller that ultimately calls the `addTap:` method\
    \ when you tap the view. [Listing 7-13](#9781430260288_Ch07.xhtml#list13) shows\
    \ the updated `ViewController.m` file, and [Listing 7-14](#9781430260288_Ch07.xhtml#list14)\
    \ shows the updated `ViewController.swift` file.\n\n[***Listing 7-13***](#9781430260288_Ch07.xhtml#_list13).\
    \ `ViewController.m` with a Tap Gesture Recognizer\n\n```\n#import \"ViewController.h\"\
