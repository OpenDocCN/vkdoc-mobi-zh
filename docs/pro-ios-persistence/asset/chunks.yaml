- fmt: '# This chapter explains what Core Data is and what components Core Data comprises


    This chapter explains what Core Data is and what components Core Data comprises.
    It outlines and explains the basic classes that Core Data uses and how they work
    together. It shows how to set up Core Data in your applications, whether you take
    advantage of Xcode''s Core Data code generation or add Core Data functionality
    by hand. It also shows the basics of creating an object model for your objects,
    storing objects, and retrieving them.


    In this chapter, you build two applications: one that tells Xcode to set up Core
    Data for you and one to which you add Core Data by hand. Neither application has
    an interface beyond a blank screen, but, rather, they both focus on Core Data
    interaction. Applications in later chapters will have actual user interfaces,
    but be patient and focus on learning the basics of Core Data. The information
    you learn in this chapter will provide a solid foundation for you throughout the
    rest of this book and with your own Core Data projects.


    ## What Is Core Data?


    Imagine computers couldn''t store data. Imagine each time you powered on your
    iPhone or iPad, you started fresh with each application you worked with. All your
    documents were gone: your school papers, your budget projection spreadsheets,
    your crafted pitch presentations for another round of venture capitalist funding,
    all vanished. You''re back to Level 1 on Angry Birds. You have no more grumpy
    cat pictures. Your texts from last night have disappeared (which, for some of
    you, might be a good thing). In short, your device is the classic tabula rasa,
    day after day, blank and empty of any data, and not very useful.


    What those imaginary computers lack is persistence: the ability to store and retrieve
    data over time. We want to persist information, like our pictures and our high
    scores and our documents. Core Data, Apple''s solution for persistence, allows
    applications to persist data of any form and retrieve it.


    Core Data isn''t technically a database, although it usually stores its data in
    one (an SQLite database, to be precise). It''s not an object-relational mapper
    (ORM), though it can feel like one. It''s truly an object graph, allowing you
    to create, store, and retrieve objects that have attributes and relationships
    to other objects. Its simplicity and power allow you to persist data of any form,
    from basic data models to complex.


    ## Core Data Components


    Newcomers to Core Data often express dismay at the complexity of the framework,
    but as we''ll see, that initial response is unfounded. Cocoa''s predilection for
    long names probably contributes to the mistaken sense of the complexity; after
    all, `NSPersistentStoreCoordinator` is a mouthful. Once you get past the long
    names, however, and understand the purpose of each of the classes, you''ll recognize
    both the elegance and the simplicity of the Core Data framework.


    We can divide the Core Data classes into two groups: the ones we generally set
    up once, when our programs launch, and the ones we work with throughout the running
    time of our programs. In addition, Cocoa provides a set of classes that Core Data
    uses that aren''t limited in scope to Core Data. Core Data leverages classes like
    `NSPredicate` and `NSSortDescriptor`, which are also used in other contexts in
    Cocoa applications, to augment its capabilities. We''ll touch on those other classes
    throughout this book.


    Let''s first discuss the classes we set up once, when our programs launch. These
    classes are


    * `NSPersistentStore`

    * `NSPersistentStoreCoordinator`

    * `NSManagedObjectModel`


    The `NSPersistentStore` class represents a persistent store: a place on your device''s
    file system that actually stores data. This is usually an SQLite database, though
    Core Data also offers other types of persistent stores:


    * XML (OS X only)

    * Atomic

    * In-memory


    XML stores, which are available only on OS X, store data (as you''d guess) in
    XML files. Atomic stores, so named because they read and write the entire data
    store when accessed, can be useful if you want to create your own file format
    for storing files. Core Data provides one atomic store implementation called the
    binary store type, and you can create custom stores based on atomic stores. Understand,
    though, that atomic stores tend to be slower, especially as your data set grows
    large, because they write and read the data files atomically. In-memory stores
    are useful if you don''t require your data to persist beyond the current launch
    of the application but still want to use the power of Core Data to interact with
    the data. Most, if not all, of your persistent stores will be SQLite stores, though.
    They''re fast, since they can read and write partial data, and they persist data
    beyond just the current launch of your applications. Each of your applications
    will often have one persistent store, though they can have more than one.


    The `NSPersistentStoreCoordinator` class represents a persistent store coordinator,
    which coordinates among persistent stores, object models, and object contexts.
    The persistent store coordinator uses an object model, which we''ll see next,
    and ties it to one or more persistent stores. It also coordinates the storage
    and retrieval of objects between one or more managed object contexts and one or
    more persistent stores. It''s in a sense the hub of Core Data, tying together
    all the Core Data classes. Luckily for you, though, it''s easy to create and configure,
    and then it performs all its complicated magic for you while your application
    runs.


    The `NSManagedObjectModel` class represents a managed object model or, more simply,
    an object model, which looks so much like a data model that you''re forgiven for
    thinking of it in that way. Just as an entity-relationship (ER) diagram defines
    tables, columns, and relationships, an object model defines entities, attributes,
    and relationships. You can create an object model in code, but Xcode provides
    an object model editor that lets you visually create object models that your application
    loads and uses.


    You use the next two classes throughout the runtime of your applications. They
    are


    * `NSManagedObjectContext`

    * `NSManagedObject`


    The `NSManagedObjectContext` class represents a managed object context, or just
    an object context. Your applications can use one or more of these, though often
    they''ll use only one. Object contexts provide places for objects to live, and
    the Apple documentation calls it a "scratch pad." You create objects in the object
    context, retrieve objects from the object context, and tell the object context
    to save itself. The object context takes care of talking to the persistent store
    coordinator to actually store and retrieve objects. You''ll talk to the object
    contexts a lot in your Core Data applications.


    The `NSManagedObject` class represents a managed object, or an object that Core
    Data manages. You can think of these as rows in a database. Managed objects have
    attributes and relationships, as defined by an object model, and use key-value
    coding (KVC) so you can easily set and get their data. You can also create a subclass
    of `NSManagedObject` to create properties that match your object model and convenience
    methods to work with your managed objects.


    [Figure 1-1](#9781430260288_Ch01.xhtml#Fig1) shows the Core Data classes and how
    they work together.


    ![9781430260288_Fig01-01.jpg](images/9781430260288_Fig01-01.jpg)


    [Figure 1-1](#9781430260288_Ch01.xhtml#_Fig1). The Core Data classes


    ## Creating a New Core Data Project'
