    Now we’re ready to build the CoreDump application on top of the generated application’s
    foundation.


    Updating the Core Data Model


    To build the CoreDump application, we must alter the Core Data model to store
    the data we want for our bug tracker. CoreDump will store a list of projects and
    a list of bugs for each project. For each project, we store


    *   Project name

    *   Project URL

    *   Hosting service


    For each bug, we store


    *   Bug title

    *   Bug details


    Delete the `Event` entity from the Core Data model and create two entities: `Project`
    and `Bug`. For `Project`, add the following properties:


    *   `name`—an attribute of type `String`

    *   `url`—an attribute of type `String`

    *   `host`—an attribute of type `String`

    *   `bugs`—an optional, to many relationship to `Bug`, with the Delete Rule set
    to Cascade


    For the `Bug` entity, add the following properties:


    *   `title`—an attribute of type `String`

    *   `details`—an attribute of type `String`

    *   `project`—a Required, to one relationship to `Project`, with the Delete Rule
    set to Nullify. Don’t forget to set the Inverse Relationship to `bugs`.


    When you have finished updating your Core Data model, it should look like [Figure
