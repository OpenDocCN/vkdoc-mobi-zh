  raw: 'You need a way to perform all this performance testing so that you can verify
    results. This section walks you through building an application that will allow
    you to run various tests and see the results. The application, shown in [Figure
    9-1](#9781430260288_Ch09.xhtml#Fig1), presents a list of tests you can run in
    a standard picker view. To run a test, select it in the picker, click the Run
    Selected Test button, and wait for the results. After the test runs, you’ll see
    the start time, the stop time, the number of elapsed seconds for the test, and
    some text describing the results of the test.


    ![9781430260288_Fig09-01.jpg](images/9781430260288_Fig09-01.jpg)


    [Figure 9-1](#9781430260288_Ch09.xhtml#_Fig1). The PerformanceTuning application


    Creating the Project


    In Xcode, create a new single-view application for iPhone called **PerformanceTuning**
    with the User Core Data check box unchecked. Add a Core Data data model called
    `PerformanceTuning.xcdatamodeld` and a class called `Persistence` to manage the
    Core Data stack. [Listings 9-1](#9781430260288_Ch09.xhtml#list1) and [9-2](#9781430260288_Ch09.xhtml#list2)
    show `Persistence.h` and `Persistence.m`, respectively. [Listing 9-3](#9781430260288_Ch09.xhtml#list3)
    shows `Persistence.swift`.


    [***Listing 9-1***](#9781430260288_Ch09.xhtml#_list1). `Persistence.h`


    ```

    @import CoreData;


    @interface Persistence : NSObject


    @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;

    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;

    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;


    - (void)saveContext;

    - (NSURL *)applicationDocumentsDirectory;


    @end

    ```


    [***Listing 9-2***](#9781430260288_Ch09.xhtml#_list2). `Persistence.m`


    ```

    #import "Persistence.h"


    @implementation Persistence


    - (instancetype)init {

      self = [super init];

      if (self != nil) {

        // Initialize the managed object model

        NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"PerformanceTuning"
    withExtension:@"momd"];

        _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];


    // Initialize the persistent store coordinator

        NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"PerformanceTuning.sqlite"];


    NSError *error = nil;

        _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:self.managedObjectModel];

        if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

                                                       configuration:nil

                                                                 URL:storeURL

                                                             options:nil

                                                               error:&error]) {

          NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

          abort();

        }


    // Initialize the managed object context

        _managedObjectContext = [[NSManagedObjectContext alloc] init];

        [_managedObjectContext setPersistentStoreCoordinator:self.persistentStoreCoordinator];

      }

      return self;

    }


    #pragma mark - Helper Methods


    - (void)saveContext {

      NSError *error = nil;

      if ([self.managedObjectContext hasChanges] && ![self.managedObjectContext save:&error])
    {

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

      }

    }


    - (NSURL *)applicationDocumentsDirectory {

      return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory
    inDomains:NSUserDomainMask] lastObject];

    }


    @end

    ```


    [***Listing 9-3***](#9781430260288_Ch09.xhtml#_list3). `Persistence.swift`


    ```

    import Foundation

    import CoreData


    class Persistence {

        // MARK: - Core Data stack


    lazy var applicationDocumentsDirectory: NSURL = {

            // The directory the application uses to store the Core Data store file.
    This code uses a directory named "book.persistence.PerformanceTuningSwift" in
    the application''s documents Application Support directory.

            let urls = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory,
    inDomains: .UserDomainMask)

