    \ 2.xcdatamodel`之前，请运行 BookStore 应用程序来创建书籍，以便有数据进行跨版本迁移。您需要在数据库中有数据来测试本章中的数据迁移是否正常工作。\n\
    \n最后，我们需要对 BookStore 应用程序进行一个小的更改。在第 4 章中，我们希望能够每次运行时都有干净的数据存储。由于我们现在想要测试迁移现有数据，需要确保旧数据存储在应用程序启动时不会被清除。打开`ViewController.m`或`ViewController.swift`，并编辑`viewDidAppear:`方法，注释掉以下代码行：\n\
    \n```\n// [self initStore];// [self insertSomeData];\n```\n\n或\n\n```\n// self.initStore()\n\
    // self.insertSomeData()\n```\n\n再次启动应用程序，确保没有创建任何内容。它应该只显示`showExampleData`方法的输出。\n\
    \n```\nBook fetched: The second bookTitle: The second book, price: 15.00Book fetched:\
    \ The third bookTitle: The third book, price: 10.00Book fetched: The first bookTitle:\
    \ The first book, price: 10.00Book fetched: The fourth bookTitle: The fourth book,\
    \ price: 12.00\n```\n\n现在，假设您想要向`Book`实体添加一个新的`author`属性。如果您编辑当前模型并向`Book`实体添加`author`属性，您将会惊讶地发现应用程序在启动时崩溃。这是因为数据存储中的数据与新的\
    \ Core Data 模型不匹配。缓解此问题的一个方法是删除现有的数据存储。在开发应用程序时，这是一个可以接受的选项，但如果您的应用程序已经有用户在使用，这将会招致他们的愤怒。为了获得更流畅的体验，我们强烈建议对模型进行版本控制，并使用\
    \ Core Data 的迁移功能，通过将用户的数据从旧模型迁移到新模型来保留数据。您对数据模型所做的任何更改都应进入新版本的模型，而不是任何旧版本。这意味着，您需要在\
    \ BookStore 2 数据模型的`Book`实体中添加`name`属性。\n\n要进行此更改，请选择 BookStore 2 数据模型，然后以常规方式向`Book`实体添加一个`String`类型的`author`属性。图\
    \ 6-4 显示了 Xcode 窗口，其中包含新版本的 Core Data 模型以及添加到`Book`实体中的`author`属性。\n\n![9781430260288_Fig06-04.jpg](img/9781430260288_Fig06-04.jpg)\n\
    \n图 6-4. 包含模型第二个版本的 Xcode 窗口\n\n要将模型的当前版本从 BookStore 更改为 BookStore 2，请选择`BookStore.xcdatamodeld`，并在\
    \ Utility 面板中将当前版本设置为 BookStore 2，如图 6-5 所示。\n\n![9781430260288_Fig06-05.jpg](img/9781430260288_Fig06-05.jpg)\n\
    \n图 6-5. 将当前数据模型版本更新为 BookStore 2\n\n此时，您的应用程序拥有一个新版本的当前数据模型，但尚未准备好运行。您需要定义一个策略，将数据从名为\
    \ BookStore 的模型版本迁移到名为 BookStore 2 的版本。如果您现在尝试运行应用程序，将会崩溃，因为就像更改第一个模型一样，数据存储与当前模型不匹配。需要告诉应用程序您希望它如何处理从旧模型到新模型的切换。本章的其余部分将讨论执行此操作的各种方法。\n\
    \n## 轻量级迁移\n\n一旦您拥有版本化的数据模型，就可以利用 Core Data 对迁移的支持来演进您的数据模型。每次创建新的数据模型版本时，用户的应用程序数据都必须从旧数据模型迁移到新数据模型。为了进行迁移，Core\
    \ Data 必须遵循规则来知道如何正确迁移数据。您可以使用“映射模型”来创建这些规则。Xcode 内置了对创建映射模型的支持。然而，对于某些简单的情况，Core\
    \ Data 足够智能，可以自行推断出映射规则，而无需您创建映射模型。这些情况被称为轻量级迁移，对作为开发者的您而言工作量最小。Core Data 会完成所有工作并迁移数据。本节详细介绍了轻量级迁移过程，并逐步介绍了该过程支持的更改类型以及如何实现它们。\n\
    \n要使您的迁移符合轻量级迁移的条件，更改必须仅限于以下几类：\n\n- 添加或删除属性（属性或关系）。\n- 将非可选属性变为可选。\n- 将可选属性变为非可选，前提是您提供了默认值。\n\
    - 添加或删除实体。\n- 重命名属性。\n- 重命名实体。\n\n除了减少您的工作量之外，与使用 SQLite 数据存储的其他迁移相比，轻量级迁移运行速度更快，占用空间更少。由于\
    \ Core Data 可以发出 SQL 语句来执行这些迁移，因此它无需将所有数据加载到内存中即可进行迁移，也无需将数据从一个存储移动到另一个存储。Core\
    \ Data 只需使用 SQL 语句就地修改 SQLite 数据库。如果可行，您应积极尝试将数据模型更改限制在轻量级迁移支持的范围内。如果不行，本章的其他部分将指导您完成更复杂的迁移。\n\
    \n## 迁移简单更改\n\n在之前的“版本控制”部分中，您在 BookStore 应用程序中创建了一个名为 BookStore 2 的新模型版本，并在 BookStore\
    \ 2 模型的`Book`实体中添加了一个名为`author`的新属性。使用此更改执行轻量级迁移的最后一步是告知持久化存储协调器两件事：\n\n- 它应自动迁移模型。\n\
    - 它应推断映射模型。\n\n您可以通过在持久化存储协调器的`addPersistentStoreWithType:`方法的`options`参数中传递这些指令来实现。首先按如下方式设置`options`（一个`字典`）：\n\
    \n```\nNSDictionary *options = @{\n  NSMigratePersistentStoresAutomaticallyOption:\
    \ @YES,\n  NSInferMappingModelAutomaticallyOption: @YES\n}; // Objective-C 版本\n\
    \nlet options = [NSMigratePersistentStoresAutomaticallyOption: true, NSInferMappingModelAutomaticallyOption:\
    \ true] // Swift 版本\n```\n\n这段代码创建了一个包含两个条目的字典。\n"
- fmt: "- 键为`NSMigratePersistentStoresAutomaticallyOption`、值为`YES`或`true`的选项，它告诉持久化存储协调器自动迁移数据。\n\
    - 键为`NSInferMappingModelAutomaticallyOption`、值为`YES`或`true`的选项，它告诉持久化存储协调器推断映射模型。\n\
    \n然后，你将这个`options`对象（而不是`nil`）作为`options`参数传递给`addPersistentStoreWithType:`调用。打开`AppDelegate.m`文件或`AppDelegate.swift`文件，将`persistentStoreCoordinator`方法修改为[代码清单6-1](#9781430260288_Ch06.xhtml#list1)（Objective-C）所示的样子，或者将`managedObjectContext`闭包中初始化`persistentStoreCoordinator`的代码修改为[代码清单6-2](#9781430260288_Ch06.xhtml#list2)（Swift）所示的样子。\n\
    \n[**代码清单6-1**](#9781430260288_Ch06.xhtml#_list1). 创建带有迁移选项的持久化存储协调器 (Objective-C)\n\
    \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if\
    \ (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n_persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\
    \ initWithManagedObjectModel:[self managedObjectModel]];\n    NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"BookStoreEnhanced.sqlite\"\
    ];\n\nNSDictionary *options = @{\n      NSMigratePersistentStoresAutomaticallyOption:\
    \ @YES,\n      NSInferMappingModelAutomaticallyOption: @YES\n    };\n\nNSError\
    \ *error = nil;\n    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:options error:&error]) {\n      [self\
    \ showCoreDataError];\n    }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n\
    [**代码清单6-2**](#9781430260288_Ch06.xhtml#_list2). 创建带有迁移选项的持久化存储协调器 (Swift)\n\n\
    ```\n// Initialize the persistent store coordinator\nlet storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
    BookStoreEnhancedSwift.sqlite\")\nvar error: NSError? = nil\nlet persistentStoreCoordinator\
    \ = NSPersistentStoreCoordinator(managedObjectModel: managedObjectModel!)\n\n\
    let options = [NSMigratePersistentStoresAutomaticallyOption: true, NSInferMappingModelAutomaticallyOption:\
    \ true]\n\nif(persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
    \ configuration: nil, URL: storeURL, options: options, error: &error) == nil)\
    \ {\n    self.showCoreDataError()\n    return nil\n}\n```\n\n迁移数据只需这些操作。构建并运行应用程序，它不再崩溃，而是显示你创建的所有书籍。打开终端，导航到包含BookStore应用程序SQLite文件的目录。与iOS\
    \ 5之前仅保留数据库文件迁移前和迁移后两个版本的早期iOS版本不同，较新的iOS版本只保留迁移后的版本。你会找到迁移后的文件`BookStoreEnhanced.sqlite`。使用`sqlite3`应用程序打开它，并运行`.schema`命令来查看`ZBOOK`表的定义。你可以看到`BookStoreEnhanced.sqlite`文件为`name`属性添加了一列：`ZAUTHOR\
    \ VARCHAR`，如下所示。\n\n```\nsqlite> .schema ZBOOKCREATE TABLE ZBOOK ( Z_PK INTEGER\
    \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT,\
    \ ZAUTHOR VARCHAR, ZTITLE VARCHAR);CREATE INDEX ZBOOK_ZCATEGORY_INDEX ON ZBOOK\
    \ (ZCATEGORY);\n```\n\n## 重命名实体和属性\n\n轻量级迁移也支持重命名实体和属性，但这需要你付出更多一点的努力。除了修改你的模型之外，你还必须指定已重命名项目的旧名称。你可以通过以下两种方式之一来完成此操作。\n\
    \n- 在Xcode数据建模器中\n- 在代码中\n\nXcode数据建模器是更简单的选择。当你在Xcode数据建模器中选择一个实体或属性时，该实体或属性的常规信息会显示在右侧的实用工具面板中。显示实用工具面板后，打开数据模型检查器，然后打开版本控制部分。在重命名ID字段中，输入你更改的任何内容的旧名称（请参见[图6-6](#9781430260288_Ch06.xhtml#Fig6)）。\n\
    \n![9781430260288_Fig06-06.jpg](images/9781430260288_Fig06-06.jpg)\n\n[图6-6](#9781430260288_Ch06.xhtml#_Fig6).\
    \ 带有重命名标识符字段的版本控制部分\n\n如果你坚持要在代码中指定旧名称，则需要根据已重命名的内容，调用`NSEntityDescription`或`NSPropertyDescription`的`setRenamingIdentifier:`方法，并传入实体或属性的旧名称。你需要在模型加载之后、但在调用打开持久化存储（`addPersistentStoreWithType:`）之前执行此操作。例如，如果你想将`Book`实体的名称更改为`Publication`，你需要在调用`addPersistentStoreWithType:`之前添加以下代码：\n\
    \n```\n// Objective-C\nNSEntityDescription *publication = [[managedObjectModel\
    \ entitiesByName] objectForKey:@\"Publication\"];\n[publication setRenamingIdentifier:@\"\
    Book\"];\n\n// Swift\nif let publication: NSEntityDescription? = managedObjectModel.entitiesByName[\"\
    Publication\"] as? NSEntityDescription {\n  publication?.renamingIdentifier =\
    \ \"Book\"\n}\n```\n\nCore Data负责迁移数据，但你仍有责任更新应用程序中任何依赖旧名称的代码。为了在实践中看到这一点，请基于Bookstore\
    \ 2模型创建一个名为Bookstore 3的数据模型新版本，并将其设置为当前版本。你现在应该处于版本3（BookStore 3）。在此版本的模型中，你将把`Book`实体重命名为`Publication`。进入你的新模型文件`BookStore\
    \ 3.xcdatamodel`，将`Book`实体重命名为`Publication`。然后，转到数据模型检查器选项卡中的版本控制部分，在重命名ID字段中输入旧名称`Book`，以便Core\
    \ Data知道如何迁移现有数据（如[图6-7](#9781430260288_Ch06.xhtml#Fig7)所示），并保存此模型。\n\n![9781430260288_Fig06-07.jpg](images/9781430260288_Fig06-07.jpg)\n\
    \n[图6-7](#9781430260288_Ch06.xhtml#_Fig7). 将Book重命名为Publication并指定重命名ID\n\n等等！在运行应用程序之前，请记住，你有责任更改任何依赖旧名称`Book`的代码。你可以将自定义托管对象类名从`Book`更改为`Publication`，将`Page`实体中的关系名称从`book`更改为`publication`，并相应地更改任何变量名。为了简单起见，我们在这里只更改BookStore应用程序中引用`Book`实体名称的地方。你可以在`ViewController.m`或`ViewController.swift`中的`fetchRequestWithEntityName:`和`insertNewObjectForEntityForName:`调用中找到它们。在这些调用中，将实体名字符串从`Book`更改为`Publication`。\n\
    \n现在你可以构建并运行BookStore应用程序；所有现有的书籍应该仍然存在。你可以打开SQLite数据库，确认模式现在有一个`ZPUBLICATION`表。\n\
    \n```\nCREATE TABLE ZPUBLICATION ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT\
    \ INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT, ZAUTHOR VARCHAR, ZTITLE VARCHAR);\n\
    ```\n\n并且没有`ZBOOK`表。\n\n如你所见，轻量级迁移几乎不费力，至少对你来说是这样。Core Data处理了弄清楚如何将数据从旧模型映射和迁移到新模型的艰巨工作。但是，如果你的模型更改超出了轻量级迁移所能处理的范围，则必须指定你自己的映射模型。\n\
    \n## 使用映射模型"
