      NSData *iv = [self randomDataOfLength:kCCBlockSizeAES128];\n  NSData *data = [(NSString\
    \ *)value dataUsingEncoding:NSUTF8StringEncoding];\n\n// Do the actual encryption\n\
      NSData *result = [self transform:data\n                          password:[self\
