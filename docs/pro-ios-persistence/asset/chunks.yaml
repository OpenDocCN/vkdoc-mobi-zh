    approach has its drawbacks, especially if a future version of your application
    augments this list of values. You really shouldn’t overwrite the user’s database
    file with a new, otherwise blank one that has more values in its list.


    Another popular option is to use multiple persistent stores. One is used to contain
    the user’s data while the other is a static data store containing the seed values
    only. This solution works, but only if your app does not allow the user to augment
    the seeded lists. For example, if we seeded the BookStore app with a static list
    of categories in a separate store, we could never allow users to add their own,
    which would be very limiting.


    If you’ve been following along with the examples in this book, you’ve already
    preloaded data into your data stores many times. Think about the applications
    in this book that don’t have edit user interfaces and how you got data into those.
    That’s right: you created managed objects in code and then saved the managed object
    context. Unfortunately, this solution also has problems of its own. For instance,
    if the seed data set is enormous, it will take forever for the app to insert all
    the records one at a time, horribly degrading the user experience. If you’ve tried
    the WordList application from [Chapter 3](#9781430260288_Ch03.xhtml), you probably
    noticed that inserting the nearly 170k words in the list took a few seconds from
    the time the list was downloaded to the time it was fully inserted into the store.


    From experience, we find that the optimum option for seeding data lies somewhere
    between showing up with a fully loaded backing store and manually inserting rows.
    The remainder of this section expands on this idea by employing an initial seed
    that can be used if this is the first time ever that the user runs the app. When
    the app is updated, that list can be modified incrementally by hand because the
    bulk of the data will already be there.


    In the BookStore application from [Chapter 2](#9781430260288_Ch02.xhtml), we seeded
    the data store by hard-coding a list of categories and books. We will use the
    seeded data store as our static seed. Go back to [Chapter 2](#9781430260288_Ch02.xhtml)
    (or download the source code—you can find the code samples for this chapter in
    the Source Code/Download area of the Apress web site [`www.apress.com`]) and run
    the app one last time, just to make sure we have created a seeded store.


    Open the Terminal app on your Mac and find the `BookStore.sqlite` file (after
    you have run the app from [Chapter 2](#9781430260288_Ch02.xhtml) at least once).
    Once you find it, copy the file to your desktop and rename it `seed.sqlite`.


    If you want to use the fast track, you can usually do it using this command from
    the Terminal prompt (all on one line):


    ```

    find ~ -name BookStore.sqlite -exec cp {} ~/Desktop/seed.sqlite \;

    ```


    Your desktop should now have a file called `seed.sqlite`, which contains all the
    seed data. One of the cardinal rules of software development is “Trust you did
    everything right, but verify anyway.” From the terminal, run `sqlite3 ~/Desktop/``seed.sqlite`.


    From the SQLite prompt, run


    ```

    sqlite> select * from ZBOOKCATEGORY;

    ```


    and you should see the data


    ```

    Z_PK        Z_ENT       Z_OPT       ZNAME

    ----------  ----------  ----------  ----------

    3           2           1           Fiction

    4           2           1           Biography

    ```


    Again, if you run


    ```

    sqlite> select * from ZBOOK;

    ```


    the book data should be present.


    ```

    Z_PK    Z_ENT   Z_OPT   ZCATEGORY   ZPRICE     ZTITLE

    ------  ------  ------  ----------  ---------  --------------

    4       1       1       4           10.0       The third book

    5       1       1       3           15.0       The second boo

    6       1       1       3           10.0       The first book

    ```


    Use the `.quit` command to exit the SQLite prompt.


    At this point, we have our original seed data. Make a copy of the BookStore Xcode
    project from [Chapter 2](#9781430260288_Ch02.xhtml). From this point on, we will
    work on that copy.


    **Note**  It is important to make a copy so that when we launch the app, it is
    launched for the first time and therefore gets seeded. To be sure, go to the iOS
    simulator and remove the BookStore app from the simulated device (press and hold
    on the icon as on the real device).


    Open the new BookStore project in Xcode.


    **Important**  Do not run the new app until we’re ready, or else it’ll create
    a data store before we’ve implemented the seeding procedure.


    Let’s start with unhooking the manual seeding we created as part of [Chapter 2](#9781430260288_Ch02.xhtml).
    Open `AppDelegate.m` or `AppDelegate.swift` and go to the `persistentStoreCoordinator`
    method. For Objective-C, change the following line:


    ```

    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"BookStore.sqlite"];

    ```


    to


    ```

    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"BookStoreEnhanced.sqlite"];

    ```


    For Swift, change this line:


    ```

    let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent("BookStoreSwift.sqlite")

    ```


    to


    ```

    let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent("BookStoreEnhancedSwift.sqlite")

    ```


    This will change the name of the SQLite file used to back Core Data and make it
    easier for us to identify later in this chapter.'
