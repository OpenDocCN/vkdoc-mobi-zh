    Creating the Add and Edit Project Screen


    The generated application didn’t require a screen to accept input when adding
    a new `Event` object. When you tapped to add an `Event`, the application just
    created the object, stuffed the current time into its `timeStamp` attribute, and
    returned. We can’t do that when creating a `Project` object, since we must collect
    a name and a URL. In this section, we create a screen to add (and, later, edit)
    a `Project` object.


    Creating the View Controller for Adding and Editing a Project


    We first create the view controller responsible for the Add/Edit Project screen.
    Create a new Cocoa Touch Class file called `ProjectViewController` and make it
    a subclass of `UIViewController`. Check the **Also create XIB file** check box,
    choose your language, and follow the steps to create the new file. Open `ProjectViewController.h`
    (Objective-C) or `ProjectViewController.swift` (Swift) and add the following:


