    The problem here is that we’re peeking at the context’s cache while it’s writing
    to it. This isn’t necessarily a Core Data issue. You cannot iterate through a
    collection and peek into it at the same time from two different threads. So it’s
    definitely a thread safety issue. This experiment exposes the cardinal rule when
    using multiple threads with Core Data: give each thread its own managed object
    context. Remember the `createManagedObjectContext` method we created? We use that
    to give the `writeData` method its own managed object context, rather than using
    the managed object context that the `reportStatus` method uses.


    When inmates fight, they go into confinement. They are stripped from their reason
    to fight because they have nothing to fight over and nobody to fight with. Thread
    confinement is a common strategy to deal with threads not “playing nice” with
    each other.


    Things go wrong pretty fast when using Core Data with multiple threads. Managing
    concurrency is done simply by avoiding sharing the resources threads fight over.
    It bears repeating: the most common solution is to create a context for each thread.


    **Important**  Each context must be created by the thread that is going to use
    it.


    Another change we make to this code is to save the managed object context after
    we add each object. We do this so that the context’s cache is written through
    to the persistent store, so that the managed object context used in the `reportStatus`
    method sees the objects. If we waited until all 10,000 objects were written before
    saving the context, the `reportStatus` method would report a 0% status until the
    writeData thread finishes writing, and then reportStatus would jump directly to
    100%.


