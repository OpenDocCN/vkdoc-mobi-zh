    At this point, your application has a new current version of the data model, but
    it’s not ready to run yet. You need to define a policy for migrating the data
    from the version of the model called BookStore to the one called BookStore 2\.
    If you tried running the application now, you would get a crash because, just
    as if you had changed the first model, the data store does not match the current
    model. The application needs to be told how you want it to handle switching from
    the old model to the new one. The rest of this chapter discusses the various ways
    to do that.


    Lightweight Migrations


    Once you have a versioned data model, you can take advantage of Core Data’s support
    for migrations as you evolve your data model. Each time you create a new data
    model version, users’ application data must migrate from the old data model to
    the new. For the migration to occur, Core Data must have rules to follow to know
    how to properly migrate the data. You create these rules using a “mapping model.”
    Support for creating mapping models is built in to Xcode. For certain straightforward
    cases, however, Core Data has enough smarts to figure out the mapping rules on
    its own without requiring you to create a mapping model. Called lightweight migrations,
    these cases represent the least work for you as a developer. Core Data does all
    the work and migrates the data. This section details the lightweight migration
    process and walks you through the list of changes the process supports and how
    to implement them.


    For your migration to qualify as a lightweight migration, your changes must be
    confined to this narrow band.


    *   Add or remove a property (attribute or relationship).

    *   Make a nonoptional property optional.

    *   Make an optional attribute nonoptional, as long as you provide a default value.

    *   Add or remove an entity.

    *   Rename a property.

    *   Rename an entity.


    In addition to requiring less work from you, a lightweight migration using a SQLite
    data store runs faster and uses less space than other migrations. Because Core
    Data can issue SQL statements to perform these migrations, it doesn’t have to
    load all the data into memory in order to migrate them, and it doesn’t have to
    move the data from one store to the other. Core Data simply uses SQL statements
    to alter the SQLite database in place. If feasible, you should aggressively try
    to confine your data model changes to those that lightweight migrations support.
    If not, the other sections in this chapter walk you through more complicated migrations.


    Migrating a Simple Change


    In a previous section, “Versioning,” you created a new model version in the BookStore
    application called BookStore 2, and you added a new attribute called `author`
    to the `Book` entity in the BookStore 2 model. The final step to performing a
    lightweight migration with that change is to tell the persistent store coordinator
    two things.


    *   It should migrate the model automatically.

    *   It should infer the mapping model.


    You do that by passing those instructions in the options parameter of the persistent
    store coordinator’s `addPersistentStoreWithType:` method. You first set up `options`,
    an `dictionary`, as follows:


    ```

    NSDictionary *options = @{

      NSMigratePersistentStoresAutomaticallyOption: @YES,

      NSInferMappingModelAutomaticallyOption: @YES

    }; // Objective-C version


    let options = [NSMigratePersistentStoresAutomaticallyOption: true, NSInferMappingModelAutomaticallyOption:
    true] // Swift version

    ```


    This code creates a dictionary with two entries.'
