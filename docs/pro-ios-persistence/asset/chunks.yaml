    \ = [NSFetchRequest fetchRequestWithEntityName:@\"Word\"];\n  fetchRequest.predicate\
    \ = predicate;\n  NSArray *gryWords = [self.managedObjectContext executeFetchRequest:fetchRequest\
    \ error:nil];\n  return [NSString stringWithFormat:@\"-gry words: %@\\n\",\n \
    \         [[gryWords valueForKey:@\"text\"] componentsJoinedByString:@\",\"]];\n\
    }\n```\n\n[***Listing 3-33***](#9781430260288_Ch03.xhtml#_list33). The `endsWithGryWords`\
    \ Method in Swift\n\n```\nfunc endsWithGryWords() -> String {\n    let text =\
    \ NSExpression(forKeyPath: \"text\")\n    let gry = NSExpression(forConstantValue:\
    \ \"gry\")\n    let predicate = NSComparisonPredicate(leftExpression: text, rightExpression:\
    \ gry, modifier: .DirectPredicateModifier, type: .EndsWithPredicateOperatorType,\
    \ options: nil)\n\nprintln(\"Predicate: \\(predicate.predicateFormat)\")\n\nvar\
    \ fetchRequest = NSFetchRequest(entityName: \"Word\")\n    fetchRequest.predicate\
    \ = predicate\n\nlet list = NSMutableString()\nvar error: NSError? = nil\n   \
    \ if let gryWords = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
    \ error: &error) {\n        for word in gryWords {\n            list.appendString(((word\
    \ as NSManagedObject).valueForKey(\"text\") as String)+\",\")\n        }\n   \
    \ }\n    return \"-gry words: \\(list)\\n\"\n}\n```\n\nYou can look in the Xcode\
    \ console to see that the query language equivalent of this predicate is\n\n```\n\
    text ENDSWITH \"gry\"\n```\n\n## Using Different Comparison Modifiers\n\nThe third\
    \ parameter to the `NSComparisonPredicate` static initializer method we’ve been\
    \ using is `modifier`, and we’ve been passing `NSDirectPredicateModifier` exclusively\
    \ for this parameter. If the left expression is a collection rather than a single\
    \ object, however, you have a few more modifiers to choose from, as shown in [Table\
    \ 3-3](#9781430260288_Ch03.xhtml#Tab3). As with the predicate type constants,\
    \ the Objective-C constants begin with `NS` and the Swift ones do not.\n\n[Table\
    \ 3-3](#9781430260288_Ch03.xhtml#_Tab3). The Comparison Predicate Modifiers\n\n\
    | Modifier | Query Language Example | Description |\n| --- | --- | --- |\n| `(NS)DirectPredicateModifier`\
    \ | `X` | Compares the left expression directly to the right expression |\n| `(NS)AllPredicateModifier`\
    \ | `ALL X` | Compares the left expression (a collection) to the right expression,\
    \ returning `YES` only if all the values match |\n| `(NS)AnyPredicateModifier`\
    \ | `ANY X` | Compares the left expression (a collection) to the right expression,\
    \ returning `YES` if any of the values match |\n\nThe `NSAllPredicateModifier`\
    \ constant, as the table shows, evaluates to the query language expression `ALL\
    \ X`, and returns `YES` only if all the values in the collection match the predicate.\
    \ Otherwise, it returns `NO`. The `NSAnyPredicateModifier` constant, on the other\
    \ hand, which evaluates to `ANY X`, returns `YES` if at least one of the values\
    \ in the collection matches the predicate. Otherwise, it returns `NO`.\n\nRemember\
    \ earlier in this chapter when we mentioned that Apple’s documentation claims\
    \ that Core Data doesn’t support aggregate expressions? In the case of `NSAllPredicateModifier`,\
    \ this is true. If you try to run an `ALL X` query, your application will crash.\
    \ You can use the `NSAnyPredicateModifier`, however, as the `anyWordContainsZ`\
