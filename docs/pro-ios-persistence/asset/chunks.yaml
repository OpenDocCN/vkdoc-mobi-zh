    ## 创建需要映射模型的新模型版本


    轻量级迁移通常足够，你真的不需要深入了解 Core Data 迁移的机制。然而，有些时候你需要稍微“弄脏手”来帮助框架弄清楚该做什么。例如，当你意识到自己一直很懒，将本应拆分成多个字段的数据合并到了一个字段中时，就是这种情况。以
    `author` 字段为例，它本应包含作者的全名（例如，John Doe）。如果你突然意识到想将其拆分为 `firstName` 和 `lastName`
    字段，就必须创建一个映射模型。这正是我们将在本节中要做的事情。


    在开始迁移之前，让我们花点时间填充 `Publication` 表中的 `author` 字段，以便有一些数据可以迁移。


    打开 `ViewController.m` 或 `ViewController.swift`，并添加一个名为 `populateAuthors` 的新方法，如代码清单
    6-3（Objective-C）和代码清单 6-4（Swift）所示。


    ***代码清单 6-3***. 填充作者（Objective-C）

    ```

    - (void)populateAuthors {

      // 1. 创建一个要分配的作者名称列表

      NSArray *authors = @[@"John Doe", @"Jane Doe", @"Bill Smith", @"Jack Brown"];


    // 2. 从数据存储中获取所有出版物

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Publication"];

      NSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      for(int i=0; i<books.count; i++) {

        Book *book = books[i];

        book.price = 20+i;


    // 3. 使用我们创建的数组中的名称之一设置作者

        [book setValue:authors[i % authors.count] forKey:@"author"];

      }


    // 4. 将所有内容提交到存储

      [self saveContext];

    }

    ```


    ***代码清单 6-4***. 填充作者（Swift）

    ```

    func populateAuthors() {

        // 1. 创建一个要分配的作者名称列表

        let authors = ["John Doe", "Jane Doe", "Bill Smith", "Jack Brown"]


    // 2. 从数据存储中获取所有出版物

        let fetchRequest = NSFetchRequest(entityName: "Publication")

        let books = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    nil)

        if let books = books {

            for var i = 0; i<books.count; i++ {

                var book = books[i] as Book

                book.price = 20 + Float(i)

                // 3. 使用我们创建的数组中的名称之一设置作者

                book.setValue(authors[i % authors.count], forKeyPath: "author")

            }

        }


    // 4. 将所有内容提交到存储

        saveContext()

    }

    ```


    请注意，我们还修改了价格，确保它大约为 15 美元，这样就不会触发我们在 BookStore 原始版本中设定的验证规则。


