    The Core Data stack now properly initializes when the application runs, but without
    an object model or any objects in it, we can’t really see evidence of that. The
    next step is to create an object model.


    Creating the Object Model


    At this point, we’ve added all the Core Data pieces to the application that Xcode
    would have done for us had we checked the Use Core Data check box. For an application
    that you manually add Core Data to, you create the object model in the same way
    that you did for an application for which you checked Xcode’s Use Core Data check
    box.


    For PersistenceApp, we store gadgets that have a name and a price. Open the object
    model, `PersistenceApp.xcdatamodeld`, in Xcode’s Project Navigator, and add a
    `Gadget` entity with a `String` attribute called `name` and a `Float` attribute
    called `price`. Your data model should match [Figure 1-7](#9781430260288_Ch01.xhtml#Fig7).


    ![9781430260288_Fig01-07.jpg](images/9781430260288_Fig01-07.jpg)


    [Figure 1-7](#9781430260288_Ch01.xhtml#_Fig7). The `Gadget` entity in the `PersistenceApp.xcdatamodeld`
    managed object model


    Now that we have an object model, we can create some objects in it.


    Adding Objects to PersistenceApp


    Once again, we use the `application:didFinishLaunchingWithOptions` method to add
    objects to the object model. This time, however, we’ll do that work in another
    method that we call from `application:didFinishLaunchingWithOptions`. Also, instead
    of relying on the `sqlite3` command-line tool to view the stored data, we fetch
    the objects from the persistent store and log them to the console—again, from
    a separate method. To begin, add calls to the two methods that we will create
    in `application:didFinishLaunchingWithOptions`, so that the code matches [Listing
    1-18](#9781430260288_Ch01.xhtml#list18) (Objective-C) or [Listing 1-19](#9781430260288_Ch01.xhtml#list19)
    (Swift).


    [***Listing 1-18***](#9781430260288_Ch01.xhtml#_list18). Adding Calls to Create
    and Fetch Objects (Objective-C)


    ```

    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {

      self.persistence = [[PAPersistence alloc] init];

      [self createObjects];

      [self fetchObjects];


    return YES;

    }

    ```


    [***Listing 1-19***](#9781430260288_Ch01.xhtml#_list19). Adding Calls to Create
    and Fetch Objects (Swift)


    ```

    func application(application: UIApplication!, didFinishLaunchingWithOptions launchOptions:
    NSDictionary!) -> Bool {

      persistence = Persistence()


    createObjects()

      fetchObjects()


    return true

    }

    ```


    Then, create implementations for the new methods. The `createObjects` method should
    look familiar; as before, you create the objects in the managed object context,
    then save the context. This code creates four `Gadget` instances: an iPad, an
    iPad Mini, an iPhone, and an iPod touch. The prices for them are in US dollars,
    and may or may not be accurate! [Listing 1-20](#9781430260288_Ch01.xhtml#list20)
    shows the Objective-C code, and [Listing 1-21](#9781430260288_Ch01.xhtml#list21)
    shows the Swift code. One thing to notice: since KVC requires object values, not
    primitives, the prices we set on the objects are `NSNumber` instances, not primitive
    floats.


    [***Listing 1-20***](#9781430260288_Ch01.xhtml#_list20). The Objective-C `createObjects`
    Method


    ```

