    ## Performing the Encryption and Decryption


    To do the actual encryption and decryption, we use the Common Crypto library supplied
    by iOS. This isn’t a book on encryption, so we don’t delve into details on how
    the encryption works. We encourage you to do your own research on encryption if
    you want to know more. Some iOS cryptography resources include


    *   Apple’s Cryptographics Services Guide at `https://developer.apple.com/library/mac/documentation/security/conceptual/cryptoservices/Introduction/Introduction.html`

    *   Rob Napier’s blog post: “Properly Encrypting With AES With CommonCrypto” at
    `http://robnapier.net/aes-commoncrypto/`


    For the purposes of this chapter, you should understand the following:


    *   We use symmetrical encryption using a user-supplied password as the key.

    *   For each string we encrypt, we create a random salt that we combine with the
    password and hash using SHA1.

    *   We use the AES algorithm for encryption.


    We use a user-supplied password that we store in a member of the application delegate
    called, appropriately, `password`. Add it to `AppDelegate.h` or `AppDelegate.swift`,
    as shown in [Listing 7-29](#9781430260288_Ch07.xhtml#list29) (Objective-C) and
    [Listing 7-30](#9781430260288_Ch07.xhtml#list30) (Swift).


    [***Listing 7-29***](#9781430260288_Ch07.xhtml#_list29). Adding Password to the
    Application Delegate (Objective-C)


    ```

    @property (copy, nonatomic) NSString *password;

    ```


    [***Listing 7-30***](#9781430260288_Ch07.xhtml#_list30). Adding Password to the
    Application Delegate (Swift)


    ```

    var password: String?

    ```


    Before we discuss how to prompt the user for the password and how to verify it’s
    correct, and how to generate and store the salts for each string, we build the
    actual value transformer. Before building it, we must understand the value transformer
    methods and what they do.


    ### Understanding the NSValueTransformer Methods


    `NSValueTransformer` has four interesting methods: two are static, and two are
    instance methods. [Table 7-1](#9781430260288_Ch07.xhtml#Tab1) lists these methods
    and what they do.


    [Table 7-1](#9781430260288_Ch07.xhtml#_Tab1). The `NSValueTransformer` Methods


    | Method | Description |

    | --- | --- |

    | `+ (BOOL)allowsReverseTransformation` | Static method that returns `YES` if
    this value transformer supports reverse transformations, `NO` if it doesn’t. The
    default is `YES`. |

    | `+ (Class)transformedValueClass` | The class of the value returned by a forward
    transformation. |

    | `- (id)transformedValue:(id)value` | Called to transform `value` into the new
    value. |

    | `- (id)reverseTransformedValue:(id)value` | Called to transform in reverse,
    transforming `value` to the new value. Your value transformer must support reverse
    transformations. Override this method if you can’t reverse a transformation simply
    by reapplying `transformedValue;`. |


    ### Implementing the Encryption/Decryption Value Transformer


    For our encryption/decryption value transformer, we must support both forward
    and reverse transformations—we encrypt on a forward transformation into the Core
    Data data store and decrypt on a reverse transformation into memory and onto the
    screen. Thus, we override `transformedValue:` and `reverseTransformedValue:` to
    encrypt and decrypt, respectively. We don’t bother to override `allowsReverseTransformation`,
    as the default return value is `YES`. We return the `NSData` class for `transformedValueClass`,
    since that is the type of the object we return from `transformedValue:`.


    An interesting problem is how to store two pieces of data for each string we encrypt:
    the salt and the initialization vector (IV), each of which is random data. These
    bits of data combine with the password to prevent rainbow table attacks across
    your data. We create these when we encrypt a string, and then use them to decrypt
    the string. Since we must have the salt and IV for each string to decrypt it,
    we must store both the salt and the IV for each encrypted string.


    You might think we could create attributes in the `Note` entity in the Core Data
    model to store the salt and the IV for each managed object, but remember that
    we’re giving Core Data an `NSTransformer`-derived class to read and write our
    `Transformable` attributes. Core Data code, not our code, will be instantiating
    and calling our transformers. Further, our transformer class knows nothing about
    the context in which it’s called—it doesn’t know anything about the managed object
    that it’s being used for. All it knows is that it receives a value and returns
    a value. We can’t read from or write to other attributes in the model in our transformer
    because we don’t know which managed object we’re working with, or even which attribute
    we’re encrypting or decrypting.


    The solution, then, is to mash together the salt, IV, and encrypted string into
    a single attribute when we write the data, and parse the salt, IV, and encrypted
    string back from the data when we read so we can perform the decryption. We’ll
    store the data as follows:


    *   Salt (8 bytes)

    *   IV (16 bytes)

    *   Encrypted string (the rest of the bytes)


    For the actual encryption and decryption, we create a parameterized helper method
    called `transform:`, which allows us to specify whether to encrypt or decrypt,
    since the code for doing each operation is so similar. This method takes the password,
    salt, and IV as parameters. As we said before, we don’t discuss the details of
    the actual encryption and decryption but have added comments to the code that
    you can follow.'
