- fmt: "**Listing 8-25.** A Private Property for the Dropbox Data Store in `ViewController.m`\n\
    \n```\n@interface ViewController ()\n@property (nonatomic, strong) DBDatastore\
    \ *datastore;\n@end\n```\n\n**Listing 8-26.** A Property for the Dropbox Data\
    \ Store in `ViewController.swift`\n\n```\nvar datastore: DBDatastore?\n```\n\n\
    The `DBDatastore` property represents the data container that will automatically\
    \ be synced with Dropbox. As long as you keep an instance of it in your app, the\
    \ data store will sync automatically.\n\nNow you can edit the `didPressLink:`\
    \ method to behave differently if the account is already linked, as shown in Listing\
    \ 8-27 (Objective-C) or Listing 8-28 (Swift). As its comments describe, this updated\
    \ method does the following:\n\n* Creates a data store in Dropbox if one doesn’t\
    \ already exist\n* Gets a handle to the Notes table, creating it if necessary\n\
    * Creates a new note with the current date as its text and stores it in Dropbox\n\
    * Syncs the data store\n\n**Listing 8-27.** Create a Note in Dropbox (Objective-C)\n\
    \n```\n- (IBAction)didPressLink {\n    DBAccount *linkedAccount = [[DBAccountManager\
    \ sharedManager] linkedAccount];\n    if (linkedAccount) {\n        // If there\
    \ isn't a store yet, make one\n        if (!self.datastore) self.datastore = [DBDatastore\
    \ openDefaultStoreForAccount:linkedAccount error:nil];\n\n        // Create or\
    \ get a handle to the Notes table if it already exists\n        DBTable *notes\
    \ = [self.datastore getTable:@\"Notes\"];\n\n        // Make a new note to store.\
    \ In a normal app, this comes from typed text. To keep things\n        // simple,\
    \ we just manufacture the text with a timestamp\n        NSDate *now = [NSDate\
    \ date];\n        NSString *noteText = [NSDateFormatter localizedStringFromDate:now\n\
    \                                                           dateStyle:NSDateFormatterShortStyle\n\
    \                                                           timeStyle:NSDateFormatterFullStyle];\n\
    \n        // Insert the new note into the table\n        [notes insert:@{ @\"\
    details\": noteText, @\"createDate\": now, @\"encrypted\": @NO }];\n\n       \
    \ NSLog(@\"Inserted new note: %@\", noteText);\n\n        // Make sure to tell\
    \ Dropbox to sync the store\n        [self.datastore sync:nil];\n    } else {\n\
    \        [[DBAccountManager sharedManager] linkFromController:self];\n    }\n\
    }\n```\n\n**Listing 8-28.** Create a Note in Dropbox (Swift)\n\n```\n@IBAction\
    \ func didPressLink(sender: AnyObject) {\n    if let linkedAccount = DBAccountManager.sharedManager().linkedAccount\
    \ {\n        // if there isn't a store yet, make one\n        if self.datastore\
    \ == nil {\n            self.datastore = DBDatastore.openDefaultStoreForAccount(linkedAccount,\
    \ error: nil)\n        }\n\n        // Create or get a handle to the Notes table\
    \ if it already exists\n        let notes = datastore?.getTable(\"Notes\")\n\n\
    \        // Make a new note to store. In a normal app, this comes from typed text.\
    \ To keep things\n        // simple, we just manufacture the text with a timestamp\n\
    \        let now = NSDate()\n        let noteText = NSDateFormatter.localizedStringFromDate(now,\
    \ dateStyle: .ShortStyle, timeStyle: .FullStyle)\n\n        // Insert the new\
    \ note into the table\n        notes?.insert([\"details\": noteText, \"createDate\"\
    : now, \"encrypted\": false])\n\n        println(\"Inserted new note \\(noteText)\"\
    )\n\n        // Make sure to tell Dropbox to sync the store\n        datastore?.sync(nil)\n\
    \    } else {\n        DBAccountManager.sharedManager().linkFromController(self)\n\
    \    }\n}\n```\n\nAt this point, you can run the app and after you’ve linked to\
    \ Dropbox, every time you press the \"Store\" button, a new note is added into\
    \ your data store. You can even verify that everything went well using Dropbox's\
    \ web view at `www.dropbox.com/developers/apps/datastores`. You should see the\
    \ app you created with a link to browse the data store. If you click the Browse\
    \ link, you should see a listing of the notes you’ve created from the app.\n\n\
    Of course, you can always query the data store in your application code to get\
    \ your records back. For example, to get all the notes in the Notes table, you’d\
    \ write code like that shown in Listing 8-29 (Objective-C) or Listing 8-30 (Swift).\n\
    \n**Listing 8-29.** Retrieving All the Notes (Objective-C)\n\n```\nNSError *error;\n\
    DBTable *notes = [self.datastore getTable:@\"Notes\"];\nNSArray *myNotes = [notes\
    \ query:nil error:&error];\n```\n\n**Listing 8-30.** Retrieving All the Notes\
    \ (Swift)\n\n```\nvar error: DBError?\nlet notes = datastore?.getTable(\"Notes\"\
    )\nlet myNotes = notes?.query(nil, error: &error)\n```\n\nNotice that the parameter\
    \ we passed for `query` is `nil`, so the data store will return all records in\
    \ the Notes table. The query parameter takes an `NSDictionary` (Objective-C) or\
    \ `AnyObject` (Swift) instance to filter the result set it returns. We can filter\
    \ the results by passing a dictionary object with the fields specified that we\
    \ want to filter on. Suppose, for example, that some of the records we put into\
    \ the Notes table are encrypted—that is, the dictionary passed to `insert:` has\
    \ `@\"encrypted\"` set to `@YES`. To retrieve only those records, we’d use code\
    \ like that shown in Listing 8-31 (Objective-C) or Listing 8-32 (Swift).\n\n**Listing\
    \ 8-31.** Filtering the Result Set (Objective-C)\n\n```\nNSError *error;\nDBTable\
    \ *notes = [self.datastore getTable:@\"Notes\"];\nNSArray *myNotes = [notes query:@{\
    \ @\"encrypted\": @YES } error:&error];\n```\n\n**Listing 8-32.** Filtering the\
    \ Result Set (Swift)\n\n```\nvar error: DBError?\nlet notes = datastore?.getTable(\"\
    Notes\")\nlet myNotes = notes?.query([\"encrypted\": true], error: &error)\n```\n\
    \nYou could, of course, set multiple values in the dictionary to filter on multiple\
    \ keys.\n\n## Using Core Data with the Dropbox Datastore API: ParcelKit\n\nWe’ve\
    \ seen how iCloud can be used to back up and sync Core Data stores. We’ve also\
    \ seen how Dropbox's Datastore API can be used as a schema-less store. In this\
    \ section, we look at how the Datastore API can be used as a substitute for iCloud\
    \ with your Core Data store. For this, we use the ParcelKit library (`https://github.com/overcommitted/ParcelKit`).\n\
    \nIn order to illustrate the complete process, we start with a fresh application.\
    \ In Xcode, create a new project using the Master-Detail Application template.\
    \ Name the project DropboxEvents, and, this time, be sure to check the Use Core\
    \ Data check box.\n\nOf course, you may launch the application and get the regular\
    \ Master-Detail sample application where you can hit the + button to create new\
    \ events.\n\n### Adding the Required Frameworks for Dropbox and ParcelKit\n\n\
    You can add ParcelKit by using Cocoapods (`http://cocoapods.org`), or you can\
    \ download the source from `https://github.com/overcommitted/ParcelKit` and follow\
    \ the instructions on that page to build the framework. If you use cocoapods,\
    \ you can skip the rest of this section.\n\nIn the previous section, we’ve seen\
    \ how to integrate with Dropbox and add the frameworks it requires. For the DropboxEvents\
    \ app, repeat those steps to add `Dropbox.framework` and the other required standard\
    \ frameworks to the project.\n\n* `CFNetwork.framework`\n* `Security.framework`\n\
    * `SystemConfiguration.framework`\n* `QuartzCore.framework`\n* `libc++.dylib`\n\
    * `libz.dylib`\n\nNext, add the ParcelKit library itself to your project. The\
    \ dependencies should look as shown in Figure 8-5.\n\n![9781430260288_Fig08-05.jpg](images/9781430260288_Fig08-05.jpg)\n\
    \n**Figure 8-5.** The dependencies of the Dropbox/ParcelKit application"
