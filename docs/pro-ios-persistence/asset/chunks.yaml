        let errors : NSArray = error.code == NSValidationMultipleErrorsError ? error.userInfo?[NSDetailedErrorsKey]
    as NSArray : NSArray(object: error)


    // Iterate through the errors

        for err in errors {

            // Get the property that had a validation error

            let e = err as NSError

            let info = e.userInfo

            let propName : AnyObject? = info!["NSValidationErrorKey"]

            var message : String?


    // Form an appropriate error message

            switch err.code {

            case NSValidationNumberTooSmallError:

                message = "\(propName!) must be at least $15"

            default:

                message = "Unknown error. Press Home button to halt."

            }


    // Separate the error messages with line feeds

            if errorText.length > 0 {

                errorText.appendString("\n")

            }


    errorText.appendString(message!)

        }


    return errorText

    }

    ```


    We now have a method that returns a more useful message to help the user. Let’s
    hook it up to our test code. Since some of the books we insert in the `insertSomeData`
    method have a price lower than $15, the error should kick in.


    Edit the saveContext method in the view controller to call the validationErrorText
    method, as [Listing 4-35](#9781430260288_Ch04.xhtml#list35) (Objective-C) and
    [Listing 4-36](#9781430260288_Ch04.xhtml#list36) (Swift) show.


    [***Listing 4-35***](#9781430260288_Ch04.xhtml#_list35). Calling the Validation
    Error-Handling Routine (Objective-C)


    ```

    - (void)saveContext {

      NSManagedObjectContext *managedObjectContext = self.managedObjectContext;

      if (managedObjectContext != nil) {

        NSError *error = nil;

        if ([managedObjectContext hasChanges] && ![managedObjectContext save:&error])
    {

          NSString *message = [self validationErrorText:error];

          NSLog(@"Error: %@", message);

        }

      }

    }

    ```


    [***Listing 4-36***](#9781430260288_Ch04.xhtml#_list36). Calling the Validation
    Error-Handling Routine (Swift)


    ```

    func saveContext() {

        var error: NSError? = nil

        if let managedObjectContext = self.managedObjectContext {

            if managedObjectContext.hasChanges && !managedObjectContext.save(&error)
    {

                let message = validationErrorText(error!)

                println("Error: \(message)")

            }

        }

    }

    ```


    Launch the BookStore app and you will see the validation errors in the logs where
    the books we tried to insert were invalid.


