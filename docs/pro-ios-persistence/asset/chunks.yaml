    # 关于作者


    ![9781430260288_unFigFM-01.jpg](img/9781430260288_unFigFM-01.jpg)


    **迈克尔·普里瓦特**是位于佛罗里达州杰克逊维尔的 Availity, LLC 公司的高级开发人员。他负责监督构成交易处理平台各个组件的设计与实现。他曾合著《Pro
    Core Data for iOS》（Apress, 2011）和《Beginning OS X Lion Apps Development》（Apress,
    2011）。他发布了多个 iOS 应用，包括 Ghostwriter Notes、Budget Tracker 和 Fluid Notes。他在法国尼斯大学获得计算机科学工程学位，之后加入麻省理工学院从事应用人工智能研究。他目前与妻子凯莉以及孩子马蒂厄和克洛伊居住在法国。


    ![9781430260288_unFigFM-02.jpg](img/9781430260288_unFigFM-02.jpg)


    **罗布·华纳**是位于佛罗里达州杰克逊维尔的 Availity, LLC 公司的高级技术职员，他与各种技术打交道，为医疗保健领域提供解决方案。他曾合著《Pro
    Core Data for iOS》（Apress, 2011）、《Beginning OS X Lion Apps Development》（Apress,
    2011）以及《The Definitive Guide to SWT and JFace》（Apress, 2004）；他在 `www.grailbox.com`
    上写博客。他在杨百翰大学获得英语学士学位，并正在佐治亚理工学院攻读计算机科学硕士学位。他目前与妻子雪莉以及五个孩子泰森、雅各布、马洛里、卡米和莱拉居住在佛罗里达州杰克逊维尔。


    # 关于技术审校者


    ![9781430260288_unFigFM-03.jpg](img/9781430260288_unFigFM-03.jpg)


    **罗恩·纳塔莉**拥有 35 年在 Unix、OS X 和 Windows 上使用 C、Objective-C 和 C++ 开发大型应用的经验。他拥有约翰·霍普金斯大学的电气工程学位，并教授过编程、网络设计和计算机安全方面的专业课程。他大部分时间与妻子玛吉在弗吉尼亚州和北卡罗来纳州之间度过。


    ![9781430260288_unFigFM-04.jpg](img/9781430260288_unFigFM-04.jpg)


    **伊桑·马特哈**是一名软件工程师，目前担任 Ubiquiti Networks 公司的 iOS 移动架构师，并为广泛的客户提供私人咨询支持。作为一名拥有
    12 年经验的全栈工程师，伊桑的经验涵盖了为美国国防部编写服务器端软件，以及为 Actian Inc、Paypal、Salesforce 和湾区其他初创公司承担重要的移动项目。作为丈夫和两个孩子的父亲，伊桑喜欢住在圣马特奥县红杉林的中心地带，在那里，他对自然的好奇和惊叹是日常生活的一部分。他认为自然环境激发了他对解决问题的热爱，他经常在树林中长途徒步，以思考最具挑战性的工程难题。


    # 致谢


    写书是一项耗时费力的工作，会占用大量本应陪伴家人的时间。这是我的妻子凯莉和我的两个孩子马蒂厄和克洛伊允许我做出的牺牲，并承诺等项目完成后我会弥补他们。我非常感谢他们的耐心，以及允许我完成这个项目。我现在意识到，弥补的时间到了，对此我感到非常兴奋。每一版我们都会遇到新读者，他们直言不讳地告诉我们喜欢什么、不喜欢什么，并希望在下个版本中看到什么。我感谢那些在谈论这本书时表现出极大热情的人，我也感谢所有带来想法帮助我们每版改进的人。像这样的项目起初往往显得令人望而生畏。我们越是深入思考各个章节，决定如何组织它们，并推测所有需要阐述的内容，就越感觉到自己分身乏术。但出色的
    Apress 团队全程给予我们支持。他们通过提供指导、帮助我们组织工作以及提供所需的协作工具，真正地减轻了我们很多负担。他们真是一家新一代的出版公司。没有我所工作的公司
    Availity 的支持，这本书就不可能存在。从领导层的每个人，包括 Trent Gavazzi、Mary Anne Orenchuk、Jack Hunt
    和 Steve Vaughn，他们经常来询问这本书的进展。我们的一些工程师也乐于提出建议并表达支持：Rob McGuinness、Ed McNeil、Herve
    Devos、Kelly Burton。与他们共事非常愉快，我感谢他们所有人的支持。

