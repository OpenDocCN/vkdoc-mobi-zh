    ```


    ### Synching Content


    At this point, we have an application that saves its data store in iCloud. This
    is a great solution for keeping a backup of the data, but not so good if you are
    using your app on multiple devices. Unfortunately, the cloud will retain only
    the data saved by the last device you used, possibly overwriting what was saved
    by other devices you used.


    In order for your code to synchronize data across devices, you subscribe to the
    notifications that Core Data sends for iCloud synching. Table 8-1 lists these
    notifications.


    ### Table 8-1. Available Notification Types


    | **Notification type** | **Description** |

    | --- | --- |

    | `NSPersistentStoreUbiquitousTransitionTypeAccountAdded` | Sent when a new iCloud
    account was added while the app was running. This is useful to transition a store
    to the new account. |

    | `NSPersistentStoreUbiquitousTransitionTypeAccountRemoved` | Sent when the existing
    iCloud account was removed from the device while the app was running. This tells
    you that the persistent store is transitioning to local storage. |

    | `NSPersistentStoreUbiquitousTransitionTypeContentRemoved` | Sent when the user
    clears the contents of the iCloud account, usually using Delete All from Documents
    & Data in Settings. The Core Data integration will transition to an empty store
    file as a result of this event. |

    | `NSPersistentStoreUbiquitousTransitionTypeInitialImportCompleted` | Sent when
    Core Data has finished building a store file that is consistent with the contents
    of the iCloud account. |


    You can make sure your app reacts to changes in iCloud in order to merge everything
    correctly by using the store notifications.


    Open `AppDelegate.m` or `AppDelegate.swift` and add the appropriate notifications
    to the `persistentStoreCoordinator` method right after creating the persistent
    store, but right before adding it to the coordinator. The method should look like
    Listing 8-5 (Objective-C) or Listing 8-6 (Swift).'
