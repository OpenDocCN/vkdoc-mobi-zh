    \ 5-56（Objective-C 版本）和 清单 5-57（Swift 版本）。\n\n***清单 5-56***. `viewWillAppear:`\
    \ 方法 (Objective-C)\n\n```\n- (void)viewWillAppear:(BOOL)animated {\n    [super\
