    Prompting For and Verifying the Password


    We’ve been ignoring the need for the user to enter a password that SecureNote
    uses to encrypt and decrypt the notes, so let’s address that now. To address password
    entry, we do the following:


    1.  Insert a new view and view controller in front of the master view controller
    that displays a password entry field and a Log In button.

    2.  When the user attempts to log in, set the `password` field we created in the
    application delegate to the entered password.

    3.  If the user has not yet entered a password, accept any input as the official
    password, store it in the iOS keychain, and segue to the master view.

    4.  If the user already has a password in the iOS keychain, compare the entered
    password to the stored password and, only if they match, segue to the master view.


    Since we must interface with the iOS keychain, and the keychain API is a nasty
    mess of C code, we’re going to cheat a little and download Sam Soffes’s excellent
    library SSKeychain from `https://github.com/soffes/sskeychain`. Add this library
    to your project, either through CocoaPods or by cloning the repository and adding
    the source files. Since we already added the security framework to the project,
    you should be ready to use SSKeychain once you add the source files.


    Adding the Password View Controller


    Create a new `UIViewController` class (with no XIB file) called `PasswordViewController`
    that will control the password view, accept the password input, verify the password
    entered, and determine whether to segue to the master view. This controller will
    also be responsible for setting the managed object context in the master view
    controller to the application’s managed object context. The header file, `PasswordViewController.h`,
    should have an outlet for the password text field so we can extract the password
    that the user enters, as shown in [Listing 7-39](#9781430260288_Ch07.xhtml#list39).


    [***Listing 7-39***](#9781430260288_Ch07.xhtml#_list39). `PasswordViewController.h`
    with an Outlet for the Password Field


    ```

    #import <UIKit/UIKit.h>


    @interface PasswordViewController : UIViewController


    @property (weak, nonatomic) IBOutlet UITextField *passwordField;


    @end

    ```


    The implementation file, either `PasswordViewController.m` or `PasswordViewController.swift`,
    overrides two methods.


    *   `prepareForSegue:sender:`, which allows us to do any preparation before the
    segue is performed.

    *   `shouldPerformSegueWithIdentifier:sender:`, which gives us the opportunity
    to either allow or disallow the segue to be performed.


    In `prepareForSegue:sender:`, we grab the managed object context from the application
    delegate and set it on the Master View Controller.


    In `shouldPerformSegueWithIdentifier:sender:`, we make sure the user has actually
    entered something in the password field. We set whatever the user has entered
    into the application delegate. Then, we grab the SecureNote password stored in
    the iOS keychain. If the password from the keychain is blank, we store the password
    the user entered into the keychain and then allow the segue to be performed by
    returning `YES`. If we find a SecureNote password in the keychain, however, we
    verify it against the password that the user entered and allow the segue to be
    performed only if they match. [Listing 7-40](#9781430260288_Ch07.xhtml#list40)
    shows `PasswordViewController.m` and [Listing 7-41](#9781430260288_Ch07.xhtml#list41)
    shows `PasswordViewController.swift`.


    [***Listing 7-40***](#9781430260288_Ch07.xhtml#_list40). `PasswordViewController.m`


    ```

    #import "PasswordViewController.h"

    #import "AppDelegate.h"

    #import "MasterViewController.h"

    #import "SSKeychain.h"


    @implementation PasswordViewController


    #pragma mark - Navigation


    - (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender {

      if ([segue.identifier isEqualToString:@"logIn"]) {

        // Set the managed object context in the master view controller

        AppDelegate *appDelegate = (AppDelegate *)[[UIApplication sharedApplication]
    delegate];

        MasterViewController *controller = (MasterViewController *)[segue destinationViewController];

        controller.managedObjectContext = appDelegate.managedObjectContext;

      }

    }


    - (BOOL)shouldPerformSegueWithIdentifier:(NSString *)identifier sender:(id)sender
    {

      // Make sure they''ve entered something in the password field

      NSString *enteredPassword = self.passwordField.text;

      if ([identifier isEqualToString:@"logIn"] && enteredPassword.length > 0) {


    // Store whatever they''ve entered in the application delegate

        AppDelegate *appDelegate = (AppDelegate *)[[UIApplication sharedApplication]
    delegate];

        appDelegate.password = enteredPassword;


    // Retrieve the password from the keychain

        NSString *password = [SSKeychain passwordForService:@"SecureNote" account:@"default"];


    // If they''ve never entered a password, they''re creating a new one

        if (password == nil) {

          // Store the password in the keychain and allow segue to be performed

          [SSKeychain setPassword:enteredPassword forService:@"SecureNote" account:@"default"];

          return YES;

        } else {

          // Verify password and allow segue only if verified

          return [password isEqualToString:enteredPassword];

        }

      } else {

        return NO;

      }

    }


    @end

    ```


