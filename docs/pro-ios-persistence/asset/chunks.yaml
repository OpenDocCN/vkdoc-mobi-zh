    required init(coder aDecoder: NSCoder) {

        super.init(coder: aDecoder)


    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),
    { () -> Void in

            self.persistence = Persistence()

            dispatch_async(dispatch_get_main_queue(), { () -> Void in

                self.managedObjectContext = self.persistence?.managedObjectContext

            })

        })

    }

    ```


    A couple of things are happening here. First, we add an observer (using the Key-Value
    Observer (KVO) API) of the `managedObjectContext` property in the Objective-C
    version of the code. Because everything will happen on a different thread, we
    can no longer count on this value being set in `viewDidAppear:`, so we’ll launch
    our "write" code when we get notified instead. We then dispatch the initialization
    code to another thread. When Core Data finishes initializing, we set the `managedObjectContext`
    property on the main thread. Why do we need to set it on the main thread? Because
    as we stated before, the managed context must be created on the thread that will
    use it. Since we will be using the managed object on the main thread, we set it
    on the main thread.


    When we set the managed object context property value, the KVO notification will
    fire so we also need to observe it and launch the "write" code when the property
    changes. We do this differently for Objective-C than for Swift, since the semantics
    of these languages differ. For Objective-C, move all your code from `viewDidAppear:`
    to a new method called `observeValueForKeyPath:ofObject:change:context:`, which
    will be automatically called when the `managedObjectContext` property that we’re
    observing changes. [Listing 9-74](#9781430260288_Ch09.xhtml#list74) shows the
    code.


    [***Listing 9-74***](#9781430260288_Ch09.xhtml#_list74). Observing the Change
    in `managedObjectContext` (Objective-C)


    ```

    - (void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object change:(NSDictionary
    *)change context:(void *)context {

        dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,
    0), ^{

            [self writeData];

        });


    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),
    ^{

            CGFloat status = 0;

            while(status < 1.0) {

                status = [self reportStatus];

                dispatch_async(dispatch_get_main_queue(), ^{

                    self.progressView.progress = status;

                    self.label.text = [NSString stringWithFormat:@"%lu%%",

                                       (unsigned long)(status * 100)];

                });

            }


    NSLog(@"All done");

        });

    }

    ```


    For Swift, we create a `didSet` observer for the `managedObjectContext` property
    that calls a new method we create called `initiate`. [Listing 9-75](#9781430260288_Ch09.xhtml#list75)
    shows the code.


    [***Listing 9-75***](#9781430260288_Ch09.xhtml#_list75). Observing the Change
    in `managedObjectContext` (Swift)


    ```

    var managedObjectContext: NSManagedObjectContext? {

        didSet {

            self.initiate()

        }

    }


    func initiate() {

        dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,
    0), { () -> Void in

            self.writeData()

        })


    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),
    { () -> Void in

            var status : Float = 0

            while(status < 1) {

                status = self.reportStatus()

                dispatch_async(dispatch_get_main_queue(), { () -> Void in

                    self.progressView.progress = status

                    self.label.text = NSString(format: "Status: %lu%%", Int(status
    * 100))

                })


    //println(NSString(format: "Status: %lu%%", Int(status * 100)))

            }


    println("All done")

        })

    }

    ```


    In both languages, the `viewDidAppear` method should now be gone from your code.
    The last step, to keep everything clean, is to make sure we have default values
    for the UI elements. We set initial values in `viewWillAppear:`, as shown in [Listing
    9-76](#9781430260288_Ch09.xhtml#list76) (Objective-C) and [Listing 9-77](#9781430260288_Ch09.xhtml#list77)
    (Swift).


    [***Listing 9-76***](#9781430260288_Ch09.xhtml#_list76). Setting the UI Elements
    to Default Values (Objective-C)


    ```

    - (void)viewWillAppear:(BOOL)animated {

      [super viewWillAppear:animated];


    self.progressView.progress = 0;

      self.label.text = @"Initializing Core Data";

    }

    ```


    [***Listing 9-77***](#9781430260288_Ch09.xhtml#_list77). Setting the UI Elements
    to Default Values (Swift)


    ```

    override func viewWillAppear(animated: Bool) {

        super.viewWillAppear(animated)


    self.progressView.progress = 0

        self.label.text = "Initializing Core Data"

    }

    ```


    Now launch the application and notice how the splash screen displays only briefly
    before the application UI appears and displays “Initializing Core Data” for about
    10 seconds, while our fake migration occurs, and then the progress marches from
    0% to 100%.


    Summary


    From uniquing to faulting to cachingmanaged objects, Core Data performs a significant
    amount of data access performance optimization for you. These optimizations come
    free, without any extra effort on your part. You should be aware of the optimizations
    that Core Data provides, however, so that you make sure to work with, not against,
    them.


    Not all Core Data performance gains come automatically, however. In this chapter,
    you learned how to use techniques such as prefetching and predicate optimization
    to squeeze all the performance from Core Data that you can for your applications.
    You also learned how to analyze your Core Data application using the Instruments
    application, so you can understand how your application is using Core Data and
    where the trouble spots are. Finally, you learned how to use multiple threads
    to improve the responsiveness and perceived performance of your applications.


    Other iOS programming books might do an excellent job showing you how to display
    a spinner and a “Please Wait” message when running long queries against your persistent
    store. This book shows you how to avoid the need for the spinner and “Please Wait”
    message entirely.


