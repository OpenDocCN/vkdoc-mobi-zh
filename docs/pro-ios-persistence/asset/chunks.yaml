    Verifying the External Storage


    Depending on the size of the image you’ve selected, Core Data may have stored
    the screenshot as an external record, with a unique identifier in the SQLite database.
    If the file has been stored externally, you can find it inside a subdirectory,
    in the same directory as your SQLite database file, called `.CoreDump_SUPPORT/_EXTERNAL_DATA`.
    For example, for the bug shown in the screenshot in [Figure 5-12](#9781430260288_Ch05.xhtml#Fig12),
    we can see that Core Data has stored an identifier in SQLite that points to an
    external file.


    ```

    sqlite> select * from zbug;1|1|5|1|This is a terrible bug|Terrible Bug|FC88541E-A362-40E2-8680-5D4553764B86

    ```


    We can see that file at `.CoreDump_SUPPORT/_EXTERNAL_DATA/FC88541E-A362-40E2-8680-5D4553764B86`,
    and can open it in Preview to see that it is, indeed, the image we stored.


    Searching the Fetched Results in the Table


    If you have a lot of projects in the Master view, you may have difficulty finding
    the project you’re looking for. Users expect to be able to search through data
    and filter the results to narrow the result set and more quickly locate their
    targets. For searching in tables, iOS 8 deprecates the old Search Bar and Search
    Display Controller (UISearchDisplayController) and introduces a new class for
    searching: `UISearchController`. In the next few sections, we show you how to
    add searching capabilities using `UISearchController` to CoreDump’s Master view.


    Adding the Search Controller


    Interface Builder hasn’t yet added the new `UISearchController`, so you must add
    this form of search support via code. Start by declaring that `MasterViewController`
    conforms to the `UISearchResultsUpdating` protocol, either in `MasterViewController.h`
    or in `MasterViewController.swift`. While you’re editing that file, add a property
    called `searchController` for the `UISearchController` instance. Also, for reasons
    we’ll describe shortly, add a property to store an `NSPredicate` instance we’ll
    call `searchPredicate`. [Listing 5-73](#9781430260288_Ch05.xhtml#list73) (Objective-C)
    and [Listing 5-74](#9781430260288_Ch05.xhtml#list74) (Swift) show these changes.


    [***Listing 5-73***](#9781430260288_Ch05.xhtml#_list73). Updating `MasterViewController.h`
    for `UISearchController` (Objective-C)


    ```

    @interface MasterViewController : UITableViewController <NSFetchedResultsControllerDelegate,
    UISearchResultsUpdating>

    ...

    @property (strong, nonatomic) UISearchController *searchController;

    @property (strong, nonatomic) NSPredicate *searchPredicate;

    ...

    @end

    ```


    [***Listing 5-74***](#9781430260288_Ch05.xhtml#_list74). Updating `MasterViewController.swift`
    for `UISearchController` (Swift)


    ```

    class MasterViewController: UITableViewController, NSFetchedResultsControllerDelegate,
    UISearchResultsUpdating {

      ...

      var searchController: UISearchController!

      var searchPredicate: NSPredicate? = nil

      ...

    }

    ```


    In your `viewDidLoad:` method, create your `UISearchController` instance and assign
    it to `searchController`. The initializer takes a parameter for the view controller
    that displays the search results; passing `nil` will display results in the same
    view that you’re searching, which in our case is the table view that displays
    the projects. We also do a few more things:


    *   Tell the background not to dim during search

    *   Set the search results updater (the class responsible for updating the search
    results) to our `MasterViewController` instance

    *   Size the search bar to fit

    *   Set the search bar as the header of our table

    *   Set the delegate of our table view to our MasterViewController instance, so
    we get taps whether we’re searching or not

    *   Set ourselves as defining a presentation context


    [Listing 5-75](#9781430260288_Ch05.xhtml#list75) shows the Objective-C `viewDidLoad:`
    method, and [Listing 5-76](#9781430260288_Ch05.xhtml#list76) shows the Swift `viewDidLoad:`
    function.


    [***Listing 5-75***](#9781430260288_Ch05.xhtml#_list75). Creating the UISearchController
    (Objective-C)


    ```

    - (void)viewDidLoad {

      [super viewDidLoad];


    self.navigationItem.leftBarButtonItem = self.editButtonItem;


    UIBarButtonItem *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd
    target:self action:@selector(insertNewObject:)];

      self.navigationItem.rightBarButtonItem = addButton;


    // Create the search controller with this controller displaying the search results

      self.searchController = [[UISearchController alloc] initWithSearchResultsController:nil];

      self.searchController.dimsBackgroundDuringPresentation = NO;

      self.searchController.searchResultsUpdater = self;

      [self.searchController.searchBar sizeToFit];

      self.tableView.tableHeaderView = self.searchController.searchBar;

      self.tableView.delegate = self;

      self.definesPresentationContext = YES;

    }

    ```


