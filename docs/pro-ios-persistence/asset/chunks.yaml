    \ withRowAnimation: .Fade)\n            tableView.insertRowsAtIndexPaths([newIndexPath],\
    \ withRowAnimation: .Fade)\n        default:\n            return\n    }\n}\n```\n\
    \nIn the insertion case, the `NSFetchedResultsChangeInsert` section of the `switch`\
    \ statement is called. This is how the table view updates to display the new `Event`\
    \ managed object."
