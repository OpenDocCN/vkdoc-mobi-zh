  raw: 'To start, generate `NSManagedObject` classes for all your Core Data entities.
    Open `SocialNetwork.m` or `SocialNetwork.swift` and implement the methods `willTurnIntoFault`
    and `didTurnIntoFault`. We won’t do anything special in these methods, but rather
    we will simply log that they’ve been called, so that we can verify that they’re
    being called appropriately. [Listing 9-21](#9781430260288_Ch09.xhtml#list21) (Objective-C)
    and [Listing 9-22](#9781430260288_Ch09.xhtml#list22) (Swift) show the implementations
    of these methods.


    [***Listing 9-21***](#9781430260288_Ch09.xhtml#_list21). Handling Fault Status
    Changes in `SocialNetwork.``m`


    ```

    - (void)willTurnIntoFault {

      NSLog(@"%@ named %@ will turn into fault", [[self class] description], self.name);

    }


    - (void)didTurnIntoFault {

      NSLog(@"%@ did turn into fault", [[self class] description]);

    }

    ```


    [***Listing 9-22***](#9781430260288_Ch09.xhtml#_list22). Handling Fault Status
    Changes in `SocialNetwork.swift`


    ```

    override func willTurnIntoFault() {

        println(NSString(format: "%@ named %@ will turn into fault", self, self.name))

    }


    override func didTurnIntoFault() {

        println(NSString(format: "%@ did turn into fault", self))

    }

    ```


    Notice that we log the social network’s name in the `willTurnIntoFault` method.
    In the `didTurnIntoFault` method, however, we don’t log the name. Why? Because
    we don’t have the name to log. The object is a fault, remember? We don’t have
    its attributes, including its name, in memory.


    Now, create a test called `DidFault` that conforms to the `PerfTest` protocol,
    and then implement its `runWithContext:` method to perform the seven steps outlined
    previously. [Listing 9-23](#9781430260288_Ch09.xhtml#list23) shows `DidFault.h`,
    [Listing 9-24](#9781430260288_Ch09.xhtml#list24) shows `DidFault.m`, and [Listing
    9-25](#9781430260288_Ch09.xhtml#list25) shows `DidFault.swift`.


    [***Listing 9-23***](#9781430260288_Ch09.xhtml#_list23). `DidFault.h`


    ```

    #import "PerfTest.h"


    @interface DidFault : NSObject <PerfTest>


    @end

    ```


    [***Listing 9-24***](#9781430260288_Ch09.xhtml#_list24). `DidFault.m` with the
    Faulting Test Implemented


    ```

    #import "DidFault.h"

    #import "Selfie.h"

    #import "SocialNetwork.h"


    @implementation DidFault


    -(NSString *)runTestWithContext:(NSManagedObjectContext *)context {

      NSString *result = nil;


    // 1) Fetch the first selfie

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Selfie"];

      fetchRequest.predicate = [NSPredicate predicateWithFormat:@"name = %@", @"Selfie
    1"];

      NSArray *selfies = [context executeFetchRequest:fetchRequest error:nil];

      if ([selfies count] == 1) {

        Selfie *selfie = selfies[0];


    // 2) Grab a social network from the selfie

        SocialNetwork *socialNetwork = [selfie.socialNetworks anyObject];

        if (socialNetwork != nil) {

          // 3) Check if it''s a fault

          result = [NSString stringWithFormat:@"Social Network %@ a fault\n",

                    [socialNetwork isFault] ? @"is" : @"is not"];


    // 4) Get the name

          result = [result stringByAppendingFormat:@"Social Network is named ''%@''\n",

                    socialNetwork.name];


    // 5) Check if it''s a fault

          result = [result stringByAppendingFormat:@"Social Network %@ a fault\n",

                    [socialNetwork isFault] ? @"is" : @"is not"];


    // 6) Turn it back into a fault

          [context refreshObject:socialNetwork mergeChanges:NO];

          result = [result stringByAppendingFormat:@"Turning Social Network into a fault\n"];


    // 7) Check if it''s a fault

          result = [result stringByAppendingFormat:@"Social Network %@ a fault\n",

                    [socialNetwork isFault] ? @"is" : @"is not"];

        } else {

          result = @"Couldn''t find social networks for selfie";

        }

      } else {

        result = @"Failed to fetch first selfie";

      }

      return result;

    }


    @end

    ```


    [***Listing 9-25***](#9781430260288_Ch09.xhtml#_list25). `DidFault.swift` with
    the Faulting Test Implemented


    ```

    import Foundation

    import CoreData


    class DidFault : PerfTest {

        func runTestWithContext(context: NSManagedObjectContext) -> String! {

            var result : String?


    // 1) Fetch the first selfie

            let fetchRequest = NSFetchRequest(entityName: "Selfie")

            fetchRequest.predicate = NSPredicate(format: "name = %@", "Selfie 1")

            let selfies = context.executeFetchRequest(fetchRequest, error: nil)

            if selfies?.count == 1 {

                let selfie = selfies?[0] as Selfie


    // 2) Grab a social network from the selfie

                let socialNetwork = selfie.socialNetworks.anyObject() as SocialNetwork?

                if let socialNetwork = socialNetwork {

                    // 3) Check if it''s a fault

                    result = NSString(format: "Social Network %@ a fault\n", socialNetwork.fault
    ? "is" : "is not")


    // 4) Get the name

                    result = result?.stringByAppendingFormat("Social Network is named
    ''%@''\n", socialNetwork.name)


    // 5) Check if it''s a fault

                    result = result?.stringByAppendingFormat("Social Network %@ a fault\n",
    socialNetwork.fault ? "is" : "is not")


    // 6) Turn it back into a fault

                    context.refreshObject(socialNetwork, mergeChanges: false)

                    result = result?.stringByAppendingFormat("Turning Social Network
    into a fault\n")


    // 7) Check if it''s a fault

                    result = result?.stringByAppendingFormat("Social Network %@ a fault\n",
    socialNetwork.fault ? "is" : "is not")

                }

                else {

                    result = "Couldn''t find social networks for selfie"

                }

            }

            else {

                result = "Failed to fetch first selfie"

            }


    return result!

        }

    }

    ```


    This code follows the seven steps, as promised. Accessing the social network’s
    name in step 4 is what fires the fault, so that in step 5 the social network is
    not a fault. Step 6, of course, turns the social network back into a fault.


    To add this new test to the picker view, so we can select it and run it, open
    `ViewController.m`, add an import for `DidFault.h`, and add an instance of `DidFault`
    to the `tests` array, as [Listing 9-26](#9781430260288_Ch09.xhtml#list26) shows.


    [***Listing 9-26***](#9781430260288_Ch09.xhtml#_list26). Adding an Instance of
    `DidFault` in the `viewDidLoad` Method of `ViewController.m`


    ```

    - (void)viewDidLoad {

      [super viewDidLoad];


    self.startTime.text = @"";

      self.stopTime.text = @"";

      self.elapsedTime.text = @"";

      self.results.text = @"";


    self.tests = @[[[FetchAll alloc] init],

                     [[DidFault alloc] init]];

    }

    ```


    For Swift, add the instance in `ViewController.swift`, as [Listing 9-27](#9781430260288_Ch09.xhtml#list27)
    shows.


    [***Listing 9-27***](#9781430260288_Ch09.xhtml#_list27). Adding an Instance of
    `DidFault` in the `viewDidLoad` Method of `ViewController.swift`


    ```

    override func viewDidLoad() {

        super.viewDidLoad()


    self.startTime.text = ""

        self.stopTime.text = ""

        self.elapsedTime.text = ""

        self.results.text = ""


    self.tests.append(FetchAll())

        self.tests.append(DidFault())

    }

    ```


    Build and run the application. You should see `DidFault` in the picker. Select
    it and tap Run Selected Test. You should see output similar to the following:


    ```

    Social Network is a fault

    Social Network is named ''SocialNetwork 117''

    Social Network is not a fault

    Turning Social Network into a fault

    Social Network is a fault

    ```


    You should also see output in the logs from when `willTurnIntoFault` and `didTurnIntoFault`
    were called, like the following:


    ```

    2014-11-04 07:25:57.149 PerformanceTuning[38171:2069648] SocialNetwork named SocialNetwork
    387 will turn into fault

    2014-11-04 07:25:57.151 PerformanceTuning[38171:2069648] SocialNetwork did turn
    into fault

    ```


