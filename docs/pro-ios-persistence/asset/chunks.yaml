    \n图 7-5. 显示笔记详情的详情视图\n\n## 提示输入并验证密码\n\n此前我们忽略了让用户输入`SecureNote`用于加密和解密笔记的密码这一需求，现在来处理这个问题。为了实现密码输入，我们执行以下步骤：\n\
    \n1.  在主导航视图控制器之前插入一个新的视图和视图控制器，该视图控制器显示一个密码输入字段和一个“登录”按钮。\n2.  当用户尝试登录时，将应用程序委托中创建的`password`字段设置为输入的密码。\n\
    3.  如果用户尚未输入密码，则将任何输入内容视为正式密码，将其存储在 iOS 钥匙串中，并跳转到主导航视图。\n4.  如果 iOS 钥匙串中已存在用户的密码，则将输入的密码与存储的密码进行比较，仅当两者匹配时，才跳转到主导航视图。\n\
    \n由于我们需要与 iOS 钥匙串交互，而钥匙串 API 是一堆混乱的 C 代码，这里我们稍微取巧一下，从`https://github.com/soffes/sskeychain`下载\
    \ Sam Soffes 的优秀库`SSKeychain`。通过 CocoaPods 或克隆仓库并添加源文件的方式，将此库添加到您的项目中。由于我们已经在项目中添加了安全框架，因此在添加源文件后，您就可以直接使用`SSKeychain`了。\n\
    \n## 添加密码视图控制器\n\n创建一个新的`UIViewController`类（没有 XIB 文件），命名为`PasswordViewController`，该类将控制密码视图，接收密码输入，验证输入的密码，并决定是否跳转到主导航视图。该控制器还负责将主视图控制器中的托管对象上下文设置为应用程序的托管对象上下文。头文件`PasswordViewController.h`应包含一个密码文本字段的出口，以便我们能够提取用户输入的密码，如代码清单\
    \ 7-39 所示。\n\n***代码清单 7-39***. `PasswordViewController.h`，包含密码字段的出口\n\n```\n#import\
    \ <UIKit/UIKit.h>\n\n@interface PasswordViewController : UIViewController\n\n\
    @property (weak, nonatomic) IBOutlet UITextField *passwordField;\n\n@end\n```\n\
    \n实现文件（`PasswordViewController.m`或`PasswordViewController.swift`）重写了两个方法。\n\n\
    *   `prepareForSegue:sender:`，允许我们在执行跳转前进行任何准备工作。\n*   `shouldPerformSegueWithIdentifier:sender:`，让我们有机会允许或拒绝执行跳转。\n\
    \n在`prepareForSegue:sender:`方法中，我们从应用程序委托获取托管对象上下文，并将其设置到主视图控制器上。\n\n在`shouldPerformSegueWithIdentifier:sender:`方法中，我们确保用户确实在密码字段中输入了内容。我们将用户输入的任何内容设置到应用程序委托中。然后，我们从\
    \ iOS 钥匙串中获取存储的`SecureNote`密码。如果钥匙串中的密码为空，我们将用户输入的密码存储到钥匙串中，并通过返回`YES`来允许执行跳转。但是，如果在钥匙串中找到了`SecureNote`密码，则将其与用户输入的密码进行验证，仅当两者匹配时才允许执行跳转。代码清单\
    \ 7-40 展示了`PasswordViewController.m`，代码清单 7-41 展示了`PasswordViewController.swift`。\n\
    \n***代码清单 7-40***. `PasswordViewController.m`\n\n```\n#import \"PasswordViewController.h\"\
    \n#import \"AppDelegate.h\"\n#import \"MasterViewController.h\"\n#import \"SSKeychain.h\"\
    \n\n@implementation PasswordViewController\n\n#pragma mark - 导航\n\n- (void)prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender {\n  if ([segue.identifier isEqualToString:@\"logIn\"\
    ]) {\n    // 设置主视图控制器中的托管对象上下文\n    AppDelegate *appDelegate = (AppDelegate *)[[UIApplication\
    \ sharedApplication] delegate];\n    MasterViewController *controller = (MasterViewController\
    \ *)[segue destinationViewController];\n    controller.managedObjectContext =\
    \ appDelegate.managedObjectContext;\n  }\n}\n\n- (BOOL)shouldPerformSegueWithIdentifier:(NSString\
    \ *)identifier sender:(id)sender {\n  // 确保他们在密码字段中输入了内容\n  NSString *enteredPassword\
    \ = self.passwordField.text;\n  if ([identifier isEqualToString:@\"logIn\"] &&\
    \ enteredPassword.length > 0) {\n\n    // 将用户输入的任何内容存储到应用程序委托中\n    AppDelegate\
    \ *appDelegate = (AppDelegate *)[[UIApplication sharedApplication] delegate];\n\
    \    appDelegate.password = enteredPassword;\n\n    // 从钥匙串中检索密码\n    NSString\
    \ *password = [SSKeychain passwordForService:@\"SecureNote\" account:@\"default\"\
    ];\n\n    // 如果用户从未输入过密码，则他们正在创建一个新密码\n    if (password == nil) {\n      // 将密码存储在钥匙串中并允许执行跳转\n\
    \      [SSKeychain setPassword:enteredPassword forService:@\"SecureNote\" account:@\"\
    default\"];\n      return YES;\n    } else {\n      // 验证密码，仅验证通过才允许跳转\n     \
    \ return [password isEqualToString:enteredPassword];\n    }\n  } else {\n    return\
    \ NO;\n  }\n}\n\n@end\n```\n\n***代码清单 7-41***. `PasswordViewController.swift`\n"
- fmt: "## `PasswordViewController` 类\n\n```\nimport Foundation\nimport UIKit\n\n\
    class PasswordViewController : UIViewController {\n    @IBOutlet weak var passwordField:\
    \ UITextField!\n\n    override func prepareForSegue(segue: UIStoryboardSegue,\
    \ sender: AnyObject?) {\n        if segue.identifier == \"logIn\" {\n        \
    \    // Set the managed object context in the master view controller\n       \
    \     let appDelegate = UIApplication.sharedApplication().delegate as! AppDelegate\n\
    \            let controller = segue.destinationViewController as! MasterViewController\n\
    \            controller.managedObjectContext = appDelegate.managedObjectContext\n\
    \        }\n    }\n\n    override func shouldPerformSegueWithIdentifier(identifier:\
    \ String?, sender: AnyObject?) -> Bool {\n        // Make sure they've entered\
    \ something in the password field\n        let enteredPassword = self.passwordField.text\n\
    \        if identifier == \"logIn\" {\n            // Store whatever they've entered\
    \ in the application delegate\n            let appDelegate = UIApplication.sharedApplication().delegate\
    \ as! AppDelegate\n            appDelegate.password = enteredPassword\n\n    \
    \        // Retrieve the password from the keychain\n            let password\
    \ = SSKeychain.passwordForService(\"SecureNote\", account: \"default\")\n\n  \
    \          // If they've never entered a password, they're creating a new one\n\
    \            if password == nil {\n                // Store the password in the\
    \ keychain and allow segue to be performed\n                SSKeychain.setPassword(enteredPassword,\
    \ forService: \"SecureNote\", account: \"default\")\n                return true\n\
    \            } else {\n                // Verify password and allow segue only\
    \ if verified\n                return password == enteredPassword\n          \
    \  }\n        }\n        else {\n            return false;\n        }\n    }\n\
    }\n```\n\n## Adding the Password View to the Storyboard\n\nAfter some fiddling\
    \ with the storyboard and a tweak to the application delegate code, we’ll finally\
    \ be ready to run `SecureNote`.\n\n1.  First, edit the `application:didFinishLaunchingWithOptions:`\
    \ method in `AppDelegate.m` or `AppDelegate.swift` to do nothing but return `YES`\
    \ or `true`, as shown in [Listing 7-42](#9781430260288_Ch07.xhtml#list42) (Objective-C)\
    \ or [Listing 7-43](#9781430260288_Ch07.xhtml#list43) (Swift).\n\n    ***Listing\
    \ 7-42***. Removing the Code That Sets the Managed Object Context (Objective-C)\n\
    \n    ```\n    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n        return YES;\n    }\n    ```\n\n    ***Listing 7-43***.\
    \ Removing the Code That Sets the Managed Object Context (Swift)\n\n    ```\n\
    \    func application(application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n        return true\n    }\n\
    \    ```\n\n2.  Now open the storyboard, `Main.storyboard`, and drag a new View\
    \ Controller between the Navigation Controller and the Master View Controller.\
    \ You may have to move the Master View Controller and the Detail View Controller\
    \ to the right to make room.\n3.  Set the Custom Class in the Identity inspector\
    \ of your new View Controller to `PasswordViewController`.\n4.  In the Attributes\
    \ inspector, set the Title field to **Password**. Drag a label onto the view and\
    \ set its text to **Password:**. Drag a Text Field below the label, size it to\
    \ the width of the view, and connect it to the `passwordField` outlet. Also, in\
    \ the Attributes inspector, check the **Secure Text Entry** checkbox so that the\
    \ password is masked as the user types it. Finally, drag a button onto the view,\
    \ below the password field, and set its text to **Log In**. Add missing constraints\
    \ from the popup menu.\n5.  Control+drag from the button to the Master View Controller\
    \ and, in the pop-up that appears, select **show**, so that tapping this button\
    \ will initiate the segue to the Master View Controller. Also, with the arrow\
    \ representing the segue selected, open the Attributes inspector and set the Identifier\
    \ to **logIn**. [Figure 7-6](#9781430260288_Ch07.xhtml#Fig6) shows the Password\
    \ View Controller.\n\n    ![9781430260288_Fig07-06.jpg](images/9781430260288_Fig07-06.jpg)\n\
    \n    *Figure 7-6. The Password View Controller*\n\n6.  Your last task is to change\
    \ the segue from the Navigation Controller to point to the Password View Controller.\
    \ Select the Navigation Controller, open the Connections inspector, and break\
    \ the connection to the Master View Controller. Then, drag from the circle at\
    \ the end of the **root view controller** line to the Password View Controller,\
    \ and the segue will update properly. Your finished storyboard should resemble\
    \ [Figure 7-7](#9781430260288_Ch07.xhtml#Fig7).\n\n    ![9781430260288_Fig07-07.jpg](images/9781430260288_Fig07-07.jpg)\n\
    \n    *Figure 7-7. The finished storyboard*\n\n## Running `SecureNote`\n\nYou\
    \ should now be able to build and run `SecureNote`. When you run it, you should\
    \ see the password view. Enter anything to set your password, and then click **Log\
    \ In**. You should then be able to tap the **+** button to add notes or tap existing\
    \ notes to edit them.\n\nIf you rerun the application, you should see the password\
    \ view again. Entering an incorrect password and tapping **Log In** should do\
    \ nothing. Entering the correct password and tapping **Log In** should take you\
    \ to the master view with your list of notes.\n\nIf you open your SQLite database\
    \ and look at the data, you should find that the data in the `ZBODY` and `ZTITLE`\
    \ columns in the `ZNOTE` table contain incomprehensible gobbledygook—the fruits\
    \ of our encryption transformer.\n\n## An Alternative to Transformable: Data Protection\n\
    \nIn the previous section, we encrypted data on a field-by-field basis using value\
    \ transformers and the Common Crypto library. Apple offers another way to encrypt\
    \ data on an iPhone or iPad using what’s called data protection. If you enable\
    \ data protection on your device, iOS encrypts a portion of its data storage when\
    \ the device is locked and decrypts it when it’s unlocked. To enable data protection,\
    \ set your device to require a passcode in **Settings** → **Touch ID & Passcode**\
    \ or **Settings** → **Passcode**, depending on your device and iOS version. At\
    \ the very bottom of that settings screen, you should see the following message:\
    \ “Data protection is enabled.” Note that this is available on a device only and\
    \ not on the iOS Simulator."
