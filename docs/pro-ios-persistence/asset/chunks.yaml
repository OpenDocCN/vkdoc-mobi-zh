    \ the Cell (Swift)\n\n```\nfunc configureCell(cell: UITableViewCell, atIndexPath\
    \ indexPath: NSIndexPath) {\n  let object = self.fetchedResultsController.objectAtIndexPath(indexPath)\
    \ as NSManagedObject\n  cell.textLabel.text = object.valueForKey(\"timeStamp\"\
    )!.description\n}\n```\n\n### Adding an Event\n\nWhen you click the + button on\
