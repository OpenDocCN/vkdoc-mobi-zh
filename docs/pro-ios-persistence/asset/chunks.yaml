    ```


    [***Listing 2-5***](#9781430260288_Ch02.xhtml#_list5). `NSOrderedSet` accessors
    in Swift


    ```

    func objectAtIndex(_ index: Int) -> AnyObject!

    func indexOfObject(_ object: AnyObject!) -> Int

    ```


    You’ll also notice, in the Swift version, the `@NSManaged` attribute in front
    of both the `books` and the `pages` variables. The Objective-C implementation
    file `BookCategory.m`, shown in [Listing 2-6](#9781430260288_Ch02.xhtml#list6),
    has an attribute called `@dynamic` in front of the name and books properties.
    Both these attributes (`@NSManaged` and `@dynamic`) do the same thing: they tell
    the compiler that the getter and setter for that property will be provided at
    runtime, not compile time.


