  raw: 'The fetched results controller currently tries to fetch using the `Event`
    entity, which no longer exists. Instead, you want to fetch the `Project` entity.
    Also, you want to display the projects in sections by hosting service. To do this,
    you must specify a section name key path corresponding to the `host` property.
    You must also sort by `host`, and then within each section sort by `name`. Locate
    the `fetchedResultsController` accessor and update it with the following changes:


    *   Change the entity to `Project`.

    *   Add a sort descriptor for `host`.

    *   Change the existing sort descriptor to use `name`.

    *   Change the section name key path to use `host`.


    [Listing 5-23](#9781430260288_Ch05.xhtml#list23) (Objective-C) and [Listing 5-24](#9781430260288_Ch05.xhtml#list24)
    (Swift) show the updated `fetchedResultsController` accessor.


    [***Listing 5-23***](#9781430260288_Ch05.xhtml#_list23). The Updated `fetchedResultsController`
    Accessor (Objective-C)


    ```

    - (NSFetchedResultsController *)fetchedResultsController {

      if (_fetchedResultsController != nil) {

        return _fetchedResultsController;

      }


    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];

      // Edit the entity name as appropriate.

      NSEntityDescription *entity = [NSEntityDescription entityForName:@"Project"
    inManagedObjectContext:self.managedObjectContext];

      [fetchRequest setEntity:entity];


    // Set the batch size to a suitable number.

      [fetchRequest setFetchBatchSize:20];


    // Edit the sort key as appropriate.  NSSortDescriptor *hostSortDescriptor = [[NSSortDescriptor
    alloc] initWithKey:@"host" ascending:YES];

      NSSortDescriptor *nameSortDescriptor = [[NSSortDescriptor alloc] initWithKey:@"name"
    ascending:YES];

      NSArray *sortDescriptors = @[hostSortDescriptor, nameSortDescriptor];


    [fetchRequest setSortDescriptors:sortDescriptors];


    // Edit the section name key path and cache name if appropriate.

      // nil for section name key path means "no sections".

      NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController
    alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext
    sectionNameKeyPath:@"host" cacheName:@"Master"];

        aFetchedResultsController.delegate = self;

        self.fetchedResultsController = aFetchedResultsController;


    NSError *error = nil;

        if (![self.fetchedResultsController performFetch:&error]) {

        // Replace this implementation with code to handle the error appropriately.

        // abort() causes the application to generate a crash log and terminate. You
    should not use this function in a shipping application, although it may be useful
    during development.

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

        }


    return _fetchedResultsController;

    }

    ```


    [***Listing 5-24***](#9781430260288_Ch05.xhtml#_list24). The Updated `fetchedResultsController`
    Accessor (Swift)


    ```

    var fetchedResultsController: NSFetchedResultsController {

        if _fetchedResultsController != nil {

            return _fetchedResultsController!

        }


    let fetchRequest = NSFetchRequest(entityName: "Project")


    // Set the batch size to a suitable number.

        fetchRequest.fetchBatchSize = 20


