    Understanding Predicates and Expressions


    [Chapter 2](#9781430260288_Ch02.xhtml) discusses predicates and the two ways to
    build them.


    *   Using the query language; and

    *   Using the `NSExpression` class to manually build predicates.


    In the `wordCountForCategory:` method we just implemented, we use the predicate
    query language to filter the fetch results. The predicate query language has similarities
    to a structured query language (SQL) `WHERE` clause: you state the attributes
    and relationships you want to filter on (the columns), the values these properties
    should be compared to, and how they should be compared. For example, we can retrieve
    the word “zyzzyvas” from our word list with the predicate “`text = ''zyzzyvas''`.”
    The predicate query language is usually simpler to write and easier to use than
    the `NSExpression` class to build predicates. The query language doesn’t cover
    all the cases that `NSExpression` does, however, and you also might find scenarios
    in which you prefer using `NSExpression`, so understanding both approaches is
    essential for fetching the data you target.


    Put simply, a predicate executes a test on an object. If the test passes, the
    object is fetched, and if it fails, the object is not fetched. A predicate contains
    two or more expressions and one or more comparators. In the predicate in the preceding
    paragraph, the attribute `text` and the constant string `''zyzzyvas''` are expressions,
    and the operator `=` is the comparator, which compares the `text` value of a `Word`
    to `''zyzzyvas''` and returns the `Word` object if they match.


    To build an equivalent predicate using `NSExpression`, you would create two expressions:
    one for `text` and one for `"zyzzyvas"`, and then create an `NSComparisonPredicate`
    instance to compare the two expressions to see whether they’re equal. That code
    looks like [Listing 3-24](#9781430260288_Ch03.xhtml#list24) (Objective-C) or [Listing
    3-25](#9781430260288_Ch03.xhtml#list25) (Swift).


    [***Listing 3-24***](#9781430260288_Ch03.xhtml#_list24). Building a Predicate
    with `NSExpression (Objective-C)`


    ```

    NSExpression *expressionText = [NSExpression expressionForKeyPath:@"text"];

    NSExpression *expressionZyzzyvas = [NSExpression expressionForConstantValue:@"zyzzyvas"];

    NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:expressionText

                                                                rightExpression:expressionZyzzyvas

                                                                modifier:NSDirectPredicateModifier

                                                                    type:NSEqualToPredicateOperatorType

                                                                 options:0];

    ```


    [***Listing 3-25***](#9781430260288_Ch03.xhtml#_list25). Building a Predicate
    with `NSExpression` (Swift)


    ```

    let expressionText = NSExpression(forKeyPath: "text")

    let expressionZyzzyvas = NSExpression(forConstantValue: "zyzzyvas")

    let predicate = NSComparisonPredicate(leftExpression: expressionText, rightExpression:
    expressionZyzzyvas, modifier: .DirectPredicateModifier, type: .EqualToPredicateOperatorType,
    options: NSComparisonPredicateOptions.convertFromNilLiteral())

    ```


    This code is clearly more complex, but it accomplishes the same thing as the query
    language predicate. Over the next few sections, we dig deeper into how to create
    predicates this way. Before going further, however, prove that both approaches
    work by adding methods to retrieve the word “zyzzyvas” both ways in the WordList
    application and display the results in the text view. Also, log the predicate
    created using `NSExpression` by calling `NSPredicate`’s `predicateFormat` method.
    [Listing 3-26](#9781430260288_Ch03.xhtml#list26) shows the Objective-C code, and
    [Listing 3-27](#9781430260288_Ch03.xhtml#list27) shows the Swift code.


