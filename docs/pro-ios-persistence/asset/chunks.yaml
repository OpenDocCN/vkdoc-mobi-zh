    Creating the Data Model and Data


    The data model for this application tracks people and selfies (photographs taken
    of oneself, optionally including other people) across social networks and consists
    of three entities: `Person`, `Selfie`, and `SocialNetwork`. Each person can appear
    in multiple selfies, and each selfie can tag multiple people. Also, each selfie
    can be posted to multiple social networks, and each social network can display
    multiple selfies. This means that `Person` and `Selfie` have an optional many-to-many
    relationship, and `Selfie` and `SocialNetwork` have an optional many-to-many relationship.


    We also want some attributes on each entity, and to simplify the model we’ll give
    each a `name` attribute of the type `String` and a `rating` attribute of the type
    `Integer 16`. Go ahead and create this model, which should match [Figure 9-2](#9781430260288_Ch09.xhtml#Fig2).


    ![9781430260288_Fig09-02.jpg](images/9781430260288_Fig09-02.jpg)


    [Figure 9-2](#9781430260288_Ch09.xhtml#_Fig2). The Core Data model


    We’ll next push enough data into the data model so we can run performance tests
    and differentiate results. It should be sufficient to create 500 people, selfies,
    and social networks and relate them all to each other—that will give us three
    tables with 500 rows each (`Person`, `Selfie`, and `SocialNetwork`) and two join
    tables with 250,000 rows each (`Person`-to-`Selfie` and `Selfie`-to-`SocialNetwork`).


    To insert the data, open `Persistence.h` (for Objective-C) and declare a method
    to load the data.


    ```

    - (void)loadData;

    ```


    Implement the method in `Persistence.m` or `Persistence.swift`. The implementation
    should check the persistent store to determine whether the data have already been
    loaded so that subsequent invocations of the program don’t compound the data store.
    If the data have not been inserted, the `loadData` method creates 500 people with
    names like `Person 1`, `Person 2`, and so on; 500 selfies with names like `Selfie
    1`; and 500 social networks with names like `SocialNetwork 1`. It uses a helper
    method called `insertObjectForName:index:` to actually create the object. After
    creating all the objects, the code loops through all the selfies and adds relationships
    to all the people and all the social networks. Finally, `loadData` saves the object
    graph to the persistent data store. [Listing 9-7](#9781430260288_Ch09.xhtml#list7)
    shows the Objective-C code, and [Listing 9-8](#9781430260288_Ch09.xhtml#list8)
    shows the Swift code.


    [***Listing 9-7***](#9781430260288_Ch09.xhtml#_list7). Loading the Data in `Persistence.m`
    `(Objective-C)`


    ```

    - (void)loadData {

      static int NumberOfRows = 500;


    // Fetch the people. If we have NumberOfRows, assume our data is loaded.

      NSFetchRequest *peopleFetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Person"];

      NSArray *people = [self.managedObjectContext executeFetchRequest:peopleFetchRequest

                                                                 error:nil];

      if ([people count] != NumberOfRows) {

        NSLog(@"Creating objects");

        // Load the objects

        for (int i = 1; i <= NumberOfRows; i++) {

          [self insertObjectForName:@"Person" index:i];

          [self insertObjectForName:@"Selfie" index:i];

          [self insertObjectForName:@"SocialNetwork" index:i];

        }


    // Get all the people, selfies, and social networks

        people = [self.managedObjectContext executeFetchRequest:peopleFetchRequest

                                                          error:nil];


    NSFetchRequest *selfiesFetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Selfie"];

        NSArray *selfies = [self.managedObjectContext executeFetchRequest:selfiesFetchRequest

                                                                    error:nil];


    NSFetchRequest *socialNetworksFetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"SocialNetwork"];

        NSArray *socialNetworks = [self.managedObjectContext executeFetchRequest:socialNetworksFetchRequest
    error:nil];


    // Set up all the relationships

        NSLog(@"Creating relationships");

        for (NSManagedObject *selfie in selfies) {

          NSMutableSet *peopleSet = [selfie mutableSetValueForKey:@"people"];

          [peopleSet addObjectsFromArray:people];


    NSMutableSet *socialNetworksSet = [selfie mutableSetValueForKey:@"socialNetworks"];

          [socialNetworksSet addObjectsFromArray:socialNetworks];

        }


    [self saveContext];

      }

    }


    - (NSManagedObject *)insertObjectForName:(NSString *)name index:(NSInteger)index
    {

      NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:name

                                                              inManagedObjectContext:self.managedObjectContext];

      [object setValue:[NSString stringWithFormat:@"%@ %ld", name, (long)index]

                forKey:@"name"];

      [object setValue:[NSNumber numberWithInt:((arc4random() % 10) + 1)]

                forKey:@"rating"];

      return object;

    }

    ```


