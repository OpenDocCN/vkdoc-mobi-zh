    sqlite> select * from ZBOOK;\nZ_PK        Z_ENT       Z_OPT       ZCATEGORY  \
    \ ZPRICE      ZTITLE\n----------  ----------  ----------  ----------  ----------\
    \  --------------\n1           1           1           1           10.0      \
