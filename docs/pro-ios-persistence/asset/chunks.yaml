    ```

    length == 20 AND text ENDSWITH "ing"

    ```


    When you have to filter your data against multiple criteria to fetch what you
    want, remember to combine predicates into a compound predicate and let Core Data
    do the work of applying all the criteria for you. Oh, and if you build the compound
    predicate referred to previously, to find words that contain a "q" but not a "u,"
    you’ll see the 21 words that match.


    Aggregating


    Aggregating data refers to gathering global statistics on a collection using a
    collection operator. Collection operators are part of the Key-Value Coding paradigm
    and can be added to a key path to indicate that an aggregation operation should
    be executed. The syntax for using these aggregation operators is


    ```

    (key path to collection).@(operator).(key path to argument property)

    ```


    For example, to refer to the average length of the words in the word list, you’d
    use


    ```

    words.@avg.length

    ```


    The Apple documentation refers to these operators as Set and Array Operators,
    as you can use them on any collection, not just Core Data result sets. You can
    also use them as part of a predicate; for example, to get all the categories that
    have more than 10,000 words, you’d use a predicate with the query language.


    ```

    words.@count > 10000

    ```


    [Table 3-6](#9781430260288_Ch03.xhtml#Tab6) lists the operators, which are the
    same in Objective-C or Swift.


    [Table 3-6](#9781430260288_Ch03.xhtml#_Tab6). The Aggregation Operators


    | Operator | Constant | Description |

    | --- | --- | --- |

    | avg | `NSAverageKeyValueOperator` | Computes the average of the argument property
    in the collection |

    | count | `NSCountKeyValueOperator` | Computes the number of items in the collection
    (does not use an argument property) |

    | min | `NSMinimumKeyValueOperator` | Computes the minimum value of the argument
    property in the collection |

    | max | `NSMaximumKeyValueOperator` | Computes the maximum value of the argument
    property in the collection |

    | sum | `NSSumKeyValueOperator` | Computes the sum value of the argument property
    in the collection |


    Using @count to Retrieve Counts


    The `@count` function returns a count of the number of objects that match the
    predicate. We can use this to return a list of letters that have a high number
    of words, which we arbitrarily set at more than 10,000, as described previously.
    The fetch request we set up to retrieve these data target the `Category` entity
    and fetch the `category` objects whose count of `word` relationships exceeds 10,000\.
    This gives us the letters that begin more than 10,000 words.


    We use the query language to set up this predicate, as seen in the `highCountCategories`
    method shown in [Listing 3-40](#9781430260288_Ch03.xhtml#list40) (Objective-C)
    and [Listing 3-41](#9781430260288_Ch03.xhtml#list41) (Swift).


    [***Listing 3-40***](#9781430260288_Ch03.xhtml#_list40). Using the `@count` Function
    in Objective-C


    ```

    - (NSString *)highCountCategories {

      NSPredicate *predicate = [NSPredicate predicateWithFormat:@"words.@count > %d",
    10000];

      NSLog(@"Predicate: %@", [predicate predicateFormat]);


    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"WordCategory"];

      fetchRequest.predicate = predicate;

      NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      return [NSString stringWithFormat:@"High count categories: %@\n",

              [[categories valueForKey:@"firstLetter"] componentsJoinedByString:@","]];

    }

    ```


    [***Listing 3-41***](#9781430260288_Ch03.xhtml#_list41). Using the `@count` Function
    in Swift


    ```

    func highCountCategories() -> String {

        let predicate = NSPredicate(format: "words.@count > %d", argumentArray: [10000])

        println("Predicate: \(predicate.predicateFormat)")


    var fetchRequest = NSFetchRequest(entityName: "WordCategory")

        fetchRequest.predicate = predicate


    let list = NSMutableString()

        var error: NSError? = nil

        if let categories = self.managedObjectContext!.executeFetchRequest(fetchRequest,
    error: &error) {

            for word in categories {

                list.appendString(((word as NSManagedObject).valueForKey("firstLetter")
    as String)+",")

            }

        }


    return "High count categories: \(list)\n"

    }

    ```


    This code creates a predicate that checks the count of the `words` relationship,
    verifying that it’s greater than 10,000, and then creates a fetch request for
    the `WordCategory` entity that uses that predicate. It returns the qualifying
    letters in a comma-separated list.


    Add a call to this method in the `statistics` method. Then, build and run the
    application to see the letters that have more than 10,000 words: a, c, d, p, r,
    and s.


    Getting the Average Length of All Words—Two Ways


    Using the aggregation operators directly on collections is straightforward: fetch
    the data using a Core Data fetch request, then apply the operator. [Listing 3-42](#9781430260288_Ch03.xhtml#list42)
    (Objective-C) and [Listing 3-43](#9781430260288_Ch03.xhtml#list43) (Swift), for
    example, show how to retrieve the average word length directly.


    [***Listing 3-42***](#9781430260288_Ch03.xhtml#_list42). Getting the Average Word
    Length from the Collection in Objective-C


    ```

    - (NSString *)averageWordLengthFromCollection {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Word"];

      NSArray *words = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      return [NSString stringWithFormat:@"Average from collection: %.2f\n",

              [[words valueForKeyPath:@"@avg.length"] floatValue]];

    }

    ```


    [***Listing 3-43***](#9781430260288_Ch03.xhtml#_list43). Getting the Average Word
    Length from the Collection in Swift


    ```

    func averageWordLengthFromCollection() -> String {

        var fetchRequest = NSFetchRequest(entityName: "Word")


    var error: NSError? = nil

        let words = self.managedObjectContext!.executeFetchRequest(fetchRequest, error:
    &error)


    var formattedAverage = "0"

        if let words = words {

            if let avg = (words as NSArray).valueForKeyPath("@avg.length") as? Float
    {

                let format = ".2"

                formattedAverage = avg.format(format)

            }

        }

        return "Average from collection: \(formattedAverage)\n"

    }

    ```


    This code fetches all the words, then applies the `@avg` operator using the following
    code:


    ```

    [words valueForKeyPath:@"avg.length"] // Objective-C

    (words as NSArray).valueForKeyPath("@avg.length") as Float // Swift

    ```


    Add a call to it in the `statistics` method, then run it to see that the average
    length is 9.09 characters.'
