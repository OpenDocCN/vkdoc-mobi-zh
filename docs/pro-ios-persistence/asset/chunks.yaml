    Using Different Comparison Modifiers


    The third parameter to the `NSComparisonPredicate` static initializer method we’ve
    been using is `modifier`, and we’ve been passing `NSDirectPredicateModifier` exclusively
    for this parameter. If the left expression is a collection rather than a single
    object, however, you have a few more modifiers to choose from, as shown in [Table
    3-3](#9781430260288_Ch03.xhtml#Tab3). As with the predicate type constants, the
    Objective-C constants begin with `NS` and the Swift ones do not.


    [Table 3-3](#9781430260288_Ch03.xhtml#_Tab3). The Comparison Predicate Modifiers


    | Modifier | Query Language Example | Description |

    | --- | --- | --- |

    | `(NS)DirectPredicateModifier` | `X` | Compares the left expression directly
    to the right expression |

    | `(NS)AllPredicateModifier` | `ALL X` | Compares the left expression (a collection)
    to the right expression, returning `YES` only if all the values match |

    | `(NS)AnyPredicateModifier` | `ANY X` | Compares the left expression (a collection)
    to the right expression, returning `YES` if any of the values match |


    The `NSAllPredicateModifier` constant, as the table shows, evaluates to the query
    language expression `ALL X`, and returns `YES` only if all the values in the collection
    match the predicate. Otherwise, it returns `NO`. The `NSAnyPredicateModifier`
    constant, on the other hand, which evaluates to `ANY X`, returns `YES` if at least
    one of the values in the collection matches the predicate. Otherwise, it returns
    `NO`.


    Remember earlier in this chapter when we mentioned that Apple’s documentation
    claims that Core Data doesn’t support aggregate expressions? In the case of `NSAllPredicateModifier`,
    this is true. If you try to run an `ALL X` query, your application will crash.
    You can use the `NSAnyPredicateModifier`, however, as the `anyWordContainsZ` method
    shown in [Listing 3-34](#9781430260288_Ch03.xhtml#list34) (Objective-C) and [Listing
    3-35](#9781430260288_Ch03.xhtml#list35) (Swift) illustrate. This method lists
    all the categories for which any word contains the letter "z." Add the method
    and a call to it in `statistics`, build and run the application, and you’ll see
    that all categories except "x" have at least one word that contains the letter
    "z."


    [***Listing 3-34***](#9781430260288_Ch03.xhtml#_list34). The `anyWordContainsZ`
    Method (Objective-C)


    ```

    - (NSString *)anyWordContainsZ {  NSExpression *text = [NSExpression expressionForKeyPath:@"words.text"];

      NSExpression *z = [NSExpression expressionForConstantValue:@"z"];

      NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:text

                                                                  rightExpression:z

                                                              modifier:NSAnyPredicateModifier

                                                                  type:NSContainsPredicateOperatorType

                                                               options:0];

      NSLog(@"Predicate: %@", [predicate predicateFormat]);

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"WordCategory"];

      fetchRequest.predicate = predicate;

      NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      return [NSString stringWithFormat:@"ANY: %@\n",

             [[categories valueForKey:@"firstLetter"] componentsJoinedByString:@","]];

    }

    ```


