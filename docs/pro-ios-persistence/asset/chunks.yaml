- fmt: "对于 Objective-C 版本，向`AppDelegate.h`添加一个`Persistence`属性，如[代码清单9-4](#9781430260288_Ch09.xhtml#list4)所示。对于\
    \ Swift 和 Objective-C，在`AppDelegate`的`application:didFinishLaunchingWithOptions:`方法中初始化`Persistence`属性，如[代码清单9-5](#9781430260288_Ch09.xhtml#list5)（Objective-C）或[代码清单9-6](#9781430260288_Ch09.xhtml#list6)（Swift）所示。如果使用\
    \ Objective-C，请确保在`AppDelegate.m`中导入`Persistence.h`。\n\n[***代码清单9-4***](#9781430260288_Ch09.xhtml#_list4).\
    \ 带有`Persistence`属性的`AppDelegate.h`\n\n```\n#import <UIKit/UIKit.h>\n\n@class\
    \ Persistence;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
    \ Persistence *persistence;\n\n@end\n```\n\n[***代码清单9-5***](#9781430260288_Ch09.xhtml#_list5).\
    \ 在`AppDelegate.m (Objective-C)`中初始化 Core Data 栈\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
    \  self.persistence = [[Persistence alloc] init];\n  return YES;\n}\n```\n\n[***代码清单9-6***](#9781430260288_Ch09.xhtml#_list6).\
    \ 在`AppDelegate.swift`（Swift）中初始化 Core Data 栈\n\n```\nvar persistence: Persistence?\n\
    \nfunc application(application: UIApplication, didFinishLaunchingWithOptions launchOptions:\
    \ [NSObject: AnyObject]?) -> Bool {\n    self.persistence = Persistence()\n  \
    \  return true\n}\n```\n\n## 创建数据模型和数据\n\n此应用程序的数据模型用于追踪跨社交网络的人员和自拍（为自己拍摄的照片，可选地包含其他人），并由三个实体组成：`Person`、`Selfie`和`SocialNetwork`。每个人可以出现在多张自拍中，每张自拍可以标记多人。同时，每张自拍可以发布到多个社交网络，每个社交网络可以显示多张自拍。这意味着`Person`和`Selfie`具有可选的多对多关系，`Selfie`和`SocialNetwork`也具有可选的多对多关系。\n\
    \n我们还需要为每个实体添加一些属性，为简化模型，我们将为每个实体赋予一个类型为`String`的`name`属性和一个类型为`Integer 16`的`rating`属性。请继续创建此模型，它应与[图9-2](#9781430260288_Ch09.xhtml#Fig2)匹配。\n\
    \n![9781430260288_Fig09-02.jpg](images/9781430260288_Fig09-02.jpg)\n\n[图9-2](#9781430260288_Ch09.xhtml#_Fig2).\
    \ Core Data 模型\n\n接下来，我们将向数据模型中填充足够的数据，以便运行性能测试并区分结果。创建500个人员、自拍和社交网络，并将它们全部关联起来就足够了——这将为我们提供三个各有500行的表（`Person`、`Selfie`和`SocialNetwork`）以及两个各有250,000行的连接表（`Person`-`Selfie`和`Selfie`-`SocialNetwork`）。\n\
    \n要插入数据，请打开`Persistence.h`（对于 Objective-C）并声明一个方法来加载数据。\n\n```\n- (void)loadData;\n\
    ```\n\n在`Persistence.m`或`Persistence.swift`中实现该方法。实现应检查持久化存储以确定数据是否已加载，以便后续的程序调用不会重复填充数据存储。如果数据尚未插入，`loadData`方法会创建500个人员，名称如`Person\
