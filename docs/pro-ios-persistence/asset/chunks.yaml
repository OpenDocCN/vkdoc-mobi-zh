    # 排版的 Markdown 文档


    * 使用`NSFetchedResultsController`从 Core Data 存储中获取数据并在表格视图中显示

    * 利用 Core Data 将图片存储在存储外部以提高性能

    * 将`UISearchDisplayController`与表格视图集成


    本章构建的应用程序是一个名为 CoreDump 的 Bug 追踪器。第一个屏幕是主视图（Master view），显示项目列表——每个项目包含名称和统一资源定位符（URL）。我们根据
    URL 的域名对显示的项目进行分组，因此 BitBucket 项目归为一组，GitHub 项目归为一组，以此类推。然后，我们可以深入查看任何项目，以查看与该项目关联的
    Bug 列表。我们也可以向项目添加 Bug。在本章结束时，你将拥有一个存在明显缺陷的 Bug 追踪器——例如，你无法删除或关闭 Bug——但你会更熟练地将
    Core Data 与用户界面（UI）集成。


    ## 使用 `NSFetchedResultsController` 显示表格数据


    从 iPhone 问世以来，许多（如果不是大多数）iOS 应用程序都显示数据列表。iOS 将这些单列列表称为“表格”，并提供了表格视图类（`UITableView`）和控制器（`UITableViewController`），用于显示列表、支持快速滚动浏览数据，甚至提供了点击单元格以深入数据层次结构的机制。这种方法对于显示数据如此基础和重要，以至于所有
    iOS 开发人员都知道如何使用此类及其支持类来显示数据列表。


    当使用表格视图显示来自 Core Data 存储的数据时，你可以简单地将数据获取到数组中，并让表格视图生态系统忽略数据的来源，实际上许多应用程序正是这样做的。然而，iOS
    SDK 提供了一个名为`NSFetchedResultsController`的类，它连接了表格视图和 Core Data。`NSFetchedResultsController`从持久化存储中拉取托管对象，从你指定的实体中获取，缓存它们以提高性能，并在需要时将它们提供给表格视图进行显示。它还管理表格中行的添加、移除和移动，以响应数据变化。


    ## 创建获取结果控制器


    你可以通过四个参数创建一个获取结果控制器：


    * 一个获取请求（`NSFetchRequest`实例）

    * 一个托管对象上下文（`NSManagedObjectContext`实例）

    * （可选）一个分区名称键路径

    * （可选）一个缓存名称


    以下章节解释这些参数。


    ### 获取请求


    `NSFetchedResultsController`使用的获取请求定义了要在表格中显示的数据。它与你在此书中以及在任何 Core Data 开发中使用的任何获取请求几乎相同。它与你在数据模型中指定的实体配合使用，并且可以选择使用谓词（`NSPredicate`）来过滤获取的内容。此获取请求的一个不同之处在于，它必须至少有一个排序描述符，否则你的应用程序将崩溃并显示以下消息：


    ```

    ''NSInvalidArgumentException'', reason: ''An instance of NSFetchedResultsController
    requires a fetch request with sort descriptors.''

    ```


    这是因为获取结果控制器在表格的约束下工作，表格以可预测的顺序显示单元格，因此获取结果控制器也必须以可预测的顺序获取数据。排序描述符提供了帮助排序数据的必要机制。


    ### 托管对象上下文


    这是一个普通的托管对象上下文，用于保存托管对象。保存上下文会保存其中的所有对象。通常，你使用应用程序的托管对象上下文作为此参数。


    ### 分区名称键路径


    iOS 将表格视图划分为多个分区，每个分区有若干行。这种结构对表格视图的操作至关重要。获取结果控制器针对在这种环境下工作进行了优化，并可以将数据划分为与表格分区相对应的分区。分区名称键路径，作为`sectionNameKeyPath`参数设置，指定了一个键路径，进入你的
    Core Data 模型，将获取请求实体的托管对象划分为这些分区。通常，你将此`sectionNameKeyPath`参数指向该表格显示的实体的某个属性。请注意，如果你为`sectionNameKeyPath`参数指定了值，你还必须按该值对获取结果进行排序，否则你的应用程序将因错误而崩溃。如果你的表格视图只包含一个分区，你可以为`sectionNameKeyPath`参数传入`nil`。


    ### 缓存名称


    缓存名称参数指定了缓存的名称，获取结果控制器使用该缓存来缓存它获取并提供给表格的托管对象。在 iOS 3.x 版本中，鼓励你使此缓存名称在获取结果控制器之间唯一，但即使与其他获取结果控制器共享缓存名称，你的应用程序仍然可以工作。然而，从
    iOS 4.0 开始，如果你在获取结果控制器之间共享缓存名称，你的应用程序将无法正常工作。请确保你的缓存名称是唯一的。


    请注意，此参数是可选的；你可以将缓存设置为`nil`，这样获取结果控制器就不会缓存数据。这当然会降低数据显示和应用程序的响应速度，因此你通常不会将缓存设置为`nil`。


    ## 创建获取结果控制器委托


    现在是时候创建获取结果控制器委托了。


    ## 构建 CoreDump 应用程序


    为了开始探索获取结果控制器，创建一个新的 iOS Master-Detail Application 项目，并将其命名为 CoreDump。选择你的语言并勾选**Use
    Core Data**，如图 5-1 所示。


    ![9781430260288_Fig05-01.jpg](img/9781430260288_Fig05-01.jpg)


    图 5-1. 创建 CoreDump 应用程序


    Xcode 会创建一个项目，包含一个连接了主屏幕和详细屏幕的故事板、一个包含单个实体（`Event`）的 Core Data 模型，以及一个`NSFetchedResultsController`，用于将数据从
    Core Data 存储提供给主屏幕上的表格视图。继续运行应用程序，创建一些事件，深入查看它们，感受生成的应用程序是如何工作的。同时，在代码中探索一下，看看发生了什么。像往常一样，Xcode
    生成的代码既为你的应用程序提供了一个良好的起点，也是学习如何使用 Apple 技术的绝佳方式。


    ## 检查 CoreDump 应用程序中的 `NSFetchedResultsController`


    让我们确保理解 CoreDump 如何在生成的代码中实现获取结果控制器。如果你正在用 Objective-C 构建此项目，请打开`MasterViewController.h`查看`MasterViewController`类的声明，如列表
    5-1 所示。


    ***列表 5-1***. `MasterViewController.h`


    ```

    #import <UIKit/UIKit.h>

    #import <CoreData/CoreData.h>


    @interface MasterViewController : UITableViewController <NSFetchedResultsControllerDelegate>


    @property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;

    @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;


    @end

    ```


    你可以看到，`MasterViewController`类继承自`UITableViewController`，并且实现了`NSFetchedResultsControllerDelegate`协议。它还拥有一个名为`fetchedResultsController`的`NSFetchedResultsController`属性，以及一个名为`managedObjectContext`的`NSManagedObjectContext`属性。

