        let category = self.managedObjectContext?.executeFetchRequest(NSFetchRequest(entityName:
    "BookCategory"), error: nil)?.last as BookCategory?


    if let managedObjectContext = self.managedObjectContext {

            // Tell the undo manager that from now on, we manage grouping

            managedObjectContext.undoManager?.groupsByEvent = false


