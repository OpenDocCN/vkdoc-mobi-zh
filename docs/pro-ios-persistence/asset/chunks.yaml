    Deleting an Event


    The generated application allows you to delete the `Event` instances from the
    Master table, either by swiping left on the table cell and tapping the Delete
    button that appears or by tapping the Edit link on the left of the navigation
    bar, tapping the Delete icon to the left of the table cell, and then tapping the
    Delete button. Don’t forget to tap the Done link when you’re done.


    When you delete a row from the table, your `tableView:commitEditingStyle:forRowAtIndexPath:`
    method is called with the `UITableViewCellEditingStyleDelete` editing style. The
    implementation checks for that style, deletes the corresponding object from `fetchedResultsController`,
    and saves the managed object context. [Listing 5-19](#9781430260288_Ch05.xhtml#list19)
    (Objective-C) and [Listing 5-20](#9781430260288_Ch05.xhtml#list20) (Swift) show
    this code.


