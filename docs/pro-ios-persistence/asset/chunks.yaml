    [***Listing 8-26***](#9781430260288_Ch08.xhtml#_list26). A Property for the Dropbox
    Data Store in `ViewController.swift`

    **var datastore: DBDatastore?**


    The `DBDatastore` property represents the data container that will automatically
    be synced with Dropbox. As long as you keep an instance of it in your app, the
    data store will sync automatically.


    Now you can edit the `didPressLink:` method to behave differently if the account
    is already linked, as shown in [Listing 8-27](#9781430260288_Ch08.xhtml#list27)
    (Objective-C) or [Listing 8-28](#9781430260288_Ch08.xhtml#list28) (Swift). As
    its comments describe, this updated method does the following:


    *   Creates a data store in Dropbox if one doesn’t already exist

    *   Gets a handle to the Notes table, creating it if necessary

    *   Creates a new note with the current date as its text and stores it in Dropbox

    *   Syncs the data store


    [***Listing 8-27***](#9781430260288_Ch08.xhtml#_list27). Create a Note in Dropbox
    (Objective-C)

    `- (IBAction)didPressLink {`

      `DBAccount *linkedAccount = [[DBAccountManager sharedManager] linkedAccount]``;`

      `if (linkedAccount) {`

        **// If there isn''t a store yet, make one**

        **if (!self.datastore) self.datastore = [DBDatastore openDefaultStoreForAccount:linkedAccount
    error:nil];**


    **// Create or get a handle to the Notes table if it already exists**

        **DBTable *notes = [self.datastore getTable:@"Notes"];**


    **// Make a new note to store. In a normal app, this comes from typed text. To
    keep things**

        **// simple, we just manufacture the text with a timestamp**

        **NSDate *now = [NSDate date];**

        **NSString *noteText = [NSDateFormatter localizedStringFromDate:now**

    **dateStyle:NSDateFormatterShortStyle**

    **timeStyle:NSDateFormatterFullStyle];**


    **// Insert the new note into the table**

        **[notes insert:@{ @"details": noteText, @"createDate": now, @"encrypted":
    @NO }];**


    **NSLog(@"Inserted new note: %@", noteText);**


    **// Make sure to tell Dropbox to sync the store**

        **[self.datastore sync:nil];**

      `}`

      `else {`

        `[[DBAccountManager sharedManager] linkFromController:self];`

      `}`

    `}`


    [***Listing 8-28***](#9781430260288_Ch08.xhtml#_list28). Create a Note in Dropbox
    (Swift)

    `@IBAction func didPressLink(sender: AnyObject)` `{`

        `if let linkedAccount = DBAccountManager.sharedManager().linkedAccount {`

            **// if there isn''t a store yet, make one**

            **if self.datastore == nil {**

                **self.datastore = DBDatastore.openDefaultStoreForAccount(linkedAccount,
    error: nil)**

            **}**


    **// Create or get a handle to the Notes table if it already exists**

            **let notes = datastore?.getTable("Notes")**


    **// Make a new note to store. In a normal app, this comes from typed text. To
    keep things**

            **// simple, we just manufacture the text with a timestamp**

            **let now = NSDate()**

            **let noteText = NSDateFormatter.localizedStringFromDate(now, dateStyle:
    .ShortStyle, timeStyle: .FullStyle)**


    **// Insert the new note into the table**

            **notes?.insert(["details": noteText, "createDate": now, "encrypted":
    false])**


    **println("Inserted new note \(noteText)")**


    **// Make sure to tell Dropbox to sync the store**

            **datastore?.sync(nil)**

        `}`

        `else {`

            `DBAccountManager.sharedManager().linkFromController(self)`

        `}`

    `}`


    At this point, you can run the app and after you’ve linked to Dropbox, every time
    you press the “Store” button, a new note is added into your data store. You can
    even verify that everything went well using Dropbox’s web view at `www.dropbox.com/developers/apps/datastores`.
    You should see the app you created with a link to browse the data store. If you
    click the Browse link, you should see a listing of the notes you’ve created from
    the app.


    Of course, you can always query the data store in your application code to get
    your records back. For example, to get all the notes in the Notes table, you’d
    write code like that shown in [Listing 8-29](#9781430260288_Ch08.xhtml#list29)
    (Objective-C) or [Listing 8-30](#9781430260288_Ch08.xhtml#list30) (Swift).


    [***Listing 8-29***](#9781430260288_Ch08.xhtml#_list29). Retrieving All the Notes
    (Objective-C)

    `NSError *error;`

    `DBTable *notes = [self.datastore getTable:@"Notes"];`

    `NSArray *myNotes = [notes query:nil error:&error];`


    [***Listing 8-30***](#9781430260288_Ch08.xhtml#_list30). Retrieving All the Notes
    (Swift)

    `var error: DBError?`

    `let notes = datastore?.getTable("Notes")`

    `let myNotes = notes?.query(nil, error: &error)`


    Notice that the parameter we passed for `query` is `nil`, so the data store will
    return all records in the Notes table. The query parameter takes an `NSDictionary`
    (Objective-C) or `AnyObject` (Swift) instance to filter the result set it returns.
    We can filter the results by passing a dictionary object with the fields specified
    that we want to filter on. Suppose, for example, that some of the records we put
    into the Notes table are encrypted—that is, the dictionary passed to `insert:`
    has `@"encrypted"` set to `@YES`. To retrieve only those records, we’d use code
    like that shown in [Listing 8-31](#9781430260288_Ch08.xhtml#list31) (Objective-C)
    or [Listing 8-32](#9781430260288_Ch08.xhtml#list32) (Swift).


    [***Listing 8-31***](#9781430260288_Ch08.xhtml#_list31). Filtering the Result
    Set (Objective-C)

    `NSError *error;`

    `DBTable *notes = [self.datastore getTable:@"Notes"];`

    `NSArray *myNotes = [notes query:`**@{ @"encrypted": @YES }** `error:&error];`


    [***Listing 8-32***](#9781430260288_Ch08.xhtml#_list32). Filtering the Result
    Set (Swift)

    `var error: DBError?`

    `let notes = datastore?.getTable("Notes")`

    `let myNotes = notes?.query(`**["encrypted": true]**`, error: &error)`


    You could, of course, set multiple values in the dictionary to filter on multiple
    keys.


    Using Core Data with the Dropbox Datastore API: ParcelKit


    We’ve seen how iCloud can be used to back up and sync Core Data stores. We’ve
    also seen how Dropbox’s Datastore API can be used as a schema-less store. In this
    section, we look at how the Datastore API can be used as a substitute for iCloud
    with your Core Data store. For this, we use the ParcelKit library (`https://github.com/overcommitted/ParcelKit`).


    In order to illustrate the complete process, we start with a fresh application.
    In Xcode, create a new project using the Master-Detail Application template. Name
    the project DropboxEvents, and, this time, be sure to check the Use Core Data
    check box.


    Of course, you may launch the application and get the regular Master-Detail sample
    application where you can hit the + button to create new events.


    Adding the Required Frameworks for Dropbox and ParcelKit


    You can add ParcelKit by using Cocoapods (`http://cocoapods.org`), or you can
    download the source from `https://github.com/overcommitted/ParcelKit` and follow
    the instructions on that page to build the framework. If you use cocoapods, you
    can skip the rest of this section.


    In the previous section, we’ve seen how to integrate with Dropbox and add the
    frameworks it requires. For the DropboxEvents app, repeat those steps to add `Dropbox.framework`
    and the other required standard frameworks to the project.


    *   CFNetwork.framework

    *   Security.framework

    *   SystemConfiguration.framework

    *   QuartzCore.framework

    *   libc++.dylib

    *   libz.dylib


    Next, add the ParcelKit library itself to your project. The dependencies should
    look as shown in [Figure 8-5](#9781430260288_Ch08.xhtml#Fig5).


    ![9781430260288_Fig08-05.jpg](images/9781430260288_Fig08-05.jpg)


    [Figure 8-5](#9781430260288_Ch08.xhtml#_Fig5). The dependencies of the Dropbox/ParcelKit
    application'
  trans: "\n**代码清单 8-25.** `ViewController.m` 中 Dropbox 数据存储的私有属性\n\n```\n@interface\
    \ ViewController ()\n@property (nonatomic, strong) DBDatastore *datastore;\n@end\n\
    ```\n\n**代码清单 8-26.** `ViewController.swift` 中 Dropbox 数据存储的属性\n\n```\nvar datastore:\
    \ DBDatastore?\n```\n\n`DBDatastore` 属性代表将自动与 Dropbox 同步的数据容器。只要在你的应用中保留一个它的实例，数据存储就会自动同步。\n\
    \n现在，你可以编辑 `didPressLink:` 方法，使其在账户已关联的情况下表现出不同的行为，如代码清单 8-27（Objective-C）或代码清单\
    \ 8-28（Swift）所示。如其注释所述，这个更新后的方法执行以下操作：\n\n*   如果 Dropbox 中尚不存在数据存储，则创建一个\n*  \
    \ 获取 Notes 表的句柄，必要时创建该表\n*   使用当前日期作为文本创建一条新笔记，并将其存储在 Dropbox 中\n*   同步数据存储\n\n\
    **代码清单 8-27.** 在 Dropbox 中创建笔记（Objective-C）\n\n```\n- (IBAction)didPressLink {\n\
    \    DBAccount *linkedAccount = [[DBAccountManager sharedManager] linkedAccount];\n\
    \    if (linkedAccount) {\n        // 如果还没有存储对象，则创建一个\n        if (!self.datastore)\
    \ self.datastore = [DBDatastore openDefaultStoreForAccount:linkedAccount error:nil];\n\
    \n        // 如果 Notes 表已存在，则创建或获取其句柄\n        DBTable *notes = [self.datastore\
    \ getTable:@\"Notes\"];\n\n        // 制作一条新笔记进行存储。在正常应用中，这来自键入的文本。为简单起见，\n   \
    \     // 我们仅用时间戳生成文本\n        NSDate *now = [NSDate date];\n        NSString *noteText\
    \ = [NSDateFormatter localizedStringFromDate:now\n                           \
    \                                dateStyle:NSDateFormatterShortStyle\n       \
    \                                                    timeStyle:NSDateFormatterFullStyle];\n\
    \n        // 将新笔记插入表中\n        [notes insert:@{ @\"details\": noteText, @\"createDate\"\
    : now, @\"encrypted\": @NO }];\n\n        NSLog(@\"Inserted new note: %@\", noteText);\n\
    \n        // 确保通知 Dropbox 同步存储对象\n        [self.datastore sync:nil];\n    } else\
    \ {\n        [[DBAccountManager sharedManager] linkFromController:self];\n   \
    \ }\n}\n```\n\n**代码清单 8-28.** 在 Dropbox 中创建笔记（Swift）\n\n```\n@IBAction func didPressLink(sender:\
    \ AnyObject) {\n    if let linkedAccount = DBAccountManager.sharedManager().linkedAccount\
    \ {\n        // 如果还没有存储对象，则创建一个\n        if self.datastore == nil {\n        \
    \    self.datastore = DBDatastore.openDefaultStoreForAccount(linkedAccount, error:\
    \ nil)\n        }\n\n        // 如果 Notes 表已存在，则创建或获取其句柄\n        let notes = datastore?.getTable(\"\
    Notes\")\n\n        // 制作一条新笔记进行存储。在正常应用中，这来自键入的文本。为简单起见，\n        // 我们仅用时间戳生成文本\n\
    \        let now = NSDate()\n        let noteText = NSDateFormatter.localizedStringFromDate(now,\
    \ dateStyle: .ShortStyle, timeStyle: .FullStyle)\n\n        // 将新笔记插入表中\n    \
    \    notes?.insert([\"details\": noteText, \"createDate\": now, \"encrypted\"\
    : false])\n\n        println(\"Inserted new note \\(noteText)\")\n\n        //\
    \ 确保通知 Dropbox 同步存储对象\n        datastore?.sync(nil)\n    } else {\n        DBAccountManager.sharedManager().linkFromController(self)\n\
    \    }\n}\n```\n\n此时，你可以运行应用，在关联 Dropbox 后，每次按下“Store”按钮，都会在数据存储中添加一条新笔记。你甚至可以通过\
    \ Dropbox 的网页视图 `www.dropbox.com/developers/apps/datastores` 验证一切是否顺利。你应该会看到创建的应用带有一个用于浏览数据存储的链接。如果你点击“Browse”链接，应该会看到你在应用中创建的笔记列表。\n\
    \n当然，你始终可以在应用代码中查询数据存储以取回记录。例如，要获取 Notes 表中的所有笔记，你可以编写如代码清单 8-29（Objective-C）或代码清单\
    \ 8-30（Swift）所示的代码。\n\n**代码清单 8-29.** 检索所有笔记（Objective-C）\n\n```\nNSError *error;\n\
    DBTable *notes = [self.datastore getTable:@\"Notes\"];\nNSArray *myNotes = [notes\
    \ query:nil error:&error];\n```\n\n**代码清单 8-30.** 检索所有笔记（Swift）\n\n```\nvar error:\
    \ DBError?\nlet notes = datastore?.getTable(\"Notes\")\nlet myNotes = notes?.query(nil,\
    \ error: &error)\n```\n\n请注意，我们传递给 `query` 的参数是 `nil`，因此数据存储将返回 Notes 表中的所有记录。`query`\
    \ 参数接受一个 `NSDictionary`（Objective-C）或 `AnyObject`（Swift）实例来过滤其返回的结果集。我们可以通过传递一个包含要过滤字段的字典对象来过滤结果。例如，假设我们放入\
    \ Notes 表中的某些记录是加密的——即传递给 `insert:` 的字典中 `@\"encrypted\"` 设置为 `@YES`。要仅检索这些记录，我们可以使用如代码清单\
    \ 8-31（Objective-C）或代码清单 8-32（Swift）所示的代码。\n\n**代码清单 8-31.** 过滤结果集（Objective-C）\n\
    \n```\nNSError *error;\nDBTable *notes = [self.datastore getTable:@\"Notes\"];\n\
    NSArray *myNotes = [notes query:@{ @\"encrypted\": @YES } error:&error];\n```\n\
    \n**代码清单 8-32.** 过滤结果集（Swift）\n\n```\nvar error: DBError?\nlet notes = datastore?.getTable(\"\
    Notes\")\nlet myNotes = notes?.query([\"encrypted\": true], error: &error)\n```\n\
    \n当然，你也可以在字典中设置多个值以在多个键上进行过滤。\n\n## 将 Core Data 与 Dropbox Datastore API 结合使用：ParcelKit\n\
    \n我们已经了解了如何使用 iCloud 备份和同步 Core Data 存储。也了解了如何将 Dropbox 的 Datastore API 用作无模式存储。在本节中，我们将探讨如何将\
    \ Datastore API 用作 Core Data 存储中 iCloud 的替代方案。为此，我们将使用 ParcelKit 库（`https://github.com/overcommitted/ParcelKit`）。\n\
    \n为了演示完整流程，我们从一个全新的应用开始。在 Xcode 中，使用 Master-Detail Application 模板创建一个新项目。将项目命名为\
    \ DropboxEvents，并且这次务必勾选“Use Core Data”复选框。\n\n当然，你可以启动应用，获得常规的 Master-Detail\
    \ 示例应用，在其中可以点击 + 按钮创建新事件。\n\n### 添加 Dropbox 和 ParcelKit 所需的框架\n\n你可以通过 Cocoapods（`http://cocoapods.org`）添加\
    \ ParcelKit，或者从 `https://github.com/overcommitted/ParcelKit` 下载源代码，并按照该页面的说明构建框架。如果你使用\
    \ Cocoapods，可以跳过本节其余部分。\n\n在上一节中，我们了解了如何集成 Dropbox 并添加其所需的框架。对于 DropboxEvents\
    \ 应用，重复这些步骤，将 `Dropbox.framework` 和其他所需的标准框架添加到项目中。\n\n*   `CFNetwork.framework`\n\
    *   `Security.framework`\n*   `SystemConfiguration.framework`\n*   `QuartzCore.framework`\n\
    *   `libc++.dylib`\n*   `libz.dylib`\n\n接下来，将 ParcelKit 库本身添加到你的项目中。依赖关系应如图 8-5\
    \ 所示。\n\n![9781430260288_Fig08-05.jpg](img/9781430260288_Fig08-05.jpg)\n\n**图\
    \ 8-5.** Dropbox/ParcelKit 应用的依赖关系\n"
- fmt: "#### 作为 ParcelKit 配置的一部分，进入项目的 `Build Settings`，在 `Other Linker Flags` 中添加\
    \ `–ObjC` 标志，如图 [Figure 8-6](#9781430260288_Ch08.xhtml#Fig6) 所示。请注意，你需要为 Objective-C\
    \ 和 Swift 版本都执行此操作。\n\n![9781430260288_Fig08-06.jpg](images/9781430260288_Fig08-06.jpg)\n\
    \n[Figure 8-6](#9781430260288_Ch08.xhtml#_Fig6). `Other Linker Flags` 条目\n\n####\
    \ 将 `DropboxEvents` 与 Dropbox 集成\n\n正如我们在 Dropbox Datastore API 部分构建的 `DropboxPersistenceApp`\
    \ 应用一样，我们必须将 `DropboxEvents` 与 Dropbox 集成。让我们再走一遍流程。\n\n1.  打开 `AppDelegate.m`\
    \ 或 `AppDelegate.swift`，编辑 `application: didFinishLaunchingWithOptions:` 方法，如\
    \ [Listing 8-33](#9781430260288_Ch08.xhtml#list33) (Objective-C) 或 [Listing 8-34](#9781430260288_Ch08.xhtml#list34)\
    \ (Swift) 所示，以初始化 Dropbox SDK。\n\n[**Listing 8-33**](#9781430260288_Ch08.xhtml#list33).\
    \ 初始化 Dropbox SDK (Objective-C)\n```objc\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n    DBAccountManager\
    \ *accountManager = [[DBAccountManager alloc] initWithAppKey:@\"APP_KEY\" secret:@\"\
    APP_SECRET\"];\n    [DBAccountManager setSharedManager:accountManager];\n\n  \
    \  UINavigationController *navigationController = (UINavigationController *)self.window.rootViewController;\n\
    \    MasterViewController *controller = (MasterViewController *)navigationController.topViewController;\n\
    \    controller.managedObjectContext = self.managedObjectContext;\n    return\
    \ YES;\n}\n```\n\n[**Listing 8-34**](#9781430260288_Ch08.xhtml#_list34). 初始化 Dropbox\
    \ SDK (Swift)\n```swift\nfunc application(application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n    let accountManager = DBAccountManager(appKey:\
    \ \"APP_KEY\", secret: \"APP_SECRET\")\n    DBAccountManager.setSharedManager(accountManager)\n\
    \n    // Override point for customization after application launch.\n    let navigationController\
    \ = self.window!.rootViewController as UINavigationController\n    let controller\
    \ = navigationController.topViewController as MasterViewController\n    controller.managedObjectContext\
    \ = self.managedObjectContext\n    return true\n}\n```\n\n2.  确保在 `AppDelegate.m`\
    \ 顶部导入 `\"TargetConditionals.h\"` 和 `<Dropbox/Dropbox.h>`（如果适用），并将应用程序密钥和密钥替换为你从\
    \ Dropbox 获取的密钥和密钥。你可以重用用于 `DropboxPersistenceApp` 的应用程序密钥和密钥，或者也可以在 Dropbox 上创建一个新应用并获取新的应用程序密钥和密钥。\n\
    3.  此外，你必须在 `AppDelegate.m` 或 `AppDelegate.swift` 中添加处理从 Dropbox 身份验证控制器返回所需的方法，如\
    \ [Listing 8-35](#9781430260288_Ch08.xhtml#list35) (Objective-C) 或 [Listing 8-36](#9781430260288_Ch08.xhtml#list36)\
    \ (Swift) 所示。\n\n[**Listing 8-35**](#9781430260288_Ch08.xhtml#_list35). 处理 URL\
    \ 回调 (Objective-C)\n```objc\n- (BOOL)application:(UIApplication *)application\
    \ openURL:(NSURL *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\
    \ {\n    DBAccount *account = [[DBAccountManager sharedManager] handleOpenURL:url];\n\
    \    if (account) {\n        NSLog(@\"App linked successfully from %@\", sourceApplication);\n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\n[**Listing 8-36**](#9781430260288_Ch08.xhtml#_list36).\
    \ 处理 URL 回调 (Swift)\n```swift\nfunc application(application: UIApplication, openURL\
    \ url: NSURL, sourceApplication: String, annotation: AnyObject?) -> Bool {\n \
    \   let account = DBAccountManager.sharedManager().handleOpenURL(url)\n    if\
    \ let account = account {\n        println(\"App linked successfully from \\(sourceApplication)\"\
    )\n        return true\n    }\n    return false\n}\n```\n\n4.  为了确保应用能够接收来自 Dropbox\
    \ 身份验证控制器的回调，编辑 `DropboxEvents-Info.plist` 并添加 Dropbox URL 类型，正如我们在上一节中所做的那样，如图\
    \ [Figure 8-7](#9781430260288_Ch08.xhtml#Fig7) 所示。再次强调，请使用你从 Dropbox 获取的实际应用程序密钥，而不是\
    \ `\"APP_KEY\"`。\n\n![9781430260288_Fig08-07.jpg](images/9781430260288_Fig08-07.jpg)\n\
    \n[Figure 8-7](#9781430260288_Ch08.xhtml#_Fig7). URL 类型\n\n#### 使用 ParcelKit 进行编码\n\
    \n一旦设置工作完成，我们就可以开始考虑使用 ParcelKit 实际编码应用的持久化功能。幸运的是，ParcelKit 为我们完成了大部分繁重的工作，我们只需要通过代码进行配置。\n\
    \n1.  剩余的工作位于 `MasterViewController.m` 或 `MasterViewController.swift` 中，因此让我们打开相应的文件。我们需要做的第一件事是禁用\
    \ `NSFetchedResultsController` 的缓存，以防止在从云端接收数据时出现缓存不一致。这可能感觉有点奇怪，因为通常你应该为 `NSFetchedResultsController`\
    \ 提供一个缓存以提高性能，但数据一致性胜过性能。转到 `fetchedResultsController` 方法，并将缓存名称从 `\"Master\"\
    ` 更改为 `nil`，如 [Listing 8-37](#9781430260288_Ch08.xhtml#list37) (Objective-C) 或\
    \ [Listing 8-38](#9781430260288_Ch08.xhtml#list38) (Swift) 所示。\n\n[**Listing 8-37**](#9781430260288_Ch08.xhtml#_list37).\
    \ 从 `fetchedResultsController` 中移除缓存 (Objective-C)\n```objc\nNSFetchedResultsController\
    \ *aFetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
    \ managedObjectContext:self.managedObjectContext sectionNameKeyPath:nil cacheName:nil];\n\
    ```\n\n[**Listing 8-38**](#9781430260288_Ch08.xhtml#_list38). 从 `fetchedResultsController`\
    \ 中移除缓存 (Swift)\n```swift\nlet aFetchedResultsController = NSFetchedResultsController(fetchRequest:\
    \ fetchRequest, managedObjectContext: self.managedObjectContext!, sectionNameKeyPath:\
    \ nil, cacheName: nil)\n```\n\n2.  由于我们将使用 Dropbox 和 ParcelKit，因此在文件的顶部为 Objective-C\
    \ 版本添加相应的 import 语句，如 [Listing 8-39](#9781430260288_Ch08.xhtml#list39) 所示。\n\n\
    [**Listing 8-39**](#9781430260288_Ch08.xhtml#list39). 添加 Dropbox 和 ParcelKit 的\
    \ Import 语句\n```objc\n#import \"TargetConditionals.h\"\n#import <Dropbox/Dropbox.h>\n\
    #import <ParcelKit/ParcelKit.h>\n```\n\n3.  仍在 `MasterViewController.m` 或 `MasterViewController.swift`\
    \ 中，向私有接口添加两个属性，如 [Listing 8-40](#9781430260288_Ch08.xhtml#list40) (Objective-C)\
    \ 或 [Listing 8-41](#9781430260288_Ch08.xhtml#list41) (Swift) 所示。\n\n[**Listing\
    \ 8-40**](#9781430260288_Ch08.xhtml#_list40). 为数据存储和同步管理器添加私有属性 (Objective-C)\n\
    ```objc\n@interface MasterViewController ()\n@property (nonatomic, strong) DBDatastore\
    \ *datastore;\n@property (nonatomic, strong) PKSyncManager *syncManager;\n@end\n\
    ```\n\n[**Listing 8-41**](#9781430260288_Ch08.xhtml#_list41). 为数据存储和同步管理器添加私有属性\
    \ (Swift)\n```swift\nvar datastore: DBDatastore?\nvar syncManager: PKSyncManager?\n\
    ```\n\n4.  接下来我们需要关注链接过程。在我们的案例中，由于一切都依赖于 Dropbox 的链接状态，因此我们在主视图出现时检查链接状态——在 `viewDidAppear:`\
    \ 方法中。将 [Listing 8-42](#9781430260288_Ch08.xhtml#list42) (Objective-C) 或 [Listing\
    \ 8-43](#9781430260288_Ch08.xhtml#list43) (Swift) 中显示的代码添加到 `MasterViewController.m`\
    \ 或 `MasterViewController.swift`。\n\n[**Listing 8-42**](#9781430260288_Ch08.xhtml#_list42).\
    \ 当视图出现时检查 Dropbox 链接状态 (Objective-C)\n```objc\n- (void)viewDidAppear:(BOOL)animated\
    \ {\n    [super viewDidAppear:animated];\n```"
