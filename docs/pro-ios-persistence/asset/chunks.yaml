    ## 创建映射模型


    要创建映射模型，请在 Xcode 中创建一个新文件。在随之弹出的对话框中，在左侧的 iOS 下选择 **Core Data**，在右侧选择 **Mapping
    Model**，如图 6-9 所示。点击 **Next**。


    ![9781430260288_Fig06-09.jpg](img/9781430260288_Fig06-09.jpg)


    图 6-9. 创建映射模型文件


    下一步是选择源模型。选择 `BookStore 3.xcdatamodel`，如图 6-10 所示，然后点击 **Next**。接着系统会要求你选择目标模型。选择
    `BookStore 4.xcdatamodel` 作为目标模型，如图 6-11 所示，然后点击 **Next**。最后一步是为映射模型命名。将其命名为 `Model3To4.xcmappingmodel`，然后点击
    **Create**。


    ![9781430260288_Fig06-10.jpg](img/9781430260288_Fig06-10.jpg)


    图 6-10. 选择源数据模型


    ![9781430260288_Fig06-11.jpg](img/9781430260288_Fig06-11.jpg)


    图 6-11. 选择目标数据模型


    你现在应该能看到 Xcode 已创建好你的映射模型，其中包含了 Core Data 能推断出的所有实体映射和属性映射，如图 6-12 所示。


    ![9781430260288_Fig06-12.jpg](img/9781430260288_Fig06-12.jpg)


    图 6-12. 新的映射模型


    请注意，Xcode 已经做了一些工作来帮助进行迁移。创建映射模型让你处于与轻量级迁移相同的起点，提供了 Core Data 能从源数据模型和目标数据模型中推断出的映射。在找到匹配的实体时，它会自动将新的属性值设置为源属性的副本。由于我们移除了
    `author` 属性并添加了两个新属性，它不太清楚该怎么做。这就需要你介入了。


    下一步是自定义映射模型以迁移出版物。首先创建你将使用的自定义策略，该策略是 `NSEntityMigrationPolicy` 的子类。创建一个名为 `PublicationToPublicationMigrationPolicy`
    的新 Cocoa Touch 类，该类继承自 `NSEntityMigrationPolicy`，如图 6-13 所示。


    ![9781430260288_Fig06-13.jpg](img/9781430260288_Fig06-13.jpg)


    图 6-13. 创建新的迁移策略


    在实现文件中（`PublicationToPublicationMigrationPolicy.m` 或 `PublicationToPublicationMigrationPolicy.swift`），你需要重写
    `createDestinationInstancesForSourceInstance:` 方法。在执行迁移时，Core Data 每次要从一个源 `Publication`
    实例创建一个 `Publication` 实例时，都会调用此方法。在你的实现中，你需要创建一个 `Publication` 实例，复制价格和标题，并将名字和姓氏分开。当然，我们的姓名分割方法有点粗糙，但这与主题无关。这个简单的实现将完美地说明我们想要做什么。


    最后，你需要告诉迁移管理器源 `Publication` 实例与目标新 `Publication` 实例之间的关系，这是确保迁移正确进行的重要步骤。代码清单
    6-10 展示了 Objective-C 版本，代码清单 6-11 展示了 Swift 版本。


    **代码清单 6-10**. 自定义迁移映射 (Objective-C)


    ```

    - (BOOL)createDestinationInstancesForSourceInstance:(NSManagedObject *)sourceInstance
    entityMapping:(NSEntityMapping *)mapping manager:(NSMigrationManager *)manager
    error:(NSError **)error {

      // 创建 book 托管对象

      NSManagedObject *book =

      [NSEntityDescription insertNewObjectForEntityForName:[mapping destinationEntityName]


    inManagedObjectContext:[manager destinationContext]];

      [book setValue:[sourceInstance valueForKey:@"title"] forKey:@"title"];

      [book setValue:[sourceInstance valueForKey:@"price"] forKey:@"price"];


    // 从源数据获取作者名字

      NSString *author = [sourceInstance valueForKey:@"author"];


    // 将作者名字拆分为名字和姓氏

      NSRange firstSpace = [author rangeOfString:@" "];

      NSString *firstName = [author substringToIndex:firstSpace.location];

      NSString *lastName = [author substringFromIndex:firstSpace.location+1];


    // 将名字和姓氏设置到 book 中

      [book setValue:firstName forKey:@"firstName"];

      [book setValue:lastName forKey:@"lastName"];


    // 为迁移管理器建立旧 Publication 与新 Publication 之间的关联

      [manager associateSourceInstance:sourceInstance withDestinationInstance:book    
    forEntityMapping:mapping];

      return YES;

    }

    ```


    **代码清单 6-11**. 自定义迁移映射 (Swift)


    ```

    override func createDestinationInstancesForSourceInstance(sInstance: NSManagedObject!,
    entityMapping mapping: NSEntityMapping!, manager: NSMigrationManager!, error:
    NSErrorPointer) -> Bool {

        // 创建 book 托管对象


    var book = NSEntityDescription.insertNewObjectForEntityForName(mapping.destinationEntityName,
    inManagedObjectContext: manager.destinationContext) as NSManagedObject!


    book.setValue(sInstance.valueForKey("title"), forKey: "title")

        book.setValue(sInstance.valueForKey("price"), forKey: "price")


    // 从源数据获取作者名字

        let author = sInstance.valueForKey("author") as String?


    // 将作者名字拆分为名字和姓氏

        let firstSpace = author?.rangeOfString(" ")

        if let firstSpace = firstSpace {

            let firstName = author?.substringToIndex(firstSpace.startIndex)

            let lastName = author?.substringFromIndex(firstSpace.endIndex)


    // 将名字和姓氏设置到 book 中

            book.setValue(firstName, forKeyPath: "firstName")

            book.setValue(lastName, forKeyPath: "lastName")

        }


    // 为迁移管理器建立旧 Publication 与新 Publication 之间的关联

        manager.associateSourceInstance(sInstance, withDestinationInstance: book,
    forEntityMapping: mapping)

        return true

    }

    ```

