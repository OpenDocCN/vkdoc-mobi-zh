    Integrating with Dropbox Datastore API


    With iOS, a lot of attention is often given to integrating with iCloud for persistence.
    Other solutions, however, might make sense for you depending on your app and your
    target audience. Dropbox has released its Datastore application programming interface
    (API), which allows you to use its cloud service as a ubiquitous data store. One
    of the obvious advantages of using Dropbox, rather than iCloud, is that Dropbox
    has APIs for multiple platforms. The Dropbox Datastore API doesn’t function like
    Core Data. It is not meant to act as a relational database where you create links
    between resources. Instead, it is a simple key/value pair store much like NoSQL
    databases such as MongoDB or Cassandra. One essential particularity is that is
    allows you to work without a schema, and therefore you need not worry so much
    about schema updates and migrations.


