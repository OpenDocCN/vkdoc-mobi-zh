    Setting Up the Detail View to Edit a Note


    The existing SecureNote detail view shows the timestamp of the selected entity.
    Instead, we want to show the selected note’s title and body in editable fields.
    When the user taps the back button, we save the data from the fields into the
    `Note` entity and then save the managed object context.


    In `DetailViewController.h`, change the `detailItem` property to `note`, of type
    `Note*`. Delete the existing `UILabel` and create the text field and text view
    for the note’s title and body, respectively. [Listing 7-34](#9781430260288_Ch07.xhtml#list34)
    shows the updated header file.


    [***Listing 7-34***](#9781430260288_Ch07.xhtml#_list34). `DetailViewController.h`
    with the Fields for the Note


    ```

    #import <UIKit/UIKit.h>


    @class Note;


    @interface SNDetailViewController : UIViewController


    @property (strong, nonatomic) Note *note;

    @property (weak, nonatomic) IBOutlet UITextField *noteTitle;

    @property (weak, nonatomic) IBOutlet UITextView *noteBody;


    @end

    ```


    Update `DetailViewController.m` to use the `note` instance and the `noteTitle`
    and `noteBody` controls instead of `detailItem` and `detailDescriptionLabel`.
    Also, in `viewWillDisappear:`, update `note`’s `body` and `title` and save the
    managed object context. [Listing 7-35](#9781430260288_Ch07.xhtml#list35) shows
    the updated implementation file for Objective-C. [Listing 7-36](#9781430260288_Ch07.xhtml#list36)
    shows the updated `DetailViewController.swift` that implements the corresponding
    changes.


    [***Listing 7-35***](#9781430260288_Ch07.xhtml#_list35). `DetailViewController.m`
    with the Fields for the Note


    ```

    #import "DetailViewController.h"

    #import "Note.h"


    @implementation DetailViewController


    #pragma mark - Managing the note


    - (void)setNote:(Note *)note {

      if (_note != note) {

        _note = note;

        [self configureView];

      }

    }


    - (void)configureView {

      if (self.note) {

        self.noteTitle.text = self.note.title;

        self.noteBody.text = self.note.body;

      } else {

        self.noteTitle.text = @"";

        self.noteBody.text = @"";

      }

    }


    - (void)viewDidLoad {

      [super viewDidLoad];

      [self configureView];

    }


    - (void)viewWillDisappear:(BOOL)animated {

      self.note.title = self.noteTitle.text;

      self.note.body = self.noteBody.text;


    NSError *error;

      if (![[self.note managedObjectContext] save:&error]) {

        NSLog(@"Error saving note %@ -- %@ %@", self.noteTitle.text, error, [error
    userInfo]);

      }

    }


    @end

    ```


