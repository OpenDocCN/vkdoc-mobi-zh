    ## 在 BookStore 中处理验证错误


    在本节中，你将实现一个针对 `BookStore` 应用程序的验证错误处理例程。该例程是通用的，因为它不知道哪些属性具有验证规则，但它也是特定的，因为它不处理所有验证错误——只处理你确定在模型中设置的那些。但在执行此操作之前，你需要为
    `BookStore` 的数据模型添加一些验证规则。为 `Book` 实体的 `price` 属性添加最小值为 15 的限制，如图 4-4 所示。


