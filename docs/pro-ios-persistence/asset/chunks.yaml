    for Swift)`. You actually have four other values to choose from for this parameter
    for string comparison comparators only. Each option has an equivalent code you
    can use in the query language by appending the code between square brackets right
    after the operator. [Table 3-4](#9781430260288_Ch03.xhtml#Tab4) lists the available
    options, codes, and how to use them in the query language. Again, the Objective-C
    options begin with `NS`, and the Swift ones do not.


    [Table 3-4](#9781430260288_Ch03.xhtml#_Tab4). The String Comparison Options


    ![Table3-4.jpg](images/Table3-4.jpg)


    You can specify multiple options using bitwise OR flags, or put multiple codes
    together if using the query language. To compare both case insensitively and diacritic
    insensitively, for example, you would pass for the options parameter.


    ```

