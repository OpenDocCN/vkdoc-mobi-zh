    \ {\n  let searchText = self.searchController?.searchBar.text\n  if let searchText\
    \ = searchText {\n    self.searchPredicate = searchText.isEmpty ? nil : NSPredicate(format:\
    \ \"name contains[c] %@ or url contains[c] %@\", searchText, searchText)\n\nself.tableView.reloadData()\n\
    \  }\n}\n```\n\n## Displaying the Search Results\n\nSince we use the same table\
