    Function with a Predicate


    ```

    func showExampleData() {

      let fetchRequest = NSFetchRequest(entityName: "Book")

      fetchRequest.predicate = NSPredicate(format: "title=''The first book''")


    let books = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    nil)

      for book in books as [Book] {

        println(String(format: "Title: \(book.title), price: %.2f",  book.price))

      }

    }

    ```


    Run this and this time, the output finds only one book as expected.


    ```

    BookStore[85253:c07] Title: The first book, price: 10.00

    ```


    In its simplest form, a predicate executes a test on an object. If the test succeeds,
    then the object is part of the result set. If the test is negative, then the object
    isn’t included in the result set. The preceding example, `title = ''The first
    book''` is an example of a simple predicate. The key path `title` and the constant
    string value `''The first book''` are called expressions. The operator `''=''`
    is called a comparator.


    `NSPredicate` objects are made by compositing `NSExpression` instances. The example
    could have been written as shown in [Listing 2-21](#9781430260288_Ch02.xhtml#list21)
    (Objective-C) and [Listing 2-22](#9781430260288_Ch02.xhtml#list22) (Swift).


    [***Listing 2-21***](#9781430260288_Ch02.xhtml#_list21). An Objective-C Predicate
    Using the `NSPredicate` Object Graph


    ```

    - (void)showExampleData {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Book"];


    NSExpression *exprTitle = [NSExpression expressionForKeyPath:@"title"];

      NSExpression *exprValue = [NSExpression expressionForConstantValue:@"The first
    book"];

      NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:exprTitle
    rightExpression:exprValue modifier:NSDirectPredicateModifier type:NSEqualToPredicateOperatorType
    options:0];

      fetchRequest.predicate = predicate;


    NSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];

      for (Book *book in books) {

        NSLog(@"Title: %@, price: %.2f", book.title, book.price);

      }

    }

    ```


    [***Listing 2-22***](#9781430260288_Ch02.xhtml#_list22). A Swift Predicate Using
    the `NSPredicate` Object Graph


    ```

    func showExampleData() {

      let fetchRequest = NSFetchRequest(entityName: "Book")


    let exprTitle = NSExpression(forKeyPath: "title")

      let exprValue = NSExpression(forConstantValue: "The first book")

      let predicate = NSComparisonPredicate(leftExpression: exprTitle, rightExpression:
    exprValue, modifier: .DirectPredicateModifier, type: .EqualToPredicateOperatorType,
    options: nil)

      fetchRequest.predicate = predicate


    let books = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:
    nil)

      for book in books as [Book] {

        println(String(format: "Title: \(book.title), price: %.2f",  book.price))

      }

    }

    ```


    Running the application again will reveal the same result as before, as expected.


