    Let’s examine the `runWithContext:` method. It does the same thing twice: fetches
    all the selfies and all the social networks. The first time, the cache is explicitly
    cleared, as it is before each test, by calling `[context reset]` or `context.reset()`
    in the `runTest:` handler in `ViewController`. The second time, the objects will
    be in the cache, and therefore the data will come back much faster. The `loadDataWithContext:`
    method does the actual fetches. You explicitly get the `name` property of the
    selfies and social networks in order to force Core Data to load the attributes
    for the objects, firing a fault if necessary.


    Add an instance of `Cache` to the `tests` array in `ViewController.m` or `ViewController.swift`,
    and also an import for `Cache.h` if using Objective-C. Build the application and
    run the `Cache` test. On our iPhone 5s, the test takes about 0.6 seconds without
    a cache, and about 0.09 seconds with the cache, which is about an 85% improvement.
    The lesson, then, is to be judicious about expiring your cache by calling `reset`
    on your managed object context, as its caching can improve performance significantly.
    The next section discusses cache expiration strategies.


