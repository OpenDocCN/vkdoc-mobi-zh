    \      //println(\"未解析的错误 \\(error), \\(error.userInfo)\")\n      abort()\n  }\n\
    }\n```\n\n请注意，插入新对象会导致调用 `NSFetchedResultsControllerDelegate` 协议中的 `controllerWillChangeContent:`\
    \ 方法。回想一下，`fetchedResultsController` 的委托是 `MasterViewController` 实例，它实现了该方法以通知其表格视图即将开始更新，如\
    \ 列表 5-13 (Objective-C) 和 列表 5-14 (Swift) 所示。\n\n***列表 5-13***. `controllerWillChangeContent:`\
    \ 方法 (Objective-C)\n\n```\n- (void)controllerWillChangeContent:(NSFetchedResultsController\
