    ## Querying Relationships


    The next output we add to the displayed statistics about our word list is the
    number of words that start with each letter. The query language used in predicates
    for fetch requests supports traversing the relationships defined in your data
    model. You do this by referencing the relationship by name in your predicate,
    and by using dot notation to access the properties of the entity referred to by
    the relationship. For example, for the `Word` entity, `wordCategory.firstLetter`
    refers to the `wordCategory` relationship in `Word`, which refers to the `WordCategory`
    entity, and to the `firstLetter` attribute in the `WordCategory` entity.


    We can use the `wordCategory` relationship defined in the `Word` entity to fetch
    words by the category they belong to. To do this, we iterate through the alphabet
    and fetch the count of the words whose `wordCategory` has the `firstLetter` set
    to the current letter. We create a method, `wordCountForCategory:`, that takes
    a letter and fetches the count for that letter. That code looks like [Listing
    3-20](#9781430260288_Ch03.xhtml#list20) (Objective-C) or [Listing 3-21](#9781430260288_Ch03.xhtml#list21)
    (Swift).


    **[Listing 3-20](#9781430260288_Ch03.xhtml#_list20).** `wordCountForCategory:`
    in `Persistence.m`


    ```

    - (NSString *)wordCountForCategory:(NSString *)firstLetter {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Word"];

      fetchRequest.predicate = [NSPredicate predicateWithFormat:@"wordCategory.firstLetter
    = %@", firstLetter];

      NSUInteger count = [self.managedObjectContext countForFetchRequest:fetchRequest
    error:nil];

      return [NSString stringWithFormat:@"Words beginning with %@: %lu\n", firstLetter,
    count];

    }

    ```


