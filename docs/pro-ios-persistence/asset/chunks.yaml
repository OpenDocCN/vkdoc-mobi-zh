    \nThe fetched results controller has a property, `fetchedObjects`, that contains\
    \ all the results. We can use that, along with our knowledge of predicates, to\
    \ filter the fetched objects to just those that match the search query. For CoreDump,\
    \ when users search, we want to display only the projects whose names or URLs\
    \ contain the search text, case-insensitive. We create a new method on `MasterViewController`\
    \ called `updateSearchResultsForSearchController:` to fulfill our promise to conform\
    \ to the `UISearchResultsUpdating` protocol. This method, which is called when\
    \ the search bar gains focus or the search text changes, creates the predicate\
    \ that performs the filtering. It first grabs the search text, which is contained\
    \ in `self.searchController.searchBar.text`, and if it finds any text, it creates\
    \ an appropriate predicate and stores it in `searchPredicate`. Then, it reloads\
    \ the table. [Listing 5-77](#9781430260288_Ch05.xhtml#list77) (Objective-C) and\
    \ [Listing 5-78](#9781430260288_Ch05.xhtml#list78) (Swift) show the `updateSearchResultsForSearchController:`\
    \ method.\n\n### Listing 5-77. Creating the Search Predicate in `MasterViewController.m`\n\
    \n```\n- (void)updateSearchResultsForSearchController:(UISearchController *)searchController\
    \ {\n  NSString *searchText = self.searchController.searchBar.text;\n  self.searchPredicate\
    \ = searchText.length == 0 ? nil : [NSPredicate predicateWithFormat:@\"name contains[c]\
    \ %@ or url contains[c] %@\", searchText, searchText];\n\n[self.tableView reloadData];\n\
    }\n```\n\n### Listing 5-78. Creating the Search Predicate in `MasterViewController.swift`\n\
