    This method introduces a performance optimization—rather than fetching all the
    objects for an entity, we fetch only the object identifiers for the matching objects.
    We do this by setting the `resultType` property of the fetch request to `NSManagedObjectIDResultType`.
    After fetching all the object identifiers into an array, we iterate through them
    and tell the managed object context to delete the object for the identifier. When
    we’re done, we save the context.


    The `loadWordList:` method uses the method you just created to delete all `WordCategory`
    and `Word` instances. It then creates 26 `WordCategory` instances —one each for
    letters “a” through  “z.” It then parses the word list and adds the words to our
    Core Data object graph, setting the text, length, and category for each and logging
    a message after every 100 words it adds so we can track the progress in Xcode’s
    console. Finally, it saves the managed object context. [Listing 3-12](#9781430260288_Ch03.xhtml#list12)
    shows the Objective-C `loadWordList:` method, and [Listing 3-13](#9781430260288_Ch03.xhtml#list13)
    shows the Swift `loadWordList` function.


    [***Listing 3-12***](#9781430260288_Ch03.xhtml#_list12). `loadWordList:` in `Persistence.m`


    ```

    - (void)loadWordList:(NSString *)wordList {

      // Delete all the existing words and categories

      [self deleteAllObjectsForEntityWithName:@"Word"];

      [self deleteAllObjectsForEntityWithName:@"WordCategory"];


    // Create the categories

      NSMutableDictionary *wordCategories = [NSMutableDictionary dictionaryWithCapacity:26];

      for (char c = ''a''; c <= ''z''; c++) {

        NSString *firstLetter = [NSString stringWithFormat:@"%c", c];

        NSManagedObject *wordCategory = [NSEntityDescription insertNewObjectForEntityForName:@"WordCategory"
    inManagedObjectContext:self.managedObjectContext];

        [wordCategory setValue:firstLetter forKey:@"firstLetter"];

        [wordCategories setValue:wordCategory forKey:firstLetter];

        NSLog(@"Added category ''%@''", firstLetter);

      }


    // Add the words from the list

      NSUInteger wordsAdded = 0;

      NSArray *newWords = [wordList componentsSeparatedByCharactersInSet:[NSCharacterSet
    whitespaceAndNewlineCharacterSet]];

      for (NSString *word in newWords) {

        if (word.length > 0) {

          NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:@"Word"
    inManagedObjectContext:self.managedObjectContext];

          [object setValue:word forKey:@"text"];

          [object setValue:[NSNumber numberWithInteger:word.length] forKey:@"length"];

          [object setValue:[wordCategories valueForKey:[word substringToIndex:1]]
    forKey:@"wordCategory"];

          ++wordsAdded;

          if (wordsAdded % 100 == 0)

            NSLog(@"Added %lu words", wordsAdded);

        }

      }

      NSLog(@"Added %lu words", wordsAdded);

      [self saveContext];

      NSLog(@"Context saved");

    }

    ```


    [***Listing 3-13***](#9781430260288_Ch03.xhtml#_list13). `loadWordList` in `Persistence.swift`


    ```

    func loadWordList(wordList: String) {

        // Delete all the existing words and categories

        deleteAllObjectsForEntityWithName("Word")

        deleteAllObjectsForEntityWithName("WordCategory")


    // Create the categories

        var wordCategories = NSMutableDictionary(capacity: 26)

        for c in "abcdefghijklmnopqrstuvwxyz" {

            let firstLetter = "\(c)"

            var wordCategory: AnyObject! = NSEntityDescription.insertNewObjectForEntityForName("WordCategory",
    inManagedObjectContext: self.managedObjectContext!)

            wordCategory.setValue(firstLetter, forKey: "firstLetter")

            wordCategories.setValue(wordCategory, forKey: firstLetter)

            println("Added category ''\(firstLetter)''")

        }


    // Add the words from the list

        var wordsAdded = 0

        let newWords = wordList.componentsSeparatedByCharactersInSet(NSCharacterSet.whitespaceAndNewlineCharacterSet())

        for word in newWords {

            if countElements(word) > 0 {

                var object: AnyObject! = NSEntityDescription.insertNewObjectForEntityForName("Word",
    inManagedObjectContext: self.managedObjectContext!)

                object.setValue(word, forKey: "text")

                object.setValue(countElements(word), forKey: "length")

                object.setValue(wordCategories.valueForKey((word as NSString).substringToIndex(1)),
    forKey: "wordCategory")

                wordsAdded++

                if wordsAdded % 100 == 0 {

                    println("Added \(wordsAdded) words")

                    saveContext()

                    println("Context saved")

                }

            }

        }

        saveContext()

        println("Context saved")

    }

    ```


    You might notice something curious about the way this code handles the word categories
    it creates. Instead of just storing the word categories in Core Data and fetching
