    You should not use this function in a shipping application, although it may be
    useful during development.

                NSLog("Unresolved error \(error), \(error!.userInfo)")

                abort()

            }


    return coordinator

            }()


    lazy var managedObjectContext: NSManagedObjectContext? = {

            // Returns the managed object context for the application (which is already
    bound to the persistent store coordinator for the application.) This property
    is optional since there are legitimate error conditions that could cause the creation
