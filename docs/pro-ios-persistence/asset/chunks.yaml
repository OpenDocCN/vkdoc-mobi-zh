    Title: \\(book.title), price: %.2f\", book.price))\n  }\n}\n```\n\n## Using the\
    \ Seed Store\n\nThe first thing the app does when it starts, before executing\
    \ any Core Data operations, is call the `initStore` method. This is exactly what\
    \ we want because it'll allow us to place our seed before Core Data initializes.\n\
    \nLet's add the `seed.sqlite` file to the project. From your `Desktop` folder\
    \ drag the `seed.sqlite` file onto the Xcode project navigator. Typically, you\
    \ want to add the file to the `Supporting Files` group to keep your project organized.\n\
    \nWhen you drop the file into the `Supporting Files` group, Xcode gives you some\
    \ options. Make sure you check `Copy items into destination group's folder`. In\
    \ the `Add to targets` section, make sure `BookStore` is checked as well.\n\n\
    Your folder should look something like [Figure 4-1](#9781430260288_Ch04.xhtml#Fig1)\
    \ (Objective-C) or [Figure 4-2](#9781430260288_Ch04.xhtml#Fig2) (Swift).\n\n![9781430260288_Fig04-01.jpg](images/9781430260288_Fig04-01.jpg)\n\
    \n[Figure 4-1](#9781430260288_Ch04.xhtml#_Fig1). Adding the `seed.sqlite` file\
    \ to BookStore (Objective-C)\n\n![9781430260288_Fig04-02.jpg](images/9781430260288_Fig04-02.jpg)\n\
    \n[Figure 4-2](#9781430260288_Ch04.xhtml#_Fig2). Adding the `seed.sqlite` file\
    \ to BookStore (Swift)\n\nNow we're ready to create the initial seed. Change the\
    \ implementation of the `initStore` method as shown in [Listing 4-3](#9781430260288_Ch04.xhtml#list3)\
    \ (Objective-C) or [Listing 4-4](#9781430260288_Ch04.xhtml#list4) (Swift).\n\n\
    [***Listing 4-3***](#9781430260288_Ch04.xhtml#_list3). Initial Seeding in Objective-C\n\
    \n```\n- (void)initStore {\n  NSFileManager *fm = [NSFileManager defaultManager];\n\
    \nNSString *seed = [[NSBundle mainBundle] pathForResource: @\"seed\" ofType: @\"\
    sqlite\"];\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    BookStoreEnhanced.sqlite\"];\n  if (![fm fileExistsAtPath:[storeURL path]]) {\n\
    \    NSLog(@\"Using the original seed\");\n    NSError *error = nil;\n    if (![fm\
    \ copyItemAtPath:seed toPath:[storeURL path] error:&error]) {\n      NSLog(@\"\
    Error seeding: %@\", error);\n      return;\n    }\n\nNSLog(@\"Store successfully\
    \ initialized using the original seed\");\n  }\n  else {\n    NSLog(@\"The original\
    \ seed isn't needed. There is already a backing store.\");\n  }\n}\n```\n\n[***Listing\
    \ 4-4***](#9781430260288_Ch04.xhtml#_list4). Initial Seeding in Swift\n\n```\n\
    func initStore() {\n  let fm = NSFileManager.defaultManager()\n\nlet seed = NSBundle.mainBundle().pathForResource(\"\
    seed\", ofType: \"sqlite\")\n  if let seed = seed {\n      let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
    BookStoreEnhancedSwift.sqlite\")\n\nif !fm.fileExistsAtPath(storeURL.path!) {\n\
    \          println(\"Using the original seed\")\n          var error: NSError?\
    \ = nil\n          if !fm.copyItemAtPath(seed, toPath: storeURL.path!, error:\
    \ &error) {\n              println(\"Seeding error: \\(error?.localizedDescription)\"\
    )\n              return\n          }\n          println(\"Store successfully initialized\
    \ using the original seed.\")\n      }\n      else {\n          println(\"The\
    \ seed isn't needed. There is already a backing store.\")\n      }\n  }\n  else\
    \ {\n      println(\"Could not find the seed.\")\n  }\n}\n```\n\nNow you can launch\
    \ the app. You'll notice that even though we've removed all the hard-coded initialization\
    \ code, your app will have data from the seed.\n\nThe output should look something\
    \ like the following:\n\n```\nUsing the original seed\nStore successfully initialized\
    \ using the original seed\nBook fetched: The second book\nTitle: The second book,\
    \ price: 15.00\nBook fetched: The third book\nTitle: The third book, price: 10.00\n\
    Book fetched: The first book\nTitle: The first book, price: 10.00\n```\n\nIf you\
    \ quit and launch it again, you should get the following:\n\n```\nThe original\
    \ seed isn't needed. There is already a backing store.\nBook fetched: The second\
    \ book\nTitle: The second book, price: 15.00\nBook fetched: The third book\nTitle:\
    \ The third book, price: 10.00\nBook fetched: The first book\nTitle: The first\
    \ book, price: 10.00\n```\n\nWe are now at the point were we can create an original\
    \ seed for your app and it populates the seed in a flash, even if you have hundreds\
    \ of thousands of rows, because it does it by copying the whole file at once instead\
    \ of manually inserting each row individually.\n\nIf your seed data never change,\
    \ you're done! If on the other hand you want to update the seed in the future,\
    \ keep on reading.\n\n## Updating Seeded Data in Subsequent Releases\n\nLet's\
    \ assume we want to update our seed data with a fourth book. Whether users have\
    \ been using your app for a while or they are getting introduced to the app directly\
    \ from the latest version, they all need to be able to get that fourth book.\n\
    \nThere are two parts to keeping everything in working order. First, you need\
    \ to update your `seed.sqlite` so that it contains all the seed data. Second,\
    \ you need to make sure existing users get the additional data.\n\n### Updating\
    \ the Seed Data Store\n\nLet's start with updating the seed. This is the easy\
    \ part. In order to achieve this, all we have to do is add the new book, with\
    \ code, into the current data store, and then use that as the new seed.\n\nOpen\
    \ `AppDelegate.m` or `AppDelegate.swift` and at the end of the `initStore` method,\
    \ after all the seeding work, add the code in [Listing 4-5](#9781430260288_Ch04.xhtml#list5)\
    \ (Objective-C) or [Listing 4-6](#9781430260288_Ch04.xhtml#list6) (Swift) to add\
    \ the fourth book to one of the categories.\n\n[***Listing 4-5***](#9781430260288_Ch04.xhtml#_list5).\
    \ Adding a Fourth Book to the Seed (Objective-C)\n\n```\n- (void)initStore {\n\
    \  ...\n\nNSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
    BookCategory\"];\n  NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest\
    \ error:nil];\n  Category *category = [categories lastObject];\n  Book *book4\
    \ = [NSEntityDescription insertNewObjectForEntityForName:@\"Book\" inManagedObjectContext:self.managedObjectContext];\n\
    \  book4.title = @\"The fourth book\";\n  book4.price = 12;\n\n[category addBooks:[NSSet\
    \ setWithObjects:book4, nil]];\n\n[self saveContext];\n}\n```\n\n[***Listing 4-6***](#9781430260288_Ch04.xhtml#_list6).\
    \ Adding a Fourth Book to the Seed (Swift)\n\n```\nfunc initStore() {\n  ...\n\
    \nlet fetchRequest = NSFetchRequest(entityName: \"BookCategory\")\n  let categories\
    \ = self.managedObjectContext?.executeFetchRequest(fetchRequest, error: nil)\n\
    \nlet category = categories?.last as BookCategory\n  var book4 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Book\", inManagedObjectContext: self.managedObjectContext!) as Book\n  book4.title\
    \ = \"The fourth book\"\n  book4.price = 12\n```"
