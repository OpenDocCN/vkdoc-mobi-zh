    to the iCloud Account (Swift)


    ```

    func storeWillChange(notification: NSNotification) {

        print("will change: \(notification.userInfo?.description)")

        if let moc = self.managedObjectContext {

            moc.performBlockAndWait({ () -> Void in

                var error: NSError? = nil

                if moc.hasChanges {

                    moc.save(&error)

                }

                moc.reset()

            })

        }

    }


    func storeDidChange(notification: NSNotification) {

        print("did change: \(notification.userInfo?.description)")

        // At this point it''s official, the change has happened. Tell your

        // user interface to refresh itself

        dispatch_async(dispatch_get_main_queue()) {

            NSFetchedResultsController.deleteCacheWithName("Master")

            // Refresh UI here

        }

    }

    ```


    It’s often better to prepare the UI for the change as early as possible to reduce
    the time it takes to actually apply the refresh. For this reason, the notifications
    are broken down into two phases you are probably already familiar with (change
    will happen and change did happen).


    In our `storeWillChange:` implementation, we save the managed object context (if
    it has changes) and then reset its state, which discards all its managed objects.
    This is the point at which you’d prepare your UI to change.


    In our `storeDidChange:` implementation, we asynchronously update the UI.


    Your code is now ready to deal with iCloud integration. Before you can submit
    your application to Apple, you will need to add the iCloud entitlement to your
    app. You do this from within Xcode by selecting the project and going to the Capabilities
    tab. In that tab, you see a section for iCloud with a switch beside it. Turn on
    that switch, as shown in [Figure 8-2](#9781430260288_Ch08.xhtml#Fig2), to add
    the iCloud entitlement to your app.


    ![9781430260288_Fig08-02.jpg](images/9781430260288_Fig08-02.jpg)


    [Figure 8-2](#9781430260288_Ch08.xhtml#_Fig2). Adding the iCloud entitlement


    ## Integrating with Dropbox Datastore API


    With iOS, a lot of attention is often given to integrating with iCloud for persistence.
    Other solutions, however, might make sense for you depending on your app and your
    target audience. Dropbox has released its Datastore application programming interface
    (API), which allows you to use its cloud service as a ubiquitous data store. One
    of the obvious advantages of using Dropbox, rather than iCloud, is that Dropbox
    has APIs for multiple platforms. The Dropbox Datastore API doesn’t function like
    Core Data. It is not meant to act as a relational database where you create links
    between resources. Instead, it is a simple key/value pair store much like NoSQL
    databases such as MongoDB or Cassandra. One essential particularity is that is
    allows you to work without a schema, and therefore you need not worry so much
    about schema updates and migrations.


    ### Setting Up the API Access


    For iOS, the setup instructions are located at `www.dropbox.com/developers/datastore/sdks/ios`.
    The first step in setting up Dropbox with your app is to create a Dropbox app
    on the Dropbox web site. Log in to your Dropbox account and go to `www.dropbox.com/developers/apps`
    to create a new app. Select **Dropbox API app** and **Datastores only**, and choose
    a name for your app. For the name, be sure to not infringe on the Dropbox branding
