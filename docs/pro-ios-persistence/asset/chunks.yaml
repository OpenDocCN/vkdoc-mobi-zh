    \ `myValue` 的属性，类型为 `Integer 16`。你的数据模型应与图 9-12 一致。\n\n![9781430260288_Fig09-12.jpg](img/9781430260288_Fig09-12.jpg)\n\
    \n图 9-12. MultiThread 数据模型\n\n为清晰起见，我们创建一个包含 Core Data 设置的类。创建一个名为 `Persistence`\
    \ 的新类（作为 `NSObject` 的子类），并将 `Persistence.h` 修改为如代码清单 9-51 所示。\n\n***代码清单 9-51***.\
