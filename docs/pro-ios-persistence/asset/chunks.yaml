    and hold the BookStore icon and delete the app. Then launch it again. It should
    re-seed with our old seed and show only three books.


    ```

    Using the original seed

    Store successfully initialized using the original seed

    Book fetched: The second book

    Title: The second book, price: 15.00

    Book fetched: The third book

    Title: The third book, price: 10.00

    Book fetched: The first book

    Title: The first book, price: 10.00

    ```


    Now let’s put the new seed in place. In Xcode, right-click on the `seed.sqlite`
    file and select “Show in Finder.” Using Finder, simply drag and drop the new seed
    we just made in the Desktop folder onto the old seed. Finder will ask you how
    you want to manage the file conflict. Just pick “Replace.” That’s it: the new
    seed is in place.


    At this point, people who download your app for the first time will get the fourth
    book. Those who would get it as an update would not see the new book since the
    seed would not be used. We have to take care of these users.


    Updating Existing Users


    There are several options for updating data from the seed. The one you should
    choose depends largely on the requirements of your app. For example, sometimes
    it is possible to just dump the data store and replace it with the seed. This
    is the case if the user does not store anything in that store.


    If you must update the store while preserving the users’ data, you should consider
    manually updating it so that updates are incremental.


    Let’s edit the `initStore` method once again to support incremental updates. We
    want to pick up the new records we want to add (in this case, there’s only one—the
    fourth book) and if they’re not already there, then apply all the updates that
    were released at the same time. Then repeat that block for each new version of
    the app that you create. [Listing 4-7](#9781430260288_Ch04.xhtml#list7) (Objective-C)
    and [Listing 4-8](#9781430260288_Ch04.xhtml#list8) (Swift) shows the `initStore`
    method that manages incremental updates.


    [***Listing 4-7***](#9781430260288_Ch04.xhtml#_list7). Initial Seeding and Incremental
    Updates (Objective-C)


    ```

    - (void)initStore {

      NSFileManager *fm = [NSFileManager defaultManager];


    NSString *seed = [[NSBundle mainBundle] pathForResource: @"seed" ofType: @"sqlite"];

      NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"BookStoreEnhanced.sqlite"];

      if(![fm fileExistsAtPath:[storeURL path]]) {

        NSLog(@"Using the original seed");

        NSError * error = nil;

        if (![fm copyItemAtPath:seed toPath:[storeURL path] error:&error]) {

          NSLog(@"Error seeding: %@",error);

          return;

        }


    NSLog(@"Store successfully initialized using the original seed");

      }

      else {

        NSLog(@"The original seed isn''t needed. There is already a backing store.");


    // Update 1

        {

          NSFetchRequest *request = [NSFetchRequest fetchRequestWithEntityName:@"Book"];

          request.predicate = [NSPredicate predicateWithFormat:@"title=%@", @"The
    fourth book"];

          NSUInteger count = [self.managedObjectContext countForFetchRequest:request
    error:nil];

          if(count == 0) {

            NSLog(@"Applying batch update 1");


    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"BookCategory"];

            NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];


    BookCategory *category = [categories lastObject];

            Book *book4 = [NSEntityDescription insertNewObjectForEntityForName:@"Book"
    inManagedObjectContext:self.managedObjectContext];

            book4.title = @"The fourth book";

            book4.price = 12;


    [category addBooks:[NSSet setWithObjects:book4, nil]];


    [self.managedObjectContext save:nil];


    NSLog(@"Update 1 successfully applied");

          }

        }  }

    }

    ```


