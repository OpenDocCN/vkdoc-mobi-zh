    4.  然后，将 Dropbox SDK 所需的其他框架添加到你的项目中：`CFNetwork.framework`、`Security.framework`、`SystemConfiguration.framework`、`QuartzCore.framework`、`libc++.dylib`
    和 `libz.dylib`。


