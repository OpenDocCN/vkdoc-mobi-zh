    ![9781430260288_Fig07-03.jpg](images/9781430260288_Fig07-03.jpg)


    [Figure 7-3](#9781430260288_Ch07.xhtml#_Fig3). Setting the table view cell to
    Subtitle


    Now, update the `configureCell:atIndexPath:` method in `MasterViewController.m`
    or `MasterViewController.swift` to show the title of the note in the main text
    label, with the timestamp in the detail text label, as shown in [Listing 7-25](#9781430260288_Ch07.xhtml#list25)
    (Objective-C) and [Listing 7-26](#9781430260288_Ch07.xhtml#list26) (Swift).


    [***Listing 7-25***](#9781430260288_Ch07.xhtml#_list25). Showing the Note Title
