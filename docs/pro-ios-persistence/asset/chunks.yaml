- fmt: "You can see, however, that you’re trading simplicity for efficiency. This\
    \ code reads in all the words, then calculates the average of the lengths. We\
    \ can instead use `NSExpression` and another class, `NSExpressionDescription`,\
    \ to fetch only the average using Core Data. To begin, we use another Objective-C\
    \ static initializer that `NSExpression` offers: `+expressionForFunction:arguments:`,\
    \ which takes a predefined function name and an array of `NSExpression` objects.\
    \ The Swift counterpart is similar: a function in the format `init(forFunction\
    \ name: String!, arguments parameters: [AnyObject]!)` that also takes a predefined\
    \ function name and an array of `NSExpression` objects.\n\nThe predefined function\
    \ names are similar to, but don’t quite match, the aggregator function names.\
    \ The Apple-provided documentation lists them all, but we highlight only the few\
    \ shown in [Table 3-7](#9781430260288_Ch03.xhtml#Tab7).\n\n[Table 3-7](#9781430260288_Ch03.xhtml#_Tab7).\
    \ Some of the Predefined Functions for `+expressionForFunction:arguments:`\n\n\
    | Function Name | Description |\n| --- | --- |\n| `average:` | Returns an average\
    \ of the values in the array |\n| `sum:` | Returns the sum of the values in the\
    \ array |\n| `count:` | Returns the count of the values in the array |\n| `min:`\
    \ | Returns the minimum value in the array |\n| `max:` | Returns the maximum value\
    \ in the array |\n\nSince we want the average word length, we use the `average:`\
    \ predefined function and we pass an `NSExpression` that represents the length\
    \ property of the words. [Listing 3-44](#9781430260288_Ch03.xhtml#list44) shows\
    \ the Objective-C code and [Listing 3-45](#9781430260288_Ch03.xhtml#list45) shows\
    \ the Swift code to create this expression.\n\n[***Listing 3-44***](#9781430260288_Ch03.xhtml#_list44).\
    \ Create an `NSExpression` using `+expressionForFunction:arguments:`\n\n```\n\
    NSExpression *length = [NSExpression expressionForKeyPath:@\"length\"];\nNSExpression\
    \ *average = [NSExpression expressionForFunction:@\"average:\" arguments:@[length]];\n\
    ```\n\n[***Listing 3-45***](#9781430260288_Ch03.xhtml#_list45). Create an `NSExpression`\
    \ using `init(forFunction name: String!, arguments parameters: [AnyObject]!)`\n\
    \n```\nlet length = NSExpression(forKeyPath: \"length\")\nlet average = NSExpression(forFunction:\
    \ \"average:\", arguments: [length])\n```\n\nNext, we set up an `NSExpressionDescription`\
    \ instance to describe what we want to fetch from our Core Data store. An `NSExpressionDescription`\
    \ represents a property on a Core Data entity that doesn’t actually appear in\
    \ the Core Data model, which is perfect for an expression that fetches the average\
    \ (since it doesn’t actually exist in our model). As a property, an `NSExpressionDescription`\
    \ has a name and a type, as well as an expression. [Listing 3-46](#9781430260288_Ch03.xhtml#list46)\
    \ (Objective-C) and [Listing 3-47](#9781430260288_Ch03.xhtml#list47) (Swift) show\
    \ how to create the `NSExpressionDescription` for fetching the word length average.\n\
    \n[***Listing 3-46***](#9781430260288_Ch03.xhtml#_list46). Creating an `NSExpressionDescription`\
    \ for the Word Length Average (Objective-C)\n\n```\nNSExpressionDescription *averageDescription\
    \ = [[NSExpressionDescription alloc] init];\naverageDescription.name = @\"average\"\
    ;\naverageDescription.expression = average;\naverageDescription.expressionResultType\
    \ = NSFloatAttributeType;\n```\n\n[***Listing 3-47***](#9781430260288_Ch03.xhtml#_list47).\
    \ Creating an `NSExpressionDescription` for the Word Length Average (Swift)\n\n\
    ```\nvar averageDescription = NSExpressionDescription()\naverageDescription.name\
    \ = \"average\"\naverageDescription.expression = average\naverageDescription.expressionResultType\
    \ = .FloatAttributeType\n```\n\nTo finish, we create a fetch request, and then\
    \ set its `propertiesToFetch` property to an array containing the `NSExpressionDescription`\
    \ we just created. We also set the fetch request’s `resultType` property to a\
    \ dictionary, so we can reference the `NSExpressionDescription` we created by\
    \ the name we set: `\"average\"`. We execute the fetch request and extract the\
    \ average value from the result dictionary. [Listing 3-48](#9781430260288_Ch03.xhtml#list48)\
    \ (Objective-C) and [Listing 3-49](#9781430260288_Ch03.xhtml#list49) (Swift) show\
    \ the complete `averageWordLengthFromExpressionDescription` method. Call it from\
    \ your `statistics` method and run to see that, however you get the average, you\
    \ get 9.09 characters.\n\n[***Listing 3-48***](#9781430260288_Ch03.xhtml#_list48).\
    \ Getting the Average Word Length Using an Expression Description (Objective-C)\n\
    \n```\n- (NSString *)averageWordLengthFromExpressionDescription {\n  NSExpression\
    \ *length = [NSExpression expressionForKeyPath:@\"length\"];\n  NSExpression *average\
    \ = [NSExpression expressionForFunction:@\"average:\" arguments:@[length]];\n\n\
    \  NSExpressionDescription *averageDescription = [[NSExpressionDescription alloc]\
    \ init];\n  averageDescription.name = @\"average\";\n  averageDescription.expression\
    \ = average;\n  averageDescription.expressionResultType = NSFloatAttributeType;\n\
    \n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
    Word\"];\n  fetchRequest.propertiesToFetch = @[averageDescription];\n  fetchRequest.resultType\
    \ = NSDictionaryResultType;\n  NSArray *results = [self.managedObjectContext executeFetchRequest:fetchRequest\
    \ error:nil];\n  return [NSString stringWithFormat:@\"Average from expression\
    \ description: %.2f\\n\",\n         [[results[0] valueForKey:@\"average\"] floatValue]];\n\
    }\n```\n\n[***Listing 3-49***](#9781430260288_Ch03.xhtml#_list49). Getting the\
    \ Average Word Length Using an Expression Description (Swift)\n\n```\nfunc averageWordLengthFromExpressionDescription()\
    \ -> String {\n    let length = NSExpression(forKeyPath: \"length\")\n    let\
    \ average = NSExpression(forFunction: \"average:\", arguments: [length])\n\n \
    \   var averageDescription = NSExpressionDescription()\n    averageDescription.name\
    \ = \"average\"\n    averageDescription.expression = average\n    averageDescription.expressionResultType\
    \ = .FloatAttributeType\n\n    var fetchRequest = NSFetchRequest(entityName: \"\
    Word\")\n    fetchRequest.propertiesToFetch = [averageDescription]\n    fetchRequest.resultType\
    \ = .DictionaryResultType\n\n    var error: NSError? = nil\n    let results =\
    \ self.managedObjectContext!.executeFetchRequest(fetchRequest, error: &error)\n\
    \n    var formattedAverage = \"0\"\n    if let results = results {\n        if\
    \ let avg = (words as NSArray).valueForKeyPath(\"@avg.length\") as? Float {\n\
    \            let format = \".2\"\n            formattedAverage = avg.format(format)\n\
    \        }\n    }\n    return \"Average from collection: \\(formattedAverage)\\\
    n\"\n}\n```\n\n## Using a Function as an Rvalue\n\nYou can also use a function\
    \ in the right side of your predicate. Suppose, for example, we wanted to get\
    \ the text of the longest word from the word list. We can’t simply use the `@max(length)`\
    \ aggregator, because that returns the length of the longest word, not the longest\
    \ word itself. Instead, we want to return the word object whose length equals\
    \ the maximum length value, so the predicate tests the length against the `max:`\
    \ function as follows:\n\n```\nlength = max:(length)\n```\n\n[Listing 3-50](#9781430260288_Ch03.xhtml#list50)\
    \ (Objective-C) and [Listing 3-51](#9781430260288_Ch03.xhtml#list51) (Swift) show\
    \ the `longestWords` method (after all, you could have more than one word with\
    \ the same length) that uses this predicate. Using SQL Logging, you can see that\
    \ the SQL that Core Data uses has an inner `SELECT` statement, as you’d expect.\
    \ The inner `SELECT` statement gets the maximum length of a word, and the outer\
    \ `SELECT` statement gets all the words with that length."
