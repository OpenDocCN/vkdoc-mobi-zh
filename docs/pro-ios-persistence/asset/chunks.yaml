  trans: "\n正如 Xcode 生成的注释所证实，访问器会检查 `managedObjectContext` 属性（合成实例变量为 `_managedObjectContext`）是否已创建。如果已创建，访问器会将其返回。如果尚未创建，则会获取\
    \ `persistentStoreCoordinator` 属性，分配并初始化托管对象上下文，并将其持久化存储协调器设置为获取到的 `persistentStoreCoordinator`。\n\
    \n`persistentStoreCoordinator` 的访问器，如代码清单 1-5（Objective-C）和代码清单 1-6（Swift）所示，执行了它自己的惰性初始化。请注意，我们移除了关于错误处理的长注释，这些内容将在第\
    \ 4 章中介绍。如你所见，这段代码会检查 `persistentStoreCoordinator` 属性（合成实例变量为 `_persistentStoreCoordinator`）是否已创建。如果尚未创建，它会通过将文件名\
    \ `CoreDataApp.sqlite (或 CoreDataAppSwift.sqlite)` 附加到本章前面讨论的 `applicationDocumentsDirectory`\
    \ 辅助方法返回的目录上，来确定持久化存储的 URL（统一资源定位符），并将其存储在 `storeURL` 中。然后，它分配 `persistentStoreCoordinator`\
    \ 属性，使用 `managedObjectModel` 访问器返回的托管对象模型对其进行初始化，并添加一个指向 `storeURL` 中创建的 URL 的持久化存储。\n\
    \n***代码清单 1-5*** `persistentStoreCoordinator` 的 Objective-C 访问器\n\n```\n// 返回应用的持久化存储协调器。\n\
    // 如果协调器尚不存在，则创建它并向其添加应用的存储。\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n  if (_persistentStoreCoordinator != nil) {\n    return _persistentStoreCoordinator;\n\
    \  }\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    CoreDataApp.sqlite\"];\n\nNSError *error = nil;\n  _persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \  if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n    /* 注释已删除 */\n\
    \    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n\
    \  }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n***代码清单 1-6*** `persistentStoreCoordinator`\
    \ 的 Swift 访问器\n\n```\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\
    \ = {\n    // 应用的持久化存储协调器。此实现创建并返回一个协调器，并且已经为其添加了应用的存储。此属性是可选的，因为存在一些可能导致创建存储失败的合理错误情况。\n\
    \    // 创建协调器和存储\n    var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:\
    \ self.managedObjectModel)\n    let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
    CoreDataAppSwift.sqlite\")\n    var error: NSError? = nil\n    var failureReason\
    \ = \"There was an error creating or loading the application's saved data.\"\n\
    \    if coordinator!.addPersistentStoreWithType(NSSQLiteStoreType, configuration:\
    \ nil, URL: url, options: nil, error: &error) == nil {\n        coordinator =\
    \ nil\n        // 报告我们得到的任何错误。\n        let dict = NSMutableDictionary()\n   \
    \     dict[NSLocalizedDescriptionKey] = \"Failed to initialize the application's\
    \ saved data\"\n        dict[NSLocalizedFailureReasonErrorKey] = failureReason\n\
    \        dict[NSUnderlyingErrorKey] = error\n        error = NSError(domain: \"\
    YOUR_ERROR_DOMAIN\", code: 9999, userInfo: dict)\n        // 将此替换为适当处理错误的代码。\n\
    \        // abort() 会导致应用生成崩溃日志并终止。在生产应用中不应使用此函数，但在开发过程中可能有用。\n        NSLog(\"\
    Unresolved error \\(error), \\(error!.userInfo)\")\n        abort()\n    }\n\n\
    return coordinator\n}()\n```\n\n我们还需要查看最后一段惰性初始化代码，它位于 `managedObjectModel` 的访问器中，如代码清单\
    \ 1-7（Objective-C）和代码清单 1-8（Swift）所示。与其他访问器类似，如果 `managedObjectModel` 属性（合成实例变量为\
    \ `_managedObjectModel`）已初始化，这段代码会将其返回。否则，代码通过将编译后的托管对象模型的 URL（`CoreDataApp.momd`（`CoreDataAppSwift.momd`））存储在\
    \ `modelURL` 变量中，分配 `managedObjectModel` 属性，并用托管对象模型的 URL 对其进行初始化来执行初始化。\n\n***代码清单\
    \ 1-7*** `managedObjectModel` 的 Objective-C 访问器\n\n```\n// 返回应用的托管对象模型。\n// 如果模型尚不存在，则从应用的模型创建它。\n\
    - (NSManagedObjectModel *)managedObjectModel\n{\n  if (_managedObjectModel !=\
    \ nil) {\n    return _managedObjectModel;\n  }\n  NSURL *modelURL = [[NSBundle\
    \ mainBundle] URLForResource:@\"CoreDataApp\" withExtension:@\"momd\"];\n  _managedObjectModel\
    \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n  return _managedObjectModel;\n\
    }\n```\n\n***代码清单 1-8*** `managedObjectModel` 的 Swift 访问器\n\n```\nlazy var managedObjectModel:\
    \ NSManagedObjectModel = {\n    // 应用的托管对象模型。此属性不是可选的。如果应用无法找到并加载其模型，将发生严重错误。\n\
    \    let modelURL = NSBundle.mainBundle().URLForResource(\"CoreDataAppSwift\"\
    , withExtension: \"momd\")!\n    return NSManagedObjectModel(contentsOfURL: modelURL)!\n\
    }()\n```\n\n惰性初始化方法工作正常，并确保 Core Data 栈的所有组件在需要时都会被初始化。你可以继续在基于 Core Data 的应用中使用此方法。我们将在本章中构建的第二个应用\
    \ `PersistenceApp` 采用了不同的方法：它将所有 Core Data 交互封装在单个类 `Persistence` 中，直接对 Core Data\
    \ 栈进行初始化。在您的 Core Data 应用中，可以随意使用任何一种方法。\n\n## 创建托管对象模型\n"
- fmt: "Xcode has created an empty object model for us, `CoreDataApp.xcdatamodeld`\
    \ (or `CoreDataAppSwift.xcdatamodeld`), which you can see by selecting it in the\
    \ Xcode Project Navigator (see [Figure 1-3](#9781430260288_Ch01.xhtml#Fig3)).\n\
    \n![9781430260288_Fig01-03.jpg](images/9781430260288_Fig01-03.jpg)\n\n[Figure\
    \ 1-3](#9781430260288_Ch01.xhtml#_Fig3). An empty object model\n\nFor the CoreDataApp\
    \ application, we want to create a single entity called `Person` that has a single\
    \ attribute called `name`. Note the convention of capitalizing the entity name\
    \ and lowercasing the attribute name; this naming approach is optional but conforms\
    \ well to standard coding practices. We use it throughout the book.\n\nTo create\
    \ this entity, click the Add Entity button at the bottom of the Xcode window.\
    \ This will create an entity called `Entity`. Rename it `Person`. Then, click\
    \ the + button under Attributes and create an attribute called `name` and change\
    \ its type from `Undefined` to `String`. Your object model should now match [Figure\
    \ 1-4](#9781430260288_Ch01.xhtml#Fig4).\n\n![9781430260288_Fig01-04.jpg](images/9781430260288_Fig01-04.jpg)\n\
    \n[Figure 1-4](#9781430260288_Ch01.xhtml#_Fig4). The object model with the `Person`\
    \ entity\n\nXcode will compile and load this object model into the `managedObjectModel`\
    \ property.\n\n## Adding Some Objects\n\nBefore running the CoreDataApp application,\
    \ open `AppDelegate.m`, add code to the `application:didFinishLaunchingWithOptions:`\
    \ method to initialize the Core Data stack by accessing the `managedObjectContext`\
    \ property, create some managed objects, and save the managed object context.\
    \ [Listing 1-9](#9781430260288_Ch01.xhtml#list9) shows the updated method.\n\n\
    [***Listing 1-9***](#9781430260288_Ch01.xhtml#_list9). The Updated `application:didFinishLaunchingWithOptions:`\
    \ Method\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n  NSManagedObject *object1 = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Person\" inManagedObjectContext:self.managedObjectContext];\n  [object1 setValue:@\"\
    Tarzan\" forKey:@\"name\"];\n\n  NSManagedObject *object2 = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Person\" inManagedObjectContext:self.managedObjectContext];\n\
    \  [object2 setValue:@\"Jane\" forKey:@\"name\"];\n\n  [self saveContext];\n\n\
    \  return YES;\n}\n```\n\nIf you’re working with Swift, open `AppDelegate.swift`\
    \ instead, and update as shown in [Listing 1-10](#9781430260288_Ch01.xhtml#list10).\n\
    \n[***Listing 1-10***](#9781430260288_Ch01.xhtml#_list10). The updated `application:didFinishLaunchingWithOptions:`\
    \ function\n\n```\nfunc application(application: UIApplication!, didFinishLaunchingWithOptions\
    \ launchOptions: NSDictionary!) -> Bool {\n  let object1 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Person\", inManagedObjectContext: self.managedObjectContext!) as NSManagedObject\n\
    \  object1.setValue(\"Tarzan\", forKey: \"name\")\n\n  let object2 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Person\", inManagedObjectContext: self.managedObjectContext!) as NSManagedObject\n\
    \  object2.setValue(\"Jane\", forKey: \"name\")\n\n  saveContext()\n\n  return\
    \ true\n}\n```\n\nThis code creates two new `Person` managed objects, `object1`\
    \ and `object2`, and sets their `name` attributes to “Tarzan” and “Jane,” respectively.\
    \ Note that managed objects use Cocoa’s standard KVC to set values for attributes.\
    \ You can also create custom classes for your entities with direct accessors for\
    \ attributes, so that you can write code as follows:\n\n```\nobject1.name = @\"\
    Tarzan\";\n```\n\n[Chapter 2](#9781430260288_Ch02.xhtml) discusses custom classes.\n\
    \nWe create the managed objects by inserting them into a managed object context:\
    \ our `managedObjectContext` property. By accessing that property, we start the\
    \ chain that initializes our entire Core Data stack.\n\nAfter creating the two\
    \ managed objects, this code saves the managed object context using the `saveContext`\
    \ helper, before throwing a blank window onto the screen. Build and run the application\
    \ to create the managed objects in the persistent store and see the blank window.\
    \ Then stop the application.\n\n## Viewing the Data\n\nThe CoreDataApp application\
    \ doesn’t have any code to display the contents of its persistent store. How,\
    \ then, can we verify that the application actually created and stored data? For\
    \ that, we examine the SQLite database file, `CoreDataApp.sqlite` or `CoreDataAppSwift.sqlite`,\
    \ directly. When you run the application in the iOS Simulator, the application\
    \ writes this file to a directory below your home directory. The easiest way to\
    \ find this file is to open a terminal and type\n\n```\nfind ~ -name 'CoreDataApp.sqlite'\n\
    ```\n\nOnce you locate the file, change to that directory and open the file using\
    \ the sqlite3 application.\n\n```\nsqlite3 CoreDataApp.sqlite\n```\n\nAlternatively,\
    \ you can open the file directly using the `find` command:\n\n```\nfind ~ -name\
    \ 'CoreDataApp.sqlite' -exec sqlite3 {} \\;\n```\n\nLet’s first examine the database\
    \ schema by typing the `.schema` command at the `sqlite>` prompt.\n\n```\nsqlite>\
    \ .schema\nCREATE TABLE ZPERSON ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT\
    \ INTEGER, ZNAME VARCHAR);\nCREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY\
    \ KEY, Z_UUID VARCHAR(255), Z_PLIST BLOB);\nCREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER\
    \ PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER INTEGER, Z_MAX INTEGER);\n```\n\nYou see\
    \ three tables, two of which (`Z_METADATA` and `Z_PRIMARYKEY`) Core Data uses\
    \ for database management tasks. The third, `ZPERSON`, stores `Person` entities.\
    \ You can see it has a column called `ZNAME`, of type `VARCHAR`, for storing the\
    \ `name` attribute. Note that this schema, including tables, table names, and\
    \ column names, among others, are undocumented implementation details subject\
    \ to change. You can’t rely on these patterns and should never access SQLite databases\
    \ directly in any of your Core Data–based applications. For testing purposes,\
    \ however, like what we’re doing here, you’re safe to mess around.\n\nLet’s verify\
    \ that the CoreDataApp application created and stored the two `Person` managed\
    \ objects:\n\n```\nsqlite> select * from zperson;\n1|1|1|Tarzan\n2|1|1|Jane\n\
    sqlite> .quit\n```\n\nYou can confirm that, indeed, the CoreDataApp application\
    \ has successfully used the Core Data framework to create and store data.\n\n\
    ## Adding Core Data to an Existing Project\n\nNow that you understand how Core\
    \ Data works, you can see how easy it is to add to an existing project. Just follow\
    \ the same steps that Xcode does when you check the Use Core Data check box.\n\
    \n- Import the Core Data header file (`CoreData/CoreData.h`) or add `@import CoreData`\
    \ for Objective-C, or add `import CoreData` for Swift.\n- Add a managed object\
    \ model to your application.\n- Add code to your application to initialize the\
    \ Core Data stack and grant access to the managed object context.\n\nYou can mimic\
    \ Xcode’s generated code for initializing the Core Data stack or follow a different\
    \ pattern. We use both approaches throughout this book. However you approach the\
    \ problem, the basic steps are the same.\n\n## Creating a Core Data-less Application\n\
    \nTo add Core Data to an existing application, we must first have a Core Data-less\
    \ application to add to. Create a new Xcode project using the single view application\
    \ template and call it `PersistenceApp`. Be sure to uncheck the Use Core Data\
    \ check box (see [Figure 1-5](#9781430260288_Ch01.xhtml#Fig5)).\n\n![9781430260288_Fig01-05.jpg](images/9781430260288_Fig01-05.jpg)\n\
    \n[Figure 1-5](#9781430260288_Ch01.xhtml#_Fig5). Creating the `PersistenceApp`\
    \ project\n\n## Adding the Core Data Framework"
  raw: 'Xcode has created an empty object model for us, `CoreDataApp.xcdatamodeld`
    (or `CoreDataAppSwift.xcdatamodeld`), which you can see by selecting it in the
    Xcode Project Navigator (see [Figure 1-3](#9781430260288_Ch01.xhtml#Fig3)).


    ![9781430260288_Fig01-03.jpg](images/9781430260288_Fig01-03.jpg)


    [Figure 1-3](#9781430260288_Ch01.xhtml#_Fig3). An empty object model


    For the CoreDataApp application, we want to create a single entity called `Person`
    that has a single attribute called `name`. Note the convention of capitalizing
    the entity name and lowercasing the attribute name; this naming approach is optional
    but conforms well to standard coding practices. We use it throughout the book.


    To create this entity, click the Add Entity button at the bottom of the Xcode
    window. This will create an entity called `Entity`. Rename it `Person`. Then,
    click the + button under Attributes and create an attribute called `name` and
    change its type from `Undefined` to `String`. Your object model should now match
    [Figure 1-4](#9781430260288_Ch01.xhtml#Fig4).


    ![9781430260288_Fig01-04.jpg](images/9781430260288_Fig01-04.jpg)


    [Figure 1-4](#9781430260288_Ch01.xhtml#_Fig4). The object model with the `Person`
    entity


    Xcode will compile and load this object model into the `managedObjectModel` property.


    Adding Some Objects


    Before running the CoreDataApp application, open `AppDelegate.m`, add code to
    the `application`:`didFinishLaunchingWithOptions:` method to initialize the Core
    Data stack by accessing the `managedObjectContext` property, create some managed
    objects, and save the managed object context. [Listing 1-9](#9781430260288_Ch01.xhtml#list9)
    shows the updated method.


    [***Listing 1-9***](#9781430260288_Ch01.xhtml#_list9). The Updated `application:didFinishLaunchingWithOptions:`
    Method


    ```

    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions {

      NSManagedObject *object1 = [NSEntityDescription insertNewObjectForEntityForName:@"Person"
    inManagedObjectContext:self.managedObjectContext];

      [object1 setValue:@"Tarzan" forKey:@"name"];


    NSManagedObject *object2 = [NSEntityDescription insertNewObjectForEntityForName:@"Person"
    inManagedObjectContext:self.managedObjectContext];

      [object2 setValue:@"Jane" forKey:@"name"];


    [self saveContext];


    return YES;

    }

    ```


    If you’re working with Swift, open `AppDelegate.swift` instead, and update as
    shown in [Listing 1-10](#9781430260288_Ch01.xhtml#list10).


    [***Listing 1-10***](#9781430260288_Ch01.xhtml#_list10). The updated `application:didFinishLaunchingWithOptions:`
    function


    ```

    func application(application: UIApplication!, didFinishLaunchingWithOptions launchOptions:
    NSDictionary!) -> Bool {

      let object1 = NSEntityDescription.insertNewObjectForEntityForName("Person",
    inManagedObjectContext: self.managedObjectContext!) as NSManagedObject

      object1.setValue("Tarzan", forKey: "name")


    let object2 = NSEntityDescription.insertNewObjectForEntityForName("Person", inManagedObjectContext:
    self.managedObjectContext!) as NSManagedObject

      object2.setValue("Jane", forKey: "name")


    saveContext()


    return true

    }

    ```


    This code creates two new `Person` managed objects, `object1` and `object2`, and
    sets their `name` attributes to “Tarzan” and “Jane,” respectively. Note that managed
    objects use Cocoa’s standard KVC to set values for attributes. You can also create
    custom classes for your entities with direct accessors for attributes, so that
    you can write code as follows:


    ```

    object1.name = @"Tarzan";

    ```


    [Chapter 2](#9781430260288_Ch02.xhtml) discusses custom classes.


    We create the managed objects by inserting them into a managed object context:
    our `managedObjectContext` property. By accessing that property, we start the
    chain that initializes our entire Core Data stack.


    After creating the two managed objects, this code saves the managed object context
    using the `saveContext` helper, before throwing a blank window onto the screen.
    Build and run the application to create the managed objects in the persistent
    store and see the blank window. Then stop the application.


    Viewing the Data


    The CoreDataApp application doesn’t have any code to display the contents of its
    persistent store. How, then, can we verify that the application actually created
    and stored data? For that, we examine the SQLite database file, `CoreDataApp.sqlite
    or CoreDataAppSwift.sqlite`, directly. When you run the application in the iOS
    Simulator, the application writes this file to a directory below your home directory.
    The easiest way to find this file is to open a terminal and type


    ```

    find ~ -name ''CoreDataApp.sqlite''

    ```


    Once you locate the file, change to that directory and open the file using the
    sqlite3 application.


    ```

    sqlite3 CoreDataApp.sqlite

    ```


    Alternatively, you can open the file directly using the `find` command:


    ```

    find ~ -name ''CoreDataApp.sqlite'' -exec sqlite3 {} \;

    ```


    Let’s first examine the database schema by typing the `.schema` command at the
    `sqlite>` prompt.


    ```

    sqlite> .schema

    CREATE TABLE ZPERSON ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,
    ZNAME VARCHAR);

    CREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST
    BLOB);

    CREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER
    INTEGER, Z_MAX INTEGER);

    ```


    You see three tables, two of which (`Z_METADATA` and `Z_PRIMARYKEY`) Core Data
    uses for database management tasks. The third, `ZPERSON`, stores `Person` entities.
    You can see it has a column called `ZNAME`, of type `VARCHAR`, for storing the
    `name` attribute. Note that this schema, including tables, table names, and column
    names, among others, are undocumented implementation details subject to change.
    You can’t rely on these patterns and should never access SQLite databases directly
    in any of your Core Data–based applications. For testing purposes, however, like
    what we’re doing here, you’re safe to mess around.


    Let’s verify that the CoreDataApp application created and stored the two `Person`
    managed objects:


    ```

    sqlite> select * from zperson;

    1|1|1|Tarzan

    2|1|1|Jane

    sqlite> .quit

    ```


    You can confirm that, indeed, the CoreDataApp application has successfully used
    the Core Data framework to create and store data.


    Adding Core Data to an Existing Project


    Now that you understand how Core Data works, you can see how easy it is to add
    to an existing project. Just follow the same steps that Xcode does when you check
    the Use Core Data check box.


    *   Import the Core Data header file (`CoreData/CoreData.h`) or add `@import CoreData`
    for Objective-C, or add `import CoreData` for Swift.

    *   Add a managed object model to your application.

    *   Add code to your application to initialize the Core Data stack and grant access
    to the managed object context.


    You can mimic Xcode’s generated code for initializing the Core Data stack or follow
    a different pattern. We use both approaches throughout this book. However you
    approach the problem, the basic steps are the same.


    Creating a Core Data-less Application


    To add Core Data to an existing application, we must first have a Core Data-less
    application to add to. Create a new Xcode project using the single view application
    template and call it PersistenceApp. Be sure to uncheck the Use Core Data check
    box (see [Figure 1-5](#9781430260288_Ch01.xhtml#Fig5)).


    ![9781430260288_Fig01-05.jpg](images/9781430260288_Fig01-05.jpg)


    [Figure 1-5](#9781430260288_Ch01.xhtml#_Fig5). Creating the PersistenceApp project


