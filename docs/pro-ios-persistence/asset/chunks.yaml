    The `SELF` keyword relates to the destination (i.e., Book). The `$FETCHED_SOURCE`
    keyword refers to the `BookCategory` object. So the preceding code reads something
    like “this book belongs to the list if its price is less than $12 and its category
    is the calling category.”


    Then in the code, rewrite the `showExampleData` method as shown in [Listing 2-23](#9781430260288_Ch02.xhtml#list23)
    (Objective-C) or [Listing 2-24](#9781430260288_Ch02.xhtml#list24) (Swift) to illustrate
    how to use the fetched property.


    [***Listing 2-23***](#9781430260288_Ch02.xhtml#_list23). Using a Fetched Property
    in Objective-C


    ```

    - (void)showExampleData {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"BookCategory"];

      NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      for (BookCategory *category in categories) {

        // Retrieve the bargain books for the current category

        NSArray *bargainBooks = [category valueForKey:@"bargainBooks"];


    // Now simply display them

        NSLog(@"Bargains for category: %@", category.name);

        for (Book *book in bargainBooks) {

          NSLog(@"Title: %@, price: %.2f", book.title, book.price);

        }

      }

    }

    ```


    [***Listing 2-24***](#9781430260288_Ch02.xhtml#_list24). Using a Fetched Property
    in Swift


    ```

    func showExampleData() {

      let fetchRequest = NSFetchRequest(entityName: "BookCategory")

      let categories = self.managedObjectContext?.executeFetchRequest(fetchRequest,
    error: nil)

      for category in categories as [BookCategory] {

        println("Bargains for category: \(category.name)")

        let bargainBooks = category.valueForKey("bargainBooks") as [Book!]

        for book in bargainBooks {

          println(String(format: "Title: \(book.title), price: %.2f",  book.price))

        }

      }

    }

    ```


    We first fetch the categories. Then, for each category, we get the bargain books
    and display their titles.


    Despite the convenience of defining fetched properties in our model, however,
    you’ll notice that the predicate editor is a bit anemic. Also, fetched properties
    aren’t dynamic; if you later add books, for example, that meet the criteria for
    bargain books, they aren’t present in the `bargainBooks` fetched properties until
    you reset the context. You may find that you never actually use fetched properties
    in your applications.


    ## Notifications


    When trying to keep a user interface synchronized with the data it represents,
    you will often find it useful to be notified when data change. Core Data comes
    with mechanisms for handling notifications on data changes.


    ### Notification upon Creation


    Sometimes you need to be notified each time an instance of a specific type of
    managed object is created. You may have requirements, for example, to create derived
    data that aren’t present in the store (cache files, perhaps, or simply for auditing
    reasons). Pretend we want to get a log entry every time a new book is created.
    We can use Core Data’s notifications, which call our custom Core Data class’s
    `awakeFromInsert` method each time a new object is created. In your implementation,
    you should call `super`’s implementation, and then perform your work. Open `Book.m`
    or `Book.swift` and override the `awakeFromInsert` method as shown in [Listing
    2-25](#9781430260288_Ch02.xhtml#list25) (Objective-C) and [Listing 2-26](#9781430260288_Ch02.xhtml#list26)
    (Swift).


    [***Listing 2-25***](#9781430260288_Ch02.xhtml#_list25). Core Data Notifications
    Through the `awakeFromInsert` Method (Objective-C)


    ```

    - (void)awakeFromInsert {

      [super awakeFromInsert];

      NSLog(@"New book created");

    }

    ```


    [***Listing 2-26***](#9781430260288_Ch02.xhtml#_list26). Core Data Notifications
    Through the `awakeFromInsert` Function (Swift)


    ```

    override func awakeFromInsert() {

      super.awakeFromInsert()

      println("New book created")

    }

    ```


    Since our application reloads the persistent store every time it launches, you
    will get three new book creation notifications each time you run it.


    ```

    BookStore[85678:c07] New book created

    BookStore[85678:c07] New book created

    BookStore[85678:c07] New book created

    ```


    ### Notification upon Fetch


    Similarly, in some cases you want to be notified when an object is retrieved from
    the persistent store. For example, if your objects contain vectors to draw an
    image, upon fetching the object, you may want to render a thumbnail image. For
    storage reasons, you might decide that it’s redundant to persist the actual thumbnail
    and therefore you have to compute it when the object is fetched. To receive this
    notification, you override the `awakeFromFetch` method. As with `awakeFromInsert`,
    you should call the `super` implementation first. Still in `Book.m` or `Book.swift`,
    override the `awakeFromFetch` method as shown in [Listing 2-27](#9781430260288_Ch02.xhtml#list27)
    (Objective-C) and [Listing 2-28](#9781430260288_Ch02.xhtml#list28) (Swift).


    [***Listing 2-27***](#9781430260288_Ch02.xhtml#_list27). Core Data Notifications
    Through the `awakeFromFetch` Method (Objective-C)


    ```

    - (void)awakeFromFetch {

      [super awakeFromFetch];

      NSLog(@"Book fetched: %@", self.title);

    }

    ```


    [***Listing 2-28***](#9781430260288_Ch02.xhtml#_list28). Core Data Notifications
    Through the `awakeFromFetch` Method (Swift)


    ```

    override func awakeFromFetch() {

      super.awakeFromFetch()

      println("Book fetched: \(self.title)")

    }

    ```


    When you run this, you get the following output:


    ```

    BookStore[85678:c07] Book fetched: The first book

    BookStore[85678:c07] Book fetched: The second book

    BookStore[85678:c07] Book fetched: The third book

    BookStore[85678:c07] New book created

    BookStore[85678:c07] New book created

    BookStore[85678:c07] New book created

    ```


    You get the fetches first because of the cleanup in the `deleteAllObjects` method.
    First the books are read and deleted, then the three new books are added.


    You might notice something a little strange, however, in the application’s output.
    Even though you fetch the book with the title “The first book” in the `showExampleData`
    method, as evidenced in the log


    ```

    BookStore[85678:c07] Title: The first book, price: 10.00

    ```


    You don’t see another log message saying “Book fetched,” even though `showExampleData`
    clearly executes a fetch request. This means that your `awakeFromFetch` isn’t
    necessarily called every time you execute a fetch request that returns it—it’s
    called only when it’s re-initialized from the persistent store during a fetch.
    If the object has already been initialized from the persistent store, and is sitting
    in your managed object context, executing a fetch request won’t call `awakeFromFetch`.


    Though that may sound confusing, you can remember this behavior by focusing more
    on the “awake” part of the method name, rather than the “fetch” part. The object
    “awakes” when it is loaded into memory, so this method is called when a managed
    object is loaded into memory and that happened because of a fetch.


    In [Chapter 9](#9781430260288_Ch09.xhtml), we talk about a concept called “faulting.”
    Faulting comes into play when the `awakeFromFetch` method is called, so be sure
    to read that chapter for more information.


