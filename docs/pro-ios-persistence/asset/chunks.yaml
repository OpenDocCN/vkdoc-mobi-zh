    When you run your application on a device that has data protection enabled, the
    persistent store’s database file will be automatically encrypted when the device
    is locked. This method is cheap to implement, but understand that once the device
    is unlocked, the file is automatically decrypted so the database is as secure
    as the device. If someone can guess the passcode, the database will be accessible,
    especially if the device is jail broken (i.e., root access is available). Another
    inconvenience with this encryption method is that for very large databases, the
    time required to unlock and start your application might be rather large since
    a huge file will need to be decrypted before it can be used.


    Summary


    In this chapter we saw value transformers and how to use them to extend Core Data
    to be able to store any data type. If our data type supports the `NSCoding` protocol,
    as `UIColor` does, we saw that we don’t even need to provide a customer value
    transformer class. Even when our data type doesn’t support the `NSCoding` protocol,
    we see how simple adding a custom value transformer can be to allow us to simply
    read and write any data type into and out of a Core Data store.


    We also saw how to use the data protection built in to iOS by setting attributes
    on our Core Data store file.


    With this knowledge, we can protect our applications’ data from prying eyes, and
    perhaps even the NSA!


    Chapter    8


    Talking to Services: iCloud and Dropbox


    With iOS 5, Apple introduced iCloud sync for Core Data. iOS developers rejoiced
    at the prospect of a drop-in solution for synching data among iPhone apps, iPad
    apps, and Mac OS X apps. Then they started using iCloud to sync Core Data data
    stores . . . and tears replaced the joy. Sync, as it turns out, is a hard problem
    to solve, and Apple hasn’t nailed it yet—at least for Core Data. As Apple iterates
    through the sync technology, however, it will likely get Core Data sync over iCloud
    working correctly in a future release of the SDK. So that you can have the information,
    we present the information for using iCloud Core Data sync in this chapter.


    Other Core Data synching solutions have emerged, including libraries like ParcelKit
    (`https://github.com/overcommitted/ParcelKit`), Ensembles (`www.ensembles.io/`),
    and TICoreDataSync (`http://timisted.github.io/TICoreDataSync/`). We encourage
    you to investigate these solutions and refer to their respective documentation
    on their web sites, to see whether these are a better fit for you and your apps.
    We don’t replicate that documentation or cover all these libraries in this book.
    We do, however, explore the sync solution offered by Dropbox, as well as the aforementioned
    ParcelKit, which syncs Core Data over Dropbox.


    Integrating with iCloud


    While early versions of iCloud Core Data sync required some cerebral contortions
    to get anything to somewhat work, iOS 7 makes iCloud sync a lot simpler to manage.
    In this section, we build a simple app using one of Xcode’s templates and we use
    iCloud to sync data to the cloud. To get started, create a new project in Xcode
    using the Master-Detail Application template as shown in [Figure 8-1](#9781430260288_Ch08.xhtml#Fig1).


    ![9781430260288_Fig08-01.jpg](images/9781430260288_Fig08-01.jpg)


    [Figure 8-1](#9781430260288_Ch08.xhtml#_Fig1). Creating a master-detail application


    On the next screen, name your app **iCloudApp**, select iPhone for the device
    and be sure to check the Use Core Data checkbox. At this point, we have a very
    simple app that uses a local Core Data store. You can launch the app to try it
    out.


    **Tip**  If you haven’t already done so, now is a good time to enable iCloud in
    the iOS simulator. In the iOS simulator, launch the Settings app and select the
    iCloud option. Enter your credentials and sign in.


    Using iCloud’s Ubiquity Container


    In this subsection, we tell iOS that the data store file needs to be saved in
    iCloud, in what’s called a ubiquity container. Open `AppDelegate.m` or `AppDelegate.swift`
    and look at the `persistentStoreCoordinator` method shown in [Listing 8-1](#9781430260288_Ch08.xhtml#list1)
    (Objective-C) and [Listing 8-2](#9781430260288_Ch08.xhtml#list2) (Swift).


