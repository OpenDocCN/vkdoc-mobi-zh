  trans: "\nXcode 已为我们创建了一个空的对象模型 `CoreDataApp.xcdatamodeld`（或 `CoreDataAppSwift.xcdatamodeld`），在\
    \ Xcode 的项目导航器中选中该文件即可看到（参见图 1-3）。\n\n![9781430260288_Fig01-03.jpg](img/9781430260288_Fig01-03.jpg)\n\
    \n图 1-3. 空的对象模型\n\n对于 CoreDataApp 应用程序，我们需要创建一个名为 `Person` 的实体，该实体包含一个名为 `name`\
    \ 的属性。请注意约定：实体名称首字母大写，属性名称首字母小写；这种命名方式并非强制要求，但符合标准编码实践。本书将全程采用此命名方式。\n\n要创建该实体，请点击\
    \ Xcode 窗口底部的“添加实体（Add Entity）”按钮。这将创建一个名为 `Entity` 的实体，请将其重命名为 `Person`。然后，点击“属性（Attributes）”下方的\
    \ + 按钮，创建一个名为 `name` 的属性，并将其类型从 `Undefined` 更改为 `String`。此时，你的对象模型应如图 1-4 所示。\n\
    \n![9781430260288_Fig01-04.jpg](img/9781430260288_Fig01-04.jpg)\n\n图 1-4. 包含 `Person`\
    \ 实体的对象模型\n\nXcode 将编译此对象模型并将其加载到 `managedObjectModel` 属性中。\n\n## 添加一些对象\n\n在运行\
    \ CoreDataApp 应用程序之前，打开 `AppDelegate.m`，在 `application:didFinishLaunchingWithOptions:`\
    \ 方法中添加代码：通过访问 `managedObjectContext` 属性来初始化 Core Data 栈，创建一些托管对象，并保存托管对象上下文。代码清单\
    \ 1-9 展示了更新后的方法。\n\n***代码清单 1-9***. 更新后的 `application:didFinishLaunchingWithOptions:`\
    \ 方法\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions {\n  NSManagedObject *object1 = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Person\" inManagedObjectContext:self.managedObjectContext];\n  [object1 setValue:@\"\
    Tarzan\" forKey:@\"name\"];\n\n  NSManagedObject *object2 = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Person\" inManagedObjectContext:self.managedObjectContext];\n\
    \  [object2 setValue:@\"Jane\" forKey:@\"name\"];\n\n  [self saveContext];\n\n\
    \  return YES;\n}\n```\n\n如果你使用的是 Swift，请打开 `AppDelegate.swift` 并按照代码清单 1-10 进行更新。\n\
    \n***代码清单 1-10***. 更新后的 `application:didFinishLaunchingWithOptions:` 函数\n\n```\n\
    func application(application: UIApplication!, didFinishLaunchingWithOptions launchOptions:\
    \ NSDictionary!) -> Bool {\n  let object1 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Person\", inManagedObjectContext: self.managedObjectContext!) as NSManagedObject\n\
    \  object1.setValue(\"Tarzan\", forKey: \"name\")\n\n  let object2 = NSEntityDescription.insertNewObjectForEntityForName(\"\
    Person\", inManagedObjectContext: self.managedObjectContext!) as NSManagedObject\n\
    \  object2.setValue(\"Jane\", forKey: \"name\")\n\n  saveContext()\n\n  return\
    \ true\n}\n```\n\n这段代码创建了两个新的 `Person` 托管对象 `object1` 和 `object2`，并分别将其 `name`\
    \ 属性设置为“Tarzan”和“Jane”。请注意，托管对象使用 Cocoa 的标准 KVC 来设置属性值。你也可以为实体创建包含属性直接访问器的自定义类，从而编写如下代码：\n\
    \n```\nobject1.name = @\"Tarzan\";\n```\n\n第 2 章将讨论自定义类。\n\n我们通过将托管对象插入到托管对象上下文（即我们的\
    \ `managedObjectContext` 属性）中来创建它们。通过访问该属性，我们启动了一条初始化整个 Core Data 栈的链式操作。\n\n\
    创建完两个托管对象后，该代码在向屏幕呈现空白窗口之前，使用 `saveContext` 辅助方法保存了托管对象上下文。构建并运行应用程序，以在持久化存储中创建托管对象并查看空白窗口。然后停止应用程序。\n\
    \n## 查看数据\n\nCoreDataApp 应用程序没有任何用于显示其持久化存储内容的代码。那么，我们如何验证应用程序确实创建并存储了数据呢？为此，我们直接检查\
    \ SQLite 数据库文件 `CoreDataApp.sqlite` 或 `CoreDataAppSwift.sqlite`。当你通过 iOS 模拟器运行应用程序时，应用程序会将该文件写入主目录下的某个子目录中。查找该文件的最简单方法是打开终端并输入：\n\
    \n```\nfind ~ -name 'CoreDataApp.sqlite'\n```\n\n找到该文件后，切换到该目录并使用 sqlite3 应用程序打开该文件。\n\
    \n```\nsqlite3 CoreDataApp.sqlite\n```\n\n或者，你可以使用 `find` 命令直接打开该文件：\n\n```\n\
    find ~ -name 'CoreDataApp.sqlite' -exec sqlite3 {} \\;\n```\n\n首先，在 `sqlite>`\
    \ 提示符下输入 `.schema` 命令来检查数据库模式。\n\n```\nsqlite> .schema\nCREATE TABLE ZPERSON (\
    \ Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZNAME VARCHAR);\nCREATE\
    \ TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST\
    \ BLOB);\nCREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR,\
    \ Z_SUPER INTEGER, Z_MAX INTEGER);\n```\n\n你会看到三个表，其中 `Z_METADATA` 和 `Z_PRIMARYKEY`\
    \ 是 Core Data 用于数据库管理任务的。第三个表 `ZPERSON` 用于存储 `Person` 实体。你可以看到它有一个名为 `ZNAME` 的列，类型为\
    \ `VARCHAR`，用于存储 `name` 属性。请注意，此模式（包括表名、列名等）是未记录的实现细节，可能会发生变更。你不能依赖这些模式，也不应在任何基于\
    \ Core Data 的应用程序中直接访问 SQLite 数据库。不过，像我们现在所做的这样，仅用于测试目的时，你可以放心地尝试。\n\n让我们验证 CoreDataApp\
    \ 应用程序是否创建并存储了两个 `Person` 托管对象：\n\n```\nsqlite> select * from zperson;\n1|1|1|Tarzan\n\
    2|1|1|Jane\nsqlite> .quit\n```\n\n你可以确认，CoreDataApp 应用程序确实成功使用了 Core Data 框架来创建和存储数据。\n\
    \n## 将 Core Data 添加到现有项目\n\n既然你已经理解了 Core Data 的工作原理，你就会发现将其添加到现有项目是多么容易。只需按照\
    \ Xcode 在选中“使用 Core Data（Use Core Data）”复选框时所执行的相同步骤操作即可。\n\n- 导入 Core Data 头文件（`CoreData/CoreData.h`），在\
    \ Objective-C 中添加 `@import CoreData`，或在 Swift 中添加 `import CoreData`。\n- 向应用程序添加托管对象模型。\n\
    - 在应用程序中添加代码以初始化 Core Data 栈，并授予对托管对象上下文的访问权限。\n\n你可以模仿 Xcode 生成的用于初始化 Core Data\
    \ 栈的代码，也可以遵循其他模式。本书将同时使用这两种方法。无论采用何种方式，基本步骤都是相同的。\n\n## 创建一个不使用 Core Data 的应用程序\n\
    \n要将 Core Data 添加到现有应用程序中，我们首先必须有一个不含 Core Data 的应用程序作为目标。使用单视图应用程序模板创建一个新的 Xcode\
    \ 项目，并将其命名为 `PersistenceApp`。请务必取消选中“使用 Core Data（Use Core Data）”复选框（参见图 1-5）。\n\
    \n![9781430260288_Fig01-05.jpg](img/9781430260288_Fig01-05.jpg)\n\n图 1-5. 创建 `PersistenceApp`\
    \ 项目\n\n## 添加 Core Data 框架\n"
- fmt: "你的应用程序必须链接到 Core Data 框架（即`CoreData.framework`），才能使用 Core Data 类。过去，将 Core\
    \ Data 框架添加到项目中需要多次鼠标点击，但 Xcode 的最新更新引入了模块导入的概念。要链接 Core Data 框架，只需在需要访问 Objective-C\
    \ 项目中的 Core Data 类时添加`@import CoreData;`指令，或在 Swift 项目中添加`import CoreData`。Xcode\
    \ 将完成其余链接工作。\n\n### 添加托管对象模型\n\n基于 Core Data 的应用程序需要一个托管对象模型，因此使用 Core Data 的“数据模型”模板向`PersistenceApp`组添加一个新文件。是的，即使\
    \ Xcode 也将其称为数据模型，而非托管对象模型。你可以随意命名该模型；只需在创建持久化存储时匹配该名称即可。但按照惯例，将其命名为`PersistenceApp.xcdatamodeld`。完成后，你将拥有一个空的\
    \ Core Data 模型，名为`PersistenceApp.xcdatamodeld`，如图 1-6 所示。\n\n![9781430260288_Fig01-06.jpg](images/9781430260288_Fig01-06.jpg)\n\
    \n图 1-6\\. 空的`PersistenceApp.xcdatamodeld`托管对象模型\n\n我们稍后将向该模型添加实体和属性。目前，我们继续专注于添加应用程序中使用\
    \ Core Data 所需的一切。\n\n### 添加并初始化 Core Data 堆栈\n\n对于`PersistenceApp`应用程序，我们将把所有\
    \ Core Data 相关的内容放入一个单独的类`Persistence`中，并在`AppDelegate`类中添加该类的实例作为属性。这将使我们能够保持`AppDelegate`类的代码更简洁，并为\
    \ Core Data 访问提供清晰的接口。\n\n使用 Source 的 Cocoa Touch Class 模板在`PersistenceApp`组中创建一个新文件，将其命名为`Persistence`，并使其成为`NSObject`的子类。现在，如果你是用\
    \ Objective-C 实现，则需将 Core Data 属性和辅助方法声明添加到`Persistence.h`中，如代码清单 1-11 所示。\n\n\
    ***代码清单 1-11***\\. `Persistence.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    @import CoreData;\n\n@interface Persistence : NSObject\n\n@property (readonly,\
    \ strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property\
    \ (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
    \n在实现文件`Persistence.m`中，添加两个辅助方法的实现，它们与 Xcode 生成的版本没有太大差异，如代码清单 1-12 所示。\n\n***代码清单\
    \ 1-12***\\. `Persistence.m`中的辅助方法实现\n\n```\n- (void)saveContext {\n  NSError\
    \ *error;\n  if ([self.managedObjectContext hasChanges] && ![self.managedObjectContext\
    \ save:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \    abort();\n  }\n}\n\n- (NSURL *)applicationDocumentsDirectory {\n  return\
    \ [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask]\
    \ lastObject];\n}\n```\n\n注意，我们在保存前没有检查`managedObjectContext`属性是否为`nil`，因为我们将在`Persistence`实例初始化时创建它，所以我们知道它不会是`nil`。不过，我们目前仍保留了这种简单的错误处理方式。\n\
    \n要初始化 Core Data 堆栈，请添加`init`的实现，该实现创建托管对象模型、持久化存储协调器和托管对象上下文，如代码清单 1-13 所示。\n\
    \n***代码清单 1-13***\\. 在`Persistence.m`中初始化 Core Data 堆栈\n\n```\n- (id)init {\n\
    \  self = [super init];\n  if (self != nil) {\n    // Initialize the managed object\
    \ model\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"PersistenceApp\"\
