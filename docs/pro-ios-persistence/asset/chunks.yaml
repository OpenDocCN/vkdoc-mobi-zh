    ```

    - (NSString *)zWords {

      NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@"Word"];

      NSPredicate *predicate = [NSPredicate predicateWithFormat:@"text BEGINSWITH
    ''z''"];

      NSSortDescriptor *lengthSort = [NSSortDescriptor sortDescriptorWithKey:@"length"
    ascending:YES];

      NSSortDescriptor *alphaSort = [NSSortDescriptor sortDescriptorWithKey:@"text"
    ascending:NO];


    fetchRequest.predicate = predicate;

      fetchRequest.sortDescriptors = @[lengthSort, alphaSort];


    NSLog(@"Predicate: %@", predicate);

      NSArray *words = [self.managedObjectContext executeFetchRequest:fetchRequest
    error:nil];

      return [NSString stringWithFormat:@"Z words:\n%@\n",

              [[words valueForKey:@"text"] componentsJoinedByString:@"\n"]];

    }

    ```


