- fmt: "To start, generate `NSManagedObject` classes for all your Core Data entities.\
    \ Open `SocialNetwork.m` or `SocialNetwork.swift` and implement the methods `willTurnIntoFault`\
    \ and `didTurnIntoFault`. We won’t do anything special in these methods, but rather\
    \ we will simply log that they’ve been called, so that we can verify that they’re\
    \ being called appropriately. [Listing 9-21](#9781430260288_Ch09.xhtml#list21)\
    \ (Objective-C) and [Listing 9-22](#9781430260288_Ch09.xhtml#list22) (Swift) show\
    \ the implementations of these methods.\n\n[***Listing 9-21***](#9781430260288_Ch09.xhtml#_list21).\
    \ Handling Fault Status Changes in `SocialNetwork.m`\n\n```objc\n- (void)willTurnIntoFault\
    \ {\n  NSLog(@\"%@ named %@ will turn into fault\", [[self class] description],\
    \ self.name);\n}\n\n- (void)didTurnIntoFault {\n  NSLog(@\"%@ did turn into fault\"\
    , [[self class] description]);\n}\n```\n\n[***Listing 9-22***](#9781430260288_Ch09.xhtml#_list22).\
    \ Handling Fault Status Changes in `SocialNetwork.swift`\n\n```swift\noverride\
    \ func willTurnIntoFault() {\n    println(NSString(format: \"%@ named %@ will\
    \ turn into fault\", self, self.name))\n}\n\noverride func didTurnIntoFault()\
    \ {\n    println(NSString(format: \"%@ did turn into fault\", self))\n}\n```\n\
    \nNotice that we log the social network’s name in the `willTurnIntoFault` method.\
    \ In the `didTurnIntoFault` method, however, we don’t log the name. Why? Because\
    \ we don’t have the name to log. The object is a fault, remember? We don’t have\
    \ its attributes, including its name, in memory.\n\nNow, create a test called\
    \ `DidFault` that conforms to the `PerfTest` protocol, and then implement its\
    \ `runWithContext:` method to perform the seven steps outlined previously. [Listing\
    \ 9-23](#9781430260288_Ch09.xhtml#list23) shows `DidFault.h`, [Listing 9-24](#9781430260288_Ch09.xhtml#list24)\
    \ shows `DidFault.m`, and [Listing 9-25](#9781430260288_Ch09.xhtml#list25) shows\
    \ `DidFault.swift`.\n\n[***Listing 9-23***](#9781430260288_Ch09.xhtml#_list23).\
    \ `DidFault.h`\n\n```objc\n#import \"PerfTest.h\"\n\n@interface DidFault : NSObject\
    \ <PerfTest>\n\n@end\n```\n\n[***Listing 9-24***](#9781430260288_Ch09.xhtml#_list24).\
    \ `DidFault.m` with the Faulting Test Implemented\n\n```objc\n#import \"DidFault.h\"\
    \n#import \"Selfie.h\"\n#import \"SocialNetwork.h\"\n\n@implementation DidFault\n\
    \n-(NSString *)runTestWithContext:(NSManagedObjectContext *)context {\n  NSString\
    \ *result = nil;\n\n// 1) Fetch the first selfie\n  NSFetchRequest *fetchRequest\
    \ = [NSFetchRequest fetchRequestWithEntityName:@\"Selfie\"];\n  fetchRequest.predicate\
    \ = [NSPredicate predicateWithFormat:@\"name = %@\", @\"Selfie 1\"];\n  NSArray\
    \ *selfies = [context executeFetchRequest:fetchRequest error:nil];\n  if ([selfies\
    \ count] == 1) {\n    Selfie *selfie = selfies[0];\n\n// 2) Grab a social network\
    \ from the selfie\n    SocialNetwork *socialNetwork = [selfie.socialNetworks anyObject];\n\
    \    if (socialNetwork != nil) {\n      // 3) Check if it's a fault\n      result\
    \ = [NSString stringWithFormat:@\"Social Network %@ a fault\\n\",\n          \
    \      [socialNetwork isFault] ? @\"is\" : @\"is not\"];\n\n// 4) Get the name\n\
    \      result = [result stringByAppendingFormat:@\"Social Network is named '%@'\\\
    n\",\n                socialNetwork.name];\n\n// 5) Check if it's a fault\n  \
    \    result = [result stringByAppendingFormat:@\"Social Network %@ a fault\\n\"\
    ,\n                [socialNetwork isFault] ? @\"is\" : @\"is not\"];\n\n// 6)\
    \ Turn it back into a fault\n      [context refreshObject:socialNetwork mergeChanges:NO];\n\
    \      result = [result stringByAppendingFormat:@\"Turning Social Network into\
    \ a fault\\n\"];\n\n// 7) Check if it's a fault\n      result = [result stringByAppendingFormat:@\"\
    Social Network %@ a fault\\n\",\n                [socialNetwork isFault] ? @\"\
    is\" : @\"is not\"];\n    } else {\n      result = @\"Couldn't find social networks\
    \ for selfie\";\n    }\n  } else {\n    result = @\"Failed to fetch first selfie\"\
    ;\n  }\n  return result;\n}\n\n@end\n```\n\n[***Listing 9-25***](#9781430260288_Ch09.xhtml#_list25).\
    \ `DidFault.swift` with the Faulting Test Implemented\n\n```swift\nimport Foundation\n\
    import CoreData\n\nclass DidFault : PerfTest {\n    func runTestWithContext(context:\
    \ NSManagedObjectContext) -> String! {\n        var result : String?\n\n// 1)\
    \ Fetch the first selfie\n        let fetchRequest = NSFetchRequest(entityName:\
    \ \"Selfie\")\n        fetchRequest.predicate = NSPredicate(format: \"name = %@\"\
    , \"Selfie 1\")\n        let selfies = context.executeFetchRequest(fetchRequest,\
    \ error: nil)\n        if selfies?.count == 1 {\n            let selfie = selfies?[0]\
    \ as Selfie\n\n// 2) Grab a social network from the selfie\n            let socialNetwork\
    \ = selfie.socialNetworks.anyObject() as SocialNetwork?\n            if let socialNetwork\
    \ = socialNetwork {\n                // 3) Check if it's a fault\n           \
