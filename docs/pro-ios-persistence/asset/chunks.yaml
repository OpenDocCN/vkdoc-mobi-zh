    ```


    In the typical pattern, the code checks to see whether the `fetchedResultsController`
    property has been created and initialized. If it has, the code returns it. Otherwise,
    it creates the property and initializes it, doing the following:


    *   Sets the entity to retrieve to the `Event` entity.

    *   Adds a sort descriptor for the `timeStamp` attribute of `Event`.

    *   Creates the fetched results controller with the application’s Core Data managed
    object context, no section name key path, and the cache name “Master.”

    *   Sets the fetched result controller’s delegate to its parent `MasterViewController`
    instance.

    *   Fetches the results it’s configured to fetch.


    Displaying Data in the Table


    The data source and delegate for the table view owned by `MasterViewController`
    is the `MasterViewController` itself, which you can confirm by opening the storyboard,
    selecting the table view in the Master view, and clicking the Connections Inspector,
    as shown in [Figure 5-2](#9781430260288_Ch05.xhtml#Fig2).


    ![9781430260288_Fig05-02.jpg](images/9781430260288_Fig05-02.jpg)


    [Figure 5-2](#9781430260288_Ch05.xhtml#_Fig2). Verifying the data source and delegate
    for the table view


    The implementations of the data source and delegate methods use `fetchedResultsController`
    extensively. For example, to calculate the number of sections in the table, the
    `numberOfSectionsInTableView:` method returns the count of `fetchedResultsController`’s
    `section` property, as shown in [Listing 5-5](#9781430260288_Ch05.xhtml#list5)
    (Objective-C) and [Listing 5-6](#9781430260288_Ch05.xhtml#list6) (Swift).


    [***Listing 5-5***](#9781430260288_Ch05.xhtml#_list5). Calculating the Number
