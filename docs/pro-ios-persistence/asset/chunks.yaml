    Notice also that we didn’t copy over the publication relationships. The relationships
    are copied over by default in `NSEntityMigrationPolicy`’s `createRelationshipsForDestinationInstance:`
    method. By not overriding that method, we get Core Data to copy those over for
    us.


    Now let’s go back to the mapping model. Select the entity mapping called `PublicationToPublication`.
    In the panel to the right, set the custom policy to `PublicationToPublicationMigrationPolicy`
    (i.e., the one we just created), as [Figure 6-14](#9781430260288_Ch06.xhtml#Fig14)
    shows.


    ![9781430260288_Fig06-14.jpg](images/9781430260288_Fig06-14.jpg)


    [Figure 6-14](#9781430260288_Ch06.xhtml#_Fig14). Setting the new migration policy
    into the mapping model


    Your mapping model is ready to perform the migration. Just as with lightweight
    migrations, however, you need to add some code to the application delegate to
    tell Core Data to execute a migration.


    ## Migrating Data


    Creating the mapping model is essential to performing a migration that lightweight
    migrations can’t handle, but you still must perform the actual migration. This
    section explains how to do this and then update the code for the BookStore application
    to actually run the migration. By the end of this section, you will have a BookStore
    application that includes all the books it had before, but now the first name
    and last name of the authors are correctly split.


    Telling Core Data to migrate from the old model to the new one using a mapping
    model you create is similar to telling Core Data to use a lightweight migration.
    As you learned earlier, the way to tell Core Data to perform a lightweight migration
    is to pass an options dictionary that contains `YES` or `true` for two keys.


    - `NSMigratePersistentStoresAutomaticallyOption`

    - `NSInferMappingModelAutomaticallyOption`


    The first key tells Core Data to automatically migrate the data, and the second
    tells Core Data to infer the mapping model.


    For a migration using a mapping model you created, you clearly want Core Data
    to still automatically perform the migration, so you still set the `NSMigratePersistentStoresAutomaticallyOption`
    to `YES or true`. Since you’ve created the mapping model, however, you don’t want
    Core Data to infer anything; you want it to use your mapping model. Therefore,
    you set `NSInferMappingModelAutomaticallyOption` to `NO or false`, or you leave
    it out of the options dictionary entirely.


    How, then, do you specify the mapping model for Core Data to use to perform the
    migration? Do you set it in the options dictionary? Do you pass it somehow to
    the persistent store coordinator’s `addPersistentStoreWithType:` method? Do you
    set it into the persistent store coordinator? Into the managed object model? Into
    the context?


    The answer, which may seem a little shocking, is that you do nothing. Core Data
    will figure it out. It searches through your mapping models, finds one that’s
    appropriate for migrating from the source to the destination, and uses it. This
    makes migrations almost criminally easy.


    ## Running Your Migration


    To run the migration of your BookStore data store, open the `AppDelegate.m` file
    or the `AppDelegate.swift` file and remove the `NSInferMappingModelAutomaticallyOption`
    key from the options dictionary. This is all you have to do to get Core Data to
    migrate your data using your mapping model, `Model3To4.xcmappingmodel`. Set your
    current model version to `BookStore 4`, if you haven’t already, and then build
    and run the BookStore application; you should see all the books you had in the
    database before you ran the migration. Only this time, if you go look at the data
    store, you will see the names properly split:


    ```

    sqlite> select ztitle,zfirstname,zlastname,zprice from zpublication;


    ZTITLE           ZFIRSTNAME  ZLASTNAME   ZPRICE    

    ---------------  ----------  ----------  ----------

    The second book  John        Doe         20.0      

    The third book   Jane        Doe         21.0      

    The fourth book  Jack        Brown       23.0      

    The first book   Bill        Smith       22.0

    ```


    ## Custom Migrations


    In most data migration cases, using the default three-step migration process (create
    the destination objects, create the relationships, and validate and save) is sufficient.
    Data objects are created in the new data store from the previous version, then
    all relationships are created, and finally the data are validated and persisted.
    There are, however, some cases where you want to intervene in the middle of the
    migration. This is where you need custom migrations. Typically, you know you need
    to start thinking about custom migration when the data changes go beyond moving
    data from an old entity to a new one. This is the case, for example, when the
    order of migration matters or if you want the user to be made aware of the status
    of the migration progress.


    Taking control of the migration process initialization means that you need to
    perform all the work that Core Data usually does for you. This means that you
    need to do the following:


    - Make sure migration is actually needed.

    - Set up the migration manager.

    - Run your migration by splitting the model into independent parts.


    This section goes through a custom migration example step by step to show you
    how to make a nontrivial migration work. As the migration occurs, we will display
    the progress in the console log.


    To set the stage for this example. First create a new version of the data model.
    You should have `BookStore 5.xcdatamodel` at this point. In the new model, let’s
    make some change to trigger the migration. Open the `Publication` entity and add
    a new property of type `String` called `synopsis`. Make `BookStore 5.xcdatamodel`
    the current model.


    ### Making Sure Migration Is Needed


    To validate that a model is compatible with the persistent store, you use the
    `isConfiguration:compatibleWithStoreMetadata:` method of the `NSManagedObjectModel`
    class before adding the persistent store to the coordinator. The data store metadata
    can be retrieved by querying the coordinator using the `metadataForPersistentStoreOfType:URL:error:`
    method.


    Open `AppDelegate.m` or `AppDelegate.swift` and edit the `persistentStoreCoordinator`
    getter, as shown in [Listing 6-12](#9781430260288_Ch06.xhtml#list12) (Objective-C)
    or [Listing 6-13](#9781430260288_Ch06.xhtml#list13) (Swift).


    [***Listing 6-12***](#9781430260288_Ch06.xhtml#_list12). Determining Whether Migration
    is Needed (Objective-C)


    ```

    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator {

      if (_persistentStoreCoordinator != nil) {

          return _persistentStoreCoordinator;

      }


    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];

      NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"BookStoreEnhanced.sqlite"];


    NSError *error = nil;

      NSDictionary *sourceMetadata = [NSPersistentStoreCoordinator   metadataForPersistentStoreOfType:NSSQLiteStoreType
    URL:storeURL error:&error];


    NSManagedObjectModel *destinationModel = [_persistentStoreCoordinator managedObjectModel];


    BOOL pscCompatible = [destinationModel isConfiguration:nil   compatibleWithStoreMetadata:sourceMetadata];


    if (!pscCompatible) {

        // Migration is needed


    // ... perform the migration here

      }


    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType  
    configuration:nil URL:storeURL options:nil error:&error]) {

        [self showCoreDataError];

      }


    return _persistentStoreCoordinator;

    }

    ```


    [***Listing 6-13***](#9781430260288_Ch06.xhtml#_list13). Determining Whether Migration
    is Needed (Swift)'
