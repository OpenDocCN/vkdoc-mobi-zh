  \n## 处理验证错误\n\n如果你在 Core Data 模型中为任何属性配置了验证参数，并且允许用户输入未自动满足这些验证参数的值，那么你可能会遇到验证错误。验证操作确保数据的完整性；Core\
  \ Data 不会将任何你声明为无效的数据存储到持久化存储中。然而，仅仅因为你创建了验证规则，并不意味着用户知道这些规则——或者他们知道自己可能会违反规则。如果你保留\
  \ Xcode 生成的错误处理机制，即使用户输入了无效数据，他们也不会意识到自己违反了验证规则。结果只会是应用崩溃，并记录一个用户永远看不到的冗长堆栈跟踪。困惑的用户面对崩溃的应用，却不知道原因或如何防止其再次发生。与其在用户输入无效数据时崩溃，不如提醒用户，并给他们纠正数据的机会。\n\
  \n数据库端的验证可能是一个有争议的话题，而且理由充分。你可以通过将验证规则放入数据模型来保护数据的完整性，但这可能会使你的编码任务更加困难。数据模型中的验证规则是一种概念上听起来不错，但在实践中却不太理想的做法。例如，你能想象使用\
  \ Oracle 在 Web 应用中进行字段验证吗？是的，你可以做到，但其他方法可能更简单、更友好且架构更优。在代码中验证用户输入的值，甚至设计防止无效输入的用户界面，都会让你的工作更轻松，也让用户体验更好。\n\
  \n尽管如此，我们仍将继续概述一种处理验证错误的可能策略。不过，别说我们没提醒过你。\n\n## 检测验证错误\n\n检测用户是否输入了无效数据很简单：只需检查传递给托管对象上下文的`save:`方法的`NSError`对象（如果发生错误）。`NSError`对象包含导致`save:`方法失败的错误代码，如果该代码与表\
  \ 4-1 中显示的 Core Data 验证错误代码之一匹配，你就知道尝试保存的部分数据无效。你可以使用`NSError`的`userInfo`字典来查找关于错误原因的更多信息。注意，如果发生了多个错误，错误代码为`1560`（`NSValidationMultipleErrorsError`），并且`userInfo`字典中在键`NSDetailedErrorsKey`下保存了其余的错误代码。\n\
  \n**表 4-1**. Core Data 验证错误\n\n| 常量 | 代码 | 描述 |\n| --- | --- | --- |\n| `NSManagedObjectValidationError`\
  \ | 1550 | 通用验证错误 |\n| `NSValidationMultipleErrorsError` | 1560 | 包含多个验证错误的通用消息\
  \ |\n| `NSValidationMissingMandatoryPropertyError` | 1570 | 非可选属性值为`nil` |\n| `NSValidationRelationshipLacksMinimumCountError`\
  \ | 1580 | 多对多关系中目标对象数量过少 |\n| `NSValidationRelationshipExceedsMaximumCountError`\
  \ | 1590 | 有界多对多关系中目标对象数量过多 |\n| `NSValidationRelationshipDeniedDeleteError` | 1600\
  \ | 具有`NSDeleteRuleDeny`的关系非空 |\n| `NSValidationNumberTooLargeError` | 1610 | 某个数值过大\
  \ |\n| `NSValidationNumberTooSmallError` | 1620 | 某个数值过小 |\n| `NSValidationDateTooLateError`\
  \ | 1630 | 某个日期值过晚 |\n| `NSValidationDateTooSoonError` | 1640 | 某个日期值过早 |\n| `NSValidationInvalidDateError`\
  \ | 1650 | 某个日期值不匹配日期模式 |\n| `NSValidationStringTooLongError` | 1660 | 某个字符串值过长\
  \ |\n| `NSValidationStringTooShortError` | 1670 | 某个字符串值过短 |\n| `NSValidationStringPatternMatchingError`\
  \ | 1680 | 某个字符串值不匹配某个模式 |\n\n你可以选择实现一个熟悉数据模型、只检查特定错误的错误处理例程，或者编写一个能处理所有验证错误的通用错误处理例程。虽然通用例程扩展性更好，并且无论数据模型如何变化都应能继续工作，但更具体的错误处理例程可能让你在消息和响应中对用户更有帮助。没有哪个答案是正确的——如何处理验证错误的选择权在你手中。\n\
  \n要编写一个真正通用的验证错误处理例程需要做大量工作。需要考虑的一点是，`NSError`对象包含关于所发生错误的大量信息，但可能不足以告诉用户验证失败的原因。例如，假设你有一个实体`Foo`，其属性`bar`必须至少包含五个字符。如果用户为`bar`输入了“abc”，你将收到一条`NSError`消息，其中包含错误代码（`1670`）、实体（`Foo`）、属性（`bar`）以及验证失败的值（abc）。`NSError`对象不会告诉你\
  \ abc 为何太短——它不包含`bar`至少需要五个字符的信息。要得出这一结论，你必须向`Foo`实体询问`bar`属性的`NSPropertyDescription`，获取该属性描述的验证谓词，并遍历这些谓词以查看`bar`的最小长度。这是一个崇高的目标，但繁琐且通常过于复杂。这是违反“不要重复自己”（DRY）原则、让代码了解一些数据模型信息可能是更好答案的一个例子。\n\
  \n\n\n在数据模型中使用验证时，需要考虑的另一个奇怪之处是：验证在创建托管对象时并不会强制执行，只有在尝试保存托管对象所在的托管对象上下文时才会触发。仔细想想，这其实是有道理的，因为创建托管对象并填充其属性需要多个步骤。首先，你在上下文中创建对象，然后设置其属性和关系。因此，例如，如果你要为上一段中的\
  \ `Foo` 实体创建托管对象，你会编写如下代码：\n\n```\nNSManagedObject *foo = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Foo\" inManagedObjectContext:context]; // 此时 foo 无效；bar 字符数少于五个\n[foo setValue:@\"\
  abcde\" forKey:@\"bar\"];\n```\n\n托管对象 `foo` 被创建并存在于托管对象上下文中，处于无效状态，但托管对象上下文会忽略这一点。下一行代码使\
  \ `foo` 托管对象变得有效，但直到托管对象上下文被保存时才会进行验证。\n\n## 在 BookStore 中处理验证错误\n\n在本节中，你将实现一个针对\
  \ `BookStore` 应用程序的验证错误处理例程。该例程是通用的，因为它不知道哪些属性具有验证规则，但它也是特定的，因为它不处理所有验证错误——只处理你确定在模型中设置的那些。但在执行此操作之前，你需要为\
  \ `BookStore` 的数据模型添加一些验证规则。为 `Book` 实体的 `price` 属性添加最小值为 15 的限制，如图 4-4 所示。\n\n\
  ![9781430260288_Fig04-04.jpg](img/9781430260288_Fig04-04.jpg)\n\n图 4-4. 添加验证规则\n\
  \n### 实现验证错误处理例程\n\n你编写的验证错误处理例程应接受一个指向 `NSError` 对象的指针，并返回一个包含错误消息的 `NSString`，消息之间用换行符分隔。打开\
  \ `ViewController.m` 或 `ViewController.swift`，并添加列表 4-33（Objective-C）或列表 4-34（Swift）所示的方法。\n\
  \n***列表 4-33***. 添加验证错误处理例程（Objective-C）\n\n```\n- (NSString *)validationErrorText:(NSError\
  \ *)error {\n  // 创建一个字符串来保存所有错误消息\n  NSMutableString *errorText = [NSMutableString\
  \ stringWithCapacity:100];\n  // 确定是单个错误还是多个错误，并将它们全部放入一个数组\n  NSArray *errors = [error\
  \ code] == NSValidationMultipleErrorsError ? [[error userInfo] objectForKey:NSDetailedErrorsKey]\
  \ : [NSArray arrayWithObject:error];\n\n// 遍历错误\n  for (NSError *err in errors)\
  \ {\n    // 获取出现验证错误的属性\n    NSString *propName = [[err userInfo] objectForKey:@\"\
  NSValidationErrorKey\"];\n    NSString *message;\n\n// 形成适当的错误消息\n    switch ([err\
  \ code]) {\n      case NSValidationNumberTooSmallError:\n        message = [NSString\
  \ stringWithFormat:@\"%@ 必须至少为 $15\", propName];\n        break;\n      default:\n\
          message = @\"未知错误。按 Home 键停止。\";\n      break;\n    }\n\n// 用换行符分隔错误消息\n\
      if ([errorText length] > 0) {\n      [errorText appendString:@\"\\n\"];\n    }\n\
      [errorText appendString:message];\n  }\n  return errorText;\n}\n```\n\n***列表\
  \ 4-34***. 添加验证错误处理例程（Swift）\n\n```\nfunc validationErrorText(error : NSError) ->\
  \ String {\n    // 创建一个字符串来保存所有错误消息\n    let errorText = NSMutableString(capacity:\
  \ 100)\n    // 确定是单个错误还是多个错误，并将它们全部放入一个数组\n    let errors : NSArray = error.code\
  \ == NSValidationMultipleErrorsError ? error.userInfo?[NSDetailedErrorsKey] as NSArray\
  \ : NSArray(object: error)\n\n// 遍历错误\n    for err in errors {\n        // 获取出现验证错误的属性\n\
          let e = err as NSError\n        let info = e.userInfo\n        let propName\
  \ : AnyObject? = info![\"NSValidationErrorKey\"]\n        var message : String?\n\
  \n// 形成适当的错误消息\n        switch err.code {\n        case NSValidationNumberTooSmallError:\n\
              message = \"\\(propName!) 必须至少为 $15\"\n        default:\n            message\
  \ = \"未知错误。按 Home 键停止。\"\n        }\n\n// 用换行符分隔错误消息\n        if errorText.length\
  \ > 0 {\n            errorText.appendString(\"\\n\")\n        }\n\nerrorText.appendString(message!)\n\
      }\n\nreturn errorText\n}\n```\n\n现在，我们有了一个方法，可以返回更有用的消息来帮助用户。让我们将其连接到测试代码中。由于我们在\
  \ `insertSomeData` 方法中插入的一些书籍价格低于 15 美元，因此应该会触发错误。\n\n编辑视图控制器中的 `saveContext` 方法，以调用\
  \ `validationErrorText` 方法，如列表 4-35（Objective-C）和列表 4-36（Swift）所示。\n\n***列表 4-35***.\
  \ 调用验证错误处理例程（Objective-C）\n\n```\n- (void)saveContext {\n  NSManagedObjectContext\
  \ *managedObjectContext = self.managedObjectContext;\n  if (managedObjectContext\
  \ != nil) {\n    NSError *error = nil;\n    if ([managedObjectContext hasChanges]\
  \ && ![managedObjectContext save:&error]) {\n      NSString *message = [self validationErrorText:error];\n\
        NSLog(@\"错误: %@\", message);\n    }\n  }\n}\n```\n\n***列表 4-36***. 调用验证错误处理例程（Swift）\n\
  \n```\nfunc saveContext() {\n    var error: NSError? = nil\n    if let managedObjectContext\
  \ = self.managedObjectContext {\n        if managedObjectContext.hasChanges && !managedObjectContext.save(&error)\
  \ {\n            let message = validationErrorText(error!)\n            println(\"\
  错误: \\(message)\")\n        }\n    }\n}\n```\n\n启动 `BookStore` 应用，你将在日志中看到验证错误，其中我们尝试插入的书籍是无效的。\n\
  \n## 小结\n\n在本章中，你看到了几种有助于管理数据质量和完整性的技术。你学习了如何帮助用户处理意外故障，以及如何帮助实现平稳运行，而不是让应用程序莫名其妙地崩溃。在下一章中，你将学习如何通过将用户界面与\
  \ Core Data 集成来让用户满意，如何在升级应用时平滑迁移数据，以及许多其他有助于提高应用程序质量的进阶功能。\n\n"
- '# 第 5 章：与用户界面集成


  备受推崇的模型-视图-控制器（MVC）模式衍生了诸如模型-视图-展示器（MVP）和模型-视图-视图模型（MVVM）等变体，它将应用的数据（模型）与数据的显示（视图）分离开来。Core
  Data，无论是从其名称还是意图来看，都涵盖了应用的数据或模型方面。然而，存储数据通常是不够的——应用程序通常必须在屏幕上呈现这些数据。本章讨论一些类，这些类从
  Core Data 存储中取出数据，并以高效且响应迅速的方式在屏幕上呈现。在本章中，我们将涵盖以下内容：




