  \n将`Uniquing`的一个实例添加到`ViewController.m`或`ViewController.swift`的`tests`数组中，如有必要添加对`Uniquing.h`的导入，构建并运行应用程序，然后运行新测试。你最终会看到“Test\
  \ complete”消息，表明测试通过且唯一性验证成功。\n\n## 使用更好的谓词提高性能\n\n尽管电影片名《2001: 太空漫游》中提到了一年，但我们的机器还远未达到能智能地回应诸如“对不起，戴夫。我恐怕不能这样做。”之类话语的程度。在撰写本书时，程序员仍然需要进行大量辅助工作来引导机器完成其被要求执行的任务。这意味着代码的编写方式决定了其效率。通常有多种方法可以检索相同的数据，但所采用的解决方案会显著影响应用程序的性能。\n\
  \n### 使用更快的比较器\n\n通常来说，字符串比较器的执行速度比原始类型比较器慢。当使用`OR`运算符组合谓词时，将原始类型比较器放在前面总是更高效，因为如果它们解析为`TRUE`，则不需要再评估其余的比较器。这是因为“`TRUE\
  \ OR` 任何表达式”总是为真。类似的策略也可用于由`AND`组合的谓词。在这种情况下，如果第一个谓词失败，则第二个谓词将不会被评估，因为“`FALSE AND`\
  \ 任何表达式”总是为假。\n\n为了验证这一点，在你的性能测试应用程序中添加一个名为`Predicate`的新测试，并使其符合`PerfTest`协议。该测试包含两个获取请求，它们使用由`OR`组合的谓词检索相同的对象。在第一个测试中，字符串比较器`LIKE`用在原始类型比较器之前。在第二个测试中，比较器的顺序被调换。将每个测试运行\
  \ 1000 次以获得有意义的计时；每次循环时，缓存被重置以保持干净上下文。Listing 9-41 展示了`Predicate.m`，Listing 9-42\
  \ 展示了`Predicate.swift`。\n\n***Listing 9-41***. `Predicate.m`\n\n```\n#import \"\
  Predicate.h\"\n\n@implementation Predicate\n\n- (NSString *)runTestWithContext:(NSManagedObjectContext\
  \ *)context {\n  NSMutableString *result = [NSMutableString string];\n\n// Set up\
  \ the first fetch request\n  NSFetchRequest *fetchRequest1 = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Selfie\"];\n  fetchRequest1.predicate = [NSPredicate predicateWithFormat:@\"(name\
  \ LIKE %@) OR (rating < %d)\", @\"*e*ie*\", 5];\n\n// Run the first fetch request\
  \ and measure\n  NSDate *start1 = [NSDate date];\n  for (int i = 0; i < 1000; i++)\
  \ {\n    [context reset];\n    [context executeFetchRequest:fetchRequest1 error:nil];\n\
    }\n  NSDate *end1 = [NSDate date];\n  [result appendFormat:@\"Slow predicate:\
  \ %.3f s\\n\", [end1 timeIntervalSinceDate:start1]];\n\n// Set up the second fetch\
  \ request\n  NSFetchRequest *fetchRequest2 = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Selfie\"];\n  fetchRequest1.predicate = [NSPredicate predicateWithFormat:@\"(rating\
  \ < %d) OR (name LIKE %@)\", 5, @\"*e*ie*\"];\n\n// Run the first fetch request\
  \ and measure\n  NSDate *start2 = [NSDate date];\n  for (int i = 0; i < 1000; i++)\
  \ {\n    [context reset];\n    [context executeFetchRequest:fetchRequest2 error:nil];\n\
    }\n  NSDate *end2 = [NSDate date];\n  [result appendFormat:@\"Fast predicate:\
  \ %.3f s\\n\", [end2 timeIntervalSinceDate:start2]];\n\nreturn result;\n}\n\n@end\n\
  ```\n\n***Listing 9-42***. `Predicate.swift`\n\n```\nimport Foundation\nimport CoreData\n\
  \nclass Predicate : PerfTest {\n    func runTestWithContext(context: NSManagedObjectContext)\
