  \ Core Data 存储的非常简单的应用。你可以启动应用进行测试。\n\n**提示** 如果尚未完成，现在是在 iOS 模拟器中启用 iCloud 的好时机。在\
  \ iOS 模拟器中，启动“设置”应用并选择 iCloud 选项，输入您的凭据并登录。\n\n### 使用 iCloud 的 Ubiquity 容器\n\n在本小节中，我们将告知\
