  \ 的视图\n\n## 构建测试框架\n\n选择器视图将包含一个我们可以运行的测试列表。为了创建这个列表，我们定义一个名为 `PerfTest` 的协议，然后创建几个实现该协议的类。接着，我们创建一个数组来存储测试类的实例。应用将在选择器视图中显示这些测试类的名称，并在用户点击“运行所选测试”按钮时执行选中的测试。\n\
  \n首先，创建一个名为 `PerfTest` 的新协议，并声明一个必需方法 `runTestWithContext:`。代码清单 9-14 展示了 Objective-C\
  \ 版本 `PerfTest.h`，代码清单 9-15 展示了 Swift 版本 `PerfTest.swift`。\n\n***代码清单 9-14***. `PerfTest.h`\n\
  \n```objectivec\n#import <Foundation/Foundation.h>\n@import CoreData;\n\n@protocol\
  \ PerfTest <NSObject>\n\n- (NSString *)runTestWithContext:(NSManagedObjectContext\
  \ *)context;\n\n@end\n```\n\n***代码清单 9-15***. `PerfTest.swift`\n\n```swift\nimport\
  \ Foundation\nimport CoreData\n\nprotocol PerfTest {\n    func runTestWithContext(context:\
  \ NSManagedObjectContext) -> String!\n}\n```\n\n在将测试框架集成到应用之前，创建一个测试——如果你愿意，可以称之为“测试用测试”——这样我们就能在选择器视图中看到内容，并运行它。创建的第一个测试将从持久化存储中获取所有对象（人物、自拍和社交网络）。新建一个名为\
  \ `FetchAll` 的类，作为 `NSObject` 的子类，并使其实现 `PerfTest` 协议。然后，在 `runWithContext:` 实现中，只需获取所有对象并返回一个字符串，描述每个实体获取的对象数量。代码清单\
  \ 9-16 展示 `FetchAll.h`，代码清单 9-17 展示 `FetchAll.m`，代码清单 9-18 展示 `FetchAll.swift`。\n\
  \n***代码清单 9-16***. `FetchAll.h`\n\n```objectivec\n#import \"PerfTest.h\"\n\n@interface\
  \ FetchAll : NSObject <PerfTest>\n\n@end\n```\n\n***代码清单 9-17***. `FetchAll.m`\n\
  \n```objectivec\n#import \"FetchAll.h\"\n\n@implementation FetchAll\n```\n\n\n```markdown\n\
  - (NSString *)runTestWithContext:(NSManagedObjectContext *)context {\n    NSFetchRequest\
  \ *peopleFetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"Person\"];\n\
  \    NSFetchRequest *selfiesFetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Selfie\"];\n    NSFetchRequest *socialNetworksFetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  SocialNetwork\"];\n\n    NSArray *people = [context executeFetchRequest:peopleFetchRequest\
  \ error:nil];\n    NSArray *selfies = [context executeFetchRequest:selfiesFetchRequest\
  \ error:nil];\n    NSArray *socialNetworks = [context executeFetchRequest:socialNetworksFetchRequest\
  \ error:nil];\n\n    return [NSString stringWithFormat:@\"Fetched %ld people, %ld\
  \ selfies, and %ld social networks\", [people count], [selfies count], [socialNetworks\
  \ count]];\n}\n\n@end\n\n***代码清单 9-18***. `FetchAll.swift`\n\n```\nimport Foundation\n\
  import CoreData\n\nclass FetchAll : PerfTest {\n    func runTestWithContext(context:\
  \ NSManagedObjectContext) -> String! {\n        let peopleFetchRequest = NSFetchRequest(entityName:\
  \ \"Person\")\n        let selfiesFetchRequest = NSFetchRequest(entityName: \"Selfie\"\
  )\n        let socialNetworkFetchRequest = NSFetchRequest(entityName: \"SocialNetwork\"\
  )\n\n        let people = context.executeFetchRequest(peopleFetchRequest, error:\
  \ nil)!\n        let selfies = context.executeFetchRequest(selfiesFetchRequest,\
  \ error: nil)!\n        let socialNetworks = context.executeFetchRequest(socialNetworkFetchRequest,\
  \ error: nil)!\n\n        return NSString(format: \"Fetched %ld people, %ld selfies,\
  \ and %ld social networks\", people.count, selfies.count, socialNetworks.count)\n\
  \    }\n}\n```\n\n## 将测试框架集成到应用程序中\n\n现在你需要修改视图控制器以使用测试框架。在 `ViewController.h` 中添加一个属性来保存所有测试实例。\n\
