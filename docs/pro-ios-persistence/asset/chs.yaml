  \ `github.com`。如果正则表达式未找到匹配项，则直接返回 URL。代码清单 5-39（Objective-C）和代码清单 5-40（Swift）展示了\
  \ `host` 方法的实现。\n\n**代码清单 5-39**. `host` 方法（Objective-C）\n\n```\n- (NSString *)host\
  \ {\n  NSRegularExpression *regex = [NSRegularExpression regularExpressionWithPattern:@\"\
  .*?//(.*?)/.*\"\n                     options:0                       error:nil];\n\
  \  NSTextCheckingResult *match = [regex firstMatchInString:self.project.url\n  \
  \                                                options:0\n                   \
  \                                 range:NSMakeRange(0, [self.project.url length])];\n\
  \  if (match) {\n    return [self.project.url substringWithRange:[match rangeAtIndex:1]];\n\
  \  } else {\n    return self.project.url;\n  }\n}\n```\n\n**代码清单 5-40**. `host`\
  \ 函数（Swift）\n\n```\nfunc host() -> String {\n  let url : NSString = self.project!.url\n\
  \  let regex = NSRegularExpression(pattern: \".*?//(.*?)/.*\", options: nil, error:\
  \ nil)\n  let match =  regex!.firstMatchInString(url, options: NSMatchingOptions.ReportCompletion,\
  \ range: NSMakeRange(0, url.length))\n  if match != nil {\n    let range = match?.rangeAtIndex(1)\n\
  \    if let range = range {\n      return url.substringWithRange(range)\n    }\n\
  \    else {\n      return url\n    }\n  }\n  else {\n    return url\n  }\n}\n```\n\
