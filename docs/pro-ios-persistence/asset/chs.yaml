  \ context) as NSManagedObject\n\n// 如果合适，配置新托管对象。\n  // 通常应使用访问器方法，但在此处使用 KVC 可以避免为模板添加自定义类。\n\
  \  newManagedObject.setValue(NSDate.date(), forKey: \"timeStamp\")\n\n// 保存上下文。\n\
  \  var error: NSError? = nil\n  if !context.save(&error) {\n      // 替换此实现以适当处理错误。\n\
  \      // abort() 会导致应用程序生成崩溃日志并终止。在生产应用中不应使用此函数，尽管它在开发过程中可能有用。\n      //println(\"\
  未解析的错误 \\(error), \\(error.userInfo)\")\n      abort()\n  }\n}\n```\n\n请注意，插入新对象会导致调用\
  \ `NSFetchedResultsControllerDelegate` 协议中的 `controllerWillChangeContent:` 方法。回想一下，`fetchedResultsController`\
  \ 的委托是 `MasterViewController` 实例，它实现了该方法以通知其表格视图即将开始更新，如 列表 5-13 (Objective-C) 和\
  \ 列表 5-14 (Swift) 所示。\n\n***列表 5-13***. `controllerWillChangeContent:` 方法 (Objective-C)\n\
  \n```\n- (void)controllerWillChangeContent:(NSFetchedResultsController *)controller\
  \ {\n  [self.tableView beginUpdates];\n}\n```\n\n***列表 5-14***. `controllerWillChangeContent:`\
  \ 方法 (Swift)\n\n```\nfunc controllerWillChangeContent(controller: NSFetchedResultsController)\
  \ {\n    self.tableView.beginUpdates()\n}\n```\n\n接下来，会调用 `NSFetchedResultsControllerDelegate`\
  \ 协议中的另一个方法：`controller:didChangeObject:atIndexPath:forChangeType:newIndexPath`。`MasterViewController`\
  \ 实现了该方法以动画方式在表格中插入行，如 列表 5-15 (Objective-C) 和 列表 5-16 (Swift) 所示。此方法还处理删除或移动行的动画。\n\
  \n***列表 5-15***. 对象发生变化时调用的方法 (Objective-C)\n\n```\n- (void)controller:(NSFetchedResultsController\
  \ *)controller didChangeObject:(id)anObject\n       atIndexPath:(NSIndexPath *)indexPath\
  \ forChangeType:(NSFetchedResultsChangeType)type\n      newIndexPath:(NSIndexPath\
  \ *)newIndexPath {\n  UITableView *tableView = self.tableView;\n\n  switch(type)\
  \ {\n    case NSFetchedResultsChangeInsert:\n      [tableView insertRowsAtIndexPaths:@[newIndexPath]\
  \ withRowAnimation:UITableViewRowAnimationFade];\n      break;\n\n    case NSFetchedResultsChangeDelete:\n\
  \      [tableView deleteRowsAtIndexPaths:@[indexPath] withRowAnimation:UITableViewRowAnimationFade];\n\
  \      break;\n\n    case NSFetchedResultsChangeUpdate:\n      [self configureCell:[tableView\
  \ cellForRowAtIndexPath:indexPath] atIndexPath:indexPath];\n      break;\n\n   \
  \ case NSFetchedResultsChangeMove:\n      [tableView deleteRowsAtIndexPaths:@[indexPath]\
  \ withRowAnimation:UITableViewRowAnimationFade];\n      [tableView insertRowsAtIndexPaths:@[newIndexPath]\
  \ withRowAnimation:UITableViewRowAnimationFade];\n      break;\n  }\n}\n```\n\n\
  ***列表 5-16***. 对象发生变化时调用的方法 (Swift)\n\n```\nfunc controller(controller: NSFetchedResultsController,\
  \ didChangeObject anObject: AnyObject, atIndexPath indexPath: NSIndexPath, forChangeType\
  \ type: NSFetchedResultsChangeType, newIndexPath: NSIndexPath) {\n    switch type\
  \ {\n        case .Insert:\n            tableView.insertRowsAtIndexPaths([newIndexPath],\
  \ withRowAnimation: .Fade)\n        case .Delete:\n            tableView.deleteRowsAtIndexPaths([indexPath],\
  \ withRowAnimation: .Fade)\n        case .Update:\n            self.configureCell(tableView.cellForRowAtIndexPath(indexPath)!,\
  \ atIndexPath: indexPath)\n        case .Move:\n            tableView.deleteRowsAtIndexPaths([indexPath],\
  \ withRowAnimation: .Fade)\n            tableView.insertRowsAtIndexPaths([newIndexPath],\
  \ withRowAnimation: .Fade)\n        default:\n            return\n    }\n}\n```\n\
  \n在插入情况下，会调用 `switch` 语句中的 `NSFetchedResultsChangeInsert` 分支。表格视图正是通过这种方式更新以显示新的\
  \ `Event` 托管对象。\n\n\n\n\n最后，调用了`NSFetchedResultsControllerDelegate`的`controllerDidChangeContent:`方法。`MasterViewController`的实现通知表视图结束其更新，如[代码清单\
  \ 5-17]（Objective-C）和[代码清单 5-18]（Swift）所示。\n\n[**代码清单 5-17**] `controllerDidChangeContent:`\
  \ 方法（Objective-C）\n\n```\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
  \ *)controller {\n  [self.tableView endUpdates];\n}\n```\n\n[**代码清单 5-18**] `controllerDidChangeContent:`\
  \ 方法（Swift）\n\n```\nfunc controllerDidChangeContent(controller: NSFetchedResultsController)\
  \ {\n    self.tableView.endUpdates()\n}\n```\n\n### 删除事件\n\n生成的应用程序允许您从主表中删除`Event`实例，可以通过在表格单元格上向左滑动并点击出现的删除按钮，或者点击导航栏左侧的编辑链接，点击表格单元格左侧的删除图标，然后点击删除按钮。完成后不要忘记点击完成链接。\n\
  \n当您从表中删除一行时，将调用`tableView:commitEditingStyle:forRowAtIndexPath:`方法，并传入`UITableViewCellEditingStyleDelete`编辑样式。该实现会检查该样式，从`fetchedResultsController`中删除相应的对象，并保存托管对象上下文。[代码清单\
  \ 5-19]（Objective-C）和[代码清单 5-20]（Swift）展示了此代码。\n\n[**代码清单 5-19**] 从表和 Core Data\
  \ 存储中删除一行（Objective-C）\n\n```\n- (void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath {\n  if (editingStyle == UITableViewCellEditingStyleDelete)\
  \ {\n    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
  \    [context deleteObject:[self.fetchedResultsController objectAtIndexPath:indexPath]];\n\
  \n    NSError *error = nil;\n    if (![context save:&error]) {\n      // 将此实现替换为适当处理错误的代码。\n\
  \      // abort() 会导致应用程序生成崩溃日志并终止。您不应在发布的应用程序中使用此函数，尽管它在开发中可能有用。\n      NSLog(@\"\
  Unresolved error %@, %@\", error, [error userInfo]);\n      abort();\n    }\n  }\n\
  }\n```\n\n[**代码清单 5-20**] 从表和 Core Data 存储中删除一行（Swift）\n\n```\noverride func tableView(tableView:\
