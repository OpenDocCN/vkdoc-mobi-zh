  \ 秒。\n\n## 使用子查询\n\n你在第 3 章中已经了解到如何使用子查询来简化代码。在本节中，你将添加一个测试来展示使用子查询和手动检索相关数据之间的差异。考虑一个示例，你想要从某张自拍中找到符合特定条件的所有人物。如果不使用子查询，你必须首先获取所有符合条件的自拍。然后，你必须遍历每张自拍并提取人物。接着，你遍历这些人物并将他们添加到结果集中，同时确保如果同一个人出现在多张自拍中，你不会重复添加。清单\
  \ 9-43 展示了 Objective-C 版的手动子查询代码，清单 9-44 展示了 Swift 版本。\n\n**清单 9-43.** 手动执行子查询的笨办法\
  \ (Objective-C)\n\n```objectivec\nNSMutableDictionary *people = [NSMutableDictionary\
  \ dictionary];\n\nNSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Selfie\"];\nfetchRequest.predicate = [NSPredicate predicateWithFormat:@\"(rating\
  \ < %d) OR (name LIKE %@)\", 5, @\"*e*ie*\"];\nNSArray *selfies = [context executeFetchRequest:fetchRequest\
  \ error:nil];\n\nfor (Selfie *selfie in selfies) {\n  for (Person *person in selfie.people)\
  \ {\n    [people setObject:person forKey:[[[person objectID] URIRepresentation]\
  \ description]];\n  }\n}\n```\n\n**清单 9-44.** 手动执行子查询的笨办法 (Swift)\n\n```swift\n\
  var people = [String: Person]()\n\nlet fetchRequest = NSFetchRequest(entityName:\
  \ \"Selfie\")\nfetchRequest.predicate = NSPredicate(format: \"(rating < %d) OR (name\
  \ LIKE %@)\", 5, \"*e*ie*\")\nlet selfies = context.executeFetchRequest(fetchRequest,\
  \ error: nil) as [Selfie]\n\nfor selfie in selfies {\n    for obj in selfie.people\
  \ {\n        let person = obj as Person\n        let key : String = person.objectID.URIRepresentation().description\n\
  \        people[key] = person\n    }\n}\n```\n\n在这个实现中，`people` 字典包含了所有匹配的人物。你使用\
  \ `objectID` 作为键来消除重复项。这种方法的替代方案是让 Core Data 通过使用子查询为你完成匹配。清单 9-45 (Objective-C)\
  \ 或清单 9-46 (Swift) 展示了使用子查询的相同结果集。\n\n**清单 9-45.** 正确使用子查询的方法 (Objective-C)\n\n\
  ```objectivec\nNSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Person\"];\nfetchRequest.predicate = [NSPredicate predicateWithFormat:@\"(SUBQUERY(selfies,\
  \ $x, ($x.rating < %d) OR ($x.name LIKE %@)).@count > 0)\", 5, @\"*e*ie*\"];\nNSArray\
  \ *people = [context executeFetchRequest:fetchRequest error:nil];\n```\n\n**清单 9-46.**\
  \ 正确使用子查询的方法 (Swift)\n\n```swift\nlet fetchRequest = NSFetchRequest(entityName:\
  \ \"Person\")\nfetchRequest.predicate = NSPredicate(format: \"(SUBQUERY(selfies,\
  \ $x, ($x.rating < %d) OR ($x.name LIKE %@)).@count > 0)\", 5, \"*e*ie*\")\nlet\
  \ people = context.executeFetchRequest(fetchRequest2, error: nil) as [Selfie]\n\
  ```\n\n这里的主要区别之一是，你让持久化存储完成所有检索匹配人物的工作，这意味着大多数结果不会落入 Core Data 的 context 层供你进行后处理。使用子查询时，你实际上不需要像手动方法那样检索自拍，获取请求直接设置为获取人物。此外，手动选项在检索自拍后，还需要触发\
  \ fault 来获取人物。\n\n为了演示子查询方法效率的提升，创建一个新的符合 `PerfTest` 协议的类 `Subquery`。清单 9-47 显示了\
  \ `Subquery.m`，清单 9-48 显示了 `Subquery.swift`。\n\n**清单 9-47.** `Subquery.m`\n\n```objectivec\n\
  #import \"Subquery.h\"\n#import \"Selfie.h\"\n#import \"Person.h\"\n\n@implementation\
  \ Subquery\n\n- (NSString *)runTestWithContext:(NSManagedObjectContext *)context\
  \ {\n  NSMutableString *result = [NSMutableString string];\n\n// 设置第一个获取请求，不使用子查询\n\
  \  NSFetchRequest *fetchRequest1 = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Selfie\"];\n  fetchRequest1.predicate = [NSPredicate predicateWithFormat:@\"(rating\
  \ < %d) OR (name LIKE %@)\", 5, @\"*e*ie*\"];\n\n// 记录时间并获取结果\n  NSDate *start1\
  \ = [NSDate date];\n  NSArray *selfies = [context executeFetchRequest:fetchRequest1\
  \ error:nil];\n  NSMutableDictionary *people1 = [NSMutableDictionary dictionary];\n\
  \  for (Selfie *selfie in selfies) {\n    for (Person *person in selfie.people)\
  \ {\n      [people1 setObject:person forKey:[[[person objectID] URIRepresentation]\
  \ description]];\n    }\n  }\n  NSDate *end1 = [NSDate date];\n\n// 记录手动请求的结果\n\
  \  [result appendFormat:@\"No subquery: %.3f s\\n\", [end1 timeIntervalSinceDate:start1]];\n\
  \  [result appendFormat:@\"People retrieved: %ld\\n\", [people1 count]];\n\n// 重置\
  \ context 以获得干净的结果\n  [context reset];\n\n// 设置第二个获取请求，使用子查询\n  NSFetchRequest *fetchRequest2\
  \ = [NSFetchRequest fetchRequestWithEntityName:@\"Person\"];\n  fetchRequest2.predicate\
  \ = [NSPredicate predicateWithFormat:@\"(SUBQUERY(selfies, $x, ($x.rating < %d)\
  \ OR ($x.name LIKE %@)).@count > 0)\", 5, @\"*e*ie*\"];\n\n// 记录时间并获取结果\n  NSDate\
  \ *start2 = [NSDate date];\n  NSArray *people2 = [context executeFetchRequest:fetchRequest2\
  \ error:nil];\n  NSDate *end2 = [NSDate date];\n\n// 记录子查询请求的结果\n  [result appendFormat:@\"\
  Subquery: %.3f s\\n\", [end2 timeIntervalSinceDate:start2]];\n  [result appendFormat:@\"\
