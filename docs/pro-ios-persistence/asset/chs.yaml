- "# 第 1 章：初识 Core Data\n\n你钱包或口袋里的那台电脑——那台据称可以打电话的设备——存储着好几 GB 的数据：照片、电子邮件、短信、推文、餐厅评论、高分成绩、书籍、你的朋友早餐吃了什么，以及无数种其他由\
  \ 0 和 1 组成的信息，这些信息每天为你提供信息和娱乐。作为苹果提供的数据管理方案，Core Data 管理者其中很大一部分信息，并且由 Core Data\
  \ 管理的 iOS 设备上的信息比例还在持续增长。在本章中，我们将探讨其原因。\n\n\n\n## 本章阐述什么是 Core Data 及其组成部分\n\n本章阐述什么是\
  \ Core Data 及其组成部分。文中概述并解释了 Core Data 使用的基本类以及它们如何协同工作。它展示了如何在你的应用程序中设置 Core Data，无论你是利用\
  \ Xcode 的 Core Data 代码生成功能，还是手动添加 Core Data 功能。同时，还介绍了为对象创建对象模型、存储对象和检索对象的基础知识。\n\
  \n在本章中，你将构建两个应用程序：一个让 Xcode 为你设置 Core Data，另一个则需要你手动添加 Core Data。这两个应用程序除了空白屏幕外，没有任何界面，但它们都专注于\
  \ Core Data 的交互。后续章节的应用程序将包含实际的用户界面，但请保持耐心，专注于学习 Core Data 的基础知识。你在本章所学的知识将为你阅读本书剩余部分以及开发自己的\
  \ Core Data 项目奠定坚实的基础。\n\n## 什么是 Core Data？\n\n设想一下，如果计算机不能存储数据会怎样。想象一下，每次你启动 iPhone\
  \ 或 iPad 时，所有应用都需从头开始。你所有的文档都消失了：你的学校论文、预算规划电子表格、为新一轮风险投资融资精心准备的演示文稿，全都化为乌有。你在《愤怒的小鸟》中又回到了第一关。你不再有暴躁猫的图片。你昨晚的短信也不见了（对某些人来说，这可能反而是件好事）。简而言之，你的设备日复一日地变成了一块经典的“白板”（*tabula\
  \ rasa*），空白且没有任何数据，毫无用处。\n\n那些假想中的计算机所缺乏的就是持久性：即随时间推移存储和检索数据的能力。我们希望持久化存储信息，例如我们的照片、高分记录和文档。苹果提供的持久化解决方案——Core\
  \ Data，允许应用程序持久化存储任何形式的数据并检索它们。\n\n从技术上讲，Core Data 并非数据库，尽管它通常将数据存储在数据库中（准确地说，是\
  \ SQLite 数据库）。它也不是对象关系映射（ORM），尽管它用起来感觉有点像。它实际上是一个对象图，允许你创建、存储和检索那些拥有属性并与其他对象存在关系的对象。它的简洁性和强大功能使你能够持久化任何形式的数据，从基础数据模型到复杂数据模型。\n\
  \n## Core Data 组件\n\nCore Data 的新手常常会对该框架的复杂性感到沮丧，但正如我们将看到的，这种最初的印象是毫无根据的。Cocoa\
  \ 偏爱长名称的习惯可能导致了这种错误的复杂感；毕竟，`NSPersistentStoreCoordinator` 这个名字就很拗口。然而，一旦你克服了长名称的障碍，理解了每个类的用途，你就会认识到\
  \ Core Data 框架既优雅又简洁。\n\n我们可以将 Core Data 的类分为两组：一组通常在我们程序启动时设置一次，另一组则在程序运行期间持续使用。此外，Cocoa\
  \ 还提供了一组 Core Data 使用的类，这些类并不局限于 Core Data 的范围。Core Data 利用像 `NSPredicate` 和 `NSSortDescriptor`\
  \ 这样的类来增强其功能，这些类在 Cocoa 应用程序的其他上下文中也会用到。我们将在本书中涉及这些其他的类。\n\n首先，我们来讨论程序启动时设置一次的类。这些类包括：\n\
  \n*   `NSPersistentStore`\n*   `NSPersistentStoreCoordinator`\n*   `NSManagedObjectModel`\n\
  \n`NSPersistentStore` 类代表一个持久化存储：即设备文件系统中实际存储数据的位置。这通常是一个 SQLite 数据库，尽管 Core Data\
  \ 也提供其他类型的持久化存储：\n\n*   XML（仅限 OS X）\n*   原子存储（Atomic）\n*   内存存储（In-memory）\n\n\
  XML 存储（如你所料）将数据存储在 XML 文件中，但仅适用于 OS X。原子存储之所以得名，是因为它在访问时会读取和写入整个数据存储，如果你希望创建自己的文件格式来存储文件，它会很有用。Core\
  \ Data 提供了一种名为二进制存储类型的原子存储实现，你也可以基于原子存储创建自定义存储。但请注意，原子存储通常速度较慢，尤其是在数据集变得庞大时，因为它们会原子地写入和读取数据文件。如果你不需要数据在应用程序当前启动之外持久保存，但又想利用\
  \ Core Data 的强大功能与数据交互，那么内存存储会很有用。不过，你的持久化存储大多数（如果不是全部）都将是 SQLite 存储。它们速度很快，因为它们可以读写部分数据，并且能够让你的数据在应用程序多次启动之间持久保存。每个应用程序通常只有一个持久化存储，但也可以有多个。\n\
  \n`NSPersistentStoreCoordinator` 类代表一个持久化存储协调器，它协调持久化存储、对象模型和对象上下文之间的关系。持久化存储协调器使用一个对象模型（我们接下来会看到），并将其与一个或多个持久化存储关联起来。它还协调一个或多个托管对象上下文与一个或多个持久化存储之间的对象存储和检索。从某种意义上说，它是\
  \ Core Data 的中心枢纽，将所有 Core Data 类连接在一起。幸运的是，创建和配置它都很容易，然后在你的应用程序运行时，它会为你执行所有复杂的魔法。\n\
  \n`NSManagedObjectModel` 类代表一个托管对象模型，或者更简单地说，一个对象模型。它看起来非常像数据模型，所以你即使将其视为数据模型也是可以理解的。正如实体-关系（ER）图定义了表、列和关系一样，对象模型定义了实体、属性和关系。你可以在代码中创建对象模型，但\
  \ Xcode 提供了一个对象模型编辑器，让你可以可视化地创建你的应用程序加载和使用的对象模型。\n\n你在应用程序运行期间会使用接下来的两个类。它们是：\n\n\
  *   `NSManagedObjectContext`\n*   `NSManagedObject`\n\n`NSManagedObjectContext`\
  \ 类代表一个托管对象上下文，或者简称为对象上下文。你的应用程序可以使用一个或多个这样的上下文，但通常只会使用一个。对象上下文为对象提供了生存空间，苹果文档将其称为“草稿板”。你在对象上下文中创建对象、从对象上下文中检索对象，并告知对象上下文保存自身。对象上下文负责与持久化存储协调器通信，以实际存储和检索对象。在\
  \ Core Data 应用程序中，你会大量接触到对象上下文。\n\n`NSManagedObject` 类代表一个托管对象，或者说是由 Core Data 管理的对象。你可以将它们视为数据库中的行。托管对象具有由对象模型定义的属性和关系，并使用键值编码（KVC），以便你可以轻松设置和获取它们的数据。你也可以创建\
  \ `NSManagedObject` 的子类，以创建与你的对象模型匹配的属性，以及用于处理托管对象的便捷方法。\n\n图 1-1 展示了 Core Data\
  \ 的各个类以及它们如何协同工作。\n\n![9781430260288_Fig01-01.jpg](img/9781430260288_Fig01-01.jpg)\n\
  \n图 1-1. Core Data 的类\n\n## 创建一个新的 Core Data 项目\n\n\n\n理论与示意图固然能帮助理解事物的工作原理，但真正的代码实践才能将概念转化为扎实的理解。我们已经探讨了理论并看到了示意图，现在让我们看看\
  \ Core Data 的实际应用。在本节中，我们将创建一个从一开始就使用 Core Data 的 Xcode 项目。本章稍后将展示如何向现有项目添加 Core\
  \ Data。\n\n第一个应用程序被命名为 `CoreDataApp`（这个名称没什么创意），它存储具有单个属性 `name` 的 `Person` 对象。该应用程序的界面为空白屏幕，因此你无法与其交互。运行它后，它会在\
  \ SQLite 数据库中创建数据，然后我们可以使用 `sqlite3` 命令行应用程序来浏览该数据库。\n\n## 创建项目\n\n启动 Xcode 并创建一个新的单视图应用程序项目。将其命名为\
  \ `CoreDataApp`，并将组织标识符设置为 `book.persistence`。确保勾选**使用 Core Data** 复选框，如图 1-2 所示，然后创建并保存项目。在本书中，我们主要使用\
  \ Objective-C 作为主要语言，但也会提供 Swift 版本的代码清单。\n\n![9781430260288_Fig01-02.jpg](img/9781430260288_Fig01-02.jpg)\n\
  \n图 1-2. 创建 `CoreDataApp` 项目\n\n## 浏览 Core Data 组件\n\n通过勾选**使用 Core Data** 复选框，你已指示\
  \ Xcode 将 Core Data 框架添加到项目中。如果你选择 Objective-C 作为项目语言，Xcode 已将 Core Data 头文件 `CoreData/CoreData.h`\
  \ 添加到项目的 `AppDelegate.h` 文件中。如果你选择 Swift 作为语言，则会在项目的 `AppDelegate.swift` 文件中找到 `import\
  \ CoreData` 这一行。\n\n你还指示 Xcode 创建一个模型，该模型将在你的应用程序中加载到 `NSManagedObjectModel` 实例中。要查看此模型，请展开\
  \ Xcode 项目导航器中的 `CoreDataApp` 文件夹。你应该会看到一个名为 `CoreDataApp.xcdatamodeld` 的条目，这是一个包含构成项目数据模型的各种工件的目录。当我们构建应用程序时，Xcode\
  \ 会将其编译到应用程序包中名为 `CoreDataApp.momd` 的目录中。该目录将包含 `CoreDataApp` 加载以创建 `NSManagedObjectModel`\
  \ 实例所需的工件。\n\n最后，你已指示 Xcode 在你的应用程序委托类 `AppDelegate` 中创建属性，以实例化 Core Data 堆栈。打开头文件\
  \ `AppDelegate.h`，其内容应与代码清单 1-1 一致。\n\n***代码清单 1-1.*** `AppDelegate.h`\n\n```\n\
  #import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n@interface AppDelegate\
  \ : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
  \ *window;\n\n@property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
  @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
  \n你应该能认出这三个 Core Data 属性：`managedObjectContext`、`managedObjectModel` 和 `persistentStoreCoordinator`。Xcode\
  \ 将它们全部放在应用程序委托类中，这虽然可行，但应用程序委托类往往会变得庞大且难以维护。在本章稍后向现有项目添加 Core Data 时，我们将采用不同的方法，将\
  \ Core Data 堆栈拆分到另一个类中。\n\n你还应该注意到 Xcode 创建的两个用于辅助 Core Data 交互的方法。\n\n```\n- (void)saveContext;\n\
  - (NSURL *)applicationDocumentsDirectory;\n```\n\n`saveContext` 方法为我们提供了一个保存托管对象上下文的中心位置。当然，我们可以从代码中的任何位置保存托管对象上下文，但有一个统一的保存位置可以让我们进行诸如本地化错误处理之类的操作。第\
  \ 4 章将更深入地探讨错误处理。Xcode 在生成的 `saveContext` 方法中生成了一些默认的错误处理，这些处理目前已经足够好用了。最终，`saveContext`\
  \ 方法会通过调用其 `hasChanges` 方法来检查托管对象上下文中是否有任何更改，然后调用 `save`。\n\n正如你所想的那样，`applicationDocumentsDirectory`\
  \ 方法会返回此应用程序的文档目录。持久化存储协调器会调用此方法来确定在文件系统上的哪个位置创建持久化存储。\n\n生成的项目的 Swift 版本当然没有头文件，但它具有相同的属性，以及我们刚刚讨论过的方法声明（`saveContext`\
  \ 和 `applicationDocumentsDirectory:`）的相应调用。源代码没有将 Core Data 堆栈的属性分组在一起，但如果你通读 `AppDelegate.swift`，你会找到它们，它们使用闭包（此处未显示）进行初始化，如代码清单\
  \ 1-2 所示。\n\n***代码清单 1-2.*** `AppDelegate.swift` 中的 Core Data 属性\n\n```\nlazy var\
  \ managedObjectModel: NSManagedObjectModel\nlazy var persistentStoreCoordinator:\
  \ NSPersistentStoreCoordinator?\nlazy var managedObjectContext: NSManagedObjectContext?\n\
  ```\n\n## 初始化 Core Data 组件\n\nXcode 为 Core Data 生成的代码会延迟初始化 Core Data 堆栈，即在其组件首次被访问时才进行初始化。你当然可以在所有\
  \ Core Data 应用程序中使用这种方法，对于 `CoreDataApp`，我们将保留 Xcode 的默认实现。但是，你也可以在应用程序启动时设置 Core\
  \ Data 堆栈。本书中也将使用这种方法。\n\n`CoreDataApp` 的 Core Data 堆栈在你首次访问托管对象上下文（由 `managedObjectContext`\
  \ 属性实例化）时进行初始化。代码清单 1-3 包含了 `managedObjectContext` 的 Objective-C 访问器代码，代码清单 1-4\
  \ 展示了相同的 Swift 版本访问器。\n\n***代码清单 1-3.*** Objective-C 中 `managedObjectContext` 的访问器\n\
  \n```\n// 返回应用程序的托管对象上下文。\n// 如果上下文不存在，则创建它并将其绑定到应用程序的持久化存储协调器。\n- (NSManagedObjectContext\
  \ *)managedObjectContext\n{\n  if (_managedObjectContext != nil) {\n    return _managedObjectContext;\n\
  \  }\n\n  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \  if (coordinator != nil) {\n    _managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n    [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \  }\n  return _managedObjectContext;\n}\n```\n\n***代码清单 1-4.*** Swift 中 `managedObjectContext`\
  \ 的访问器\n\n```\nlazy var managedObjectContext: NSManagedObjectContext? = {\n  //\
  \ 返回应用程序的托管对象上下文（已绑定到应用程序的持久化存储协调器）。此属性是可选的，因为存在合理的错误情况可能导致上下文的创建失败。\n  let coordinator\
  \ = self.persistentStoreCoordinator\n  if coordinator == nil {\n    return nil\n\
  \  }\n  var managedObjectContext = NSManagedObjectContext()\n  managedObjectContext.persistentStoreCoordinator\
  \ = coordinator\n  return managedObjectContext\n}()\n```\n\n\n\n正如 Xcode 生成的注释所证实，访问器会检查\
  \ `managedObjectContext` 属性（合成实例变量为 `_managedObjectContext`）是否已创建。如果已创建，访问器会将其返回。如果尚未创建，则会获取\
  \ `persistentStoreCoordinator` 属性，分配并初始化托管对象上下文，并将其持久化存储协调器设置为获取到的 `persistentStoreCoordinator`。\n\
  \n`persistentStoreCoordinator` 的访问器，如代码清单 1-5（Objective-C）和代码清单 1-6（Swift）所示，执行了它自己的惰性初始化。请注意，我们移除了关于错误处理的长注释，这些内容将在第\
  \ 4 章中介绍。如你所见，这段代码会检查 `persistentStoreCoordinator` 属性（合成实例变量为 `_persistentStoreCoordinator`）是否已创建。如果尚未创建，它会通过将文件名\
  \ `CoreDataApp.sqlite (或 CoreDataAppSwift.sqlite)` 附加到本章前面讨论的 `applicationDocumentsDirectory`\
  \ 辅助方法返回的目录上，来确定持久化存储的 URL（统一资源定位符），并将其存储在 `storeURL` 中。然后，它分配 `persistentStoreCoordinator`\
  \ 属性，使用 `managedObjectModel` 访问器返回的托管对象模型对其进行初始化，并添加一个指向 `storeURL` 中创建的 URL 的持久化存储。\n\
  \n***代码清单 1-5*** `persistentStoreCoordinator` 的 Objective-C 访问器\n\n```\n// 返回应用的持久化存储协调器。\n\
  // 如果协调器尚不存在，则创建它并向其添加应用的存储。\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
  {\n  if (_persistentStoreCoordinator != nil) {\n    return _persistentStoreCoordinator;\n\
  \  }\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  CoreDataApp.sqlite\"];\n\nNSError *error = nil;\n  _persistentStoreCoordinator =\
  \ [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \  if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error]) {\n    /* 注释已删除 */\n\
  \    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n\
  \  }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n***代码清单 1-6*** `persistentStoreCoordinator`\
  \ 的 Swift 访问器\n\n```\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\
  \ = {\n    // 应用的持久化存储协调器。此实现创建并返回一个协调器，并且已经为其添加了应用的存储。此属性是可选的，因为存在一些可能导致创建存储失败的合理错误情况。\n\
  \    // 创建协调器和存储\n    var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:\
  \ self.managedObjectModel)\n    let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  CoreDataAppSwift.sqlite\")\n    var error: NSError? = nil\n    var failureReason\
  \ = \"There was an error creating or loading the application's saved data.\"\n \
  \   if coordinator!.addPersistentStoreWithType(NSSQLiteStoreType, configuration:\
  \ nil, URL: url, options: nil, error: &error) == nil {\n        coordinator = nil\n\
  \        // 报告我们得到的任何错误。\n        let dict = NSMutableDictionary()\n        dict[NSLocalizedDescriptionKey]\
  \ = \"Failed to initialize the application's saved data\"\n        dict[NSLocalizedFailureReasonErrorKey]\
  \ = failureReason\n        dict[NSUnderlyingErrorKey] = error\n        error = NSError(domain:\
  \ \"YOUR_ERROR_DOMAIN\", code: 9999, userInfo: dict)\n        // 将此替换为适当处理错误的代码。\n\
  \        // abort() 会导致应用生成崩溃日志并终止。在生产应用中不应使用此函数，但在开发过程中可能有用。\n        NSLog(\"\
  Unresolved error \\(error), \\(error!.userInfo)\")\n        abort()\n    }\n\nreturn\
  \ coordinator\n}()\n```\n\n我们还需要查看最后一段惰性初始化代码，它位于 `managedObjectModel` 的访问器中，如代码清单\
  \ 1-7（Objective-C）和代码清单 1-8（Swift）所示。与其他访问器类似，如果 `managedObjectModel` 属性（合成实例变量为\
  \ `_managedObjectModel`）已初始化，这段代码会将其返回。否则，代码通过将编译后的托管对象模型的 URL（`CoreDataApp.momd`（`CoreDataAppSwift.momd`））存储在\
  \ `modelURL` 变量中，分配 `managedObjectModel` 属性，并用托管对象模型的 URL 对其进行初始化来执行初始化。\n\n***代码清单\
  \ 1-7*** `managedObjectModel` 的 Objective-C 访问器\n\n```\n// 返回应用的托管对象模型。\n// 如果模型尚不存在，则从应用的模型创建它。\n\
  - (NSManagedObjectModel *)managedObjectModel\n{\n  if (_managedObjectModel != nil)\
  \ {\n    return _managedObjectModel;\n  }\n  NSURL *modelURL = [[NSBundle mainBundle]\
  \ URLForResource:@\"CoreDataApp\" withExtension:@\"momd\"];\n  _managedObjectModel\
  \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n  return _managedObjectModel;\n\
  }\n```\n\n***代码清单 1-8*** `managedObjectModel` 的 Swift 访问器\n\n```\nlazy var managedObjectModel:\
  \ NSManagedObjectModel = {\n    // 应用的托管对象模型。此属性不是可选的。如果应用无法找到并加载其模型，将发生严重错误。\n\
  \    let modelURL = NSBundle.mainBundle().URLForResource(\"CoreDataAppSwift\", withExtension:\
  \ \"momd\")!\n    return NSManagedObjectModel(contentsOfURL: modelURL)!\n}()\n```\n\
  \n惰性初始化方法工作正常，并确保 Core Data 栈的所有组件在需要时都会被初始化。你可以继续在基于 Core Data 的应用中使用此方法。我们将在本章中构建的第二个应用\
  \ `PersistenceApp` 采用了不同的方法：它将所有 Core Data 交互封装在单个类 `Persistence` 中，直接对 Core Data\
  \ 栈进行初始化。在您的 Core Data 应用中，可以随意使用任何一种方法。\n\n## 创建托管对象模型\n\n\n\nXcode 已为我们创建了一个空的对象模型\
  \ `CoreDataApp.xcdatamodeld`（或 `CoreDataAppSwift.xcdatamodeld`），在 Xcode 的项目导航器中选中该文件即可看到（参见图\
  \ 1-3）。\n\n![9781430260288_Fig01-03.jpg](img/9781430260288_Fig01-03.jpg)\n\n图 1-3.\
  \ 空的对象模型\n\n对于 CoreDataApp 应用程序，我们需要创建一个名为 `Person` 的实体，该实体包含一个名为 `name` 的属性。请注意约定：实体名称首字母大写，属性名称首字母小写；这种命名方式并非强制要求，但符合标准编码实践。本书将全程采用此命名方式。\n\
  \n要创建该实体，请点击 Xcode 窗口底部的“添加实体（Add Entity）”按钮。这将创建一个名为 `Entity` 的实体，请将其重命名为 `Person`。然后，点击“属性（Attributes）”下方的\
  \ + 按钮，创建一个名为 `name` 的属性，并将其类型从 `Undefined` 更改为 `String`。此时，你的对象模型应如图 1-4 所示。\n\n\
  ![9781430260288_Fig01-04.jpg](img/9781430260288_Fig01-04.jpg)\n\n图 1-4. 包含 `Person`\
  \ 实体的对象模型\n\nXcode 将编译此对象模型并将其加载到 `managedObjectModel` 属性中。\n\n## 添加一些对象\n\n在运行\
  \ CoreDataApp 应用程序之前，打开 `AppDelegate.m`，在 `application:didFinishLaunchingWithOptions:`\
  \ 方法中添加代码：通过访问 `managedObjectContext` 属性来初始化 Core Data 栈，创建一些托管对象，并保存托管对象上下文。代码清单\
  \ 1-9 展示了更新后的方法。\n\n***代码清单 1-9***. 更新后的 `application:didFinishLaunchingWithOptions:`\
  \ 方法\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n  NSManagedObject *object1 = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Person\" inManagedObjectContext:self.managedObjectContext];\n  [object1 setValue:@\"\
  Tarzan\" forKey:@\"name\"];\n\n  NSManagedObject *object2 = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"Person\" inManagedObjectContext:self.managedObjectContext];\n\
  \  [object2 setValue:@\"Jane\" forKey:@\"name\"];\n\n  [self saveContext];\n\n \
  \ return YES;\n}\n```\n\n如果你使用的是 Swift，请打开 `AppDelegate.swift` 并按照代码清单 1-10 进行更新。\n\
  \n***代码清单 1-10***. 更新后的 `application:didFinishLaunchingWithOptions:` 函数\n\n```\n\
  func application(application: UIApplication!, didFinishLaunchingWithOptions launchOptions:\
  \ NSDictionary!) -> Bool {\n  let object1 = NSEntityDescription.insertNewObjectForEntityForName(\"\
  Person\", inManagedObjectContext: self.managedObjectContext!) as NSManagedObject\n\
  \  object1.setValue(\"Tarzan\", forKey: \"name\")\n\n  let object2 = NSEntityDescription.insertNewObjectForEntityForName(\"\
  Person\", inManagedObjectContext: self.managedObjectContext!) as NSManagedObject\n\
  \  object2.setValue(\"Jane\", forKey: \"name\")\n\n  saveContext()\n\n  return true\n\
  }\n```\n\n这段代码创建了两个新的 `Person` 托管对象 `object1` 和 `object2`，并分别将其 `name` 属性设置为“Tarzan”和“Jane”。请注意，托管对象使用\
  \ Cocoa 的标准 KVC 来设置属性值。你也可以为实体创建包含属性直接访问器的自定义类，从而编写如下代码：\n\n```\nobject1.name =\
  \ @\"Tarzan\";\n```\n\n第 2 章将讨论自定义类。\n\n我们通过将托管对象插入到托管对象上下文（即我们的 `managedObjectContext`\
  \ 属性）中来创建它们。通过访问该属性，我们启动了一条初始化整个 Core Data 栈的链式操作。\n\n创建完两个托管对象后，该代码在向屏幕呈现空白窗口之前，使用\
  \ `saveContext` 辅助方法保存了托管对象上下文。构建并运行应用程序，以在持久化存储中创建托管对象并查看空白窗口。然后停止应用程序。\n\n## 查看数据\n\
  \nCoreDataApp 应用程序没有任何用于显示其持久化存储内容的代码。那么，我们如何验证应用程序确实创建并存储了数据呢？为此，我们直接检查 SQLite\
  \ 数据库文件 `CoreDataApp.sqlite` 或 `CoreDataAppSwift.sqlite`。当你通过 iOS 模拟器运行应用程序时，应用程序会将该文件写入主目录下的某个子目录中。查找该文件的最简单方法是打开终端并输入：\n\
  \n```\nfind ~ -name 'CoreDataApp.sqlite'\n```\n\n找到该文件后，切换到该目录并使用 sqlite3 应用程序打开该文件。\n\
  \n```\nsqlite3 CoreDataApp.sqlite\n```\n\n或者，你可以使用 `find` 命令直接打开该文件：\n\n```\nfind\
  \ ~ -name 'CoreDataApp.sqlite' -exec sqlite3 {} \\;\n```\n\n首先，在 `sqlite>` 提示符下输入\
  \ `.schema` 命令来检查数据库模式。\n\n```\nsqlite> .schema\nCREATE TABLE ZPERSON ( Z_PK INTEGER\
  \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZNAME VARCHAR);\nCREATE TABLE Z_METADATA\
  \ (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255), Z_PLIST BLOB);\nCREATE TABLE\
  \ Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR, Z_SUPER INTEGER, Z_MAX\
  \ INTEGER);\n```\n\n你会看到三个表，其中 `Z_METADATA` 和 `Z_PRIMARYKEY` 是 Core Data 用于数据库管理任务的。第三个表\
  \ `ZPERSON` 用于存储 `Person` 实体。你可以看到它有一个名为 `ZNAME` 的列，类型为 `VARCHAR`，用于存储 `name` 属性。请注意，此模式（包括表名、列名等）是未记录的实现细节，可能会发生变更。你不能依赖这些模式，也不应在任何基于\
  \ Core Data 的应用程序中直接访问 SQLite 数据库。不过，像我们现在所做的这样，仅用于测试目的时，你可以放心地尝试。\n\n让我们验证 CoreDataApp\
  \ 应用程序是否创建并存储了两个 `Person` 托管对象：\n\n```\nsqlite> select * from zperson;\n1|1|1|Tarzan\n\
  2|1|1|Jane\nsqlite> .quit\n```\n\n你可以确认，CoreDataApp 应用程序确实成功使用了 Core Data 框架来创建和存储数据。\n\
  \n## 将 Core Data 添加到现有项目\n\n既然你已经理解了 Core Data 的工作原理，你就会发现将其添加到现有项目是多么容易。只需按照 Xcode\
  \ 在选中“使用 Core Data（Use Core Data）”复选框时所执行的相同步骤操作即可。\n\n- 导入 Core Data 头文件（`CoreData/CoreData.h`），在\
  \ Objective-C 中添加 `@import CoreData`，或在 Swift 中添加 `import CoreData`。\n- 向应用程序添加托管对象模型。\n\
  - 在应用程序中添加代码以初始化 Core Data 栈，并授予对托管对象上下文的访问权限。\n\n你可以模仿 Xcode 生成的用于初始化 Core Data\
  \ 栈的代码，也可以遵循其他模式。本书将同时使用这两种方法。无论采用何种方式，基本步骤都是相同的。\n\n## 创建一个不使用 Core Data 的应用程序\n\
  \n要将 Core Data 添加到现有应用程序中，我们首先必须有一个不含 Core Data 的应用程序作为目标。使用单视图应用程序模板创建一个新的 Xcode\
  \ 项目，并将其命名为 `PersistenceApp`。请务必取消选中“使用 Core Data（Use Core Data）”复选框（参见图 1-5）。\n\
  \n![9781430260288_Fig01-05.jpg](img/9781430260288_Fig01-05.jpg)\n\n图 1-5. 创建 `PersistenceApp`\
  \ 项目\n\n## 添加 Core Data 框架\n\n\n\n你的应用程序必须链接到 Core Data 框架（即`CoreData.framework`），才能使用\
  \ Core Data 类。过去，将 Core Data 框架添加到项目中需要多次鼠标点击，但 Xcode 的最新更新引入了模块导入的概念。要链接 Core Data\
  \ 框架，只需在需要访问 Objective-C 项目中的 Core Data 类时添加`@import CoreData;`指令，或在 Swift 项目中添加`import\
  \ CoreData`。Xcode 将完成其余链接工作。\n\n### 添加托管对象模型\n\n基于 Core Data 的应用程序需要一个托管对象模型，因此使用\
  \ Core Data 的“数据模型”模板向`PersistenceApp`组添加一个新文件。是的，即使 Xcode 也将其称为数据模型，而非托管对象模型。你可以随意命名该模型；只需在创建持久化存储时匹配该名称即可。但按照惯例，将其命名为`PersistenceApp.xcdatamodeld`。完成后，你将拥有一个空的\
  \ Core Data 模型，名为`PersistenceApp.xcdatamodeld`，如图 1-6 所示。\n\n![9781430260288_Fig01-06.jpg](img/9781430260288_Fig01-06.jpg)\n\
  \n图 1-6\\. 空的`PersistenceApp.xcdatamodeld`托管对象模型\n\n我们稍后将向该模型添加实体和属性。目前，我们继续专注于添加应用程序中使用\
  \ Core Data 所需的一切。\n\n### 添加并初始化 Core Data 堆栈\n\n对于`PersistenceApp`应用程序，我们将把所有 Core\
  \ Data 相关的内容放入一个单独的类`Persistence`中，并在`AppDelegate`类中添加该类的实例作为属性。这将使我们能够保持`AppDelegate`类的代码更简洁，并为\
  \ Core Data 访问提供清晰的接口。\n\n使用 Source 的 Cocoa Touch Class 模板在`PersistenceApp`组中创建一个新文件，将其命名为`Persistence`，并使其成为`NSObject`的子类。现在，如果你是用\
  \ Objective-C 实现，则需将 Core Data 属性和辅助方法声明添加到`Persistence.h`中，如代码清单 1-11 所示。\n\n***代码清单\
  \ 1-11***\\. `Persistence.h`\n\n```\n#import <Foundation/Foundation.h>\n@import\
  \ CoreData;\n\n@interface Persistence : NSObject\n\n@property (readonly, strong,\
  \ nonatomic) NSManagedObjectContext *managedObjectContext;\n@property (readonly,\
  \ strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property (readonly,\
  \ strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
  \n在实现文件`Persistence.m`中，添加两个辅助方法的实现，它们与 Xcode 生成的版本没有太大差异，如代码清单 1-12 所示。\n\n***代码清单\
  \ 1-12***\\. `Persistence.m`中的辅助方法实现\n\n```\n- (void)saveContext {\n  NSError *error;\n\
  \  if ([self.managedObjectContext hasChanges] && ![self.managedObjectContext save:&error])\
  \ {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n\
  \  }\n}\n\n- (NSURL *)applicationDocumentsDirectory {\n  return [[[NSFileManager\
  \ defaultManager] URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask]\
  \ lastObject];\n}\n```\n\n注意，我们在保存前没有检查`managedObjectContext`属性是否为`nil`，因为我们将在`Persistence`实例初始化时创建它，所以我们知道它不会是`nil`。不过，我们目前仍保留了这种简单的错误处理方式。\n\
  \n要初始化 Core Data 堆栈，请添加`init`的实现，该实现创建托管对象模型、持久化存储协调器和托管对象上下文，如代码清单 1-13 所示。\n\n\
  ***代码清单 1-13***\\. 在`Persistence.m`中初始化 Core Data 堆栈\n\n```\n- (id)init {\n  self\
  \ = [super init];\n  if (self != nil) {\n    // Initialize the managed object model\n\
  \    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"PersistenceApp\"\
  \ withExtension:@\"momd\"];\n    _managedObjectModel = [[NSManagedObjectModel alloc]\
  \ initWithContentsOfURL:modelURL];\n\n// Initialize the persistent store coordinator\n\
  \    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  PersistenceApp.sqlite\"];\n\nNSError *error = nil;\n    _persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:self.managedObjectModel];\n\
  \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
  \                                                  configuration:nil\n         \
  \                                                   URL:storeURL\n             \
  \                                           options:nil\n                      \
  \                                    error:&error]) {\n      NSLog(@\"Unresolved\
  \ error %@, %@\", error, [error userInfo]);\n      abort();\n    }\n\n// Initialize\
  \ the managed object context\n    _managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n    [_managedObjectContext setPersistentStoreCoordinator:self.persistentStoreCoordinator];\n\
  \    }\n  return self;\n}\n```\n\n在第 9 章中，我们将修改此方法以使用线程来获得更好的性能，但目前我们在主线程上执行所有初始化。\n\
  \n要完成 Core Data 堆栈的初始化，我们向应用程序委托添加一个`Persistence`属性，并在应用程序加载时创建它。打开`AppDelegate.h`，添加`Persistence`的前向声明，并添加该属性，使文件与代码清单\
  \ 1-14 匹配。\n\n***代码清单 1-14***\\. `AppDelegate.h`\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class Persistence;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
  \ Persistence *persistence;\n\n@end\n```\n\n接下来，打开`AppDelegate.m`并添加对`Persistence.h`的导入：\n\
  \n```\n#import \"Persistence.h\"\n```\n\n作为初始化 Core Data 堆栈的最后一步，在`application:didFinishLaunchingWithOptions`方法中分配并初始化`persistence`属性。此方法现在应与代码清单\
  \ 1-15 匹配。\n\n***代码清单 1-15***\\. 分配并初始化`persistence`属性\n\n```\n- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
  \  self.persistence = [[Persistence alloc] init];\n  return YES;\n}\n```\n\n如果你正在用\
  \ Swift 构建此项目，你的工作遵循相同的模式，尽管没有头文件。在你的`Persistence`类中，为托管对象上下文添加一个变量。我们将在此托管对象上下文变量的闭包中完成所有初始化。你还需添加用于保存上下文和获取应用程序文档目录的辅助方法。代码清单\
  \ 1-16 显示了更新后的`Persistence.swift`文件，代码清单 1-17 显示了`AppDelegate.swift`中用于创建`Persistence`实例的补充。请注意，Core\
  \ Data 堆栈将在我们创建`Persistence`实例时初始化；如果希望改为在首次访问托管对象上下文时初始化 Core Data，我们只需在托管对象上下文变量上添加`@lazy`注解。\n\
  \n***代码清单 1-16***\\. 为 Core Data 更新的`Persistence.swift`\n\n```\nimport Foundation\n\
  import CoreData\n\nclass Persistence: NSObject {\n```\n\n\n\n`var managedObjectContext:\
  \ NSManagedObjectContext? = {\n    // 初始化托管对象模型\n    let modelURL = NSBundle.mainBundle().URLForResource(\"\
  PersistenceAppSwift\", withExtension: \"momd\")!\n    let managedObjectModel = NSManagedObjectModel(contentsOfURL:\
  \ modelURL)\n\n    // 初始化持久化存储协调器\n    let storeURL = Persistence.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  PersistenceAppSwift.sqlite\")\n    var error: NSError? = nil\n    let persistentStoreCoordinator\
  \ = NSPersistentStoreCoordinator(managedObjectModel: managedObjectModel!)\n    if\
  \ persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType, configuration:\
  \ nil, URL: storeURL, options: nil, error: &error) == nil {\n        abort()\n \
  \   }\n\n    // 初始化托管对象上下文\n    var managedObjectContext = NSManagedObjectContext()\n\
  \    managedObjectContext.persistentStoreCoordinator = persistentStoreCoordinator\n\
  \n    return managedObjectContext\n}()\n\nfunc saveContext() {\n    var error: NSError?\
  \ = nil\n\n    if {\n        if managedObjectContext.hasChanges && !managedObjectContext.save(&error)\
  \ {\n            abort()\n        }\n    }\n}\n\nclass var applicationDocumentsDirectory:\
  \ NSURL {\n    let urls = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory,\
  \ inDomains: .UserDomainMask)\n    return urls[urls.endIndex-1] as NSURL\n}\n```\n\
  \n**代码清单 1-17** 更新后的 `AppDelegate.swift`\n\n```\nimport UIKit\nimport CoreData\n\
  \n@UIApplicationMain\nclass AppDelegate: UIResponder, UIApplicationDelegate {\n\n\
  \    var window: UIWindow?\n    var persistence: Persistence?\n\n    func application(application:\
  \ UIApplication!, didFinishLaunchingWithOptions launchOptions: NSDictionary!) ->\
  \ Bool {\n        persistence = Persistence()\n        return true\n    }\n    /*\
  \ 代码已省略 */\n}\n```\n\n现在，Core Data 堆栈会在应用运行时正确初始化，但由于没有对象模型或其中的任何对象，我们无法真正看到其效果。下一步是创建一个对象模型。\n\
  \n## 创建对象模型\n\n到目前为止，我们已经将 Core Data 的所有部分添加到了应用中——如果当初勾选了“使用 Core Data”复选框，Xcode\
  \ 本会替我们完成这些操作。对于手动添加 Core Data 的应用，你需要以与勾选了 Xcode 的“使用 Core Data”复选框时相同的方式创建对象模型。\n\
  \n对于 `PersistenceApp`，我们需要存储具有名称和价格的小工具。在 Xcode 的项目导航器中打开对象模型 `PersistenceApp.xcdatamodeld`，并添加一个名为\
  \ `Gadget` 的实体，其中包含一个名为 `name` 的 `String` 类型属性和一个名为 `price` 的 `Float` 类型属性。你的数据模型应与图\
