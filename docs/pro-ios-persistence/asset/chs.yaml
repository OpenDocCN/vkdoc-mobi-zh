  \ iCloud 同步文件的组件。它是 iCloud 数据的本地表现形式，位于应用沙盒之外的文件系统中。通过设置此选项，你告诉 Core Data 持久化存储文件位于\
  \ ubiquity 容器中，因此会与 iCloud 同步。\n\n如果你之前启动过 `iCloudApp`，请从 iPhone 模拟器中删除它，以便移除所有\
  \ SQLite 数据库文件。然后启动应用。你会注意到变化不大——它正常启动了。然而，不同之处在于数据存储文件的位置。如果你打开终端应用并导航到应用的 `Documents`\
  \ 文件夹，你会发现没有 `iCloudApp.sqlite` 文件。\n\n取而代之的是一个 `CoreDataUbiquitySupport` 目录，这是\
  \ iOS 为将你的文件附加到 ubiquity 容器而创建的。如果你导航浏览此目录，你会发现你的 SQLite 文件深藏于文件结构中。\n\n```\nfind\
  \ \"$HOME/Library/Developer/CoreSimulator\" -name \"iCloudApp.sqlite\"\n```\n\n\
  ### 同步内容\n\n至此，我们有了一个将数据存储保存在 iCloud 中的应用。这对于备份数据来说是个很好的解决方案，但如果你在多台设备上使用应用，则效果不佳。不幸的是，云只会保留你最后使用的那台设备保存的数据，可能会覆盖你其他设备保存的数据。\n\
  \n为了让你的代码跨设备同步数据，你需要订阅 Core Data 为 iCloud 同步发送的通知。表 8-1 列出了这些通知。\n\n### 表 8-1. 可用的通知类型\n\
  \n| **通知类型** | **描述** |\n| --- | --- |\n| `NSPersistentStoreUbiquitousTransitionTypeAccountAdded`\
  \ | 当应用运行时添加了新的 iCloud 账户时发送。这有助于将存储迁移到新账户。 |\n| `NSPersistentStoreUbiquitousTransitionTypeAccountRemoved`\
  \ | 当应用运行时从设备移除了现有 iCloud 账户时发送。这告诉你持久化存储正在过渡到本地存储。 |\n| `NSPersistentStoreUbiquitousTransitionTypeContentRemoved`\
  \ | 当用户清除了 iCloud 账户的内容时发送，通常是通过设置中的“文稿与数据”使用“删除全部”操作。Core Data 集成将因此过渡到一个空的存储文件。\
  \ |\n| `NSPersistentStoreUbiquitousTransitionTypeInitialImportCompleted` | 当 Core\
  \ Data 完成构建与 iCloud 账户内容一致的存储文件时发送。 |\n\n你可以通过使用存储通知，确保你的应用能响应 iCloud 的变化，从而正确合并所有内容。\n\
  \n打开 `AppDelegate.m` 或 `AppDelegate.swift`，在创建持久化存储之后、将其添加到协调器之前，立即向 `persistentStoreCoordinator`\
  \ 方法中添加适当的通知。该方法应如列表 8-5（Objective-C）或列表 8-6（Swift）所示。\n\n\n\n### **清单 8-5**. 将\
  \ iCloud 通知添加到 `persistentStoreCoordinator` 方法（Objective-C）\n\n```\n...\n_persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  iCloudApp.sqlite\"];\nNSError *error = nil;\nNSString *failureReason = @\"There\
  \ was an error creating or loading the application's saved data.\";\n\n// iCloud\
  \ notification subscriptions\nNSNotificationCenter *notificationCenter = [NSNotificationCenter\
  \ defaultCenter];\n[notificationCenter addObserver:self selector:@selector(storeWillChange:)\
  \ name:NSPersistentStoreCoordinatorStoresWillChangeNotification object:_persistentStoreCoordinator];\n\
  [notificationCenter addObserver:self selector:@selector(storeDidChange:) name:NSPersistentStoreCoordinatorStoresDidChangeNotification\
  \ object:_persistentStoreCoordinator];\n[notificationCenter addObserver:self selector:@selector(storeDidImportUbiquitousContentChanges:)\
  \ name:NSPersistentStoreDidImportUbiquitousContentChangesNotification object:_persistentStoreCoordinator];\n\
  \nif (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:@{ NSPersistentStoreUbiquitousContentNameKey\
  \ : @\"iCloudApp\" } error:&error]) {\n...\n```\n\n### **清单 8-6**. 将 iCloud 通知添加到\
  \ `persistentStoreCoordinator` 函数（Swift）\n\n```\n...\nvar coordinator: NSPersistentStoreCoordinator?\
  \ = NSPersistentStoreCoordinator(managedObjectModel: self.managedObjectModel)\n\
  let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"iCloudAppSwift.sqlite\"\
  )\nvar error: NSError? = nil\nvar failureReason = \"There was an error creating\
  \ or loading the application's saved data.\"\n\nlet notificationCenter = NSNotificationCenter.defaultCenter()\n\
  notificationCenter.addObserver(self, selector: \"storeWillChange:\", \n    name:\
  \ NSPersistentStoreCoordinatorStoresWillChangeNotification, \n    object: coordinator!)\n\
  notificationCenter.addObserver(self, selector: \"storeDidChange:\", \n    name:\
  \ NSPersistentStoreCoordinatorStoresDidChangeNotification, \n    object: coordinator!)\n\
  notificationCenter.addObserver(self, selector: \"storeDidImportUbiquitousContentChanges:\"\
  , \n    name: NSPersistentStoreDidImportUbiquitousContentChangesNotification, \n\
  \    object: coordinator!)\n\nlet options = [NSPersistentStoreUbiquitousContentNameKey:\
  \ \"iCloudAppSwift\"]\nif coordinator!.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: url, options: options, error: &error) == nil {\n...\n\
  ```\n\n当然，你必须创建通知选择器所引用的三个新方法，以消除编译警告（并最终避免运行时异常）。仍在 `AppDelegate.m` 或 `AppDelegate.swift`\
  \ 中，添加**清单 8-7**（Objective-C）或**清单 8-8**（Swift）中所示的方法。\n\n### **清单 8-7**. 处理 iCloud\
  \ 通知（Objective-C）\n\n```\n- (void)storeDidImportUbiquitousContentChanges:(NSNotification*)notification\
  \ {\n}\n\n- (void)storeWillChange:(NSNotification*)notification {\n}\n\n- (void)storeDidChange:(NSNotification*)notification\
  \ {\n}\n```\n\n### **清单 8-8**. 处理 iCloud 通知（Swift）\n\n```\nfunc storeDidImportUbiquitousContentChanges(notification:\
  \ NSNotification) {\n}\n\nfunc storeWillChange(notification: NSNotification) {\n\
  }\n\nfunc storeDidChange(notification: NSNotification) {\n}\n```\n\n当然，让这些方法保持为空不会有什么实际作用。在下一节中，我们将完善这些方法，以从\
  \ iCloud 合并内容。\n\n## 合并来自 iCloud 的内容\n\n当其他使用与你当前设备相同 iCloud 帐户的设备上的数据发生更改时，应用程序需要知道并能够将来自云端的新内容与其当前内容合并。其当前内容也可能包括\
  \ iCloud 尚不了解的新创建内容。你在 `NSPersistentStoreDidImportUbiquitousContentChangesNotification`\
  \ 通知的处理程序中合并设备与 iCloud 之间的更改。按**清单 8-9**（Objective-C）或**清单 8-10**（Swift）所示修改 `storeDidImportUbiquitousContentChanges`\
  \ 方法以执行合并。\n\n### **清单 8-9**. 为 iCloud 同步更新的 `storeDidImportUbiquitousContentChanges`\
  \ 方法（Objective-C）\n\n```\n- (void)storeDidImportUbiquitousContentChanges:(NSNotification*)notification\
  \ {\n    NSLog(@\"%@\", notification.userInfo.description);\n\nNSManagedObjectContext\
  \ *moc = self.managedObjectContext;\n    [moc performBlock:^{\n        // Merge\
  \ the content\n        [moc mergeChangesFromContextDidSaveNotification:notification];\n\
  \    }];\n\ndispatch_async(dispatch_get_main_queue(), ^{\n        // Refresh the\
  \ UI here\n    });\n}\n```\n\n### **清单 8-10**. 为 iCloud 同步更新的 `storeDidImportUbiquitousContentChanges`\
  \ 函数（Swift）\n\n```\nfunc storeDidImportUbiquitousContentChanges(notification: NSNotification)\
  \ {\n    print(\"did import: \\(notification.userInfo?.description)\")\n\nif let\
  \ moc = self.managedObjectContext {\n        moc.performBlock({ () -> Void in\n\
  \            // Merge the content\n            moc.mergeChangesFromContextDidSaveNotification(notification)\n\
  \        })\n\ndispatch_async(dispatch_get_main_queue()) {\n            // Refresh\
  \ UI here\n        }\n    }\n}\n```\n\n在此方法中，我们只需在托管对象上下文上调用 `mergeChangesFromContextDidSaveNotification:`，让\
  \ Core Data 处理合并。我们使用 `performBlock:` 方法执行此操作，以便在上下文的队列上异步执行更改，而不是在主队列上执行，以免降低用户界面的响应能力。\n\
  \n最后，如有必要，我们可以刷新用户界面（UI）。如果您的应用程序正在显示的视图需要修改，因为它们所显示的数据依赖于已更改的数据，那么这里是调用 UI 刷新的好地方。\n\
  \n## 处理 iCloud 帐户更改\n\n如果您的应用程序在 iCloud 配置发生更改时正在运行（例如，如果您启用了 iCloud），那么您应该处理配置更改可能导致的潜在更改。为了处理此类更改，请对指示持久化存储更改的通知做出反应，这些更改位于\
  \ `storeWillChange:` 和 `storeDidChange:` 方法内部。按**清单 8-11**（Objective-C）或**清单 8-12**（Swift）所示更新这些方法中的代码。\n\
  \n### **清单 8-11**. 处理 iCloud 帐户更改（Objective-C）\n\n```\n- (void)storeWillChange:(NSNotification\
  \ *)notification {\n    NSLog(@\"%@\", notification.userInfo.description);\n   \
  \ NSManagedObjectContext *moc = self.managedObjectContext;\n    [moc performBlockAndWait:^{\n\
  \        NSError *error = nil;\n        if ([moc hasChanges]) {\n            [moc\
  \ save:&error];\n        }\n\n[moc reset];\n    }];\n\n// This is a good place to\
  \ let your UI know it needs to get ready\n    // to adjust to the change and deal\
  \ with new data. This might include\n    // invalidating UI caches, reloading data,\
  \ resetting views, etc...\n}\n\n- (void)storeDidChange:(NSNotification *)notification\
  \ {\n    NSLog(@\"%@\", notification.userInfo.description);\n    // At this point\
  \ it's official, the change has happened. Tell your\n    // user interface to refresh\
  \ itself\n    dispatch_async(dispatch_get_main_queue(), ^{\n        // Refresh the\
  \ UI here\n    });\n}\n```\n\n\n\n***列表 8-12***. 处理 iCloud 账户的变更 (Swift)\n\n```\n\
  func storeWillChange(notification: NSNotification) {\n    print(\"will change: \\\
  (notification.userInfo?.description)\")\n    if let moc = self.managedObjectContext\
  \ {\n        moc.performBlockAndWait({ () -> Void in\n            var error: NSError?\
  \ = nil\n            if moc.hasChanges {\n                moc.save(&error)\n            }\n\
              moc.reset()\n        })\n    }\n}\n\nfunc storeDidChange(notification:\
  \ NSNotification) {\n    print(\"did change: \\(notification.userInfo?.description)\"\
  )\n    // 此时已确定，变更已经发生。请告知你的用户界面进行自我刷新\n    dispatch_async(dispatch_get_main_queue())\
  \ {\n        NSFetchedResultsController.deleteCacheWithName(\"Master\")\n        //\
  \ 在此处刷新 UI\n    }\n}\n```\n\n尽早为变更准备好 UI 通常更好，这样可以减少实际应用刷新所需的时间。因此，通知被分解为两个你可能已经熟悉的阶段（即将发生变更和已经发生变更）。\n\
  \n在我们的 `storeWillChange:` 实现中，我们保存托管对象上下文（如果它有变更），然后重置其状态，这会丢弃所有托管对象。这时，你就可以准备让你的\
  \ UI 进行变更了。\n\n在我们的 `storeDidChange:` 实现中，我们异步更新 UI。\n\n你的代码现在已经准备好处理 iCloud 集成了。在将应用程序提交给\
  \ Apple 之前，你需要在应用中添加 iCloud 授权。你可以在 Xcode 中通过选择项目并转到“Capabilities”选项卡来完成此操作。在该选项卡中，你会看到\
  \ iCloud 部分，旁边有一个开关。打开该开关，如图 8-2 所示，即可向你的应用添加 iCloud 授权。\n\n![9781430260288_Fig08-02.jpg](img/9781430260288_Fig08-02.jpg)\n\
  \n图 8-2. 添加 iCloud 授权\n\n## 与 Dropbox Datastore API 集成\n\n在 iOS 上，通常很关注与 iCloud\
  \ 集成以实现持久化。然而，根据你的应用和目标受众，其他解决方案可能更适合你。Dropbox 发布了其 Datastore 应用程序编程接口 (API)，允许你将它的云服务用作通用的数据存储。与\
  \ iCloud 相比，使用 Dropbox 的一个明显优势是 Dropbox 拥有适用于多个平台的 API。Dropbox Datastore API 的功能不像\
  \ Core Data。它不打算充当在资源之间创建链接的关系数据库。相反，它是一个简单的键/值对存储，非常类似于 NoSQL 数据库，如 MongoDB 或 Cassandra。一个基本的特性是它允许你在没有模式（schema）的情况下工作，因此你无需过多担心模式更新和迁移。\n\
  \n### 设置 API 访问权限\n\n对于 iOS，设置说明位于 `www.dropbox.com/developers/datastore/sdks/ios`。在你的应用中设置\
  \ Dropbox 的第一步是在 Dropbox 网站上创建一个 Dropbox 应用。登录到你的 Dropbox 账户，然后转到 `www.dropbox.com/developers/apps`\
  \ 创建一个新应用。选择 **Dropbox API 应用** 和 **仅数据存储（Datastores only）**，然后为你的应用选择一个名称。对于名称，请确保不要违反\
  \ Dropbox 品牌指南。特别是，不要在应用名称中使用“Dropbox”或类似名称。该名称在所有 Dropbox 应用中必须是唯一的，因此你必须选择一个不同于“iOSPersistenceApp”的名称，这是我们选择的名称（参见图\
  \ 8-3）。\n\n![9781430260288_Fig08-03.jpg](img/9781430260288_Fig08-03.jpg)\n\n图 8-3.\
  \ 创建一个 Dropbox 应用程序\n\n创建应用后，下一个屏幕会显示你的应用密钥（app key）和应用密码（app secret），你的应用代码中需要这些信息才能与\
  \ Dropbox 通信。应用密码，顾名思义，应予以保密。\n\n我们现在可以创建新应用了。\n\n### 创建一个用于 Dropbox 的空白应用\n\n既然我们正在尝试使用\
  \ Dropbox 作为持久化框架，我们将暂时离开 Core Data。\n\n1.  在 Xcode 中，创建一个名为 DropboxPersistenceApp\
  \ 的新“单视图应用”，并且不要选中“Core Data”复选框。\n2.  Xcode 创建好应用后，将 Dropbox 框架添加到应用中。为此，请从 Dropbox\
  \ 网站 (`www.dropbox.com/developers/datastore/sdks/ios`) 下载它，并将下载的文件解压到一个临时目录。然后，将\
  \ `Dropbox.framework` 拖放到你的 Xcode 项目中，放到 Products 文件夹下方。\n3.  在出现的表单中，在点击“完成”之前，务必勾选\
  \ **如果需要，拷贝项目（Copy items if needed）**。\n4.  然后，将 Dropbox SDK 所需的其他框架添加到你的项目中：`CFNetwork.framework`、`Security.framework`、`SystemConfiguration.framework`、`QuartzCore.framework`、`libc++.dylib`\
  \ 和 `libz.dylib`。\n\n你的项目结构应该类似于图 8-4。\n\n![9781430260288_Fig08-04.jpg](img/9781430260288_Fig08-04.jpg)\n\
  \n图 8-4. 向应用添加 Dropbox 框架\n\n### 配置回调 URL\n\n为了使你的应用能够针对 Dropbox 进行身份验证，你的应用会将控制权交给\
  \ Dropbox SDK 提供的 Dropbox 身份验证控制器。此身份验证控制器显示 Dropbox 登录屏幕，并在成功验证用户身份后，通过统一资源定位符\
  \ (URL) 回调的方式将控制权返回给你的应用。你的应用必须将其自身注册为该 URL 方案（scheme）的处理程序，以便 iOS 能够正确地将控制权交还给你的应用。\n\
  \n要将你的应用注册为 URL 方案的处理程序，请转到 Xcode，在“TARGETS”下选择你的项目，然后转到“Info”选项卡。展开“URL Types”部分，然后按\
  \ + 按钮创建一个新的 URL 类型。在“URL Schemes”字段中，输入 **db-应用密钥**，但要将“应用密钥”替换为 Dropbox 在创建应用时提供给你的应用密钥。它看起来应该像\
  \ **db-vp4jwudouxvhzz9**。保持其他字段不变。当你的应用安装后（无论是在模拟器还是真实设备上），它都会正确地进行注册。\n\n### 使用\
  \ Datastore API 链接到 Dropbox\n\n为了让你的代码使用 Dropbox Datastore API，它必须初始化存储管理器，即一个 `DBStoreManager`\
  \ 实例。在你的应用委托中执行此初始化是一个好地方。如果你是用 Objective-C 构建此项目，请打开 `AppDelegate.m` 并添加两个导入指令：\n\
  \n```\n#import \"TargetConditionals.h\"\n#import <Dropbox/Dropbox.h>\n```\n\n然后编辑\
  \ `application: didFinishLaunchingWithOptions:` 方法以添加 Dropbox Datastore 初始化。列表 8-13\
  \ 展示了 Objective-C 版本，列表 8-14 展示了 Swift 版本。\n\n***列表 8-13***. 初始化 Dropbox Datastore\
  \ API (Objective-C)\n\n```\nDBAccountManager *accountManager = [[DBAccountManager\
  \ alloc]\n                                   initWithAppKey:@\"应用密钥\" secret:@\"\
  应用密码\"];\n[DBAccountManager setSharedManager:accountManager];\n```\n\n***列表 8-14***.\
  \ 初始化 Dropbox Datastore API (Swift)\n\n```\nlet accountManager = DBAccountManager(appKey:\
  \ \"应用密钥\", secret: \"应用密码\")\nDBAccountManager.setSharedManager(accountManager)\n\
  ```\n\n请务必将 `应用密钥` 和 `应用密码` 替换为你在 Dropbox 网站上创建应用时由 Dropbox 提供的值。\n\n完成此配置后，我们需要考虑让用户通过应用链接其\
  \ Dropbox 账户。我们通过在视图控制器中提供以下机制来实现用户链接 Dropbox 的功能：\n\n\n\n1.  在 `ViewController.h`\
  \ 中（如果使用 Objective-C 实现），按照代码清单 8-15 所示，添加用于处理点击以启动 Dropbox 登录窗口的方法声明。\n2.  按照代码清单\
  \ 8-16（Objective-C）或代码清单 8-17（Swift），在 `ViewController.m` 或 `ViewController.swift`\
  \ 中实现该方法。此外，对于 Objective-C 版本，在 `ViewController.m` 中添加对 `\"TargetConditionals.h\"\
  ` 和 `<Dropbox/Dropbox.h>` 的导入语句。\n3.  在 Interface Builder 中，向 `Main.storyboard`\
  \ 的应用程序视图添加一个标签为“Link to Dropbox”的按钮，并通过 Touch Up Inside 事件将其连接到 `didPressLink`\
  \ 方法。\n\n***代码清单 8-15*** 在 `ViewController.h` 中声明事件处理器\n```objc\n- (IBAction)didPressLink;\n\
  ```\n\n***代码清单 8-16*** 处理按钮点击以登录 Dropbox（Objective-C）\n```objc\n- (IBAction)didPressLink\
  \ {\n  DBAccount *linkedAccount = [[DBAccountManager sharedManager] linkedAccount];\n\
  \  if (linkedAccount) {\n    NSLog(@\"App already linked\");\n  }\n  else {\n  \
  \  [[DBAccountManager sharedManager] linkFromController:self];\n  }\n}\n```\n\n\
  ***代码清单 8-17*** 处理按钮点击以登录 Dropbox（Swift）\n```swift\n@IBAction func didPressLink(sender:\
  \ AnyObject) {\n    if let linkedAccount = DBAccountManager.sharedManager().linkedAccount\
  \ {\n        println(\"App already linked\")\n    }\n    else {\n        DBAccountManager.sharedManager().linkFromController(self)\n\
  \    }\n}\n```\n\n现在你可以启动应用。启动后，点击“Link to Dropbox”按钮，Dropbox 登录界面就会出现。你可以使用自己的\
  \ Dropbox 凭据登录（注意，如果你在 Dropbox 中设置了双重认证，此界面也能处理），然后控制权将返回给我们的应用。不幸的是，当控制权从 Dropbox\
  \ 登录界面返回时，我们的应用并不知道该如何处理。这是因为 Dropbox 登录界面正在对我们的应用执行回调，并且该回调是通过我们之前设置的 URL 完成的。我们必须指示我们的应用处理该回调并从该\
  \ URL 打开。为此，需要在 `AppDelegate.m` 或 `AppDelegate.swift` 中实现 `application:openURL:sourceApplication:annotation:`\
  \ 方法，如代码清单 8-18（Objective-C）或代码清单 8-19（Swift）所示。\n\n***代码清单 8-18*** 在 `AppDelegate.m`\
  \ 中处理 URL 回调\n```objc\n- (BOOL)application:(UIApplication *)application openURL:(NSURL\
  \ *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\
  \ {\n  DBAccount *account = [[DBAccountManager sharedManager] handleOpenURL:url];\n\
  \  if (account) {\n    NSLog(@\"App linked successfully from %@\", sourceApplication);\n\
  \    return YES;\n  }\n  return NO;\n}\n```\n\n***代码清单 8-19*** 在 `AppDelegate.swift`\
  \ 中处理 URL 回调\n```swift\nfunc application(application: UIApplication, openURL url:\
  \ NSURL, sourceApplication: String, annotation: AnyObject?) -> Bool {\n    let account\
  \ = DBAccountManager.sharedManager().handleOpenURL(url)\n    if let account = account\
  \ {\n        println(\"App linked successfully from \\(sourceApplication)\")\n \
  \       return true\n    }\n    return false\n}\n```\n\n此时，你需要更新 UI 以显示 Dropbox\
  \ 账户已链接，并准备好应用程序以启用 Dropbox 连接。我们将在下一节中执行此操作。\n\n## 使用 Dropbox API 创建和同步数据\n\n现在我们的应用已链接到\
  \ Dropbox，接下来使用 Dropbox Persistence API 做一些事情。在 `ViewController.h` 中（针对 Objective-C\
  \ 版本）声明一个按钮属性，如代码清单 8-20 所示，然后在 Interface Builder 中将其连接到“Link to Dropbox”按钮。这样，我们就可以适当地更改其文本以反映\
  \ Dropbox 的连接状态。\n\n***代码清单 8-20*** 在 `ViewController.h` 中声明按钮\n```objc\n@property\
  \ (weak, nonatomic) IBOutlet UIButton *theButton;\n```\n\n在 `AppDelegate.m` 或 `AppDelegate.swift`\
  \ 中，修改 `application:openURL:sourceApplication:annotation:` 方法，使其看起来像代码清单 8-21（Objective-C）或代码清单\
  \ 8-22（Swift），以便在成功链接到 Dropbox 后将按钮的文本设置为“Store”。对于 Objective-C 的 `AppDelegate.m`，请添加对\
  \ `ViewController.h` 的导入。\n\n***代码清单 8-21*** 在 `AppDelegate.m` 中将按钮标题设置为“Store”\n\
  ```objc\n- (BOOL)application:(UIApplication *)application openURL:(NSURL *)url sourceApplication:(NSString\
  \ *)sourceApplication annotation:(id)annotation {\n  DBAccount *account = [[DBAccountManager\
  \ sharedManager] handleOpenURL:url];\n  if (account) {\n    NSLog(@\"App linked\
  \ successfully from %@\", sourceApplication);\n\n    ViewController *rvc = (ViewController*)self.window.rootViewController;\n\
  \    [rvc.theButton setTitle:@\"Store\" forState:UIControlStateNormal];\n\n    return\
  \ YES;\n  }\n  return NO;\n}\n```\n\n***代码清单 8-22*** 在 `AppDelegate.swift` 中将按钮标题设置为“Store”\n\
  ```swift\nfunc application(application: UIApplication, openURL url: NSURL, sourceApplication:\
  \ String, annotation: AnyObject?) -> Bool {\n    let account = DBAccountManager.sharedManager().handleOpenURL(url)\n\
  \    if let account = account {\n        println(\"App linked successfully from\
  \ \\(sourceApplication)\")\n\n        let controller = self.window?.rootViewController\
  \ as? ViewController\n        controller?.theButton?.setTitle(\"Store\", forState:\
  \ .Normal)\n\n        return true\n    }\n    return false\n}\n```\n\n然后，为了保持一致性，编辑\
  \ `ViewController.m` 或 `ViewController.swift` 中的 `viewDidLoad` 方法，将按钮的标签设置为当前链接状态，如代码清单\
  \ 8-23（Objective-C）或代码清单 8-24（Swift）所示。\n\n***代码清单 8-23*** 在 `ViewController.m`\
  \ 中设置按钮文本\n```objc\n- (void)viewDidLoad {\n  [super viewDidLoad];\n\n  if ([[DBAccountManager\
  \ sharedManager] linkedAccount]) {\n    [self.theButton setTitle:@\"Store\" forState:UIControlStateNormal];\n\
  \  }\n  else {\n    [self.theButton setTitle:@\"Link Dropbox\" forState:UIControlStateNormal];\n\
  \  }\n}\n```\n\n***代码清单 8-24*** 在 `ViewController.swift` 中设置按钮文本\n```swift\noverride\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n\n    if let linkedAccount = DBAccountManager.sharedManager().linkedAccount\
  \ {\n        self.theButton?.setTitle(\"Store\", forState: .Normal)\n    }\n   \
  \ else {\n        self.theButton?.setTitle(\"Link Dropbox\", forState: .Normal)\n\
  \    }\n}\n```\n\n当然，此时我们还没有存储任何内容。如果你运行应用，链接到 Dropbox，然后按下“Store”按钮，你只会得到一条日志消息，说账户已经链接。这是因为在我们处理按钮触摸事件时，除了尝试链接到\
  \ Dropbox 外，没有做其他任何事情。所以让我们改变这一点。\n\n在 `ViewController.m` 或 `ViewController.swift`\
  \ 中，添加一个私有属性，该属性将包含对我们 Dropbox 数据存储的引用，如代码清单 8-25（Objective-C）或代码清单 8-26（Swift）所示。\n\
  \n\n\n**代码清单 8-25.** `ViewController.m` 中 Dropbox 数据存储的私有属性\n\n```\n@interface ViewController\
  \ ()\n@property (nonatomic, strong) DBDatastore *datastore;\n@end\n```\n\n**代码清单\
  \ 8-26.** `ViewController.swift` 中 Dropbox 数据存储的属性\n\n```\nvar datastore: DBDatastore?\n\
  ```\n\n`DBDatastore` 属性代表将自动与 Dropbox 同步的数据容器。只要在你的应用中保留一个它的实例，数据存储就会自动同步。\n\n现在，你可以编辑\
  \ `didPressLink:` 方法，使其在账户已关联的情况下表现出不同的行为，如代码清单 8-27（Objective-C）或代码清单 8-28（Swift）所示。如其注释所述，这个更新后的方法执行以下操作：\n\
  \n*   如果 Dropbox 中尚不存在数据存储，则创建一个\n*   获取 Notes 表的句柄，必要时创建该表\n*   使用当前日期作为文本创建一条新笔记，并将其存储在\
  \ Dropbox 中\n*   同步数据存储\n\n**代码清单 8-27.** 在 Dropbox 中创建笔记（Objective-C）\n\n```\n\
  - (IBAction)didPressLink {\n    DBAccount *linkedAccount = [[DBAccountManager sharedManager]\
  \ linkedAccount];\n    if (linkedAccount) {\n        // 如果还没有存储对象，则创建一个\n      \
  \  if (!self.datastore) self.datastore = [DBDatastore openDefaultStoreForAccount:linkedAccount\
  \ error:nil];\n\n        // 如果 Notes 表已存在，则创建或获取其句柄\n        DBTable *notes = [self.datastore\
  \ getTable:@\"Notes\"];\n\n        // 制作一条新笔记进行存储。在正常应用中，这来自键入的文本。为简单起见，\n     \
  \   // 我们仅用时间戳生成文本\n        NSDate *now = [NSDate date];\n        NSString *noteText\
  \ = [NSDateFormatter localizedStringFromDate:now\n                             \
  \                              dateStyle:NSDateFormatterShortStyle\n           \
  \                                                timeStyle:NSDateFormatterFullStyle];\n\
  \n        // 将新笔记插入表中\n        [notes insert:@{ @\"details\": noteText, @\"createDate\"\
  : now, @\"encrypted\": @NO }];\n\n        NSLog(@\"Inserted new note: %@\", noteText);\n\
  \n        // 确保通知 Dropbox 同步存储对象\n        [self.datastore sync:nil];\n    } else\
  \ {\n        [[DBAccountManager sharedManager] linkFromController:self];\n    }\n\
  }\n```\n\n**代码清单 8-28.** 在 Dropbox 中创建笔记（Swift）\n\n```\n@IBAction func didPressLink(sender:\
  \ AnyObject) {\n    if let linkedAccount = DBAccountManager.sharedManager().linkedAccount\
  \ {\n        // 如果还没有存储对象，则创建一个\n        if self.datastore == nil {\n          \
  \  self.datastore = DBDatastore.openDefaultStoreForAccount(linkedAccount, error:\
  \ nil)\n        }\n\n        // 如果 Notes 表已存在，则创建或获取其句柄\n        let notes = datastore?.getTable(\"\
  Notes\")\n\n        // 制作一条新笔记进行存储。在正常应用中，这来自键入的文本。为简单起见，\n        // 我们仅用时间戳生成文本\n\
  \        let now = NSDate()\n        let noteText = NSDateFormatter.localizedStringFromDate(now,\
  \ dateStyle: .ShortStyle, timeStyle: .FullStyle)\n\n        // 将新笔记插入表中\n      \
  \  notes?.insert([\"details\": noteText, \"createDate\": now, \"encrypted\": false])\n\
  \n        println(\"Inserted new note \\(noteText)\")\n\n        // 确保通知 Dropbox\
  \ 同步存储对象\n        datastore?.sync(nil)\n    } else {\n        DBAccountManager.sharedManager().linkFromController(self)\n\
  \    }\n}\n```\n\n此时，你可以运行应用，在关联 Dropbox 后，每次按下“Store”按钮，都会在数据存储中添加一条新笔记。你甚至可以通过\
  \ Dropbox 的网页视图 `www.dropbox.com/developers/apps/datastores` 验证一切是否顺利。你应该会看到创建的应用带有一个用于浏览数据存储的链接。如果你点击“Browse”链接，应该会看到你在应用中创建的笔记列表。\n\
  \n当然，你始终可以在应用代码中查询数据存储以取回记录。例如，要获取 Notes 表中的所有笔记，你可以编写如代码清单 8-29（Objective-C）或代码清单\
  \ 8-30（Swift）所示的代码。\n\n**代码清单 8-29.** 检索所有笔记（Objective-C）\n\n```\nNSError *error;\n\
  DBTable *notes = [self.datastore getTable:@\"Notes\"];\nNSArray *myNotes = [notes\
  \ query:nil error:&error];\n```\n\n**代码清单 8-30.** 检索所有笔记（Swift）\n\n```\nvar error:\
  \ DBError?\nlet notes = datastore?.getTable(\"Notes\")\nlet myNotes = notes?.query(nil,\
  \ error: &error)\n```\n\n请注意，我们传递给 `query` 的参数是 `nil`，因此数据存储将返回 Notes 表中的所有记录。`query`\
  \ 参数接受一个 `NSDictionary`（Objective-C）或 `AnyObject`（Swift）实例来过滤其返回的结果集。我们可以通过传递一个包含要过滤字段的字典对象来过滤结果。例如，假设我们放入\
  \ Notes 表中的某些记录是加密的——即传递给 `insert:` 的字典中 `@\"encrypted\"` 设置为 `@YES`。要仅检索这些记录，我们可以使用如代码清单\
  \ 8-31（Objective-C）或代码清单 8-32（Swift）所示的代码。\n\n**代码清单 8-31.** 过滤结果集（Objective-C）\n\
  \n```\nNSError *error;\nDBTable *notes = [self.datastore getTable:@\"Notes\"];\n\
  NSArray *myNotes = [notes query:@{ @\"encrypted\": @YES } error:&error];\n```\n\n\
  **代码清单 8-32.** 过滤结果集（Swift）\n\n```\nvar error: DBError?\nlet notes = datastore?.getTable(\"\
  Notes\")\nlet myNotes = notes?.query([\"encrypted\": true], error: &error)\n```\n\
  \n当然，你也可以在字典中设置多个值以在多个键上进行过滤。\n\n## 将 Core Data 与 Dropbox Datastore API 结合使用：ParcelKit\n\
  \n我们已经了解了如何使用 iCloud 备份和同步 Core Data 存储。也了解了如何将 Dropbox 的 Datastore API 用作无模式存储。在本节中，我们将探讨如何将\
  \ Datastore API 用作 Core Data 存储中 iCloud 的替代方案。为此，我们将使用 ParcelKit 库（`https://github.com/overcommitted/ParcelKit`）。\n\
  \n为了演示完整流程，我们从一个全新的应用开始。在 Xcode 中，使用 Master-Detail Application 模板创建一个新项目。将项目命名为\
  \ DropboxEvents，并且这次务必勾选“Use Core Data”复选框。\n\n当然，你可以启动应用，获得常规的 Master-Detail 示例应用，在其中可以点击\
  \ + 按钮创建新事件。\n\n### 添加 Dropbox 和 ParcelKit 所需的框架\n\n你可以通过 Cocoapods（`http://cocoapods.org`）添加\
  \ ParcelKit，或者从 `https://github.com/overcommitted/ParcelKit` 下载源代码，并按照该页面的说明构建框架。如果你使用\
  \ Cocoapods，可以跳过本节其余部分。\n\n在上一节中，我们了解了如何集成 Dropbox 并添加其所需的框架。对于 DropboxEvents 应用，重复这些步骤，将\
  \ `Dropbox.framework` 和其他所需的标准框架添加到项目中。\n\n*   `CFNetwork.framework`\n*   `Security.framework`\n\
  *   `SystemConfiguration.framework`\n*   `QuartzCore.framework`\n*   `libc++.dylib`\n\
  *   `libz.dylib`\n\n接下来，将 ParcelKit 库本身添加到你的项目中。依赖关系应如图 8-5 所示。\n\n![9781430260288_Fig08-05.jpg](img/9781430260288_Fig08-05.jpg)\n\
  \n**图 8-5.** Dropbox/ParcelKit 应用的依赖关系\n\n\n\n#### 作为 ParcelKit 配置的一部分，进入项目的 `Build\
  \ Settings`，在 `Other Linker Flags` 中添加 `–ObjC` 标志，如图 Figure 8-6 所示。请注意，你需要为 Objective-C\
  \ 和 Swift 版本都执行此操作。\n\n![9781430260288_Fig08-06.jpg](img/9781430260288_Fig08-06.jpg)\n\
  \nFigure 8-6. `Other Linker Flags` 条目\n\n#### 将 `DropboxEvents` 与 Dropbox 集成\n\n\
  正如我们在 Dropbox Datastore API 部分构建的 `DropboxPersistenceApp` 应用一样，我们必须将 `DropboxEvents`\
  \ 与 Dropbox 集成。让我们再走一遍流程。\n\n1.  打开 `AppDelegate.m` 或 `AppDelegate.swift`，编辑 `application:\
  \ didFinishLaunchingWithOptions:` 方法，如 Listing 8-33 (Objective-C) 或 Listing 8-34\
  \ (Swift) 所示，以初始化 Dropbox SDK。\n\n**Listing 8-33**. 初始化 Dropbox SDK (Objective-C)\n\
  ```objc\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    DBAccountManager *accountManager = [[DBAccountManager alloc]\
  \ initWithAppKey:@\"APP_KEY\" secret:@\"APP_SECRET\"];\n    [DBAccountManager setSharedManager:accountManager];\n\
  \n    UINavigationController *navigationController = (UINavigationController *)self.window.rootViewController;\n\
  \    MasterViewController *controller = (MasterViewController *)navigationController.topViewController;\n\
  \    controller.managedObjectContext = self.managedObjectContext;\n    return YES;\n\
  }\n```\n\n**Listing 8-34**. 初始化 Dropbox SDK (Swift)\n```swift\nfunc application(application:\
  \ UIApplication, didFinishLaunchingWithOptions launchOptions: [NSObject: AnyObject]?)\
  \ -> Bool {\n    let accountManager = DBAccountManager(appKey: \"APP_KEY\", secret:\
  \ \"APP_SECRET\")\n    DBAccountManager.setSharedManager(accountManager)\n\n   \
  \ // Override point for customization after application launch.\n    let navigationController\
  \ = self.window!.rootViewController as UINavigationController\n    let controller\
  \ = navigationController.topViewController as MasterViewController\n    controller.managedObjectContext\
  \ = self.managedObjectContext\n    return true\n}\n```\n\n2.  确保在 `AppDelegate.m`\
  \ 顶部导入 `\"TargetConditionals.h\"` 和 `<Dropbox/Dropbox.h>`（如果适用），并将应用程序密钥和密钥替换为你从\
  \ Dropbox 获取的密钥和密钥。你可以重用用于 `DropboxPersistenceApp` 的应用程序密钥和密钥，或者也可以在 Dropbox 上创建一个新应用并获取新的应用程序密钥和密钥。\n\
  3.  此外，你必须在 `AppDelegate.m` 或 `AppDelegate.swift` 中添加处理从 Dropbox 身份验证控制器返回所需的方法，如\
  \ Listing 8-35 (Objective-C) 或 Listing 8-36 (Swift) 所示。\n\n**Listing 8-35**. 处理\
  \ URL 回调 (Objective-C)\n```objc\n- (BOOL)application:(UIApplication *)application\
  \ openURL:(NSURL *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\
  \ {\n    DBAccount *account = [[DBAccountManager sharedManager] handleOpenURL:url];\n\
  \    if (account) {\n        NSLog(@\"App linked successfully from %@\", sourceApplication);\n\
  \        return YES;\n    }\n    return NO;\n}\n```\n\n**Listing 8-36**. 处理 URL\
  \ 回调 (Swift)\n```swift\nfunc application(application: UIApplication, openURL url:\
  \ NSURL, sourceApplication: String, annotation: AnyObject?) -> Bool {\n    let account\
  \ = DBAccountManager.sharedManager().handleOpenURL(url)\n    if let account = account\
  \ {\n        println(\"App linked successfully from \\(sourceApplication)\")\n \
  \       return true\n    }\n    return false\n}\n```\n\n4.  为了确保应用能够接收来自 Dropbox\
  \ 身份验证控制器的回调，编辑 `DropboxEvents-Info.plist` 并添加 Dropbox URL 类型，正如我们在上一节中所做的那样，如图\
  \ Figure 8-7 所示。再次强调，请使用你从 Dropbox 获取的实际应用程序密钥，而不是 `\"APP_KEY\"`。\n\n![9781430260288_Fig08-07.jpg](img/9781430260288_Fig08-07.jpg)\n\
  \nFigure 8-7. URL 类型\n\n#### 使用 ParcelKit 进行编码\n\n一旦设置工作完成，我们就可以开始考虑使用 ParcelKit\
  \ 实际编码应用的持久化功能。幸运的是，ParcelKit 为我们完成了大部分繁重的工作，我们只需要通过代码进行配置。\n\n1.  剩余的工作位于 `MasterViewController.m`\
  \ 或 `MasterViewController.swift` 中，因此让我们打开相应的文件。我们需要做的第一件事是禁用 `NSFetchedResultsController`\
  \ 的缓存，以防止在从云端接收数据时出现缓存不一致。这可能感觉有点奇怪，因为通常你应该为 `NSFetchedResultsController` 提供一个缓存以提高性能，但数据一致性胜过性能。转到\
  \ `fetchedResultsController` 方法，并将缓存名称从 `\"Master\"` 更改为 `nil`，如 Listing 8-37 (Objective-C)\
  \ 或 Listing 8-38 (Swift) 所示。\n\n**Listing 8-37**. 从 `fetchedResultsController` 中移除缓存\
  \ (Objective-C)\n```objc\nNSFetchedResultsController *aFetchedResultsController\
  \ = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\
  \ sectionNameKeyPath:nil cacheName:nil];\n```\n\n**Listing 8-38**. 从 `fetchedResultsController`\
  \ 中移除缓存 (Swift)\n```swift\nlet aFetchedResultsController = NSFetchedResultsController(fetchRequest:\
  \ fetchRequest, managedObjectContext: self.managedObjectContext!, sectionNameKeyPath:\
  \ nil, cacheName: nil)\n```\n\n2.  由于我们将使用 Dropbox 和 ParcelKit，因此在文件的顶部为 Objective-C\
  \ 版本添加相应的 import 语句，如 Listing 8-39 所示。\n\n**Listing 8-39**. 添加 Dropbox 和 ParcelKit\
  \ 的 Import 语句\n```objc\n#import \"TargetConditionals.h\"\n#import <Dropbox/Dropbox.h>\n\
  #import <ParcelKit/ParcelKit.h>\n```\n\n3.  仍在 `MasterViewController.m` 或 `MasterViewController.swift`\
  \ 中，向私有接口添加两个属性，如 Listing 8-40 (Objective-C) 或 Listing 8-41 (Swift) 所示。\n\n**Listing\
  \ 8-40**. 为数据存储和同步管理器添加私有属性 (Objective-C)\n```objc\n@interface MasterViewController\
  \ ()\n@property (nonatomic, strong) DBDatastore *datastore;\n@property (nonatomic,\
  \ strong) PKSyncManager *syncManager;\n@end\n```\n\n**Listing 8-41**. 为数据存储和同步管理器添加私有属性\
  \ (Swift)\n```swift\nvar datastore: DBDatastore?\nvar syncManager: PKSyncManager?\n\
  ```\n\n4.  接下来我们需要关注链接过程。在我们的案例中，由于一切都依赖于 Dropbox 的链接状态，因此我们在主视图出现时检查链接状态——在 `viewDidAppear:`\
  \ 方法中。将 Listing 8-42 (Objective-C) 或 Listing 8-43 (Swift) 中显示的代码添加到 `MasterViewController.m`\
  \ 或 `MasterViewController.swift`。\n\n**Listing 8-42**. 当视图出现时检查 Dropbox 链接状态 (Objective-C)\n\
  ```objc\n- (void)viewDidAppear:(BOOL)animated {\n    [super viewDidAppear:animated];\n\
  ```\n\n\n```objectivec\nDBAccount *linkedAccount = [[DBAccountManager sharedManager]\
  \ linkedAccount];\nif (linkedAccount) {\n    if (!self.datastore) {\n        NSLog(@\"\
  Initializing datastore with ParcelKit sync\");\n        self.datastore = [DBDatastore\
  \ openDefaultStoreForAccount:linkedAccount error:nil];\n\n        PKSyncManager\
  \ *syncManager = [[PKSyncManager alloc] initWithManagedObjectContext:self.managedObjectContext\
  \ datastore:self.datastore];\n\n        [syncManager setTable:@\"Events\" forEntityName:@\"\
  Event\"];\n        [syncManager startObserving];\n        self.syncManager = syncManager;\n\
  \    }\n} else {\n    NSLog(@\"Needs link\");\n    [[DBAccountManager sharedManager]\
  \ linkFromController:self];\n}\n```\n\n**代码清单 8-43.** 视图出现时检查 Dropbox 链接状态（Swift）\n\
  \n```swift\noverride func viewDidAppear(animated: Bool) {\n    super.viewDidAppear()\n\
  \    if let linkedAccount = DBAccountManager.sharedManager().linkedAccount {\n \
  \       if datastore == nil {\n            println(\"Initializing datastore with\
  \ ParcelKit sync\")\n\n            self.datastore = DBDatastore.openDefaultStoreForAccount(linkedAccount,\
  \ error: nil)\n\n            self.syncManager = PKSyncManager(managedObjectContext:\
  \ self.managedObjectContext, datastore: datastore)\n\n            syncManager?.setTable(\"\
  Events\", forEntityName: \"Event\")\n            syncManager?.startObserving()\n\
  \        }\n    } else {\n        println(\"Needs link\")\n        DBAccountManager.sharedManager().linkFromController(self)\n\
  \    }\n}\n```\n\n让我们花点时间分析一下该方法的逻辑。首先，获取 Dropbox 链接账户。如果不存在任何账户（即值为 `nil`），则创建一个账户并启动链接流程。\n\
  \n如果应用已有链接账户，则直接使用该账户。我们按照上一节所述的方式设置 Dropbox 数据存储。接着创建 ParcelKit 的 `PKSyncManager`\
  \ 实例，它负责监测 Core Data 托管对象的变更并与 Dropbox 同步，同时也会监测 Dropbox 中对象的变更并与 Core Data 托管对象同步。为了实现这一功能，ParcelKit\
  \ 要求我们告知它需要监测哪些 Core Data 实体。本示例中只有一个实体：`Event`，我们需要将其与 Dropbox 数据存储中的 `Events`\
  \ 表关联起来。请注意，虽然我们选择将 Core Data 实体的名称与 Dropbox 数据存储的表名保持一致，但这并非强制要求。`PKSyncManager`\
  \ 的 `setTable:forEntityName:` 方法允许你使用任意名称来映射这两者。\n\n`PKSyncManager` 实例完全配置完成后，必须将其赋值给\
  \ `syncManager` 属性，以保持其存活状态；否则它将会超出作用域并被销毁。\n\n这就是我们需要编写的全部代码。正如之前所说，所有繁重工作都由 ParcelKit\
  \ 完成！不过，还有最后一步操作需要完成才能让这一切正常运转：ParcelKit 要求在其监测的每个实体上设置一个名为 `syncID` 的额外属性。该属性是\
  \ ParcelKit 用于比较不同实体实例的关键，确保所有数据同步正确无误。打开 `DropboxEvents.xcdatamodeld`，在 `Event`\
  \ 实体中添加一个类型为 `String` 的 `syncID` 属性，如图 8-8 所示。\n\n![9781430260288_Fig08-08.jpg](img/9781430260288_Fig08-08.jpg)\n\
  \n**图 8-8.** 为 ParcelKit 设置的 `syncID` 属性\n\n由于我们修改了 Core Data 模型，因此需要从模拟器中删除现有的\
  \ Core Data 数据存储，以避免 Core Data 模型冲突。在 iPhone 模拟器中，长按应用图标，待图标晃动后，点击删除按钮卸载应用。然后按下\
  \ Home 键退出该模式。\n\n现在一切就绪。运行应用，你会发现表面上似乎没有任何变化。请继续添加几个事件，它们会被顺利添加。为了观察差异，我们需要登录 Dropbox\
  \ 的网页视图，网址为 `www.dropbox.com/developers/apps/datastores`。浏览你的数据存储，你应该能看到刚刚创建的事件，如图\
  \ 8-9 所示。\n\n![9781430260288_Fig08-09.jpg](img/9781430260288_Fig08-09.jpg)\n\n**图\
  \ 8-9.** Dropbox 数据存储网页视图\n\n当你在应用中添加新事件时，数据存储中也会出现新的记录。现在，你已创建了一些事件，请停止应用。按照之前的步骤，从\
  \ iPhone 模拟器中卸载该应用，这将清除本地的 Core Data 存储。如果是一个普通的 Core Data 应用，再次启动后事件将全部消失。现在，请启动应用，你会注意到所有事件依然存在。这是因为它们已通过\
  \ Dropbox 数据存储 API 完成了同步。\n\n## 结论\n\n如今，大多数消费者拥有多个设备，他们期望数据能在这些设备间无缝流通。本章介绍了三种云端数据存储方案，并额外提及了另外两种方案。实际上，还有更多云解决方案，范围从本章讨论的标准服务到你可能自行开发的定制服务。无论选择哪种方案，数据存储的发展趋势无疑指向了云端存储的需求。如果你的应用能处理好跨设备同步，用户就更有可能下载并使用它。在\
  \ iCloud、Dropbox 或其他方案之间做选择时，你需要根据目标用户、应用的特定特性，以及是否希望与非 Apple 设备上的应用同步数据来做出决定。\n\
  \n# 第 9 章：优化性能、内存使用与多线程\n\n用户渴望即时得到答案。他们期望自己的设备能迅速提供这些答案。如果他们认为设备上的应用卡顿甚至只是运行缓慢，他们就会弃用甚至删除这些应用。你可以通过显示加载转轮来表明应用正在努力产出结果，这在一定程度上能安抚用户。提供设备正在工作的视觉提示，总比不给任何提示、让用户误以为设备死机要好；但更理想的做法是，永远不要出现让用户等待的缓慢情况。虽然你未必总能实现这一目标，但始终应尽力为之。\n\
  \n在持久化存储中获取和存储数据可能需要很长时间，尤其是在处理大量数据时。本章将确保你理解 Core Data 如何帮助你——以及你必须如何自助——以避免用户看到“请等待”的转轮，或更糟糕的情况：应用在检索或保存大型对象图时无响应，看似死机。你将学习如何运用各种工具和策略，例如缓存、故障、多线程以及\
  \ Xcode 自带的 Instruments 应用。\n\n## 优化性能\n\n“优化性能”这个词让人联想到一位机修工，他手拿扳手，俯身在操作台上的引擎旁，拧动螺栓、调整阀门，并测量这些调整对引擎性能的影响。在优化应用性能时，你同样需要具备这种严谨的学科精神：进行调整，并测量这些调整对整体性能的影响。本章将介绍多种提升应用性能的方法。你应该在自己编写的应用上尝试这些方法，并在模拟器和真实\
  \ iDevice 上测量其效果。\n\n### 构建用于测试的应用\n\n\n你需要一种方法来执行所有这些性能测试，以便验证结果。本节将引导你构建一个应用程序，该应用程序允许你运行各种测试并查看结果。如图\
  \ Figure 9-1 所示，该应用程序在一个标准的选择器视图中展示了一系列你可以运行的测试。要运行一项测试，请在选择器中选中它，点击 `Run Selected\
  \ Test` 按钮，然后等待结果。测试运行后，你将看到开始时间、结束时间、测试经过的秒数，以及一些描述测试结果的文本。\n\n![9781430260288_Fig09-01.jpg](img/9781430260288_Fig09-01.jpg)\n\
  \nFigure 9-1。 PerformanceTuning 应用程序\n\n## 创建项目\n\n在 Xcode 中，创建一个名为 `PerformanceTuning`\
  \ 的新 iPhone 单视图应用程序，并取消勾选 `User Core Data` 复选框。添加一个名为 `PerformanceTuning.xcdatamodeld`\
  \ 的 Core Data 数据模型，以及一个名为 `Persistence` 的类来管理 Core Data 堆栈。Listings 9-1 和 9-2 分别展示了\
  \ `Persistence.h` 和 `Persistence.m`。Listing 9-3 展示了 `Persistence.swift`。\n\n***Listing\
  \ 9-1***。 `Persistence.h`\n\n```\n@import CoreData;\n\n@interface Persistence :\
  \ NSObject\n\n@property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
  @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
  \n***Listing 9-2***。 `Persistence.m`\n\n```\n#import \"Persistence.h\"\n\n@implementation\
  \ Persistence\n\n- (instancetype)init {\n    self = [super init];\n    if (self\
  \ != nil) {\n        // Initialize the managed object model\n        NSURL *modelURL\
  \ = [[NSBundle mainBundle] URLForResource:@\"PerformanceTuning\" withExtension:@\"\
  momd\"];\n        _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n\
  \n        // Initialize the persistent store coordinator\n        NSURL *storeURL\
  \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"PerformanceTuning.sqlite\"\
  ];\n\n        NSError *error = nil;\n        _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc] initWithManagedObjectModel:self.managedObjectModel];\n        if (![_persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType\n                               \
  \                        configuration:nil\n                                   \
  \                              URL:storeURL\n                                  \
  \                           options:nil\n                                      \
  \                         error:&error]) {\n            NSLog(@\"Unresolved error\
  \ %@, %@\", error, [error userInfo]);\n            abort();\n        }\n\n     \
  \   // Initialize the managed object context\n        _managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n        [_managedObjectContext setPersistentStoreCoordinator:self.persistentStoreCoordinator];\n\
  \    }\n    return self;\n}\n\n#pragma mark - Helper Methods\n\n- (void)saveContext\
  \ {\n    NSError *error = nil;\n    if ([self.managedObjectContext hasChanges] &&\
  \ ![self.managedObjectContext save:&error]) {\n        NSLog(@\"Unresolved error\
  \ %@, %@\", error, [error userInfo]);\n        abort();\n    }\n}\n\n- (NSURL *)applicationDocumentsDirectory\
  \ {\n    return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\
  \ inDomains:NSUserDomainMask] lastObject];\n}\n\n@end\n```\n\n***Listing 9-3***。\
  \ `Persistence.swift`\n\n```\nimport Foundation\nimport CoreData\n\nclass Persistence\
  \ {\n    // MARK: - Core Data stack\n\n    lazy var applicationDocumentsDirectory:\
  \ NSURL = {\n        // The directory the application uses to store the Core Data\
  \ store file. This code uses a directory named \"book.persistence.PerformanceTuningSwift\"\
  \ in the application's documents Application Support directory.\n        let urls\
  \ = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory, inDomains:\
  \ .UserDomainMask)\n        return urls[urls.count-1] as NSURL\n    }()\n\n    lazy\
  \ var managedObjectModel: NSManagedObjectModel = {\n        // The managed object\
  \ model for the application. This property is not optional. It is a fatal error\
  \ for the application not to be able to find and load its model.\n        let modelURL\
  \ = NSBundle.mainBundle().URLForResource(\"PerformanceTuningSwift\", withExtension:\
  \ \"momd\")!\n        return NSManagedObjectModel(contentsOfURL: modelURL)!\n  \
  \  }()\n\n    lazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\
  \ = {\n        // The persistent store coordinator for the application. This implementation\
  \ creates and return a coordinator, having added the store for the application to\
  \ it. This property is optional since there are legitimate error conditions that\
  \ could cause the creation of the store to fail.\n        // Create the coordinator\
  \ and store\n        var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:\
  \ self.managedObjectModel)\n        let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  PerformanceTuningSwift.sqlite\")\n        var error: NSError? = nil\n        var\
  \ failureReason = \"There was an error creating or loading the application's saved\
  \ data.\"\n        if coordinator!.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: url, options: nil, error: &error) == nil {\n        \
  \    coordinator = nil\n            // Report any error we got.\n            let\
  \ dict = NSMutableDictionary()\n            dict[NSLocalizedDescriptionKey] = \"\
  Failed to initialize the application's saved data\"\n            dict[NSLocalizedFailureReasonErrorKey]\
  \ = failureReason\n            dict[NSUnderlyingErrorKey] = error\n            error\
  \ = NSError(domain: \"YOUR_ERROR_DOMAIN\", code: 9999, userInfo: dict)\n       \
  \     // Replace this with code to handle the error appropriately.\n           \
  \ // abort() causes the application to generate a crash log and terminate. You should\
  \ not use this function in a shipping application, although it may be useful during\
  \ development.\n            NSLog(\"Unresolved error \\(error), \\(error!.userInfo)\"\
  )\n            abort()\n        }\n\n        return coordinator\n    }()\n\n   \
  \ lazy var managedObjectContext: NSManagedObjectContext? = {\n        // Returns\
  \ the managed object context for the application (which is already bound to the\
  \ persistent store coordinator for the application.) This property is optional since\
  \ there are legitimate error conditions that could cause the creation of the context\
  \ to fail.\n        let coordinator = self.persistentStoreCoordinator\n        if\
  \ coordinator == nil {\n            return nil\n        }\n        var managedObjectContext\
  \ = NSManagedObjectContext()\n        managedObjectContext.persistentStoreCoordinator\
  \ = coordinator\n        return managedObjectContext\n    }()\n\n    // MARK: -\
  \ Core Data Saving support\n\n    func saveContext () {\n        if let moc = self.managedObjectContext\
  \ {\n            var error: NSError? = nil\n            if moc.hasChanges && !moc.save(&error)\
  \ {\n                // Replace this implementation with code to handle the error\
  \ appropriately.\n                // abort() causes the application to generate\
  \ a crash log and terminate. You should not use this function in a shipping application,\
  \ although it may be useful during development.\n                NSLog(\"Unresolved\
  \ error \\(error), \\(error!.userInfo)\")\n                abort()\n           \
  \ }\n        }\n    }\n}\n```\n\n\n\n对于 Objective-C 版本，向`AppDelegate.h`添加一个`Persistence`属性，如代码清单\
  \ 9-4 所示。对于 Swift 和 Objective-C，在`AppDelegate`的`application:didFinishLaunchingWithOptions:`方法中初始化`Persistence`属性，如代码清单\
  \ 9-5（Objective-C）或代码清单 9-6（Swift）所示。如果使用 Objective-C，请确保在`AppDelegate.m`中导入`Persistence.h`。\n\
  \n***代码清单 9-4***. 带有`Persistence`属性的`AppDelegate.h`\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class Persistence;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
  \ Persistence *persistence;\n\n@end\n```\n\n***代码清单 9-5***. 在`AppDelegate.m (Objective-C)`中初始化\
  \ Core Data 栈\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n  self.persistence = [[Persistence alloc] init];\n  return\
  \ YES;\n}\n```\n\n***代码清单 9-6***. 在`AppDelegate.swift`（Swift）中初始化 Core Data 栈\n\n\
  ```\nvar persistence: Persistence?\n\nfunc application(application: UIApplication,\
  \ didFinishLaunchingWithOptions launchOptions: [NSObject: AnyObject]?) -> Bool {\n\
