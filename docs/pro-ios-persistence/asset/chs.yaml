- "# 排版的 Markdown 文档\n\n* 使用`NSFetchedResultsController`从 Core Data 存储中获取数据并在表格视图中显示\n\
  * 利用 Core Data 将图片存储在存储外部以提高性能\n* 将`UISearchDisplayController`与表格视图集成\n\n本章构建的应用程序是一个名为\
  \ CoreDump 的 Bug 追踪器。第一个屏幕是主视图（Master view），显示项目列表——每个项目包含名称和统一资源定位符（URL）。我们根据 URL\
  \ 的域名对显示的项目进行分组，因此 BitBucket 项目归为一组，GitHub 项目归为一组，以此类推。然后，我们可以深入查看任何项目，以查看与该项目关联的\
  \ Bug 列表。我们也可以向项目添加 Bug。在本章结束时，你将拥有一个存在明显缺陷的 Bug 追踪器——例如，你无法删除或关闭 Bug——但你会更熟练地将\
  \ Core Data 与用户界面（UI）集成。\n\n## 使用 `NSFetchedResultsController` 显示表格数据\n\n从 iPhone\
  \ 问世以来，许多（如果不是大多数）iOS 应用程序都显示数据列表。iOS 将这些单列列表称为“表格”，并提供了表格视图类（`UITableView`）和控制器（`UITableViewController`），用于显示列表、支持快速滚动浏览数据，甚至提供了点击单元格以深入数据层次结构的机制。这种方法对于显示数据如此基础和重要，以至于所有\
  \ iOS 开发人员都知道如何使用此类及其支持类来显示数据列表。\n\n当使用表格视图显示来自 Core Data 存储的数据时，你可以简单地将数据获取到数组中，并让表格视图生态系统忽略数据的来源，实际上许多应用程序正是这样做的。然而，iOS\
  \ SDK 提供了一个名为`NSFetchedResultsController`的类，它连接了表格视图和 Core Data。`NSFetchedResultsController`从持久化存储中拉取托管对象，从你指定的实体中获取，缓存它们以提高性能，并在需要时将它们提供给表格视图进行显示。它还管理表格中行的添加、移除和移动，以响应数据变化。\n\
  \n## 创建获取结果控制器\n\n你可以通过四个参数创建一个获取结果控制器：\n\n* 一个获取请求（`NSFetchRequest`实例）\n* 一个托管对象上下文（`NSManagedObjectContext`实例）\n\
  * （可选）一个分区名称键路径\n* （可选）一个缓存名称\n\n以下章节解释这些参数。\n\n### 获取请求\n\n`NSFetchedResultsController`使用的获取请求定义了要在表格中显示的数据。它与你在此书中以及在任何\
  \ Core Data 开发中使用的任何获取请求几乎相同。它与你在数据模型中指定的实体配合使用，并且可以选择使用谓词（`NSPredicate`）来过滤获取的内容。此获取请求的一个不同之处在于，它必须至少有一个排序描述符，否则你的应用程序将崩溃并显示以下消息：\n\
  \n```\n'NSInvalidArgumentException', reason: 'An instance of NSFetchedResultsController\
  \ requires a fetch request with sort descriptors.'\n```\n\n这是因为获取结果控制器在表格的约束下工作，表格以可预测的顺序显示单元格，因此获取结果控制器也必须以可预测的顺序获取数据。排序描述符提供了帮助排序数据的必要机制。\n\
  \n### 托管对象上下文\n\n这是一个普通的托管对象上下文，用于保存托管对象。保存上下文会保存其中的所有对象。通常，你使用应用程序的托管对象上下文作为此参数。\n\
  \n### 分区名称键路径\n\niOS 将表格视图划分为多个分区，每个分区有若干行。这种结构对表格视图的操作至关重要。获取结果控制器针对在这种环境下工作进行了优化，并可以将数据划分为与表格分区相对应的分区。分区名称键路径，作为`sectionNameKeyPath`参数设置，指定了一个键路径，进入你的\
  \ Core Data 模型，将获取请求实体的托管对象划分为这些分区。通常，你将此`sectionNameKeyPath`参数指向该表格显示的实体的某个属性。请注意，如果你为`sectionNameKeyPath`参数指定了值，你还必须按该值对获取结果进行排序，否则你的应用程序将因错误而崩溃。如果你的表格视图只包含一个分区，你可以为`sectionNameKeyPath`参数传入`nil`。\n\
  \n### 缓存名称\n\n缓存名称参数指定了缓存的名称，获取结果控制器使用该缓存来缓存它获取并提供给表格的托管对象。在 iOS 3.x 版本中，鼓励你使此缓存名称在获取结果控制器之间唯一，但即使与其他获取结果控制器共享缓存名称，你的应用程序仍然可以工作。然而，从\
  \ iOS 4.0 开始，如果你在获取结果控制器之间共享缓存名称，你的应用程序将无法正常工作。请确保你的缓存名称是唯一的。\n\n请注意，此参数是可选的；你可以将缓存设置为`nil`，这样获取结果控制器就不会缓存数据。这当然会降低数据显示和应用程序的响应速度，因此你通常不会将缓存设置为`nil`。\n\
  \n## 创建获取结果控制器委托\n\n现在是时候创建获取结果控制器委托了。\n\n## 构建 CoreDump 应用程序\n\n为了开始探索获取结果控制器，创建一个新的\
  \ iOS Master-Detail Application 项目，并将其命名为 CoreDump。选择你的语言并勾选**Use Core Data**，如图\
  \ 5-1 所示。\n\n![9781430260288_Fig05-01.jpg](img/9781430260288_Fig05-01.jpg)\n\n图\
  \ 5-1. 创建 CoreDump 应用程序\n\nXcode 会创建一个项目，包含一个连接了主屏幕和详细屏幕的故事板、一个包含单个实体（`Event`）的\
  \ Core Data 模型，以及一个`NSFetchedResultsController`，用于将数据从 Core Data 存储提供给主屏幕上的表格视图。继续运行应用程序，创建一些事件，深入查看它们，感受生成的应用程序是如何工作的。同时，在代码中探索一下，看看发生了什么。像往常一样，Xcode\
  \ 生成的代码既为你的应用程序提供了一个良好的起点，也是学习如何使用 Apple 技术的绝佳方式。\n\n## 检查 CoreDump 应用程序中的 `NSFetchedResultsController`\n\
  \n让我们确保理解 CoreDump 如何在生成的代码中实现获取结果控制器。如果你正在用 Objective-C 构建此项目，请打开`MasterViewController.h`查看`MasterViewController`类的声明，如列表\
  \ 5-1 所示。\n\n***列表 5-1***. `MasterViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <CoreData/CoreData.h>\n\n@interface MasterViewController : UITableViewController\
  \ <NSFetchedResultsControllerDelegate>\n\n@property (strong, nonatomic) NSFetchedResultsController\
  \ *fetchedResultsController;\n@property (strong, nonatomic) NSManagedObjectContext\
  \ *managedObjectContext;\n\n@end\n```\n\n你可以看到，`MasterViewController`类继承自`UITableViewController`，并且实现了`NSFetchedResultsControllerDelegate`协议。它还拥有一个名为`fetchedResultsController`的`NSFetchedResultsController`属性，以及一个名为`managedObjectContext`的`NSManagedObjectContext`属性。\n\
  \n\n\n如果你在用 Swift 构建 CoreDump，可以在 `MasterViewController.swift` 中找到这些相同元素，尽管它们并非集中在一起，因此你需要稍加搜索才能找到代码清单\
  \ 5-2 所示的元素。\n\n***代码清单 5-2***. `MasterViewController.swift` 中的相同元素\n\n```\nimport\
  \ UIKit\nimport CoreData\n\nclass MasterViewController: UITableViewController, NSFetchedResultsControllerDelegate\
  \ {\n\nvar managedObjectContext: NSManagedObjectContext? = nil\n...\n  var _fetchedResultsController:\
  \ NSFetchedResultsController? = nil\n...\n}\n```\n\n`MasterViewController` 的实现多次引用了\
  \ `fetchedResultsController`。接下来的几节将探讨这些引用。\n\n### 访问 `fetchedResultsController`\n\
  \n`MasterViewController` 的实现重写了 `fetchedResultsController` 的访问器，以创建、初始化并返回该控制器，如代码清单\
  \ 5-3（Objective-C）和代码清单 5-4（Swift）所示。\n\n***代码清单 5-3***. `fetchedResultsController`\
  \ 访问器（Objective-C）\n\n```\n- (NSFetchedResultsController *)fetchedResultsController\
  \ {\n  if (_fetchedResultsController != nil) {\n    return _fetchedResultsController;\n\
  \  }\n\nNSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  // 根据实际情况编辑实体名称。\n\
  \  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Event\" inManagedObjectContext:self.managedObjectContext];\n\
  \  [fetchRequest setEntity:entity];\n\n// 将批量大小设置为合适的数值。\n  [fetchRequest setFetchBatchSize:20];\n\
  \n// 根据实际情况编辑排序键。\n  NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]\
  \ initWithKey:@\"timeStamp\" ascending:NO];\n  NSArray *sortDescriptors = @[sortDescriptor];\n\
  \n[fetchRequest setSortDescriptors:sortDescriptors];\n\n// 根据实际情况编辑分区名称键路径和缓存名称。\n\
  \  // 分区名称键路径设为 nil 表示“无分区”。\n  NSFetchedResultsController *aFetchedResultsController\
  \ = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\
  \ sectionNameKeyPath:nil cacheName:@\"Master\"];\n  aFetchedResultsController.delegate\
  \ = self;\n  self.fetchedResultsController = aFetchedResultsController;\n\nNSError\
  \ *error = nil;\n  if (![self.fetchedResultsController performFetch:&error]) {\n\
  \    // 用处理错误的代码替换此实现。\n    // abort() 会导致应用生成崩溃日志并终止。在生产应用中不应使用此函数，尽管在开发过程中可能有用。\n\
  \    NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n    abort();\n  }\n\n\
  return _fetchedResultsController;\n}\n```\n\n***代码清单 5-4***. `fetchedResultsController`\
  \ 访问器（Swift）\n\n```\nvar fetchedResultsController: NSFetchedResultsController {\n\
  \    if _fetchedResultsController != nil {\n        return _fetchedResultsController!\n\
  \    }\n\nlet fetchRequest = NSFetchRequest()\n    // 根据实际情况编辑实体名称。\n    let entity\
  \ = NSEntityDescription.entityForName(\"Event\", inManagedObjectContext: self.managedObjectContext!)\n\
  \    fetchRequest.entity = entity\n\n// 将批量大小设置为合适的数值。\n    fetchRequest.fetchBatchSize\
  \ = 20\n\n// 根据实际情况编辑排序键。\n    let sortDescriptor = NSSortDescriptor(key: \"timeStamp\"\
  , ascending: false)\n    let sortDescriptors = [sortDescriptor]\n\nfetchRequest.sortDescriptors\
  \ = [sortDescriptor]\n\n// 根据实际情况编辑分区名称键路径和缓存名称。\n    // 分区名称键路径设为 nil 表示“无分区”。\n\
  \    let aFetchedResultsController = NSFetchedResultsController(fetchRequest: fetchRequest,\
  \ managedObjectContext: self.managedObjectContext!, sectionNameKeyPath: nil, cacheName:\
  \ \"Master\")\n    aFetchedResultsController.delegate = self\n    _fetchedResultsController\
  \ = aFetchedResultsController\n\nvar error: NSError? = nil\n  if !_fetchedResultsController!.performFetch(&error)\
  \ {\n       // 用处理错误的代码替换此实现。\n       // abort() 会导致应用生成崩溃日志并终止。在生产应用中不应使用此函数，尽管在开发过程中可能有用。\n\
  \         //println(\"未解决的错误 \\(error), \\(error.userInfo)\")\n       abort()\n\
  \  }\n\nreturn _fetchedResultsController!\n}\n```\n\n在典型模式中，代码会检查 `fetchedResultsController`\
  \ 属性是否已创建并初始化。如果已创建，则返回该属性。否则，它会创建并初始化该属性，执行以下操作：\n\n*   将要检索的实体设置为 `Event` 实体。\n\
  *   为 `Event` 的 `timeStamp` 属性添加排序描述符。\n*   使用应用的 Core Data 托管对象上下文（无分区名称键路径，缓存名称为“Master”）创建获取结果控制器。\n\
  *   将获取结果控制器的委托设置为其父 `MasterViewController` 实例。\n*   获取配置好的结果。\n\n### 在表格中显示数据\n\
  \n`MasterViewController` 所拥有表格视图的数据源和委托就是 `MasterViewController` 本身，这可以通过打开 storyboard，在\
  \ Master 视图中选择表格视图，然后点击连接检查器来确认，如图 5-2 所示。\n\n![9781430260288_Fig05-02.jpg](img/9781430260288_Fig05-02.jpg)\n\
  \n图 5-2. 验证表格视图的数据源和委托\n\n数据源和委托方法的实现大量使用了 `fetchedResultsController`。例如，为了计算表格中的分区数量，`numberOfSectionsInTableView:`\
  \ 方法返回 `fetchedResultsController` 的 `section` 属性的计数，如代码清单 5-5（Objective-C）和代码清单\
  \ 5-6（Swift）所示。\n\n***代码清单 5-5***. 计算表格分区数量（Objective-C）\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n  return [[self.fetchedResultsController sections] count];\n}\n\
  ```\n\n***代码清单 5-6***. 计算表格分区数量（Swift）\n\n```\noverride func numberOfSectionsInTableView(tableView:\
  \ UITableView) -> Int {\n  return self.fetchedResultsController.sections?.count\
  \ ?? 0\n}\n```\n\n`sections` 属性是一个包含 `NSFetchedResultsSectionInfo` 实例的 `NSArray`。`NSFetchedResultsSectionInfo`\
  \ 协议提供了一些方法，用于检索其所对应表格分区的信息。\n\n*   `name`——要在分区标题中显示的名称\n*   `indexTitle`——如果显示，则用于表格右侧索引的标题\n\
  *   `numberOfObjects`——分区中的对象数量\n*   `objects`——分区中的实际对象\n\n为了计算给定分区中的行数，`tableView:numberOfRowsInSection:`\
  \ 方法会获取所请求分区的 `NSFetchedResultsSectionInfo` 实例，并返回其 `numberOfObjects` 属性，如代码清单 5-7（Objective-C）和代码清单\
  \ 5-8（Swift）所示。\n\n***代码清单 5-7***. 计算分区中的行数（Objective-C）\n\n```\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section {\n  id <NSFetchedResultsSectionInfo>\
  \ sectionInfo = [self.fetchedResultsController sections][section];\n  return [sectionInfo\
  \ numberOfObjects];\n}\n```\n\n\n\n***列表 5-8***. 计算分区中的行数 (Swift)\n```\noverride\
  \ func tableView(tableView: UITableView, numberOfRowsInSection section: Int) ->\
  \ Int {\n  let sectionInfo = self.fetchedResultsController.sections![section] as\
  \ NSFetchedResultsSectionInfo\n  return sectionInfo.numberOfObjects\n}\n```\n\n\
  用于返回在表格中显示的实际单元格的方法 `tableView:cellForRowAtIndexPath:` 会创建一个单元格，并调用名为 `configureCell:atIndexPath:`\
  \ 的方法来配置它。该方法从 `fetchedResultsController` 中获取该单元格对应的托管对象（一个 `Event` 实例），然后将该托管对象的\
  \ `timeStamp` 值设置为单元格的文本。列表 5-9 (Objective-C) 和 列表 5-10 (Swift) 展示了这段代码。\n\n***列表\
  \ 5-9***. 配置单元格 (Objective-C)\n\n```\n- (void)configureCell:(UITableViewCell *)cell\
  \ atIndexPath:(NSIndexPath *)indexPath {\n  NSManagedObject *object = [self.fetchedResultsController\
  \ objectAtIndexPath:indexPath];\n  cell.textLabel.text = [[object valueForKey:@\"\
  timeStamp\"] description];\n}\n```\n\n***列表 5-10***. 配置单元格 (Swift)\n\n```\nfunc\
  \ configureCell(cell: UITableViewCell, atIndexPath indexPath: NSIndexPath) {\n \
  \ let object = self.fetchedResultsController.objectAtIndexPath(indexPath) as NSManagedObject\n\
  \  cell.textLabel.text = object.valueForKey(\"timeStamp\")!.description\n}\n```\n\
  \n### 添加事件\n\n当点击导航栏右侧的 + 按钮时，会调用 `insertNewObject:` 方法（该方法在 `viewDidLoad` 方法中配置）。`insertNewObject`\
  \ 方法（如 列表 5-11 (Objective-C) 和 列表 5-12 (Swift) 所示）执行以下操作：\n\n1. 从 `fetchedResultsController`\
  \ 中获取托管对象上下文。\n2. 从 `fetchedResultsController` 中获取实体。\n3. 在托管对象上下文中插入一个适当实体类型的新托管对象。\n\
  4. 配置该托管对象。\n5. 保存托管对象上下文。\n\n***列表 5-11***. 插入新对象 (Objective-C)\n\n```\n- (void)insertNewObject:(id)sender\
  \ {\n  NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
  \  NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest] entity];\n\
  \  NSManagedObject *newManagedObject = [NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:context];\n\n// 如果合适，配置新托管对象。\n  // 通常应使用访问器方法，但在此处使用\
  \ KVC 可以避免为模板添加自定义类。\n  [newManagedObject setValue:[NSDate date] forKey:@\"timeStamp\"\
  ];\n\n// 保存上下文。\n  NSError *error = nil;\n  if (![context save:&error]) {\n    //\
  \ 替换此实现以适当处理错误。\n    // abort() 会导致应用程序生成崩溃日志并终止。在生产应用中不应使用此函数，尽管它在开发过程中可能有用。\n\
  \    NSLog(@\"未解析的错误 %@, %@\", error, [error userInfo]);\n    abort();\n  }\n}\n\
  ```\n\n***列表 5-12***. 插入新对象 (Swift)\n\n```\nfunc insertNewObject(sender: AnyObject)\
  \ {\n  let context = self.fetchedResultsController.managedObjectContext\n  let entity\
