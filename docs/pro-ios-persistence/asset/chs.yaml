  \ bug。在下一节中，我们将创建用于添加和编辑 bug 的屏幕。这个屏幕将模仿本章前面创建的添加和编辑项目屏幕。\n\n## 创建添加和编辑 Bug 屏幕\n\
  \n与添加和编辑项目屏幕类似，你必须创建一个能接受输入的屏幕，用于添加 bug 或编辑现有 bug。接下来的几个小节将引导你完成创建此屏幕的步骤。\n\n###\
  \ 创建用于添加和编辑 Bug 的视图控制器\n\n\n\n创建一个名为 `BugViewController` 的新 Cocoa Touch 类文件，并将其设置为\
  \ `UIViewController` 的子类。勾选**同时创建 XIB 文件**复选框，选择你的语言，然后按照提示创建文件。打开 `BugViewController.h`\
  \ 或 `BugViewController.swift`，并添加以下内容：\n\n- 一个用于编辑的 `Bug` 属性（注意：添加 `Bug` 时，此属性为\
  \ `nil`）\n- 一个用于父级 `Project` 的属性\n- 一个用于 Bug 标题文本字段的插座变量（注意：我们将其命名为 `bugTitle`，以避免与\
  \ `UIViewController` 已存在的 `title` 属性冲突）\n- 一个用于 Bug 详情文本视图的插座变量\n- 一个接受 `Bug` 和父级\
  \ `Project` 参数的初始化方法\n- 一个用于保存 `Bug` 的操作\n- 一个用于取消添加或编辑的操作\n\n清单 5-51 展示了编辑后的 `BugViewController.h`\
  \ 文件，清单 5-52 展示了编辑后的 `BugViewController.swift` 文件。\n\n***清单 5-51***. `BugViewController.h`\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class Bug;\n@class Project;\n\n@interface BugViewController\
  \ : UIViewController\n@property (strong, nonatomic) Bug *bug;\n@property (strong,\
  \ nonatomic) Project *project;\n@property (weak, nonatomic) IBOutlet UITextField\
  \ *bugTitle;\n@property (weak, nonatomic) IBOutlet UITextView *details;\n\n- (id)initWithBug:(Bug\
  \ *)bug project:(Project *)project;\n- (IBAction)save:(id)sender;\n- (IBAction)cancel:(id)sender;\n\
  \n@end\n```\n\n***清单 5-52***. `BugViewController.swift`\n\n```\nimport UIKit\n\n\
  class BugViewController: UIViewController {\n    var project: Project? = nil\n \
