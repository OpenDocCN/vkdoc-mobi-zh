  \n## 加载并分析单词列表\n\n我们将加载数据模型并提供数据统计信息的职责委托给 `Persistence` 类。我们在该类中声明两个方法：一个用于接收包含所有单词的\
  \ `NSString`，解析并加载它；另一个用于返回包含单词列表统计信息的 `NSString`。在 Objective-C 版本的 `Persistence.h`\
  \ 中声明这些方法，如列表 3-9 所示。\n\n***列表 3-9***. `Persistence.h` 中的两个方法声明\n\n```\n- (void)loadWordList:(NSString\
  \ *)wordList;\n- (NSString *)statistics;\n```\n\n`loadWordList:` 方法执行三项操作。\n\n*\
  \ 删除所有现有数据，以防用户已加载过单词列表；\n* 创建单词类别；以及\n* 加载单词。\n\n首先，创建一个辅助方法 `deleteAllObjectsForEntityWithName:`，用于删除给定实体中的所有数据。列表\
  \ 3-10 展示了该方法的 Objective-C 实现，列表 3-11 展示了 Swift 实现。\n\n***列表 3-10***. `Persistence.m`\
  \ 中的 `deleteAllObjectsForEntityWithName:`\n\n```\n- (void)deleteAllObjectsForEntityWithName:(NSString\
  \ *)name {\n  NSLog(@\"Deleting all objects in entity %@\", name);\n\nNSFetchRequest\
  \ *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:name];\n  fetchRequest.resultType\
  \ = NSManagedObjectIDResultType;\n\nNSArray *objectIDs = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n  for (NSManagedObjectID *objectID\
  \ in objectIDs) {\n    [self.managedObjectContext deleteObject:[self.managedObjectContext\
  \ objectWithID:objectID]];\n  }\n\n[self saveContext];\n\nNSLog(@\"All objects in\
  \ entity %@ deleted\", name);\n}\n```\n\n***列表 3-11***. `Persistence.swift` 中的 `deleteAllObjectsForEntityWithName`\n\
  \n```\nfunc deleteAllObjectsForEntityWithName(name: String) {\n    println(\"Deleting\
  \ all objects in entity \\(name)\")\n    var fetchRequest = NSFetchRequest(entityName:\
  \ name)\n    fetchRequest.resultType = .ManagedObjectIDResultType\n```\n\n\n\n```\n\
  if let managedObjectContext = managedObjectContext {\n    var error: NSError? =\
  \ nil\n    let objectIDs = managedObjectContext.executeFetchRequest(fetchRequest,\
  \ error: &error)\n    for objectID in objectIDs! {\n        managedObjectContext.deleteObject(managedObjectContext.objectWithID(objectID\
  \ as NSManagedObjectID))\n    }\n\n    saveContext()\n\n    println(\"All objects\
  \ in entity \\(name) deleted\")\n}\n```\n\n该方法引入了一项性能优化——我们不再获取某个实体的所有对象，而是仅获取匹配对象的对象标识符。通过将获取请求的\
  \ `resultType` 属性设置为 `NSManagedObjectIDResultType` 来实现这一点。将所有对象标识符获取到数组后，我们遍历它们，并告诉托管对象上下文删除这些标识符对应的对象。完成后，我们保存上下文。\n\
  \n`loadWordList:` 方法使用您刚刚创建的方法来删除所有 `WordCategory` 和 `Word` 实例。然后，它会创建 26 个 `WordCategory`\
  \ 实例——每个实例对应字母“a”到“z”。接着，它会解析单词列表，并将这些单词添加到我们的 Core Data 对象图中，为每个单词设置文本、长度和类别，并在每添加\
  \ 100 个单词后记录一条消息，以便我们可以在 Xcode 控制台中跟踪进度。最后，它保存托管对象上下文。列表 3-12 展示了 Objective-C 的\
  \ `loadWordList:` 方法，列表 3-13 展示了 Swift 的 `loadWordList` 函数。\n\n**列表 3-12**. `Persistence.m`\
  \ 中的 `loadWordList:`\n\n```\n- (void)loadWordList:(NSString *)wordList {\n  // 删除所有现有的单词和类别\n\
  \  [self deleteAllObjectsForEntityWithName:@\"Word\"];\n  [self deleteAllObjectsForEntityWithName:@\"\
  WordCategory\"];\n\n// 创建类别\n  NSMutableDictionary *wordCategories = [NSMutableDictionary\
  \ dictionaryWithCapacity:26];\n  for (char c = 'a'; c <= 'z'; c++) {\n    NSString\
  \ *firstLetter = [NSString stringWithFormat:@\"%c\", c];\n    NSManagedObject *wordCategory\
  \ = [NSEntityDescription insertNewObjectForEntityForName:@\"WordCategory\" inManagedObjectContext:self.managedObjectContext];\n\
  \    [wordCategory setValue:firstLetter forKey:@\"firstLetter\"];\n    [wordCategories\
  \ setValue:wordCategory forKey:firstLetter];\n    NSLog(@\"Added category '%@'\"\
  , firstLetter);\n  }\n\n// 从列表中添加单词\n  NSUInteger wordsAdded = 0;\n  NSArray *newWords\
  \ = [wordList componentsSeparatedByCharactersInSet:[NSCharacterSet whitespaceAndNewlineCharacterSet]];\n\
  \  for (NSString *word in newWords) {\n    if (word.length > 0) {\n      NSManagedObject\
  \ *object = [NSEntityDescription insertNewObjectForEntityForName:@\"Word\" inManagedObjectContext:self.managedObjectContext];\n\
  \      [object setValue:word forKey:@\"text\"];\n      [object setValue:[NSNumber\
  \ numberWithInteger:word.length] forKey:@\"length\"];\n      [object setValue:[wordCategories\
  \ valueForKey:[word substringToIndex:1]] forKey:@\"wordCategory\"];\n      ++wordsAdded;\n\
  \      if (wordsAdded % 100 == 0)\n        NSLog(@\"Added %lu words\", wordsAdded);\n\
  \    }\n  }\n  NSLog(@\"Added %lu words\", wordsAdded);\n  [self saveContext];\n\
  \  NSLog(@\"Context saved\");\n}\n```\n\n**列表 3-13**. `Persistence.swift` 中的 `loadWordList`\n\
  \n```\nfunc loadWordList(wordList: String) {\n    // 删除所有现有的单词和类别\n    deleteAllObjectsForEntityWithName(\"\
  Word\")\n    deleteAllObjectsForEntityWithName(\"WordCategory\")\n\n// 创建类别\n  \
  \  var wordCategories = NSMutableDictionary(capacity: 26)\n    for c in \"abcdefghijklmnopqrstuvwxyz\"\
  \ {\n        let firstLetter = \"\\(c)\"\n        var wordCategory: AnyObject! =\
  \ NSEntityDescription.insertNewObjectForEntityForName(\"WordCategory\", inManagedObjectContext:\
  \ self.managedObjectContext!)\n        wordCategory.setValue(firstLetter, forKey:\
  \ \"firstLetter\")\n        wordCategories.setValue(wordCategory, forKey: firstLetter)\n\
  \        println(\"Added category '\\(firstLetter)'\")\n    }\n\n// 从列表中添加单词\n \
  \   var wordsAdded = 0\n    let newWords = wordList.componentsSeparatedByCharactersInSet(NSCharacterSet.whitespaceAndNewlineCharacterSet())\n\
  \    for word in newWords {\n        if countElements(word) > 0 {\n            var\
  \ object: AnyObject! = NSEntityDescription.insertNewObjectForEntityForName(\"Word\"\
  , inManagedObjectContext: self.managedObjectContext!)\n            object.setValue(word,\
  \ forKey: \"text\")\n            object.setValue(countElements(word), forKey: \"\
  length\")\n            object.setValue(wordCategories.valueForKey((word as NSString).substringToIndex(1)),\
  \ forKey: \"wordCategory\")\n            wordsAdded++\n            if wordsAdded\
  \ % 100 == 0 {\n                println(\"Added \\(wordsAdded) words\")\n      \
  \          saveContext()\n                println(\"Context saved\")\n         \
  \   }\n        }\n    }\n    saveContext()\n    println(\"Context saved\")\n}\n\
  ```\n\n您可能会注意到这段代码处理所创建单词类别的方式有些特别。这段代码没有将单词类别直接存储在 Core Data 中，然后通过获取正确的单词类别来设置单词的\
  \ `wordCategory` 关系，而是将单词类别放入一个 `NSMutableDictionary` 实例中。这是一项性能优化；通过字典查找单词对应的合适类别，要比让\
  \ Core Data 在其对象图中搜索同一类别快得多。在应用程序中使用 Core Data 时，请不要害怕在适当的情况下跳出 Core Data 的范畴来提升性能。\n\
  \n**获取计数**\n\n提供单词列表统计信息的方法 `statistics` 返回一个 `NSString`，我们可以将其放入 WordList 用户界面的文本视图中。我们将从简单的开始，显示单词列表中的单词数量。在本章后续部分，随着我们对\
  \ Core Data 查询的深入学习，我们会不断扩展这个方法。请将列表 3-14 所示的代码添加到 `Persistence.m` 中，或将列表 3-15 所示的代码添加到\
  \ `Persistence.swift` 中，以返回单词列表中的单词数量。\n\n**列表 3-14**. `Persistence.m` 中的 `statistics`\n\
  \n```\n- (NSString *)statistics {\n  NSMutableString *string = [[NSMutableString\
  \ alloc] init];\n  [string appendString:[self wordCount]];\n  return string;\n}\n\
  ```\n\n**列表 3-15**. `Persistence.swift` 中的 `statistics`\n\n```\nfunc statistics()\
  \ -> String {\n    var string = NSMutableString()\n\nstring.appendString(wordCount())\n\
  \    return string\n}\n```\n\n现在，实现列表 3-16（Objective-C）和列表 3-17（Swift）中所示的 `wordCount`\
  \ 方法。\n\n**列表 3-16**. `Persistence.m` 中的 `wordCount`\n\n```\n- (NSString *)wordCount\
  \ {\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Word\"];\n  NSUInteger count = [self.managedObjectContext countForFetchRequest:fetchRequest\
  \ error:nil];\n  return [NSString stringWithFormat:@\"Word Count: %lu\\n\", count];\n\
  }\n```\n\n**列表 3-17**. `Persistence.swift` 中的 `wordCount`\n\n```\nfunc wordCount()\
  \ -> String {\n    let fetchRequest = NSFetchRequest(entityName: \"Word\")\n   \
  \ var error: NSError? = nil\n    let count = self.managedObjectContext!.countForFetchRequest(fetchRequest,\
  \ error: &error)\n    return \"Word Count: \\(count)\\n\"\n}\n```\n\n\n\n该方法创建了一个\
  \ fetch 请求，但并未调用 `executeFetchRequest:error:`，而是调用了托管对象上下文中的另一个方法：`countForFetchRequest:error:`。该方法不返回\
  \ fetch 请求的结果，而是返回该 fetch 请求将返回的条目数量。在本例中，它返回 `Word` 实体中的对象数量，即单词数量。\n\n## 显示统计信息\n\
  \n最后，我们在界面中添加代码，以处理“加载单词列表”按钮的点击事件，并显示关于单词列表的统计信息。代码清单 3-18（Objective-C）和代码清单 3-19（Swift）分别展示了更新后的\
  \ `ViewController.m` 或 `ViewController.swift` 文件。这段代码添加了一个 `updateStatistics` 方法，该方法调用我们刚刚实现的\
  \ `Persistence` 的 `statistics` 方法，并将文本视图的文本设置为返回的值。该方法在视图即将出现时以及单词列表加载完成后，都会调用 `updateStatistics`\
  \ 方法。\n\n`loadWordList:` 的实现会从相应 URL（统一资源定位符）异步加载单词列表，并将该列表交给应用程序的持久化层进行存储。加载完成后，它会更新文本视图中的统计信息。\n\
  \n**代码清单 3-18.** `ViewController.m`\n\n```\n#import \"ViewController.h\"\n#import\
  \ \"AppDelegate.h\"\n#import \"Persistence.h\"\n\n@implementation ViewController\n\
  \n- (void)viewWillAppear:(BOOL)animated {\n  [super viewWillAppear:animated];\n\
    [self updateStatistics];\n}\n\n- (void)updateStatistics {\n  AppDelegate *appDelegate\
  \ = (AppDelegate *)[[UIApplication sharedApplication] delegate];\n  self.textView.text\
  \ = [appDelegate.persistence statistics];\n}\n\n- (IBAction)loadWordList:(id)sender\
  \ {\n  // 加载时隐藏按钮\n  [(UIButton *)sender setHidden:YES];\n\n// 加载单词\n  NSURL *url\
  \ = [NSURL URLWithString:@\"https://dotnetperls-controls.googlecode.com/files/enable1.txt\"\
  ];\n  NSURLRequest *request = [NSURLRequest requestWithURL:url];\n  NSLog(@\"载入单词列表\"\
  );\n  [NSURLConnection sendAsynchronousRequest:request\n                                    \
  \ queue:[NSOperationQueue mainQueue]\n                         completionHandler:^(NSURLResponse\
  \ *response, NSData *data, NSError *error) {\n                           NSString\
  \ *words = [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];\n\
                             NSInteger statusCode = [(NSHTTPURLResponse *)response\
  \ statusCode];\n                           // 检查是否加载成功\n                          \
  \ if (words != nil && statusCode == 200) {\n                             // 将单词列表交给持久化层\n\
                               AppDelegate *appDelegate = (AppDelegate *)[[UIApplication\
  \ sharedApplication] delegate];\n                             [appDelegate.persistence\
  \ loadWordList:words];\n                           }\n                          \
  \ else {\n                             // 加载失败；显示错误信息\n                            \
  \ NSLog(@\"错误：%lu\", statusCode);\n                             if (error != NULL)\n\
                                 NSLog(@\"错误：%@\", [error localizedDescription]);\n\
                             }\n\n// 显示按钮\n                           [(UIButton *)sender\
  \ setHidden:NO];\n\n// 用统计信息更新文本视图\n                           [self updateStatistics];\n\
                           }];\n}\n\n@end\n```\n\n**代码清单 3-19.** `ViewController.swift`\n\
  \n```\nimport UIKit\n\nclass ViewController: UIViewController {\n    @IBOutlet weak\
  \ var textView: UITextView!\n\noverride func viewWillAppear(animated: Bool) {\n\
          super.viewWillAppear(animated)\n        updateStatistics()\n    }\n\nfunc\
  \ updateStatistics() {\n        let appDelegate = UIApplication.sharedApplication().delegate\
  \ as AppDelegate\n        textView.text = appDelegate.persistence?.statistics()\n\
      }\n\n@IBAction func loadWordList(sender: AnyObject) {\n        // 加载时隐藏按钮\n\
          (sender as UIButton).hidden = true\n\n// 加载单词\n        let url = NSURL(string:\
  \ \"https://dotnetperls-controls.googlecode.com/files/enable1.txt\")\n        let\
  \ request = NSURLRequest(URL: url!)\n        println(\"载入单词列表\")\n\nNSURLConnection.sendAsynchronousRequest(request,\
  \ queue: NSOperationQueue.mainQueue()) { (response: NSURLResponse!, data: NSData!,\
  \ error: NSError!) -> Void in\n            let words = NSString(data: data, encoding:\
  \ NSUTF8StringEncoding)\n\n// 检查是否加载成功\n            if error == nil && response\
  \ != nil && (response as NSHTTPURLResponse).statusCode == 200 {\n                //\
  \ 将单词列表交给持久化层\n                let appDelegate = UIApplication.sharedApplication().delegate\
  \ as AppDelegate\n                appDelegate.persistence?.loadWordList(words!)\n\
              }\n            else {\n                // 加载失败；显示错误信息\n                if\
  \ response != nil { println(\"错误：\\((response as NSHTTPURLResponse).statusCode)\"\
  ) }\n                println(\"错误：\\(error.localizedDescription)\")\n            }\n\
  \n// 显示按钮\n            (sender as UIButton).hidden = false\n\n// 用统计信息更新文本视图\n            self.updateStatistics()\n\
          }\n    }\n}\n```\n\n构建并运行应用程序，然后点击“加载单词列表”按钮。几秒钟后（取决于网络连接速度和计算机速度），您应该会看到“加载单词列表”按钮重新出现，并且应用程序的文本区域中显示了单词数量，如图\
  \ 3-4 所示。\n\n![9781430260288_Fig03-04.jpg](img/9781430260288_Fig03-04.jpg)\n\n**图\
  \ 3-4.** 显示单词数量的 WordList 应用程序\n\n在本章后续内容中，我们将更新 `Persistence` 中的 `statistics` 方法，以对单词列表数据执行更多查询，并返回更多信息以显示在界面中。\n\
  \n## 查询关系\n\n接下来，我们添加到显示的单词列表统计信息中的输出是，以每个字母开头的单词数量。用于获取请求的谓词中的查询语言支持遍历数据模型中定义的关系。为此，您在谓词中通过名称引用关系，并使用点表示法来访问该关系所引用实体的属性。例如，对于\
  \ `Word` 实体，`wordCategory.firstLetter` 引用了 `Word` 中的 `wordCategory` 关系，该关系指向 `WordCategory`\
  \ 实体，并引用该实体中的 `firstLetter` 属性。\n\n我们可以使用 `Word` 实体中定义的 `wordCategory` 关系，根据单词所属的类别来获取它们。为此，我们遍历字母表，并获取其\
  \ `wordCategory` 的 `firstLetter` 设置为当前字母的单词数量。我们创建一个名为 `wordCountForCategory:` 的方法，该方法接受一个字母并获取该字母对应的数量。相关代码如\
  \ 代码清单 3-20（Objective-C）或 代码清单 3-21（Swift）所示。\n\n**代码清单 3-20.** `Persistence.m`\
  \ 中的 `wordCountForCategory:`\n\n```\n- (NSString *)wordCountForCategory:(NSString\
  \ *)firstLetter {\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Word\"];\n  fetchRequest.predicate = [NSPredicate predicateWithFormat:@\"wordCategory.firstLetter\
  \ = %@\", firstLetter];\n  NSUInteger count = [self.managedObjectContext countForFetchRequest:fetchRequest\
  \ error:nil];\n  return [NSString stringWithFormat:@\"以 %@ 开头的单词数量：%lu\\n\", firstLetter,\
  \ count];\n}\n```\n\n**代码清单 3-21.** `Persistence.swift` 中的 `wordCountForCategory`\n\
  \n\n\n```swift\nfunc wordCountForCategory(firstLetter: String) -> String {\n   \
  \ var fetchRequest = NSFetchRequest(entityName: \"Word\")\n    fetchRequest.predicate\
  \ = NSPredicate(format: \"wordCategory.firstLetter = %@\", argumentArray: [firstLetter])\n\
  \n    var error: NSError? = nil\n    let count = self.managedObjectContext!.countForFetchRequest(fetchRequest,\
  \ error: &error)\n\n    return \"Words beginning with \\(firstLetter): \\(count)\\\
  n\"\n}\n```\n\n然后，我们更新`statistics`方法，使其遍历字母表，对每个字母调用`wordCountForCategory:`并将结果追加到统计字符串中。代码清单\
  \ 3-22（Objective-C）或代码清单 3-23（Swift）展示了这段代码。\n\n***代码清单 3-22***。`Persistence.m`中更新后的`statistics`方法\n\
  \n```objc\n- (NSString *)statistics {\n  NSMutableString *string = [[NSMutableString\
  \ alloc] init];\n  [string appendString:[self wordCount]];\n  for (char c = 'a';\
  \ c <= 'z'; c++) {\n    [string appendString:[self wordCountForCategory:[NSString\
  \ stringWithFormat:@\"%c\", c]]];\n  }\n  return string;\n}\n```\n\n***代码清单 3-23***。`Persistence.swift`中更新后的`statistics`函数\n\
  \n```swift\nfunc statistics() -> String {\n    var string = NSMutableString()\n\
  \    string.appendString(wordCount())\n\n    for c in \"abcdefghijklmnopqrstuvwxyz\"\
  \ {\n        string.appendString(wordCountForCategory(\"\\(c)\"))\n    }\n\n   \
  \ return string\n}\n```\n\n现在构建并运行应用程序时，您应该能看到按字母统计的单词数量，如图图 3-5 所示。请注意，每次运行应用程序时无需重新加载单词列表；这些单词已存储在\
  \ Core Data 中，我们的查询基于现有数据执行。\n\n![9781430260288_Fig03-05.jpg](img/9781430260288_Fig03-05.jpg)\n\
  \n图 3-5。显示按字母统计单词数量的 WordList 应用程序\n\n## 理解谓词与表达式\n\n第 2 章讨论了谓词及其两种构建方式。\n\n* 使用查询语言；\n\
  * 使用`NSExpression`类手动构建谓词。\n\n在刚刚实现的`wordCountForCategory:`方法中，我们使用谓词查询语言来过滤查询结果。谓词查询语言类似于结构化查询语言（SQL）的`WHERE`子句：您指定要过滤的属性和关系（即“列”）、这些属性需要与之比较的值，以及比较方式。例如，我们可以通过谓词“`text\
  \ = 'zyzzyvas'`”从单词列表中检索“zyzzyvas”这个词。通常，谓词查询语言比使用`NSExpression`类构建谓词更易于编写和使用。不过，查询语言并不能覆盖`NSExpression`的所有用例，有时您也可能更喜欢使用`NSExpression`，因此理解这两种方法对于获取目标数据至关重要。\n\
  \n简而言之，谓词会对对象执行一次测试。若测试通过，则对象被获取；若失败，则对象不被获取。一个谓词包含两个或多个表达式以及一个或多个比较器。在上一段提到的谓词中，属性`text`和常量字符串`'zyzzyvas'`是表达式，而运算符`=`是比较器，它比较`Word`对象的`text`值与`'zyzzyvas'`，若匹配则返回该`Word`对象。\n\
  \n要使用`NSExpression`构建等效谓词，您需要创建两个表达式：一个用于`text`，一个用于`\"zyzzyvas\"`，然后创建一个`NSComparisonPredicate`实例来比较这两个表达式，判断它们是否相等。相应的代码如代码清单\
  \ 3-24（Objective-C）或代码清单 3-25（Swift）所示。\n\n***代码清单 3-24***。使用`NSExpression`构建谓词（Objective-C）\n\
  \n```objc\nNSExpression *expressionText = [NSExpression expressionForKeyPath:@\"\
  text\"];\nNSExpression *expressionZyzzyvas = [NSExpression expressionForConstantValue:@\"\
  zyzzyvas\"];\nNSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:expressionText\n\
  \                                                            rightExpression:expressionZyzzyvas\n\
  \                                                            modifier:NSDirectPredicateModifier\n\
  \                                                                type:NSEqualToPredicateOperatorType\n\
  \                                                             options:0];\n```\n\
  \n***代码清单 3-25***。使用`NSExpression`构建谓词（Swift）\n\n```swift\nlet expressionText =\
  \ NSExpression(forKeyPath: \"text\")\nlet expressionZyzzyvas = NSExpression(forConstantValue:\
  \ \"zyzzyvas\")\nlet predicate = NSComparisonPredicate(leftExpression: expressionText,\
  \ rightExpression: expressionZyzzyvas, modifier: .DirectPredicateModifier, type:\
  \ .EqualToPredicateOperatorType, options: NSComparisonPredicateOptions.convertFromNilLiteral())\n\
  ```\n\n这段代码显然更复杂，但它实现了与查询语言谓词相同的功能。在接下来的几节中，我们将深入探讨如何通过这种方式创建谓词。但在进一步讲解之前，请先证明两种方法都可行：在\
  \ WordList 应用程序中分别通过两种方式添加方法来检索单词“zyzzyvas”，并在文本视图中显示结果。同时，调用`NSPredicate`的`predicateFormat`方法记录用`NSExpression`创建的谓词。代码清单\
  \ 3-26 展示了 Objective-C 代码，代码清单 3-27 展示了 Swift 代码。\n\n***代码清单 3-26***。同时使用查询语言和`NSExpression`（Objective-C）\n\
  \n```objc\n- (NSString *)statistics {\n  NSMutableString *string = [[NSMutableString\
  \ alloc] init];\n  [string appendString:[self wordCount]];\n  for (char c = 'a';\
  \ c <= 'z'; c++) {\n    [string appendString:[self wordCountForCategory:[NSString\
  \ stringWithFormat:@\"%c\", c]]];\n  }\n  [string appendString:[self zyzzyvasUsingQueryLanguage]];\n\
  \  [string appendString:[self zyzzyvasUsingNSExpression]];\n  return string;\n}\n\
  \n- (NSString *)zyzzyvasUsingQueryLanguage {\n  NSFetchRequest *fetchRequest = [NSFetchRequest\
  \ fetchRequestWithEntityName:@\"Word\"];\n  fetchRequest.predicate = [NSPredicate\
  \ predicateWithFormat:@\"text = 'zyzzyvas'\"];\n  NSArray *words = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n  return words.count == 0 ? @\"\"\
  \ : [NSString stringWithFormat:@\"%@\\n\", [words[0] valueForKey:@\"text\"]];\n\
  }\n- (NSString *)zyzzyvasUsingNSExpression {\n  NSExpression *expressionText = [NSExpression\
  \ expressionForKeyPath:@\"text\"];\n  NSExpression *expressionZyzzyvas = [NSExpression\
  \ expressionForConstantValue:@\"zyzzyvas\"];\n  NSPredicate *predicate = [NSComparisonPredicate\
  \ predicateWithLeftExpression:expressionText\n                                 \
  \                             rightExpression:expressionZyzzyvas\n             \
  \                                              modifier:NSDirectPredicateModifier\n\
  \                                                               type:NSEqualToPredicateOperatorType\n\
  \                                                            options:0];\n  NSLog(@\"\
  Predicate: %@\", [predicate predicateFormat]);\n  NSFetchRequest *fetchRequest =\
  \ [NSFetchRequest fetchRequestWithEntityName:@\"Word\"];\n  fetchRequest.predicate\
  \ = predicate;\n  NSArray *words = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  return words.count == 0 ? @\"\" : [NSString stringWithFormat:@\"\
  %@\\n\", [words[0] valueForKey:@\"text\"]];\n}\n```\n\n***代码清单 3-27***。同时使用查询语言和`NSExpression`（Swift）\n\
  \n```swift\nfunc statistics() -> String {\n    var string = NSMutableString()\n\
  \    string.appendString(wordCount())\n```\n\n\n\n```swift\nfor c in \"abcdefghijklmnopqrstuvwxyz\"\
  \ {\n    string.appendString(wordCountForCategory(\"\\(c)\"))\n}\n\nstring.appendString(zyzzyvasUsingQueryLanguage())\n\
  string.appendString(zyzzyvasUsingNSExpression())\n\nreturn string\n}\n\nfunc zyzzyvasUsingQueryLanguage()\
  \ -> String {\n    var fetchRequest = NSFetchRequest(entityName: \"Word\")\n   \
  \ fetchRequest.predicate = NSPredicate(format: \"text = 'zyzzyvas'\", argumentArray:\
  \ [])\n\n    var error: NSError? = nil\n    if let words = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error) {\n        if words.isEmpty { return \"\" }\n        else {\n \
  \           let word: AnyObject! = words[0].valueForKey(\"text\")\n            return\
  \ \"\\(word)\\n\"\n        }\n        else { return \"\" }\n    }\n}\n\nfunc zyzzyvasUsingNSExpression()\
  \ -> String {\n    let expressionText = NSExpression(forKeyPath: \"text\")\n   \
  \ let expressionZyzzyvas = NSExpression(forConstantValue: \"zyzzyvas\")\n    let\
  \ predicate = NSComparisonPredicate(leftExpression: expressionText, rightExpression:\
  \ expressionZyzzyvas, modifier: .DirectPredicateModifier, type: .EqualToPredicateOperatorType,\
  \ options: nil)\n\n    println(\"Predicate: \\(predicate.predicateFormat)\")\n\n\
  \    var fetchRequest = NSFetchRequest(entityName: \"Word\")\n    fetchRequest.predicate\
  \ = predicate\n\n    var error: NSError? = nil\n    if let words = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error) {\n        if words.isEmpty { return \"\" }\n        else {\n \
  \           let word: AnyObject! = words[0].valueForKey(\"text\")\n            return\
  \ \"\\(word)\\n\"\n        }\n    }\n    else { return \"\" }\n}\n```\n\n如果你运行`WordList`应用，应该会在文本视图中看到单词“zyzzyvas”出现两次。同时，你也应该会在日志中看到该谓词的文本版本。\n\
  \n```\nPredicate: text == \"zyzzyvas\"\n```\n\n## 查看你的 SQL 查询\n\n对于那些更熟悉 SQL 语句而不是`NSPredicate`和`NSExpression`的开发者，你可以指示你的应用在执行获取请求时记录所使用的\
  \ SQL 语句。这有助于你理解 Core Data 如何解释你的谓词和表达式，从而使调试获取请求变得更简单。\n\n要开启应用的 SQL 调试功能，请在 Xcode\
  \ 中编辑运行方案，并在“启动时传递的参数”（Arguments Passed on Launch）部分添加以下参数。\n\n```\n-com.apple.CoreData.SQLDebug\
  \ 1\n```\n\n注意前面的短横线。你的 Xcode 方案设置应与图 3-6 一致。\n\n![9781430260288_Fig03-06.jpg](img/9781430260288_Fig03-06.jpg)\n\
  \n图 3-6. 在启动时传递的参数中添加`-com.apple.CoreData.SQLDebug 1`\n\n将这些参数添加到`WordList`运行方案中，然后启动应用。现在你应该可以在\
  \ Xcode 控制台中看到`WordList`用于获取数据的 SQL 语句，以及其他信息（如查询持续时间）。输出内容类似于以下内容：\n\n```\n2014-07-30\
  \ 11:45:15.647 WordList[65858:2586192] CoreData: sql: SELECT COUNT(DISTINCT t0.Z_PK)\
  \ FROM ZWORD t0 JOIN ZWORDCATEGORY t1 ON t0.ZWORDCATEGORY = t1.Z_PK WHERE  t1.ZFIRSTLETTER\
  \ = ?\n2014-07-30 11:45:15.699 WordList[65858:2586192] CoreData: annotation: total\
