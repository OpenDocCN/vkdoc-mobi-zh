  \n图 5-12 带有截图的 Bug\n\n## 验证外部存储\n\n根据你选择的图片大小，Core Data 可能已将截图作为外部记录存储，并在 SQLite\
  \ 数据库中有一个唯一标识符。如果文件已存储在外部，你可以在与 SQLite 数据库文件相同的目录下的一个子目录中找到它，该目录名为 `.CoreDump_SUPPORT/_EXTERNAL_DATA`。例如，对于图\
  \ 5-12 中截图所示的 bug，我们可以看到 Core Data 在 SQLite 中存储了一个指向外部文件的标识符。\n\n```\nsqlite> select\
  \ * from zbug;1|1|5|1|This is a terrible bug|Terrible Bug|FC88541E-A362-40E2-8680-5D4553764B86\n\
  ```\n\n我们可以在 `.CoreDump_SUPPORT/_EXTERNAL_DATA/FC88541E-A362-40E2-8680-5D4553764B86`\
  \ 处看到该文件，并能在预览中打开它，确认它确实是我们存储的图片。\n\n## 在表格中搜索获取的结果\n\n如果主视图中有很多项目，你可能会难以找到要查找的项目。用户希望能够搜索数据并过滤结果，以缩小结果集并更快地定位目标。对于表格中的搜索，iOS\
  \ 8 弃用了旧的搜索栏和搜索显示控制器（`UISearchDisplayController`），并引入了一个用于搜索的新类：`UISearchController`。在接下来的几节中，我们将展示如何使用`UISearchController`为`CoreDump`的主视图添加搜索功能。\n\
  \n### 添加搜索控制器\n\nInterface Builder 尚未添加新的`UISearchController`，因此你必须通过代码添加这种搜索支持。首先在`MasterViewController.h`或`MasterViewController.swift`中声明`MasterViewController`遵循`UISearchResultsUpdating`协议。在编辑该文件时，为`UISearchController`实例添加一个名为`searchController`的属性。另外，出于我们稍后将说明的原因，添加一个属性来存储一个`NSPredicate`实例，我们称之为`searchPredicate`。列表\
  \ 5-73（Objective-C）和列表 5-74（Swift）展示了这些更改。\n\n***列表 5-73*** 为`UISearchController`更新`MasterViewController.h`（Objective-C）\n\
  \n```\n@interface MasterViewController : UITableViewController <NSFetchedResultsControllerDelegate,\
  \ UISearchResultsUpdating>\n...\n@property (strong, nonatomic) UISearchController\
  \ *searchController;\n@property (strong, nonatomic) NSPredicate *searchPredicate;\n\
  ...\n@end\n```\n\n***列表 5-74*** 为`UISearchController`更新`MasterViewController.swift`（Swift）\n\
  \n```\nclass MasterViewController: UITableViewController, NSFetchedResultsControllerDelegate,\
  \ UISearchResultsUpdating {\n  ...\n  var searchController: UISearchController!\n\
  \  var searchPredicate: NSPredicate? = nil\n  ...\n}\n```\n\n在你的`viewDidLoad:`方法中，创建`UISearchController`实例并将其分配给`searchController`。初始化器接受一个参数，用于指定显示搜索结果的视图控制器；传递`nil`将在你正在搜索的同一视图中显示结果，在我们的例子中，就是显示项目的表格视图。我们还做了几件事：\n\
  \n- 告诉背景在搜索期间不要变暗\n- 将搜索结果更新器（负责更新搜索结果的类）设置为我们的`MasterViewController`实例\n- 调整搜索栏的大小以适配\n\
  - 将搜索栏设置为表格的标题\n- 将表格视图的委托设置为我们的`MasterViewController`实例，这样无论是否正在搜索，都能处理点击事件\n-\
  \ 将自身设置为定义演示上下文\n\n列表 5-75 展示了 Objective-C 的`viewDidLoad:`方法，列表 5-76 展示了 Swift 的`viewDidLoad:`函数。\n\
  \n***列表 5-75*** 创建 UISearchController（Objective-C）\n\n```\n- (void)viewDidLoad {\n\
  \  [super viewDidLoad];\n\n  self.navigationItem.leftBarButtonItem = self.editButtonItem;\n\
  \n  UIBarButtonItem *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self action:@selector(insertNewObject:)];\n  self.navigationItem.rightBarButtonItem\
  \ = addButton;\n\n  // 创建搜索控制器，由该控制器显示搜索结果\n  self.searchController = [[UISearchController\
  \ alloc] initWithSearchResultsController:nil];\n  self.searchController.dimsBackgroundDuringPresentation\
  \ = NO;\n  self.searchController.searchResultsUpdater = self;\n  [self.searchController.searchBar\
  \ sizeToFit];\n  self.tableView.tableHeaderView = self.searchController.searchBar;\n\
  \  self.tableView.delegate = self;\n  self.definesPresentationContext = YES;\n}\n\
  ```\n\n***列表 5-76*** 创建 UISearchController（Swift）\n\n\n\n```\noverride func viewDidLoad()\
  \ {\n  super.viewDidLoad()\n\nself.navigationItem.leftBarButtonItem = self.editButtonItem()\n\
  \nlet addButton = UIBarButtonItem(barButtonSystemItem: .Add, target: self, action:\
  \ \"insertNewObject:\")\n  self.navigationItem.rightBarButtonItem = addButton\n\n\
  // Create the search controller with this controller displaying the search results\n\
  \  self.searchController = UISearchController(searchResultsController: nil)\n  self.searchController.dimsBackgroundDuringPresentation\
  \ = false\n  self.searchController.searchResultsUpdater = self\n  self.searchController.searchBar.sizeToFit()\n\
  \  self.tableView.tableHeaderView = self.searchController?.searchBar\n  self.tableView.delegate\
  \ = self\n  self.definesPresentationContext = true\n}\n```\n\n## 检索搜索结果\n\n不要急于返回\
  \ Core Data 存储区来获取搜索查询的结果。互联网上充斥着关于创建第二个获取结果控制器来检索搜索结果的建议，但这并非必要。你已经有了一个包含所有待搜索结果的获取结果控制器。你只需要将结果集从所有对象缩小到与搜索查询匹配的对象即可。\n\
  \n获取结果控制器有一个名为 `fetchedObjects` 的属性，其中包含所有结果。我们可以利用该属性以及关于谓词的知识，将获取到的对象过滤为仅与搜索查询匹配的对象。对于\
  \ CoreDump 应用，当用户搜索时，我们只想显示那些名称或 URL 包含搜索文本（不区分大小写）的项目。我们在 `MasterViewController`\
  \ 上创建一个名为 `updateSearchResultsForSearchController:` 的新方法，以履行我们对遵循 `UISearchResultsUpdating`\
  \ 协议的承诺。当搜索栏获得焦点或搜索文本发生变化时，会调用此方法，它会创建执行过滤的谓词。它首先获取搜索文本（包含在 `self.searchController.searchBar.text`\
  \ 中），如果找到任何文本，则创建一个适当的谓词并将其存储在 `searchPredicate` 中。然后，它会重新加载表格。代码清单 5-77（Objective-C）和代码清单\
  \ 5-78（Swift）展示了 `updateSearchResultsForSearchController:` 方法。\n\n### 代码清单 5-77.\
  \ 在 `MasterViewController.m` 中创建搜索谓词\n\n```\n- (void)updateSearchResultsForSearchController:(UISearchController\
  \ *)searchController {\n  NSString *searchText = self.searchController.searchBar.text;\n\
  \  self.searchPredicate = searchText.length == 0 ? nil : [NSPredicate predicateWithFormat:@\"\
  name contains[c] %@ or url contains[c] %@\", searchText, searchText];\n\n[self.tableView\
  \ reloadData];\n}\n```\n\n### 代码清单 5-78. 在 `MasterViewController.swift` 中创建搜索谓词\n\
  \n```\nfunc updateSearchResultsForSearchController(searchController: UISearchController)\
  \ {\n  let searchText = self.searchController?.searchBar.text\n  if let searchText\
  \ = searchText {\n    self.searchPredicate = searchText.isEmpty ? nil : NSPredicate(format:\
  \ \"name contains[c] %@ or url contains[c] %@\", searchText, searchText)\n\nself.tableView.reloadData()\n\
  \  }\n}\n```\n\n## 显示搜索结果\n\n由于我们使用同一个表格来显示常规结果和搜索结果，为了在两者之间切换，我们需要更新表格视图数据源中的方法，以检查\
  \ `searchPredicate` 是否为非 `nil`。如果 `searchPredicate` 非 `nil`，则将其应用于获取结果控制器中的 `fetchedObjects`\
  \ 属性。否则，我们使用现有的获取结果控制器代码。\n\n对于搜索结果，我们不进行分区，因此我们希望只有一个分区且不带分区标题。代码清单 5-79（Objective-C）和代码清单\
  \ 5-80（Swift）展示了更新后的 `numberOfSectionsInTableView:` 和 `tableView:titleForHeaderInSection:`\
  \ 方法，它们根据是否有搜索谓词返回不同的结果。\n\n### 代码清单 5-79. 设置表格视图的分区（Objective-C）\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n  return self.searchPredicate == nil ? [[self.fetchedResultsController\
  \ sections] count] : 1;\n}\n\n- (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\
  \ {\n  if (self.searchPredicate == nil) {\n    id <NSFetchedResultsSectionInfo>\
  \ sectionInfo = [self.fetchedResultsController sections][section];\n    return [sectionInfo\
  \ name];\n  } else {\n    return nil;\n  }\n}\n```\n\n### 代码清单 5-80. 设置表格视图的分区（Swift）\n\
  \n```\noverride func numberOfSectionsInTableView(tableView: UITableView) -> Int\
  \ {\n  return self.searchPredicate == nil ? self.fetchedResultsController.sections?.count\
  \ ?? 0 : 1\n}\n\noverride func tableView(tableView: UITableView, titleForHeaderInSection\
  \ section: Int) -> String? {\n  if self.searchPredicate == nil {\n    let sectionInfo\
  \ = self.fetchedResultsController.sections![section] as NSFetchedResultsSectionInfo\n\
  \    return sectionInfo.name\n  } else {\n    return nil\n  }\n}\n```\n\n为了确定某个分区的行数，我们再次检查\
  \ `searchPredicate` 是否非 `nil`，以决定是否将谓词应用于获取结果控制器的已获取对象。代码清单 5-81（Objective-C）和代码清单\
  \ 5-82（Swift）展示了更新后的 `tableView:numberOfRowsInSection:` 方法。\n\n### 代码清单 5-81. 返回分区的行数（Objective-C）\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\
  \ {\n  if (self.searchPredicate == nil) {\n    id <NSFetchedResultsSectionInfo>\
  \ sectionInfo = [self.fetchedResultsController sections][section];\n    return [sectionInfo\
  \ numberOfObjects];\n  } else {\n    return [[self.fetchedResultsController.fetchedObjects\
  \ filteredArrayUsingPredicate:self.searchPredicate] count];\n  }\n}\n```\n\n###\
  \ 代码清单 5-82. 返回分区的行数（Swift）\n\n```\noverride func tableView(tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\n  if self.searchPredicate == nil\
  \ {\n    let sectionInfo = self.fetchedResultsController.sections![section] as NSFetchedResultsSectionInfo\n\
  \    return sectionInfo.numberOfObjects\n  } else {\n    let filteredObjects = self.fetchedResultsController.fetchedObjects?.filter()\
  \ {\n      return self.searchPredicate!.evaluateWithObject($0)\n    }\n    return\
  \ filteredObjects == nil ? 0 : filteredObjects!.count\n  }\n}\n```\n\n对于返回要在表格中显示的单元格，我们保持现有的\
  \ `tableView:cellForRowAtIndexPath:` 方法不变，只需要更新 `configureCell:atIndexPath:` 方法，以决定是从过滤后的还是未过滤的已获取对象中获取项目，同样取决于是否存在搜索谓词。代码清单\
  \ 5-83（Objective-C）和代码清单 5-84（Swift）展示了如何实现。\n\n### 代码清单 5-83. 配置单元格（Objective-C）\n\
  \n\n```objc\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath\
  \ *)indexPath {\n  Project *project = nil;\n  if (self.searchPredicate == nil) {\n\
  \    project = [self.fetchedResultsController objectAtIndexPath:indexPath];\n  }\
  \ else {\n    project = [self.fetchedResultsController.fetchedObjects filteredArrayUsingPredicate:self.searchPredicate][indexPath.row];\n\
  \  }\n  cell.textLabel.text = project.name;\n  cell.detailTextLabel.text = project.url;\n\
  }\n```\n\n***代码清单 5-84*** 配置单元格 (Objective-C)\n\n```swift\nfunc configureCell(cell:\
  \ UITableViewCell, atIndexPath indexPath: NSIndexPath) {\n  let project = self.searchPredicate\
  \ == nil ?\n    self.fetchedResultsController.objectAtIndexPath(indexPath) as Project\
  \ :\n      self.fetchedResultsController.fetchedObjects?.filter() {\n          return\
  \ self.searchPredicate!.evaluateWithObject($0)\n      }[indexPath.row] as Project\n\
  \ncell.textLabel.text = project.name\n  cell.detailTextLabel?.text = project.url\n\
  }\n```\n\n由于我们不允许编辑搜索结果，我们更新 `tableView:canEditRowAtIndexPath:` 方法，使其仅在搜索谓词为 `nil`\
  \ 时返回 `YES` 或 `true`，如代码清单 5-85 (Objective-C) 和代码清单 5-86 (Swift) 所示。\n\n***代码清单\
  \ 5-85*** 仅允许对未过滤结果进行编辑 (Objective-C)\n\n```objc\n- (BOOL)tableView:(UITableView\
  \ *)tableView canEditRowAtIndexPath:(NSIndexPath *)indexPath {\n  return self.searchPredicate\
  \ == nil;\n}\n```\n\n***代码清单 5-86*** 仅允许对未过滤结果进行编辑 (Swift)\n\n```swift\noverride\
  \ func tableView(tableView: UITableView, canEditRowAtIndexPath indexPath: NSIndexPath)\
  \ -> Bool {\n  return self.searchPredicate == nil\n}\n```\n\n由于我们不允许在搜索视图中编辑，我们可以忽略所有响应表格视图处于编辑模式的方法。\n\
  \n你需要做的最后一个修改是 `prepareForSegue:sender:` 方法，以获取正确的项目并设置到详情控制器中。与 `configureCell:atIndexPath:`\
  \ 方法一样，你通过检查搜索谓词是否存在来决定是否使用过滤后的对象。代码清单 5-87 (Objective-C) 和代码清单 5-88 (Swift) 展示了更新后的\
  \ `prepareForSegue:sender:` 方法。\n\n***代码清单 5-87*** 点击项目时处理过滤后的结果 (Objective-C)\n\
  \n```objc\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\
  \ {\n  if ([[segue identifier] isEqualToString:@\"showDetail\"]) {\n    NSIndexPath\
  \ *indexPath = [self.tableView indexPathForSelectedRow];\n    Project *project =\
  \ nil;\n    if (self.searchPredicate == nil) {\n      project = [self.fetchedResultsController\
  \ objectAtIndexPath:indexPath];\n    } else {\n      project = [self.fetchedResultsController.fetchedObjects\
  \ filteredArrayUsingPredicate:self.searchPredicate][indexPath.row];\n    }\n   \
  \ [[segue destinationViewController] setProject:project];\n  }\n}\n```\n\n***代码清单\
  \ 5-88*** 点击项目时处理过滤后的结果 (Swift)\n\n```swift\noverride func prepareForSegue(segue:\
  \ UIStoryboardSegue, sender: AnyObject?) {\n  if segue.identifier == \"showDetail\"\
  \ {\n    if let indexPath = self.tableView.indexPathForSelectedRow() {\n\nlet project\
  \ = self.searchPredicate == nil ?\n        self.fetchedResultsController.objectAtIndexPath(indexPath)\
  \ as Project :\n        self.fetchedResultsController.fetchedObjects?.filter() {\n\
  \          return self.searchPredicate!.evaluateWithObject($0)\n          }[indexPath.row]\
  \ as Project\n\n(segue.destinationViewController as DetailViewController).project\
  \ = project\n    }\n  }\n}\n```\n\n你现在应该可以运行 CoreDump 并使用搜索栏来过滤结果，如图 5-13 所示。\n\n\
  ![9781430260288_Fig05-13.jpg](img/9781430260288_Fig05-13.jpg)\n\n图 5-13 搜索“github”\n\
  \n## 总结\n\nCoreDump 应用程序远称不上完整，但它演示了如何轻松地将来自 Core Data 存储的数据和图像集成到基于表格视图的应用程序中。由于大多数\
  \ iOS 应用程序都使用表格和图像，你将在应用程序开发中多次使用获取结果控制器和外部记录来创建性能良好的应用程序。\n\n"
- '# 第 6 章


  '
- "# 数据版本控制与迁移\n\n在开发基于 Core Data 的应用程序时，你通常无法在第一次就完全正确地设计出数据模型。你从创建一个看似满足应用数据需求的数据模型开始，但随着开发的深入，你常常会发现数据模型需要变更，以适应你对应用程序功能日益增长的愿景。在应用生命周期的这个阶段，根据你对应用数据的新认识来修改数据模型代价很小：你的应用将无法启动，会在启动时崩溃并显示以下消息：\n\
  \n```\n用于打开存储的模型与用于创建存储的模型不兼容。\n```\n\n你解决这个问题的方法要么是在文件系统中找到数据库文件并删除它，要么是从 iPhone\
  \ 模拟器或设备上删除你尚在雏形中的应用。无论采用哪种方式，使用旧版模式（Schema）的数据库文件以及持久化存储中的数据都会消失，而你的应用程序在下次启动时会重新创建数据库文件。在应用开发过程中，你可能需要这样做多次。\n\
  \n然而，一旦你发布了应用程序，用户开始使用它，他们会在其设备上的持久化存储中积累他们认为重要的数据。如果每次你想发布一个带有修改后数据模型的新版本应用时，都要求用户删除他们的数据存储，你的应用会立刻被评为一星（甚至可能更低），评论者会谴责苹果的评分系统不允许零星或负星评级。\n\
  \n这是否意味着发布应用会冻结其数据模型？你的应用 1.0 版本的数据模型是永久性的？你最好在第一个公开版本中就做到数据模型完美无缺，因为以后再也无法更改？谢天谢地，并非如此。苹果预见到了在应用生命周期中改进\
  \ Core Data 模型的需求，并内置了机制，让你能够更改数据模型，然后将用户的数据迁移到新模型，整个过程无需苹果的干预甚至知晓。本章将介绍数据模型版本控制的流程以及跨版本的数据迁移，无论你对模型做了多么复杂的修改。\n\
  \n## 版本控制\n\n为了利用 Core Data 对数据模型版本控制以及跨版本数据迁移的支持，你首先要显式地创建一个数据模型的新版本。为了说明其工作原理，让我们从第\
  \ 4 章中再次引入 BookStore 应用程序。复制一份，因为你将在本章中多次更改它的数据模型。在 BookStore 的原始版本中，你创建了一个数据模型，该模型的外观如图\
  \ 6-1 所示。\n\n![9781430260288_Fig06-01.jpg](img/9781430260288_Fig06-01.jpg)\n\n图\
  \ 6-1 单版本数据模型\n```\n\n\n`BookStore.xcdatamodeld`包含数据模型，实际上是文件系统中的一个目录。它包含应用程序运行时创建\
  \ Core Data 存储所需的文件。由于对象模型只有一个版本，它自动成为当前版本。要添加新版本，请从 Xcode 菜单中选择 Editor ![image](img/arrow.jpg)\
  \ Add Model Version。此时会弹出一个面板，允许您输入版本名称并选择新版本所基于的模型，如图 6-2 所示。\n\n![9781430260288_Fig06-02.jpg](img/9781430260288_Fig06-02.jpg)\n\
  \n图 6-2. 创建新模型版本\n\n接受默认设置并选择 Finish。Xcode 会在`BookStore.xcdatamodeld`内部创建一个名为`BookStore\
  \ 2.xcdatamodel`的新目录，如图 6-3 所示。`BookStore.xcdatamodeld`下方的每个条目代表数据模型的一个版本；绿色勾选标记表示应用程序当前正在使用的版本。\n\
  \n![9781430260288_Fig06-03.jpg](img/9781430260288_Fig06-03.jpg)\n\n图 6-3. 包含两个版本的数据模型\n\
  \n您可以看到原始数据模型`BookStore.xcdatamodeld`是当前版本。在将当前版本从`BookStore.xcdatamodeld`更改为`BookStore\
  \ 2.xcdatamodel`之前，请运行 BookStore 应用程序来创建书籍，以便有数据进行跨版本迁移。您需要在数据库中有数据来测试本章中的数据迁移是否正常工作。\n\
  \n最后，我们需要对 BookStore 应用程序进行一个小的更改。在第 4 章中，我们希望能够每次运行时都有干净的数据存储。由于我们现在想要测试迁移现有数据，需要确保旧数据存储在应用程序启动时不会被清除。打开`ViewController.m`或`ViewController.swift`，并编辑`viewDidAppear:`方法，注释掉以下代码行：\n\
  \n```\n// [self initStore];// [self insertSomeData];\n```\n\n或\n\n```\n// self.initStore()\n\
  // self.insertSomeData()\n```\n\n再次启动应用程序，确保没有创建任何内容。它应该只显示`showExampleData`方法的输出。\n\
  \n```\nBook fetched: The second bookTitle: The second book, price: 15.00Book fetched:\
  \ The third bookTitle: The third book, price: 10.00Book fetched: The first bookTitle:\
  \ The first book, price: 10.00Book fetched: The fourth bookTitle: The fourth book,\
  \ price: 12.00\n```\n\n现在，假设您想要向`Book`实体添加一个新的`author`属性。如果您编辑当前模型并向`Book`实体添加`author`属性，您将会惊讶地发现应用程序在启动时崩溃。这是因为数据存储中的数据与新的\
  \ Core Data 模型不匹配。缓解此问题的一个方法是删除现有的数据存储。在开发应用程序时，这是一个可以接受的选项，但如果您的应用程序已经有用户在使用，这将会招致他们的愤怒。为了获得更流畅的体验，我们强烈建议对模型进行版本控制，并使用\
  \ Core Data 的迁移功能，通过将用户的数据从旧模型迁移到新模型来保留数据。您对数据模型所做的任何更改都应进入新版本的模型，而不是任何旧版本。这意味着，您需要在\
  \ BookStore 2 数据模型的`Book`实体中添加`name`属性。\n\n要进行此更改，请选择 BookStore 2 数据模型，然后以常规方式向`Book`实体添加一个`String`类型的`author`属性。图\
  \ 6-4 显示了 Xcode 窗口，其中包含新版本的 Core Data 模型以及添加到`Book`实体中的`author`属性。\n\n![9781430260288_Fig06-04.jpg](img/9781430260288_Fig06-04.jpg)\n\
  \n图 6-4. 包含模型第二个版本的 Xcode 窗口\n\n要将模型的当前版本从 BookStore 更改为 BookStore 2，请选择`BookStore.xcdatamodeld`，并在\
  \ Utility 面板中将当前版本设置为 BookStore 2，如图 6-5 所示。\n\n![9781430260288_Fig06-05.jpg](img/9781430260288_Fig06-05.jpg)\n\
  \n图 6-5. 将当前数据模型版本更新为 BookStore 2\n\n此时，您的应用程序拥有一个新版本的当前数据模型，但尚未准备好运行。您需要定义一个策略，将数据从名为\
  \ BookStore 的模型版本迁移到名为 BookStore 2 的版本。如果您现在尝试运行应用程序，将会崩溃，因为就像更改第一个模型一样，数据存储与当前模型不匹配。需要告诉应用程序您希望它如何处理从旧模型到新模型的切换。本章的其余部分将讨论执行此操作的各种方法。\n\
  \n## 轻量级迁移\n\n一旦您拥有版本化的数据模型，就可以利用 Core Data 对迁移的支持来演进您的数据模型。每次创建新的数据模型版本时，用户的应用程序数据都必须从旧数据模型迁移到新数据模型。为了进行迁移，Core\
  \ Data 必须遵循规则来知道如何正确迁移数据。您可以使用“映射模型”来创建这些规则。Xcode 内置了对创建映射模型的支持。然而，对于某些简单的情况，Core\
  \ Data 足够智能，可以自行推断出映射规则，而无需您创建映射模型。这些情况被称为轻量级迁移，对作为开发者的您而言工作量最小。Core Data 会完成所有工作并迁移数据。本节详细介绍了轻量级迁移过程，并逐步介绍了该过程支持的更改类型以及如何实现它们。\n\
  \n要使您的迁移符合轻量级迁移的条件，更改必须仅限于以下几类：\n\n- 添加或删除属性（属性或关系）。\n- 将非可选属性变为可选。\n- 将可选属性变为非可选，前提是您提供了默认值。\n\
  - 添加或删除实体。\n- 重命名属性。\n- 重命名实体。\n\n除了减少您的工作量之外，与使用 SQLite 数据存储的其他迁移相比，轻量级迁移运行速度更快，占用空间更少。由于\
  \ Core Data 可以发出 SQL 语句来执行这些迁移，因此它无需将所有数据加载到内存中即可进行迁移，也无需将数据从一个存储移动到另一个存储。Core Data\
  \ 只需使用 SQL 语句就地修改 SQLite 数据库。如果可行，您应积极尝试将数据模型更改限制在轻量级迁移支持的范围内。如果不行，本章的其他部分将指导您完成更复杂的迁移。\n\
  \n## 迁移简单更改\n\n在之前的“版本控制”部分中，您在 BookStore 应用程序中创建了一个名为 BookStore 2 的新模型版本，并在 BookStore\
  \ 2 模型的`Book`实体中添加了一个名为`author`的新属性。使用此更改执行轻量级迁移的最后一步是告知持久化存储协调器两件事：\n\n- 它应自动迁移模型。\n\
  - 它应推断映射模型。\n\n您可以通过在持久化存储协调器的`addPersistentStoreWithType:`方法的`options`参数中传递这些指令来实现。首先按如下方式设置`options`（一个`字典`）：\n\
  \n```\nNSDictionary *options = @{\n  NSMigratePersistentStoresAutomaticallyOption:\
  \ @YES,\n  NSInferMappingModelAutomaticallyOption: @YES\n}; // Objective-C 版本\n\n\
  let options = [NSMigratePersistentStoresAutomaticallyOption: true, NSInferMappingModelAutomaticallyOption:\
  \ true] // Swift 版本\n```\n\n这段代码创建了一个包含两个条目的字典。\n\n\n\n-   键为`NSMigratePersistentStoresAutomaticallyOption`、值为`YES`或`true`的选项，它告诉持久化存储协调器自动迁移数据。\n\
  -   键为`NSInferMappingModelAutomaticallyOption`、值为`YES`或`true`的选项，它告诉持久化存储协调器推断映射模型。\n\
  \n然后，你将这个`options`对象（而不是`nil`）作为`options`参数传递给`addPersistentStoreWithType:`调用。打开`AppDelegate.m`文件或`AppDelegate.swift`文件，将`persistentStoreCoordinator`方法修改为代码清单\
  \ 6-1（Objective-C）所示的样子，或者将`managedObjectContext`闭包中初始化`persistentStoreCoordinator`的代码修改为代码清单\
  \ 6-2（Swift）所示的样子。\n\n**代码清单 6-1**. 创建带有迁移选项的持久化存储协调器 (Objective-C)\n\n```\n- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator {\n    if (_persistentStoreCoordinator != nil) {\n\
  \        return _persistentStoreCoordinator;\n    }\n\n_persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  BookStoreEnhanced.sqlite\"];\n\nNSDictionary *options = @{\n      NSMigratePersistentStoresAutomaticallyOption:\
  \ @YES,\n      NSInferMappingModelAutomaticallyOption: @YES\n    };\n\nNSError *error\
  \ = nil;\n    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:options error:&error]) {\n      [self showCoreDataError];\n\
  \    }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n**代码清单 6-2**. 创建带有迁移选项的持久化存储协调器\
  \ (Swift)\n\n```\n// 初始化持久化存储协调器\nlet storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreEnhancedSwift.sqlite\")\nvar error: NSError? = nil\nlet persistentStoreCoordinator\
  \ = NSPersistentStoreCoordinator(managedObjectModel: managedObjectModel!)\n\nlet\
  \ options = [NSMigratePersistentStoresAutomaticallyOption: true, NSInferMappingModelAutomaticallyOption:\
  \ true]\n\nif(persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: storeURL, options: options, error: &error) == nil) {\n\
  \    self.showCoreDataError()\n    return nil\n}\n```\n\n迁移数据只需这些操作。构建并运行应用程序，它不再崩溃，而是显示你创建的所有书籍。打开终端，导航到包含\
  \ BookStore 应用程序 SQLite 文件的目录。与 iOS 5 之前仅保留数据库文件迁移前和迁移后两个版本的早期 iOS 版本不同，较新的 iOS\
  \ 版本只保留迁移后的版本。你会找到迁移后的文件`BookStoreEnhanced.sqlite`。使用`sqlite3`应用程序打开它，并运行`.schema`命令来查看`ZBOOK`表的定义。你可以看到`BookStoreEnhanced.sqlite`文件为`name`属性添加了一列：`ZAUTHOR\
  \ VARCHAR`，如下所示。\n\n```\nsqlite> .schema ZBOOKCREATE TABLE ZBOOK ( Z_PK INTEGER\
  \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT, ZAUTHOR\
  \ VARCHAR, ZTITLE VARCHAR);CREATE INDEX ZBOOK_ZCATEGORY_INDEX ON ZBOOK (ZCATEGORY);\n\
  ```\n\n## 重命名实体和属性\n\n轻量级迁移也支持重命名实体和属性，但这需要你付出更多一点的努力。除了修改你的模型之外，你还必须指定已重命名项目的旧名称。你可以通过以下两种方式之一来完成此操作。\n\
  \n- 在 Xcode 数据建模器中\n- 在代码中\n\nXcode 数据建模器是更简单的选择。当你在 Xcode 数据建模器中选择一个实体或属性时，该实体或属性的常规信息会显示在右侧的实用工具面板中。显示实用工具面板后，打开数据模型检查器，然后打开版本控制部分。在重命名\
  \ ID 字段中，输入你更改的任何内容的旧名称（请参见图 6-6）。\n\n![9781430260288_Fig06-06.jpg](img/9781430260288_Fig06-06.jpg)\n\
  \n图 6-6. 带有重命名标识符字段的版本控制部分\n\n如果你坚持要在代码中指定旧名称，则需要根据已重命名的内容，调用`NSEntityDescription`或`NSPropertyDescription`的`setRenamingIdentifier:`方法，并传入实体或属性的旧名称。你需要在模型加载之后、但在调用打开持久化存储（`addPersistentStoreWithType:`）之前执行此操作。例如，如果你想将`Book`实体的名称更改为`Publication`，你需要在调用`addPersistentStoreWithType:`之前添加以下代码：\n\
  \n```\n// Objective-C\nNSEntityDescription *publication = [[managedObjectModel entitiesByName]\
  \ objectForKey:@\"Publication\"];\n[publication setRenamingIdentifier:@\"Book\"\
  ];\n\n// Swift\nif let publication: NSEntityDescription? = managedObjectModel.entitiesByName[\"\
  Publication\"] as? NSEntityDescription {\n  publication?.renamingIdentifier = \"\
  Book\"\n}\n```\n\nCore Data 负责迁移数据，但你仍有责任更新应用程序中任何依赖旧名称的代码。为了在实践中看到这一点，请基于 Bookstore\
  \ 2 模型创建一个名为 Bookstore 3 的数据模型新版本，并将其设置为当前版本。你现在应该处于版本 3（BookStore 3）。在此版本的模型中，你将把`Book`实体重命名为`Publication`。进入你的新模型文件`BookStore\
  \ 3.xcdatamodel`，将`Book`实体重命名为`Publication`。然后，转到数据模型检查器选项卡中的版本控制部分，在重命名 ID 字段中输入旧名称`Book`，以便\
  \ Core Data 知道如何迁移现有数据（如图 6-7 所示），并保存此模型。\n\n![9781430260288_Fig06-07.jpg](img/9781430260288_Fig06-07.jpg)\n\
  \n图 6-7. 将 Book 重命名为 Publication 并指定重命名 ID\n\n等等！在运行应用程序之前，请记住，你有责任更改任何依赖旧名称`Book`的代码。你可以将自定义托管对象类名从`Book`更改为`Publication`，将`Page`实体中的关系名称从`book`更改为`publication`，并相应地更改任何变量名。为了简单起见，我们在这里只更改\
  \ BookStore 应用程序中引用`Book`实体名称的地方。你可以在`ViewController.m`或`ViewController.swift`中的`fetchRequestWithEntityName:`和`insertNewObjectForEntityForName:`调用中找到它们。在这些调用中，将实体名字符串从`Book`更改为`Publication`。\n\
  \n现在你可以构建并运行 BookStore 应用程序；所有现有的书籍应该仍然存在。你可以打开 SQLite 数据库，确认模式现在有一个`ZPUBLICATION`表。\n\
  \n```\nCREATE TABLE ZPUBLICATION ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT\
  \ INTEGER, ZCATEGORY INTEGER, ZPRICE FLOAT, ZAUTHOR VARCHAR, ZTITLE VARCHAR);\n\
  ```\n\n并且没有`ZBOOK`表。\n\n如你所见，轻量级迁移几乎不费力，至少对你来说是这样。Core Data 处理了弄清楚如何将数据从旧模型映射和迁移到新模型的艰巨工作。但是，如果你的模型更改超出了轻量级迁移所能处理的范围，则必须指定你自己的映射模型。\n\
  \n## 使用映射模型\n\n\n\n当您的数据模型变更超出了 Core Data 推断如何将数据从旧模型映射到新模型的能力时，您无法使用轻量级迁移来自动迁移数据。相反，您必须创建一个“映射模型”来告诉\
  \ Core Data 如何执行迁移。本节将引导您完成为迁移创建映射模型所涉及的步骤。映射模型大致类似于数据模型——数据模型包含实体和属性，而映射模型（类型为`NSMappingModel`）包含实体映射（类型为`NSEntityMapping`）和属性映射（类型为`NSPropertyMapping`）。实体映射正如您所期望的那样：它们将源实体映射到目标实体。属性映射也同样如此：将源属性映射到目标属性。映射模型使用这些映射及其关联的类型和策略来执行迁移。\n\
  \n**注意**  Apple 的文档和代码中互换使用术语“destination”和“target”来指代新数据模型。在本章中，我们也遵循这一惯例，交替使用“destination”和“target”。\n\
  \n在典型的数据迁移中，大多数实体和属性从旧版本到新版本都没有改变。对于这些情况，实体映射只是将每个实体从源模型复制到目标模型。当您创建一个映射模型时，您会注意到\
  \ Xcode 会生成这些实体映射，以及它能够从您的模型变更中推断出的任何其他内容，并将这些映射存储在映射模型中。这些映射代表了 Core Data 在轻量级迁移中迁移数据的方式。您必须创建新的映射，或调整\
  \ Xcode 生成的映射，以更改数据的迁移方式。\n\n## 理解实体映射\n\n每个实体映射由`NSEntityMapping`实例表示，包含三部分内容：\n\
  \n*   一个源实体\n*   一个目标实体\n*   一个映射类型\n\n当 Core Data 执行迁移时，它使用实体映射将源实体移动到目标实体，并使用映射类型来决定如何执行此操作。表\
  \ 6-1 列出了映射类型、对应的 Core Data 常量及其含义。\n\n| 类型 | Core Data 常量 | 含义 |\n| :--- | :---\
  \ | :--- |\n| Add | `NSAddEntityMappingType` | 该实体是目标模型中的新实体——它在源模型中不存在——并且应该被添加。\
  \ |\n| Remove | `NSRemoveEntityMappingType` | 该实体在目标模型中不存在，应该被移除。 |\n| Copy | `NSCopyEntityMappingType`\
  \ | 该实体在源模型和目标模型中均存在且未改变，应原样复制。 |\n| Transform | `NSTransformEntityMappingType`\
  \ | 该实体在源模型和目标模型中都存在，但有所变更。该映射告诉 Core Data 如何将每个源实例迁移到目标实例。 |\n| Custom | `NSCustomEntityMappingType`\
  \ | 该实体在源模型和目标模型中都存在，但有所变更。 |\n\n该映射告诉 Core Data 如何将每个源实例迁移到目标实例。`Add`、`Remove`\
  \ 和 `Copy` 类型不太引人关注，因为轻量级迁移能处理这些实体映射类型。然而，`Transform` 和 `Custom` 类型正是本书本节存在的必要原因。它们告诉\
  \ Core Data，每个源实体实例必须根据任何指定的规则，转换为目标实体的实例。在本章中，您将看到 `Transform` 和 `Custom` 实体映射类型的示例。如果您为实体的某个属性指定了值表达式，则该实体映射属于\
  \ `Transform` 类型。如果您为实体映射指定了自定义迁移策略，则该实体映射变为 `Custom` 类型。在本章的学习过程中，请注意 Core Data\
  \ 映射建模器根据您所做的更改对映射模型进行的类型更改。要为 `Custom` 实体映射类型指定规则，您需要创建一个迁移策略，即您编写的继承自`NSEntityMigrationPolicy`的类。然后，您在\
  \ Xcode 映射建模器中将您创建的类设置为该实体映射的自定义策略。\n\nCore Data 分三个阶段运行您的迁移：\n\n1.  它根据源模型中的对象，在目标模型中创建对象，包括它们的属性。\n\
  2.  它在目标模型中的对象之间创建关系。\n3.  它验证目标模型中的数据并保存它们。\n\n您可以通过自定义策略来定制 Core Data 如何执行这三个步骤。`NSEntityMigrationPolicy`类有七个方法，您可以重写它们来定制\
  \ Core Data 如何将数据从源实体迁移到目标实体，尽管您很少会重写所有方法。这些方法列在`NSEntityMigrationPolicy`类的 Apple\
  \ 文档中，它们在迁移过程中的各个阶段提供了您可以重写和更改 Core Data 迁移行为的地方。您可以根据需要重写其中任意数量（或少或多）的方法，尽管一个不重写任何方法的自定义迁移策略是没有意义的。通常，如果您想更改目标实例的创建方式或属性填充数据的方式，您会重写`createDestinationInstancesForSourceInstance:`。如果您想自定义目标实体与其他实体之间的关系如何创建，您会重写`createRelationshipsForDestinationInstance:`。最后，如果您想在迁移过程中执行任何自定义验证，您会重写`performCustomValidationForEntityMapping:`。\n\
  \n`createDestinationInstancesForSourceInstance:`方法带有一个注意事项：如果您没有调用超类的实现（您很可能不会调用，因为您重写此方法是为了更改默认行为），则必须调用迁移管理器的`associateSourceInstance:withDestinationInstance:forEntityMapping:`方法来将源实例与目标实例关联起来。忘记执行此操作将导致迁移出现问题。您将在本章后面部分，通过\
  \ BookStore 应用程序，学习调用此方法的正确方式。\n\n## 理解属性映射\n\n属性映射与实体映射类似，它告诉 Core Data 如何将源数据迁移到目标数据。属性映射是`NSPropertyMapping`的一个实例，包含以下三部分内容：\n\
  \n*   源实体中属性的名称\n*   目标实体中属性的名称\n*   一个值表达式，告诉 Core Data 如何从源数据得到目标数据\n\n要更改属性映射迁移数据的方式，您需要为属性映射提供值表达式。值表达式遵循与谓词相同的语法，并使用以下六个预定义的键来帮助检索值：\n\
  \n\n\n*   `$manager`，代表迁移管理器\n*   `$source`，代表源实体\n*   `$destination`，代表目标实体\n*\
  \   `$entityMapping`，代表实体映射\n*   `$propertyMapping`，代表属性映射\n*   `$entityPolicy`，代表实体迁移策略\n\
  \n如你所见，这些键的名称使其用途易于推断。在创建映射模型时，你可以探索 Xcode 从源数据模型和目标数据模型中推断出的属性映射，从而更好地理解这些键的含义及其使用方式。\n\
  \n最简单的值表达式是将一个属性从源实体复制到目标实体。例如，如果你有一个 `Person` 实体，它有一个 `name` 属性，并且该 `Person` 实体在你的新旧模型版本之间没有变化，那么\
  \ `PersonToPerson` 实体映射中 `name` 属性的值表达式将如下所示：\n\n```\n$source.name\n```\n\n你也可以使用值表达式对源数据进行操作。例如，假设同一个\
  \ `Person` 实体有一个名为 `salary` 的属性，用于存储每个人的薪水。在新模型中，你想给每个人加薪 4%。你的值表达式将如下所示：\n\n```\n\
  $source.salary*1.04\n```\n\n由于属性既代表属性也代表关系，因此属性映射同时代表属性和关系的映射。关系的一个典型值表达式是调用一个函数，传递迁移管理器、目标实例、实体映射以及源关系的名称。例如，如果你的旧数据模型在\
  \ `Person` 实体中有一个名为 `staff` 的关系，表示所有向此人汇报的人，并且你的新模型将此关系重命名为 `reports`，那么 `reports`\
  \ 属性的值表达式将如下所示：\n\n```\nFUNCTION($manager, \"destinationInstancesForEntityMappingNamed:sourceInstances:\"\
  , \"PersonToPerson\", $source.staff)\n```\n\n请注意，你使用 `$manager` 键来传递迁移管理器，从实体映射中获取源实例的目标实例，传递适当的实体映射（`PersonToPerson`），并传递从\
  \ `$source` 键中获取的旧关系。\n\n## 创建需要映射模型的新模型版本\n\n轻量级迁移通常足够，你真的不需要深入了解 Core Data 迁移的机制。然而，有些时候你需要稍微“弄脏手”来帮助框架弄清楚该做什么。例如，当你意识到自己一直很懒，将本应拆分成多个字段的数据合并到了一个字段中时，就是这种情况。以\
  \ `author` 字段为例，它本应包含作者的全名（例如，John Doe）。如果你突然意识到想将其拆分为 `firstName` 和 `lastName`\
  \ 字段，就必须创建一个映射模型。这正是我们将在本节中要做的事情。\n\n在开始迁移之前，让我们花点时间填充 `Publication` 表中的 `author`\
  \ 字段，以便有一些数据可以迁移。\n\n打开 `ViewController.m` 或 `ViewController.swift`，并添加一个名为 `populateAuthors`\
  \ 的新方法，如代码清单 6-3（Objective-C）和代码清单 6-4（Swift）所示。\n\n***代码清单 6-3***. 填充作者（Objective-C）\n\
  ```\n- (void)populateAuthors {\n  // 1. 创建一个要分配的作者名称列表\n  NSArray *authors = @[@\"\
  John Doe\", @\"Jane Doe\", @\"Bill Smith\", @\"Jack Brown\"];\n\n// 2. 从数据存储中获取所有出版物\n\
    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Publication\"];\n  NSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  for(int i=0; i<books.count; i++) {\n    Book *book = books[i];\n\
      book.price = 20+i;\n\n// 3. 使用我们创建的数组中的名称之一设置作者\n    [book setValue:authors[i\
  \ % authors.count] forKey:@\"author\"];\n  }\n\n// 4. 将所有内容提交到存储\n  [self saveContext];\n\
  }\n```\n\n***代码清单 6-4***. 填充作者（Swift）\n```\nfunc populateAuthors() {\n    // 1.\
  \ 创建一个要分配的作者名称列表\n    let authors = [\"John Doe\", \"Jane Doe\", \"Bill Smith\"\
  , \"Jack Brown\"]\n\n// 2. 从数据存储中获取所有出版物\n    let fetchRequest = NSFetchRequest(entityName:\
  \ \"Publication\")\n    let books = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
  \ error: nil)\n    if let books = books {\n        for var i = 0; i<books.count;\
  \ i++ {\n            var book = books[i] as Book\n            book.price = 20 +\
  \ Float(i)\n            // 3. 使用我们创建的数组中的名称之一设置作者\n            book.setValue(authors[i\
  \ % authors.count], forKeyPath: \"author\")\n        }\n    }\n\n// 4. 将所有内容提交到存储\n\
      saveContext()\n}\n```\n\n请注意，我们还修改了价格，确保它大约为 15 美元，这样就不会触发我们在 BookStore 原始版本中设定的验证规则。\n\
  \n最后，编辑 `viewDidAppear:` 方法，使其看起来像代码清单 6-5（Objective-C）或代码清单 6-6（Swift）。\n\n***代码清单\
  \ 6-5***. 调用填充作者方法（Objective-C）\n```\n- (void)viewDidAppear:(BOOL)animated {\n  [super\
  \ viewDidAppear:animated];\n  [self populateAuthors];\n  [self showExampleData];\n\
  }\n```\n\n***代码清单 6-6***. 调用填充作者方法（Swift）\n```\noverride func viewDidAppear(animated:\
  \ Bool) {\n    super.viewDidAppear(animated)\n    if let managedObjectContext =\
  \ self.managedObjectContext {\n        self.populateAuthors()\n        self.showExampleData()\n\
      }\n}\n```\n\n在运行应用程序之前，你可以在 `.sqlite` 数据库中看到 `author` 字段是空的。\n\n```\nsqlite>\
  \ select ztitle,zauthor,zprice from zpublication;\n\nZTITLE              ZAUTHOR      ZPRICE    \n\
  ---------------     --------     ----------\nThe second book     NULL         20.0\n\
  The third book      NULL         21.0\nThe first book      NULL         22.0\nThe\
  \ fourth book     NULL         23.0\n```\n\n启动应用程序一次，然后再次运行相同的查询。\n\n```\nsqlite>\
  \ select ztitle,zauthor,zprice from zpublication;\n\nZTITLE              ZAUTHOR      ZPRICE    \n\
  ---------------     --------     ----------\nThe second book     John Doe     20.0\n\
  The third book      Jane Doe     21.0\nThe first book      Bill Smith   22.0\nThe\
  \ fourth book     Jack Brown   23.0\n```\n\n现在回到 `viewDidAppear:` 中，移除对 `populateAuthors:`\
  \ 的调用。\n\n我们现在准备创建模型的新版本。继续创建数据模型的新版本；你应该升级到版本 4。在新模型（`BookStore 4.xcdatamodel`）中，在\
  \ `Publication` 实体中，删除 `author` 属性并创建两个新属性：`firstName` 和 `lastName`。两者都应具有 `String`\
  \ 类型。你的模型应类似于图 6-8 所示。\n\n![9781430260288_Fig06-08.jpg](img/9781430260288_Fig06-08.jpg)\n\
  \n图 6-8. 在新模型中拆分两个字段\n\n\n\n让我们花点时间，也确保实体类与新字段保持同步。如果你在 Objective-C 中执行此项目，请打开 `Book.h`，并添加两个新属性\
  \ `firstName` 和 `lastName` 的声明，如代码清单 6-7 所示。然后在 `Book.m` 中为这些属性添加动态访问器，如代码清单 6-8\
  \ 所示。如果你使用的是 Swift，请将 `firstName` 和 `lastName` 的代码添加到 `Book.swift` 中，如代码清单 6-9 所示。\n\
  \n**代码清单 6-7**. 向 `Book.h` 添加 `firstName` 和 `lastName` 属性\n\n```\n@property (nonatomic,\
  \ retain) NSString *firstName;\n@property (nonatomic, retain) NSString *lastName;\n\
  ```\n\n**代码清单 6-8**. 向 `Book.m` 添加动态访问器\n\n```\n@dynamic firstName;\n@dynamic lastName;\n\
  ```\n\n**代码清单 6-9**. 向 `Book.swift` 添加 `firstName` 和 `lastName`\n\n```\n@NSManaged\
  \ var firstName: String\n@NSManaged var lastName: String\n```\n\n模型和实体类都已更新完毕。现在我们继续进入迁移部分。\n\
  \n## 创建映射模型\n\n要创建映射模型，请在 Xcode 中创建一个新文件。在随之弹出的对话框中，在左侧的 iOS 下选择 **Core Data**，在右侧选择\
  \ **Mapping Model**，如图 6-9 所示。点击 **Next**。\n\n![9781430260288_Fig06-09.jpg](img/9781430260288_Fig06-09.jpg)\n\
  \n图 6-9. 创建映射模型文件\n\n下一步是选择源模型。选择 `BookStore 3.xcdatamodel`，如图 6-10 所示，然后点击 **Next**。接着系统会要求你选择目标模型。选择\
  \ `BookStore 4.xcdatamodel` 作为目标模型，如图 6-11 所示，然后点击 **Next**。最后一步是为映射模型命名。将其命名为 `Model3To4.xcmappingmodel`，然后点击\
  \ **Create**。\n\n![9781430260288_Fig06-10.jpg](img/9781430260288_Fig06-10.jpg)\n\
  \n图 6-10. 选择源数据模型\n\n![9781430260288_Fig06-11.jpg](img/9781430260288_Fig06-11.jpg)\n\
  \n图 6-11. 选择目标数据模型\n\n你现在应该能看到 Xcode 已创建好你的映射模型，其中包含了 Core Data 能推断出的所有实体映射和属性映射，如图\
  \ 6-12 所示。\n\n![9781430260288_Fig06-12.jpg](img/9781430260288_Fig06-12.jpg)\n\n\
  图 6-12. 新的映射模型\n\n请注意，Xcode 已经做了一些工作来帮助进行迁移。创建映射模型让你处于与轻量级迁移相同的起点，提供了 Core Data\
  \ 能从源数据模型和目标数据模型中推断出的映射。在找到匹配的实体时，它会自动将新的属性值设置为源属性的副本。由于我们移除了 `author` 属性并添加了两个新属性，它不太清楚该怎么做。这就需要你介入了。\n\
  \n下一步是自定义映射模型以迁移出版物。首先创建你将使用的自定义策略，该策略是 `NSEntityMigrationPolicy` 的子类。创建一个名为 `PublicationToPublicationMigrationPolicy`\
  \ 的新 Cocoa Touch 类，该类继承自 `NSEntityMigrationPolicy`，如图 6-13 所示。\n\n![9781430260288_Fig06-13.jpg](img/9781430260288_Fig06-13.jpg)\n\
  \n图 6-13. 创建新的迁移策略\n\n在实现文件中（`PublicationToPublicationMigrationPolicy.m` 或 `PublicationToPublicationMigrationPolicy.swift`），你需要重写\
  \ `createDestinationInstancesForSourceInstance:` 方法。在执行迁移时，Core Data 每次要从一个源 `Publication`\
  \ 实例创建一个 `Publication` 实例时，都会调用此方法。在你的实现中，你需要创建一个 `Publication` 实例，复制价格和标题，并将名字和姓氏分开。当然，我们的姓名分割方法有点粗糙，但这与主题无关。这个简单的实现将完美地说明我们想要做什么。\n\
  \n最后，你需要告诉迁移管理器源 `Publication` 实例与目标新 `Publication` 实例之间的关系，这是确保迁移正确进行的重要步骤。代码清单\
  \ 6-10 展示了 Objective-C 版本，代码清单 6-11 展示了 Swift 版本。\n\n**代码清单 6-10**. 自定义迁移映射 (Objective-C)\n\
  \n```\n- (BOOL)createDestinationInstancesForSourceInstance:(NSManagedObject *)sourceInstance\
  \ entityMapping:(NSEntityMapping *)mapping manager:(NSMigrationManager *)manager\
  \ error:(NSError **)error {\n  // 创建 book 托管对象\n  NSManagedObject *book =\n  [NSEntityDescription\
  \ insertNewObjectForEntityForName:[mapping destinationEntityName]\n\ninManagedObjectContext:[manager\
  \ destinationContext]];\n  [book setValue:[sourceInstance valueForKey:@\"title\"\
  ] forKey:@\"title\"];\n  [book setValue:[sourceInstance valueForKey:@\"price\"]\
  \ forKey:@\"price\"];\n\n// 从源数据获取作者名字\n  NSString *author = [sourceInstance valueForKey:@\"\
  author\"];\n\n// 将作者名字拆分为名字和姓氏\n  NSRange firstSpace = [author rangeOfString:@\"\
  \ \"];\n  NSString *firstName = [author substringToIndex:firstSpace.location];\n\
    NSString *lastName = [author substringFromIndex:firstSpace.location+1];\n\n//\
  \ 将名字和姓氏设置到 book 中\n  [book setValue:firstName forKey:@\"firstName\"];\n  [book\
  \ setValue:lastName forKey:@\"lastName\"];\n\n// 为迁移管理器建立旧 Publication 与新 Publication\
  \ 之间的关联\n  [manager associateSourceInstance:sourceInstance withDestinationInstance:book    \
  \ forEntityMapping:mapping];\n  return YES;\n}\n```\n\n**代码清单 6-11**. 自定义迁移映射 (Swift)\n\
  \n```\noverride func createDestinationInstancesForSourceInstance(sInstance: NSManagedObject!,\
  \ entityMapping mapping: NSEntityMapping!, manager: NSMigrationManager!, error:\
  \ NSErrorPointer) -> Bool {\n    // 创建 book 托管对象\n\nvar book = NSEntityDescription.insertNewObjectForEntityForName(mapping.destinationEntityName,\
  \ inManagedObjectContext: manager.destinationContext) as NSManagedObject!\n\nbook.setValue(sInstance.valueForKey(\"\
  title\"), forKey: \"title\")\n    book.setValue(sInstance.valueForKey(\"price\"\
  ), forKey: \"price\")\n\n// 从源数据获取作者名字\n    let author = sInstance.valueForKey(\"\
  author\") as String?\n\n// 将作者名字拆分为名字和姓氏\n    let firstSpace = author?.rangeOfString(\"\
  \ \")\n    if let firstSpace = firstSpace {\n        let firstName = author?.substringToIndex(firstSpace.startIndex)\n\
          let lastName = author?.substringFromIndex(firstSpace.endIndex)\n\n// 将名字和姓氏设置到\
  \ book 中\n        book.setValue(firstName, forKeyPath: \"firstName\")\n        book.setValue(lastName,\
  \ forKeyPath: \"lastName\")\n    }\n\n// 为迁移管理器建立旧 Publication 与新 Publication 之间的关联\n\
      manager.associateSourceInstance(sInstance, withDestinationInstance: book, forEntityMapping:\
  \ mapping)\n    return true\n}\n```\n\n\n\n### 排版后的内容\n\n请注意，我们并未复制发布关系。在 `NSEntityMigrationPolicy`\
  \ 的 `createRelationshipsForDestinationInstance:` 方法中，默认情况下关系会被复制。通过不重写该方法，我们让 Core\
  \ Data 自动帮我们复制这些关系。\n\n现在让我们回到映射模型。选择名为 `PublicationToPublication` 的实体映射。在右侧面板中，将自定义策略设置为\
  \ `PublicationToPublicationMigrationPolicy`（即我们刚刚创建的那个），如图 6-14 所示。\n\n![9781430260288_Fig06-14.jpg](img/9781430260288_Fig06-14.jpg)\n\
  \n图 6-14。将新的迁移策略设置为映射模型\n\n您的映射模型已准备好执行迁移。然而，与轻量级迁移一样，您需要在应用委托中添加一些代码，以告诉 Core Data\
  \ 执行迁移。\n\n## 迁移数据\n\n创建映射模型是执行轻量级迁移无法处理的迁移的关键步骤，但您仍然需要执行实际的迁移。本节将解释如何操作，然后更新 BookStore\
  \ 应用的代码以实际运行迁移。到本节结束时，您将得到一个 BookStore 应用，其中包含之前的所有书籍，但此时作者的名字和姓氏已被正确拆分。\n\n告诉 Core\
  \ Data 使用您创建的映射模型从旧模型迁移到新模型，与告诉 Core Data 使用轻量级迁移类似。正如您之前所学，告诉 Core Data 执行轻量级迁移的方式是传递一个选项字典，其中包含两个键，其值为\
  \ `YES` 或 `true`。\n\n- `NSMigratePersistentStoresAutomaticallyOption`\n- `NSInferMappingModelAutomaticallyOption`\n\
  \n第一个键告诉 Core Data 自动迁移数据，第二个键告诉 Core Data 推断映射模型。\n\n对于使用您创建的映射模型进行迁移，您显然希望 Core\
  \ Data 仍然自动执行迁移，因此您仍然将 `NSMigratePersistentStoresAutomaticallyOption` 设置为 `YES 或\
  \ true`。然而，由于您已经创建了映射模型，您不希望 Core Data 推断任何内容；您希望它使用您的映射模型。因此，您将 `NSInferMappingModelAutomaticallyOption`\
  \ 设置为 `NO 或 false`，或者将其完全从选项字典中省略。\n\n那么，如何指定 Core Data 用于执行迁移的映射模型呢？是在选项字典中设置吗？是通过某种方式传递给持久化存储协调器的\
  \ `addPersistentStoreWithType:` 方法吗？是将其设置到持久化存储协调器中？还是设置到托管对象模型或上下文中？\n\n答案（可能有点令人惊讶）是：您什么都不用做。Core\
  \ Data 会自行解决。它会搜索您的映射模型，找到适合从源模型迁移到目标模型的模型，并使用它。这使迁移变得异常简单。\n\n## 运行您的迁移\n\n要运行\
  \ BookStore 数据存储的迁移，请打开 `AppDelegate.m` 文件或 `AppDelegate.swift` 文件，并从选项字典中移除 `NSInferMappingModelAutomaticallyOption`\
  \ 键。这就是让 Core Data 使用您的映射模型 `Model3To4.xcmappingmodel` 迁移数据所需的全部操作。如果尚未设置，请将当前模型版本设置为\
  \ `BookStore 4`，然后构建并运行 BookStore 应用；您应该会看到数据库中之前拥有的所有书籍。只是这一次，如果您查看数据存储，将会看到名称已被正确拆分：\n\
  \n```\nsqlite> select ztitle,zfirstname,zlastname,zprice from zpublication;\n\n\
  ZTITLE           ZFIRSTNAME  ZLASTNAME   ZPRICE    \n---------------  ----------  ----------  ----------\n\
  The second book  John        Doe         20.0      \nThe third book   Jane        Doe        \
  \ 21.0      \nThe fourth book  Jack        Brown       23.0      \nThe first book  \
  \ Bill        Smith       22.0\n```\n\n## 自定义迁移\n\n在大多数数据迁移案例中，使用默认的三步迁移过程（创建目标对象、创建关系、验证并保存）就足够了。数据对象会从前一版本在新数据存储中创建，然后所有关系被创建，最后数据被验证并持久化。然而，在某些情况下，您希望在迁移过程中进行干预。这时就需要自定义迁移。通常，当数据变更超出简单地将数据从旧实体移动到新实体时，您就需要考虑自定义迁移。例如，当迁移的顺序很重要，或者您希望让用户了解迁移进度的状态时，就是这样。\n\
  \n控制迁移过程的初始化意味着您需要执行所有通常由 Core Data 为您完成的工作。这意味着您需要执行以下操作：\n\n- 确保确实需要迁移。\n- 设置迁移管理器。\n\
  - 通过将模型拆分为独立部分来运行迁移。\n\n本节将逐步介绍一个自定义迁移示例，向您展示如何进行非平凡的迁移。在迁移过程中，我们将在控制台日志中显示进度。\n\
  \n为此示例设置场景。首先，创建数据模型的新版本。此时您应该拥有 `BookStore 5.xcdatamodel`。在新模型中，我们做一些更改来触发迁移。打开\
  \ `Publication` 实体，添加一个名为 `synopsis` 的 `String` 类型的新属性。将 `BookStore 5.xcdatamodel`\
  \ 设置为当前模型。\n\n### 确保需要迁移\n\n为了验证模型是否与持久化存储兼容，在将持久化存储添加到协调器之前，您可以使用 `NSManagedObjectModel`\
  \ 类的 `isConfiguration:compatibleWithStoreMetadata:` 方法。可以通过使用协调器的 `metadataForPersistentStoreOfType:URL:error:`\
  \ 方法查询协调器来检索数据存储的元数据。\n\n打开 `AppDelegate.m` 或 `AppDelegate.swift`，编辑 `persistentStoreCoordinator`\
  \ 的 getter 方法，如列表 6-12（Objective-C）或列表 6-13（Swift）所示。\n\n***列表 6-12***。确定是否需要迁移（Objective-C）\n\
  \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n  if (_persistentStoreCoordinator\
  \ != nil) {\n      return _persistentStoreCoordinator;\n  }\n\n_persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  BookStoreEnhanced.sqlite\"];\n\nNSError *error = nil;\n  NSDictionary *sourceMetadata\
  \ = [NSPersistentStoreCoordinator   metadataForPersistentStoreOfType:NSSQLiteStoreType\
  \ URL:storeURL error:&error];\n\nNSManagedObjectModel *destinationModel = [_persistentStoreCoordinator\
  \ managedObjectModel];\n\nBOOL pscCompatible = [destinationModel isConfiguration:nil  \
  \ compatibleWithStoreMetadata:sourceMetadata];\n\nif (!pscCompatible) {\n    //\
  \ 需要迁移\n\n// ... 在此处执行迁移\n  }\n\nif (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType  \
  \ configuration:nil URL:storeURL options:nil error:&error]) {\n    [self showCoreDataError];\n\
    }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n***列表 6-13***。确定是否需要迁移（Swift）\n\
  \n\n\n```swift\nlazy var managedObjectContext: NSManagedObjectContext? = {\n   \
  \ // 初始化托管对象模型\n    let modelURL = NSBundle.mainBundle().URLForResource(\"BookStoreSwift\"\
  , withExtension: \"momd\")\n    let managedObjectModel = NSManagedObjectModel(contentsOfURL:\
  \ modelURL!)\n\n    // 初始化持久化存储协调器\n    let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreEnhancedSwift.sqlite\")\n\n    var error: NSError? = nil\n    let persistentStoreCoordinator\
  \ = NSPersistentStoreCoordinator(managedObjectModel: managedObjectModel)\n\n   \
  \ let sourceMetadata = NSPersistentStoreCoordinator.metadataForPersistentStoreOfType(NSSQLiteStoreType,\
  \ URL: storeURL, error: nil)\n\n    let destinationModel = persistentStoreCoordinator.managedObjectModel\n\
  \    let pscCompatible = destinationModel.isConfiguration(nil, compatibleWithStoreMetadata:\
  \ sourceMetadata)\n\n    if(!pscCompatible) {\n        // 需要自定义迁移\n        // ...\
  \ 在此处执行迁移\n    }\n\n    if(persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: storeURL, options: nil, error: &error) == nil) {\n  \
  \      self.showCoreDataError()\n        return nil\n    }\n\n    var managedObjectContext\
  \ = NSManagedObjectContext()\n    managedObjectContext.persistentStoreCoordinator\
  \ = persistentStoreCoordinator\n\n    // 添加撤销管理器\n    managedObjectContext.undoManager\
  \ = NSUndoManager()\n\n    return managedObjectContext\n}()\n```\n\n如果不需要迁移，则可以直接将持久化存储注册到协调器。\n\
  \n## 设置迁移管理器\n\n一旦确定确实需要迁移，下一步就是设置迁移管理器，它是`NSMigrationManager`的子类。为此，您需要检索与当前持久化存储匹配的模型：即模型的先前版本。此模型将作为迁移过程中的源模型。可以使用`mergedModelFromBundles:forStoreMetadata:`方法获取源模型，该方法会在应用程序主包中查找与给定元数据匹配的模型。\n\
  \n首先，创建一个扩展自`NSMigrationManager`的新类来创建自定义迁移管理器。在示例中，我们将它命名为`MyMigrationManager`。代码清单\
  \ 6-14 显示了此新类的 Objective-C 头文件，代码清单 6-15 显示了 Objective-C 实现文件。代码清单 6-16 显示了 Swift\
  \ 实现。迁移的实现重写了`associateSourceInstance:withDestinationInstance:forEntityMapping:`方法，该方法在迁移策略执行期间被调用，当为目标实例创建源实例时触发。您的实现会创建一个正在迁移的实例，并通过简单地复制`title`属性，在迁移过程中为实例分配`synopsis`属性。\n\
  \n***代码清单 6-14***. `MyMigrationManager.h`\n\n```objc\n#import <CoreData/CoreData.h>\n\
  \n@interface MyMigrationManager : NSMigrationManager\n\n@end\n```\n\n***代码清单 6-15***.\
  \ `MyMigrationManager.m`\n\n```objc\n#import \"MyMigrationManager.h\"\n@implementation\
  \ MyMigrationManager\n- (void)associateSourceInstance:(NSManagedObject*)sourceInstance\
  \ withDestinationInstance:(NSManagedObject *)destinationInstance forEntityMapping:(NSEntityMapping\
  \ *)entityMapping {\n    [super associateSourceInstance:sourceInstance withDestinationInstance:destinationInstance\
  \ forEntityMapping:entityMapping];\n\n    NSString *name = [entityMapping destinationEntityName];\n\
  \    if([name isEqualToString:@\"Publication\"]) {\n        NSString *title = [sourceInstance\
  \ valueForKey:@\"title\"];\n        [destinationInstance setValue:title forKey:@\"\
  synopsis\"];\n    }\n}\n@end\n```\n\n***代码清单 6-16***. `MyMigrationManager.swift`\n\
  \n```swift\nimport Foundation\nimport CoreData\n\nclass MyMigrationManager : NSMigrationManager\
  \ {\n    override func associateSourceInstance(sourceInstance: NSManagedObject,\
  \ withDestinationInstance destinationInstance: NSManagedObject, forEntityMapping\
  \ entityMapping: NSEntityMapping) {\n        super.associateSourceInstance(sourceInstance,\
  \ withDestinationInstance: destinationInstance, forEntityMapping: entityMapping)\n\
  \n        let name = entityMapping.destinationEntityName\n        if name == \"\
  Publication\" {\n            let title = sourceInstance.valueForKey(\"title\") as?\
  \ String\n            destinationInstance.setValue(title, forKeyPath: \"synopsis\"\
  )\n        }\n    }\n}\n```\n\n## 运行迁移\n\n在最后一步中，您需要将自定义类设置为负责执行迁移的管理器。对于 BookStore\
  \ 的 Objective-C 版本，请在`AppDelegate.h`文件顶部添加`MyMigrationManager.h`的导入。对于 Objective-C\
  \ 和 Swift，都需要添加一个新的`migrationManager`属性，如下所示：\n\n```objc\n@property (readonly, strong,\
  \ nonatomic) MyMigrationManager *migrationManager; // Objective-C\n```\n\n```swift\n\
  var migrationManager: MyMigrationManager? // Swift\n```\n\n最后，在之前注明需要迁移并需要“在此处执行迁移”的位置，添加实际执行迁移的代码。代码清单\
  \ 6-17 显示了 Objective-C 代码，代码清单 6-18 显示了 Swift 代码。\n\n***代码清单 6-17***. 执行迁移（Objective-C）\n\
  \n```objc\nif (!pscCompatible) {\n    // 需要迁移\n    NSManagedObjectModel *sourceModel\
  \ = [NSManagedObjectModel mergedModelFromBundles:nil forStoreMetadata:sourceMetadata];\n\
  \    _migrationManager = [[MyMigrationManager alloc] initWithSourceModel:sourceModel\
  \ destinationModel:[self managedObjectModel]];\n    [_migrationManager addObserver:self\
  \ forKeyPath:@\"migrationProgress\" options:NSKeyValueObservingOptionNew context:NULL];\n\
  \    NSMappingModel *mappingModel = [NSMappingModel inferredMappingModelForSourceModel:sourceModel\
  \ destinationModel:[self managedObjectModel] error:nil];\n\n    NSURL *tempURL =\
  \ [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"BookStoreEnhanced-temp.sqlite\"\
  ];\n\n    if(![_migrationManager migrateStoreFromURL:storeURL\n                \
  \                         type:NSSQLiteStoreType\n                             \
  \          options:nil\n                              withMappingModel:mappingModel\n\
  \                              toDestinationURL:tempURL\n                      \
  \         destinationType:NSSQLiteStoreType\n                            destinationOptions:nil\n\
  \                                         error:&error]) {\n        // 处理错误\n  \
  \      NSLog(@\"%@\", error);\n    }\n    else {\n        // 删除旧存储，重命名新存储\n    \
  \    NSFileManager *fm = [NSFileManager defaultManager];\n        [fm removeItemAtPath:[storeURL\
  \ path] error:nil];\n        [fm moveItemAtPath:[tempURL path] toPath:[storeURL\
  \ path] error:nil];\n    }\n}\n```\n\n***代码清单 6-18***. 执行迁移（Swift）\n\n```swift\n\
  if(!pscCompatible) {\n    // 需要自定义迁移\n    let sourceModel = NSManagedObjectModel.mergedModelFromBundles([NSBundle.mainBundle()],\
  \ forStoreMetadata: sourceMetadata!)\n\n    var appDelegate = UIApplication.sharedApplication().delegate\
  \ as? AppDelegate\n\n    let migrationManager = MyMigrationManager(sourceModel:\
  \ sourceModel!, destinationModel: managedObjectModel!)\n\n    migrationManager.addObserver(self,\
  \ forKeyPath: \"migrationProgress\", options: .New, context: nil)\n\n    appDelegate?.migrationManager\
  \ = migrationManager\n\n    let mappingModel = NSMappingModel.inferredMappingModelForSourceModel(sourceModel!,\
  \ destinationModel: managedObjectModel!, error: nil)\n\n    let tempURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreEnhancedSwift-temp.sqlite\")\n```\n\n\n\n```swift\nif !migrationManager.migrateStoreFromURL(storeURL,\
  \ type: NSSQLiteStoreType, options:nil,     withMappingModel:mappingModel, toDestinationURL:tempURL,\
  \ destinationType:NSSQLiteStoreType,     destinationOptions:nil, error:&error) {\n\
  \        self.showCoreDataError()\n        abort()\n        //return nil\n    }\n\
  \    else {\n        let fm = NSFileManager()\n        fm.removeItemAtPath(storeURL.path!,\
  \ error: nil)\n        fm.moveItemAtPath(tempURL.path!, toPath: storeURL.path!,\
  \ error: nil)\n    }\n}\n```\n\n注意，源和目标存储的 URL（统一资源定位符）是相同的，因为我们在为同一个持久化存储进行数据迁移。\n\
  \n我们还向`NSMigrationManager`添加了一个键值观察者来监控迁移进度。更新现有方法以观察该值并记录日志。Listing 6-19 展示了 Objective-C\
  \ 方法，Listing 6-20 展示了 Swift 函数。\n\n***Listing 6-19***. 监控迁移进度（Objective-C）\n\n```objective-c\n\
  - (void)observeValueForKeyPath:(NSString *)keyPath\n                      ofObject:(id)object\n\
  \                        change:(NSDictionary *)change\n                       context:(void\
  \ *)context {\n  if ([keyPath isEqualToString:@\"migrationProgress\"]) {\n    NSMigrationManager\
  \ *manager = (NSMigrationManager*)object;\n    NSLog(@\"Migration progress: %d%%\"\
  , (int)(manager.migrationProgress * 100.0));\n  }\n}\n```\n\n***Listing 6-20***.\
  \ 监控迁移进度（Swift）\n\n```swift\noverride func observeValueForKeyPath(keyPath: String!,\n\
  \  ofObject object: AnyObject,\n  change: [NSObject : AnyObject],\n  context: UnsafeMutablePointer<()>)\
  \ {\n  if keyPath == \"migrationProgress\" {\n    let manager = object as NSMigrationManager\n\
  \    println(String(format: \"Migration progress: %d%%\",manager.migrationProgress\
  \ * 100.0))\n  }\n}\n```\n\n运行应用程序执行自定义迁移，你将在控制台看到迁移进度：`BookStore[21313:70b] Migration\
  \ progress: 11%BookStore[21313:70b] Migration progress: 22%BookStore[21313:70b]\
  \ Migration progress: 33%BookStore[21313:70b] Migration progress: 44%BookStore[21313:70b]\
  \ Migration progress: 55%BookStore[21313:70b] Migration progress: 66%BookStore[21313:70b]\
  \ Migration progress: 77%BookStore[21313:70b] Migration progress: 88%BookStore[21313:70b]\
  \ Migration progress: 100%`\n\n## 总结\n\n虽然在其它编程环境中修改数据模型可能很痛苦，但 Core Data 让修改数据模型几乎无痛。通过支持模型版本、轻量级迁移以及用于非轻量级迁移的映射模型，你可以放心地更改数据模型，并让\
  \ Core Data 确保用户数据的完整性。然而，与应用程序的任何部分一样，请务必测试你的迁移。进行广泛测试。测试力度甚至要超过对应用程序代码的测试。用户可以容忍偶尔的应用崩溃，但如果他们升级到最新版本的应用后丢失了数据，你的应用和声誉可能永远无法恢复。\n\
  \n# 第 7 章：数据转换与加密\n\n尽管 Core Data 提供了相当多的受支持数据类型，但并非所有数据都能完美地适配为字符串、布尔值、数字等。Core\
  \ Data 提供了一种通用的数据类型——二进制数据（Binary Data），它可以存储任何类型的二进制数据。例如，我们在第 5 章中使用二进制数据类型来存储图像。Core\
  \ Data 会将存储在二进制数据列中的所有数据编组到`NSData`实例中，反之亦然。这意味着 Core Data 可以在二进制数据列中存储任何形式的任意数据，但也意味着你的应用程序必须将`NSData`实例转换（或逆向转换）为对应用有用的表示形式。虽然有时这很简单——例如，对于图像，从`NSData`实例创建图像只需调用`UIImage\
  \ imageWithData:`和`UIImagePNGRepresentation`——但在其它情况下，你可能会发现代码中充斥着在多个位置将原始数据转换为可用数据的逻辑。如果能让\
  \ Core Data 帮你完成这个转换工作，那岂不是很好？\n\n在本章中，我们将探讨 Core Data 的 Transformable（可转换）类型，它允许你将转换的主动权交给\
  \ Core Data。我们还探讨了如何在特定的、专题性的用例中使用 Transformable：加密。通过本章的技术，你可以在这个社交媒体时代保护用户数据的安全。\n\
  \n### 使用可转换类型\n\n在本节中，我们构建一个应用程序，每当用户点击屏幕时，它就会在屏幕上显示一个随机颜色的点。图 7-1 显示了包含许多点的最终应用程序。\n\
  \n![9781430260288_Fig07-01.jpg](img/9781430260288_Fig07-01.jpg)\n\nFigure 7-1. TapOut\
  \ 应用\n\n对于每次点击，Core Data 会存储三部分数据：\n\n*   点击的 x 值，使用`Float`\n*   点击的 y 值，使用`Float`\n\
  *   一个随机颜色，使用`Transformable`\n\n#### 创建项目并添加 Core Data\n\n使用 Single View Application\
  \ 模板创建一个 Xcode 项目。将产品名称设置为`TapOut`，并取消勾选“Use Core Data”复选框。创建项目后，按照我们之前的步骤添加 Core\
  \ Data 支持：\n\n1.  添加 TapOut 数据模型`TapOut.xcdatamodeld`。\n2.  添加`Persistence`类，该类封装了\
  \ TapOut 的 Core Data 交互。\n\nListing 7-1 展示了`Persistence`类的 Objective-C 头文件，Listing\
  \ 7-2 展示了 Objective-C 实现文件。Listing 7-3 展示了 Swift 版本的`Persistence`。\n\n***Listing\
  \ 7-1***. `Persistence.h`\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  @import CoreData;\n\n@interface Persistence : NSObject\n\n@property (readonly, strong,\
  \ nonatomic) NSManagedObjectContext *managedObjectContext;\n@property (readonly,\
  \ strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property (readonly,\
  \ strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
  \n***Listing 7-2***. `Persistence.m`\n\n```objective-c\n#import \"Persistence.h\"\
  \n\n@implementation Persistence\n\n- (id)init {\n  self = [super init];\n  if (self\
  \ != nil) {\n    // Initialize the managed object model\n    NSURL *modelURL = [[NSBundle\
  \ mainBundle] URLForResource:@\"TapOut\" withExtension:@\"momd\"];\n    _managedObjectModel\
  \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n\n    // Initialize\
  \ the persistent store coordinator\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\
  \ URLByAppendingPathComponent:@\"TapOut.sqlite\"];\n```\n\n\n\n```objc\nNSError\
  \ *error = nil;\n_persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\
  \ initWithManagedObjectModel:self.managedObjectModel];\nif (![_persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType\n                               \
  \                configuration:nil\n                                           \
  \              URL:storeURL\n                                                  \
  \   options:nil\n                                                       error:&error])\
  \ {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n\
  }\n\n// 初始化托管对象上下文\n_managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
  [_managedObjectContext setPersistentStoreCoordinator:self.persistentStoreCoordinator];\n\
  }\nreturn self;\n}\n\n#pragma mark - 辅助方法\n\n- (void)saveContext {\nNSError *error\
  \ = nil;\nif ([self.managedObjectContext hasChanges] && ![self.managedObjectContext\
  \ save:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \    abort();\n}\n}\n\n- (NSURL *)applicationDocumentsDirectory {\nreturn [[[NSFileManager\
  \ defaultManager] URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask]\
  \ lastObject];\n}\n\n@end\n```\n\n***清单 7-3***. `Persistence.swift`\n\n```swift\n\
  import Foundation\nimport CoreData\n\nclass Persistence {\n    // MARK: - Core Data\
  \ 栈\n\nlazy var applicationDocumentsDirectory: NSURL = {\n        // 应用程序用于存储 Core\
  \ Data 存储文件的目录。此代码在应用程序的文档 Application Support 目录中使用名为 \"book.persistence.TapOutSwift\"\
  \ 的目录。\n        let urls = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory,\
  \ inDomains: .UserDomainMask)\n        return urls[urls.count-1] as NSURL\n    \
  \    }()\n\nlazy var managedObjectModel: NSManagedObjectModel = {\n        // 应用程序的托管对象模型。此属性不是可选的。如果应用程序无法找到并加载其模型，将导致致命错误。\n\
  \        let modelURL = NSBundle.mainBundle().URLForResource(\"TapOutSwift\", withExtension:\
  \ \"momd\")!\n        return NSManagedObjectModel(contentsOfURL: modelURL)!\n  \
  \      }()\n\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\
  \ = {\n        // 应用程序的持久化存储协调器。此实现会创建并返回一个协调器，并将应用程序的存储添加到其中。此属性是可选的，因为可能存在导致存储创建失败的合理错误情况。\n\
  \        // 创建协调器和存储\n        var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:\
  \ self.managedObjectModel)\n        let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  TapOutSwift.sqlite\")\n        var error: NSError? = nil\n        var failureReason\
  \ = \"创建或加载应用程序的已保存数据时出错。\"\n        if coordinator!.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: url, options: nil, error: &error) == nil {\n        \
  \    coordinator = nil\n            // 报告我们遇到的任何错误。\n            let dict = NSMutableDictionary()\n\
  \            dict[NSLocalizedDescriptionKey] = \"无法初始化应用程序的已保存数据\"\n           \
  \ dict[NSLocalizedFailureReasonErrorKey] = failureReason\n            dict[NSUnderlyingErrorKey]\
  \ = error\n            error = NSError(domain: \"YOUR_ERROR_DOMAIN\", code: 9999,\
  \ userInfo: dict)\n            // 将此替换为适当处理错误的代码。\n            // abort() 会导致应用程序生成崩溃日志并终止。在生产应用中不应使用此函数，但在开发过程中可能有用。\n\
  \            NSLog(\"Unresolved error \\(error), \\(error!.userInfo)\")\n      \
