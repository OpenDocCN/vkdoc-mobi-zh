  ```\n\n你还应该会在日志中看到 `willTurnIntoFault` 和 `didTurnIntoFault` 被调用时的输出，如下所示：\n\n```\n\
  2014-11-04 07:25:57.149 PerformanceTuning[38171:2069648] SocialNetwork named SocialNetwork\
  \ 387 will turn into fault\n2014-11-04 07:25:57.151 PerformanceTuning[38171:2069648]\
  \ SocialNetwork did turn into fault\n```\n\n## 掌握控制权：主动触发故障\n\n\n\n本文关于故障的讨论一开始就指出，当你自己运行\
  \ SQL 查询时，对内存使用有更多的控制权，而不是让 Core Data 来管理数据获取。尽管确实如此，但你也可以通过自己触发故障来对 Core Data 的故障管理施加一定程度的控制。通过自己触发故障，你可以避免低效的情况，比如\
  \ Core Data 必须触发多个小故障来获取你的数据，从而导致多次访问持久化存储。\n\nCore Data 提供了两种优化触发故障的方法：\n\n-  \
  \ 批量故障处理\n-   预取\n\n我们将测试批量故障处理和预取。不过在此之前，我们先创建一个测试来触发单个故障，这样我们就能了解批量故障处理和预取带来的性能提升。添加一个名为`SingleFault`的类，使其遵循`PerfTest`协议。这个测试应该获取所有\
  \ selfie，并逐个循环遍历它们，同时执行以下操作：\n\n-   访问`name`属性，以便仅为这个 selfie 触发一个故障。\n-   遍历所有相关的社交网络并逐一访问它们的`name`属性，这样每次访问都会触发一个故障。\n\
  -   重置每个社交网络，以便下一个 selfie 必须为每个社交网络触发故障。\n-   对所有相关人物执行相同操作。\n\n列表 9-28 展示了头文件`SingleFault.h`，列表\
  \ 9-29 展示了`SingleFault.m`。列表 9-30 展示了 Swift 实现`SingleFault.swift`。\n\n**列表 9-28**.\
  \ `SingleFault.h`\n\n```\n#import \"PerfTest.h\"\n\n@interface SingleFault : NSObject\
  \ <PerfTest>\n\n@end\n```\n\n**列表 9-29**. `SingleFault.m`\n\n```\n#import \"SingleFault.h\"\
  \n#import \"Selfie.h\"\n#import \"SocialNetwork.h\"\n#import \"Person.h\"\n\n@implementation\
  \ SingleFault\n\n- (NSString *)runTestWithContext:(NSManagedObjectContext *)context\
  \ {\n  // Fetch all the selfies\n  NSFetchRequest *fetchRequest = [NSFetchRequest\
  \ fetchRequestWithEntityName:@\"Selfie\"];\n  NSArray *selfies = [context executeFetchRequest:fetchRequest\
  \ error:nil];\n\n// Loop through all the selfies\n  for (Selfie *selfie in selfies)\
  \ {\n    // Fire a fault just for this selfie\n    [selfie valueForKey:@\"name\"\
  ];\n\n// Loop through the social networks for this selfie\n    for (SocialNetwork\
  \ *socialNetwork in selfie.socialNetworks) {\n      // Fire a fault just for this\
  \ social network\n      [socialNetwork valueForKey:@\"name\"];\n\n// Put this social\
  \ network back in a fault\n      [context refreshObject:socialNetwork mergeChanges:NO];\n\
      }\n\n// Loop through the people for this selfie\n    for (Person *person in\
  \ selfie.people) {\n      // Fire a fault for this person\n      [person valueForKey:@\"\
  name\"];\n\n// Put this person back in a fault\n      [context refreshObject:person\
  \ mergeChanges:NO];\n    }\n  }\n  return @\"Test complete\";\n}\n\n@end\n```\n\n\
  **列表 9-30**. `SingleFault.swift`\n\n```\nimport Foundation\nimport CoreData\n\n\
