  \ 秒的时间。我们来看看能否改进这些结果！\n\n## 批量错误处理\n\n当执行取请求时，你可以通过在执行取请求之前调用 `NSFetchRequest` 的\
  \ `setReturnsObjectsAsFaults:` 方法，告诉 Core Data 将对象作为错误状态或非错误状态返回。该方法接受一个布尔参数：向该方法传递\
  \ `YES` 或 `true` 可将获取的对象作为错误状态返回，或者传递 `NO` 或 `false` 将对象作为非错误状态返回。通过传递 `NO` 或 `false`，你将获取到所有关联属性都已加载的对象（但当然不包括其关系的所有属性）。\n\
  \n在本节中，我们将创建一个与 `SingleFault` 测试相似的测试，但不再逐个触发错误，而是批量触发。创建一个名为 `BatchFault` 的类，使其遵循\
  \ `PerfTest` 协议。到目前为止，你应该能够确定头文件的样子（它遵循与 `DidFault.h` 和 `SingleFault.h` 相同的模式），因此我们在此不再列出它或本章中编写的任何其他测试头文件。实现文件类似于\
  \ `SingleFault.m` 或 `SingleFault.swift`——它遍历自拍照，并为每张自拍照遍历社交网络和人员。然而不同的是，`BatchFault`\
  \ 使用批量错误处理来一次性触发所有对象的错误状态。也就是说，它一次性触发所有自拍照的错误状态，然后对于每张自拍照，一次性触发其所有社交网络和人员的错误状态。它通过创建取请求并对其调用\
  \ `setReturnsObjectsAsFaults:` 方法（每次都传递 `NO` 或 `false`）来实现这一点。列表 9-33 展示了 `BatchFault.m`\
  \ 的代码，列表 9-34 展示了 `BatchFault.swift` 的代码。\n\n***列表 9-33***. `BatchFault.m`\n\n```\n\
