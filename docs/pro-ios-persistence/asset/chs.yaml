  `// 获取解密后的数据`  \n`            let decrypted = self.transform(text, password: self.password()!,\
  \ salt: salt, iv: iv, operation: UInt32(kCCDecrypt))`  \n\n`// 仅返回解密后的数据`  \n` \
  \           return NSString(data: decrypted!, encoding: NSUTF8StringEncoding)` \
  \ \n`        }`  \n`        else {`  \n`            return nil`  \n`        }` \
  \ \n`    }`  \n\n`func transform(value: NSData, password: String, salt: NSData,\
  \ iv: NSData, operation: CCOperation) -> NSData? {`  \n`        // 通过加盐密码生成密钥` \
  \ \n`        let key = self.keyForPassword(password, salt: salt)`  \n\n`var outputSize\
