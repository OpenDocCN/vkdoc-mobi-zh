  \ 2 章更详细地解释了如何使用`NSFetchRequest`，然后第 3 章更深入地探讨了获取数据的能力。不过，在这一点上，我们保持对`NSFetchRequest`的简单使用，仅从`Gadget`实体中获取所有对象。\n\
  \n在 iOS 5.0 之前，你通常通过分配和初始化一个`NSFetchRequest`实例、创建一个`NSEntityDescription`实例，并将`NSFetchRequest`实例的实体设置为该`NSEntityDescription`实例来创建和使用它，如代码清单\
  \ 1-22 所示。\n\n**代码清单 1-22.**  iOS 5.0 之前的`NSFetchRequest`创建\n\n```objc\nNSFetchRequest\
