  \n## 缓存\n\n无论目标语言或平台是什么，大多数数据持久化框架和库都有内部缓存机制。合理实现的缓存可以显著提升性能，特别是对于需要重复检索相同数据的应用程序。Core\
  \ Data 也不例外。`NSManagedObjectContext` 类是 Core Data 框架的内置缓存。当你从持久化存储中检索对象时，上下文会保留对该对象的引用以跟踪其变化。如果你再次检索该对象，上下文可以返回与首次调用相同的对象引用。\n\
  \n使用缓存带来的明显权衡是，在提升性能的同时，缓存会占用更多内存。如果没有缓存管理方案来限制其内存使用量，缓存可能会被对象填满，直至整个系统因内存不足而崩溃。为了管理内存，Core\
  \ Data 上下文对其从持久化存储中提取的管理对象持有弱引用。这意味着，如果管理对象的引用计数因没有其他对象引用而降为零，则该管理对象将被丢弃。此规则的例外情况是对象已被修改过。在这种情况下，上下文会持有强引用（即向管理对象发送\
  \ retain 信号），并持续持有直到上下文提交或回滚，届时它又会恢复为弱引用。\n\n**注** 默认的保留行为可以通过将 `NSManagedObjectContext`\
  \ 的 `returnsObjectsAsFaults` 属性设置为 `YES` 或 `true` 来更改。将其设置为 `YES` 或 `true` 会导致上下文保留所有注册对象。默认行为仅在对象被插入、更新、删除或锁定后才保留注册对象。\n\
  \n在本节中，你将研究从持久化存储获取对象与从缓存获取对象之间的差异。你将构建一个执行以下操作的测试：\n\n1. 检索所有自拍照。\n2. 检索每张自拍照的所有社交网络。\n\
  3. 显示两次检索所花费的时间。\n4. 再次检索所有自拍照（此时对象将被缓存）。\n5. 再次检索每张自拍照的所有社交网络。\n6. 显示两次检索所花费的时间。\n\
  \n创建一个名为 `Cache` 的测试类，并使其遵循 `PerfTest` 协议。代码清单 9-37 展示了 `Cache.m` 的代码，代码清单 9-38\
  \ 展示了 `Cache.swift` 的代码。\n\n***代码清单 9-37***. `Cache.m`\n\n```\n#import \"Cache.h\"\
  \n#import \"Selfie.h\"\n#import \"SocialNetwork.h\"\n#import \"Person.h\"\n\n@implementation\
  \ Cache\n\n- (NSString *)runTestWithContext:(NSManagedObjectContext *)context {\n\
  \    NSMutableString *result = [NSMutableString string];\n\n// 在未缓存时加载数据\n    NSDate\
  \ *start1 = [NSDate date];\n    [self loadDataWithContext:context];\n    NSDate\
  \ *end1 = [NSDate date];\n\n// 记录结果\n    [result appendFormat:@\"无缓存: %.3f s\\n\"\
  , [end1 timeIntervalSinceDate:start1]];\n\n// 在已缓存时加载数据\n    NSDate *start2 = [NSDate\
  \ date];\n    [self loadDataWithContext:context];\n    NSDate *end2 = [NSDate date];\n\
  \n// 记录结果\n    [result appendFormat:@\"有缓存: %.3f s\\n\", [end2 timeIntervalSinceDate:start2]];\n\
  \nreturn result;\n}\n\n- (void)loadDataWithContext:(NSManagedObjectContext *)context\
  \ {\n    // 加载自拍照\n    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Selfie\"];\n    NSArray *selfies = [context executeFetchRequest:fetchRequest error:nil];\n\
  \n// 遍历自拍照\n    for (Selfie *selfie in selfies) {\n        // 加载自拍照的数据\n       \
  \ [selfie valueForKey:@\"name\"];\n\n// 遍历社交网络\n        for (SocialNetwork *socialNetwork\
  \ in selfie.socialNetworks) {\n            // 加载社交网络的数据\n            [socialNetwork\
  \ valueForKey:@\"name\"];\n        }\n    }\n}\n\n@end\n```\n\n***代码清单 9-38***.\
  \ `Cache.swift`\n\n```\nimport Foundation\nimport CoreData\n\nclass Cache : PerfTest\
  \ {\n    func runTestWithContext(context: NSManagedObjectContext) -> String! {\n\
  \        let result = NSMutableString()\n\n// 在未缓存时加载数据\n        let start1 = NSDate()\n\
  \        self.loadDataWithContext(context)\n        let end1 = NSDate()\n\n// 记录结果\n\
  \        result.appendFormat(\"无缓存: %.3f s\\n\", end1.timeIntervalSinceDate(start1))\n\
