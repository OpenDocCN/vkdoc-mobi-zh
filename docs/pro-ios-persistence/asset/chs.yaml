  ```\n\n## 创建用于添加和编辑 Bug 的屏幕\n\n打开 `BugViewController.xib` 并执行以下操作：\n\n- 从对象库中拖拽一个导航栏到视图顶部，距离顶部\
  \ 20 像素。\n- 将导航栏的标题更改为 **Bug**。\n- 拖拽两个栏按钮项到导航栏，分别放在左右角，并将它们的标题分别更改为 **Cancel**\
  \ 和 **Save**。\n- 将栏按钮项连接到 `cancel:` 和 `save:` 操作。\n- 拖拽两个标签到视图中，一个设置为 **Title**，另一个设置为\
  \ **Details**。\n- 拖拽一个文本字段到视图中，并将其连接到 `bugTitle` 属性。\n- 拖拽一个文本视图到视图中，并将其连接到 `details`\
  \ 属性。\n- 选中视图后，点击“解决自动布局问题”按钮，并在**视图中的所有视图**部分选择**添加缺少的约束**。\n\n你的视图应与 图 5-8 一致。\n\
  \n![9781430260288_Fig05-08.jpg](img/9781430260288_Fig05-08.jpg)\n\n图 5-8. 添加和编辑\
  \ Bug 屏幕\n\n## 显示用于添加 Bug 的屏幕\n\n\n\n当用户点击 + 按钮添加新 Bug 时，会调用`DetailViewController.m`或`DetailViewController.swift`中的`insertNewObject:`方法。我们需要更新`insertNewObject:`以显示`BugViewController`实例。如果使用\
  \ Objective-C，请在`DetailViewController.m`中导入`BugViewController.h`。\n\n```objective-c\n\
  #import \"BugViewController.h\"\n```\n\n然后，修改`insertNewObject:`以显示添加/编辑 Bug 屏幕，如列表\
  \ 5-62（Objective-C）和列表 5-63（Swift）所示。\n\n***列表 5-62***. 更新后的 `insertNewObject:`\
  \ 方法（Objective-C）\n\n```objective-c\n- (void)insertNewObject:(id)sender {\n  BugViewController\
  \ *bugViewController = [[BugViewController alloc] initWithBug:nil project:self.project];\n\
  \  [self presentViewController:bugViewController animated:YES completion:nil];\n\
  }\n```\n\n***列表 5-63***. 更新后的 `insertNewObject:` 函数（Swift）\n\n```swift\nfunc insertNewObject(sender:\
  \ AnyObject?) {\n  let bugViewController = BugViewController(project: self.project!,\
  \ andBug: nil)\n  self.presentViewController(bugViewController, animated: true,\
  \ completion: nil)\n}\n```\n\n### 显示用于编辑 Bug 的 Bug 屏幕\n\n当用户点击表格中某行的详情披露附件时，会调用`UITableViewDelegate`的`tableView:accessoryButtonTappedForRowWithIndexPath:`方法。在该方法中，我们想要显示\
  \ Bug 屏幕，但此时需要传递所点击行的`Bug`对象。列表 5-64（Objective-C）和列表 5-65（Swift）展示了`tableView:accessoryButtonTappedForRowWithIndexPath:`的实现。\n\
  \n***列表 5-64***. `tableView:accessoryButtonTappedForRowWithIndexPath:` 方法（Objective-C）\n\
  \n```objective-c\n- (void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
  \ *)indexPath {\n  Bug *bug = [self sortedBugs][indexPath.row];\n  BugViewController\
  \ *bugViewController = [[BugViewController alloc] initWithBug:bug project:self.project];\n\
  \  [self presentViewController:bugViewController animated:YES completion:nil];\n\
  }\n```\n\n***列表 5-65***. `tableView:accessoryButtonTappedForRowWithIndexPath:` 函数（Swift）\n\
  \n```swift\noverride func tableView(tableView: UITableView, accessoryButtonTappedForRowWithIndexPath\
  \ indexPath: NSIndexPath) {\n  let bug = sortedBugs()?[indexPath.row]\n  let bugViewController\
  \ = BugViewController(project: self.project!, andBug: bug)\n  self.presentViewController(bugViewController,\
  \ animated: true, completion: nil)\n}\n```\n\n### 显示和添加 Bug\n\n您现在应该能够运行 CoreDump，深入查看项目，并添加和编辑\
  \ Bug。图 5-9 显示了项目的 Bug 列表。\n\n![9781430260288_Fig05-09.jpg](img/9781430260288_Fig05-09.jpg)\n\
  \n图 5-9. 一个 Bug 列表\n\n### 存储图片\n\nCore Data 提供了二进制数据类型（Binary Data）用于存储任何格式的二进制数据，因此它似乎是存储图片的自然选择。这种方法可行，并且在处理小图片时，效果可能不错。然而，在\
  \ Core Data 中存储较大的图片可能会导致性能问题，因为任何对这些托管对象的访问都必须加载图片数据，无论它们是否被使用。\n\n为了解决在 Core Data\
  \ 的二进制数据属性中存储图片可能带来的性能问题，许多开发人员选择将图片存储在应用程序 Documents 目录的文件中，然后在 Core Data 中为每个图片存储路径（String\
  \ 属性）。这种方法同样有效，其优势在于访问托管对象时不会将整个图片加载到内存中。相反，您可以仅在需要时显式加载图片。这种两步法加载图片（先从 Core Data\
  \ 获取图片路径，再从磁盘加载图片）有两个缺点：\n\n*   代码会变得稍微复杂一些，并且\n*   应用程序运行速度可能会稍慢，尤其是在加载多张小图片的情况下。\n\
  \n那么，应该使用哪种方法呢？应该将图片存储在 Core Data 的二进制数据属性中吗？还是应该将图片存储在磁盘上，只在 Core Data 中存储其路径的字符串属性？为什么必须要由您来决定？iPhone\
  \ 和 iPad 不也是计算机吗？计算机不是更擅长决定这类事情吗？\n\n从 iOS 5.0 开始，您确实可以让 Core Data 为您做这个决定。如果您的属性类型是二进制数据（Binary\
  \ Data），在 Xcode 建模器中会出现一个标记为 **Allows External Storage** 的复选框，如图 5-10 所示。此复选框对应于`NSAttributeDescription`的`allowsExternalBinaryDataStorage`属性。如果选中该框，Core\
  \ Data 将决定是将您的图片（或任何其他类型的二进制数据）存储在数据存储内部还是外部文件中，并且它将无缝管理所有访问。\n\n![9781430260288_Fig05-10.jpg](img/9781430260288_Fig05-10.jpg)\n\
  \n图 5-10. 在属性检查器中将属性设置为“允许外部存储”\n\n### 向 CoreDump 添加截图\n\n对 Bug 的文本描述可以帮助开发者了解出问题的地方以及需要修复的内容，但显示\
  \ Bug 及其后果的实际截图确实能提供很大帮助。在接下来的几个部分中，我们将为 CoreDump 中的 Bug 添加存储截图的功能。\n\n#### 更新模型以存储图片\n\
  \n我们希望能为 CoreDump 中的每个`Bug`托管对象存储一个可选的截图。我们还希望利用 Core Data 无缝决定是将每个图片存储在 Core Data\
  \ 存储内部还是外部记录中的能力。打开 Core Data 模型，向`Bug`实体添加一个名为`screenshot`的属性。将其设置为可选，类型设置为二进制数据（Binary\
  \ Data）。勾选“允许外部存储”（Allows External Storage）复选框。最后，重新生成`Bug`类文件。请注意，截至撰写本文时，即使您选择替换现有文件，Xcode\
  \ 实际上也不会重新生成文件，因此请务必检查文件是否包含了新的`screenshot`属性。列表 5-66 显示了更新后的头文件，列表 5-67（Objective-C）和列表\
  \ 5-68（Swift）显示了更新后的实现文件。可以看出，唯一的区别是新增了一个名为`screenshot`、类型为`NSData`的属性。类文件中没有任何地方提到允许外部存储，或者对象是在\
  \ Core Data 存储中还是在单独的文件中。这些都是 Core Data 模型和运行时的一部分，您无需处理这些复杂性。如果您愿意，可以打开文件`CoreDump.xcdatamodeld/CoreDump.xcdatamodel/contents`，您会看到类似以下的行已被添加：\n\
  \n```xml\n<attribute name=\"screenshot\" optional=\"YES\" attributeType=\"Binary\"\
  \ allowsExternalBinaryDataStorage=\"YES\" syncable=\"YES\"/>\n```\n\n您可以看到`screenshot`属性的`allowsExternalBinaryDataStorage`属性已被设置为`YES`。\n\
  \n***列表 5-66***. `Bug.h`\n\n\n\n```objc\n#import <Foundation/Foundation.h>\n#import\
  \ <CoreData/CoreData.h>\n\n@class Project;\n\n@interface Bug : NSManagedObject\n\
  \n@property (nonatomic, retain) NSString * title;\n@property (nonatomic, retain)\
  \ NSString * details;\n@property (nonatomic, retain) NSData * screenshot;\n@property\
  \ (nonatomic, retain) Project *project;\n\n@end\n```\n\n***列表 5-67***. `Bug.m`\n\
  \n```objc\n#import \"Bug.h\"\n#import \"Project.h\"\n\n@implementation Bug\n\n@dynamic\
  \ title;\n@dynamic details;\n@dynamic screenshot;\n@dynamic project;\n\n@end\n```\n\
  \n***列表 5-68***. `Bug.swift`\n\n```swift\nimport Foundation\nimport CoreData\n\n\
  @objc(Bug)\nclass Bug: NSManagedObject {\n\n@NSManaged var title: String\n    @NSManaged\
  \ var details: String\n    @NSManaged var screenshot: NSData\n    @NSManaged var\
  \ project: Project\n\n}\n```\n\n## 为用户界面添加截图\n\n为截图更新用户界面涉及以下使用场景：\n\n- 在 Bug 视图中，我可以添加或替换截图。\n\
  - 在 Bug 视图中，我可以查看当前的截图。\n\n为了实现这些用户故事，我们向 Bug 视图屏幕添加一个 `UIImageView` 实例，用于显示存储在\
  \ `screenshot` 属性中的图像。同时，我们将该 `UIImageView` 设置为可点击。当用户点击时，允许从照片库中选择一张图像，并将其存储到 `screenshot`\
  \ 中。在 Interface Builder 中打开 `BugViewController.xib`，调整 Details 文本框的宽度，以便在键盘显示时，旁边可以放置一个\
