  \        let end2 = NSDate()\n\n// 记录结果\n        result.appendFormat(\"有缓存: %.3f\
  \ s\\n\", end2.timeIntervalSinceDate(start2))\n\nreturn result\n    }\n\nfunc loadDataWithContext(context:\
  \ NSManagedObjectContext) {\n        // 加载自拍照\n        let fetchRequest = NSFetchRequest(entityName:\
  \ \"Selfie\")\n        let selfies = context.executeFetchRequest(fetchRequest, error:\
  \ nil) as [Selfie]\n\n// 遍历自拍照\n        for selfie in selfies {\n            //\
  \ 加载自拍照的数据\n            selfie.valueForKey(\"name\")\n\n// 遍历社交网络\n            for\
  \ obj in selfie.socialNetworks {\n                let socialNetwork = obj as SocialNetwork\n\
  \n// 加载社交网络的数据\n                socialNetwork.valueForKey(\"name\")\n          \
  \  }\n        }\n    }\n}\n```\n\n我们来分析一下 `runWithContext:` 方法。它执行了两次相同的操作：获取所有自拍照和所有社交网络。第一次执行时，缓存会在每次测试前通过\
  \ `ViewController` 中 `runTest:` 处理程序调用的 `[context reset]` 或 `context.reset()` 被显式清除。第二次执行时，对象已在缓存中，因此数据返回速度会快得多。`loadDataWithContext:`\
  \ 方法执行实际的获取操作。你显式获取了自拍照和社交网络的 `name` 属性，以强制 Core Data 加载对象的属性，必要时会触发惰值。\n\n在 `ViewController.m`\
  \ 或 `ViewController.swift` 的 `tests` 数组中添加一个 `Cache` 实例，如果使用 Objective-C，还要添加对 `Cache.h`\
  \ 的导入。构建应用程序并运行 `Cache` 测试。在我们的 iPhone 5s 上，该测试在无缓存时约需 0.6 秒，有缓存时约需 0.09 秒，性能提升了约\
  \ 85%。由此可见，在管理对象上下文中通过调用 `reset` 来谨慎地使缓存失效非常重要，因为其缓存机制可以显著提升性能。下一节将讨论缓存过期策略。\n\n\
  ## 缓存过期\n\n\n\n## Core Data 中的缓存过期与内存管理\n\n任何使用缓存的应用程序都会面临缓存过期的问题：缓存中的对象何时应该过期，并从持久化存储中重新加载？确定过期间隔的难点在于，需要在长时间缓存对象所带来的性能提升、由此产生的额外内存消耗以及缓存数据可能过时之间进行权衡。本节将探讨使缓存过期并释放部分内存的两种可能方案之间的取舍。\n\
  \n## 内存消耗\n\n随着越来越多的对象被放入缓存，内存使用量也会增加。即使一个托管对象完全处于\"故障\"状态，你也可以通过调用以下代码来确定一个`NSManagedObject`实例使用的最小内存量：\n\
  \n```objc\nNSLog(@\"%zu\", class_getInstanceSize(NSManagedObject.class)); // Objective-C\n\
  ```\n\n```swift\nprintln(String(format: \"%zu\", class_getInstanceSize(NSManagedObject.self)))\
  \ // Swift\n```\n\n请注意，对于 `class_getInstanceSize()` 函数，你需要在 Objective-C 中导入 `<objc/objc-runtime.h>`。如果你在\
  \ 32 位系统上运行，你会看到一个未填充数据的托管对象分配的大小是 48 字节。在 64 位系统上，大小是 96 字节。这是因为它持有指向其他对象（如实体描述、上下文和对象\
  \ ID）的引用（即 4 字节或 8 字节的指针，具体取决于操作系统的位数）。即使没有任何实际数据，一个托管对象也至少占用 48 字节（32 位操作系统）或 96\
  \ 字节（64 位操作系统）。这是最佳情况，因为此估算不包括已填充的唯一对象 ID 所占用的内存。这意味着，如果你的缓存中有 100,000 个托管对象，即使它们都处于故障状态，你至少也要为数据以外的部分使用\
  \ 5MB（32 位操作系统）或 10MB（64 位操作系统）的内存。如果你在未进行故障处理的情况下开始获取数据，可能会很快遇到内存问题。\n\n这种平衡技巧的关键在于，当缓存中的数据不再需要时，或者在你能够承受再次需要时从持久化存储中检索对象的代价时，将其从缓存中移除。\n\
  \n## 粗暴的缓存过期策略\n\n如果你不在乎丢失所有托管对象，你可以完全重置上下文。虽然这通常不是你想要的选项，但它的效率极高。正如我们所见，`NSManagedObjectContext`\
  \ 有一个 `reset` 方法，可以一次性清空缓存。一旦你调用 `[context reset]` 或 `context.reset()`，你的内存占用将大幅减少，但如果你想再次检索任何对象，就必须付出访问持久化存储的代价。还请理解，与任何其他大规模销毁机制一样，在正在运行的应用程序中间重置缓存会产生严重的副作用和附带损害。例如，你在重置前使用的任何托管对象现在都失效了。如果你尝试对它们进行任何操作，将会遇到运行时错误。\n\
  \n## 通过故障处理使缓存过期\n\n如故障处理部分所述，故障处理是一种更精细的选项。你可以通过调用 `[context refreshObject:managedObject\
  \ mergeChanges:NO]`（或 Swift 中的等效方法）来使任何托管对象发生故障。此方法调用后，该对象变为故障状态，因此它在缓存中占用的内存被最小化，尽管不为零。然而，这种策略的一个不可忽视的优势是，当一个托管对象被转换为故障状态时，它所引用的任何托管对象（通过关系）都会被释放。如果这些相关的托管对象没有其他引用指向它们，它们将从缓存中移除，从而进一步减少内存占用。以这种方式使托管对象故障有助于修剪整个对象图。\n\
  \n## 唯一化\n\n无论是商业界还是科技界都乐于将名词动词化，而\"uniquing\"这个生造词就证明了这一癖好。它试图定义使某物变得唯一或确保唯一性的行为。其用法不仅表明苹果公司并非该术语的发明者，而且其出现时间早于\
  \ Core Data。然而，苹果在其 Core Data 文档中采用了该术语，这让人担心有一天苹果会将听音乐的行为称为 *iPodding*。\n\n科技行业将术语\"\
  uniquing\"与内存对象及其在数据存储中的表示联系起来。在 Sameer Tyagi 和 Michael Vorburger 合著的《Core Java\
  \ Data Objects》（Prentice Hall, 2003）一书中提到，唯一化\"确保无论一个持久化对象被找到多少次，它在内存中都只有一个表示形式。在同一个\
  \ `PersistenceManager` 实例的范围内，对同一持久化对象的所有引用都指向同一个内存对象\"。\n\nMartin Fowler 在其《企业应用架构模式》（Addison-Wesley\
  \ Professional, 2005）一书中，给它起了一个不那么花哨、更具描述性、更符合英语语法习惯的名字：*标识映射*。他解释说，标识映射\"通过将每个已加载的对象保存在一个映射中，确保每个对象只被加载一次\"\
  。无论你怎么称呼或描述它，*唯一化*意味着 Core Data 通过确保内存中每个对象的唯一性来节省内存使用，并且不会有任何对象的两个内存实例指向持久化存储中的同一个实例。\n\
  \n例如，考虑本章应用程序中的 Core Data 模型。每个 `Selfie` 实例都与 500 个 `Person` 实例存在关系。当您运行应用程序并通过任何\
  \ `Selfie` 实例引用 `Person` 实例时，您总是会获得相同的 `Person` 实例，如图 9-6 所示。如果 Core Data 不使用唯一化，您可能会发现自己处于图\
  \ 9-7 所示的情景：每个 `Person` 实例在内存中被多次表示（每个 `Selfie` 实例一次），而每个 `Selfie` 实例在内存中也被多次表示（每个\
  \ `Person` 实例一次）。\n\n![9781430260288_Fig09-06.jpg](img/9781430260288_Fig09-06.jpg)\n\
  \n图 9-6. 自拍和人物的唯一化\n\n![9781430260288_Fig09-07.jpg](img/9781430260288_Fig09-07.jpg)\n\
  \n图 9-7. 自拍和人物的非唯一化\n\n唯一化不仅节省内存，还消除了数据不一致的问题。试想一下，如果 Core Data 不采用唯一化，PerformanceTuning\
  \ 应用程序中每个自拍都会有 500 个内存实例（每人一个），会发生什么情况。假设 `人员 1` 将某个自拍的评分改为 5，而 `人员 2` 将同一个自拍的评分改为\
  \ 7。那么这个自拍的实际评分应该是什么？当应用程序将该自拍存入持久化存储时，它应该保存哪个评分？你可以想象，如果 Core Data 在内存中维护每个数据对象的多个实例，你将不得不追踪多少数据不一致的\
  \ Bug。\n\n请注意，唯一化仅在单个托管对象上下文内进行，而不会跨托管对象上下文发生。然而，好消息是，Core Data 的默认行为就是进行唯一化，且你无法更改这一点。唯一化是\
  \ Core Data 免费提供的功能。\n\n\n\n为了测试唯一性，创建一个名为`Uniquing`的测试（同时使其符合`PerfTest`协议），该测试从持久化存储中获取所有自拍，然后将每个自拍的相关人物与其他自拍的相关人物进行比较。测试通过的条件是：代码必须验证内存中只存在\
  \ 500 个`Person`实例，并且每个自拍都指向相同的 500 个`Person`实例。为了简化这些比较，代码按确定顺序对人物进行排序，以便可以可预测地比较实例。在第一个自拍的首次循环中，代码将人物存储在一个引用数组中，以便所有后续循环都有可比较的对象。在每个后续循环中，代码提取当前自拍的人物并与引用数组进行比较。如果哪怕只有一个人物不匹配，测试就会失败。Listing\
  \ 9-39 展示了`Uniquing.m`的代码，Listing 9-40 展示了`Uniquing.swift`的代码。\n\n***Listing 9-39***.\
  \ `Uniquing.m`\n\n```\n#import \"Uniquing.h\"\n#import \"Selfie.h\"\n#import \"\
  Person.h\"\n\n@implementation Uniquing\n\n- (NSString *)runTestWithContext:(NSManagedObjectContext\
  \ *)context {\n  // Array to hold the people for comparison purposes\n  NSArray\
  \ *referencePeople = nil;\n\n// Sorting for the people\n  NSSortDescriptor *sortDescriptor  =\
  \ [[NSSortDescriptor alloc] initWithKey:@\"name\"\n                                                                  ascending:YES];\n\
  \n// Fetch all the selfies\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Selfie\"];\n  NSArray *selfies = [context executeFetchRequest:fetchRequest error:nil];\n\
  \n// Loop through the selfies\n  for (Selfie *selfie in selfies) {\n    // Get the\
  \ sorted people\n    NSArray *people = [selfie.people sortedArrayUsingDescriptors:@[sortDescriptor]];\n\
  \n// Store the first selfie's people for comparison purposes\n    if (referencePeople\
  \ == nil) {\n      referencePeople = people;\n    } else {\n      // Do the comparison\n\
        for (int i = 0, n = (int)[people count]; i < n; i++) {\n        if (people[i]\
  \ != referencePeople[i]) {\n          return [NSString stringWithFormat:@\"Uniquing\
  \ test failed; %@ != %@\",\n                  people[i], referencePeople[i]];\n\
          }\n      }\n    }\n  }\n  return @\"Test complete\";\n}\n\n@end\n```\n\n\
