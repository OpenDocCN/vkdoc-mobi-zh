  \ mergeChanges: false)\n            }\n\n// Loop through the people for this selfie\n\
              for obj in selfie.people {\n                let person = obj as Person\n\
  ```\n\n\n\n// 触发此人的错误状态\n`person.valueForKey(\"name\")`\n\n// 将此人恢复为错误状态\n`context.refreshObject(person,\
  \ mergeChanges: false)`\n\n```\nreturn \"Test complete\"\n```\n\n与 `DidFault` 类一样，将\
  \ `SingleFault` 的一个实例添加到 `ViewController.m` 中的 `tests` 数组中，同时添加对 `SingleFault.h`\
  \ 的导入。现在 `tests` 数组应匹配 Objective-C 的 列表 9-31 或 Swift 的 列表 9-32。\n\n***列表 9-31***.\
  \ 将 `SingleFault` 添加到 `Tests` 数组（Objective-C）\n\n```\nself.tests = @[[[FetchAll\
  \ alloc] init],\n               [[DidFault alloc] init],\n               [[SingleFault\
