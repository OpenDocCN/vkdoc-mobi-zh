  \n你应已在上一节中创建了数据模型 `WordList.xcdatamodeld`。在本节中，你将添加 `WordList` 应用所需的实体、属性和关系。\n\n\
  `WordList` 应用的源数据是一个单词列表，因此我们可以将数据建模为包含单个属性的单个实体，用于存储单词文本。`WordList` 所需的其他数据（单词长度及其所属类别，由首字母决定）可以从单词本身计算得出。然而，我们不打算以这种方式建模数据，原因有二。首先，这有悖于本章的目的；我们需要一些属性和关系，以便使用\
  \ Core Data 的高级查询功能。第二个原因则更为实际：性能。当你在应用中使用 Core Data 时，请记住，你的数据库服务器并非那种以闪电速度处理数据和数字的高性能服务器。它是一个\
  \ iOS 设备，充斥着各种应用和正在运行的进程，其 CPU（中央处理器）需要平衡尺寸、重量、性能和电池寿命。仅仅因为你可以在运行时计算某些内容，并不意味着你应该这样做。预先计算并存储元数据是提升\
  \ Core Data 应用性能和效率的一种方法。我们将在第 9 章中更深入地讨论性能问题。\n\n对于 `WordList` 数据模型，创建两个实体：`WordCategory`\
  \ 和 `Word`。在 `WordCategory` 实体中，添加一个名为 `firstLetter` 的 `String` 类型属性。在 `Word` 实体中，添加两个属性：类型为\
  \ `String` 的 `text` 和类型为 `Integer 16` 的 `length`。然后，创建一条从 `WordCategory` 到 `Word`\
  \ 的多对关系，删除规则设为 `Nullify`，并将其命名为 `words`。别忘了创建从 `Word` 回到 `WordCategory` 的反向关系，命名为\
  \ `wordCategory`。完成后，数据模型应与图 3-2 一致。\n\n![9781430260288_Fig03-02.jpg](img/9781430260288_Fig03-02.jpg)\n\
  \n图 3-2. WordList 数据模型\n\n## 创建用户界面\n\n`WordList` 的用户界面提供了一个用于从互联网重新加载源数据（单词列表）的按钮，以及一个用于显示数据统计信息的文本区域。要实现这个精简界面，请打开\
