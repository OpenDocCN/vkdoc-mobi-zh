  \n## 批量更新\n\n在 iOS 之前的 Core Data 世界中，如果你想要更新大量 Core Data 对象，必须首先获取所有需要更新的对象，然后遍历它们，设置新值，最后保存托管对象上下文。根据所需更新数据集的大小，这可能是一个缓慢且消耗内存的操作，因为所有对象都必须先加载到内存中，再在循环中进行写入。对于大型更新——比如那些大到无法完全载入内存的更新——开发者必须创建自定义解决方案，将更新拆分成更小的批次。\n\
  \niOS 8（以及 OS X Yosemite）引入了 Core Data 的批量更新功能，通过一个名为 `NSBatchUpdateRequest` 的类来弥补这一缺陷。令人惊讶的是，Apple\
  \ 的文档（截至 Xcode 6.1 和 iOS 8.1）并未提供该类的任何详细说明，仅表明它继承自 `NSPersistentStoreRequest`。不过头文件\
  \ `NSBatchUpdateRequest.h` 提供了一些信息。以下是从头文件注释中获取的两个重要要点：\n\n- `NSBatchUpdateRequest`\
  \ 直接与底层持久化存储通信，无需将数据加载到内存中。并非所有持久化存储都支持这种方式，但既然你很可能使用的是 SQLite 持久化存储，应该没问题。\n- 由于它直接与底层持久化存储通信，因此不会经过托管对象模型和托管对象上下文提供的验证过程。你需要自行负责实施验证规则。\n\
  \n要执行批量更新请求，你需要创建一个 `NSBatchUpdateRequest` 实例，指定请求要更新的模型实体。你可以选择为该请求设置一个谓词，以筛选需要更新的对象。然后，设置要更新的属性及其对应的新值，同时指定期望返回的结果类型。最后，执行更新。\n\
  \n你需要在字典中指定要更新的属性，其中键为要更新的属性名，值为目标值。这意味着对于某个给定属性，你只能指定一个单一值，所有匹配的对象都会被更新为该值——你无法为每个对象指定不同的值。这是合理的，因为\
  \ Core Data 会生成并执行类似如下的 SQL 语句：\n\n```sql\nUPDATE ZMYENTITY SET ZNAME = ?\n```\n\
  \n当然，你可以同时设置多个属性进行更新。\n\n对于执行批量更新后希望返回的结果类型，你可以指定以下三个值之一：\n\n- `NSStatusOnlyResultType`——不返回任何内容。这是默认值。\n\
  - `NSUpdateObjectIDsResultType`——返回已更新对象的对象 ID。\n- `NSUpdatedObjectsCountResultType`——返回已更新的对象数量。\n\
  \n需要指定的返回类型当然取决于应用程序的需求。不过，`NSUpdateObjectIDsResultType` 可能很有用，因为它可以让你在托管对象上下文中将更新后的对象转为故障状态。请记住，批量更新会绕过托管对象上下文，因此如果你已经在托管对象上下文中持有这些对象，它们仍然保留着旧值。你可以先将它们转为故障状态，然后重新获取以得到更新后的对象。\n\
  \n无论指定哪种类型，执行批量更新后，`NSBatchUpdateResult` 的 `result` 成员会被设置为相应的值。\n\n为了测试批量更新，创建一个遵循\
  \ `PerfTest` 协议、名为 `BatchUpdate` 的类。在该类实现的测试方法中，我们将所有 selfie 的评分更新两次。第一次执行更新时，我们采用\
  \ iOS 8 之前的方式：逐个更新。先获取所有 selfie，然后遍历它们，将评分值设为 5。最后，保存托管对象上下文。第二次执行更新时，我们使用批量更新将评分值设为\
  \ 7。列表 9-49 展示了 Objective-C 版本，列表 9-50 展示了 Swift 版本。\n\n***列表 9-49***. `BatchUpdate.m`\n\
  \n```objective-c\n#import \"BatchUpdate.h\"\n\n@implementation BatchUpdate\n\n-\
  \ (NSString *)runTestWithContext:(NSManagedObjectContext *)context {\n    NSMutableString\
  \ *result = [NSMutableString string];\n\n    // 逐个更新所有 selfie\n    NSFetchRequest\
  \ *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"Selfie\"];\n   \
  \ NSDate *start1 = [NSDate date];\n    NSArray *selfies = [context executeFetchRequest:fetchRequest\
  \ error:nil];\n    for (NSManagedObject *selfie in selfies) {\n        [selfie setValue:@5\
  \ forKey:@\"rating\"];\n    }\n    [context save:nil];\n    NSDate *end1 = [NSDate\
  \ date];\n    [result appendFormat:@\"逐个更新: %.3f s\\n\", [end1 timeIntervalSinceDate:start1]];\n\
  \n    // 批量更新 selfie\n\n    // 为 Selfie 实体创建批量更新请求\n    NSBatchUpdateRequest *batchUpdateRequest\
  \ = [NSBatchUpdateRequest batchUpdateRequestWithEntityName:@\"Selfie\"];\n\n   \
  \ // 设置期望的结果类型为更新对象数量\n    batchUpdateRequest.resultType = NSUpdatedObjectsCountResultType;\n\
  \n    // 将评分属性更新为 7\n    batchUpdateRequest.propertiesToUpdate = @{ @\"rating\"\
  \ : @7 };\n\n    // 标记时间并执行更新\n    NSDate *start2 = [NSDate date];\n    NSBatchUpdateResult\
  \ *batchUpdateResult = (NSBatchUpdateResult *)[context executeRequest:batchUpdateRequest\
  \ error:nil];\n    NSDate *end2 = [NSDate date];\n\n    // 记录结果\n    [result appendFormat:@\"\
  批量更新 (%@ 行): %.3f s\\n\", batchUpdateResult.result, [end2 timeIntervalSinceDate:start2]];\n\
  \n    return result;\n}\n\n@end\n```\n\n***列表 9-50***. `BatchUpdate.swift`\n\n```swift\n\
  import Foundation\nimport CoreData\n\nclass BatchUpdate : PerfTest {\n    func runTestWithContext(context:\
  \ NSManagedObjectContext) -> String! {\n        let result = NSMutableString()\n\
  ```\n\n```swift\n// 逐一更新所有自拍\nlet fetchRequest = NSFetchRequest(entityName: \"Selfie\"\
  )\nlet start1 = NSDate()\nlet selfies = context.executeFetchRequest(fetchRequest,\
  \ error: nil) as [Selfie]\nfor selfie in selfies {\n    selfie.setValue(5, forKey:\
  \ \"rating\")\n}\ncontext.save(nil)\nlet end1 = NSDate()\nresult.appendFormat(\"\
  逐一更新耗时: %.3f s\\n\", end1.timeIntervalSinceDate(start1))\n\n// 批量更新自拍\n\n// 为 Selfie\
  \ 实体创建批量更新请求\nlet batchUpdateRequest = NSBatchUpdateRequest(entityName: \"Selfie\"\
  )\n\n// 将所需结果类型设为已更新对象计数\nbatchUpdateRequest.resultType = .UpdatedObjectsCountResultType\n\
  \n// 将评分属性更新为 7\nbatchUpdateRequest.propertiesToUpdate = [\"rating\": 7]\n\n// 计时并运行更新\n\
  let start2 = NSDate()\nlet batchUpdateResult = context.executeRequest(batchUpdateRequest,\
  \ error: nil) as NSBatchUpdateResult\nlet end2 = NSDate()\n\n// 记录结果\nresult.appendFormat(\"\
  批量更新 (\\(batchUpdateResult.result!) 行): %.3f s\\n\", end2.timeIntervalSinceDate(start2))\n\
  \nreturn result\n```\n\n将 `BatchUpdate` 添加到你的 `tests` 数组中，构建并运行应用程序，然后运行 `BatchUpdate`\
  \ 测试。在我们的 iPhone 6 Plus 上，逐一更新大约需要 0.07 秒，而批量更新大约需要 0.007 秒。有两件事需要注意。\n\n- 批量更新速度快了大约\
  \ 10 倍。\n- 逐一更新仍然相当快。\n\n我们在测试中只更新了 500 个对象，而 iOS 8 之前的方法处理这些只需要百分之几秒。这告诉我们，我们可能不应该通过批量方式来执行所有更新，因为那样会放弃\
  \ Core Data 提供的校验来换取一点性能提升。相反，我们应该在真正需要时使用批量更新：即必须更新数万个（或更多）对象时。\n\n## 性能分析\n\n\
  尽管在编写代码之前深思熟虑，并理解故障、预取和内存使用等问题的影响，通常能让你编写出性能良好的可靠代码，但你常常需要一份关于应用程序性能的客观、无偏见的意见。关于应用程序性能最无偏见且最客观的意见来自运行它的计算机，因此让计算机测量应用程序\
  \ Core Data 交互的结果，能为优化性能提供重要洞察。\n\n苹果提供了一款名为 `Instruments` 的工具，它可以测量应用程序的多个方面，包括与\
  \ Core Data 相关的项目。本节将展示如何使用 `Instruments` 来测量应用程序的 Core Data 方面。我们也鼓励你探索 `Instruments`\
  \ 提供的其他测量功能。\n\n### 启动 Instruments\n\n要启动 `Instruments` 并开始分析应用程序，请从 Xcode 菜单中选择\
  \ Product ![图片](img/arrow.jpg) Profile。这将启动 `Instruments` 并显示一个对话框，询问你想要分析什么，如图\
  \ 9-8 所示。\n\n![9781430260288_Fig09-08.jpg](img/9781430260288_Fig09-08.jpg)\n\n图\
  \ 9-8. `Instruments` 要求你选择一个模板\n\n选择 Core Data 模板并点击 Choose 按钮。这将打开主 `Instruments`\
  \ 窗口，并在左侧边栏显示 Core Data 仪器，如图 9-9 所示。\n\n![9781430260288_Fig09-09.jpg](img/9781430260288_Fig09-09.jpg)\n\
  \n图 9-9. 包含 Core Data 仪器的主 `Instruments` 窗口\n\n点击 `Instruments` 窗口左上角的 Record 按钮，启动\
  \ iOS 模拟器（`Instruments` 不支持在设备上分析 Core Data 仪器）和 `PerformanceTuning` 应用程序。\n\n###\
  \ 理解结果\n\n`Instruments` 窗口显示它正在追踪的 Core Data 测量指标，包括：\n\n- Core Data 获取\n- Core\
  \ Data 缓存未命中\n- Core Data 保存\n\n运行 `PerformanceTuning` 应用程序中的任意测试——例如 `Subquery`——然后等待测试完成。测试完成后，点击\
  \ `Instruments` 左上角的 Stop 按钮，停止应用程序并停止记录 Core Data 测量指标。然后你可以审查测试结果，查看关于保存、获取、故障和缓存未命中的信息。你可以通过选择\
  \ File ![图片](img/arrow.jpg) Save As 菜单将结果保存到文件系统以便进一步审查。之后可以在 `Instruments` 中使用标准的\
  \ File ![图片](img/arrow.jpg) Open 菜单项重新打开它们。\n\n图 9-10 显示了运行 `Subquery` 后的 `Instruments`\
  \ 窗口。如图 9-10 所示，通过选择左侧的 Core Data Fetches，你可以看到 Core Data 获取的获取次数和获取持续时间（以微秒为单位）。代码执行了三个获取请求（`Instruments`\
  \ 会将一个获取调用列出两次：一次在调用开始时，一次在完成时）。第一个请求耗时 1,192 微秒，获取了 500 个人，这可以从获取实体 `Person` 和获取计数\
  \ 500 中看出。\n\n![9781430260288_Fig09-10.jpg](img/9781430260288_Fig09-10.jpg)\n\n\
  图 9-10. `Subquery` 的结果\n\n通过将窗口中间的下拉菜单从 Event List 改为 Call Tree，你可以查看获取请求的调用树。通过勾选窗口右侧的\
  \ Hide System Libraries 复选框，可以减少查看应用程序代码中调用所需的导航深度。图 9-11 显示了获取请求的调用树。使用调用树，你可以确定代码的哪些部分正在从\
  \ Core Data 存储中获取数据。\n\n![9781430260288_Fig09-11.jpg](img/9781430260288_Fig09-11.jpg)\n\
  \n图 9-11. 获取请求的调用树\n\n这只是 `Instruments` 能为你做的一小部分，它帮助你确定应用程序如何使用 Core Data，以及如何引导你找到\
  \ Core Data 性能低到需要优化努力的地方。我们鼓励你进一步研究 `Instruments` 工具，尝试其他 Core Data 仪器，查看缓存未命中和保存等情况，从而确定应用程序的热点区域。\n\
  \n## 处理多线程\n\n在编写非平凡应用程序时，你难免会考虑使用多线程。通常这是出于性能原因——将任务卸载到后台——但性能提升是以增加复杂性为代价的。本节将展示如何识别在使用\
  \ Core Data 配合多线程时常见的一些问题，以及如何解决它们。\n\n### 线程安全\n\n大多数苹果应用程序编程接口（API）都不是线程安全的，除非它们明确声明。与苹果的一贯风格一致，Core\
  \ Data **并非线程安全**。但这到底意味着什么？它意味着 Core Data 的开发人员没有采取任何预防措施来确保当你让两个线程共享 API 资源时代码不会崩溃。在我们的案例中，它意味着你不能在线程之间安全地共享\
  \ `NSManagedObject`、`NSManagedContext` 或任何其他 Core Data 对象。\n\n不要将非线程安全视为缺乏关注或质量，而应将其视为责任的委托。苹果更倾向于保持简单并最大化性能。他们将管理线程安全的责任委托给你——开发者——在你需要的时候。\n\
  \n哦，拜托，能出什么乱子呢？\n\n\n某些开发者有一种常见本能：只要问题看起来不会立刻造成损害，就会直接忽略复杂性。也许你觉得自己的线程表现良好且训练有素，不会争抢资源。也许你认为自己的应用并不复杂，所以跨线程传递\
  \ Core Data 对象应该没问题。又或者，你只是单纯觉得自己运气好。如果你符合上述任何一种情况，那么这一节就是为你准备的。\n\n那些长期处理线上生产应用的开发者常说，只要应用真正到了用户手中，任何可能发生的情况都必然会发生。如果两个线程可能发生冲突，它们就一定会冲突。如果不加小心，你必然会遇到这些并发问题。本节将教你如何识别其中一些问题。\n\
  \n为了演示线程并发问题，我们构建了一个简单的应用，它既要写入大量数据，又要报告进度。你可能会想，我们可以先写一些数据，报告状态，再写一些，再报告状态，如此反复。确实，我们可以串行地分块执行写入和读取操作，但这会显著增加写入数据的时间，从而降低用户体验。通过使用线程，我们可以并行执行这些任务，同时保持\
  \ UI 的响应性。\n\n打开 Xcode，使用单视图应用模板创建一个新应用。将其命名为 `MultiThread`。第一步是设置并初始化一个 Core Data\
  \ 栈。创建一个名为 `MultiThread.xcdatamodeld` 的新数据模型。添加一个名为 `MyData` 的实体，并为其添加一个名为 `myValue`\
  \ 的属性，类型为 `Integer 16`。你的数据模型应与图 9-12 一致。\n\n![9781430260288_Fig09-12.jpg](img/9781430260288_Fig09-12.jpg)\n\
  \n图 9-12. MultiThread 数据模型\n\n为清晰起见，我们创建一个包含 Core Data 设置的类。创建一个名为 `Persistence`\
  \ 的新类（作为 `NSObject` 的子类），并将 `Persistence.h` 修改为如代码清单 9-51 所示。\n\n***代码清单 9-51***.\
  \ `Persistence.h`\n\n```\n#import <Foundation/Foundation.h>\n@import CoreData;\n\
  \n@interface Persistence : NSObject\n\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
  \ *managedObjectModel;\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
  \ *persistentStoreCoordinator;\n\n- (NSManagedObjectContext*)createManagedObjectContext;\n\
  \n@end\n```\n\n这个头文件应该看起来很熟悉，不过你可能会注意到，我们用一个创建托管对象上下文的方法代替了托管对象上下文的属性。这样做是为了线程处理，我们将在本章后面解释。\n\
  \n接下来，打开 `Persistence.m` 或 `Persistence.swift`，并以前几章类似的方式实现初始化。代码清单 9-52 展示了 Objective-C\
  \ 版本，代码清单 9-53 展示了 Swift 版本。\n\n***代码清单 9-52***. `Persistence.m`\n\n```\n- (instancetype)init\
  \ {\n  self = [super init];\n  if (self != nil) {\n    // 初始化托管对象模型\n    NSURL *modelURL\
  \ = [[NSBundle mainBundle]\n            URLForResource:@\"MultiThread\" withExtension:@\"\
  momd\"];\n    _managedObjectModel = [[NSManagedObjectModel alloc]\n            initWithContentsOfURL:modelURL];\n\
  \n// 初始化持久化存储协调器\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\n\
  \            URLByAppendingPathComponent:@\"MultiThread.sqlite\"];\n\n// 如果已有存储则将其删除，以便从头开始\n\
  \    NSFileManager *fm = [NSFileManager defaultManager];\n    [fm removeItemAtURL:storeURL\
  \ error:nil];\n\nNSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc]\n             initWithManagedObjectModel:self.managedObjectModel];\n  \
  \  if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
  \                                                   configuration:nil\n        \
  \                                                     URL:storeURL\n           \
  \                                              options:nil\n                   \
  \                                        error:&error]) {\n      NSLog(@\"未解决的错误\
  \ %@, %@\", error, [error userInfo]);\n      abort();\n    }\n  }\n  return self;\n\
  }\n\n- (NSURL *)applicationDocumentsDirectory {\n  return [[[NSFileManager defaultManager]\n\
  \        URLsForDirectory:NSDocumentDirectory\n        inDomains:NSUserDomainMask]\
  \ lastObject];\n}\n\n- (NSManagedObjectContext*)createManagedObjectContext {\n \
  \ NSManagedObjectContext *managedObjectContext =\n        [[NSManagedObjectContext\
  \ alloc] init];\n  [managedObjectContext\n        setPersistentStoreCoordinator:self.persistentStoreCoordinator];\n\
  \nreturn managedObjectContext;\n}\n\n@end\n```\n\n***代码清单 9-53***. `Persistence.swift`\n\
  \n```\nimport Foundation\nimport CoreData\n\nclass Persistence {\n    init() {\n\
  \        println(\"假装在迁移\");\n        NSThread.sleepForTimeInterval(10)\n      \
  \  println(\"假装完成...\");\n    }\n\n// MARK: - Core Data 堆栈\n\nlazy var applicationDocumentsDirectory:\
  \ NSURL = {\n        // 应用程序用于存储 Core Data 存储文件的目录。此代码使用应用程序文档目录中名为 \"book.persistence.MultiThreadSwift\"\
  \ 的目录。\n        let urls = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory,\
  \ inDomains: .UserDomainMask)\n        return urls[urls.count-1] as NSURL\n    \
  \    }()\n\nlazy var managedObjectModel: NSManagedObjectModel = {\n        // 应用程序的托管对象模型。此属性是必需的。如果应用程序无法找到并加载其模型，将发生致命错误。\n\
  \        let modelURL = NSBundle.mainBundle().URLForResource(\"MultiThreadSwift\"\
  , withExtension: \"momd\")!\n        return NSManagedObjectModel(contentsOfURL:\
  \ modelURL)!\n        }()\n\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\
  \ = {\n        // 应用程序的持久化存储协调器。此实现创建并返回一个协调器，并已为其添加了应用程序的存储。此属性是可选的，因为存在可能导致创建存储失败的合法错误情况。\n\
  \        // 创建协调器和存储\n        var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:\
  \ self.managedObjectModel)\n        let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  MultiThreadSwift.sqlite\")\n\n// 如果已有存储则将其删除，以便从头开始\n        let fm = NSFileManager.defaultManager()\n\
  \        fm.removeItemAtURL(url, error: nil)\n```\n\n\n```swift\nvar error: NSError?\
  \ = nil\nvar failureReason = \"创建或加载应用程序保存的数据时出现错误。\"\nif coordinator!.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: url, options: nil, error: &error) == nil {\n    coordinator\
  \ = nil\n    // 报告所有发生的错误。\n    let dict = NSMutableDictionary()\n    dict[NSLocalizedDescriptionKey]\
  \ = \"初始化应用程序的保存数据失败\"\n    dict[NSLocalizedFailureReasonErrorKey] = failureReason\n\
  \    dict[NSUnderlyingErrorKey] = error\n    error = NSError(domain: \"YOUR_ERROR_DOMAIN\"\
  , code: 9999, userInfo: dict)\n    // 将此替换为处理错误的合适代码。\n    // abort() 会导致应用程序生成崩溃日志并终止。您不应在正式发布的应用程序中使用此函数，尽管它在开发过程中可能很有用。\n\
  \    NSLog(\"未解决的错误 \\(error), \\(error!.userInfo)\")\n    abort()\n}\n\nreturn\
  \ coordinator\n}()\n\nlazy var managedObjectContext: NSManagedObjectContext? = {\n\
  \    return self.createManagedObjectContext()\n}()\n\nfunc createManagedObjectContext()\
  \ -> NSManagedObjectContext? {\n    // 返回应用程序的管理对象上下文（该上下文已绑定到应用程序的持久存储协调器）。此属性是可选的，因为存在可能导致创建上下文失败的合法错误情况。\n\
  \    let coordinator = self.persistentStoreCoordinator\n    if coordinator == nil\
  \ {\n        return nil\n    }\n\n    var managedObjectContext = NSManagedObjectContext()\n\
  \    managedObjectContext.persistentStoreCoordinator = coordinator\n    return managedObjectContext\n\
  }\n\n// MARK: - Core Data 保存支持\n\nfunc saveContext () {\n    if let moc = self.managedObjectContext\
  \ {\n        var error: NSError? = nil\n        if moc.hasChanges && !moc.save(&error)\
  \ {\n            // 将此实现替换为处理错误的合适代码。\n            // abort() 会导致应用程序生成崩溃日志并终止。您不应在正式发布的应用程序中使用此函数，尽管它在开发过程中可能很有用。\n\
  \            NSLog(\"未解决的错误 \\(error), \\(error!.userInfo)\")\n            abort()\n\
  \        }\n    }\n}\n```\n\n**重要提示：** 请注意代码如何通过调用 `NSFileManager` 的 `removeItemAtURL:error:`\
  \ 方法来删除如果存在的 SQLite 文件。在实际的应用程序中，这显然是一种糟糕的做法，因为它会删除所有持久化数据。但在我们的场景中，这是非常有用的，因为它允许我们多次启动应用程序，而无需担心残留数据。\n\
  \n既然我们已经完成了 Core Data 设置代码，现在可以转到 `ViewController` 并试验代码，看看我们可以利用线程做些什么。\n\n对于 Objective-C\
  \ 版本，请编辑 `ViewController.m`，添加适当的导入语句、`Persistence` 和 `NSManagedObjectContext` 实例的私有属性，以及运行设置代码的初始化器，如代码清单\
  \ 9-54 所示。对于 Swift，请对 `ViewController.swift` 进行类似的编辑，如代码清单 9-55 所示。\n\n**代码清单 9-54.**\
  \ `ViewController.m`\n\n```objective-c\n@import CoreData;\n#import \"ViewController.h\"\
  \n#import \"Persistence.h\"\n\n@interface ViewController ()\n@property (nonatomic,\
  \ strong) Persistence *persistence;\n@property (nonatomic, strong) NSManagedObjectContext\
  \ *managedObjectContext;\n@end\n\n@implementation ViewController\n\n- (instancetype)initWithCoder:(NSCoder\
  \ *)aDecoder {\n    self = [super initWithCoder:aDecoder];\n    if(self) {\n   \
  \     self.persistence = [[Persistence alloc] init];\n        self.managedObjectContext\
  \ = [self.persistence createManagedObjectContext];\n    }\n\nreturn self;\n}\n\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    // 使用 nib 文件加载视图后，在此处执行任何额外的设置。\n\
  }\n\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n \
  \   // 处置任何可以重新创建的资源。\n}\n\n@end\n```\n\n**代码清单 9-55.** `ViewController.swift`\n\
  \n```swift\nimport UIKit\nimport CoreData\n\nclass ViewController: UIViewController\
  \ {\n\nvar persistence: Persistence?\n    var managedObjectContext: NSManagedObjectContext?\n\
  \nrequired init(coder aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n\
  \nself.persistence = Persistence()\n        self.managedObjectContext = self.persistence?.managedObjectContext\n\
  \    }\n\noverride func viewDidLoad() {\n        super.viewDidLoad()\n    }\n\n\
  override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
  \        // 处置任何可以重新创建的资源。\n    }\n}\n```\n\n此时，您应该能够启动应用程序并看到一个空白屏幕。\n\n仍然在 `ViewController`\
  \ 中，我们现在创建一个用于写入数据的新方法。在此方法中，我们向存储区写入 10,000 个对象。写入完成后我们保存上下文，以便所有对象都将位于持久存储区中，这样任何其他管理对象上下文都能看到它们。代码清单\
  \ 9-56 展示了 Objective-C 版本，代码清单 9-57 展示了 Swift 版本。\n\n**代码清单 9-56.** 写入 10,000 个对象\
  \ (Objective-C)\n\n```objective-c\n- (void)writeData {\n  NSManagedObjectContext\
  \ *context = self.managedObjectContext;\n\nNSLog(@\"正在写入\");\n  for(int i=0; i<10000;\
  \ i++) {\n    NSManagedObject *obj = [NSEntityDescription\n            insertNewObjectForEntityForName:@\"\
  MyData\"\n            inManagedObjectContext:context];\n    [obj setValue:[NSNumber\
  \ numberWithInt:i] forKey:@\"myValue\"];\n  }\n\nNSError *error;\n  [context save:&error];\n\
  \  if(error) {\n    NSLog(@\"写入时出错！%@\", error);\n  }\n\nNSLog(@\"完成\");\n}\n```\n\
  \n**代码清单 9-57.** 写入 10,000 个对象 (Swift)\n\n```swift\nfunc writeData() {\n    if let\
  \ context = self.managedObjectContext {\n        println(\"正在写入\");\n        for\
  \ var i=0; i<10000; i++ {\n            let obj = NSEntityDescription.insertNewObjectForEntityForName(\"\
  MyData\", inManagedObjectContext: context) as NSManagedObject\n            obj.setValue(Int(i),\
  \ forKey: \"myValue\")\n        }\n\npersistence?.saveContext()\n\nprintln(\"完成\"\
  )\n    }\n    else {\n        println(\"缺少上下文。无法写入。\")\n    }\n}\n```\n\n接下来，我们添加一个报告状态的方法——即一个读取已写入内容的方法。它返回已写入的\
  \ 10,000 个对象所占的比例。代码清单 9-58 展示了 Objective-C 方法，代码清单 9-59 展示了 Swift 函数。\n\n**代码清单\
  \ 9-58.** 读取 10,000 个对象 (Objective-C)\n\n```objective-c\n- (CGFloat)reportStatus\
  \ {\n  NSManagedObjectContext *context = self.managedObjectContext;\n\nNSFetchRequest\
  \ *request = [[NSFetchRequest alloc] init];\n  request.entity = [NSEntityDescription\
  \ entityForName:@\"MyData\"\n                inManagedObjectContext:context];\n\n\
  NSError *error;\n  NSUInteger count = [context countForFetchRequest:request error:&error];\n\
  \nif(error) {\n    NSLog(@\"读取时出错！%@\", error);\n  }\n\nreturn (CGFloat)count /\
  \ 10000.0f;\n}\n```\n\n**代码清单 9-59.** 读取 10,000 个对象 (Swift)\n\n```swift\nfunc reportStatus()\
  \ -> Float {\n    if let context = self.managedObjectContext {\n        let request\
  \ = NSFetchRequest(entityName: \"MyData\")\n        var error: NSError? = nil\n\
  \        let count = context.countForFetchRequest(request, error: &error)\n    \
  \    if error != nil {\n            println(\"读取时出错\")\n        }\n\nreturn Float(count)\
  \ / 10000.0\n    }\n    else {\n        println(\"缺少上下文。无法报告状态\")\n        return\
  \ 0\n    }\n}\n```\n\n\n现在我们已经能够读写对象，只需调用相应代码即可。我们将在`viewDidAppear:`方法中实现这一操作，如代码清单\
  \ 9-60（Objective-C）和代码清单 9-61（Swift）所示。\n\n***代码清单 9-60***. 调用写入与读取方法（Objective-C）\n\
  \n```objective-c\n- (void)viewDidAppear:(BOOL)animated {\n    [super viewDidAppear:animated];\n\
  \n[self writeData];\n\nCGFloat status = 0;\n    while(status < 1.0) {\n      status\
  \ = [self reportStatus];\n      NSLog(@\"Status: %lu%%\", (unsigned long)(status\
  \ * 100));\n    }\n\nNSLog(@\"All done\");\n}\n```\n\n***代码清单 9-61***. 调用写入与读取方法（Swift）\n\
  \n```swift\noverride func viewDidAppear(animated: Bool) {\n    super.viewDidAppear(animated)\n\
  \nself.writeData()\n\nvar status : Float = 0\n    while (status < 1) {\n       \
  \ status = self.reportStatus()\n        println(NSString(format: \"Status: %lu%%\"\
  , Int(status * 100)))\n    }\n    println(\"All done\")\n}\n```\n\n显然，若此时启动应用，所有写入操作将在报告任何进度之前完成。一旦状态开始报告，你只会看到\
  \ 100%。试试看。\n\n```\n09:35:11.586 MultiThread[3246:60b] Writing\n09:35:11.738 MultiThread[3246:60b]\
  \ Done\n09:35:11.753 MultiThread[3246:60b] Status: 100%\n09:35:11.754 MultiThread[3246:60b]\
  \ All done\n```\n\n想必你已经知道发生了什么。由于所有操作都在同一线程中运行，数据写入会首先完成，只有在写入完成后我们才开始报告状态。我们也可以反过来，在写入数据前就开始报告状态，但那样写入部分将永远不会执行，因为状态循环会无限迭代下去。\n\
  \n这正是多线程的用武之地。解决方案是将写入和报告进度这两个操作分别分发到各自的线程中。使用 Grand Central Dispatch 编辑`viewDidAppear:`方法以采用多线程。一个线程负责写入数据，另一个线程则通过读取数据来报告状态。两个线程将异步运行，使我们能够在报告写入进度的同时进行数据写入。代码清单\
  \ 9-62 展示了 Objective-C 版本，代码清单 9-63 展示了 Swift 版本。\n\n***代码清单 9-62***. 在独立线程中写入与读取（Objective-C）\n\
  \n```objective-c\n- (void)viewDidAppear:(BOOL)animated {\n  [super viewDidAppear:animated];\n\
  \ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),\
  \ ^{\n    [self writeData];\n  });\n\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n    CGFloat status = 0;\n    while(status < 1.0) {\n      status = [self\
  \ reportStatus];\n      NSLog(@\"Status: %lu%%\", (unsigned long)(status * 100));\n\
  \    }\n\nNSLog(@\"All done\");\n  });\n}\n```\n\n***代码清单 9-63***. 在独立线程中写入与读取（Swift）\n\
  \n```swift\noverride func viewDidAppear(animated: Bool) {\n    super.viewDidAppear(animated)\n\
  \ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),\
  \ { () -> Void in\n        self.writeData()\n    })\n\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), { () -> Void in\n        var status : Float = 0\n        while (status < 1)\
  \ {\n            status = self.reportStatus()\n            println(NSString(format:\
  \ \"Status: %lu%%\", Int(status * 100)))\n        }\n        println(\"All done\"\
  )\n    })\n}\n```\n\n现在，当应用运行时，两个任务将同时执行。觉得自己运气不错？那就试试看，启动应用碰碰运气吧。\n\n很可能你会得到类似下面的结果（如果没出现，我们希望你帮忙选彩票号码）：\n\
  \n```\n09:40:03.120 MultiThread[3282:1303] Writing\n09:40:03.122 MultiThread[3282:3603]\
  \ Status: 0%\n09:40:03.124 MultiThread[3282:3603] *** Terminating app due to uncaught\
  \ exception 'NSGenericException', reason: '*** Collection <__NSCFSet: 0x1096122b0>\
  \ was mutated while being enumerated.'\n*** First throw call stack:\n(\n    0  \
  \ CoreFoundation                      0x000000010194a495 __exceptionPreprocess +\
  \ 165\n    1   libobjc.A.dylib                     0x00000001016a999e objc_exception_throw\
  \ + 43\n    2   CoreFoundation                      0x00000001019ce68e __NSFastEnumerationMutationHandler\
  \ + 126\n    3   CoreData                            0x0000000101c2666b -[NSManagedObjectContext(_NSInternalAdditions)\
  \ _countWithNoChangesForRequest:error:] + 1675\n    4   CoreData               \
  \             0x0000000101c25d5b -[NSManagedObjectContext countForFetchRequest:error:]\
  \ + 1211\n    5   MultiThread                         0x00000001000022ae -[ViewController\
  \ reportStatus] + 286\n    6   MultiThread                         0x0000000100001ed9\
  \ __32-[ViewController viewDidAppear:]_block_invoke17 + 89\n    7   libdispatch.dylib\
  \                   0x00000001020e7851 _dispatch_call_block_and_release + 12\n \
  \   8   libdispatch.dylib                   0x00000001020fa72d _dispatch_client_callout\
  \ + 8\n    9   libdispatch.dylib                   0x00000001020eab27 _dispatch_root_queue_drain\
  \ + 380\n    10  libdispatch.dylib                   0x00000001020ead12 _dispatch_worker_thread2\
  \ + 40\n    11  libsystem_pthread.dylib             0x0000000102447ef8 _pthread_wqthread\
  \ + 314\n    12  libsystem_pthread.dylib             0x000000010244afb9 start_wqthread\
  \ + 13\n)\nlibc++abi.dylib: terminating with uncaught exception of type NSException\n\
  ```\n\n这里的问题是，我们在上下文的缓存被写入的同时窥视了它。这不一定是 Core Data 的问题。你不能从两个不同线程同时遍历一个集合并窥视其内部。所以这绝对是一个线程安全问题。这个实验揭示了一个使用\
  \ Core Data 进行多线程编程时的基本原则：为每个线程分配独立的托管对象上下文。还记得我们创建的`createManagedObjectContext`方法吗？我们用该方法为`writeData`方法提供其自己的托管对象上下文，而不是使用`reportStatus`方法所使用的那个上下文。\n\
  \n当囚犯争斗时，他们会被隔离拘禁。他们失去了争斗的理由，因为没有可争夺的东西，也没有争斗的对象。线程隔离是处理线程之间“不协作”问题的常用策略。\n\n在多线程中使用\
  \ Core Data 时，问题会迅速出现。管理并发性的方法很简单：避免共享线程之间争夺的资源。值得重申：最常见的解决方案是为每个线程创建一个上下文。\n\n\
  **重要提示** 每个上下文必须由即将使用它的线程创建。\n\n我们对代码进行的另一项更改是在添加每个对象后保存托管对象上下文。这样做是为了将上下文的缓存写入持久化存储，以便`reportStatus`方法中使用的托管对象上下文能够看到这些对象。如果我们在保存上下文之前等待所有\
  \ 10,000 个对象写入完毕，那么`reportStatus`方法在`writeData`线程完成写入之前将一直报告 0% 的状态，之后则会直接跳到 100%。\n\
  \n代码清单 9-64 展示了更新后的 Objective-C 版本，代码清单 9-65 展示了更新后的 Swift 版本。\n\n***代码清单 9-64***.\
  \ 每次写入后保存上下文（Objective-C）\n\n```objective-c\n- (void)writeData {\n  NSManagedObjectContext\
  \ *context = [self.persistence createManagedObjectContext];\n```\n\n\n\n```objectivec\n\
  NSLog(@\"Writing\");\nfor(int i=0; i<10000; i++) {\n  NSManagedObject *obj = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"MyData\" inManagedObjectContext:context];\n\
  \  [obj setValue:[NSNumber numberWithInt:i] forKey:@\"myValue\"];\n\n  NSError *error;\n\
  \  [context save:&error];\n  if(error) {\n    NSLog(@\"Boom while writing! %@\"\
  , error);\n  }\n}\n\nNSLog(@\"Done\");\n```\n\n***列表 9-65***. 每次写入后保存上下文 (Swift)\n\
  \n```swift\nfunc writeData () {\n    if let context = self.persistence?.createManagedObjectContext()\
  \ {\n        println(\"Writing\");\n        for var i=0; i<10000; i++ {\n      \
  \      let obj = NSEntityDescription.insertNewObjectForEntityForName(\"MyData\"\
  , inManagedObjectContext: context) as NSManagedObject\n            obj.setValue(Int(i),\
  \ forKey: \"myValue\")\n\n            context.save(nil)\n        }\n\n        println(\"\
  Done\")\n    }\n    else {\n        println(\"Missing context. Cannot write.\")\n\
  \    }\n}\n```\n\n如果你现在构建并运行应用，会看到控制台中的状态百分比稳步攀升，直到达到 100%，然后显示\"All done\"消息。\n\
  \n## 免费的用户界面\n\n既然我们已成功让应用支持多线程，接下来完成收尾工作：在用户界面上添加一个进度条，以便研究如何让用户直观地看到进度。\n\n打开`Main.storyboard`，按照图\
  \ 9-13 所示，向视图中添加一个进度条和一个标签。标签将以文本形式显示进度信息，而进度条则以图形方式同步反映相同进度。\n\n![9781430260288_Fig09-13.jpg](img/9781430260288_Fig09-13.jpg)\n\
  \n图 9-13. 进度条与标签的布局\n\n现在，在`ViewController.m`（Objective-C）或`ViewController.swift`（Swift）中创建两个`IBOutlet`，分别命名为`label`和`progressView`。在\
  \ Interface Builder 中将它们连接到刚添加的标签和进度条。列表 9-66 显示了需要添加到`ViewController.h`的内容，列表 9-67\
  \ 显示了需要添加到`ViewController.swift`的内容。\n\n***列表 9-66***. 向`ViewController.m`添加输出口\n\
  \n```objectivec\n@interface ViewController ()\n@property (nonatomic, strong) Persistence\
  \ *persistence;\n@property (nonatomic, strong) NSManagedObjectContext *managedObjectContext;\n\
  @property (nonatomic, weak) IBOutlet UILabel *label;\n@property (nonatomic, weak)\
  \ IBOutlet UIProgressView *progressView;\n@end\n```\n\n***列表 9-67***. 向`ViewController.swift`添加输出口\n\
  \n```swift\n@IBOutlet weak var label: UILabel!\n@IBOutlet weak var progressView:\
  \ UIProgressView!\n```\n\n现在更新`viewDidAppear:`方法，使其能将报告状态反映到用户界面上。我们将标签设置为状态的文本版本，并同步移动进度条。由于我们是从非主线程（即用户界面所使用的线程）调用`reportStatus`方法，因此必须确保将更新派发到主队列，以便由主线程执行。所有界面更新都应在主线程完成——恰当的线程处理并不仅限于\
  \ Core Data 领域！\n\n列表 9-68 展示了 Objective-C 版本的代码，列表 9-69 展示了 Swift 版本。\n\n***列表\
  \ 9-68***. 更新用户界面以显示进度 (Objective-C)\n\n```objectivec\n-(void)viewDidAppear:(BOOL)animated\
  \ {\n  [super viewDidAppear: animated];\n\n  dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n    [self writeData];\n  });\n\n  dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n    CGFloat status = 0;\n    while(status < 1.0) {\n      status = [self\
  \ reportStatus];\n      dispatch_async(dispatch_get_main_queue(), ^{\n        self.progressView.progress\
  \ = status;\n        self.label.text = [NSString stringWithFormat:@\"%lu%%\",\n\
  \            (unsigned long)(status * 100)];\n      });\n    }\n\n    NSLog(@\"\
  All done\");\n  });\n}\n```\n\n***列表 9-69***. 更新用户界面以显示进度 (Swift)\n\n```swift\n\
  override func viewDidAppear(animated: Bool) {\n    super.viewDidAppear(animated)\n\
  \n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), { () -> Void in\n        self.writeData()\n    })\n\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), { () -> Void in\n        var status : Float = 0\n        while (status < 1)\
  \ {\n            status = self.reportStatus()\n            dispatch_async(dispatch_get_main_queue(),\
  \ { () -> Void in\n                self.progressView.progress = status\n       \
  \         self.label.text = NSString(format: \"Status: %lu%%\", Int(status * 100))\n\
  \            })\n        }\n        println(\"All done\")\n    })\n}\n```\n\n现在再次启动应用，观察随着写入操作逐步完成，用户界面上的文本百分比和进度条如何实时更新。\n\
  \n## 在不同线程上初始化堆栈\n\n良好的实践是考虑在主线程之外的线程上初始化 Core Data 堆栈。虽然 Core Data 的初始化通常很快，但在某些情况下（尤其是涉及大型存储迁移时），可能会耗费较长时间。如果在`application:didFinishLaunchingWithOptions:`中初始化且耗时较长，应用会崩溃。如果像我们这样在控制器中初始化，用户界面则会失去响应。无论哪种情况，都不是好事。为此，我们建议考虑在其他线程上执行初始化。\n\
  \n让我们将这一理念应用到 MultiThread 应用中。首先，我们添加一个 10 秒的暂停来模拟长时间启动。打开`Persistence.m`或`Persistence.swift`，将列表\
  \ 9-70 所示的代码添加到`init`方法（Objective-C）的`if`块末尾，或创建列表 9-71 所示的`init`方法（Swift）。\n\n\
  ***列表 9-70***. 模拟 10 秒迁移 (Objective-C)\n\n```objectivec\nNSLog(@\"Pretending to\
  \ do a migration\");\n[NSThread sleepForTimeInterval:10];\nNSLog(@\"Done with pretending...\"\
  );\n```\n\n***列表 9-71***. 模拟 10 秒迁移 (Swift)\n\n```swift\ninit() {\n    println(\"\
  Pretending to do a migration\");\n    NSThread.sleepForTimeInterval(10)\n    println(\"\
  Done with pretending...\");\n}\n```\n\n现在启动应用，观察启动画面显示多久后界面才出现——这会让用户疑惑到底发生了什么。\n\
  \n为了解决这个问题，我们在`ViewController`的`initWithCoder:`方法中，于不同线程上启动 Core Data 堆栈的初始化，如列表\
  \ 9-72（Objective-C）或列表 9-73（Swift）所示。\n\n***列表 9-72***. 在独立线程上初始化 Core Data (Objective-C)\n\
  \n```objectivec\n- (instancetype)initWithCoder:(NSCoder *)aDecoder {\n  self = [super\
  \ initWithCoder:aDecoder];\n  if(self) {\n    [self addObserver:self forKeyPath:@\"\
  managedObjectContext\" options:NSKeyValueObservingOptionNew context:NULL];\n\n \
  \   dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),\
  \ ^{\n      self.persistence = [[Persistence alloc] init];\n      dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n        self.managedObjectContext = [self.persistence createManagedObjectContext];\n\
  \      });\n    });\n  }\n\n  return self;\n}\n```\n\n***列表 9-73***. 在独立线程上初始化 Core\
  \ Data (Swift)\n\n\n\n```\nrequired init(coder aDecoder: NSCoder) {\n    super.init(coder:\
  \ aDecoder)\n\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), { () -> Void in\n        self.persistence = Persistence()\n        dispatch_async(dispatch_get_main_queue(),\
  \ { () -> Void in\n            self.managedObjectContext = self.persistence?.managedObjectContext\n\
  \        })\n    })\n}\n```\n\n这段代码做了几件事。首先，在 Objective-C 版本的代码中，我们为 `managedObjectContext`\
  \ 属性添加了一个观察者（使用**键值观察**（KVO）API）。因为所有操作都将在不同的线程上执行，我们不能再依赖在 `viewDidAppear:` 中设置此值，因此我们将改为在收到通知时启动\"\
  写入\"代码。然后，我们将初始化代码分发到另一个线程。当 Core Data 完成初始化后，我们在主线程上设置 `managedObjectContext` 属性。为何需要在主线程上设置它？因为正如之前所述，托管上下文必须在将要使用它的线程上创建。由于我们将在主线程上使用托管对象，因此我们在主线程上设置它。\n\
  \n当我们设置托管对象上下文属性值时，KVO 通知将被触发，因此我们还需要观察该属性变化并在属性更改时启动\"写入\"代码。我们针对 Objective-C 和\
  \ Swift 采用不同的方式，因为这两种语言的语义不同。对于 Objective-C，将 `viewDidAppear:` 中的所有代码移动到一个名为 `observeValueForKeyPath:ofObject:change:context:`\
  \ 的新方法中，当我们正在观察的 `managedObjectContext` 属性发生变化时，该方法将被自动调用。代码清单 9-74 显示了该代码。\n\n\
  **代码清单 9-74**。观察 `managedObjectContext` (Objective-C)\n\n```\n- (void)observeValueForKeyPath:(NSString\
  \ *)keyPath ofObject:(id)object change:(NSDictionary *)change context:(void *)context\
  \ {\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n        [self writeData];\n    });\n\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n        CGFloat status = 0;\n        while(status < 1.0) {\n         \
  \   status = [self reportStatus];\n            dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n                self.progressView.progress = status;\n                self.label.text\
  \ = [NSString stringWithFormat:@\"%lu%%\",\n                                   (unsigned\
  \ long)(status * 100)];\n            });\n        }\n\n        NSLog(@\"All done\"\
  );\n    });\n}\n```\n\n对于 Swift，我们为 `managedObjectContext` 属性创建一个 `didSet` 观察者，该观察者将调用我们创建的一个名为\
  \ `initiate` 的新方法。代码清单 9-75 显示了该代码。\n\n**代码清单 9-75**。观察 `managedObjectContext` (Swift)\n\
  \n```\nvar managedObjectContext: NSManagedObjectContext? {\n    didSet {\n     \
  \   self.initiate()\n    }\n}\n\nfunc initiate() {\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), { () -> Void in\n        self.writeData()\n    })\n\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), { () -> Void in\n        var status : Float = 0\n        while(status < 1)\
  \ {\n            status = self.reportStatus()\n            dispatch_async(dispatch_get_main_queue(),\
  \ { () -> Void in\n                self.progressView.progress = status\n       \
  \         self.label.text = NSString(format: \"Status: %lu%%\", Int(status * 100))\n\
  \            })\n\n            //println(NSString(format: \"Status: %lu%%\", Int(status\
  \ * 100)))\n        }\n\n        println(\"All done\")\n    })\n}\n```\n\n在这两种语言中，`viewDidAppear:`\
  \ 方法现在都应该从代码中移除。为了让一切保持整洁，最后一步是确保我们为 UI 元素提供了默认值。我们在 `viewWillAppear:` 中设置初始值，如代码清单\
  \ 9-76 (Objective-C) 和代码清单 9-77 (Swift) 所示。\n\n**代码清单 9-76**。将 UI 元素设置为默认值 (Objective-C)\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated {\n  [super viewWillAppear:animated];\n\
  \n  self.progressView.progress = 0;\n  self.label.text = @\"Initializing Core Data\"\
  ;\n}\n```\n\n**代码清单 9-77**。将 UI 元素设置为默认值 (Swift)\n\n```\noverride func viewWillAppear(animated:\
  \ Bool) {\n    super.viewWillAppear(animated)\n\n    self.progressView.progress\
  \ = 0\n    self.label.text = \"Initializing Core Data\"\n}\n```\n\n现在启动应用程序，注意启动画面只会短暂显示，然后应用程序界面出现并显示“Initializing\
  \ Core Data”约 10 秒钟（在此期间执行模拟数据迁移），接着进度条从 0% 逐渐增加到 100%。\n\n## 总结\n\n从对象唯一性到故障处理再到托管对象缓存，Core\
  \ Data 为您优化了大量数据访问性能。这些优化是免费的，无需您付出额外努力。然而，您应当了解 Core Data 提供的这些优化，这样才能确保与其协同工作，而非背道而驰。\n\
  \n然而，并非所有 Core Data 的性能提升都能自动获得。在本章中，您学习了如何使用诸如预抓取和谓词优化等技术，尽最大可能从 Core Data 中为您的应用榨取性能。您还学习了如何使用\
  \ Instruments 应用分析 Core Data 应用，从而了解应用如何使用 Core Data 以及问题出在哪里。最后，您学习了如何使用多线程来提高应用的响应性和感知性能。\n\
  \n其他 iOS 编程书籍可能会出色地展示如何在针对持久化存储执行长时间查询时显示旋转指示器和“请稍候”消息。而本书则向您展示如何完全避免使用旋转指示器和“请稍候”消息。\n\
