  ```\n\n在 iOS 5.0 中，Apple 为`NSFetchRequest`添加了几个便捷方法，这样你就不必创建`NSEntityDescription`实例或使用两行代码将`NSFetchRequest`实例绑定到实体。一个是接受实体名称的初始化方法，另一个是接受实体名称的类方法。代码清单\
