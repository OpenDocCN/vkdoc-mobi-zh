  \n\n首先创建一个名为`deleteAllObjects`的实用方法，用于通过实体名称清除实体。您可以在列表 2-13 中找到此方法的 Objective-C\
  \ 代码，在列表 2-14 中找到 Swift 代码。向此方法传递要删除所有对象的实体名称。此方法会获取该实体的所有对象，然后将其删除。\n\n**列表 2-13**\
  \ Objective-C `deleteAllObjects`方法\n\n```\n- (void)deleteAllObjects:(NSString *)entityName\
  \ {\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:entityName];\n\
  \nNSError *error;\n  NSArray *items = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:&error];\n\nfor (NSManagedObject *managedObject in items) {\n    [self.managedObjectContext\
  \ deleteObject:managedObject];\n  }\n\nif (![self.managedObjectContext save:&error])\
  \ {\n    NSLog(@\"Error deleting %@ - error:%@\", entityName, error);\n  }\n}\n\
  ```\n\n**列表 2-14** Swift `deleteAllObjects`函数\n\n```\nfunc deleteAllObjects(entityName:\
  \ String) {\n  let fetchRequest = NSFetchRequest(entityName: entityName)\n\nlet\
  \ objects = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:\
  \ nil)\n  for object in objects as [NSManagedObject] {\n    self.managedObjectContext?.deleteObject(object)\n\
  \  }\n\nvar error: NSError? = nil\n  if !self.managedObjectContext!.save(&error)\
  \ {\n    println(\"Error deleting \\(entityName) - error:\\(error)\")\n  }\n}\n\
  ```\n\n编辑`initStore`方法，在运行前清除所有图书和分类，在 Objective-C 方法的开头添加以下两行：\n\n```\n- (void)initStore\
