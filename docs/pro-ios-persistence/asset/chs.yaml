  \ iv.bytes, value.bytes, UInt(value.length), outputData!.mutableBytes, UInt(outputData!.length),\
  \ &outputSize)`  \n\n`// 成功则设置长度并返回数据`  \n`        // 失败则返回 nil`  \n`        if\
  \ UInt32(status) == UInt32(kCCSuccess) {`  \n`            outputData!.length = Int(outputSize)`\
  \  \n`            return outputData`  \n`        }`  \n`        else {`  \n`   \
  \         return nil`  \n`        }`  \n`    }`  \n\n`func sha1(data: NSData) ->\
  \ NSData {`  \n`        // 获取 SHA1 哈希值到数组中`  \n`        var digest = UInt8, repeatedValue:\
  \ 0)`  \n`        CC_SHA1(data.bytes, CC_LONG(data.length), &digest)`  \n\n`// 用\
  \ SHA1 哈希值创建格式化字符串`  \n`        let sha1 = NSMutableString(capacity: Int(CC_SHA1_DIGEST_LENGTH))`\
  \  \n`        for byte in digest {`  \n`            sha1.appendFormat(\"%02x\",\
  \ byte)`  \n`        }`  \n\n`return sha1.dataUsingEncoding(NSUTF8StringEncoding,\
  \ allowLossyConversion: false)!`  \n`    }`  \n\n`func keyForPassword(password:\
  \ String, salt: NSData) -> NSData {`  \n`        // 将盐值附加到密码后面`  \n`        let\
  \ passwordAndSalt = password.dataUsingEncoding(NSUTF8StringEncoding, allowLossyConversion:\
  \ false)?.mutableCopy() as? NSMutableData`  \n`        passwordAndSalt?.appendData(salt)`\
  \  \n\n`// 计算哈希值`  \n`        let hash = self.sha1(passwordAndSalt!)`  \n\n`// 通过哈希后的密码和盐值创建密钥，`\
  \  \n`        // 将其调整为 AES128 的适当大小（必要时用 0 填充）`  \n`        let range = NSMakeRange(0,\
  \ min(hash.length, kCCBlockSizeAES128));`  \n`        let key = NSMutableData(length:\
  \ kCCBlockSizeAES128)`  \n`        key.replaceBytesInRange(range, withBytes: hash.bytes)`\
  \  \n`        return key`  \n`    }`  \n\n`func randomDataOfLength(length: UInt)\
  \ -> NSData {`  \n`        let data = NSMutableData(length: Int(length))`  \n` \
  \       var dataPointer = UnsafeMutablePointer<UInt8>(data.mutableBytes)`  \n` \
  \       SecRandomCopyBytes(kSecRandomDefault, length, dataPointer);`  \n`      \
  \  return data`  \n`    }`  \n\n`func password() -> NSString? {`  \n`        let\
  \ appDelegate = UIApplication.sharedApplication().delegate as AppDelegate`  \n`\
  \        return appDelegate.password`  \n`    }`  \n`}`  \n\n虽然你已经找到了涵盖加密细节的代码，但也能看到你期望的\
  \ `NSValueTransformer` 方法：`transformedValue:` 接收一个待加密的字符串，并返回我们之前讨论过的数据结构——即盐值、初始向量（IV）和加密后的字符串。而\
  \ `reverseTransformedValue:` 方法则会接收相同的数据结构，从中解析出盐值、初始向量和加密字符串，并返回解密后的字符串。\n\n打开\
  \ Core Data 模型文件 `SecureNote.xcdatamodeld`，将 `Note` 实体的 `title` 和 `body` 属性都设置为使用这个转换器。具体操作是：选中该属性，打开数据模型检查器（Data\
  \ Model Inspector），在属性类型下拉框下方的名称字段中，输入转换器的类名 `EncryptionTransformer`，如图 7-4 所示。\n\
  \n![9781430260288_Fig07-04.jpg](img/9781430260288_Fig07-04.jpg)\n\n图 7-4. 将 `title`\
  \ 属性设置为使用 `EncryptionTransformer`\n\n## 设置详情视图以编辑笔记\n\n现有的 SecureNote 详情视图显示的是所选实体的时间戳。但我们希望展示所选笔记的标题和正文，并将其放在可编辑的字段中。当用户点击返回按钮时，我们会将字段中的数据保存到\
  \ `Note` 实体中，然后保存托管对象上下文。\n\n在 `DetailViewController.h` 文件中，将 `detailItem` 属性改为\
