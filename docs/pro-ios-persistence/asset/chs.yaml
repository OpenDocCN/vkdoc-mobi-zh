  \n***代码清单 7-10***. 在 `Persistence.h` 中声明添加 Tap 对象的方法\n\n```\n#import <UIKit/UIKit.h>\n\
  ...\n- (void)addTap:(CGPoint)point;\n```\n\n在 `Persistence.m` 或 `Persistence.swift`\
  \ 中，添加 `addTap:` 方法的定义。该方法在托管对象上下文中创建一个 `Tap` 实例，将其 `x` 和 `y` 值设置为指定点中的对应值，使用辅助函数将\
  \ `color` 设置为随机颜色，然后保存托管对象上下文。代码清单 7-11 展示了该方法的 Objective-C 版本以及随机颜色生成辅助函数，代码清单\
  \ 7-12 展示了 Swift 版本。\n\n***代码清单 7-11***. 在 `Persistence.m` 中添加 `Tap` 对象\n\n```\n\
  #import \"Tap.h\"\n...\n- (void)addTap:(CGPoint)point {\n    Tap *tap = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"Tap\" inManagedObjectContext:self.managedObjectContext];\n\
  \    tap.x = point.x;\n    tap.y = point.y;\n    tap.color = [self randomColor];\n\
  \    [self saveContext];\n}\n\n- (UIColor *)randomColor {\n    float red = (arc4random()\
  \ % 256) / 255.0f;\n    float green = (arc4random() % 256) / 255.0f;\n    float\
  \ blue = (arc4random() % 256) / 255.0f;\n    return [UIColor colorWithRed:red green:green\
  \ blue:blue alpha:1.0];\n}\n```\n\n***代码清单 7-12***. 在 `Persistence.swift` 中添加 Tap\
  \ 对象\n\n```\nfunc addTap(point: CGPoint) {\n    var tap = NSEntityDescription.insertNewObjectForEntityForName(\"\
  Tap\", inManagedObjectContext: self.managedObjectContext!) as? Tap\n    tap?.x =\
  \ Float(point.x)\n    tap?.y = Float(point.y)\n    tap?.color = self.randomColor()\n\
  \    self.saveContext()\n}\n\nfunc randomColor() -> UIColor {\n    let red = CGFloat(arc4random()\
  \ % UInt32(256)) / 255.0\n    let green = CGFloat(arc4random() % UInt32(256)) /\
  \ 255.0\n    let blue = CGFloat(arc4random() % UInt32(256)) / 255.0\n    return\
  \ UIColor(red: red, green: green, blue: blue, alpha: 1.0)\n}\n```\n\n现在，向视图控制器添加一个点击手势识别器，当点击视图时，最终会调用\
  \ `addTap:` 方法。代码清单 7-13 展示了更新后的 `ViewController.m` 文件，代码清单 7-14 展示了更新后的 `ViewController.swift`\
  \ 文件。\n\n***代码清单 7-13***. 带点击手势识别器的 `ViewController.m`\n\n```\n#import \"ViewController.h\"\
  \n#import \"AppDelegate.h\"\n#import \"Persistence.h\"\n\n@implementation ViewController\n\
  \n- (void)viewDidLoad {\n    [super viewDidLoad];\n    UITapGestureRecognizer *tapGestureRecognizer\
  \ = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(viewWasTapped:)];\n\
  \    [self.view addGestureRecognizer:tapGestureRecognizer];\n}\n\n- (void)viewWasTapped:(UIGestureRecognizer\
  \ *)sender {\n    if (sender.state == UIGestureRecognizerStateEnded) {\n       \
