  \n```\n[self.managedObjectContext.undoManager redo]; // Objective-C\nmanagedObjectContext.undoManager?.redo()\
  \      // Swift\n```\n\n## 实验：撤销分组\n\n在本节中，我们修改数据插入方法，将每本新书籍放入自己的撤销分组中。这样做的影响当然是：每当调用\
  \ `undo` 方法时，每次调用仅会撤销一次插入操作。清单 4-19（Objective-C）和清单 4-20（Swift）展示了更新后的代码。\n\n***清单\
  \ 4-19***. 管理我们自己的撤销分组（Objective-C）\n\n```\n- (void)insertSomeData {\n  NSFetchRequest\
  \ *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"BookCategory\"];\n\
  \  NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n\n  BookCategory *category = [categories lastObject];\n\n  // Tell\
  \ the undo manager that from now on, we manage grouping\n  [self.managedObjectContext.undoManager\
  \ setGroupsByEvent:NO];\n\n  for(int i=5; i<10; i++) {\n    // Start a new group\n\
  \    [self.managedObjectContext.undoManager beginUndoGrouping];\n\n    Book *book\
  \ = [NSEntityDescription insertNewObjectForEntityForName:@\"Book\" inManagedObjectContext:self.managedObjectContext];\n\
  \    book.title = [NSString stringWithFormat:@\"The %dth book\", i];\n    book.price\
  \ = i;\n    [category addBooksObject:book];\n\n    // End the current group\n  \
  \  [self.managedObjectContext.undoManager endUndoGrouping];\n  }\n\n  [self.managedObjectContext.undoManager\
  \ undo];\n  [self saveContext];\n}\n```\n\n***清单 4-20***. 管理我们自己的撤销分组（Swift）\n\n\
  ```\nfunc insertSomeData() {\n    let category = self.managedObjectContext?.executeFetchRequest(NSFetchRequest(entityName:\
  \ \"BookCategory\"), error: nil)?.last as BookCategory?\n\n    if let managedObjectContext\
  \ = self.managedObjectContext {\n        // Tell the undo manager that from now\
  \ on, we manage grouping\n        managedObjectContext.undoManager?.groupsByEvent\
  \ = false\n\n        if let category = category {\n            for i in 5..<10 {\n\
  \                // Start a new group\n                managedObjectContext.undoManager?.beginUndoGrouping()\n\
  \n                var book = NSEntityDescription.insertNewObjectForEntityForName(\"\
  Book\", inManagedObjectContext: managedObjectContext) as Book\n                book.title\
  \ = \"The \\(i)th book\"\n                book.price = Float(i)\n\n            \
  \    var booksRelation = category.valueForKeyPath(\"books\") as NSMutableSet\n \
  \               booksRelation.addObject(book)\n\n                // End the current\
  \ group\n                managedObjectContext.undoManager?.endUndoGrouping()\n \
  \           }\n\n            managedObjectContext.undoManager?.undo()\n        \
  \    saveContext()\n        }\n    }\n}\n```\n\n启动应用，由于调用了 `undo`，第九本书会缺失。在该方法中添加第二次\
  \ `undo` 调用，并注意第八本和第九本书都会缺失。\n\n## 处理错误\n\n当你要求 Xcode 为你生成一个 Core Data 应用时，它会为与\
  \ Core Data 持久化存储进行交互的每个关键方面创建样板代码。这段代码足以满足设置持久化存储协调器、托管对象上下文和托管对象模型的需求。实际上，如果你回到一个非\
  \ Core Data 项目并添加 Core Data 支持，最好直接使用与 Xcode 生成代码相同的代码来管理 Core Data 交互。这段代码已经达到生产环境的标准。\n\
  \n也就是说，它仅在以下一个方面存在不足：错误处理。\n\nXcode 生成的代码通过一条注释提醒你这一缺点，注释内容如下：\n\n```\n// Replace\
  \ this implementation with code to handle the error appropriately.\n// abort() causes\
  \ the application to generate a crash log and terminate. You should not use this\
  \ function in a shipping application, although it may be useful during development.\n\
  ```\n\nXcode 生成的实现会记录错误并中止应用，这显然是一种不友好的处理方式。当这种情况发生时，用户只会看到应用突然消失，而完全不知道原因。如果这种情况出现在上线的应用中，你将获得差评和低销量。\n\
  \n不过，幸运的是，你不必掉入这种记录日志并崩溃的陷阱。在本节中，我们将探讨在 Core Data 中处理错误的策略。没有任何一种策略是绝对最好的，但本节内容应能为你的特定应用和用户群体带来启发，并帮助你设计出合理的错误处理策略。\n\
  \nCore Data 中的错误可分为两大类。\n\n* 正常 Core Data 操作中的错误\n* 验证错误\n\n接下来的章节将讨论处理这两类错误的策略。\n\
  \n### 处理 Core Data 操作错误\n\n本书中的所有示例都使用默认的 Xcode 生成错误处理代码来响应 Core Data 错误，即尽职尽责地将错误信息输出到\
  \ Xcode 的控制台并中止应用。这种方法有两个优点。\n\n* 有助于在开发和调试过程中诊断问题。\n* 易于实现。\n\n然而，这些优势仅对开发者本人有帮助，对应用的用户没有任何好处。在公开发布使用\
  \ Core Data 的应用之前，你应该设计并实现一个更好的错误响应策略。好消息是，该策略不必规模庞大或难以实现，因为你的响应方案有限。尽管应用各不相同，但在大多数情况下，你无法从\
  \ Core Data 错误中恢复，因此应显示一个提醒，并指示用户关闭应用。这样做可以向用户解释发生了什么，并让他们控制何时终止应用。虽然这不是很大的控制权，但嘿——总比让应用直接消失要好。\n\
  \n几乎所有 Core Data 操作错误都应在开发过程中被捕获，因此对应用进行仔细测试应能防止这些情况发生。\n\n目前，BookStore 应用具有用户界面，尽管是空白的。我们当前在应用启动时（用户界面显示之前）加载\
  \ Core Data 栈。然而，如果我们在初始化 Core Data 之前等待用户界面加载完毕，那么显示错误消息将会更容易。让我们修改应用以实现这一点。\n\n\
