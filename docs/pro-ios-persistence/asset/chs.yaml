  \                result = result?.stringByAppendingFormat(\"Social Network is named\
  \ '%@'\\n\", socialNetwork.name)\n\n// 5) 检查它是否为故障状态\n                result = result?.stringByAppendingFormat(\"\
  Social Network %@ a fault\\n\", socialNetwork.fault ? \"is\" : \"is not\")\n\n//\
  \ 6) 将其恢复为故障状态\n                context.refreshObject(socialNetwork, mergeChanges:\
  \ false)\n                result = result?.stringByAppendingFormat(\"Turning Social\
  \ Network into a fault\\n\")\n\n// 7) 检查它是否为故障状态\n                result = result?.stringByAppendingFormat(\"\
  Social Network %@ a fault\\n\", socialNetwork.fault ? \"is\" : \"is not\")\n   \
  \         }\n            else {\n                result = \"Couldn't find social\
  \ networks for selfie\"\n            }\n        }\n        else {\n            result\
  \ = \"Failed to fetch first selfie\"\n        }\n\nreturn result!\n    }\n}\n```\n\
  \n这段代码正如承诺的那样，遵循了七个步骤。在第 4 步中访问社交网络的名称会触发故障，因此第 5 步中社交网络不再是故障状态。当然，第 6 步将社交网络恢复为故障状态。\n\
