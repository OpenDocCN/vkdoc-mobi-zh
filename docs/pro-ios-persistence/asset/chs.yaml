  \ 来处理它。\n\n## 检索托管对象\n\n我们通过代码示例简要介绍了如何从持久化存储中检索对象。现在让我们更仔细地了解如何提取信息。为此，创建一个名为`showExampleData`的新方法。编辑`application:didFinishLaunchingWithOptions:`，在调用`initStore`之后立即添加对此新方法的调用，如列表\
  \ 2-15（Objective-C）和列表 2-16（Swift）所示。\n\n**列表 2-15** 调用`showExampleData`（Objective-C）\n\
  \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n  [self initStore];\n  [self showExampleData];\n  return YES;\n\
  }\n```\n\n**列表 2-16** 调用`showExampleData`（Swift）\n\n```\nfunc application(application:\
  \ UIApplication!, didFinishLaunchingWithOptions launchOptions: NSDictionary!) ->\
  \ Bool {\n  initStore()\n  showExampleData()\n  return true\n}\n```\n\n现在添加列表 2-17（Objective-C）和列表\
  \ 2-18（Swift）中所示的`showExampleData`方法。此方法使用`NSLog`或`println`将持久化存储中的所有图书记录到 Xcode\
  \ 控制台。\n\n**列表 2-17** Objective-C 中的`showExampleData`方法\n\n```\n- (void)showExampleData\
  \ {\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Book\"];\n\nNSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  for (Book *book in books) {\n    NSLog(@\"Title: %@, price: %.2f\"\
  , book.title, book.price);\n  }\n}\n```\n\n**列表 2-18** Swift 中的`showExampleData`函数\n\
  \n```\nfunc showExampleData() {\n  let fetchRequest = NSFetchRequest(entityName:\
  \ \"Book\")\n\nlet books = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
  \ error: nil)\n  for book in books as [Book] {\n    println(String(format: \"Title:\
  \ \\(book.title), price: %.2f\", book.price))\n  }\n}\n```\n\n该方法为`Book`实体创建一个新的获取请求并执行它。由于获取请求没有选择条件，它只是返回在持久化存储中找到的所有与给定实体（即`Book`）匹配的对象。如果运行应用程序，您将在控制台中得到以下输出：\n\
  \n```\nBookStore[84975:c07] Title: The first book, price: 10.00\nBookStore[84975:c07]\
  \ Title: The third book, price: 10.00\nBookStore[84975:c07] Title: The second book,\
  \ price: 15.00\n```\n\n您可能会注意到，图书可能有序或无序；例如，在上面的日志中，标题为“The third book”的图书出现在标题为“The\
  \ second book”的图书之前。请记住，`books`关系是无序的，因此顺序是不确定的。\n\n## 谓词\n\n在上面的获取中，我们从`Book`实体中获取了所有图书，没有任何方法可以缩小\
  \ Core Data 返回的范围。然而，Core Data 确实提供了仅返回数据子集的机制。Core Data 使用 Foundation 框架中的`NSPredicate`类来指定在执行获取请求时如何选择应属于结果集的对象。谓词可以通过两种方式构建：您可以手动构建对象及其图形，也可以使用`NSPredicate`实现的查询语言。您会发现，大多数时候您会更喜欢后一种方法的便利性和可读性。\n\
  \n在本节中，我们针对每个示例研究了构建谓词的两种方式，以帮助您在查询语言和`NSPredicate`对象图形之间建立联系。理解这两种方式将帮助您确定首选方法。您还可以根据应用程序和数据场景混合搭配这些方法。\n\
  \n谓词查询语言从与 SQL“WHERE”子句相似的字符串表示形式构建一个`NSPredicate`对象图。从该语言构建谓词的方法是类方法`predicateWithFormat:(NSString\
  \ *)`。例如，如果您想要获取表示图书“The first book”的托管对象，您可以调用`[NSPredicate predicateWithFormat:@\"\
  title = 'The first book'\"]`来构建谓词。\n\n要测试这一点，请修改`showExampleData`方法，如列表 2-19（Objective-C）和列表\
  \ 2-20（Swift）所示。\n\n**列表 2-19** 带有谓词的 Objective-C `showExampleData`方法\n\n```\n-\
  \ (void)showExampleData {\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Book\"];\n  fetchRequest.predicate = [NSPredicate predicateWithFormat:@\"title =\
  \ 'The first book'\"];\n\nNSArray *books = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  for (Book *book in books) {\n    NSLog(@\"Title: %@, price: %.2f\"\
  , book.title, book.price);\n  }\n}\n```\n\n\n\n### `showExampleData` 函数（含谓词）\n\n\
  以下为 Swift 中的 `showExampleData` 函数，它使用了 `NSPredicate`：\n\n```swift\nfunc showExampleData()\
  \ {\n    let fetchRequest = NSFetchRequest(entityName: \"Book\")\n    fetchRequest.predicate\
  \ = NSPredicate(format: \"title='The first book'\")\n\n    let books = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
  \ error: nil)\n    for book in books as! [Book] {\n        println(String(format:\
  \ \"Title: \\(book.title), price: %.2f\", book.price))\n    }\n}\n```\n\n运行此代码后，输出结果仅找到一本书，与预期一致：\n\
  \n```\nBookStore[85253:c07] Title: The first book, price: 10.00\n```\n\n在最简单的形式中，谓词会对对象执行测试。若测试通过，则该对象属于结果集；若测试失败，则对象不会包含在结果集中。上述示例中的\
  \ `title = 'The first book'` 是一个简单谓词。键路径 `title` 和常量字符串 `'The first book'` 被称为表达式，运算符\
  \ `'='` 则被称为比较器。\n\n`NSPredicate` 对象由多个 `NSExpression` 实例组合而成。上述示例也可以像以下清单（Listing\
  \ 2-21 为 Objective-C 版本、Listing 2-22 为 Swift 版本）那样编写。\n\n### `NSPredicate` 对象图的\
  \ Objective-C 谓词实现\n\n```objc\n- (void)showExampleData {\n    NSFetchRequest *fetchRequest\
  \ = [NSFetchRequest fetchRequestWithEntityName:@\"Book\"];\n    \n    NSExpression\
  \ *exprTitle = [NSExpression expressionForKeyPath:@\"title\"];\n    NSExpression\
  \ *exprValue = [NSExpression expressionForConstantValue:@\"The first book\"];\n\
  \    NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:exprTitle\n\
  \                                                                rightExpression:exprValue\n\
  \                                                                       modifier:NSDirectPredicateModifier\n\
  \                                                                           type:NSEqualToPredicateOperatorType\n\
  \                                                                        options:0];\n\
  \    fetchRequest.predicate = predicate;\n    \n    NSArray *books = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n    for (Book *book in books) {\n\
  \        NSLog(@\"Title: %@, price: %.2f\", book.title, book.price);\n    }\n}\n\
  ```\n\n### `NSPredicate` 对象图的 Swift 谓词实现\n\n```swift\nfunc showExampleData() {\n\
  \    let fetchRequest = NSFetchRequest(entityName: \"Book\")\n    \n    let exprTitle\
  \ = NSExpression(forKeyPath: \"title\")\n    let exprValue = NSExpression(forConstantValue:\
  \ \"The first book\")\n    let predicate = NSComparisonPredicate(leftExpression:\
  \ exprTitle,\n                                          rightExpression: exprValue,\n\
  \                                          modifier: .DirectPredicateModifier,\n\
  \                                          type: .EqualToPredicateOperatorType,\n\
  \                                          options: nil)\n    fetchRequest.predicate\
  \ = predicate\n    \n    let books = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
  \ error: nil)\n    for book in books as! [Book] {\n        println(String(format:\
  \ \"Title: \\(book.title), price: %.2f\", book.price))\n    }\n}\n```\n\n再次运行应用程序，结果与之前相同，符合预期。\n\
  \n您已经看到，谓词有两种编写方式。显然，第一种方式更简洁、可读性更强。然而，在某些高级场景下，只能采用第二种方式。例如，当应用程序允许用户构建查询，并将用户的选择和筛选条件组合成谓词时，就可能需要第二种实现方式。\n\
  \n在 第 3 章 中，我们将更深入地研究谓词，并详细解释谓词构建的方方面面。\n\n---\n\n## 获取的属性（Fetched Properties）\n\
  \n获取的属性是一种便捷方式，可以基于预定义的谓词检索数据的子集。例如，假设我们想为 `BookCategory` 添加一个属性，用于获取“特价书籍”（即价格低于\
  \ 12 美元的所有书籍）。我们可以直接在模型中定义什么是特价书籍。打开 `BookStore.xcdatamodeld` 并选择 `BookCategory`\
  \ 实体。点击“获取属性”（Fetched Properties）部分下方的加号（`+`），创建一个新的获取属性并命名为 `bargainBooks`。打开数据模型检查器，在目标（Destination）下拉菜单中选择\
  \ `Book`，然后在谓词输入框中输入：\n\n\n\n`SELF.price < 12 AND (SELF.category=$FETCH_SOURCE)`\n\
  \n图 2-6 展示了 `bargainBooks` 这个获取属性。\n\n![9781430260288_Fig02-06.jpg](img/9781430260288_Fig02-06.jpg)\n\
  \n图 2-6. `bargainBooks` 获取属性\n\n`SELF` 关键字指向目标对象（即 Book）。`$FETCHED_SOURCE` 关键字指的是\
  \ `BookCategory` 对象。因此，上述代码可以理解为：“如果本书的价格低于 12 美元，且其分类为调用此属性的分类，则这本书属于该列表。”\n\n\
  然后，在代码中重写 `showExampleData` 方法，如代码清单 2-23（Objective-C）或代码清单 2-24（Swift）所示，以演示如何使用获取属性。\n\
  \n***代码清单 2-23***. 在 Objective-C 中使用获取属性\n\n```\n- (void)showExampleData {\n  NSFetchRequest\
  \ *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"BookCategory\"];\n\
    NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  for (BookCategory *category in categories) {\n    // 检索当前分类的特价图书\n\
      NSArray *bargainBooks = [category valueForKey:@\"bargainBooks\"];\n\n// 现在简单地显示它们\n\
      NSLog(@\"Bargains for category: %@\", category.name);\n    for (Book *book in\
  \ bargainBooks) {\n      NSLog(@\"Title: %@, price: %.2f\", book.title, book.price);\n\
      }\n  }\n}\n```\n\n***代码清单 2-24***. 在 Swift 中使用获取属性\n\n```\nfunc showExampleData()\
  \ {\n  let fetchRequest = NSFetchRequest(entityName: \"BookCategory\")\n  let categories\
  \ = self.managedObjectContext?.executeFetchRequest(fetchRequest, error: nil)\n  for\
  \ category in categories as [BookCategory] {\n    println(\"Bargains for category:\
  \ \\(category.name)\")\n    let bargainBooks = category.valueForKey(\"bargainBooks\"\
  ) as [Book!]\n    for book in bargainBooks {\n      println(String(format: \"Title:\
  \ \\(book.title), price: %.2f\",  book.price))\n    }\n  }\n}\n```\n\n我们首先获取分类。然后，对于每个分类，我们获取特价图书并显示它们的标题。\n\
  \n然而，尽管在模型中定义获取属性很方便，但你会注意到谓词编辑器略显不足。此外，获取属性不是动态的；例如，如果之后添加了符合特价图书条件的书籍，除非重置上下文，否则这些书籍不会出现在\
  \ `bargainBooks` 获取属性中。你可能会发现，在应用程序中实际上从未使用过获取属性。\n\n## 通知\n\n当试图保持用户界面与其所代表的数据同步时，你通常会发现在数据发生变化时收到通知非常有用。Core\
  \ Data 提供了用于处理数据变更通知的机制。\n\n### 创建时的通知\n\n有时，每当特定类型的托管对象实例被创建时，你都需要得到通知。例如，你可能需要创建存储中不存在的派生数据（也许是缓存文件，或者仅仅出于审计目的）。假设我们希望在每次创建新书时记录一条日志。我们可以使用\
  \ Core Data 的通知，每当创建新对象时，它会调用我们自定义 Core Data 类的 `awakeFromInsert` 方法。在你的实现中，你应该先调用\
  \ `super` 的实现，然后再执行你自己的操作。打开 `Book.m` 或 `Book.swift`，并重写 `awakeFromInsert` 方法，如代码清单\
  \ 2-25（Objective-C）和代码清单 2-26（Swift）所示。\n\n***代码清单 2-25***. 通过 `awakeFromInsert`\
  \ 方法实现 Core Data 通知（Objective-C）\n\n```\n- (void)awakeFromInsert {\n  [super awakeFromInsert];\n\
    NSLog(@\"New book created\");\n}\n```\n\n***代码清单 2-26***. 通过 `awakeFromInsert`\
  \ 函数实现 Core Data 通知（Swift）\n\n```\noverride func awakeFromInsert() {\n  super.awakeFromInsert()\n\
    println(\"New book created\")\n}\n```\n\n由于我们的应用程序每次启动时都会重新加载持久化存储，因此每次运行时都会收到三条新书创建通知。\n\
  \n```\nBookStore[85678:c07] New book created\nBookStore[85678:c07] New book created\n\
  BookStore[85678:c07] New book created\n```\n\n### 提取时的通知\n\n类似地，在某些情况下，当从持久化存储中检索到对象时，你希望得到通知。例如，如果你的对象包含用于绘制图像的向量，那么在提取该对象时，你可能希望渲染一个缩略图。出于存储原因，你可能会决定保留实际的缩略图是多余的，因此必须在提取对象时计算它。要接收此通知，你需要重写\
  \ `awakeFromFetch` 方法。与 `awakeFromInsert` 一样，你应该首先调用 `super` 的实现。仍然在 `Book.m` 或\
  \ `Book.swift` 中，重写 `awakeFromFetch` 方法，如代码清单 2-27（Objective-C）和代码清单 2-28（Swift）所示。\n\
  \n***代码清单 2-27***. 通过 `awakeFromFetch` 方法实现 Core Data 通知（Objective-C）\n\n```\n-\
  \ (void)awakeFromFetch {\n  [super awakeFromFetch];\n  NSLog(@\"Book fetched: %@\"\
  , self.title);\n}\n```\n\n***代码清单 2-28***. 通过 `awakeFromFetch` 方法实现 Core Data 通知（Swift）\n\
  \n```\noverride func awakeFromFetch() {\n  super.awakeFromFetch()\n  println(\"\
  Book fetched: \\(self.title)\")\n}\n```\n\n当运行它时，你将得到以下输出：\n\n```\nBookStore[85678:c07]\
  \ Book fetched: The first book\nBookStore[85678:c07] Book fetched: The second book\n\
  BookStore[85678:c07] Book fetched: The third book\nBookStore[85678:c07] New book\
  \ created\nBookStore[85678:c07] New book created\nBookStore[85678:c07] New book\
  \ created\n```\n\n由于 `deleteAllObjects` 方法中的清理操作，你首先看到的是提取操作。首先读取并删除书籍，然后添加三本新书。\n\
  \n不过，你可能在应用程序的输出中注意到一些奇怪的地方。尽管你在 `showExampleData` 方法中提取了标题为“The first book”的书籍，正如日志所示：\n\
  \n```\nBookStore[85678:c07] Title: The first book, price: 10.00\n```\n\n你并没有看到另一条“Book\
  \ fetched”的日志消息，即使 `showExampleData` 显然执行了一个提取请求。这意味着，`awakeFromFetch` 并不一定在每次执行返回该对象的提取请求时都被调用——它仅在提取期间从持久化存储重新初始化对象时被调用。如果该对象已经由持久化存储初始化过，并且存在于你的托管对象上下文中，那么执行提取请求不会调用\
  \ `awakeFromFetch`。\n\n尽管这可能听起来令人困惑，但你可以通过更多地关注方法名称中的“awake”部分，而不是“fetch”部分来记住这种行为。当对象被加载到内存中时，它就会“苏醒”，因此当托管对象因提取而被加载到内存中时，就会调用此方法。\n\
  \n在第 9 章中，我们将讨论一个名为“故障”的概念。当 `awakeFromFetch` 方法被调用时，故障机制就会发挥作用，因此请务必阅读该章节以获取更多信息。\n\
  \n### 变更时的通知\n\n\n\n## 数据变更通知\n\n到目前为止，最有用的通知莫过于数据变更通知。如果你在用户界面中显示一本书，而其标题发生了变化，你可能希望用户界面能反映出这一变化。由于\
  \ `NSManagedObject` 符合 KVC 规范，因此可以应用键值观察（KVO）的所有常规原则，并在数据修改时触发通知。KVO 模型非常简单且去中心化，仅涉及两个对象：观察者和被观察者。观察者必须向被观察对象注册，而被观察对象则负责在其数据发生变化时触发通知。`NSManagedObject`\
  \ 的默认实现会自动处理通知的触发。\n\n## 注册观察者\n\n为了接收变更通知，你必须使用 `addObserver:forKeyPath:options:context:`\
  \ 方法向被观察对象注册观察者。该注册仅对给定的键路径有效，这意味着它仅适用于指定的属性或关系。其优势在于，你可以非常精细地控制哪些通知会被触发。\n\n通过选项，你可以进一步细化粒度，指定希望在通知中接收哪些信息。下面的\
  \ 表 2-4 展示了 Objective-C 选项，这些选项可以通过按位 OR 进行组合（例如，`NSKeyValueObservingOptionOld |\
  \ NSKeyValueObservingOptionNew` 用于同时指定旧值和新值）。\n\n表 2-4. Objective-C 通知选项\n\n| 选项\
  \ | 描述 |\n| --- | --- |\n| `NSKeyValueObservingOptionOld` | 变更字典将在查找键 `NSKeyValueChangeOldKey`\
  \ 下包含旧值 |\n| `NSKeyValueObservingOptionNew` | 变更字典将在查找键 `NSKeyValueChangeNewKey`\
  \ 下包含新值 |\n\n这些选项的 Swift 版本名称更简短，如 表 2-5 所示。但变更字典中的键保持不变。\n\n表 2-5. Swift 通知选项\n\
  \n| 选项 | 描述 |\n| --- | --- |\n| `Old` | 变更字典将在查找键 `NSKeyValueChangeOldKey` 下包含旧值\
  \ |\n| `New` | 变更字典将在查找键 `NSKeyValueChangeNewKey` 下包含新值 |\n\n现在，我们将应用委托注册为名为“第一本书”的书籍标题变更的观察者。打开\
  \ `AppDelegate.m` 或 `AppDelegate.swift`，编辑 `showExampleData`，回到获取第一本书的更简单版本，如 代码清单\
  \ 2-29（Objective-C）和 代码清单 2-30（Swift）所示。在方法中，注册事件通知后，我们还将书籍标题更改为“新标题”。\n\n***代码清单\
  \ 2-29***. 在 Objective-C 中注册 KVO\n\n```\n- (void)showExampleData {\n  NSFetchRequest\
  \ *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"Book\"];\n  fetchRequest.predicate\
  \ = [NSPredicate predicateWithFormat:@\"title = 'The first book'\"];\n\nNSArray\
  \ *books = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];\n\
    for (Book *book in books) {\n    NSLog(@\"Title: %@, price: %.2f\", book.title,\
  \ book.price);\n\n// 为当前对象注册 KVO\n    [book addObserver:self\n           forKeyPath:@\"\
  title\"\n              options:NSKeyValueObservingOptionOld | NSKeyValueObservingOptionNew\n\
                context:nil];\n    book.title = @\"The new title\";\n  }\n}\n```\n\
  \n***代码清单 2-30***. 在 Swift 中注册 KVO\n\n```\nfunc showExampleData() {\n  let fetchRequest\
  \ = NSFetchRequest(entityName: \"Book\")\n  fetchRequest.predicate = NSPredicate(format:\
  \ \"title='The first book'\")\n\nlet books = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
  \ error: nil)\n  for book in books as [Book] {\n    println(String(format: \"Title:\
  \ \\(book.title), price: %.2f\",  book.price))\n\n// 为当前对象注册 KVO\n    book.addObserver(self,\
  \ forKeyPath: \"title\", options: .Old | .New, context: nil)\n    book.title = \"\
  The new title\"\n  }\n}\n```\n\n不过，目前还不要构建并运行应用程序，因为它会崩溃，因为你已注册接收通知，但尚未编写代码来处理收到的通知。请继续阅读下一节，了解如何接收你已注册的通知。\n\
  \n## 接收通知\n\n注册接收变更通知是一回事，实际接收通知则是另一回事。要接收变更通知，你需要在观察者类中重写 `observeValueForKeyPath:ofObject:change:context:`\
  \ 方法。仍然在 `AppDelegate.m` 或 `AppDelegate.swift` 中，添加 代码清单 2-31（Objective-C）和 代码清单\
  \ 2-32（Swift）所示的方法。\n\n***代码清单 2-31***. 接收变更通知（Objective-C）\n\n```\n- (void)observeValueForKeyPath:(NSString\
  \ *)keyPath\n                      ofObject:(id)object\n                        change:(NSDictionary\
  \ *)change\n                       context:(void *)context {\n  NSLog(@\"Changed\
  \ value for %@: %@ -> %@\", keyPath,\n        [change objectForKey:NSKeyValueChangeOldKey],\n\
          [change objectForKey:NSKeyValueChangeNewKey]);\n}\n```\n\n***代码清单 2-32***.\
  \ 接收变更通知（Swift）\n\n```\noverride func observeValueForKeyPath(keyPath: String,\n\
    ofObject object: AnyObject,\n  change: [NSObject : AnyObject],\n  context: UnsafeMutablePointer<()>)\
  \ {\n  println(\"Changed value for \\(keyPath): \\(change[NSKeyValueChangeOldKey]!)\
  \ -> \\(change[NSKeyValueChangeNewKey]!)\")\n}\n```\n\n再次运行应用程序，你将得到以下输出，表明已收到标题变更通知：\n\
  \n```\nChanged value for title: The first book -> The new title\n```\n\n## 结论\n\n\
  对于依赖数据的应用程序（这涵盖了大多数应用），正确设计数据模型的重要性怎么强调都不为过。Xcode 数据建模工具为设计和定义数据模型提供了可靠的界面，在本章中，你已经学会了如何驾驭创建实体、属性和关系时可用的众多选项。请务必理解你配置数据模型所产生的影响，以便你的应用程序能够高效且正确地运行。\n\
  \n在大多数情况下，你应该避免在模型中使用那些会剥夺 Core Data 控制权、迫使你自己管理对象图一致性的选项。Core Data 在管理对象图一致性方面几乎总能比你做得更好。当你必须接管控制权时，请务必充分调试你的解决方案，以防止应用程序崩溃或数据损坏。\n\
  \n虽然你可以直接使用 `NSManagedObject`，但随着构建更大的应用程序，你不可避免地会感到需要使用子类（如本章所述），以便在代码中清晰地区分对象及其属性。\n\
  \n在下一章中，我们将深入探讨如何构建用于高级查询的谓词。\n\n# 第 3 章：高级查询\n\n简单的应用程序和简单的数据模型通常可以依靠简单的查询来提供满足应用程序特定需求的数据。然而，非平凡的应用程序通常拥有更复杂的数据模型以及围绕这些数据的更精细的要求。为了满足这些应用需求并与更复杂的数据交互，你需要更高级的数据查询方法。本章讨论\
  \ Core Data 的高级查询技术，并将为你提供必要的工具，以提取数据丰富的应用程序所需的数据组合。\n\n\n\n本章讨论的大部分类并非与 Core Data\
  \ 绑定，而是适用于任何集合类。你可以使用`NSPredicate`、`NSExpression`、`NSSortDescriptor`、聚合运算符、函数等来过滤任何类型的集合，而不仅仅是\
  \ Core Data 的结果集。实际上，某些类及其方法仅适用于通用集合，不适用于 Core Data。但请记住，一旦从 Core Data 中获取了结果集，你就拥有了一个标准的`NSArray`集合，可以在\
  \ Core Data 之外随意操作。\n\n## 构建 WordList\n\n无论你是在玩 Words with Friends、Scrabble 还是其他文字游戏，了解游戏允许的单词都会助你取得更大成功。在本章中，我们将构建一个名为\
  \ WordList 的应用程序，该程序从互联网下载一个流行的单词列表，并对其运行各种查询以演示高级查询。这个应用程序并不花哨——你可以在图 3-1 中看到用户界面（UI）——它不会保证胜利甚至提高分数。不过，你可能会学到一两个新单词，以便在你最喜欢的文字游戏中使用，并给朋友留下深刻印象。\n\
  \n![9781430260288_Fig03-01.jpg](img/9781430260288_Fig03-01.jpg)\n\n图 3-1. WordList\
  \ 应用程序\n\n## 创建应用程序\n\n在 Xcode 中，使用 Single View Application 模板创建一个新项目。将产品名称设置为 WordList，选择你要使用的语言，取消勾选\
  \ Use Core Data（我们将自行添加），然后点击 Next 让 Xcode 开始创建项目。\n\n接下来，按照前面概述的步骤将 Core Data 添加到\
  \ WordList 应用程序中。\n\n*   在任何需要访问 Core Data 类的地方添加`@import CoreData`（Objective-C）或`import\
  \ CoreData`（Swift）指令。\n*   添加 WordList 数据模型`WordList.xcdatamodeld`。\n*   添加`Persistence`类，该类封装了\
  \ WordList 的 Core Data 交互。\n\nObjective-C 的`Persistence`类头文件如代码清单 3-1 所示，它声明了用于实现\
  \ Core Data 栈的属性和方法。这看起来很熟悉——你在第 1 章的`Persistence`类中首次见过它。\n\n***代码清单 3-1***. `Persistence.h`\n\
  \n```\n@import CoreData;\n\n@interface Persistence : NSObject\n\n@property (readonly,\
  \ strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n@property (readonly,\
  \ strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property (readonly,\
  \ strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\
  \n代码清单 3-2 展示了 Objective-C 实现文件`Persistence.m`。\n\n***代码清单 3-2***. `Persistence.m`\n\
  \n```\n#import \"Persistence.h\"\n\n@implementation Persistence\n\n- (id)init\n\
  {\n  self = [super init];\n  if (self != nil) {\n    // Initialize the managed object\
  \ model\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"WordList\"\
  \ withExtension:@\"momd\"];\n    _managedObjectModel = [[NSManagedObjectModel alloc]\
  \ initWithContentsOfURL:modelURL];\n\n    // Initialize the persistent store coordinator\n\
  \    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  WordList.sqlite\"];\n\n    NSError *error = nil;\n    _persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:self.managedObjectModel];\n\
  \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
  \                                                  configuration:nil\n         \
  \                                                   URL:storeURL\n             \
  \                                           options:nil\n                      \
  \                                    error:&error]) {\n      NSLog(@\"Unresolved\
  \ error %@, %@\", error, [error userInfo]);\n      abort();\n    }\n\n    // Initialize\
  \ the managed object context\n    _managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n    [_managedObjectContext setPersistentStoreCoordinator:self.persistentStoreCoordinator];\n\
  \  }\n  return self;\n}\n\n#pragma mark - Helper Methods\n\n- (void)saveContext\n\
  {\n  NSError *error = nil;\n  if ([self.managedObjectContext hasChanges] && ![self.managedObjectContext\
  \ save:&error]) {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \    abort();\n  }\n}\n\n- (NSURL *)applicationDocumentsDirectory\n{\n  return [[[NSFileManager\
  \ defaultManager] URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask]\
  \ lastObject];\n}\n\n@end\n```\n\n最后，代码清单 3-3 展示了 Swift 实现`Persistence.swift`。请注意，我们在文件底部偷偷添加了一个扩展，稍后将用于简化格式化输出。\n\
  \n***代码清单 3-3***. `Persistence.swift`\n\n```\nimport Foundation\nimport CoreData\n\
  \nclass Persistence: NSObject {\n\n  var managedObjectContext: NSManagedObjectContext\
  \ = {\n    // Initialize the managed object model\n    let modelURL = NSBundle.mainBundle().URLForResource(\"\
  WordListSwift\", withExtension: \"momd\")\n    let managedObjectModel = NSManagedObjectModel(contentsOfURL:\
  \ modelURL!)\n\n    // Initialize the persistent store coordinator\n    let storeURL\
  \ = Persistence.applicationDocumentsDirectory.URLByAppendingPathComponent(\"WordListSwift.sqlite\"\
  )\n    var error: NSError? = nil\n    let persistentStoreCoordinator = NSPersistentStoreCoordinator(managedObjectModel:\
  \ managedObjectModel!)\n    if persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: storeURL, options: nil, error: &error) == nil {\n   \
  \   abort()\n    }\n\n    // Initialize the managed object context\n    var managedObjectContext\
  \ = NSManagedObjectContext()\n    managedObjectContext.persistentStoreCoordinator\
  \ = persistentStoreCoordinator\n\n    return managedObjectContext\n  }()\n\n  func\
  \ saveContext() {\n    var error: NSError? = nil\n    let managedObjectContext =\
  \ self.managedObjectContext\n    if managedObjectContext != nil {\n      if managedObjectContext.hasChanges\
  \ && !managedObjectContext.save(&error) {\n        abort()\n      }\n    }\n  }\n\
  \n  class var applicationDocumentsDirectory: NSURL {\n    let urls = NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory,\
  \ inDomains: .UserDomainMask)\n    return urls[urls.endIndex-1] as NSURL\n  }\n\
  }\n\nextension Float {\n    func format(f: String) -> String {\n        return NSString(format:\
  \ \"%\\(f)f\", self)\n    }\n}\n```\n\n在你的应用代理`AppDelegate`中，添加一个`Persistence`属性，并在\
