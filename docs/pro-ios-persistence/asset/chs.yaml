  \n### 显示详情\n\n您可以在`MasterViewController`的`prepareForSegue:sender:`方法中找到对`fetchedResultsController`的最后一次引用，当您点击主视图表中的一行时会调用该方法。此实现从`fetchedResultsController`中提取被点击行的托管对象，并将其交给详情视图控制器进行显示，如[代码清单\
  \ 5-21]（Objective-C）和[代码清单 5-22]（Swift）所示。\n\n[**代码清单 5-21**] `prepareForSegue:sender:`\
  \ 方法（Objective-C）\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\
  \ {\n  if ([[segue identifier] isEqualToString:@\"showDetail\"]) {\n    NSIndexPath\
  \ *indexPath = [self.tableView indexPathForSelectedRow];\n    NSManagedObject *object\
  \ = [[self fetchedResultsController] objectAtIndexPath:indexPath];\n    [[segue\
  \ destinationViewController] setDetailItem:object];\n  }\n}\n```\n\n[**代码清单 5-22**]\
  \ `prepareForSegue:sender:` 方法（Swift）\n\n```\noverride func prepareForSegue(segue:\
  \ UIStoryboardSegue, sender: AnyObject?) {\n  if segue.identifier == \"showDetail\"\
  \ {\n      if let indexPath = self.tableView.indexPathForSelectedRow() {\n     \
  \     let object = self.fetchedResultsController.objectAtIndexPath(indexPath) as\
  \ NSManagedObject\n          (segue.destinationViewController as DetailViewController).detailItem\
  \ = object\n      }\n  }\n}\n```\n\n现在我们准备在生成的应用程序基础上构建 CoreDump 应用程序。\n\n### 更新\
  \ Core Data 模型\n\n要构建 CoreDump 应用程序，我们必须修改 Core Data 模型以存储我们想要的 bug 追踪器数据。CoreDump\
  \ 将存储项目列表以及每个项目的 bug 列表。对于每个项目，我们存储：\n\n*   项目名称\n*   项目 URL\n*   托管服务\n\n对于每个 bug，我们存储：\n\
  \n*   Bug 标题\n*   Bug 详情\n\n从 Core Data 模型中删除`Event`实体，并创建两个实体：`Project`和`Bug`。对于`Project`，添加以下属性：\n\
  \n*   `name`——`String`类型的属性\n*   `url`——`String`类型的属性\n*   `host`——`String`类型的属性\n\
  *   `bugs`——一个可选的对`Bug`的**对多**关系，删除规则设置为**级联**\n\n对于`Bug`实体，添加以下属性：\n\n*   `title`——`String`类型的属性\n\
  *   `details`——`String`类型的属性\n*   `project`——一个**必需**的对`Project`的**对一**关系，删除规则设置为**置空**。不要忘记将反向关系设置为`bugs`。\n\
  \n完成更新 Core Data 模型后，它应该看起来像[图 5-3]。\n\n![9781430260288_Fig05-03.jpg](img/9781430260288_Fig05-03.jpg)\n\
  \n[图 5-3] 更新后的 Core Data 模型\n\n不要忘记删除旧数据模型生成的数据库，否则尝试运行时应用程序将崩溃。\n\n### 生成模型类\n\n\
  尽管我们可以在整个 CoreDump 应用程序中使用原始的`NSManagedObject`实例，但我们更倾向于从 Core Data 模型生成类。创建一个新的\
  \ NSManagedObject 子类，选择 CoreDump 数据模型，然后同时选择 Project 和 Bug 实体，以生成`Project`和`Bug`类。如果您使用\
  \ Swift，请记住修复生成类中的命名空间。您的选项是：\n\n*   将项目名称放在 Core Data 模型中每个实体的类字段中（即`CoreDump.Project`和`CoreDump.Bug`）\n\
  *   在生成的类文件中使用`@objc`关键字（即`@objc(Project)`和`@objc(Bug)`）\n\n### 更新获取的结果控制器\n\n\n\
  \n\n获取结果控制器目前尝试使用已不存在的 `Event` 实体来获取数据，而你应该改为获取 `Project` 实体。此外，你需要按托管服务将项目分组显示。为此，必须指定一个与\
  \ `host` 属性对应的分区名称键路径，同时先按 `host` 排序，再在每个分区内按 `name` 排序。请找到 `fetchedResultsController`\
  \ 访问器，并进行如下修改：\n\n*   将实体改为 `Project`。\n*   为 `host` 添加排序描述符。\n*   将现有排序描述符改为使用\
  \ `name`。\n*   将分区名称键路径改为使用 `host`。\n\n代码清单 5-23（Objective-C）和代码清单 5-24（Swift）展示了更新后的\
  \ `fetchedResultsController` 访问器。\n\n***代码清单 5-23***. 更新后的 `fetchedResultsController`\
  \ 访问器（Objective-C）\n\n```\n- (NSFetchedResultsController *)fetchedResultsController\
  \ {\n  if (_fetchedResultsController != nil) {\n    return _fetchedResultsController;\n\
  \  }\n\nNSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  // 根据实际情况编辑实体名称。\n\
  \  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Project\"\
  \ inManagedObjectContext:self.managedObjectContext];\n  [fetchRequest setEntity:entity];\n\
  \n// 将批量大小设置为合适的数值。\n  [fetchRequest setFetchBatchSize:20];\n\n// 根据实际情况编辑排序键。 \
  \ NSSortDescriptor *hostSortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"\
  host\" ascending:YES];\n  NSSortDescriptor *nameSortDescriptor = [[NSSortDescriptor\
  \ alloc] initWithKey:@\"name\" ascending:YES];\n  NSArray *sortDescriptors = @[hostSortDescriptor,\
  \ nameSortDescriptor];\n\n[fetchRequest setSortDescriptors:sortDescriptors];\n\n\
  // 根据实际情况编辑分区名称键路径和缓存名称。\n  // 分区名称键路径为 nil 表示“无分区”。\n  NSFetchedResultsController\
  \ *aFetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
  \ managedObjectContext:self.managedObjectContext sectionNameKeyPath:@\"host\" cacheName:@\"\
  Master\"];\n    aFetchedResultsController.delegate = self;\n    self.fetchedResultsController\
  \ = aFetchedResultsController;\n\nNSError *error = nil;\n    if (![self.fetchedResultsController\
  \ performFetch:&error]) {\n    // 将此实现替换为能恰当处理错误的代码。\n    // abort() 会使应用生成崩溃日志并终止。在开发阶段可能有帮助，但不应在发布的应用程序中使用。\n\
  \    NSLog(@\"未解决错误 %@, %@\", error, [error userInfo]);\n    abort();\n    }\n\n\
  return _fetchedResultsController;\n}\n```\n\n***代码清单 5-24***. 更新后的 `fetchedResultsController`\
  \ 访问器（Swift）\n\n```\nvar fetchedResultsController: NSFetchedResultsController {\n\
  \    if _fetchedResultsController != nil {\n        return _fetchedResultsController!\n\
  \    }\n\nlet fetchRequest = NSFetchRequest(entityName: \"Project\")\n\n// 将批量大小设置为合适的数值。\n\
  \    fetchRequest.fetchBatchSize = 20\n\n// 根据实际情况编辑排序键。\n    let hostSortDescriptor\
  \ = NSSortDescriptor(key: \"host\", ascending: true)\n    let nameSortDescriptor\
  \ = NSSortDescriptor(key: \"name\", ascending: true)\n    let sortDescriptors =\
  \ [hostSortDescriptor, nameSortDescriptor]\n\nfetchRequest.sortDescriptors = [sortDescriptors]\n\
  \n// 根据实际情况编辑分区名称键路径和缓存名称。\n    // 分区名称键路径为 nil 表示“无分区”。\n    let aFetchedResultsController\
  \ = NSFetchedResultsController(fetchRequest: fetchRequest, managedObjectContext:\
  \ self.managedObjectContext!, sectionNameKeyPath:\"host\", cacheName: \"Master\"\
  )\n    aFetchedResultsController.delegate = self\n    _fetchedResultsController\
  \ = aFetchedResultsController\n\nvar error: NSError? = nil\n    if !_fetchedResultsController!.performFetch(&error)\
  \ {\n       // 将此实现替换为能恰当处理错误的代码。\n       // abort() 会使应用生成崩溃日志并终止。在开发阶段可能有帮助，但不应在发布的应用程序中使用。\n\
  \         //println(\"未解决错误 \\(error), \\(error.userInfo)\")\n       abort()\n \
  \   }\n\nreturn _fetchedResultsController!\n}\n```\n\n## 在表格中显示项目\n\n表格中的单元格当前配置为显示\
  \ `Event` 对象，你需要将其改为显示 `Project` 对象。每个单元格应显示项目的名称及其 URL。点击项目应能向下钻取其关联的 bug，因此仍需保留展开指示器。同时，还需要能够编辑项目的名称和\
  \ URL，所以当主视图处于编辑模式时，应显示详细信息展开附件。\n\n此外，你需要按托管服务分组显示项目，并使用在获取结果控制器中配置的分区名称。以下各节将详细介绍这些更改。\n\
  \n### 更新表格视图单元格以显示项目\n\n打开故事板文件 `Main.storyboard`，在主屏幕中选择表格视图单元格。打开属性检查器，执行以下操作：\n\
  \n*   将样式改为**副标题**。\n*   将编辑附件改为**详细信息展开**。\n\n属性检查器中的相应更改请参见图 5-4。\n\n![9781430260288_Fig05-04.jpg](img/9781430260288_Fig05-04.jpg)\n\
  \n图 5-4. 配置表格视图单元格的属性\n\n现在，你可以更新 `configureCell:atIndexPath:` 方法，使其使用 `Project`\
  \ 对象而非 `Event` 对象。如果你使用的是 Objective-C，请在 `MasterViewController.m` 中导入 `Project`\
  \ 头文件。\n\n```\n#import \"Project.h\" // Objective-C\n```\n\n然后，更新单元格以显示项目名称及其 URL，如代码清单\
  \ 5-25（Objective-C）和代码清单 5-26（Swift）所示。\n\n***代码清单 5-25***. 更新后的 `configureCell:atIndexPath:`\
  \ 方法（Objective-C）\n\n```\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath\
  \ *)indexPath {\n  Project *project = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
  \  cell.textLabel.text = project.name;\n  cell.detailTextLabel.text = project.url;\n\
  }\n```\n\n***代码清单 5-26***. 更新后的 `configureCell:atIndexPath:` 函数（Swift）\n\n```\n\
  func configureCell(cell: UITableViewCell, atIndexPath indexPath: NSIndexPath) {\n\
  \  let project = self.fetchedResultsController.objectAtIndexPath(indexPath) as Project\n\
  \  cell.textLabel.text = project.name\n  cell.detailTextLabel?.text = project.url\n\
  }\n```\n\n### 更新表格以按托管服务分组\n\n当前表格样式为**扁平**。要显示分区，需将其改为**分组**。打开 `Main.storyboard`，选择表格，显示属性检查器，并将样式改为**分组**。\n\
  \n此外，你还需要为分区提供名称。回想一下，`NSFetchedResultsSectionInfo` 协议提供了一个 `name` 属性，该属性对应于创建获取结果控制器时使用的\
  \ `sectionNameKeyPath` 参数。我们只需告知表格使用该值作为分区名称即可，如代码清单 5-27（Objective-C）和代码清单 5-28（Swift）所示。\n\
  \n***代码清单 5-27***. 在表格中显示分区名称（Objective-C）\n\n```\n- (NSString *)tableView:(UITableView\
  \ *)tableView titleForHeaderInSection:(NSInteger)section {\n  id <NSFetchedResultsSectionInfo>\
  \ sectionInfo = [self.fetchedResultsController sections][section];\n  return [sectionInfo\
  \ name];\n}\n```\n\n\n\n***清单 5-28***. 在表格中显示分区名称（Swift）\n\n```\noverride func tableView(tableView:\
  \ UITableView, titleForHeaderInSection section: Int) -> String? {\n  if tableView\
  \ == self.tableView {\n    var sectionInfo = self.fetchedResultsController.sections![section]\
  \ as NSFetchedResultsSectionInfo\n    return sectionInfo.name\n  }\n  else {\n \
  \   return nil\n  }\n}\n```\n\n## 创建添加和编辑项目屏幕\n\n在生成的应用程序中，添加新的`Event`对象时，并不需要屏幕来接收输入。当您点击添加`Event`时，应用程序只是创建了该对象，将当前时间填入其`timeStamp`属性，然后返回。而在创建`Project`对象时，我们无法这样做，因为我们必须收集名称和\
  \ URL。在本节中，我们将创建一个用于添加（以及后续编辑）`Project`对象的屏幕。\n\n### 创建用于添加和编辑项目的视图控制器\n\n首先，我们创建负责添加/编辑项目屏幕的视图控制器。新建一个名为`ProjectViewController`的\
  \ Cocoa Touch 类文件，并将其设置为`UIViewController`的子类。勾选 **Also create XIB file** 复选框，选择您的语言，然后按照步骤创建新文件。打开`ProjectViewController.h`（Objective-C）或`ProjectViewController.swift`（Swift），并添加以下内容：\n\
