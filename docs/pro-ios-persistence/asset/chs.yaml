  \ SQLite 数据库，但日志消息证明了对象已被存储和检索。\n\n## 总结\n\n在本章中，你了解了 Core Data 是什么以及它的用途。你学习了数据持久化的重要性。你了解了\
  \ Core Data 的组件以及它们如何协同工作。你构建了两个基于 Core Data 的应用程序：一个由 Xcode 为你设置，另一个你自行设置了 Core\
  \ Data。你向 Core Data 持久化存储中存储了数据并检索了它们。\n\n你在本章中构建的应用程序使用了贫血对象模型。在下一章中，我们将基于本章的知识创建更复杂的对象模型。你还将学习排序和使用谓词等概念，并理解\
  \ Core Data 对象模型的力量。\n\n## 第 2 章\n\n构建数据模型\n\n\n\n# 排版后内容\n\n你可以用最直观的用户界面创建应用程序，让它们执行用户离不开的任务，但如果你没有正确地对数据进行建模，你的应用程序将变得难以维护、性能低下，甚至可能无法使用。本章将解释如何对数据进行建模，以支撑而非破坏你的应用程序。\n\
  \n在上一章中，你使用 Xcode 的空应用程序模板构建了一个简单的 iOS 应用程序。本章中，我们将对一个书店进行建模，并构建一个应用程序来存储关于我们现有书籍的信息。与上一章相同，我们暂不构建任何用户界面代码，继续将重点放在\
  \ Core Data 上。\n\n## 设计你的数据库\n\n美国哲学家拉尔夫·沃尔多·爱默生曾说过：“愚蠢的一致性是小心眼儿的小妖精。”人们经常引用这句话来为自己的粗心大意或对细节的忽视辩护。我们希望我们不会陷入这种陷阱——当我们前后矛盾地在声称\
  \ Core Data 不是数据库和把它当作数据库之间摇摆不定时。本节将讨论如何设计你的数据结构，并将这个过程类比为对关系数据库进行建模，这不仅极大地有助于讨论，也有助于最终的设计。然而，如同所有的类比一样，这种类比在某些地方会失效，我们将在整个讨论中指出这些地方。\n\
  \nCore Data 的实体描述在外观、行为、感觉和特性上都与关系数据库中的表极其相似。属性看起来像表中的列，关系感觉像是基于主键和外键的连接，而实体则如同表中的行。如果你的模型位于\
  \ SQLite 持久化存储之上，Core Data 实际上会将实体描述、属性、关系和实体实现为你所期望的数据库结构。但请记住，你的数据也可以只存在于内存中，或者存在于某些没有表、行、列、主键和外键的平面文件原子存储中。Core\
  \ Data 将数据结构从关系数据库结构中抽象出来，简化了你对数据的建模和交互方式。在你的心智模型中要接纳这种抽象，否则你会在 Core Data 模型中塞满冗余，与\
  \ Core Data 背道而驰，并产生次优的数据结构。\n\n有数据建模经验的新手在接触 Core Data 时，常常抱怨缺少自增字段类型，他们认为自己负有像传统数据建模中那样为每个表定义主键的责任。Core\
  \ Data 没有自增类型，因为你根本不需要定义任何主键。Core Data 负责建立并维护每个托管对象的唯一性，无论它是否是表中的一行。\n\n没有主键也意味着没有外键；Core\
  \ Data 管理实体（或表）之间的关系，并为你执行任何必要的连接操作。尽快克服因不定义主键和外键而产生的不适感，因为纠结于这个实现细节不值得你花费精力或感到焦虑。\n\
  \n**提示**  在创建你的 Core Data 模型时，要记住一个经验法则：关注数据本身，而不是数据存储机制。\n\n## 关系数据库规范化\n\n关系数据库理论推崇一个称为规范化的过程，用于设计数据模型。规范化的目标是减少或消除冗余，并提供对数据库内部数据的高效访问。规范化过程分为五个级别或范式，并且仍在继续研究第六范式。这五个范式的定义只有逻辑学家才会喜欢甚至理解；它们读起来像这样：\n\
  \n*一个关系 R 处于第四范式（4NF），当且仅当，每当 R 中存在一个 MVD（多值依赖），例如 A -> -> B，那么 R 的所有属性也在函数上依赖于\
  \ A。换句话说，R 中唯一的依赖（FDs 或 MVDs）都是 K -> X 的形式（即，从候选键 K 到其他属性 X 的函数依赖）。等价地：R 是 4NF，如果它属于\
  \ BCNF，并且 R 中的所有 MVD 实际上都是 FD。*\n\n(`www.databasedesign-resource.com/normal-forms.html`)\n\
  \n我们既没有足够的篇幅，也没有意愿逐一讲解每个范式的形式化定义并解释其含义。相反，本节将描述每个范式与 Core Data 的关系，并提供数据建模建议。请注意，遵守某个给定的范式需要先遵守其之前的所有范式。\n\
  \n符合第一范式（1NF）的数据库被认为是规范化的。要达到这个规范化级别，数据库中的每一行必须具有相同数量的字段。对于 Core Data 模型来说，这意味着每个托管对象应该具有相同数量的属性。由于\
  \ Core Data 不允许你在实体中创建可变数量的属性，因此你的 Core Data 模型会自动规范化。\n\n第二范式（2NF）和第三范式（3NF）处理非键字段与键字段之间的关系，规定非键字段应该是对它们所属的整个键字段的描述。由于你的\
  \ Core Data 模型没有键字段，你不应该遇到这些问题的困扰。然而，你应该确保给定实体的所有属性都描述该实体本身，而不是其他东西。例如，一个描述书籍类别的\
  \ `Category` 实体不应该有 `author` 字段，因为作者描述的是书，而不是书所属的类别。\n\n接下来的两个范式，第四范式（4NF）和第五范式（5NF），在\
  \ Core Data 世界中可以被视为同一个范式。它们涉及减少或消除数据冗余，促使你将多值属性拆分到单独的实体中，并在实体之间创建对多关系。用 Core Data\
  \ 的术语来说，4NF 规定不应使用实体属性来存储多个值。相反，你应该将这些属性移到一个单独的实体中，并在实体之间创建一个对多关系。例如，考虑本章中我们在书店应用程序模型中的类别和书籍。一个会违反\
  \ 4NF 和 5NF 的模型会有一个单独的 `Category` 实体，并带有一个额外的 `book` 属性。然后我们会为每本书创建一个新的类别托管对象，这样就会产生多个冗余的\
  \ `Category` 对象。相反，书店数据模型将包含一个 `Category` 实体和独立的 `Book` 实体。\n\n## 构建一个简单模型\n\n在\
  \ Xcode 中创建一个新的单视图应用程序项目，这样我们就可以开始构建一个简单的模型。延续我们富有想象力的应用命名系列，将这个新应用程序命名为 `BookStore`，并将语言设置为你选择的语言，如图\
  \ 2-1 所示。\n\n![9781430260288_Fig02-01.jpg](img/9781430260288_Fig02-01.jpg)\n\n图\
  \ 2-1. 创建 `BookStore` 项目\n\n此时，你应该已经熟悉了第 1 章中描述的所有 Core Data 组件。找到 Xcode 创建的对象模型（名为\
  \ `BookStore.xcdatamodeld`）并打开它。正如预期，它是空的。\n\n**提示**  在第 1 章中，我们向你展示了如何保持应用程序委托没有\
  \ Core Data 初始化代码，并将其移到一个像 `Persistence` 这样的类中。你可以选择在本章中复制这种模式，或者保持 Xcode 模板不变并继续操作。\n\
  \n## 实体\n\n\n\n## Core Data 模型设计\n\n正如设计面向对象应用程序一样，你应该花时间思考 Core Data 模型所需的细节层次，以设计出正确的模型对象集。以图书库建模为例，我们希望能够按类别快速定位图书馆中的书籍。因此，我们从创建`BookCategory`实体开始。点击\
  \ Xcode 窗口底部的“Add Entity”按钮，并将新创建的实体重命名为`BookCategory`。\n\n**提示**  在 Objective-C\
  \ 运行时中已经存在一个名为`Category`的类，因此最好避免使用此名称以防止编译错误。在本书中，我们使用`BookCategory`这个名称。\n\nCore\
  \ Data 在运行时将对象表示为`NSManagedObject`的实例。选择`BookCategory`实体并打开“Data Model”检查器。注意`BookCategory`实体默认映射到`NSManagedObject`类。在设计模型时，请记住实体类似于类（因此命名约定也相似）。\n\
  \n## 属性\n\n属性是用于描述实体的特征。想象一下，为了 BookStore 应用程序的目的，需要如何描述类别。我们至少需要为类别赋予一个名称，以便图书管理员能够快速了解该类别所指的内容。要添加名称，请向`BookCategory`实体添加一个名为`name`的新属性，并将其类型更改为`String`。\n\
  \n**提示**  注意实体名称使用 Pascal 大小写，也称为首字母大写的驼峰命名法（类似于 Objective-C 类名），而属性使用小写字母开头但仍采用驼峰命名法（类似于\
  \ Objective-C 类的属性）。\n\n此时，你的模型应类似于图 2-2。\n\n![9781430260288_Fig02-02.jpg](img/9781430260288_Fig02-02.jpg)\n\
  \n图 2-2。带有`name`属性的`BookCategory`实体\n\nCore Data 支持一组有限的属性类型，如表 2-1（适用于 Objective-C\
  \ 代码）和表 2-2（适用于 Swift 代码）所述。\n\n表 2-1。Objective-C 中可用的属性类型\n\n![Table2-1.jpg](img/Table2-1.jpg)\n\
  \n表 2-2。Swift 中可用的属性类型\n\n![Table2-2.jpg](img/Table2-2.jpg)\n\n大多数这些类型都很直观，因为它们直接映射到\
  \ Objective-C 数据类型。使用它们只需利用`NSManagedObject`实例的键/值访问器即可。`Transformable`类型是唯一没有 Objective-C\
  \ 对应类型的类型。它用于自定义类型，可用来处理 Core Data 尚未支持的任何类型。当你尝试持久化的属性无法很好地归入支持的数据类型之一时，请使用`Transformable`作为类型。例如，如果你的托管对象需要表示颜色并需要持久化它，那么使用`CGColorRef`类型是合理的。在这种情况下，你需要将\
  \ Core Data 类型设置为`transient`和`Transformable`，并向 Core Data 提供将属性转换为支持数据类型的机制。当你创建自己的继承自`NSManagedObject`的托管对象时，使用自定义属性是有意义的，我们将在第\
  \ 7 章中更详细地讨论。\n\n## 键值编码\n\n`NSManagedObject`实例符合键值编码（KVC）规范。KVC 是一种使用预定义命名约定访问对象属性的机制。`NSManagedObject`为\
  \ Objective-C 和 Swift 都提供了 KVC 方法的实现。以下是 Objective-C 中的方法声明：\n\n```\n- (void)setValue:(id)value\
  \ forKey:(NSString *)key\n```\n\n以及\n\n```\n- (id)valueForKey:(NSString *)key\n\
  ```\n\n以下是它们的 Swift 对应版本：\n\n```\nfunc setValue(_ value: AnyObject!, forKey key:\
  \ String!)\n```\n\n以及\n\n```\nfunc valueForKey(_ key: String!) -> AnyObject!\n```\n\
  \n在代码中访问属性变得很简单，如下面的 Objective-C 代码片段所示：\n\n```\nNSManagedObject *myCategory = ....\n\
  // 获取 name 属性的当前值\nNSString *name = [myCategory valueForKey:@\"name\"];\n// 将 name\
  \ 属性的值设置为 Magazines\n[myCategory setValue:@\"Magazines\" forKey:@\"name\"];\n```\n\
  \n以下是对应的 Swift 代码：\n\n```\nvar myCategory = ....\n// 获取 name 属性的当前值\nvar name: AnyObject!\
  \ = myCategory.valueForKey(\"name\")\n// 将 name 属性的值设置为 Magazines\nmyCategory.setValue(\"\
  Magazines\", forKey: \"name\")\n```\n\n## 生成类\n\n你的代码可以一直使用`NSManagedObject`实例和\
  \ KVC，但随着模型增长并拥有许多不同的实体，将一切都称为“托管对象”会变得非常混乱。因此，Core Data 允许你将实体直接映射到自定义类。所有属性都映射到\
  \ Objective-C 的属性，一切都变得更易于管理。\n\n在 Xcode 中，选择`BookCategory`实体。在菜单中，选择“Editor”![image](img/arrow.jpg)“Create\
  \ NSManagedObject Subclass…”并按照提示操作，直到点击“Create”。\n\n**提示**  如果你选中“Use scalar properties\
  \ for primitive data types”复选框，代码生成器将使用原始类型（而非`NSNumber`）来存储数值。在决定是否使用标量值时，请考虑你将如何访问数据。例如，标量值更容易在算术运算中访问和使用，但如果不先包装为`NSNumber`，则无法将它们添加到集合中。\n\
  \n一个名为`BookCategory`的新类已添加到你的 Xcode 项目中。对于 Objective-C 版本，`BookCategory.h`如列表 2-1\
  \ 所示。\n\n***列表 2-1***。`BookCategory.h`\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreData/CoreData.h>\n\n@interface BookCategory : NSManagedObject\n\n@property\
  \ (nonatomic, retain) NSString * name;\n\n@end\n```\n\n如果你在 Swift 中创建此项目，则会有一个名为`BookCategory.swift`的文件，如列表\
  \ 2-2 所示。\n\n***列表 2-2***。`BookCategory.swift`\n\n```\nimport Foundation\nimport\
  \ CoreData\n\nclass BookCategory: NSManagedObject {\n\n@NSManaged var name: String\n\
  \n}\n```\n\n无论使用哪种语言，`BookCategory`都是`NSManagedObject`的子类，并且具有一个名为`name`的类型为`NSString`（Objective-C）或`String`（Swift）的简单属性。这与模型相匹配。该类与实体之间的映射保存在模型本身中。返回模型并选择`BookCategory`实体。打开“Data\
  \ Model”检查器，可以看到其关联的类现在是`BookCategory`（新创建的类）。\n\n如果你在 Swift 中做这个项目，还有一点额外工作要做（除非未来的\
  \ Xcode 版本修复了这个问题）。与 Objective-C 不同，Swift 有命名空间。当 Swift 编译你的类时，它会将它们放入包含模块的命名空间中，该命名空间通常与项目名称匹配。这意味着你的`BookCategory`类实际命名为`BookStoreSwift.BookCategory`（如果你像我们一样将项目命名为`BookStoreSwift`）。然而，Core\
  \ Data 模型只显示`BookCategory`作为类名。如果你现在运行程序，控制台会显示类似如下的错误消息：\n\n```\nCoreData: warning:\
  \ Unable to load class named 'BookCategory' for entity 'BookCategory'.  Class not\
  \ found, using default NSManagedObject instead.\n```\n\n要解决此问题，你可以将 Core Data 模型中的类名更新为`BookStoreSwift.BookCategory`，或者向`BookCategory`类添加一个属性，告诉\
  \ Core Data 该类实际上就是命名为`BookCategory`，如列表 2-3 所示。\n\n\n\n### 清单 2-3. 使用 `@objc` 属性为\
  \ Objective-C 重命名类\n\n```swift\nimport Foundation\nimport CoreData\n\n@objc(BookCategory)\n\
  class BookCategory: NSManagedObject {\n\n    @NSManaged var name: String\n\n}\n\
  ```\n\n`@objc(name)` 属性会将类对 Objective-C 类暴露的名称改为 `name`，因此我们可以指定模型所需的、不带命名空间的版本。\n\
  \n现在，访问 `name` 属性比之前更简单、更熟悉：\n\n```objc\nBookCategory *myCategory = ....\n// 获取\
  \ name 属性的当前值\nNSString *name = myCategory.name;\n// 将 name 属性的值设置为 Magazines\n\
  myCategory.name = @\"Magazines\";\n```\n\n在 Swift 中，代码如下所示：\n\n```swift\nvar myCategory\
  \ = ....\n// 获取 name 属性的当前值\nvar name: AnyObject! = myCategory.name\n// 将 name 属性的值设置为\
  \ Magazines\nmyCategory.name = \"Magazines\"\n```\n\n## 关系\n\n在规范化数据模型时，根据所建模数据的复杂程度，你很可能会创建多个实体。关系让你能够将实体连接在一起。Core\
  \ Data 允许你调优所创建的关系，以准确反映数据之间的关联方式。首先，向模型中添加一个 `Book` 实体。此时，先不为其设置任何属性，我们先弄清楚该实体的内容。\n\
  \n在 BookStore 应用程序中，你可以看到类别与其所含书籍之间存在明显的关系。现在，我们将问题保持相对简单：假设一本书只能属于一个类别。让我们在模型中体现这种关系。\n\
  \n选中 `BookCategory` 实体，然后在“关系”部分点击 + 按钮。Xcode 会创建一个新的关系供你配置。将名称设为 `books`，将目标设为\
  \ `Book`，暂时留空反向关系。在 Xcode 的数据模型检查器标签页中，将类型改为“对多”，表示此关系可能指向多个书籍。这称为一对多关系。 图 2-3 显示了当前模型的样子。\n\
  \n![9781430260288_Fig02-03.jpg](img/9781430260288_Fig02-03.jpg)\n\n**图 2-3.** 一对多关系\n\
  \n如果留空`反向`字段，编译器会给出警告。你可以忽略这些警告，在不指定反向关系的情况下运行应用程序——毕竟这些是编译器警告，而非编译器错误——但你可能会遇到意外的后果。Core\
  \ Data 使用双向关系信息来维护对象图的一致性（因此会出现“一致性错误”），并管理撤销和重做信息。如果留下一个没有反向关系的关系，就意味着你要自行负责对象图的一致性和撤销/重做管理。然而，Apple\
  \ 文档强烈不鼓励这样做，尤其是在“对多”关系的情况下。当你不指定反向关系时，当此端的管理对象发生更改时，关系另一端的管理对象不会被标记为已更改。例如，假设一个玩家对象被删除，并且它没有指向其队伍的反向关系。当保存对象图时，任何可选性规则或删除规则都不会被强制执行。\n\
  \n为了遵守规范并帮助 Core Data，请添加反向关系——即，对于给定的书籍，它所属的类别。选中 `Book` 实体并添加一个新关系。将名称设为 `category`，目标设为\
  \ `BookCategory`，反向设为 `books`。如果你回到 `BookCategory` 实体并选中 `books` 关系，你会看到其反向关系现在也已自动设置。\n\
  \n## 关系属性\n\n让我们来看看配置关系时可用的选项。选中 `books` 关系，打开数据模型检查器，如图 2-3 所示。\n\n第一个字段“名称”，会成为\
  \ `NSManagedObject` 用来引用该关系的键名。按照惯例，它使用被引用实体的小写名称。对于“对多”关系，名称字段通常使用复数形式。请注意，这些指导方针只是惯例，但如果你遵循它们，你的数据模型将更易于理解、维护和操作。你可以看到\
  \ BookStore 数据模型遵循了这些惯例——在 `Book` 实体中，到 `BookCategory` 实体的关系被称为 `category`。在 `BookCategory`\
  \ 实体中，到 `Book` 实体的关系（一个对多关系）被称为 `books`。\n\n“属性”字段有两个选项，均为复选框，你可以独立设置它们。第一个是“瞬态”，允许你指定一个关系不应保存到持久化存储中。瞬态关系仍然支持撤销和重做操作，但在应用程序退出时消失，其生命周期如同好莱坞的婚姻一般短暂。瞬态关系的一些可能用途包括：\n\
  \n* 实体之间的关系是临时的，不应在当前应用程序运行之外继续存在。\n* 关系信息可以从某些外部数据源派生，无论是另一个 Core Data 持久化存储还是其他信息源。\n\
  \n在大多数情况下，你希望关系是持久的，并且会保持“瞬态”复选框为未选中状态。\n\n第二个属性复选框“可选”，指定此关系是否需要一个非 `nil` 的值。可以将其视为数据库中可空列与不可空列。如果勾选了“可选”复选框，此实体类型的管理对象可以在未为此关系指定任何内容的情况下保存到持久化存储中。但是，如果未勾选，保存上下文将失败。例如，如果\
  \ BookStore 应用程序数据模型中的 `Book` 实体未勾选此复选框，那么每个书籍实体都必须属于一个类别。将某本书的 `\"category\"` 值设置为\
  \ `nil`（或根本不设置）将导致所有对 `save:` 的调用失败，并出现错误描述：“category 是必需值。”\n\n下一个字段“删除规则”，我们将在下一节中介绍。\n\
  \n“类型”字段有两个选项：“对多”和“对一”。“对一”意味着此关系在关系的每一端都恰好有一个管理对象（或零个，取决于可选性设置）。对于 BookStore 应用程序，如果将对\
  \ `Category` 实体的 `books` 关系设置为“对一”类型，则意味着给定类别中只能存在一本书，这显然对于书籍类别来说是反直觉的。但如果实体是 `Frame`\
  \ 和 `Picture`，那么“对一”类型就有意义了，因为一个相框通常只包含一张照片。将此字段设置为“对多”意味着目标实体可以有多个管理对象，这些对象与当前实体类型的每个管理对象实例相关联。\n\
  \n下一个字段“计数”，用于限制可以与当前实体类型的每个管理对象相关联的目标实体类型的管理对象数量，并且仅在类型设置为“对多”时生效。你可以为“最小值”和/或“最大值”指定值，Core\
  \ Data 将强制执行你设置的规则。请注意，你可以只设置其中一个而不设置另一个——不必两者都设置。超出你设置的限制会导致 `save:` 操作失败，并显示“项目过多”或“项目过少”的错误消息。请注意，“可选”设置会覆盖“最小计数”设置：如果勾选了“可选”且“最小计数”为\
  \ 1，则在关系计数为零时保存上下文仍然成功。\n\n### 删除规则\n\n\n\n## 删除规则设置\n\n`Delete Rule`（删除规则）设置用于指定当你试图删除此实体类型的托管对象时会发生什么。表\
  \ 2-3 列出了四种可能性及其含义。\n\n表 2-3 删除规则选项\n\n| 规则名称 | 描述 |\n| --- | --- |\n| 级联（Cascade）\
  \ | 删除源对象，同时也会删除所有相关的目标对象。 |\n| 拒绝（Deny） | 如果源对象与任何目标对象有关联，则删除请求失败，不会删除任何内容。 |\n\
  | 置空（Nullify） | 删除源对象，并将所有相关目标对象的反向关系设置为 nil。 |\n| 无操作（No Action） | 删除源对象，不对任何相关目标对象进行任何更改。\
  \ |\n\n请谨慎设置关系中的 `Delete Rule`。例如，在 `BookStore` 应用中，如果你将 `BookCategory` 实体中 `books`\
  \ 关系的 `Delete Rule` 设置为“级联（Cascade）”，那么删除一个类别将会删除所有与该类别相关的图书。这很可能不是你想要的结果。如果你将该规则设置为“拒绝（Deny）”，并且某个类别中包含图书，那么尝试删除该类别将导致任何保存上下文的操作失败，并显示消息“category\
  \ is not valid”。将 `Delete Rule` 设置为“置空（Nullify）”则会保留持久化存储中的图书，尽管它们不再属于任何类别。\n\n\
  “无操作（No Action）”选项代表了另一种方式，就像不指定反向关系一样，Core Data 允许你承担管理对象图一致性的责任。如果你为 `Delete Rule`\
  \ 指定此值，Core Data 允许你删除源对象，但会向目标对象假装源对象仍然存在。对于 `BookStore` 应用来说，这意味着删除一个类别，但依然告知顾客他们查找的图书是可用的，不过这些图书不属于任何可供顾客浏览的类别。你不太可能找到使用“无操作（No\
  \ Action）”设置的有说服力的理由，除非是出于当你拥有大量目标对象时的性能考虑。第 9 章 讨论了使用 Core Data 进行性能调优的话题。\n\n\
  ## 有序属性\n\n`Arrangement`（排列）字段用于指定 Core Data 是否应维护实体被添加到关系中的顺序，且仅适用于对多（To Many）关系。为了维护顺序，你需要勾选\
  \ `Ordered`（有序）复选框。以 `BookStore` 应用为例，我们不关心图书被添加到类别中的顺序，因此，为了查看有序关系的示例，请创建一个 `Page`\
  \ 实体，并创建一个从 `Book` 到 `Page` 的名为 `pages` 的对多关系。显然，对于页面而言，我们需要维护顺序，因此通过在关系属性中勾选复选框，将\
  \ `pages` 关系的 `Arrangement` 字段设置为“有序（Ordered）”。不要忘记设置反向关系。\n\n该模型应如图 2-4 所示。\n\n\
  ![9781430260288_Fig02-04.jpg](img/9781430260288_Fig02-04.jpg)\n\n图 2-4. 包含三个实体的\
  \ BookStore 模型\n\n通过在模型中选中所有三个实体（单击第一个实体，然后按住 shift 键并单击最后一个实体）来刷新自定义对象，然后在 Xcode\
  \ 菜单中，选择 Editor ![image](img/arrow.jpg) Create `NSManagedObject` Subclass…，然后按照提示操作，直到可以单击\
  \ Create。Xcode 会请求你允许替换现有的 `BookCategory` 类。单击 Replace，你将拥有三个自定义的 Core Data 托管对象：`BookCategory`、`Book`\
  \ 和 `Page`。如果你选择以 Swift 生成这些类，请不要忘记要么更新 Core Data 模型中的类名以包含命名空间（例如 `BookStoreSwift.Book`），要么为类添加\
  \ `@objc()` 属性（例如 `@objc(Book)`）。\n\n打开 `BookCategory.h`，注意与 books 的无序关系是如何表示为 `NSSet`\
  \ 的。\n\n\n\n```\n@property (nonatomic, retain) NSSet *books;\n```\n\n现在打开 `Book.h`，查看如何用\
  \ `NSOrderedSet` 表示有序关系。\n\n```\n@property (nonatomic, retain) NSOrderedSet *pages;\n\
  ```\n\n你可以先在 Swift 中通过查看 `BookCategory.swift` 来看到 `NSSet`：\n\n```\n@NSManaged var\
  \ books: NSSet\n```\n\n然后在 `Book.swift` 中查看 `NSOrderedSet`：\n\n```\n@NSManaged var\
  \ pages: NSOrderedSet\n```\n\n`NSOrderedSet` 类提供了支持索引的访问器，让你可以指定严格的顺序。列表 2-4 展示了\
  \ Objective-C 的方法声明，列表 2-5 展示了 Swift 的声明。\n\n***列表 2-4***。Objective-C 中的 `NSOrderedSet`\
  \ 访问器\n\n```\n- (id)objectAtIndex:(NSUInteger)idx;\n- (NSUInteger)indexOfObject:(id)object;\n\
  ```\n\n***列表 2-5***。Swift 中的 `NSOrderedSet` 访问器\n\n```\nfunc objectAtIndex(_ index:\
  \ Int) -> AnyObject!\nfunc indexOfObject(_ object: AnyObject!) -> Int\n```\n\n你还会注意到，在\
  \ Swift 版本中，`books` 和 `pages` 变量前面都有 `@NSManaged` 属性。Objective-C 的实现文件 `BookCategory.m`（如列表\
  \ 2-6 所示）在 `name` 和 `books` 属性前面有一个名为 `@dynamic` 的属性。这两个属性（`@NSManaged` 和 `@dynamic`）作用相同：它们告诉编译器，该属性的\
  \ getter 和 setter 将在运行时提供，而不是在编译时。\n\n***列表 2-6***。`BookCategory.m`\n\n```\n#import\
  \ \"BookCategory.h\"\n#import \"Book.h\"\n\n@implementation BookCategory\n\n@dynamic\
  \ name;\n@dynamic books;\n\n@end\n```\n\n## 存储与检索数据\n\n既然我们已经创建了一个基本的数据模型，下面让我们为创建好的实体添加一些属性，以便我们可以尝试存储和检索数据。\n\
  \n选择 `Page` 实体，添加一个新的 `String` 类型的 `text` 属性。我们将用它来存储某一页的文本。选择 `Book` 实体，添加一个 `String`\
  \ 类型的 `title` 属性和一个 `Float` 类型的 `price` 属性。完成后，为所有三个实体重新生成自定义的 Core Data 对象。由于我们使用了数值类型，并且更倾向于通过原始类型来访问它们，请务必勾选\
