  \ 2 或 3（而不是 1），来让 Core Data 在控制台中输出更多 SQL 信息——数值越大，Core Data 记录的信息就越多。例如，尝试将启动参数修改为以下内容：\n\
  \n```\n-com.apple.CoreData.SQLDebug 3\n```\n\n再次运行`WordList`应用，并查看控制台以获取更丰富的信息，例如以下内容：\n\
  \n```\n2014-07-31 15:29:04.797 WordList[73416:2971038] CoreData: sql: SELECT COUNT(DISTINCT\
  \ t0.Z_PK) FROM ZWORD t0 JOIN ZWORDCATEGORY t1 ON t0.ZWORDCATEGORY = t1.Z_PK WHERE\
  \  t1.ZFIRSTLETTER = ?\n2014-07-31 15:29:04.797 WordList[73416:2971038] CoreData:\
  \ details: SQLite bind[0] = \"s\"\n2014-07-31 15:29:04.822 WordList[73416:2971038]\
  \ CoreData: annotation: count request <NSFetchRequest: 0x7fc6a292d850> (entity:\
  \ Word; predicate: (wordCategory.firstLetter == \"s\"); sortDescriptors: ((null));\
  \ type: NSCountResultType;) returned 18988\n2014-07-31 15:29:04.822 WordList[73416:2971038]\
  \ CoreData: annotation: total count request execution time: 0.0254s for count of\
  \ 18988.\n```\n\n查看 Core Data 从你的谓词和表达式中推导出的实际 SQL 语句，可以帮助你排查问题并验证数据检索的方式是否正确。\n\
  \n## 创建单值表达式\n\n表达式可以代表单值，也可以代表值的集合。`NSPredicate`支持四种类型的单值表达式，如表 3-1 所示。\n\n表 3-1.\
  \ 四种单值表达式类型\n\n![Table3-1.jpg](img/Table3-1.jpg)\n\n`WordList`应用中的`zyzzyvasUsingNSExpression`方法创建了两个单值表达式：一个使用键路径，另一个使用常量表达式。`expressionText`表达式解析为`Word`实体中键路径`\"\
  text\"`所存储的值。\n\n```objectivec\nNSExpression *expressionText = [NSExpression expressionForKeyPath:@\"\
  text\"]; // Objective-C\n```\n\n```swift\nlet expressionText = NSExpression(forKeyPath:\
  \ \"text\") // Swift\n```\n\n常量值表达式`expressionZyzzyvas`代表常量值`\"zyzzyvas\"`。\n\n\
  ```objectivec\nNSExpression *expressionZyzzyvas = [NSExpression expressionForConstantValue:@\"\
  zyzzyvas\"]; // Objective-C\n```\n\n```swift\nlet expressionZyzzyvas = NSExpression(forConstantValue:\
  \ \"zyzzyvas\") // Swift\n```\n\n在使用 Core Data 时，你可能不常（甚至完全不会）用到被求值对象类型。被求值对象类型指的是`NSManagedObject`实例本身，而通常你会想要查询对象的属性和关系，而不是对象本身。我们可以做一些事情，比如查询特定的对象\
  \ ID，这可能会满足你应用的某些特殊需求。其余用法留给读者自行探索。\n\n## 创建集合表达式\n\n单值表达式允许谓词将对象与单个值进行比较，以决定是否包含在结果集中。然而，有时你可能希望将对象与多个值进行比较，以决定是否包含它们。集合表达式包含多个`NSExpression`实例，谓词使用这些实例进行计算。在本节中，我们研究聚合表达式类型，你可以使用`NSExpression`的`+expressionForAggregate:`静态初始化方法（Objective-C\
  \ 中）或`init(forAggregate collection: [AnyObject]!)`初始化方法（Swift 中）来创建它。\n\n尽管 Apple\
  \ 关于`NSExpression`的文档指出“Core Data 不支持聚合表达式”，但在实践中这并不总是正确的。例如，假设我们想要检索字母数在 20 到 25\
  \ 之间（包含两端）的单词。我们将创建两个`NSExpression`实例，一个用于常量值 20，一个用于常量值 25，然后创建一个包含这两个实例的聚合表达式。接着，我们将在谓词中使用该聚合表达式。代码清单\
  \ 3-28 展示了如何在 Objective-C 中创建该聚合表达式，而代码清单 3-29 展示了如何在 Swift 中创建。\n\n***代码清单 3-28***.\
  \ 在 Objective-C 中创建聚合表达式\n\n```objectivec\nNSExpression *lower = [NSExpression expressionForConstantValue:@20];\n\
  NSExpression *upper = [NSExpression expressionForConstantValue:@25];\nNSExpression\
  \ *expr  = [NSExpression expressionForAggregate:@[lower, upper]];\n```\n\n\n\n###\
  \ 排版后的内容\n\n***清单 3-29***. 在 Swift 中创建聚合表达式\n\n```\nlet lower = NSExpression(forConstantValue:\
  \ 20)\nlet upper = NSExpression(forConstantValue: 25)\nlet expr  = NSExpression(forAggregate:\
  \ [lower, upper])\n```\n\n要将其整合到 WordList 应用中，请添加清单 3-30 中所示的 Objective-C 方法，或清单\
  \ 3-31 中所示的 Swift 函数。该方法/函数接受一个范围（`NSRange` 实例），并统计长度在该范围内的单词数量。然后，在 `statistics`\
  \ 方法中添加对该方法/函数的调用。\n\n```\n[string appendString:[self wordCountForRange:NSMakeRange(20,\
  \ 25)]]; // Objective-C\nstring.appendString(wordCountForRange(NSMakeRange(20, 25)))\
  \ // Swift\n```\n\n***清单 3-30***. 使用聚合表达式查找长度在指定范围内的单词 (Objective-C)\n\n```\n- (NSString\
  \ *)wordCountForRange:(NSRange)range {\n  NSExpression *length = [NSExpression expressionForKeyPath:@\"\
  length\"];\n  NSExpression *lower = [NSExpression expressionForConstantValue:@(range.location)];\n\
  \  NSExpression *upper = [NSExpression expressionForConstantValue:@(range.length)];\n\
  \  NSExpression *expr = [NSExpression expressionForAggregate:@[lower, upper]];\n\
  \  NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:length\n\
  \                                              rightExpression:expr\n          \
  \                                modifier:NSDirectPredicateModifier\n          \
  \                                    type:NSBetweenPredicateOperatorType\n     \
  \                                      options:0];\n  NSLog(@\"聚合谓词: %@\", [predicate\
  \ predicateFormat]);\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Word\"];\n  fetchRequest.predicate = predicate;\n  NSUInteger count = [self.managedObjectContext\
  \ countForFetchRequest:fetchRequest error:nil];\n  return [NSString stringWithFormat:@\"\
  %lu-%lu 字母的单词数量: %lu\\n\", range.location, range.length, count];\n}\n```\n\n***清单\
  \ 3-31***. 使用聚合表达式查找长度在指定范围内的单词 (Swift)\n\n```\nfunc wordCountForRange(range: NSRange)\
  \ -> String {\n    let length = NSExpression(forKeyPath: \"length\")\n    let lower\
  \ = NSExpression(forConstantValue: range.location)\n    let upper = NSExpression(forConstantValue:\
  \ range.length)\n    let expr = NSExpression(forAggregate: [lower, upper])\n   \
  \ let predicate = NSComparisonPredicate(leftExpression: length, rightExpression:\
  \ expr, modifier: .DirectPredicateModifier, type: .BetweenPredicateOperatorType,\
  \ options: nil)\n\nprintln(\"聚合谓词: \\(predicate.predicateFormat)\")\n\nvar fetchRequest\
  \ = NSFetchRequest(entityName: \"Word\")\n    fetchRequest.predicate = predicate\n\
  \nvar error: NSError? = nil\n    let count = self.managedObjectContext!.countForFetchRequest(fetchRequest,\
  \ error: &error)\n\nreturn \"\\(range.location)-\\(range.length) 字母的单词数量: \\(count)\\\
  n\"\n}\n```\n\n下一节“使用不同谓词类型比较表达式”将介绍不同的谓词类型，包括 `NSBetweenPredicateOperatorType`。\n\
  \n运行 WordList 应用后，你应该在输出中看到如下所示的一行：\n\n```\n20-25 字母的单词数量: 276\n```\n\n在 Xcode 控制台中，你还可以看到谓词的查询语言将两个常量值合并到了一个\
  \ `BETWEEN` 子句中，正如我们所预期的那样。\n\n```\nlength BETWEEN {20, 25}\n```\n\n### 使用不同谓词类型比较表达式\n\
  \n除了表达式之外，谓词还需要比较器来评估是否将对象包含在其结果集中。`NSComparisonPredicate` 类是 `NSPredicate` 的子类，它使用你在创建时指定的比较器类型来比较两个表达式。例如，你可以要求两个表达式相等，以便将评估的对象包含在结果集中。我们在将\
  \ `Word` 对象与常量表达式 \"zyzzyvas\" 进行比较时看到了这一点：只有文本完全匹配的单词才会被返回。\n\n我们还在 `wordCountForRange:`\
  \ 方法中看到了一个“介于”类型的比较器，该方法要求单词的长度介于两个整数之间才能包含在结果集中。`NSComparisonPredicate` 还提供了其他多种比较类型，以满足不同的比较需求。请参阅表\
  \ 3-2 以了解比较类型的列表。查询语言和逻辑描述列分别使用 `L` 和 `R` 来表示正在比较的左表达式和右表达式。Swift 类型与 Objective-C\
  \ 类型相同，只是 Objective-C 类型以 `NS` 开头，而 Swift 类型则没有。\n\n表 3-2. 比较类型\n\n| Objective-C\
  \ 或 Swift 类型 | 查询语言 | 逻辑描述 |\n| --- | --- | --- |\n| `(NS)LessThanPredicateOperatorType`\
  \ | `L < R` | `L` 小于 `R` |\n| `(NS)LessThanOrEqualToPredicateOperatorType` | `L\
  \ <= R` | `L` 小于或等于 `R` |\n| `(NS)GreaterThanPredicateOperatorType` | `L > R` |\
  \ `L` 大于 `R` |\n| `(NS)GreaterThanOrEqualToPredicateOperatorType` | `L >= R` | `L`\
  \ 大于或等于 `R` |\n| `(NS)EqualToPredicateOperatorType` | `L = R` | `L` 等于 `R` |\n|\
  \ `(NS)NotEqualToPredicateOperatorType` | `L != R` | `L` 不等于 `R` |\n| `(NS)MatchesPredicateOperatorType`\
  \ | `L MATCHES R` | `L` 匹配 `R` 正则表达式 |\n| `(NS)LikePredicateOperatorType` | `L LIKE\
  \ R` | `L = R`，其中 `R` 可以包含 * 通配符 |\n| `(NS)BeginsWithPredicateOperatorType` | `L\
  \ BEGINSWITH R` | `L` 以 `R` 开头 |\n| `(NS)EndsWithPredicateOperatorType` | `L ENDSWITH\
  \ R` | `L` 以 `R` 结尾 |\n| `(NS)InPredicateOperatorType` | `L IN R` | `L` 在集合 `R`\
  \ 中 |\n| `(NS)ContainsPredicateOperatorType` | `L CONTAINS R` | `L` 是一个包含 `R` 的集合\
  \ |\n| `(NS)BetweenPredicateOperatorType` | `L BETWEEN R` | `L` 是介于数组 `R` 中两个值之间的一个值\
  \ |\n\n**注意**：`NSLikePredicateOperatorType` 是 `NSMatchesPredicateOperatorType` 的简化版本。`NSMatchesPredicateOperatorType`\
  \ 可以使用复杂的正则表达式，而 `NSLikePredicateOperatorType` 则使用简单的通配符替换字符 (*)，因此表达式文本 `LIKE 'b*ball'`\
  \ 将匹配 baseball 和 basketball，但不会匹配 football。\n\n例如，我们可以使用 `NSEndsWithPredicateOperatorType`\
  \ 来查找所有以字母 \"gry\" 结尾的单词。清单 3-32 展示了 Objective-C 中的 `endsWithGryWords` 方法，清单 3-33\
  \ 则展示了相应的 Swift 版本。别忘了在你的 `statistics` 方法中添加对该方法的调用，然后构建并运行应用，你将看到 \"puggry, hungry,\
  \ angry\"（顺序不定）被添加到输出中。\n\n***清单 3-32***. Objective-C 中的 `endsWithGryWords` 方法\n\
  \n\n\n\n```\n- (NSString *)endsWithGryWords {\n  NSExpression *text = [NSExpression\
  \ expressionForKeyPath:@\"text\"];\n  NSExpression *gry = [NSExpression expressionForConstantValue:@\"\
  gry\"];\n  NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:text\n\
  \                                                              rightExpression:gry\n\
  \                                                                  modifier:NSDirectPredicateModifier\n\
  \                                                                      type:NSEndsWithPredicateOperatorType\n\
  \                                                                   options:0];\n\
  \  NSLog(@\"Predicate: %@\", [predicate predicateFormat]);\n  NSFetchRequest *fetchRequest\
  \ = [NSFetchRequest fetchRequestWithEntityName:@\"Word\"];\n  fetchRequest.predicate\
  \ = predicate;\n  NSArray *gryWords = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  return [NSString stringWithFormat:@\"-gry words: %@\\n\",\n   \
  \       [[gryWords valueForKey:@\"text\"] componentsJoinedByString:@\",\"]];\n}\n\
  ```\n\n***示例 3-33***. Swift 中的 `endsWithGryWords` 方法\n\n```\nfunc endsWithGryWords()\
  \ -> String {\n    let text = NSExpression(forKeyPath: \"text\")\n    let gry =\
  \ NSExpression(forConstantValue: \"gry\")\n    let predicate = NSComparisonPredicate(leftExpression:\
  \ text, rightExpression: gry, modifier: .DirectPredicateModifier, type: .EndsWithPredicateOperatorType,\
  \ options: nil)\n\nprintln(\"Predicate: \\(predicate.predicateFormat)\")\n\nvar\
  \ fetchRequest = NSFetchRequest(entityName: \"Word\")\n    fetchRequest.predicate\
  \ = predicate\n\nlet list = NSMutableString()\nvar error: NSError? = nil\n    if\
  \ let gryWords = self.managedObjectContext!.executeFetchRequest(fetchRequest, error:\
  \ &error) {\n        for word in gryWords {\n            list.appendString(((word\
  \ as NSManagedObject).valueForKey(\"text\") as String)+\",\")\n        }\n    }\n\
  \    return \"-gry words: \\(list)\\n\"\n}\n```\n\n你可以在 Xcode 控制台中看到该谓词对应的查询语言为：\n\
  \n```\ntext ENDSWITH \"gry\"\n```\n\n## 使用不同的比较修饰符\n\n我们一直在使用的 `NSComparisonPredicate`\
  \ 静态初始化方法的第三个参数是 `modifier`，并且一直只传入了 `NSDirectPredicateModifier`。然而，如果左表达式是一个集合而非单个对象，你还有更多修饰符可以选择，如表\
  \ 3-3 所示。与谓词类型常量类似，Objective-C 常量以 `NS` 开头，而 Swift 常量则不然。\n\n表 3-3. 比较谓词修饰符\n\n\
  | 修饰符 | 查询语言示例 | 描述 |\n| --- | --- | --- |\n| `(NS)DirectPredicateModifier` | `X`\
  \ | 将左表达式直接与右表达式进行比较 |\n| `(NS)AllPredicateModifier` | `ALL X` | 将左表达式（一个集合）与右表达式进行比较，仅当所有值都匹配时才返回\
  \ `YES` |\n| `(NS)AnyPredicateModifier` | `ANY X` | 将左表达式（一个集合）与右表达式进行比较，只要有任何值匹配就返回\
  \ `YES` |\n\n如上表所示，常量 `NSAllPredicateModifier` 对应查询语言表达式 `ALL X`，并且仅当集合中的所有值都与谓词匹配时才返回\
  \ `YES`，否则返回 `NO`。另一方面，常量 `NSAnyPredicateModifier` 对应 `ANY X`，只要集合中至少有一个值与谓词匹配就返回\
  \ `YES`，否则返回 `NO`。\n\n还记得本章前面我们提到 Apple 文档声称 Core Data 不支持聚合表达式吗？对于 `NSAllPredicateModifier`\
  \ 来说，这确实是事实。如果你尝试运行一个 `ALL X` 的查询，你的应用将会崩溃。不过，你可以使用 `NSAnyPredicateModifier`，正如示例\
  \ 3-34（Objective-C）和示例 3-35（Swift）中展示的 `anyWordContainsZ` 方法所示。该方法列出所有其中包含字母 \"\
  z\" 的单词所属的分类。在 `statistics` 中添加该方法并调用它，构建并运行应用，你将看到除了 \"x\" 之外的所有分类都至少有一个单词包含字母\
  \ \"z\"。\n\n***示例 3-34***. `anyWordContainsZ` 方法（Objective-C）\n\n```\n- (NSString\
  \ *)anyWordContainsZ {  NSExpression *text = [NSExpression expressionForKeyPath:@\"\
  words.text\"];\n  NSExpression *z = [NSExpression expressionForConstantValue:@\"\
  z\"];\n  NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:text\n\
  \                                                              rightExpression:z\n\
  \                                                                  modifier:NSAnyPredicateModifier\n\
  \                                                                      type:NSContainsPredicateOperatorType\n\
  \                                                                   options:0];\n\
  \  NSLog(@\"Predicate: %@\", [predicate predicateFormat]);\n  NSFetchRequest *fetchRequest\
  \ = [NSFetchRequest fetchRequestWithEntityName:@\"WordCategory\"];\n  fetchRequest.predicate\
  \ = predicate;\n  NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  return [NSString stringWithFormat:@\"ANY: %@\\n\",\n         [[categories\
  \ valueForKey:@\"firstLetter\"] componentsJoinedByString:@\",\"]];\n}\n```\n\n***示例\
  \ 3-35***. `anyWordContainsZ` 方法（Swift）\n\n```\nfunc anyWordContainsZ() -> String\
  \ {\n    let text = NSExpression(forKeyPath: \"words.text\")\n    let z = NSExpression(forConstantValue:\
  \ \"z\")\n    let predicate = NSComparisonPredicate(leftExpression: text, rightExpression:\
  \ z, modifier:.AnyPredicateModifier, type: .ContainsPredicateOperatorType, options:\
  \ nil)\n\nprintln(\"Predicate: \\(predicate.predicateFormat)\")\n\nvar fetchRequest\
  \ = NSFetchRequest(entityName: \"WordCategory\")\n    fetchRequest.predicate = predicate\n\
  \nlet list = NSMutableString()\n    var error: NSError? = nil\n    if let categories\
  \ = self.managedObjectContext!.executeFetchRequest(fetchRequest, error: &error)\
  \ {\n        for word in categories {\n            list.appendString(((word as NSManagedObject).valueForKey(\"\
  firstLetter\") as String)+\",\")\n        }\n    }\n\nreturn \"ANY: \\(list)\\n\"\
  \n}\n```\n\n## 使用不同的选项\n\n`NSComparisonPredicate` 静态初始化方法的最后一个参数是 `options`，我们之前一直简单地传递了\
  \ `0`（Swift 中为 `NSComparisonPredicatOptions.convertFromNilLiteral()`）。实际上，对于字符串比较运算符，你还有另外四个可选值。每个选项在查询语言中都有一个对应的代码，你可以通过在运算符后紧跟方括号内的代码来使用它们。表\
  \ 3-4 列出了可用的选项、代码以及如何在查询语言中使用它们。同样，Objective-C 的选项以 `NS` 开头，而 Swift 的则不然。\n\n表 3-4.\
  \ 字符串比较选项\n\n![Table3-4.jpg](img/Table3-4.jpg)\n\n你可以使用按位或标志（bitwise OR）来指定多个选项，或在查询语言中将多个代码组合在一起。例如，要同时进行不区分大小写和不区分变音符号的比较，你可以为\
  \ `options` 参数传递：\n\n```\nNSCaseInsensitivePredicateOption | NSDiacriticInsensitivePredicateOption\n\
  ```\n\n使用查询语言时，你可以像下面这样操作：\n\n```\n\"È\" =[cd] \"e\"\n```\n\n\n\n尽管我们的单词列表中不包含任何重音或非英文字符，但我们仍然可以验证不区分大小写的选项是否有效。创建一个名为`caseInsensitiveFetch:`的新方法，该方法接受一个`NSString`参数。在该方法中，将字符串转换为大写，然后使用`NSCaseInsensitivePredicateOption`选项来获取单词。代码清单\
  \ 3-36（Objective-C）和代码清单 3-37（Swift）展示了你的方法或函数应有的样子。\n\n***代码清单 3-36***. `caseInsensitiveFetch:`\
  \ 方法（Objective-C）\n\n```\n- (NSString *)caseInsensitiveFetch:(NSString *)word {\n\
    NSExpression *text = [NSExpression expressionForKeyPath:@\"text\"];\n  NSExpression\
  \ *allCapsWord = [NSExpression expressionForConstantValue:[word uppercaseString]];\n\
    NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:text\n\
                                                                rightExpression:allCapsWord\n\
                                                          modifier:NSDirectPredicateModifier\n\
                                                              type:NSEqualToPredicateOperatorType\n\
                                                           options:NSCaseInsensitivePredicateOption];\n\
    NSLog(@\"Predicate: %@\", [predicate predicateFormat]);\n  NSFetchRequest *fetchRequest\
  \ = [NSFetchRequest fetchRequestWithEntityName:@\"Word\"];\n  fetchRequest.predicate\
  \ = predicate;\n  NSArray *words = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  return [NSString stringWithFormat:@\"%@\\n\", words.count == 0 ?\
  \ @\"\" : [words[0] valueForKey:@\"text\"]];\n}\n```\n\n***代码清单 3-37***. `caseInsensitiveFetch:`\
  \ 函数（Swift）\n\n```\nfunc caseInsensitiveFetch(word: String) -> String {\n    let\
  \ text = NSExpression(forKeyPath: \"text\")\n    let allCapsWord = NSExpression(forConstantValue:\
  \ word.uppercaseString)\n    let predicate = NSComparisonPredicate(leftExpression:\
  \ text, rightExpression: allCapsWord, modifier: .DirectPredicateModifier, type:\
  \ .EqualToPredicateOperatorType, options: .CaseInsensitivePredicateOption)\n\nprintln(\"\
  Predicate: \\(predicate.predicateFormat)\")\n\nvar fetchRequest = NSFetchRequest(entityName:\
  \ \"Word\")\n    fetchRequest.predicate = predicate\n\nvar error: NSError? = nil\n\
      if let words = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error) {\n        if words.isEmpty { return \"\" }\n        else {\n            let\
  \ word: AnyObject! = words[0].valueForKey(\"text\")\n            return \"\\(word)\\\
  n\"\n        }\n    }\n    else { return \"\" }\n}\n```\n\n然后，在你的`statistics`方法中添加对该方法的调用，并传入你选择的单词，如下所示：\n\
  \n```\n[string appendString:[self caseInsensitiveFetch:@\"qiviut\"]]; // Objective-C\n\
  string.appendString(caseInsensitiveFetch(\"qiviut\")) // Swift\n```\n\n你应该会在 Xcode\
  \ 控制台中看到查询语言的等效表示，并且在 WordList 显示区域看到你的单词。查询语言的等效表示如下所示：\n\n```\ntext ==[c] \"QIVIUT\"\
  \n```\n\n## 汇总：使用复合谓词\n\n目前我们使用的都是单一条件的谓词，无论是查找属于某个类别的单词，还是匹配特定文本的单词。然而，为了提取真正需要的数据，你通常需要组合多个条件。你可以通过使用逻辑运算符\
  \ OR、AND 和 NOT 来组合多个子谓词，从而形成谓词。例如，你可能想要查找所有以“-ing”结尾的 20 字母单词，或者包含“q”但不包含“u”的单词。对于这类谓词，你需要多个条件。\n\
  \nCore Data 允许你使用 `NSCompoundPredicate` 类来构建复合谓词。你可以使用表 3-5 中所示的三个静态初始化器之一（在 Swift\
  \ 中对应同名的函数）来构建它们。\n\n表 3-5. 用于创建复合谓词的静态初始化器\n\n| 初始化器名称 | 查询语言示例 | 描述 |\n| --- |\
  \ --- | --- |\n| `+andPredicateWithSubpredicates:` | `P1 AND P2 AND P3` | 仅当所有子谓词都返回\
  \ `YES` 时返回 `YES` |\n| `+orPredicateWithSubpredicates:` | `P1 OR P2 OR P3` | 只要至少一个子谓词返回\
  \ `YES` 就返回 `YES` |\n| `+notPredicateWithSubpredicate:` | `NOT P` | 当其唯一的子谓词返回 `NO`\
  \ 时返回 `YES` |\n\n要获取以“-ing”结尾的 20 字母单词列表，创建一个名为`twentyLetterWordsEndingInIng`的方法，如代码清单\
  \ 3-38（Objective-C）和代码清单 3-39（Swift）所示，并在`statistics`方法中添加对该方法的调用。这段代码创建了一个谓词，用于比较每个单词的长度是否为\
  \ 20。它创建了另一个谓词，用于比较每个单词的结尾是否为“-ing”。然后，它使用逻辑运算符 AND 组合这两个谓词，创建一个复合谓词。\n\n***代码清单\
  \ 3-38***. 在 Objective-C 中使用复合谓词\n\n```\n- (NSString *)twentyLetterWordsEndingInIng\
  \ {\n  // 创建一个谓词，比较长度是否为 20\n  NSExpression *length = [NSExpression expressionForKeyPath:@\"\
  length\"];\n  NSExpression *twenty = [NSExpression expressionForConstantValue:@20];\n\
    NSPredicate *predicateLength = [NSComparisonPredicate predicateWithLeftExpression:length\n\
                                                                  rightExpression:twenty\n\
                                                              modifier:NSDirectPredicateModifier\n\
                                                                  type:NSEqualToPredicateOperatorType\n\
                                                               options:0];\n\n// 创建一个谓词，比较文本是否以\
  \ \"-ing\" 结尾\n  NSExpression *text = [NSExpression expressionForKeyPath:@\"text\"\
  ];\n  NSExpression *ing = [NSExpression expressionForConstantValue:@\"ing\"];\n\
    NSPredicate *predicateIng = [NSComparisonPredicate predicateWithLeftExpression:text\n\
                                                                 rightExpression:ing\n\
                                                             modifier:NSDirectPredicateModifier\n\
                                                                 type:NSEndsWithPredicateOperatorType\n\
                                                              options:0];\n\n// 组合谓词\n\
    NSPredicate *predicate = [NSCompoundPredicate andPredicateWithSubpredicates:@[predicateLength,\
  \ predicateIng]];\n  NSLog(@\"Compound predicate: %@\", [predicate predicateFormat]);\n\
  \nNSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Word\"];\n  fetchRequest.predicate = predicate;\n  NSArray *words = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n  return [NSString stringWithFormat:@\"\
  %@\\n\", [[words valueForKey:@\"text\"] componentsJoinedByString:@\",\"]];\n}\n\
  ```\n\n***代码清单 3-39***. 在 Swift 中使用复合谓词\n\n```\nfunc twentyLetterWordsEndingInIng()\
  \ -> String {\n    // 创建一个谓词，比较长度是否为 20\n    let length = NSExpression(forKeyPath:\
  \ \"length\")\n    let twenty = NSExpression(forConstantValue: 20)\n    let predicateLength\
  \ = NSComparisonPredicate(leftExpression: length, rightExpression: twenty, modifier:\
  \ .DirectPredicateModifier, type: .EqualToPredicateOperatorType, options: nil)\n\
  \n// 创建一个谓词，比较文本是否以 \"-ing\" 结尾\n    let text = NSExpression(forKeyPath: \"text\"\
  )\n    let ing = NSExpression(forConstantValue: \"ing\")\n    let predicateIng = NSComparisonPredicate(leftExpression:\
  \ text, rightExpression: ing, modifier: .DirectPredicateModifier, type: .EndsWithPredicateOperatorType,\
  \ options: nil)\n\n// 组合谓词\n    let predicate = NSCompoundPredicate.andPredicateWithSubpredicates([predicateLength,\
  \ predicateIng])\n\nprintln(\"Compound predicate: \\(predicate.predicateFormat)\"\
  )\n```\n\n\n\n`var fetchRequest = NSFetchRequest(entityName: \"Word\")`  \n`fetchRequest.predicate\
  \ = predicate`  \n\n`let list = NSMutableString()`  \n`var error: NSError? = nil`\
  \  \n`if let words = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error) {`  \n`for word in words {`  \n`list.appendString(((word as NSManagedObject).valueForKey(\"\
  text\") as String)+\",\")`  \n`}`  \n`}`  \n\n`return \"\\(list)\\n\"`  \n`}`  \n\
  \n构建并运行 `WordList` 后，你会在 `WordList` 界面中看到四个以 \"-ing\" 结尾的、长度为 20 个字母的单词。同时，你也会在\
  \ Xcode 控制台中看到对应的查询语言，内容如下：\n\n```  \nlength == 20 AND text ENDSWITH \"ing\"  \n\
  ```  \n\n当你需要根据多个条件过滤数据以获取所需结果时，请记得将多个谓词组合成一个复合谓词，并让 Core Data 替你完成所有条件的应用工作。另外，如果你构建了前面提到的复合谓词，用于查找包含\
  \ \"q\" 但不包含 \"u\" 的单词，你会看到匹配的 21 个单词。\n\n### 聚合\n\n聚合数据是指使用集合运算符对集合进行全局统计。集合运算符是键值编码（Key-Value\
  \ Coding）范式的一部分，可以添加到键路径中以指示应当执行聚合操作。使用这些聚合运算符的语法如下：\n\n```  \n(key path to collection).@(operator).(key\
  \ path to argument property)  \n```  \n\n例如，要引用单词列表中单词的平均长度，你可以这样写：\n\n```  \nwords.@avg.length\
  \  \n```  \n\n苹果官方文档将这些运算符称为集合和数组运算符，因为它们可以用于任何集合，而不仅仅是 Core Data 的结果集。你也可以将它们用作谓词的一部分；例如，要获取所有包含超过\
  \ 10,000 个单词的类别，你可以使用包含查询语言的谓词：\n\n```  \nwords.@count > 10000  \n```  \n\n表 3-6\
  \ 列出了这些运算符，它们在 Objective-C 或 Swift 中是相同的。\n\n**表 3-6.** 聚合运算符\n\n| 运算符 | 常量 | 描述\
  \ |\n| --- | --- | --- |\n| avg | `NSAverageKeyValueOperator` | 计算集合中参数属性的平均值 |\n\
  | count | `NSCountKeyValueOperator` | 计算集合中的项目数量（不使用参数属性） |\n| min | `NSMinimumKeyValueOperator`\
  \ | 计算集合中参数属性的最小值 |\n| max | `NSMaximumKeyValueOperator` | 计算集合中参数属性的最大值 |\n| sum\
  \ | `NSSumKeyValueOperator` | 计算集合中参数属性的总和 |\n\n### 使用 `@count` 获取计数\n\n`@count`\
  \ 函数返回符合谓词的对象数量。我们可以利用它来返回包含大量单词（这里我们将阈值设定为超过 10,000）的首字母列表，如前所述。我们设置的用于检索这些数据的抓取请求，目标是\
  \ `Category` 实体，并获取那些 `word` 关系计数超过 10,000 的 `category` 对象。这样我们就得到了那些作为超过 10,000\
  \ 个单词开头的首字母。\n\n我们使用查询语言来设置这个谓词，如代码清单 3-40（Objective-C）和代码清单 3-41（Swift）中所示的 `highCountCategories`\
  \ 方法。\n\n***代码清单 3-40.** 在 Objective-C 中使用 `@count` 函数*\n\n```  \n- (NSString *)highCountCategories\
  \ {  \nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"words.@count\
  \ > %d\", 10000];  \nNSLog(@\"Predicate: %@\", [predicate predicateFormat]);  \n\
  \nNSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  WordCategory\"];  \nfetchRequest.predicate = predicate;  \nNSArray *categories =\
  \ [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];  \nreturn\
  \ [NSString stringWithFormat:@\"High count categories: %@\\n\",  \n[[categories\
  \ valueForKey:@\"firstLetter\"] componentsJoinedByString:@\",\"]];  \n}  \n``` \
  \ \n\n***代码清单 3-41.** 在 Swift 中使用 `@count` 函数*\n\n```  \nfunc highCountCategories()\
  \ -> String {  \nlet predicate = NSPredicate(format: \"words.@count > %d\", argumentArray:\
  \ [10000])  \nprintln(\"Predicate: \\(predicate.predicateFormat)\")  \n\nvar fetchRequest\
  \ = NSFetchRequest(entityName: \"WordCategory\")  \nfetchRequest.predicate = predicate\
  \  \n\nlet list = NSMutableString()  \nvar error: NSError? = nil  \nif let categories\
  \ = self.managedObjectContext!.executeFetchRequest(fetchRequest, error: &error)\
  \ {  \nfor word in categories {  \nlist.appendString(((word as NSManagedObject).valueForKey(\"\
  firstLetter\") as String)+\",\")  \n}  \n}  \n\nreturn \"High count categories:\
  \ \\(list)\\n\"  \n}  \n```  \n\n这段代码创建了一个谓词，用于检查 `words` 关系的计数是否大于 10,000，然后为 `WordCategory`\
  \ 实体创建一个使用该谓词的抓取请求。最后，它以逗号分隔的列表形式返回符合条件的首字母。\n\n在 `statistics` 方法中添加对此方法的调用。然后，构建并运行应用程序，即可看到包含超过\
  \ 10,000 个单词的首字母：a, c, d, p, r 和 s。\n\n### 获取所有单词的平均长度——两种方法\n\n直接在集合上使用聚合运算符非常直接：先使用\
  \ Core Data 抓取请求获取数据，然后应用运算符。例如，代码清单 3-42（Objective-C）和代码清单 3-43（Swift）演示了如何直接检索平均单词长度。\n\
  \n***代码清单 3-42.** 从集合中获取平均单词长度（Objective-C）*\n\n```  \n- (NSString *)averageWordLengthFromCollection\
  \ {  \nNSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Word\"];  \nNSArray *words = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];  \nreturn [NSString stringWithFormat:@\"Average from collection: %.2f\\\
  n\",  \n[[words valueForKeyPath:@\"@avg.length\"] floatValue]];  \n}  \n```  \n\n\
  ***代码清单 3-43.** 从集合中获取平均单词长度（Swift）*\n\n```  \nfunc averageWordLengthFromCollection()\
  \ -> String {  \nvar fetchRequest = NSFetchRequest(entityName: \"Word\")  \n\nvar\
  \ error: NSError? = nil  \nlet words = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error)  \n\nvar formattedAverage = \"0\"  \nif let words = words {  \n\
  if let avg = (words as NSArray).valueForKeyPath(\"@avg.length\") as? Float {  \n\
  let format = \".2\"  \nformattedAverage = avg.format(format)  \n}  \n}  \nreturn\
  \ \"Average from collection: \\(formattedAverage)\\n\"  \n}  \n```  \n\n这段代码获取了所有单词，然后使用以下代码应用\
  \ `@avg` 运算符：\n\n```  \n[words valueForKeyPath:@\"avg.length\"] // Objective-C \
  \ \n(words as NSArray).valueForKeyPath(\"@avg.length\") as Float // Swift  \n```\
  \  \n\n在 `statistics` 方法中添加对此方法的调用，然后运行它，可以看到平均长度为 9.09 个字符。\n\n\n\n然而，你会发现这是在用简单性换取效率。这段代码读取了所有单词，然后计算了平均长度。我们可以改用`NSExpression`和另一个类`NSExpressionDescription`，仅通过\
  \ Core Data 来获取平均值。首先，我们使用`NSExpression`提供的另一个 Objective-C 静态初始化方法：`+expressionForFunction:arguments:`，它接收一个预定义的函数名称和一个`NSExpression`对象数组。Swift\
  \ 对应的写法类似：格式为`init(forFunction name: String!, arguments parameters: [AnyObject]!)`的函数，同样接收一个预定义的函数名称和一个`NSExpression`对象数组。\n\
  \n这些预定义的函数名称与聚合函数名称相似，但并不完全一致。Apple 提供的文档列出了所有函数，但我们只重点介绍表 3-7 中展示的几个。\n\n表 3-7.\
  \ `+expressionForFunction:arguments:` 的部分预定义函数\n\n| 函数名称 | 描述 |\n| --- | --- |\n\
  | `average:` | 返回数组中数值的平均值 |\n| `sum:` | 返回数组中数值的总和 |\n| `count:` | 返回数组中数值的个数 |\n\
  | `min:` | 返回数组中的最小值 |\n| `max:` | 返回数组中的最大值 |\n\n由于我们需要平均单词长度，因此使用`average:`预定义函数，并传入一个代表单词`length`属性的`NSExpression`对象。代码清单\
  \ 3-44 展示了 Objective-C 代码，代码清单 3-45 展示了用于创建该表达式的 Swift 代码。\n\n***代码清单 3-44***. 使用`+expressionForFunction:arguments:`创建`NSExpression`\n\
  \n```\nNSExpression *length = [NSExpression expressionForKeyPath:@\"length\"];\n\
  NSExpression *average = [NSExpression expressionForFunction:@\"average:\" arguments:@[length]];\n\
  ```\n\n***代码清单 3-45***. 使用`init(forFunction name: String!, arguments parameters:\
  \ [AnyObject]!)`创建`NSExpression`\n\n```\nlet length = NSExpression(forKeyPath: \"\
  length\")\nlet average = NSExpression(forFunction: \"average:\", arguments: [length])\n\
  ```\n\n接下来，我们设置一个`NSExpressionDescription`实例，来描述我们想从 Core Data 存储中获取的内容。`NSExpressionDescription`表示\
  \ Core Data 实体上的一个属性，这个属性实际上并不出现在 Core Data 模型中，这对于获取平均值的表达式来说非常完美（因为它实际上并不存在于我们的模型中）。作为一个属性，`NSExpressionDescription`拥有名称、类型和一个表达式。代码清单\
  \ 3-46（Objective-C）和代码清单 3-47（Swift）展示了如何创建用于获取单词长度平均值的`NSExpressionDescription`。\n\
  \n***代码清单 3-46***. 为单词长度平均值创建`NSExpressionDescription`（Objective-C）\n\n```\nNSExpressionDescription\
  \ *averageDescription = [[NSExpressionDescription alloc] init];\naverageDescription.name\
  \ = @\"average\";\naverageDescription.expression = average;\naverageDescription.expressionResultType\
  \ = NSFloatAttributeType;\n```\n\n***代码清单 3-47***. 为单词长度平均值创建`NSExpressionDescription`（Swift）\n\
  \n```\nvar averageDescription = NSExpressionDescription()\naverageDescription.name\
  \ = \"average\"\naverageDescription.expression = average\naverageDescription.expressionResultType\
  \ = .FloatAttributeType\n```\n\n最后，我们创建一个获取请求，然后将其`propertiesToFetch`属性设为一个数组，该数组包含我们刚创建的`NSExpressionDescription`。同时，我们将获取请求的`resultType`属性设为字典类型，以便通过我们设置的名称`\"\
  average\"`来引用所创建的`NSExpressionDescription`。我们执行获取请求，并从结果字典中提取平均值。代码清单 3-48（Objective-C）和代码清单\
  \ 3-49（Swift）展示了完整的`averageWordLengthFromExpressionDescription`方法。从`statistics`方法中调用该方法并运行，你会发现无论以何种方式获取平均值，结果都是\
  \ 9.09 个字符。\n\n***代码清单 3-48***. 使用表达式描述获取平均单词长度（Objective-C）\n\n```\n- (NSString\
  \ *)averageWordLengthFromExpressionDescription {\n  NSExpression *length = [NSExpression\
  \ expressionForKeyPath:@\"length\"];\n  NSExpression *average = [NSExpression expressionForFunction:@\"\
  average:\" arguments:@[length]];\n\n  NSExpressionDescription *averageDescription\
  \ = [[NSExpressionDescription alloc] init];\n  averageDescription.name = @\"average\"\
  ;\n  averageDescription.expression = average;\n  averageDescription.expressionResultType\
  \ = NSFloatAttributeType;\n\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Word\"];\n  fetchRequest.propertiesToFetch = @[averageDescription];\n  fetchRequest.resultType\
  \ = NSDictionaryResultType;\n  NSArray *results = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n  return [NSString stringWithFormat:@\"Average from expression description:\
  \ %.2f\\n\",\n         [[results[0] valueForKey:@\"average\"] floatValue]];\n}\n\
  ```\n\n***代码清单 3-49***. 使用表达式描述获取平均单词长度（Swift）\n\n```\nfunc averageWordLengthFromExpressionDescription()\
  \ -> String {\n    let length = NSExpression(forKeyPath: \"length\")\n    let average\
  \ = NSExpression(forFunction: \"average:\", arguments: [length])\n\n    var averageDescription\
  \ = NSExpressionDescription()\n    averageDescription.name = \"average\"\n    averageDescription.expression\
  \ = average\n    averageDescription.expressionResultType = .FloatAttributeType\n\
  \n    var fetchRequest = NSFetchRequest(entityName: \"Word\")\n    fetchRequest.propertiesToFetch\
  \ = [averageDescription]\n    fetchRequest.resultType = .DictionaryResultType\n\n\
  \    var error: NSError? = nil\n    let results = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error)\n\n    var formattedAverage = \"0\"\n    if let results = results\
  \ {\n        if let avg = (words as NSArray).valueForKeyPath(\"@avg.length\") as?\
  \ Float {\n            let format = \".2\"\n            formattedAverage = avg.format(format)\n\
  \        }\n    }\n    return \"Average from collection: \\(formattedAverage)\\\
  n\"\n}\n```\n\n## 将函数用作右值\n\n你还可以在谓词的右侧使用函数。例如，假设我们想从单词列表中获取最长单词的文本。我们不能简单地使用`@max(length)`聚合器，因为它返回的是最长单词的长度，而不是最长单词本身。相反，我们想要返回长度等于最大长度值的单词对象，因此谓词通过以下方式将长度与`max:`函数进行比较：\n\
  \n```\nlength = max:(length)\n```\n\n代码清单 3-50（Objective-C）和代码清单 3-51（Swift）展示了使用该谓词的`longestWords`方法（毕竟，可能存在多个长度相同的单词）。通过启用\
  \ SQL 日志记录，你可以看到 Core Data 使用的 SQL 中包含一个内部的`SELECT`语句，正如预期的那样。内部的`SELECT`语句获取单词的最大长度，外部的`SELECT`语句则获取所有具有该长度的单词。\n\
  \n\n\n```\nSELECT 0, t0.Z_PK, t0.Z_OPT, t0.ZLENGTH, t0.ZTEXT, t0.ZWORDCATEGORY FROM\
  \ ZWORD t0 WHERE  t0.ZLENGTH = (SELECT max(t1.ZLENGTH) FROM ZWORD t1)\n```\n\n***列表\
  \ 3-50***. `longestWords:` 方法（Objective-C）\n\n```\n- (NSString *)longestWords {\n\
  \  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Word\"];\n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"length\
  \ = max:(length)\"];\n  NSLog(@\"Predicate: %@\", [predicate predicateFormat]);\n\
  \  fetchRequest.predicate = predicate;\n  NSArray *words = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n  return [NSString stringWithFormat:@\"\
  Longest words: %@\\n\",\n          [[words valueForKey:@\"text\"] componentsJoinedByString:@\"\
  ,\"]];\n}\n```\n\n***列表 3-51***. `longestWords:` 函数（Swift）\n\n```\nfunc longestWords()\
  \ -> String {\n    var fetchRequest = NSFetchRequest(entityName: \"Word\")\n   \
  \ let predicate = NSPredicate(format: \"length = max:(length)\", argumentArray:\
  \ [])\n\nprintln(\"Predicate: \\(predicate.predicateFormat)\")\n\nfetchRequest.predicate\
  \ = predicate\n\nlet list = NSMutableString()\n    var error: NSError? = nil\n \
  \   if let words = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error) {\n        for word in words {\n            list.appendString(((word\
  \ as NSManagedObject).valueForKey(\"text\") as String)+\",\")\n        }\n    }\n\
  \    return \"Longest words: \\(list)\\n\"\n}\n```\n\n在 `statistics` 中添加对此方法的调用并运行\
  \ `WordList` 后，你将看到最长的单词是包含 28 个字母的词语 \"ethylenediaminetetraacetates\"。\n\n## 使用子查询\n\
  \n在某些情况下，你需要根据与其他相关对象相关的条件来获取对象。例如，假设你想获取所有包含至少一个 25 字母单词的词类。不使用子查询，通常你需要分两步获取这些数据。\n\
  \n1.  获取所有词类。\n2.  对每个词类，获取包含 25 个字母的单词数量。\n\n子查询表达式允许你将这些步骤合并为一个查询。你的整个谓词和逻辑可以表示为：\n\
  \n```\nSUBQUERY(words, $x, $x.length == 25).@count > 0\n```\n\n子查询的通用格式为：\n\n```\n\
  SUBQUERY(collection_expression, variable_expression, predicate)\n```\n\n`collection_expression`\
  \ 参数指代你正在获取的实体中的集合属性，因此我们使用 `words` 来引用 `words` 集合。`variable_expression` 可以按需命名；当子查询遍历集合时，该变量将临时保存集合中的每个元素。`predicate`\
  \ 自然是用于判断是否包含在结果集中的测试条件。\n\n与其他表达式类型一样，你可以使用查询语言创建子查询（如前所示），也可以通过 `NSExpression`\
  \ 手动构建。`NSExpression` 类有一个名为 `+expressionForSubQuery:usingIteratorVariable:predicate:`（或\
  \ Swift 中的 `init(forSubquery expression: NSExpression!, usingIteratorVariable variable:\
  \ String!, predicate predicate: AnyObject!)`）的静态初始化方法，用于创建子查询表达式。该方法的参数与查询语言格式相对应：第一个参数是要计算的集合表达式；第二个参数是在迭代过程中使用的临时变量名；最后一个参数是用于评估的谓词。\n\
  \n列表 3-52（Objective-C）和列表 3-53（Swift）中展示的 `wordCategoriesWith25LetterWords` 方法使用前面描述的子查询来获取所有包含至少一个\
  \ 25 字母单词的词类。在你的 `statistics` 方法中添加一个调用，即可看到两个词类 \"i\" 和 \"p\" 都包含至少一个 25 字母的单词。\n\
  \n***列表 3-52***. 在 Objective-C 中使用子查询\n\n```\n- (NSString *)wordCategoriesWith25LetterWords\
  \ {\n  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  WordCategory\"];\n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
  SUBQUERY(words, $x, $x.length = 25).@count > 0\"];\n  fetchRequest.predicate = predicate;\n\
  \  NSLog(@\"Subquery Predicate: %@\", [predicate predicateFormat]);\n  NSArray *categories\
  \ = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];\n  return\
  \ [NSString stringWithFormat:@\"Categories with 25-letter words: %@\\n\",\n    \
  \      [[categories valueForKey:@\"firstLetter\"] componentsJoinedByString:@\",\"\
  ]];\n}\n```\n\n***列表 3-53***. 在 Swift 中使用子查询\n\n```\nfunc wordCategoriesWith25LetterWords()\
  \ -> String {\n    var fetchRequest = NSFetchRequest(entityName: \"WordCategory\"\
  )\n    let predicate = NSPredicate(format: \"SUBQUERY(words, $x, $x.length = 25).@count\
  \ > 0\", argumentArray: [])\n\nprintln(\"Subcategoy predicate: \\(predicate.predicateFormat)\"\
  )\n\nfetchRequest.predicate = predicate\n\nlet list = NSMutableString()\n    var\
  \ error: NSError? = nil\n    if let categories = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error) {\n        for word in categories {\n            list.appendString(((word\
  \ as NSManagedObject).valueForKey(\"firstLetter\") as String)+\",\")\n        }\n\
  \    }\n\nreturn \"Categories with 25-letter words: \\(list)\\n\"\n}\n```\n\n##\
  \ 排序\n\n到目前为止，我们接受 Core Data 按任意顺序返回的获取结果，但实际上 Core Data 允许你为任何获取请求设置排序顺序。你可以选择多个列进行排序，并指定每列的排序方向。要对获取请求进行排序，可将获取请求的\
  \ `sortDescriptors` 属性设置为一组 `NSSortDescriptor` 实例。每个 `NSSortDescriptor` 存储了排序依据的列（或属性）以及排序顺序。\n\
  \n例如，要按长度升序对所有以 \"z\" 开头的单词进行排序，可以像下面这样创建一个 `NSSortDescriptor`：\n\n```\n[NSSortDescriptor\
  \ sortDescriptorWithKey:@\"length\" ascending:YES] // Objective-C\nNSSortDescriptor(key:\
  \ \"length\", ascending: true) // Swift\n```\n\n这将按长度升序对单词进行排序，但相同长度的单词会随意排序。我们可以添加另一个排序描述符，按字母降序对这些单词进行排序，如下所示：\n\
  \n```\n[NSSortDescriptor sortDescriptorWithKey:@\"text\" ascending:NO] // Objective-C\n\
  NSSortDescriptor(key: \"text\", ascending: false) // Swift\n```\n\n在用于设置获取请求的 `sortDescriptors`\
  \ 的数组中，排序描述符的放置顺序至关重要。结果将按照排序描述符的顺序进行排序。在我们的示例中，这意味着相同长度的单词会组合在一起，并按字母降序排列。\n\n\
  列表 3-54（Objective-C）和列表 3-55（Swift）展示了使用这两个排序描述符对以 \"z\" 开头的单词进行排序的 `zWords` 方法。\n\
  \n***列表 3-54***. 在 Objective-C 中对结果进行排序\n\n```\n- (NSString *)zWords {\n  NSFetchRequest\
  \ *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"Word\"];\n  NSPredicate\
  \ *predicate = [NSPredicate predicateWithFormat:@\"text BEGINSWITH 'z'\"];\n  NSSortDescriptor\
  \ *lengthSort = [NSSortDescriptor sortDescriptorWithKey:@\"length\" ascending:YES];\n\
  \  NSSortDescriptor *alphaSort = [NSSortDescriptor sortDescriptorWithKey:@\"text\"\
  \ ascending:NO];\n\nfetchRequest.predicate = predicate;\n  fetchRequest.sortDescriptors\
  \ = @[lengthSort, alphaSort];\n\nNSLog(@\"Predicate: %@\", predicate);\n  NSArray\
  \ *words = [self.managedObjectContext executeFetchRequest:fetchRequest error:nil];\n\
  \  return [NSString stringWithFormat:@\"Z words:\\n%@\\n\",\n          [[words valueForKey:@\"\
  text\"] componentsJoinedByString:@\"\\n\"]];\n}\n```\n\n***列表 3-55***. 在 Swift 中对结果进行排序\n\
  \n\n\n`func zWords() -> String {\n    var fetchRequest = NSFetchRequest(entityName:\
  \ \"Word\")\n    let predicate = NSPredicate(format: \"text BEGINSWITH 'z'\", argumentArray:\
  \ [])\n\n    println(\"Predicate: \\(predicate.predicateFormat)\")\n\n    let lengthSort\
  \ = NSSortDescriptor(key: \"length\", ascending: true)\n    let alphaSort = NSSortDescriptor(key:\
  \ \"text\", ascending: false)\n\n    fetchRequest.predicate = predicate\n    fetchRequest.sortDescriptors\
  \ = [lengthSort, alphaSort]\n\n    let list = NSMutableString()\n    var error:\
  \ NSError? = nil\n    if let words = self.managedObjectContext!.executeFetchRequest(fetchRequest,\
  \ error: &error) {\n        for word in words {\n            list.appendString(((word\
  \ as NSManagedObject).valueForKey(\"text\") as String)+\",\")\n        }\n    }\n\
  \n    return \"Z words: \\(list)\\n\"\n}\n```\n\n记得在`statistics`中添加对`zWords`方法的调用，以观察排序的执行结果。\n\
  \n## 总结\n\n本章或许未能帮你成为更出色的《Words with Friends》玩家，但无疑提升了你在 Core Data 存储中查询数据的能力。无论是使用查询语言语法，还是通过`NSExpression`构建谓词，你都应能编写出满足应用需求的查询语句，从数据存储中提取所需信息。别忘了善用\
  \ SQL 日志记录和打印谓词格式等工具来优化查询，并准确理解应用程序在获取数据时的执行过程。\n\n"
- "# 第 4 章：关注数据质量\n\n如果你一直认真跟随前几章的示例，应该已经对 Core Data 的基础用法相当熟悉。处理错误（无论是系统错误还是用户错误）以及数据填充，是编写高质量应用时必须面对的问题。本章旨在帮助你应对将理论应用于实际应用开发时所遇到的各种现实问题。我们将继续使用第\
  \ 2 章中的 BookStore 应用程序进行探讨。\n\n## 数据填充\n\n我们经常收到的一个问题是如何分发已包含部分数据的持久化存储。例如，许多应用会提供供用户选择的分类值列表，开发者需要将这些值预填入数据存储。解决此问题的方法有多种，包括自行创建\
  \ SQLite 数据库并随应用分发，而非让 Core Data 自行创建数据库。但这种方法存在缺陷，尤其是当应用的未来版本需要扩充此值列表时——你绝不能用一个新的、仅包含更多值的空白数据库文件直接覆盖用户的数据库。\n\
  \n另一种常见方案是使用多个持久化存储：一个用于存放用户数据，另一个则作为仅包含种子数据的静态存储。这种方案可行，但前提是应用不允许用户扩充种子列表。例如，若我们在单独的存储中以静态列表形式为\
  \ BookStore 应用填充分类数据，则无法允许用户添加自己的分类，这会造成极大局限。\n\n如果你一直跟随本书示例操作，其实已经多次预加载过数据存储。回想一下本书中那些没有编辑界面的应用，你是如何向其中输入数据的？没错：通过代码创建托管对象，然后保存托管对象上下文。然而，这种方法本身也存在问题。例如，如果种子数据集非常庞大，应用逐一插入所有记录将耗费大量时间，严重影响用户体验。如果你试用过第\
  \ 3 章中的 WordList 应用，可能会注意到：从列表下载完成到完全插入存储，插入近 17 万个单词就需要数秒时间。\n\n根据经验，我们发现最佳的数据填充方案介于直接使用预填充的后端存储与手动逐行插入之间。本节的剩余部分将围绕这一思路展开：首次运行应用时使用初始种子数据；当应用更新时，由于大部分数据已经存在，可以通过手动方式增量修改该列表。\n\
  \n在第 2 章的 BookStore 应用中，我们通过硬编码分类和书籍列表来填充数据存储。现在我们将使用这个已填充的存储作为静态种子。请回到第 2 章（或下载源代码——你可以在\
  \ Apress 网站[`www.apress.com`]的“源代码/下载”区域找到本章的代码示例），最后一次运行该应用，确保已创建好已填充的存储。\n\n在你的\
  \ Mac 上打开“终端”应用，找到`BookStore.sqlite`文件（在至少运行过一次第 2 章中的应用后）。找到后，将该文件复制到桌面，并重命名为`seed.sqlite`。\n\
  \n如果你希望使用快速方法，通常可以在终端提示符下使用以下命令（全部写在一行内）：\n\n```\nfind ~ -name BookStore.sqlite\
  \ -exec cp {} ~/Desktop/seed.sqlite \\;\n```\n\n你的桌面上现在应该有一个名为`seed.sqlite`的文件，其中包含所有种子数据。软件开发的基本原则之一是“相信你做的一切都是正确的，但仍需验证”。在终端中运行`sqlite3\
  \ ~/Desktop/seed.sqlite`。\n\n在 SQLite 提示符下，运行：\n\n```\nsqlite> select * from ZBOOKCATEGORY;\n\
  ```\n\n你应该能看到如下数据：\n\n```\nZ_PK        Z_ENT       Z_OPT       ZNAME\n----------\
  \  ----------  ----------  ----------\n3           2           1           Fiction\n\
  4           2           1           Biography\n```\n\n同样，如果你运行：\n\n```\nsqlite>\
  \ select * from ZBOOK;\n```\n\n书籍数据也应存在。\n\n```\nZ_PK    Z_ENT   Z_OPT   ZCATEGORY\
  \   ZPRICE     ZTITLE\n------  ------  ------  ----------  ----------  ----------\n\
  4       1       1       4           10.0       The third book\n5       1       1\
  \       3           15.0       The second boo\n6       1       1       3       \
  \    10.0       The first book\n```\n\n使用`.quit`命令退出 SQLite 提示符。\n\n至此，我们已经拥有了原始的种子数据。复制一份第\
  \ 2 章中的 BookStore Xcode 项目。从现在开始，我们将在这个副本上工作。\n\n**注**：务必制作副本，这样当我们启动应用时，它将是首次启动，因此会执行填充流程。为保险起见，请前往\
  \ iOS 模拟器，从模拟设备中删除 BookStore 应用（如同在真实设备上按住图标一样）。\n\n在 Xcode 中打开新的 BookStore 项目。\n\
  \n**重要提示**：在准备好之前不要运行新应用，否则在实现填充流程之前，它会自动创建一个数据存储。\n\n首先，取消我们在第 2 章中创建的手动填充代码。打开`AppDelegate.m`或`AppDelegate.swift`，找到`persistentStoreCoordinator`方法。对于\
  \ Objective-C，将以下行：\n\n```\nNSURL *storeURL = [[self applicationDocumentsDirectory]\
  \ URLByAppendingPathComponent:@\"BookStore.sqlite\"];\n```\n\n修改为：\n\n```\nNSURL\
  \ *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  BookStoreEnhanced.sqlite\"];\n```\n\n对于 Swift，将以下行：\n\n```\nlet storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreSwift.sqlite\")\n```\n\n修改为：\n\n```\nlet storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreEnhancedSwift.sqlite\")\n```\n\n这将更改 Core Data 使用的 SQLite 文件名，以便于我们在本章后续内容中进行识别。\n\
  \n\n  \n接下来，还是在 `AppDelegate.m` 或 `AppDelegate.swift` 中，需要清空 `initStore` 方法，但保留该方法。稍后我们会在其中放入新代码。\n\
  \n同理，删除 `deleteAllObjects` 方法。\n\n最后，更新 `showExampleData` 方法，使其仅列出存储中的所有书籍，如代码清单\
  \ 4-1（Objective-C）和代码清单 4-2（Swift）所示。\n\n***代码清单 4-1***. 显示存储中的书籍（Objective-C）\n\
  \n```\n- (void)showExampleData {\n  NSFetchRequest *fetchRequest = [NSFetchRequest\
  \ fetchRequestWithEntityName:@\"Book\"];\n  NSArray *books = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n  for (Book *book in books) {\n\
  \    NSLog(@\"Title: %@, price: %.2f\", book.title, book.price);\n  }\n}\n```\n\n\
  ***代码清单 4-2***. 显示存储中的书籍（Swift）\n\n```\nfunc showExampleData() {\n  let fetchRequest\
  \ = NSFetchRequest(entityName: \"Book\")\n  let books = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
  \ error: nil)\n  for book in books as [Book] {\n    println(String(format: \"Title:\
  \ \\(book.title), price: %.2f\", book.price))\n  }\n}\n```\n\n## 使用种子存储\n\n应用启动时，在执行任何\
  \ Core Data 操作之前，首先会调用 `initStore` 方法。这正是我们想要的，因为它允许我们在 Core Data 初始化之前放置种子数据。\n\
  \n现在将 `seed.sqlite` 文件添加到项目中。从你的`桌面`文件夹将 `seed.sqlite` 文件拖拽到 Xcode 项目导航器中。通常，你需要将文件添加到`Supporting\
  \ Files`组中，以保持项目结构清晰。\n\n将文件拖入`Supporting Files`组时，Xcode 会提供一些选项。确保选中了`将项目复制到目标组文件夹中`。在`添加到目标`部分，同样确保`BookStore`已被选中。\n\
  \n此时你的文件夹应类似于图 4-1（Objective-C）或图 4-2（Swift）。\n\n![9781430260288_Fig04-01.jpg](img/9781430260288_Fig04-01.jpg)\n\
  \n图 4-1. 将 `seed.sqlite` 文件添加到 BookStore（Objective-C）\n\n![9781430260288_Fig04-02.jpg](img/9781430260288_Fig04-02.jpg)\n\
  \n图 4-2. 将 `seed.sqlite` 文件添加到 BookStore（Swift）\n\n现在，我们已经准备好创建初始种子数据。修改 `initStore`\
  \ 方法的实现，如代码清单 4-3（Objective-C）或代码清单 4-4（Swift）所示。\n\n***代码清单 4-3***. Objective-C\
  \ 中的初始种子植入\n\n```\n- (void)initStore {\n  NSFileManager *fm = [NSFileManager defaultManager];\n\
  \nNSString *seed = [[NSBundle mainBundle] pathForResource: @\"seed\" ofType: @\"\
  sqlite\"];\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  BookStoreEnhanced.sqlite\"];\n  if (![fm fileExistsAtPath:[storeURL path]]) {\n\
  \    NSLog(@\"正在使用初始种子文件\");\n    NSError *error = nil;\n    if (![fm copyItemAtPath:seed\
  \ toPath:[storeURL path] error:&error]) {\n      NSLog(@\"播种时出错: %@\", error);\n\
  \      return;\n    }\n\nNSLog(@\"使用初始种子文件成功初始化存储\");\n  }\n  else {\n    NSLog(@\"\
  无需使用初始种子文件。已有后备存储。\");\n  }\n}\n```\n\n***代码清单 4-4***. Swift 中的初始种子植入\n\n```\nfunc\
  \ initStore() {\n  let fm = NSFileManager.defaultManager()\n\nlet seed = NSBundle.mainBundle().pathForResource(\"\
  seed\", ofType: \"sqlite\")\n  if let seed = seed {\n      let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreEnhancedSwift.sqlite\")\n\nif !fm.fileExistsAtPath(storeURL.path!) {\n\
  \          println(\"正在使用初始种子文件\")\n          var error: NSError? = nil\n      \
  \    if !fm.copyItemAtPath(seed, toPath: storeURL.path!, error: &error) {\n    \
  \          println(\"播种时出错: \\(error?.localizedDescription)\")\n              return\n\
  \          }\n          println(\"使用初始种子文件成功初始化存储。\")\n      }\n      else {\n \
  \         println(\"无需使用种子文件。已有后备存储。\")\n      }\n  }\n  else {\n      println(\"\
  未找到种子文件。\")\n  }\n}\n```\n\n现在可以启动应用了。你会注意到，尽管我们移除了所有硬编码的初始化代码，应用仍然会从种子文件中获取数据。\n\
  \n输出应类似于以下内容：\n\n```\n正在使用初始种子文件\n使用初始种子文件成功初始化存储\n已获取书籍: 第二本书\n标题: 第二本书, 价格: 15.00\n\
  已获取书籍: 第三本书\n标题: 第三本书, 价格: 10.00\n已获取书籍: 第一本书\n标题: 第一本书, 价格: 10.00\n```\n\n如果退出并再次启动，你应该会看到以下内容：\n\
  \n```\n无需使用初始种子文件。已有后备存储。\n已获取书籍: 第二本书\n标题: 第二本书, 价格: 15.00\n已获取书籍: 第三本书\n标题: 第三本书,\
  \ 价格: 10.00\n已获取书籍: 第一本书\n标题: 第一本书, 价格: 10.00\n```\n\n现在，我们已能够为应用创建初始种子文件，并且种子数据可以瞬间植入，即便有数十万行数据也是如此，因为这一过程是通过一次性复制整个文件完成的，无需逐行手动插入。\n\
  \n如果种子数据不再变化，你的工作就完成了！但如果你想在将来更新种子数据，请继续阅读。\n\n## 在后续版本中更新种子数据\n\n假设我们想要用第四本书更新种子数据。无论是已经使用应用一段时间的用户，还是初次接触最新版本的用户，都需要能够获取到那本第四本书。\n\
  \n要让所有内容保持正常运作，需要完成两部分工作。首先，需要更新 `seed.sqlite` 文件，使其包含所有种子数据。其次，需要确保现有用户能够获取新增的数据。\n\
  \n### 更新种子数据存储\n\n先从更新种子文件开始。这部分很简单。要实现这一点，我们只需通过代码将新书添加到当前的数据存储中，然后用这个更新后的存储作为新的种子文件。\n\
  \n打开 `AppDelegate.m` 或 `AppDelegate.swift`，在 `initStore` 方法的末尾，所有播种工作完成之后，添加代码清单\
  \ 4-5（Objective-C）或代码清单 4-6（Swift）中的代码，将第四本书添加到其中一个分类中。\n\n***代码清单 4-5***. 向种子文件中添加第四本书（Objective-C）\n\
  \n```\n- (void)initStore {\n  ...\n\nNSFetchRequest *fetchRequest = [NSFetchRequest\
  \ fetchRequestWithEntityName:@\"BookCategory\"];\n  NSArray *categories = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n  Category *category = [categories\
  \ lastObject];\n  Book *book4 = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Book\" inManagedObjectContext:self.managedObjectContext];\n  book4.title = @\"第四本书\"\
  ;\n  book4.price = 12;\n\n[category addBooks:[NSSet setWithObjects:book4, nil]];\n\
  \n[self saveContext];\n}\n```\n\n***代码清单 4-6***. 向种子文件中添加第四本书（Swift）\n\n```\nfunc\
  \ initStore() {\n  ...\n\nlet fetchRequest = NSFetchRequest(entityName: \"BookCategory\"\
  )\n  let categories = self.managedObjectContext?.executeFetchRequest(fetchRequest,\
  \ error: nil)\n\nlet category = categories?.last as BookCategory\n  var book4 =\
  \ NSEntityDescription.insertNewObjectForEntityForName(\"Book\", inManagedObjectContext:\
  \ self.managedObjectContext!) as Book\n  book4.title = \"第四本书\"\n  book4.price =\
  \ 12\n```\n\n\n\n`var booksRelation = category.valueForKeyPath(\"books\") as NSMutableSet`\n\
  `booksRelation.addObject(book4)`\n`saveContext()`\n\n启动应用（仅一次，否则会重复添加），输出应显示第四本书已添加。\n\
  \n```\nThe original seed isn't needed. There is already a backing store.\nNew book\
  \ created\nBook fetched: The second book\nTitle: The second book, price: 15.00\n\
  Book fetched: The third book\nTitle: The third book, price: 10.00\nBook fetched:\
  \ The first book\nTitle: The first book, price: 10.00\nTitle: The fourth book, price:\
  \ 12.00\n```\n\n此时，我们需要收集数据存储并将其作为种子。首先，在终端提示符下运行以下命令，将其放在桌面上：\n\n```\nfind ~ -name\
  \ BookStoreEnhanced.sqlite -exec cp {} ~/Desktop/seed.sqlite \\;\n```\n\n通过从终端提示符运行以下命令，检查种子是否正确：\n\
  \n```\nsqlite3 ~/Desktop/seed.sqlite \"select ZTITLE from ZBOOK\";\n```\n\n你应该能在其中看到新书。\n\
  \n```\nZTITLE\n\nThe second book\nThe third book\nThe first book\nThe fourth book\n\
  ```\n\n好的，既然我们已经创建了一个新种子，现在回到我们的`BookStore`应用进行清理。首先移除你刚刚添加到`initStore`中的代码，这样就不再添加第四本书。`initStore`方法应恢复到代码清单\
  \ 4-3 或代码清单 4-4 中所示的状态。\n\n由于我们不想作弊，需要重置应用，使其忘记第四本书，并从旧种子重新播种。在 iOS 模拟器中，按住`BookStore`图标并删除该应用。然后再次启动它。它应该使用旧种子重新播种，并仅显示三本书。\n\
  \n```\nUsing the original seed\nStore successfully initialized using the original\
  \ seed\nBook fetched: The second book\nTitle: The second book, price: 15.00\nBook\
  \ fetched: The third book\nTitle: The third book, price: 10.00\nBook fetched: The\
  \ first book\nTitle: The first book, price: 10.00\n```\n\n现在，让我们放置新种子。在 Xcode 中，右键点击`seed.sqlite`文件并选择“在\
  \ Finder 中显示”。在 Finder 中，只需将我们在桌面文件夹中创建的新种子拖放到旧种子之上。Finder 会询问你如何处理文件冲突。选择“替换”即可：这样新种子就就位了。\n\
  \n此时，首次下载你应用的用户将获得第四本书。而那些通过更新获取的用户则不会看到新书，因为种子不会被使用。我们需要处理这些用户。\n\n## 更新现有用户\n\n\
  有几种方法可以从种子更新数据。你应该选择哪种方法主要取决于应用的需求。例如，有时可以简单地转储数据存储并替换为种子。如果用户在该存储中没有存储任何内容，则属于这种情况。\n\
  \n如果你必须在保留用户数据的同时更新存储，则应考虑手动更新，以便增量应用更新。\n\n让我们再次编辑`initStore`方法来支持增量更新。我们要获取想要添加的新记录（在此示例中只有一个——第四本书），如果它们尚不存在，则应用同时发布的所有更新。然后为你创建的每个新版本的应用重复该代码块。代码清单\
  \ 4-7（Objective-C）和代码清单 4-8（Swift）展示了管理增量更新的`initStore`方法。\n\n***代码清单 4-7***. 初始播种与增量更新（Objective-C）\n\
  \n```\n- (void)initStore {\n  NSFileManager *fm = [NSFileManager defaultManager];\n\
  \n  NSString *seed = [[NSBundle mainBundle] pathForResource: @\"seed\" ofType: @\"\
  sqlite\"];\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  BookStoreEnhanced.sqlite\"];\n  if(![fm fileExistsAtPath:[storeURL path]]) {\n \
  \   NSLog(@\"Using the original seed\");\n    NSError * error = nil;\n    if (![fm\
  \ copyItemAtPath:seed toPath:[storeURL path] error:&error]) {\n      NSLog(@\"Error\
  \ seeding: %@\",error);\n      return;\n    }\n\n    NSLog(@\"Store successfully\
  \ initialized using the original seed\");\n  }\n  else {\n    NSLog(@\"The original\
  \ seed isn't needed. There is already a backing store.\");\n\n    // 更新 1\n    {\n\
  \      NSFetchRequest *request = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Book\"];\n      request.predicate = [NSPredicate predicateWithFormat:@\"title=%@\"\
  , @\"The fourth book\"];\n      NSUInteger count = [self.managedObjectContext countForFetchRequest:request\
  \ error:nil];\n      if(count == 0) {\n        NSLog(@\"Applying batch update 1\"\
  );\n\n        NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  BookCategory\"];\n        NSArray *categories = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n\n        BookCategory *category = [categories lastObject];\n   \
  \     Book *book4 = [NSEntityDescription insertNewObjectForEntityForName:@\"Book\"\
  \ inManagedObjectContext:self.managedObjectContext];\n        book4.title = @\"\
  The fourth book\";\n        book4.price = 12;\n\n        [category addBooks:[NSSet\
  \ setWithObjects:book4, nil]];\n\n        [self.managedObjectContext save:nil];\n\
  \n        NSLog(@\"Update 1 successfully applied\");\n      }\n    }\n  }\n}\n```\n\
  \n***代码清单 4-8***. 初始播种与增量更新（Swift）\n\n```\nfunc initStore() {\n    let fm = NSFileManager.defaultManager()\n\
  \n    let seed = NSBundle.mainBundle().pathForResource(\"seed\", ofType: \"sqlite\"\
  )\n    if let seed = seed {\n        let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreEnhancedSwift.sqlite\")\n\n        if !fm.fileExistsAtPath(storeURL.path!)\
  \ {\n            println(\"Using the original seed\")\n            var error: NSError?\
  \ = nil\n            if !fm.copyItemAtPath(seed, toPath: storeURL.path!, error:\
  \ &error) {\n                println(\"Seeding error: \\(error?.localizedDescription)\"\
  )\n                return\n            }\n            println(\"Store successfully\
  \ initialized using the original seed.\")\n        }\n        else {\n         \
  \   println(\"The seed isn't needed. There is already a backing store.\")\n\n  \
  \          // 更新 1\n            if let managedObjectContext = self.managedObjectContext\
  \ {\n                let fetchRequest1 = NSFetchRequest(entityName: \"Book\")\n\
  \                fetchRequest1.predicate = NSPredicate(format: \"title=%@\", argumentArray:\
  \ [\"The fourth book\"])\n                if managedObjectContext.countForFetchRequest(fetchRequest1,\
  \ error: nil) == 0 {\n                    println(\"Applying batch update 1\")\n\
  \                    let fetchRequest = NSFetchRequest(entityName: \"BookCategory\"\
  )\n                    let categories = managedObjectContext.executeFetchRequest(fetchRequest,\
  \ error: nil)\n\n                    let category = categories?.last as BookCategory\n\
  \                    var book4 = NSEntityDescription.insertNewObjectForEntityForName(\"\
  Book\", inManagedObjectContext: managedObjectContext) as Book\n                \
  \    book4.title = \"The fourth book\"\n                    book4.price = 12\n\n\
  \                    var booksRelation = category.valueForKeyPath(\"books\") as\
  \ NSMutableSet\n                    booksRelation.addObject(book4)\n\n         \
  \           saveContext()\n                    println(\"Update 1 successfully applied\"\
  )\n                }\n            }\n        }\n    }\n    else {\n        println(\"\
  Could not find the seed.\")\n    }\n}\n```\n\n你终于可以运行应用了。由于你已经运行过第一个版本，应用将不会重新播种，而是增量更新。\n\
  \n\n\n```text\n原始种子不需要。已有备份存储。\n应用批量更新 1\n已创建新书籍\n更新 1 已成功应用\n已获取书籍：第二本书\n标题：第二本书，价格：15.00\n\
  已获取书籍：第三本书\n标题：第三本书，价格：10.00\n已获取书籍：第一本书\n标题：第一本书，价格：10.00\n标题：第四本书，价格：12.00\n```\n\
  \n如果你再次运行，它不会应用任何新的种子或更新。\n\n```\n原始种子不需要。已有备份存储。\n已获取书籍：第二本书\n标题：第二本书，价格：15.00\n\
  已获取书籍：第三本书\n标题：第三本书，价格：10.00\n已获取书籍：第一本书\n标题：第一本书，价格：10.00\n标题：第四本书，价格：12.00\n```\n\
  \n最后一个测试场景是再次从模拟器中删除你的应用并启动它，以模拟新用户会得到什么结果。\n\n```\n使用原始种子\n已使用原始种子成功初始化存储\n已获取书籍：第二本书\n\
  标题：第二本书，价格：15.00\n已获取书籍：第三本书\n标题：第三本书，价格：10.00\n已获取书籍：第一本书\n标题：第一本书，价格：10.00\n标题：第四本书，价格：12.00\n\
  ```\n\n它简单使用种子，并不会尝试应用任何更新。在所有情况下，完整的种子数据集都是可用的。\n\n## 撤销与重做\n\n高尔夫球手称之为“莫利根”。校园里的孩子们称之为“重来一次”。计算机用户称之为“编辑”和“撤销”。无论你怎么称呼它，当你意识到自己犯了错误并想要撤销上一个操作时，你都需要它。并非所有场景都能给你这个机会，许多心碎的恋人会为此作证，但\
  \ Core Data 是宽容的，它允许你使用标准的 Cocoa `NSUndoManager` 机制来撤销你所做的操作。本节将指导你如何使用它来让用户撤销他们对\
  \ Core Data 所做的更改。\n\nCore Data 撤销管理器是一个类型为 `NSUndoManager` 的对象，它存在于你的托管对象上下文中，而\
  \ `NSManagedObjectContext` 为撤销管理器提供了 getter 和 setter 方法。然而，与 Mac OS X 上的 Core Data\
  \ 不同，出于性能考虑，iOS 的 Core Data 中的托管对象上下文默认不提供撤销管理器。如果你希望为 Core Data 对象提供撤销功能，必须自己在托管对象上下文中设置撤销管理器。\n\
  \n如果你希望在 iOS 应用中支持撤销操作，通常会在设置托管对象上下文时创建撤销管理器，这通常发生在托管对象上下文的 getter 方法中。例如，BookStore\
  \ 应用在应用委托中设置托管对象上下文，如代码清单 4-9（Objective-C）或代码清单 4-10（Swift）所示。只需在那里设置撤销管理器即可。\n\n\
  **代码清单 4-9. 设置撤销管理器（Objective-C）**\n\n```\n- (NSManagedObjectContext *)managedObjectContext\
  \ {\n  if (_managedObjectContext != nil) {\n    return _managedObjectContext;\n\
  \  }\n\nNSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \  if (!coordinator) {\n    return nil;\n  }\n  _managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \n// 添加撤销管理器\n  [_managedObjectContext setUndoManager:[[NSUndoManager alloc] init]];\n\
  \nreturn _managedObjectContext;\n}\n```\n\n**代码清单 4-10. 设置撤销管理器（Swift）**\n\n```\n\
  lazy var managedObjectContext: NSManagedObjectContext? = {\n    // 初始化托管对象模型\n \
  \   let modelURL = NSBundle.mainBundle().URLForResource(\"BookStoreSwift\", withExtension:\
  \ \"momd\")\n    let managedObjectModel = NSManagedObjectModel(contentsOfURL: modelURL!)\n\
  \n// 初始化持久化存储协调器\n    let storeURL = AppDelegate.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  BookStoreEnhancedSwift.sqlite\")\n    var error: NSError? = nil\n    let persistentStoreCoordinator\
  \ = NSPersistentStoreCoordinator(managedObjectModel: managedObjectModel!)\n\nif(persistentStoreCoordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
  \ configuration: nil, URL: storeURL, options: nil, error: &error) == nil) {\n  \
  \      self.showCoreDataError()\n        return nil\n    }\n\nvar managedObjectContext\
  \ = NSManagedObjectContext()\n    managedObjectContext.persistentStoreCoordinator\
  \ = persistentStoreCoordinator\n\n    // 添加撤销管理器\n    managedObjectContext.undoManager\
  \ = NSUndoManager()\n\nreturn managedObjectContext\n}()\n```\n\n一旦撤销管理器被设置到托管对象上下文中，它就会跟踪托管对象上下文中的任何更改，并将其添加到撤销栈中。你可以通过调用\
  \ `NSUndoManager` 的 `undo` 方法来撤销这些更改，并且每个更改（实际上是每个撤销组，如“撤销组”一节所述）都会从托管对象上下文中回滚。你还可以通过调用\
  \ `NSUndoManager` 的 `redo` 方法来重放已被撤销的更改。\n\n只有当托管对象上下文有可撤销或可重做的更改时，`undo` 和 `redo`\
  \ 方法才会执行其魔法；因此，在没有可撤销或可重做的更改时调用它们不会有任何作用。不过，你可以分别通过调用 `canUndo` 和 `canRedo` 方法来检查撤销管理器是否可以撤销或重做任何更改。\n\
  \n## 撤销组\n\n默认情况下，撤销管理器会将应用运行循环单次传递期间发生的所有更改分组为一个单一的更改，该更改可以作为一个整体单元进行撤销或重做。这意味着，例如，在第\
  \ 3 章的 WordList 应用中，所有单词的创建都属于同一个组，因为它们都是在 for 循环中创建的，并且在完成之前没有释放对线程的控制。\n\n你可以通过完全关闭自动分组并自行管理撤销组来改变这种行为。为此，向\
  \ `setGroupsByEvent` 传递 `NO`。然后，你将负责创建所有撤销组，因为撤销管理器不会再为你创建它们。你需要通过调用 `beginUndoGrouping`\
  \ 开始创建组，并通过调用 `endUndoGrouping` 来完成撤销组的创建。这些调用必须成对出现，否则会引发类型为 `NSInternalInconsistencyException`\
  \ 的异常。例如，你可以为 WordList 中的每个单词创建创建一个撤销组，这样你就可以一次撤销一个单词的创建。分组策略很大程度上取决于应用的特定需求。\n\n\
  ## 限制撤销栈\n\n默认情况下，撤销管理器会跟踪无限数量的更改以供你撤销和重做。这可能会导致内存问题，尤其是在 iOS 设备上。你可以通过调用 `NSUndoManager`\
  \ 的 `setLevelsOfUndo:` 方法来限制撤销栈的大小，并传入一个无符号整数，该整数表示要在撤销栈上保留的撤销组数量。你可以通过调用 `levelsOfUndo`\
  \ 来检查当前撤销栈的大小（以撤销组数量衡量），该方法返回一个无符号整数。值为 0 表示没有限制。如果你对撤销栈的大小设置了限制，则最古老的撤销组会从栈中退出，以便为较新的组腾出空间。\n\
  \n## 禁用撤销跟踪\n\n一旦你创建了一个撤销管理器并将其设置到托管对象上下文中，你对托管对象上下文所做的任何更改都会被跟踪并可撤销。但是，你可以通过调用\
  \ `NSUndoManager` 的 `disableUndoRegistration` 方法来禁用撤销跟踪。要重新启用撤销跟踪，请调用 `NSUndoManager`\
  \ 的 `enableUndoRegistration` 方法。禁用和启用撤销跟踪使用引用计数机制，因此在撤销跟踪重新启用之前，多次调用 `disableUndoRegistration`\
  \ 需要相应数量的 `enableUndoRegistration` 调用。\n\n\n\n当撤回追踪已启用时调用 `enableUndoRegistration`\
  \ 会引发一个类型为 `NSInternalInconsistencyException` 的异常，这很可能导致应用程序崩溃。为避免这种尴尬情况，你可以在调用\
  \ `enableUndoRegistration` 之前，先调用 `NSUndoManager` 的 `isUndoRegistrationEnabled`\
  \ 方法（该方法返回一个 `BOOL` 值）。例如，以下代码在启用撤回追踪前会先检查它是否已启用：\n\n```\nif (![undoManager isUndoRegistrationEnabled])\
  \ {\n    [undoManager enableUndoRegistration];\n}\n```\n\n然而，`isUndoRegistrationEnabled`\
  \ 方法在 iOS 8 中已移除，并且在 Swift 中也不存在，因此你需要自行跟踪禁用/启用调用的状态。你可以通过调用 `removeAllActions`\
  \ 方法完全清空撤回栈。该方法会产生一个副作用，即重新启用撤回追踪。\n\n## 为 BookStore 添加撤回功能\n\n接下来，我们将通过 `BookStore`\
  \ 应用来实践这些内容。我们在本节开头已经添加了撤回管理器。现在，让我们编写一些代码来添加几本书，并在最后执行撤回操作，以演示其工作原理。\n\n在开始之前，由于我们要操作数据插入，先让应用在每次启动时强制使用原始种子数据。当然，这会导致每次启动时应用都被重置，因此不适合大多数生产环境。但在我们的实验场景中，这样做非常理想，因为无论我们进行多少次实验性修改，应用启动时都会使用已知的数据集。\n\
  \n更新 `initStore` 方法以强制使用种子数据，如代码清单 4-11（Objective-C）或代码清单 4-12（Swift）所示。\n\n**代码清单\
