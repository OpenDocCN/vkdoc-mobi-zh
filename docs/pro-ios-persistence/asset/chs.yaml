  \n### 预抓取\n\n与批量触发故障类似，预抓取可最大限度减少 Core Data 触发故障和抓取数据的次数。不过，使用预抓取时，你可以告诉 Core Data\
  \ 在执行抓取操作时，一并抓取你指定的相关对象。例如，使用本章的数据模型，当你抓取自拍照时，你可以告诉 Core Data 预抓取相关的社交网络、相关人员，或两者都抓取。\n\
  \n要预抓取相关对象，请调用 `NSFetchRequest` 的 `setRelationshipKeyPathsForPrefetching:` 方法，并传入一个包含你想让\
  \ Core Data 预抓取的关联名称的数组。例如，要在抓取自拍照时预抓取相关的社交网络和人员，请使用以下 Objective-C 代码：\n\n```objc\n\
  NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"Selfie\"\
  ];\n[fetchRequest setRelationshipKeyPathsForPrefetching:@[@\"socialNetworks\", @\"\
  people\"]];\nNSArray *selfies = [context executeFetchRequest:fetchRequest error:nil];\n\
  ```\n\n在 Swift 中，代码如下所示：\n\n```swift\nlet fetchRequest = NSFetchRequest(entityName:\
  \ \"Selfie\")\nfetchRequest.relationshipKeyPathsForPrefetching = [\"socialNetwork\"\
  , \"people\"]\nlet selfies = context.executeFetchRequest(fetchRequest, error: nil)\
  \ as [Selfie]\n```\n\n粗体行指示 Core Data 在抓取自拍照时预抓取所有相关的社交网络和人员。请注意，如果你传入的字符串与任何现有关联名称不匹配，不会产生错误，因此请仔细检查你的拼写。你可能以为自己在预抓取关联，但一个错误的拼写可能会导致性能增益失效。\n\
  \n要测试预抓取，请创建一个名为 `Prefetch` 的类，该类遵循 `PerfTest` 协议。在 `runTestWithContext:` 的实现中，基本上使用与\
  \ `SingleFault` 相同的代码，但这次添加了对 `setRelationshipKeyPathsForPrefetching:` 的调用，并传入一个包含关联名称的数组。列表\
  \ 9-35 展示了 `Prefetch.m` 的代码，列表 9-36 展示了 `Prefetch.swift` 的代码。\n\n***列表 9-35***.\
  \ `Prefetch.m`\n\n```objc\n#import \"Prefetch.h\"\n#import \"Selfie.h\"\n#import\
  \ \"SocialNetwork.h\"\n#import \"Person.h\"\n\n@implementation Prefetch\n\n- (NSString\
  \ *)runTestWithContext:(NSManagedObjectContext *)context {\n  // Set up the fetch\
  \ request for all the selfies\n  NSFetchRequest *fetchRequest = [NSFetchRequest\
  \ fetchRequestWithEntityName:@\"Selfie\"];\n\n// Prefetch the social networks and\
  \ people\n  [fetchRequest setRelationshipKeyPathsForPrefetching:@[@\"socialNetworks\"\
  , @\"people\"]];\n\n// Perform the fetch\n  NSArray *selfies = [context executeFetchRequest:fetchRequest\
  \ error:nil];\n\n// Loop through the selfies\n  for (Selfie *selfie in selfies)\
  \ {\n    // Fire a fault just for this selfie\n    [selfie valueForKey:@\"name\"\
  ];\n\n// Loop through the social networks for this selfie\n    for (SocialNetwork\
  \ *socialNetwork in selfie.socialNetworks) {\n      // Fire a fault just for this\
  \ social network\n      [socialNetwork valueForKey:@\"name\"];\n\n// Put this social\
  \ network back in a fault\n      [context refreshObject:socialNetwork mergeChanges:NO];\n\
  \    }\n\n// Loop through the people for this selfie\n    for (Person *person in\
  \ selfie.people) {\n      // Fire a fault for this person\n      [person valueForKey:@\"\
  name\"];\n\n// Put this person back in a fault\n      [context refreshObject:person\
  \ mergeChanges:NO];\n    }\n  }\n  return @\"Test complete\";\n}\n\n@end\n```\n\n\
