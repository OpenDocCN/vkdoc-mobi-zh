  \ 对象的代码。\n\n## 创建视图并显示点击事件\n\n要显示 `Tap` 对象，我们首先从 Core Data 中获取它们。然后，遍历它们，使用标准绘图原语在视图上绘制它们。向\
  \ `Persistence` 添加一个名为 `taps` 的方法，该方法从 Core Data 存储中获取所有 `Tap` 对象。这段代码应该很熟悉，因为它是从\
  \ Core Data 获取对象的标准代码。代码清单 7-15 展示了 `Persistence.h` 中的方法声明，代码清单 7-16 展示了 `Persistence.m`\
  \ 中的 Objective-C 定义，代码清单 7-17 展示了 `Persistence.swift` 中的 Swift 定义。\n\n***代码清单 7-15***.\
  \ 在 `Persistence.h` 中声明 `taps` 方法\n\n```\n- (NSArray *)taps;\n```\n\n***代码清单 7-16***.\
  \ 在 `Persistence.m` 中获取所有 `Tap` 对象\n\n```\n- (NSArray *)taps {\n    NSError *error\
  \ = nil;\n    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Tap\"];\n    NSArray *taps = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:&error];\n    if (taps == nil) {\n        NSLog(@\"Error fetching taps %@,\
  \ %@\", error, [error userInfo]);\n    }\n    return taps;\n}\n```\n\n***代码清单 7-17***.\
  \ 在 `Persistence.swift` 中获取所有 `Tap` 对象\n\n```\nfunc taps() -> [Tap] {\n    var error:\
  \ NSError? = nil\n    let fetchRequest = NSFetchRequest(entityName: \"Tap\")\n \
  \   let taps = self.managedObjectContext?.executeFetchRequest(fetchRequest, error:\
  \ &error)\n    return taps as [Tap]\n}\n```\n\n现在创建一个名为 `TapView` 的类，它继承自 `UIView`。在\
  \ `drawRect:` 方法中，使用刚刚创建的方法获取 `Tap` 对象，然后遍历它们，将它们绘制为屏幕上的圆形，圆心位于其 `x` 和 `y` 值处，颜色使用\
  \ Core Data 中存储的颜色。代码清单 7-18 展示了 `TapView.h`，代码清单 7-19 展示了 Objective-C 的 `TapView.m`，代码清单\
  \ 7-20 展示了 Swift 的 `TapView.swift`。\n\n***代码清单 7-18***. `TapView.h`\n\n```\n@interface\
  \ TapView : UIView\n@end\n```\n\n***代码清单 7-19***. `TapView.m`\n\n```\n#import \"\
  TapView.h\"\n#import \"AppDelegate.h\"\n#import \"Persistence.h\"\n#import \"Tap.h\"\
  \n\n@implementation TapView\n\n- (void)drawRect:(CGRect)rect {\n    static float\
  \ DIAMETER = 10.0f;\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \    AppDelegate *appDelegate = (AppDelegate *)[[UIApplication sharedApplication]\
  \ delegate];\n    NSArray *taps = [appDelegate.persistence taps];\n    for (Tap\
  \ *tap in taps) {\n        const CGFloat *rgb = CGColorGetComponents(tap.color.CGColor);\n\
  \        CGContextSetRGBFillColor(context, rgb[0], rgb[1], rgb[2], 1.0f);\n    \
  \    CGContextFillEllipseInRect(context, CGRectMake(tap.x – DIAMETER/2, tap.y –\
  \ DIAMETER/2, DIAMETER, DIAMETER));\n    }\n}\n\n@end\n```\n\n***代码清单 7-20***. `TapView.swift`\n\
  \n```\nimport Foundation\nimport UIKit\n```\n\n\n```swift\nclass TapView : UIView\
  \ {\n    override func drawRect(rect: CGRect) {\n        let DIAMETER = CGFloat(10.0)\n\
  \n        let context = UIGraphicsGetCurrentContext()\n\n        let appDelegate\
  \ = UIApplication.sharedApplication().delegate as? AppDelegate\n        let taps\
  \ = appDelegate?.persistence?.taps()\n        if let taps = taps {\n           \
  \ for tap : Tap in taps {\n                let rgb = CGColorGetComponents(tap.color.CGColor)\n\
  \                CGContextSetRGBFillColor(context, rgb[0], rgb[1], rgb[2], 1.0)\n\
  \                CGContextFillEllipseInRect(context, CGRectMake(CGFloat(tap.x -\
  \ Float(DIAMETER/2)), CGFloat(tap.y - Float(DIAMETER/2)), DIAMETER, DIAMETER))\n\
  \            }\n        }\n    }\n}\n```\n\n更新应用的视图，使其使用这个新的视图类。\n\n1.  打开 `Main.storyboard`。\n\
  2.  选中视图。\n3.  在身份检查器中，将 Class 下拉框更改为 `TapView`。\n\n现在，运行应用程序，你添加的所有 `Tap` 实例应该都会显示出来。你还可以点击屏幕添加更多圆点。你可以一直点击，直到你的\
  \ iPhone 看起来像是感染了麻疹！\n\n## 嘿，等一下！我的颜色是怎么转换的？\n\n你可能会注意到，我们并没有编写任何转换代码，将我们的 `UIColor`\
  \ 实例转换进 Core Data 存储或从其中转换出来。Core Data 是怎么知道如何转换它的呢？\n\n在 iOS 5 之前的时代，我们需要编写一个自定义转换器类来为\
  \ `UIColor` 实例执行转换。然而，从 iOS 5 开始，`UIColor` 遵循了 `NSCoding` 协议，因此它可以被自动正确地编码和解码。这简单得简直像是在作弊。\n\
  \n然而，对于我们的加密转换，我们就没有这么幸运了，必须编写一个自定义转换类来加密和解密我们的数据。我们将在下一节中完成这项工作。\n\n## 加密数据\n\n\
  在这个社交媒体、身份盗窃和 NSA 监控的时代，人们越来越重视隐私。将你的设备保持物理安全可以保护你的数据——直到你把 iPhone 落在酒吧或者被小偷偷走。一旦他人控制了你的\
  \ iPhone 或 iPad，他们就可以导出 Core Data 在不同应用中使用的 SQLite 数据库，并使用本书中我们正在使用的工具之类的工具，读取你所有的数据——包括那些会让你脸红、甚至可能毁掉你生活的私密敏感数据。\n\
  \n保护这些数据的一种方法是使用已知的、业界强度的加密算法对它们进行加密。在本章的余下部分，我们将创建一个名为 `SecureNote` 的安全笔记应用，该应用将以加密格式存储所有笔记。我们将使用\
  \ Core Data 的 `Transformable` 数据类型和一个自定义转换类来管理数据的加密和解密。完成后的应用将类似于图 7-2。\n\n![9781430260288_Fig07-02.jpg](img/9781430260288_Fig07-02.jpg)\n\
  \n图 7-2。`SecureNote` 应用\n\n## 创建项目并设置 Core Data 模型\n\n在 Xcode 中使用 Master-Detail\
  \ Application 模板创建一个新项目。将其命名为 `SecureNote`，并确保勾选了“Use Core Data”复选框。Xcode 创建好项目后，打开\
  \ Core Data 模型文件 `SecureNote.xcdatamodeld`，删除 Xcode 为你创建的 `Event` 实体。然后，添加一个名为 `Note`\
  \ 的实体，并为其赋予三个属性。\n\n*   `timeStamp`（`Date`）\n*   `title`（`Transformable`）\n*   `body`（`Transformable`）\n\
  \n我们不对 `timeStamp` 进行加密，但将使用一个自定义转换器类对 `title` 和 `body` 进行加密。下一节将讨论加密和解密，然后构建一个\
  \ Core Data 将用于加密和解密 `title` 和 `body` 的自定义转换器类。\n\n然而，在我们继续讨论加密和解密之前，请更新 Xcode 为你生成的\
  \ `NSFetchedResultsController`，使其获取 `Note` 实例。你可以在 `MasterViewController.m` 或 `MasterViewController.swift`\
  \ 中的 `fetchedResultsController` 访问器里找到这段代码。请将其修改为与代码清单 7-21 一致。\n\n***代码清单 7-21***。获取\
  \ `Note` 实例\n\n```objectivec\nNSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Note\" inManagedObjectContext:self.managedObjectContext]; //\
  \ Objective-C\n```\n\n```swift\nlet entity = NSEntityDescription.entityForName(\"\
  Note\", inManagedObjectContext: self.managedObjectContext!) // Swift\n```\n\n为 `Note`\
  \ 实体生成一个 `NSManagedObject` 子类。生成的类会将 `body` 和 `title` 的类型设置为 `id (Objective-C)`\
  \ 或 `AnyObject (Swift)`，因为它不知道该设置为什么其他类型，但你可以将两者的类型都改为 `NSString * (Objective-C)`\
  \ 或 `String (Swift)`。代码清单 7-22 展示了 `Note.h` 头文件，代码清单 7-23 展示了 `Note.m` Objective-C\
  \ 实现文件，代码清单 7-24 展示了 `Note.swift` Swift 实现文件。\n\n***代码清单 7-22***。`Note.h`\n\n```objectivec\n\
  #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@interface Note\
  \ : NSManagedObject\n\n@property (nonatomic, retain) NSString *body;\n@property\
  \ (nonatomic, retain) NSDate *timeStamp;\n@property (nonatomic, retain) NSString\
  \ *title;\n\n@end\n```\n\n***代码清单 7-23***。`Note.m`\n\n```objectivec\n#import \"\
  Note.h\"\n\n@implementation Note\n\n@dynamic body;\n@dynamic timeStamp;\n@dynamic\
  \ title;\n\n@end\n```\n\n***代码清单 7-24***。`Note.swift`\n\n```swift\nimport Foundation\n\
  import CoreData\n\n@objc(Note)\nclass Note: NSManagedObject {\n\n@NSManaged var\
  \ timeStamp: NSDate\n    @NSManaged var title: String\n    @NSManaged var body:\
  \ String\n\n}\n```\n\n我们希望主视图显示笔记的标题，并在其下方显示时间戳，因此请打开故事板（`Main.storyboard`），选中主视图中的原型单元格，并在属性检查器中将其样式从\
  \ Basic 更改为 Subtitle，如图 7-3 所示。\n\n![9781430260288_Fig07-03.jpg](img/9781430260288_Fig07-03.jpg)\n\
  \n图 7-3。将表格视图单元格设置为 Subtitle 样式\n\n现在，更新 `MasterViewController.m` 或 `MasterViewController.swift`\
  \ 中的 `configureCell:atIndexPath:` 方法，使其在主文本标签中显示笔记的标题，在详细文本标签中显示时间戳，如代码清单 7-25（Objective-C）和代码清单\
  \ 7-26（Swift）所示。\n\n***代码清单 7-25***。在单元格中显示笔记标题和时间戳 (Objective-C)\n\n```objectivec\n\
  #import \"Note.h\"\n\n...\n\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath\
  \ *)indexPath {\n  Note *note = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
  \  cell.textLabel.text = note.title;\n  cell.detailTextLabel.text = [note.timeStamp\
  \ description];\n}\n```\n\n***代码清单 7-26***。在单元格中显示笔记标题和时间戳 (Swift)\n\n```swift\n\
  func configureCell(cell: UITableViewCell, atIndexPath indexPath: NSIndexPath) {\n\
  \    let note = self.fetchedResultsController.objectAtIndexPath(indexPath) as Note\n\
  \    cell.textLabel.text = note.title\n    cell.detailTextLabel?.text = note.timeStamp.description\n\
  }\n```\n\n\n你还需要同时更新 `MasterViewController.m` 或 `MasterViewController.swift` 中的\
  \ `insertNewObject:` 方法，以使用新的 `Note` 类，如代码清单 7-27（Objective-C）和代码清单 7-28（Swift）所示。在该方法中，我们创建了一个新的\
  \ `Note` 实例，并将时间戳设为当前日期和时间，标题设为“新笔记”，正文设为空字符串。同时，我们还会选中这条新笔记并跳转到其详情视图，这样一旦更新详情视图，就能编辑这条新笔记了。\n\
  \n***代码清单 7-27***. 创建新对象时使用 `Note` 类（Objective-C）\n\n```\n- (void)insertNewObject:(id)sender\
  \ {\nNSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest] entity];\n\
    Note *note = [NSEntityDescription insertNewObjectForEntityForName:[entity name]\
  \ inManagedObjectContext:context];\n\nnote.timeStamp = [NSDate date];\n  note.title\
  \ = @\"New Note\";\n  note.body = @\"\";\n\n// Save the context.\n  NSError *error\
  \ = nil;\n  if (![context save:&error]) {\n    NSLog(@\"Unresolved error %@, %@\"\
  , error, [error userInfo]);\n    abort();\n  }\n\n// Select the new note and segue\
  \ to its detail view\n  NSIndexPath *indexPath = [NSIndexPath indexPathForRow:0\
  \ inSection:0];\n  [self.tableView selectRowAtIndexPath:indexPath animated:YES scrollPosition:UITableViewScrollPositionTop];\n\
    [self performSegueWithIdentifier:@\"showDetail\" sender:self];\n}\n```\n\n***代码清单\
  \ 7-28***. 创建新对象时使用 `Note` 类（Swift）\n\n```\nfunc insertNewObject(sender: AnyObject)\
  \ {\n    let context = self.fetchedResultsController.managedObjectContext\n    let\
  \ entity = self.fetchedResultsController.fetchRequest.entity\n    let note = NSEntityDescription.insertNewObjectForEntityForName(entity!.name!,\
  \ inManagedObjectContext: context) as Note\n\nnote.timeStamp = NSDate()\n    note.title\
  \ = \"New Note\"\n    note.body = \"\"\n\n// Save the context.\n    var error: NSError?\
  \ = nil\n    if !context.save(&error) {\n      abort()\n    }\n\n// Select the new\
  \ note and segue to its detail view\n    let indexPath = NSIndexPath(forRow: 0,\
  \ inSection: 0)\n    self.tableView.selectRowAtIndexPath(indexPath, animated: true,\
  \ scrollPosition: .Top)\n    self.performSegueWithIdentifier(\"showDetail\", sender:\
  \ self)\n}\n```\n\n## 执行加密与解密\n\n为了实现实际的加密与解密，我们使用 iOS 提供的 Common Crypto 库。本书并非加密专著，因此不会深入探讨加密的具体工作原理。如果你想了解更多，我们鼓励你自行研究加密相关知识。一些\
  \ iOS 加密相关的资源包括：\n\n*   Apple 的《加密服务指南》，网址为 `https://developer.apple.com/library/mac/documentation/security/conceptual/cryptoservices/Introduction/Introduction.html`\n\
  *   Rob Napier 的博客文章：“Properly Encrypting With AES With CommonCrypto”，网址为 `http://robnapier.net/aes-commoncrypto/`\n\
  \n就本章而言，你应理解以下几点：\n\n*   我们使用由用户提供的密码作为密钥进行对称加密。\n*   对于每个要加密的字符串，我们都会生成一个随机盐值，并将其与密码结合，然后使用\
  \ SHA1 进行哈希处理。\n*   我们使用 AES 算法进行加密。\n\n我们使用一个用户提供的密码，并将其存储在应用委托的一个成员变量中，该变量被恰当地命名为\
  \ `password`。将其添加到 `AppDelegate.h` 或 `AppDelegate.swift` 中，如代码清单 7-29（Objective-C）和代码清单\
  \ 7-30（Swift）所示。\n\n***代码清单 7-29***. 在应用委托中添加密码（Objective-C）\n\n```\n@property (copy,\
  \ nonatomic) NSString *password;\n```\n\n***代码清单 7-30***. 在应用委托中添加密码（Swift）\n\n\
  ```\nvar password: String?\n```\n\n在我们讨论如何提示用户输入密码、如何验证密码是否正确，以及如何为每个字符串生成并存储盐值之前，我们先来构建实际的值转换器。在构建之前，我们必须了解值转换器的方法及其作用。\n\
  \n### 理解 NSValueTransformer 的方法\n\n`NSValueTransformer` 有四个值得关注的方法：其中两个是静态方法，两个是实例方法。表\
  \ 7-1 列出了这些方法及其功能。\n\n表 7-1. `NSValueTransformer` 的方法\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| `+ (BOOL)allowsReverseTransformation` | 静态方法，若该值转换器支持反向转换则返回 `YES`，否则返回 `NO`。默认值为\
  \ `YES`。 |\n| `+ (Class)transformedValueClass` | 正向转换所返回值的类。 |\n| `- (id)transformedValue:(id)value`\
  \ | 被调用以将 `value` 转换为新值。 |\n| `- (id)reverseTransformedValue:(id)value` | 被调用以进行反向转换，将\
  \ `value` 转换为新值。你的值转换器必须支持反向转换。如果无法通过简单重复调用 `transformedValue;` 来逆向转换，则应重写此方法。 |\n\
  \n### 实现加密/解密值转换器\n\n对于我们的加密/解密值转换器，我们必须同时支持正向和反向转换——在将数据存入 Core Data 数据存储时进行加密（正向转换），在将数据读取到内存并显示在屏幕上时进行解密（反向转换）。因此，我们分别重写\
  \ `transformedValue:` 和 `reverseTransformedValue:` 来实现加密和解密。我们无需重写 `allowsReverseTransformation`，因为其默认返回值为\
  \ `YES`。我们将 `transformedValueClass` 的返回值设为 `NSData` 类，因为这是 `transformedValue:` 返回的对象类型。\n\
  \n一个有趣的问题是如何为每个要加密的字符串存储两条数据：盐值（salt）和初始化向量（IV），这两者都是随机数据。这些数据与密码结合使用，可以防止对数据进行彩虹表攻击。我们在加密字符串时创建它们，然后在解密时使用它们。由于解密每个字符串时都必须有盐值和\
  \ IV，因此我们必须为每个加密的字符串存储盐值和 IV。\n\n你可能会想到在 Core Data 模型的 `Note` 实体中创建属性来存储每个托管对象的盐值和\
  \ IV，但请记住，我们是给 Core Data 提供一个派生自 `NSTransformer` 的类来读写我们的 `Transformable` 属性。实例化并调用转换器的是\
  \ Core Data 的代码，而不是我们的代码。此外，我们的转换器类对其被调用时所处的上下文一无所知——它不知道正在被用于哪个托管对象。它只知道接收一个值并返回一个值。我们无法在转换器中读取或写入模型中的其他属性，因为我们不知道正在处理哪个托管对象，甚至不知道正在加密或解密的是哪个属性。\n\
  \n因此，解决方案是在写入数据时将盐值、IV 和加密后的字符串合并成一个属性，在读取数据时再从数据中解析出盐值、IV 和加密后的字符串，以便执行解密。我们将按以下方式存储数据：\n\
  \n*   盐值（8 字节）\n*   IV（16 字节）\n*   加密后的字符串（剩余字节）\n\n对于实际的加密和解密，我们创建一个参数化的辅助方法，名为\
  \ `transform:`，该方法允许我们指定是加密还是解密，因为执行这两种操作的代码非常相似。该方法将密码、盐值和 IV 作为参数。如前所述，我们不讨论实际加密和解密的细节，但在代码中添加了注释，供你参考。\n\
  \n\n\n要添加安全框架到 Objective-C 版本的项目，只需在需要引用安全代码的文件中添加以下语句：\n\n```objc\n@import SystemConfiguration;\n\
  ```\n\n将框架添加到 Swift 项目并不那么容易，至少在撰写本文时如此。要将安全框架添加到 Swift 项目，请执行以下操作：\n\n1. 在项目中创建一个虚拟的\
  \ Objective-C 文件。\n2. Xcode 会询问是否要创建桥接头文件，选择“是”。\n3. 删除虚拟的 Objective-C 文件。\n4. 打开桥接头文件`SecureNoteSwift-Bridging-Header.h`，并添加以下导入：\n\
  \n```objc\n#import <CommonCrypto/CommonCryptor.h>\n#import <CommonCrypto/CommonDigest.h>\n\
  #import \"SSKeychain.h\"\n```\n\n代码清单 7-31 展示了值转换器`EncryptionTransformer`的头文件，代码清单\
  \ 7-32 展示了 Objective-C 实现文件，代码清单 7-33 展示了 Swift 实现文件。\n\n**代码清单 7-31**. `EncryptionTransformer.h`\n\
  \n```objc\n#import <Foundation/Foundation.h>\n\n@interface EncryptionTransformer\
  \ : NSValueTransformer\n\n@end\n```\n\n**代码清单 7-32**. `EncryptionTransformer.m`\n\
  \n```objc\n@import SystemConfiguration;\n\n#import <CommonCrypto/CommonCryptor.h>\n\
  #import <CommonCrypto/CommonDigest.h>\n#import \"EncryptionTransformer.h\"\n#import\
  \ \"AppDelegate.h\"\n\n#define kSaltLength 8\n\n@implementation EncryptionTransformer\n\
  \n+ (Class)transformedValueClass {\n    return [NSData class];\n}\n\n- (id)transformedValue:(id)value\
  \ {\n    // 我们接收一个要加密的字符串（NSString）。\n    // 返回的字节格式为：\n    // salt（16 字节）| IV（16\
  \ 字节）| 加密后的字符串\n    NSData *salt = [self randomDataOfLength:kSaltLength];\n    NSData\
  \ *iv = [self randomDataOfLength:kCCBlockSizeAES128];\n    NSData *data = [(NSString\
  \ *)value dataUsingEncoding:NSUTF8StringEncoding];\n\n    // 执行实际的加密操作\n    NSData\
  \ *result = [self transform:data\n                            password:[self password]\n\
  \                                salt:salt\n                                  iv:iv\n\
  \                           operation:kCCEncrypt];\n\n    // 构建响应数据\n    NSMutableData\
  \ *response = [[NSMutableData alloc] init];\n    [response appendData:salt];\n \
  \   [response appendData:iv];\n    [response appendData:result];\n    return response;\n\
  }\n\n- (id)reverseTransformedValue:(id)value {\n    // 我们接收来自 Core Data 的字节（NSData），需要将其转换\n\
  \    // 为字符串（NSString）并返回给应用程序。\n\n    // 字节格式为：\n    // salt（16 字节）| IV（16 字节）|\
  \ 加密数据\n    NSData *data = (NSData *)value;\n    NSData *salt = [data subdataWithRange:NSMakeRange(0,\
  \ kSaltLength)];\n    NSData *iv = [data subdataWithRange:NSMakeRange(kSaltLength,\
  \ kCCBlockSizeAES128)];\n    NSData *text = [data subdataWithRange:NSMakeRange(kSaltLength\
  \ + kCCBlockSizeAES128, [data length] - kSaltLength - kCCBlockSizeAES128)];\n\n\
  \    // 获取解密后的数据\n    NSData *decrypted = [self transform:text password:[self password]\
  \ salt:salt iv:iv operation:kCCDecrypt];\n\n    // 只返回解密后的字符串\n    return [[NSString\
  \ alloc] initWithData:decrypted encoding:NSUTF8StringEncoding];\n}\n\n- (NSData\
  \ *)transform:(NSData *)value\n               password:(NSString *)password\n  \
  \                 salt:(NSData *)salt\n                     iv:(NSData *)iv\n  \
  \            operation:(CCOperation)operation {\n    // 通过对密码加盐来获取密钥\n    NSData\
  \ *key = [self keyForPassword:password salt:salt];\n\n    // 执行操作（加密或解密）\n    size_t\
  \ outputSize = 0;\n    NSMutableData *outputData = [NSMutableData dataWithLength:value.length\
  \ + kCCBlockSizeAES128];\n    CCCryptorStatus status = CCCrypt(operation,\n    \
  \                                 kCCAlgorithmAES128,\n                        \
  \             kCCOptionPKCS7Padding,\n                                     key.bytes,\n\
  \                                     key.length,\n                            \
  \         iv.bytes,\n                                     value.bytes,\n       \
  \                              value.length,\n                                 \
  \    outputData.mutableBytes,\n                                     outputData.length,\n\
  \                                     &outputSize);\n\n    // 成功则设置大小并返回数据，失败则返回\
  \ nil\n    if (status == kCCSuccess) {\n        outputData.length = outputSize;\n\
  \        return outputData;\n    } else {\n        return nil;\n    }\n}\n\n- (NSData\
  \ *)keyForPassword:(NSString *)password\n                      salt:(NSData *)salt\
  \ {\n    // 将盐附加到密码后\n    NSMutableData *passwordAndSalt = [[password dataUsingEncoding:NSUTF8StringEncoding]\
  \ mutableCopy];\n    [passwordAndSalt appendData:salt];\n\n    // 进行哈希处理\n    NSData\
  \ *hash = [self sha1:passwordAndSalt];\n\n    // 使用哈希后的密码和盐创建密钥，使其符合 AES128 的适当大小（必要时补零）\n\
  \    NSRange range = NSMakeRange(0, MIN(hash.length, kCCBlockSizeAES128));\n   \
  \ NSMutableData *key = [NSMutableData dataWithLength:kCCBlockSizeAES128];\n    [key\
  \ replaceBytesInRange:range withBytes:hash.bytes];\n    return key;\n}\n\n- (NSData\
  \ *)sha1:(NSData *)data {\n    // 将 SHA1 结果存入数组\n    uint8_t digest[CC_SHA1_DIGEST_LENGTH];\n\
  \    CC_SHA1(data.bytes, (CC_LONG) data.length, digest);\n\n    // 使用 SHA1 创建格式化字符串\n\
  \    NSMutableString* sha1 = [NSMutableString stringWithCapacity:CC_SHA1_DIGEST_LENGTH\
  \ * 2];\n    for (int i = 0; i < CC_SHA1_DIGEST_LENGTH; i++) {\n        [sha1 appendFormat:@\"\
  %02x\", digest[i]];\n    }\n    return [sha1 dataUsingEncoding:NSUTF8StringEncoding];\n\
  }\n\n- (NSString *)password {\n    return ((AppDelegate *)[[UIApplication sharedApplication]\
  \ delegate]).password;\n}\n\n- (NSData *)randomDataOfLength:(size_t)length {\n \
  \   // SecRandomCopyBytes 成功时返回 0，失败时返回非零值\n    // 如果调用失败，缓冲区将保留 NSMutableData dataWithLength:\
  \ 留下的全零数据，安全性较低！\n    // 正式发布的应用程序可以选择在此步骤失败时终止操作\n    NSMutableData *randomData\
  \ = [NSMutableData dataWithLength:length];\n    SecRandomCopyBytes(kSecRandomDefault,\
  \ length, randomData.mutableBytes);\n    return randomData;\n}\n\n@end\n```\n\n\
  **代码清单 7-33**. `EncryptionTransformer.swift`\n\n```swift\nimport Foundation\n\n\
  import UIKit\nimport Security\n\n@objc(EncryptionTransformer)\nclass EncryptionTransformer\
  \ : NSValueTransformer {\n    let saltLength : UInt = 8\n\n    override class func\
  \ transformedValueClass() -> AnyClass {\n        return NSData.self\n    }\n\n \
  \   override func transformedValue(value: AnyObject?) -> AnyObject? {\n        //\
  \ 我们接收一个要加密的字符串（NSString）。\n        // 返回的字节格式为：\n        // salt（16 字节）| IV（16\
  \ 字节）| 加密后的字符串\n\n        let salt = self.randomDataOfLength(saltLength)\n     \
  \   let iv = self.randomDataOfLength(UInt(kCCBlockSizeAES128))\n\n        let data\
  \ = value?.dataUsingEncoding(NSUTF8StringEncoding)\n\n        // 执行实际的加密操作\n   \
  \     let result = self.transform(data!, password: self.password()!, salt: salt,\
  \ iv: iv, operation: UInt32(kCCEncrypt))\n\n        // 构建响应数据\n        var response\
  \ = NSMutableData()\n        response.appendData(salt)\n        response.appendData(iv)\n\
  \        response.appendData(result!)\n        return response\n    }\n```\n\n\n\
  \n`override func reverseTransformedValue(value: AnyObject?) -> AnyObject?`  \n`{`\
  \  \n`        // 我们接收来自 Core Data 的字节数据（NSData），需要将其转换为字符串（NSString）并返回给应用。`  \n\
  `        let data = value as NSData?`  \n`        if let data = data {`  \n`   \
  \         let salt = data.subdataWithRange(NSMakeRange(0, Int(saltLength)))`  \n\
  `            let iv = data.subdataWithRange(NSMakeRange(Int(saltLength), kCCBlockSizeAES128))`\
