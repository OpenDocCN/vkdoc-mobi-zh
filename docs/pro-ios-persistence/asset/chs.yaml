  \        self.results.text = \"\"\n\n        self.tests.append(FetchAll())\n   \
  \ }\n}\n```\n\n至此，应用程序就完成了。在阅读本章后续内容时，你将添加测试以覆盖所介绍的各个场景。\n\n## 运行你的第一个测试\n\n构建并运行应用程序。运行时，你会在选择器中看到包含一个名为“FetchAll”测试的\
  \ iOS 模拟器。如果选择器为空，很可能是你忘记将选择器的 `dataSource` 和 `delegate` 属性连接到视图控制器。一切正常后，选中“FetchAll”，点击“Run\
  \ Selected Test”。应用程序将获取所有对象并显示结果，如图 9-4 所示。\n\n![9781430260288_Fig09-04.jpg](img/9781430260288_Fig09-04.jpg)\n\
  \n图 9-4. 获取所有对象的结果\n```\n\n\n## Core Data 中的性能考量\n\n本章余下部分将阐述 Core Data 在 iOS 及其运行设备上所施加的各种性能考量。在学习这些性能考量时，你将向\
  \ `PerformanceTuning` 应用添加测试。你也可以随意添加自己的测试，以便始终为应用用户提供最佳体验。\n\n## 故障机制\n\n当针对数据库执行\
  \ SQL 查询时，你清楚所拉取数据的深度与范围。你了解是否正在联表查询，清楚要取回的列；如果足够谨慎，还能限制从数据库加载到工作内存中的行数。与使用 Core\
  \ Data 相比，你可能需要付出更多努力来获取数据，但掌控力更强。你清楚用于存储所取数据的内存用量。\n\n然而，使用 Core Data 时，你为了易用性而放弃了部分控制权。例如，在\
  \ `PerformanceTuning` 模型中，每个 `Selfie` 实例都关联着一个 `Person` 实例集合，你可以通过面向对象而非面向数据的方式访问该集合。你无需关心\
  \ Core Data 是在应用启动时、`Selfie` 加载时，还是在你首次访问 `Person` 对象时才从数据库拉取 `Person` 数据。但 Core\
  \ Data 会关注这一点，并尝试尽可能推迟将数据从持久化存储加载到对象图的过程，从而减少获取时间和内存使用。它通过所谓的\"故障\"机制实现这一点。\n\n\
  可以将故障视为 Unix 文件系统中的符号链接——它既不是所指向的实际文件，也不包含文件的数据。但符号链接代表了该文件，在被调用时能够访问到文件及其数据，就像文件本身一样。与符号链接类似，故障是一个占位符，能够访问持久化存储的数据。故障既可以代表一个托管对象，也可以在表示对多关系时代表一个托管对象集合。作为数据的链接或影子，故障占用的内存远少于实际数据。请参阅\
  \ 图 9-5，其中描绘了托管对象和故障。在此示例中，托管对象是 `Selfie` 的实例，而故障指向相关的 `Person` 对象集合。`Selfie` 以粗体显示，表示它已从持久化存储中取出并驻留在内存中。`Person`\
  \ 对象（处于关系的\"对多\"一侧）则以浅灰色显示，因为它们尚未从持久化存储中取出，也不在内存中。\n\n![9781430260288_Fig09-05.jpg](img/9781430260288_Fig09-05.jpg)\n\
  \n图 9-5. 一张自拍及其故障状态的联系人\n\n## 触发故障\n\n当 Core Data 必须从故障指向的持久化存储中拉取数据并将其放入内存时，会使用术语\"\
  触发故障\"。Core Data 已经\"触发\"了一个从数据存储中获取数据的请求，而故障也已\"被触发\"，完成了代表实际数据的任务。每当你请求托管对象的持久化数据时——无论是通过\
  \ `valueForKey:` 还是通过自定义类中返回或访问对象持久化数据的方法——都会导致故障被触发。访问托管对象元数据但不访问持久化存储中任何数据的方法则不会触发故障。这意味着你可以查询托管对象的类、哈希值、描述、实体和对象\
  \ ID 等内容，而不会导致故障触发。有关哪些方法不会触发故障的完整列表，请参阅 Apple 文档 `http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html`\
  \ 中的\"故障行为\"部分。\n\n显式请求托管对象的持久化数据会触发故障，但调用任何从托管对象访问持久化数据的方法或构造也会如此。例如，你可以通过托管对象的关系访问集合而不触发故障。然而，对集合进行排序会触发故障，因为任何逻辑排序都会依据对象的某些持久化数据进行。你将在本节后面构建的测试将演示这一行为。\n\
  \n## 故障与缓存\n\n我们之前说触发故障是从持久化存储中获取数据，这有点不准确。通常情况下确实如此，但在 Core Data 长途跋涉到持久化存储检索数据之前，它会先检查缓存中是否有它要找的数据。如果\
  \ Core Data 在缓存中找到目标数据，就会从缓存中拉取数据，跳过前往持久化存储的更长的路径。\"缓存\"和\"缓存过期\"部分将进一步详细讨论缓存。\n\
  \n## 重新故障化\n\n控制应用程序持久化数据和内存使用的一种方法是将托管对象重新变回故障状态，从而释放其数据所占用的内存。通过调用托管对象上下文的 `refreshObject:mergeChanges:`\
  \ 方法，并将要故障化的对象作为参数传入，同时将 `mergeChanges:` 参数设为 `NO`，即可将对象重新变回故障。例如，如果有一个名为 `foo`\
  \ 的托管对象，我想将其重新变回故障，可以使用如下代码：\n\n```\n[context refreshObject:foo mergeChanges:NO];\
  \ // Objective-C\ncontext.refreshObject(foo, mergeChanges:false) // Swift\n```\n\
  \n调用之后，`foo` 现在是一个故障对象，`[foo isFault]`（Swift 中为 `foo.fault`）将返回 `YES`（Swift 中为 `true`）。理解\
  \ `mergeChanges` 参数至关重要。像前面的代码那样传入 `NO` 或 `false` 会丢弃所有尚未保存到持久化存储的更改数据。执行此操作时需谨慎，因为你会丢失正在故障化的对象中的所有数据更改，并且与该故障化对象相关的所有对象都会被释放。如果任何关系发生了变化并随后保存了上下文，那么故障化的对象将与其关系不同步，从而在持久化存储中造成数据完整性问题。\n\
  \n如果为 `mergeChanges` 传入 `YES` 或 `true`，则不会将对象故障化。相反，它会从持久化存储（或最后一个缓存状态）重新加载对象的所有持久化数据，然后重新应用在调用\
  \ `refreshObject:mergeChanges:` 之前存在但尚未保存的任何更改。\n\n当你将托管对象变为故障时，Core Data 会向该托管对象发送两条消息。\n\
  \n- 对象故障化之前发送 `willTurnIntoFault:`\n- 对象故障化之后发送 `didTurnIntoFault:`\n\n如果为托管对象实现了自定义类，可以在这些类中实现其中一个或两个方法，以对对象执行某些操作。例如，假设你的自定义托管对象对某些持久化值执行了昂贵的计算并缓存了结果，并且你希望在所依赖的值不存在时清除该缓存结果。你可以在\
  \ `didTurnIntoFault:` 中清除该计算结果。\n\n## 构建故障化测试\n\n为了测试本节学到的关于故障化的知识，请构建一个测试，该测试将执行以下操作：\n\
  \n1. 从持久化存储中检索第一个自拍。\n2. 从该自拍中获取一个社交网络。\n3. 检查该社交网络是否处于故障状态。\n4. 获取该社交网络的名称。\n5.\
  \ 检查该社交网络是否处于故障状态。\n6. 将该社交网络重新变回故障状态。\n7. 检查该社交网络是否处于故障状态。\n\n\n\n首先，为所有 Core Data\
  \ 实体生成 `NSManagedObject` 类。打开 `SocialNetwork.m` 或 `SocialNetwork.swift`，并实现 `willTurnIntoFault`\
  \ 和 `didTurnIntoFault` 方法。在这些方法中，我们不会做任何特殊操作，只会简单地记录它们已被调用，以便验证它们被正确调用。代码清单 9-21（Objective-C）和代码清单\
  \ 9-22（Swift）展示了这些方法的实现。\n\n***代码清单 9-21***. 在 `SocialNetwork.m` 中处理故障状态变化\n\n```objc\n\
  - (void)willTurnIntoFault {\n  NSLog(@\"%@ named %@ will turn into fault\", [[self\
  \ class] description], self.name);\n}\n\n- (void)didTurnIntoFault {\n  NSLog(@\"\
  %@ did turn into fault\", [[self class] description]);\n}\n```\n\n***代码清单 9-22***.\
  \ 在 `SocialNetwork.swift` 中处理故障状态变化\n\n```swift\noverride func willTurnIntoFault()\
  \ {\n    println(NSString(format: \"%@ named %@ will turn into fault\", self, self.name))\n\
  }\n\noverride func didTurnIntoFault() {\n    println(NSString(format: \"%@ did turn\
  \ into fault\", self))\n}\n```\n\n请注意，我们在 `willTurnIntoFault` 方法中记录了社交网络的名称。然而，在\
  \ `didTurnIntoFault` 方法中，我们没有记录名称。为什么？因为我们已经没有名称可以记录了。对象处于故障状态，还记得吗？它的属性（包括名称）都不在内存中。\n\
  \n现在，创建一个名为 `DidFault` 的测试，它遵循 `PerfTest` 协议，然后实现其 `runWithContext:` 方法来执行前面概述的七个步骤。代码清单\
  \ 9-23 展示了 `DidFault.h`，代码清单 9-24 展示了 `DidFault.m`，代码清单 9-25 展示了 `DidFault.swift`。\n\
  \n***代码清单 9-23***. `DidFault.h`\n\n```objc\n#import \"PerfTest.h\"\n\n@interface\
  \ DidFault : NSObject <PerfTest>\n\n@end\n```\n\n***代码清单 9-24***. 实现了故障测试的 `DidFault.m`\n\
  \n```objc\n#import \"DidFault.h\"\n#import \"Selfie.h\"\n#import \"SocialNetwork.h\"\
  \n\n@implementation DidFault\n\n-(NSString *)runTestWithContext:(NSManagedObjectContext\
  \ *)context {\n  NSString *result = nil;\n\n// 1) 获取第一张自拍\n  NSFetchRequest *fetchRequest\
  \ = [NSFetchRequest fetchRequestWithEntityName:@\"Selfie\"];\n  fetchRequest.predicate\
  \ = [NSPredicate predicateWithFormat:@\"name = %@\", @\"Selfie 1\"];\n  NSArray\
  \ *selfies = [context executeFetchRequest:fetchRequest error:nil];\n  if ([selfies\
  \ count] == 1) {\n    Selfie *selfie = selfies[0];\n\n// 2) 从自拍中获取一个社交网络\n    SocialNetwork\
  \ *socialNetwork = [selfie.socialNetworks anyObject];\n    if (socialNetwork !=\
  \ nil) {\n      // 3) 检查它是否为故障状态\n      result = [NSString stringWithFormat:@\"\
  Social Network %@ a fault\\n\",\n                [socialNetwork isFault] ? @\"is\"\
  \ : @\"is not\"];\n\n// 4) 获取名称\n      result = [result stringByAppendingFormat:@\"\
  Social Network is named '%@'\\n\",\n                socialNetwork.name];\n\n// 5)\
  \ 检查它是否为故障状态\n      result = [result stringByAppendingFormat:@\"Social Network %@\
  \ a fault\\n\",\n                [socialNetwork isFault] ? @\"is\" : @\"is not\"\
  ];\n\n// 6) 将其恢复为故障状态\n      [context refreshObject:socialNetwork mergeChanges:NO];\n\
  \      result = [result stringByAppendingFormat:@\"Turning Social Network into a\
  \ fault\\n\"];\n\n// 7) 检查它是否为故障状态\n      result = [result stringByAppendingFormat:@\"\
  Social Network %@ a fault\\n\",\n                [socialNetwork isFault] ? @\"is\"\
  \ : @\"is not\"];\n    } else {\n      result = @\"Couldn't find social networks\
  \ for selfie\";\n    }\n  } else {\n    result = @\"Failed to fetch first selfie\"\
  ;\n  }\n  return result;\n}\n\n@end\n```\n\n***代码清单 9-25***. 实现了故障测试的 `DidFault.swift`\n\
  \n```swift\nimport Foundation\nimport CoreData\n\nclass DidFault : PerfTest {\n\
  \    func runTestWithContext(context: NSManagedObjectContext) -> String! {\n   \
  \     var result : String?\n\n// 1) 获取第一张自拍\n        let fetchRequest = NSFetchRequest(entityName:\
