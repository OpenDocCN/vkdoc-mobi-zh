  \n图 7-5. 显示笔记详情的详情视图\n\n## 提示输入并验证密码\n\n此前我们忽略了让用户输入`SecureNote`用于加密和解密笔记的密码这一需求，现在来处理这个问题。为了实现密码输入，我们执行以下步骤：\n\
  \n1.  在主导航视图控制器之前插入一个新的视图和视图控制器，该视图控制器显示一个密码输入字段和一个“登录”按钮。\n2.  当用户尝试登录时，将应用程序委托中创建的`password`字段设置为输入的密码。\n\
  3.  如果用户尚未输入密码，则将任何输入内容视为正式密码，将其存储在 iOS 钥匙串中，并跳转到主导航视图。\n4.  如果 iOS 钥匙串中已存在用户的密码，则将输入的密码与存储的密码进行比较，仅当两者匹配时，才跳转到主导航视图。\n\
  \n由于我们需要与 iOS 钥匙串交互，而钥匙串 API 是一堆混乱的 C 代码，这里我们稍微取巧一下，从`https://github.com/soffes/sskeychain`下载\
  \ Sam Soffes 的优秀库`SSKeychain`。通过 CocoaPods 或克隆仓库并添加源文件的方式，将此库添加到您的项目中。由于我们已经在项目中添加了安全框架，因此在添加源文件后，您就可以直接使用`SSKeychain`了。\n\
  \n## 添加密码视图控制器\n\n创建一个新的`UIViewController`类（没有 XIB 文件），命名为`PasswordViewController`，该类将控制密码视图，接收密码输入，验证输入的密码，并决定是否跳转到主导航视图。该控制器还负责将主视图控制器中的托管对象上下文设置为应用程序的托管对象上下文。头文件`PasswordViewController.h`应包含一个密码文本字段的出口，以便我们能够提取用户输入的密码，如代码清单\
  \ 7-39 所示。\n\n***代码清单 7-39***. `PasswordViewController.h`，包含密码字段的出口\n\n```\n#import\
  \ <UIKit/UIKit.h>\n\n@interface PasswordViewController : UIViewController\n\n@property\
  \ (weak, nonatomic) IBOutlet UITextField *passwordField;\n\n@end\n```\n\n实现文件（`PasswordViewController.m`或`PasswordViewController.swift`）重写了两个方法。\n\
  \n*   `prepareForSegue:sender:`，允许我们在执行跳转前进行任何准备工作。\n*   `shouldPerformSegueWithIdentifier:sender:`，让我们有机会允许或拒绝执行跳转。\n\
  \n在`prepareForSegue:sender:`方法中，我们从应用程序委托获取托管对象上下文，并将其设置到主视图控制器上。\n\n在`shouldPerformSegueWithIdentifier:sender:`方法中，我们确保用户确实在密码字段中输入了内容。我们将用户输入的任何内容设置到应用程序委托中。然后，我们从\
  \ iOS 钥匙串中获取存储的`SecureNote`密码。如果钥匙串中的密码为空，我们将用户输入的密码存储到钥匙串中，并通过返回`YES`来允许执行跳转。但是，如果在钥匙串中找到了`SecureNote`密码，则将其与用户输入的密码进行验证，仅当两者匹配时才允许执行跳转。代码清单\
  \ 7-40 展示了`PasswordViewController.m`，代码清单 7-41 展示了`PasswordViewController.swift`。\n\
  \n***代码清单 7-40***. `PasswordViewController.m`\n\n```\n#import \"PasswordViewController.h\"\
  \n#import \"AppDelegate.h\"\n#import \"MasterViewController.h\"\n#import \"SSKeychain.h\"\
  \n\n@implementation PasswordViewController\n\n#pragma mark - 导航\n\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender {\n  if ([segue.identifier isEqualToString:@\"logIn\"\
  ]) {\n    // 设置主视图控制器中的托管对象上下文\n    AppDelegate *appDelegate = (AppDelegate *)[[UIApplication\
  \ sharedApplication] delegate];\n    MasterViewController *controller = (MasterViewController\
  \ *)[segue destinationViewController];\n    controller.managedObjectContext = appDelegate.managedObjectContext;\n\
  \  }\n}\n\n- (BOOL)shouldPerformSegueWithIdentifier:(NSString *)identifier sender:(id)sender\
  \ {\n  // 确保他们在密码字段中输入了内容\n  NSString *enteredPassword = self.passwordField.text;\n\
  \  if ([identifier isEqualToString:@\"logIn\"] && enteredPassword.length > 0) {\n\
  \n    // 将用户输入的任何内容存储到应用程序委托中\n    AppDelegate *appDelegate = (AppDelegate *)[[UIApplication\
  \ sharedApplication] delegate];\n    appDelegate.password = enteredPassword;\n\n\
  \    // 从钥匙串中检索密码\n    NSString *password = [SSKeychain passwordForService:@\"SecureNote\"\
  \ account:@\"default\"];\n\n    // 如果用户从未输入过密码，则他们正在创建一个新密码\n    if (password ==\
  \ nil) {\n      // 将密码存储在钥匙串中并允许执行跳转\n      [SSKeychain setPassword:enteredPassword\
  \ forService:@\"SecureNote\" account:@\"default\"];\n      return YES;\n    } else\
  \ {\n      // 验证密码，仅验证通过才允许跳转\n      return [password isEqualToString:enteredPassword];\n\
  \    }\n  } else {\n    return NO;\n  }\n}\n\n@end\n```\n\n***代码清单 7-41***. `PasswordViewController.swift`\n\
  \n\n\n## `PasswordViewController` 类\n\n```\nimport Foundation\nimport UIKit\n\n\
  class PasswordViewController : UIViewController {\n    @IBOutlet weak var passwordField:\
  \ UITextField!\n\n    override func prepareForSegue(segue: UIStoryboardSegue, sender:\
  \ AnyObject?) {\n        if segue.identifier == \"logIn\" {\n            // Set\
  \ the managed object context in the master view controller\n            let appDelegate\
  \ = UIApplication.sharedApplication().delegate as! AppDelegate\n            let\
  \ controller = segue.destinationViewController as! MasterViewController\n      \
  \      controller.managedObjectContext = appDelegate.managedObjectContext\n    \
  \    }\n    }\n\n    override func shouldPerformSegueWithIdentifier(identifier:\
  \ String?, sender: AnyObject?) -> Bool {\n        // Make sure they've entered something\
  \ in the password field\n        let enteredPassword = self.passwordField.text\n\
  \        if identifier == \"logIn\" {\n            // Store whatever they've entered\
  \ in the application delegate\n            let appDelegate = UIApplication.sharedApplication().delegate\
  \ as! AppDelegate\n            appDelegate.password = enteredPassword\n\n      \
  \      // Retrieve the password from the keychain\n            let password = SSKeychain.passwordForService(\"\
  SecureNote\", account: \"default\")\n\n            // If they've never entered a\
  \ password, they're creating a new one\n            if password == nil {\n     \
  \           // Store the password in the keychain and allow segue to be performed\n\
  \                SSKeychain.setPassword(enteredPassword, forService: \"SecureNote\"\
  , account: \"default\")\n                return true\n            } else {\n   \
  \             // Verify password and allow segue only if verified\n            \
  \    return password == enteredPassword\n            }\n        }\n        else\
  \ {\n            return false;\n        }\n    }\n}\n```\n\n## 将密码视图添加到故事板\n\n经过一番对故事板的调整以及对应用程序委托代码的微调后，我们终于可以运行\
  \ `SecureNote` 了。\n\n1.  首先，编辑 `AppDelegate.m` 或 `AppDelegate.swift` 中的 `application:didFinishLaunchingWithOptions:`\
  \ 方法，使其仅返回 `YES` 或 `true`，如代码清单 7-42（Objective-C）或代码清单 7-43（Swift）所示。\n\n    ***代码清单\
  \ 7-42***. 移除设置托管对象上下文的代码（Objective-C）\n\n    ```\n    - (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
  \        return YES;\n    }\n    ```\n\n    ***代码清单 7-43***. 移除设置托管对象上下文的代码（Swift）\n\
  \n    ```\n    func application(application: UIApplication, didFinishLaunchingWithOptions\
  \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n        return true\n    }\n\
  \    ```\n\n2.  现在打开故事板 `Main.storyboard`，在导航控制器和主视图控制器之间拖入一个新的视图控制器。你可能需要将主视图控制器和详细视图控制器向右移动以腾出空间。\n\
  3.  在身份检查器中，将新视图控制器的自定义类设置为 `PasswordViewController`。\n4.  在属性检查器中，将标题字段设置为 **Password**。在视图上拖入一个标签，并将其文本设置为\
  \ **Password:**。在标签下方拖入一个文本字段，将其大小调整为视图宽度，并将其连接到 `passwordField` 插座。同时，在属性检查器中，勾选**安全文本输入**复选框，以便用户输入时密码被遮蔽。最后，在密码字段下方拖入一个按钮，并将其文本设置为\
  \ **Log In**。从弹出菜单中添加缺失的约束。\n5.  按住 Control 键并从按钮拖拽到主视图控制器，在弹出的菜单中选择 **show**，这样点击此按钮将触发到主视图控制器的\
  \ segue。同时，选中代表该 segue 的箭头，打开属性检查器，将其标识符设置为 **logIn**。图 7-6 展示了密码视图控制器。\n\n    ![9781430260288_Fig07-06.jpg](img/9781430260288_Fig07-06.jpg)\n\
  \n    *图 7-6. 密码视图控制器*\n\n6.  最后一项任务是将导航控制器的 segue 指向密码视图控制器。选中导航控制器，打开连接检查器，断开与主视图控制器的连接。然后，从\
  \ **root view controller** 行末端的圆点拖拽到密码视图控制器，segue 将正确更新。完成后的故事板应类似于图 7-7。\n\n  \
  \  ![9781430260288_Fig07-07.jpg](img/9781430260288_Fig07-07.jpg)\n\n    *图 7-7.\
  \ 完成后的故事板*\n\n## 运行 `SecureNote`\n\n现在你应该能够构建并运行 `SecureNote` 了。运行后，你应该会看到密码视图。输入任意内容设置密码，然后点击\
  \ **Log In**。接着，你应该能够点击 **+** 按钮添加笔记，或点击现有笔记进行编辑。\n\n如果你重新运行应用程序，应再次看到密码视图。输入错误密码并点击\
  \ **Log In** 不应有任何反应。输入正确密码并点击 **Log In** 应进入包含笔记列表的主视图。\n\n如果你打开 SQLite 数据库并查看数据，会发现\
  \ `ZNOTE` 表中的 `ZBODY` 和 `ZTITLE` 列包含难以理解的乱码——这是我们加密转换器的成果。\n\n## Transformable 的替代方案：数据保护\n\
  \n在上一节中，我们使用值转换器和 Common Crypto 库对数据进行逐字段加密。苹果提供了另一种在 iPhone 或 iPad 上加密数据的方法，称为数据保护。如果在设备上启用了数据保护，当设备锁定时，iOS\
  \ 会加密其部分数据存储，并在解锁时解密。要启用数据保护，请根据设备和 iOS 版本，在**设置** → **触控 ID 与密码**或**设置** → **密码**中设置设备密码。在该设置屏幕的最底部，你应该会看到以下信息：“数据保护已启用。”请注意，此功能仅在真实设备上可用，在\
  \ iOS 模拟器中不可用。\n\n\n\n\n开启数据保护并不会自动加密设备上的所有存储空间。若需加密 Core Data 数据存储，必须通过设置持久化存储的属性来手动开启。具体做法是：向\
  \ `NSFileManager` 的 `setAttributes:ofItemAtPath:error` 方法传递一个字典，其中 `NSFileProtectionKey`\
  \ 键对应的值为 `NSFileProtectionComplete`。相关实现可参考 代码清单 7-44（Objective-C）或 代码清单 7-45（Swift）。\n\
  \n***代码清单 7-44*** 设置 Core Data 持久化存储使用数据保护（Objective-C）\n\n```\n- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator {\n  if (_persistentStoreCoordinator != nil) {\n\
      return _persistentStoreCoordinator;\n  }\n\nNSURL *storeURL = [[self applicationDocumentsDirectory]\
  \ URLByAppendingPathComponent:@\"SecureNote.sqlite\"];\n\nNSError *error = nil;\n\
    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self\
  \ managedObjectModel]];\n  if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error]) {\n    NSLog(@\"Unresolved\
  \ error %@, %@\", error, [error userInfo]);\n    abort();\n  }\n\n// 加密持久化存储\n  NSDictionary\
  \ *fileAttributes = @{ NSFileProtectionKey : NSFileProtectionComplete };\n  if (![[NSFileManager\
  \ defaultManager] setAttributes: fileAttributes\n                                        ofItemAtPath:[storeURL\
  \ path]\n                                               error:&error]) {\n    NSLog(@\"\
  Unresolved error with persistent store encryption %@, %@\", error, [error userInfo]);\n\
      abort();\n  }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n***代码清单 7-45***\
  \ 设置 Core Data 持久化存储使用数据保护（Swift）\n\n```\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator?\
  \ = {\n    var coordinator: NSPersistentStoreCoordinator? = NSPersistentStoreCoordinator(managedObjectModel:\
  \ self.managedObjectModel)\n    let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
  SecureNoteSwift.sqlite\")\n    var error: NSError? = nil\n    var failureReason\
  \ = \"There was an error creating or loading the application's saved data.\"\n    if\
  \ coordinator!.addPersistentStoreWithType(NSSQLiteStoreType, configuration: nil,\
  \ URL: url, options: nil, error: &error) == nil {\n        coordinator = nil\n        //\
  \ 报告捕获的错误\n        let dict = NSMutableDictionary()\n        dict[NSLocalizedDescriptionKey]\
  \ = \"Failed to initialize the application's saved data\"\n        dict[NSLocalizedFailureReasonErrorKey]\
  \ = failureReason\n        dict[NSUnderlyingErrorKey] = error\n        error = NSError.errorWithDomain(\"\
  YOUR_ERROR_DOMAIN\", code: 9999, userInfo: dict)\n        NSLog(\"Unresolved error\
  \ \\(error), \\(error!.userInfo)\")\n        abort()\n    }\n\n// 加密持久化存储\n    let\
  \ fileAttributes = [NSFileProtectionKey : NSFileProtectionComplete]\n    if !NSFileManager.defaultManager().setAttributes(fileAttributes,\
  \ ofItemAtPath: url.path!, error: &error) {\n      NSLog(\"Unresolved error with\
  \ persistent store encryption \\(error), \\(error!.userInfo)\")\n      abort()\n\
      }\n\nreturn coordinator\n}()\n```\n\n当应用在启用了数据保护的设备上运行时，设备锁定时持久化存储的数据库文件将自动被加密。这种方法实现成本较低，但需要注意的是，一旦设备解锁，文件会自动解密，因此数据库的安全程度取决于设备本身。若有人能猜出密码，数据库仍可被访问，尤其是在设备已越狱（即获取了\
  \ root 权限）的情况下。该加密方法的另一个不便之处在于：对于非常大的数据库，解锁和启动应用所需的时间可能较长，因为在使用前需解密庞大的文件。\n\n##\
  \ 总结\n\n本章介绍了值转换器（Value Transformer）以及如何利用它扩展 Core Data，使其能够存储任意数据类型。如果数据类型支持 `NSCoding`\
  \ 协议（例如 `UIColor`），则无需提供自定义的值转换器类。即使数据类型不支持 `NSCoding` 协议，我们也看到添加自定义值转换器非常简单，能够轻松实现对\
  \ Core Data 存储中任意数据类型的读写操作。\n\n此外，我们还学习了如何通过设置 Core Data 存储文件的属性，利用 iOS 内置的数据保护功能。\n\
  \n掌握这些知识后，我们就能保护应用数据免受窥探，甚至可能避开 NSA 的监视！\n\n# 第 8 章 与服务交互：iCloud 与 Dropbox\n\n从\
  \ iOS 5 开始，苹果为 Core Data 引入了 iCloud 同步功能。iOS 开发者曾为这一即插即用的解决方案感到欣喜，它能在 iPhone 应用、iPad\
  \ 应用和 Mac OS X 应用之间同步数据。然而，当他们真正开始使用 iCloud 同步 Core Data 数据存储时，喜悦便被泪水所取代。事实证明，同步是一个难以攻克的难题，而苹果目前尚未完美解决——至少对\
  \ Core Data 而言。不过，随着苹果对同步技术的不断迭代，它很可能会在未来的 SDK 版本中使 iCloud Core Data 同步正常运作。为了让读者有所了解，本章将介绍使用\
  \ iCloud Core Data 同步的相关信息。\n\n其他 Core Data 同步解决方案也应运而生，包括诸如 `ParcelKit`（`https://github.com/overcommitted/ParcelKit`）、`Ensembles`（`www.ensembles.io/`）以及\
  \ `TICoreDataSync`（`http://timisted.github.io/TICoreDataSync/`）等库。我们建议你研究这些解决方案，并参考其官方网站上的文档，判断它们是否更适合你和你的应用。本书不会复制这些文档，也不会涵盖所有这些库。不过，我们会探讨\
  \ Dropbox 提供的同步解决方案，以及前面提到的、基于 Dropbox 同步 Core Data 的 `ParcelKit`。\n\n## 集成 iCloud\n\
  \n虽然早期版本的 iCloud Core Data 同步需要绞尽脑汁才能勉强运行，但 iOS 7 使得 iCloud 同步的管理变得简单得多。在本节中，我们将使用\
  \ Xcode 的模板构建一个简单的应用，并使用 iCloud 将数据同步到云端。首先，在 Xcode 中使用“Master-Detail Application”模板创建一个新项目，如图\
  \ 8-1 所示。\n\n![9781430260288_Fig08-01.jpg](img/9781430260288_Fig08-01.jpg)\n\n图\
