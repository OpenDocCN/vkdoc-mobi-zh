  ];\n  ...\n}\n```\n\n您的 Swift 函数应如下所示：\n\n```\nfunc initStore() {\n  deleteAllObjects(\"\
  Book\")\n  deleteAllObjects(\"BookCategory\")\n  ...\n}\n```\n\n现在再次运行应用程序，无论运行多少次，存储都是干净的。\n\
