    Summary


    This chapter is different from the other chapters in that the focus was primarily
    outside of Xcode and Swift. Most of these tools that we looked at are run in the
    Terminal. The sqldiff lets us compare two databases and copy the schema and content
    from one to another. The sqlite3_analyzer tool generates a report on how the space
    is used in the pages in the database. We also looked at the ANALYZE statement,
    which creates a stat1 table to store statistics on the tables, which are then
    used in the SQLite Query Optimizer to select the best algorithm to use to perform
    various queries against a database.


    I hope this book serves you well.


