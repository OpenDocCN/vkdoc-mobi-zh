    \ %, which is fantastic. This means that there isn’t any bloat in the pages.\n\
    \nA page is a unit of storage in a database—any database, really. In this table,\
    \ only one page is used. However, that database is free to use as many pages as\
    \ is needed to efficiently manage itself. When there is a lot of activity from\
    \ inserts, deletes, and updates, the database can be become bloated with unused\
    \ space in the pages.\n\nIn order to regain that space and optimize the database,\
