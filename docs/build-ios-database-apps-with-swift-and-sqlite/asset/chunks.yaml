    The DetailViewController


    The DetailViewController contains buttons to create and open a SQLite database
    and load SQL templates as well as to execute the queries to create the database
    schema.


    The following code is the app’s implementation of the processing logic as it relates
    to the interaction with the user, the controllers, and the model. Since the DetailViewController
    is a subclass of the UIViewController , there are several functions that are provided
    with the class.


    From the code, you’ll notice that I create an instance of the DbMgrDAO class as
    well as an instance of the Db class. I call their init functions to initiate the
    classes.


    The createDbButton @IBAction


    The createDbButton is an @IBAction . As we have seen in the section on building
    the UI, the function is connected to the UIButton in the UI Detail Scene. I assign
    the value from the detailSQLiteQueryField to the dbname constant. This value will
    be passed to the openSQLiteDatabase method that we previously discussed to create
    and open the database file, thus creating a connection with the database. If the
    return value is OK or 0, I will display a success or confirmation message in the
    same detailSQLiteQueryField .


    // DetailViewController.swift


    // Db Mgr


    //


    // Created by Kevin Languedoc on 2016-05-20\.


    // Copyright © 2016 Kevin Languedoc. All rights reserved. //


    import UIKit


    class DetailViewController: UIViewController {


    let dbDAO:DbMgrDAO = DbMgrDAO.init()


    let database:Db = Db.init()


    var dbname:String = ""


    var dbStatusMsg:String = ""


    @IBAction func createDbButton(_ sender: AnyObject) {


    dbname = self.detailSQLiteQueryField.text


    if(dbDAO.openSQLiteDatabase(dbname).rawValue == Enums.SQLiteStatusCode.ok.rawValue){


    self.detailSQLiteQueryField.text = "SQLite database \(self.


    detailSQLiteQueryField.text) is created and open"


    if let delegate = self.delegate {


    delegate.didOpenDatabase(self, databaseName: dbnane)


    }


    }


    }


    That is pretty much it for the button. Let’s look at the remaining IBActions functions
    that are connected to the buttons in the Detail scene next.


