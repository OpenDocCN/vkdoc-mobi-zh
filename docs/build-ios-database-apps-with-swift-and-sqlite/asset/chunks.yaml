    \ nil\nvar errmsg: String = \"\"\n\noverride init() {\n    //此处编写代码\n}\n```\n\n\
    ### `populateIndexView` 函数\n\n在 `init` 函数之后，我定义了 `populateIndexView` 函数。第一个参数定义为\
