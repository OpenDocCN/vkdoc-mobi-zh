    \ schemaDetailsItems=[[String]]()\n    var tableArray:[String] = []\n    var viewArray:[String]\
    \ = []\n    var indexArray:[String] = []\n    var triggerArray:[String] = []\n\
    \    var dao:DbMgrDAO = DbMgrDAO.init()\n```\n\n让我们从自定义属性开始讲起。第一个变量是 `detailViewController`，用于获取\
    \ `DetailViewController` 的句柄，这样我就可以将状态信息传回给编辑器，而无需像常规文档路径那样通过 `segue`。是的，该路径是双向的。`objects`\
    \ 变量是一个通用数组，用于存放所有类型的对象。然后，我设置了 `schemaSection` 这个不可变数组，用于定义数据库及相应模式的表格区段。`schemaDetailsItems`\
    \ 是一个可变数组，用于存储按表、视图、索引和触发器分类的模式。正如你可能猜到的，`tableArray`、`viewArray`、`indexArray`\
    \ 和 `triggerArray` 是用于存储各区段具体内容的数组。这几乎就像创建一个 JSON 数据结构，因为最后这四个数组将被附加到 `schemaDetailsItems`\
    \ 数组中，正如在 `didViewLoad` 函数中看到的那样。这个变量是 `DbMgrDAO` 类的一个实例。我将用它来调用我在上一节中提到的各种函数。\n\
    \n### viewDidLoad 函数实现\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \n    schemaDetailsItems.append(dao.initViewIndex())\n    schemaDetailsItems.append(tableArray)\n\
    \    schemaDetailsItems.append(viewArray)\n    schemaDetailsItems.append(indexArray)\n\
    \    schemaDetailsItems.append(triggerArray)\n\n    if let split = self.splitViewController\
    \ {\n        let controllers = split.viewControllers\n        self.detailViewController\
    \ = (controllers[controllers.count-1] as! UINavigationController).topViewController\
    \ as? DetailViewController\n    }\n}\n```\n\n从上述代码中，你可以推断出如何在 `MasterViewController`\
    \ 中填充 `UITableView` 数据源的知识。首先，当应用从 `AppDelegate` 对象加载时（该对象在从 `main.swift` 文件启动应用时被调用），会调用\
    \ `initViewIndex`。`initViewIndex` 的结果会被附加到 `schemaDetailsItems` 数组中。我还为其他区段附加了空数组；否则，Swift\
    \ 编译器会报错，提示其他区段为空或不存在。\n\n剩下的代码设置了 `splitViewController`、导航，并将 `detailViewController`\
    \ 设置为初始或顶层控制器。你无需更改或触碰这些代码。\n\n我提供了一种填充 `TableView` 的方式或技术。不过，你也可以设置一个 `UITableViewCell`\
    \ 来充当单元格的控制器。在我的案例中，我使用了两个数据源来构建主数据源，因此很难定义一个单元格控制器，但并非不可能实现。\n\n我不会赘述那些我没有使用但作为\
    \ `UITableView` 实现一部分的函数，即 `viewWillAppear` 和 `didReceiveMemoryWarning`。\n\n###\
    \ 数据源函数的实现\n\n以下函数是设置和在 `TableView` 中显示数据所必需的。`titleForHeaderInSection` 返回区段的标题，因此对于此应用，标题分别是\
    \ Databases、Tables、Views、Indexes 和 Triggers。`numberOfSectionsinTableView` 函数决定了\
    \ `TableView` 将包含多少个区段。对于此应用，该值为 5，即 `schemaSections` 数组中的元素个数。`numberOfRowsInSection`\
    \ 配置了要显示的行数。这通常是作为数据源的数组中元素的个数。由于我使用了嵌套数组，我将每个区段的行数设置为 `schemaDetailsItems [section].count`。最后一个必需的函数是\
    \ `cellForRowAtIndexPath`：\n\n```\noverride func tableView(_ tableView: UITableView,\
    \ titleForHeaderInSection section: Int) -> String? {\n    return self.schemaSections\
    \ [section ]\n}\n\noverride func numberOfSections(in tableView: UITableView) ->\
    \ Int {\n    return self.schemaSections.count\n}\n\noverride func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n    return\
    \ schemaDetailsItems [section].count\n}\n\noverride func tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    let\
    \ cell = tableView.dequeueReusableCell (withIdentifier: \"Cell\", for: indexPath)\n\
    \    cell.textLabel?.text = self.schemaDetailsItems[(indexPath as NSIndexPath).section][(indexPath\
    \ as NSInpexPath).row]\n    return cell\n}\n```\n\n当需要在场景之间导航时，可以通过定义在不同场景之间连接的线程（称为\
    \ segues）来实现。当应用从一个视图（场景）移动到另一个视图时，会调用 `prepareForSeque` 函数。这个函数非常重要，因为它还提供了将数据和对象传输到下一个\
    \ `ViewController` 的途径。然而，`prepareForSegue` 只能单向使用。如果你想返回到调用方的 `ViewController`，则需要从场景中展开，这需要创建一个\
    \ `unWindFromSegue` 函数。这个概念类似于在互联网浏览器中后退历史路径。不过，使用展开方式时，你一次只能展开一个场景，并且必须按照你前进的顺序进行。\n"
