    \ here that all SQLite databases have a `.sqlite` extension, which may not be\
    \ the case in a production environment). The `map` is used to extrapolate only\
    \ the last part of the returned paths.  \n\nThe `filter` and `map` design have\
    \ been reworked in the latest version of Swift to apply a mapReduce pattern of\
    \ sorts. The design pattern eliminates the need to iterate through an array, hence\
    \ it is much more efficient. The `filter` uses a Boolean expression to test and\
    \ return the reduced list. The `map` function is used to extract or perform a\
    \ transformation on portions of a collection that has been filtered.  \n\n## The\
    \ `executeQuery` Function  \n\nThe `executeQuery`, as its name implies, executes\
    \ SQLite queries. I make extensive use of this function in association with the\
    \ Execute Query button in the `DetailedViewController` that we will explore later.\
    \ The function follows a path similar to that of the other functions that perform\
    \ SQLite operations—namely, it ensures the database is open or opens it as needed\
    \ using the `sqlite3_open` command. If it can’t open the database—or create it,\
    \ for that matter—it returns an error message that will be displayed in the Editor\
    \ field in the `DetailViewController`.  \n\n```\nfunc executeQuery(_ sender:AnyObject,\
    \ query:String?)->String{\n    let sourceVC:DetailViewController = nil;\n    if(\
