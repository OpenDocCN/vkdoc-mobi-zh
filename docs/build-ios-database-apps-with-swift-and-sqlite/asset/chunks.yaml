    \ `showWineryDetail` in the Identity field.\n\nWith the segue created, we open\
    \ the `SecondViewController` and uncomment the `prepareForSegue` function near\
    \ the end of the code.\n\nAs before, we need to create a constant with a `segue.destinationViewController`\
    \ assignment, then cast this as a `SecondViewController`. This will give us the\
    \ `IBOutlets` in the `SecondViewController`. Next, we need to define a constant\
    \ for the cell in the Winery List `TableViewController` so that we can access\
    \ the `IBOutlets` defined there. Then, it’s a simple operation of assigning the\
    \ values of the selected row in the table to the outlets in the `wineryController`\
    \ object before the segue pushes the `SecondViewController` onto the stack with\
    \ the corresponding fields populated.\n\nNotice the `isEdit` property, described\
    \ later, that we are adding to the `SecondViewController` to indicate that we\
    \ need to run the `WineryUpdate` function rather than the `insertWineryRecord`\
    \ function.\n\n```\noverride func prepare(_ for segue: UIStoryboardSegue, sender:\
    \ AnyObject?) {\n    // Get the new view controller using segue.destinationViewController.\n\
    \    // Pass the selected object to the new view controller.\n    if(segue.identifier\
    \ == \"showWineryDetail\"){\n        let wineryController = segue.destinationViewController\
    \ as! SecondViewController\n        if let wineryCell = sender as? WineryCellTableViewCell\
    \ {\n            let indexPath = tableView.indexPath(for: wineryCell)!\n     \
    \       let selectedWinery = wineryListArray[(indexPath as NSIndexPath).row]\n\
    \            wineryController.winery = selectedWinery\n            wineryController.isEdit\
    \ = 1\n        }\n    }\n}\n```\n\nAs with the previous discussion on saving changes,\
    \ we have modified the `SecondViewController` by adding the `isEdit` property\
    \ and setting its initial value to `-1`. Mind you, we could set this value to\
    \ anything, really. Also, we could have used the unwind Segue functionality, but\
    \ this little bit of code suits our purposes better. In addition, we kept the\
    \ previous connection as `insertWineryBtn` instead of renaming it something like\
    \ `saveWinery`, simply to illustrate a possible functionality of saving records\
    \ to a SQLite database.\n\n```\nvar isEdit:Int = -1\n\n@IBAction func insertWineryBtn(_\
    \ sender: AnyObject) {\n    winery.name = wineryNameField.text!\n    winery.country\
    \ = countryNameField.text!\n    winery.region = regionNameField.text!\n    winery.volume\
    \ = Double(enterVolume.text!)!\n    winery.uom = enterUoM.text!\n    if(winery.isEdit==1){\n\
    \        dbDAO.wineryUpdate(winery)\n    }else{\n        dbDAO.insertWineryRecord(winery)\n\
    \    }\n    isEdit = -1\n}\n```\n\nWith the controllers in place, all that is\
    \ needed is to run the app to see if everything checks out, and to debug if necessary.\n\
    \n## Running the App\n\nFor this example, we will fetch a wine record as well\
    \ as a winery record from the database, update the records, and save them back\
    \ to the database.\n\n## Updating Records\n\nLaunch the app on an iPhone and switch\
