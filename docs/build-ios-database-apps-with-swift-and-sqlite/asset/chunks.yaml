    example: ALTER TABLE main.producer RENAME main.wineries


    Complex Table Renaming


    Of course, if you have constraints on a table, or on indexes, or if you have triggers
    and views that reference the table that you are renaming, you should use the following
    procedure and make the alterations.


    Run a SELECT query on the sqlite_master table to get a copy of the query you used
    to create the indexes, views, and triggers. You can use a query similar to this:


    SELECT sql from main.sqlite_master


    This query would return all SQL statements for each type of element in the database.
    I recommend saving this query either to a file or another database so that you
    have a reference to modify and re-create these elements later. You could also
    just extract the SQL statements for specific elements, like a view or trigger,
    in which case the SQL SELECT query would look something like the following: SELECT
    sql FROM main.sqlite_master WHERE type = ‘view’ or type = ‘trigger’


    This type of query would return all the statements associated with these database
    objects. Once you have these queries in hand, you can disable any constraints
    by issuing the following


    command:


    PRAGMA foreign_keys=OFF


    Followed by the rename statement from earlier.


    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    Once the renaming is complete, you re-create the indexes, views, and triggers
    using the CREATE function for each of the objects after you have dropped them
    from the database. To drop, you simply use the DROP command, as follows:


    DROP viewname


    DROP triggername


    DROP indexname


    Finally, re-enable the foreign keys using the PRAGMA foreign_keys= ON command,
    as follows: PRAGMA foreign_keys=ON


    These sequences of SQL queries can all be executed from the Db Mgr app using the
    Rename table menu command. Finally, you should run an UPDATE query to update the
    sqlite_master table with any changes to your table, as follows:


    UPDATE main.sqlite_master


    SET sql = ‘ new creatw table query’


    WHERE type = ‘table’


    AND name = ‘your table name’


    ■ Warning If you run an update on the sqlite_master and your update query has
    syntax errors, you will corrupt the sqlite_master table and your database. It
    is best to test your update query on a blank database or on a test table with
    a similar structure as the sqlite_master table to ensure that the update query
    works as expected.


    In the next section, I will show how to add columns to an existing table. Adding
    Columns


    Adding columns to a SQLite database table is the second actual way of altering
    a SQLite database table. By this I mean that the ALTER command is only available
    for these two use cases. As with the renaming, the Add Column functionality has
    a few caveats that you need to adhere to in order to add columns to a SQLite database
    table; otherwise, you can define a new column using the CREATE TABLE statement.


    • The new column cannot be defined as a primary key.


    • The added column cannot have a date-time default value defined using the following
    functions: CURRENT_TIME , CURRENT_DATE , CURRENT_TIMESTAMP.


    • If the column is set to NOT NULL , then you must provide a default value. •
    If you are adding a column that will be used as reference to a foreign key, then
    the


    column must be set to NULL as a default value.


    • Each new column must be added individually.


    To add a column to an existing table, you simply need to run a SQL query; for
    example: Alter table main.tablename


    Add column columnname datatype default value


    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    Here are some actual examples:


    Create table main.country(id integer primary key not null autoincrement, name
    varchar not null) Alter table main.country


    Add column continent varchar null


    Alter table main.country


    Add column population integer null


    Once the query is executed using sqlite3_exec or sqlite3_prepare_v2 , sqlite3_step
    , and sqlite3_ finalize , the alterations will be completed.


    Re-indexing a Table


    The third type of modification you can do to a table is to re-index its index.
    You can specify a single index to rebuild, or all of them, if there is more than
    one in a table. Likewise, if you have a collation sequence to arrange data in
    a database, you can re-index the collation sequence, and all indexes associated
    with the collation name will be re-indexed.


    Re-indexing an index or collation sequence is accomplished using the REINDEX command
    followed by the schema name or collation name, as follows:


    REINDEX collation-name


    REINDEX main.table_name


    REINDEX main.table_index_name


    It is always useful to rebuild an index on a regular basis or after loading, reloading,
    or deleting a dataset from a table. This will also ensure that any unused space
    is removed and the sequence of the index is optimized, thus ensuring the fast
    data access.


    Modifying Views


    Views in a SQLite database cannot be modified or altered. You can only DROP a
    view and re-create it. To drop and create a view you can follow this sequence:


    DROP VIEW schema.view_name


    CREATE View schema.view_name as SELECT * or list of columns FROM schema.table_name
    WHERE where_clause


    The column list WHERE clause in a view is often used to delimit the amount of
    data that is stored in a database. The WHERE is optional but resolves to a Boolean
    value.


    Modifying Indexes


    Like views, an index cannot be altered or modified. You can only DROP and CREATE
    an index. If you have more than one index in a table, you will need to DROP and
    CREATE them individually. Also, before you drop an index, it is best to get a
    copy of the SQL CREATE query that was used to create the index from the sqlite_
    master table, because this table will be automatically updated once you execute
    the DROP statement, just like it gets updated when you CREATE an index .


    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    You can use the following sequence to alter an index:


    DROP INDEX schema.index_name


    CREATE optionally UNIQUE INDEX optionally IF NOT EXIST schema.index_name on schema.table_
    name(column(s)) WHERE where_clause


    The use of UNIQUE and IF NOT EXIST are optional, as is the WHERE clause. The IF
    NOT EXIST would be redundant here, as the index wouldn’t yet exist. If the WHERE
    clause is used, then the index will be known as a partial index. Also note that
    you can use an expression instead of a column or sequence of columns to be indexed.
    In addition, a COLLATION_NAME can be added with a sort order of ASC or DESC to
    arrange the data in the index.


    It is important to remember that when creating or modifying an index, the columns
    that you use for your index must be in the table where the index is. You cannot
    use columns in other tables.


    Here is an example of using an expression for an index:


    DROP INDEX main.wine_id


    CREATE UNIQUE INDEX main.wine_id on main.wineries(id+name) Using the a collation
    sequence, you would write a query similar to this example:


    DROP INDEX main.wine_id


    CREATE UNIQUE INDEX main.wine_id


    You can also use a function call in your expressions as long as the return value
    is deterministic. In other words, you cannot use functions like RANDOM() . The
    function can be either one of the functions provided by the SQLite API or a custom
    function. I will demonstrate functions a little later. For example, you could
    use the following:


    DROP INDEX main.wine_id


    CREATE INDEX main_wine_id ON main.wineries(coalesce(name)) Modifying Triggers'
