    The ATTACH Statement


    SQLite 3 provides the ATTACH DATABASE statement for multi-database queries. Although
    you could manage multiple database connections via an Objective-C DAO class, it
    is much more efficient to use SQLite’s API. Attaching databases means that more
    than one database is sharing the same database connection. To the SQLite engine,
    the first database that uses a database connection is known as **main** . Any
    additional databases that are attached must be assigned a new name to distinguish
    them in the connection pool. The syntax is very straightforward:


    let attachdb = "ATTACH DATABASE database_file AS schema_name" The value of database_file
    is the file name of the database to attach and schema_name is the alias for'
