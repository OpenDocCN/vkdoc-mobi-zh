    ### Backup an In-Memory Database


    Creating an in-memory backup is slightly different than backing up a running database.
    From the code that follows, you can see how simple it is to create an in-memory
    backup of your database. All you need is a pointer to your database and a pointer
    to the backup. Then, step through the database until all records have been backed
    up into the in-memory database:


    ```c

    func backupInMemory(){

    if(sqlite3_open(sourcedb, &db)==SQLITE_OK){

    if(sqlite3_open("file::memory:", &db) == SQLITE_OK){

    bakdb = sqlite3_backup_init(filedb, "main", db, "main")

    sqlite3_backup_step(bakdb, -1)

    sqlite3_backup_finish(bakdb)

    sqlite3_close(db);

    sqlite3_close(filedb)

    }

    }

    }

    ```


