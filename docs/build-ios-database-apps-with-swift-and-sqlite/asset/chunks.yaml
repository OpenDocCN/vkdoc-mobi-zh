- fmt: "# The Create Database Schema @IBAction Buttons\n\nThe first four functions\
    \ are very simple. They display the corresponding SQL queries for the database\
    \ elements that can be created in a SQLite database: tables, views, triggers,\
    \ and indexes. The fifth function calls the `executeQuery` function, passing the\
    \ contents of the `detailSQLiteQueryField` to it. The returned message is assigned\
    \ to the same field.\n\nEach of the button functions is assigned either the `tableDef`,\
    \ `viewDef`, `triggerDef`, or `indexDef` query templates from the `database` object,\
    \ which is an instance of the `Db` class.\n\n```swift\n@IBAction func createTableButton(_\
    \ sender: AnyObject) {\n    self.detailSQLiteQueryField.text = database.tableDef\n\
    }\n\n@IBAction func createViewButton(_ sender: AnyObject) {\n    self.detailSQLiteQueryField.text\
    \ = database.viewDef\n}\n\n@IBAction func createTriggerButton(_ sender: AnyObject)\
    \ {\n    self.detailSQLiteQueryField.text = database.triggerDef\n}\n\n@IBAction\
    \ func createIndexButton(_ sender: AnyObject) {\n    self.detailSQLiteQueryField.text\
    \ = database.indexDef\n}\n\n@IBAction func executeQueryButton(_ sender: AnyObject)\
    \ {\n    self.detailSQLiteQueryField.text = dbDAO.executeQuery(self.detailSQLiteQueryField.text)\n\
    }\n```\n\n## The `detailSQLiteQueryField` @IBOutlet\n\nThe `detailSQLiteQueryField`\
    \ is an `IBOutlet` variable associated with the `UITextArea` component of the\
    \ same name in the Detail scene. It is the main work area of the UI, loading and\
    \ editing queries as well as providing the SQLite database file to create and/or\
    \ open.\n\nThe variable’s signature is completely defined through the Interface\
    \ Builder (IB). Keep in mind that you can create the same functionality programmatically.\n\
    \n```swift\n@IBOutlet weak var detailSQLiteQueryField: UITextView!\n```\n\n##\
    \ Set Up the View\n\nWhen the Detail scene is first loaded after the app is launched,\
    \ the `detailItem` and the `configureView` functions are called from the `viewDidLoad`\
    \ function. These are also called when `prepareForSeque` is called from the `MasterViewController`.\n\
    \nThe modifications I did here were to replace the `UITextfield` that is included\
    \ with the Master-Detail template with the `detailSQLiteQueryField` in order to\
    \ receive information through the `prepareForSegue` function, and to add the code\
    \ to open the selected database from the `MasterViewController` TableView, passing\
    \ the value of `detail.description`. The status message is assigned to a variable\
    \ `dbStatusMsg` instead of being passed directly to the `detailSQLiteQueryField`,\
    \ because the field is not yet created when the function is called. Instead, I\
    \ assign the value of `dbStatusMsg` to the field in the `viewWillAppear` function.\n\
    \n```swift\nvar detailItem: AnyObject? {\n    didSet {\n        // Update the\
    \ view.\n        self.configureView()\n    }\n}\n\nfunc configureView() {\n  \
    \  if let detail = self.detailItem {\n        if (dbDAO.openSQLiteDatabase(detail.description).rawValue\
    \ == Enums.SQLiteStatusCode.ok.rawValue) {\n            dbStatusMsg = \"SQLite\
    \ database \\(detail.description) is created and open\"\n        }\n    }\n}\n\
    ```\n\n## The `viewDidLoad` Function Implementation\n\nI replaced all the code\
    \ that is included in the `viewdidLoad` function, except for the `self.configureView`,\
    \ with some setup code to set up the `detailSQLiteQueryField`.\n\n```swift\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    // Update the user interface\
    \ for the detail item.\n    self.detailSQLiteQueryField.layer.borderWidth = 1.0\n\
    \    self.detailSQLiteQueryField.layer.borderColor = UIColor.gray().cgColor\n\
    \    self.configureView()\n}\n```\n\n## The `viewWillAppear` Function Implementation\n\
    \nWhen the `viewWillAppear` function is called, I assign the value of `dbStatusMsg`\
    \ to the `detailSQLiteQueryField`, thus ensuring that the field is actually available.\n\
    \n```swift\noverride func viewWillAppear(_ animated: Bool) {\n    self.detailSQLiteQueryField.text\
    \ = dbname\n}\n```\n\n## Building the Winery Database\n\nTo finish this chapter,\
    \ I want to demonstrate creating a database, which I will use for chapters 5–9.\
    \ These chapters will perform CRUD operations using an app for wines.\n\n### Create\
    \ the `Winery.sqlite` File"
