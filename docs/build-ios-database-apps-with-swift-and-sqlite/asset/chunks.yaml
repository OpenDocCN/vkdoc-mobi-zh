- fmt: '# Working with Multiple Databases


    To attach a SQLite database to an open connection, you first need to open an initial
    database, thus opening a connection to the SQLite engine. This will be the main
    database, and you must refer to this database by its schema `main.table_name`.
    Subsequently, you need to create the other databases as needed, either up front
    or later. With the databases in hand and after opening the first, or main, database,
    you can issue the `ATTACH` statement like any other SQL query, specifying the
    name and path of the database you wish to attach to the main database connection,
    as well as the alias or schema.


    You would then refer to the other attached databases by their schema names, like
    `seconddb.table_name` or `attacheddb.table_name`. The name of the attached database
    schema is arbitrary and can be anything you like, except that it must be a single
    word or a compound word. © Kevin Languedoc 2016 [161]


    K. Languedoc, *Build iOS Database Apps with Swift and SQLite*, DOI 10.1007/978-1-4842-2232-4_10


    ## Attaching In-Memory Databases


    You can also attach in-memory databases. We haven''t looked at in-memory databases
    within the scope of this book; however, you can create an in-memory database using
    the special `:memory:` keyword when opening a database, as in the following example:


    ```

    sqlite3_open(":memory:", &db);

    ```


    Each time you create an in-memory database using the preceding command, it exists
    separately from any others. Once the in-memory databases are created, you can
    attach them as usual, as follows:


    ```

    let temp1 = "ATTACH DATABASE '':memory:'' AS temp1;"

    ```


    This will cause the second in-memory database (the second one created) to be attached
    to the first, or main, one. You can attach as many in-memory databases as are
    needed, as long as you remember that they will be attached in the sequence in
    which they were created.


    If you are using temporary databases—again, out of the scope of this book—you
    create the temporary database using the following command:


    ```

    sqlite3_open("", &db)

    ```


    Then, you attach the temporary databases as usual:


    ```

    let tempdb = "ATTACH DATABASE '''' as temp1"

    ```


    Both of these types of databases can be made to cease to exist once the SQLite
    connection is closed by using the command:


    ```

    sqlite3_close(&db)

    ```


    Also, it is possible to attach the same database more than once using different
    schema names. However, you must not have the `enable_cache_mode` enabled or you
    will get an error.


    ## The DETACH Statement


    The `DETACH` statement performs the opposite function of the `ATTACH` database.
    In other words, the command detaches a previously attached database from the open
    connection. Detaching a physical (on-disk) database, an in-memory database, or
    a temporary database is performed by issuing the `DETACH` command followed by
    the schema name, as follows:


    ```

    let detach_db:String = "DETACH DATABASE schema_name"

    ```


    Like the `ATTACH` statement, you can detach the same database that was attached
    multiple times using different schemas by using the same schema names to reference
    the databases to be detached. Like with the `ATTACH` operation, `enable_cache_mode`
    must be disabled or an error will be thrown.


    ## Multi-Database Limits


    Beyond the physical limit, in terms of the storage space of the iOS device where
    the app resides, the limit of attached databases is set using `SQLITE_LIMIT_ATTACHED`
    and the `sqlite3_limit` command. The syntax for the command is as follows:


    ```

    int sqlite3_limit(sqlite3*, int id, int newVal);

    ```


    The first parameter is the pointer to the open database connection; the second
    is one of the limit categories (listed next); and the last parameter is the new
    limit of the attached databases. For attached databases, you need to use the `SQLITE_LIMIT_ATTACHED`
    constant.


    If a negative number is used for the third parameter, no changes are made to the
    database limits.


    - `SQLITE_LIMIT_LENGTH` 0

    - `SQLITE_LIMIT_SQL_LENGTH` 1

    - `SQLITE_LIMIT_COLUMN` 2

    - `SQLITE_LIMIT_EXPR_DEPTH` 3

    - `SQLITE_LIMIT_COMPOUND_SELECT` 4

    - `SQLITE_LIMIT_VDBE_OP` 5

    - `SQLITE_LIMIT_FUNCTION_ARG` 6

    - `SQLITE_LIMIT_ATTACHED` 7

    - `SQLITE_LIMIT_LIKE_PATTERN_LENGTH` 8

    - `SQLITE_LIMIT_VARIABLE_NUMBER` 9

    - `SQLITE_LIMIT_TRIGGER_DEPTH` 10


    ## Performing Joins


    Building queries that take multiple databases into account is exactly like building
    joins between tables within the same database. The one caveat that you need to
    remember is that you need to reference the table or tables in the additional databases
    by prefixing the table with the database schema name, as the following example
    demonstrates.


    SQLite supports three types of join: `INNER JOIN`, `OUTER JOIN`, and `CROSS JOIN`.
    All three can be formed using multiple databases that are attached to the same
    open connection. See this example:


    ```

    SELECT c.name, a.address, a.city FROM mainDb.contacts c INNER JOIN secondDb.addresses
    a ON c.name, a.name

    ```


    ## Attach and Detach in Swift


    This is a simple single-view iPhone app to demonstrate and test the `ATTACH` and
    `DETACH` SQLite functionality in Swift. The app will provide a function to create
    databases (and open them). There will also be a function to `ATTACH` and `DETACH`
    a database from the main database.


    For the sake of simplicity, another function will pre-populate the databases using
    a sampling of city names and the countries in which they are located. A final
    function will fetch the data from the database and display the data in a `TableViewController`.


    ### The Project


    After the project is created, we need to add the `sqlite3` library as we have
    seen before; it is found in the **Linked Libraries and Framework** section in
    **General** settings.


    With the library in place, we will add the bridge using the **Objective-C class**
    template and choosing the **Category** file type, which will trigger Xcode to
    create the bridge file for us and set up the **Build settings** for the Swift
    compiler. Of course, we still need to add the `#import <sqlite3.h>` header reference
    in the bridge file to actually interface with the `sqlite3` library.


    With the project set up, we can add the logic to the `ViewController` to handle
    the multi-database operations.


    ### The ViewController


    The `ViewController` is the main entry point for the app''s logic. Other than
    the global variables and constants that are usually needed in order to interface
    with SQLite, the `ViewController` will have six functions. We will explore these
    in the following sections.


    Since the main view in the storyboard will contain a `UIPickerView` for the created
    databases, we will need to add the delegate and data source protocols:


    ```swift

    class ViewController: UIViewController, UIPickerViewDelegate, UIPickerViewDataSource

    ```


    ### The Global Variables and Constants


    The `ViewController` is created by default when the **Single View Application**
    template is used to create an app. To work with SQLite, we need a variable for
    the database name and path, which is called `dbPath` for this app. The `databases`
    array will contain the database names so that we can select a database to attach
    to the main one later.


    We also need a pointer, or `COpaquePointer` variable, for the SQLite database
    connection and a variable for the SQLite 3 statement. These are named `db` and
    `sqlStatement` respectively. `SQLITE_TRANSIENT` is a movable pointer for the SQLite
    destructor, which uses the `sqlite3_destructor_type` type. This has to be cast
    using the `unsafeBitCast` function in Swift.


    ```swift

    internal let SQLITE_TRANSIENT = unsafeBitCast(-1, to: sqlite3_destructor_type.self)

    var databases = [String]()

    var dbPath = URL()

    var db: COpaquePointer? = nil

    var sqlStatement: COpaquePointer? = nil

    var attachDb: String = ""

    ```


    ### The IBActions and IBOutlets


    Although the `IBActions` and `IBOutlets` will be added through the UI storyboard
    later, I wanted to mention...'
