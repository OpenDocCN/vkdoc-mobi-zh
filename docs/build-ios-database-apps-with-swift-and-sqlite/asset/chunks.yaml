    The last chapter will cover the analysis of SQLite databases.


    ![](media/image202.jpg)


    This last chapter will focus on the different tools the SQLite platform provides
    to help you analyze your app''s databases. Except for the `ANALYZE` statement,
    which can be executed with the `sqlite3_exec` command, the other tools are external
    software programs. Specifically, in this chapter we will discuss and explore,
    through examples, the following technologies:


    - The `ANALYZE` statement

    - The `sqldiff` tool

    - The `sqlite3_analyzer` tool


    Other than the `ANALYZE` statement, which we will explore in Swift, all the other
    tools are external tools that can help you analyze your databases for support
    and/or for development optimization.


    ### The Analyze Statement


    The role of the `ANALYZE` statement is to gather information on tables and indexes
    in a database through statistics. SQLite accomplishes this task by creating a
    `sqlite_stats1` table in your app''s database when the `ANALYZE` statement is
    executed. SQLite passes this information to the SQLite Query Optimizer, which
    in turn uses the collected information to use the best query algorithm for the
    best performance.


    If you build the database or enable `SQLITE3_ENABLE_STAT3` or `SQLITE3_ENABLE_STAT4`,
    additional histogram information is gathered and stored in the `sqlite3_stat3`
    and `sqlite3_stat4` tables respectively.'
