    \ `cString` 方法将该值转换为 Swift 字符串。\n"
- fmt: "# Note  \nThe process of binding Swift data to SQLite columns is pretty much\
    \ the same for the other data types, as I outlined in the previous paragraph.\
    \ Check out the SQLite Prepared Statement web page (https://www.sqlite.org/c3ref/stmt.html)\
    \ for the complete list of methods and functions and the corresponding argument\
    \ requirements and return types.  \n\nWith the result in hand, I only need to\
    \ assign the value to the `name` property of the `Db` object and append this value\
    \ to the result-set array.  \n\nThe array is returned to the calling array variable\
    \ in the `MasterViewController`, which will update the `TableView`’s data source\
    \ and reload the data into the `UITableView`.  \n\nThat completes the discussion\
    \ on populating a data source for the `TableView`. I demonstrated how to retrieve\
    \ values from a SQLite database. As I mentioned earlier, we will explore `SELECT`\
    \ statements later on in the chapter devoted to it, along with its API.  \n\n\
    ```\nfunc populateIndexView(_ sender:AnyObject, query:String)->Array<String>{\n\
    \    var resultset = [String]()\n    let sourceVC:DetailViewController = nil;\n\
    \    if( sender.sourceViewController.isKindOfClass(DetailViewController)){\n \
    \       sourceVC:DetailViewController = sender as! DetailViewController\n    }\n\
    \    if sqlite3_open(dbPath.path!, &db) != SQLITE_OK {\n        errmsg = \"error\
    \ opening database\"\n        print(errmsg)\n        sourceVC.detailSQLiteQueryField.text\
    \ = errmsg\n    }\n    let statuscode = sqlite3_prepare_v2(db, query.cString(using:\
    \ String.Encoding.utf8)!,\n                                        -1, &sqlStatement,\
