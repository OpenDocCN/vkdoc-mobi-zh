    # **备份 SQLite 数据库**


    磁盘备份与第一种选项类似，但使用的是 SQLite API。使用此选项时，应用实际上是将数据从源数据库移动到目标数据库。这两个数据库都是物理文件。理论上，目标数据库可以位于远程服务器上，也可以与源数据库位于同一个
    `Document` 目录下。


    磁盘备份操作使用了四个不同的函数来执行备份：

    - `sqlite3_backup_init`

    - `sqlite3_backup_step`

    - `sqlite3_sleep`

    - `sqlite3_backup_remaining`

    - `sqlite3_backup_pagecount`

    - `sqlite_backup_finish`


    调用 `sqlite3_backup_init` 来创建 `sqlite3_backup` 对象。该函数接受一个源数据库指针和一个目标数据库指针作为参数。这两个指针中，一个可以指向内存数据库，另一个指向物理数据库，或者两者都可以是物理数据库指针。


    下一步操作是 `sqlite3_backup_step` 函数，它会重复调用，将参数 5 中指定的第 *n* 个页数复制到目标数据库。每次迭代结束时，应用需要调用
    `sqlite3_sleep`，该函数会将进程冻结 250 毫秒，以便写入过程完成。`sqlite3_backup_remaining` 在 `sqlite3_backup_step`
    函数执行后返回数据库中剩余的页数。我通常在流程开始时调用 `sqlite3_backup_pagecount` 函数来确定数据库中有多少页（如本章后面的示例所示），然后在每次迭代后调用
    `sqlite3_backup_remaining` 函数。


    一旦源数据库完全备份完毕，就会调用 `sqlite3_backup_finish` 函数来清理 `sqlite3_backup_init` 函数分配的资源。


    ## **备份应用**


    为了演示各种备份 API，我将创建一个单视图 iOS iPhone 应用。该应用除了实现之前的 `backupCopyDatabase` 之外，还将实现两种
    SQLite 备份 API 的方法。


    我使用 Chinook 数据库的副本（https://chinookdatabase.codeplex.com/）作为示例数据。如果你打算尝试运行代码，需要将数据库导入到项目中。为了使数据库可写，需要将其复制到
    `Documents` 目录中，因此将 `copyDatabaseIntoDocuments` 方法添加到项目中。


    图 11-1 显示了第二个屏幕，你可以在其中为单视图应用程序项目输入名称。在此示例中，我将项目命名为 `BackupSQLite`。语言当然是 Swift，目标设备是
    iPhone。你可以保留其他选项不变。


    ![](img/image192.jpg)


    *图 11-1. 备份项目：单视图模板*


    由于我们将使用 SQLite 数据库和 SQLite 备份 API，因此我们需要像往常一样创建一个桥接文件。选择 Objective-C 文件模板，然后单击“下一步”进入下一个屏幕，你需要在此处指定桥接文件的名称和文件类型，该文件类型应为
    Category（图 11-2）。选择此选项将启动 Xcode，它会要求为你创建桥接文件并设置 Swift 构建设置。


    ![](img/image191.jpg)


    *图 11-2. 桥接接口*


    图 11-3 提供了桥接文件选项的截图。第一个字段是文件名。此例中为 `BackupBridge`。选择 Category 文件类型后，一旦文件保存到项目中，就会触发“创建桥接”接口。


