- fmt: "# SQLite C API for Data Binding\n\nThe SQLite C API has specific functions\
    \ for working with data, allowing an application to bind data with the Cocoa Touch\
    \ corresponding data types. Bound data types are used with prepared statements.\
    \ The following functions work with all the major primitive data types in regards\
    \ to text and numbers. For blobs, images, videos, and audio the API provides `blob`\
    \ and `blob64` as well as `zero` and `zeroblob64`.\n\n```c\nint sqlite3_bind_blob(sqlite3_stmt*,\
    \ int, const void*, int n, void(*)(void*));\nint sqlite3_bind_blob64(sqlite3_stmt*,\
    \ int, const void*, sqlite3_uint64, void(*)(void*));\nint sqlite3_bind_double(sqlite3_stmt*,\
    \ int, double);\nint sqlite3_bind_int(sqlite3_stmt*, int, int);\nint sqlite3_bind_int64(sqlite3_stmt*,\
    \ int, sqlite3_int64);\nint sqlite3_bind_null(sqlite3_stmt*, int);\nint sqlite3_bind_text(sqlite3_stmt*,\
    \ int, const char*, int n, void(*)(void*));\nint sqlite3_bind_text16(sqlite3_stmt*,\
    \ int, const void*, int, void(*)(void*));\nint sqlite3_bind_text64(sqlite3_stmt*,\
    \ int, const char*, sqlite3_uint64, (*)(void*), unsigned char encoding);\nint\
    \ sqlite3_bind_value(sqlite3_stmt*, int, const sqlite3_value*);\nint sqlite3_bind_zeroblob(sqlite3_stmt*,\
    \ int, int n);\nint sqlite3_bind_zeroblob64(sqlite3_stmt*, int, sqlite3_uint64);\n\
    ```\n\nFor the basic primitive types, the first parameter of the SQLite binding\
    \ function is the statement that you create using the `sqlite3_stmt` function\
    \ and that is returned from the `sqlite3_prepare_v2` function. The second parameter\
    \ is the column number in the table where you want to insert records, which corresponds\
