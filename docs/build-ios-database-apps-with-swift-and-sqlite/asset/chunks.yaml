    \n另外，如果触发器中的 `DELETE` 语句未与 `TEMP` 表关联，则触发器必须与目标数据库在同一个数据库中。触发器将按照数据库附加的顺序，在每个附加的数据库中搜索表。\n\
    \n### DELETE 限制\n\n你可以将 `LIMITS` 子句与 `ORDER BY` 子句一起使用，以限制要删除的行数。通过使用 `ORDER BY`，你可以按升序（`ASC`）或降序（`DESC`）对记录进行排序，从而确保定位到正确的行进行删除。\n\
    \n要使用 `LIMIT` 和 `ORDER BY` 子句，你必须在编译数据库时启用 `SQLITE_ENABLE_UPDATE_DELETE_LIMIT`\
    \ 选项。此外，务必记住，SQLite 中的 `DELETE` 语句不支持限制和触发器。\n\n### 一个 Swift SQLite 删除示例\n\n在\
    \ Swift 中使用 SQLite `DELETE` 语句非常简单，如下例所示。设置好常用变量和常量后，我们在 `viewDidLoad` 函数中初始化数据库，并依次调用\
    \ `setupSampleTable`、`addRecords` 和 `sampleDelete` 函数。\n\n前两个函数创建一个表，并向表中添加一条记录。这段代码的主要目的是演示\
    \ Swift 中的 `DELETE` 查询，这一操作在 `sampleDelete` 函数中完成。\n\n```swift\nlet dbName: String\
    \ = \"chapter8.sqlite\"\nvar db: COpaquePointer? = nil\nvar sqlStatement: COpaquePointer?\
    \ = nil\nvar errMsg: UnsafeMutablePointer<UnsafeMutablePointer<Int8>>! = nil\n\
    internal let SQLITE_STATIC = unsafeBitCast(0, for: sqlite3_destructor_type.self)\n\
    internal let SQLITE_TRANSIENT = unsafeBitCast(-1, for: sqlite3_destructor_type.self)\n\
    var dbPath: URL = URL(fileWithPath: \"\")\nvar errStr: String = \"\"\n\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    let dirManager = FileManager.default()\n\
    \    do {\n        let directoryURL = try dirManager.urlForDirectory(FileManager.SearchPathDirectory.documentDirectory,\
