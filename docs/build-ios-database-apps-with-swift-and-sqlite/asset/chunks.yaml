    the SQLite database that is selected in the WineryListTableViewController . The
    first line of the body of the function contains a SQL string constant that defines
    a SQL DELETE statement. Notice how the schema is absent from the table definition
    as per the API requirements.


    Next, sqlite3_open is used to open the database, followed by the sqlite3_exec
    function, which encapsulates the execute API of sqlite3_prepare_v2 , sqlite3_step
    , and sqlite3_finalize . func deleteWineryRecord(record:String){


    let deleteSQL = "DELETE FROM winery WHERE name = ?"


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


