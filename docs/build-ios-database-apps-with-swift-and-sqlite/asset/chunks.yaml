    \n**Figure 2-2.** SQLite Manager toolbar\n\nFor the purposes of this example,\
    \ I will create a database and then add tables, views, a trigger, and indexes.\
    \ Once the database is created, I will add it to the `Db Mgr` project.\n\nThe\
    \ `Directory` selector lets you change the current directory from the `Profile`\
    \ directory, which is the directory used by Firefox to store the various databases\
    \ it uses, to use the directory where our databases will be located.\n\n### Create\
    \ the Database\n\nYou can create the database using the new document icon in the\
    \ menu bar or by choosing the **New Database** option under the **Database** menu\
    \ item. I will name the database `Chapter 2` for this example. By default, the\
    \ `.sqlite` extension is used; however, you can change this behavior in the settings\
    \ (the criss-cross screwdriver/wrench icon). Figure 2-3 shows the dialog box that\
    \ lets you provide the SQLite database name.\n\n![Name the SQLite database](media/image28.jpg)\n\
    \n**Figure 2-3.** Name the SQLite database\n\n`SQLite Manager` offers you many\
    \ options to tweak and analyze a database. Switch to the **Db Settings** tab,\
    \ for instance, after the database is open, and you can set a panoply of different\
    \ settings to fine tune the database (Figure 2-4). I will accept the defaults\
    \ for this example, but I invite you to explore these many features of `SQLite\
    \ Manager` and the different settings available through the SQLite API.\n\n![SQLite\
    \ Manager Settings tab](media/image27.jpg)\n\n**Figure 2-4.** SQLite Manager Settings\
    \ tab\n\nI would like to touch on a couple of interesting and useful concepts,\
    \ which are the `sqlite_master` table located under the **Master Table** node,\
    \ the `sqlite_sequence` table, and the **Main** database versus the **Temp** database\
    \ or other databases.\n\n### `sqlite_master`\n\nThe `sqlite_master` table contains\
    \ all the queries that are used to create the database schema; for instance, when\
    \ you add or modify a table, view, or trigger. The table also contains the names\
    \ and types of each database schema element. Later in the chapter, we will make\
    \ use of this table to populate the data source for the `TableView` in the `MasterViewController`\
    \ in the next chapter. The schema for the table looks like the code snippet that\
    \ follows. SQLite creates this table for you when the first table is added to\
    \ the database. This is a representation only:\n\n```sql\nCREATE TABLE sqlite_master\
    \ (\n    type TEXT,\n    name TEXT,\n    tbl_name TEXT,\n    rootpage INTEGER,\n\
    \    sql TEXT\n);\n```\n\nYou can also browse the table by selecting the **Browse\
    \ & Search** tab with the `sqlite_master` table selected. You can also browse\
    \ the information in the table or any other table by performing a `SELECT` query\
    \ on it, as in the code snippet following Figure 2-5.\n\n![Sqlite_master Browse\
    \ & Search window](media/image29.jpg)\n\n**Figure 2-5.** `sqlite_master` Browse\
    \ & Search window\n\n### The `sqlite_sequence` Table\n\nThe `sqlite_sequence`\
    \ table maintains the largest `ROWINDEX` of a given table. It is used in conjunction\
    \ with the `AUTOINCREMENT` property on a column. When I create the tables in the\
    \ database, I will use `AUTOINCREMENT` as the primary key. If the table is empty,\
    \ then the largest `ROWID` will be 1 and so on as records are added to the table.\n\
    \nThe last feature I want to touch on is the **Main** database. In SQLite you\
    \ can attach many databases to the same connection or database file. When you\
    \ create a new database file or connection, SQLite automatically adds a database\
    \ to the file and calls it `Main`. You have the option to create additional databases\
    \ in the same connection and you name these databases separately and attach them\
    \ together using the `ATTACH` command. Likewise, you can remove these auxiliary\
    \ databases using the `DETACH` command.\n\nFigure 2-6 shows a screenshot of the\
    \ **Directory** menu item. The **Directory** menu is another useful way of locating\
    \ SQLite databases and their home directory. You can locate the database file\
    \ on disk by choosing the **\"Default User Directory\"** option. This will open\
    \ a Finder window if you are on OS X or a File Explorer window if you are using\
    \ Windows.\n\n![SQLite Manager Directory menu](media/image30.jpg)\n\n**Figure\
    \ 2-6.** SQLite Manager Directory menu\n\nWith the basic database in place, I\
    \ will move to the next step and create a table and columns.\n\n### Add Table\
    \ and Columns\n\nCreating tables and columns in SQLite is quite easy. You can\
    \ opt to use the new table icon or select the **Create Table** option from the\
    \ **Table** menu. I have provided a screenshot of the **Create Table** interface\
    \ in `SQLite Manager` (Figure 2-7). When you enter the table definition, it only\
    \ captures information to build a `Create Table` query.\n\n![SQLite Manager's\
    \ Create Table interface](media/image31.jpg)\n\n**Figure 2-7.** `SQLite Manager`'s\
    \ Create Table interface\n\nYou’ll notice the dropdown menu for the database selection\
    \ near the top of the interface. You have a choice between `main`, which is already\
    \ selected, and `temp`. If you attach other databases, they would appear here\
    \ as well.\n\nIf you have experience developing database applications, you will\
    \ find many of these fields self-explanatory. You have a field for the table name.\
    \ You can choose to make the table temporary using the **\"Temporary table\"**\
    \ option. You should always select the **\"if not exists\"** option so you don’t\
    \ accidentally overwrite the database table and its contents when running the\
    \ app. This option is added to the query, and the database engine checks to see\
    \ if the table already exists before creating it.\n\nFigure 2-7 illustrates how\
    \ you can also define your table columns. You can provide a column name, a data\
    \ type—the dropdown includes the data types supported by SQL language—and whether\
    \ the column will act as the primary key. You can have the column auto increment\
    \ by enabling the **\"Autoinc\"** option. Note that this option is only active\
    \ if you opt to enable the primary key on the column. Of course, you can choose\
    \ to not allow nulls by selecting the **\"Yes\"** option. This is especially important\
    \ for primary key fields. The **\"Unique\"** option ensures that no duplicates\
    \ are introduced through an `INSERT` or `UPDATE`. Finally, you can set a default\
    \ value depending on the selected data type.\n\nOnce the table definition is complete\
    \ and you click on the **OK** button, a confirmation will appear displaying the\
    \ exact query that will be performed to create the table. This is a great way\
    \ to learn the proper syntax to use to prepare the SQL queries supported by SQLite.\n\
    \nFor my sample database, I will create a table to store some basic information\
    \ on books, like the book title, author, pages, selling price, royalties, and\
    \ publisher. Figure 2-8 provides the basic details of the table. The screenshot\
    \ immediately following the table structure provides the details of the actual\
    \ query string being used to create the table in the database (Figure 2-9). You\
    \ could easily do a copy + paste in another iOS application if you weren’t sure\
    \ of the proper syntax or if you were lazy like I am sometimes and didn’t feel\
    \ like writing the code.\n\n![Create Table definition](media/image33.jpg)\n\n\
    **Figure 2-8.** Create Table definition\n\n![Create Table query](media/image32.jpg)\n\
    \n**Figure 2-9.** Create Table query\n\nIn `SQLite Manager`, you can browse the\
    \ table structure by selecting the table name and expanding the node in the left\
    \ pane, then selecting the **Structure** tab along the top in the pane on the\
    \ right-hand side (Figure 2-10). In addition to browsing the table structure,\
    \ you can also perform some operations, like dropping the table or re-indexing\
    \ the table.\n\n![Browse database structure](media/image35.jpg)\n\n**Figure 2-10.**\
    \ Browse database structure\n\nNotice in the screenshot that an index was automatically\
    \ added under the **Indexes** node. This index got created as a result of my specifying\
    \ a primary key in my `Book` table. SQLite also added a `sqlite_sequence` table,\
    \ which I mentioned before, to maintain a handle on the latest `ROWID`. Although\
    \ SQLite created the index for us, I’ll show you the syntax of the SQLite query\
    \ needed to create your own.\n\n### Add an Index"
