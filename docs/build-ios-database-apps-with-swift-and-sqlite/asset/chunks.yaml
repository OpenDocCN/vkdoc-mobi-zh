    design of the app, but I added them to constants to keep the concept of the app
    simple. I will use the templates later to create a wine database that I will use
    in the next few chapters to show you how to create CRUD queries.


    These templates are basic examples of how to write queries to create a database
    schema. For instance, you could create a table using an INSERT statement rather
    than a CREATE TABLE statement. You could also use CREATE TABLE along with a SELECT
    statement to create a table based on a SELECT query definition. Tables can also
    be temp, or temporary, as with other SQL systems.


