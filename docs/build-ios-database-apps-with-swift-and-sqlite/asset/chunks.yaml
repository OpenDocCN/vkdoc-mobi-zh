    The other piece of important information is the fact that you need to create your
    database in the Documents directory in your app’s sandbox. It is the only useful
    writable directory. If you place the database in the Resources folder, you won’t
    get any errors, but the data will not be written to the database because the folder
    is read-only.


    Insert or Replace


    SQLite also has a special clause that allows you to insert/update using the INSERT
    statement. With SQLite you use the INSERT OR REPLACE statements . If an insert
    constraint is encountered, the REPLACE clause will delete the existing record
    and replace it with the new record. In cases where there is a NOT NULL , REPLACE
    will attempt to replace it with a default value if the REPLACE is trying to insert
    a NULL value. If no default value is available, the ABORT clause is used instead
    on that row. The remaining rows aren’t affected unless similar conditions are
    encountered. The general syntax is as follows:


    INSERT OR REPLACE into schema.table_name(Id, ColText, ColInt, ColDouble) VALUES(1,
    ‘Kevin’, 20, 53.6)


