    \ 7 章 ■ 更新记录**\n\n![](img/image120.jpg)\n\n**图 7-11.** 成功的 `UPDATE` 操作\n\n## 总结\n\
    \n至此，我们完成了对 `UPDATE` 的讨论，以及在 Winery 应用中如何执行新增操作。我们详细探讨了 SQLite 的 `UPDATE` 语句，包括\
    \ `OR` 子句。我们还学习了如何添加 `UITableViewControllers`，以及如何使用同一个 `IBAction` 管理更新和插入操作。\n\
    \n最后一项操作是 `DELETE`，它构成了 Winery 应用中 CRUD 操作组的收尾部分。`DELETE` 章节将提供关于 SQLite `DELETE`\
    \ 语句的详细信息，以及如何在 `UITableViews` 中集成删除功能。\n\n![](img/image121.jpg)\n\n在本章中，我们将讨论\
    \ SQLite 中的 `DELETE` 函数。与 SQLite 中的其他 CRUD 函数相比，`DELETE` 函数的 API 与其他平台相同，并实现了基本的\
    \ SQL API，但 `LIMIT` 子句除外，它允许开发者设置要删除的行数上限。我们将涵盖以下内容：\n\n- `DELETE` 语句\n- 使用 `WHERE`\
    \ 子句进行 `DELETE`\n- `DELETE` 的限制与 `TRIGGERS`\n- `LIMITS`\n- 一个 Swift `DELETE` 示例\n\
    \n## SQLite 中的 `DELETE` 语句\n\n`DELETE` 语句是一种标准 SQL 语句，用于从 SQLite 数据库的表中永久删除一条或多条记录。其基本语法如下：\n\
    \n```\nDELETE FROM main.tablename\n```\n\n或，\n\n```\nDELETE FROM main.tablename\n\
    WHERE 布尔表达式\n```\n\n如果未使用 `WHERE` 子句，则会删除给定表中的全部内容。\n\n## 使用 `WHERE` 子句\n\n为了更好地控制要删除的记录，你可以使用\
    \ `WHERE` 子句指定一个布尔变量。与其他 SQL `WHERE` 子句类似，你可以使用 `AND` 关键字指定多个列，或使用 `OR` 关键字指定某一列或其他列。添加到\
    \ `WHERE` 参数中的列数没有限制。此外，你还可以使用 `NOT`，例如 `NOT IN` 或 `NOT EQUAL`。你还可以使用 `BETWEEN`\
    \ 关键字；例如，指定一个日期或数字范围。通过将 `WHERE` 子句与 `DELETE` 结合使用，可以限制受查询影响的记录数量。\n\n© Kevin\
    \ Languedoc 2016 [131]\nK. Languedoc，《使用 Swift 和 SQLite 构建 iOS 数据库应用》，DOI 10.1007/978-1-4842-2232-4_8\n\
    \n**第 8 章 ■ 删除记录**\n\n语法如下：\n\n```\nDELETE FROM table\nWHERE columnA = 'value'\n\
    \  AND columnB = 'value'\n```\n\n你还可以编写如下查询：\n\n```\nDELETE FROM table\nWHERE\
    \ (columnA = 'value'\n  AND columnB = 'value') OR\n  (columnC = 'value'\n  AND\
    \ columnD = 'value')\n```\n\n## 限制与触发器\n"
- fmt: "When using the `DELETE` statement with a `TRIGGER`, you are not allowed to\
    \ use the schema name, only the table name. In other words, you must use the `DELETE`\
    \ as follows:\n\n``` \nDELETE FROM table\n```\n\nRather than:\n\n``` \nDELETE\
    \ FROM main.tablename\n```\n\nAlso, if the `DELETE` statement in the trigger is\
    \ not associated with a `TEMP` table, then the trigger must be in the same database\
    \ as the trigger. The trigger will search for tables in each of the attached databases\
    \ in the order in which the database was attached.\n\n### DELETE Limits\n\nYou\
    \ can use the `LIMITS` clause along with the `ORDER BY` clause to restrict the\
    \ number of rows to delete. By using the `ORDER BY`, you can sort the records\
    \ in either an ascending (`ASC`) or descending (`DESC`) order so as to ensure\
    \ the proper rows are targeted for deletion.\n\nIn order to use the `LIMIT` and\
    \ `ORDER BY` clauses, you must enable the `SQLITE_ENABLE_UPDATE_DELETE_LIMIT`\
    \ option when compiling the database. Also, it is important to keep in mind that\
    \ the limits and triggers are not supported for the `DELETE` statement in SQLite.\n\
    \n### A Swift SQLite Delete Example\n\nUsing the SQLite `DELETE` statement in\
    \ Swift is very easy, as the following example illustrates. After setting the\
    \ usual variables and constants, we set up the database in the `viewDidLoad` function\
    \ and call the `setupSampleTable`, `addRecords`, and `sampleDelete` functions\
    \ sequentially.\n\nThe first two functions create a table and add one record to\
    \ the table. The main purpose of this code is to demonstrate the `DELETE` query\
    \ in Swift, which I do in the `sampleDelete` function.\n\n```swift\nlet dbName:\
    \ String = \"chapter8.sqlite\"\nvar db: COpaquePointer? = nil\nvar sqlStatement:\
    \ COpaquePointer? = nil\nvar errMsg: UnsafeMutablePointer<UnsafeMutablePointer<Int8>>!\
    \ = nil\ninternal let SQLITE_STATIC = unsafeBitCast(0, for: sqlite3_destructor_type.self)\n\
    internal let SQLITE_TRANSIENT = unsafeBitCast(-1, for: sqlite3_destructor_type.self)\n\
    var dbPath: URL = URL(fileWithPath: \"\")\nvar errStr: String = \"\"\n\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    let dirManager = FileManager.default()\n\
    \    do {\n        let directoryURL = try dirManager.urlForDirectory(FileManager.SearchPathDirectory.documentDirectory,\
    \ in: FileManager.SearchPathDomainMask.userDomainMask, appropriateForL: nil, create:\
    \ true)\n        dbPath = try! directoryURL.appendingPathComponent(dbName)\n \
    \   } catch let err as NSError {\n        print(\"Error: \\(err.domain)\")\n \
    \   }\n    self.setupSampleTable()\n    self.addRecords()\n    self.sampleDelete()\n\
    }\n\nfunc setupSampleTable() {\n    let creatSQL: String = \"CREATE TABLE IF NOT\
    \ EXISTS sample(id int, name varchar)\"\n    if(sqlite3_open(dbPath.path!, &db)\
    \ == SQLITE_OK) {\n        if(sqlite3_prepare_v2(db, creatSQL, -1, &sqlStatement,\
    \ nil) == SQLITE_OK) {\n            if(sqlite3_step(sqlStatement) == SQLITE_DONE)\
    \ {\n                print(\"table created\")\n                sqlite3_finalize(sqlStatement)\n\
    \                sqlite3_close(db)\n            } else {\n                print(\"\
    unable to create table\")\n            }\n        }\n    }\n}\n\nfunc addRecords()\
    \ {\n    let insertSQL: String = \"INSERT INTO TABLE main.sample (id, name) VALUES(?,?)\"\
    \n    if(sqlite3_open(dbPath.path!, &db) == SQLITE_OK) {\n        if(sqlite3_prepare_v2(db,\
    \ insertSQL, -1, &sqlStatement, nil) == SQLITE_OK) {\n            sqlite3_bind_int(sqlStatement,\
    \ 1, 1)\n            sqlite3_bind_text(sqlStatement, 2, \"kevin\", -1, SQLITE_TRANSIENT)\n\
    \            if(sqlite3_step(sqlStatement) == SQLITE_DONE) {\n               \
    \ print(\"table created\")\n                sqlite3_finalize(sqlStatement)\n \
    \               sqlite3_close(db)\n            } else {\n                print(\"\
    unable to create table\")\n            }\n        }\n    }\n}\n```\n\nAs you can\
    \ see from the code that follows, the `DELETE` query follows a pattern similar\
    \ to that of the other CRUD operations. We first set a SQL query string for the\
    \ `DELETE` statement, then we attempt to open the database and load the `DELETE`\
    \ SQL query string into memory using the `sqlite3_prepare_v2` function.\n\nThen\
    \ we bind the `WHERE` value using the `sqlite3_bind_int` function and execute\
    \ the query using the `sqlite3_step` function. If we get a successful status result,\
    \ we clean up the query with `sqlite3_finalize` and close the database.\n\n```swift\n\
    func sampleDelete() {\n    let deleteStmt: String = \"DELETE FROM sample WHERE\
    \ id = ?\"\n    if(sqlite3_open(dbPath.path!, &db) == SQLITE_OK) {\n        if(sqlite3_prepare_v2(db,\
    \ deleteStmt, -1, &sqlStatement, nil) == SQLITE_OK) {\n            // ... rest\
    \ of the delete logic\n        }\n    }\n}\n```"
