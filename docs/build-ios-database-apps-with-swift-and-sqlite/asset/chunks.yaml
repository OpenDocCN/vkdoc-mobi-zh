- fmt: "# CHAPTER 7 ■ UPDATING RECORDS\n\n## Update Options in SQLite\n\nThe `ABORT`\
    \ option stops the current transactional operation if there is a constraint issue,\
    \ such as a null record or the data type of the updating value not being correct.\
    \ The SQLite operation will back out of the current operation but leave any previous\
    \ transactions intact.\n\n```\nUPDATE OR ABORT BooksToRead\nSET Title = 'To Kill\
    \ a Mockingbird'\n, Author = 'Harper Lee'\nWHERE id = 2\n```\n\n## Update or Replace\
    \ Records\n\nWhen the query encounters a row with a constraint issue, if the `REPLACE`\
    \ option is being used, the query will delete the constraining row and replace\
    \ it with a new row, thus removing the constraint. If any `DELETE` triggers are\
    \ in play, these will also fire.\n\n```\nUPDATE OR REPLACE BooksToRead\nSET Title\
    \ = 'To Kill a Mockingbird'\n, Author = 'Harper Lee'\nWHERE id = 2\n```\n\n##\
    \ Update or Fail Records\n\nIf the `FAIL` option is used, when a transaction encounters\
    \ a constraint issue and throws a `SQLITE_CONSTRAINT`, the previous transactions\
    \ are preserved, if any, but the current transaction that failed and any subsequent\
    \ transactions won’t be processed by the query. The operation stops at the faulty\
    \ transaction.\n\n```\nUPDATE OR FAIL BooksToRead\nSET Title = 'To Kill a Mockingbird'\n\
    , Author = 'Harper Lee'\nWHERE id = 2\n```\n\n## Update or Ignore Records\n\n\
    When the `IGNORE` option is used, the transaction with the problem is skipped\
    \ and the remaining rows, if any, are processed.\n\n```\nUPDATE OR IGNORE BooksToRead\n\
    SET Title = 'To Kill a Mockingbird'\n, Author = 'Harper Lee'\nWHERE id = 2\n```\n\
    \n## A Sample SQLite UPDATE Operation in Swift\n\nTo demonstrate the `UPDATE`\
    \ queries, we will add the update functionality to our minimalist iOS app that\
    \ we have used in the previous chapters. In this installment, we will add the\
    \ `updateRecords` method to the `CrudOp` custom class, which will update records\
    \ in the database.\n\nTo begin, open the Crud iOS project in Xcode and locate\
    \ the `CrudOp.h` header file. Add the `updateRecords` method as follows:\n\n```\n\
    func updateRecords(){\n\n    let sql:String = \"Update data set coltext=? where\
    \ coltext=?\"\n\n    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){\n\n     \
    \   if(sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil) == SQLITE_OK)\n   \
    \     {\n            sqlite3_bind_text(stmt, 1, txt, -1, SQLITE_TRANSIENT);\n\
    \            sqlite3_bind_text(stmt, 2, utxt, -1, SQLITE_TRANSIENT);\n       \
    \ }\n    }\n\n    sqlite3_step(stmt);\n    sqlite3_finalize(stmt);\n    sqlite3_close(cruddb);\n\
    }\n```\n\nAs you can see, the code pattern is very similar to that of other SQLite\
    \ operations. After creating a `sqlite3_stmt` and a local `sqlite3` database object,\
    \ we create the update query as `const char`. The query could also be an `NSString`\
    \ object, in which case you don’t need to specify the `UTF8String` encoding to\
    \ convert the string to the universal character set. Next, we establish a connection\
    \ to the database engine and open the database using the `cruddatabase` `NSString`\
    \ variable. Then, we encode it using the `UTF8string` property and the `sqlite3`\
    \ object.\n\nWith the connection made, we can execute the query by using the `sqlite3_prepare_v2`\
    \ function and binding the parameter variables for the set and where clauses.\
    \ The binding function must match the data type of the column and parameter values\
    \ or you will get an error, unless you cast the value to the proper type.\n\n\
    The `sqlite3_step` function will execute the statement that we prepared in the\
    \ previous operation and will finally use `sqlite3_finalize` before closing the\
    \ connection using `sqlite3_close`. This is the basic setup for the update query\
    \ in SQLite. Using this pattern, you can do any type of update query.\n\nAs with\
    \ the other CRUD operations, we will call the method through the `segButton` `IBAction`\
    \ in the `kcbViewController` custom class of the `ViewController` in the storyboard.\n\
    \n## Adding the UPDATE Functionality to the Winery App\n\nThe next piece of the\
    \ winery app’s functionality is the ability to update existing records. We will\
    \ need to modify the `wineyDAO` class and add two functions: one for the wines\
    \ and the other for the wineries. We will look at these next.\n\n### Modifying\
    \ the WineryDAO Controller"
  raw: 'The ABORT option stops the current transactional operation if there is a constraint
    issue, such as a null record or the data type of the updating value not being
    correct. The SQLite operation will back out of the current operation but leave
    any previous transactions intact.


    CHAPTER 7 ■ UPDATING RECORDS


    UPDATE OR ABORT BooksToRead


    SET Title = ''To Kill a Mockingbird''


    , Author = ''Harper Lee''


    WHERE id = 2


    Update or Replace Records


    When the query encounters a row with a constraint issue, if the REPLACE option
    is being used, the query will delete the constraining row and replace it with
    a new row, thus removing the constraint. If any DELETE triggers are in play, these
    will also fire.


    UPDATE OR REPLACE BooksToRead


    SET Title = ''To Kill a Mockingbird''


    , Author = ''Harper Lee''


    WHERE id = 2


    Update or Fail Records


    If the FAIL option is used, when a transaction encounters a constraint issue and
    throws a SQLITE_ CONSTRAINT , the previous transactions are preserved, if any,
    but the current transaction that failed and any subsequent transactions won’t
    be processed by the query. The operation stops at the faulty transaction. UPDATE
    OR FAIL BooksToRead


    SET Title = ''To Kill a Mockingbird''


    , Author = ''Harper Lee''


    WHERE id = 2


    Update or Ignore Records


    When the IGNORE option is used, the transaction with the problem is skipped and
    the remaining rows, if any, are processed.


    UPDATE OR IGNORE BooksToRead


    SET Title = ''To Kill a Mockingbird''


    , Author = ''Harper Lee''


    WHERE id = 2


    A Sample SQLite UPDATE Operation in Swift


    To demonstrate the UPDATE queries, we will add the update functionality to our
    minimalist iOS app that we have used in the previous chapters. In this installment,
    we will add the updateRecords method to the CrudOp custom class, which will update
    records in the database.


    To begin, open the Crud iOS project in Xcode and locate the CrudOp.h header file.
    Add the updateRecords method as follows:


    func updateRecords(){


    let sql:String = "Update data set coltext=? where coltext=?"


    CHAPTER 7 ■ UPDATING RECORDS


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


    if(sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil) == SQLITE_OK)


    {


    sqlite3_bind_text(stmt, 1, txt, -1, SQLITE_TRANSIENT);


    sqlite3_bind_text(stmt, 2, utxt, -1, SQLITE_TRANSIENT);


    }


    }


    sqlite3_step(stmt);


    sqlite3_finalize(stmt);


    sqlite3_close(cruddb);


    }


    As you can see, the code pattern is very similar to that of other SQLite operations.
    After creating a sqlite3_stmt and a local sqlite3 database object, we create the
    update query as const char . The query could also be an NSString object, in which
    case you don’t need to specify the UTF8String encoding to convert the string to
    the universal character set. Next, we establish a connection to the database engine
    and open the database using the cruddatabase NSString variable. Then, we encode
    it using the UTF8string property and the sqlite3 object.


    With the connection made, we can execute the query by using the sqlite3_prepare_v2
    function and binding the parameter variables for the set and where clauses. The
    binding function must match the data type of the column and parameter values or
    you will get an error, unless you cast the value to the proper type.


    The sqlite3_step function will execute the statement that we prepared in the previous
    operation and will finally use sqlite3_finalize before closing the connection
    using sqlite3_close . This is the basic setup for the update query in SQLite.
    Using this pattern, you can do any type of update query.


    As with the other CRUD operations, we will call the method through the segButton
    IBAction in the kcbViewController custom class of the ViewController in the storyboard.
    Adding the UPDATE Functionality to the Winery App The next piece of the winery
    app’s functionality is the ability to update existing records. We will need to
    modify the wineyDAO class and add two functions: one for the wines and the other
    for the wineries. We will look at these next.


    Modifying the WineryDAO Controller'
  trans: "\n# 第 7 章 ■ 更新记录\n\n## SQLite 中的更新选项\n\n`ABORT` 选项会在遇到约束问题时（例如空记录或更新值的数据类型不正确）中止当前事务操作。SQLite\
    \ 操作将回滚当前操作，但保留之前所有事务不变。\n\n```\nUPDATE OR ABORT BooksToRead\nSET Title = 'To\
    \ Kill a Mockingbird'\n, Author = 'Harper Lee'\nWHERE id = 2\n```\n\n## 更新或替换记录\n\
    \n当查询遇到存在约束问题的行时，如果使用了 `REPLACE` 选项，查询将删除该约束行并用新行替换，从而消除约束。如果存在任何 `DELETE` 触发器，这些触发器也会被触发。\n\
    \n```\nUPDATE OR REPLACE BooksToRead\nSET Title = 'To Kill a Mockingbird'\n, Author\
    \ = 'Harper Lee'\nWHERE id = 2\n```\n\n## 更新或失败记录\n\n如果使用 `FAIL` 选项，当事务遇到约束问题并抛出\
    \ `SQLITE_CONSTRAINT` 时，之前的事务（如果有）会保留，但当前失败的事务以及后续事务将不会被查询处理。操作会在出错的事务处停止。\n\n\
    ```\nUPDATE OR FAIL BooksToRead\nSET Title = 'To Kill a Mockingbird'\n, Author\
    \ = 'Harper Lee'\nWHERE id = 2\n```\n\n## 更新或忽略记录\n\n当使用 `IGNORE` 选项时，有问题的行会被跳过，其余行（如果有）将继续被处理。\n\
    \n```\nUPDATE OR IGNORE BooksToRead\nSET Title = 'To Kill a Mockingbird'\n, Author\
    \ = 'Harper Lee'\nWHERE id = 2\n```\n\n## Swift 中的 SQLite 更新操作示例\n\n为了演示 `UPDATE`\
    \ 查询，我们将为之前章节中使用的极简 iOS 应用添加更新功能。在本部分，我们将向 `CrudOp` 自定义类中添加 `updateRecords` 方法，用于更新数据库中的记录。\n\
    \n首先，在 Xcode 中打开 Crud iOS 项目并找到 `CrudOp.h` 头文件。按如下方式添加 `updateRecords` 方法：\n\n\
    ```\nfunc updateRecords(){\n\n    let sql:String = \"Update data set coltext=?\
    \ where coltext=?\"\n\n    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){\n\n\
    \        if(sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil) == SQLITE_OK)\n\
    \        {\n            sqlite3_bind_text(stmt, 1, txt, -1, SQLITE_TRANSIENT);\n\
    \            sqlite3_bind_text(stmt, 2, utxt, -1, SQLITE_TRANSIENT);\n       \
    \ }\n    }\n\n    sqlite3_step(stmt);\n    sqlite3_finalize(stmt);\n    sqlite3_close(cruddb);\n\
    }\n```\n\n如您所见，代码模式与其他 SQLite 操作非常相似。在创建 `sqlite3_stmt` 和本地 `sqlite3` 数据库对象后，我们将更新查询创建为\
    \ `const char`。该查询也可以是 `NSString` 对象，在这种情况下，您无需指定 `UTF8String` 编码即可将字符串转换为通用字符集。接下来，我们建立与数据库引擎的连接，并使用\
    \ `cruddatabase` `NSString` 变量打开数据库。然后，我们使用 `UTF8string` 属性和 `sqlite3` 对象对其进行编码。\n\
    \n连接建立后，我们可以使用 `sqlite3_prepare_v2` 函数执行查询，并为 SET 和 WHERE 子句绑定参数变量。绑定函数必须与列和参数值的数据类型匹配，否则您将收到错误，除非将值转换为正确的类型。\n\
    \n`sqlite3_step` 函数将执行我们之前准备好的语句，并最终使用 `sqlite3_finalize` 完成操作，然后使用 `sqlite3_close`\
    \ 关闭连接。这是 SQLite 中更新查询的基本设置。使用此模式，您可以执行任何类型的更新查询。\n\n与其他 CRUD 操作一样，我们将通过故事板中 `ViewController`\
    \ 的 `kcbViewController` 自定义类的 `segButton` `IBAction` 来调用该方法。\n\n## 向酒庄应用添加更新功能\n\
    \n酒庄应用的下一项功能是能够更新现有记录。我们需要修改 `wineyDAO` 类并添加两个函数：一个用于葡萄酒，另一个用于酒庄。接下来我们将介绍这些内容。\n\
    \n### 修改 WineryDAO 控制器\n"
- fmt: "# Adding Update Functions\n\nI will add the `wineUpdate` function for the\
    \ wines and `wineryUpdate` for the wineries. Both will have the same design and\
    \ will update all columns in the table, regardless of whether that value is changing\
    \ based on a `WHERE` clause.\n\n## Adding the `wineUpdate` Function\n\nThe `wineUpdate`\
    \ function updates a wine record in the SQLite database. The function takes a\
    \ `wine` object as an input parameter. After defining an `SQL UPDATE` string,\
    \ I open the SQLite database using the `sqlite3_open` function as usual. Then,\
    \ I set up the query using the `sqlite3_prepare_v2` function, which takes the\
    \ SQLite database pointer, the `sqlite_statement` pointer, and the SQL query string\
    \ as input parameters. If the query string is OK, the function will return `SQLITE_OK`\
    \ status.\n\nNext, you need to bind the wine properties to the input columns and\
    \ `WHERE` clause using `sqlite3_bind_text` for strings, `sqlite3_bind_int` for\
    \ the integers, and `sqlite3_bind_blob` for the image.\n\nFinally, execute the\
    \ query using the `sqlite3_step` function, then clean up using `sqlite3_finalize`\
    \ and close the database using `sqlite3_close`. See the following code.\n\n> **Note:**\
    \ You can use the ternary operator to build the query string and binding values\
    \ based on the available values if you don’t want to replace every value. Also,\
    \ this code doesn’t have any error handling.\n\n```\nfunc WineUpdate(_ wine:Wine){\n\
    \n    let sql:String = \"UPDATE main.Wine \" +\n        \"SET name = ?,\" +\n\
    \        \"rating = ?, \" +\n        \"image = ?, \" +\n        \"producer = ?\
    \ \" +\n        \"WHERE id = ?\"\n\n    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){\n\
    \        if(sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil)==SQLITE_OK){\n\
    \            sqlite3_bind_text(sqlStatement, 0, wine.name.cString(using: String.Encoding.utf8),\
    \ -1, SQLITE_TRANSIENT)\n            sqlite3_bind_int(sqlStatement, 1, wine.rating)\n\
    \            sqlite3_bind_blob(sqlStatement, 2, wine.image.bytes, Int32(wine.image.count),\
    \ SQLITE_TRANSIENT)\n            sqlite3_bind_text(sqlStatement, 4, wine.producer.cString(using:\
    \ String.Encoding.utf8), -1, SQLITE_TRANSIENT)\n            sqlite3_bind_int(sqlStatement,\
    \ 5, wine.id)\n            sqlite3_step(sqlStatement)\n        }\n    }\n    sqlite3_close(db)\n\
    }\n```\n\n## Adding the `wineryUpdate` Function\n\nThe `wineryUpdate` function\
    \ follows exactly the same pattern as seen in the previous function. Except for\
    \ the different columns and table targeted in the SQL query string, as well as\
    \ the number of binding values, the functionality is identical to the previous\
    \ one:\n\n```\nfunc WineryUpdate(_ winery:Wineries)->Int32{\n\n    let sql:String\
    \ = \"UPDATE winery SET country = '\\(winery.country)', region = '\\(winery.region)',\
    \ volume = \\(winery.volume), uom = '\\(winery.uom)' WHERE name = '\\(winery.name)'\
    \ ;\"\n\n    var status_code:Int32 = 0\n\n    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){\n\
    \        status_code = sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil)\n \
    \       if(status_code==0){\n            status_code = sqlite3_step(sqlStatement)\n\
    \            status_code = sqlite3_finalize(sqlStatement)\n        }\n    }\n\
    \    sqlite3_close(db)\n    return status_code\n}\n```\n\n## Modifying the UI\
    \ for Updates\n\nTo enable the update functionality that was added to the `wineryDAO`\
    \ class, some changes need to be made to the UI and corresponding `FirstViewController`\
    \ and `SecondViewController`.\n\nWhen a user selects an item from either the Wine\
    \ list or Winery list, the data will be displayed in the corresponding scene so\
    \ that the information can be changed. When the Save button is clicked, instead\
    \ of calling the insert functions, the update functions will be called instead.\n\
    \n### Set Up the `showWineDetail` Segue\n\nFigure 7-1 depicts the layout of the\
    \ new segue that connects the Cellar scene, which is the `TableViewController`\
    \ for the list of wines that are stored in the database, with the Enter Wine scene,\
    \ which is the initial view controller when the app starts.\n\n![](media/image93.jpg)\n\
    \n**Figure 7-1.** Adding the `showWineDetail` segue\n\nTo set up the segue, follow\
    \ these steps:\n\n1. Control + drag a connection from the `WineCellTableViewCell`\
    \ in the Cellar scene to the Enter Wine scene using the mouse. When you release\
    \ the mouse button a popup will appear. Select the `showDetail` option."
