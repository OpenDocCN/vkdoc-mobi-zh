    ### ANALYZE 语句


    `ANALYZE` 语句的作用是通过统计数据收集数据库中表和索引的信息。SQLite 通过在执行 `ANALYZE` 语句时在应用程序的数据库中创建一个 `sqlite_stats1`
    表来完成此任务。SQLite 将此信息传递给 SQLite 查询优化器，优化器随后使用收集到的信息来使用最佳的查询算法以获得最佳性能。


    如果您构建了数据库或启用了 `SQLITE3_ENABLE_STAT3` 或 `SQLITE3_ENABLE_STAT4`，则会收集额外的直方图信息，并分别存储在
