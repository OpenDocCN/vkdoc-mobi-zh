  trans: "\n# 第 7 章 ■ 更新记录\n\n## 图 7-3. showWineryDetail 转场\n\n请按照以下步骤为第二个视图控制器创建转场：\n\
    \n1.  从文档大纲视图中选择 `WineryCellTableViewCell`。\n2.  然后按住 Control 键从 UI 中选中的单元格拖拽至\
