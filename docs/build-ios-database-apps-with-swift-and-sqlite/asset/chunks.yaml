    ## The SELECT Statement


    The `SELECT` statement is the workhorse of the SQL language no matter what platform
    you are using, and it is no different with SQLite. The `SELECT` statement is used
    to perform queries against a SQLite table or view. It is also used to populate
    views in SQLite databases, just as in other relational database systems.


    This chapter demonstrates how to use `SELECT` in Swift by binding data from columns
    in SQLite tables and assigning them to Swift data-type variables.


    The examples demonstrate how to perform SELECT queries to return text and numeric
    data as well as audio, image, and video data. The Winery app will be retrofitted
    with `SELECT` queries to display the list of wineries for the `UIPickerView` as
    well as display wines that are stored in the database.


    In this chapter, we will explore the following:


    - the `SELECT` statement syntax

    - various `SELECT` use cases

    - binding data types

    - inner `SELECT`

    - joins

    - inline `SELECT`

    - adding `SELECT` queries to the Winery app


    ### Column Data Types


    Here is a list of the data-type binding functions that you can use to assign values
    from a `SELECT` query to a C-based variable, a Swift variable, or a custom object''s
    properties:


    - `sqlite3_column_blob(sqlite3_stmt, int iCol);`

    - `sqlite3_column_bytes(sqlite3_stmt, int iCol);`

    - `sqlite3_column_bytes16(sqlite3_stmt, int iCol);`

    - `sqlite3_column_double(sqlite3_stmt, int iCol);`

    - `sqlite3_column_int(sqlite3_stmt, int iCol);`

    - `sqlite3_column_int64(sqlite3_stmt, int iCol);`

    - `sqlite3_column_text(sqlite3_stmt, int iCol);`

    - `sqlite3_column_text16(sqlite3_stmt, int iCol);`

    - `sqlite3_column_type(sqlite3_stmt, int iCol);`

    - `sqlite3_column_value(sqlite3_stmt, int iCol);`

    - `sqlite3_bind_zeroblob(sqlite3_stmt, int, int iCol)`'
