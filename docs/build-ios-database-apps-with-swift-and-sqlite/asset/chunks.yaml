    for the wine information and wineries information. The app will be based on the
    Tabbed Application template. Create the Project


    From Xcode, create a new project and select the Tabbed Application template under
    the iOS Application category.


    ■ Note If you are new to Xcode, you can create a project from the launcher if
    no projects are currently open, or from File menu ➤ New ➤ Project.'
