    Adding the Delete Functionality to the Winery App


    This is the final installment of the CRUD application that we have been building.
    To begin adding the DELETE functionality to our app, open the header and the deleteRecords
    method as shown in the code that follows. The deleteRecords method will take only
    one parameter for the WHERE clause variable.


    To implement the DELETE functionality in the Winery app, we will need to make
    several modifications to the various view controllers and table view controllers
    as well as to the storyboard''s UITableViewControllers . We will also need to
    add two functions to the WineryDAO class.


    CHAPTER 8 ■ DELETING RECORDS


    Modifying the WineryDAO Class


    In the WineryDAO class, we will need to add two functions to handle the deletes
    in the Wine table as well as the deletes in the Winery table. Both functions will
    perform a DELETE statement on the winery database. Both functions will implement
    the same design using two different approaches. Actually, this code could be replaced
    by one function, and we could pass the query string as an input parameter, but
    I decided to use sqlite3_exec for the second function to demonstrate the two ways
    to execute a query in SQLite. Add the deleteWineRecord Function


    The deleteWineRecord function contains a string constant that defines a DELETE
    SQL statement and takes one parameter for the WHERE clause.


    The SQLite execution operation includes the opening of the SQLite database using
    the sqlite3_open function, followed by the sqlite3_prepared_v2 function if the
    database is successfully opened.


    If the SQL statement contains no errors and is successfully loaded into memory,
    the parameter is passed to the query using the sqlite3_bind_text function, and
    finally the query is executed with the sqlite3_step function.


    I will test the function and post the results at the end of the chapter, as usual.
    func deleteWineRecord(record:String){


    let deleteSQL = "DELETE FROM wine WHERE name = ?"


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


    if(sqlite3_prepare_v2(db, deleteSQL, -1, &sqlStatement, nil)==SQLITE_OK){


    sqlite3_bind_text(sqlStatement, 1, record, -1, SQLITE_TRANSIENT)


    if(sqlite3_step(sqlStatement)==SQLITE_DONE){


    print("item deleted")


    }else{


    print("unable to delete")


    }


    }


    }


    }


