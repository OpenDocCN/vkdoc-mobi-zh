    \ ![](media/image174.jpg) ![](media/image173.jpg) ![](media/image172.jpg)\n\n\
    Figure 9-16\\. The search results\n\n## Summary\n\nIn this chapter, we revisited\
    \ the SQLite `SELECT` statement and implemented a database search function, which\
    \ can be helpful for locating information in a database. The next chapter will\
    \ focus on attaching and using multiple databases in a single file.\n\n![](media/image176.jpg)\n\
    \nSQLite has a great feature for managing large volumes of data: multi-database\
    \ apps. In this chapter, you'll see that by creating and attaching multiple databases\
