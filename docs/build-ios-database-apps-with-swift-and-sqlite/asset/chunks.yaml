    Summary


    In this chapter we discussed how to use the SQLite DELETE statement to delete
    records from a SQLite database. Also how we can use a WHERE clause to limit the
    number of records to delete or to target a certain record or records.


    We also explored how to implement the DELETE statement in Swift 3 and finally
    we added the delete functionality to the Wine app using Swift. In the next chapter,
    we will implement searching for records in a SQLite database and displaying those
    records.


    ![](media/image153.jpg)


    This chapter doesn’t show any new SQLite APIs. Rather, it focuses on how you can
    use the SQLite APIs to create an iOS iPhone app for searching for records in a
    SQLite database. In this chapter, we will explore the following:


    • Creating an iOS app


    • Creating a SQLite database


    • Adding the Search function


    • Developing the UI for searches


    • Searching for records


    • Displaying search results


    • Developing a UISearchBar iPhone app


    The Search App


    This tutorial demonstrates how to use the SELECT statement to search for content
    in a database using the UISearchBar and display the results in a TableView embedded
    in a ViewController . Figure  9-1 provides a visual of the running app.


    © Kevin Languedoc 2016 [145]


    K. Languedoc, Build iOS Database Apps with Swift and SQLite , DOI 10.1007/978-1-4842-2232-4_9
    CHAPTER 9 ■ SEARCHING FOR RECORDS IN SQLITE


    ![](media/image154.jpg)


    Figure 9-1\. The Search iPhone app


    The UISearchBar and UITableViewController are embedded in the ViewController .
    The search term is passed to a function in the ViewController .


    The UISearchBar is an iOS component in the UIKit that was introduced in version
    2.0 of the Cocoa Touch Framework and iOS SDK. The UIControl and protocol have
    several important features to help a developer quickly implement a Search field
    in their applications. You can enable a Search button, a Cancel button, and a
    Bookmark button. The delegate has methods that interact with those buttons that
    are pressed.


    This tutorial will demonstrate how to quickly develop an iPhone app that searches
    a SQLite database using the UISearchBar text field. The database contains a list
    of names in separate columns. The app will implement a SQL query to search either
    field, then display the results in a UITableView .


    The whole application is built using a single-view application template. The SQLite
    database is built and sample data is added to it using the SQLite Manager in Firefox.


    Create the SQLite Database


    For this example app, we will create a SQLite database using SQLite Manager in
    Firefox, which is a free add-on. As Figure  9-2 shows, we create a database titled
    dbsearch.sqlite and one table, names , to hold a sample of first and last names.
    The file should be saved to a convenient location, since it will have to be added
    to the iOS project later.


    CHAPTER 9 ■ SEARCHING FOR RECORDS IN SQLITE


    ![](media/image156.jpg)


    Figure 9-2\. Create dbSearch.sqlite and names table


    Then, we add two columns:


    firstname:varchar


    lastname:varchar


    F ig u r e   9-3 shows a screenshot of how SQLite Manager in Firefox creates an
    input screen based on the columns you define. Using SQLite Manager, we add some
    sampling data so that we can perform a search later. Figure  9-4 shows the sample
    data entered into the database through SQLite Manager in Firefox.


    ![](media/image155.jpg)


    Figure 9-3\. SQLite data input


    CHAPTER 9 ■ SEARCHING FOR RECORDS IN SQLITE


    ![](media/image158.jpg)


    Figure 9-4\. Sample data in dbSearch.sqlite


    Create the iOS/SQLite Project


    Figure  9-5 shows where to select a template for the project. Choose the single-view
    application template from the iOS Project category to create a simple iOS iPhone
    app. Call the app SQLiteSearch and ensure that the Swift language is selected
    in the language options.


    ![](media/image157.jpg)


    Figure 9-5\. Create th e SQLiteSearch app


    Once the project is created, you need to add the sqlite3 library to the project
    and create the bridge. Figure  9-6 shows how to add the sqlite3 library to the
    project. Select the project root in the navigator and scroll to the Linked Libraries
    and Frameworks section on the General tab. Click on the “+” button to bring up
    the library selector popup. In the Search field, type "sqlite" and then select
    the libsqlite3.tbd library. Click Add to close the popup and add the library to
    the project.


    CHAPTER 9 ■ SEARCHING FOR RECORDS IN SQLITE


    ![](media/image159.jpg)


