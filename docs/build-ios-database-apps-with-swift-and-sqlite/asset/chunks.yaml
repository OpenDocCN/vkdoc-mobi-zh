    \  \n192 `^(The number of indices created using an explicit CREATE INDEX statement.)`\n\
    \n## Chapter 12 ■ Analyzing SQLite Databases\n\nNumber of implied indices  \n\
    The number of indices used to implement `PRIMARY KEY` or `UNIQUE` constraints\
    \ on tables.\n\nSize of the file in bytes  \nThe total amount of disk space used\
    \ by the entire database files.\n\nBytes of user payload stored  \nThe total number\
    \ of bytes of user payload stored in the database. The schema information in the\
    \ `SQLITE_MASTER` table is not counted when computing this number. The percentage\
    \ at the right shows the payload divided by the total file size.\n\nPercentage\
    \ of total database  \nThe amount of the complete database file that is devoted\
    \ to storing information described by this category.\n\nNumber of entries  \n\
    The total number of B-Tree key/value pairs stored under this category.\n\nBytes\
    \ of storage consumed  \nThe total amount of disk space required to store all\
    \ B-Tree entries under this category. This is the total number of pages used times\
    \ the pages size.\n\nBytes of payload  \nThe amount of payload stored under this\
    \ category. Payload is the data part of table entries and the key part of index\
    \ entries. The percentage at the right is the bytes of payload divided by the\
    \ bytes of storage consumed.\n\nAverage payload per entry  \nThe average amount\
    \ of payload on each entry. This is just the bytes of payload divided by the number\
    \ of entries.\n\nAverage unused bytes per entry  \nThe average amount of free\
    \ space remaining on all pages under this category on a per-entry basis. This\
    \ is the number of unused bytes on all pages divided by the number of entries.\n\
    \nNon-sequential pages  \nThe number of pages in the table or index that are out\
    \ of sequence. Many filesystems are optimized for sequential file access, so a\
    \ small number of non-sequential pages might result in faster queries, especially\
    \ for larger database files that do not fit in the disk cache. Note that after\
    \ running `VACUUM`, the root page of each table or index is at the beginning of\
    \ the database file and all other pages are in a separate part of the database\
    \ file, resulting in a single non-sequential page.\n\nMaximum payload per entry\
    \  \nThe largest payload size of any entry.\n\nEntries that use overflow  \nThe\
    \ number of entries that use one or more overflow pages.\n\nTotal pages used \
    \ \nThis is the number of pages used to hold all information in the current category.\
    \ This is the sum of index, primary, and overflow pages.  \nIndex pages used \
    \ \nThis is the number of pages in a table B-tree that hold only key (`rowid`)\
    \ information and no data.\n\nPrimary pages used  \nThis is the number of B-tree\
    \ pages that hold both key information and data.\n\nOverflow pages used  \nThe\
