- fmt: "```swift\nif(sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil)==SQLITE_OK){\n\
    \nwhile(sqlite3_step(sqlStatement)==SQLITE_ROW){\n\nlet vintnor:Wineries = Wineries.init()\n\
    \nvintnor.name = String(cString:UnsafePointer<Int8>(sqlite3_column_text(sqlStatement,\
    \ 0)))!\n\nvintnor.country = String(cString: UnsafePointer<Int8>(sqlite3_column_text(sqlStatement,\
    \ 1)))!\n\nvintnor.region = String(cString: UnsafePointer<Int8>(sqlite3_column_text(sqlStatement,\
    \ 2)))!\n\nvintnor.volume = sqlite3_column_double(sqlStatement, 3)\n\nvintnor.uom\
    \ = String(cString: UnsafePointer<Int8>(sqlite3_column_text(sqlStatement, 4)))!\n\
    \nwineryArray.append(vintnor)\n\n}\n\n}\n```\n\n```swift\nsqlite3_close(db)\n\n\
    return wineryArray\n```\n\n### The `selectWineList` Function\n\nThe `selectWineList`\
    \ function acts the same way as the previous function. Its one special feature\
    \ is the blob, or stored image. In order to convert the stored blob, you need\
    \ the `NSData`, as we saw earlier in this chapter. The `NSData` function needs\
    \ the returned data as bytes, and it needs to know the length of the bytes. These\
    \ values are stored in the `raw` and `rawLen` variables, respectively. The `raw`\
    \ variable is an `UnsafePointer` because this is the return type of the `sqlite3_column_blob`\
    \ function, and `rawLen` is an `Int32` data type. You then pass these two values\
    \ to the `NSData` initializer, which is then appended to the `wine.image` property.\
    \ However, this value is still a binary format. Later in the chapter, the app\
    \ will convert `NSData` into a `UIImage` and display it in the `UIImageView`.\
    \ See the following:\n\n```swift\nfunc selectWineList()->Array<Wine>{\n    var\
    \ wineArray = [Wine]()\n    let sql:String = \"Select name, rating, image, producer\
    \ from main.wine\"\n\n    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){\n  \
    \      if(sqlite3_prepare_v2(db, sql.cString(String.Encoding.utf8)!, -1, &sqlStatement,\
    \ nil)==SQLITE_OK){\n            while(sqlite3_step(sqlStatement)==SQLITE_OK){\n\
    \                let wine:Wine = Wine.init()\n                wine.name = String(cString:\
    \ UnsafePointer<Int8>(sqlite3_column_text(sqlStatement, 1)))!\n              \
    \  wine.rating = sqlite3_column_int(sqlStatement, 2)\n                let raw:UnsafePointer\
    \ = sqlite3_column_blob(sqlStatement, 3);\n                let rawLen:Int32 =\
    \ sqlite3_column_bytes(sqlStatement, 3);\n                wine.image = Data(bytes:\
    \ raw, count: Int(rawLen))\n                wine.producer = String(cString: UnsafePointer<Int8>(sqlite3_column_text(sqlStatement,\
    \ 4)))!\n                wineArray.append(wine)\n            }\n        }\n  \
    \  }\n    sqlite3_close(db)\n    return wineArray\n}\n```\n\n### The `selectWineryByName`\
    \ Function\n\nThe wine producer property, which is the foreign key in the database,\
    \ is an `Int32` value. In order to get the winery name from the database for the\
    \ Selected Winery field in the `FirstViewController`, the following function performs\
    \ a `SELECT` statement with a `WHERE` clause, using the ID to locate the record.\
    \ I pass the `WHERE` clause value using `sqlite3_bind_int` then retrieve the return\
    \ value and assign it to the name property of the `vintner` object using the same\
    \ method as before. Notice that the last parameter is a 1 instead of a 0. This\
    \ is because in the `SELECT` query I am requesting two columns: the ID and the\
    \ name.\n\n```swift\nfunc selectWineryByName(name:String)->String{\n    let vintnor:Wineries\
    \ = Wineries.init()\n    let sql:String = \"Select name from main.winery where\
    \ name=?\"\n\n    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){\n        if(sqlite3_prepare_v2(db,\
    \ sql.cString(using: String.Encoding.utf8)!, -1, &sqlStatement, nil)==SQLITE_OK){\n\
    \            sqlite3_bind_text(sqlStatement, 0, vintner.name.cString(String.Encoding.utf8)!,\
    \ -1, SQLITE_TRANSIENT)\n            if(sqlite3_step(sqlStatement)==SQLITE_OK){\n\
    \                vintnor.name = String(cString:UnsafePointer<Int8>(sqlite3_column_text(sqlStatement,\
    \ 1)))!\n            }\n        }\n    }\n    sqlite3_close(db)\n    return vintnor.name\n\
    }\n```\n\n## Modifying the UI for Displaying Records\n\nWith the `SELECT` queries\
    \ in place, all that is needed is to add the view controllers to the UI and wire\
    \ everything up. The app is going to need two `TableViewControllers` to display\
    \ the list of records. These will have to be wired to the `TabBarController`.\n\
    \nFigure 6-1 provides a visual of the additional design elements that are added\
    \ to the Winery app for the select and display functionality. These new elements\
    \ include the following:\n- Two table view controllers\n- Two navigation controllers\n\
    - Two `UITableViewCellControllers`\n- Three `UILabels` for the WineList cell prototype\
    \ and five for the WineryList cell prototype\n\n### Adding the `UITableViewControllers`\n\
    \nWe will first add the `UITableViewController` for the wine list, which I will\
    \ call the Cellar. Select the main.storyboard to open it (Figure 6-1). Drag a\
    \ `UITablewViewController` from the palette on the lower right onto the canvas.\
    \ Select the `UITableViewController` and then select the Attributes inspector\
    \ and enter the “Cellar” title in the Title field. To connect the `TableView`\
    \ to the `TabBarController`, you first need to create a `NavigationViewController`\
    \ for the `TableViewController`. The easiest way to create the `NavigationViewController`,\
    \ other than dragging it from the palette onto the canvas, is to select it and\
    \ select **Editor/Embed/Navigation Controller** from the Xcode menu.\n\n![](media/image75.jpg)\n\
    \n**Figure 6-1.** Extended storyboard with `TableViewControllers`\n\nOnce the\
    \ navigation controller has been created, select the `TabBarController` and drag\
    \ (press Control or CTRL and press the left mouse button while dragging a line\
    \ from the TabBar to the navigation controller) a connection to the navigation\
    \ controller. Upon releasing the mouse button, a popup will appear. From this\
    \ popup, you need to select **ViewControllers** from the choices. This will create\
    \ a connection with the `TabBarController` and will add a navigation item to the\
    \ existing tab bar. You can change the item's value by selecting the navigation\
    \ controller and changing the title value in the Attributes inspector. We need\
    \ to repeat this process for the next `UITableViewController` for the winery list,\
    \ which will also have a modified `TableViewCell`.\n\nFor now, that is all that\
    \ is needed for this `UITableViewController`. We will add the `TableViewControllers`\
    \ and the `TableViewCellController` in the next section.\n\nAfter creating the\
    \ second `UITableViewController`, using the preceding instructions for the Cellar,\
    \ drag two `UILabels` onto the Cell Prototype (Figure 6-2). Change the label names\
    \ to Wine and Winery as in the following figure. Also add an `ImageView` for the\
    \ wine image. We will add the view controllers in the next section as well as\
    \ create the `IBOutlets`.\n\n![](media/image77.jpg)\n\n**Figure 6-2.** The Cellar\
    \ TableView cell prototype\n\n### Adding the Navigation Controllers\n\nThe final\
    \ step is to provide an interface between the new UI elements and the `SELECT`\
    \ functions, and ultimately the SQLite database. This interface consists of `TableViewControllers`\
    \ and a `TableViewCellController` that is configured or connected to the corresponding\
    \ UI elements, which will contain the `IBOutlets` that will display the data from\
    \ the database.\n\nBoth `TableViewControllers` are created the same way. From\
    \ the **File** menu in Xcode, select **New**, then **File**. In the template selector,\
    \ choose the **Cocoa Touch Class** template under the **iOS Source** category\
    \ (Figure 6-3). In the next screen, enter `WineryListTableViewController` in the\
    \ **Class** field. In the **Subclass** dropdown, select the `UItableViewController`\
    \ class, and leave or select the **Swift** language (Figure 6-4). When the class\
    \ is created, Xcode will append the name of the super class to the name. As shown\
    \ in Figure 6-5, click the **Next** button and select the location in the project,\
    \ then click **Create**.\n\n> **Tip:** You can also add a new file by right-clicking\
    \ anywhere in the Project Navigator and selecting **New File…**\n\n![](media/image79.jpg)\n\
    \n**Figure 6-3.** Select the Cocoa Touch Class\n\n![](media/image78.jpg)\n\n**Figure\
    \ 6-4.** Enter `WineryList` in Class field\n\n![](media/image80.jpg)\n\n**Figure\
    \ 6-5.** Add the file to the project"
