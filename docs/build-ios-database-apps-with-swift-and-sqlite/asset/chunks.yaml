- fmt: '# Creating SQLite Databases


    The next chapter will show you how to develop a SQLite database using Firefox
    and the SQLite Manager add-on. Once the database is created, we will develop the
    `Db Mgr` app, add the database to the project, and copy the database into the
    `Document` directory, because this is the primary writeable directory in an iOS
    app sandbox (filesystem).


    ![](media/image24.jpg)


    SQLite is very flexible in regards to creating databases. You can include a file
    extension, or not, as all you really need is to pass a file name and path to the
    `sqlite3_open` function and the database will be created and opened—although it
    won''t contain any structure. Unlike other relational databases like MSSQL, SQLite
    databases are self-contained and portable. A SQLite database file can run without
    any changes on all supported platforms, including, of course, iOS. SQLite databases
    are not designed to run a server.


    In this chapter, I will continue to build on the previous chapter by showing how
    to create a SQLite database using a database tool like SQLite Manager in Firefox
    and adding it to the project. In the next chapter, I will provide you with the
    knowledge to create databases during runtime, including adding the necessary structure.


    You can also create databases using the command line, like Terminal (OSX, Linux)
    or Windows Command.


    The following topics are covered in this chapter:


    1. Creating and adding a SQLite database to a project

    2. Adding tables and columns

    3. Adding views

    4. Adding a trigger

    5. Adding an index


    > **Note:** While you can use SQLite Manager in Firefox on all supported platforms
    to develop the SQLite database, you will need to export the database file to OSX
    for inclusion in your iOS/Swift project. Even though Swift and SQLite are supported
    on Linux, you will need Xcode to provision your app and deploy it to `iTunesConnect`.
    The focus of this chapter, and indeed this book, is to show you how to develop
    iOS apps (iPhone/iPad) using Swift 3 and SQLite databases. I assume you are using
    Xcode 8 on OSX El Capitan, along with the SQLite 3 included in the iOS SDK and
    in SQLite Manager.


    ## Creating Databases and Adding them to the Project


    In this first part of this chapter, I will focus on developing a SQLite database
    using the SQLite Manager add-on in Firefox, and then I will import the finished
    database into an iOS Swift iPad app for later use. There are a few open source
    and commercial database editors for SQLite. I am using SQLite Manager in Firefox,
    as it is free (on all supported platforms) and lightweight. It is a Firefox add-on
    and can be installed in Firefox through the Add-on interface.


