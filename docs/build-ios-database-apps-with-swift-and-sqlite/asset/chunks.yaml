    \n![](img/image136.jpg)\n\n*图 8-3. 选中待删除项*\n\n图 8-4 显示了 Wineries 表视图的 TableView。目前它只有一条条目。我们将重复之前的流程，点击`Edit`按钮切换到编辑模式。\n\
    \n![](img/image149.jpg)![](img/image148.jpg) ![](img/image147.jpg) ![](img/image146.jpg)\
    \ ![](img/image145.jpg) ![](img/image144.jpg) ![](img/image143.jpg) ![](img/image142.jpg)\
    \ ![](img/image141.jpg) ![](img/image140.jpg) ![](img/image139.jpg) ![](img/image138.jpg)\
    \ ![](img/image137.jpg)\n\n*图 8-4. Wineries TableView*\n\n如图 8-5 所示，在编辑模式下，你可以选择条目，这将触发该行显示一个`Delete`按钮。同时注意“Done”链接，你可以用它来将\
    \ TableView 切换回只读模式。\n\n![](img/image150.jpg)\n\n*图 8-5. 编辑模式下的 Wineries*\n\n\
    图 8-6 显示了“删除”按钮，如果点击该按钮，选中的条目将从酒庄数组和数据库中的酒庄表中删除。\n\n![](img/image151.jpg)\n\n\
    *图 8-6. 选中待删除项的 Wineries TableView*\n\n图 8-7 显示了条目缺失的 Wineries TableView。\n\n\
    ![](img/image152.jpg)\n\n*图 8-7. 选中项已被删除*\n\n# 总结\n\n在本章中，我们讨论了如何使用 SQLite 的`DELETE`语句从\
    \ SQLite 数据库中删除记录。以及如何使用`WHERE`子句来限制要删除的记录数量或定位特定记录。\n\n我们还探讨了如何在 Swift 3 中实现`DELETE`语句，最后我们使用\
    \ Swift 向 Wine 应用程序添加了删除功能。在下一章中，我们将实现在 SQLite 数据库中搜索记录并显示这些记录。\n\n![](img/image153.jpg)\n\
    \n本章不介绍任何新的 SQLite API。相反，它重点介绍如何利用 SQLite API 创建一个用于在 SQLite 数据库中搜索记录的 iOS iPhone\
    \ 应用程序。在本章中，我们将探讨以下内容：\n\n- 创建一个 iOS 应用程序\n- 创建一个 SQLite 数据库\n- 添加搜索功能\n- 开发搜索用\
    \ UI\n- 搜索记录\n- 显示搜索结果\n- 开发一个`UISearchBar` iPhone 应用程序\n\n# 搜索应用程序\n\n本教程演示了如何使用`SELECT`语句通过`UISearchBar`搜索数据库内容，并将结果显示在嵌入`ViewController`的`TableView`中。图\
    \ 9-1 展示了运行中的应用程序界面。\n\n© Kevin Languedoc 2016 [145]  \nK. Languedoc, *使用 Swift\
    \ 和 SQLite 构建 iOS 数据库应用程序*, DOI 10.1007/978-1-4842-2232-4_9\n\n![](img/image154.jpg)\n\
    \n*图 9-1. 搜索 iPhone 应用程序*\n\n`UISearchBar`和`UITableViewController`嵌入在`ViewController`中。搜索词被传递给`ViewController`中的一个函数。\n\
    \n`UISearchBar`是`UIKit`中的一个 iOS 组件，它在 Cocoa Touch 框架和 iOS SDK 2.0 版本中引入。`UIControl`和协议具有几个重要特性，可帮助开发者快速在其应用中实现搜索字段。您可以启用搜索按钮、取消按钮和书签按钮。委托（delegate）具有与这些被按下的按钮进行交互的方法。\n\
    \n本教程将演示如何快速开发一个使用`UISearchBar`文本字段搜索 SQLite 数据库的 iPhone 应用程序。该数据库包含一个按不同列存储的名称列表。应用程序将实现一个\
    \ SQL 查询来搜索任一字段，然后在`UITableView`中显示结果。\n\n整个应用程序使用单视图应用程序模板构建。SQLite 数据库通过 Firefox\
    \ 中的 SQLite Manager 构建并添加样本数据。\n\n## 创建 SQLite 数据库\n\n对于这个示例应用程序，我们将使用 Firefox\
    \ 中的 SQLite Manager（一个免费的附加组件）创建一个 SQLite 数据库。如图 9-2 所示，我们创建一个名为`dbsearch.sqlite`的数据库和一个`names`表，用于存储名和姓的样本数据。文件应保存到方便的位置，因为稍后需要将其添加到\
    \ iOS 项目中。\n\n![](img/image156.jpg)\n\n*图 9-2. 创建 dbSearch.sqlite 和 names 表*\n\
    \n然后，我们添加两列：\n\n- `firstname:varchar`\n- `lastname:varchar`\n\n图 9-3 展示了 Firefox\
    \ 中的 SQLite Manager 如何根据您定义的列创建输入界面。使用 SQLite Manager，我们添加了一些样本数据，以便稍后执行搜索。图 9-4\
    \ 显示了通过 Firefox 中的 SQLite Manager 输入到数据库中的样本数据。\n\n![](img/image155.jpg)\n\n*图\
    \ 9-3. SQLite 数据输入*\n\n![](img/image158.jpg)\n\n*图 9-4. dbSearch.sqlite 中的样本数据*\n\
    \n## 创建 iOS/SQLite 项目\n\n图 9-5 显示了在何处选择项目的模板。从 iOS 项目类别中选择单视图应用程序模板，以创建一个简单的 iOS\
    \ iPhone 应用程序。将应用程序命名为`SQLiteSearch`，并确保在语言选项中选择了 Swift 语言。\n\n![](img/image157.jpg)\n\
    \n*图 9-5. 创建 SQLiteSearch 应用程序*\n\n项目创建完成后，你需要将`sqlite3`库添加到项目中并创建桥接头文件。图 9-6\
    \ 展示了如何将`sqlite3`库添加到项目中。在导航器中选择项目根目录，并在“通用”选项卡上滚动到“链接的框架和库”部分。点击“+”按钮以调出库选择器弹出窗口。在搜索字段中输入“sqlite”，然后选择`libsqlite3.tbd`库。点击“添加”关闭弹出窗口并将库添加到项目中。\n\
    \n![](img/image159.jpg)\n\n*图 9-6. 添加 sqlite3 库*\n"
- fmt: "Next, right-click on the `DbSearch` group and select the \"Add files to …\"\
    \ context-menu item. Browse to the location where the `dbsearch.sqlite` file was\
    \ saved, select the database file, and click **Add** to begin copying the database\
    \ to the project. A second popup will appear from which you will need to select\
    \ the first option: \"copy items to destination group’s folder (if needed)\" to\
    \ actual the project. This is important, or only a reference will be added.\n\n\
    Now that the project is set up, we can build the storyboard and controller logic.\n\
    \n## Set Up the Bridge\n\nWith the library in place, we must set up the Objective-C\
    \ bridge. Add a new file to the project by selecting the **Cocoa Touch class**\
    \ template from the **iOS Source** category from the available templates (Figure\
    \ 9-7), then do the following:\n\n- Name the bridge `SQLiteSearchBridge`\n- Select\
    \ the category for the file types, which will trigger the **Add Bridge Interface**\n\
    - Select the `NSObject` class\n\n![](media/image161.jpg)\n\n**Figure 9-7.** Create\
    \ the `SQLiteSearchBridge`\n\nFigure 9-8 shows the **Create Bridge Interface**,\
    \ which appears after adding the file to the project. When we create the bridge\
    \ using this method, Xcode will create the bridge file and add the file to the\
    \ Build settings for the Swift Compiler. You can discard the Objective-C header\
    \ and implementation files that are also created. In this project, the files are\
    \ `NSObject+SQLiteSearchBridge.h` and `NSObject+SQLiteSearchBridge.m`. We only\
    \ need the `SQLiteSearch-Bridging-Header.h` file. You need to open this latter\
    \ file and add the `#import <sqlite3.h>` directive in order to interface with\
    \ the SQLite3 API.\n\n![](media/image160.jpg)\n\n**Figure 9-8.** Setting up the\
    \ bridge in the Xcode\n\n## The Controller Code\n\nBefore getting to the interface\
    \ and adding the controls and the `IBOutlet`s, we will need to add the code to\
    \ the `ViewController` to handle the search operations and interface with the\
    \ `UISearchBar`, `UITableView`, and `UITableViewCell`.\n\nOpen the `ViewController`\
    \ and add the `UISearchBarDelegate`, `UITableViewDelegate`, and `UITableViewDataSource`\
    \ next to the class definition (see following code). We will also need to set\
    \ up the delegates when the app loads, so we need to assign the delegates to `self`\
    \ in the `viewDidLoad` function.\n\n```swift\nimport UIKit\n\nclass ViewController:\
    \ UIViewController, UISearchBarDelegate, UITableViewDelegate, UITableViewDataSource\
    \ {\n\n    // code skipped for clarity\n\n    override func viewDidLoad() {\n\
    \        super.viewDidLoad()\n        searchResults.dataSource = self\n      \
    \  searchResults.delegate = self\n        searchField.delegate = self\n    }\n\
    }\n```\n\nA variable for an array will be used to store that data for the `UITableView`,\
    \ hence its data source is needed as well. For this project, the array, `nameList`,\
    \ is of the `String` data type. If you want to manipulate the data in the `UITableView`,\
    \ you would interface with its data source. In other words, with the array. Also,\
    \ we need to create an `UnsafeMutablePointer` called `SQLITE_TRANSIENT`. This\
    \ is a destructor pointer that is used in the `sqlite3_bind_text` later in the\
    \ `searchDatabase` function.\n\n```swift\nvar nameList = [String]()\ninternal\
    \ let SQLITE_TRANSIENT = unsafeBitCast(-1, sqlite3_destructor_type.self)\n```\n\
    \nFor the `UITableViewDelegate` and `UITableViewDataSource` protocols, as well\
    \ as for the `UITableView` itself, we need to add some required functions. These\
    \ are described next.\n\n### The `numberOfSectionsInTableView` Function\n\nTo\
    \ display the returned results, we will need to set up the `UITableView` delegate\
    \ and data source. `numberOfSectionsInTableView` tells the table how many sections\
    \ the table will have. Sections are groups of rows. We will set this to `1`:\n\
    \n```swift\nfunc numberOfSectionsInTableView(tableView: UITableView) -> Int {\n\
    \    return 1\n}\n```\n\n### The `tableView:numberOfRowsInSection` Function\n\n\
    `numberOfRowsInSection` tells the table how many rows to display. It is customary\
    \ to indicate the number of elements in the array or data source:\n\n```swift\n\
    func tableView(tableView: UITableView,\n    numberOfRowsInSection section: Int)\
    \ -> Int {\n    return nameList.count\n}\n```"
