    to be able to capture and insert images (preferably wine-related ones). We have
    set up the UI and added the IBActions , and now we need to add the logic to the
    FirstViewController .


    We start by initializing the imageSelector object and setting its delegate to
    the FirstViewController, specifying that its source will be the building camera.
    Finally, the picker is loaded onto the view stack using the presentViewController
    :


    @IBAction func takePhoto(_ sender: AnyObject) {


    imageSelector = UIImagePickerController()


    imageSelector.delegate = self'
