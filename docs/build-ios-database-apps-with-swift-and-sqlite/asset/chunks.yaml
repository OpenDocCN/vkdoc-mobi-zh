    to the final step in this chapter, which is create the basis of the DAO class,
    DbMgrDAO . This class is a sub-class of the NSObject class. You can create this
    class using one of two templates. You can create it using the Cocoa Touch template,
    which will add the proper class signature, but you will need to replace the import
    statement from UIKit to Foundation; otherwise, you will get some errors. However,
    using the template, you will have the opportunity to select the sub-class and
    language. The other way is to use the Swift template, which is what I will use,
    as the template will create a bare-bones file.


    Using the Swift template (Figure  1-7 ), we will need to add the class definition,
    as the template only adds the import Foundation statement after we name the file
    and add it to the project under the "controllers" group. The class will be titled
    DbMgrDAO .


