- fmt: "Once open, we define a SQL SELECT query string, `sqlQry`, which takes two\
    \ arguments in the `WHERE` clause. Both arguments will receive a copy of the `searchTerm`\
    \ argument that is passed to the function from the `UISearchBar` `IBOutlet`. We\
    \ then assign and bind the inout values to the SQL query using the `sqlite3_bind_text`\
    \ function—one for each argument in the `WHERE` clause. Then, the code will execute\
    \ and return the values if successful. These values are then assigned to the `concatName`\
    \ constant and in turn are appended to the `nameList` array. Finally, the memory\
    \ is cleaned up and the database is closed.\n\n```\nfunc searchDatabase(searchTerm:String){\n\
    \n    var fileExist:Bool = false\n\n    var db:COpaquePointer = nil\n\n    var\
    \ sqlStatement:COpaquePointer=nil\n\n    let projectBundle = NSBundle.mainBundle()\n\
    \n    let fileMgr = NSFileManager.defaultManager()\n\n    let resourcePath = projectBundle.pathForResource(\"\
    dbsearch\", ofType: \"sqlite\")\n    fileExist = fileMgr.fileExistsAtPath(resourcePath!)\n\
    \n    if(fileExist){\n\n        if(!(sqlite3_open(resourcePath!, &db) == SQLITE_OK))\n\
    \n        {\n\n            print(\"An error has occured.\")\n\n        }else{\n\
    \n            let sqlQry = \"SELECT firstname,lastname FROM names where firstname=?\
    \ or lastname=?\"\n\n            if(sqlite3_prepare_v2(db, sqlQry, -1, &sqlStatement,\
    \ nil) != SQLITE_OK)\n\n            {\n\n                print(\"Problem with\
    \ prepared statement \" + String(sqlite3_errcode(db)));\n\n            }\n\n \
    \           sqlite3_bind_text(sqlStatement, 0, searchTerm, -1, SQLITE_TRANSIENT)\n\
    \n            sqlite3_bind_text(sqlStatement, 1, searchTerm, -1, SQLITE_TRANSIENT)\n\
    \n            while (sqlite3_step(sqlStatement)==SQLITE_ROW) {\n\n           \
    \     let concatName:String = String.fromCString(UnsafePointer<Int8>(sqlite3_column_text(sqlStatement,0)))!\
    \ + \" \" + String.fromCString(UnsafePointer<Int8 >(sqlite3_column_text(sqlStatement,1)))!\n\
    \n                print(\"This is the name : \" + concatName)\n\n            \
    \    nameList.append(concatName)\n\n            }\n\n            sqlite3_finalize(sqlStatement);\n\
    \n            sqlite3_close(db);\n\n        }\n\n    }\n\n}\n```\n\nWith the array\
