  trans: "\n## 排版后的文本\n\n这个任务其实非常简单。在 `detailSQLiteQueryField` 中输入 `Winery.sqlite`\
    \ 文件名，然后点击 `Create/Open Database` 按钮（`createDbButton`）。我提供了来自 `DetailViewController`\
    \ 中 `createDbButton` 函数以及 `DbMgrDAO` 类中 `openSQLiteDatabase` 函数的代码片段，以供参考。\n\n\
    在 `createDbButton` 函数中，调用了 `openSQLiteDatabase`，并传入了文件名 `Winery.sqlite` 作为必需的参数。你可能已经注意到，除了\
    \ SQLite 函数要求的基本错误检查外，没有额外的错误检查。同时，我乐观地假设返回码会是 `0` 或表示成功，并显示一条创建成功的消息。\n\n```\n\
    @IBAction func createDbButton(sender: AnyObject) {\n    dbname = self.detailSQLiteQueryField.text\n\
    \    if(dbDAO.openSQLiteDatabase(dbname).rawValue == Enums.SQLiteStatusCode.ok.rawValue){\n\
    \        self.detailSQLiteQueryField.text = \"SQLite database \\(self.detailSQLiteQueryField.text)\
    \ is created and open\"\n    }\n}\n```\n\n在 `openSQLiteDatabase` 中，你可能还记得，我获取了\
    \ Documents 目录的句柄，因为这是应用沙盒中少数几个可写入的位置之一，然后我调用了 SQLite 函数 `sqlite3_open` 来在指定路径创建和/或打开数据库。如果指定路径的文件名不存在，`sqlite3_open`\
    \ 会创建数据库文件并打开它；否则，该函数会尝试打开数据库文件，并以此建立连接。\n\n```\nfunc openSQLiteDatabase(databaseName:String)->Enums.SQLiteStatusCode{\n\
    \    let dirManager = FileManager.default()\n    do {\n        let directoryURL\
    \ = try dirManager.urlForDirectory(FileManager.SearchPathDirectory.documentDirectory,\
    \ in: FileManager.SearchPathDomainMask.userDomainMask, appropriateFor: nil, create:\
    \ true)\n        dbPath = try! directoryURL.appendingPathComponent(databaseName)\n\
    \    } catch let err as NSError {\n        print(\"Error: \\(err.domain)\")\n\
    \    }\n    return Enums.SQLiteStatusCode(rawValue: sqlite3_open(dbPath.absoluteString.cString(String.Encoding.utf8)!,\
    \ &db))!\n}\n```\n\n拿到数据库后，我现在将创建表和视图。\n\n## 添加表\n\n还记得 UI 中的 `Create Table` 和\
    \ `Create View` 按钮吗？如果你点击这些按钮，它们会将 `Db` 类中的模板加载到 `detailSQLiteQueryField` 字段中，以便进行编辑。一旦你调整好查询语句，只需点击\
    \ `Execute Query` 按钮（`executeQueryButton`），即可通过数据库引擎执行查询，并在已打开的数据库文件中创建数据库结构。\n\
    \n对于 `winery.sqlite` 数据库和应用程序，我需要两个表：`wine` 和 `producer`。我还可以轻松地扩展它，增加几个表、视图和触发器。这里我不深入讲解联接或外键，因为我会在第\
    \ 5 章插入记录时详细讨论。简单来说，这两个表将具有外键关系，而视图将使用联接来访问两者的数据以进行显示。\n\n**第 3 章 ■ 在运行时创建数据库**\n\
    \n我要创建的第一个表是 `producer` 表。该表将包含葡萄酒生产商的数据。第二个表 `wine` 将包含葡萄酒瓶的信息。表 3-1 概述了该架构。外键将位于\
    \ `wine` 表中，由 `Producer_id` 字段定义。\n\n**表 3-1. Winery 架构**\n\n| wine          |\
    \ producer      |\n|---------------|---------------|\n| id            | id   \
    \         |\n| Producer_id   | name          |\n| name          | country    \
    \   |\n| Rating        | region        |\n|               |               |\n\n\
    要在 `winery.sqlite` 数据库中创建表，请按以下步骤操作：\n\n1. 在运行的应用中（iOS 模拟器或安装在 iPad 上），在编辑器字段中输入\
    \ `\"winery.sqlite\"`，然后点击 `Create/Open Database` 按钮。\n2. 如果数据库成功打开，你会收到一条成功消息，该消息会替换同一字段中的文本。\n\
    3. 接下来，点击 `Create Table` 按钮，将 `Create Table` 模板加载到编辑器字段中。\n4. 修改查询语句，使其如下所示：\n\
    \n```\nCREATE TABLE IF NOT EXISTS main.producer (\n    Id INTEGER PRIMARY KEY\
    \ AUTOINCREMENT NOT NULL UNIQUE,\n    Producer_id integer,\n    Name VARCHAR,\n\
    \    Country VARCHAR,\n    Region VARCHAR,\n```\n"
- fmt: "# Foreign Key (Producer_id) references producer(id)\n\n5. Click on the **Execute\
    \ Query** button to create the table. You should receive a  \n“query is successful”\
    \ confirmation message.\n\n6. Repeat the same process for the `wine` table. The\
    \ following is the query to use:\n\n```sql\nCREATE TABLE IF NOT EXISTS main.producer\
    \ (\n    Id INTEGER PRIMARY KEY AUTOINCREMENT NOT NULL UNIQUE,\n    Name VARCHAR,\n\
    \    Country VARCHAR,\n    Region VARCHAR\n)\n```\n\nAgain, you should get the\
    \ “query is successful” confirmation message. With the two tables in place, all\
    \ that remains is the view to display the results. The next section will provide\
    \ the details for the view.\n\n## Adding the View\n\nSince this is a very simple\
    \ database and app, I will create just one view that will select the columns from\
    \ each table using a join. The code is as follows:\n\n```sql\nCREATE VIEW IF NOT\
    \ EXISTS wines AS\nSELECT w.name, w.rating, w.type, p.producer, p.country, p.region\n\
    FROM main.wine w\nINNER JOIN main.producer p ON w.id = p.id\n```\n\nSQLite supports\
    \ three types of joins. You can use the joins as just seen, or you can use the\
    \ `USING (columns array)` clause to build the predicate for data selection and\
    \ relationship definition:\n\n- `INNER JOIN`\n- `CROSS JOIN`\n- `OUTER JOIN`\n\
    \n## Summary\n\nThat completes this chapter on creating databases during runtime.\
    \ We looked at designing and building a database manager app that is capable of\
    \ executing SQLite queries to create tables, views, indexes, and triggers. We\
    \ also looked at creating a database with two tables and a view using the database\
    \ manager app.\n\nIn the next chapter, I will add functionality to the `Db Mgr`\
    \ app to modify and delete database elements.\n\n---\n\n![media](media/image52.jpg)\n\
    \nSQLite doesn’t have an extensive API for modifying databases. Nevertheless,\
    \ it does still offer functions to alter tables, and we can still alter views,\
    \ triggers, and indexes as well as functions.\n\nThis chapter will focus on demonstrating\
    \ SQLite’s altering capabilities as well as on modifying a database using the\
    \ platform’s other tools, including the following:\n\n- Altering table\n- Modifying\
    \ views\n- Modifying indexes\n- Modifying triggers\n- Re-indexing a table\n- Deleting\
    \ tables\n- Deleting views\n- Deleting indexes\n- Deleting triggers\n\nIn this\
    \ section of the chapter, I will add the modifying database functionality as well\
    \ as explore the other unique features of SQLite; for instance:\n\n- Collation\
    \ sequences\n- The JSON extension\n- SQLite functions\n- Creating custom SQLite\
    \ functions\n- Pragma expressions\n- SQLite limits\n- SQLite database corruption\
    \ issues\n\n© Kevin Languedoc 2016 [45]  \nK. Languedoc, *Build iOS Database Apps\
    \ with Swift and SQLite*, DOI 10.1007/978-1-4842-2232-4_4\n\n## Modifying Tables\n\
    \nThree options are available for modifying a SQLite table. You can rename a table\
    \ using the `RENAME` command, add a column using the `ALTER` command, and re-index\
    \ using the `REINDEX` command. There is no function or command to alter a column,\
    \ but it is still possible.\n\nYou also need to keep in mind how to handle foreign\
    \ keys and indexes. You can’t directly alter these using a built-in function or\
    \ command, but it is still possible. Let us start with how to rename a table.\n\
    \n### Renaming a Table\n\nRenaming a table is a very simple task, as you only\
    \ need to issue the `RENAME` clause in the `ALTER TABLE` SQLite command. However,\
    \ a couple of caveats must be respected. First, you cannot move or copy a table\
    \ from one database to another, either within the same file or in another database\
    \ file. While we will look at this feature in more depth in a later chapter, SQLite\
    \ allows for multiple databases in a single database file. Second, if you have\
    \ foreign-key constraints defined, you will need to disable them first.\n\nForeign\
    \ keys with references will be renamed as a result the renaming, both in the table\
    \ being altered and in the referenced table. However, any indexes, views, and/or\
    \ triggers that reference a table that is renamed must be manually modified.\n\
    \n#### Simple Table Renaming"
