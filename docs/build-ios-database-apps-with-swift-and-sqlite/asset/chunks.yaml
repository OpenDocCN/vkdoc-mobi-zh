    The FirstViewController


    All iOS UIs have a view controller associated with the scenes in the storyboard.
    When the app was created, the template created a view controller for each of the
    scenes in the storyboard.


    To implement the UIImagePickerController and the UIPickerView , the app will need
    to implement UIImagePickerControllerDelegate , UIPickerViewDelegate , and UIPickerViewDataSource
    delegates and data sources. With each of these, the app needs to implement a certain
    number of required functions, which we will look at later.


    From the code that follows, you can see that we implement several variables and
    constants. The imageSelector variable is a UIImagePickerController type. It is
    used to present the UIImagePicker, which will use the building camera as its data
    source. The imageData is a variable that holds the image data from the camera.
    It is an NSData type that handles binary data on the iOS platform. The dbDAO is
    an instance of the WineryDAO that the app will use to interface with the database.
    wine and vintner are instances of the Wine and Wineries classes that represent
    the data. The wineriesArray is a mutable array of the Wineries type. This array
    is the data source for the UIPickerView . Finally, the IBOutlets were discussed
    earlier and are the connections in the UI.


