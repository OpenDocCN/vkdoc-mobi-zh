    Working with binary data in Swift and the Cocoa Touch framework implies that you
    will be using the `NSData` class on the iOS side and `blob` on the SQLite side.
    In this section, we will look at two functions that will allow you to insert any
    binary data into a SQLite database. While this is technically possible, I wouldn’t
    recommend using this in a production app, because it would use up a tremendous
    amount of valuable storage. There might be some instances where you need to provide
    binary data as part of your part, and this data wouldn’t increase in size over
    time.


    The following two functions can be used to insert binary data like videos, images,
    and audio. Of the two, the `sqlite3_bind_blob` function will be most always be
    used. The `sqlite3_bind_zeroblob` is used to write blobs incrementally into the
    database instead of storing the full size of the blob into memory all at once.
    We will demonstrate both:'
