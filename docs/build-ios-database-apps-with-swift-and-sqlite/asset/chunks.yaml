    \            let sourceVC:DetailViewController = sender as! DetailViewController\n\
    \            sourceVC.detailSQLiteQueryField.text = errmsg\n        }\n    }else{\n\
    \        while (sqlite3_step(sqlStatement)==Enums.SQLiteStatusCode.row.rawValue){\n\
    \            let dbVal:Db=Db.init()\n            dbVal.name = String (cString:\
    \ UnsafePointer<Int8>(sqlite3_column_text(sqlStatement, 1)))!\n            resultset.append(dbVal.name)\n\
    \        }\n        sqlite3_finalize(sqlStatement);\n    }\n    return resultset\n\
    }\n```\n\n## The `initViewIndex` Function  \n\nThe next Swift function we will\
    \ look at is `initViewIndex`. This function has a singular duty: to peruse the\
    \ Documents directory and retrieve a list of SQLite databases. This list is inserted\
    \ into an array called `sqliteDbs` and is returned to the calling object. This\
    \ function is called when the app is loaded from the `viewDidLoad` function in\
    \ the `MasterViewController`.  \n\n```\nfunc initViewIndex()->Array<String>{\n\
    \    var sqliteDbs:[String]=[]\n    let documentsDir = FileManager.default.urlsForDirectory(.documentDirectory,\n\
    \                                                           inDomains: .userDomainMask).first!\n\
    \    do {\n        let directoryUrls = try FileManager.default.contentsOfDirectory(at:\n\
    \            documentsDir, includingPropertiesForKeys: nil, options: FileManager.DirectoryEnumerationOptions())\n\
    \        sqliteDbs = directoryUrls.filter{$0.pathExtension! == \"sqlite\" }.map{\n\
    \            $0.lastPathComponent! }\n    } catch let error as NSError {\n   \
    \     print(error.localizedDescription)\n    }\n    return sqliteDbs\n}\n```\n\
    \nThe logic in the function is pretty easy. It starts by getting a handle on the\
    \ Documents directory through the `NSFileManager.default` class and function.\
    \ Afterward, it attempts to retrieve all the contents of the Documents directory,\
    \ including any sub-directories, by using the `contentsOfDirectoryAtURL` method\
    \ in the `NSFileManager` class.  \n\nA filter is applied to the list so as to\
