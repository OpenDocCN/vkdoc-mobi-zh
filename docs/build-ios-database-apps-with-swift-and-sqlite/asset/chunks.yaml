- fmt: '

    Lastly, there are syncing issues that cause damage to a database. This could be
    an issue if you place a copy of the database on `Dropbox`, `OneDrive`, or `iCloud`
    or any other Cloud file storage and sharing platform and try to sync the database
    files while it is open, which can cause damage to the database file. Make sure
    that the connection is closed before attempting any of these operations.


    ## SQLite Limits


    The last word goes to the limits. `SQLite` is very happy storing large amounts
    of data within its storage facility but it still does have its limits. Many of
    the limits imposed on `SQLite` come from the OS or memory. For instance, memory
    can be confined to 32-bit or 64-bit. On an `iPhone`, you have 1 GB of RAM available
    for the whole device. On an `iPad Pro`, however, you have 4 GB of RAM. `SQLite`
    must work within these small confines.


    Another limit can be the overall disk size. Since we are dealing with mobile devices,
    you have a finite amount of disk space available.


    There are other limits that can be tweaked during runtime for the specific needs
    of the application. The default length of a blob is defined by the macro `SQLITE_MAX_LENGTH`
    with a value of a 1 billion bytes. However, you can change this default using
    the `DSQLITE_MAX_LENGTH` flag: `-DSQLITE_MAX_LENGTH=123456789`


    You can also change the maximum number of columns, indexes, or views, or the maximum
    number of update and insert terms or `where` clause terms, from the default value
    of 2000 to a max of 32767\. But how many databases have you seen reaching these
    sizes, even on a server?


    Another size limit you can change is the length of a query. The size is set at
    1000000 through the `DSQLITE_MAX_LENGTH` macro. This value can be increased to
    1073741824\. As for tables, you can have up to 64 tables. Try that one if you
    can.


    Another interesting limit is the maximum amount of parameters a function can have.
    The default value is 100, but this value can be modified using the `SQLITE_MAX_FUNCTION_ARG`
    macro. Also, the maximum amount of compound `SELECT` statements using joins is
    500\. This value can be changed using the `SQLITE_MAX_COMPOUND_SELECT` macro.
    You can attach up to 125 databases in a file, while the default is 10\. The theoretical
    maximum number of rows in a table is 2 ^(64) (18446744073709551616, or about 1.8e
    + 19). However, as the documentation states, this limit can never be reached,
    since a database file can have a maximum size of 164 terabytes, which far surpasses
    the physical limits of any iOS device.


    Although `SQLite` has limits on other aspects of its architecture, these limits
    can never be reached within the confines of any iOS device. You will run out of
    physical space or resources before you reach `SQLite`’s limits.


    ## CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    ### Summary


    This concludes this chapter. We have explored the different features available
    in the `SQLite` API for altering databases. We have also looked at `PRAGMA` statements
    and `SQLite`’s built-in functions. Finally, we built a custom SQLite function
    and added to the `Winery` database in the `DB Mgr` app.


    The next several chapters will demonstrate how to perform CRUD operations on a
    `SQLite` database through the use of an iPhone app. We will also look at how to
    perform searches.


    ![Image](media/image56.jpg)


    The `SQL Insert` statement in `SQLite` has some interesting features, such as
    being able to replace an existing record, just like the `Upsert` statement in
    Oracle’s `PL/SQL`. The expression parameter can either be a literal or the return
    value from a function. We will explore these interesting features together.


    This chapter will demonstrate how to insert data into a `SQLite` database. I will
    cover all the supported variations of the API, including:


    - The data-binding functions

    - Inserting records

    - Inserting or replacing records

    - The Insert or Rollback option

    - The Insert or Ignore option

    - The Insert or Abort option

    - The Insert or Fail option

    - Inserting blobs

    - Building an iOS app to insert records


    ### The Data-Binding Functions

