- fmt: 'Triggers, as we have seen elsewhere, cannot be altered. You can, however,
    `DROP` a trigger and `CREATE` a new one using any of the accepted API syntax that
    is permitted. Before dropping a trigger, you should run the `SELECT` query on
    the `sqlite_master` table to get the existing SQL query that was used to create
    the original trigger. If you want to update the `sqlite_master` table with the
    new version of the trigger, you will need to execute an `UPDATE`. However, as
    I warned before, if you execute an `UPDATE` on the `sqlite_master` table and your
    `UPDATE` statement has syntax errors, you run the risk of corrupting the table
    and scraping your database. It is always best to test on a secondary database
    first.


    What I usually do is either execute a `SELECT` on the `sqlite_master` table to
    get the `SQL` statement or keep a copy of the `SQL` statement in a file, because
    the `DROP` statement will update the `sqlite_master` table. For instance, this
    sequence should be used to replace an existing trigger:


    - Retrieve copy of `CREATE` statement.

    - `DROP` trigger.

    - Modify the trigger’s logic.

    - `CREATE` the new trigger.

    - `CREATE` a test database.

    - `UPDATE sqlite_master` table in test database.

    - Fix syntax issues, if any.

    - `UPDATE sqlite_master` table in your database.


    Here are some examples of SQLite triggers that you can execute through the Db
    Mgr app:


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name BEFORE DELETE ON main.table_name FOR EACH ROW
    WHEN expression is true or false BEGIN delete-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name BEFORE UPDATE of column ON main.table_name FOR
    EACH ROW WHEN expression is true or false BEGIN update-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name BEFORE INSERT ON main.table_name FOR EACH ROW
    WHEN expression is true or false BEGIN insert-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name AFTER DELETE ON main.table_name FOR EACH ROW
    WHEN expression is true or false BEGIN delete-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name AFTER UPDATE of column ON main.table_name FOR
    EACH ROW WHEN expression is true or false BEGIN update-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name BEFORE INSERT ON main.table_name FOR EACH ROW
    WHEN expression is true or false BEGIN insert-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name INSTEAD OF DELETE ON main.table_name FOR EACH
    ROW WHEN expression is true or false BEGIN delete-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name INSTEAD OF UPDATE of column ON main.table_name
    FOR EACH ROW WHEN expression is true or false BEGIN update-statement

    ```


    ```

    DROP TRIGGER main.trigger_name

    CREATE TRIGGER main.trigger_name INSTEAD OF INSERT ON main.table_name FOR EACH
    ROW WHEN expression is true or false BEGIN insert-statement

    ```


    You can also add a `TEMP` or `TEMPORARY` keyword between the `CREATE` and `TRIGGER`
    keywords if you only need a temporary trigger. These triggers will only exist
    while the database is open. Altering triggers in SQLite is really just creating
    a new trigger to replace the old one.


    ## Adding and Altering Collation Sequences


    Collation sequences are directives on how the data in a database is arranged or
    sorted. Collation structures are present in the real world, like for cataloguing
    systems used in libraries, for instance, or medical records.


    You can create a collation sequence in SQLite by using the `CREATE Collation`
    command, which modifies the database by adding the sequence to the database. The
    collation sequence can be added when the database is first created, or afterward.


    SQLite uses collation sequencing internally to determine the greater of lesser
    of two values. SQLite has three built-in collation sequence types:


    - `BINARY`

    - `NOCASE`

    - `RTRIM`'
