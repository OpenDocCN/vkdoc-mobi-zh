    Kevin Languedoc has been a database and software developer for more than 20 years,
    having worked with many of the leading databases systems on desktop, client/server,
    mainframe, web/cloud, IoT, and mobile. He brings his expertise in database development
    to the iOS (iPhone and iPad) platform and SQLite. He graduated from University
    of Quebec at Montreal with a degree in computer science and from McGill University
    with a degree in marketing management. He has developed over 50 iPhone and iPad
    apps at the corporate level for clients of all sizes. He has worked in finance,
    banking services and insurance, and retail and distribution, as well as in energy,
    transportation, and pharmaceuticals on both sides of the fence. He brings a wealth
    of practical experience to this book, along with extensive code samples and working
    apps.


    Massimo Nardone has more than 22 years of experience in security, web/mobile development,
    cloud, and IT architecture. His true IT passions are security and Android. He
    has been programming and teaching how to program with Android, Perl, PHP, Java,
    VB, Python, C/C++, and MySQL for more than 20 years. He holds a Master of Science
    degree in computing science from the University of Salerno, Italy. He has worked
    as a project manager, software engineer, research engineer, chief security architect,
    information security manager, PCI/SCADA auditor, and senior lead IT security/cloud/SCADA
    architect for many years. Technical skills include security, Android, cloud, Java,
    MySQL, Drupal, Cobol, Perl, web and mobile development, MongoDB, D3, Joomla, Couchbase,
    C/C++, WebGL, Python, Pro Rails, Django CMS, Jekyll, Scratch, and so on. He currently
    works as chief information security officer (CISO) for Cargotec Oyj. He has worked
    as a visiting lecturer and supervisor for exercises at the Networking Laboratory
    of the Helsinki University of Technology (Aalto University). He holds four international
    patents (in the PKI, SIP, SAML, and Proxy areas). Massimo has reviewed more than
    40 IT books for different publishing companies, and he is the coauthor of Pro
    Android Games (Apress, 2015). This book is dedicated to Antti Jalonen and his
    family, who are always there when I need them.


    A book is never written in isolation; it is a team effort. Even though the author’s
    name appears on the front cover, it requires the support and effort of many people
    who work behind the scenes to make sure the project is successful. First and foremost,
    I wish to thank my wife, Louisa, and my kids, Patrick and Megan, for giving me
    the support, the space, and the understanding to write this book. At Apress, I
    offer my sincere thanks to Steve Anglin for offering me this opportunity and to
    Jessica Vakili, who was always patient and helpful and made sure the project moved
    along smoothly. My thanks also go to Aaron Black for his support in organizing
    this project and bringing together this great team, which also includes Jim Markham,
    Massimo Nardone, and Eric Levasseur, who all provided fantastic insight to smooth
    out the rough edges and make the book shine. To Dhaneesh Kumar, for preparing
    the front and back covers, thank you. To everyone else who has worked on this
    project at Apress, I wish to say thank you for helping me with my project.


    All my sincere thanks,

    —Kevin


    I’ve been working as a software developer for over 20 years. The central theme
    of my IT career has been database development, so I wanted to bring this experience
    to this book. I have worked with many of the popular database systems over the
    years, like Oracle, MSSQL, and DB2, not to mention oldies like Borland Dbase4,
    Lotus Approach, Superbase95, and, of course, Lotus Domino. However, I am uniquely
    impressed with SQLite. The versatility of this technology is incredible. You can
    take a SQLite database that was created on a Windows PC, for instance, and run
    it unchanged on an OSX, Linux, Android, JavaScript, and, of course, on iOS.'
