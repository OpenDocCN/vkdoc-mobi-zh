    \ 对象。\n\n接下来，我检查数据库是否仍处于打开状态，并在必要时将其打开。否则，我分别将 `preparedStatement` 和 `query` 以及\
    \ `sqlStatement` 和 `query` 发送给数据库引擎执行。请注意，Swift 字符串是如何使用 `String` 类的 `cStringUsingEncoding(NSUTF8StringEncoding)`\
