- fmt: "记住将`sqlite3`库添加到Linked Libraries（图11-6），因为我们需要使用`sqlite`库。\n\n![](media/image195.jpg)\n\
    \n图11-6. 添加`sqlite`库\n\n接下来，使用`import`关键字将头文件添加到`DatabaseBackup-Bridging-Header.h`头文件中，如以下代码片段所示：\n\
    \n```objectivec\n#import <sqlite3.h>\n```\n\n桥接就绪后，我们可以添加执行备份的代码。\n\n## 第11章 备份SQLite数据库\n\
    \n### ViewController\n\n`ViewController`是应用程序的主控制器。我们添加三个数据库指针和一个指向`sqlite3_backup`对象的指针。我们还添加一个`FileManager`来执行文件操作，例如将数据库文件复制到Documents目录。源数据库和目标数据库分别定义为`sourcedb`和`targetdb`，最后两个`COpaquePointer`用于`sqlite3_statement`和`sqlite3`数据库错误。\n\
    \n```swift\nvar db:OpaquePointer? = nil // SQLite数据库连接，用于sourceDB文件名\nvar bakdb\
    \ :OpaquePointer? = nil // SQLite备份对象\nvar filedb :OpaquePointer? = nil // SQLite备份对象\n\
    let fileMgr:FileManager = FileManager.default\nlet sourcedb:String = \"Chinook_Sqlite.sqlite\"\
    \ // 要备份的SQLite数据库\nlet targetdb:String = \"backup_chinook.sqlite\"\nvar sqlStatement:OpaquePointer?\
    \ = nil\nvar err:UnsafeMutablePointer<Int8>? = nil\n```\n\n### 函数`viewDidLoad`和`copyDatabaseIntoDocuments`\n\
    \n在`viewDidLoad`函数中，我们为每个数据库调用`copyDatabaseIntoDocuments`函数。该函数获取文件的句柄和Documents目录的句柄，如果文件尚不存在，则使用`openItem`将文件复制到Documents目录：\n\
    \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    self.copyDatabaseIntoDocuments(sourcedb)\n\
    \    self.copyDatabaseIntoDocuments(targetdb)\n}\n```\n\n```swift\nfunc copyDatabaseIntoDocument(_\
    \ dbFilename:String){\n    var srcPath:URL\n    var destPath:URL\n    let dirManager\
    \ = FileManager.default\n    let projectBundle = Bundle.main\n    do {\n     \
    \   let resourcePath = projectBundle.pathForResource(dbFilename.\n           \
    \ components(separatedBy: \".\")[0], ofType: \"sqlite\")\n        let documentURL\
    \ = try dirManager.urlForDirectory(FileManager.\n            SearchPathDirectory.documentDirectory,\
    \ in: FileManager.SearchPathDomainMask.userDomainMask, appropriateFor: nil, create:\
    \ true)\n        srcPath = URL(fileURLWithPath: resourcePath!)\n        destPath\
    \ = try! documentURL.appendingPathComponent(dbFilename)\n        if !dirManager.fileExists(atPath:\
    \ destPath.path!) {\n            try dirManager.copyItem(at: srcPath, to: destPath)\n\
    \        }\n    } catch let err as NSError {\n        print(\"Error: \\(err.domain)\"\
    )\n    }\n}\n```\n\n### 函数`getDatabasePath`\n\n最后，`getDatabasePath`是一个辅助函数，用于获取每个数据库文件的完整路径。该函数在`copyDatabaseIntoDocument`中使用：\n\
    \n```swift\nfunc getDatabasePath(_ database:String)->URL{\n    var dbfile:URL\
    \ = URL.init(fileURLWithPath:\"\")\n    let dirManager = FileManager.default\n\
    \    do {\n        let directoryURL = try dirManager.urlForDirectory(FileManager.\n\
