    SQLite 有许多比其他 Pragma 语句更常用的 Pragma 语句（完整列表见 https://www.sqlite.org/pragma.html）。例如，以下是一些有用的：


    - `foreign_key_check`

    - `foreign_key_list`

    - `integrity_check`

    - `automatic_index`

    - `busy_timeout`

    - `shrink_memory`

    - `auto_vacuum`


    ## `foreign_key_check`


    `PRAGMA schema.foreign_key_check;`


    `PRAGMA schema.foreign_key_check( table-name );`


    `foreign_key_check` PRAGMA 针对数据库或表运行，用于检查任何外键违规。它会为每个违规返回一行，因此你可以使用`sqlite3_step`函数来检索返回值。结果值有四列，如下所示：


    - 包含引用的表名。

    - 第二个值是发生违规的行索引。

    - 第三列是外键引用的表。

    - 最后一列是外键名称。


    ## `foreign_key_list`


    `foreign_key_list` PRAGMA 返回数据库中的外键列表。它会为每个外键约束返回一行。


    `PRAGMA foreign_key_list( table-name )`


    ## `integrity_check`


    `integrity_check` PRAGMA 对整个数据库进行完整性检查，查找缺失的索引、损坏的记录、顺序错乱的记录、缺失的页面以及 UNIQUE 或
    NOT NULL 违规等问题，以及其他验证。结果以单个列的形式返回，描述问题。如果未发现问题，返回的列将仅包含“OK”值。`N` 指要返回的最大错误数量。默认为
