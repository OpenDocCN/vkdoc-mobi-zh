    # 添加桥接文件


    与往常一样，创建项目后的第一步就是创建 Objective-C 桥接文件。你可以为每个项目单独创建桥接文件，或者创建一个共享资源并将其复制到工作项目中。你也可以使用
    CocoaPods (CocoaPods.org) 在新项目中安装`sqlite3`库和桥接文件。或者，你也可以使用 CocoaPods 仓库中的某个项目。


