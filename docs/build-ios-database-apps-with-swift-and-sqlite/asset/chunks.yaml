    two tables in place, all


    that remains is the view to display the results. The next section will provide
    the details for the view. CHAPTER 3 ■ CREATING DATABASES DURING RUNTIME


    Adding the View


    Since this is a very simple database and app, I will create just one view that
    will select the columns from each table using a join. The code is as follows:


    CREATE VIEW IF NOT EXISTS wines AS SELECT w.name, w.rating, w.type, p.producer,
    p.country, p.region FROM main.wine w INNER JOIN main.producer p on w.id = p.id


    SQLIte supports three types of joins. You can use the joins as just seen, or you
    can use the USING (columns array) clause to build the predicate for data selection
    and relationship definition:


    • INNER JOIN


    • CROSS JOIN


    • OUTER JOIN


    Summary


    That completes this chapter on creating databases during runtime. We looked at
    designing and building a database manager app that is capable of executing SQLite
    queries to create tables, views, indexes, and triggers. We also looked at creating
    a database with two tables and a view using the database manager app.


    In the next chapter, I will add functionality to the Db Mgr app to modify and
    delete database elements.


    ![](media/image52.jpg)


    SQLite doesn’t have an extensive API for modifying databases. Nevertheless, it
    does still offer functions to alter tables, and we can still alter views, triggers,
    and indexes as well as functions.


    This chapter will focus on demonstrating SQLite’s altering capabilities as well
    as on modifying a database using the platform’s other tools, including the following:


    • Altering table


    • Modifying views


    • Modifying indexes


    • Modifying triggers


    • Re-indexing a table


    • Deleting tables


    • Deleting views


    • Deleting indexes


    • Deleting triggers


    In this section of the chapter, I will add the modifying database functionality
    as well as explore the other unique features of SQLite; for instance:


    • Collation sequences


    • The JSON extension


    • SQLite functions


    • Creating custom SQLite functions


    • Pragma expressions


    • SQLite limits


    • SQLite database corruption issues


    © Kevin Languedoc 2016 [45]


    K. Languedoc, Build iOS Database Apps with Swift and SQLite , DOI 10.1007/978-1-4842-2232-4_4
    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    Modifying Tables


    Three options are available for modifying a SQLite table. You can rename a table
    using the RENAME command , add a column using the ALTER command , and re-index
    using the REINDEX command . There is no function or command to alter a column,
    but it is still possible.


    You also need to keep in mind how to handle foreign keys and indexes. You can’t
    directly alter these using a built-in function or command, but it is still possible.
    Let us start with how to rename a table. Renaming a Table


    Renaming a table is a very simple task, as you only need to issue the RENAME clause
    in the ALTER TABLE SQLite command. However, a couple of caveats must be respected.
    First, you cannot move or copy a table from one database to another, either within
    the same file or in another database file. While we will look at this feature
    in more depth in a later chapter, SQLite allows for multiple databases in a single
    database file. Second, if you have foreign-key constraints defined, you will need
    to disable them first.


    Foreign keys with references will be renamed as a result the renaming, both in
    the table being altered and in the referenced table. However, any indexes, views,
    and/or triggers that reference a table that is renamed must be manually modified.


