    menu item in the `Tools` menu in Firefox.


    ![](media/image26.jpg)


    **Figure 2-1.** SQLite Manager menu in Firefox


    ### The SQLite Manager Menu


    The SQLite Manager has a quick-access menu of the main activities you can perform
