    The searchDatabase Function


    The other addition is a method to interface with the database: searchDatabase
    . This method will take one argument for the search term. Technically, you should
    be able to pass multiple search terms, which would be split into an array, but
    for simplicity''s sake I am assuming a single-term search term.


    The first variable, fileExist , is a Boolean. It will allow us to ensure that
    the dbSearch.sqlite file is available in the main application bundle. The db variable
    is a COpaquePointer for the SQLite database. Likewise, the sqlStatement variable
    is a COpaquePointer for the sqlite3_stmt statement.


    In order to open the database, we need to get the path to the file in the main
    application bundle. We are leaving it there because we don''t need to write to
    it and the main bundle is read-only during runtime. The projectBundle gets a handle
    to the mainBundle through the NSBundle class. Then the fileMgr constant is created
    as an NSFileManager . This class handles interactivity with the file system. The
    resourcePath String constant will be assigned the fully qualified path to the
    database using pathForResource .


    Once these constants and variables are defined and assigned their initial values,
    we check to make sure the database file is available using fileExistsAtPath ,
    which returns a Boolean value. If the database file exists, the database is opened
    using the sqlite3_open function. SQLITE_OK is returned if the database is successfully
    opened or will print an error message to the console if not.'
