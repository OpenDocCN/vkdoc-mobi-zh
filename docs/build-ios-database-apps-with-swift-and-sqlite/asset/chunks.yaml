    ## SELECT 语句


    无论你使用什么平台，`SELECT` 语句都是 SQL 语言的中坚力量，在 SQLite 中也不例外。`SELECT` 语句用于对 SQLite 表或视图执行查询，也用于填充
    SQLite 数据库中的视图，这与在其他关系型数据库系统中相同。


    本章演示了如何在 Swift 中使用 `SELECT`，通过绑定 SQLite 表中的列数据，并将其赋值给 Swift 数据类型变量。


    这些示例展示了如何执行 SELECT 查询来返回文本、数值数据以及音频、图像和视频数据。酒庄应用将改造为使用 `SELECT` 查询，为 `UIPickerView`
    显示酒庄列表，并展示数据库中存储的葡萄酒。


