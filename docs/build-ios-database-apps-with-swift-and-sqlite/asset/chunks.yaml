- fmt: "# Updating Records in SQLite\n\nUpdating records in SQLite is very similar\
    \ to using the `UPDATE` statement on other platforms like SQL Server or Oracle.\
    \ However, SQLite offers additional operations for updating records that are similar\
    \ in nature to the SQLite `INSERT` statement.\n\nIn this chapter, we will discuss\
    \ the various ways we can use the `UPDATE` statement in SQLite. These include\
    \ the following:\n\n- The `UPDATE` statement\n- The `WHERE` clause\n- The `LIMIT`\
    \ and `ORDER BY` clauses\n- Using sub-queries\n- Using joins\n- Using a `WHERE`\
    \ clause in a sub-query\n- Using the `ON Conflict` clause\n- The `OR FALLBACK`\
    \ statement\n- The `OR ABORT` statement\n- The `OR REPLACE` statement\n- The `OR\
    \ FAIL` statement\n- The `OR IGNORE` statement\n\nThe following sections in this\
    \ chapter will provide working examples of the queries for each of these operations\
    \ in addition to adding the updating functionality to the Winery app.\n\n## SQLite\
    \ Update Statement\n\nThe `UPDATE` statement is used to update an existing record\
    \ or records in a SQLite database. If you only need to update a subset of the\
    \ rows in a table, you can use a `WHERE` clause to filter or target the records\
    \ that need to be updated or replaced, as we will see later. The `LIMIT` clause\
    \ and the `ORDER BY` clause can be used to limit the number of rows to be affected\
    \ by the `UPDATE`. Likewise, `ORDER BY` is primarily used to determine which rows\
    \ are included when using the `LIMIT` clause.\n\n`WHERE`, `LIMIT`, and `ORDER\
    \ BY` are optional; however, the `WHERE` clause is almost always used. The table\
    \ name should include the schema, especially if you have more than one database\
    \ attached to the same file. See the following:\n\n© Kevin Languedoc 2016 [113]\
    \ K. Languedoc, *Build iOS Database Apps with Swift and SQLite*, DOI 10.1007/978-1-4842-2232-4_7\n\
    \n```\nUPDATE main.tableName\nSET column(s) = expression\nWHERE whereClause\n\
    LIMIT numer_of_rows\nORDER BY column(s)\n```\n\nOther options that can be used\
    \ with `UPDATE` are the `OR` clauses, which include `ROLLBACK`, `FAIL`, `ABORT`,\
    \ `IGNORE`, and `REPLACE`.\n\nThe first example query we will look at is the basic\
    \ `UPDATE` statement. If you have used `UPDATE` in SQL or in other platform derivatives\
    \ of the SQL language like PL/SQL or T-SQL, you will be right at home, because\
    \ `UPDATE` works exactly the same way in SQLite:\n\n```\nUPDATE main.CityTemperature\n\
    SET Temperature = 1\n, Scale = 'C'\n, Date = '11-15-2014'\n```\n\nIn the preceding\
    \ example, the `CityTemperature` table is updated to reflect the current temperature\
    \ reading. The assumption here is that there is only one entry in the database;\
    \ otherwise, every entry would be updated as well.\n\nIn an iOS application, the\
    \ `UPDATE` statement could use values captured from the UI fields (`IBOutlet`s)\
    \ and pass them to the query statement using SQLite binding types, as we have\
    \ seen before. Using the preceding example, let us suppose there are three fields\
    \ (`UITextField`) that are connected to a `ViewController` using `IBOutlet`s.\
    \ The code would look something like this:\n\n```\nfunc updateRecords(){\n   \
    \ let sql:String = \"Update main.data set coltext=?\"\n    if(sqlite3_open(dbPath.path!,\
    \ &db)==SQLITE_OK){\n        if(sqlite3_prepare_v2(db, sql.cString(using: String.Encoding.utf8)!,\
    \ -1,\n                              &sqlStatement, nil) == SQLITE_OK)\n     \
    \   {\n            sqlite3_bind_text(stmt, 1, txt.cString(using: String.Encoding.utf8)!,\
    \ -1,\n                              SQLITE_TRANSIENT);\n        }\n    }\n  \
    \  sqlite3_step(stmt);\n    sqlite3_finalize(stmt);\n    sqlite3_close(cruddb);\n\
    }\n```\n\nIn this example, I define a Swift `String` constant with a placeholder\
    \ for the new value for the column to be updated. After opening the database,\
    \ the query string is attached to the `sqlite3_prepared_v2` function, and the\
    \ value is bound using `sqlite3_bind_text`.\n\nAlthough functional, this query\
    \ is not very practical, as it either assumes that there is only one record in\
    \ the database or that every row will be updated with this new value. The next\
    \ example will use a `WHERE` clause to limit the update to a common set of rows\
    \ or a single row, as the case may be.\n\n## UPDATE Using a Where Clause"
  raw: 'Updating records in SQLite is very similar to using the UPDATE statement on
    other platforms like SQL Server or Oracle. However, SQLite offers additional operations
    for updating records that are similar in nature to the SQLite INSERT statement.


    In this chapter, we will discuss the various ways we can use the UPDATE statement
    in SQLite. These include the following:


    • The UPDATE statement


    • The WHERE clause


    • The LIMIT and ORDER BY clauses


    • Using sub-queries


    • Using joins


    • Using a WHERE clause in a sub-query


    • Using the ON Conflict clause


    • The OR FALLBACK statement


    • The OR ABORT statement


    • The OR REPLACE statement


    • The OR FAIL statement


    • The OR IGNORE statement


    The following sections in this chapter will provide working examples of the queries
    for each of these operations in addition to adding the updating functionality
    to the Winery app. SQLite Update Statement


    The UPDATE statement is used to update an existing record or records in a SQLite
    database. If you only need to update a subset of the rows in a table, you can
    use a WHERE clause to filter or target the records that need to be updated or
    replaced, as we will see later. The LIMIT clause and the ORDER BY clause can be
    used to limit the number of rows to be affected by the UPDATE . Likewise, ORDER
    BY is primarily used to determine which rows are included when using the LIMIT
    clause.


    WHERE , LIMIT , and ORDER BY are optional; however, the WHERE clause is almost
    always used. The table name should include the schema, especially if you have
    more than one database attached to the same file. See the following:


    © Kevin Languedoc 2016 [113]


    K. Languedoc, Build iOS Database Apps with Swift and SQLite , DOI 10.1007/978-1-4842-2232-4_7
    CHAPTER 7 ■ UPDATING RECORDS


    UPDATE main.tableName


    SET column(s) = expression


    WHERE whereClause


    LIMIT numer_of_rows


    ORDER BY column(s)


    Other options that can be used with UPDATE are the OR clauses , which include
    ROLLBACK , FAIL , ABORT , IGNORE , and REPLACE .


    The first example query we will look at is the basic UPDATE statement. If you
    have used UPDATE in SQL or in other platform derivatives of the SQL language like
    Pl/ SQL or T-SQL, you will be right at home, because UPDATE works exactly the
    same way in SQLite:


    UPDATE main.CityTemperature


    SET Temperature = 1


    , Scale = ''C''


    , Date = ''11-15-2014''


    In the preceding example, the CityTemperature table is updated to reflect the
    current temperature reading. The assumption here is that there is only one entry
    in the database; otherwise, every entry would be updated as well.


    In an iOS application, the UPDATE statement could use values captured from the
    UI fields ( IBOutlets ) and pass them to the query statement using SQLite binding
    types, as we have seen before. Using the preceding example, let us suppose there
    are three fields ( UITextField ) that are connected to a ViewController using
    IBOutlets . The code would look like something like this: func updateRecords(){


    let sql:String = "Update main.data set coltext=?"


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


    if(sqlite3_prepare_v2(db, sql.cString(using: String.Encoding.utf8)!, -1,


    &sqlStatement, nil) == SQLITE_OK)


    {


    sqlite3_bind_text(stmt, 1, txt.cString(using: String.Encoding.utf8)!, -1,


    SQLITE_TRANSIENT);


    }


    }


    sqlite3_step(stmt);


    sqlite3_finalize(stmt);


    sqlite3_close(cruddb);


    }


    In this example, I define a Swift String constant with a placeholder for the new
    value for the column to be updated. After opening the database, the query string
    is attached to the sqlite3_prepared_v2 function, and the value is bound using
    sqlite3_bind_text .


    Although functional, this query is not very practical, as it either assumes that
    there is only one record in the database or that every row will be updated with
    this new value. The next example will use a WHERE clause to limit the update to
    a common set of rows or a single row, as the case may be.


    CHAPTER 7 ■ UPDATING RECORDS


    UPDATE Using a Where Clause'
  trans: "\n# 在 SQLite 中更新记录\n\n在 SQLite 中更新记录与在 SQL Server 或 Oracle 等其他平台上使用 `UPDATE`\
    \ 语句非常相似。不过，SQLite 还提供了与 `INSERT` 语句性质类似的额外更新记录操作。\n\n在本章中，我们将讨论在 SQLite 中使用 `UPDATE`\
    \ 语句的各种方式。其中包括以下内容：\n\n- `UPDATE` 语句\n- `WHERE` 子句\n- `LIMIT` 和 `ORDER BY` 子句\n\
    - 使用子查询\n- 使用连接\n- 在子查询中使用 `WHERE` 子句\n- 使用 `ON Conflict` 子句\n- `OR FALLBACK`\
    \ 语句\n- `OR ABORT` 语句\n- `OR REPLACE` 语句\n- `OR FAIL` 语句\n- `OR IGNORE` 语句\n\n\
    本章的后续部分将为上述每种操作提供可实际运行的查询示例，同时还将为 Winery 应用添加更新功能。\n\n## SQLite 更新语句\n\n`UPDATE`\
    \ 语句用于更新 SQLite 数据库中的现有记录。如果只需要更新表中部分行的子集，可以使用 `WHERE` 子句来筛选或定位需要更新或替换的记录（稍后将介绍）。`LIMIT`\
    \ 子句和 `ORDER BY` 子句可用于限制受 `UPDATE` 影响的行数。同样，`ORDER BY` 主要用于在使用 `LIMIT` 子句时确定哪些行会被包含在内。\n\
    \n`WHERE`、`LIMIT` 和 `ORDER BY` 是可选的；但 `WHERE` 子句几乎总是会被用到。表名应包含架构名称，尤其是在同一文件附加了多个数据库的情况下。请参考以下内容：\n\
    \n© Kevin Languedoc 2016 [113] K. Languedoc, *Build iOS Database Apps with Swift\
    \ and SQLite*, DOI 10.1007/978-1-4842-2232-4_7\n\n```\nUPDATE main.tableName\n\
    SET column(s) = expression\nWHERE whereClause\nLIMIT numer_of_rows\nORDER BY column(s)\n\
    ```\n\n可与 `UPDATE` 一起使用的其他选项包括 `OR` 子句，具体有 `ROLLBACK`、`FAIL`、`ABORT`、`IGNORE`\
    \ 和 `REPLACE`。\n\n我们将要分析的第一个查询示例是基础的 `UPDATE` 语句。如果你曾在 SQL 中或 SQL 语言的其他平台衍生版本（如\
    \ PL/SQL 或 T-SQL）中使用过 `UPDATE`，那么你会感到很熟悉，因为 `UPDATE` 在 SQLite 中的工作方式完全相同：\n\n\
    ```\nUPDATE main.CityTemperature\nSET Temperature = 1\n, Scale = 'C'\n, Date =\
    \ '11-15-2014'\n```\n\n在上例中，`CityTemperature` 表被更新以反映当前的温度读数。这里假设数据库中只有一条记录；否则所有条目都会随之被更新。\n\
    \n在 iOS 应用程序中，`UPDATE` 语句可以使用从 UI 字段（`IBOutlet`）捕获的值，并通过 SQLite 绑定类型将这些值传递给查询语句，正如我们之前所见。沿用上例，假设有三个字段（`UITextField`）通过\
    \ `IBOutlet` 连接到 `ViewController`。代码大致如下：\n\n```\nfunc updateRecords(){\n    let\
    \ sql:String = \"Update main.data set coltext=?\"\n    if(sqlite3_open(dbPath.path!,\
    \ &db)==SQLITE_OK){\n        if(sqlite3_prepare_v2(db, sql.cString(using: String.Encoding.utf8)!,\
    \ -1,\n                              &sqlStatement, nil) == SQLITE_OK)\n     \
    \   {\n            sqlite3_bind_text(stmt, 1, txt.cString(using: String.Encoding.utf8)!,\
    \ -1,\n                              SQLITE_TRANSIENT);\n        }\n    }\n  \
    \  sqlite3_step(stmt);\n    sqlite3_finalize(stmt);\n    sqlite3_close(cruddb);\n\
    }\n```\n\n在此示例中，我定义了一个 Swift `String` 常量，其中包含待更新列新值的占位符。打开数据库后，查询字符串被附加到 `sqlite3_prepared_v2`\
    \ 函数，值则通过 `sqlite3_bind_text` 进行绑定。\n\n尽管这个查询可以工作，但不太实用，因为它要么假设数据库中只有一条记录，要么所有行都会被更新为这个新值。下一个示例将使用\
    \ `WHERE` 子句来限定更新范围，使其仅作用于一组共同的行或单一行（视情况而定）。\n\n## 使用 WHERE 子句进行更新\n"
- fmt: "为了更精确地执行`UPDATE`语句，通常需要与`WHERE`子句结合使用。该子句位于`UPDATE`语句的末尾，如下例所示。当然，也可以通过使用`AND`运算符甚至标准或自定义函数，在`WHERE`子句中包含多个布尔表达式。\n\
    \n```sql\nUPDATE CityTemperature\nSET Temperature = 1\n    , Scale = 'C'\n   \
    \ , Date = '11-15-2014'\nWHERE City = 'Montreal'\n```\n\n在Swift中，这个查询可以表示如下：\n\
    \n```swift\nfunc updateRecords() {\n    let sql: String = \"Update Temperature\
    \ set TemperatureScale =? where City=? and Country = ?\"\n    if (sqlite3_open(dbPath.path!,\
    \ &db) == SQLITE_OK) {\n        if (sqlite3_prepare_v2(db, sql.cString(using:\
    \ String.Encoding.utf8)!, -1, &sqlStatement, nil) == SQLITE_OK) {\n          \
    \  sqlite3_bind_text(stmt, 1, txt.cString(using: String.Encoding.utf8)!, -1, SQLITE_TRANSIENT);\n\
    \            sqlite3_bind_text(stmt, 2, utxt.cString(using: String.Encoding.utf8)!,\
    \ -1, SQLITE_TRANSIENT);\n            sqlite3_bind_text(stmt, 3, txt.cString(using:\
    \ String.Encoding.utf8)!, -1, SQLITE_TRANSIENT);\n        }\n        sqlite3_step(stmt);\n\
    \        sqlite3_finalize(stmt);\n        sqlite3_close(cruddb);\n    }\n}\n```\n\
    \n在上例中，我为每个值占位符（由问号表示）绑定了值。只要绑定值的顺序与查询字符串中占位符的顺序一致，查询就可以根据需要设置任意数量的绑定值。\n\n###\
    \ 使用子查询进行更新\n\n给列赋值的另一种方法是使用子查询来获取所需值并赋值给指定列。该子查询必须只返回一个值；否则会收到错误。也可以使用一个计算表达式并返回结果的函数。该表达式还可以包含另一个查询或某种计算。让我们看一个子查询示例：\n\
    \n```sql\nUPDATE CityTemperature\nSET Scale = (Select Scale from TemperatureScales\
    \ where Country = 'Canada')\nwhere Country = 'Canada'\n```\n\n### 使用连接进行记录更新\n\
    \n你也可以使用连接（`JOIN`）从另一个表中获取数据。在下面的例子中，我使用了`INNER JOIN`，但也可以使用`OUTER JOIN`或`CROSS\
    \ JOIN`。不过，大多数情况下使用`INNER JOIN`。\n\n```sql\nUPDATE CityTemperature\nSET TemperatureScale\
    \ = 'C'\nFROM CityTemperature ct\n    INNER JOIN TemperatureScales s ON ct.id\
    \ = s.id\nWHERE ct.Country = 'Canada'\n```\n\n### 在`FROM`子句中使用子查询进行更新\n\n`UPDATE`操作的另一种选择是在`WHERE`子句中使用子查询，如下例所示。这里，子查询被命名为`tmpSelect`，引用的正是这个内层查询（或子查询）中的`temperature`列。\n\
    \n只要在绑定列时保持占位符的顺序，你就可以在Swift中使用此查询。\n\n```sql\nUPDATE CityTemperature\nSET Temperature\
    \ = tmpSelect.Temperature\nFROM (SELECT id, Temperature from TempReadings where\
    \ id = CityTemperature.Id and City = 'Montreal') as tmpSelect\n```\n\n### 冲突时的更新操作\n\
    \nSQLite 提供了五种特殊的操作来处理 SQL 事务期间的冲突，分别是`ROLLBACK`、`IGNORE`、`FAIL`、`ABORT`和`REPLACE`。这些并非SQL标准的一部分，而是通过\
    \ SQLite API 提供的。这些特殊语句使得SQL脚本能够在更新数据时，在列级别处理冲突。它们处理与主键、唯一键、非空列及其值相关的约束。\n\n对于`UPDATE`命令，与`INSERT`命令类似，`ON\
    \ CONFLICT`会被替换为`OR`后跟上述关键字之一。我们将在以下部分中查看这些命令。\n\n#### 更新或回滚记录\n\n当使用`ROLLBACK`时，如果要更新的记录违反了约束（例如主键），`ROLLBACK`选项可以帮助你优雅地处理错误，并通过回滚事务继续执行。如果查询正在更新多条记录，`ROLLBACK`的行为将与`ABORT`操作类似。\n\
    \n```sql\nUPDATE OR ROLLBACK BooksToRead\nSET Title = 'To Kill a Mockingbird'\n\
    \    , Author = 'Harper Lee'\nWHERE id = 2\n```\n\n#### 更新或中止记录"
  raw: 'To make an UPDATE statement more precise, it is often used in conjunction
    with a WHERE clause . This clause is included at the end of the UPDATE statement,
    as seen in the following example. Of course, you could include multiple Boolean
    expressions in the WHERE by using the AND operator or even a standard or custom
    function. UPDATE CityTemperature


    SET Temperature = 1


    , Scale = ''C''


    , Date = ''11-15-2014''


    WHERE City = ''Montreal''


    In Swift, this query could be represented as follows:


    func updateRecords(){


    let sql:String = "Update Temperature set TemperatureScale =? where City=? and


    Country = ?"


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


    if(sqlite3_prepare_v2(db, sql.cString (using: String.Encoding.utf8)!, -1,


    &sqlStatement, nil) == SQLITE_OK)


    {


    sqlite3_bind_text(stmt, 1, txt.cString (String.Encoding.utf8)!, -1, SQLITE_


    TRANSIENT);


    sqlite3_bind_text(stmt, 2, utxt.cString (String.Encoding.utf8)!, -1, SQLITE_


    TRANSIENT);


    sqlite3_bind_text(stmt, 3, txt.cString (String.Encoding.utf8)!, -1, SQLITE_


    TRANSIENT);


    }


    sqlite3_step(stmt);


    sqlite3_finalize(stmt);


    sqlite3_close(cruddb);


    }


    In the preceding example , I bind values for each of the value placeholders, which
    are represented by question marks. The query can have as many binding values as
    are needed as long as you place the binding values in the same order as the placeholders
    in the query string.


    UPDATE Using a Sub-query


    Another way to assign a value to a column is to use a sub-query to fetch the rewired
    value and assign it to the required column. The sub-query would have to return
    only one value; otherwise, you would get an error. You could also use a function
    that evaluates an expression and returns a result. This expression could also
    include another query, for example, or a calculation of some sort. Let''s see
    an example sub-query: UPDATE CityTemperature


    SET Scale = (Select Scale from TemperatureScales where Country = ''Canada'') where
    Country = ‘Canada’


    CHAPTER 7 ■ UPDATING RECORDS


    Updating Records Using a Join


    You can also use a join to fetch data from another table. In the following example,
    I use an INNER JOIN , but you can also use an OUTER JOIN or a CROSS JOIN . However,
    in most cases you would use an INNER JOIN . UPDATE CityTemperature


    SET TemperatureScale = ''C''


    FROM CityTemperature ct INNER JOIN TemperatureScales s


    ON ct.id = s.id


    WHERE ct.Country = ''Canada''


    UPDATE Using a Sub-Query in FROM Clause


    Another option for an UPDATE operation is to use a sub-query in the WHERE clause
    , as the following example demonstrates. Here, the sub-query is named tmpSelect
    and it is the temperature column from this inner select, or sub-query, that is
    being referenced.


    You could use this query in Swift as long as you maintain the order of the placeholders
    when binding the columns.


    UPDATE CityTemperature


    SET Temperature = tmpSelect.Temperature


    FROM (SELECT id, Temperature from TempReadings where id = CityTemperature.Id and
    City = ''Montreal'') as tmpSelect


    Update On Conflict


    SQLite provides five special operations to handle conflicts during a SQL transaction.
    These are ROLLBACK , IGNORE , FAIL , ABORT , and REPLACE . These aren''t part
    of the SQL standard, but are provided through the SQLite API. These special statements
    enable a SQL script to handle conflicts at the column level when updating data.
    They handle constraints related to primary keys and unique, or not null, columns
    and values.


    For the UPDATE command, like for the INSERT command, the ON CONFLICT is changed
    to OR followed by one of the keywords mentioned. We will look at these commands
    in the following sections. Update or Rollback Records


    When using the ROLLBACK , if the record you are trying to update is violating
    a constraint such as a primary key, the ROLLBACK option can help you gracefully
    handle the error and move on by rolling back the transaction. If the query is
    updating more than one record, the ROLLBACK will behave like the ABORT operation.


    UPDATE OR ROLLBACK BooksToRead


    SET Title = ''To Kill a Mockingbird''


    , Author = ''Harper Lee''


    WHERE id = 2


    Update or Abort Records'
