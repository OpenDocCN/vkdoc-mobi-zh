    T h e imagePickerController function is part of the image-picker protocol. It
    tells the delegate that a picture was selected. We need to call the dismissViewControllerAnimated
    to close the picker and return the selected image, which we store in the imageView.image
    property:


    func imagePickerController(_ picker: UIImagePickerController, didFinishPickingMediaWithInfo
    info: [String : AnyObject]){


    imageSelector.dismiss(animated: true, completion: nil)


    imageView.image = info[UIImagePickerControllerOriginalImage] as? UIImage


    imageData = UIImagePNGRepresentation(imageView.image!)!


    }


    Once we have the image stored in the imageView , it is passed to the imageData
    using UIImagePNGRepresentation , which takes imageView.image as a parameter. The
    image data is passed and stored in the database using insertRecordAction function,
    which we will look at next. Add the Insert Function


    The insertRecordAction calls the dbDAO object, passing in the required parameters
    to insert it into the database. Most of the data used for the function comes from
    other functions and is assigned to the Wine instance class’s properties.


    CHAPTER 5 ■ INSERTING RECORDS


    @IBAction func insertRecordAction(_ sender: AnyObject) {


    dbDAO.insertWineRecord(wine))


    }


    The viewDidLoad Function


    This standard ViewController function is used after the scene is loaded onto the
    view stack or, in our case, when the app is launched. The function provides a
    channel to set up the wineriesPickerView by setting up the delegate and assigning
    the wineriesArray data source. Once the setup is complete, the UIPicker is added
    as a subview to the current view controller.


    override func viewDidLoad() {


    super.viewDidLoad()


    //build data source


    self.wineriesPickerView.isHidden = true


    self.wineriesPickerView.dataSource = self


    self.wineriesPickerView.delegate = self


    self.wineriesPickerView.frame = CGRect(x:100, y:100, width: 100, height: 162)


    self.wineriesPickerView.backgroundColor = UIColor.black()


    self.wineriesPickerView.layer.borderColor = UIColor.white().cgColor


    self.wineriesPickerView.layer.borderWidth = 1


    self.wineriesArray = dbDAO.selectWineriesList()


    //other pickerView code like dataSource and delegate


    self.view.addSubview(wineriesPickerView)


    }


    Add the Rating UISlider Functionality


    The wineRating function manages the interaction with the UISlider . The sender
    argument returns the float value based on the user’s selection, and then this
    value is converted to an Int32 and assigned to the wine. rating property:


    @IBAction func wineRatingSlider(_ sender: AnyObject) {


    let ratingValue:float_t = sender.value


    wine.rating = Int32(ratingValue)


    }


    The SecondViewController


    The second view controller manages the entry of the wine producers. A user will
    need to add wineries before wines when the app is running. It is much simpler
    than the first view controller, as we have to deal with just five UITextFields
    that we defined with the UI. We call the insertWineryRecord method of the dbDAO
    class from the insertWineryBtn IBAction function, passing the values from the
    UITextFields . We create the winery instance and assign the values before passing
    the object as the only argument for the


    CHAPTER 5 ■ INSERTING RECORDS


    insertwineryRecord method. We could have simply passed the values for the UITextFields
    directly, but I will need to share those values later.


    @IBOutlet weak var wineryNameField: UITextField!


    @IBOutlet weak var countryNameField: UITextField!


    @IBOutlet weak var regionNameField: UITextField!


    @IBOutlet weak var enterVolume: UITextField!


    @IBOutlet weak var enterUoM: UITextField!


    var dbDAO:WineryDAO = WineryDAO()


    var winery:Wineries = Wineries()


    @IBAction func insertWineryBtn(_ sender: AnyObject) {


    winery.name = wineryNameField.text!


    winery.country = countryNameField.text!


    winery.region = regionNameField.text!


    winery.volume = Double(enterVolume.text!)!


    winery.uom = enterUoM.text!


    dbDAO.insertWineryRecord(winery)


    }


    ...


