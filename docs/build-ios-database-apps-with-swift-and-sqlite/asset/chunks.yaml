    \ `showWineryDetail`。\n\n转场创建完成后，我们打开 `SecondViewController`，并取消代码末尾附近 `prepareForSegue`\
    \ 函数的注释。\n\n和之前一样，我们需要创建一个常量，为其赋值 `segue.destinationViewController`，然后将其转型为 `SecondViewController`。这将使我们能够访问\
    \ `SecondViewController` 中的 `IBOutlets`。接下来，我们需要为 Winery 列表 `TableViewController`\
    \ 中的单元格定义一个常量，以便访问其中定义的 `IBOutlets`。然后，在转场将 `SecondViewController`（已填充相应字段）推入堆栈之前，只需将表格中选中行的值赋给\
    \ `wineryController` 对象中的输出口即可。\n\n请注意稍后描述的 `isEdit` 属性，我们将其添加到 `SecondViewController`\
    \ 中，用以指示需要运行 `WineryUpdate` 函数，而不是 `insertWineryRecord` 函数。\n\n```\noverride func\
    \ prepare(_ for segue: UIStoryboardSegue, sender: AnyObject?) {\n    // 使用 segue.destinationViewController\
    \ 获取新的视图控制器。\n    // 将选中的对象传递给新的视图控制器。\n    if(segue.identifier == \"showWineryDetail\"\
    ){\n        let wineryController = segue.destinationViewController as! SecondViewController\n\
    \        if let wineryCell = sender as? WineryCellTableViewCell {\n          \
    \  let indexPath = tableView.indexPath(for: wineryCell)!\n            let selectedWinery\
    \ = wineryListArray[(indexPath as NSIndexPath).row]\n            wineryController.winery\
    \ = selectedWinery\n            wineryController.isEdit = 1\n        }\n    }\n\
    }\n```\n\n与之前关于保存更改的讨论一样，我们修改了 `SecondViewController`，添加了 `isEdit` 属性并将其初始值设置为\
    \ `-1`。当然，实际上我们可以将此值设置为任何值。另外，我们本可以使用 unwind Segue 功能，但这小段代码更适合我们的目的。此外，我们保留了之前的连接名\
    \ `insertWineryBtn`，而没有将其重命名为诸如 `saveWinery` 之类的名称，只是为了说明将记录保存到 SQLite 数据库的一种可能功能。\n\
    \n```\nvar isEdit:Int = -1\n\n@IBAction func insertWineryBtn(_ sender: AnyObject)\
    \ {\n    winery.name = wineryNameField.text!\n    winery.country = countryNameField.text!\n\
    \    winery.region = regionNameField.text!\n    winery.volume = Double(enterVolume.text!)!\n\
    \    winery.uom = enterUoM.text!\n    if(winery.isEdit==1){\n        dbDAO.wineryUpdate(winery)\n\
    \    }else{\n        dbDAO.insertWineryRecord(winery)\n    }\n    isEdit = -1\n\
    }\n```\n\n控制器就绪后，接下来只需运行应用以检查一切是否正常，必要时进行调试。\n\n## 运行应用\n\n在本示例中，我们将从数据库中获取一条葡萄酒记录和一条酒庄记录，更新这些记录，然后将其保存回数据库。\n\
