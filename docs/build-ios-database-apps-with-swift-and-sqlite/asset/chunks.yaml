    # 损坏 SQLite 数据库


    SQLite 是一种极其稳定的技术，非常健壮，但如果不小心，仍然可能导致数据库文件损坏。


    例如，如果在连接打开时移动数据库，则存在损坏数据库的风险。由于 SQLite 文件是标准的二进制文件，无法阻止恶意线程或进程对其进行干扰。在应用所在的 iOS
