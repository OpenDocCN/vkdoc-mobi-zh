  trans: '

    # Swift 应用项目结构


    Swift 应用的项目结构与 Xcode 中 Objective-C 项目的结构完全相同。就个人偏好而言，我喜欢将应用对象按逻辑分组进行组织。因此，我们将创建`"views"`、`"models"`、`"controllers"`这组目录，以及`"libs"`、`"bridge"`和`"utils"`等目录。前三组用于归类与
    MVC 设计模式相关的文件。后两组将用于存放 SQLite 3 库以及一些不适用于其他分组的辅助类，这些类将用于我们的应用。


    要向项目添加文件，请右键点击组标题，使用上下文菜单选择`Add New File`命令，该命令将插入我们将在该标题下创建的新文件。你也可以通过 Xcode
    的菜单添加新文件，并在弹出的对话框中为文件命名，同时选择希望文件创建所在的组。


    ## 添加 SQLite 3 库


    像平常一样，通过`Linked Libraries and Frameworks`将 SQLite 3 库添加到项目中。在导航器中选择项目根节点，滚动到主窗口`Project
    Properties`页面的`General`选项卡中的`Linked Libraries and Frameworks`处。


    **第 1 章 ■ 创建 Objective-C 包装器**


    图 1-3 展示了用于向 Xcode 项目添加库的`Search`对话框示例。点击`"+"`符号打开`Search`窗口，输入`"Sqlite3"`。你会得到两个结果：其中一个选择是库本身，另一个是库的链接。选择`libsqlite3.tbd`文件，点击`Add`按钮将库添加到项目中。


    ![图 1-3：将 SQLite 库添加到项目](img/image17.jpg)


    在项目浏览器（导航器）中，将 SQLite3 库拖拽到`"libs"`组中。在接下来的章节中，我将向你展示如何创建桥接文件并配置 Swift 编译器。


    **第 1 章 ■ 创建 Objective-C 包装器**


    ## 创建桥接文件


    桥接文件是一个接口文件，用于配置对 C、C++ 或 Objective-C 库的访问，并配置 Swift 编译器在编译代码时查找并使用这些库。由于 SQLite
    库是用 C 语言编写的，我们需要一个桥接文件才能从 Swift 中访问 C 的 API。


    ### 创建桥接头文件


    从 Xcode 的`File`菜单中，选择`File > New File`。在模板选择页面，选择`Header File`模板，点击`Next`按钮进入下一页，我们可以在该页面为文件命名（图
    1-4）。


    ![图 1-4：选择 C 头文件模板](img/image18.jpg)


    在这个例子中，我将把它命名为`SQLite3Bridge.h`，但你可以自由命名；Xcode 会自动在文件名后添加头文件扩展名（`.h`）。如果你之前已经按照指示创建了项目分组，请选择`"bridge"`组，然后点击`Create`按钮创建文件并将其添加到项目中（图
    1-5）。一旦头文件被添加到项目，它就会在 Xcode 编辑器中打开。


    **第 1 章 ■ 创建 Objective-C 包装器**


    ![图 1-5：选择组和文件位置](img/image19.jpg)


    在接下来的 C 头文件代码中，你会注意到模板已经添加了一些指令和常量供我们定义头文件。为了创建 SQLite3 桥接文件，我将添加一个`import`语句以及
    SQLite3 头文件名来引用 SQLite3 库，如代码片段所示。保存文件。


    ```

    //

    // SQlite3Bridge.h

    // Db Mgr

    //

    // Created by Kevin Languedoc on 2016-05-20.

    // Copyright © 2016 Kevin Languedoc. All rights reserved. //

    #ifndef SQlite3Bridge_h

    #define SQlite3Bridge_h


    #endif /* SQlite3Bridge_h */


    // 添加此代码以导入 sqlite3 头文件。上面的代码由模板提供。

    #import <sqlite3.h>

    ```


    **第 1 章 ■ 创建 Objective-C 包装器**


    ## 配置 Swift 编译器


    下一步是让 Swift 编译器知道桥接文件的位置。这就是创建桥接文件所需的全部工作了。

    '
