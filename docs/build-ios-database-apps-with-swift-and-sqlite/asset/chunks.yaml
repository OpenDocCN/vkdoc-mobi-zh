  trans: "\n# 添加更新函数\n\n我将为葡萄酒添加`wineUpdate`函数，为酒庄添加`wineryUpdate`函数。两者设计相同，都会更新表中的所有列，无论该值是否基于`WHERE`子句发生变化。\n\
    \n## 添加`wineUpdate`函数\n\n`wineUpdate`函数用于更新 SQLite 数据库中的葡萄酒记录。该函数将`wine`对象作为输入参数。定义好`SQL\
    \ UPDATE`字符串后，我照常使用`sqlite3_open`函数打开 SQLite 数据库。接着，使用`sqlite3_prepare_v2`函数设置查询，该函数接收\
    \ SQLite 数据库指针、`sqlite_statement`指针和 SQL 查询字符串作为输入参数。如果查询字符串正确，函数将返回`SQLITE_OK`状态。\n\
    \n接下来，你需要使用`sqlite3_bind_text`（针对字符串）、`sqlite3_bind_int`（针对整数）和`sqlite3_bind_blob`（针对图像）将葡萄酒属性绑定到输入列和`WHERE`子句。\n\
    \n最后，使用`sqlite3_step`函数执行查询，然后用`sqlite3_finalize`进行清理，并使用`sqlite3_close`关闭数据库。请参考以下代码。\n\
    \n> **注意：** 如果你不想替换所有值，可以使用三元运算符根据可用值构建查询字符串和绑定值。此外，这段代码没有任何错误处理。\n\n```\nfunc\
    \ WineUpdate(_ wine:Wine){\n\n    let sql:String = \"UPDATE main.Wine \" +\n \
    \       \"SET name = ?,\" +\n        \"rating = ?, \" +\n        \"image = ?,\
    \ \" +\n        \"producer = ? \" +\n        \"WHERE id = ?\"\n\n    if(sqlite3_open(dbPath.path!,\
    \ &db)==SQLITE_OK){\n        if(sqlite3_prepare_v2(db, sql, -1, &sqlStatement,\
    \ nil)==SQLITE_OK){\n            sqlite3_bind_text(sqlStatement, 0, wine.name.cString(using:\
    \ String.Encoding.utf8), -1, SQLITE_TRANSIENT)\n            sqlite3_bind_int(sqlStatement,\
    \ 1, wine.rating)\n            sqlite3_bind_blob(sqlStatement, 2, wine.image.bytes,\
    \ Int32(wine.image.count), SQLITE_TRANSIENT)\n            sqlite3_bind_text(sqlStatement,\
    \ 4, wine.producer.cString(using: String.Encoding.utf8), -1, SQLITE_TRANSIENT)\n\
    \            sqlite3_bind_int(sqlStatement, 5, wine.id)\n            sqlite3_step(sqlStatement)\n\
    \        }\n    }\n    sqlite3_close(db)\n}\n```\n\n## 添加`wineryUpdate`函数\n\n\
    `wineryUpdate`函数完全遵循与上一个函数相同的模式。除了 SQL 查询字符串中针对的列和表不同，以及绑定值的数量不同外，其功能与上一个函数完全相同：\n\
    \n```\nfunc WineryUpdate(_ winery:Wineries)->Int32{\n\n    let sql:String = \"\
    UPDATE winery SET country = '\\(winery.country)', region = '\\(winery.region)',\
    \ volume = \\(winery.volume), uom = '\\(winery.uom)' WHERE name = '\\(winery.name)'\
    \ ;\"\n\n    var status_code:Int32 = 0\n\n    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){\n\
    \        status_code = sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil)\n \
    \       if(status_code==0){\n            status_code = sqlite3_step(sqlStatement)\n\
    \            status_code = sqlite3_finalize(sqlStatement)\n        }\n    }\n\
    \    sqlite3_close(db)\n    return status_code\n}\n```\n\n## 修改 UI 以支持更新功能\n\n\
    为了启用添加到`wineryDAO`类的更新功能，需要对 UI 以及相应的`FirstViewController`和`SecondViewController`进行一些修改。\n\
    \n当用户从葡萄酒列表或酒庄列表中选择一个项目时，数据将显示在相应的场景中，以便可以更改信息。当点击“保存”按钮时，将调用更新函数而不是插入函数。\n\n\
    ### 设置`showWineDetail`转场\n\n图 7-1 展示了新转场的布局，该转场连接“酒窖”场景（即存储数据库中葡萄酒列表的`TableViewController`）和“录入葡萄酒”场景（即应用启动时的初始视图控制器）。\n\
    \n![](img/image93.jpg)\n\n**图 7-1.** 添加`showWineDetail`转场\n\n要设置该转场，请按照以下步骤操作：\n\
