    }\n\nfunc setupSampleTable() {\n    let creatSQL: String = \"CREATE TABLE IF NOT\
    \ EXISTS sample(id int, name varchar)\"\n    if(sqlite3_open(dbPath.path!, &db)\
    \ == SQLITE_OK) {\n        if(sqlite3_prepare_v2(db, creatSQL, -1, &sqlStatement,\
    \ nil) == SQLITE_OK) {\n            if(sqlite3_step(sqlStatement) == SQLITE_DONE)\
    \ {\n                print(\"table created\")\n                sqlite3_finalize(sqlStatement)\n\
    \                sqlite3_close(db)\n            } else {\n                print(\"\
    unable to create table\")\n            }\n        }\n    }\n}\n\nfunc addRecords()\
    \ {\n    let insertSQL: String = \"INSERT INTO TABLE main.sample (id, name) VALUES(?,?)\"\
    \n    if(sqlite3_open(dbPath.path!, &db) == SQLITE_OK) {\n        if(sqlite3_prepare_v2(db,\
