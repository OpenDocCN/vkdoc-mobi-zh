    \ contentsOfURL`从文件中读取字节。`sqlite3_bind_blob`除了需要`sqlite3_statement`指针、列位置和`SQLITE_TRANSIENT`指针外，还需要文件的字节内容以及字节缓冲区的长度。\n\
    \n**创建 Winery 应用**\n\nWinery iPhone 应用将允许用户输入他们最喜欢的葡萄酒信息，并拍摄酒标或酒瓶的照片。这些信息将存储在\
    \ SQLite 数据库中。在后续章节中，我们将扩展该应用，以包含其他 CRUD（创建或插入、读取或选择、更新和删除）操作。\n\n在本章中，我将创建初始应用，并添加葡萄酒信息和酒庄信息的插入功能。该应用将基于“选项卡式应用”模板。\n\
    \n**创建项目**\n\n在 Xcode 中，创建一个新项目，并在 iOS 应用程序类别下选择“选项卡式应用”模板。\n\n> **注意**：如果你不熟悉\
    \ Xcode，可以在没有项目打开时从启动器创建项目，或者通过“文件”菜单 ➤ “新建” ➤ “项目”来创建。\n"
- fmt: '# Add the Bridge


    As always, the first step after creating the project is to create an Objective-C
    bridge. You could create a bridge individually for each project, or you can create
    a shared resource copy it to the work project. You can also use CocoaPods (CocoaPods.org)
    to install the `sqlite3` library and the bridge in your new project. You could
    also use a project from the CocoaPods repository.


    ## Chapter 5: Inserting Records


    Within the scope of this project, I will simply add the `sqlite3` library to my
    project and manually create a bridge file.


    To add the sqlite3 iOS-supported library, follow these steps:


    1.  From the **General Settings** tab, locate the **Linked Framework and Libraries**
    section.

    2.  Click the “+” button and enter `sqlite3` in the **Search** field.

    3.  Select the `libsqlite3.tbd` library.

    4.  Click **Add** to add the library to your project.

    5.  Next, add a new Objective-C header file using the **Header File** template.

    6.  Add an `#import <sqlite3.h>` statement.

    7.  Under **Build Settings**, search for `Swift`.

    8.  Under the **Objective-C Bridge Header** entry, add the name of the bridge
    file preceded by the project folder name, unless you place the file in the root
    directory of the project (Figure 5-1).


    ![](media/image58.jpg) ![](media/image57.jpg)

    **Figure 5-1.** Bridge file Location


    Alternatively, if there is no bridge file in your project, do the following:


    1.  Select the **Objective-C File** template under the **iOS Source** category
    (Figure 5-2).


    ![](media/image61.jpg)

    **Figure 5-2.** Objective-C File template


    2.  Provide a name, such as `SQLiteBridge` (Figure 5-3).


    ![](media/image60.jpg)

    **Figure 5-3.** Name and file type


    3.  Select the **Extension** file type and `NSObject` as the class.

    4.  Once you click **Next** and **Add**, Xcode will ask you to create a bridge
    file (Figure 5-4).


    ![](media/image59.jpg)

    **Figure 5-4.** Create Bridge popup


    5.  When you click on the **Create Bridging Header** button, Xcode will generate
    the header file and add the reference to the **Build Settings** for you (Figure
    5-5). You can discard the `NSObject_SQLiteBridge.h` file, as it is not needed.
    The actual bridge file is `TheWinery-Bridging-Header.h`, and it is this file that
    is included in the **Swift Compiler** settings for the Objective-C header mapping.


    ![](media/image62.jpg)

    **Figure 5-5.** Xcode-created bridge header


    ## Creating the UI View for Inserting


    Before getting into the data model and controllers, I will build the UI and add
    the `IBOutlet`s and `IBAction`s to the `FirstViewController` and `SecondViewController`.


    Without adding any other code, you can run the app as is and test Swift between
    the first and second scenes. Xcode provides a lot of boilerplate code through
    the template for us.


    Figure 5-6 provides a view of the layout of the view controllers and navigation
    controller along with the components that we will add next.


    ![](media/image65.jpg)

    **Figure 5-6.** Winery UI in Xcode IB


    The first view controller will include the following UI components:


    - `UIImageView imageView IBOutlet`

    - `UITextField wineNameField IBOutlet`

    - `UITextField countryNameField IBOutlet`

    - `UISlider wineRating IBAction`

    - `UITextField selectWineryField IBOutlet`

    - `UIButton InsertRecordAction IBAction`

    - `UIButton selectPhoto IBAction`

    - `UIButton selectWinery IBAction`

    - `UILabel Enter Wine Name`

    - `UILabel Enter Country`

    - `UILabel Select Winery`


    To get started, select the `FirstViewController`, and from the **Component Pallet**
    on the lower right side of Xcode, select the `ImageViewer` (`UIImageView`) and
    drop it on the IB canvas. Next, select and open the **Constraints** tool in the
    bottom right of the IB window and click on the top and left beams; select both
    the width and height constraints (Figure 5-7). Click on the **Add 4 Components**
    button to set the constraints.


    ![](media/image68.jpg)

    **Figure 5-7.** Constraints in IB for ImageViewer'
