    as an example of how to use an NSString to build a SELECT query and pass it to
    the sqlite3_stmt function to be executed by the database engine.


    The SELECT statement SQL query is passed to the sqlite3_prepare_v2 function before
    it can be executed by the database engine. To access the result set, you will
    need to use the sqlite3_step function along with the SQLITE_ROW constant to loop
    through the results; as long as there are records in the result set SQLITE_ROW
    remains true.


    Once the result set is exhausted, sqlite3_finalize is called to clean up the prepared
    statement, and sqlite3_close closes the database. String data is stored in the
    database using UTF-8 encoding, so when you need to assign a string value to a
