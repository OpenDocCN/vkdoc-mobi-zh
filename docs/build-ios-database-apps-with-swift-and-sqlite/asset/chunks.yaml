  trans: "\n接下来，右键点击 `DbSearch` 组，然后选择“添加文件到…”上下文菜单项。浏览到 `dbsearch.sqlite` 文件保存的位置，选中该数据库文件，点击\
    \ **添加** 开始将数据库复制到项目中。会出现第二个弹窗，你需要从中选择第一个选项：“将项目复制到目标组的文件夹中（如果需要）”，以实际复制到项目。这一点很重要，否则只会添加一个引用。\n\
    \n现在项目已经设置完成，我们可以构建故事板和控制器逻辑了。\n\n## 设置桥接\n\n库文件就位后，我们必须设置 Objective-C 桥接。通过从可用模板中选择\
    \ **iOS 源** 类别中的 **Cocoa Touch 类** 模板（图 9-7），向项目中添加一个新文件，然后执行以下操作：\n\n- 将桥接命名为\
    \ `SQLiteSearchBridge`\n- 选择文件类型的类别，这将触发 **添加桥接接口**\n- 选择 `NSObject` 类\n\n![](img/image161.jpg)\n\
    \n**图 9-7.** 创建 `SQLiteSearchBridge`\n\n图 9-8 显示了将文件添加到项目后出现的 **创建桥接接口**。当我们使用此方法创建桥接时，Xcode\
    \ 将创建桥接文件，并将该文件添加到 Swift 编译器的构建设置中。你可以丢弃同时创建的 Objective-C 头文件和实现文件。在这个项目中，这些文件是\
    \ `NSObject+SQLiteSearchBridge.h` 和 `NSObject+SQLiteSearchBridge.m`。我们只需要 `SQLiteSearch-Bridging-Header.h`\
    \ 文件。你需要打开这个文件，并添加 `#import <sqlite3.h>` 指令，以便与 SQLite3 API 交互。\n\n![](img/image160.jpg)\n\
    \n**图 9-8.** 在 Xcode 中设置桥接\n\n## 控制器代码\n\n在开始处理界面并添加控件和 `IBOutlet` 之前，我们需要向 `ViewController`\
    \ 添加代码，以处理搜索操作并与 `UISearchBar`、`UITableView` 和 `UITableViewCell` 交互。\n\n打开 `ViewController`，并在类定义的旁边添加\
    \ `UISearchBarDelegate`、`UITableViewDelegate` 和 `UITableViewDataSource`（参见下面的代码）。我们还需要在应用加载时设置代理，因此需要在\
    \ `viewDidLoad` 函数中将代理分配给 `self`。\n\n```swift\nimport UIKit\n\nclass ViewController:\
    \ UIViewController, UISearchBarDelegate, UITableViewDelegate, UITableViewDataSource\
    \ {\n\n    // 为清晰起见，省略了部分代码\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        searchResults.dataSource = self\n        searchResults.delegate = self\n\
    \        searchField.delegate = self\n    }\n}\n```\n\n将使用一个数组变量来存储 `UITableView`\
    \ 的数据，因此还需要其数据源。在这个项目中，数组 `nameList` 是 `String` 数据类型。如果你想操作 `UITableView` 中的数据，你需要与数据源交互。换句话说，就是与数组交互。此外，我们需要创建一个名为\
    \ `SQLITE_TRANSIENT` 的 `UnsafeMutablePointer`。这是一个析构器指针，稍后会用于 `searchDatabase`\
    \ 函数中的 `sqlite3_bind_text`。\n\n```swift\nvar nameList = [String]()\ninternal let\
    \ SQLITE_TRANSIENT = unsafeBitCast(-1, sqlite3_destructor_type.self)\n```\n\n\
    对于 `UITableViewDelegate` 和 `UITableViewDataSource` 协议，以及 `UITableView` 本身，我们需要添加一些必需的函数。下面将介绍这些函数。\n\
    \n### `numberOfSectionsInTableView` 函数\n\n为了显示返回的结果，我们需要设置 `UITableView` 的代理和数据源。`numberOfSectionsInTableView`\
    \ 告诉表格将包含多少个分区。分区是行的分组。我们将其设置为 `1`：\n\n```swift\nfunc numberOfSectionsInTableView(tableView:\
    \ UITableView) -> Int {\n    return 1\n}\n```\n\n### `tableView:numberOfRowsInSection`\
    \ 函数\n\n`numberOfRowsInSection` 告诉表格要显示多少行。通常，它表示数组或数据源中的元素数量：\n\n```swift\nfunc\
    \ tableView(tableView: UITableView,\n    numberOfRowsInSection section: Int) ->\
    \ Int {\n    return nameList.count\n}\n```\n"
- fmt: "# Searching for Records in SQLite\n\n## The `tableView:cellForRowAtIndexPath:indexPath`\
    \ Function\n\nThis method configures the `UITableCell` by getting a handle on\
    \ the cell prototype in the `UITableView` and assigning the value at `indexPath`\
    \ of the array to the label property of the cell. This method will be called repeatedly\
    \ for each row that was defined in the `numberOfRowsInSection` function or the\
    \ number of objects in the array.\n\nThe cell identifier, `searchResultCell`,\
    \ will be configured later in the UI. Also, `famousName` is the `UILabel` IBOutlet\
    \ that we will add later in the `UITableViewCell`. With the `cell` variable set\
    \ up and cast as a `searchResultCellTableViewCell` `UITableViewCell` type, the\
    \ other variable, `nameObject`, is assigned the value from the current array index.\
    \ This value is then assigned to `call.famousName.text`:\n\n```swift\nfunc tableView(tableView:\
    \ UITableView,\n    cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell{\n\
    \n    let cell = tableView.dequeueReusableCellWithIdentifier(\"searchResultCell\"\
    , forIndexPath: indexPath) as! searchResultCellTableViewCell\n\n    // Configure\
    \ the cell...\n    let nameObj = nameList[indexPath.row]\n    cell.famousName.text\
    \ = nameObj\n\n    return cell\n}\n```\n\nSo, for the `UISearchBar` delegate,\
    \ `UISearchBarDelegate`, which requires the implementation of the `searchBarCancelButtonClicked`\
    \ and `searchBarSearchButtonClicked` methods, the interactivity will respond to\
    \ the buttons in the `UISearchBar`. For the `UITableView`, the `UITableViewDelegate`\
    \ and `UITableViewDataSource` protocols. The function definitions are provided\
    \ next.\n\n## The `searchBarCancelButtonClicked` Function\n\nThe `searchBarCancelButtonClicked`\
    \ method will reset not only the `UISearchBar` field but also its data source\
    \ and `UITableView`, and will also dismiss the keyboard. The complete code is\
    \ provided here:\n\n```swift\nfunc searchBarCancelButtonClicked(searchBar: UISearchBar){\n\
    \    self.searchField.text=\"\"\n    searchResults.reloadData()\n    searchField.resignFirstResponder()\n\
    \    self.view.endEditing(true)\n}\n```\n\n## The `searchBarSearchButtonClicked`\
    \ Function\n\nThe `searchBarSearchButtonClicked` method is similar in design to\
    \ `searchBarCancelButtonClicked` except that it calls the `searchDatabase` method.\
    \ Then, the code resets the Search field, reloads the data in the `UITableView`,\
    \ and resigns the keyboard:\n\n```swift\nfunc searchBarSearchButtonClicked(searchBar:\
    \ UISearchBar){\n    self.searchDatabase(searchField.text!)\n    self.searchField.text=\"\
    \"\n    searchResults.reloadData()\n    searchField.resignFirstResponder()\n \
    \   self.view.endEditing(true)\n}\n```\n\n## The `searchDatabase` Function\n\n\
    The other addition is a method to interface with the database: `searchDatabase`.\
    \ This method will take one argument for the search term. Technically, you should\
    \ be able to pass multiple search terms, which would be split into an array, but\
    \ for simplicity's sake I am assuming a single-term search term.\n\nThe first\
    \ variable, `fileExist`, is a `Boolean`. It will allow us to ensure that the `dbSearch.sqlite`\
    \ file is available in the main application bundle. The `db` variable is a `COpaquePointer`\
    \ for the SQLite database. Likewise, the `sqlStatement` variable is a `COpaquePointer`\
    \ for the `sqlite3_stmt` statement.\n\nIn order to open the database, we need\
    \ to get the path to the file in the main application bundle. We are leaving it\
    \ there because we don't need to write to it and the main bundle is read-only\
    \ during runtime. The `projectBundle` gets a handle to the `mainBundle` through\
    \ the `NSBundle` class. Then the `fileMgr` constant is created as an `NSFileManager`.\
    \ This class handles interactivity with the file system. The `resourcePath` `String`\
    \ constant will be assigned the fully qualified path to the database using `pathForResource`.\n\
    \nOnce these constants and variables are defined and assigned their initial values,\
    \ we check to make sure the database file is available using `fileExistsAtPath`,\
    \ which returns a `Boolean` value. If the database file exists, the database is\
    \ opened using the `sqlite3_open` function. `SQLITE_OK` is returned if the database\
    \ is successfully opened or will print an error message to the console if not."
