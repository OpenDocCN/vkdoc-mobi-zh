- fmt: '# 排版后内容


    Did you know that SQLite was once the basis for the Web DB specification in an
    early version of W3C’s HTML5 specification before being dropped from the final
    release candidate in 2010? The technology is in widespread use across most computing
    platforms, including mobile and embedded systems. Apple uses SQLite on both OSX
    and iOS for various applications. For data-driven iOS applications, SQLite is
    the logical choice. There are other choices, like InterBase or BerkeleyDB, if
    you want to use a relational database, or you can go the NoSQL route and choose
    Couchbase or Realm, among others. However, SQLite offers a solid footing and strong
    industry support, which I find is essential if you are planning a production-grade
    data-driven iOS app.


    With the introduction of Swift, Apple has provided millions of iOS developers
    with a modern, well-designed programming language in tune with Python, Ruby, Scala,
    Groovy, and many others. The language is fun to work with. It is also much less
    verbose than Objective-C, and I have had the opportunity to work on an iOS project
    with this language and found Swift to be a great, lightweight language to work
    with.


    Since the first edition of this book was completely written in Objective-C, with
    one chapter on a beta version of Swift 1, I felt it was time to re-write the book
    using Swift 3 and iOS 10. I wanted to explore the opportunity this new language
    offers to build data-driven apps using SQLite as a backend. I also wanted to show
    you how easy it is to create bridges in Swift to interface with SQLite’s C API—or
    any C/C++ API, for that matter—to harness many of the mature libraries that have
    been developed and have stood the test of time, as well as new ones, through Swift.


    In keeping with the original design of the first edition, *Build iOS Database
    Apps using Swift and SQLite* walks you through the steps of creating a bridge,
    developing SQLite databases, and performing the standard CRUD operations that
    characterize a database’s core functionality of storing and retrieving data. I
    also wanted to explore extending SQLite with custom functions and attaching them
    using Swift, and to look at the multi-database and backup APIs.


    The code for the apps in the book was written in Swift 3. I hope you find the
    book useful and practical.


    ![](media/image14.jpg)


    Creating a wrapper for a C library is a very easy task with Swift, as the language
    was designed for interoperability with Objective-C and C, as well as for C++ language.
    Although this chapter focuses on using the SQLite C API with Swift, you could
    easily do the reverse and call Swift from these languages. This chapter shows
    how to create an Objective-C wrapper around the SQLite C API, which can then be
    interfaced through Swift. This method can be replicated with other C libraries.


    In this chapter, I’m going to show you how to do the following:


    - Create a Swift project

    - Add the SQLite 3 C API library to the project

    - Create a bridge header file to interface with the C API

    - Configure the Swift compiler

    - Create a DAO class to handle the execution for queries


    ## Getting Started


    Before getting to the bridge, I think it is important to mention the tools that
    are needed for this book and also for iOS application development in general.
    All the iOS code for this book is produced through Xcode 8.0 at the time of this
    writing. I am also using Swift 3.


    If you are planning on developing Swift iOS apps for this book or in a production
    environment, your only choice is Xcode on OSX. Some will argue that Swift can
    compile and run on Linux also. While this is true, Xcode cannot, and you need
    Xcode to develop iOS, TVos and OSX apps. You will also need an Apple Developer
    account. For the development in this book, you can get by with the free edition,
    but to provision and deploy you will need an Apple Developer license, which you
    can get though the Apple Developer website.


    I will also use SQLite Manager in Firefox to create SQLite databases in chapters
    2, 5, and 10; otherwise, all development, including creating SQLite databases,
    will be done in Xcode.


    Xcode can be installed for free through the OSX App Store, which is accessible
    uniquely on a MAC OSX. While you can purchase a copy of OSX through an Apple store,
    and it can be installed on a virtual machine, the OSX App Store will only work
    on a real OSX machine.


    Installing Xcode is very easy. Once you select it in the App Store, it is installed
    automatically on your OSX machine. When you install Xcode, the SDK (for Swift/Objective-C)
    is also installed. You can install more tools through Xcode. Under the Xcode menu,
    select Preferences and then Components.


    ## Chapter 1: Creating the Objective-C Wrapper


    The SQLite library is already included in the iOS SDK, and this is the version
    that I will be using throughout this book. You can download and install SQLite
    from the SQLite site, which has extra APIs such as the JSON extension, but this
    is out of the scope of this book. You can also download and use Swift SQLite frameworks
    that have been created as wrappers over the SQLite C API. However, I won’t be
    using them in this book, as I find the C API very easy to work with on its own.


    Other than Xcode and an Apple OSX computer, you only need Firefox SQLite Manager,
    which can be downloaded and installed from Mozilla. The SQLite Manager is installed
    from the Addon marketplace in Firefox.


    Let’s get started.


    ### Creating the Swift iOS Project


    To work with SQLite 3 in iOS Swift applications, you need a bridge header file
    to interface with the SQLite C API. In fact, this interface is applicable to all
    interfaces between Swift and Objective-C, C, or C++.


    Open Xcode and create a new project from the launchpad. For this project, we are
    building a SQLite Database Manager app that will allow a developer to connect
    to a SQLite database. The app will also provide functionality to add or modify
    tables, views, indexes, and triggers. Finally, one will also be able to insert,
    update, and select data from the database.


    To build this app, select the Master-Detail iOS template from the list of templates
    under the iOS Application heading. Name the iPad app `SQLite Mgr` and create it.
    Figure 1-1 shows an example of the Master-Detail template under the iOS Application
    heading. After selecting the template, move to the next page to fill in the app
    details. This template provides a great classic layout for building iPad apps
    and takes advantage of the extra screen real estate. The template has a view on
    the left-hand side that acts as an index by default, although you could replace
    the `UITableView` with another view. The view on the right-hand side provides
    an expansive window to display input forms or other app details, including web
    pages and tables or other view controllers.


    ![](media/image15.jpg)


    **Figure 1-1.** Master-Detail iOS Application template


    For this reference app, we will use some of the default design elements that are
    included with the template, namely the `UITableView` in the `MasterViewController`.
    For the `DetailViewController`, we will develop a new UI layout.


    Figure 1-2 illustrates the information needed to name and set up the basic app
    structure. The Organization Name is used throughout the project and documentation,
    such as for the copyright notice. The Organization Identifier is used to create
    part of the Bundle ID for the App Store and to identify the app in iTunes Connect,
    for instance.


    ![](media/image16.jpg)


    **Figure 1-2.** Enter the app name and other required information


    ### Create the Db Mgr Project Structure'
