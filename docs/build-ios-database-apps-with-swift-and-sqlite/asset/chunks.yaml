    这段代码将在每次应用启动时运行，并检查文件是否位于 Documents 目录中。如果文件不存在，则将其复制过去。理想情况下，代码应检查包中的文件是否比 Documents
    目录中的版本更新，并相应地进行更新。


    有多种方式处理此问题，例如在 UI 中添加一个按钮，该按钮提供选择文件并将其复制到 Documents 目录的语法。或者，你也可以在应用启动后加载的主 `ViewController`
    的 `viewDidLoad` 方法中使用同样的代码。


    ## 第 2 章：创建 SQLite 数据库


    ### 总结


    本章关于创建 SQLite 数据库并将其添加到 iOS 项目的内容到此结束。下一章将重点介绍在运行时创建 SQLite 数据库。我将继续为 `DbMgr`
    iPad 应用添加功能。


    ![](img/image45.jpg)


    SQLite 的一大特色是能够在应用运行时创建数据库。你可以根据需要快速添加或修改数据库。


    在接下来的章节中，我将添加一个数据模型、一个用于执行各种数据库命令和显示数据库架构的 UI，以及处理这些操作的视图控制器。该应用将能够创建数据库，并添加表、列、索引、视图和触发器。


    ## 构建 DB Mgr 应用


    我将继续使用上一章中的同一个 iPad 项目进行构建，以便在应用加载到内存后能够提供创建数据库所需的功能。这个应用可能不会赢得任何设计奖项，但它能起到巩固
    SQLite 中关于如何构建数据库的一些关键特性的作用。


    从宏观层面来看，该应用的设计思路是使用 `detailViewController` 作为主界面。`MasterViewController` 将保留并显示应用中的数据库及其架构元素。`DetailViewController`
    将包含用于创建和打开数据库，以及创建表、视图、索引和触发器的按钮。`ViewController` 还将提供执行查询的操作。


    一个数据访问类将负责处理数据模型（包括 SQLite 数据库和自定义类型）与 `ViewControllers` 之间的通信。


    ## 应用 UI


    在本节中，我将添加 `UIButton` 并将其连接到指定的视图控制器。然后，我将添加 `detailSQLiteQueryField`。


    ### 添加按钮


    使用 Interface Builder（简称 IB）添加按钮并将其连接到指定的视图控制器是一项简单的任务。要添加按钮，请打开应用中的主故事板文件（`Main.storyboard`）并定位到细节场景。


    从右下角的组件面板中，拖放 `UIButton`，并沿顶部对齐。图 3-1 显示了带有按钮和 `detailSQLiteQueryField` 的应用。这些按钮使用了
    `.gif` 图片。我已将这些图片全部添加到项目的 Assets 组下。如果你需要添加或更改某些图片，可以通过使用“添加文件”上下文菜单或 Xcode 中的“文件”菜单来完成。


    © Kevin Languedoc 2016 [25]


    K. Languedoc, *使用 Swift 和 SQLite 构建 iOS 数据库应用*, DOI 10.1007/978-1-4842-2232-4_3


    ![](img/image46.jpg)


    **图 3-1.** Db Mgr 用户界面


    要配置按钮的图片，请执行以下操作：

    - 在细节场景中选择该按钮。

    - 在属性检查器中，找到“图片”字段。

    - 使用文件选择器按钮选择一张图片。


    当所有按钮都添加并配置完毕后，我们需要在 `DetailViewController` 中为这些按钮创建 `@IBAction`。要创建连接，请在已打开的
    `Main.storyboard` 文件中打开助理编辑器，然后从 `UIButton` 拖出一个连接至已打开的 `DetailViewController`。释放鼠标按钮时，会出现一个弹出窗口（图
    3-2），通过该窗口你可以执行以下操作：

    - 添加 IBAction 连接名称。

    - 选择连接类型。

