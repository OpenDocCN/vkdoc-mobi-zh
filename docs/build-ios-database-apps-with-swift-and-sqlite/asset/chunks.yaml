- fmt: "```swift\n// Any errors are caught by the `NSError` class. See here:\n\nfunc\
    \ createDatabase(_ database:String){\n    let dirManager = FileManager.default()\n\
    \    do {\n        let directoryURL = try dirManager.urlForDirectory(FileManager.SearchPathDirectory.documentDirectory,\
    \ in: FileManager.SearchPathDomainMask.userDomainMask, appropriateFor: nil, create:\
    \ true)\n        dbPath = try! directoryURL.appendingPathComponent(database)\n\
    \        if(!(sqlite3_open(dbPath.path!, &db) == SQLITE_OK)){\n            print(\"\
    Unable to create database\")\n        } else {\n            print(\"Database:\
    \ \" + database + \" successfully created \")\n            databases.append(database)\n\
    \            sqlite3_close(db);\n        }\n    } catch let err as NSError {\n\
    \        print(\"Error: \\(err.domain)\")\n    }\n}\n```\n\n### The `attachDatabase`\
    \ Function\n\nThis function’s singular purpose is to attach a database to the\
    \ open connection. To keep things simple, minimal error checking is added. `sqlite3_open`\
    \ ensures that the main database is opened and that the `ATTACH` query string\
    \ is passed to the `sqlite3_exec` function. If there are no errors with the query,\
    \ the input values are bound to the query using Swift inline text binding and\
    \ the query is executed. The query memory is released, and the connection is closed\
    \ to complete the operation. See here:\n\n```swift\nfunc attachDatabase(_ dbName:String,\
    \ schemaName:String){\n    var err:UnsafeMutablePointer<Int8>? = nil\n    if(!(sqlite3_open(\
    \ dbPath.path!, &db) == SQLITE_OK)){\n        print(\"An error has occured.\"\
    )\n    } else {\n        let dbstatus = sqlite3_open(dbName, &db)\n        print(dbstatus)\n\
    \        if(sqlite3_open(dbName, &db) == SQLITE_OK){\n            let attachSQL\
    \ = \"ATTACH DATABASE '\\(dbName)' AS '\\(schemaName)'\"\n            let status\
    \ = sqlite3_exec(db, attachSQL, nil, &sqlStatement, &err)\n            if(status\
    \ != SQLITE_OK){\n                print(\"Problem with prepared statement \" +\
    \ String(sqlite3_errcode(db)));\n            }\n            if (status == SQLITE_OK)\
    \ {\n                print(\"Database : \" + dbName + \" attached as \" + schemaName)\n\
    \            }\n        }\n        sqlite3_finalize(sqlStatement);\n        sqlite3_close(db);\n\
    \    }\n}\n```\n\n### The `detachDatabase` Function\n\nThe `detachDatabase` function\
    \ is similar in design to `attachDatabase`. After ensuring that the main database\
    \ is open using the `sqlite3_open` function, the `DETACH` query string is passed\
    \ to the `sqlite3_exec` function along with the pointer for the `sqlite3_statement`\
    \ pointer. The name of the schema is passed to the query using the Swift inline\
    \ text binding method. If the query is successfully executed, the memory is cleaned\
    \ up and the main database connection is closed. See here:\n\n```swift\nfunc detachDatabase(_\
    \ dbName:String, schemaName:String){\n    var err:UnsafeMutablePointer<Int8>?\
    \ = nil\n    if(!(sqlite3_open(dbPath.path!, &db) == SQLITE_OK)){\n        print(\"\
    An error has occured.\")\n    } else {\n        let detachSQL = \"DETACH DATABASE\
    \ '\\(schemaName)' \"\n        var status = sqlite3_exec(db, detachSQL, nil, &sqlStatement,\
    \ &err)\n        status = sqlite3_prepare_v2(db, \"PRAGMA database_list\", -1,\
    \ &sqlStatement, nil)\n        while(sqlite3_step(sqlStatement) == SQLITE_ROW){\n\
    \            print(sqlite3_column_int(sqlStatement, 0))\n            print(sqlite3_column_text(sqlStatement,\
    \ 1))\n        }\n        sqlite3_finalize(sqlStatement);\n        sqlite3_close(db);\n\
    \    }\n}\n```\n\n### The `UIPickerView` Functions\n\nThe `UIPickerView` functions\
    \ include `numberOfComponentsInPickerView`, which configures the number of columns\
    \ in the `UIPickerView`. The `pickerView:numberOfRowsInComponent` specifies how\
    \ many rows will be displayed in the `UIPickerView`. This return value is usually\
    \ the data source’s element count. `titleForRow` displays the actual value in\
    \ the `UIPickerView` for each element in the data source. `widthForComponent`\
    \ and `rowHeightForComponent` are helpers to set the width and height of the cells\
    \ that display the elements in the `UIPickerView`. Finally, `didSelectRow` returns\
    \ the selected value. This is used to select the database to attach. See here:\n\
