    The function signature includes one string data–type parameter for the query.
    That’s it for now. Summary


    This chapter started off by showing you the tools that are needed for iOS app
    development in general and for SQLite specifically. Then, we focused in on creating
    the Objective-C bridge that allows Swift to converse with the SQLite C API. This
    is standard procedure from Apple for Swift development using C/C++ APIs.


    This bridge is the cornerstone for every app we will build and explore in the
