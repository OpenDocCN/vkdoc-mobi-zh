    . Adding the detailSQLiteQueryField


    The detailSQLiteQueryField is a UITextArea component that is also available from
    the Component palette in Xcode. It is used to edit the database structure SQL
    queries and to display the SQL queries that were used to create existing database
    schemas.


    You can also create a SQLite database by entering the name of the database with
    the .sqlite extension and clicking on the Create/Open Database button. Query confirmation
    messages and error messages are also displayed in this field.


    In order to interact with the DetailViewController and the DbMgrDAO controller,
    we will need to add an IBOutlet connection to the controller like we did with
    the buttons.


    With the detailSQLiteQueryField selected in the storyboard, do the following:
    • Open the Assistant Editor.


    • Drag and drop a connection.


    • Name the outlet detailSQLiteQueryField .


    • Make sure the Connection type is IBOutlet and click Connect.


    Creating the Data Model


    The model contains the Db Swift class , which is encapsulated in the Db.swift
    file. The class is designed with the same fields as in the sqlite_master table,
    namely type, name, and sql. There are also constants defined to hold the query
    templates that will be modified to architect the database. Figure  3-3 provides
    a snapshot of the Db class.


