    \ 6-6）。对`WineryListTableViewController`重复此过程。\n\n# 第 6 章 ■ 选择记录\n\n![](img/image82.jpg)\n\
    \n**图 6-6.** 连接 TableViewControllers\n\n要选择`TableViewCellController`，请使用 IB 画布左下角的图标展开文档大纲（图\
    \ 6-7）。选择`TableViewCell`，然后选择标识检查器，并从下拉菜单中选择`WineCellTableViewController`（图 6-8）。\n\
    \n![](img/image81.jpg)\n\n**图 6-7.** 文档大纲选择器\n\n# 第 6 章 ■ 选择记录\n\n![](img/image84.jpg)\n\
    \n**图 6-8.** 连接 TableViewCellController\n\n## 添加 IBOutlets：WineList 控制器\n\n对于`WineList`单元格，展开文档大纲并选择`WineCellTableViewCell`，然后按住\
    \ Control 键拖拽连接到助理编辑器（图 6-9）。\n\n![](img/image83.jpg)\n\n**图 6-9.** 创建 WineCell\
    \ 输出口\n\n接下来，依次选择`ImageView`和`UILabels`，并为每个组件创建`IBOutlets`，分别命名为`wineImgOutlet`、`wineNameOutlet`和`wineryNameOutlet`。\n\
    \n设置好`IBOutlets`后，我们可以添加代码来在场景中显示数据。为了在相应的`UITableViewCell`中显示酒庄信息，我们需要为酒庄名称、国家、地区、容量和计量单位添加`UILabel`。请按照与`WineCellTableViewCell`相同的过程，将它们连接到`WineryCellTableViewCell`。\n\
    \n```\nimport UIKit\n\nclass WineCellTableViewCell: UITableViewCell {\n\n    @IBOutlet\
    \ weak var wineNameOutlet: UILabel!\n\n    @IBOutlet weak var wineryNameOutlet:\
    \ UILabel!\n\n    @IBOutlet weak var wineRatingOutlet: UILabel!\n\n    @IBOutlet\
    \ weak var wineImageOutlet: UIImageView!\n}\n```\n\n# 第 6 章 ■ 选择记录\n\n同样地，对于`WineryListTableViewController`中的`WineryCell`（图\
    \ 6-10），添加以下代码：\n\n```\nclass WineryCellTableViewCell: UITableViewCell {\n\n \
    \   @IBOutlet weak var wineryNameOutlet: UILabel!\n\n    @IBOutlet weak var regionOutlet:\
    \ UILabel!\n\n    @IBOutlet weak var countryOutlet: UILabel!\n\n    @IBOutlet\
    \ weak var volumeOutlet: UILabel!\n\n    @IBOutlet weak var uomOutlet: UILabel!\n\
    }\n```\n\n![](img/image85.jpg)\n\n**图 6-10.** WineryCell IBOutlet\n\n## 添加业务逻辑\n\
    \n要从数据库中获取数据并显示在 UI 中，您需要添加一些代码。\n\n### WineListTableViewController\n\n`WineryListTableViewController`提供了数据库与表格视图单元格控制器之间的接口。对于数据源，我定义了一个葡萄酒数组`wineListArray`。我通过`loadWineList`函数中的`wineDAO`实例对象的`selectWineList`函数来填充该数组。当视图加载时，会通过`UITableViewController`的标准函数`viewDidLoad`调用此函数：\n\
    \n```\nvar wineListArray = [Wine]()\n\nlet wineDAO:WineryDAO = WineryDAO()\n\n\
    func loadWineList(){\n    wineListArray = wineDAO.selectWineList()\n}\n```\n\n\
    # 第 6 章 ■ 选择记录\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    loadWineList()\n}\n```\n\n接下来，您需要告诉控制器表格将有多少个分区，以及数据源将拥有（或显示）多少行。通常，`numberOfSectionsInTableView`返回`1`以表示一个分区。对于行数，您通常返回数组中的元素个数：\n\
    \n```\noverride func numberOfSections(in tableView: UITableView) -> Int { \n \
    \   return 1\n}\n\noverride func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n    return wineListArray.count\n}\n```\n"
- fmt: "要显示表格中的数据，你需要引用之前在`IB`和`WineCellTableViewCell`控制器中设置的单元格。通过将单元格标识符的名称传递给表视图的`dequeueReusableCellIdentifier`属性来实现。然后，将返回值转换为`WineCellTableViewCell`。接着，只需获取数组中的每一行，并将值分配给单元格的`IBOutlets`。对于你在上一个函数中定义的数组中的每一行，此函数会自动调用：\n\
    \n```\noverride func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
    \ IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"WineCellTableViewCell\", for: indexPath) as! WineCellTableViewCell\n    //\
    \ Configure the cell...\n    let wine = wineListArray[(indexPath as NSIndexPath).row]\n\
    \    cell.wineRatingOutlet.text = String(wine.rating)\n    cell.wineNameOutlet.text\
    \ = wine.name\n    cell.wineryNameOutlet.text = wine.producer\n    cell.wineImageOutlet.image\
    \ = UIImage.init(data: wine.image as Data)\n    return cell\n}\n```\n\n## `WineryListTableViewController`\n\
    \n要为表格设置数据源，你需要定义一个数组。在示例应用中，我这样写：\n\n```\nclass WineryListTableViewController:\
    \ UITableViewController {\n    var wineryListArray = [Wineries]()\n    let wineDAO:\
    \ WineryDAO = WineryDAO()\n    \n    func loadWineList() {\n        wineryListArray\
    \ = wineDAO.selectWineriesList()\n    }\n    \n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        loadWineList()\n    }\n    \n    override\
    \ func numberOfSections(in tableView: UITableView) -> Int {\n        return 1\n\
    \    }\n    \n    override func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return wineryListArray.count\n    }\n}\n```\n\
    \n要显示单元格`UILabels`中的各个行，需要设置`cellForRowAt`函数。要引用单元格原型，你需要将`WineryCellTableViewCell`单元格标识符传递给`dequeueReusableCellWithIdentifier`属性，并将表视图单元格转换为`WineryCellTableViewCell`。有了单元格引用后，你需要获取数据源数组中的每一行，并将值分配给单元格中的组件，在我们的例子中，这些组件是之前设置的`IBOutlets`。\n\
    \n```\noverride func tableView(_ tableView: UITableView, cellForRowAt indexPath:\
    \ IndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
    \ \"WineryCellTableViewCell\", for: indexPath) as! WineryCellTableViewCell\n \
    \   let winery: Wineries = wineryListArray[(indexPath as NSIndexPath).row]\n \
    \   cell.wineryNameOutlet.text = winery.name\n    cell.regionOutlet.text = winery.region\n\
    \    cell.countryOutlet.text = winery.country\n    cell.volumeOutlet.text = String(winery.volume)\n\
    \    cell.uomOutlet.text = winery.uom\n    return cell\n}\n```\n\n## 运行应用\n\n\
    现在一切都已创建完成，启动应用并连接真实的 iPhone，或者你也可以使用模拟器中的相机（如图 6-11 所示）。\n\n![图 6-11 照片捕捉](media/image86.jpg)\n\
    \n*图 6-11. 照片捕捉*\n\n接下来，选择酒庄和评分，点击保存按钮将其插入数据库记录中（如图 6-12 所示）。\n\n![图 6-12 选择酒庄的\
    \ UIPickerView](media/image88.jpg) ![图 6-12 选择酒庄的 UIPickerView](media/image87.jpg)\n\
    \n*图 6-12. 选择酒庄的`UIPickerView`*\n\n要调用`SELECT`函数并在`UITableViews`中显示数据，请选择标签栏中的`Cellar`或`Vineyard`按钮（如图\
    \ 6-13 所示）。\n\n![图 6-13 显示记录列表](media/image90.jpg) ![图 6-13 显示记录列表](media/image89.jpg)\n\
    \n*图 6-13. 显示记录列表*\n\n## 总结\n\n本章的重点是使用 SQLite`SELECT`语句对 SQLite 数据库进行查询。第一部分是对\
    \ API 的概述，并附带了一些示例代码，演示如何在 Swift 中使用`SELECT`。我们还讨论了如何对二进制数据执行`SELECT`查询。\n\n最后，我们将`SELECT`查询的功能添加到`Winery`应用中，以便为`UITableViewControllers`以及`UIPickerView`选择葡萄酒和酒庄。\n\
    \n下一章将探讨 SQLite 中的`UPDATE`语句，我们还会将`UPDATE`功能添加到`Winery`应用中。\n\n![媒体图片](media/image91.jpg)"
