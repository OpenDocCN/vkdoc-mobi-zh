    \ SQLite*, DOI 10.1007/978-1-4842-2232-4_12\n\n## In Swift\n\nIn Swift, the `ANALYZE`\
    \ statement can be executed like any other query, as follows:\n\n```\nfunc analyzeDatabase(_\
    \ name:String){\n  let sql:String = \"ANALYZE Chinook_Sqlite.sqlite\"\n  if(sqlite3_open(dbPath.path!,\
    \ &db)==SQLITE_OK){\n    if(sqlite3_prepare_v2(db, sql.cString(using: String.Encoding.utf8)!,\
    \ -1,\n                          &sqlStatement, nil)==SQLITE_OK){\n      while(sqlite3_step(sqlStatement)==SQLITE_ROW){\n\
    \        let output = String(cString: UnsafePointer<Int8>(sqlite3_column_\n  \
    \                         text(sqlStatement, 0)))\n        print(output)\n   \
    \   }\n    }\n  }\n  sqlite3_close(db)\n}\n```\n\n## The `sqldiff` Tool\n\nThe\
    \ `sqldiff` utility is an external application from SQLite. You can download it\
    \ along with `SQLite3_Analyzer` — and SQLite, for that matter – from the download\
    \ page at www.sqlite.org. Look for the zip package for OSX x86.\n\nYou only need\
    \ to unzip the compressed file to a handy directory on your OSX machine. These\
    \ tools are equally available for Windows and Linux. The instructions that follow\
    \ are for OSX only; however, I am sure they work the same way on Windows and Linux.\n\
    \nThe `sqldiff` utility is used to compare two SQLite databases and generates\
    \ a SQL script to convert the source database (`database1`) into the target database\
    \ (`database2`). The `sqldiff` tool is easy to use. A sample output is shown in\
    \ Figure 12-1. From a Terminal window, navigate to the directory where you unzipped\
    \ the utility, and `sqldiff` will issue the following command:\n\n![](media/image203.jpg)\n\
    *Figure 12-1. `sqldiff` output to standard output*\n\n`sqldiff database1.sqlite\
    \ database2.sqlite`\n\nTo illustrate, I will run the utility on the `Chinook_SQLite.sqlite`\
    \ database that I used for the backups. The second database is `DbToBackup.sqlite`,\
    \ which is another empty database I created for the backups.\n\nThe utility has\
    \ a number of options that you can use as well. For instance:\n\n* `--changeset\
    \ FILE`\n* `--lib` or `L`\n* `--primaryKey`\n* `--schema`\n* `--summary`\n* `--table\
    \ TABLENAME`\n* `--transaction`\n* `--vtab`\n\nThe `--changeset` option re-directs\
    \ the output to a file. The `--lib` option loads a user-defined library prior\
    \ to comparing the databases, like `collating_sequences`, for instance. If you\
    \ prefer using the primary key in a table instead of the rowid, then `--primaryKey`\
    \ is the way to go. Using the `--schema` flag, you can show the differences in\
    \ the schema only, excluding the content. To pinpoint the changes that have occurred\
    \ in two tables, use `--summary`. However, the actual changes won’t be displayed.\
    \ Using the `--table` option allows you to compare specific table content. The\
    \ `--transaction` option allows you to generate one large transaction for the\
    \ complete operation. Finally, the `--vtab` choice works with virtual tables like\
    \ `FTS3`, `FTS5`, and `rtree` tables.\n\nThe `sqldiff` utility works by comparing\
    \ pairwise `rowid`s, unless you are using the `--primaryKey` option. The output\
    \ is generated as updates if the content is in similar tables. If the two databases\
    \ have distinct tables, then the source tables are dropped (`DELETE`) and new\
    \ ones created, along with using `INSERT` to insert the content.\n\nThere are,\
    \ of course, some limitations with the current version of the tool. For instance,\
    \ the utility only works on tables, and `rowid`s must be accessible, unless you\
    \ are using the `--primaryKey` option. Also, the content of virtual tables isn’t\
    \ compared unless it results in a physical table. However, using the tool in this\
    \ capacity can create corrupted databases.\n\n## The `sqlite3_analyzer` Tool"
  raw: 'To run the ANALYZE functionality in a database, you simply need to execute
    the ANALYZE statement, as follows: ANALYZE schema


    This will create a stat1 table for the whole database. If you only want to target
    a table, you could issue a command like:


    ANALYZE schema.tablename


    Of course, you can also build a stat1 table for an index in a table using the
    following command: ANALYZE schema with or without the schema prefix:


    ANALYZE schema.indexname


    o r,


    ANALYZE indexname


    © Kevin Languedoc 2016 [187]


    K. Languedoc, Build iOS Database Apps with Swift and SQLite , DOI 10.1007/978-1-4842-2232-4_12
    CHAPTER 12 ■ ANALYZING SQLITE DATABASES


    In Swift, the ANALYZE statement can be executed like any other query, as follows:
    func analyzeDatabase(_ name:String){


    let sql:String = "ANALYZE Chinook_Sqlite.sqlite"


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


    if(sqlite3_prepare_v2(db, sql.cString(using: String.Encoding.utf8)!, -1,


    &sqlStatement, nil)==SQLITE_OK){


    while(sqlite3_step(sqlStatement)==SQLITE_ROW){


    let output = String(cString: UnsafePointer<Int8>(sqlite3_column_


    text(sqlStatement, 0)))


    print(output)


    }


    }


    }


    sqlite3_close(db)


    }


    The sqldiff Tool


    The sqldiff utility is an external application from SQLite. You can download it
    along with SQLite3_Analyzer— and SQLite, for that matter–from the download page
    at www.sqlite.org . Look for the zip package for OSX x86\.


    You only need to unzip the compressed file to a handy directory on your OSX machine.
    These tools are equally available for Windows and Linux. The instructions that
    follow are for OSX only; however, I am sure they work the same way on Windows
    and Linux.


    The sqldiff utility is used to compare two SQLite databases and generates a SQL
    script to convert the source database ( database1 ) into the target database (
    database2 ). The sqldiff tool is easy to use. A sample output is shown in Figure 
    12-1 . From a Terminal window, navigate to the directory where you unzipped the
    utility, and sqldiff will issue the following command:


    ![](media/image203.jpg)


    Figure 12-1\. sqldiff output to standard output


    CHAPTER 12 ■ ANALYZING SQLITE DATABASES


    sqldiff database1.sqlite databse2.sqlite


    To illustrate, I will run the utility on the Chinook_SQLite.sqlite database that
    I used for the backups. The second database is DbToBackup.sqlite , which is another
    empty database I created for the backups.


    The utility has a number of options that you can use as well. For instance: •
    --changeset FILE


    • --lib or L


    • --primaryKey


    • --schema


    • --summary


    • --table TABLENAME


    • --transaction


    • --vtab


    The –changeset option re-directs the output to a file. The –lib option loads a
    user-defined library prior to comparing the databases, like collating_sequences
    , for instance. If you prefer using the primary key in a table instead of the
    rowed, then –primaryKey is the way to go. Using the –schema flag, you can show
    the differences in the schema only, excluding the content. To pinpoint the changes
    that have occurred in two tables, use –summary . However, the actual changes won’t
    be displayed. Using the –table option allows you to compare specific table content.
    The –transaction option allows you to generate one large transaction for the complete
    operation. Finally, the –vtab choice works with virtual tables like FTS3, FTS5,
    and rtree tables.


    The sqldiff utility works by comparing pairwise rowids, unless you are using the
    –primaryKey option. The output is generated as updates if the content is in similar
    tables. If the two databases have distinct tables, then the source tables are
    dropped ( DELETE ) and new ones created, along with using INSERT to insert the
    content.


    There are, of course, some limitations with the current version of the tool. For
    instance, the utility only works on tables, and rowids must be accessible, unless
    you are using the –primaryKey option. Also, the content of virtual tables isn’t
    compared unless it results in a physical table. However, using the tool in this
    capacity can create corrupted databases.


    The sqlite3_analyzer tool'
  trans: "\n# 在数据库中运行 ANALYZE 功能\n\n要在数据库中运行 `ANALYZE` 功能，只需执行 `ANALYZE` 语句即可，如下所示：`ANALYZE\
    \ schema`\n\n这将为整个数据库创建一张 `stat1` 表。如果你只想针对某张表，可以执行如下命令：\n\n`ANALYZE schema.表名`\n\
    \n当然，你也可以使用以下命令为表中的某个索引构建 `stat1` 表：带或不带 schema 前缀的 `ANALYZE`：\n\n`ANALYZE schema.索引名`\n\
    \n或者，\n\n`ANALYZE 索引名`\n\n© Kevin Languedoc 2016 [187]\n\nK. Languedoc, *使用 Swift\
    \ 和 SQLite 构建 iOS 数据库应用*, DOI 10.1007/978-1-4842-2232-4_12\n\n## 在 Swift 中\n\n\
    在 Swift 中，`ANALYZE` 语句的执行方式与其他查询相同，如下所示：\n\n```\nfunc analyzeDatabase(_ name:String){\n\
    \  let sql:String = \"ANALYZE Chinook_Sqlite.sqlite\"\n  if(sqlite3_open(dbPath.path!,\
    \ &db)==SQLITE_OK){\n    if(sqlite3_prepare_v2(db, sql.cString(using: String.Encoding.utf8)!,\
    \ -1,\n                          &sqlStatement, nil)==SQLITE_OK){\n      while(sqlite3_step(sqlStatement)==SQLITE_ROW){\n\
    \        let output = String(cString: UnsafePointer<Int8>(sqlite3_column_\n  \
    \                         text(sqlStatement, 0)))\n        print(output)\n   \
    \   }\n    }\n  }\n  sqlite3_close(db)\n}\n```\n\n## `sqldiff` 工具\n\n`sqldiff`\
    \ 实用程序是 SQLite 的一个外部应用程序。你可以从 [www.sqlite.org](http://www.sqlite.org) 的下载页面将其与\
    \ `SQLite3_Analyzer` 以及 SQLite 本身一起下载。请寻找适用于 OSX x86 的 zip 压缩包。\n\n你只需将压缩文件解压到\
    \ OSX 机器上的某个方便目录即可。这些工具同样适用于 Windows 和 Linux。以下说明仅针对 OSX；不过，我确信它们在 Windows 和 Linux\
    \ 上的工作方式相同。\n\n`sqldiff` 实用程序用于比较两个 SQLite 数据库，并生成一个 SQL 脚本，用于将源数据库（`database1`）转换为目标数据库（`database2`）。`sqldiff`\
    \ 工具很容易使用。图 12-1 展示了一个示例输出。在终端窗口中，导航到你解压该实用程序的目录，然后 `sqldiff` 将执行以下命令：\n\n![](img/image203.jpg)\n\
    *图 12-1. `sqldiff` 输出到标准输出*\n\n`sqldiff database1.sqlite database2.sqlite`\n\n\
    为了演示，我将对我用于备份的 `Chinook_SQLite.sqlite` 数据库运行该实用程序。第二个数据库是 `DbToBackup.sqlite`，这是我为备份创建的另一个空数据库。\n\
    \n该实用程序还有许多可供使用的选项。例如：\n\n* `--changeset FILE`\n* `--lib` 或 `L`\n* `--primaryKey`\n\
    * `--schema`\n* `--summary`\n* `--table TABLENAME`\n* `--transaction`\n* `--vtab`\n\
    \n`--changeset` 选项将输出重定向到文件。`--lib` 选项在比较数据库之前加载用户自定义库，例如 `collating_sequences`。如果你更喜欢使用表中的主键而不是\
    \ `rowid`，那么可以使用 `--primaryKey` 选项。使用 `--schema` 标志，可以仅显示 schema 的差异，不包括内容。要精确定位两张表中发生的变化，请使用\
    \ `--summary`。但是，实际更改不会被显示。使用 `--table` 选项可以比较特定表的内容。`--transaction` 选项允许你为整个操作生成一个大型事务。最后，`--vtab`\
    \ 选项适用于虚拟表，例如 `FTS3`、`FTS5` 和 `rtree` 表。\n\n`sqldiff` 实用程序通过逐对比较 `rowid` 来工作，除非你使用了\
    \ `--primaryKey` 选项。如果内容存在于相似的表中，则输出会生成为更新语句。如果两个数据库包含不同的表，则源表会被删除（`DELETE`）并创建新表，然后使用\
    \ `INSERT` 插入内容。\n\n当然，当前版本的工具存在一些限制。例如，该实用程序仅适用于表，并且 `rowid` 必须是可访问的，除非你使用了 `--primaryKey`\
    \ 选项。此外，虚拟表的内容不会被比较，除非它最终体现在物理表中。然而，以此方式使用该工具可能会导致数据库损坏。\n\n## `sqlite3_analyzer`\
    \ 工具\n"
- fmt: '`sqlite3_analyzer`是一个方便的工具，用于衡量目标数据库中表的空间有效利用率。与之前的`sqldiff`工具类似，`sqlite3_analyzer`是一个命令行工具，包含在与`sqldiff`工具相同的下载包中。


