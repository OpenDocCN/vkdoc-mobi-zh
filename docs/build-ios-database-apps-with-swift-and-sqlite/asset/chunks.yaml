    SQLite has many Pragma statements that are used more than others (see https://www.sqlite.org/
    pragma.html for the full list). For instance, here are some useful ones:


    • Foreign_key_check


    • Foreign_key_list


    • Integrity_check


    • Automatic_index


    • Busy_timeout


    • Shrink_memory


    • Auto_vacuum


    Foreign_key_check


    PRAGMA schema. foreign_key_check;


    PRAGMA schema. foreign_key_check( table-name );


    T h e foreign_key_check PRAGMA runs against the database or table to check for
    any foreign-key violations. It returns a row for each violation, so you could
    use the sqlite3_step function to retrieve the returning value. The resulting value
    has four columns, as follows:


    • The name of the name containing the reference.


    • The second value is the rowindex where the violation occurred.


    • The third column is the table that the foreign key refers to.


    • The last column is the foreign-key name.


    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    Foreign_key_list


    The Foreign_key_list PRAGMA returns the list of foreign keys in a database. It
    returns one row for each foreign-key constraint.


    PRAGMA foreign_key_list( table-name )


    Integrity_check


    The integrity_check PRAGMA does a sanity check on the entire database looking
    for missing indexes, broken records, out-of-order records, missing pages, and
    UNIQUE or NOT NULL violations, among other verifications. The results are returned
    as a single column describing the issue. If no problems are found, the returning
    column will contain the “OK” value only. The N refers to the max number of errors
    to return. It defaults to 100\.


    PRAGMA schema. integrity_check;


    PRAGMA schema. integrity_check( N )


    Automatic_index


    The automatic_index PRAGMA allows the developer to query, set, or clear the automatic
    index on a table. PRAGMA automatic_index;


    PRAGMA automatic_index = boolean ;


    Busy_timeout


    This PRAGMA expression enables you to get the current timeout or set the busy
    timeout for query execution. PRAGMA busy_timeout;


    PRAGMA busy_timeout = milliseconds ;


    Shrink_memory


    This PRAGMA expression frees up memory as much as possible. This is handy for
    large databases or long-running queries. This is similar in concept to a garbage
    collector.


    PRAGMA shrink_memory


    Auto-vacuum


    This PRAGMA removes empty space from the page_file , thus freeing up memory and
    shrinking the size on disk.


    PRAGMA schema.auto_vacuum;


    PRAGMA schema.auto_vacuum = 0 | NONE | 1 | FULL | 2 | INCREMENTAL; CHAPTER 4 ■
    ALTERING DATABASES AND OTHER FEATURES


    Corrupting a SQLite Database


    SQLite is an extremely stable technology and is very robust, but it is still possible
    to cause database files to become corrupt if you’re not careful.


    For instance, if you move a database while the connection is open, you run the
    risk of corrupting the database. Since a SQLite file is a standard binary file,
    there is nothing that prevents a rogue thread or process from interfacing with.
    Within the context of an iOS sandbox where the app lives, this would be difficult
    but not impossible.


    Another possible threat is trying to access the same file descriptor after it
    was closed and reopened. Also, trying to back up or restore a database while it
    is open can damage the file.


    Broken file locks, which are managed by the filesystem, can damage the database
    file if you try to access it while a faulty lock is in place. Although there are
    many other corruption issues that can arise through the POSIX and by using different
    locking mechanisms or having multiple applications try to access the same database,
    the environment in which a SQLite database operates on iOS somewhat protects it
    from corruption.


    However, one way to easily corrupt a database is to rename it while it is open.
    You have to be careful when moving a database—say, from the Resources bundle to
    the Documents directory—that the database is closed before attempting the operation.'
