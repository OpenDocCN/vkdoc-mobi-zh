    let rawLen:Int32 = sqlite3_column_bytes(sqlStatement, 3);


    wine.image = Data(bytes: raw, count: Int(rawLen))


    wine.producer = String(cString: UnsafePointer<Int8>(sqlite3_column_


    text(sqlStatement, 4)))!


    wineArray.append(wine)


    }


    }


    }


    sqlite3_close(db)


    return wineArray


    }


    The selectWineryByName Function


    The wine producer property, which is the foreign key in the database, is an Int32
    value. In order to get the winery name from the database for the Selected Winery
    field in the FirstViewController , the following function performs a SELECT statement
    with a WHERE clause, using the ID to locate the record. I pass the WHERE clause
    value using sqlite3_bind_int then retrieve the return value and assign it to the
    name property of the vintner object using the same method as before. Notice that
    the last parameter is a 1 instead of a 0\. This is because in the SELECT query
    I am requesting two columns: the ID and the name.


    CHAPTER 6 ■ SELECTING RECORDS


    func selectWineryByName(name:String)->String{


    let vintnor:Wineries = Wineries.init()


    let sql:String = "Select name from main.winery where name=?"


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


    if(sqlite3_prepare_v2(db, sql.cString(using: String.Encoding.utf8)!, -1,


    &sqlStatement, nil)==SQLITE_OK){


    sqlite3_bind_text(sqlStatement, 0, vintner.name.cString(String.Encoding.


    utf8)!, -1, SQLITE_TRANSIENT)


    if(sqlite3_step(sqlStatement)==SQLITE_OK){


    vintnor.name = String(cString:UnsafePointer<Int8>(sqlite3_column_


    text(sqlStatement, 1)))!


    }


    }


    }


    sqlite3_close(db)


    return vintnor.name


    }


    Modifying the UI for Displaying Records


    With the SELECT queries in place, all that is needed is to add the view controllers
    to the UI and wire everything up. The app is going to need two TableViewControllers
    to display the list of records. These will have to be wired to the TabBarController
    .


    Figure  6-1 provides a visual of the additional design elements that are added
    to the Winery app for the select and display functionality. These new elements
    include the following:


    • Two table view controllers


    • Two navigation controllers


    • Two UITableViewCellControllers


    • Three UILabels for the WineList cell prototype and five for the WineryList cell
    prototype


    Adding the UITableViewControllers


    We will first add the UITableViewController for the wine list, which I will call
    the Cellar. Select the main. storyboard to open it (Figure  6-1 ). Drag a UITablewViewController
    from the palette on the lower right onto the canvas. Select the UITableViewController
    and then select the Attributes inspector and enter the “Cellar” title in the Title
    field. To connect the TableView to the TabBarController , you first need to create
    a NavigationViewController for the TableViewController . The easiest way to create
    the NavigationViewController, other than dragging it from the palette onto the
    canvas, is to select it and select Editor/Embed/Navigation Controller from the
    Xcode menu.


    CHAPTER 6 ■ SELECTING RECORDS


    ![](media/image75.jpg)


    Figure 6-1\. Extended storyboard with TableViewControllers


    Once the navigation controller has been created, select the TabBarController and
    drag (press Control or CTRL and press the left mouse button while dragging a line
    from the TabBar to the navigation controller) a connection to the navigation controller.
    Upon releasing the mouse button, a popup will appear. From this popup, you need
    to select ViewControllers from the choices. This will create a connection with
    the TabBarController and will add a navigation item to the existing tab bar. You
    can change the item''s value by selecting the navigation controller and changing
    the title value in the Attributes inspector. We need to repeat this process for
    the next UITableViewController for the winery list, which will also have a modified
    TableViewCell .


    For now, that is all that is needed for this UITableViewController . We will add
    the TableViewControllers and the TableViewCellController in the next section.


    After creating the second UITableViewController , using the preceding instructions
    for the Cellar, drag two UILabels onto the Cell Prototype (Figure  6-2 ). Change
    the label names to Wine and Winery as in the following figure. Also add an ImageView
    for the wine image. We will add the view controllers in the next section as well
    as create the IBOutlets .


    CHAPTER 6 ■ SELECTING RECORDS


    ![](media/image77.jpg)


    Figure 6-2\. The Cellar TableView cell prototype


    Adding the Navigation Controllers


    The final step is to provide an interface between the new UI elements and the
    SELECT functions, and ultimately the SQLite database. This interface consists
    of TableViewControllers and a TableViewCellController that is configured or connected
    to the corresponding UI elements, which will contain the IBOutlets that will display
    the data from the database.


    Both TableViewControllers are created the same way. From the File menu in Xcode,
    select New, then File. In the template selector, choose the Cocoa Touch Class
    template under the iOS Source category (Figure  6-3 ). In the next screen, enter
    WineryListTableViewController in the Class field. In the Subclass dropdown, select
    the UItableViewController class, and leave or select the Swift language (Figure 
    6-4 ). When the class is created, Xcode will append the name of the super class
    to the name. As shown in Figure  6-5 , click the Next button and select the location
    in the project, then click Create. ■ Tip You can also add a new file by right-clicking
    anywhere in the Project Navigator and selecting New File…


    CHAPTER 6 ■ SELECTING RECORDS


    ![](media/image79.jpg)


    Figure 6-3\. Select the Cocoa Touch Class


    ![](media/image78.jpg)


    Figure 6-4\. Enter WineryList in Class field


