  trans: "\n# 创建数据库模式的 `@IBAction` 按钮\n\n前四个函数非常简单。它们会显示可在 SQLite 数据库中创建的数据库元素（表、视图、触发器和索引）所对应的\
    \ SQL 查询语句。第五个函数会调用 `executeQuery` 函数，并将 `detailSQLiteQueryField` 的内容传递给它。返回的消息会赋值给同一个字段。\n\
    \n每个按钮函数都被分配了来自 `database` 对象的 `tableDef`、`viewDef`、`triggerDef` 或 `indexDef`\
    \ 查询模板，该对象是 `Db` 类的一个实例。\n\n```swift\n@IBAction func createTableButton(_ sender:\
    \ AnyObject) {\n    self.detailSQLiteQueryField.text = database.tableDef\n}\n\n\
    @IBAction func createViewButton(_ sender: AnyObject) {\n    self.detailSQLiteQueryField.text\
    \ = database.viewDef\n}\n\n@IBAction func createTriggerButton(_ sender: AnyObject)\
    \ {\n    self.detailSQLiteQueryField.text = database.triggerDef\n}\n\n@IBAction\
    \ func createIndexButton(_ sender: AnyObject) {\n    self.detailSQLiteQueryField.text\
    \ = database.indexDef\n}\n\n@IBAction func executeQueryButton(_ sender: AnyObject)\
    \ {\n    self.detailSQLiteQueryField.text = dbDAO.executeQuery(self.detailSQLiteQueryField.text)\n\
    }\n```\n\n## `detailSQLiteQueryField` 的 `@IBOutlet`\n\n`detailSQLiteQueryField`\
    \ 是一个与详情场景中同名的 `UITextArea` 组件关联的 `IBOutlet` 变量。它是 UI 的主要工作区域，用于加载和编辑查询语句，以及提供要创建和/或打开的\
    \ SQLite 数据库文件。\n\n该变量的签名完全通过界面生成器（Interface Builder, IB）定义。请记住，你也可以通过编程方式创建相同的功能。\n\
    \n```swift\n@IBOutlet weak var detailSQLiteQueryField: UITextView!\n```\n\n##\
    \ 设置视图\n\n当应用启动后首次加载详情场景时，`detailItem` 和 `configureView` 函数会从 `viewDidLoad` 函数中被调用。当从\
    \ `MasterViewController` 中调用 `prepareForSeque` 时，这些函数也会被调用。\n\n我在此处所做的修改是，将 Master-Detail\
    \ 模板中包含的 `UITextfield` 替换为 `detailSQLiteQueryField`，以便通过 `prepareForSegue` 函数接收信息，并添加代码来打开从\
    \ `MasterViewController` 的 TableView 中选中的数据库，同时传递 `detail.description` 的值。状态消息被赋给变量\
    \ `dbStatusMsg`，而不是直接传递给 `detailSQLiteQueryField`，因为当该函数被调用时，该字段尚未创建。因此，我在 `viewWillAppear`\
    \ 函数中将 `dbStatusMsg` 的值赋给该字段。\n\n```swift\nvar detailItem: AnyObject? {\n    didSet\
    \ {\n        // 更新视图。\n        self.configureView()\n    }\n}\n\nfunc configureView()\
    \ {\n    if let detail = self.detailItem {\n        if (dbDAO.openSQLiteDatabase(detail.description).rawValue\
    \ == Enums.SQLiteStatusCode.ok.rawValue) {\n            dbStatusMsg = \"SQLite\
    \ 数据库 \\(detail.description) 已创建并打开\"\n        }\n    }\n}\n```\n\n## `viewDidLoad`\
    \ 函数的实现\n\n我替换了 `viewDidLoad` 函数中包含的所有代码，除了 `self.configureView`，并用一些设置代码来配置 `detailSQLiteQueryField`。\n\
    \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // 从 nib\
    \ 加载视图后，执行任何额外的设置。\n    // 更新详情项的用户界面。\n    self.detailSQLiteQueryField.layer.borderWidth\
    \ = 1.0\n    self.detailSQLiteQueryField.layer.borderColor = UIColor.gray().cgColor\n\
    \    self.configureView()\n}\n```\n\n## `viewWillAppear` 函数的实现\n\n当 `viewWillAppear`\
    \ 函数被调用时，我将 `dbStatusMsg` 的值赋值给 `detailSQLiteQueryField`，从而确保该字段确实可用。\n\n```swift\n\
    override func viewWillAppear(_ animated: Bool) {\n    self.detailSQLiteQueryField.text\
    \ = dbname\n}\n```\n\n## 构建 Winery 数据库\n\n为了结束本章，我想演示如何创建一个数据库，我将在第 5-9 章中使用该数据库。这些章节将使用一个关于葡萄酒的\
    \ App 来执行增删改查（CRUD）操作。\n\n### 创建 `Winery.sqlite` 文件\n"
- fmt: "## 排版后的文本\n\nThe task is really easy. Enter the `Winery.sqlite` filename in\
    \ the `detailSQLiteQueryField` and click on the `Create/Open Database` button\
    \ (`createDbButton`). I provided code snippets from the `createDbButton` function\
    \ in the `DetailViewController` as well as the `openSQLiteDatabase` function in\
    \ the `DbMgrDAO` class for reference.\n\nIn the `createDbButton` function, the\
    \ `openSQLiteDatabase` is called, passing the file name `Winery.sqlite` for its\
    \ required parameter. You have probably noticed that there isn’t any error checking\
    \ beyond what is required by the SQLite functions. Also, I optimistically assume\
    \ that the return code will be `0` or successful and display a successful creation\
    \ message.\n\n```\n@IBAction func createDbButton(sender: AnyObject) {\n    dbname\
    \ = self.detailSQLiteQueryField.text\n    if(dbDAO.openSQLiteDatabase(dbname).rawValue\
    \ == Enums.SQLiteStatusCode.ok.rawValue){\n        self.detailSQLiteQueryField.text\
    \ = \"SQLite database \\(self.detailSQLiteQueryField.text) is created and open\"\
    \n    }\n}\n```\n\nIn `openSQLiteDatabase`, you may recall that I get a handle\
    \ on the Documents directory because it is one of the few places in an app’s sandbox\
    \ that is writeable, and then I call the `sqlite3_open` SQLite function to create\
    \ and/or open the database at the requested path. If the file name at the requested\
    \ path doesn’t exist, then `sqlite3_open` will create the database file and open\
    \ it; otherwise, the function will attempt to open the database file, and by doing\
    \ so establish a connection.\n\n```\nfunc openSQLiteDatabase(databaseName:String)->Enums.SQLiteStatusCode{\n\
    \    let dirManager = FileManager.default()\n    do {\n        let directoryURL\
    \ = try dirManager.urlForDirectory(FileManager.SearchPathDirectory.documentDirectory,\
    \ in: FileManager.SearchPathDomainMask.userDomainMask, appropriateFor: nil, create:\
    \ true)\n        dbPath = try! directoryURL.appendingPathComponent(databaseName)\n\
    \    } catch let err as NSError {\n        print(\"Error: \\(err.domain)\")\n\
    \    }\n    return Enums.SQLiteStatusCode(rawValue: sqlite3_open(dbPath.absoluteString.cString(String.Encoding.utf8)!,\
    \ &db))!\n}\n```\n\nWith the database in hand, I will now create the tables and\
    \ views.\n\n## Adding the Tables\n\nRecall the `Create Table` and `Create View`\
    \ buttons in the UI? If you click on these, they will load the templates in the\
    \ `Db` class into the `detailSQLiteQueryField` field to be edited. Once the queries\
    \ are to your liking, you need only click on the `Execute Query` button (`executeQueryButton`)\
    \ to execute the query through the database engine and create the database structure\
    \ in the open database file.\n\nFor the `winery.sqlite` database and app, I will\
    \ need two tables: `wine` and `producer`. I could easily extend this with a few\
    \ more tables and views and triggers. I won’t go into joins or foreign keys here,\
    \ as I will revisit them in detail in chapter 5 on inserting records. Suffice\
    \ to say that the two tables will have a foreign-key relationship, and the view\
    \ will use a join to access data from both for display.\n\n**CHAPTER 3 ■ CREATING\
    \ DATABASES DURING RUNTIME**\n\nThe first table I will create is the `producer`\
    \ table. This table will contain the data on the wine producers. The second table,\
    \ `wine`, will contain information on the bottles of wine. The schema is outlined\
    \ in Table 3-1. The foreign key will be in the `wine` table and is defined by\
    \ the `Producer_id` field.\n\n**Table 3-1. Winery Schema**\n\n| wine         \
    \ | producer      |\n|---------------|---------------|\n| id            | id \
    \           |\n| Producer_id   | name          |\n| name          | country  \
    \     |\n| Rating        | region        |\n|               |               |\n\
    \nTo create the table in the `winery.sqlite` database, follow these steps:\n\n\
    1. From the running app (iOS Simulator or installed on iPad), enter `\"winery.sqlite\"\
    ` in the editor field and click on the `Create/Open Database` button.\n2. If the\
    \ database is successfully opened, you will get a success message back that replaces\
    \ the text in the same field.\n3. Next, click on the `Create Table` button to\
    \ load the `Create Table` template into the editor field.\n4. Modify the query\
    \ so that it looks like this:\n\n```\nCREATE TABLE IF NOT EXISTS main.producer\
    \ (\n    Id INTEGER PRIMARY KEY AUTOINCREMENT NOT NULL UNIQUE,\n    Producer_id\
    \ integer,\n    Name VARCHAR,\n    Country VARCHAR,\n    Region VARCHAR,\n```"
