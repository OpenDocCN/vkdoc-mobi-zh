- fmt: "• 点击Connect以创建IBAction函数并建立连接（深色圆点）。  \n• 对所有按钮重复此过程，并按如下方式命名：\n\n- `createTableButton`\n\
    - `createDbButton`\n- `createViewButton`\n- `createIndexButton`\n- `createTrigger`\n\
    - `executeQueryButton`\n\n## 第三章 ■ 运行时创建数据库\n\n![](media/image47.jpg)\n\n*图3-2.\
    \ 创建IBAction按钮*\n\n我们将在后续讨论`DetailViewController`时添加处理逻辑。\n\n### 添加`detailSQLiteQueryField`\n\
    \n`detailSQLiteQueryField`是一个UITextArea组件，也可以从Xcode的组件面板中获得。它用于编辑数据库结构的SQL查询，并显示用于创建现有数据库模式的SQL查询。\n\
    \n您还可以通过输入带`.sqlite`扩展名的数据库名称，并点击“创建/打开数据库”按钮来创建SQLite数据库。查询确认消息和错误消息也会显示在此字段中。\n\
    \n为了与`DetailViewController`和`DbMgrDAO`控制器交互，我们需要像处理按钮一样，在控制器中添加一个`IBOutlet`连接。\n\
    \n在故事板中选中`detailSQLiteQueryField`后，执行以下操作：  \n• 打开助理编辑器。  \n• 拖放一个连接。  \n• 将出口命名为`detailSQLiteQueryField`。\
    \  \n• 确保连接类型为`IBOutlet`，然后点击Connect。\n\n### 创建数据模型\n\n模型包含`Db` Swift类，该类封装在`Db.swift`文件中。该类的设计与`sqlite_master`表中的字段相同，即`type`、`name`和`sql`。还定义了一些常量来保存查询模板，这些模板将被修改以构建数据库。图3-3提供了`Db`类的快照。\n\
    \n![](media/image48.jpg)\n\n*图3-3. Db数据模型*\n\n模板可以包含在SQLite数据库中，这将改进应用程序的设计，但为了保持应用程序概念简单，我将它们添加为常量。稍后我将使用这些模板创建一个葡萄酒数据库，并在接下来的几章中展示如何创建CRUD查询。\n\
    \n这些模板是编写查询以创建数据库模式的基本示例。例如，您可以使用`INSERT`语句而不是`CREATE TABLE`语句来创建表。您也可以使用`CREATE\
    \ TABLE`与`SELECT`语句，基于`SELECT`查询定义来创建表。与其他SQL系统一样，表也可以是临时的（temp）。\n\n使用Swift文件模板创建`Db.swift`文件后，添加类定义，以公共访问标识符开头，后跟`class`关键字和类名。从下面的代码清单可以看出，`Db`类类似于数据模型，并且您可以看到创建表模板`tableDef`的赋值。还有用于视图、索引和触发器的SQL模板，都赋值给了各自的常量。\n\
    \n```\nimport Foundation\n\npublic class Db {\n\n    // 这些属性将填充MasterViewController的数组\n\
    \    var type: String = \"\"\n    var name: String = \"\"\n    var sql: String\
    \ = \"\"\n    var databaseObj: String = \"\"\n\n    // 查询模板\n    let tableDef:\
    \ String = \"CREATE TABLE IF NOT EXISTS main.tablename ( \\n \" +\n        \"\
    Id INTEGER PRIMARY KEY AUTOINCREMENT NOT NULL UNIQUE ,\\n \" +\n        \"colVarchar\
