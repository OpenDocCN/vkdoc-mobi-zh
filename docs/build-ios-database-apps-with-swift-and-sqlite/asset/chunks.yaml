    to maintain a handle on the latest ROWID . Although SQLite created the index for
    us, I’ll show you the syntax of the SQLite query needed to create your own. Add
    an Index'
  trans: "\n# 排版后的内容\n\n## 第 2 章：创建 SQLite 数据库\n\n![SQLite Manager 工具栏](img/image25.jpg)\n\
    \n**图 2-2.** SQLite Manager 工具栏\n\n为了本示例的演示目的，我将创建一个数据库，然后添加表、视图、一个触发器以及索引。数据库创建完成后，我会将其添加到\
    \ `Db Mgr` 项目中。\n\n`Directory`（目录）选择器允许你将当前目录从 `Profile` 目录（即 Firefox 用于存储其使用的各种数据库的目录）更改为我们将存放数据库的目录。\n\
    \n### 创建数据库\n\n你可以通过菜单栏中的新建文档图标，或者选择 **Database**（数据库）菜单项下的 **New Database**（新建数据库）选项来创建数据库。在本例中，我将数据库命名为\
    \ `Chapter 2`。默认情况下，会使用 `.sqlite` 扩展名；不过，你可以在设置中（十字螺丝刀/扳手图标）更改此行为。图 2-3 显示了让你提供\
    \ SQLite 数据库名称的对话框。\n\n![命名 SQLite 数据库](img/image28.jpg)\n\n**图 2-3.** 命名 SQLite\
    \ 数据库\n\n`SQLite Manager` 为你提供了许多调整和分析数据库的选项。例如，在数据库打开后，切换到 **Db Settings**（数据库设置）选项卡，你可以设置一系列不同的参数来微调数据库（图\
    \ 2-4）。在本例中我将接受默认设置，但我建议你探索 `SQLite Manager` 的这些众多功能以及通过 SQLite API 可用的不同设置。\n\
    \n![SQLite Manager 设置选项卡](img/image27.jpg)\n\n**图 2-4.** SQLite Manager 设置选项卡\n\
    \n我想简单谈谈几个有趣且有用的概念：位于 **Master Table**（主表）节点下的 `sqlite_master` 表、`sqlite_sequence`\
    \ 表，以及 **Main**（主）数据库与 **Temp**（临时）数据库或其他数据库之间的区别。\n\n### `sqlite_master` 表\n\n\
    `sqlite_master` 表包含了用于创建数据库模式的所有查询；例如，当你添加或修改表、视图或触发器时。该表还包含了每个数据库模式元素的名称和类型。在本章后续内容中，我们将利用这个表来填充下一章\
    \ `MasterViewController` 中 `TableView` 的数据源。该表的模式类似于下面的代码片段。当你向数据库添加第一个表时，SQLite\
    \ 会为你创建这个表。这仅是一个表示：\n\n```sql\nCREATE TABLE sqlite_master (\n    type TEXT,\n\
    \    name TEXT,\n    tbl_name TEXT,\n    rootpage INTEGER,\n    sql TEXT\n);\n\
    ```\n\n你也可以在选中 `sqlite_master` 表的情况下，选择 **Browse & Search**（浏览与搜索）选项卡来浏览该表。你还可以通过对该表执行\
    \ `SELECT` 查询来浏览表中的信息或任何其他表，如下面图 2-5 之后的代码片段所示。\n\n![Sqlite_master 浏览与搜索窗口](img/image29.jpg)\n\
    \n**图 2-5.** `sqlite_master` 浏览与搜索窗口\n\n### `sqlite_sequence` 表\n\n`sqlite_sequence`\
    \ 表维护着给定表中最大的 `ROWINDEX`（行索引）。它与列的 `AUTOINCREMENT`（自动增量）属性配合使用。当我创建数据库中的表时，我将使用\
    \ `AUTOINCREMENT` 作为主键。如果表是空的，那么最大的 `ROWID` 将是 1，随着记录添加到表中，该值会依次递增。\n\n我想谈的最后一个特性是\
    \ **Main**（主）数据库。在 SQLite 中，你可以将多个数据库附加到同一个连接或数据库文件。当你创建一个新的数据库文件或连接时，SQLite 会自动向该文件添加一个数据库并将其命名为\
    \ `Main`。你可以选择在同一个连接中创建额外的数据库，单独命名这些数据库，并使用 `ATTACH` 命令将它们连接在一起。同样，你可以使用 `DETACH`\
    \ 命令移除这些辅助数据库。\n\n图 2-6 显示了 **Directory**（目录）菜单项的截图。**Directory** 菜单是定位 SQLite\
    \ 数据库及其主目录的另一种有用方式。你可以通过选择 **“Default User Directory”**（默认用户目录）选项来定位磁盘上的数据库文件。如果你使用的是\
    \ OS X，这将打开一个访达窗口；如果你使用的是 Windows，则会打开一个文件资源管理器窗口。\n\n![SQLite Manager 目录菜单](img/image30.jpg)\n\
    \n**图 2-6.** SQLite Manager 目录菜单\n\n有了基本的数据库之后，我将进入下一步，创建表和列。\n\n### 添加表和列\n\n\
    在 SQLite 中创建表和列非常简单。你可以选择使用新建表图标，或者从 **Table**（表）菜单中选择 **Create Table**（创建表）选项。我提供了一个\
    \ `SQLite Manager` 中 **Create Table**（创建表）界面的截图（图 2-7）。当你输入表定义时，它仅会捕获构建 `Create\
    \ Table` 查询所需的信息。\n\n![SQLite Manager 的创建表界面](img/image31.jpg)\n\n**图 2-7.** `SQLite\
    \ Manager` 的创建表界面\n\n你会注意到界面顶部附近用于选择数据库的下拉菜单。你可以在已经选定的 `main` 和 `temp` 之间进行选择。如果你附加了其他数据库，它们也会出现在这里。\n\
    \n如果你有开发数据库应用程序的经验，你会发现这些字段大多不言自明。有一个用于输入表名的字段。你可以通过 **“Temporary table”**（临时表）选项选择创建临时表。你应该始终选择\
    \ **“if not exists”**（如果不存在）选项，这样在运行应用程序时就不会意外覆盖数据库表及其内容。该选项会添加到查询中，数据库引擎会在创建表之前检查该表是否已存在。\n\
    \n图 2-7 演示了如何定义表的列。你可以提供列名、数据类型（下拉菜单包含了 SQL 语言支持的数据类型），以及该列是否作为主键。你可以通过启用 **“Autoinc”**（自动增量）选项让列自动递增。请注意，此选项仅在你选择为该列启用主键时才可用。当然，你可以通过选择\
    \ **“Yes”**（是）选项来禁止空值。这对于主键字段尤其重要。**“Unique”**（唯一）选项可确保不会通过 `INSERT` 或 `UPDATE`\
    \ 引入重复数据。最后，你可以根据所选数据类型设置默认值。\n\n表定义完成后，点击 **OK**（确定）按钮，将出现一个确认框，显示将要执行以创建表的确切查询。这是学习\
    \ SQLite 支持的 SQL 查询需要使用的正确语法的绝佳方式。\n\n对于我的示例数据库，我将创建一个表来存储一些关于图书的基本信息，例如书名、作者、页数、售价、版税和出版商。图\
    \ 2-8 提供了该表的基本信息。紧随表结构之后的截图提供了用于在数据库中创建表的实际查询字符串的详细信息（图 2-9）。如果你不确定正确的语法，或者像我有时一样懒惰而不想编写代码，你可以轻松地在另一个\
    \ iOS 应用程序中复制+粘贴这些内容。\n\n![创建表定义](img/image33.jpg)\n\n**图 2-8.** 创建表定义\n\n![创建表查询](img/image32.jpg)\n\
    \n**图 2-9.** 创建表查询\n\n在 `SQLite Manager` 中，你可以通过选择表名并展开左侧窗格中的节点，然后选择右侧窗格顶部的 **Structure**（结构）选项卡来浏览表结构（图\
    \ 2-10）。除了浏览表结构，你还可以执行一些操作，例如删除表或重新索引表。\n\n![浏览数据库结构](img/image35.jpg)\n\n**图\
    \ 2-10.** 浏览数据库结构\n\n请注意截图中，在 **Indexes**（索引）节点下自动添加了一个索引。这个索引是因为我在 `Book` 表中指定了主键而自动创建的。SQLite\
    \ 还添加了我之前提到的 `sqlite_sequence` 表，用于维护最新的 `ROWID` 句柄。虽然 SQLite 为我们创建了索引，但我还是会向你展示创建自己索引所需的\
    \ SQLite 查询语法。\n\n### 添加索引\n"
- fmt: "# In a SQLite Database\n\nIn a SQLite database, as in all other relational\
    \ databases, tables have indexes to help them locate records quickly. Creating\
    \ indexes in SQLite is very straightforward, especially with SQLite Manager. Figure\
    \ 2-11 shows the `Chapter.sqlite` schema in SQLite Manager with one index, `sqlite_autoindex_book_1`.\
    \ This index is automatically created when a column is configured with the `autoincrement`\
    \ property when creating a table.\n\n![Figure 2-11](media/image34.jpg)\n\n*Figure\
    \ 2-11. Indexes in SQLite Manager*\n\n## Creating Indexes\n\nTo create an index,\
    \ select the `Create Index` command from the `Index` menu in SQLite Manager. The\
    \ interface window provides the necessary fields to build the `Index` query in\
    \ SQLite. You need to provide the name of the target table. In Figure 2-12, the\
    \ `Book` table is preselected, since it is the only one in the database other\
    \ than the `sqlite_sequence` table. In the `Define Index Columns` section, which\
    \ displays the available columns of the selected table, you can define which columns\
    \ are needed for the index. Click `OK` to generate the query shown in Figure 2-13.\n\
    \n![Figure 2-12](media/image37.jpg)\n\n*Figure 2-12. Create Index interface in\
    \ SQLite Manager*\n\n![Figure 2-13](media/image36.jpg)\n\n*Figure 2-13. Create\
    \ Index query*\n\nWith the index now in place for the table, I will proceed with\
    \ adding a view and a trigger before adding the finished database to an iOS project.\n\
    \n## Add a View\n\nA view provides a listing based on a `SELECT` statement run\
    \ against the contents of a table. The view may present all the data in a table\
    \ or a subset of data depending on your needs. A view can provide better performance\
    \ when accessing large datasets if you are limiting yourself to a subset of the\
    \ entire table's contents.\n\nThe `View` menu in SQLite Manager provides several\
    \ operations that you can perform on a view in addition to creating a view. For\
    \ instance, you can opt to modify a view, drop a view, or rename a view. For now,\
    \ select the `Create View` command from the `View` menu. However, in the case\
    \ of modifying or altering a view, in reality you would be performing a `drop\
    \ view`/`create view` operation. You can only alter, in the true sense of the\
    \ word, a table in SQLite. Figure 2-14 illustrates the `Create View` interface.\
    \ In the following screenshot, you can see where to add the view name and the\
    \ target database. You can also indicate if it is temporary or that SQLite should\
    \ check to see if the view already exists. The `Select Statement` field lets you\
    \ define the subset of records to view through the view.\n\n![Figure 2-14](media/image39.jpg)\n\
    \n*Figure 2-14. Create View query interface*\n\nFigure 2-15 provides a confirmation\
    \ of the query that will be used to generate the view. For this example, I am\
    \ selecting all the records, but I could have easily created a subset of content\
    \ by modifying the `SELECT` query accordingly. Click the `OK` button, and the\
    \ SQLite database engine will provide the finished `CREATE VIEW` SQL query string\
    \ to create the view.\n\n![Figure 2-15](media/image38.jpg)\n\n*Figure 2-15. Create\
    \ View query confirmation*\n\nViews are a handy tool for accessing subsets of\
    \ records in a table or tables, since you could add a `JOIN` or even an inline\
    \ `SELECT` statement to build a more complex `SELECT` statement.\n\n## Add a Trigger\n\
    \nThe trigger is the final database element I will demonstrate before adding the\
    \ database to the iOS project. Triggers act on data in a table after a record\
    \ is inserted, updated, or deleted. These database programs are useful for performing\
    \ a given operation or generating logs in case you need to maintain an audit trail.\n\
    \nTriggers can be created from the `Trigger` menu in SQLite Manager or from the\
    \ context menu by right-clicking on the `Trigger` node, like all the other database\
    \ schema elements, as shown in Figure 2-16.\n\n![Figure 2-16](media/image41.jpg)\n\
    \n*Figure 2-16. Create Trigger context menu*\n\nThe `Trigger` interface window\
    \ provides the necessary fields to define the trigger (Figure 2-17). You need\
    \ to specify a name and the target table or view. You also need to indicate if\
    \ the trigger is launched before, after, or instead of the creation of a record,\
    \ as well as which database event the trigger is the result of, like `UPDATE`,\
    \ `INSERT`, or `DELETE`.\n\n![Figure 2-17](media/image40.jpg)\n\n*Figure 2-17.\
    \ Create Trigger interface*\n\nNext, you need to write the query to be performed\
    \ on the records. In this example, I want the trigger to calculate the royalties\
    \ an author will receive on book sales. I have provided the code snippet for the\
    \ example trigger `CalcRoyalties` (Figure 2-18).\n\n```sql\nCREATE TRIGGER CalcRoyalties\
    \ AFTER INSERT ON Book\nFOR EACH ROW\nWHEN (Sales) >= 1\nBEGIN\n  update Book\
    \ set Royalties = Sales * .15;\nEND\n```\n\n![Figure 2-18](media/image44.jpg)\n\
    \n*Figure 2-18. Create Trigger query*\n\nOnce the trigger query is to your liking,\
    \ you can add the trigger to the database by clicking the `OK` button. As usual,\
    \ SQLite Manager will confirm the `CREATE TRIGGER` action before actually adding\
    \ it to the database.\n\n## Create an iOS Project\n\nTo complete this section\
    \ of the chapter on developing SQLite databases using a database tool, I will\
    \ create an iOS project. When you add a database to an iOS project, it is inserted\
    \ in the `Resources` directory. The `Resources` directory is also the root directory\
    \ of the project. This directory is read-only, and you cannot change these file\
    \ permissions.\n\nIf you try to write data to the database while in this location,\
    \ you won’t receive any errors, but your `INSERT` or `UPDATE` queries will fail.\
    \ To make your database writable, you need to move it to the `Document` directory.\
    \ I will show you how to do this in the following sections.\n\nFrom within Xcode,\
    \ create a new iOS project. For this chapter, I am creating a database editor,\
    \ so I will need a Master-Detail template. I am naming the project `DbMgr` as\
    \ an abbreviation for Database Manager. The language is Swift, of course, and\
    \ the target device is iPad. Accept the other defaults, but make sure that \"\
    Core Data\" is unchecked.\n\n## Add Database to the Project\n\nAdding the database\
    \ to the project is simple. From the `File` menu in Xcode, select the `Add Files\
    \ to \"Db Mgr...\"` command. A Finder window will open requesting the file location\
    \ of the database. If you don’t remember where you saved the database file, you\
    \ can go back to SQLite Manager and use `Directory ➤ Select Default Directory`\
    \ to identify the location of the directory where the SQLite database file is\
    \ located.\n\nSelect the file and click the `Add` button. By default, the file\
    \ is added to the selected directory or group, if you selected a group. You can\
    \ drag and drop the database file anywhere in the Explorer. However, as I mentioned\
    \ earlier, the SQLite database file is read-only in this location. You need to\
    \ copy or move the file to the `Documents` directory to ensure that it's writable.\n\
    \nFor this example, I will add code to the `AppDelegate` application's `didFinishLaunchWithOptions`\
    \ method to copy the database file to the `Documents` directory. The code is provided\
    \ here:\n\n```swift\nfunc application(application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n\n    //....Code remove for\
    \ brevity ....\n\n    var srcPath:URL\n    var destPath:URL\n\n    let dirManager\
    \ = FileManager.default()\n    let projectBundle = Bundle.main()\n\n    do {\n\
    \        let resourcePath = projectBundle.pathForResource(\"Chapter2\", ofType:\
    \ \"sqlite\")\n        let documentURL = try dirManager.urlForDirectory(FileManager.SearchPathDirectory.documentDirectory,\
    \ \n                                                         in: FileManager.SearchPathDomainMask.userDomainMask,\
    \ \n                                                         appropriateFor: nil,\
    \ \n                                                         create: true)\n \
    \       srcPath = URL(fileURLWithPath: resourcePath!)\n        destPath = documentURL.appendingPathComponent(\"\
    Chapter2.sqlite\")\n\n        if !dirManager.fileExists(atPath: destPath.path!)\
    \ {\n            try dirManager.copyItem(at: srcPath, to: destPath)\n        }\n\
    \    } catch let err as NSError {\n        print(\"Error: \\(err.domain)\")\n\
    \    }\n}\n```"
  raw: 'In a SQLite database, as in all other relational databases, tables have indexes
    to help them locate records quickly. Creating indexes in SQLite is very straightforward,
    especially with SQLite Manager. Figure  2-11 shows the Chapter.sqlite schema in
    SQLite Manager with one index, sqlite_autoindex_book _1 . This index is automatically
    created when a column is configured with the autoincrement property when creating
    a table.


    ![](media/image34.jpg)


    Figure 2-11\. Indexes in SQLite Manager


    CHAPTER 2 ■ CREATING SQLITE DATABASES


    To create an index, select the Create Index command from the Index menu in SQLite
    Manager. The interface window provides the necessary fields to build the Index
    query in SQLite. You need to provide the name of the target table. In Figure 
    2-12 , the Book table is preselected, since it is the only one in the database
    other than the sqlite_sequence table. In the Define Index Columns section, which
    displays the available columns of the selected table, you can define which columns
    are needed for the index. Click OK to generate the query shown in Figure  2-13
    .


    ![](media/image37.jpg)


    Figure 2-12\. Create Index interface in SQLite Manager


    ![](media/image36.jpg)


    Figure 2-13\. Create Index query


    With the index now in place for the table, I will proceed with adding a view and
    a trigger before adding the finished database to an iOS project.


    Add a View


    A view provides a listing based on a SELECT statement run against the contents
    of a table. The view may present all the data in a table or a subset of data depending
    on your needs. A view can provide better performance when accessing large datasets
    if you are limiting yourself to a subset of the entire table''s contents.


    CHAPTER 2 ■ CREATING SQLITE DATABASES


    The View menu in SQLite Manager provides several operations that you can perform
    on a view in addition to creating a view. For instance, you can opt to modify
    a view, drop a view, or rename a view. For now, select the Create View command
    from the View menu. However, in the case of modifying or altering a view, in reality
    you would be performing a drop view/create view operation. You can only alter,
    in the true sense of the word, a table in SQLite. Figure  2-14 illustrates the
    Create View interface. In the following screenshot, you can see where to add the
    view name and the target database. You can also indicate if it is temporary or
    that SQLite should check to see if the view already exists. The Select Statement
    field lets you define the subset of records to view through the view.


    ![](media/image39.jpg)


    Figure 2-14\. Create View query interface


    Figure  2-15 provides a confirmation of the query that will be used to generate
    the view. For this example, I am selecting all the records, but I could have easily
    created a subset of content by modifying the SELECT query accordingly. Click the
    OK button, and the SQLite database engine will provide the finished CREATE VIEW
    SQL query string to create the view.


    ![](media/image38.jpg)


    Figure 2-15\. Create View query confirmation


    Views are a handy tool for accessing subsets of records in a table or tables,
    since you could add a JOIN or even an inline SELECT statement to build a more
    complex SELECT statement.


    CHAPTER 2 ■ CREATING SQLITE DATABASES


    Add a Trigger


    The trigger is the final database element I will demonstrate before adding the
    database to the iOS project. Triggers act on data in a table after a record is
    inserted, updated, or deleted. These database programs are useful for performing
    a given operation or generating logs in case you need to maintain an audit trail.


    Triggers can be created from the Trigger menu in SQLite Manager or from the context
    menu by right-clicking on the Trigger node, like all the other database schema
    elements, as shown in Figure  2-16 .


    ![](media/image41.jpg)


    Figure 2-16\. Create Trigger context menu


    The Trigger interface window provides the necessary fields to define the trigger
    (Figure  2-17 ). You need to specify a name and the target table or view. You
    also need to indicate if the trigger is launched before, after, or instead of
    the creation of a record, as well as which database event the trigger is the result
    of, like UPDATE , INSERT , or DELETE .


    ![](media/image40.jpg)


    Figure 2-17\. Create Trigger interface


    CHAPTER 2 ■ CREATING SQLITE DATABASES


    Next, you need to write the query to be performed on the records. In this example,
    I want the trigger to calculate the royalties an author will receive on book sales.
    I have a provided the code snippet for the example trigger CalcRoyalties (Figure 
    2-18 ).


    CREATE TRIGGER CalcRoyalties AFTER INSERT ON Book


    FOR EACH ROW


    WHEN (Sales) >= 1


    BEGIN


    update Book set Royalties = Sales * .15;


    END


    ![](media/image44.jpg)


    Figure 2-18\. Create Trigger query


    Once the trigger query is to your liking, you can add the trigger to the database
    by clicking the OK button. As usual, SQLite Manager will confirm the CREATE TRIGGER
    action before actually adding it to the database. Create an iOS Project


    To complete this section of the chapter on developing SQLite databases using a
    database tool, I will create an iOS project. When you add a database to an iOS
    project, it is inserted in the Resources directory. The Resources directory is
    also the root directory of the project. This directory is read-only, and you cannot
    change these file permissions.


    If you try to write data to the database while in this location, you won’t receive
    any errors, but your INSERT or UPDATE queries will fail. To make your database
    writable, you need to move it to the Document directory. I will show you how to
    do this in the following sections.


    From within Xcode, create a new iOS project. For this chapter, I am creating a
    database editor, so I will need a Master- Detail template. I am naming the project
    Db Mgr as an abbreviation for Database Manager. The language is Swift, of course,
    and the target device is iPad. Accept the other defaults, but make sure that "Core
    Data" is unchecked.


    CHAPTER 2 ■ CREATING SQLITE DATABASES


    Add Database to the Project


    Adding the database to the project is simple. From the File menu in Xcode, select
    the Add Files to “Db Mgr ...” command. A Finder window will open requesting the
    file location of the database. If you don’t remember where you saved the database
    file, you can go back to SQLite Manager and use Directory ➤ Select Default Directory
    to identify the location of the directory where the SQLite database file is located.


    Select the file and click the Add button. By default, the file is added to the
    selected directory or group, if you selected a group. You can drag and drop the
    database file anywhere in the Explorer. However, as I mentioned earlier, the SQLite
    database file is read-only in this location. You need to copy or move the file
    to the Documents directory to ensure that it''s writable.


    For this example, I will add code to the AppDelegate application''s didFinishLaunchWithOptions
    method to copy the database file to the Documents directory. The code is provided
    here: func application(application: UIApplication, didFinishLaunchingWithOptions
    launchOptions: [_ NSObject: AnyObject]?) -> Bool {


    //....Code remove for brevity ....


    var srcPath:URL


    var destPath:URL


    let dirManager = FileManager.default()


    let projectBundle = Bundle.main()


    do {


    let resourcePath = projectBundle.pathForResource("Chapter2", ofType: "sqlite")


    let documentURL = try dirManager.urlForDirectory(FileManager.


    SearchPathDirectory.documentDirectory, in: FileManager.SearchPathDomainMask. userDomainMask,
    appropriateFor: nil, create: true)


    srcPath = URL(fileURLWithPath: resourcePath!)


    destPath = documentURL.appendingPathComponent("Chapter2.sqlite")


    if !dirManager.fileExists(atPath:destPath.path!) {


    try dirManager.copyItem(at: srcPath, to: destPath)


    }


    } catch let err as NSError {


    print("Error: \(err.domain)")


    }


    }'
  trans: "\n# 在 SQLite 数据库中\n\n在 SQLite 数据库中，与其他所有关系型数据库一样，表通过索引来帮助快速定位记录。在 SQLite\
    \ 中创建索引非常直接，尤其是使用 SQLite Manager 时。图 2-11 展示了 SQLite Manager 中 `Chapter.sqlite`\
    \ 的模式，其中包含一个索引 `sqlite_autoindex_book_1`。当在创建表时为某一列配置了 `autoincrement` 属性时，该索引会自动创建。\n\
    \n![图 2-11](img/image34.jpg)\n\n*图 2-11. SQLite Manager 中的索引*\n\n## 创建索引\n\n要创建索引，请从\
    \ SQLite Manager 的 `Index` 菜单中选择 `Create Index` 命令。界面窗口提供了在 SQLite 中构建 `Index`\
    \ 查询所需的必要字段。你需要提供目标表的名称。在图 2-12 中，`Book` 表已被预选，因为它是数据库中除 `sqlite_sequence` 表之外的唯一一张表。在\
    \ `Define Index Columns` 部分，该部分显示了所选表的可用列，你可以定义索引需要哪些列。点击 `OK` 生成如图 2-13 所示的查询。\n\
    \n![图 2-12](img/image37.jpg)\n\n*图 2-12. SQLite Manager 中的创建索引界面*\n\n![图 2-13](img/image36.jpg)\n\
    \n*图 2-13. 创建索引查询*\n\n现在表上已经有了索引，我将在将完成的数据库添加到 iOS 项目之前，继续添加一个视图和一个触发器。\n\n##\
    \ 添加视图\n\n视图提供了基于对表内容执行 `SELECT` 语句的列表。根据你的需要，视图可以呈现表中的所有数据或数据的子集。如果你将自己限制在整个表内容的子集中，那么在访问大数据集时，视图可以提供更好的性能。\n\
    \nSQLite Manager 中的 `View` 菜单除了创建视图外，还提供了可以对视图执行的若干操作。例如，你可以选择修改、删除或重命名视图。现在，从\
    \ `View` 菜单中选择 `Create View` 命令。然而，对于修改或更改视图，实际上你将执行的是 `drop view`/`create view`\
    \ 操作。在 SQLite 中，你只能真正地修改表。图 2-14 展示了 `Create View` 界面。在下面的截图中，你可以看到添加视图名称和目标数据库的位置。你还可以指示它是否为临时视图，或者\
    \ SQLite 是否应检查该视图是否已存在。`Select Statement` 字段允许你定义通过视图查看的记录子集。\n\n![图 2-14](img/image39.jpg)\n\
    \n*图 2-14. 创建视图查询界面*\n\n图 2-15 提供了将用于生成视图的查询确认信息。在此示例中，我选择了所有记录，但我也可以通过相应地修改 `SELECT`\
    \ 查询来轻松创建内容的子集。点击 `OK` 按钮，SQLite 数据库引擎将提供最终的 `CREATE VIEW` SQL 查询字符串来创建视图。\n\n\
    ![图 2-15](img/image38.jpg)\n\n*图 2-15. 创建视图查询确认*\n\n视图是访问一张或多张表中记录子集的便捷工具，因为你可以添加一个\
    \ `JOIN` 甚至一个内联的 `SELECT` 语句来构建更复杂的 `SELECT` 语句。\n\n## 添加触发器\n\n触发器是我将数据库添加到 iOS\
    \ 项目之前演示的最后一个数据库元素。触发器在插入、更新或删除记录后作用于表中的数据。这些数据库程序对于执行特定操作或在需要维护审计追踪时生成日志非常有用。\n\
    \n可以像其他所有数据库模式元素一样，从 SQLite Manager 的 `Trigger` 菜单或通过右击 `Trigger` 节点从上下文菜单创建触发器，如图\
    \ 2-16 所示。\n\n![图 2-16](img/image41.jpg)\n\n*图 2-16. 创建触发器上下文菜单*\n\n`Trigger`\
    \ 界面窗口提供了定义触发器所需的必要字段（图 2-17）。你需要指定名称和目标表或视图。你还需要指示触发器是在创建记录之前、之后还是替代创建记录时启动，以及触发器响应哪个数据库事件，例如\
    \ `UPDATE`、`INSERT` 或 `DELETE`。\n\n![图 2-17](img/image40.jpg)\n\n*图 2-17. 创建触发器界面*\n\
    \n接下来，你需要编写要对记录执行的查询。在此示例中，我希望触发器计算作者将从书籍销售中获得的版税。我已经提供了示例触发器 `CalcRoyalties`\
    \ 的代码片段（图 2-18）。\n\n```sql\nCREATE TRIGGER CalcRoyalties AFTER INSERT ON Book\n\
    FOR EACH ROW\nWHEN (Sales) >= 1\nBEGIN\n  update Book set Royalties = Sales *\
    \ .15;\nEND\n```\n\n![图 2-18](img/image44.jpg)\n\n*图 2-18. 创建触发器查询*\n\n一旦触发器查询符合你的要求，你可以通过点击\
    \ `OK` 按钮将触发器添加到数据库。像往常一样，SQLite Manager 会在实际将触发器添加到数据库之前确认 `CREATE TRIGGER` 操作。\n\
    \n## 创建 iOS 项目\n\n为了完成本章关于使用数据库工具开发 SQLite 数据库的部分，我将创建一个 iOS 项目。当你将数据库添加到 iOS\
    \ 项目时，它会被插入到 `Resources` 目录中。`Resources` 目录也是项目的根目录。此目录是只读的，你无法更改这些文件权限。\n\n如果你尝试在此位置向数据库写入数据，你不会收到任何错误，但你的\
    \ `INSERT` 或 `UPDATE` 查询将会失败。要使你的数据库可写，你需要将其移动到 `Document` 目录。我将在后续章节中向你展示如何操作。\n\
    \n在 Xcode 中，创建一个新的 iOS 项目。对于本章，我正在创建一个数据库编辑器，因此我需要一个 Master-Detail 模板。我将项目命名为\
    \ `DbMgr`，作为 Database Manager 的缩写。语言当然是 Swift，目标设备是 iPad。接受其他默认设置，但确保\"Core Data\"\
    未被选中。\n\n## 将数据库添加到项目\n\n将数据库添加到项目很简单。从 Xcode 的 `File` 菜单中选择 `Add Files to \"\
    Db Mgr...\"` 命令。一个 Finder 窗口将会打开，请求数据库文件的位置。如果你不记得将数据库文件保存在哪里，你可以返回 SQLite Manager\
    \ 并使用 `Directory ➤ Select Default Directory` 来定位 SQLite 数据库文件所在的目录。\n\n选择该文件并点击\
    \ `Add` 按钮。默认情况下，该文件会被添加到选定的目录或组（如果你选择了组的话）。你可以将数据库文件拖放到资源管理器中的任何位置。然而，正如我之前提到的，SQLite\
    \ 数据库文件在此位置是只读的。你需要将该文件复制或移动到 `Documents` 目录以确保其可写。\n\n对于此示例，我将在 `AppDelegate`\
    \ 应用的 `didFinishLaunchWithOptions` 方法中添加代码，以将数据库文件复制到 `Documents` 目录。代码如下所示：\n\
    \n```swift\nfunc application(application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n\n    //....为简洁起见，省略部分代码 ....\n\
    \n    var srcPath:URL\n    var destPath:URL\n\n    let dirManager = FileManager.default()\n\
    \    let projectBundle = Bundle.main()\n\n    do {\n        let resourcePath =\
    \ projectBundle.pathForResource(\"Chapter2\", ofType: \"sqlite\")\n        let\
    \ documentURL = try dirManager.urlForDirectory(FileManager.SearchPathDirectory.documentDirectory,\
    \ \n                                                         in: FileManager.SearchPathDomainMask.userDomainMask,\
    \ \n                                                         appropriateFor: nil,\
    \ \n                                                         create: true)\n \
    \       srcPath = URL(fileURLWithPath: resourcePath!)\n        destPath = documentURL.appendingPathComponent(\"\
    Chapter2.sqlite\")\n\n        if !dirManager.fileExists(atPath: destPath.path!)\
    \ {\n            try dirManager.copyItem(at: srcPath, to: destPath)\n        }\n\
    \    } catch let err as NSError {\n        print(\"Error: \\(err.domain)\")\n\
    \    }\n}\n```\n"
- fmt: 'This code will run every time the app is started and will check to see if
    the file is located in the Documents directory. If it’s not, then it is copied.
    Ideally, the code should check to see if the file in the bundle is newer than
    the version in the Documents directory and update accordingly.


    There are different ways you could handle this, like having a button in the UI
    that provides the syntax to select the file and copy it to the Documents directory.
    Or, you could have the same code in the `viewDidLoad` method of the main `ViewController`
    that is loaded after the app is started.


    ## Chapter 2: Creating SQLite Databases


    ### Summary


    This completes this chapter on creating SQLite databases and adding them to an
    iOS project. The next chapter focuses on creating SQLite databases during runtime.
    I will continue to add functionality to the `DbMgr` iPad app.


    ![](media/image45.jpg)


    One of the great features of SQLite is its ability to create databases while the
    app is running. You can quickly add or modify databases as needed.


    In the following sections I will add a data model, a UI for various databases
    commands and to display the database schema, and the view controllers to handle
    the operations. The app will be able to create the database and add tables and
    columns as well as indexes, views, and triggers.


    ## Building the DB Mgr App


    I will continue to build on the same iPad project from the previous chapter in
    order to provide the functionality needed to be able to create databases while
    the app is loaded into memory. I won’t win any design awards with the app, but
    it will serve its purpose of reinforcing some of the key features of SQLite on
    how to build databases.


    At a high level, the app was conceived to use the `detailViewController` as the
    main interface. The `MasterViewController` will retain and display the databases
    in the app along with schema elements. The `DetailViewController` will include
    buttons to create and open databases and to create tables, views, indexes, and
    triggers. The `ViewController` will also provide an action to execute queries.


    A data-access class will handle the communication between the data model, which
    includes the SQLite database and a custom type as, and the `ViewControllers`.


    ## The Application UI


    In this section, I''ll add `UIButton`s and connect them to the assigned view controller.
    Then, I''ll add the `detailSQLiteQueryField`.


    ### Adding the Buttons


    Adding buttons and connecting them to the assigned view controller is an easy
    task with the Interface Builder, or IB for short. To add the buttons, open the
    main storyboard in the app (`Main.storyboard`) and locate the detail scene.


    From the Component palette on the lower right side, drag and drop `UIButton`s
    and align them along the top. Figure 3-1 shows the app with the buttons and the
    `detailSQLiteQueryField`. The buttons use .gif images. I have added all these
    under the Assets group in the project. If you need to add more or change some,
    you can do so by using the Add Files context menu or the File menu in Xcode.


    © Kevin Languedoc 2016 [25]


    K. Languedoc, *Build iOS Database Apps with Swift and SQLite*, DOI 10.1007/978-1-4842-2232-4_3


    ![](media/image46.jpg)


    **Figure 3-1.** Db Mgr user interface


    To configure the image for the button, do the following:

    - Select the button in the detail scene.

    - From the Attributes inspector, locate the image field.

    - Select an image using the file-selector button.


    Once all the buttons are added and configured, we will need to create `@IBAction`s
    for the buttons in the `DetailViewController`. To create the connections, open
    the Assistant Editor from the open `Main.storyboard` file and drag and drop a
    connection from the `UIButton` to the open `DetailViewController`. When you release
    the mouse button, a popup appears (Figure 3-2) through which you can do the following:

    - Add the IBAction connection name.

    - Select the connection type.'
