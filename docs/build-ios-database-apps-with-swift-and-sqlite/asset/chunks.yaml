- fmt: "### 使用子查询的注意事项\n\n在使用子查询时，有几点规则需要牢记。首先，子查询在`SELECT`子句中只能有一列，除非主`SELECT`中的多列与子查询中的对应列相匹配。其次，子查询必须用括号括起来。第三，子查询中不能包含`ORDER\
    \ BY`子句，但可以在主`SELECT`中使用`ORDER BY`。第四，返回多行的子查询必须使用多值运算符，如`IN`。最后，`BETWEEN`子句只能在子查询中使用。\n\
    \n---\n\n### 使用连接执行`SELECT`操作\n\n连接是SQL（更准确地说是关系型数据库）中的一项基本操作，因为我们基于表之间的关系从不同表中查找数据。SQLite实现连接的方式与其他SQL衍生版本类似。在本节中，我们将探讨标准的连接模式或子句。\n\
    \n#### 使用内连接（`INNER JOIN`）\n\n最常见的连接是内连接（`inner join`）。内连接使用匹配键（主键-外键）在两个表之间建立关系。该键不必同名，但必须具有相同的数据类型：\n\
    \n```sql\nSELECT c.id, c.name, r.hotel, r.checkin, r.checkout \nFROM customer\
    \ AS C \nJOIN reservations AS r ON c.id = r.custid\n```\n\n你也可以使用`WHERE`子句实现相同的结果：\n\
    \n```sql\nSELECT c.id, c.name, r.hotel, r.checkin, r.checkout \nFROM customer\
    \ AS C \nJOIN reservations AS r WHERE c.id = r.custid\n```\n\n#### 使用交叉连接（`CROSS\
    \ JOIN`）\n\n自然连接（`NATURAL JOIN`）与内连接类似，区别在于自然连接会假设并期望在每个连接表中找到相同的列名，并匹配任意找到的同名列（名称和数据类型均相同）：\n\
    \n```sql\nSELECT c.id, c.name, r.hotel, r.checkin, r.checkout \nFROM customer\
    \ AS C \nNATURAL JOIN reservations AS r\n```\n\n#### 使用外连接（`OUTER JOIN`）\n\n使用左外连接（`left\
    \ outer join`）时，会返回左表（即`FROM`关键字后紧跟的表）中的所有记录，即使右表中没有匹配的记录：\n\n```sql\nSELECT c.customerid,\
    \ c.name, v.visits \nFROM customer AS C \nLEFT JOIN visits AS v ON c.id = v.custid\n\
    ```\n\n---\n\n### 选择并显示图像\n\n以下示例演示了如何选择图像等二进制数据，并将该二进制数据转换为可在`UIImageView`中显示的`UIImage`数据类型：\n\
    \n```swift\nfunc selectImages(_ filename: String) -> Array<UIImage> {\n    var\
    \ imageArr = [UIImage]()\n    if !(sqlite3_open(dbPath.path!, &db) == SQLITE_OK)\
    \ {\n        print(\"An error has occurred.\")\n        return imageArr\n    }\
    \ else {\n        let sql: String = \"SELECT id, filename, image FROM images WHERE\
    \ filename=?\"\n        if sqlite3_prepare(db, sql, -1, &sqlStatement, nil) !=\
    \ SQLITE_OK {\n            print(\"Problem with prepared statement\")\n      \
    \  } else {\n            // WHERE 参数值\n            sqlite3_bind_text(sqlStatement,\
    \ 1, filename, -1, SQLITE_TRANSIENT)\n            while sqlite3_step(sqlStatement)\
    \ == SQLITE_ROW {\n                let contact: Person = Person()\n          \
    \      let raw: UnsafePointer = sqlite3_column_blob(sqlStatement, 3)\n       \
    \         let rawLen: Int32 = sqlite3_column_bytes(sqlStatement, 3)\n        \
    \        let data: Data = Data(bytes: raw, count: Int(rawLen))\n             \
    \   // 将二进制数据转换为 UIImage\n                contact.avatar = UIImage(data: data)!\n\
    \                imageArr.append(contact.avatar)\n            }\n        }\n \
    \   }\n    return imageArr\n}\n```\n\n---\n\n### 选择并播放音频记录\n\n```swift\nfunc selectAudioWithPlayback(_\
    \ selectedFile: String) -> Data {\n    var audio: Data = Data()\n    let sql:\
    \ String = \"SELECT audioData FROM audios WHERE fileName= \\(selectedFile)\"\n\
    \    if sqlite3_open(dbPath.path!, &db) == SQLITE_OK {\n        if sqlite3_prepare_v2(db,\
    \ sql, -1, &sqlStatement, nil) == SQLITE_OK {\n            while sqlite3_step(sqlStatement)\
    \ == SQLITE_ROW {\n                let raw: UnsafePointer = sqlite3_column_blob(sqlStatement,\
    \ 3)\n                let rawLen: Int32 = sqlite3_column_bytes(sqlStatement, 3)\n\
    \                audio = Data(bytes: raw, count: Int(rawLen))\n            }\n\
    \        }\n        sqlite3_finalize(sqlStatement)\n        sqlite3_close(db)\n\
    \        return audio\n    }\n}\n```\n\n> **注意**：以下代码仅供演示，不能在此处直接运行。你需要将其放入视图控制器中，并连接到`IBAction`。下方的`self`引用指向该视图控制器。\n\
    \n```swift\nfunc playback(_ selectedAudioFile: NSData) {\n    do {\n        var\
    \ audioPlayer = try AVAudioPlayer(data: selectedAudioFile as Data)\n        audioPlayer.delegate\
    \ = self\n        audioPlayer.prepareToPlay()\n        audioPlayer.play()\n  \
    \  } catch let err as NSError {\n        print(\"Error: \\(err.domain)\")\n  \
    \  }\n}\n```\n\n---\n\n### 选择并显示视频记录\n\n选择视频进行播放的流程与图像和音频类似。执行`SELECT`时，使用`BLOB`提取数据，并将二进制数据存储到`NSData`对象中，这些对象可以存储在`NSMutableArray`或`NSDictionary`等容器中。\n\
    \n然而，与图像或音频不同，不能直接将`NSData`对象传递给`MPMoviePlayerController`进行播放。你需要将`NSData`对象转换为视频格式（如`mp4`），方法是将其保存到`Documents`目录下的视频文件中。要将`NSData`保存为`mp4`文件，只需将数据写入扩展名为`.mp4`的文件即可；`NSData`仅是数据的容器，无需进行转换。\n\
    \n或者，你可以将`NSData`存储到`NSString`中，然后将该字符串转换为`NSURL`对象，再使用`initWithContentURL`方法初始化`MPMoviePlayerController`。\n\
    \n---\n\n### 为Winery App添加`SELECT`功能\n\n在本节中，我将为Winery应用添加`SELECT`功能。该功能包括：在输入葡萄酒时选择酒庄、从数据库中查询并显示葡萄酒列表，以及显示不同酒庄的功能。第三个功能将在后续关于更新记录的章节中增强。让我们从`wineriesPickerView`开始。\n\
    \n#### 添加`SelectWineries`的`UIPicker`\n\n这个小函数用于显示`UIPicker`，以便用户从列表中选择酒庄：\n\n\
    ```swift\n@IBAction func selectWineryButton(sender: AnyObject) {\n    self.wineriesPickerView.isHidden\
    \ = false\n}\n```\n\n#### `viewDidLoad`函数\n\n这个标准的`ViewController`函数在场景加载到视图栈后执行，或者在当前应用启动时执行。该函数提供了设置`wineriesPickerView`的通道，包括设置代理和分配`wineriesArray`数据源。设置完成后，将`UIPicker`作为子视图添加到当前视图中。\n\
    \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // 构建数据源\n\
    \    self.wineriesPickerView.isHidden = true\n    self.wineriesArray = dbDAO.selectWineriesList()\n\
    \    self.wineriesPickerView.dataSource = self\n    self.wineriesPickerView.delegate\
    \ = self\n    self.wineriesPickerView.frame = CGRect(x: 19, y: 243, width: 336,\
    \ height: 216)\n    self.wineriesPickerView.backgroundColor = UIColor.white\n\
    \    self.wineriesPickerView.layer.borderColor = UIColor.blue.cgColor\n    self.wineriesPickerView.layer.borderWidth\
    \ = 1\n    // 其他 pickerView 代码，如 dataSource 和 delegate\n    self.view.addSubview(wineriesPickerView)\n\
    }\n```\n\n#### `UIPickerView`相关函数\n\n以下函数与`UIPickerView`相关。部分函数用于代理，为UI组件提供交互功能；其他函数则用于标识列数、标题、数据源，以及确定选中的行。"
  raw: 'There are a couple of rules that you need to keep in mind when working with
    sub-queries. First, the sub-query can only have one column in the SELECT clause
    unless several columns in the main SELECT match up with the same columns in the
    sub-query. Second, sub-queries must be enclosed in parentheses. Third, you cannot
    include an ORDER BY clause in the sub-query. However, you can use ORDER BY in
    the main SELECT . Fourth, a sub-query that returns more than one row must use
    a multiple-value operator like IN . Finally, you can only use the BETWEEN clause
    in a sub-query.


    Perform a SELECT using Joins


    Joins are an essential operation in SQL, or, more precisely, in a relational database,
    since we look up data in different tables based on the relationship between those
    tables. SQLite implements joins in a fashion similar to that of other SQL derivatives.
    In this section, we will explore the standard join patterns or clauses. Using
    an INNER Join


    The most common join is the inner join . The inner join uses a matching key (primary–foreign)
    to create a relationship between two tables. The key doesn''t have to have the
    same name, only the same data type:


    CHAPTER 6 ■ SELECTING RECORDS


    Select c.id, c.name, r.hotel, r.checkin, r.checkout from customer as C JOIN


    reservations as r ON on c.id = r.custid


    You could also use a WHERE clause to achieve the same result:


    Select c.id, c.name, r.hotel, r.checkin, r.checkout from customer as C JOIN


    reservations as r WHERE c.id = r.custid


    Using a CROSS Join


    The NATURAL JOIN is similar to the inner join except that the query presumes and
    expects to find an identical column in each joined table and will any matching
    column (name and data type) that it finds: Select c.id, c.name, r.hotel, r.checkin,
    r.checkout from customer as C NATURAL JOIN reservations AS r


    Using the OUTER Join


    With the left outer join , all the records from the left table—or, in other words,
    all the records from the table immediately following the FROM keyword—even if
    there are no records in the table on the right. Select c.customerid, c.name, v.visits
    from customer as C LEFT JOIN Visits v ON c.id=v.custid Select and Display Images


    This example demonstrates how to select binary data like images and convert that
    binary data into the UIImage data type that can be displayed in a UIImageView
    :


    func selectImages(_ filename:String)->Array<UIImage>{


    var imageArr = [UIImage]()


    if(!(sqlite3_open(dbPath.path!, &db) == SQLITE_OK))


    {


    print("An error has occured.");


    return imageArr;


    }else{


    let sql:String = "SELECT id, filename, image FROM images where filename=?";


    if(sqlite3_prepare(db, sql, -1, &sqlStatement, nil) != SQLITE_OK)


    {


    print("Problem with prepared statement");


    }else{


    //WHERE parameter value


    sqlite3_bind_text(sqlStatement, 1,filename, -1,SQLITE_TRANSIENT)


    while (sqlite3_step(sqlStatement)==SQLITE_ROW) {


    let contact:Person = Person()


    let raw:UnsafePointer = sqlite3_column_blob(sqlStatement, 3);


    let rawLen:Int32 = sqlite3_column_bytes(sqlStatement, 3);


    let data:Data = Data(bytes: raw, count: Int(rawLen))


    CHAPTER 6 ■ SELECTING RECORDS


    //Convert the binary data into an UIImage


    contact.avatar = UIImage(data: data)!


    imageArr.append(contact.avatar)


    }


    }


    }


    return imageArr


    }


    Select and Playback Audio Records


    func selectAudioWithPlayback(_ selectedFile:String)->Data{ var audio:Data = Data()


    let sql:String = "SELECT audioData FROM audios wherefileName= \(selectedFile)"


    if(sqlite3_open(dbPath.path!, &db)==SQLITE_OK){


    if(sqlite3_prepare_v2(db, sql, -1, &sqlStatement, nil)==SQLITE_OK){


    while (sqlite3_step(sqlStatement)==SQLITE_ROW) {


    let raw:UnsafePointer = sqlite3_column_blob(sqlStatement, 3);


    let rawLen:Int32 = sqlite3_column_bytes(sqlStatement, 3);


    audio = Data(bytes: raw, count: Int(rawLen))


    }


    }


    sqlite3_finalize(sqlStatement);


    sqlite3_close(db);


    return audio


    }


    }


    ■ Note The following code is for representation only, meaning that it cannot be
    run from here. Rather, you would need to include it in a view controller attached
    to an IBAction . The self-reference that follows refers to the view controller.


    func playback(_ selectedAudioFile:NSData){


    do {


    var audioPlayer = try AVAudioPlayer(data:selectedAudioFile)


    audioPlayer.delegate = self;


    audioPlayer.prepareToPlay()


    audioPlayer.play()


    } catch let err as NSError {


    print("Error: \(err.domain)")


    }


    }


    CHAPTER 6 ■ SELECTING RECORDS


    Select and Display Video Records


    Selecting videos for playback follows the same pattern as doing so for images
    and audio. To perform a SELECT , extract the data using the blob and store the
    binary data in an NSData object or objects that can be stored in an NSMutableArray
    or NSDictionary, for example.


    However, you can''t convert or pass the NSData object directly to the MPMoviePlayerController
    object for playback like you can with images or audio. You will need to convert
    the NSData object to a movie format like mp4 by saving it to a movie file in the
    Documents directory. To save the NSData to an mp4 file, simply write out the data
    to a file with the .mp4 extension; NSData is simply a container for data, so no
    transformation is needed.


    Alternatively, you could store the NSData to an NString and convert this string
    to an NSURL object, which you could then use to initialize the MPMoviePlayerController
    using the initWithContentURL method. Adding SELECT Functionality to the Winery
    App In this section of the chapter, I will add the SELECT functionality to the
    Winery app. This functionality will include a function to select a winery when
    entering a wine, another function to select and display a list of wines from the
    database, as well as a function to display the different wineries. This third
    function will be enhanced in a later chapter on updating records. Let''s start
    with the wineriesPickerView . Add the SelectWineries UIPicker


    This little function displays the UIPicker so that a user can select a winery
    from the list: @IBAction func selectWineryButton(sender: AnyObject) {


    self.wineriesPickerView.hidden = false


    }


    The viewDidLoad Function


    This standard ViewController function runs after the scene is loaded onto the
    view stack, or in our case when the app is launched. The function provides a channel
    through which to set up the wineriesPickerView by setting up the delegate and
    assigning the wineriesArray data source. Once the setup is complete, the UIPicker
    is added as a sub-view to the current view. override func viewDidLoad() {


    super.viewDidLoad()


    //build data source


    self.wineriesPickerView.isHidden = true


    self.wineriesArray = dbDAO.selectWineriesList()


    self.wineriesPickerView.dataSource = self


    self.wineriesPickerView.delegate = self


    self.wineriesPickerView.frame = CGRect(x:19, y:243, width: 336, height: 216)


    self.wineriesPickerView.backgroundColor = UIColor.white()


    self.wineriesPickerView.layer.borderColor = UIColor.blueColor().cgColor


    self.wineriesPickerView.layer.borderWidth = 1


    //other pickerView code like dataSource and delegate


    self.view.addSubview(wineriesPickerView)


    }


    CHAPTER 6 ■ SELECTING RECORDS


    The UIPickerView Functions


    The following functions are related to the UIPickerView . Some are for the delegate,
    which provides the interactivity to the UI component, while others identify the
    number of columns, the title, and the data source, as well as identify which row
    is selected.'
