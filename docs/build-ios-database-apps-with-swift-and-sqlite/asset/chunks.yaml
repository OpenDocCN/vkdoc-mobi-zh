  raw: 'The SQLite SELECT statement is used to extract data and information from a
    SQLite database. The SELECT statement is the most complicated in the SQL language,
    mostly because of all the permutations.


    The basic syntax of a SELECT query is:


    SELECT column(s) from main.table


    You could also use a wildcard to return all the columns in the table: SELECT *
    from main.table


    If you wanted or needed to return only a subset of the data from a table, you
    could use a WHERE clause, as in the following example:


    SELECT * from main.table WHERE column1 = ‘some value’


    The WHERE clause could evaluate either custom or standard functions. You could
    also use the IN clause. For example:


    SELECT id, column1 FROM main.table WHERE column1 IN (SELECT col_id, column1 from
    main. second_table WHERE col_id=id)


    The SELECT statement can also include another SELECT statement instead of a column;
    this is known as an inline select query, as the following illustrates:


    SELECT id, column1, (SELECT column FROM main.table )


    Selecting Data


    The first use case will demonstrate how to perform a basic, boilerplate SELECT
    without a WHERE clause . The SELECT in SQLite is performed through the select-stmt
    function. While you don''t interface directly with this function, meaning you
    don''t call this function directly when performing SELECT queries, the function
    does support the standard SQL API on SELECT . The following example follows the
    same pattern of accessing the SQLite database in the Documents path, opening it,
    and performing a SELECT query.


