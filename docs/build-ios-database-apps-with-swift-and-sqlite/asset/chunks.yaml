    # 创建 SQLite 数据库


    下一章将向你展示如何使用 Firefox 和 SQLite Manager 插件开发 SQLite 数据库。数据库创建完成后，我们将开发 `Db Mgr`
    应用，将数据库添加到项目中，并将其复制到 `Document` 目录，因为这是 iOS 应用沙盒（文件系统）中主要的可写入目录。


    ![](img/image24.jpg)


    SQLite 在创建数据库方面非常灵活。你可以选择包含文件扩展名，也可以不包含，因为真正需要做的只是向 `sqlite3_open` 函数传递文件名和路径，数据库就会被创建并打开——尽管它不会包含任何结构。与
    MSSQL 等其他关系型数据库不同，SQLite 数据库是自包含且可移植的。一个 SQLite 数据库文件可以在所有支持的平台上无需任何修改即可运行，当然也包括
    iOS。SQLite 数据库并非设计用于运行服务器。


    在本章中，我将继续基于上一章的内容，展示如何使用 SQLite Manager 等数据库工具在 Firefox 中创建 SQLite 数据库，并将其添加到项目中。在下一章中，我将向你传授在运行时创建数据库的知识，包括添加必要的结构。


    你还可以使用命令行创建数据库，例如终端（OSX、Linux）或 Windows 命令提示符。


    本章涵盖以下主题：


    1. 创建 SQLite 数据库并将其添加到项目

    2. 添加表和列

    3. 添加视图

    4. 添加触发器

    5. 添加索引


    > **注意：** 虽然你可以在所有支持的平台上使用 Firefox 中的 SQLite Manager 来开发 SQLite 数据库，但你需要将数据库文件导出到
    OSX 才能包含在你的 iOS/Swift 项目中。即使 Swift 和 SQLite 在 Linux 上受支持，你仍然需要 Xcode 来配置你的应用并将其部署到
    `iTunesConnect`。本章乃至本书的重点，是向你展示如何使用 Swift 3 和 SQLite 数据库开发 iOS 应用（iPhone/iPad）。我假设你正在
    OSX El Capitan 上使用 Xcode 8，以及 iOS SDK 和 SQLite Manager 中包含的 SQLite 3。


    ## 创建数据库并将其添加到项目


    在本章的第一部分，我将重点介绍如何使用 Firefox 中的 SQLite Manager 插件开发 SQLite 数据库，然后将完成的数据库导入到 iOS
    Swift iPad 应用中供后续使用。有一些用于 SQLite 的开源和商业数据库编辑器。我选择使用 Firefox 中的 SQLite Manager，因为它是免费的（在所有支持的平台上）且轻量级。它是一个
    Firefox 插件，可以通过 Firefox 的插件界面安装。


    © Kevin Languedoc 2016 [11]

    K. Languedoc，《使用 Swift 和 SQLite 构建 iOS 数据库应用》，DOI 10.1007/978-1-4842-2232-4_2

    第 2 章 ■ 创建 SQLite 数据库


    本章的第二部分将专注于通过正在运行的 iOS 应用创建数据库。我将扩展本书中正在创建的 iPad 应用，以制作自己的数据库管理器应用。这包括在 `Db Mgr`
    应用中创建一个 SQLite 数据库，该应用将在下一章中构建。


    ### 启动 SQLite Manager


    一旦通过插件库安装了 SQLite Manager，你就可以从 Firefox 的 `工具` 菜单中启动它。图 2-1 显示了 Firefox `工具` 菜单中的
    SQLite Manager 菜单项。


    ![](img/image26.jpg)


    **图 2-1.** Firefox 中的 SQLite Manager 菜单


    ### SQLite Manager 菜单


    除了各种菜单选项外，SQLite Manager 还有一个快速访问菜单，列出了你可以在 SQLite 数据库上执行的主要操作。在每个菜单选项下，你可以创建、删除、重命名和修改列出的数据库元素。在
    `数据库` 菜单下，除了创建、修改、索引、重新索引、附加和分离数据库外，你还可以压缩数据库和创建内存数据库。该应用还提供分析数据库的选项。


    图 2-2 展示了 SQLite Manager 工具栏的视觉效果。你可以选择创建新的数据库、表和视图。你也可以打开现有的数据库。

