    \ 32760 99.976 %\n\n### Summary\n\nThis chapter is different from the other chapters\
    \ in that the focus was primarily outside of Xcode and Swift. Most of these tools\
    \ that we looked at are run in the Terminal. The `sqldiff` lets us compare two\
