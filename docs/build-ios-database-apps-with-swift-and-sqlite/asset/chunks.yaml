- fmt: "# Overview of the SQLite Backup Methods\n\nPrior to the introduction of the\
    \ Backup API, the only way to perform a backup was to make a copy. While this\
    \ is still a viable option, it does have its drawbacks, like trying to make a\
    \ copy while there is a lock on the open database, for instance. Another drawback\
    \ is if the app stops running before the copy is finished, the app would need\
    \ to delete the copy and start over. In addition to those two examples, there\
    \ are numerous ways a copy process can fail and possibly corrupt the database\
    \ files. In short, there isn’t any kind of intelligence built in to this option.\n\
    \nBut in a jam, this option will and does work. In a Swift iOS setting, your app\
    \ would need to use the Swift `FileManager` class to physically make a copy of\
    \ the database and move it off to another location. Then, you would need to figure\
    \ out how much data to keep in the database and then remove excess data from the\
    \ production database to free up space, if needed. To regain some space, you could\
    \ also run the `VACUUM` PRAGMA option.\n\n## Make a Backup Copy\n\nThe following\
    \ code snippet is an example of a possible way to perform a backup using `FileManager`.\n\
    \n1. First, you ensure that the database is closed using the `sqlite3_close` command.\n\
    2. Then, you get a handle on the file system using the `FileManager.default` property.\n\
    3. Next, you use the `copyItemAtPath` to physically make a copy of the file.\n\
    4. Then, you remove n th records from the database, if needed.\n5. Finally, you\
    \ run `VACUUM` to remove the empty space and re-index the indexes for good measure.\n\
    \n```\nfunc backupCopyDatabase(){\n    if sqlite3_close(db) == SQLITE_OK{\n  \
    \      let fileMgr = FileManager.default\n        do {\n            try fileMgr.copyItem(atPath:\
    \ self.sourcedb, toPath: self.targetdb)\n            let deleteSQL = \"DELETE\
    \ FROM main.table\"\n            if(sqlite3_exec(db, deleteSQL, nil, sqlStatement,\
    \ err) == SQLITE_OK){\n                if(sqlite3_exec(db, \"VACUUM\", nil, &sqlStatement,\
    \ &err) == SQLITE_OK){\n                    print(\"database compressed\")\n \
    \               }\n            })\n        }\n        catch let error as NSError\
    \ {\n            print(\"Backup error: \\(error)\")\n        }\n    }\n}\n```\n\
    \n## Back Up In-Memory SQLite Databases\n\nSQLite has a Backup API that can support\
    \ backups on running databases and in-memory databases. The backup works by copying\
    \ the contents from one database into another SQLite database. When the API copies\
    \ the contents from the source to the target, it will overwrite the contents in\
    \ the target, so you may need to make different copies if you need to preserve\
    \ all versions of the content. You can also restore a database in a similar fashion.\n\
    \nThe Backup API allows you to make backups while there is still a shared lock\
    \ on the source database. If you lose power or have other issues, like having\
    \ an app crash, the Backup API will remember where it left off and continue from\
    \ that point.\n\nBacking up a database using the API has three distinct steps:\n\
    \n- Initialize using `sqlite3_backup_init`.\n- Execute the backup with `sqlite3_backup_step`.\n\
    - Finally, clean up the operation using `sqlite3_backup_finish`.\n\nTo check to\
    \ see if there are still records to back up, you can use the `sqlite3_backup_remaining`\
    \ function, which returns the number of records remaining in the database. The\
    \ `sqlite3_backup_pagecount` provides the total count of pages to be backed up\
    \ in the source database.\n\nIt is important to ensure there aren’t any locks\
    \ prior to starting a backup; otherwise, SQLite will immediately return a `SQLITE_BUSY`\
    \ error. To avoid any conflicts, it is best to test to see if the database is\
    \ accessible for backup. To run these tests, the code should implement `sqlite3_busy_handler`\
    \ or `sqlite3_busy_timeout`. The former calls a callback function in the event\
    \ that an error occurs. The latter sets a timer in milliseconds in case of a lock\
    \ situation. It can be called repeatedly until the lock is removed.\n\n## Back\
    \ Up On-Disk SQLite Databases\n\n© Kevin Languedoc 2016 [175]\nK. Languedoc, *Build\
    \ iOS Database Apps with Swift and SQLite*, DOI 10.1007/978-1-4842-2232-4_11"
  raw: 'Overview of the SQLite Backup Methods Prior to the introduction of the Backup
    API, the only way to perform a backup was to make a copy. While this is still
    a viable option, it does have its drawbacks, like trying to make a copy while
    there is a lock on the open database, for instance. Another drawback is if the
    app stops running before the copy is finished, the app would need to delete the
    copy and start over. In addition to those two examples, there are numerous ways
    a copy process can fail and possibly corrupt the database files. In short, there
    isn’t any kind of intelligence built in to this option.


    But in a jam, this option will and does work. In a Swift iOS setting, your app
    would need to use the Swift FileManager class to physically make a copy of the
    database and move it off to another location. Then, you would need to figure out
    how much data to keep in the database and then remove excess data from the production
    database to free up space, if needed. To regain some space, you could also run
    the VACUUM PRAGMA option.


    Make a Backup Copy


    The following code snippet is an example of a possible way to perform a backup
    using FileManager .


    1. First, you ensure that the database is closed using the sqlite3_close command.
    2. Then, you get a handle on the file system using the FileManager.


    defaultManager property.


    3. Next, you use the copyItemAtPath to physically make a copy of the file. 4.
    Then, you remove n th records from the database, if needed. 5. Finally, you run
    VACUUM to remove the empty space and re-index the indexes for


    good measure.


    © Kevin Languedoc 2016 [175]


    K. Languedoc, Build iOS Database Apps with Swift and SQLite , DOI 10.1007/978-1-4842-2232-4_11
    CHAPTER 11 ■ BACKING UP SQLITE DATABASES


    func backupCopyDatabase(){


    if sqlite3_close(db) == SQLITE_OK{


    let fileMgr = FileManager.default


    do {


    try fileMgr.copyItem(atPath: self.sourcedb, toPath: self.targetdb)


    let deleteSQL = "DELETE FROM main.table"


    if(sqlite3_exec(db, deleteSQL, nil, sqlStatement, err) == SQLITE_OK){


    if(sqlite3_exec(db, "VACUUM", nil, &sqlStatement, &err) == SQLITE_OK){


    print("database compressed")


    }


    })


    }


    catch let error as NSError {


    print("Backup error: \(error)")


    }


    }


    }


    Back Up In-Memory SQLite Databases


    SQLite has a Backup API that can support backups on running databases and in-memory
    databases . The backup works by copying the contents from one database into another
    SQLite database. When the API copies the contents from the source to the target,
    it will overwrite the contents in the target, so you may need to make different
    copies if you need to preserve all versions of the content. You can also restore
    a database in a similar fashion.


    The Backup API allows you to make backups while there is still a shared lock on
    the source database. If you lose power or have other issues, like having an app
    crash, the Backup API will remember where it left off and continue from that point.


    Backing up a database using the API has three distinct steps:


    • Initialize using sqlite3_backup_init .


    • Execute the backup with sqlite3_backup_step .


    • Finally, clean up the operation using sqlite3_backup_finish .


    To check to see if there are still records to back up, you can use the sqlite3_backup_remaining
    function, which returns the number of records remaining in the database. The sqlite3_backup_pagecount
    provides the total count of pages to be backed up in the source database.


    It is important to ensure there aren’t any locks prior to starting a backup; otherwise,
    SQLite will immediately return a SQLITE_BUSY error. To avoid any conflicts, it
    is best to test to see if the database is accessible for backup. To run these
    tests, the code should implement sqlite3_busy_handler or sqlite3_ busy_timeout
    .


    CHAPTER 11 ■ BACKING UP SQLITE DATABASES


    The former calls a callback function in the event that an error occurs. The latter
    sets a timer in milliseconds in case of a lock situation. It can be called repeatedly
    until the lock is removed. Back Up On-Disk SQLite Databases'
  trans: "\n# SQLite 备份方法概述\n\n在备份 API 引入之前，执行备份的唯一方法是制作副本。虽然这仍然是一种可行的选择，但它也有其缺点，例如在打开的数据库被锁定时尝试制作副本。另一个缺点是，如果应用在复制完成前停止运行，则应用需要删除副本并重新开始。除了这两个例子外，复制过程还可能因多种方式失败并可能损坏数据库文件。简而言之，此选项没有任何内置智能功能。\n\
    \n但在紧急情况下，此选项确实能起作用。在 Swift iOS 环境中，你的应用需要使用 Swift 的 `FileManager` 类来物理复制数据库并将其移动到其他位置。然后，你需要确定数据库中要保留多少数据，并从生产数据库中移除多余数据以释放空间（如果需要）。为了回收一些空间，你也可以运行\
    \ `VACUUM` PRAGMA 选项。\n\n## 制作备份副本\n\n以下代码片段是一个使用 `FileManager` 执行备份的可能示例。\n\n\
    1. 首先，确保使用 `sqlite3_close` 命令关闭数据库。\n2. 然后，使用 `FileManager.default` 属性获取文件系统的句柄。\n\
    3. 接下来，使用 `copyItemAtPath` 物理复制文件。\n4. 然后，根据需要从数据库中删除第 n 条记录。\n5. 最后，运行 `VACUUM`\
    \ 以移除空空间并重新建立索引以确保万无一失。\n\n```\nfunc backupCopyDatabase(){\n    if sqlite3_close(db)\
    \ == SQLITE_OK{\n        let fileMgr = FileManager.default\n        do {\n   \
    \         try fileMgr.copyItem(atPath: self.sourcedb, toPath: self.targetdb)\n\
    \            let deleteSQL = \"DELETE FROM main.table\"\n            if(sqlite3_exec(db,\
    \ deleteSQL, nil, sqlStatement, err) == SQLITE_OK){\n                if(sqlite3_exec(db,\
    \ \"VACUUM\", nil, &sqlStatement, &err) == SQLITE_OK){\n                    print(\"\
    database compressed\")\n                }\n            })\n        }\n       \
    \ catch let error as NSError {\n            print(\"Backup error: \\(error)\"\
    )\n        }\n    }\n}\n```\n\n## 备份内存中的 SQLite 数据库\n\nSQLite 有一个备份 API，可以支持对正在运行的数据库和内存数据库进行备份。备份的工作原理是将内容从一个数据库复制到另一个\
    \ SQLite 数据库。当 API 将内容从源数据库复制到目标数据库时，它会覆盖目标数据库中的内容，因此如果需要保留所有版本的内容，你可能需要制作不同的副本。你也可以以类似的方式恢复数据库。\n\
    \n备份 API 允许你在源数据库上仍有共享锁时进行备份。如果你断电或遇到其他问题（例如应用崩溃），备份 API 将记住它停止的位置并从该点继续。\n\n\
    使用 API 备份数据库包含三个不同的步骤：\n\n- 使用 `sqlite3_backup_init` 进行初始化。\n- 使用 `sqlite3_backup_step`\
    \ 执行备份。\n- 最后，使用 `sqlite3_backup_finish` 清理操作。\n\n要检查是否还有记录需要备份，可以使用 `sqlite3_backup_remaining`\
    \ 函数，该函数返回数据库中剩余的记录数。`sqlite3_backup_pagecount` 提供了源数据库中待备份的总页数。\n\n确保在开始备份之前没有任何锁是很重要的；否则，SQLite\
    \ 会立即返回 `SQLITE_BUSY` 错误。为避免任何冲突，最好测试数据库是否可访问以进行备份。要运行这些测试，代码应实现 `sqlite3_busy_handler`\
    \ 或 `sqlite3_busy_timeout`。前者在发生错误时调用回调函数。后者在发生锁定的情况下设置一个以毫秒为单位的计时器。它可以被重复调用直到锁被解除。\n\
    \n## 备份磁盘上的 SQLite 数据库\n\n© Kevin Languedoc 2016 [175]\nK. Languedoc, *《使用 Swift\
    \ 和 SQLite 构建 iOS 数据库应用》*, DOI 10.1007/978-1-4842-2232-4_11\n"
- fmt: '# Backing Up SQLite Databases


    Backing up on disk is similar to the first option, but uses the SQLite API. With
    this option, the app is actually moving data from the source database to the target
    database. Both databases are physical files. In theory, the target database could
    be on a remote server or in the same `Document` directory as the source.


    The on-disk operation uses four different functions to perform the backup:

    - `sqlite3_backup_init`

    - `sqlite3_backup_step`

    - `sqlite3_sleep`

    - `sqlite3_backup_remaining`

    - `sqlite3_backup_pagecount`

    - `sqlite_backup_finish`


    `sqlite3_backup_init` is called to create the `sqlite3_backup` object. The function
    takes a source database pointer and a target database pointer as arguments. Either
    one of these pointers can be for an in-memory database and the other for a physical
    database, or both can be physical database pointers.


    The next operation is the `sqlite3_backup_step` function, which is repeatedly
    called to copy the *n*th number of pages specified in argument 5 to the target
    database. At the end of each iteration, the app needs to call `sqlite3_sleep`,
    which freezes the process for 250 ms in order for the write process to complete.
    `sqlite3_backup_remaining` returns the remaining amount of pages in the database
    after the `sqlite3_backup_step` function has executed. I usually call the `sqlite3_backup_pagecount`
    function at the beginning of the process to determine how many pages are in the
    database, as the sample will demonstrate later in this chapter, and then call
    the `sqlite3_backup_remaining` function after each iteration.


    Once the source database is completely backed up, the `sqlite3_backup_finish`
    function is called to clean up the resources allocated with the `sqlite3_backup_init`
    function.


    ## The Backup App


    To demonstrate the various APIs for backup, I will create a single-view iOS iPhone
    app. The app will implement two methods for the SQLite Backup APIs in addition
    to `backupCopyDatabase` from earlier.


    I am using a copy of the Chinook database (https://chinookdatabase.codeplex.com/)
    for sample data. You will need to import the database into the project if you
    intend to try out the code. To make the database writeable, it needs to be copied
    into the `Documents` directory, so add the method `copyDatabaseIntoDocuments`
    to the project.


    Figure 11-1 shows the second screen, in which you enter a name for the Single
    View Application project. For this example, I will name the project `BackupSQLite`.
    The language is Swift, of course, and the target device is iPhone. You can leave
    the other options as is.


    ![](media/image192.jpg)


    *Figure 11-1. The Backup Project: Single View Template*


    As we will be working with SQLite databases and the SQLite Backup API, we will
    need to create a bridge, as usual. Select the Objective-C File template and click
    Next to move to the next screen, where you will need to specify a name for the
    bridge and the file type, which should be Category (Figure 11-2). Choosing this
    option will initiate Xcode, which will request to create the bridge file for you
    and set up the Swift Build settings.


    ![](media/image191.jpg)


    *Figure 11-2. The bridge interface*


    Figure 11-3 provides a screenshot of the options for the bridge file. The first
    field is for the name of the file. In this case it is `BackupBridge`. Selecting
    the Category file type will trigger the Create Bridge interface once the file
    is saved to the project.


    ![](media/image194.jpg)


    *Figure 11-3. The BackupBridge file*


    Figure 11-4 shows the interface that allows Xcode to set up the bridge file and
    adds the setting to the Build settings.


    ![](media/image193.jpg)


    *Figure 11-4. The Create Bridge Header interface*


    Figure 11-5 provides a visual of the Swift Compiler Build settings that are automatically
    configured by the Objective-C bridge setup process.


    ![](media/image198.jpg)


    ![](media/image197.jpg)


    ![](media/image196.jpg)


    *Figure 11-5. The Swift Compiler Build settings*'
