- fmt: "The `BINARY` collation sequence algorithm uses the `memcmp()` C function to\
    \ compare two text values regardless of string encoding. `memcmp()` compares the\
    \ first byte-area size of two strings. The `BINARY` collate option uses comparison\
    \ operators (`==`, `<`, `>`, `!=`, `IS`, `IS NOT`, `=>`, `<=`) to compare two\
    \ values. `N o C a s e`\n\nThe `NoCase` collation sequence type compares two text\
    \ values by converting the 26 ASCII uppercase characters into their lowercase\
    \ equivalents. Note that it only compares ASCII because full UTF conversion would\
    \ make the tables manageable.\n\n`R t r i m`\n\nLastly, the `RTRIM` type is the\
    \ same as `BINARY` except that it first trims any trailing spaces to the text\
    \ values to be compared.\n\nTo use the collating sequence, you would add `COLLATE`\
    \ to the column definition; for example:\n```\nCREATE TABLE Strings(\n  Id INTEGER\
    \ PRIMARY KEY,\n  String1, //defaults to binary\n  String2 COLLATE BINARY,\n \
    \ String3 COLLATE NOCASE,\n  String4 COLLATE RTRIM\n)\n```\n\n`sqlite3_create_collation`\n\
    \nOf course, you can create your own collation sequence by implementing the `sqlite3_create_collation`\
    \ function. The function has three variants, whose logic is provided here:\n```\n\
    int sqlite3_create_collation(\n  sqlite3*,\n  const char *zName,\n  int eTextRep,\n\
    \  void *pArg,\n  int(*xCompare)(void*,int,const void*,int,const void*)\n);\n\
    ```\n\nThe `sqlite3_create_collation` has five arguments. The first is the pointer\
    \ to the database connection. In Swift this is represented by a `COpaquePointer`.\
    \ The second argument, `const char *zName`, is the name of the collation sequence\
    \ module. The third, `eTextRep`, is the text encoding of the string callback function\
    \ and must implement one of the following types:\n\n- `SQLITE_UTF8`\n- `SQLITE_UTF16LE`\n\
    - `SQLITE_UTF16BE`\n- `SQLITE_UTF16`\n- `SQLITE_UTF16_ALIGNED`\n\nThe next argument,\
    \ `*pArg`, is an application pointer for the first argument of the callback function.\
    \ The last argument is the callback function. `sqlite3_create_collation_v2` is\
    \ similar to the first except that it provides a `Destroy` argument, and `sqlite3_create_collation16`\
    \ provides the functionality to create collation sequences in a native 16 bits.\
    \ See the following:\n\n```\nint sqlite3_create_collation_v2(\n  sqlite3*,\n \
    \ const char *zName,\n  int eTextRep,\n  void *pArg,\n  int(*xCompare)(void*,int,const\
    \ void*,int,const void*),\n  void(*xDestroy)(void*)\n);\n```\n\n```\nint sqlite3_create_collation16(\n\
    \  sqlite3*,\n  const void *zName,\n  int eTextRep,\n  void *pArg,\n  int(*xCompare)(void*,int,const\
    \ void*,int,const void*)\n);\n```\n\nAll three functions can add, modify, and\
    \ delete collation sequences from a SQLite database. In Swift these functions\
    \ are implemented in the `sqlite3.h` header file as follows: `sqlite3_collation_needed`,\
    \ `sqlite3_collation_needed16`. They both take the same arguments as the versions\
    \ in C. These functions are abbreviated versions of the former functions and are\
    \ accessible as well through the standard SQLite C API. You would need to define\
    \ these functions as `COpaquePointers`, `UnsafeMutablePointer`, `Int32`, and `UnsafePointer<Int8>`\
    \ respectively. For the 16-bit version, the last argument would be a 16-bit `UnsafePointer`\
    \ rather than an `UnsafePointer<Int8>`.\n\n## The SQLite DELETE Statement\n\n\
    Deleting elements from a SQLite database is implemented through the SQL `DROP`\
    \ function. You can use the `DROP` function to remove tables, views, indexes,\
    \ and triggers. When you drop a table or an index, the `sqlite_master` table is\
    \ updated accordingly. For the views and triggers, you need to execute a `DELETE`\
    \ record on the table.\n\nThe `DROP` statements are provided next and can be used\
    \ as is through the DB Mgr app by entering the `DROP` function followed by the\
    \ schema element to remove and the name of the element. Once you click on the\
    \ Execute button, the element will be removed from the database. Removing or dropping\
    \ a table will delete any data that is in that table. Of course, the database\
    \ needs to be open first.\n\n### Deleting Tables\n\n```\nDROP TABLE schema.table_name\n\
    ```\n\n### Deleting Views\n\n```\nDROP VIEW schema.view_name\n```\n\n### Deleting\
    \ Indices\n\n```\nDROP INDEX schema.index_name\n```\n\n### Deleting Triggers\n\
    \n```\nDROP TRIGGER schema.trigger_name\n```\n\n### Deleting Collation Sequences\n\
    \nCustom collation functions are deleted when you invoke the `Destroy` argument\
    \ or when the database connection is closed using the `sqlite3_close` function.\n\
    \n## SQLite Functions\n\nUnlike other relational database engines, SQLite doesn’t\
    \ provide an API to create stored procedures, also known as SPROCS. However, you\
    \ can define your own functions in addition to using the built-in functions in\
    \ SQLite.\n\nSQLite has several built-in functions that can be categorized as\
    \ follows:\n\n- Core functions\n- Aggregate functions\n- Date/time functions\n\
    - JSON functions\n- Standard functions\n\nCore functions include functions `abs`,\
    \ `coalesce`, `ifnull`, `instr`, `glob`, `like`, and `length`. They make up the\
    \ core functionality of the SQLite platform. The Aggregate functions, as the name\
    \ implies, provide functions like `count`, `avg`, `min`, `max`, `total`, and `sum`,\
    \ among others. The Date/time functions allow you to obtain and manipulate date\
    \ and time values. These functions include `date`, `time`, `datetime`, `juliandate`,\
    \ date modifiers, and operators. For example, you can get the current date as\
    \ follows:\n\n```\nSELECT date('now')\n```\n\n```\nSELECT date('now', 'YYYY-MM-DD')\n\
    ```\n\n```\nSELECT date('now', 'MMM/dd/YYYY', '-1 day')\n```\n\n```\nSELECT date('now',\
    \ 'MM-dd-yyyy', '-1month', '+7 days', '+1 year')\n```\n\n## The JSON Extension\n\
    \nThe JSON functions, officially known as the json1 extension, are a fairly new\
    \ addition to SQLite. They aren’t available with the standard API. You need to\
    \ install them manually if you need to use them. These functions are loaded at\
    \ run-time. Using the JSON functions, you can store and parse data in the JSON\
    \ format. The extension includes the functions listed here:\n\n- `Json(json)`\n\
    - `Json_array`\n- `Json_array_length(json)`\n- `Json_array_length(json.path)`\n\
    - `Json_extract`\n- `Json_insert`\n- `Json_object`\n- `Json_replace`\n- `Json_remove`\n\
    - `Json_set`\n- `Json_type(json)`\n- `Json_type(json, path)`\n- `Json_valid`\n\
    - `Json_group_array`\n- `Json_group_object`\n- `Json_each`\n- `Json_tree`\n\n\
    The JSON functions that have `json` as a first parameter must be a valid JSON\
    \ object, a number, a string, or a null value. Number and Null are interpreted\
    \ as SQLite data types. The `PATH` argument must be a valid, well-formed path\
    \ value that begins with `$`.\n\nTo load the json1 extension, you need to implement\
    \ the loadable interface using `sqlite3_load_extension`, which is available in\
    \ the C API through the bridge. You also have the `sqlite3_enable_load_extension`,\
    \ which can disable the loading of extensions to prevent security leaks. See the\
    \ following:\n\n```\nsqlite3_load_extension(\n  db: COpaquePointer,\n  zFile:\
    \ UnsafePointer<Int8>,\n  zProc: UnsafePointer<Int8>,\n  pzErrMsg: UnsafeMutablePointer<UnsafeMutablePointer<Int8>>\n\
    )\n```\n\n```\nsqlite3_enable_load_extension(\n  db: COpaquePointer,\n  onoff:\
    \ Int32\n)\n```\n\nThe extension functions must be called when the database is\
    \ open and running so that the extensions can be loaded as needed.\n\nThe first\
    \ argument is the pointer to the SQLite database engine. The second argument is\
    \ the file for the shared library. For the json1 extension, the file is not included\
    \ in the default `sqlite3.dylib` library. The third argument is the entry point\
    \ for the extension, while the fourth is a pointer for the error message:\n```\n\
    var db: COpaquePointer? = nil\nlet lib_file: UnsafePointer<Int8>? = nil\nlet proc:\
    \ UnsafePointer<Int8>? = nil\nlet err_json_msg: UnsafeMutablePointer<UnsafeMutablePointer<Int8>>?\
    \ = nil\nfunc load_extension() -> Void {\n  sqlite3_load_extension(db, lib_file,\
    \ proc, err_json_msg)\n}\n```"
  raw: 'The BINARY collation sequence algorithm uses the memcmp() C function to compare
    two text values regardless of string encoding. memcmp() compares the first byte-area
    size of two strings. The BINARY collate option uses comparison operators ( ==,
    <, >, !=, IS, IS NOT, =>, <= ) to compare two values. N o C a s e


    The NoCase collation sequence type compares two text values by converting the
    26 ASCII uppercase characters into their lowercase equivalents. Note that it only
    compares ASCII because full UTF conversion would make the tables manageable.


    R t r i m


    Lastly, the RTRIM type is the same as BINARY except that it first trims any trailing
    spaces to the text values to be compared.


    To use the collating sequence, you would add COLLATE to the column definition;
    for example: CREATE TABLE Strings(


    Id INTEGER PRIMARY KEY,


    String1, //defaults to binary


    String2 COLLATE BINARY,


    String3 COLLATE NOCASE,


    String4 COLLATE RTRIM


    )


    sqlite3_create_collation


    Of course, you can create your own collation sequence by implementing the sqlite3_create_collation
    function . The function has three variants, whose logic is provided here: int
    sqlite3_create_collation(


    sqlite3,


    const char *zName,


    int eTextRep,


    void *pArg,


    int(*xCompare)(void*,int,const void*,int,const void*) );


    The sqlite3_create_collation has five arguments. The first is the pointer to the
    database connection. In Swift this is represented by a COpaquePointer . The second
    argument, const char *zName , is the name of the collation sequence module. The
    third, eTextRep , is the text encoding of the string callback function and must
    implement one of the following types:


    • SQLITE_UTF8


    • SQLITE_UTF16LE


    • SQLITE_UTF16BE


    • SQLITE_UTF16


    • SQLITE_UTF16_ALIGNED


    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    The next argument, *pArg , is an application pointer for the first argument of
    the callback function. The last argument is the callback function. sqlite3_create_collation_v2
    is similar to the first except that it provides a Destroy argument, and sqlite3_create_collation16
    provides the functionality to create collation sequences in a native 16 bits.
    See the following:


    int sqlite3_create_collation_v2(


    sqlite3*,


    const char *zName,


    int eTextRep,


    void *pArg,


    int(*xCompare)(void*,int,const void*,int,const void*), void(*xDestroy)(void*)


    );


    int sqlite3_create_collation16(


    sqlite3*,


    const void *zName,


    int eTextRep,


    void *pArg,


    int(*xCompare)(void*,int,const void*,int,const void*) );


    All three functions can add, modify, and delete collation sequences from a SQLite
    database. In Swift these functions are implemented in the sqlite3.h header file
    as follows: sqlite3_collation_needed


    sqlite3_collation_needed16


    They both take the same arguments as the versions in C. These functions are abbreviated
    versions of the former functions and are accessible as well through the standard
    SQLite C API. You would need to define these functions as COpaquePointers , UnsafeMutablePointer
    , Int32 , and UnsafePointer<Int8 > respectively. For the 16-bit version, the last
    argument would be a 16-bit UnsafePointer rather than an UnsafePointer<Int8 > .
    The SQLite DELETE Statement


    Deleting elements from a SQLite database is implemented through the SQL DROP function.
    You can use the DROP function to remove tables, views, indexes, and triggers.
    When you drop a table or an index, the sqlite_master table is updated accordingly.
    For the views and triggers, you need to execute a DELETE record on the table.


    The DROP statements are provided next and can be used as is through the DB Mgr
    app by entering the DROP function followed by the schema element to remove and
    the name of the element. Once you click on the Execute button, the element will
    be removed from the database. Removing or dropping a table will delete any data
    that is in that table. Of course, the database needs to be open first. Deleting
    Tables


    DROP TABLE schema.table_name


    Deleting Views


    DROP VIEW schema.view_name


    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    Deleting Indices


    DROP INDEX schema.index_name


    Deleting Triggers


    DROP TRIGGER schema.trigger_name


    Deleting Collation Sequences


    Custom collation functions are deleted when you invoke the Destroy argument or
    when the database connection is closed using the sqlite3_close function.


    SQLite Functions


    Unlike other relational database engines, SQLite doesn’t provide an API to create
    stored procedures, also known as SPROCS. However, you can define your own functions
    in addition to using the built-in functions in SQLite.


    SQLite has several built-in functions that can be categorized as follows: • Core
    functions


    • Aggregate functions


    • Date/time functions


    • JSON functions


    • Standard functions


    Core functions include functions abs , coalesce , ifnull , instr , glob , like
    , and length . They make up the core functionality of the SQLite platform. The
    Aggregate functions, as the name implies, provide functions like count , avg ,
    min , max , total , and sum , among others. The Date/time functions allow you
    to obtain and manipulate date and time values. These functions include date ,
    time , datetime , juliandate , date modifiers, and operators. For example, you
    can get the current date as follows: SELECT date(''now'')


    SELECT date(''now'', ''YYYY-MM-DD'')


    SELECT date(''now'', ''MMM/dd/YYYY'', ''-1 day'')


    SELECT date(''now'', ''MM-dd-yyyy'', ''-1month'', ''+7 days'', ''+1 year'') The
    JSON Extension


    The JSON functions , officially known as the json1 extension, are a fairly new
    addition to SQLite. They aren’t available with the standard API. You need to install
    them manually if you need to use them. These functions are loaded at run-time.
    Using the JSON functions, you can store and parse data in the JSON format. The
    extension includes the functions listed here:


    • Json(json)


    • Json_array


    • Json_array_length(json)


    CHAPTER 4 ■ ALTERING DATABASES AND OTHER FEATURES


    • Json_array_length(json. Path)


    • Json_extract


    • Json_insert


    • Json_object


    • Json_replace


    • Json_remove


    • Json_set


    • Json_type(json)


    • Json_type(json, path)


    • Json_valid


    • Json_group_array


    • Json_group_object


    • Json_each


    • Json_tree


    The JSON functions that have json as a first parameter must be a valid JSON object,
    a number, a string, or a null value. Number and Null are interpreted as SQLite
    data types. The PATH argument must be a valid, well-formed path value that begins
    with $ .


    To load the json1 extension, you need to implement the loadable interface using
    sqlite3_load_ extension, which is available in the C API through the bridge. You
    also have the sqlite3_enable_load_ extension , which can disable the loading of
    extensions to prevent security leaks. See the following: sqlite3_load_extension
    (db: COpaquePointer,zFile: UnsafePointer<Int8>, zProc: UnsafePointer<Int8>, pzErrMsg:UnsafeMutablePointer<UnsafeMutablePointer<Int8>>)
    sqlite3_enable_load_extension (db: COpaquePointer, onoff: Int32)


    The extension functions must be called when the database is open and running so
    that the extensions can be loaded as needed.


    The first argument is the pointer to the SQLite database engine. The second argument
    is the file for the shared library. For the json1 extension, the file is not included
    in the default sqlite3.dylib library. The third argument is the entry point for
    the extension, while the fourth is a pointer for the error message: var db:COpaquePointer?=nil


    let lib_file: UnsafePointer<Int8>? = nil


    let proc: UnsafePointer<Int8>?=nil


    let err_json_msg:UnsafeMutablePointer<UnsafeMutablePointer<Int8>>? = nil func
    load_extension()->Void{


    sqlite3_load_extension(db, lib_file, proc, err_json_msg)


    }'
  trans: "\n`BINARY` 排序序列算法使用 `memcmp()` C 函数来比较两个文本值，与字符串编码无关。`memcmp()` 会比较两个字符串的第一个字节区域大小。`BINARY`\
    \ 排序选项使用比较运算符（`==`、`<`、`>`、`!=`、`IS`、`IS NOT`、`=>`、`<=`）来比较两个值。`N o C a s e`\n\
    \n`NoCase` 排序序列类型通过将 26 个大写 ASCII 字符转换为对应的小写字母来比较两个文本值。请注意，它仅比较 ASCII 字符，因为完整的\
    \ UTF 转换会使表难以管理。\n\n`R t r i m`\n\n最后，`RTRIM` 类型与 `BINARY` 相同，区别在于它会先修剪文本值中所有尾随的空格，然后再进行比较。\n\
    \n要使用排序序列，您需要将 `COLLATE` 添加到列定义中；例如：\n```\nCREATE TABLE Strings(\n  Id INTEGER\
    \ PRIMARY KEY,\n  String1, //默认为 binary 排序\n  String2 COLLATE BINARY,\n  String3\
    \ COLLATE NOCASE,\n  String4 COLLATE RTRIM\n)\n```\n\n`sqlite3_create_collation`\n\
    \n当然，您也可以通过实现 `sqlite3_create_collation` 函数来创建自己的排序序列。该函数有三个变体，其逻辑如下所示：\n```\n\
    int sqlite3_create_collation(\n  sqlite3*,\n  const char *zName,\n  int eTextRep,\n\
    \  void *pArg,\n  int(*xCompare)(void*,int,const void*,int,const void*)\n);\n\
    ```\n\n`sqlite3_create_collation` 有五个参数。第一个参数是指向数据库连接的指针。在 Swift 中，它由 `COpaquePointer`\
    \ 表示。第二个参数 `const char *zName` 是排序序列模块的名称。第三个参数 `eTextRep` 是字符串回调函数的文本编码，并且必须实现以下类型之一：\n\
    \n- `SQLITE_UTF8`\n- `SQLITE_UTF16LE`\n- `SQLITE_UTF16BE`\n- `SQLITE_UTF16`\n\
    - `SQLITE_UTF16_ALIGNED`\n\n下一个参数 `*pArg` 是一个应用程序指针，用于回调函数的第一个参数。最后一个参数是回调函数。`sqlite3_create_collation_v2`\
    \ 与第一个类似，区别在于它提供了一个 `Destroy` 参数，而 `sqlite3_create_collation16` 提供了创建原生 16 位排序序列的功能。请参见下文：\n\
    \n```\nint sqlite3_create_collation_v2(\n  sqlite3*,\n  const char *zName,\n \
    \ int eTextRep,\n  void *pArg,\n  int(*xCompare)(void*,int,const void*,int,const\
    \ void*),\n  void(*xDestroy)(void*)\n);\n```\n\n```\nint sqlite3_create_collation16(\n\
    \  sqlite3*,\n  const void *zName,\n  int eTextRep,\n  void *pArg,\n  int(*xCompare)(void*,int,const\
    \ void*,int,const void*)\n);\n```\n\n这三个函数都可以在 SQLite 数据库中添加、修改和删除排序序列。在 Swift\
    \ 中，这些函数在 `sqlite3.h` 头文件中实现如下：`sqlite3_collation_needed`、`sqlite3_collation_needed16`。它们都接受与\
    \ C 版本相同的参数。这些函数是前面函数的简化版本，并且也可以通过标准的 SQLite C API 访问。您需要将这些函数分别定义为 `COpaquePointers`、`UnsafeMutablePointer`、`Int32`\
    \ 和 `UnsafePointer<Int8>`。对于 16 位版本，最后一个参数将是 16 位的 `UnsafePointer`，而不是 `UnsafePointer<Int8>`。\n\
    \n## SQLite DELETE 语句\n\n从 SQLite 数据库中删除元素是通过 SQL `DROP` 函数实现的。您可以使用 `DROP` 函数删除表、视图、索引和触发器。当您删除表或索引时，`sqlite_master`\
    \ 表会相应更新。对于视图和触发器，您需要在表上执行一条 `DELETE` 记录。\n\n`DROP` 语句如下所示，可以直接通过 DB Mgr 应用程序使用，方法是输入\
    \ `DROP` 函数，后跟要删除的模式元素及其名称。单击“执行”按钮后，该元素将从数据库中移除。删除或丢弃一个表将删除该表中的所有数据。当然，数据库需要先处于打开状态。\n\
    \n### 删除表\n\n```\nDROP TABLE schema.table_name\n```\n\n### 删除视图\n\n```\nDROP VIEW\
    \ schema.view_name\n```\n\n### 删除索引\n\n```\nDROP INDEX schema.index_name\n```\n\
    \n### 删除触发器\n\n```\nDROP TRIGGER schema.trigger_name\n```\n\n### 删除排序序列\n\n当您调用\
    \ `Destroy` 参数或使用 `sqlite3_close` 函数关闭数据库连接时，自定义排序函数将被删除。\n\n## SQLite 函数\n\n\
    与其他关系型数据库引擎不同，SQLite 不提供创建存储过程（也称为 SPROCS）的 API。但是，除了使用 SQLite 的内置函数外，您还可以定义自己的函数。\n\
    \nSQLite 有几个内置函数，可以分类如下：\n\n- 核心函数\n- 聚合函数\n- 日期/时间函数\n- JSON 函数\n- 标准函数\n\n核心函数包括\
    \ `abs`、`coalesce`、`ifnull`、`instr`、`glob`、`like` 和 `length`。它们构成了 SQLite 平台的核心功能。顾名思义，聚合函数提供了诸如\
    \ `count`、`avg`、`min`、`max`、`total` 和 `sum` 等功能。日期/时间函数允许您获取和操作日期和时间值。这些函数包括 `date`、`time`、`datetime`、`juliandate`、日期修饰符和运算符。例如，您可以按如下方式获取当前日期：\n\
    \n```\nSELECT date('now')\n```\n\n```\nSELECT date('now', 'YYYY-MM-DD')\n```\n\
    \n```\nSELECT date('now', 'MMM/dd/YYYY', '-1 day')\n```\n\n```\nSELECT date('now',\
    \ 'MM-dd-yyyy', '-1month', '+7 days', '+1 year')\n```\n\n## JSON 扩展\n\nJSON 函数，官方称为\
    \ json1 扩展，是 SQLite 中一个相当新的补充。标准的 API 中不提供这些函数。如果您需要使用它们，则需要手动安装。这些函数在运行时加载。使用\
    \ JSON 函数，您可以以 JSON 格式存储和解析数据。该扩展包括此处列出的函数：\n\n- `Json(json)`\n- `Json_array`\n\
    - `Json_array_length(json)`\n- `Json_array_length(json.path)`\n- `Json_extract`\n\
    - `Json_insert`\n- `Json_object`\n- `Json_replace`\n- `Json_remove`\n- `Json_set`\n\
    - `Json_type(json)`\n- `Json_type(json, path)`\n- `Json_valid`\n- `Json_group_array`\n\
    - `Json_group_object`\n- `Json_each`\n- `Json_tree`\n\n将 `json` 作为第一个参数的 JSON\
    \ 函数必须是一个有效的 JSON 对象、数字、字符串或空值。数字和空值被解释为 SQLite 数据类型。`PATH` 参数必须是一个有效的、格式良好的路径值，且以\
    \ `$` 开头。\n\n要加载 json1 扩展，您需要使用 `sqlite3_load_extension` 实现可加载接口，该接口可通过桥接在 C API\
    \ 中使用。您还可以使用 `sqlite3_enable_load_extension`，它可以禁用扩展的加载以防止安全泄漏。请参见下文：\n\n```\n\
    sqlite3_load_extension(\n  db: COpaquePointer,\n  zFile: UnsafePointer<Int8>,\n\
    \  zProc: UnsafePointer<Int8>,\n  pzErrMsg: UnsafeMutablePointer<UnsafeMutablePointer<Int8>>\n\
    )\n```\n\n```\nsqlite3_enable_load_extension(\n  db: COpaquePointer,\n  onoff:\
    \ Int32\n)\n```\n\n必须在数据库打开并运行时调用这些扩展函数，以便根据需要加载扩展。\n\n第一个参数是指向 SQLite 数据库引擎的指针。第二个参数是共享库的文件。对于\
    \ json1 扩展，该文件未包含在默认的 `sqlite3.dylib` 库中。第三个参数是扩展的入口点，第四个参数是错误消息的指针：\n```\nvar\
    \ db: COpaquePointer? = nil\nlet lib_file: UnsafePointer<Int8>? = nil\nlet proc:\
    \ UnsafePointer<Int8>? = nil\nlet err_json_msg: UnsafeMutablePointer<UnsafeMutablePointer<Int8>>?\
    \ = nil\nfunc load_extension() -> Void {\n  sqlite3_load_extension(db, lib_file,\
    \ proc, err_json_msg)\n}\n```\n"
- fmt: '**注意：** iOS 10 中的`sqlite3`动态库不包含`json1`扩展，该扩展引用了`sqlite3.h`文件。你可以尝试通过下载`sqlite3`源代码并从`ext/misc`目录中提取`sqlite3.c`文件来添加它。然后你需要将其添加到你的项目中，但这可能会与
    iOS 中现有的`sqlite3`库产生冲突。另一种方法是编译一个新的静态 Objective-C 扩展（`.h`），并从`sqlite3`源代码中将`sqlite3.h`和`sqlite3.c`文件添加到你的项目中。然后，你需要将`sqlite3.h`文件导入到
    Objective-C 扩展（头文件）中。接下来，你需要创建一个新的桥接头文件，并将其添加到 Swift 编译器桥接配置中。


    我已经创建了一个参考项目，该项目使用了实际代码中的`sqlite3.c`和`sqlite3.h`文件，而不是 Xcode 支持的`sqlite3.dylib`库。


    该项目在 GitHub 上（https://github.com/kevlangdo/load_sqlite_json_extension ），并且是实验性的。我没有测试过它，它也不在本书的讨论范围内，但它给出了一个如何在
    iOS 项目中加载`json`扩展的示例。


    ## 使用 Swift 创建函数


    除了 API 和扩展附带的 SQLite 函数外，你还可以创建自己的函数并将其附加到数据库中。这些扩展是用 C 语言编写的。


    对于下一个 iOS 应用程序项目 Wineries，我将需要一个能够将升转换为盎司以及反向转换的函数。代码必须用 C 语言编写，部分使用 SQLite API
    来将值转换为 SQLite 格式或从 SQLite 格式转换回来。


    SQLite 的值如下：


    ```c

    SQLITE_API const void *SQLITE_STDCALL sqlite3_value_blob(sqlite3_value*);

    SQLITE_API int SQLITE_STDCALL sqlite3_value_bytes(sqlite3_value*);

    SQLITE_API int SQLITE_STDCALL sqlite3_value_bytes16(sqlite3_value*);

    SQLITE_API double SQLITE_STDCALL sqlite3_value_double(sqlite3_value*);

    SQLITE_API int SQLITE_STDCALL sqlite3_value_int(sqlite3_value*);

    SQLITE_API sqlite3_int64 SQLITE_STDCALL sqlite3_value_int64(sqlite3_value*);

    SQLITE_API const unsigned char *SQLITE_STDCALL sqlite3_value_text(sqlite3_value*);

    SQLITE_API const void *SQLITE_STDCALL sqlite3_value_text16(sqlite3_value*);

    SQLITE_API const void *SQLITE_STDCALL sqlite3_value_text16le(sqlite3_value*);

    SQLITE_API const void *SQLITE_STDCALL sqlite3_value_text16be(sqlite3_value*);

    SQLITE_API int SQLITE_STDCALL sqlite3_value_type(sqlite3_value*);

    SQLITE_API int SQLITE_STDCALL sqlite3_value_numeric_type(sqlite3_value*);

    ```


    要为 Swift 创建 SQLite 函数，你需要遵循以下步骤：

    - 如图 4-1 所示，使用 iOS 类别下的 C 文件模板添加一个 C 文件。对于我的函数，我将其命名为`sizeconverter`，因为它会将体积从升转换为盎司，反之亦然。Xcode
    会询问你是否要添加一个头文件；选择是。


    **第四章 修改数据库及其他功能**


    ![](media/image55.jpg)


    **图 4-1. C 文件模板**


    - 接下来，你需要将 C 逻辑添加到 C 文件中，并将所需的 C 库导入到头文件中。你还可以在头文件中定义函数的签名，我在此示例中就是这样做的。例如，我添加了`#include`指令来包含`sqlite3.h`头文件。

    - 然后，你需要使用`#import`语句将 C 文件添加到你的桥接文件中（请参见下面的代码）。

    - 如图 4-2 所示，你需要将你的头文件添加到**Build Phases** > **Compile Sources**。


    ![](media/image54.jpg)


    **图 4-2. 构建阶段**


    函数（`sizeconverter.c`）的代码，以及头文件和`SQLite3Bridge`的更改如下所示：


    **第四章 修改数据库及其他功能**


    ```objc

