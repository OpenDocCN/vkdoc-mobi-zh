    ### Insert or Rollback

    The rollback option provides you with an elegant way to back out of a transaction
    if things don’t go your way, like, for instance, if there is an issue with the
    data being inserted into the column.


    The `OR REPLACE` is shorthand for the `ON CONFLICT REPLACE` clause, just like
    the other conflict-handling clauses: `ABORT` , `REPLACE` , `IGNORE` , `FAIL` .
    For instance, you may not want to replace an existing record. If a duplicate record
    already exists in the database, you may want to roll back that transaction without
    generating an error. For general syntax, it is as follows:


    ```swift

    let sql: String = "INSERT or ROLLBACK INTO table(coltext, colint, coldouble) VALUES(?,?,?)";

    ```


    Again, the query assumes that you will be using SQLite3 data binding to bind data
    to the values, which is the safest way or pattern to use when working with SQLite3.


    ### Insert or Ignore

    The `IGNORE` clause handles the insert constraint by skipping over the problematic
    row altogether and generates an `SQLITE_CONSTRAINT` error like the other constraint
    clauses, except for `REPLACE` . The rows before and after are treated normally
    unless another constraint is encountered. See the following example:


    ```swift

    let sql: String = "INSERT or IGNORE INTO table(coltext, colint, coldouble) VALUES(?,?,?)";

    ```


    ### Insert or Abort

    The `ABORT` clause aborts the current operation and backs out of the current transaction,
    allowing your program to continue to handle the other potential inserts or to
    continue with the runtime logic. The syntax is the same as for the other constraint
    clauses:


    ```swift

    let sql: String = "INSERT or ABORT INTO table(coltext, colint, coldouble) VALUES(?,?,?)";

    ```


    ### Insert or Fail

    The last clause is `FAIL` . This clause is triggered when a constraint is encountered
    and `SQLITE_CONSTRAINT` is called. The previous transactions are maintained, but
    the current one is cancelled, and subsequent transactions do not occur. Here is
    an example:


    ```swift

    let sql: String = "INSERT or FAIL INTO table(coltext, colint, coldouble) VALUES(?,?,?)";

    ```


