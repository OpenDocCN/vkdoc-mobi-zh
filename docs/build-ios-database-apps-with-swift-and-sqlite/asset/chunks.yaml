    depends on your needs.


    Once the variables and constants are created, you attempt to open the SQLite database
    as usual and set up your SQL query. You execute the query using the sqlite3_prepare_v2
    function, and you bind your data to the right columns.


    Binding binary is similar to binding other data types, with a few extra steps.
    To work with binary data (images, videos, compiled files), you need to use NSData
    , which is a class in the Foundation framework that provides wrappers for the
    bytes buffers.


    When you are storing binary data, you are actually storing bytes. To get the bytes,
    use the NSURL class to retrieve the path to the file and read in the bytes from
    the file using the NSData contentsOfURL . The sqlite3_bind_blob needs the bytes
    contents of the file as well as the length of the bytes buffer in addition to
    a pointer to the sqlite3_statement , column position, and the SQLITE_TRANSIENT
    pointer. Creating the Winery App


