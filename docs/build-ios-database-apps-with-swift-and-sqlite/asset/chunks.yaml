    you can create, drop, rename, and modify the listed database element. Under the
    `Database` menu, in addition to creating, modifying, indexing, re-indexing, attaching,
    and detaching a database, you can also compact a database and create in-memory
    databases. The app also offers options to analyze a database.


    Figure 2-2 provides a visual of the SQLite Manager Toolbar. You can choose to
    create new databases, tables, and views. You can also open an existing database.'
