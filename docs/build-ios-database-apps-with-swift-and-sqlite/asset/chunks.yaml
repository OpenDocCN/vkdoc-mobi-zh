    \ Resource 目录中获取`.sql`文件，并执行上一节中提供的查询。我使用的是`sqlite3_exec`函数，因为它很好地封装了执行查询所需的不同操作，即`sqlite3_prepare_v2`、`sqlite3_step`和`sqlite3_finalize`。查询执行完毕后，数据库即被关闭。\n\
    \n该函数在应用加载时由`AppDelegate`调用：\n\n```swift\nfunc buildSchema()->Void{\n    if let\
