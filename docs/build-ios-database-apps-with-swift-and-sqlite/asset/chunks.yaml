    Summary


    In this chapter, we revisited the SQLite SELECT statement and implemented a database
    search function, which can be helpful for locating information in a database.
    The next chapter will focus on attaching and using multiple databases in a single
    file.


    ![](media/image176.jpg)


    SQLite has a great feature for managing large volumes of data: multi-database
    apps. In this chapter, you''ll see that by creating and attaching multiple databases
    to the same connection you can improve disk I/O performance and reliability.


    Here are the topics covered:


    • Overview of the ATTACH function


    • Detaching databases using DETACH


    • Multi-database limits


    • Creating joins


