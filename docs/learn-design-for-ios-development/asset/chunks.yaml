- fmt: 'The first step in wireframing your application is to begin to think about
    the layout of your app. There has been some discussion about the best way to do
    this. If you have downloaded one of the templates mentioned earlier you can use
    one of those. Personally, I’m partial to paper. While it sounds decidedly low
    tech, paper is easy to use and easy to correct mistakes should you make them.
    The other great thing about paper is that it’s tangible. You can touch and feel
    paper and for some designers, mapping things out on paper before moving to a digital
    medium helps the ideation process. Whiteboards are also good for ideating your
    apps. You can use dry erase markers to easily map out ideas and correct mistakes.
    You might also be interested in using preprinted stencils that you can sketch
    interface items into. I find paper and stencils can be extremtly liberating. Copying
    the stencils or outlines and making multiple copies is one way to do it. Or, as
    with everything else, you can find downloadable stencils online free of charge.
    If not, then use the wireframing tool of your choice. I’ve included a device outline
    in [Figure 6-2](#9781430263647_Ch06.xhtml#Fig2). This along with the ones in [Figure
    6-3](#9781430263647_Ch06.xhtml#Fig3) might be helpful if you decide to go the
    paper route. I tend to make a few copies with one frame on each page with space
    on either side for my notes. If I’m not inclined to make copies or use a stencil,
    I’ll draw everything freehand and make the stencils the second step in my wireframing
    process. That way, the freehand designs will count as the first draft of the wireframes
    until some of the basic layout and usability issues have been resolved.


    ![9781430263647_Fig06-02.jpg](images/9781430263647_Fig06-02.jpg)


    [Figure 6-2](#9781430263647_Ch06.xhtml#_Fig2). A simple iPhone outline


    ![9781430263647_Fig06-03.jpg](images/9781430263647_Fig06-03.jpg)


    [Figure 6-3](#9781430263647_Ch06.xhtml#_Fig3). Basic stencils for the iPhone 5
    and the iPad mini. These can be used for wireframing apps


    To begin your wireframing process, you should have everything that you have collected
    up until this point: the description of your app that should now be refined to
    include the feedback you received from your validation as well as the apps that
    show best practices and design patterns that illustrate the common functionality
    within your application. If there are no design patterns that apply to every screen,
    that’s fine: you will have to create them.


    If you choose to go with an electronic or web-based wireframing tool, as with
    the paper stencil above, you want to at least begin your wireframing process with
    an outline of the iPhone or iPad depending on which device your app is for. Your
    wireframing program of choice should include this frame or outline. It doesn’t
    have to be realistic, but the dimensions should be exact so that you are working
    with the appropriate aspect ratio for the device you are designing for.


    Before you put pen to paper or actually begin to map out your user interface,
    be sure to put yourself into the mindset of a user, not a designer or developer.
    The overall purpose of the app and needs of the intended user should guide the
    development of your wireframes. The user must be at the heart of every step of
    the process. As the designer, you might feel the need to add funky, new elements
    to your interface and experiment with your layout. However, if it doesn’t work
    for your user and the task they are trying to perform, your app won’t be successful.
    It is really important as a designer and developer to remove yourself from the
    process and to be able to put yourself in the shoes of your user. This is why
    your app statement is important. By this time, you should be able to refer to
    the statement created in [Chapter 1](#9781430263647_Ch01.xhtml) to guide you in
    the wireframing process.


    An Information Architect or (IA) will sometimes create wireframes but it is not
    uncommon for them to be also done by designers these days.


    **Tip** An Information Architect is a person that creates blueprints and wireframes
    for a website or application.


    In some instances, the lines between IA and Designer have been blurred. If you
    identify as a designer in its purest form, it is a good idea to become familiar
    with usability and the best way to do so is to create wirerames for your apps.
    If you can find an IA or UX person to work with you; that’s even better. But if
    not, you should be able to use some of the the tools in this chapter to create
    your wireframes.


    ## Focus on Usability


    Wireframing is all about usability. Therefore, it is important ask yourself some
    critical questions during the wireframing process.


    * What is the first task that the user will need to perform after opening your
    app?

    * From any given screen, what is the most important task for the user?

    * What information does the user need on the current screen to inform his or her
    task?

    * Based on existing patterns and best practices, what will the user expect to
    see at this juncture?

    * If a task contains multiple steps, what is the best and shortest path for this
    task?


    If we continue with our original idea of creating a travel app that helps users
    pack light for their trips like we did in [Chapter 1](#9781430263647_Ch01.xhtml),
    we will need to ask ourselves key questions about the user and what he or she
    will need to inform the tasks for the app. If you’re doing a good job of designing
    your app, you will have followed those steps, too, and should be able to get the
    answers from those questions there.


    For example, does your user need to sign in or register to use the app? If so,
    grabbing a design pattern might be best. What information do you need to collect
    here? There is no real need here to reinvent the wheel with sign-in and registration.
    Users are familiar with this process so remember to collect only the information
    that you need and sketch out the input fields and confirmation for this process.
    Is the app pulling information from social networks? If so, then, you know that
    you will need to ask users’ permission to do so. Remember, that your goal is to
    get the user past this process as quickly as possible so that he or she can begin
    to interact with your app. Refer back to registration and login mobile design
    pattern best practices in [Chapter 5](#9781430263647_Ch05.xhtml) if you need to.
    Keep it simple because you’ll want to get users actually using your app. If the
    registration process is too complicated, you will lose users who may never return.
    Your goal at this point is to get them into the app in the fewest steps possible.


    ## Try Various Layouts


    Experiment with different layouts, too. The first layout that pops into your head
    will certainly not be the last. But get it down as a starting point. The goal
    is to get something on paper that begins the process. Try to complete your wireframes
    in order. This means trying to map out pages and screens in the same order that
    you expect a user to while using your app. One way to do this is to separate the
    various sections of the application by each task and subtask associated with the
    various creens in your app. That way, you have a clear idea of what you’re wireframing.


    As an example, we’ve created an app called Travel Light. We’ll use the app to
    illustrate examples of the various techniques and steps in the design process
    throughout the book.


    ## Outline User Flow'
  raw: 'The first step in wireframing your application is to begin to think about
    the layout of your app. There has been some discussion about the best way to do
    this. If you have downloaded one of the templates mentioned earlier you can use
    one of those. Personally, I’m partial to paper. While it sounds decidedly low
    tech, paper is easy to use and easy to correct mistakes should you make them.
    The other great thing about paper is that it’s tangible. You can touch and feel
    paper and for some designers, mapping things out on paper before moving to a digital
    medium helps the ideation process. Whiteboards are also good for ideating your
    apps. You can use dry erase markers to easily map out ideas and correct mistakes.
    You might also be interested in using preprinted stencils that you can sketch
    interface items into. I find paper and stencils can be extremtly liberating. Copying
    the stencils or outlines and making multiple copies is one way to do it. Or, as
    with everything else, you can find downloadable stencils online free of charge.
    If not, then use the wireframing tool of your choice. I’ve included a device outline
    in [Figure 6-2](#9781430263647_Ch06.xhtml#Fig2). This along with the ones in [Figure
    6-3](#9781430263647_Ch06.xhtml#Fig3) might be helpful if you decide to go the
    paper route. I tend to make a few copies with one frame on each page with space
    on either side for my notes. If I’m not inclined to make copies or use a stencil,
    I’ll draw everything freehand and make the stencils the second step in my wireframing
    process. That way, the freehand designs will count as the first draft of the wireframes
    until some of the basic layout and usability issues have been resolved.


    ![9781430263647_Fig06-02.jpg](images/9781430263647_Fig06-02.jpg)


    [Figure 6-2](#9781430263647_Ch06.xhtml#_Fig2). A simple iPhone outline


    ![9781430263647_Fig06-03.jpg](images/9781430263647_Fig06-03.jpg)


    [Figure 6-3](#9781430263647_Ch06.xhtml#_Fig3). Basic stencils for the iPhone 5
    and the iPad mini. These can be used for wireframing apps


    To begin your wireframing process, you should have everything that you have collected
    up until this point: the description of your app that should now be refined to
    include the feedback you received from your validation as well as the apps that
    show best practices and design patterns that illustrate the common functionality
    within your application. If there are no design patterns that apply to every screen,
    that’s fine: you will have to create them.


    If you choose to go with an electronic or web-based wireframing tool, as with
    the paper stencil above, you want to at least begin your wireframing process with
    an outline of the iPhone or iPad depending on which device your app is for. Your
    wireframing program of choice should include this frame or outline. It doesn’t
    have to be realistic, but the dimensions should be exact so that you are working
    with the appropriate aspect ratio for the device you are designing for.


    Before you put pen to paper or actually begin to map out your user interface,
    be sure to put yourself into the mindset of a user, not a designer or developer.
    The overall purpose of the app and needs of the intended user should guide the
    development of your wireframes. The user must be at the heart of every step of
    the process. As the designer, you might feel the need to add funky, new elements
    to your interface and experiment with your layout. However, if it doesn’t work
    for your user and the task they are trying to perform, your app won’t be successful.
    It is really important as a designer and developer to remove yourself from the
    process and to be able to put yourself in the shoes of your user. This is why
    your app statement is important. By this time, you should be able to refer to
    the statement created in [Chapter 1](#9781430263647_Ch01.xhtml) to guide you in
    the wireframing process.


    An Information Architect or (IA) will sometimes create wireframes but it is not
    uncommon for them to be also done by designers these days.


    **Tip**  An Information Architect is a person that creates blueprints and wireframes
    for a website or application.


    In some instances, the lines between IA and Designer have been blurred. If you
    identify as a designer in its purest form, it is a good idea to become familiar
    with usability and the best way to do so is to create wirerames for your apps.
    If you can find an IA or UX person to work with you; that’s even better. But if
    not, you should be able to use some of the the tools in this chapter to create
    your wireframes.


    Focus on Usability


    Wireframing is all about usability. Therefore, it is important ask yourself some
    critical questions during the wireframing process.


    *   What is the first task that the user will need to perform after opening your
    app?

    *   From any given screen, what is the most important task for the user?

    *   What information does the user need on the current screen to inform his or
    her task?

    *   Based on existing patterns and best practices, what will the user expect to
    see at this juncture?

    *   If a task contains multiple steps, what is the best and shortest path for
    this task?


    If we continue with our original idea of creating a travel app that helps users
    pack light for their trips like we did in [Chapter 1](#9781430263647_Ch01.xhtml),
    we will need to ask ourselves key questions about the user and what he or she
    will need to inform the tasks for the app. If you’re doing a good job of designing
    your app, you will have followed those steps, too, and should be able to get the
    answers from those questions there.


    For example, does your user need to sign in or register to use the app? If so,
    grabbing a design pattern might be best. What information do you need to collect
    here? There is no real need here to reinvent the wheel with sign-in and registration.
    Users are familiar with this process so remember to collect only the information
    that you need and sketch out the input fields and confirmation for this process.
    Is the app pulling information from social networks? If so, then, you know that
    you will need to ask users’ permission to do so. Remember, that your goal is to
    get the user past this process as quickly as possible so that he or she can begin
    to interact with your app. Refer back to registration and login mobile design
    pattern best practices in [Chapter 5](#9781430263647_Ch05.xhtml) if you need to.
    Keep it simple because you’ll want to get users actually using your app. If the
    registration process is too complicated, you will lose users who may never return.
    Your goal at this point is to get them into the app in the fewest steps possible.


    Try Various Layouts


    Experiment with different layouts, too. The first layout that pops into your head
    will certainly not be the last. But get it down as a starting point. The goal
    is to get something on paper that begins the process. Try to complete your wireframes
    in order. This means trying to map out pages and screens in the same order that
    you expect a user to while using your app. One way to do this is to separate the
    various sections of the application by each task and subtask associated with the
    various creens in your app. That way, you have a clear idea of what you’re wireframing.


    As an example, we’ve created an app called Travel Light. We’ll use the app to
    illustrate examples of the various techniques and steps in the design process
    throughout the book.


    Outline User Flow'
  trans: '

    对应用进行线框图设计的第一步，是开始思考应用的布局。关于最佳实现方式已有不少讨论。如果你下载了前面提到的某个模板，可以直接使用。就我个人而言，我偏爱纸笔。虽然听起来相当低技术，但纸张易于使用，且方便修改错误。纸张的另一个优点是它的具象性。你可以触摸和感受纸张，对某些设计师来说，在转向数字媒介前先在纸上规划，有助于构思过程。白板也很适合构思应用。你可以用干擦标记笔轻松勾勒想法并修正错误。你可能还对使用预印模板感兴趣，可以在上面草绘界面元素。我发现纸和模板能带来极大的解放感。复制这些模板或轮廓并制作多份是方法之一。或者，和其他所有事情一样，你也可以在网上免费找到可下载的模板。如果不行，那就使用你选择的线框图工具。我在图
    6-2 中提供了一个设备轮廓图。如果你决定走纸质路线，这个轮廓图以及图 6-3 中的那些可能会派上用场。我倾向于制作几份副本，每页一个框架，两侧留出空间做笔记。如果我不打算复印或使用模板，我会全凭手绘，然后将模板作为线框图流程的第二步。这样，手绘设计将作为线框图的初稿，直到一些基本的布局和可用性问题得到解决。


    ![9781430263647_Fig06-02.jpg](img/9781430263647_Fig06-02.jpg)


    图 6-2. 一个简单的 iPhone 轮廓图


    ![9781430263647_Fig06-03.jpg](img/9781430263647_Fig06-03.jpg)


    图 6-3. 适用于 iPhone 5 和 iPad mini 的基本模板。这些可用于应用线框图设计


    开始你的线框图设计流程时，你应该准备好到目前为止收集的所有资料：你的应用描述（现在应已根据验证反馈进行完善），以及那些展示了最佳实践、设计模式并说明了你应用中常见功能的应用。如果没有适用于每个屏幕的设计模式，那也没关系：你必须自己创建它们。


    如果你选择使用电子或基于网页的线框工具，就像上面提到的纸质模板一样，你至少需要在开始线框图流程时，根据你的应用是针对 iPhone 还是 iPad，使用相应的设备轮廓图。你选择的线框图程序应该包含这个框架或轮廓。它不必很逼真，但尺寸必须精确，以便你能以正确的宽高比为你正在设计的设备进行工作。


    在你落笔或真正开始规划用户界面之前，一定要将自己置于用户的思维模式中，而不是设计师或开发者的思维。应用的总体目标和目标用户的需求应指导线框图的设计。用户必须处于流程每个步骤的核心位置。作为设计师，你可能会觉得需要在界面中添加新奇炫酷的元素并尝试不同的布局。然而，如果这对你的用户以及他们试图完成的任务没有帮助，你的应用就不会成功。作为设计师和开发者，让自己脱离流程，并能够设身处地为用户着想，这一点至关重要。这就是你的应用陈述如此重要的原因。到了这个时候，你应该能够参考第
    1 章中创建的陈述来指导你的线框图设计过程。


    信息架构师（IA）有时会创建线框图，但现在由设计师来完成这项工作也并不罕见。


    **提示** 信息架构师是为网站或应用创建蓝图和线框图的人。


    在某些情况下，IA 和设计师之间的界限已经模糊。如果你自认为是纯粹形式的设计师，那么熟悉可用性是个好主意，而最好的方法就是为你的应用创建线框图。如果你能找到一位
    IA 或用户体验专家与你合作，那更好。但如果不能，你应该能够使用本章中的一些工具来创建你的线框图。


    ## 聚焦可用性


    线框图设计的核心就是可用性。因此，在线框图设计过程中，向自己提出一些关键问题非常重要。


    *   用户打开你的应用后需要执行的第一项任务是什么？

    *   在任意特定屏幕上，对用户来说最重要的任务是什么？

    *   用户在当前屏幕上需要哪些信息来指导他/她的任务？

    *   基于现有模式和最佳实践，用户在这个阶段期望看到什么？

    *   如果一个任务包含多个步骤，那么完成这个任务的最佳且最短的路径是什么？


    如果我们沿用最初的想法，就像我们在第 1 章中所做的那样，创建一个帮助用户轻装旅行的旅行应用，我们就需要向自己提出关于用户的关键问题，以及他/她需要什么来指导应用的任务。如果你在设计应用时做得很好，你也应该遵循了这些步骤，并能从这些问题中找到答案。


    例如，你的用户是否需要登录或注册才能使用应用？如果是，那么采用一种设计模式可能是最好的选择。你需要在这里收集哪些信息？在登录和注册方面，确实没有必要重复造轮子。用户熟悉这个过程，所以记住只收集你需要的信息，并草绘出这个过程的输入字段和确认环节。应用是否从社交网络拉取信息？如果是，那么你知道你需要请求用户的许可才能这样做。记住，你的目标是让用户尽快完成这个过程，以便他们能够开始与你的应用互动。如果需要的话，可以参考第
    5 章中的注册和登录移动设计模式最佳实践。保持简单，因为你希望用户真正开始使用你的应用。如果注册过程太复杂，你将失去那些可能永远不会再回来的用户。此时你的目标是让用户用最少的步骤进入应用。


    ## 尝试不同布局


    也要尝试不同的布局。你脑海中第一个闪现的布局肯定不会是最佳方案，但首先要把它记录下来作为起点。目标是让一些东西落在纸上，从而开启这个过程。尝试按顺序完成你的线框图。这意味着尝试按照你期望用户使用应用时的顺序来规划页面和屏幕。一种方法是根据你的应用中不同屏幕相关的每个任务和子任务，将应用的各个部分分开处理。这样，你就清楚自己在为什么内容画线框图了。


    举个例子，我们创建了一个名为“轻装旅行”的应用。在整本书中，我们将使用这个应用来说明设计过程中各种技巧和步骤的示例。


    ## 勾勒用户流程

    '
- fmt: 'Every app has a flow. This is the way that the user will move through the
    application. You should at least have a few ideas of how this will work for your
    app. It will make creating the user flow much easier. Some of the wireframing
    tools above can also be used to create user flows. However, any tool that allows
    you to draw basic shapes will work just fine. The easiest and simplest way to
    start the user flow process is to simply make a list of all of the major tasks
    you can think of that are associated with your application. Be as specific as
    possible here. This is where your application begins to come to life. You can
    write each step on a Post-it note so that you can move them around when you figure
    out an additional step that may have to be inserted between two others. Or, you
    can write each step out on a whiteboard, too. The purpose of the user flow is
    to trace the path that the user must take to complete a specific task. As you
    are working on your user flow, you should ask and be able to answer the following
    questions:


    * Who is the user and what does he or she need?

    * Why is the user interacting with the app?

    * Where is the user going?

    * What is ultimate objective of this task?

    * What is the user’s goal?

    * What is the purpose of the app?

    * Is there a specific business objective? (In app purchases or sales)

    * Where does the task begin and where does it end?


    Below, I’ve attempted to answer the above questions for our Travel Light application.
    Note that each answer is simple. As you work on your wireframes your answers could
    change, too.


    **Who is your user and what does he or she need?**


    The Travel Light user is a busy traveler who needs to know exactly what to take
    on each trip.


    **Why is your user interacting with the app?**


    The user is interacting with Travel Light to minimize his or her carry-on luggage
    and ensure that he or she only has what is needed.


    **Where is your user going?**


    The user is going to create a new list.


    **What is the ultimate objective of this task?**


    The ultimate goal of this task is to help the user to create a list and associate
    it with a particular trip.


    **What is the user’s goal?**


    The ultimate goal is to create a complete list for the given trip.


    **What is the purpose of the app?**


    The purpose of the app is to allow users to take only what they need while not
    forgetting anything.


    **Is there a specific business objective? (In app purchases or sales)**


    Ultimately, we will link users to other partners that offer low-cost travel solutions.


    **Where does the task begin and where does it end?**


    The main tasks begin with entering trip details such as a departure and destination
    city and date. The task ends when a user has selected all of his or her items
    for a particular trip.


    [Figure 6-4](#9781430263647_Ch06.xhtml#Fig4) shows an example of a very basic
    user flow for the Travel Light app.


    ![9781430263647_Fig06-04.jpg](images/9781430263647_Fig06-04.jpg)


    [Figure 6-4](#9781430263647_Ch06.xhtml#_Fig4). The user flow for the Travel Light
    app lays out the major tasks and paths that a user could take as he or she navigates
    the app


    Now that we’ve created a list of needs of our user, we can begin to put write
    the major tasks associated with completing those goals we’ve just outlined.


    In order to create the screens from our Travel Light app, our list of major tasks
    and subtasks might look like this:


    Tap app icon


    Registration and Sign-in page


    Choose and enter user name (E-mail address)


    Choose and enter password


    Click sign-in button


    If we were to outline all of the steps associated with entering details around
    a trip, the list might look like this:


    Trip entry


    Enter trip details; City, state, airport, date, and time of departure


    Ask to use current location; if yes, list associated airports


    If no, user may enter manually


    User chooses departure airport


    User enters date from calendar popup


    User enters time from picker?


    Save trip details – User should be able to edit trip details


    List creation & confirmation'
