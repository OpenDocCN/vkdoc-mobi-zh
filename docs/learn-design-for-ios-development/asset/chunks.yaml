- fmt: '以下是根据您的要求排版后的 Markdown 文档：


    Some of the popular wireframing software on the market will allow you to create
    a clickable prototype of your app that you can run on an actual device. Of the
    ones listed earlier, `Proto.io`, `JustinMind`, and `iMockups` will let you create
    some sort of clickable prototype. They can be a great way to show your users precisely
    how the app will work. Others may only let you interact with the app in a web
    interface. Any wireframing tool that replicates real interactivity that users
    will experience with your app is great for testing, but not absolutely necessary.
    It is possible to get great feedback from static, paper wireframes as well as
    interactive wireframes and there is even a tool called `POP` (Prototyping on Paper)
    shown in [Figure 6-7](#9781430263647_Ch06.xhtml#Fig7) that lets you take pictures
    of your paper wireframes and add some interactivity to them. It is available as
    an app and looks fun to use. Ideally, the best approach would be to allow users
    to interact directly with your app from a device for which it is being designed.


    ![9781430263647_Fig06-07.jpg](images/9781430263647_Fig06-07.jpg)


    [Figure 6-7](#9781430263647_Ch06.xhtml#_Fig7). The `POP` app lets users take pictures
    of their hand-drawn wireframes and add interactivity to them


    **Clients and Wireframes**


    If you are creating an app for yourself as a designer-developer, your wireframes
    will be mostly for your eyes only. Barring your sharing with others for feedback,
    you can pretty much set the level of polish you apply to your wireframes. If you
    are dealing with a client, however, your wireframes may benefit from annotations
    and some level of guidance for your clients. As wireframes are devoid of any branding
    or color, clients might find them difficult to read. Before presenting wireframes
    to clients, let them know what to expect. Annotate the wireframes with directions,
    and if possible, walk your clients through the flow. Sending wireframes to clients
    that don’t understand them is a sure way to delay sign-off and can result in endless
    feedback loops that create more questions and clarification than actual approval.


    You will rarely share hand-drawn wireframes like the ones in [Figures 6-4](#9781430263647_Ch06.xhtml#Fig4)
    and [6-5](#9781430263647_Ch06.xhtml#Fig5) with a client. But, they are a great
    start for iterating internally if you have a team. And even though I’ve reviewed
    and listed wireframing software and tools, you are under no pressure to use them.
    The wireframes in [Figure 6-8](#9781430263647_Ch06.xhtml#Fig8) are a better example
    of what would be acceptable to send to a client for review.


    ![9781430263647_Fig06-08.jpg](images/9781430263647_Fig06-08.jpg)


    [Figure 6-8](#9781430263647_Ch06.xhtml#_Fig8). These wireframes are more suitable
    for sharing with a client


    In addition to being more polished, they are easier to read and thus understand.
    Because your wireframes will represent every page of your application and ideally
    show how users will interact with what they see on each screen, it is a good idea
    to include every element that the user will see by the time he or she gets to
    your final wires. Note the “Forgot your password” and “Terms & Conditions” links
    in the screens above. While not shown here, it is not uncommon to show the user
    flow that users will experience for retrieving a lost password. Sometimes, Terms
    & Conditions are shown in a web view in apps as they tend to change and this allows
    for easy updates. If your T&C’s require user action such as tapping the “Agree”
    button in order to move forward, then show those screens as well.


    ## Summary


    Your wireframes are a critical part of the design process. They will help you
    to create the user flow and to define the overall experience that users will have
    with your application. The main purpose for wireframes is to allow you to create
    user-centric scenarios that will provide the best overall experience for users
    of your application. Make sure that your wireframes are answering key questions
    about how and why users are interacting with the app. If you’re having trouble
    getting started, you can always refer to design patterns, which we discussed in
    [Chapter 6](#9781430263647_Ch06.xhtml); or your initial app statement for your
    app. There are multiple tools available on the market for the purpose of wireframing
    your app. Many of these will allow you to create your apps in its most basic form
    – devoid of color and branding and to iterate often. Whether or not you use available
    software or decide to go with pen and paper, your wireframes are best refined
    with feedback from others. So, be sure that you are able to share them and weigh
    the important feedback. If you need to present your wireframes to a client, then
    you will want to add a level of polish to your wires. Annotations are also helpful
    in explaining desired functionality or effects that you may not be able to convey.
    At the end of your wireframing process, you should be ready to add color, depth,
    and branding.


    # Chapter 7: Designing Your Visual Assets with Adobe Photoshop


    Adobe Photoshop is probably the most popular graphics software for designers on
    the planet. When it comes to designing either apps or websites, Adobe Photoshop
    remains the industry standard. Having been around for over 20 years, it has evolved
    to become a powerhouse for the creative industry as a whole. The Adobe suite of
    software programs called Creative Cloud includes other graphics programs such
    as Adobe Fireworks, Illustrator, InDesign, Premiere Pro, and After Effects and
    ranges from video editing and image design to motion graphics. For the purpose
    of this book, however, we will focus on Adobe Photoshop as the standard for creating
    assets for our iOS application.


    I’ll touch on Fireworks a little later on, too.


    For the purposes of our book and for consistency’s sake, we will continue with
    the theme of our Travel Light app, the app that helps you to never forget what
    you’re taking on a trip. So far we’ve created an app purpose statement and have
    done some basic research and wireframes for this fictional application. In this
    chapter we’ll use Photoshop to add some color and branding to the wireframes we’ve
    created in [Chapter 6](#9781430263647_Ch06.xhtml). We won’t design the app completely
    from start to finish, but I will show how to complete certain tasks using the
    software to add color and polish to the user interface of your application.


    ## Some Photoshop Basics


    If you’ve spent most of your time developing apps, you’ve undoubtedly come into
    contact with Photoshop files or `PSDs` as they are commonly referred to. They
    are the building blocks of most designs. Even if you’re only familiar with `PNGs`
    (Apple’s preferred image format for apps), your `PNGs` will more likely than not
    have their humble beginnings as an Adobe Photoshop file.


    As this is not a how-to-use Photoshop book, we will assume that we you have some
    experience with some of the basic tasks in Photoshop. Even as a developer, it
    is always a good idea to be familiar with Photoshop. Some developers and iOS engineers
    will receive their `PNG` assets already sliced and ready for development, while
    increasingly, some developers are becoming more and more comfortable with receiving
    the layered `PSD` files that they will then slice for themselves. This chapter
    assumes you have some familiarity with Photoshop and have created or edited `PSDs`
    before. Ideally, you have opened and explored the UI of the software, created
    shapes, are familiar with fills, transparency, opacity, and layers, etc.'
