- fmt: 'We’ve reviewed the sections of the Human Interface Guidelines that were specifically
    updated to provide guidance on iOS 7. You should be familiar with them by now.
    There are very specific expectations with regard to the placement of specific
    elements in the UI, many of which were defined by the Human Interface Guidelines.
    Luckily, iOS 7 does not change the placement of those elements, but the look and
    appearance of the elements are markedly different. Once iOS 7 is widely released
    (it will be by the time this book has been published), users will have become
    reconditioned to the way that these elements appear.


    In this chapter, we will take a deeper dive in the flat design, how it came about
    and what you need to know when designing your iOS application.


    ## The Principles of Flat Design


    Flat design represents a sort of minimalism that moves away from the realism of
    skeuomorphism. Though simpler to look at, it is seen as being more sophisticated
    and versatile than its realistic cousin skeuomorphism. Flat design also offers
    more clean lines and a lighter, bolder, and more colorful palette of colors to
    attract viewers and to provoke emotion.


    Some design purists say that utilizing flat design principles is a way to elevate
    content and letting functionality take center stage. This means to me, that it
    becomes more critical for designers to either work closer with UI and UX or to
    have a better understanding of these principles. Previously, designers were the
    guys who came into make wireframes pretty. Now, with flat design the designer
    and UX could very well be the same person. Without the old visual cues to guide
    users, buttons and other UI elements need to be more intuitive. The only things
    to guide users aside from visual feedback will now be their own knowledge and
    understanding of what feels natural and makes sense. This new way of designing
    moves the overall user experience to the forefront of the entire design process.
    Indeed, with the stripping away of many of the extraneous elements and effects
    like bevels and shadow, the user comes face-to-face with the experience and the
    content. Your job as designer is to make sure that it stands up.


    ## The Origin of and Other Uses of Flat Design


    Outside of iOS 7, you will find plenty of other examples of flat design. Apple
    did not invent flat design and even though we are speaking of it in terms of iOS,
    it is not a mobile-specific paradigm, either. You will be able to find multiple
    examples on the Web as well as in other mobile operating systems (Windows Phone
    and Android are a few) and in countless apps whose designs were exhibiting flat
    design principles before Apple took notice.


    The unlikely hero behind bringing flat design to the forefront is none other than
    Microsoft. And it did it with a little-known and now-extinct music player called
    Zune. Although Zune never really made a dent in iTunes’s virtual domination of
    the music software industry, what it did do was to set the stage for a new design
    sensibility that Microsoft and other software companies would use moving forward.
    Soon, others followed the flat design trend.


    Software giant Google also joined the flat design trend before Apple to represent
    all of its properties, logos, and icons. The official Google Visual Assets Guidelines
    uses flat design principles liberally throughout.


    Even popular consumer brands have embraced the flat design trend. A look at popular
    brands like eBay, the aforementioned Microsoft, and even Twitter, have recently
    embraced flat design principles in reimagining their logos and branding.


    eBay notably changed its logo in 2012 for the first time in its 17-year history
    to reveal a newer and, yes, flatter design. While the company has not formally
    mentioned flat design in the language announcing the change, the principles are
    clear for anyone who dares to compare the two logos. The branding and colors remain
    intact; however, what is difficult to miss are the use of a thinner font and the
    removal of the overlapping of letters in the company name. Some would argue that
    the colors are already flat design friendly and the skinny font only adds to the
    flat effect.


    Following the flat design trend, as well, was Twitter whose popular “Twitter bird”
    logo was redesigned for the first time in the microblogging company’s six-year
    history. In a note on the site’s official blog, creative director Doug Bowman
    speaks of the new design direction as being born out of a love of “design within
    creative constraints and simple geometry.” He goes on to state that the bird is
    “crafted purely from three sets of overlapping circles.” Those of you familiar
    with the magic grid system used to create the design for Apple’s new icons can
    see lots of similarities there.


    **Tip** Examine and review how big brands have adapted to the flat design trend.
    Use them as examples when designing your app.


    ## The Future of Flat Design


    The design community has been buzzing about the flat design trend for some time
    now. Some tend to think it is just a trend and others think it’s here to stay.
    However, a June 2013 survey of web professionals across a number of different
    design professionals conducted by Usabilla, a website usability tool, yielded
    the following conclusions.


    People associate flat design with the following descriptions:


    - Simple

    - Clean

    - Colorful

    - Modern

    - Boring


    The five main advantages of flat design are the following:


    - Clarity

    - Ease of use

    - Modern appearance

    - Efficient responsive design

    - Fast load times


    The five main disadvantages of flat design are listed here:


    - Different from what people are used to

    - Difficult to execute well

    - Unclear what’s clickable

    - Boring design

    - Lack of personality


    Based on these lists, flat design is not just a trend. It is here to stay. Sixty-eight
    percent of respondents believe that flat design isn’t just a fad but that it will
    truly affect the way we design for the Web and mobile for years to come.


    ## Incorporating Flat Design into Your App


    So, what do the survey results mean for you and the design of your application?
    Because flat design principles are here to stay, you will need to incorporate
    them into the design of your app. Let’s look at each of the following principles
    in more depth.


    - Choosing a Color Palette

    - Designing Icons

    - Utilizing Space and Templates

    - Defining Buttons

    - Simplifying Forms

    - Determining Typography

    - Evaluating Usability


    ### Choosing a Color Palette


    Understanding that bright bold colors are the hallmarks of flat design, this does
    not mean you can throw reason out the window when it comes to color. You must
    choose your colors wisely.


    Color is critical to your application so defining a color palette is one of the
    most important tasks you will undertake when designing your app. The first thing
    you will need to understand is whether or not there are important branding guidelines
    that you must be aware of for you or your client. Whether you are designing your
    app for yourself or for a client, you must be aware of the emotions that certain
    colors evoke in users. There are a number of online resources that can help designers
    understand the psychology behind the use of certain colors; so do some research
    before you choose a palette for your app. Be aware that flat design skews toward
    bright, bold, and vivid colors to communicate specific messages to users. Refer
    back to your application documentation and the primary tasks users will be performing
    in your app to find the right color combination for you. Be sure to experiment
    as well because the possibilities are endless.'
