- fmt: 'Here are a few things to look out for when considering using third-party tools
    for asset preparation:


    - Perform tests with a few files first to ensure that the results are what you
    need.

    - Make sure that the tool is updated regularly (a running log of bug fixes and
    updates will usually answer this question).

    - The creator or company responsible for the tool should offer support or help
    for users.

    - Read the reviews or feedback from users to see what others think. Reviews are
    a great indicator of how an app or plug-in performs.


    ## Naming Your Assets


    When creating assets for delivery to a developer, it is important to make sure
    that you maintain a consistent naming convention for your files. The following
    format for naming convention holds:


    - Standard: `<ImageName><device_modifier>.<filename_extension>`

    - Retina or High Resolution: `<IMageName>@2x<device_modifier>.<filename_extension>`


    The `<device_modifier>` portion of the name is optional and not completely necessary.
    It can be a nice touch, however, if you’re designing a universal app and want
    to indicate to your developer which asset belongs with a particular device.


    When naming files, a good idea is to speak with your developer to find out if
    there is a preference but the following also can work as a guide, especially if
    you are creating an app with multiple form factors:


    - iPhone – `file.png` or `file∼iphone.png`

    - iPhone Retina – `file@2x.png` or `file@2x∼iphone.png`

    - iPhone 5 – `file-568@2x∼iphone.png`

    - iPad – `file∼ipad.png`

    - iPad Retina – `file@2x∼ipad.png`

    - Third-party tools for exporting assets


    ## Packaging Your Assets for Development


    Once you’ve sliced, scaled, and exported your files into a folder, you should
    double check to make sure that everything is appropriately labeled for your developer.
    This takes the guesswork out of the developer trying to figure out where everything
    is. If you’ve created a Design Specifications Document, then you should include
    a section stating the naming convention you’ve used not only to name your files,
    but how you’ve organized them in the various folders. If your developer is fine
    receiving only a layered PSD document and does not want individually sliced PNGs,
    consider yourself lucky.


    These days, more and more developers have ways of generating the slices they need
    and are familiarizing themselves with Photoshop. This removes some of the back
    and forth than can occur between developers and designers if, for instance, an
    image is a few pixels off. Whether or not your developer wants PNGs or a layered
    PSD, this is where it becomes important to make sure that your PSD has intuitively
    labeled layers. Also, some developers, while able to slice their own PSDs, may
    not be “hard-core” Photoshop experts. It is important not to rasterize or flatten
    the masks or layers before delivery to your developer so that he or she can edit
    a file if needed, without losing quality.


    **Tip** Rasterizing an image converts it to a single layer and removes the ability
    to resize that image without losing quality.


    ## Communication Is Key


    Once your files have been labeled and packaged for delivery, you may also want
    to schedule a call or meeting with the developer to walk through nuances of your
    design or to explain actions and animations that may need additional clarification.
    While you will attempt to cover everything in your design specifications document,
    nothing beats a good old conversation. Send a copy of your document for your developer
    to review prior to your meeting and ask him or her to prepare any questions. No
    matter how clear you think your document is, it is likely that there will be questions.
    Any questions that are answered or clarifications that are made in your meeting
    will require you to update your document. Do so with those answers and send a
    new, updated version of your document to your developer so that the document can
    be referenced during development.


    Another best practice is to make sure that your developer knows how to reach you
    in case he or she has follow-up questions. An e-mail address and phone number
    in the design specification document is helpful. Open lines of communication are
    a great way to take the guesswork out of the development process.


    ## Summary


    As you wrap up the design and ideation portion of your app, you will need to prepare
    your assets for delivery to your developer. A design specifications document is
    a great way to remove ambiguity from the development process. This is a document
    that you will create that will contain as much information about your app as possible.
    It should include details about the app; its purpose; how it will be used; and,
    more importantly, will tell your developer what to do with all of the assets you
    will be providing. You will offer details on color, font and text, interaction
    and animation if needed. You will then move onto slicing and scaling your asset
    for use in iOS. All of your assets, once sliced, must be exported as PNGs as they
    maintain transparency and offer great image quality. Once these assets are named
    and organized you will package them along with your design specifications document
    for handoff to your developer. If possible, you may want to follow up with an
    in-person conversation and provide some way for your developer to reach out to
    you. Whether you slice and scale your assets using the methods outlined in this
    chapter or using a third-party tool, adhere to these general guidelines to help
    smooth the transition from design to development.


    ## Chapter 10


    # Design Best Practices and Mistakes to Avoid


    You’ve taken your idea through ideation and now if you’ve delivered your app to
    a developer or perhaps even developed it yourself, you’re ready to submit your
    app to the app store. Congratulations! This is a huge milestone and if you’ve
    followed the book through from the beginning to the end, you are hopefully pleased
    with the outcome. There was a lot of information to take in, so I’ve created a
    list for you to help you on your app design journey. It’s pretty much a recap
    of all of the principles outlined in the book.


    One of the most ignored aspects of app development is design. But hopefully with
    the tools and methods outlined in this book, I’ve helped to shed some light on
    the process. The interface or look and feel of your app is one of the most critical
    aspects of your app. Your audience will make its initial assessment of your app
    based on the interface in the screenshots you include in the app store. Some of
    the most simple and intuitive apps are the most popular.


    While simplicity is important, it’s critical to strike a balance between simplicity
    and functionality. Some apps are too overdesigned, including too many bells and
    whistles, which can take away from the overall functionality of the app. This
    is why referring back to your app statement is important. Keep the goal of the
    app top of mind while going through your design process and you should be just
    fine. The following sections break down the book into a helpful checklist of best
    practices and mistakes to avoid when designing your app.


    ### Create an App Design Statement


    An app design statement is the reason for your application. It’s a short statement
    that you can easily remember that describes your application: the what; the why;
    and, most important, the how. Define your application and its intended audience.
    Keep this description short and be able to recite it to anyone who should ask.
    The app design statement that we created for our fictional Travel Light app was:
    “The Travel Light app will help frequent travelers by providing checklists to
    ensure that they pack only what they need for upcoming trips.”


    This statement may evolve and change as you create your app, but it’s a good idea
    to memorize it and to update it should your idea change.


    ### The HIG Is Your Design Bible; Use It'
