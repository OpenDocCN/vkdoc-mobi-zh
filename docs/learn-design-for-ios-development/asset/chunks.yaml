- fmt: '# iOS App Design Tips


    Lots of designers tend to start with higher resolution designs and scale down.
    It will make your life a whole lot easier as you will be able to finalize and
    perfect details that are viewable in the larger versions but not the scaled-down
    ones. To be fair, some designers may prefer scaling up. However most of the designers
    I speak and work with prefer to scale down from higher resolutions to smaller
    ones.


    ## Get ‘Em in Quick


    Intro screens and animations waste users’ time. Keep your login and registration
    processes as brief as possible and get to the meat of your app sooner rather than
    later. Anything else is prohibitive. If you must have a walkthrough or a demo
    of your app, allow the user to bypass this process if he or she chooses to. Having
    a low barrier to entry is a great practice.


    ## Test, Test, and Test Again


    When creating your app, it’s a good idea to get your app wireframes and designs
    into the hands of potential users as many times as possible. Take user feedback
    seriously before and even after you launch. It can make a huge difference. View
    your designs ON DEVICES where possible. I’ve mentioned some tools like `LiveView`
    and `Scala` that allow you to view your designs on the intended device so that
    you can allow for readability as it pertains to fonts *and* design. After your
    app has been developed, there is usually functional testing or quality assurance
    (`QA`) to ensure that the app behaves as it should. This should yield large issues
    that need to be addressed before you upload your app to the app store.


    ## Software Will Help


    `Adobe Photoshop` is the gold standard as far as design for apps and even web
    sites. If you’re serious about design, learn it. There are tutorials on `YouTube`
    and entire books that cover `Photoshop` in greater detail than I do here.


    ## Icons and Screenshots Are Important, Too


    You rarely get a second chance to make a first impression. The user interface
    of your app is important, but so is your app’s icon. It will be the sole means
    by which users will identify your app in the app store and on their devices. So
    it’s important to make your icon as special as your app is. `Apple` provides guidelines
    for app icons as well, So, make sure that you follow them closely. Your app icon
    is required so put some serious thought into what this will look like. Your screenshots
    are the first view of your app that users will see. Include screenshots that will
    entice users to download your app.


    ## Handoff and Communication


    After you’ve designed your app and have everything ready to go, you will want
    to provide specific directions to your developer about special animations or gestures
    in your app. It’s always a good idea to have an in-person conversation with your
    developer for an official handoff of the assets. As the designer, your work isn’t
    done yet. You might want to create a document that your developer can refer to
    throughout the development process. This document will contain details that may
    not be immediately apparent from your layered `PSD` files. Information on fonts,
    colors, and sizes can all go into this document.


    ## Summary


    You’ve put a lot of work into the design of your app. You’ve created something
    out of nothing and brought it from just a thought, through ideation. When you
    hand off these files to your developer and the app is built, it will then become
    a unique creation that lives on hundreds of thousands of people’s devices. Success
    isn’t guaranteed, but if you’ve followed the `Human Interface Guidelines` and
    other documentation in this book, your app can be in the app store; and if it’s
    really exceptional in terms of design and functionality, it could be featured
    with some of the other top apps in the store. Even if this doesn’t happen, you
    should consider getting your app into the app store a great accomplishment.


