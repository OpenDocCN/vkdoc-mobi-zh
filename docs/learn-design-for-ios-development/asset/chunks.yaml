  trans: '

    # 图 6-1


    图 6-1. 线框图是绘制了应用所有界面元素的示意图


    线框图的全部意义在于可用性与交互性。完成线框图绘制后，你应该明确用户在使用应用时每一项操作所对应的结果。


    在应用开发的线框图阶段结束时，你应该能够回答关于应用的以下问题：


    -   用户点击应用中的任意按钮时会发生什么？

    -   应用中每个任务的最佳和最直观路径是什么？

    -   应用是否在其用户界面中采用了公认的最佳实践？

    -   任务是否通过最少的步骤完成？

    -   用户是否理解其正在执行的任务及其原因？

    -   是否已探索并涵盖了所有可能的用例？


    线框图通常不包含色彩和品牌元素，这反而使其更易于阅读。添加品牌和色彩有时会分散线框图的核心目的——即在应用加入设计与润色之前，勾勒并敲定功能。线框图的另一个优势在于，当应用界面设计需要调整时，可以轻松进行迭代修改。如果线框图工作进展顺利，你会发现在整个流程完成前会生成多个版本的线框图。这其实是件好事，因为每个版本都应在前一版本基础上有所改进。


    有些线框图比其他版本更精致，其精致程度取决于多种因素。如果你为客户创建应用，他们可能希望线框图达到一定的精致度或专业度。如果这不是硬性要求，那么我建议你保持线框图的黑白风格，并使用最简单的呈现方式。


    ## 线框图工具


    有许多在线资源和工具可用于创建线框图，也有专门针对移动端的线框图工具。搜索"线框图工具"会列出介绍可用工具的文章。这些工具中有些基于网页，有些是应用程序，有些可下载，有些免费，有些付费，还有些是开源的。你需要找到最适合自己的工具。在基于网页的工具中，以下是我个人最推荐的三款：


    1.  **JustinMind** – 允许用户创建可点击的交互式移动线框图，并支持分享以收集反馈。

    2.  **Proto.io** – 允许用户创建可用于原型设计和测试的线框图。支持分享和在设备上查看。价格从免费到每月 49 美元不等。

    3.  **MoqUps** – 一款免费的基于 HTML 5 的线框图工具，提供 iOS 模板，让用户能够快速创建简单的移动应用线框图。


    如果你不介意多花点钱，以下是另外一些需要付费的线框图工具列表：


    1.  **Omnigraffle** – 个人许可证售价 99.99 美元。适用于 Mac 和 iPad。作为 Mac 用户的最爱，Omnigraffle
    不仅可以创建应用和网站，还能绘制多种不同类型的图表。

    2.  **iMockups** – iPad App Store 售价 6.99 美元。这款 iPad 应用允许用户在直观的 iPad 界面内为应用和网站创建线框图。该应用可能需要更新，但仍是创建基础应用线框图的绝佳工具。

    3.  **Balsamiq** – 可下载的线框图工具，通过易用的界面提供基于手绘风格的线框图。也支持分享以收集反馈。单用户许可证售价 79 美元。


    再次说明，这些列表基于我个人的偏好。这些产品大多允许用户先试用再决定购买，因此我建议你尽可能都尝试一下。确保你选择的任何应用都支持以几种不同格式导出线框图。你至少需要一种流行的图片格式（如
    JPEG、PNG）以及广受欢迎的 PDF 格式。另一个有用的功能是能够与他人协作并共享线框图，这在向同事、团队成员和潜在用户征求反馈时会很有帮助。


    你也可以完全跳过网页和其他数字工具，选择传统的手绘方式。也就是用钢笔或铅笔在纸上绘制，你可以在网上找到 iPhone 或 iPad 框架模板，以便在其中填充应用所需的
    UI 元素。无论采用哪种方式，线框图和构思都是应用设计过程中不可跳过的重要步骤。


    ## 为什么线框图很重要？


    到了这个阶段，你自然可能急于开始应用设计的实际操作。你正在思考颜色、阴影、半透明效果，以及应用图标中要包含哪些细节。但先别急。尽管从设计角度来看并不那么吸引人，但完成线框图流程至关重要，因为它将为实际设计提供依据。一旦线框图完成，你会发现后续的设计和开发会比跳过此步骤时流畅得多。


    线框图之所以重要，是因为它有助于创建布局，并帮助你在应用中为用户组织信息。在这个过程中，你可以自由地创建和撤销；尝试不同的方法来解决应用中的特定可用性问题。如果某个方案行不通，你可以轻松舍弃，暂时无需考虑品牌和其他细节。这尤其令人感到自由，因为在设计时我们追求像素级的完美精度，而不愿处理可用性问题。如果你决定完全放弃某个屏幕或流程，你将需要线框图提供的灵活性。如果你不受限于色彩和设计，那么你就可以专注于布局、可用性和流程——这正是线框图绘制时的主要关注点。


    如果你与客户合作，你还会发现线框图是在进入样式和设计阶段之前，让客户认可用户界面及其他元素的绝佳方式。这样一来，客户就能明确预期，而设计也能为线框图增添深度。


    ## 线框图绘制流程

