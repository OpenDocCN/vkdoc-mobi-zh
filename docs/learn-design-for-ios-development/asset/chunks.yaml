  trans: '

    如果你的应用在我们看来能与这些应用相提并论，那真是太棒了。你或许真的有所发现！如果你对自己的应用充满信心，那就大胆去做吧。然而，考虑到每天提交到应用商店的应用数量，光凭数字就可能让你处于劣势。因此，尽可能以任何方式脱颖而出至关重要。当你有了一个真正相信的想法后，艰苦的工作才真正开始。请扪心自问以下问题：


    *   我的应用试图解决什么问题？

    *   我的应用的目标受众是谁？

    *   这个应用的最终目标是什么？

    *   这个应用会同时支持 iPhone 和 iPad 吗？


    一旦你回答了这些问题，并且没有哪个答案是致命障碍，那么你就可以继续开发你的应用了。这意味着你的想法是可靠的，你已经完成了基本的验证和市场调研，并且准备进入为
    iOS 设计应用的下一阶段。


    ## 总结


    所有应用都始于一个想法。但研究对你的设计也至关重要。明确应用的功能描述，并与他人验证，这将帮助你完善你的想法，使其不仅仅是一个想法。将你的应用想法与应用商店中的其他应用进行比较，是了解你将面临何种竞争、获取灵感以及理解用户真正需求的好方法。经历必要的定义和完善过程，是创建应用的重要一步，它将为后续步骤奠定基础。接下来，我们将讨论你需要了解的有关苹果新操作系统
    iOS7 的内容。


    ## 第 2 章：iOS：你需要了解什么


    `iOS` 代表 iPhone 操作系统，是所有苹果移动设备和平板电脑所基于的软件。这包括 iPhone、所有版本的 iPad，甚至包括 iPod Touch。`iOS`
    允许所有应用在这些设备上运行。`iOS` 于 2007 年伴随初代 iPhone 发布，直到最近 iOS 7 的宣布和发布，期间经历了多次小规模更新。


    它是一个用于多点触控设备的操作系统。因此，用户旨在直接与运行该操作系统的设备屏幕进行交互。这为设计师带来了一些独特的机遇和挑战。因此，了解哪些元素是标准的，并且在多年与
    `iOS` 的交互中已为用户所熟悉，这一点非常重要。


    在整个 `iOS` 中，有一些通用的 UI 元素，无论设备如何，它们都是标准的，并且无论在哪个应用中使用，都能帮助用户执行常见的操作。我们将回顾其中的一些元素，因为它们在您设计应用时会很有用。


    2013 年 6 月，在旧金山举行的年度开发者大会上，苹果公司发布了 iOS 7。在本章中，我们将讨论 iOS 的标准 UI 元素，以及它们如何随着 iOS
    7 演进和变化。


    ### iOS 7 的新特性


    iOS 7 之所以重要，是因为它代表了该操作系统自六年前发布以来最重大的变化。如果你正在从头设计一个应用，你需要了解苹果希望你如何遵循其新的设计语言；如果你已经设计了一个应用，那么你需要重新设计，以符合
    iOS 7 中提出的新的、改进的设计范式。


    虽然工具栏、标签栏、导航栏和其他用户界面元素的整体功能保持不变，但整个操作系统的外观和感觉已经完全改变。


    作为一家以设计为中心的公司，苹果一直以其软件和硬件的简洁美观设计美学而闻名。这种设计美学已成为公司传统的一部分。iOS 7 是这种设计美学的延伸。虽然它本身并不代表一种新的设计范式（它在设计上大方地借鉴了目前市场上一些更受欢迎的应用的提示和线索），但它确实代表了该操作系统的一个全新方向，并将改变设计师未来设计其应用的方式。可以这么说，体现
    pre-iOS 7 标准的应用在新操作系统上运行时会显得过时。


    #### iOS 7 的指导原则


    乔纳森·艾维，有时被称为苹果的创意沙皇，一直以允许形式与功能以美丽无缝的方式共存而闻名，无论是硬件还是软件，iOS 7 也不例外。因此，新界面以不引人注目而自豪。在整个更新的《人机界面指南》（HIG）中，苹果强烈要求设计师让设计服务于内容。iOS
    7 试图以身作则。遵循这一理念的设计师会发现，他们的应用在 iOS 7 框架内能够完美无缝地呈现和运行。


    为 iOS 7 设计的关键是保持简洁。这一点在 `HIG` 中一直有所提及，但伴随着这个新的设计方向，简洁性被推到了前台和中心位置。那些在旧版操作系统上运行良好的老式应用设计，在
    iOS 7 上会显得臃肿复杂。因此，你必须考虑如何在保持内容优先的同时适应这种新的色彩搭配。虽然以前对 iOS 的升级侧重于开发，但是这次也有很多开发方面的更新。设计师将被迫在未来的应用设计方式上做出重大改变。所有应用现在都必须针对视网膜屏幕进行优化，图标也有了新的外观和感觉。


    有三个指导原则和主题应该指导 iOS 7 应用的设计：


    -   ** deference（顺从）** – 指的是用户界面能够理解并与应用内容互动，而不是与之竞争。事实上，`HIG` 指出 UI *永远* 不应与内容竞争。这意味着你在
    UI 中选择的元素绝不能压倒内容，也不能让用户必须在两者之间做出选择。如果存在任何疑问，内容优先。每一次都是如此。


    -   **清晰** – 指的是所有新设计都必须在视网膜屏幕上清晰易读这一新要求。以前，如果你的设计没有针对视网膜屏幕优化，在新设备上会显得略微模糊。但现在不行了。随着
    iOS 7 的推出，苹果现在要求文本和图标在所有设备上都清晰、锐利、明了。这也意味着不再使用斜面效果和投影效果。


    -   **深度** – 新的注意力被放在了图层、透明度、半透明度和动效上，以在应用中创造深度感。iOS 7 充满了优美的过渡和逼真的动画，为环境增添了新的响应性和纵深感。


    如果你正在为 iOS 7 改造一个旧应用，你需要重新审视每一个页面，去除沉重的阴影、斜面以及其他容易使设计显得沉重的特征。请记住，功能性和内容必须占据前台和中心位置。iOS
    7 将以一种全新的方式向用户展示你的应用，所以请思考你将如何以优雅时尚的方式，在保留缩小版应用外观的同时，进一步提升其功能。所有这些元素必须相互平衡，才能与
    iOS 7 协同工作。


    现在，让我们看看在 iOS 7 中你可以期待的一些具体变化。从开发的角度来看有很多更新，但就本书而言，我们将主要关注那些会影响未来应用设计的变化：主屏幕、字体排印、图标、栏、表视图和表视图元素。


    ### 主屏幕

