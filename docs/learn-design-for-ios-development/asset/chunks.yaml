- fmt: '# The Springboard in iOS 7


    The springboard is where your app icons live on an iPhone or iPad. Everything
    sits on the springboard. Think of it like your computer’s desktop. Upon launching
    iOS you are presented by and will continually return to the springboard. You will
    immediately notice the changes to the springboard in iOS 7. Favorite app icons
    that previously sat at the bottom of the screen on a shiny, beveled shelf, as
    shown in [Figure 2-1](#9781430263647_Ch02.xhtml#Fig1), now sit against a translucent
    background that only partially obscures the wallpaper image as you can see in
    [Figure 2-2](#9781430263647_Ch02.xhtml#Fig2). Opening an app now triggers a smoother
    transition than before, and new settings allow users to set a panoramic image
    as wallpaper. Moving the phone left or right will produce a “panning motion effect,”
    too. iOS 7 is allowing users to interact with the UI in new ways, and this extends
    to apps as well. Users are now able to access some settings from the home screen,
    conduct a spotlight search from the springboard, and swipe down from the home
    menu to view the new notifications center. I’ll go into more detail on how the
    stock apps have been upgraded for iOS 7 later in this chapter.


    ![9781430263647_Fig02-01.jpg](images/9781430263647_Fig02-01.jpg)


    [Figure 2-1](#9781430263647_Ch02.xhtml#_Fig1). Springboard iOS 6 and icons. Favorite
    apps sit on a shiny shelf


    ![9781430263647_Fig02-02.jpg](images/9781430263647_Fig02-02.jpg)


    [Figure 2-2](#9781430263647_Ch02.xhtml#_Fig2). Messages and Phone icons now sit
    in a translucent bar at the bottom of the screen in iOS 7


    ## Typography


    The initial release of iOS 7 as well as subsequent releases featured a very skinny
    Helvetica Neue Ultra Light typeface throughout. It represented a totally different
    approach and offered a newer, lighter, and more modern look to the operating system.
    However, it also was difficult to view and thus read in some instances. The most
    recent release featured a removal from the ultra-light typeface to a heavier,
    more legible weight. And under the hood, there is a new rendering engine for fonts
    that allow developers to choose precisely how fonts are to appear throughout their
    apps. This will provide lots of customization options for designers in the way
    of typography.


    **Note** Designers with apps that use heavy text throughout will have to be redesigned
    for iOS 7.


    Something as simple as the text or typeface you choose for your app will become
    even more important in iOS 7 as it has been noted that new APIs will allow users
    to use Dynamic Type to adjust the size of text in each app. This puts an additional
    layer of responsibility on designers when thinking about how their apps will appear
    to users.


    ## Icons


    All of the icons for all standard apps have been redesigned. Gone are the beveled,
    shadow, and glossy skeumorphic look of the old icons from the previous versions
    of the operating system. Those of you with a keen eye will remember that as a
    standard, the old app icons could be used with or without the added sheen and
    gradient effect that was added programmatically. These effects have been removed
    altogether and have been replaced with icons that feature a new color palette
    and an also a new flat look that many of the newer more popular apps now feature.
    See [Figure 2-3](#9781430263647_Ch02.xhtml#Fig3) to understand how icons for all
    stock apps have been reimagined for iOS 7.


    ![9781430263647_Fig02-03.jpg](images/9781430263647_Fig02-03.jpg)


    [Figure 2-3](#9781430263647_Ch02.xhtml#_Fig3). iOS 6 & iOS 7 icons side by side


    **Note** Is it possible for your creative dept to recreate the chart above? The
    new iOS 7 icon for Safari is a circle on a white square. Hard to see on image
    above. Is it possible for the production dept to reproduce this?


    It is not only the icons for the stock apps that were redesigned. A quick look
    at the new Control Center that is accessible with a quick swipe from any page
    on the springboard will reveal that the icons here have been redesigned in the
    flat style of iOS 7 as well. These aren’t customizable and shouldn’t relate to
    your app, but a quick study is required to fully understand the scope of the changes
    that iOS 7 brings to the iPhone and iPad.


    But, the icons are just the beginning of how Apple has revised the look of all
    of their standard apps for the iPhone and iPad.


    [Figure 2-4](#9781430263647_Ch02.xhtml#Fig4) shows locked screen view on iOS 6.
    Note as well how the status bar appears separate from the rest of the screen and
    the shadowed and beveled buttons on the passcode typepad. iOS 7 does away with
    all of this.


    ![9781430263647_Fig02-04.jpg](images/9781430263647_Fig02-04.jpg)


    [Figure 2-4](#9781430263647_Ch02.xhtml#_Fig4). iOS 6 lock screen with passcode
    entry


    [Figure 2-5](#9781430263647_Ch02.xhtml#Fig5) shows the locked screen view in iOS
    7. Specific items to note here are the new appearance of the buttons on the keypad.
    They now conform to Apple’s new “flat” design and are round as opposed to the
    square keypad buttons used in iOS 6 and previous versions. Note the use of space
    and how the keypad becomes the focus of this screen. The functionality – entering
    your passcode is the main focus and nothing takes away from that experience. The
    experience in the older version is fragmented, with the individual number of windows
    taking up a significant amount of space on the screen. The consistent use of the
    circles that we’ve become used to as page controllers have been elevated in iOS
    7. They are now seen in the status bar as signal strength indicators and on the
    lockscreen as users enter passcodes for access to their devices.


    ![9781430263647_Fig02-05.jpg](images/9781430263647_Fig02-05.jpg)


    [Figure 2-5](#9781430263647_Ch02.xhtml#_Fig5). iOS 7 lock screen with passcode
    entry


    ## Bars


    Common UI elements in iOS are bars. They are used for multiple purposes such as
    to show information about the device, to provide a user with additional options
    or controls, and to display buttons.


    Bars vary in size depending on the device but mostly are a constant feature in
    iOS and are helpful to display critical information to the user. In iOS, they
    have specifically designed appearances and behaviors in all iOS apps. I’ve listed
    the most common bars for iOS below as well as how they’ve changed with iOS 7.


    ### Status Bar


    The status bar provides the user with information about the device such as time
    of day, battery charge information and networking connection details, and whether
    an application is accessing a user’s location information ([Figure 2-6](#9781430263647_Ch02.xhtml#Fig6)).
    It sits at the very top of the screen regardless of whether the device is in portrait
    or landscape mode. When designing your app, there are guidelines for how to use
    the status bar depending on the look and color palette of your app, and there
    are a few options you can choose from. Apple does allow you to hide the status
    bar when a user is viewing key information or playing a game. Other restrictions
    apply, however, such as using the network indicator to display when an app is
    utilizing considerable network resources.


    ![9781430263647_Fig02-06.jpg](images/9781430263647_Fig02-06.jpg)


    [Figure 2-6](#9781430263647_Ch02.xhtml#_Fig6). The status bar in iOS 7


    Visually some customization of the status bar was allowed but was limited to color
    and animation. Even though the height of the status bar is fixed, the information
    that it contains is critical, so if you do decide to hide the status bar, you
    should be sure that users are not required to quit the application to view it
    again.'
