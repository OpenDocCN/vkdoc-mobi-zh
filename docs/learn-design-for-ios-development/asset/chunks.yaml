    # Chapter 1: So You’ve Got an Idea for an iPhone App, Now What?


    Congratulations! You’ve got an idea for an app and have made the important decision
    to design it yourself! You’ve joined the ranks of the hundreds of thousands who
    have decided to learn just what is required to take an idea from a tiny spark
    in your imagination to a fully designed application ready for development.


    As you may or may not already know, apps are an integral part of the mobile ecosystem.
    All mobile devices run apps. However, your decision to design an app for iOS is
    a unique one. Of all of the app stores, the Apple app store is the granddaddy
    of them all, featuring more apps than any other app store. But, you already know
    this because you’ve chosen to design an app for iOS.


    Apps are everywhere. Since the Apple app store initially launched in July 2008
    with 500 apps, the number of apps have increased steadily. As of June 2013, that
    number has increased to just under 900,000 with Apple CEO Tim Cook estimating
    that $10 billion has been paid out to developers so far. So, if you have an idea
    for an app, there are great opportunities for making money and reaching a large
    audience with it. Those are pretty good reasons for wanting to design for iOS.


    These days, ideas for apps aren’t hard to find. Lots of people have them. So,
    how do you take your idea from just an idea to creating an actual app that is
    in the app store and runs on a device? It doesn’t happen overnight, but with a
    little diligence, it’s absolutely possible.


    Getting an app into Apple’s app store isn’t the hard part. But creating an app
    that features an original idea, great visuals, and great execution is; it requires
    lots of planning, a bit of research, and some dedication.


    If you are to take your idea through from just an idea to a fully designed and
    developed iOS app running on mobile devices, there are steps that you will need
    to take to get it there: very specific ones.


    While the process itself might seem arduous it is a necessary one, especially
    if this is your first time attempting to design the app.


    The simple truth is that most apps that are submitted to the app store die on
    the vine and fall into obscurity shortly after their release date. Without proper
    planning and faced with the competition from the sheer number of other apps in
    the app store, if your app doesn’t feature a unique idea and execution, then chances
    are, it won’t be noticed by very many people. Whether it’s for business or just
    a personal project, your ultimate goal when thinking of creating an app is to
    reach as many people as possible. If you’ve got a great idea for an app and you
    believe in it, then do it. There are many people who come up with an idea and
    never take it anywhere so you’re a part of a very small minority simply by having
    that idea. Celebrate it because the real work starts now.


    ## Assumptions


    This book makes a few assumptions, the main one being that you are at the very
    least familiar with iOS from a development standpoint but are looking for an opportunity
    to expand your development knowledge with some design knowledge as well. This
    book, however, is not about development per se. If you are curious about learning
    how to *build* an iPhone app, then this book isn’t for you. If you are, however,
    looking to enhance your knowledge of design specifically as it relates to the
    iPhone operating system, then you are in the right place.


    For the purposes of simplicity, in this chapter I’ve broken out the ideation process
    into six easy-to-follow steps. Each step will bring you closer to the ultimate
    goal of designing your iOS app.


    1. Define your idea.

    2. Share your idea with peers.

    3. Compare your app to others’.

    4. Analyze your findings.

    5. Store comparative apps for future reference.

    6. Revise your idea if needed.


    ## Step One: Define Your Idea


    First, write down your idea in one or two sentences. Three might be permissible
    but really try to nail it in two short sentences. If you need more sentences,
    that’s fine; however, the goal is to be able to describe and explain the idea
    behind your app and what it does in 30 seconds or less. This is usually called
    your elevator pitch and it is the first step in the process. Spend some time trying
    to make the sentence or sentences as succinct as possible while still capturing
    what your app does. This is important and will serve you and your app as you move
    forward because you will return to these statements again and again as you design
    and ultimately build your application. As you move through the next few steps,
    you will find that your description of the app might change as you look at other
    apps and categories. This is a natural part of the process. Be flexible and open
    to change.


    For example: “The Travel Light app will help frequent travelers by providing checklists
    to ensure that they pack only what they need for their upcoming trips.”


    After you’ve written your statement out, recite it until you have it in your memory.
    You should be able to say it without referring back to your notes. Ask yourself
    how it sounds. Are you using proper grammar? Are your ideas about the application
    timely? Does it solve a problem that people are facing today? Does it address
    issues in a way that people need it to? Is it unique? If so, what is unique about
    it? If not, then you will need to keep working on your description. Don’t rush
    this process. If you get stuck on the first step, then it is likely that your
    idea needs some work. Give it the time that it deserves.


    Once you can clear this first hurdle and you are happy with your description of
    the app, set it all aside and return to it after a few days. When you read your
    idea and its description again, does it sound as exciting to you as it did the
    first time? Does the sentence make you want to explore the application further?
    What has changed? More importantly, does it still sound like a good idea, and
    does it still fill you with the passion you initially had for the project?


    If not, then it might be worth it to take another stab at your description and
    the idea that spawned it. Depending on how strongly you feel about it, you might
    want to scrap that idea altogether and start on another idea for a different app.
    It is all up to you.


    It is important to remember that many people have ideas every day. But, there’s
    a big difference between having an idea and actually bringing it to fruition.
    The first step in the process is moving your idea past the initial idea stage.


    But, if you feel just as strongly as you did at the beginning and are still passionate
    about your idea, then it’s time to progress to the next step.


    ## Step Two: Share Your Idea with Peers


    Share your idea with others! This might sound counterintuitive and even downright
    scary to some, but it’s really not. In order to validate your idea, you simply
    must share it with others. What good is an idea if it sits in your head? Ask your
    friends and others around you that you trust and get them to speak honestly in
    response to your idea. Try to share your idea and description with people who
    aren’t afraid to give you honest feedback. Ask for constructive criticism, but
    also be sure that you are ready to receive it.


    Ask questions that will help to move the idea forward and ultimately inform its
    design and functionality. If you have time, create a brief questionnaire and ask
    people to fill it out.


    Staying with our initial idea of a Travel Light app above, the following questions
    are examples of what you might ask:'
