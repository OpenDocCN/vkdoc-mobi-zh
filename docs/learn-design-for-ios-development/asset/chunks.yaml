  raw: 'Lots of designers tend to start with higher resolution designs and scale down.
    It will make your life a whole lot easier as you will be able to finalize and
    perfect details that are viewable in the larger versions but not the scaled-down
    ones. To be fair, some designers may prefer scaling up. However most of the designers
    I speak and work with prefer to scale down from higher resolutions to smaller
    ones.


    Get ‘Em in Quick


    Intro screens and animations waste users’ time. Keep your login and registration
    processes as brief as possible and get to the meat of your app sooner rather than
    later. Anything else is prohibitive. If you must have a walkthrough or a demo
    of your app, allow the user to bypass this process if he or she chooses to. Having
    a low barrier to entry is a great practice.


    Test, Test, and Test Again


