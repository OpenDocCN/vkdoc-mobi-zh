  trans: '

    创建网格和网格线有几种不同的方法，当涉及到网格线和细分时，这可能会变得相当复杂，但我们将使用 Photoshop 自带的网格线作为参考，确保我们每个屏幕上的组件保持对齐。您还可以查看一些可用的
    Photoshop 插件和扩展，它们有助于为从网站到应用程序的所有内容创建网格线。现在，我们将保持简单，继续设计我们的“轻装旅行”应用。


    图 7-2 所示的主画布是您完成大部分工作的区域。在左侧，您会看到 `工具` 面板，主画布位于中间。请注意，屏幕形状与 iPhone 屏幕的宽高比和尺寸相匹配，而图层面板则位于最右侧。自定义此屏幕有多种方式。Photoshop
    允许您只保留在屏幕上认为关键的元素，以便您能够专注于手头的任务。我建议尝试不同的组合，以找到适合您的布局。不过，为了设计我们的应用，我们将坚持使用此屏幕。接下来，我将更详细地描述各个面板。


    ## 工具面板


    `工具` 面板顾名思义。您在 Photoshop 中可用的所有工具都将位于此面板中。该面板可以移动到屏幕上您喜欢的几乎任何位置。但在初次启动时，它将位于最左侧。如图
    7-3 所示。


    ![9781430263647_Fig07-03.jpg](img/9781430263647_Fig07-03.jpg)


    图 7-3。Photoshop 中的 `工具` 面板


    要查看面板中每个工具的功能，请将指针悬停在工具上，工具的名称就会在其下方弹出。建议对面板中的所有工具都这样做，以便您至少熟悉每个工具的名称并了解其功能。要选择工具，只需单击面板中的工具即可。如果您看到右下角有一个小三角形，通常表示在该工具的菜单中还有更多选项可供选择。`工具`
    面板的组织结构如下。


    ### 选择工具


    在 `工具` 面板的选择部分，您将找到以下允许您选择各种形状的工具：


    *   `移动工具` - 允许您移动图层或图像选区。

    *   `选框工具` - 选框工具允许用户以工具的形状（矩形、椭圆、单列和单行）进行选择。

    *   `套索工具` - 套索工具允许用户像使用钢笔或铅笔一样，围绕特定选区绘制自由手绘边界。此工具也可作为多边形和磁性工具使用。磁性套索会自动检测选区的边缘，而多边形工具将沿已有的直线绘制。

    *   `快速选择工具` – 此工具允许您基于颜色进行选择。

    *   `魔棒工具` – 魔棒工具允许用户在高对比度图像中进行选择。


    ### 裁剪与切片工具


    `裁剪` 和 `切片` 工具允许您提取图像的一部分以供使用，或从主图像创建一系列较小的图像。它们包括：


    *   `裁剪工具` - 裁剪工具允许您裁剪或移除图像的区域。

    *   `切片工具` - 这些工具允许用户为网页或其他用途切片图像选区。


    ### 测量工具


    Photoshop 中的测量工具允许您测量图像中两点之间的距离。测量工具还与一些其他工具组合在一起，包括：


    *   `吸管工具` – 允许您为前景选择特定颜色。

    *   `颜色取样器工具` – 主要用于色彩校正，此工具会记录特定颜色区域的色彩值。

    *   `标尺工具` – 允许您测量两点之间的距离。

    *   `注释工具` – 允许向图像或文档添加注释。


    ### 修饰工具


    修饰工具允许您修饰和清理甚至删除图像中需要改进的选定部分。此部分的工具包括：


    *   `污点修复画笔工具` – 允许您将一幅图像的纹理匹配到另一幅图像上，以修复或遮盖图像中的瑕疵。最适合处理圆形瑕疵。

    *   `修复画笔工具` – 允许您修复非圆形的图像瑕疵。

    *   `修补工具` – 通过混合两个区域来修复图像中的瑕疵。

    *   `红眼工具` – 修正照片中常见的红眼问题。

    *   `仿制图章工具` – 允许您遮盖或克隆图像的一部分到另一部分。

    *   `橡皮擦工具` – 允许您擦除图像中不需要的部分。

    *   `背景橡皮擦工具` 和 `魔术橡皮擦工具` – 允许您移除图像中不需要的背景。

    *   `模糊工具` – 允许您绘制并使图像的一部分变得模糊。

    *   `锐化工具` – 使图像看起来更清晰。

    *   `涂抹工具` – 允许您涂抹或污损图像的某个选区。

    *   `减淡工具` – 模拟摄影师的减淡过程。此工具让您能够加亮图像的一部分。

    *   `加深工具` – 与 `减淡工具` 成对，此工具允许您使图像的部分区域变暗。

    *   `海绵工具` – 用于增加或减少颜色的饱和度。


    ### 绘画工具


    绘画工具允许您使用画笔或不同类型的工具进行绘画或模拟绘画行为。它们允许您根据自己的偏好更改和自定义画笔，并从多种选项中进行选择。绘画工具包括：


    *   `画笔工具` – 让您使用画笔和各种不同的笔尖进行绘画。

    *   `铅笔工具` – 模拟用铅笔画画。

    *   `颜色替换工具` – 允许您在绘画时将一种颜色替换为另一种颜色。

    *   `混合器画笔工具` – 让您通过“混合”不同颜色来创建绘画效果。

    *   `历史记录画笔工具` – 允许您通过在选区内绘画以显示旧版本来恢复为较早版本的图像。

    *   `历史记录艺术画笔工具` – 此工具在 `历史记录画笔工具` 的基础上添加了效果。

    *   `渐变工具` – 让您创建一种背景或叠加，将一种颜色渐变为另一种颜色，从而创建渐变效果。

    *   `油漆桶工具` – 用纯色填充一个区域。


    ### 绘图与文字工具


    绘图和文字工具用于绘制形状以及在您正在创建的图像中写作或键入文字。此部分的工具包括：


    *   `钢笔工具` – 让您单击两个锚点，Photoshop 将在它们之间绘制一条线段。

    *   `自由钢笔工具` – 允许您像用笔一样自由手绘。

    *   `横排文字工具` 和 `直排文字工具` – 向图像添加文本，可以横向从左到右，或纵向从上到下。

    *   `蒙版工具` – 允许您创建文本的轮廓。

    *   `路径选择工具` – 允许您选择由其他任何工具创建的路径。

    *   `直接选择工具` – 允许您选择特定路径的锚点或部分，而不是整条路径。

    *   `形状工具` – 让您绘制多种不同的形状（矩形、椭圆、多边形、线条或自定义形状）。


    ### 视图与导航工具


    视图和导航工具允许您移动图像或放大以查看不同视图。


    *   `抓手工具` – 允许您在屏幕上移动图像。

    *   `旋转视图工具` – 允许您旋转对图像的特定视图。

    *   `缩放工具` – 允许您放大图像。


    ### 3D 工具


    3D 工具允许您在 Photoshop 中操纵和旋转 3D 模型。此部分的工具包括：


    *   `3D 对象旋转工具`（包括对象滚动、平移、滑动和缩放）– 允许您旋转、操纵和缩放 3D 模型。

    *   `3D 旋转相机工具` – 旋转 3D 相机视图，同时保持实际的 3D 对象固定。


    ## 图层面板

    '
- fmt: '假设你已按照[图7-2](#9781430263647_Ch07.xhtml#Fig2)所示设置好画布，[图7-4](#9781430263647_Ch07.xhtml#Fig4)中的`Layers`面板将位于右侧，你可以在其中看到设计中的所有元素。你将使用该面板来管理应用的设计。当你创建如[图7-2](#9781430263647_Ch07.xhtml#Fig2)所示的第一张图片时，这很可能就是应用的背景。虽然你可以在设计中使用多个图层，但只能有一个背景。


    ![9781430263647_Fig07-04.jpg](images/9781430263647_Fig07-04.jpg)


    [图7-4](#9781430263647_Ch07.xhtml#_Fig4)：Photoshop中的`Layers`面板


    在`Layers`面板中，你可以更改每个图层的偏好和属性，例如给定图层的透明度和不透明度。


    图层是你在Photoshop画布上创建的任何东西的构建块。如果你的应用非常复杂，那么你将拥有相当多的图层。养成命名图层并确保它们遵循应用自然结构的习惯。也就是说，当你打开主文件并查看设计时，你的图层应该很容易与你的设计相对应。你需要为图层命名，使其与设计内容对应。


    例如，这能让编辑和你的开发者查找图层变得更加容易。Photoshop会为图层命名，但方式并不直观（例如，图层1、2、3等）。如果你有一个包含大量图层的文件，并且这些图层名称与设计中的实际元素不对应，那么找出需要编辑的图层将花费大量时间。当图层数量开始增加时，你会发现为它们命名是最简单的方法。


    图层也可以分组。因此，如果你有几个与特定元素（如标签栏）关联的图层，你可能希望将这些图层分组或放入一个文件夹中。这样，在开发或后期需要修改设计时，查找它们会更容易。


    无论你从互联网上找到的模板中挑选元素（有很多这样的模板）还是自己创建，都要确保这些元素是矢量形式。矢量可以根据你的喜好进行缩放和调整，而不会损失质量。在Photoshop中，矢量被称为形状图层。当你开始从Retina屏幕缩放到非Retina屏幕时，你就会看到它们有多有用。


    ## 创建注册/登录页面


    为了我们`Travel Light`应用的目的，我们将保持设计相当简单。我们的第一个屏幕将是应用的注册或登录屏幕。虽然简单，但这个屏幕非常重要。它是用户与应用的首次接触。因此，品牌颜色也需要在这个屏幕上显现出来，所以请明智地选择你的背景颜色。如果你已经有了一个配色方案，这可以为你节省数小时的猜测和尝试不同颜色组合的时间。如果你知道用作基础颜色的颜色，一个简单的组合调色板的方法是改变基础颜色的色相和亮度来创建一些变体。为此，你需要在Photoshop中打开颜色选择器窗口。通过单击`Tools`面板底部代表前景色或背景色的任何颜色色板，可以访问颜色选择器面板。在那里，你可以选择十六进制代码或使用选择器通过视觉选择颜色。你还可以从此处调整饱和度或亮度。我在下面的[图7-5](#9781430263647_Ch07.xhtml#Fig5)中展示了颜色选择器。


    ![9781430263647_Fig07-05.jpg](images/9781430263647_Fig07-05.jpg)


    [图7-5](#9781430263647_Ch07.xhtml#_Fig5)：在Photoshop中选择颜色


    出于`Travel Light`应用的目的，我们选择了一个非常粉彩风格的配色方案。注意上面截图中的设置。我们将使用这种颜色作为背景，另一种颜色作为`Travel
    Light`应用的前景色。


    一旦背景设置好，我们将其标记为背景并锁定，以便我们可以在该图层之上自由移动。在定位元素时，你不希望它移动太多。然后，使用形状工具绘制代表输入字段（包括电子邮件登录和密码）以及提交按钮的形状。


    你不希望用太多信息让用户不知所措。你的目标是收集他们的信息并让他们尽快进入应用。保持简单。首要任务是让用户知道如何访问应用。根据我们的线框图，我们正在创建一个简单的注册页面，允许用户输入他们的电子邮件地址和密码，然后提交该信息以访问应用。


    [图7-6](#9781430263647_Ch07.xhtml#Fig6)中的屏幕分别展示了带网格线和不带网格线的设计页面。你可以选择使用或不使用它们。你可以通过以下路径打开或关闭它们：`View`
    → `Snap To`。你可以看到网格线如何帮助对齐屏幕上的所有元素。[图7-7](#9781430263647_Ch07.xhtml#Fig7)中的屏幕显示了包括`Tools`菜单在内的整个画布，以便你可以看到我如何命名对应于该页面的图层。


    ![9781430263647_Fig07-06.jpg](images/9781430263647_Fig07-06.jpg)


    [图7-6](#9781430263647_Ch07.xhtml#_Fig6)：带网格线和不带网格线的登录屏幕


    ![9781430263647_Fig07-07.jpg](images/9781430263647_Fig07-07.jpg)


    [图7-7](#9781430263647_Ch07.xhtml#_Fig7)：`Travel Light`登录屏幕画布


    我们刚刚为`Travel Light`应用创建了第一个页面，主要通过使用矩形工具创建了两个字段和一个按钮。以下是我设置画布并创建背景后采取的步骤：


    创建电子邮件和密码字段：


    1.  创建一个新图层并将其命名为“Email address”。

    2.  使用矩形工具绘制一个代表电子邮件地址字段的矩形。网格线将帮助你确保字段宽度合适，并且如果打开了智能参考线，它们将帮助你将其居中在屏幕上。

    3.  使用参考线帮助你在屏幕稍高的位置垂直对齐电子邮件字段，为第二个字段留出空间。

    4.  为字段选择一种颜色，并将图层命名为“Email”。

    5.  选择文字工具并在矩形中输入“Email address”。

    6.  根据需要调整字体大小和颜色。

    7.  通过右键单击并选择菜单中的“Duplicate layer”来复制图层。Photoshop将创建一个名为“Email address copy”的新图层。

    8.  双击标题将其更改为“Password”。

    9.  使用移动工具移动新字段。将其稍微向下定位，确保与上面的字段对齐。

    10. 选择文字工具，在矩形中输入“Password”以替换“Email address”。

    11. 创建另一个图层副本并将其命名为“Submit”。

    12. 重复上述步骤，为按钮赋予独特的颜色和标签。


    按钮的颜色应该让人一看就知道是可操作的，即使标签没有明确说明。我选择了亮绿色（#12e30d）作为提交或登录按钮的颜色。


    水平文字工具用于输入字段和按钮的标签。使用文字工具出现时显示的`Properties`面板来更改字体的字体、大小和颜色。


    如果你的应用主页屏幕有更多字段，那么添加并标记它们。别忘了添加一个操作按钮。尝试不同的颜色组合来打造你的应用品牌，并使其与下层页面保持一致。


    **提示**：如果在为应用构思配色方案时遇到困难，可以使用我在本书前面提到的一些资源。


    ## 创建选择和编辑行程页面


    现在，让我们进入一个包含更多元素的页面。'
  raw: 'Assuming you’ve set up your stage as I did in [Figure 7-2](#9781430263647_Ch07.xhtml#Fig2),
    your Layers panel shown in [Figure 7-4](#9781430263647_Ch07.xhtml#Fig4) will be
    on your right where you will be able to see all of the elements in your design.
    You will use this panel to manage the design of your app. When you create your
    very first image as seen in [Figure 7-2](#9781430263647_Ch07.xhtml#Fig2), this
    will most likely be the background of your app. While you can have multiple layers
    in your design, you can only have one background.


    ![9781430263647_Fig07-04.jpg](images/9781430263647_Fig07-04.jpg)


    [Figure 7-4](#9781430263647_Ch07.xhtml#_Fig4). The Layers panel in Photoshop


    From the Layers panel, you can change preferences and properties for each layer
    such as transparency and opacity of a given layer.


    Layers are building blocks of anything that you create on the Photoshop canvas.
    If your app is extremely complex, then you will have quite a few layers. Get into
    the habit of naming your layers and making sure that they follow the natural structure
    of your application. That is to say, when you open your master files and look
    at your design, your layers should easily correspond to your design. You will
    want to give your layers names that correspond to your design.


    For example, this makes it easier to make edits and for your developer to find
    layers. Photoshop will name layers but not in an intuitive way (i.e., layer 1,
    2, 3, etc.). If you have a file with a large number of layers, discovering which
    layer you need to edit if they don’t correspond to actual elements in your design
    will take a significant amount of time. Once they start to add up, you will see
    that naming them is easiest.


    Layers can also be grouped. Thus, if you have a few layers associated with a particular
    element such as a tab bar, you might want to group those layers or put them into
    one folder. This makes them easier to find when it comes to development or if
    you have to make changes later on to your designs.


    Whether you are choosing elements from templates you find floating around the
    Internet – and there are many – or creating your own, make sure that these elements
    are in vector form. Vectors can be scaled and adjusted to your liking without
    losing quality. In Photoshop, vectors are called shape layers. You’ll see how
    useful they are when you begin to scale from Retina down to non-Retina.


    Creating the Registration/Sign-in Page


    For the purposes of our Travel Light app, we will keep the design fairly simple.
    Our first screen will be the registration or login screen for our app. While simple,
    this screen is incredibly important. It is the first encounter that your users
    will have with your app. Therefore, branding colors will need to be apparent on
    this screen as well, so choose your background color wisely. If you already have
    a color palette that you’re working with, this can save you hours in guesswork
    and trying out various color combinations. If you know what color you’d like to
    use for your base color, a simple way to get a palette together is to alter the
    hue and brightness of your base to create a few variations. To do this, you’ll
    need to open the color picker window in Photoshop. The color picker panel is accessible
    by clicking any of the color swatches that represent the foreground or background
    color at the bottom of the Tools panel. From there, you can choose either Hex
    codes or use the picker to select a color by sight. You will also be able to adjust
    your saturation or brightness from here. I’ve shown the color picker below in
    [Figure 7-5](#9781430263647_Ch07.xhtml#Fig5).


    ![9781430263647_Fig07-05.jpg](images/9781430263647_Fig07-05.jpg)


    [Figure 7-5](#9781430263647_Ch07.xhtml#_Fig5). Picking a color in Photoshop


    For the purposes of our Travel Light app, we’ve chosen a very pastel-inspired
    color palette. Note the settings in the screenshot above. We’ll use this as the
    background and the other as the foreground of our Travel Light application.


    Once our background is in, we’ll label the background as such and lock it so that
    we are able to move freely around on top of that layer. You don’t want it moving
    too much as you position your elements. Then, use the shape tool to draw the shapes
    that will represent your entry fields (both e-mail login and password) as well
    as the submit button.


    You don’t want to overwhelm them with too much information here. Your goal is
    to collect their info and get them into the app as fast as possible. Make it simple.
    The first order of business will be for users to know how they can access the
    app. Going from our wireframes, we are creating a simple registration page that
    allows the user to enter his or her e-mail address and a password and then submit
    that information to access the app.


    The screens in [Figure 7-6](#9781430263647_Ch07.xhtml#Fig6) represent the designed
    page with gridlines and one without. You can work with or without them. You can
    turn them on or off by using the following path: View![arrow.jpg](images/arrow.jpg)Snap
    To. You are able to see how the gridlines help to align all of the elements on
    the screen. The screen in [Figure 7-7](#9781430263647_Ch07.xhtml#Fig7) shows the
    entire canvas including the Tools menu so that you can see how I’ve named the
    layers corresponding to this page.


    ![9781430263647_Fig07-06.jpg](images/9781430263647_Fig07-06.jpg)


    [Figure 7-6](#9781430263647_Ch07.xhtml#_Fig6). Sign-in screen with and without
    gridlines


    ![9781430263647_Fig07-07.jpg](images/9781430263647_Fig07-07.jpg)


    [Figure 7-7](#9781430263647_Ch07.xhtml#_Fig7). Travel Light sign-in screen canvas


    We’ve just created our first page for the Travel Light app primarily by using
    the rectangle tool to create two fields and a button. Here are the steps I took
    after setting up the stage and creating the background:


    To create the e-mail and password fields:


    1.  Create a new layer and call it “Email address.”

    2.  Use the rectangle tool to draw a rectangle that will represent the e-mail
    address field. The gridlines will help you to ensure that the field is the appropriate
    width and if you have your smart guides turned on, they will help you to center
    it on the screen.

    3.  Use the guides to help you vertically align the e-mail field slightly higher
    on the screen, leaving room for the second field.

    4.  Select a color for the field and name the layer “Email.”

    5.  Select the type tool and type “Email address” in the rectangle.

    6.  Adjust the size of the font and color if you need to.

    7.  Copy the layer by right clicking and selecting “Duplicate layer” from the
    menu. Photoshop will create a new layer called “Email address copy.”

    8.  Double click on the title to change it to “Password.”

    9.  Use the Move tool to move the new field. Position it slightly below, ensuring
    that it is aligned with the one above.

    10.  Select the Type tool and type “Password” in the rectangle to replace “Email
    address.”

    11.  Create another layer copy and name it “Submit.”

    12.  Repeat the steps above to give your button a distinct color and a label.


    The color of your buttons should scream action even if your label doesn’t. I went
    with a bright green (#12e30d) for the submit or sign-in button.


    The horizontal type tool was used to enter labels for the fields and the button.
    Use the Properties panel that will appear when the Type tool appears, to change
    the font, size, and color of the type.


    If the home screen page of your app has more fields, then add and label them.
    Don’t forget to add an action button. Experiment with different color combinations
    to brand your app and keep it consistent with the lower pages.


    **Tip**  Use some of the resources I pointed out earlier in the book if you are
    having trouble coming up with a color scheme for your app.


    Creating the Select and Edit Trips Page


    Now, let’s move onto a page with more elements.'
