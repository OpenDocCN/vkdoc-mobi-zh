    old gestures


    Feedback is another interaction principle that is very important in designing
    user interfaces for iOS. Feedback is a mechanism by which a user’s action is acknowledged,
    and he or she is aware that the intended process or outcome of said action is
    actually taking place ([Figure 4-3](#9781430263647_Ch04.xhtml#Fig3)). Stock iOS
    apps all have some element of feedback in them. For instance, pulling down to
    refresh a list of messages in a table view in the Mail app will reveal a spinner
    as the app connects with the server to download new messages. Also, initiating
    the process of updating an app will present a progress bar so that users are aware
    of the progress of the download. If the action is not successful, the app will
    let the user know usually by displaying a message of some sort. Sound can also
    be used as a powerful feedback indicator for any given initiated action. Using
    the Mail app as another example, a “ding” is the default sound for when new e-mails
    have been downloaded from the server. While these sounds can be changed in settings,
    some of them have become accepted norms for users within iOS.


    ![9781430263647_Fig04-03.jpg](images/9781430263647_Fig04-03.jpg)


    [Figure 4-3](#9781430263647_Ch04.xhtml#_Fig3). The Mail app in iOS7 uses color
    as a notifier of a specific task


    # Gestures in iOS


    There are a few different types of gestures that all users of iOS devices will
    find themselves using at some point or another. They are commonplace across all
    iOS apps and have now become a familiar part of the multi-touch lexicon. These
    are gestures that will feel “natural” to the user, are easily discoverable, and
    give the impression that they are interacting directly with the content they see
    on the screen. They are the following: Tap, Double Tap, Swipe, and Pinch, among
    others. The gestures listed here are commonplace in iOS and represent accepted
    paradigms for use in multi-touch devices and application across platforms.


    ## Tap


    A tap is the multi-touch equivalent of a click that users perform with a keyboard
    or a mouse. It allows users to select a control or an item that they see on the
    screen of their device.


    ## Double Tap


    A double tap allows a user to zoom in and center on an image or content. If a
    user is already zoomed in, then the reverse happens and the action will result
    in a zoom out.


    ## Drag or Pan


    A drag is a movement from side to side with a finger or fingers. The resulting
    action is a horizontal pan effect.


    ## Flick


    A flick is a faster version of a drag. A flick happens when a user moves his or
    her fingers quickly up or down on the screen.


    ## Swipe


    A swipe is an action that usually reveals the delete button in a table view. It
    is also used to move panels to the left or right depending on the application.


    ## Pinch


    A pinch applies using two fingers to create to a zooming view and is used to make
    an image or content smaller or bigger within a view on the screen. A user can
    pinch to zoom in or reverse the action to zoom out.


    ## Touch and Hold


    In text that is editable such as a message or the contents of a browser window,
    touch and hold will show a magnified view and allow the user to position the cursor
    anywhere within the text for easy editing.


    ## Shake


    While this isn’t a standard gesture or action, the shake initiates an undo or
    a redo of a previous action. However, innovative app developers have recently
    used the shake gesture in a variety of ways that have little to do with redo or
    undo actions.


    # New iOS Gestures


    New releases of iOS have sometimes introduced new gestures, and there have been
    rumors of new gestures being introduced with iOS7. If you decide to experiment
    with newer gestures in your application you will need to conduct thorough testing
    with potential users to ensure that the new gestures are intuitive and that users
    see desired and expected results by using them. Apple has done a great job with
    introducing new gestures. Of the rumored new gestures in iOS7, I’ve confirmed
    the following:


    ## Swipe Up


    This action when performed from any screen reveals the control center. After interacting
    with the controls on the Control Center screen, users may swipe down to reveal
    the page underneath. A swipe up is also used to exit or close an active or open
    app from the multitasking switcher view. This action was not previously associated
    with this result in older versions of iOS.


    ## Swipe Down


    This action from the top edge of any screen reveals the Notification Center that
    shows all undismissed notifications for the current day as well as those you may
    have missed. Swiping up closes the notification panel. Swiping down from the home
    inside the home screen will reveal the spotlight search. Previously, the spotlight
    search was found by swiping to the right of the first page on the springboard.
    An example of this is shown in [Figure 4-4](#9781430263647_Ch04.xhtml#Fig4).


    ![9781430263647_Fig04-04.jpg](images/9781430263647_Fig04-04.jpg)


    [Figure 4-4](#9781430263647_Ch04.xhtml#_Fig4). The notification bar and Spotlight
    Search are accessed by the swipe down action


    ## Swipe Right (In Mail App)


    Swiping right in the mail app while viewing a message in its entirety (not preview)
    will take the user back to the list view and previews of all messages in a scrollable
    table view.


    # The iPad; How Is It Different?


    The iPad was released on April 3, 2010, to mixed reviews and some ridicule and
    jokes because of its name. It marked Apple’s entry into the still relatively new
    tablet computer field. Today, there are currently a few different types of iPads
    on the market. The first generation iPad is no longer supported and won’t be able
    to run iOS7. For the purposes of this book, we will focus only on current iPad
    models still supported by Apple and available for purchase from Apple.


    It is easy to think that the iPad is just a larger version of the iPhone. This
    assumption would be incorrect. The iPad is more a computer than it is a phone,
    and the way that people interact with the iPad vs. the iPhone is very different.
    Designers must remember this. It is easy, though, to understand why the iPad is
    thought of as just an oversized iPhone; it looks almost exactly like an iPhone
    does. However, the iPhone is an entirely different device than the iPad. Users
    who use the iPad also often have an iPhone as well, but their expectations are
    different when using the iPad. As the top-selling tablet ever, the iPad is owned
    by a large and varied demographic. According to a recent study by the analytics
    company Flurry, they run the gamut from children, moms, home design enthusiasts,
    and small business owners. Therefore, as with any other application, your iPad
    application must be designed with a specific demographic in mind.


    E-commerce is also a large part of the iPad market. The iPad dominates the tablet
    market when it comes to online shopping and traffic generation. With this in mind,
    it is important to understand not just what people are doing on the iPad but *how.*


    The iPad, in terms of the class of device that it is, sits between the phone and
    the computer; it is also between the iPhone and the Mac and is meant to allow
    users to do more than they could on an iPhone only. Expectations on what the iPad
    can do are increasing with each new release. Currently, there are three different
    iPads on the market. They are the following:'
  raw: '[Figure 4-2](#9781430263647_Ch04.xhtml#_Fig2). The Mailbox app actions for
    old gestures


    Feedback is another interaction principle that is very important in designing
    user interfaces for iOS. Feedback is a mechanism by which a user’s action is acknowledged,
    and he or she is aware that the intended process or outcome of said action is
    actually taking place ([Figure 4-3](#9781430263647_Ch04.xhtml#Fig3)). Stock iOS
    apps all have some element of feedback in them. For instance, pulling down to
    refresh a list of messages in a table view in the Mail app will reveal a spinner
    as the app connects with the server to download new messages. Also, initiating
    the process of updating an app will present a progress bar so that users are aware
    of the progress of the download. If the action is not successful, the app will
    let the user know usually by displaying a message of some sort. Sound can also
    be used as a powerful feedback indicator for any given initiated action. Using
    the Mail app as another example, a “ding” is the default sound for when new e-mails
    have been downloaded from the server. While these sounds can be changed in settings,
    some of themhave become accepted norms for users within iOS.


    ![9781430263647_Fig04-03.jpg](images/9781430263647_Fig04-03.jpg)


    [Figure 4-3](#9781430263647_Ch04.xhtml#_Fig3). The Mail app in iOS7 uses color
    as a notifier of a specific task


    Gestures in iOS


    There are a few different types of gestures that all users of iOS devices will
    find themselves using at some point or another. They are commonplace across all
    iOS apps and have now become a familiar part of the multi-touch lexicon. These
    are gestures that will feel “natural” to the user, are easily discoverable, and
    give the impression that they are interacting directly with the content they see
    on the screen. They are the following: Tap, Double Tap, Swipe, and Pinch, among
    others. The gestures listed here are commonplace in iOS and represent accepted
    paradigms for use in multi-touch devices and application across platforms.


    Tap


    A tap is the multi-touch equivalent of a click that users perform with a keyboard
    or a mouse. It allows users to select a control or an item that they see on the
    screen of their device.


    Double Tap


    A double tap allows a user to zoom in and center on an image or content. If a
    user is already zoomed in, then the reverse happens and the action will result
    in a zoom out.


    Drag or Pan


    A drag is a movement from side to side with a finger or fingers. The resulting
    action is a horizontal pan effect.


    Flick


    A flick is a faster version of a drag. A flick happens when a user moves his or
    her fingers quickly up or down on the screen.


    Swipe


    A swipe is an action that usually reveals the delete button in a table view. It
    is also used to move panels to the left or right depending on the application.


    Pinch


    A pinch applies using two fingers to create to a zooming view and is used to make
    an image or content smaller or bigger within a view on the screen. A user can
    pinch to zoom in or reverse the action to zoom out.


    Touch and Hold


    In text that is editable such as a message or the contents of a browser window,
    touch and hold will show a magnified view and allow the user to position the cursor
    anywhere within the text for easy editing.


    Shake


    While this isn’t a standard gesture or action, the shake initiates an undo or
    a redo of a previous action. However, innovative app developers have recently
    used the shake gesture in a variety of ways that have little to do with redo or
    undo actions.


    New iOS Gestures


    New releases of iOS have sometimes introduced new gestures, and there have been
    rumors of new gestures being introduced with iOS7\. If you decide to experiment
    with newer gestures in your application you will need to conduct thorough testing
    with potential users to ensure that the new gestures are intuitive and that users
    see desired and expected results by using them. Apple has done a great job with
    introducing new gestures. Of the rumored new gestures in iOS7, I’ve confirmed
    the following:


    Swipe Up


    This action when performed from any screen reveals the control center. After interacting
    with the controls on the Control Center screen, users may swipe down to reveal
    the page underneath. A swipe up is also used to exit or close an active or open
    app from the multitasking switcher view. This action was not previously associated
    with this result in older versions of iOS.


    Swipe Down


    This action from the top edge of any screen reveals the Notification Center that
    shows all undismissed notifications for the current day as well as those you may
    have missed. Swiping up closes the notification panel. Swiping down from the home
    inside the home screen will reveal the spotlight search. Previously, the spotlight
    search was found by swiping to the right of the first page on the springboard.
    An example of this is shown in [Figure 4-4](#9781430263647_Ch04.xhtml#Fig4).


    ![9781430263647_Fig04-04.jpg](images/9781430263647_Fig04-04.jpg)


    [Figure 4-4](#9781430263647_Ch04.xhtml#_Fig4). The notification bar and Spotlight
    Search are accessed by the swipe down action


    Swipe Right (In Mail App)


    Swiping right in the mail app while viewing a message in its entirety (not preview)
    will take the user back to the list view and previews of all messages in a scrollable
    table view.


    The iPad; How Is It Different?


    The iPad was released on April 3, 2010, to mixed reviews and some ridicule and
    jokes because of its name. It marked Apple’s entry into the still relatively new
    tablet computer field. Today, there are currently a few different types of iPads
    on the market. The first generation iPad is no longer supported and won’t be able
    to run iOS7\. For the purposes of this book, we will focus only on current iPad
    models still supported by Apple and available for purchase from Apple.


    It is easy to think that the iPad is just a larger version of the iPhone. This
    assumption would be incorrect. The iPad is more a computer than it is a phone,
    and the way that people interact with the iPad vs. the iPhone is very different.
    Designers must remember this. It is easy, though, to understand why the iPad is
    thought of as just an oversized iPhone; it looks almost exactly like an iPhone
    does. However, the iPhone is an entirely different device than the iPad. Users
    who use the iPad also often have an iPhone as well, but their expectations are
    different when using the iPad. As the top-selling tablet ever, the iPad is owned
    by a large and varied demographic. According to a recent study by the analytics
    company Flurry, they run the gamut from children, moms, home design enthusiasts,
    and small business owners. Therefore, as with any other application, your iPad
    application must be designed with a specific demographic in mind.


    E-commerce is also a large part of the iPad market. The iPad dominates the tablet
    market when it comes to online shopping and traffic generation. With this in mind,
    it is important to understand not just what people are doing on the iPad but *how.*


    The iPad, in terms of the class of device that it is, sits between the phone and
    the computer; it is also between the iPhone and the Mac and is meant to allow
    users to do more than they could on an iPhone only. Expectations on what the iPad
    can do are increasing with each new release. Currently, there are threedifferent
    iPads on the market. They are the following:'
  trans: '

    # 图 4-2. Mailbox 应用针对旧手势的操作


    反馈是另一个在 iOS 用户界面设计中非常重要的交互原则。反馈是一种机制，通过它用户的操作得到确认，并且用户能感知到该操作所对应的流程或结果正在实际发生（图
    4-3）。iOS 原生应用都包含一定的反馈元素。例如，在 Mail 应用中下拉刷新列表中的消息时，当应用连接服务器下载新消息时，会显示一个旋转的加载指示器。同样，启动应用更新过程时，会显示一个进度条，以便用户了解下载进度。如果操作不成功，应用通常会通过显示某种类型的消息来告知用户。对于任何给定的已启动操作，声音也可以作为强大的反馈指示器。再以
    Mail 应用为例，“叮”的一声是服务器下载新邮件时的默认声音。虽然这些声音可以在设置中更改，但其中一些已成为 iOS 用户公认的标准。


    ![9781430263647_Fig04-03.jpg](img/9781430263647_Fig04-03.jpg)


    图 4-3. iOS7 中的 Mail 应用使用颜色作为特定任务的提示器


    # iOS 中的手势


    所有 iOS 设备用户都会发现自己在不同时候会用到几种不同类型的手势。它们在所有 iOS 应用中都很常见，并且已成为多点触控术语中熟悉的一部分。这些手势对用户来说感觉“自然”，易于发现，并给人一种他们正在直接与屏幕上看到的内容进行交互的印象。它们包括：轻点、双击、轻扫和捏合等。此处列出的手势在
    iOS 中很常见，代表了跨平台的多点触控设备和应用中公认的交互范式。


    ## 轻点


    轻点是等同于用户使用键盘或鼠标进行点击的多点触控操作。它允许用户选择屏幕上看到的控件或项目。


    ## 双击


    双击允许用户放大并居中显示图像或内容。如果用户已经放大，则执行相反操作，结果将是缩小。


    ## 拖移或平移


    拖移是指使用一根或多根手指从一侧移动到另一侧。产生的效果是水平平移。


    ## 轻拂


    轻拂是拖移的更快版本。当用户的手指在屏幕上快速向上或向下移动时，就会发生轻拂操作。


    ## 轻扫


    轻扫通常是在表格视图中显示删除按钮的操作。根据应用不同，它也用于将面板向左或向右移动。


    ## 捏合


    捏合使用两根手指来创建缩放视图，用于使屏幕视图内的图像或内容变小或变大。用户可以捏合以放大，或反向操作以缩小。


    ## 触摸并按住


    在可编辑的文本（例如消息或浏览器窗口的内容）中，触摸并按住会显示一个放大视图，并允许用户在文本中的任何位置定位光标以便于编辑。


    ## 摇晃


    虽然这不是标准的手势或操作，但摇晃可以撤销或重做之前的某个操作。然而，创新的应用开发者最近以多种方式使用了摇晃手势，这些方式与重做或撤销操作关系不大。


    # 新的 iOS 手势


    新版本的 iOS 有时会引入新的手势，并且有传言称 iOS7 中也引入了新手势。如果你决定在应用中尝试使用更新的手势，你需要对潜在用户进行彻底测试，以确保新手势直观，并且用户通过使用它们能看到期望和预期的结果。苹果在引入新手势方面做得非常出色。在关于
    iOS7 新手势的传闻中，我已确认了以下内容：


    ## 向上轻扫


    在任何屏幕上执行此操作都会显示控制中心。在与控制中心屏幕上的控件交互后，用户可以向下轻扫以显示其下方的页面。向上轻扫也用于从多任务切换器视图中退出或关闭一个活动的或打开的应用。在旧版本的
    iOS 中，此操作以前并未与这种结果相关联。


    ## 向下轻扫


    在任何屏幕的顶部边缘执行此操作会显示通知中心，其中显示当天所有未清除的通知以及你可能错过的通知。向上轻扫会关闭通知面板。在主屏幕内从顶部向下轻扫会显示“聚焦搜索”。此前，“聚焦搜索”是通过在主屏幕的第一页向右轻扫来找到的。图
    4-4 展示了这一示例。


    ![9781430263647_Fig04-04.jpg](img/9781430263647_Fig04-04.jpg)


    图 4-4. 通过向下轻扫操作可访问通知栏和“聚焦搜索”


    ## 向右轻扫（在 Mail 应用中）


    在 Mail 应用中，当以完整视图（而非预览）查看消息时，向右轻扫会将用户带回到可滚动的表格视图，其中显示所有消息的列表视图和预览。


    # iPad；有何不同？


    iPad 于 2010 年 4 月 3 日发布，因其名称而获得了褒贬不一的评价以及一些嘲笑和玩笑。它标志着苹果进入了当时还算新颖的平板电脑领域。如今，市场上有几种不同类型的
    iPad。第一代 iPad 已不再受支持，也无法运行 iOS7。出于本书的目的，我们将只关注仍受苹果支持且可在苹果商店购买的当前 iPad 型号。


    人们很容易认为 iPad 只是 iPhone 的放大版。这种假设是不正确的。iPad 更像是一台电脑而非手机，并且人们与 iPad 交互的方式与 iPhone
    非常不同。设计师必须牢记这一点。然而，很容易理解为什么 iPad 被认为只是一个超大号的 iPhone；它的外观几乎与 iPhone 一模一样。但是，iPhone
    是完全不同于 iPad 的设备。使用 iPad 的用户通常也有一部 iPhone，但他们对使用 iPad 的期望是不同的。作为有史以来最畅销的平板电脑，iPad
    拥有广泛且多样化的用户群体。根据分析公司 Flurry 最近的一项研究，其用户群体涵盖了儿童、母亲、家居设计爱好者和小企业主等。因此，与其他任何应用一样，你的
    iPad 应用必须针对特定的用户群体进行设计。


    电子商务也是 iPad 市场的重要组成部分。在在线购物和流量产生方面，iPad 主导着平板电脑市场。考虑到这一点，不仅了解人们用 iPad 做什么很重要，了解他们*如何*做同样重要。


    就其设备类别而言，iPad 介于手机和电脑之间；它也介于 iPhone 和 Mac 之间，旨在让用户能够做比仅使用 iPhone 更多的事情。人们对 iPad
    能力的期望随着每次新版本的发布而增长。目前，市场上有三种不同的 iPad。它们分别是：

    '
- fmt: '# iPad 系列概览


    - **iPad Mini**：`iPad Mini` 是 iPad 家族的最新成员，于 2012 年 11 月发布。它是 iPad 的缩小版，旨在吸引更倾向于使用
    Kindle 和 Nook 等阅读器的用户。

    - **iPad 2**：`iPad 2` 于 2011 年 3 月发布。该版本比第一代原始 iPad 更轻、更薄。与 `iPad Mini` 和 Retina
    版本不同，`iPad 2` 仍使用旧的 30 针连接器。它也是首款配备双面摄像头的 iPad。

    - **iPad Retina**：该版本分别于 2012 年 3 月和 10 月发布；第三代和第四代 iPad 非常相似。`iPad 4 Retina`
    使用了新的 Lightning 连接器。它还引入了更新、更快的处理器，用于从互联网下载内容和处理图形。`iPad 3` 已停产。


    目前，当设计师提交 iPad 应用时，必须经过测试并在所有 iPad 上表现出最佳性能。配备 Retina 屏幕的 iPad 像素密度高，能使设计精良的应用看起来惊艳。不幸的是，它也会凸显低质量或低分辨率设计的瑕疵。据信，未来*所有*
    iOS 应用提交都必须包含针对 Retina 以及低分辨率支持设备的资源。


    # iPad 与 iPhone 的设计差异


    那么，iPad 到底有何不同？首先，它比 iPhone 更大，为多点触控交互提供了更多空间，也为额外的设计元素留出了余地。此外，用户与 iPad 的交互方式也与
    iPhone 不同。iPhone 用户是移动的，他们需要借助设备来应对繁忙的生活方式。而 iPad 用户通常是在教室、沙发或“后仰式”场景中使用设备。在设计
    iPad 应用时，请考虑以下几点：


    - 用户与你的应用交互时，会如何持握设备？

    - 你的应用在竖屏和横屏模式下都能正常工作吗？

    - 哪种屏幕方向更适合与应用相关的任务？

    - 用户在使用你的应用时，可能正在做什么？

    - 他们处于怎样的环境中？这又如何影响他们对设备的使用？


    这些因素在你开始设计 iPad 应用时都很重要。iPad 提供给设计师的额外空间应被明智地利用。不要用不必要的、无价值的元素填充它，这些元素不会给用户或应用的整体体验增加价值。应添加能够增强用户对你所创建空间和环境理解的
    UI 元素。


    Apple 为 iPad 设计制定的指南与 iPhone 类似；关于内容、可用性和上下文的相同原则仍然适用。确定哪些功能是绝对必要的，并为你用户提供这些功能。使用用户画像来思考你的用户是谁，以及每个画像将如何与应用交互。每个画像可能有不同的需求。确保用户所需的功能在任何时候都易于访问。如果用户必须费力寻找他们觉得应该显而易见的东西，就会导致糟糕的用户体验，甚至可能带来差评。


    > **注意**：用户画像是一个虚构角色，代表着具有特定特征和行为子集的用户群体。用户画有助于验证设计和用户体验。


    # iPad 特有的 UI 元素


    尽管大多数导航项相同，但 iPad 确实拥有一些 iPhone 不可用的 UI 元素，例如弹出视图和分屏视图。


    ## 弹出视图


    弹出视图是一种呈现在现有屏幕内容之上的视图。它通常有一个指向或箭头来指示用户它从何处出现，并且应覆盖其背后的内容，使用户能够专注于其内部的内容。弹出视图中可以放置多种不同类型的信息和
    UI 元素。它可以包含带有列表的表格视图、以操作列表形式显示给用户的额外选项，或者分屏视图中左侧面板的内容。Apple 对如何使用弹出视图有具体说明，因此请务必阅读《人机界面指南》以获取使用说明。


    虽然允许在弹出视图中使用标准 UI 控件，但绝*不能*添加“关闭”或“退出”按钮。关闭弹出视图应遵循现有的 iOS 范式，即当用户点击其外部或屏幕上的任意其他地方时消失。关闭或退出按钮是常见的
    Web 范式，在 iOS 中不存在。此外，虽然没有高度限制，但有 320–600 点的宽度限制。这取决于你在设计中显示的信息。[图 4-5](#9781430263647_Ch04.xhtml#Fig5)
    显示了两种不同长度的弹出视图。


    ![9781430263647_Fig04-05a.jpg](images/9781430263647_Fig04-05a.jpg) ![9781430263647_Fig04-05b.jpg](images/9781430263647_Fig04-05b.jpg)


    *图 4-5. 来自 iOS 6 和 iOS 7 的 iPad 弹出视图*


    寻找巧妙新颖的方式来展示弹出视图是允许的。要跳出框框思考，但始终将用户体验放在首位。


    ## 分屏视图


    分屏视图是指屏幕被分成两个并排的独立面板。在空间上，左侧面板始终比右侧面板窄。Apple 将右侧面板的宽度留给设计师决定，但建议最小宽度为 320 点。从视觉上看，右侧面板较大而左侧面板较小更为平衡。思考两个面板之间的关系，以及你希望在每个面板中呈现什么信息。通常两者之间存在关联，需要仔细思考和规划，来决定你希望用户如何从上下文关联信息，以及你将如何呈现这些信息。


    左侧面板通常被称为主面板，右侧面板被称为详细面板。这应为你如何呈现 UI 元素和信息提供一些思路。然而，这种关系并非严格强制，更多地是指向一种用户可能已习惯的惯例，而非
    Apple 强制执行的规范。在 iOS 7 中，分屏视图屏幕可以在竖屏或横屏模式下访问。[图 4-6](#9781430263647_Ch04.xhtml#Fig6)
    显示了竖屏模式下的分屏视图。


    ![9781430263647_Fig04-06.jpg](images/9781430263647_Fig04-06.jpg)


    *图 4-6. iOS 7 中竖屏方向的分屏视图屏幕*


    # 视觉上下文


    由于 iPad 拥有额外的屏幕空间，人们可能会忍不住简单地拉伸和拉长 iPhone 设计来创建 iPad 应用。这样做将是一个错误。iPad 的增加的空间意味着设计师确实有更多空间来……设计。菜单应该是上下文相关的。也就是说，它们应靠近其所关联的内容。让用户到右侧去编辑左侧的内容会让人迷失方向。诸如弹出视图之类的工具应在需要时使用，并在它们帮助用户完成特定任务时使用。


    尽量不要在屏幕底部或标签栏中堆叠过多项目。iPad 的尺寸使得屏幕底部根据用户持握设备的方式成为一个容易被忽视的区域。使用弹出视图和分屏视图等额外元素来为内容提供上下文。'
  raw: '*   The iPad Mini: The iPad mini is the most recent addition to the iPad family.
    It was released in November of 2012 and is a smaller version of the iPad aimed
    at targeting users who were more inclined toward readers such as the Kindle and
    Nook.

    *   The iPad 2: The iPad 2 was released in March of 2011\. This version of the
    iPad is both lighter and thinner than the original, first generation iPad. Unlike
    the iPad mini and Retina versions of the iPad, the iPad 2 still has the old 30-pin
    connector. It was also the first iPad to featuredual facing cameras.

    *   The iPad Retina: This was released in March and October 2012 respectively;
    the third and fourth generations of the iPad are very similar. The iPad 4 Retina
    uses the new lightening connector. It also introduced a newer, faster processor
    for downloading content from the Internet and for processing graphics. The iPad
    3 has been discontinued.


    Currently, when a designer submits an app for the iPad, it must be tested and
    shown to perform optimally on all iPads. The iPad with Retina screens have a high
    pixel count and can make well-designed apps look stunning. Unfortunately, it also
    highlights the imperfections in bad or low-res designs. It is believed that moving
    forward, *all* iOS app submissions must include assets for Retina as well as lower
    res supported devices.


    So, what exactly is different about the iPad? Well, for starters, it’s larger
    than the iPhone and allows more real estate for multi-touch interactivity and
    room for additional design elements. Also, the way that the iPad is used differs
    from the way users interact with their iPhones. IPhone users are mobile. They
    are on the go, and they use their devices to help them along their busy lifestyles.
    iPad users are typically using the device in a classroom, on a couch or in a “lean-back”
    situation. Consider these things when you think about the design of your iPad
    application:


    How will users hold the device when they are interacting with your app?


    Will your app work in both portrait and landscape?


    Which orientation suits the tasks associated with your app better?


    What are users likely to be doing when they are using your app?


    What environments will they be in and how will it affect their use of the device?


    These things will all matter when you begin to design your iPad app. The extra
    real estate that the iPad affords designers should be used wisely. Do not fill
    it with unnecessary, unneeded elements that don’t add value to the user or the
    overall experience of the app. Add UI elements that enhance the user’s understanding
    of the space and environment that your app has created and in which he or she
    will be working.


    The guidelines that Apple set for designing for the iPad are similar to those
    for the iPhone; the same principles regarding content, usability and context will
    still apply. Figure out what functionality is absolutely needed and provide that
    for your users. Use personas to think about who your users are and how each persona
    will interact with the app. It is possible that each persona will have different
    needs. Make sure that what’s needed is easily accessible at all times. If users
    have to try to find something that they feel should be obvious, it leads to a
    bad user experience, and potentially bad review.


    **Note**  A persona is a fictional character that represents a subset of users
    with a specific group of characteristics and behaviors when interacting with your
    app. Personas are helpful in validating design and user experience.


    Although most of the navigational items are the same, the iPad does have a few
    UI elements that are not available for the iPhone, such as the popover and the
    split view screen.


    Popover View


    A popover is a view that presents itself over the contents of an existing screen.
    It usually will have a point or arrow of some sort to orient the user to where
    it has emerged and should cover whatever is behind it so that the user is able
    to focus on the content within it. Many different types of information and UI
    elements can be placed within a popover. It can contain a table view with a list,
    additional options for the user displayed in an action sheet, or contents of a
    left pane in a split view. Apple lays out specific instructions on how to use
    a popover so be sure to read the Human Interface Guidelines to get instructions
    on its usage.


    While it is permissible to use standard UI controls within popovers, it is never
    ok to add a “Close” or “Dismiss” button. Dismissing a popover should follow the
    existing iOS paradigm, which is to disappear whenever a user taps anywhere outside
    of it or anywhere else on the screen. The close or dismiss button is a common
    web paradigm that does not exist in iOS. Also while there is no height restriction,
    there is a width restriction of 320–600 points. This can depend on the information
    being displayed on your design. [Figure 4-5](#9781430263647_Ch04.xhtml#Fig5) shows
    popovers with two different lengths.


    ![9781430263647_Fig04-05a.jpg](images/9781430263647_Fig04-05a.jpg) ![9781430263647_Fig04-05b.jpg](images/9781430263647_Fig04-05b.jpg)


    [Figure 4-5](#9781430263647_Ch04.xhtml#_Fig5). iPad popovers from iOS6 and iOS7


    It is permissible to find clever and novel ways so show your popovers. Think out
    of the box but always keep the user experience front and center.


    Split View Screen


    A split view is a screen that has been broken into two separate panes that sit
    side by side. Spatially, the left pane is always thinner than the right pane.
    Apple leaves the width of the right pane up to the designer but recommends a minimum
    width of 320 points. Visually, having a larger right pane and a smaller left pane
    is more balanced. Think about the relationship between the two panes and what
    information you would like to present in each pane. There usually is a relationship
    between the two, and it requires some thought and planning to decide how you want
    users to contextually relate to the information and how you will need to present
    it.


    The left pane is usually referred to as the master pane and the right as the detail
    pane. This should offer some ideas about how to present your UI elements and information.
    However, this relationship isn’t strictly enforced and refers mostly to orientation
    and what users may have come to expect as a convention rather than one that is
    enforced by Apple. A splitview screen can be accessed in either portrait or landscape
    in iOS7\. [Figure 4-6](#9781430263647_Ch04.xhtml#Fig6) shows a portrait split
    panel view.


    ![9781430263647_Fig04-06.jpg](images/9781430263647_Fig04-06.jpg)


    [Figure 4-6](#9781430263647_Ch04.xhtml#_Fig6). The splitview screen in portrait
    orientation in iOS7


    Visual Context


    Because of the additional real estate on an iPad, it might be tempting to simply
    stretch and lengthen your iPhone designs to create your iPad application. Doing
    so would be a mistake. The added real estate on the iPad means that designers
    do have more space to, well, . . . design. Menus should be contextual. That is
    to say, they should be in close proximity to the content to which they are relating.
    Making users go to the right to edit content on the left will be disorienting.
    Tools such as popovers should be used when needed and when they help users with
    the specific task at hand.


    Try not to stack too many items at the bottom of the screen or in your tab bar.
    The sheer size of the iPad makes the bottom of the screen a forgotten area depending
    on how a user is holding the device. Use the additional elements like popover
    and split screens to provide context to content.


    User Interaction'
  trans: '

    # iPad 系列概览


    - **iPad Mini**：`iPad Mini` 是 iPad 家族的最新成员，于 2012 年 11 月发布。它是 iPad 的缩小版，旨在吸引更倾向于使用
    Kindle 和 Nook 等阅读器的用户。

    - **iPad 2**：`iPad 2` 于 2011 年 3 月发布。该版本比第一代原始 iPad 更轻、更薄。与 `iPad Mini` 和 Retina
    版本不同，`iPad 2` 仍使用旧的 30 针连接器。它也是首款配备双面摄像头的 iPad。

    - **iPad Retina**：该版本分别于 2012 年 3 月和 10 月发布；第三代和第四代 iPad 非常相似。`iPad 4 Retina`
    使用了新的 Lightning 连接器。它还引入了更新、更快的处理器，用于从互联网下载内容和处理图形。`iPad 3` 已停产。


    目前，当设计师提交 iPad 应用时，必须经过测试并在所有 iPad 上表现出最佳性能。配备 Retina 屏幕的 iPad 像素密度高，能使设计精良的应用看起来惊艳。不幸的是，它也会凸显低质量或低分辨率设计的瑕疵。据信，未来*所有*
    iOS 应用提交都必须包含针对 Retina 以及低分辨率支持设备的资源。


    # iPad 与 iPhone 的设计差异


    那么，iPad 到底有何不同？首先，它比 iPhone 更大，为多点触控交互提供了更多空间，也为额外的设计元素留出了余地。此外，用户与 iPad 的交互方式也与
    iPhone 不同。iPhone 用户是移动的，他们需要借助设备来应对繁忙的生活方式。而 iPad 用户通常是在教室、沙发或“后仰式”场景中使用设备。在设计
    iPad 应用时，请考虑以下几点：


    - 用户与你的应用交互时，会如何持握设备？

    - 你的应用在竖屏和横屏模式下都能正常工作吗？

    - 哪种屏幕方向更适合与应用相关的任务？

    - 用户在使用你的应用时，可能正在做什么？

    - 他们处于怎样的环境中？这又如何影响他们对设备的使用？


    这些因素在你开始设计 iPad 应用时都很重要。iPad 提供给设计师的额外空间应被明智地利用。不要用不必要的、无价值的元素填充它，这些元素不会给用户或应用的整体体验增加价值。应添加能够增强用户对你所创建空间和环境理解的
    UI 元素。


    Apple 为 iPad 设计制定的指南与 iPhone 类似；关于内容、可用性和上下文的相同原则仍然适用。确定哪些功能是绝对必要的，并为你用户提供这些功能。使用用户画像来思考你的用户是谁，以及每个画像将如何与应用交互。每个画像可能有不同的需求。确保用户所需的功能在任何时候都易于访问。如果用户必须费力寻找他们觉得应该显而易见的东西，就会导致糟糕的用户体验，甚至可能带来差评。


    > **注意**：用户画像是一个虚构角色，代表着具有特定特征和行为子集的用户群体。用户画有助于验证设计和用户体验。


    # iPad 特有的 UI 元素


    尽管大多数导航项相同，但 iPad 确实拥有一些 iPhone 不可用的 UI 元素，例如弹出视图和分屏视图。


    ## 弹出视图


    弹出视图是一种呈现在现有屏幕内容之上的视图。它通常有一个指向或箭头来指示用户它从何处出现，并且应覆盖其背后的内容，使用户能够专注于其内部的内容。弹出视图中可以放置多种不同类型的信息和
    UI 元素。它可以包含带有列表的表格视图、以操作列表形式显示给用户的额外选项，或者分屏视图中左侧面板的内容。Apple 对如何使用弹出视图有具体说明，因此请务必阅读《人机界面指南》以获取使用说明。


    虽然允许在弹出视图中使用标准 UI 控件，但绝*不能*添加“关闭”或“退出”按钮。关闭弹出视图应遵循现有的 iOS 范式，即当用户点击其外部或屏幕上的任意其他地方时消失。关闭或退出按钮是常见的
    Web 范式，在 iOS 中不存在。此外，虽然没有高度限制，但有 320–600 点的宽度限制。这取决于你在设计中显示的信息。图 4-5 显示了两种不同长度的弹出视图。


    ![9781430263647_Fig04-05a.jpg](img/9781430263647_Fig04-05a.jpg) ![9781430263647_Fig04-05b.jpg](img/9781430263647_Fig04-05b.jpg)


    *图 4-5. 来自 iOS 6 和 iOS 7 的 iPad 弹出视图*


    寻找巧妙新颖的方式来展示弹出视图是允许的。要跳出框框思考，但始终将用户体验放在首位。


    ## 分屏视图


    分屏视图是指屏幕被分成两个并排的独立面板。在空间上，左侧面板始终比右侧面板窄。Apple 将右侧面板的宽度留给设计师决定，但建议最小宽度为 320 点。从视觉上看，右侧面板较大而左侧面板较小更为平衡。思考两个面板之间的关系，以及你希望在每个面板中呈现什么信息。通常两者之间存在关联，需要仔细思考和规划，来决定你希望用户如何从上下文关联信息，以及你将如何呈现这些信息。


    左侧面板通常被称为主面板，右侧面板被称为详细面板。这应为你如何呈现 UI 元素和信息提供一些思路。然而，这种关系并非严格强制，更多地是指向一种用户可能已习惯的惯例，而非
    Apple 强制执行的规范。在 iOS 7 中，分屏视图屏幕可以在竖屏或横屏模式下访问。图 4-6 显示了竖屏模式下的分屏视图。


    ![9781430263647_Fig04-06.jpg](img/9781430263647_Fig04-06.jpg)


    *图 4-6. iOS 7 中竖屏方向的分屏视图屏幕*


    # 视觉上下文


    由于 iPad 拥有额外的屏幕空间，人们可能会忍不住简单地拉伸和拉长 iPhone 设计来创建 iPad 应用。这样做将是一个错误。iPad 的增加的空间意味着设计师确实有更多空间来……设计。菜单应该是上下文相关的。也就是说，它们应靠近其所关联的内容。让用户到右侧去编辑左侧的内容会让人迷失方向。诸如弹出视图之类的工具应在需要时使用，并在它们帮助用户完成特定任务时使用。


    尽量不要在屏幕底部或标签栏中堆叠过多项目。iPad 的尺寸使得屏幕底部根据用户持握设备的方式成为一个容易被忽视的区域。使用弹出视图和分屏视图等额外元素来为内容提供上下文。

    '
- fmt: "# iPad 应用设计指南\n\n`iPad` 的尺寸使其相比 `iPhone` 有一个显著优势：用户可以用双手与内容进行交互。其键盘几乎与普通电脑键盘大小相当，对于那些仍觉得它太小或不够舒适的用户，制造商们已迅速推出大量可轻松连接\
    \ `iPad` 的外设。这意味着用户与应用程序中的内容进行交互的方式和机会都增加了。请利用这一机会，将用户吸引到你的应用中，以获得更沉浸式的体验。\n\n\
    在设计应用时，请考虑屏幕方向以及用户将如何与你的应用和屏幕内容进行交互。例如，你的应用是否仅在横屏模式下能更好地呈现信息？或者用户能否在竖屏和横屏之间自由切换而不迷失方向？创建仅支持竖屏或仅支持横屏的应用是完全可行的。\n\
    \n## 屏幕触控目标\n\n由于使用 `iPad` 的用户年龄和体型各不相同，建议将触控目标设计得足够大，以适应甚至最大的手指和拇指。没有什么比在大屏幕上试图点击一个微小的目标更糟糕的了。同时，请确保触控目标清晰可见。得益于其尺寸，`iPad`\
    \ 鼓励用户充分拥抱多点触控的各个方面，他们更倾向于探索界面。因此，让触控目标既明显又足够大，有助于用户在应用中导航。\n\n## 屏幕分辨率\n\n由于第一代\
    \ `iPad` 已停产且不再受支持，在设计 `iPad` 应用时，需牢记一些重要的分辨率差异。目前消费者可用的 `iPad` 包括 `iPad 2` 和\
    \ `iPad Retina`。`iPad 2` 和 `iPad Retina` 拥有相同的屏幕尺寸（`9.5in. x 7.31in.`），但分辨率不同。`iPad\
    \ 2` 的分辨率为 `1024 x 768`，每英寸像素（`ppi`）为 `132`；而 `iPad Retina` 的分辨率为 `2048 x 1536`，每英寸像素（`ppi`）为\
    \ `2048 x 1536`。这相当于 `iPad 2` 分辨率的两倍。\n\n- `iPad Retina` 显示屏的分辨率为 `2048x1496px`（横屏方向）\n\
    - 非 `Retina` 显示屏的分辨率为 `1024x748px`（横屏方向）\n\n如果你计划为 `iOS`（`iPad` 或 `iPhone`）进行设计，`72\
    \ DPI` 即可，因为 `DPI` 更多是一个印刷术语。请记住，最佳实践始终是为 `Retina` 设计，然后将其缩放至 `50%` 用于非 `Retina`\
    \ 设备。\n\n[Figure 4-7](#9781430263647_Ch04.xhtml#Fig7) 中的图表列出了所有设备的各种分辨率，并已针对 `iOS\
    \ 7` 进行了优化。\n\n![9781430263647_Fig04-07.jpg](images/9781430263647_Fig04-07.jpg)\n\
    \n[Figure 4-7](#9781430263647_Ch04.xhtml#_Fig7). 图表显示了 `iPad` 设备的分辨率列表\n\n`iPad\
    \ mini` 的屏幕较小，尺寸为 `7.87in. x 5.3in.`，分辨率为 `1024x768 ppi`。然而，设计师不应认为为 `iPad mini`\
    \ 设计与为常规尺寸 `iPad` 设计完全相同。`iPad mini` 不仅尺寸更小，重量也更轻。这意味着用户与设备的交互方式将与大型 `iPad` 有很大不同。由于其尺寸，用户可能会倾向于单手使用设备。请思考这对应用的用户界面意味着什么。以下是一些需要自我审视的问题：\n\
    \n- 设备的尺寸将如何影响应用的整体体验？\n- 应用的用户界面是否需要针对不同设备而不同？还是单一布局就足够了？\n- 与 `iPad mini` 同类的设备包括\
    \ `Nook` 和 `Kindle` 等，这些设备主要用作阅读设备，而非生产力工具。知道你的应用将面向 `iPad mini` 用户后，这将如何改变应用的行为？\n\
    \n## 通用应用\n\n通用应用是指同时针对 `iPad` 和 `iPod` 进行优化的应用。它就像一个应用包含了两个应用。两个平台的资源都包含在同一个应用包中。编程上，应用会检测当前激活的是哪个平台，并相应地提供合适的资源。苹果建议开发者创建通用应用，这样便于在\
    \ `App Store` 中进行管理。但从设计角度来看，仍然需要两套设计和资源，本质上这相当于创建两个独立的应用。\n\n## 图标\n\n`iPad`\
    \ 上所有元素都更大的原则同样适用于图标。`iOS` 有多种不同的图标，它们的使用方式各不相同，以便用户在 `App Store` 和不同设备上识别你的应用。`Retina`\
    \ 显示屏的图标会显示更多细节，因此请确保为 `Retina` 正确调整图标大小。\n\n### 应用图标\n\n应用图标是用户在设备上和 `App Store`\
    \ 中识别你应用的视觉标识。用户不仅会通过图标视觉上识别你的应用，还会与之交互，因为他们必须点击它才能启动应用。应用图标是重要的品牌元素。如果你正在创建通用应用，则需要创建多个版本的应用图标，并将其包含在应用包中。`iPad`\
    \ 的图标尺寸如下：\n\n- `72 x 72 px`\n- `144 x 144`（高分辨率）\n\n请记住，所有应用图标都必须具有 `90` 度直角，无圆角，无投影或特效，无光泽或高光，且无\
    \ `alpha` 透明通道。随着 `iOS7` 的即将发布，这一点尤为重要。我将在[第 8 章](#9781430263647_Ch08.xhtml)中更详细地讨论图标。[Figure\
    \ 4-8](#9781430263647_Ch04.xhtml#Fig8) 中的图表显示了苹果人机界面指南中推荐的所有 `iOS` 图标尺寸。\n\n![9781430263647_Fig04-08.jpg](images/9781430263647_Fig04-08.jpg)\n\
    \n[Figure 4-8](#9781430263647_Ch04.xhtml#_Fig8). 图表显示了所有 `iOS` 图标的推荐尺寸\n\n## 启动图像\n\
    \n`iPad` 的启动图像不应包含每个地区的状态栏，但应为每个方向提供一个启动图像。因此：\n\n- 竖屏：\n  - `768 x 1004 px`（非\
    \ `Retina`）\n  - `1536 x 2008 px`（`Retina`）\n- 横屏：\n  - `1024 x 748 px`（非 `Retina`）\n\
    \  - `2048 x 1496 px`（`Retina`）\n\n请记住，在高分辨率 `PNG` 文件名后添加 `@2x`。我们将在[第 9 章](#9781430263647_Ch09.xhtml)中更详细地讨论文件命名规范。\n\
    \n## iPad 专属手势\n\n部分由于其尺寸，`iPad` 拥有一套专属的多点触控手势。花些时间理解这些设备专属手势，将大大有助于理解用户与 `iPad`\
    \ 的交互方式与 `iPhone` 有何不同，以及 `iPad` 的额外屏幕空间如何让用户在交互和多点触控、多指操作方面有更多作为。这些手势也突显了 `iPad`\
    \ 是一款真正的生产力工具，用户期望用它做更多事情。因此，这些手势主要围绕使用户能够同时导航和切换多个应用。\n\n要使用这些手势，用户必须在“设置”![arrow.jpg](images/arrow.jpg)“通用”菜单中启用`“多任务手势”`模式。这里启用的手势是独特的，因为它们需要多个手指才能触发。\n\
    \n如果你仍在使用 `iPad` 上的 `iOS6`，下面提到的手势仍然有效，但有些会产生不同的结果。例如，四指或五指向上滑动会显示多任务栏，显示当前打开的应用。然而，`iOS6`\
    \ 中的多任务栏与 `iOS7` 中的不同。\n\n### 滑动\n\n从左向右或从右向左的四指滑动将允许用户循环浏览 `iPad` 上当前打开的不同应用。要使此操作生效，你必须至少打开两个应用。\n\
    \n四指垂直滑动"
  raw: 'The iPad’s size affords it one particular advantage over the iPhone: users
    can actually interact with the content using BOTH hands. The keyboard is almost
    the size of a normal-size computer keyboard, and for those who still think it’s
    too small or uncomfortable, manufacturers have rushed to market with a dizzying
    number of peripherals that easily connect to the iPad. This means that the opportunities
    and mechanisms by which users are able to interact with the content in your application
    has increased. Use this opportunity to draw users into your application for a
    more immersive experience.


    When designing your app, think about orientation and how users will be interacting
    with your app and the content on the screen. For example, will your app present
    information better if held in landscape mode only? Or should users be able to
    move back and forth between portrait and landscape without getting disoriented.
    It is possible to create a portrait- or landscape-only application.


    Onscreen Targets


    Since the iPad is used by a variety of users of different ages and sizes, it’s
    a good idea to keep your targets big enough to account for even the largest fingers
    and thumbs. There’s nothing worse than trying to tap a tiny target on a big screen.
    Also, make sure that targets are obvious. Because of its size, the iPad encourages
    users to really embrace all facets of multi-touch, and they are more prone to
    explore the interface. So, making targets obvious and big enough helps users to
    navigate through your app.


    Screen Resolution


    Now that the first generation iPad has been discontinued and is no longer supported,
    there are some significant differences in resolution that are important to keep
    in mind when designing for the iPads. The remaining iPads available to consumers
    are the iPad 2 and the iPad Retina. The iPad 2 and iPad Retina share the same
    screen size (9.5in. x7.31in.) but different resolutions. The iPad 2 has a resolution
    of 1024 x 768 at 132 pixels per inch (ppi), and the iPad Retina has a resolution
    of 2048 x 1536 pixels per inch (ppi). This is double the resolution of the iPad
    2.


    Resolution for iPad Retina display is 2048x1496px (Landscape orientation)


    Non-Retina display is 1024x748px (Landscape orientation)


    If you’re planning to design for the iOS (iPad or iPhone), 72 DPI will worksince
    DPI is more of a print term anyway.Bear in mind that it is always best to design
    for Retina and then scale down to 50% of that for non-Retina devices.


    The chart in [Figure 4-7](#9781430263647_Ch04.xhtml#Fig7) lists all of the various
    resolutions for all devices and has been optimized for iOS 7.


    ![9781430263647_Fig04-07.jpg](images/9781430263647_Fig04-07.jpg)


    [Figure 4-7](#9781430263647_Ch04.xhtml#_Fig7). Chart shows a list of resolutions
    for iPad devices


    The iPad mini has a smaller screen at 7.87in. x 5.3in. and has a 1024x768 ppi
    resolution. However, designers shouldn’t think that designing for an iPad mini
    is exactly the same as designing for regular sized iPads. The iPad minis are not
    only smaller in size, but lighter as well. This will mean that users will interact
    with the device in a much different way than they do with larger iPads. It’s possible,
    that because of its size, those users will be tempted to use the device with one
    hand. Think about what this means for the UI of your application. Here are some
    questions to ask yourself:


    How will the size of the device affect the overall experience of my app?


    Does the UI of my app need to be different for each device? Or will one layout
    suffice?


    Devices in the same class as the iPad mini include a number of readers like the
    Nook and Kindle that are used primarily as reading devices as opposed to productivity.
    Knowing that your app will be available to users of the iPad mini, how does this
    change the behavior of your application?


    Universal Apps


    A universal app is an app that is optimized for both the iPad and the iPod. It
    is like having two apps in one. The assets for both platforms are included in
    the same app package. Programmatically, the app will determine what platform has
    been activated and will serve up the appropriate assets for each. Apple recommends
    that developers create universal apps as it makes it easier to manage for the
    app store. But, from a design standpoint, there will still be two sets of designs
    and assets and in essence, this is like creating two separate apps.


    Icons


    The premise that everything is larger on the iPad also holds true for icons as
    well. There are a number of different icons for iOS, and all are used differently
    so that users can recognize your app in the app store and on each different device.
    Icons for Retina displays will show more detail so make sure that you are resizing
    for Retina properly.


    App Icons


    The app icon is what users will see to identify your app both on their device
    and in the app store. Not only will users visually identify your app by its icon,
    they will interact with it because they must tap it to launch your application.
    The app icon is an important branding element. If you are creating a universal
    app, you will need to create multiple versions of the app icon to include in your
    app bundle. The sizes are as follows for the iPad:


    72 x 72 px


    144 x 144 (hi res)


    Remember, all app icons must have 90 degree corners with no rounding, no drop
    shadows or effects, no shine or gloss. and no alpha transparency. This is even
    truer with the upcoming release of iOS7\. I’ll discuss icons in greater detail
    in [Chapter 8](#9781430263647_Ch08.xhtml). The chart in [Figure 4-8](#9781430263647_Ch04.xhtml#Fig8)
    shows all recommended iOS icon sizes from Apple’s Human Interface Guidelines.


    ![9781430263647_Fig04-08.jpg](images/9781430263647_Fig04-08.jpg)


    [Figure 4-8](#9781430263647_Ch04.xhtml#_Fig8). Chart shows recommended sizes for
    all ios icons


    Launch Image


    The launch image for the iPad should not include the status bar for each region
    but should provide one for each orientation. Thus:


    Portrait:


    768 x 1004 px (Non-retina)


    1536 x 2008 px (Retina)


    Landscape:


    1024 x 748 px (Non-retina)


    2048 x 1496 px (Retina)


    Remember to add @2x to your file names for hi-res PNGs. We will discuss file naming
    conventions in more detail in [Chapter 9](#9781430263647_Ch09.xhtml).


    iPad-Specific Gestures


    Partly because of its size, the iPad has its own set of specific multi-touch gestures.Taking
    some time to understand these device-specific gestures will go a long way to understanding
    just how users interact differently with the iPad than they do with the iPhone
    and how the additional screen space of the iPad lets users do more in terms of
    interaction and a truly multi-touch and multi-finger experience. These gestures
    also highlight the fact that the iPad is a true productivity tool and users will
    expect to do more with. Therefore these gestures are mainly centered around enabling
    users to navigate and switch between multiple apps at the same time.


    In order to use these gestures, users must enable the “multi-tasking gestures”
    mode from within the Settings ![arrow.jpg](images/arrow.jpg) General menu. The
    gestures enabled here are unique in that they require multiple fingers to activate.


    If it so happens that you’re still running iOS6 on your iPad, the gestures mentioned
    below will work but some will yield different results. For instance, the four-
    or five-fingered swipe upward will reveal the multitasking bar showing apps that
    are currently open. However, the multitasking bar in iOS6 is different from that
    in iOS7.


    Swipe


    A four-finger swipe from left or right will allow the user to cycle through the
    different apps that are currently open on the iPad. In order for this action to
    work, you must have at least two apps currently open.


    Four-fingered vertical swipe'
  trans: "\n# iPad 应用设计指南\n\n`iPad` 的尺寸使其相比 `iPhone` 有一个显著优势：用户可以用双手与内容进行交互。其键盘几乎与普通电脑键盘大小相当，对于那些仍觉得它太小或不够舒适的用户，制造商们已迅速推出大量可轻松连接\
    \ `iPad` 的外设。这意味着用户与应用程序中的内容进行交互的方式和机会都增加了。请利用这一机会，将用户吸引到你的应用中，以获得更沉浸式的体验。\n\n\
    在设计应用时，请考虑屏幕方向以及用户将如何与你的应用和屏幕内容进行交互。例如，你的应用是否仅在横屏模式下能更好地呈现信息？或者用户能否在竖屏和横屏之间自由切换而不迷失方向？创建仅支持竖屏或仅支持横屏的应用是完全可行的。\n\
    \n## 屏幕触控目标\n\n由于使用 `iPad` 的用户年龄和体型各不相同，建议将触控目标设计得足够大，以适应甚至最大的手指和拇指。没有什么比在大屏幕上试图点击一个微小的目标更糟糕的了。同时，请确保触控目标清晰可见。得益于其尺寸，`iPad`\
    \ 鼓励用户充分拥抱多点触控的各个方面，他们更倾向于探索界面。因此，让触控目标既明显又足够大，有助于用户在应用中导航。\n\n## 屏幕分辨率\n\n由于第一代\
    \ `iPad` 已停产且不再受支持，在设计 `iPad` 应用时，需牢记一些重要的分辨率差异。目前消费者可用的 `iPad` 包括 `iPad 2` 和\
    \ `iPad Retina`。`iPad 2` 和 `iPad Retina` 拥有相同的屏幕尺寸（`9.5in. x 7.31in.`），但分辨率不同。`iPad\
    \ 2` 的分辨率为 `1024 x 768`，每英寸像素（`ppi`）为 `132`；而 `iPad Retina` 的分辨率为 `2048 x 1536`，每英寸像素（`ppi`）为\
    \ `2048 x 1536`。这相当于 `iPad 2` 分辨率的两倍。\n\n- `iPad Retina` 显示屏的分辨率为 `2048x1496px`（横屏方向）\n\
    - 非 `Retina` 显示屏的分辨率为 `1024x748px`（横屏方向）\n\n如果你计划为 `iOS`（`iPad` 或 `iPhone`）进行设计，`72\
    \ DPI` 即可，因为 `DPI` 更多是一个印刷术语。请记住，最佳实践始终是为 `Retina` 设计，然后将其缩放至 `50%` 用于非 `Retina`\
    \ 设备。\n\nFigure 4-7 中的图表列出了所有设备的各种分辨率，并已针对 `iOS 7` 进行了优化。\n\n![9781430263647_Fig04-07.jpg](img/9781430263647_Fig04-07.jpg)\n\
    \nFigure 4-7. 图表显示了 `iPad` 设备的分辨率列表\n\n`iPad mini` 的屏幕较小，尺寸为 `7.87in. x 5.3in.`，分辨率为\
    \ `1024x768 ppi`。然而，设计师不应认为为 `iPad mini` 设计与为常规尺寸 `iPad` 设计完全相同。`iPad mini` 不仅尺寸更小，重量也更轻。这意味着用户与设备的交互方式将与大型\
    \ `iPad` 有很大不同。由于其尺寸，用户可能会倾向于单手使用设备。请思考这对应用的用户界面意味着什么。以下是一些需要自我审视的问题：\n\n- 设备的尺寸将如何影响应用的整体体验？\n\
    - 应用的用户界面是否需要针对不同设备而不同？还是单一布局就足够了？\n- 与 `iPad mini` 同类的设备包括 `Nook` 和 `Kindle`\
    \ 等，这些设备主要用作阅读设备，而非生产力工具。知道你的应用将面向 `iPad mini` 用户后，这将如何改变应用的行为？\n\n## 通用应用\n\n\
    通用应用是指同时针对 `iPad` 和 `iPod` 进行优化的应用。它就像一个应用包含了两个应用。两个平台的资源都包含在同一个应用包中。编程上，应用会检测当前激活的是哪个平台，并相应地提供合适的资源。苹果建议开发者创建通用应用，这样便于在\
    \ `App Store` 中进行管理。但从设计角度来看，仍然需要两套设计和资源，本质上这相当于创建两个独立的应用。\n\n## 图标\n\n`iPad`\
    \ 上所有元素都更大的原则同样适用于图标。`iOS` 有多种不同的图标，它们的使用方式各不相同，以便用户在 `App Store` 和不同设备上识别你的应用。`Retina`\
    \ 显示屏的图标会显示更多细节，因此请确保为 `Retina` 正确调整图标大小。\n\n### 应用图标\n\n应用图标是用户在设备上和 `App Store`\
    \ 中识别你应用的视觉标识。用户不仅会通过图标视觉上识别你的应用，还会与之交互，因为他们必须点击它才能启动应用。应用图标是重要的品牌元素。如果你正在创建通用应用，则需要创建多个版本的应用图标，并将其包含在应用包中。`iPad`\
    \ 的图标尺寸如下：\n\n- `72 x 72 px`\n- `144 x 144`（高分辨率）\n\n请记住，所有应用图标都必须具有 `90` 度直角，无圆角，无投影或特效，无光泽或高光，且无\
    \ `alpha` 透明通道。随着 `iOS7` 的即将发布，这一点尤为重要。我将在第 8 章中更详细地讨论图标。Figure 4-8 中的图表显示了苹果人机界面指南中推荐的所有\
    \ `iOS` 图标尺寸。\n\n![9781430263647_Fig04-08.jpg](img/9781430263647_Fig04-08.jpg)\n\
    \nFigure 4-8. 图表显示了所有 `iOS` 图标的推荐尺寸\n\n## 启动图像\n\n`iPad` 的启动图像不应包含每个地区的状态栏，但应为每个方向提供一个启动图像。因此：\n\
    \n- 竖屏：\n  - `768 x 1004 px`（非 `Retina`）\n  - `1536 x 2008 px`（`Retina`）\n- 横屏：\n\
    \  - `1024 x 748 px`（非 `Retina`）\n  - `2048 x 1496 px`（`Retina`）\n\n请记住，在高分辨率\
    \ `PNG` 文件名后添加 `@2x`。我们将在第 9 章中更详细地讨论文件命名规范。\n\n## iPad 专属手势\n\n部分由于其尺寸，`iPad`\
    \ 拥有一套专属的多点触控手势。花些时间理解这些设备专属手势，将大大有助于理解用户与 `iPad` 的交互方式与 `iPhone` 有何不同，以及 `iPad`\
    \ 的额外屏幕空间如何让用户在交互和多点触控、多指操作方面有更多作为。这些手势也突显了 `iPad` 是一款真正的生产力工具，用户期望用它做更多事情。因此，这些手势主要围绕使用户能够同时导航和切换多个应用。\n\
    \n要使用这些手势，用户必须在“设置”![arrow.jpg](img/arrow.jpg)“通用”菜单中启用`“多任务手势”`模式。这里启用的手势是独特的，因为它们需要多个手指才能触发。\n\
    \n如果你仍在使用 `iPad` 上的 `iOS6`，下面提到的手势仍然有效，但有些会产生不同的结果。例如，四指或五指向上滑动会显示多任务栏，显示当前打开的应用。然而，`iOS6`\
    \ 中的多任务栏与 `iOS7` 中的不同。\n\n### 滑动\n\n从左向右或从右向左的四指滑动将允许用户循环浏览 `iPad` 上当前打开的不同应用。要使此操作生效，你必须至少打开两个应用。\n\
    \n四指垂直滑动\n"
- fmt: '# 排版后的文本


    从 iPad 的任意主屏幕，用四指快速向上滑动即可显示多任务栏，其中列出了所有当前打开的应用程序。您可以在 iOS7 的[图 4-9](#9781430263647_Ch04.xhtml#Fig9)
    中看到四指滑动的效果。


    ![9781430263647_Fig04-09.jpg](images/9781430263647_Fig04-09.jpg)


    [图 4-9](#9781430263647_Ch04.xhtml#_Fig9). iOS7 中通过四指滑动显示的 iPad 多任务栏


    ## Pinch


    用四指捏合屏幕将立即将用户带回主屏幕。


    ## 总结


    虽然 iOS 设备的界面相似，但 iPad 和 iPhone 有不同的要求。如果您正在设计一个能够在所有 iOS 设备上运行的通用应用程序，您还需要考虑每个新设备。在设计应用程序时，必须考虑方向、交互和视觉上下文，以确保用户获得最佳体验。由于手势是用户与
    iOS 交互的方式，了解可以使用哪些手势至关重要。您的设计需要充分利用 iOS 用户已经熟悉的手势；如果您引入新手势，请确保对其进行说明，因为用户需要将它们与应用程序中的新任务关联起来。


    # 第 5 章 移动设计模式


    作为开发者，你们中的大多数人已经熟悉“设计模式”这个术语。对于开发者来说，设计模式指的是可以通过使用特定抽象解决方案来解决的特定软件或编程问题。然而，就本书的目的而言，我们将讨论与应用程序的设计和用户界面特别相关的设计模式。设计模式是解决常见设计问题的有用方法。它们是针对移动设计中遇到的挑战的有用且被普遍接受的
    UI 解决方案。随着移动技术的发展，涌现出越来越多的模式来帮助设计师应对常见的设计挑战。在设计应用程序时，您无疑会遇到其中一些挑战。了解其他设计师如何找到独特且有时创新的解决方案来解决这些挑战，将有助于您设计应用程序，使您能够专注于功能，而不是重复发明轮子。由于移动设计模式是用户熟悉的被接受的**最佳实践**解决方案，您可以将其应用于您的应用程序，而无需过多担心用户是否熟悉它们。


    在本章中，我们将介绍一些最流行的移动设计模式，并分解在实现它们时可以使用（或不使用）的元素。与所有设计元素一样，用户必须是焦点。如果一个模式不能让用户的生活更轻松，那么最好不要使用它。但请记住，您也可以根据自己的需要编辑和更改模式。因此，可以在您的应用程序中使用公认的设计模式并进行创新。使用设计模式可以将基本工具交到您手中，并让您能够为应对设计挑战建立一个起点。通过观察其他流行应用程序如何处理这种模式，将有助于您更好地了解如何在自己的应用程序中处理它。由于设计模式在移动生态系统中被普遍使用，它们通常被认为是平台无关的。因此，虽然本书以
    iOS 设计为重点，但您会看到这些模式被用于原生应用和 Web 应用。这通常被认为是一件好事，因为模式使用得越广泛，所有用户都熟悉它的可能性就越大。从可用性的角度来看，这是一件好事。


    有许多设计模式可供您使用，但在本章中，我们仅探讨那些流行且可能有帮助的模式。


    **提示** 如果您对设计模式更感兴趣，建议购买一本专门讨论设计模式的书籍。在书中，您很可能会找到比此处列出的更详尽的列表。


    ## 注册与登录/注册表单


    注册和注册表单通常是用户与您的应用程序的第一次接触。您的总体目标应该是让用户以最少的麻烦进入您的应用。保持登录和注册页面简洁，并使用与您应用程序的整体品牌形象和感觉相协调的颜色元素。即使这个页面主要是一个字段，您仍然可以赋予表单个性。有一点要记住：为用户提供登录选项。一些应用程序因为将
    Facebook、Twitter 或其他社交媒体应用程序作为访问其应用的唯一方式而遭到了强烈的反对。请记住，某些用户可能不想将他们的社交媒体网络连接到您的应用，因此请提供其他选项，例如电子邮件；或者更好的是，借此机会向用户解释为什么您将社交媒体连接设置为唯一选项。


    要牢记用户的隐私，只询问您绝对需要的信息。例如，如果您的应用程序是一个短信或 SMS 消息应用程序，您可能需要询问用户的电话号码。如果您的应用程序不需要这些信息，就跳过它。添加弹出窗口来解释每个必填项为什么是必需的以及它将如何使用，也是一个好主意。


    您的注册或登录表单页面还应该包含一个引人注目的**行动号召按钮**。当然，“注册”或“报名”是标准标签，但这可以提供一个有趣的机会向客户展示您的创造力。垂直标签（略高于相应的表单字段）曾经很流行，但最近，尤其是随着应用程序为
    iOS7 更新，它们已被直接放置在字段内的文本所取代。这对用户来说更容易，并且消除了屏幕上其他地方说明性文字的需要。


    除非绝对必要，否则请将登录或注册过程限制在一个屏幕内，就像[图 5-1](#9781430263647_Ch05.xhtml#Fig1) 中的简单线框图所示的那样。移动用户是出了名的不耐烦，而且每个人都越来越注重隐私。因此，多页注册会适得其反；请保持简短，让用户尽可能简单地注册您的应用。


    ![9781430263647_Fig05-01.jpg](images/9781430263647_Fig05-01.jpg)


    [图 5-1](#9781430263647_Ch05.xhtml#_Fig1). 设计模式中的简单登录或注册


    ## 应用导航


    用户注册或报名使用您的应用程序后，他或她需要在应用程序中进行导航。这将是用户在应用中移动的主要方式。如果您做得很好，应用程序的导航不应该让用户猜测下一步该做什么；他们对应用的导航应该是直观且自然的。虽然注册和登录模式相对直接，但导航提供了更多选项，具体取决于应用的核心功能和目的。如果您探索过其他应用以寻求灵感，您会发现移动应用的导航方式几乎数不胜数。有些模式适用于特定应用，而另一些则随着
    iOS 的发展而演变。下面列出了一些更流行的模式，如注册、主屏幕和图片库，但也有像滑出式导航这样的新模式不断涌现。iOS 仍然相对较新，随着设计师开始突破设计的界限，预计会有新的模式出现。因此，如果您的应用是一个社交媒体应用，用户将在特定的层级结构或好友与信息流中移动，您可能希望坚持使用流行应用中已有的设计模式。用户已经熟悉这些模式，并期望您遵循它们。


    ### 主屏幕或主屏幕模式'
  raw: 'From any home screen on the iPad, swiping up quickly with four fingers will
    reveal the multitasking bar that shows all apps that are currently open. You can
    see the result of the four-finger swipe in iOS7 in [Figure 4-9](#9781430263647_Ch04.xhtml#Fig9).


    ![9781430263647_Fig04-09.jpg](images/9781430263647_Fig04-09.jpg)


    [Figure 4-9](#9781430263647_Ch04.xhtml#_Fig9). The multitasking bar for the iPad
    as revealed by four-finger swipe in iOS7


    Pinch


    Using four fingers to pinch the screen will immediately take the user back to
    the home screen.


    Summary


    While the interface of iOS devices is similar, there are different requirements
    for iPads and iPhones. If you’re designing a Universal app that will run on across
    all iOS devices, you will need to consider each new device, too. When designing
    your app, orientation, interaction and visual context will all have to be considered
    to ensure that your users get the best experience possible.Since gestures are
    the way that users interact with iOS, getting to know what gestures can be used
    is critical. Your design will need to make the most of the gestures that have
    become familiar to iOS users; and if you introduce new gestures, make sure that
    they are explained as users will need to associate them with news tasks in your
    app.


    Chapter     5


    Mobile Design Patterns


    As developers, most of you are already familiar with the term “design patterns.”
    For developers, design patterns refer to specific software or programming problems
    that can be solved by using a specific abstract solution. For the purposes of
    this book, however, we will speak of design patterns as it relates specifically
    to the design and user interface of your application. Design patterns are helpful
    ways of addressing common design problems. They are helpful and commonly accepted
    UI solutions to challenges encountered in mobile design. As mobile evolves, more
    patterns have emerged to assist designers in addressing common design challenges.
    As you design your application, you will undoubtedly come upon some of these challenges.
    Understanding how other designers have found unique and sometimes innovative solutions
    to these challenges will help you with designing your app by allowing you to focus
    on functionality as opposed to reinventing the wheel. Because mobile design patterns
    are accepted best practice solutions that users are familiar with, you adapt them
    for your application without worrying too much about users being familiar with
    them.


    In this chapter, we’ll go through some of the most popular mobile design patterns
    and break down elements you can use (or not) when implementing them. As with all
    design elements, users must be the focal point. If a pattern doesn’t make your
    user’s life easier, then it’s a good idea not to use it. But bear in mind, you
    can also edit and change patterns to suit your needs. So, it’s possible to use
    an accepted design pattern and still innovate within your application. Using design
    patterns puts the basic tools into your hands and allows you to establish a starting
    point in your approach to your design challenge. By viewing how other popular
    applications have addressed this pattern, it will help you to have a better understanding
    of how you, too, can address it within your apps. Since design patterns are commonly
    used across the mobile ecosystem, they are mostly considered to be platform agnostic.
    So while we are focusing on iOS design for the purpose of this book, you will
    see patterns being used in native apps and web apps. This is generally considered
    a good thing as the more widely used a pattern becomes, the greater the chance
    that users across the board are familiar with it. And from a usability standpoint,
    this is a good thing.


    Many design patterns are available to you, but in this chapter we’ll explore just
    those patterns that are popular and could be helpful.


    **Tip**  If you are more interested in design patterns, it’s a good idea to purchase
    a book written specifically on design patterns. In it, you’ll likely find a more
    exhaustive list than the one included here.


    Registration & Login/Sign-up Forms


    Registration and sign-up forms are usually the first encounter a user will have
    with your application. Your overall intent here should be to get the user into
    your app with minimal fuss. Keep your logins and sign-up pages clean, and use
    elements of color that align with the overall branding and look and feel of your
    application. Even though this page will mainly be a field, you can still give
    your forms personality. One thing to remember is to provide your user with options
    to login to your app. Some apps have earned significant backlash by making Facebook,
    Twitter, or some other social media application the only way to gain access to
    their apps. Bear in mind that some users will not want to connect their social
    media networks to your app, so provide another option such as e-mail; or better
    yet, take the opportunity to explain to a user why you are making a social media
    connection the only option.


    Keep the user’s privacy in mind and only ask for information that you absolutely
    need. For example, if your app is a texting or SMS messaging app, you like would
    need to ask for a user’s telephone number. If your app has no need for this information,
    skip it. It’s also a good idea to add popovers to explain why each required item
    is needed and how it will be used.


    Your sign-up or login form pages should also feature a compelling call to action
    button. Surely, “Register” or “Sign-up” are standard labels, but this can provide
    an interesting opportunity to show your customers some creativity. Vertical labels
    placed slightly above the corresponding form fields have also been popular but
    more recently, especially as apps are updated for iOS7, have been replaced by
    text directly inside the field. This is easier for users and removes the need
    for instructional copy elsewhere on the screen.


    Unless absolutely necessary, keep your login or sign-up process limited to one
    screen as the simple wireframe in [Figure 5-1](#9781430263647_Ch05.xhtml#Fig1)
    does. Mobile users are notoriously impatient, and everyone is increasingly conscious
    of their privacy. So a multipage registration will be prohibitive; keep it short
    and as simple as possible for users to register for your app.


    ![9781430263647_Fig05-01.jpg](images/9781430263647_Fig05-01.jpg)


    [Figure 5-1](#9781430263647_Ch05.xhtml#_Fig1). A simple login or sign-in in design
    pattern


    App Navigation


    After a user has signed up or registered for your application, he or she will
    need to navigate throughout the app. It will be his or her primary means of moving
    through the app. If you’ve done a good job, the navigation of your app shouldn’t
    leave users guessing what to do next; their navigation of your app should be intuitive
    and come naturally. While with the registration and sign-in, patterns are fairly
    straightforward, navigation offers more options depending on the core functionality
    and purpose of your apps. If you’ve explored other apps for inspiration, you will
    find that there are practically countless ways for navigating through mobile apps.
    Some patterns lend themselves to specific apps and others have evolved over time
    along with iOS. Some of the more popular patterns like Sign-up, Springboard, and
    Image Galleries are listed below, but there are new patterns like the Slide-out
    Navigation that are being created all the time. iOS is still relatively new and
    as designers begin to push the boundaries of design, expect new patterns to emerge.
    So, if your app is a social media app that will have users moving through a specific
    hierarchy or a feed of friends and information, you may want to stick to the established
    design patterns in use by popular apps. Users will already by familiar with these
    patterns and will expect you to follow suit.


    Springboard or Home Screen Patterns'
