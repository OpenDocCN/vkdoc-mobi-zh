    市面上一些流行的线框设计软件，允许你创建可点击的应用原型，并能在实际设备上运行。在之前列出的软件中，`Proto.io`、`JustinMind` 和 `iMockups`
    都可以帮助你创建某种形式的可点击原型。这是向用户精确展示应用运行方式的绝佳途径。其他软件可能只允许通过网页界面与应用交互。任何能复制用户将在应用中体验到的真实交互性的线框工具，对于测试都非常有帮助，但并非绝对必要。从静态的纸质线框和交互式线框中都能获得极好的反馈，甚至还有一个名为
    `POP`（纸上原型）的工具，如图 6-7 所示，它允许你拍摄纸质线框的照片并为其添加一些交互功能。该工具以应用形式提供，看起来使用起来很有趣。理想情况下，最好的方法是让用户直接在他们设备上与为其设计的应用进行交互。


    ![9781430263647_Fig06-07.jpg](img/9781430263647_Fig06-07.jpg)


    图 6-7。`POP` 应用让用户拍摄手绘线框的照片，并为其添加交互功能。


    **客户与线框**


    如果你是作为设计师兼开发者为自己的应用创建线框，那么这些线框主要仅供你自己参考。除非你跟他人分享以获取反馈，否则你完全可以自行决定线框的精细程度。然而，如果你是与客户打交道，那么为你的线框添加注释和一定程度的指引对客户会很有帮助。由于线框缺乏任何品牌元素或色彩，客户可能会觉得难以理解。在向客户展示线框之前，先让他们了解线框的呈现方式。为线框添加方向性注释，如果可能的话，引导客户浏览整个流程。将客户无法理解的线框发送给他们，无疑是延迟项目签收的方式，并且可能导致无休止的反馈循环，由此引发更多问题和需要澄清的事项，而非真正的批准。


    你很少会与客户分享像图 6-4 和图 6-5 那样的手绘线框。但是，如果你有一个团队，这些手绘线框是内部迭代的好起点。而且，尽管我已经审查并列出了一些线框软件和工具，但你完全无需感到有使用它们的压力。图
    6-8 中的线框是更适合发送给客户审阅的范例。


    ![9781430263647_Fig06-08.jpg](img/9781430263647_Fig06-08.jpg)


    图 6-8。这些线框更适合与客户分享。


    这些线框不仅更精致，而且更易于阅读和理解。由于你的线框将代表应用中的每一个页面，并且理想地展示用户如何与他们在每个屏幕上看到的内容进行交互，因此最好包含用户在最终线框中能看到的所有元素。请注意上方屏幕中的“忘记密码”和“条款与条件”链接。虽然此处未展示，但展示用户找回丢失密码的流程也很常见。有时，应用的“条款与条件”会以网页视图的形式展示，因为它们可能会变更，这种方式便于更新。如果你们的条款要求用户执行操作（例如点击“同意”按钮）才能继续，那么也应该展示这些界面。


    ## 总结


    你的线框是设计过程中的关键组成部分。它们将帮助你创建用户流程，并定义用户使用你应用时的整体体验。线框的主要目的是让你能够创建以用户为中心的场景，为你的应用用户提供最佳的整体体验。请确保你的线框能够解答关于用户如何以及为何与应用进行交互的关键问题。如果你在起步阶段遇到困难，可以随时参考我们在第
    6 章中讨论的设计模式，或者回顾你最初的应用陈述。市面上有众多工具可用于为你的应用制作线框。其中许多工具允许你以最基本的形式（即不含色彩和品牌元素）创建应用，并便于频繁迭代。无论你是使用现成的软件，还是决定使用纸笔，你的线框都需要通过他人的反馈来不断优化。因此，请确保你能够分享这些线框并认真权衡那些重要的反馈意见。如果你需要向客户展示线框，那么你需要为线框增加一定的精细度。注释也有助于解释你可能无法传达的所需功能或效果。在线框设计流程结束时，你应已准备好为应用添加色彩、深度和品牌元素。


    # 第 7 章：使用 Adobe Photoshop 设计视觉资源


    Adobe Photoshop 可能是全球设计师最常用的图形软件。在设计应用或网站时，Adobe Photoshop 仍然是行业标准。历经二十多年的发展，它已成为整个创意产业的强大工具。Adobe
    旗下的名为 Creative Cloud 的软件套件，还包括 Adobe Fireworks、Illustrator、InDesign、Premiere Pro
    和 After Effects 等其他图形程序，涵盖视频编辑、图像设计到动态图形等领域。然而，就本书而言，我们将专注于 Adobe Photoshop 作为为我们的
    iOS 应用创建资源的标准工具。


    之后我也将简要介绍一下 Fireworks。


    为了本书的目的和前后一致性，我们将继续围绕“轻装旅行”应用这个主题，该应用旨在帮助你永远不忘带上旅途所需物品。到目前为止，我们为这个虚构的应用制定了应用使命陈述，进行了一些基础研究并设计了线框。在本章中，我们将使用
    Photoshop 为我们在第 6 章中创建的线框添加一些色彩和品牌元素。我们不会完整地从头到尾设计整个应用，但我会演示如何使用该软件来完成特定任务，为你的应用用户界面增添色彩和润色。


    ## 一些 Photoshop 基础知识


    如果你大部分时间都在开发应用，那么你肯定接触过 Photoshop 文件，或者它们通常被称为的 `PSD` 文件。它们是大多数设计作品的基石。即使你只熟悉
    `PNG`（苹果公司偏好的应用图像格式），你的 `PNG` 文件十有八九最初也是源于 Adobe Photoshop 文件。


    由于本书并非一本教授如何使用 Photoshop 的指南，我们假设你具备一些在 Photoshop 中执行基本任务的经验。即使作为一名开发人员，熟悉 Photoshop
    也始终是个好主意。一些开发者和 iOS 工程师会收到已经切好图、可直接用于开发的 `PNG` 资源；与此同时，越来越多的开发者也更习惯于接收分层的 `PSD`
    文件，并自行从中切图。本章假设你已经熟悉 Photoshop，并且之前创建或编辑过 `PSD` 文件。理想情况下，你曾打开并探索过该软件的界面，创建过形状，熟悉填充、透明度、不透明度以及图层等操作。

    '
- fmt: '如果你已有一定经验，应该对 Photoshop 的布局——即设计师所称的“工作区”比较熟悉。打开程序并选择应用画布大小后，所见的屏幕即为工作区。由于你将为
    iOS 进行设计，画布应显示 iOS 设备的基本轮廓或形状。


    如果你是 Photoshop 的绝对新手，请搜索 Photoshop 教程或 Photoshop 基础课程。网上有大量资源可供设计新手学习 Photoshop
    基础。根据你投入课程、教程和实践的时间，可以说你可以在几周内掌握基本操作。之后，你可以回到本书本章继续学习。Photoshop 是一款复杂的工具，尽管近期已努力使其更加用户友好。如果你从未见过或接触过这款软件，它可能会显得令人困惑。


    在 Photoshop 中创建应用的第一步是新建一个文档。如果你正在为 iPhone 和 iOS 7 进行设计，你需要适配 iPhone 4、4S、5、5S
    和 5C。如果你的应用需要向后兼容 iOS 6，那么 iPhone 3GS 也可能包含在内，因为 iOS 6 仍支持该设备。不过，鉴于 iOS 7 的采用率以及我们应用的目的，我们将为
    iOS 7 进行设计。


    由于较新的设备配备了 Retina 屏幕，公认的做法是先为高分辨率设计，再为低分辨率设备进行缩放。这也意味着你需要为当前所有不同版本的 iPhone 准备多个版本的资源。


    ### 为 Retina 做准备


    在开始设计应用之前，需要考虑以下几点。由于自 iPhone 3GS 以来的每款 iPhone 都配备了 Retina 屏幕，我们将以此为基础设置 Photoshop
    文件。如果你为 Retina 进行设计，并且拥有 Retina 电脑（例如 Apple 的 MacBook Pro with Retina），那一切就绪。这些电脑会按
    Retina 设备应有的效果渲染你的设计。但如果你没有 Retina 电脑也不必担心。还有其他解决方案。`LiveView` 是一款免费应用，一些设计师会使用它。该应用允许他们在移动设备上远程查看设计。它适用于
    iPhone 和 iPad，可以让你在选定的 iOS 设备上实时查看 Adobe Photoshop 画布。你需要在电脑和移动设备上都安装该应用才能使用。`LiveView`
    也适用于非 Retina 屏幕。


    另一个帮助设计师在移动设备上查看设计的工具是 `Skala`。适用于 Mac、iPhone、iPad 和 Android，这款工具在设计者中也颇受欢迎。还有其他可用工具，因此在决定使用哪款前请先做一些研究。前面提到的两款工具非常流行，且支持度很好。


    ### 你的 Photoshop 设置


    在 Photoshop 中设置屏幕相对简单。你需要参考线框图。列出需要在 Photoshop 中创建的屏幕列表。根据我们的线框图，这些屏幕包括：


    1.  加载屏幕

    2.  注册/登录

    3.  我的行程

    4.  编辑行程

    5.  选择行程

    6.  编辑行程项目


    根据上述列表，我们将创建以下屏幕：


    - 注册/登录

    - 行程详情（录入）

    - 编辑行程项目


    这个列表基本涵盖了我们需要为应用设计的所有页面。我们将跳过启动图片等内容，并假设它会显示某种标志，或与应用首页相同。Apple 的人机界面指南并不喜欢带有大量品牌的启动图片，而且用户实际上也不会与该屏幕进行交互或长时间看到它。不过，有关创建启动图片的更多信息，请参见第
    8 章。现在，我们将专注于用户实际会交互并代表一定功能级别的屏幕。用户进入应用后看到的第一个屏幕将是登录或注册屏幕。


    让我们开始在 Photoshop 中创建第一个屏幕。建议将线框图放在旁边，以便参考。


    你需要做的第一件事是在 Photoshop 中创建一个新项目。这将是后续所有屏幕的基础。按图 7-1 所示设置尺寸。


    ![9781430263647_Fig07-01.jpg](images/9781430263647_Fig07-01.jpg)


    **图 7-1**。Adobe Photoshop 的图像大小窗口


    `640 x 1196` 将适配较新 iPhone（包括最新发布的 iPhone 5c 和 5s）的更高分辨率。从高分辨率开始设计，还能更容易地为非 Retina
    设备缩放资源。一旦为高分辨率设计好，调整起来相当简单。当你完成此设置，并且所有元素和组件均采用偶数尺寸后，你就能缩放以适应旧款设备的非 Retina 设计。


    在 Photoshop 中设置好画布后，你将进入主屏幕，并在此继续设计应用。根据个人偏好不同，它看起来会类似于图 7-2 中的截图。在开始添加元素和组件之前，花些时间设置画布的某些方面，比如你希望哪些面板可见，以及根据你的习惯（右手或左手）将面板放在何处。一旦按照喜好排列好所有面板并设置好画布，你的设计过程将更加轻松。Photoshop
    的大部分面板和窗口都可以根据偏好移动或隐藏。


    ![9781430263647_Fig07-02.jpg](images/9781430263647_Fig07-02.jpg)


    **图 7-2**。Photoshop 中的主画布


    ### 网格线与参考线


    设置并建立网格线可以使设计过程更轻松。参考线和网格线将帮助你更轻松地在多个屏幕间对齐用户界面的组件。它们是显示在页面上但不会出现在应用中的线条。你可以将网格放在屏幕上的任何位置，并锁定它们，使它们在你设计应用时保持原位。它们将帮助你创建完全对称的设计。网格线能让元素在画布上精确定位，而不是在屏幕上随意浮动。如果不使用网格线，你只能凭肉眼估计组件对齐的位置。即使对于最专业的设计师来说，这也可能是一项繁琐的工作，而组件位置不当的结果是元素在不同屏幕间跳动。你需要确保元素对齐到参考线或网格，以保证它们不会在不同屏幕间移动。如果所有元素没有完美对齐，即使一个像素的偏差也会导致跳动。


    参考线是简单线条，当你尝试对齐屏幕上某些元素时会出现。你可以通过 **偏好设置** → **参考线、网格和切片** 来设置参考线的偏好。'
  raw: 'If you have some experience already, you will be familiar with the layout
    of Photoshop or as it’s referred to by designers, the workspace. That is the screen
    that you will see upon opening the program and choosing a canvas size for the
    app you are about to design. Since you will be creating for iOS, your canvas should
    display the basic outline or shape of an iOS device.


    If you are an absolute beginner with Photoshop, do a search for Photoshop tutorials
    or Photoshop basics. There are tons of online resources for those who are new
    to design and want to learn the basics of Photoshop. Depending on the amount of
    time that you have to devote to classes, tutorials, and practice, it is fair to
    say that you can get up to speed in a matter of weeks. Then, you can return to
    this chapter in this book and continue. Photoshop is a complex tool, although
    recent efforts have been made to make it more user friendly. If you’ve never seen
    or touched this software program, it can appear to be confusing.


    The first step in creating your app in Photoshop will be to start a new document
    in Photoshop. If you’re designing for the iPhone and iOS 7, you’re designing for
    the 4, 4S, 5, 5S, and 5C. If your app is going to be backwards compatible to iOS
    6, then the 3GS might be included since iOS 6 still supports this device. However,
    with adoption rates for iOS 7 being what they are and for the purposes of our
    app, we’re designing for iOS 7.


    Because the newer devices have Retina screens, the accepted approach is to design
    for higher resolution and then scale down for lower resolution devices. This also
    means that you will need multiple versions of your assets for all of the different
    versions of the iPhone that currently exist.


    Prepping for Retina


    Before we get to the business of designing the app, here are some things to consider.
    Since every iPhone since the iPhone 3GS features a Retina screen, we’ll set up
    our Photoshop file as such. If you’re designing for Retina, and you have a new
    Retina computer such as Apple’s MacBook Pro with Retina, then you’re all set.
    These computers will render your Retina designs as they are meant to look on a
    Retina device. But, don’t worry if you don’t have a Retina computer. There are
    other solutions. LiveView is a free app that some designers use. It allows them
    to view their designs remotely on their mobile devices. It is available for iPhone
    and iPad and will let you view your Adobe Photoshop canvas in real time, on the
    iOS device of your choosing. You will have to install the application on your
    computer and your mobile device for it to work. LiveView works with non-Retina
    screens, too.


    Another tool that helps designers view their designs on mobile devices is Skala.
    Available for the Mac, iPhone, iPad, and Android, this tool appears to be popular
    among designers, too. There are other tools available, so do some research before
    you commit to one. The two mentioned previously are pretty popular and have great
    support.


    Your Photoshop Setup


    Setting up your screen in Photoshop is relatively easy. You will need your wireframes
    for reference. Make a list of the screens you need to create in Photoshop. Based
    on our wireframes, these are:


    1.  Loading screen

    2.  Registration/Sign-in

    3.  My Trip

    4.  Edit Trip

    5.  Select Trip

    6.  Edit Trip Items


    From the list above, we’ll create the following screens:


    Registration/Sign-in, Trip details (Entry), and Edit Trip Items.


    This list for the most part, represents all of the pages we will need to design
    for our app. We’ll skip things like the launch image and assume that it will feature
    some sort of logo or even be identical to your app’s first page. Apple’s Human
    Interface Guidelines aren’t fond of launch images that are heavily branded anyway,
    and users won’t really be interacting with that screen or seeing it for a significant
    amount of time, anyway. However, there is more information on creating launch
    images in [Chapter 8](#9781430263647_Ch08.xhtml). We’ll focus, for now, on the
    screens that the user will actually be interacting and that represent some level
    of functionality. The first screen that users will see when they enter the app
    will be the sign-in or registration screen.


    Let’s start creating our first screen in Photoshop. It’s a good idea to have your
    wireframes nearby so that you can use them for reference.


    The first thing you will need to do is to create a new project in Photoshop. This
    will be the basis of all of your screens moving forward. Set your dimensions as
    shown in [Figure 7-1](#9781430263647_Ch07.xhtml#Fig1).


    ![9781430263647_Fig07-01.jpg](images/9781430263647_Fig07-01.jpg)


    [Figure 7-1](#9781430263647_Ch07.xhtml#_Fig1). Adobe Photoshop’s image size window


    The 640 x 1196 will accommodate the higher resolution of the newer iPhones, including
    the recently released iPhone 5c and 5s. Starting at a higher resolution will also
    make it easier to scale down your assets for non-Retina devices. It’s pretty easy
    to do this once you design for the higher resolution. Once you’re set up for this
    and all of your elements and components have even dimensions, you will then be
    able to scale down to accommodate non-Retina design for older devices.


    After you’ve set up your canvas in Photoshop, you’ll be taken to the main screen
    where you will proceed to design your app. It will look something like the screenshot
    in [Figure 7-2](#9781430263647_Ch07.xhtml#Fig2) depending on your personal preferences.
    Before you start adding elements and components, take some time to set up some
    aspects of the canvas, like which panels you prefer to be visible and where you
    want panels – depending on your orientation – right- or left-handed. Once you
    have arranged all of the panels and set up the canvas to your liking, this will
    make your design process easier. Most of Photoshop’s panels and windows can be
    moved around or hidden, according to your preferences.


    ![9781430263647_Fig07-02.jpg](images/9781430263647_Fig07-02.jpg)


    [Figure 7-2](#9781430263647_Ch07.xhtml#_Fig2). Main canvas in Photoshop


    Gridlines & Guides


    Setting up and establishing gridlines can make your design process a little easier.
    Guides and gridlines will make it much easier to align the components in your
    user interface across multiple screens. They are lines that appear on your page
    but not in your applications. You can put grids anywhere on the screen and lock
    them so that they stay in place as you design your app. They will help you to
    create perfectly symmetrical designs. Gridlines will give your elements exact
    placement on the canvas as opposed to having them float around on the screen.
    The alternative is to do this by the naked eye and estimate where components will
    line up. For even the most professional designer, this can be a tedious affair,
    and the results of misplaced components are elements that jump around from screen
    to screen. You will want to make sure that your elements snap to a guide or a
    grid to ensure that they do not move around from screen to screen. Even a pixel
    will cause movement if all of the elements have not been perfectly aligned.


    Guides are simple lines that appear when you are attempting to align certain elements
    on your screen. You can set the preferences for your guides by going to **Preferences![arrow.jpg](images/arrow.jpg)Guides,
    Grids & Slices**.'
