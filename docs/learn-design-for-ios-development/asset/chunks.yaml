- fmt: '# Apple''s Human Interface Guidelines


    Apple''s `Human Interface Guidelines` is like the Bible for designers and developers
    who are creating apps for iOS. In it, Apple has meticulously laid out its design
    principles and guidelines for designers and developers alike. Read it and reread
    it. Better yet, print a hard copy and keep it handy for when you have questions
    about pushing the boundaries of design for your app. If more designers and developers
    read the `HIG`, far fewer apps would be rejected from the app store.


    ## Wireframing Is Important


    `Wireframing` is the process of taking a concept and developing it fully on paper
    or some other method before the design process. `Wireframing` strips away all
    of the design elements and focuses on the user elements and the overall experience
    of the user as he or she interacts with your app. The `wireframing` process is
    critical to design and should actually be the first step in the design process.
    Oftentimes, the `wireframing` process can take some time, but this will save time
    once you move into the actual creative design process. Your wireframes will take
    you through every step of your application and will evolve over time as you define
    users, user stories, and user needs as you can see in [Figure 10-1](#9781430263647_Ch10.xhtml#Fig1).
    Never underestimate the `wireframing` process. When they are complete and approved,
    your design process will go much smoother.


    ![9781430263647_Fig10-01.jpg](images/9781430263647_Fig10-01.jpg)


    [Figure 10-1](#9781430263647_Ch10.xhtml#_Fig1). Sketched wireframes for a trip
    selection page of Travel Light app


    ## UI vs. UX: There Is a Difference


    `User Interface` and `User Experience` are different and it’s good to know how
    they differ. `UX` or `User Experience` is what the user is actually experiencing
    as he or she journeys through the app. `UI` or `User Interface` is a visual representation
    of that experience. These two terms are often confused and misunderstood when
    it comes to app design. Understanding how they differ will also help your `wireframing`
    process.


    ## Simplify!


    Cluttered interfaces are confusing to users and can lead to confusion when using
    your application. Get rid of everything that’s not critical. Be smart about how
    you implement functionality and don’t give your users too many options! Simplicity
    is one of the hallmarks of iOS design principles. But, it is also a main tenet
    of mobile design in general. Overcomplicating your mobile design will cause confusion
    for users.


    ## Utilize White Space


    Some of the best apps use negatives spaces as a great component of the design
    process. Having space around the elements on the screen can be very important.
    It allows the eyes to focus on precisely what it needs to. Make specific elements
    the focus of your app as well as elements that are critical to the functionality
    of your application.


    ## Be Aware of Changes to iOS 7


    The `HIG` will outline the essentials of Apple''s new operating system and its
    reliance on minimalism and flat design. Apply these principles to the design of
    your app. The iOS 7–specific information in the `Human Interface Guidelines` will
    help you understand the most sweeping changes to the OS since its release. It
    is also helpful to familiarize yourself with what others are doing in relation
    to the "flat design" trend and to understand how Apple has adapted this trend
    to suit the company''s aesthetic.


    ## Ask Why?


    Take a look at your interface and ask yourself WHY a button is where it is. Determine
    how you can simplify the journey of the user. If there are additional steps that
    are not critical to the user''s experience with the app, then remove them. Actually
    removing elements from the screen that are not absolutely necessary is a way to
    focus the user on the tasks at hand. If it''s not critical to the user''s journey,
    get rid of it.


    ## Think Small


    When designing your app, think about the fact that users will be interacting with
    your app on screens that are significantly smaller than a desktop screen. Designing
    for mobile and especially iOS means that space must be a consideration for each
    device. There are unique ways to interact with iOS devices, so keep them in mind.


    ## The iPad Isn''t Just a Big iPhone


    If you''re designing your app for the iPad there are specific design considerations
    that you must consider. For instance, consider how users will be interacting with
    your app on a larger device.


    ## Fonts Are Important


    Think about readability and how copy and text will appear on your device. Follow
    the `Human Interface Guidelines`, as they are specific with regard to fonts. Learn
    how fonts like `Helvetica Neue` (shown in [Figure 10-2](#9781430263647_Ch10.xhtml#Fig2))
    are being utilized in iOS 7, and make sure that your copy is legible on the intended
    devices.


    ![9781430263647_Fig10-02.jpg](images/9781430263647_Fig10-02.jpg)


    [Figure 10-2](#9781430263647_Ch10.xhtml#_Fig2). Helvetica Neue is a popular flat
    design font


    ## Provide Visual Feedback


    Always let users know what''s going on in your app. Providing feedback to users
    as a process is taking place is a great best practice. This includes the use of
    progress bars or the use of a spinner as in [Figure 10-3](#9781430263647_Ch10.xhtml#Fig3)
    if an application is completing or is in the middle of a process. Your users want
    to know what''s happening, so use these indicators to keep them apprised of what''s
    happening within your app. When it comes to actions, visual feedback also helps.
    When a user taps on a button, creating and providing an "activated" or "on" state
    that is visually different from the "off" or "inactive" state lets the user know
    that the interaction has been received by the application. If there are specific
    ways that you would like to provide visual feedback for your user, be sure to
    mention these in the `Design Specifications` document so that your developer is
    aware of them.


    ![9781430263647_Fig10-03.jpg](images/9781430263647_Fig10-03.jpg)


    [Figure 10-3](#9781430263647_Ch10.xhtml#_Fig3). A spinner lets the user know that
    a process is underway in an application


    ## The User Is King (or Queen)


    When designing your mobile app, you must always remember to put yourself in the
    position of your user. Create user stories and profiles and immerse yourself in
    that particular user''s experience and tailor the app to fit that user. A user
    story is a profile of your ideal user and specific needs or requirements that
    he or she might have when using your app. Fleshing out these needs and prioritizing
    specific features based on user types will help you to narrow down your list of
    features. Understanding that you can''t be everything to everyone will be helpful,
    too.


    ## Design Patterns Are Your Friend


    If you''re still finding your way around the iOS interface or mobile in general,
    design patterns are a great way to understand well-established solutions for the
    interface design challenges for applications. Need a login or registration screen,
    or a way to display location-based search results? No problem. Design patterns
    can help and can take the guesswork out of problems and also speed up the overall
    design process.


    ## Thumbs Rule


    A popular mistake that can have lasting ramifications in your app is when you
    forget that thumbs rule. Remember that mobile users press or tap; they don''t
    click. Therefore when designing your app, make sure that you''re allowing adequate
    space for different sized fingers, especially thumbs. You will find that thumbs
    play an important role in app navigation. Think about where the important elements
    on the screen in your app will go, and make sure that they are within the reach
    of your users'' thumbs. Apple''s requirement for tappable areas is `44 x 44`.


