    # 排版后的文本


    从 iPad 的任意主屏幕，用四指快速向上滑动即可显示多任务栏，其中列出了所有当前打开的应用程序。您可以在 iOS7 的图 4-9 中看到四指滑动的效果。


    ![9781430263647_Fig04-09.jpg](img/9781430263647_Fig04-09.jpg)


    图 4-9. iOS7 中通过四指滑动显示的 iPad 多任务栏


    ## 捏合


    用四指捏合屏幕将立即将用户带回主屏幕。


    ## 总结


    虽然 iOS 设备的界面相似，但 iPad 和 iPhone 有不同的要求。如果您正在设计一个能够在所有 iOS 设备上运行的通用应用程序，您还需要考虑每个新设备。在设计应用程序时，必须考虑方向、交互和视觉上下文，以确保用户获得最佳体验。由于手势是用户与
    iOS 交互的方式，了解可以使用哪些手势至关重要。您的设计需要充分利用 iOS 用户已经熟悉的手势；如果您引入新手势，请确保对其进行说明，因为用户需要将它们与应用程序中的新任务关联起来。


    # 第 5 章 移动设计模式


    作为开发者，你们中的大多数人已经熟悉“设计模式”这个术语。对于开发者来说，设计模式指的是可以通过使用特定抽象解决方案来解决的特定软件或编程问题。然而，就本书的目的而言，我们将讨论与应用程序的设计和用户界面特别相关的设计模式。设计模式是解决常见设计问题的有用方法。它们是针对移动设计中遇到的挑战的有用且被普遍接受的
    UI 解决方案。随着移动技术的发展，涌现出越来越多的模式来帮助设计师应对常见的设计挑战。在设计应用程序时，您无疑会遇到其中一些挑战。了解其他设计师如何找到独特且有时创新的解决方案来解决这些挑战，将有助于您设计应用程序，使您能够专注于功能，而不是重复发明轮子。由于移动设计模式是用户熟悉的被接受的**最佳实践**解决方案，您可以将其应用于您的应用程序，而无需过多担心用户是否熟悉它们。


    在本章中，我们将介绍一些最流行的移动设计模式，并分解在实现它们时可以使用（或不使用）的元素。与所有设计元素一样，用户必须是焦点。如果一个模式不能让用户的生活更轻松，那么最好不要使用它。但请记住，您也可以根据自己的需要编辑和更改模式。因此，可以在您的应用程序中使用公认的设计模式并进行创新。使用设计模式可以将基本工具交到您手中，并让您能够为应对设计挑战建立一个起点。通过观察其他流行应用程序如何处理这种模式，将有助于您更好地了解如何在自己的应用程序中处理它。由于设计模式在移动生态系统中被普遍使用，它们通常被认为是平台无关的。因此，虽然本书以
    iOS 设计为重点，但您会看到这些模式被用于原生应用和 Web 应用。这通常被认为是一件好事，因为模式使用得越广泛，所有用户都熟悉它的可能性就越大。从可用性的角度来看，这是一件好事。


    有许多设计模式可供您使用，但在本章中，我们仅探讨那些流行且可能有帮助的模式。


    **提示** 如果您对设计模式更感兴趣，建议购买一本专门讨论设计模式的书籍。在书中，您很可能会找到比此处列出的更详尽的列表。


    ## 注册与登录/注册表单


    注册和注册表单通常是用户与您的应用程序的第一次接触。您的总体目标应该是让用户以最少的麻烦进入您的应用。保持登录和注册页面简洁，并使用与您应用程序的整体品牌形象和感觉相协调的颜色元素。即使这个页面主要是一个字段，您仍然可以赋予表单个性。有一点要记住：为用户提供登录选项。一些应用程序因为将
    Facebook、Twitter 或其他社交媒体应用程序作为访问其应用的唯一方式而遭到了强烈的反对。请记住，某些用户可能不想将他们的社交媒体网络连接到您的应用，因此请提供其他选项，例如电子邮件；或者更好的是，借此机会向用户解释为什么您将社交媒体连接设置为唯一选项。


    要牢记用户的隐私，只询问您绝对需要的信息。例如，如果您的应用程序是一个短信或 SMS 消息应用程序，您可能需要询问用户的电话号码。如果您的应用程序不需要这些信息，就跳过它。添加弹出窗口来解释每个必填项为什么是必需的以及它将如何使用，也是一个好主意。


    您的注册或登录表单页面还应该包含一个引人注目的**行动号召按钮**。当然，“注册”或“报名”是标准标签，但这可以提供一个有趣的机会向客户展示您的创造力。垂直标签（略高于相应的表单字段）曾经很流行，但最近，尤其是随着应用程序为
    iOS7 更新，它们已被直接放置在字段内的文本所取代。这对用户来说更容易，并且消除了屏幕上其他地方说明性文字的需要。


    除非绝对必要，否则请将登录或注册过程限制在一个屏幕内，就像图 5-1 中的简单线框图所示的那样。移动用户是出了名的不耐烦，而且每个人都越来越注重隐私。因此，多页注册会适得其反；请保持简短，让用户尽可能简单地注册您的应用。


    ![9781430263647_Fig05-01.jpg](img/9781430263647_Fig05-01.jpg)


    图 5-1. 设计模式中的简单登录或注册


    ## 应用导航


    用户注册或报名使用您的应用程序后，他或她需要在应用程序中进行导航。这将是用户在应用中移动的主要方式。如果您做得很好，应用程序的导航不应该让用户猜测下一步该做什么；他们对应用的导航应该是直观且自然的。虽然注册和登录模式相对直接，但导航提供了更多选项，具体取决于应用的核心功能和目的。如果您探索过其他应用以寻求灵感，您会发现移动应用的导航方式几乎数不胜数。有些模式适用于特定应用，而另一些则随着
    iOS 的发展而演变。下面列出了一些更流行的模式，如注册、主屏幕和图片库，但也有像滑出式导航这样的新模式不断涌现。iOS 仍然相对较新，随着设计师开始突破设计的界限，预计会有新的模式出现。因此，如果您的应用是一个社交媒体应用，用户将在特定的层级结构或好友与信息流中移动，您可能希望坚持使用流行应用中已有的设计模式。用户已经熟悉这些模式，并期望您遵循它们。


    ### 主屏幕或主屏幕模式

