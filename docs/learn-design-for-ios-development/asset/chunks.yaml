    artwork:


    *   Any background art should be at least 3200 px wide and 600 px high with a
    minimum of 72 dpi. Background art should also be RGB color and in PSD format only.

    *   Your artwork should not include text or logos in the Tag area. This is used
    exclusively for iTunes-related tags. The tag area itself is 200 px from the bottom
    of the artwork.

    *   Any text or logos should only appear in the center of artwork in the text/logo
    safe area.

    *   Title treatment should be 2004 px wide and 586 px high.


    Your App’s Page


    When your app is ready for submitting to the app store, you will be required to
    fill in information about your app for your app’s page in the app store. Here
    is the information you’ll need to provide:


    *   Your app’s name

    *   Category

    *   Rating (Not user rating but ratings for targeted age group)

    *   Description

    *   Keywords

    *   Screenshots

    *   Supporting URL

    *   Marketing URL (optional)

    *   Privacy Policy (optional)

    *   Contact Info'
  trans: '

    # 封面图标


    除了默认的封面图标外，你还需要准备一个独立的期刊图标，该图标不仅会在书报架的“货架”上显示，还会在各种设备的多任务栏中作为每一期新内容的视觉标识。与默认封面不同，此图标可以包含关于该期内容的特定细节，方便用户识别。与其他图标一样，请勿为新闻报刊图标添加任何视觉修饰或增强效果。明确禁止添加如圆角、页面或透视效果等外观上的增强设计。


    # 宣传截图


    应用的截图是你在 Apple App Store 中进行推广的重要组成部分。截图会与应用元数据、描述和应用图标一同显示在应用页面上。截图并非应用包的一部分，但在通过
    `iTunes Connect` 提交应用时至少需要提供一张。如果你只能提供一张应用截图，请确保这是最精彩的一张。虽然提交和通过审核只需一张截图，但我建议你尽可能多地添加截图——据我上次了解，Apple
    允许最多添加五张。五张截图已经足够，通过这些截图，你可以让用户充分了解应用的界面风格，以及他们下载后能够期待的内容。


    此外，截图的顺序也很重要。它们将按照上传的顺序显示，因此按顺序展示用户与应用的交互流程，是让用户了解你的应用及其最重要或最吸引人的功能的好方法。截图还能在很大程度上提升应用在
    App Store 中的可发现性。如果你的应用只有一张截图（按规定的最低要求），用户将无法充分了解应用的界面。在如今众多应用不断突破设计界限的时代，尽可能多地添加截图，能让用户清楚他们投入时间和金钱（如果应用不是免费的话）下载后能得到什么。


    如果你的应用在视觉上独具特色，或包含创新功能，也可以提供该页面或功能的截图。如果应用是通用应用，可在 iPad 上运行，你需要在提交应用时同时提供 iPhone
    和 iPad 上的截图。


    你的截图应为高质量文件，画面应清晰锐利。Apple 文档规定，如果你从运行应用的实体设备上截取截图，上传前应移除状态栏。不过，快速浏览一下 App Store，会发现不少应用的截图仍包含状态栏。似乎这并不会导致应用被拒绝上架。然而，App
    Store 仅接受以下格式的截图：`JPEG`、`TIFF` 或 `PNG`。图 8-3 展示了 Travel Light 应用的两张截图，分别包含和不包含状态栏。


    ![9781430263647_Fig08-03.jpg](img/9781430263647_Fig08-03.jpg)


    图 8-3。右侧的图片符合提交给 App Store 的要求，左侧的则不符合。


    iOS 设备的用户熟悉手动截取截图的方法，即同时按住 Home 键和电源键。如果你熟悉 `Xcode` 且拥有一个可编译运行的应用版本，也可以通过此方式截图。这些截图同样适用于
    App Store。


    以下是截图的注意事项。


    ## 应做到：


    *   确保内容在所有尺寸下都清晰可读

    *   为你的应用上传最大数量（5 张）的截图

    *   使用你的设备截取应用截图

    *   移除所有截图中的状态栏

    *   考虑应用图片在不同国家和文化背景下的适用性

    *   如有必要，对截图进行本地化处理


    ## 不应做：


    *   在截图中添加营销信息

    *   在图片周围添加设备边框


    # 宣传素材


    如果你的应用在执行和设计上表现出色，Apple 可能会决定在 App Store 中对其进行推荐。如果你认为自己的应用有可能被 Apple 选中进行推荐，或者觉得胜算较大，那么提前创建宣传素材是个好主意。即使你认为自己的应用没有机会，养成为应用创建宣传素材的习惯也是好的。宣传素材允许你在图像中注入一些创意，为用户呈现应用背后的视觉故事。不过，一旦素材被添加到
    App Store 中，最终效果将由 Apple 决定。


    除非你事先有所了解（这很少见），否则这类请求通常是突如其来的，并且通常伴有截止日期。因此，有备无患总好过临时抱佛脚。


    虽然 Apple 推荐应用并没有确定不变的公式，但可以肯定的是，你的应用必须设计精良，具有独特的外观和感觉，才有可能被推荐。如果你的应用下载量很大且非常受欢迎，这有时会有所帮助。但大多数情况下，Apple
    寻找的是在形式和功能上都极具吸引力的应用。你的应用必须独树一帜，并能提升平台水准。应用图标也是引起 Apple 注意的重要因素。《人机界面指南》明确指出，要想获得推荐资格，你的图标必须原创且富有吸引力。


    每周关注一下当前被推荐的应用，尝试了解它们为何受欢迎。同时注意 Apple 如何推广各种应用，以及这些推广区域在 App Store 中的呈现方式。Apple
    可能会将你的应用与其他类似应用放在同一类别中推荐，或在 App Store 的多个区域进行展示。


    如果你收到了提供宣传素材的请求，这通常是一个好迹象，表明你的应用将被推荐，但 Apple 明确表示这并不能保证任何结果。他们清楚说明的是，当提出此类请求时，他们期望从应用创建者或所有者那里得到什么。


    由于 Apple 自己的团队将创建所需的文件，他们要求你发送分层的 `PSD` 文件。每个 `PSD` 文件必须为各种元素单独设立一个图层。如果某些元素必须保持在一起，将它们放在一个图层中是个好主意。如果你的应用被选入
    App Store，Apple 的设计团队不会就他们对文件所做的任何更改征求你的意见。因此，将必须保持在一起的元素放在一个已合并的图层中，可以清楚表明哪些元素可以移动，哪些不应移动。与所有必须提交给
    Apple 的材料一样，宣传图片也必须遵守严格的指南。以下是宣传素材的一些规格说明：


    *   任何背景艺术图至少应为 3200 像素宽、600 像素高，分辨率最低为 72 dpi。背景艺术图应为 RGB 色彩，且仅限 `PSD` 格式。

    *   你的素材不应在标签区域包含文本或徽标。该区域专用于与 `iTunes` 相关的标签。标签区域本身位于素材底部上方 200 像素处。

    *   任何文本或徽标只能出现在素材中心的文本/徽标安全区域内。

    *   标题处理区域应为 2004 像素宽、586 像素高。


    # 你的应用页面


    当你的应用准备好提交至 App Store 时，你需要为你的应用页面填写相关信息。你需要提供以下信息：


    *   你的应用名称

    *   类别

    *   分级（非用户评分，而是目标年龄段的分级）

    *   描述

    *   关键词

    *   截图

    *   支持网址

    *   营销网址（可选）

    *   隐私政策（可选）

    *   联系信息

    '
- fmt: '如果您的应用是游戏、包含内购、使用iAd，或涉及版权和定价，则需要填写额外的信息。


    当您的应用提交至App Store并被接受后，它会获得专属页面和URL。苹果批准您的应用后，您会收到一封电子邮件，告知应用已准备就绪，并附带相关详细信息。我收到的一封示例邮件如[图8-4](#9781430263647_Ch08.xhtml#Fig4)所示。邮件中将包含您的应用ID，以及应用在App
    Store（如果已上线）的页面链接。应用的唯一ID是URL的一部分。该链接将跳转至您的应用页面，您将在其中看到以下内容：


    *   应用的大图标

    *   应用功能的描述

    *   截图

    *   销售者信息

    *   用户评分和评论

    *   必要时提供的本地化截图


    ![9781430263647_Fig08-04.jpg](images/9781430263647_Fig08-04.jpg)


    [图8-4](#9781430263647_Ch08.xhtml#_Fig4) 应用获批后来自苹果的“准备就绪”邮件


    **提示** 如果应用是通过您的开发者账户注册的，您将在应用审核流程的每个阶段都收到苹果的电子邮件通知。


    如果您的应用未获批准，您同样会收到苹果的邮件，说明未批准的原因，以及您可以采取的上诉步骤。


    总结


    虽然应用及其用户界面的设计对用户很重要，但在营销您的应用及其在苹果App Store中的位置时，应用图标和其他必需的图形也同样重要。苹果为创建应用图标、推广素材和截图提供了指南，这些资源在应用获批后都会显示在App
    Store的应用页面上。在开发应用设计时，最好将这些辅助图形牢记在心，因为它们可能决定用户是下载您的应用，还是快速划走。


    第 9 章


    为应用开发最终确定素材


    完成上一章后，您应该已经为应用设计了所有必要的页面和屏幕，并以图层分组且命名恰当的方式创建了它们。如果幸运的话，您还可能已经收到了所有相关方和利益相关者的反馈或批准，可以继续应用开发了。到目前为止，您应该对用户应如何与您的应用交互有了清晰的概念。现在需要的只是为开发人员准备这些素材。


    如果您从一开始就按照本书的指导进行操作，那么您已经基本准备好完成整个流程了。应用设计流程中最困难的部分已经完成，您现在可以将设计交给开发人员进行编码。这一步本身也有一套需要遵循的步骤。如果您对这个过程有一定了解，或者之前执行过其中一些任务，您可能会觉得它不像某些设计人员认为的那样繁琐。


    主要任务包括：


    *   为开发人员创建设计规范文档

    *   将设计切分为资源文件

    *   将资源文件保存为适用于不同设备的多种尺寸

    *   为资源文件命名

    *   打包资源文件以供开发使用


    有些开发人员熟悉Photoshop，可以自己切分资源文件。如果您是开发人员（你们中的一部分人可能是），您可能熟悉也可能不熟悉Photoshop以及如何在Xcode中为iOS开发导出图像。本书和本章节假定您需要为开发人员切分屏幕中的所有元素。不过，我不会讨论如何在Xcode中准备资源。


    为开发人员创建设计规范文档


    如果您将素材交给开发人员，创建一个参考文档或规范文档总是一个好主意，该文档应包含开发人员开始开发您的应用之前需要了解的所有信息。该文档应提供尽可能多的信息，而不是可能不足，并且应尽可能清晰无误。


    有时，在设计人员眼中一目了然的事情，对开发人员来说并非如此简单。设计规范文档有时可以像一封电子邮件或一份单独的文档那样简单，但它是流程中必要的一部分，并且对于确保您的应用外观和行为符合预期大有裨益。设计规范文档应与应用的最终素材一起交付。此外，与开发人员面对面审阅设计规范文档也是一个好习惯，以确认是否有任何需要澄清的地方。我将在本章后面的“沟通是关键”部分更详细地讨论这一点。


    设计规范文档概述


    从项目、应用及其预期用途的概述开始撰写文档。这不需要非常详细；一两句话就足够了。如有必要，可以从最终版本的应用初始陈述中摘取。如果您是与未参与应用设计和构思的开发人员或团队合作，概述陈述会很有帮助。通过提供概述，您可以向开发人员提供对应用目标受众及其使用方式的宝贵见解。


    然后，您的规范文档应引导开发人员从头到尾、一个屏幕一个屏幕地了解您应用的细微差别。作为设计人员，您需要特别注意那些具有特效或可能需要独特动画或操作（仅凭设计无法展示）的屏幕。如果需要在文档中解释特定屏幕的工作方式，请大量使用注释。注释在描述过渡效果时也非常有用。


    提供颜色信息


    文档还应包含关于整个应用中使用颜色、明暗或色调的任何必要说明。尽可能提供颜色代码，因为这是您能为开发人员提供的最精确的颜色信息。您不希望开发人员猜测应用中的颜色，或者不得不在PSD（Photoshop文档）的层层图层中挖掘以找到确切的色号。


    指定字体与字号


    应用中使用的字体和字号信息也应包含在设计规范文档中。开发人员需要知道字体的名称（即使是iOS系统字体）。让开发人员了解应用中各个屏幕所使用的字体大小也很重要。虽然`Helvetica
    Neue`是iOS的默认字体，但还有许多其他受支持的字体。像`iOSfonts.com`这样的网站列出了iOS支持的字体，但最好还是直接查看来源，查阅苹果的字体列表以确保无误。苹果同时提供了iOS
    6和iOS 7的字体列表。这些列表包含两个系统版本中安装的所有字体，以及在必要时可由应用下载的字体列表。


    **提示** 系统字体是iPhone或其他iOS设备上用于显示菜单设置和标签文本的默认字体。iOS 7允许用户更改其系统字体。


    说明用户交互


    如有必要，添加任何需要澄清的用户交互细节。例如，如果应用的一个屏幕包含多个控制器并需要多种不同的手势，这些都需要在设计规范中概述出来。它应让您的开发人员了解，哪些用户交互（如果不是一目了然的话）应在您的应用中产生特定的结果。'
  raw: 'If your app is a game, has in-app purchases, uses iAds, or includes rights
    and pricing, you will be required to fill in additional information.


    When your app is submitted to the app store and accepted, it is given its very
    own page and URL. When Apple has approved your app, you will receive an e-mail
    notifying you that your app is ready for sale with pertinent information about
    your app. A sample letter I received is shown in [Figure 8-4](#9781430263647_Ch08.xhtml#Fig4).
    The e-mail will contain your app ID as well as a link to your app’s page in the
    app store if it is live. Your app’s unique ID is a part of the URL. The link will
    take you to your page where you will see the following:


    *   A large icon of your app

    *   Description of your app’s features

    *   Screenshots

    *   Information on the seller

    *   User ratings and reviews

    *   Localized screenshots if necessary


    ![9781430263647_Fig08-04.jpg](images/9781430263647_Fig08-04.jpg)


    [Figure 8-4](#9781430263647_Ch08.xhtml#_Fig4). Ready for sale e-mail from Apple
    once an app is approved


    **Tip**  If the app is registered via your developer account, you will receive
    e-mail notifications from Apple at every stage of the app review process.


    If your app has not been approved, you will also receive an e-mail from Apple
    stating that fact as well as steps you may take to appeal your app’s rejection.


    Summary


    While the design of your app and its user interface is important for your users,
    when it comes to marketing your app and its place in the Apple app store, your
    app icon and other graphics that are required are just as important. Apple provides
    guidelines for creating your app icons, promotional artwork, and screenshots,
    which all will live on your app’s page in the app store once it’s approved. It’s
    a good idea to keep these ancillary graphics in the back of your mind as your
    develop your app’s design as they can mean the difference between a download or
    a quick swipe past in the app store.


    Chapter     9


    Finalizing Your Assets for App Development


    After completing the previous chapter, you should have designed all of the needed
    pages and screens for your application and created them in such a way that your
    layers are grouped and named appropriately. If you’re lucky, you will also have
    received feedback or approval from all necessary parties and stakeholders, and
    can move on with the development of your app. You should, by now, have a clear
    idea of precisely how users should be interacting with your app, too. All that’s
    needed now is to prep those assets for your developer.


    If you’ve followed the directions in this book from the beginning, you’re pretty
    much ready to complete the process. The hardest part of the application design
    process is complete, and you’re now ready to hand off your designs for development.
    This, too, is a process with its own set of steps to follow. If you’re familiar
    to some degree with this process, or if you have performed some of these tasks
    before, you may not find this as tedious as some designers do.


    The major tasks include:


    *   Creating a design specifications document for your developer

    *   Slicing your designs into assets

    *   Saving your assets to multiple scales for various devices

    *   Naming your assets

    *   Packaging your assets for development


    Some developers are familiar with Photoshop and can slice their own assets. If
    you’re a developer, which some of you will be, you may or may not be familiar
    with Photoshop and how to export your images for iOS development in Xcode. This
    book and chapter will assume that you will need to slice all of the elements in
    your screens for your developer. I will not discuss how to prepare assets in Xcode,
    however.


    Creating a Design Specifications Document for Your Developer


    If you’re handing off your assets to a developer, it is always a great idea to
    create a reference document or specifications document that will contain everything
    your developer needs to know before he or she can begin to develop your app. The
    document should err on the side of providing more information than might be necessary
    and should also be as unambiguous as possible.


    Sometimes, what appears to be straightforward to designers’ eyes isn’t as simple
    to developers. A design specifications document can sometimes be as simple as
    an e-mail or a separate document altogether, but it is a necessary part of the
    process and will go a long way toward making sure that your app looks and behaves
    as it should. The design specifications document is delivered along with the final
    assets for the app. It is also a good practice to review the design specifications
    document with your developer face-to-face, too, to see if there are any clarifications
    needed. I’ll discuss this in more detail later in the “Communication is Key” section
    of this chapter.


    Design Specifications Document Overview


    Start off your document with an overview of the project, the app, and its intended
    use. This doesn’t need to be in great detail; a sentence or two should suffice.
    If necessary, this can be pulled from the final version of your initial app statement.
    The overview statement is helpful if you are working with a developer or team
    of developers who have not been involved in the design and ideation of the app.
    By providing an overview, you are giving your developer much needed insight into
    the intended audience for the application and how it will be used.


    Your spec document should then guide your developer through the nuances of your
    application, screen by screen and from beginning to end. As the designer, you
    will want to pay particular attention to screens that feature effects or that
    may require unique animations or actions that cannot be shown by your designs.
    Use annotations liberally in your document if you need to explain how a particular
    screen should work. Annotations are also incredibly helpful in describing transitions.


    Provide Color Information


    The document should also contain any clarifications necessary about colors, shades,
    or hues used throughout the app. Provide color codes where you can, as this is
    the most precise color information you can provide for a developer. You do not
    want a developer to guess the colors in your application or have to dig through
    layers of your PSD (Photoshop document) to find the exact shade.


    Specify Fonts & Types


    Information regarding fonts and types used in the application should be in the
    design spec document, too. A developer will need to know the name of the font
    (even if it is an iOS system font). It will also be important for the developer
    to know the size of fonts being used in various screens in the app. While Helvetica
    Neue is the default font for iOS there are many other fonts that are also supported.
    Sites like [iOSfonts.com](http://iOSfonts.com) lists fonts that are supported
    in iOS, but it’s always best to go directly to the source and review Apple’s font
    list to be sure. Apple provides font lists for both iOS 6 and iOS 7\. The lists
    contain all fonts that are installed with both versions of the OS as well as a
    list of fonts that can be downloaded by apps if necessary.


    **Tip**  A system font is the default font used to display text in menu settings
    and labels on the iPhone or other iOS device. iOS 7 allows users to change their
    system fonts.


    Explain User Interaction


    If needed, add any details about user interaction that need to be clarified. For
    instance, if one screen of your app contains multiple controllers and will require
    a variety of different gestures, these will need to be outlined in your design
    spec. It should let your developer know what user interaction (if not immediately
    apparent) should yield specific results within your app.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。



    如果您的应用是游戏、包含内购、使用 iAd，或涉及版权和定价，则需要填写额外的信息。


    当您的应用提交至 App Store 并被接受后，它会获得专属页面和 URL。苹果批准您的应用后，您会收到一封电子邮件，告知应用已准备就绪，并附带相关详细信息。我收到的一封示例邮件如图
    8-4 所示。邮件中将包含您的应用 ID，以及应用在 App Store（如果已上线）的页面链接。应用的唯一 ID 是 URL 的一部分。该链接将跳转至您的应用页面，您将在其中看到以下内容：


    *   应用的大图标

    *   应用功能的描述

    *   截图

    *   销售者信息

    *   用户评分和评论

    *   必要时提供的本地化截图


    ![9781430263647_Fig08-04.jpg](img/9781430263647_Fig08-04.jpg)


    图 8-4 应用获批后来自苹果的“准备就绪”邮件


    **提示** 如果应用是通过您的开发者账户注册的，您将在应用审核流程的每个阶段都收到苹果的电子邮件通知。


    如果您的应用未获批准，您同样会收到苹果的邮件，说明未批准的原因，以及您可以采取的上诉步骤。


    总结


    虽然应用及其用户界面的设计对用户很重要，但在营销您的应用及其在苹果 App Store 中的位置时，应用图标和其他必需的图形也同样重要。苹果为创建应用图标、推广素材和截图提供了指南，这些资源在应用获批后都会显示在
    App Store 的应用页面上。在开发应用设计时，最好将这些辅助图形牢记在心，因为它们可能决定用户是下载您的应用，还是快速划走。


    第 9 章


    为应用开发最终确定素材


    完成上一章后，您应该已经为应用设计了所有必要的页面和屏幕，并以图层分组且命名恰当的方式创建了它们。如果幸运的话，您还可能已经收到了所有相关方和利益相关者的反馈或批准，可以继续应用开发了。到目前为止，您应该对用户应如何与您的应用交互有了清晰的概念。现在需要的只是为开发人员准备这些素材。


    如果您从一开始就按照本书的指导进行操作，那么您已经基本准备好完成整个流程了。应用设计流程中最困难的部分已经完成，您现在可以将设计交给开发人员进行编码。这一步本身也有一套需要遵循的步骤。如果您对这个过程有一定了解，或者之前执行过其中一些任务，您可能会觉得它不像某些设计人员认为的那样繁琐。


    主要任务包括：


    *   为开发人员创建设计规范文档

    *   将设计切分为资源文件

    *   将资源文件保存为适用于不同设备的多种尺寸

    *   为资源文件命名

    *   打包资源文件以供开发使用


    有些开发人员熟悉 Photoshop，可以自己切分资源文件。如果您是开发人员（你们中的一部分人可能是），您可能熟悉也可能不熟悉 Photoshop 以及如何在
    Xcode 中为 iOS 开发导出图像。本书和本章节假定您需要为开发人员切分屏幕中的所有元素。不过，我不会讨论如何在 Xcode 中准备资源。


    为开发人员创建设计规范文档


    如果您将素材交给开发人员，创建一个参考文档或规范文档总是一个好主意，该文档应包含开发人员开始开发您的应用之前需要了解的所有信息。该文档应提供尽可能多的信息，而不是可能不足，并且应尽可能清晰无误。


    有时，在设计人员眼中一目了然的事情，对开发人员来说并非如此简单。设计规范文档有时可以像一封电子邮件或一份单独的文档那样简单，但它是流程中必要的一部分，并且对于确保您的应用外观和行为符合预期大有裨益。设计规范文档应与应用的最终素材一起交付。此外，与开发人员面对面审阅设计规范文档也是一个好习惯，以确认是否有任何需要澄清的地方。我将在本章后面的“沟通是关键”部分更详细地讨论这一点。


    设计规范文档概述


    从项目、应用及其预期用途的概述开始撰写文档。这不需要非常详细；一两句话就足够了。如有必要，可以从最终版本的应用初始陈述中摘取。如果您是与未参与应用设计和构思的开发人员或团队合作，概述陈述会很有帮助。通过提供概述，您可以向开发人员提供对应用目标受众及其使用方式的宝贵见解。


    然后，您的规范文档应引导开发人员从头到尾、一个屏幕一个屏幕地了解您应用的细微差别。作为设计人员，您需要特别注意那些具有特效或可能需要独特动画或操作（仅凭设计无法展示）的屏幕。如果需要在文档中解释特定屏幕的工作方式，请大量使用注释。注释在描述过渡效果时也非常有用。


    提供颜色信息


    文档还应包含关于整个应用中使用颜色、明暗或色调的任何必要说明。尽可能提供颜色代码，因为这是您能为开发人员提供的最精确的颜色信息。您不希望开发人员猜测应用中的颜色，或者不得不在
    PSD（Photoshop 文档）的层层图层中挖掘以找到确切的色号。


    指定字体与字号


    应用中使用的字体和字号信息也应包含在设计规范文档中。开发人员需要知道字体的名称（即使是 iOS 系统字体）。让开发人员了解应用中各个屏幕所使用的字体大小也很重要。虽然`Helvetica
    Neue`是 iOS 的默认字体，但还有许多其他受支持的字体。像`iOSfonts.com`这样的网站列出了 iOS 支持的字体，但最好还是直接查看来源，查阅苹果的字体列表以确保无误。苹果同时提供了
    iOS 6 和 iOS 7 的字体列表。这些列表包含两个系统版本中安装的所有字体，以及在必要时可由应用下载的字体列表。


    **提示** 系统字体是 iPhone 或其他 iOS 设备上用于显示菜单设置和标签文本的默认字体。iOS 7 允许用户更改其系统字体。


    说明用户交互


    如有必要，添加任何需要澄清的用户交互细节。例如，如果应用的一个屏幕包含多个控制器并需要多种不同的手势，这些都需要在设计规范中概述出来。它应让您的开发人员了解，哪些用户交互（如果不是一目了然的话）应在您的应用中产生特定的结果。

    '
- fmt: '一份编写良好的设计规格文档将简化从设计与构思开发到应用初始版本或 Alpha 版本的过渡，并且你的应用会看起来、用起来更符合预期。


    我在[图 8-1](#9781430263647_Ch09.xhtml#Fig1) 中附上了一份设计规格文档页面的示例。你可能希望在规格文档中明确以下几点：


    - 具有开启和关闭状态的按钮，以及它们各自的状态

    - 所有按钮的标题和颜色（在交付给开发者之前，应将文本和类型从按钮中移除）

    - 在特定区域使用的具体字体、字号和颜色


    ![9781430263647_Fig09-01.jpg](images/9781430263647_Fig09-01.jpg)


    [图 8-1](#9781430263647_Ch09.xhtml#_Fig1)。来自我们 Travel Light 设计规格文档的登录/注册页面示例


    [图 8-1](#9781430263647_Ch09.xhtml#Fig1) 中展示的示例页面相当简单，但根据添加的细节多少以及应用的复杂程度，它很容易变得更复杂。理想情况下，你的设计规格文档应为应用的每个屏幕提供说明。虽然这些说明有时会以电子邮件的形式出现，但在交付给开发者的资源包中包含设计规格文档是一种良好且广为人接受的做法。


    如果你正在开发自己的应用，养成创建此类文档的习惯仍然是一个好方法。如果将来需要移交资源，你会准备充分，并且你的开发者也会对此表示感激。与普遍看法相反，你的开发者希望获得尽可能多的细节。这有助于按照创建者、客户端以及最终用户的期望来构建应用。


    ### 按钮


    所有 iOS 应用都会有按钮。它们是用户与应用交互的主要方式。任何可轻点或按压的元素都可视为按钮，并且所有按钮都有状态。按钮的“开启”或高亮状态是用户在轻点按钮或与之交互时看到的。`"off"`或正常状态是用户在与按钮交互之前通常看到的。有时还会使用第三种状态，即非活跃状态。这意味着按钮可能会显示在屏幕上，但在此状态下，用户无法使用它。如前所述，iOS
    7 中的按钮没有边框，但它们仍然保留了大多数按钮所具有的属性。这意味着，除非它们是系统按钮，否则仍需要为其设计并提供状态。


    在准备导出按钮时，所有资源的尺寸必须相同（状态除外）。这能让应用内的交互更流畅。至少，按钮的最终导出应包含所有适用的状态、字体和颜色的像素尺寸，以及与该特定资源相关的任何其他信息。如果该资源在应用的其他位置出现但看起来（甚至行为上）有所不同，那么你有责任解释这些差异，以便开发人员了解。


    有些按钮可以通过编程方式创建。如果你希望开发者使用`Xcode`创建按钮，同样的规则也适用。开发人员需要知道按钮的确切尺寸、标签、文本或字体大小、颜色，以及用户与之交互时按钮的确切行为。


    完成设计规格文档后，请与开发者一起审阅，以澄清任何未决问题。虽然你的文档可能包含尽可能多的细节，但有时，没有什么比面对面的交流更有效。


    ### 按钮标题


    开发者可以通过多种方式创建按钮。他们可能会也可能不会使用你提供的按钮资源来创建最终出现在应用中的按钮。这通常取决于几个因素，例如按钮是否带有渐变。这正是与开发者沟通能派上用场的地方。开发者可能会取图形中的一个像素，并通过编程方式重复该像素来创建按钮。这可以减少资源的整体文件大小，从而减小应用包的大小。


    最佳实践是在将按钮资源交付给开发者之前，从中移除标题。除非字体无法以编程方式再现，否则只需提供图形，并在你的设计规格文档中提供关于按钮应关联的标题、字体、字号和颜色的详细说明。


    ### 字体、字号、文件名和颜色


    你的设计规格文档还应成为开发者查询按钮字体名称、字号和颜色相关问题的快速参考指南。设计文档时应遵循对你和开发者都直观的方式，并让所有内容易于查阅。一个很好的做法是包含应用的实际屏幕截图，按钮在其中的显示方式应与应用中的一致，并在页面附上图例，提供该屏幕上所有元素的相关信息：


    - 资源文件名（包含所有状态）

    - 字体名称

    - 字号

    - 十六进制颜色码或颜色值

    - 在屏幕上的位置

    - 任何需要与该资源关联的特定动作或动画


    ### 将设计切片为资源


    将资源切片以交付给开发者是资源最终化过程中最重要的任务之一。在此过程中，你将逐层切割`PSD`文件，为将存在于应用中的所有元素创建独立的文件。每个元素都必须被切片以创建一个唯一的资源，并保存为一个单独的文件。在这个过程中，注重细节变得至关重要。


    资源最终化过程的另一个关键部分是缩放（请参阅下一节）。如果还记得的话，我们当初将设计尺寸设为`1136 x 640`以适配 iPhone 5、5c 和 5s
    的`Retina`屏幕。如果你的应用旨在支持 iOS 支持的所有不同设备，那么你需要为每种设备提供不同的资源集。这包括 iPhone 4 和 4s。虽然这两款设备拥有`Retina`屏幕，但它们的尺寸与较新设备不同。


    然而，iOS 的一大优点在于，如果你的应用旨在所有这些设备上运行，开发者可以将所有这些资源放入一个应用包中，操作系统会自动引用适当的文件，以在相应设备上显示。用于`Retina`屏幕和设备的资源需要在文件名的根名称后附加`@2x`。稍后我会更详细地讨论命名约定，但这是一个标准做法。


    每个设计师都会有自己喜欢的切片图像的方式，这通常是基于个人偏好。


    在本章中，我将详细说明切片和缩放过程中的每一步。我自己用于导出`Retina`资源的步骤是：


    - 选择图层（所有状态）

    - 转换为智能对象

    - 保存为`PNG-24`

    - 名称后添加`@2x`


    对于非`Retina`资源，步骤如下：


    - 打开`Retina`智能对象

    - 更改分辨率并缩小至一半尺寸

    - 保存为`PNG-24`

    - 名称**不**带`@2x`


    如果下面概述的流程不适合你，请在`Photoshop`中试验，找到适合你工作流程并满足你需求的方法。要切片你的资源：


    1.  打开你将操作的`PSD`文件。

    2.  选择你首先想要切片的资源，然后选中与该资源关联的所有图层，包括所有状态（如开启、关闭等）和效果——如果它恰好是一个动作项（例如按钮）。'
  raw: 'A well-written specifications document will make for an easier transition
    from design and ideation development, and your initial look or alpha version of
    the app will appear and behave more like you expect it to.


    I’ve included an example of a page from a design specification document in [Figure
    8-1](#9781430263647_Ch09.xhtml#Fig1). Some clarifications you might want to make
    in your design specifications document are:


    *   Buttons that have an on and off state and what they are

    *   Titles and colors of all buttons (text and type should be removed from buttons
    before delivering to developer)

    *   Specific fonts, sizes, and colors to use in specific areas


    ![9781430263647_Fig09-01.jpg](images/9781430263647_Fig09-01.jpg)


    [Figure 8-1](#9781430263647_Ch09.xhtml#_Fig1). Example login/signup page from
    our Travel Light Design Specifications document


    The example page show in [Figure 8-1](#9781430263647_Ch09.xhtml#Fig1) is quite
    simple but can easily become more complicated depending on how much detail is
    added and how complicated your app will be. Ideally, your design specifications
    document should provide instructions for every screen of your app. Even though
    they sometimes come in the form of an e-mail, it is a good and well-accepted practice
    to include the design spec document in the package with your assets that you will
    deliver to your designer.


    If you’re developing your own app, it is still a good practice to get into the
    habit of creating such a document. If you ever need to hand off assets, you’ll
    be ready, and your developer will appreciate it. Contrary to popular belief, your
    developers want as many details as possible. It helps to inform the task of building
    the app the way that the creator, client, and ultimately users expect.


    Buttons


    All iOS apps will have buttons. They are the primary way that users will be interacting
    with the application. Anything that is tapped or pressed can be considered a button
    and all buttons have states. The “on” or highlighted state of a button is what
    the user will see when a button is tapped or interacted with. The “off” or normal
    state is the state that a user will usually see a button in before they interact
    with it. A third state is sometimes used, too. That is the inactive state. This
    means that a button might be shown on a screen but in this state, is not available
    to the user. As discussed before, buttons in iOS 7 are borderless but they still
    maintain the properties that most buttons do. This means that unless they are
    system buttons, they will still need their states to be designed and provided
    for development.


    When preparing buttons for export, all of the assets must be the same size with
    the exception of their states. This makes for a more seamless interaction in your
    app. At the very least, your final export of your button(s) should include all
    applicable states, the sizes in pixels of the font and color, and anything else
    that applies to that particular asset. If it appears elsewhere in the application
    but looks (or even behaves) differently, then it is your responsibility to explain
    these differences so that your developer is aware.


    Some buttons can be created programmatically. If you intend for your developer
    to create a button using Xcode, the same rules apply. Your developer will need
    to know the exact size of the button, the label, text or font size, and color
    and exactly how the button is supposed to behave when a user interacts with it.


    After your Design Specification Document is complete, review it with your developer
    to clarify any ambiguities that remain. While your document may contain as many
    details as you can cram into it, sometimes, nothing beats a face-to-face conversation.


    Button Titles


    There are a number of ways for developers to create buttons. They may or may not
    use your provided button asset to create the button that eventually appears in
    your app. This will usually depend on a few things like whether or not a button
    has a gradient or not. This is where a conversation with your developer comes
    in handy. A developer might take a one-pixel section of a graphic and repeat it
    programmatically to create a button. This reduces the overall file size of the
    asset and thus your app bundle.


    It is a best practice to remove titles from button assets before delivering to
    your developer. Unless a font cannot be reproduced programmatically, simply provide
    the graphic(s) and provide detailed instructions in your Design Specifications
    Document as to what title, font, font size, and color should be associated with
    the button.


    Fonts, Sizes, File Names, and Colors


    Your Design Specifications Document should also be a quick reference guide for
    your developer if there are any questions regarding font names, font sizes, and
    colors for your buttons Organize your document in a way that is intuitive for
    you and your developer and make everything easily accessible. A good best practice
    would be to include actual screens of your app with buttons appearing how they
    would in the app with a legend on the page that will provide all pertinent information
    on all elements on that screen:


    *   Asset file name or names (for all states)

    *   Font name

    *   Font size

    *   Hex code or color

    *   Location on the screen

    *   Any specific actions or animations that need to accompany this asset


    Slicing Your Designs into Assets


    Slicing your assets for delivery to your developer is one of the most important
    tasks in the asset finalization process. Here, you are slicing up your PSD layer
    by layer to create individual files of all of the elements that will live within
    your application. Each element must be sliced to create a unique asset that will
    be saved as a separate file. Attention to detail becomes critical in this stage
    of the process.


    A critical part of the asset finalization process is also scaling (see the next
    section). If you remember, we started our design at 1136 x 640 to accommodate
    for Retina screens for the iPhone 5, 5c, and 5s. If your app is meant to run on
    all of the different devices supported by iOS, then you will need to provide different
    sets of assets for each device. This will include the iPhone 4 and 4s. While these
    two devices have Retina screens, their dimensions differ from that of the newer
    devices.


    The great thing about iOS, however, is that if your app is meant to run on all
    of these devices, the developer can include all of these assets in one app bundle,
    and the OS will automatically reference the appropriate file for display on the
    appropriate device. Assets for Retina screens and devices need to have @2x appended
    to the root of the file name. I’ll talk more about naming conventions later, but
    this is a standard.


    Every designer will have his or her favorite way to slice images and this is usually
    based on personal preference.


    In this chapter I speak explicitly about each step in the slicing and scaling
    process. My own personal steps for exporting assets for Retina is:


    *   Select layers (all states)

    *   Convert to Smart Object

    *   Save as PNG-24

    *   Name with @2x


    For non-Retina assets the process is as follows:


    *   Open Retina Smart Object

    *   Change resolution and scale down to half the size

    *   Save as PNG-24

    *   Name WITHOUT @2x


    If the process outlined below does not work for you, then experiment within Photoshop
    to find a way that suits your workflow and accommodates your needs. To slice your
    asset:


    1.  Open up the PSD that you will be working on.

    2.  Choose which asset you want to slice first and then select all of the layers
    associated with that asset, including all of the states (on, off, etc.) and effects,
    if it happens to be an action item such as a button.'
  trans: '

    一份编写良好的设计规格文档将简化从设计与构思开发到应用初始版本或 Alpha 版本的过渡，并且你的应用会看起来、用起来更符合预期。


    我在图 8-1 中附上了一份设计规格文档页面的示例。你可能希望在规格文档中明确以下几点：


    - 具有开启和关闭状态的按钮，以及它们各自的状态

    - 所有按钮的标题和颜色（在交付给开发者之前，应将文本和类型从按钮中移除）

    - 在特定区域使用的具体字体、字号和颜色


    ![9781430263647_Fig09-01.jpg](img/9781430263647_Fig09-01.jpg)


    图 8-1。来自我们 Travel Light 设计规格文档的登录/注册页面示例


    图 8-1 中展示的示例页面相当简单，但根据添加的细节多少以及应用的复杂程度，它很容易变得更复杂。理想情况下，你的设计规格文档应为应用的每个屏幕提供说明。虽然这些说明有时会以电子邮件的形式出现，但在交付给开发者的资源包中包含设计规格文档是一种良好且广为人接受的做法。


    如果你正在开发自己的应用，养成创建此类文档的习惯仍然是一个好方法。如果将来需要移交资源，你会准备充分，并且你的开发者也会对此表示感激。与普遍看法相反，你的开发者希望获得尽可能多的细节。这有助于按照创建者、客户端以及最终用户的期望来构建应用。


    ### 按钮


    所有 iOS 应用都会有按钮。它们是用户与应用交互的主要方式。任何可轻点或按压的元素都可视为按钮，并且所有按钮都有状态。按钮的“开启”或高亮状态是用户在轻点按钮或与之交互时看到的。`"off"`或正常状态是用户在与按钮交互之前通常看到的。有时还会使用第三种状态，即非活跃状态。这意味着按钮可能会显示在屏幕上，但在此状态下，用户无法使用它。如前所述，iOS
    7 中的按钮没有边框，但它们仍然保留了大多数按钮所具有的属性。这意味着，除非它们是系统按钮，否则仍需要为其设计并提供状态。


    在准备导出按钮时，所有资源的尺寸必须相同（状态除外）。这能让应用内的交互更流畅。至少，按钮的最终导出应包含所有适用的状态、字体和颜色的像素尺寸，以及与该特定资源相关的任何其他信息。如果该资源在应用的其他位置出现但看起来（甚至行为上）有所不同，那么你有责任解释这些差异，以便开发人员了解。


    有些按钮可以通过编程方式创建。如果你希望开发者使用`Xcode`创建按钮，同样的规则也适用。开发人员需要知道按钮的确切尺寸、标签、文本或字体大小、颜色，以及用户与之交互时按钮的确切行为。


    完成设计规格文档后，请与开发者一起审阅，以澄清任何未决问题。虽然你的文档可能包含尽可能多的细节，但有时，没有什么比面对面的交流更有效。


    ### 按钮标题


    开发者可以通过多种方式创建按钮。他们可能会也可能不会使用你提供的按钮资源来创建最终出现在应用中的按钮。这通常取决于几个因素，例如按钮是否带有渐变。这正是与开发者沟通能派上用场的地方。开发者可能会取图形中的一个像素，并通过编程方式重复该像素来创建按钮。这可以减少资源的整体文件大小，从而减小应用包的大小。


    最佳实践是在将按钮资源交付给开发者之前，从中移除标题。除非字体无法以编程方式再现，否则只需提供图形，并在你的设计规格文档中提供关于按钮应关联的标题、字体、字号和颜色的详细说明。


    ### 字体、字号、文件名和颜色


    你的设计规格文档还应成为开发者查询按钮字体名称、字号和颜色相关问题的快速参考指南。设计文档时应遵循对你和开发者都直观的方式，并让所有内容易于查阅。一个很好的做法是包含应用的实际屏幕截图，按钮在其中的显示方式应与应用中的一致，并在页面附上图例，提供该屏幕上所有元素的相关信息：


    - 资源文件名（包含所有状态）

    - 字体名称

    - 字号

    - 十六进制颜色码或颜色值

    - 在屏幕上的位置

    - 任何需要与该资源关联的特定动作或动画


    ### 将设计切片为资源


    将资源切片以交付给开发者是资源最终化过程中最重要的任务之一。在此过程中，你将逐层切割`PSD`文件，为将存在于应用中的所有元素创建独立的文件。每个元素都必须被切片以创建一个唯一的资源，并保存为一个单独的文件。在这个过程中，注重细节变得至关重要。


    资源最终化过程的另一个关键部分是缩放（请参阅下一节）。如果还记得的话，我们当初将设计尺寸设为`1136 x 640`以适配 iPhone 5、5c 和 5s
    的`Retina`屏幕。如果你的应用旨在支持 iOS 支持的所有不同设备，那么你需要为每种设备提供不同的资源集。这包括 iPhone 4 和 4s。虽然这两款设备拥有`Retina`屏幕，但它们的尺寸与较新设备不同。


    然而，iOS 的一大优点在于，如果你的应用旨在所有这些设备上运行，开发者可以将所有这些资源放入一个应用包中，操作系统会自动引用适当的文件，以在相应设备上显示。用于`Retina`屏幕和设备的资源需要在文件名的根名称后附加`@2x`。稍后我会更详细地讨论命名约定，但这是一个标准做法。


    每个设计师都会有自己喜欢的切片图像的方式，这通常是基于个人偏好。


    在本章中，我将详细说明切片和缩放过程中的每一步。我自己用于导出`Retina`资源的步骤是：


    - 选择图层（所有状态）

    - 转换为智能对象

    - 保存为`PNG-24`

    - 名称后添加`@2x`


    对于非`Retina`资源，步骤如下：


    - 打开`Retina`智能对象

    - 更改分辨率并缩小至一半尺寸

    - 保存为`PNG-24`

    - 名称**不**带`@2x`


    如果下面概述的流程不适合你，请在`Photoshop`中试验，找到适合你工作流程并满足你需求的方法。要切片你的资源：


    1.  打开你将操作的`PSD`文件。

    2.  选择你首先想要切片的资源，然后选中与该资源关联的所有图层，包括所有状态（如开启、关闭等）和效果——如果它恰好是一个动作项（例如按钮）。

