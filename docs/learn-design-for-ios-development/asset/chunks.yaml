- fmt: 'If, in our opinion, your app stacks up against these apps then, that is great.
    You could truly be onto something! If you believe enough in your app, then go
    for it. While based on the number of apps submitted to the app store each day
    the numbers alone could stack the odds against you. So, it is important to stand
    out in any way that you possibly can. Now that you have an idea that you truly
    believe in, the hard work really begins. Ask yourself the following questions:


    *   What problem am I trying to solve with my application?

    *   Who is the intended audience for my application?

    *   What is the ultimate goal of the application?

    *   Will the app be available for both the iPhone and iPad?


    Once you’ve answered these questions and none of the answers are showstoppers,
    then you’re ready to proceed with your app. This means that your idea is solid,
    you’ve done the basic validation and market research, and you’re ready to move
    onto the next stage of designing your application for iOS.


    ## Summary


    All apps start with an idea. But research is critical to your design, too. Creating
    a statement of what the app does and validating it with others will help you to
    refine your idea so that it becomes more than just an idea. Checking your app
    idea against others in the app store is a great way to see what you’re up against,
    get ideas, and understand what users really want. Going through the necessary
    define and refine process is an important step in the creation of your app and
    will lay the foundation for the subsequent steps. Next, we’ll discuss what you
    will need to understand about Apple’s new operating system, iOS7.


    ## Chapter 2: iOS: What You Need to Know


    `iOS` stands for the iPhone Operating System and is the software upon which all
    of Apple’s mobile devices and tablets are built. This includes the iPhone, all
    versions of the iPad, and even the iPod Touch. `iOS` allows all of the apps to
    run on these devices. `iOS` was released in 2007 with the original iPhone and
    has undergone minor changes up until recently with the announcement and release
    of iOS 7.


    It is an operating system for multi-touch devices. As such, users are meant to
    interact directly with the screen of the device upon which the OS is running.
    This presents some unique opportunities and problems for designers. Therefore,
    it is important to know what elements are standard and have become familiar to
    users over the years when interacting with `iOS`.


    Throughout `iOS`, there are commonly used UI elements that are standard regardless
    of the device and that help users to perform common actions, regardless of which
    app is in use. We will review some of these elements, as they will be useful when
    you design your application.


    In June 2013 at the annual Developer’s Conference in San Francisco, Apple announced
    iOS 7. In this chapter, we will discuss standard UI elements for iOS and how they
    have evolved and changed with iOS 7.


    ### What to Expect in iOS 7


    iOS 7 is important because it represents the most significant change in the operating
    system since its release over six years ago. If you are designing an app from
    scratch, you will need to understand how Apple expects you to conform to its new
    design language; and if you already have designed an app, it will need to be redesigned
    to conform to the new, improved design paradigm set forth in iOS 7.


    While the overall functionality of the toolbars, tab bars, navigation bars, and
    other user interface elements have remained the same, the look and feel of the
    entire operating system has been changed completely.


    As a design-centric company, Apple has always been known for its beautiful, yet
    simple design aesthetic with its software as well as its hardware. That design
    aesthetic has become a part of the company’s legacy. iOS 7 is an extension of
    that design aesthetic. While it does not represent a new design paradigm per se
    (it has borrowed generously in design and has taken hints and clues from some
    of the more popular apps currently on the market), it does represent a completely
    new direction for the operating system and will change the way that designers
    approach the design for their applications moving forward. It is safe to say that
    applications exhibiting pre-iOS 7 standards will look dated when running on the
    new OS.


    #### iOS 7 Guiding Principles


    Jonathan Ive, Apple’s Creative Tsar as he is sometimes called, has always been
    known for allowing form and function to coexist in a beautiful and seamless way
    whether it applies to hardware or software, and iOS 7 is no different. Thus, the
    new interface prides itself on being unobtrusive. Throughout the new updated Human
    Interface Guidelines (HIG), Apple implores designers to allow the design to facilitate
    the content. iOS 7 is an attempt to show by doing. Designers who follow in suit
    will find that their apps look and work seamlessly within the iOS 7 framework.


    The key to designing for iOS 7 is to keep it simple. This has always been mentioned
    in the `HIG`, but with this new design direction, simplicity is front and center.
    Older app designs that worked well for the previous version of the OS will now
    appear heavy and complicated on iOS 7. So, you will have to consider how to adapt
    to this new color palette while keeping content front and center. While previous
    upgrades to iOS were focused on development, there are plenty here, too. Designers
    will be forced to make significant changes in the way that they approach app designs
    moving forward. All apps must now be optimized for retina screens, and icons have
    a new look and feel.


    There are three guiding principles and themes that should guide designs for iOS
    7 apps:


    - **Deference** – Refers to the ability of the user interface to understand and
    interact with the content of your application but not to compete with it. In fact,
    the `HIG` states that the UI should *never* compete with content. This means that
    the elements you choose in your UI must not overwhelm the content or make the
    user have to choose between the two. If there is ever any question, content wins.
    Every time.


    - **Clarity** – Refers to the new requirement that all new designs be legible
    on retina screens. Previously, if your designs were not optimized for retina screens,
    they would appear slightly fuzzy on the newer devices. No more. With iOS 7, Apple
    now requires text and icons to be clear, crisp, and lucid on all devices. That
    also means no more bevels and drop shadows for effect.


    - **Depth** – New attention has been placed on layers, transparency, translucency,
    and motion to create depth in applications. iOS 7 is brimming with beautiful transitions
    and realistic animations that add new responsiveness and depth to the environment.


    If you are adapting an older app for iOS 7, you will need to revisit every page
    to remove the appearance of heavy shadows, bevels, and other features that tend
    to weight designs down. Remember, functionality and content must be front and
    center. iOS 7 will expose your app to your users in a whole new way, so think
    about how you would like to approach a scaled-down look of your app, yet with
    a heightened functionality in an elegant and stylish way. All of these elements
    must balance each other out to work with iOS 7.


    Now, let’s look at a few of the specific changes you can expect with iOS 7. There
    have been many updates from a development standpoint, but for the purposes of
    this book, we will focus mainly on those changes that will affect app design moving
    forward: the springboard, typography, icons, bars, table views, and table view
    elements.


    ### Springboard'
