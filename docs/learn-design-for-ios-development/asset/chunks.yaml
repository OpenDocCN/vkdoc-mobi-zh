  trans: '

    每个应用流程都是用户在使用应用时遵循的路径。你至少应该对应用如何运作有一些初步想法，这将使创建用户流程变得更加容易。上述一些线框图工具也可用于创建用户流程。不过，任何允许你绘制基本形状的工具都可以胜任。启动用户流程最简便的方法就是列出你能想到的、与应用相关的所有主要任务。此处描述要尽可能具体，因为这里正是你的应用开始活起来的地方。你可以将每个步骤写在便利贴上，这样当发现两个步骤之间需要插入额外步骤时，就能方便地移动它们。或者，你也可以在白板上写下每个步骤。用户流程的目的是追踪用户为完成特定任务必须经过的路径。在规划用户流程时，你应该提出并能够回答以下问题：


    *   用户是谁，他/她需要什么？

    *   用户为什么与应用交互？

    *   用户要去哪里？

    *   这项任务的最终目标是什么？

    *   用户的目标是什么？

    *   应用的目的是什么？

    *   是否有特定的商业目标？（例如应用内购买或销售）

    *   任务从哪里开始，又在哪里结束？


    下面，我尝试为我们的“轻装旅行”应用回答上述问题。请注意每个答案都很简洁。在制作线框图的过程中，你的答案也可能会发生变化。


    **你的用户是谁，他/她需要什么？**


    “轻装旅行”的用户是忙碌的旅行者，他们需要确切地知道每次旅行该带什么。


    **为什么用户要与应用交互？**


    用户与“轻装旅行”交互是为了尽量减少随身行李，并确保只带必需品。


    **用户要去哪里？**


    用户将要去创建一个新的清单。


    **这项任务的最终目标是什么？**


    这项任务的最终目标是帮助用户创建一个清单，并将其与特定的旅行关联起来。


    **用户的目标是什么？**


    最终目标是针对给定的旅行创建一个完整的清单。


    **应用的目的是什么？**


    应用的目的是让用户只带所需物品，同时不忘带任何东西。


    **是否有特定的商业目标？（应用内购买或销售）**


    最终，我们会将用户与其他提供低成本旅行解决方案的合作伙伴联系起来。


    **任务从哪里开始，又在哪里结束？**


    主要任务从输入旅行详情（例如出发地和目的地城市及日期）开始。当用户为特定旅行选择了所有物品时，任务结束。


    图 6-4 展示了一个“轻装旅行”应用非常基础的用户流程示例。


    ![9781430263647_Fig06-04.jpg](img/9781430263647_Fig06-04.jpg)


    图 6-4. “轻装旅行”应用的用户流程列出了用户在浏览应用时可能采取的**主要任务**和**路径**


    现在我们已经创建了用户需求列表，可以开始写下与刚刚概述的目标相关联的主要任务了。


    为了从“轻装旅行”应用创建界面，我们的主要任务和子任务列表可能如下所示：


    点击应用图标


    注册与登录页面


    选择并输入用户名（电子邮件地址）


    选择并输入密码


    点击登录按钮


    如果我们概述与输入旅行详情相关的所有步骤，列表可能如下所示：


    旅行信息录入


    输入旅行详情；出发城市、州、机场、日期和时间


    询问是否使用当前位置；如果是，则列出关联机场


    如果否，用户可手动输入


    用户选择出发机场


    用户通过日历弹出窗口输入日期


    用户通过选择器输入时间？


    保存旅行详情 – 用户应能编辑旅行详情


    清单创建与确认

    '
- fmt: '用户创建新的打包清单——该清单与新的行程相关联。


    用户向清单中添加新物品。


    用户还可以从旧清单或热门物品中选择物品。


    如果用户忘记了，应用会根据以前的清单或行程，随着时间的推移推荐物品。


    “设置”面板中的辅助任务可能包括：


    设置


    启用基于位置的服务


    提醒？（徽章、通知中心、声音等）


    上述清单绝非详尽无遗，也并非完整无缺。很可能还有一些步骤缺失。这只是为这个虚构应用创建线框的相关任务的初步尝试。像这样的清单应能为线框的第一次迭代提供信息。


    [图6-5](#9781430263647_Ch06.xhtml#Fig5)中的屏幕展示了一些基本草图，展示了我们虚构应用的“轻装旅行”线框在注册和行程输入部分可能的样子。下面的任务代表了一个新用户在应用中会执行的操作。这些草图是徒手绘制的，没有使用任何模板。尽管草图比较粗糙，但你仍能辨认出用户界面的元素以及每个屏幕的一些关键区域。你可以为自己的应用做同样的事情，或者使用模板。无论采用哪种方式，都必须尝试将你的屏幕和用户界面元素映射到你的任务上。在逐步处理这些屏幕时，差异和缺失的步骤应该会变得明显。一旦发现，你就能将它们补充完整。


    ![9781430263647_Fig06-05.jpg](images/9781430263647_Fig06-05.jpg)


    [图6-5](#9781430263647_Ch06.xhtml#_Fig5)。基本的手绘线框展示了一系列从注册到行程输入的屏幕。


    一旦你对照任务清单审阅了你的草图、便利贴或模板，各种用户路径也会开始显现。对于我们的“轻装旅行”应用，我们已经涵盖了一些每个用户都必须执行的任务，例如注册、添加行程和创建清单。这些被认为是主要任务。然而，在此过程中，也可能出现一些次要任务。这些任务可能并非所有用户都能明显看到或需要，但对于其他用户来说，它们将是流程的一部分。这些任务——无论大小——都将开始揭示你的应用的不同用例。


    定义用例


    当你以用户为中心进行线框设计时，你可能会发现你的用户并非都一模一样，他们在与应用交互时的需求也各不相同。我见过的大多数应用都至少有两个用例。用例有时也被称为用户故事。它们帮助你根据对用户的理解以及他们的需求，为你的应用打造独特的体验。这将决定你如何创建应用的
    UI。


    在围绕特定用例设计线框时，你需要为特定用户定义最直观的用户界面元素。例如，假设我们的“轻装旅行”应用有一位高级用户。这位用户经常旅行，并且已经在应用中保存了多个行程。那么，这位用户的体验与新用户有何不同？基于这个用例，这个用户流程可能会这样进行：


    1.  打开应用

    2.  从之前的行程列表中选择，或者如果未列出则添加新行程

    3.  从另一个行程导入清单

    4.  如有需要编辑清单

    5.  确认


    请注意，这个用例与上述线框中为新用户设定任务的初始用例有很大不同。高级用户或经常使用的用户已经熟悉应用的功能、界面以及如何执行关键任务。因此，在这个流程的线框（[图6-6](#9781430263647_Ch06.xhtml#Fig5)）中，我们会对用户如何与应用交互以及他们在执行特定任务时期望看到什么做出基本假设。


    ![9781430263647_Fig06-06.jpg](images/9781430263647_Fig06-06.jpg)


    图6-6。特定用例的线框


    添加线框细节


    一旦你规划好了模块和用户界面，就可以开始向线框添加更多细节了。在需要的地方为按钮添加标签，为屏幕添加标题，让它们开始变得生动起来。再次思考用户将如何识别UI元素，并将它们与手头的任务联系起来。提出如下问题：


    *   iOS 用户界面中的哪些元素最适合使用？

    *   在选择日期时，日期选择器是否最好？或者提供一个日历让用户能看到完整的月份布局以便更容易选择是否更简单？

    *   时间对你的用户来说是一个考虑因素吗？他们会在多任务处理时使用你的应用吗？

    *   用户最可能在什么地方使用你的应用？

    *   用户在使用你的应用时是否可能处于移动状态或正在行动中？如果是这样，这将如何影响你布置关键 UI 元素（如按钮）的方式？

    *   你的用户更可能是单手还是双手使用你的应用？


    这些问题的答案不仅会影响流程，还会影响应用的布局。这时你开始优化应用的 UI。


    如前所述，线框设计是一个迭代过程。在最终定稿之前，你可能会制作多个版本的线框。然而，每个版本都应让你更接近最终版本，并为实际的设计阶段做好准备。


    分享线框以获取反馈


    如果可以的话，与他人分享你的线框总是一个好主意。就像你为应用写的初始声明一样，线框如果只是闭门造车，不与人分享，就几乎毫无用处。你不能在封闭的环境中设计。将你的线框分享给你的朋友、同事，或者如果可能的话，分享给潜在的用户。


    如果可能，创建一个小的用户群，让他们审阅初期的线框并收集他们的反馈，然后用这些反馈进一步优化线框。如果你能让当初评估应用声明的同一组人也参与进来，并对线框提供反馈，那就最理想了。你将与一个熟悉应用整体概念和功能的团队合作。对于这个受众来说，看到应用随着时间的推移而演变，对你作为设计师来说可能既有帮助又富有洞察力。


    然而，对待用户反馈要谨慎。有时用户反馈可能会与公认的最佳实践相悖。如果收到的部分反馈属于这种情况，在实施之前请认真权衡这些反馈——特别是如果它违背了公认的最佳实践或已知的设计模式。例如，许多旅行应用会向用户展示一个月份日历供其选择旅行日期。如果在焦点小组会议中，一个或多个用户认为有另一种更好的方式，你可能需要权衡这种改变的利弊。原因是，你的核心用户很可能期望在输入日期时看到那个日历。iOS
    的选择器是允许用户选择日期和时间的好方法。但是，如果你替代日历的方案不够用户友好或直观，你可能需要考虑忽略这一特定反馈，并坚持使用已知且普遍使用的方式。


    对于应用线框中的特定动画或隐含动作，你需要向用户展示动画前后的状态，因为线框大多是静态的。如果你采用低保真度方法，那么动画前后的状态以及详细的注释应该足以说明动作。有些用户也未必知道某些转场是什么意思；因此，在征求反馈时，直观地向他们展示是避免让你的焦点小组用户感到困惑的一种方法。


