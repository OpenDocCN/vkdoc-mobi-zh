    itself; or simply tap another icon, and the panel removes itself. The approach
    is simple, yet incredibly effective.


    ![9781430263647_Fig02-16.jpg](images/9781430263647_Fig02-16.jpg)


    [Figure 2-16](#9781430263647_Ch02.xhtml#_Fig16). The translucent bar of the Control
    Center. The Control Center will show the color of the page underneath: in this
    case, the wallpaper


    Designers should reference these subtle clues when designing their apps and when
    deciding how users are meant to interact with the content in their apps, too.
    This iteration of the operating system pushes designers to strip away elements
    that are not absolutely necessary and to focus on elements those users will need
    to interact with your application.


    Using Layers


    Layers are a key component of iOS 7\. Whereas in previous versions the focus was
    on adding effects like bevels and shadows to infer and imply depth, iOS 7 has
    organized everything in layers and used motion sensors to offer users a three-dimensional
    feel while using their device. Thus, as users move, the layers also move and complement
    the users’ views. So, the element currently in use is always on the foremost layer.
    This means that content behind it will shift and recede where necessary to offer
    this illusion of depth and space between all of the elements in front of you.
    Even the act of opening an app shows depth. The older version of the OS offered
    users a quick zoom when opening apps; in iOS 7, the opening screen of the app
    still zooms inward but the background seems to shift back as well, creating a
    feeling of total immersion in the new app.


    Buttons


    The borders that were standard in previous versions of the iOS have mostly been
    removed. This could present an issue because users will now have to relearn spatially
    where the tappable space is around a word. Users have come to expect a border
    around buttons like “Back” and “Cancel.” Because of their familiarity with iOS,
    users will instinctively know what these buttons do (their names also give it
    away). Various versions of iOS 7 had just flat colorful bars where there once
    were buttons. The End Call and Call buttons in the phone app have evolved in recent
    beta versions of iOS 7 from borderless but colorful bars to proper buttons with
    outlines.


    Summary


    With all of the sweeping changes to iOS; a complete overhaul rolling out over
    new devices, the future of design for iOS applications is bright. As a leader
    in design, Apple has established some long-standing design standards and borrowed
    from others. They are now poised to change things again. By setting new standards,
    designers will now be forced to come up with newer and exciting ways to visually
    communicate with users via their apps.


    What remains interesting is where the iOS 7 will push the direction of design.
    Admittedly, the changes that Apple has made to iOS can be traced back to other
    platforms (Android and Windows Phone to name two). But design aficionados have
    always seen Apple as a leader in this field. When designing your app, think about
    not just this new version but where it’s come from and its evolution. Ask yourself
    what the next big step is, and then take it.


    Chapter     3


    iOS 7 and Flat Design


    As you prepare to design your app and as you have begun to familiarize yourself
    with all of the principles of the Human Interface Guidelines and iOS 7, you undoubtedly
    have heard the phrase “Flat Design” bandied about. It is a term being used to
    define Apple’s new direction to the user interface of the operating system. So,
    it’s only fair to define flat design and to explain not only what it is and where
    it comes from, but also how you can use it to create your very own app. As you
    set out to create your app, think about the content and bringing that front and
    center. One thing to remember is that users have now been interacting with multi-touch
    and Apple’s suite of mobile devices for some time now.'
