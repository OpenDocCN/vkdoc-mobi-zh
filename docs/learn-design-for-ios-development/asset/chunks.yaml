- fmt: '# Springboard 模式


    One of the most popular design patterns for navigating within an app is the springboard
    pattern. The springboard is a grid of icons on the home page that visually acclimates
    users to all of the content in your application. It provides a high-level overview
    of all of the content in your app for the user from one page. The springboard
    will be the first page a user sees after he or she loads your app and registers
    or signs in. It familiarizes users with all of the content in the app and provides
    context for them.


    You can consider or use the springboard page as a home page that users will come
    back to time and time again in order to access other areas of your application.
    Thus, the information you choose to include on the springboard is critical. It
    is important to note that the amount of icons you can include on the springboard
    is limited to about nine (depending on layout), so make sure that if you feature
    multiple pages, your users know how to access them.


    Even though we are speaking of iOS specifically, it’s important to note that the
    springboard is considered to be a cross platform approach to navigation as the
    springboard can easily be adapted for many different types of devices and operating
    systems. [Figure 5-2](#9781430263647_Ch05.xhtml#Fig2) shows an example of a simple
    springboard mock-up.


    ![9781430263647_Fig05-02.jpg](images/9781430263647_Fig05-02.jpg)


    [Figure 5-2](#9781430263647_Ch05.xhtml#_Fig2). A simple wireframe of a springboard
    design pattern


    There have been multiple variations on the springboard design pattern – meaning
    that even though the mock-up above shows a grid layout, you are free to customize
    the layout in a way that is consistent with the look and feel of your app.


    Take the opportunity to get creative with the icons in your springboard. Icons
    will provide context for your users, as each icon will visually represent a separate
    functionality within the app. The springboard is an easy way to provide a considerable
    amount of information for users all on one page, and it will be the first time
    that users will be exposed to the visual language of your app.


    Sometimes a springboard may not follow the popular grid layout, and icons may
    be larger or smaller than the standard nine-icon layout. Decide what’s best for
    your user and works best with your app’s style to identify the best springboard
    layout for you. It must be noted as well that the springboard pattern can be viewed
    as somewhat dated as newer, more innovative home screen patterns have emerged
    to show various options from a home screen.


    Many news apps such as CNN and TED feature the front page pattern. It features
    a large panel on top with a list view underneath and is a popular way to display
    news from the home page of an app.


    ## List & Table View Patterns


    Another popular approach to mobile navigation is to put everything in a list menu.
    A list menu is a great option for apps that have lots of categories and content.
    It will appear in a table view. Part of what makes the list menu so perfect for
    mobile apps is that a scrollable list is easy to flick up and down with the thumb
    or two fingers. So, in terms of navigation and usability, the list menu is a winner.
    List menus can feature icons like the springboard menu so that users can visually
    relate to the content in your app as well.


    Within the interface of an iOS mobile device, there are a number of variations
    on the list menu pattern.


    You can enhance and customize lists by changing their colors or by adding images
    and icons. But be careful not to overdo it and disorient users.


    ### Tables


    Tables are a great way to display information in apps that will feature lots of
    data. Many enterprise, productivity, banking, and finance tools will likely need
    to use lots of tables as they will need to list information in a way that is legible
    and easily sorted. There are quite a few different tables that you can use when
    designing your app. If you are showing a significant amount of data and need a
    way to differentiate between them, try changing the colors or adding subtle variances
    between them. This will help your users as they sift through the information being
    presented.


    When designing for iOS, consider a table another name for the table view. This
    element is outlined clearly in the Human Interface Guidelines.


    You can make adjustments to your tables to make the data more palatable for your
    users. Rows and columns can be adjusted for size, and you can consider experimenting
    with the size of the font to segment specific information for your users. For
    instance, consider experimenting with headers and with grouping rows for easier
    navigability.


    You might also consider visual enhancements such as icons to make data in a table
    pop. It’s a good idea not to feature too many different colors in a single table,
    so as with everything, keep your table color scheme consistent with your overall
    branding. However, if your app falls into a specific category, use well-established
    best practices such as green for positive cash flow and red for negative in finance
    or money management apps. Users will be well acquainted with these visuals, and
    this will lend to the overall usability of your app.


    For tables with a significant amount of information, the fixed columns design
    pattern can be helpful. This pattern allows users to freeze a single column on
    the left or right while the other columns remain fluid. Users can then adjust
    at will and sort through information as needed.


    ### Tabs


    You can also add the tab bar navigation to your iOS app if you choose. On iOS
    devices, the tab bar is located on the bottom of the screen and device, but some
    creative designers have managed to put tab bars at the top of the screen as well.
    You are able to customize the tab bar in iOS apps but refer to the Human Interface
    Guidelines for specifics. For instance, only five buttons are allowed in the tab
    bar of the iPhone iPod. More are possible; they just won’t be shown. iOS will
    automatically add a `More` button where users will be able to access the others.
    From a usability standpoint, tab bars are easy to access by users using their
    thumbs while holding smaller devices such as phones.


    Each button in a tab bar can reference a completely different view that relates
    to various types of information in your app. The convenience factor of the tab
    bar navigation makes it easy for users to be able to switch back and forth between
    them all quite easily and with very little effort. By adding a tab bar, a user
    will be able to have a high-level view of all of the various categories of your
    application from one page.


    Each button in the tab bar usually features an icon and a label like the wireframe
    in [Figure 5-3](#9781430263647_Ch05.xhtml#Fig3) shows. Icons are a great way to
    convey information; but because the icons in the tab bar will be close in proximity,
    it is a good idea to make sure that they are visually consistent for your users.
    If one button is drawn or illustrated in a particular style, then make sure that
    all of the others follow suit as well. Your users will expect it.


    ![9781430263647_Fig05-03.jpg](images/9781430263647_Fig05-03.jpg)


    [Figure 5-3](#9781430263647_Ch05.xhtml#_Fig3). Tab bars in iOS'
