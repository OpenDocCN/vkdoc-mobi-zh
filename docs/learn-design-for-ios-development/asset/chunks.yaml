  trans: '

    ## 在 iOS 7 中，按钮与表单设计的演变


    在 iOS 7 中，虽然按钮保持了扁平外观，但其视觉效果已做了微妙的改进以提升可用性。请注意 图 3-2 和 图 3-3 中两个不同版本 iOS 7 的“电话”应用界面的变化：


    ![9781430263647_Fig03-02.jpg](img/9781430263647_Fig03-02.jpg)


    图 3-2. iOS 7 测试版 4。该版本的呼叫按钮延伸至屏幕边缘


    ![9781430263647_Fig03-03.jpg](img/9781430263647_Fig03-03.jpg)


    图 3-3. iOS 7 测试版 7。该版本的呼叫按钮采用了圆角设计


    尽管两种按钮处理方式都遵循了扁平设计原则，但测试版 4 的老版本并未提供任何轮廓或分界线来标示按钮的边界。而新方法则绘制了实际的按钮轮廓并添加了圆角。我见过使用这两种方法且效果出色的应用。但请记住，诸如此类的细微变化，可以为用户带来天壤之别的体验。


    # 简化表单


    另一个常被遗忘、且随扁平设计一同演进的 UI 元素是表单。移动应用中的表单常用于注册和登录。虽然用户通常只需登录一次，但过去的表单往往使用内阴影来表现深度和空间感。然而，现今的搜索字段已不再采用这类增强效果。在设计登录和注册字段的表单时，请保持窗口简洁，避免使用任何特效。通常，一条细边框线就能解决问题，但也可以尝试使用不同深浅的灰色或纯白色作为表单背景。图
    3-4 展示了 iTunes Store 的输入表单。请注意用户密码输入框的简洁设计。


    ![9781430263647_Fig03-04.jpg](img/9781430263647_Fig03-04.jpg)


    图 3-4. iOS 7 中的弹窗、通知和表单焕然一新


    # 确定字体排印


    扁平设计中最重要的元素之一莫过于将在应用中使用的字体排印。由于扁平设计聚焦于字体排印，你需要找到一种能唤起你想要应用传达的整体感受和信息的字体。因为扁平设计简约而极简，你的字体也应如此，因此为你的应用最多选择两种字体系列。确保这些字体能互相补充。如果存在冲突，在整个应用中使用一种字体，并通过不同字重来传达不同含义也是可以的。线条和笔画清晰的字体在扁平设计风格中通常效果更好。为此，在移动应用和
    Web 应用中使用扁平设计技术的设计师们，对无衬线字体情有独钟。我在图 3-5 中列出了一些流行的无衬线字体。


    ![9781430263647_Fig03-05.jpg](img/9781430263647_Fig03-05.jpg)


    图 3-5. 无衬线字体在扁平设计中很常见


    字体的颜色和字重也很重要，因此请考虑选择一种拥有多种字重的字体，以便能在整个应用中使用。你可能想为按钮和图标选择一种特定的字重，为行为召唤元素使用另一种，而正文文本则可能使用更轻的字重。


    # 评估可用性


    界面中的某些元素经历了细微的变化。虽然用户界面元素仍保持扁平外观，但这些元素已为可用性进行了精细调整。毫无疑问：可用性是从扁平设计转型的重要原因。设计界对于扁平设计究竟有多用户友好一直存在争议。一些批评者认为，尽管扁平设计美观且性能优越，但它有时会让用户感到困惑。诚然，剥离那些让按钮看起来像真正按钮的元素和效果，*确实可能*使用户感到些许迷茫。iOS
    7 在移除这些元素方面做得相当彻底。以标签栏中细微分隔线的移除为例。现在，屏幕底部的这些元素，过去是清晰分隔的，如今却仿佛悬浮在空中。（请参见上文中的图 4-6
    和图 4-7。）这正是设计师需要运用自身判断力，从可用性角度理解何谓合理之处。这些元素如何被解读，取决于你和你的用户。因此，如果你真心认为一个小小的阴影能帮助用户更好地与应用中的某个元素互动，那么请一定在扁平设计与拟物主义之间找到平衡，并添加那个阴影。没有必要过度使用。扁平设计讲究“少即是多”，你会发现，在一个原本可能因扁平设计而显得过度的应用中，添加微妙的拟物化暗示，反而能为用户找到完美的平衡点。


    扁平设计之所以具有挑战性，是因为它本质上移除了所有帮助用户将屏幕上的内容与真实世界中的事物联系起来的元素。那些我们用来将虚拟世界翻译成物理世界的隐喻，正随着扁平设计而被移除。因此，原本是按钮的东西，现在只是背景上的一个扁平方块。我们作为设计师为影射光线和阴影等现实世界属性而创建的视觉线索已经被去除了。那么，还剩下什么？你的内容和用户。问题随之而来：我们如何还能向那些生活在三维世界却在一个二维结构内交互的用户提供这些线索？如果你选择全心拥抱完全的扁平设计方法来开发应用，那么当你思考用户将如何在你的应用内操作时，就必须考虑到这些现实情况。


    Apple 允许通过其他方式融合这个新的二维世界，例如添加视差效果和使用透明度等三维效果。这些功能，作为操作系统的核心原则之一，是设计师可用的工具库的一部分，用以增强其应用的整体体验和可用性。这些效果有助于为用户提供视觉线索。


    # 总结


    在考虑应用的整体用户体验时，你必须进行战略性思考。因此，你关于设计方法以及需要深入探讨多远的每一个决策，都变成了战略性的决策。作为设计师，你的任务是在用户所见与其所感之间找到微妙的平衡。所有这一切都包含在你通过设计在应用中创造的世界里。扁平设计能帮助你实现这一目标吗？到了这一步，你应用的目的和你试图触及的受众应该已经非常清晰。毫无疑问，你将不得不在应用中使用扁平设计技术；问题只在于使用多少。


    # 第 4 章：了解 iPhone 和 iPad 用户界面设计考量

    '
- fmt: '# Designing for the iPhone and iPad


    Designing for the iPhone and iPad requires a clear understanding of the user interface
    of both devices. There are similarities across both, and there are clear guidelines
    and documentation to follow these guidelines to ensure that your application adheres
    to the standards set forth by Apple. Within that however, there is still plenty
    of room to be creative and unique with your design. While Apple might seem strict
    in its enforcement of its design guidelines and rules, there is always room to
    experiment and they encourage it with designs, especially ones that show a clear
    understanding of the underlying precepts upon which iOS was built.


    We addressed the standard UI elements in the previous chapter, so now we will
    move into how to familiarize yourself with the user interface of the devices.
    A great way to start to become familiar with the UI is to download one of the
    freely available GUI kits available for iOS. GUI kits are available for the iPhone
    and iPad and most of them are free. Teehan & Lax creates a PSD GUI kit for iOS
    6 and 7 as does Applidium.


    Once you download the GUI in the format of your choice, you will be able to explore
    the various elements in more detail. Import the file into the graphic software
    of your choice; this way you can begin to interact with them. Most of them have
    been created by designers and design shops with the intention of helping the design
    community so you don’t have to reinvent the wheel when starting to design your
    app.


    Once you have your GUI open, take a close look at how they appear compared to
    the actual device. Most elements will have a selection of bars (status, header,
    tab, etc.) as well as buttons, action sheets ([Figure 4-1](#9781430263647_Ch04.xhtml#Fig1)),
    keyboards, and icons. You should be able to view them or even to remove them from
    the GUI if you need to inspect them more closely.


    ![9781430263647_Fig04-01.jpg](images/9781430263647_Fig04-01.jpg)


    [Figure 4-1](#9781430263647_Ch04.xhtml#_Fig1). An action sheet from the stock
    iOS7 Mail app


    **Note:** An action sheet is a menu in iOS that displays a set of choices for
    the user. The choices are usually related to a task initiated by the user. An
    action sheet from the Mail app is shown in [Figure 4-1](#9781430263647_Ch04.xhtml#Fig1).


    Get to know each user interface element and begin to think about how each element
    will be used in your app.


    - Which bars will you use?

    - Will you need to create a custom icon for a status bar in your menu?

    - Will your app have a unique color scheme?

    - How will you lay out critical information for your users?

    - How does each element help the user on his or her journey throughout the app?


    Take the time you need to become familiar with the UI; after that, then you can
    begin to think about how to customize the experience for your users. You don’t
    have to use all of the elements as they appear. You are allowed a fair amount
    of flexibility and creativity with the UI for your app. But first, it’s important
    to understand the basics before you step outside. This is the purpose of this
    chapter.


    ## Use of Gestures in the UI


    The iOS interface is optimized for a unique multi-touch experience. As such, elements
    on screen respond to touch, or gestures, and not clicks. It is important, therefore,
    to always remember that users must feel as though they are engaging directly with
    content. Your design must engage users with an immersive experience within your
    app. What elements will allow them to do that? Users interact with iOS by using
    specific gestures. These gestures have become commonplace not just within iOS
    but with other multi-touch platforms and operating systems as well; however, some
    of them were coined by Apple.


    When discussing gestures for iOS, two important concepts to consider are the aforementioned
    consistency and direct manipulation.


    ### Consistency of Gestures


    When considering user interface elements and appropriate gestures for your app,
    consistency is key. Use gestures that result in actions that are consistent with
    the established best practices and user expectations. If a user swipes left and
    expects a panel or content to move in that direction and it moves right instead,
    you are creating a significant disconnect between the user and the interface.
    A user then has to spend time understanding which gestures mean what in your app,
    and this provides a disorienting experience, especially outside of your app when
    they are interacting with stock iOS apps or other apps that follow established
    rules.


    If your app’s interface elements are not consistent with iOS standards or use
    system-wide controls, views, and icons incorrectly or differently, you should
    consider changing them. Not doing so may result in your app being rejected from
    the app store.


    ### Direct Manipulation of Gestures


    Direct manipulation is a concept of gesture control that refers to interacting
    with an object on a screen as though it were a real object. Thus, tapping a button
    is like pressing a button in real life. And pulling a lever is akin to pulling
    a real lever or slider. iOS is based on this principle of gesture control. And
    it gives users the perception of actually manipulating their controls. These direct
    manipulation controls proliferate throughout iOS and should now be familiar to
    users. Actions such as “Slide to unlock” from the home screen and “pull to refresh,”
    which can be seen from the Mail app, are now popular in other apps. Users will
    intuitively perform these actions without instruction and in many cases will expect
    them in your application. The reason why these types of gestures are popular with
    users is because there is a direct and immediate relationship between the action
    and the result. Users will feel as though they are carrying out the action in
    real life. Designers and developers should use these gestures in their apps where
    it is obvious that users will be expecting them. Not using them can frustrate
    your user base.


    ### Abstract Gestures and Feedback


    Abstract commands and gestures are gestures that offer the user very little or
    no relation between the action and what is shown on the screen. Because these
    are not immediately intuitive to the user, these gestures will require some level
    of memorization for your users. If you must use an abstract gesture, make sure
    that you’ve tested with a target group to ensure that you are not alienating your
    audience by introducing gestures that aren’t familiar to them. Users will need
    to memorize the new abstract gestures you introduce with your app and learn to
    associate them with a specific action if they are to successfully navigate and
    interact with your application.


    iOS does a good job of staying away from abstract gestures altogether, but there
    are some apps that while not abstract per se, do require a user to memorize new
    gestures for new actions even though there is a direct relation to what is shown
    on the screen. The popular e-mail app Mailbox is one such app. Users who have
    used the stock Mail app will find that they will need to learn new gestures for
    various actions. For example, in Mailbox, swiping right lets a user archive a
    message, but a long swipe to the right will put a message into the trash folder.
    Swiping left will let a user snooze a message for later, whereas a long swipe
    left will add the message to a number of lists. The app uses colorful indicators
    as visual feedback to let users know what action he or she is taking, but the
    gestures will take some getting used to—especially if a user has been using the
    standard Mail app. Luckily, the app makers include a helpful tutorial that is
    easily accessible from the Help section of the app. A view of the Mailbox app
    and iOS’s Mail app are shown in [Figure 4-2](#9781430263647_Ch04.xhtml#Fig2).


    ![9781430263647_Fig04-02.jpg](images/9781430263647_Fig04-02.jpg)'
