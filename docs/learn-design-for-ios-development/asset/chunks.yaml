  raw: 'User creates new packing list – new list is associated with new trip


    User adds new items to list


    User may also select items from older lists or popular items


    App suggests items over time if user has forgotten, based on previous lists/trips


    Ancillary tasks in the Settings panel might be:


    Settings


    Enable location-based services


    Alerts? (Badges, notification center, sounds, etc.)


    The previous list is by no means exhaustive, nor is it complete. There may very
    well be some steps missing. It is simply a first stab at the tasks associated
    with creating wireframes for this fictional application. A list such as this is
    what should inform the first iteration of wireframes.


    The screens in [Figure 6-5](#9781430263647_Ch06.xhtml#Fig5) show some basic sketches
    of how our Travel Light wireframes might look for the registration and trip entry
    portion of our fictional application. The tasks below represent tasks that a new
    user would perfom in the app. It was created freehand and without using any stencils.
    Even though it is in rough shape, you will be able to make out the elements of
    the user interface and some of the critical sections for each screen. You can
    do the same for your app, or use a stencil. Either way, you must try to map your
    screens and user interface elements to your tasks. As you work through the screens,
    gaps and missing steps should become apparent. When they do, you will be able
    to fill them in.


    ![9781430263647_Fig06-05.jpg](images/9781430263647_Fig06-05.jpg)


    [Figure 6-5](#9781430263647_Ch06.xhtml#_Fig5). Basic hand-drawn wireframes show
    a series of screens from Registration through Trip Entry


    Once you’ve reviewed your sketches, Post-its, or stencils against your task list,
    various user paths will also begin to emerge. For our Travel Light app, we’ve
    covered some of the tasks that every user has to perform such as register and
    add trips, and create lists. These are considered primary tasks. Along the way,
    however, there will be some secondary tasks that may arise as well. These are
    tasks that may or may not be apparent or necessary for all users but will need
    to be a part of the flow for others. These tasks—major and minor—will start to
    reveal different use cases for your app.


    Define Use Cases


    As you move through the wireframing process with your user at the center of the
    work, you may find that your users are not all the same and do not have the same
    needs as they interact with your app. Most apps I have seen have at least two
    use cases. Use cases are also sometimes called user stories. They help you to
    craft a unique experience for your application based on who you understand that
    user to be and what their needs are. This will frame how you create the UI of
    your app.


    When wireframing around specific use cases, you will need to define those user
    interface elements that are most intuitive for that particular user. Say, for
    instance, that we have a power user for our Travel Light app. This user travels
    often and has already saved multiple trips in the app. How then, would this user’s
    experience differ from a new user? Based on that use case, this user flow might
    progress this way:


    1.  Open app

    2.  Select from list of previous trips or add new trip if not already listed

    3.  Import list from another trip

    4.  Edit list if needed

    5.  Confirm


    Note that this use case is much different from the initial use case that laid
    out the tasks for a new user in the wireframes above. A power or recurring user
    will already be familiar with the functionality of the application, its interface,
    and how to perform critical tasks. So, in the wireframes for this flow ([Figure
    6-6](#9781430263647_Ch06.xhtml#Fig5)), we will make basic assumptions about how
    this user will interact with the app and what he or she will expect to see when
    performing specific tasks.


    ![9781430263647_Fig06-06.jpg](images/9781430263647_Fig06-06.jpg)


    Figure 6-6\. Wireframes for a specific use case


    Add*Wireframe Details*


    Once you have mapped out your blocks and user interface, you can begin to add
    more details to your wireframes. Label buttons if you need to and add title headers
    to screens so that they begin to come to life. Think again, about how users will
    be able to recognize the UI elements, and associate them with the tasks at hand.
    Ask questions like the following:


    *   What elements of iOS’s user interface would be best to use?

    *   When selecting dates, would a date picker be best? Or would it be easier to
    present a calendar that will allow users to see the month laid out before them
    for easier selection?

    *   Is time a consideration for your users? Will they be using your app while
    multitasking?

    *   Where are users most likely to be using your app?

    *   Are users likely to be on the go or in motion while using your app? If so,
    how will that affect how you arrange critical UI elements like buttons?

    *   Will your user more like to be using your app with one hand, or two?


    The answers to these questions will affect not only the flow, but also the layout
    of your application. This is where you begin to refine the UI of your app.


    As mentioned before, wireframing is an iterative process. You will likely do multiple
    versions of your wires before they are final. However, each version should bring
    you closer to your final one and prepare you for the actual design phase.


    Share Wireframes for Feedback


    If you can, it is always a good idea to share your wireframes with others, too.
    Much like your initial statement for your app, wireframes are pretty much useless
    unless they are shared. You can’t design in a box. Share your wireframes with
    either your friends or colleagues, or, if at all possible, with potential users.


    If you can, create a small user base and get them to review the early wires and
    collect their feedback, using it to refine the wires further. If you are able
    to get the same group who evaluated the app statement to also weigh in and provide
    feedback on the wireframes, that would be ideal. You will be working with a group
    that is familiar with the overall concept of the app and its functionality. For
    this audience, seeing the app evolve over time can be helpful and insightful for
    you as the designer.


    Be careful with user feedback, however. There can be times when user feedback
    flies in the face of accepted best practices. If this is the case with some of
    the feedback you receive, weigh this feedback seriously before implementing –
    especially if it goes counter to accepted best practices or known design patterns.
    For example, many travel apps present a user with a monthly calendar for selecting
    dates for travel. If, during focus group, a user or users decided that another
    way would be better, you might want to weigh the pros and cons of such a decision.
    The reason being is that your core users may very well expect to see that calendar
    when they try to enter dates. The picker for iOS is a great way to allow users
    to select dates and time. But, If your alternative to the calendar isn’t user
    friendly or intuitive, you may want to disregard this specific feedback and stick
    with what’s known and used universally.


    For specific animations or implied movement in your app’s wireframes, you will
    need to show users the pre- and post-animation state since wireframes are mostly
    static. If you’re going low fidelity, then pre- and post-animation states *as
    well as* detailed annotations should be fine to illustrate movement. Some users
    won’t know what certain transitions mean either; so showing them visually is one
    way to avoid confusing users in your focus group when soliciting feedback.


