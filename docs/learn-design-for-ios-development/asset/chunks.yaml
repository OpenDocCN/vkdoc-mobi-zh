- fmt: 'The next page we’ll focus on will be the “Select Trip” and “Edit Trips” pages.
    This is the page that will allow users who have already entered their trips to
    select them from a list view in the app. From a user experience standpoint, the
    assumption here is that a user has already entered the details for his or her
    frequent trips into the app. So, the next screen he or she will logically see
    would be a screen that shows a list of his or her trips. From that screen, a user
    should be able to drill down to see the details of each trip or to edit his or
    her list of trips. We will create both pages.


    Starting with a blank canvas, fill the screen with the background color much like
    we did for the sign-in/registration screen. The sign-in page we created in [Figures
    7-5](#9781430263647_Ch07.xhtml#Fig5) and [7-6](#9781430263647_Ch07.xhtml#Fig6)
    are actually missing the status bar, so we will add it to this screen and all
    subsequent screens. iOS 7 allows you to customize the status bar, so it’s possible
    to make it transparent so that the color of the nav bar will show through. Subsequent
    pages will have the status bar as users will want to see the status, and it is
    a usability best practice to keep it visible except in rare cases. Since this
    is a productivity app, I’ve decided to keep the status bar visible once the user
    has moved past the registration page.


    You will note that the My Trips page is a simple page with a map on top and a
    list of trips below for the user to choose from.


    I created this page by grabbing a few elements from Applidium’s iOS 7 template
    in PSD format. The template has lots of the new UI elements featured in iOS 7
    and it is possible to simply grab a layer from the template PSD and add it to
    the current work. For the designs in [Figure 7-8](#9781430263647_Ch07.xhtml#Fig8),
    I imported the compose button on the My Trips page and the controls to the left
    of each trip on the Edit Trips page. To do this, select the layer and right click
    to reveal additional options. Then, select `merge layers` and choose the name
    of the current file you are working on to add the set of layer to your current
    canvas. Merging the layers will make them uneditable once imported. So unless
    you are planning to use a set of layers or a layer in the form it appears with
    no editing, it’s a good idea to select the group of layers and import them without
    merging.


    ![9781430263647_Fig07-08.jpg](images/9781430263647_Fig07-08.jpg)


    [Figure 7-8](#9781430263647_Ch07.xhtml#_Fig8). Trip list and Edit Trips screens


    Once your layer is imported, you should be able to work with it in your current
    document. If you’ve converted it to a smart object, this should be easy as you
    can now resize to suit your design.


    **Note**  A smart object is a file that has data from a raster or vector image
    in it. It allows users to edit the file while saving its source content.


    I imported the map image from a general google search and this is just for illustration
    only. The arrows to the right of each item in the table view were imported directly
    from the template. Selecting any item in the trips menu will take the user to
    the detailed view of that page. I’ve created a page for the Miami to New York
    trip to show how this would look. As this page is visually not too different from
    the previous parent page, I used the previous page as a template for the following
    pages in [Figure 7-9](#9781430263647_Ch07.xhtml#Fig9) and changed the menu items.
    Much like the My Trips page, the “Edit” button in the upper right corner of the
    screen will bring up the deletion controls in each cell of the table view. These
    items will be added programmatically but I added them into the designs for your
    reference in the Edit Trip Items screen. Hitting the cancel button will take the
    user back to the Main Miami to New York Trip page. The controls to the left of
    each menu item were imported from the Applidium iOS 7 PSD.


    ![9781430263647_Fig07-09.jpg](images/9781430263647_Fig07-09.jpg)


    [Figure 7-9](#9781430263647_Ch07.xhtml#_Fig9). Item list and Item edit screens


    ## Using Layer Comps for Screen Layouts


    Layer comps are a great tool to use to lay out your various versions of the screens
    for your iPhone app. Layer comps allow you to save the visibility, position, and
    appearance of a design once you complete it. They are a great tool for designers
    because they removes the need to remember all of the different styles that you
    apply to a specific design or save each one as a separate PSD file with multiple
    layers. As you may or may not know, PSD files with multiple layers can get pretty
    large. It is also a feature that you will find handy if you are creating multiple
    variations on a design or screen and need to present them to a client for review.
    A layer comp is pretty easy to create.


    1. From the `Windows` menu at the top of the canvas in Photoshop, scroll down
    and choose the `Layer Comps` option. It will open up the layer comps window.

    2. From that window, select the new layer icon at the bottom of the window. The
    screenshot in [Figure 7-9](#9781430263647_Ch07.xhtml#Fig9) shows a window with
    our design, the layer comp window as well as the pointer hovering over the “New
    Layer comp” icon.

    3. After each variation on the design has been completed, click the `new layer
    comp` icon. It will open a pop-up window that will allow you to enter a name for
    the comp.

    4. You will also have the option of saving the visibility, position or appearance
    (layer style) of the design. Check any or all that apply and add any comments
    or notes that you need and click `OK`. You’ve saved your layer comp.


    Any additional changes can be saved as a layer comp in the exact same way.


    When you’ve finalized which styles of layers work for you and you are ready for
    development, layer comps can be easily exported to the file format of your choice
    for review or each comp can be exported as a separate PSD if that is a requirement.
    This can be done by choosing `File`![arrow.jpg](images/arrow.jpg)`Scripts`![arrow.jpg](images/arrow.jpg)`Layer
    Comps to Files` as shown in [Figure 7-10](#9781430263647_Ch07.xhtml#Fig10).


    ![9781430263647_Fig07-10.jpg](images/9781430263647_Fig07-10.jpg)


    [Figure 7-10](#9781430263647_Ch07.xhtml#_Fig10). Creating a layer comp


    ### What about Adobe Fireworks?


    There are some in the design community who might be asked the above question right
    now. Some designers are passionate supporters and fans of Adobe Fireworks, another
    graphics software tool that is a part of Adobe’s Creative Suite. Recently, however
    (May 2013 to be exact), Adobe announced that it will not be adding new features
    to Fireworks. While it will continue to include Fireworks in Adobe Creative Suite
    6, and Creative Cloud as well as sell it, they will no longer be devoting engineering
    time or talent in making improvements or additional upgrades to the software.
    Adobe, will, however, continue to support the software. That being said, Fireworks
    is a worthy, yet simpler alternative to Photoshop for creating your designs for
    your iOS app. Fireworks is structured in a similar way to Photoshop and the user
    interface is similar. As you can see in the screenshot below, if you’re familiar
    with the Photoshop Interface, then Fireworks will be strikingly familiar. The
    screenshots below is a Photoshop PSD of our Travel Light app’s screen details
    page in Fireworks. One of the great things about Fireworks is that is reads and
    writes PSD files as well as other graphic formats.


    Adobe Fireworks has a great reputation as an awesome tool for prototyping and
    exporting. So, if you’ve created your design in Photoshop and need to slice and
    export them as PNGs then Fireworks will assist with that nicely and be sure that
    your exports will be ready for use in Xcode.'
  raw: 'The next page we’ll focus on will be the “Select Trip” and “Edit Trips” pages.
    This is the page that will allow users who have already entered their trips to
    select them from a list view in the app. From a user experience standpoint, the
    assumption here is that a user has already entered the details for his or her
    frequent trips into the app. So, the next screen he or she will logically see
    would be a screen that shows a list of his or her trips. From that screen, a user
    should be able to drill down to see the details of each trip or to edit his or
    her list of trips. We will create both pages.


    Starting with a blank canvas, fill the screen with the background color much like
    we did for the sign-in/registration screen. The sign-in page we created in [Figures
    7-5](#9781430263647_Ch07.xhtml#Fig5) and [7-6](#9781430263647_Ch07.xhtml#Fig6)
    are actually missing the status bar, so we will add it to this screen and all
    subsequent screens. iOS 7 allows you to customize the status bar, so it’s possible
    to make it transparent so that the color of the nav bar will show through. Subsequent
    pages will have the status bar as users will want to see the status, and it is
    a usability best practice to keep it visible except in rare cases. Since this
    is a productivity app, I’ve decided to keep the status bar visible once the user
    has moved past the registration page.


    You will note that the My Trips page is a simple page with a map on top and a
    list of trips below for the user to choose from.


    I created this page by grabbing a few elements from Applidium’s iOS 7 template
    in PSD format. The template has lots of the new UI elements featured in iOS 7
    and it is possible to simply grab a layer from the template PSD and add it to
    the current work. For the designs in [Figure 7-8](#9781430263647_Ch07.xhtml#Fig8),
    I imported the compose button on the My Trips page and the controls to the left
    of each trip on the Edit Trips page. To do this, select the layer and right click
    to reveal additional options. Then, select merge layers and choose the name of
    the current file you are working on to add the set of layer to your current canvas.
    Merging the layers will make them uneditable once imported. So unless you are
    planning to use a set of layers or a layer in the form it appears with no editing,
    it’s a good idea to select the group of layers and import them without merging.


    ![9781430263647_Fig07-08.jpg](images/9781430263647_Fig07-08.jpg)


    [Figure 7-8](#9781430263647_Ch07.xhtml#_Fig8). Trip list and Edit Trips screens


    Once your layer is imported, you should be able to work with it in your current
    document. If you’ve converted it to a smart object, this should be easy as you
    can now resize to suit your design.


    **Note**  A smart object is a file that has data from a raster or vector image
    in it. It allows users to edit the file while saving its source content.


    I imported the map image from a general google search and this is just for illustration
    only. The arrows to the right of each item in the table view were imported directly
    from the template. Selecting any item in the trips menu will take the user to
    the detailed view of that page. I’ve created a page for the Miami to New York
    trip to show how this would look. As this page is visually not too different from
    the previous parent page, I used the previous page as a template for the following
    pages in [Figure 7-9](#9781430263647_Ch07.xhtml#Fig9) and changed the menu items.
    Much like the My Trips page, the “Edit” button in the upper right corner of the
    screen will bring up the deletion controls in each cell of the table view. These
    items will be added programmatically but I added them into the designs for your
    reference in the Edit Trip Items screen. Hitting the cancel button will take the
    user back to the Main Miami to New York Trip page. The controls to the left of
    each menu item were imported from the Applidium iOS 7 PSD.


    ![9781430263647_Fig07-09.jpg](images/9781430263647_Fig07-09.jpg)


    [Figure 7-9](#9781430263647_Ch07.xhtml#_Fig9). Item list and Item edit screens


    Using Layer Comps for Screen Layouts


    Layer comps are a great tool to use to lay out your various versions of the screens
    for your iPhone app. Layer comps allow you to save the visibility, position, and
    appearance of a design once you complete it. They are a great tool for designers
    because they removes the need to remember all of the different styles that you
    apply to a specific design or save each one as aseparate PSD file with multiple
    layers. As you may or may not know, PSD files with multiple layers can get pretty
    large. It is also a feature that you will find handy if you are creating multiple
    variations on a design or screen and need to present them to a client for review.
    A layer comp is pretty easy to create.


    1.  From the Windows menu at the top of the canvas in Photoshop, scroll down and
    choose the Layer Comps option. It will open up the layer comps window.

    2.  From that window, select the new layer icon at the bottom of the window. The
    screenshot in [Figure 7-9](#9781430263647_Ch07.xhtml#Fig9) shows a window with
    our design, the layer comp window as well as the pointer hovering over the “New
    Layer comp” icon.

    3.  After each variation on the design has been completed, click the new layer
    comp icon. It will open a pop-up window that will allow you to enter a name for
    the comp.

    4.  You will also have the option of saving the visibility, position or appearance
    (layer style) of the design. Check any or all that apply and add any comments
    or notes that you need and click OK. You’ve saved your layer comp.


    Any additional changes can be saved as a layer comp in the exact same way.


    When you’ve finalized which styles of layers work for you and you are ready for
    development, layer comps can be easily exported to the file format of your choice
    for review or each comp can be exported as a separate PSD if that is a requirement.
    This can be done by choosing File![arrow.jpg](images/arrow.jpg)Scripts![arrow.jpg](images/arrow.jpg)Layer
    Comps to Files as shown in [Figure 7-10](#9781430263647_Ch07.xhtml#Fig10).


    ![9781430263647_Fig07-10.jpg](images/9781430263647_Fig07-10.jpg)


    [Figure 7-10](#9781430263647_Ch07.xhtml#_Fig10). Creating a layer comp


    What about Adobe Fireworks?


    There are some in the design community who might be asked the above question right
    now. Some designers are passionate supporters and fans of Adobe Fireworks, another
    graphics software tool that is a part of Adobe’s Creative Suite. Recently, however
    (May 2013 to be exact), Adobe announced that it will not be adding new featuresto
    Fireworks. While it will continue to include Fireworks in Adobe Creative Suite
    6, and Creative Cloud as well as sell it, they will no longer be devoting engineering
    time or talent in making improvements or additional upgrades to the software.
    Adobe, will, however, continue to support the software. That being said, Fireworks
    is a worthy, yet simpler alternative to Photoshop for creating your designs for
    your iOS app. Fireworks is structured in a similar way to Photoshop and the user
    interface is similar. As you can see in the screenshot below, if you’re familiar
    with the Photoshop Interface, then Fireworks will be strikingly familiar. The
    screenshots below is a Photoshop PSD of our Travel Light app’s screen details
    page in Fireworks. One of the great things about Fireworks is that is reads and
    writes PSD files as well as other graphic formats.


    Adobe Fireworks has a great reputation as an awesome tool for prototyping and
    exporting. So, if you’ve created your design in Photoshop and need to slice and
    export them as PNGs then Fireworks will assist with that nicely and be sure that
    your exports will be ready for use in Xcode.'
  trans: '

    我们接下来要聚焦的页面是“选择行程”和“编辑行程”页面。这些页面允许已录入行程的用户从应用的列表视图中选择相应行程。从用户体验角度来看，这里的前提是用户已将自己的常用行程详情录入应用。因此，用户接下来合乎逻辑看到的屏幕，应该是一个显示其行程列表的界面。在这个界面上，用户应能深入查看每个行程的详情，或编辑行程列表。我们将创建这两个页面。


    从空白画布开始，像我们之前制作登录/注册界面那样，用背景色填充屏幕。我们在图 7-5 和图 7-6 中创建的登录页面实际上缺少状态栏，因此我们将在此屏幕及后续所有屏幕中添加它。iOS
    7 允许您自定义状态栏，因此可以将其设置为透明，从而让导航栏的颜色透出来。后续页面将保留状态栏，因为用户希望看到状态，并且保持状态栏可见（除非极少数情况）是最佳可用性实践。由于这是一款效率应用，我决定在用户通过注册页面后，保持状态栏可见。


    您会注意到，“我的行程”页面是一个简洁的页面，顶部是地图，下方是供用户选择的行程列表。


    我是通过从 Applidium 的 PSD 格式 iOS 7 模板中提取一些元素来创建这个页面的。该模板包含许多 iOS 7 中的新 UI 元素，可以简单地从模板
    PSD 中提取一个图层并添加到当前工作中。对于图 7-8 中的设计，我导入了“我的行程”页面上的撰写按钮，以及“编辑行程”页面中每个行程左侧的控件。具体操作是，选择该图层并右键单击以显示更多选项。然后，选择`合并图层`，并选择当前正在处理的文件名称，将图层组添加到当前画布中。合并图层会使它们在导入后无法编辑。因此，除非您打算按原样使用一组图层或一个图层而不做任何编辑，否则最好选择图层组并在不合并的情况下导入。


    ![9781430263647_Fig07-08.jpg](img/9781430263647_Fig07-08.jpg)


    图 7-8. 行程列表与编辑行程界面


    图层导入后，您应该就能在当前文档中对其进行操作了。如果您已将其转换为智能对象，操作会变得非常简便，因为现在您可以调整其大小以适应设计需求。


    **注意** 智能对象是一种包含来自位图或矢量图像数据的文件。它允许用户编辑文件，同时保留其源内容。


    我从一次普通的谷歌搜索中导入了地图图像，此图仅供说明之用。表格视图中每个项目右侧的箭头均直接来自模板。在行程菜单中选择任何项目，都会将用户带到该页面的详细视图。我为“迈阿密到纽约”的行程创建了一个页面，以展示其效果。由于此页面与上一级父页面在视觉上差异不大，我将上一页面作为模板用于图
    7-9 中的后续页面，并更改了菜单项。与“我的行程”页面类似，屏幕右上角的“编辑”按钮会调出表格视图中每个单元格的删除控件。这些项目将通过编程方式添加，但我已在“编辑行程项”界面中将其加入设计，供您参考。点击“取消”按钮将使用户返回到“迈阿密到纽约”主行程页面。每个菜单项左侧的控件均来自
    Applidium 的 iOS 7 PSD。


    ![9781430263647_Fig07-09.jpg](img/9781430263647_Fig07-09.jpg)


    图 7-9. 项目列表与项目编辑界面


    ## 使用图层复合进行屏幕布局


    图层复合是一个极佳的工具，可用于布置 iPhone 应用屏幕的各种版本。图层复合允许您在完成设计后，保存图层的可见性、位置和外观。这对设计师来说是一个很棒的工具，因为它省去了记住应用于特定设计的所有不同样式的麻烦，也无需将每种样式另存为包含多个图层的独立
    PSD 文件。您可能知道，包含多个图层的 PSD 文件会变得相当大。如果您正在为某个设计或屏幕创建多个变体，并需要呈现给客户进行审核，那么这是一个非常实用的功能。创建图层复合相当简单。


    1. 在 Photoshop 中，从画布顶部的`窗口`菜单向下滚动，选择`图层复合`选项。这将打开图层复合窗口。

    2. 在该窗口中，选择窗口底部的新建图层图标。图 7-9 中的截图显示了一个包含我们设计的窗口，以及图层复合窗口，还有悬停在“新建图层复合”图标上的指针。

    3. 在完成设计的每个变体后，点击`新建图层复合`图标。这将弹出一个窗口，允许您为复合输入名称。

    4. 您还可以选择保存设计的可见性、位置或外观（图层样式）。勾选所有适用的选项，添加任何必要的注释或说明，然后点击`确定`。这样您就保存了图层复合。


    任何额外的更改都可以以完全相同的方式保存为图层复合。


    当您最终确定哪些图层样式适用，并准备好进行开发时，图层复合可以轻松导出为您选择的文件格式以供审阅，或者如果需求如此，每个复合也可以导出为独立的 PSD。此操作可通过选择`文件`![arrow.jpg](img/arrow.jpg)`脚本`![arrow.jpg](img/arrow.jpg)`将图层复合导出到文件`来完成，如图
    7-10 所示。


    ![9781430263647_Fig07-10.jpg](img/9781430263647_Fig07-10.jpg)


    图 7-10. 创建图层复合


    ### Adobe Fireworks 怎么样？


    设计界可能有人现在会提出上述问题。一些设计师是 Adobe Fireworks 的热烈支持者和粉丝，这是 Adobe Creative Suite 中的另一款图形软件工具。然而，最近（确切地说是
    2013 年 5 月），Adobe 宣布将不再为 Fireworks 添加新功能。虽然它将继续在 Adobe Creative Suite 6 和 Creative
    Cloud 中包含 Fireworks 并进行销售，但将不再投入工程时间或人才对该软件进行改进或额外升级。不过，Adobe 仍将继续支持该软件。话虽如此，对于为
    iOS 应用创建设计而言，Fireworks 是一个值得推荐、比 Photoshop 更简单的替代方案。Fireworks 的结构与 Photoshop 类似，用户界面也很相似。正如下面的截图所示，如果您熟悉
    Photoshop 界面，那么 Fireworks 会让您感觉异常熟悉。下面的截图是我们在 Fireworks 中打开的 Travel Light 应用屏幕详情页面的
    Photoshop PSD。Fireworks 的一大优点是它能够读取和写入 PSD 文件以及其他图形格式。


    Adobe Fireworks 作为原型设计和导出的出色工具而享有盛誉。因此，如果您在 Photoshop 中完成了设计，需要切图并将其导出为 PNG，那么
    Fireworks 将很好地辅助您完成此操作，并确保导出的文件可直接在 Xcode 中使用。

    '
- fmt: '使用 Adobe Fireworks 的另一个优势是，您创建的任何对象都是矢量格式。当您需要以任何理由缩放资源时（并且您需要为旧版 iPhone 进行缩小），这将大有帮助。您会发现这也适用于效果和滤镜。随着扁平化设计减少了对一些复杂效果的使用，这可能不是一个特别重要的问题，但如果您需要使用它们，这将派上用场，并且在
    Fireworks 中能更好地使用并轻松缩放。


    如果我们将 [图 7-11](#9781430263647_Ch07.xhtml#Fig11) 中的 `PSD` 导入到 Fireworks，我们可以像在
    Photoshop 中一样继续编辑它。在我看来，Fireworks 的界面稍微简单一些，也更用户友好一些。因此，您可以在 Fireworks 中完成设计，也可以在任一程序中创建整个设计并获得类似的结果。


    ![9781430263647_Fig07-11.jpg](images/9781430263647_Fig07-11.jpg)


    [图 7-11](#9781430263647_Ch07.xhtml#_Fig11). Adobe Fireworks 中的 Trip List PSD


    通过本章概述的技术，您应该能够为 iOS 创建一个简单的设计。您暂时不会成为一名资深的 iPhone 设计师，但只要稍加练习并运用我上面使用的流程，您应该能够创建应用中的大部分页面。


    ### Summary


    Adobe Photoshop 是当今数字设计的事实标准。可以说，这个图形程序是所有应用设计的根基。为了设计应用，您需要学习如何使用 Photoshop。它较少被使用的表亲
    Adobe Fireworks 也能胜任工作，但 Adobe 将不再对其提供支持。如果您希望被认真对待为一名设计师，您需要熟练掌握 Photoshop。Photoshop
    和 Fireworks 都是设计应用的好工具。如果您觉得其中一个更易用，您的 `PSD` 文件也可以在这两个程序中通用。两者都来自 Adobe，并拥有各种工具来简化设计过程。探索
    `Tools` 面板将帮助您熟悉创建应用界面所需的工具。另一个您需要关注的界面是 `Layers` 面板。请务必以直观的方式命名图层，因为您的设计很可能会产生大量图层。如果您要创建多个屏幕或应用的不同版本来展示给客户，`Layer
    comps` 将非常有用。


    ## Chapter 8\. 创建应用图标和 App Store 所需的其他图形


    到目前为止，您已经基本完成了应用设计的整个流程，并将其交给开发人员进行开发。虽然您可以将应用图标与其他开发资源一起添加到程序包中，但应用图标是您可以独立关注的事情。作为一项规则，您的应用应具备一定程度的精致度。


    虽然我们之前讨论过与应用中其他区域（例如标签栏和界面）相关的图标，但我创建本章的目的是专门讨论图标以及最终需要交付给 Apple 的应用包中包含的其他图形。正如我们所知，Apple
    非常重视美学设计。可以说，您的应用不仅应遵守《人机界面指南》中规定的界面标准，还应该美观。对应用设计施加的严格准则是存在原因的。这些准则也延伸到了应用图标的设计，而应用图标是用户在
    App Store 中发现您应用的主要方式。它在 App Store 的多个不同位置被使用。在本章中，我将讨论 iOS 应用所需的其他图形。这些包括宣传图、应用图标、截图以及应用在
    App Store 中的页面。如果您的应用是杂志类应用，这还包括报摊图标。这些用于向潜在客户展示您的应用。一个精心设计的图标和精心挑选的截图，可能意味着潜在客户会下载您的应用还是忽略它。


    ### 应用发现


    应用发现过程非常简单。用户有几种方式可以了解到您的应用。如果您足够幸运获得媒体报道，他或她可能会在一篇文章中了解到您的应用，或者通过 `148Apps`、`Appolicious`
    或 `AppCraver` 等众多应用评测网站。这些网站追踪新版本发布，并对几乎所有可用类别的应用提供深入评测。如果您希望在基于特定标准下载前了解某个应用的信息，这些网站会很有帮助。这些网站很受欢迎，并且通常拥有忠实的追随者。它们也很棒，因为它们能提供有关降价的信息。


    > **提示**：开发者有时会针对付费应用提供特殊促销活动，并在一段时间内降低购买价格。这些促销活动被称为“降价”，可能在没有预警的情况下开始和结束。


    虽然评测网站和文章是了解新应用的好方法，但也许最久经考验的发现应用方式之一，就是浏览 Apple 自己的 App Store。


    ### App Store


    App Store 不仅仅是一个商店。它实际上是 iOS 应用的数字分发平台。虽然“App Store”这个术语现在也适用于 Mac App Store，但基于本书的目的，我们将专注于
    iOS App Store。App Store 为所有 iOS 设备分发应用，是用户购买和下载 iOS 应用的主要渠道。


    App Store 应用已预装在每台 iOS 设备上。该应用将用户直接连接到商店，并方便他们购买应用。它还与 `iTunes Connect` 以及用户的
    `iTunes` 账户相连。


    > **提示**：`iTunes Connect` 是面向 iOS 开发者的一个 Web 门户。它允许他们管理其应用的不同版本、报告以及与其应用关联的所有元数据。


    如您所知，用户必须拥有 `iTunes` 账户才能在其设备上购买应用。`iTunes` 和您的 `Apple ID` 将允许您访问 `iTunes Connect`，并将您的应用提交给
    Apple 以供审核，然后分发到 App Store。用户将能够通过 App Store 应用将您的应用直接下载到他们的设备上。App Store 应用已包含在每台
    iOS 设备上，并通过其独特的图标识别，该图标以“A”字形排列着画笔、铅笔和尺子。更新后的扁平化图标如 [图 8-1](#9781430263647_Ch08.xhtml#Fig1)
    所示。


    ![9781430263647_Fig08-01.jpg](images/9781430263647_Fig08-01.jpg)


    [图 8-1](#9781430263647_Ch08.xhtml#_Fig1). iOS 7 中 App Store 图标的新外观'
  raw: 'Another advantage of using Adobe Fireworks is that any object you create is
    in vector format. That will help greatly when you will need to scale your assets
    down or up for any reason (and you will need to scale down for older versions
    of the iPhone). You will find that this applies to effects and filters, too. This
    may not be such a huge issue as flat design has done away with some heavy usage
    of effects, but it will come in handy if you need to use them and if so, they
    are better uses and will scale easily in Fireworks.


    If we import our PSD from [Figure 7-11](#9781430263647_Ch07.xhtml#Fig11) into
    Fireworks, we can continue to edit it much as we would in Photoshop. The interface
    for Fireworks is slightly less complicated in my humble opinion, and it’s a little
    more user friendly. So, you can either complete your designs in Fireworks or create
    your entre design in either program and get similar results.


    ![9781430263647_Fig07-11.jpg](images/9781430263647_Fig07-11.jpg)


    [Figure 7-11](#9781430263647_Ch07.xhtml#_Fig11). Trip List PSD in Adobe Fireworks


    With the techniques outlined in this chapter, you should be able to create a simple
    design for iOS. You won’t be a seasons iPhone designer, but with a bit of practice
    and just using the processes I used above, you should be able to create most of
    the pages in the app.


    Summary


    Adobe Photoshop is the de facto standard for digital design today. Arguably, this
    graphics program is at the root of every app design. In order to design apps,
    you will need to learn how to use Photoshop. Its lesser-used cousin, Adobe Fireworks
    works, too but will no longer be supported by Adobe. If you’re going to be taken
    seriously as s designer, you will need to become fluent in Photoshop. Both Photoshop
    and Fireworks are great tools for designing your app. Your PSDs can work in both
    programs, too, if you decide that one is easier to use. Both are by Adobe and
    feature various tools to make the design process easier. Exploring the Tools panel
    will help you to familiarize yourself with the tools you need to create the interface
    of your app. The other panel that you will need to pay attention to is the Layers
    panel. Be sure to name your layers in an intuitive way because it is likely that
    your design will generate numerous layers. Layer comps are useful if you are creating
    multiple screens or different versions of your app to show your client.


    Chapter     8


    Creating Your App Icon and Additional Graphics for the App Store


    By this time, you’ve almost completed the entire process of designing your application
    and have handed it off to your developer for development. While you can add the
    app icon to the bundle with your other assets for development, the app icon is
    something that you can focus on independently. As a rule, your app should have
    some level of polish to it.


    Though we’ve discussed icons before as they relate to other areas in your app
    such as the tab bar and UI, I’ve created this chapter to focus exclusively on
    icons and the other graphics that need to be included in your app bundle that
    you will eventually deliver to Apple. As we are aware, Apple places a high premium
    on aesthetic design. It is fair to say that your apps should not only adhere to
    the UI standards set forth in the Human Interface Guidelines, but they should
    also be beautiful. The strict guidelines placed on app design are there for a
    reason. Those guidelines extend to the design of your app’s icon as well, and
    the app’s icon is the main way that users will discover your app in the app store.
    It is used in a number of different locations in the app store. In this chapter,
    I’ll talk about the other graphics that are required for your iOS app. These include
    promotional artwork, your app icons, screenshots, and your app’s page in the app
    store. If your app is a magazine app, then this will include the newsstand icon
    as well. These are used to showcase your app to potential customers. A well-designed
    icon and well-chosen screenshots for your app can mean the difference between
    a potential customer downloading your app and passing it by.


    App Discovery


    The app discovery process is quite simple. A user has a few ways of finding out
    about your app. He or she may read about your app in an article if you are lucky
    enough to get press coverage, or in one of the many app review sites like 148Apps,
    Appolicious, or AppCraver. These sites keep track of new releases and offer in-depth
    reviews of apps in virtually every category available. The sites are helpful if
    you want to find out information on an app before downloading, based on certain
    criteria. These sites are popular and often have loyal followings. They are also
    great because they provide information on price drops.


    **Tip**  Developers will sometimes offer special promotions on paid apps and lower
    the price of purchase for a period of time. These promotions are called price
    drops and can begin and end without warning.


    While review sites and articles are great for finding out about new apps, perhaps
    one of the most tried and true ways of discovering apps is simply by browsing
    Apple’s own app store.


    The App Store


    The app store is more than just a store. It is actually a digital distribution
    platform for the iOS apps. While the term “app store” can now also be applied
    to the Mac app store as well, for the purposes of this book, we will focus on
    the iOS app store. The app store distributes apps for all iOS devices and is the
    primary outlet for users to purchase and download iOS applications.


    The app store app is included and preinstalled on every iOS device. The app connects
    users directly to the store and facilitates their purchases of apps. It is also
    connected to iTunes Connect and a user’s iTunes account.


    **Tip**  iTunes Connect is a web portal for iOS  developers. It allows them to
    manage different versions of their apps, reports, and all metadata associated
    with their apps.


    As you know, a user must have an iTunes account in order to purchase apps on his
    or her device. iTunes and your Apple ID will allow you to access iTunes Connect
    and submit your app to Apple for review and then distribution in the app store.
    Users will be able to download your app directly to their devices via the app
    store app. The app store’s app is included on every iOS device and is recognizable
    via its unique icon, which features a paintbrush, pencil, and ruler arranged in
    an “A” formation. The newly revised flat logo is shown in [Figure 8-1](#9781430263647_Ch08.xhtml#Fig1).


    ![9781430263647_Fig08-01.jpg](images/9781430263647_Fig08-01.jpg)


    [Figure 8-1](#9781430263647_Ch08.xhtml#_Fig1). The app store icon’s new look for
    iOS 7'
  trans: '

    使用 Adobe Fireworks 的另一个优势是，您创建的任何对象都是矢量格式。当您需要以任何理由缩放资源时（并且您需要为旧版 iPhone 进行缩小），这将大有帮助。您会发现这也适用于效果和滤镜。随着扁平化设计减少了对一些复杂效果的使用，这可能不是一个特别重要的问题，但如果您需要使用它们，这将派上用场，并且在
    Fireworks 中能更好地使用并轻松缩放。


    如果我们将 图 7-11 中的 `PSD` 导入到 Fireworks，我们可以像在 Photoshop 中一样继续编辑它。在我看来，Fireworks 的界面稍微简单一些，也更用户友好一些。因此，您可以在
    Fireworks 中完成设计，也可以在任一程序中创建整个设计并获得类似的结果。


    ![9781430263647_Fig07-11.jpg](img/9781430263647_Fig07-11.jpg)


    图 7-11. Adobe Fireworks 中的 Trip List PSD


    通过本章概述的技术，您应该能够为 iOS 创建一个简单的设计。您暂时不会成为一名资深的 iPhone 设计师，但只要稍加练习并运用我上面使用的流程，您应该能够创建应用中的大部分页面。


    ### 总结


    Adobe Photoshop 是当今数字设计的事实标准。可以说，这个图形程序是所有应用设计的根基。为了设计应用，您需要学习如何使用 Photoshop。它较少被使用的表亲
    Adobe Fireworks 也能胜任工作，但 Adobe 将不再对其提供支持。如果您希望被认真对待为一名设计师，您需要熟练掌握 Photoshop。Photoshop
    和 Fireworks 都是设计应用的好工具。如果您觉得其中一个更易用，您的 `PSD` 文件也可以在这两个程序中通用。两者都来自 Adobe，并拥有各种工具来简化设计过程。探索
    `Tools` 面板将帮助您熟悉创建应用界面所需的工具。另一个您需要关注的界面是 `Layers` 面板。请务必以直观的方式命名图层，因为您的设计很可能会产生大量图层。如果您要创建多个屏幕或应用的不同版本来展示给客户，`Layer
    comps` 将非常有用。


    ## 第 8 章. 创建应用图标和 App Store 所需的其他图形


    到目前为止，您已经基本完成了应用设计的整个流程，并将其交给开发人员进行开发。虽然您可以将应用图标与其他开发资源一起添加到程序包中，但应用图标是您可以独立关注的事情。作为一项规则，您的应用应具备一定程度的精致度。


    虽然我们之前讨论过与应用中其他区域（例如标签栏和界面）相关的图标，但我创建本章的目的是专门讨论图标以及最终需要交付给 Apple 的应用包中包含的其他图形。正如我们所知，Apple
    非常重视美学设计。可以说，您的应用不仅应遵守《人机界面指南》中规定的界面标准，还应该美观。对应用设计施加的严格准则是存在原因的。这些准则也延伸到了应用图标的设计，而应用图标是用户在
    App Store 中发现您应用的主要方式。它在 App Store 的多个不同位置被使用。在本章中，我将讨论 iOS 应用所需的其他图形。这些包括宣传图、应用图标、截图以及应用在
    App Store 中的页面。如果您的应用是杂志类应用，这还包括报摊图标。这些用于向潜在客户展示您的应用。一个精心设计的图标和精心挑选的截图，可能意味着潜在客户会下载您的应用还是忽略它。


    ### 应用发现


    应用发现过程非常简单。用户有几种方式可以了解到您的应用。如果您足够幸运获得媒体报道，他或她可能会在一篇文章中了解到您的应用，或者通过 `148Apps`、`Appolicious`
    或 `AppCraver` 等众多应用评测网站。这些网站追踪新版本发布，并对几乎所有可用类别的应用提供深入评测。如果您希望在基于特定标准下载前了解某个应用的信息，这些网站会很有帮助。这些网站很受欢迎，并且通常拥有忠实的追随者。它们也很棒，因为它们能提供有关降价的信息。


    > **提示**：开发者有时会针对付费应用提供特殊促销活动，并在一段时间内降低购买价格。这些促销活动被称为“降价”，可能在没有预警的情况下开始和结束。


    虽然评测网站和文章是了解新应用的好方法，但也许最久经考验的发现应用方式之一，就是浏览 Apple 自己的 App Store。


    ### App Store


    App Store 不仅仅是一个商店。它实际上是 iOS 应用的数字分发平台。虽然“App Store”这个术语现在也适用于 Mac App Store，但基于本书的目的，我们将专注于
    iOS App Store。App Store 为所有 iOS 设备分发应用，是用户购买和下载 iOS 应用的主要渠道。


    App Store 应用已预装在每台 iOS 设备上。该应用将用户直接连接到商店，并方便他们购买应用。它还与 `iTunes Connect` 以及用户的
    `iTunes` 账户相连。


    > **提示**：`iTunes Connect` 是面向 iOS 开发者的一个 Web 门户。它允许他们管理其应用的不同版本、报告以及与其应用关联的所有元数据。


    如您所知，用户必须拥有 `iTunes` 账户才能在其设备上购买应用。`iTunes` 和您的 `Apple ID` 将允许您访问 `iTunes Connect`，并将您的应用提交给
    Apple 以供审核，然后分发到 App Store。用户将能够通过 App Store 应用将您的应用直接下载到他们的设备上。App Store 应用已包含在每台
    iOS 设备上，并通过其独特的图标识别，该图标以“A”字形排列着画笔、铅笔和尺子。更新后的扁平化图标如 图 8-1 所示。


    ![9781430263647_Fig08-01.jpg](img/9781430263647_Fig08-01.jpg)


    图 8-1. iOS 7 中 App Store 图标的新外观

    '
- fmt: 'App Store 已经处理了 500 亿次应用下载，并拥有 5.75 亿个商店账户。要对所有这些应用进行排序需要花费一些时间。随着商店中应用数量的增加，Apple
    多年来一直在对 App Store 的导航便捷性进行细微改进。例如，增加了“编辑推荐”等类别，更突出地展示“精选”应用，将应用“合集”分组，甚至可以在 App
    Store 中找到万圣节或圣诞节等节日主题的应用。最近，一个专门为`iOS 7`设计的应用类别被添加进来。自其发布以来，这个应用选集一直在 App Store
    中突出显示。


    所有已提交并通过 Apple 审核的应用都会出现在 App Store 中。


    要将您的应用提交到 App Store，您需要以下素材：


    *   App 图标

    *   启动图像

    *   报刊亭封面图标（如果应用属于该类别）

    *   屏幕截图

    *   宣传图


    App 图标、启动图像和报刊亭封面图标都包含在应用包中。应用包是由 Xcode 创建的一个包，其中包含您的应用可执行文件以及所有支持资源，包括 App 图标、图像文件等内容。


    ## App 图标


    App 图标是用户首先看到的，将代表您的应用。它会在设备的主屏幕以及 App Store 中代表您的应用。App 图标是必需的，提交的应用如果没有它将被拒绝。虽然《人机界面指南》中提到的一些图标和图稿是可选的，但
    App 图标不是。


    如果您正在创建一个要提交到 App Store 的新应用，那么您应参考《人机界面指南》，以了解所有设备的 App 图标、Spotlight 搜索结果图标和“设置”图标的最新尺寸和要求。


    您可能会认为，由于尺寸限制，App 图标几乎没有发挥原创性或创造力的空间。那您就错了。有专门展示精美设计 App 图标的网站和图库，像 Dribbble 和
    Behance 这样的网站上，来自各个领域的设计师和创意人员会发布 App 图标的概念图和真实设计方案。学习并回顾一些设计，以为您的应用图标寻找灵感。除了尺寸要求外，您的
    App 图标必须有助于向潜在用户直观地传达您的应用是关于什么的，同时尽可能包含诸如品牌等额外信息。就像您的应用一样，您对颜色的选择也会影响用户。因此，必须明智地选择颜色。您的
    App 图标必须是独特的，因为它必须在众多争夺潜在用户注意力的应用中脱颖而出。您可以深入查看 App Store 中专门为`iOS 7`设计的应用部分，并仔细研究其中的一些图标。其中一些可能会在设计您的
    App 图标时给您带来灵感。


    Apple 为设计 App 图标提供了许多指导原则。以下是直接摘自《人机界面指南》的注意事项。


    **应该：**


    *   如果可能，寻求专业平面设计师的帮助

    *   确保您的用户能轻松识别图像

    *   保持简洁，避免使用文字

    *   在多种不同背景上测试

    *   避免透明

    *   确保它在所有尺寸下都能良好缩放且清晰易读


    **不应：**


    *   使用 iOS 或 Apple 元素

    *   使用任何 Apple 图像


    与`iOS 6`相比，`iOS 7`中 App 图标的新形状差别细微。肉眼可能注意到也可能注意不到图标圆角半径的差异。说实话，对于设计师来说，这没什么大不了的，因为
    iOS 会自动添加一个遮罩来为 App 图标应用圆角效果。然而，关于`iOS 7` App 图标的新设计一直有很多猜测。人们编写了数学公式，也对其新图标背后的含义进行了大量猜测。在这个关头，对任何设计师来说最重要的是确保图标向用户传达了它需要传达的信息。App
    图标还必须能在多种不同背景以及所要求的各种尺寸下都呈现最佳效果。


    ## 启动图像


    启动图像是当您的应用启动时 iOS 显示的图像。您必须在应用包中至少包含一个启动图像。用户在实际开始与您的应用交互之前，只能短暂地看到启动图像。可以这样理解：如果您的应用启动很快，启动图像会在设备屏幕上一闪而过，然后直接将用户带入您的应用。如果您的应用加载时间较长，那么用户看到它的时间也会更长。如果您这样想，就能为您的应用构思出更好的启动图像。如果您是用户，在进入应用之前您想看到什么？Apple
    还建议在启动图像上避免任何形式的欢迎词、介绍或关于页面。


    有些设计师甚至让他们的启动图像与应用初始页面完全相同。这给人以应用已快速加载的印象，是一些设计师和开发者也会采用的做法。


    Apple 在《人机界面指南》中建议制作一个与应用初始页面相同但无文字或 UI 元素的启动屏幕。这样，当您的应用实际加载时，启动图像和您的应用之间就不会有突兀的视觉过渡。


    最后，所有启动图像都必须包含状态栏区域。启动图像尺寸建议列于[表 8-1](#9781430263647_Ch08.xhtml#Tab1)中。


    [表 8-1](#9781430263647_Ch08.xhtml#_Tab1)。所有设备的启动图像尺寸


    | 设备 | 尺寸 |

    | :--- | :--- |

    | 适用于 iPhone 5 系列（iPhone 和 iPod touch） | 640 x 1136 px |

    | 适用于 iPhone 和 iPod touch | 640 x 960 px |

    |  | 320 x 480 px（标准分辨率） |

    | iPad 竖屏 | 1536 x 2048 px |

    |  | 768 x 1024 px（标准分辨率） |

    | iPad 横屏 | 2048 x 1536 px |

    |  | 1024 x 768 px（标准分辨率） |


    ## 报刊亭封面图标


    如果您的应用属于报刊亭类别，则其图标有特定的规则。您的图标将与其他杂志和刊物一起显示在报刊亭应用中。由于这些应用的显示方式，Apple 为这些图标制定了不同的规则。您的报刊亭封面图标与
    App 图标是分开的，因此请务必不要混淆两者。报刊亭封面图标应为您实际杂志或期刊某一期封面的复制品。它用于在报刊亭应用中标识您的应用，而您的 App 图标通常用于在
    App Store 中标识应用。保持报刊亭图标具有通用性，不要太具体，但请记住，您绝对希望用户看到封面就能识别出您的杂志。因此，保持字体和布局与杂志普通读者的预期一致，但省略任何季节性或者特定于某一期的细节。[图
    8-2](#9781430263647_Ch08.xhtml#Fig2) 展示了 App 图标和报刊亭图标的外观，以及它们之间的区别。


    ![9781430263647_Fig08-02.jpg](images/9781430263647_Fig08-02.jpg)


    [图 8-2](#9781430263647_Ch08.xhtml#_Fig2)。App Store 上的报刊亭部分以及 iPhone 上的一个应用


    请参考《人机界面指南》以获取具体说明，因为需要遵守特定的尺寸和宽高比要求。'
  raw: 'The app store is responsible for 50 billion app downloads and 575 million
    store accounts. Sorting through all of them can take up some time. As the number
    of apps in the store increased, Apple has made subtle improvements to the app
    store’s navigability over the years. Categories like Editor’s Choice have been
    added, Featured apps are displayed more prominently, Collections of apps have
    been grouped together, and it is even possible to find holiday-themed apps like
    those for Halloween or Christmas in the app store. Most recently, a category of
    apps have been added specifically designed for iOS 7\. Since its release, this
    selection of apps has been prominently displayed in the app store.


    All apps that have been submitted and approved by Apple for distribution will
    appear in the app store.


    To submit your app to the app store, you will need the following assets:


    *   App icon

    *   Launch image

    *   Newsstand cover icon (if app falls in that category)

    *   Screenshots

    *   Promotional artwork


    The app icon, launch images, and newsstand cover icons are included in the app
    bundle, which is a package created by Xcode that includes your app executable
    and all supporting resources including app icons, image files, and content.


    The App Icon


    The app icon is the first thing users will see that will be representative of
    your application. It will represent your app on a device’s home screen as well
    as in the app store. The app icon is required, and apps submitted without it will
    be rejected. While some of the icons and artwork mentioned in the Human Interface
    Guidelines are optional, the app icon is not.


    If you’re creating a new app to submit to the app store, then you should refer
    to the Human Interface Guidelines for the latest dimensions and requirements for
    app icons for all devices as well as Spotlight search results and Settings icon.


    You may think that because of their size, app icons offer little room for originality
    or creativity. You would be wrong. There are entire sites and galleries dedicated
    to beautifully designed app icons and sites like Dribbble and Behance where designers
    and creative from all fields post-concept and real-life designs for app icons.
    Study and review some designs for inspiration for your app’s icons. Aside from
    the dimensions, your app’s icon must help to visually convey to potential users
    exactly what your app is about while encompassing additional bits of information
    like branding where possible. Your choice of colors, as with your application,
    will speak to users, too. So, they must be chosen wisely. Your app icon must be
    unique in that it must stand out among a sea of other apps vying for potential
    users’ attention. You can drill down to the section of the app store that features
    apps specifically designed for iOS 7 and look closely at some of those icons.
    Some of them may be able to inspire you in the design of your app icon.


    There are a number of guidelines that Apple provides for designing app icons.
    Here are the Do’s and Don’ts directly from the Human Interface Guidelines.


    Do:


    *   If possible, get help from a professional graphic designer

    *   Make sure your user easily recognizes images

    *   Keep it simple and devoid of words

    *   Test it against a variety of backgrounds

    *   Avoid transparency

    *   Make sure it scales well and is legible at all sizes


    Don’t:


    *   Use iOS or Apple elements

    *   Use any Apple imagery at all


    The new shape of the app icon in iOS 7 compared to that of iOS 6 is subtle. To
    the naked eye, one may or may not notice the difference in the corner radius of
    the icon. And honestly, for designers, this isn’t a huge deal as iOS will add
    a mask that applies the rounded effect to app icons automatically. However, there
    has been much speculation about the new design of the iOS 7 app icon. Mathematical
    formulas have been written, and there has been much speculation on the meaning
    behind the new icon. What’s most important at this juncture for any designer is
    making sure that the icon is conveying the message that it needs to for users.
    The app icon must also look its best on a number of different back grounds and
    at the various different sizes that are required.


    Launch Images


    The launch image is an image that iOS displays when your app starts up. You will
    have to include at least one launch image in your app bundle. Users of your app
    will only see the launch image briefly before they actually begin to interact
    with your app. Think of it this way: if your app launches quickly, the launch
    image will flash on the device’s screen and then take the user directly into your
    app. If your app takes longer to load, then users will see it for longer. If you
    think of it that way, then you will be able to conceive of a better launch image
    for your app. If you were a user, what would you want to see before you enter
    the app? Apple also recommends staying away from any sort of welcome verbiage
    or introduction, or an about page on the launch image.


    Some designers have even made their launch image identical to the initial page
    of their application. This gives the appearance that the app has loaded quickly
    and is a practice that some designers and developers use as well.


    Apple, in the Human Interface Guidelines, recommends making a launch screen that
    is identical to the initial page of an application without text or UI elements.
    This way, when your app actually loads there is no jarring visual transition between
    the launch image and your app.


    Last, all launch images must include the status bar regions. Launch image size
    recommendations are listed in [Table 8-1](#9781430263647_Ch08.xhtml#Tab1).


    [Table 8-1](#9781430263647_Ch08.xhtml#_Tab1). Launch Image Sizes for All Devices


    | Device | Size |

    | --- | --- |

    | For iPhone 5 series (iPhone & iPod touch) | 640 x 1136 px |

    | For iPhone and iPod touch | 640 x 960 px |

    |  | 320 x 480 px (standard resolution) |

    | iPad Portrait | 1536 x 2048 px |

    |  | 768 x 1024 px (standard resolution) |

    | iPad Landscape | 2048 x 1536 px |

    |  | 1024 x 768 px (standard resolution) |


    Newsstand Cover Icon


    If your app falls into the newsstand category, there are specific rules for its
    icon. Your icon will be displayed in the newsstand app along with other magazines
    and publications. Because of the way these apps are displayed, Apple has created
    different rules for these icons. Your newsstand cover icon is separate from the
    app icon so be sure not to confuse the two. The newsstand cover icon should be
    a replica of the cover of an issue of your actual magazine or periodical. It identifies
    your app in the newsstand app while your app icon will generally identify the
    app in the app store. Keep the newsstand icon general and not too specific, but
    remember that you definitely want users to see the cover and identify your magazine
    with it. So, keep the font and layout consistent with what regular readers of
    the magazine to expect, but leave out any seasonal or issue-specific details.
    [Figure 8-2](#9781430263647_Ch08.xhtml#Fig2) shows that app icon and the newsstand
    icons look like and also shows how they are different.


    ![9781430263647_Fig08-02.jpg](images/9781430263647_Fig08-02.jpg)


    [Figure 8-2](#9781430263647_Ch08.xhtml#_Fig2). The newsstand section on the app
    store and an app on the iPhone


    Refer to the Human Interface Guidelines for specific instructions, as there are
    specific sizes and aspect ratio requirements that will need to be adhered to.'
  trans: '

    App Store 已经处理了超过 500 亿次应用下载，并拥有 5.75 亿个商店账户。要对所有这些应用进行排序需要花费一些时间。随着商店中应用数量的增加，Apple
    多年来一直在对 App Store 的导航便捷性进行细微改进。例如，增加了“编辑推荐”等类别，更突出地展示“精选”应用，将应用“合集”分组，甚至可以在 App
    Store 中找到万圣节或圣诞节等节日主题的应用。最近，一个专门为`iOS 7`设计的应用类别被添加进来。自其发布以来，这个应用选集一直在 App Store
    中突出显示。


    所有已提交并通过 Apple 审核的应用都会出现在 App Store 中。


    要将您的应用提交到 App Store，您需要以下素材：


    *   App 图标

    *   启动图像

    *   报刊亭封面图标（如果应用属于该类别）

    *   屏幕截图

    *   宣传图


    App 图标、启动图像和报刊亭封面图标都包含在应用包中。应用包是由 Xcode 创建的一个包，其中包含您的应用可执行文件以及所有支持资源，包括 App 图标、图像文件等内容。


    ## App 图标


    App 图标是用户首先看到的，将代表您的应用。它会在设备的主屏幕以及 App Store 中代表您的应用。App 图标是必需的，提交的应用如果没有它将被拒绝。虽然《人机界面指南》中提到的一些图标和图稿是可选的，但
    App 图标不是。


    如果您正在创建一个要提交到 App Store 的新应用，那么您应参考《人机界面指南》，以了解所有设备的 App 图标、Spotlight 搜索结果图标和“设置”图标的最新尺寸和要求。


    您可能会认为，由于尺寸限制，App 图标几乎没有发挥原创性或创造力的空间。那您就错了。有专门展示精美设计 App 图标的网站和图库，像 Dribbble 和
    Behance 这样的网站上，来自各个领域的设计师和创意人员会发布 App 图标的概念图和真实设计方案。学习并回顾一些设计，以为您的应用图标寻找灵感。除了尺寸要求外，您的
    App 图标必须有助于向潜在用户直观地传达您的应用是关于什么的，同时尽可能包含诸如品牌等额外信息。就像您的应用一样，您对颜色的选择也会影响用户。因此，必须明智地选择颜色。您的
    App 图标必须是独特的，因为它必须在众多争夺潜在用户注意力的应用中脱颖而出。您可以深入查看 App Store 中专门为`iOS 7`设计的应用部分，并仔细研究其中的一些图标。其中一些可能会在设计您的
    App 图标时给您带来灵感。


    Apple 为设计 App 图标提供了许多指导原则。以下是直接摘自《人机界面指南》的注意事项。


    **应该：**


    *   如果可能，寻求专业平面设计师的帮助

    *   确保您的用户能轻松识别图像

    *   保持简洁，避免使用文字

    *   在多种不同背景上测试

    *   避免透明

    *   确保它在所有尺寸下都能良好缩放且清晰易读


    **不应：**


    *   使用 iOS 或 Apple 元素

    *   使用任何 Apple 图像


    与`iOS 6`相比，`iOS 7`中 App 图标的新形状差别细微。肉眼可能注意到也可能注意不到图标圆角半径的差异。说实话，对于设计师来说，这没什么大不了的，因为
    iOS 会自动添加一个遮罩来为 App 图标应用圆角效果。然而，关于`iOS 7` App 图标的新设计一直有很多猜测。人们编写了数学公式，也对其新图标背后的含义进行了大量猜测。在这个关头，对任何设计师来说最重要的是确保图标向用户传达了它需要传达的信息。App
    图标还必须能在多种不同背景以及所要求的各种尺寸下都呈现最佳效果。


    ## 启动图像


    启动图像是当您的应用启动时 iOS 显示的图像。您必须在应用包中至少包含一个启动图像。用户在实际开始与您的应用交互之前，只能短暂地看到启动图像。可以这样理解：如果您的应用启动很快，启动图像会在设备屏幕上一闪而过，然后直接将用户带入您的应用。如果您的应用加载时间较长，那么用户看到它的时间也会更长。如果您这样想，就能为您的应用构思出更好的启动图像。如果您是用户，在进入应用之前您想看到什么？Apple
    还建议在启动图像上避免任何形式的欢迎词、介绍或关于页面。


    有些设计师甚至让他们的启动图像与应用初始页面完全相同。这给人以应用已快速加载的印象，是一些设计师和开发者也会采用的做法。


    Apple 在《人机界面指南》中建议制作一个与应用初始页面相同但无文字或 UI 元素的启动屏幕。这样，当您的应用实际加载时，启动图像和您的应用之间就不会有突兀的视觉过渡。


    最后，所有启动图像都必须包含状态栏区域。启动图像尺寸建议列于表 8-1 中。


    表 8-1。所有设备的启动图像尺寸


    | 设备 | 尺寸 |

    | :--- | :--- |

    | 适用于 iPhone 5 系列（iPhone 和 iPod touch） | 640 x 1136 px |

    | 适用于 iPhone 和 iPod touch | 640 x 960 px |

    |  | 320 x 480 px（标准分辨率） |

    | iPad 竖屏 | 1536 x 2048 px |

    |  | 768 x 1024 px（标准分辨率） |

    | iPad 横屏 | 2048 x 1536 px |

    |  | 1024 x 768 px（标准分辨率） |


    ## 报刊亭封面图标


    如果您的应用属于报刊亭类别，则其图标有特定的规则。您的图标将与其他杂志和刊物一起显示在报刊亭应用中。由于这些应用的显示方式，Apple 为这些图标制定了不同的规则。您的报刊亭封面图标与
    App 图标是分开的，因此请务必不要混淆两者。报刊亭封面图标应为您实际杂志或期刊某一期封面的复制品。它用于在报刊亭应用中标识您的应用，而您的 App 图标通常用于在
    App Store 中标识应用。保持报刊亭图标具有通用性，不要太具体，但请记住，您绝对希望用户看到封面就能识别出您的杂志。因此，保持字体和布局与杂志普通读者的预期一致，但省略任何季节性或者特定于某一期的细节。图
    8-2 展示了 App 图标和报刊亭图标的外观，以及它们之间的区别。


    ![9781430263647_Fig08-02.jpg](img/9781430263647_Fig08-02.jpg)


    图 8-2。App Store 上的报刊亭部分以及 iPhone 上的一个应用


    请参考《人机界面指南》以获取具体说明，因为需要遵守特定的尺寸和宽高比要求。

