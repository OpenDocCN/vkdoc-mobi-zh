  trans: '

    # iOS 7 中的主屏幕


    主屏幕是 iPhone 或 iPad 上应用图标所在的地方。所有内容都位于主屏幕上。你可以将它想象成电脑的桌面。启动 iOS 后，你首先看到的会是主屏幕，并且会不断返回这里。你会立刻注意到
    iOS 7 主屏幕的变化。之前位于屏幕底部闪亮、带有斜面托架上的常用应用图标（如图 2-1 所示），现在则位于一个半透明的背景之上，该背景仅部分遮挡了墙纸图像，如图
    2-2 所示。打开应用时的过渡动画比以前更流畅，新的设置允许用户将全景图像设置为墙纸。左右移动手机也会产生“平移运动效果”。iOS 7 让用户以新的方式与
    UI 交互，这也延伸到了应用上。用户现在可以从主屏幕访问某些设置，从主屏幕进行聚焦搜索，以及从主菜单向下滑动以查看新的通知中心。本章稍后我将详细介绍内置应用如何为
    iOS 7 进行升级。


    ![9781430263647_Fig02-01.jpg](img/9781430263647_Fig02-01.jpg)


    图 2-1. iOS 6 主屏幕与应用图标。常用应用位于闪亮的托架上


    ![9781430263647_Fig02-02.jpg](img/9781430263647_Fig02-02.jpg)


    图 2-2. 在 iOS 7 中，“信息”和“电话”图标现在位于屏幕底部的半透明条中


    ## 字体排印


    iOS 7 的初始版本以及后续版本都采用了非常细的 Helvetica Neue Ultra Light 字体。这代表了一种完全不同的方法，为操作系统带来了更新、更轻量、更现代的外观。然而，在某些情况下，这种字体难以查看和阅读。最近的版本已移除了超细字体，转而使用更粗、更易读的字重。在底层，新的字体渲染引擎允许开发者精确地选择字体在其应用中的显示方式。这为设计师在字体排印方面提供了大量的自定义选项。


    **注意** 对于包含大量文字的应用，设计师需要为 iOS 7 重新设计。


    像为你的应用选择文本或字体这样简单的事情，在 iOS 7 中将变得更加重要，因为新的 API 将允许用户使用动态类型来调整每个应用中的文本大小。这为设计师在思考其应用如何呈现给用户时，增加了额外的责任。


    ## 图标


    所有标准应用的图标都已重新设计。操作系统早期版本中老式图标的斜面、阴影和光泽的拟物化外观已不复存在。眼尖的用户可能还记得，按照标准，旧的应用图标可以带或不带程序化添加的光泽和渐变效果。这些效果已被完全移除，取而代之的是采用新色调和新扁平化外观的图标，这也是许多较新的热门应用所采用的特征。参见图
    2-3，了解所有内置应用的图标如何为 iOS 7 重新构想。


    ![9781430263647_Fig02-03.jpg](img/9781430263647_Fig02-03.jpg)


    图 2-3. iOS 6 与 iOS 7 图标并排对比


    **注意** 你的创意部门能否重新制作上图？iOS 7 中 Safari 的新图标是一个位于白色正方形上的圆形。在上图中难以看清。制作部门能否复现这个图标？


    不仅是内置应用的图标被重新设计。快速查看新的控制中心（从主屏幕的任何页面轻扫即可访问）会发现，其中的图标也已按照 iOS 7 的扁平风格重新设计。这些图标不可自定义，也不应该与你的应用相关，但需要快速研究一下，才能充分了解
    iOS 7 为 iPhone 和 iPad 带来的变化范围。


    然而，图标只是苹果为 iPhone 和 iPad 修改所有标准应用外观的开始。


    图 2-4 显示了 iOS 6 上的锁定屏幕视图。请注意状态栏如何与屏幕其余部分分离，以及密码键盘上带有阴影和斜面的按钮。iOS 7 摒弃了所有这些设计。


    ![9781430263647_Fig02-04.jpg](img/9781430263647_Fig02-04.jpg)


    图 2-4. 带有密码输入的 iOS 6 锁定屏幕


    图 2-5 显示了 iOS 7 上的锁定屏幕视图。这里需要特别注意的具体项目是键盘上按钮的新外观。它们现在符合苹果新的“扁平”设计，并且是圆形的，而不是 iOS
    6 及更早版本中使用的方形键盘按钮。注意空间的利用，以及键盘如何成为此屏幕的焦点。功能——输入密码是主要焦点，没有任何东西分散这一体验。旧版本的体验是碎片化的，各个数字窗口占据了屏幕上相当大的空间。在
    iOS 7 中，我们习惯用作页面指示符的圆圈被提升到了新的高度。它们现在出现在状态栏中作为信号强度指示符，以及在锁定屏幕上用户输入密码以访问设备时出现。


    ![9781430263647_Fig02-05.jpg](img/9781430263647_Fig02-05.jpg)


    图 2-5. 带有密码输入的 iOS 7 锁定屏幕


    ## 栏


    iOS 中常见的 UI 元素是栏。它们用于多种用途，例如显示设备信息、为用户提供额外选项或控件，以及显示按钮。


    栏的大小因设备而异，但在 iOS 中大多是恒定功能，有助于向用户显示关键信息。在 iOS 中，所有 iOS 应用中的栏都具有专门设计的外观和行为。我在下面列出了
    iOS 中最常见的栏，以及它们在 iOS 7 中的变化。


    ### 状态栏


    状态栏为用户提供关于设备的信息，例如时间、电池电量信息和网络连接详情，以及应用是否正在访问用户的位置信息（图 2-6）。无论设备处于竖屏还是横屏模式，它都位于屏幕的最顶部。设计你的应用时，根据应用的外观和色调，有一些关于如何使用状态栏的指南，并且你可以选择几个选项。苹果允许你在用户查看关键信息或玩游戏时隐藏状态栏。但还有其他限制，例如，当应用正在使用大量网络资源时，应使用网络指示器来显示。


    ![9781430263647_Fig02-06.jpg](img/9781430263647_Fig02-06.jpg)


    图 2-6. iOS 7 中的状态栏


    在视觉上，允许对状态栏进行一些自定义，但仅限于颜色和动画。尽管状态栏的高度是固定的，但它包含的信息至关重要，因此，如果你决定隐藏状态栏，应确保用户无需退出应用即可再次查看它。

    '
- fmt: '# iOS 7 UI 元素指南


    ## 状态栏


    在 iOS 7 中，状态栏采用了全新的设计，变得半透明、透明且无边框。设计师们会发现状态栏和导航栏之间不再有分隔线。实际上，在 iOS 7 中，它们看起来融为一体。当在
    iOS 7 中查看旧版应用时，分隔线仍然存在，但在所有预装于 iOS 设备上的重新设计的原生应用中，这条分隔线已被移除，取而代之的是苹果更简洁的新 UI。如果您的应用有彩色背景，您需要牢记这一点，并考虑状态栏在其上的显示效果。


    状态栏上显示的标准信息包括：


    - **屏幕方向** – 指示设备是否已锁定为竖屏或横屏模式。如果屏幕未锁定在特定方向，则不会显示此图标。

    - **蜂窝网络信号强度** – 此前，此信息使用条形格显示。在 iOS 7 中，条形格已被圆形指示器取代。

    - **运营商名称** – 包括 AT&T、Sprint、Verizon 或其他任何运营商。

    - **连接类型** – 常见的包括`3G`、`4G`或`LTE`。

    - **WiFi 指示器** – 告知设备已连接到可用的 WiFi 源以及信号强度，通常显示为一到三个条形格。

    - **蓝牙** – 正在连接使用蓝牙的设备。

    - **时间** – 显示当前时间，通常位于中间位置。

    - **电池指示器** – 显示设备的剩余电池电量。


    ## 导航栏


    导航栏允许用户在 iOS 中进行导航。它始终位于状态栏下方，并包含几个关键元素，包括当前屏幕的标题以及给定时间屏幕上信息层级中的任何导航按钮。当用户在 iPad
    或 iPhone 上将设备从竖屏切换到横屏时，导航栏的高度和宽度会发生变化。


    导航栏的外观以及其上的元素都可以自定义。像返回按钮、标题和背景等元素都可以自定义，以便在视觉上更好地与应用的整体风格保持一致。


    苹果明确要求**不要**在导航栏中创建多段返回按钮或面包屑导航。原因如下：首先，这会使必需的返回按钮区域过大，从而侵占当前屏幕标题的尺寸；其次，在多段返回按钮中列出多个分段会减少每个分段可用的空间，从而导致用户可点击的区域越来越小；最后，层级越多，决定显示哪些层级就越困难。这些是需要牢记的重要事项，因为在
    iPhone 和 iPod touch 上，屏幕空间非常有限。


    与状态栏类似，导航栏在 iOS 7 中也有了新的外观（[图 2-7](#9781430263647_Ch02.xhtml#Fig7)）。它同样是半透明的，并且采用了无边框按钮。也就是说，在改进后的导航栏中完全没有按钮。设计师还应考虑到这一点在
    iOS 7 全新排版引擎下的含义。如有必要，请与开发者紧密合作，确保字体在导航栏中清晰显示且符合您的预期，因为这决定了用户如何在您的应用中移动和交互。


    ![9781430263647_Fig02-07.jpg](images/9781430263647_Fig02-07.jpg)


    [图 2-7](#9781430263647_Ch02.xhtml#_Fig7) iOS 7 邮件应用的导航栏


    ## 工具栏


    工具栏允许用户根据当前视图或屏幕上的内容执行特定操作（[图 2-8](#9781430263647_Ch02.xhtml#Fig8)）。在 iPhone 上，它位于屏幕底部；但在
    iPad 上，它可能位于其他位置，例如页面顶部边缘。对于您的工具栏，苹果建议在应用中使用系统提供的按钮和图标。但是，如果您的应用具有自定义任务，则需要为工具栏提供自定义按钮和图标。请记住，工具栏上的图标应保持与上下文相关，仅包含与当前屏幕操作相关的操作。


    ![9781430263647_Fig02-08.jpg](images/9781430263647_Fig02-08.jpg)


    [图 2-8](#9781430263647_Ch02.xhtml#_Fig8) iOS 7 邮件应用中常用的工具栏图标


    在 iPhone 上，工具栏在从竖屏旋转到横屏时高度会发生变化，因此任何自定义图标也需要设计为能够适应这种调整。


    工具栏和导航栏中也推荐使用标准图标。工具栏的标准图标包括：旗帜、文件夹、垃圾箱/回收、转发/分享以及撰写。


    ## 标签栏


    在每个应用中，用户需要在各种自定义视图和模式之间进行切换导航。标签栏促进了这些操作。它位于屏幕底部并保持一致，并且应该可以从应用中的任何位置访问。标签栏的默认背景色此前是黑色，但可以根据应用的设计进行自定义。现在在
    iOS 7 中，标签栏的默认颜色是白色，并且与导航栏共享许多相同的属性。不过，也可以通过编程方式更改标签栏的背景。标签栏也存在限制。例如，在 iPhone
    上，任何标签栏中一次最多只能显示五个标签。如果要显示更多，iOS 会自动添加一个“更多”标签，并在列表中显示剩余的标签。而在 iPad 上，则允许显示超过五个标签。在任何设备上，无论方向如何，标签栏都保持一致。


    您可以使用标签栏通过添加徽章、数字和符号向用户传达信息。这些元素会以一种不打扰用户的方式吸引对标签栏的注意，并允许用户在方便时轻松访问。


    ## 表视图与表视图元素


    表视图是 iOS 以清晰高效的方式显示信息的独特方式。它们是 iOS 的 UI 工具包中最常用的组件之一，传统上以包含多行的单列列表形式出现。这些行可以根据个人喜好和提供给用户的信息进行分组和分隔。表视图有两种类型：**普通表视图**是延伸屏幕整个宽度的表视图；**分组表视图**则从背景、侧面和屏幕边缘向内缩进。


    在 iOS 7 中，所有表视图都延伸至屏幕边缘。这也适用于分组表，它们不再从背景向内缩进。请参见下面的示例（[图 2-9](#9781430263647_Ch02.xhtml#Fig9)
    和 [2-10](#9781430263647_Ch02.xhtml#Fig10)）。


    ![9781430263647_Fig02-09.jpg](images/9781430263647_Fig02-09.jpg)


    [图 2-9](#9781430263647_Ch02.xhtml#_Fig9) iOS 6 中的设置屏幕显示分组表视图


    ![9781430263647_Fig02-10.jpg](images/9781430263647_Fig02-10.jpg)


    [图 2-10](#9781430263647_Ch02.xhtml#_Fig10) iOS 7 中设置屏幕和分组表视图的新外观


    上述[图 2-9](#9781430263647_Ch02.xhtml#Fig9) 展示了浏览器应用 Safari 中旧版表视图的设置界面。请注意，在旧版本中，分组表视图用于将信息与背景区分开，并将相关任务组合在一起。现在看看该视图在
    iOS 7 中发生了怎样的变化。'
  raw: 'In iOS 7, the status bar has a new updated look and is translucent, transparent,
    and borderless. Designers will notice that there is no longer a demarcation line
    that separates the status bar and the navigation bar. Indeed, in iOS 7, they seem
    to blend into one another. When viewing older apps in iOS 7, the demarcation line
    still exists, but on every redesigned stock app that ships with an iOS device,
    it has been removed in favor of Apple’s new, simpler UI. You will need to bear
    this in mind if your application has a colorful background and how the status
    bar will display on it.


    Standard information provided on the status bar includes:


    *   Screen orientation – Tells you whether or not your device has been locked
    in portrait or landscape mode. If your screen hasn’t been locked in a particular
    orientation, you will not see this icon.

    *   Cell network’s signal or strength – Previously, this information was displayed
    using bars. In iOS 7, the bars have been replaced by the round indicators.

    *   Carrier name – Any of the carriers, including AT&T, Sprint, Verizon, or any
    of the others.

    *   Connection type – 3G, 4G, or LTE are common ones.

    *   WiFi Indicator – Lets you know that your device is connected to an available
    WiFi source and the strength of the signal. Usually one to three bars.

    *   Bluetooth – A device using Bluetooth is connected.

    *   Time – Displays time of day, usually in the center.

    *   Battery indicator – Shows the remaining battery life of the device.


    Navigation Bar


    The navigation bar allows users to navigate in iOS. It always sits just below
    the status bar and contains a few key elements. They include the title of the
    current screen as well as any navigational buttons in the hierarchy of the information
    on the screen at the given time. The navigation bar will change height and width
    when a user switches the orientation of his or her device on either the iPad or
    the iPhone from portrait to landscape.


    The look of the navigation bar as well as the elements included on it can be customized.
    Elements such as the back button, title, and background can all be customized
    to better align visually with the look and feel of your application.


    Apple is specific about **not** creating a multisegment back button or breadcrumb
    in the navigation bar. There are a few reasons for this. First, it will make the
    required back button area too large and will infringe on the size of the title
    of the current screen. Second, listing multiple segments in the back button will
    decrease the amount of space available for each one, thus making the region available
    for the user to tap increasingly smaller. And last, the more levels there are,
    the more it becomes increasingly difficult to decide which levels to display.
    These are important things to remember, as there is limited real estate on the
    iPhone and iPod touch.


    Much like the status bar, the navigation bar has a new look in iOS 7 ([Figure
    2-7](#9781430263647_Ch02.xhtml#Fig7)). It is also translucent and now features
    borderless buttons. That is to say, there are no buttons at all in the revised
    navigation bar. Designers should keep in mind what this means in light of the
    new typography engine in iOS 7 as well. If necessary, work closely with your developer
    to ensure that your fonts are showing clearly and as you intended in the navigation
    bar as this governs how users will move through and interact with your application.


    ![9781430263647_Fig02-07.jpg](images/9781430263647_Fig02-07.jpg)


    [Figure 2-7](#9781430263647_Ch02.xhtml#_Fig7). Navigation bar for Mail app in
    iOS 7


    Toolbar


    The toolbar allows users to perform specific actions depending on what a user
    is seeing in the current view or screen ([Figure 2-8](#9781430263647_Ch02.xhtml#Fig8)).
    It sits at the bottom of the screen on an iPhone but can be elsewhere on the iPad
    such as at the top edge of the page. For your toolbar, Apple recommends using
    the system-provided buttons and icons in your application. However, if your app
    features custom tasks, then you will need to provide custom buttons and icons
    for your toolbar. Remember to keep the icons on the toolbar contextual with only
    the actions relevant to what’s taking place on the screen.


    ![9781430263647_Fig02-08.jpg](images/9781430263647_Fig02-08.jpg)


    [Figure 2-8](#9781430263647_Ch02.xhtml#_Fig8). Common toolbar icons for iOS 7
    from the Mail app


    On the iPhone, the toolbar will change height with rotation from portrait to landscape
    so any custom icons will need to be designed to make this adjustment as well.


    There are standard icons recommended for use in the toolbar and navigation bars
    as well. Standard icons for the toolbar are the Flag, Folder, Trash or Recycling,
    Forward or Share, and Compose.


    Tab Bar


    Within every application, there will be various custom views and modes that the
    user will need to navigation among. The tab bar facilitates these actions. It
    is located at the bottom of the screen and remains consistent. It should be accessible
    from every location in the app. The default background color for the tab bar was
    black, but this could be customized depending on your app’s design. Now with iOS
    7, the tab bar’s default color is white and shares many of the same attributes
    as the navigation bar. There are ways to change the background of the tab bar
    programmatically, however. There are limits to the tab bar, too. For instance,
    on the iPhone, no more than five tabs may be displayed at a time in any tab bar.
    If there are more to show, iOS will automatically add a “More” tab and display
    the remaining tabs in a list. On the iPad, however, more than five tabs are allowed.
    The tab bar is consistent regardless of orientation on any device.


    You can use the tab bar to communicate information to your user by adding badges,
    number, and symbols. These will call attention to the tab bar in a way that is
    not obtrusive to the user and allow easy access when it’s convenient for them.


    Table Views and Table View Elements


    Table views are iOS’s unique way of displaying information in a clean and efficient
    way. They represent one of the most commonly used components of the UI kit for
    iOS and traditionally appear as a single column list containing multiple rows.
    These rows can then be divided and separated into groups depending on personal
    taste and the information being provided for the user. There are two types of
    table views: A plain table view is one that extends the entire width of the screen.
    A grouped table view is inset from the background, side, and edges of the screen.


    In iOS 7, all table views extend to the edges of the screen. This holds for grouped
    tables as well that are no longer inset from the background. See examples below
    in [Figures 2-9](#9781430263647_Ch02.xhtml#Fig9) and [2-10](#9781430263647_Ch02.xhtml#Fig10).


    ![9781430263647_Fig02-09.jpg](images/9781430263647_Fig02-09.jpg)


    [Figure 2-9](#9781430263647_Ch02.xhtml#_Fig9). Settings screen in iOS 6 shows
    a grouped table view


    ![9781430263647_Fig02-10.jpg](images/9781430263647_Fig02-10.jpg)


    [Figure 2-10](#9781430263647_Ch02.xhtml#_Fig10). The settings screen and grouped
    table view’s new appearance in iOS 7


    [Figure 2-9](#9781430263647_Ch02.xhtml#Fig9) above shows the old version of a
    table view in the settings for the browser app Safari. Note in the old version
    how the grouped table view is used to set information away from the background
    and to combine related tasks. Now see how that view has changed in iOS 7.'
  trans: '

    # iOS 7 UI 元素指南


    ## 状态栏


    在 iOS 7 中，状态栏采用了全新的设计，变得半透明、透明且无边框。设计师们会发现状态栏和导航栏之间不再有分隔线。实际上，在 iOS 7 中，它们看起来融为一体。当在
    iOS 7 中查看旧版应用时，分隔线仍然存在，但在所有预装于 iOS 设备上的重新设计的原生应用中，这条分隔线已被移除，取而代之的是苹果更简洁的新 UI。如果您的应用有彩色背景，您需要牢记这一点，并考虑状态栏在其上的显示效果。


    状态栏上显示的标准信息包括：


    - **屏幕方向** – 指示设备是否已锁定为竖屏或横屏模式。如果屏幕未锁定在特定方向，则不会显示此图标。

    - **蜂窝网络信号强度** – 此前，此信息使用条形格显示。在 iOS 7 中，条形格已被圆形指示器取代。

    - **运营商名称** – 包括 AT&T、Sprint、Verizon 或其他任何运营商。

    - **连接类型** – 常见的包括`3G`、`4G`或`LTE`。

    - **WiFi 指示器** – 告知设备已连接到可用的 WiFi 源以及信号强度，通常显示为一到三个条形格。

    - **蓝牙** – 正在连接使用蓝牙的设备。

    - **时间** – 显示当前时间，通常位于中间位置。

    - **电池指示器** – 显示设备的剩余电池电量。


    ## 导航栏


    导航栏允许用户在 iOS 中进行导航。它始终位于状态栏下方，并包含几个关键元素，包括当前屏幕的标题以及给定时间屏幕上信息层级中的任何导航按钮。当用户在 iPad
    或 iPhone 上将设备从竖屏切换到横屏时，导航栏的高度和宽度会发生变化。


    导航栏的外观以及其上的元素都可以自定义。像返回按钮、标题和背景等元素都可以自定义，以便在视觉上更好地与应用的整体风格保持一致。


    苹果明确要求**不要**在导航栏中创建多段返回按钮或面包屑导航。原因如下：首先，这会使必需的返回按钮区域过大，从而侵占当前屏幕标题的尺寸；其次，在多段返回按钮中列出多个分段会减少每个分段可用的空间，从而导致用户可点击的区域越来越小；最后，层级越多，决定显示哪些层级就越困难。这些是需要牢记的重要事项，因为在
    iPhone 和 iPod touch 上，屏幕空间非常有限。


    与状态栏类似，导航栏在 iOS 7 中也有了新的外观（图 2-7）。它同样是半透明的，并且采用了无边框按钮。也就是说，在改进后的导航栏中完全没有按钮。设计师还应考虑到这一点在
    iOS 7 全新排版引擎下的含义。如有必要，请与开发者紧密合作，确保字体在导航栏中清晰显示且符合您的预期，因为这决定了用户如何在您的应用中移动和交互。


    ![9781430263647_Fig02-07.jpg](img/9781430263647_Fig02-07.jpg)


    图 2-7 iOS 7 邮件应用的导航栏


    ## 工具栏


    工具栏允许用户根据当前视图或屏幕上的内容执行特定操作（图 2-8）。在 iPhone 上，它位于屏幕底部；但在 iPad 上，它可能位于其他位置，例如页面顶部边缘。对于您的工具栏，苹果建议在应用中使用系统提供的按钮和图标。但是，如果您的应用具有自定义任务，则需要为工具栏提供自定义按钮和图标。请记住，工具栏上的图标应保持与上下文相关，仅包含与当前屏幕操作相关的操作。


    ![9781430263647_Fig02-08.jpg](img/9781430263647_Fig02-08.jpg)


    图 2-8 iOS 7 邮件应用中常用的工具栏图标


    在 iPhone 上，工具栏在从竖屏旋转到横屏时高度会发生变化，因此任何自定义图标也需要设计为能够适应这种调整。


    工具栏和导航栏中也推荐使用标准图标。工具栏的标准图标包括：旗帜、文件夹、垃圾箱/回收、转发/分享以及撰写。


    ## 标签栏


    在每个应用中，用户需要在各种自定义视图和模式之间进行切换导航。标签栏促进了这些操作。它位于屏幕底部并保持一致，并且应该可以从应用中的任何位置访问。标签栏的默认背景色此前是黑色，但可以根据应用的设计进行自定义。现在在
    iOS 7 中，标签栏的默认颜色是白色，并且与导航栏共享许多相同的属性。不过，也可以通过编程方式更改标签栏的背景。标签栏也存在限制。例如，在 iPhone
    上，任何标签栏中一次最多只能显示五个标签。如果要显示更多，iOS 会自动添加一个“更多”标签，并在列表中显示剩余的标签。而在 iPad 上，则允许显示超过五个标签。在任何设备上，无论方向如何，标签栏都保持一致。


    您可以使用标签栏通过添加徽章、数字和符号向用户传达信息。这些元素会以一种不打扰用户的方式吸引对标签栏的注意，并允许用户在方便时轻松访问。


    ## 表视图与表视图元素


    表视图是 iOS 以清晰高效的方式显示信息的独特方式。它们是 iOS 的 UI 工具包中最常用的组件之一，传统上以包含多行的单列列表形式出现。这些行可以根据个人喜好和提供给用户的信息进行分组和分隔。表视图有两种类型：**普通表视图**是延伸屏幕整个宽度的表视图；**分组表视图**则从背景、侧面和屏幕边缘向内缩进。


    在 iOS 7 中，所有表视图都延伸至屏幕边缘。这也适用于分组表，它们不再从背景向内缩进。请参见下面的示例（图 2-9 和 2-10）。


    ![9781430263647_Fig02-09.jpg](img/9781430263647_Fig02-09.jpg)


    图 2-9 iOS 6 中的设置屏幕显示分组表视图


    ![9781430263647_Fig02-10.jpg](img/9781430263647_Fig02-10.jpg)


    图 2-10 iOS 7 中设置屏幕和分组表视图的新外观


    上述图 2-9 展示了浏览器应用 Safari 中旧版表视图的设置界面。请注意，在旧版本中，分组表视图用于将信息与背景区分开，并将相关任务组合在一起。现在看看该视图在
    iOS 7 中发生了怎样的变化。

    '
- fmt: 'In [Figure 2-10](#9781430263647_Ch02.xhtml#Fig10) above, which shows iOS 7
    running on an iPhone 5, note the dimensions of the screen are different, and so
    are the new appearance of grouped table views.


    ### Table View Elements


    When interacting with iOS there are certain elements that are used to convey information
    in various views and situations for the user. These elements have been created
    to extend the functionality of table views and also help to maximize the space
    provided. The elements are the checkmark, disclosure indicator, detail disclosure
    button, row reorder, row insert, delete button control, and the delete button.
    When designing your app, you will undoubtedly use a table view to display information.
    While these elements can be used outside of table views in special instances,
    it is a good rule of thumb to use them within table views only.


    Elements that are recommended for use in table views are shown in [Figure 2-11](#9781430263647_Ch02.xhtml#Fig11).
    While the tasks associated with these elements remain the same, these elements
    have also been redesigned for iOS 7.


    ![9781430263647_Fig02-11.jpg](images/9781430263647_Fig02-11.jpg)


    [Figure 2-11](#9781430263647_Ch02.xhtml#_Fig11). This chart from the HIG shows
    elements commonly used in table views


    **Note** I’d like to create a chart showing how these elements have changed. Old
    on the left and new on the right. Can the graphics team recreate this chart it
    was taken from the hig document by Apple.


    ### Stock Apps


    Before you attempt to design for iOS, it is a good idea to take a look at the
    stock apps that are a part of the iOS stable of applications. They are, in most
    cases, the first apps you will interact with and are present on every device running
    iOS. They are `Mail`, `Messages`, `Calendar`, `Photos`, `Camera`, `Weather`, `Clock`,
    `Maps`, `Videos`, `Notes`, `Reminders`, `Stocks`, `Game Center`, `Newsstand`,
    `iTunes`, `App Store`, `Passbook`, `Compass`, and `Settings`. These apps, also
    shown in [Figure 2-12](#9781430263647_Ch02.xhtml#Fig12), will help to show you
    basic design and UI principles for designing applications for iOS. By studying
    these applications, you will find best practices for using UI elements for common
    actions in iOS that you can also utilize in your apps.


    ![9781430263647_Fig02-12.jpg](images/9781430263647_Fig02-12.jpg)


    [Figure 2-12](#9781430263647_Ch02.xhtml#_Fig12). Stock apps in iOS 7


    Let’s look at a few and call out specific UI elements with which you need to become
    familiar to design your first app for iOS. What’s great about the stock apps in
    iOS is that the UI elements used in these apps represent established best practices
    that users of all other platforms will recognize as well.


    #### Mail


    `Mail` is the iPhone and iPad’s e-mail application. It allows you to send and
    receive e-mails from your mobile devices. The `Mail` application features some
    standard UI elements that are a key part of iOS and can be used in your application
    as well. If your application allows users to send e-mails, you will be able to
    use `Mail` to send e-mails from your app. The `Mail` app icon is represented by
    a blue box with a white envelope on the springboard.


    ##### Standard Mail Icons


    The compose tool is used to compose an e-mail in the `Mail` app. The app’s icon
    is represented by a blue box with a white envelope inside. You will see that other
    third party e-mail applications have some variation on this theme as their app’s
    icon as well. If your app is an e-mail app, it is best not to try to reinvent
    the wheel. Use established design paradigms and icons in the design of your app.


    The compose icon is a commonly used icon to denote the ability to create a new
    document. Once a user taps on this icon, a new window will appear allowing the
    user to address a new document or e-mail with a cleared field ready for new content
    by the user. This is a commonly accepted UI paradigm. If your app allows user
    to compose a new document or e-mail, use this icon.


    #### Calculator


    The `Calculator` app in [Figure 2-13](#9781430263647_Ch02.xhtml#Fig13) has been
    redesigned using the new flat style as well. The previously beveled buttons have
    been replaced with flat ones and the old shiny entry field is gone as well. This
    app now uses various shades to differentiate between functionalities of different
    buttons on the keypad. The new calculator is now easily accessible from the Control
    Center along with the alarm clock. This removes the need to go into settings as
    before for access.


    ![9781430263647_Fig02-13.jpg](images/9781430263647_Fig02-13.jpg)


    [Figure 2-13](#9781430263647_Ch02.xhtml#_Fig13). The newly redesigned `Calculator`
    app in iOS 7


    #### Calendar


    The calendar has a new, cleaner look on a stark, white background in iOS 7. It
    lets you do many of the same tasks you were able to do in the older versions of
    iOS. iOS 7 now brings, however, the ability to view the entire year at a glance
    as shown in [Figure 2-14](#9781430263647_Ch02.xhtml#Fig14). The navigation is
    a little different, too. Where in iOS 6 the calendar app had a selector for List,
    Day, and Month, in iOS 7 tapping a date from the month view will bring up the
    day view, and in order to see a list view of all events past and upcoming, you
    will need to tap the search icon in the upper right of the screen of the iPhone.
    It’s not the most intuitive and takes some time to get used to.


    ![9781430263647_Fig02-14.jpg](images/9781430263647_Fig02-14.jpg)


    [Figure 2-14](#9781430263647_Ch02.xhtml#_Fig14). The calendar app’s new look for
    iOS 7


    #### Weather


    While all of the stock iOS apps have gone through a major transformation, my favorite
    has to be the `Weather` app. Not only has the app been redesigned from the ground
    up, it has added great new animations that do an excellent job of adding context
    to the overall experience of the app. Here, Apple does a nice job of showing designers
    how to use the entire screen, something they now implore designers to do. The
    animations mirror not only the current weather but the current time in the city
    of your choosing. Front and center is the current city, weather conditions, and
    temperature. Below, additional information like an hourly breakdown of the weather
    and temperature is displayed in row and columns evenly spaced for easy reading
    and visibility (see [Figure 2-15](#9781430263647_Ch02.xhtml#Fig15)). Lower still,
    is the daily forecast with temperatures for the following five days. The use of
    space here is balanced, and the subtle background animations are a nice touch
    especially as they seem to simply float off the screen at the top and sides.


    ![9781430263647_Fig02-15.jpg](images/9781430263647_Fig02-15.jpg)


    [Figure 2-15](#9781430263647_Ch02.xhtml#_Fig15). The newly redesigned `Weather`
    app


    It is important to note that the `Weather` app mainly displays information and
    there is minimal focus on functionality. There are two views: the multicity table
    view and the one-city view. Users can swipe left or right through the cities on
    their list or add and delete cities. The interface of the weather app is simple
    with its content and functionality but somehow, it all works.


    Much has also been made of the `Weather` app’s similarity to Yahoo’s own weather
    app. Indeed, the information in the `Weather` app is drawn from Yahoo and the
    Weather Channel. Icons and links to both appear in the `Weather` app. The comparison
    between the two apps is warranted and definitely worth a look.


    **Tip** Weather apps have become some of the most popular apps in the Apple app
    store, and if your app will offer users the opportunity to view weather information,
    an examination of these apps could help to inform your design.


    ### Color, Transparency, & Layers'
  raw: 'In [Figure 2-10](#9781430263647_Ch02.xhtml#Fig10) above, which shows iOS 7
    running on an iPhone 5, note the dimensions of the screen are different, and so
    are the new appearance of grouped table views.


    Table View Elements


    When interacting with iOS there are certain elements that are used to convey information
    in various views and situations for the user. These elements have been created
    to extend the functionality of table views and also help to maximize the space
    provided. The elements are the checkmark, disclosure indicator, detail disclosure
    button, row reorder, row insert, delete button control, and the delete button.
    When designing your app, you will undoubtedly use a table view to display information.
    While these elements can be used outside of table views in special instances,
    it is a good rule of thumb to use them within table views only.


    Elements that are recommended for use in table views are shown in [Figure 2-11](#9781430263647_Ch02.xhtml#Fig11).
    While the tasks associated with these elements remain the same, these elements
    have also been redesigned for iOS 7.


    ![9781430263647_Fig02-11.jpg](images/9781430263647_Fig02-11.jpg)


    [Figure 2-11](#9781430263647_Ch02.xhtml#_Fig11). This chart from the HIG shows
    elements commonly used in table views


    **Note**  I’d like to create a chart showing how these elements have changed.
    Old on the left and new on the right. Can the graphics team recreate this chart
    it was taken from the hig document by Apple.


    Stock Apps


    Before you attempt to design for iOS, it is a good idea to take a look at the
    stock apps that are a part of the iOS stable of applications. They are, in most
    cases, the first apps you will interact with and are present on every device running
    iOS. They are Mail, Messages, Calendar, Photos, Camera, Weather, Clock, Maps,
    Videos, Notes, Reminders, Stocks, Game Center, Newsstand, iTunes, App Store, Passbook,
    Compass, and Settings. These apps, also shown in [Figure 2-12](#9781430263647_Ch02.xhtml#Fig12),
    will help to show you basic design and UI principles for designing applications
    for iOS. By studying these applications, you will find best practices for using
    UI elements for common actions in iOS that you can also utilize in your apps.


    ![9781430263647_Fig02-12.jpg](images/9781430263647_Fig02-12.jpg)


    [Figure 2-12](#9781430263647_Ch02.xhtml#_Fig12). Stock apps in iOS 7


    Let’s look at a few and call out specific UI elements with which you need to become
    familiar to design your first app for iOS. What’s great about the stock apps in
    iOS is that the UI elements used in these apps represent established best practices
    that users of all other platforms will recognize as well.


    Mail


    Mail is the iPhone and iPad’s e-mail application. It allows you to send and receive
    e-mails from your mobile devices. The Mail application features some standard
    UI elements that are a key part of iOS and can be used in your application as
    well. If your application allows users to send e-mails, you will be able to use
    Mail to send e-mails from your app. The Mail app icon is represented by a blue
    box with a white envelope on the springboard.


    Standard Mail Icons


    The compose tool is used to compose an e-mail in the Mail app. The app’s icon
    is represented by a blue box with a white envelope inside. You will see that other
    third party e-mail applications have some variation on this theme as their app’s
    icon as well. If your app is an e-mail app, it is best not to try to reinvent
    the wheel. Use established design paradigms and icons in the design of your app.


    The compose icon is a commonly used icon to denote the ability to create a new
    document. Once a user taps on this icon, a new window will appear allowing the
    user to address a new document or e-mail with a cleared field ready for new content
    by the user. This is a commonly accepted UI paradigm. If your app allows user
    to compose a new document or e-mail, use this icon.


    Calculator


    The Calculator app in [Figure 2-13](#9781430263647_Ch02.xhtml#Fig13) has been
    redesigned using the new flat style as well. The previously beveled buttons have
    been replaced with flat ones and the old shiny entry field is gone as well. This
    app now uses various shades to differentiate between functionalities of different
    buttons on the keypad. The new calculator is now easily accessible from the Control
    Center along with the alarm clock. This removes the need to go into settings as
    before for access.


    ![9781430263647_Fig02-13.jpg](images/9781430263647_Fig02-13.jpg)


    [Figure 2-13](#9781430263647_Ch02.xhtml#_Fig13). The newly redesigned Calculator
    app in iOS 7


    Calendar


    The calendar has a new, cleaner look on a stark, white background in iOS 7\. It
    lets you do many of the same tasks you were able to do in the older versions of
    iOS. iOS 7 now brings, however, the ability to view the entire year at a glance
    as shown in [Figure 2-14](#9781430263647_Ch02.xhtml#Fig14). The navigation is
    a little different, too. Where in iOS 6 the calendar app had a selector for List,
    Day, and Month, in iOS 7 tapping a date from the month view will bring up the
    day view, and in order to see a list view of all events past and upcoming, you
    will need to tap the search icon in the upper right of the screen of the iPhone.
    It’s not the most intuitive and takes some time to get used to.


    ![9781430263647_Fig02-14.jpg](images/9781430263647_Fig02-14.jpg)


    [Figure 2-14](#9781430263647_Ch02.xhtml#_Fig14). The calendar app’s new look for
    iOS 7


    Weather


    While all of the stock iOS apps have gone through a major transformation, my favorite
    has to be the Weather app. Not only has the app been redesigned from the ground
    up, it has added great new animations that do an excellent job of adding context
    to the overall experience of the app. Here, Apple does a nice job of showing designers
    how to use the entire screen, something they now implore designers to do. The
    animations mirror not only the current weather but the current time in the city
    of your choosing. Front and center is the current city, weather conditions, and
    temperature. Below, additional information like an hourly breakdown of the weather
    and temperature is displayed in row and columns evenly spaced for easy reading
    and visibility (see [Figure 2-15](#9781430263647_Ch02.xhtml#Fig15)). Lower still,
    is the daily forecast with temperatures for the following five days. The use of
    space here is balanced, and the subtle background animations are a nice touch
    especially as they seem to simply float off the screen at the top and sides.


    ![9781430263647_Fig02-15.jpg](images/9781430263647_Fig02-15.jpg)


    [Figure 2-15](#9781430263647_Ch02.xhtml#_Fig15). The newly redesigned Weather
    app


    It is important to note that the Weather app mainly displays information and there
    is minimal focus on functionality. There are two views: the multicity table view
    and the one-city view. Users can swipe left or right through the cities on their
    list or add and delete cities. The interface of the weather app is simple with
    its content and functionality but somehow, it all works.


    Much has also been made of the Weather app’s similarity to Yahoo’s own weather
    app. Indeed, the information in the Weather app is drawn from Yahoo and the Weather
    Channel. Icons and links to both appear in the Weather app. The comparison between
    the two apps is warranted and definitely worth a look.


    **Tip**  Weather apps have become some of the most popular apps in the Apple app
    store, and if your app will offer users the opportunity to view weather information,
    an examination of these apps could help to inform your design.


    Color, Transparency, & Layers'
  trans: '

    在上图图 2-10 中，展示了运行在 iPhone 5 上的 iOS 7 系统，请注意屏幕尺寸有所不同，分组表格视图的新外观也发生了变化。


    ### 表格视图元素


    在 iOS 交互中，有一些特定元素用于在不同视图和场景下向用户传达信息。这些元素的创建是为了扩展表格视图的功能，并帮助最大化利用屏幕空间。这些元素包括：勾选标记、展开指示器、详情展开按钮、行重排、行插入、删除按钮控件以及删除按钮。在设计应用时，毫无疑问你会使用表格视图来展示信息。虽然这些元素在特殊情况下也可以用在表格视图之外，但一个好的经验法则是仅在表格视图内部使用它们。


    建议在表格视图中使用的元素如图 2-11 所示。虽然与这些元素相关的任务保持不变，但这些元素在 iOS 7 中也经过了重新设计。


    ![9781430263647_Fig02-11.jpg](img/9781430263647_Fig02-11.jpg)


    图 2-11。此图表来自 HIG，展示了表格视图中常用的元素


    **注意** 我想制作一张图表来展示这些元素的变化。左侧是旧样式，右侧是新样式。这个图表源自 Apple 的 HIG 文档，希望图形团队能重新制作一张。


    ### 预装应用


    在尝试为 iOS 进行设计之前，建议先研究一下 iOS 应用生态中的预装应用。在大多数情况下，这些是你首先接触的应用，并且存在于每一台运行 iOS 的设备上。它们是：`Mail`、`Messages`、`Calendar`、`Photos`、`Camera`、`Weather`、`Clock`、`Maps`、`Videos`、`Notes`、`Reminders`、`Stocks`、`Game
    Center`、`Newsstand`、`iTunes`、`App Store`、`Passbook`、`Compass`和`Settings`。这些应用（也如图
    2-12 所示）将帮助你了解为 iOS 设计应用时的基本设计和 UI 原则。通过研究这些应用，你将找到在 iOS 中针对常见操作使用 UI 元素的最佳实践，这些实践同样可以应用到你自己的应用中。


    ![9781430263647_Fig02-12.jpg](img/9781430263647_Fig02-12.jpg)


    图 2-12。iOS 7 中的预装应用


    我们来具体看几个应用，并指出你需要熟悉的特定 UI 元素，以便设计你的第一个 iOS 应用。iOS 预装应用的伟大之处在于，这些应用中所使用的 UI 元素代表了公认的最佳实践，其他所有平台的用户也都能识别。


    #### 邮件


    `Mail`是 iPhone 和 iPad 的电子邮件应用程序。它允许你在移动设备上发送和接收电子邮件。`Mail`应用采用了 iOS 的一些标准 UI 元素，这些元素也可以用于你自己的应用。如果你的应用允许用户发送电子邮件，你可以通过`Mail`从应用内发送邮件。`Mail`的应用图标在主屏幕上表现为一个带有白色信封的蓝色方框。


    ##### 标准邮件图标


    撰写工具用于在`Mail`应用中撰写电子邮件。该应用的图标是一个带有白色信封的蓝色方框。你会看到其他第三方电子邮件应用也在其图标上采用了这一主题的某种变体。如果你的应用是一个电子邮件应用，最好不要试图重新发明轮子。在你的应用设计中使用既定的设计范式和图标。


    撰写图标是一个常用图标，表示能够创建新文档。一旦用户点击该图标，一个新窗口将出现，允许用户创建新文档或电子邮件，其中包含一个已清空的字段，供用户输入新内容。这是一个被广泛接受的
    UI 范式。如果你的应用允许用户撰写新文档或电子邮件，请使用这个图标。


    #### 计算器


    图 2-13 中的`Calculator`应用也采用了新的扁平风格进行了重新设计。之前带有斜角的按钮已被扁平按钮取代，旧的光亮输入框也不复存在。现在，该应用使用不同的色调来区分键盘上不同按钮的功能。现在，你可以从控制中心以及闹钟处轻松访问新的计算器，这省去了之前需要进入设置菜单访问的步骤。


    ![9781430263647_Fig02-13.jpg](img/9781430263647_Fig02-13.jpg)


    图 2-13。iOS 7 中重新设计的`Calculator`应用


    #### 日历


    在 iOS 7 中，日历应用在纯白色背景上呈现出更简洁、干净的外观。它让你能够完成许多在旧版 iOS 中可执行的任务。然而，iOS 7 现在引入了可以一览整年视图的功能，如图
    2-14 所示。导航方式也略有不同。在 iOS 6 中，日历应用有列表、日和月的选择器；而在 iOS 7 中，从月视图中点击某个日期会进入日视图，若要查看所有过去和未来事件的列表视图，你需要点击
    iPhone 屏幕右上角的搜索图标。这并非最直观的设计，需要一些时间来适应。


    ![9781430263647_Fig02-14.jpg](img/9781430263647_Fig02-14.jpg)


    图 2-14。iOS 7 中日历应用的新外观


    #### 天气


    虽然所有 iOS 预装应用都经历了重大转变，但我最喜欢的当属`Weather`应用。这款应用不仅从头到尾进行了重新设计，还增加了精彩的新动画，极大地增强了应用的体验感。在这里，Apple
    很好地展示了如何充分利用全屏进行设计，这也是他们如今鼓励设计师们去做的。动画不仅反映了当前天气，还反映了所选城市的当前时间。屏幕最显眼的位置是当前城市、天气状况和温度。下方则是在行和列中均匀分布的逐小时天气与温度详细信息，便于阅读和查看（参见图
    2-15）。再往下是包含未来五天温度的每日天气预报。屏幕空间的运用非常均衡，微妙的背景动画更是画龙点睛之笔，尤其是它们仿佛在屏幕顶部和两侧自然飘散的效果。


    ![9781430263647_Fig02-15.jpg](img/9781430263647_Fig02-15.jpg)


    图 2-15。重新设计的`Weather`应用


    需要注意的是，`Weather`应用主要功能是展示信息，功能本身非常简洁。它有两种视图：多城市列表视图和单城市视图。用户可以通过左右滑动来浏览列表中的城市，也可以添加或删除城市。天气应用的界面在内容和功能上都很简单，但效果却非常好。


    关于`Weather`应用与雅虎自家天气应用的相似性也存在不少讨论。的确，`Weather`应用中的数据来源于雅虎和天气频道。两者的图标和链接都出现在该应用中。对这两款应用进行比较是合情合理的，绝对值得一看。


    **提示** 天气应用已成为苹果应用商店中最受欢迎的应用之一。如果你的应用将向用户提供查看天气信息的功能，研究这些应用的设计将有助于你形成自己的设计方案。


    ### 色彩、透明度与图层

