  raw: 'There are a few different ways to create a grid and gridlines, and this can
    get pretty complicated when it comes to gridlines and subdivisions, but we will
    use the gridlines provided with Photoshop and use them as a guide to keep our
    components on each screen aligned. You can also check out a selection of Photoshop
    plug-ins and extensions that are available that help with creating gridlines for
    everything from websites to apps. For now, we’ll keep it simple and get on with
    the business of designing our Travel Light app.


    The main canvas shown in in [Figure 7-2](#9781430263647_Ch07.xhtml#Fig2) is where
    you will do most of your work. To the left you will see the Tools panel with the
    main canvas in the middle. Note the shape of the screen matches the aspect ratio
    and dimensions of an iPhone screen and the layers panel on the far right. There
    are a number of ways to customize this screen. Photoshop allows you to only keep
    elements you find critical on the screen so that you are able to focus on the
    tasks at hand. I recommend playing around with different combinations to find
    a layout that works for you. For the purposes of designing our app, however, we’ll
    stick to this screen. I’ll describe the panels in further detail next.


    The Tools Panel


    The Tools panel is pretty much just that. All of the tools available to you in
    Photoshop will be located in this panel. The panel can be moved pretty much anywhere
    on the screen you like. But upon initial launch, it will be located to the far
    left. It is shown in [Figure 7-3](#9781430263647_Ch07.xhtml#Fig3).


    ![9781430263647_Fig07-03.jpg](images/9781430263647_Fig07-03.jpg)


    [Figure 7-3](#9781430263647_Ch07.xhtml#_Fig3). The Tools panel in Photoshop


    In order to view what each tool in the panel does, hold your pointer over it and
    the name of the tool will pop up just under it. It’s a good idea to do this for
    all of the tools in the panel so that you are at least familiar with what each
    tool is called and to get a sense of what it does. To select a tool, simply click
    on it in the panel. If you see a small triangle in the lower right, that usually
    means that there are additional options that you can select from within that tool’s
    menu. The organization of the Tools panel follows.


    Selection Tools


    In the selection section of the Tools panel, you’ll find the following tools that
    allow you to select various shapes:


    *   Move - Allows you to move a layer or image selection.

    *   The Marquee Tool - The marquee tool allows the user to make a selection in
    the shape of the tool (rectangular, elliptical, single column, and single row).

    *   The Lasso - The lasso tool allows the user to draw a freehand border around
    a particular selection like you would with a pen or pencil. This tool is also
    available as polygonal and magnetic tools. The magnetic lasso automatically detects
    the edge of a selection and the polygonal tool will draw along already-straight
    lines.

    *   The Quick Selection Tool – This tool lets you make selections based on color.

    *   The Magic Wand – The magic wand allows users to make selections in high-contrast
    images.


    Crop and Slice Tools


    The Crop and Slice tools allow you to extract a section of an image for your use
    or to create a series of smaller images from a main image. They include:


    *   Crop - The crop tool allows you to crop or remove areas of an image.

    *   Slice - These tools allow users to slice image selections for the Web or other
    use.


    Measuring Tools


    Measuring tools in Photoshop allow you to measure between two points in an image.
    Measuring tools are coupled with some other tools that also include:


    *   Eyedropper – Allows you to select a particular color for your foreground.

    *   Color Sampler – Primarily used in color correction, this tool will log a particular
    color area’s color value.

    *   Ruler – Allows you to measure the distance between two points.

    *   Note – Allows annotations to be added to an image or document.


    Retouching Tools


    The Retouching tools allow you to retouch and clean or even delete selected parts
    or portions of your image that need improvement. Tools in this section include:


    *   Spot Healing – Allows you to match textures from one image onto another to
    repair or cover imperfections in an image. Best for imperfections that are round.

    *   Healing Brush – Allows you to repair image imperfections that aren’t round.

    *   Patch – Repairs imperfections in images by blending two areas.

    *   Red Eye – Corrects the popular red-eye problem in photographs.

    *   Clone Stamp – Allows you to cover or to clone one part of an image onto another
    part of an image.

    *   Eraser – Allows you to erase unwanted portions of your image.

    *   Background & Magic Eraser – Allows you to remove unwanted backgrounds from
    images.

    *   Blur – Allows you to paint and make a portion of an image blurry.

    *   Sharpen – Makes an image looks sharper.

    *   Smudge – Allows you to smear or smudge a selection of an image.

    *   Dodge – Replicates a photographer’s dodging process. This tool lets you lighten
    part of an image.

    *   Burn – Cousin of the Dodge tool, this tool allows you to darken parts of an
    image.

    *   Sponge – Works to increase or to decrease a color’s saturation.


    Painting Tools


    The Painting tools allow you to paint or to replicate the act of painting with
    a brush or different types of tools. They allow you to change and customize the
    brushes to your preference and to choose from a variety of options. Painting tools
    include:


    *   Brush – Lets you paint with a brush and a variety of different tips.

    *   Pencil – Replicates drawing with a pencil.

    *   Color replacement – Allows you to swap one color for another when painting.

    *   Mixer Brush – Lets you create painting effects by “mixing” different colors.

    *   History Brush – Lets you revert to an older version of your work by painting
    over a selection to reveal the older version.

    *   Art History Brush – This tool takes the History Brush tool and adds an effect
    to it.

    *   Gradient – Lets you create a background or overlay that blends one color into
    another to create a gradient.

    *   Paint Bucket – Fills an area with a solid color.


    Draw & Type Tools


    The Draw and Type tools are for drawing shapes and writing or typing in an image
    you are creating. Tools in this section include:


    *   Pen Tool – Lets you click two anchor points and Photoshop will draw a line
    between them.

    *   Freeform Pen – Allows you to draw freehand as with a pen.

    *   Horizontal & Vertical Type – Add text to an image either horizontally left
    to right or vertically top to bottom.

    *   Mask Tools – Allow you to create outlines of text.

    *   Path Selection – Allows you to select a path that has been created by any
    of the other tools.

    *   Direct Selection – Allows you to select anchor points or parts of a particular
    path as opposed to an entire path.

    *   Shape – Lets you draw a number of different shapes (rectangle, ellipse, polygon,
    line, or custom shapes).


    View and Navigation Tools


    The View and Navigation tools allow you to move images around or to zoom in for
    a different view.


    *   Hand – Allows you to move images around on the screen.

    *   Rotate View – Allows you to rotate your particular view of an image.

    *   Zoom – Allows you to zoom in on an image.


    3D Tools


    3D tools allow you to manipulate and rotate 3D models in Photoshop. The tools
