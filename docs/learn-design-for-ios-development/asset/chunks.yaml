- fmt: '# Tab Bar Buttons


    Tab bar buttons must have different states as this will help users to understand
    when they have activated a button and within that section’s view. Even with the
    new “floating” tab bar in iOS 7, you will need to, as with all buttons, provide
    feedback and visual cues to your users so that they know when a button in the
    bar has been activated. For the tab bar, this can be achieved programmatically.


    # Slide-Out Navigation


    Recently, a new kind of mobile design pattern has emerged called the slide-out
    navigation. Popular apps like Facebook, Gmail for iOS, and Path have made this
    design pattern a new standard. But Facebook, in the redesigned version of its
    original iOS app, introduced the new pattern and it has been quickly adopted by
    others. It consists of a panel that is revealed by sliding the main content area
    to the right. That main panel area, then, reveals a new list view underneath that
    users can navigate through for additional content and views.


    The slide-out navigation can be revealed or activated by tapping a list button
    in the upper left hand corner of the app and then closed by tapping the same button
    or by the user swiping back to the left or right. In some apps, like Gmail for
    iPhone, the panel is initiated with a back button. This could be confusing for
    users, so it might be best to stick with the widely used list or menu button.
    This is a button that features three or four horizontal lines and somewhat resembles
    a table view. Note that when the menu button is activated, the panel as well as
    the button must all slide to the right and remain partially visible, allowing
    the user to quickly undo the action should he or she need to. Tapping an item
    in the new menu, however, will reveal the content related to that menu item and
    the panel will disappear completely to reveal the contents that correspond to
    that menu item. Tapping the menu button will bring the panel back.


    The slide-out navigation solution isn’t useful for every app, so think about its
    use. If your app is content heavy, then this type of navigation is for you. Even
    so, it is considered a secondary navigation solution. Thus, the more important
    elements should be at the top level view in the app’s hierarchy where users can
    access them easily. But it is a great tool for allowing users to jump around as
    they please.


    Some new apps like Jawbone’s `UP` app has taken this trend even further by having
    a slide-out navigation on both the left and right sides of the screen. Apps that
    use this feature are usually content heavy and so the dual slide navigation is
    a great way to segment content and functionality of your app. If you use the double
    slide-out navigation, make sure that your content is grouped contextually so that
    users know what they will find on each panel.


    # Image Gallery


    The image gallery navigation is great for segmenting content and presenting it
    in a visual way, usually with photographs as representatives for news stories
    and other content that changes often or tends to be frequently updated. The image
    gallery pattern lets users browse visually and uses images instead of icons. Image
    galleries can be easily navigated by scrolling through the images. For apps with
    lots of content, an image gallery is an easy, convenient, and engaging way to
    browse. Popular image apps like Instagram and 500px use this pattern to allow
    users to quickly navigate visual content.


    # Searching and Sorting


    If your app offers a search or sort feature, depending on the kind of app it is,
    it could very well be one of the most important aspects of your app. iOS offers
    the ability to search in a number of its stock applications. The Phone and Messages
    apps are shown in [Figure 5-4](#9781430263647_Ch05.xhtml#Fig4). It’s a good idea
    to replicate these search patterns in your app as users will already be familiar
    with the way that they work. Even if it seems obvious to you, make sure that search
    fields are labeled, either with the word `search` or with the familiar search
    icon (usually a magnifying glass). If a user will need to find the search function,
    he or she will not want to look far and wide for it. Making it easily recognizable
    will help.


    ![9781430263647_Fig05-04.jpg](images/9781430263647_Fig05-04.jpg)


    [Figure 5-4](#9781430263647_Ch05.xhtml#_Fig4). The Phone app’s search feature


    iOS 7 now offers users the ability to search their devices directly from the springboard.
    Once initiated, the user can begin to type a query and the results of the search
    are populated below. This `Spotlight` search features a cancel button to the right
    of the search field whether or not the user has typed a query. However, in the
    Mail app, the search bar is persistent from within any mailbox. The cancel button
    will only appear once the user begins to type the query. Either of these patterns
    is acceptable. But naturally, if your application is an e-mail app, I would follow
    the Mail pattern closely to avoid having users relearn how to perform this task
    specifically for your app.


    Some other search-related patterns are, in my opinion, fairly obvious but I will
    state them here anyway. Listing your results dynamically even as a user is typing
    is a nice touch as is segmenting them where necessary so that users can easily
    scan through for what they need. This is handled nicely in the iOS 7 `Spotlight`
    search. Search results are listed directly below the search box and show users
    the location of the results on the device and in alphabetical order. Thus, a “seri”
    search will yield results in Events, Mail, Messages, and anywhere else there is
    a matching term as is shown in [Figure 5-5](#9781430263647_Ch05.xhtml#Fig5).


    ![9781430263647_Fig05-05.jpg](images/9781430263647_Fig05-05.jpg)


    [Figure 5-5](#9781430263647_Ch05.xhtml#_Fig5). The search functionality in the
    `Spotlight` search and in the Mail app works slightly differently


    Sorting is usually performed after the search query has been completed and results
    have been displayed. Depending on the results, there are a few eloquent ways used
    to allow users to sort search results. For large result data sets, users may be
    required to sort results even more than the initial query. Segmenting results
    into chunks will allow users to further filter the results of their initial query.
    If you choose this route, it is important to name sections carefully to avoid
    confusing your users. For instance, you might be working on a location-based app
    that shows the user the nearest restaurant serving burgers. If you are displaying
    location-based results for such a business query for your users and your location
    is densely populated with burger joints yielding lots of businesses, you might
    want to further segment the results to allow users to sort nearby results (within
    a certain radius) as opposed to a huge list all of the results. So, an acceptable
    way to further segment these results would be within radii of 5 miles. Users will
    then be able to view businesses within 5 miles, 10 miles, 15 miles, and so on.


    # Tips, Tours, and Walkthroughs'
