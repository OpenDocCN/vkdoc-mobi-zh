  trans: '

    在考虑使用第三方工具进行资源准备时，有以下几点需要注意：


    - 首先用少量文件进行测试，确保结果符合你的需求。

    - 确保该工具会定期更新（通常可以通过查看其错误修复和更新日志来确认）。

    - 该工具的创建者或负责公司应为用户提供支持或帮助。

    - 阅读用户的评价或反馈，了解他人的看法。评价是判断应用或插件表现的重要指标。


    ## 为资源命名


    在创建要交付给开发者的资源时，务必确保文件命名遵循一致的规范。建议采用以下命名格式：


    - 标准格式：`<图片名称><设备修饰符>.<文件扩展名>`

    - Retina 或高分辨率格式：`<图片名称>@2x<设备修饰符>.<文件扩展名>`


    名称中的`<设备修饰符>`部分是可选的，并非必须。不过，如果你正在设计一款通用应用，并希望向开发者表明哪个资源属于特定设备，这会是一个很好的做法。


    在命名文件时，最好与你的开发者沟通，了解他们是否有偏好。但以下命名指南也可作为参考，特别是当你正在创建一款适配多种屏幕尺寸的应用时：


    - iPhone – `file.png` 或 `file∼iphone.png`

    - iPhone Retina – `file@2x.png` 或 `file@2x∼iphone.png`

    - iPhone 5 – `file-568@2x∼iphone.png`

    - iPad – `file∼ipad.png`

    - iPad Retina – `file@2x∼ipad.png`

    - 用于导出资源的第三方工具


    ## 为开发打包资源


    当你将文件切片、缩放并导出到一个文件夹后，应再次检查，确保所有文件都已为你的开发者正确标记。这样可以避免开发者在寻找文件位置时进行不必要的猜测。如果你已创建了设计规格文档，那么应在其中包含一个章节，说明你不仅用于命名文件的规范，还包括如何在各个文件夹中组织这些文件。如果你的开发者只愿意接收分层的
    PSD 文档，而不需要单独的 PNG 切片，那你很幸运。


    如今，越来越多的开发者拥有生成所需切片的方法，并且熟悉 Photoshop。这可以减少开发者和设计师之间因图片几个像素的偏差而可能出现的反复沟通。无论你的开发者是需要
    PNG 还是分层的 PSD，确保你的 PSD 文件具有直观命名的图层都变得非常重要。此外，有些开发者虽然能够自己切片 PSD，但可能并非“硬核”的 Photoshop
    专家。在交付给你的开发者之前，切记不要栅格化或拼合蒙版或图层，这样他们才能在需要时编辑文件而不损失质量。


    **提示** 栅格化图像会将其转换为单个图层，并且会失去在不损失质量的情况下调整图像大小的能力。


    ## 沟通是关键


    当你的文件已标记并打包好准备交付时，你可能还想与开发者安排一次通话或会议，以讲解设计中的细微差别，或解释可能需要额外说明的操作和动画效果。虽然你会尝试在设计规格文档中涵盖所有内容，但这都比不上一次良好的老式谈话。在会议前，将你的文档副本发送给开发者审阅，并请他/她准备好问题。无论你认为自己的文档多么清晰，很可能仍会有问题。任何在会议中得到解答或澄清的问题，都需要你更新文档。将答案记录下来，并向你的开发者发送一份新的、更新后的文档版本，以便在开发过程中作为参考。


    另一个最佳实践是，确保你的开发者知道如何联系你，以防他/她有后续问题。在设计规格文档中提供电子邮件地址和电话号码会很有帮助。保持开放的沟通渠道，是消除开发过程中猜测的好方法。


    ## 总结


    当你完成应用的设计和构思部分后，需要准备将资源交付给开发者。设计规格文档是消除开发过程中歧义的好方法。你将创建一份文档，其中包含尽可能多的关于你应用的信息。它应包括应用细节、目标、使用方式，更重要的是，它告诉你的开发者如何处理你将要提供的所有资源。如果有必要，你还需要提供颜色、字体和文本、交互和动画等细节。然后，你将进入资源的切片和缩放环节，以便在
    iOS 中使用。所有切片后的资源都必须导出为 PNG 格式，因为 PNG 支持透明度并且图像质量很高。当这些资源被命名和组织好后，你将把它们与设计规格文档一起打包，移交给开发者。如果可能，你还可以安排一次面对面交流，并为你的开发者提供一种联系你的方式。无论你是使用本章概述的方法还是使用第三方工具来切片和缩放资源，遵循这些通用指南都将有助于从设计到开发的平滑过渡。


    ## 第 10 章


    # 设计最佳实践与应避免的错误


    你已经将你的想法从构思阶段推进到现在，如果你已将应用交付给开发者，或者甚至自己开发完成，那么你已经准备好将应用提交到应用商店了。恭喜你！这是一个巨大的里程碑，如果你从头到尾跟进了本书，希望你对结果感到满意。本书包含了大量信息，所以我在为你的应用设计之旅准备了一份清单。它基本上是对本书所述所有原则的重述。


    应用开发中最常被忽视的方面之一就是设计。但希望通过本书中介绍的工具和方法，我为你阐明了这个过程。界面的外观和感觉是你应用中最关键的方面之一。你的受众会根据你在应用商店截图中显示的界面来对你的应用做出初步评估。一些最简单、最直观的应用往往最受欢迎。


    虽然简洁很重要，但在简洁与功能性之间取得平衡也至关重要。有些应用设计过度，包含了太多花哨的功能，这反而会削弱应用的总体功能。这就是为什么不断回顾你的应用陈述如此重要。在完成设计过程时，始终牢记应用的目标，这样你就不会出错。以下章节将本书分解成一个有用的清单，总结了设计应用时的最佳实践和应避免的错误。


    ### 创建应用设计陈述


    应用设计陈述是你的应用存在的理由。它是一个简短的、容易记住的、描述你的应用的陈述：它是什么、为什么存在，以及最重要的是，它如何运作。定义你的应用及其目标受众。保持描述简短，并能向任何询问的人复述出来。我们为虚构的
    Travel Light 应用创建的应用设计陈述是：“Travel Light 应用将通过提供清单来帮助频繁旅行者，确保他们只为即将到来的行程打包必需品。”


    这个陈述可能会随着你的应用创建而演变和改变，但记住它并在你的想法改变时更新它是一个好主意。


    ### 人机界面指南是你的设计圣经，请善用它

