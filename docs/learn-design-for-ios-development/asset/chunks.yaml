  trans: '

    1.  `你是否理解这个应用试图解决的问题是什么？`

    2.  `如果不理解，缺失了哪些信息？`

    3.  `是否清楚这个应用的目标用户是谁？`

    4.  `你会使用这个应用吗？为什么？`

    5.  `你会改变什么？`


    简要说明关于该应用的想法：它做什么，以及它将如何工作。然后提出几个关键问题，这些问题将帮助你获取能进一步深化这个想法的信息。这些问题应具有引导性，旨在引出尽可能具体的回答。在构思阶段的这一节点，回答越具体，对你而言价值就越大，并且有助于为你的应用设计提供参考。


    在这个阶段，你们中的一些人可能不愿与他人分享自己的想法。在这个专利流氓和版权侵权盛行的时代，你很容易认为分享想法是不妥当的。请记住，想法无法被版权保护，因此在流程的初期就获得关键反馈至关重要。如果你担心向更广泛的群体分享想法，那么就坚持找一个你信任的核心团队。只要朋友、同事，甚至家庭成员符合你应用的目标人群定位，都可以。


    这个过程也不必是一场漫长而曲折的事情。你对应用的描述、它做什么，再加上几个能引出最佳反馈的简短问题，就足够了。


    完成这一步并收到口头或问卷形式的答复后，仔细审阅所有答复。答案是否清晰？是否需要提出后续问题以澄清？如果需要，那就去做。待这一切完成后，坐下来，带着你的想法和收到的反馈，一边回顾反馈，一边审视你的想法描述。你该如何修改你的想法，以解决反馈中概括出的问题？


    需要注意，并非所有反馈都是好反馈。有些反馈，你需要持保留态度。一条好的经验法则是，考虑那些能让你的想法更接近应用核心的反馈和建议。如果收到的反馈有助于你解决应用所针对的问题，那就加以考虑。你是否收到了意料之外、可能让你重新思考想法的反馈？这完全没问题。


    如果你需要重写你的想法陈述和描述，那就去做，并再次对照你所收到的反馈进行检查。保存所有你收到的反馈，即使你在项目的这个阶段并未使用它们。随着你进入设计流程的后续阶段，它们也会派上用场。


    ## 第三步：将你的应用与其他应用进行比较


    在这一步，我们将真正开始扩展你在第一步中为应用创建的初始想法。既然你已经通过一个小型潜在用户对照组验证了该想法，现在我们需要看看你的想法与苹果应用商店中现有应用相比如何。


    自 2008 年应用商店携 500 个应用上线以来，iOS 设备可用的应用数量每年都在呈指数级增长。如前所述，截至 2013 年 6 月，苹果应用商店中约有
    90 万个应用。竞争可谓非常激烈！幸运的是，苹果在应用分类方面做得相当出色，而且你可以直接从 iPhone、iPad 或 iPod Touch 上轻松访问和浏览应用商店。


    一个好的起点是应用商店的“精选”栏目或标签页。在这里，你会看到商店的“新款佳作”和“热门应用”板块。这些是由苹果编辑团队挑选出来，展现一流可用性、设计和功能的应用。正因如此，它们被苹果推荐，并且在人气和销量方面表现极为出色。通常，这些应用在提交到应用商店时会被标记为独特应用。苹果的编辑团队试图挑选那些在某些方面具有创新性的应用，在应用商店中进行推荐。很有可能，你已经拥有其中一些应用，但由于每天发布的应用数量庞大，你可能会看到一些之前从未见过的新应用。“新款佳作”和“热门应用”板块中的应用来自各种类别。浏览不在你的应用特定类别中的应用，以及那些与你的应用同类的应用，以便能够看到各种风格和功能，这是一个好主意。


    同时，也看看“排行榜”中的应用，以了解当前哪些应用最受欢迎。导航到每个应用的页面，特别注意每个应用的描述和截图。是否有任何线索能说明是什么让这个应用在其特定类别中脱颖而出？请注意，你会发现在一个类别中有多个功能相同的应用。例如，“游戏”是苹果应用商店中最受欢迎的类别，遥遥领先于“教育”、“娱乐”和“生活”等类别。这些类别中塞满了应用，而且每天都有更多的应用在设计、开发、审核和发布。如果你的应用目标是这些类别之一，那么它确实需要做到脱颖而出。


    当你浏览热门应用列表时，务必导航到应用商店中每个应用的页面。注意应用的图标、名称、描述、截图，以及最后但同样重要的评论数量和平均评分。应用商店“新款佳作”板块中列出的大多数应用都有令人印象深刻的下载量、评论和高评分。评论和评分对任何应用来说都是重要的统计数据。它们会醒目地显示在你的应用在应用商店的页面上，因此你自然希望你的应用受欢迎且设计精良，以便从用户那里获得高评分。


    在查看应用页面时，你会发现所有应用都需要提供截图。看看那些更受欢迎应用的截图。注意那些让你眼前一亮的截图。请注意，基于截图，你也许能大致了解其功能。但这不是此项练习的目的。利用截图来感受每个应用的设计美学。该应用的用户界面有何独特之处？注意配色方案，以及根据你在页面上能看到的内容来判断哪些是有效的。这些因素中的任何一个是否会让你更倾向于或不太愿意下载该应用？记下原因。


    特别关注那些与你想要创建的应用属于同一类别的应用。它们之间有相似之处吗？你能从应用商店的应用页面中，就功能和设计获取到什么线索？

    '
- fmt: '## App Store 竞品分析指南


    ### 第一步：浏览用户评论


    应用商店中的每个应用都会有用户评论。每位顾客都可以在应用的商店页面上发布公开评论和评分，所有人都能看到这些内容。请务必阅读你所在类别中排名靠前的应用以及那些吸引你的应用的前10条左右的评论。试着了解每位评论者的主要关注点。他们是在称赞这款应用吗？还是在贬低它？评论者有时可能非常直言不讳，但最严厉的评论中也往往隐藏着真相的碎片。因此，如果用户愿意花精力撰写评论，那么其中一定有某些值得参考的要点。


    如果你已经下载了这些应用（当然要根据你的预算来），请确保亲自使用它们，并阅读一些最好的和最差的评论，从而平衡地了解应用中存在的问题。将这些与你自己的应用进行比较。试着确定你的应用能否填补这些应用（特别是你所在类别的应用）留下的市场空白。同时记录下这些发现。


    ### 第二步：关注应用评测网站


    你也可以尝试访问应用评测网站。这些网站会在应用商店系统之外对应用进行审查和评级。你在这里找到的内容质量可能参差不齐，但你也可能发现一些在应用商店中找不到的应用。关于苹果应用商店搜索难度的讨论一直存在，但了解苹果认为哪些是应用设计的最佳范例仍然很有帮助。


    ### 第三步：分析你的发现


    这是项目的一部分，我们在此汇总从应用商店以及我们自身收集到的所有数据。


    制作两个列表。第一个列表将包含你最近在应用商店探索中最喜欢的应用。你为什么会被这些特定应用吸引？描述这些应用的突出之处。它们有什么独特之处？是因为它们的名称、标志设计还是截图？是否有任何应用与你的想法相似？是否有应用属于与你应用相同的类别？请特别关注这些应用。你的应用与其他热门应用之间是否存在大量相似之处？如果是，你如何将自己的应用与它们的区分开？如果需要，请重新审视描述你应用的那句话，思考你的应用将如何与众不同，以及如何避免重复造轮子。


    **列表一：**


    *   应用#1 – 优秀的设计

    *   应用#2 – 名字奇怪，与功能无关

    *   应用#3 – 喜欢它的配色方案


    第二个列表将包含那些与你的想法应用属于同一类别的应用。该类别中排名靠前的应用是哪些？在你看来，这些应用做对了什么，又做错了什么？密切关注那些评分高、下载量大的应用。用户在说什么？记录下这些应用中任何独特、正面或负面的亮点。此外，注意关于你所在类别的其他信息。你类别中的大多数应用是付费应用还是免费应用？在评分最高、评论最好、下载量最大的应用中是否存在一致性？当你查看截图时，是否发现这些应用的界面（`UI`）有任何相似之处？它们在哪里做得很好？


    **列表二：**


    *   应用#1 – 与我的应用非常相似。评论抱怨价格太高。

    *   应用#2 – 易于使用，非常受欢迎，是该类别排名第一的应用。

    *   应用#3 – 受到苹果推荐，设计精美，界面友好，易于使用。


    以`Utilities`（实用工具）类别为例。这个类别包含许多具有相似功能的应用。`To-Do`（待办事项）应用就是一个完美的例子。应用商店中有不少这类应用，它们都有一个共同的目标：通过允许用户分类任务、创建列表，来帮助用户管理时间或项目。然而，每个应用处理问题的方式都不同，虽然核心任务可能相同，但每个应用都与其他应用有明显区别。它们在用户界面（`UI`）、功能和配色方案上各不相同。仅凭这些因素，就能让两个执行类似任务的应用看起来截然不同。请思考这与你的应用的关系，以及在一个可能已经饱和的领域中，什么能让你的应用脱颖而出。


    一个已经饱和的领域并不是放弃你创意的理由。毕竟，应用商店里有近百万个应用，你很难找到一个尚未饱和的领域。因此，不要将可能饱和的类别视为成功的障碍，而应将其视为推动你找到独特方法来解决一个普遍问题的动力。它将迫使你跳出思维定势，为现有问题创造一个真正原创的解决方案。


    ### 第四步：为将来参考保存竞品应用


    如果可能，请尽量下载你列表中的应用。希望大多数是免费的，其他的也不会太贵。通常，应用商店中的应用价格从免费到3.99美元不等，但也有一些可能更贵。根据你的预算下载。价格超过3.00美元左右的应用被认为是高级应用，你需要自行决定能负担哪些。


    如果你选择不购买应用，可以尝试在互联网上寻找这些应用的评测。如果一款应用在应用商店中被推荐，那么它很可能也出现在`Mashable`、`Tech Crunch`或`Venture
    Beat`等热门科技期刊中。有时，这些文章会比应用商店中的描述更详细地介绍应用的用户界面和功能。快速谷歌搜索应该能帮你找到一些顶级应用的不错评测。如果你对下载一个可能不会使用的应用犹豫不决，或者它超出了你的预算，这可以为你省下一些钱。


    应用下载完成后，将它们放在一个名为“`Research`”（调研）或其他能提醒你其用途的文件夹中。如果需要，你可以进一步将应用分类到标有“付费”、“免费”等文件夹中。将这个文件夹放在手机上方便获取的位置，以便需要时轻松访问。在整个过程中，你将反复参考这些应用，以帮助你的创意构思过程。


    ### 第五步：根据需要修正你的创意


    一旦你下载了应用并进行了分类，真正的乐趣就开始了。将你对应用的“一句话描述”放在手边（或者你现在应该已经记住了所有不同的版本），更深入地探索你下载的应用。最初，计划在每个应用上至少花费半小时。你会发现，根据应用做得好的方面，在每个应用上花费的时间可能会少于或多于半小时。也请记录这一点。你可能需要考虑的其他问题包括：


    *   这些应用在哪些方面做得好？

    *   它们在哪些方面失败了？

    *   它们的用户界面有哪些独特元素？

    *   它们易于使用吗？


    更重要的是，它们与你想要创建的应用有何关联？


    请特别关注那些与你创意应用属于同一类别的应用。它们与你应用试图解决的核心问题相比如何？'
  raw: 'Every app in the app store will have reviews. Every customer is able to post
    a public review and rating to the app’s page in the app store that everyone will
    be able to read. Be sure to read the first 10 or so reviews of the top apps in
    your category as well as those of the apps that appeal to you. Try to get a sense
    of each reviewer’s main concerns. Are they praising the app? Are they trashing
    it? Reviewers can sometimes be brutally honest, but hidden in some of the most
    brutal comments are nuggets of truth. So, if users are passionate enough to write
    a review, there must be some valid points somewhere. If you have downloaded the
    apps (of course do what your budget allows), then be sure to use the apps and
    read some of the best and worst reviews to get a balance sense of what the issues
    in the app are. Compare these to your app. Try to ascertain if your app can fill
    the void created by some of these applications, especially ones in your category.
    Make a note of these as well.


    You may also want to try app review sites. These are sites that review apps and
    rate them outside of the app store system. The quality of what you find here might
    vary but you might also find apps that you don’t find in the app store. The difficulty
    of searching Apple’s app store have been debated but is good to get a sense of
    what Apple deems to be a great example of app design.


    Step Four: Analyze your findings


    This is the part of the project where we collate all of the data we’ve collected
    from the app store and from our own.


    Make two lists. One list will contain your favorite apps from your recent app
    store exploration. Why were you drawn to these particular apps? Describe what
    stood out to you about these apps. What is unique about them? Was it their names,
    logo designs, or screenshots? Are there any apps that are similar to your idea?
    Do any of the apps fall into the same category as your app? Pay special attention
    to those. Are there lots of similarities between your app and other popular apps?
    If so, how can you differentiate between yours and theirs? If you need to, revisit
    your sentence describing your app to think about how your app will be different
    and how not to reinvent the wheel.


    List One:


    *   App #1 – Great design

    *   App #2 – Silly name. Has nothing to do with what it does

    *   App #3 – Love the color scheme


    The second list will contain the apps that are specifically from the same category
    as your idea app. What are the top apps in that category? What are these apps
    doing right and what are they doing wrong in your opinion? Pay close attention
    to apps with high ratings and downloads. What are users saying about them and
    note anything that stands out as unique, positive or negative about these applications.
    Note anything else about your category. Are most of the apps in your category
    paid apps or free apps? Is there any consistency among the top rated apps with
    the best reviews and highest downloads? When you look at the screenshots do you
    see any similarities in the UI of these apps? What do they do well?


    List Two:


    *   App #1 – Very similar to my app. Reviews complain about price point.

    *   App #2 – Easy to use. Very popular. Number1 app in the category.

    *   App #3 – Recommended by Apple. Great design and UI. Easy to use.


    Take, for instance, the Utilities category. This category contains many apps with
    similar functionality. The To-Do apps are a perfect example of this. There are
    quite a few of these applications in the in the app store, and they all have a
    similar goal: to help users manage their time or projects by allowing them to
    categorize their tasks and by creating lists. Each app, however, treats the problem
    in a different way and while the core task of each application may be the same,
    each application is markedly different from the other. Each differs in terms of
    UI, functionality, and color palette. These things alone can make two apps that
    do similar tasks appear completely different. Think about this in relation to
    your app and what will make it stand out in a field that just might be already
    saturated.


    An already saturated field isn’t a reason to abandon your idea. After all, with
    almost a million apps in the app store, you’d be hard pressed to find a field
    that isn’t already saturated. So, rather than seeing a potentially saturated category
    as a barrier to success, think of a saturated field as something that could push
    you to find a unique way to solve a very popular problem. It will force you to
    think outside the box and to create a truly original solution to an existing problem.


    Step Five: Store comparative apps for future reference


    If you can, download as many of the apps on your lists as possible. Hopefully,
    most of them are free and the others aren’t too expensive. Usually apps in the
    app store range from free to $3.99, but there are others that can be more expensive.
    Download what your budget allows. Apps costing more than $3.00 or so are considered
    premium apps and it is up to you to decide what you can afford.


    If you choose not to buy apps, try to find reviews of those apps on the Internet.
    If an app is featured in the App store, then it is likely that it has been featured
    in popular tech journals like *Mashable*, *Tech Crunch*, or *Venture Beat*. The
    articles will sometimes go into greater detail about the user interface and functionality
    of the apps than the description in the app store. A quick Google search should
    yield a good selection of reviews of some of the top apps. This can save you some
    cash if you’re hesitant to download an app that you won’t likely use or one that
    is not compatible with your budget.


    Once the apps have been downloaded, place them in a folder with a title like “Research”
    or another title that will remind you of its purpose. If you need to, you can
    further categorize the apps in folders marked paid, free, etc. Keep the folders
    handy on your phone where you can easily access them if you need to. Throughout
    this process you will be referring back to these applications to help you with
    your ideation process.


    Step Six: Revise your idea if needed


    Once you’ve downloaded the apps and categorized them, the real fun begins. Keeping
    your one-sentence description of your app handy (or you should have memorized
    all of the various versions by now) explore the apps you’ve downloaded in greater
    depth. Initially, plan to spend at least a half an hour with each app. You will
    find that depending on what the app does well, you may spend less or more time
    with each one. Note this, too. Other questions you might consider asking yourself
    are:


    *   What do these apps do well?

    *   Where do they drop the ball?

    *   What are the unique elements of their UI?

    *   Are they easy to use?


    More importantly, how do they relate to the app you would like to create?


    Pay particular attention to apps that are in the same category as your idea app.
    How do they compare to the core problem that your application is trying to solve?'
