    如果可能，请尽量下载你列表中的应用。希望大多数是免费的，其他的也不会太贵。通常，应用商店中的应用价格从免费到 3.99 美元不等，但也有一些可能更贵。根据你的预算下载。价格超过
    3.00 美元左右的应用被认为是高级应用，你需要自行决定能负担哪些。


    如果你选择不购买应用，可以尝试在互联网上寻找这些应用的评测。如果一款应用在应用商店中被推荐，那么它很可能也出现在`Mashable`、`Tech Crunch`或`Venture
    Beat`等热门科技期刊中。有时，这些文章会比应用商店中的描述更详细地介绍应用的用户界面和功能。快速谷歌搜索应该能帮你找到一些顶级应用的不错评测。如果你对下载一个可能不会使用的应用犹豫不决，或者它超出了你的预算，这可以为你省下一些钱。


    应用下载完成后，将它们放在一个名为“`Research`”（调研）或其他能提醒你其用途的文件夹中。如果需要，你可以进一步将应用分类到标有“付费”、“免费”等文件夹中。将这个文件夹放在手机上方便获取的位置，以便需要时轻松访问。在整个过程中，你将反复参考这些应用，以帮助你的创意构思过程。


    ### 第五步：根据需要修正你的创意


    一旦你下载了应用并进行了分类，真正的乐趣就开始了。将你对应用的“一句话描述”放在手边（或者你现在应该已经记住了所有不同的版本），更深入地探索你下载的应用。最初，计划在每个应用上至少花费半小时。你会发现，根据应用做得好的方面，在每个应用上花费的时间可能会少于或多于半小时。也请记录这一点。你可能需要考虑的其他问题包括：


    *   这些应用在哪些方面做得好？

    *   它们在哪些方面失败了？

    *   它们的用户界面有哪些独特元素？

    *   它们易于使用吗？


    更重要的是，它们与你想要创建的应用有何关联？


    请特别关注那些与你创意应用属于同一类别的应用。它们与你应用试图解决的核心问题相比如何？

