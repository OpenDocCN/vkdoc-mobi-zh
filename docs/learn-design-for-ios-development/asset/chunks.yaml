- fmt: 'For illustrative purposes, I’ve chosen the Submit button from the Travel Light
    app as an example asset that I will be slicing. As this is a button, we will need
    to have an on and off state for it. This means that when the user will be interacting
    with this element, its appearance should change or give the user visual confirmation
    that action is taking place. Make sure to select all appropriate layers.


    3.  To select multiple layers, you will need to hold down the “Command” button
    on your keyboard (Mac) while selecting the layers you need with your mouse or
    keypad.


    The layers should be highlighted as you select them as shown in [Figure 8-2](#9781430263647_Ch09.xhtml#Fig2).


    ![9781430263647_Fig09-02.jpg](images/9781430263647_Fig09-02.jpg)


    [Figure 8-2](#9781430263647_Ch09.xhtml#_Fig2). Holding down the Command key allows
    you to select multiple layers for your asset


    **Tip**  If a button is used on multiple screens in your app, then remove the
    type and simply annotate everywhere it is used in your Design Spec doc. For each
    instance or use of the button, you must also specify the right font, size, and
    color of the copy for that button. This can be accomplished programmatically and
    save time.


    4.  Now that you’ve selected your layers, convert them into Smart Objects as I’ve
    done in [Figure 8-3](#9781430263647_Ch09.xhtml#Fig3) by going to Layers ![arrow.jpg](images/arrow.jpg)
    Smart Object. Smart Objects are layers that contain data from vector images.


    ![9781430263647_Fig09-03.jpg](images/9781430263647_Fig09-03.jpg)


    [Figure 8-3](#9781430263647_Ch09.xhtml#_Fig3). After selecting all of the layers
    associated with your asset, convert it to a Smart Object


    **Tip**  Converting your layers to Smart Objects will allow you to edit your image
    without losing the original image data or quality.


    After converting your layers to a Smart Object, you will see the new layer appear
    in the Layers panel.


    5.  Select the new Smart Object you’ve just created from the Layers panel.

    6.  Right-click to pull up the Export Contents of that as shown in [Figure 8-4](#9781430263647_Ch09.xhtml#Fig4).
    Photoshop will ask you to choose a location for the file you are about to save.
    The new Smart Object file will have a `.PSB` extension.


    ![9781430263647_Fig09-04.jpg](images/9781430263647_Fig09-04.jpg)


    [Figure 8-4](#9781430263647_Ch09.xhtml#_Fig4). Export the contents of your Smart
    Object by selecting the Export Contents option from the drop-down menu


    **Tip**  If a Smart Object was created from a number of layers, then it will be
    exported in PSB format.


    7.  Find and open the exported file where you saved it and then select the layer
    with the asset you would like to save.


    For our Submit button, we’ve removed the type and the only thing remaining is
    the actual button. Once this has been inspected and is to your liking, the Smart
    Object will need to be saved as a PNG so that it can then be imported into Xcode
    for use in your app.


    8.  Select Save For Web Devices from the drop-down list in the File menu. You
    will be given the option to save your asset in a variety of formats. Make sure
    you choose the PNG-24 option from the list provided. Also, make sure to avoid
    using interlaced PNGs if that option is provided. The drop-down with the options,
    GIF, JPEG, PNG-8, and PNG-24 are shown in [Figure 8-5](#9781430263647_Ch09.xhtml#Fig5).


    ![9781430263647_Fig09-05.jpg](images/9781430263647_Fig09-05.jpg)


    [Figure 8-5](#9781430263647_Ch09.xhtml#_Fig5). The Smart Object for export as
    a high-quality PNG-24. PNG-24 format preserves transparency


    **Tip**  The PNG-24 option ensures the highest quality for your image. Apple recommends
    24 as the standard bit depth for icons and images. There are 8 bits for each channel:
    red, blue, and green as well as an 8-bit alpha channel. Thus, the 24-bit PNG.


    9.  After you select PNG-24, you should save the image in a memorable folder and
    call it `"Submit_btn_off@2x"`. When you save the on state of the button, you want
    to maintain consistency in your naming conventions, so, your on or activated button
    name would be something along the lines of `"Submit_btn_on@2x"`.

    10.  If you haven’t already created a new folder for your new assets, then do
    so. Choose this carefully, as it should be your location for all of the new assets
    you will be exporting. It is important that all of your assets live in the same
    folder.


    And with that, you’ve just saved the first asset for your app. You will need to
    do this a few more times to get the hang of it, but once you do, it should go
    by quickly with each attempt.


    This button we’ve just created, however, is a hi-res button. Let’s now go through
    the process of how to scale the button down for our non-Retina devices.


    ## Scaling and Saving Your Assets for Various Devices


    Scaling and slicing your assets go hand in hand.  After slicing your images, you
    will need to save your 2x files first and then scale down making the files half
    the size for non-Retina screens. I prefer to scale down from a larger, higher
    resolution design to a smaller design because it maintains the integrity of the
    image better.


    The process of saving your assets to a smaller scale is quite simple. Navigate
    to Image>Image Size to adjust the dimensions. We will need to modify the actual
    size of the button from its existing size to half its original size. There’s been
    some discussion about dpi as it relates to design for iOS. It is my opinion that
    dpi does not really matter when it comes to designing for iOS. So, for this process
    we will leave the dpi as it stands at 72. [Figure 8-6](#9781430263647_Ch09.xhtml#Fig6)
    shows the newly adjusted image size settings for our new non-Retina button. Navigate
    to File ![arrow.jpg](images/arrow.jpg) Save and save the new button as `"Submit_butn_off.png"`.
    Follow the same instructions, as before in saving the file in PNG-24 format as
    well as the previously established naming convention and you’ll be all set.


    ![9781430263647_Fig09-06.jpg](images/9781430263647_Fig09-06.jpg)


    [Figure 8-6](#9781430263647_Ch09.xhtml#_Fig6). To create a non-Retina button,
    reduce the dimensions of the @2 button by 50%


    To slice export and scale additional assets, follow the same process as outlined
    in the “Slicing Your Designs in Assets” section.


    Slicing and scaling image selections for large PSDs can become tedious if you’re
    going through the aforementioned slicing steps for a large number of assets. There
    are a number of tools available to assist designers in this process. Some of them
    are independent tools and others are plug-ins that work with Photoshop. Some of
    these are very popular. As always, try out a tool with a test PSD to ensure that
    it works the way that you need it to and make sure that it integrates with your
    workflow.


    ## Other Asset Preparation Tools


    If you are exporting a fair amount of images that are similar or even identical
    for some reason, you might be able to use the Export Layers to Files script in
    Photoshop. Select File ![arrow.jpg](images/arrow.jpg) Scripts ![arrow.jpg](images/arrow.jpg)
    Export Layers to Files and run the script. Photoshop will make sure that each
    layer of your document is saved in a different file. The file name will be whatever
    the name of the layer is so that you are able to identify it. In my opinion, this
    is a tool that has limited use cases so be careful when using this. You may want
    to make sure that your layer names are exactly what you want them to be before
    using this tool.


    There are also more than a few third-party tools that can be used to assist with
    the asset preparation process for your iOS application. Some are executables and
    others are plug-ins that work with Photoshop. If you decide to use a third-party
    tool to assist with your asset preparation process, you will need to do some due
    diligence.'
