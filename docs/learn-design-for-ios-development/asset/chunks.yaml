  trans: '

    # 为 iPhone 和 iPad 进行设计


    为 iPhone 和 iPad 进行设计需要清晰了解这两款设备的用户界面。两者之间存在相似之处，并且有明确的指南和文档遵循这些准则，以确保你的应用符合 Apple
    制定的标准。然而，即便如此，你的设计中仍有足够的空间来发挥创意和独特性。虽然 Apple 在执行其设计指南和规则时可能显得严格，但总有实验的余地，并且他们鼓励在设计中（尤其是那些清晰体现出对
    iOS 底层构建原则深刻理解的设计）进行尝试。


    我们在上一章中介绍了标准 UI 元素，因此现在我们将进入如何熟悉设备用户界面的部分。开始熟悉 UI 的一个好方法是下载一个免费提供的 iOS GUI 工具包。GUI
    工具包适用于 iPhone 和 iPad，而且大部分都是免费的。Teehan & Lax 和 Applidium 都制作了适用于 iOS 6 和 7 的 PSD
    格式 GUI 工具包。


    一旦你下载了所选格式的 GUI，你将能够更详细地探索各种元素。将文件导入你选择的图形软件中；这样你就可以开始与它们交互。其中大部分工具包由设计师和设计工作室创建，旨在帮助设计社区，这样你在开始设计应用程序时就不必重复造轮子。


    打开 GUI 后，仔细观察它们与实际设备上的显示效果相比如何。大多数元素都会包含一系列栏（如状态栏、标题栏、标签栏等），以及按钮、操作列表（图 4-1）、键盘和图标。你应该能够查看它们，甚至如果需要更仔细地检查，可以将其从
    GUI 中移除。


    ![9781430263647_Fig04-01.jpg](img/9781430263647_Fig04-01.jpg)


    图 4-1. iOS 7 自带邮件应用中的操作列表


    **注意：** 操作列表是 iOS 中的一个菜单，为用户显示一组选项。这些选项通常与用户发起的某个任务相关。邮件应用中的操作列表如 图 4-1 所示。


    熟悉每个用户界面元素，并开始思考每个元素将如何在你的应用中使用。


    -   你会使用哪些栏？

    -   你是否需要为菜单中的状态栏创建自定义图标？

    -   你的应用会有独特的配色方案吗？

    -   你将如何向用户呈现关键信息？

    -   每个元素如何帮助用户在应用中的使用历程？


    花必要的时间熟悉 UI；之后，你就可以开始思考如何为用户定制体验。你不必按原样使用所有元素。对于应用的 UI，你有相当大的灵活性和创造力。但在迈出这一步之前，首先理解基础非常重要。这正是本章的目的。


    ## UI 中手势的使用


    iOS 界面针对独特的多点触控体验进行了优化。因此，屏幕上的元素响应触摸或手势，而不是点击。因此，务必始终牢记，用户必须感觉仿佛在与内容直接互动。你的设计必须让用户体验沉浸式的应用互动。哪些元素能让他们做到这一点？用户通过使用特定的手势与
    iOS 进行交互。这些手势不仅已成为 iOS 中的常见操作，也在其他多点触控平台和操作系统中普及；然而，其中一些手势是由 Apple 首创的。


    在讨论 iOS 的手势时，有两个重要概念需要考虑：前面提到的一致性和直接操纵。


    ### 手势的一致性


    在为应用考虑用户界面元素和适当的手势时，一致性是关键。请使用那些与既定最佳实践和用户期望一致的操作手势。如果用户向左滑动，期望面板或内容随之向左移动，但它却向右移动，那么你就在用户和界面之间造成了严重的脱节。用户将不得不花时间去理解你的应用中每个手势的含义，这会带来令人困惑的体验，尤其是在他们离开你的应用，与原生
    iOS 应用或其他遵循既定规则的交互时。


    如果你的应用界面元素与 iOS 标准不一致，或者错误或不同地使用了系统级的控件、视图和图标，你应该考虑更改它们。否则，你的应用可能会被应用商店拒绝。


    ### 手势的直接操纵


    直接操纵是手势控制的一个概念，指的是像对待真实物体一样与屏幕上的对象进行交互。因此，点击按钮就像在现实生活中按下按钮。拉动控制杆就像拉动真实的控制杆或滑块。iOS
    正是基于这一手势控制原则。它让用户感觉仿佛真的在操纵控件。这些直接操纵控件遍布 iOS 系统，现在用户应该已经熟悉了。例如主屏幕上的“滑动解锁”和邮件应用中的“下拉刷新”等操作，现在在其他应用中也已流行。用户会凭直觉执行这些操作，无需指示，并且在许多情况下，他们期望你的应用也能支持这些操作。这类手势之所以受用户欢迎，是因为操作和结果之间存在直接而即时的关联。用户会感觉仿佛真的在生活中执行了该操作。设计师和开发者应在用户明显会期望这些手势的应用场景中使用它们。不使用它们可能会让用户群体感到沮丧。


    ### 抽象手势与反馈


    抽象命令和手势是指那些在操作与屏幕显示内容之间几乎没有或完全没有关联的手势。由于这些手势对用户来说并非立即可理解，因此它们需要用户进行一定程度的记忆。如果你必须使用抽象手势，请确保已在目标群体中进行过测试，以避免引入用户不熟悉的手势而疏远你的受众。用户需要记住你通过应用引入的新抽象手势，并学会将它们与特定操作关联起来，才能成功浏览和与你的应用互动。


    iOS 总体上很好地避免了抽象手势，但有些应用虽然本身并非抽象，却要求用户为新的操作记住新的手势，即使这些手势与屏幕显示的内容有直接关联。流行的邮件应用 Mailbox
    就是这样一个例子。使用过原生邮件应用的用户会发现，他们需要学习各种操作的新手势。例如，在 Mailbox 中，向右滑动可以归档一条消息，但向右长滑则会将消息放入废纸篓。向左滑动可以让用户稍后提醒一条消息，而向左长滑则会将消息添加到多个列表中。该应用使用彩色指示器作为视觉反馈，让用户知道他们正在执行什么操作，但这些手势需要一些时间适应——尤其是如果用户一直在使用标准邮件应用的话。幸运的是，应用的制作者提供了一个有帮助的教程，可以从应用的“帮助”部分轻松访问。Mailbox
    应用和 iOS 邮件应用的视图如 图 4-2 所示。


    ![9781430263647_Fig04-02.jpg](img/9781430263647_Fig04-02.jpg)

