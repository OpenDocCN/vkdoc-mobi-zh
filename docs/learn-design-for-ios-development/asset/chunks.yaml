  trans: '

    # 标签栏按钮


    标签栏按钮必须具有不同的状态，这有助于用户理解何时激活了按钮并进入了该部分的视图。即使在 iOS 7 新的“浮动”标签栏中，你也需要像对待所有按钮一样，向用户提供反馈和视觉提示，以便他们知道栏中的按钮何时被激活。对于标签栏，这可以通过编程实现。


    # 侧滑导航


    最近，一种称为**侧滑导航**的新型移动设计模式已经出现。像 Facebook、iOS 版 Gmail 和 Path 等流行应用已使这种设计模式成为一种新标准。Facebook
    在其原始 iOS 应用的重设计版本中引入了这种新模式，并迅速被其他应用采用。它由一个通过将主内容区域向右滑动而揭示的面板组成。然后，该主面板区域会揭示其下方的一个新列表视图，用户可以通过浏览该视图获取额外内容和视图。


    侧滑导航可以通过点击应用左上角的列表按钮来显示或激活，然后通过再次点击同一按钮或用户向左或向右滑动来关闭。在某些应用中，如 iPhone 版 Gmail，该面板通过一个返回按钮启动。这对用户来说可能会造成混淆，因此最好坚持使用广泛使用的列表或菜单按钮。这个按钮通常以三或四条水平线为特征，有点像表格视图。请注意，当菜单按钮被激活时，面板和按钮都必须向右滑动并保持部分可见，以便用户在需要时能够快速撤销该操作。然而，点击新菜单中的某个项目将显示与该菜单项相关的内容，面板将完全消失以显示与该项目对应的内容。再次点击菜单按钮将重新显示面板。


    侧滑导航解决方案并非适用于所有应用，因此请考虑其用途。如果你的应用内容丰富，那么这种导航方式适合你。即便如此，它也被认为是次要的导航解决方案。因此，更重要的元素应放在应用层级结构的顶层视图中，以便用户轻松访问。但它是让用户随心所欲地在不同内容间跳转的好工具。


    一些新应用，如 Jawbone 的 `UP` 应用，甚至更进一步，在屏幕的左右两侧都设置了侧滑导航。使用此功能的应用通常内容丰富，因此双面侧滑导航是细分应用内容和功能的好方法。如果你使用双面侧滑导航，请确保内容按上下文分组，以便用户知道每个面板上都有什么。


    # 图片库


    图片库导航非常适合将内容分段并以视觉方式呈现，通常使用照片作为新闻故事和其他经常更新或频繁变化的内容的代表。图片库模式允许用户通过图片进行视觉浏览，并使用图像代替图标。通过滚动浏览图片可以轻松导航图片库。对于内容丰富的应用，图片库是一种简单、便捷且引人入胜的浏览方式。像
    Instagram 和 500px 这样的流行图片应用使用这种模式让用户快速浏览视觉内容。


    # 搜索与排序


    如果你的应用提供搜索或排序功能，根据应用的类型，它很可能成为应用最重要的方面之一。iOS 在其多个自带应用中提供了搜索功能。电话和短信应用如图 5-4 所示。在你的应用中复制这些搜索模式是个好主意，因为用户已经熟悉它们的工作方式。即使对你来说显而易见，也要确保搜索字段有标签，要么使用“搜索”字样，要么使用熟悉的搜索图标（通常是放大镜）。如果用户需要找到搜索功能，他们不希望费尽周折。使其易于识别将有所帮助。


    ![9781430263647_Fig05-04.jpg](img/9781430263647_Fig05-04.jpg)


    图 5-4. 电话应用的搜索功能


    iOS 7 现在允许用户直接从主屏幕搜索他们的设备。启动后，用户可以开始输入查询，搜索结果会显示在下方。无论用户是否输入了查询，这个 `Spotlight`
    搜索功能都在搜索字段右侧显示一个取消按钮。然而，在邮件应用中，搜索栏在任何邮箱内都是持久存在的。取消按钮仅在用户开始输入查询时出现。这两种模式都是可以接受的。但自然，如果你的应用是电子邮件应用，我会建议紧密遵循邮件模式，以避免用户为你的应用特意重新学习如何执行此任务。


    关于其他一些与搜索相关的模式，在我看来相当明显，但我还是在这里提一下。甚至在用户输入时动态列出结果是一个不错的细节，以及在必要时对结果进行分段，以便用户可以轻松浏览他们需要的内容。这在
    iOS 7 的 `Spotlight` 搜索中处理得很好。搜索结果直接列在搜索框下方，并以字母顺序向用户显示结果在设备上的位置。因此，搜索“seri”将得到事件、邮件、短信以及任何其他包含匹配词条的结果，如图
    5-5 所示。


    ![9781430263647_Fig05-05.jpg](img/9781430263647_Fig05-05.jpg)


    图 5-5. `Spotlight` 搜索和邮件应用中的搜索功能略有不同


    排序通常在完成搜索查询并显示结果后进行。根据结果的不同，有一些巧妙的方法可以用来让用户对搜索结果进行排序。对于大型结果数据集，用户可能需要对结果进行比初始查询更进一步的排序。将结果分段成块可以让用户进一步筛选他们的初始查询结果。如果你选择这条路，仔细命名各个分段以避免混淆用户非常重要。例如，你可能正在开发一个基于位置的应用，向用户展示最近供应汉堡包的餐馆。如果你正在为用户展示此类商业查询的基于位置的结果，并且你的位置区域汉堡连锁店众多，产生大量商家，你可能希望进一步细分结果，允许用户对附近结果（在一定半径内）进行排序，而不是一个巨大的列表。因此，进一步细分这些结果的一个可接受方式是按
    5 英里半径分组。这样用户就可以查看 5 英里、10 英里、15 英里半径范围内的商家，以此类推。


    # 提示、导览与引导教程

    '
- fmt: '如果您的应用具有独特的用户界面或功能，而用户可能不完全直观，您可以添加提示或导览，引导用户了解应用中不太直观的部分。导览将逐步引导用户完成特定操作，而提示则为用户可能不熟悉的特定功能添加上下文。在这两种情况下，这些模式通常发生在用户首次与您的应用交互时。然而，有些应用也会在应用内提供提示或导览，以便用户熟悉那些可能难以掌握的功能。


    提示和导览属于帮助设计模式。虽然此类别中还有其他模式，但本书将重点介绍这两种。


    提示可以在应用中广泛使用，几乎可以放在任何屏幕上。如果您的应用有一个您希望引起注意的功能，提示是一种非侵入性的方式。到目前为止，用户已经习惯了提示及其工作方式。提示可以通过按钮或用户屏幕上的其他热点触发。如果提示包含在弹出视图中，那么点击提示弹出视图之外的屏幕任意位置应使其消失。如果您使用标准弹出视图元素，您需要将提示放置在您所引用的功能附近。最后，保持提示中的文案简洁。包含详细说明的提示可能会让用户感到不知所措，因此请保持说明简短且切中要点。[图5-6](#9781430263647_Ch05.xhtml#Fig6)
    展示了如何创建一个信息量适中的提示，以免让用户感到不知所措。


    ![9781430263647_Fig05-06.jpg](images/9781430263647_Fig05-06.jpg)


    [图5-6](#9781430263647_Ch05.xhtml#_Fig6)。如果使用弹出视图作为提示，请确保提示遵循弹出视图的使用规则，并且包含恰到好处的信息量。


    导览或逐步指导比提示更详细，它以引导性的分步说明形式向用户提供更多信息，指导用户使用应用。导览会在应用启动时自动出现，并引导用户完成应用中的详细流程。在进行导览时，虽然用户以自己的速度浏览应用，但您负责规划他们将要走的路径。您将有很多机会在导览中发挥创意，使其对用户具有吸引力。在导览中，关键是要将信息作为焦点。没有必要指出用户应该已经熟悉的功能。请将导览重点放在应用的独特方面。如果您的应用具有多层次的交互并能吸引不同类型的用户，那么导览是展示特定任务以提升用户体验的绝佳方式。


    与提示类似，导览应是一种易于退出的体验，以防用户决定离开或电话等其他活动中断该过程。用户还应通过页面指示器等视觉提示了解导览还剩多长时间。


    另一个好的经验法则是，尽量让导览具有视觉性，同时以平衡且最简的方式使用文案和文本。也就是说，文案的数量绝不应压倒屏幕上的视觉效果。将您的视觉效果作为故事的一部分，而不是通过解释来贬低用户，指出应用的每个方面。如果您过度依赖文字来解释某个功能，那么该功能必须重新审视。将导览视为文字和视觉效果的完美结合，用于解释如何与您的应用交互。


    您的创造力也可以在提示和导览中占据中心位置。设计效果，如不透明度和半透明度（iOS 7 的常用特性），可以增强导览的外观和感觉，使其以更丰富、更具互动性的方式生动起来。


    跳出框架


    如果您选择创新，为已有的模式创建全新的方法，请务必小心。在已有设计模式的情况下，用新方法解决旧问题可能是一种冒险的策略。如果您决定跳出设计模式的框架，请将您的新方法与旧方法进行测试，并允许您的用户提供反馈。由于测试可能变得复杂且耗时，测试新方法的一种简单方式是选取一小部分用户，让他们同时使用您的新模式和旧模式，然后收集反馈。如果您的测试组更喜欢旧的设计模式，这可能是一个很好的指标，表明最好坚持使用用户已习惯的范式。


    始终使用标准的 iOS 元素。《人机界面指南》提供了可轻松替换标准网页元素的 iOS 特定元素。设计师最常见的错误之一是将网页元素引入其移动设计中。这些元素可能适得其反，让用户感到沮丧。在应用商店中获得差评的一种确定方式是通过错误地使用
    UI 元素来混淆用户，即混合使用隐喻。面包屑导航是一种常见的网页范式，用于向用户显示他们在内容丰富的网站中的位置。然而，iOS 中的返回键取代了网站上可以显示的长串先前页面列表。


    总结


    设计模式是针对常见设计问题的公认解决方案。您可以在应用中广泛使用它们，以显著加快设计过程。模式存在于注册和登录流程、主次导航、搜索、排序和帮助中。还有许多其他设计模式存在。《人机界面指南》是开始更熟悉设计模式以及如何为您的
    iOS 应用具体实现它们的好地方。您也可以在模式的基础上进行即兴创作，但务必与用户进行严格测试。即兴创作并不意味着重新发明轮子。


    第 6 章


    使用线框图设计您的应用


    无论您是为网页还是移动设备进行设计，准备一个线框图来帮助您梳理应用的所有功能总是一个好主意。


    将线框图理解为建筑的蓝图是一个很好的类比。这是一个常见的例子。众所周知，蓝图必须在建筑实际建造之前完成。同样，线框图应在您进入应用的实际设计或开发阶段之前创建，并且是此过程的基础。


    到目前为止，我们在本书中做的所有工作都将您引向这一点，即您实际上正在创建一些东西。您已经尽职尽责；您已经将您的想法从*仅仅*一个想法打磨成一个实际产品。您已经与潜在用户进行了沟通，并在应用商店中与其他应用进行了验证。您已将您的应用与其类别中的竞品进行了比较，并征求了反馈以了解自己的定位；现在，您已准备好创建您的应用。多么令人兴奋！


    现在，我们将开始采取必要的步骤来创建您的应用。这一切从线框化开始。我们将从草图开始，并讨论有助于应用原型设计和用户交互的各种工具。我们将继续使用我们的 `Travel
    Light` 应用作为测试案例，并为此应用开发线框图。


    什么是线框图？


    线框图是您应用（网页或移动端）的一个简单绘图，它概述了所有界面元素和功能，然后才会进入应用的正式设计阶段。它通常不包含品牌元素或颜色。线框图是深入了解应用在用户与之交互时所有行为的一个绝佳方式（参见[图6-1](#9781430263647_Ch06.xhtml#Fig1)）。


    ![9781430263647_Fig06-01.jpg](images/9781430263647_Fig06-01.jpg)'
  raw: 'If your app features a unique user interface or functionality that might not
    be entirely intuitive for users, you can add tips or a tour to walk users through
    the less intuitive parts of the application. A tour will guide users step-by-step
    through specific actions while a tip will add context to specific features that
    a user might not familiar with. In both instances, both of these patterns usually
    take place when a user is interacting with your app for the first time. Some apps,
    however, make the tip or walkthrough available to the users from within the app
    should they need to familiarize themselves with features that may be difficult
    to learn.


    Tips and tours fall under the Help design pattern. While there are others in this
    category, we will focus on these two for the purposes of this book.


    Tips can be used liberally throughout an app and pretty much on any screen. If
    your app has a feature that you would like to call attention to, a tip is a non-obtrusive
    way to do so. By this time, users are accustomed to tips and how they work. Tips
    can be initiated by a button or other hotspot on the user’s screen. If a tip is
    contained in a popover, then tapping anywhere on the screen outside of the tip
    popover should make it disappear. If you’re using the standard popover element,
    you will want to place the tip near the feature you are referencing. Finally,
    keep the copy in your tip concise. A tip filled with detailed instructions can
    be overwhelming to your users so keep the instruction short and to the point.
    [Figure 5-6](#9781430263647_Ch05.xhtml#Fig6) shows how to create a tip with enough
    information so as not to overwhelm your user.


    ![9781430263647_Fig05-06.jpg](images/9781430263647_Fig05-06.jpg)


    [Figure 5-6](#9781430263647_Ch05.xhtml#_Fig6). If using a popover for a tip, make
    sure that the tip follows the rules of using a popover and that it contains just
    the right amount of information


    A tour or walkthrough is more detailed than a tip and provides the user with more
    information in the form of a guided step-by-step instruction through the application.
    It will automatically appear at the beginning of an app and take users through
    a detailed process in the app. With a tour, while users are moving through the
    app at their own speed, you are responsible for the path they will take. You will
    have lots of opportunities to be creative in the tour and to make it engaging
    for your users. With a tour, it is important to keep the information as the focal
    point. It is not necessary to point out functionality that users should be familiar
    with. Keep your tour focused on the unique aspects of the app. If your app features
    many levels of interaction and can engage different kinds of users, then the tour
    is a great way to showcase specific tasks that will enhance their experience.


    Like the tip, the tour should be an experience that is easily exited should the
    user decide to leave or another activity such as a phone call interrupts the process.
    A user should also be aware of how much longer the tour will last either by a
    visual cue such as a page indicator.


    Another good rule of thumb is to keep your tours as visual as possible with copy
    and text being used in a balanced, yet minimal way. That is to say that the amount
    of copy should never overwhelm the visuals on the screen. Use your visuals as
    a part of the story as opposed to patronizing users by pointing out every aspect
    of your app with an explanation. If you are overly dependent on words to explain
    a feature, then that feature must be reexamined. Consider the tour to be the perfect
    combination of words and visuals to explain how to interact with your app.


    Your creativity can take center stage with tips and tours, too. Design effects
    such as opacity and translucency (a favorite of iOS 7) can enhance the look and
    feel of your tours and bring them to life in a richer, more interactive way.


    Stepping Out of the Box


    If you choose to be original and create an entirely new approach to an already
    established pattern, be careful. A new approach to an old problem where design
    patterns already exist could be a risky maneuver. If you decide to step out of
    the design pattern box, test your new approach against the old one and allow your
    users to provide feedback. Since testing can get complicated and can also be time
    consuming, a simple way to test your new approach would be to take a small subset
    of your users and allow them to interact with your new pattern as well as the
    old one and gather their feedback. If your test group prefers the old design pattern,
    this could be a good indicator that it’s probably best to stick with a paradigm
    that users are accustomed to.


    Always use standard iOS elements. The Human Interface Guidelines provide iOS-specific
    elements that easily replace standard web elements. One of the biggest mistakes
    that designers make is to introduce web elements into their mobile designs. These
    elements can work against you and frustrate users. A sure way to get bad reviews
    in the app store is to confuse users by mixing metaphors—using elements in your
    UI incorrectly. Breadcrumbs are a common web paradigm used to show users where
    they are in content-heavy sites. However, the back button in iOS replaces a long
    list of previous pages that can be displayed on a website.


    Summary


    Design patterns are accepted solutions to common design problems. You can use
    them liberally in your application to help to speed up the design process considerably.
    Patterns exist for the registration and sign-in process, primary and secondary
    navigation, search, sorting and help. There are many other design patterns that
    exist. The Human Interface Guidelines is a great place to start to become even
    more familiar with design patterns and how to implement them specifically for
    your iOS application. You can also improvise with patterns, but be sure to test
    them rigorously with users. Improvising doesn’t mean reinventing the wheel.


    Chapter     6


    Using Wireframes to Design Your App


    Whether you’re designing for the web or for a mobile device, it is always good
    to prepare a wireframe to help you flesh out all of the functionality of your
    app.


    A great way to think of a wireframe is like an architectural blueprint for a building.
    It’s a common example. As we all know, blueprints must be completed before the
    building can actually be built. In the same way, wireframes should be created
    before you move into the actual design or development phase of creating the app,
    and is fundamental to the process.


    Everything we’ve done so far in this book has led you to this point. Where you’re
    actually creating something. You’ve done your due diligence; you’ve crafted your
    idea from *just* an idea to an actual product. You’ve talked to potential users
    and validated your idea against others in the app store. You’ve compared your
    app to its competition in the category and you’ve solicited feedback to understand
    where you stand; and now, you’re ready to create your app. How exciting!


    Now, we’ll actually start to take the necessary steps toward creating your application.
    That starts with wireframing. We will start with sketches and discuss various
    tools that can help with the prototyping and user interaction of your application.
    We will continue to use our Travel Light app as a test case and develop wireframes
    for the application as well.


    What Is a Wireframe?


    A wireframe is a simple drawing of your application (web or mobile) that outlines
    all of the interface elements and functionality before you get to the proper design
    phase of the application. It is usually devoid of branding or color. The wireframe
    is a great way to become intimately familiar with everything that your app does
    when users interact with it (see [Figure 6-1](#9781430263647_Ch06.xhtml#Fig1)).


