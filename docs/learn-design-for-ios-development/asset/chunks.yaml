    第 6 章


    使用线框图设计您的应用


    无论您是为网页还是移动设备进行设计，准备一个线框图来帮助您梳理应用的所有功能总是一个好主意。


    将线框图理解为建筑的蓝图是一个很好的类比。这是一个常见的例子。众所周知，蓝图必须在建筑实际建造之前完成。同样，线框图应在您进入应用的实际设计或开发阶段之前创建，并且是此过程的基础。


    到目前为止，我们在本书中做的所有工作都将您引向这一点，即您实际上正在创建一些东西。您已经尽职尽责；您已经将您的想法从*仅仅*一个想法打磨成一个实际产品。您已经与潜在用户进行了沟通，并在应用商店中与其他应用进行了验证。您已将您的应用与其类别中的竞品进行了比较，并征求了反馈以了解自己的定位；现在，您已准备好创建您的应用。多么令人兴奋！


    现在，我们将开始采取必要的步骤来创建您的应用。这一切从线框化开始。我们将从草图开始，并讨论有助于应用原型设计和用户交互的各种工具。我们将继续使用我们的 `Travel
    Light` 应用作为测试案例，并为此应用开发线框图。


    什么是线框图？


    线框图是您应用（网页或移动端）的一个简单绘图，它概述了所有界面元素和功能，然后才会进入应用的正式设计阶段。它通常不包含品牌元素或颜色。线框图是深入了解应用在用户与之交互时所有行为的一个绝佳方式（参见图
    6-1）。


    ![9781430263647_Fig06-01.jpg](img/9781430263647_Fig06-01.jpg)

    '
- fmt: '# Figure 6-1


    [Figure 6-1](#9781430263647_Ch06.xhtml#_Fig1). A wireframe is a drawing of your
    app with all of its interface elements


    Wireframes are all about usability and interactivity. After your wireframing process
    is complete, you should know the result of every action a user performs while
    using your app.


    At the completion of the wireframing phase of the app development process, you
    should know and be able to answer the following questions about your app:


    - What happens when a user taps on any button in the app?

    - What is the best and most intuitive route for each task in the app?

    - Does the app use established best practices in its user interface?

    - Are tasks completed using the smallest amount of steps possible?

    - Does the user understand the tasks he or she is performing and why?

    - Have all possible use cases been explored and accounted for?


    Wireframes will often be devoid of color and branding. This can make them easier
    to read. Adding branding and color can sometimes distract from the purpose of
    the wireframe, and that is to outline and finalize functionality before the design
    and polish has been added to the application. Wireframes are also great because
    they allow for easy iterating in case changes need to be made to the interface
    of the design of your app. If your wireframing is moving along optimally, you
    will find that you will have a number of versions of your wireframes before the
    entire process has been completed. This is a good thing as each version of your
    wireframes should improve on the previous version.


    Some wireframes are more polished than others and how polished yours are can depend
    on a number of factors. If you are creating your app for a client, then they might
    want to see a certain level of polish or professionalism to the wireframes. If
    this is not an absolute requirement, then I would suggest that you keep your wires
    black and white, and use the simplest presentation possible.


    ## Tools for Wireframing


    There are a number of online resources and tools for creating wireframes. There
    are also mobile-specific wireframing tools. A search for "wireframing tools" will
    yield articles featuring lists of available tools for wireframing. Some of them
    will be web based, app based, downloadable, free, paid, and open source. You will
    need to find what works best for you. Of the web-based variety, here is a list
    of my top three:


    1.  **JustinMind** – Lets users create clickable, interactive mobile wireframes
    that allow sharing for feedback.

    2.  **Proto.io** – Allows users to create wireframes that can be used for prototyping
    and testing. Supports sharing and on-device viewing. Free to $49 per month.

    3.  **MoqUps** – A free HTML 5-based wireframing tool that allows iOS templates
    to allow users to create simple fast mobile app wires.


    If you don’t mind paying a little more, here’s another list of wireframing tools
    that will set you back some cash:


    1.  **Omnigraffle** – $99.99 for an individual license. Available for Mac and
    on iPad. A Mac user favorite, Omnigraffle lets you create not only apps and websites,
    but also many different types of diagrams and charts.

    2.  **iMockups** – $6.99 in the iPad App store. iPad app that allows creation
    of wireframes for apps and sites from within an intuitive iPad interface. The
    app could use an update but is a great tool for creating basic app wireframes.

    3.  **Balsamiq** – Downloadable wireframing tool that provides sketch-based wireframes
    from an easy-to-use interface. Also supports sharing for feedback. $79 for a single
    license.


    Again, these lists are based on my personal preferences. Most of these products
    provide users with the option to try them out before making a commitment, so I
    encourage you to try them all if you can. Make sure that whichever app you choose
    allows you to export your wireframes in a few different formats. You’ll need at
    least one of the popular image formats (JPEG, PNG) and the ever-popular PDF. Another
    feature that might be helpful is the ability to collaborate and share your wires
    with others. This will help when you are soliciting feedback from colleagues,
    team members, and potential users.


    You may also choose to skip web-based and other digital tools altogether and simply
    choose to do it the old fashioned way. That is, pen or pencil and a piece of paper.
    There are stencils you can find online that will provide the iPhone or iPad frame
    so that you can fill in the necessary UI elements for your app. Either way, wireframing
    and ideation is an important step in the app design process and not one to be
    skipped.


    ## Why Are Wireframes Important?


    Naturally, at this point, you might be eager to get to the act of designing your
    application. You’re thinking of color and shading and translucency and what kind
    of details you would like to include in your app icon. But not so fast. While
    not entirely appealing from a design standpoint, getting through the wireframing
    process is important, as it will help to inform the actual design. Once your wireframes
    are complete, you will find that your design and development will flow smoother
    than if you hadn’t completed this step in the process.


    Wireframes are important because they help with creating the layout and help you
    to organize the information in your app for the user. During this process, you
    are free to do and to undo; try different approaches to solving a particular usability
    problem in your app. If something doesn’t work, you can easily discard it and
    not worry about branding and other details just yet. This is especially liberating
    because with the pixel perfect precision needed for design, you won’t want to
    deal with usability issues. You will need the flexibility that wireframing provides
    if you decide to scrap a screen or flow altogether. If you’re not committed to
    colors and design, then you can focus on layout, usability, and flow, which should
    be your main focus when wireframing.


    If you are working with a client, you will also find that wireframes are a great
    way to get sign-off on the user interface and other elements before you progress
    to style and design. That way, your client knows exactly what to expect and your
    design can add depth to the wires.


    ## The Wireframing Process'
