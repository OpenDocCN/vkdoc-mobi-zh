    # iOS 7 设计原则


    近来，一些较新且更流行的应用已摒弃了深色、厚重的色彩，转而采用更浅、更柔和的配色方案。苹果也顺应了这一趋势，这种方式为 iOS 7 带来了更轻盈、更简洁的感觉。明亮的白色背景取代了此前在`设置`等原生应用中的灰色和细条纹背景。如今，在`设置`中，图标在干净的背景上显得格外突出。设计师应特别关注苹果如何使用色彩、对比度和透明度来增强层次感，并引导用户不仅关注内容，也关注其语境。你可以参考图
    2-9 和图 2-10 来了解相关示例。


    ## 运用色彩


    在设计应用时，请思考色彩将如何在用户界面中发挥作用，并帮助你讲述应用的故事。每个应用都必须有一个故事，而你的用户界面将助你讲述这个故事。色彩之间应相互补充。在
    iOS 7 中，苹果坚持使用一套非常清晰且特定的调色板。你会反复在所有原生应用中看到相同的颜色。请特别留意它们的使用方式和位置。例如，`信息`应用中那种近乎荧光的绿色，被用于状态栏的电池电量指示器和电话应用图标中。同样的绿色也作为强调色出现在`钱包`和`通讯录`的图标中。要思考在特定区域使用色彩，以及将色彩与特定任务关联起来。


    随着 iOS 7 的到来，用户将比以往任何时候都更理解色彩的重要性。例如，用户的背景图像或壁纸将影响整个用户界面的渲染效果。如果你的壁纸或背景以黄色为主色调，那么这种颜色会出现在锁屏键盘上，而主屏幕文件夹的透明度会让主色调渗透出来，从而赋予设备该颜色的特性，并使其笼罩在这种色调中。这是一种巧妙而精致的处理方式，增加了额外的个性化定制层级，使得两台设备在运行
    iOS 7 时，外观也不会完全相同。


    ## 运用透明度


    透明度和半透明效果是 iOS 7 中大量使用却又十分巧妙的另一工具。除了前面提到的主屏幕文件夹外，从任何页面向下滑动即可打开新的控制中心。这是一种访问一些最常用应用的便捷方式，并为控制选项提供了快捷途径，无需再导航到`设置`应用——这是有些人（包括我自己）倾向于隐藏或收进文件夹的应用。首先，控制中心面板是半透明的，真正展现了操作系统的三维质感，这是以往版本所欠缺的。它不仅揭示了下面还有一层应用和其他功能，还让这些元素的颜色透射出来。该面板就像一块覆盖在主屏幕上的薄玻璃。请参见图
    2-16，查看控制中心面板在主屏幕上的示例。其次，控制中心面板并未延伸到屏幕顶部。在 iPhone 上，它会露出主屏幕上一行半的应用和文件夹。这为用户提供了他们在操作系统中所处位置的上下文。他们可以通过两种方式自由操作：在面板上向下滑动，或者只需点击另一个图标，面板便会自行收起。这种方法简单，但却非常高效。


    ![9781430263647_Fig02-16.jpg](img/9781430263647_Fig02-16.jpg)


    图 2-16. 控制中心的半透明条。控制中心会显示下方页面的颜色：在此示例中，即壁纸的颜色。


    设计师在设计应用以及决定用户应如何与应用内容交互时，应参考这些微妙的线索。这个版本的操作系统推动设计师去除那些非绝对必要的元素，聚焦于那些用户与应用交互时真正需要的元素。


    ## 运用图层


    图层是 iOS 7 的关键组成部分。之前的版本侧重于添加如斜面与阴影等效果来暗示和体现深度，而 iOS 7 则将所有内容组织成图层，并使用运动传感器为用户在使用设备时提供三维感受。因此，当用户移动时，图层也随之移动，并补充用户的视角。这样，当前正在使用的元素总是位于最前方的图层。这意味着其后的内容会相应地移动和后退，以营造出你面前所有元素之间存在深度和空间的错觉。甚至仅仅是打开应用这一操作也体现了深度。旧版操作系统在打开应用时只是一个快速缩放；而在
    iOS 7 中，应用的打开画面虽然仍然向内缩放，但背景似乎也在向后移动，从而在新应用中创造出一种完全沉浸的感觉。


    ## 按钮


    旧版 iOS 中常见的边框大多已被移除。这可能会带来一个问题，因为用户现在需要重新从空间上感知一个词周围可点击的区域所在。用户已经习惯了“返回”和“取消”这类按钮的边框。由于对
    iOS 的熟悉，用户会本能地知道这些按钮的功能（其名称也暗示了用途）。iOS 7 的不同版本在曾经是按钮的位置，只有扁平的彩色条。电话应用中的`结束通话`和`通话`按钮在
    iOS 7 近期的测试版中，已从无边框的彩色条演变成了带轮廓的正式按钮。


    ## 总结


    随着 iOS 发生翻天覆地的变化，在新设备上推行彻底的革新，iOS 应用设计的未来一片光明。作为设计领域的领导者，苹果既建立了一些长期的设计标准，也借鉴了其他设计理念。如今，他们已准备好再次改变格局。通过设立新标准，设计师们将被迫寻求更新颖、更激动人心的方式，通过他们的应用与用户进行视觉沟通。


    有趣之处在于 iOS 7 将推动设计走向何方。诚然，苹果对 iOS 所做的这些改变可以追溯到其他平台（仅举两例，如 Android 和 Windows Phone）。但设计爱好者一直将苹果视为该领域的领导者。在设计你的应用时，不仅要考虑这个新版本，还要思考它的由来和演进过程。问问自己下一个重大突破是什么，然后去实现它。


    # 第 3 章


    # iOS 7 与扁平化设计


    在你准备设计应用，并开始熟悉人机界面指南和 iOS 7 的所有原则时，你无疑已经听说了“扁平化设计”这个被大肆讨论的术语。这个词正被用来定义苹果对操作系统用户界面的新方向。因此，有必要定义一下扁平化设计，并解释它是什么、从何而来，以及你如何用它来创建自己的应用。在你着手创建应用时，请思考内容，并将其置于核心位置。需要记住的一点是，用户与多点触控以及苹果移动设备套件交互已经有一段时间了。

