- fmt: '# iOS 7 Design Principles


    As of late, some of the newer and more popular apps have moved away from darker,
    heavier colors and have adopted a lighter, more pastel color scheme. Apple has
    adopted this trend, too, and the approach has brought a lighter, cleaner feel
    to the iOS 7. A bright, white background has replaced the gray and pinstriped
    background previously found in stock apps like `Settings`. Now, in `Settings`,
    the icons stand out on the clean background. Designers should pay special attention
    to how Apple uses color, contrast, and transparency to enhance the feeling of
    depth and to call the user’s attention to not only content but context. You can
    refer back to [Figures 2-9](#9781430263647_Ch02.xhtml#Fig9) and [2-10](#9781430263647_Ch02.xhtml#Fig10)
    for examples of this.


    ## Using Color


    When designing your app, think about how color will play a part in the user interface
    and help you to tell the story of your app. Every app must have a story and your
    user interface will help you to tell that story. Colors should complement each
    other. In iOS 7, Apple sticks to a very clear and specific color palette. You
    will see the same colors over and over again in use throughout all of the stock
    applications. Pay special attention to how and where they are used. For instance,
    the almost fluorescent green used in the `Messages` app is used in the battery
    bar indicator in the status bar and in the phone app icon. That same green is
    used as an accent color in the `Passbook` and `Contacts` icons as well. Think
    about the use of color in specific areas and about associating color with specific
    tasks as well.


    Users will begin to understand the importance of color more than ever with iOS
    7. For instance, a user’s background image or wallpaper will affect the look of
    the entire way the UI renders. If your wallpaper or background has yellow as the
    main hue, this color will present itself on the lock screen keypad, and the transparency
    of the folders on the springboard will allow the dominant color to seep through,
    thus giving the device properties of that color and casting it in that light.
    It’s a nice, subtle touch that allows an added layer of customization so that
    no two devices will look exactly the same when running iOS 7.


    ## Using Transparency


    Transparency and translucency are other tools used generously, yet subtly in iOS
    7. In addition to the aforementioned folders on the springboard, an upward swipe
    from any page will reveal the new Control Center. It’s an easy way to access some
    of your most commonly used apps and provides a shortcut to controls without navigating
    to the `Settings` app that some people (myself included) tend to hide or tuck
    away in a folder. First, the Control Center’s panel is translucent and really
    brings to life the three-dimensional quality of the operating system, something
    that was missing from previous versions. Not only does it reveal that there is
    a layer of applications and other functionality underneath, it lets their colors
    shine through. The panel appears as a thin pane of glass over the springboard
    itself. See [Figure 2-16](#9781430263647_Ch02.xhtml#Fig16) for an example of the
    Control Center panel over the home screen. Second, the Control Center’s panel
    doesn’t extend to the top of the screen. On the iPhone, it reveals one and a half
    rows of apps and folders on the springboard. This offers users context as to where
    they are in the OS. They are free to navigate away in two ways: swipe down on
    the panel itself; or simply tap another icon, and the panel removes itself. The
    approach is simple, yet incredibly effective.


    ![9781430263647_Fig02-16.jpg](images/9781430263647_Fig02-16.jpg)


    [Figure 2-16](#9781430263647_Ch02.xhtml#_Fig16). The translucent bar of the Control
    Center. The Control Center will show the color of the page underneath: in this
    case, the wallpaper.


    Designers should reference these subtle clues when designing their apps and when
    deciding how users are meant to interact with the content in their apps, too.
    This iteration of the operating system pushes designers to strip away elements
    that are not absolutely necessary and to focus on elements those users will need
    to interact with your application.


    ## Using Layers


    Layers are a key component of iOS 7. Whereas in previous versions the focus was
    on adding effects like bevels and shadows to infer and imply depth, iOS 7 has
    organized everything in layers and used motion sensors to offer users a three-dimensional
    feel while using their device. Thus, as users move, the layers also move and complement
    the users’ views. So, the element currently in use is always on the foremost layer.
    This means that content behind it will shift and recede where necessary to offer
    this illusion of depth and space between all of the elements in front of you.
    Even the act of opening an app shows depth. The older version of the OS offered
    users a quick zoom when opening apps; in iOS 7, the opening screen of the app
    still zooms inward but the background seems to shift back as well, creating a
    feeling of total immersion in the new app.


    ## Buttons


    The borders that were standard in previous versions of the iOS have mostly been
    removed. This could present an issue because users will now have to relearn spatially
    where the tappable space is around a word. Users have come to expect a border
    around buttons like “Back” and “Cancel.” Because of their familiarity with iOS,
    users will instinctively know what these buttons do (their names also give it
    away). Various versions of iOS 7 had just flat colorful bars where there once
    were buttons. The `End Call` and `Call` buttons in the phone app have evolved
    in recent beta versions of iOS 7 from borderless but colorful bars to proper buttons
    with outlines.


    ## Summary


    With all of the sweeping changes to iOS; a complete overhaul rolling out over
    new devices, the future of design for iOS applications is bright. As a leader
    in design, Apple has established some long-standing design standards and borrowed
    from others. They are now poised to change things again. By setting new standards,
    designers will now be forced to come up with newer and exciting ways to visually
    communicate with users via their apps.


    What remains interesting is where the iOS 7 will push the direction of design.
    Admittedly, the changes that Apple has made to iOS can be traced back to other
    platforms (Android and Windows Phone to name two). But design aficionados have
    always seen Apple as a leader in this field. When designing your app, think about
    not just this new version but where it’s come from and its evolution. Ask yourself
    what the next big step is, and then take it.


    # Chapter 3


    # iOS 7 and Flat Design


    As you prepare to design your app and as you have begun to familiarize yourself
    with all of the principles of the Human Interface Guidelines and iOS 7, you undoubtedly
    have heard the phrase “Flat Design” bandied about. It is a term being used to
    define Apple’s new direction to the user interface of the operating system. So,
    it’s only fair to define flat design and to explain not only what it is and where
    it comes from, but also how you can use it to create your very own app. As you
    set out to create your app, think about the content and bringing that front and
    center. One thing to remember is that users have now been interacting with multi-touch
    and Apple’s suite of mobile devices for some time now.'
