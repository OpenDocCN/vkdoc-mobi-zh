- fmt: '## In iOS 7, Button and Form Design Evolution


    In iOS 7, while buttons maintain their flat appearance, subtle changes have been
    made in their appearance to allow for better usability. Note the Phone app interface
    changes between two different versions of iOS 7 in [Figures 3-2](#9781430263647_Ch03.xhtml#Fig2)
    and [3-3](#9781430263647_Ch03.xhtml#Fig3):


    ![9781430263647_Fig03-02.jpg](images/9781430263647_Fig03-02.jpg)


    [Figure 3-2](#9781430263647_Ch03.xhtml#_Fig2). iOS 7 beta 4\. iOS 7 Beta 4’s call
    button extends to the edge of the screen


    ![9781430263647_Fig03-03.jpg](images/9781430263647_Fig03-03.jpg)


    [Figure 3-3](#9781430263647_Ch03.xhtml#_Fig3). iOS 7 beta 7\. iOS 7 Beta 7’s call
    button now features rounded edges


    While both button treatments adhere to flat design principles, the older version
    from beta 4 features no outline or demarcation to note where the boundaries of
    the button lie. The newer approach creates an actual button outline and adds rounded
    corners. I’ve seen apps that utilize either approach with great results. But,
    keep in mind that subtle changes such as these can make a world of difference
    for your users.


    # Simplifying Forms


    Another oft-forgotten UI element that has evolved along with flat design is the
    form. Mobile apps use forms for sign-ups and sign-ins. Although users are typically
    not asked to sign in more than once, forms previously included inset shadows to
    denote depth and space. But, search fields now offer no such enhancements. When
    designing your forms for sign-in and registration fields, keep your windows clean
    and devoid of all effects. A thin border outline will usually do the trick, but
    also try to experiment with different shades of gray or stark white for form backgrounds.
    [Figure 3-4](#9781430263647_Ch03.xhtml#Fig4) shows the input form for the iTunes
    Store. Note the simple field for entry of a user’s password.


    ![9781430263647_Fig03-04.jpg](images/9781430263647_Fig03-04.jpg)


    [Figure 3-4](#9781430263647_Ch03.xhtml#_Fig4). Pop-up windows and notifications
    and forms have a new look in iOS 7


    # Determining Typography


    Possibly one of the most important elements of flat design is the typography that
    you will use in your app. Since flat design focuses on typography, you will need
    to find a font that evokes the overall feeling and message that you would like
    for your application to convey. Because flat design is simple and minimalist,
    your font should probably be as well, so choose a maximum of two types of font
    families for your app. Make sure that the fonts complement each other. If you
    have any conflicts, it is fine to use just one font throughout your app and experiment
    with different weights to convey meaning. Fonts and type that feature clean lines
    and strokes will tend to look better in flat design schemes. Toward this end,
    san serif typefaces are incredibly popular with designers utilizing flat design
    techniques in their mobile apps and web apps. I’ve created a chart with some popular
    sans serif typefaces in [Figure 3-5](#9781430263647_Ch03.xhtml#Fig5).


    ![9781430263647_Fig03-05.jpg](images/9781430263647_Fig03-05.jpg)


    [Figure 3-5](#9781430263647_Ch03.xhtml#_Fig5). San serif typefaces are commonly
    used in flat designs


    The colors and weights of your fonts are also important so consider a font that
    comes in a variety of weights that you will be able to use throughout your app.
    You may want to consider a specific weight for buttons and icons and use others
    for call to actions while body text might be a lighter weight.


    # Evaluating Usability


    There have been subtle changes in certain elements of the interface. While still
    maintaining its flat appearance for user interface elements, they have been finely
    tuned for usability. Make no mistake: usability is a big part and reason for the
    transition to flat design. There has been some debate in the design community
    about just how user friendly flat design is. Some critics contend that for all
    its beauty and performance enhancements, flat design can, at times, be confusing
    for users. Sure, the stripping away of the very elements and effects that make
    buttons seem like, well, actual buttons *can* cause a bit of disorientation for
    users. iOS 7 does its fair share of removing those elements. Take, for instance,
    the removal of the tiny dividing lines in the tab bar. Now, those elements at
    the bottom of this screen, which were clearly delineated, now seem to float in
    midair. (See [Figures 4-6](#9781430263647_Ch04.xhtml#Fig6) and [4-7](#9781430263647_Ch04.xhtml#Fig7)
    above.) This is where a designer must use his or her discretion to understand
    what makes sense from a usability standpoint. It’s up to you and your user how
    these elements are going to be interpreted. Therefore, if you genuinely feel that
    a small drop shadow will help users to interact better with an element of your
    app, then by all means find the balance between flat design and realism and add
    the drop shadow. There is no need to overdo it. With flat design, less is more,
    and you will find that adding subtle hints of realism in an app that could otherwise
    be flat design overkill, may strike the perfect balance for your user.


    Flat design is challenging because it, in essence, removes all of the elements
    that help users to associate what is on their screen with what actually exists
    in the real world. The very metaphors that we use to translate the virtual to
    the physical are being removed with flat design. Thus, what was a button is now
    just a flat square on a background. The visual cues we as designers created to
    reference real-world properties like light and shadows have been removed. So,
    what’s left? Your content and the user. The question then becomes, how can we
    still provide those cues to users who live in a three-dimensional world but who
    are interacting within a two-dimensional construct? If you choose to wholeheartedly
    take a complete flat design approach to your app, you must consider these realities
    when you think about how users will maneuver within your application.


    Apple has allowed for some other ways of merging this new two-dimensional world
    with the addition of three-dimensional effects like a parallax and the use of
    transparency. These features, which are already core tenets of the operating system,
    are a part of the arsenal of tools available to designers to enhance the overall
    experience and usability of their applications. These effects can help to provide
    visual cues to users.


    # Summary


    When you consider the overall user experience of your application, you must think
    strategically. Every decision, then, you are considering your approach to design
    and just how far down the rabbit hole you need to go, becomes a strategic one.
    As a designer, your task is to find the delicate balance between what a user sees
    and what he or she feels. All of this is contained within the world that you create
    through design within your app. Can flat designs help you to achieve this goal?
    By this point the purpose of your app and the audience you are attempting to reach
    should be crystal clear. Undoubtedly, you will have to employ flat design techniques
    in your app; the question is just how much.


