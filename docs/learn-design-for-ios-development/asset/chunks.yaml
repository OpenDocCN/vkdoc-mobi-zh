    然而，对待用户反馈要谨慎。有时用户反馈可能会与公认的最佳实践相悖。如果收到的部分反馈属于这种情况，在实施之前请认真权衡这些反馈——特别是如果它违背了公认的最佳实践或已知的设计模式。例如，许多旅行应用会向用户展示一个月份日历供其选择旅行日期。如果在焦点小组会议中，一个或多个用户认为有另一种更好的方式，你可能需要权衡这种改变的利弊。原因是，你的核心用户很可能期望在输入日期时看到那个日历。iOS
    的选择器是允许用户选择日期和时间的好方法。但是，如果你替代日历的方案不够用户友好或直观，你可能需要考虑忽略这一特定反馈，并坚持使用已知且普遍使用的方式。


    对于应用线框中的特定动画或隐含动作，你需要向用户展示动画前后的状态，因为线框大多是静态的。如果你采用低保真度方法，那么动画前后的状态以及详细的注释应该足以说明动作。有些用户也未必知道某些转场是什么意思；因此，在征求反馈时，直观地向他们展示是避免让你的焦点小组用户感到困惑的一种方法。


