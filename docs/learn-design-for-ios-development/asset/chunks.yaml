- fmt: 'Here are some questions to ask when trying to decide on a color palette:


    - What color or colors would best highlight the main tasks in your application?

    - Are you using a range of shades of a specific color? For instance, is your main
    color scheme a specific shade of red as well as a number of other reddish shades?

    - What are the roles of neutral colors such as grays, blacks, and whites in your
    design?

    - Are the colors you choose complementary? Do they work next to each other on
    the page?


    Whatever you do, your app must be consistent. If your app opens with bright, bold
    colors, you should stick with this approach throughout. Don’t transition to a
    muted, softer palette later on.


    There are a number of great online resources for designers when considering palettes
    for flat design. One of my favorites is [Flatuicolors.com](http://Flatuicolors.com)
    ([http://www.flatuicolors.com](http://www.flatuicolors.com)). It’s a simple web
    app that lists some popular flat UI colors and lets you paste it in a number of
    different formats (`hex`, `rgb`, etc.) You can use it to try out different color
    combinations in your app.


    Another helpful tool is Color Scheme Designer ([http://www.colorschemedesigner.com](http://www.colorschemedesigner.com)).
    This is a designer’s wonderland that allows you to view and test palettes of various
    colors. It shows them side-by-side and helps designers to understand how colors
    look side-by-side and also how they interact and complement each other. It’s possible
    to customize the view by triad, tetrad, and even mono—and the combinations seem
    virtually endless.


    If brash, bold colors aren’t your thing, muted, monotone colors work, too. Many
    popular apps have been experimenting with more muted tones of primary and secondary
    colors. If anything, try to push the conventional color boundaries with your choice
    of color schemes.


    **Tip** Try to stay away from color generalizations such as pink to denote feminine
    and blue for masculine.


    ## Designing Icons


    Because of the lack of realism in flat design and the elevation of content, icons
    and illustrations have become increasingly more important. Icons are used in design
    to communicate certain messages to the user. They are visual shortcuts that you
    use in your applications to help users navigate their way through the app.


    While there are a number of design resources available online to assist designers
    with their icons, some designers choose to create their own. Icons can bring an
    element of personality to your app and contribute to your users’ understanding
    of the UI elements in your app. Think about Apple’s icons and how they have evolved
    with flat design. If you design your own icons, remember that users will already
    associate certain actions with certain icons in the operating system so there
    is no need to reinvent the wheel.


    When you decide to create your own icons, the following are some guidelines to
    remember:


    - Your icons should be simple and clean.

    - Remove extraneous elements that confuse users and stick with only elements that
    absolutely must be present.

    - Icons should be intuitive: that is to say that users should be able to understand
    the meaning behind an icon by a simple look. If a user must interact with an icon
    to figure out the intended meaning, then your design has failed its most important
    task.

    - Think about the overall use of the app and its purpose. Are your icons appropriate
    to the subject matter? Be sure that your icons are appropriate to the task they
    are trying to convey and to the overall purpose of your app.

    - Your icons should always be drawn as clearly and as cleanly as possible. The
    HIG provides guidelines about how icons will need to be scaled so that they do
    not appear fuzzy when viewed on retina screens.

    - Your icons should appear consistent across a number of different devices with
    different screen resolutions.

    - Flat design usually applies simple shapes for icons. They will either be circles,
    squares, or rectangles; so if you choose to go with a shape for your icons, then
    you should stick with that to be consistent. Mixing and matching icon shapes is
    a sure way to confuse and befuddle your users. It is always a good idea to refer
    back to iOS icons as a general guide for creating your own as well.


    **Tip** There are also a number of resources for flat design icons on the Internet.
    There are downloadable icon packs, some of which are free and some that will cost
    a nominal fee.


    ## Utilizing Space and Templates


    When designing for iOS 7 and when considering elements of flat design, the use
    of space is an important factor. On the Web, flat design principles usually leave
    lots of empty space in keeping with the “less is more” principle that guides flat
    design. So, too, in iOS 7, the use of space is important. Although there is less
    space on mobile devices than there is on desktops, you should think about how
    the use of space will translate across the different devices that your app will
    run on.


    To get started with your app design for iOS 7, a flat design, there are a number
    of flat design templates available for free download on the Web. Do a search for
    “iOS 7 GUI PSD Template” to find one that suits your needs. Templates for the
    iPhone and iPad are available. These templates include everything you need to
    get started to at least play around with the UI elements and how they could be
    used and positioned within your applications. You can use these templates to create
    your wireframes, too.


    You can also find design inspiration on visual sites like Pinterest to see what
    other designers are doing or, you can take the plunge yourself into the world
    of flat design. There are some basic elements that will need to change in every
    application in order for flat design to be fully implemented. We’ve touched on
    color space and icons, but let’s get more specific.


    ## Defining Buttons


    Buttons are an important part of every app’s interface. Users are accustomed to
    buttons being activated to perform a certain function – usually, whatever is written
    on the label. For instance, the buttons in [Figure 3-1](#9781430263647_Ch03.xhtml#Fig1)
    show examples of a regular traditionally designed button on the left and a flat
    design button on the right. Note the removal of the drop shadow and bevel on the
    left and the emphasis on simplicity on the right button.


    ![9781430263647_Fig03-01.jpg](images/9781430263647_Fig03-01.jpg)


    [Figure 3-1](#9781430263647_Ch03.xhtml#_Fig1). Old button with drop shadow vs.
    new flat style button


    The old button clearly shows a three-dimensional quality that is commonplace in
    skeuomorphism. The new button removes that and replaces the three-dimensional
    effect with a decidedly two-dimensional one. This is a prime example of how buttons
    have evolved in the face of flat design. Also note that traditionally designed
    buttons usually are darker in color and shade, giving them a heavier look and
    feel.'
