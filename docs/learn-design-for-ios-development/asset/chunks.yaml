    ![9781430263647_Fig05-03.jpg](images/9781430263647_Fig05-03.jpg)


    [Figure 5-3](#9781430263647_Ch05.xhtml#_Fig3). Tab bars in iOS'
  trans: '

    # Springboard 模式


    在应用内导航最常用的设计模式之一便是 Springboard 模式。Springboard 是主页上由图标组成的网格，它能直观地让用户熟悉应用中所有的内容。它为用户从一个页面提供了应用中所有内容的高层级概览。Springboard
    将是用户在加载应用并注册或登录后看到的第一个页面。它能让用户熟悉应用中的所有内容，并为他们提供情境。


    你可以将 Springboard 页面视为一个用户会反复返回的主页，以便访问应用的其他区域。因此，你选择在 Springboard 上包含的信息至关重要。需要注意的是，Springboard
    上可包含的图标数量限制在九个左右（取决于布局），因此，如果你要展示多个页面，请确保你的用户知道如何访问它们。


    尽管我们特别提到了 iOS，但值得注意的是，Springboard 被认为是一种跨平台的导航方法，因为它可以轻松适配多种不同类型的设备和操作系统。图 5-2
    展示了一个简单的 Springboard 模型示例。


    ![9781430263647_Fig05-02.jpg](img/9781430263647_Fig05-02.jpg)


    图 5-2. Springboard 设计模式的简单线框图


    Springboard 设计模式有多种变体——这意味着，即使上面的模型展示的是网格布局，你也可以自由地自定义布局，使其与应用的外观和感觉保持一致。


    抓住机会在 Springboard 的图标上发挥创意。图标将为你的用户提供上下文，因为每个图标将直观地代表应用内的一个独立功能。Springboard 是一种简单的方式，可以在一页上为用户提供大量信息，并且这将是用户首次接触到你应用的视觉语言。


    有时 Springboard 可能不遵循常见的网格布局，图标可能比标准的九个图标布局更大或更小。确定最适合你用户的方式，以及与应用风格最匹配的方式，来为你自己确定最佳的
    Springboard 布局。同样必须指出的是，随着更新、更具创新性的主屏幕模式的出现，用以展示主屏幕上的各种选项，Springboard 模式可能被视为有些过时了。


    许多新闻应用，例如 CNN 和 TED，都采用了首页模式。其特点是在顶部有一个大面板，下方是列表视图，这是一种在应用主页上展示新闻的流行方式。


    ## 列表与表视图模式


    另一种流行的移动导航方式是将所有内容放在一个列表菜单中。列表菜单非常适合拥有大量类别和内容的应用程序。它将显示在表视图中。列表菜单非常适合移动应用的部分原因在于，可滚动的列表易于用拇指或两根手指上下滑动。因此，就导航和可用性而言，列表菜单是赢家。列表菜单可以像
    Springboard 菜单一样包含图标，这样用户也能在视觉上与应用的內容产生关联。


    在 iOS 移动设备的界面中，列表菜单模式有多种变体。


    你可以通过更改颜色或添加图像与图标来增强和自定义列表。但要注意不要做得太过，以免让用户迷失方向。


    ### 表格


    对于将展示大量数据的应用来说，表格是一种绝佳的信息展示方式。许多企业、生产力、银行和金融工具可能需要大量使用表格，因为它们需要以清晰易读且易于排序的方式列出信息。在设计应用时，你可以使用多种不同的表格。如果你要展示大量数据，并需要一种方法来区分它们，可以尝试更改颜色或在它们之间添加细微的差异。这将有助于用户在筛选所呈现的信息时保持清晰。


    在为 iOS 设计时，可以将表格视为表视图的另一种说法。人机界面指南中明确概述了这个元素。


    你可以对表格进行调整，使数据更易于用户接受。行和列的大小可以调整，你还可以考虑尝试使用字体大小来为用户分隔特定信息。例如，考虑使用标题和对行进行分组，以便于导航。


    你还可以考虑进行视觉增强，例如添加图标以使表格中的数据更突出。最好不要在一个表格中使用太多不同的颜色，因此，与所有设计一样，保持你的表格配色方案与整体品牌一致。但是，如果你的应用属于特定类别，则应使用公认的最佳实践，例如在金融或资金管理应用中，用绿色表示正向现金流，红色表示负向现金流。用户会非常熟悉这些视觉元素，这将有助于提升应用的整体可用性。


    对于信息量大的表格，固定列的设计模式会很有帮助。这种模式允许用户冻结左侧或右侧的单列，而其他列保持流动。用户随后可以根据需要随意调整和筛选信息。


    ### 标签栏


    你也可以选择为 iOS 应用添加标签栏导航。在 iOS 设备上，标签栏位于屏幕和设备的底部，但一些富有创意的设计师也设法将标签栏放在屏幕顶部。你可以在 iOS
    应用中自定义标签栏，但具体细节请参考人机界面指南。例如，iPhone/iPod 的标签栏中只允许放置五个按钮。可以有更多按钮，但只是不会显示出来。iOS 会自动添加一个`更多`按钮，用户可以通过它访问其他按钮。从可用性的角度来看，用户在使用手机等小型设备时，用拇指就能轻松访问标签栏。


    标签栏中的每个按钮都可以引用一个完全不同的视图，这些视图与应用中各种类型的信息相关。标签栏导航的便利性使得用户可以非常轻松地在它们之间来回切换，几乎不费什么力气。通过添加标签栏，用户将能够从一个页面高层面地了解应用的所有不同类别。


    标签栏中的每个按钮通常都包含一个图标和一个标签，如 图 5-3 中的线框图所示。图标是传达信息的好方法；但由于标签栏中的图标彼此靠近，因此最好确保它们在视觉上对用户保持一致。如果一个按钮是以特定风格绘制或插图的，那么请确保所有其他按钮也都遵循相同的风格。你的用户会期待这一点。


    ![9781430263647_Fig05-03.jpg](img/9781430263647_Fig05-03.jpg)


    图 5-3. iOS 中的标签栏

