    friends and others around you that you trust and get them to speak honestly in
    response to your idea. Try to share your idea and description with people who
    aren’t afraid to give you honest feedback. Ask for constructive criticism, but
    also be sure that you are ready to receive it.


    Ask questions that will help to move the idea forward and ultimately inform its
    design and functionality. If you have time, create a brief questionnaire and ask
    people to fill it out.


    Staying with our initial idea of a Travel Light app above, the following questions
    are examples of what you might ask:'
  trans: '

    # `apress.com` 网站


    `apress.com` 网站包含一份关于书中虚构应用“轻装旅行”（Travel Light）的设计规范文档示例。它为开发人员在开发应用期间提供了关于字体、颜色及其他必要信息的指南。


    # 第 1 章：你有了一个 iPhone 应用的点子，然后呢？


    恭喜你！你有了一个应用的点子，并且做出了一个重要的决定——自己来设计它！你已经加入了成千上万人的行列，他们决心学习如何将一个想法从脑海中微小的火花，转化为一个设计完备、可供开发的应用。


    你可能已经知道，应用是移动生态系统中不可或缺的一部分。所有移动设备都运行着应用。然而，你决定为 iOS 设计应用，这本身就是一个独特的选择。在所有应用商店中，苹果应用商店是“老大哥”，其应用数量远超其他任何应用商店。不过，既然你已经选择为
    iOS 设计应用，想必你早已明白这一点。


    应用无处不在。自 2008 年 7 月苹果应用商店最初上线并拥有 500 个应用以来，应用数量便持续稳步增长。截至 2013 年 6 月，这一数字已增至近
    90 万，苹果 CEO 蒂姆·库克估计，迄今为止已向开发者支付了 100 亿美元。因此，如果你有一个应用的点子，那便意味着你拥有赚钱和触达大量用户的绝佳机会。这些都是你愿意为
    iOS 进行设计的绝佳理由。


    如今，应用的点子并不难找。很多人都能想到。那么，你该如何将你的想法从“一个点子”转变为实际存在于应用商店中、能在设备上运行的真正应用呢？这不可能一蹴而就，但只要稍加努力，就绝对有可能实现。


    将应用上架苹果应用商店并非难事。但创造一款具有原创想法、出色视觉效果和卓越执行力的应用却非易事；这需要大量的规划、一点调研和相当的投入。


    如果你想让你的想法从仅仅是一个点子，最终变成设计完善并开发完成、可在移动设备上运行的 iOS 应用，你需要遵循一些步骤——非常具体的步骤。


    虽然这个过程看似艰巨，但却是必要的，尤其是当你第一次尝试设计应用时。


    一个简单的事实是，大多数提交到应用商店的应用最终都“夭折”了，并在发布后不久便无人问津。如果没有恰当的规划，面对应用商店中海量应用的激烈竞争，如果你的应用不具备独特的创意和执行方式，那么它很可能不会被很多人注意到。无论是出于商业目的还是仅仅作为个人项目，你在考虑创建应用时的最终目标都是尽可能触达更多用户。如果你有一个很棒的应用程序想法，并且你坚信它，那就去做吧。有很多人想到了点子却从未付诸行动，所以仅仅因为拥有这个想法，你就已经属于少数人了。为之庆贺吧，因为真正的工作现在才开始。


    ## 假设


    本书基于一些假设作出，最主要的假设是：你至少从开发角度对 iOS 有所熟悉，但同时希望有机会通过了解一些设计知识来拓展你的开发技能。然而，本书并非关于开发本身。如果你对学习如何*构建*一个
    iPhone 应用感到好奇，那么这本书并不适合你。但如果你希望专门增强与 iPhone 操作系统相关的设计知识，那么你来对地方了。


    为了简洁起见，在本章中，我将构思过程分解为六个易于遵循的步骤。每一步都会让你更接近设计出你的 iOS 应用的最终目标。


    1.  定义你的想法。

    2.  与同行分享你的想法。

    3.  将你的应用与其他应用进行比较。

    4.  分析你的发现。

    5.  保存同类应用以供将来参考。

    6.  必要时修改你的想法。


    ## 第一步：定义你的想法


    首先，用一两句话写下你的想法。三句话也许也可以，但请尽量用两句简短的话说清楚。如果需要更多句子，那也没问题；然而，目标是能够在 30 秒或更短的时间内描述并解释你应用背后的想法及其功能。这通常被称为“电梯演讲”，也是整个流程的第一步。花些时间，尽可能让这些句子简洁的同时，仍能准确表达你的应用功能。这一点很重要，它将对你和你的应用大有裨益，因为在设计和最终构建应用的过程中，你会反复回到这些描述上。当你推进接下来的几个步骤时，你会发现，随着你审视其他应用和类别，你对应用的描述可能会发生变化。这是流程中很自然的一部分。保持灵活，乐于改变。


    例如：“‘轻装旅行’应用将通过提供清单来帮助频繁旅行的人，确保他们只打包即将到来的旅行所需的物品。”


    写完你的陈述后，反复背诵直到记住。你应该能够在不参考笔记的情况下说出它。问问自己它听起来如何。语法是否正确？你关于应用的构思是否合时宜？它是否解决了人们当下正面临的问题？它是否以人们需要的方式处理了问题？它是否独特？如果是，它独特在哪里？如果不是，那么你需要继续完善你的描述。不要急于求成。如果你在第一步就卡住了，那很可能说明你的想法还需要打磨。给它应有的时间。


    一旦你能够跨过这第一道坎，并且对自己的应用描述感到满意，就把它先放到一边，几天后再回来看。当你再次阅读你的想法及其描述时，它是否还像第一次那样让你兴奋？这个句子是否让你想进一步探索这个应用？有什么变化？更重要的是，它听起来是否仍然是个好主意？它是否仍然让你充满最初对这个项目的热情？


    如果不是，那么或许值得对你的描述以及催生它的想法再下功夫。根据你对此感受的强烈程度，你可能想完全放弃这个想法，转而开始构思另一个不同的应用。一切由你决定。


    重要的是要记住，很多人每天都会产生想法。但是，拥有一个想法和将之变为现实之间存在着巨大差异。这个流程的第一步，就是让你的想法超越最初的构思阶段。


    但是，如果你和刚开始时一样坚信，并且仍然对你的想法充满热情，那么是时候进入下一步了。


    ## 第二步：与同行分享你的想法


    与他人分享你的想法！这对某些人来说可能听起来有违直觉，甚至非常可怕，但事实并非如此。为了验证你的想法，你绝对需要与他人分享。如果想法只是停留在你脑子里，那又有什么用呢？问问你的朋友和你身边信任的人，让他们针对你的想法坦诚地说出看法。尝试与那些敢于给你真实反馈的人分享你的想法和描述。寻求建设性的批评，但同时也要确保你已准备好接受它。


    提出有助于推动想法前进并最终指导其设计和功能的问题。如果你有时间，可以创建一个简短的问卷，请人们填写。


    沿用上面“轻装旅行”应用的初始想法，以下问题是你可能会问的示例：

    '
- fmt: '1. `Do you understand the problem the app is trying to solve?`

    2. `If not, what’s missing?`

    3. `Is it clear to whom the app is trying to reach?`

    4. `Would you use this app? Why or why not?`

    5. `What would you change?`


    Briefly state the idea around the app, what it does, and how it will work. Then
    ask a few key questions that will help to provide you with information that will
    help to develop the idea further. The questions should be leading with the intent
    of drawing responses that are as specific as possible. At this point in the ideation
    process, the more specific the responses, the more valuable they will be to you
    and will help to inform the design of your application.


    Some of you might be hesitant to share your ideas with others at this stage. In
    this day and age of patent trolls and copyright infringements, it might be easy
    to think that sharing your idea is the wrong thing to do. Remember, you can’t
    copyright an idea so it is important to get critical feedback up front and early
    in the process. If you are concerned about sharing your ideas with a wider audience,
    stick with a core group of people that you can trust. Friends, colleagues, and
    even family members will do as long as they are within the target demographic
    for your app.


    The process doesn’t have to be a long, drawn-out affair either. Your description
    of the app and what it does and a few short questions that will illicit the best
    feedback will suffice.


    Once you’ve done this and you receive responses either verbally or via your questionnaire,
    go through all responses carefully. Are the answers clear? Do you need to ask
    follow-up questions for clarification? If you need to, then do so. When this is
    complete, sit down with your idea and the feedback you’ve received and review
    your idea description while reviewing the feedback. How can you revise your idea
    to address the issues outlined in the feedback?


    It is important to note that not all feedback is good feedback. Some feedback,
    you will need to take with a grain of salt. A good rule of thumb is to consider
    feedback and suggestions that bring you closer to the core of what you saw your
    app to be. If the feedback you receive helps you to solve the problem your app
    is addressing, then consider it. Did you receive feedback that was unexpected
    or that might cause you to rethink your idea? This is perfectly fine.


    If you need to rewrite your statement and description for your idea, then do so
    and check it against the feedback you’ve received again. Keep all the feedback
    you receive, even if you don’t use it in this phase of the project. It will come
    in handy later as you move through the design process.


    ## Step Three: Compare your app to others’


    In this step, we will begin to really expand on the initial idea you created for
    your app in step 1. Now that you’ve validated it with a small control group of
    potential users, we’ll need to see how your idea stands up against existing apps
    in the Apple app store.


    Since the App store launched in 2008 with 500 apps, the number of applications
    available for iOS devices has grown exponentially every year. As mentioned earlier,
    as of June 2013, there were approximately 900,000 apps in the Apple app store.
    That’s a lot of competition! Luckily, Apple does a pretty good job at categorizing
    the apps, and the app store is easy to access and browse right from your iPhone,
    iPad, or iPod Touch.


    A good place to start is in the Featured section or tab of the App store. Here,
    you will see the `New and Noteworthy` and `What’s Hot` sections of the store.
    These are apps that have been chosen by Apple’s editorial staff as exhibiting
    best-in-class usability, design, and functionality. Because of this, they are
    featured by Apple and also tend to do extremely well when it comes to popularity
    and sales. Usually, these apps are flagged upon submission to the app store as
    being unique. Apple’s editorial staff tries to pick apps that are innovative in
    some way to feature in the App store. Chances are, you may already have some of
    these apps but with the sheer number of apps being released every day, you may
    see new apps that you’ve not seen before. Apps in the `New and Noteworthy` and
    `What’s Hot` sections will be from a variety of categories. It is a good idea
    to view apps that aren’t in your particular app’s category as well as ones that
    are to be able to see a variety of styles and functionalities.


    Take a look at apps in the `Top Charts` as well for an indication of which apps
    are currently most popular. Navigate to each app’s page and pay particular attention
    to the description and screenshots for each app. Are there any hints as to what
    makes this app unique in its particular category? Note that you will find multiple
    apps that do the same thing in one category. For example, `Games` is far and away
    the most popular category in the Apple app store followed by `Education`, `Entertainment`,
    and `Lifestyle`. These categories are chocked full of apps with more being designed,
    developed, approved, and released every day. Your app will really need to stand
    out if it’s targeting one of these categories.


    As you go through the lists of popular apps, be sure to navigate to each app’s
    page in the app store. Note the icon for the app; the app’s name; its description;
    screenshots; and last, but not least, the number of reviews and average rating.
    Most apps listed in the `New and Noteworthy` section of the App store have impressive
    download numbers, reviews, and high ratings. Reviews and ratings are important
    statistics for any app. They are visibly shown on your app’s page in the app store,
    so naturally, you want your app to be popular and well designed in order to receive
    high ratings from its users.


    When reviewing an app’s page you will see that screenshots are required for all
    apps. Take a look at the screenshots for the more popular apps. Note the ones
    that stand out for you. Note that based on the screenshots, you might be able
    to get a sense of functionality. That is not the purpose of this exercise. Use
    the screenshots to get a sense of the design aesthetic of each app. What is unique
    about the UI of the app? Note the color scheme and what works based on what you
    can see from the page. Do any of these things make you more or less inclined to
    download the app? Note why or why not.


    Pay special attention to the apps that are in the same category as the app you
    would like to create. Are there similarities? What clues can you glean from the
    app’s page in the app store about functionality and design?'
