    \n## Design Patterns Are Your Friend\n\n## Thumbs Rule\n\n## Hi- to Low-Res\n\n\
    ## Get ‘Em in Quick\n\n## Test, Test, and Test Again\n\n## Software Will Help\n\
    \n## Icons and Screenshots Are Important, Too\n\n## Handoff and Communication\n\
    \n## Summary\n\n## Index\n\n# About the Author\n\n![image](images/9781430263647_unFM-01.jpg)\n\
    \n**Sian Morson** is a tech entrepreneur, mobile evangelist, and strategist.\n\
    \nIn 2010, Sian founded Kollective Mobile to help businesses and startups with\
    \ mobile development and strategy. A seasoned digital professional, Sian has worked\
    \ with many high-profile clients to deliver large web builds and campaigns for\
    \ popular brands. Her diverse skill set includes marketing, advertising, mobile\
    \ strategy, business management, and thought leadership. She works closely with\
    \ her partners and clients to assist them in achieving their overall business\
    \ objectives.\n\nSian speaks and writes about mobile strategy for a number of\
    \ publications and also works with a variety of nonprofits working to bridge the\
    \ digital divide.\n\nAn internationally exhibited artist, Sian enjoys fusing her\
    \ creativity with technology. Her video artwork has been featured in the prestigious\
    \ Optica Festival in Spain; Director’s Lounge Berlin; Aakriti Gallery in Mumbai,\
    \ India; and MoCADA Museum in Brooklyn, New York.\n\n# About the Technical Reviewer\n\
    \n![image](images/9781430263647_unFM-02.jpg)\n\n**Danny Swarzman** is a software\
    \ engineer who has been developing software for Apple products since the Apple\
    \ II. He has written many magazine articles about various computer systems both\
    \ for professional programmers and for beginners. He is an electronics hobbyist\
    \ who has developed sketches and interfaces for Arduino. Throughout his career\
    \ he has created software to control conveyor systems, medical equipment, milling\
    \ machines and various custom devices. When not developing software, he enjoys\
    \ the occasional game of go. His email is danny at stowlake dot com. His site\
    \ is `http://stowlake.com`.\n\n# Acknowledgments\n\nTo everyone at Apress: Kevin\
    \ and James, thanks for your patience. Maybe the next one will be easier! Dominic\
    \ and Steve, thank you for working with me to craft the initial outline for what\
    \ this book eventually became. To all of the talented editors (Danny and Anne\
    \ Marie) who helped to craft my ramblings into something coherent, I appreciate\
    \ your help throughout this process. It’s one of the hardest things I’ve ever\
    \ done and certainly would not have been possible without you.\n\nTo all of the\
    \ talented designers and developers at Kollective Mobile, thank you for helping\
    \ to make my job infinitely easier. And thank you to my designer friend and colleagues\
    \ who have inspired me with their work: Drew, Ryland, Henry & Mike.\n\nLastly,\
    \ to those who supported me when I didn’t think I could do it: Mom, Alison, Khem\
    \ and Lisa – thank you all for your support.\n\n# Introduction\n\niOS is one the\
    \ most popular mobile operating systems of our time. If you are serious about\
    \ mobile design, then iOS 7 is a must. As the owner of a mobile development agency,\
    \ I can tell you that over 50 percent of our requests for apps are requested for\
    \ iOS. With the release of iOS 7 and new devices, iOS is a global leader in a\
    \ mobile ecosystem. Anyone serious about mobile design or development cannot exclude\
    \ iOS.\n\n# Who This Book Is For\n\nThis book is for those already familiar with\
    \ iOS from a development standpoint but are now ready to try their hand at design.\
    \ It assumes that you are familiar with some of the nuances of the operating system\
    \ and are interested in designing a simple application that either you or someone\
    \ else will develop. The book will take you through the process of crafting your\
    \ idea into a clear and actionable statement, through the details of creating\
    \ your first wireframes and ultimately to design your app. It highlights tools\
    \ and tips to help you with the design process and even highlights popular mobile\
    \ design patterns to ease some of the challenges of design. If you’re ready to\
    \ take on designing for the world’s most popular mobile operating system, Learn\
    \ Design for iOS is for you.\n\n# How to Use This Book\n\nThis book is structured\
    \ in a way that allows you to take your concept for an iOS application from your\
    \ initial idea through preparation for development. The book will guide you, step-by-step\
    \ through the processes of idea validation, ideation, design, and asset preparation\
    \ for development. It covers creation of screens and guidelines that designers\
    \ should be aware of from Apple’s Human Interface Guidelines. The book is a general\
    \ high-level guide for those who are interested in learning more about the iPhone\
    \ operating system and what is required when designing an application for the\
    \ iPhone, iPod Touch, or iPad.\n\n# What You’ll Find on the Web Site"
