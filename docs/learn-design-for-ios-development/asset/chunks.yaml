    假设你已按照图 7-2 所示设置好画布，图 7-4 中的`Layers`面板将位于右侧，你可以在其中看到设计中的所有元素。你将使用该面板来管理应用的设计。当你创建如图
    7-2 所示的第一张图片时，这很可能就是应用的背景。虽然你可以在设计中使用多个图层，但只能有一个背景。


    ![9781430263647_Fig07-04.jpg](img/9781430263647_Fig07-04.jpg)


    图 7-4：Photoshop 中的`Layers`面板


    在`Layers`面板中，你可以更改每个图层的偏好和属性，例如给定图层的透明度和不透明度。


    图层是你在 Photoshop 画布上创建的任何东西的构建块。如果你的应用非常复杂，那么你将拥有相当多的图层。养成命名图层并确保它们遵循应用自然结构的习惯。也就是说，当你打开主文件并查看设计时，你的图层应该很容易与你的设计相对应。你需要为图层命名，使其与设计内容对应。


    例如，这能让编辑和你的开发者查找图层变得更加容易。Photoshop 会为图层命名，但方式并不直观（例如，图层 1、2、3 等）。如果你有一个包含大量图层的文件，并且这些图层名称与设计中的实际元素不对应，那么找出需要编辑的图层将花费大量时间。当图层数量开始增加时，你会发现为它们命名是最简单的方法。


    图层也可以分组。因此，如果你有几个与特定元素（如标签栏）关联的图层，你可能希望将这些图层分组或放入一个文件夹中。这样，在开发或后期需要修改设计时，查找它们会更容易。


    无论你从互联网上找到的模板中挑选元素（有很多这样的模板）还是自己创建，都要确保这些元素是矢量形式。矢量可以根据你的喜好进行缩放和调整，而不会损失质量。在 Photoshop
    中，矢量被称为形状图层。当你开始从 Retina 屏幕缩放到非 Retina 屏幕时，你就会看到它们有多有用。


    ## 创建注册/登录页面


    为了我们`Travel Light`应用的目的，我们将保持设计相当简单。我们的第一个屏幕将是应用的注册或登录屏幕。虽然简单，但这个屏幕非常重要。它是用户与应用的首次接触。因此，品牌颜色也需要在这个屏幕上显现出来，所以请明智地选择你的背景颜色。如果你已经有了一个配色方案，这可以为你节省数小时的猜测和尝试不同颜色组合的时间。如果你知道用作基础颜色的颜色，一个简单的组合调色板的方法是改变基础颜色的色相和亮度来创建一些变体。为此，你需要在
    Photoshop 中打开颜色选择器窗口。通过单击`Tools`面板底部代表前景色或背景色的任何颜色色板，可以访问颜色选择器面板。在那里，你可以选择十六进制代码或使用选择器通过视觉选择颜色。你还可以从此处调整饱和度或亮度。我在下面的图
    7-5 中展示了颜色选择器。


    ![9781430263647_Fig07-05.jpg](img/9781430263647_Fig07-05.jpg)


    图 7-5：在 Photoshop 中选择颜色


    出于`Travel Light`应用的目的，我们选择了一个非常粉彩风格的配色方案。注意上面截图中的设置。我们将使用这种颜色作为背景，另一种颜色作为`Travel
    Light`应用的前景色。


    一旦背景设置好，我们将其标记为背景并锁定，以便我们可以在该图层之上自由移动。在定位元素时，你不希望它移动太多。然后，使用形状工具绘制代表输入字段（包括电子邮件登录和密码）以及提交按钮的形状。


    你不希望用太多信息让用户不知所措。你的目标是收集他们的信息并让他们尽快进入应用。保持简单。首要任务是让用户知道如何访问应用。根据我们的线框图，我们正在创建一个简单的注册页面，允许用户输入他们的电子邮件地址和密码，然后提交该信息以访问应用。


    图 7-6 中的屏幕分别展示了带网格线和不带网格线的设计页面。你可以选择使用或不使用它们。你可以通过以下路径打开或关闭它们：`View` → `Snap To`。你可以看到网格线如何帮助对齐屏幕上的所有元素。图
    7-7 中的屏幕显示了包括`Tools`菜单在内的整个画布，以便你可以看到我如何命名对应于该页面的图层。


    ![9781430263647_Fig07-06.jpg](img/9781430263647_Fig07-06.jpg)


    图 7-6：带网格线和不带网格线的登录屏幕


    ![9781430263647_Fig07-07.jpg](img/9781430263647_Fig07-07.jpg)


    图 7-7：`Travel Light`登录屏幕画布


    我们刚刚为`Travel Light`应用创建了第一个页面，主要通过使用矩形工具创建了两个字段和一个按钮。以下是我设置画布并创建背景后采取的步骤：


    创建电子邮件和密码字段：


    1.  创建一个新图层并将其命名为“Email address”。

    2.  使用矩形工具绘制一个代表电子邮件地址字段的矩形。网格线将帮助你确保字段宽度合适，并且如果打开了智能参考线，它们将帮助你将其居中在屏幕上。

    3.  使用参考线帮助你在屏幕稍高的位置垂直对齐电子邮件字段，为第二个字段留出空间。

    4.  为字段选择一种颜色，并将图层命名为“Email”。

    5.  选择文字工具并在矩形中输入“Email address”。

    6.  根据需要调整字体大小和颜色。

    7.  通过右键单击并选择菜单中的“Duplicate layer”来复制图层。Photoshop 将创建一个名为“Email address copy”的新图层。

    8.  双击标题将其更改为“Password”。

    9.  使用移动工具移动新字段。将其稍微向下定位，确保与上面的字段对齐。

    10. 选择文字工具，在矩形中输入“Password”以替换“Email address”。

    11. 创建另一个图层副本并将其命名为“Submit”。

    12. 重复上述步骤，为按钮赋予独特的颜色和标签。


    按钮的颜色应该让人一看就知道是可操作的，即使标签没有明确说明。我选择了亮绿色（#12e30d）作为提交或登录按钮的颜色。


    水平文字工具用于输入字段和按钮的标签。使用文字工具出现时显示的`Properties`面板来更改字体的字体、大小和颜色。


    如果你的应用主页屏幕有更多字段，那么添加并标记它们。别忘了添加一个操作按钮。尝试不同的颜色组合来打造你的应用品牌，并使其与下层页面保持一致。


    **提示**：如果在为应用构思配色方案时遇到困难，可以使用我在本书前面提到的一些资源。


    ## 创建选择和编辑行程页面


    现在，让我们进入一个包含更多元素的页面。

