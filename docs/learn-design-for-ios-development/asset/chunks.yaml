- fmt: '# Cover Icon


    Along with your default cover icon, you will need to include a separate issue
    icon that acts as a visual representation of each new issue as it appears not
    only on the newsstand “shelf” but also in the multitasking bar on various devices.
    This icon, unlike the default cover, can include some specific details about the
    content of that issue so that users are able to identify it. As with other icons,
    do not add any visual embellishments or enhancements to newsstand icons. The addition
    of enhancements in appearance such as corners, pages, or perspective is specifically
    forbidden.


    # Promotional Screenshots


    Screenshots of your app are an important part of your promotion in the Apple app
    store. Screenshots are displayed on your app’s page along with metadata, a description,
    and your app’s icon. Screenshots aren’t a part of your app’s bundle, but at least
    one is required when submitting your app via `iTunes Connect`. If you can only
    include one screenshot of the app, make it the best one. While only one screenshot
    is absolutely required with your bundle for the submission and acceptance to the
    app store, I recommend that you add as many as Apple will allow, which was five
    last time I checked. Five screenshots are plenty and with those you can really
    give users a sense of what the interface of your app is like and what they can
    expect when they download it.


    Also, the order of your screenshots will matter. They will be displayed in the
    order in which they are uploaded so a sequential view of the user interaction
    of your app is a nice way to orient users to your app and its most important or
    exciting features. Screenshots also will go a long way toward increasing the discoverability
    of your app in the app store. If your app only has one screenshot (as required),
    users won’t be able to get a good sense of your app’s interface. In this day and
    age when so many apps are pushing the boundaries of design, adding as many screenshots
    as possible gives users a sense of what they will be getting for the time and
    money (if your app isn’t free) that they will invest in downloading your app.


    If your app is visually unique or contains an innovative feature, you can also
    include a screenshot of this page or feature. If the app is a universal app and
    will run on an iPad, you are required to add a screenshot of your app on the iPhone
    and iPad along with your app submission.


    Your screenshots should be high quality files and the visuals should be clear
    and crisp. Apple documentation states that if you take screenshots from an actual
    device running your app, the status bar should be removed before uploading them.
    However, a quick scan of the app store shows quite a few apps with screenshots
    including the status bar. It seems as though this is not an offense that will
    cause your app to be rejected from the app store. The app store will, however,
    only accept screenshots in the following formats: `JPEG`, `TIFF`, or `PNG`. [Figure
    8-3](#9781430263647_Ch08.xhtml#Fig3) shows two screenshots from the Travel Light
    app with and without the status bar.


    ![9781430263647_Fig08-03.jpg](images/9781430263647_Fig08-03.jpg)


    [Figure 8-3](#9781430263647_Ch08.xhtml#_Fig3). The image on the right is acceptable
    for submission to the app store. The one on the left is not.


    Users of iOS devices are familiar with the manual way of creating screenshots,
    which is to hold the home and power buttons. If you are familiar with `Xcode`
    and have a version of your app that you can compile and run, you can also take
    screenshots that way. These screenshots will be permissible for the app store
    as well.


    Here’s a list of Do’s and Don’ts for your screenshots.


    ## Do:


    * Make sure your content is legible in all sizes

    * Upload the maximum number of screenshots (5) for your app

    * Use your devices to take screenshots of your app

    * Remove the status bar from all screenshots

    * Think about how your app’s images will translate across country and cultural
    borders

    * Localize screenshots if necessary


    ## Don’t:


    * Add marketing messages to your screenshots

    * Include a device frame around the image


    # Promotional Artwork


    If your app is exceptional in execution and design, Apple may decide to feature
    it in the app store. If you feel that your app might be chosen by Apple to be
    featured or think that your app has a good chance, then it’s a good idea to create
    promotional artwork assets ahead of time. Even if you don’t think your app stands
    a chance, it’s a good idea to get into the habit of creating promotional artwork
    for your app. Promotional artwork lets you add a little creativity into your images
    to give users a visual story behind your apps. But Apple will have the final say
    on what this looks like once it has been added to the app store.


    Unless you have some prior knowledge of this (which is rare) the request will
    be unexpected and will usually have a time deadline associated with it. So, better
    safe than sorry or safe than scrambling.


    While there is no tried and true formula for what Apple will feature in the app
    store, it’s a safe bet to say that your app must be well designed and have a unique
    look and feel to be featured in the app store. If your app has lots of downloads
    and is incredibly popular, that can sometimes help. But mostly, Apple looks for
    apps that are really compelling in form and function. Your app must stand on its
    own and elevate the platform. The app icon is a big part of getting your app noticed
    by Apple, too. The Human Interface Guidelines specifically state that in order
    to be considered for a feature, your icons should be original and attractive.


    Take a look at what’s currently featured from week to week and try to get a sense
    of what’s popular. Also note how Apple promotes various apps and how these promotional
    areas appear in the app store. It is possible that Apple may feature your app
    in a category with other similar apps or in multiple areas in the app store.


    If you get a request for promotional material, it’s a good indication that your
    app will be featured but Apple is clear with the verbiage that this isn’t a guarantee
    of anything. What they are clear about is precisely what they expect to receive
    from the app creator or owner when such a request is made.


    Since Apple’s own team will be creating the files they need, they require you
    to send the layered `PSD` files. Each `PSD` file must have a separate layer for
    all of the various elements. If there are elements that must stay together, then
    keeping them in a single layer is a good idea. You won’t be consulted by Apple’s
    design team on any changes they make to your files if your app is chosen for the
    app store. So, keeping elements that must stay together in an already flattened
    layer is a good indicator of what can be moved and what shouldn’t. As with everything
    else that must be submitted to Apple, it must adhere to strict guidelines, and
    promotional images are no different. Here are some of the specifications for promotional
    artwork:


    * Any background art should be at least 3200 px wide and 600 px high with a minimum
    of 72 dpi. Background art should also be RGB color and in `PSD` format only.

    * Your artwork should not include text or logos in the Tag area. This is used
    exclusively for `iTunes`-related tags. The tag area itself is 200 px from the
    bottom of the artwork.

    * Any text or logos should only appear in the center of artwork in the text/logo
    safe area.

    * Title treatment should be 2004 px wide and 586 px high.


    # Your App’s Page


    When your app is ready for submitting to the app store, you will be required to
    fill in information about your app for your app’s page in the app store. Here
    is the information you’ll need to provide:


    * Your app’s name

    * Category

    * Rating (Not user rating but ratings for targeted age group)

    * Description

    * Keywords

    * Screenshots

    * Supporting URL

    * Marketing URL (optional)

    * Privacy Policy (optional)

    * Contact Info'
