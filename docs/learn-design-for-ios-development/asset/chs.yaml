  #### Adobe Fireworks 怎么样？


  设计界可能有人现在会提出上述问题。一些设计师是 Adobe Fireworks 的热烈支持者和粉丝，这是 Adobe Creative Suite 中的另一款图形软件工具。然而，最近（确切地说是
  2013 年 5 月），Adobe 宣布将不再为 Fireworks 添加新功能。虽然它将继续在 Adobe Creative Suite 6 和 Creative
  Cloud 中包含 Fireworks 并进行销售，但将不再投入工程时间或人才对该软件进行改进或额外升级。不过，Adobe 仍将继续支持该软件。话虽如此，对于为
  iOS 应用创建设计而言，Fireworks 是一个值得推荐、比 Photoshop 更简单的替代方案。Fireworks 的结构与 Photoshop 类似，用户界面也很相似。正如下面的截图所示，如果您熟悉
  Photoshop 界面，那么 Fireworks 会让您感觉异常熟悉。下面的截图是我们在 Fireworks 中打开的 Travel Light 应用屏幕详情页面的
  Photoshop PSD。Fireworks 的一大优点是它能够读取和写入 PSD 文件以及其他图形格式。


  Adobe Fireworks 作为原型设计和导出的出色工具而享有盛誉。因此，如果您在 Photoshop 中完成了设计，需要切图并将其导出为 PNG，那么 Fireworks
  将很好地辅助您完成此操作，并确保导出的文件可直接在 Xcode 中使用。




  使用 Adobe Fireworks 的另一个优势是，您创建的任何对象都是矢量格式。当您需要以任何理由缩放资源时（并且您需要为旧版 iPhone 进行缩小），这将大有帮助。您会发现这也适用于效果和滤镜。随着扁平化设计减少了对一些复杂效果的使用，这可能不是一个特别重要的问题，但如果您需要使用它们，这将派上用场，并且在
  Fireworks 中能更好地使用并轻松缩放。


  如果我们将 图 7-11 中的 `PSD` 导入到 Fireworks，我们可以像在 Photoshop 中一样继续编辑它。在我看来，Fireworks 的界面稍微简单一些，也更用户友好一些。因此，您可以在
  Fireworks 中完成设计，也可以在任一程序中创建整个设计并获得类似的结果。


  ![9781430263647_Fig07-11.jpg](img/9781430263647_Fig07-11.jpg)


  图 7-11. Adobe Fireworks 中的 Trip List PSD


  通过本章概述的技术，您应该能够为 iOS 创建一个简单的设计。您暂时不会成为一名资深的 iPhone 设计师，但只要稍加练习并运用我上面使用的流程，您应该能够创建应用中的大部分页面。


  ### 总结


  Adobe Photoshop 是当今数字设计的事实标准。可以说，这个图形程序是所有应用设计的根基。为了设计应用，您需要学习如何使用 Photoshop。它较少被使用的表亲
  Adobe Fireworks 也能胜任工作，但 Adobe 将不再对其提供支持。如果您希望被认真对待为一名设计师，您需要熟练掌握 Photoshop。Photoshop
  和 Fireworks 都是设计应用的好工具。如果您觉得其中一个更易用，您的 `PSD` 文件也可以在这两个程序中通用。两者都来自 Adobe，并拥有各种工具来简化设计过程。探索
  `Tools` 面板将帮助您熟悉创建应用界面所需的工具。另一个您需要关注的界面是 `Layers` 面板。请务必以直观的方式命名图层，因为您的设计很可能会产生大量图层。如果您要创建多个屏幕或应用的不同版本来展示给客户，`Layer
  comps` 将非常有用。


  ## 第 8 章. 创建应用图标和 App Store 所需的其他图形


  到目前为止，您已经基本完成了应用设计的整个流程，并将其交给开发人员进行开发。虽然您可以将应用图标与其他开发资源一起添加到程序包中，但应用图标是您可以独立关注的事情。作为一项规则，您的应用应具备一定程度的精致度。


  虽然我们之前讨论过与应用中其他区域（例如标签栏和界面）相关的图标，但我创建本章的目的是专门讨论图标以及最终需要交付给 Apple 的应用包中包含的其他图形。正如我们所知，Apple
  非常重视美学设计。可以说，您的应用不仅应遵守《人机界面指南》中规定的界面标准，还应该美观。对应用设计施加的严格准则是存在原因的。这些准则也延伸到了应用图标的设计，而应用图标是用户在
  App Store 中发现您应用的主要方式。它在 App Store 的多个不同位置被使用。在本章中，我将讨论 iOS 应用所需的其他图形。这些包括宣传图、应用图标、截图以及应用在
  App Store 中的页面。如果您的应用是杂志类应用，这还包括报摊图标。这些用于向潜在客户展示您的应用。一个精心设计的图标和精心挑选的截图，可能意味着潜在客户会下载您的应用还是忽略它。


  ### 应用发现


  应用发现过程非常简单。用户有几种方式可以了解到您的应用。如果您足够幸运获得媒体报道，他或她可能会在一篇文章中了解到您的应用，或者通过 `148Apps`、`Appolicious`
  或 `AppCraver` 等众多应用评测网站。这些网站追踪新版本发布，并对几乎所有可用类别的应用提供深入评测。如果您希望在基于特定标准下载前了解某个应用的信息，这些网站会很有帮助。这些网站很受欢迎，并且通常拥有忠实的追随者。它们也很棒，因为它们能提供有关降价的信息。


  > **提示**：开发者有时会针对付费应用提供特殊促销活动，并在一段时间内降低购买价格。这些促销活动被称为“降价”，可能在没有预警的情况下开始和结束。


  虽然评测网站和文章是了解新应用的好方法，但也许最久经考验的发现应用方式之一，就是浏览 Apple 自己的 App Store。


  ### App Store


  App Store 不仅仅是一个商店。它实际上是 iOS 应用的数字分发平台。虽然“App Store”这个术语现在也适用于 Mac App Store，但基于本书的目的，我们将专注于
  iOS App Store。App Store 为所有 iOS 设备分发应用，是用户购买和下载 iOS 应用的主要渠道。


  App Store 应用已预装在每台 iOS 设备上。该应用将用户直接连接到商店，并方便他们购买应用。它还与 `iTunes Connect` 以及用户的 `iTunes`
  账户相连。


  > **提示**：`iTunes Connect` 是面向 iOS 开发者的一个 Web 门户。它允许他们管理其应用的不同版本、报告以及与其应用关联的所有元数据。


  如您所知，用户必须拥有 `iTunes` 账户才能在其设备上购买应用。`iTunes` 和您的 `Apple ID` 将允许您访问 `iTunes Connect`，并将您的应用提交给
  Apple 以供审核，然后分发到 App Store。用户将能够通过 App Store 应用将您的应用直接下载到他们的设备上。App Store 应用已包含在每台
  iOS 设备上，并通过其独特的图标识别，该图标以“A”字形排列着画笔、铅笔和尺子。更新后的扁平化图标如 图 8-1 所示。


  ![9781430263647_Fig08-01.jpg](img/9781430263647_Fig08-01.jpg)


  图 8-1. iOS 7 中 App Store 图标的新外观




  App Store 已经处理了超过 500 亿次应用下载，并拥有 5.75 亿个商店账户。要对所有这些应用进行排序需要花费一些时间。随着商店中应用数量的增加，Apple
  多年来一直在对 App Store 的导航便捷性进行细微改进。例如，增加了“编辑推荐”等类别，更突出地展示“精选”应用，将应用“合集”分组，甚至可以在 App
  Store 中找到万圣节或圣诞节等节日主题的应用。最近，一个专门为`iOS 7`设计的应用类别被添加进来。自其发布以来，这个应用选集一直在 App Store
  中突出显示。


  所有已提交并通过 Apple 审核的应用都会出现在 App Store 中。


  要将您的应用提交到 App Store，您需要以下素材：


  *   App 图标

  *   启动图像

  *   报刊亭封面图标（如果应用属于该类别）

  *   屏幕截图

  *   宣传图


  App 图标、启动图像和报刊亭封面图标都包含在应用包中。应用包是由 Xcode 创建的一个包，其中包含您的应用可执行文件以及所有支持资源，包括 App 图标、图像文件等内容。


  ### App 图标


  App 图标是用户首先看到的，将代表您的应用。它会在设备的主屏幕以及 App Store 中代表您的应用。App 图标是必需的，提交的应用如果没有它将被拒绝。虽然《人机界面指南》中提到的一些图标和图稿是可选的，但
  App 图标不是。


  如果您正在创建一个要提交到 App Store 的新应用，那么您应参考《人机界面指南》，以了解所有设备的 App 图标、Spotlight 搜索结果图标和“设置”图标的最新尺寸和要求。


  您可能会认为，由于尺寸限制，App 图标几乎没有发挥原创性或创造力的空间。那您就错了。有专门展示精美设计 App 图标的网站和图库，像 Dribbble 和 Behance
  这样的网站上，来自各个领域的设计师和创意人员会发布 App 图标的概念图和真实设计方案。学习并回顾一些设计，以为您的应用图标寻找灵感。除了尺寸要求外，您的 App
  图标必须有助于向潜在用户直观地传达您的应用是关于什么的，同时尽可能包含诸如品牌等额外信息。就像您的应用一样，您对颜色的选择也会影响用户。因此，必须明智地选择颜色。您的
  App 图标必须是独特的，因为它必须在众多争夺潜在用户注意力的应用中脱颖而出。您可以深入查看 App Store 中专门为`iOS 7`设计的应用部分，并仔细研究其中的一些图标。其中一些可能会在设计您的
  App 图标时给您带来灵感。


  Apple 为设计 App 图标提供了许多指导原则。以下是直接摘自《人机界面指南》的注意事项。


  **应该：**


  *   如果可能，寻求专业平面设计师的帮助

  *   确保您的用户能轻松识别图像

  *   保持简洁，避免使用文字

  *   在多种不同背景上测试

  *   避免透明

  *   确保它在所有尺寸下都能良好缩放且清晰易读


  **不应：**


  *   使用 iOS 或 Apple 元素

  *   使用任何 Apple 图像


  与`iOS 6`相比，`iOS 7`中 App 图标的新形状差别细微。肉眼可能注意到也可能注意不到图标圆角半径的差异。说实话，对于设计师来说，这没什么大不了的，因为
  iOS 会自动添加一个遮罩来为 App 图标应用圆角效果。然而，关于`iOS 7` App 图标的新设计一直有很多猜测。人们编写了数学公式，也对其新图标背后的含义进行了大量猜测。在这个关头，对任何设计师来说最重要的是确保图标向用户传达了它需要传达的信息。App
  图标还必须能在多种不同背景以及所要求的各种尺寸下都呈现最佳效果。


  ### 启动图像


  启动图像是当您的应用启动时 iOS 显示的图像。您必须在应用包中至少包含一个启动图像。用户在实际开始与您的应用交互之前，只能短暂地看到启动图像。可以这样理解：如果您的应用启动很快，启动图像会在设备屏幕上一闪而过，然后直接将用户带入您的应用。如果您的应用加载时间较长，那么用户看到它的时间也会更长。如果您这样想，就能为您的应用构思出更好的启动图像。如果您是用户，在进入应用之前您想看到什么？Apple
  还建议在启动图像上避免任何形式的欢迎词、介绍或关于页面。


  有些设计师甚至让他们的启动图像与应用初始页面完全相同。这给人以应用已快速加载的印象，是一些设计师和开发者也会采用的做法。


  Apple 在《人机界面指南》中建议制作一个与应用初始页面相同但无文字或 UI 元素的启动屏幕。这样，当您的应用实际加载时，启动图像和您的应用之间就不会有突兀的视觉过渡。


  最后，所有启动图像都必须包含状态栏区域。启动图像尺寸建议列于表 8-1 中。


  表 8-1。所有设备的启动图像尺寸


  | 设备 | 尺寸 |

  | :--- | :--- |

  | 适用于 iPhone 5 系列（iPhone 和 iPod touch） | 640 x 1136 px |

  | 适用于 iPhone 和 iPod touch | 640 x 960 px |

  |  | 320 x 480 px（标准分辨率） |

  | iPad 竖屏 | 1536 x 2048 px |

  |  | 768 x 1024 px（标准分辨率） |

  | iPad 横屏 | 2048 x 1536 px |

  |  | 1024 x 768 px（标准分辨率） |


  ### 报刊亭封面图标


  如果您的应用属于报刊亭类别，则其图标有特定的规则。您的图标将与其他杂志和刊物一起显示在报刊亭应用中。由于这些应用的显示方式，Apple 为这些图标制定了不同的规则。您的报刊亭封面图标与
  App 图标是分开的，因此请务必不要混淆两者。报刊亭封面图标应为您实际杂志或期刊某一期封面的复制品。它用于在报刊亭应用中标识您的应用，而您的 App 图标通常用于在
  App Store 中标识应用。保持报刊亭图标具有通用性，不要太具体，但请记住，您绝对希望用户看到封面就能识别出您的杂志。因此，保持字体和布局与杂志普通读者的预期一致，但省略任何季节性或者特定于某一期的细节。图
  8-2 展示了 App 图标和报刊亭图标的外观，以及它们之间的区别。


  ![9781430263647_Fig08-02.jpg](img/9781430263647_Fig08-02.jpg)


  图 8-2。App Store 上的报刊亭部分以及 iPhone 上的一个应用


  请参考《人机界面指南》以获取具体说明，因为需要遵守特定的尺寸和宽高比要求。




  #### 封面图标


  除了默认的封面图标外，你还需要准备一个独立的期刊图标，该图标不仅会在书报架的“货架”上显示，还会在各种设备的多任务栏中作为每一期新内容的视觉标识。与默认封面不同，此图标可以包含关于该期内容的特定细节，方便用户识别。与其他图标一样，请勿为新闻报刊图标添加任何视觉修饰或增强效果。明确禁止添加如圆角、页面或透视效果等外观上的增强设计。


  ### 宣传截图


  应用的截图是你在 Apple App Store 中进行推广的重要组成部分。截图会与应用元数据、描述和应用图标一同显示在应用页面上。截图并非应用包的一部分，但在通过
  `iTunes Connect` 提交应用时至少需要提供一张。如果你只能提供一张应用截图，请确保这是最精彩的一张。虽然提交和通过审核只需一张截图，但我建议你尽可能多地添加截图——据我上次了解，Apple
  允许最多添加五张。五张截图已经足够，通过这些截图，你可以让用户充分了解应用的界面风格，以及他们下载后能够期待的内容。


  此外，截图的顺序也很重要。它们将按照上传的顺序显示，因此按顺序展示用户与应用的交互流程，是让用户了解你的应用及其最重要或最吸引人的功能的好方法。截图还能在很大程度上提升应用在
  App Store 中的可发现性。如果你的应用只有一张截图（按规定的最低要求），用户将无法充分了解应用的界面。在如今众多应用不断突破设计界限的时代，尽可能多地添加截图，能让用户清楚他们投入时间和金钱（如果应用不是免费的话）下载后能得到什么。


  如果你的应用在视觉上独具特色，或包含创新功能，也可以提供该页面或功能的截图。如果应用是通用应用，可在 iPad 上运行，你需要在提交应用时同时提供 iPhone
  和 iPad 上的截图。


  你的截图应为高质量文件，画面应清晰锐利。Apple 文档规定，如果你从运行应用的实体设备上截取截图，上传前应移除状态栏。不过，快速浏览一下 App Store，会发现不少应用的截图仍包含状态栏。似乎这并不会导致应用被拒绝上架。然而，App
  Store 仅接受以下格式的截图：`JPEG`、`TIFF` 或 `PNG`。图 8-3 展示了 Travel Light 应用的两张截图，分别包含和不包含状态栏。


  ![9781430263647_Fig08-03.jpg](img/9781430263647_Fig08-03.jpg)


  图 8-3。右侧的图片符合提交给 App Store 的要求，左侧的则不符合。


  iOS 设备的用户熟悉手动截取截图的方法，即同时按住 Home 键和电源键。如果你熟悉 `Xcode` 且拥有一个可编译运行的应用版本，也可以通过此方式截图。这些截图同样适用于
  App Store。


  以下是截图的注意事项。


  #### 应做到：


  *   确保内容在所有尺寸下都清晰可读

  *   为你的应用上传最大数量（5 张）的截图

  *   使用你的设备截取应用截图

  *   移除所有截图中的状态栏

  *   考虑应用图片在不同国家和文化背景下的适用性

  *   如有必要，对截图进行本地化处理


  #### 不应做：


  *   在截图中添加营销信息

  *   在图片周围添加设备边框


  #### 宣传素材


  如果你的应用在执行和设计上表现出色，Apple 可能会决定在 App Store 中对其进行推荐。如果你认为自己的应用有可能被 Apple 选中进行推荐，或者觉得胜算较大，那么提前创建宣传素材是个好主意。即使你认为自己的应用没有机会，养成为应用创建宣传素材的习惯也是好的。宣传素材允许你在图像中注入一些创意，为用户呈现应用背后的视觉故事。不过，一旦素材被添加到
  App Store 中，最终效果将由 Apple 决定。


  除非你事先有所了解（这很少见），否则这类请求通常是突如其来的，并且通常伴有截止日期。因此，有备无患总好过临时抱佛脚。


  虽然 Apple 推荐应用并没有确定不变的公式，但可以肯定的是，你的应用必须设计精良，具有独特的外观和感觉，才有可能被推荐。如果你的应用下载量很大且非常受欢迎，这有时会有所帮助。但大多数情况下，Apple
  寻找的是在形式和功能上都极具吸引力的应用。你的应用必须独树一帜，并能提升平台水准。应用图标也是引起 Apple 注意的重要因素。《人机界面指南》明确指出，要想获得推荐资格，你的图标必须原创且富有吸引力。


  每周关注一下当前被推荐的应用，尝试了解它们为何受欢迎。同时注意 Apple 如何推广各种应用，以及这些推广区域在 App Store 中的呈现方式。Apple
  可能会将你的应用与其他类似应用放在同一类别中推荐，或在 App Store 的多个区域进行展示。


  如果你收到了提供宣传素材的请求，这通常是一个好迹象，表明你的应用将被推荐，但 Apple 明确表示这并不能保证任何结果。他们清楚说明的是，当提出此类请求时，他们期望从应用创建者或所有者那里得到什么。


  由于 Apple 自己的团队将创建所需的文件，他们要求你发送分层的 `PSD` 文件。每个 `PSD` 文件必须为各种元素单独设立一个图层。如果某些元素必须保持在一起，将它们放在一个图层中是个好主意。如果你的应用被选入
  App Store，Apple 的设计团队不会就他们对文件所做的任何更改征求你的意见。因此，将必须保持在一起的元素放在一个已合并的图层中，可以清楚表明哪些元素可以移动，哪些不应移动。与所有必须提交给
  Apple 的材料一样，宣传图片也必须遵守严格的指南。以下是宣传素材的一些规格说明：


  *   任何背景艺术图至少应为 3200 像素宽、600 像素高，分辨率最低为 72 dpi。背景艺术图应为 RGB 色彩，且仅限 `PSD` 格式。

  *   你的素材不应在标签区域包含文本或徽标。该区域专用于与 `iTunes` 相关的标签。标签区域本身位于素材底部上方 200 像素处。

  *   任何文本或徽标只能出现在素材中心的文本/徽标安全区域内。

  *   标题处理区域应为 2004 像素宽、586 像素高。


  ### 你的应用页面


  当你的应用准备好提交至 App Store 时，你需要为你的应用页面填写相关信息。你需要提供以下信息：


  *   你的应用名称

  *   类别

  *   分级（非用户评分，而是目标年龄段的分级）

  *   描述

  *   关键词

  *   截图

  *   支持网址

  *   营销网址（可选）

  *   隐私政策（可选）

  *   联系信息



  好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。



  如果您的应用是游戏、包含内购、使用 iAd，或涉及版权和定价，则需要填写额外的信息。


  当您的应用提交至 App Store 并被接受后，它会获得专属页面和 URL。苹果批准您的应用后，您会收到一封电子邮件，告知应用已准备就绪，并附带相关详细信息。我收到的一封示例邮件如图
  8-4 所示。邮件中将包含您的应用 ID，以及应用在 App Store（如果已上线）的页面链接。应用的唯一 ID 是 URL 的一部分。该链接将跳转至您的应用页面，您将在其中看到以下内容：


  *   应用的大图标

  *   应用功能的描述

  *   截图

  *   销售者信息

  *   用户评分和评论

  *   必要时提供的本地化截图


