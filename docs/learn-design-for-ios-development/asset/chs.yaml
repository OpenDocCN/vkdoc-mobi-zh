  图 8-4 应用获批后来自苹果的“准备就绪”邮件


  **提示** 如果应用是通过您的开发者账户注册的，您将在应用审核流程的每个阶段都收到苹果的电子邮件通知。


  如果您的应用未获批准，您同样会收到苹果的邮件，说明未批准的原因，以及您可以采取的上诉步骤。


  总结


  虽然应用及其用户界面的设计对用户很重要，但在营销您的应用及其在苹果 App Store 中的位置时，应用图标和其他必需的图形也同样重要。苹果为创建应用图标、推广素材和截图提供了指南，这些资源在应用获批后都会显示在
  App Store 的应用页面上。在开发应用设计时，最好将这些辅助图形牢记在心，因为它们可能决定用户是下载您的应用，还是快速划走。


  第 9 章


  为应用开发最终确定素材


  完成上一章后，您应该已经为应用设计了所有必要的页面和屏幕，并以图层分组且命名恰当的方式创建了它们。如果幸运的话，您还可能已经收到了所有相关方和利益相关者的反馈或批准，可以继续应用开发了。到目前为止，您应该对用户应如何与您的应用交互有了清晰的概念。现在需要的只是为开发人员准备这些素材。


  如果您从一开始就按照本书的指导进行操作，那么您已经基本准备好完成整个流程了。应用设计流程中最困难的部分已经完成，您现在可以将设计交给开发人员进行编码。这一步本身也有一套需要遵循的步骤。如果您对这个过程有一定了解，或者之前执行过其中一些任务，您可能会觉得它不像某些设计人员认为的那样繁琐。


  主要任务包括：


  *   为开发人员创建设计规范文档

  *   将设计切分为资源文件

  *   将资源文件保存为适用于不同设备的多种尺寸

  *   为资源文件命名

  *   打包资源文件以供开发使用


  有些开发人员熟悉 Photoshop，可以自己切分资源文件。如果您是开发人员（你们中的一部分人可能是），您可能熟悉也可能不熟悉 Photoshop 以及如何在
  Xcode 中为 iOS 开发导出图像。本书和本章节假定您需要为开发人员切分屏幕中的所有元素。不过，我不会讨论如何在 Xcode 中准备资源。


  为开发人员创建设计规范文档


  如果您将素材交给开发人员，创建一个参考文档或规范文档总是一个好主意，该文档应包含开发人员开始开发您的应用之前需要了解的所有信息。该文档应提供尽可能多的信息，而不是可能不足，并且应尽可能清晰无误。


  有时，在设计人员眼中一目了然的事情，对开发人员来说并非如此简单。设计规范文档有时可以像一封电子邮件或一份单独的文档那样简单，但它是流程中必要的一部分，并且对于确保您的应用外观和行为符合预期大有裨益。设计规范文档应与应用的最终素材一起交付。此外，与开发人员面对面审阅设计规范文档也是一个好习惯，以确认是否有任何需要澄清的地方。我将在本章后面的“沟通是关键”部分更详细地讨论这一点。


  设计规范文档概述


  从项目、应用及其预期用途的概述开始撰写文档。这不需要非常详细；一两句话就足够了。如有必要，可以从最终版本的应用初始陈述中摘取。如果您是与未参与应用设计和构思的开发人员或团队合作，概述陈述会很有帮助。通过提供概述，您可以向开发人员提供对应用目标受众及其使用方式的宝贵见解。


  然后，您的规范文档应引导开发人员从头到尾、一个屏幕一个屏幕地了解您应用的细微差别。作为设计人员，您需要特别注意那些具有特效或可能需要独特动画或操作（仅凭设计无法展示）的屏幕。如果需要在文档中解释特定屏幕的工作方式，请大量使用注释。注释在描述过渡效果时也非常有用。


  提供颜色信息


  文档还应包含关于整个应用中使用颜色、明暗或色调的任何必要说明。尽可能提供颜色代码，因为这是您能为开发人员提供的最精确的颜色信息。您不希望开发人员猜测应用中的颜色，或者不得不在
  PSD（Photoshop 文档）的层层图层中挖掘以找到确切的色号。


  指定字体与字号


  应用中使用的字体和字号信息也应包含在设计规范文档中。开发人员需要知道字体的名称（即使是 iOS 系统字体）。让开发人员了解应用中各个屏幕所使用的字体大小也很重要。虽然`Helvetica
  Neue`是 iOS 的默认字体，但还有许多其他受支持的字体。像`iOSfonts.com`这样的网站列出了 iOS 支持的字体，但最好还是直接查看来源，查阅苹果的字体列表以确保无误。苹果同时提供了
  iOS 6 和 iOS 7 的字体列表。这些列表包含两个系统版本中安装的所有字体，以及在必要时可由应用下载的字体列表。


  **提示** 系统字体是 iPhone 或其他 iOS 设备上用于显示菜单设置和标签文本的默认字体。iOS 7 允许用户更改其系统字体。


  说明用户交互


  如有必要，添加任何需要澄清的用户交互细节。例如，如果应用的一个屏幕包含多个控制器并需要多种不同的手势，这些都需要在设计规范中概述出来。它应让您的开发人员了解，哪些用户交互（如果不是一目了然的话）应在您的应用中产生特定的结果。




  一份编写良好的设计规格文档将简化从设计与构思开发到应用初始版本或 Alpha 版本的过渡，并且你的应用会看起来、用起来更符合预期。


  我在图 8-1 中附上了一份设计规格文档页面的示例。你可能希望在规格文档中明确以下几点：


  - 具有开启和关闭状态的按钮，以及它们各自的状态

  - 所有按钮的标题和颜色（在交付给开发者之前，应将文本和类型从按钮中移除）

  - 在特定区域使用的具体字体、字号和颜色


  ![9781430263647_Fig09-01.jpg](img/9781430263647_Fig09-01.jpg)


  图 8-1。来自我们 Travel Light 设计规格文档的登录/注册页面示例


  图 8-1 中展示的示例页面相当简单，但根据添加的细节多少以及应用的复杂程度，它很容易变得更复杂。理想情况下，你的设计规格文档应为应用的每个屏幕提供说明。虽然这些说明有时会以电子邮件的形式出现，但在交付给开发者的资源包中包含设计规格文档是一种良好且广为人接受的做法。


  如果你正在开发自己的应用，养成创建此类文档的习惯仍然是一个好方法。如果将来需要移交资源，你会准备充分，并且你的开发者也会对此表示感激。与普遍看法相反，你的开发者希望获得尽可能多的细节。这有助于按照创建者、客户端以及最终用户的期望来构建应用。


  #### 按钮


  所有 iOS 应用都会有按钮。它们是用户与应用交互的主要方式。任何可轻点或按压的元素都可视为按钮，并且所有按钮都有状态。按钮的“开启”或高亮状态是用户在轻点按钮或与之交互时看到的。`"off"`或正常状态是用户在与按钮交互之前通常看到的。有时还会使用第三种状态，即非活跃状态。这意味着按钮可能会显示在屏幕上，但在此状态下，用户无法使用它。如前所述，iOS
  7 中的按钮没有边框，但它们仍然保留了大多数按钮所具有的属性。这意味着，除非它们是系统按钮，否则仍需要为其设计并提供状态。


  在准备导出按钮时，所有资源的尺寸必须相同（状态除外）。这能让应用内的交互更流畅。至少，按钮的最终导出应包含所有适用的状态、字体和颜色的像素尺寸，以及与该特定资源相关的任何其他信息。如果该资源在应用的其他位置出现但看起来（甚至行为上）有所不同，那么你有责任解释这些差异，以便开发人员了解。


  有些按钮可以通过编程方式创建。如果你希望开发者使用`Xcode`创建按钮，同样的规则也适用。开发人员需要知道按钮的确切尺寸、标签、文本或字体大小、颜色，以及用户与之交互时按钮的确切行为。


  完成设计规格文档后，请与开发者一起审阅，以澄清任何未决问题。虽然你的文档可能包含尽可能多的细节，但有时，没有什么比面对面的交流更有效。


  #### 按钮标题


  开发者可以通过多种方式创建按钮。他们可能会也可能不会使用你提供的按钮资源来创建最终出现在应用中的按钮。这通常取决于几个因素，例如按钮是否带有渐变。这正是与开发者沟通能派上用场的地方。开发者可能会取图形中的一个像素，并通过编程方式重复该像素来创建按钮。这可以减少资源的整体文件大小，从而减小应用包的大小。


  最佳实践是在将按钮资源交付给开发者之前，从中移除标题。除非字体无法以编程方式再现，否则只需提供图形，并在你的设计规格文档中提供关于按钮应关联的标题、字体、字号和颜色的详细说明。


  #### 字体、字号、文件名和颜色


  你的设计规格文档还应成为开发者查询按钮字体名称、字号和颜色相关问题的快速参考指南。设计文档时应遵循对你和开发者都直观的方式，并让所有内容易于查阅。一个很好的做法是包含应用的实际屏幕截图，按钮在其中的显示方式应与应用中的一致，并在页面附上图例，提供该屏幕上所有元素的相关信息：


  - 资源文件名（包含所有状态）

  - 字体名称

  - 字号

  - 十六进制颜色码或颜色值

  - 在屏幕上的位置

  - 任何需要与该资源关联的特定动作或动画


  #### 将设计切片为资源


  将资源切片以交付给开发者是资源最终化过程中最重要的任务之一。在此过程中，你将逐层切割`PSD`文件，为将存在于应用中的所有元素创建独立的文件。每个元素都必须被切片以创建一个唯一的资源，并保存为一个单独的文件。在这个过程中，注重细节变得至关重要。


  资源最终化过程的另一个关键部分是缩放（请参阅下一节）。如果还记得的话，我们当初将设计尺寸设为`1136 x 640`以适配 iPhone 5、5c 和 5s 的`Retina`屏幕。如果你的应用旨在支持
  iOS 支持的所有不同设备，那么你需要为每种设备提供不同的资源集。这包括 iPhone 4 和 4s。虽然这两款设备拥有`Retina`屏幕，但它们的尺寸与较新设备不同。


  然而，iOS 的一大优点在于，如果你的应用旨在所有这些设备上运行，开发者可以将所有这些资源放入一个应用包中，操作系统会自动引用适当的文件，以在相应设备上显示。用于`Retina`屏幕和设备的资源需要在文件名的根名称后附加`@2x`。稍后我会更详细地讨论命名约定，但这是一个标准做法。


  每个设计师都会有自己喜欢的切片图像的方式，这通常是基于个人偏好。


  在本章中，我将详细说明切片和缩放过程中的每一步。我自己用于导出`Retina`资源的步骤是：


  - 选择图层（所有状态）

  - 转换为智能对象

  - 保存为`PNG-24`

  - 名称后添加`@2x`


  对于非`Retina`资源，步骤如下：


  - 打开`Retina`智能对象

  - 更改分辨率并缩小至一半尺寸

  - 保存为`PNG-24`

  - 名称**不**带`@2x`


  如果下面概述的流程不适合你，请在`Photoshop`中试验，找到适合你工作流程并满足你需求的方法。要切片你的资源：


  1.  打开你将操作的`PSD`文件。

  2.  选择你首先想要切片的资源，然后选中与该资源关联的所有图层，包括所有状态（如开启、关闭等）和效果——如果它恰好是一个动作项（例如按钮）。




  为了便于说明，我选择了 Travel Light 应用程序中的“提交”按钮作为示例素材进行切片。由于这是一个按钮，我们需要为其设置开启和关闭两种状态。这意味着，当用户与该元素交互时，其外观应发生变化，或为用户提供操作正在进行的视觉确认。请确保选中所有适当的图层。


  3.  要选择多个图层，您需要按住键盘上的“Command”按钮（Mac），同时使用鼠标或触控板选择所需的图层。


  选择图层时，这些图层应高亮显示，如图 图 8-2 所示。


  ![9781430263647_Fig09-02.jpg](img/9781430263647_Fig09-02.jpg)


  图 8-2。按住 Command 键可以同时选择多个素材图层


  **提示**  ，如果某个按钮在应用程序的多个屏幕中都被使用，请删除其文本，并在您的设计规范文档中所有使用该按钮的位置添加标注。对于按钮的每个实例或每次使用，还必须指定该按钮副本的正确字体、字号和颜色。这可以通过编程方式完成，从而节省时间。


  4.  现在您已选择了图层，请将它们转换为智能对象，如 图 8-3 所示，方法是转到“图层”![arrow.jpg](img/arrow.jpg)，“智能对象”。智能对象是包含来自矢量图像数据的图层。


  ![9781430263647_Fig09-03.jpg](img/9781430263647_Fig09-03.jpg)


  图 8-3。选择所有与素材相关的图层后，将其转换为智能对象


  **提示**  ，将图层转换为智能对象，可以在不丢失原始图像数据或质量的情况下编辑图像。


  将图层转换为智能对象后，您会看到新的图层出现在图层面板中。


  5.  在图层面板中选择您刚刚创建的新智能对象。

  6.  右键单击以调出其“导出内容”选项，如 图 8-4 所示。Photoshop 会要求您为要保存的文件选择一个位置。新的智能对象文件将具有 `.PSB` 扩展名。


  ![9781430263647_Fig09-04.jpg](img/9781430263647_Fig09-04.jpg)


  图 8-4。通过从下拉菜单中选择“导出内容”选项来导出智能对象的内容


  **提示**  ，如果智能对象是由多个图层创建的，那么它将以 PSB 格式导出。


  7.  找到并打开您保存的导出文件，然后选择包含您要保存的素材的图层。


  对于我们的“提交”按钮，我们已移除了文本，只剩下实际的按钮。检查并确认其符合您的要求后，需要将智能对象保存为 PNG，以便之后导入 Xcode 并在应用程序中使用。


  8.  从“文件”菜单的下拉列表中选择“存储为 Web 所用格式”。您将可以选择以多种格式保存素材。请确保从提供的列表中选择 PNG-24 选项。另外，如果提供了交错
  PNG 选项，请务必避免使用。下拉菜单中显示的选项包括 GIF、JPEG、PNG-8 和 PNG-24，如 图 8-5 所示。


  ![9781430263647_Fig09-05.jpg](img/9781430263647_Fig09-05.jpg)


  图 8-5。将智能对象导出为高质量的 PNG-24。PNG-24 格式可以保留透明度


  **提示**  PNG-24 选项可确保您的图像获得最高质量。Apple 建议将 24 位作为图标和图像的标准位深度。红色、蓝色和绿色通道各占 8 位，再加上一个
  8 位的 Alpha 通道。因此得名 24 位 PNG。


  9.  选择 PNG-24 后，您应将图像保存在一个容易记住的文件夹中，并命名为 `"Submit_btn_off@2x"`。在保存按钮的开启状态时，您需要保持命名约定的一致性，因此，您的开启或激活状态的按钮名称可以类似于
  `"Submit_btn_on@2x"`。

  10. 如果您还没有为新的素材创建一个新文件夹，请现在就创建。请谨慎选择此文件夹，因为它应该是您将要导出的所有新素材的存放位置。重要的是，您的所有素材都存放在同一个文件夹中。


  就这样，您已经保存了应用程序的第一个素材。您可能需要再重复几次这个过程才能掌握，但一旦熟练，每次操作都会很快。


  不过，我们刚刚创建的按钮是一个高分辨率按钮。现在，让我们来看看如何为我们的非 Retina 设备缩小按钮尺寸。


  ### 为不同设备缩放和保存素材


  缩放和切片素材是相辅相成的。在对图像进行切片后，您需要先保存 2x 文件，然后缩小尺寸，为非 Retina 屏幕生成一半大小的文件。我倾向于从较大、较高分辨率的设计缩小到较小尺寸的设计，因为这能更好地保持图像质量。


  将素材保存为较小尺寸的过程相当简单。导航到“图像”>“图像大小”来调整尺寸。我们需要将按钮的实际尺寸从现有大小修改为原始大小的一半。关于 dpi 与 iOS 设计的关系，存在一些讨论。我个人认为，在为
  iOS 进行设计时，dpi 并不重要。因此，在此过程中，我们将保持 dpi 为 72。 图 8-6 显示了我们新的非 Retina 按钮的图像大小设置经过调整后的情况。导航到“文件”![arrow.jpg](img/arrow.jpg)，“存储”，将新按钮保存为
  `"Submit_butn_off.png"`。遵循与之前相同的指示，以 PNG-24 格式保存文件，并遵循之前建立的命名约定，一切就准备就绪了。


  ![9781430263647_Fig09-06.jpg](img/9781430263647_Fig09-06.jpg)


  图 8-6。要创建一个非 Retina 按钮，请将 @2x 按钮的尺寸减小 50%


  要切片、导出和缩放其他素材，请遵循“将你的设计切片为素材”部分中概述的相同流程。


  对于大型 PSD 文件，如果要对大量素材重复上述切片步骤，切片和缩放图像选区可能会变得繁琐。有许多工具可以帮助设计师完成这一过程。其中一些是独立工具，另一些是与
  Photoshop 配合使用的插件。其中一些非常受欢迎。和往常一样，先用一个测试 PSD 文件试用某个工具，确保它能按您需要的方式工作，并确认它能融入您的工作流程。


  ### 其他素材准备工具


  如果您要导出大量相似甚至完全相同的图像，或许可以使用 Photoshop 中的“将图层导出到文件”脚本。选择“文件”![arrow.jpg](img/arrow.jpg)，“脚本”![arrow.jpg](img/arrow.jpg)，“将图层导出到文件”，然后运行该脚本。Photoshop
  会将文档的每个图层保存到不同的文件中。文件名将与图层名一致，以便您识别。在我看来，这个工具的用例有限，使用时请谨慎。在使用此工具前，您可能需要确保图层名称正是您想要的名称。


  此外，还有不止几个第三方工具可用于协助 iOS 应用程序的素材准备工作。有些是可执行文件，有些是与 Photoshop 配合使用的插件。如果您决定使用第三方工具来协助素材准备过程，则需要做一些尽职调查。




  在考虑使用第三方工具进行资源准备时，有以下几点需要注意：


  - 首先用少量文件进行测试，确保结果符合你的需求。

  - 确保该工具会定期更新（通常可以通过查看其错误修复和更新日志来确认）。

  - 该工具的创建者或负责公司应为用户提供支持或帮助。

  - 阅读用户的评价或反馈，了解他人的看法。评价是判断应用或插件表现的重要指标。


  ### 为资源命名


  在创建要交付给开发者的资源时，务必确保文件命名遵循一致的规范。建议采用以下命名格式：


  - 标准格式：`<图片名称><设备修饰符>.<文件扩展名>`

  - Retina 或高分辨率格式：`<图片名称>@2x<设备修饰符>.<文件扩展名>`


  名称中的`<设备修饰符>`部分是可选的，并非必须。不过，如果你正在设计一款通用应用，并希望向开发者表明哪个资源属于特定设备，这会是一个很好的做法。


  在命名文件时，最好与你的开发者沟通，了解他们是否有偏好。但以下命名指南也可作为参考，特别是当你正在创建一款适配多种屏幕尺寸的应用时：


  - iPhone – `file.png` 或 `file∼iphone.png`

  - iPhone Retina – `file@2x.png` 或 `file@2x∼iphone.png`

  - iPhone 5 – `file-568@2x∼iphone.png`

  - iPad – `file∼ipad.png`

  - iPad Retina – `file@2x∼ipad.png`

  - 用于导出资源的第三方工具


  ### 为开发打包资源


  当你将文件切片、缩放并导出到一个文件夹后，应再次检查，确保所有文件都已为你的开发者正确标记。这样可以避免开发者在寻找文件位置时进行不必要的猜测。如果你已创建了设计规格文档，那么应在其中包含一个章节，说明你不仅用于命名文件的规范，还包括如何在各个文件夹中组织这些文件。如果你的开发者只愿意接收分层的
  PSD 文档，而不需要单独的 PNG 切片，那你很幸运。


  如今，越来越多的开发者拥有生成所需切片的方法，并且熟悉 Photoshop。这可以减少开发者和设计师之间因图片几个像素的偏差而可能出现的反复沟通。无论你的开发者是需要
  PNG 还是分层的 PSD，确保你的 PSD 文件具有直观命名的图层都变得非常重要。此外，有些开发者虽然能够自己切片 PSD，但可能并非“硬核”的 Photoshop
  专家。在交付给你的开发者之前，切记不要栅格化或拼合蒙版或图层，这样他们才能在需要时编辑文件而不损失质量。


  **提示** 栅格化图像会将其转换为单个图层，并且会失去在不损失质量的情况下调整图像大小的能力。


  ### 沟通是关键


  当你的文件已标记并打包好准备交付时，你可能还想与开发者安排一次通话或会议，以讲解设计中的细微差别，或解释可能需要额外说明的操作和动画效果。虽然你会尝试在设计规格文档中涵盖所有内容，但这都比不上一次良好的老式谈话。在会议前，将你的文档副本发送给开发者审阅，并请他/她准备好问题。无论你认为自己的文档多么清晰，很可能仍会有问题。任何在会议中得到解答或澄清的问题，都需要你更新文档。将答案记录下来，并向你的开发者发送一份新的、更新后的文档版本，以便在开发过程中作为参考。


  另一个最佳实践是，确保你的开发者知道如何联系你，以防他/她有后续问题。在设计规格文档中提供电子邮件地址和电话号码会很有帮助。保持开放的沟通渠道，是消除开发过程中猜测的好方法。


  ### 总结


  当你完成应用的设计和构思部分后，需要准备将资源交付给开发者。设计规格文档是消除开发过程中歧义的好方法。你将创建一份文档，其中包含尽可能多的关于你应用的信息。它应包括应用细节、目标、使用方式，更重要的是，它告诉你的开发者如何处理你将要提供的所有资源。如果有必要，你还需要提供颜色、字体和文本、交互和动画等细节。然后，你将进入资源的切片和缩放环节，以便在
  iOS 中使用。所有切片后的资源都必须导出为 PNG 格式，因为 PNG 支持透明度并且图像质量很高。当这些资源被命名和组织好后，你将把它们与设计规格文档一起打包，移交给开发者。如果可能，你还可以安排一次面对面交流，并为你的开发者提供一种联系你的方式。无论你是使用本章概述的方法还是使用第三方工具来切片和缩放资源，遵循这些通用指南都将有助于从设计到开发的平滑过渡。


  ## 第 10 章


  '
- '# 设计最佳实践与应避免的错误


  你已经将你的想法从构思阶段推进到现在，如果你已将应用交付给开发者，或者甚至自己开发完成，那么你已经准备好将应用提交到应用商店了。恭喜你！这是一个巨大的里程碑，如果你从头到尾跟进了本书，希望你对结果感到满意。本书包含了大量信息，所以我在为你的应用设计之旅准备了一份清单。它基本上是对本书所述所有原则的重述。


  应用开发中最常被忽视的方面之一就是设计。但希望通过本书中介绍的工具和方法，我为你阐明了这个过程。界面的外观和感觉是你应用中最关键的方面之一。你的受众会根据你在应用商店截图中显示的界面来对你的应用做出初步评估。一些最简单、最直观的应用往往最受欢迎。


  虽然简洁很重要，但在简洁与功能性之间取得平衡也至关重要。有些应用设计过度，包含了太多花哨的功能，这反而会削弱应用的总体功能。这就是为什么不断回顾你的应用陈述如此重要。在完成设计过程时，始终牢记应用的目标，这样你就不会出错。以下章节将本书分解成一个有用的清单，总结了设计应用时的最佳实践和应避免的错误。


  ### 创建应用设计陈述


  应用设计陈述是你的应用存在的理由。它是一个简短的、容易记住的、描述你的应用的陈述：它是什么、为什么存在，以及最重要的是，它如何运作。定义你的应用及其目标受众。保持描述简短，并能向任何询问的人复述出来。我们为虚构的
  Travel Light 应用创建的应用设计陈述是：“Travel Light 应用将通过提供清单来帮助频繁旅行者，确保他们只为即将到来的行程打包必需品。”


  这个陈述可能会随着你的应用创建而演变和改变，但记住它并在你的想法改变时更新它是一个好主意。


  ### 人机界面指南是你的设计圣经，请善用它




  #### Apple 人机界面指南


  Apple 的 `Human Interface Guidelines` 就像是圣经一样，指导着为 iOS 创建应用的**设计师**和**开发者**。苹果在其中详细阐述了其设计原则和指南，供设计师和开发者共同参考。你需要反复阅读。最好打印一份纸质版放在手边，以便在思考如何突破应用设计边界时随时查阅。如果有更多设计师和开发者阅读
  `HIG`，被应用商店拒绝的应用将会少得多。


  ### 线框图很重要


  `Wireframing` 是指将设计概念在纸上或其他媒介上完全展开的过程，它发生在真正的设计流程之前。`线框图`剥离了所有设计元素，专注于用户界面元素以及用户与应用交互时的*整体体验*。`线框图`流程对设计至关重要，实际上应该是设计流程中的第一步。通常情况下，`线框图`过程可能需要一些时间，但一旦你进入实际的创意设计阶段，这会节省时间。你的线框将贯穿应用的每一个步骤，并且在定义用户、用户故事和用户需求时不断演变，如图
  10-1 所示。*永远不要低估* `线框图`*流程*。当线框图完成并获批后，你的设计过程将会顺畅得多。


  ![9781430263647_Fig10-01.jpg](img/9781430263647_Fig10-01.jpg)


  图 10-1。Travel Light 应用行程选择页面的手绘线框图


  ### UI 与 UX：二者有区别


  `用户界面（User Interface）`和`用户体验（User Experience）`是不同的，了解它们的区别是件好事。`UX` 或称为`用户体验`，是指用户在使用应用过程中实际体验到的内容。`UI`
  或称为`用户界面`，则是这种体验的视觉呈现。在应用设计领域，这两个术语经常被混淆和误解。理解它们的不同之处也将有助于你的 `线框图` 流程。


  ### 化繁为简！


  杂乱的界面会使用户感到困惑，并可能导致在使用应用时出现问题。去掉所有非关键的元素。在实现功能时要明智，不要给用户太多选项！简洁性是 iOS 设计原则的标志之一。但总的来说，它也是移动端设计的主要原则。过于复杂的移动设计会让用户感到困惑。


  ### 善用留白


  一些最好的应用将**留白**作为设计过程中的一个重要组成部分。在屏幕上的元素周围留有空间非常重要。这能让眼睛精确地聚焦在需要关注的内容上。让特定元素成为应用的焦点，同时也要关注对应用功能至关重要的元素。


  ### 关注 iOS 7 的变化


  `HIG` 将概述苹果新操作系统的精髓及其对**极简主义**和**扁平化设计**的依赖。将这些原则应用到你的应用设计中。`人机界面指南`中关于 iOS 7 的特定信息，将帮助你理解自该系统发布以来最重大的变化。熟悉其他人在“扁平化设计”趋势方面的做法，并理解苹果如何使这一趋势适应公司的美学风格，也很有帮助。


  ### 多问为什么？


  审视你的界面，问自己**为什么**一个按钮会放在那里。确定如何简化用户的旅程。如果存在对用户应用体验不关键的额外步骤，就删除它们。从屏幕上移除那些**并非绝对必要**的元素，是一种让用户聚焦于手头任务的方法。如果它对用户旅程不重要，就删除它。


  ### 放眼小屏幕


  在设计你的应用时，要考虑到用户将在**远小于桌面电脑屏幕**的屏幕上与你的应用交互。为移动端，尤其是为 iOS 进行设计，意味着必须为每个设备考虑空间问题。有独特的交互方式可以与
  iOS 设备互动，所以请牢记在心。


  ### iPad 不只是放大的 iPhone


  如果你正在为 iPad 设计应用，有特定的设计考量必须考虑。例如，考虑用户将如何在更大的设备上与应用交互。


  ### 字体很重要


  考虑可读性以及文案和文本在设备上的显示效果。遵循 `人机界面指南`，因为它们在字体方面有特定的规定。了解像 `Helvetica Neue`（如图 10-2 所示）这样的字体在
  iOS 7 中是如何使用的，并确保你的文案在目标设备上清晰易读。


  ![9781430263647_Fig10-02.jpg](img/9781430263647_Fig10-02.jpg)


  图 10-2。Helvetica Neue 是一种流行的扁平化设计字体


  ### 提供视觉反馈


  始终让用户了解你的应用中正在发生什么。在流程进行的过程中向用户提供反馈是一个很好的实践。这包括使用进度条，或者如果应用正在完成或处于某个中间过程，使用旋转指示器，如图
  10-3 所示。你的用户想知道发生了什么，所以要用这些指示器让他们了解应用内部的情况。对于操作，视觉反馈也很有帮助。当用户点击一个按钮时，创建并提供与“关闭”或“非激活”状态**视觉上不同**的“激活”或“开启”状态，可以让用户知道该交互已被应用接收。如果你有特定的方式想为用户提供视觉反馈，请务必在
  `设计规格` 文档中提及，以便你的开发人员了解。


  ![9781430263647_Fig10-03.jpg](img/9781430263647_Fig10-03.jpg)


  图 10-3。旋转指示器让用户知道应用中某个流程正在进行中


  ### 用户就是上帝


  在移动应用设计时，你必须始终记住要**换位思考**，站在用户的角度。创建用户故事和用户画像，将自己沉浸在特定用户的体验中，并定制应用以满足该用户的需求。一个**用户故事**是对理想用户及其在使用应用时可能遇到的特定需求或要求的描述。充实这些需求并根据用户类型优先考虑特定功能，将有助于你缩小功能列表。理解你**无法做到面面俱到**也很有帮助。


  ### 设计模式是你的好帮手


  如果你仍在摸索 iOS 界面或移动端设计，设计模式是理解应用界面设计挑战中成熟解决方案的好方法。需要一个登录或注册屏幕，或者一种显示基于位置的搜索结果的方法？没问题。设计模式可以提供帮助，可以排除问题中的猜测成分，并加快整个设计过程。


  ### 拇指法则


  一个常见的错误——可能对你的应用产生持久影响——就是**忘记拇指法则**。请记住，移动用户是在“按压”或“轻点”，而不是“点击”。因此，在设计应用时，确保为不同大小的手指（尤其是拇指）留出足够的空间。你会发现拇指在应用导航中扮演着重要角色。思考应用中屏幕上的重要元素应该放在哪里，并确保它们在用户拇指的可及范围内。Apple
  对可点击区域的要求是 `44 x 44`。


  ### 从高分辨率到低分辨率




  #### iOS 应用设计贴士


  许多设计师倾向于从高分辨率设计入手，然后再按比例缩小。这会让你的工作轻松得多，因为你能够完善和优化那些在大版本中可见、但在缩小版中却看不到的细节。公平地说，有些设计师可能更喜欢从低向上放大。不过，我交流共事过的大多数设计师都倾向于从高分辨率向小尺寸进行缩小。


  ### 快速导入


  启动画面和动画会浪费用户的时间。请尽可能精简你的登录和注册流程，尽早切入应用的核心功能，而非拖延。任何多余的步骤都会让人望而却步。如果你必须提供一个应用导览或演示，请允许用户选择跳过这一过程。保持较低的进入门槛是一个很好的实践。


  ### 测试、测试、再测试


  在创建应用时，一个好的做法是尽可能多地将应用线框和设计稿交到潜在用户手中进行体验。在应用发布前后，都要认真对待用户反馈。这会产生巨大的影响。尽量在**真实设备**上查看你的设计。我提到过一些工具，比如
  `LiveView` 和 `Scala`，它们能让你在目标设备上查看设计，从而确保字体*和*设计的可读性。应用开发完成后，通常要进行功能测试或质量保障（`QA`），以确保应用按预期运行。这应该能发现一些在将应用上传到应用商店之前需要解决的主要问题。


  ### 软件会助你一臂之力


  `Adobe Photoshop` 是应用乃至网站设计领域的黄金标准。如果你认真对待设计，就去学习它。`YouTube` 上有许多教程，也有整本书籍比我这里更详细地介绍`Photoshop`。


  ### 图标和截图同样重要


  第一印象很少有机会重来。你应用的界面很重要，但应用图标也同样重要。它将是用户在应用商店和他们的设备上识别你的应用的唯一途径。因此，让图标与你的应用一样特别至关重要。`Apple`
  也为应用图标提供了指南，所以请务必严格遵守。你的应用图标是必需的，因此要认真思考它的外观。截图是用户对你应用的第一印象。请包含能够吸引用户下载你的应用的截图。


  ### 交接与沟通


  在设计完应用并准备好所有待交付内容后，你需要向你的开发人员提供关于应用中特殊动画或手势的具体指示。与你的开发人员进行面对面沟通，进行资产的正式交接，始终是一个好主意。作为设计师，你的工作还没有结束。你可能需要创建一份文档，供开发人员在开发过程中参考。这份文档将包含那些可能无法从你分层的
  `PSD` 文件中直接看出的细节。关于字体、颜色和尺寸的信息都可以放入这份文档中。


  ### 总结


  你在应用设计上投入了大量心血。你从无到有，将一个想法通过构思变成了现实。当你将这些文件交给开发人员并构建出应用后，它将成为一件独特的创作，存在于成千上万人的设备上。成功并非必然，但如果你遵循了`人机界面指南`以及本书中的其他文档，你的应用就可以出现在应用商店中；并且，如果它在设计和功能上确实出类拔萃，它可能会与商店中其他顶尖应用一同被推荐。即使没有发生这种情况，你也应该将你的应用成功上架应用商店视为一项伟大的成就。


