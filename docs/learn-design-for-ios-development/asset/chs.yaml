  #### 网格线与参考线


  设置并建立网格线可以使设计过程更轻松。参考线和网格线将帮助你更轻松地在多个屏幕间对齐用户界面的组件。它们是显示在页面上但不会出现在应用中的线条。你可以将网格放在屏幕上的任何位置，并锁定它们，使它们在你设计应用时保持原位。它们将帮助你创建完全对称的设计。网格线能让元素在画布上精确定位，而不是在屏幕上随意浮动。如果不使用网格线，你只能凭肉眼估计组件对齐的位置。即使对于最专业的设计师来说，这也可能是一项繁琐的工作，而组件位置不当的结果是元素在不同屏幕间跳动。你需要确保元素对齐到参考线或网格，以保证它们不会在不同屏幕间移动。如果所有元素没有完美对齐，即使一个像素的偏差也会导致跳动。


  参考线是简单线条，当你尝试对齐屏幕上某些元素时会出现。你可以通过 **偏好设置** → **参考线、网格和切片** 来设置参考线的偏好。


  ```



