  要查看面板中每个工具的功能，请将指针悬停在工具上，工具的名称就会在其下方弹出。建议对面板中的所有工具都这样做，以便您至少熟悉每个工具的名称并了解其功能。要选择工具，只需单击面板中的工具即可。如果您看到右下角有一个小三角形，通常表示在该工具的菜单中还有更多选项可供选择。`工具`
  面板的组织结构如下。


  #### 选择工具


  在 `工具` 面板的选择部分，您将找到以下允许您选择各种形状的工具：


  *   `移动工具` - 允许您移动图层或图像选区。

  *   `选框工具` - 选框工具允许用户以工具的形状（矩形、椭圆、单列和单行）进行选择。

  *   `套索工具` - 套索工具允许用户像使用钢笔或铅笔一样，围绕特定选区绘制自由手绘边界。此工具也可作为多边形和磁性工具使用。磁性套索会自动检测选区的边缘，而多边形工具将沿已有的直线绘制。

  *   `快速选择工具` – 此工具允许您基于颜色进行选择。

  *   `魔棒工具` – 魔棒工具允许用户在高对比度图像中进行选择。


  #### 裁剪与切片工具


  `裁剪` 和 `切片` 工具允许您提取图像的一部分以供使用，或从主图像创建一系列较小的图像。它们包括：


  *   `裁剪工具` - 裁剪工具允许您裁剪或移除图像的区域。

  *   `切片工具` - 这些工具允许用户为网页或其他用途切片图像选区。


  #### 测量工具


  Photoshop 中的测量工具允许您测量图像中两点之间的距离。测量工具还与一些其他工具组合在一起，包括：


  *   `吸管工具` – 允许您为前景选择特定颜色。

  *   `颜色取样器工具` – 主要用于色彩校正，此工具会记录特定颜色区域的色彩值。

  *   `标尺工具` – 允许您测量两点之间的距离。

  *   `注释工具` – 允许向图像或文档添加注释。


  #### 修饰工具


  修饰工具允许您修饰和清理甚至删除图像中需要改进的选定部分。此部分的工具包括：


  *   `污点修复画笔工具` – 允许您将一幅图像的纹理匹配到另一幅图像上，以修复或遮盖图像中的瑕疵。最适合处理圆形瑕疵。

  *   `修复画笔工具` – 允许您修复非圆形的图像瑕疵。

  *   `修补工具` – 通过混合两个区域来修复图像中的瑕疵。

  *   `红眼工具` – 修正照片中常见的红眼问题。

  *   `仿制图章工具` – 允许您遮盖或克隆图像的一部分到另一部分。

  *   `橡皮擦工具` – 允许您擦除图像中不需要的部分。

  *   `背景橡皮擦工具` 和 `魔术橡皮擦工具` – 允许您移除图像中不需要的背景。

  *   `模糊工具` – 允许您绘制并使图像的一部分变得模糊。

  *   `锐化工具` – 使图像看起来更清晰。

  *   `涂抹工具` – 允许您涂抹或污损图像的某个选区。

  *   `减淡工具` – 模拟摄影师的减淡过程。此工具让您能够加亮图像的一部分。

  *   `加深工具` – 与 `减淡工具` 成对，此工具允许您使图像的部分区域变暗。

  *   `海绵工具` – 用于增加或减少颜色的饱和度。


  #### 绘画工具


  绘画工具允许您使用画笔或不同类型的工具进行绘画或模拟绘画行为。它们允许您根据自己的偏好更改和自定义画笔，并从多种选项中进行选择。绘画工具包括：


  *   `画笔工具` – 让您使用画笔和各种不同的笔尖进行绘画。

  *   `铅笔工具` – 模拟用铅笔画画。

  *   `颜色替换工具` – 允许您在绘画时将一种颜色替换为另一种颜色。

  *   `混合器画笔工具` – 让您通过“混合”不同颜色来创建绘画效果。

  *   `历史记录画笔工具` – 允许您通过在选区内绘画以显示旧版本来恢复为较早版本的图像。

  *   `历史记录艺术画笔工具` – 此工具在 `历史记录画笔工具` 的基础上添加了效果。

  *   `渐变工具` – 让您创建一种背景或叠加，将一种颜色渐变为另一种颜色，从而创建渐变效果。

  *   `油漆桶工具` – 用纯色填充一个区域。


  #### 绘图与文字工具


  绘图和文字工具用于绘制形状以及在您正在创建的图像中写作或键入文字。此部分的工具包括：


  *   `钢笔工具` – 让您单击两个锚点，Photoshop 将在它们之间绘制一条线段。

  *   `自由钢笔工具` – 允许您像用笔一样自由手绘。

  *   `横排文字工具` 和 `直排文字工具` – 向图像添加文本，可以横向从左到右，或纵向从上到下。

  *   `蒙版工具` – 允许您创建文本的轮廓。

  *   `路径选择工具` – 允许您选择由其他任何工具创建的路径。

  *   `直接选择工具` – 允许您选择特定路径的锚点或部分，而不是整条路径。

  *   `形状工具` – 让您绘制多种不同的形状（矩形、椭圆、多边形、线条或自定义形状）。


  #### 视图与导航工具


  视图和导航工具允许您移动图像或放大以查看不同视图。


  *   `抓手工具` – 允许您在屏幕上移动图像。

  *   `旋转视图工具` – 允许您旋转对图像的特定视图。

  *   `缩放工具` – 允许您放大图像。


  #### 3D 工具


  3D 工具允许您在 Photoshop 中操纵和旋转 3D 模型。此部分的工具包括：


  *   `3D 对象旋转工具`（包括对象滚动、平移、滑动和缩放）– 允许您旋转、操纵和缩放 3D 模型。

  *   `3D 旋转相机工具` – 旋转 3D 相机视图，同时保持实际的 3D 对象固定。


  ### 图层面板




  假设你已按照图 7-2 所示设置好画布，图 7-4 中的`Layers`面板将位于右侧，你可以在其中看到设计中的所有元素。你将使用该面板来管理应用的设计。当你创建如图
  7-2 所示的第一张图片时，这很可能就是应用的背景。虽然你可以在设计中使用多个图层，但只能有一个背景。


  ![9781430263647_Fig07-04.jpg](img/9781430263647_Fig07-04.jpg)


  图 7-4：Photoshop 中的`Layers`面板


  在`Layers`面板中，你可以更改每个图层的偏好和属性，例如给定图层的透明度和不透明度。


  图层是你在 Photoshop 画布上创建的任何东西的构建块。如果你的应用非常复杂，那么你将拥有相当多的图层。养成命名图层并确保它们遵循应用自然结构的习惯。也就是说，当你打开主文件并查看设计时，你的图层应该很容易与你的设计相对应。你需要为图层命名，使其与设计内容对应。


  例如，这能让编辑和你的开发者查找图层变得更加容易。Photoshop 会为图层命名，但方式并不直观（例如，图层 1、2、3 等）。如果你有一个包含大量图层的文件，并且这些图层名称与设计中的实际元素不对应，那么找出需要编辑的图层将花费大量时间。当图层数量开始增加时，你会发现为它们命名是最简单的方法。


  图层也可以分组。因此，如果你有几个与特定元素（如标签栏）关联的图层，你可能希望将这些图层分组或放入一个文件夹中。这样，在开发或后期需要修改设计时，查找它们会更容易。


  无论你从互联网上找到的模板中挑选元素（有很多这样的模板）还是自己创建，都要确保这些元素是矢量形式。矢量可以根据你的喜好进行缩放和调整，而不会损失质量。在 Photoshop
  中，矢量被称为形状图层。当你开始从 Retina 屏幕缩放到非 Retina 屏幕时，你就会看到它们有多有用。


