  ## 关于作者\n\n![image](img/9781430263647_unFM-01.jpg)\n\n**西安·莫森**是一位科技企业家、移动布道者及战略家。\n\
  \n2010 年，西安创立了 Kollective Mobile，旨在帮助企业和初创公司进行移动开发和战略规划。作为一名经验丰富的数字专业人士，她曾与众多知名客户合作，为流行品牌打造大型网站和宣传活动。她多元化的技能涵盖市场营销、广告、移动战略、商业管理和思想领导力。她与合作伙伴和客户紧密协作，帮助他们实现整体业务目标。\n\
  \n西安就移动战略话题为多家出版物撰稿并发表演讲，同时与多家致力于弥合数字鸿沟的非营利组织合作。\n\n作为一位在国际上举办过展览的艺术家，西安热衷于将创造力与技术相融合。她的视频艺术作品曾在西班牙著名的\
  \ Optica 艺术节、柏林导演休息室、印度孟买的 Aakriti 画廊以及纽约布鲁克林的 MoCADA 博物馆展出。\n\n## 关于技术审校\n\n![image](img/9781430263647_unFM-02.jpg)\n\
  \n**丹尼·斯沃兹曼**是一位软件工程师，自 Apple II 时代起就为苹果产品开发软件。他曾为专业程序员和初学者撰写过多篇关于各种计算机系统的杂志文章。他是一名电子爱好者，曾为\
  \ Arduino 开发过草图和接口。在其职业生涯中，他编写过控制传送带系统、医疗设备、铣床及其他各种定制设备的软件。不开发软件时，他喜欢偶尔下盘围棋。他的邮箱是\
  \ danny at stowlake dot com。他的网站是 `http://stowlake.com`。\n\n## 致谢\n\n致 Apress 的所有人：凯文和詹姆斯，感谢你们的耐心。也许下一本书会更容易！多米尼克和史蒂夫，感谢你们与我一同构思这本书最初的框架。致所有才华横溢的编辑（丹尼和安妮·玛丽），感谢你们帮助将我的漫谈整理成连贯的文字，我感激你们在整个过程中的帮助。这是我做过的最艰难的事情之一，没有你们，这绝对不可能实现。\n\
  \n致 Kollective Mobile 所有才华横溢的设计师和开发人员，感谢你们让我的工作变得无比轻松。还要感谢我的设计师朋友和同事们，他们的作品激励了我：德鲁、瑞兰、亨利和迈克。\n\
  \n最后，致那些在我认为自己无法做到时支持我的人：妈妈、艾莉森、凯姆和丽莎——感谢你们所有人的支持。\n\n## 引言\n\niOS 是当今最流行的移动操作系统之一。如果你认真对待移动设计，那么\
  \ iOS 7 是必选项。作为一家移动开发机构的负责人，我可以告诉你，我们收到的应用开发请求中超过 50%是针对 iOS 的。随着 iOS 7 和新设备的发布，iOS\
  \ 已成为移动生态系统中的全球领导者。任何认真对待移动设计或开发的人都不能忽略 iOS。\n\n## 本书读者对象\n\n本书适合那些已从开发角度熟悉 iOS，但现已准备尝试设计的人。本书假设你熟悉该操作系统的一些细节，并有意设计一个由你或他人开发的简单应用。本书将引导你经历整个过程：将你的想法打磨成清晰可行的陈述，详细讲解如何创建第一个线框图，并最终完成应用设计。书中重点介绍了辅助设计过程的工具和技巧，甚至强调了流行的移动设计模式，以减轻设计中的一些挑战。如果你已准备好为全球最流行的移动操作系统进行设计，那么《学习\
  \ iOS 设计》就是为你准备的。\n\n## 如何使用本书\n\n本书的结构旨在让你能够将 iOS 应用的概念从初始想法一直推进到开发准备阶段。本书将逐步指导你完成创意验证、构思、设计以及为开发准备素材的过程。内容涵盖屏幕的创建以及设计师应从苹果《人机界面指南》中注意的规范。本书是一本通用的高层次指南，适合那些希望了解更多关于\
  \ iPhone 操作系统以及为 iPhone、iPod Touch 或 iPad 设计应用所需事项的读者。\n\n## 网站上有什么\n\n\n\n### `apress.com`\
  \ 网站\n\n`apress.com` 网站包含一份关于书中虚构应用“轻装旅行”（Travel Light）的设计规范文档示例。它为开发人员在开发应用期间提供了关于字体、颜色及其他必要信息的指南。\n\
  \n## 第 1 章：你有了一个 iPhone 应用的点子，然后呢？\n\n恭喜你！你有了一个应用的点子，并且做出了一个重要的决定——自己来设计它！你已经加入了成千上万人的行列，他们决心学习如何将一个想法从脑海中微小的火花，转化为一个设计完备、可供开发的应用。\n\
  \n你可能已经知道，应用是移动生态系统中不可或缺的一部分。所有移动设备都运行着应用。然而，你决定为 iOS 设计应用，这本身就是一个独特的选择。在所有应用商店中，苹果应用商店是“老大哥”，其应用数量远超其他任何应用商店。不过，既然你已经选择为\
  \ iOS 设计应用，想必你早已明白这一点。\n\n应用无处不在。自 2008 年 7 月苹果应用商店最初上线并拥有 500 个应用以来，应用数量便持续稳步增长。截至\
  \ 2013 年 6 月，这一数字已增至近 90 万，苹果 CEO 蒂姆·库克估计，迄今为止已向开发者支付了 100 亿美元。因此，如果你有一个应用的点子，那便意味着你拥有赚钱和触达大量用户的绝佳机会。这些都是你愿意为\
  \ iOS 进行设计的绝佳理由。\n\n如今，应用的点子并不难找。很多人都能想到。那么，你该如何将你的想法从“一个点子”转变为实际存在于应用商店中、能在设备上运行的真正应用呢？这不可能一蹴而就，但只要稍加努力，就绝对有可能实现。\n\
  \n将应用上架苹果应用商店并非难事。但创造一款具有原创想法、出色视觉效果和卓越执行力的应用却非易事；这需要大量的规划、一点调研和相当的投入。\n\n如果你想让你的想法从仅仅是一个点子，最终变成设计完善并开发完成、可在移动设备上运行的\
  \ iOS 应用，你需要遵循一些步骤——非常具体的步骤。\n\n虽然这个过程看似艰巨，但却是必要的，尤其是当你第一次尝试设计应用时。\n\n一个简单的事实是，大多数提交到应用商店的应用最终都“夭折”了，并在发布后不久便无人问津。如果没有恰当的规划，面对应用商店中海量应用的激烈竞争，如果你的应用不具备独特的创意和执行方式，那么它很可能不会被很多人注意到。无论是出于商业目的还是仅仅作为个人项目，你在考虑创建应用时的最终目标都是尽可能触达更多用户。如果你有一个很棒的应用程序想法，并且你坚信它，那就去做吧。有很多人想到了点子却从未付诸行动，所以仅仅因为拥有这个想法，你就已经属于少数人了。为之庆贺吧，因为真正的工作现在才开始。\n\
  \n### 假设\n\n本书基于一些假设作出，最主要的假设是：你至少从开发角度对 iOS 有所熟悉，但同时希望有机会通过了解一些设计知识来拓展你的开发技能。然而，本书并非关于开发本身。如果你对学习如何*构建*一个\
  \ iPhone 应用感到好奇，那么这本书并不适合你。但如果你希望专门增强与 iPhone 操作系统相关的设计知识，那么你来对地方了。\n\n为了简洁起见，在本章中，我将构思过程分解为六个易于遵循的步骤。每一步都会让你更接近设计出你的\
  \ iOS 应用的最终目标。\n\n1.  定义你的想法。\n2.  与同行分享你的想法。\n3.  将你的应用与其他应用进行比较。\n4.  分析你的发现。\n\
  5.  保存同类应用以供将来参考。\n6.  必要时修改你的想法。\n\n### 第一步：定义你的想法\n\n首先，用一两句话写下你的想法。三句话也许也可以，但请尽量用两句简短的话说清楚。如果需要更多句子，那也没问题；然而，目标是能够在\
  \ 30 秒或更短的时间内描述并解释你应用背后的想法及其功能。这通常被称为“电梯演讲”，也是整个流程的第一步。花些时间，尽可能让这些句子简洁的同时，仍能准确表达你的应用功能。这一点很重要，它将对你和你的应用大有裨益，因为在设计和最终构建应用的过程中，你会反复回到这些描述上。当你推进接下来的几个步骤时，你会发现，随着你审视其他应用和类别，你对应用的描述可能会发生变化。这是流程中很自然的一部分。保持灵活，乐于改变。\n\
  \n例如：“‘轻装旅行’应用将通过提供清单来帮助频繁旅行的人，确保他们只打包即将到来的旅行所需的物品。”\n\n写完你的陈述后，反复背诵直到记住。你应该能够在不参考笔记的情况下说出它。问问自己它听起来如何。语法是否正确？你关于应用的构思是否合时宜？它是否解决了人们当下正面临的问题？它是否以人们需要的方式处理了问题？它是否独特？如果是，它独特在哪里？如果不是，那么你需要继续完善你的描述。不要急于求成。如果你在第一步就卡住了，那很可能说明你的想法还需要打磨。给它应有的时间。\n\
  \n一旦你能够跨过这第一道坎，并且对自己的应用描述感到满意，就把它先放到一边，几天后再回来看。当你再次阅读你的想法及其描述时，它是否还像第一次那样让你兴奋？这个句子是否让你想进一步探索这个应用？有什么变化？更重要的是，它听起来是否仍然是个好主意？它是否仍然让你充满最初对这个项目的热情？\n\
  \n如果不是，那么或许值得对你的描述以及催生它的想法再下功夫。根据你对此感受的强烈程度，你可能想完全放弃这个想法，转而开始构思另一个不同的应用。一切由你决定。\n\
  \n重要的是要记住，很多人每天都会产生想法。但是，拥有一个想法和将之变为现实之间存在着巨大差异。这个流程的第一步，就是让你的想法超越最初的构思阶段。\n\n但是，如果你和刚开始时一样坚信，并且仍然对你的想法充满热情，那么是时候进入下一步了。\n\
  \n### 第二步：与同行分享你的想法\n\n与他人分享你的想法！这对某些人来说可能听起来有违直觉，甚至非常可怕，但事实并非如此。为了验证你的想法，你绝对需要与他人分享。如果想法只是停留在你脑子里，那又有什么用呢？问问你的朋友和你身边信任的人，让他们针对你的想法坦诚地说出看法。尝试与那些敢于给你真实反馈的人分享你的想法和描述。寻求建设性的批评，但同时也要确保你已准备好接受它。\n\
  \n提出有助于推动想法前进并最终指导其设计和功能的问题。如果你有时间，可以创建一个简短的问卷，请人们填写。\n\n沿用上面“轻装旅行”应用的初始想法，以下问题是你可能会问的示例：\n\
  \n\n\n1.  `你是否理解这个应用试图解决的问题是什么？`\n2.  `如果不理解，缺失了哪些信息？`\n3.  `是否清楚这个应用的目标用户是谁？`\n\
  4.  `你会使用这个应用吗？为什么？`\n5.  `你会改变什么？`\n\n简要说明关于该应用的想法：它做什么，以及它将如何工作。然后提出几个关键问题，这些问题将帮助你获取能进一步深化这个想法的信息。这些问题应具有引导性，旨在引出尽可能具体的回答。在构思阶段的这一节点，回答越具体，对你而言价值就越大，并且有助于为你的应用设计提供参考。\n\
  \n在这个阶段，你们中的一些人可能不愿与他人分享自己的想法。在这个专利流氓和版权侵权盛行的时代，你很容易认为分享想法是不妥当的。请记住，想法无法被版权保护，因此在流程的初期就获得关键反馈至关重要。如果你担心向更广泛的群体分享想法，那么就坚持找一个你信任的核心团队。只要朋友、同事，甚至家庭成员符合你应用的目标人群定位，都可以。\n\
  \n这个过程也不必是一场漫长而曲折的事情。你对应用的描述、它做什么，再加上几个能引出最佳反馈的简短问题，就足够了。\n\n完成这一步并收到口头或问卷形式的答复后，仔细审阅所有答复。答案是否清晰？是否需要提出后续问题以澄清？如果需要，那就去做。待这一切完成后，坐下来，带着你的想法和收到的反馈，一边回顾反馈，一边审视你的想法描述。你该如何修改你的想法，以解决反馈中概括出的问题？\n\
  \n需要注意，并非所有反馈都是好反馈。有些反馈，你需要持保留态度。一条好的经验法则是，考虑那些能让你的想法更接近应用核心的反馈和建议。如果收到的反馈有助于你解决应用所针对的问题，那就加以考虑。你是否收到了意料之外、可能让你重新思考想法的反馈？这完全没问题。\n\
  \n如果你需要重写你的想法陈述和描述，那就去做，并再次对照你所收到的反馈进行检查。保存所有你收到的反馈，即使你在项目的这个阶段并未使用它们。随着你进入设计流程的后续阶段，它们也会派上用场。\n\
  \n### 第三步：将你的应用与其他应用进行比较\n\n在这一步，我们将真正开始扩展你在第一步中为应用创建的初始想法。既然你已经通过一个小型潜在用户对照组验证了该想法，现在我们需要看看你的想法与苹果应用商店中现有应用相比如何。\n\
  \n自 2008 年应用商店携 500 个应用上线以来，iOS 设备可用的应用数量每年都在呈指数级增长。如前所述，截至 2013 年 6 月，苹果应用商店中约有\
  \ 90 万个应用。竞争可谓非常激烈！幸运的是，苹果在应用分类方面做得相当出色，而且你可以直接从 iPhone、iPad 或 iPod Touch 上轻松访问和浏览应用商店。\n\
  \n一个好的起点是应用商店的“精选”栏目或标签页。在这里，你会看到商店的“新款佳作”和“热门应用”板块。这些是由苹果编辑团队挑选出来，展现一流可用性、设计和功能的应用。正因如此，它们被苹果推荐，并且在人气和销量方面表现极为出色。通常，这些应用在提交到应用商店时会被标记为独特应用。苹果的编辑团队试图挑选那些在某些方面具有创新性的应用，在应用商店中进行推荐。很有可能，你已经拥有其中一些应用，但由于每天发布的应用数量庞大，你可能会看到一些之前从未见过的新应用。“新款佳作”和“热门应用”板块中的应用来自各种类别。浏览不在你的应用特定类别中的应用，以及那些与你的应用同类的应用，以便能够看到各种风格和功能，这是一个好主意。\n\
  \n同时，也看看“排行榜”中的应用，以了解当前哪些应用最受欢迎。导航到每个应用的页面，特别注意每个应用的描述和截图。是否有任何线索能说明是什么让这个应用在其特定类别中脱颖而出？请注意，你会发现在一个类别中有多个功能相同的应用。例如，“游戏”是苹果应用商店中最受欢迎的类别，遥遥领先于“教育”、“娱乐”和“生活”等类别。这些类别中塞满了应用，而且每天都有更多的应用在设计、开发、审核和发布。如果你的应用目标是这些类别之一，那么它确实需要做到脱颖而出。\n\
  \n当你浏览热门应用列表时，务必导航到应用商店中每个应用的页面。注意应用的图标、名称、描述、截图，以及最后但同样重要的评论数量和平均评分。应用商店“新款佳作”板块中列出的大多数应用都有令人印象深刻的下载量、评论和高评分。评论和评分对任何应用来说都是重要的统计数据。它们会醒目地显示在你的应用在应用商店的页面上，因此你自然希望你的应用受欢迎且设计精良，以便从用户那里获得高评分。\n\
  \n在查看应用页面时，你会发现所有应用都需要提供截图。看看那些更受欢迎应用的截图。注意那些让你眼前一亮的截图。请注意，基于截图，你也许能大致了解其功能。但这不是此项练习的目的。利用截图来感受每个应用的设计美学。该应用的用户界面有何独特之处？注意配色方案，以及根据你在页面上能看到的内容来判断哪些是有效的。这些因素中的任何一个是否会让你更倾向于或不太愿意下载该应用？记下原因。\n\
  \n特别关注那些与你想要创建的应用属于同一类别的应用。它们之间有相似之处吗？你能从应用商店的应用页面中，就功能和设计获取到什么线索？\n\n\n\n### App\
  \ Store 竞品分析指南\n\n#### 第一步：浏览用户评论\n\n应用商店中的每个应用都会有用户评论。每位顾客都可以在应用的商店页面上发布公开评论和评分，所有人都能看到这些内容。请务必阅读你所在类别中排名靠前的应用以及那些吸引你的应用的前\
  \ 10 条左右的评论。试着了解每位评论者的主要关注点。他们是在称赞这款应用吗？还是在贬低它？评论者有时可能非常直言不讳，但最严厉的评论中也往往隐藏着真相的碎片。因此，如果用户愿意花精力撰写评论，那么其中一定有某些值得参考的要点。\n\
  \n如果你已经下载了这些应用（当然要根据你的预算来），请确保亲自使用它们，并阅读一些最好的和最差的评论，从而平衡地了解应用中存在的问题。将这些与你自己的应用进行比较。试着确定你的应用能否填补这些应用（特别是你所在类别的应用）留下的市场空白。同时记录下这些发现。\n\
  \n#### 第二步：关注应用评测网站\n\n你也可以尝试访问应用评测网站。这些网站会在应用商店系统之外对应用进行审查和评级。你在这里找到的内容质量可能参差不齐，但你也可能发现一些在应用商店中找不到的应用。关于苹果应用商店搜索难度的讨论一直存在，但了解苹果认为哪些是应用设计的最佳范例仍然很有帮助。\n\
  \n#### 第三步：分析你的发现\n\n这是项目的一部分，我们在此汇总从应用商店以及我们自身收集到的所有数据。\n\n制作两个列表。第一个列表将包含你最近在应用商店探索中最喜欢的应用。你为什么会被这些特定应用吸引？描述这些应用的突出之处。它们有什么独特之处？是因为它们的名称、标志设计还是截图？是否有任何应用与你的想法相似？是否有应用属于与你应用相同的类别？请特别关注这些应用。你的应用与其他热门应用之间是否存在大量相似之处？如果是，你如何将自己的应用与它们的区分开？如果需要，请重新审视描述你应用的那句话，思考你的应用将如何与众不同，以及如何避免重复造轮子。\n\
  \n**列表一：**\n\n*   应用#1 – 优秀的设计\n*   应用#2 – 名字奇怪，与功能无关\n*   应用#3 – 喜欢它的配色方案\n\n第二个列表将包含那些与你的想法应用属于同一类别的应用。该类别中排名靠前的应用是哪些？在你看来，这些应用做对了什么，又做错了什么？密切关注那些评分高、下载量大的应用。用户在说什么？记录下这些应用中任何独特、正面或负面的亮点。此外，注意关于你所在类别的其他信息。你类别中的大多数应用是付费应用还是免费应用？在评分最高、评论最好、下载量最大的应用中是否存在一致性？当你查看截图时，是否发现这些应用的界面（`UI`）有任何相似之处？它们在哪里做得很好？\n\
  \n**列表二：**\n\n*   应用#1 – 与我的应用非常相似。评论抱怨价格太高。\n*   应用#2 – 易于使用，非常受欢迎，是该类别排名第一的应用。\n\
  *   应用#3 – 受到苹果推荐，设计精美，界面友好，易于使用。\n\n以`Utilities`（实用工具）类别为例。这个类别包含许多具有相似功能的应用。`To-Do`（待办事项）应用就是一个完美的例子。应用商店中有不少这类应用，它们都有一个共同的目标：通过允许用户分类任务、创建列表，来帮助用户管理时间或项目。然而，每个应用处理问题的方式都不同，虽然核心任务可能相同，但每个应用都与其他应用有明显区别。它们在用户界面（`UI`）、功能和配色方案上各不相同。仅凭这些因素，就能让两个执行类似任务的应用看起来截然不同。请思考这与你的应用的关系，以及在一个可能已经饱和的领域中，什么能让你的应用脱颖而出。\n\
  \n一个已经饱和的领域并不是放弃你创意的理由。毕竟，应用商店里有近百万个应用，你很难找到一个尚未饱和的领域。因此，不要将可能饱和的类别视为成功的障碍，而应将其视为推动你找到独特方法来解决一个普遍问题的动力。它将迫使你跳出思维定势，为现有问题创造一个真正原创的解决方案。\n\
  \n#### 第四步：为将来参考保存竞品应用\n\n如果可能，请尽量下载你列表中的应用。希望大多数是免费的，其他的也不会太贵。通常，应用商店中的应用价格从免费到\
  \ 3.99 美元不等，但也有一些可能更贵。根据你的预算下载。价格超过 3.00 美元左右的应用被认为是高级应用，你需要自行决定能负担哪些。\n\n如果你选择不购买应用，可以尝试在互联网上寻找这些应用的评测。如果一款应用在应用商店中被推荐，那么它很可能也出现在`Mashable`、`Tech\
  \ Crunch`或`Venture Beat`等热门科技期刊中。有时，这些文章会比应用商店中的描述更详细地介绍应用的用户界面和功能。快速谷歌搜索应该能帮你找到一些顶级应用的不错评测。如果你对下载一个可能不会使用的应用犹豫不决，或者它超出了你的预算，这可以为你省下一些钱。\n\
  \n应用下载完成后，将它们放在一个名为“`Research`”（调研）或其他能提醒你其用途的文件夹中。如果需要，你可以进一步将应用分类到标有“付费”、“免费”等文件夹中。将这个文件夹放在手机上方便获取的位置，以便需要时轻松访问。在整个过程中，你将反复参考这些应用，以帮助你的创意构思过程。\n\
  \n#### 第五步：根据需要修正你的创意\n\n一旦你下载了应用并进行了分类，真正的乐趣就开始了。将你对应用的“一句话描述”放在手边（或者你现在应该已经记住了所有不同的版本），更深入地探索你下载的应用。最初，计划在每个应用上至少花费半小时。你会发现，根据应用做得好的方面，在每个应用上花费的时间可能会少于或多于半小时。也请记录这一点。你可能需要考虑的其他问题包括：\n\
  \n*   这些应用在哪些方面做得好？\n*   它们在哪些方面失败了？\n*   它们的用户界面有哪些独特元素？\n*   它们易于使用吗？\n\n更重要的是，它们与你想要创建的应用有何关联？\n\
  \n请特别关注那些与你创意应用属于同一类别的应用。它们与你应用试图解决的核心问题相比如何？\n\n\n\n如果你的应用在我们看来能与这些应用相提并论，那真是太棒了。你或许真的有所发现！如果你对自己的应用充满信心，那就大胆去做吧。然而，考虑到每天提交到应用商店的应用数量，光凭数字就可能让你处于劣势。因此，尽可能以任何方式脱颖而出至关重要。当你有了一个真正相信的想法后，艰苦的工作才真正开始。请扪心自问以下问题：\n\
  \n*   我的应用试图解决什么问题？\n*   我的应用的目标受众是谁？\n*   这个应用的最终目标是什么？\n*   这个应用会同时支持 iPhone 和\
  \ iPad 吗？\n\n一旦你回答了这些问题，并且没有哪个答案是致命障碍，那么你就可以继续开发你的应用了。这意味着你的想法是可靠的，你已经完成了基本的验证和市场调研，并且准备进入为\
  \ iOS 设计应用的下一阶段。\n\n### 总结\n\n所有应用都始于一个想法。但研究对你的设计也至关重要。明确应用的功能描述，并与他人验证，这将帮助你完善你的想法，使其不仅仅是一个想法。将你的应用想法与应用商店中的其他应用进行比较，是了解你将面临何种竞争、获取灵感以及理解用户真正需求的好方法。经历必要的定义和完善过程，是创建应用的重要一步，它将为后续步骤奠定基础。接下来，我们将讨论你需要了解的有关苹果新操作系统\
  \ iOS7 的内容。\n\n## 第 2 章：iOS：你需要了解什么\n\n`iOS` 代表 iPhone 操作系统，是所有苹果移动设备和平板电脑所基于的软件。这包括\
  \ iPhone、所有版本的 iPad，甚至包括 iPod Touch。`iOS` 允许所有应用在这些设备上运行。`iOS` 于 2007 年伴随初代 iPhone\
  \ 发布，直到最近 iOS 7 的宣布和发布，期间经历了多次小规模更新。\n\n它是一个用于多点触控设备的操作系统。因此，用户旨在直接与运行该操作系统的设备屏幕进行交互。这为设计师带来了一些独特的机遇和挑战。因此，了解哪些元素是标准的，并且在多年与\
  \ `iOS` 的交互中已为用户所熟悉，这一点非常重要。\n\n在整个 `iOS` 中，有一些通用的 UI 元素，无论设备如何，它们都是标准的，并且无论在哪个应用中使用，都能帮助用户执行常见的操作。我们将回顾其中的一些元素，因为它们在您设计应用时会很有用。\n\
  \n2013 年 6 月，在旧金山举行的年度开发者大会上，苹果公司发布了 iOS 7。在本章中，我们将讨论 iOS 的标准 UI 元素，以及它们如何随着 iOS\
  \ 7 演进和变化。\n\n### iOS 7 的新特性\n\niOS 7 之所以重要，是因为它代表了该操作系统自六年前发布以来最重大的变化。如果你正在从头设计一个应用，你需要了解苹果希望你如何遵循其新的设计语言；如果你已经设计了一个应用，那么你需要重新设计，以符合\
  \ iOS 7 中提出的新的、改进的设计范式。\n\n虽然工具栏、标签栏、导航栏和其他用户界面元素的整体功能保持不变，但整个操作系统的外观和感觉已经完全改变。\n\
  \n作为一家以设计为中心的公司，苹果一直以其软件和硬件的简洁美观设计美学而闻名。这种设计美学已成为公司传统的一部分。iOS 7 是这种设计美学的延伸。虽然它本身并不代表一种新的设计范式（它在设计上大方地借鉴了目前市场上一些更受欢迎的应用的提示和线索），但它确实代表了该操作系统的一个全新方向，并将改变设计师未来设计其应用的方式。可以这么说，体现\
  \ pre-iOS 7 标准的应用在新操作系统上运行时会显得过时。\n\n#### iOS 7 的指导原则\n\n乔纳森·艾维，有时被称为苹果的创意沙皇，一直以允许形式与功能以美丽无缝的方式共存而闻名，无论是硬件还是软件，iOS\
  \ 7 也不例外。因此，新界面以不引人注目而自豪。在整个更新的《人机界面指南》（HIG）中，苹果强烈要求设计师让设计服务于内容。iOS 7 试图以身作则。遵循这一理念的设计师会发现，他们的应用在\
  \ iOS 7 框架内能够完美无缝地呈现和运行。\n\n为 iOS 7 设计的关键是保持简洁。这一点在 `HIG` 中一直有所提及，但伴随着这个新的设计方向，简洁性被推到了前台和中心位置。那些在旧版操作系统上运行良好的老式应用设计，在\
  \ iOS 7 上会显得臃肿复杂。因此，你必须考虑如何在保持内容优先的同时适应这种新的色彩搭配。虽然以前对 iOS 的升级侧重于开发，但是这次也有很多开发方面的更新。设计师将被迫在未来的应用设计方式上做出重大改变。所有应用现在都必须针对视网膜屏幕进行优化，图标也有了新的外观和感觉。\n\
  \n有三个指导原则和主题应该指导 iOS 7 应用的设计：\n\n-   ** deference（顺从）** – 指的是用户界面能够理解并与应用内容互动，而不是与之竞争。事实上，`HIG`\
  \ 指出 UI *永远* 不应与内容竞争。这意味着你在 UI 中选择的元素绝不能压倒内容，也不能让用户必须在两者之间做出选择。如果存在任何疑问，内容优先。每一次都是如此。\n\
  \n-   **清晰** – 指的是所有新设计都必须在视网膜屏幕上清晰易读这一新要求。以前，如果你的设计没有针对视网膜屏幕优化，在新设备上会显得略微模糊。但现在不行了。随着\
  \ iOS 7 的推出，苹果现在要求文本和图标在所有设备上都清晰、锐利、明了。这也意味着不再使用斜面效果和投影效果。\n\n-   **深度** – 新的注意力被放在了图层、透明度、半透明度和动效上，以在应用中创造深度感。iOS\
  \ 7 充满了优美的过渡和逼真的动画，为环境增添了新的响应性和纵深感。\n\n如果你正在为 iOS 7 改造一个旧应用，你需要重新审视每一个页面，去除沉重的阴影、斜面以及其他容易使设计显得沉重的特征。请记住，功能性和内容必须占据前台和中心位置。iOS\
  \ 7 将以一种全新的方式向用户展示你的应用，所以请思考你将如何以优雅时尚的方式，在保留缩小版应用外观的同时，进一步提升其功能。所有这些元素必须相互平衡，才能与\
  \ iOS 7 协同工作。\n\n现在，让我们看看在 iOS 7 中你可以期待的一些具体变化。从开发的角度来看有很多更新，但就本书而言，我们将主要关注那些会影响未来应用设计的变化：主屏幕、字体排印、图标、栏、表视图和表视图元素。\n\
  \n### 主屏幕\n\n\n\n#### iOS 7 中的主屏幕\n\n主屏幕是 iPhone 或 iPad 上应用图标所在的地方。所有内容都位于主屏幕上。你可以将它想象成电脑的桌面。启动\
  \ iOS 后，你首先看到的会是主屏幕，并且会不断返回这里。你会立刻注意到 iOS 7 主屏幕的变化。之前位于屏幕底部闪亮、带有斜面托架上的常用应用图标（如图\
  \ 2-1 所示），现在则位于一个半透明的背景之上，该背景仅部分遮挡了墙纸图像，如图 2-2 所示。打开应用时的过渡动画比以前更流畅，新的设置允许用户将全景图像设置为墙纸。左右移动手机也会产生“平移运动效果”。iOS\
  \ 7 让用户以新的方式与 UI 交互，这也延伸到了应用上。用户现在可以从主屏幕访问某些设置，从主屏幕进行聚焦搜索，以及从主菜单向下滑动以查看新的通知中心。本章稍后我将详细介绍内置应用如何为\
  \ iOS 7 进行升级。\n\n![9781430263647_Fig02-01.jpg](img/9781430263647_Fig02-01.jpg)\n\
  \n图 2-1. iOS 6 主屏幕与应用图标。常用应用位于闪亮的托架上\n\n![9781430263647_Fig02-02.jpg](img/9781430263647_Fig02-02.jpg)\n\
  \n图 2-2. 在 iOS 7 中，“信息”和“电话”图标现在位于屏幕底部的半透明条中\n\n### 字体排印\n\niOS 7 的初始版本以及后续版本都采用了非常细的\
  \ Helvetica Neue Ultra Light 字体。这代表了一种完全不同的方法，为操作系统带来了更新、更轻量、更现代的外观。然而，在某些情况下，这种字体难以查看和阅读。最近的版本已移除了超细字体，转而使用更粗、更易读的字重。在底层，新的字体渲染引擎允许开发者精确地选择字体在其应用中的显示方式。这为设计师在字体排印方面提供了大量的自定义选项。\n\
  \n**注意** 对于包含大量文字的应用，设计师需要为 iOS 7 重新设计。\n\n像为你的应用选择文本或字体这样简单的事情，在 iOS 7 中将变得更加重要，因为新的\
  \ API 将允许用户使用动态类型来调整每个应用中的文本大小。这为设计师在思考其应用如何呈现给用户时，增加了额外的责任。\n\n#### 图标\n\n所有标准应用的图标都已重新设计。操作系统早期版本中老式图标的斜面、阴影和光泽的拟物化外观已不复存在。眼尖的用户可能还记得，按照标准，旧的应用图标可以带或不带程序化添加的光泽和渐变效果。这些效果已被完全移除，取而代之的是采用新色调和新扁平化外观的图标，这也是许多较新的热门应用所采用的特征。参见图\
  \ 2-3，了解所有内置应用的图标如何为 iOS 7 重新构想。\n\n![9781430263647_Fig02-03.jpg](img/9781430263647_Fig02-03.jpg)\n\
  \n图 2-3. iOS 6 与 iOS 7 图标并排对比\n\n**注意** 你的创意部门能否重新制作上图？iOS 7 中 Safari 的新图标是一个位于白色正方形上的圆形。在上图中难以看清。制作部门能否复现这个图标？\n\
  \n不仅是内置应用的图标被重新设计。快速查看新的控制中心（从主屏幕的任何页面轻扫即可访问）会发现，其中的图标也已按照 iOS 7 的扁平风格重新设计。这些图标不可自定义，也不应该与你的应用相关，但需要快速研究一下，才能充分了解\
  \ iOS 7 为 iPhone 和 iPad 带来的变化范围。\n\n然而，图标只是苹果为 iPhone 和 iPad 修改所有标准应用外观的开始。\n\n\
  图 2-4 显示了 iOS 6 上的锁定屏幕视图。请注意状态栏如何与屏幕其余部分分离，以及密码键盘上带有阴影和斜面的按钮。iOS 7 摒弃了所有这些设计。\n\n\
  ![9781430263647_Fig02-04.jpg](img/9781430263647_Fig02-04.jpg)\n\n图 2-4. 带有密码输入的\
  \ iOS 6 锁定屏幕\n\n图 2-5 显示了 iOS 7 上的锁定屏幕视图。这里需要特别注意的具体项目是键盘上按钮的新外观。它们现在符合苹果新的“扁平”设计，并且是圆形的，而不是\
  \ iOS 6 及更早版本中使用的方形键盘按钮。注意空间的利用，以及键盘如何成为此屏幕的焦点。功能——输入密码是主要焦点，没有任何东西分散这一体验。旧版本的体验是碎片化的，各个数字窗口占据了屏幕上相当大的空间。在\
  \ iOS 7 中，我们习惯用作页面指示符的圆圈被提升到了新的高度。它们现在出现在状态栏中作为信号强度指示符，以及在锁定屏幕上用户输入密码以访问设备时出现。\n\
  \n![9781430263647_Fig02-05.jpg](img/9781430263647_Fig02-05.jpg)\n\n图 2-5. 带有密码输入的\
  \ iOS 7 锁定屏幕\n\n### 栏\n\niOS 中常见的 UI 元素是栏。它们用于多种用途，例如显示设备信息、为用户提供额外选项或控件，以及显示按钮。\n\
  \n栏的大小因设备而异，但在 iOS 中大多是恒定功能，有助于向用户显示关键信息。在 iOS 中，所有 iOS 应用中的栏都具有专门设计的外观和行为。我在下面列出了\
  \ iOS 中最常见的栏，以及它们在 iOS 7 中的变化。\n\n### 状态栏\n\n状态栏为用户提供关于设备的信息，例如时间、电池电量信息和网络连接详情，以及应用是否正在访问用户的位置信息（图\
  \ 2-6）。无论设备处于竖屏还是横屏模式，它都位于屏幕的最顶部。设计你的应用时，根据应用的外观和色调，有一些关于如何使用状态栏的指南，并且你可以选择几个选项。苹果允许你在用户查看关键信息或玩游戏时隐藏状态栏。但还有其他限制，例如，当应用正在使用大量网络资源时，应使用网络指示器来显示。\n\
  \n![9781430263647_Fig02-06.jpg](img/9781430263647_Fig02-06.jpg)\n\n图 2-6. iOS 7\
  \ 中的状态栏\n\n在视觉上，允许对状态栏进行一些自定义，但仅限于颜色和动画。尽管状态栏的高度是固定的，但它包含的信息至关重要，因此，如果你决定隐藏状态栏，应确保用户无需退出应用即可再次查看它。\n\
  \n\n\n#### iOS 7 UI 元素指南\n\n### 状态栏\n\n在 iOS 7 中，状态栏采用了全新的设计，变得半透明、透明且无边框。设计师们会发现状态栏和导航栏之间不再有分隔线。实际上，在\
  \ iOS 7 中，它们看起来融为一体。当在 iOS 7 中查看旧版应用时，分隔线仍然存在，但在所有预装于 iOS 设备上的重新设计的原生应用中，这条分隔线已被移除，取而代之的是苹果更简洁的新\
  \ UI。如果您的应用有彩色背景，您需要牢记这一点，并考虑状态栏在其上的显示效果。\n\n状态栏上显示的标准信息包括：\n\n- **屏幕方向** – 指示设备是否已锁定为竖屏或横屏模式。如果屏幕未锁定在特定方向，则不会显示此图标。\n\
  - **蜂窝网络信号强度** – 此前，此信息使用条形格显示。在 iOS 7 中，条形格已被圆形指示器取代。\n- **运营商名称** – 包括 AT&T、Sprint、Verizon\
  \ 或其他任何运营商。\n- **连接类型** – 常见的包括`3G`、`4G`或`LTE`。\n- **WiFi 指示器** – 告知设备已连接到可用的 WiFi\
  \ 源以及信号强度，通常显示为一到三个条形格。\n- **蓝牙** – 正在连接使用蓝牙的设备。\n- **时间** – 显示当前时间，通常位于中间位置。\n\
  - **电池指示器** – 显示设备的剩余电池电量。\n\n### 导航栏\n\n导航栏允许用户在 iOS 中进行导航。它始终位于状态栏下方，并包含几个关键元素，包括当前屏幕的标题以及给定时间屏幕上信息层级中的任何导航按钮。当用户在\
  \ iPad 或 iPhone 上将设备从竖屏切换到横屏时，导航栏的高度和宽度会发生变化。\n\n导航栏的外观以及其上的元素都可以自定义。像返回按钮、标题和背景等元素都可以自定义，以便在视觉上更好地与应用的整体风格保持一致。\n\
  \n苹果明确要求**不要**在导航栏中创建多段返回按钮或面包屑导航。原因如下：首先，这会使必需的返回按钮区域过大，从而侵占当前屏幕标题的尺寸；其次，在多段返回按钮中列出多个分段会减少每个分段可用的空间，从而导致用户可点击的区域越来越小；最后，层级越多，决定显示哪些层级就越困难。这些是需要牢记的重要事项，因为在\
  \ iPhone 和 iPod touch 上，屏幕空间非常有限。\n\n与状态栏类似，导航栏在 iOS 7 中也有了新的外观（图 2-7）。它同样是半透明的，并且采用了无边框按钮。也就是说，在改进后的导航栏中完全没有按钮。设计师还应考虑到这一点在\
  \ iOS 7 全新排版引擎下的含义。如有必要，请与开发者紧密合作，确保字体在导航栏中清晰显示且符合您的预期，因为这决定了用户如何在您的应用中移动和交互。\n\n\
  ![9781430263647_Fig02-07.jpg](img/9781430263647_Fig02-07.jpg)\n\n图 2-7 iOS 7 邮件应用的导航栏\n\
  \n### 工具栏\n\n工具栏允许用户根据当前视图或屏幕上的内容执行特定操作（图 2-8）。在 iPhone 上，它位于屏幕底部；但在 iPad 上，它可能位于其他位置，例如页面顶部边缘。对于您的工具栏，苹果建议在应用中使用系统提供的按钮和图标。但是，如果您的应用具有自定义任务，则需要为工具栏提供自定义按钮和图标。请记住，工具栏上的图标应保持与上下文相关，仅包含与当前屏幕操作相关的操作。\n\
  \n![9781430263647_Fig02-08.jpg](img/9781430263647_Fig02-08.jpg)\n\n图 2-8 iOS 7 邮件应用中常用的工具栏图标\n\
  \n在 iPhone 上，工具栏在从竖屏旋转到横屏时高度会发生变化，因此任何自定义图标也需要设计为能够适应这种调整。\n\n工具栏和导航栏中也推荐使用标准图标。工具栏的标准图标包括：旗帜、文件夹、垃圾箱/回收、转发/分享以及撰写。\n\
  \n#### 标签栏\n\n在每个应用中，用户需要在各种自定义视图和模式之间进行切换导航。标签栏促进了这些操作。它位于屏幕底部并保持一致，并且应该可以从应用中的任何位置访问。标签栏的默认背景色此前是黑色，但可以根据应用的设计进行自定义。现在在\
  \ iOS 7 中，标签栏的默认颜色是白色，并且与导航栏共享许多相同的属性。不过，也可以通过编程方式更改标签栏的背景。标签栏也存在限制。例如，在 iPhone\
  \ 上，任何标签栏中一次最多只能显示五个标签。如果要显示更多，iOS 会自动添加一个“更多”标签，并在列表中显示剩余的标签。而在 iPad 上，则允许显示超过五个标签。在任何设备上，无论方向如何，标签栏都保持一致。\n\
  \n您可以使用标签栏通过添加徽章、数字和符号向用户传达信息。这些元素会以一种不打扰用户的方式吸引对标签栏的注意，并允许用户在方便时轻松访问。\n\n### 表视图与表视图元素\n\
  \n表视图是 iOS 以清晰高效的方式显示信息的独特方式。它们是 iOS 的 UI 工具包中最常用的组件之一，传统上以包含多行的单列列表形式出现。这些行可以根据个人喜好和提供给用户的信息进行分组和分隔。表视图有两种类型：**普通表视图**是延伸屏幕整个宽度的表视图；**分组表视图**则从背景、侧面和屏幕边缘向内缩进。\n\
  \n在 iOS 7 中，所有表视图都延伸至屏幕边缘。这也适用于分组表，它们不再从背景向内缩进。请参见下面的示例（图 2-9 和 2-10）。\n\n![9781430263647_Fig02-09.jpg](img/9781430263647_Fig02-09.jpg)\n\
  \n图 2-9 iOS 6 中的设置屏幕显示分组表视图\n\n![9781430263647_Fig02-10.jpg](img/9781430263647_Fig02-10.jpg)\n\
  \n图 2-10 iOS 7 中设置屏幕和分组表视图的新外观\n\n上述图 2-9 展示了浏览器应用 Safari 中旧版表视图的设置界面。请注意，在旧版本中，分组表视图用于将信息与背景区分开，并将相关任务组合在一起。现在看看该视图在\
  \ iOS 7 中发生了怎样的变化。\n\n\n\n在上图图 2-10 中，展示了运行在 iPhone 5 上的 iOS 7 系统，请注意屏幕尺寸有所不同，分组表格视图的新外观也发生了变化。\n\
  \n#### 表格视图元素\n\n在 iOS 交互中，有一些特定元素用于在不同视图和场景下向用户传达信息。这些元素的创建是为了扩展表格视图的功能，并帮助最大化利用屏幕空间。这些元素包括：勾选标记、展开指示器、详情展开按钮、行重排、行插入、删除按钮控件以及删除按钮。在设计应用时，毫无疑问你会使用表格视图来展示信息。虽然这些元素在特殊情况下也可以用在表格视图之外，但一个好的经验法则是仅在表格视图内部使用它们。\n\
  \n建议在表格视图中使用的元素如图 2-11 所示。虽然与这些元素相关的任务保持不变，但这些元素在 iOS 7 中也经过了重新设计。\n\n![9781430263647_Fig02-11.jpg](img/9781430263647_Fig02-11.jpg)\n\
  \n图 2-11。此图表来自 HIG，展示了表格视图中常用的元素\n\n**注意** 我想制作一张图表来展示这些元素的变化。左侧是旧样式，右侧是新样式。这个图表源自\
  \ Apple 的 HIG 文档，希望图形团队能重新制作一张。\n\n#### 预装应用\n\n在尝试为 iOS 进行设计之前，建议先研究一下 iOS 应用生态中的预装应用。在大多数情况下，这些是你首先接触的应用，并且存在于每一台运行\
  \ iOS 的设备上。它们是：`Mail`、`Messages`、`Calendar`、`Photos`、`Camera`、`Weather`、`Clock`、`Maps`、`Videos`、`Notes`、`Reminders`、`Stocks`、`Game\
  \ Center`、`Newsstand`、`iTunes`、`App Store`、`Passbook`、`Compass`和`Settings`。这些应用（也如图\
  \ 2-12 所示）将帮助你了解为 iOS 设计应用时的基本设计和 UI 原则。通过研究这些应用，你将找到在 iOS 中针对常见操作使用 UI 元素的最佳实践，这些实践同样可以应用到你自己的应用中。\n\
  \n![9781430263647_Fig02-12.jpg](img/9781430263647_Fig02-12.jpg)\n\n图 2-12。iOS 7\
  \ 中的预装应用\n\n我们来具体看几个应用，并指出你需要熟悉的特定 UI 元素，以便设计你的第一个 iOS 应用。iOS 预装应用的伟大之处在于，这些应用中所使用的\
  \ UI 元素代表了公认的最佳实践，其他所有平台的用户也都能识别。\n\n##### 邮件\n\n`Mail`是 iPhone 和 iPad 的电子邮件应用程序。它允许你在移动设备上发送和接收电子邮件。`Mail`应用采用了\
  \ iOS 的一些标准 UI 元素，这些元素也可以用于你自己的应用。如果你的应用允许用户发送电子邮件，你可以通过`Mail`从应用内发送邮件。`Mail`的应用图标在主屏幕上表现为一个带有白色信封的蓝色方框。\n\
  \n###### 标准邮件图标\n\n撰写工具用于在`Mail`应用中撰写电子邮件。该应用的图标是一个带有白色信封的蓝色方框。你会看到其他第三方电子邮件应用也在其图标上采用了这一主题的某种变体。如果你的应用是一个电子邮件应用，最好不要试图重新发明轮子。在你的应用设计中使用既定的设计范式和图标。\n\
  \n撰写图标是一个常用图标，表示能够创建新文档。一旦用户点击该图标，一个新窗口将出现，允许用户创建新文档或电子邮件，其中包含一个已清空的字段，供用户输入新内容。这是一个被广泛接受的\
  \ UI 范式。如果你的应用允许用户撰写新文档或电子邮件，请使用这个图标。\n\n##### 计算器\n\n图 2-13 中的`Calculator`应用也采用了新的扁平风格进行了重新设计。之前带有斜角的按钮已被扁平按钮取代，旧的光亮输入框也不复存在。现在，该应用使用不同的色调来区分键盘上不同按钮的功能。现在，你可以从控制中心以及闹钟处轻松访问新的计算器，这省去了之前需要进入设置菜单访问的步骤。\n\
  \n![9781430263647_Fig02-13.jpg](img/9781430263647_Fig02-13.jpg)\n\n图 2-13。iOS 7\
  \ 中重新设计的`Calculator`应用\n\n##### 日历\n\n在 iOS 7 中，日历应用在纯白色背景上呈现出更简洁、干净的外观。它让你能够完成许多在旧版\
  \ iOS 中可执行的任务。然而，iOS 7 现在引入了可以一览整年视图的功能，如图 2-14 所示。导航方式也略有不同。在 iOS 6 中，日历应用有列表、日和月的选择器；而在\
  \ iOS 7 中，从月视图中点击某个日期会进入日视图，若要查看所有过去和未来事件的列表视图，你需要点击 iPhone 屏幕右上角的搜索图标。这并非最直观的设计，需要一些时间来适应。\n\
  \n![9781430263647_Fig02-14.jpg](img/9781430263647_Fig02-14.jpg)\n\n图 2-14。iOS 7\
  \ 中日历应用的新外观\n\n##### 天气\n\n虽然所有 iOS 预装应用都经历了重大转变，但我最喜欢的当属`Weather`应用。这款应用不仅从头到尾进行了重新设计，还增加了精彩的新动画，极大地增强了应用的体验感。在这里，Apple\
  \ 很好地展示了如何充分利用全屏进行设计，这也是他们如今鼓励设计师们去做的。动画不仅反映了当前天气，还反映了所选城市的当前时间。屏幕最显眼的位置是当前城市、天气状况和温度。下方则是在行和列中均匀分布的逐小时天气与温度详细信息，便于阅读和查看（参见图\
  \ 2-15）。再往下是包含未来五天温度的每日天气预报。屏幕空间的运用非常均衡，微妙的背景动画更是画龙点睛之笔，尤其是它们仿佛在屏幕顶部和两侧自然飘散的效果。\n\
  \n![9781430263647_Fig02-15.jpg](img/9781430263647_Fig02-15.jpg)\n\n图 2-15。重新设计的`Weather`应用\n\
  \n需要注意的是，`Weather`应用主要功能是展示信息，功能本身非常简洁。它有两种视图：多城市列表视图和单城市视图。用户可以通过左右滑动来浏览列表中的城市，也可以添加或删除城市。天气应用的界面在内容和功能上都很简单，但效果却非常好。\n\
  \n关于`Weather`应用与雅虎自家天气应用的相似性也存在不少讨论。的确，`Weather`应用中的数据来源于雅虎和天气频道。两者的图标和链接都出现在该应用中。对这两款应用进行比较是合情合理的，绝对值得一看。\n\
  \n**提示** 天气应用已成为苹果应用商店中最受欢迎的应用之一。如果你的应用将向用户提供查看天气信息的功能，研究这些应用的设计将有助于你形成自己的设计方案。\n\
  \n### 色彩、透明度与图层\n\n\n\n#### iOS 7 设计原则\n\n近来，一些较新且更流行的应用已摒弃了深色、厚重的色彩，转而采用更浅、更柔和的配色方案。苹果也顺应了这一趋势，这种方式为\
  \ iOS 7 带来了更轻盈、更简洁的感觉。明亮的白色背景取代了此前在`设置`等原生应用中的灰色和细条纹背景。如今，在`设置`中，图标在干净的背景上显得格外突出。设计师应特别关注苹果如何使用色彩、对比度和透明度来增强层次感，并引导用户不仅关注内容，也关注其语境。你可以参考图\
  \ 2-9 和图 2-10 来了解相关示例。\n\n### 运用色彩\n\n在设计应用时，请思考色彩将如何在用户界面中发挥作用，并帮助你讲述应用的故事。每个应用都必须有一个故事，而你的用户界面将助你讲述这个故事。色彩之间应相互补充。在\
  \ iOS 7 中，苹果坚持使用一套非常清晰且特定的调色板。你会反复在所有原生应用中看到相同的颜色。请特别留意它们的使用方式和位置。例如，`信息`应用中那种近乎荧光的绿色，被用于状态栏的电池电量指示器和电话应用图标中。同样的绿色也作为强调色出现在`钱包`和`通讯录`的图标中。要思考在特定区域使用色彩，以及将色彩与特定任务关联起来。\n\
  \n随着 iOS 7 的到来，用户将比以往任何时候都更理解色彩的重要性。例如，用户的背景图像或壁纸将影响整个用户界面的渲染效果。如果你的壁纸或背景以黄色为主色调，那么这种颜色会出现在锁屏键盘上，而主屏幕文件夹的透明度会让主色调渗透出来，从而赋予设备该颜色的特性，并使其笼罩在这种色调中。这是一种巧妙而精致的处理方式，增加了额外的个性化定制层级，使得两台设备在运行\
  \ iOS 7 时，外观也不会完全相同。\n\n### 运用透明度\n\n透明度和半透明效果是 iOS 7 中大量使用却又十分巧妙的另一工具。除了前面提到的主屏幕文件夹外，从任何页面向下滑动即可打开新的控制中心。这是一种访问一些最常用应用的便捷方式，并为控制选项提供了快捷途径，无需再导航到`设置`应用——这是有些人（包括我自己）倾向于隐藏或收进文件夹的应用。首先，控制中心面板是半透明的，真正展现了操作系统的三维质感，这是以往版本所欠缺的。它不仅揭示了下面还有一层应用和其他功能，还让这些元素的颜色透射出来。该面板就像一块覆盖在主屏幕上的薄玻璃。请参见图\
  \ 2-16，查看控制中心面板在主屏幕上的示例。其次，控制中心面板并未延伸到屏幕顶部。在 iPhone 上，它会露出主屏幕上一行半的应用和文件夹。这为用户提供了他们在操作系统中所处位置的上下文。他们可以通过两种方式自由操作：在面板上向下滑动，或者只需点击另一个图标，面板便会自行收起。这种方法简单，但却非常高效。\n\
  \n![9781430263647_Fig02-16.jpg](img/9781430263647_Fig02-16.jpg)\n\n图 2-16. 控制中心的半透明条。控制中心会显示下方页面的颜色：在此示例中，即壁纸的颜色。\n\
  \n设计师在设计应用以及决定用户应如何与应用内容交互时，应参考这些微妙的线索。这个版本的操作系统推动设计师去除那些非绝对必要的元素，聚焦于那些用户与应用交互时真正需要的元素。\n\
  \n### 运用图层\n\n图层是 iOS 7 的关键组成部分。之前的版本侧重于添加如斜面与阴影等效果来暗示和体现深度，而 iOS 7 则将所有内容组织成图层，并使用运动传感器为用户在使用设备时提供三维感受。因此，当用户移动时，图层也随之移动，并补充用户的视角。这样，当前正在使用的元素总是位于最前方的图层。这意味着其后的内容会相应地移动和后退，以营造出你面前所有元素之间存在深度和空间的错觉。甚至仅仅是打开应用这一操作也体现了深度。旧版操作系统在打开应用时只是一个快速缩放；而在\
  \ iOS 7 中，应用的打开画面虽然仍然向内缩放，但背景似乎也在向后移动，从而在新应用中创造出一种完全沉浸的感觉。\n\n#### 按钮\n\n旧版 iOS\
  \ 中常见的边框大多已被移除。这可能会带来一个问题，因为用户现在需要重新从空间上感知一个词周围可点击的区域所在。用户已经习惯了“返回”和“取消”这类按钮的边框。由于对\
  \ iOS 的熟悉，用户会本能地知道这些按钮的功能（其名称也暗示了用途）。iOS 7 的不同版本在曾经是按钮的位置，只有扁平的彩色条。电话应用中的`结束通话`和`通话`按钮在\
  \ iOS 7 近期的测试版中，已从无边框的彩色条演变成了带轮廓的正式按钮。\n\n### 总结\n\n随着 iOS 发生翻天覆地的变化，在新设备上推行彻底的革新，iOS\
  \ 应用设计的未来一片光明。作为设计领域的领导者，苹果既建立了一些长期的设计标准，也借鉴了其他设计理念。如今，他们已准备好再次改变格局。通过设立新标准，设计师们将被迫寻求更新颖、更激动人心的方式，通过他们的应用与用户进行视觉沟通。\n\
  \n有趣之处在于 iOS 7 将推动设计走向何方。诚然，苹果对 iOS 所做的这些改变可以追溯到其他平台（仅举两例，如 Android 和 Windows Phone）。但设计爱好者一直将苹果视为该领域的领导者。在设计你的应用时，不仅要考虑这个新版本，还要思考它的由来和演进过程。问问自己下一个重大突破是什么，然后去实现它。\n\
  \n"
- '# 第 3 章


  '
- "# iOS 7 与扁平化设计\n\n在你准备设计应用，并开始熟悉人机界面指南和 iOS 7 的所有原则时，你无疑已经听说了“扁平化设计”这个被大肆讨论的术语。这个词正被用来定义苹果对操作系统用户界面的新方向。因此，有必要定义一下扁平化设计，并解释它是什么、从何而来，以及你如何用它来创建自己的应用。在你着手创建应用时，请思考内容，并将其置于核心位置。需要记住的一点是，用户与多点触控以及苹果移动设备套件交互已经有一段时间了。\n\
  \n\n\n我们已审阅了专门为 iOS 7 更新提供指导的《人机界面指南》相关章节。现在你应该已经熟悉这些内容了。该指南对 UI 中特定元素的放置位置提出了非常明确的要求。幸运的是，iOS\
  \ 7 并未改变这些元素的位置，但其外观和视觉风格发生了显著变化。一旦 iOS 7 广泛发布（本书出版时它应该已经发布了），用户将重新适应这些元素的呈现方式。\n\
  \n在本章中，我们将深入探讨扁平化设计，了解它的起源以及在设计 iOS 应用时需要掌握的关键要点。\n\n### 扁平化设计的原则\n\n扁平化设计代表了一种从拟物化写实主义转向极简主义的风格。虽然视觉效果更简洁，但它被认为比其写实风格的“近亲”拟物化更具精致感和多功能性。扁平化设计还提供了更清晰的线条，以及更轻盈、更醒目、更丰富的配色方案，以吸引观众并激发情感。\n\
  \n一些设计纯粹主义者认为，运用扁平化设计原则是一种提升内容优先级、让功能占据中心地位的方式。这对我来说意味着，设计师要么需要与 UI 和 UX 设计师更紧密地合作，要么需要更深入地理解这些原则，这一点变得更为关键。过去，设计师是那些让线框图变得美观的人。现在，随着扁平化设计的普及，设计师和用户体验设计师很可能由同一个人担任。由于缺乏过去那些引导用户的视觉线索，按钮和其他\
  \ UI 元素需要更加直观。除了视觉反馈之外，唯一能引导用户的就是他们自己的知识和理解力，即判断什么感觉自然、合理。这种新的设计方式将整体用户体验推到了整个设计过程的最前沿。事实上，随着许多多余的元素和效果（如斜角和阴影）被剥离，用户得以直面体验和内容本身。作为设计师，你的工作就是确保这些体验和内容经得起考验。\n\
  \n### 扁平化设计的起源及其他应用\n\n除了 iOS 7，你还会发现许多扁平化设计的其他例子。苹果并未发明扁平化设计，即使我们以 iOS 为背景来讨论它，它也并非移动端专属的范式。你会在\
  \ Web 上、其他移动操作系统（如 Windows Phone 和 Android）中，以及无数早在苹果注意到之前就已采用扁平化设计原则的应用中找到大量案例。\n\
  \n将扁平化设计推向台前的幕后英雄非微软莫属。而它的载体是一款如今已消失、鲜为人知的音乐播放器——Zune。虽然 Zune 从未真正撼动 iTunes 在音乐软件行业的虚拟垄断地位，但它确实为微软及其他软件公司未来采用的新设计理念奠定了基础。很快，其他公司纷纷效仿扁平化设计潮流。\n\
  \n软件巨头谷歌也在苹果之前加入了扁平化设计潮流，用以呈现其所有的产品、标识和图标。官方的《谷歌视觉资产指南》在整本指南中都大量运用了扁平化设计原则。\n\n\
  甚至一些大众消费品牌也接受了扁平化设计潮流。例如 eBay、前面提到的微软，以及 Twitter，这些知名品牌近期都在重新构想其标识和品牌形象时采用了扁平化设计原则。\n\
  \neBay 在 2012 年对其标识进行了 17 年历史上的首次重大更改，推出了一款更新、而且更扁平的设计。尽管该公司在宣布这一变更的声明中并未正式提及扁平化设计，但对于任何敢于比较新旧两个标识的人来说，其原则显而易见。品牌色调和颜色得以保留；然而，最不容忽视的是使用了更纤细的字体，并去除了公司名称中字母的重叠部分。有人可能会认为，这些颜色本身就对扁平化设计很友好，而纤细的字体则进一步强化了扁平效果。\n\
  \n同样追随扁平化设计潮流的还有 Twitter。这家微博客公司在其六年的历史中首次重新设计了广受欢迎的“Twitter 小鸟”标识。在该网站的官方博客文章中，创意总监道格·鲍曼谈到这种新的设计方向源于对“在创造性约束和简单几何图形中进行设计”的热爱。他接着指出，这只小鸟“完全由三组重叠的圆形构成”。那些熟悉用于设计苹果新图标的魔法网格系统的人，会发现两者之间有许多相似之处。\n\
  \n**提示** 研究并回顾大品牌是如何适应扁平化设计潮流的。在设计你的应用时，将它们作为参考范例。\n\n### 扁平化设计的未来\n\n设计界关于扁平化设计潮流的讨论已经持续了一段时间。有些人认为它只是一种潮流，而另一些人则认为它会持续下去。然而，网站可用性工具公司\
  \ Usabilla 于 2013 年 6 月对众多不同领域的设计专业人士进行的一项调查，得出了以下结论。\n\n人们将扁平化设计与以下描述关联起来：\n\n\
  - 简洁\n- 干净\n- 多彩\n- 现代\n- 乏味\n\n扁平化设计的五大优势如下：\n\n- 清晰性\n- 易用性\n- 现代外观\n- 高效的响应式设计\n\
  - 快速加载时间\n\n扁平化设计的五大缺点列举如下：\n\n- 与人们习惯的方式不同\n- 难以执行到位\n- 不清楚哪些是可点击的\n- 设计乏味\n- 缺乏个性\n\
  \n基于这些列表，扁平化设计并非昙花一现。它有持续存在的生命力。68%的受访者认为扁平化设计不只是一时狂热，它将在未来数年真正影响我们为 Web 和移动设备设计的方式。\n\
  \n### 将扁平化设计融入你的应用\n\n那么，这些调查结果对你和你的应用设计意味着什么呢？由于扁平化设计原则将持续存在，你需要将它们融入你的应用设计中。我们来深入探讨以下每一条原则。\n\
  \n- 选择配色方案\n- 设计图标\n- 利用空间和模板\n- 定义按钮\n- 简化表单\n- 确定字体排印\n- 评估可用性\n\n#### 选择配色方案\n\
  \n要理解明亮、醒目的颜色是扁平化设计的标志，但这并不意味着在颜色方面你可以完全不顾逻辑。你必须明智地选择颜色。\n\n颜色对你的应用至关重要，因此定义配色方案是设计应用时最重要的任务之一。你首先需要了解的是，对于你或你的客户来说，是否存在必须遵循的重要品牌指南。无论你是为自己还是为客户设计应用，你都必须了解某些颜色会引发用户怎样的情绪。有许多在线资源可以帮助设计师理解使用特定颜色背后的心理学原理；因此在为你的应用选择配色方案之前，先做一些研究。请注意，扁平化设计倾向于使用明亮、醒目、鲜艳的颜色来向用户传达特定信息。请回顾你的应用文档以及用户在应用中将执行的主要任务，从而找到适合你的正确颜色组合。同时也要确保进行实验，因为可能性是无穷无尽的。\n\
  \n\n\n以下是选择配色方案时需要考虑的一些问题：\n\n- 哪些颜色最能突出应用程序中的主要任务？\n- 你是否在使用特定颜色的不同深浅？例如，你的主配色方案是否包括某种特定的红色以及多种其他偏红的色调？\n\
  - 中性色（如灰色、黑色和白色）在你的设计中扮演什么角色？\n- 你选择的颜色是否互补？它们在页面上相邻放置时是否协调？\n\n无论你怎么做，你的应用都必须保持一致。如果应用以明亮、大胆的色彩开场，那么你就应该在整个应用中都坚持这种风格。不要后来突然转变为柔和、低调的调色板。\n\
  \n对于设计师来说，在选择扁平化设计的调色板时，有许多很棒的在线资源。我最喜欢的一个是 [Flatuicolors.com](http://Flatuicolors.com)\
  \ ([`www.flatuicolors.com`](http://www.flatuicolors.com))。它是一个简单的网页应用，列出了一些流行的扁平化\
  \ UI 颜色，并允许你以多种不同格式（`hex`、`rgb` 等）复制颜色。你可以用它来尝试应用中的不同颜色组合。\n\n另一个有用的工具是 Color Scheme\
  \ Designer ([`www.colorschemedesigner.com`](http://www.colorschemedesigner.com))。这是设计师的天堂，允许你查看和测试各种颜色的调色板。它会并排显示这些颜色，帮助设计师理解颜色如何并排呈现，以及它们如何相互作用和互补。你还可以通过三色、四色甚至单色方案自定义视图——组合方式似乎无穷无尽。\n\
  \n如果你不喜欢鲜艳、大胆的颜色，那么柔和、单调的颜色也同样可行。许多流行的应用程序都在尝试使用更柔和的原色和二次色色调。无论如何，尝试通过你的配色方案来突破传统的颜色界限。\n\
  \n**提示** 尽量避免使用颜色概括，例如用粉色代表女性，用蓝色代表男性。\n\n### 设计图标\n\n由于扁平化设计缺乏真实感且强调内容本身，图标和插图变得越来越重要。图标在设计中用于向用户传达特定的信息。它们是你在应用程序中使用的视觉捷径，帮助用户导航。\n\
  \n虽然网上有大量的设计资源可以协助设计师处理图标，但有些设计师选择自己创作。图标可以为你的应用带来个性，并有助于用户理解应用中的 UI 元素。想一想苹果公司的图标，以及它们如何随着扁平化设计而演变。如果你自己设计图标，请记住用户已经将某些操作与操作系统中的特定图标关联起来，所以不必重新发明轮子。\n\
  \n当你决定创建自己的图标时，请记住以下一些指导原则：\n\n- 图标应该简洁明了。\n- 去掉那些会混淆用户的无关元素，只保留绝对必要的元素。\n- 图标应该直观：也就是说，用户只需看一眼就能理解图标背后的含义。如果用户必须与图标互动才能理解其意图，那么你的设计就未能完成其最重要的任务。\n\
  - 考虑应用的整体用途和目的。你的图标是否适合其主题？确保你的图标既适合它们想要传达的任务，也符合应用的整体目的。\n- 图标应始终绘制得尽可能清晰和简洁。人机界面指南\
  \ (HIG) 提供了关于图标如何缩放，以便在 Retina 屏幕上显示时不显得模糊的指导。\n- 图标应在具有不同屏幕分辨率的多种设备上保持一致。\n- 扁平化设计通常为图标使用简单的形状。它们要么是圆形、正方形或矩形；因此，如果你选择为图标采用一种形状，就应该坚持使用那种形状以保持一致。混合搭配图标形状肯定会让用户感到困惑和迷茫。参考\
  \ iOS 图标作为创建自己图标的一般指南总是一个好主意。\n\n**提示** 互联网上也有许多扁平化设计图标的资源。有可下载的图标包，其中一些是免费的，一些则需要支付少量费用。\n\
  \n### 利用空间和模板\n\n在设计 iOS 7 并考虑扁平化设计元素时，空间的使用是一个重要因素。在网页上，扁平化设计原则通常会留出大量空白空间，以遵循指导扁平化设计的“少即是多”原则。同样，在\
  \ iOS 7 中，空间的使用也很重要。尽管移动设备上的空间比桌面设备少，但你应该考虑空间的使用将如何在你应用运行的不同设备之间进行转换。\n\n为了开始设计扁平化风格的\
  \ iOS 7 应用，网上有许多免费下载的扁平化设计模板。搜索“iOS 7 GUI PSD 模板”以找到适合你需求的模板。iPhone 和 iPad 的模板都可用。这些模板包含了你入门所需的一切，至少可以用来尝试\
  \ UI 元素以及它们如何在你的应用中使用和定位。你也可以使用这些模板来创建线框图。\n\n你还可以在 Pinterest 等视觉网站找到设计灵感，看看其他设计师在做什么，或者你可以亲自投身于扁平化设计的世界。为了完全实现扁平化设计，每个应用程序中都需要改变一些基本元素。我们已经谈到了颜色空间和图标，现在让我们具体了解一下。\n\
  \n### 定义按钮\n\n按钮是每个应用界面中重要的组成部分。用户习惯于通过点击按钮来执行特定功能——通常就是按钮标签上写的功能。例如，图 3-1 中的按钮展示了左侧的传统设计按钮和右侧的扁平化设计按钮的示例。请注意左侧按钮去掉了投影和斜面效果，而右侧按钮强调了简洁性。\n\
  \n![9781430263647_Fig03-01.jpg](img/9781430263647_Fig03-01.jpg)\n\n图 3-1。带投影的旧式按钮与新的扁平风格按钮对比\n\
  \n旧式按钮明显呈现出拟物化设计中常见的三维质感。新式按钮则去掉了这种效果，用明显的二维效果取而代之。这是按钮在扁平化设计面前如何演变的典型例子。同时请注意，传统设计的按钮颜色和阴影通常更深，给人一种更厚重的外观和感觉。\n\
  \n\n\n### 在 iOS 7 中，按钮与表单设计的演变\n\n在 iOS 7 中，虽然按钮保持了扁平外观，但其视觉效果已做了微妙的改进以提升可用性。请注意\
  \ 图 3-2 和 图 3-3 中两个不同版本 iOS 7 的“电话”应用界面的变化：\n\n![9781430263647_Fig03-02.jpg](img/9781430263647_Fig03-02.jpg)\n\
  \n图 3-2. iOS 7 测试版 4。该版本的呼叫按钮延伸至屏幕边缘\n\n![9781430263647_Fig03-03.jpg](img/9781430263647_Fig03-03.jpg)\n\
  \n图 3-3. iOS 7 测试版 7。该版本的呼叫按钮采用了圆角设计\n\n尽管两种按钮处理方式都遵循了扁平设计原则，但测试版 4 的老版本并未提供任何轮廓或分界线来标示按钮的边界。而新方法则绘制了实际的按钮轮廓并添加了圆角。我见过使用这两种方法且效果出色的应用。但请记住，诸如此类的细微变化，可以为用户带来天壤之别的体验。\n\
  \n#### 简化表单\n\n另一个常被遗忘、且随扁平设计一同演进的 UI 元素是表单。移动应用中的表单常用于注册和登录。虽然用户通常只需登录一次，但过去的表单往往使用内阴影来表现深度和空间感。然而，现今的搜索字段已不再采用这类增强效果。在设计登录和注册字段的表单时，请保持窗口简洁，避免使用任何特效。通常，一条细边框线就能解决问题，但也可以尝试使用不同深浅的灰色或纯白色作为表单背景。图\
  \ 3-4 展示了 iTunes Store 的输入表单。请注意用户密码输入框的简洁设计。\n\n![9781430263647_Fig03-04.jpg](img/9781430263647_Fig03-04.jpg)\n\
  \n图 3-4. iOS 7 中的弹窗、通知和表单焕然一新\n\n#### 确定字体排印\n\n扁平设计中最重要的元素之一莫过于将在应用中使用的字体排印。由于扁平设计聚焦于字体排印，你需要找到一种能唤起你想要应用传达的整体感受和信息的字体。因为扁平设计简约而极简，你的字体也应如此，因此为你的应用最多选择两种字体系列。确保这些字体能互相补充。如果存在冲突，在整个应用中使用一种字体，并通过不同字重来传达不同含义也是可以的。线条和笔画清晰的字体在扁平设计风格中通常效果更好。为此，在移动应用和\
  \ Web 应用中使用扁平设计技术的设计师们，对无衬线字体情有独钟。我在图 3-5 中列出了一些流行的无衬线字体。\n\n![9781430263647_Fig03-05.jpg](img/9781430263647_Fig03-05.jpg)\n\
  \n图 3-5. 无衬线字体在扁平设计中很常见\n\n字体的颜色和字重也很重要，因此请考虑选择一种拥有多种字重的字体，以便能在整个应用中使用。你可能想为按钮和图标选择一种特定的字重，为行为召唤元素使用另一种，而正文文本则可能使用更轻的字重。\n\
  \n#### 评估可用性\n\n界面中的某些元素经历了细微的变化。虽然用户界面元素仍保持扁平外观，但这些元素已为可用性进行了精细调整。毫无疑问：可用性是从扁平设计转型的重要原因。设计界对于扁平设计究竟有多用户友好一直存在争议。一些批评者认为，尽管扁平设计美观且性能优越，但它有时会让用户感到困惑。诚然，剥离那些让按钮看起来像真正按钮的元素和效果，*确实可能*使用户感到些许迷茫。iOS\
  \ 7 在移除这些元素方面做得相当彻底。以标签栏中细微分隔线的移除为例。现在，屏幕底部的这些元素，过去是清晰分隔的，如今却仿佛悬浮在空中。（请参见上文中的图 4-6\
  \ 和图 4-7。）这正是设计师需要运用自身判断力，从可用性角度理解何谓合理之处。这些元素如何被解读，取决于你和你的用户。因此，如果你真心认为一个小小的阴影能帮助用户更好地与应用中的某个元素互动，那么请一定在扁平设计与拟物主义之间找到平衡，并添加那个阴影。没有必要过度使用。扁平设计讲究“少即是多”，你会发现，在一个原本可能因扁平设计而显得过度的应用中，添加微妙的拟物化暗示，反而能为用户找到完美的平衡点。\n\
  \n扁平设计之所以具有挑战性，是因为它本质上移除了所有帮助用户将屏幕上的内容与真实世界中的事物联系起来的元素。那些我们用来将虚拟世界翻译成物理世界的隐喻，正随着扁平设计而被移除。因此，原本是按钮的东西，现在只是背景上的一个扁平方块。我们作为设计师为影射光线和阴影等现实世界属性而创建的视觉线索已经被去除了。那么，还剩下什么？你的内容和用户。问题随之而来：我们如何还能向那些生活在三维世界却在一个二维结构内交互的用户提供这些线索？如果你选择全心拥抱完全的扁平设计方法来开发应用，那么当你思考用户将如何在你的应用内操作时，就必须考虑到这些现实情况。\n\
  \nApple 允许通过其他方式融合这个新的二维世界，例如添加视差效果和使用透明度等三维效果。这些功能，作为操作系统的核心原则之一，是设计师可用的工具库的一部分，用以增强其应用的整体体验和可用性。这些效果有助于为用户提供视觉线索。\n\
  \n### 总结\n\n在考虑应用的整体用户体验时，你必须进行战略性思考。因此，你关于设计方法以及需要深入探讨多远的每一个决策，都变成了战略性的决策。作为设计师，你的任务是在用户所见与其所感之间找到微妙的平衡。所有这一切都包含在你通过设计在应用中创造的世界里。扁平设计能帮助你实现这一目标吗？到了这一步，你应用的目的和你试图触及的受众应该已经非常清晰。毫无疑问，你将不得不在应用中使用扁平设计技术；问题只在于使用多少。\n\
  \n## 第 4 章：了解 iPhone 和 iPad 用户界面设计考量\n\n\n\n### 为 iPhone 和 iPad 进行设计\n\n为 iPhone\
  \ 和 iPad 进行设计需要清晰了解这两款设备的用户界面。两者之间存在相似之处，并且有明确的指南和文档遵循这些准则，以确保你的应用符合 Apple 制定的标准。然而，即便如此，你的设计中仍有足够的空间来发挥创意和独特性。虽然\
  \ Apple 在执行其设计指南和规则时可能显得严格，但总有实验的余地，并且他们鼓励在设计中（尤其是那些清晰体现出对 iOS 底层构建原则深刻理解的设计）进行尝试。\n\
  \n我们在上一章中介绍了标准 UI 元素，因此现在我们将进入如何熟悉设备用户界面的部分。开始熟悉 UI 的一个好方法是下载一个免费提供的 iOS GUI 工具包。GUI\
  \ 工具包适用于 iPhone 和 iPad，而且大部分都是免费的。Teehan & Lax 和 Applidium 都制作了适用于 iOS 6 和 7 的 PSD\
  \ 格式 GUI 工具包。\n\n一旦你下载了所选格式的 GUI，你将能够更详细地探索各种元素。将文件导入你选择的图形软件中；这样你就可以开始与它们交互。其中大部分工具包由设计师和设计工作室创建，旨在帮助设计社区，这样你在开始设计应用程序时就不必重复造轮子。\n\
  \n打开 GUI 后，仔细观察它们与实际设备上的显示效果相比如何。大多数元素都会包含一系列栏（如状态栏、标题栏、标签栏等），以及按钮、操作列表（图 4-1）、键盘和图标。你应该能够查看它们，甚至如果需要更仔细地检查，可以将其从\
  \ GUI 中移除。\n\n![9781430263647_Fig04-01.jpg](img/9781430263647_Fig04-01.jpg)\n\n\
  图 4-1. iOS 7 自带邮件应用中的操作列表\n\n**注意：** 操作列表是 iOS 中的一个菜单，为用户显示一组选项。这些选项通常与用户发起的某个任务相关。邮件应用中的操作列表如\
  \ 图 4-1 所示。\n\n熟悉每个用户界面元素，并开始思考每个元素将如何在你的应用中使用。\n\n-   你会使用哪些栏？\n-   你是否需要为菜单中的状态栏创建自定义图标？\n\
  -   你的应用会有独特的配色方案吗？\n-   你将如何向用户呈现关键信息？\n-   每个元素如何帮助用户在应用中的使用历程？\n\n花必要的时间熟悉 UI；之后，你就可以开始思考如何为用户定制体验。你不必按原样使用所有元素。对于应用的\
  \ UI，你有相当大的灵活性和创造力。但在迈出这一步之前，首先理解基础非常重要。这正是本章的目的。\n\n#### UI 中手势的使用\n\niOS 界面针对独特的多点触控体验进行了优化。因此，屏幕上的元素响应触摸或手势，而不是点击。因此，务必始终牢记，用户必须感觉仿佛在与内容直接互动。你的设计必须让用户体验沉浸式的应用互动。哪些元素能让他们做到这一点？用户通过使用特定的手势与\
  \ iOS 进行交互。这些手势不仅已成为 iOS 中的常见操作，也在其他多点触控平台和操作系统中普及；然而，其中一些手势是由 Apple 首创的。\n\n在讨论\
  \ iOS 的手势时，有两个重要概念需要考虑：前面提到的一致性和直接操纵。\n\n##### 手势的一致性\n\n在为应用考虑用户界面元素和适当的手势时，一致性是关键。请使用那些与既定最佳实践和用户期望一致的操作手势。如果用户向左滑动，期望面板或内容随之向左移动，但它却向右移动，那么你就在用户和界面之间造成了严重的脱节。用户将不得不花时间去理解你的应用中每个手势的含义，这会带来令人困惑的体验，尤其是在他们离开你的应用，与原生\
  \ iOS 应用或其他遵循既定规则的交互时。\n\n如果你的应用界面元素与 iOS 标准不一致，或者错误或不同地使用了系统级的控件、视图和图标，你应该考虑更改它们。否则，你的应用可能会被应用商店拒绝。\n\
  \n##### 手势的直接操纵\n\n直接操纵是手势控制的一个概念，指的是像对待真实物体一样与屏幕上的对象进行交互。因此，点击按钮就像在现实生活中按下按钮。拉动控制杆就像拉动真实的控制杆或滑块。iOS\
  \ 正是基于这一手势控制原则。它让用户感觉仿佛真的在操纵控件。这些直接操纵控件遍布 iOS 系统，现在用户应该已经熟悉了。例如主屏幕上的“滑动解锁”和邮件应用中的“下拉刷新”等操作，现在在其他应用中也已流行。用户会凭直觉执行这些操作，无需指示，并且在许多情况下，他们期望你的应用也能支持这些操作。这类手势之所以受用户欢迎，是因为操作和结果之间存在直接而即时的关联。用户会感觉仿佛真的在生活中执行了该操作。设计师和开发者应在用户明显会期望这些手势的应用场景中使用它们。不使用它们可能会让用户群体感到沮丧。\n\
  \n##### 抽象手势与反馈\n\n抽象命令和手势是指那些在操作与屏幕显示内容之间几乎没有或完全没有关联的手势。由于这些手势对用户来说并非立即可理解，因此它们需要用户进行一定程度的记忆。如果你必须使用抽象手势，请确保已在目标群体中进行过测试，以避免引入用户不熟悉的手势而疏远你的受众。用户需要记住你通过应用引入的新抽象手势，并学会将它们与特定操作关联起来，才能成功浏览和与你的应用互动。\n\
  \niOS 总体上很好地避免了抽象手势，但有些应用虽然本身并非抽象，却要求用户为新的操作记住新的手势，即使这些手势与屏幕显示的内容有直接关联。流行的邮件应用 Mailbox\
  \ 就是这样一个例子。使用过原生邮件应用的用户会发现，他们需要学习各种操作的新手势。例如，在 Mailbox 中，向右滑动可以归档一条消息，但向右长滑则会将消息放入废纸篓。向左滑动可以让用户稍后提醒一条消息，而向左长滑则会将消息添加到多个列表中。该应用使用彩色指示器作为视觉反馈，让用户知道他们正在执行什么操作，但这些手势需要一些时间适应——尤其是如果用户一直在使用标准邮件应用的话。幸运的是，应用的制作者提供了一个有帮助的教程，可以从应用的“帮助”部分轻松访问。Mailbox\
  \ 应用和 iOS 邮件应用的视图如 图 4-2 所示。\n\n![9781430263647_Fig04-02.jpg](img/9781430263647_Fig04-02.jpg)\n\
  \n\n\n#### 图 4-2. Mailbox 应用针对旧手势的操作\n\n反馈是另一个在 iOS 用户界面设计中非常重要的交互原则。反馈是一种机制，通过它用户的操作得到确认，并且用户能感知到该操作所对应的流程或结果正在实际发生（图\
  \ 4-3）。iOS 原生应用都包含一定的反馈元素。例如，在 Mail 应用中下拉刷新列表中的消息时，当应用连接服务器下载新消息时，会显示一个旋转的加载指示器。同样，启动应用更新过程时，会显示一个进度条，以便用户了解下载进度。如果操作不成功，应用通常会通过显示某种类型的消息来告知用户。对于任何给定的已启动操作，声音也可以作为强大的反馈指示器。再以\
  \ Mail 应用为例，“叮”的一声是服务器下载新邮件时的默认声音。虽然这些声音可以在设置中更改，但其中一些已成为 iOS 用户公认的标准。\n\n![9781430263647_Fig04-03.jpg](img/9781430263647_Fig04-03.jpg)\n\
  \n图 4-3. iOS7 中的 Mail 应用使用颜色作为特定任务的提示器\n\n#### iOS 中的手势\n\n所有 iOS 设备用户都会发现自己在不同时候会用到几种不同类型的手势。它们在所有\
  \ iOS 应用中都很常见，并且已成为多点触控术语中熟悉的一部分。这些手势对用户来说感觉“自然”，易于发现，并给人一种他们正在直接与屏幕上看到的内容进行交互的印象。它们包括：轻点、双击、轻扫和捏合等。此处列出的手势在\
  \ iOS 中很常见，代表了跨平台的多点触控设备和应用中公认的交互范式。\n\n##### 轻点\n\n轻点是等同于用户使用键盘或鼠标进行点击的多点触控操作。它允许用户选择屏幕上看到的控件或项目。\n\
  \n##### 双击\n\n双击允许用户放大并居中显示图像或内容。如果用户已经放大，则执行相反操作，结果将是缩小。\n\n##### 拖移或平移\n\n拖移是指使用一根或多根手指从一侧移动到另一侧。产生的效果是水平平移。\n\
  \n##### 轻拂\n\n轻拂是拖移的更快版本。当用户的手指在屏幕上快速向上或向下移动时，就会发生轻拂操作。\n\n##### 轻扫\n\n轻扫通常是在表格视图中显示删除按钮的操作。根据应用不同，它也用于将面板向左或向右移动。\n\
  \n#### 捏合\n\n捏合使用两根手指来创建缩放视图，用于使屏幕视图内的图像或内容变小或变大。用户可以捏合以放大，或反向操作以缩小。\n\n##### 触摸并按住\n\
  \n在可编辑的文本（例如消息或浏览器窗口的内容）中，触摸并按住会显示一个放大视图，并允许用户在文本中的任何位置定位光标以便于编辑。\n\n##### 摇晃\n\n\
  虽然这不是标准的手势或操作，但摇晃可以撤销或重做之前的某个操作。然而，创新的应用开发者最近以多种方式使用了摇晃手势，这些方式与重做或撤销操作关系不大。\n\n\
  #### 新的 iOS 手势\n\n新版本的 iOS 有时会引入新的手势，并且有传言称 iOS7 中也引入了新手势。如果你决定在应用中尝试使用更新的手势，你需要对潜在用户进行彻底测试，以确保新手势直观，并且用户通过使用它们能看到期望和预期的结果。苹果在引入新手势方面做得非常出色。在关于\
  \ iOS7 新手势的传闻中，我已确认了以下内容：\n\n##### 向上轻扫\n\n在任何屏幕上执行此操作都会显示控制中心。在与控制中心屏幕上的控件交互后，用户可以向下轻扫以显示其下方的页面。向上轻扫也用于从多任务切换器视图中退出或关闭一个活动的或打开的应用。在旧版本的\
  \ iOS 中，此操作以前并未与这种结果相关联。\n\n##### 向下轻扫\n\n在任何屏幕的顶部边缘执行此操作会显示通知中心，其中显示当天所有未清除的通知以及你可能错过的通知。向上轻扫会关闭通知面板。在主屏幕内从顶部向下轻扫会显示“聚焦搜索”。此前，“聚焦搜索”是通过在主屏幕的第一页向右轻扫来找到的。图\
  \ 4-4 展示了这一示例。\n\n![9781430263647_Fig04-04.jpg](img/9781430263647_Fig04-04.jpg)\n\
  \n图 4-4. 通过向下轻扫操作可访问通知栏和“聚焦搜索”\n\n##### 向右轻扫（在 Mail 应用中）\n\n在 Mail 应用中，当以完整视图（而非预览）查看消息时，向右轻扫会将用户带回到可滚动的表格视图，其中显示所有消息的列表视图和预览。\n\
  \n### iPad；有何不同？\n\niPad 于 2010 年 4 月 3 日发布，因其名称而获得了褒贬不一的评价以及一些嘲笑和玩笑。它标志着苹果进入了当时还算新颖的平板电脑领域。如今，市场上有几种不同类型的\
  \ iPad。第一代 iPad 已不再受支持，也无法运行 iOS7。出于本书的目的，我们将只关注仍受苹果支持且可在苹果商店购买的当前 iPad 型号。\n\n\
  人们很容易认为 iPad 只是 iPhone 的放大版。这种假设是不正确的。iPad 更像是一台电脑而非手机，并且人们与 iPad 交互的方式与 iPhone\
  \ 非常不同。设计师必须牢记这一点。然而，很容易理解为什么 iPad 被认为只是一个超大号的 iPhone；它的外观几乎与 iPhone 一模一样。但是，iPhone\
  \ 是完全不同于 iPad 的设备。使用 iPad 的用户通常也有一部 iPhone，但他们对使用 iPad 的期望是不同的。作为有史以来最畅销的平板电脑，iPad\
  \ 拥有广泛且多样化的用户群体。根据分析公司 Flurry 最近的一项研究，其用户群体涵盖了儿童、母亲、家居设计爱好者和小企业主等。因此，与其他任何应用一样，你的\
  \ iPad 应用必须针对特定的用户群体进行设计。\n\n电子商务也是 iPad 市场的重要组成部分。在在线购物和流量产生方面，iPad 主导着平板电脑市场。考虑到这一点，不仅了解人们用\
  \ iPad 做什么很重要，了解他们*如何*做同样重要。\n\n就其设备类别而言，iPad 介于手机和电脑之间；它也介于 iPhone 和 Mac 之间，旨在让用户能够做比仅使用\
  \ iPhone 更多的事情。人们对 iPad 能力的期望随着每次新版本的发布而增长。目前，市场上有三种不同的 iPad。它们分别是：\n\n\n\n### iPad\
  \ 系列概览\n\n- **iPad Mini**：`iPad Mini` 是 iPad 家族的最新成员，于 2012 年 11 月发布。它是 iPad 的缩小版，旨在吸引更倾向于使用\
  \ Kindle 和 Nook 等阅读器的用户。\n- **iPad 2**：`iPad 2` 于 2011 年 3 月发布。该版本比第一代原始 iPad 更轻、更薄。与\
  \ `iPad Mini` 和 Retina 版本不同，`iPad 2` 仍使用旧的 30 针连接器。它也是首款配备双面摄像头的 iPad。\n- **iPad\
  \ Retina**：该版本分别于 2012 年 3 月和 10 月发布；第三代和第四代 iPad 非常相似。`iPad 4 Retina` 使用了新的 Lightning\
  \ 连接器。它还引入了更新、更快的处理器，用于从互联网下载内容和处理图形。`iPad 3` 已停产。\n\n目前，当设计师提交 iPad 应用时，必须经过测试并在所有\
  \ iPad 上表现出最佳性能。配备 Retina 屏幕的 iPad 像素密度高，能使设计精良的应用看起来惊艳。不幸的是，它也会凸显低质量或低分辨率设计的瑕疵。据信，未来*所有*\
  \ iOS 应用提交都必须包含针对 Retina 以及低分辨率支持设备的资源。\n\n### iPad 与 iPhone 的设计差异\n\n那么，iPad 到底有何不同？首先，它比\
  \ iPhone 更大，为多点触控交互提供了更多空间，也为额外的设计元素留出了余地。此外，用户与 iPad 的交互方式也与 iPhone 不同。iPhone 用户是移动的，他们需要借助设备来应对繁忙的生活方式。而\
  \ iPad 用户通常是在教室、沙发或“后仰式”场景中使用设备。在设计 iPad 应用时，请考虑以下几点：\n\n- 用户与你的应用交互时，会如何持握设备？\n\
  - 你的应用在竖屏和横屏模式下都能正常工作吗？\n- 哪种屏幕方向更适合与应用相关的任务？\n- 用户在使用你的应用时，可能正在做什么？\n- 他们处于怎样的环境中？这又如何影响他们对设备的使用？\n\
  \n这些因素在你开始设计 iPad 应用时都很重要。iPad 提供给设计师的额外空间应被明智地利用。不要用不必要的、无价值的元素填充它，这些元素不会给用户或应用的整体体验增加价值。应添加能够增强用户对你所创建空间和环境理解的\
  \ UI 元素。\n\nApple 为 iPad 设计制定的指南与 iPhone 类似；关于内容、可用性和上下文的相同原则仍然适用。确定哪些功能是绝对必要的，并为你用户提供这些功能。使用用户画像来思考你的用户是谁，以及每个画像将如何与应用交互。每个画像可能有不同的需求。确保用户所需的功能在任何时候都易于访问。如果用户必须费力寻找他们觉得应该显而易见的东西，就会导致糟糕的用户体验，甚至可能带来差评。\n\
  \n> **注意**：用户画像是一个虚构角色，代表着具有特定特征和行为子集的用户群体。用户画有助于验证设计和用户体验。\n\n### iPad 特有的 UI 元素\n\
  \n尽管大多数导航项相同，但 iPad 确实拥有一些 iPhone 不可用的 UI 元素，例如弹出视图和分屏视图。\n\n#### 弹出视图\n\n弹出视图是一种呈现在现有屏幕内容之上的视图。它通常有一个指向或箭头来指示用户它从何处出现，并且应覆盖其背后的内容，使用户能够专注于其内部的内容。弹出视图中可以放置多种不同类型的信息和\
  \ UI 元素。它可以包含带有列表的表格视图、以操作列表形式显示给用户的额外选项，或者分屏视图中左侧面板的内容。Apple 对如何使用弹出视图有具体说明，因此请务必阅读《人机界面指南》以获取使用说明。\n\
  \n虽然允许在弹出视图中使用标准 UI 控件，但绝*不能*添加“关闭”或“退出”按钮。关闭弹出视图应遵循现有的 iOS 范式，即当用户点击其外部或屏幕上的任意其他地方时消失。关闭或退出按钮是常见的\
  \ Web 范式，在 iOS 中不存在。此外，虽然没有高度限制，但有 320–600 点的宽度限制。这取决于你在设计中显示的信息。图 4-5 显示了两种不同长度的弹出视图。\n\
  \n![9781430263647_Fig04-05a.jpg](img/9781430263647_Fig04-05a.jpg) ![9781430263647_Fig04-05b.jpg](img/9781430263647_Fig04-05b.jpg)\n\
  \n*图 4-5. 来自 iOS 6 和 iOS 7 的 iPad 弹出视图*\n\n寻找巧妙新颖的方式来展示弹出视图是允许的。要跳出框框思考，但始终将用户体验放在首位。\n\
  \n#### 分屏视图\n\n分屏视图是指屏幕被分成两个并排的独立面板。在空间上，左侧面板始终比右侧面板窄。Apple 将右侧面板的宽度留给设计师决定，但建议最小宽度为\
  \ 320 点。从视觉上看，右侧面板较大而左侧面板较小更为平衡。思考两个面板之间的关系，以及你希望在每个面板中呈现什么信息。通常两者之间存在关联，需要仔细思考和规划，来决定你希望用户如何从上下文关联信息，以及你将如何呈现这些信息。\n\
  \n左侧面板通常被称为主面板，右侧面板被称为详细面板。这应为你如何呈现 UI 元素和信息提供一些思路。然而，这种关系并非严格强制，更多地是指向一种用户可能已习惯的惯例，而非\
  \ Apple 强制执行的规范。在 iOS 7 中，分屏视图屏幕可以在竖屏或横屏模式下访问。图 4-6 显示了竖屏模式下的分屏视图。\n\n![9781430263647_Fig04-06.jpg](img/9781430263647_Fig04-06.jpg)\n\
  \n*图 4-6. iOS 7 中竖屏方向的分屏视图屏幕*\n\n### 视觉上下文\n\n由于 iPad 拥有额外的屏幕空间，人们可能会忍不住简单地拉伸和拉长\
  \ iPhone 设计来创建 iPad 应用。这样做将是一个错误。iPad 的增加的空间意味着设计师确实有更多空间来……设计。菜单应该是上下文相关的。也就是说，它们应靠近其所关联的内容。让用户到右侧去编辑左侧的内容会让人迷失方向。诸如弹出视图之类的工具应在需要时使用，并在它们帮助用户完成特定任务时使用。\n\
  \n尽量不要在屏幕底部或标签栏中堆叠过多项目。iPad 的尺寸使得屏幕底部根据用户持握设备的方式成为一个容易被忽视的区域。使用弹出视图和分屏视图等额外元素来为内容提供上下文。\n\
  \n\n\n### iPad 应用设计指南\n\n`iPad` 的尺寸使其相比 `iPhone` 有一个显著优势：用户可以用双手与内容进行交互。其键盘几乎与普通电脑键盘大小相当，对于那些仍觉得它太小或不够舒适的用户，制造商们已迅速推出大量可轻松连接\
  \ `iPad` 的外设。这意味着用户与应用程序中的内容进行交互的方式和机会都增加了。请利用这一机会，将用户吸引到你的应用中，以获得更沉浸式的体验。\n\n在设计应用时，请考虑屏幕方向以及用户将如何与你的应用和屏幕内容进行交互。例如，你的应用是否仅在横屏模式下能更好地呈现信息？或者用户能否在竖屏和横屏之间自由切换而不迷失方向？创建仅支持竖屏或仅支持横屏的应用是完全可行的。\n\
  \n#### 屏幕触控目标\n\n由于使用 `iPad` 的用户年龄和体型各不相同，建议将触控目标设计得足够大，以适应甚至最大的手指和拇指。没有什么比在大屏幕上试图点击一个微小的目标更糟糕的了。同时，请确保触控目标清晰可见。得益于其尺寸，`iPad`\
  \ 鼓励用户充分拥抱多点触控的各个方面，他们更倾向于探索界面。因此，让触控目标既明显又足够大，有助于用户在应用中导航。\n\n#### 屏幕分辨率\n\n由于第一代\
  \ `iPad` 已停产且不再受支持，在设计 `iPad` 应用时，需牢记一些重要的分辨率差异。目前消费者可用的 `iPad` 包括 `iPad 2` 和 `iPad\
  \ Retina`。`iPad 2` 和 `iPad Retina` 拥有相同的屏幕尺寸（`9.5in. x 7.31in.`），但分辨率不同。`iPad 2`\
  \ 的分辨率为 `1024 x 768`，每英寸像素（`ppi`）为 `132`；而 `iPad Retina` 的分辨率为 `2048 x 1536`，每英寸像素（`ppi`）为\
  \ `2048 x 1536`。这相当于 `iPad 2` 分辨率的两倍。\n\n- `iPad Retina` 显示屏的分辨率为 `2048x1496px`（横屏方向）\n\
  - 非 `Retina` 显示屏的分辨率为 `1024x748px`（横屏方向）\n\n如果你计划为 `iOS`（`iPad` 或 `iPhone`）进行设计，`72\
  \ DPI` 即可，因为 `DPI` 更多是一个印刷术语。请记住，最佳实践始终是为 `Retina` 设计，然后将其缩放至 `50%` 用于非 `Retina`\
  \ 设备。\n\nFigure 4-7 中的图表列出了所有设备的各种分辨率，并已针对 `iOS 7` 进行了优化。\n\n![9781430263647_Fig04-07.jpg](img/9781430263647_Fig04-07.jpg)\n\
  \nFigure 4-7. 图表显示了 `iPad` 设备的分辨率列表\n\n`iPad mini` 的屏幕较小，尺寸为 `7.87in. x 5.3in.`，分辨率为\
  \ `1024x768 ppi`。然而，设计师不应认为为 `iPad mini` 设计与为常规尺寸 `iPad` 设计完全相同。`iPad mini` 不仅尺寸更小，重量也更轻。这意味着用户与设备的交互方式将与大型\
  \ `iPad` 有很大不同。由于其尺寸，用户可能会倾向于单手使用设备。请思考这对应用的用户界面意味着什么。以下是一些需要自我审视的问题：\n\n- 设备的尺寸将如何影响应用的整体体验？\n\
  - 应用的用户界面是否需要针对不同设备而不同？还是单一布局就足够了？\n- 与 `iPad mini` 同类的设备包括 `Nook` 和 `Kindle` 等，这些设备主要用作阅读设备，而非生产力工具。知道你的应用将面向\
  \ `iPad mini` 用户后，这将如何改变应用的行为？\n\n#### 通用应用\n\n通用应用是指同时针对 `iPad` 和 `iPod` 进行优化的应用。它就像一个应用包含了两个应用。两个平台的资源都包含在同一个应用包中。编程上，应用会检测当前激活的是哪个平台，并相应地提供合适的资源。苹果建议开发者创建通用应用，这样便于在\
  \ `App Store` 中进行管理。但从设计角度来看，仍然需要两套设计和资源，本质上这相当于创建两个独立的应用。\n\n#### 图标\n\n`iPad`\
  \ 上所有元素都更大的原则同样适用于图标。`iOS` 有多种不同的图标，它们的使用方式各不相同，以便用户在 `App Store` 和不同设备上识别你的应用。`Retina`\
  \ 显示屏的图标会显示更多细节，因此请确保为 `Retina` 正确调整图标大小。\n\n##### 应用图标\n\n应用图标是用户在设备上和 `App Store`\
  \ 中识别你应用的视觉标识。用户不仅会通过图标视觉上识别你的应用，还会与之交互，因为他们必须点击它才能启动应用。应用图标是重要的品牌元素。如果你正在创建通用应用，则需要创建多个版本的应用图标，并将其包含在应用包中。`iPad`\
  \ 的图标尺寸如下：\n\n- `72 x 72 px`\n- `144 x 144`（高分辨率）\n\n请记住，所有应用图标都必须具有 `90` 度直角，无圆角，无投影或特效，无光泽或高光，且无\
  \ `alpha` 透明通道。随着 `iOS7` 的即将发布，这一点尤为重要。我将在第 8 章中更详细地讨论图标。Figure 4-8 中的图表显示了苹果人机界面指南中推荐的所有\
  \ `iOS` 图标尺寸。\n\n![9781430263647_Fig04-08.jpg](img/9781430263647_Fig04-08.jpg)\n\
  \nFigure 4-8. 图表显示了所有 `iOS` 图标的推荐尺寸\n\n### 启动图像\n\n`iPad` 的启动图像不应包含每个地区的状态栏，但应为每个方向提供一个启动图像。因此：\n\
  \n- 竖屏：\n  - `768 x 1004 px`（非 `Retina`）\n  - `1536 x 2008 px`（`Retina`）\n- 横屏：\n\
  \  - `1024 x 748 px`（非 `Retina`）\n  - `2048 x 1496 px`（`Retina`）\n\n请记住，在高分辨率 `PNG`\
  \ 文件名后添加 `@2x`。我们将在第 9 章中更详细地讨论文件命名规范。\n\n#### iPad 专属手势\n\n部分由于其尺寸，`iPad` 拥有一套专属的多点触控手势。花些时间理解这些设备专属手势，将大大有助于理解用户与\
  \ `iPad` 的交互方式与 `iPhone` 有何不同，以及 `iPad` 的额外屏幕空间如何让用户在交互和多点触控、多指操作方面有更多作为。这些手势也突显了\
  \ `iPad` 是一款真正的生产力工具，用户期望用它做更多事情。因此，这些手势主要围绕使用户能够同时导航和切换多个应用。\n\n要使用这些手势，用户必须在“设置”![arrow.jpg](img/arrow.jpg)“通用”菜单中启用`“多任务手势”`模式。这里启用的手势是独特的，因为它们需要多个手指才能触发。\n\
  \n如果你仍在使用 `iPad` 上的 `iOS6`，下面提到的手势仍然有效，但有些会产生不同的结果。例如，四指或五指向上滑动会显示多任务栏，显示当前打开的应用。然而，`iOS6`\
  \ 中的多任务栏与 `iOS7` 中的不同。\n\n##### 滑动\n\n从左向右或从右向左的四指滑动将允许用户循环浏览 `iPad` 上当前打开的不同应用。要使此操作生效，你必须至少打开两个应用。\n\
  \n四指垂直滑动\n\n\n\n#### 排版后的文本\n\n从 iPad 的任意主屏幕，用四指快速向上滑动即可显示多任务栏，其中列出了所有当前打开的应用程序。您可以在\
  \ iOS7 的图 4-9 中看到四指滑动的效果。\n\n![9781430263647_Fig04-09.jpg](img/9781430263647_Fig04-09.jpg)\n\
  \n图 4-9. iOS7 中通过四指滑动显示的 iPad 多任务栏\n\n#### 捏合\n\n用四指捏合屏幕将立即将用户带回主屏幕。\n\n### 总结\n\
  \n虽然 iOS 设备的界面相似，但 iPad 和 iPhone 有不同的要求。如果您正在设计一个能够在所有 iOS 设备上运行的通用应用程序，您还需要考虑每个新设备。在设计应用程序时，必须考虑方向、交互和视觉上下文，以确保用户获得最佳体验。由于手势是用户与\
  \ iOS 交互的方式，了解可以使用哪些手势至关重要。您的设计需要充分利用 iOS 用户已经熟悉的手势；如果您引入新手势，请确保对其进行说明，因为用户需要将它们与应用程序中的新任务关联起来。\n\
  \n"
- '# 第 5 章 移动设计模式


  作为开发者，你们中的大多数人已经熟悉“设计模式”这个术语。对于开发者来说，设计模式指的是可以通过使用特定抽象解决方案来解决的特定软件或编程问题。然而，就本书的目的而言，我们将讨论与应用程序的设计和用户界面特别相关的设计模式。设计模式是解决常见设计问题的有用方法。它们是针对移动设计中遇到的挑战的有用且被普遍接受的
  UI 解决方案。随着移动技术的发展，涌现出越来越多的模式来帮助设计师应对常见的设计挑战。在设计应用程序时，您无疑会遇到其中一些挑战。了解其他设计师如何找到独特且有时创新的解决方案来解决这些挑战，将有助于您设计应用程序，使您能够专注于功能，而不是重复发明轮子。由于移动设计模式是用户熟悉的被接受的**最佳实践**解决方案，您可以将其应用于您的应用程序，而无需过多担心用户是否熟悉它们。


  在本章中，我们将介绍一些最流行的移动设计模式，并分解在实现它们时可以使用（或不使用）的元素。与所有设计元素一样，用户必须是焦点。如果一个模式不能让用户的生活更轻松，那么最好不要使用它。但请记住，您也可以根据自己的需要编辑和更改模式。因此，可以在您的应用程序中使用公认的设计模式并进行创新。使用设计模式可以将基本工具交到您手中，并让您能够为应对设计挑战建立一个起点。通过观察其他流行应用程序如何处理这种模式，将有助于您更好地了解如何在自己的应用程序中处理它。由于设计模式在移动生态系统中被普遍使用，它们通常被认为是平台无关的。因此，虽然本书以
  iOS 设计为重点，但您会看到这些模式被用于原生应用和 Web 应用。这通常被认为是一件好事，因为模式使用得越广泛，所有用户都熟悉它的可能性就越大。从可用性的角度来看，这是一件好事。


  有许多设计模式可供您使用，但在本章中，我们仅探讨那些流行且可能有帮助的模式。


  **提示** 如果您对设计模式更感兴趣，建议购买一本专门讨论设计模式的书籍。在书中，您很可能会找到比此处列出的更详尽的列表。


  ### 注册与登录/注册表单


  注册和注册表单通常是用户与您的应用程序的第一次接触。您的总体目标应该是让用户以最少的麻烦进入您的应用。保持登录和注册页面简洁，并使用与您应用程序的整体品牌形象和感觉相协调的颜色元素。即使这个页面主要是一个字段，您仍然可以赋予表单个性。有一点要记住：为用户提供登录选项。一些应用程序因为将
  Facebook、Twitter 或其他社交媒体应用程序作为访问其应用的唯一方式而遭到了强烈的反对。请记住，某些用户可能不想将他们的社交媒体网络连接到您的应用，因此请提供其他选项，例如电子邮件；或者更好的是，借此机会向用户解释为什么您将社交媒体连接设置为唯一选项。


  要牢记用户的隐私，只询问您绝对需要的信息。例如，如果您的应用程序是一个短信或 SMS 消息应用程序，您可能需要询问用户的电话号码。如果您的应用程序不需要这些信息，就跳过它。添加弹出窗口来解释每个必填项为什么是必需的以及它将如何使用，也是一个好主意。


  您的注册或登录表单页面还应该包含一个引人注目的**行动号召按钮**。当然，“注册”或“报名”是标准标签，但这可以提供一个有趣的机会向客户展示您的创造力。垂直标签（略高于相应的表单字段）曾经很流行，但最近，尤其是随着应用程序为
  iOS7 更新，它们已被直接放置在字段内的文本所取代。这对用户来说更容易，并且消除了屏幕上其他地方说明性文字的需要。


  除非绝对必要，否则请将登录或注册过程限制在一个屏幕内，就像图 5-1 中的简单线框图所示的那样。移动用户是出了名的不耐烦，而且每个人都越来越注重隐私。因此，多页注册会适得其反；请保持简短，让用户尽可能简单地注册您的应用。


  ![9781430263647_Fig05-01.jpg](img/9781430263647_Fig05-01.jpg)


  图 5-1. 设计模式中的简单登录或注册


  ### 应用导航


  用户注册或报名使用您的应用程序后，他或她需要在应用程序中进行导航。这将是用户在应用中移动的主要方式。如果您做得很好，应用程序的导航不应该让用户猜测下一步该做什么；他们对应用的导航应该是直观且自然的。虽然注册和登录模式相对直接，但导航提供了更多选项，具体取决于应用的核心功能和目的。如果您探索过其他应用以寻求灵感，您会发现移动应用的导航方式几乎数不胜数。有些模式适用于特定应用，而另一些则随着
  iOS 的发展而演变。下面列出了一些更流行的模式，如注册、主屏幕和图片库，但也有像滑出式导航这样的新模式不断涌现。iOS 仍然相对较新，随着设计师开始突破设计的界限，预计会有新的模式出现。因此，如果您的应用是一个社交媒体应用，用户将在特定的层级结构或好友与信息流中移动，您可能希望坚持使用流行应用中已有的设计模式。用户已经熟悉这些模式，并期望您遵循它们。


  #### 主屏幕或主屏幕模式




  #### Springboard 模式


  在应用内导航最常用的设计模式之一便是 Springboard 模式。Springboard 是主页上由图标组成的网格，它能直观地让用户熟悉应用中所有的内容。它为用户从一个页面提供了应用中所有内容的高层级概览。Springboard
  将是用户在加载应用并注册或登录后看到的第一个页面。它能让用户熟悉应用中的所有内容，并为他们提供情境。


  你可以将 Springboard 页面视为一个用户会反复返回的主页，以便访问应用的其他区域。因此，你选择在 Springboard 上包含的信息至关重要。需要注意的是，Springboard
  上可包含的图标数量限制在九个左右（取决于布局），因此，如果你要展示多个页面，请确保你的用户知道如何访问它们。


  尽管我们特别提到了 iOS，但值得注意的是，Springboard 被认为是一种跨平台的导航方法，因为它可以轻松适配多种不同类型的设备和操作系统。图 5-2 展示了一个简单的
  Springboard 模型示例。


  ![9781430263647_Fig05-02.jpg](img/9781430263647_Fig05-02.jpg)


  图 5-2. Springboard 设计模式的简单线框图


  Springboard 设计模式有多种变体——这意味着，即使上面的模型展示的是网格布局，你也可以自由地自定义布局，使其与应用的外观和感觉保持一致。


  抓住机会在 Springboard 的图标上发挥创意。图标将为你的用户提供上下文，因为每个图标将直观地代表应用内的一个独立功能。Springboard 是一种简单的方式，可以在一页上为用户提供大量信息，并且这将是用户首次接触到你应用的视觉语言。


  有时 Springboard 可能不遵循常见的网格布局，图标可能比标准的九个图标布局更大或更小。确定最适合你用户的方式，以及与应用风格最匹配的方式，来为你自己确定最佳的
  Springboard 布局。同样必须指出的是，随着更新、更具创新性的主屏幕模式的出现，用以展示主屏幕上的各种选项，Springboard 模式可能被视为有些过时了。


  许多新闻应用，例如 CNN 和 TED，都采用了首页模式。其特点是在顶部有一个大面板，下方是列表视图，这是一种在应用主页上展示新闻的流行方式。


  ### 列表与表视图模式


  另一种流行的移动导航方式是将所有内容放在一个列表菜单中。列表菜单非常适合拥有大量类别和内容的应用程序。它将显示在表视图中。列表菜单非常适合移动应用的部分原因在于，可滚动的列表易于用拇指或两根手指上下滑动。因此，就导航和可用性而言，列表菜单是赢家。列表菜单可以像
  Springboard 菜单一样包含图标，这样用户也能在视觉上与应用的內容产生关联。


  在 iOS 移动设备的界面中，列表菜单模式有多种变体。


  你可以通过更改颜色或添加图像与图标来增强和自定义列表。但要注意不要做得太过，以免让用户迷失方向。


  #### 表格


  对于将展示大量数据的应用来说，表格是一种绝佳的信息展示方式。许多企业、生产力、银行和金融工具可能需要大量使用表格，因为它们需要以清晰易读且易于排序的方式列出信息。在设计应用时，你可以使用多种不同的表格。如果你要展示大量数据，并需要一种方法来区分它们，可以尝试更改颜色或在它们之间添加细微的差异。这将有助于用户在筛选所呈现的信息时保持清晰。


  在为 iOS 设计时，可以将表格视为表视图的另一种说法。人机界面指南中明确概述了这个元素。


  你可以对表格进行调整，使数据更易于用户接受。行和列的大小可以调整，你还可以考虑尝试使用字体大小来为用户分隔特定信息。例如，考虑使用标题和对行进行分组，以便于导航。


  你还可以考虑进行视觉增强，例如添加图标以使表格中的数据更突出。最好不要在一个表格中使用太多不同的颜色，因此，与所有设计一样，保持你的表格配色方案与整体品牌一致。但是，如果你的应用属于特定类别，则应使用公认的最佳实践，例如在金融或资金管理应用中，用绿色表示正向现金流，红色表示负向现金流。用户会非常熟悉这些视觉元素，这将有助于提升应用的整体可用性。


  对于信息量大的表格，固定列的设计模式会很有帮助。这种模式允许用户冻结左侧或右侧的单列，而其他列保持流动。用户随后可以根据需要随意调整和筛选信息。


  #### 标签栏


  你也可以选择为 iOS 应用添加标签栏导航。在 iOS 设备上，标签栏位于屏幕和设备的底部，但一些富有创意的设计师也设法将标签栏放在屏幕顶部。你可以在 iOS
  应用中自定义标签栏，但具体细节请参考人机界面指南。例如，iPhone/iPod 的标签栏中只允许放置五个按钮。可以有更多按钮，但只是不会显示出来。iOS 会自动添加一个`更多`按钮，用户可以通过它访问其他按钮。从可用性的角度来看，用户在使用手机等小型设备时，用拇指就能轻松访问标签栏。


  标签栏中的每个按钮都可以引用一个完全不同的视图，这些视图与应用中各种类型的信息相关。标签栏导航的便利性使得用户可以非常轻松地在它们之间来回切换，几乎不费什么力气。通过添加标签栏，用户将能够从一个页面高层面地了解应用的所有不同类别。


  标签栏中的每个按钮通常都包含一个图标和一个标签，如 图 5-3 中的线框图所示。图标是传达信息的好方法；但由于标签栏中的图标彼此靠近，因此最好确保它们在视觉上对用户保持一致。如果一个按钮是以特定风格绘制或插图的，那么请确保所有其他按钮也都遵循相同的风格。你的用户会期待这一点。


  ![9781430263647_Fig05-03.jpg](img/9781430263647_Fig05-03.jpg)


  图 5-3. iOS 中的标签栏




  #### 标签栏按钮


  标签栏按钮必须具有不同的状态，这有助于用户理解何时激活了按钮并进入了该部分的视图。即使在 iOS 7 新的“浮动”标签栏中，你也需要像对待所有按钮一样，向用户提供反馈和视觉提示，以便他们知道栏中的按钮何时被激活。对于标签栏，这可以通过编程实现。


  ### 侧滑导航


  最近，一种称为**侧滑导航**的新型移动设计模式已经出现。像 Facebook、iOS 版 Gmail 和 Path 等流行应用已使这种设计模式成为一种新标准。Facebook
  在其原始 iOS 应用的重设计版本中引入了这种新模式，并迅速被其他应用采用。它由一个通过将主内容区域向右滑动而揭示的面板组成。然后，该主面板区域会揭示其下方的一个新列表视图，用户可以通过浏览该视图获取额外内容和视图。


  侧滑导航可以通过点击应用左上角的列表按钮来显示或激活，然后通过再次点击同一按钮或用户向左或向右滑动来关闭。在某些应用中，如 iPhone 版 Gmail，该面板通过一个返回按钮启动。这对用户来说可能会造成混淆，因此最好坚持使用广泛使用的列表或菜单按钮。这个按钮通常以三或四条水平线为特征，有点像表格视图。请注意，当菜单按钮被激活时，面板和按钮都必须向右滑动并保持部分可见，以便用户在需要时能够快速撤销该操作。然而，点击新菜单中的某个项目将显示与该菜单项相关的内容，面板将完全消失以显示与该项目对应的内容。再次点击菜单按钮将重新显示面板。


  侧滑导航解决方案并非适用于所有应用，因此请考虑其用途。如果你的应用内容丰富，那么这种导航方式适合你。即便如此，它也被认为是次要的导航解决方案。因此，更重要的元素应放在应用层级结构的顶层视图中，以便用户轻松访问。但它是让用户随心所欲地在不同内容间跳转的好工具。


  一些新应用，如 Jawbone 的 `UP` 应用，甚至更进一步，在屏幕的左右两侧都设置了侧滑导航。使用此功能的应用通常内容丰富，因此双面侧滑导航是细分应用内容和功能的好方法。如果你使用双面侧滑导航，请确保内容按上下文分组，以便用户知道每个面板上都有什么。


  ### 图片库


  图片库导航非常适合将内容分段并以视觉方式呈现，通常使用照片作为新闻故事和其他经常更新或频繁变化的内容的代表。图片库模式允许用户通过图片进行视觉浏览，并使用图像代替图标。通过滚动浏览图片可以轻松导航图片库。对于内容丰富的应用，图片库是一种简单、便捷且引人入胜的浏览方式。像
  Instagram 和 500px 这样的流行图片应用使用这种模式让用户快速浏览视觉内容。


  ### 搜索与排序


  如果你的应用提供搜索或排序功能，根据应用的类型，它很可能成为应用最重要的方面之一。iOS 在其多个自带应用中提供了搜索功能。电话和短信应用如图 5-4 所示。在你的应用中复制这些搜索模式是个好主意，因为用户已经熟悉它们的工作方式。即使对你来说显而易见，也要确保搜索字段有标签，要么使用“搜索”字样，要么使用熟悉的搜索图标（通常是放大镜）。如果用户需要找到搜索功能，他们不希望费尽周折。使其易于识别将有所帮助。


  ![9781430263647_Fig05-04.jpg](img/9781430263647_Fig05-04.jpg)


  图 5-4. 电话应用的搜索功能


  iOS 7 现在允许用户直接从主屏幕搜索他们的设备。启动后，用户可以开始输入查询，搜索结果会显示在下方。无论用户是否输入了查询，这个 `Spotlight` 搜索功能都在搜索字段右侧显示一个取消按钮。然而，在邮件应用中，搜索栏在任何邮箱内都是持久存在的。取消按钮仅在用户开始输入查询时出现。这两种模式都是可以接受的。但自然，如果你的应用是电子邮件应用，我会建议紧密遵循邮件模式，以避免用户为你的应用特意重新学习如何执行此任务。


  关于其他一些与搜索相关的模式，在我看来相当明显，但我还是在这里提一下。甚至在用户输入时动态列出结果是一个不错的细节，以及在必要时对结果进行分段，以便用户可以轻松浏览他们需要的内容。这在
  iOS 7 的 `Spotlight` 搜索中处理得很好。搜索结果直接列在搜索框下方，并以字母顺序向用户显示结果在设备上的位置。因此，搜索“seri”将得到事件、邮件、短信以及任何其他包含匹配词条的结果，如图
  5-5 所示。


  ![9781430263647_Fig05-05.jpg](img/9781430263647_Fig05-05.jpg)


  图 5-5. `Spotlight` 搜索和邮件应用中的搜索功能略有不同


  排序通常在完成搜索查询并显示结果后进行。根据结果的不同，有一些巧妙的方法可以用来让用户对搜索结果进行排序。对于大型结果数据集，用户可能需要对结果进行比初始查询更进一步的排序。将结果分段成块可以让用户进一步筛选他们的初始查询结果。如果你选择这条路，仔细命名各个分段以避免混淆用户非常重要。例如，你可能正在开发一个基于位置的应用，向用户展示最近供应汉堡包的餐馆。如果你正在为用户展示此类商业查询的基于位置的结果，并且你的位置区域汉堡连锁店众多，产生大量商家，你可能希望进一步细分结果，允许用户对附近结果（在一定半径内）进行排序，而不是一个巨大的列表。因此，进一步细分这些结果的一个可接受方式是按
  5 英里半径分组。这样用户就可以查看 5 英里、10 英里、15 英里半径范围内的商家，以此类推。


  ### 提示、导览与引导教程




  如果您的应用具有独特的用户界面或功能，而用户可能不完全直观，您可以添加提示或导览，引导用户了解应用中不太直观的部分。导览将逐步引导用户完成特定操作，而提示则为用户可能不熟悉的特定功能添加上下文。在这两种情况下，这些模式通常发生在用户首次与您的应用交互时。然而，有些应用也会在应用内提供提示或导览，以便用户熟悉那些可能难以掌握的功能。


  提示和导览属于帮助设计模式。虽然此类别中还有其他模式，但本书将重点介绍这两种。


  提示可以在应用中广泛使用，几乎可以放在任何屏幕上。如果您的应用有一个您希望引起注意的功能，提示是一种非侵入性的方式。到目前为止，用户已经习惯了提示及其工作方式。提示可以通过按钮或用户屏幕上的其他热点触发。如果提示包含在弹出视图中，那么点击提示弹出视图之外的屏幕任意位置应使其消失。如果您使用标准弹出视图元素，您需要将提示放置在您所引用的功能附近。最后，保持提示中的文案简洁。包含详细说明的提示可能会让用户感到不知所措，因此请保持说明简短且切中要点。图
  5-6 展示了如何创建一个信息量适中的提示，以免让用户感到不知所措。


  ![9781430263647_Fig05-06.jpg](img/9781430263647_Fig05-06.jpg)


  图 5-6。如果使用弹出视图作为提示，请确保提示遵循弹出视图的使用规则，并且包含恰到好处的信息量。


  导览或逐步指导比提示更详细，它以引导性的分步说明形式向用户提供更多信息，指导用户使用应用。导览会在应用启动时自动出现，并引导用户完成应用中的详细流程。在进行导览时，虽然用户以自己的速度浏览应用，但您负责规划他们将要走的路径。您将有很多机会在导览中发挥创意，使其对用户具有吸引力。在导览中，关键是要将信息作为焦点。没有必要指出用户应该已经熟悉的功能。请将导览重点放在应用的独特方面。如果您的应用具有多层次的交互并能吸引不同类型的用户，那么导览是展示特定任务以提升用户体验的绝佳方式。


  与提示类似，导览应是一种易于退出的体验，以防用户决定离开或电话等其他活动中断该过程。用户还应通过页面指示器等视觉提示了解导览还剩多长时间。


  另一个好的经验法则是，尽量让导览具有视觉性，同时以平衡且最简的方式使用文案和文本。也就是说，文案的数量绝不应压倒屏幕上的视觉效果。将您的视觉效果作为故事的一部分，而不是通过解释来贬低用户，指出应用的每个方面。如果您过度依赖文字来解释某个功能，那么该功能必须重新审视。将导览视为文字和视觉效果的完美结合，用于解释如何与您的应用交互。


  您的创造力也可以在提示和导览中占据中心位置。设计效果，如不透明度和半透明度（iOS 7 的常用特性），可以增强导览的外观和感觉，使其以更丰富、更具互动性的方式生动起来。


  跳出框架


  如果您选择创新，为已有的模式创建全新的方法，请务必小心。在已有设计模式的情况下，用新方法解决旧问题可能是一种冒险的策略。如果您决定跳出设计模式的框架，请将您的新方法与旧方法进行测试，并允许您的用户提供反馈。由于测试可能变得复杂且耗时，测试新方法的一种简单方式是选取一小部分用户，让他们同时使用您的新模式和旧模式，然后收集反馈。如果您的测试组更喜欢旧的设计模式，这可能是一个很好的指标，表明最好坚持使用用户已习惯的范式。


  始终使用标准的 iOS 元素。《人机界面指南》提供了可轻松替换标准网页元素的 iOS 特定元素。设计师最常见的错误之一是将网页元素引入其移动设计中。这些元素可能适得其反，让用户感到沮丧。在应用商店中获得差评的一种确定方式是通过错误地使用
  UI 元素来混淆用户，即混合使用隐喻。面包屑导航是一种常见的网页范式，用于向用户显示他们在内容丰富的网站中的位置。然而，iOS 中的返回键取代了网站上可以显示的长串先前页面列表。


  总结


  设计模式是针对常见设计问题的公认解决方案。您可以在应用中广泛使用它们，以显著加快设计过程。模式存在于注册和登录流程、主次导航、搜索、排序和帮助中。还有许多其他设计模式存在。《人机界面指南》是开始更熟悉设计模式以及如何为您的
  iOS 应用具体实现它们的好地方。您也可以在模式的基础上进行即兴创作，但务必与用户进行严格测试。即兴创作并不意味着重新发明轮子。


  第 6 章


  使用线框图设计您的应用


  无论您是为网页还是移动设备进行设计，准备一个线框图来帮助您梳理应用的所有功能总是一个好主意。


  将线框图理解为建筑的蓝图是一个很好的类比。这是一个常见的例子。众所周知，蓝图必须在建筑实际建造之前完成。同样，线框图应在您进入应用的实际设计或开发阶段之前创建，并且是此过程的基础。


  到目前为止，我们在本书中做的所有工作都将您引向这一点，即您实际上正在创建一些东西。您已经尽职尽责；您已经将您的想法从*仅仅*一个想法打磨成一个实际产品。您已经与潜在用户进行了沟通，并在应用商店中与其他应用进行了验证。您已将您的应用与其类别中的竞品进行了比较，并征求了反馈以了解自己的定位；现在，您已准备好创建您的应用。多么令人兴奋！


  现在，我们将开始采取必要的步骤来创建您的应用。这一切从线框化开始。我们将从草图开始，并讨论有助于应用原型设计和用户交互的各种工具。我们将继续使用我们的 `Travel
  Light` 应用作为测试案例，并为此应用开发线框图。


  什么是线框图？


  线框图是您应用（网页或移动端）的一个简单绘图，它概述了所有界面元素和功能，然后才会进入应用的正式设计阶段。它通常不包含品牌元素或颜色。线框图是深入了解应用在用户与之交互时所有行为的一个绝佳方式（参见图
  6-1）。


  ![9781430263647_Fig06-01.jpg](img/9781430263647_Fig06-01.jpg)




  ### 图 6-1


  图 6-1. 线框图是绘制了应用所有界面元素的示意图


  线框图的全部意义在于可用性与交互性。完成线框图绘制后，你应该明确用户在使用应用时每一项操作所对应的结果。


  在应用开发的线框图阶段结束时，你应该能够回答关于应用的以下问题：


  -   用户点击应用中的任意按钮时会发生什么？

  -   应用中每个任务的最佳和最直观路径是什么？

  -   应用是否在其用户界面中采用了公认的最佳实践？

  -   任务是否通过最少的步骤完成？

  -   用户是否理解其正在执行的任务及其原因？

  -   是否已探索并涵盖了所有可能的用例？


  线框图通常不包含色彩和品牌元素，这反而使其更易于阅读。添加品牌和色彩有时会分散线框图的核心目的——即在应用加入设计与润色之前，勾勒并敲定功能。线框图的另一个优势在于，当应用界面设计需要调整时，可以轻松进行迭代修改。如果线框图工作进展顺利，你会发现在整个流程完成前会生成多个版本的线框图。这其实是件好事，因为每个版本都应在前一版本基础上有所改进。


  有些线框图比其他版本更精致，其精致程度取决于多种因素。如果你为客户创建应用，他们可能希望线框图达到一定的精致度或专业度。如果这不是硬性要求，那么我建议你保持线框图的黑白风格，并使用最简单的呈现方式。


  #### 线框图工具


  有许多在线资源和工具可用于创建线框图，也有专门针对移动端的线框图工具。搜索"线框图工具"会列出介绍可用工具的文章。这些工具中有些基于网页，有些是应用程序，有些可下载，有些免费，有些付费，还有些是开源的。你需要找到最适合自己的工具。在基于网页的工具中，以下是我个人最推荐的三款：


  1.  **JustinMind** – 允许用户创建可点击的交互式移动线框图，并支持分享以收集反馈。

  2.  **Proto.io** – 允许用户创建可用于原型设计和测试的线框图。支持分享和在设备上查看。价格从免费到每月 49 美元不等。

  3.  **MoqUps** – 一款免费的基于 HTML 5 的线框图工具，提供 iOS 模板，让用户能够快速创建简单的移动应用线框图。


  如果你不介意多花点钱，以下是另外一些需要付费的线框图工具列表：


  1.  **Omnigraffle** – 个人许可证售价 99.99 美元。适用于 Mac 和 iPad。作为 Mac 用户的最爱，Omnigraffle 不仅可以创建应用和网站，还能绘制多种不同类型的图表。

  2.  **iMockups** – iPad App Store 售价 6.99 美元。这款 iPad 应用允许用户在直观的 iPad 界面内为应用和网站创建线框图。该应用可能需要更新，但仍是创建基础应用线框图的绝佳工具。

  3.  **Balsamiq** – 可下载的线框图工具，通过易用的界面提供基于手绘风格的线框图。也支持分享以收集反馈。单用户许可证售价 79 美元。


  再次说明，这些列表基于我个人的偏好。这些产品大多允许用户先试用再决定购买，因此我建议你尽可能都尝试一下。确保你选择的任何应用都支持以几种不同格式导出线框图。你至少需要一种流行的图片格式（如
  JPEG、PNG）以及广受欢迎的 PDF 格式。另一个有用的功能是能够与他人协作并共享线框图，这在向同事、团队成员和潜在用户征求反馈时会很有帮助。


  你也可以完全跳过网页和其他数字工具，选择传统的手绘方式。也就是用钢笔或铅笔在纸上绘制，你可以在网上找到 iPhone 或 iPad 框架模板，以便在其中填充应用所需的
  UI 元素。无论采用哪种方式，线框图和构思都是应用设计过程中不可跳过的重要步骤。


  #### 为什么线框图很重要？


  到了这个阶段，你自然可能急于开始应用设计的实际操作。你正在思考颜色、阴影、半透明效果，以及应用图标中要包含哪些细节。但先别急。尽管从设计角度来看并不那么吸引人，但完成线框图流程至关重要，因为它将为实际设计提供依据。一旦线框图完成，你会发现后续的设计和开发会比跳过此步骤时流畅得多。


  线框图之所以重要，是因为它有助于创建布局，并帮助你在应用中为用户组织信息。在这个过程中，你可以自由地创建和撤销；尝试不同的方法来解决应用中的特定可用性问题。如果某个方案行不通，你可以轻松舍弃，暂时无需考虑品牌和其他细节。这尤其令人感到自由，因为在设计时我们追求像素级的完美精度，而不愿处理可用性问题。如果你决定完全放弃某个屏幕或流程，你将需要线框图提供的灵活性。如果你不受限于色彩和设计，那么你就可以专注于布局、可用性和流程——这正是线框图绘制时的主要关注点。


  如果你与客户合作，你还会发现线框图是在进入样式和设计阶段之前，让客户认可用户界面及其他元素的绝佳方式。这样一来，客户就能明确预期，而设计也能为线框图增添深度。


  #### 线框图绘制流程




  对应用进行线框图设计的第一步，是开始思考应用的布局。关于最佳实现方式已有不少讨论。如果你下载了前面提到的某个模板，可以直接使用。就我个人而言，我偏爱纸笔。虽然听起来相当低技术，但纸张易于使用，且方便修改错误。纸张的另一个优点是它的具象性。你可以触摸和感受纸张，对某些设计师来说，在转向数字媒介前先在纸上规划，有助于构思过程。白板也很适合构思应用。你可以用干擦标记笔轻松勾勒想法并修正错误。你可能还对使用预印模板感兴趣，可以在上面草绘界面元素。我发现纸和模板能带来极大的解放感。复制这些模板或轮廓并制作多份是方法之一。或者，和其他所有事情一样，你也可以在网上免费找到可下载的模板。如果不行，那就使用你选择的线框图工具。我在图
  6-2 中提供了一个设备轮廓图。如果你决定走纸质路线，这个轮廓图以及图 6-3 中的那些可能会派上用场。我倾向于制作几份副本，每页一个框架，两侧留出空间做笔记。如果我不打算复印或使用模板，我会全凭手绘，然后将模板作为线框图流程的第二步。这样，手绘设计将作为线框图的初稿，直到一些基本的布局和可用性问题得到解决。


  ![9781430263647_Fig06-02.jpg](img/9781430263647_Fig06-02.jpg)


  图 6-2. 一个简单的 iPhone 轮廓图


  ![9781430263647_Fig06-03.jpg](img/9781430263647_Fig06-03.jpg)


  图 6-3. 适用于 iPhone 5 和 iPad mini 的基本模板。这些可用于应用线框图设计


  开始你的线框图设计流程时，你应该准备好到目前为止收集的所有资料：你的应用描述（现在应已根据验证反馈进行完善），以及那些展示了最佳实践、设计模式并说明了你应用中常见功能的应用。如果没有适用于每个屏幕的设计模式，那也没关系：你必须自己创建它们。


  如果你选择使用电子或基于网页的线框工具，就像上面提到的纸质模板一样，你至少需要在开始线框图流程时，根据你的应用是针对 iPhone 还是 iPad，使用相应的设备轮廓图。你选择的线框图程序应该包含这个框架或轮廓。它不必很逼真，但尺寸必须精确，以便你能以正确的宽高比为你正在设计的设备进行工作。


  在你落笔或真正开始规划用户界面之前，一定要将自己置于用户的思维模式中，而不是设计师或开发者的思维。应用的总体目标和目标用户的需求应指导线框图的设计。用户必须处于流程每个步骤的核心位置。作为设计师，你可能会觉得需要在界面中添加新奇炫酷的元素并尝试不同的布局。然而，如果这对你的用户以及他们试图完成的任务没有帮助，你的应用就不会成功。作为设计师和开发者，让自己脱离流程，并能够设身处地为用户着想，这一点至关重要。这就是你的应用陈述如此重要的原因。到了这个时候，你应该能够参考第
  1 章中创建的陈述来指导你的线框图设计过程。


  信息架构师（IA）有时会创建线框图，但现在由设计师来完成这项工作也并不罕见。


  **提示** 信息架构师是为网站或应用创建蓝图和线框图的人。


  在某些情况下，IA 和设计师之间的界限已经模糊。如果你自认为是纯粹形式的设计师，那么熟悉可用性是个好主意，而最好的方法就是为你的应用创建线框图。如果你能找到一位
  IA 或用户体验专家与你合作，那更好。但如果不能，你应该能够使用本章中的一些工具来创建你的线框图。


  #### 聚焦可用性


  线框图设计的核心就是可用性。因此，在线框图设计过程中，向自己提出一些关键问题非常重要。


  *   用户打开你的应用后需要执行的第一项任务是什么？

  *   在任意特定屏幕上，对用户来说最重要的任务是什么？

  *   用户在当前屏幕上需要哪些信息来指导他/她的任务？

  *   基于现有模式和最佳实践，用户在这个阶段期望看到什么？

  *   如果一个任务包含多个步骤，那么完成这个任务的最佳且最短的路径是什么？


  如果我们沿用最初的想法，就像我们在第 1 章中所做的那样，创建一个帮助用户轻装旅行的旅行应用，我们就需要向自己提出关于用户的关键问题，以及他/她需要什么来指导应用的任务。如果你在设计应用时做得很好，你也应该遵循了这些步骤，并能从这些问题中找到答案。


  例如，你的用户是否需要登录或注册才能使用应用？如果是，那么采用一种设计模式可能是最好的选择。你需要在这里收集哪些信息？在登录和注册方面，确实没有必要重复造轮子。用户熟悉这个过程，所以记住只收集你需要的信息，并草绘出这个过程的输入字段和确认环节。应用是否从社交网络拉取信息？如果是，那么你知道你需要请求用户的许可才能这样做。记住，你的目标是让用户尽快完成这个过程，以便他们能够开始与你的应用互动。如果需要的话，可以参考第
  5 章中的注册和登录移动设计模式最佳实践。保持简单，因为你希望用户真正开始使用你的应用。如果注册过程太复杂，你将失去那些可能永远不会再回来的用户。此时你的目标是让用户用最少的步骤进入应用。


  #### 尝试不同布局


  也要尝试不同的布局。你脑海中第一个闪现的布局肯定不会是最佳方案，但首先要把它记录下来作为起点。目标是让一些东西落在纸上，从而开启这个过程。尝试按顺序完成你的线框图。这意味着尝试按照你期望用户使用应用时的顺序来规划页面和屏幕。一种方法是根据你的应用中不同屏幕相关的每个任务和子任务，将应用的各个部分分开处理。这样，你就清楚自己在为什么内容画线框图了。


  举个例子，我们创建了一个名为“轻装旅行”的应用。在整本书中，我们将使用这个应用来说明设计过程中各种技巧和步骤的示例。


  #### 勾勒用户流程




  每个应用流程都是用户在使用应用时遵循的路径。你至少应该对应用如何运作有一些初步想法，这将使创建用户流程变得更加容易。上述一些线框图工具也可用于创建用户流程。不过，任何允许你绘制基本形状的工具都可以胜任。启动用户流程最简便的方法就是列出你能想到的、与应用相关的所有主要任务。此处描述要尽可能具体，因为这里正是你的应用开始活起来的地方。你可以将每个步骤写在便利贴上，这样当发现两个步骤之间需要插入额外步骤时，就能方便地移动它们。或者，你也可以在白板上写下每个步骤。用户流程的目的是追踪用户为完成特定任务必须经过的路径。在规划用户流程时，你应该提出并能够回答以下问题：


  *   用户是谁，他/她需要什么？

  *   用户为什么与应用交互？

  *   用户要去哪里？

  *   这项任务的最终目标是什么？

  *   用户的目标是什么？

  *   应用的目的是什么？

  *   是否有特定的商业目标？（例如应用内购买或销售）

  *   任务从哪里开始，又在哪里结束？


  下面，我尝试为我们的“轻装旅行”应用回答上述问题。请注意每个答案都很简洁。在制作线框图的过程中，你的答案也可能会发生变化。


  **你的用户是谁，他/她需要什么？**


  “轻装旅行”的用户是忙碌的旅行者，他们需要确切地知道每次旅行该带什么。


  **为什么用户要与应用交互？**


  用户与“轻装旅行”交互是为了尽量减少随身行李，并确保只带必需品。


  **用户要去哪里？**


  用户将要去创建一个新的清单。


  **这项任务的最终目标是什么？**


  这项任务的最终目标是帮助用户创建一个清单，并将其与特定的旅行关联起来。


  **用户的目标是什么？**


  最终目标是针对给定的旅行创建一个完整的清单。


  **应用的目的是什么？**


  应用的目的是让用户只带所需物品，同时不忘带任何东西。


  **是否有特定的商业目标？（应用内购买或销售）**


  最终，我们会将用户与其他提供低成本旅行解决方案的合作伙伴联系起来。


  **任务从哪里开始，又在哪里结束？**


  主要任务从输入旅行详情（例如出发地和目的地城市及日期）开始。当用户为特定旅行选择了所有物品时，任务结束。


  图 6-4 展示了一个“轻装旅行”应用非常基础的用户流程示例。


  ![9781430263647_Fig06-04.jpg](img/9781430263647_Fig06-04.jpg)


  图 6-4. “轻装旅行”应用的用户流程列出了用户在浏览应用时可能采取的**主要任务**和**路径**


  现在我们已经创建了用户需求列表，可以开始写下与刚刚概述的目标相关联的主要任务了。


  为了从“轻装旅行”应用创建界面，我们的主要任务和子任务列表可能如下所示：


  点击应用图标


  注册与登录页面


  选择并输入用户名（电子邮件地址）


  选择并输入密码


  点击登录按钮


  如果我们概述与输入旅行详情相关的所有步骤，列表可能如下所示：


  旅行信息录入


  输入旅行详情；出发城市、州、机场、日期和时间


  询问是否使用当前位置；如果是，则列出关联机场


  如果否，用户可手动输入


  用户选择出发机场


  用户通过日历弹出窗口输入日期


  用户通过选择器输入时间？


  保存旅行详情 – 用户应能编辑旅行详情


  清单创建与确认




  用户创建新的打包清单——该清单与新的行程相关联。


  用户向清单中添加新物品。


  用户还可以从旧清单或热门物品中选择物品。


  如果用户忘记了，应用会根据以前的清单或行程，随着时间的推移推荐物品。


  “设置”面板中的辅助任务可能包括：


  设置


  启用基于位置的服务


  提醒？（徽章、通知中心、声音等）


  上述清单绝非详尽无遗，也并非完整无缺。很可能还有一些步骤缺失。这只是为这个虚构应用创建线框的相关任务的初步尝试。像这样的清单应能为线框的第一次迭代提供信息。


  图 6-5 中的屏幕展示了一些基本草图，展示了我们虚构应用的“轻装旅行”线框在注册和行程输入部分可能的样子。下面的任务代表了一个新用户在应用中会执行的操作。这些草图是徒手绘制的，没有使用任何模板。尽管草图比较粗糙，但你仍能辨认出用户界面的元素以及每个屏幕的一些关键区域。你可以为自己的应用做同样的事情，或者使用模板。无论采用哪种方式，都必须尝试将你的屏幕和用户界面元素映射到你的任务上。在逐步处理这些屏幕时，差异和缺失的步骤应该会变得明显。一旦发现，你就能将它们补充完整。


  ![9781430263647_Fig06-05.jpg](img/9781430263647_Fig06-05.jpg)


  图 6-5。基本的手绘线框展示了一系列从注册到行程输入的屏幕。


  一旦你对照任务清单审阅了你的草图、便利贴或模板，各种用户路径也会开始显现。对于我们的“轻装旅行”应用，我们已经涵盖了一些每个用户都必须执行的任务，例如注册、添加行程和创建清单。这些被认为是主要任务。然而，在此过程中，也可能出现一些次要任务。这些任务可能并非所有用户都能明显看到或需要，但对于其他用户来说，它们将是流程的一部分。这些任务——无论大小——都将开始揭示你的应用的不同用例。


  定义用例


  当你以用户为中心进行线框设计时，你可能会发现你的用户并非都一模一样，他们在与应用交互时的需求也各不相同。我见过的大多数应用都至少有两个用例。用例有时也被称为用户故事。它们帮助你根据对用户的理解以及他们的需求，为你的应用打造独特的体验。这将决定你如何创建应用的
  UI。


  在围绕特定用例设计线框时，你需要为特定用户定义最直观的用户界面元素。例如，假设我们的“轻装旅行”应用有一位高级用户。这位用户经常旅行，并且已经在应用中保存了多个行程。那么，这位用户的体验与新用户有何不同？基于这个用例，这个用户流程可能会这样进行：


  1.  打开应用

  2.  从之前的行程列表中选择，或者如果未列出则添加新行程

  3.  从另一个行程导入清单

  4.  如有需要编辑清单

  5.  确认


  请注意，这个用例与上述线框中为新用户设定任务的初始用例有很大不同。高级用户或经常使用的用户已经熟悉应用的功能、界面以及如何执行关键任务。因此，在这个流程的线框（图
  6-6）中，我们会对用户如何与应用交互以及他们在执行特定任务时期望看到什么做出基本假设。


  ![9781430263647_Fig06-06.jpg](img/9781430263647_Fig06-06.jpg)


  图 6-6。特定用例的线框


  添加线框细节


  一旦你规划好了模块和用户界面，就可以开始向线框添加更多细节了。在需要的地方为按钮添加标签，为屏幕添加标题，让它们开始变得生动起来。再次思考用户将如何识别 UI
  元素，并将它们与手头的任务联系起来。提出如下问题：


  *   iOS 用户界面中的哪些元素最适合使用？

  *   在选择日期时，日期选择器是否最好？或者提供一个日历让用户能看到完整的月份布局以便更容易选择是否更简单？

  *   时间对你的用户来说是一个考虑因素吗？他们会在多任务处理时使用你的应用吗？

  *   用户最可能在什么地方使用你的应用？

  *   用户在使用你的应用时是否可能处于移动状态或正在行动中？如果是这样，这将如何影响你布置关键 UI 元素（如按钮）的方式？

  *   你的用户更可能是单手还是双手使用你的应用？


  这些问题的答案不仅会影响流程，还会影响应用的布局。这时你开始优化应用的 UI。


  如前所述，线框设计是一个迭代过程。在最终定稿之前，你可能会制作多个版本的线框。然而，每个版本都应让你更接近最终版本，并为实际的设计阶段做好准备。


  分享线框以获取反馈


  如果可以的话，与他人分享你的线框总是一个好主意。就像你为应用写的初始声明一样，线框如果只是闭门造车，不与人分享，就几乎毫无用处。你不能在封闭的环境中设计。将你的线框分享给你的朋友、同事，或者如果可能的话，分享给潜在的用户。


  如果可能，创建一个小的用户群，让他们审阅初期的线框并收集他们的反馈，然后用这些反馈进一步优化线框。如果你能让当初评估应用声明的同一组人也参与进来，并对线框提供反馈，那就最理想了。你将与一个熟悉应用整体概念和功能的团队合作。对于这个受众来说，看到应用随着时间的推移而演变，对你作为设计师来说可能既有帮助又富有洞察力。


  然而，对待用户反馈要谨慎。有时用户反馈可能会与公认的最佳实践相悖。如果收到的部分反馈属于这种情况，在实施之前请认真权衡这些反馈——特别是如果它违背了公认的最佳实践或已知的设计模式。例如，许多旅行应用会向用户展示一个月份日历供其选择旅行日期。如果在焦点小组会议中，一个或多个用户认为有另一种更好的方式，你可能需要权衡这种改变的利弊。原因是，你的核心用户很可能期望在输入日期时看到那个日历。iOS
  的选择器是允许用户选择日期和时间的好方法。但是，如果你替代日历的方案不够用户友好或直观，你可能需要考虑忽略这一特定反馈，并坚持使用已知且普遍使用的方式。


  对于应用线框中的特定动画或隐含动作，你需要向用户展示动画前后的状态，因为线框大多是静态的。如果你采用低保真度方法，那么动画前后的状态以及详细的注释应该足以说明动作。有些用户也未必知道某些转场是什么意思；因此，在征求反馈时，直观地向他们展示是避免让你的焦点小组用户感到困惑的一种方法。


  创建原型




  市面上一些流行的线框设计软件，允许你创建可点击的应用原型，并能在实际设备上运行。在之前列出的软件中，`Proto.io`、`JustinMind` 和 `iMockups`
  都可以帮助你创建某种形式的可点击原型。这是向用户精确展示应用运行方式的绝佳途径。其他软件可能只允许通过网页界面与应用交互。任何能复制用户将在应用中体验到的真实交互性的线框工具，对于测试都非常有帮助，但并非绝对必要。从静态的纸质线框和交互式线框中都能获得极好的反馈，甚至还有一个名为
  `POP`（纸上原型）的工具，如图 6-7 所示，它允许你拍摄纸质线框的照片并为其添加一些交互功能。该工具以应用形式提供，看起来使用起来很有趣。理想情况下，最好的方法是让用户直接在他们设备上与为其设计的应用进行交互。


  ![9781430263647_Fig06-07.jpg](img/9781430263647_Fig06-07.jpg)


  图 6-7。`POP` 应用让用户拍摄手绘线框的照片，并为其添加交互功能。


  **客户与线框**


  如果你是作为设计师兼开发者为自己的应用创建线框，那么这些线框主要仅供你自己参考。除非你跟他人分享以获取反馈，否则你完全可以自行决定线框的精细程度。然而，如果你是与客户打交道，那么为你的线框添加注释和一定程度的指引对客户会很有帮助。由于线框缺乏任何品牌元素或色彩，客户可能会觉得难以理解。在向客户展示线框之前，先让他们了解线框的呈现方式。为线框添加方向性注释，如果可能的话，引导客户浏览整个流程。将客户无法理解的线框发送给他们，无疑是延迟项目签收的方式，并且可能导致无休止的反馈循环，由此引发更多问题和需要澄清的事项，而非真正的批准。


  你很少会与客户分享像图 6-4 和图 6-5 那样的手绘线框。但是，如果你有一个团队，这些手绘线框是内部迭代的好起点。而且，尽管我已经审查并列出了一些线框软件和工具，但你完全无需感到有使用它们的压力。图
  6-8 中的线框是更适合发送给客户审阅的范例。


  ![9781430263647_Fig06-08.jpg](img/9781430263647_Fig06-08.jpg)


  图 6-8。这些线框更适合与客户分享。


  这些线框不仅更精致，而且更易于阅读和理解。由于你的线框将代表应用中的每一个页面，并且理想地展示用户如何与他们在每个屏幕上看到的内容进行交互，因此最好包含用户在最终线框中能看到的所有元素。请注意上方屏幕中的“忘记密码”和“条款与条件”链接。虽然此处未展示，但展示用户找回丢失密码的流程也很常见。有时，应用的“条款与条件”会以网页视图的形式展示，因为它们可能会变更，这种方式便于更新。如果你们的条款要求用户执行操作（例如点击“同意”按钮）才能继续，那么也应该展示这些界面。


  ### 总结


  你的线框是设计过程中的关键组成部分。它们将帮助你创建用户流程，并定义用户使用你应用时的整体体验。线框的主要目的是让你能够创建以用户为中心的场景，为你的应用用户提供最佳的整体体验。请确保你的线框能够解答关于用户如何以及为何与应用进行交互的关键问题。如果你在起步阶段遇到困难，可以随时参考我们在第
  6 章中讨论的设计模式，或者回顾你最初的应用陈述。市面上有众多工具可用于为你的应用制作线框。其中许多工具允许你以最基本的形式（即不含色彩和品牌元素）创建应用，并便于频繁迭代。无论你是使用现成的软件，还是决定使用纸笔，你的线框都需要通过他人的反馈来不断优化。因此，请确保你能够分享这些线框并认真权衡那些重要的反馈意见。如果你需要向客户展示线框，那么你需要为线框增加一定的精细度。注释也有助于解释你可能无法传达的所需功能或效果。在线框设计流程结束时，你应已准备好为应用添加色彩、深度和品牌元素。


  ## 第 7 章：使用 Adobe Photoshop 设计视觉资源


  Adobe Photoshop 可能是全球设计师最常用的图形软件。在设计应用或网站时，Adobe Photoshop 仍然是行业标准。历经二十多年的发展，它已成为整个创意产业的强大工具。Adobe
  旗下的名为 Creative Cloud 的软件套件，还包括 Adobe Fireworks、Illustrator、InDesign、Premiere Pro
  和 After Effects 等其他图形程序，涵盖视频编辑、图像设计到动态图形等领域。然而，就本书而言，我们将专注于 Adobe Photoshop 作为为我们的
  iOS 应用创建资源的标准工具。


  之后我也将简要介绍一下 Fireworks。


  为了本书的目的和前后一致性，我们将继续围绕“轻装旅行”应用这个主题，该应用旨在帮助你永远不忘带上旅途所需物品。到目前为止，我们为这个虚构的应用制定了应用使命陈述，进行了一些基础研究并设计了线框。在本章中，我们将使用
  Photoshop 为我们在第 6 章中创建的线框添加一些色彩和品牌元素。我们不会完整地从头到尾设计整个应用，但我会演示如何使用该软件来完成特定任务，为你的应用用户界面增添色彩和润色。


  ### 一些 Photoshop 基础知识


  如果你大部分时间都在开发应用，那么你肯定接触过 Photoshop 文件，或者它们通常被称为的 `PSD` 文件。它们是大多数设计作品的基石。即使你只熟悉 `PNG`（苹果公司偏好的应用图像格式），你的
  `PNG` 文件十有八九最初也是源于 Adobe Photoshop 文件。


  由于本书并非一本教授如何使用 Photoshop 的指南，我们假设你具备一些在 Photoshop 中执行基本任务的经验。即使作为一名开发人员，熟悉 Photoshop
  也始终是个好主意。一些开发者和 iOS 工程师会收到已经切好图、可直接用于开发的 `PNG` 资源；与此同时，越来越多的开发者也更习惯于接收分层的 `PSD`
  文件，并自行从中切图。本章假设你已经熟悉 Photoshop，并且之前创建或编辑过 `PSD` 文件。理想情况下，你曾打开并探索过该软件的界面，创建过形状，熟悉填充、透明度、不透明度以及图层等操作。



