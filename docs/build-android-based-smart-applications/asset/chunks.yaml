    ## Introduction


    This book describes how to build smart applications using cutting-edge technologies
    like rules engines, code automation frameworks, and natural language processing
    (`NLP`).


    **Note:** A smart application is an application embedded with intelligence. The
    intelligence can be updated on the fly.


    This book provides step-by-step guidance on porting nine rules engines (`CLIPS`,
    `JRuleEngine`, `DTrules`, `Zilonis`, `Termware`, `Roolie`, `OpenRules`, `JxBRE`,
    and `JEOPS`) to the mobile platform. Then, it describes how to use each rules
    engine to build a smart application. Sample code snippets are provided so that
    the reader can get started with programming their smart application immediately.
    The book also describes porting issues with other popular rules engines (`Drools`,
    `JLisa`, `Take`, `Jess`, and `OpenRules`).


    This book will guide the reader on how to automatically generate a working smart
    application based on requirement specifications.


    This book concludes with showing the reader how to generate a smart application
    from unstructured knowledge using the `NLP` framework `Stanford POS` (part of
    speech) tagger.


    ## Acknowledgments


    Examples available at rules engines websites are modified as required, and the
    modified code snippets are provided. Thanks to Abhishek Chander (Bachelor of Computer
    Science Cambridge University) for developing the `AutoQuiz` prototype under the
    guidance of author Chinmoy Mukherjee.'
