- fmt: "# JEOPS\n\nJEOPS [14] is a Java-based rules engine for embedding forward-chaining\
    \ production rules into Java applications. It provides artificial intelligence\
    \ capabilities to the application.\n\nJEOPS production rules can be written in\
    \ a text file (.rules file). The interaction with the knowledge base is performed\
    \ by four methods: `Tell(object)`, `Flush()`, `Retract(object)`, and `Modified(object)`.\
    \ The time required for Java programmers to learn JEOPS is minimized by its using\
    \ Java expressions in the rule definitions. Here is a summary of the rules engine:\n\
    \n* License type: Open Source LGPL\n* Language: Java\n* Works on Android: Yes\n\
    * Rules Syntax: “Condition-action” patterns in any text editor\n* Memory Footprint:\
    \ 0.03 MB (31.5 KB)\n* Reasoning Method: RETE\n* Supports multi-threading: No\n\
    * Easy to scale the rules engine: Yes, with average time to run being 120ms\n\n\
    # Steps to Port Rules Engines\n\nThis chapter will cover how to port major rules\
    \ engines in the Android platform.\n\n## CLIPS\n\nAndroid-ndk and Eclipse Helios\
    \ were used to port CLIPS into Android. It is better to use a Linux machine for\
    \ porting. Here are the steps to port CLIPS into Android:\n\n* Download `CLIPSJNI`\
    \ source code from Source Forge and build an Android library project from the\
    \ source code.\n  * Export the library project to `CLIPSJNI.jar`.\n* Create a\
    \ dummy Android project and create a JNI directory under your project directory.\n\
    * Copy all source (*.c) and header (*.h) files from CLIPS to the JNI directory.\n\
    * Add all source files except `main.c` in `Android.mk`. Your `Android.mk` should\
    \ look like the following:\n\n```\nLOCAL_PATH := $(call my-dir)\ninclude $(CLEAR_VARS)\n\
    LOCAL_MODULE    := CLIPSJNI\nLOCAL_SRC_FILES := agenda.c \\\nanalysis.c \\\nargacces.c\
    \ \\\n.\n.\n.\nCLIPSJNI_Environment.c\nLOCAL_LDLIBS    := -lm -llog -ljnigraphics\n\
    include $(BUILD_SHARED_LIBRARY)\n```\n\n* Search for `setlocale` function in the\
    \ JNI directory. Wherever `setlocale` is expected to return a value, hardcode\
    \ it to `C` and comment out all other `setlocale` calls, as Android’s `setlocale`\
    \ returns a hard-coded `0`!\n* Comment out main function (just to be on the safe\
    \ side).\n* Run `ndk-build –b`.\n* Copy `libCLIPSJNI.so` to `libs/armeabi` and\
    \ `libs/armeabi-v7a`.\n* Add `CLIPSJNI.jar` to your Android project as an external\
    \ jar.\n\n## JRuleEngine\n\nHere are the steps to port JRuleEngine into Android:\n\
    \n* Download `jsr172.jar`.\n  * Remove all packages from this jar file except\
    \ `java.rmi`.\n* Repackage the jar using `jarjar.jar` utility as follows:\n  *\
    \ Create `rulefile.txt` containing the following line: `rule java.rmi.** com.<yourcompany>.java.rmi.@1`\n\
    \  * On command prompt, run `java -jar jarjar.jar process rulefile.txt <input\
    \ jar> <output jar>`\n* Download `jsr94-1.1.jar`.\n* Repackage the jar using `jarjar.jar`\
    \ utility.\n  * Create a `rulefile.txt` file containing the following line: `rule\
    \ java.rmi.** com.<yourcompany>.java.rmi.@1`\n  * On command prompt, run: `java\
    \ -jar jarjar.jar process rulesfile.txt <input jar> <output jar>`\n* Download\
    \ Apache Harmony `awt.jar` and remove all `java.*` packages from the jar.\n* Download\
    \ `jruleengine.jar` with source code.\n* Comment all the `else if` statements\
    \ containing a `Component.getName()` function call; also remove the `import java.awt.Component;`\
    \ statement.\n* Repackage `jruleengine.jar` using `jarjar.jar` utility.\n* Create\
    \ `rulefile.txt` file containing the following rule:\n  * `rule java.rmi.** com.<yourcompany>.java.rmi.@1\
    \ rule java.awt.Component** org.apache.harmony.awt.ComponentInternals@1`\n  *\
    \ run `java -jar jarjar.jar process rulefile.txt <input jar> <output jar>`\n*\
    \ Create an Android project and add all these jars to the build path of the project.\n\
    * Copy XML file containing rules to sdcard in emulator.\n\n## DTrules\n\nThe jar\
    \ files work in Android but the following steps need to be executed to use DTrules\
    \ in Android applications:\n\n* Write rules as decision tables in an Excel sheet.\
    \ Sample Excel sheets are available at `sampleprojects/<projectname>/DecisionTables`.\n\
    * Create a file structure as follows:\n\n```\n/DecisionTables/excel_sheet_containing_decision_tables.xls\n\
    /edd/file_containing_edd.xls\n/xml/\n/DTRules.xml\n```\n\n* Convert Excel sheet\
    \ containing rules to XML by using code like the following:\n\n```\nExcel2XML.compile(\"\
    root path\", \"DTRules.xml\", \"name_of_ruleset\", \"path_to_repository\");\n\
    ```\n\nTo generate the mapping file automatically, use something like this:\n\n\
    ```\nString [] maps = {\"main\" };      Excel2XML.compile(path,\"DTRules.xml\"\
    ,\"\",\"D:/XLS2XML/repository\",maps);\n```\n\n* Create an Android project.\n\
    * Add the following jars to the build path: `java-cup-11a.jar`, `poi-3.6-20091214.jar`,\
    \ `dtrules.jar`.\n* Create a mapping file (if not generated automatically) to\
    \ map XML file with data into the entities.\n* Add the required entities to the\
    \ initialization section, which needs to be pushed to the entity stack before\
    \ the first decision table is executed. As an example:\n* Modify the number of\
    \ each entity required to be created. For example:\n* Create a file structure\
    \ in sdcard as follows:\n  * `/sdcard/xml/mapping_file.xml,edd_file.xml,dt_file.xml`\n\
    \  * `/sdcard/repository/DTRules.xml`\n  * `/sdcard/DTRules.xml`\n  * `/sdcard/testfiles/testcase.xml`\n\
    * Copy the generated files into appropriate directory of sdcard.\n\n## Zilonis\n\
    \nZilonis jar works in Android without any issue. Here are the steps to add Zilonis\
    \ into your Android project:\n\n* Create an Android project.\n* Copy the .clp\
    \ file containing rules into a folder, say the temp folder in sdcard in emulator.\n\
    * Add `zilonis0.97b.jar` and `antlr.jar` to the project’s build path.\n\nWhile\
    \ writing rules files (.clp) for Zilonis, please ensure the following:\n\n* In\
    \ .clp file, only one statement can be added in one line, unlike CLIPS.\n* No\
    \ space should be between lines.\n\n## Termware\n\nPorting Termware in Android\
    \ was easy. Here is the one step:\n\n* Remove all debug stub–related items from\
    \ Java files belonging to `ua.gradsoft.termware` and `ua.gradsoft.termware.util`\
    \ in the `TermWare.jar`.\n\n## Roolie\n\nNo effort was required to port Roolie\
    \ onto Android—you just need to add the jar file to the Android project and get\
    \ going.\n\n## OpenRules\n\n* Download the source code for `org.apache.commons.beanutils`,\
    \ recompile it, and export it to jar after removing the following packages, to\
    \ fix multiple definition issues:\n\n```\norg.apache.commons.logging\norg.apache.commons.logging.impl\n\
    ```\n\n* Then, repackage it using the `jarjar.jar` utility:\n  * Create `rulefile.txt`\
    \ containing the following rule: `rule java.beans.** com.googlecode.openbeans.@1`\n\
    \  * Run the following command in command prompt to repackage: `java -jar jarjar-1.4.jar\
    \ process rulefile.txt <input jar> <output jar>`\n* Download `poi-3.6-20091214.jar`\
    \ for Excel-sheet processing.\n* Download `openbeans-1.0.jar` for using `com.googlecode.openbeans`,\
    \ as OpenRules uses Java beans extensively, which is not supported by Android.\n\
    * Download `commons-lang-2.3.jar` and remove the `org.apache.commons.lang.enum`\
    \ package, then recompile it.\n* Create an Android project and add all these jars\
    \ to the build path of the project.\n* OpenRules seems to have hard coded the\
    \ path of `openrules.config dir`, in which template files need to be stored. Create\
    \ a directory `openrules.config` under sdcard and put the rule and template files\
    \ there."
