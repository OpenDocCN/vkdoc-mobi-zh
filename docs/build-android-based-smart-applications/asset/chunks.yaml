- fmt: "### CLIPS\n\nLet's build a smart application using the CLIPS rule engine to\
    \ assess diarrhea symptoms for a patient.\n\nFigure [2-1](#A459602_1_En_2_Chapter.html#Fig1)\
    \ shows what the app looks like.\n\n![A459602_1_En_2_Fig1_HTML.jpg](A459602_1_En_2_Fig1_HTML.jpg)\n\
    \n**Figure 2-1**  \nWhat the app looks like\n\nThe diarrhea guideline can be easily\
    \ codified in CLIPS as `diarrhoea.clp`.\n\n```\n;=======================================\n\
    ;;\n;; ---- DIARRHEA MANAGEMENT------\n;;\n;=======================================\n\
    ;=======================================\n;--- Printout the response code---\n\
    ;; If the Remedy(Rx) is asserted, then printout the remedy.\n;======================================\n\
    (defrule print_diarrhea_message2\n(Rx_diarrhea_signs_code(code ?b))\n=>\n(bind\
    \ ?*WHODecisionCode* (create$ ?*WHODecisionCode* ?b))\n;(printout t ?*WHODecisionCode*\
    \ crlf)\n)\n;; RULES FOR ASSESSMENT OF PATIENT STATE AND TRIGGER THE DIARRHEA\
    \ MANAGEMENT\n;=======================================\n;--- Check if the patient\
    \ has diarrhea ---\n;; If the patient data has (diarrhea yes) then (check blood\
    \ in stool) and (classify dehydration)\n;; If the patient data has (diarrhea no)\
    \ then (check other disease)\n;======================================\n(defrule\
    \ check-diarrhea_yes\n(diarrhea_data (diarrhea yes))  ;; Check if the patient\
    \ has diarrhea\n=>\n(assert (check blood_in_stool))         ;; TRIGGER CHECK BLOOD\
    \ IN STOOL\n(assert (classify dehydration)))        ;; TRIGGER CLASSIFY DEHYDRATION\n\
    ;;-------------------------------------------------------------\n;;-------------------------------------------------------------\n\
    (defrule check-diarrhea_no\n(diarrhea_data (diarrhea no))\n=>\n(assert (check\
    \ other disease)) )\n;=======================================\n;--- Rule check\
    \ blood in stool ---\n;; If the patient has (blood in stool) then the patient\
    \ state is (dysentery).\n;======================================\n(defrule check-blood_in_stool-yes\n\
    (check blood_in_stool)\n;; check if the action is triggered from the diarrhea\n\
    (diarrhea_data (blood_in_stool yes))\n;; check if the patient has blood in stool\n\
    =>\n(assert (Rx_diarrhea_signs_code (code \"10\"))))        ;; ASSERT THE Decision\
    \ Code : 1 which means dysentry\n;=======================================\n;---\
    \ Rule check blood in stool ---\n;; If the patient has (no blood in stool) then\
    \ the patient state is (no dysentery).\n;======================================\n\
    (defrule check-blood_in_stool-no\n(check blood_in_stool)                     \
    \   ;; Check if the action is triggered from the diarrhea rule system\n(diarrhea_data\
    \ (blood_in_stool no))           ;; Check if the patient has no blood in stool\n\
    =>)                        ;; END THE ASSESSMENT OF DYSENTERY\n;=======================================\n\
    ;--- Assess Treatment Objective: Severe Dehydration ---\n;======================================\n\
    (defrule classify-severe_dehydration\n(classify dehydration)                 \
    \       ;; Check if the action is triggered from the diarrhea rule system\n(diarrhea_data(blood_in_stool\
    \ no))\n(diarrhea_data(severe_condition_count ?w&:(>= ?w 2)))\n;; If more than\
    \ two of the following some_dehydration signs are satisfied\n(diarrhea_data(how_many_days\
    \ ?x&:(\n(assert (Rx_diarrhea_signs_code (code \"5\")))\n;(assert (check-more_than_14days-severe_dehydration_case))\n\
    )\n(defrule classify-severe_dehydration_child_able_to_drink\n(Rx_diarrhea_signs_code\
    \ (code \"5\"))\n(diarrhea_data (not_able_to_drink_or_drinking_poorly no))\n=>\n\
    (assert (Rx_diarrhea_signs_code (code \"5A\")))\n)\n(defrule classify-severe_dehydration_child_not_able_to_drink\n\
    (Rx_diarrhea_signs_code (code \"5\"))\n(diarrhea_data (not_able_to_drink_or_drinking_poorly\
    \ yes))\n=>\n(assert (Rx_diarrhea_signs_code (code \"5B\")))\n)\n;=======================================\n\
    ;---  Objective: Some Dehydration ---\n;======================================\n\
    (defrule classify-some_dehydration\n(classify dehydration)                ;; Check\
    \ if the action is triggered from the diarrhea rule system\n(diarrhea_data (blood_in_stool\
    \ no))\n(diarrhea_data(some_condition_count ?w&:(>= ?w 2)))\n(diarrhea_data (severe_condition_count\
    \ ?y&:(\n(assert (Rx_diarrhea_signs_code (code \"6\")))\n;(assert (check-more_than_14days-some_dehydration_case))\n\
    )\n;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;\n(defrule classify-no_dehydration\n\
    (classify dehydration)                ;; Check if the action is triggered from\
    \ the diarrhea rule system\n(diarrhea_data (blood_in_stool no))\n(diarrhea_data\
    \ (how_many_days ?x&:(\n(assert (Rx_diarrhea_signs_code (code \"7\")))\n)\n;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;\n\
    ;; RULES FOR DETERMINATION OF TREATMENT OBJECTIVES BASED ON PATIENT'S STATE\n\
    ;=======================================\n;--- Rules for Assessment of Persistent\
    \ Diarrhea ---\n;--- Check-more_than_14days ---\n;======================================\n\
    ;=======================================\n;--- Rules for Check-more_than_14days\
    \ - Patient is classified to either have Severe or Some dehyration + diarrhea\
    \ is >14\n; then it is severe persistent diarrhea\n;======================================\n\
    (defrule check-severe_persistent_diarrhea-severe_deh_case\n;(check-more_than_14days-severe_dehydration_case)\
    \        ;; Check if the assessment of Persistent Diarrhea is triggered\n(or (diarrhea_data\
    \ (some_condition_count ?w&:(>= ?w 2)))\n(diarrhea_data (severe_condition_count\
    \ ?y&:(>= ?y 2))))\n(diarrhea_data (how_many_days ?x&:(> ?x 14)))\n(diarrhea_data\
    \ (blood_in_stool no))\n;; If diarrhea 14days or more\n=>\n(assert (Rx_diarrhea_signs_code(code\
    \ \"8\"))) )        ;; ASSERT THE TREATMENT OBJECTIVE :SEVERE PERSISTENT DIARRHEA\n\
    ;=======================================\n;--- Rules for Check-more_than_14days\
    \ - Patient has not been classified to have dehydration but if diarrhea is >14\
    \ days then it is persistent diarrhea\n;======================================\n\
    (defrule check-persistent_diarrhea-no_deh_case\n;(check-more_than_14days-no_dehydration_case)\
    \        ;; Check if the assessment of Persistent Diarrhea is triggered\n(diarrhea_data\
    \ (some_condition_count ?y&:( ?x 14)))\n(diarrhea_data (blood_in_stool no))\n\
    ;; If diarrhea 14days or more\n=>\n(assert (Rx_diarrhea_signs_code (code \"9\"\
    ))) )       ;; ASSERT THE TREATMENT OBJECTIVE :PERSISTENT DIARRHEA\n```\n\nThe\
    \ user input can be modeled as `diarrheaData`:\n\n```java\npublic class diarrheaData\
    \  implements Parcelable {\nint iNumberofDays=0;\nString sBlood_In_Stool=\"no\"\
    ;\nString sLethargic_Unconscious=\"no\";\nString sRestless_Irritable=\"no\";\n\
    String sSunken_Eyes=\"no\";\nString sSkin_Pinch_Veryslow=\"no\";\nString sSkin_Pinch_Slow=\"\
    no\";\nString sNot_Able_To_Drink_or_Drinking_Poorly=\"no\";\nString sDrinking_Eagerly_or_Thirsty=\"\
    no\";\nString sOther_Severe_Disease=\"no\";\nString sTrained_nurse_for_iv_immediately=\"\
    no\";\nString sIv_available_in_30min=\"no\";\nString sTrained_nurse_for_ng_tube_immediately=\"\
    no\";\n}\nstatic {\ntry {\nSystem.loadLibrary(\"CLIPSJNI\");\nif(clips == null)\
    \ {\nclips = new Environment();\n}\n}\ncatch(UnsatisfiedLinkError ule) {\nLog.e(\"\
    JNI\", \"Could not load libCLIPSJNI.so!\");\n}\nprivate  static Environment clips\
    \ = null;\nstatic {\ntry {\nif(clips == null) {\nclips = new Environment();\n\
    }\nclips.clear();\nclips.load(\"diarrhoea.clp\");\nString myassertString = \"\
    (diarrhea_data (diarrhea yes) \" +\n\"(blood_in_stool \"+mydiarrheaData.sBlood_In_Stool\
    \ +\") \" +\n\"(how_many_days \"+mydiarrheaData.iNumberofDays+\") \" +\n\"(lethargic_unconscious\
    \ \"+mydiarrheaData.sLethargic_Unconscious+\") \"+\n\"(restless_irritable \"+mydiarrheaData.sRestless_Irritable+\"\
    ) \" +\n\"(sunken_eyes \"+ mydiarrheaData.sSunken_Eyes+\") \" +\n\"(skin_pinch_veryslow\
    \ \"+mydiarrheaData.sSkin_Pinch_Veryslow+\") \" +\n\"(skin_pinch_slow \"+mydiarrheaData.sSkin_Pinch_Slow+\"\
    ) \" +\n\"(not_able_to_drink_or_drinking_poorly \"+mydiarrheaData.sNot_Able_To_Drink_or_Drinking_Poorly+\"\
    ) \" +\n\"(drinking_eagerly_or_thirsty \"+mydiarrheaData.sDrinking_Eagerly_or_Thirsty+\"\
    ) \" +\n\"(other_severe_Vdisease \" + otherSevereDisease + \"))\";\nclips.assertString(myassertString);\n\
    clips.run();\nMultifieldValue mv = (MultifieldValue) clips.eval(\"?*WHODecisionCode*\"\
    );\nString WHODecision;\nList theList = mv.listValue();\nfor(Iterator itr = theList.iterator();\
    \ itr.hasNext();)\n{\nStringValue myValue = (StringValue) itr.next();\nWHODecision\
    \ = WHODecision + myValue.toString() + \" \";\n}\n```\n\nThe decision will be\
    \ available in the `WHODecision` variable.\n\nIf the reader could understand the\
    \ preceding CLIPS example, the rest of the examples will be straightforward to\
    \ understand."
  raw: '### CLIPS


