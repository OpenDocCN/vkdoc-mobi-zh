    # 3. Issues Faced While Porting Rules Engines


    We found a few issues while trying to write rules in each of the following rules
    engines. The reader should make a note of these issues .


    *   Jruleengine: It does not support `OR` operator.

    *   Zilonis: It doesn’t support `OR`, `defglobal`, or `bind` keywords, unlike
    CLIPS.

    *   DTRules: The facts have to be provided in an XML file, so running rules in
    an environment where facts have to be provided at runtime is complex and tedious.

    *   Termware: Rules have to be written in code itself.

    *   Roolie: Too many rules files need to be developed, and each rule needs to
    be coded in a separate Java file.

    *   JxBRE: `ElseIf` doesn’t work in XML files (we can use `Set` instead). Only
    one `If` works in the logic part of the rules file (.xml). Any one of `{Rule,
    Log, Logic, While, InvokeSet, ForEach, Retract}` is expected before an `If` element.

    *   JEOPS: The variables used as arguments for calling a function need to be initialized
    in rules file itself (by calling appropriate setter method).

    *   OpenRules: There is no document/readme explaining how to write rules .'
