    # 如何使用 SmartAppGen


    创建一个新的 Android 项目，提供主 Android 布局文件、主活动 Java 文件、`AndroidManifest.xml`、包含知识的 Excel
    表/文本文件，以及应用配置作为运行时参数传递给 `SmartAppGen` 并运行。所有生成的代码以及作为 `SmartAppGen` 一部分开发的可复用框架都会被复制到
    Android 项目中。只需刷新项目，执行清理构建并运行，您的知识应用即可部署。


    # SmartAppGen 的优势


    以下优势显而易见：


    * `SmartAppGen` 加速框架可将任何知识应用的开发时间显著缩短 30% 至 50%。

    * 通用框架（音频捕获器、文本转语音、照片捕获器、上传管理器、规则更新器等）可在任何 Android 项目中复用。


    # 9. AutoQuiz：从非结构化知识自动生成测验


    在本章中，我们将展示如何利用自然语言处理（NLP）技术，从知识中自动构建测验应用。NLP 提供了一种处理、理解并推导人类语言含义的方法。苹果的 SIRI、谷歌的
    Home、亚马逊的 Echo 以及微软的 Cortana 都是 NLP 系统的几个例子。


    为了验证用户对培训内容的学习效果，用户需要参加与培训材料相对应的测试，并且分数需达到公司或机构设定的阈值。


    此类测试中最耗时的环节之一就是问题的生成。问题通常需要由该领域的专家手动构建。此外，根据问题的性质和用户数量，答案验证也同样耗时。


    `AutoQuiz` 通过自动化生成问题来解决这一难题。我们从培训材料中提取知识，然后通过向用户呈现测验来验证其学习效果。


    `AutoQuiz` 接受基于文本的培训材料作为输入，这在大多数情况下是可行的，因为文本可以轻松从 PPT、PDF、Word 文档等各类文件中提取，并输入到
    `AutoQuiz` 知识管理系统中。


    `AutoQuiz` 系统包含两个组件：问题生成器以及用于显示测验和用户分数的知识应用。

