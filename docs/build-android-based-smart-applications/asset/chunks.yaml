    ## How to Use SmartAppGen


    Create a new Android project and provide main Android layout, main activity Java
    file, `AndroidManifest.xml`, Excel sheet/text file containing knowledge, and application
    configuration as runtime argument to SmartAppGen and run it. All codes get generated
    and copied along with reusable frameworks developed as part of SmartAppGen to
    the Android project. Just refresh the project and do a clean build and run it.
    Your knowledge application is ready for deployment.


    ## Benefits of SmartAppGen


    The following benefits can easily be observed:


    *   The SmartAppGen accelerator frameworks will significantly reduce time to develop
    any knowledge applications by 30 to 50 percent.

    *   The generic frameworks (audio capturer, text to speech, photo capturer, upload
    manager, rules updater, etc.) can be reused in any Android project.


    # 9. AutoQuiz: Automatically Generate Quiz from Unstructured Knowledge


    In this chapter, we will show how to automatically build a quiz application from
    knowledge using natural language processing (NLP) techniques. NLP provides a way
    to process, understand, and derive meaning from human language. Apple’s SIRI,
    Google’s Home, Amazon’s Echo, and Microsoft’s Cortana are few examples of NLP
    systems.


    To validate a user’s learning from a training, he or she needs to undergo a test
    corresponding to the training material and score above a threshold decided by
    the company or institute.


    One of the most time-consuming aspects of such testing is the generation of questions.
    They usually have to be constructed manually by experts in the subject. Furthermore,
    the validation of answers is time-consuming too, depending on the nature of the
    questions and the number of users.


    AutoQuiz solves this problem by automating the generation of questions. We extract
    the knowledge from the training materials and then validate the users’ learning
    by presenting them with the quizzes.


    AutoQuiz accepts text-based training material as input, which serves the purpose
    in most cases, since text can be easily extracted from various types of documents
    like PPT, PDF, Word doc, and so forth and fed into the AutoQuiz knowledge-management
    system.


    The AutoQuiz system has two components: the question generator and the knowledge
    application that displays the quiz and the score of the user.'
