- fmt: "## Porting Issues for Other Rules Engines\n\nThe reader might face the following\
    \ issues when porting other rules engines:\n\n* Drools: Eclipse runs out of memory\
    \ (500 MB) while converting it to dalvik format. Increasing the memory of Eclipse\
    \ did not solve the issue. The reader may try to use high-end machine (RAM > 4\
    \ GB).\n* JLisa: While running in Android, it throws a stack overflow issue. Reader\
    \ may contact JLisa support for a resolution.\n* Take: Need Java compiler at runtime.\
    \ Reader may contact Take support for Android compiler support.\n* Jess: Development\
    \ license costs around $15,000 (US).\n* OpenRules:\n  * Method `org.apache.poi.hssf.usermodel.HSSFSheet.autoSizeColumn`\
    \ in `poi-3.6-20091214.jar` uses class `java.awt.font.FontRenderContext`, which\
    \ is not available in Android.\n  * Method `com.googlecode.openbeans.StandardBeanInfo.getIcon`\
    \ uses class `java.awt.image`, which is not available in Android.\n  * While processing\
    \ decisions, garbage collection runs multiple times, indicating huge memory usage.\n\
    \  * Did not receive any response from the company OpenRules about the type of\
    \ commercial license supported and the cost of the license.\n\n## 4\\. Comparison\
    \ of Rules Engines for Mobile Platforms\n\nThis chapter contains a comparison\
    \ of rules engines used for developing on mobile platforms.\n\n### Summarizing\
    \ the Rules Engines\n\nOut of all nine rules engines evaluated for Android, CLIPS\
    \ is undoubtedly the most elegant, as it is fastest, free, and supports its own\
    \ rules programming language. It is followed by OpenRules, where rules can be\
    \ easily written in an Excel sheet, then by JEOPS, since algorithms can be easily\
    \ represented. Next would be Termware, since integrating rules with your application\
    \ is straightforward. Because of its portability, extensibility, and low cost,\
    \ CLIPS has been widely used by governments, private enterprises, and universities.\
    \ CLIPS has enabled the embedding of artificial intelligence into a wide range\
    \ of applications in diverse computing environments.\n\n### Comparison of Rules\
    \ Engines\n\nTable [4-1](#A459602_1_En_4_Chapter.html#Tab1) shows a comparison\
    \ of the rules engines.\n\n**Table 4-1** A Comparison of the Rules Engines in\
    \ This Book\n\n| Rules Engine | License | Language | Rules Syntax | Memory | Reasoning\
    \ | Multi-Threading | Scalability | Rating (1 to 5) |\n| --- | --- | --- | ---\
    \ | --- | --- | --- | --- | --- |\n| CLIPS | Public Domain | C | LISP like | 83\
    \ MB | Rete | No | Yes | 4 |\n| Jruleengine | LGPL | Java | *condition-action*\
    \ patterns | .03 MB | Rete | No | Yes | 3 |\n| DTRules | Apache 2.0 | Java | Excel\
    \ sheet | .54 MB | Proprietary | Yes | No | 4 |\n| Zilionis | GPL | Java | CLIPS\
    \ | .68 MB | Rete | Yes | Yes | 3 |\n| Termware | Special | Java | Java | .19\
    \ MB | Pattern Matching | Yes | Yes | 4 |\n| Roolie | LGPL | Java | XML | .59\
    \ MB | Proprietary | No | Yes | 3 |\n| OpenRules | GPL/Commercial GPL | Java |\
    \ Excel sheet | 2 MB | Proprietary | Yes | No | 4 |\n| JxBRE | GPL | Java | XML\
    \ | 1.44 MB | Proprietary | No | Yes | 3 |\n| JEOPS | LGPL | Java | *condition-action*\
    \ patterns | .03 MB | Rete | No | Yes | 4 |\n\n## 5\\. Requirements and Challenges\
    \ Faced in Knowledge Application Development\n\nKnowledge management is defined\
    \ as creating, sharing, using, and managing information for a system or organization.\n\
    \nIn this chapter, we will discuss the requirements, challenges, design, and implementation\
    \ of two knowledge management systems: SmartAppGen and AutoQuiz.\n\n### Introducing\
    \ SmartAppGen and AutoQuiz\n\nSmartAppGen automatically generates the corresponding\
    \ knowledge application from structured knowledge represented as XML, Excel sheets,\
    \ PPT, and so forth. For example, suppose a health worker needs to undergo training\
    \ for a few weeks. At the training, they have to go through hundreds of pages\
    \ of knowledge materials. What if a knowledge application is automatically built\
    \ using the knowledge available and then installed on their smartphone? The training\
    \ time could be reduced drastically; also, the health worker would not have to\
    \ remember hundreds of pages of documentation. They would not have to refer to\
    \ the printed guidelines from time to time to execute their daily routine. So,\
    \ it is clear that knowledge application can increase the efficiency and accuracy\
    \ of healthcare services.\n\nNot all knowledge is so well formatted that a knowledge\
    \ application can be automatically developed and installed on a smartphone. So,\
    \ people would still have to undergo training and remember the things learned\
    \ at training. AutoQuiz comes in handy in cases where knowledge (for instance,\
    \ training materials, presentations, and so on) is given in a text format. It\
    \ can generate a meaningful quiz from the unstructured knowledge. At the end of\
    \ any training or presentation, a quiz can be automatically generated, and all\
    \ participants can be asked to take the quiz. Then, their scores are immediately\
    \ calculated. This achieves three things: people would be more alert in training,\
    \ the trainer would get immediate feedback on the effectiveness of their training,\
    \ and the trainer/manager would know which people were falling short in understanding\
    \ and take appropriate measures to bring them up to the mark. This chapter will\
    \ help with automating the knowledge management of your company or institute.\n\
    \n### Developing Knowledge Applications\n\nTo design, develop, and deploy a knowledge\
    \ application, the steps shown in Figure [5-1](#A459602_1_En_5_Chapter.html#Fig1)\
    \ are executed.\n\n![A459602_1_En_5_Fig1_HTML.jpg](A459602_1_En_5_Fig1_HTML.jpg)\n\
    \n*Figure 5-1 Knowledge application development*\n\nHere are the main requirements\
    \ and challenges associated with a knowledge application:\n\n* Representing knowledge\
    \ in a digitized format and converting it into rules is a cumbersome and time-consuming\
    \ process.\n* The user interface can vary based on user profile. For example,\
    \ a user interface can be text based for tech savvy, icon based for semi-literate,\
    \ or voice based for illiterate users.\n* Data persistence and maintenance is\
    \ cumbersome and if not managed properly may result in application outage.\n*\
    \ The same application may need to be developed for multiple mobile phone platforms;\
    \ e.g., Android, iOS, and so forth.\n* Common features get implemented again and\
    \ again in such mobile applications, wasting thousands of development hours.\n\
    * Multiple languages may need to be supported.\n* Application installable may\
    \ need to be customized based on user profile.\n* Upgrading knowledge application\
    \ should be feasible over the air.\n\nLet us see in the next chapter how SmartAppGen\
    \ can automatically generate a knowledge application. We will also address the\
    \ challenges faced by knowledge application developers.\n\n## Part II: SmartAppGen:\
    \ Automatically Generate Knowledge Application from Structured Knowledge\n\n##\
    \ 6\\. Design and Implementation of SmartAppGen\n\nSmartAppGen is a set of frameworks\
    \ to help generate knowledge-based applications from structured knowledge automatically.\
    \ Structured knowledge can be provided in various formats, like an Excel sheet,\
    \ text, and XML.\n\n* Questions, rules, information, and so forth are extracted\
    \ from the document and saved as XML.\n* From the generated XML(s), the corresponding\
    \ Android layout, Android activity, CLIPS rules, and decision engine are generated.\n\
    * Various frameworks, like speech-to-text, audio capturer, photo capturer, upload\
    \ manager, and so forth are also automatically embedded into the project.\n* Generated\
    \ code frameworks are glued together to generate a full-fledged Android project\
    \ from a new Android project."
  raw: "## Porting Issues for Other Rules Engines\n\nThe reader might face the following\
    \ issues when porting other rules engines:\n\n*   Drools: Eclipse runs out of\
    \ memory (500 MB) while converting it to dalvik format. Increasing the memory\
    \ of Eclipse did not solve the issue. The reader may try to use high-end machine\
    \ (RAM > 4 GB).\n*   JLisa: While running in Android, it throws a stack overflow\
    \ issue. Reader may contact JLisa support for a resolution.\n*   Take: Need Java\
    \ compiler at runtime. Reader may contact Take support for Android compiler support.\n\
    *   Jess: Development license costs around $15,000 (US).\n*   OpenRules:\n   \
    \ *   Method `org.apache.poi.hssf.usermodel.HSSFSheet.autoSizeColumn` in `poi-3.6-20091214.jar`\
    \ uses class `java.awt.font.FontRenderContext`, which is not available in Android.\n\
    \    *   Method `com.googlecode.openbeans.StandardBeanInfo.getIcon` uses class\
    \ `java.awt.image`, which is not available in Android.\n    *   While processing\
    \ decisions, garbage collection runs multiple times, indicating huge memory usage\
    \ .\n    *   Did not receive any response from the company OpenRules about the\
    \ type of commercial license supported and the cost of the license.\n\n# 4. Comparison\
    \ of Rules Engines for Mobile Platforms\n\nThis chapter contains a comparison\
    \ of rules engines used for developing on mobile platforms.\n\n## Summarizing\
    \ the Rules Engines\n\nOut of all nine rules engines evaluated for Android, CLIPS\
    \ is undoubtedly the most elegant, as it is fastest, free, and supports its own\
    \ rules programming language. It is followed by OpenRules, where rules can be\
    \ easily written in an Excel sheet, then by JEOPS, since algorithms can be easily\
    \ represented. Next would be Termware, since integrating rules with your application\
    \ is straightforward. Because of its portability, extensibility, and low cost,\
    \ CLIPS has been widely used by governments, private enterprises, and universities.\
    \ CLIPS has enabled the embedding of artificial intelligence into a wide range\
    \ of applications in diverse computing environments.\n\n## Comparison of Rules\
    \ Engines\n\nTable [4-1](#A459602_1_En_4_Chapter.html#Tab1) shows a comparison\
    \ of the rules engines.\n\nTable 4-1\n\nA Comparison of the Rules Engines in This\
    \ Book\n\n| Rules Engine | License | Language | Rules Syntax | Memory | Reasoning\
    \ | Multi- Threading | Scalability | Rating (1 to 5) |\n| --- | --- | --- | ---\
    \ | --- | --- | --- | --- | --- |\n| CLIPS | Public Domain | C | LISP like | 83\
    \ MB | Rete | No | Yes | 4 |\n| Jruleengine | LGPL | Java | *condition-action*\
    \ patterns | .03 MB | Rete | No | Yes | 3 |\n| DTRules | Apache 2.0 | Java | Excel\
    \ sheet | .54 MB | Proprietary | Yes | No | 4 |\n| Zilionis | GPL | Java | CLIPS\
    \ | .68 MB | Rete | Yes | Yes | 3 |\n| Termware | Special | Java | Java | .19\
    \ MB | Pattern Matching | Yes | Yes | 4 |\n| Roolie | LGPL | Java | XML | .59\
    \ MB | Proprietary | No | Yes | 3 |\n| OpenRules | GPL/Commercial GPL | Java |\
    \ Excel sheet | 2 MB | Proprietary | Yes | No | 4 |\n| JxBRE | GPL | Java | XML\
    \ | 1.44 MB | Proprietary | No | Yes | 3 |\n| JEOPS | LGPL | Java | *condition-action*\
    \ patterns | .03 MB | Rete | No | Yes | 4 |\n\n# 5. Requirements and Challenges\
    \ Faced in Knowledge Application Development\n\nKnowledge management is defined\
    \ as creating, sharing, using, and managing information for a system or organization.\n\
    \nIn this chapter, we will discuss the requirements, challenges, design, and implementation\
    \ of two knowledge management systems: SmartAppGen and AutoQuiz.\n\n## Introducing\
    \ SmartAppGen and AutoQuiz\n\nSmartAppGen automatically generates the corresponding\
    \ knowledge application from structured knowledge represented as XML, Excel sheets,\
    \ PPT, and so forth. For example, suppose a health worker needs to undergo training\
    \ for a few weeks. At the training, they have to go through hundreds of pages\
    \ of knowledge materials. What if a knowledge application is automatically built\
    \ using the knowledge available and then installed on their smartphone? The training\
    \ time could be reduced drastically; also, the health worker would not have to\
    \ remember hundreds of pages of documentation. They would not have to refer to\
    \ the printed guidelines from time to time to execute their daily routine. So,\
    \ it is clear that knowledge application can increase the efficiency and accuracy\
    \ of healthcare services.\n\nNot all knowledge is so well formatted that a knowledge\
    \ application can be automatically developed and installed on a smartphone. So,\
    \ people would still have to undergo training and remember the things learned\
    \ at training. AutoQuiz comes in handy in cases where knowledge (for instance,\
    \ training materials, presentations, and so on) is given in a text format. It\
    \ can generate a meaningful quiz from the unstructured knowledge. At the end of\
    \ any training or presentation, a quiz can be automatically generated, and all\
    \ participants can be asked to take the quiz. Then, their scores are immediately\
    \ calculated. This achieves three things: people would be more alert in training,\
    \ the trainer would get immediate feedback on the effectiveness of their training,\
    \ and the trainer/manager would know which people were falling short in understanding\
    \ and take appropriate measures to bring them up to the mark. This chapter will\
    \ help with automating the knowledge management of your company or institute.\n\
    \n## Developing Knowledge Applications\n\nTo design, develop, and deploy a knowledge\
    \ application, the steps shown in Figure [5-1](#A459602_1_En_5_Chapter.html#Fig1)\
    \ are executed.\n\n![A459602_1_En_5_Fig1_HTML.jpg](A459602_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nKnowledge application development\n\nHere are the main requirements\
    \ and challenges associated with a knowledge application:\n\n*   Representing\
    \ knowledge in a digitized format and converting it into rules is a cumbersome\
    \ and time-consuming process.\n*   The user interface can vary based on user profile.\
    \ For example, a user interface can be text based for tech savvy, icon based for\
    \ semi-literate, or voice based for illiterate users .\n*   Data persistence and\
    \ maintenance is cumbersome and if not managed properly may result in application\
    \ outage.\n*   The same application may need to be developed for multiple mobile\
    \ phone platforms; e.g., Android, iOS, and so forth.\n*   Common features get\
    \ implemented again and again in such mobile applications, wasting thousands of\
    \ development hours.\n*   Multiple languages may need to be supported.\n*   Application\
    \ installable may need to be customized based on user profile.\n*   Upgrading\
    \ knowledge application should be feasible over the air.\n\nLet us see in the\
    \ next chapter how SmartAppGen can automatically generate a knowledge application.\
    \ We will also address the challenges faced by knowledge application developers.\n\
    \n# Part II\nSmartAppGen: Automatically Generate Knowledge Application from Structured\
    \ Knowledge\n\n# 6. Design and Implementation of SmartAppGen\n\nSmartAppGen is\
    \ a set of frameworks to help generate knowledge-based applications from structured\
    \ knowledge automatically. Structured knowledge can be provided in various formats,\
    \ like an Excel sheet, text, and XML.\n\n*   Questions, rules, information, and\
    \ so forth are extracted from the document and saved as XML.\n*   From the generated\
    \ XML(s), the corresponding Android layout, Android activity, CLIPS rules, and\
    \ decision engine are generated.\n*   Various frameworks, like speech-to-text,\
    \ audio capturer, photo capturer, upload manager, and so forth are also automatically\
    \ embedded into the project.\n*   Generated code frameworks are glued together\
    \ to generate a full-fledged Android project from a new Android project."
  trans: "\n## 其他规则引擎的移植问题\n\n读者在移植其他规则引擎时可能会遇到以下问题：\n\n* **Drools**：转换为 dalvik 格式时，Eclipse\
    \ 内存溢出（500 MB）。增加 Eclipse 的内存未能解决该问题。读者可尝试使用高端机器（RAM > 4 GB）。\n* **JLisa**：在 Android\
    \ 上运行时，会抛出堆栈溢出问题。读者可联系 JLisa 支持团队寻求解决方案。\n* **Take**：运行时需要 Java 编译器。读者可联系 Take\
    \ 支持团队获取 Android 编译器支持。\n* **Jess**：开发许可证费用约为 15,000 美元。\n* **OpenRules**：\n \
    \ * `poi-3.6-20091214.jar` 中的方法 `org.apache.poi.hssf.usermodel.HSSFSheet.autoSizeColumn`\
    \ 使用了类 `java.awt.font.FontRenderContext`，而该类在 Android 中不可用。\n  * 方法 `com.googlecode.openbeans.StandardBeanInfo.getIcon`\
    \ 使用了类 `java.awt.image`，而该类在 Android 中不可用。\n  * 在处理决策时，垃圾回收会运行多次，表明内存使用量巨大。\n\
    \  * 未收到 OpenRules 公司关于其商业许可证类型及费用的任何回复。\n\n## 4\\. 移动平台规则引擎比较\n\n本章包含用于移动平台开发的规则引擎的比较。\n\
    \n### 规则引擎总结\n\n在所有为 Android 评估的九个规则引擎中，**CLIPS** 无疑是最出色的，因为它速度最快、免费，并且支持自己的规则编程语言。其次是\
    \ **OpenRules**，其规则可以轻松地在 Excel 表中编写；然后是 **JEOPS**，因为算法可以很容易地表示。接下来是 **Termware**，因为将规则与应用程序集成非常直接。由于其可移植性、可扩展性和低成本，CLIPS\
    \ 已被政府、私营企业和大学广泛使用。CLIPS 使得将人工智能嵌入到各种计算环境中的广泛应用成为可能。\n\n### 规则引擎比较\n\n表 4-1 显示了规则引擎的比较。\n\
    \n**表 4-1** 本书中规则引擎的比较\n\n| 规则引擎 | 许可证 | 语言 | 规则语法 | 内存 | 推理 | 多线程 | 可扩展性 | 评分（1\
    \ 到 5） |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| CLIPS | 公共领域\
    \ | C | 类似 LISP | 83 MB | Rete | 否 | 是 | 4 |\n| Jruleengine | LGPL | Java | *条件-动作*模式\
    \ | .03 MB | Rete | 否 | 是 | 3 |\n| DTRules | Apache 2.0 | Java | Excel 表 | .54\
    \ MB | 专有 | 是 | 否 | 4 |\n| Zilionis | GPL | Java | CLIPS | .68 MB | Rete | 是 |\
    \ 是 | 3 |\n| Termware | 特殊 | Java | Java | .19 MB | 模式匹配 | 是 | 是 | 4 |\n| Roolie\
    \ | LGPL | Java | XML | .59 MB | 专有 | 否 | 是 | 3 |\n| OpenRules | GPL/商业 GPL |\
    \ Java | Excel 表 | 2 MB | 专有 | 是 | 否 | 4 |\n| JxBRE | GPL | Java | XML | 1.44\
    \ MB | 专有 | 否 | 是 | 3 |\n| JEOPS | LGPL | Java | *条件-动作*模式 | .03 MB | Rete | 否\
    \ | 是 | 4 |\n\n## 5\\. 知识应用开发中的需求与挑战\n\n知识管理被定义为为一个系统或组织创建、共享、使用和管理信息。\n\n在本章中，我们将讨论两个知识管理系统——**SmartAppGen**\
    \ 和 **AutoQuiz** 的需求、挑战、设计与实现。\n\n### 介绍 SmartAppGen 和 AutoQuiz\n\nSmartAppGen\
    \ 能够从表示为 XML、Excel 表、PPT 等形式的结构化知识中自动生成相应的知识应用。例如，假设一名卫生工作者需要接受为期数周的培训。在培训中，他们需要阅读数百页的知识材料。如果能够利用现有知识自动构建一个知识应用并安装到他们的智能手机上，会怎么样？培训时间可以大幅缩短；此外，卫生工作者也不必记住数百页的文档。他们也无需时不时地翻阅打印的指南来执行日常工作。因此，很明显，知识应用可以提高医疗服务的效率和准确性。\n\
    \n并非所有的知识都有良好的格式，以至于可以自动开发并安装到智能手机上。因此，人们仍然需要接受培训并记住培训中学到的东西。当知识（例如培训材料、演示文稿等）以文本格式提供时，AutoQuiz\
    \ 就派上了用场。它可以从非结构化的知识中生成有意义的测验。在任何培训或演示结束时，可以自动生成一个测验，并要求所有参与者参加。然后，他们的分数会立即计算出来。这达到了三个目的：人们会在培训中更加警觉，培训师可以立即获得关于其培训效果的反馈，并且培训师/经理可以知道哪些人在理解上有所欠缺，并采取适当措施让他们达到标准。本章将帮助您自动化公司或机构的知识管理。\n\
    \n### 开发知识应用\n\n要设计、开发和部署一个知识应用，需要执行图 5-1 中所示的步骤。\n\n![A459602_1_En_5_Fig1_HTML.jpg](img/A459602_1_En_5_Fig1_HTML.jpg)\n\
    \n*图 5-1 知识应用开发*\n\n以下是知识应用相关的核心需求与挑战：\n\n* 将知识表示为数字化格式并将其转换为规则是一个繁琐且耗时的过程。\n\
    * 用户界面可能因用户画像而异。例如，对于精通技术的用户，用户界面可以是基于文本的；对于半文盲用户，可以是基于图标的；对于文盲用户，可以是基于语音的。\n\
    * 数据持久化和维护很繁琐，如果管理不当，可能导致应用程序中断服务。\n* 同一个应用程序可能需要为多个手机平台开发，例如 Android、iOS 等。\n\
    * 常见功能在这种移动应用程序中一再被重复实现，浪费了数千小时的开发时间。\n* 可能需要支持多种语言。\n* 可能需要根据用户画像定制应用程序的安装包。\n\
    * 知识应用应能通过无线方式进行升级。\n\n让我们在下一章中看看 SmartAppGen 如何自动生成知识应用。我们还将探讨知识应用开发者面临的挑战。\n\
    \n## 第二部分：SmartAppGen：从结构化知识自动生成知识应用\n\n## 6\\. SmartAppGen 的设计与实现\n\nSmartAppGen\
    \ 是一套框架，旨在帮助从结构化知识中自动生成基于知识的应用程序。结构化知识可以以多种格式提供，例如 Excel 表、文本和 XML。\n\n* 从文档中提取问题、规则、信息等内容，并保存为\
    \ XML。\n* 根据生成的 XML，生成相应的 Android 布局、Android Activity、CLIPS 规则和决策引擎。\n* 各种框架，如语音转文本、音频捕获器、照片捕获器、上传管理器等，也会自动嵌入到项目中。\n\
    * 生成的代码框架被整合在一起，从一个新的 Android 项目生成一个功能完整的 Android 项目。\n"
- fmt: '# 7. Architecture of SmartAppGen


    We came up with a three-tier high-level and low-level architecture for SmartAppGen.
    See Figure [7-1](#A459602_1_En_7_Chapter.html#Fig1).


    ![A459602_1_En_7_Fig1_HTML.jpg](A459602_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    High-level SmartAppGen architecture


    A complex knowledge application needs to support social networking, image and
    voice processing, over-the-air upgrade capabilities, and persistence-management
    functionalities. So, SmartAppGen must be able to generate such functionalities.


    Based on the application workflow, we came up with a low-level architecture for
    SmartAppGen.


    Figure [7-2](#A459602_1_En_7_Chapter.html#Fig2) describes all components of SmartAppGen
    present in the presentation, application, and data tiers.


    ![A459602_1_En_7_Fig2_HTML.jpg](A459602_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Low-level architecture


    Let us describe each of the components in detail.


    ## Model Code Generator


    This framework generates the code representing the model for the knowledge/guideline
    (e.g., `GuidelineData.java`).


    ## View Code Generator


    This framework generates the user interface code (e.g., `Guidelinescreen.java`)
    for the knowledge/guideline.


    ## Controller Code Generator


    This framework generates the controller code for the knowledge guideline (e.g.,
    `Mainactivity.java`).


    ## Question Extractor


    This block extracts the guideline type (decisive/informative), questions, answer
    types, and answer values and builds `question.xml` automatically.


    ## Context Manager Generator


    This framework generates a context manager corresponding to the knowledge application.


    ## Rules Generator


    This framework converts the digitized guidelines to rules. For each guideline,
    a set of rules files are generated. In the `DTRules` rules engine, decisions are
    represented in an Excel sheet. `Excel2XML` converts decisions to XML files that
    are processed by the rules engine. In `CLIPS`, a rules header can easily be generated
    from the registration information and questions. The developer would have to just
    codify the remaining part of the rules.


    ## Language Translator


    This framework provides support for translating the application text into multiple
    languages.


    ## Persistence Helper


    This framework will help with persisting the application data to a local database.


    ## Interaction to XML Converter


    This framework converts the user interactions (e.g., model) to XML.


    ## Rules Upgrader


    This framework will help upgrade rules over the air.


    ## Cwac-updater


    This open source framework [1] can be used to upgrade Android applications over
    the air.


    ## Voice-to-Text Converter


    This framework will convert a user’s voice to text.


    ## Text-to-Voice Converter


    This framework will help convert text to voice and help the application interact
    with users via voice.


    ## Photo Capturer


    This is a generic framework to capture photos.


    ## Audio Capturer


    This is a generic framework for capturing audio for voice recording or any other
    purpose.


    ## Chat Framework


    This framework enables the chat functionality.


    ## Edge Intelligence Framework


    This framework needs to be built on top of the rules engine and helps the application
    communicate with the rules engine with ease.


    ## REST Client


    This framework will help the application make use of restful web services exposed
    by any `JAX-RS`–compliant server.


    ## Installation Manager


    This framework ensures that the appropriate components and accessories are packaged
    in the installable based on the profile of the user.


    # 8. Example of Generating Knowledge Application from Knowledge


    Figure [8-1](#A459602_1_En_8_Chapter.html#Fig1) represents knowledge from which
    one can derive a list of medical tests a patient needs to undergo based on the
    symptoms of the patient.


    ![A459602_1_En_8_Fig1_HTML.jpg](A459602_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Knowledge in Excel sheet


    From the Excel sheet depicted in Figure [8-1](#A459602_1_En_8_Chapter.html#Fig1),
    corresponding Android layout and `CLIPS` rules files are generated.


    ## Android Layout Corresponding to Knowledge


    The Android layout XML is provided here for the sake of completeness.


    ```

    ----snipped----------------------------------------------------

    ```


    Figure [8-2](#A459602_1_En_8_Chapter.html#Fig2) depicts the Android screen corresponding
    to the preceding layout code.


    ![A459602_1_En_8_Fig2_HTML.jpg](A459602_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Generated Android screen


    An XML file is automatically generated using, with results as follows:


    ![A459602_1_En_8_Figa_HTML.jpg](A459602_1_En_8_Figa_HTML.jpg)


    Using the XML, a `CLIPS` rule is generated automatically. The code snippet that
    generates the `CLIPS` rule is as follows:


    ![A459602_1_En_8_Figc_HTML.jpg](A459602_1_En_8_Figc_HTML.jpg)


    ![A459602_1_En_8_Figb_HTML.jpg](A459602_1_En_8_Figb_HTML.jpg)


    ## CLIPS Rules File Corresponding to Knowledge


    The reader is advised to go through the `CLIPS` basic programming guide to get
    a good grasp of `CLIPS` rules syntax [23].


    ```

    (defglobal ?*Chief_Complaint__Chest_Pain_DecisionString* = (create$))

    (deftemplate Chief_Complaint__Chest_Pain_message

    (slot decisionString)

    )

    (deftemplate Chief_Complaint__Chest_Pain_data

    (slot pain_exertion)

    (slot pain_radiate_neck_jaw_arms)

    (slot pain_squeezing_tightness_quality)

    (slot it_accompanied_shortness_breath_sweating_feeling_clamminess_nausea_indigestion)

    (slot If_pain_anginal_nature_it_last_more_than_15_30_minutes)

    (slot Can_pain_be_reproduced_movement_arms_torso_pushing_certain_area_chest)

    (slot pain_made_worse_deep_breathing)

    (slot pain_brought_eating_lying_down_it_relieved_antacids)

    )

    (defrule print_message_Chief_Complaint__Chest_Pain

    (Chief_Complaint__Chest_Pain_message(decisionString ?a))

    =>

    (bind ?*Chief_Complaint__Chest_Pain_DecisionString* (create$ ?*Chief_Complaint__Chest_Pain_DecisionString*
    ?a))

    )

    (defrule Chief_Complaint__Chest_Pain_EKG

    (or

    (Chief_Complaint__Chest_Pain_data(pain_exertion yes))

    (Chief_Complaint__Chest_Pain_data(pain_radiate_neck_jaw_arms yes))

    (Chief_Complaint__Chest_Pain_data(pain_squeezing_tightness_quality yes))

    (Chief_Complaint__Chest_Pain_data(it_accompanied_shortness_breath_sweating_feeling_clamminess_nausea_indigestion
    yes))

    (Chief_Complaint__Chest_Pain_data(If_pain_anginal_nature_it_last_more_than_15_30_minutes
    yes))

    )

    =>

    (assert (Chief_Complaint__Chest_Pain_message(decisionString "EKG")))

    )

    (defrule Chief_Complaint__Chest_Pain_No_Test

    (Chief_Complaint__Chest_Pain_data(pain_exertion no))

    (Chief_Complaint__Chest_Pain_data(pain_radiate_neck_jaw_arms no))

    (Chief_Complaint__Chest_Pain_data(pain_squeezing_tightness_quality no))

    (Chief_Complaint__Chest_Pain_data(Can_pain_be_reproduced_movement_arms_torso_pushing_certain_area_chest
    no))

    (Chief_Complaint__Chest_Pain_data(pain_made_worse_deep_breathing no))

    (Chief_Complaint__Chest_Pain_data(pain_brought_eating_lying_down_it_relieved_antacids
    yes))

    (Chief_Complaint__Chest_Pain_data(it_accompanied_shortness_breath_sweating_feeling_clamminess_nausea_indigestion
    no))

    (Chief_Complaint__Chest_Pain_data(If_pain_anginal_nature_it_last_more_than_15_30_minutes
    no))

    =>

    (assert (Chief_Complaint__Chest_Pain_message(decisionString "No Test")))

    )

    (defrule Chief_Complaint__Chest_Pain_chest_x-ray

    (or

    (Chief_Complaint__Chest_Pain_data(Can_pain_be_reproduced_movement_arms_torso_pushing_certain_area_chest
    yes))

    (Chief_Complaint__Chest_Pain_data(pain_made_worse_deep_breathing yes))

    )

    =>

    (assert (Chief_Complaint__Chest_Pain_message(decisionString "chest x-ray")))

    )

    ```'
  raw: '# 7. Architecture of SmartAppGen


    We came up with a three-tier high-level and low-level architecture for SmartAppGen.
    See Figure [7-1](#A459602_1_En_7_Chapter.html#Fig1).


    ![A459602_1_En_7_Fig1_HTML.jpg](A459602_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    High-level SmartAppGen architecture


    A complex knowledge application needs to support social networking, image and
    voice processing, over-the-air upgrade capabilities, and persistence-management
    functionalities. So, SmartAppGen must be able to generate such functionalities.


    Based on the application workflow, we came up with a low-level architecture for
    SmartAppGen.


    Figure [7-2](#A459602_1_En_7_Chapter.html#Fig2) describes all components of SmartAppGen
    present in the presentation, application, and data tiers.


    ![A459602_1_En_7_Fig2_HTML.jpg](A459602_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Low-level architecture


    Let us describe each of the components in detail.


    ## Model Code Generator


    This framework generates the code representing the model for the knowledge/guideline
    (e.g., GuidelineData.java).


    ## View Code Generator


    This framework generates the user interface code (e.g., Guidelinescreen.java)
    for the knowledge/guideline.


    ## Controller Code Generator


    This framework generates the controller code for the knowledge guideline (e.g.,
    Mainactivity.java).


    ## Question Extractor


    This block extracts the guideline type (decisive/informative), questions, answer
    types, and answer values and builds question.xml automatically.


    ## Context Manager Generator


    This framework generates a context manager corresponding to the knowledge application.


    ## Rules Generator


    This framework converts the digitized guidelines to rules. For each guideline,
    a set of rules files are generated. In the DTRules rules engine, decisions are
    represented in an Excel sheet. Excel2XML converts decisions to XML files that
    are processed by the rules engine. In CLIPS, a rules header can easily be generated
    from the registration information and questions. The developer would have to just
    codify the remaining part of the rules.


    ## Language Translator


    This framework provides support for translating the application text into multiple
    languages.


    ## Persistence Helper


    This framework will help with persisting the application data to a local database.


    ## Interaction to XML Converter


    This framework converts the user interactions (e.g., model) to XML.


    ## Rules Upgrader


    This framework will help upgrade rules over the air.


    ## Cwac-updater


    This open source framework [1] can be used to upgrade Android applications over
    the air.


    ## Voice-to-Text Converter


    This framework will convert a user’s voice to text.


    ## Text-to-Voice Converter


    This framework will help convert text to voice and help the application interact
    with users via voice.


    ## Photo Capturer


    This is a generic framework to capture photos.


    ## Audio Capturer


    This is a generic framework for capturing audio for voice recording or any other
    purpose.


    ## Chat Framework


    This framework enables the chat functionality.


    ## Edge Intelligence Framework


    This framework needs to be built on top of the rules engine and helps the application
    communicate with the rules engine with ease.


    ## REST Client


    This framework will help the application make use of restful web services exposed
    by any JAX-RS–compliant server.


    ## Installation Manager


    This framework ensures that the appropriate components and accessories are packaged
    in the installable based on the profile of the user.


