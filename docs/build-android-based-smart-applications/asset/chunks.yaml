- fmt: '# What Is a Rules Engine?


    A rules engine is software that executes one or more rules in a runtime production
    environment, and each rules engine has its own proprietary rule-storage formats
    with varying features. Today, rules engines are used in domains such as finance,
    healthcare, retail, manufacturing, and so on.


    Rules engines are becoming increasingly popular for the following reasons:


    - Separation of business logic from application

    - Rules can be managed separately from application code.

    - Ease of writing rules for domain experts


    Rules engines allow more flexibility in applications. Applications can be rolled
    out much faster using rules engines. Other advantages include understandable rules,
    tool integration, speed, scalability, and declarative programming.


    Android has become the number one mobile platform (Figure [1-1](#A459602_1_En_1_Chapter.html#Fig1))
    [5]. As the need for context-aware intelligent applications grows, rules engines
    are bound to be integrated into more and more Android applications.


    The main contribution of this chapter is the evaluation of nine rules engines
    on the Android platform. This chapter describes each of the rules engines in detail
    and provides a summary of each. Nine rules engines are evaluated and compared
    against each other for various aspects like license, language, rules, reasoning,
    multi-threading support, scalability, and so on. The chapter concludes with our
    recommendation about the rules engine best suited for Android platform.


    ![A459602_1_En_1_Fig1_HTML.jpg](A459602_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Smartphone sales


    ## CLIPS


    `CLIPS` [6] is a rules engine written in C language. It is the most widely used
    rules engine as it is fast and free.


    It is portable and can easily be integrated with software written in `C`, `Java`,
    `FORTRAN`, and `ADA`. Wide varieties of complex knowledge can be represented using
    `CLIPS` rules. The software is available in the public domain, making it the choice
    of the industry. Here is a summary of the rules engine (Figure [1-2](#A459602_1_En_1_Chapter.html#Fig2)).


    - License type: Public domain

    - Language: `C`

    - Works on Android: Yes

    - Rules Syntax: Lisp-like

    - Memory Footprint: 0.83 MB

    - Reasoning Method: `Rete` [22]

    - Supports multi-threading: No

    - Easy to scale the rules engine: Yes, with average time to run being 17.4 milliseconds


    ![A459602_1_En_1_Fig2_HTML.jpg](A459602_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    CLIPS rules engine


    ## JRuleEngine


    `JRuleEngine` [7] is a Java-based rules engine that employs a forward-chaining
    algorithm and is designed as per `JSR 94` specifications. Rules are defined in
    an `XML` file.


    There are two kinds of rules. One is a stateful rules session that remembers the
    state of facts and can be queried repetitively. The other is a stateless rules
    session, which gives good performance but does not remember the state of facts.


    The rules engine uses a set of input objects and generates a set of output objects.
    Here is a summary of the rules engine:


    - License type: Open source, `LGPL`

    - Language: `Java`

    - Works on Android: Yes

    - Rules Syntax: Condition-action pattern

    - Memory Footprint: 0.062660217 MB

    - Reasoning Method: Forward-chaining algorithm

    - Supports multi-threading: Yes

    - Easy to scale the rules engine: Yes, with average time to run being 0.24163
    seconds


    ## DTrules


    `DTrules` [8] is a Java-based high-performance rules engine.


    Rules are in the form of decision tables, which provide a simple way to describe
    logic in a tabular form. Unbalanced decision tables are supported, which reduces
    the effort required to build them. `DTRules` can be easily integrated into Java
    applications.


    It supports domain-specific language (`DSL`). It has a small memory footprint.
    Here is a summary of the rules engine:


    - License type: Open source (Apache 2.0 Open Source License)

    - Language: `Java`

    - Works on Android: Yes

    - Rules Syntax: Decision table

    - Memory Footprint: 0.540092468 MB

    - Reasoning Method: Uses a structured set of data and a set of decision Tables
    to implement policy rules

    - Supports multi-threading: Yes

    - Easy to scale the rules engine: No


    ## Zilonis


    `Zilonis` [9] is a multi-threaded rules engine. It is based on a variation of
    the forward-chaining `Rete` algorithm. Its rules representation language is similar
    to `LISP`. It also provides a scripting environment for Java-based applications.


    Here is a summary of the rules engine:


    - License type: `GPL`

    - Language: `Java`

    - Works on Android: Yes

    - Rules Syntax: Similar to `Lisp`

    - Memory Footprint: 0.683494568 MB

    - Reasoning Method: A variation of the forward-chaining `Rete` algorithm

    - Supports multi-threading: Yes

    - Easy to scale the rules engine in cloud: Yes, with average time to run being
    0.65863 seconds


    ## Termware


    `Termware` [9] is a rule-processing framework that can be easily embedded in Java
    applications. It has a formal semantic model based on the concept of a term system
    with actions. It allows extreme flexibility in applications for high adaptability
    to a changeable environment, easy re-engineering, and component reuse. Here is
    a summary of the rules engine:


    - License type: Other

    - Language: `Java`

    - Works on Android: Yes

    - Rules Syntax: Proprietary

    - Memory Footprint: 0.195205688 MB

    - Reasoning Method: One object, many patterns matching approach

    - Supports multi-threading: Yes

    - Easy to scale the rules engine: Yes, with average time to run being 11.3892
    seconds.


    ## Roolie


    `Roolie` [11] is an extremely simple Java rules engine. It is a non-`JSR 94` rule
    engine designed particularly to use rules created in Java. Basic rules are written
    in separate Java files and are chained together in an `XML` file to create more-complex
    rules. Here is a summary of the rules engine:


    - License type: Open source `LGPL`

    - Language: `Java`

    - Works on Android: Yes

    - Rules Syntax: `XML`

    - Memory Footprint: 0.594 MB (608 KB)

    - Reasoning Method: Proprietary

    - Supports multi-threading: No

    - Easy to scale the rules engine: Yes, with average time to run being 2.87 seconds


    ## OpenRules


    `OpenRules` [12] is a business decision management system (`BDMS`) that provides
    rules-based application development. It works in a simple Java `OpenRules` API
    or the standard `JSR-94` interface. It is used to create decision support systems
    that can be used to create, execute, and maintain business rules in applications.
    Rules are specified in Excel files in the form of decision tables, removing the
    learning part for its users as it just requires familiarity with MS Excel. It
    allows you to change the business rules/logic in the Excel sheet at runtime without
    the need to deploy it again. It supports parallelism, enabling it to work in multi-threaded
    environments. Figure [1-3](#A459602_1_En_1_Chapter.html#Fig3) depicts the `OpenRules`
    workflow.


    ![A459602_1_En_1_Fig3_HTML.jpg](A459602_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    OpenRules rules engine


    Here is a summary of the rules engine:


    - License type: Both open source (`GPL`) and commercial (Non-`GPL`)

    - Language: `Java`

    - Works on Android: Yes

    - Rules Syntax: Decision tables in Excel files

    - Memory Footprint: 2 MB

    - Reasoning Method: Proprietary

    - Supports multi-threading: Yes

    - Easy to scale the rules engine: No


    ## JxBRE


    `JxBRE` [13] is a lightweight Java-based business rules engine (`BRE`). Rules
    are written in an `XML` file along with logic defining the flow of the application
    based on the execution of rules. It is both a forward-chaining, data-driven inference
    engine and an `XML`-driven flow-control engine. Here is a summary of the rules
    engine:


    - License type: `GPL`

    - Language: `Java`

    - Works on Android: Yes

    - Rules Syntax: `XML`

    - Memory Footprint: 1.44 MB (1474 KB)

    - Reasoning Method: Proprietary

    - Supports multi-threading: No

    - Easy to scale the rules engine: Yes, with average time to run being 2.57 seconds'
