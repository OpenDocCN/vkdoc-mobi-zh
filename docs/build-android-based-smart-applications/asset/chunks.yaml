- fmt: '# Part I: Rules Engines


    ## 1. Which Rules Engine Is Best for Building Smart Applications?


    Let us now evaluate rules engines based on agility, scalability, and usability
    and decide which is best suited for developing smart applications. We’ll start
    by defining what a rules engine is.


    Rules engines help embed intelligence into an application. The intelligence can
    be updated on the fly. Readers should be aware of programming calculators. Rules
    engines can be thought of as much more sophisticated versions of such calculators.
    `CLIPS` can be downloaded from Source Forge [24].


    ```

    java -jar CLIPSJNI.jar

    CLIPS> (+ 3 4)


    CLIPS> (defglobal ?*x* = 3)

    CLIPS> ?*x*


    CLIPS> red

    red

    CLIPS> (bind ?a 5)


    CLIPS> (+ ?a 3)


    CLIPS> (reset)

    CLIPS> ?a

    [EVALUATN1] Variable a is unbound

    FALSE

    CLIPS>

    ```


    Sample code is taken from [23]. There are diverse types of rules engines written
    in Java that vary widely in functionality and concept. The revenue from business
    rules engines exceeded $460 million in 2011 [1]. The total market size for the
    mobile application market will be as big as $25 billion by 2015 [2]. As per Gartner,
    developing context-aware mobile applications is one of the top trends [3].


    Mobile applications are becoming increasingly complex. This is making way for
    rules engines on mobile platforms. Rules engines can help keep business logic
    separate from application logic. At this point in time, not many rules engines
    are known to work on mobile platforms. We have ported and evaluated nine rules
    engines: `CLIPS`, `OpenRules`, `JXBRE`, `JEOPS`, `Roolie`, `Termware`, `JRuleEngine`,
    `Zilonis`, and `DTRules` in Android. This chapter provides a detailed description,
    step-by-step porting guides, and sample working code for each of the rules engines.
    We also discuss the issues faced while attempting to port other popular rules
    engines, like `Drools`, `JLisa`, `Take`, and `Jess`. We compared the rules engines
    based on licensing, language used to develop, rules syntax, reasoning method,
    multi-threading support, scalability, and so on in Android [4]. If you are trying
    to use a rules engine in a mobility project, this chapter can save more than four
    staff weeks of effort.'
