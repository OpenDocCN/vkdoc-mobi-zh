  trans: '

    # 未来工作


    命名实体识别软件可用于细化“谁/什么”类问题，使其更具针对性。这将有助于用户理解问题，同时提升问题质量。这些数据可用于生成高度专业化的问题，例如：谁、什么、何时、多少等。此外，它还将有助于识别句子的主语。


    另一项可改进之处是允许出题者选择用于生成问题的句子，而非使用所有句子。一个关键标准可以是句子中是否存在对问题至关重要的特定词性标注的词。


    此外，复合句既可以拆分为两个独立的句子，也可以直接用作问答对。例如：


    输入句子：


    - “乔去了厨房，因为他饿了。”

    - (“乔去了厨房。”) + (“他饿了。”)

    - 可能的问题：

    - “谁去了厨房？”

    - “谁饿了？”

    - “乔为什么去厨房？”（答案：“因为他饿了”）


    然而，这类问题要求程序对句子有更深的理解。第一步应以能够识别句子主干和修饰部分的方式来解析句子。可以使用`OpenNLP`解析器来确定句子结构。例如：


    输入句子：“敏捷的棕色狐狸跳过了那只懒狗。”


    输出：


    ```

    (TOP

    (NP

    (NP

    (DT The)

    (JJ quick)

    (JJ brown)

    (NN fox)

    (NNS jumps)

    )

    (PP

    (IN over)

    (NP

    (DT the)

    (JJ lazy)

    (NN dog)

    )

    )

    (. .)

    ```


    `PP`、`IN`、`JJ`等是来自 Penn 树库标签集[20]的词性标注。以这种方式解析的句子有助于计算机理解句子的结构，并帮助它们生成比简单操作原始句子更具创造性的问题。


    此外，以这种方式解析的句子有助于从句子中提取知识。知识可以以规则的形式存储（例如，`CLIPS`[19]是一种规则引擎）。这些规则可以作为谓词，用于推导结论。这些结论将作为新规则存储，也可以输出为问题。


    企业需要规划知识管理自动化。“知识应用”可以从现有的结构化知识中自动生成。此类应用可以帮助知识工作者更好地完成日常工作。这将显著减少培训人员所需的时间，并提高知识工作者的效率和准确性。


    在培训员工掌握非结构化知识方面，公司每年花费数百万美元；许多培训效果不佳，白白浪费了这些资金。实施 AutoQuiz 可以确保员工真正理解培训或演示中分享的知识。项目经理可以评估培训或演示的效果（例如，哪些培训是重复的，哪位员工学习慢，哪位培训师效果不佳等），并采取相应措施。


    # iEmergency


    在大多数发展中国家，如果一个人遇到紧急情况——例如被抢劫、被殴打、被骚扰、在陌生地方迷路、遭遇事故、需要安全指南等——几乎都难以及时获得帮助。一个人处于紧急情况的时间越长，失去生命或财产的可能性就越大。在印度这样的国家，警察与民众的比例为
    125:100000，而且在高峰时段道路严重拥堵。因此，大多数情况下警方无法快速到达犯罪现场。警方通常需要两个多小时才能到达犯罪现场！此外，据观察，普通民众要么不感兴趣，要么过于害怕，担心遭到罪犯攻击，而不愿向有需要的人提供紧急帮助。这给受害者造成了重大的身体、情感和经济损失，甚至可能导致死亡。


    拟议的系统`iEmergency`旨在通过一个注册的紧急救援提供者网络，向受害者提供现场紧急帮助。受害者可以使用智能手机发起紧急求助请求。移动网络利用基于位置的服务找到附近的紧急救援提供者并通知他们。紧急救援提供者前往受害者处并提供所需援助。在帮助完成并令受害者满意后，将从受害者账户中扣除固定金额，并分发给那些回应请求并在规定时间内提供现场帮助的紧急救援提供者。


    ## 方法


    当一个人面临紧急情况时，他或她可以使用智能手机中安装的应用程序发起紧急帮助请求。请求者需要选择所需的紧急援助类型。紧急情况的详细信息以及请求者的位置（例如，`GPS`/`GPRS`）会上传到`iEmergency`服务器。人们可以根据自身能力选择和注册各种类型的紧急服务。例如，住在高速公路附近的人可以注册为事故救援服务提供者，退休的军人或警察可以注册为轻微犯罪预防服务提供者，热心社会服务的人可以注册为医院陪护人员等。服务器会识别请求者位置指定半径内可用的、符合其所需帮助类型的紧急救援人员。服务器根据人员面临的紧急情况类型确定所需的紧急救援人员数量，并将紧急情况和请求者的详细信息（姓名、位置和照片）发送给紧急救援人员。紧急救援人员会收到类似“`<姓名>`先生/女士（`<手机号码>`）在`<地点>`遇到`<类型>`紧急情况”的消息。紧急救援人员可以在地图上查看请求者的当前位置。紧急救援人员可以接受或拒绝服务请求。


    如果紧急救援人员接受了请求，他或她可以检索与请求者相关的音频/视频文件，并收集更多关于其位置和紧急情况类型的信息。请求者端应用程序具有上传音频或视频文件的功能。他或她可以录制紧急消息并将音频上传到服务器，以便救援人员可以下载。紧急救援人员会尽量靠近请求者的位置，并大声呼喊其姓名或使用手机拨打电话联系他。服务器会定期接收可用紧急救援人员的位置信息，以便在发生任何紧急事件时，服务器知道他们的位置。

