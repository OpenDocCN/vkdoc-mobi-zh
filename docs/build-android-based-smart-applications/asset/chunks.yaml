- fmt: '# iFitness


    Many times, when a user is exercising—for example, running on a treadmill—he or
    she either runs too slow or runs too fast, making the workout ineffective or harmful.


    Develop an Android application to help the user measure the effectiveness of his
    or her fitness program. Let the user wear a strap (Figure [11-6](#A459602_1_En_11_Chapter.html#Fig6))
    that transmits vital parameters, like number of steps, speed, heart rate, and
    so forth, to an Android application over Bluetooth. Configure the exercise mode
    as depicted in Figure [11-7](#A459602_1_En_11_Chapter.html#Fig7)).


    ![A459602_1_En_11_Fig7_HTML.jpg](A459602_1_En_11_Fig7_HTML.jpg)

    Figure 11-7 iFitness main screen


    ![A459602_1_En_11_Fig6_HTML.jpg](A459602_1_En_11_Fig6_HTML.jpg)

    Figure 11-6 Zephyr strap


    In the settings, configure upper and lower thresholds of speed for each of the
    categories. For example, “FAT BURN” speed can be between 10 and 20 km/hour. Also
    define what is considered the “above normal” threshold for heart rate. In addition
    to that, advise the user based on his or her speed and selected exercise mode.
    Also, advise the user to stop exercising immediately if his or her heart rate
    crosses the upper threshold defined.


    # iPocket


    The pick-pocketing of mobile phones is a huge menace in developing countries,
    and even developed countries like Spain, Italy, and France are severely affected
    by it. Millions of mobile phones are lost every year due to pick-pocketing. How
    can we detect a phone getting pick-pocketed in real-time?


    When someone pick-pockets a phone, the accelerometer data pattern is significantly
    different than that of the pattern that occurs when a person picks his/her phone
    from pocket for making/receiving calls. Develop an Android service to monitor
    the accelerometer pattern. Identify the pick-pocketing pattern by collecting 10–12
    data points any time phone is picked up and comparing the accelerometer data with
    the normal as well as the pick-pocketing data points.


    # iFall


    Elderly people often fall down, and it can happen while they are home alone; they
    can even fall unconscious following the fall. Can an Android application detect
    such emergencies and inform a concerned emergency contact?


    Collect 10–12 accelerometer readings when a person falls down with a phone inside
    his or her pocket as well as in his or her hand. Run a service in the phone to
    check for such accelerometer patterns. When a similar pattern is detected, wake
    up the iFall Android application and ask the user, “Are you Okay?” If the user
    says yes, the application exits; otherwise, the application retries to get a response
    from user. If no response is received, the app sends a text message with location,
    time details, and a message like “User seems to have fallen down, not responding
    for past X minutes” to preconfigured mobile numbers. The mobile numbers must be
    configured using the settings of the iFall application.


    # iPrescribe


    Patients often forget to take medicine on time. Also, once the symptoms subside,
    patients stop taking their medicines altogether, due to which they do not recover
    completely and may fall sick again.


    Feed the prescription along with the dosing schedule into the iPrescribe application.
    Remind the user, saying things like, “It’s 9 p.m., please take 1 crocin tablet,
    and also take 1 teaspoon of zedex syrup at five past 9 p.m.” After a configurable
    number of minutes, the application will ask the patient, “Did you take medicines
    as prescribed?” The patient can answer “yes” or “no”; if the patient says “no,”
    iPrescribe will ask them the reason for not taking the medicine, then it records
    the reason and stores it along with the prescription schedule.


    At the end of the schedule, the data can be uploaded to a central server and analyzed
    for studying the effectiveness of the medicines prescribed. iPrescribe should
    also be able to come up with a health negligence quotient for the patient based
    on how religiously they followed the prescription schedule.


    Think about whether prescriptions could be fed into the iPrescribe Android application
    automatically.


    # iSafety


    In developing countries, crimes against children (on the way to school/home) have
    increased significantly in recent years. How can we ensure the safety of kids
    and family when they are out from sight?


    Develop a safe-zone application and install it on the child’s phone. Configure
    safe zones, like school, home, and so forth. If the person happens to stay out
    of a safe zone for more than a configurable number of minutes, start sending SMS
    along with GPS location details of the person periodically. The person receiving
    the SMS and location details can plot the locations in a map and determine a further
    course of action.


    In this chapter, we learned how to design and develop a complete system using
    Android applications and a backend server to solve real-life problems. We also
    hope that after going through the problems, readers will be able to come up with
    new Android project ideas.'
