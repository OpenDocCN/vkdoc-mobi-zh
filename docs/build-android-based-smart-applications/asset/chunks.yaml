    # 系统架构


    拟议系统的架构及高层工作流程如图 10-1 所示。该系统由`请求者`和`帮助者`应用程序以及一个中央服务器组成。请求者通过启动其智能手机上安装的`请求者`应用程序来发送紧急服务请求。该应用程序向服务器发送请求，要求派遣帮助者到现场。服务器将紧急情况通知附近的帮助者。帮助者到达现场，为请求者提供所需服务。然后请求者向帮助者支付费用。服务器会回复已接受请求的帮助者列表。请求者从列表中识别出实际前来提供帮助的帮助者，并向这些帮助者支付费用（图
    10-6）。支付服务器对请求者进行身份验证，并向帮助者发送付款。


    `帮助者`应用程序会扫描来自附近请求者的请求。服务器检索帮助者附近等待帮助人员的详细信息，并将这些详细信息作为响应发送。`帮助者`应用程序在地图上显示请求者和帮助者。帮助者可以接受或拒绝请求。帮助者为请求者提供帮助，并在收到付款通知后，标记任务完成并提供反馈（图
    10-7）。


    ![A459602_1_En_10_Fig1_HTML.jpg](img/A459602_1_En_10_Fig1_HTML.jpg)


    **图 10-1**


    iEmergency 系统架构


    # 系统实现


    该系统由`请求者`（`iRescue`）和`帮助者`（`iRescuer`）两个 Android 应用程序（分别供请求者和帮助者使用）以及一个中央服务器组成。任何个人都可以在门户网站上注册成为请求者和/或帮助者。注册时，个人必须提供详细信息，例如将用于服务的手机号码、近期照片、电子邮件地址，以及上传身份证和地址证明的副本。提交的信息将通过自动验证（手机号码和电子邮件地址）或手动验证（地址）的方式核实，以确保帮助者是真实可信的个人。手动验证帮助者时，可能会寻求执法部门的帮助。


    ## 请求者应用程序 iRescue


    该应用程序安装在请求者的手机上。当请求者遇到紧急情况时，启动该应用程序，输入 PIN 码，并录制语音以提供所遇紧急情况的更多细节。紧急情况的详细信息及相关的音频或任何媒体文件将通过
    HTTP `POST` 请求上传到中央服务器。此外，当服务器发现与请求者关联的帮助者已到达可听距离范围内时，应用程序会开始大声蜂鸣。当帮助者找到请求者并提供所需的紧急服务后，应用程序检索已接受请求的帮助者列表并将其显示给请求者。列表中会显示帮助者的照片、姓名和手机号码。请求者可以从列表中选择一个或多个帮助者，并验证付款。也可以为帮助者留下反馈。对帮助者的反馈会上传到服务器。


    ## 帮助者应用程序 iRescuer


    该应用程序安装在帮助者的手机上。通过使用基于位置的服务（LBS），它定期将帮助者的位置信息发送到服务器。它检索最近等待接收紧急帮助的请求者的详细信息。它将帮助者和请求者显示在地图上。同时还会显示请求者当前与帮助者的距离。帮助者可以接受或拒绝请求。如果请求被拒绝，服务器会更新该帮助者的记录。如果帮助者决定接受请求，则会显示需要帮助人员的更多详细信息（姓名、手机号码和照片）。帮助者还可以下载与请求者关联的任何音频，并播放以获取关于紧急情况的更多信息。


    一旦帮助者到达请求者处，提供了紧急服务并收到付款，他/她会在应用程序中将任务标记为完成，并就请求者提供反馈。


    ## 用户界面


    `iRescue` 和 `iRescuer` 应用程序的一些主屏幕如图 10-2 至 10-7 所示，这些屏幕展示了 `iEmergency` 系统支持的各类紧急情况。例如，图
    10-5 显示了一张地图，上面同时标出了帮助者和受害者。图 10-6 显示了请求者的照片，而图 10-7 则显示了实际提供服务的帮助者的照片和详细信息。


    ![A459602_1_En_10_Fig7_HTML.jpg](img/A459602_1_En_10_Fig7_HTML.jpg)


    **图 10-7**


    iRescuer 任务完成


    ![A459602_1_En_10_Fig6_HTML.jpg](img/A459602_1_En_10_Fig6_HTML.jpg)


    **图 10-6**


    iRescue 付款


    ![A459602_1_En_10_Fig5_HTML.jpg](img/A459602_1_En_10_Fig5_HTML.jpg)


    **图 10-5**


    iRescuer 受害者详情


    ![A459602_1_En_10_Fig4_HTML.jpg](img/A459602_1_En_10_Fig4_HTML.jpg)


    **图 10-4**


    iRescuer 接受/拒绝


    ![A459602_1_En_10_Fig3_HTML.jpg](img/A459602_1_En_10_Fig3_HTML.jpg)


    **图 10-3**


    iRescuer 等待中


    ![A459602_1_En_10_Fig2_HTML.jpg](img/A459602_1_En_10_Fig2_HTML.jpg)


    **图 10-2**


    iRescue 紧急情况类型


    ## iEmergency 服务器


    `iEmergency` 服务器构建于 Apache XAMPP 平台之上。它由一个 Apache 服务器和一个 MySQL 服务器组成。服务器通过 HTTP
    `POST` 和 HTTP `GET` 接收来自帮助者和请求者的各种请求，并向 `iRescue` 和 `iRescuer` 应用程序发送 HTTP 响应。它维护着已注册请求者和帮助者的各种详细信息。服务器将附近受害者的详细信息发送给
    `iRescuer` 应用程序。它还存储请求者的音频详细信息，并允许帮助者下载该音频。此外，服务器上还会记录请求者和帮助者之间交易的反馈。


    # 第三部分

    用于解决实际问题的 Android 应用程序


    # 11. 作业


    本章包含多个作业，旨在测试你对前一章所学内容的理解。


    ## iEncrypt 和 iDecrypt


    设计两个 Android 应用程序——例如，`iEncrypt` 和 `iDecrypt`。`iEncrypt` 将接受一个密码和要加密的图像文件，以及加密时要添加上下文的类型/规则。


    以下截图（图 11-1 至 11-5）将帮助你理解应用程序的需求。


