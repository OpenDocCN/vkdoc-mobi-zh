    ## 引言


    本书描述了如何使用规则引擎、代码自动化框架和自然语言处理（`NLP`）等前沿技术构建智能应用。


    **注意：** 智能应用是嵌入了智能的应用。这种智能可以随时更新。


    本书提供了将九个规则引擎（`CLIPS`、`JRuleEngine`、`DTrules`、`Zilonis`、`Termware`、`Roolie`、`OpenRules`、`JxBRE`
    和 `JEOPS`）移植到移动平台的分步指南。随后描述了如何使用每个规则引擎构建智能应用，并提供了示例代码片段，以便读者能立即开始编写自己的智能应用。本书还讨论了其他流行规则引擎（`Drools`、`JLisa`、`Take`、`Jess`
    和 `OpenRules`）的移植问题。


    本书将指导读者如何根据需求规格自动生成可运行的智能应用。


    最后，本书将向读者展示如何使用 `NLP` 框架 `Stanford POS`（词性标注器）从非结构化知识中生成智能应用。


