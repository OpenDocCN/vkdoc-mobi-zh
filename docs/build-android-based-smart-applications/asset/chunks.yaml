  trans: "\n# JEOPS\n\nJEOPS [14] 是一个基于 Java 的规则引擎，用于将前向链接的生产规则嵌入到 Java 应用程序中。它为应用程序提供了人工智能能力。\n\
    \nJEOPS 的生产规则可以写在文本文件（.rules 文件）中。与知识库的交互通过四种方法执行：`Tell(object)`、`Flush()`、`Retract(object)`\
    \ 和 `Modified(object)`。由于在规则定义中使用了 Java 表达式，Java 程序员学习 JEOPS 所需的时间被最小化。以下是该规则引擎的概要：\n\
    \n* 许可证类型：开源 LGPL\n* 语言：Java\n* 可在 Android 上运行：是\n* 规则语法：任何文本编辑器中的“条件-动作”模式\n\
    * 内存占用：0.03 MB（31.5 KB）\n* 推理方法：RETE\n* 支持多线程：否\n* 规则引擎易于扩展：是，平均运行时间为 120 毫秒\n\
    \n# 移植规则引擎的步骤\n\n本章将介绍如何在 Android 平台上移植主要的规则引擎。\n\n## CLIPS\n\n使用 Android-ndk\
    \ 和 Eclipse Helios 将 CLIPS 移植到 Android。最好使用 Linux 机器进行移植。以下是将 CLIPS 移植到 Android\
    \ 的步骤：\n\n* 从 Source Forge 下载 `CLIPSJNI` 源代码，并从源代码构建一个 Android 库项目。\n  * 将库项目导出为\
    \ `CLIPSJNI.jar`。\n* 创建一个虚拟的 Android 项目，并在项目目录下创建一个 JNI 目录。\n* 将 CLIPS 中所有源文件（*.c）和头文件（*.h）复制到\
    \ JNI 目录。\n* 在 `Android.mk` 中添加除 `main.c` 之外的所有源文件。你的 `Android.mk` 应该如下所示：\n\n\
    ```\nLOCAL_PATH := $(call my-dir)\ninclude $(CLEAR_VARS)\nLOCAL_MODULE    := CLIPSJNI\n\
    LOCAL_SRC_FILES := agenda.c \\\nanalysis.c \\\nargacces.c \\\n.\n.\n.\nCLIPSJNI_Environment.c\n\
    LOCAL_LDLIBS    := -lm -llog -ljnigraphics\ninclude $(BUILD_SHARED_LIBRARY)\n\
    ```\n\n* 在 JNI 目录中搜索 `setlocale` 函数。在期望 `setlocale` 返回一个值的地方，将其硬编码为 `C`，并注释掉所有其他的\
    \ `setlocale` 调用，因为 Android 的 `setlocale` 返回硬编码的 `0`！\n* 注释掉 main 函数（只是为了安全起见）。\n\
    * 运行 `ndk-build –b`。\n* 将 `libCLIPSJNI.so` 复制到 `libs/armeabi` 和 `libs/armeabi-v7a`\
    \ 目录。\n* 将 `CLIPSJNI.jar` 作为外部 jar 添加到你的 Android 项目中。\n\n## JRuleEngine\n\n以下是将\
    \ JRuleEngine 移植到 Android 的步骤：\n\n* 下载 `jsr172.jar`。\n  * 从此 jar 文件中移除除了 `java.rmi`\
    \ 之外的所有包。\n* 使用 `jarjar.jar` 工具重新打包该 jar，操作如下：\n  * 创建包含以下行的 `rulefile.txt` 文件：`rule\
    \ java.rmi.** com.<你的公司>.java.rmi.@1`\n  * 在命令提示符下，运行 `java -jar jarjar.jar process\
    \ rulefile.txt <输入 jar> <输出 jar>`\n* 下载 `jsr94-1.1.jar`。\n* 使用 `jarjar.jar` 工具重新打包该\
    \ jar。\n  * 创建一个包含以下行的 `rulefile.txt` 文件：`rule java.rmi.** com.<你的公司>.java.rmi.@1`\n\
    \  * 在命令提示符下，运行：`java -jar jarjar.jar process rulesfile.txt <输入 jar> <输出 jar>`\n\
    * 下载 Apache Harmony 的 `awt.jar`，并从该 jar 中移除所有 `java.*` 包。\n* 下载内含源代码的 `jruleengine.jar`。\n\
    * 注释所有包含 `Component.getName()` 函数调用的 `else if` 语句；同时移除 `import java.awt.Component;`\
    \ 语句。\n* 使用 `jarjar.jar` 工具重新打包 `jruleengine.jar`。\n* 创建包含以下规则的 `rulefile.txt`\
    \ 文件：\n  * `rule java.rmi.** com.<你的公司>.java.rmi.@1 rule java.awt.Component**\
    \ org.apache.harmony.awt.ComponentInternals@1`\n  * 运行 `java -jar jarjar.jar process\
    \ rulefile.txt <输入 jar> <输出 jar>`\n* 创建一个 Android 项目，并将所有这些 jar 添加到项目的构建路径中。\n\
    * 将包含规则的 XML 文件复制到模拟器中的 sdcard。\n\n## DTrules\n\njar 文件可以在 Android 中工作，但需要执行以下步骤才能在\
    \ Android 应用程序中使用 DTrules：\n\n* 在 Excel 表中将规则编写为决策表。示例 Excel 表可在 `sampleprojects/<项目名>/DecisionTables`\
    \ 中找到。\n* 创建如下文件结构：\n\n```\n/DecisionTables/包含决策表的 excel 表.xls\n/edd/包含 edd 的文件.xls\n\
    /xml/\n/DTRules.xml\n```\n\n* 通过使用如下代码，将包含规则的 Excel 表转换为 XML：\n\n```\nExcel2XML.compile(\"\
    根路径\", \"DTRules.xml\", \"规则集名称\", \"仓库路径\");\n```\n\n要自动生成映射文件，可以使用类似以下的方法：\n\
    \n```\nString [] maps = {\"main\" };      Excel2XML.compile(path,\"DTRules.xml\"\
    ,\"\",\"D:/XLS2XML/repository\",maps);\n```\n\n* 创建一个 Android 项目。\n* 将以下 jar 添加到构建路径：`java-cup-11a.jar`、`poi-3.6-20091214.jar`、`dtrules.jar`。\n\
    * 创建一个映射文件（如果未自动生成），用于将 XML 文件与数据映射到实体。\n* 将所需的实体添加到初始化部分，这些实体需要在第一个决策表执行之前被推入实体栈。例如：\n\
    * 修改需要创建的每个实体的数量。例如：\n* 在 sdcard 中创建如下文件结构：\n  * `/sdcard/xml/映射文件.xml,edd 文件.xml,dt\
    \ 文件.xml`\n  * `/sdcard/repository/DTRules.xml`\n  * `/sdcard/DTRules.xml`\n \
    \ * `/sdcard/testfiles/测试用例.xml`\n* 将生成的文件复制到 sdcard 的相应目录中。\n\n## Zilonis\n\n\
    Zilonis 的 jar 在 Android 中可以毫无问题地工作。以下是将 Zilonis 添加到你的 Android 项目的步骤：\n\n* 创建一个\
    \ Android 项目。\n* 将包含规则的 .clp 文件复制到一个文件夹中，例如模拟器中 sdcard 的 temp 文件夹。\n* 将 `zilonis0.97b.jar`\
    \ 和 `antlr.jar` 添加到项目的构建路径。\n\n在为 Zilonis 编写规则文件（.clp）时，请确保以下几点：\n\n* 在 .clp 文件中，一行只能添加一条语句，这与\
    \ CLIPS 不同。\n* 行与行之间不应有空格。\n\n## Termware\n\n在 Android 中移植 Termware 很简单。只需一步：\n\
    \n* 从属于 `TermWare.jar` 中的 `ua.gradsoft.termware` 和 `ua.gradsoft.termware.util`\
    \ 的 Java 文件中，移除所有与调试存根相关的项。\n\n## Roolie\n\n将 Roolie 移植到 Android 上无需任何额外工作——你只需将\
    \ jar 文件添加到 Android 项目中即可开始使用。\n\n## OpenRules\n\n* 下载 `org.apache.commons.beanutils`\
    \ 的源代码，重新编译，并在移除以下包后将其导出为 jar，以修复多重定义问题：\n\n```\norg.apache.commons.logging\n\
    org.apache.commons.logging.impl\n```\n\n* 然后，使用 `jarjar.jar` 工具重新打包它：\n  * 创建包含以下规则的\
    \ `rulefile.txt` 文件：`rule java.beans.** com.googlecode.openbeans.@1`\n  * 在命令提示符下运行以下命令进行重新打包：`java\
    \ -jar jarjar-1.4.jar process rulefile.txt <输入 jar> <输出 jar>`\n* 下载 `poi-3.6-20091214.jar`\
    \ 用于处理 Excel 表。\n* 下载 `openbeans-1.0.jar` 以使用 `com.googlecode.openbeans`，因为 OpenRules\
    \ 广泛使用了 Java beans，而 Android 不支持此功能。\n* 下载 `commons-lang-2.3.jar`，移除 `org.apache.commons.lang.enum`\
    \ 包，然后重新编译。\n* 创建一个 Android 项目，并将所有这些 jar 添加到项目的构建路径中。\n* OpenRules 似乎硬编码了 `openrules.config\
    \ dir` 的路径，模板文件需要存储在该目录下。在 sdcard 下创建一个 `openrules.config` 目录，并将规则文件和模板文件放在那里。\n"
- fmt: "## JxBRE\n\n以下是将 JXBRE 移植到 Android 需要遵循的步骤：\n\n- 下载 Xerces 1.4.4（XML 解析器）的源代码。\n\
    - 将包名`javax`改为其他名称。\n- 重新编译源代码并构建项目。\n- 将其导出为 jar 文件`xerces.jar`。\n- 下载`jxbre.jar`和`ideaityUtil.jar`。\n\
    - 创建一个 Android 项目，并将所有这些 jar 添加到项目的构建路径中。\n- 下载 XML Schema 文件`businessRules.xsd`。\n\
    - 将规则文件（`.xml`）和`businessRules.xsd`复制到模拟器中，以便在项目中访问它们。\n\n## JEOPS\n\nJEOPS 可以按如下方式移植到\
    \ Android：\n\n- 创建一个新的 Java 项目。\n- 将 JavaBean 文件（声明所使用的变量及其访问器方法）添加到项目中。编译它，并从`bin`目录复制生成的`.class`文件。\n\
    - 创建一个新目录，并根据`.class`文件中指定的包名，将刚刚生成的`.class`文件粘贴到该目录下对应的文件夹中。\n- 同时，将规则库文件（`.rules`）复制到此目录。\n\
    - 下载`JEOPS.jar`并将其放入该目录。\n- 在命令提示符中，进入此新目录的路径位置，并执行以下命令以从规则库文件生成 Java 文件：\n\n\
    ```bash\njava –cp JEOPS.jar;. jeops.compiler.Main \n```\n\n- 创建一个 Android 项目，并将生成的规则库\
    \ Java 文件添加到项目中。\n- 使用 JavaBean 的`.java`文件创建一个新的 jar（通过编译并导出为 jar），并将其添加到 Android\
    \ 项目的构建路径中。\n- 在规则库 Java 文件的代码中添加以下行以访问`tell()`：\n\n```java\n_knowledgeBase.tell(f1);\n\
    _knowledgeBase.tell(f2);\nprivate jeops.AbstractKnowledgeBase _knowledgeBase;\n\
    _knowledgeBase = knowledgeBase;\n```\n\n- 同时将`JEOPS.jar`添加到项目的构建路径中。\n\n## 示例代码片段\n\
    \n此代码片段将帮助您理解如何将规则引擎与 Android 应用程序集成。"
  raw: "## JxBRE\n\nThe following steps need to be followed to port JXBRE into Android:\n\
    \n*   Download the source code of Xerces 1.4.4 (XML Parser).\n*   Change the name\
    \ of package `javax` to anything else.\n*   Recompile the source code and build\
    \ the project.\n*   Export it to jar file `xerces.jar`.\n*   Download `jxbre.jar`\
    \ and `ideaityUtil.jar`.\n*   Create an Android project and add all these jars\
    \ to the build path of the project.\n*   Download the XML Schema file `businessRules.xsd`.\n\
    *   Copy the rule file (.xml) and `businessRules.xsd` into emulator, from which\
    \ it can be accessed in the project.\n\n## JEOPS\n\nJEOPS can be ported into Android\
    \ as follows:\n\n*   Create a new Java project.\n*   Add the JavaBean file (declaring\
    \ the variables being used and their accessor methods) to it. Compile it and copy\
    \ the `.class` file from bin.\n*   Create a new directory and paste the `.class`\
    \ file just generated there in appropriate folders according to the package name\
    \ specified in the `.class` file.\n*   Also, copy the rule-base file (.rules)\
    \ to this directory.\n*   Download JEOPS.jar and put it in the directory.\n* \
    \  In command prompt, go to the location/path of this new directory and execute\
    \ the following command to generate a Java file from the rule-base file:\n\n \
    \   ```\n    java –cp JEOPS.jar;. jeops.compiler.Main \n    ```\n\n*   Create\
    \ an Android project and add the generated rule-base java file in the project.\n\
    *   Create a new jar with the JavaBean `.java` file (by compiling it and exporting\
    \ it to jar) and add it to the build path of your Android project.\n*   Add the\
    \ following lines to the code of the rule-base Java file for accessing `tell()`:\n\
    \n    ```\n    _knowledgeBase.tell(f1);\n    _knowledgeBase.tell(f2);\n    private\
    \ jeops.AbstractKnowledgeBase _knowledgeBase;\n    _knowledgeBase = knowledgeBase;\n\
    \    ```\n\n*   Also add `JEOPS.jar` to the build path of your project.\n\n##\
    \ Sample Code Snippet\n\nThis code snippet will help you understand how to integrate\
    \ a rules engine with an Android application."
