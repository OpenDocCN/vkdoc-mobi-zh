    # 第一部分：规则引擎


    ## 1. 哪种规则引擎最适合构建智能应用？


    现在，让我们基于敏捷性、可扩展性和易用性来评估规则引擎，并确定哪种最适合开发智能应用。我们首先来定义什么是规则引擎。


    规则引擎有助于将智能嵌入到应用程序中。这种智能可以即时更新。读者应该了解可编程计算器。规则引擎可以被视为此类计算器的高级版本。可以从 Source Forge
    下载 `CLIPS`[24]。


    ```

    java -jar CLIPSJNI.jar

    CLIPS> (+ 3 4)


    CLIPS> (defglobal ?*x* = 3)

    CLIPS> ?*x*


    CLIPS> red

    red

    CLIPS> (bind ?a 5)


    CLIPS> (+ ?a 3)


    CLIPS> (reset)

    CLIPS> ?a

    [EVALUATN1] Variable a is unbound

    FALSE

    CLIPS>

    ```


    示例代码取自 [23]。有多种用 Java 编写的规则引擎，它们在功能和概念上差异很大。2011 年，业务规则引擎的收入超过了 4.6 亿美元 [1]。到
    2015 年，移动应用市场的总规模将达到 250 亿美元 [2]。根据 Gartner 的说法，开发情境感知型移动应用是主要趋势之一 [3]。


    移动应用正变得越来越复杂。这为移动平台上的规则引擎创造了发展空间。规则引擎有助于将业务逻辑与应用逻辑分离。目前，已知可在移动平台上运行的规则引擎并不多。我们已在
    Android 上移植并评估了九种规则引擎：`CLIPS`、`OpenRules`、`JXBRE`、`JEOPS`、`Roolie`、`Termware`、`JRuleEngine`、`Zilonis`
    和 `DTRules`。本章提供了每种规则引擎的详细描述、分步移植指南以及可用的示例代码。我们还讨论了在尝试移植其他流行规则引擎（如 `Drools`、`JLisa`、`Take`
    和 `Jess`）时遇到的问题。我们在 Android 环境中基于许可协议、开发语言、规则语法、推理方法、多线程支持、可扩展性等对规则引擎进行了比较 [4]。如果你正尝试在移动项目中使用规则引擎，本章可以为你节省超过四个员工周的工作量。

