- fmt: '# Question Generator


    It takes a text-based article in a `.txt` file and outputs an XML file containing
    the questions, answers, options, and so forth. Upon initiating the program, the
    user enters the file name of article (including pathname if not in current directory).
    The program uses the Stanford NER (Named Entity Recognition) tagger to tag words
    of the following categories: Time, Location, Organization, Person, Money, Percent,
    and Date.


    The program then uses the Stanford POS (Part of Speech) tagger [16], v.3.2.0,
    which is open source. It uses the API of the Penn Treebank tag set [20] to tag
    words according to their POS. It uses 60–200 MB to run a trained tagger with this
    API, which is fairly low compared to other taggers like `OpenNLP` [17], which
    uses about 3–4 GB to run, with the trainer provided by default. However, `OpenNLP`
    also provides other tools, like sentence segmentation and named entity extraction,
    which are not supported by the Stanford POS tagger but that would be useful to
    our application. After tagging the words, the tagged words are stored in a text
    file, from which each sentence is parsed and converted into one of four different
    types of questions:


    *   **Keyword questions:** These are “fill in the blank” questions where there
    are no options and the right answer is a keyword from the sentence. This keyword
    is a proper noun detected by the POS tagger. Generally, proper nouns are good
    keywords, because they are usually the subject of the sentence. An extension would
    be to use the `OpenNLP` tools to detect the head of the sentence and make that
    the keyword.

    *   **Noun questions:** This is another “fill in the blank” question where nouns
    are detected via the POS tagger but options are provided for the answer. Options
    are nouns from other sentences. A key factor in the quality of these questions
    is the sense and relevance of the questions and options. We plan to provide options
    with attributes and scan through the pool of all answers to look for the same
    attribute when selecting the options. For example: Input sentence: “An Engineer
    is trying to develop lightweight, ‘air breathing’ hypersonic vehicles that can
    travel at rocket-like speeds while taking oxygen from the atmosphere.” Noun: engineer
    Attribute: profession We use `WordNet` [18] to find its siblings in a tree of
    professions; for example, scientist, electrician, technologist, and so forth.

    *   **Investigative questions (first kind):** These are questions that are of
    an investigative nature; for example: Input sentence: “Jake was the one who took
    the car.” Question: “Who was the one who took the car?” These questions look for
    verbs in the third person, past tense. This is because most descriptive articles
    use sentences in the third person past tense. In addition, the answer must contain
    a proper noun to avoid trivial cases like: “It was lying on the table.” Without
    this rule, the answer would be “It,” which is not a meaningful question. “Who/what”
    questions can be refined to be either who or what (or even when, how much, and
    so forth) using named entity recognition software, for example, Stanford Named
    entity recognizer [21], or `OpenNLP` tools [17].

    *   **Investigative questions (second kind):** These questions are similar to
    investigative questions of the first kind. Instead of starting with the questioning
    words, they end with the questioning words. For example: Input sentence: “Jake
    was the one who took the car.” Question: “Jake was the one who took the what?”
    Similarly, a named entity recognizer can be used to refine the wording of the
    questions.


    These questions are stored in an XML file under the following format:


    ```

    question

    RadioButton/Text

    answer

    option1:option2...

    ```


    This XML file is stored in the second project—the Android application project.
    The exact location is a user input to the first project. The field is encrypted
    using a simple variation of the Caesar cipher: in the ASCII table, all the characters
    are shifted by a certain index. This would prevent the visibility of the answer
    if a user decided to extract the files from the installed application.


    ## Quiz Application


    The application reads the XML files and creates a separate quiz for each file.
    The user can determine the number of questions per page. A progress bar indicates
    what fraction of the quiz has been completed. At the end, the user is given his
    or her score for that quiz. The screenshots in Figures [9-1](#A459602_1_En_9_Chapter.html#Fig1)
    to [9-3](#A459602_1_En_9_Chapter.html#Fig3) will help you better understand the
    application workflow.


    ![A459602_1_En_9_Fig3_HTML.jpg](A459602_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Quiz score


    ![A459602_1_En_9_Fig2_HTML.jpg](A459602_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Quiz questions


    ![A459602_1_En_9_Fig1_HTML.jpg](A459602_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    AutoQuiz application


    ## Benefits of AutoQuiz


    We can easily observe the following benefits of the AutoQuiz system:


    *   Automatically generate quizzes based on training/presentation materials, saving
    hours of effort to prepare quiz manually

    *   Automatically validate quiz answers, again saving hours of effort to validate
    answers manually

    *   Makes training/presentation more effective, as people attending training would
    have to answer quiz generated by AutoQuiz, and they and their manager get to know
    the score immediately

    *   Measure effectiveness of trainer and training materials


    ## Known Issues


    We still need to resolve the following issues for AutoQuiz system:


    *   In the “fill in the blanks” and “nouns” questions, the options may not always
    make sense, making it easy for the test taker to answer the question correctly
    without having knowledge of the article. We intend to tackle this problem by tagging
    the words in the options-pool with attributes.

    *   Investigative questions of both kinds can become too monotonous and robotic
    if they only use who/what. These are used because of AutoQuiz’s inability to recognize
    the subject in the sentence.

    *   Focus of sentence: The current prototypes are unable to recognize the subject
    of the sentence and give more meaningful questions. For example: Input sentence:
    “Only the thief wears a black hat.” Here, the focus is on “thief” and not, say,
    the color of the hat. Suitable question: “Who wears a black hat?” Less suitable
    question : “What color hat does the thief wear?”

    *   Extracting knowledge: The current prototypes only extract knowledge on a high
    level and not in detail. They do not use rules to store the knowledge, so they
    cannot be used to make derivations. For example: Input: “Joe is the brother of
    John. John is the brother of Jake.” Possible derivation: “Joe is a brother of
    Jake.”


    We present possible solutions to these issues in the next section.'
