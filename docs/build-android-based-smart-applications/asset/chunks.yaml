- fmt: '# Architecture


    The architecture of the proposed system with a high-level work flow is illustrated
    in Figure [10-1](#A459602_1_En_10_Chapter.html#Fig1). The system consists of `Requester`
    and `Helper` applications and a centralized server. The requester sends a request
    for emergency service by starting the `Requester` application installed on his
    or her Smartphone. The application sends a request to the server to send helpers
    to the spot. The server notifies nearby helpers about the emergency. The helpers
    reach the spot and provide requester with required service. The requester then
    proceeds to pay the helpers. The server responds back with the list of helpers
    who had accepted the request. The requester identifies the helpers from the list
    to select the helpers who actually came to help, and the requester pays those
    helpers (Figure [10-6](#A459602_1_En_10_Chapter.html#Fig6)). The payment server
    authenticates the requester and sends payment to the helper.


    The `Helper` application scans for requests from nearby requesters. The server
    retrieves details of the person waiting for help in the vicinity of the helper
    and sends the details in response. The `Helper` application displays the requester
    as well as helper on a map. The helper accepts or rejects the request. The helper
    helps the requester and, after receiving the payment notification, he or she marks
    the job complete and provides feedback (Figure [10-7](#A459602_1_En_10_Chapter.html#Fig7)).


    ![A459602_1_En_10_Fig1_HTML.jpg](A459602_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    iEmergency architecture


    # Implementation of the System


    The system consists of `Requester` (`iRescue`) and `Helper` (`iRescuer`) Android
    applications, used by the requester and helpers respectively, and a centralized
    server. Any individual can register on the portal as a requester and/or a helper.
    At the time of registration, the person has to provide details such as mobile
    number that will be used for the service, recent photograph, and email ID as well
    as upload copies of identity and address proof. The submitted information will
    be verified either automatically (mobile number and email ID) or manually (address)
    to ensure that the helpers are genuine persons. Help from law enforcement authorities
    may be sought for manual verification of the helpers.


    ## Requester Application iRescue


    This application is installed on the requester’s mobile phone. When he or she
    faces an emergency situation, he or she starts the application, enters a PIN,
    and records his or her voice to provide more details about the emergency faced.
    Details of the emergency situation and related audio or any media file(s) are
    uploaded to a central server HTTP `POST` request. In addition to that, when the
    server finds that a helper associated with the requester has reached within an
    audible distance, the application starts beeping loudly. When the helper reaches
    the person and provides the required emergency service, the application retrieves
    the list of helpers who had accepted the request and displays it to requester.
    The photo, name, and mobile number of the helpers are displayed in the application.
    The requester can choose one or more helpers from the list and authenticate payment.
    Feedback can also be left for the helpers. The feedback for the helpers is uploaded
    to the server.


    ## Helper Application iRescuer


    This application is installed on the helper’s mobile phone. By using location-based
    services (LBS), it periodically sends the helper’s location information to the
    server. It retrieves details of the nearest requester waiting to receive emergency
    help. It shows the helper as well as the requester on a map. It also displays
    the current distance of the requester from the helper. The helper can either accept
    or reject the request. If the request is rejected, the server updates the record
    of helper. If the helper decides to accept the request, further details of the
    person in need (name, mobile number, and photo) are displayed. The helper can
    also download any audio associated with the requester and play it to gather additional
    information about the emergency.


    Once the helper reaches the requester, provides emergency service, and receives
    payment, he or she marks the job as complete in the application and provides feedback
    on the requester.


    ## User Interface


    Some of the main screens of the `iRescue` and `iRescuer` applications have been
    depicted in Figures [10-2](#A459602_1_En_10_Chapter.html#Fig2) to [10-7](#A459602_1_En_10_Chapter.html#Fig7),
    which display the different type of emergencies that the `iEmergency` system supports.
    As an example, Figure [10-5](#A459602_1_En_10_Chapter.html#Fig5) displays a map
    where both helper and victim are plotted. Figure [10-6](#A459602_1_En_10_Chapter.html#Fig6)
    displays a photo of the requester, and Figure [10-7](#A459602_1_En_10_Chapter.html#Fig7)
    displays photo and details of helpers who actually provided the service.


    ![A459602_1_En_10_Fig7_HTML.jpg](A459602_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    iRescuer job complete


    ![A459602_1_En_10_Fig6_HTML.jpg](A459602_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    iRescue payment


    ![A459602_1_En_10_Fig5_HTML.jpg](A459602_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    iRescuer victim details


    ![A459602_1_En_10_Fig4_HTML.jpg](A459602_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    iRescuer accept/reject


    ![A459602_1_En_10_Fig3_HTML.jpg](A459602_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    iRescuer waiting


    ![A459602_1_En_10_Fig2_HTML.jpg](A459602_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    iRescue type of emergency


    ## iEmergency Server


    The `iEmergency` server is built on top of the Apache XAMPP platform. It consists
    of one Apache server and one MySQL server. The server receives various requests
    from helper(s) and requester(s) via HTTP `POST` and HTTP `GET` and sends HTTP
    responses to both `iRescue` and `iRescuer` applications. It maintains various
    details of registered requester(s) and helper(s). The server sends nearby victim
    details to the `iRescuer` application. It also stores audio details of the requester
    and allows the helper to download the audio. In addition to that, feedback for
    the transaction between requester and helper is recorded in the server.


