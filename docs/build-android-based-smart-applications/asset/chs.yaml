  在尝试使用以下每个规则引擎编写规则时，我们发现了一些问题。读者应该留意这些问题。\n\n- **Jruleengine**：不支持 `OR` 运算符。\n- **Zilonis**：与\
  \ CLIPS 不同，它不支持 `OR`、`defglobal` 或 `bind` 关键字。\n- **DTRules**：事实必须通过 XML 文件提供，因此在需要在运行时动态提供事实的环境中运行规则，既复杂又繁琐。\n\
  - **Termware**：规则必须在代码本身中编写。\n- **Roolie**：需要开发过多的规则文件，并且每条规则都必须在单独的 Java 文件中编码。\n\
  - **JxBRE**：`ElseIf` 在 XML 文件中无法工作（可以使用 `Set` 替代）。在规则文件 (`.xml`) 的逻辑部分中，只有一个 `If`\
  \ 能正常工作。在 `If` 元素之前，需要存在 `{Rule, Log, Logic, While, InvokeSet, ForEach, Retract}`\
  \ 中的任意一个。\n- **JEOPS**：用作函数调用参数的变量，必须在规则文件本身中（通过调用相应的 setter 方法）进行初始化。\n- **OpenRules**：没有说明如何编写规则的文档或自述文件。\n\
  \n\n\n### 其他规则引擎的移植问题\n\n读者在移植其他规则引擎时可能会遇到以下问题：\n\n* **Drools**：转换为 dalvik 格式时，Eclipse\
  \ 内存溢出（500 MB）。增加 Eclipse 的内存未能解决该问题。读者可尝试使用高端机器（RAM > 4 GB）。\n* **JLisa**：在 Android\
  \ 上运行时，会抛出堆栈溢出问题。读者可联系 JLisa 支持团队寻求解决方案。\n* **Take**：运行时需要 Java 编译器。读者可联系 Take 支持团队获取\
  \ Android 编译器支持。\n* **Jess**：开发许可证费用约为 15,000 美元。\n* **OpenRules**：\n  * `poi-3.6-20091214.jar`\
  \ 中的方法 `org.apache.poi.hssf.usermodel.HSSFSheet.autoSizeColumn` 使用了类 `java.awt.font.FontRenderContext`，而该类在\
  \ Android 中不可用。\n  * 方法 `com.googlecode.openbeans.StandardBeanInfo.getIcon` 使用了类\
  \ `java.awt.image`，而该类在 Android 中不可用。\n  * 在处理决策时，垃圾回收会运行多次，表明内存使用量巨大。\n  * 未收到\
  \ OpenRules 公司关于其商业许可证类型及费用的任何回复。\n\n## 4\\. 移动平台规则引擎比较\n\n本章包含用于移动平台开发的规则引擎的比较。\n\
  \n### 规则引擎总结\n\n在所有为 Android 评估的九个规则引擎中，**CLIPS** 无疑是最出色的，因为它速度最快、免费，并且支持自己的规则编程语言。其次是\
  \ **OpenRules**，其规则可以轻松地在 Excel 表中编写；然后是 **JEOPS**，因为算法可以很容易地表示。接下来是 **Termware**，因为将规则与应用程序集成非常直接。由于其可移植性、可扩展性和低成本，CLIPS\
  \ 已被政府、私营企业和大学广泛使用。CLIPS 使得将人工智能嵌入到各种计算环境中的广泛应用成为可能。\n\n### 规则引擎比较\n\n表 4-1 显示了规则引擎的比较。\n\
