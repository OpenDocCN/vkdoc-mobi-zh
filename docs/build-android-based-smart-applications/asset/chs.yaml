  \ 的源代码，重新编译，并在移除以下包后将其导出为 jar，以修复多重定义问题：\n\n```\norg.apache.commons.logging\norg.apache.commons.logging.impl\n\
  ```\n\n* 然后，使用 `jarjar.jar` 工具重新打包它：\n  * 创建包含以下规则的 `rulefile.txt` 文件：`rule java.beans.**\
  \ com.googlecode.openbeans.@1`\n  * 在命令提示符下运行以下命令进行重新打包：`java -jar jarjar-1.4.jar\
