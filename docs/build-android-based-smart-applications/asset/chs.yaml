  . 知识应用开发中的需求与挑战\n\n知识管理被定义为为一个系统或组织创建、共享、使用和管理信息。\n\n在本章中，我们将讨论两个知识管理系统——**SmartAppGen**\
  \ 和 **AutoQuiz** 的需求、挑战、设计与实现。\n\n### 介绍 SmartAppGen 和 AutoQuiz\n\nSmartAppGen 能够从表示为\
  \ XML、Excel 表、PPT 等形式的结构化知识中自动生成相应的知识应用。例如，假设一名卫生工作者需要接受为期数周的培训。在培训中，他们需要阅读数百页的知识材料。如果能够利用现有知识自动构建一个知识应用并安装到他们的智能手机上，会怎么样？培训时间可以大幅缩短；此外，卫生工作者也不必记住数百页的文档。他们也无需时不时地翻阅打印的指南来执行日常工作。因此，很明显，知识应用可以提高医疗服务的效率和准确性。\n\
  \n并非所有的知识都有良好的格式，以至于可以自动开发并安装到智能手机上。因此，人们仍然需要接受培训并记住培训中学到的东西。当知识（例如培训材料、演示文稿等）以文本格式提供时，AutoQuiz\
  \ 就派上了用场。它可以从非结构化的知识中生成有意义的测验。在任何培训或演示结束时，可以自动生成一个测验，并要求所有参与者参加。然后，他们的分数会立即计算出来。这达到了三个目的：人们会在培训中更加警觉，培训师可以立即获得关于其培训效果的反馈，并且培训师/经理可以知道哪些人在理解上有所欠缺，并采取适当措施让他们达到标准。本章将帮助您自动化公司或机构的知识管理。\n\
  \n### 开发知识应用\n\n要设计、开发和部署一个知识应用，需要执行图 5-1 中所示的步骤。\n\n![A459602_1_En_5_Fig1_HTML.jpg](img/A459602_1_En_5_Fig1_HTML.jpg)\n\
  \n*图 5-1 知识应用开发*\n\n以下是知识应用相关的核心需求与挑战：\n\n* 将知识表示为数字化格式并将其转换为规则是一个繁琐且耗时的过程。\n* 用户界面可能因用户画像而异。例如，对于精通技术的用户，用户界面可以是基于文本的；对于半文盲用户，可以是基于图标的；对于文盲用户，可以是基于语音的。\n\
  * 数据持久化和维护很繁琐，如果管理不当，可能导致应用程序中断服务。\n* 同一个应用程序可能需要为多个手机平台开发，例如 Android、iOS 等。\n*\
  \ 常见功能在这种移动应用程序中一再被重复实现，浪费了数千小时的开发时间。\n* 可能需要支持多种语言。\n* 可能需要根据用户画像定制应用程序的安装包。\n\
  * 知识应用应能通过无线方式进行升级。\n\n让我们在下一章中看看 SmartAppGen 如何自动生成知识应用。我们还将探讨知识应用开发者面临的挑战。\n\n"
- '# 第二部分：SmartAppGen：从结构化知识自动生成知识应用


  ## 6\. SmartAppGen 的设计与实现


  SmartAppGen 是一套框架，旨在帮助从结构化知识中自动生成基于知识的应用程序。结构化知识可以以多种格式提供，例如 Excel 表、文本和 XML。


  * 从文档中提取问题、规则、信息等内容，并保存为 XML。

  * 根据生成的 XML，生成相应的 Android 布局、Android Activity、CLIPS 规则和决策引擎。

  * 各种框架，如语音转文本、音频捕获器、照片捕获器、上传管理器等，也会自动嵌入到项目中。

  * 生成的代码框架被整合在一起，从一个新的 Android 项目生成一个功能完整的 Android 项目。




  '
- '# 7. SmartAppGen 的架构


  我们为 SmartAppGen 设计了一个包含高层架构和底层架构的三层架构。见图 7-1。


  ![A459602_1_En_7_Fig1_HTML.jpg](img/A459602_1_En_7_Fig1_HTML.jpg)


  图 7-1


  SmartAppGen 高层架构


  一个复杂的知识应用需要支持社交网络、图像和语音处理、无线升级能力以及持久化管理功能。因此，SmartAppGen 必须能够生成此类功能。


  基于应用工作流，我们为 SmartAppGen 设计了一个底层架构。


  图 7-2 描述了 SmartAppGen 在表示层、应用层和数据层中的所有组件。


  ![A459602_1_En_7_Fig2_HTML.jpg](img/A459602_1_En_7_Fig2_HTML.jpg)


  图 7-2


  底层架构


  现在让我们详细描述每个组件。


  ### 模型代码生成器


  此框架用于生成代表知识/指南模型的代码（例如 `GuidelineData.java`）。


  ### 视图代码生成器


  此框架用于生成知识/指南的用户界面代码（例如 `Guidelinescreen.java`）。


  ### 控制器代码生成器


  此框架用于生成知识指南的控制器代码（例如 `Mainactivity.java`）。


  ### 问题提取器


  此模块提取指南类型（决策型/信息型）、问题、答案类型和答案值，并自动构建 `question.xml`。


  ### 上下文管理器生成器


  此框架生成与知识应用相对应的上下文管理器。


  ### 规则生成器


  此框架将数字化指南转换为规则。对于每条指南，会生成一组规则文件。在 `DTRules` 规则引擎中，决策在 Excel 工作表中表示。`Excel2XML` 将决策转换为可由规则引擎处理的
  XML 文件。在 `CLIPS` 中，可以根据注册信息和问题轻松生成规则头文件。开发者只需编写规则的其余部分即可。


  ### 语言翻译器


  此框架为将应用文本翻译成多种语言提供支持。


  ### 持久化助手


  此框架有助于将应用数据持久化到本地数据库。


  ### 交互到 XML 转换器


  此框架将用户交互（例如模型）转换为 XML。


  ### 规则升级器


  此框架将有助于通过无线方式升级规则。


  ### Cwac-updater


  此开源框架 [1] 可用于通过无线方式升级 Android 应用。


  ### 语音转文本转换器


  此框架将用户的语音转换为文本。


  ### 文本转语音转换器


  此框架将帮助将文本转换为语音，并帮助应用通过语音与用户交互。


  ### 照片捕获器


  这是一个用于捕获照片的通用框架。


  ### 音频捕获器


  这是一个用于捕获音频（用于录音或任何其他目的）的通用框架。


  ### 聊天框架


  此框架支持聊天功能。


  ### 边缘智能框架


  此框架需要建立在规则引擎之上，并帮助应用轻松地与规则引擎通信。


  ### REST 客户端


  此框架将帮助应用使用任何符合 `JAX-RS` 规范的服务器公开的 RESTful Web 服务。


  ### 安装管理器


