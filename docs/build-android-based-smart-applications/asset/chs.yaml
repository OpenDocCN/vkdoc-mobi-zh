  \ 项目。\n* 将包含规则的 .clp 文件复制到一个文件夹中，例如模拟器中 sdcard 的 temp 文件夹。\n* 将 `zilonis0.97b.jar`\
  \ 和 `antlr.jar` 添加到项目的构建路径。\n\n在为 Zilonis 编写规则文件（.clp）时，请确保以下几点：\n\n* 在 .clp 文件中，一行只能添加一条语句，这与\
  \ CLIPS 不同。\n* 行与行之间不应有空格。\n\n#### Termware\n\n在 Android 中移植 Termware 很简单。只需一步：\n\
  \n* 从属于 `TermWare.jar` 中的 `ua.gradsoft.termware` 和 `ua.gradsoft.termware.util` 的\
  \ Java 文件中，移除所有与调试存根相关的项。\n\n#### Roolie\n\n将 Roolie 移植到 Android 上无需任何额外工作——你只需将\
