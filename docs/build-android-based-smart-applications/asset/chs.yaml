- "# 移植规则引擎的步骤\n\n本章将介绍如何在 Android 平台上移植主要的规则引擎。\n\n#### CLIPS\n\n使用 Android-ndk 和\
  \ Eclipse Helios 将 CLIPS 移植到 Android。最好使用 Linux 机器进行移植。以下是将 CLIPS 移植到 Android 的步骤：\n\
  \n* 从 Source Forge 下载 `CLIPSJNI` 源代码，并从源代码构建一个 Android 库项目。\n  * 将库项目导出为 `CLIPSJNI.jar`。\n\
  * 创建一个虚拟的 Android 项目，并在项目目录下创建一个 JNI 目录。\n* 将 CLIPS 中所有源文件（*.c）和头文件（*.h）复制到 JNI\
  \ 目录。\n* 在 `Android.mk` 中添加除 `main.c` 之外的所有源文件。你的 `Android.mk` 应该如下所示：\n\n```\n\
  LOCAL_PATH := $(call my-dir)\ninclude $(CLEAR_VARS)\nLOCAL_MODULE    := CLIPSJNI\n\
  LOCAL_SRC_FILES := agenda.c \\\nanalysis.c \\\nargacces.c \\\n.\n.\n.\nCLIPSJNI_Environment.c\n\
  LOCAL_LDLIBS    := -lm -llog -ljnigraphics\ninclude $(BUILD_SHARED_LIBRARY)\n```\n\
  \n* 在 JNI 目录中搜索 `setlocale` 函数。在期望 `setlocale` 返回一个值的地方，将其硬编码为 `C`，并注释掉所有其他的 `setlocale`\
  \ 调用，因为 Android 的 `setlocale` 返回硬编码的 `0`！\n* 注释掉 main 函数（只是为了安全起见）。\n* 运行 `ndk-build\
  \ –b`。\n* 将 `libCLIPSJNI.so` 复制到 `libs/armeabi` 和 `libs/armeabi-v7a` 目录。\n* 将 `CLIPSJNI.jar`\
  \ 作为外部 jar 添加到你的 Android 项目中。\n\n#### JRuleEngine\n\n以下是将 JRuleEngine 移植到 Android\
  \ 的步骤：\n\n* 下载 `jsr172.jar`。\n  * 从此 jar 文件中移除除了 `java.rmi` 之外的所有包。\n* 使用 `jarjar.jar`\
  \ 工具重新打包该 jar，操作如下：\n  * 创建包含以下行的 `rulefile.txt` 文件：`rule java.rmi.** com.<你的公司>.java.rmi.@1`\n\
  \  * 在命令提示符下，运行 `java -jar jarjar.jar process rulefile.txt <输入 jar> <输出 jar>`\n\
  * 下载 `jsr94-1.1.jar`。\n* 使用 `jarjar.jar` 工具重新打包该 jar。\n  * 创建一个包含以下行的 `rulefile.txt`\
  \ 文件：`rule java.rmi.** com.<你的公司>.java.rmi.@1`\n  * 在命令提示符下，运行：`java -jar jarjar.jar\
  \ process rulesfile.txt <输入 jar> <输出 jar>`\n* 下载 Apache Harmony 的 `awt.jar`，并从该\
  \ jar 中移除所有 `java.*` 包。\n* 下载内含源代码的 `jruleengine.jar`。\n* 注释所有包含 `Component.getName()`\
  \ 函数调用的 `else if` 语句；同时移除 `import java.awt.Component;` 语句。\n* 使用 `jarjar.jar` 工具重新打包\
  \ `jruleengine.jar`。\n* 创建包含以下规则的 `rulefile.txt` 文件：\n  * `rule java.rmi.** com.<你的公司>.java.rmi.@1\
  \ rule java.awt.Component** org.apache.harmony.awt.ComponentInternals@1`\n  * 运行\
  \ `java -jar jarjar.jar process rulefile.txt <输入 jar> <输出 jar>`\n* 创建一个 Android\
  \ 项目，并将所有这些 jar 添加到项目的构建路径中。\n* 将包含规则的 XML 文件复制到模拟器中的 sdcard。\n\n#### DTrules\n\n\
  jar 文件可以在 Android 中工作，但需要执行以下步骤才能在 Android 应用程序中使用 DTrules：\n\n* 在 Excel 表中将规则编写为决策表。示例\
  \ Excel 表可在 `sampleprojects/<项目名>/DecisionTables` 中找到。\n* 创建如下文件结构：\n\n```\n/DecisionTables/包含决策表的\
  \ excel 表.xls\n/edd/包含 edd 的文件.xls\n/xml/\n/DTRules.xml\n```\n\n* 通过使用如下代码，将包含规则的\
  \ Excel 表转换为 XML：\n\n```\nExcel2XML.compile(\"根路径\", \"DTRules.xml\", \"规则集名称\"\
