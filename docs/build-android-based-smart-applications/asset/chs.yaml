  测验题目


  ![A459602_1_En_9_Fig1_HTML.jpg](img/A459602_1_En_9_Fig1_HTML.jpg)


  图 9-1


  AutoQuiz 应用


  ### AutoQuiz 的优点


  我们可以轻松地观察到 AutoQuiz 系统的以下优点：


  *   基于培训/演示材料自动生成测验，节省了手动准备测验的数小时工作量

  *   自动验证测验答案，再次节省了手动验证答案的数小时工作量

  *   使培训/演示更加高效，因为参加培训的人必须回答 AutoQuiz 生成的题目，他们及其经理可以立即知道分数

  *   衡量培训师和培训材料的有效性


  ### 已知问题


  对于 AutoQuiz 系统，我们仍需解决以下问题：


  *   在“填空”和“名词”题中，选项有时可能不具合理性，使得应试者即使不理解文章内容也能轻松答对。我们计划通过为选项池中的词语标记属性来解决此问题。

  *   如果两类探究式问题只使用“谁/什么”，会变得过于单调和机械。目前使用这些词是因为 AutoQuiz 无法识别句子中的主语。

  *   句子焦点：当前的原型系统无法识别句子的主语，从而无法生成更有意义的问题。例如：输入句子：“只有那个小偷偷戴黑帽子。” 这里的焦点是“小偷”，而不是帽子的颜色。合适的问题：“谁戴了黑帽子？”
  不太合适的问题：“那个小偷戴了什么颜色的帽子？”

  *   知识提取：当前的原型系统仅能浅层提取知识，而无法深入。它们没有使用规则来存储知识，因此无法用于进行推理。例如：输入：“乔是约翰的兄弟。约翰是杰克的兄弟。”
  可能的推理结果：“乔是杰克的兄弟。”


  在下一节中，我们将提出这些问题的可能解决方案。




  '
- '# 未来工作


  命名实体识别软件可用于细化“谁/什么”类问题，使其更具针对性。这将有助于用户理解问题，同时提升问题质量。这些数据可用于生成高度专业化的问题，例如：谁、什么、何时、多少等。此外，它还将有助于识别句子的主语。


  另一项可改进之处是允许出题者选择用于生成问题的句子，而非使用所有句子。一个关键标准可以是句子中是否存在对问题至关重要的特定词性标注的词。


  此外，复合句既可以拆分为两个独立的句子，也可以直接用作问答对。例如：


  输入句子：


  - “乔去了厨房，因为他饿了。”

  - (“乔去了厨房。”) + (“他饿了。”)

  - 可能的问题：

  - “谁去了厨房？”

  - “谁饿了？”

  - “乔为什么去厨房？”（答案：“因为他饿了”）


  然而，这类问题要求程序对句子有更深的理解。第一步应以能够识别句子主干和修饰部分的方式来解析句子。可以使用`OpenNLP`解析器来确定句子结构。例如：


  输入句子：“敏捷的棕色狐狸跳过了那只懒狗。”


  输出：


  ```

  (TOP

  (NP

  (NP

  (DT The)

  (JJ quick)

  (JJ brown)

  (NN fox)

  (NNS jumps)

  )

  (PP

  (IN over)

  (NP

  (DT the)

  (JJ lazy)

  (NN dog)

  )

  )

  (. .)

  ```


  `PP`、`IN`、`JJ`等是来自 Penn 树库标签集[20]的词性标注。以这种方式解析的句子有助于计算机理解句子的结构，并帮助它们生成比简单操作原始句子更具创造性的问题。


  此外，以这种方式解析的句子有助于从句子中提取知识。知识可以以规则的形式存储（例如，`CLIPS`[19]是一种规则引擎）。这些规则可以作为谓词，用于推导结论。这些结论将作为新规则存储，也可以输出为问题。


  企业需要规划知识管理自动化。“知识应用”可以从现有的结构化知识中自动生成。此类应用可以帮助知识工作者更好地完成日常工作。这将显著减少培训人员所需的时间，并提高知识工作者的效率和准确性。


  在培训员工掌握非结构化知识方面，公司每年花费数百万美元；许多培训效果不佳，白白浪费了这些资金。实施 AutoQuiz 可以确保员工真正理解培训或演示中分享的知识。项目经理可以评估培训或演示的效果（例如，哪些培训是重复的，哪位员工学习慢，哪位培训师效果不佳等），并采取相应措施。


