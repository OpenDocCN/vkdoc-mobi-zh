- fmt: '## 6.1 Smart Mobility During the COVID-19 Pandemic


    The coronavirus outbreak caused widespread concern and economic hardship for mobility
    service providers. This pandemic affected all aspects of the mobility systems
    and services. Global sales of cars and trucks dramatically declined primarily
    due to economic uncertainty. Vehicle sales in the United States, Europe, and China
    dropped in April 2020 by 52%, 80%, and 3%, respectively, compared to April 2019
    (Collie et al., 2021). In Canada, automotive sales fell by a staggering 74.6%
    in April 2020; and in the United Kingdom, sales fell by a seemingly impossible
    97%—only 4,300 cars sold to private owners all month, countrywide (Stoddart, 2020).
    Moreover, several companies decided to get rid of some nonessential business to
    become more profitable as soon as possible. For example, Uber sold Jump, their
    bike share business, General Motors shut down Maven car sharing services and ARV
    e-bikes, and Ford and Lincoln canceled Rivian-powered electric vehicles. Public
    transit usership has also decreased due to mobility restrictions during the lockdown
    and the great shift to online learning, virtual meetings, and working from home
    as a new normal. Moreover, a safe physical distancing and sanity of the environment
    cannot be guaranteed in public transit. For example, the Toronto Transit Commission
    (TTC) in the city of Toronto dropped to less than 20% of its typical ridership
    since the province declared a state of emergency in mid-March (Boisvert, 2021).
    According to a survey conducted by the University of Toronto (Palm et al., 2020),
    5% of respondents said they would return to transit during stage 1 of the province’s
    three-stage reopening plan, while 63% said they would do so during stage 3\. Statista
    shows that the pandemic has resulted in a significant drop in revenue for mobility
    services in Europe for 2020, as demand for flights, buses, trains, and ridesharing
    has plummeted considerably (Statista Research Department, 2021). Rental car giant
    Hertz formally filed for bankruptcy in May 2020 after its global revenue dropped
    by 73% in April 2020 from the same month in 2019\. The pandemic also impacted
    the suppliers of the OEMs due to the production shutdown. For instance, Techniplas,
    a producer of plastic components for the auto industry, filed for bankruptcy in
    May 2020 citing the coronavirus, among other issues, as the reason for the filing.
    Most dramatically, several major airlines filed for bankruptcy or ceased operating
    or collapsed due to the coronavirus such as LATAM, Virgin Australia, Avianca,
    RavnAir, Air Italy, Jet Time, and AtlasGlobal.


    Despite the aforementioned profound impacts of the COVID-19 pandemic on automotive
    sales, car rentals and public transit in urban mobility, shared mobility, and
    last-mile delivery services were notably impacted negatively in the case of shared
    mobility services and positively in the case of last-mile delivery services. The
    following subsections explain in detail how COVID-19 impacted these two sectors
    of smart mobility.


    ### 6.1.1 COVID-19 Impacts on Shared Mobility


    To combat the coronavirus outbreak, governments all around the world applied strict
    lockdown measures that resulted in harsh reduction in people mobility and consequently
    drastic reduction in personal transportation (Hattrup-Silberberg et al., 2020).
    As people begin to abide by the social distancing and quarantine guidelines, shared
    mobility services like ridehailing/ridesourcing and carpooling become less attractive
    due to their susceptibility to coronavirus spread and less profitable due to the
    harsh reduction in people mobility especially during the lockdown and curfew periods.


    According to a survey by McKinsey (Andersson et al., 2020), 45% of the respondents
    rank “reducing the risk of infection” the highest priority compared to only 14%
    before the pandemic. In contrast, the number of respondents who care most about
    “time to the destination” drops by 14%. The same survey also shows that only very
    few respondents think public transportation and shared mobility are safe. Another
    survey by CarGurus (Gurus, 2020) shows that almost 40% of Americans wanted to
    use taxis/rideshares less or not at all, while 49% said they would instead use
    their own vehicle more. In China, 66% of Chinese consumers indicated a preference
    for private vehicles for commute post the COVID-19 crisis, as compared to 34%
    before the crisis according to Second Measure’s survey (Future Bridge, 2021).
    During the pandemic, people spent 21% less in ridehailing services like Uber and
    Lyft, and Uber made 70% fewer trips in cities hit hard by the coronavirus (Future
    Bridge, 2021). According to Uber’s financial report at the end of the second quarter
    of 2020, total revenue declined by 29% year-over-year, and mobility revenue declined
    by 67% year-over-year, which resulted in an 837-million-dollar loss, 28% more
    than last year (Uber, 2020). Despite this decrease in ridehailing services, shared
    micromobility services like bike sharing witnessed a relative increase in usage
    as these services provide open space with limited human contact.


    Given the fact that most of the shared mobility services require people to share
    together a small and closed space that increases the chance of gathering together
    and contacting with others, this mode of transportation would increase the likelihood
    of both person-to-person transmission and surface-to-person transmission of the
    virus. Person-to-person transmission involves the inhalation of virus particles
    in enclosed environments, while surface-to-person transmission involves physical
    contact with a contaminated surface. This is why fewer users choose to use shared
    mobility services because of being afraid to get infected by strangers. In order
    to ensure passenger safety and guarantee the sanity of shared vehicles, ridehailing/ridesourcing/transportation
    network companies (TNCs) and shared mobility service providers are implementing
    very specific guidelines and strict public health measures. These measures include
    mandating that both drivers and passengers wear face masks, the use of protective
    shields, adding physical barriers between seats, controlling the number of passengers
    allowed in a shared ride or canceling the shared mobility services, the use of
    contact tracing, temperature scanning before use, providing drivers with disinfectant
    supplies, and thorough sanitization after each use. For example, DiDi is promoting
    the use of protective shields in cars (Future Bridge, 2021). Uber and Lyft have
    canceled the shared mobility services and only allow users to order vehicles for
    themselves. Moreover, several mobility players invested in new technologies geared
    toward guaranteeing the safety and sanity of the vehicles. Examples include antibacterial
    coating, antimicrobial surface protective shields, air filtration systems to prevent
    bacteria and other viruses from entering the car, air purification systems using
    nano-silver technology, and contact-free disinfection systems such as ultraviolet
    (UV)-C irradiation (200–280 nm). This UV-C can destroy vicious viruses without
    harming humans. Silicon dioxide–based nano-coating called “Liquid Guard” structured
    with sharp peaks and with a constant positive charge is used within the European
    project called “COVID Adapted Motosharing Services (CAMS).” CAMS explores the
    applicability of nanotechnology for physical removal of the novel coronavirus
    in SEAT motosharing services as a way to promote “virus-free” motosharing services.
    The coating is capable of attracting negative membranes, perforating and eliminating
    bacteria, fungi, spores, and viruses whose structure contains membranes. Liquid
    Guard has been tested for its effectiveness against `E. coli`, influenza A, and
    some forms of coronavirus including SARS-CoV-2\. All of these measures increase
    the operating cost of the shared mobility services resulting in less profit compared
    to the pre-pandemic times.'
