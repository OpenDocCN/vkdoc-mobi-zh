  trans: '

    ### 3.6.1 人工智能的演进


    `AI` 并非一种全新的技术，而是一项持续演进的技术，其根源可追溯到古典哲学家们试图将人类思维建模为符号系统的努力，这最终催生了作为思维过程的“联结主义”。我们应当区分两种
    `AI` 方法：自上而下的方法（白箱或生成式方法）和自下而上的方法（黑箱、判别式或数据驱动方法）。传统的 `AI` 技术遵循自上而下的演绎推理方法，它们首先利用已有的知识和少量示例，构建关于世界的抽象且宽泛的假设。这些技术会根据这些假设成立时数据应有的样子进行预测，然后在收到更多观察结果后，根据预测结果来修正假设（Gopnik,
    2017）。相比之下，现代 `AI` 技术或计算智能技术的特点是自下而上的归纳推理（处理数值数据以推断符号），并试图从原始数据（成千上万个示例）中提取模式。这些现代
    `AI` 技术通过赋予产品和服务从存档数据、流数据或实时数据中发现和识别复杂模式与趋势（如类别、聚类或异常）的能力，并预测未来数值，以及在不同抽象层级从示例和观察中学习，从而驱动了各类产品和服务。


    理解当前 `AI` 算法的局限性有助于判断哪些问题可以由 `AI` 解决，以及如何改进现有算法或创建新算法，以应对更广泛的实际不良结构问题（`ISPs`）。由于
    `AI` 算法被用于赋予人工系统或过程以智能行为，我们应当理解智能行为的具体含义。行为是外部观察者所看到的人工系统或过程在做什么。广义上讲，`AI` 算法可分为个体（`i`-level）算法和群体（`g`-level）算法。无论是个体级算法还是群体级算法，都可用来实现单个系统/过程（以下称为“智能体”）或一组智能体的低级行为和高级行为。


    单个智能体的低级行为可能包括：基于上下文的数据收集、物体检测、避障、语音识别，以及利用可用执行器操纵物体或对环境施加影响。群体级低级行为的例子包括：协作式上下文感知数据收集、信息交换和协同操作。例如，上下文感知数据收集指的是单个或多个智能体（在协作数据收集情况下）基于特定上下文，有选择性地、有认知地进行数据收集的过程。上下文是可用于表征情境的任何信息。下一章将提供更多关于上下文感知系统的细节。


    单个智能体的高级行为包括：解释收集到的数据、理解当前情境、预测未来后果以及从经验中学习。在群体层面，高级行为可能包括但不限于：共享情境意识、达成共识、协作决策、群体形成、通信中继以及多智能体学习。例如，在协作学习中，必须最大化所有智能体折扣未来回报的总和（社会福祉），或者必须选择一个更易于收敛的均衡或共识点，例如纳什均衡点（Vidal,
    2006）。与用于低级/高级行为的个体级算法相比，用于高级行为的群体级算法在设计上更具挑战性。这主要是因为我们对生物系统中高级行为的工作机制尚未完全理解。例如，人类及所有生命体都有从环境中获取信息、解读信息并做出适当决策的能力。这种能力需要执行不同的低级和高级功能。人类大脑的低级功能，例如看、听、闻、尝和触摸，已被充分理解并定位于大脑皮层。然而，更高级的认知过程，如信息融合、情境意识、推理、决策和学习，尚未被完全理解。总的来说，我们才刚刚开始了解这些高级认知功能在大脑中发生的位置，更不用说它们是如何实现了（Anderson,
    2005）。理解大脑的工作方式可以说是我们这个时代最伟大的科学挑战之一（Alivisatos et al., 2012）。


    在人类中，认知是通过大量神经元中神经激活的模式来实现的。类似地，多智能体系统必须能够执行不同的低级和高级行为。让我们以人类为例，将图片合成和学习分别作为个体低级行为和高级行为的例子。构建环境的完整图片可以通过单一感官实现，也可以通过融合从多种感官收集的数据来实现。人类大脑就像一个强大的融合节点。每当感官受到适当信号的刺激时，它就会融合不同的信息。我们的大脑持续且完美地融合了由眼睛、耳朵、鼻子、舌头和皮肤这些传感器提供的视觉、听觉、嗅觉、味觉和触觉信息。这些信息以神经元持续变化的电化学活动来表示。


    对于像学习这样的高级功能，我们尚未完全理解大脑如何能通过极少甚至单个示例进行学习，如何能基于先前的经验进行泛化，以及如何能提取新概念并展现出创造性推理的不同迹象。例如，在未知环境中，我们常常会四处走动以探索并构建该环境的地图。即使关灯或闭上眼睛，我们也能在以后利用这张地图来导航。我们把这个地图存储在哪里，又如何学会使用它呢？需要开发结合自上而下演绎推理和自下而上归纳推理的新型混合机器学习算法，以模仿人类学习这一高级功能。

    '
- fmt: '之前讨论的个体层面（*i*-level）的画面编译与学习行为，在群体层面（*g*-level）上进行模仿要困难得多。我们尚未完全理解如何针对一个期望的群体层面（*g*-level）行为来设计个体层面（*i*-level）行为，因为集体行为并非个体行为的总和，而是在社会层面涌现出其他特性（Pasteels
    and Deneubourg, 1987）。理解人脑如何实时完美地执行低层次和高层次的认知功能，有助于为人工系统/过程设计高效且自适应的算法。


    当前AI算法在创建人工代理个体和群体层面的低层次及高层次行为方面存在若干局限性，这使得当前这波AI成为一种弱/窄AI，仅在非常狭窄且定义明确的领域内运作。强/通用/深度AI以及超级智能尚未到来。配备了超级智能的机器将能够像超人一样进行认知行为。表[3-2](#511013_1_En_3_Chapter.xhtml#Tab2)突出了窄AI、通用人工智能与超级智能之间的主要区别。


    当前媒体对AI的夸大宣传和噪音在社会中造成了对强AI的刻板印象，而我们现在实际拥有的只是一种弱AI。这导致了期望与现实之间的差距扩大，使人们对AI工具的失败感到不满和缺乏宽容。实际上，即使是世界顶尖的AI专家也对超级智能何时到来存在分歧。一些人认为在2045年之前可以实现，而另一些人则猜测需要数百年甚至更久。为了降低这种风险，应强调当前算法的局限性，并开发新算法以开启下一波强/通用AI浪潮。


    **表3-2** AI浪潮


    | 浪潮 | 领域 | 适应性 | 脑力 |

    | --- | --- | --- | --- |

    | 人工窄智能 (ANI) | 特定领域（图像识别、语音识别、文本挖掘等） | 无 | 看似相似但水平不及（低于小鼠的脑力） |

    | 通用人工智能 (AGI) | 个体层面（*i*-level）的跨领域能力 | 有 | 超越人类的脑力 |

    | 人工超级智能 (ASI) | 个体层面（*i*-level）和群体层面（*g*-level）的跨领域能力 | 有 | 超越所有人类大脑总和 |


    美国国防高级研究计划局（DARPA）对AI浪潮有着非常有趣的愿景（图[3-6](#511013_1_En_3_Chapter.xhtml#Fig6)）。在他们看来，第一波AI专注于基于手工知识或规则的系统，这些系统能够执行定义狭窄的推理任务，但执行感知任务的能力非常有限，且不具备学习、新概念生成或抽象能力。


    第二波是当前基于统计机器学习的系统浪潮，能够识别复杂模式并从大量多维数据中学习。尽管这些系统拥有较高的感知和学习能力，但仍然存在抽象、推理、因果分析、可解释性以及在非平稳环境中适应变化条件的能力不足等局限。第三波AI的引入正是为了解决这一局限，专注于情境适应、可解释性和常识推理，使机器能够适应变化的情况。在像移动出行这样受到高度监管的行业，推理、因果、可解释性和处理漂移的能力至关重要，尤其是在移动出行车辆的安全关键功能方面。根据DARPA的说法，被称为“情境AI”的第三波AI将处理当前AI浪潮的局限性。情境AI是一种嵌入并理解人类情境的技术，能够与人类交互（Brdiczka,
    2019）。聚焦于情境AI，DARPA于2018年9月宣布了一项名为“AI Next”计划的多年度投资，投入超过20亿美元用于新的和现有的项目。^([^(12)](#fn12))


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig6_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig6_HTML.png)


    **图3-6** DARPA对AI浪潮的愿景


    ### 3.6.2 统计机器学习


    学习是形成外部世界的内部模型（Dehaene, 2020）。机器学习（ML）是AI的一个子领域，它赋予人工系统/过程从经验和观察中学习的能力，而无需进行显式编程，如图[3-7](#511013_1_En_3_Chapter.xhtml#Fig7)所示。


    Mitchell（Mitchell, 1997）对ML的定义如下：*“一个计算机程序如果能够通过经验E改进其在某类任务T上的性能（通过性能度量P衡量），则称其从经验E中学习。”*
    更全面地，Dehaene引入了构成当今机器学习算法核心的七个关键学习定义。这些定义包括：学习是调整心智模型的参数，学习是探索组合爆炸，学习是最小化错误，学习是探索可能性空间，学习是优化奖励函数，学习是约束搜索空间，以及学习是投射先验假设（Dehaene,
    2020）。在其著作《终极算法》（Domingos, 2015）中，Pedro Domingos教授将机器学习的学派归纳为五个主要学派，如图[3-8](#511013_1_En_3_Chapter.xhtml#Fig8)所示。


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig8_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig8_HTML.png)


    **图3-8** 根据《终极算法》（Domingos, 2015）的机器学习方法


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig7_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig7_HTML.png)


    **图3-7** AI、ML与深度学习


    *   贝叶斯学派：以概率推理作为核心算法

    *   符号主义学派：以规则和树作为该范式内的核心算法

    *   连接主义学派：使用带有反向传播的神经网络作为核心算法

    *   进化主义学派：依赖进化计算范式

    *   类比学派：使用诸如带不同核函数的支持向量机等数学技术'
  raw: 'The previously discussed *i*-level picture compilation and learning behaviors
    are much more challenging to mimic at the *g*-level. We do not fully understand
    how to design *i*-level behaviors for a given desired *g*-level behavior given
    the fact that collective behavior is not simply the sum of each participant’s
    behavior, as others emerge at the society level (Pasteels and Deneubourg, 1987).
    Understanding how the human brain perfectly performs both low-level and high-level
    cognitive functions in real time can help in designing efficient and adaptive
    algorithms for artificial systems/processes.


    The several limitations of current AI algorithms to create low-level and high-level
    behaviors at the individual and group levels of the artificial agents make the
    current wave of AI a form of weak/narrow AI that functions in very narrow and
    well-defined domains. Strong/general/deep AI and superintelligence are yet to
    come. A machine equipped with superintelligence will be able to behave cognitively
    like a superhuman. Table [3-2](#511013_1_En_3_Chapter.xhtml#Tab2) highlights the
    main difference between narrow AI, artificial general intelligence, and superintelligence.


    The current media exaggeration and the noise about AI created a stereotyped view
    of strong AI in the society, while what we actually have now is a form of weak
    AI. This results in widening the gap between expectations and realities and makes
    people dissatisfied and less tolerant about the failure of AI tools. In reality,
    even the world’s leading AI experts disagree on when superintelligence may happen.
    Some see it feasible by year 2045, and others guess hundreds of years or more.
    In order to mitigate this risk, the limitations of the current algorithms should
    be highlighted, and new algorithms should be developed to start the next wave
    of strong/general AI.


    Table 3-2


    AI Waves


    | Wave | Domain | Adaptation | Brainpower |

    | --- | --- | --- | --- |

    | Artificial narrow intelligence (ANI) | Domain-specific (image recognition, speech
    recognition, text mining, etc.) | No | Looks similar but not at the same level
    (suppresses brainpower of mouse) |

    | Artificial general intelligence (AGI) | Cross-domain capability at *i*-level
    | Yes | Suppresses brain power of human |

    | Artificial superintelligence (ASI) | Cross-domain capability at both *i*-level
    and *g*-level | Yes | Suppresses brain power equivalent to all human brains combined
    |


    The Defense Advanced Research Projects Agency (DARPA) has a very interesting vision
    for the AI waves (Figure [3-6](#511013_1_En_3_Chapter.xhtml#Fig6)). In their perspective,
    the first wave of AI was focusing on handcrafted knowledge or rule-based systems
    capable of narrowly defined reasoning tasks with very limited ability to perform
    perception task and no ability of learning or new concept generation or abstraction.


    The second wave is the current wave of statistical machine learning–based systems
    able to recognize complex patterns and learn from large amounts of multidimensional data.
    Although these systems have high perception and learning capabilities, they still
    suffer from limited ability of abstracting, reasoning, causality analysis, explainability,
    and adapting to changing conditions in nonstationary environments. The third wave
    of AI is introduced to handle this limitation focusing on contextual adaptation,
    explainability, and commonsense reasoning to make it possible for machines to
    adapt to changing situations. In a highly regulated industry like mobility, aspects
    like reasoning, causality, explainability, and ability to handle drifts are very
    important especially when it comes to safety-critical features in mobility vehicles.
    According to DARPA, the third wave of AI known as “contextual AI” will handle
    the the limitations of the current wave of AI. Contextual AI is technology that
    is embedded in and understands human context and is capable of interacting with
    humans (Brdiczka, 2019). Focusing on contextual AI, DARPA announced in September
    2018 a multiyear investment of more than $2 billion in new and existing programs
    called the “AI Next” Campaign.^([^(12)](#fn12))


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig6_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig6_HTML.png)


    Figure 3-6


    DARPA’s Vision for AI Waves


    ### 3.6.2 Statistical Machine Learning


    Learning is to form an internal model of the external world (Dehaene, 2020). Machine
    learning (ML) is a subfield of AI that endows an artificial system/process with
    the ability to learn from experience and from observation without being explicitly
    programmed as illustrated in Figure [3-7](#511013_1_En_3_Chapter.xhtml#Fig7).


    Mitchell (Mitchell, 1997) defines ML as follows: *“A computer program is said
    to learn from experience E with respect to some class of tasks T and performance
    measure P, if its performance at tasks in T, as measured by P, improves with experience
    E.”* More comprehensively, Dehaene introduced seven key definitions of learning
    that lie at the heart of present-day machine learning algorithms. These definitions
    include learning is adjusting the parameters of a mental model, learning is exploring
    a combinatorial explosion, learning is minimizing errors, learning is exploring
    the space of possibilities, learning is optimizing a reward function, learning
    is restricting search space, and learning is projecting a priori hypotheses (Dehaene,
    2020). In his book *The* *Master Algorithm* (Domingos, 2015), Professor Pedro
    Domingos summarizes the machine learning schools of thoughts into five main schools
    as illustrated in Figure [3-8](#511013_1_En_3_Chapter.xhtml#Fig8).


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig8_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig8_HTML.png)


    Figure 3-8


    Machine Learning Approaches as per The Master Algorithm (Domingos, 2015)


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig7_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig7_HTML.png)


    Figure 3-7


    AI, ML, and Deep Learning


    *   Bayesians with probabilistic inference as the master algorithm


    *   Symbolists with rules and trees as the main core algorithm within this paradigm


    *   Connectionists who use neural networks with backpropagation as a master algorithm


    *   Revolutionaries who rely on the evolution computing paradigm


    *   Analogizers who use mathematical techniques like support vector machines with
    different kernels'
