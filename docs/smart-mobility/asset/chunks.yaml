  trans: '

    ### 6.1.2 新冠疫情对最后一公里配送服务的影响


    新冠疫情的爆发改变了人们的购物偏好，使其倾向于在线购物，以尽量减少不必要的接触，并遵守疫情期间实施的出行限制。根据 TopData 对 1000 名美国人在新冠疫情期间购物行为的一项调查（Pastore,
    2020），87%的人在网上购物，64%的人用在线订购取代了传统的每周购物。另一项由 Selligent 对全球 5000 名消费者进行的调查表明，36%的消费者现在每周网购一次，较疫情前的
    28%有所增加（Selligent, 2020）。根据 Bazaarvoice 的调查（Bazaarvoice, 2020），62%的美国购物者表示，他们现在网购的频率高于疫情前。全球范围内，49%的消费者现在网购的频率高于疫情前。这种购物偏好和消费者行为的变化，帮助食品杂货和餐饮服务供应商在疫情期间的封锁中维持业务并得以生存，同时也促使配送公司测试和部署创新的配送方式，例如无接触配送、路边自提或暗店模式、无人值守配送、前廊配送或放门口配送，以及机器人配送。一些共享出行服务提供商也开始专注于最后一公里配送服务。根据优步的财务报告（Uber,
    2020），由于疫情，Uber Eats 的收入同比增长了 103%。


    新冠病毒的高度传染性导致了有史以来最严重的疫情之一。保持社交距离是通过减少人与人之间的接触来降低病毒传播的主要措施。最后一公里配送机器人作为一种无接触配送药物、食品或杂货的方式，在抗击新冠病毒传播中发挥了关键作用。无接触的最后一公里配送系统和服务可以避免护理人员与患者之间，或配送人员与收件人之间的物理接触。这些无接触配送系统得益于互联技术的快速普及以及半自主和全自主配送平台的最新进展，这些平台彻底改变了城市物流，并为医疗用品（Niels
    等人，2018）、药品（Nianzhen，2020）、食品、杂货和其他商品（《曼谷邮报》，2020；Crowe，2020）提供了安全高效的配送方式。


    由于大多数餐馆和咖啡馆在封锁期间关闭，食品配送的需求从未如此之高。保持社交距离和对表面进行消毒的需求加速了机器人配送的开发和采用。采用机器人配送可以消除人与人之间传播的风险，并通过减少人与包裹的接触来降低物到人传播的风险。疫情期间测试和部署的几种配送机器人包括：Nuro
    无人驾驶汽车、Starship 自动六轮配送机器人、Unity Drive Innovation（UDI）自动驾驶货车、Dianomix Robox、Refraction
    AI REV-1 自动配送机器人、京东迷你电动货车、Zipline 无人机以及用于疫情期间医疗用品配送的 Antwork 配送无人机。


    Nuro 无人驾驶汽车于 2020 年 4 月获准在加利福尼亚州进行配送测试。该配送机器人使用其小型合法上路配送机器人车队，将药品运送到德克萨斯州休斯顿的
    CVS 顾客手中。居住在服务区域的顾客在通过 CVS.com 或 CVS 应用程序下处方订单时，可以选择自动驾驶配送选项。Nuro 具有很高的安全性，因为当
    Nuro 的自动驾驶汽车到达顾客家门外的路边时，顾客需要确认身份才能解锁取货。


    Starship 机器人可以在 4 英里（6 公里）半径范围内运送物品。包裹、杂货和食品会直接从商店配送，时间由顾客通过移动应用程序请求。订单下达后，可以在智能手机上监控机器人的整个行程和位置。UDI
    自动驾驶货车使用激光雷达、摄像头和深度学习算法实现自动驾驶，其货舱可承载高达 1000 公斤的货物，旨在配送新鲜水果、蔬菜和其他物资。这种无人驾驶车辆为常规配送提供了一种“无接触”替代方案，有助于降低人传人的感染风险。自疫情开始以来，UDI
    一直在淄博以及苏州和深圳另外两个城市运营着一支小型车队，为检查站工作人员配送餐盒，并在医院附近喷洒消毒剂。从 2020 年 2 月到 4 月，这些货车合计完成了超过
    2500 次自动驾驶行程，尽管处于封锁状态，但经常遇到繁忙的交通状况（Guizzo，2020）。Dianomix Robox 设计用于在人行道上行驶，并将包裹送至用户的门廊。Refraction
    AI REV-1 用于配送食物。该配送机器人可以在自行车道和公共道路上行驶，最高时速可达 15 英里，并能在住宅区减速，遵守交通信号灯，并避开行人、骑自行车的人、路缘、树木和灯柱。


    总部位于美国的无人机配送公司 Zipline 正在加纳和卢旺达配送医疗用品和个人防护装备（PPE）。他们的无人机可以在收到订单后五到七分钟内起飞，飞行时间从
    15 分钟到 30 分钟不等。这些无人机还可以帮助收集新冠病毒检测样本。


    明尼苏达州的 Hutchinson Health 一直在使用一款名为“Jim”的中继配送机器人，将用于新冠病毒检测的样本从收集帐篷运送到医院实验室，全程无人接触，极大地缩短了检测的周转时间。为了尽量减少接触，在加利福尼亚州希尔兹堡的
    Trio 酒店，一个名为 Rosé的机器人可以将几乎所有东西送到客房，包括葡萄酒、枕头、毛巾、杂货等。机器人在每次配送后都会进行消毒。万豪和希尔顿酒店也使用其他几种机器人用于相同目的。

