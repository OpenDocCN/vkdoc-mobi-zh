    ## 3.6.3 人工智能赋能智能出行


    人工智能是一项基础性技术，也是我们当前所见的诸多现有和新兴出行系统及服务背后的驱动力。根据 Wards Intelligence 在 2018 年进行的《汽车行业人工智能》调查，40.6%
    的受访者认为高级驾驶辅助系统（ADAS）将是首个应用人工智能的车载系统，32.5% 认为是信息娱乐/语音识别系统，17.6% 认为是诊断系统，9.2% 认为是车联网（V2I）/车辆间通信（V2V）。


    **重要提示**


    麦肯锡未来出行中心对出行和人工智能领域的 474 家公司进行的调查显示，其中 38.2% 的公司专注于将人工智能用于自动驾驶，19.4% 用于改善车内体验，16%
    用于制造和供应链管理，9.3% 用于车队管理，8.9% 用于质量保证，5% 用于交通/基础设施检查，3.2% 用于预测性维护（Cornet 等，2017）。


    人工智能贯穿出行平台从设计、制造、运营、反馈与更新直至处置与回收的整个生命周期，如图 3-10 所示。


    人工智能和机器学习在智能出行中的潜在应用包括但不限于以下方面：


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig10_HTML.jpg](img/511013_1_En_3_Fig10_HTML.jpg)


    图 3-10


    人工智能在车辆中的应用示例


    * 打造渐进式、颠覆性或变革性的创新功能、服务或新商业模式，以提升客户体验、赢得竞争优势，和/或服务于低端市场或未被满足的消费者群体。


    * 自动收集相关数据并生成多种洞察，以得出更广泛的结论并做出更优决策。


    * 识别出行公司已拥有但未被利用、处于闲置状态的数据（暗数据）。


    * 开发不同层级的态势感知能力，以便在特定时空范围内感知环境要素、理解其含义并预测其近期状态。示例包括：车辆诊断与预测；弱势道路使用者（VRU）的检测、定位与意图识别；用户行为识别（身体行为、视觉行为或生理行为）；用户行为学习与建模（年龄识别、性别识别、偏好识别等）；以及预测性信息娱乐。


    * 在不断变化的环境中实现高级驾驶辅助系统（ADAS）和自动驾驶任务（感知、规划、控制、学习与自适应）。


    * 支持数字化转型（例如生成式设计、测试自动化、空中下载技术（OTA）、机器人流程自动化（RPA）、智能代理助手、出行平台数字孪生、调度与路线优化、车队管理、数字化市场推广工具（GTM）等）。


    此外，人工智能搜索算法和现代元启发式优化技术能够处理复杂、结构不良的人员出行问题、物流问题和基础设施优化问题。以下小节将描述这些结构不良的问题，并阐释人工智能算法解决这些问题的潜力。


    ## 3.6.4 人工智能解决智能出行中的结构不良问题


    现实世界的问题可大致分为结构良好问题（WSP）和结构不良问题（ISP）。图 3-11 展示了结构良好问题的主要组成部分。


    Herbert Simon 在 Simon（1973）中描述了结构良好问题的六个主要特征如下：


    1.  存在明确的准则来检验任何提出的解决方案，并且存在一个可机械化应用该准则的过程。


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig11_HTML.png](img/511013_1_En_3_Fig11_HTML.png)


    图 3-11


    结构良好问题（WSP）


    2.  至少存在一个问题空间，在该空间中，问题的初始状态、目标状态以及在尝试求解过程中可能达到或考虑的所有其他状态都能被表示出来。


    3.  可达的状态变化（合法移动）可以在问题空间中表示为从给定状态到从该状态直接可达的状态的转换。但值得考虑的移动，无论合法与否，也可以被表示——即从一个值得考虑的状态到另一个状态的转换。


    4.  问题解决者能够获得的关于该问题的任何知识，都可以在一个或多个问题空间中表示出来。


    5.  如果实际问题涉及对外部世界采取行动，那么状态变化的定义以及应用任何操作符对状态产生的影响，必须在一个或多个问题空间中准确反映支配外部世界的规律（自然规律）。


    6.  所有这些条件都必须在强意义上成立，即所假设的基本过程仅需要实际可行的计算量，并且所假设的信息能有效提供给这些过程——即仅需通过实际可行量的搜索即可获取这些信息。

    '
- fmt: '# 排版后的内容


    Ill-structured problems are complex discrete/continuous problems without algorithmic
    solutions/general problem solvers and can be characterized by one or more features
    such as lack of mathematical models, data imperfection, unclear goals, different
    views of the problem, conflicting solutions, stochastic actions, or context sensitivity.
    These features may lead to constraints and difficulty in defining the problem
    space, generating legal moves/transitions or alternative solutions, evaluating
    the proposed solution, or defining stopping criteria and updating the mechanism
    for the states.


    Taking data imperfection as an example, different data sources can be used in
    vehicle environments to provide information about the driving environment that
    includes the status of the driver, the vehicle, and the surrounding. These data
    sources could include a wide range of physical sensors, human-generated information
    and data retrieved from the Internet. Physical sensors include, but are not limited
    to, range finding sensors, cameras, vehicle speed sensors, tire-pressure monitoring
    sensors, etc. The data coming from these sensors used to be called “hard data”
    and is quantitative in nature. Humans can act as soft sensors providing dynamic
    observations about their status/preferences, the vehicle, and weather/road conditions.
    This information is called “soft data”. Another source of soft data is the open
    source information on the Internet that can be retrieved and mined in order to
    provide more observation about the traffic for example. Next generation ADASs
    will rely on integrating and fusing multimodal data coming from the aforementioned
    sources. Handling soft data is more challenging than hard data due to their qualitative
    nature, subjectivity and inherent incompleteness. Both hard and soft data can
    suffer from different imperfection aspects. This data imperfection may result
    in wrong beliefs about driver/car/environment state. These wrong beliefs can lead
    consequently to wrong decisions and actions.


    Data imperfection can be classified into uncertainty, imprecision and granularity.
    Data is uncertain when the associated degree of belief or confidence degree about
    what is stated by the data, is less than 1. Imprecise data refers to several,
    rather than only one, object(s). Imprecision can take different forms such as
    vagueness, ambiguity and ignorance/incompleteness. Data granularity is another
    data imperfection aspect that refers to the ability to distinguish among objects,
    which are described by data, being dependent on the provided set of attributes.


    For example, uncertainty may be caused by several factors such as environments,
    sensors, vehicles, models, or computation. Physical worlds are inherently unpredictable.
    While the degree of uncertainty in well-structured environments such assembly
    lines is small, environments such as highways and urban canyons are dynamic and
    most of the time unpredictable. Sensors are also imperfect devices with errors.
    They are inherently limited in what they can perceive. Limitations arise from
    two primary factors, range and resolution of a sensor, which are subject to physical
    laws (Fox et al., 2005). For example, cameras cannot see through obstacles like
    other vehicles or walls, and even within the perceptual range, the spatial resolution
    of camera images is limited. Sensors are subject to noise, which perturbs sensor
    measurements in unpredictable ways and hence limits the information that can be
    extracted from sensor measurements (Choi and Lee, 2007). This noise causes random/nondeterministic
    errors that in contrast with systematic/deterministic errors are characterized
    by a lack of repeatability in the output of the sensor. Moreover, the uncertainty
    of the observations can arise from other factors such as false measurements, unreliability
    and deception of data sources, existence of multiple targets and cluttered observations,
    evasive actions of rapidly maneuvering targets, and unknown correlations (Mahler,
    2007). Some actuators in vehicles may be inaccurate and to some extent unpredictable
    due to effects like control noise and wear and tear. Models are abstractions of
    the real world. As such, they only partially model the underlying physical processes
    of the vehicle and its environment (Fox et al., 2005). Moreover, approximated
    models are sometimes considered in order to guarantee real-time response.'
