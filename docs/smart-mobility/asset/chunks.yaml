- fmt: 'The evolving MaaS solutions expand shared mobility to a large scale, such
    as public transport, car sharing, car hire, cabs, and rent-a-bike. Vienna, Helsinki,
    and Hannover are examples of cities where MaaS solutions are already in use (Polle
    and Naper, 2021). MaaS depends on the availability of fully functioning digital
    platforms able to manage traveler journeys from beginning to end, allowing the
    travelers to seamlessly “mix and match” different personal and shared mobility
    modes such as e-bikes, robo taxis, small urban commuters/micro-commuters, autonomous
    shuttles, trains, planes, and other first- and last-mile transportation modes.
    This seamless mobility platform will help in increasing the availability, the
    affordability, the efficiency, and the sustainability of multimodal mobility systems.
    From the user perspective, MaaS is packaged as an app or another digital platform
    that provides services from public and private mobility providers. Users can pay
    for a trip using a mobility mode that fits their needs at a specific time and
    that takes them all the way to their desired destinations. These platforms should
    provide different mobile device–enabled services such as multimodal mobility optimal
    and dynamic planning, one-click travel book-and-pay, dynamic pricing, rescheduling,
    real-time traffic and weather information, adaptive routing, smart parking, and
    so on. Mobile apps like `Whim` (Helsinki), `UbiGo` (Gothenburg), `Qixxit` (Germany),
    and `Beeline` (Singapore) are already allowing users to select and pay for a variety
    of transportation options. For example, the `Whim` app provides access to multimodal
    mobility services such as taxis, rental cars, public transport, and bike share.
    This app also learns users’ preferences and syncs with their calendars to intelligently
    suggest ways to get to an event (Goodall et al., 2017).


    ## Important


    According to MarketsandMarkets, the global Mobility-as-a-Service (MaaS) market
    size is projected to reach US $70.4 billion by 2030.


    From the mobility service provider’s perspective, the MaaS platform should endow
    the service provider with the ability to bundle services and easily share revenue.
    For example, the Siemens MaaS platform^([^(41)](#fn41)) enables bundling of mobility
    products for specific user groups and mobility needs. For instance, a professional
    bundle may include access to all public transport, 1000 minutes of premium parking,
    and 120 minutes of Limo service for 200 euros per month. A student bundle can
    include access to all public transport, unlimited bike sharing, and 2 days of
    car sharing for 80 euros per month. A family bundle may include a family access
    to all public transport, 500 minutes of city parking, 100 minutes of car sharing,
    and access to school buses for 130 euros a month.


    An optimal or most popular combination of MaaS services can be recommended or
    customized based on user information and behaviors such as profession, region
    of living, daily commute, and bundle usage. For example, in downtown regions,
    people may want a package with 50% public transit, 35% electric bike or electric
    scooter, and 15% vehicle traveling time, while in the outskirts of a city, users
    may want more vehicle traveling time and less micromobility time. Brokering travel
    with suppliers, repackaging, and reselling it as a bundled package are other distinguishing
    characteristics of MaaS (Sochor et al., 2015). Several features of the Uber software
    platform such as journey planning and trip management are offered in several cities
    as Software-as-a-Service (SaaS) as part of the ridehailing company’s broader strategy
    to push into public transit.^([^(42)](#fn42)) Moreover, Uber acquires Routematch^([^(43)](#fn43))
    to make public transport more accessible. The evolution and mass adoption of MaaS
    by consumers is central to the emergence of passenger economy (Lanctot et al.,
    2017). The role of MaaS in passenger economy is highlighted in Section 5.9.


    One of the main challenges of MaaS is to find a right balance between the interests
    of the service providers and the passengers. The service providers aim to maximize
    their profit and usually prefer to allocate more resources to busier areas during
    high-demand periods, while passengers expect responsive and affordable services
    anywhere and at any time. Another main challenge in MaaS is developing efficient
    models of coordination and collaboration between mobility service providers. This
    coordination addresses the interdependency management among the cooperative or
    competitive mobility service providers in order to achieve their goals. According
    to a study conducted at the University of Texas at Austin (Pandey et al., 2019),
    having several mobility service providers competing against each other could worsen
    the quality of service of a MaaS platform compared to having a more centralized
    platform that creates a level of cooperation and generates the optimal assignment
    based on limited information from all service providers.'
