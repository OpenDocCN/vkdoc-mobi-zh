- fmt: '### 6.1.2 COVID-19 Impacts on Last-Mile Delivery Services


    The outbreak of COVID-19 has changed the shopping preference of the population
    and made them lean toward online shopping to minimize unnecessary contacts and
    to comply with mobility restrictions imposed during the pandemic. A survey of
    1,000 Americans’ shopping behavior during the COVID-19 pandemic showed that 87%
    were shopping online and 64% replaced traditional weekly shopping trips with online
    ordering according to TopData (Pastore, 2020). Another survey of 5,000 consumers
    from around the world conducted by Selligent indicates that 36% of consumers now
    shop online weekly, an increase from 28% before the pandemic (Selligent, 2020).
    According to Bazaarvoice’s survey (Bazaarvoice, 2020), 62% of US shoppers say
    they shop more online now than they did before the pandemic. Globally, 49% of
    consumers shop online more now than they did pre-COVID-19. This change in shopping
    preferences and customer behaviors helped grocery and food service providers in
    continuing their business and surviving the lockdown from the pandemic and also
    encouraged delivery companies to test and deploy innovative delivery methods such
    as contactless delivery, curbsides or dark stores, unattended delivery, front
    porch delivery or leave at door delivery, and robot delivery. Some shared mobility
    service providers also started to focus on last-mile delivery services. According
    to Uber’s financial report (Uber, 2020), the revenue of Uber Eats grew 103% year-over-year
    due to the pandemic.


    The high contagiousness of the coronavirus results in one of the worst outbreaks.
    Social distancing is the main measure taken to reduce the spread of the virus
    through minimizing contact between people. Last-mile delivery robots played a
    crucial role in fighting the coronavirus spread as a contactless way to deliver
    medicine, food, or grocery. Contactless last-mile delivery systems and services
    can result in avoiding physical contact between caregivers and patients or between
    delivery workers and recipients. These contactless delivery systems benefit from
    the rapid proliferation of connected technologies and the recent advancements
    in semi- and fully autonomous delivery platforms that revolutionize the urban
    logistics and provide a safe and efficient delivery method for medical supplies
    (Niels et al., 2018), medications (Nianzhen, 2020), food, grocery, and other goods
    (Bangkok Post, 2020; Crowe, 2020).


    The demand for food delivery has never been higher as most restaurants and cafés
    were closed during lockdown. The need for social distancing and surface disinfection
    has accelerated the development and adoption of robot delivery. Adopting robot
    delivery could eliminate the risk of person-to-person spread and by reducing human
    contact with the package reduce the risk of surface-to-person spread. Several
    delivery robots tested and deployed during the pandemic include Nuro driverless
    vehicle, Starship autonomous six-wheeled delivery robot, Unity Drive Innovation
    (UDI) self-driving vans, Dianomix Robox, Refraction AI REV-1 autonomous delivery
    robot, JD.com mini electric vans, Zipline drones, and Antwork delivery drones
    for medical supply deliveries during the outbreak.


    The Nuro driverless vehicle has been approved for delivery tests in California
    in April 2020. This delivery robot uses its small fleet of road-legal delivery
    robots to transport pharmaceuticals to CVS customers in Houston, Texas. Customers
    who live in the service area can choose the autonomous delivery option when they
    are placing prescription orders via CVS.com or the CVS app. Nuro has a high security
    level as customers will need to confirm their identity to unlock their delivery
    when Nuro’s autonomous vehicle arrives curbside at their home.


    Starship robots can carry items within a four-mile (6 km) radius. Parcels, groceries,
    and food are directly delivered from stores, at the time that the customer requests
    via a mobile app. Once ordered, the robot’s entire journey and location can be
    monitored on a smartphone. A UDI self-driving van uses LiDARs, cameras, and deep-learning
    algorithms to drive itself, carrying up to 1,000 kilograms on its cargo compartment,
    and is designed to deliver fresh fruits, vegetables, and other supplies. This
    unmanned vehicle provides a “contactless” alternative to regular deliveries, helping
    reduce the risk of person-to-person infection. Since the beginning of the pandemic,
    UDI has been operating a small fleet of vehicles in Zibo and two other cities,
    Suzhou and Shenzhen, where they deliver meal boxes to checkpoint workers and spray
    disinfectants near hospitals. Combined, the vans have made more than 2,500 autonomous
    trips from February to April 2020, often encountering busy traffic conditions
    despite the lockdown (Guizzo, 2020). Dianomix Robox is designed to drive on the
    sidewalk and deliver packages to one’s porch. Refraction AI REV-1 is used to deliver
    food. This delivery robot can operate in the bike lane and on public roads and
    can reach a speed of 15 miles per hour with the ability to slow down in residential
    areas, obeying traffic lights and avoiding pedestrians, cyclists, curbs, trees,
    and light poles.


    Zipline, a US-based drone delivery company, is delivering medical supplies and
    Personal Protective Equipment (PPE) in Ghana and Rwanda. Their drones can be launched
    five to seven minutes after an order is received, with flight times ranging from
    15 to 30 minutes. These drones can also help collect COVID-19 tests and samples.


    Hutchinson Health in Minnesota has been utilizing a relay delivery robot named
    “Jim” to deliver samples for COVID-19 testing, from the collection tent to the
    hospital lab without human contact, which greatly improved the turnaround time
    of testing. As a way to minimize the contact, a robot named Rosé can bring almost
    anything to the guests’ rooms, including wine, pillows, towels, groceries, and
    so on, at Hotel Trio in Healdsburg, California. The robot is sanitized after each
    delivery. Several other robots are used for the same purpose at Marriott and Hilton
    properties.'
