  trans: '

    # 5.1 卡诺模型


    卡诺模型（图 5-1）是一种洞察客户对新产品与服务需求、并将创新视为不断变化的靶心的深刻方法。颠覆性创新存在于魅力质量与期望质量之间的区域，而维持性创新则处于期望质量与基本质量之间的区域。随着客户期望随时间推移而变化，魅力特性会逐渐变为基本特性。例如，电动车窗、电动座椅、可调节方向盘和定速巡航等汽车功能，正从期望特性转变为基本特性。而车道保持辅助、自适应巡航控制、盲点检测和预测性维护等功能，正从魅力特性转变为期望特性；自动代客泊车和自动驾驶等功能，对许多客户而言仍然是魅力特性。


    ![../images/511013_1_En_5_Chapter/511013_1_En_5_Fig1_HTML.jpg](img/511013_1_En_5_Fig1_HTML.jpg)


    **图 5-1** 卡诺模型


    如果产品/服务未能反映不断变化的客户期望，客户可能会放弃它，转而选择具有更多魅力特性的其他产品/服务。许多以维持性创新为基础的公司已经倒闭，例如 Borders、Blockbuster、柯达和哥伦比亚唱片公司，它们已被采用人工智能和颠覆性创新的软件公司所取代，例如亚马逊、Netflix、Flickr
    和 Apple Music。如今，谷歌是最大的营销平台。亚马逊是最大的书商，Skype 是增长最快的电信公司，LinkedIn 是增长最快的人才招聘公司，iTunes
    和 Spotify 是增长最快的娱乐公司，而 Airbnb 则是全球最大的住宿服务提供商，尽管它不拥有任何房地产。此外，比特币是拥有最多货币但无实体现金的银行，Facebook
    是拥有最多用户但自身不创作内容的主流媒体，阿里巴巴是价值最高但无库存的零售商，优步则是拥有最多车辆但无自有车辆的出租车公司。


    出行颠覆者包括但不限于：颠覆性出行平台、共享出行、出行即服务（MaaS）、按需出行（MOD）、无缝集成出行系统（SIMS）、最后一英里配送、车辆即服务（VaaS）、零工经济和乘客经济。以下各节将更详细地解释这些颠覆者。


    ## 5.2 颠覆性出行平台


    出行平台可以是地面的、空中的或水上的。以下小节描述了针对人员出行和货物配送正在兴起的一些颠覆性出行平台。


    ### 5.2.1 自主地面车辆


    人们提出了不同的自主地面车辆概念，其中一些已经过测试，以促进城市、机场、购物中心、医院和主题公园中的出行即服务（见第 5.4 节）、按需出行（见第 5.5
    节）和无缝集成出行（见第 5.6 节）。这些出行概念的示例包括自动驾驶穿梭车（SDS）、智能手推车、智能轮椅和自主机器人代客泊车。自动驾驶穿梭车（SDS）是能够以低速（低于
    50 公里/小时）自主导航的车辆。这些车辆为第一/最后一英里交通和最后一英里配送提供了有吸引力且灵活的共享出行解决方案。例如，FABULOS 项目 ^(²⁸)
    聚焦于城市如何利用 SDS 进行最后一英里交通。许多原始设备制造商（OEM）参与了各种自动驾驶穿梭车平台的开发。例如，通用汽车的 Cruise 发布了其名为
    Origin 的自动驾驶穿梭车，该车没有方向盘或油门踏板，用于即将推出的叫车服务。Origin 是一个互联、自主、电动的出行平台，旨在成为城市及周边区域拼车服务的六人出租车。该
    SDS 已在旧金山的公共道路上进行了广泛测试。截至本书出版日期，一支车队在该城市的地理围栏区域内运行，为 Cruise 员工提供全天候的叫车服务（目前仅限于员工）。表
    5-1 总结了自动驾驶穿梭车的潜在应用、相关利益相关者以及预期的社会/环境影响。


    尽管自动驾驶穿梭车具有上述有前景的应用和优势，但在 SDS 能够广泛应用尤其是用于公共交通之前，仍有一些悬而未决的问题需要解答。这些问题^(²⁹) 包括：乘坐者对自动驾驶穿梭车的接受程度如何？他们有哪些担忧？乘坐者将如何叫到一辆无人驾驶穿梭车？没有智能手机和出行服务提供商应用的乘坐者是否也能叫到穿梭车？穿梭车将在何处接载乘客？一些残障乘客是否需要帮助才能进入无人驾驶穿梭车？如果需要，谁来帮助他们？如果无人驾驶车辆将乘客送到附近的公交站而不是直接送到目的地，乘客是否会感到不满？


    **表 5-1** 自动驾驶穿梭车的潜在应用场景（Bucchiarone 等，2020 年）


    | 使用场景 | 提供的服务 | 涉及的利益相关者 | 社会/环境影响 |

    | --- | --- | --- | --- |

    | 作为共享与集成出行的自动驾驶穿梭车 | 共享出行和多模式出行规划 | 市民、游客、员工和公共公司 | 激励可持续出行行为，优化多模式公私交通的规划、预订和支付
    |

    | 旅游/信息出行/地理出行 | 游客流动与定向营销广告 | 游客、地方政府和商业企业主 | 改善游客体验，并为赞助商提升营销吸引力 |

    | 最后一英里货物配送 | 货物配送 | 快递公司、商业企业主和市民 | 缓解市中心交通拥堵，降低运营/配送成本，减少空气污染，提高客户满意度 |

    | 公共/私人监控管理 | 监控管理 | 市民、游客、员工、公共公司、私营公司、当地警察和安全公司 | 实时上下文数据检索，监控活动，在危险情况下协调响应，并检测恐慌事件
    |


    其他颠覆性出行平台还包括自主轮椅、自主手推车和自主机器人代步车。WHILL 公司推出了一款智能轮椅，以解决当前机场行动不便乘客服务效率低下的问题。WHILL
    NEXT 可以自主跟随乘客移动，并允许多个单元（如行李车）排成单列行进。在目的地卸下行李后，手推车会自动返回服务下一位客户。一款名为 Eli 的自主购物手推车可以在超市为购物者提供帮助。它能在超市内导航，跟随购物者在过道中行走，避开障碍物，并自动为所购商品结账。一款名为
    Stan 的自主机器人代步车可以在机场为您停车。该机器人已在伦敦盖特威克机场进行了测试。Stan 使用类似叉车的臂和人工智能技术，可在停车场内增加多达 50%的空间。利用乘客的航班信息，Stan
    机器人会将汽车送回到指定车位，以便乘客返回时车辆已在那里等待。

    '
- fmt: '### 5.2.2 3D Mobility and Urban Air Mobility (UAM)


    Trams/street cars/trains can be seen as 1-DOF (degree of freedom) mobility platforms
    as they rely mainly on the longitudinal motion and the freedom of lateral motion
    is quite restricted (except for the case of derailing). Cars have 2-DOF (lateral
    and longitudinal motion). 3D mobility is a paradigm shift from restricted mobility
    in two-dimensional streets to two-dimensional mobility space enabling 3-DOF mobility
    (lateral, longitudinal, and vertical motion) or more accurately 6-DOF mobility
    (lateral, longitudinal, vertical, roll, pitch, and yaw) considering the rotational
    movements. Within this paradigm, urban air mobility (UAM) refers to quickly evolving
    urban mobility systems for people and cargo transportation. Air taxis/flying taxis/flying
    cars are futuristic disruptive mobility platforms that are based on an on-demand
    aviation business model. They are piloted Vertical Takeoff and Landing (VTOL)
    aircrafts. These VTOLs are customizable to accommodate different numbers of passengers
    or for cargo transportation. eVTOLs utilize electric propulsion to fly in and
    around densely populated urban areas at speeds of up to 320 km/hr with approximately
    200 miles of range. Examples include `uberAIR`, `Uber Elevate` acquired by `Joby
    Aviation`, `JoeBen Bevirt’s` flying car, `Airbus Flying Taxi`, `Maker’s Archer
    Aviation`, `Boeing Flying Taxi`, and `Cadillac eVTOLs` presented in `CES 2021`.
    `Cadillac eVTOLs` use a 90 kWh EV motor to power four rotors as well as air-to-air
    and air-to-ground communications and can meet customers on the roof and take them
    to the vertiport closest to their destination. `Archer Aviation` is partnering
    with automaker `Stellantis` for the manufacturing and with `United Airlines` for
    operations of its composite, eVTOL aircraft. This company plans to raise $3.8
    B through its own Special-Purpose Acquisition Company (SPAC) merger. Production
    is set to kick off in 2023.


    **Important**


    The global urban air mobility (UAM) market, which is expected to be valued at
    $895.0 million in 2023, would grow to $6,889.4 million by 2030, at a CAGR of 33.9%
    during the forecast period (2023–2030) according to `Prescient & Strategic Intelligence`.


    The remotely piloted, four-seat eVTOL `City Airbus` with 15-minute autonomy from
    `Airbus Helicopters` has now been flown publicly for the first time in July 2020.
    `Hyundai` presented in `CES 2020` a future concept of air mobility that consists
    of interconnected PAV (personal air vehicle), PBV (purpose-built vehicle), and
    a hub. PAV is an eVTOL vehicle that allows runway-free urban air travel. PBV is
    an eco-friendly urban and highly customizable vehicle for human or cargo transportation
    and can offer customized services in transit (i.e., coffee shop, medical clinic),
    and the hub is mainly the takeoff/landing point for PAVs and arrival/departure
    point for PBVs.


    According to the `NASA Urban Air Mobility` report (Goyal, 2018), three challenging
    UAM use cases are envisioned:


    - **Last-Mile Delivery**: Rapid delivery of packages (less than 5 lb. or 2 kg)
    from local distribution hubs to a dedicated receiving vessel. Deliveries are unscheduled
    and routed as online orders are placed.

    - **Air Metro**: Resembles current public transit options such as subways and
    buses, with predetermined routes, regular schedules, and set stops in high-traffic
    areas throughout each city. Vehicles are autonomously operated and can accommodate
    two to five passengers at a time, with an average load of three passengers per
    trip.

    - **Air Taxi**: The air taxi use case is a near-ubiquitous (or door-to-door) ridesharing
    operation that allows consumers to call VTOLs/eVTOLs to their desired pickup locations
    and specify drop-off destinations at rooftops throughout a given city. Rides are
    unscheduled and on demand like ridesharing applications today. Like the air metro
    case, vehicles are autonomously operated and can accommodate two to five passengers
    at a time, with an average load of one passenger per trip.


    Several cities are experimenting with UAM focusing on air taxis (e.g., China’s
    `EHang`,^([^(30)](#fn30)) `Kitty Hawk` in New Zealand,^([^(31)](#fn31)) and Dubai’s
    drone taxi^([^(32)](#fn32))) and air deliveries (e.g., `Amazon Prime Air`,^([^(33)](#fn33))
    `JD.com`’s drone delivery, China’s `Antwork` drones for medical supply delivery
    during the COVID-19 pandemic, and US `Zipline` drones for medical supply and personal
    protective equipment delivery in the Unites States and in Africa).


    The UK government is giving US $1.65 million to a startup to build a pop-up urban
    airport for “flying taxis” that will be opened later in 2021 in Coventry, England.
    This urban airport named `Air-One` will be the first eVTOL operational hub in
    the world.


    Traffic management infrastructure, physical infrastructure for receiving packages
    or landing vehicles, and supporting technology infrastructure, such as automatic
    doors for admitting drones into warehouses, are identified by `McKinsey`^([^(34)](#fn34))
    as critical infrastructure requirements for UAM.


    There are still several challenges for the widespread and societal acceptance
    of UAM as last-mile delivery platforms, air metro, or air taxis. These challenges
    include, but are not limited to, safety of “Beyond Visual Line of Sight” (BVLOS)
    operations, safety in dense urban areas, privacy, noise pollution, visual disruption,
    wildlife impacts, dynamic geo-fencing, optimal routing and navigation especially
    in severe weather conditions, getting the package to the right person’s flat,
    and compliance with airspace regulations. For example, BVLOS flights require certification
    and permission from aviation authorities in many jurisdictions around the world
    as discussed in Chapter `2`. In January 2021, the FAA allowed for the first time
    fully automated commercial drone flights with BVLOS operations. The approval was
    given to `American Robotics Inc.` However, these drones are only allowed to fly
    along planned routes in rural areas with a limited altitude below 122 meters.
    Moreover, a human pilot is required to oversee each flight’s takeoff remotely.'
