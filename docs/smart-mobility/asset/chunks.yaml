- fmt: '# 5.1 Kano Model


    The Kano model (Figure [5-1](#511013_1_En_5_Chapter.xhtml#Fig1)) is an insightful
    way of understanding customers’ needs for new products and services and framing
    innovations as a moving target. Disruptive innovation lies in the region between
    attractive quality and desired quality, while sustaining innovation is the region
    between desired quality and expected quality. As customer expectations change
    over time, attractive features become expected features. For example, car features
    such as power windows, power seats, adjustable steering wheel, and cruise control
    are moving from being desired features to being expected features. Other features
    like lane keeping assist, adaptive cruise control, blind spot detection, and prognostics
    are moving from being attractive features to being desired features, while features
    like automated valet parking and autonomous driving are still attractive features
    for many customers.


    ![../images/511013_1_En_5_Chapter/511013_1_En_5_Fig1_HTML.jpg](images/511013_1_En_5_Chapter/511013_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Kano Model


    Customers may abandon the product/service and move to another product/service
    with more attractive features if the product/service does not reflect the evolving
    customer expectations. Many sustaining innovation–based companies went out of
    business such as Borders, Blockbuster, Kodak, and Columbia and have been replaced
    by software companies that adopted AI and disruptive innovation such as Amazon,
    Netflix, Flickr, and Apple Music. Now, Google is the largest marketing platform.
    Amazon is the largest bookseller, Skype is the fastest-growing telecom company,
    LinkedIn is the fastest-growing recruiting company, iTunes and Spotify are fastest-growing
    entertainment companies, and Airbnb is the world’s biggest accommodation provider
    although it does not own any real estate. Moreover, Bitcoin is the world’s biggest
    bank with no actual cash, Facebook is the world’s most popular media owner that
    creates no content, Alibaba is the world’s most valuable retailer with no inventory,
    and Uber is the world’s largest taxi company with no vehicles.


    Mobility disruptors include, but are not limited to, disruptive mobility platforms,
    shared mobility, Mobility-as-a-Service (MaaS), mobility on demand (MOD), seamless
    integrated mobility systems (SIMS), last-mile delivery, Vehicle-as-a-Service (VaaS),
    gig economy, and passenger economy. The following sections explain these disruptors
    in more detail.


    ## 5.2 Disruptive Mobility Platforms


    Mobility platforms can be ground, aerial, or marine. The following subsections
    describe a number of disruptive mobility platforms that are emerging for people
    mobility and goods delivery.


    ### 5.2.1 Autonomous Ground Vehicles


    Different concepts of autonomous ground vehicles are proposed, and some are tested
    to facilitate Mobility-as-a-Service (see Section 5.4), mobility on demand (see
    Section 5.5), and seamless integrated mobility (see Section 5.6) in cities, airports,
    malls, hospitals, and theme parks. Examples of these mobility concepts include
    self-driving shuttles (SDSs), smart carts, smart wheelchairs, and autonomous robot
    valets. Self-driving shuttles (SDSs) are vehicles that can navigate autonomously
    at low speed (less than 50 km/h). These vehicles provide an attractive, flexible
    shared mobility solution for first-/last-mile transportation and last-mile delivery.
    For example, the FABULOS project^([^(28)](#fn28)) focuses on how cities can use
    SDSs for last-mile transportation. Many OEMs are involved in the development of
    a variety of autonomous shuttle platforms. For example, GM’s Cruise reveals its
    autonomous shuttle called Origin with no steering wheel or gas pedal for an upcoming
    ridehailing service. Origin is a connected, autonomous, and electric mobility
    platform that is meant to be a six-person taxi for ride shares in and around urban
    areas. This SDS is tested extensively on public roads in San Francisco. A fleet
    of the cars runs in a geo-fenced area of the city, operating a 24/7 ridehailing
    service that is strictly for Cruise employees so far as per the date of publishing
    this book. Table [5-1](#511013_1_En_5_Chapter.xhtml#Tab1) summarizes potential
    applications, involved stakeholders, and expected social/environmental implications
    of autonomous shuttles.


    Despite the aforementioned promising applications and benefits of autonomous shuttles,
    there are still some open questions to be answered before SDSs can widely spread
    and be used especially in public transit. These questions^([^(29)](#fn29)) include
    How open are riders to self-driving shuttles?, What are their concerns?, How will
    riders hail a driverless shuttle?, Will riders be able to hail shuttles without
    a smartphone and mobility provider app?, Where will the shuttle pick riders up?,
    Will some riders with disabilities need help getting into the driverless shuttles?,
    If they do, who will help them?, and Will riders be dissatisfied if a driverless
    vehicle takes them to a nearby bus stop instead of straight to their destination?


    **Table 5-1** Potential Application Scenarios of Autonomous Shuttles (Bucchiarone
    et al., 2020)


    | Use Case | Provided Services | Involved Stakeholders | Social/Environmental
    Implications |

    | --- | --- | --- | --- |

    | Autonomous shuttle as shared and integrated mobility | Shared mobility and multimodal
    mobility planning | Citizens, tourists, employees, and public companies | To incentivize
    sustainable mobility behavior, to optimize the planning, booking, and payment
    of multimodal public-private transportation |

    | Tourism/info mobility/geo-mobility | Tourist movement and targeted marketing
    advertising | Tourists, local governments, and commercial business owners | To
    improve the tourist experience and marketing traction to sponsors |

    | Last-mile delivery of goods | Delivery of goods | Courier companies, commercial
    business owners, and citizens | Decongestion of city centers, reduction of operation/delivery
    costs, air pollution reduction, and increasing customer satisfaction |

    | Public/private surveillance management | Surveillance management | Citizens,
    tourists, employees, public companies, private companies, local police, and security
    companies | Real-time contextual data retrieval, monitoring activities, and coordination
    of responses in dangerous situations and detection of panic events |


    Another disruptive mobility platforms are the autonomous wheelchairs, the autonomous
    carts, and the autonomous robot valets. A smart wheelchair is presented by WHILL
    to address the significant inefficiencies of the current passengers with reduced
    mobility services in airports. WHILL NEXT can move autonomously after the passengers
    and can allow multiple units like luggage cart to travel in a single-file line.
    After unloading the luggage at the destination, the cart will automatically return
    to the next customer. An autonomous shopping cart called Eli can assist shoppers
    at supermarkets. It can navigate supermarkets, follow shoppers as they walk through
    aisles, avoid obstacles, and auto pay the collected goods. An autonomous robot
    valet named Stan can park your car at the airport. This robot has been tested
    at London’s Gatwick Airport. Stan uses forklift-like arms and artificial intelligence
    to create up to 50% more space in a parking lot. Using the passenger’s flight
    details, the Stan robot brings the car back to a cabin so it will be waiting for
    the passenger when they return.'
  raw: '## 5.1 Kano Model


    The Kano model (Figure [5-1](#511013_1_En_5_Chapter.xhtml#Fig1)) is an insightful
    way of understanding customers’ needs for new products and services and framing
    innovations as a moving target. Disruptive innovation lies in the region between
    attractive quality and desired quality, while sustaining innovation is the region
    between desired quality and expected quality. As customer expectations change
    over time, attractive features become expected features. For example, car features
    such as power windows, power seats, adjustable steering wheel, and cruise control
    are moving from being desired features to being expected features. Other features
    like lane keeping assist, adaptive cruise control, blind spot detection, and prognostics
    are moving from being attractive features to being desired features, while features
    like automated valet parking and autonomous driving are still attractive features
    for many customers.


    ![../images/511013_1_En_5_Chapter/511013_1_En_5_Fig1_HTML.jpg](images/511013_1_En_5_Chapter/511013_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Kano Model


    Customers may abandon the product/service and move to another product/service
    with more attractive features if the product/service does not reflect the evolving
    customer expectations. Many sustaining innovation–based companies went out of
    business such as Borders, Blockbuster, Kodak, and Columbia and have been replaced
    by software companies that adopted AI and disruptive innovation such as Amazon,
    Netflix, Flickr, and Apple Music. Now, Google is the largest marketing platform.
    Amazon is the largest bookseller, Skype is the fastest-growing telecom company,
    LinkedIn is the fastest-growing recruiting company, iTunes and Spotify are fastest-growing
    entertainment companies, and Airbnb is the world’s biggest accommodation provider
    although it does not own any real estate. Moreover, Bitcoin is the world’s biggest
    bank with no actual cash, Facebook is the world’s most popular media owner that
    creates no content, Alibaba is the world’s most valuable retailer with no inventory,
    and Uber is the world’s largest taxi company with no vehicles.


    Mobility disruptors include, but are not limited to, disruptive mobility platforms,
    shared mobility, Mobility-as-a-Service (MaaS), mobility on demand (MOD), seamless
    integrated mobility systems (SIMS), last-mile delivery, Vehicle-as-a-Service (VaaS),
