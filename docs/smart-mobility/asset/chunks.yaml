  trans: '

    该测试台的控制系统负责调节压力水平、调度胶囊运行、启动操作并在紧急情况下进行干预。其编程接口允许执行不同的控制算法，例如胶囊的 PID 参数整定、利用 IMU
    或安装在管道内的反光带进行胶囊定位，或使用混合定位（反光带结合基于 IMU 的定位）、胶囊派遣、时刻表制定与调度。远程实验单元支持为教育、培训和研究目的与超回路测试台进行远程交互。这使得该测试台不受师生同步到场的限制，允许学生随时按需访问，并能与其他机构共享资源。该测试台中集成了超回路数字孪生系统，它是一个基于云的高保真虚拟表示，即超回路的数字复制品，展现了胶囊的不同元件及其动力学特性。该数字孪生体融合了
    3D 建模、多物理场仿真和认知物联网能力，构建了一个包含超回路在整个系统生命周期内最新、精确属性和状态的数字影子。数字孪生的优势包括但不限于监控、诊断和预测，以确保系统健康、高效、可持续地运行，并优化超回路测试台的运行与维护。


    另一种新颖且颠覆性的地面交通方式是于 2018 年在法国推出的城市环（urbanloop^(³⁹)），它被定位为一种用于快速出行的城市交通系统。受跑车启发的单人或双人透明胶囊在管道中运行，根据城市约束条件，这些管道可以埋入地下、半埋或架空。


    ## 5.3 共享出行


    近年来，共享出行技术已显著成熟——这一点从市面上出现的商业化共享出行服务中可见一斑，例如汽车共享、单车共享、滑板车共享、拼车、网约车/出行服务采购以及需求响应式公交（DRT）。共享自动驾驶汽车（SAV）和拼车共享自动驾驶汽车（PSAV）也在迅速兴起。PSAV
    是同时服务于多名乘客的 SAV。


    **重要信息**


    根据 Grand View Research 公司的报告，全球共享出行市场规模预计到 2025 年将达到 6195.1 亿美元，预测期内的复合年增长率为 25.1%。


    不同的共享出行服务是基于共享经济和零工经济的商业模式提供的。这些服务代表了从所有权向使用权的范式转变。共享出行服务包括以下内容：


    *   **车辆共享服务**：由 Zipcar、SHARE NOW、Getaround、Capital Bikeshare、Lime、VeoRide 和 Bird
    等公司提供，涉及多名客户在不同时间使用同一辆车（Kimley-Horn 等，2019）。


    *   **个人对个人（P2P）车辆共享服务**：这是一种新兴服务，由车辆所有者向所在地区的其他人短期提供车辆。该模式类似于 Airbnb 和 Couchsurfing。在这些系统中，出行平台可以是一辆汽车（例如
    `Drive Drive Car`）、一辆自行车（例如 `Spinlister`）、一辆滑板车、个人智能城市无障碍车辆(PICAV)、垂直起降飞行器(VTOL)、SeaBubble
    或任何其他个人交通工具。


    *   **需求响应式公交（DRT）、电话叫车或辅助公交**：DRT 是一种需要预先预订的共享出行服务，它融合了公共交通和私人交通服务，以提供类似于按需出行服务的体验。DRT
    在（Bakker，1999）中被定义为介于私家车和传统公共交通之间的一种交通选择，即一种提供与私家车相似的服务水平和出行便利性，同时又能方便接驳公共交通的服务。DRT
    提供专用的小巴、中巴或大型出租车，旨在通过电话或智能手机应用满足用户预先提出的预约请求（Talley 和 Anderson，1986）。


    *   **微公交**：美国交通部(USDOT)将微公交定义为“一种私人拥有和运营的共享交通系统，可以提供固定路线和时刻表，也可以提供灵活的路线和按需调度。车辆通常包括面包车和巴士”（Kimley-Horn
    等，2019）。微公交是 DRT 的一种形式。微公交的供应商或服务示例包括 Ford TransLoc、DemandTrans 和 Transdev。


    *   **拼车服务**：由 Zimride、Getaround 和 Waze Carpool 等公司提供，是传统拼车的一种软件辅助现代化形式，即拥有自己私家车的司机与使用相同订阅服务的乘客进行匹配，以分摊共同通勤的成本（Kimley-Horn
    等，2019）。在拼车中，司机在已经计划从 A 点开到 B 点的行程中填补空余座位。这并非新模式，因为自二战以来，拼车已使用多年。当时美国政府鼓励民众拼车和共乘，作为节省战争所需资源的一种方式。1943
    年美国政府发起的这场史无前例的宣传活动中就包括一张宣传海报，上面写着：“当你独自驾车时，你就是在与希特勒同行！”


    *   **网约车或出行服务采购**：由 Uber、Lyft 和 DiDi 等交通网络公司(TNC)提供，指司机使用其个人车辆为付费乘客提供私人行程（Kimley-Horn
    等，2019）。乘客按需叫车，司机驾驶车辆前往某处以获取报酬。

