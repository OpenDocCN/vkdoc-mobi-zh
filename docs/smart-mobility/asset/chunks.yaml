- fmt: "## 3.5 Internet of Things (IoT)\n\n`Internet of Things (IoT)` (Atzori et al.,\
    \ 2010) is the technology that enables connecting any device to the Internet and/or\
    \ devices to each other for sharing data and/or operation control. A much broader\
    \ concept is the `Internet of Everything (IoE)`. According to Cisco, `IoE` is\
    \ about *“bringing together people, process, data, and things to make networked\
    \ connections more intelligent and valuable than ever before, turning data into\
    \ actions that create new capabilities, richer experiences, and unprecedented\
    \ economic opportunity for businesses, individuals, and countries”* (Evans, 2012).\
    \ The value of `IoT/IoE` is not in making one device or system smart but in enabling\
    \ seamless processes across systems.\n\nGenerally speaking, in the context of\
    \ smart mobility, a thing can be a driver, a passenger, a commuter, a transit\
    \ operator, a pedestrian, or a cyclist with connected devices, a connected mobility\
    \ platform, a connected seat, a connected tire pressure sensor, a connected traffic\
    \ signal, a connected traffic sensor, a connected infrastructure, a connected\
    \ reservation and booking system, or any other natural or manmade object that\
    \ can be assigned an `Internet Protocol (IP)` address and is able to transfer\
    \ data over a network.\n\n> **Note**  \n> According to `Allied Market Research`,\
    \ the global `IoT` in transportation market is expected to reach $328.76 billion\
    \ by 2023, growing at an estimated `CAGR` of 13.7% from 2017 to 2023.\n\n`IoT`\
    \ is a key foundational technology for connected infrastructure, connected vehicles,\
    \ and connected customers/connected travelers. `IoT` applications in smart mobility\
    \ include condition monitoring, predictive maintenance or remote diagnostics and\
    \ prognostics, vehicle tracking, geo-fencing, traffic management and congestion\
    \ control systems, fleet management, reservation and booking systems, and security\
    \ and surveillance as shown in Figure 3-4.\n\nFor example, mobility platforms\
    \ must keep running to guarantee the continuity of the service. Individual critical\
    \ components such as propulsion, transmission, or steering systems play a crucial\
    \ role in making this happen. Understanding the health of these critical equipment\
    \ is sometimes overlooked with many kept running until they fail. Taking a brushless\
    \ `DC` or an induction motor in a fully electric vehicle as an example, a motor\
    \ failure can cause entire vehicle malfunctioning resulting in fatal accidents.\
    \ Fortunately, electromechanical equipment like motors do not break without warning.\
    \ Months before the faults occur, minimum vibration can be found. Weeks before\
    \ the fault, apparent noise begins to develop. Days before the machine heats up\
    \ and minutes before the breakdown, it starts to smoke. With motor condition monitoring,\
    \ one can identify the slightest vibrations months in advance. In this case, failure\
    \ can be prevented by replacing the bearing, for instance.\n\nThere are three\
    \ major types of maintenance operations:\n\n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig4_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig4_HTML.png)\n\
    \n**Figure 3-4** Examples of IoT Applications in Smart Mobility\n\n- **Improvement\
    \ Maintenance:** Aims at reducing or eliminating the need for maintenance through\
    \ modification, retrofitting, redesigning, or changing order in the mobility platform.\n\
    - **Corrective Maintenance:** Is mainly event-driven and can be seen as an analogy\
    \ to a human hand that intervenes in case of breakdowns, emergency, remediation,\
    \ repairs, or rebuilds.\n- **Preventive Maintenance:** Aims at preventing unscheduled\
    \ downtime and premature equipment damage that would result in corrective or repair.\
    \ This type of maintenance can be classified into reactive or equipment-driven,\
    \ time-driven, and predictive maintenance. Reactive or equipment-driven is done\
    \ when needed. In time-driven maintenance, preventive tasks are scheduled periodically\
    \ or in a fixed interval or following hard time limits or using specific time.\
    \ Predictive maintenance relies on condition monitoring of the equipment. Data\
    \ is collected about the health of the equipment using `IoT`-connected sensors.\
    \ The collected data is then analyzed in order to get insights into the possible\
    \ failures and the causes of failures and recommend the preventive actions that\
    \ help avoid future failures.\n\nThe dominant reason for inefficiency of the current\
    \ predictive maintenance systems is the lack of factual data and real-time data\
    \ analytics modules. This prevents the system from anticipating incipient problems\
    \ and quantifying the actual need for repair or maintenance. According to a study\
    \ published by `ABB`, the use of smart monitoring using connected sensors and\
    \ data analytics can reduce the downtime of low-voltage motors by up to 70%, extend\
    \ their lifespan by up to 30%, and cut energy consumption by as much as 10%.\n\
    \n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig5_HTML.jpg](images/511013_1_En_3_Chapter/511013_1_En_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5** Cognitive IoT-Based System for Condition Monitoring, Asset Tracking,\
    \ and Predictive Maintenance (Khamis, 2020)\n\nFigure 3-5 shows a cognitive `IoT`-based\
    \ predictive maintenance system invented by me (Khamis, 2020). This system facilitates\
    \ the decentralized maintenance planning, remote monitoring of distributed stationary\
    \ or mobile assets, prediction of possible failures, and recommendation of proactive\
    \ actions to mitigate these risks in order to keep the continuity of the service.\
    \ This system encompasses spatially distributed interoperable and accessible smart\
    \ sensors able to selectively collect and share data about machine condition.\
    \ The selectively collected data is then analyzed in order to get real-time insights\
    \ and performance data, determine and dynamically update the likelihood of failures,\
    \ and make timely decisions or recommendations.\n\n## 3.6 Artificial Intelligence\
    \ (AI)\n\n`AI` successfully delivered many commercial products and services that\
    \ touch everybody’s life every day. `AI` aims at mimicking/reverse-engineering\
    \ and augmenting biological intelligence to build intelligent systems/processes\
    \ able to function and interact autonomously within structured/unstructured, static/dynamic,\
    \ and fully/partially observable environments. This usually involves borrowing\
    \ characteristics from human intelligence such as situation awareness, decision-making,\
    \ problem solving, learning from the environment, and adapting to its changes\
    \ (Khamis, 2019a). `AI` encompasses many subfields such as perception (e.g., object\
    \ recognition, image understanding, speech recognition, speech synthesis, natural\
    \ language understanding), knowledge representation, cognitive reasoning, machine\
    \ learning, data analytics (e.g., descriptive, predictive, diagnostic, and prescriptive\
    \ analytics), problem solving (e.g., constraint satisfaction, problem solving\
    \ using search and optimization), distributed `AI`, and acting (e.g., virtual\
    \ assistants and robots)."
  raw: '## 3.5 Internet of Things (IoT)


    Internet of Things (IoT) (Atzori et al., 2010) is the technology that enables
    connecting any device to the Internet and/or devices to each other for sharing
    data and/or operation control. A much broader concept is the Internet of Everything
    (IoE). According to Cisco, IoE is about *“bringing together people, process, data,
    and things to make networked connections more intelligent and valuable than ever
    before, turning data into actions that create new capabilities, richer experiences,
    and unprecedented economic opportunity for businesses, individuals, and countries”*
    (Evans, 2012). The value of IoT/IoE is not in making one device or system smart
    but in enabling seamless processes across systems.


    Generally speaking, in the context of smart mobility, a thing can be a driver,
    a passenger, a commuter, a transit operator, a pedestrian, or a cyclist with connected
    devices, a connected mobility platform, a connected seat, a connected tire pressure
    sensor, a connected traffic signal, a connected traffic sensor, a connected infrastructure,
    a connected reservation and booking system, or any other natural or manmade object
    that can be assigned an Internet Protocol (IP) address and is able to transfer
    data over a network.


    Note


    According to Allied Market Research, the global IoT in transportation market is
    expected to reach $328.76 billion by 2023, growing at an estimated CAGR of 13.7%
    from 2017 to 2023.


    IoT is a key foundational technology for connected infrastructure, connected vehicles,
    and connected customers/connected travelers. IoT applications in smart mobility
    include condition monitoring, predictive maintenance or remote diagnostics and
    prognostics, vehicle tracking, geo-fencing, traffic management and congestion
    control systems, fleet management, reservation and booking systems, and security
    and surveillance as shown in Figure [3-4](#511013_1_En_3_Chapter.xhtml#Fig4).


    For example, mobility platforms must keep running to guarantee the continuity
    of the service. Individual critical components such as propulsion, transmission,
    or steering systems play a crucial role in making this happen. Understanding the
    health of these critical equipment is sometimes overlooked with many kept running
    until they fail. Taking a brushless DC or an induction motor in a fully electric
    vehicle as an example, a motor failure can cause entire vehicle malfunctioning
    resulting in fatal accidents. Fortunately, electromechanical equipment like motors
    do not break without warning. Months before the faults occur, minimum vibration
    can be found. Weeks before the fault, apparent noise begins to develop. Days before
    the machine heats up and minutes before the breakdown, it starts to smoke. With
    motor condition monitoring, one can identify the slightest vibrations months in
    advance. In this case, failure can be prevented by replacing the bearing, for
    instance.


    There are three major types of maintenance operations:


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig4_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig4_HTML.png)


    Figure 3-4


    Examples of IoT Applications in Smart Mobility


    *   **Improvement Maintenance:** Aims at reducing or eliminating the need for
    maintenance through modification, retrofitting, redesigning, or changing order
    in the mobility platform.


    *   **Corrective Maintenance:** Is mainly event-driven and can be seen as an analogy
    to a human hand that intervenes in case of breakdowns, emergency, remediation,
    repairs, or rebuilds.


    *   **Preventive Maintenance:** Aims at preventing unscheduled downtime and premature
    equipment damage that would result in corrective or repair. This type of maintenance
    can be classified into reactive or equipment-driven, time-driven, and predictive
    maintenance. Reactive or equipment-driven is done when needed. In time-driven
    maintenance, preventive tasks are scheduled periodically or in a fixed interval
    or following hard time limits or using specific time. Predictive maintenance relies
    on condition monitoring of the equipment. Data is collected about the health of
    the equipment using IoT-connected sensors. The collected data is then analyzed
    in order to get insights into the possible failures and the causes of failures
    and recommend the preventive actions that help avoid future failures.


    The dominant reason for inefficiency of the current predictive maintenance systems
    is the lack of factual data and real-time data analytics modules. This prevents
    the system from anticipating incipient problems and quantifying the actual need
    for repair or maintenance. According to a study published by ABB, the use of smart
    monitoring using connected sensors and data analytics can reduce the downtime
    of low-voltage motors by up to 70%, extend their lifespan by up to 30%, and cut
    energy consumption by as much as 10%.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig5_HTML.jpg](images/511013_1_En_3_Chapter/511013_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Cognitive IoT-Based System for Condition Monitoring, Asset Tracking, and Predictive
    Maintenance (Khamis, 2020)


    Figure [3-5](#511013_1_En_3_Chapter.xhtml#Fig5) shows a cognitive IoT-based predictive
    maintenance system invented by me (Khamis, 2020). This system facilitates the
    decentralized maintenance planning, remote monitoring of distributed stationary
    or mobile assets, prediction of possible failures, and recommendation of proactive
    actions to mitigate these risks in order to keep the continuity of the service.
    This system encompasses spatially distributed interoperable and accessible smart
    sensors able to selectively collect and share data about machine condition. The
    selectively collected data is then analyzed in order to get real-time insights
    and performance data, determine and dynamically update the likelihood of failures,
    and make timely decisions or recommendations.


    ## 3.6 Artificial Intelligence (AI)


    AI successfully delivered many commercial products and services that touch everybody’s
    life every day. AI aims at mimicking/reverse-engineering and augmenting biological
    intelligence to build intelligent systems/processes able to function and interact
    autonomously within structured/unstructured, static/dynamic, and fully/partially
    observable environments. This usually involves borrowing characteristics from
    human intelligence such as situation awareness, decision-making, problem solving,
    learning from the environment, and adapting to its changes (Khamis, 2019a). AI
    encompasses many subfields such as perception (e.g., object recognition, image
    understanding, speech recognition, speech synthesis, natural language understanding),
    knowledge representation, cognitive reasoning, machine learning, data analytics
    (e.g., descriptive, predictive, diagnostic, and prescriptive analytics), problem
    solving (e.g., constraint satisfaction, problem solving using search and optimization),
    distributed AI, and acting (e.g., virtual assistants and robots).'
  trans: "\n## 3.5 物联网 (IoT)\n\n`物联网 (IoT)`（Atzori 等人，2010）是一项能够将任何设备连接到互联网和/或实现设备间互联，以共享数据和/或进行操作控制的技术。一个更宽泛的概念是`万物互联\
    \ (IoE)`。思科公司认为，`IoE` 指的是*“将人员、流程、数据和事物结合在一起，使网络连接比以往任何时候都更智能、更有价值，从而将数据转化为行动，为企业、个人和国家创造新的能力、更丰富的体验以及前所未有的经济机遇”*（Evans，2012）。`IoT/IoE`\
    \ 的价值不在于让单个设备或系统变得智能，而在于实现跨系统的无缝流程。\n\n一般而言，在智能出行背景下，一个“事物”可以是：配备联网设备的驾驶员、乘客、通勤者、公交运营者、行人或骑行者；一个联网的出行平台、联网座椅、联网胎压传感器、联网交通信号灯、联网交通传感器、联网基础设施、联网预订系统；或任何其他可以被分配`互联网协议\
    \ (IP)`地址并能够通过网络传输数据的自然或人造物体。\n\n> **注意**  \n> 根据`联合市场研究机构`的数据，全球交通运输领域`IoT`市场预计到\
    \ 2023 年将达到 3287.6 亿美元，2017 年至 2023 年的预估复合年增长率 (`CAGR`) 为 13.7%。\n\n`IoT`是联网基础设施、联网车辆以及联网客户/联网旅客的关键基础技术。`IoT`在智能出行中的应用包括状态监测、预测性维护或远程诊断与故障预测、车辆追踪、地理围栏、交通管理和拥堵控制系统、车队管理、预订系统以及安全监控，如图\
    \ 3-4 所示。\n\n例如，出行平台必须持续运行以保证服务的连续性。推进系统、传动系统或转向系统等关键部件在实现这一目标中起着至关重要的作用。了解这些关键设备的健康状况有时会被忽视，许多设备一直运行到发生故障为止。以纯电动汽车中的无刷`直流`电机或感应电机为例，电机故障可能导致整辆汽车功能失效，从而引发致命事故。幸运的是，像电机这样的机电设备在发生故障前并非毫无征兆。在故障发生前几个月，就能检测到微小的振动。故障发生前几周，开始出现明显的噪音。故障发生前几天，设备温度升高，而故障发生前几分钟，设备开始冒烟。通过电机状态监测，可以提前数月识别最微小的振动。在这种情况下，例如更换轴承，就可以防止故障的发生。\n\
    \n主要有三种类型的维护操作：\n\n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig4_HTML.png](img/511013_1_En_3_Fig4_HTML.png)\n\
    \n**图 3-4** 物联网在智能出行中的应用示例\n\n- **改进性维护：** 旨在通过改造、加装、重新设计或更改出行平台上的指令，来减少或消除维护需求。\n\
    - **纠正性维护：** 主要是事件驱动的，可类比为在发生故障、紧急情况、需要补救、维修或重建时进行干预的“人手”。\n- **预防性维护：** 旨在防止导致纠正或修理的意外停机和设备过早损坏。这种类型的维护可分为被动式或设备驱动式、时间驱动式和预测式维护。被动式或设备驱动式维护在需要时进行。时间驱动式维护中，预防任务按周期计划、或按固定间隔、或遵循硬性时间限制、或使用特定时间进行调度。预测性维护依赖于设备的状态监测。利用`IoT`连接传感器收集有关设备健康状况的数据。然后对收集到的数据进行分析，以深入了解可能的故障及其原因，并推荐有助于避免未来故障的预防措施。\n\
    \n当前预测性维护系统效率低下的主要原因是缺乏事实数据和实时数据分析模块。这阻碍了系统预测初期问题并量化实际维修或维护需求的能力。根据`ABB`公司发布的一项研究，使用联网传感器和数据分析的智能监测可以将低压电机的停机时间减少高达\
    \ 70%，将其使用寿命延长高达 30%，并降低高达 10%的能耗。\n\n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig5_HTML.jpg](img/511013_1_En_3_Fig5_HTML.jpg)\n\
    \n**图 3-5** 基于认知物联网的状态监测、资产追踪和预测性维护系统 (Khamis, 2020)\n\n图 3-5 展示了一种由我 (Khamis,\
    \ 2020) 发明的基于认知`IoT`的预测性维护系统。该系统有助于分散式维护规划、分布式固定或移动资产的远程监控、故障预测，以及推荐主动措施以减轻这些风险，从而保持服务的连续性。该系统包含空间分布、可互操作、可访问的智能传感器，能够有选择性地收集和共享有关机器状况的数据。然后对选择性收集的数据进行分析，以获取实时洞察和性能数据，确定并动态更新故障可能性，并及时做出决策或提出建议。\n\
    \n## 3.6 人工智能 (AI)\n\n`AI`成功交付了许多触及每个人日常生活的商业产品和服务。`AI`旨在模仿/逆向工程并增强生物智能，以构建能够自主运行并与之交互的智能系统/流程，这些交互发生在结构化/非结构化、静态/动态、完全/部分可观测的环境中。这通常涉及借鉴人类智能的特征，如情境感知、决策、问题解决、从环境中学习以及适应环境变化\
    \ (Khamis, 2019a)。`AI`包含许多子领域，例如感知（如物体识别、图像理解、语音识别、语音合成、自然语言理解）、知识表示、认知推理、机器学习、数据分析（如描述性、预测性、诊断性和规范性分析）、问题解决（如约束满足、使用搜索和优化进行问题解决）、分布式`AI`以及行动（如虚拟助手和机器人）。\n"
- fmt: '### 3.6.1 Evolution of AI


    `AI` is an evolving technology, not a totally new one, as its seeds can be traced
    back to the classical philosophers and their efforts in modeling human thinking
    as a system of symbols that led to "connectionism" as a process of thinking. One
    should differentiate between two `AI` approaches, namely, top-down approach (white
    box or generative approach) and bottom-up approach (black box, discriminative,
    or data-driven approach). Traditional `AI` techniques follow the top-down deductive
    reasoning approach where they start out by formulating abstract and wide-ranging
    hypotheses about the world from preexisting knowledge and few examples. They make
    predictions about what the data should look like if those hypotheses are correct
    and then revise their hypotheses, depending on the outcome of those predictions
    (Gopnik, 2017) and upon receiving more observations. In contrast, modern `AI`
    techniques or computational intelligence techniques are characterized as bottom-up
    inductive reasoning (working on numeric data to infer symbols) and try to extract
    patterns from raw data (thousands or millions of examples). These modern `AI`
    techniques have powered different products and services through endowing them
    with the ability to discover and recognize complex patterns and trends (class,
    cluster, or anomalies) in archived, streaming, or live data and predicting future
    values and learning from examples and from observations at different levels of
    abstractions.


    Understanding the limitations of current `AI` algorithms helps in deciding what
    problems can be solved by `AI` and how to improve the current algorithms or create
    new algorithms to cope with a wider range of real-world ill-structured problems
    (`ISPs`). As `AI` algorithms are used to endow the artificial systems or processes
    with intelligent behaviors, we should understand what is meant by an intelligent
    behavior. The behavior is what an external observer sees an artificial system/process
    doing. Broadly speaking, `AI` algorithms can be classified into individual or
    `i`-level algorithms and group or `g`-level algorithms. Both `i`-level algorithms
    and `g`-level algorithms can be used to implement low-level behaviors and high-level
    behaviors for an individual system/process ("agent" henceforth) and/or for a group
    of agents.


    Low-level behaviors for individual agents may include context-aware data collection,
    object detection, obstacle avoidance, speech recognition, and object manipulation
    or acting upon the environment using the available effectors. Examples of low-level
    behaviors for the group include cooperative context-aware data gathering, information
    exchange, and cooperative manipulation. For example, context-aware data collection
    is the process of collecting data selectively and cognitively based on a certain
    context by a single agent or multiple agents in the case of cooperative data collection.
    Context is any information that can be used to characterize the situation. More
    details about context-aware systems are provided in the next chapter.


    High-level behaviors for individual agents include interpreting the collected
    data, comprehending the situation, projecting the future consequences, and learning
    from experience. At the group level, high-level behaviors may include shared situation
    awareness, consensus finding, cooperative decision-making, group formation, communication
    relaying, and multiagent learning to name just a few. For instance, in cooperative
    learning, the sum of all agents'' discounted future rewards (social welfare) has
    to be maximized, or a more amenable (for convergence) equilibrium or consensus
    such as the Nash equilibrium point has to be chosen (Vidal, 2006). `g`-level algorithms
    for high-level behaviors are more challenging to design compared to `i`-level
    algorithms for low-/high-level behaviors. This is mainly due to the fact that
    we do not fully understand how high-level behaviors in biological systems work.
    For example, human beings and all living organisms have the ability to gain information
    from the environment, as well as interpreting this information to take appropriate
    decisions. This ability requires performing different low-level and high-level
    functions. Low-level functions of the human brain such as seeing, hearing, smelling,
    tasting, and touching are fully understood and localized in the cerebral cortex.
    However, higher-level cognitive processes like information fusion, situation awareness,
    reasoning, decision-making, and learning are not fully understood. In general,
    we are only beginning to understand where these higher-level cognition functions
    occur in the brain, let alone how they are achieved (Anderson, 2005). Understanding
    how the brain works is arguably one of the greatest scientific challenges of our
    time (Alivisatos et al., 2012).


    In human beings, cognition is achieved by patterns of neural activation in large
    sets of neurons. Analogously, multiagent systems must be able to perform different
    low-level and high-level behaviors. Let''s consider picture compilation and learning
    as examples for individual low-level and high-level behaviors, respectively, in
    a human being. Building a complete picture of the environment could be achieved
    using a single sense or by the fusion of the data gathered from multiple senses.
    The human brain acts as a powerful fusion node. It fuses different information
    every time the senses are stimulated by appropriate signals. Our brain is continuously
    and perfectly fusing sight, hearing, smell, taste, and tactile information provided
    by our sensors, which are the eyes, ears, nose, tongue, and skin. This information
    is represented in terms of continuously varying electrochemical activities of
    neurons.


    In the case of a high-level function like learning, we do not fully understand
    how the brain can learn from very few examples or sometimes from a single example,
    how it can generalize based on the previous experience, and how it can extract
    new concepts and show different signs of creative reasoning. For example, in an
    unknown environment, we used to wander around to explore and build a map about
    this environment. We can use this map later to navigate in this environment even
    if the lights are off or our eyes are closed. Where do we store this map and how
    do we learn to use it? New hybrid machine learning algorithms combining both top-down
    deductive reasoning and bottom-up inductive reasoning need to be developed to
    mimic human learning as a high-level function.'
