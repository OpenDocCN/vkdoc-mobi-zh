- fmt: "### 4.3.6 Automated Driving and Smart Mobility\n\nIn the smart mobility domain,\
    \ automated driving is not restricted to cars but can be extended to different\
    \ mobility platforms for people transportation and freight delivery. These platforms\
    \ include, but are not limited to, self-driving shuttles (e.g., GM’s Cruise Origin),\
    \ self-driving modular stores (e.g., Toyota’s e-Palette), last-mile delivery (e.g.,\
    \ Starship, Nuro, and Robby), and first- and middle-mile delivery self-driving\
    \ trucks (e.g., Embark, Tesla, TuSimple, Daimler Trucks, Waymo, Plus.ai, and Peloton).\
    \ The United States, Germany, the United Kingdom, and several European countries\
    \ have enacted legislation allowing autonomous vehicles to be tested on public\
    \ roads. Málaga, the sixth largest city in Spain, is the first place in Europe\
    \ to trial a full-size 12-meter self-driving passenger-carrying bus. This 60-passenger\
    \ bus will make an eight-kilometer round trip from the city center to the port,\
    \ six times daily. General Motors’ Cruise plans to begin deploying its robo taxis\
    \ in Dubai beginning in 2023, making Dubai the first city outside the United States\
    \ where Cruise will operate. Cruise will be the exclusive robo taxi service provider\
    \ in the Emirates until 2029. By 2030, Cruise and Dubai’s RTA plan to have 4,000\
    \ self-driving taxis in operation. Moreover, Cruise is authorized by California\
    \ Public Utilities Commission (CPUC) in June 2021 to give passengers rides in\
    \ prototype robotaxis. Testing of driverless vehicles is permitted on public roads\
    \ in Ontario, Canada, but under strict conditions. In early 2021, China changed\
    \ the law to allow automated driving vehicles to be tested on public highways.\
    \ There are also several efforts in enabling automated driving capabilities for\
    \ fleets of vehicles through flocking and platooning, for example. According to\
    \ Bishop Consulting, in level 1 or L1 platooning (first generation), the front\
    \ driver drives normally with crash avoidance support such as connected braking\
    \ and rear driver(s) steer, monitors the road, and responds to traffic. In level\
    \ 4 or L4 following (second generation), the front driver drives the same way\
    \ as in L1, but there will be no driver in the follower truck(s) and technology\
    \ like `AutoFollow` is used.\n\nADSs are going to dramatically change the world,\
    \ and there are several intended and unintended consequences of this technology.\
    \ Centre for London summarized the possible urban outcomes from automated driving\
    \ into decreased driving costs of public and private vehicles, increased convenience,\
    \ increased delivery demands, increased congestion, improved public transport\
    \ accessibility, decreased demand for parking, and decreased city walkability\
    \ (Bosetti et al., 2020). However, the Centre highlighted the high uncertainty\
    \ around adoption and ability to achieve full automation.\n\nCar parking spaces\
    \ could reduce by 70%, traffic lights will change or disappear, taxi fleets could\
    \ reduce by 40%, cars will teach us about human behavior, and cars will teach\
    \ us about the world around them (Walsh, 2020). Others with pessimistic views\
    \ see that ADSs could make traffic and emissions worse (Madrigal, 2018). Select\
    \ Car Leasing predicts the following consequences of ADSs (Select Car Leasing,\
    \ 2018):\n\n- Disappearance of road rage\n- Increase in alcohol consumption (estimated\
    \ increase in value for the alcohol industry by $62.7 billion as driving and drinking\
    \ times begin to overlap)\n- The replacement of ownership with usership (80% drop\
    \ in consumer demand for new vehicles by 2030 as drivers move toward a subscription-based\
    \ model according to a study by RethinkX)\n- The legal underage driving (38% of\
    \ the public would be happy for their child to ride an ADS car according to a\
    \ study by the Open Roboethics Institute)\n- Disappearance of car radio as passengers\
    \ will spend their journey watching shows or looking at social media or working\n\
    \nThe Capgemini Research Institute conducted a study on 5,500 consumers and 280\
    \ executives from Europe, North America, and Asia (Winkler et al., 2019). This\
    \ study shows that 25% of these potential consumers would consider riding in a\
    \ self-driving car in 12 months’ time and 54% of them would trust an autonomous\
    \ vehicle carrying non-driving family members and friends. The study also shows\
    \ that 73% of consumers are most excited about the fuel efficiency offered by\
    \ automated driving vehicles, closely followed by reduced emissions (71%) and\
    \ saving time (50%). As a reflection of this growing optimism and trust in the\
    \ technology, 52% expect the bugs to have been ironed out of the technology by\
    \ 2024, to the extent that driverless cars will be their preferred mode of transport.\n\
    \n### 4.4 E-Mobility\n\nElectric mobility or e-mobility promises environmentally\
    \ friendly mobility that eliminates both emissions and noise pollution in the\
    \ roads. E-mobility includes any mobility platform powered by electric motors.\
    \ Examples include e-cars, e-bikes, e-scooters, e-skateboards, electric wheelchairs,\
    \ eVTOL, electric shuttles/commuters, automated people movers (APMs), hyperloop,\
    \ monorail trains, and so on.\n\n**Important**  \nThe global e-mobility (e-car,\
    \ e-scooter, e-bike, e-skateboard, e-motorcycle, and e-wheelchair) market size\
    \ is expected to reach $489,316 million by 2025 and registers CAGR of 21.6% from\
    \ 2019 to 2025, according to Research and Markets.\n\nThe global market for electric\
    \ vehicles (EVs) is in the early stages of adoption, representing about 2% of\
    \ global sales of new vehicles in 2019 (William Hughes and Abuelsamid, 2020).\
    \ However, global electric car sales reached 2.3 million in 2020, an almost fourfold\
    \ increase in just five years according to the World Economic Forum. In some countries\
    \ like Norway, nearly 50% of new cars are now EVs, a higher percentage by far\
    \ than in any other nation (Ulrich, 2020). In Norway, EV drivers enjoy a 90% discount\
    \ on road tax. McKinsey’s Electric Vehicle Index (EVI) shows that the global electric\
    \ vehicle (battery-electric vehicles and plug-in hybrid electric vehicles) industry\
    \ continues to expand rapidly (Hertzke et al., 2019). The EVI is a score from\
    \ zero to five that assesses the e-mobility performance of 15 key countries around\
    \ the world. China is leading the global e-mobility market.\n\nAlthough the spread\
    \ of and the societal acceptance for e-mobility are growing very quickly especially\
    \ in the micromobility and public transit domains, there are still some challenges\
    \ that face e-mobility especially in the e-car domain. These challenges or limiting\
    \ factors include the high price of e-cars compared to ICE cars, lack of appealing\
    \ incentives for EV purchasing, range anxiety, battery lifetime and degradation,\
    \ and the availability and the interoperability of supercharging points. Infineon\
    \ highlights that the attractiveness of e-mobility stands and falls by the batteries:\
    \ what distance can the mobility platform cover with them, how much do they cost,\
    \ and how much do they weigh (Infineon, 2018)?\n\nThere are some other safety\
    \ concerns due to the lack of noise, which may impact negatively on awareness\
    \ of vulnerable road users like pedestrians and cyclists. An electric vehicle\
    \ driving at low speed or backing up is very quiet and can pose a danger to vulnerable\
    \ road users especially sight-impaired pedestrians crossing the street. Some SAE\
    \ experts say that the odds of an EV hitting a pedestrian are 19% higher compared\
    \ to an ICE vehicle. Several governments in North America and Europe plan to require\
    \ that electric vehicles emit automatic audible warning signals when traveling\
    \ at less than 18 miles per hour in order to prevent pedestrian injuries at intersection\
    \ crosswalks or when electrified vehicles are backing up."
  raw: '### 4.3.6 Automated Driving and Smart Mobility


    In the smart mobility domain, automated driving is not restricted to cars but
    can be extended to different mobility platforms for people transportation and
    freight delivery. These platforms include, but are not limited to, self-driving
    shuttles (e.g., GM’s Cruise Origin), self-driving modular stores (e.g., Toyota’s
    e-Palette), last-mile delivery (e.g., Starship, Nuro, and Robby), and first- and
    middle-mile delivery self-driving trucks (e.g., Embark, Tesla, TuSimple, Daimler
    Trucks, Waymo, Plus.ai, and Peloton). The United States, Germany, the United Kingdom,
    and several European countries have enacted legislation allowing autonomous vehicles
    to be tested on public roads. Málaga, the sixth largest city in Spain, is the
    first place in Europe to trial a full-size 12-meter self-driving passenger-carrying
    bus. This 60-passenger bus will make an eight-kilometer round trip from the city
    center to the port, six times daily. General Motors’ Cruise plans to begin deploying
    its robo taxis in Dubai beginning in 2023, making Dubai the first city outside
    the United States where Cruise will operate. Cruise will be the exclusive robo
    taxi service provider in the Emirates until 2029\. By 2030, Cruise and Dubai’s
    RTA plan to have 4,000 self-driving taxis in operation. Moreover, Cruise is authorized
    by California Public Utilities Commission (CPUC) in June 2021 to give passengers
    rides in prototype robotaxis. Testing of driverless vehicles is permitted on public
    roads in Ontario, Canada, but under strict conditions. In early 2021, China changed
    the law to allow automated driving vehicles to be tested on public highways. There
    are also several efforts in enabling automated driving capabilities for fleets
    of vehicles through flocking and platooning, for example. According to Bishop
    Consulting, in level 1 or L1 platooning (first generation), the front driver drives
    normally with crash avoidance support such as connected braking and rear driver(s)
    steer, monitors the road, and responds to traffic. In level 4 or L4 following
    (second generation), the front driver drives the same way as in L1, but there
    will be no driver in the follower truck(s) and technology like AutoFollow is used.


    ADSs are going to dramatically change the world, and there are several intended
    and unintended consequences of this technology. Centre for London summarized the
    possible urban outcomes from automated driving into decreased driving costs of
    public and private vehicles, increased convenience, increased delivery demands,
    increased congestion, improved public transport accessibility, decreased demand
    for parking, and decreased city walkability (Bosetti et al., 2020). However, the
    Centre highlighted the high uncertainty around adoption and ability to achieve
    full automation.


    Car parking spaces could reduce by 70%, traffic lights will change or disappear,
    taxi fleets could reduce by 40%, cars will teach us about human behavior, and
    cars will teach us about the world around them (Walsh, 2020). Others with pessimistic
    views see that ADSs could make traffic and emissions worse (Madrigal, 2018). Select
    Car Leasing predicts the following consequences of ADSs (Select Car Leasing, 2018):


    *   Disappearance of road rage


    *   Increase in alcohol consumption (estimated increase in value for the alcohol
    industry by $62.7 billion as driving and drinking times begin to overlap)


    *   The replacement of ownership with usership (80% drop in consumer demand for
    new vehicles by 2030 as drivers move toward a subscription-based model according
    to a study by RethinkX)


    *   The legal underage driving (38% of the public would be happy for their child
    to ride an ADS car according to a study by the Open Roboethics Institute)


    *   Disappearance of car radio as passengers will spend their journey watching
    shows or looking at social media or working


    The Capgemini Research Institute conducted a study on 5,500 consumers and 280
    executives from Europe, North America, and Asia (Winkler et al., 2019). This study
    shows that 25% of these potential consumers would consider riding in a self-driving
    car in 12 months’ time and 54% of them would trust an autonomous vehicle carrying
    non-driving family members and friends. The study also shows that 73% of consumers
    are most excited about the fuel efficiency offered by automated driving vehicles,
    closely followed by reduced emissions (71%) and saving time (50%). As a reflection
    of this growing optimism and trust in the technology, 52% expect the bugs to have
    been ironed out of the technology by 2024, to the extent that driverless cars
    will be their preferred mode of transport.


    ## 4.4 E-Mobility


    Electric mobility or e-mobility promises environmentally friendly mobility that
    eliminates both emissions and noise pollution in the roads. E-mobility includes
    any mobility platform powered by electric motors. Examples include e-cars, e-bikes,
    e-scooters, e-skateboards, electric wheelchairs, eVTOL, electric shuttles/commuters,
    automated people movers (APMs), hyperloop, monorail trains, and so on.


    Important


    The global e-mobility (e-car, e-scooter, e-bike, e-skateboard, e-motorcycle, and
    e-wheelchair) market size is expected to reach $489,316 million by 2025 and registers
    CAGR of 21.6% from 2019 to 2025, according to Research and Markets


    The global market for electric vehicles (EVs) is in the early stages of adoption,
    representing about 2% of global sales of new vehicles in 2019 (William Hughes
    and Abuelsamid, 2020). However, global electric car sales reached 2.3 million
    in 2020, an almost fourfold increase in just five years according to the World
    Economic Forum. In some countries like Norway, nearly 50% of new cars are now
    EVs, a higher percentage by far than in any other nation (Ulrich, 2020). In Norway,
    EV drivers enjoy a 90% discount on road tax. McKinsey’s Electric Vehicle Index
    (EVI) shows that the global electric vehicle (battery-electric vehicles and plug-in
    hybrid electric vehicles) industry continues to expand rapidly (Hertzke et al.,
    2019). The EVI is a score from zero to five that assesses the e-mobility performance
    of 15 key countries around the world. China is leading the global e-mobility market.


    Although the spread of and the societal acceptance for e-mobility are growing
    very quickly especially in the micromobility and public transit domains, there
    are still some challenges that face e-mobility especially in the e-car domain.
    These challenges or limiting factors include the high price of e-cars compared
    to ICE cars, lack of appealing incentives for EV purchasing, range anxiety, battery
    lifetime and degradation, and the availability and the interoperability of supercharging
    points. Infineon highlights that the attractiveness of e-mobility stands and falls
    by the batteries: what distance can the mobility platform cover with them, how
    much do they cost, and how much do they weigh (Infineon, 2018)?


    There are some other safety concerns due to the lack of noise, which may impact
    negatively on awareness of vulnerable road users like pedestrians and cyclists.
    An electric vehicle driving at low speed or backing up is very quiet and can pose
    a danger to vulnerable road users especially sight-impaired pedestrians crossing
    the street. Some SAE experts say that the odds of an EV hitting a pedestrian are
    19% higher compared to an ICE vehicle. Several governments in North America and
    Europe plan to require that electric vehicles emit automatic audible warning signals
    when traveling at less than 18 miles per hour in order to prevent pedestrian injuries
    at intersection crosswalks or when electrified vehicles are backing up.'
  trans: "\n### 4.3.6 自动驾驶与智慧出行\n\n在智慧出行领域，自动驾驶并不局限于汽车，而是可以扩展到用于客运和货运的各种出行平台。这些平台包括但不限于：自动驾驶穿梭巴士（例如通用汽车的\
    \ Cruise Origin）、自动驾驶模块化商店（例如丰田的 e-Palette）、末端配送（例如 Starship、Nuro 和 Robby），以及负责第一公里和中间程运输的自动驾驶卡车（例如\
    \ Embark、特斯拉、图森未来、戴姆勒卡车、Waymo、智加科技 和 Peloton）。美国、德国、英国以及多个欧洲国家已通过立法，允许自动驾驶汽车在公共道路上进行测试。西班牙第六大城市马拉加是欧洲首个试点运营全尺寸\
    \ 12 米自动驾驶载客巴士的城市。这辆可搭载 60 名乘客的巴士将每天六次往返于市中心与港口之间，全程八公里。通用汽车的 Cruise 计划于 2023\
    \ 年开始在迪拜部署其自动驾驶出租车，这使迪拜成为美国以外首个运营 Cruise 服务的城市。Cruise 将在 2029 年之前成为阿联酋唯一的自动驾驶出租车服务供应商。到\
    \ 2030 年，Cruise 与迪拜道路与交通管理局计划投入 4000 辆自动驾驶出租车进行运营。此外，Cruise 于 2021 年 6 月获得加州公用事业委员会的授权，可提供原型自动驾驶出租车的载客服务。在加拿大安大略省，无人驾驶车辆可在严格条件下获准在公共道路上进行测试。2021\
    \ 年初，中国修改法律，允许自动驾驶汽车在高速公路上进行测试。此外，人们也在通过诸如编队行驶和队列行驶等方式，致力于为车队赋能自动驾驶能力。例如，根据 Bishop\
    \ Consulting 的数据，在 L1 级队列行驶（第一代）中，前车驾驶员在连接制动等防碰撞辅助下正常驾驶，而后车驾驶员负责转向、监控道路并应对交通状况。在\
    \ L4 级跟随行驶（第二代）中，前车驾驶员的操作方式与 L1 级相同，但跟随车辆中将没有驾驶员，并采用诸如 `AutoFollow` 之类的技术。\n\n\
    自动驾驶系统将极大地改变世界，这一技术会带来诸多预期内和预期外的后果。伦敦中心将自动驾驶可能带来的城市影响总结为：降低公私车辆的出行成本、提升便利性、增加配送需求、加剧交通拥堵、改善公共交通可达性、减少停车需求，以及降低城市步行友好性\
    \ (Bosetti 等，2020)。然而，该中心也强调，其应用普及和实现完全自动化的能力存在高度不确定性。\n\n停车位可能减少 70%，交通信号灯会改变或消失，出租车队可能减少\
    \ 40%，汽车将教会我们人类行为，汽车也将教会我们了解它们周围的世界 (Walsh, 2020)。持悲观态度的人则认为，自动驾驶系统可能导致交通拥堵和排放问题恶化\
    \ (Madrigal, 2018)。Select Car Leasing 公司预测了自动驾驶系统的以下后果 (Select Car Leasing, 2018)：\n\
    \n- “路怒症”消失\n- 酒精消费量增加（据估计，由于驾驶和饮酒时间开始重叠，酒精行业价值将增长 627 亿美元）\n- 从拥有权向使用权的转变（根据\
    \ RethinkX 的一项研究，由于驾驶员转向订阅模式，到 2030 年消费者对新车的需求将下降 80%）\n- 合法化未成年人驾驶（根据开放机器人伦理研究所的一项研究，38%的公众乐意让他们的孩子乘坐自动驾驶汽车）\n\
    - 汽车收音机消失，因为乘客会将乘车时间用于观看节目、浏览社交媒体或工作\n\n凯捷研究院对来自欧洲、北美和亚洲的 5500 名消费者和 280 名高管进行了一项研究\
    \ (Winkler 等，2019)。该研究表明，25%的潜在消费者会考虑在未来 12 个月内乘坐自动驾驶汽车，54%的人会信任搭载其非驾驶家庭成员和朋友的自动驾驶车辆。研究还显示，73%的消费者对自动驾驶汽车带来的燃油效率最感兴趣，紧随其后的是减少排放（71%）和节省时间（50%）。为了反映对这种技术日益增长的乐观情绪和信任，52%的人预计到\
    \ 2024 年，该技术的漏洞将得到修复，以至于无人驾驶汽车将成为他们首选的交通方式。\n\n### 4.4 电动出行\n\n电动出行旨在实现环境友好型出行，消除道路上的尾气排放和噪音污染。电动出行包括任何由电动机驱动的出行平台。例如：电动汽车、电动自行车、电动滑板车、电动滑板、电动轮椅、电动垂直起降飞行器、电动穿梭巴士、自动旅客捷运系统、超级高铁、单轨列车等等。\n\
    \n**重要提示**  \n根据 Research and Markets 的数据，全球电动出行（电动汽车、电动滑板车、电动自行车、电动滑板、电动摩托车和电动轮椅）市场规模预计到\
    \ 2025 年将达到 4893.16 亿美元，2019 年至 2025 年的复合年增长率为 21.6%。\n\n全球电动汽车市场仍处于早期采用阶段，2019\
    \ 年仅占全球新车销量的约 2% (William Hughes 和 Abuelsamid, 2020)。然而，根据世界经济论坛的数据，2020 年全球电动汽车销量达到\
    \ 230 万辆，在短短五年内增长了近四倍。在挪威等一些国家，近 50%的新车现在是电动汽车，这一比例远高于其他任何国家 (Ulrich, 2020)。在挪威，电动汽车驾驶员可享受\
    \ 90%的道路税折扣。麦肯锡的电动汽车指数显示，全球电动汽车行业仍在快速扩张 (Hertzke 等，2019)。该指数是一个从零到五的评分，用于评估全球\
    \ 15 个主要国家的电动出行绩效。中国在全球电动出行市场中处于领先地位。\n\n尽管电动出行的普及和社会接受度增长迅速，尤其是在微出行和公共交通领域，但电动出行仍面临一些挑战，特别是在电动汽车领域。这些挑战或限制因素包括：电动汽车相对于内燃机汽车价格过高、缺乏吸引人的购车激励措施、里程焦虑、电池寿命和性能衰减，以及超级充电桩的可用性和互操作性。英飞凌强调，电动出行的吸引力取决于电池：出行平台能用它们行驶多远距离、成本多高、重量多重\
    \ (Infineon, 2018)？\n\n由于缺乏噪音，还存在其他一些安全隐患，这可能会对行人、自行车骑行者等弱势道路使用者的安全意识产生负面影响。低速行驶或倒车的电动汽车非常安静，可能对弱势道路使用者，特别是过马路的视障行人构成危险。一些\
    \ SAE 专家表示，电动汽车撞到行人的概率比内燃机汽车高 19%。北美和欧洲的一些政府计划要求，电动汽车在低于每小时 18 英里行驶时，必须发出自动可听警告信号，以防止在路口人行横道或电动汽车倒车时造成行人伤害。"
- fmt: '# Affordability and E-Mobility


    `Affordability` is still one of the most significant barriers to EVs. Other electric
    micromobility platforms such as e-bikes, e-scooters, and e-rickshaws (see Section
    4.5) especially the shared ones are much more affordable. Despite the high initial
    cost of EVs compared conventional internal combustion engine vehicles (ICEVs),
    the running cost of these vehicles is much less. According to a study conducted
    by the University of Michigan’s Transportation Research Institute^([^(18)](#fn18))
    in 2018, electric vehicles cost less than half as much to operate as ICE cars.
    This study shows that the average cost to operate an EV in the United States is
    $485 per year, while the average for an ICE vehicle is $1,117. Moreover, given
    the fact that EVs have much less moving parts compared to ICEVs, the useful lifetime
    of an EV is significantly longer, and the maintenance requirements are much less.
    The only exception is the short life span of the battery. According to `InsideEVs`,^([^(19)](#fn19))
    almost all electric vehicle batteries are warrantied for at least eight years
    and 100,000 miles. Moreover, EVs are getting more affordable with time. According
    to an `Electric Vehicle Market Status—Update` report,^([^(20)](#fn20)) there will
    be available soon EV models with a net cost of under $30,000 (MSRP) with a range
    of up to 250 miles when current federal, state, and local incentives are factored
    in. This report also shows that EVs will reach price parity with ICEVs (based
    on total cost of ownership without considering any tax incentives) when battery
    pack prices fall below $100/kWh. While some industry experts believe this could
    happen as early as 2021, most believe it will happen around 2025. Several OEMs
    are accelerating the electrification timeline. For example, General Motors introduced
    a range of new EVs in 2020 including Cadillac Lyriq and the iconic American SUV
    Hummer EV with a plan to launch 30 EVs around the world by 2025.


    `Vehicle-to-grid` (V2G) technology (Sovacool et al., 2020) can help in improving
    EV affordability as it enables EV owners to gain money through pushing the energy
    back from the battery of an electric car to the power grid. However, a car has
    to be plugged in 75% of the time to capture the potential value of V2G. Compared
    to the residential users, this would not be a problem for fleets like emergency
    response vehicles or logistics. Grid balancing, grid maintenance, distribution
    network interoperability, and data privacy/cybersecurity are still challenges
    for V2G. Regarding V2G cybersecurity, for example, data will be shared between
    four parties, namely, retailer/supplier, network company, fleet, and individual
    users. Guaranteeing transparency (why should the data be shared?), trust (with
    whom will the data will be shared?), and value (what are the benefits of sharing
    the data?) can help in the societal acceptance of V2G technology.


    `E-mobility` should be supported by adaptive route planning and navigation algorithms,
    contactless payment, and energy assist apps to avoid user’s range anxiety and
    charge anxiety. Nowadays, there are several energy assist tools available such
    as `myChevrolet` mobile app’s `Energy Assist`, `Google Automotive Services` (GAS),
    [`EVNAViQ`](https://github.com/evnaviq), `PlugShare Trip Planner`, `ChargePoint`,
    `ChargeHub`, `EVgo`, `EVHotels`, `Chargeway`, `Chargemap`, and `Greenlots`. `GM
    Energy Assist` is integrated with data from the vehicle, which enables smart planning
    and accurate charge time predictions. Services provided by this app include real-time
    charging station availability (for charging networks such as `EVgo`, `Flo`, `ChargePoint`,
    and `EV Connect`), payment, owner reviews and ratings of stations, and preference
    settings (e.g., charger type, network, and charger availability). Similarly, several
    apps are available for micromobility platforms such as e-bikes, e-scooters, and
    e-skateboards. Examples include `Strava`, `Trailforks`, `Gravatron`, `Coach’s
    Eye`, `Bike Share Toronto`, `WIND`, `HFX`, and the `SpinBike` shared e-scooter
    acquired by Ford. At the EV fleet level, `Ubiq` platform provides predictive charging,
    charging as a service (ChaaS), dynamic pricing and automated fleet rebalancing.


    ## 4.5 Micromobility


    `Micromobility` is a small, lightweight, and low-speed (below 25 km/h) mobility
    platform typically used for short-distance trips. Micromobility is gaining increasing
    popularity and can take different forms such as bikes, scooters, skateboards,
    and self-balancing unicycles.


    **Important**


    `Inkwood Research` anticipates that the global micro mobility market will reach
    $13.27 billion by 2026, growing at a CAGR of 12.09% during the forecast period,
    2021-2026.


    Electric-powered platforms are called electric micromobility platforms such as
    e-bike, speed pedal-assist bicycle, e-scooter, electric seated scooter (also referred
    to as Vespa-style scooter or moped), e-skateboard, electric motorcycle (also referred
    to as electric two-wheeler or E2W), fun utility vehicle (FUV), e-rickshaw (also
    known as electric tuk-tuks or toto), Segway, and electric quadricycle/battery-powered
    mini car (e.g., Chevrolet EN-V 2.0).


    These mobility platforms can be shared or personally owned as personal transporters.
    They can be used for local mobility, first-mile transportation (i.e., from home
    or origin of the journey to the transport system) and last-mile transportation
    (i.e., from the transport system to the final destination such as home, a workplace
    or a coffee shop), surveillance, and delivery services in places like educational
    institution campuses, residential compounds, shopping malls, theme parks, and
    airports to name just a few. For example, shared electric rickshaws have been
    becoming very popular in many countries especially low-income developing countries
    as an informal and equitable transportation system. Equitable transportation systems
    address the needs of previously underserved populations, enabling these groups
    to conveniently and affordably access destinations and opportunities (Yanocha
    and Allan, 2019). The affordability provided by micromobility is an attractive
    factor in both developed and developing countries given the fact that spending
    on transportation is a major household expenditure category. For example, spending
    on transportation is the second largest expenditure category accounting for 19.9%
    of total consumption, preceded by shelter budget at 29.2% and followed by food
    expenditures at 13.4% in 2017 according to `Statistics Canada`.^([^(21)](#fn21))


    `McKinsey`^([^(22)](#fn22)) claims that micromobility could theoretically encompass
    all passenger trips of less than 8 kilometers (5 miles), which account for as
    much as 50–60% of today’s total passenger miles traveled in China, the European
    Union, and the United States. The Institute for Transportation and Development
    Policy summarizes in (Yanocha and Allan, 2019) the potential positive and negative
    impacts of electric micromobility like e-bikes and e-scooters in terms of access,
    environment, equity, affordability, efficiency, safety, and health. For example,
    in terms of access, electric micromobility’s potential positive impacts include
    travel times competitive with vehicles for short trips and connections to transit
    and economic and social opportunities. However, demand for public parking will
    be increased, and infrastructure changes are required.'
