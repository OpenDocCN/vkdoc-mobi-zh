    can be selected. The relative accuracy and coverage of different indoor localization
    technologies are described in (Mautz, 2012).


    Apart from the natural features of the outdoor environments as being large scale,
    unstructured by nature, being partially observable, as well as dynamic—compared
    to indoor localization—outdoor localization is a more challenging process than
    indoor localization. This is mainly due to the lack of the ability to control
    the environment and the limited predictability of dynamic outdoor environments.


    The outdoor localization techniques can be classified into three main categories:
    relative localization, global localization, and hybrid localization techniques.
    In relative localization techniques, the main objective is to accurately evaluate
    both the position and orientation using the information provided through the different
    onboard sensors (e.g., encoders, gyroscopes, accelerometers, etc.). In these techniques,
    the position and orientation are measured with respect to an initially known pose
    from which the vehicle started its operation. These techniques generally inhibit
    several uncertainties as the error that is produced during the measurement keeps
    accumulating over time. This leads to a growing error ellipse that may cause drifting
    of the measured readings from the actual pose over time. Dead reckoning (Brossard
    et al., 2020), inertial navigation (Woodman, 2007), and visual odometry (Maimone
    et al., 2007) are examples of relative localization techniques. Unlike relative
    localization techniques, global localization techniques determine the position
    and orientation of the vehicle with respect to a global reference frame. Examples
    of global localization techniques include ground-based RF systems, active RFID
    technology, real-time locating techniques, Global Positioning Systems (GPSs),
    submeter GPS techniques (e.g., Satellite-Based Augmentation System, precise point
    positioning (PPP), and Real-Time Kinematics (RTK)), Real-Time Locating Systems
    (e.g., Ultra-wide Band or UWB RTLS), and hybrid techniques (e.g., GPS and UWB).
    The most popular technique is GPS (Samama, 2008), which is based on satellite
    signals to determine the absolute position (longitude, latitude, and altitude)
    of the vehicle on Earth. GPS provides users with space-based PNT services. It
    is undeniable that technological advances, and wide-scale availability of PNT/GPS
    technology over the past several decades, have enabled significant innovations
    in the mobility domain. These innovations have improved the safety, efficiency,
    and reliability of all modes of transportation and will help in enabling another
    transformational shift in transportation—toward greater automation (Bisnath, 2019).
    These technologies are critical to smart mobility systems, which rely on highly
    accurate and reliable positioning, navigation, and timing information. GPS provides
    position on Earth’s surface and above with different levels of precision ranging
    from 3–10 meters down to the accuracy of centimeters, depending on the accuracy
    of the GPS tracker used. Aside from GPS, other global navigation satellite systems
    (GNSSs) include European Union’s Galileo, Russia’s Global Navigation Satellite
    System (GLONASS), and China’s BeiDou Navigation Satellite System (BDS). Galileo
    is similar to GPS but offers new services and additional positioning and timing
    accuracy and reliability. It is the only system designed for civilian applications
    and managed by civil authorities. Hybrid localization techniques such as precise
    point positioning (PPP) GPS and Real-Time Kinematics (RTK) GPS are commonly used
    to improve the precision of GPS. PPP stands out as an optimal approach for providing
    centimeter-level error positioning using GNSS constellations. PPP processes measurements
    from a single-user receiver, using detailed physical models and corrections, and
    precise GNSS orbit and clock products computed beforehand. PPP differs from other
    precise positioning approaches like RTK in that no reference stations are needed
    in the vicinity of the vehicle. Another advantage is that since the GNSS orbit
    and clock products are by nature global, the PPP solutions are also global. For
    example, Trimble RTX is an advanced PPP technology that provides real-time, centimeter-level
    positions. RTK satellite navigation is a technique based on the use of carrier
    phase measurements of GPS, GLONASS, and/or Galileo signals where a single reference
    station provides real-time corrections, providing up to centimeter-level accuracy.
    RTK correction signals are typically transmitted by a base station by means of
    a UHF radio receiver/transmitter or by an NTRIP server (via a GSM network) if
    a CORS network is available in the area. The Network-RTK Positioning for Automated
    Driving (NPAD) project is described in (Nord et al., 2021). The main drawback
    of RTK technology is the short transmission range of low-powered systems caused
    by obstacles located in the path between a base station and a mobile receiver.
    Another drawback is signal interference, which can reduce transmission range and
    cause poor signal quality.'
  trans: '

    # 3.1 PNT 与 GIS


    定位、导航与授时由美国运输部（DOT）定义为三种不同基本能力的组合（Wallischeck 等，2016）：


    * **定位**是指能够精确、准确地确定自身在二维（或在需要时三维）空间中的位置和朝向，且该位置参照标准大地测量系统（如 1984 年世界大地测量系统，即
    WGS84）。

    * **导航**是指能够确定当前和期望位置（相对或绝对），并对航向、朝向和速度进行修正，从而抵达地球上从地下到地表、从地表到空间的任何期望位置。

    * **授时**是指能够在世界任何地方，并在用户定义的时间参数范围内，从标准时间（协调世界时，即 UTC）获取并维持准确且精确的时间。授时还包括时间传递。


    一般来说，根据车辆的工作环境，车辆定位可分为室内定位和室外定位两类。室内定位是精确估计在建筑物环境内移动的车辆位置和朝向的过程（Mautz，2012）。此过程中要解决的复杂程度主要取决于环境的特性。室内环境可分为结构化或非结构化、完全可观测或部分可观测、甚至是静态或动态。在非结构化的部分可观测动态环境中进行室内定位被认为是一个具有挑战性的过程。该过程首先使用不同类型的传感器（如基于无线电波的传感器、磁传感器、声学传感器或相机）来观测环境。然后，通过利用各种定位方法对收集到的数据进行进一步过滤和后处理，以精确确定车辆在其环境附近的位置。这些定位方法的示例包括：小区标识（`CoO`）/临近检测/基于连接的定位、质心确定、测距/三边测量/多边测量、极坐标法/距离-方位定位、指纹识别/场景分析/模式匹配以及航位推算。这些不同的定位方法在精度和覆盖范围上各有差异。根据目标应用所需的精度水平，可以选择相应的合适定位技术。不同室内定位技术的相对精度和覆盖范围在（Mautz，2012）中有描述。


    与室内定位相比，室外环境由于其大规模、本质上的非结构化、部分可观测以及动态的特性，使得室外定位是一个比室内定位更具挑战性的过程。这主要是由于缺乏控制环境的能力以及室外动态环境的有限可预测性。


    室外定位技术可分为三大类：相对定位、全局定位和混合定位技术。在相对定位技术中，主要目标是利用各种车载传感器（例如编码器、陀螺仪、加速度计等）提供的信息，精确评估位置和朝向。在这些技术中，位置和朝向是相对于车辆开始运行时的初始已知位姿进行测量的。这些技术通常存在一些不确定性，因为测量过程中产生的误差会随时间不断累积。这会导致误差椭圆扩大，可能使测量读数随时间偏离实际位姿。相对定位技术的例子包括航位推算（Brossard
    等，2020）、惯性导航（Woodman，2007）和视觉里程计（Maimone 等，2007）。与相对定位技术不同，全局定位技术是相对于全局参考系来确定车辆的位置和朝向。全局定位技术的例子包括地基射频系统、有源
    RFID 技术、实时定位技术、全球定位系统（`GPS`）、亚米级 `GPS` 技术（例如星基增强系统、精密单点定位（`PPP`）和实时动态差分（`RTK`））、实时定位系统（例如超宽带或
    UWB RTLS）以及混合技术（例如 `GPS` 和 UWB）。最流行的技术是 `GPS`（Samama，2008），它基于卫星信号来确定地球上车辆的绝对位置（经度、纬度和海拔）。`GPS`
    为用户提供天基 PNT 服务。不可否认，过去几十年的技术进步以及 PNT/`GPS` 技术的广泛应用，已经在移动出行领域催生了重大创新。这些创新提高了所有交通方式的安全性、效率和可靠性，并将帮助实现交通领域的另一次变革性转变——迈向更高的自动化水平（Bisnath，2019）。这些技术对于依赖高精度、高可靠性定位、导航和授时信息的智能移动系统至关重要。`GPS`
    能够提供地球表面及上方的位置信息，其精度范围从 3–10 米到厘米级不等，具体取决于所使用的 `GPS` 跟踪器的精度。除了 `GPS` 之外，其他全球导航卫星系统（`GNSS`）还包括欧盟的伽利略系统、俄罗斯的全球导航卫星系统（`GLONASS`）和中国的北斗卫星导航系统（`BDS`）。伽利略系统与
    `GPS` 类似，但提供了新的服务以及更高的定位和授时精度与可靠性。它是唯一专为民用应用设计并由民用机构管理的系统。混合定位技术，例如精密单点定位（`PPP`）`GPS`
    和实时动态差分（`RTK`）`GPS`，通常用于提高 `GPS` 的精度。`PPP` 被认为是一种利用 `GNSS` 星座提供厘米级误差定位的最优方法。`PPP`
    处理来自单用户接收机的测量值，使用详细的物理模型和修正，以及预先计算好的精确 `GNSS` 轨道和时钟产品。`PPP` 与 `RTK` 等其他精密定位方法的不同之处在于，车辆附近无需参考站。另一个优点是，由于
    `GNSS` 轨道和时钟产品本质上是全球性的，因此 `PPP` 的解决方案也是全球性的。例如，Trimble `RTX` 是一种先进的 `PPP` 技术，可提供实时厘米级定位。`RTK`
    卫星导航是一种基于使用 `GPS`、`GLONASS` 和/或伽利略信号载波相位测量的技术，其中单个参考站提供实时修正，可实现高达厘米级的精度。`RTK`
    修正信号通常由基站通过超高频无线电接收器/发射器传输，或者如果该区域有 `CORS` 网络，则通过 `NTRIP` 服务器（经由 `GSM` 网络）传输。
    (Nord 等，2021) 描述了用于自动驾驶的网络 RTK 定位（`NPAD`）项目。`RTK` 技术的主要缺点是由于基站和移动接收器之间路径上的障碍物导致低功率系统传输距离短。另一个缺点是信号干扰，它会减少传输距离并导致信号质量差。

    '
- fmt: '# WiFi-Based Positioning and Geographic Information Systems


    ## WiFi-Based Positioning


    WiFi-based positioning can handle the traditional GPS shortcomings in metropolitan
    areas. In this case, WiFi-based positioning can be explored through both trilateration
    and fingerprinting techniques as relying only on trilateration would not be a
    suitable candidate due to the need for at least three reference points with direct
    lines of sight to localize the vehicle in a 2D plane, which are not always available
    in areas like urban canyons. WiFi positioning estimates from both trilateration
    and fingerprinting can be cotrained with a GPS/smartphone position model. Other
    emerging positioning technologies include 5G/3GPP (e.g., R16 NR Positioning),
    cellular V2X (vehicle-to-anything) (e.g., R16 NR V2V/V2I), and Visual Positioning
    System (VPS). VPS or vision-based map matching is a potential positioning modality.
    In VPS, the position of the vehicle is estimated based on recognizing natural
    landmarks and matching them with the known area map.


    ## Geographic Information System (GIS)


    `Geographic Information System (GIS)` is an information system for input, storage,
    manipulation, and output of geographical information. GIS plays a crucial role
    in existing and emerging mobility systems. Nowadays, several Internet-based mapping
    technologies provide free satellite imagery, aerial photos, and topographic data
    for most of Earth’s land surface, resulting in increased availability of mapping
    technology. Examples include `Google Earth`, `Google Maps`, `OpenStreetMap`, `ArcGIS`,
    `QGIS`, `2GIS`, `Bing Maps`, `HERE WeGo`, and `MAPS.ME`. Other mapping services
    such as `AccuTerra` focus on providing mapping for recreation from `US Geological
    Survey (USGS)` topographic map series, national parks, national forests, and `Bureau
    of Land Management` data.


    ## High-Definition (HD) Maps


    High-definition (HD) maps can be constructed using different approaches to provide
    extremely high-precision information at a centimeter level for smart mobility
    platforms such as automated driving vehicles. Examples of this information include
    lane boundaries, intersections, crosswalks, parking spots, stop signs, traffic
    lights, and so on. When we are creating HD maps of a city, we are creating the
    digital infrastructure of a city’s road network (Vardhan, 2017). According to
    Lyft (Chellapilla, 2018), a HD map is organized into five layers, namely, a base
    map (standard-definition map), a geometric map that contains 3D information of
    the world, a semantic map built on the geometric map layer by adding semantic
    objects, map priors containing derived information about dynamic elements and
    also human driving behavior, and the read/write real-time knowledge layer. Different
    types of sensors such as GPS, cameras, radar, and LiDAR sensors are used and fused
    to create these HD maps.


    ## Combining 5G with PNT, GIS, HD Mapping, and Traffic Data


    Combining 5G with PNT, GIS, HD mapping techniques, and traffic density data will
    enable several smart mobility applications that require fast data transmission
    speed, low network latency, precise location, navigation, timing and mapping services,
    and real-time traffic data. Application examples include efficient routing and
    rerouting, mobile asset tracking, location-aware services, Mobility-as-a-Service,
    mobility on demand, and seamless integrated mobility services to name just a few.
    For instance, a navigation app like `Google Maps` encompasses the following components:


    - **Map Encoding Algorithms:** Are spatial indexing algorithms and algorithms
    of computational geometry to organize the map data and retrieve it efficiently.
    Directed graphs and contraction hierarchies are commonly used to represent the
    map. Road classification hierarchy or road hierarchy is a scheme for categorizing
    roads into groups based on a number of factors such as usage, location, surface
    type, capacity, and so on.


    - **Map Drawing Algorithms:** To draw maps (e.g., project latitude and longitude
    coordinates; fill the polygons; place names for streets, cities, businesses, and
    parks; and so on).


    - **Query Understanding Algorithms:** Understand queries from users. These queries
    can be typed or spoken. Search location by image is also a possibility. Natural
    language processing, speech recognition, and machine vision are employed by the
    query understanding algorithms.


    - **GPS Signal Processing Algorithms:** To improve accuracy and handle different
    imperfection aspects of low-cost GPS such as uncertainty and ambiguity.


    - **Geocoding Algorithms:** To convert addresses to points (or polygons) on a
    map using a geographic coordinate system. A geographic coordinate system is a
    coordinate system that enables every location on Earth to be specified by a set
    of numbers, letters, or symbols (Crossley, 1999). Common map projections to assign
    coordinates to locations on the surface of Earth include latitude/longitude coordinates,
    the `Universal Transverse Mercator (UTM)`, the `Military Grid Reference System
    (MGRS)`, the `US National Grid (USNG)`, the `Global Area Reference System (GARS)`,
    and the `World Geographic Reference System (GEOREF)`. `What3words (W3W)` is a
    human-readable geocode system for the communication of locations with a resolution
    of three meters. Similarly, `Plus codes` created based on Google’s `Open Location
    Code (OLC)` geocode system also provide geo-labels that are based on latitude
    and longitude and displayed as numbers and letters. These geo-labels like `W3W`
    and `Plus codes` can be used to label locations without formal addresses given
    the fact that half of the world’s urban population lives on an unnamed street.


    - **Routing Algorithms:** To find the optimal route between the current location
    and the destination (shortest or fastest path in large time-dependent road networks).
    Mobile apps like `Waze`, `Apple Maps`, and `Google Maps` are commonly used as
    navigation apps that provide optimal or suboptimal routes. However, more advanced
    versions of these apps are needed to include additional information such as capacity
    of residential streets and dynamic events that may compromise safety or result
    in congestion (Macfarlane, 2019). Routing is usually treated as a graph search
    problem. A graph is a mathematical way to represent the road network. The graph
    nodes represent intersections, and the edges represent the roads. A route is a
    sequence of edges connecting the origin node to the destination node. Dijkstra’s,
    A-star, and contraction hierarchy algorithms are commonly used to solve routing
    problems as illustrated in Figure 3-1.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig1_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig1_HTML.png)


    **Figure 3-1:** Examples of Routing Algorithms


    These graph search algorithms and others are available for routing problems in
    this `GitHub` repo developed by me as part of the course I teach in `The Edward
    S. Rogers Sr. Department of Electrical and Computer Engineering (ECE)` at the
    University of Toronto, Canada.


    > **Important:** A reduction of one mile per driver per day translates to savings
    of up to $50 million a year (Jack Levis, Director of Process Management of UPS).


    - **Routes Based on Transportation Mode:** Different routes are calculated based
    on the available transportation modes (driving, motorcycle, cycling, transit,
    walking, ride services).


    - **Reverse Geocoding Algorithms:** To perform reverse geocoding, converting points
    to addresses using point-in-polygon algorithms.


    - **Guidance:** To provide guidance during route execution using graphics and
    audible alerts and text-to-speech synthesis or a speech assistant.


    - **Off-Route Detection and Rerouting:** To detect when the driver has gone off
    the route and needs a new route.


    - **Points of Interest:** Malls, restaurants, parking spaces, and so on are highlighted
    in the vicinity of the current location.'
