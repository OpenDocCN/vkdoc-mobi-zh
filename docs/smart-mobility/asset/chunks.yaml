    ### 自动驾驶汽车 vs. 自动飞行飞机


    在莱特兄弟 1903 年首飞后，飞机的自动化进程于 9 年后开启。首个飞机自动驾驶仪由斯佩里公司于 1912 年研发。一百多年前，第一批自动驾驶模型就已开发、安装并应用于飞机。然而，汽车自动驾驶技术至今仍未像飞机自动驾驶那样普及。


    **警告**


    > “自动驾驶的技术难度比我们最初设想的要更具挑战性。”（哈坎·塞缪尔森，沃尔沃 CEO）


    其主要原因在于运行环境特性。飞机运行的环境相对静态、可预测、结构明确且可观测，而汽车及其他城市交通工具的运行环境则高度动态化、非结构化、部分可观测，存在大量边界/极端情况以及未知的未知。同样的原理也适用于封闭式自动化快速运输系统（如地铁和自动旅客捷运系统）以及火车，这些系统因其运行环境的静态性、可预测性、结构化和可观测性而能够完全自动化。图
    4-2 展示了自动驾驶车辆环境中领域知识与元知识之间的关系。


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig2_HTML.png](img/511013_1_En_4_Fig2_HTML.png)


    **图 4-2** 元知识与领域知识


    `已知的已知`代表我们拥有且知道自身拥有其信息。例如，自动驾驶系统识别交通标志和信号灯的能力可视为`已知的已知`。`未知的已知`是我们拥有但尚未意识到的信息。`已知的未知`代表我们不具备但知道自身缺乏的信息。对抗性用例和边界/极端情况可视为`已知的未知`，因为我们了解大多数这类情况，但不知道如何应对。对抗性用例是指那些因与目标案例相似而可能混淆模型的案例。对抗性案例的例子包括充满空气的塑料袋、假坑洼/减速带、人行横道上的充气人偶气球，或带有真人大小图片的横幅。这些物体可能被物体识别系统错误地解读为需要避开的障碍物。边界/极端情况的例子包括但不限于：突然跳上汽车引擎盖的大型动物/鹿、羊群等罕见道路障碍、奇怪的马车、极端天气条件等等。`未知的未知`是那些相关但既不知道也意识不到自身缺乏的信息。例如对未知扰动的敏感性。以波音
    737 MAX 为例，其配备了一个名为`MCAS`的计算机控制稳定系统，用以防止飞行中失速。在 2018 年狮航 610 号航班和 2019 年埃航 302
    号航班两起空难之前，`MCAS`使用的迎角传感器故障的影响属于`未知的未知`。当系统失效时，由于`MCAS`被设计为遵从安全措施，它阻止了飞行员采取正确操作，最终导致了波音
    737 MAX 的空难系列事件。


    鉴于驾驶任务是一种高度重复且反应性的活动，各种智力水平的人都能获得驾照，尤其是在熟悉区域驾驶时。约书亚·本吉奥在 2019 年神经信息处理系统大会（NeurIPS
    2019）上发表了题为“从系统 1 深度学习到系统 2 深度学习”的演讲，解释了“系统 1”和“系统 2”认知的区别。本吉奥表示，系统 1 是“我们凭直觉、无意识地做的事情，无法用语言解释，在行为方面就是习惯性的事情”。系统
    1 自动且快速地运行，几乎不费力气，也无需意志控制；而系统 2 则将注意力分配给需要它的费力的心智活动，包括复杂计算。系统 2 的运作通常与个体能动性、选择和专注的主观体验相关联（Kahneman,
    2011）。本吉奥这样解释系统 1 与系统 2 的差异：想象在熟悉的社区驾驶。你通常能下意识地导航，利用数百次见过的视觉线索。你不需要指引方向，甚至可能在不怎么专注驾驶的情况下与乘客交谈。然而，当你进入一个陌生区域，不熟悉街道且景色全新时，你必须更关注路标、使用地图并借助其他指示找到目的地。在熟悉区域情景下，你使用系统
    1 认知；而在陌生区域情景下，你必须切换至系统 2 认知才能驾驶车辆。依赖系统 1 认知，很可能是大多数事故发生在日常熟悉行程中的原因。模仿或逆向工程这些系统
    1 和系统 2 的认知功能，以构建能够在动态、非结构化和部分可观测环境中导航的自动驾驶系统，极具挑战性。因此，现代豪华汽车的平均软件代码行数远高于各类飞机也就不足为奇了。例如，美国空军
    F-22 喷气式战斗机有 170 万行代码，波音 787 梦想客机有 650 万行代码，而现代豪华汽车的代码量超过 1 亿行（Wise, 2016）。这些现代车辆配备了互联网连接、传感器和致动器，以及
    50 多台微型计算机，使其如同“超级计算机或名副其实的带轮子 IT 设备”。然而，随着车辆软件代码行数的增加，软件错误和相关漏洞的潜在风险也随之上升（Wise,
    2016）。


    下一章将阐述的用于人员与货物运输的城市空中交通（UAM）平台，与自动驾驶汽车共享环境的复杂性，同时还面临额外的航空技术挑战，如稳定性问题，以及噪音污染和视觉干扰等监管方面的问题。

