  trans: "\n# 3.3 移动计算\n\n移动计算是一套信息技术、产品、服务以及运营策略和流程，使授权的最终用户和移动资产能够从任何地方访问数据、信息和进行计算。根据数据源、存储和计算单元的邻近程度，移动计算可分为移动云计算（`MCC`）、移动雾计算（`MFC`）和移动边缘计算（`MEC`）（见图\
    \ 3-3）。\n\n移动云计算（`MCC`）定义为：\n\n> *一种丰富的移动计算技术，它利用各种云（私有或公有）的统一弹性资源和网络技术，以实现无限制的功能、存储和移动性，通过网络通道随时随地服务于多种移动设备，无论其异构环境和平台如何，均基于按需付费原则。*\n\
    > \n> ——Sanaei 等人，2013 年\n\n`MCC` 作为云计算和移动计算的结合，正被研究人员和从业者视为一种令人兴奋的新方法，用于扩展移动设备和移动平台的能力，这有可能对商业环境和人们的日常生活产生深远影响（Leung\
    \ 等人，2013 年）。\n\n移动雾计算（`MFC`）（An 等人，2018 年）和移动边缘计算（`MEC`）（Li 等人，2016 年）是两种新兴范式，用于解决云计算中与延迟、带宽、隐私和安全相关的一些问题。`MFC`\
    \ 和 `MEC` 都将计算和存储推向更接近数据生成的位置，使移动用户/移动平台能够将部分或全部计算密集型且时间受限的任务卸载到附近或本地服务器进行计算。这实现了超低延迟、更好的带宽利用率、更快的洞察和行动以及更高的可扩展性，因为它减少了需要发送到集中式数据中心或云端的数据量，并在雾或边缘节点执行计算。在智能移动领域，隐私和安全是\
    \ `MFC` 和 `MEC` 的额外优势，其中 `MFC` 可用于管理特定地理围栏区域内的自动驾驶车队，而 `MEC` 可用于在每个车辆中运行基于 AI\
    \ 的模块，用于感知、规划、控制、学习和自适应。图 3-3 展示了一个基于机器学习的服务部署示例。\n\n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig3_HTML.png](img/511013_1_En_3_Fig3_HTML.png)\n\
    \n**图 3-3** 移动计算部署架构\n\n> **注** 无处不在的移动计算技术的出现催化了交通运输行业的变革。\n\n移动计算是多项颠覆性移动服务的基础技术，例如基于应用程序的运输网络公司（`TNCs`）、一切皆服务（`XaaS`）、出行即服务（`MaaS`）、车辆即服务（`VaaS`）、点击取货的最后一英里配送服务以及移动云感知。例如，基于移动计算可以开发多种移动云感知应用，如下所示（Han\
    \ 等人，2015 年）：\n\n* **个体感知应用**：如针对主动出行的自我锻炼管理和日常活动记录\n* **群体感知应用**：如路况监测、协作地图绘制和自主垃圾收集\n\
    * **社区感知应用**：如交通监测和污染监测\n* **机会感知应用**：无需用户交互，感知活动可以长期持续，但结果依赖于稳定、无太多干扰的感知环境\n\
    * **参与式感知应用**：需要说服用户参与感知，激励措施包括金钱、共同利益和责任\n\n# 3.4 区块链\n\n分布式计算的概念自 1990 年以来就已存在。区块链于\
    \ 2009 年被发明，作为加密货币比特币的公共交易账本（Staff，2016 年）。中本聪创建了比特币，并引入了区块链的概念，以创建一个由匿名共识维护的去中心化账本，作为第一个区块链数据库。加密货币在与现金相关的应用中的部署始于\
    \ 2011 年，随后在 2012 年引入了货币转账和数字支付系统。智能合约于 2014 年开始发展，许可型区块链网络解决方案于 2015 年出现。从 2016\
    \ 年开始，区块链开始渗透到不同行业。\n\n基于点对点（`P2P`）拓扑结构，区块链是一种分布式账本技术（`DLT`），它提供了一个可信且透明的环境，允许数据全局存储在数千台服务器上，并便于访问这些数据（Mearian，2019\
    \ 年）。区块链是一种分布式记录数据库，或者是所有已在参与方之间执行和共享的交易或数字事件的公共账本（Crosby 等人，2016 年）。账本本质上是一个交易数据库。该技术是一种用于发现、估值和转移资产所有量子的新型组织范式。该资产可以是有形资产（实物财产、房屋、汽车）或无形资产（投票权、创意、声誉、意图、健康数据、信息等）（Swan，2015\
    \ 年）。在智能移动领域，有形资产可以是移动平台，如汽车、自行车、踏板车、公共交通工具、自动旅客捷运系统或超回路列车。数字资产可以是共享车辆或智能储物柜的访问码，也可以是智能移动平台或任何其他物理对象（如备件或充电站）的数字孪生。这些资产可以注册一个唯一标识符，并在区块链上进行跟踪、控制和交换。数据透明性、安全性、资产管理和智能合约被认为是区块链技术的关键和区别于其他技术的特征（Heutger\
    \ 等人，2018 年）：\n\n* **数据透明性**：区块链技术包含确保存储的记录准确、防篡改且来自可验证来源的机制。\n* **安全性**：单个交易和消息都经过加密签名。这确保了必要的安全性和有效的风险管理，以应对当今黑客攻击、数据篡改和数据泄露的高风险。\n\
    * **资产管理**：管理数字资产的所有权，并促进资产转移。\n* **智能合约**：智能合约是基于区块链的系统的一个组件，可以自动执行利益相关者商定的规则和流程步骤。一旦启动，智能合约就完全自主运行；当合约条件满足时，预先指定并商定的操作会自动发生。这些智能合约可以加速流程，实现数字资产的快速安全支付、自动化租赁、融资、维护和其他程序。例如，在最后一英里配送场景中，一旦收到付款，产品配送会自动触发；或者一旦收到货物，付款会自动触发。\n\
    \n表 3-1 显示了不同类型的区块链技术，并给出了一些在智能移动领域的应用示例。区块链可以根据治理模型分类为：公有非许可型（例如，比特币、以太坊和 IOTA）、公有许可型（例如，Sovrin\
    \ 和 IPDB）、私有非许可型（例如，Hyperledger Sawtooth 的非许可模式）以及私有许可型（例如，Hyperledger Fabric、Hyperledger\
    \ Sawtooth、Hyperledger Iroha、R3 Corda 和 CULedger）。\n"
- fmt: '# Blockchain in Smart Mobility


    Blockchain is another component of digitizing society. This technology has the
    potential to reshape transportation and logistics systems enabling services such
    as authentication, access control, secure and fast payment (decentralized mechanism
    without central agency), seamless information sharing (e.g., empowering users
    by providing relevant information about mobility services), track (i.e., monitoring
    the process), and trace (i.e., uncover the origin). Imagine a person boarding
    a mobility platform like a bus empowered by blockchain and IoT technologies. Once
    the person boards the bus, the crypto-spatial layer notes the point of embarkation
    and the point of disembarkation and automatically charges the fare from the spatial
    wallet of the traveler and credits it to the spatial wallet of the transport utility
    company (Dasgupta, 2017).


    Blockchain will increase the cost effectiveness of digital twins of smart mobility
    platforms and systems. Digital twins can be stored on a blockchain-based system
    for monitoring, diagnostics, and prognostics to guarantee the healthy, efficient,
    and sustainable operation of the platform, optimizing the operation and maintenance,
    discovering inequality of the design and in fleet management. This digital twin
    is a high-fidelity cloud-based virtual representation or a digital replica of
    the mobility platform that contains an up-to-date and accurate copy of the platform’s
    properties and states throughout the entire life cycle of the platform. This life
    cycle spans from design to manufacturing to operation, feedback, and updates until
    the physical platform’s end-of-life. For example, this digital twin powered by
    blockchain technology can be a single source of truth for each vehicle’s maintenance
    data in order to eliminate illegal odometer manipulation.


    ## Warning


    Odometer fraud (a.k.a. busting miles or clocking or odometer tampering or rollback)
    is the disconnection, resetting, or alteration of a vehicle’s odometer manually
    or digitally with the intent to change the number of miles indicated.


    The National Highway Traffic Safety Administration (NHTSA) estimates that more
    than 450,000 vehicles are sold each year with false odometer readings. This crime
    costs American car buyers more than $1 billion annually and puts safety at risk.
    In Canada, more than 89,000 vehicles are reported every year, with odometers that
    have been tampered with. A `CarProof` or `Carfax` report, which covers vehicles
    across Canada, may or may not have the odometer reading. In the United Kingdom,
    one in every 14 cars has a “mileage discrepancy.” In Germany, it is estimated
    that every third car has been subject to illegal odometer manipulation. The fraudulent
    increase in value per car is estimated to be US $3,700 alone, which in Germany
    means almost $7.5 billion in fraud every year. To solve this problem, a blockchain-based
    system with an in-car connector can be used to regularly record the distances
    traveled by each vehicle, which acts as an ongoing, tamper-evident record of odometer
    readings (Heutger et al., 2018).


    ## Table 3-1: Blockchain Types and Application Examples in Smart Mobility


    | Property | Public Blockchain | Consortium or Federated Blockchain | Private
    Blockchain |

    | --- | --- | --- | --- |

    | Access | Anyone | Single organization | Multiple selected organizations |

    | Permission | Permissionless | Permissioned | Permissioned |

    | Participants known? | Anonymous/pseudonymous | Known identities | Known identities
    |

    | Security | Consensus mechanism: Proof of work/proof of stake | • Preapproved
    participants<br>• Voting/multipart consensus | • Preapproved participants<br>• Voting/multipart
    consensus |

    | Transaction speed | Slow | Fast | Fast |

    | Examples of applications in smart mobility | Mobile crowdsensing | • Blockchain-powered
    public transit operated by a city transit commission<br>• Fleet management system
    of an organization | • Driving/testing data sharing<br>• Vehicle digital twins
    among car OEMs (original equipment manufacturers) (`Bosch` and `TÜV Rheinland`)<br>• Supply
    chain management<br>• Usage-based insurance<br>• Car/ride share transactions<br>• P2P
    vehicle sharing services<br>• Fast, elastic, and transparent last-mile delivery
    services (Ferrag and Maglaras, 2019) |


    Blockchain technology has also the ability to be a catalyst for peer-to-peer (P2P)
    mobility platform sharing systems. In these systems, a mobility platform can be
    a car (e.g., `Drive Drive Car`[^(10)](#fn10)), bike (e.g., `Spinlister`[^(11)](#fn11)),
    scooter, Personal Intelligent City Accessible Vehicle (PICAV), VTOL, `SeaBubble`,
    or any other personal transporter. Blockchain technology enables automating processes
    such as identification, payment, and asset transfer with smart contracts and smart
    keys, provides transparency, ensures traceability, and guarantees security as
    transactions are encrypted and immutable—once written.


    Non-Fungible Tokens (NFT) is a trendy blockchain technology that is currently
    attracting the attention of the original equipment manufacturers (OEMs) and mobility
    service providers. According to a new report by `NonFungible.com`, the NFT market
    value tripled in 2020, reaching more than $250 million. NFTs are cryptographic
    assets with unique blockchain-based digital signature and can be used as a medium
    for commercial transactions to commodify digital assets in art, music, sports,
    and other popular entertainment. In smart mobility domain, NFT can be used to
    facilitate digital ownership through designating shared ownership of a vehicle
    and showing what percentage is owned by each party. West Coast Customs launches
    `"CarCoin"` NFT that will be available through a tiered membership program called
    `"The CarCoin Fast Lane"`. Future plans include auctions of actual vehicles from
    classic episodes of `"Inside West Coast Customs"`. NFT can be also used by mobility
    service providers to reward drivers and passengers with digital assets and loyalty
    points.


    The decentralized security blockchain-based technology approach is considered
    promising in tackling security and privacy concerns of connected and automated
    vehicles. For example, the authors of (Rathee et al., 2019) emphasize blockchain
    technology as one of the best technologies in terms of confidentiality and security
    to control systems in real-time based environments. Dorri et al. (Dorri et al.,
    2017) design a decentralized `Light Scalable Blockchain (LSB)` architecture that
    can provide a secure overlay network between vehicles, OEMs, and service providers,
    where users’ privacy is protected using a changeable public key. The authors state
    different applications including insurance and car sharing services to validate
    their proposed architecture. However, other researchers raise the issue of blockchain
    vulnerability to quantum attacks as quantum computers will be capable of breaking
    the vital cryptographic scheme.


    The Mobility Open Blockchain Initiative ([MOBI](https://dlt.mobi/)) was formed
    by GM, BMW, Renault, Ford, IBM, Hyperledger, IOTA, and ConsenSys (Ethereum) to
    focus on promoting standards and accelerating the adoption of blockchain, distributed
    ledger, and related technologies in smart mobility systems.'
  raw: 'Blockchain is another component of digitizing society. This technology has
    the potential to reshape transportation and logistics systems enabling services
    such as authentication, access control, secure and fast payment (decentralized
    mechanism without central agency), seamless information sharing (e.g., empowering
    users by providing relevant information about mobility services), track (i.e.,
    monitoring the process), and trace (i.e., uncover the origin). Imagine a person
    boarding a mobility platform like a bus empowered by blockchain and IoT technologies.
    Once the person boards the bus, the crypto-spatial layer notes the point of embarkation
    and the point of disembarkation and automatically charges the fare from the spatial
    wallet of the traveler and credits it to the spatial wallet of the transport utility
    company (Dasgupta, 2017).


    Blockchain will increase the cost effectiveness of digital twins of smart mobility
    platforms and systems. Digital twins can be stored on a blockchain-based system
    for monitoring, diagnostics, and prognostics to guarantee the healthy, efficient,
    and sustainable operation of the platform, optimizing the operation and maintenance,
    discovering inequality of the design and in fleet management. This digital twin
    is a high-fidelity cloud-based virtual representation or a digital replica of
    the mobility platform that contains an up-to-date and accurate copy of the platform’s
    properties and states throughout the entire life cycle of the platform. This life
    cycle spans from design to manufacturing to operation, feedback, and updates until
    the physical platform’s end-of-life. For example, this digital twin powered by
    blockchain technology can be a single source of truth for each vehicle’s maintenance
    data in order to eliminate illegal odometer manipulation.


    Warning


    Odometer fraud (a.k.a. busting miles or clocking or odometer tampering or rollback)
    is the disconnection, resetting, or alteration of a vehicle’s odometer manually
    or digitally with the intent to change the number of miles indicated.


    The National Highway Traffic Safety Administration (NHTSA) estimates that more
    than 450,000 vehicles are sold each year with false odometer readings. This crime
    costs American car buyers more than $1 billion annually and puts safety at risk.
    In Canada, more than 89,000 vehicles are reported every year, with odometers that
    have been tampered with. A CarProof or Carfax report, which covers vehicles across
    Canada, may or may not have the odometer reading. In the United Kingdom, one in
    every 14 cars has a “mileage discrepancy.” In Germany, it is estimated that every
    third car has been subject to illegal odometer manipulation. The fraudulent increase
    in value per car is estimated to be US $3,700 alone, which in Germany means almost
    $7.5 billion in fraud every year. To solve this problem, a blockchain-based system
    with an in-car connector can be used to regularly record the distances traveled
    by each vehicle, which acts as an ongoing, tamper-evident record of odometer readings
    (Heutger et al., 2018).


    Table 3-1


    Blockchain Types and Application Examples in Smart Mobility


    | Property | Public Blockchain | Consortium or Federated Blockchain | Private
    Blockchain |

    | --- | --- | --- | --- |

    | Access | Anyone | Single organization | Multiple selected organizations |

    | Permission | Permissionless | Permissioned | Permissioned |

    | Participants known? | Anonymous/pseudonymous | Known identities | Known identities
    |

    | Security | Consensus mechanism: Proof of work/proof of stake | • Preapproved
    participants• Voting/multipart consensus | • Preapproved participants• Voting/multipart
    consensus |

    | Transaction speed | Slow | Fast | Fast |

    | Examples of applications in smart mobility | Mobile crowdsensing | • Blockchain-powered
    public transit operated by a city transit commission• Fleet management system
    of an organization | • Driving/testing data sharing• Vehicle digital twins among
    car OEMs (original equipment manufacturers) (Bosch and TÜV Rheinland)• Supply
    chain management• Usage-based insurance• Car/ride share transactions• P2P vehicle
    sharing services• Fast, elastic, and transparent last-mile delivery services (Ferrag
    and Maglaras, 2019) |


    Blockchain technology has also the ability to be a catalyst for peer-to-peer (P2P)
    mobility platform sharing systems. In these systems, a mobility platform can be
    a car (e.g., Drive Drive Car^([^(10)](#fn10))), bike (e.g., Spinlister^([^(11)](#fn11))),
    scooter, Personal Intelligent City Accessible Vehicle (PICAV), VTOL, SeaBubble,
    or any other personal transporter. Blockchain technology enables automating processes
    such as identification, payment, and asset transfer with smart contracts and smart
    keys, provides transparency, ensures traceability, and guarantees security as
    transactions are encrypted and immutable—once written.


    Non-Fungible Tokens (NFT) is a trendy blockchain technology that is currently
    attracting the attention of the original equipment manufacturers (OEMs) and mobility
    service providers. According to a new report by NonFungible.com, the NFT market
    value tripled in 2020, reaching more than $250 million. NFTs are cryptographic
    assets with unique blockchain-based digital signature and can be used as a medium
    for commercial transactions to commodify digital assets in art, music, sports,
    and other popular entertainment.In smart mobility domain, NFT can be used to facilitate
    digital ownership through designating shared ownership of a vehicle and showing
    what percentage is owned by each party. West Coast Customs launches “CarCoin”
    NFT that will be available through a tiered membership program called “The CarCoin
    Fast Lane”. Future plans include auctions of actual vehicles from classic episodes
    of “Inside West Coast Customs”. NFT can be also used by mobility service providers
    to reward drivers and passengers with digital assets and loyalty points.


    The decentralized security blockchain-based technology approach is considered
    promising in tackling security and privacy concerns of connected and automated
    vehicles. For example, the authors of (Rathee et al., 2019) emphasize blockchain
    technology as one of the best technologies in terms of confidentiality and security
    to control systems in real-time based environments. Dorri et al. (Dorri et al.,
    2017) design a decentralized Light Scalable Blockchain (LSB) architecture that
    can provide a secure overlay network between vehicles, OEMs, and service providers,
    where users’ privacy is protected using a changeable public key. The authors state
    different applications including insurance and car sharing services to validate
    their proposed architecture. However, other researchers raise the issue of blockchain
    vulnerability to quantum attacks as quantum computers will be capable of breaking
    the vital cryptographic scheme.


    The Mobility Open Blockchain Initiative ([MOBI](https://dlt.mobi/)) was formed
    by GM, BMW, Renault, Ford, IBM, Hyperledger, IOTA, and ConsenSys (Ethereum) to
    focus on promoting standards and accelerating the adoption of blockchain, distributed
    ledger, and related technologies in smart mobility systems.'
  trans: '

    # 智能出行中的区块链


    区块链是推动社会数字化的另一组成部分。这项技术有潜力重塑交通和物流系统，提供诸如身份验证、访问控制、安全快速支付（去中心化机制，无需中央机构）、无缝信息共享（例如，通过提供出行服务的相关信息来赋能用户）、追踪（即监控过程）和溯源（即发现起源）等服务。想象一下，一个人登上一辆由区块链和物联网技术赋能的巴士出行平台。当这个人登上巴士时，加密空间层会记录上车站点和下车站点，并自动从乘客的空间钱包中扣除车费，将其记入公共交通公司的空间钱包（Dasgupta,
    2017）。


    区块链将提高智能出行平台及系统数字孪生的成本效益。数字孪生可以存储在基于区块链的系统中，用于监控、诊断和预测，以保证平台健康、高效、可持续地运行，优化运营和维护，发现设计及车队管理中的不平等。这种数字孪生是基于云的高保真虚拟表示，或者是出行平台的数字副本，其中包含平台在整个生命周期内属性和状态的最新、精确副本。这个生命周期涵盖了从设计到制造、运营、反馈和更新，直至物理平台报废的全过程。例如，由区块链技术驱动的数字孪生可以作为每辆车维护数据的单一可信来源，以消除非法的里程表篡改。


    ## 警告


    里程表欺诈（也称为调表、改表、篡改里程表或回拨）是指手动或数字方式断开、重置或更改车辆里程表，意图改变所显示的英里数。


    美国国家公路交通安全管理局 (NHTSA) 估计，每年售出的车辆中有超过 45 万辆带有虚假的里程表读数。这种犯罪每年给美国购车者造成超过 10 亿美元的损失，并带来安全风险。在加拿大，每年报告超过
    89,000 辆车的里程表被篡改。一份覆盖加拿大全境的 `CarProof` 或 `Carfax` 报告可能包含也可能不包含里程表读数。在英国，每 14 辆汽车中就有
    1 辆存在“里程差异”。在德国，估计每三辆车中就有一辆曾遭受非法的里程表篡改。每辆车因此欺诈而增加的估值据估计高达 3,700 美元，仅此一项在德国就意味着每年近
    75 亿美元的欺诈额。为了解决这个问题，可以使用一个带有车载连接器的基于区块链的系统，定期记录每辆车的行驶距离，从而形成一个持续、防篡改的里程表读数记录（Heutger
    等，2018）。


    ## 表 3-1：区块链类型及其在智能出行中的应用实例


    | 特性 | 公有链 | 联盟链或联合链 | 私有链 |

    | --- | --- | --- | --- |

    | 访问权限 | 任何人 | 单一组织 | 多个选定组织 |

    | 许可 | 无需许可 | 需要许可 | 需要许可 |

    | 参与者是否已知？ | 匿名/假名 | 已知身份 | 已知身份 |

    | 安全性 | 共识机制：工作量证明/权益证明 | • 预先批准的参与者<br>• 投票/多方共识 | • 预先批准的参与者<br>• 投票/多方共识 |

    | 交易速度 | 慢 | 快 | 快 |

    | 在智能出行中的应用实例 | 移动群智感知 | • 由城市交通委员会运营的区块链赋能公共交通<br>• 某组织的车队管理系统 | • 驾驶/测试数据共享<br>• 汽车原始设备制造商
    (OEM) 之间的车辆数字孪生（`博世`和`德国莱茵 TÜV`）<br>• 供应链管理<br>• 基于使用量的保险<br>• 汽车/拼车交易<br>• P2P
    车辆共享服务<br>• 快速、弹性、透明的最后一公里配送服务（Ferrag and Maglaras, 2019） |


    区块链技术同样能够成为点对点 (P2P) 出行平台共享系统的催化剂。在这些系统中，出行平台可以是一辆汽车（例如 `Drive Drive Car`¹⁰）、一辆自行车（例如
    `Spinlister`¹¹）、踏板车、个人智能城市无障碍车辆 (PICAV)、垂直起降飞行器 (VTOL)、`SeaBubble` 或任何其他个人交通工具。区块链技术能够通过智能合约和智能密钥实现诸如身份识别、支付和资产转移等流程的自动化，提供透明度，确保可追溯性，并保证安全性，因为交易一旦写入便是加密且不可篡改的。


    非同质化代币 (NFT) 是一种热门的区块链技术，目前正吸引着原始设备制造商 (OEM) 和出行服务提供商的关注。根据 `NonFungible.com`
    的一份新报告，NFT 市场价值在 2020 年增长了两倍，达到超过 2.5 亿美元。NFT 是具有独特区块链数字签名的加密资产，可作为商业交易的媒介，将艺术、音乐、体育和其他流行娱乐领域的数字资产商品化。在智能出行领域，NFT
    可用于通过指定车辆的共同所有权并显示各方的持有比例来促进数字所有权。西海岸定制公司 (West Coast Customs) 推出了 `"CarCoin"`
    NFT，将通过一个名为 `"The CarCoin Fast Lane"` 的层级会员计划提供。未来的计划包括对来自经典剧集 `"Inside West Coast
    Customs"` 的真实车辆进行拍卖。出行服务提供商也可以利用 NFT，用数字资产和忠诚度积分来奖励司机和乘客。


    这种基于区块链的去中心化安全方法被认为在解决网联和自动驾驶汽车的安全与隐私问题方面前景广阔。例如，论文 (Rathee 等人，2019) 的作者强调，在基于实时环境控制系统的机密性和安全性方面，区块链技术是最佳技术之一。Dorri
    等人 (Dorri 等人，2017) 设计了一种去中心化的 `轻量级可扩展区块链 (LSB)` 架构，可以在车辆、OEM 和服务提供商之间提供安全的覆盖网络，并通过使用可变化的公钥来保护用户隐私。作者阐述了不同的应用，包括保险和汽车共享服务，以验证他们提出的架构。然而，其他研究人员提出了区块链易受量子攻击的问题，因为量子计算机将能够破解至关重要的密码方案。


    移动出行开放区块链倡议 ([MOBI](https://dlt.mobi/)) 由通用汽车、宝马、雷诺、福特、IBM、Hyperledger、IOTA 和
    ConsenSys (以太坊) 共同成立，其宗旨是专注于推广标准，并加速区块链、分布式账本及相关技术在智能出行系统中的采用。

