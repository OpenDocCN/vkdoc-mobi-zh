  raw: '# 2. Smart Mobility Triad


    Mobility is the ability and potential of passengers to travel and freight to be
    transported. According to the Universal Declaration of Human Rights (UDHR) adopted
    by the United Nations General Assembly (Flowers, 1998), mobility is a core human
    right and a basic need and foundation of social, economic, and cultural exchanges
    of people, businesses, and societies. The Sustainable Mobility for All^([⁵](#fn5))
    initiative formally established in 2017 aims at achieving sustainable mobility
    through focusing on the following four goals:


    *   **Safety:** Drastically reduce fatalities, injuries, and crashes.


    *   **Green:** Minimize the environmental footprint of mobility (greenhouse gas
    emissions, noise, and air pollution).


    *   **Access:** Connect all people, including women and communities, to economic
    and social opportunities.


    *   **Efficiency:** Optimize the predictability, reliability, and cost effectiveness
    of mobility.


    Smart mobility is the promotion of sustainable mobility that guarantees seamless
    access to different modes of mobility and enables people or cargo to get from
    one place to another in a way that is safe, clean, and most efficient (fast, convenient,
    comfortable, productive, and cheap). Smart mobility is built on five principles,
    namely, safety, flexibility, efficiency, integration, and clean technology.


    Important


    According to Reportlinker, the global market size of smart mobility is expected
    to reach $91 billion by 2026, rising at a market growth of 18.4% CAGR during the
    forecast period. The rewards of unlocking smart mobility could be vast, as this
    market is expected to generate $270 billion in revenues and profits of $125–150
    billion by 2040 (Smart Mobility Team, 2018).


    The future mobility is people-centric, software-defined, connected, and electric.
    With people-centric mobility, quality of life in the cities will be improved.
    Software algorithms play crucial roles in enabling advanced assisted driving and
    automated driving vehicles, shared mobility services, Mobility-as-a-Service, mobility
    on demand, and seamless integrated mobility. Automated mobility will reduce injuries
    and fatalities, improve access to mobility for those who currently cannot drive
    due to age or disability, and create new business models such as passenger economy.
    Shared mobility relies on sharing economy business model that replaces ownership
    with usership. Connected mobility creates new data-rich environments and is an
    enabler for many applications and services that will make our roads safer, less
    congested, and eco-friendlier. Electrification is an enabler for zero emission
    and sustainable mobility. However, the widespread deployment and the societal
    acceptance of smart mobility technologies like automated driving will depend not
    only on the maturity of the technology but also on the availability of a well-developed
    governance framework and the proper city planning to accommodate these evolving
    technologies. This means that smart mobility depends on a triad of complementary
    factors, namely, technology, governance, and city planning, as illustrated in
    Figure [2-1](#511013_1_En_2_Chapter.xhtml#Fig1).


    The three components of this smart mobility triad are not separate components
    as they impact each other. The following sections shed some light on these three
    components.


    ## 2.1 Smart Mobility Governance


    The creation of a comprehensive and effective governance framework for smart mobility
    services is challenging and is a moving target as this framework should embrace
    existing and emerging technologies and encourage innovation while ensuring societal
    and environmental risks are identified and carefully managed.


    There is an old parable about an elephant and a group of blind men in a room.
    None of these men had come across an elephant before. After each having touched
    a different part of the elephant in the room, the blind men are asked to describe
    the elephant from what they have just experienced. The blind man who felt the
    leg declares, “It’s like a tree or a pillar”; the one who felt the tail declares
    with confidence, “It’s like a rope”; the one who felt the trunk says, “It’s like
    a snake or a hose”; the one who felt the ear declares without doubt, “It’s like
    a soft blanket”; and the one who felt the belly declares knowingly, “It’s a wall.”
    So each blind man senses the elephant from his particular point of view and comes
    up with a different conclusion. Likewise, smart mobility governance regulations
    should be developed taking into consideration different opinions and concerns
    from multiple stakeholders. These stakeholders include policy makers, city authorities,
    environment activists, insurance companies, equipment/mobility platform manufacturers,
    smart mobility service providers, drivers, pedestrians, cyclists, public transit
    users, ridesharing users, micromobility users, and other users of smart mobility
    services. None of these stakeholders have the full picture about what is needed
    to regulate the smart mobility services and how to balance different needs and
    demands.


    ![../images/511013_1_En_2_Chapter/511013_1_En_2_Fig1_HTML.jpg](images/511013_1_En_2_Chapter/511013_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Smart Mobility Triad


    The legal and regulatory environment around several smart mobility technologies
    is still unclear and not well developed especially when it comes to safety verification
    and validation, mixed traffic management (nonautomated driving with automated
    driving vehicles), data privacy, and liability. Considering safety as the top
    priority, several safety standards and safety performance assessment programs
    are available and keep evolving. For example, to deal with possible hazards caused
    by malfunctioning behavior of E/E safety-related systems, the ISO 26262 Functional
    Safety standard was introduced. The system faults can be deterministic and attributable
    to causes or unpredictable and probabilistic in case of random hardware failure.
    Failure Modes and Effects Analysis (FMEA) is a structured approach commonly used
    by automakers to discover potential failures that may exist within the design
    of a vehicle or a process.'
  trans: "\n# 2. 智能出行三要素\n\n出行是指乘客移动和货物运输的能力与潜力。根据联合国大会通过的《世界人权宣言》（Flowers, 1998），出行是一项核心人权，也是个人、企业和社会进行社会、经济和文化交流的基本需求和基础。“全民可持续出行”倡议^(⁵)于\
    \ 2017 年正式成立，旨在通过聚焦以下四个目标来实现可持续出行：\n\n- **安全：** 大幅减少死亡、受伤和交通事故。\n- **绿色：** 最大限度减少出行的环境足迹（温室气体排放、噪音和空气污染）。\n\
    - **通达：** 将所有人，包括女性和社区，与经济和社会机会连接起来。\n- **高效：** 优化出行的可预测性、可靠性和成本效益。\n\n智能出行是对可持续出行的推广，它确保不同出行方式间的无缝衔接，使人员或货物能够以安全、清洁、最高效（快速、便捷、舒适、高效且廉价）的方式从一个地方到达另一个地方。智能出行建立在五个原则之上，即：安全、灵活、高效、集成和清洁技术。\n\
    \n**重要**  \n根据 Reportlinker 的数据，全球智能出行市场规模预计到 2026 年将达到 910 亿美元，在预测期内以 18.4%的年复合增长率增长。释放智能出行的价值潜力巨大，预计到\
    \ 2040 年，该市场将产生 2700 亿美元的收入和 1250-1500 亿美元的利润（Smart Mobility Team, 2018）。\n\n\
    未来的出行是以人为本、软件定义、互联互通和电动化的。通过以人为本的出行，城市的生活质量将得到提升。软件算法在实现高级辅助驾驶和自动驾驶车辆、共享出行服务、出行即服务、按需出行以及无缝集成出行方面发挥着关键作用。自动化出行将减少伤亡，改善目前因年龄或残疾而无法驾驶的人们的出行条件，并创造新的商业模式，如乘客经济。共享出行依赖于共享经济模式，该模式用“使用权”取代“所有权”。互联出行创造了新的数据丰富环境，并成为许多应用和服务的推动力，这些应用和服务将使我们的道路更安全、减少拥堵、更加环保。电气化是实现零排放和可持续出行的关键。然而，像自动驾驶这样的智能出行技术的广泛部署和公众接受度，不仅取决于技术的成熟度，还取决于是否有完善的管理框架和适当的城市规划来适应这些不断发展的技术。这意味着智能出行依赖于三个互补因素的组合，即技术、管理和城市规划，如图\
    \ 2-1 所示。\n\n这三个组成部分并非相互独立，而是相互影响的。以下各节将对这三个组成部分进行阐述。\n\n## 2.1 智能出行管理\n\n为智能出行服务创建一个全面有效的管理框架充满挑战，并且是一个动态目标，因为这个框架应接纳现有和新兴技术，鼓励创新，同时确保识别并谨慎管理社会和环境风险。\n\
    \n有一个关于大象和房间里一群盲人的古老寓言。这些人中没有一个以前见过大象。每个人在房间里触摸了大象的不同部位后，被要求根据刚刚的体验描述大象。摸到腿的盲人宣称：“它像一棵树或一根柱子”；摸到尾巴的盲人自信地说：“它像一根绳子”；摸到象鼻的说：“它像一条蛇或一根软管”；摸到耳朵的盲人毫不犹豫地说：“它像一条柔软的毯子”；摸到肚子的盲人胸有成竹地说：“它是一堵墙。”因此，每个盲人都从自己特定的角度去感知大象，并得出不同的结论。同样，智能出行管理法规的制定也应考虑到多个利益相关者的不同观点和关切。这些利益相关者包括政策制定者、城市当局、环保活动人士、保险公司、设备/出行平台制造商、智能出行服务提供商、驾驶员、行人、自行车骑行者、公共交通使用者、拼车用户、微出行用户以及其他智能出行服务使用者。这些利益相关者中，没有人完全了解需要如何监管智能出行服务，以及如何平衡不同的需求和诉求。\n\
    \n![../images/511013_1_En_2_Chapter/511013_1_En_2_Fig1_HTML.jpg](img/511013_1_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1** 智能出行三要素\n\n围绕若干智能出行技术的法律和监管环境仍不明确且发展不完善，尤其是在安全验证和确认、混合交通管理（非自动驾驶与自动驾驶车辆混行）、数据隐私和责任归属方面。以安全为最高优先事项，已有多种安全标准和安全性能评估程序可供使用，并且不断发展。例如，为应对\
    \ E/E 安全相关系统功能异常行为可能造成的危险，引入了`ISO 26262`功能安全标准。系统故障可能是确定性的，可归因于具体原因，也可能在随机硬件失效的情况下是不可预测和概率性的。故障模式与影响分析（FMEA）是一种结构化方法，通常由汽车制造商用于发现车辆设计或过程中可能存在的潜在故障。\n"
- fmt: '# 排版后文本


    The European New Car Assessment Programme (`Euro NCAP`)^([⁶](#fn6)) is commonly
    used for car safety performance assessment. Safety of the Intended Functionality
    (`SOTIF` or `ISO/PAS 21448`) (ISO, 2019) was developed to address new safety challenges
    that assisted driving and automated driving vehicle software developers are facing.
    `SOTIF` addresses performance limitations in sensors, algorithms, and actuators.
    `SOTIF` provides guidance on design, verification, and validation measures. Several
    features can potentially use `SOTIF` such as longitudinal control, lateral assist,
    lane changes, hand-free driving, auto parking, and auto-summon. Inclement conditions
    are also challenging for automated driving vehicles for several reasons. Snow
    and rain can obscure and confuse sensors, hide markings on the road, and make
    a vehicle perform differently. The ultimate objective of `SOTIF` is to limit the
    number of unknown unsafe states that the automated driving system (`ADS`) could
    be in.


    Moreover, Concepts of Design Assurance for Neural Networks (`CoDANN`) was developed
    by the European Union Aviation Safety Agency (`EASA`) (Cluzeau et al., 2020) as
    a way to verify and validate data-driven models for safety-critical applications.
    For more information about verification and validation methods for SAE level 3–4
    automated driving (conditional/high automation), the reader can refer to the “Safety
    First for Automated Driving (`SaFAD`)” white paper published by 11 major stakeholders
    in the automotive and automated driving industry, including Audi, Baidu, BMW,
    Intel, Daimler, and VW (Wood et al., 2019). The Safe Drive Initiative (`SafeDI`)
    developed by the World Economic Forum (`WEF`) seeks to bridge the gap between
    the industry’s expertise in AV safety and the regulators’ desire to set policy
    that safeguards AV deployment (World Economic Forum (`WEF`), 2020). Various types
    of alliances, coalitions, standards bodies, and partnerships available for industry
    decision-makers related to autonomous driving are highlighted in the AV Governance
    Ecosystem report (World Economic Forum (`WEF`), 2021) published by Autonomous
    and the `WEF`. The Autonomous^([⁷](#fn7)) global community publishes updated information
    about different initiatives and coalitions for automotive and autonomous mobility
    industry decision-makers.


    Liability aspects of smart mobility technologies such as automated driving systems
    (`ADSs`) are still uncertain and not fully defined. Different forms of liability
    should be discussed such as owner liability, manufacturer/supplier liability,
    insurer liability, and intelligent transportation system (`ITS`) liability. Owners
    would be liable for any accident if the automated driving vehicle is not insured.
    In case of product failure, the civil liability will be imposed on the producers,
    own-branders, and importers of defective products. The insurer is directly liable
    according to terms and conditions of insurance coverage. The `ITS` owner and manager
    may be also liable if the accident occurs due to infrastructure failure.


    Generally speaking, the legal landscape of autonomous vehicles is still evolving.
    In recent years, several regulatory and legislative actions focused on automated
    driving systems have been initiated in different courtiers such as the `H.R.3388—SELF
    DRIVE Act` in the United States, UK Code of Practice for Automated Vehicle Trialling,
    Autonomous Vehicle Bill in Germany, French legislative framework for autonomous
    cars, and EU Standard for Safety for the Evaluation of Autonomous Products (`UL-4600`).
    For example, the `SELF DRIVE Act` blocks states from banning self-driving vehicles,
    grants exemptions to existing safety standards for a company’s first 100,000 vehicles,
    and requires manufacturers to develop plans to thwart cyber-attacks on digitally
    run vehicles. Germany has recently approved the world''s first legal framework
    for integrating autonomous vehicles in regular traffic. The adopted legislation
    will change traffic regulations to allow driverless vehicles on public roads by
    2022, laying out a path for companies to deploy robotaxis and delivery services
    in the country at scale. According to `NHTSA` (National Highway Traffic Safety
    Administration and others, 2017), public trust and confidence in the evolution
    of `ADSs` has the potential to advance or inhibit the testing and deployment of
    `ADSs` on public roadways. This also applies to other disruptive smart mobility
    systems and services such as air taxis and autonomous cargo ships. For example,
    the quickly evolving urban air mobility (`UAM`) platforms for people and cargo
    transportation require a regulatory environment to address different aspects of
    `UAM` such as safety, privacy, noise pollution, visual disruption, and wildlife
    impact and compliance with different civil aviation standards and recommended
    practices such as `ICAO SARPs`, `FAA FARs`, `JAA`, `EASA`, and so on. The Federal
    Aviation Administration (`FAA`) is now one step closer to the much anticipated
    “Unmanned Aircraft System Traffic Management (`UTM`)” ecosystem. `UTM` will identify
    services, roles, and responsibilities, information architecture, data exchange
    protocols, software functions, infrastructure, and performance requirements for
    enabling the management of low-altitude uncontrolled drone operations. `UTM` is
    a separate but complementary framework to the `FAA`’s Air Traffic Management (`ATM`)
    system. Changing maritime laws and regulations is still a challenge against accommodating
    the use of autonomous ships for people mobility and cargo delivery. Although the
    regulations in national waters can be adapted quicker, changing international
    regulations to facilities the introduction of autonomous ships in international
    waters will take some time to address several aspects of security, safety and
    liability. Governance and regulatory processes that support, or sometimes prevent,
    the development and implementation of smart mobility solutions (shared, automated,
    electric, integrated) are highlighted in (Finger and Audouin, 2018).'
