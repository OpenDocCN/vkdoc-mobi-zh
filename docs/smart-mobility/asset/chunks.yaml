    # 6. 新冠疫情及后疫情时代的智能出行


    新型冠状病毒及其引发的 COVID-19 疫情给人类带来了前所未有的挑战。在全球范围内，截至 COVID-19 疫情爆发一周年之际，来自 223 个国家、地区或领地报告给世界卫生组织（WHO）的
    COVID-19 确诊病例已超过 1.18 亿例，其中包括近 260 万例死亡。这场不断加剧的疫情改变了我们生活的方方面面，并将在后疫情时代留下一些伤痕。它影响到我们的工作、娱乐、购物和相互交往方式；影响到政府组织提供服务的方式；影响到教育机构教学和科研的方式；也影响到公司运营、发展以及应对这个以空前且不可预测的方式持续变化的世界的途径。自
    2020 年 3 月 11 日将 COVID-19 定性为大流行病以来，WHO 建议采取多种公共卫生措施来应对疫情，例如保持社交距离、佩戴口罩，以及发现、隔离、检测和治疗每个病例并追踪每个接触者。世界各国政府实施了严格的限制措施、宵禁和局部封锁，以此遏制病毒传播。各国政府不断放宽和收紧这些措施，导致了消费者行为和偏好的重大变化，并对出行系统的各个方面造成了短期中断和长期结构性变化，如下文各节所述。

