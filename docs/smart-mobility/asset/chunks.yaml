- fmt: '外骨骼是一种新型的轮椅，能够模拟行走的运动，以弥补老年人和行动障碍者行动能力的缺失。`ReWalk`是一种知名的可穿戴机器人外骨骼，能为脊髓损伤（SCI）患者提供髋部和膝部的动力运动，帮助他们直立、行走、转弯以及上下楼梯。`ReStore`外装是一种轻量级的软体外装，在行走时为穿戴者的踝部和髋部提供辅助扭矩。滑铁卢大学开发了基于人工智能的自控假腿，以支持老年人和身体残障者的行动（`Laschowski`等人，2020）。捷豹路虎发布了可改变形状的“未来座椅”，通过让大脑以为你在走路来应对久坐的健康风险。该座椅通过泡沫中的一系列执行器持续调节，模拟行走的节奏。一种名为`Path
    Finder`的新型助行器只需安装在用户的鞋子上，就能帮助行走困难者（`Rutkin`，2014）。这些鞋子专为患有“冻结步态”的帕金森病患者设计。“冻结步态”是一种致残的临床症状，会阻止患者行走或导致其步幅极短。鞋子上的激光会在患者前方50厘米的地板上投射出平行线，而压力传感器则在脚着地时触发振动。这些智能鞋可以帮助老年人、病人和残疾人安心行走，无需担心摔倒。GPS追踪鞋垫用于监测阿尔茨海默病或痴呆症患者的位置和行踪。`SensFloor`是一种大面积电容式传感器地板，可安装在任何地板下，以增加智能个人互动和监控的机会。智能斑马线油漆和智能手杖技术也能帮助视障者安全地通过人行横道。俄亥俄州立大学开发的这种油漆使用了稀土纳米晶体，能发出独特的光信号，而安装在智能手杖尖端的传感器可以激活并读取该信号。由`Mobileye`联合创始人创立的`OrCam`提供了诸如`OrCam
    MyEye`之类的可穿戴设备，使视障者能够通过音频反馈理解文字和识别物体，描述他们无法看到的事物。最后，如今已有多种软件服务和应用可用于支持包容性出行，例如`accessibleGO`、`Wheelmap`、`AbleThrive`、`GoGo
    Grandparent`、`Be My Eyes`和`BlindSquare`。例如，`accessibleGO`是一个提供全方位服务的无障碍出行平台，可搜索、评价和预订全球范围内的无障碍酒店、游轮、交通和目的地。


    ## 4.8 情境感知系统（CAS）


    在其关于态势感知理论模型的描述中，`Endsley`将态势感知定义为：在一定时空范围内对环境元素的感知、对其含义的理解，以及对它们近期状态的预测（`Endsley`，1995）。感知提供了对多种情境元素（对象、事件、人员、系统、环境因素）及其当前状态（位置、条件、模式、动作）的认识。理解则产生对感知元素整体含义的把握——它们如何作为一个整体相互关联、当前属于何种情境，以及这对个人任务目标意味着什么。预测则产生对情境可能演变趋势的认识，以及其可能或大概率出现的未来状态和事件。


    为了获得完整的态势感知，智能出行平台/系统会从硬/软传感器收集静态和动态的上下文信息，以识别情境实体及其关系。随后，系统会对对象-事件进行关联分析，接着进行意图估计和后果预测。系统可以根据由上下文信息表征的情境/环境变化来执行自适应动作。


    上下文信息用于回答与情境相关的问题，例如谁、什么、何时、何地，从而根据位置、身份、活动、时间和状态来表征工作环境以及系统中的主体（出行平台，如联网车辆、联网自行车或联网穿梭巴士/公共交通；以及人类主体，如驾驶员、乘客和联网行人）。上下文可分为显式上下文和隐式上下文。显式上下文包含可直接观察到的上下文参数。显式上下文信息的示例包括但不限于：行人状态、车辆位置、交通灯状态、电动汽车电池状态、共享车辆的乘客请求、行程详情以及通信通道的服务质量（QoS），如带宽、吞吐量、丢包率、延迟和抖动。隐式上下文包含需要直接推断的参数。用户体验质量（`QoE`或`QoX`）（`Möller`和`Raake`，2014）是隐式上下文信息的一个示例。`Wu`等人将`QoE`定义为“用户感知和行为的多元结构，代表了用户在使用系统时的情感、认知和行为反应，包括主观和客观两方面”（`Wu`等人，2011）。它是“用户对应用程序或服务感到愉悦或烦恼的程度，取决于其期望在效用和/或享受方面得到满足的情况，并考虑用户的个性和当前状态”（`Brunnström`等人，2013）。这种感知过程取决于三个影响因素，即：所使用的车辆及其特定特征和条件、车辆使用的上下文环境，以及用户的主观（或人类）个性和精神状态。要获取这种隐式上下文信息，需要推断驾驶员的个性/偏好及其当前的身体、情感或认知状态。


    考虑上下文信息有助于设想新的服务，例如基于位置的信息出行/地理营销，或作为忠诚度计划的一部分触发促销，或提供其他车辆云服务。这种上下文信息还有助于根据带宽或其他QoS参数的可用性来调整连接方式。这种自适应调整的示例可能包括：在失去与基础设施的通信时，或者当要到达的基础设施超出出行平台通信范围时，建立临时的车对车（V2V）通信中继。'
  raw: 'Exoskeletons are the new wheelchairs that can reproduce the movements of walking
    as a way to compensate for the loss of mobility among the elderly and people with
    mobility impairment. ReWalk is a well-known wearable robotic exoskeleton that
    provides powered hip and knee motion to enable individuals with spinal cord injury
    (SCI) to stand upright, walk, turn, and climb and descend stairs. The ReStore
    exosuit is a lightweight soft exosuit that provides assistive torques to the wearer
    at the ankle and hip during walking. AI-based self-controlled legs were developed
    at the University of Waterloo to support the movements of the elderly and those
    with physical disabilities (Laschowski et al., 2020). Jaguar Land Rover unveils
    the shape-shifting “seat of the future” that tackles the health risks of sitting
    down for too long by making your brain think that you are walking. This seat continually
    adjusts via a series of actuators in the foam to simulate the rhythm of walking.
    A new mobility aid named Path Finder helps people who have trouble walking—simply
    by being fitted to their shoes (Rutkin, 2014). These shoes are designed specifically
    for Parkinson’s patients who suffer from freezing of gait—a disabling clinical
    phenomenon that prevents people from walking or causes them to walk with extremely
    short steps. The laser projects parallel lines onto the next 50 centimeters of
    the floor in front of the patient, and pressure sensors trigger vibrations when
    a foot hits the ground. These smart shoes can help elderly, ill, and disabled
    people walk without fear of falling over. GPS tracking shoe insoles are used to
    monitor the location and track people with Alzheimer’s or dementia. SensFloor
    is a large-area capacitive sensor floor, installable beneath any kind of flooring
    to increase the opportunity for smart personal engagement and monitoring. Smart
    paint crosswalks and smart cane technologies also help the visually impaired safely
    navigate crosswalks. The paint developed by the Ohio State University uses rare-earth
    nanocrystals that can emit a unique light signature, which a sensor added to the
    tip of a smart cane that can activate and then read. Established by Mobileye co-founders,
    OrCam provides wearable devices such as OrCam MyEye that allows visually impaired
    people to understand text and identify objects through audio feedback, describing
    what they are unable to see. Last but not least, several software services and
    apps are nowadays available to support inclusive mobility such as accessibleGO,
    Wheelmap, AbleThrive, GoGo Grandparent, Be My Eyes, and BlindSquare. For example,
    accessibleGO is a full-service accessible travel platform providing search, reviews,
    and bookings of accessible hotels, cruises, transport, and destinations worldwide.


    ## 4.8 Context Awareness Systems (CAS)


    In her description of a theoretical model of situation awareness, Endsley defined
    situation awareness as the perception of elements in the environment within a
    volume of time and space, the comprehension of their meaning, and the projection
    of their status in the near future (Endsley, 1995). Perception provides an awareness
    of multiple situational elements (objects, events, people, systems, environmental
    factors) and their current states (locations, conditions, modes, actions). Comprehension
    produces an understanding of the overall meaning of the perceived elements—how
    they fit together as a whole, what kind of situation it is, and what it means
    in terms of one’s mission goals. Projection produces an awareness of the likely
    evolution of the situation and its possible/probable future states and events.
    To achieve a complete situation awareness, the smart mobility platform/system
    collects static and dynamic contextual information from hard/soft sensors in order
    to identify situation entities and their relationships. The system subsequently
    performs a relational analysis of objects-events followed by intent estimation
    and consequence prediction. Adaptation actions can be performed in response to
    changes in the situation/environment characterized by contextual information.


    Contextual information answers situation-related questions such as who, what,
    when, and where in order to characterize the working environment and the system’s
    agents (mobility platforms such as connected vehicles, connected bikes, or connected
    shuttle buses/transit and human agents such as drivers, passengers, and connected
    pedestrians) in terms of location, identity, activity, time, and status. Contexts
    can be classified into explicit context and implicit context. Explicit context
    contains the context parameters that are directly observable. Examples of explicit
    contextual information include, but are not limited to, pedestrian status, car
    location, traffic light status, battery status of an electric vehicle, passenger
    requests of a shared vehicle, trip details, and communication channel quality
    of service (QoS) such as bandwidth, throughput, packet loss, latency, and jitter.
    Implicit context includes parameters that need to be inferred directly. Quality
    of experience (QoE or QoX) (Möller and Raake, 2014) is an example of an implicit
    contextual information. Wu et al. defined QoE as “a multi-dimensional construct
    of perceptions and behaviors of a user, which represents her or his emotional,
    cognitive and behavioral responses, both subjective and objective, while using
    a system” (Wu et al., 2011). It is “the degree of delight or annoyance of the
    user of an application or service resulting from the fulfillment of his or her
    expectations with respect to the utility and/or enjoyment of the application or
    service in the light of the user’s personality and current state” (Brunnström
    et al., 2013). This perception process is dependent on a triad of influential
    factors, namely, the vehicle being used and its specific features and conditions,
    the context in which it is being used, and the subjective (or human) personality
    and mental state of the user. Both driver’s personality/preferences and their
    current physical, emotional, or cognitive state need to be inferred to get this
    implicit contextual information.


    Taking contextual information into consideration can help in envisioning new services
    like info mobility/geo-marketing or triggering promotion as part of loyalty programs
    based on the location or offering other vehicular cloud services. This contextual
    information can also help in adapting the connectivity aspects based on the availability
    of bandwidth or other QoS parameters. Example of this adaptation may include establishing
    ad hoc V2V communication relay in case of losing the communication with the infrastructure
    or if the infrastructure we want to reach is outside the communication range of
    the mobility platform.'
  trans: '

    外骨骼是一种新型的轮椅，能够模拟行走的运动，以弥补老年人和行动障碍者行动能力的缺失。`ReWalk` 是一种知名的可穿戴机器人外骨骼，能为脊髓损伤（SCI）患者提供髋部和膝部的动力运动，帮助他们直立、行走、转弯以及上下楼梯。`ReStore`
    外装是一种轻量级的软体外装，在行走时为穿戴者的踝部和髋部提供辅助扭矩。滑铁卢大学开发了基于人工智能的自控假腿，以支持老年人和身体残障者的行动（`Laschowski`
    等人，2020）。捷豹路虎发布了可改变形状的“未来座椅”，通过让大脑以为你在走路来应对久坐的健康风险。该座椅通过泡沫中的一系列执行器持续调节，模拟行走的节奏。一种名为
    `Path Finder` 的新型助行器只需安装在用户的鞋子上，就能帮助行走困难者（`Rutkin`，2014）。这些鞋子专为患有“冻结步态”的帕金森病患者设计。“冻结步态”是一种致残的临床症状，会阻止患者行走或导致其步幅极短。鞋子上的激光会在患者前方
    50 厘米的地板上投射出平行线，而压力传感器则在脚着地时触发振动。这些智能鞋可以帮助老年人、病人和残疾人安心行走，无需担心摔倒。GPS 追踪鞋垫用于监测阿尔茨海默病或痴呆症患者的位置和行踪。`SensFloor`
    是一种大面积电容式传感器地板，可安装在任何地板下，以增加智能个人互动和监控的机会。智能斑马线油漆和智能手杖技术也能帮助视障者安全地通过人行横道。俄亥俄州立大学开发的这种油漆使用了稀土纳米晶体，能发出独特的光信号，而安装在智能手杖尖端的传感器可以激活并读取该信号。由
    `Mobileye` 联合创始人创立的 `OrCam` 提供了诸如 `OrCam MyEye` 之类的可穿戴设备，使视障者能够通过音频反馈理解文字和识别物体，描述他们无法看到的事物。最后，如今已有多种软件服务和应用可用于支持包容性出行，例如
    `accessibleGO`、`Wheelmap`、`AbleThrive`、`GoGo Grandparent`、`Be My Eyes` 和 `BlindSquare`。例如，`accessibleGO`
    是一个提供全方位服务的无障碍出行平台，可搜索、评价和预订全球范围内的无障碍酒店、游轮、交通和目的地。


    ## 4.8 情境感知系统（CAS）


    在其关于态势感知理论模型的描述中，`Endsley` 将态势感知定义为：在一定时空范围内对环境元素的感知、对其含义的理解，以及对它们近期状态的预测（`Endsley`，1995）。感知提供了对多种情境元素（对象、事件、人员、系统、环境因素）及其当前状态（位置、条件、模式、动作）的认识。理解则产生对感知元素整体含义的把握——它们如何作为一个整体相互关联、当前属于何种情境，以及这对个人任务目标意味着什么。预测则产生对情境可能演变趋势的认识，以及其可能或大概率出现的未来状态和事件。


    为了获得完整的态势感知，智能出行平台/系统会从硬/软传感器收集静态和动态的上下文信息，以识别情境实体及其关系。随后，系统会对对象-事件进行关联分析，接着进行意图估计和后果预测。系统可以根据由上下文信息表征的情境/环境变化来执行自适应动作。


    上下文信息用于回答与情境相关的问题，例如谁、什么、何时、何地，从而根据位置、身份、活动、时间和状态来表征工作环境以及系统中的主体（出行平台，如联网车辆、联网自行车或联网穿梭巴士/公共交通；以及人类主体，如驾驶员、乘客和联网行人）。上下文可分为显式上下文和隐式上下文。显式上下文包含可直接观察到的上下文参数。显式上下文信息的示例包括但不限于：行人状态、车辆位置、交通灯状态、电动汽车电池状态、共享车辆的乘客请求、行程详情以及通信通道的服务质量（QoS），如带宽、吞吐量、丢包率、延迟和抖动。隐式上下文包含需要直接推断的参数。用户体验质量（`QoE`
    或 `QoX`）（`Möller` 和 `Raake`，2014）是隐式上下文信息的一个示例。`Wu` 等人将 `QoE` 定义为“用户感知和行为的多元结构，代表了用户在使用系统时的情感、认知和行为反应，包括主观和客观两方面”（`Wu`
    等人，2011）。它是“用户对应用程序或服务感到愉悦或烦恼的程度，取决于其期望在效用和/或享受方面得到满足的情况，并考虑用户的个性和当前状态”（`Brunnström`
    等人，2013）。这种感知过程取决于三个影响因素，即：所使用的车辆及其特定特征和条件、车辆使用的上下文环境，以及用户的主观（或人类）个性和精神状态。要获取这种隐式上下文信息，需要推断驾驶员的个性/偏好及其当前的身体、情感或认知状态。


    考虑上下文信息有助于设想新的服务，例如基于位置的信息出行/地理营销，或作为忠诚度计划的一部分触发促销，或提供其他车辆云服务。这种上下文信息还有助于根据带宽或其他
    QoS 参数的可用性来调整连接方式。这种自适应调整的示例可能包括：在失去与基础设施的通信时，或者当要到达的基础设施超出出行平台通信范围时，建立临时的车对车（V2V）通信中继。

