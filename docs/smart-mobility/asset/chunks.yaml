- fmt: 'Personal navigation systems (PNSs) (Adam et al., 2020) are an example of a
    context navigation system that exists in mobile phones and several navigation
    or SatNavs apps (e.g., `Google Maps`, `Apple Maps`, `CoPilot Premium HD Europe`,
    `TomTom GO mobile app`, and `Waze`) and vehicle/bike sharing apps such as `BikeHub`.
    Wayfinding vision integrates personal navigation systems and context awareness.
    It incorporates the user’s personal preset preferences, the user’s activity, the
    local environmental conditions (i.e., how busy an airport is or how busy a motorway
    is), and the context detection algorithm for GPS-based location information and
    visual odometry and/or odometry (Symonds et al., 2017). Wayfinding can be considered
    as a CAS that provides guidance to a user’s specific check-in area and departure
    gate; automated alerts for those in the same travel space who match your criteria
    (i.e., friends, specific business-type users); navigation and directional guidance;
    automated arrival information and local guidance, that is, for transportation
    options and heartbeat checks; and automated music according to a user’s mood.
    Several context-aware mobility projects involve the integration of location information
    into wireless applications. For example, `General Motors OnStar` connects with
    customers on and off the road and provides them with easy-access offers through
    its `Marketplace` service. `GM Marketplace` offers users the ability to receive
    special promotions along with local recommendations and directions, and options
    to order from local stores and pay remotely via in-vehicle touchscreen and mobile
    apps. In collaboration with `Salesforce`, `General Motors OnStar` piloted a project
    to provide drivers/passengers shopping, fuel, or dining offers and deals based
    on their locations. Merchants have the power to put offers directly into `Salesforce`
    and get analytics to see campaign results. Another example of a context-aware
    service is `Traffic Jam Whopper` piloted by `Burger King` in Mexico City. The
    `Traffic Jam Whopper` project uses real-time data to target hungry drivers along
    congested roads and highways for food delivery by couriers on motorcycles.


    ## 4.9 Summary


    This chapter gave examples of smart mobility technology enablers built based on
    the foundational technologies explained in the previous chapter. For example,
    road telematics and connected mobility leverage the wireless communication infrastructure,
    mobile computing services, blockchain, and IoT services to create data-rich environments
    able to accommodate different smart mobility services. The same applies to automated
    mobility that is evolving, thanks to the advances in foundational technologies
    such as AI and robotics. The shift toward electrification provided the foundation
    for e-mobility and micromobility services as a way to achieve decarbonized mobility
    with net zero emissions. Active, soft, or zero-impact mobility is also gaining
    momentum as an enabler for sustainable mobility. Inclusive mobility is an enabler
    to improve the mobility and living conditions of frail seniors and physically
    challenged individuals. Context awareness endows the mobility systems with the
    ability to adapt according to different contextual information. Adaptation implies
    the ability to deal with perplexing situations and to respond quickly and successfully
    to new situations. Contextual adaption is a highly desirable feature in future
    mobility systems. Adaptation is also a main sign of intelligence according to
    the Triarchic Theory of Intelligence and the English theoretical physicist and
    cosmologist Stephen Hawking (1942–2018) who saw intelligence as the ability to
    adapt to change. In the next chapter, we describe in detail a number of smart
    mobility disruptors developed, thanks to the availability of the technology enablers
    discussed in this chapter.


