- fmt: '# 1.3 Smart Mobility as a Key Enabler to Sustainable Development


    In recent years, smart mobility systems and services have received an increasing
    amount of attention from major automakers, suppliers, academia, and governmental
    institutions due to their foreseen advantages in dealing with the negative implications
    of the conventional automotive technology in the current car-centric world such
    as safety problems, congestion problems, and environmental problems. General Motors
    (GM) is leading the way toward a future with zero crashes, zero emissions, and
    zero congestion (General Motors, 2018). The main objectives of this vision are
    summarized as follows:


    - **Zero Crashes to Save Lives:** Advanced driver assistance systems (`ADAS`)
    and automated driving vehicles will reduce injuries and fatalities and improve
    access to mobility for those who currently cannot drive due to age, disability,
    or otherwise.

    - **Zero Emissions to Leave Our Children a Healthier Planet:** Conventional internal
    combustion engine (`ICE`) vehicles release almost 2 billion tons of carbon dioxide
    into the atmosphere every year. Electric vehicles (`EVs`) will eliminate the emission
    contributing to a better environment. In early 2021, GM announced a plan to become
    carbon neutral in its global products and operations by 2040. As part of this
    plan, the company will offer 30 new electric vehicles globally by 2025.

    - **Zero Congestion to Give the Customers Back Their Precious Time:** In the United
    States, commuters spend about a week of their lives in traffic each year. That’s
    a week not spent with those we love, doing what we want to do, and being where
    we want to be. Shared mobility will create better use of time and space to reduce
    the congestion.


    Aligned with 17 Sustainable Development Goals (`SDGs`) adopted by UN Member States,
    smart mobility can play an instrumental role in achieving many of these goals.
    The Sustainable Mobility for All (`SuM4All`^([¹](#fn1))) initiative is a global
    partnership that aims to achieve sustainable mobility and help implement the `SDGs`.
    In order to transform the transport sector, `SuM4All` developed a Global Tracking
    Framework (`GTF`) for transport, complementing the targets and indicators in the
    `SDGs`. This global framework is featured in the Global Mobility Report (`SuM4All`,
    2017), which provides the first-ever assessment of all modes of transport across
    the globe. `GTF` provides crucial information and tools to inform transport policy
    and investment decisions and provides a baseline for measuring progress toward
    sustainable mobility. According to the Global Mobility Report published by `SuM4All`,
    `SDGs` 3 and 11 are two main goals directly related to mobility. `SDG` 3 focuses
    on “Good Health and Well-Being” with target 3.6 about reducing global deaths and
    injuries from traffic accidents. This `SDG` target 3.6 identifies a quantitative
    target for road safety: by 2020, halve the number of global deaths and injuries
    from road traffic accidents. `SDG` 11 is about “Sustainable Cities and Communities”
    with target 11.2 that emphasizes on providing access to safe, affordable, accessible,
    and sustainable transport systems for all. The report illustrates how sustainable
    transport systems are necessary to provide food security (`SDG` 2: Zero Hunger),
    healthcare (`SDG` 3: Good Health and Well-Being), access to schools (`SDG` 4:
    Quality Education), and employment for women (`SDG` 5: Gender Equality).


    Several indices are proposed to help city leaders in assessing and improving the
    quality of mobility systems. For example, the HERE Technologies Urban Mobility
    Index^([²](#fn2)) is a comprehensive index that addresses how cities around the
    world are dealing with the challenges of mobility across four major themes, namely,
    sustainability, connectivity, affordability, and innovation. Sustainability reflects
    low-carbon mobility as a way to improve health and quality of life. Connectivity
    measures the availability of information and communication infrastructure such
    as intelligent transport systems to better manage the traffic and improve the
    public transport efficiency. Affordable mobility changes how a city moves, enabling
    the flow of people, boosting economic potential, and enhancing social well-being.
    Innovation reflects how cities respond to changing mobility demands with innovative
    solutions. The Deloitte City Mobility Index (`DCMI`)^([³](#fn3)) is another index
    to gauge the health of the mobility system and the city readiness to embrace the
    future. Three major themes are assessed in this index, namely, performance and
    resilience (congestion, reliability, safety, integrated mobility, and modal diversity),
    vision and leadership (vision and strategy, investment, innovation, regulatory
    environment, environmental sustainability initiatives), and service and inclusion
    (public transport density, affordability, air quality, customer satisfaction,
    and accessibility). Similarly, the Urban Mobility Innovation Index (`UMii`)^([⁴](#fn4))
    provides insights into urban mobility and innovation in cities based on evaluating
    three main aspects: readiness (strategy, capability, and soundness), deployment
    (regulation, investment, and engagement), and livability (connectivity, well-being,
    and environment). Arthur D. Little’s Urban Mobility Index 3.0 is another index
    that assesses the mobility maturity, innovativeness, and performance in different
    cities using 27 indicators (Van Audenhove et al., 2018).


    ## 1.4 Summary


    Smart mobility is one of the main pillars that characterizes smart cities and
    maintains their sustainability as a way to deal with continuously growing world
    urbanization and its expected impacts on public health, congestion, and accelerated
    global climate change. Mobility is now being seen as an information service with
    physical transportation products, rather than a transportation product with additional
    services (Ho and Bright, 2018). This is manifested in different smart mobility
    services we are using nowadays such as shared mobility services, Mobility-as-a-Service
    (`MaaS`), mobility on demand, and last-mile delivery services to name just a few.
    However, the widespread deployment and the societal acceptance of smart mobility
    systems and their sustainability depend on the advances in not only the technology
    domain but also the availability of governing policies, regulations, and laws
    and the proper planning/replanning of the cities to match with the requirements
    of these emerging and continuously evolving mobility systems and services. More
    details about smart mobility are provided in the next chapters.


    Footnotes [1](#511013_1_En_1_Chapter.xhtml#Fn1_source) [2](#511013_1_En_1_Chapter.xhtml#Fn2_source)
    [3](#511013_1_En_1_Chapter.xhtml#Fn3_source) [4](#511013_1_En_1_Chapter.xhtml#Fn4_source)'
