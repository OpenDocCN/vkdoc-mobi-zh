- fmt: '*   **Ridesplitting Service**：由优步（Uber）和来福车（Lyft）等运输网络公司（TNCs）在主要城市提供（`UberPool`和`Lyft
    Line`），是网约车（ridesourcing）与微公共交通（microtransit）模式的紧密结合体。司机使用个人车辆，专业驾驶而非通勤途中搭载，能够在根据新行程请求动态更新的路线上，同时容纳多名独立乘客（区别于面向单一付费乘客的网约车`ridehailing`）（Kimley-Horn
    等，2019）。与微公共交通相比，拼车（ridesplitting）通常使用容量更低的车辆（少于六名乘客）；与网约车/网约出租车（ridehailing/ridesourcing）相比，拼车中，顾客更有可能同时独立预订行程，且其起止点能够通过同一整体行程方便地服务。


    美国交通部联邦公路管理局在（Shaheen 等，2016）中提供了另一种分类。他们将共享出行分为五类，即：基于会员制的自助服务模式（例如，共享单车、共享汽车、拼车、面包车合乘和按需共享出行），点对点（P2P）自助服务模式（例如，共享单车和共享汽车），非会员制自助服务模式（共享单车、汽车租赁和临时拼车），雇佣服务模式（例如，快递服务网络的CBS、豪华轿车/礼宾车、网约车或TNCs以及出租车或电子叫车）和大运量公交系统（例如，公共交通、微交通和替代交通服务，包括微公共交通、辅助公交和班车服务）。


    共享出行的关键优势在于其能够填补传统公共交通缺失、不足或低效的空白（Kimley-Horn 等，2019），尤其是在快速公交与居民比率（RTR）较低的国家。`RTR`衡量的是每个国家的每百万城市居民拥有多少公里的大运量公交。


    美国的`RTR`为8.9，而法国的`RTR`为30.2（Hook 和 Hughes，2017）。共享出行也是实现公平交通的推动力。公平的交通系统满足了先前服务不足人群的需求，使这些群体能够便捷且负担得起地获取目的地和机会。


    公平交通还意味着系统效益（和外部性）得到公平分配（Yanocha 和 Allan，2019）。


    新冠疫情严重影响了共享出行服务，因为它加剧了人们对可能感染的担忧。新冠疫情对共享出行的影响将在下一章讨论。


    ## 5.4 出行即服务（MaaS）


    从核心上讲，服务化（servitization）是指各行业利用其“产品”来销售“作为服务的结果”，而非一次性销售（Vandermerwe 和 Rada，1988）。这意味着产品被用作交付和销售服务的平台。在出行领域，服务化使得将出行作为服务交付成为可能，而非客户购买车辆。出行即服务（MaaS）在
    Goodall 等人（2017）中被描述为应用于城市交通的网飞（Netflix）商业模式。


    当前汽车、自行车、火车和公交之间的严格划分构成了无缝出行的障碍。`MaaS`是出行系统的新自由主义化，使得无缝出行成为可能。`MaaS America`将`MaaS`定义为“通过一个集成的数字平台，跨越所有可用的交通方式，提供无缝、无限可适应的个性化出行服务”。^([^(40)](#fn40))


    `MaaS`涉及集成无缝支付和相关基础设施元素（例如，停车和车辆充电），以利用创意定价和出行套餐为客户提供有吸引力的价值主张（Kimley-Horn 等，2019）。通过`MaaS`，可以实现不同出行服务之间的无缝集成，出行平台将更加以客户为中心，路线规划将更加简便，并为用户启用简化的支付方式。`MaaS`使这些个人能够购买由他人（通常是政府、出行提供商和其他个人）拥有的、可互操作的出行服务套餐（汽车、出租车、公交、铁路、共享单车等）的访问权。这由集成的聚合与支付平台促进，并通过大数据的密集处理来实时匹配供给与需求（Thakuriah
    等，2017）。表[5-3](#511013_1_En_5_Chapter.xhtml#Tab3)显示了由`MaaS America`定义的七个`MaaS`层级。


    **表 5-3** 根据 `MaaS America` 划分的 `MaaS` 层级


    | MaaS 层级 | 描述 | 服务 |

    | --- | --- | --- |

    | 0 | 具有数字化界面的个体交通方式 | 基于账户的系统及在线可用信息 |

    | 1 | 部分私营服务之间的一对一集成 | 联合产品（例如，收费 + 停车场，汽车 + 渡轮，以及停车换乘 + 公交服务） |

    | 2 | 在有限的公共和私营交通服务中集成支付与票务 | 私营运营商与公共交通运营模式之间的集成 |

    | 3 | 在多种交通服务中使用单一账户的统一界面 | 通过一个出行者账户实现单一元运营商（私营和公共） |

    | 4 | 所有模式均已集成，包括私营和公共，含路线规划、票务和支付 | 开放数据和标准被所有交通提供商和 MaaS 元运营商定义并普遍使用，以向出行者提供服务
    |

    | 5 | 基于出行偏好和近实时数据主动进行人工智能（AI）选择，以实现行程的临时更改 | 基于出行者特定行为和画像；对于基于出行者偏好、过往出行历史和过滤条件的端到端行程，出行者仅需极少（甚至无需）干预
    |

    | 6 | MaaS 连接超越出行范畴，与物联网（IoT）、智慧建筑和智慧城市对接 | 与出行者生态系统实现便捷无缝的接口 |'
  raw: '*   **Ridesplitting Service** : Offered by TNCs such as Uber and Lyft in major
    cities (UberPool and Lyft Line), is a close counterpart of both the ridesourcing
    and microtransit models as the drivers utilize their personal vehicles, drive
    professionally rather than as part of their own commute, and can accommodate multiple
    independent passengers simultaneously (as distinct from ridehailing that is oriented
    to an individual paying passenger) on routes that dynamically update in response
    to new trip requests (Kimley-Horn et al., 2019). Compared to microtransit, ridesplitting
    commonly uses lower-capacity vehicles (less than six passengers); and compared
    to ridehailing/ridesourcing, in ridesplitting, there is a higher likelihood of
    customers independently booking trips simultaneously, with start and end points
    that can be conveniently served using the same overall trip.


    Another classification is provided by the Federal Highway Administration of the
    US Department of Transportation in (Shaheen et al., 2016). They categorize shared
    mobility into five groupings, namely, membership-based self-service models (e.g.,
    bike sharing, car sharing, carpooling, vanpooling, and on-demand ridesharing),
    P2P self-service models (e.g., bike sharing and car sharing), non-membership self-service
    models (bike sharing, car rental, and casual carpooling), for-hire service models
    (e.g., courier network services of CBS, liveries/limousines, ridesourcing, or
    TNCs and taxis or e-hail), and mass transit systems (e.g., public transportation,
    micro- and alternative transit services including microtransit, paratransit, and
    shuttles).


    A key advantage of shared mobility is its ability to fill gaps where traditional
    public transport is absent, inadequate, or ineffective (Kimley-Horn et al., 2019)
    especially in the countries with low Rapid Transit to Resident Ratio (RTR). RTR
    measures how many kilometers of mass transit exist in a country per million urban
    residents.


    The United States has a RTR of 8.9, while France has a RTR of 30.2 (Hook and Hughes,
    2017). Shared mobility is also an enabler for equitable transportation. Equitable
    transportation systems address the needs of previously underserved populations,
    enabling these groups to conveniently and affordably access destinations and opportunities.


    Equitable transportation also means that system benefits (and externalities) are
    distributed equitably (Yanocha and Allan, 2019).


    The COVID-19 pandemic has severely impacted shared mobility services as it raised
    people’s concerns about possible infection. The impacts of COVID-19 on shared
    mobility are discussed in the next chapter.


    ## 5.4 Mobility-as-a-Service (MaaS)


    At its core, servitization refers to industries using their “products” to sell
    “outcomes as a service” rather than a one-off sale (Vandermerwe and Rada, 1988).
    This means that the product is used as a platform to deliver and sell services.
    In the mobility domain, servitization enables delivering mobility as a service,
    rather than customers buying vehicles. Mobility-as-a-Service (MaaS) is described
    in Goodall et al. (2017) as Netflix’s business model applied to urban transportation.


    The current sharp separation between car, bike, train, and bus constitutes an
    obstacle to a seamless mobility. MaaS is the neo-liberalization of mobility systems
    that enables seamless mobility. MaaS America defines MaaS as “the delivery, through
    an integrated digital platform and across all available modes of transport, of
    seamless, infinitely adaptable, personal mobility services.”^([^(40)](#fn40))


    MaaS involves integrating seamless payment and relevant infrastructure elements
    (e.g., parking and vehicle charging) to provide an attractive value proposition
    to customers using creative pricing and mobility packages (Kimley-Horn et al.,
    2019). Through MaaS, seamless integration between different mobility services
    can be achieved, mobility platforms will be more customer-focused, route planning
    will be easier, and simplified payment methods for users will be enabled. MaaS
    gives these individuals the ability to purchase access rights to an interoperable
    package of mobility services (car, taxi, bus, rail, bike share, etc.) owned by
    others, usually governments, mobility providers, and other individuals. This is
    facilitated by integrated aggregation and payment platforms, with intensive processing
    of big data to match provision to demand in real time (Thakuriah et al., 2017).
    Table [5-3](#511013_1_En_5_Chapter.xhtml#Tab3) shows the seven levels of MaaS
    defined by MaaS America.


    Table 5-3


    MaaS Levels as per MaaS America


    | MaaS Level | Description | Services |

    | --- | --- | --- |

    | 0 | Individual modes of transportation with digitized interface | Account-based
    systems and information available online |

    | 1 | One-to-one integration between some private services | Joint offerings (e.g.,
    tolling + car park, car + ferry, and car park and ride + bus services) |

    | 2 | Integrated payment and ticketing across limited public and private modes
    of transportation services | Integration between private operators and public
    transport modes of operation |

    | 3 | Unified interface for a single account used in multiple modes of transport
    services | A single meta-operator (private and public) through a traveler account
    |

    | 4 | All modes are integrated, private and public, including routing, ticketing,
    and payment | Open data and standards are defined and commonly used by all transportation
    providers and MaaS meta-operators to provide services to travelers |

    | 5 | Active AI choices based on travel preferences and near-real-time data for
    ad hoc changes to a journey | Based on traveler-specific behavior and profiling;
    minimal (to no) intervention is needed by the traveler for an end-to-end journey
    based on the traveler’s preferences, past travel history, and filters |

    | 6 | MaaS connects beyond mobility, interfacing with IoT, smart building, and
    smart cities | Convenient and seamless interface with the traveler’s ecosystem
    |'
