    \n本 Apress 印记由隶属于施普林格自然集团的注册公司 APress Media, LLC 出版。注册公司地址为：美国纽约州纽约市新广场 1 号，邮编\
    \ 10004。\n\n*献给我美丽的妻子 Nermein 和我可爱的孩子 Renad 与 Kareem。你们是我生命中的欢乐。*\n\n# 前言\n\n\
    如今，我们正目睹出行系统和服务领域的若干范式转变。城市正在推动交通领域脱碳，并从以汽车为中心的出行转向多模式出行，从二维街道的受限出行转向三维空间出行，从固定时刻表的出行转向按需出行，以及从分散孤立的出行转向无缝集成的出行。出行公司正在从制造业和贸易经济转向服务经济或服务化，例如出行即服务（`MaaS`），这代表了人员和货物运输的新自由主义化，同时从不可持续的“售车数量”收入模式转向“车辆行驶里程（`VMT`）基础”、基于信息经济学的数据与客户体验货币化以及基于乘客经济的收入模式。物流服务提供商正从传统缓慢、僵化、不透明的末端配送转向快速、灵活、透明的末端配送服务。人们正从拥有权转向使用权，从被动出行转向主动、零影响出行。这些范式转变的背后是各种基础技术、技术赋能因素和出行颠覆性技术。\n\
    \n本书全面概述了智慧出行系统和服务，并阐述了其基础技术、技术赋能因素和颠覆性技术。本书重点介绍了这些技术的市场规模、潜在增长及其生态社会经济影响。此外，还讨论了新冠疫情对消费者行为与偏好的影响，以及出行系统各个方面（尤其是微出行、共享出行、公共交通和非接触式末端配送服务）预期的短期颠覆和长期结构性变化。\n\
    \n本书主题的展开遵循一个逻辑流程，从基础技术到技术赋能因素，再到智慧出行颠覆性技术。以下是按章节顺序对本书内容的简要说明：\n\n- 第 1 章概述了以人为本的智慧城市。\n\
    - 第 2 章介绍了智慧出行三要素，即技术、治理和城市规划这三个互补因素。这三个组成部分并非相互独立，而是相互影响。\n- 第 3 章介绍了定位、导航与授时（`PNT`）、地理信息系统（`GIS`）、无线通信、移动云计算（`MCC`）、区块链、物联网（`IoT`）、人工智能（`AI`）、机器人技术和电气化作为智慧出行系统和服务的基础技术。\n\
    - 第 4 章讨论了智慧出行的若干技术赋能因素，如智能基础设施、网联出行、自动驾驶出行、电动出行、微出行、主动/慢行出行、包容性出行和情境感知系统（`CAS`）。\n\
    - 第 5 章重点阐述了潜在的智慧出行颠覆性技术，如颠覆性出行平台（自动驾驶地面车辆、城市空中交通（`UAM`）、水上出租车、自动旅客捷运系统（`APMs`）、超级高铁和城市高铁）、共享出行、出行即服务（`MaaS`）、按需出行（`MOD`）、无缝集成出行系统（`SIMS`）、末端配送、车辆即服务（`VaaS`）、零工经济和乘客经济。\n\
    - 最后，第 6 章讨论了新冠疫情对智慧出行系统和服务的影响。\n\n我坚信，未来的出行是以人为本、软件定义、网联化和电动化的。尽管近年来发展迅速，但智慧出行仍处于起步阶段。日益需要利用上述各种基础技术、技术赋能因素和颠覆性技术，来改善客户与出行提供商之间的关系，实现不同出行服务之间可负担、包容且无缝的集成。围绕若干智慧出行技术的法律和监管环境需要充分考虑不同利益相关者的意见和关切而得到良好发展。此外，在城市规划方面应考虑渐进式和革命性的变革，以适应新兴的智慧出行服务。\n\
    \n本书面向在职专业人士、培训中心和学术机构。受众广泛，包括寻求对未来出行技术和服务拥有整体愿景和新思路的大学生、研究人员、出行工程师、技术专家和城市规划者。本书为读者提供了对当前和新兴智慧出行系统全面且易于理解的介绍，重点聚焦将塑造未来出行的基础技术、技术赋能因素和颠覆性技术。\n\
    \n虽然本书描述了许多未来的可能性，但一些令人惊喜的成就已经实现并公开使用。我们每天都在享受并依赖共享出行服务、网联出行、电动出行、主动出行、微出行以及当日达和即时达的末端配送服务。此外，在不远的将来，我们将把安全且有趣的自动驾驶车辆（`SDVs`）作为拥有以消费者为中心的产品和服务的第三生活空间来享受；我们将能够把自动驾驶车辆用作移动汽车旅馆、美容沙龙、移动商店和移动诊所；我们的在线订单将由送货机器人送到家门口；我们将安全便捷地乘坐零排放的超级高铁、自动驾驶空中出租车、空中地铁或自动驾驶船只出行；不同出行模式之间的无缝集成将成为常态；最终，可负担、包容和可持续的出行将得以实现。希望您享受这段通往人员和货物运输未来的激动人心之旅。\n\
    \n## 关于作者\n"
- fmt: '# 1. Toward a People-Centric Smart City


    Population shift from rural to urban areas driven by social and economic needs
    led to massive mobility challenges and several negative impacts in contemporary
    cities related to road safety, congestion, and emissions. Smart cities consider
    people and the environment as the central focus for a better quality of life,
    reasonable consumption of natural resources, and sustainable development and prosperity.
    In this chapter, implications of conventional car-centric cities and the need
    for people-centric smart cities are highlighted. Smart mobility is presented in
    this chapter as one of the main pillars of smart cities of the future.


    ## 1.1 World Urbanization Problems


    According to the latest World Urbanization Prospects report published by the United
    Nations in 2018, the number of people living in cities will increase from 3.6
    billion to 6.3 billion by 2050 (UN DESA, 2018). The global population will be
    two-thirds urban, and the world will be only one-third rural, roughly the reverse
    of the global rural-urban population distribution of the mid-twentieth century.
    According to a report from Navigant Research, currently there are about 1.2 billion
    vehicles on the road. The total number of cars worldwide could reach 2 billion
    by 2035, not including motorcycles. The negative implications of this conventional
    car-centric world include safety, congestion, and environmental impacts.


    Road traffic accidents are enormously costly in terms of human suffering, economic
    loss, and wildlife and environmental impact. According to World Health Organization
    (WHO), the number of deaths on the world’s roads remains unacceptably high with
    1.35 million people dying each year or 3,698 deaths a day, making road traffic
    accidents the eighth leading cause of death for people of all ages and the first
    cause of death for children and young adults (World Health Organization, 2018).
    The number of traffic fatalities is expected to rise to 2.2 million by 2030\.
    These traffic fatalities are the leading cause of death for 5–14-year-olds in
    high-income countries, representing 19% of all fatalities (Rothman et al., 2020).


    Global economy loses $1 trillion worth of productivity annually sitting in traffic
    (McKinsey Global Institute, 2013). The study conducted by the traffic data company
    [INRIX](https://inrix.com/scorecard/) has ranked Bogota as the most congested
    city in the world with an average of 191 hours driving time spent in congestion.
    The same study ranked Toronto as the most congested city in Canada and the 19th
    most traffic-congested city across the globe in 2019 with an average of 135 hours
    driving time spent in congestion. According to INRIX, Canadians are spending an
    average of 27 hours a year stuck in traffic. American commuters spend about a
    week of their lives in traffic each year. [Traffic](https://www.tomtom.com/en_gb/traffic-index/ranking/)
    [Index](https://www.tomtom.com/en_gb/traffic-index/ranking/) provides real-time
    ranking and analytics about 416 cities around the world.


    Conventional transport fuels are large emitters of pollutants, making transport
    a large contributor of global greenhouse gas (GHG) emissions. For example, according
    to the US Environmental Protection Agency (EPA), GHG emissions from transportation
    account for about 28% of the total US greenhouse gas emissions, making it the
    largest contributor of US GHG emissions. The current and expected growth in conventional
    transport fuel demand, particularly for diesel, will cause a tremendous public
    health burden and will accelerate global climate change (Hoornweg and Freire,
    2013). Conventional vehicles with an internal combustion engine (ICE or ICEV)
    are one of the main causes of greenhouse gas. Figure [1-1](#511013_1_En_1_Chapter.xhtml#Fig1)
    illustrates the carbon footprint and space required per mobility mode. Beside
    the high carbon footprint, conventional mobility modes take up way too much space
    in cities for paved roads and parking. Many downtowns devote 50–60% of their scarce
    real estate to vehicles (Plumer, 2016).


    ## 1.2 People-Centric Smart Cities


    The aforementioned challenges cannot be solved by simply building more roads for
    the vehicles. Braess’ paradox (Braess et al., 2005) shows the fact that adding
    one or more roads to a road network does not improve the traffic and sometimes
    worsens the traffic flow. Braess’ paradox is not exactly a paradox and represents
    a counterintuitive result in which, like the prisoner’s dilemma, collective good
    gets sacrificed because of self-interest. An interesting study conducted by the
    Transformative Urban Mobility Initiative (TUMI) concluded that a restructured
    multimodal mobility corridor can accommodate in total 74,000 people (2,000 in
    cars, 16,000 pedestrians, 44,000 in light rail, and 14,000 cyclists) compared
    to a traditional car-centric corridor that can carry only 24,000 people (8,000
    in cars and 16,000 pedestrians).


    ![../images/511013_1_En_1_Chapter/511013_1_En_1_Fig1_HTML.jpg](images/511013_1_En_1_Chapter/511013_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Carbon Footprint and Space Required per Occupant. Source: Courtesy of the Institute
    for Sensible Transport


    Note


    A highway 20 lanes wide would be required to carry in automobiles the number of
    people now being served by Toronto’s subway.


    This arises the need to develop and deploy sustainable mobility systems able to
    change the current conventional car-centric cities to people-centric smart cities.
    Sustainability is meeting the needs of the present without compromising the ability
    of future generations to meet their own needs (Brundtland et al., 1987). In recent
    years, the concept of “smart city” has received an increasing amount of attention
    from researchers, developers, and policy makers in academia, government laboratories,
    and industry.


    Important


    According to market forecasters and analysts like Grand View Research, the global
    smart cities’ market size is expected to reach $463.9 billion by 2027, registering
    a CAGR of 24.7% from 2020 to 2027.


    There have been many definitions of a smart city given over the years. Smartness
    in the context of smart cities includes monitoring, control, and optimization
    to bring in efficiency and bottom-line benefits as well as environmental improvements.
    A city can be defined as “smart” when social capital and modern information and
    communication infrastructure fuel sustainable economic development and a high
    quality of life (Caragliu et al., 2011). In other words, a smart city uses digital
    technologies or information and communication technologies to enhance quality
    and performance of urban services, to reduce costs and resource consumption, and
    to engage more effectively and actively with its citizens. MIT defines a smart
    city as “systems of systems with digital nervous systems, intelligent responsiveness,
    and optimization at every level of system integration.”


    According to a report by the World Bank, smart cities adopt technical and information
    platforms to better manage the use of their resources, improve management, monitor
    developments, develop new business models, and help citizens to make informed
    decisions about the use of resources (Hoornweg and Freire, 2013).'
  raw: '# 1. Toward a People-Centric Smart City


    Population shift from rural to urban areas driven by social and economic needs
    led to massive mobility challenges and several negative impacts in contemporary
    cities related to road safety, congestion, and emissions. Smart cities consider
    people and the environment as the central focus for a better quality of life,
    reasonable consumption of natural resources, and sustainable development and prosperity.
    In this chapter, implications of conventional car-centric cities and the need
    for people-centric smart cities are highlighted. Smart mobility is presented in
    this chapter as one of the main pillars of smart cities of the future.


    ## 1.1 World Urbanization Problems


    According to the latest World Urbanization Prospects report published by the United
    Nations in 2018, the number of people living in cities will increase from 3.6
    billion to 6.3 billion by 2050 (UN DESA, 2018). The global population will be
    two-thirds urban, and the world will be only one-third rural, roughly the reverse
    of the global rural-urban population distribution of the mid-twentieth century.
    According to a report from Navigant Research, currently there are about 1.2 billion
    vehicles on the road. The total number of cars worldwide could reach 2 billion
    by 2035, not including motorcycles. The negative implications of this conventional
    car-centric world include safety, congestion, and environmental impacts.


    Road traffic accidents are enormously costly in terms of human suffering, economic
    loss, and wildlife and environmental impact. According to World Health Organization
    (WHO), the number of deaths on the world’s roads remains unacceptably high with
    1.35 million people dying each year or 3,698 deaths a day, making road traffic
    accidents the eighth leading cause of death for people of all ages and the first
    cause of death for children and young adults (World Health Organization, 2018).
    The number of traffic fatalities is expected to rise to 2.2 million by 2030\.
    These traffic fatalities are the leading cause of death for 5–14-year-olds in
    high-income countries, representing 19% of all fatalities (Rothman et al., 2020).


    Global economy loses $1 trillion worth of productivity annually sitting in traffic
    (McKinsey Global Institute, 2013). The study conducted by the traffic data company
    [INRIX](https://inrix.com/scorecard/) has ranked Bogota as the most congested
    city in the world with an average of 191 hours driving time spent in congestion.
    The same study ranked Toronto as the most congested city in Canada and the 19th
    most traffic-congested city across the globe in 2019 with an average of 135 hours
    driving time spent in congestion. According to INRIX, Canadians are spending an
    average of 27 hours a year stuck in traffic. American commuters spend about a
    week of their lives in traffic each year. [Traffic](https://www.tomtom.com/en_gb/traffic-index/ranking/)
    [Index](https://www.tomtom.com/en_gb/traffic-index/ranking/) provides real-time
    ranking and analytics about 416 cities around the world.


    Conventional transport fuels are large emitters of pollutants, making transport
    a large contributor of global greenhouse gas (GHG) emissions. For example, according
    to the US Environmental Protection Agency (EPA), GHG emissions from transportation
    account for about 28% of the total US greenhouse gas emissions, making it the
    largest contributor of US GHG emissions. The current and expected growth in conventional
    transport fuel demand, particularly for diesel, will cause a tremendous public
    health burden and will accelerate global climate change (Hoornweg and Freire,
    2013). Conventional vehicles with an internal combustion engine (ICE or ICEV)
    are one of the main causes of greenhouse gas. Figure [1-1](#511013_1_En_1_Chapter.xhtml#Fig1)
    illustrates the carbon footprint and space required per mobility mode. Beside
    the high carbon footprint, conventional mobility modes take up way too much space
    in cities for paved roads and parking. Many downtowns devote 50–60% of their scarce
    real estate to vehicles (Plumer, 2016).


    ## 1.2 People-Centric Smart Cities


    The aforementioned challenges cannot be solved by simply building more roads for
    the vehicles. Braess’ paradox (Braess et al., 2005) shows the fact that adding
    one or more roads to a road network does not improve the traffic and sometimes
    worsens the traffic flow. Braess’ paradox is not exactly a paradox and represents
    a counterintuitive result in which, like the prisoner’s dilemma, collective good
    gets sacrificed because of self-interest. An interesting study conducted by the
    Transformative Urban Mobility Initiative (TUMI) concluded that a restructured
    multimodal mobility corridor can accommodate in total 74,000 people (2,000 in
    cars, 16,000 pedestrians, 44,000 in light rail, and 14,000 cyclists) compared
    to a traditional car-centric corridor that can carry only 24,000 people (8,000
    in cars and 16,000 pedestrians).


    ![../images/511013_1_En_1_Chapter/511013_1_En_1_Fig1_HTML.jpg](images/511013_1_En_1_Chapter/511013_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Carbon Footprint and Space Required per Occupant. Source: Courtesy of the Institute
    for Sensible Transport


    Note


    A highway 20 lanes wide would be required to carry in automobiles the number of
    people now being served by Toronto’s subway.


    This arises the need to develop and deploy sustainable mobility systems able to
    change the current conventional car-centric cities to people-centric smart cities.
    Sustainability is meeting the needs of the present without compromising the ability
    of future generations to meet their own needs (Brundtland et al., 1987). In recent
    years, the concept of “smart city” has received an increasing amount of attention
    from researchers, developers, and policy makers in academia, government laboratories,
    and industry.


    Important


    According to market forecasters and analysts like Grand View Research, the global
    smart cities’ market size is expected to reach $463.9 billion by 2027, registering
    a CAGR of 24.7% from 2020 to 2027.


    There have been many definitions of a smart city given over the years. Smartness
    in the context of smart cities includes monitoring, control, and optimization
    to bring in efficiency and bottom-line benefits as well as environmental improvements.
    A city can be defined as “smart” when social capital and modern information and
    communication infrastructure fuel sustainable economic development and a high
    quality of life (Caragliu et al., 2011). In other words, a smart city uses digital
    technologies or information and communication technologies to enhance quality
    and performance of urban services, to reduce costs and resource consumption, and
    to engage more effectively and actively with its citizens. MIT defines a smart
    city as “systems of systems with digital nervous systems, intelligent responsiveness,
    and optimization at every level of system integration.”


    According to a report by the World Bank, smart cities adopt technical and information
    platforms to better manage the use of their resources, improve management, monitor
    developments, develop new business models, and help citizens to make informed
    decisions about the use of resources (Hoornweg and Freire, 2013).'
  trans: '

    # 1. 迈向以人为本的智慧城市


    受社会和经济需求驱动，人口从农村向城市迁移，给当代城市带来了巨大的交通挑战，并在道路安全、拥堵和排放方面产生了一系列负面影响。智慧城市将人和环境作为核心关注点，旨在追求更高的生活质量、合理的自然资源消耗以及可持续的发展和繁荣。本章将重点阐述传统以汽车为中心的城市的弊端，以及转向以人为本的智慧城市的必要性。智慧出行作为未来智慧城市的主要支柱之一，将在本章中进行介绍。


    ## 1.1 世界城市化问题


    根据联合国 2018 年发布的最新《世界城市化展望》报告，到 2050 年，居住在城市的人口将从 36 亿增加到 63 亿（联合国经济和社会事务部，2018
    年）。届时，全球人口中将有三分之二居住在城市，而农村人口仅占三分之一，这大致与二十世纪中叶的全球城乡人口分布比例相反。根据 Navigant Research
    的一份报告，目前全球道路上约有 12 亿辆汽车。到 2035 年，全球汽车总数可能达到 20 亿辆，这还不包括摩托车。这种传统以汽车为中心的世界带来的负面影响包括安全问题、拥堵问题以及对环境的影响。


    道路交通事故在人类痛苦、经济损失以及对野生动物和环境的影响方面代价极其高昂。根据世界卫生组织的数据，全球道路死亡人数仍然高得令人无法接受，每年有 135 万人因此丧生，即每天有
    3698 人死亡，这使得道路交通事故成为全年龄段人群的第八大死因，以及儿童和年轻人的第一大死因（世界卫生组织，2018 年）。预计到 2030 年，交通死亡人数将上升至
    220 万。在高收入国家，这些交通死亡事故是 5 至 14 岁儿童的头号死因，占所有死因的 19%（Rothman 等人，2020 年）。


    全球经济每年因交通拥堵损失的价值达 1 万亿美元的生产力（麦肯锡全球研究院，2013 年）。由交通数据公司 [INRIX](https://inrix.com/scorecard/)
    进行的一项研究将波哥大列为全球最拥堵的城市，平均每年有 191 小时的驾驶时间耗费在拥堵中。同一项研究将多伦多列为 2019 年加拿大最拥堵的城市，以及全球第
    19 拥堵的城市，平均每年有 135 小时的驾驶时间耗费在拥堵中。根据 INRIX 的数据，加拿大人平均每年有 27 个小时堵在路上。美国通勤者每年平均有大约一周的时间花在交通拥堵上。[交通](https://www.tomtom.com/en_gb/traffic-index/ranking/)
    [指数](https://www.tomtom.com/en_gb/traffic-index/ranking/)提供了全球约 416 个城市的实时排名和分析数据。


    传统交通燃料是污染物的主要排放源，使得交通运输成为全球温室气体排放的主要贡献者之一。例如，根据美国环境保护署的数据，交通运输产生的温室气体排放约占美国温室气体排放总量的
    28%，使其成为美国温室气体的最大排放源。当前和预计增长的传统交通燃料需求，尤其是对柴油的需求，将造成巨大的公共健康负担，并将加速全球气候变化（Hoornweg
    和 Freire，2013 年）。配备内燃机的传统车辆是温室气体的主要原因之一。图 1-1 展示了每种出行方式的碳足迹和所需空间。除了高碳足迹外，传统出行方式在城市中占用了过多的空间用于铺设道路和停车。许多市中心将
    50%-60%的稀缺房地产用于车辆（Plumer，2016 年）。


    ## 1.2 以人为本的智慧城市


    上述挑战不能简单地通过修建更多道路来解决。布拉斯的悖论（Braess 等人，2005 年）表明，在道路网络中增加一条或多条道路并不会改善交通状况，有时甚至会导致交通流量恶化。布拉斯的悖论严格来说并非悖论，而是一种反直觉的结果，类似于囚徒困境，由于自私自利而牺牲了集体利益。由变革性城市出行倡议进行的一项有趣研究得出结论：一个经过改造的多模式交通走廊总共可以容纳
    74,000 人（2,000 人在汽车中，16,000 名行人，44,000 人在轻轨中，以及 14,000 名骑行者），而传统的以汽车为中心的走廊只能容纳
    24,000 人（8,000 人在汽车中，16,000 名行人）。


    ![../images/511013_1_En_1_Chapter/511013_1_En_1_Fig1_HTML.jpg](img/511013_1_En_1_Fig1_HTML.jpg)


    图 1-1


    每位乘客的碳足迹和所需空间。来源：经合理交通研究所惠允


    注


    需要用一条 20 车道宽的高速公路才能承载目前多伦多地铁所服务的乘客数量。


    这引发了开发和部署可持续出行系统的需求，这种系统能够改变当前以汽车为中心的传统城市，将其转变为以人为本的智慧城市。可持续发展是指既满足当代人的需求，又不损害后代人满足其自身需求的能力（布伦特兰等人，1987
    年）。近年来，“智慧城市”的概念受到了学术界、政府实验室和工业界的研究人员、开发者以及政策制定者越来越多的关注。


    重要提示


    根据 Grand View Research 等市场预测机构和分析师的数据，全球智慧城市市场规模预计到 2027 年将达到 4639 亿美元，2020 年至
    2027 年的复合年增长率为 24.7%。


    多年来，人们对智慧城市有多种定义。在智慧城市的语境下，“智慧”包括监控、控制和优化，以提升效率、获得底线收益并改善环境。当一个城市的社会资本和现代信息通信基础设施能够推动可持续经济发展和高品质生活时，这个城市就可以被定义为“智慧”城市（Caragliu
    等人，2011 年）。换句话说，智慧城市利用数字技术或信息通信技术来提高城市服务的质量和性能，降低成本和资源消耗，并与市民进行更有效、更积极的互动。麻省理工学院将智慧城市定义为“在系统集成的每个层面都具有数字神经系统、智能响应能力和优化能力的系统的系统”。


    根据世界银行的一份报告，智慧城市采用技术和信息平台来更好地管理资源配置、改进管理、监控发展动态、开发新的商业模式，并帮助市民就资源的使用做出明智的决策（Hoornweg
    和 Freire，2013 年）。

