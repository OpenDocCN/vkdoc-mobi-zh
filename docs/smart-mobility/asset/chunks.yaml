  trans: '

    ## 5.5 按需出行（MOD）


    美国交通部将按需出行（MOD）定义为一种创新的交通概念，消费者可通过调度或使用共享出行、快递服务、飞行器及公共交通解决方案来按需获取出行服务、商品和货物，并且行程规划、预订、实时信息、票价支付等乘客服务被整合至单一用户界面（Shaheen
    等人，2017）。MOD 提供商促进了对不同出行方式的接入，例如汽车共享、单车共享、踏板车共享、拼车、网约车/叫车、交通网络公司（TNC）、微出行、班车服务、公共交通以及其他新兴交通解决方案。Susan
    Shaheen 和 Adam Cohen 在（Shaheen 和 Cohen，2020）中重点阐述了 MOD 与出行即服务（MaaS）的主要区别。MOD 侧重于乘客出行与货物配送的商品化以及交通系统管理，而
    MaaS 主要关注乘客出行服务的聚合与订阅服务。MOD 旨在提供一个技术平台，使客户能够将一定程度的按需选项融入其公交出行中，并可能通过同一用户界面发现、预订和支付多种出行方式（Kimley-Horn
    等人，2019）。MOD 系统的设计必须能够有效地（从用户角度）且经济地（从运营商角度）响应客户需求（Mitchell 等人，2008）。从用户角度来看，应尽可能缩短行程时间（即接载等待时间、行驶时间及送达等待时间的总和），最小化行程成本，并最大化行程的便利性与体验。从运营商角度来看，应优化车辆的时空分布/调度（例如，根据需求的时空分布动态调整车辆分布，或在自动驾驶车辆情况下实现车辆自组织），以最少车辆服务最多客户；应优化车辆路线，最小化空驶里程（即无乘客或货物行驶的里程）；应最大化星级评分，避免欺诈、安全及信息传播相关行为；应通过策略性动态定价来提升交通节点的吸引力。例如，研究表明运营商的动态定价策略会影响相应的出行者选择行为（Qiu
    等人，2018）。动态定价在收益管理文献中被广泛研究（Talluri 和 Van Ryzin，2006），且在当前共享出行与按需出行领域是一个重要问题。Mitchell
    等人在（Mitchell 等人，2008）中阐述了动态定价对节点吸引力的影响。该研究揭示，用户成本与系统延迟是按需出行系统成功的两个关键因素。此处的系统延迟指从出行起点步行至就近车场取车、驾车至目的地附近车场、还车并步行至最终目的地所需的时间。根据这项研究，高质量的行程规划有助于实现复杂的动态定价，并利用定价来管理需求。


    交通网络公司的溢价定价模型是动态定价模型的一个例子，当交通拥堵、拼车需求旺盛时，它会提高费率。一些乘客可以选择支付溢价，而另一些则会选择等待几分钟，看看费率是否会回落。优步的溢价定价模型在高峰时段对时间、距离和基础票价进行倍数加成（例如，这个倍数可能是
    1.5 倍或 2 倍），而 Lyft 的 Prime Time 定价模型则使用百分比来对其高峰时段定价进行加成（例如，如果费率上涨 50%，那么原本 20
    美元的车费将变成 30 美元）。


    ## 5.6 无缝集成出行系统（SIMS）


    加拿大城市交通协会（CUTA）将集成化城市出行定义为“人们根据自身需求轻松地从一个地方移动到另一个地方的能力”。德勤将无缝集成出行定义为在城市中构建一个便捷、互联、包容且快速的交通系统（Wolff
    等人，2020）。麦肯锡认为，无缝出行比现有模式更清洁、更便捷、更高效，能够容纳多达 30%的交通流量，同时将出行时间缩短 10%（Hannon 等人，2019）。世界经济论坛将无缝集成出行系统（SIMS）定义为一个“系统的系统”，它通过创建物理资产、数字技术和治理规则之间的互操作性，更高效地运送人员和货物。如图
    5-3 所示，物理资产包括不同的交通方式、基础设施以及能源/燃料网络。


    ![../images/511013_1_En_5_Chapter/511013_1_En_5_Fig3_HTML.png](img/511013_1_En_5_Fig3_HTML.png)


    图 5-3


    SIMS 系统及基础元素（世界经济论坛，2018）


    数字平台代表了 SIMS 的核心，它提供了出行供需以及整个系统状况（例如，交通、基础设施、天气）的整体实时视图。该数字平台支持多种服务，如动态定价、无缝计费、共享数据交换与动态路线规划，以及多式联运管理。最后同样重要的是，治理结构、标准和规则涵盖了
    SIMS 的监管部分。

    '
- fmt: '## 5.7 Last-Mile Delivery


    `Last mile`是一个用于供应链管理和运输规划的术语，描述人员与货物从运输枢纽到目的地的移动（Goodman, 2005）。`Last-mile delivery`（最后一公里配送）是运输的最后一段，专注于将货物从仓库或配送门店运输到最终配送目的地，该目的地通常距离仓库约11英里（即17公里）。`First-mile
    delivery`（第一公里配送）处理货物从制造设施到配送枢纽的移动，而`middle-mile delivery`（中间公里配送）则负责将货物从配送枢纽运送到仓库。


    `Last-mile delivery`是一个与我们开展配送历史一样久远的过程。然而，客户在配送速度、灵活性和透明度方面的期望正在发生变化。这些期望在很大程度上由`Uber`和`Amazon`等公司设定。它们制定了游戏规则及其新标准。为了满足客户期望并遵守这一新的配送标准，`last-mile
    delivery`系统应采用新技术，以提供更快、更具弹性且更透明的配送服务。`Last-mile delivery`应使用高效的数字化平台，能够为客户提供以下服务：


    *   选择配送服务的灵活性（几日达、次日达、当日达或即时配送，是否收取额外附加费）

    *   安排和重新安排配送时间

    *   选择并更改取货地点（送货上门、线上下单线下提货、智能快递柜、被称为`PUDO`点（Pick-up and Drop-off points）的自提点、路边提货或暗店（`dark
    stores`），后者是将传统零售店改造为本地配送中心，以消除对店内顾客的干扰或应对疫情期间的顾客需求）

    *   关于配送物品性质的可见性和透明度（延迟通知、与调度员的沟通渠道和/或配送信息），以便让客户参与其中并成为体验的一部分


    还可以为供应商添加其他服务，例如动态订单编排、配送路线规划、最优部署以及高效自适应的路线规划和车队管理。


    重要提示


    作为总运输成本的一部分，`last-mile delivery`成本相当可观——根据`Business Insider Intelligence`的数据，它占总成本的53%。根据`McKinsey
    & Company`的研究，半自动和全自动的`last-mile delivery`系统将降低成本约10%至40%（Joerss 等人，2016）。


    如今，为了降低配送成本、提高客户满意度并最小化对环境的负面影响，各种创新的`last-mile delivery`解决方案正在开发或测试中。这些解决方案包括但不限于：货运自行车、送货到车（例如`Amazon`与`General
    Motors`和`Volvo`的合作）、自助式智能快递柜（例如`Amazon`、`Quadient`、`RTN`）、客户不在家时送货入户（例如`Waitrose`、`Albert
    Heijn`）、`e-Palette`（例如`Toyota e-Platte`和`GM BrightDrop EP1`及`EV600`）、自动驾驶配送机器人、半自动/全自动`last-mile
    delivery`卡车或配送机器人（例如`FedEx`的自主机器人`SameDay Bot`、`Amazon Scout`、`Nuro`、`Starship`、`KiwiBot`和`TeleRetail`）、配送无人机（例如`Amazon
    Prime Air`和`7-Eleven`），以及将卡车作为母船协同工作的无人机。例如，电动助力或纯电动货运自行车（即`e-cargo bike`）是非常高效且环保的`last-mile
    delivery`车辆。这些车辆的功率通常在250瓦以下，以便符合电动助力车辆（`EAVs`）的监管类别。`Civilized Cycles`[^(44)](#fn44)电动自行车可搭载一名后座乘客，并配备集成锁定的硬壳后轮侧袋，用于携带食品杂货、笔记本电脑、其他日常办公用品，或最多50磅的货物。根据`Velove
    Bikes`[^(45)](#fn45)的说法，与基于货车的配送相比，这些`last-mile delivery`电动货运自行车效率最高可提高2倍，并且总拥有成本显著降低。


    COVID-19疫情期间电子商务的快速增长，成为了非接触式`last-mile`服务激增的催化剂。疫情对`last-mile delivery`的影响将在下一章讨论。


    ## 5.8 Vehicle-as-a-Service (VaaS)


    除了先前讨论的`MaaS`（Mobility as a Service，出行即服务）和`MOD`（Mobility on Demand，按需出行）服务外，现代车辆的传感和计算资源也可以作为共享服务提供。如今，一辆普通车辆拥有50个微型计算机，这些计算机并非始终被充分利用。现代车辆还配备了不同类型的传感器以支持辅助和自动驾驶功能。这些传感器包括但不限于：摄像头、激光雷达传感器、短程和远程雷达、惯性测量单元，以及来自车辆`CAN`总线的车辆动态数据（如车速、方向、制动状态、转向灯状态等）。根据自动驾驶水平的不同，每辆车每天可产生5TB到20TB的数据（`Twitter`每天产生12TB数据）。即使在较低的自动驾驶水平下，每辆车每天也能产生约5TB的数据。车辆数据/信息的示例包括：


    *   **车辆事件**：描述事件、显著状态变化或车辆内异常的数据

    *   **客户偏好**：描述车辆内首选设置的数据

    *   **客户行为**：描述基于客户输入而发生的车辆条件变化的数据

    *   **车辆位置**：描述车辆在三维空间中位置的数据

    *   **车辆时间**：描述车辆在时间维度上属性的数据

    *   **车辆描述**：描述车辆相对静态特征的数据

    *   **车辆状态**：描述组件、子系统或车辆系统设定条件的数据


    这些车辆数据被视为一种资产，可以遵循信息经济学（`infonomics`）的最佳实践进行货币化。信息经济学是关于赋予信息经济意义的理论、研究和学科。它致力于将经济学和资产管理的原则与实践应用于信息资产的估值、处理和部署（Laney,
    2017）。车辆数据和信息可以与其他附近车辆和/或基础设施共享，以增强安全性并创造货币化机会。信息经济学为量化数据和信息的价值提供了基础和方法，并提供了使用和货币化这些数据与信息的策略。'
  raw: '## 5.7 Last-Mile Delivery


    Last mile is a term used in supply chain management and transportation planning
    to describe the movement of people and goods from a transportation hub to a destination
    (Goodman, 2005). Last-mile delivery is the last leg of transportation that focuses
    on the movement of goods from a warehouse or a distribution store to the final
    delivery destination, which is usually located around 11 miles or 17 kilometers
    from the warehouse. First-mile delivery addresses the movement of goods from manufacturer
    facilities to distribution hubs, while middle-mile delivery focuses on goods delivery
    from distribution hubs to warehouses.


    Last-mile delivery is a process that has been around for as long as we have been
    doing delivery. However, customer expectations in terms of delivery speed, flexibility,
    and transparency are changing. These expectations have been pretty much set by
    Uber and Amazon alike. They dictated the rules of the game and its new standard.
    In order to meet customer expectations and comply with this new delivery standard,
    last-mile delivery systems should employ new technologies for faster, more elastic,
    and transparent delivery services. Last-mile delivery should use efficient digital
    platforms able to provide customers with the following:


    *   Flexibility of choosing a delivery service (couple of days delivery, next-day
    delivery, or same-day delivery or instant delivery with or without extra surcharge)


    *   Scheduling and rescheduling the delivery


    *   Selecting and changing pickup location (home/delivery to the doorstep, click
    and collect, parcel smart lockers, pickup and drop-off points known as PUDO points,
    curbsides or dark stores, which are traditional retail stores converted into local
    fulfillment centers to eliminate disruption to in-store customers or deal with
    customers during pandemics)


    *   Visibility and transparency (delay notification, communication channel with
    dispatchers, and/or deliveries) regarding the nature of the delivery item in order
    to get the customer engaged and be part of the experience


    Other services can be added for suppliers such as dynamic order orchestration,
    delivery tour planning, optimal deployment and efficient and adaptive routing,
    and fleet management.


    Important


    As a share of the total cost of shipping, last-mile delivery costs are substantial—comprising
    53% overall according to Business Insider Intelligence. According to McKinsey
    & Company, semi- and fully autonomous last-mile delivery systems will reduce costs
    by approximately 10–40% (Joerss et al., 2016).


    Nowadays various innovative solutions for last-mile delivery are currently being
    developed or tested to reduce the delivery cost, increase customer satisfaction,
    and minimize the negative environmental impact. These solutions include, but are
    not limited to, cargo bikes, delivery to car (e.g., Amazon in partnership with
    General Motors and Volvo), self-service smart parcel lockers (e.g., Amazon, Quadient,
    RTN), and delivery inside home when the customer is away (e.g., Waitrose, Albert
    Heijn), e-Palette (e.g., Toyota e-Platte and GM BrightDrop EP1 and EV600), self-driving
    delivery droids, semi-/fully autonomous last-mile delivery trucks or delivery
    robots (e.g., FedEx’s autonomous robot SameDay Bot, Amazon Scout, Nuro, Starship,
    KiwiBot, and TeleRetail), delivery drones (e.g., Amazon Prime Air and 7-Eleven),
    and drones working simultaneously with trucks serving as their mother ships. For
    example, electrically assisted or electric cargo bikes or e-cargo bikes are very
    efficient environmentally friendly last-mile delivery vehicles. The power of these
    vehicles is usually below 250 W in order to remain in the regulatory category
    for electrically assisted vehicles (EAVs). The Civilized Cycles^([^(44)](#fn44))
    e-bike can carry a rear passenger and is equipped with integrated locking hard-shell
    panniers around the rear wheel for carrying groceries, a laptop, and other daily
    work gear, or up to 50 lbs. of cargo. According to Velove Bikes,^([^(45)](#fn45))
    these last-mile delivery electric cargo bikes can be up to 2x more productive
    and have a significantly lower total cost of ownership compared to van-based delivery.


    The rapid increase of ecommerce during the COVID-19 pandemic was a catalyst for
    the surge in contactless last-mile services. The impacts of the pandemic on last-mile
    delivery are discussed in the next chapter.


    ## 5.8 Vehicle-as-a-Service (VaaS)


    Aside from the previously discussed MaaS and MOD services, sensing and computational
    resources of modern vehicles can be offered as shared services. Nowadays, an average
    vehicle has 50 microcomputers, which are not fully utilized all the time. Modern
    vehicles are also equipped with different types of sensors in order to support
    assisted and automated driving functions. These sensors include, but are not limited
    to, cameras, LiDAR sensors, short-range and long-range radars, inertial measurement
    units, and/or vehicle dynamic data from the vehicle’s CAN bus (vehicle speed,
    direction, brake status, turn signal status, etc.). These sensors can generate
    between 5 TB and 20 TB of data per day per vehicle depending on the level of autonomy
    (Twitter generates 12 TB of data per day). Even at a lower level of autonomy,
    around 5 TB can be generated per day per vehicle. Examples of vehicle data/information
    include


    *   **Vehicle Events**: Data that describes an event, notable state change, or
    anomaly within a vehicle


    *   **Customer Preference**: Data that describes a preferred setting within the
    vehicle


    *   **Customer Behavior**: Data that describes changes in conditions of the vehicle
    based on customer inputs


    *   **Vehicle in Place**: Data that describes where a vehicle is in a three-dimensional
    space


    *   **Vehicle in Time**: Data that describes when a vehicle is in time


    *   **Vehicle Description**: Data that describes relatively static characteristics
    of the vehicle


    *   **Vehicle State**: Data that describes a set condition of a component, subsystem,
    or vehicle system


    This vehicle data is seen as an asset that can be monetized following infonomics
    best practices. Infonomics is the theory, study, and discipline of asserting economic
    significance to information. It strives to apply both economic and asset management
    principles and practices to the valuation, handling, and deployment of information
    assets (Laney, 2017). Vehicle data and information can be shared with other nearby
    vehicles and/or infrastructure for enhanced safety and monetization opportunities.
    Infonomics provides the foundation and methods for quantifying data and information
    value and tactics for using and monetizing these data and information.'
