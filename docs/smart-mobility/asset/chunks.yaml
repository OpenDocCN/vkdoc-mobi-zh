    个人导航系统（PNSs）（Adam 等人, 2020）是移动电话及多种导航或卫星导航应用（例如 `Google Maps`、`Apple Maps`、`CoPilot
    Premium HD Europe`、`TomTom GO mobile app` 和 `Waze`）以及车辆/单车共享应用（如 `BikeHub`）中存在的**情境导航系统**的实例。寻路愿景整合了个人导航系统与情境感知。它融合了用户个人预设偏好、用户活动、当地环境条件（即机场或高速公路的繁忙程度），以及基于
    GPS 位置信息、视觉里程计和/或里程计的情境检测算法（Symonds 等人, 2017）。寻路可被视为一种**情境感知系统（CAS）**，它能引导用户到达特定的值机区和登机口；为同一出行空间中符合你条件的同行者（即朋友、特定商业类型用户）提供自动提醒；提供导航和方向指引；提供自动到达信息及本地引导，例如交通选择和心跳检测；以及根据用户情绪自动播放音乐。多个情境感知移动项目涉及将位置信息集成到无线应用中。例如，`General
    Motors OnStar` 与用户在车内和车外保持连接，并通过其 `Marketplace` 服务为他们提供便捷的优惠获取通道。`GM Marketplace`
    允许用户接收特别促销信息、本地推荐与路线指引，并可通过车载触摸屏和移动应用从本地商店订购并远程付款。`General Motors OnStar` 与 `Salesforce`
    合作试点了一个项目，根据驾驶员/乘客的位置提供购物、加油或餐饮优惠和交易。商家能够将优惠直接发布到 `Salesforce` 中，并通过分析看到营销活动的结果。另一个情境感知服务的例子是
    `Burger King` 在墨西哥城试点的 `Traffic Jam Whopper`。`Traffic Jam Whopper` 项目利用实时数据，瞄准拥堵道路和高速公路上饥饿的驾驶员，由摩托车外卖员提供送餐服务。


    ## 4.9 本章小结


    本章提供了基于上一章所述基础技术构建的智能出行技术赋能实例。例如，道路远程信息处理和互联出行利用无线通信基础设施、移动计算服务、区块链和物联网服务，创造了能够容纳不同智能出行服务的丰富数据环境。得益于人工智能和机器人技术等基础技术的进步，自动化出行也在不断发展，情况亦是如此。向电气化的转变为电动出行和微出行服务奠定了基础，使其成为实现净零排放的脱碳出行的一种方式。作为可持续出行的推动力，主动式、软性或零影响的出行方式也正获得发展势头。包容性出行是改善体弱老年人和残障人士出行与生活条件的推动因素。情境感知赋予出行系统根据不同的情境信息进行适应的能力。适应意味着能够处理令人困惑的情况，并迅速、成功地应对新情况。情境适应是未来出行系统非常期望的功能。根据智力三元理论和英国理论物理学家及宇宙学家史蒂芬·霍金（1942–2018）的观点，适应也是智力的一个主要标志，霍金将智力视为适应变化的能力。在下一章中，我们将详细描述得益于本章所讨论的技术赋能而发展起来的一些智能出行颠覆性创新。


