  trans: '

    ### 6.3.3 网络安全攻击与物理攻击


    `NHTSA` 将道路车辆领域的网络安全定义为保护汽车电子系统、通信网络、控制算法、软件、用户及其底层数据免受恶意攻击、损坏、未授权访问或篡改。智能出行系统中嵌入的技术激增，为严重的网络威胁打开了大门，并增加了网络攻击的可能性。勒索软件感染、导致个人身份信息泄露的数据泄露事件，以及对企业网络的未授权访问，都是
    `FBI` 所识别的自动驾驶汽车主要的网络安全问题。德勤公司强调了未来出行系统中两种潜在的攻击：侵入制造商与车辆之间的通信，以及劫持车辆控制和传感器（Leon
    Nash 和 Hillaker，2020）。例如，德勤指出，攻击者可能已经秘密安装监控设备，留下一个收发器来提取客户数据或向车辆网络注入恶意数据。他们还可以窃取敏感车辆数据，例如性能统计数据或加密密钥。黑客可能还意图控制安全关键功能，如转向、制动、动力推进和
    OTA 更新。黑客可以篡改交通数据来干扰交通信号灯，造成交通堵塞和不必要的重新规划路线。密歇根州的研究人员曾成功控制交通信号灯，以证明对手能够控制交通基础设施以造成混乱、降低安全性或获取不公平优势（Ghena
    等人，2014）。Parkinson 等人（2017）总结了网络安全漏洞及其缓解措施。


    其他类型的攻击可能包括机器人劫持、欺凌行为，或是人们在互动时可能表现出的一些不可预测行为。行人可能通过对抗性行为或欺骗/作弊行为（例如做出粗鲁手势，或在车辆前长时间停在人行横道上）来欺凌一辆自动驾驶的零乘员车辆（`ZOV`）。其他机器人劫持者可能试图破坏车辆或窃取车内的高价值货物。在混合交通场景中，人类驾驶员可能表现出恶作剧行为，试图通过在自动驾驶车辆附近不规则驾驶、在高速公路上蛇形行驶、或在自动驾驶车队中穿梭来欺凌它们（Lipson
    和 Kurman，2016）。对地图服务或其他 `GIS` 应用程序进行作弊是另一种可能导致出行系统混乱的攻击形式。2020 年 2 月，Simon Weckert
    通过使用一辆装满 99 部开启 `Google Maps` 导航功能的手机的手推车，在柏林街头制造虚假交通，成功欺骗了 `Google Maps` 的 `AI`
    算法，尽管道路上一辆车都没有，却造成了大规模交通拥堵。


    联合国欧洲经济委员会（`UNECE`）制定了旨在改善汽车网络安全和软件更新管理的法规（联合国，2002）。这些法规要求汽车制造商采取措施管理车辆网络安全风险，通过设计保障车辆安全以降低供应链风险，检测并响应整个车队的网络安全事件，并提供安全可靠的、不损害车辆安全性的软件更新。互联出行领域的利益相关者将网络安全视为实现先进通信和安全功能的关键。通过使用安全的数字密钥，提供强大的身份验证和授权，以方便访问车辆。数据加密和匿名化用于确保车辆免受网络攻击的安全性以及乘客的隐私。对加密环境下收集的数据进行分析，能够及时检测、识别和确认可能导致异常交通信号行为、车辆篡改或入侵、异常驾驶等的恶意网络攻击。


    ## 6.4 总结


    我希望已经说服你，智能出行是对可持续出行的推广，它保证了不同出行模式之间的无缝衔接，并使人们或货物能够以一种安全、清洁且最高效（快速、便捷、舒适、高效且廉价）的方式从一个地方到达另一个地方。本书有两个核心信息。第一个信息是，未来的出行将以人为中心、软件定义、互联互通、并且电气化。第二个核心信息强调，智能出行技术的广泛普及和社会接受度，不仅取决于技术的成熟度，还取决于是否拥有完善治理框架和合理的城市规划来适应这些不断发展的技术。出行技术正变得越来越智能，我们需要比过去更加睿智，才能恰当地监管、容纳并正确使用这些新兴技术。

    '
