    ### 5.9.2 乘客经济


    `乘客经济`（Passenger Economy）是英特尔公司提出的一个术语，用以代表全自动驾驶汽车（SAE 5 级）将产生的经济和社会价值 (Lanctot
    et al., 2017)。这是一种旨在通过无人驾驶移动平台上的用户体验实现盈利的新商业模式。根据麦肯锡的`互联汽车客户体验（C³X）`框架，该模式需要达到`互联汽车客户体验（C³X）`的第
    3 至第 5 级。在第 3 级（基于偏好的个性化）中，所有乘客都能享受个性化控制以及有针对性的情境广告。在第 4 级（多模式实时对话）中，所有乘客都能与车辆进行实时互动，并收到关于服务和功能的主动推荐。在最高级的第
    5 级（虚拟 chauffeur）中，所有乘客的明确和未明确表达的需求都将由能够预测并执行复杂非编程任务的认知 AI 来满足 (Bertoncello et
    al., 2018)。


    借助`互联汽车客户体验`和自动驾驶技术，可以向乘客提供多种以消费者为中心的产品和服务，例如零售、健康、金融和媒体服务。根据英特尔的预测，到 2050 年，这种`乘客经济`将成为一个价值
    7 万亿美元的市场^(⁴⁷)。为了更直观地理解，这个数字是 2021 年德国国内生产总值（GDP）的两倍，加拿大的四倍。根据 Strategy Analytics
    的分析，`乘客经济`中最大的收入机会在于消费者将资源从拥有车辆转向使用 MaaS 服务 (Lanctot et al., 2017)。消费者对 MaaS 服务的使用将占这些收入的近
    55%，即 3.7 万亿美元。


    `乘客经济`可以创造多个新机遇，以提升互联化、自动化和共享化车辆中乘客的体验并将其变现。未来，将开发功能完备的移动出行系统，为乘客提供与教育、休闲、商业和医疗保健相关的各种订阅制服务。这类智能移动平台的一个例子是丰田纺织的定制空间系统（MOOX）。MOOX
    是“移动”（mobile）和“盒子”（box）两个词的组合，意指一个可以在移动过程中自由使用的私人空间。总的来说，除了作为个人使用的私有车辆外，自动驾驶汽车还可以被改造利用，以服务于不同的机会。这些机会包括移动汽车旅馆、睡眠舱（Sleep-Cab）、移动美容院、餐厅、汽车影院、移动商店、移动药房、迷你诊所，以及其他实体业务等等。


    ## 5.10 本章小结


    本章给出了几个移动出行颠覆性因素的例子，例如颠覆性出行模式、共享出行、`出行即服务（MaaS）`、`按需出行（MOD）`、`无缝集成出行系统（SIMS）`、最后一英里配送、`车辆即服务（VaaS）`、零工经济和`乘客经济`。本章将自动驾驶巴士、城市空中交通和城市水上交通、`自动旅客捷运系统（APMs）`、超回路列车（Hyperloop）和城市环线列车（Urbanloop）描述为颠覆性出行平台的例子。共享出行和`出行即服务（MaaS）`被讨论为一种范式转变，即从个人拥有出行工具转向使用权和
    servitization，作为出行系统新自由主义化的体现。本章重点阐述了 MaaS、`按需出行（MOD）`和`无缝集成出行系统（SIMS）`之间的主要区别。本章介绍了最后一英里配送服务在配送速度、灵活性和透明度方面满足客户期望的进展。在`车辆即服务（VaaS）`概念下，描述了利用智能出行平台感知和计算资源的一些想法。最后，同样重要的是，本章还介绍了这些出行平台在零工经济和乘客经济领域的潜在应用。


    COVID-19 疫情对多种不同的智能出行服务产生了多方面的影响。下一章将讨论疫情期间造成的影响，并提供关于后疫情时代潜在影响的见解。


