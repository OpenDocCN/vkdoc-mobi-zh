    # 4. Smart Mobility: Technology Enablers


    Evolutionary and revolutionary technology enablers provide the potential of improving
    existing processes and creating new and sometimes disruptive business models and
    services. In the context of smart mobility, these technologies may include intelligent
    infrastructure, connected mobility, automated mobility, e-mobility, micromobility,
    active/soft mobility, inclusive mobility, and Context Awareness Systems (CAS).
    The following sections explain these technology enablers.


    ## 4.1 Intelligent Infrastructure


    Mobility infrastructure is required to accommodate existing and emerging personal
    and shared mobility systems and to facilitate the proper management of these systems.
    Examples of this supportive infrastructure include intelligent transportation
    systems, smart intersections, high-quality cycling infrastructure such as cycle
    highways (a.k.a. bicycle freeways or superhighways), smart parking, charging infrastructure,
    and smart pavement. In this section, intelligent transportation systems, smart
    intersections, and smart pavement are given as examples of intelligent infrastructure
    required as technology enablers for smart mobility systems and services.


    Intelligent transportation systems (ITSs) or road telematics is an essential part
    of the infrastructure required for the proper operation and management of smart
    mobility systems. According to Williams Sale Partnership (WSP), ITS is “a combination
    of leading-edge information and communication technologies used in transportation
    and traffic management systems to improve the safety, efficiency, and sustainability
    of transportation networks, to reduce traffic congestion and to enhance drivers’
    experiences.”^([^(15)](#fn15)) Major categories of ITS include (French and Chen,
    1999):


    *   **Advanced Traffic Management Systems (ATMS)**: Adaptive traffic signal controls,
    automatic incident detection, regional traffic control, electronic toll collection,
    emission sensing, and so on.

    *   **Advanced Public Transportation Systems (APTS)**: Automatic vehicle location,
    signal preemption, smart cards for fare collection, dynamic ridesharing, and so
    on.

    *   **Advanced Traveler Information System (ATIS)**: Motorist information, dynamic
    route guidance, pre-trip planning, in-vehicle signing, and so on.

    *   **Advanced Vehicle Safety Systems (AVSS)**: Intelligent cruise control, collision
    warning, collision avoidance, night vision, platooning, and so on.

    *   **Commercial Vehicle Operation (CVO)**: Weigh-in-motion or weighing-in-motion
    (WIM), automatic vehicle classification, fleet management, international border
    crossing, and so on.


    According to the European Commission,^([^(16)](#fn16)) ITS can help in reducing
    congestion through assistance systems and information services such as dynamic
    traffic management and the use of navigation systems. It also reduces fatalities
    and traffic-related injuries through automatic calls to emergency services and
    transmission of location data from the accident scene that can drastically cut
    response time of emergency services and reduce road fatalities by about 5–10%
    and result in less severe injuries. ITS has also the potential to reduce emissions
    by 10–20% and save energy through better demand management including the use of
    road charging and access management. Time-dependent dynamic trip pricing and road
    usage–based charging schemes are emerging techniques to control the access to
    the infrastructure in such a way that will minimize congestion and maximize society
    and environmental benefits. Several companies are offering Tolling-as-a-Service
    (TaaS) systems that dynamically charge road tolls. For example, Blissway’s system
    includes route planning, vehicle and occupant verification, and toll payments.
    Tolls are calculated based on time saved and the number of vehicle occupants and
    are updated if the actual time savings differs from the estimate. The Canadian
    company IMS has recently partnered with transport policy makers to deploy usage-based
    schemes in Oregon, Utah, Washington, and California.


    **Important:** According to Precedence Research, the global intelligent transportation
    system (ITS) market size is expected to reach US$ 47.89 Bn by 2030, growing at
    a CAGR of 6.3%.


    An important integral part of ITS for urban mobility is smart/intelligent intersection.
    The main objective of smart intersection is to protect vulnerable road users such
    as pedestrians and cyclists especially in busy intersections and in dense urban
    areas. Smart intersections integrate different sets of sensors, communication
    modules (e.g., DSRC roadside units or C-V2X micro cells), and data acquisition
    and processing modules on edge or on the cloud. Smart intersections can alert
    or prevent left-turning cars from running head-on into traffic that approaches
    from behind an occlusion. Smart intersections are also an enabler for cooperative
    control like flocking and platooning for connected, autonomous, shared, and electric
    (CASE) vehicles. For example, the automated network fundamental diagram (ANFD)
    is presented as a macro-level modeling tool for urban networks with smart intersections
    (Amirgholy et al., 2019).


    Smart pavement has the potential to revolutionize the way our roads are built
    and financed. This technology offers radio-connected sensors being embedded in
    a road to constantly monitor and report the pavement’s changing condition, installing
    two-way WiFi transmitters in the roadbed to offer enhanced commercial broadband
    services to vehicles and adjoining businesses/residences, and charging electric
    cars as they drive along, thus reducing the need for off-road recharging stops
    (Careless, 2017). Moreover, smart pavement can provide continuous traffic and
    road condition information to drivers or to automated driving vehicles and can
    inform authorities of accidents and other hazardous conditions. According to *The
    Denver Post*,^([^(17)](#fn17)) Colorado has announced that it will become the
    first city in the United States to implement “smart pavement” as part of its preparation
    for the arrival of autonomous vehicles and sensor-linked standard vehicles that
    can identify and warn drivers of hazardous conditions and sharp curves ahead.'
  raw: '## 3.9 Summary


    In this chapter, we discussed several core building blocks of the existing and
    possibly emerging smart mobility systems and services. The discussed technologies
    include Position, Navigation, and Timing (PNT), Geographic Information System
    (GIS), wireless communication, mobile cloud computing, blockchain, Internet of
    Things (IoT), Artificial Intelligence (AI), robotics, and electrification. These
    technologies are not exhaustive and should be considered as examples of technologies
    that can be foundational in developing smart mobility services. The following
