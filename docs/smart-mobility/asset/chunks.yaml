    ## 5.8 车辆即服务（VaaS）


    除了先前讨论的`MaaS`（Mobility as a Service，出行即服务）和`MOD`（Mobility on Demand，按需出行）服务外，现代车辆的传感和计算资源也可以作为共享服务提供。如今，一辆普通车辆拥有
