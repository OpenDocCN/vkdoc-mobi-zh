- fmt: 'The control system of this testbed controls the pressure level, schedules
    the operation of the capsules, starts the operation, and intervenes in case of
    emergency. The programming interfaces allow the execution of different control
    algorithms such as PID parameter tuning of the capsule, capsule localization using
    IMU or a reflective tape mounted within the tube or using hybrid localization
    (reflective tape with IMU-based localization), capsule dispatching, timetabling,
    and scheduling. Remote experimentation unit provides remote interaction with the
    hyperloop testbed for educational, training, and research purposes. This makes
    the testbed not restricted to synchronized attendance by instructors and students,
    enables constant access whenever needed by students, and also enables sharing
    resources with other institutions. The hyperloop digital twin is integrated in
    this testbed as a high-fidelity cloud-based virtual representation or a digital
    replica of the hyperloop that represents the different elements and the dynamics
    of the capsule. This digital twin incorporates 3D modeling, multiphysics simulation,
    and cognitive IoT capabilities to create a hyperloop shadow that contains an up-to-date
    and accurate copy of the hyperloop’s properties and states throughout the entire
    life cycle of the system. The digital twin benefits include, but are not limited
    to, monitoring, diagnostics, and prognostics to guarantee the healthy, efficient,
    and sustainable operation of the system and optimize the operation and maintenance
    of the hyperloop testbed.


    Another novel and disruptive form of ground transport is the urbanloop^([^(39)](#fn39))
    that was introduced in France in 2018 as an urban mobility system for rapid travel.
    One- or two-person sports car–inspired transparent capsules travel in tubes that
    can be buried, semi-buried, or airborne depending on urban constraints.


    ## 5.3 Shared Mobility


    In recent years, shared mobility technology has matured significantly—as is evident
    by the appearance of commercially available shared mobility services such as car
    sharing, bike sharing, scooter sharing, ridesharing, ridehailing/ridesourcing,
    and demand-responsive transit (DRT). Shared autonomous vehicles (SAVs) and pooled
    shared autonomous vehicles (PSAVs) are also quickly emerging. PSAVs are SAVs that
    serve multiple riders simultaneously.


    **Important**


    The global shared mobility market size is projected to reach $619.51 billion by
    2025, according to a report by Grand View Research, Inc., rising at a CAGR of
    25.1% during the forecast period.


    Different shared mobility services are provided based on a sharing and gig economy
    business model. These services represent a paradigm shift from ownership to usership.
    Shared mobility services include the following:


    * **Vehicle Sharing Services**: Provided by companies like Zipcar, SHARE NOW,
    Getaround, Capital Bikeshare, Lime, VeoRide, and Bird, involve multiple customers
    operating the same vehicle at different times (Kimley-Horn et al., 2019).


    * **Peer-to-Peer (P2P) Vehicle Sharing Services**: Are emerging services offered
    by vehicle owners to other people in their area for short periods of time. This
    model is similar to Airbnb and Couchsurfing. In these systems, a mobility platform
    can be a car (e.g., `Drive Drive Car`), bike (e.g., `Spinlister`), scooter, Personal
    Intelligent City Accessible Vehicle (PICAV), VTOL, SeaBubble, or any other personal
    transporter.


    * **Demand-Responsive Transit (DRT), Dial-a-Ride, or Paratransit**: DRT is a pre-booked,
    shared mobility service that combines both public and private transportation services
    to provide an experience similar to an on-demand mobility service. DRT is defined
    in (Bakker, 1999) as a transportation option that falls between a private vehicle
    and the conventional public transport, that is, a service that offers a similar
    level of service and mobility as private vehicles along with easy access to public
    transport. DRT provides dedicated small buses, minibuses, or maxi-taxis, which
    aim to cater pre-booked user requests through a telephone or a smartphone app
    (Talley and Anderson, 1986).


    * **Microtransit**: The US Department of Transportation (USDOT) defines microtransit
    as “a privately owned and operated shared transportation system that can offer
    fixed routes and schedules as well as flexible routes and on-demand scheduling.
    The vehicles generally include vans and buses” (Kimley-Horn et al., 2019). Microtransit
    is a form of DRT. Examples of vendors or services for microtransit include Ford
    TransLoc, DemandTrans, and Transdev.


    * **Ridesharing Services**: Provided by companies like Zimride, Getaround, and
    Waze Carpool, are a software-assisted modernization of conventional carpooling
    in which drivers with their own personal vehicles are matched with passengers
    using the same subscription service to split the cost of commuting together (Kimley-Horn
    et al., 2019). In ridesharing, the drivers fill seats in their car when they are
    already driving from point A to point B. This is not a new model as carpooling
    has been used for years since World War II when the US government encouraged people
    to carpool and share rides as a way to conserve resources necessary for the war
    effort. The “When you ride ALONE you ride with Hitler!” US government propaganda
    poster was part of this unprecedented government campaign in 1943.


    * **Ridehailing or Ridesourcing Services**: Provided by transportation network
    companies (TNCs) such as Uber, Lyft, and DiDi, consist of a driver utilizing their
    personal vehicle to provide a private trip to a paying passenger (Kimley-Horn
    et al., 2019). A driver is hailed on-demand to drive a passenger somewhere for
    profit.'
