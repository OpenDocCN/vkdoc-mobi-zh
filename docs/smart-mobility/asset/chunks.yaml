    # 6. Smart Mobility During the COVID-19 Pandemic and in the Post-pandemic World


    The outbreak of the novel coronavirus and its disease COVID-19 presented an unprecedented
    challenge for humanity. Globally, as of the first anniversary date of the COVID-19
    pandemic, there have been more than 118 million confirmed cases of COVID-19, including
    almost 2.6 million deaths, reported to the World Health Organization (WHO) from
    223 countries, areas, or territories. This accelerating pandemic changes all the
    aspects of our lives and will leave some scars in the post-pandemic world as well.
    It impacts the way we work, entertain, purchase, and interact with each other;
    the way governmental organizations provide services; the way education institutions
    teach and conduct research; and the way companies run, grow, and deal with a world
    continuously changing in unprecedented and unpredictable ways. Since characterizing
    COVID-19 as a pandemic in March 11, 2020, the WHO recommends several public health
    measures to deal with the pandemic such as social distancing, wearing masks, and
    finding, isolating, testing, and treating every case and tracing every contact.
    Governments around the world applied tight restrictions, curfews, and localized
    lockdowns as a way to curb the spread of the virus. Governments kept easing and
    tightening these measures causing serious changes in consumer behaviors and preferences
    and short-term disruptions and longer-term structural changes in different aspects
    of mobility systems as discussed in the following sections.'
