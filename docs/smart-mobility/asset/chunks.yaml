- fmt: '# Cities as Heterogeneous Entities


    Cities are very heterogeneous entities that integrate a wide variety of components
    with more similarities than differences. Digitization, automation, connectivity,
    and data analytics are key aspects to achieve seamless integration between these
    components. According to a survey conducted by `PwC` involving about 64 cities
    (Galal et al., 2011), after finance, the second most important barrier to smart
    city strategy implementation is prioritization.


    Cities must first address their very basic needs: security, health, and basic
    infrastructure such as clean water and sanitation. These infrastructures should
    be also optimized for the best use by the citizens. If these basic needs are already
    met, the focus shifts to safety and security needs, roads and transport infrastructure,
    and educational access, as the city moves from basic industrial production to
    becoming an informational society. In more developed cities, the focus will be
    on environmental needs, social integration, culture and leisure, as well as information
    and communication technologies as an enabler for a knowledge-based society. At
    the next level are the smart cities, which are defined as a world leader able
    to maximize its performance across all capitals. Beyond that comes the level of
    self-actualization, when cities explore new paradigms and set new standards for
    the quality of life and are willing to share their experiences to help other cities
    advance (Galal et al., 2011).


    ## Pillars of a Smart City


    Smart mobility, smart living, smart society, smart environment, smart economy,
    and smart governance are the main pillars of a smart city as illustrated in Figure
    [1-2](#511013_1_En_1_Chapter.xhtml#Fig2). Digitalization, automation, connectivity,
    and analytics are four main enablers for monitoring, control, and optimization
    in each of these six pillars.


    **Smart mobility** addresses the availability of information and communication
    infrastructure and safety and the sustainability of mobility systems. Local and
    international accessibility of transport systems are also important aspects of
    smart mobility. More details about smart mobility are provided in the next section.


    ![../images/511013_1_En_1_Chapter/511013_1_En_1_Fig2_HTML.jpg](images/511013_1_En_1_Chapter/511013_1_En_1_Fig2_HTML.jpg)


    *Figure 1-2 — Smart City Pillars*


    **Smart living** comprises various aspects of quality of life such as culture,
    health, safety, housing, tourism, and so on. Agile civil society, level of qualification
    or education of the citizens, social inclusion, the quality of social interactions
    regarding integration and active participation in public life, and the openness
    toward the “outer” world are indicators for smart societies.


    **Smart environment** is described by attractive natural conditions (e.g., climate
    and green space), pollution, resource management, and also efforts toward environmental
    protection.


    **Smart economy** includes factors all around economic competitiveness as innovation,
    entrepreneurship, trademarks, productivity and flexibility of the labor market,
    as well as the integration in the (inter)national market (Giffinger et al., 2007).


    **Smart governance** comprises aspects of political participation, services for
    citizens, as well as the functioning of the administration.


    ## Global Smart City Initiatives


    There are several smart city projects and initiatives across the world. According
    to the latest Smart City Index report published in 2020 (IMD and SUTD, 2020),
    the top ten smart cities in the world are Singapore, Helsinki, Zurich, Auckland,
    Oslo, Copenhagen, Geneva, Taipei City, Amsterdam, and New York as shown in Table
    [1-1](#511013_1_En_1_Chapter.xhtml#Tab1). This index ranks 109 cities based on
    economic and technological data, as well as by their citizens’ perceptions of
    how “smart” their cities are.


    *Table 1-1 — Top Ten Smart Cities in the World as per Smart City Index (IMD and
    SUTD, 2020)*


    | City | Country | 2020 Ranking | 2019 Ranking | Change |

    | --- | --- | --- | --- | --- |

    | Singapore | Singapore | 1 | 1 | 0 |

    | Helsinki | Finland | 2 | 8 | +6 |

    | Zurich | Switzerland | 3 | 2 | -1 |

    | Auckland | New Zealand | 4 | 6 | +2 |

    | Oslo | Norway | 5 | 3 | -2 |

    | Copenhagen | Denmark | 6 | 5 | +1 |

    | Geneva | Switzerland | 7 | 4 | +3 |

    | Taipei | Taiwan | 8 | 7 | +1 |

    | Amsterdam | Netherlands | 9 | 11 | +2 |

    | New York | United States | 10 | 38 | +28 |


    ### The Line: A Visionary Smart City


    `The Line` was revealed in January 2021 as a fully sustainable smart city to be
    built as part of `Neom`, a planned cross-border city in the Tabuk province of
    northwestern Saudi Arabia. `Neom` was announced in 2017 and is part of Saudi Arabia’s
    Vision 2030 drive to diversify its economy and become less reliant on oil. `The
    Line` is a linear 100-mile-long city with no cars or streets, with everything
    its inhabitants need accessible within a five-minute walk. The vision of this
    mega city is to be zero-energy walkable communities for a million people. `The
    Line` is inspired by Paolo Soleri’s Lean Linear City concept (Soleri et al., 2012)
    where pedestrian-based communities are oriented around linear local and regional
    transportation systems.'
