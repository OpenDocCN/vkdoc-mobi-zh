    will enjoy personalized controls and targeted contextual advertising. In level
    4, multimodal live dialogue, all passengers will interact live with vehicles and
    receive proactive recommendations on services and functions. In the ultimate level
    5, virtual chauffeur, all passengers’ explicit and unstated needs will be fulfilled
    by cognitive AI that predicts and performs complex unprogrammed tasks (Bertoncello
    et al., 2018).


    With Connected Car Customer Experience and automated driving, several consumer-centric
    products and services such as retail, health, finance, and media services can
    be offered to passengers. This passenger economy will be a US $7 trillion market
    by 2050 according to Intel.^([^(47)](#fn47)) For perspective, that amount is double
    Germany’s gross domestic product (GDP) and four times Canada’s GDP in 2021\. According
    to Strategy Analytics, the largest revenue opportunity in the passenger economy
    lies in the use of MaaS offerings as consumers shift resources away from vehicle
    ownership (Lanctot et al., 2017). Consumers’ use of MaaS offerings will account
    for nearly 55% of these revenues, or US $3.7 trillion.


    Passenger economy can create several new opportunities to enhance and monetize
    the experience of passengers of connected, automated, and shared vehicles. In
    the future, fully functioning mobility systems will be developed to enable different
    subscription-based services to passengers related to education, leisure, business,
    and healthcare. An example of these smart mobility platforms is Toyota Boshoku’s
    Tailored Space System (MOOX). MOOX is a combination of the words mobile and box
    denoting a private space that can be utilized freely while in motion. In general,
    automated driving vehicles can be repurposed for different opportunities aside
    from being a privately owned vehicle for personal use. These opportunities include
    mobile motels, Sleep-Cab, mobile beauty salons, restaurants, drive-away movies,
    mobile stores, mobile pharmacies, mini-clinics, and other brick-and-mortar businesses
    to name just a few.


    ## 5.10 Summary


    This chapter gave examples of several mobility disruptors such as disruptive mobility
    modes, shared mobility, Mobility-as-a-Service (MaaS), mobility on demand (MOD),
    seamless integrated mobility systems (SIMS), last-mile delivery, Vehicle-as-a-Service
    (VaaS), gig economy, and passenger economy. Autonomous shuttle buses, urban air
    mobility and urban water transportation, automated people movers (APMs), hyperloop,
    and urbanloop are described in this chapter as examples of disruptive mobility
    platforms. Shared mobility and Mobility-as-a-Service (MaaS) are discussed as a
    paradigm shift from individuals’ ownership of mobility vehicles to usership and
    servitization as the neo-liberalization of mobility systems. The main differences
    between MaaS, mobility on demand (MOD), and seamless integrated mobility systems
    (SIMS) are highlighted in this chapter. Advances in last-mile delivery services
    to meet customer expectations in terms of delivery speed, flexibility, and transparency
    are presented. Ideas to make use of sensing and computational resources of smart
    mobility platforms are described under the “Vehicle-as-a-Service (VaaS)” concept.
    Last, but literally not least, potential applications of these mobility platforms
    within gig and passenger economy spaces are presented.


    The COVID-19 pandemic has several impacts on different smart mobility services.
    The next chapter discusses the impacts caused during the pandemic and provides
    insights about potential implications in the post-pandemic era.


