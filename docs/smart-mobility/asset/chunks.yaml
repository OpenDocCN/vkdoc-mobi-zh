    ## 6.1 新冠疫情下的智慧出行


    新冠疫情爆发引起了广泛担忧，也给出行服务提供商带来了经济困难。这场疫情影响了出行系统和服务的方方面面。全球轿车和卡车销量大幅下滑，主要原因是经济不确定性。2020
    年 4 月，美国、欧洲和中国的汽车销量与 2019 年 4 月相比，分别下降了 52%、80%和 3%（Collie 等人，2021）。在加拿大，2020
    年 4 月汽车销量惊人地下滑了 74.6%；在英国，销量更是不可思议地下跌了 97%——全国范围内整个月仅向私人车主售出 4300 辆汽车（Stoddart，2020）。此外，多家公司决定剥离部分非核心业务，以求尽快提升盈利能力。例如，优步出售了其共享单车业务
    Jump，通用汽车关闭了 Maven 汽车共享服务和 ARV 电动自行车业务，而福特和林肯则取消了由 Rivian 提供动力的电动汽车项目。由于封锁期间的出行限制，以及向在线学习、虚拟会议和居家办公新常态的极大转变，公共交通的使用量也大幅下降。此外，公共交通无法保证安全的物理距离和环境卫生。例如，自安大略省于
    3 月中旬宣布进入紧急状态以来，多伦多市的**多伦多交通委员会（TTC）**客流量降至其常规水平的不到 20%（Boisvert，2021）。根据多伦多大学进行的一项调查（Palm
    等人，2020），5%的受访者表示他们会在该省三阶段重启计划的第一阶段恢复使用公共交通，而 63%的人表示会在第三阶段恢复使用。Statista 显示，由于对航班、公共汽车、火车和拼车服务的需求大幅锐减，2020
    年欧洲出行服务收入因此次疫情急剧下降（Statista 研究部门，2021）。租车巨头赫兹公司在 2020 年 4 月全球收入较 2019 年同期下降 73%后，于
    2020 年 5 月正式申请破产。疫情也因生产停工影响了原始设备制造商的供应商。例如，汽车行业塑料部件生产商 Techniplas 于 2020 年 5 月以新冠疫情等问题为由申请破产。最引人注目的是，LATAM、维珍澳大利亚航空、Avianca、RavnAir、意大利航空、Jet
    Time 和 AtlasGlobal 等多家主要航空公司因新冠疫情申请破产、停止运营或倒闭。


    尽管新冠疫情对城市出行中的汽车销售、汽车租赁和公共交通产生了上述深远影响，但在共享出行和最后一英里配送服务方面，影响却显著不同：前者受到负面影响，而后者则受到正面影响。以下小节将详细解释新冠疫情如何影响智慧出行的这两个领域。


    ### 6.1.1 新冠疫情对共享出行的影响


    为抗击新冠疫情，世界各国政府实施了严格的封锁措施，导致人员流动性急剧下降，个人交通也因此大幅减少（Hattrup-Silberberg 等人，2020）。随着人们开始遵守社交距离和隔离准则，网约车和拼车等共享出行服务因其容易传播新冠病毒而吸引力下降，同时由于人员流动性急剧降低，尤其是在封锁和宵禁期间，其盈利能力也随之减弱。


    根据麦肯锡的一项调查（Andersson 等人，2020），45%的受访者将“降低感染风险”列为最高优先级，而疫情前这一比例仅为 14%。相比之下，最关心“到达目的地时间”的受访者比例下降了
    14%。同一项调查还显示，认为公共交通和共享出行是安全的受访者寥寥无几。另一项由 CarGurus 进行的调查（Gurus，2020）显示，近 40%的美国人希望减少或不使用出租车/拼车服务，而
    49%的人则表示会增加使用私家车。在中国，根据 Second Measure 的调查（Future Bridge，2021），66%的中国消费者表示新冠疫情后偏好使用私家车通勤，而疫情前这一比例为
    34%。疫情期间，人们在优步和 Lyft 等网约车服务上的支出减少了 21%，在受新冠疫情重创的城市，优步的出行量下降了 70%（Future Bridge，2021）。优步
    2020 年第二季度末的财务报告显示，其总收入同比下降 29%，出行收入同比下降 67%，导致亏损 8.37 亿美元，较去年增加 28%（Uber，2020）。尽管网约车服务有所减少，但像共享单车这样的共享微出行服务使用量却相对增加，因为这些服务提供了开放空间且人际接触有限。


    鉴于大多数共享出行服务要求人们在狭小封闭的空间内共处，这增加了聚集和相互接触的机会，此类交通方式会增加病毒在人与人之间以及物与人之间的传播可能性。人与人传播涉及在封闭环境中吸入病毒颗粒，而物与人传播则涉及接触受污染的表面。这就是为什么由于担心被陌生人感染，选择使用共享出行服务的用户越来越少。为确保乘客安全并保证共享车辆的卫生，网约车/出行服务公司/交通网络公司（TNCs）及共享出行服务提供商正在实施非常具体的指导方针和严格的公共卫生措施。这些措施包括强制要求司机和乘客佩戴口罩、使用防护屏、在座椅之间设置物理屏障、控制拼车允许的乘客数量或取消共享出行服务、使用接触者追踪、使用前进行体温扫描、为司机提供消毒用品，以及每次使用后进行彻底消毒。例如，滴滴正在推广在车内使用防护屏（Future
    Bridge，2021）。优步和 Lyft 已取消共享出行服务，只允许用户为自己单独叫车。此外，多家出行服务商投资了旨在保证车辆安全和卫生的新技术。例如，抗菌涂层、抗菌表面防护屏、防止细菌和其他病毒进入车内的空气过滤系统、使用纳米银技术的空气净化系统，以及诸如紫外线（UV）-C
    照射（200–280 nm）等非接触式消毒系统。这种 UV-C 可以消灭有害病毒而不伤害人体。一种名为“Liquid Guard”的基于二氧化硅的纳米涂层，具有尖锐的突起结构和恒定的正电荷，被用于名为“COVID
    适应型摩托车共享服务（CAMS）”的欧洲项目中。CAMS 项目探索了纳米技术在 SEAT 摩托车共享服务中物理去除新型冠状病毒的适用性，以此作为推广“无病毒”摩托车共享服务的一种方式。该涂层能够吸引带负电的细胞膜，穿透并消灭其结构包含细胞膜的细菌、真菌、孢子以及病毒。Liquid
    Guard 已针对其对大肠杆菌、甲型流感以及包括 SARS-CoV-2 在内的某些冠状病毒的有效性进行了测试。所有这些措施都增加了共享出行服务的运营成本，导致其利润低于疫情前。

