  trans: '

    多家配送公司已实施针对个人防护装备和无接触配送的新规程，以降低病毒传播的潜在风险。这些公司正在大量投资消毒物资以及手套、口罩等员工防护设备，以减少物传人风险。疫情期间，多家零售店被改造成本地订单履行中心或暗店，以满足客户需求。为应对人际传播，亚马逊除了提供“前廊投递”的定时配送选项外，还为客户推出了“无人值守配送”选项。优食同样采用了“放在门口”的无接触配送方式作为客户可选方案。然而，在最后一公里配送中，常见的难题包括难以找到正确的取货点和卸货点（例如主入口、停车场入口或服务门）、停车罚单，以及将包裹送错人或送错地址。根据
    Mapillary 的物流测绘报告，超过 95%的司机面临地图不准确的问题，超过 71%的司机需要花费 4 到 10 分钟以上的时间来寻找确切的卸货位置。在纽约这样的城市，承运商每年通常要支付数百万美元的停车罚单。例如，联邦快递在
    2018 年支付了 1490 万美元的罚款，而联合包裹服务公司支付了 3380 万美元。错送和误送是最后一公里配送服务中频繁出现的问题。如果配送工人在时间压力下处理多个包裹，错送或误送的频率就会增加。这些问题在一些特定的最后一公里配送领域（如向多单元住宅楼送药和送餐）中更为棘手。


    错送问题导致客户不满、品牌形象受损，并增加了配送服务提供商的配送成本。根据美国邮政监察长办公室对邮政服务数据的分析（RARC，2017），错送是所有配送客户（集中配送客户、中小型企业客户以及
    25-34 岁客户）最担忧的问题。由于配送失败，配送服务提供商必须向客户退还配送费，支付额外的重新配送费用，有时还需要为客户提供折扣作为道歉以挽留客户，因为
    84%有过糟糕配送体验的客户不会再次从该零售商处购物（Magento，2018）。


    在 2020 年的全美零售联合会、零售业领导者协会、LINK 和 Shoptalk 等行业活动中，客户留存率和利润率是零售商最关心的问题。然而，尽管存在两个关键事实——84%有过糟糕配送体验的客户不会再次从该零售商处购物，以及最后一公里运输成本占运输总成本的
    53%——大多数品牌在最后一公里配送方面仍然是被动应对。品牌必须认识到配送是一个关键的接触点，评估可用的杠杆以影响增长并推动健康的盈利。2018 年，美国运送了
    135 亿个零售包裹。其中多达 11.5%的已运送包裹出现了异常情况，从损坏、地址错误到单纯的天气延误。重新运送一个包裹的成本可能会抵消许多其他销售的利润，同时让可能再也不回头的客户失望，从而指数级地放大对业务的负面影响。如此多的异常情况都是可以解决的，而负面后果也是可以避免的。希望保持利润率和留住客户的零售商需要在配送问题影响到购物者之前采取行动。


    一种知情交付平台用于以数字方式提前通知用户即将送达的实体邮件，并允许用户报告那些已在电子邮件中预览但实际未收到的邮件。然而，该系统仅限于正确配送的情况，无法处理错送案件。不准确的卸货地址、缺乏高清地图、配送工人（尤其是零工经济工人）所使用的公开和基于手机定位服务精度的限制，以及缺乏经验的配送工人的人为失误，是错送的主要根本原因。


    ## 后疫情时代的智能出行


    随着新疫苗的推出，到 2021 年底，生活将逐渐恢复到新冠疫情前的一定程度的常态，预计届时市场也将复苏。这场疫情是对出行公司和出行服务提供商韧性的巨大考验。疫情期间，主要的出行企业采取了防御性的危机管理策略，通过建立专门的安全规程并实施严格的紧缩措施以保存现金，从而保持韧性，确保员工和客户的安全。


    关于新冠疫情对出行系统和服务的短期、中期及长期影响，存在诸多不确定性。展望后疫情时代是一个极其复杂的问题，涉及多种因素对智能出行技术和商业模式的成败产生影响。随着预计的逐步恢复正常化，以下小节总结了对后疫情时代智能出行系统和服务的一些推测。


    ### 通勤模式


    新冠疫情可能会永久性地改变通勤模式。即使疫情消退，一些员工也可能继续将居家办公作为新常态。根据 Statista（Statista 研究部门，2021）进行的一项调查，近三分之二的雇主表示，其部分员工在疫情后将继续永久性地远程办公。几家公司打算无限期允许员工在家办公（Paul，2020）。这将为城市更好地利用空间（例如，将停车场改造成绿地，使城市更适宜步行）和更好地管理交通创造开放机会。疫情展示了微出行和步行/主动出行作为避免病毒传播方式的价值。疫情期间，许多人用所谓的“假装通勤”或“模拟通勤”（如绕街区散步或骑车）取代了疫情前的日常通勤。在后疫情时代，政府可能会加大投资，使骑自行车和步行成为可行的选择。据波士顿咨询集团（Bert
    等，2020）称，英国宣布了一项 20 亿英镑的一揽子计划，将骑行和步行置于英国后疫情交通计划的核心——部分意图是为了保护公共交通网络。此外，米兰将 35
    公里长的街道重新规划为仅供自行车和行人使用。


    ### 共享出行


    在后疫情时代，对共享出行的需求可能会缓慢恢复（Future Bridge，2021）。人们可能更不愿意冒险使用共享出行和公共交通来危害健康。根据 Statista
    的一项调查（Statista 研究部门，2021），美国的调查受访者绝大多数都表示，在疫情期间及之后，他们首选的个人出行方式是私家车。然而，麦肯锡未来出行中心预计，包括公共交通在内的共享出行解决方案将在疫情后反弹，并继续占据更大的市场份额（Hausler
    等，2020）。

    '
- fmt: '### 6.2.3 Last-Mile Delivery


    In the post-pandemic future, ecommerce will likely continue to grow but not at
    the same incredibly high rate observed during the pandemic. The increasing tendency
    toward online shopping and the permanent closure of several restaurants, theaters,
    and other attractions will also likely contribute to increased demand for last-mile
    delivery services. This behavior will be ever-lasting in the post-pandemic world.
    As more people experienced the convenience associated with online shopping and
    contactless last-mile delivery services during the pandemic, last-mile delivery
    will be more important than ever. This growing interest in last-mile delivery
    will accelerate innovation in this field making last-mile delivery services more
    capable of handling challenging aspects such as surge in ecommerce, health, safety,
    theft, failed deliveries, and misdeliveries.


    ### 6.2.4 Electric Vehicles


    During the COVID-19 pandemic, the only segment of the car market that witnessed
    growing was electric vehicle sales. The pandemic caused a 20% drop in global light
    vehicle sales in 2020, to about 70 million. However, global sales of electric
    cars accelerated fast in 2020, rising by 43% to more than 3 million during the
    coronavirus pandemic according to `ev-volumes.com`. JP Morgan expects electric
    vehicle sales in China to grow by up to 30% as China’s economy recovers from the
    effects of the pandemic. Cheaper batteries and longer-range vehicles, rather than
    government subsidies, are driving the growth according to JP Morgan analysts.
    The increasing societal interest in environmental issues will be another driver
    for electric vehicle market growth. COVID-19 has been a catalyst for interest
    in environmental issues and increased consumer interest in battery-electric vehicles.
    According to McKinsey’s survey, more than 70% of survey respondents stated that
    delivery of goods should shift from vehicles with ICE to `BEVs` or `H2EVs` (also
    known as hydrogen fuel cell plug-in hybrid electric vehicles) for long-haul trucking
    and intracity transport and 40% of the respondents are even willing to pay a premium
    to enable this shift (Garibaldi et al., 2020).


    ### 6.2.5 Automated Driving Vehicles


    In the post-pandemic era, transition to automated driving vehicles like robo taxis
    and delivery robots will likely accelerate as these vehicles support physical
    distancing in people mobility and contactless last-mile delivery. According to
    a recent McKinsey’s survey, the number of North American respondents stating that
    they would be extremely or somewhat likely to take deliveries from autonomous
    vehicles increased from 18% to 28% (Garibaldi et al., 2020).


    ### 6.2.6 Work Strategy


    In the post-pandemic world, mobility players will have to apply offensive tactics
    and may have to update their outdated operating strategies in the future for better
    agility as a way to face the expected recession and to reset the business.


    ### 6.2.7 Digital Transformation


    After the COVID-19 pandemic, digital transformation is no longer an option, and
    every company will be very soon in one way or another a digital company. This
    will result in broad adoption of digital technology and digital innovation. For
    example, the COVID-19 pandemic has forced automakers worldwide to pivot and adapt
    the way they sell their vehicles at a fast pace. In order to achieve this objective,
    several players started to develop digital go-to-market (`GTM`) strategies and
    tools. Online shopping has become the go-to solution as a car-buying process in
    many places and as a way to replace the time-consuming showroom visits with a
    few minutes of online purchase. Besides Tesla, several other automakers and dealers
    launched online shopping platforms. Examples include `GMC Shop-Click-Drive`, `Nissan@Home`,
    and `EZ Purchase Online`. Tesla also plans to accept payments in cryptocurrency
    like Bitcoin. According to `Google Think Auto 2020`, 29% of car buyers would consider
    buying their next car online, and 40% of the Millennials are very certain about
    buying their next car online. Eighty-eight percent of Millennials reported that
    they had first discovered the vehicle they purchased “online.” An auto financing
    survey conducted by McKinsey (Kempf et al., 2021) shows that online business–to–consumer
    sales for auto loans and leasing in the European market is expected to reach a
    market share of approximately 20–25% by 2025 reflecting the shift toward financing
    vehicles through digital channels. While these digital tools create opportunities
    to shop in new ways, the new norm in the post-pandemic era will be very likely
    a hybrid blending of online and store shopping.


    ### 6.2.8 Open Innovation


    Innovation requires huge investment that is sometimes behind the capability of
    a single company due to austerity measures taken during the times of uncertainty.
    Companies are now more open to adopt open innovation policies through partnership.
    The McKinsey Center for Future Mobility (Heineke et al., 2021) shows that more
    than 420 partnerships in the area of self-driving vehicles, connected cars, electrified
    vehicles, and shared mobility have been concluded in 2020 compared to 110 in 2015.
    For example, Bosch came into collaboration with Microsoft in February 2021 to
    work on a software platform for vehicles. Toyota and Denso entered into a partnership
    with Aurora to design and build a fleet of autonomous taxis based on the Sienna
    minivan. Moreover, Cruise and GM announced in early 2021 a long-term, strategic
    relationship with Microsoft to further accelerate the commercialization of Cruise’s
    all-electric, self-driving vehicles. The three companies will combine their expertise
    in software, hardware engineering, cloud computing capabilities, and manufacturing.
    In the post-pandemic era, companies will expand collaboration and partnership
    and will work together more frequently to build and expand innovative ecosystems.


    ### 6.2.9 Sustainable Development


    This pandemic has shown us and the world leaders the urgent need to invest more
    in sustainable development. The pandemic may accelerate the transition toward
    sustainable mobility as world leaders start to pay more attention to sustainable
    development. The Great Reset initiative launched by the World Economic Forum (`WEF`)
    provides an opportunity to shape the recovery and to rebuild society and the economy
    in a more sustainable manner. One of the goals of the Great Reset initiative is
    to ensure that investments advance shared goals, such as equality and sustainability.
    This means that governmental recovery funds and investments from private entities
    and pension funds should be directed toward building “green” urban infrastructure
    and creating incentives for industries to improve their track record on environmental,
    social, and governance (`ESG`) metrics. This road map has the potential to amplify
    the mobility industry’s focus on sustainability and increase e-mobility investment
    and sales in the post-pandemic era.


    ### 6.2.10 Global Solutions to Global Challenges


    The COVID-19 pandemic played a decisive role in human evolution and created an
    unprecedented spirit of collaboration in the global science and technology communities
    and showed the need for open source knowledge, information, and data, resource
    sharing, and global solutions to the global challenges as a new norm in the post-pandemic
    world.'
  raw: '### 6.2.3 Last-Mile Delivery


    In the post-pandemic future, ecommerce will likely continue to grow but not at
    the same incredibly high rate observed during the pandemic. The increasing tendency
    toward online shopping and the permanent closure of several restaurants, theaters,
    and other attractions will also likely contribute to increased demand for last-mile
    delivery services. This behavior will be ever-lasting in the post-pandemic world.
    As more people experienced the convenience associated with online shopping and
    contactless last-mile delivery services during the pandemic, last-mile delivery
    will be more important than ever. This growing interest in last-mile delivery
    will accelerate innovation in this field making last-mile delivery services more
    capable of handling challenging aspects such as surge in ecommerce, health, safety,
    theft, failed deliveries, and misdeliveries.


    ### 6.2.4 Electric Vehicles


    During the COVID-19 pandemic, the only segment of the car market that witnessed
    growing was electric vehicle sales. The pandemic caused a 20% drop in global light
    vehicle sales in 2020, to about 70 million. However, global sales of electric
    cars accelerated fast in 2020, rising by 43% to more than 3 million during the
    coronavirus pandemic according to ev-volumes.com. JP Morgan expects electric vehicle
    sales in China to grow by up to 30% as China’s economy recovers from the effects
    of the pandemic. Cheaper batteries and longer-range vehicles, rather than government
    subsidies, are driving the growth according to JP Morgan analysts. The increasing
    societal interest in environmental issues will be another driver for electric
    vehicle market growth. COVID-19 has been a catalyst for interest in environmental
    issues and increased consumer interest in battery-electric vehicles. According
    to McKinsey’s survey, more than 70% of survey respondents stated that delivery
    of goods should shift from vehicles with ICE to BEVs or H2EVs (also known as hydrogen
    fuel cell plug-in hybrid electric vehicles) for long-haul trucking and intracity
    transport and 40% of the respondents are even willing to pay a premium to enable
    this shift (Garibaldi et al., 2020).


    ### 6.2.5 Automated Driving Vehicles


    In the post-pandemic era, transition to automated driving vehicles like robo taxis
    and delivery robots will likely accelerate as these vehicles support physical
    distancing in people mobility and contactless last-mile delivery. According to
    a recent McKinsey’s survey, the number of North American respondents stating that
    they would be extremely or somewhat likely to take deliveries from autonomous
    vehicles increased from 18% to 28% (Garibaldi et al., 2020).


    ### 6.2.6 Work Strategy


    In the post-pandemic world, mobility players will have to apply offensive tactics
    and may have to update their outdated operating strategies in the future for better
    agility as a way to face the expected recession and to reset the business.


    ### 6.2.7 Digital Transformation


    After the COVID-19 pandemic, digital transformation is no longer an option, and
    every company will be very soon in one way or another a digital company. This
    will result in broad adoption of digital technology and digital innovation. For
    example, the COVID-19 pandemic has forced automakers worldwide to pivot and adapt
    the way they sell their vehicles at a fast pace. In order to achieve this objective,
    several players started to develop digital go-to-market (GTM) strategies and tools.
    Online shopping has become the go-to solution as a car-buying process in many
    places and as a way to replace the time-consuming showroom visits with a few minutes
    of online purchase. Beside Tesla, several other automakers and dealers launched
    online shopping platforms. Examples include GMC Shop-Click-Drive, Nissan@Home,
    and EZ Purchase Online. Tesla also plans to accept payments in cryptocurrency
    like Bitcoin. According to Google Think Auto 2020, 29% of car buyers would consider
    buying their next car online, and 40% of the Millennials are very certain about
    buying their next car online. Eighty-eight percent of Millennials reported that
    they had first discovered the vehicle they purchased “online.” An auto financing
    survey conducted by McKinsey (Kempf et al., 2021) shows that online business–to–consumer
    sales for auto loans and leasing in the European market is expected to reach a
    market share of approximately 20–25% by 2025 reflecting the shift toward financing
    vehicles through digital channels. While these digital tools create opportunities
    to shop in new ways, the new norm in the post-pandemic era will be very likely
    a hybrid blending of online and store shopping.


