    been applied during the pandemic in all aspects of our life, and mobility was
    not an exception. Measures have to be taken to protect digital rights, stop the
    surveillance once the pandemic is over, and ban new totalitarianism of surveillance
    technology and digital totalitarian states or digital Leninism.'
  trans: '

    ## 6.3 征程远未结束


    与其他任何技术一样，智能出行技术也有其光明面和阴暗面。由于人为失误导致的事故减少、交通拥堵和排放降低、效率、舒适性、便利性、可负担性和包容性的提升，以及共享经济、零工经济和乘客经济等新商业模式带来的经济优势增加，都是智能出行光明面的例证。然而，智能出行技术的某些阴暗面也需要妥善解决，才能充分发挥这些技术的潜力。对就业、隐私和网络安全的影响是其中的关键问题，下文将详述。


    ### 6.3.1 就业


    在人员与货物出行系统中，大部分任务可归类为常规体力或常规认知任务。从事任何 4D（危险、枯燥、肮脏、愚蠢）任务的人员将受到智能技术的负面影响。然而，智能出行有可能创造新业务并创新现有业务，从而提高生产力和服务质量（Khamis
    等人，2019）。这将催生对高技能工人的强劲需求，例如算法开发人员、程序员、数据分析师、机器学习专家、机器人工程师、技术专家、无人机飞行员、系统工程师、市场分析师、业务开发人员以及市场营销和服务人员。然而，这些职业类别要求人们提升自身技能，以具备足够的竞争力并准备好胜任这些非常规认知工作。智能出行已经开启了基于共享经济创建新商业模式的大门，这种模式用互助安排取代所有权，以增加收入，有时还能创造就业机会。诸如`Uber`和`Lyft`等数字共享出行平台，即基于共享经济商业模式，该模式密集使用人工智能算法进行车辆部署、路线规划、实时追踪、动态定价以及司机和乘客评分。得益于这种模式和技术，像`Uber`和`Lyft`这样的几家出行网络公司成功建立了一个基本由供需调节、并创造了数百万个就业岗位的汽车租赁服务市场。根据*麻省理工科技评论*（Condliffe，2017）的说法，在`Uber`进入其服务的每个城市后，自雇司机数量激增了
    50%，而受雇的常规出租车司机数量也有小幅增长。`Uber`声称其纽约市司机的平均年收入超过 9 万美元（Rogers，2015）。如前一章所述，基于零工经济模式，已经创建了多种按需的“最后一英里”配送服务。为了提供当日达、即时达等服务，特别是针对食品、杂货和药品，配送服务提供商开始更多地依赖零工劳动力进行众包配送，以处理大部分配送任务。COVID-19
    疫情突显了这种替代劳动力在应对网购急剧增长时的重要性。关于零工经济模式作为后疫情时代唯一收入来源的可持续性，仍存在争议。关于智能出行技术可能造成的结构性失业，以及这些技术基于共享和零工经济模式创造的替代工作机会，仍需进行更正式的研究。


    ### 6.3.2 隐私


    数据是智能出行系统中使用的感知和自动决策算法的食粮。服务提供商需要无形且被动地收集个人数据，有时这种收集是作为另一项服务的副产品发生的。我们几乎已经失去了隐私，被网络客户端、互联网服务提供商、手机服务提供商、代理机构等追踪。我们无法决定谁访问我们的数据、何时访问以及出于何种目的。牺牲隐私是个人技术的阴暗面之一。德勤提出了一些隐私问题，包括：车辆制造商是否拥有这些数据？购买、借用或仅仅是该车辆乘客的人呢？我们的法律体系如何一致地定义所有权？当车辆跨越管辖边界时会发生什么？警察机构如何处理涉及事故的联网车辆的日志？在车辆生命周期结束时，谁负责清除过时的数据记录器（Leon
    Nash 和 Hillaker，2020）？这些担忧适用于所有联网、自动化和共享出行技术。如第 4 章所述，车辆到电网（V2G）技术可以通过让电动汽车车主将电池中的能量回馈给电网而获利，从而帮助提高电动汽车的可负担性。然而，数据隐私和网络安全仍是
    V2G 面临的挑战。保证透明度（为何要共享数据？）、信任（与谁共享数据？）和价值（共享数据有何好处？）有助于 V2G 技术被社会接受。欧盟通用数据保护条例（GDPR）旨在保护欧盟境内的数据和隐私。加利福尼亚州消费者隐私法案（CCPA）也是朝着加强加州居民隐私权和消费者保护迈出的重要一步。然而，应该制定更多全球性的措施和法规来保护隐私并强制执行数字权利。例如，疫情期间，各种接触追踪、人员追踪和监控技术应用于我们生活的方方面面，出行也不例外。必须采取措施保护数字权利，在疫情结束后停止监控，并禁止监控技术的新型威权主义以及数字威权国家或数字列宁主义。'
- fmt: '### 6.3.3 Cybersecurity Attacks and Physical Attacks


    `NHTSA` defines cybersecurity, within the context of road vehicles, as the protection
    of automotive electronic systems, communication networks, control algorithms,
    software, users, and underlying data from malicious attacks, damage, unauthorized
    access, or manipulation. The proliferation of technologies embedded in smart mobility
    systems opens the door to serious cyber threats and increases the potential of
    cyber-attacks. Ransomware infections, data breaches leading to the exfiltration
    of personally identifiable information, and unauthorized access to enterprise
    networks are among major self-driving vehicle cybersecurity concerns identified
    by the `FBI`. Deloitte highlighted two potential attacks in future mobility systems:
    hacking into manufacturer-to-vehicle communications and hijacking vehicle controls
    and sensors (Leon Nash and Hillaker, 2020). For example, attackers might conceivably
    have surreptitiously installed a surveillance device, leaving a transceiver to
    extract customer data or inject malicious data into the vehicle network, according
    to Deloitte. They can also steal sensitive vehicle data such as performance statistics
    or cryptographic keys. Hackers may also intend to gain control over safety-critical
    features such as steering, braking, propulsion, and OTA updates. Hackers can spoof
    traffic data to mess with traffic lights causing traffic jams and unnecessary
    rerouting. Michigan researchers were able to gain control of traffic lights to
    prove that an adversary can control traffic infrastructure to cause disruption,
    degrade safety, or gain an unfair advantage (Ghena et al., 2014). Cybersecurity
    vulnerabilities and mitigation efforts are summarized in Parkinson et al. (2017).


    Other types of attacks may include robojacking, bullying behavior, or other unpredictable
    behaviors some people may show when they interact with smart mobility technologies.
    A pedestrian may seek to bully a self-driving zero-occupant vehicle (`ZOV`) through
    adversarial behavior or deceptive/cheating behavior such as showing rude gestures
    or stopping on the crosswalk in front of the vehicle for a long time. Other robojackers
    may try to vandalize the vehicle or steal high-value cargo from inside the vehicle.
    In a mixed traffic scenario, human drivers may show mischievous behavior and try
    to bully self-driving vehicles by driving erratically near them or zigzagging
    down the highway, weaving in and out of a self-driving platoon (Lipson and Kurman,
    2016). Cheating on a mapping service or other `GIS` apps is another form of attack
    that can cause disturbance in the mobility systems. In February 2020, Simon Weckert
    managed to cheat on `Google Maps`’ `AI` algorithm by creating fake traffic using
    a cart full of 99 phones with `Google Maps`’ navigation turned on down the streets
    of Berlin creating massive traffic jam, even though there were zero cars on the
    road.


    The United Nations Economic Commission for Europe (`UNECE`) developed regulations
    to improve automotive cybersecurity and software update management (United Nations,
    2002). These regulations require automakers to implement measures to manage vehicle
    cybersecurity risks, secure vehicles by design to mitigate risks along the supply
    chain, and detect and respond to security incidents across the vehicle fleet and
    provide safe, secure software updates that do not compromise vehicle safety. Connected
    mobility stakeholders consider cybersecurity as a key to enable advanced communications
    and safety features. Robust authentication and authorization are provided to facilitate
    access to the vehicle using secured digital keys. Data encryption and anonymization
    are used to guarantee both the safety of the vehicle against cyber-attacks and
    the privacy of the occupants. Analysis of the data collected in an encrypted environment
    enables timely detection, recognition, and identification of malicious cyber-attacks
    that can lead to abnormal traffic signal behavior, vehicle tampering or intrusion,
    abnormal driving, and so on.


    ## 6.4 Summary


    I hope to have convinced you that smart mobility is the promotion of sustainable
    mobility that guarantees seamless access to different modes of mobility and enables
    people or cargo to get from one place to another in a way that is safe, clean,
    and most efficient (fast, convenient, comfortable, productive, and cheap). There
    are two take-home messages of this book. The first message is that the future
    mobility is people-centric, software-defined, connected, and electric. The second
    main message emphasizes on the fact that the widespread and the societal acceptance
    of smart mobility technologies will depend not only on the maturity of the technology
    but also on the availability of a well-developed governance framework and proper
    city planning to accommodate these evolving technologies. Mobility technologies
    are getting smarter, and we need to be much smarter than we have been in the past
    to properly regulate, accommodate, and correctly use these emerging technologies.'
