  trans: '

    ## 4.6 主动、轻柔或零冲击出行


    除了作为流行的休闲活动，步行和骑行也是高效、经济、环保且便捷的主动出行方式。许多发达国家大力提倡短途出行从机动车转向非机动车。此外，千禧一代或 Y 世代通常选择定居在有利于步行、骑行及其他主动出行方式的密集城区。主动、轻柔或零冲击出行包括非机动的人力交通工具，如步行、脚踏自行车、滑板车、轮滑、滑板以及脚踏三轮车。这些出行方式在城市"第一/最后一公里"出行中是一种廉价、有趣且环保的选择。主动出行无疑可以朝着可持续出行的未来迈进一步。


    **重要提示**


    根据国家环境健康合作中心（NCCEH）进行的一项研究，步行、骑行及其他主动交通方式的更广泛益处包括：减少道路拥堵和温室气体排放；降低基础设施（含维护成本）；提升道路安全；以及相比机动车更低的用户成本（Reynolds
    等，2010）。


    《步行性通论》指出，步行旅程应满足四个主要条件：有用、安全、舒适且有趣（Speck，2014）。基于多种因素提出了不同的步行性衡量指标，例如：连续且维护良好的人行道、通用无障碍特性、路径直达性和街道网络连通性、平面交叉口处理的安全性、无重型及高速车流、行人隔离或与车流的缓冲、土地利用密度、建筑与土地利用多样性或混合程度、行道树与景观美化、视觉趣味性，以及根据当地条件界定的场所感和实际或感知的安全感（Lo，2009）。例如，在美国、加拿大和澳大利亚，`Walk
    Score` 用于衡量城市步行性。根据 `Walk Score`，温哥华、蒙特利尔和多伦多是 2020 年加拿大最适宜步行的城市。纽约在美国榜单中名列榜首，总分为
    88.3 分（满分 100 分），旧金山紧随其后。


    如今，带有运动传感技术的可穿戴设备被用于监测与出行相关的活动。可穿戴技术定义为能够佩戴或贴合人体皮肤，以持续、近距离监测个体活动，且不中断或限制用户动作的设备（Haghi
    等，2017）。智能手机、智能手表、智能戒指、智能手环、智能腕带或头带以及健身追踪器都是这类带有运动传感技术的可穿戴设备的例子。多款步行应用程序能够提供步行导航；追踪用户的步行锻炼、全天步数或活动；并显示其速度、行进距离和路线。这些应用的例子包括
    `RideScout`、`Walkmeter Walking & Hiking GPS`、`MotionX-GPS`、`Virtual Walk`、`MapMyWalk`、`Argus`、`Fitbit
    app MobileTrack`、`Endomondo` 和 `Charity Miles`。`WALKscope` 也是一种众包工具，丹佛居民用它来收集与步行性相关的数据，例如街道信息——人行道状况、交叉口以及行人计数。


    在许多情况下，对于城市区域内最长 10 公里的距离，骑行可以成为所有出行方式中点到点最快的（MMM Group，2016）。创新的自行车相关技术改善了骑行体验。这些技术包括运动传感、性能监测、座椅检测、健身规划、行程规划等。智能自行车配备了传感器，可以持续收集生理和性能数据，例如速度、功率输出、脚踏压力、车架状况、心率、温度、湿度等。智能自行车头盔配有内置尾灯、扬声器、麦克风和蓝牙连接功能。`Strava`、`Zwift`、`Komoot`、`Cyclemeter
    GPS`、`ViewRanger`、`Map My Ride GPS Cycling & Route Tracker`、`Bikemap` 和 `Google
    Maps` 是帮助骑行者充分利用其骑行时间的移动应用程序示例。除了检测汗液中的葡萄糖、乳酸盐、钠和钾，或基于皮肤电活动或皮电反应（GSR）的传感器外，皮肤温度也可用于检测出汗。特殊服装可以使用基于生物电阻抗矢量分析（BIVA）的水合传感器来监测骑手的水合状态。


    世界各地许多城市通过多种项目推广主动出行。例如，布鲁塞尔出行局发起了海报宣传 `#BlijvenTrappen`（“持续踩踏”）活动，并临时免费提供该市 `Villo`
    计划中的共享自行车，吸引了 7000 名新用户。根据 `Copenhagenize Index`，哥本哈根被列为 2019 年全球最适宜骑行的城市。`Copenhagenize
    Index` 是对全球最适宜骑行城市进行的全面整体排名。62%的哥本哈根居民骑车上下班或上学，政府在自行车基础设施上的人均投资超过 45 美元（Colville-Andersen,
    2015）。然而，根据 `2019 年自行车城市指数`，荷兰城市乌得勒支是全球最适宜骑行的城市。北美城市未能进入前十名，蒙特利尔是排名最高的加拿大城市（全球第
    16 位），旧金山是排名最高的美国城市（全球第 39 位）。


    欧盟资助的 `LAirA`（陆侧机场可达性）项目专注于多模式、智能和低碳的机场接驳。该项目鼓励将主动出行（步行、骑行等）作为前往机场的选择。适用于步行和骑行的健康经济评估工具（`HEAT`）在
    Kahlmeier 等人（2017）的著作中被描述为一种用户友好且基于可靠证据的决策工具，供交通和城市规划者使用，使得在交通评估中能够纳入体力活动的益处。`Urbano`
    是另一种在城市设计中推广主动出行的工具（Dogan 等，2020）。该工具除了扩展版的知名指标 `Walkscore` 之外，还引入了两个新的城市设计指标，称为
    `Streetscore` 和 `Amenityscore`。


    ## 4.7 包容性出行


    世界卫生组织（WHO）估计，有 11 亿人（占世界人口的 14.1%）患有某种形式的残疾。这代表了世界上最大的少数群体，也是我们任何人随时都可能加入的唯一少数群体。全球估计有
    4.66 亿人患有致残性听力损失，预计到 2050 年，这一数字将上升到每四人中就有一人。全球范围内，各年龄段视力受损的人数估计为 2.85 亿，其中 3900
    万人失明。每天有 7500 万人需要轮椅。这几乎占世界人口的 1%。约有 2 亿人存在智力障碍（智商低于 75）。这占世界人口的 2.5%以上。根据美国疾病控制与预防中心（CDC）的数据，美国有
    6100 万成年残疾人，超过四分之一的美国成年人（以及约五分之二的 65 岁及以上成年人）患有某种残疾（美国疾病控制与预防中心等，2019）。此外，大多数人在生命中的某个阶段都可能会经历行动障碍（Davidson
    和 Viita，2020）。"敞开大门组织"声称，美国超过 60%的残疾人在出行时遇到重大障碍。由于生育率下降和预期寿命延长，人口老龄化也是一个日益加剧的现象。例如，像意大利这样的国家，到
    2050 年，超过 35%的人口将超过 85 岁（Tapus 等，2007）。随着年龄增长，交通选择往往会变得更加有限（Davidson 和 Viita，2020）。

    '
- fmt: '# Inclusive Mobility: A Comprehensive Overview


    Inclusive mobility aims at facilitating the mobility of frail seniors and physically
    challenged individuals. This matches with the concept of “Complete Trip”^([^(24)](#fn24))
    defined by the US Department of Transportation (USDOT). `Complete Trip` refers
    to the seamless journey from a traveler’s origin to destination, regardless of
    the number of modes, transfers, or connections. The success of a complete trip
    can be defined in terms of an individual’s ability to go from origin to destination
    reliably, spontaneously, confidently, independently, safely, and efficiently without
    gaps in the travel chain regardless of location, income, or disability.


    Several governmental and nongovernmental organizations are paying attention to
    inclusive mobility and work on policy-related aspects and legislation. For example,
    the USDOT’s Accessible Transportation Technologies Research Initiative (`ATTRI`)
    is leading efforts to develop and implement transformative applications to improve
    mobility options for all travelers, particularly those with disabilities (Martin
    et al., 2020). Under `ATTRI`, the USDOT has identified four application areas
    of interest that are common gaps in the `Complete Trip` travel chain. These four
    areas are Smart Wayfinding and Navigation Systems, Pre-trip Concierge and Virtualization,
    Robotics and Automation, and Safe Intersection Crossing. In January 2021, the
    US Department of Transportation announces over $41 million in awards for innovative
    technologies to improve transportation mobility and access for persons with disabilities
    through the “Complete Trip” program.


    The European Union funds several projects to support inclusive mobility. For example,
    the `INCLUSION` project^([^(25)](#fn25)) aims at understanding, assessing, and
    evaluating the accessibility and inclusiveness of transport solutions in European
    prioritized areas. This project identifies gaps and unmet needs and proposes and
    experiments with a range of innovative and transferable solutions, including ICT-enabled
    elements, ensuring accessible, inclusive, and equitable conditions for all and
    especially vulnerable user categories.


    The Canadian Disability Policy Alliance is a national collaboration of disability
    researchers, advocates, and policy makers, aimed at creating and mobilizing knowledge
    to enhance disability policy in Canada. One of these policies is related to mobility
    aids (specifically wheelchairs and scooters) for elderly and physically challenged
    individuals (McColl et al., 2015). The concept “barrier-free mobility” is highlighted
    in (Davidson and Viita, 2020) as a framework to guarantee accessible and independent
    mobility to all users including elderly and physical challenged individuals.


    ## Technical Components and User-Driven Approach


    The technical components of inclusive mobility systems should be explicitly conceived
    and designed as part of a “socio-technical” system that models both the human
    and machine domains within a single conceptual framework, following a user-driven
    approach instead of traditionally used technology-push and problem-focused approaches.
    Without a user-driven research approach, there is a danger that ill-conceived
    technologies will at best be irrelevant or inappropriate and at worst will reinforce
    some of the negative ageist assumptions that frame much of society’s response
    to aging and/or disability.


    This user-driven approach (Figure 4-3) can drive the specification, development,
    and deployment of the inclusive mobility system/platform in order to develop a
    mobility platform that will have practical benefits for users in their everyday
    lives.


    ## Benchmarking and Industry Initiatives


    The Disability Equality Index (`DEI`)^([^(26)](#fn26)) developed by Disability:IN
    is a comprehensive benchmarking tool that can help OEMs and mobility service providers
    build a road map of measurable, tangible actions that they can take to achieve
    disability inclusion. The Inclusive Mobility^([^(27)](#fn27)) program initiated
    by Volkswagen aims at directly engaging disability groups in the early stages
    of designing vehicle technologies and mobility services.


    ## Mobility Aids and Technologies


    Mobility aids for frail seniors and physically challenged individuals include,
    but are not limited to, wheelchairs and Personal Intelligent City Accessible Vehicles
    (`PICAVs`), smart laser shoes, GPS insoles and exoskeleton, or soft exosuits used
    in walking assistance. `PICAV` is an electrically powered one-person vehicle with
    specifically designed features for mobility-restricted people such as elderly
    and disabled people (Cepolina et al., 2011).


    Toyota’s e-Palette is an electric AV designed to accommodate up to four wheelchair-bound
    passengers with additional riders. May Mobility also develops low-speed, electric,
    wheelchair-accessible automated driving vehicles. Voyage is deploying automated
    driving shuttle services at The Villages, the largest retirement community in
    the world. At Haneda Airport in Tokyo, people with disabilities will be able to
    hail autonomous wheelchairs using a smartphone app that lets them select a destination,
    sit back, and relax (Scudellari, 2017).


    `Alinker` is a walk assist bike designed for people who have an illness or condition
    that impacts their mobility. Similarly `Ford GoBike` is designed for people with
    disabilities.


    ## Healthcare Transportation Services


    Moreover, mobility service providers started to pay more attention to healthcare
    transportation services. Healthcare transportation refers to any transportation
    to medical facilities that is non-emergency in nature (e.g., to medical appointments,
    to an urgent care facility, or being discharged from the hospital) (Wolfe and
    McDonald, 2020). Several non-emergency healthcare HIPAA-compliant transportation
    services are nowadays provided to individuals with mobility- or financially related
    barriers. Examples of these services include `Uber Health`, Blue Cross and Blue
    Shield and `Lyft`, `Cigna-HealthSpring` and `Lyft`, and `RIDE` paratransit services.


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig3_HTML.png](images/511013_1_En_4_Chapter/511013_1_En_4_Fig3_HTML.png)


    **Figure 4-3** - User-Driven Iterative Approach to Inclusive Mobility'
  raw: 'Inclusive mobility aims at facilitating the mobility of frail seniors and
    physically challenged individuals. This matches with the concept of “Complete
    Trip”^([^(24)](#fn24)) defined by the US Department of Transportation (USDOT).
    Complete Trip refers to the seamless journey from a traveler’s origin to destination,
    regardless of the number of modes, transfers, or connections. The success of a
    complete trip can be defined in terms of an individual’s ability to go from origin
    to destination reliably, spontaneously, confidently, independently, safely, and
    efficiently without gaps in the travel chain regardless of location, income, or
    disability. Several governmental and nongovernmental organizations are paying
    attention to inclusive mobility and work on policy-related aspects and legislation.
    For example, the USDOT’s Accessible Transportation Technologies Research Initiative
    (ATTRI) is leading efforts to develop and implement transformative applications
    to improve mobility options for all travelers, particularly those with disabilities
    (Martin et al., 2020). Under ATTRI, the USDOT has identified four application
    areas of interest that are common gaps in the Complete Trip travel chain. These
    four areas are Smart Wayfinding and Navigation Systems, Pre-trip Concierge and
    Virtualization, Robotics and Automation, and Safe Intersection Crossing. In January
    2021, the US Department of Transportation announces over $41 million in awards
    for innovative technologies to improve transportation mobility and access for
    persons with disabilities through the “Complete Trip” program. The European Union
    funds several projects to support inclusive mobility. For example, the INCLUSION
    project^([^(25)](#fn25)) aims at understanding, assessing, and evaluating the
    accessibility and inclusiveness of transport solutions in European prioritized
    areas. This project identifies gaps and unmet needs and proposes and experiments
    with a range of innovative and transferable solutions, including ICT-enabled elements,
    ensuring accessible, inclusive, and equitable conditions for all and especially
    vulnerable user categories. The Canadian Disability Policy Alliance is a national
    collaboration of disability researchers, advocates, and policy makers, aimed at
    creating and mobilizing knowledge to enhance disability policy in Canada. One
    of these policies is related to mobility aids (specifically wheelchairs and scooters)
    for elderly and physically challenged individuals (McColl et al., 2015). The concept
    “barrier-free mobility” is highlighted in (Davidson and Viita, 2020) as a framework
    to guarantee accessible and independent mobility to all users including elderly
    and physical challenged individuals.


    The technical components of inclusive mobility systems should be explicitly conceived
    and designed as part of a “socio-technical” system that models both the human
    and machine domains within a single conceptual framework, following a user-driven
    approach instead of traditionally used technology-push and problem-focused approaches.
    Without a user-driven research approach, there is a danger that ill-conceived
    technologies will at best be irrelevant or inappropriate and at worst will reinforce
    some of the negative ageist assumptions that frame much of society’s response
    to aging and/or disability. This user-driven approach (Figure [4-3](#511013_1_En_4_Chapter.xhtml#Fig3))
    can drive the specification, development, and deployment of the inclusive mobility
    system/platform in order to develop a mobility platform that will have practical
    benefits for users in their everyday lives.


    The Disability Equality Index (DEI)^([^(26)](#fn26)) developed by Disability:IN
    is a comprehensive benchmarking tool that can help OEMs and mobility service providers
    build a road map of measurable, tangible actions that they can take to achieve
    disability inclusion. The Inclusive Mobility^([^(27)](#fn27)) program initiated
    by Volkswagen aims at directly engaging disability groups in the early stages
    of designing vehicle technologies and mobility services. Mobility aids for frail
    seniors and physically challenged individuals include, but are not limited to,
    wheelchairs and Personal Intelligent City Accessible Vehicles (PICAVs), smart
    laser shoes, GPS insoles and exoskeleton, or soft exosuits used in walking assistance.
    PICAV is an electrically powered one-person vehicle with specifically designed
    features for mobility-restricted people such as elderly and disabled people (Cepolina
    et al., 2011). Toyota’s e-Palette is an electric AV designed to accommodate up
    to four wheelchair-bound passengers with additional riders. May Mobility also
    develops low-speed, electric, wheelchair-accessible automated driving vehicles.
    Voyage is deploying automated driving shuttle services at The Villages, the largest
    retirement community in the world. At Haneda Airport in Tokyo, people with disabilities
    will be able to hail autonomous wheelchairs using a smartphone app that lets them
    select a destination, sit back, and relax (Scudellari, 2017). Alinker is a walk
    assist bike designed for people who have an illness or condition that impacts
    their mobility. Similarly Ford GoBike is designed for people with disabilities.
    Moreover, mobility service providers started to pay more attention to healthcare
    transportation services. Healthcare transportation refers to any transportation
    to medical facilities that is non-emergency in nature (e.g., to medical appointments,
    to an urgent care facility, or being discharged from the hospital) (Wolfe and
    McDonald, 2020). Several non-emergency healthcare HIPAA-compliant transportation
    services are nowadays provided to individuals with mobility- or financially related
    barriers. Examples of these services include Uber Health, Blue Cross and Blue
    Shield and Lyft, Cigna-HealthSpring and Lyft, and RIDE paratransit services.


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig3_HTML.png](images/511013_1_En_4_Chapter/511013_1_En_4_Fig3_HTML.png)


    Figure 4-3


    User-Driven Iterative Approach to Inclusive Mobility'
  trans: '

    # 包容性出行：全面概述


    包容性出行旨在促进体弱老年人和行动不便者的出行能力。这与美国交通部（USDOT）提出的“完整行程”^(²⁴)概念相符。`完整行程`指的是旅客从起点到目的地之间的无缝旅程，无论涉及多少种交通方式、换乘次数或接驳环节。一次成功的完整行程，可定义为个人能够可靠、自主、自信、独立、安全且高效地从起点到达目的地，且出行链中没有任何环节缺失，无论其所在地点、收入水平或是否残疾。


    多家政府及非政府组织正关注包容性出行，并致力于相关政策与立法工作。例如，美国交通部的无障碍出行技术研究计划（`ATTRI`）正牵头开发并推广变革性应用，以改善所有出行者（特别是残疾人士）的出行选择（Martin
    等人，2020）。在`ATTRI`框架下，美国交通部确定了四个重点关注的应用领域，这些领域是`完整行程`出行链中的常见短板。这四个领域分别是：智能寻路与导航系统、出行前管家与虚拟化、机器人与自动化，以及安全路口通行。2021
    年 1 月，美国交通部宣布通过“完整行程”计划，拨款超过 4100 万美元用于创新技术，以改善残疾人士的交通出行便利性与可达性。


    欧盟资助了多项支持包容性出行的项目。例如，`INCLUSION`项目^(²⁵)旨在理解、评估和评价欧洲重点区域交通解决方案的无障碍性和包容性。该项目识别差距与未满足的需求，并提出并试验一系列创新且可推广的解决方案（包括基于信息通信技术的元素），以确保所有人（尤其是弱势用户群体）都能获得无障碍、包容且公平的出行条件。


    加拿大残障政策联盟是由残障问题研究人员、倡导者和政策制定者组成的全国性合作组织，旨在创造并传播知识，以完善加拿大的残障政策。其中一项政策涉及针对老年人及行动不便者的助行器具（特别是轮椅和代步车）（McColl
    等人，2015）。(Davidson and Viita, 2020) 提出了“无障碍出行”概念，将其作为确保所有用户（包括老年人和行动不便者）都能获得无障碍、独立出行的框架。


    ## 技术组件与用户驱动方法


    包容性出行系统的技术组件应被明确构思并设计为“社会-技术”系统的一部分，该系统在单一概念框架内对人和机器领域进行建模，并遵循用户驱动的方法，而非传统上使用的技术推动和问题聚焦方法。如果没有用户驱动的研究方法，那么设计不当的技术充其量可能无关紧要或不合适，最坏的情况下甚至会强化一些负面的老年歧视假设，而这些假设构成了社会对老龄化及/或残疾问题的许多应对方式的基础。


    这种用户驱动方法（图 4-3）可以推动包容性出行系统/平台的规范制定、开发与部署，从而打造一个对用户日常生活具有实际益处的出行平台。


    ## 基准测试与行业倡议


    由 Disability:IN 开发的残障平等指数（`DEI`）^(²⁶)是一个全面的基准测试工具，可帮助原始设备制造商和出行服务提供商规划出一条可衡量、可落地的行动路线图，以实现残障包容。大众汽车发起的“包容性出行”^(²⁷)计划旨在直接在车辆技术与出行服务设计的早期阶段让残障团体参与进来。


    ## 助行器具与技术


    适用于体弱老年人和行动不便者的助行器具包括但不限于轮椅、个人智能城市无障碍车辆（`PICAVs`）、智能激光鞋、GPS 鞋垫与外骨骼，或用于行走辅助的柔性外衣。`PICAV`是一种电动单人车辆，具有专为行动受限人士（如老年人和残疾人）设计的特性（Cepolina
    等人，2011）。


    丰田的 e-Palette 是一款电动自动驾驶汽车，可容纳多达四位坐轮椅的乘客及额外的随行人员。May Mobility 也开发了低速、电动、可供轮椅上下的自动驾驶车辆。Voyage
    正在全球最大的退休社区“村庄”部署自动驾驶班车服务。在东京羽田机场，残疾人可以使用智能手机应用程序召唤自动驾驶轮椅，选择目的地后即可安心就座、放松身心（Scudellari,
    2017）。


    `Alinker`是一款专为因疾病或健康状况而影响出行的设计的人士设计的助步自行车。同样，`Ford GoBike`也是为残疾人设计的。


    ## 医疗保健交通服务


    此外，出行服务提供商开始更加关注医疗保健交通服务。医疗保健交通是指任何非紧急性质的、前往医疗机构的交通（例如，前往医疗预约、紧急护理中心，或从医院出院）（Wolfe
    and McDonald, 2020）。如今，多项符合 HIPAA（健康保险携带和责任法案）要求的非紧急医疗保健交通服务已提供给因出行或经济原因受限的个人。这些服务的例子包括`Uber
    Health`、蓝十字蓝盾与`Lyft`、`Cigna-HealthSpring`与`Lyft`，以及`RIDE`辅助公交服务。


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig3_HTML.png](img/511013_1_En_4_Fig3_HTML.png)


    **图 4-3** - 实现包容性出行的用户驱动迭代方法

