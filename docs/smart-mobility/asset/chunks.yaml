  trans: '

    # ADS 框架


    - **扫描（Scan）：** ADS 传感器全方位扫描道路及周边区域，探测车辆周围的物体：其他车辆、骑行者、行人、动物、路面上的障碍物、坑洼以及临时标志。它还能解读各类交通管制设施，包括交通灯颜色、铁路道口闸门及信号。扫描仪的作用范围可达数百米。

    - **预测（Predict）：** ADS 根据每个可移动物体的当前位置、先前运动轨迹及速度，预测其运动轨迹。预测时会考虑其他物体可能如何受道路特征或状况影响，例如交通信号灯或行驶车道上的车辆。这些预测每秒会更新多次。

    - **执行（Act）：** 接着，ADS 选择自身轨迹，并确定该轨迹所需的速度或转向调整。

    - **重复（Repeat）：** 持续循环执行上述四个步骤。


    该框架与作战行动流程中常用的“观察、判断、决策、执行”（`OODA`）循环有些相似。在“观察”步骤中，车辆试图基于处理来自不同多模态传感器（如摄像头、`LiDAR`、短程与远程雷达等）的数据，形成对世界的一致理解。在“判断”步骤中，会建立一个世界表征，以帮助车辆理解态势、选择行动方案，进而在“决策”阶段进行规划并做出相应决定。在“执行”阶段，车辆实施规划好的动作，同时持续监控态势，并在必要时重新规划。


    # 认知循环


    从机器人学的视角来看，**感知-认知-决策-执行-适应-学习**这一认知循环能更全面地解释自动驾驶车辆的能力。该循环在机器人学中常用的**感知-决策-执行**认知循环基础上，增加了态势感知、适应和学习能力，如图
    3-14 所示。在此类系统中，数据从不同的硬数据和软数据源收集。硬数据来自物理传感器（如摄像头、雷达、`LiDAR`），而软数据包括虚拟传感、融合数据、人类输入以及社交媒体数据。收集到的数据经过处理，以实现不同层次的态势感知，例如：在特定时空约束下对环境要素的感知、对其含义的理解，以及对它们近期状态和潜在后果的预测（Endsley，2016）。


    如图 3-14 所示，感知的结果是形成一个编译后的环境图像，其中可能包含多个子过程，如物体定位（或跟踪）、物体识别与标识。理解能力整合这些信息，生成一幅更全面的世界图像，展示已识别物体之间的关系。预测能力则能预测环境中物体的未来行动。总体而言，态势感知能力的输出是一个映射环境或领域模型，该模型可能包含初始状态、目标状态、车辆的可行状态、基本动作或活动、硬约束与软约束、不确定性（传感器与执行器）、先验知识，以及低/高分辨率的静态/动态地图。


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig14_HTML.jpg](img/511013_1_En_3_Fig14_HTML.jpg)


    **图 3-14** 自动驾驶车辆的认知循环


    决策模块负责在不确定的情况下做出决策。若未正确处理这种不确定性，可能导致对自身状态和/或环境状态产生错误认知，从而采取错误行动。适应模块使系统能够基于从态势感知模块提取的上下文来调整自身行为。上下文信息用于回答与态势相关的问题，例如“谁”、“什么”、“何时”以及“何地”，从而从位置、身份、活动、时间和状态方面描述工作环境和系统代理。适应可以表现为更改角色分配、协调模式，或重新规划、修复计划，并以协同方式优化数据采集过程、最终增强态势感知与决策的方式，来控制传感与执行资源的使用。从过往经验中学习是自主系统的一项关键特性。学习模块可用于使系统学习新任务，或将重复性流程自动化，并在必要时为人类提供智能指导。


    # 运动规划示例


    我们以运动规划作为自动驾驶车辆特定任务的一个示例。运动规划是一项复杂活动，它为自动驾驶车辆确定一系列未来的行动/活动，使其能够从初始状态行驶至指定的目标状态。规划通常需要在不确定性下进行推理，尤其是在非结构化、动态且部分可观测的环境中。为了正确规划运动，自动驾驶车辆必须在一系列障碍物之间，计算出一条从起始位置到给定目标位置的无碰撞最优路径。路径规划侧重于运动的空间方面，而轨迹规划则包含与如何运动相关的时空方面，具体基于轨迹、速度、时间和运动学，并考虑车辆的机械限制。在运动规划背景下，决策模块作为规划实体，将映射后的环境/领域模型作为输入，并使用规划方法/求解器生成规划，如图
    3-15 所示。这些求解器可基于离散规划（如前向搜索和后向搜索）、组合规划（如精确与近似单元分解、维诺图、可视性图、高速路网与轮廓）、基于采样的运动规划（如快速探索随机树和概率路线图）、势场法、元启发式算法、决策理论规划或混合方法。


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig15_HTML.png](img/511013_1_En_3_Fig15_HTML.png)


    **图 3-15** 自适应运动规划


    随后，规划被发送至执行模块或规划实体，以生成并发送至车辆执行器的驱动指令。规划的执行可由态势感知能力持续监控，适应能力则可在必要时通过计划修复或重新规划算法来调整规划。学习能力则持续从示例和/或交互中学习，以改进未来的决策。


    # 历史背景


    美国国防高级研究计划局（`DARPA`）通过首届于 2004 年 3 月 13 日举办的`DARPA`无人车挑战赛（`DARPA Grand Challenge`），催生了自动驾驶车辆，该挑战赛主要面向移动机器人领域。自那时起，由于自动驾驶车辆在智能出行等众多潜在领域具有广泛适用性，它们受到了学术界、政府实验室、工业界以及风险投资家越来越多的关注。为进一步推动该领域的研究与发展，还设立了其他竞赛，例如`AutoDrive`挑战赛、`CARNET`自动驾驶挑战赛以及印地自动驾驶挑战赛（`IAC`）。

    '
- fmt: "# Open Source Tools and Datasets\n\nSeveral open source tools and datasets\
    \ initiated in the robotics labs play crucial roles in accelerating the innovation\
    \ momentum in the area of smart mobility. Examples of open source tools include\
    \ `Lightweight Communications and Marshalling (LCM)` developed at MIT for the\
    \ DARPA Urban Challenge, `Robot Operating System (ROS)` developed initially by\
    \ two PhD students in the Robotics Laboratory at Stanford University, and the\
    \ `CARLA` open source simulator developed by Computer Vision Center, Barcelona,\
    \ in collaboration with Toyota Research Institute and Intel Labs. Open datasets\
    \ include `Berkeley DeepDrive`, `Oxford Radar RobotCar Dataset`, `MIT DARPA Urban\
    \ Challenge Dataset`, `KITTI Vision`, `Joint Attention in Autonomous Driving (JAAD)`,\
    \ `The Zurich Urban Micro Aerial Vehicle Dataset`, `Robotics 2D-Laser Datasets`,\
    \ `Wurzburg and Osnabruck Robotic 3D Scan Repository`, and `KAIST Urban Dataset`.\n\
    \n## 3.8 Electrification\n\nPeople and freight transportation is the second largest\
    \ source of CO₂ emissions worldwide and the largest source in the United States.\
    \ Electrification is the process of decarbonizing transportation by powering passenger\
    \ vehicles and freight vehicles by electricity as a replacement for fossil fuels\
    \ (coal, oil, and natural gas). Electric vehicles can be classified based on powertrain\
    \ options into battery-electric vehicles (BEVs), fuel cell vehicles (FCVs or FCEVs),\
    \ or hydrogen-electric combination. Both hydrogen and electric technologies are\
    \ older than the combustion system. Humphry Davy demonstrated the principle of\
    \ what became fuel cells in 1801, and William Grive invented in 1839 the first\
    \ fueled cell called the “gas battery.” The Dutch professor Sibrandus Stratingh\
    \ and the instrument maker Christopher Becker presented in 1835 an all-electric\
    \ tricycle equipped with one of the first electric batteries. The `General Motors\
    \ EV1` was the first mass-produced and purpose-designed electric vehicle of the\
    \ modern era from a major automaker. Electric powertrains have some advantages\
    \ over hydrogen fuel cell technology in terms of energy efficiency and the widespread\
    \ availability of charging stations.\n\nHydrogen fuel cell technology provides\
    \ faster refueling time and longer driving range compared to fully electric technology.\
    \ However, battery and charging technologies have rapidly been improving charging\
    \ times. GM’s `Ultium` energy options range from 50 to 200 kWh, which could enable\
    \ a GM-estimated range up to 650 km or more on a full charge with 0–96 km/hr acceleration\
    \ as low as 3 seconds. Fast and ultra-fast charger can recharge an EV in minutes.\
    \ For example, the charge rate of a DC fast charger is ~ 300 km/hr for charging\
    \ load less than 90 kW. Curbside cab charging using inductive charging technology\
    \ is getting popular as well. Charging pads route enough energy to an electric\
    \ vehicle’s batteries to add about 80 kilometers of range for every 15 minutes\
    \ the car spends hovering over the inductive coils—with no physical plugs or human\
    \ hookup required (Ulrich, 2020). Battery swapping could be revived specially\
    \ for `MaaS` and shared mobility services. San Francisco-based `Ample` has brought\
    \ electric vehicle battery swapping to the U.S. This company uses modular batteries\
    \ and currently focuses on fleet vehicles. `Bloomberg` reports that the Chinese\
    \ government is stepping up efforts to establish common industry-wide standards\
    \ that would allow drivers to swap out EV batteries in a matter of about three\
    \ minutes.^([^(13)](#fn13))\n\nTable [3-3](#511013_1_En_3_Chapter.xhtml#Tab3)\
    \ shows a detailed comparison between `BEV` (battery-electric vehicle), `BEV +\
    \ REx` (battery-electric vehicle + range extender), `FCEV` (fuel cell electric\
    \ vehicle), `PHEV` (plug-in hybrid electric vehicle), and `HEV` (hybrid electric\
    \ vehicle).\n\nThere is another debate around how green EVs are. Despite the absence\
    \ of on-the-road emission, battery and vehicle manufacturing makes EVs not as\
    \ green as they should be.\n\n> **Important**  \n> To ensure that e-cars are zero\
    \ emission in the full sense of the word, their electricity must come from renewable\
    \ sources and not, for example, coal-fired power plants, while production of the\
    \ battery must also be CO₂ neutral (Infineon, 2018).\n\nThis arises the need for\
    \ more optimized production processes using renewable sources, reducing or eliminating\
    \ the use of materials like cobalt and lithium, more use of recycled materials,\
    \ creation of new types of batteries and new materials, and better ways of battery\
    \ use and recycling. The recycling rates of Li-ion batteries (LIBs) in the European\
    \ Union and the United States are still less than 5% (Sommerville et al., 2020;\
    \ Nguyen and Oh, 2020). Moreover, more public/highway and workplace stations should\
    \ be available as most of the EV owners charge their vehicles at home. Allocation\
    \ of public charging stations should be optimized for better road coverage. The\
    \ global initiative `CharIN`^([^(14)](#fn14)) aims at developing `Combined Charging\
    \ System (CCS)` as the standard for charging BEVs of all kinds.\n\n### Table 3-3:\
    \ EV Taxonomy | Data Source: OneWedge\n\n| Property | BEV | BEV+REx | FCEV | PHEV\
    \ | HEV |\n| --- | --- | --- | --- | --- | --- |\n| Example | Chevy Bolt | BMW\
    \ i3 | Toyota Mirai | Mini Countryman | Toyota Prius |\n| Energy efficiency |\
    \ 73% | 73% ⟷ 20% | 22% | 60% ⟷ 17% | 54% ⟷ 15% |\n| Transmission | NO | NO |\
    \ NO | YES | YES |\n| Gearshift | NO | NO | NO | YES | YES |\n| Engine | AC Induction/synchronous\
    \ | AC Synchronous | AC Synchronous | AC Synchronous | AC Synchronous |\n| Emissions\
    \ of CO₂ | -66% | -66% ⟷ −8% | -50% | -58% ⟷ +2% | -57% ⟷ +11% |\n\nSeveral initiatives\
    \ are taking place nowadays toward zero-emission cities through phase-out of fossil\
    \ fuel vehicles, a.k.a. banning gas cars or banning petrol cars or the petrol\
    \ and diesel car ban (Burch and Gilchrist, 2018; Muoio, 2017; Oki, 2020). Figure\
    \ [3-16](#511013_1_En_3_Chapter.xhtml#Fig16) shows the status of the ICE vehicle\
    \ phase-out in different countries.\n\nMore than 14 countries and over 20 cities\
    \ around the world have proposed adopting electrification and banning the sale\
    \ of passenger vehicles (primarily cars and buses) powered by fossil fuels such\
    \ as petrol, liquefied petroleum gas, and diesel at some time in the future (Outlook,\
    \ IEA Global EV, 2020; Burch and Gilchrist, 2018). For example, Norway’s government\
    \ has decreed that all new cars must be zero emissions by 2025 (Ulrich, 2020).\
    \ France plans to ban sales of petrol and diesel cars by 2040 (Chrisafis and Vaughan,\
    \ 2017). Canada adopts electrification as a way to decarbonizing the transportation\
    \ sector and transitioning to a low-carbon future. The government of Canada has\
    \ set ambitious federal targets for zero-emission vehicles (ZEVs) reaching 10%\
    \ of light-duty vehicle (LDV) sales per year by 2025, 30% by 2030, and 100% by\
    \ 2040.\n\n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig16_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig16_HTML.png)\n\
    \n**Figure 3-16: Status of ICE Vehicle Phase-Out | Data Source (Burch and Gilchrist,\
    \ 2018) with Updates**"
  raw: 'Several open source tools and datasets initiated in the robotics labs play
    crucial roles in accelerating the innovation momentum in the area of smart mobility.
    Examples of open source tools include Lightweight Communications and Marshalling
    (LCM) developed at MIT for the DARPA Urban Challenge, Robot Operating System (ROS)
    developed initially by two PhD students in the Robotics Laboratory at Stanford
    University, and the CARLA open source simulator developed by Computer Vision Center,
    Barcelona, in collaboration with Toyota Research Institute and Intel Labs. Open
    datasets include Berkeley DeepDrive, Oxford Radar RobotCar Dataset, MIT DARPA
    Urban Challenge Dataset, KITTI Vision, Joint Attention in Autonomous Driving (JAAD),
    The Zurich Urban Micro Aerial Vehicle Dataset, Robotics 2D-Laser Datasets, Wurzburg
    and Osnabruck Robotic 3D Scan Repository, and KAIST Urban Dataset.


    ## 3.8 Electrification


    People and freight transportation is the second largest source of *CO*[2] emissions
    worldwide and the largest source in the United States. Electrification is the
    process of decarbonizing transportation by powering passenger vehicles and freight
    vehicles by electricity as a replacement for fossil fuels (coal, oil, and natural
    gas). Electric vehicles can be classified based on powertrain options into battery-electric
    vehicles (BEVs), fuel cell vehicles (FCVs or FCEVs), or hydrogen-electric combination.
    Both hydrogen and electric technologies are older than the combustion system.
    Humphry Davy demonstrated the principle of what became fuel cells in 1801, and
    William Grive invented in 1839 the first fueled cell called the “gas battery.”
    The Dutch professor Sibrandus Stratingh and the instrument maker Christopher Becker
    presented in 1835 an all-electric tricycle equipped with one of the first electric
    batteries. The General Motors EV1 was the first mass-produced and purpose-designed
    electric vehicle of the modern era from a major automaker. Electric powertrains
    have some advantages over hydrogen fuel cell technology in terms of energy efficiency
    and the widespread availability of charging stations.


    Hydrogen fuel cell technology provides faster refueling time and longer driving
    range compared to fully electric technology. However, battery and charging technologies
    have rapidly been improving charging times. GM’s Ultium energy options range from
    50 to 200 kWh, which could enable a GM-estimated range up to 650 km or more on
    a full charge with 0–96 km/hr acceleration as low as 3 seconds. Fast and ultra-fast
    charger can recharge an EV in minutes. For example, the charge rate of a DC fast
    charger is ∼ 300 km/hr for charging load less than 90 kW. Curbside cab charging
    using inductive charging technology is getting popular as well. Charging pads
    route enough energy to an electric vehicle’s batteries to add about 80 kilometers
    of range for every 15 minutes the car spends hovering over the inductive coils—with
    no physical plugs or human hookup required (Ulrich, 2020). Battery swapping could
    be revived specially for MaaS and shared mobility services. San Francisco-based
    Ample has brought electric vehicle battery swapping to the U.S. This company uses
    modular batteries and currently focuses on fleet vehicles.Bloomberg reports that
    the Chinese government is stepping up efforts to establish common industry-wide
    standards that would allow drivers to swap out EV batteries in a matter of about
    three minutes.^([^(13)](#fn13))


    Table [3-3](#511013_1_En_3_Chapter.xhtml#Tab3) shows a detailed comparison between
    BEV (battery-electric vehicle), BEV + REx (battery-electric vehicle + range extender),
    FCEV (fuel cell electric vehicle), PHEV (plug-in hybrid electric vehicle), and
    HEV (hybrid electric vehicle).


    There is another debate around how green EVs are. Despite the absence of on-the-road
    emission, battery and vehicle manufacturing makes EVs not as green as they should
    be.


    Important


    To ensure that e-cars are zero emission in the full sense of the word, their electricity
    must come from renewable sources and not, for example, coal-fired power plants,
    while production of the battery must also be CO2 neutral (Infineon, 2018).


    This arises the need for more optimized production processes using renewable sources,
    reducing or eliminating the use of materials like cobalt and lithium, more use
    of recycled materials, creation of new types of batteries and new materials, and
    better ways of battery use and recycling. The recycling rates of Li-ion batteries
    (LIBs) in the European Union and the United States are still less than 5% (Sommerville
    et al., 2020; Nguyen and Oh, 2020). Moreover, more public/highway and workplace
    stations should be available as most of the EV owners charge their vehicles at
    home. Allocation of public charging stations should be optimized for better road
    coverage. The global initiative CharIN^([^(14)](#fn14)) aims at developing Combined
    Charging System (CCS) as the standard for charging BEVs of all kinds.


    Table 3-3


    EV Taxonomy | Data Source: OneWedge


    | Property | BEV | BEV+REx | FCEV | PHEV | HEV |

    | --- | --- | --- | --- | --- | --- |

    | Example | Chevy Bolt | BMW i3 | Toyota Mirai | Mini Countryman | Toyota Prius
    |

    | Energy efficiency | 73% | 73%⟷20% | 22% | 60%⟷17% | 54%⟷15% |

    | Transmission | NO | NO | NO | YES | YES |

    | Gearshift | NO | NO | NO | YES | YES |

    | Engine | AC Induction/synchronous | AC Synchronous | AC Synchronous | AC Synchronous
    | AC Synchronous |

    | Emissions of *CO*[2] | -66% | -66%⟷−8% | -50% | -58%⟷+2% | -57% ⟷ +11% |


    Several initiatives are taking place nowadays toward zero-emission cities through
    phase-out of fossil fuel vehicles, a.k.a. banning gas cars or banning petrol cars
    or the petrol and diesel car ban (Burch and Gilchrist, 2018; Muoio, 2017; Oki,
    2020). Figure [3-16](#511013_1_En_3_Chapter.xhtml#Fig16) shows the status of the
    ICE vehicle phase-out in different countries.


    More than 14 countries and over 20 cities around the world have proposed adopting
    electrification and banning the sale of passenger vehicles (primarily cars and
    buses) powered by fossil fuels such as petrol, liquefied petroleum gas, and diesel
    at some time in the future (Outlook, IEA Global EV, 2020; Burch and Gilchrist,
    2018). For example, Norway’s government has decreed that all new cars must be
    zero emissions by 2025 (Ulrich, 2020). France plans to ban sales of petrol and
    diesel cars by 2040 (Chrisafis and Vaughan, 2017). Canada adopts electrification
    as a way to decarbonizing the transportation sector and transitioning to a low-carbon
    future. The government of Canada has set ambitious federal targets for zero-emission
    vehicles (ZEVs) reaching 10% of light-duty vehicle (LDV) sales per year by 2025,
    30% by 2030, and 100% by 2040.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig16_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig16_HTML.png)


    Figure 3-16


    Status of ICE Vehicle Phase-Out | Data Source (Burch and Gilchrist, 2018) with
    Updates'
  trans: "\n# 开源工具与数据集\n\n机器人实验室发起的多项开源工具和数据集，在加速智能出行领域的创新动力方面发挥着关键作用。开源工具示例包括：麻省理工学院为\
    \ DARPA 城市挑战赛开发的`轻量级通信与编组（LCM）`、最初由斯坦福大学机器人实验室的两名博士生研发的`机器人操作系统（ROS）`，以及由巴塞罗那计算机视觉中心与丰田研究所、英特尔实验室合作开发的`CARLA`开源模拟器。开放数据集包括：`Berkeley\
    \ DeepDrive`、`Oxford Radar RobotCar Dataset`、`MIT DARPA Urban Challenge Dataset`、`KITTI\
    \ Vision`、`自动驾驶中的联合注意力（JAAD）`、`苏黎世城市微型飞行器数据集`、`机器人 2D 激光数据集`、`维尔茨堡与奥斯纳布吕克机器人 3D\
    \ 扫描存储库`以及`KAIST 城市数据集`。\n\n## 3.8 电动化\n\n人员与货物运输是全球第二大 CO₂排放源，也是美国最大的排放源。电动化是通过以电力替代化石燃料（煤炭、石油和天然气）驱动乘用车和货运车辆，实现交通领域脱碳的过程。电动汽车可根据动力系统选项分为：纯电动汽车（BEV）、燃料电池汽车（FCV\
    \ 或 FCEV）或氢电混合动力汽车。氢能和电力技术的历史均早于内燃机系统。汉弗里·戴维于 1801 年演示了后来称为燃料电池的原理；威廉·格罗夫在 1839\
    \ 年发明了第一种名为“气体电池”的燃料电池。荷兰教授西布兰杜斯·斯特拉廷赫与仪器制造商克里斯托弗·贝克尔于 1835 年展示了一辆配备早期电池的纯电动三轮车。`通用汽车\
    \ EV1`是现代大型汽车制造商首款量产且专门设计的电动汽车。在能效和充电站的广泛普及方面，电动动力系统相比氢燃料电池技术具有一定优势。\n\n与全电动技术相比，氢燃料电池技术可提供更快的加注时间和更长的续航里程。不过，电池与充电技术正在迅速缩短充电时间。通用汽车的`Ultium`能源选项范围从\
    \ 50 到 200 千瓦时，据通用估计，满电状态下续航里程可达 650 公里或更长，0-96 公里/小时加速时间低至 3 秒。快速和超快速充电器可在数分钟内为电动汽车完成充电。例如，直流快速充电器在充电负荷低于\
    \ 90 千瓦时的充电速率约为 300 公里/小时。利用感应充电技术的路边出租车充电也越来越普及。充电垫可为电动汽车电池输送足够能量，车辆在感应线圈上停留每\
    \ 15 分钟即可增加约 80 公里的续航里程——无需物理插头或人工连接（Ulrich, 2020）。换电模式可能复兴，尤其是针对`MaaS`和共享出行服务。总部位于旧金山的`Ample`已将电动汽车换电技术引入美国。该公司采用模块化电池，目前专注于车队车辆。`彭博社`报道称，中国政府正加大力度制定统一的行业标准，使驾驶员能在约三分钟内更换电动汽车电池。^(¹³)\n\
    \n表 3-3 详细比较了`BEV`（纯电动汽车）、`BEV + REx`（纯电动汽车+增程器）、`FCEV`（燃料电池电动汽车）、`PHEV`（插电式混合动力电动汽车）和`HEV`（混合动力电动汽车）。\n\
    \n关于电动汽车的环保性存在另一场争论。尽管没有道路排放，但电池和车辆制造过程使得电动汽车并未达到应有的绿色程度。\n\n> **重要提示**  \n> 为确保电动汽车在完全意义上实现零排放，其电力必须来自可再生能源而非燃煤电厂，同时电池的生产过程也必须实现\
    \ CO₂中和（Infineon, 2018）。\n\n这引发了以下需求：优化生产过程以使用可再生能源；减少或消除钴、锂等材料的使用；增加回收材料的利用；开发新型电池和新材料；改进电池的使用和回收方式。欧盟和美国的锂离子电池（LIB）回收率仍不足\
    \ 5%（Sommerville et al., 2020; Nguyen and Oh, 2020）。此外，由于大多数电动汽车车主在家充电，应增设更多公共/高速公路及工作场所充电站。公共充电站的布局应进行优化以改善道路覆盖。全球倡议`CharIN`^(¹⁴)旨在将`联合充电系统（CCS）`发展为所有类型纯电动汽车的充电标准。\n\
    \n### 表 3-3：电动汽车分类 | 数据来源：OneWedge\n\n| 属性 | BEV | BEV+REx | FCEV | PHEV | HEV\
    \ |\n| --- | --- | --- | --- | --- | --- |\n| 示例 | 雪佛兰 Bolt | 宝马 i3 | 丰田 Mirai\
    \ | Mini Countryman | 丰田普锐斯 |\n| 能效 | 73% | 73% ⟷ 20% | 22% | 60% ⟷ 17% | 54%\
    \ ⟷ 15% |\n| 传动系统 | 无 | 无 | 无 | 有 | 有 |\n| 变速换挡 | 无 | 无 | 无 | 有 | 有 |\n| 发动机类型\
    \ | 交流感应/同步电机 | 交流同步电机 | 交流同步电机 | 交流同步电机 | 交流同步电机 |\n| CO₂排放量 | -66% | -66% ⟷\
    \ −8% | -50% | -58% ⟷ +2% | -57% ⟷ +11% |\n\n当前，多个倡议正在推动零排放城市建设，通过逐步淘汰化石燃料车辆（即禁止汽油车、燃油车或汽油与柴油车）（Burch\
    \ and Gilchrist, 2018; Muoio, 2017; Oki, 2020）。图 3-16 展示了不同国家内燃机（ICE）车辆淘汰的现状。\n\
    \n全球超过 14 个国家和 20 多个城市已提议在未来某个时间点采用电动化，并禁止销售以汽油、液化石油气和柴油等化石燃料为动力的乘用车（主要是汽车和公交车）（Outlook,\
    \ IEA Global EV, 2020; Burch and Gilchrist, 2018）。例如，挪威政府已下令，到 2025 年所有新车必须实现零排放（Ulrich,\
    \ 2020）。法国计划到 2040 年禁止销售汽油和柴油汽车（Chrisafis and Vaughan, 2017）。加拿大将电动化视为交通领域脱碳并向低碳未来转型的途径。加拿大政府为零排放车辆（ZEV）设定了雄心勃勃的联邦目标：到\
    \ 2025 年占轻型车辆（LDV）年销量的 10%，到 2030 年达到 30%，到 2040 年达到 100%。\n\n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig16_HTML.png](img/511013_1_En_3_Fig16_HTML.png)\n\
    \n**图 3-16：内燃机（ICE）车辆淘汰现状 | 数据来源 (Burch and Gilchrist, 2018) 含更新**\n"
- fmt: '### 3.9 Summary


    In this chapter, we discussed several core building blocks of the existing and
    possibly emerging smart mobility systems and services. The discussed technologies
    include Position, Navigation, and Timing (PNT), Geographic Information System
    (GIS), wireless communication, mobile cloud computing, blockchain, Internet of
    Things (IoT), Artificial Intelligence (AI), robotics, and electrification. These
    technologies are not exhaustive and should be considered as examples of technologies
    that can be foundational in developing smart mobility services. The following
    chapter discusses a number of potential technology enablers for smart mobility
    that have been made available based on the foundational technologies discussed
    in this chapter.


