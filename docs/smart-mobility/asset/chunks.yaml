    cars are futuristic disruptive mobility platforms that are based on an on-demand
    aviation business model. They are piloted Vertical Takeoff and Landing (VTOL)
    aircrafts. These VTOLs are customizable to accommodate different numbers of passengers
    or for cargo transportation. eVTOLs utilize electric propulsion to fly in and
    around densely populated urban areas at speeds of up to 320 km/hr with approximately
    200 miles of range. Examples include uberAIR, Uber Elevate acquired by Joby Aviation,
    JoeBen Bevirt’s flying car, Airbus Flying Taxi, Maker’s Archer Aviation, Boeing
    Flying Taxi, and Cadillac eVTOLs presented in CES 2021\. Cadillac eVTOLs use a
    90 kWh EV motor to power four rotors as well as air-to-air and air-to-ground communications
    and can meet customers on the roof and take them to the vertiport closest to their
    destination. Archer Aviation is partnering with automaker Stellantis for the manufacturing
    and with United Airlines for operations of its composite, eVTOL aircraft. This
    company plans to raise $3.8 B through its own Special-Purpose Acquisition Company
    (SPAC) merger. Production is set to kick off in 2023.


    Important


    The global urban air mobility (UAM) market, which is expected to be valued at
    $895.0 million in 2023, would grow to $6,889.4 million by 2030, at a CAGR of 33.9%
    during the forecast period (2023–2030) according to Prescient & Strategic Intelligence.


    The remotely piloted, four-seat eVTOL “City Airbus” with 15-minute autonomy from
    Airbus Helicopters has now been flown publicly for the first time in July 2020\.
    Hyundai presented in CES 2020 a future concept of air mobility that consists of
    interconnected PAV (personal air vehicle), PBV (purpose-built vehicle), and a
    hub. PAV is an eVTOL vehicle that allows runway-free urban air travel. PBV is
    an eco-friendly urban and highly customizable vehicle for human or cargo transportation
    and can offer customized services in transit (i.e., coffee shop, medical clinic),
    and the hub is mainly the takeoff/landing point for PAVs and arrival/departure
    point for PBVs.


    According to the NASA Urban Air Mobility report (Goyal, 2018), three challenging
    UAM use cases are envisioned:


    *   **Last-Mile Delivery**: Rapid delivery of packages (less than 5 lb. or 2 kg)
    from local distribution hubs to a dedicated receiving vessel. Deliveries are unscheduled
    and routed as online orders are placed.


    *   **Air Metro**: Resembles current public transit options such as subways and
    buses, with predetermined routes, regular schedules, and set stops in high-traffic
    areas throughout each city. Vehicles are autonomously operated and can accommodate
    two to five passengers at a time, with an average load of three passengers per
    trip.


    *   **Air Taxi**: The air taxi use case is a near-ubiquitous (or door-to-door)
    ridesharing operation that allows consumers to call VTOLs/eVTOLs to their desired
    pickup locations and specify drop-off destinations at rooftops throughout a given
    city. Rides are unscheduled and on demand like ridesharing applications today.
    Like the air metro case, vehicles are autonomously operated and can accommodate
    two to five passengers at a time, with an average load of one passenger per trip.


    Several cities are experimenting with UAM focusing on air taxis (e.g., China’s
    EHang,^([^(30)](#fn30)) Kitty Hawk in New Zealand,^([^(31)](#fn31)) and Dubai’s
    drone taxi^([^(32)](#fn32))) and air deliveries (e.g., Amazon Prime Air,^([^(33)](#fn33))
    JD.com’s drone delivery, China’s Antwork drones for medical supply delivery during
    the COVID-19 pandemic, and US Zipline drones for medical supply and personal protective
    equipment delivery in the Unites States and in Africa).


    The UK government is giving US $1.65 million to a startup to build a pop-up urban
    airport for “flying taxis” that will be opened later in 2021 in Coventry, England.
    This urban airport named “Air-One” will be the first eVTOL operational hub in
    the world.


    Traffic management infrastructure, physical infrastructure for receiving packages
    or landing vehicles, and supporting technology infrastructure, such as automatic
    doors for admitting drones into warehouses, are identified by McKinsey^([^(34)](#fn34))
    as critical infrastructure requirements for UAM.


    There are still several challenges for the widespread and societal acceptance
    of UAM as last-mile delivery platforms, air metro, or air taxis. These challenges
    include, but are not limited to, safety of “Beyond Visual Line of Sight” (BVLOS)
    operations, safety in dense urban areas, privacy, noise pollution, visual disruption,
    wildlife impacts, dynamic geo-fencing, optimal routing and navigation especially
    in severe weather conditions, getting the package to the right person’s flat,
    and compliance with airspace regulations. For example, BVLOS flights require certification
    and permission from aviation authorities in many jurisdictions around the world as
    discussed in Chapter [2](#511013_1_En_2_Chapter.xhtml). In January 2021, the FAA
    allowed for the first time fully automated commercial drone flights with BVLOS
    operations. The approval was given to American Robotics Inc. However, these drones
    are only allowed to fly along planned routes in rural areas with a limited altitude
    below 122 meters. Moreover, a human pilot is required to oversee each flight’s
    takeoff remotely.'
  trans: '

    ### 5.2.2 三维机动性与城市空中交通（UAM）


    有轨电车/城市路面电车/火车可被视为**1 自由度（DOF）**移动平台，因为它们主要依赖纵向运动，而横向运动的自由度相当受限（脱轨情况除外）。汽车具有**2
    自由度**（横向和纵向运动）。三维机动性是从受限的二维街道向二维移动空间的范式转变，实现了**3 自由度**（横向、纵向和垂直运动），或更准确地说，考虑到旋转运动，是**6
    自由度**（横向、纵向、垂直、侧倾、俯仰和偏航）。在此范式下，城市空中交通（UAM）指的是快速发展的、用于人员和货物运输的城市交通系统。空中出租车/飞行出租车/飞行汽车是未来主义的颠覆性移动平台，其基础是按需航空商业模式。它们是有人驾驶的垂直起降（VTOL）飞行器。这些
    VTOL 飞行器可定制，以容纳不同数量的乘客或用于货物运输。eVTOL 利用电力推进在人口稠密的城市区域及其周边飞行，速度最高可达 320 公里/小时，航程约
    200 英里。例如`uberAIR`、被`Joby Aviation`收购的`Uber Elevate`、`JoeBen Bevirt`的飞行汽车、`Airbus
    Flying Taxi`、`Maker’s Archer Aviation`、`Boeing Flying Taxi`以及在`CES 2021`上展示的`Cadillac
    eVTOLs`。`Cadillac eVTOLs`使用一台 90 千瓦时的电动汽车电机为四个旋翼以及空对空和空对地通信提供动力，可以在屋顶接载乘客，并将他们送到距离目的地最近的垂直起降机场。`Archer
    Aviation`正与汽车制造商`Stellantis`合作进行制造，并与`United Airlines`合作运营其复合材料 eVTOL 飞行器。该公司计划通过其特殊目的收购公司（SPAC）合并筹集
    38 亿美元。生产计划于 2023 年启动。


    **重要信息**


    根据`Prescient & Strategic Intelligence`的数据，全球城市空中交通（UAM）市场预计在 2023 年价值 8.95 亿美元，到
    2030 年将增长至 68.894 亿美元，预测期（2023-2030 年）内的复合年增长率为 33.9%。


    来自`Airbus Helicopters`的、具有 15 分钟自主飞行能力的远程遥控四座 eVTOL`City Airbus`已于 2020 年 7 月首次公开飞行。`Hyundai`在`CES
    2020`上展示了未来的空中交通概念，该概念由互联的 PAV（个人飞行器）、PBV（定制化车辆）和一个枢纽站组成。PAV 是一种无需跑道的城市空中交通 eVTOL
    飞行器。PBV 是一种生态友好、高度定制化的城市车辆，用于人员或货物运输，并可在途中提供定制服务（例如咖啡馆、诊所），而枢纽站主要是 PAV 的起飞/降落点和
    PBV 的到达/出发点。


    根据`NASA 城市空中交通`报告（Goyal, 2018），设想了三个具有挑战性的 UAM 用例：


    -   **最后一英里配送**：从本地配送枢纽将包裹（小于 5 磅或 2 公斤）快速送达专用接收装置。配送是非计划性的，并随着在线订单的下达而规划路线。

    -   **空中地铁**：类似于当前的地铁和公交等公共交通选项，具有预定路线、固定时刻表以及在每个城市高流量区域设定的站点。车辆自主运行，一次可容纳两到五名乘客，平均每次行程载客三人。

    -   **空中出租车**：空中出租车用例是一种近乎普遍（或门到门）的拼车服务，允许消费者呼叫 VTOL/eVTOL 到他们希望的上车地点，并在给定城市的屋顶指定下车目的地。像今天的拼车应用程序一样，行程是非计划性的且按需提供。与空中地铁的情况类似，车辆自主运行，一次可容纳两到五名乘客，平均每次行程载客一人。


    一些城市正在试验 UAM，重点放在空中出租车（例如中国的`亿航`，^(³⁰)新西兰的`Kitty Hawk`，^(³¹)以及迪拜的无人机出租车^(³²)）和空中快递（例如`Amazon
    Prime Air`，^(³³)`京东`的无人机配送，中国的`迅蚁`在 COVID-19 疫情期间用于医疗物资配送的无人机，以及美国的`Zipline`在美国和非洲用于医疗物资和个人防护装备配送的无人机）。


    英国政府正向一家初创公司提供 165 万美元，用于建造一个用于“飞行出租车”的弹出式城市机场，该机场将于 2021 年晚些时候在英格兰考文垂开放。这个名为`Air-One`的城市机场将成为世界上第一个
    eVTOL 运营枢纽。


    `麦肯锡` ^(³⁴) 将交通管理基础设施、接收包裹或降落车辆的物理基础设施以及支持技术基础设施（例如允许无人机进入仓库的自动门）确定为 UAM 的关键基础设施要求。


    要使 UAM 作为最后一英里配送平台、空中地铁或空中出租车被广泛接受和社会认可，仍然面临若干挑战。这些挑战包括但不限于：“超视距”（BVLOS）运行的安全性、密集城区的安全性、隐私、噪音污染、视觉干扰、对野生动物的影响、动态地理围栏、特别是在恶劣天气条件下的最优路径规划和导航、将包裹送达正确的人员公寓、以及遵守空域规定。例如，正如第`2`章所讨论的，在世界许多司法管辖区，BVLOS
    飞行需要获得航空当局的认证和许可。2021 年 1 月，美国联邦航空管理局首次批准了具备 BVLOS 运行能力的全自动商用无人机飞行。该批准授予了`American
    Robotics Inc.`。然而，这些无人机仅获准在乡村地区沿规划航线飞行，且高度限制在 122 米以下。此外，需要一名人类飞行员远程监督每次飞行的起飞过程。

