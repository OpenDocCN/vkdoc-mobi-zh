    ### 5.2.3 水上出租车


    水上出租车或水上巴士主要在城市环境中提供公共或私人交通服务。这种城市水上交通已在全球许多水道丰富的城市（如威尼斯、曼谷、东京、纽约、悉尼和多伦多）使用了数百年，用于确保快速点对点运输并缓解交通拥堵。迪拜道路与交通管理局（RTA）监管多种水上交通方式，例如水上出租车（每次最多
    10 名乘客）、水上巴士（20 名乘客）、传统木船（20 名乘客）、混合动力木船（20 名乘客）、电动木船（9 名乘客）以及渡轮（100 名乘客）。技术正在迅速改变水上出租车的形态。例如，采用混合动力推进系统的“雷霆”号水上的士，能够在威尼斯的水道中以纯电动模式零排放行驶。这些水上的士也会驶入开阔水域前往机场，此时可使用柴油发动机达到更高速度，同时为电池充电。SeaBubbles
    是一款实验性的水翼电动水上的士，最高时速可达 25 公里/小时，无浪、无噪音、零排放，可在城市中按需提供水上的士服务。


    在不久的将来，自动驾驶船只将被用于沿海和河滨城市的货物和人员运输，有助于减少公路和铁路的交通拥堵。例如，“Roboat”项目^(³⁵)旨在开发一支自动驾驶船队，用于在阿姆斯特丹市运输货物和人员（Wang
    等人，2019）。在同一项目中，麻省理工学院的研究人员设计了 3D 打印的无人驾驶船只，这些船只既可提供运输服务，也能自行组装成其他浮动结构。


    **重要提示**


    根据 MarketsandMarkets 的数据，自主船舶市场预计到 2030 年将达到 142 亿美元，2020 年至 2030 年的复合年增长率为 9.3%。


    目前，高度自动化的船舶已在多个国家投入使用，尤其是在挪威等北欧国家。例如，由挪威公司 Kongsberg Maritime 建造的两艘实验性自主船只“海洋空间无人机
    1 号”和“2 号”，正被挪威科技大学使用。挪威政府资助的其它几个项目旨在开发电动自主船舶，使其成为新型综合交通系统的一部分，而非取代现有船只。


    正如第 2 章所述，改变海事法律法规仍是适应自主船舶用于人员出行和货物运输所面临的挑战。


    ### 5.2.4 自动旅客捷运系统


    自动旅客捷运系统代表了交通系统的可持续性与颠覆性创新，是全面自动化/无人驾驶、高架且先进的固定导轨系统。APM 在导轨管道内使用电动转向架，推动悬挂式客舱前进，客舱可根据需求定制不同尺寸，从个人舱到多人舱不等，速度可超过
    160 公里/小时。与磁悬浮及其他类型的单轨系统相比，悬挂式自动快速公交所需的基础设施要少得多，如表 5-2 所示。


    **表 5-2** 城市磁悬浮、轻轨、快速公交与自动旅客捷运系统比较 | 来源：Swift Tram


    | 因素 | APM | 城市磁悬浮 | 轻轨 | 快速公交 |

    | :--- | :--- | :--- | :--- | :--- |

    | 安装成本 | $$ | $$$ | $$$$$ | $$$ |

    | 路权成本 | $ | $$$ | $$$$$$ | $$$$ |

    | 运营成本 | $$ | $$ | $$$$$ | $$$$ |

    | 系统运力 | 中等 | 中等 | 高 | 中等 |

    | 可及性/频率 | 高 | 中等 | 低 | 中等 |

    | 24/7 可用 | 是 | 否 | 否 | 否 |

    | 能耗 | 极低 | 中等 | 中等 | 高 |

    | 行驶速度 | 30 英里/小时 | 55 英里/小时 | 55 英里/小时 | 55 英里/小时 |

    | 专用货运 | 是 | 否 | 否 | 否 |

    | 天气影响运营 | 否 | 可能 | 是 | 是 |


    ### 5.2.5 超级高铁与城市环线高铁


    超级高铁是一项颠覆性的客货运输技术。该系统由一个密封的减压真空管构成，浮动的吊舱/胶囊在其中以低空气阻力或摩擦力高速（最高 1200 公里/小时）运送人员或货物。超级高铁系统兼具火车的便利性和飞机的速度。SpaceX
    超级高铁吊舱竞赛吸引了学术界、工业界和政府机构的关注，共同致力于超级高铁技术的研发。该竞赛的目标是设计和建造一个缩比原型运输载具，以证明超级高铁概念在技术上的可行性。主要参与者包括超级高铁运输技术公司、超级高铁一号、AECOM、Hardt
    和 TransPod^(³⁶)，后者曾在多伦多市推出超级高铁概念。迄今为止，维珍超级高铁^(³⁷)是世界上唯一一家成功对其技术进行大规模测试的公司。维珍超级高铁一号概念代表了一种可持续的交通模式，其设想是利用覆盖管道的太阳能电池板，相比高速铁路能更好、更经济地利用地形，并消除了机械噪音源，如轨道上的车轮噪音。


    **重要提示**


    根据 Verified Market Research 的数据，2019 年超级高铁技术市场估值为 4 亿美元，预计到 2027 年将达到 73.2 亿美元，2020
    年至 2027 年的复合年增长率为 47.14%。


    埃隆·马斯克设想超级高铁系统的能源成本远低于任何现有交通方式（图 5-2）。美国宇航局也表示，超级高铁的效率将比航空（短途航线）高五到六倍，比铁路高两到三倍（Taylor
    等人，2016）。然而，关于能耗计算的细节有限；因此，这些说法无法得到进一步验证（Walker, 2018）。这主要是由于缺乏真实的超级高铁系统或测试平台，无法用于在这种新兴颠覆性出行技术在不同运行条件下的能源分析。


    ![../images/511013_1_En_5_Chapter/511013_1_En_5_Fig2_HTML.jpg](img/511013_1_En_5_Fig2_HTML.jpg)


    **图 5-2** 洛杉矶至旧金山旅程中各种交通方式的每位乘客能源成本（Musk, 2013）


    尽管超级高铁作为一种概念已存在多年，并吸引了大量投资，但在开发与测试方面仍存在巨大差距。为弥合这一差距，我共同发明了一种用于超级高铁的多功能培训与实验测试平台（Khamis
    和 AbdelFattah, 2019）。该测试平台^(³⁸)包括一个配备真空系统的密封管道、一个由电磁引擎悬浮和推进的胶囊/吊舱、多个车站、一个状态监测与控制系统、一个用于本地实验的人机界面单元、一个用于远程实验的远程呈现系统、一个交互式虚拟现实工具以及一个数字孪生体。该测试平台可用于超级高铁技术及相关技术的专业和教学培训。它允许学生、学员和研究人员研究、实验并理解超级高铁技术作为颠覆性交通技术的各个方面。该测试平台支持各种教学和建构活动，不仅展示了超级高铁技术如何工作，还展示了该技术能实现什么。

