    ### 3.6.2 统计机器学习


    学习是形成外部世界的内部模型（*Dehaene, 2020*）。机器学习（ML）是 AI 的一个子领域，它赋予人工系统/过程从经验和观察中学习的能力，而无需进行显式编程，如图
