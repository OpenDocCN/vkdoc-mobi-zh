  trans: '

    # 城市作为异质实体


    城市是高度异质的实体，整合了多种多样、共性多于差异的组成部分。数字化、自动化、连接性和数据分析是实现这些组成部分无缝集成的关键因素。根据普华永道（`PwC`）对约
    64 个城市进行的调查（Galal 等人，2011 年），在资金之后，智慧城市战略实施的第二大障碍是优先级排序。


    城市必须首先解决其最基本的保障需求：安全、健康以及清洁水源和卫生设施等基础设施。这些基础设施也应进行优化，以便市民能最好地利用。如果这些基本需求已经得到满足，随着城市从基本的工业生产向信息社会转变，关注点便会转向安全保障需求、道路和交通基础设施以及教育机会。在较发达的城市，关注点将放在环境需求、社会融合、文化与休闲，以及作为知识型社会推动力的信息通信技术上。再高一级便是智慧城市，这类城市被定义为能够在其所有资本领域实现绩效最大化的世界领导者。在此之上是自我实现层面，此时城市探索新的模式，为生活质量设定新标准，并愿意分享经验以帮助其他城市进步（Galal
    等人，2011 年）。


    ## 智慧城市的支柱


    智慧出行、智慧生活、智慧社会、智慧环境、智慧经济和智慧治理是智慧城市的六大支柱，如图 1-2 所示。数字化、自动化、连接性和分析技术是这六大支柱中实现监测、控制和优化的四个主要推动力。


    **智慧出行** 关注信息和通信基础设施的可用性、安全性以及出行系统的可持续性。交通系统的本地和国际可达性也是智慧出行的重要方面。下一节将提供更多关于智慧出行的细节。


    ![../images/511013_1_En_1_Chapter/511013_1_En_1_Fig2_HTML.jpg](img/511013_1_En_1_Fig2_HTML.jpg)


    *图 1-2 — 智慧城市支柱*


    **智慧生活** 涵盖了生活质量的各个方面，例如文化、健康、安全、住房、旅游等。敏捷的公民社会、公民的资质或教育水平、社会包容性、关于融入和积极参与公共生活的社交互动质量，以及对外部世界的开放程度，是衡量智慧社会的指标。


    **智慧环境** 由宜人的自然条件（例如气候和绿地）、污染、资源管理以及环境保护的努力所描述。


    **智慧经济** 包括与经济竞争力相关的各种因素，如创新、创业精神、商标、劳动生产率和劳动力市场的灵活性，以及融入（国际）国家市场（Giffinger 等人，2007
    年）。


    **智慧治理** 涵盖了政治参与、面向公民的服务以及行政管理职能等各个方面。


    ## 全球智慧城市倡议


    全球有多个智慧城市项目和倡议。根据 2020 年发布的最新智慧城市指数报告（IMD 和 SUTD，2020 年），全球十大智慧城市依次为新加坡、赫尔辛基、苏黎世、奥克兰、奥斯陆、哥本哈根、日内瓦、台北市、阿姆斯特丹和纽约，如表
    1-1 所示。该指数基于经济和技术数据，以及市民对其所在城市“智慧”程度的感知，对 109 个城市进行了排名。


    *表 1-1 — 根据智慧城市指数的全球十大智慧城市（IMD 和 SUTD，2020 年）*


    | 城市 | 国家 | 2020 年排名 | 2019 年排名 | 变化 |

    | --- | --- | --- | --- | --- |

    | 新加坡 | 新加坡 | 1 | 1 | 0 |

    | 赫尔辛基 | 芬兰 | 2 | 8 | +6 |

    | 苏黎世 | 瑞士 | 3 | 2 | -1 |

    | 奥克兰 | 新西兰 | 4 | 6 | +2 |

    | 奥斯陆 | 挪威 | 5 | 3 | -2 |

    | 哥本哈根 | 丹麦 | 6 | 5 | +1 |

    | 日内瓦 | 瑞士 | 7 | 4 | +3 |

    | 台北 | 台湾 | 8 | 7 | +1 |

    | 阿姆斯特丹 | 荷兰 | 9 | 11 | +2 |

    | 纽约 | 美国 | 10 | 38 | +28 |


    ### 线城：一座愿景中的智慧城市


    `The Line` 于 2021 年 1 月揭晓，计划作为 `Neom` 的一部分进行建设，这是一座完全可持续的智慧城市，`Neom` 是位于沙特阿拉伯西北部塔布克省的一个规划的跨境城市。`Neom`
    于 2017 年宣布，是沙特阿拉伯“2030 愿景”计划的一部分，旨在实现经济多元化，减少对石油的依赖。`The Line` 是一座长达 100 英里的线性城市，没有汽车或街道，居民所需的一切都可在五分钟步行范围内到达。这座特大城市的愿景是为
    100 万人口打造零能耗的步行社区。`The Line` 的灵感来源于保罗·索莱里的“线性城市”概念（Soleri 等人，2012 年），即以步行为基础的社区围绕线性的地方和区域交通系统进行布局。

