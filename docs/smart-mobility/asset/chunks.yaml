- fmt: "\n\n根据Frost & Sullivan的数据，数据货币化预计将为原始设备制造商（OEM）释放约330亿美元的机会，到2025年，每辆汽车有潜力通过140个独特用例实现100美元的货币化。然而，根据麦肯锡（Bertoncello等人，2021年）进行的一项更近期的调查，数据货币化到2030年可为整个生态系统中的参与者带来每年2500亿至4000亿美元的增量价值。这些参与者包括车辆特定参与者（OEM和经销商）、车队运营商、租赁公司、出行服务提供商、远程信息处理公司、车辆维修/保养厂以及更广泛的生态系统群体（例如，政府、基础设施提供商、充电和燃料供应商、广告和营销公司、内容提供商、第三方市场、物流和货运代理、金融服务公司以及科技公司）。在单车层面，到2030年，车联网在B2B和B2C场景下平均每年可带来高达310美元的收入和180美元的成本节约。本报告揭示了9个集群，包含38个潜在的数据货币化用例。其中，OTA更新、研发硬件优化以及销售和服务效率被认为是影响最大的三个用例。例如，OTA更新可以提供多种创收和成本节约机会，例如在整个车辆生命周期内销售功能、购后功能激活、减少OEM需要创建的车型变体数量，以及防止或加快召回。通用汽车推出了一个名为`Vehicle\
    \ Intelligence Platform`（`VIP`）的新型大脑和数字神经系统，该系统可支持所有车辆的OTA软件更新。该架构支持每小时4.5 TB的数据传输，目前用于2020款凯迪拉克CT5和2020款克尔维特，并将在未来几年内推出的所有通用汽车车型上使用。\n\
    \n根据麦肯锡（Bertoncello等人，2021年）的说法，迄今为止，大多数公司未能成功实现数据货币化，主要原因有三个。第一个原因是未能激发客户兴趣并使其服务差异化。第二个原因是没有进行组织重构，也没有培养能够在整个车辆生命周期内实现有效数据货币化的能力。第三个原因是未能建立实现规模化运作的生态系统。\n\
    \n安大略省的自动驾驶汽车创新网络（`AVIN`）设想了多种车载云服务（Kadri等人，2019年）。这些服务包括处理即服务（`PRaaS`）、存储即服务（`STaaS`）、网络即服务（`NaaS`）和信息即服务（`INaaS`）。`PRaaS`能够利用联网车辆可用的板载处理资源。`STaaS`为使用联网车辆可用的存储资源作为动态数据中心或作为数据调动的“驮驴”或中继打开了大门。`NaaS`使车辆能够充当移动热点。最后，通过`INaaS`，联网车辆可以作为邻近和远程实体（如其他车辆、基础设施、智能家居、电动汽车充电站等）的信息资源。\n\
    \n## 5.9 零工经济与乘客经济\n\n零工经济和乘客经济是由智能出行系统和服务推动的两种新型商业模式。以下小节将介绍这些模式。\n\n### 5.9.1\
    \ 零工经济与众包\n\n零工经济是一种商业模式，在这种模式中，短期、灵活的工作对于具备不同技能组合的独立承包商来说很常见，他们可以从事赚取收入的自由职业活动，而不存在传统的、长期的雇佣关系。在大多数情况下，这些自由职业活动不需要任何先前的工作经验。根据Intuit\
    \ 2020年关于零工就业未来的研究，零工经济趋势表明，在未来几年内，超过80%的美国主要公司将大幅增加对非传统工作的使用。\n\n出行领域的零工经济，尤其是在按需配送方面，在过去几年中取得了显著的发展势头。一些“第一英里/最后一英里”运输服务和“最后一英里”配送服务都基于这种零工经济模式。例子包括`GoShare`（为需要司机或搬运工的客户提供帮助）；`Kanga`、`EZER`和`Bellhops`（搬运工服务）；`Cabify`、`Amazon\
    \ Flex`和`Stuart`（包裹配送）；`Deliv`（包裹配送）；`FedEx Express`（短途和长途配送）；等等。这里提供了对24个基于零工经济的应用程序的全面概述^([^(46)](#fn46))。由于对快速配送服务的需求持续增长，这些应用程序大多专注于实现众包配送，主要提供基于零工经济模式的当日达和即时配送服务。\n\
    \n> **重要提示**\n> \n> 根据麦肯锡公司的管理顾问的说法，到2025年，当日达和即时配送市场将占标准包裹收入的20%左右，预计平均年增长率约为40%。\n\
    \n提供配送服务的零工经济平台示例包括`Onfleet`、`OnTime 360`、`Bringoz`、`LogiNext`、`GSMtasks`、`eLogii`、`Dispatch\
    \ Science`、`Track-POD`、`Locus`、`OptimoRoute`和`Routific`。`Hailify`是一家物流公司，它将拼车和配送工作整合到一个单一平台中，供零工司机使用。服务合作伙伴受益于拥有更广泛的司机池，同时也可以利用`Hailify`按单提供保险。司机则受益于有更多工作可选，而无需在不同服务之间手动切换，从而在特定时间段内最大化其收入潜力。\n\
    \n关于零工经济模式作为独立承包商唯一收入来源的可持续性仍存在争议，原因在于该模式的财务回报较低。低财务回报是由于有限的短期工作、有限的利益相关者以及提供类似服务的应用程序数量巨大所致。\n\
    \n在COVID-19疫情期间，对非接触式“最后一英里”配送服务的需求激增。这导致对零工劳动力的需求增加，以便及时且经济高效地完成配送任务。COVID-19对“最后一英里”配送的影响将在下一章讨论。"
  raw: 'According to Frost & Sullivan, data monetization is expected to unravel ∼33
    billion in opportunity for OEMs, with the potential to monetize $100 per car across
    140 unique use cases by 2025. However, according to a more updated survey conducted
    by McKinsey (Bertoncello et al., 2021), data monetization could deliver $250–400
    billion in annual incremental value for players across the ecosystem in 2030\.
    These players include vehicle-specific players (OEMs and dealerships), fleet operators,
    rentals, mobility service providers, telematics players, vehicle maintenance/workshops,
    and the extended ecosystem groups (e.g., governments, infrastructure players,
    charging and fueling providers, advertising and marketing, content providers,
    third-party market places, logistics and freight forwarding, financial services,
    and tech companies). On a per-vehicle level, connectivity could deliver up to
    $310 in revenue and $180 in cost savings per year, on average, in B2B and B2C
    settings by 2030\. Nine clusters have been revealed in this report with 38 potential
    use cases for data monetization. However, OTA updates, R&D hardware optimization,
    and sales and service efficiency are the three use cases that are expected to
    deliver the greatest impact. For example, OTA updates can provide several revenue
    generation and cost-saving opportunities such as selling features throughout a
    vehicle’s life cycle, post-purchase feature activation, reducing the number of
    variants OEMs need to create, and preventing or accelerating recalls. GM unveiled
    a new brain and digital nerve system called Vehicle Intelligence Platform (VIP)
    that will enable OTA software updates on all vehicles. This architecture supports
    4.5 terabytes of data transfer per hour and is currently used in 2020 Cadillac
    CT5 and 2020 Corvette, and will be used on all GM models introduced over the next
    few years.


    According to McKinsey (Bertoncello et al., 2021), most companies have been unsuccessful
    in monetizing data so far due to three main reasons. The first reason is failing
    to generate customer interest and differentiate their services. The second reason
    is not resetting the organization and not building capabilities that enable effective
    data monetization throughout the entire vehicle life cycle. The third reason is
    not establishing ecosystems for scaling.


    Ontario’s Autonomous Vehicle Innovation Network (AVIN) envisions several vehicular
    cloud services (Kadri et al., 2019). These services include Processing as a Service
    (PRaaS), Storage as a Service (STaaS), Network as a Service (NaaS), and Information
    as a Service (INaaS). PRaaS enables the utilization of the available on-board
    processing resources of connected vehicles. STaaS opens the door to use the available
    storage resources of connected vehicles as dynamic data centers or as mules or
    relays for data mobilization. NaaS enables the vehicle to serve as a mobile hot
    spot. Finally, through INaaS, a connected vehicle can be used as a resource for
    information for neighboring and remote entities such as other vehicles, infrastructure,
    smart homes, EV charging stations, and so on.


    ## 5.9 Gig Economy and Passenger Economy


    Gig economy and passenger economy are two new business models that are facilitated
    by smart mobility systems and services. The following subsections introduce these
    models.


    ### 5.9.1 Gig Economy and Crowdsourcing


    A gig economy is a business model in which short-term and flexible jobs are commonplace
    for independent contractors with different skill sets who are available for income-earning
    freelance activities without traditional, long-term employer-employee relationships.
    In most of the cases, these freelance activities do not require any previous work
    experience. According to an Intuit 2020 study on the future of gig employment,
    gig economy trends show that in the years to come, over 80% of major US-based
    companies would significantly increase their use of nontraditional jobs.


    Gig economy in the mobility domain, especially in on-demand delivery, has gained
    remarkable moment in the last few years. Several first- and last-mile transportation
    services and last-mile delivery services are based on this gig economy. Examples
    include GoShare (assist customers in need of drivers or movers); Kanga, EZER,
    and Bellhops (for movers); Cabify, Amazon Flex, and Stuart (delivering parcels);
    Deliv (delivering parcels); FedEx Express (short- and long-distance delivery);
    and so on. A comprehensive overview of 24 gig economy–based apps is available
    here.^([^(46)](#fn46)) Most of these apps focus on enabling crowdsourced delivery
    and mainly same-day and instant delivery services based on the gig economy model
    due to the continuously growing demand for speedy delivery services.


    Important


    According to management consultants at McKinsey & Company, the market for same-day
    and instant delivery will account for around 20% of standard parcel revenue by
    2025 with expected average year-on-year growth of around 40%.


    Examples of gig economy–based platforms for delivery services include Onfleet,
    OnTime 360, Bringoz, LogiNext, GSMtasks, eLogii, Dispatch Science, Track-POD,
    Locus, OptimoRoute, and Routific. Hailify is a logistics company aggregating ridesharing
    and delivery jobs for gig drivers into a single platform. Service partners benefit
    from having a broader driver pool, as well as using Hailify to provide insurance
    on a per-gig basis. Drivers benefit from having more jobs to choose from without
    needing to switch between services manually, which maximizes their earning potential
    over a time span.


    There is still a debate about the sustainability of the gig economy model as a
    unique source of income for the independent contractors due to the low financial
    rewards of this model. The low financial reward is the result of the limited short-term
    work with limited stakeholders and the availability of a huge number of apps that
    offer similar services.


    During the COVID-19 pandemic, demand for contactless last-mile delivery services
    was skyrocketing. This resulted in an increasing need for gig workforce to fulfill
    delivery tasks in a timely and cost-effective manner. The impacts of COVID-19
    on last-mile delivery are discussed in the next chapter.'
