  trans: '

    # 可负担性与电动出行


    `可负担性`仍然是电动汽车面临的最大障碍之一。其他电动微出行平台，例如电动自行车、电动滑板车和电动三轮车（见第 4.5 节），尤其是共享模式，则要实惠得多。尽管电动汽车相比传统内燃机汽车（ICEV）的初始成本更高，但其运行成本却低得多。根据密歇根大学交通研究所^(¹⁸)2018
    年进行的一项研究，电动汽车的运行成本不到内燃机汽车的一半。该研究表明，在美国，运营一辆电动汽车的年均成本为 485 美元，而内燃机汽车的平均成本为 1117
    美元。此外，鉴于电动汽车的活动部件远少于内燃机汽车，电动汽车的使用寿命明显更长，维护需求也更少。唯一的例外是电池的使用寿命较短。根据`InsideEVs`^(¹⁹)的数据，几乎所有电动汽车电池的保修期至少为
    8 年或 10 万英里。而且，随着时间的推移，电动汽车变得越来越实惠。根据一份`Electric Vehicle Market Status—Update`报告^(²⁰)，考虑到当前联邦、州和地方激励措施，市场上即将出现净成本低于
    30,000 美元（厂商建议零售价）、续航里程高达 250 英里的电动汽车车型。该报告还显示，当电池组价格降至 100 美元/千瓦时以下时，电动汽车将与内燃机汽车实现价格平价（基于不考虑任何税收优惠的总拥有成本）。虽然一些行业专家认为这最早可能在
    2021 年实现，但大多数人认为这将在 2025 年左右发生。多家原始设备制造商正在加速电气化进程。例如，通用汽车在 2020 年推出了一系列新款电动汽车，包括凯迪拉克
    LYRIQ 和标志性的美国 SUV 悍马 EV，并计划到 2025 年在全球推出 30 款电动汽车。


    `车网互联`（V2G）技术（Sovacool 等人，2020）有助于提高电动汽车的可负担性，因为它使电动汽车车主能够通过将电动汽车电池中的能量回馈给电网来赚钱。然而，车辆需要有
    75%的时间处于插电状态，才能捕捉到 V2G 的潜在价值。对于住宅用户而言，这在应急响应车辆或物流等车队中不会成为问题。电网平衡、电网维护、配电网互操作性以及数据隐私/网络安全仍然是
    V2G 面临的挑战。例如，在 V2G 网络安全方面，数据将在四方之间共享，即零售商/供应商、网络公司、车队和个人用户。保证透明度（为何要共享数据？）、信任（数据将与谁共享？）和价值（共享数据有何益处？）有助于社会对
    V2G 技术的接受。


    `电动出行`应得到自适应路线规划和导航算法、非接触式支付以及能源辅助应用的支持，以避免用户的里程焦虑和充电焦虑。如今，已有多种能源辅助工具可用，例如`myChevrolet`移动应用的`Energy
    Assist`、`Google Automotive Services`（GAS）、[`EVNAViQ`](https://github.com/evnaviq)、`PlugShare
    Trip Planner`、`ChargePoint`、`ChargeHub`、`EVgo`、`EVHotels`、`Chargeway`、`Chargemap`和`Greenlots`。`GM
    Energy Assist`整合了来自车辆的数据，从而实现智能规划和准确的充电时间预测。该应用提供的服务包括实时充电站可用性（适用于`EVgo`、`Flo`、`ChargePoint`和`EV
    Connect`等充电网络）、支付、车主对充电站的评价和评分，以及偏好设置（例如充电器类型、网络和充电器可用性）。类似地，也有多款应用适用于电动自行车、电动滑板车和电动滑板等微出行平台。例如`Strava`、`Trailforks`、`Gravatron`、`Coach’s
    Eye`、`Bike Share Toronto`、`WIND`、`HFX`，以及被福特收购的共享电动滑板车`SpinBike`。在电动汽车车队层面，`Ubiq`平台提供预测性充电、充电即服务（ChaaS）、动态定价和自动车队平衡。


    ## 4.5 微出行


    `微出行`是一种体型小巧、重量轻、速度低（低于 25 公里/小时）的出行平台，通常用于短途出行。微出行正日益普及，其形式多样，例如自行车、滑板车、滑板和自平衡独轮车。


    **重要提示**


    `Inkwood Research`预计，全球微出行市场到 2026 年将达到 132.7 亿美元，在 2021-2026 年的预测期内，年复合增长率为 12.09%。


    电动出行平台被称为电动微出行平台，例如电动自行车、助力踏板自行车、电动滑板车、电动坐式滑板车（也称为 Vespa 式踏板车或轻便摩托车）、电动滑板、电动摩托车（也称为电动两轮车或
    E2W）、趣味多功能车（FUV）、电动三轮车（也称为电动嘟嘟车或 toto）、赛格威，以及电动四轮车/电池动力微型汽车（例如雪佛兰 EN-V 2.0）。


    这些出行平台可以共享，也可以作为个人交通工具私有。它们可用于本地出行、第一公里交通（即从家或出行起点到交通系统）和最后一公里交通（即从交通系统到最终目的地，如家、工作场所或咖啡馆）、监控，以及在教育机构校园、住宅小区、购物中心、主题公园和机场等场所提供送货服务，仅举几例。例如，共享电动三轮车在许多国家，尤其是低收入发展中国家，作为一种非正式且公平的交通系统已变得非常流行。公平的交通系统旨在满足以往服务不足人群的需求，使这些群体能够方便且负担得起地前往目的地和获取机会（Yanocha
    和 Allan，2019）。考虑到交通支出是家庭支出的主要类别之一，微出行提供的可负担性在发达国家和发展中国家都是一个有吸引力的因素。例如，根据`加拿大统计局`^(²¹)的数据，2017
    年交通支出是第二大支出类别，占总消费的 19.9%，仅次于住房支出（29.2%），高于食品支出（13.4%）。


    `麦肯锡公司`^(²²)声称，从理论上讲，微出行可以涵盖所有少于 8 公里（5 英里）的旅客出行，这占当今中国、欧盟和美国总旅客里程的 50-60%。交通与发展政策研究所在（Yanocha
    和 Allan，2019）中总结了电动微出行（如电动自行车和电动滑板车）在可达性、环境、公平性、可负担性、效率、安全和健康方面潜在的正负面影响。例如，在可达性方面，电动微出行的潜在积极影响包括：短途出行的时间可与汽车媲美，以及与公共交通以及经济和社会机会的连接。然而，对公共停车的需求将会增加，并且需要基础设施方面的改变。

    '
- fmt: '## 4.6 Active, Soft, or Zero-Impact Mobility


    Aside from being popular recreational activities, walking and cycling are also
    efficient, affordable, environmentally friendly, and accessible means of active
    mobility. Shifts from motorized to non-motorized vehicles for short trips are
    highly encouraged in many developed countries. Moreover, Millennials or Gen Y
    usually choose to settle in dense urban areas that favor walking, bicycling, and
    other active mobility modes. Active or soft or zero-impact mobility includes non-motorized
    human-powered transporters such as walking, pedal bicycles, kick scooters, roller
    skates, skateboards, and pedal rickshaws. These mobility modes are a cheap, fun,
    and environmentally friendly option for first-/last-mile urban mobility. Active
    mobility can certainly be a step forward toward a future of sustainable mobility.


    **Important**


    According to a study undertaken by the National Collaborating Centre for Environmental
    Health (NCCEH), the wider benefits of walking, cycling, and other active transportation
    modes include reduced road congestion and greenhouse gas emissions; cheaper infrastructure,
    including lower maintenance costs; road safety improvements; and lower user costs
    compared to motorized vehicles (Reynolds et al., 2010).


    The General Theory of Walkability states that a journey on foot should satisfy
    four main conditions: be useful, safe, comfortable, and interesting (Speck, 2014).
    Different walkability measures or metrics are proposed based on several factors
    such as presence of continuous and well-maintained sidewalks, universal access
    characteristics, path directness and street network connectivity, safety of at-grade
    crossing treatments, absence of heavy and high-speed traffic, pedestrian separation
    or buffering from traffic, land use density, building and land use diversity or
    mix, street trees and landscaping, visual interest, and a sense of place as defined
    under local conditions and perceived or actual security (Lo, 2009). For example,
    `Walk Score` is used to measure a city’s walkability in the United States, Canada,
    and Australia. According to `Walk Score`, Vancouver, Montréal, and Toronto are
    the most walkable cities in Canada in 2020. New York tops the US list for 2020
    at an overall 88.3 out of 100 followed by San Francisco.


    Wearable devices with motion sensing technology are now used to monitor mobility-related
    activities. Wearable technology is defined as devices that can be worn or mated
    with human skin to continuously and closely monitor an individual’s activities,
    without interrupting or limiting the user’s motions (Haghi et al., 2017). Smartphones,
    smart watches, smart rings, smart bracelets, smart wristbands or headbands, and
    fitness trackers are examples of these wearable devices with motion sensing technology.
    Several walking apps provide the ability to offer walking directions; track users’
    walking workouts, all-day steps, or activities; and render their speed, traveled
    distance, and route. Examples of these apps include `RideScout`, `Walkmeter Walking
    & Hiking GPS`, `MotionX-GPS`, `Virtual Walk`, `MapMyWalk`, `Argus`, `Fitbit app
    MobileTrack`, `Endomondo`, and `Charity Miles`. `WALKscope` is also a crowdsourcing
    tool used by Denver residents to gather data related to walkability such as street
    information—sidewalk conditions, intersections, and pedestrian counts.


    In many cases, for distances up to 10 km in urban areas, cycling can be the fastest
    of all modes from door to door (MMM Group, 2016). Innovative bicycle-related technologies
    improve cycling experience. These technologies include motion sensing, performance
    monitoring, seat detection, fitness planning, trip planning, and so on. Smart
    bikes are equipped with sensors that can continuously collect physiological and
    performance data such as speed, power output, pedal pressure, frame behavior,
    heart rate, temperature, humidity, and more. Smart bike helmets are equipped with
    built-in taillight, speakers, microphone, and Bluetooth connectivity. `Strava`,
    `Zwift`, `Komoot`, `Cyclemeter GPS`, `ViewRanger`, `Map My Ride GPS Cycling &
    Route Tracker`, `Bikemap`, and `Google Maps` are examples of mobile apps that
    help cyclists get the most out of their time on two wheels. Skin temperature in
    addition to glucose, lactate, sodium, and potassium in sweat or electrodermal
    activity (EDA) or a Galvanic Skin Response (GSR)–based sensor can be used to detect
    sweating. Special clothes can monitor a cyclist’s hydration using bioelectrical
    impedance vector analysis (BIVA)–based hydration sensors.


    Many cities around the world promote active mobility through several programs.
    For example, Brussels Mobility has launched a poster campaign `#BlijvenTrappen`
    (“keep pedaling”) and temporarily offered free use of shared bicycles from the
    city’s `Villo` scheme, resulting in 7,000 new subscribers. According to the `Copenhagenize
    Index`, Copenhagen is ranked as the 2019 most bike-friendly city in the world.
    The `Copenhagenize Index` is a comprehensive and holistic ranking of the world’s
    most bicycle-friendly cities. Sixty-two percent of Copenhageners’ trips to work
    or school are by bike, and the government invested more than $45 per capita in
    bicycle infrastructure (Colville-Andersen, 2015). However, according to the `Bicycle
    Cities Index 2019`, the Dutch city of Utrecht is the world’s most bicycle-friendly
    city. North American cities are absent from the top ten with Montreal as the highest-ranked
    Canadian city (16th in the world) and San Francisco as the highest-ranked US city
    (39th in the world).


    The `LAirA` (Landside Airport Accessibility) EU-funded project focuses on multimodal,
    smart, and low-carbon airport access. This project encourages active mobility
    (walking, cycling, etc.) as an option for airports. The health economic assessment
    tool (`HEAT`) for walking and cycling is described in Kahlmeier et al. (2017)
    as a user-friendly yet robust evidence-based decision-making tool for transport
    and urban planners allowing the inclusion of physical activity benefits in transport
    appraisals. `Urbano` is another tool to promote active mobility in urban design
    (Dogan et al., 2020). This tool introduces two new urban design metrics called
    `Streetscore` and `Amenityscore` beside an expanded version of the well-known
    `Walkscore`.


    ## 4.7 Inclusive Mobility


    The World Health Organization (WHO) estimates that 1.1 billion people (14.1% of
    the world’s population) suffer from some form of disability. This represents the
    world’s largest minority and the only minority group that any of us can become
    a member of at any time. An estimated 466 million people worldwide have disabling
    hearing loss, and this number is expected to rise to 1 in 4 by 2050. Globally,
    the number of people of all ages visually impaired is estimated to be 285 million,
    of whom 39 million are blind. Seventy-five million people need a wheelchair on
    a daily basis. This represents almost 1% of the world’s population. About 200
    million people have an intellectual disability (IQ below 75). This represents
    more than 2.5% of the world’s population. According to the US Centers for Disease
    Control and Prevention (CDC), 61 million adults in the United States, more than
    1 in 4 US adults (and about 2 in 5 adults aged 65 years and older), live with
    a disability (Centers for Disease Control and Prevention and others, 2019). Moreover,
    most people are likely to experience a mobility impairment at some point during
    their life (Davidson and Viita, 2020). The Open Doors Organization claims that
    more than 60% of people with disabilities in the United States report major obstacles
    when they travel. Population aging is also an increasing phenomenon due to declining
    fertility rates and rising life expectancy. For example, more than 35% of the
    population of a country like Italy will be over the age of 85 by 2050 (Tapus et
    al., 2007). As people age, transportation options often become more limited (Davidson
    and Viita, 2020).'
  raw: '## 4.6 Active, Soft, or Zero-Impact Mobility


    Aside from being popular recreational activities, walking and cycling are also
    efficient, affordable, environmentally friendly, and accessible means of active
    mobility. Shifts from motorized to non-motorized vehicles for short trips are
    highly encouraged in many developed countries. Moreover, Millennials or Gen Y
    usually choose to settle in dense urban areas that favor walking, bicycling, and
    other active mobility modes. Active or soft or zero-impact mobility includes non-motorized
    human-powered transporters such as walking, pedal bicycles, kick scooters, roller
    skates, skateboards, and pedal rickshaws. These mobility modes are a cheap, fun,
    and environmentally friendly option for first-/last-mile urban mobility. Active
    mobility can certainly be a step forward toward a future of sustainable mobility.


    Important


    According to a study undertaken by the National Collaborating Centre for Environmental
    Health (NCCEH), the wider benefits of walking, cycling, and other active transportation
    modes include reduced road congestion and greenhouse gas emissions; cheaper infrastructure,
    including lower maintenance costs; road safety improvements; and lower user costs
    compared to motorized vehicles (Reynolds et al., 2010).


    The General Theory of Walkability states that a journey on foot should satisfy
    four main conditions: be useful, safe, comfortable, and interesting (Speck, 2014).
    Different walkability measures or metrics are proposed based on several factors
    such as presence of continuous and well-maintained sidewalks, universal access
    characteristics, path directness and street network connectivity, safety of at-grade
    crossing treatments, absence of heavy and high-speed traffic, pedestrian separation
    or buffering from traffic, land use density, building and land use diversity or
    mix, street trees and landscaping, visual interest, and a sense of place as defined
    under local conditions and perceived or actual security (Lo, 2009). For example,
    Walk Score is used to measure a city’s walkability in the United States, Canada,
    and Australia. According to Walk Score, Vancouver, Montréal, and Toronto are the
    most walkable cities in Canada in 2020. New York tops the US list for 2020 at
    an overall 88.3 out of 100 followed by San Francisco.


