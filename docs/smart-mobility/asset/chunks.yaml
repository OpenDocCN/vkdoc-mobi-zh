- fmt: '# ADS Framework


    - **Scan:** ADS sensors scan the roadway and surrounding areas in all directions
    for objects around the vehicle: other vehicles, bicyclists, pedestrians, animals,
    objects in the roadway, potholes, and temporary signage. They interpret any traffic
    controls including traffic light color or railroad crossing gates and signals.
    The scanners’ range extends for hundreds of meters.

    - **Predict:** The ADS predicts the trajectory of every movable object based on
    its current location and its previous movements and speed. The predictions take
    into account how other objects may be affected by roadway features or conditions,
    such as traffic signals or a vehicle in the travel lane. These predictions are
    updated many times each second.

    - **Act:** The ADS then chooses its trajectory and any speed or steering adjustments
    needed for this trajectory.

    - **Repeat:** Run the same four steps continually.


    This framework is somehow similar to the Observe, Orient, Decide, and Act (`OODA`)
    loop commonly used in a combat operations process. During the “Observe” step,
    the vehicle tries to obtain a cohesive understanding of the world based on processing
    data from different multimodal sensors such as cameras, `LiDAR`, short-range and
    long-range radars, and so on. During the “Orient” step, a representation of the
    world is created to help the vehicle in comprehending the situation and in selecting
    a course of action, planning, and making decisions accordingly in the “Decide”
    phase. During the “Act” stage, the vehicle executes the planned actions, keeps
    monitoring the situation, and replans if necessary.


    # Cognitive Cycle


    The cognitive cycle of **Sense-Aware-Decide-Act-Adapt-Learn** is a more comprehensive
    way to explain the capabilities of autonomous vehicles from the robotics perspective.
    This cycle extends the commonly known deliberative cycle of **Sense-Decide-Act**
    commonly used in robotics by adding situation awareness, adaptation, and learning
    capabilities as illustrated in Figure [3-14](#511013_1_En_3_Chapter.xhtml#Fig14).
    In these systems, data is collected from different hard and soft data sources.
    Hard data is collected from physical sensors (e.g., cameras, radar, `LiDAR`),
    and soft data includes virtual sensing, fused data, human input, and social media
    data. The collected data is processed to achieve different levels of situation
    awareness such as the perception of elements in the environment within specific
    time and space constraints, the comprehension of their meaning, and the projection
    of their status in the near future and possible consequences (Endsley, 2016).


    As illustrated in Figure [3-14](#511013_1_En_3_Chapter.xhtml#Fig14), perception
    results in a compiled picture of the environment that may include several subprocesses
    such as object localization (or tracking), object recognition, and identification.
    Comprehension capability integrates this information to produce a more comprehensive
    picture of the world that shows the relations between the recognized objects.
    Projection capability projects the future actions of the objects in the environment.
    Generally speaking, the output of the situation awareness capability is a mapped
    environment or a domain model that may contain initial state, goal state, possible
    states of the vehicle, primitive actions or activities, hard and soft constraints,
    uncertainty (sensors and actuators), a priori knowledge, and a low- or high-definition
    static/dynamic map.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig14_HTML.jpg](images/511013_1_En_3_Chapter/511013_1_En_3_Fig14_HTML.jpg)


    **Figure 3-14** Cognitive Cycle of Autonomous Vehicles


    A decision-making module is responsible for making a decision in the absence of
    certainty. This uncertainty, if not handled correctly, may result in wrong beliefs
    about its state and/or the state of the environment, resulting in wrong actions
    to be taken. An adaptation module enables the system to adapt its behavior based
    on a context extracted from the situation awareness module. Contextual information
    answers situation-related questions such as who, what, when, and where in order
    to characterize the work environment and the system’s agents in terms of location,
    identity, activity, time, and status. Adaptation can take the form of changing
    role assignments or coordination mode or replanning, plan repair, and control
    the use of the sensing and acting resources in a manner that synergistically improves
    the process of data gathering and ultimately enhances situation awareness and
    decision-making. Learning from previous experience is a crucial feature for autonomous
    systems. A learning module can be designed to allow the system to learn new tasks
    or to automate repetitive processes and to provide smart guidance to a human whenever
    needed.


    # Motion Planning Example


    Let’s consider motion planning as an example of a specific task of a self-driving
    vehicle. Motion planning is a complex activity that determines a future course
    of actions/activities for a self-driving vehicle to drive itself from an initial
    state to a specified goal state. Planning often involves reasoning under uncertainty,
    especially in unstructured, dynamic, and partially observable environments. To
    plan the motion properly, the autonomous vehicle must compute a collision-free
    optimal path from the start position to the given goal position, amid a collection
    of obstacles. While path planning focuses on the spatial aspects of the motion,
    trajectory planning includes spatiotemporal aspects related to how to move based
    on trajectory, velocity, time, and kinematics, taking into consideration the mechanical
    limitations of the vehicle. In the context of motion planning, the decision-making
    module represents the planning entity that takes the mapped environment/domain
    model as an input and generates a plan using a planning method/solver as illustrated
    in Figure [3-15](#511013_1_En_3_Chapter.xhtml#Fig15). These solvers can be based
    on discrete planning (e.g., forward search and backward search), combinatorial
    planning (e.g., exact and approximate cell decomposition, Voronoi diagrams, visibility
    graph, freeway net and silhouette), sampling-based motion planning (e.g., rapidly
    exploring random trees and probabilistic road maps), potential field methods,
    metaheuristics, decision-theoretic planning, or hybrid approaches.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig15_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig15_HTML.png)


    **Figure 3-15** Adaptive Motion Planning


    The plan is then sent to the execution module or planned entity to generate the
    actuation commands to be sent to the vehicle actuators. The execution of the plan
    can be continuously monitored by the situation awareness capability, and the adaptation
    capability adapts the plan whenever necessary by plan repair or a replanning algorithm.
    The learning capability continuously learns from examples and/or from interaction
    to improve future decisions.


    # Historical Background


    The US Defense Advanced Research Projects Agency (`DARPA`) spawned automated driving
    vehicles through the `DARPA Grand Challenge`, which occurred for the first time
    in March 13, 2004, targeting mainly the mobile robotics community. Since then,
    autonomous vehicles have received an increasing amount of attention from academia,
    government laboratories, industry, and venture capitalists due to their wide applicability
    in many potential domains including smart mobility. Other competitions have been
    established to further advance the research and development in this area such
    as the `AutoDrive Challenge`, `CARNET Autonomous Driving Challenge`, and `Indy
    Autonomous Challenge` (`IAC`).'
