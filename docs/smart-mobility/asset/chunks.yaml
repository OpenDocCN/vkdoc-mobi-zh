    of information seamlessly between the vehicle and everything in the right format
    at the right time. Here, the concept of vehicle is extended to include any mobility
    platform used for transporting people or goods on land, sea, or air such as cars,
    trucks, bikes, e-scooters, air/river taxis, automated people movers, and so on.
    The connectivity forms include the following:


    *   **Vehicle-to-Occupant (V2O)** : An occupant can be a driver or a passenger
    of a mobility platform. V2O enables features like BLE/UWB-enabled phone-as-a-key;
    in-vehicle connectivity services for work, play, and commerce; driving error recognition
    and prediction; and quantifying the quality of experience. V2O can be extended
    to include customer connectedness that includes not only direct human involvement
    with WiFi, 4G, and now 5G technology through various interface devices such as
    smartphones, gaming consoles, and augmented reality/virtual reality headsets but
    also the connected delivery of insight from a diversely growing number of things.
    For example, connected healthcare devices and personal wearables can tell occupants
    about the experiences they have with the vehicle and in the environment around
    them (Whitelock, 2019).


    *   **Vehicle–to–Vulnerable Road User (V2VRU)** : VRUs include pedestrians and
    cyclists as well as motorcyclists and persons with disabilities or reduced mobility.
    V2VRU can be an enabler for VRU detection, localization, and crossing intention
    and motion behavior recognition.


    *   **Vehicle-to-Vehicle (V2V)** : For applications like post-crash warning, pre-crash
    warning, cooperative collision warning, cooperative forward collision warning,
    lane change warning, vehicle-based road condition warning, visibility enhancer,
    wrong way driver warning, intersection movement assist, blind spot warning, communication
    relaying in case of emergency, smart cargo companions, last-mile delivery systems,
    cooperative adaptive cruise control, cooperative automation, fleet management
    systems, and self-organized autonomous vehicles. V2V allows all vehicles to move
    in a coordinated fashion, reducing stop-and-go congestion and emergency maneuvers
    (Hedlund and North, 2018). Different communication technologies have been proposed
    and implemented to facilitate vehicle-to-vehicle (V2V) communication, sensor data
    sharing, cooperative perception, and safety applications (Edison, 2019; Higuchi
    et al., 2019; Thota et al., 2019).


    *   **Vehicle-to-Environment (V2E)** : For applications such as road condition
    monitoring, traffic sign and light recognition, driving risk prediction, and perimeter
    monitoring systems. Slow and near-real-time infrastructure and environmental sensing
    can be also achieved by connected vehicles. Slow-changing infrastructure sensing
    includes, but is not limited to, road roughness or estimation of the International
    Roughness Index, bank angle, lane marking quality, potholes, speed bumps, and
    so on (Nguyen et al., 2019). Examples of near-real-time infrastructure sensing
    conditions include snow coverage, dust coverage, oil spill detection, and so on.


    *   **Vehicle-to-Infrastructure (V2I)** : For road condition warning, SOS services,
    work zone warning, emergency vehicle signal preemption, intersection collision
    warning, in-vehicle AMBER alert, remote diagnostics and repair, pedestrian crossing
    information, red light warning, pedestrian detection and warning, bicycle detection
    and warning, no left-hand turn warning, traffic condition monitoring, weather
    condition, traffic light management system, interaction management system, parking
    management system, and teleoperation in case of malfunctioning self-driving cars.
    For example, GM’s OnStar services provide automatic collision notification, SOS
    emergency assistance, enhanced roadside assistance, monthly vehicle health report,
    automatic diagnostic trouble code notification, service link, maintenance reminder,
    driving information, and on-demand diagnostics.


    *   **Vehicle-to-Network (V2N)** : For disabled roadside vehicle warning, security
    credential management system, multimodel mobility systems, dynamic on-demand mobility
    systems and services, cloud-based crowdsensing services, real-time traffic monitoring,
    and bringing attractive consumer experiences into the cabin to foster brand loyalty.


    Figure [4-1](#511013_1_En_4_Chapter.xhtml#Fig1) illustrates how different forms
    of connectivity such as V2VRU, V2V, and V2I can play a role in a post-crash safety
    warning scenario using DSRC and C-V2X wireless communication technologies. In
    this scenario, a vehicle ahead of the way is able to notify other vehicles about
    incidents that lie ahead or an alarming situation such as emergency electronic
    brake light ahead warning or forward collision avoidance (Peng et al., 2019).


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig1_HTML.png](images/511013_1_En_4_Chapter/511013_1_En_4_Fig1_HTML.png)


    Figure 4-1


    Post-Crash Safety Warning Scenario


    As mentioned in the previous chapter, the FCC has ruled new regulations in November
    2020 to reallocate the 5.850–5.925 GHz (i.e., 5.9 GHz) spectrum band dedicated
    for DSRC standard operations since 1999\. The spectrum reallocation announced
    by the FCC comes as a drastic measure toward the slow deployment of the DSRC technology.
    The existing 75 MHz safety spectrum will be subdivided into two bandwidth allocations.
    The upper band 30 MHz ranging from 5.850 to 5.925 GHz will no longer support DSRC
    and will be instead reassigned to advance and speed up the deployment of cellular
    vehicle-to-everything (C-V2X) technology.


    ## 4.3 Automated Mobility


    The WHO considered human error as the single largest cause of all collisions today
    and a major factor in more than 90% of fatal crashes (World Health Organization,
    2018). Automated mobility aims at eliminating or reducing these injuries and fatalities,
    improving access to mobility for those who currently cannot drive due to age or
    disability, and creating new business models such as passenger economy.'
  trans: '

    ## 4.2 网联出行


    网联出行创造了新的数据丰富环境，并成为众多应用和服务的推动力，这些应用和服务将使我们的道路更安全、更少拥堵、更环保。网联出行能够支持实时导航与路径规划、交通信息、安全警告、事故避免、高级驾驶辅助系统（`ADAS`）以及自动驾驶系统（`ADS`）等功能。例如，想象一下，在变道前，系统会因盲区中即将驶来、可能导致碰撞的车辆而发出警告；提醒前方危险，如障碍物、横穿的行人/骑行者、停驻车辆、施工区域或结冰路面；提供远程诊断、故障代码通知和维修服务；实时推送交通信息和兴趣点（如商场）的更新；帮助寻找空闲停车位和加油站/充电站；以及促进在线购物。


    网联化的广泛范畴是车联万物（`V2X`），它确保车辆与周围一切之间以正确的格式、在正确的时间无缝共享信息。在此，“车辆”的概念被扩展，涵盖了用于在陆地、海洋或空中运输人员或货物的任何出行平台，例如汽车、卡车、自行车、电动滑板车、空中/水上出租车、自动旅客捷运系统等。网联形式包括以下几种：


    *   **车与乘客（`V2O`）**：乘客可以是出行平台的驾驶员或乘员。`V2O` 支持通过 `BLE/UWB` 技术实现的手机即钥匙功能；用于工作、娱乐和商务的车内网联服务；驾驶错误识别与预测；以及体验质量的量化。`V2O`
    可扩展至客户互联，不仅包括通过智能手机、游戏主机、增强现实/虚拟现实头显等各种接口设备，利用 WiFi、4G 及现在的 5G 技术进行的直接人类互动，还包括来自日益多样化的物联网设备所产生洞察的互联传输。例如，联网的健康监测设备和个人可穿戴设备可以告知乘员他们在车内及周边环境的体验（Whitelock，2019）。


    *   **车与弱势道路使用者（`V2VRU`）**：`VRU` 包括行人、骑行者，以及摩托车手、残障人士或行动不便者。`V2VRU` 能够支持 `VRU`
    的检测、定位、过街意图及运动行为识别。


    *   **车与车（`V2V`）**：其应用包括碰撞后警告、碰撞前警告、协作式碰撞警告、协作式前方碰撞警告、变道警告、基于车辆的路况警告、能见度增强、逆行驾驶员警告、交叉路口移动辅助、盲点警告、紧急情况下的通信中继、智能货运伴侣、末端配送系统、协作式自适应巡航控制、协作式自动化、车队管理系统以及自组织自动驾驶车辆。`V2V`
    使所有车辆能够以协调的方式移动，减少“停停走走”的拥堵和紧急避让操作（Hedlund and North，2018）。为促进车与车（`V2V`）通信、传感器数据共享、协同感知及安全应用，已有多种不同的通信技术被提出并付诸实施（Edison，2019；Higuchi
    et al., 2019；Thota et al., 2019）。


    *   **车与环境（`V2E`）**：其应用包括路况监测、交通标志与信号灯识别、驾驶风险预测以及周界监控系统。联网车辆还能实现缓慢变化及近实时性的基础设施与环境感知。缓慢变化的基础设施感知包括但不限于路面粗糙度或国际平整度指数估算、弯道倾斜角、车道标线质量、坑洼、减速带等（Nguyen
    et al., 2019）。近实时性基础设施感知条件的例子包括积雪覆盖、沙尘覆盖、油污检测等。


    *   **车与基础设施（`V2I`）**：其功能包括路况警告、`SOS` 求救服务、施工区域警告、应急车辆信号优先通行、交叉路口碰撞警告、车内 `AMBER`
    警报、远程诊断与维修、行人过街信息、红灯警告、行人检测与警告、自行车检测与警告、禁止左转警告、交通状况监测、天气状况、交通信号灯管理系统、交互管理系统、停车管理系统，以及自动驾驶汽车故障时的远程操控。例如，通用汽车的
    `OnStar` 服务提供自动碰撞通知、`SOS` 紧急援助、增强型路边援助、月度车辆健康报告、自动诊断故障代码通知、服务连接、保养提醒、驾驶信息以及按需诊断。


    *   **车与网络（`V2N`）**：用于路边故障车辆警告、安全凭证管理系统、多模式出行系统、动态按需出行系统与服务、基于云的群体感知服务、实时交通监控，以及将吸引人的消费者体验带入座舱以培养品牌忠诚度。


    图 4-1 展示了在使用 `DSRC` 和 `C-V2X` 无线通信技术时，不同形式的网联（如 `V2VRU`、`V2V` 和 `V2I`）如何在碰撞后安全警告场景中发挥作用。在该场景中，前方车辆能够通知其他车辆前方发生的事件或危险情况，例如前方紧急电子刹车灯警告或前方碰撞避免（Peng
    et al., 2019）。


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig1_HTML.png](img/511013_1_En_4_Fig1_HTML.png)


    图 4-1


    碰撞后安全警告场景


    如前一章所述，美国联邦通信委员会（`FCC`）于 2020 年 11 月颁布了新的规定，以重新分配自 1999 年以来专用于 `DSRC` 标准运营的 5.850–5.925
    GHz（即 5.9 GHz）频段。`FCC` 宣布的这一频谱重新分配，是对 `DSRC` 技术部署进展缓慢所采取的一项强力措施。现有的 75 MHz 安全频谱将被细分为两个带宽分配区。上段
    30 MHz（5.850–5.925 GHz）将不再支持 `DSRC`，而是被重新分配，以推进和加速蜂窝车联万物（`C-V2X`）技术的部署。


    ## 4.3 自动化出行


    世界卫生组织（`WHO`）认为，人为错误是当今所有碰撞事故的最大单一原因，并且是超过 90%致命车祸的主要因素（世界卫生组织，2018）。自动化出行旨在消除或减少这些伤害和死亡，改善因年龄或残疾目前无法驾驶者的出行便利性，并创造新的商业模式，如乘客经济。

