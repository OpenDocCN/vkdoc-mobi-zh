- fmt: "### 4.3.2 Automated Driving\n\nSimilar to the levels of control explained\
    \ in the previous chapter, the SAE (Society of Automotive Engineers) International\
    \ (SAE On-Road Automated Vehicle Standards Committee and others, 2018) defines\
    \ six levels of driving automation (Table [4-1](#511013_1_En_4_Chapter.xhtml#Tab1)).\
    \ In their standards such as `SAE J3016` (Taxonomy and Definitions), `SAE J3018`\
    \ (Safe Testing of Highly Automated Vehicles on Public Roads), and `SAE J3131`\
    \ (Automated Driving Reference Architecture), SAE does not use the term autonomous\
    \ and uses instead the term automated driving to reflect the fact that even the\
    \ most advanced automated driving systems are not self-governing. The difference\
    \ between automated systems and autonomous systems was highlighted in the previous\
    \ chapter.\n\nAutomated driving systems (ADSs) include level 3 (Low), level 4\
    \ (Medium), and level 5 (High). The term highly automated vehicle (HAV) sometimes\
    \ is used instead of ADS. Level 5 is the driverless full vehicle autonomy level\
    \ in all operational design domains (ODDs) that can be managed by a human driver.\
    \ ODD is the definition of where and when an ADS is designed to operate. ODD would\
    \ include the following information at a minimum to define each ADS’s capability\
    \ limits/boundaries:\n\n*   Roadway types (interstate, local, contained roadways\
    \ such as residential communities, universities, technology parks, retirement\
    \ and leisure) on which the ADS is intended to operate safely\n*   Geographic\
    \ area (city, mountain, desert, etc.)\n*   Speed range\n*   Environmental conditions\
    \ in which the ADS will operate (weather, daytime/nighttime, etc.)\n*   Other\
    \ domain constraints\n\nSAE International and ISO collaborate to update and refine\
    \ SAE levels of driving Automation as a way to reduce misinterpretation of concepts.\
    \ The most notable recently announced changes include naming SAE Level 1 and 2\
    \ as “Driver Support Systems” and SAE Levels 3-5 as “Automated Driving Systems”.\
    \ Additional terms and definitions have been also added such as remote assistance\
    \ and remote driving. Remote assistant and remote driver are the terms given to\
    \ the users who perform these functions. Definitions for vehicle types have been\
    \ grouped together by Conventional Vehicle, Dual-mode Vehicle and ADS-dedicated\
    \ Vehicle. Further clarity on the differences between SAE Level 3 and SAE Level\
    \ 4 was provided including the role of the fallback-ready user, the possibility\
    \ of some automated fallback at SAE Level 3, and the possibility of some alerts\
    \ to in-vehicle users at SAE Level 4. Explanation for how classifications of sustained\
    \ driving automation fit into the broader context of driver assistance and active\
    \ safety features is also added. For more information about on-road driving automation\
    \ levels and potential objective test methods that could be used as a framework\
    \ for evaluating emerging and future driving automation features, you can refer\
    \ to Tellis et al. (2016).\n\n### 4.3.3 Automated Driving and Safety\n\nHumans\
    \ usually apply a set of defensive driving rules to drive safely. One example,\
    \ the “Smith System,” is based on five key rules called `Smith5Keys`. These five\
    \ principles, rules, or keys are “aim high in steering,” “get the big picture,”\
    \ “keep your eyes moving,” “leave yourself an out,” and “make sure they see you.”\
    \ These rules provide drivers with the knowledge and skills to create three important\
    \ things while driving: space to maneuver the vehicle away from conflict, visibility\
    \ to detect danger and the potential for conflict with another vehicle or fixed\
    \ object early, and time to react to volatile and complex driving environments.\
    \ Other general principles defined in Standard Safe Practices for Motor Vehicle\
    \ Operations (ANSI/ASSE Z15.1) include maintaining a safe following distance,\
    \ driving safely considering (adjusting for) weather and/or road conditions, and\
    \ adjusting your speed before entering a bend, in order to avoid applying the\
    \ brakes in the middle of a bend (Hinderks et al., 2018). Self-driving vehicles\
    \ will need governing rules for defensive driving as well. Mobileye introduced\
    \ a model-based approach to safety entitled Responsibility-Sensitive Safety (RSS)\
    \ (Shalev-Shwartz et al., 2017). RSS highlights five safety rules an automated\
    \ driving vehicle should be able to follow. These five rules include safe distance\
    \ (i.e., the self-driving vehicle should not hit the vehicle in front), cutting\
    \ in (the self-driving vehicle should be able to identify when lateral safety\
    \ may be compromised by a driver unsafely crossing into its lane), right of way\
    \ (the self-driving vehicle should be able to protect itself against human drivers\
    \ who do not properly adhere to the right of way rules), limited visibility (be\
    \ cautious in areas with limited visibility), and avoiding crashes (the self-driving\
    \ vehicle should avoid a crash without causing another one).\n\n**Table 4-1**\
    \  \nSAE Levels of Automated Driving\n\n| Level | Name | Automated System Role\
    \ | Human Role |\n| --- | --- | --- | --- |\n| 0 | No automation | None | All\
    \ driving functions |\n| 1 | Driver assistance (feet-off) | Driver-assist features\
    \ including adaptive cruise control, preemptive braking or automatic emergency\
    \ brake, lane centering, parking assist, driver observation, and alerts | Responsible\
    \ for all core driving functions |\n| 2 | Partial automation (hands-off) | Partial\
    \ driving automation such as steering, acceleration, and deceleration (e.g., Cadillac\
    \ Super Cruise, Audi Traffic Jam Assist, Mercedes-Benz Driver Assistance Systems,\
    \ Tesla Autopilot, Volvo Pilot Assist) | Responsible for monitoring roadway environment,\
    \ ready to assume control with or without system warning |\n| 3 | Conditional\
    \ automation (eyes-off) | Most driving functions and roadway monitoring are automated,\
    \ for example, valet parking. System-designated request for human intervention\
    \ and driver necessity | State of ongoing readiness to assume control and intervene\
    \ in response to system request |\n| 4 | High automation (mind-off) | All driving\
    \ and monitoring functions are automated, for example, urban pilot. Operation\
    \ limited to selective geo-fenced environments (e.g., defined shuttle routes)\
    \ | Human control unnecessary. Steering, pedals, and gear shifting generally unavailable\
    \ |\n| 5 | Full automation (robotic chauffeur) | All driving functions and environments\
    \ without a human driver (e.g., robot taxi and unmanned/zero-occupant vehicles\
    \ or ZOVs) | Human input to navigation but without any vehicle control. Possible\
    \ opt-in or opt-out by human operator |"
  raw: '### 4.3.2 Automated Driving


    Similar to the levels of control explained in the previous chapter, the SAE (Society
    of Automotive Engineers) International (SAE On-Road Automated Vehicle Standards
    Committee and others, 2018) defines six levels of driving automation (Table [4-1](#511013_1_En_4_Chapter.xhtml#Tab1)).
    In their standards such as SAE J3016 (Taxonomy and Definitions), SAE J3018 (Safe
    Testing of Highly Automated Vehicles on Public Roads), and SAE J3131 (Automated
    Driving Reference Architecture), SAE does not use the term autonomous and uses
    instead the term automated driving to reflect the fact that even the most advanced
    automated driving systems are not self-governing. The difference between automated
    systems and autonomous systems was highlighted in the previous chapter.


    Automated driving systems (ADSs) include level 3 (Low), level 4 (Medium), and
    level 5 (High). The term highly automated vehicle (HAV) sometimes is used instead
    of ADS. Level 5 is the driverless full vehicle autonomy level in all operational
    design domains (ODDs) that can be managed by a human driver. ODD is the definition
    of where and when an ADS is designed to operate. ODD would include the following
    information at a minimum to define each ADS’s capability limits/boundaries:


    *   Roadway types (interstate, local, contained roadways such as residential communities,
    universities, technology parks, retirement and leisure) on which the ADS is intended
    to operate safely


    *   Geographic area (city, mountain, desert, etc.)


    *   Speed range


    *   Environmental conditions in which the ADS will operate (weather, daytime/nighttime,
    etc.)


    *   Other domain constraints


    SAE International and ISO collaborate to update and refine SAE levels of driving
    Automation as a way to reduce misinterpretation of concepts. The most notable
    recently announced changes include naming SAE Level 1 and 2 as “Driver Support
    Systems” and SAE Levels 3-5 as “Automated Driving Systems”. Additional terms and
    definitions have been also added such as remote assistance and remote driving.
    Remote assistant and remote driver are the terms given to the users who perform
    these functions. Definitions for vehicle types have been grouped together by Conventional
    Vehicle, Dual-mode Vehicle and ADS-dedicated Vehicle. Further clarity on the differences
    between SAE Level 3 and SAE Level 4 was provided including the role of the fallback-ready
    user, the possibility of some automated fallback at SAE Level 3, and the possibility
    of some alerts to in-vehicle users at SAE Level 4. Explanation for how classifications
    of sustained driving automation fit into the broader context of driver assistance
    and active safety features is also added. For more information about on-road driving
    automation levels and potential objective test methods that could be used as a
    framework for evaluating emerging and future driving automation features, you
    can refer to Tellis et al. (2016).


    ### 4.3.3 Automated Driving and Safety


    Humans usually apply a set of defensive driving rules to drive safely. One example,
    the “Smith System,” is based on five key rules called Smith5Keys. These five principles,
    rules, or keys are “aim high in steering,” “get the big picture,” “keep your eyes
    moving,” “leave yourself an out,” and “make sure they see you.” These rules provide
    drivers with the knowledge and skills to create three important things while driving:
    space to maneuver the vehicle away from conflict, visibility to detect danger
    and the potential for conflict with another vehicle or fixed object early, and
    time to react to volatile and complex driving environments. Other general principles
    defined in Standard Safe Practices for Motor Vehicle Operations (ANSI/ASSE Z15.1)
    include maintaining a safe following distance, driving safely considering (adjusting
    for) weather and/or road conditions, and adjusting your speed before entering
    a bend, in order to avoid applying the brakes in the middle of a bend (Hinderks
    et al., 2018). Self-driving vehicles will need governing rules for defensive driving
    as well. Mobileye introduced a model-based approach to safety entitled Responsibility-Sensitive
    Safety (RSS) (Shalev-Shwartz et al., 2017). RSS highlights five safety rules an
    automated driving vehicle should be able to follow. These five rules include safe
    distance (i.e., the self-driving vehicle should not hit the vehicle in front),
    cutting in (the self-driving vehicle should be able to identify when lateral safety
    may be compromised by a driver unsafely crossing into its lane), right of way
    (the self-driving vehicle should be able to protect itself against human drivers
    who do not properly adhere to the right of way rules), limited visibility (be
    cautious in areas with limited visibility), and avoiding crashes (the self-driving
    vehicle should avoid a crash without causing another one).


    Table 4-1


    SAE Levels of Automated Driving


    | **Level** | **Name** | **Automated System Role** | **Human Role** |

    | --- | --- | --- | --- |

    | 0 | No automation | None | All driving functions |

    | 1 | Driver assistance (feet-off) | Driver-assist features including adaptive
    cruise control, preemptive braking or automatic emergency brake, lane centering,
    parking assist, driver observation, and alerts | Responsible for all core driving
    functions |

    | 2 | Partial automation (hands-off) | Partial driving automation such as steering,
    acceleration, and deceleration (e.g., Cadillac Super Cruise, Audi Traffic Jam
    Assist, Mercedes-Benz Driver Assistance Systems, Tesla Autopilot, Volvo Pilot
    Assist) | Responsible for monitoring roadway environment, ready to assume control
    with or without system warning |

    | 3 | Conditional automation (eyes-off) | Most driving functions and roadway monitoring
    are automated, for example, valet parking. System-designated request for human
    intervention and driver necessity | State of ongoing readiness to assume control
    and intervene in response to system request |

    | 4 | High automation (mind-off) | All driving and monitoring functions are automated,
    for example, urban pilot. Operation limited to selective geo-fenced environments
    (e.g., defined shuttle routes) | Human control unnecessary. Steering, pedals,
    and gear shifting generally unavailable |

    | 5 | Full automation (robotic chauffeur) | All driving functions and environments
    without a human driver (e.g., robot taxi and unmanned/zero-occupant vehicles or
    ZOVs) | Human input to navigation but without any vehicle control. Possible opt-in
    or opt-out by human operator |'
  trans: "\n### 4.3.2 自动驾驶\n\n与上一章阐述的控制等级类似，SAE（国际自动机工程师学会）国际（SAE 道路自动驾驶车辆标准委员会等，2018）定义了六个驾驶自动化等级（表\
    \ 4-1）。在其标准中，例如 `SAE J3016`（分类与定义）、`SAE J3018`（高度自动驾驶车辆在公共道路上的安全测试）和 `SAE J3131`（自动驾驶参考架构），SAE\
    \ 并未使用“自主”一词，而是使用“自动驾驶”来反映这样一个事实：即便最先进的自动驾驶系统也并非自我管理。自动系统与自主系统之间的区别已在上一章中着重说明。\n\
    \n自动驾驶系统 (ADS) 包括第 3 级（低级）、第 4 级（中级）和第 5 级（高级）。“高度自动驾驶车辆”(HAV) 一词有时用来替代 ADS。第\
    \ 5 级是指在所有可由人类驾驶员操控的运行设计域 (ODD) 内实现无人驾驶的完全车辆自主等级。ODD 是对 ADS 设计运行地点和时间的定义。ODD 至少应包含以下信息，以界定每个\
    \ ADS 的能力限制/边界：\n\n*   ADS 旨在安全运行的道路类型（州际公路、地方道路、封闭道路，例如住宅社区、大学、科技园区、退休和休闲社区）\n\
    *   地理区域（城市、山区、沙漠等）\n*   速度范围\n*   ADS 运行的环境条件（天气、白天/夜间等）\n*   其他域约束\n\nSAE 国际与\
    \ ISO 合作更新和细化 SAE 驾驶自动化等级，以减少对概念的错误解读。最近公布的最显著变化包括将 SAE 第 1 级和第 2 级命名为“驾驶员辅助系统”，将\
    \ SAE 第 3-5 级命名为“自动驾驶系统”。此外，还增加了其他术语和定义，例如远程辅助和远程驾驶。执行这些功能的用户被称为远程辅助员和远程驾驶员。车辆类型的定义已按常规车辆、双模式车辆和\
    \ ADS 专用车辆进行分组。进一步明确了 SAE 第 3 级和第 4 级之间的区别，包括后备就绪用户的作用、在 SAE 第 3 级中实现某些自动后备的可能性，以及在\
    \ SAE 第 4 级中向车内用户发出某些警报的可能性。此外，还解释了持续驾驶自动化的分类如何融入驾驶员辅助和主动安全功能的更广泛背景中。有关道路驾驶自动化等级以及可作为评估新兴和未来驾驶自动化功能框架的潜在客观测试方法的更多信息，可参考\
    \ Tellis 等人 (2016) 的文献。\n\n### 4.3.3 自动驾驶与安全\n\n人类通常运用一套防御性驾驶规则来安全驾驶。其中一个例子是“史密斯系统”，它基于五条关键规则，称为\
    \ `Smith5Keys`。这五条原则、规则或“钥匙”是：“放眼远方”、“洞悉全局”、“眼观六路”、“留有余地”和“确保被看见”。这些规则为驾驶员提供了知识和技能，以便在驾驶过程中创造三个重要条件：从容驾驶、避开冲突的空间；及早发现危险及与另一车辆或固定物体发生冲突的可能性的视野；以及应对多变复杂驾驶环境的反应时间。《机动车辆操作标准安全规范》(ANSI/ASSE\
    \ Z15.1) 中定义的其他一般原则包括：保持安全跟车距离；根据（适应）天气和/或道路条件安全驾驶；以及在进入弯道前调整速度，以避免在弯道中间刹车 (Hinderks\
    \ 等人，2018)。自动驾驶车辆也需要防御性驾驶的指导规则。Mobileye 公司推出了一种基于模型的安全方法，称为责任敏感安全 (RSS) (Shalev-Shwartz\
    \ 等人，2017)。RSS 强调了自动驾驶车辆应能遵循的五条安全规则。这五条规则包括：安全距离（即，自动驾驶车辆不应撞击前方车辆）；切入（自动驾驶车辆应能识别何时因驾驶人不安全地变道至其车道而可能导致侧向安全受到威胁）；通行权（自动驾驶车辆应能保护自身免受未正确遵守通行权规则的人类驾驶员的侵害）；有限视野（在视野受限区域保持谨慎）；以及避免碰撞（自动驾驶车辆应在不引发另一起碰撞的情况下避免碰撞）。\n\
    \n**表 4-1**  \nSAE 自动驾驶等级\n\n| 等级 | 名称 | 自动驾驶系统角色 | 人类角色 |\n| --- | --- | ---\
    \ | --- |\n| 0 | 无自动化 | 无 | 所有驾驶功能 |\n| 1 | 驾驶辅助（脚离） | 驾驶辅助功能，包括自适应巡航控制、预先制动或自动紧急制动、车道居中、泊车辅助、驾驶员观察和警报\
    \ | 负责所有核心驾驶功能 |\n| 2 | 部分自动化（手离） | 部分驾驶自动化，例如转向、加速和减速（例如，凯迪拉克超级巡航、奥迪交通拥堵辅助、梅赛德斯-奔驰驾驶辅助系统、特斯拉自动驾驶、沃尔沃领航辅助）\
    \ | 负责监控道路环境，随时准备在有或没有系统警告的情况下接管控制 |\n| 3 | 有条件自动化（眼离） | 大部分驾驶功能和道路监控实现自动化，例如代客泊车。系统指定请求人类干预和驾驶员必要性\
    \ | 处于持续就绪状态，随时准备根据系统请求接管控制和进行干预 |\n| 4 | 高度自动化（神离） | 所有驾驶和监控功能实现自动化，例如城市领航。运行限于选定的地理围栏环境（例如，定义的班车路线）\
    \ | 无需人工控制。方向盘、踏板和换挡通常不可用 |\n| 5 | 完全自动化（机器人司机） | 无需人类驾驶员的所有驾驶功能和环境（例如，机器人出租车和无人/零乘员车辆或\
    \ ZOV） | 人类可为导航提供输入，但无需任何车辆控制。可由人类操作员选择加入或退出 |\n"
- fmt: '根据 NHTSA 的说法，车辆已经历了五个安全时代。巡航控制、安全带和防抱死制动等安全与便利功能在 1950 年至 2000 年期间引入，随后在 2000
    年至 2010 年期间引入了高级安全功能，例如电子稳定控制、盲点检测、前向碰撞警告和车道偏离警告。高级驾驶辅助功能，例如后视摄像系统、自动紧急制动、行人自动紧急制动、后方自动紧急制动、后方交叉交通警报和车道居中辅助，在
    2010 年至 2016 年期间得到了广泛部署。最近，部分自动化安全功能，例如车道保持辅助、自适应巡航控制、交通拥堵辅助和自动泊车已经开始出现。根据 NHTSA
    的预测，符合安全标准的全自动安全功能和高速公路自动驾驶仪预计将在未来几十年内可用。车辆安全标准在第 [2] 章中讨论。凭借这些先进的安全功能，自动驾驶汽车有潜力消除人为错误，从而挽救生命并减少伤害。然而，目前尚不完全清楚如何处理自动驾驶车辆自身可能出现的一些安全问题，例如由车辆自身错误（如感知错误、认知错误、决策错误或行动错误）以及缺乏处理混合交通场景中其他人类驾驶员错误导致的所有事故的能力，或缺乏处理不遵守交通规则的弱势道路使用者的能力。


    多种安全评级用于评估车辆的不同安全方面。例如，五星安全评级计划评估车辆在碰撞测试中的表现。公路安全保险协会（IIHS）的测试评估安全的两个方面，即耐撞性（即车辆在碰撞中保护乘员的能力）以及避免碰撞和减轻碰撞——即可预防碰撞或减轻其严重程度的技术。欧洲新车安全评鉴协会（Euro
    NCAP）也创建了五星安全评级系统，以帮助消费者、其家人和企业更轻松地比较车辆，并帮助他们根据自身需求确定最安全的选择。这些安全评级不断演变，以匹配不同自动化级别的自动驾驶车辆的能力。


    ### 4.3.4 数据驱动方法与自动驾驶车辆安全


    据 Mobileye 称，只有将责任敏感安全（RSS）模型与基于语义的决策相结合，才能保证安全性和运行时效率，因为纯粹的数据驱动方法无法实现这一目标。为了证明纯粹数据驱动方法的不可行性，Mobileye
    给出了以下示例：


    > **重要提示**

    >

    > 假设每 1 小时驾驶的致死概率 *ρ* = 10^(−6)，这相当于每年约 35,000 人死亡。为了让社会接受自动驾驶系统（ADS），理想的 *ρ*
    应为 10^(−9)，相当于每年约 35 人死亡。为了保证每小时事件发生概率为 *ρ*，ADS 必须驾驶 1/*ρ* = 10⁹ 小时。假设平均速度为 30
    英里/小时，这段时间相当于约 300 亿英里。


    基于兰德公司报告“驶向安全”的发现，Mobileye 在表 4-2 中总结了证明自动驾驶车辆可靠性所需的里程和年数。


    **表 4-2 根据 Mobileye 观点，证明 ADS 可靠性所需的里程和年数**


    | 为了证明死亡率…… | 我们需要驾驶…… | 100 辆车全天候行驶所需时间…… |

    | :--- | :--- | :--- |

    | 等于人类驾驶员 | 约 3 亿英里 | 超过十年（13 年） |

    | 降低 90% | 约 30 亿英里 | 超过一个世纪（130 年） |

    | 降低 99% | 约 300 亿英里 | 超过一千年（1,300 年） |


    有趣的是，Mobileye 预测了为实现完全自主驾驶能力而驾驶 300 亿英里的数据和设备成本。


    > **警告**

    >

    > 就数据成本而言，配备环绕式激光雷达、雷达和摄像头的 ADS 每小时生成约 5 TB 数据，因此 10⁹ 小时的驾驶将产生 500 万 PB 的数据，成本约为
    2 万亿美元。就设备成本而言，300 亿英里相当于约 40 亿辆车每天运行 20 小时，持续一年。如果每辆测试车成本为 10 万美元，总设备成本将约为 4000
    亿美元。


    降低工作环境的复杂性或针对受限的操作设计域（ODD），使得 ADS 能够在多个行业成功部署。例如，矿业公司使用 ADS 运输砾石，使用自主船只进行航运，农民使用自动驾驶拖拉机在广阔、无人居住的农田上进行播种、犁地和喷洒。自动驾驶车辆还被部署在配送中心和工厂中，作为仓库拣选和放置操作中的专用自动化车辆，以及在度假胜地和机场中作为无人驾驶穿梭车，在设定的轨道上以
    24 公里/小时的速度来回运送乘客。


    ### 4.3.5 自动驾驶与社会互动


    Lipson 和 Kurman 在其著作中强调了自动驾驶车辆在城市环境中面临的一个挑战，即需要与弱势道路使用者（如行人和骑自行车者）进行社交互动。这也可以扩展到第一响应者（执法人员），他们在发生事件/事故时指挥交通；以及建筑工人，他们左手松松地举着“停止”和“慢行”标志，右手示意车辆通过，要求车辆暂时停下或减速；或者停车场服务员在车辆旁边挥手，引导其驶入车库。这种主要通过使用眼神接触、身体动作和手势进行的非语言沟通社交互动，在确保弱势道路使用者的安全方面起着至关重要的作用。模仿这种社交互动并遵循正式和非正式的互动规则，对
    ADS 构成了挑战。理解街上人们所做的手势在 (Weaver, 2020) 中有所讨论。在该系统中，非光学动作捕捉技术和机器学习建模被用于为通用汽车 Cruise
    的自动驾驶车辆开发手势识别系统。该系统能够识别弱势道路使用者的手势，例如停止、前进、左转和右转。自动驾驶与公共安全通用解决方案（APSCS）联盟与弗吉尼亚理工交通研究所（VTTI）以及马萨诸塞大学交通安全研究项目（UMassSafe）合作，针对自动驾驶系统的几种应急响应场景开展了一项有趣的研究。该联盟由主要汽车制造商组成，例如通用汽车、福特、梅赛德斯-奔驰、丰田、本田、现代和日产。本研究中描述的应急响应场景包括响应事件、保护事件现场、进行交通指挥和控制、执行交通拦截、调查被遗弃或无人看管的车辆，以及执行稳定和救出伤员。在每个场景中，都考虑了不同的直接、间接和信息安全交互。'
  raw: 'According to NHTSA, vehicles have experienced five eras of safety. Safety
    and convenience features such as cruise control, seat belts, and antilock brakes
    were introduced in the period from 1950 to 2000 followed by introducing advanced
    safety features such as electronic stability control, blind spot detection, forward
    collision warning, and lane departure warning in 2000–2010\. Advanced driver assistance
    features such as rear-view video systems, automatic emergency braking, pedestrian
    automatic emergency braking, rear automatic emergency braking, rear cross-traffic
    alert, and lane centering assist were widely deployed in 2010–2016\. Recently,
    partially automated safety features such as lane keeping assist, adaptive cruise
    control, traffic jam assist, and self-park have started to emerge. Fully automated
    safety features and highway autopilots that comply with safety standards are expected
    to be available in the next decades according to NHTSA. Vehicle safety standards
    are discussed in Chapter [2](#511013_1_En_2_Chapter.xhtml). With these advanced
    safety features, automated vehicles have the potential to remove human error from
    the crash equation saving lives and reducing injuries. However, it is not well
    known yet the best way to deal with some safety issues of self-driving vehicles
    that may arise due to errors committed by the vehicle itself such as sensing errors,
    perception errors, decision errors, or action errors and lack of the ability to
    handle all mishaps caused by other human driver errors in mixed traffic scenarios
    or lack of the ability to deal with vulnerable road users who do not follow traffic
    rules.


    Several safety ratings are used to evaluate different safety aspects of vehicles.
    For example, the 5-Star Safety Ratings Program evaluates how vehicles perform
    in crash tests. Insurance Institute for Highway Safety (IIHS) tests evaluate two
    aspects of safety, namely, crashworthiness (i.e., how well a vehicle protects
    its occupants in a crash) and crash avoidance and mitigation—technology that can
    prevent a crash or lessen its severity. Euro NCAP has also created the five-star
    safety rating system to help consumers, their families, and businesses compare
    vehicles more easily and to help them identify the safest choice for their needs.
    These safety ratings keep evolving to match with capabilities of automated driving
    vehicles at different levels of automation.


    ### 4.3.4 Data-Driven Approach and Self-Driving Vehicle Safety


    According to Mobileye, safety and runtime efficiency can only be guaranteed if
    the RSS model is integrated with semantic-based decision-making as a pure data-driven
    approach is infeasible to achieve this target. In order to prove the infeasibility
    of a pure data-driven approach, Mobileye gives the following example:


    Important


    Assume that probability *ρ* of fatality per 1 hour of driving=10^(−6), which is
    equivalent to ∼35,000 fatalities per year. For society to accept an ADS, desired
    *ρ* would be 10^(−9), which is equivalent to ∼35 fatalities per year. And to guarantee
    probability of an event/hour is *ρ*, an ADS must drive 1/*ρ* = 10⁹ hours. This
    travel duration is ≈ 30 B mile assuming average speed of 30 mph.


    Based on findings of the RAND Corporation report “Driving to Safety” (Kalra and
    Paddock, 2016), Mobileye summarizes the miles and years needed to demonstrate
    autonomous vehicle reliability in Table [4-2](#511013_1_En_4_Chapter.xhtml#Tab2).


    Table 4-2


    Miles and Years Needed to Demonstrate ADS Reliability According to Mobileye


    | **In Order to Prove Fatality Rate…** | **We’d Need to Drive…** | **100 Cars
    Driving 24/7/365 Would Take…** |

    | --- | --- | --- |

    | Equals human drivers | ∼300 M miles | Over a decade (13 years) |

    | Reduced by 90% | ∼3 B miles | Over a century (130 years) |

    | Reduced by 99% | ∼30 B miles | Over a millennium (1,300 years) |


    Interestingly, Mobileye predicted the data and equipment cost of driving 30 billion
    miles to achieve full autonomy capability.


    Warning


    As per data cost, an ADS with surround LiDAR, radar, and cameras generates ∼5
    terabytes per hour, so 10⁹ hours of driving will generate 5 M petabytes that would
    cost ≈ $2 trillion. As per equipment cost, 30 B mile is ≈ 4 B cars operating 20
    hours per day for 1 year. If every test car costs $100,000, the total equipment
    cost would be ≈ $400 billion.


    Reducing the complexity of the work environments or targeting restricted operational
    design domains enables the successful deployment of ADSs in a number of industries.
    For example, ADSs are used by mining companies to haul gravel, autonomous boats
    for shipping, and self-driving tractors to seed, plow, and spray vast, unpopulated
    agricultural fields by farmers. Self-driving vehicles are also deployed in distribution
    centers and factories as specialized automated vehicles in warehouse pick and
    place operation and in resorts and airports as driverless shuttles carrying passengers
    back and forth on set tracks at a speed of 24 km/h (Lipson and Kurman, 2016).


    ### 4.3.5 Automated Driving and Social Interaction


    Lipson and Kurman highlighted in (Lipson and Kurman, 2016) a challenge for self-driving
    vehicles in urban environments related to the need for a social interaction with
    vulnerable road users like pedestrians and cyclists. This can also be extended
    to first responders (law enforcement officers) who direct traffic in case of an
    incident/accident and a construction worker who holds a “STOP” and “SLOW” signage
    loosely in their left hand and waves vehicles through with their right asking
    the vehicles to stop temporarily or to slow down the speed or a parking attendant
    waving in the lane next to the vehicle into a garage. This social interaction,
    mainly through nonverbal communication using eye contact, body movement, and hand
    gestures, plays a crucial role in securing the safety of vulnerable road users.
    Mimicking this social interaction and following formal and informal rules of interaction
    represent challenges for ADSs. Understanding gestures made by people on streets
    is addressed in (Weaver, 2020). In this system, nonoptical motion capture technology
    and machine learning modeling are used to develop a gesture recognition system
    for GM Cruise’s autonomous vehicles. This system is able to recognize vulnerable
    road users’ gestures such as stop, go, turn left, and turn right. The Automation
    and Public Safety Common Solutions (APSCS) Consortium in collaboration with the
    Virginia Tech Transportation Institute (VTTI) and the University of Massachusetts
    Traffic Safety Research Program (UMassSafe) conducted an interesting study about
    several emergency response scenarios for automated driving systems. This consortium
    consists of major automakers such as GM, Ford, Mercedes-Benz, Toyota, Honda, Hyundai,
    and Nissan (Terry et al., 2018). The described emergency response scenarios in
    this study include responding to an incident, securing an incident scene, conducting
    traffic direction and control, conducting a traffic stop, investigating an abandoned
    or unattended vehicle, and performing stabilization and patient extrication. Different
    direct, indirect, and informational safety interactions are considered in each
    of these scenarios.'
