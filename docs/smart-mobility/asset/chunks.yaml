  trans: '

    # 基于 WiFi 的定位与地理信息系统


    ## 基于 WiFi 的定位


    基于 WiFi 的定位可以弥补传统 GPS 在大都市地区的不足。在这种情况下，可以通过三边测量和指纹识别技术来探索 WiFi 定位，因为仅依赖三边测量并非合适的选择——该方法需要在二维平面上至少有三个视距内的参考点才能定位车辆，而在城市峡谷等区域，这些条件往往无法满足。通过三边测量和指纹识别估算出的
    WiFi 定位结果，可以与 GPS/智能手机定位模型协同使用。其他新兴定位技术包括 5G/3GPP（例如 R16 NR 定位）、蜂窝车联网（V2X）（例如
    R16 NR V2V/V2I）以及视觉定位系统（VPS）。VPS 或基于视觉的地图匹配是一种潜在的定位方式。在 VPS 中，车辆位置通过识别自然地标并将其与已知区域地图进行匹配来估算。


    ## 地理信息系统（GIS）


    `地理信息系统（GIS）`是一种用于输入、存储、操作和输出地理信息的信息系统。GIS 在现有和新兴的出行系统中扮演着至关重要的角色。如今，多种基于互联网的地图技术为地球大部分陆地表面提供免费的卫星图像、航拍照片和地形数据，从而提高了地图技术的可用性。例如`Google
    Earth`、`Google Maps`、`OpenStreetMap`、`ArcGIS`、`QGIS`、`2GIS`、`Bing Maps`、`HERE
    WeGo`和`MAPS.ME`。其他地图服务如`AccuTerra`则专注于提供来自`美国地质调查局（USGS）`地形图系列、国家公园、国家森林和`土地管理局`数据的休闲娱乐地图。


    ## 高精地图（HD Maps）


    高精地图（HD Maps）可采用不同方法构建，为自动驾驶汽车等智能出行平台提供厘米级的超高精度信息。此类信息示例包括车道边界、交叉口、人行横道、停车位、停车标志、交通信号灯等。当我们创建城市的高精地图时，实际上是在创建城市道路网络的数字基础设施（Vardhan，2017）。根据
    Lyft 公司（Chellapilla，2018）的说法，高精地图分为五个层次，即：基础地图（标准精度地图）、包含世界三维信息的几何地图、在几何地图层上添加语义对象构建的语义地图、包含动态元素衍生信息及人类驾驶行为的地图先验知识层，以及读写实时知识层。不同类型传感器（如
    GPS、摄像头、雷达和激光雷达传感器）会被使用并融合，以创建这些高精地图。


    ## 将 5G 与 PNT、GIS、高精地图和交通数据相结合


    将 5G 与 PNT（定位、导航、授时）、GIS、高精地图技术以及交通密度数据相结合，将赋能多种需要高速数据传输、低网络延迟、精准定位、导航、授时和地图服务以及实时交通数据的智能出行应用。应用示例包括高效路径规划与重规划、移动资产追踪、位置感知服务、出行即服务、按需出行以及无缝集成出行服务等。例如，像`Google
    Maps`这样的导航应用包含以下组成部分：


    - **地图编码算法：** 包括空间索引算法和计算几何算法，用于组织地图数据并高效检索。常用有向图和收缩层级结构来表示地图。道路分类层级或道路等级体系是一种根据使用情况、位置、路面类型、通行能力等多种因素将道路分组的方案。


    - **地图绘制算法：** 用于绘制地图（例如，投影经纬度坐标；填充多边形；为街道、城市、企业和公园等地点命名）。


    - **查询理解算法：** 理解用户查询。这些查询可以是打字输入或语音输入。通过图像搜索位置也是一种可能。查询理解算法运用了自然语言处理、语音识别和机器视觉技术。


    - **GPS 信号处理算法：** 用于提高精度并处理低成本 GPS 存在的各种不完善问题，如不确定性和模糊性。


    - **地理编码算法：** 使用地理坐标系将地址转换为地图上的点（或多边形）。地理坐标系是一种能够用一组数字、字母或符号来指定地球上每个位置的坐标系（Crossley，1999）。将坐标赋予地球表面位置的常见地图投影包括经纬度坐标、`通用横轴墨卡托投影（UTM）`、`军用网格参考系统（MGRS）`、`美国国家网格（USNG）`、`全球区域参考系统（GARS）`和`世界地理参考系统（GEOREF）`。`What3words
    (W3W)` 是一种人类可读的地理编码系统，用于以三米的分辨率进行位置通信。类似地，基于谷歌`开放位置编码（OLC）`地理编码系统创建的`Plus codes`也提供基于经纬度、以数字和字母显示的地理标签。这些地理标签（如`W3W`和`Plus
    codes`）可用于标记没有正式地址的位置，因为全球一半的城市人口生活在未命名的街道上。


    - **路径规划算法：** 用于找到当前位置与目的地之间的最优路线（在大型时变道路网络中的最短或最快路径）。像`Waze`、`Apple Maps`和`Google
    Maps`这样的移动应用通常被用作提供最优或次优路线的导航应用。然而，需要这些应用的更高级版本，以包含诸如住宅街道通行能力和可能影响安全或导致拥堵的动态事件等额外信息（Macfarlane，2019）。路径规划通常被视为一个图搜索问题。图是一种表示道路网络的数学方法。图的节点代表交叉口，边代表道路。一条路径是连接起点节点和终点节点的一系列边。如图
    3-1 所示，Dijkstra（迪杰斯特拉）、A-star（A 星）和收缩层级算法常用于解决路径规划问题。


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig1_HTML.png](img/511013_1_En_3_Fig1_HTML.png)


    **图 3-1：** 路径规划算法示例


    这些图搜索算法及其他算法均可用于解决此`GitHub`仓库中的路径规划问题，该仓库是我在加拿大多伦多大学`爱德华·S·罗杰斯高级电气与计算机工程系（ECE）`授课时开发的。


    > **重要提示：** 每位驾驶员每天少行驶一英里，每年可节省高达 5000 万美元（UPS 流程管理总监 Jack Levis）。


    - **基于交通方式的路线：** 根据可用的交通方式（驾驶、摩托车、骑行、公交、步行、网约车服务）计算不同的路线。


    - **反向地理编码算法：** 用于执行反向地理编码，使用点-多边形算法将点转换为地址。


    - **导航引导：** 在路线执行过程中，通过图形、声音提醒、文本转语音合成或语音助手提供引导。


    - **偏航检测与重规划：** 用于检测驾驶员何时偏离路线并需要新路线。


    - **兴趣点：** 当前位置附近的商场、餐厅、停车位等会被高亮显示。

    '
- fmt: '### Handling Differences


    In terms of lighting condition, for example, to help travelers navigate via well-lit
    streets or avoid dark streets while walking using the street lighting layer of
    Google Maps. Another example is to switch measuring units from mile to km or vice
    versa or change rules for using roads when crossing the border between countries
    like United States-Canada or United States-Mexico.


    ## 3.2 Wireless Communication


    Over the past decade, the demand for wireless technologies has been absolutely
    exploding, and cellular and personal communications have become the fastest-growing
    segments of the telecommunications services (Chen, 1998). Wireless communication
    facilitates the transmission and exchange of real-time data with high reliability
    and ensures smooth integration between mobility platforms and their environments.
    Many efforts have been carried out by researchers to enable wireless vehicular
    communication in dense, dynamic, and harsh weather environments (Siegel et al.,
    2018; Bey and Tewolde, 2019). Latency, power consumption requirements, scalability,
    and cost are critical factors that affect wireless communication especially in
    the case of electric vehicles (EVs).


    Wireless communication technologies for smart mobility systems mainly include
    Dedicated Short-Range Communications (DSRCs) and Cellular V2X (C-V2X) communication.
    Moreover, more ongoing research has been conducted about whether combining both
    technologies will result in a more prosperous future for mobility systems:


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig2_HTML.jpg](images/511013_1_En_3_Chapter/511013_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** VRU (Vulnerable Road User) Collision Warning, No Pass Warning,
    and Disabled Vehicle Warning


    - **DSRC** (Shukla et al., 2020): Is based on `IEEE 802.11p` to allow continuous,
    low-latency, and secure data exchanges between moving vehicles (V2V) and between
    vehicles and infrastructure or mobile devices (V2X).


    - **C-V2X** (Abou-Zeid et al., 2019): Is based on single-carrier frequency division
    multiple access (`SCFDMA`) in the physical layer for higher data rates and extended
    ranges compared to DSRC. Although some see DSRC as an obsolete technology compared
    to LTE- or 5G-supported C-V2X, today’s LTE wireless communications cannot adequately
    support communications for crash-imminent vehicle safety applications due to high
    latency. The promising capabilities of 5G will handle this limitation, but it
    may take a while to widely deploy 5G infrastructure.


    - **Hybrid Architecture**: Interworking between DSRC and cellular technology that
    forms a hybrid solution is considered promising, as it utilizes the benefits of
    both enabling technologies. For instance, in situations where transmitted data
    between vehicles are shattered and V2V multihop communication fails, cellular
    technologies may perform as a backup solution to relay transmitted information.
    Also, vehicles may reconnect to the Internet access network of the cellular technology
    in case of Internet connection loss with the RSUs. Figure [3-2](#511013_1_En_3_Chapter.xhtml#Fig2)
    illustrates some safety applications where the integration between DSRC and cellular
    technology will be beneficial.


    On November 18, 2020, the Federal Communications Commission (FCC) in the United
    States has reallocated the 5.9 GHz “Safety Spectrum” long reserved for the transportation
    sector to WiFi and C-V2X. The ruling effectively eliminates the future for WiFi-based
    DSRC and locks in the advancing alternative, C-V2X.


    Communication satellites such as Geosynchronous Equatorial and Geostationary Orbits
    (GEO/GSO), Medium-Earth Orbit (MEO), and Low-Earth Orbit (LEO) (Yang, 2019) can
    provide low-cost global connectivity that can be used in smart mobility systems.
    Several companies like SpaceX, OneWeb, and even Facebook are investing in satellite
    constellations that will provide affordable consumer Internet to the entire planet.
    Amazon is also working on satellite communication for logistics. Different automakers
    such as Tesla, Toyota, and Geely have programs to own satellite networks and to
    incorporate satellite communication into their vehicles. A hybrid approach would
    also be an option where terrestrial cellular communication can be combined with
    satellite communication (GEO or LEO) to deal with problems like out of coverage
    and reliability. Possible applications of this hybrid communication system include
    content streaming, gaming, fleet management, over-the-air (OTA) updates, emergency
    notification, precise positioning, and autonomous vehicles’ mission-critical applications
    such as tele-assistance or teleoperation (e.g., bring a faulty autonomous vehicle
    to a safe harbor or allow the autonomous vehicle to violate a traffic rule in
    a specific situation where the autonomous vehicle gets stuck).'
