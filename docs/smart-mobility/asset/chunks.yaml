- fmt: '如今，连接主义学习方法因其在多个具有挑战性领域的感知与学习能力，吸引了大部分关注。这些统计机器学习算法遵循一种自底向上的归纳推理范式，从海量数据中发现模式。它们基于实验发现：在超大数据集上训练的简单模型，优于用较少数据训练的复杂模型（Halevy
    等人，2009）。统计机器学习是一个归纳推理过程（即，从一组示例中推断出通用规则），它找到的规则通常对相关数据集中的大部分样本都正确（Goodfellow
    等人，2016）。统计机器学习是当前最著名的人工智能形式，因为它在汽车、精准农业/智能农业、认知医疗、教育科技、金融科技和消费电子等不同领域拥有强大且日益多元化的商业收入流。机器学习之所以腾飞，主要得益于数据的可用性、处理能力（例如，AI
    加速器）、开源工具以及来自公共和私营部门的研发资金。我们每天都会产生真正令人难以置信的数据量。例如，2020 年有 500 亿个联网设备；基于驾驶自动化水平，辅助和自动驾驶车辆每天产生
    4–20 TB 的数据；每天有 3.5 亿张照片上传到 Facebook；Twitter 每天生成 12 TB 的数据；每分钟有 300 小时的 YouTube
    视频被上传；沃尔玛每小时收集 2.5 TB 的客户数据。我们也看到来自公共和私营部门的巨大投资，催生了新的高效 ML 技术和开源工具。例如，中国到 2030
    年投资 70 亿美元，欧盟在 2018 年至 2020 年间投资了 240 亿欧元，法国到 2022 年在 AI 研究上投资 18 亿欧元，软银向 AI 公司投资了
    1080 亿美元。根据 CSET 对 Crunchbase 和 Refinitiv 数据的分析，2019 年美国 AI 公司吸引了约 252 亿美元的投资。


    机器学习算法传统上分为监督学习、无监督学习和强化学习算法。首先，监督学习使用归纳推理来逼近数据与标签/类别之间的映射函数。这种映射是使用已标记的训练数据学习的。分类（预测离散或类别值）和回归（预测连续值）是监督学习中的常见任务。其次，无监督学习通过聚类和数据关联等技术处理未标记数据。例如，在聚类中，给定
    `n` 个对象（每个对象可以是 `d` 个特征的向量），任务是根据某种相似性度量将它们分组为 `c` 个组（簇），使得单个组中的所有对象彼此之间存在“自然”关系，而不在同一个组中的对象则有所不同。第三类
    ML 算法是强化学习，它是一种弱监督学习技术，通过反馈循环或试错法从交互中学习。强化学习学习做什么（即，如何将情境映射到行动）以最大化数值奖励函数。DeepMind
    使用深度强化学习开发了一个模型，能够比人类熟练玩家更好更快地学习玩 Atari 视频游戏，无需任何人类指导（Mnih 等人，2015），最近又在仅仅 40
    天内探索并解开了围棋在 3000 年中积累的奥秘。虽然 DeepMind 的 AlphaGo 模仿了人类策略，并使用三个卷积策略网络以监督方式应用了蒙特卡洛树搜索，但得益于强化学习，AlphaGo
    Zero 不模仿人类，也没有看过一局棋，便发展出了人类未知的策略。在辅助或自动驾驶车辆或无人驾驶汽车的背景下，监督学习可用于行人检测、交通灯识别、车道检测、声纹识别、驾驶员分心识别等。无监督学习可用于群智感知以及预测性和预见性维护，而强化学习则用于学习驾驶员偏好以及如何在未知的动态环境中导航。


    如图 [3-7](#511013_1_En_3_Chapter.xhtml#Fig7) 所示，深度学习是机器学习的一个子领域，关注使用深度神经网络学习数据中的底层特征，使人工系统能够从更简单的概念构建出复杂的概念。深度学习的例子包括但不限于：堆叠降噪自编码器、深度信念网络、前馈神经网络、卷积神经网络、长短期记忆网络、生成对抗网络和胶囊网络。应用统计机器学习或数据驱动方法有三个主要要求，即：自变量或特征与因变量之间存在某种模式；这种模式无法使用可获得的、数学上易于处理的模型通过数学或分析方式精确表达；最后但同样重要的是，有全面的数据集可用。即使满足了这三个要求，开发和部署可靠且通用的机器学习模型仍存在若干问题。这些挑战包括：'
  raw: 'Nowadays, connectionist learning approaches have attracted most of the attention,
    thanks to their perception and learning capabilities in several challenging domains.
    These statistical machine learning algorithms follow a bottom-up inductive reasoning
    paradigm to discover patterns from vast amounts of data. They are based on the
    experimental findings that simple models trained on ultra-large datasets trump
    sophisticated models trained with less data (Halevy et al., 2009). Statistical
    machine learning is an inductive reasoning process (i.e., inferring general rules
    from a set of examples) that finds rules that are generally correct for most samples
    of the dataset of concern (Goodfellow et al., 2016). Statistical machine learning
    is currently the most famous form of AI due to its strong and increasingly diversified
    commercial revenue stream in different domains such as automotive, precision agriculture/smart
    farming, cognitive healthcare, EdTech, FinTech, and consumer electronics. Machine
    learning took off mainly due to the availability of the data, processing power
    (e.g., AI accelerators), open source tools, and R&D funding from public and private
    sectors. We are generating truly mind-boggling amounts of data on a daily basis.
    For example, there were 50 billion connected devices in 2020, assisted and automated
    driving vehicles generate 4–20 TB of data per day based on the level of driving
    automation, 350 million photos are uploaded to Facebook every day, Twitter generates
    12 TB of data per day, 300 hours of YouTube videos are uploaded every minute,
    and Walmart collected 2.5 TB of customer data hourly. We are also witnessing huge
    investments from public and private sectors that lead to new efficient ML techniques
    and open source tools. For instance, China invests $7 billion through 2030, the
    European Union invested $24 billion between 2018 and 2020, France invests $1.8
    billion in AI research until 2022, and SoftBank invests $108 billion in AI companies.
    According to CSET analysis of Crunchbase and Refinitiv data, US-based AI companies
    attracted about $25.2 billion in disclosed investment in 2019.


    Machine learning algorithms are traditionally categorized into supervised, unsupervised,
    and reinforcement learning algorithms. First, supervised learning uses inductive
    inference to approximate mapping functions between data and labels/classes. This
    mapping is learned using already labeled training data. Classification (predicting
    discrete or categorical values) and regression (predicting continuous values)
    are common tasks in supervised learning. Second, unsupervised learning deals with
    unlabeled data through techniques like clustering and data association. In clustering,
    for example, *n* objects (each could be a vector of *d* features) are given, and
    the task is to group them based on certain similarity measures into *c* groups
    (clusters) in such a way that all objects in a single group have a “natural” relation
    to one another and objects not in the same group are somehow different. The third
    category of ML algorithms is reinforcement learning (RL), which is a weakly supervised
    learning technique that learns from interactions through a feedback loop or by
    trial and error. RL learns what to do (i.e., how to map a situation to actions)
    to maximize a numerical reward function. Deep reinforcement learning is used by
    DeepMind to develop a model able to learn how to play Atari video games better
    and faster than human skilled players without any human guidance (Mnih et al.,
    2015) and recently to explore and demystify the mysteries of Go accumulated in
    3000 years in only 40 days. While DeepMind AlphaGo imitated human strategies and
    applied Monte Carlo tree search using three convolutional policy networks in a
    supervised manner, AlphaGo Zero does not imitate humans and did not see a single
    game and developed strategies that are not known for humans, thanks to reinforcement
    learning. In the context of assisted or automated driving vehicles or self-driving
    cars, supervised learning can be used for pedestrian detection, traffic light
    recognition, lane detection, voice biometrics, driver distraction recognition,
    and so on. Unsupervised learning can be used for crowdsensing and prognostic and
    predictive maintenance, while reinforcement learning is used to learn driver preferences
    and how to navigate through unknown dynamic environments.


    As illustrated in Figure [3-7](#511013_1_En_3_Chapter.xhtml#Fig7), deep learning
    (DL) is a subfield of machine learning concerned with learning of underlying features
    in data using deep neural networks enabling artificial systems to build complex
    concepts out of simpler concepts. Examples of deep learning include, but are not
    limited to, Stacked Denoising Autoencoders (SdA), Deep Belief Networks (DBN),
    Feedforward Neural Networks, Convolutional Neural Networks (CNN), Long Short-Term
    Memory (LSTM), Generative Adversarial Networks (GAN), and Capsule Networks (CapsNet).
    There are three main requirements to apply statistical machine learning or a data-driven
    approach, namely, there is existence of a pattern between the independent variables
    or features and the dependent variables, this pattern cannot pin out mathematically
    or analytically using attainable and mathematically tractable models, and last
    but not least there is availability of a comprehensive dataset. Even if these
    three requirements are met, there are still several problems to develop and deploy
    reliable and generic ML models. These challenges include the following:'
