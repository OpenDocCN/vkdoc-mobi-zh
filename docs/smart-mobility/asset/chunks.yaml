- fmt: 'Several delivery companies have implemented new protocols for PPE and contactless
    delivery in order to mitigate potential risks of virus spread. These companies
    are investing heavily in disinfection materials and protective equipment for employees
    such as gloves and masks to reduce surface-to-person transmission. Several retail
    stores have been converted into local fulfillment centers or dark stores to serve
    the customers during the pandemic. To combat person-to-person transmission, Amazon
    has made available an “unattended delivery” option for customers, in addition
    to a “front porch delivery” option for scheduled delivery. Uber Eats similarly
    adopted a “leave at door” contactless delivery as an option for customers. However,
    finding the right pick-up and drop off points (e.g., main entrance or parking
    entrance or service gate), parking fines and delivering packages to a wrong person
    or a wrong address are common problems in last-mile delivery. According to Mapillary’s
    Mapping in Logistics Report, over 95% drivers have faced problems with inaccurate
    mapping and over 71% drivers spend anywhere from 4 to 10+ minutes trying to find
    the exact drop-off location. In a city like New York, carriers typically pay millions
    of dollars in parking fines every year. For example, FedEx incurred 14.9 million
    in fines and UPS paid 33.8 million in 2018. Misdelivery and wrong delivery are
    frequently occurring problems in last-mile delivery services. The frequency of
    misdelivery or wrong delivery increases if the delivery worker handles multiple
    packages under time constraints, and these problems are more problematic in some
    last-mile delivery sectors such as medication and food delivery to multi-residential
    buildings.


    This misdelivery problem results in customer dissatisfaction, negative brand image,
    and increased delivery cost for delivery service providers. According to the Office
    of Inspector General (OIG) Analysis of Postal Service Data (RARC, 2017), misdelivery
    is the first concern of all delivery customers (centralized delivery customers,
    small and medium-sized business or SMB customers, and customers aged 25–34). As
    a result of failed delivery, delivery service providers will have to refund the
    delivery charges to the customer, pay additional costs for redelivery, and sometimes
    offer the customer a discount as an apology for customer retention given the fact
    that 84% of customers who have a bad delivery experience would not buy from a
    retailer again (Magento, 2018).


    Customer retention and margins were among retailers’ top concerns at NRF, RILA,
    LINK, and Shoptalk in 2020. Yet most brands remain reactive when it comes to last-mile
    delivery, despite two key facts: 84% of customers who have a bad delivery experience
    would not buy from a retailer again, and last-mile transportation costs amount
    to 53% of the total cost of shipping. Brands must recognize delivery as a critical
    touch point, evaluating the levers available to impact growth and drive a healthy
    bottom line. In 2018, 13.5 billion retail packages were shipped in the United
    States. As many as 11.5% of the shipped packages suffered exceptions ranging from
    damages to bad addresses and simple weather delays. The cost of reshipping a single
    package can wipe out the margin of many other sales, simultaneously disappointing
    a customer who may never come back, exponentially increasing negative impact on
    the business. So many of these exceptions are addressable, and the negative repercussions
    are avoidable. Retailers that want to preserve margins and retain customers need
    to act on delivery issues before they impact shoppers.


    An informed delivery platform is used to digitally notify users in advance of
    delivery of physical mail and allows users to report mail that was previewed in
    an email but does not arrive. However, this system is limited to the correct delivery
    and cannot handle the misdelivery cases. Inaccurate drop-off addresses, lack of
    high-definition maps, limited precision of publicly available and phone-enabled
    localization services used by delivery workers especially gig workers, and human
    mistakes of inexperienced delivery workers are the major root causes of misdeliveries.


    ## Smart Mobility in the Post-pandemic World


    With the new vaccine, life would get back slowly to a certain degree of normality
    prior to COVID-19 by the end of 2021, and markets are expected to recover by then.
    This pandemic was a great test of resilience of mobility companies and service
    providers. During the pandemic, major mobility players adopted defensive crisis
    management tactics to keep resilient through establishing dedicated safety protocols
    and applying strict austerity measures to conserve cash in order to keep employees
    and customers safe.


    There is a lot of uncertainty around the mid-term and long-term impacts of the
    COVID-19 pandemic on mobility systems and services. Envisioning the post-pandemic
    world is very convoluted with multiple factors contributing to the success and
    failures of smart mobility technologies and business models. With the anticipated
    gradual return to normalcy, some speculations on smart mobility systems and services
    in the post-pandemic era are summarized in the following subsections.


    ### Commuting Patterns


    COVID-19 may change the commuting pattern permanently. Some employees are likely
    to continue to work from home as a new normal even after the pandemic subsides.
    According to a survey conducted by Statista (Statista Research Department, 2021),
    almost two out of three employers state that some share of their workforce will
    remain permanently remote post-coronavirus. Several companies intend to allow
    their employees to work from home indefinitely (Paul, 2020). This will create
    an open opportunity for cities to better use the spaces (e.g., turning parking
    garage into green spaces and making the cities more walkable) and manage better
    the traffic. The pandemic showed the value of micromobility and soft/active mobility
    as a way to avoid spreading the virus. During the pandemic, many people replaced
    their daily pre-coronavirus commutes by what is called “pretend or fake commutes”
    such a walk around the block or cycling. In the post-pandemic world, the governments
    will likely invest more in making cycling and walking viable options. According
    to the Boston Consulting Group (BCG) (Bert et al., 2020), the United Kingdom announced
    a £2 billion package to put cycling and walking at the heart of Britain’s post-COVID
    transportation plan—intended, in part, to protect the public transport network.
    Moreover, Milan relocated 35 kilometers of streets for bicycle and pedestrian
    use only.


    ### Shared Mobility


    In the post-pandemic world, demand for shared mobility might be recovering slowly
    (Future Bridge, 2021). People may be more reluctant to risk their health by using
    shared mobility and public transport. According to a Statista’s survey (Statista
    Research Department, 2021), survey respondents in the United States overwhelmingly
    named their own car as the preferred choice of personal mobility during the pandemic
    and thereafter. However, the McKinsey Center for Future Mobility expects shared
    mobility solutions, including public transit, to rebound and continue to capture
    increased market share after the pandemic (Hausler et al., 2020).'
