  trans: '

    ### 6.2.3 末端配送


    在后疫情时代，电子商务可能会继续增长，但不会像疫情期间那样保持极高的增长率。线上购物趋势的增强，以及多家餐厅、剧院和其他娱乐场所的永久关闭，也可能导致对末端配送服务的需求增加。这种行为在后疫情世界将持续存在。随着越来越多的人在疫情期间体验了线上购物和非接触式末端配送服务的便利，末端配送将比以往任何时候都更加重要。这种对末端配送日益增长的兴趣将加速该领域的创新，使末端配送服务更能应对诸如电子商务激增、健康、安全、盗窃、配送失败以及错误配送等挑战性难题。


    ### 6.2.4 电动汽车


    在新冠疫情期间，汽车市场中唯一实现增长的细分市场是电动汽车的销售。疫情导致 2020 年全球轻型汽车销量下降了 20%，降至约 7000 万辆。然而，根据`ev-volumes.com`的数据，2020
    年全球电动汽车销量却快速加速，在新冠疫情期间增长了 43%，超过了 300 万辆。摩根大通预计，随着中国经济从疫情影响中复苏，中国的电动汽车销量将增长高达
    30%。据摩根大通分析师称，推动增长的是更便宜的电池和续航里程更长的车辆，而非政府补贴。社会对环境问题日益增长的兴趣将成为电动汽车市场增长的另一个驱动力。新冠疫情已成为人们对环境问题产生兴趣的催化剂，并提高了消费者对纯电动汽车的兴趣。根据麦肯锡的调查，超过
    70%的受访者表示，货物运输应从使用内燃机（`ICE`）的车辆转向使用`BEVs`（纯电动汽车）或 `H2EVs`（也称为氢燃料电池插电式混合动力汽车），用于长途卡车运输和城市内交通，并且
    40%的受访者甚至愿意为此转变支付溢价（Garibaldi 等人，2020 年）。


    ### 6.2.5 自动驾驶汽车


    在后疫情时代，向自动驾驶汽车（如自动驾驶出租车和配送机器人）的过渡可能会加速，因为这些车辆支持人员流动中的物理距离保持和非接触式末端配送。根据麦肯锡最近的一项调查，表示“极有可能”或“有可能”接受自动驾驶车辆配送的北美受访者比例从
    18%增加到 28%（Garibaldi 等人，2020 年）。


    ### 6.2.6 工作策略


    在后疫情世界中，出行领域的参与者必须采取进攻性策略，并可能需要在未来更新其过时的运营策略以获得更好的敏捷性，以此作为应对预期经济衰退和重塑业务的方式。


    ### 6.2.7 数字化转型


    新冠疫情之后，数字化转型不再是可选项，每家公司都将很快以某种方式成为一家数字公司。这将导致数字技术和数字创新的广泛采用。例如，新冠疫情迫使全球汽车制造商迅速调整和适应其销售车辆的方式。为了实现这一目标，一些参与者开始制定数字化的上市（`GTM`）策略和工具。在许多地方，在线购物已成为购车流程的首选解决方案，并成为用几分钟在线购买取代耗时的展厅参观的方式。除特斯拉外，其他几家汽车制造商和经销商也推出了在线购物平台。例如`GMC
    Shop-Click-Drive`、`Nissan@Home`和`EZ Purchase Online`。特斯拉还计划接受比特币等加密货币支付。根据`Google
    Think Auto 2020`的数据，29%的购车者会考虑在线购买下一辆车，而 40%的千禧一代非常确定会在网上购买下一辆车。88%的千禧一代表示，他们最初是通过“在线”方式发现他们所购买车辆的。麦肯锡进行的一项汽车融资调查（Kempf
    等人，2021 年）显示，到 2025 年，欧洲市场汽车贷款和租赁的在线企业对消费者（`B2C`）销售预计将达到约 20-25%的市场份额，这反映了通过数字渠道为车辆融资的趋势。虽然这些数字工具创造了以新方式购物的机会，但后疫情时代的新常态很可能是一种线上和线下购物相结合的混合模式。


    ### 6.2.8 开放式创新


    创新需要巨额投资，由于不确定时期采取的紧缩措施，这有时超出了单一公司的能力范围。公司现在更倾向于通过伙伴关系采用开放式创新政策。麦肯锡未来移动出行中心（Heineke
    等人，2021 年）的数据显示，2020 年在自动驾驶汽车、网联汽车、电动汽车和共享出行领域达成的合作伙伴关系超过 420 个，而 2015 年仅为 110
    个。例如，博世于 2021 年 2 月与微软合作，共同开发车辆软件平台。丰田和电装与 Aurora 建立了合作伙伴关系，以设计和制造基于 Sienna 小型货车的自动驾驶出租车车队。此外，Cruise
    和通用汽车于 2021 年初宣布与微软建立长期战略合作关系，以进一步加速 Cruise 全电动、自动驾驶汽车的商业化。这三家公司将结合他们在软件、硬件工程、云计算能力和制造方面的专业知识。在后疫情时代，公司将扩大合作与伙伴关系，并将更频繁地协作，以建立和扩展创新生态系统。


    ### 6.2.9 可持续发展


    这场疫情向我们和世界领导人展示了在可持续发展方面进行更多投资的迫切需要。随着世界领导人开始更加关注可持续发展，疫情可能会加速向可持续出行的转变。世界经济论坛（`WEF`）发起的“大重启”倡议为塑造复苏、以更可持续的方式重建社会和经济提供了机会。“大重启”倡议的目标之一是确保投资推进共同目标，例如平等和可持续性。这意味着政府的复苏资金以及来自私营实体和养老基金的投资应被用于建设“绿色”城市基础设施，并激励各行业改善其在环境、社会和治理（`ESG`）指标方面的记录。这一路线图有可能放大出行行业对可持续性的关注，并在后疫情时代增加电动出行的投资和销量。


    ### 6.2.10 以全球方案应对全球挑战


    新冠疫情在人类进化中发挥了决定性作用，在全球科技界创造了一种前所未有的合作精神，并表明开源知识、信息和数据、资源共享以及以全球方案应对全球挑战，将成为后疫情世界的新常态。

    '
- fmt: '## 6.3 The Journey Is Far from Over


    Like any other technology, smart mobility technologies have sunny sides and dark
    sides. Decreased crashes caused by human errors, reduced congestion and emission,
    improved efficiency, comfort, convenience, affordability and inclusivity, and
    increased economic advantage due to new business models like sharing economy,
    gig economy, and passenger economy are examples of the sunny sides of smart mobility.
    However, some dark sides of the smart mobility technologies need to be properly
    addressed to achieve the full potential of these technologies. Impacts on employment,
    privacy, and cybersecurity are among these concerns as explained in the following
    subsections.


    ### 6.3.1 Employment


    Most of the tasks in people and cargo mobility systems can be classified as routine
    manual or routine cognitive tasks. People who are handling any 4D (dangerous,
    dull, dirty, and dumb) tasks will be negatively impacted by the smart technologies.
    However, smart mobility has the potential to create new businesses and innovate
    the existing ones resulting in higher productivity and better quality of services
    (Khamis et al., 2019). This will create a high demand for highly skilled workers
    such as algorithm developers, programmers, data analysts, machine learning specialists,
    robotics engineers, technologists, drone pilots, system engineers, market analysts,
    business developers, and marketing and services staff. However, these occupational
    categories necessitate people to upgrade their skills to be competitive enough
    and ready to handle these non-routine cognitive jobs. Smart mobility already opened
    doors to create new business models based on sharing economy that replaces ownership
    with mutual arrangements to boost incomes and, sometimes, create jobs. Digital
    shared mobility platforms, such as `Uber` and `Lyft`, are based on sharing economy
    business models that intensively use AI algorithms for vehicle deployment, routing,
    real-time tracking, dynamic pricing, and driver and rider ratings. Thanks to this
    model and this technology, several transportation network companies like `Uber`
    and `Lyft` managed to establish a functioning market for car hire services that
    is governed largely by supply and demand and creates millions of jobs. According
    to *MIT Technology Review* (Condliffe, 2017), the number of self-employed drivers
    shot up by 50% after `Uber`''s arrival in each city it serves, but the number
    of regularly employed taxi drivers also had a small increase. `Uber` claims that
    its average New York City driver earns over $90,000 a year (Rogers, 2015). As
    explained in the previous chapter, several on-demand last-mile delivery services
    have been created based on the gig economy model. In order to provide services
    like same-day and instant delivery especially for food, grocery, and medication,
    delivery service providers have started to rely more on crowdsourced delivery
    through gig workforce to handle a big portion of the delivery tasks. The COVID-19
    pandemic has highlighted the importance of this alternative workforce to deal
    with the sharp increase in online shopping. There is still a debate about the
    sustainability of the gig economy model as a unique source of income in the post-pandemic
    era. More formal studies about possible structural unemployment of smart mobility
    technologies and the alternative job opportunities these technologies create based
    on sharing and gig economy models are still required.


    ### 6.3.2 Privacy


    Data is the food for the perception and automated decision-making algorithms that
    are used in smart mobility systems. Personal data needs to be collected by the
    service providers invisibly and passively and sometimes happens as a by-product
    of another service. We have almost lost our privacy tracked by web clients, Internet
    service providers, cell phone service providers, agents, and so on. We cannot
    decide who access our data, when they access it, and for what purpose. Sacrificing
    privacy is one of the dark sides of personal technologies. Some privacy questions
    are raised by Deloitte including: Would the manufacturer of the vehicle own that
    data? What about the person who bought, borrowed, or is simply a passenger in
    that vehicle? How might our legal systems consistently define ownership? What
    would happen when the vehicle crosses boundaries of jurisdiction? How would a
    police agency handle logs from a connected vehicle involved in an accident? At
    the end of their lives, who would be responsible for wiping clean obsolete data
    recorders (Leon Nash and Hillaker, 2020)? These concerns apply to all connected,
    automated, and shared mobility technologies. As mentioned in Chapter [4](#511013_1_En_4_Chapter.xhtml),
    vehicle-to-grid (V2G) technology can help in improving EV affordability as it
    enables the EV owners to gain money through pushing the energy back from the battery
    of an electric car to the power grid. However, data privacy and cybersecurity
    are still challenges for V2G. Guaranteeing transparency (why should the data be
    shared?), trust (with whom will the data be shared?), and value (what are the
    benefits of sharing the data?) can help in the societal acceptance of V2G technology.
    The EU General Data Protection Regulation (GDPR) is developed to protect data
    and privacy in the European Union. The California Consumer Privacy Act (CCPA)
    is also another important step toward enhancing privacy rights and consumer protection
    for residents of California. However, more global measures and regulations should
    be developed to protect privacy and enforce digital rights. For example, a wide
    range of contact tracing, people tracking, and surveillance technologies have
    been applied during the pandemic in all aspects of our life, and mobility was
    not an exception. Measures have to be taken to protect digital rights, stop the
    surveillance once the pandemic is over, and ban new totalitarianism of surveillance
    technology and digital totalitarian states or digital Leninism.'
