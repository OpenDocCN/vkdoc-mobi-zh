- fmt: "### 2.2 City Planning\n\nJust as the arrival of the first automobiles fundamentally\
    \ changed our society in the early 1900s, smart mobility systems will trigger\
    \ evolutionary and revolutionary changes in the city planning. These changes will\
    \ include, but are not limited to, the following:\n\n- Replanning transport corridors\
    \ and city streets to accommodate more pedestrians, cyclists, riders in shared\
    \ transportation, and less cars\n- Setting up walking routes and cycling lanes\
    \ for active, soft, and inclusive mobility\n- Enabling bicycle highways (a.k.a.\
    \ bicycle freeways or superhighways) that offer a direct route with few intersection\
    \ stops\n- Establishing emergency safe spots in the city for automated driving\
    \ vehicles in case remote/on-site human intervention is needed\n- Installing harbors\
    \ as part of the highways to be used in case of faulty autonomous vehicles or\
    \ unplanned road events\n- Upgrading city infrastructure to provide real-time\
    \ traffic updates, traffic accidents/incidents, social/sport events that may affect\
    \ the traffic, work zones and any temporary changes to the roadworks such as road\
    \ closure and lane change. Safety critical information can be gathered by infrastructure-mounted\
    \ sensors and transmitted to the connected vehicles\n- Installing connected mobility\
    \ infrastructure like `ITS`, smart intersections, and smart pavement\n- Enabling\
    \ highly visible and readable signages such as pedestrian crossings (e.g., pelican,\
    \ puffin, toucan, and zebra crossings), school zone, railway crossing, yield,\
    \ road edges, curves, speed limits and parking to adopt assisted and automated\
    \ driving vehicles. In this context, EU Member States investigate unifying safety\
    \ critical road signs to aid with recognition by assisted and automated driving\
    \ vehicles\n- Replacing road signage with digital and connected road signage to\
    \ deal with a problem like road infrastructure deterioration that may impact the\
    \ operation of the automated driving systems\n- Creating new pedestrian unsignalized\
    \ crosswalks to avoid a crosswalk chicken game\n- Upgrading engineering countermeasures\
    \ for speed management such as horizontal deflection (e.g., roundabouts, lateral\
    \ shifts, chicanes), vertical deflection (e.g., speed humps, raised crosswalks\
    \ and cushions) and street width reduction (e.g., on-street parking, road diets\
    \ and corner extensions)\n- Installing smart parcel lockers for last-mile delivery\n\
    - Allocating stacks and racks / pickup and drop-off points for mobility on demand\
    \ systems\n- Setting up stations for micromobility\n- Hosting more electric vehicle\
    \ charging stations, wireless/cordless charging pads and charging roads that enable\
    \ charging while driving\n- Assigning air taxi takeoff and landing locations\n\
    - Enabling smart parking to allow continuous monitoring of the parking space and\
    \ automate several operational processes such as detection of parking availability\
    \ and digital payment. These smart parking systems need to be upgraded to accommodate\
    \ emerging technologies such as `Automated-Valet-Parking` (AVP) and automated\
    \ driving electric vehicle parking. Examples of these changes include optimized\
    \ layout, charging points / wireless charging pads, communication infrastructure\
    \ and drop-off and retrieval zones\n- Finally, with the emerging heavy truck platooning\
    \ technology, bridge operational constraints should be considered during fleet\
    \ management. Bridge design standards need to be revised as well\n\n### 2.3 Smart\
    \ Mobility Technology\n\nIn his book *Profiles of the Future: An Inquiry into\
    \ the Limits of the Possible* (Clarke, 2013), the English science fiction writer\
    \ and inventor Arthur Clarke formulated his famous Three Laws, of which the third\
    \ law is the best-known and most widely cited: “any sufficiently advanced technology\
    \ is indistinguishable from magic.” Connected vehicle technology is the magic\
    \ that creates new data-rich environments and enables many applications and services\
    \ that will make our roads safer, less congested, and eco-friendlier. Shared mobility\
    \ technology is the magic that replaces ownership with usership. Mobility-as-a-Service\
    \ (MaaS), mobility on demand (MOD), and seamless integrated mobility systems (SIMS)\
    \ are the magic that enables seamless mobility as the neo-liberalization of people\
    \ and goods transportation. Self-driving technology is the magic that will dramatically\
    \ reduce injuries and fatalities, improve access to mobility for those who currently\
    \ cannot drive due to age or disability, and open the doors to passenger economy.\
    \ 3D mobility is the magic that moves us from restricted mobility in two-dimensional\
    \ streets that enables only 2-DOF (degree of freedom) (lateral and longitudinal\
    \ motion) to 3-DOF mobility (lateral, longitudinal, and vertical motion) or more\
    \ accurately 6-DOF mobility (lateral, longitudinal, vertical, roll, pitch, and\
    \ yaw) considering the rotational movements of the aerial platform. Zero-emission\
    \ hyperloop technology is the magic that will take you from Los Angeles to San\
    \ Francisco in just 35 minutes instead of 2.5 hours in a high-speed rail system.\
    \ Electrification is the magic that will enable net zero emission and sustainable\
    \ mobility in the near future.\n\nThe technological aspects of smart mobility\
    \ can be explained in terms of foundational technologies, technology enablers,\
    \ and disruptors as illustrated in Figure [2-2](#511013_1_En_2_Chapter.xhtml#Fig2).\
    \ The lists shown in this figure are not comprehensive of today’s foundational\
    \ technologies, enabler technologies, and disruptors that keep changing dynamically.\
    \ However, the mentioned technologies are the core building blocks of the existing\
    \ and possibly emerging smart mobility systems and services. Moreover, other hardware-related\
    \ technologies like embedded systems, sensors, actuators, body design, displays,\
    \ and other technologies such as `E/E architecture`, testing, verification, validation,\
    \ and cybersecurity are of equal importance but are not covered in this book.\n\
    \n```\n![../images/511013_1_En_2_Chapter/511013_1_En_2_Fig2_HTML.jpg](images/511013_1_En_2_Chapter/511013_1_En_2_Fig2_HTML.jpg)\n\
    ```\n\n**Figure 2-2**  \nSmart Mobility: Foundational Technologies, Technology\
    \ Enablers, and Disruptors"
  raw: '## 2.2 City Planning


    Just as the arrival of the first automobiles fundamentally changed our society
    in the early 1900s, smart mobility systems will trigger evolutionary and revolutionary
    changes in the city planning. These changes will include, but are not limited
    to, the following:


    *   Replanning transport corridors and city streets to accommodate more pedestrians,
    cyclists, riders in shared transportation, and less cars


    *   Setting up walking routes and cycling lanes for active, soft, and inclusive
    mobility


    *   Enabling bicycle highways (a.k.a. bicycle freeways or superhighways) that
    offer a direct route with few intersection stops


    *   Establishing emergency safe spots in the city for automated driving vehicles
    in case remote/on-site human intervention is needed


    *   Installing harbors as part of the highways to be used in case of faulty autonomous
    vehicles or unplanned road events


    *   Upgrading city infrastructure to provide real-time traffic updates, traffic
    accidents/incidents, social/sport event events that may affect the traffic, work
    zones and any temporary changes to the roadworks such as road closure and lane
    change. Safety critical information can be gathered by infrastructure-mounted
    sensors and transmitted to the connected vehicles


    *   Installing connected mobility infrastructure like ITS, smart intersections,
    and smart pavement


    *   Enabling highly visible and readable signages such as pedestrian crossings
    (e.g., pelican, puffin, toucan, and zebra crossings), school zone, railway crossing,
    yield, road edges, curves, speed limits and parking to adopt assisted and automated
    driving vehicles. In this context, EU Member States investigate unifying safety
    critical road signs to aid with recognition by assisted and automated driving
    vehicles


    *   Replacing road signage with digital and connected road signage to deal with
    a problem like road infrastructure deterioration that may impact the operation
    of the automated driving systems


    *   Creating new pedestrian unsignalized crosswalks to avoid a crosswalk chicken
    game


    *   Upgrading engineering countermeasures for speed management such as horizontal
    deflection (e.g., roundabouts, lateral shifts, chicanes), vertical deflection
    (e.g., speed humps, raised crosswalks and cushions) and street width reduction
    (e.g., on-street parking, road diets and corner extensions)


    *   Installing smart parcel lockers for last-mile delivery


    *   Allocating stacks and racks/pickup and drop-off points for mobility on demand
    systems


    *   Setting up stations for micromobility


    *   Hosting more electric vehicle charging stations, wireless/cordless charging pads
    and charging roads that enable charging while driving


    *   Assigning air taxi takeoff and landing locations


    *   Enabling smart parking to allow continuous monitoring of the parking space
    and automate several operational processes such as detection of parking availability
    and digital payment. These smart parking systems need to be upgraded to accommodate
    emerging technologies such as Automated-Valet-Parking (AVP) and automated driving
    electric vehicle parking. Examples of these changes include optimized layout,
    charging points/wireless charging pads, communication infrastructure and drop-off
    and retrieval zones


    *   Finally, with the emerging heavy truck platooning technology, bridge operational
    constraints should be considered during fleet management. Bridge design standards
    need to be revised as well


    ## 2.3 Smart Mobility Technology


    In his book *Profiles of the Future: An Inquiry into the Limits of the Possible*
    (Clarke, 2013), the English science fiction writer and inventor Arthur Clarke
    formulated his famous Three Laws, of which the third law is the best-known and
    most widely cited: “any sufficiently advanced technology is indistinguishable
    from magic.” Connected vehicle technology is the magic that creates new data-rich
    environments and enables many applications and services that will make our roads
    safer, less congested, and eco-friendlier. Shared mobility technology is the magic
    that replaces ownership with usership. Mobility-as-a-Service (MaaS), mobility
    on demand (MOD), and seamless integrated mobility systems (SIMS) are the magic
    that enables seamless mobility as the neo-liberalization of people and goods transportation.
    Self-driving technology is the magic that will dramatically reduce injuries and
    fatalities, improve access to mobility for those who currently cannot drive due
    to age or disability, and open the doors to passenger economy. 3D mobility is
    the magic that moves us from restricted mobility in two-dimensional streets that
    enables only 2-DOF (degree of freedom) (lateral and longitudinal motion) to 3-DOF
    mobility (lateral, longitudinal, and vertical motion) or more accurately 6-DOF
    mobility (lateral, longitudinal, vertical, roll, pitch, and yaw) considering the
    rotational movements of the aerial platform. Zero-emission hyperloop technology
    is the magic that will take you from Los Angeles to San Francisco in just 35 minutes
    instead of 2.5 hours in a high-speed rail system. Electrification is the magic
    that will enable net zero emission and sustainable mobility in the near future.


    The technological aspects of smart mobility can be explained in terms of foundational
    technologies, technology enablers, and disruptors as illustrated in Figure [2-2](#511013_1_En_2_Chapter.xhtml#Fig2).
    The lists shown in this figure are not comprehensive of today’s foundational technologies,
    enabler technologies, and disruptors that keep changing dynamically. However,
    the mentioned technologies are the core building blocks of the existing and possibly
    emerging smart mobility systems and services. Moreover, other hardware-related
    technologies like embedded systems, sensors, actuators, body design, displays,
    and other technologies such as E/E architecture, testing, verification, validation,
    and cybersecurity are of equal importance but are not covered in this book.


    ![../images/511013_1_En_2_Chapter/511013_1_En_2_Fig2_HTML.jpg](images/511013_1_En_2_Chapter/511013_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Smart Mobility: Foundational Technologies, Technology Enablers, and Disruptors'
  trans: "\n### 2.2 城市规划\n\n正如 20 世纪初第一批汽车的到来从根本上改变了我们的社会一样，智能出行系统也将引发城市规划领域的渐进式变革与颠覆性革命。这些变化包括但不限于以下方面：\n\
    \n- 重新规划交通走廊和城市街道，以容纳更多行人、自行车骑行者、共享交通工具使用者，并减少私家车数量\n- 设置步行路线和自行车道，倡导主动、温和且包容的出行方式\n\
    - 建设自行车高速公路（亦称自行车快速路或超级高速路），提供交叉口停靠点少、通行顺畅的直达路线\n- 在城市中为自动驾驶汽车设立紧急安全点，以备需要远程或现场人工干预时使用\n\
    - 在高速公路沿线设置港湾式停车区，用于应对自动驾驶车辆故障或突发道路事件\n- 升级城市基础设施，实时提供交通状况、交通事故/事件、可能影响交通的社会/体育活动、施工区域以及道路工程临时变更（如道路封闭和车道变更）等信息。安全关键信息可通过基础设施传感器收集并传输至网联车辆\n\
    - 安装互联出行基础设施，例如`ITS`（智能交通系统）、智能交叉口和智能路面\n- 设置高度醒目且清晰可辨的标志标线，如人行横道（例如斑马线、信号灯控制式行人过街）、学校区域、铁路道口、让行标志、道路边缘、弯道、限速和停车标志等，以适应辅助驾驶与自动驾驶车辆。在此背景下，欧盟成员国正研究统一安全关键道路标志，以辅助辅助驾驶和自动驾驶车辆识别\n\
    - 用数字化互联交通标志替代传统道路标牌，以解决可能影响自动驾驶系统运行的道路基础设施老化等问题\n- 创建新型无信号控制人行横道，避免\"行人过街博弈\"\
    现象\n- 升级速度管理工程措施，包括水平偏移（如环岛、错位车道、蜿蜒式道路）、垂直偏移（如减速带、抬高式人行横道和缓冲带）以及缩减街道宽度（如路边停车、道路瘦身和路口路缘延伸）\n\
    - 安装智能包裹储物柜，用于最后一公里配送\n- 为按需出行系统设置自行车停放架/停车架及上下客点\n- 设立微型出行站点\n- 增设电动汽车充电站、无线/无绳充电板及支持边行驶边充电的充电道路\n\
    - 规划空中出租车起降点\n- 实现智能停车，持续监测停车位状态，并自动化处理多项运营流程，如可用车位检测和数字支付。这些智能停车系统需针对`自动代客泊车`（AVP）和自动驾驶电动汽车停车等新兴技术进行升级，具体包括优化布局、充电桩/无线充电板、通信基础设施以及上下客与取车区域\n\
    - 最后，随着新兴的重型卡车列队行驶技术发展，车队管理应考虑桥梁运营限制条件，桥梁设计标准也需相应修订\n\n### 2.3 智能出行技术\n\n在其著作《未来概况：对可能之极限的探究》（Clarke，2013\
    \ 年）中，英国科幻作家、发明家阿瑟·克拉克提出了著名的\"克拉克三定律\"，其中第三定律最为人知且被广泛引用：\"任何足够先进的技术都与魔法无异。\"网联汽车技术就是这样的魔法，它创造了数据丰富的全新环境，并催生了众多应用和服务，使我们的道路更安全、更畅通、更环保。共享出行技术是另一种魔法，它用使用权取代了所有权。出行即服务（MaaS）、按需出行（MOD）和无缝集成出行系统（SIMS）则是实现人员与货物运输新自由主义化的魔法，让无缝出行成为可能。自动驾驶技术是神奇的魔法，它将大幅减少伤亡事故，改善因年龄或残疾而无法驾驶者获取出行服务的机会，并开启乘客经济的大门。3D\
    \ 出行是将我们从仅支持 2 自由度（横向和纵向运动）的二维街道限制中解放出来，迈向 3 自由度（横向、纵向和垂直运动）——更准确地说是 6 自由度（横向、纵向、垂直、侧倾、俯仰和偏航）——的魔法，这考虑到了飞行平台的旋转运动。零排放超级高铁技术堪称魔法，它能让你仅用\
    \ 35 分钟就从洛杉矶抵达旧金山，而高速铁路系统则需要 2.5 小时。电气化则是将在不久的将来实现净零排放和可持续出行的魔法。\n\n智能出行的技术层面可从基础技术、技术使能因素和颠覆性技术三个方面进行阐释，如图\
    \ 2-2 所示。该图所列内容并未囊括当今不断动态变化的所有基础技术、使能技术和颠覆性技术。然而，所提及的技术是现有及未来可能出现的智能出行系统与服务的核心构建模块。此外，其他硬件相关技术，如嵌入式系统、传感器、执行器、车身设计、显示屏，以及`E/E\
    \ 架构`（电子电气架构）、测试、验证、确认和网络安全等技术也同样重要，但不在本书的讨论范围之内。\n\n```\n![../images/511013_1_En_2_Chapter/511013_1_En_2_Fig2_HTML.jpg](img/511013_1_En_2_Fig2_HTML.jpg)\n\
    ```\n\n**图 2-2**  \n智能出行：基础技术、技术使能因素与颠覆性技术\n"
- fmt: '# Smart Mobility: Foundational Technologies, Enablers, and Disruptors


    The following chapters focus on the technological aspects of smart mobility systems
    and services describing their foundational technologies, technology enablers,
    and disruptors. Foundational technologies covered in this book include `Position`,
    `Navigation`, and `Timing (PNT)`, `Geographic Information System (GIS)`, `wireless
    communication`, `mobile cloud computing`, `blockchain`, `Internet of Things (IoT)`,
    `Artificial Intelligence (AI)`, `robotics`, and `electrification`. `PNT` technologies
    endow smart mobility systems with the ability to localize stationary and mobile
    assets within the system, guide the navigation of the mobile assets, and maintain
    accurate and precise timing. `GIS` provides the necessary geographical information
    to abstract the work environments. `Wireless communication` enables the transmission
    and exchange of real-time data with high reliability within the smart mobility
    system. `Mobile computing` enables authorized end users and mobile assets to gain
    a speedy access to data, information, and computation from wherever they are.
    Based on the concept of distributed computing, `blockchain` technology enables
    several services such as authentication, access control, and fast payment and
    has the potential to reshape smart mobility systems and services. `IoT` technologies
    enable connecting any stationary or mobile asset within the smart mobility system
    to the Internet and facilitate data sharing for monitoring, control, and optimization.
    `AI` is a foundational technology and a driving force behind several existing
    and emerging smart mobility systems and services. `Robotics` is seen as a foundational
    technology given the fact that several smart mobility technologies began to emerge
    from robotics research labs and are based on advances in robotics fields in terms
    of mechanical design, locomotion systems, perception, planning, control, navigation,
    and coordination algorithms. `Electrification` is also another foundational technology
    for decarbonized sustainable mobility. More details about these foundational technologies
    are provided in `Chapter [3](#511013_1_En_3_Chapter.xhtml)`.


    In the context of smart mobility, the book covers several technology enablers
    such as intelligent infrastructure, connected mobility, automated mobility, e-mobility,
    micromobility, active/soft mobility, inclusive mobility, and `Context Awareness
    Systems (CAS)`. Supportive intelligent infrastructure includes intelligent transportation
    systems, smart pavement, smart intersections, high-quality cycling infrastructure
    such as cycle highways (a.k.a. bicycle freeways or superhighways), smart parking,
    and charging infrastructure. Connected mobility is a key enabler for real-time
    navigation and routing, traffic information, safety warnings, accident avoidance,
    `advanced driver assistance systems (ADAS)`, and `automated driving systems (ADSs)`.
    Automated driving enables the radical reduction of injuries and fatalities usually
    caused by human driver errors. E-mobility enables and powers different environment-friendly
    mobility platforms such as e-cars, e-bikes, e-scooters, eVTOL, and electric shuttles/commuters.
    Micromobility platforms enable first-/last-mile affordable and sustainable mobility.
    Active, soft, or zero-impact mobility opens doors to a healthy, cheap, fun, and
    environmentally friendly option for first-/last-mile urban mobility. Mobility
    aids enable inclusive mobility for the elderly and physically challenged. Last
    but not least, situational awareness is an enabler for context-aware mobility
    systems and services able to adapt following specific contextual information.
    More details about these technology enablers are provided in `Chapter [4](#511013_1_En_4_Chapter.xhtml)`.


    Mobility disruptors described in the book include disruptive mobility modes, shared
    mobility, `Mobility-as-a-Service (MaaS)`, `mobility on demand (MOD)`, `seamless
    integrated mobility systems (SIMS)`, last-mile delivery, `Vehicle-as-a-Service
    (VaaS)`, gig economy, and passenger economy. Disruptive mobility platforms for
    people mobility and goods delivery include autonomous ground vehicles (e.g., self-driving
    shuttles (SDSs), autonomous wheelchairs, autonomous carts, and autonomous robot
    valets), urban air mobility (e.g., air taxis, air metro, and last-mile delivery
    drones), and marine vehicles (water taxis, water buses, and autonomous boats/ships).
    Automated people movers, hyperloops, and urbanloops are other examples of disruptive
    mobility platforms. Vehicle sharing, peer-to-peer sharing, `demand-responsive
    transit (DRT)`, ridesharing, ridehailing, ridesourcing, and ridesplitting services
    are examples of shared mobility services. `MaaS`, mobility on demand, and seamless
    integrated mobility systems facilitate easy-to-access and seamless mobility. Modern
    last-mile delivery services focus on movement of goods from a warehouse or a distribution
    store to the final delivery destination in the fastest, most flexible, and transparent
    way possible. In the era of disruptive innovation, a mobility platform or a vehicle
    can be seen as a service to enable sharing and monetizing the unused computational
    and/or networking resources in the vehicle and/or the huge amount of collected
    data. Several smart mobility services can be enabled based on gig economy and
    passenger economy especially in the era of automated driving vehicles where vehicles
    can be repurposed for different leisure, business, or healthcare uses. More details
    about these disruptors are provided in `Chapter [5](#511013_1_En_5_Chapter.xhtml)`.


    Footnotes `[1](#511013_1_En_2_Chapter.xhtml#Fn1_source)` `[2](#511013_1_En_2_Chapter.xhtml#Fn2_source)`
    `[3](#511013_1_En_2_Chapter.xhtml#Fn3_source)`


    ## 3. Smart Mobility: Foundational Technologies


    Foundational technologies represent smart mobility’s building blocks that can
    be used to effectively develop and underpin important new products and services.
    `Position`, `Navigation`, and `Timing (PNT)`, `Geographic Information System (GIS)`,
    `wireless communication`, `mobile cloud computing`, `blockchain`, `Internet of
    Things (IoT)`, `Artificial Intelligence (AI)`, `robotics`, and `electrification`
    are discussed in this chapter as examples of foundational technologies for smart
    mobility systems and services.'
