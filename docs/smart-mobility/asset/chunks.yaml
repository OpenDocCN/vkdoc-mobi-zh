- fmt: '### Self-Driving Cars vs. Self-Flying Planes


    Automation of planes began 9 years after the Wright brothers took flight in 1903.
    The first aircraft autopilot was developed by Sperry Corporation in 1912. More
    than a hundred years ago, the first autopilot models were developed, installed,
    and used in aircraft. However, car autopilots are still not as popular as plane
    autopilots.


    **Warning**


    > "Automated driving is a bit more challenging technically than we originally
    thought" (Hakan Samuelsson, Volvo CEO).


    The main reason for that is the nature of the operation environment. Environments
    where planes operate are relatively static, predictable, structured, and observable,
    while cars and other urban mobility vehicles’ operating environments are highly
    dynamic, unstructured, and partially observable with so many corners/edge cases
    and unknown unknowns. The same applies to closed-system automated rapid transit
    systems (e.g., subways and automated people movers) and trains that can be fully
    automated due to the static, predictable, structured, and observable nature of
    the environment they operate in. Figure [4-2](#511013_1_En_4_Chapter.xhtml#Fig2)
    shows the relation between the domain knowledge and the meta-knowledge we have
    in the automated-driving vehicles’ environments.


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig2_HTML.png](images/511013_1_En_4_Chapter/511013_1_En_4_Fig2_HTML.png)


    **Figure 4-2** Meta-knowledge vs. Domain Knowledge


    `Known knowns` represent information that we have and know that we have. For example,
    the ADS ability to recognize traffic signs and lights can be seen as a `known
    known`. `Unknown knowns` are the information that we have but don’t know we have.
    `Known unknowns` represent information that we do not have and we know that we
    lack. Adversarial and edge/corner cases can be considered as `known unknowns`
    as we know most of these cases but we don’t know how to deal with them. Adversarial
    use cases are those cases that can confuse the model due to their similarity to
    target cases. Examples of adversarial cases include a plastic bag filled with
    air or a fake pothole/speed bump or air puppet inflatable balloon in a pedestrian
    crosswalk or banners with real-size human pictures. These objects can be wrongly
    interpreted by an object recognition system as an obstacle that needs to be avoided.
    Examples of edge/corner cases include, but are not limited to, a large animal/deer
    that suddenly leaps on the hood of the car, unusual road obstacles like sheep
    herds, strange horse-drawn carriages, extreme weather conditions, and so on. `Unknown
    unknowns` are the information that is relevant but we do not know and we do not
    know that we lack. An example is the sensitivity to unknown perturbation. For
    instance, Boeing 737 MAX has a computer-controlled stability system called `MCAS`
    to prevent stalling during flight. The impact of a malfunctioning angle-of-attack
    sensor used by `MCAS` was an `unknown unknown` before the two plane crashes of
    Lion Air Flight 610 in 2018 and Ethiopian Airlines Flight 302 in 2019. When the
    system failed, `MCAS` prevented the pilot from doing the right thing as the system
    was designed to comply with safety measures. This resulted in the Boeing 737 MAX
    air disaster saga.


    Given the fact that the driving task is a highly repetitive and reactive activity,
    humans of all levels of intellectual capabilities can get driving licenses especially
    if they drive in known areas. In his talk entitled "From System 1 Deep Learning
    to System 2 Deep Learning," presented at the Conference on Neural Information
    Processing Systems (NeurIPS 2019), Yoshua Bengio explained the difference between
    "System 1" and "System 2" cognition. System 1 is "the kinds of things that we
    do intuitively, unconsciously, that we cannot explain verbally, in the case of
    behavior, things that are habitual," Bengio said. While System 1 operates automatically
    and quickly, with little or no effort and no sense of voluntary control, System
    2 allocates attention to the effortful mental activities that demand it, including
    complex computations. The operations of System 2 are often associated with the
    subjective experience of agency, choice, and concentration (Kahneman, 2011). Here’s
    how Bengio explains the difference between System 1 and System 2. Imagine driving
    in a familiar neighborhood. You can usually navigate the area subconsciously,
    using visual cues that you have seen hundreds of times. You do not need to follow
    directions. You might even carry out a conversation with other passengers without
    focusing too much on your driving. However, when you move to a new area, where
    you don’t know the streets and the sights are new, you must focus more on the
    street signs, use maps, and get help from other indicators to find your destination.
    In the known area scenario, you use System 1 cognition, and you will have to switch
    to System 2 cognition in the unknown area scenario to be able to drive the car.
    Relying on System 1 probably is the reason behind having most accidents happening
    on familiar everyday journeys. Mimicking or reverse-engineering these System 1
    and System 2 cognitive functions to build ADSs able to navigate through dynamic,
    unstructured, and partially observable environments is quite challenging. It is
    not surprising that the average lines of software code in modern luxury vehicles
    are much larger compared to types of aircraft. For example, while the F-22 US
    Air Force jet fighter has 1.7 million lines of code and Boeing 787 Dreamliner
    has 6.5 million lines of code, a modern luxury vehicle has more than 100 million
    lines of code (Wise, 2016). These modern vehicles are equipped with Internet connectivity,
    sensors and actuators, and over 50 microcomputers making these vehicles be like
    "super computers or de facto IT devices on wheels." However, as the lines of software
    code in vehicles increase, so does the potential for software errors and related
    vulnerabilities (Wise, 2016).


    Urban air mobility (UAM) platforms for people and cargo transportation explained
    in the next chapter share the complexity of the environment with self-driving
    vehicles with additional technical challenges of aviation such as stability and
    regulatory aspects such as noise pollution and visual disruption.'
