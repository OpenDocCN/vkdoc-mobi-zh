- fmt: '### 5.2.3 River Taxis


    River taxis, water taxis, or water buses provide public or private transport mainly
    in urban environments. This urban water transportation has been used for hundreds
    of years in many waterway-rich cities around the world such as Venice, Bangkok,
    Tokyo, New York, Sydney, and Toronto to ensure rapid point-to-point transportation
    and reduce traffic congestion. Dubai Roads and Transport Authority (RTA) regulates
    several water transport modes such as water taxis (maximum of 10 passengers at
    a time), water buses (20 passengers), petrol abra/wooden vessel (20 passengers),
    hybrid abra (20 passengers) and electrical abra (9 passengers), and ferries (100
    passengers). River taxis are being rapidly transformed by technology. For example,
    the water taxi THUNDER with hybrid propulsion is used to drive free of emissions
    in electric-only mode through the channels of Venice. These water taxis also drive
    in open waters to the airport where they can reach higher speeds with diesel engines
    so that the boat can recharge the batteries. SeaBubbles are an experimental hydrofoil
    e-water taxi that can reach a respectable top speed of 25 km/h, producing no wave,
    no noise, and no emission, and can be used as water taxis on demand in cities.


    In the near future, autonomous boats will be used to ferry goods and people in
    coastal and riverside cities helping reducing traffic congestion on roadways and
    railways. For example, the Roboat project^([^(35)](#fn35)) seeks to develop a
    fleet of autonomous boats for transporting goods and people in the city of Amsterdam
    (Wang et al., 2019). Within the same project, MIT researchers designed 3D-printed,
    driverless boats that can provide transport and self-assemble into other floating
    structures.


    **Important**


    According to MarketsandMarkets, the autonomous ship market is projected to reach
    US $14.2 billion by 2030, at a CAGR of 9.3% from 2020 to 2030.


    Highly automated vessels are currently used in several countries especially in
    Nordic countries like Norway. For example, Ocean Space Drones 1 and 2 are two
    experimental autonomous boats built by the Norwegian company Kongsberg Maritime
    and are used by the Norwegian University of Science and Technology (NTNU). Several
    other projects funded by the Norwegian government target to develop electric autonomous
    vessels to be part of new integrated transport systems, rather than replacing
    existing ships.


    Changing maritime laws and regulations is still a challenge against accommodating
    the use of autonomous ships for people mobility and cargo delivery as discussed
    in Chapter [2](#511013_1_En_2_Chapter.xhtml).


    ### 5.2.4 Automated People Movers (APMs)


    Automated people movers (APMs) represent sustainable and disruptive innovation
    of transportation systems that are fully automated/driverless, elevated, and advanced
    fixed guideway systems. APM uses electric drive bogies inside guideway tubes to
    propel suspended passenger cabins in different customizable sizes that vary from
    personal pods to multi-passenger pods at speeds that can exceed 160 km/h. Compared
    to Maglev and other types of monorail systems, suspended coach automated rapid
    transit requires much less infrastructure as shown in Table [5-2](#511013_1_En_5_Chapter.xhtml#Tab2).


    **Table 5-2** Urban Maglev, Light Rail, Bus Rapid Transit (BRT) vs. APM | Source:
    Swift Tram


    | Factors | APM | Urban Maglev | Light Rail | Bus Rapid Transit (BRT) |

    | --- | --- | --- | --- | --- |

    | Installation costs | $$ | $$$ | $$$$$ | $$$ |

    | Right of way costs | $ | $$$ | $$$$$$ | $$$$ |

    | Operational costs | $$ | $$ | $$$$$ | $$$$ |

    | System capacity | Medium | Medium | High | Medium |

    | Accessibility/frequency | High | Medium | Low | Medium |

    | Available 247 | Yes | No | No | No |

    | Energy consumption | Very low | Medium | Medium | High |

    | Travel speed | 30 mph | 55 mph | 55 mph | 55 mph |

    | Dedicated cargo cartage | Yes | No | No | No |

    | Weather affects ops | No | Maybe | Yes | Yes |


    ### 5.2.5 Hyperloop and Urbanloop


    Hyperloop is a disruptive transportation technology for people and goods. A hyperloop
    comprises a sealed vacuum tube with reduced pressure through which a floating
    pod/capsule travels with low air resistance or friction conveying people or goods
    at high speed (up to 1200 km/h). A hyperloop system combines the convenience of
    a train and the speed of an airplane. The SpaceX Hyperloop Pod Competition attracted
    attention from academia, industry, and governmental organizations to work on hyperloop
    technology. The objective of this competition is to design and build a subscale
    prototype transport vehicle in order to demonstrate technical feasibility of various
    aspects of the hyperloop concept. Key players include Hyperloop Transportation
    Technologies (HTT), Hyperloop One, AECOM, Hardt, and TransPod,^([^(36)](#fn36))
    which introduced a hyperloop concept in the city of Toronto. So far, Virgin Hyperloop^([^(37)](#fn37))
    has been the only company in the world that has successfully tested its technology
    at scale. The Virgin Hyperloop One concept represents a sustainable mobility scheme
    as it envisions the use of solar panels that cover the tube, makes better and
    less expensive use of the terrain compared to high-speed rail, and eliminates
    sources of mechanical noise, like wheels on a track.


    **Important**


    According to Verified Market Research, the hyperloop technology market was valued
    at US $0.40 billion in 2019 and is projected to reach US $7.32 billion by 2027,
    growing at a CAGR of 47.14% from 2020 to 2027.


    Elon Musk envisions the low energy cost of a hyperloop system compared to any
    currently existing mode of transport (Figure [5-2](#511013_1_En_5_Chapter.xhtml#Fig2)).
    NASA also suggests that a hyperloop will be five to six times more efficient than
    air (for short routes) and two to three times more efficient than rail (Taylor
    et al., 2016). However, there are limited details for the calculation of energy
    usage; therefore, these claims cannot be further interrogated (Walker, 2018).
    This is mainly due to the lack of real hyperloop systems or testbeds that can
    be used to carry out energy analysis for this emerging and disruptive mobility
    technology under different operating conditions.


    ![../images/511013_1_En_5_Chapter/511013_1_En_5_Fig2_HTML.jpg](images/511013_1_En_5_Chapter/511013_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** 1 Energy Cost per Passenger for a Journey Between Los Angeles and
    San Francisco for Various Modes of Transport (Musk, 2013)


    Despite the fact that the hyperloop as an idea has been in the market for years
    now with interesting investment attractions, there is still a huge gap in the
    access to development and testing. To bridge this gap, I co-invented a multifunctional
    training and experimentation testbed for hyperloop (Khamis and AbdelFattah, 2019).
    This testbed^([^(38)](#fn38)) comprises a sealed tube with a vacuuming system,
    a capsule/pod levitated and propelled by an electromagnetic engine, a number of
    stations, a condition monitoring and control system, a HMI unit for local experimentation,
    a telepresence system for remote experimentation, an interactive virtual reality
    tool, and a digital twin. This testbed can be used for professional and educational
    training on hyperloop technology and other related technologies. It allows students,
    trainees, and researchers to study, experiment on, and understand the different
    aspects of hyperloop technology as disruptive transportation technology. The testbed
    enables different instructional and constructional activities showing not only
    how the hyperloop technology works but also what the technology can do.'
