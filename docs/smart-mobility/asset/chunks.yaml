    # 5. Smart Mobility: Disruptors


    “Disruptive innovation” is a term coined by Clayton Christensen, referring to
    a process in which an underrated product or service starts to become popular enough
    to replace, or displace, a conventional product or service. Disruptors are significantly
    altering the way consumers, industries, and businesses operate and can lead to
    game-changing products and services able to serve low-end or unserved consumers
    and migrate to the mainstream market. According to *The Innovator’s Dilemma* (Christensen,
    2013), disruptive innovation satisfies customer future needs and may provide lower
    performance in some key features but creates some unique features valued by the
    market. Expensive navigation systems and navigation features in `Google`/`Apple
    Maps` are examples of sustaining innovation and disruptive innovation, respectively.
    The former is more reliable and does not rely on network coverage but more expensive
    and does not provide real-time traffic updates compared to `Google`/`Apple Maps`.
    Mobility disruptors are usually not breakthrough innovations but significantly
    alter the way that mobility service providers operate, people move, and cargo
    is delivered. In this chapter, some disruptors in the area of smart mobility are
    highlighted.'
