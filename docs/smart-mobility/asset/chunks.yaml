  trans: '

    # 排版后文本


    欧洲新车安全评鉴协会（`Euro NCAP`）^(⁶)常用于评估汽车安全性能。预期功能安全（`SOTIF` 或 `ISO/PAS 21448`）（ISO,
    2019）旨在应对辅助驾驶和自动驾驶车辆软件开发者面临的新型安全挑战。`SOTIF` 解决了传感器、算法和执行器在性能上的局限性，并为设计、验证与确认措施提供指导。多项功能可能应用
    `SOTIF`，例如纵向控制、横向辅助、变道、脱手驾驶、自动泊车和自动召唤。恶劣天气条件也对自动驾驶车辆构成多重挑战：积雪和雨水会遮挡并干扰传感器，掩盖道路标线，并改变车辆行驶表现。`SOTIF`
    的最终目标是限制自动驾驶系统（`ADS`）可能出现的未知不安全状态数量。


    此外，欧盟航空安全局（`EASA`）（Cluzeau 等，2020）制定了神经网络设计保证概念（`CoDANN`），作为验证与确认安全关键型应用数据驱动模型的方法。有关
    SAE 3–4 级自动驾驶（有条件/高度自动化）验证与确认方法的更多信息，读者可参阅由奥迪、百度、宝马、英特尔、戴姆勒和大众等 11 家汽车及自动驾驶行业主要利益相关方联合发布的《自动驾驶安全优先（`SaFAD`）》白皮书（Wood
    等，2019）。世界经济论坛（`WEF`）发起的“安全驾驶倡议（`SafeDI`）”旨在弥合行业在自动驾驶汽车安全方面的专业知识与监管机构制定保障自动驾驶部署政策的意愿之间的差距（世界经济论坛（`WEF`），2020）。Autonomous
    与 `WEF` 联合发布的《自动驾驶治理生态系统报告》（世界经济论坛（`WEF`），2021）重点介绍了可供行业决策者参考的各类自动驾驶相关联盟、协会、标准制定组织与合作伙伴关系。Autonomous^(⁷)
    全球社区定期发布针对汽车及自动驾驶出行行业决策者的各类倡议与联盟最新信息。


    智能出行技术（如自动驾驶系统（`ADSs`））的责任问题仍不确定且未完全明确。应讨论不同形式的责任，例如车主责任、制造商/供应商责任、保险公司责任以及智能交通系统（`ITS`）责任。若自动驾驶车辆未投保，车主需对任何事故负责。若产品出现缺陷，生产者、自有品牌商及缺陷产品进口商将承担民事责任。保险公司则根据保险条款与条件直接承担赔偿责任。如果事故是由基础设施故障导致，`ITS`
    所有者与管理者也可能需要承担责任。


    总体而言，自动驾驶汽车的法律环境仍在不断发展。近年来，多个国家已启动针对自动驾驶系统的监管与立法行动，例如美国的《H.R.3388——自动驾驶法案》、英国的《自动驾驶车辆试验行为准则》、德国的《自动驾驶车辆法案》、法国的自动驾驶汽车立法框架，以及欧盟的《自主产品安全评估标准（`UL-4600`）》。例如，《自动驾驶法案》禁止各州禁止自动驾驶车辆上路，允许企业首批
    10 万辆汽车豁免现有安全标准，并要求制造商制定抵御数字车辆网络攻击的计划。德国近期批准了全球首个将自动驾驶车辆纳入常规交通的法律框架。该法案将修改交通法规，允许到
    2022 年实现无人驾驶车辆在公共道路行驶，为企业大规模部署自动驾驶出租车和配送服务铺平道路。根据 `NHTSA`（美国国家公路交通安全管理局等机构，2017）的观点，公众对
    `ADSs` 发展的信任与信心可能推动或阻碍其在公共道路上的测试与部署。这一结论同样适用于其他颠覆性智能出行系统与服务，例如空中出租车和自主货船。例如，快速发展的人员与货物运输城市空中交通（`UAM`）平台需要建立监管环境，以解决安全、隐私、噪音污染、视觉干扰、野生动物影响等不同方面的问题，并需符合各类民航标准与推荐规范，如
    `ICAO SARPs`、`FAA FARs`、`JAA`、`EASA` 等。美国联邦航空管理局（`FAA`）现已距离备受期待的“无人机系统交通管理（`UTM`）”生态更近一步。`UTM`
    将明确低空非受控无人机运行管理的服务、角色与责任、信息架构、数据交换协议、软件功能、基础设施及性能要求。`UTM` 是与 `FAA` 的空中交通管理（`ATM`）系统相互独立但互为补充的框架。改变海事法律法规仍是适应自主船舶用于人员出行和货物交付的挑战。尽管国家水域的法规调整较快，但修改国际法规以支持自主船舶进入国际水域尚需时日，需解决安全、安保及责任等多个方面。支持（有时也阻碍）智能出行解决方案（共享、自动化、电动、集成）发展与实施的管理与监管流程在（Finger
    和 Audouin, 2018）一文中有重点阐述。

