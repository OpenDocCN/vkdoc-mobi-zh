- fmt: '### 3.7 Robotics


    Robotics is the engineering science and technology of robots that involve the
    design, manufacture, control, and programming of robots; the use of robots to
    solve problems; the study of the control processes, sensors, and algorithms used
    in humans, animals, and machines; and the application of these control processes
    and algorithms to the design of robots. Robotics is the intelligent connection
    of perception (thinking about sensing) to planning (thinking about actions) (Brady,
    1985).


    Robotics is a major foundational technology for smart mobility. Smart mobility
    platforms such as robo taxi or robotic chauffeur, aerial taxis, autonomous river
    taxis, automated people movers, delivery drones, self-driving shuttles, and exoskeleton
    used for walking assistance began to emerge from robotics research labs and are
    based on advances in robotics in terms of mechanical design, locomotion systems,
    perception, planning, control, navigation, and coordination algorithms. For example,
    automated driving vehicles are considered intelligent robotic systems that employ
    intelligent techniques to mimic human driver intelligence in perception, decision-making,
    problem solving, learning from the environment, and adapting to its changes. Like
    a mobile robot, a self-driving vehicle should be able to answer questions like
    “Where am I?”, “Where am I going?”, “What does the world look like?”, “How to
    explore an unknown environment?”, “How can I get there from here?”, “How to achieve
    intelligent connection between perception and action?”, “How to deal with unexpected
    events?”, and "How to interact properly with other actors in the environment such
    as other vehicles and vulnerable road users (VRUs) like pedestrians and cyclists
    following formal and sometimes informal rules of interaction?"


    Generally speaking, vehicles can be classified according to the level of autonomy
    into human-operated, semi-autonomous, and fully autonomous vehicles. Figure [3-13](#511013_1_En_3_Chapter.xhtml#Fig13)
    illustrates these three levels and the relation with the control taxonomy proposed
    in Draper (1994) in terms of type of control, system role, human tasks, and critical
    information in each level.


    Human-operated vehicles represent vehicles that must be operated by a human on-site
    or remotely. In semi-autonomous vehicles, the role of the system becomes bigger
    where the vehicle itself can control and monitor multiple tasks. An autonomous
    vehicle can function, decide, and interact autonomously within structured, unstructured,
    static, dynamic, and observable or partially observable environments without explicit
    human guidance (Bayat et al., 2016). Fully autonomous vehicles do not exist yet
    as these systems should have self-governing or self-x capabilities such as self-configuration
    and management, self-adaptation or adaptability, self-protection, self-diagnosis
    and self-healing and repair, self-optimization, self-synchronization, and self-organization.
    For instance, a fully autonomous system with self-healing and repair capability
    will be resilient and able to handle transient failures in dynamic environments.
    Hollnagel (Hollnagel, 2009) describes four central abilities that characterize
    resilient systems. These abilities include anticipating what may happen (what
    to expect), monitoring what is going on (what to look for), responding effectively
    when something happens (what to do), and learning from past experiences (knowing
    what has happened).


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig13_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig13_HTML.png)


    **Figure 3-13:** Levels of Autonomy


    In Figure [3-13](#511013_1_En_3_Chapter.xhtml#Fig13), the control level determines
    the relative importance and frequency of the tasks carried by the human. It refers
    to the nature of human responsibility for vehicle functioning, which ranges from
    total control to strategic control. During total control, the human is responsible
    for all decisions, from strategic planning to trajectory control. At the other
    end of this continuum, the human is only responsible for relatively long-term
    plans, at least while the vehicle is performing the task. As shown in Figure [3-13](#511013_1_En_3_Chapter.xhtml#Fig13),
    the levels of control are:


    - **Manual Control:** At this level, the human operator entirely controls vehicle
    functions; the task of the vehicle is to display operational and contextual information
    and act on human inputs.


    - **Manual Control with Intelligent Assistance:** As more vehicle intelligence
    becomes available, the human may be able to teach the vehicle rudimentary information
    about the work site, such as defining regions that should not be entered. The
    vehicle is able to modify information displays and modify human inputs to provide
    guidance. As the vehicle becomes more capable, the human is able to shed more
    responsibility.


    - **Shared Control:** At this level, the human is responsible for controlling
    some subtasks while the vehicle simultaneously controls others.


    - **Traded Control:** The vehicle and human are consecutively responsible for
    subtasks, that is, sometimes the robot is in complete control and sometimes the
    human is in control.


    - **Supervisory Control:** At this level, the vehicle is responsible for controlling
    all tasks and the human is monitoring it and occasionally intervenes in case of
    emergency. The human only enters the control loop when abnormal situations arise.


    Similarly, the SAE (Society of Automotive Engineers) International (SAE On-Road
    Automated Vehicle Standards Committee and others, 2018) defines six levels of
    driving automation as explained in the next chapter.


    NASA’s Robotics, Tele-Robotics and Autonomous Systems road map working group made
    an interesting distinction between automated systems and autonomous systems (National
    Research Council, 2012). They define an automated system as:


    *a system that follows a script, albeit a potentially quite sophisticated one;
    if it encounters an unplanned-for situation, it stops and waits for human help.
    The choices have either been made already, and encoded in some way, or will be
    made externally to the system. In contrast, an autonomous system is a system that
    resolves choices on its own. The goals which the system is trying to accomplish
    are provided by another entity; thus, the system is autonomous from the entity
    on whose behalf the goals are being achieved. The decision-making processes may
    in fact be simple, but the choices are made locally.*


    Based on this definition, we can claim that vehicles that operate in SAE levels
    1, 2, and 3 represent automated systems, while those in levels 4 and 5 represent
    systems with higher degree of autonomy but not fully autonomous due to the lack
    of self-governance capabilities previously explained.


    Major global auto OEMs (original equipment manufacturers) have several frameworks
    to develop automated driving systems (ADSs) or self-driving vehicles. GM develops
    an ADS following a ground-up, seamless integration iterative approach (General
    Motors, 2018). Waymo’s framework encompasses the following four steps (Hedlund
    and North, 2018):


    - **Locate:** A detailed three-dimensional map of all roadways within its operational
    design domain (ODD) is provided to an ADS. The map includes road profiles, curbs
    and sidewalks, lane markers, crosswalks, traffic signals, speed limits, signage,
    fixed objects, and other relevant features.'
