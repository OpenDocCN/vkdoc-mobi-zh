    \ to accommodate these evolving technologies. This means that smart mobility depends\
    \ on a triad of complementary factors, namely, technology, governance, and city\
    \ planning, as illustrated in Figure [2-1](#511013_1_En_2_Chapter.xhtml#Fig1).\n\
    \nThe three components of this smart mobility triad are not separate components\
    \ as they impact each other. The following sections shed some light on these three\
    \ components.\n\n## 2.1 Smart Mobility Governance\n\nThe creation of a comprehensive\
    \ and effective governance framework for smart mobility services is challenging\
    \ and is a moving target as this framework should embrace existing and emerging\
    \ technologies and encourage innovation while ensuring societal and environmental\
    \ risks are identified and carefully managed.\n\nThere is an old parable about\
    \ an elephant and a group of blind men in a room. None of these men had come across\
