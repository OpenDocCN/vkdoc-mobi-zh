    # 5. 智能出行：颠覆性创新


    “颠覆性创新”一词由克莱顿·克里斯坦森提出，指的是一种过程，在此过程中，一种被低估的产品或服务开始变得足够流行，从而取代或置换传统的产品或服务。颠覆性因素正在显著改变消费者、行业和企业的运作方式，并能带来能够服务于低端或未被满足的消费者群体，并最终进入主流市场的、改变游戏规则的产品和服务。根据《创新者的窘境》（Christensen,
    2013），颠覆性创新满足客户的未来需求，并且可能在某些关键特性上表现较低，但会创造出一些市场所看重的独特功能。昂贵的导航系统和 `Google`/`Apple
    Maps` 中的导航功能，分别是持续性创新和颠覆性创新的例子。前者更可靠，不依赖网络覆盖，但价格更高，并且相较于 `Google`/`Apple Maps`
    不提供实时交通更新。出行领域的颠覆性创新通常不是突破性创新，但会显著改变出行服务提供商的运营方式、人们的出行方式以及货物的配送方式。本章将重点介绍智能出行领域的一些颠覆性创新。

