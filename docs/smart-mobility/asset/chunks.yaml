    \ have just experienced. The blind man who felt the leg declares, “It’s like a\
    \ tree or a pillar”; the one who felt the tail declares with confidence, “It’s\
    \ like a rope”; the one who felt the trunk says, “It’s like a snake or a hose”;\
    \ the one who felt the ear declares without doubt, “It’s like a soft blanket”;\
    \ and the one who felt the belly declares knowingly, “It’s a wall.” So each blind\
    \ man senses the elephant from his particular point of view and comes up with\
    \ a different conclusion. Likewise, smart mobility governance regulations should\
    \ be developed taking into consideration different opinions and concerns from\
    \ multiple stakeholders. These stakeholders include policy makers, city authorities,\
    \ environment activists, insurance companies, equipment/mobility platform manufacturers,\
