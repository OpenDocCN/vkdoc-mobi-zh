- fmt: '# The noise factors can include, but not limited to, scale changes, orientation
    changes, lightning conditions (illumination, shadows, and reflectance), and so
    on. `Response` is the primary intended functional output of the model. In this
    example, the output is the likelihood of what the driver is doing (safe driving,
    texting—right, talking on the phone—right, texting—left, talking on the phone—left,
    operating the radio, drinking, reaching behind, hair and makeup, or talking to
    a passenger). Finally, error states represent failure modes or effects of failure
    as defined by the end user when using the predictive model. In this case, error
    states can be false alarms or false negatives. Adversarial use cases should be
    considered. These use cases are the cases that can easily fool the algorithm due
    to their similarity with target use cases. In the previous example shown in Figure
    [3-9](#511013_1_En_3_Chapter.xhtml#Fig9), let us assume we have two control factors
    (camera zoom and sampling rate) with three levels each and three noise factors
    (scale changes, orientation changes, and lightning conditions) with six levels
    each. The number of data collection experiments based on fractional factorial
    design can be calculated using this formula, `L_R^(k-p)`, where *L* is the number
    of levels, *k* is the number of factors to be investigated, *p* designates the
    fraction of the experiment design (*p* = 0 for full factorial, *p* = 1 for half
    factorial, and *p* = 2 for quarter factorial), and *R* is the resolution (Resolution
    I indicates one-way or no interaction between the factors, Resolution II for two-way
    interactions, Resolution III if there are one-way and two-way interactions cofounded,
    and Resolution V if there are one-way and four-way interaction or two-way and
    three-way interaction aliasing). In our example, assuming full factorial design
    and Resolution I, the number of experiments for all control and noise factors
    will be `3² × 6³ = 1, 944` runs. Assuming that each experiment takes 10 minutes,
    the total duration of the data collection will be 324 hours or 40.5 days assuming
    8 hours per day. A subject matter expert should be able decide the importance
    of each factor and the practical levels to be considered as collecting a fully
    comprehensive dataset (full factorial dataset) is usually impossible due to time
    and resource constraints. A fractional factorial dataset with the key factors
    and frequently occurring levels can be used to build efficient models with acceptable
    levels of transferability and generalizability.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig9_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig9_HTML.png)


    Figure 3-9


    Visual Feature–Based Distracted Driver Monitoring Model


    ## 3.6.3 AI for Smart Mobility


    AI is a foundational technology and a driving force behind several existing and
    emerging mobility systems and services we are currently witnessing. According
    to the Artificial Intelligence in Automotive survey conducted by Wards Intelligence
    in 2018, 40.6% of the participants think that advanced driver assistance systems
    (ADASs) will be the first vehicle systems to use AI, 32.5% infotainment/voice
    recognition, 17.6% diagnostics, and 9.2% vehicle-to-infrastructure (V2I)/vehicle-to-vehicle
    (V2V) communication.


    **Important**


    In a survey conducted by the McKinsey Center for Future Mobility on 474 companies
    in the mobility and AI space, 38.2% of these companies focus on using AI for autonomous
    driving, 19.4% to improve in-vehicle experience, 16% in manufacturing and supply
    chain management, 9.3% in fleet management, 8.9% in quality assurance, 5% in traffic/infrastructure
    inspection, and 3.2% in predictive maintenance (Cornet et al., 2017).


    AI is used along the entire life cycle of the mobility platform from design to
    manufacturing to operation to feedback and updates to disposal and recycling as
    illustrated in Figure [3-10](#511013_1_En_3_Chapter.xhtml#Fig10).


    Potential applications of AI and ML in smart mobility include, but are not limited
    to, the following:


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig10_HTML.jpg](images/511013_1_En_3_Chapter/511013_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Examples of AI Applications in Vehicles


    * Creating incremental, disruptive, and transformational innovative features,
    services, or new business models to improve customer experience, gain competition,
    and/or serve low-end or unserved consumers.


    * Automatic gathering of relevant data and generating several insights to draw
    a larger conclusion and make better decisions.


    * Identifying the data that’s available to the mobility company but is not being
    used and left in the dark (dark data).


    * Developing different levels of situational awareness to enable the perception
    of elements in the environment within a volume of time and space, the comprehension
    of their meaning, and the projection of their status in the near future. Examples
    include vehicle diagnostics and prognostics; vulnerable road user (VRU) detection,
    localization, and intent recognition; user behavior recognition (physical, visual,
    or physiological); user behavior learning and modeling (age recognition, gender
    recognition, preference recognition, etc.); and predictive infotainment.


    * Enabling ADASs and automated driving tasks (perception, planning, control, learning,
    and adaptation) in changing environments.


    * Supporting digital transformation (e.g., generative design, test automation,
    over-the-air (OTA), Robotic Process Automation (RPA), intelligent agent assistants,
    digital twin of the mobility platform, dispatch and routing optimization, fleet
    management, digital go-to-market (GTM) tools, etc.).


    Moreover, AI search algorithms and modern metaheuristics optimization techniques
    have the ability to handle complex ill-structured people mobility problems, logistics
    problems, and infrastructure optimization problems. The following subsection describes
    these ill-structured problems and explains the potential of AI algorithms to solve
    them.


    ## 3.6.4 AI for Ill-Structured Problems in Smart Mobility


    Real-world problems can be broadly classified into well-structured problems (WSPs)
    and ill-structured problems (ISPs). Figures [3-11](#511013_1_En_3_Chapter.xhtml#Fig11)
    illustrates the main components of well-structured problems.


    Herbert Simon in Simon (1973) described the six main characteristics of WSPs as
    follows:


    1. There is a definite criterion for testing any proposed solution and a mechanizable
    process for applying the criterion.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig11_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig11_HTML.png)


    Figure 3-11


    Well-Structured Problems (WSPs)


    1. There is at least one problem space in which the initial problem state, the
    goal state, and all other states that may be reached, or considered, in the course
    of attempting a solution of the problem can be represented.


    2. Attainable state changes (legal moves) can be represented in a problem space,
    as transitions from given states to the states directly attainable from them.
    But considerable moves, whether legal or not, can also be represented—that is,
    all transitions from one considerable state to another.


    3. Any knowledge that the problem solver can acquire about the problem can be
    represented in one or more problem spaces.


    4. If the actual problem involves acting upon the external world, then the definition
    of state changes and of the effects upon the state of applying any operator reflects
    with complete accuracy in one or more problem spaces the laws (laws of nature)
    that govern the external world.


    5. All of these conditions hold in the strong sense that the basic processes postulated
    require only practicable amounts of computation and the information postulated
    is effectively available to the processes—that is, available with the help of
    only practicable amounts of search.'
