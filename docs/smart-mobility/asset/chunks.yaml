  trans: '

    # 排版后的内容


    不良结构问题是复杂的离散/连续问题，没有算法解决方案或通用问题求解器，其特征可能包括缺乏数学模型、数据不完美、目标不明确、问题视角不同、解决方案相互冲突、随机行动或情境敏感性等一个或多个特征。这些特征可能导致在定义问题空间、生成合法操作/转换或替代解决方案、评估所提出的解决方案、定义停止条件以及更新状态机制时出现约束和困难。


    以数据不完美为例，车辆环境中可使用多种数据源来提供有关驾驶环境的信息，包括驾驶员状态、车辆状态和周围环境。这些数据源可能包括各种物理传感器、人类生成的信息以及从互联网检索的数据。物理传感器包括但不限于测距传感器、摄像头、车速传感器、胎压监测传感器等。来自这些传感器的数据曾被称为“硬数据”，本质上具有定量性。人类可作为软传感器，提供关于其状态/偏好、车辆以及天气/道路状况的动态观测信息。这种信息被称为“软数据”。软数据的另一个来源是互联网上的开源信息，可以检索和挖掘这些信息，例如提供更多关于交通状况的观测数据。下一代高级驾驶辅助系统将依赖于整合和融合来自上述来源的多模态数据。由于软数据具有定性性质、主观性和固有的不完整性，处理软数据比处理硬数据更具挑战性。硬数据和软数据都可能存在不同的不完美方面。这种数据不完美可能导致对驾驶员/车辆/环境状态的错误信念。这些错误信念进而可能导致错误的决策和行动。


    数据不完美可分为不确定性、不精确性和粒度性。当数据所陈述内容的关联置信度或信心程度小于 1 时，数据就是不确定的。不精确数据指的是多个对象而非单个对象。不精确性有多种形式，如模糊性、歧义性和无知/不完整性。数据粒度是数据不完美的另一个方面，指的是区分由数据描述的对象的能力，这取决于所提供的属性集。


    例如，不确定性可能由环境、传感器、车辆、模型或计算等多种因素引起。物理世界本质上是不可预测的。虽然在结构化的环境（如装配线）中不确定性程度很小，但高速公路和城市峡谷等环境是动态的，且多数时候不可预测。传感器也是存在误差的不完美设备。它们能感知到的内容本身就存在局限性。局限性来自两个主要因素：传感器的量程和分辨率，这两者都受物理定律制约（Fox
    et al., 2005）。例如，摄像头无法穿透其他车辆或墙壁等障碍物，即使在感知范围内，摄像头图像的空间分辨率也有限。传感器易受噪声影响，噪声会以不可预测的方式干扰传感器测量，从而限制了可从传感器测量中提取的信息（Choi
    and Lee, 2007）。这种噪声会导致随机/非确定性误差，与系统/确定性误差不同，其特点是传感器输出缺乏可重复性。此外，观测的不确定性可能源于其他因素，如虚假测量、数据源的不可靠性和欺骗性、多目标和杂波观测的存在、快速机动目标的规避行动以及未知的相关性（Mahler,
    2007）。车辆中的某些执行器可能不准确，并且由于控制噪声和磨损等因素，在某种程度上不可预测。模型是真实世界的抽象。因此，它们只能部分地模拟车辆及其环境的底层物理过程（Fox
    et al., 2005）。此外，为了保证实时响应，有时会采用近似模型。

    '
- fmt: "一些诸如聚类和旅行商问题（TSP）之类的问题在原则上可能是结构良好的，但由于实时求解这些问题所需的计算量不切实际，它们在实践中是结构不良的。在TSP中，给定`n`个城市，一个旅行商必须访问这`n`个城市并返回家中，形成一个环路（往返行程）。他希望能以最高效的方式（最快的方式、最便宜的方式、最短的距离或其他标准）旅行。TSP中的搜索空间非常大，例如，如果旅行商要访问大多伦多地区（GTA）的14个主要城市，如图[3-12](#511013_1_En_3_Chapter.xhtml#Fig12)所示。\n\
    \n对于非对称TSP，存在`13! = 6,227,020,800`条可能的路径。在非对称TSP中，路径可能并非双向都存在，或者距离可能不同，从而形成一个有向图。交通碰撞、单行道以及出发和到达费用不同的城市的机票价格，都是这种对称性可能被打破的例子。这是一个NP难问题。TSP被用作研究通用方法的平台，这些方法可应用于广泛的离散优化问题。这些问题包括但不限于：安排校车路线以接送学区内的儿童、为特定机队分配飞机航线、将农业设备从一个地点运输到另一个地点以进行土壤测试、调度有线电视公司的上门维修服务、为行动不便者送餐、调度仓库中的堆垛起重机、规划包裹收寄的卡车路线，以及其他一系列问题。\n\
    \n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig12_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig12_HTML.png)\n\
    \n图 3-12  \n大多伦多地区（GTA）的旅行商问题（TSP）\n\n在智能出行的背景下，智能系统问题（ISPs）可分为人员出行问题、物流问题和基础设施问题。人员出行问题的例子包括：\n\
    \n*   **多标准最优路径规划**：改进现有的路径规划算法，除了最短时间外，还需考虑不同的标准，例如左转次数、交叉路口数量、避开危险区域、道路容量、收费等。\n\
    \n*   **带容量约束的车辆路径问题**：服务提供商需要使用一个公共仓库的同质车辆车队来服务一组客户。每个客户对货物有一定需求，货物最初位于仓库。任务是设计起始和结束于仓库的车辆路线，以满足所有客户的需求。\n\
    \n*   **公交调度问题**：调度的目标是获得一个公交装载方案，使得路线数量最小化、所有公交车的总行驶距离保持最小、没有公交车超载，并且遍历任何路线所需的时间不超过最大允许时间策略。\n\
    \n*   **紧急派遣与路径规划**：用于地面/空中救护车、消防车、警车或搜救车辆等第一响应应急车辆。\n\n*   **点对点（P2P）车辆共享服务、需求响应式交通（DRT）、拨号乘车或辅助公交、微交通、拼车服务、网约车或叫车服务、或合乘/拼车服务**：旨在最大化正常时段和高峰时段的车辆占用率或预期利润。在非高峰时段，司机愿意接载距离较远的乘客。如果非常繁忙，司机不太可能接受接驾时间较长的行程，因为他们认为如果多等几分钟，就会接到距离更近的请求。这些信息可用于为拼车应用生成合理的优化方案。\n\
    \n*   **疫情时期的按需响应式交通**：支持必要工作者和普通公众（尤其是老年人）前往药房和杂货店的必要出行，同时考虑商店的营业时间、容量和在线配送选项。\n\
    \n*   **健身规划器**：为跑步者和骑行者创建一个健身助手，可无缝自动完成规划健身活动所涉及的多个任务。该规划器评估运动员当前的体能水平和个人训练目标，以制定健身计划。该规划器还会生成并推荐既受欢迎又根据用户目标、水平和计划时间定制的地理路线，从而减少规划阶段面临的挑战。建议的健身计划会根据每位用户在实现健身目标过程中的进展而持续调整，从而保持运动员受到挑战和激励。\n\
    \n*   **行程规划**：规划一天的行程可能是旅行中最具挑战性和最耗时的任务。通过游览最好的景点来最大化用户的时间总是理想的；然而，从大量高评分的地点中进行选择，显著增加了决策过程的难度。这个问题可以通过开发一个旅行规划器来解决，该规划器能最小化总通勤时间，最大化解决方案中所包含景点的平均评分，最大化在每个景点停留的时间，并有效减少游客游览一个城市时的空闲时间。\n\
    \n*   **共享或私有自动驾驶汽车（AV）或零乘员车辆（ZOV）的运动规划**：该问题涉及到如何在一系列障碍物中，为车辆找到一条从起始位置到给定目标位置的无碰撞路径。路径规划可以看作是一个优化问题，旨在满足若干约束条件的同时，改善某些系统目标。系统目标可以是行驶距离、行驶时间和消耗的能量。然而，行驶时间是最常见的目标。\n\
    \n*   **空驶问题**：为第一/最后一英里运输公司最小化空驶（最小化无乘客行驶里程）。\n\n*   其他问题包括但不限于：最优MaaS套餐捆绑、多模式无缝行程规划、电动出行中的生态路径规划、微出行第一/最后一英里路径规划以及通信中继。\n\
    \n物流问题可能包括以下内容：\n\n*   **最后一英里配送调度与重新调度**：为送货自行车、半自主和全自主最后一英里送货卡车、自动驾驶送货机器人、送货无人机、e-Palette、邮政投递、无人驾驶送货以及私有自动驾驶汽车找到最优的调度方案，以最大化客户满意度并最小化配送成本，同时考虑车辆容量、配送服务类型（几日送达、次日送达或加收附加费的当日送达）、配送时间、投递地点等因素。"
  raw: 'Some problems such as clustering and the traveling salesman problem (TSP)
    may be well structured in principle, but they are ill-structured in practice due
    to impracticable amounts of computation required to solve these problems in real
    time. In TSP, given *n* cities, a traveling salesman must visit the *n* cities
    and return home, making a loop (round trip). He would like to travel in the most
    efficient way (fastest way, cheapest way or shortest distance or some other criterion).
    Search space in TSP is very big, for example, if the traveling salesman is to
    visit the 14 major cities in the Greater Toronto Area (GTA) as illustrated in
    Figure [3-12](#511013_1_En_3_Chapter.xhtml#Fig12).


    There are 13!= 6,227,020,800 possible tours in the case of asymmetric TSP. In
    asymmetric TSP, paths may not exist in both directions, or the distances might
    be different, forming a directed graph. Traffic collisions, one-way streets, and
    airfares for cities with different departure and arrival fees are examples of
    how this symmetry could break down. This is an NP-hard problem. TSP is used as
    a platform for the study of general methods that can be applied to a wide range
    of discrete optimization problems. These problems include, but are not limited
    to, the problem of arranging school bus routes to pick up the children in a school
    district, assignment of routes for planes of a specified fleet, transportation
    of farming equipment from one location to another to test soil, scheduling of
    service calls at cable firms, the delivery of meals to homebound persons, the
    scheduling of stacker cranes in warehouses, and the routing of trucks for parcel
    post-pickup and a host of others.


    ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig12_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig12_HTML.png)


    Figure 3-12


    Traveling Salesman Problem (TSP) in the Greater Toronto Area (GTA)


    In the context of smart mobility, ISPs can be categorized into people mobility
    problems, logistics problems, and infrastructure problems. Examples of people
    mobility problems include


    *   **Multi-criteria Optimal Routing**: To improve existing routing algorithms
    taking into consideration different criteria beside the shortest time such as
    number of left turns, number of intersections, avoiding passing by dangerous zones,
    capacity of the roads, tolling, and so on.


    *   **The Capacitated Vehicle Routing Problem**: Where a service provider has
    to serve a set of customers using a fleet of homogeneous vehicles based at a common
    depot. Each customer has a certain demand for goods, which initially are located
    at the depot. The task is to design vehicle routes starting and ending at the
    depot such that all customer demands are fulfilled.


    *   **Bus Scheduling Problem**: The objective of the scheduling is to obtain a
    bus loading pattern such that the number of routes is minimized, the total distance
    traveled by all buses is kept at minimum, no bus is overloaded, and the time required
    to traverse any route does not exceed a maximum allowed policy.


    *   **Emergency Dispatch and Routing**: For first-response emergency vehicles
    like ground/air ambulances, fire trucks, police cars, or search and rescue vehicles.


    *   **Peer-to-Peer (P2P) Vehicle Sharing Services, Demand-Responsive Transit (DRT),
    Dial-a-Ride or Paratransit, Microtransit, Ridesharing Services, Ridehailing or
    Ridesourcing Services, or Ridesplitting/Carpooling Services**: To maximize vehicle
    occupancy or expected profit during normal and surge times. During slow hours,
    drivers are willing to pick up a passenger who’s far away. If it is super busy,
    drivers are less likely to accept trips with longer pickup times since they figure
    they will get a closer request if they wait a few more minutes. This knowledge
    can be used to generate plausible optimizations for the ride share apps.


    *   **On-Demand Responsive Transit During Pandemics**: To support the transportation
    of essential workers and essential trips to pharmacies and grocery stores for
    the general public especially the elderly taking into consideration store operating
    hours, capacity, and online delivery options.


    *   **Fitness Planner**: To create a fitness assistant for runners and cyclists
    that seamlessly automates the multiple tasks involved in planning fitness activities.
    The planner assesses an athlete’s current fitness level and individual training
    goals in order to create a fitness plan. The planner also generates and recommends
    geographical routes that are both popular and customized to the user’s goals,
    level, and scheduled time, thus reducing the challenges involved in the planning
    stage. The suggested fitness plans are continuously adapting based on each user’s
    progress within their fitness goals, thus keeping the athlete challenged and motivated.


    *   **Trip Itinerary Planning**: Planning an itinerary for the day is perhaps
    the most challenging and time-consuming task when it comes to traveling. It is
    always ideal to maximize the user’s time by visiting the best attractions available;
    however, choosing from a large pool of highly rated sites significantly makes
    the decision-making process more difficult. This problem can be addressed by the
    development of a trip planner that minimizes total commute time, maximizes the
    average ratings of attractions contained in a solution, and maximizes the duration
    spent at each of these attractions and effectively minimizes idle time when someone
    visits a city.


    *   **Motion Planning for a Shared or Privately Owned AV or ZOV (Zero-Occupant
    Vehicle)**: This problem relates to how to find a collision-free path for a vehicle
    from a start position to a given goal position, amid a collection of obstacles.
    Path planning can be seen as an optimization problem, which aims at improving
    some system objectives with several constraints. System objectives may be the
    traveling distance, traveling time, and consumed energy. However, the traveling
    time is the most common objective.


    *   **Deadheading Problem**: Minimizing deadheading for first-/last-mile transportation
    companies (minimize the miles driven with no passenger).


    *   Other problems include, but are not limited to, optimal MaaS bundling, multimodal
    seamless trip planning, eco-routing in e-mobility, micromobility first-/last-mile
    routing, and communication relaying.


    Logistics problems may include the following:


    *   **Last-Mile Delivery Scheduling and Rescheduling**: Finding the optimal schedule
    for delivery cargo-bikes, semi- and fully autonomous last-mile delivery trucks,
    self-driving delivery droids, delivery drones, e-Palette, postal delivery, driverless
    deliveries, and privately owned AV to maximize customer satisfaction and minimize
    delivery cost taking into consideration the capacity of the vehicle, type of delivery
    service (couple of days delivery, next-day delivery, or same-day delivery with
    some extra surcharge), delivery time, drop-off locations, and so on.'
  trans: "\n一些诸如聚类和旅行商问题（TSP）之类的问题在原则上可能是结构良好的，但由于实时求解这些问题所需的计算量不切实际，它们在实践中是结构不良的。在\
    \ TSP 中，给定`n`个城市，一个旅行商必须访问这`n`个城市并返回家中，形成一个环路（往返行程）。他希望能以最高效的方式（最快的方式、最便宜的方式、最短的距离或其他标准）旅行。TSP\
    \ 中的搜索空间非常大，例如，如果旅行商要访问大多伦多地区（GTA）的 14 个主要城市，如图 3-12 所示。\n\n对于非对称 TSP，存在`13! =\
    \ 6,227,020,800`条可能的路径。在非对称 TSP 中，路径可能并非双向都存在，或者距离可能不同，从而形成一个有向图。交通碰撞、单行道以及出发和到达费用不同的城市的机票价格，都是这种对称性可能被打破的例子。这是一个\
    \ NP 难问题。TSP 被用作研究通用方法的平台，这些方法可应用于广泛的离散优化问题。这些问题包括但不限于：安排校车路线以接送学区内的儿童、为特定机队分配飞机航线、将农业设备从一个地点运输到另一个地点以进行土壤测试、调度有线电视公司的上门维修服务、为行动不便者送餐、调度仓库中的堆垛起重机、规划包裹收寄的卡车路线，以及其他一系列问题。\n\
    \n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig12_HTML.png](img/511013_1_En_3_Fig12_HTML.png)\n\
    \n图 3-12  \n大多伦多地区（GTA）的旅行商问题（TSP）\n\n在智能出行的背景下，智能系统问题（ISPs）可分为人员出行问题、物流问题和基础设施问题。人员出行问题的例子包括：\n\
    \n*   **多标准最优路径规划**：改进现有的路径规划算法，除了最短时间外，还需考虑不同的标准，例如左转次数、交叉路口数量、避开危险区域、道路容量、收费等。\n\
    \n*   **带容量约束的车辆路径问题**：服务提供商需要使用一个公共仓库的同质车辆车队来服务一组客户。每个客户对货物有一定需求，货物最初位于仓库。任务是设计起始和结束于仓库的车辆路线，以满足所有客户的需求。\n\
    \n*   **公交调度问题**：调度的目标是获得一个公交装载方案，使得路线数量最小化、所有公交车的总行驶距离保持最小、没有公交车超载，并且遍历任何路线所需的时间不超过最大允许时间策略。\n\
    \n*   **紧急派遣与路径规划**：用于地面/空中救护车、消防车、警车或搜救车辆等第一响应应急车辆。\n\n*   **点对点（P2P）车辆共享服务、需求响应式交通（DRT）、拨号乘车或辅助公交、微交通、拼车服务、网约车或叫车服务、或合乘/拼车服务**：旨在最大化正常时段和高峰时段的车辆占用率或预期利润。在非高峰时段，司机愿意接载距离较远的乘客。如果非常繁忙，司机不太可能接受接驾时间较长的行程，因为他们认为如果多等几分钟，就会接到距离更近的请求。这些信息可用于为拼车应用生成合理的优化方案。\n\
    \n*   **疫情时期的按需响应式交通**：支持必要工作者和普通公众（尤其是老年人）前往药房和杂货店的必要出行，同时考虑商店的营业时间、容量和在线配送选项。\n\
    \n*   **健身规划器**：为跑步者和骑行者创建一个健身助手，可无缝自动完成规划健身活动所涉及的多个任务。该规划器评估运动员当前的体能水平和个人训练目标，以制定健身计划。该规划器还会生成并推荐既受欢迎又根据用户目标、水平和计划时间定制的地理路线，从而减少规划阶段面临的挑战。建议的健身计划会根据每位用户在实现健身目标过程中的进展而持续调整，从而保持运动员受到挑战和激励。\n\
    \n*   **行程规划**：规划一天的行程可能是旅行中最具挑战性和最耗时的任务。通过游览最好的景点来最大化用户的时间总是理想的；然而，从大量高评分的地点中进行选择，显著增加了决策过程的难度。这个问题可以通过开发一个旅行规划器来解决，该规划器能最小化总通勤时间，最大化解决方案中所包含景点的平均评分，最大化在每个景点停留的时间，并有效减少游客游览一个城市时的空闲时间。\n\
    \n*   **共享或私有自动驾驶汽车（AV）或零乘员车辆（ZOV）的运动规划**：该问题涉及到如何在一系列障碍物中，为车辆找到一条从起始位置到给定目标位置的无碰撞路径。路径规划可以看作是一个优化问题，旨在满足若干约束条件的同时，改善某些系统目标。系统目标可以是行驶距离、行驶时间和消耗的能量。然而，行驶时间是最常见的目标。\n\
    \n*   **空驶问题**：为第一/最后一英里运输公司最小化空驶（最小化无乘客行驶里程）。\n\n*   其他问题包括但不限于：最优 MaaS 套餐捆绑、多模式无缝行程规划、电动出行中的生态路径规划、微出行第一/最后一英里路径规划以及通信中继。\n\
    \n物流问题可能包括以下内容：\n\n*   **最后一英里配送调度与重新调度**：为送货自行车、半自主和全自主最后一英里送货卡车、自动驾驶送货机器人、送货无人机、e-Palette、邮政投递、无人驾驶送货以及私有自动驾驶汽车找到最优的调度方案，以最大化客户满意度并最小化配送成本，同时考虑车辆容量、配送服务类型（几日送达、次日送达或加收附加费的当日送达）、配送时间、投递地点等因素。\n"
- fmt: '### 多准则最优路径规划

    传统的导航应用（如 Google/Apple 地图或 Waze）引发了许多问题，因为它们没有考虑多个准则以及重要的硬约束和软约束，无法在车辆载货运输（`liveheading`）和空驶运输（`deadheading`）期间实现最优的配送车辆路径规划。`deadheading`（或空驶里程）表示配送车辆在未装载任何货物时行驶的空闲距离。`liveheading`表示配送车辆在装载货物时行驶的距离。配送车辆路径规划可以通过考虑多个准则和约束来进行优化。使用此优化引擎对`liveheading`和`deadheading`问题进行优化的目标函数示例包括：燃油消耗、行驶时间、行驶距离、路径上的交通信号灯数量、左转次数、交叉口数量、环岛数量以及路径上的公交车站数量。硬约束的示例包括：在客户给定的时间窗口内送达，以及不超过配送车辆的容量。软约束可以包括：避免经过主干道、避免在上下学时间经过学校区域、避免经过高海拔街道以节省燃油、避免在桥梁开启时间经过桥梁、避免经过危险区域、避免经过铁路道口等。

    多个相互冲突的目标可以通过基于偏好的多目标优化过程、理想多目标优化过程或帕累托优化方法来处理。在前一种方法中，首先应用对偶原理将所有相互冲突的目标转化为最大化或最小化问题，然后通过使用相对偏好向量或加权方案将这些多个目标转化为单一或总体目标，从而对多个目标进行标量化。然而，找到这个偏好向量具有高度主观性且并不直接。后一种方法依赖于找到多个折衷的最优解，并使用更高级的信息从中选择一个。这个过程将备选方案的数量减少到一个最优的非支配解集，称为帕累托前沿，可用于在多目标空间中制定战略决策。


    ### 其他问题

    其他问题包括动态订单编排、仓库中的自动驾驶车辆（`SDV`）协调、卡车编队、集群以及配送车队管理。


    ### 基础设施问题示例


    #### 交通传感器的优化布置

    精确连续地收集交通数据，使道路运营者能够以最低成本实时监控和管理交通流量。这些信息也有助于城市规划者进行智能交通规划，以实现更可持续和高效的城市出行。交通监控系统包含大量的传感器，这些传感器提供关于道路占用率/车头时距/车间间隙/拥堵程度、车辆计数与分类、弱势道路使用者（`VRU`，如行人和骑行者）计数等方面的宝贵信息。这些传感器包括但不限于：感应线圈检测器、摄像头、雷达、蓝牙（`BLE`）和WiFi检测器等。传感器的布置对交通监控系统的性能有着巨大的影响。传感器布置问题可视为一个组合优化问题，涉及将一组具有不同视野的*N*个传感器放置在*M*个感兴趣区域中。


    #### 其他问题

    其他问题包括：城市自行车站点的优化布置；公交车站的优化布置；步行路线和自行车道的优化布置（以促进积极的、软性的和包容性的出行）；按需出行系统中堆叠点与货架/取货与落客点的优化分配；微出行站点的优化布置；电动汽车充电站的优化布置；智能停车（车位分配、动态定价、导航）；动态拥堵收费与道路定价；交通流量优化；自动驾驶车辆（`AV`）协调与自组织；交通走廊和城市街道的规划/重新规划（以适应共享交通中更多的行人、骑行者、摩托车手，并减少汽车数量）；用于电动汽车充电的无人机最优部署；以及空中出租车起降点的优化分配。


    ### AI搜索算法与现代元启发式优化技术

    AI搜索算法与现代元启发式优化技术能够高效地探索搜索空间，从而在合理时间内为这些复杂问题找到（近）最优解。将元启发式算法应用于解决智慧出行系统中的不良结构问题有多重好处。首先，元启发式算法能够以合理的计算成本找到高质量的（即近最优的）解，并常被视为全局优化器。其次，元启发式方法通常对问题规模、问题实例和随机变量具有鲁棒性。最后，与纯随机搜索相比，元启发式算法的随机性并非盲目使用，而是以一种智能的、有偏的形式使用。我展示了如何利用AI和元启发式算法解决这些问题，这些内容出自我在多伦多大学开发并教授的课程《智慧出行的仿生算法》。本课程全面介绍了AI搜索算法，并强调了它们在解决智慧出行背景下复杂的离散和连续问题中的强大能力。该课程的开源GitHub组织可在此处获取：[`https://github.com/SmartMobilityAlgorithms`](https://github.com/SmartMobilityAlgorithms)。该组织包含多个关于确定性和随机性仿生搜索算法的Python代码库，以及智慧出行系统与服务中潜在用例的示例。


    ### 3.6.5 AI/ML成功采用的关键因素


    成功采用AI/ML技术应考虑以下五个先决条件或关键要素：


    *   **统一战略：** 公司需要制定清晰统一的战略，以充分利用快速演变但充满挑战的AI和ML技术的全部潜力，并协调跨职能创新的高级研发工作。

    *   **AI治理框架：** 用于解决负责任AI的重要方面，例如性能指标、网络安全、隐私、伦理、偏见、透明度、责任、法律与政策合规性以及可信赖性。

    *   **技术协议与指南：** 例如数据收集协议、安全验证与确认规范，以及部署、鲁棒性和OTA（空中下载）更新流程。

    *   **基础设施与工具：** 公司还应提供充足的硬件基础设施和软件工具，用于数据处理、模型开发、超参数优化、模型加速与压缩、模型部署（云端或边缘部署）以及OTA更新。

    *   **AI文化与人才培养：** 最后但并非最不重要的一点是，传播AI文化、培养人才并持续教育他们了解这一快速发展领域的最新进展至关重要。我们需要充分理解当前AI浪潮的优势和局限性，以免过度信任技术并在关键的安全相关项目中制造虚假论点。'
  raw: '*   **Multi-criteria Optimal Routing**: Conventional navigation apps like
    Google/Apple Maps or Waze caused a lot of problems because they are not taking
    into consideration several criteria and important hard and soft constraints to
    achieve optimal delivery vehicle routing during both liveheading and deadheading.
    Deadheading or dead mileage represents the idle distance covered by the delivery
    vehicle without carrying any load. Liveheading represents the distance traveled
    while the delivery vehicle is loaded. Delivery vehicle routing can be optimized
    taking into consideration multiple criteria and constraints. Examples of objective
    functions to be optimized for both liveheading and deadheading problems using
    this optimization engine include fuel consumption, travel time, travel distance,
    number of traffic signals of a route, number of left turns, number of intersections,
    number of roundabouts, and number of bus stops of a route. Example of hard constraints
    include delivering within the time window given to the customer and not exceeding
    the capacity of the delivery vehicles. Soft constraints can be avoid passing by
    arterial roads, avoid passing by school zones during drop-off and pick-up times,
    avoid passing by streets with high elevation to save fuel, avoid passing by bridges
    during lift times, avoiding passing by dangerous zones, avoid passing by railway
    crossing, etc. Multiple conflicting objectives can be handled using a preference-based
    multi-objective optimization procedure or ideal multi-objective optimization procedure
    and the Pareto optimization approach. In the former approach, duality principle
    is applied first to transform all the conflicting objectives for maximization
    or minimization and then converts these multiple objectives into a single or overall
    objective by using a relative preference vector or a weighting scheme to scalarize
    the multiple objectives. However, finding this preference vector is highly subjective
    and not straightforward. The latter approach relies on finding multiple trade-off
    optimal solutions and chooses one using higher-level information. This procedure
    reduces the number of alternatives to an optimal set of nondominated solutions
    known as the Pareto Frontier, which can be used to make strategic decisions in
    a multi-objective space.


    *   Other problems include dynamic order orchestration, self-driving vehicle (SDV)
    coordination in warehouses, truck platooning, flocking, and delivery fleet management.


    Examples of infrastructure problems are


    *   **Optimal Placement of Traffic Sensors**: The precise and continuous collection
    of traffic data enables road operators to monitor and manage traffic flows in
    real time at minimum costs. This information also helps city planners in smart
    transportation planning for more sustainable and efficient urban mobility. Traffic
    monitoring systems encompass a vast array of sensors that provide valuable information
    about road occupancy/headway/gap/congestion, vehicle counting and classification,
    counting of vulnerable road users (VRUs) such as pedestrians and cyclists, and
    so on. These sensors include, but are not limited to, inductive-loop detectors,
    cameras, radars, BLE and WiFi detectors, and so on. Sensor placement has an enormous
    impact on the performance of the traffic monitoring system. The sensor placement
    problem can be seen as a combinatorial problem that involves the placement of
    a set of *N* sensors with different fields of view in a set of *M* areas of interest.


    *   Other problems include optimal placement of city bike terminals; optimal placement
    of bus stops; optimal placement of walking routes and cycling lanes for active,
    soft, and inclusive mobility; optimal allocation of stacks and racks/pickup and
    drop-off points for mobility on demand systems; optimal placement of stations
    for micromobility; optimal placement of EV charging stations; smart parking (allocation,
    dynamic pricing, navigation); dynamic congestion charging and road pricing; traffic
    flow optimization; AV coordination and self-organization; planning/replanning
    of transport corridors and city streets to accommodate more pedestrians, cyclists,
    and riders in shared transportation and less cars; optimal drone deployment for
    EV charging; and optimal allocation of air taxi takeoff and landing locations.


    AI search algorithms and modern metaheuristics optimization techniques can efficiently
    explore the search space in order to find (near-)optimal solutions for these complex
    problems in reasonable time. The benefits of applying metaheuristics in solving
    ill-structured problems in smart mobility systems are multifold. First, metaheuristics
    can find high-quality (i.e., near-optimal) solutions at a reasonable computational
    cost and are often seen as global optimizers. Second, metaheuristics approaches
    are often robust to problem size, problem instance, and random variables. Finally,
    compared to pure random search, metaheuristics algorithm randomness is not used
    blindly but in an intelligent, biased form. I show how AI and metaheuristics can
    be used to solve these problems in the course “Bio-inspired Algorithms for Smart
    Mobility” I developed and teach at the University of Toronto. This course provides
    a comprehensive introduction to AI search algorithms and highlights their power
    in solving complex discrete and continuous problems in the context of smart mobility.
    An open source GitHub organization of the course is available here: [`https://github.com/SmartMobilityAlgorithms`](https://github.com/SmartMobilityAlgorithms).
    This organization contains several Python repos about deterministic and stochastic
    bio-inspired search algorithms and examples of potential use cases in smart mobility
    systems and services.


    ### 3.6.5 Keys to Successful AI/ML Adoption


    The following five prerequisites or crucial elements should be considered for
    successful AI/ML technology adoption :


    *   **Unified Strategy:** Companies need to have a clear and unified strategy
    to leverage the full potential of the fast-evolving yet challenging AI and ML
    technologies and coordinate advanced research and development for a cross-functional
    innovation.


    *   **AI Governance Framework:** To address important aspects for responsible
    AI such as performance metrics, cybersecurity, privacy, ethics, bias, transparency,
    liability, legal and policy compliance, and trustworthiness.


    *   **Technical Protocols and Guidelines:** Such as data collection protocols,
    safety verification and validation regulations, and deployment, robustness, and
    OTA update procedures.


    *   **Infrastructure and Tools:** Companies also should provide adequate hardware
    infrastructure and software tools for data handling, model development, hyperparameter
    optimization, model acceleration and compression, and model deployment (cloud
    or edge deployment) and OTA updates.


    *   **AI Culture and Talent Development:** Last but literally not least, it is
    very important to spread the AI culture and develop the talents and keep educating
    them about recent advances in this fast-evolving field. We need to fully understand
    both the strengths and the limitations of the current wave of AI for not over-trusting
    the technology and creating false arguments especially in critical safety-related
    projects.'
  trans: '

    ### 多准则最优路径规划

    传统的导航应用（如 Google/Apple 地图或 Waze）引发了许多问题，因为它们没有考虑多个准则以及重要的硬约束和软约束，无法在车辆载货运输（`liveheading`）和空驶运输（`deadheading`）期间实现最优的配送车辆路径规划。`deadheading`（或空驶里程）表示配送车辆在未装载任何货物时行驶的空闲距离。`liveheading`表示配送车辆在装载货物时行驶的距离。配送车辆路径规划可以通过考虑多个准则和约束来进行优化。使用此优化引擎对`liveheading`和`deadheading`问题进行优化的目标函数示例包括：燃油消耗、行驶时间、行驶距离、路径上的交通信号灯数量、左转次数、交叉口数量、环岛数量以及路径上的公交车站数量。硬约束的示例包括：在客户给定的时间窗口内送达，以及不超过配送车辆的容量。软约束可以包括：避免经过主干道、避免在上下学时间经过学校区域、避免经过高海拔街道以节省燃油、避免在桥梁开启时间经过桥梁、避免经过危险区域、避免经过铁路道口等。

    多个相互冲突的目标可以通过基于偏好的多目标优化过程、理想多目标优化过程或帕累托优化方法来处理。在前一种方法中，首先应用对偶原理将所有相互冲突的目标转化为最大化或最小化问题，然后通过使用相对偏好向量或加权方案将这些多个目标转化为单一或总体目标，从而对多个目标进行标量化。然而，找到这个偏好向量具有高度主观性且并不直接。后一种方法依赖于找到多个折衷的最优解，并使用更高级的信息从中选择一个。这个过程将备选方案的数量减少到一个最优的非支配解集，称为帕累托前沿，可用于在多目标空间中制定战略决策。


    ### 其他问题

    其他问题包括动态订单编排、仓库中的自动驾驶车辆（`SDV`）协调、卡车编队、集群以及配送车队管理。


    ### 基础设施问题示例


    #### 交通传感器的优化布置

    精确连续地收集交通数据，使道路运营者能够以最低成本实时监控和管理交通流量。这些信息也有助于城市规划者进行智能交通规划，以实现更可持续和高效的城市出行。交通监控系统包含大量的传感器，这些传感器提供关于道路占用率/车头时距/车间间隙/拥堵程度、车辆计数与分类、弱势道路使用者（`VRU`，如行人和骑行者）计数等方面的宝贵信息。这些传感器包括但不限于：感应线圈检测器、摄像头、雷达、蓝牙（`BLE`）和
    WiFi 检测器等。传感器的布置对交通监控系统的性能有着巨大的影响。传感器布置问题可视为一个组合优化问题，涉及将一组具有不同视野的*N*个传感器放置在*M*个感兴趣区域中。


    #### 其他问题

    其他问题包括：城市自行车站点的优化布置；公交车站的优化布置；步行路线和自行车道的优化布置（以促进积极的、软性的和包容性的出行）；按需出行系统中堆叠点与货架/取货与落客点的优化分配；微出行站点的优化布置；电动汽车充电站的优化布置；智能停车（车位分配、动态定价、导航）；动态拥堵收费与道路定价；交通流量优化；自动驾驶车辆（`AV`）协调与自组织；交通走廊和城市街道的规划/重新规划（以适应共享交通中更多的行人、骑行者、摩托车手，并减少汽车数量）；用于电动汽车充电的无人机最优部署；以及空中出租车起降点的优化分配。


    ### AI 搜索算法与现代元启发式优化技术

    AI 搜索算法与现代元启发式优化技术能够高效地探索搜索空间，从而在合理时间内为这些复杂问题找到（近）最优解。将元启发式算法应用于解决智慧出行系统中的不良结构问题有多重好处。首先，元启发式算法能够以合理的计算成本找到高质量的（即近最优的）解，并常被视为全局优化器。其次，元启发式方法通常对问题规模、问题实例和随机变量具有鲁棒性。最后，与纯随机搜索相比，元启发式算法的随机性并非盲目使用，而是以一种智能的、有偏的形式使用。我展示了如何利用
    AI 和元启发式算法解决这些问题，这些内容出自我在多伦多大学开发并教授的课程《智慧出行的仿生算法》。本课程全面介绍了 AI 搜索算法，并强调了它们在解决智慧出行背景下复杂的离散和连续问题中的强大能力。该课程的开源
    GitHub 组织可在此处获取：[`https://github.com/SmartMobilityAlgorithms`](https://github.com/SmartMobilityAlgorithms)。该组织包含多个关于确定性和随机性仿生搜索算法的
    Python 代码库，以及智慧出行系统与服务中潜在用例的示例。


    ### 3.6.5 AI/ML 成功采用的关键因素


    成功采用 AI/ML 技术应考虑以下五个先决条件或关键要素：


    *   **统一战略：** 公司需要制定清晰统一的战略，以充分利用快速演变但充满挑战的 AI 和 ML 技术的全部潜力，并协调跨职能创新的高级研发工作。

    *   **AI 治理框架：** 用于解决负责任 AI 的重要方面，例如性能指标、网络安全、隐私、伦理、偏见、透明度、责任、法律与政策合规性以及可信赖性。

    *   **技术协议与指南：** 例如数据收集协议、安全验证与确认规范，以及部署、鲁棒性和 OTA（空中下载）更新流程。

    *   **基础设施与工具：** 公司还应提供充足的硬件基础设施和软件工具，用于数据处理、模型开发、超参数优化、模型加速与压缩、模型部署（云端或边缘部署）以及
    OTA 更新。

    *   **AI 文化与人才培养：** 最后但并非最不重要的一点是，传播 AI 文化、培养人才并持续教育他们了解这一快速发展领域的最新进展至关重要。我们需要充分理解当前
    AI 浪潮的优势和局限性，以免过度信任技术并在关键的安全相关项目中制造虚假论点。

