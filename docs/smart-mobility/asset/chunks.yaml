    and Naper, 2021). MaaS depends on the availability of fully functioning digital
    platforms able to manage traveler journeys from beginning to end allowing the
    travelers to seamlessly “mix and match” different personal and shared mobility
    modes such as e-bikes, robo taxis, small urban commuters/micro-commuters, autonomous
    shuttles, trains, planes, and other first- and last-mile transportation modes.
    This seamless mobility platform will help in increasing the availability, the
    affordability, the efficiency, and the sustainability of multimodal mobility systems.
    From the user perspective, MaaS is packaged as an app or another digital platform
    that provides services from public and private mobility providers. Users can pay
    for a trip using a mobility mode that fits their needs at a specific time and
    that takes them all the way to their desired destinations. These platforms should
    provide different mobile device–enabled services such multimodal mobility optimal
    and dynamic planning, one-click travel book-and-pay, dynamic pricing, rescheduling,
    real-time traffic and weather information, adaptive routing, smart parking, and
    so on. Mobile apps like Whim (Helsinki), UbiGo (Gothenburg), Qixxit (Germany),
    and Beeline (Singapore) are already allowing users to select and pay for a variety
    of transportation options. For example, the Whim app provides access to multimodal
    mobility services such as taxis, rental cars, public transport, and bike share.
    This app also learns users’ preferences and syncs with their calendars to intelligently
    suggest ways to get to an event (Goodall et al., 2017).


    Important


    According to MarketsandMarkets, the global Mobility-as-a-Service (MaaS) market
    size is projected to reach US $70.4 billion by 2030.


    From the mobility service provider’s perspective, the MaaS platform should endow
    the service provider with the ability to bundle services and easily share revenue.
    For example, the Siemens MaaS platform^([^(41)](#fn41)) enables bundling of mobility
    products for specific user groups and mobility needs. For instance, a professional
    bundle may include access to all public transport, 1000 minutes of premium parking,
    and 120 minutes of Limo service for 200 euros per month. A student bundle can
    include access to all public transport, unlimited bike sharing, and 2 days of
    car sharing for 80 euros per month. A family bundle may include a family access
    to all public transport, 500 minutes of city parking, 100 minutes of car sharing,
    and access to school buses for 130 euros a month.


    An optimal or most popular combination of MaaS services can be recommended or
    customized based on user information and behaviors such as profession, region
    of living, daily commute, and bundle usage. For example, in downtown regions,
    people may want a package with 50% public transit, 35% electric bike or electric
    scooter, and 15% vehicle traveling time, while in the outskirts of a city, users
    may want more vehicle traveling time and less micromobility time. Brokering travel
    with suppliers, repackaging, and reselling it as a bundled package are other distinguishing
    characteristics of MaaS (Sochor et al., 2015). Several features of the Uber software
    platform such as journey planning and trip management are offered in several cities
    as Software-as-a-Service (SaaS) as part of the ridehailing company’s broader strategy
    to push into public transit.^([^(42)](#fn42)) Moreover, Uber acquires Routematch^([^(43)](#fn43))
    to make public transport more accessible. The evolution and mass adoption of MaaS
    by consumers is central to the emergence of passenger economy (Lanctot et al.,
    2017). The role of MaaS in passenger economy is highlighted in Section 5.9.


    One of the main challenges of MaaS is to find a right balance between the interests
    of the service providers and the passengers. The service providers aim to maximize
    their profit and usually prefer to allocate more resources to busier areas during
    high-demand periods, while passengers expect responsive and affordable services
    anywhere and at any time. Another main challenge in MaaS is developing efficient
    models of coordination and collaboration between mobility service providers. This
    coordination addresses the interdependency management among the cooperative or
    competitive mobility service providers in order to achieve their goals. According
    to a study conducted at the University of Texas at Austin (Pandey et al., 2019),
    having several mobility service providers competing against each other could worsen
    the quality of service of a MaaS platform compared to having a more centralized
    platform that creates a level of cooperation and generates the optimal assignment
    based on limited information from all service providers.'
  trans: '

    不断演进的出行即服务（MaaS）解决方案将共享出行大规模扩展，涵盖公共交通、汽车共享、租车、出租车和公共自行车等服务。维也纳、赫尔辛基和汉诺威等城市已成为
    MaaS 解决方案的应用典范 (Polle and Naper, 2021)。MaaS 依赖于功能完善的数字平台，这些平台能够全程管理旅客行程，让旅客无缝"混搭"不同的个人与共享出行方式，例如电动自行车、机器人出租车、小型城市通勤车/微通勤车、自动驾驶接驳车、火车、飞机及其他第一英里和最后一英里交通方式。这种无缝出行平台有助于提升多模式交通系统的可用性、经济性、效率和可持续性。从用户角度来看，MaaS
    以应用程序或其他数字平台的形式呈现，整合了公共和私营出行服务商提供的服务。用户可按需选择适合特定时间点的出行方式支付行程费用，并直达目的地。这些平台应提供多种移动设备支持的服务，例如多模式出行的最优动态规划、一键预订支付、动态定价、行程调整、实时交通与天气信息、自适应路线规划、智能停车等。像`Whim`（赫尔辛基）、`UbiGo`（哥德堡）、`Qixxit`（德国）和`Beeline`（新加坡）这样的移动应用程序，已允许用户选择并支付多种交通方式。例如，`Whim`应用程序可提供出租车、租车、公共交通和共享单车等多模式出行服务。该应用还能学习用户偏好，并与日历同步，智能推荐前往活动的出行方式
    (Goodall et al., 2017)。


    ## 重要信息


    据 MarketsandMarkets 预测，到 2030 年，全球出行即服务（MaaS）市场规模将达到 704 亿美元。


    从出行服务提供商的角度来看，MaaS 平台应赋予服务商打包服务并便捷分账的能力。例如，西门子 MaaS 平台^(⁴¹)能够针对特定用户群体和出行需求打包出行产品。举例来说，"商务套餐"可能包含全部公共交通使用权、1000
    分钟高级停车时长以及 120 分钟豪华轿车服务，每月费用为 200 欧元。"学生套餐"可包含全部公共交通、不限次共享单车及 2 天汽车共享服务，每月费用为
    80 欧元。"家庭套餐"则可能涵盖全家公共交通、500 分钟市区停车、100 分钟汽车共享及校车服务，每月费用为 130 欧元。


    可以根据用户信息与行为（如职业、居住区域、日常通勤方式及套餐使用情况）推荐或定制最优或最受欢迎的 MaaS 服务组合。例如，在市中心区域，用户可能希望套餐中
    50%为公共交通，35%为电动自行车或电动滑板车，15%为汽车出行时间；而在城市郊区，用户可能更倾向于增加汽车出行时间并减少微出行时间。与供应商进行行程经纪、重新打包并将其作为捆绑套餐转售，是
    MaaS 的其他显著特征 (Sochor et al., 2015)。优步软件平台的若干功能（如行程规划和出行管理）已在多个城市作为软件即服务（SaaS）提供，这是该网约车公司进军公共交通领域的更广泛战略的一部分。^(⁴²)此外，优步收购了
    Routematch^(⁴³)，以使公共交通更加便捷。MaaS 的演进及其被消费者大规模采用，对于客运经济的兴起至关重要 (Lanctot et al.,
    2017)。MaaS 在客运经济中的作用将在第 5.9 节中重点阐述。


    MaaS 面临的主要挑战之一，是在服务商与乘客的利益之间找到恰当的平衡点。服务商以利润最大化为目标，通常倾向于在高峰时段将更多资源分配给繁忙区域，而乘客则期望在任何时间、任何地点都能获得响应迅速且价格合理的服务。MaaS
    的另一个主要挑战是开发出行服务商之间高效协调与协作的模型。这种协调旨在解决相互合作或竞争的出行服务商之间的相互依赖关系管理问题，以实现各自目标。根据德克萨斯大学奥斯汀分校的一项研究
    (Pandey et al., 2019)，与建立更集中化的平台（该平台可创造一定程度的合作，并基于所有服务商的有限信息生成最优分配方案）相比，多个出行服务商相互竞争可能会降低
    MaaS 平台的服务质量。

    '
- fmt: '## 5.5 Mobility on Demand (MOD)


    The US Department of Transportation defines mobility on demand (MOD) as an innovative
    transportation concept where consumers can access mobility, goods, and services
    on demand by dispatching or using shared mobility, courier services, aerial vehicles,
    and public transportation solutions and where passenger services such as trip
    planning and booking, real-time information, and fare payment are incorporated
    into a single user interface (Shaheen et al., 2017). MOD providers facilitate
    access to different mobility modes such as car sharing, bike sharing, scooter
    sharing, ridesharing, ridehailing/ridesourcing, transportation network companies
    (TNCs), micromobility, shuttle services, public transportation, and other emerging
    transportation solutions. Susan Shaheen and Adam Cohen highlight in (Shaheen and
    Cohen, 2020) the main differences between MOD and MaaS. MOD focuses on the commodification
    of passenger mobility and goods delivery and transportation system management,
    whereas MaaS primarily focuses on passenger mobility aggregation and subscription
    services. MOD is focused on providing a technology platform that allows customers
    to incorporate some level of on-demand option into their transit travel and potentially
    discover, book, and pay for modes using the same user interface (Kimley-Horn et
    al., 2019). A MOD system must be designed to respond to customer demands effectively
    (from the user’s perspective) and economically (from the operator’s perspective)
    (Mitchell et al., 2008). From user’s perspective, trip time (the sum of pickup
    latency, transit latency, and drop-off latency) should be minimized, trip cost
    should be minimized, and trip convenience and experience should be maximized.
    From the operator’s perspective, vehicle spatial distribution/allocation should
    be optimized (e.g., changing the vehicle distribution dynamically or vehicle self-organization
    in the case of autonomous vehicles in response to spatial and temporal distribution
    of the demand), a minimum number of vehicles should be deployed to serve a maximum
    number of customers, vehicle route should be optimized, and deadheading (miles
    driven with no passenger or payload) should be minimized, star rating should be
    maximized, and fraud/safety/dissemination acts should be avoided and prices should
    be strategically and dynamically determined to improve mobility node desirability.
    For example, studies show that dynamic pricing strategies of the operator impact
    the corresponding traveler choice behavior (Qiu et al., 2018). Dynamic pricing
    is widely studied in the revenue management literature (Talluri and Van Ryzin,
    2006) and is an important problem now in the area of shared mobility and mobility
    on demand. Mitchell et al. illustrate in (Mitchell et al. 2008) the effect of
    dynamic pricing on node desirability. This study reveals that the costs to users
    and the system latencies are two key factors in the success of mobility-on-demand
    systems. System latencies in this context represent the times needed to walk from
    a trip origin to a nearby stack and pick up a vehicle, to travel to a stack near
    the desired destination, and to drop off a vehicle and walk to the actual destination.
    According to this study, the availability of high-quality trip planning facilitates
    sophisticated, dynamic pricing and the use of pricing to manage demand.


    A TNC’s surge pricing model is an example of a dynamic pricing model that raises
    the rates when traffic is heavy and demand for ridesharing is high. Some riders
    can choose to pay, while some will choose to wait a few minutes to see if the
    rates go back down. The Uber surge pricing model multiplies time, distance, and
    base fares during its busy hours (e.g., this multiplier can be 1.5x or 2x), while
    the Lyft Prime Time pricing model uses percentages to mark up its Prime Time pricing
    (e.g., if the rate is boosted by 50%, a fare that would normally be $20 costs
    $30).


    ## 5.6 Seamless Integrated Mobility Systems (SIMS)


    The Canadian Urban Transit Association (CUTA) defines integrated urban mobility
    as “the ability for people to move easily from place to place according to their
    own needs.” Deloitte defines seamless integrated mobility as building a convenient,
    well-connected, inclusive, and fast transportation system in the city (Wolff et
    al., 2020). According to McKinsey, seamless mobility could be cleaner, more convenient,
    and more efficient than the status quo, accommodating up to 30% more traffic while
    cutting travel time by 10% (Hannon et al., 2019). The World Economic Forum defines
    seamless integrated mobility systems (SIMS) as a “system of systems” that moves
    people and goods more efficiently by creating interoperability across physical
    assets, digital technologies, and governance rules. As illustrated in Figure [5-3](#511013_1_En_5_Chapter.xhtml#Fig3),
    physical assets include different transportation modes, infrastructure, and energy/fuel
    networks.


    ![../images/511013_1_En_5_Chapter/511013_1_En_5_Fig3_HTML.png](images/511013_1_En_5_Chapter/511013_1_En_5_Fig3_HTML.png)


    Figure 5-3


    SIM System and Foundational Elements (World Economic Forum, 2018)


    The digital platform represents the core of SIMS and provides a holistic, real-time
    picture of mobility supply and demand as well as the conditions of the overall
    system (e.g., traffic, infrastructure, weather). This digital platform enables
    different services such as dynamic pricing, seamless billing, shared data exchanges
    and dynamic routing, and intermodal management. Last but not least, the governance
    structures, standards, and rules cover the regulatory part of SIMS.'
