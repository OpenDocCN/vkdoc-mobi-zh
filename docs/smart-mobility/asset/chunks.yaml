  trans: '

    ### 3.9 本章小结


    在本章中，我们讨论了现有及可能出现的智慧出行系统与服务所涉及的几个核心构建模块。所讨论的技术包括定位、导航与授时（PNT）、地理信息系统（GIS）、无线通信、移动云计算、区块链、物联网（IoT）、人工智能（AI）、机器人技术以及电气化。这些技术并非详尽无遗，应被视为能够成为智慧出行服务基础的技术范例。下一章将基于本章讨论的基础技术，介绍若干可用于智慧出行的潜在技术推动因素。


    脚注 1 2 3 4 5 6 7


    # 4. 智慧出行：技术推动因素


    渐进式与革命性的技术推动因素为改进现有流程、创造全新且有时具有颠覆性的商业模式与服务提供了可能。在智慧出行的背景下，这些技术可能包括智能基础设施、互联出行、自动化出行、电动出行、微出行、主动/慢行交通、包容性出行以及情境感知系统（CAS）。以下各节将对这些技术推动因素进行说明。


    ## 4.1 智能基础设施


    需要建设出行基础设施，以适应现有和新兴的个人及共享出行系统，并促进这些系统的有效管理。此类支持性基础设施的示例包括智能交通系统、智能交叉口、高质量的自行车基础设施（如自行车高速公路，又称自行车快线或超级自行车道）、智能停车、充电基础设施以及智能路面。本节将以智能交通系统、智能交叉口和智能路面为例，介绍作为智慧出行系统与服务技术推动因素所需的智能基础设施。


    智能交通系统（ITS）或道路远程信息处理是智慧出行系统正常运行和管理所需基础设施的重要组成部分。根据威廉姆斯销售合伙公司（WSP）的定义，ITS 是“应用于交通与运输管理系统中的前沿信息与通信技术的结合，旨在提升交通网络的安全性、效率和可持续性，减少交通拥堵并提升驾驶员体验。”^(¹⁵)
    ITS 的主要类别包括（French and Chen, 1999）：


    *   **先进的交通管理系统（ATMS）**：自适应交通信号控制、自动事件检测、区域交通控制、电子收费、排放检测等。

    *   **先进的公共交通系统（APTS）**：自动车辆定位、信号优先、智能卡收费、动态合乘等。

    *   **先进的出行者信息系统（ATIS）**：驾车者信息、动态路径引导、出行前规划、车载标识等。

    *   **先进的车辆安全系统（AVSS）**：智能巡航控制、碰撞预警、碰撞避免、夜视、队列行驶等。

    *   **商用车运营（CVO）**：动态称重或行驶中称重（WIM）、自动车辆分类、车队管理、国际边境通关等。


    根据欧盟委员会的资料，^(¹⁶) ITS 可以通过辅助系统和信息服务（如动态交通管理和导航系统的使用）来帮助减少拥堵。它还能通过自动呼叫紧急服务并传输事故现场的位置数据，从而大幅缩短紧急服务的响应时间，将道路死亡人数减少约
    5-10%，并减轻伤害程度，从而降低致死率和与交通相关的受伤率。ITS 还有潜力通过更好的需求管理（包括使用道路收费和准入管理）来减少 10-20% 的排放并节约能源。基于时间的动态行程定价和基于道路使用量的收费方案是新兴技术，旨在以最小化拥堵并最大化社会及环境效益的方式来控制基础设施的使用。多家公司正在提供“收费即服务”（TaaS）系统，以动态收取道路通行费。例如，Blissway
    的系统包括路线规划、车辆和乘客验证以及通行费支付。通行费根据节省的时间和车内乘客数量计算，如果实际节省的时间与预估不符，费用会相应更新。加拿大公司 IMS
    最近与交通政策制定者合作，在俄勒冈州、犹他州、华盛顿州和加利福尼亚州部署了基于使用量的收费方案。


    **重要提示：** 根据 Precedence Research 的数据，全球智能交通系统（ITS）市场规模预计到 2030 年将达到 478.9 亿美元，年复合增长率为
    6.3%。


    ITS 在城市出行中的一个重要组成部分是智能交叉口。智能交叉口的主要目标是保护行人、自行车骑行者等弱势道路使用者，尤其是在繁忙的交叉口和人口密集的城市区域。智能交叉口集成了不同类型的传感器、通信模块（例如
    DSRC 路侧单元或 C-V2X 微蜂窝）以及边缘端或云端的数据采集与处理模块。智能交叉口可以警示或防止左转车辆与从遮挡物后驶来的对向交通发生正面碰撞。智能交叉口也是实现联网、自动驾驶、共享和电动（CASE）车辆协同控制（如集群和队列行驶）的推动因素。例如，自动网络基本图（ANFD）被提出作为拥有智能交叉口的城市网络宏观层面建模工具（Amirgholy
    等人，2019）。


    智能路面有潜力彻底改变道路建设与融资方式。该技术将无线电连接的传感器嵌入道路中，以持续监测并报告路面状况的变化；在路基中安装双向 WiFi 发射器，为车辆及相邻商家/住宅提供增强型商业宽带服务；并在电动汽车行驶过程中为其充电，从而减少离路充电的必要（Careless,
    2017）。此外，智能路面可以向驾驶员或自动驾驶车辆提供连续的交通和路况信息，并可向当局通报事故及其他危险状况。据《丹佛邮报》报道，^(¹⁷) 科罗拉多州已宣布，它将成为美国第一个实施“智能路面”的城市，以此作为迎接自动驾驶车辆及能够识别并警告驾驶员前方危险路况和急转弯的传感器联动标准车辆到来的准备工作的一部分。

    '
- fmt: '## 4.2 Connected Mobility


    Connected mobility creates new data-rich environments and is an enabler for many
    applications and services that will make our roads safer, less congested, and
    more eco-friendly. Connected mobility is an enabler for features like real-time
    navigation and routing, traffic information, safety warnings, accident avoidance,
    advanced driver assistance systems (`ADAS`), and automated driving systems (`ADS`).
    Imagine, for instance, features that warn you before changing the land because
    of an upcoming car in your blind spot that may result in imminent crash; alert
    you to a hazard ahead such as an obstacle, crossing pedestrian/cyclist or stopped
    car, or work zone or icy road; provide remote diagnostics, trouble code notification,
    and repair services; deliver real-time updated information about traffic and point
    of interest such as a mall; help you find open parking spaces and gas/charging
    stations; and facilitate online shopping.


    The wide umbrella of connectivity is vehicle-to-anything (`V2X`) that secures
    sharing of information seamlessly between the vehicle and everything in the right
    format at the right time. Here, the concept of vehicle is extended to include
    any mobility platform used for transporting people or goods on land, sea, or air
    such as cars, trucks, bikes, e-scooters, air/river taxis, automated people movers,
    and so on. The connectivity forms include the following:


    * **Vehicle-to-Occupant (`V2O`)**: An occupant can be a driver or a passenger
    of a mobility platform. `V2O` enables features like `BLE/UWB`-enabled phone-as-a-key;
    in-vehicle connectivity services for work, play, and commerce; driving error recognition
    and prediction; and quantifying the quality of experience. `V2O` can be extended
    to include customer connectedness that includes not only direct human involvement
    with `WiFi`, `4G`, and now `5G` technology through various interface devices such
    as smartphones, gaming consoles, and augmented reality/virtual reality headsets
    but also the connected delivery of insight from a diversely growing number of
    things. For example, connected healthcare devices and personal wearables can tell
    occupants about the experiences they have with the vehicle and in the environment
    around them (Whitelock, 2019).


    * **Vehicle–to–Vulnerable Road User (`V2VRU`)**: `VRUs` include pedestrians and
    cyclists as well as motorcyclists and persons with disabilities or reduced mobility.
    `V2VRU` can be an enabler for `VRU` detection, localization, and crossing intention
    and motion behavior recognition.


    * **Vehicle-to-Vehicle (`V2V`)**: For applications like post-crash warning, pre-crash
    warning, cooperative collision warning, cooperative forward collision warning,
    lane change warning, vehicle-based road condition warning, visibility enhancer,
    wrong way driver warning, intersection movement assist, blind spot warning, communication
    relaying in case of emergency, smart cargo companions, last-mile delivery systems,
    cooperative adaptive cruise control, cooperative automation, fleet management
    systems, and self-organized autonomous vehicles. `V2V` allows all vehicles to
    move in a coordinated fashion, reducing stop-and-go congestion and emergency maneuvers
    (Hedlund and North, 2018). Different communication technologies have been proposed
    and implemented to facilitate vehicle-to-vehicle (`V2V`) communication, sensor
    data sharing, cooperative perception, and safety applications (Edison, 2019; Higuchi
    et al., 2019; Thota et al., 2019).


    * **Vehicle-to-Environment (`V2E`)**: For applications such as road condition
    monitoring, traffic sign and light recognition, driving risk prediction, and perimeter
    monitoring systems. Slow and near-real-time infrastructure and environmental sensing
    can be also achieved by connected vehicles. Slow-changing infrastructure sensing
    includes, but is not limited to, road roughness or estimation of the International
    Roughness Index, bank angle, lane marking quality, potholes, speed bumps, and
    so on (Nguyen et al., 2019). Examples of near-real-time infrastructure sensing
    conditions include snow coverage, dust coverage, oil spill detection, and so on.


    * **Vehicle-to-Infrastructure (`V2I`)**: For road condition warning, `SOS` services,
    work zone warning, emergency vehicle signal preemption, intersection collision
    warning, in-vehicle `AMBER` alert, remote diagnostics and repair, pedestrian crossing
    information, red light warning, pedestrian detection and warning, bicycle detection
    and warning, no left-hand turn warning, traffic condition monitoring, weather
    condition, traffic light management system, interaction management system, parking
    management system, and teleoperation in case of malfunctioning self-driving cars.
    For example, GM’s `OnStar` services provide automatic collision notification,
    `SOS` emergency assistance, enhanced roadside assistance, monthly vehicle health
    report, automatic diagnostic trouble code notification, service link, maintenance
    reminder, driving information, and on-demand diagnostics.


    * **Vehicle-to-Network (`V2N`)**: For disabled roadside vehicle warning, security
    credential management system, multimodel mobility systems, dynamic on-demand mobility
    systems and services, cloud-based crowdsensing services, real-time traffic monitoring,
    and bringing attractive consumer experiences into the cabin to foster brand loyalty.


    Figure [4-1](#511013_1_En_4_Chapter.xhtml#Fig1) illustrates how different forms
    of connectivity such as `V2VRU`, `V2V`, and `V2I` can play a role in a post-crash
    safety warning scenario using `DSRC` and `C-V2X` wireless communication technologies.
    In this scenario, a vehicle ahead of the way is able to notify other vehicles
    about incidents that lie ahead or an alarming situation such as emergency electronic
    brake light ahead warning or forward collision avoidance (Peng et al., 2019).


    ![../images/511013_1_En_4_Chapter/511013_1_En_4_Fig1_HTML.png](images/511013_1_En_4_Chapter/511013_1_En_4_Fig1_HTML.png)


    Figure 4-1


    Post-Crash Safety Warning Scenario


    As mentioned in the previous chapter, the `FCC` has ruled new regulations in November
    2020 to reallocate the 5.850–5.925 GHz (i.e., 5.9 GHz) spectrum band dedicated
    for `DSRC` standard operations since 1999. The spectrum reallocation announced
    by the `FCC` comes as a drastic measure toward the slow deployment of the `DSRC`
    technology. The existing 75 MHz safety spectrum will be subdivided into two bandwidth
    allocations. The upper band 30 MHz ranging from 5.850 to 5.925 GHz will no longer
    support `DSRC` and will be instead reassigned to advance and speed up the deployment
    of cellular vehicle-to-everything (`C-V2X`) technology.


    ## 4.3 Automated Mobility


    The `WHO` considered human error as the single largest cause of all collisions
    today and a major factor in more than 90% of fatal crashes (World Health Organization,
    2018). Automated mobility aims at eliminating or reducing these injuries and fatalities,
    improving access to mobility for those who currently cannot drive due to age or
    disability, and creating new business models such as passenger economy.'
