    '
- fmt: '*   **Problem Characterization**: The first step in creating successful data-driven
    models is to understand the problem at hand, characterize it, and elicit all the
    required knowledge from a domain expert to help in collecting the relevant data
    and understanding the target requirements. The importance and the business value
    of the problem and its challenging aspects need to be understood. Different relevant
    independent variables and dependent variables need to be clearly identified by
    the domain expert. Independent variables include signals, control factors, and
    noise factors, while dependent variables represent the model response (Khamis,
    2019b). Signals are stimuli required for fulfilling the model functionality. Edge/corner
    cases and adversarial cases should be also identified.


    *   **Data Collection**: There is no magic formula to give the required volume
    of data. However, it is important to collect comprehensive unbiased data considering
    different control factors, noise factors, edge cases, and adversarial cases.


    *   **Data Preprocessing**: Data should be preprocessed to deal with different
    imperfection aspects and to extract features with high discrimination power.


    *   **Modeling**: There is no universally superior ML algorithm according to the
    no free lunch theorem for machine learning. Statistical machine learning algorithms
    work under different underlying assumptions like the data is separable or the
    data has a specific distribution or the data is balanced or there is no spatial
    and/or temporal dependency between the data and so on.


    *   **Optimization**: Most model parameters such as weights in neural networks
    can be directly estimated from the data. However, model hyperparameters such as
    the number of estimators in random forest or deep learning architecture cannot
    be easily tuned and are often specified by the practitioner or by using heuristics.


    *   **Evaluation**: Different quantitative and/or qualitative evaluation metrics
    should be used to prove the efficacy of the trained model and evaluate and mitigate
    its bias and variance. Sometimes the best trade-off should be considered to match
    with certain constraints related to computational resources, memory footprint,
    or power consumption.


    *   **Verification and Validation**: Model verification and validation is a serious
    legal mandate in a highly regulated industry like transportation and especially
    important in safety-critical features. Both performance and robustness should
    be verified and validated to measure the ability of the learning algorithm to
    handle changes in the underlying training dataset and to understand how the trained
    model behaves with inputs with and without perturbations.


    *   **Learning Over Time and Adaptation**: In real smart mobility applications,
    data continuously evolve over time and change from one setting to another. This
    violates the assumption that training and test data have identical distributions.
    The actual settings that cause the generation of non-stationary data are typically:
    (1) sample selection bias, which is a systematic flaw in the selection process
    of data used for model building, (2) adversarial behaviors that try to work around
    the existing learned models, (3) time-evolving data, which is characterized as
    changing concepts along the time and (4) cross-dataset tasks where the training
    and testing samples are taken from different domains. Endowing the model with
    the ability to learn over time and to get updated in order to handle the data
    mismatch between training and inference in nonstationary environments is still
    a challenging task for data-driven models deployed in vehicles. Even if we manage
    to develop ML models able to learn over time with domain adaptation capability,
    the mismatch between the software life cycle and hardware life cycle will remain
    a challenge. AI is doubling its compute every 3.5 months, while updating hardware
    is slower (18 months according to Moore’s law), more expensive, and sometimes
    not possible especially in the case of mobility vehicles or telematics systems.


    *   **Model Predictability and Interpretability**: Model unpredictability and
    the lack of the ability to interpret the results of the model are common problems
    of black box, discriminative, or data-driven models. Some ML models are like people,
    unpredictable and sometimes uninterpretable. Models trained using human behavior–based
    data as independent variables are more likely unpredictable compared to those
    trained using independent variables that strictly follow physics laws. For example,
    the human intent recognition model is less predictable compared to a model that
    predicts the stress-stain curve of a material. Model unpredictability is a serious
    issue in safety-related applications. These applications favor deterministic models.
    Nonlinear and nonmonotonic models are the most difficult to interpret (Patrick
    Hall and Phan, 2017). Monotonicity means that the relationship between the independent
    variables and the machine-learned response only changes in one direction making
    the model highly interpretable compared to nonmonotonic models.


    Among the aforementioned challenges, data collection is discussed here in more
    detail. As mentioned previously, there is no magic formula to give the required
    volume of data. This volume depends on many factors, such as the complexity of
    the problem and the complexity of the learning algorithm, and directly impacts
    the learnability and the performance of the algorithm. Different relevant signals,
    control factors, and noise factors should be incorporated. Batch, near-real-time,
    or real-time data may be collected depending on the type of data analytics. It
    is also highly recommendable to include adversarial data as noise factors in order
    to improve the robustness of the model. As no one has infinite resources and infinite
    time to collect fully comprehensive data, most relevant representative data should
    be collected. For example, Figure [3-9](#511013_1_En_3_Chapter.xhtml#Fig9) illustrates
    the Parameter diagram or P-diagram of a vision-based distracted driver detection
    model. In this diagram, the signal is mainly the driver picture taken by a precalibrated
    camera in the car. Control factors are design parameters that are changeable only
    during the data collection process and must be kept constant once the model is
    deployed. Control factors may include camera pan, zoom, focus, sampling rate,
    color mode, and so on. Noise factors influence the design and can be controllable
    during the data collection process, but these are not controllable after deploying
    the model.'
