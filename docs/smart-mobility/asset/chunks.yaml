    \ cooperative mapping, and autonomous garbage collection\n\n*   **Community Sensing\
    \ Apps**: Such as traffic monitoring and pollution monitoring\n\n*   **Opportunistic\
    \ Sensing Apps**: With no user interaction where the sensing activity can last\
    \ for a long term but the results depend on a stable sensing environment without\
    \ much disturbance\n\n*   **Participatory Sensing Apps**: Where users have to\
    \ be persuaded to take part in the sensing, with the incentives being money, common\
    \ interest, and responsibility\n\n## 3.4 Blockchain\n\nThe concept of distributed\
    \ computing has been around since 1990. Blockchain was invented in 2009 to serve\
    \ as the public transaction ledger of the cryptocurrency Bitcoin (Staff, 2016).\
    \ Satoshi Nakamoto created Bitcoin and introduced the concept of a blockchain\
    \ to create a decentralized ledger maintained by an anonymous consensus as the\
    \ first blockchain database. The deployment of cryptocurrency in applications\
    \ related to cash started in 2011, followed by introducing currency transfer and\
    \ digital payment systems in 2012\\. Smart contracts started to evolve in 2014,\
    \ and permissioned blockchain network solutions appeared in 2015. Starting from\
    \ 2016, blockchain starts to penetrate in different industries.\n\nBased on a\
    \ peer-to-peer (P2P) topology , blockchain is a distributed ledger technology\
    \ (DLT) that provides a credible and transparent environment that allows data\
    \ to be stored globally on thousands of servers and facilitates access to this\
    \ data (Mearian, 2019). Blockchain is a distributed database of records or a public\
    \ ledger of all transactions or digital events that have been executed and shared\
    \ among participating parties (Crosby et al., 2016). A ledger is essentially a\
    \ database of transactions. This technology is a new organizing paradigm for the\
    \ discovery, valuation, and transfer of all quanta (discrete units) of an asset.\
    \ This asset can be hard assets (physical property, homes, cars) or intangible\
    \ assets (votes, ideas, reputation, intention, health data, information, etc.)\
    \ (Swan, 2015). In the context of smart mobility, physical assets can be mobility\
    \ platforms like cars, bikes, scooters, public transit, automated people movers,\
    \ or hyperloops. Digital assets can be an access code to a shared vehicle or a\
    \ smart locker or a digital twin of a smart mobility platform or any other physical\
