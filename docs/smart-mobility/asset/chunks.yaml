- fmt: "# 3.3 Mobile Computing\n\nMobile computing is the set of information technologies,\
    \ products, services, and operational strategies and procedures that enable authorized\
    \ end users and mobile assets to gain access to data, information, and computation\
    \ from wherever they are. Based on the proximity of data sources, storage, and\
    \ computational units, mobile computing can be classified into mobile cloud computing\
    \ (`MCC`), mobile fog computing (`MFC`), and mobile edge computing (`MEC`) (see\
    \ Figure [3-3](#511013_1_En_3_Chapter.xhtml#Fig3)).\n\nMobile cloud computing\
    \ (`MCC`) is defined as\n\n> *a rich mobile computing technology that leverages\
    \ unified elastic resources of varied clouds (private or public) and network technologies\
    \ toward unrestricted functionality, storage, and mobility to serve a multitude\
    \ of mobile devices anywhere, anytime through the channel of Ethernet or Internet\
    \ regardless of heterogeneous environments and platforms based on the pay-as-you-use\
    \ principle.*\n> \n> —Sanaei et al., 2013\n\n`MCC` as the combination of cloud\
    \ computing and mobile computing is being embraced by researchers and practitioners\
    \ as an exciting new way to extend the capabilities of mobile devices and mobile\
    \ platforms, which has the potential for profound impacts on the business environment\
    \ and people’s daily life (Leung et al., 2013).\n\nMobile fog computing (`MFC`)\
    \ (An et al., 2018) and mobile edge computing (`MEC`) (Li et al., 2016) are two\
    \ emerging paradigms used to solve some issues in cloud computing related to latency,\
    \ bandwidth, privacy, and security. Both `MFC` and `MEC` bring computation and\
    \ storage closer to where the data is generated enabling mobile users/mobility\
    \ platforms to offload partial or complete computation-intensive and time-constraint\
    \ tasks to nearby or local servers for computing. This allows ultralow latency,\
    \ better bandwidth utilization, faster insights and actions, and higher scalability\
    \ as a result of reducing the data to be sent to centralized data centers or to\
    \ the cloud and performing the computation on fog or on edge. Privacy and security\
    \ are additional benefits of `MFC` and `MEC` in the context of smart mobility\
    \ where `MFC` can be used to manage a fleet of autonomous vehicles in a certain\
    \ geo-fenced area and `MEC` can be used to run AI-based modules in each vehicle\
    \ for perception, planning, control, learning, and adaptation. Figure [3-3](#511013_1_En_3_Chapter.xhtml#Fig3)\
    \ illustrates an example in the context of machine learning–based service deployment.\n\
    \n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig3_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig3_HTML.png)\n\
    \n**Figure 3-3** Mobile Computing Deployment Architectures\n\n> **Note** The advent\
    \ of ubiquitous mobile computing technologies has catalyzed changes in the transportation\
    \ industry.\n\nMobile computing is a foundational technology behind several disruptive\
    \ mobility services such as app-based transportation network companies (`TNCs`),\
    \ Anything-as-a-Service (`XaaS`), Mobility-as-a-Service (`MaaS`), Vehicle-as-a-Service\
    \ (`VaaS`), click and collect last-mile delivery service, and mobile cloud sensing.\
    \ For example, several mobile cloud sensing applications can be developed based\
    \ on mobile computing such as the following (Han et al., 2015):\n\n* **Individual\
    \ Sensing Apps**: Such as self-exercise management and daily activity recording\
    \ for active mobility\n* **Group Sensing Apps**: Such as road condition monitoring,\
    \ cooperative mapping, and autonomous garbage collection\n* **Community Sensing\
    \ Apps**: Such as traffic monitoring and pollution monitoring\n* **Opportunistic\
    \ Sensing Apps**: With no user interaction where the sensing activity can last\
    \ for a long term but the results depend on a stable sensing environment without\
    \ much disturbance\n* **Participatory Sensing Apps**: Where users have to be persuaded\
    \ to take part in the sensing, with the incentives being money, common interest,\
    \ and responsibility\n\n# 3.4 Blockchain\n\nThe concept of distributed computing\
    \ has been around since 1990. Blockchain was invented in 2009 to serve as the\
    \ public transaction ledger of the cryptocurrency Bitcoin (Staff, 2016). Satoshi\
    \ Nakamoto created Bitcoin and introduced the concept of a blockchain to create\
    \ a decentralized ledger maintained by an anonymous consensus as the first blockchain\
    \ database. The deployment of cryptocurrency in applications related to cash started\
    \ in 2011, followed by introducing currency transfer and digital payment systems\
    \ in 2012. Smart contracts started to evolve in 2014, and permissioned blockchain\
    \ network solutions appeared in 2015. Starting from 2016, blockchain starts to\
    \ penetrate in different industries.\n\nBased on a peer-to-peer (`P2P`) topology,\
    \ blockchain is a distributed ledger technology (`DLT`) that provides a credible\
    \ and transparent environment that allows data to be stored globally on thousands\
    \ of servers and facilitates access to this data (Mearian, 2019). Blockchain is\
    \ a distributed database of records or a public ledger of all transactions or\
    \ digital events that have been executed and shared among participating parties\
    \ (Crosby et al., 2016). A ledger is essentially a database of transactions. This\
    \ technology is a new organizing paradigm for the discovery, valuation, and transfer\
    \ of all quanta (discrete units) of an asset. This asset can be hard assets (physical\
    \ property, homes, cars) or intangible assets (votes, ideas, reputation, intention,\
    \ health data, information, etc.) (Swan, 2015). In the context of smart mobility,\
    \ physical assets can be mobility platforms like cars, bikes, scooters, public\
    \ transit, automated people movers, or hyperloops. Digital assets can be an access\
    \ code to a shared vehicle or a smart locker or a digital twin of a smart mobility\
    \ platform or any other physical objects such as a spare part or a charging station.\
    \ These assets can be registered with a unique identifier and tracked, controlled,\
    \ and exchanged on the blockchain. Data transparency, security, asset management,\
    \ and smart contracts are listed as key and differentiating features of blockchain\
    \ technology (Heutger et al., 2018):\n\n* **Data Transparency**: Blockchain technology\
    \ includes mechanisms to ensure stored records are accurate, tamper-evident, and\
    \ from a verifiable source.\n* **Security**: Individual transactions and messages\
    \ are cryptographically signed. This ensures essential security and effective\
    \ risk management to tackle today’s high risks of hacking, data manipulation,\
    \ and data compromise.\n* **Asset Management**: The ownership of digital assets\
    \ is managed, and asset transfers are facilitated.\n* **Smart Contracts**: A smart\
    \ contract is a component of a blockchain-based system that can automatically\
    \ enforce stakeholder-agreed rules and process steps. Once launched, smart contracts\
    \ are fully autonomous; when contract conditions are met, prespecified and agreed\
    \ actions occur automatically. These smart contracts can accelerate processes,\
    \ allowing for fast and secure payments in digital assets, automated leasing,\
    \ financing, maintenance, and other procedures. For example, in the context of\
    \ last-mile delivery, once payment is received, the delivery of the product is\
    \ automatically triggered, or once the freight is received, payment is automatically\
    \ triggered.\n\nTable [3-1](#511013_1_En_3_Chapter.xhtml#Tab1) shows different\
    \ types of blockchain technologies and gives some examples of applications in\
    \ the smart mobility domain. Blockchain can be classified based on the governance\
    \ models into public permissionless (e.g., Bitcoin, Ethereum, and IOTA), public\
    \ permissioned (e.g., Sovrin and IPDB), private permissionless (e.g., Hyperledger\
    \ Sawtooth in a permissionless mode), and private permissioned (e.g., Hyperledger\
    \ Fabric, Hyperledger Sawtooth, Hyperledger Iroha, R3 Corda, and CULedger)."
  raw: "## 3.3 Mobile Computing\n\nMobile computing is the set of information technologies,\
    \ products, services, and operational strategies and procedures that enable authorized\
    \ end users and mobile assets to gain access to data, information, and computation\
    \ from wherever they are. Based on the proximity of data sources, storage, and\
    \ computational units, mobile computing can be classified into mobile cloud computing (MCC),\
    \ mobile fog computing (MFC), and mobile edge computing (MEC) (see Figure [3-3](#511013_1_En_3_Chapter.xhtml#Fig3)).\n\
    \nMobile cloud computing (MCC) is defined as\n\n> *a rich mobile computing technology\
    \ that leverages unified elastic resources of varied clouds (private or public)\
    \ and network technologies toward unrestricted functionality, storage, and mobility\
    \ to serve a multitude of mobile devices anywhere, anytime through the channel\
    \ of Ethernet or Internet regardless of heterogeneous environments and platforms\
    \ based on the pay-as-you-use principle.*\n> \n> —Sanaei et al., 2013\n\nMCC as\
    \ the combination of cloud computing and mobile computing is being embraced by\
    \ researchers and practitioners as an exciting new way to extend the capabilities\
    \ of mobile devices and mobile platforms, which has the potential for profound\
    \ impacts on the business environment and people’s daily life (Leung et al., 2013).\n\
    \nMobile fog computing (MFC) (An et al., 2018) and mobile edge computing (MEC)\
    \ (Li et al., 2016) are two emerging paradigms used to solve some issues in cloud\
    \ computing related to latency, bandwidth, privacy, and security. Both MFC and\
    \ MEC bring computation and storage closer to where the data is generated enabling\
    \ mobile users/mobility platforms to offload partial or complete computation-intensive\
    \ and time-constraint tasks to nearby or local servers for computing. This allows\
    \ ultralow latency, better bandwidth utilization, faster insights and actions,\
    \ and higher scalability as a result of reducing the data to be sent to centralized\
    \ data centers or to the cloud and performing the computation on fog or on edge.\
    \ Privacy and security are additional benefits of MFC and MEC in the context of\
    \ smart mobility where MFC can be used to manage a fleet of autonomous vehicles\
    \ in a certain geo-fenced area and MEC can be used to run AI-based modules in\
    \ each vehicle for perception, planning, control, learning, and adaptation. Figure\
    \ [3-3](#511013_1_En_3_Chapter.xhtml#Fig3) illustrates an example in the context\
    \ of machine learning–based service deployment.\n\n![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig3_HTML.png](images/511013_1_En_3_Chapter/511013_1_En_3_Fig3_HTML.png)\n\
    \nFigure 3-3\n\nMobile Computing Deployment Architectures\n\nNote\n\nThe advent\
    \ of ubiquitous mobile computing technologies has catalyzed changes in the transportation\
