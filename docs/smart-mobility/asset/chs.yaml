  ### 线城：一座愿景中的智慧城市


  `The Line` 于 2021 年 1 月揭晓，计划作为 `Neom` 的一部分进行建设，这是一座完全可持续的智慧城市，`Neom` 是位于沙特阿拉伯西北部塔布克省的一个规划的跨境城市。`Neom`
  于 2017 年宣布，是沙特阿拉伯“2030 愿景”计划的一部分，旨在实现经济多元化，减少对石油的依赖。`The Line` 是一座长达 100 英里的线性城市，没有汽车或街道，居民所需的一切都可在五分钟步行范围内到达。这座特大城市的愿景是为
  100 万人口打造零能耗的步行社区。`The Line` 的灵感来源于保罗·索莱里的“线性城市”概念（Soleri 等人，2012 年），即以步行为基础的社区围绕线性的地方和区域交通系统进行布局。




  ## 1.3 智慧出行：实现可持续发展的关键推动力


  近年来，智慧出行系统和服务因其在应对当前以汽车为中心的世界中传统汽车技术所带来的负面影响（如安全问题、拥堵问题和环境问题）方面具有的预见性优势，而受到主要汽车制造商、供应商、学术界和政府机构的日益关注。通用汽车正在引领一个零事故、零排放、零拥堵的未来（通用汽车，2018）。这一愿景的主要目标概括如下：


  - **零事故，挽救生命：** 先进的驾驶员辅助系统（`ADAS`）和自动驾驶汽车将减少伤亡，并为那些因年龄、残疾或其他原因目前无法驾驶的人提供出行便利。

  - **零排放，为后代留下更健康的地球：** 传统内燃机（`ICE`）汽车每年向大气中排放近 20 亿吨二氧化碳。电动汽车（`EVs`）将消除这些排放，助力改善环境。2021
  年初，通用汽车宣布计划到 2040 年在其全球产品和运营中实现碳中和。作为该计划的一部分，该公司将在 2025 年前在全球推出 30 款新电动汽车。

  - **零拥堵，将宝贵时间还给客户：** 在美国，通勤者每年平均花费约一周时间堵在路上。这一周时间本可以陪伴亲人、做自己想做的事、去自己想去的地方。共享出行将更好地利用时间和空间，从而减少拥堵。


  与联合国会员国通过的 17 项可持续发展目标（`SDGs`）相一致，智慧出行可以在实现其中许多目标方面发挥重要作用。“人人享有可持续出行”（`SuM4All`¹）倡议是一个旨在实现可持续出行并帮助落实`SDGs`的全球合作伙伴关系。为了转型交通运输部门，`SuM4All`开发了一个全球追踪框架（`GTF`），作为对`SDGs`中指标和目标的补充。这一全球框架在《全球出行报告》（`SuM4All`，2017）中得到了重点介绍，该报告首次对全球所有交通方式进行了评估。`GTF`为交通政策和投资决策提供了关键信息与工具，并为衡量可持续出行的进展提供了基线。根据`SuM4All`发布的《全球出行报告》，`SDGs`
  3 和 11 是与出行直接相关的两个主要目标。`SDG`3 关注“良好健康与福祉”，其中的目标 3.6 涉及减少全球交通事故死亡和受伤人数。该`SDG`目标 3.6
  为道路安全设定了一个量化目标：到 2020 年，将全球道路交通伤亡人数减半。`SDG`11 涉及“可持续城市和社区”，其中的目标 11.2 强调为所有人提供安全、可负担、便捷和可持续的交通系统。该报告阐述了可持续交通系统对于保障粮食安全（`SDG`2：零饥饿）、医疗保健（`SDG`3：良好健康与福祉）、入学机会（`SDG`4：优质教育）以及妇女就业（`SDG`5：性别平等）的重要性。


  目前已有若干指数被提出，用于帮助城市领导者评估和提升出行系统质量。例如，HERE Technologies 城市出行指数²是一个综合指数，它评估了全球城市如何应对出行方面的挑战，涵盖四大主题：可持续性、连通性、可负担性和创新性。可持续性体现了将低碳出行作为改善健康和生活质量的一种方式。连通性衡量了信息和通信基础设施（如智能交通系统）的可用性，以更好地管理交通并提升公共交通效率。可负担的出行改变了城市的运行模式，促进人员流动，激发经济潜力，并提升社会福祉。创新性则反映了城市如何通过创新解决方案来应对不断变化的出行需求。德勤城市出行指数（`DCMI`）³是另一个用于衡量出行系统健康状况以及城市为迎接未来所做准备的指数。该指数评估了三大主题：绩效与韧性（拥堵、可靠性、安全性、一体化出行及出行方式多样性）、愿景与领导力（愿景与战略、投资、创新、监管环境、环境可持续倡议）以及服务与包容性（公共交通密度、可负担性、空气质量、客户满意度及可达性）。类似地，城市出行创新指数（`UMii`）⁴基于对三个主要方面的评估，提供了关于城市出行与创新的洞察：准备度（战略、能力与稳健性）、部署（法规、投资与参与度）和宜居性（连通性、福祉与环境）。Arthur
  D. Little 的城市出行指数 3.0 是另一个使用 27 个指标评估不同城市出行成熟度、创新性和绩效的指数（Van Audenhove 等人，2018）。


  ## 1.4 总结


  智慧出行是定义智慧城市并维持其可持续性的主要支柱之一，它是应对持续增长的世界城市化及其对公共健康、拥堵和加速的全球气候变化的预期影响的一种方式。出行现在被看作是一种带有实体交通产品的信息服务，而非带有附加服务的交通产品（Ho
  and Bright，2018）。这体现在我们如今使用的各种智慧出行服务中，例如共享出行服务、出行即服务（`MaaS`）、按需出行以及最后一英里配送服务等等。然而，智慧出行系统及其可持续性的广泛部署和社会接受度，不仅取决于技术领域的进步，还取决于治理政策、法规和法律的可用性，以及城市为适应这些新兴且不断演变的出行系统和服务的需求而进行的适当规划/再规划。下一章将提供关于智慧出行的更多细节。


