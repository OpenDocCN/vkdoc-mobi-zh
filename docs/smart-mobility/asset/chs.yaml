- "# 排版后文本\n\n欧洲新车安全评鉴协会（`Euro NCAP`）^(⁶)常用于评估汽车安全性能。预期功能安全（`SOTIF` 或 `ISO/PAS 21448`）（ISO,\
  \ 2019）旨在应对辅助驾驶和自动驾驶车辆软件开发者面临的新型安全挑战。`SOTIF` 解决了传感器、算法和执行器在性能上的局限性，并为设计、验证与确认措施提供指导。多项功能可能应用\
  \ `SOTIF`，例如纵向控制、横向辅助、变道、脱手驾驶、自动泊车和自动召唤。恶劣天气条件也对自动驾驶车辆构成多重挑战：积雪和雨水会遮挡并干扰传感器，掩盖道路标线，并改变车辆行驶表现。`SOTIF`\
  \ 的最终目标是限制自动驾驶系统（`ADS`）可能出现的未知不安全状态数量。\n\n此外，欧盟航空安全局（`EASA`）（Cluzeau 等，2020）制定了神经网络设计保证概念（`CoDANN`），作为验证与确认安全关键型应用数据驱动模型的方法。有关\
  \ SAE 3–4 级自动驾驶（有条件/高度自动化）验证与确认方法的更多信息，读者可参阅由奥迪、百度、宝马、英特尔、戴姆勒和大众等 11 家汽车及自动驾驶行业主要利益相关方联合发布的《自动驾驶安全优先（`SaFAD`）》白皮书（Wood\
  \ 等，2019）。世界经济论坛（`WEF`）发起的“安全驾驶倡议（`SafeDI`）”旨在弥合行业在自动驾驶汽车安全方面的专业知识与监管机构制定保障自动驾驶部署政策的意愿之间的差距（世界经济论坛（`WEF`），2020）。Autonomous\
  \ 与 `WEF` 联合发布的《自动驾驶治理生态系统报告》（世界经济论坛（`WEF`），2021）重点介绍了可供行业决策者参考的各类自动驾驶相关联盟、协会、标准制定组织与合作伙伴关系。Autonomous^(⁷)\
  \ 全球社区定期发布针对汽车及自动驾驶出行行业决策者的各类倡议与联盟最新信息。\n\n智能出行技术（如自动驾驶系统（`ADSs`））的责任问题仍不确定且未完全明确。应讨论不同形式的责任，例如车主责任、制造商/供应商责任、保险公司责任以及智能交通系统（`ITS`）责任。若自动驾驶车辆未投保，车主需对任何事故负责。若产品出现缺陷，生产者、自有品牌商及缺陷产品进口商将承担民事责任。保险公司则根据保险条款与条件直接承担赔偿责任。如果事故是由基础设施故障导致，`ITS`\
  \ 所有者与管理者也可能需要承担责任。\n\n总体而言，自动驾驶汽车的法律环境仍在不断发展。近年来，多个国家已启动针对自动驾驶系统的监管与立法行动，例如美国的《H.R.3388——自动驾驶法案》、英国的《自动驾驶车辆试验行为准则》、德国的《自动驾驶车辆法案》、法国的自动驾驶汽车立法框架，以及欧盟的《自主产品安全评估标准（`UL-4600`）》。例如，《自动驾驶法案》禁止各州禁止自动驾驶车辆上路，允许企业首批\
  \ 10 万辆汽车豁免现有安全标准，并要求制造商制定抵御数字车辆网络攻击的计划。德国近期批准了全球首个将自动驾驶车辆纳入常规交通的法律框架。该法案将修改交通法规，允许到\
  \ 2022 年实现无人驾驶车辆在公共道路行驶，为企业大规模部署自动驾驶出租车和配送服务铺平道路。根据 `NHTSA`（美国国家公路交通安全管理局等机构，2017）的观点，公众对\
  \ `ADSs` 发展的信任与信心可能推动或阻碍其在公共道路上的测试与部署。这一结论同样适用于其他颠覆性智能出行系统与服务，例如空中出租车和自主货船。例如，快速发展的人员与货物运输城市空中交通（`UAM`）平台需要建立监管环境，以解决安全、隐私、噪音污染、视觉干扰、野生动物影响等不同方面的问题，并需符合各类民航标准与推荐规范，如\
  \ `ICAO SARPs`、`FAA FARs`、`JAA`、`EASA` 等。美国联邦航空管理局（`FAA`）现已距离备受期待的“无人机系统交通管理（`UTM`）”生态更近一步。`UTM`\
  \ 将明确低空非受控无人机运行管理的服务、角色与责任、信息架构、数据交换协议、软件功能、基础设施及性能要求。`UTM` 是与 `FAA` 的空中交通管理（`ATM`）系统相互独立但互为补充的框架。改变海事法律法规仍是适应自主船舶用于人员出行和货物交付的挑战。尽管国家水域的法规调整较快，但修改国际法规以支持自主船舶进入国际水域尚需时日，需解决安全、安保及责任等多个方面。支持（有时也阻碍）智能出行解决方案（共享、自动化、电动、集成）发展与实施的管理与监管流程在（Finger\
  \ 和 Audouin, 2018）一文中有重点阐述。\n\n\n\n## 2.2 城市规划\n\n正如 20 世纪初第一批汽车的到来从根本上改变了我们的社会一样，智能出行系统也将引发城市规划领域的渐进式变革与颠覆性革命。这些变化包括但不限于以下方面：\n\
  \n- 重新规划交通走廊和城市街道，以容纳更多行人、自行车骑行者、共享交通工具使用者，并减少私家车数量\n- 设置步行路线和自行车道，倡导主动、温和且包容的出行方式\n\
  - 建设自行车高速公路（亦称自行车快速路或超级高速路），提供交叉口停靠点少、通行顺畅的直达路线\n- 在城市中为自动驾驶汽车设立紧急安全点，以备需要远程或现场人工干预时使用\n\
  - 在高速公路沿线设置港湾式停车区，用于应对自动驾驶车辆故障或突发道路事件\n- 升级城市基础设施，实时提供交通状况、交通事故/事件、可能影响交通的社会/体育活动、施工区域以及道路工程临时变更（如道路封闭和车道变更）等信息。安全关键信息可通过基础设施传感器收集并传输至网联车辆\n\
  - 安装互联出行基础设施，例如`ITS`（智能交通系统）、智能交叉口和智能路面\n- 设置高度醒目且清晰可辨的标志标线，如人行横道（例如斑马线、信号灯控制式行人过街）、学校区域、铁路道口、让行标志、道路边缘、弯道、限速和停车标志等，以适应辅助驾驶与自动驾驶车辆。在此背景下，欧盟成员国正研究统一安全关键道路标志，以辅助辅助驾驶和自动驾驶车辆识别\n\
  - 用数字化互联交通标志替代传统道路标牌，以解决可能影响自动驾驶系统运行的道路基础设施老化等问题\n- 创建新型无信号控制人行横道，避免\"行人过街博弈\"现象\n\
  - 升级速度管理工程措施，包括水平偏移（如环岛、错位车道、蜿蜒式道路）、垂直偏移（如减速带、抬高式人行横道和缓冲带）以及缩减街道宽度（如路边停车、道路瘦身和路口路缘延伸）\n\
  - 安装智能包裹储物柜，用于最后一公里配送\n- 为按需出行系统设置自行车停放架/停车架及上下客点\n- 设立微型出行站点\n- 增设电动汽车充电站、无线/无绳充电板及支持边行驶边充电的充电道路\n\
  - 规划空中出租车起降点\n- 实现智能停车，持续监测停车位状态，并自动化处理多项运营流程，如可用车位检测和数字支付。这些智能停车系统需针对`自动代客泊车`（AVP）和自动驾驶电动汽车停车等新兴技术进行升级，具体包括优化布局、充电桩/无线充电板、通信基础设施以及上下客与取车区域\n\
  - 最后，随着新兴的重型卡车列队行驶技术发展，车队管理应考虑桥梁运营限制条件，桥梁设计标准也需相应修订\n\n## 2.3 智能出行技术\n\n在其著作《未来概况：对可能之极限的探究》（Clarke，2013\
  \ 年）中，英国科幻作家、发明家阿瑟·克拉克提出了著名的\"克拉克三定律\"，其中第三定律最为人知且被广泛引用：\"任何足够先进的技术都与魔法无异。\"网联汽车技术就是这样的魔法，它创造了数据丰富的全新环境，并催生了众多应用和服务，使我们的道路更安全、更畅通、更环保。共享出行技术是另一种魔法，它用使用权取代了所有权。出行即服务（MaaS）、按需出行（MOD）和无缝集成出行系统（SIMS）则是实现人员与货物运输新自由主义化的魔法，让无缝出行成为可能。自动驾驶技术是神奇的魔法，它将大幅减少伤亡事故，改善因年龄或残疾而无法驾驶者获取出行服务的机会，并开启乘客经济的大门。3D\
  \ 出行是将我们从仅支持 2 自由度（横向和纵向运动）的二维街道限制中解放出来，迈向 3 自由度（横向、纵向和垂直运动）——更准确地说是 6 自由度（横向、纵向、垂直、侧倾、俯仰和偏航）——的魔法，这考虑到了飞行平台的旋转运动。零排放超级高铁技术堪称魔法，它能让你仅用\
  \ 35 分钟就从洛杉矶抵达旧金山，而高速铁路系统则需要 2.5 小时。电气化则是将在不久的将来实现净零排放和可持续出行的魔法。\n\n智能出行的技术层面可从基础技术、技术使能因素和颠覆性技术三个方面进行阐释，如图\
  \ 2-2 所示。该图所列内容并未囊括当今不断动态变化的所有基础技术、使能技术和颠覆性技术。然而，所提及的技术是现有及未来可能出现的智能出行系统与服务的核心构建模块。此外，其他硬件相关技术，如嵌入式系统、传感器、执行器、车身设计、显示屏，以及`E/E\
  \ 架构`（电子电气架构）、测试、验证、确认和网络安全等技术也同样重要，但不在本书的讨论范围之内。\n\n```\n![../images/511013_1_En_2_Chapter/511013_1_En_2_Fig2_HTML.jpg](img/511013_1_En_2_Fig2_HTML.jpg)\n\
  ```\n\n**图 2-2**  \n智能出行：基础技术、技术使能因素与颠覆性技术\n\n\n\n"
- '# 智慧出行：基础技术、使能技术与颠覆性技术


  以下章节聚焦于智慧出行系统与服务的技术层面，阐述其基础技术、使能技术与颠覆性技术。本书涵盖的基础技术包括`定位、导航与授时（PNT）`、`地理信息系统（GIS）`、`无线通信`、`移动云计算`、`区块链`、`物联网（IoT）`、`人工智能（AI）`、`机器人技术`和`电气化`。`PNT`技术赋予智慧出行系统定位系统内固定与移动资产、引导移动资产导航以及保持精确授时的能力。`GIS`提供必要的抽象化工作环境的地理信息。`无线通信`使智慧出行系统内能够进行高可靠性实时数据的传输与交换。`移动计算`使授权终端用户和移动资产能够随时随地快速访问数据、信息和计算资源。基于分布式计算概念，`区块链`技术能够实现身份验证、访问控制和快速支付等多种服务，并有潜力重塑智慧出行系统与服务。`物联网`技术能够将智慧出行系统内的任何固定或移动资产连接到互联网，并促进数据共享，以实现监控、控制和优化。`人工智能`是多项现有及新兴智慧出行系统与服务的核心技术及驱动力。鉴于多项智慧出行技术始于机器人研究实验室，并基于机械设计、运动系统、感知、规划、控制、导航与协同算法等机器人领域的进步，`机器人技术`被视为一项基础技术。`电气化`是实现脱碳可持续出行的另一项基础技术。关于这些基础技术的更多细节，请参阅`第[3]章(#511013_1_En_3_Chapter.xhtml)`。


  在智慧出行背景下，本书涵盖了几项使能技术，例如智能基础设施、网联出行、自动驾驶出行、电动出行、微出行、主动/软出行、包容性出行以及`情境感知系统（CAS）`。支撑性智能基础设施包括智能交通系统、智能路面、智能交叉路口、高品质骑行基础设施（如自行车高速公路，也称自行车快速路或超级高速公路）、智能停车和充电基础设施。网联出行是实现实时导航与路径规划、交通信息、安全预警、事故规避、`高级驾驶辅助系统（ADAS）`和`自动驾驶系统（ADS）`的关键使能技术。自动驾驶能够大幅减少通常由人类驾驶失误导致的伤亡事故。电动出行支持并驱动多种环保出行平台，如电动汽车、电动自行车、电动滑板车、电动垂直起降飞行器（eVTOL）以及电动摆渡车/通勤车。微出行平台实现了可负担且可持续的第一/最后一公里出行。主动、软性或零影响出行，为第一/最后一公里的城市出行提供了健康、廉价、有趣且环保的选择。出行辅助设备为老年人和行动不便者实现了包容性出行。最后但同样重要的是，情境感知是能够根据特定情境信息进行调整的情境感知出行系统与服务的使能技术。关于这些使能技术的更多细节，请参阅`第[4]章(#511013_1_En_4_Chapter.xhtml)`。


  本书描述的出行颠覆性技术包括颠覆性出行模式、共享出行、`出行即服务（MaaS）`、`按需出行（MOD）`、`无缝集成出行系统（SIMS）`、最后一公里配送、`车辆即服务（VaaS）`、零工经济与乘客经济。用于人员出行和货物配送的颠覆性出行平台包括：自主地面车辆（例如自动驾驶摆渡车（SDS）、自主轮椅、自主推车和自主机器人代客泊车）、城市空中出行（例如空中出租车、空中地铁和最后一公里配送无人机）以及水运工具（水上出租车、水上巴士和自主船只/舰艇）。自动旅客捷运系统、超级高铁和城市环线高速是颠覆性出行平台的其他例子。车辆共享、点对点共享、`需求响应式公交（DRT）`、拼车、网约车、网约出租车、合乘等服务是共享出行服务的例子。`出行即服务`、按需出行和无缝集成出行系统促进了便捷直达的无缝出行。现代最后一公里配送服务专注于以最快、最灵活、最透明的方式，将货物从仓库或配送中心运至最终目的地。在颠覆性创新时代，出行平台或车辆可被视作一种服务，以实现车辆内未使用的计算和/或网络资源以及海量收集数据的共享与货币化。基于零工经济和乘客经济，尤其是在自动驾驶汽车时代，车辆可被重新用于休闲、商务或医疗保健等不同用途，由此可催生多种智慧出行服务。关于这些颠覆性技术的更多细节，请参阅`第[5]章(#511013_1_En_5_Chapter.xhtml)`。


  脚注 `1` `2` `3`


  ## 3. 智慧出行：基础技术


  基础技术是智慧出行的基石，可用于有效开发和支撑重要的新产品与服务。本章将讨论`定位、导航与授时（PNT）`、`地理信息系统（GIS）`、`无线通信`、`移动云计算`、`区块链`、`物联网（IoT）`、`人工智能（AI）`、`机器人技术`和`电气化`，作为智慧出行系统与服务基础技术的范例。




  '
- '# 3.1 PNT 与 GIS


  定位、导航与授时由美国运输部（DOT）定义为三种不同基本能力的组合（Wallischeck 等，2016）：


  * **定位**是指能够精确、准确地确定自身在二维（或在需要时三维）空间中的位置和朝向，且该位置参照标准大地测量系统（如 1984 年世界大地测量系统，即 WGS84）。

  * **导航**是指能够确定当前和期望位置（相对或绝对），并对航向、朝向和速度进行修正，从而抵达地球上从地下到地表、从地表到空间的任何期望位置。

  * **授时**是指能够在世界任何地方，并在用户定义的时间参数范围内，从标准时间（协调世界时，即 UTC）获取并维持准确且精确的时间。授时还包括时间传递。


  一般来说，根据车辆的工作环境，车辆定位可分为室内定位和室外定位两类。室内定位是精确估计在建筑物环境内移动的车辆位置和朝向的过程（Mautz，2012）。此过程中要解决的复杂程度主要取决于环境的特性。室内环境可分为结构化或非结构化、完全可观测或部分可观测、甚至是静态或动态。在非结构化的部分可观测动态环境中进行室内定位被认为是一个具有挑战性的过程。该过程首先使用不同类型的传感器（如基于无线电波的传感器、磁传感器、声学传感器或相机）来观测环境。然后，通过利用各种定位方法对收集到的数据进行进一步过滤和后处理，以精确确定车辆在其环境附近的位置。这些定位方法的示例包括：小区标识（`CoO`）/临近检测/基于连接的定位、质心确定、测距/三边测量/多边测量、极坐标法/距离-方位定位、指纹识别/场景分析/模式匹配以及航位推算。这些不同的定位方法在精度和覆盖范围上各有差异。根据目标应用所需的精度水平，可以选择相应的合适定位技术。不同室内定位技术的相对精度和覆盖范围在（Mautz，2012）中有描述。


  与室内定位相比，室外环境由于其大规模、本质上的非结构化、部分可观测以及动态的特性，使得室外定位是一个比室内定位更具挑战性的过程。这主要是由于缺乏控制环境的能力以及室外动态环境的有限可预测性。


  室外定位技术可分为三大类：相对定位、全局定位和混合定位技术。在相对定位技术中，主要目标是利用各种车载传感器（例如编码器、陀螺仪、加速度计等）提供的信息，精确评估位置和朝向。在这些技术中，位置和朝向是相对于车辆开始运行时的初始已知位姿进行测量的。这些技术通常存在一些不确定性，因为测量过程中产生的误差会随时间不断累积。这会导致误差椭圆扩大，可能使测量读数随时间偏离实际位姿。相对定位技术的例子包括航位推算（Brossard
  等，2020）、惯性导航（Woodman，2007）和视觉里程计（Maimone 等，2007）。与相对定位技术不同，全局定位技术是相对于全局参考系来确定车辆的位置和朝向。全局定位技术的例子包括地基射频系统、有源
  RFID 技术、实时定位技术、全球定位系统（`GPS`）、亚米级 `GPS` 技术（例如星基增强系统、精密单点定位（`PPP`）和实时动态差分（`RTK`））、实时定位系统（例如超宽带或
  UWB RTLS）以及混合技术（例如 `GPS` 和 UWB）。最流行的技术是 `GPS`（Samama，2008），它基于卫星信号来确定地球上车辆的绝对位置（经度、纬度和海拔）。`GPS`
  为用户提供天基 PNT 服务。不可否认，过去几十年的技术进步以及 PNT/`GPS` 技术的广泛应用，已经在移动出行领域催生了重大创新。这些创新提高了所有交通方式的安全性、效率和可靠性，并将帮助实现交通领域的另一次变革性转变——迈向更高的自动化水平（Bisnath，2019）。这些技术对于依赖高精度、高可靠性定位、导航和授时信息的智能移动系统至关重要。`GPS`
  能够提供地球表面及上方的位置信息，其精度范围从 3–10 米到厘米级不等，具体取决于所使用的 `GPS` 跟踪器的精度。除了 `GPS` 之外，其他全球导航卫星系统（`GNSS`）还包括欧盟的伽利略系统、俄罗斯的全球导航卫星系统（`GLONASS`）和中国的北斗卫星导航系统（`BDS`）。伽利略系统与
  `GPS` 类似，但提供了新的服务以及更高的定位和授时精度与可靠性。它是唯一专为民用应用设计并由民用机构管理的系统。混合定位技术，例如精密单点定位（`PPP`）`GPS`
  和实时动态差分（`RTK`）`GPS`，通常用于提高 `GPS` 的精度。`PPP` 被认为是一种利用 `GNSS` 星座提供厘米级误差定位的最优方法。`PPP`
  处理来自单用户接收机的测量值，使用详细的物理模型和修正，以及预先计算好的精确 `GNSS` 轨道和时钟产品。`PPP` 与 `RTK` 等其他精密定位方法的不同之处在于，车辆附近无需参考站。另一个优点是，由于
  `GNSS` 轨道和时钟产品本质上是全球性的，因此 `PPP` 的解决方案也是全球性的。例如，Trimble `RTX` 是一种先进的 `PPP` 技术，可提供实时厘米级定位。`RTK`
  卫星导航是一种基于使用 `GPS`、`GLONASS` 和/或伽利略信号载波相位测量的技术，其中单个参考站提供实时修正，可实现高达厘米级的精度。`RTK` 修正信号通常由基站通过超高频无线电接收器/发射器传输，或者如果该区域有
  `CORS` 网络，则通过 `NTRIP` 服务器（经由 `GSM` 网络）传输。 (Nord 等，2021) 描述了用于自动驾驶的网络 RTK 定位（`NPAD`）项目。`RTK`
  技术的主要缺点是由于基站和移动接收器之间路径上的障碍物导致低功率系统传输距离短。另一个缺点是信号干扰，它会减少传输距离并导致信号质量差。




  ### 基于 WiFi 的定位与地理信息系统


  #### 基于 WiFi 的定位


  基于 WiFi 的定位可以弥补传统 GPS 在大都市地区的不足。在这种情况下，可以通过三边测量和指纹识别技术来探索 WiFi 定位，因为仅依赖三边测量并非合适的选择——该方法需要在二维平面上至少有三个视距内的参考点才能定位车辆，而在城市峡谷等区域，这些条件往往无法满足。通过三边测量和指纹识别估算出的
  WiFi 定位结果，可以与 GPS/智能手机定位模型协同使用。其他新兴定位技术包括 5G/3GPP（例如 R16 NR 定位）、蜂窝车联网（V2X）（例如 R16
  NR V2V/V2I）以及视觉定位系统（VPS）。VPS 或基于视觉的地图匹配是一种潜在的定位方式。在 VPS 中，车辆位置通过识别自然地标并将其与已知区域地图进行匹配来估算。


  #### 地理信息系统（GIS）


  `地理信息系统（GIS）`是一种用于输入、存储、操作和输出地理信息的信息系统。GIS 在现有和新兴的出行系统中扮演着至关重要的角色。如今，多种基于互联网的地图技术为地球大部分陆地表面提供免费的卫星图像、航拍照片和地形数据，从而提高了地图技术的可用性。例如`Google
  Earth`、`Google Maps`、`OpenStreetMap`、`ArcGIS`、`QGIS`、`2GIS`、`Bing Maps`、`HERE WeGo`和`MAPS.ME`。其他地图服务如`AccuTerra`则专注于提供来自`美国地质调查局（USGS）`地形图系列、国家公园、国家森林和`土地管理局`数据的休闲娱乐地图。


  #### 高精地图（HD Maps）


  高精地图（HD Maps）可采用不同方法构建，为自动驾驶汽车等智能出行平台提供厘米级的超高精度信息。此类信息示例包括车道边界、交叉口、人行横道、停车位、停车标志、交通信号灯等。当我们创建城市的高精地图时，实际上是在创建城市道路网络的数字基础设施（Vardhan，2017）。根据
  Lyft 公司（Chellapilla，2018）的说法，高精地图分为五个层次，即：基础地图（标准精度地图）、包含世界三维信息的几何地图、在几何地图层上添加语义对象构建的语义地图、包含动态元素衍生信息及人类驾驶行为的地图先验知识层，以及读写实时知识层。不同类型传感器（如
  GPS、摄像头、雷达和激光雷达传感器）会被使用并融合，以创建这些高精地图。


  #### 将 5G 与 PNT、GIS、高精地图和交通数据相结合


  将 5G 与 PNT（定位、导航、授时）、GIS、高精地图技术以及交通密度数据相结合，将赋能多种需要高速数据传输、低网络延迟、精准定位、导航、授时和地图服务以及实时交通数据的智能出行应用。应用示例包括高效路径规划与重规划、移动资产追踪、位置感知服务、出行即服务、按需出行以及无缝集成出行服务等。例如，像`Google
  Maps`这样的导航应用包含以下组成部分：


  - **地图编码算法：** 包括空间索引算法和计算几何算法，用于组织地图数据并高效检索。常用有向图和收缩层级结构来表示地图。道路分类层级或道路等级体系是一种根据使用情况、位置、路面类型、通行能力等多种因素将道路分组的方案。


  - **地图绘制算法：** 用于绘制地图（例如，投影经纬度坐标；填充多边形；为街道、城市、企业和公园等地点命名）。


  - **查询理解算法：** 理解用户查询。这些查询可以是打字输入或语音输入。通过图像搜索位置也是一种可能。查询理解算法运用了自然语言处理、语音识别和机器视觉技术。


  - **GPS 信号处理算法：** 用于提高精度并处理低成本 GPS 存在的各种不完善问题，如不确定性和模糊性。


  - **地理编码算法：** 使用地理坐标系将地址转换为地图上的点（或多边形）。地理坐标系是一种能够用一组数字、字母或符号来指定地球上每个位置的坐标系（Crossley，1999）。将坐标赋予地球表面位置的常见地图投影包括经纬度坐标、`通用横轴墨卡托投影（UTM）`、`军用网格参考系统（MGRS）`、`美国国家网格（USNG）`、`全球区域参考系统（GARS）`和`世界地理参考系统（GEOREF）`。`What3words
  (W3W)` 是一种人类可读的地理编码系统，用于以三米的分辨率进行位置通信。类似地，基于谷歌`开放位置编码（OLC）`地理编码系统创建的`Plus codes`也提供基于经纬度、以数字和字母显示的地理标签。这些地理标签（如`W3W`和`Plus
  codes`）可用于标记没有正式地址的位置，因为全球一半的城市人口生活在未命名的街道上。


  - **路径规划算法：** 用于找到当前位置与目的地之间的最优路线（在大型时变道路网络中的最短或最快路径）。像`Waze`、`Apple Maps`和`Google
  Maps`这样的移动应用通常被用作提供最优或次优路线的导航应用。然而，需要这些应用的更高级版本，以包含诸如住宅街道通行能力和可能影响安全或导致拥堵的动态事件等额外信息（Macfarlane，2019）。路径规划通常被视为一个图搜索问题。图是一种表示道路网络的数学方法。图的节点代表交叉口，边代表道路。一条路径是连接起点节点和终点节点的一系列边。如图
  3-1 所示，Dijkstra（迪杰斯特拉）、A-star（A 星）和收缩层级算法常用于解决路径规划问题。


  ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig1_HTML.png](img/511013_1_En_3_Fig1_HTML.png)


  **图 3-1：** 路径规划算法示例


  这些图搜索算法及其他算法均可用于解决此`GitHub`仓库中的路径规划问题，该仓库是我在加拿大多伦多大学`爱德华·S·罗杰斯高级电气与计算机工程系（ECE）`授课时开发的。


  > **重要提示：** 每位驾驶员每天少行驶一英里，每年可节省高达 5000 万美元（UPS 流程管理总监 Jack Levis）。


  - **基于交通方式的路线：** 根据可用的交通方式（驾驶、摩托车、骑行、公交、步行、网约车服务）计算不同的路线。


  - **反向地理编码算法：** 用于执行反向地理编码，使用点-多边形算法将点转换为地址。


  - **导航引导：** 在路线执行过程中，通过图形、声音提醒、文本转语音合成或语音助手提供引导。


  - **偏航检测与重规划：** 用于检测驾驶员何时偏离路线并需要新路线。


  - **兴趣点：** 当前位置附近的商场、餐厅、停车位等会被高亮显示。




  ##### 处理差异


  例如，在光照条件方面，可以使用谷歌地图的街道照明图层来帮助旅行者通过照明良好的街道导航，或避开黑暗的街道。另一个例子是，当穿越美加或美墨边境时，可以将计量单位从英里切换为公里（或反之），或者调整道路使用规则。


  ## 3.2 无线通信


  在过去十年中，对无线技术的需求呈爆发式增长，蜂窝通信和个人通信已成为电信服务中增长最快的领域（Chen, 1998）。无线通信以高可靠性促进实时数据的传输与交换，并确保移动平台与其环境之间的无缝集成。研究人员已在密集、动态及恶劣天气环境中实现无线车载通信方面做出了大量努力（Siegel
  等人，2018；Bey 和 Tewolde，2019）。延迟、功耗要求、可扩展性和成本是影响无线通信的关键因素，尤其是在电动汽车（EV）场景下。


  用于智能出行系统的无线通信技术主要包括专用短程通信（DSRC）和蜂窝车联网（C-V2X）通信。此外，更多正在进行的研究探讨了将这两种技术相结合是否会为出行系统带来更繁荣的未来：


  ![../images/511013_1_En_3_Chapter/511013_1_En_3_Fig2_HTML.jpg](img/511013_1_En_3_Fig2_HTML.jpg)


  **图 3-2** 易受伤害道路使用者（VRU）碰撞警告、禁止超车警告和故障车辆警告


  - **DSRC**（Shukla 等人，2020）：基于 `IEEE 802.11p` 标准，支持移动车辆之间（V2V）、车辆与基础设施或移动设备之间（V2X）连续、低延迟且安全的数据交换。


  - **C-V2X**（Abou-Zeid 等人，2019）：在物理层采用单载波频分多址（`SCFDMA`），与 DSRC 相比可实现更高的数据速率和更广的覆盖范围。尽管一些人认为
  DSRC 相较于基于 LTE 或 5G 的 C-V2X 已属过时技术，但当今的 LTE 无线通信因高延迟无法充分支持碰撞预警等车辆安全应用。5G 的 promising
  能力将解决这一局限，但广泛部署 5G 基础设施可能需要一段时间。


  - **混合架构**：结合 DSRC 与蜂窝技术形成混合解决方案被认为前景广阔，因为它充分利用了两种使能技术的优势。例如，当车辆间传输数据出现中断且 V2V 多跳通信失败时，蜂窝技术可作为备份方案来中继传输信息。同样，当车辆与路边单元（RSU）的互联网连接丢失时，车辆可重新连接至蜂窝技术的互联网接入网络。图
  3-2 展示了一些将受益于 DSRC 与蜂窝技术集成的安全应用。


  2020 年 11 月 18 日，美国联邦通信委员会（FCC）将长期预留给交通领域的 5.9 GHz“安全频谱”重新分配给了 WiFi 和 C-V2X。该裁决实际上终结了基于
  WiFi 的 DSRC 的未来，并锁定了正在发展的替代技术 C-V2X。


  通信卫星，例如地球同步赤道轨道/地球静止轨道（GEO/GSO）、中地球轨道（MEO）和低地球轨道（LEO）（Yang, 2019），可以提供可用于智能出行系统的低成本全球连接。SpaceX、OneWeb
  甚至 Facebook 等多家公司正投资于卫星星座，旨在为全球提供可负担的消费者互联网服务。亚马逊也在研究用于物流的卫星通信。特斯拉、丰田和吉利等不同汽车制造商已规划拥有自己的卫星网络，并将其集成到车辆中。一种混合方法也是可行的选择，即地面蜂窝通信与卫星通信（GEO
  或 LEO）相结合，以处理信号盲区覆盖和可靠性等问题。这种混合通信系统的潜在应用包括内容流媒体、游戏、车队管理、空中下载（OTA）更新、紧急通知、精确定位，以及自动驾驶车辆的关键任务应用（例如远程协助或远程操控——如将故障自动驾驶车辆引导至安全区域，或在自动驾驶车辆陷入困境的特定情况下允许其违反交通规则）。




