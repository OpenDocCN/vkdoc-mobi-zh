  \ 3-3）。\n\n移动云计算（`MCC`）定义为：\n\n> *一种丰富的移动计算技术，它利用各种云（私有或公有）的统一弹性资源和网络技术，以实现无限制的功能、存储和移动性，通过网络通道随时随地服务于多种移动设备，无论其异构环境和平台如何，均基于按需付费原则。*\n\
