  \ |\n\n其他颠覆性出行平台还包括自主轮椅、自主手推车和自主机器人代步车。WHILL 公司推出了一款智能轮椅，以解决当前机场行动不便乘客服务效率低下的问题。WHILL\
  \ NEXT 可以自主跟随乘客移动，并允许多个单元（如行李车）排成单列行进。在目的地卸下行李后，手推车会自动返回服务下一位客户。一款名为 Eli 的自主购物手推车可以在超市为购物者提供帮助。它能在超市内导航，跟随购物者在过道中行走，避开障碍物，并自动为所购商品结账。一款名为\
  \ Stan 的自主机器人代步车可以在机场为您停车。该机器人已在伦敦盖特威克机场进行了测试。Stan 使用类似叉车的臂和人工智能技术，可在停车场内增加多达 50%的空间。利用乘客的航班信息，Stan\
  \ 机器人会将汽车送回到指定车位，以便乘客返回时车辆已在那里等待。\n\n\n\n### 5.2.2 三维机动性与城市空中交通（UAM）\n\n有轨电车/城市路面电车/火车可被视为**1\
  \ 自由度（DOF）**移动平台，因为它们主要依赖纵向运动，而横向运动的自由度相当受限（脱轨情况除外）。汽车具有**2 自由度**（横向和纵向运动）。三维机动性是从受限的二维街道向二维移动空间的范式转变，实现了**3\
  \ 自由度**（横向、纵向和垂直运动），或更准确地说，考虑到旋转运动，是**6 自由度**（横向、纵向、垂直、侧倾、俯仰和偏航）。在此范式下，城市空中交通（UAM）指的是快速发展的、用于人员和货物运输的城市交通系统。空中出租车/飞行出租车/飞行汽车是未来主义的颠覆性移动平台，其基础是按需航空商业模式。它们是有人驾驶的垂直起降（VTOL）飞行器。这些\
  \ VTOL 飞行器可定制，以容纳不同数量的乘客或用于货物运输。eVTOL 利用电力推进在人口稠密的城市区域及其周边飞行，速度最高可达 320 公里/小时，航程约\
  \ 200 英里。例如`uberAIR`、被`Joby Aviation`收购的`Uber Elevate`、`JoeBen Bevirt`的飞行汽车、`Airbus\
  \ Flying Taxi`、`Maker’s Archer Aviation`、`Boeing Flying Taxi`以及在`CES 2021`上展示的`Cadillac\
  \ eVTOLs`。`Cadillac eVTOLs`使用一台 90 千瓦时的电动汽车电机为四个旋翼以及空对空和空对地通信提供动力，可以在屋顶接载乘客，并将他们送到距离目的地最近的垂直起降机场。`Archer\
  \ Aviation`正与汽车制造商`Stellantis`合作进行制造，并与`United Airlines`合作运营其复合材料 eVTOL 飞行器。该公司计划通过其特殊目的收购公司（SPAC）合并筹集\
  \ 38 亿美元。生产计划于 2023 年启动。\n\n**重要信息**\n\n根据`Prescient & Strategic Intelligence`的数据，全球城市空中交通（UAM）市场预计在\
  \ 2023 年价值 8.95 亿美元，到 2030 年将增长至 68.894 亿美元，预测期（2023-2030 年）内的复合年增长率为 33.9%。\n\n\
  来自`Airbus Helicopters`的、具有 15 分钟自主飞行能力的远程遥控四座 eVTOL`City Airbus`已于 2020 年 7 月首次公开飞行。`Hyundai`在`CES\
  \ 2020`上展示了未来的空中交通概念，该概念由互联的 PAV（个人飞行器）、PBV（定制化车辆）和一个枢纽站组成。PAV 是一种无需跑道的城市空中交通 eVTOL\
  \ 飞行器。PBV 是一种生态友好、高度定制化的城市车辆，用于人员或货物运输，并可在途中提供定制服务（例如咖啡馆、诊所），而枢纽站主要是 PAV 的起飞/降落点和\
  \ PBV 的到达/出发点。\n\n根据`NASA 城市空中交通`报告（Goyal, 2018），设想了三个具有挑战性的 UAM 用例：\n\n-   **最后一英里配送**：从本地配送枢纽将包裹（小于\
  \ 5 磅或 2 公斤）快速送达专用接收装置。配送是非计划性的，并随着在线订单的下达而规划路线。\n-   **空中地铁**：类似于当前的地铁和公交等公共交通选项，具有预定路线、固定时刻表以及在每个城市高流量区域设定的站点。车辆自主运行，一次可容纳两到五名乘客，平均每次行程载客三人。\n\
  -   **空中出租车**：空中出租车用例是一种近乎普遍（或门到门）的拼车服务，允许消费者呼叫 VTOL/eVTOL 到他们希望的上车地点，并在给定城市的屋顶指定下车目的地。像今天的拼车应用程序一样，行程是非计划性的且按需提供。与空中地铁的情况类似，车辆自主运行，一次可容纳两到五名乘客，平均每次行程载客一人。\n\
  \n一些城市正在试验 UAM，重点放在空中出租车（例如中国的`亿航`，^(³⁰)新西兰的`Kitty Hawk`，^(³¹)以及迪拜的无人机出租车^(³²)）和空中快递（例如`Amazon\
  \ Prime Air`，^(³³)`京东`的无人机配送，中国的`迅蚁`在 COVID-19 疫情期间用于医疗物资配送的无人机，以及美国的`Zipline`在美国和非洲用于医疗物资和个人防护装备配送的无人机）。\n\
  \n英国政府正向一家初创公司提供 165 万美元，用于建造一个用于“飞行出租车”的弹出式城市机场，该机场将于 2021 年晚些时候在英格兰考文垂开放。这个名为`Air-One`的城市机场将成为世界上第一个\
  \ eVTOL 运营枢纽。\n\n`麦肯锡` ^(³⁴) 将交通管理基础设施、接收包裹或降落车辆的物理基础设施以及支持技术基础设施（例如允许无人机进入仓库的自动门）确定为\
  \ UAM 的关键基础设施要求。\n\n要使 UAM 作为最后一英里配送平台、空中地铁或空中出租车被广泛接受和社会认可，仍然面临若干挑战。这些挑战包括但不限于：“超视距”（BVLOS）运行的安全性、密集城区的安全性、隐私、噪音污染、视觉干扰、对野生动物的影响、动态地理围栏、特别是在恶劣天气条件下的最优路径规划和导航、将包裹送达正确的人员公寓、以及遵守空域规定。例如，正如第`2`章所讨论的，在世界许多司法管辖区，BVLOS\
  \ 飞行需要获得航空当局的认证和许可。2021 年 1 月，美国联邦航空管理局首次批准了具备 BVLOS 运行能力的全自动商用无人机飞行。该批准授予了`American\
  \ Robotics Inc.`。然而，这些无人机仅获准在乡村地区沿规划航线飞行，且高度限制在 122 米以下。此外，需要一名人类飞行员远程监督每次飞行的起飞过程。\n\
  \n\n\n### 5.2.3 水上出租车\n\n水上出租车或水上巴士主要在城市环境中提供公共或私人交通服务。这种城市水上交通已在全球许多水道丰富的城市（如威尼斯、曼谷、东京、纽约、悉尼和多伦多）使用了数百年，用于确保快速点对点运输并缓解交通拥堵。迪拜道路与交通管理局（RTA）监管多种水上交通方式，例如水上出租车（每次最多\
  \ 10 名乘客）、水上巴士（20 名乘客）、传统木船（20 名乘客）、混合动力木船（20 名乘客）、电动木船（9 名乘客）以及渡轮（100 名乘客）。技术正在迅速改变水上出租车的形态。例如，采用混合动力推进系统的“雷霆”号水上的士，能够在威尼斯的水道中以纯电动模式零排放行驶。这些水上的士也会驶入开阔水域前往机场，此时可使用柴油发动机达到更高速度，同时为电池充电。SeaBubbles\
  \ 是一款实验性的水翼电动水上的士，最高时速可达 25 公里/小时，无浪、无噪音、零排放，可在城市中按需提供水上的士服务。\n\n在不久的将来，自动驾驶船只将被用于沿海和河滨城市的货物和人员运输，有助于减少公路和铁路的交通拥堵。例如，“Roboat”项目^(³⁵)旨在开发一支自动驾驶船队，用于在阿姆斯特丹市运输货物和人员（Wang\
  \ 等人，2019）。在同一项目中，麻省理工学院的研究人员设计了 3D 打印的无人驾驶船只，这些船只既可提供运输服务，也能自行组装成其他浮动结构。\n\n**重要提示**\n\
  \n根据 MarketsandMarkets 的数据，自主船舶市场预计到 2030 年将达到 142 亿美元，2020 年至 2030 年的复合年增长率为 9.3%。\n\
  \n目前，高度自动化的船舶已在多个国家投入使用，尤其是在挪威等北欧国家。例如，由挪威公司 Kongsberg Maritime 建造的两艘实验性自主船只“海洋空间无人机\
  \ 1 号”和“2 号”，正被挪威科技大学使用。挪威政府资助的其它几个项目旨在开发电动自主船舶，使其成为新型综合交通系统的一部分，而非取代现有船只。\n\n正如第\
  \ 2 章所述，改变海事法律法规仍是适应自主船舶用于人员出行和货物运输所面临的挑战。\n\n### 5.2.4 自动旅客捷运系统\n\n自动旅客捷运系统代表了交通系统的可持续性与颠覆性创新，是全面自动化/无人驾驶、高架且先进的固定导轨系统。APM\
  \ 在导轨管道内使用电动转向架，推动悬挂式客舱前进，客舱可根据需求定制不同尺寸，从个人舱到多人舱不等，速度可超过 160 公里/小时。与磁悬浮及其他类型的单轨系统相比，悬挂式自动快速公交所需的基础设施要少得多，如表\
  \ 5-2 所示。\n\n**表 5-2** 城市磁悬浮、轻轨、快速公交与自动旅客捷运系统比较 | 来源：Swift Tram\n\n| 因素 | APM |\
