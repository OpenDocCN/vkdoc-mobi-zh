  \ = UIStringDrawing.StringSize(label.Text, label.Font);\n    // 并据此调整框架\n    label.Frame\
  \ = new CGRect(View.Frame.Width / 2 - labelSize.Width / 2,\n                   \
  \          View.Frame.Height / 2 - labelSize.Height / 2,\n                     \
