- "# 用户界面\n\n为了设计 `HelloTV` 应用的 UI，我打开解决方案资源管理器并双击 `Main.storyboard` 文件。这将打开 iOS 设计器，我在此修改默认视图控制器的场景。具体来说，我从工具箱拖拽了以下控件：一个文本字段、一个按钮、一个图像视图和四个标签。如图\
  \ 9-4 所示，我将所有控件垂直堆叠，然后使用属性面板按如下方式配置每个控件：\n\n- **文本字段**：\n    - 名称：`TextFieldCityName`\n\
  \    - 宽度：500 像素\n    - 对齐方式：居中\n    - 字体：标题\n    - 文本：输入城市名称\n- **按钮**：\n    -\
  \ 名称：`ButtonGetCurrentWeather`\n    - 宽度：500 像素\n    - 对齐方式：居中\n    - 字体：标题\n  \
