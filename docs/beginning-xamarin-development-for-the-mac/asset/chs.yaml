  }\n清单 7-8.\n按 ID 检索用户\n```\n\n## 测试 REST 客户端\n\n现在，我们已经实现了 REST 客户端类，可以验证其功能了。由于我们已经知道如何编写单元测试，我们可以自动测试客户端类。为了创建\
