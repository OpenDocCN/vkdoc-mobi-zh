  \n图 7-4：测试`UsersServiceHelper`类\n\n## Users 仓库\n\n通信层准备就绪后，我们现在可以在`Users.MobileClient`应用程序中使用它。如图\
  \ 7-1 所示，`Users.MobileClient`包含两个视图。这两个视图都使用了实现 Web 服务客户端的类。第一个视图在`UITableView`中显示用户列表，第二个视图展示用户的更详细信息。因此，存在两个视图控制器，它们将与`UsersServiceHelper`类交互。为此，我将此类设为静态类，以便从应用程序的不同组件轻松访问。另一种方法是使用单例设计模式来实现`UsersServiceHelper`。我将在之后介绍如何针对另一个类`UsersRepository`实现该模式。\n\
  \n开发移动 REST API 客户端时，还需考虑另外两个问题。首先是从 Web 服务检索数据的本地存储问题；其次是移动应用与 Web 服务之间的数据同步问题。为了减少向\
  \ Web 服务发送的请求数量，通常的做法是在应用启动时将数据检索到本地存储中，然后在需要时与 Web 服务进行同步。在高级场景中，可以使用专用工作线程或原生后台机制在后台执行同步。\n\
  \n此处为了实现本地数据存储（即用户仓库），我创建了另一个类`UsersRepository`，并将其保存在`Model`文件夹下的`UsersRepository.cs`文件中（参见随附代码：`Chapter_07/Users.MobileClient/Models`）。该类作为本地数据存储，与远程用户集合保持同步。由于`UsersRepository`将在代码的多个位置被访问，并且需要呈现相同的数据，我使用单例设计模式来实现该类。这意味着`UsersRepository`将只有一个实例，可以从源代码的不同位置访问该实例。\n\
  \n代码清单 7-15 展示了`UsersRepository`类的片段，包含以下四个成员：\n\n*   `Users` – 一个公共属性，使其他类能够访问从\
  \ Web 服务检索到的用户集合。\n*   `instance` – 一个私有静态字段，用于存储`UsersRepository`类实例的引用。\n*   `GetInstance`\
  \ – 一个公共静态方法，用于实例化`UsersRepository`类，并将引用保存到`instance`成员中。`GetInstance`还会从 Web 服务检索用户列表。但这种情况仅在首次创建实例字段时发生。所有后续对`GetInstance`方法的调用都将返回对`UsersRepository`对象的引用。\n\
  *   `UsersRepository` – 一个私有构造函数，防止从外部创建该类。因此，调用者只能通过调用`GetInstance`方法来访问私有创建的实例。\n\
  \n```csharp\npublic class UsersRepository\n{\n    public List Users { get; private\
  \ set; }\n    private static UsersRepository instance;\n    public static async\
  \ Task GetInstance()\n    {\n        // Create and initialize an instance only once\n\
  \        if (instance == null)\n        {\n            instance = instance ?? new\
  \ UsersRepository();\n            instance.Users = (await UsersServiceHelper.Get()).ToList();\n\
  \        }\n        return instance;\n    }\n    private UsersRepository()\n   \
  \ {\n        // Make default constructor private\n        // so the class can be\
  \ instantiated\n        // with the GetInstance method only\n    }\n    // Definitions\
  \ of Delete and Update methods\n}\n```\n（代码清单 7-15：`UsersRepository`类的选定片段）\n\n\
  随后，我通过三个公共方法扩展了`UsersRepository`类的定义（代码清单 7-16）：\n\n*   `GetUserById` – 按用户标识符从本地数据存储中检索用户。\n\
  *   `Delete` – 从本地存储和远程 Web 服务中删除给定标识符的用户。\n*   `Update` – 更新本地存储和 Web 服务中的用户。\n\
  \n请注意，在代码清单 7-16 中，`Delete`和`Update`方法的定义被`#pragma warning`预处理指令包围。这是为了抑制 CS4014\
  \ 警告（该警告指出：由于此调用未被等待，因此在调用完成之前，当前方法的执行会继续。请考虑对调用的结果应用`await`运算符）。此处我故意省略了`await`运算符，因为我不想等待这些方法完成。相反，我并行发送请求以加速\
  \ UI 的更新。\n\n```csharp\npublic User GetUserById(int userId)\n{\n    return Users.Find(u\
  \ => u.Id == userId);\n}\n#pragma warning disable CS4014\npublic void Delete(int\
  \ userId)\n{\n    if (UserExists(userId))\n    {\n        var userToDelete = GetById(userId);\n\
  \        Users.Remove(userToDelete);\n        UsersServiceHelper.Delete(userId);\n\
  \    };\n}\npublic void Update(User user)\n{\n    if (UserExists(user.Id))\n   \
  \ {\n        UsersServiceHelper.Update(user);\n    };\n}\n#pragma warning restore\
  \ CS4014\nprivate bool UserExists(int userId)\n{\n    return Users.Exists(u => u.Id\
  \ == userId);\n}\n```\n（代码清单 7-16：从本地存储访问数据以及与远程 Web 服务的数据同步）\n\n\n\n## 展示用户列表\n\
  \n基于前述组件，我可以创建第一个视图，该视图将以表格形式展示用户列表。为此，我首先在项目中新建一个名为`TableSources`的文件夹，并在其中创建一个新文件`UsersTableSource.cs`。该文件存储了`UsersTableSource`类的定义，用于实现用户表格的数据源。\n\
  \n如清单 7-17 所示，`UsersTableSource` 继承自`UITableViewSource`类，这与任何实现`UITableView`（参见第\
  \ 3 章）数据源的类相同。然后，`UsersTableSource` 有两个公共属性，分别存储对父视图控制器（用于导航）和用户仓库的引用。如第 3 章所述，`UsersTableSource`\
  \ 必须重写多个基类方法。特别是，它应重写用于显示列表元素的`GetCell`方法。此处，该方法首先从仓库中检索一个`User`类的实例。此对象包含要在指定行中显示的用户数据。行索引路径与用户标识符相关联，因此我使用此路径通过`GetById`方法从仓库中检索用户（清单\
  \ 7-16）。为了将行索引路径转换为用户标识符，我使用了一个辅助方法`GetUserId`，如清单 7-17 所示。根据`User`类的实例，我创建或重用样式为`UITableViewCellStyle.Value1`的单元格。最后，我配置`TextLabel`和`DetailTextLabel`的`Text`属性，使其显示用户姓名及其公司名称（请参考图\
  \ 7-1）。\n\n```\npublic class UsersTableSource : UITableViewSource\n{\npublic UIViewController\
