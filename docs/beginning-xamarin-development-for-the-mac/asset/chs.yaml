  \ 的下面。因此，我的 `ViewController.cs` 看起来如代码清单 1-1 所示。\n\n![A453659_1_En_1_Fig20_HTML.jpg](img/A453659_1_En_1_Fig20_HTML.jpg)\n\
  \n图 1-20.\n添加事件处理程序\n\n```\npublic partial class ViewController : UIViewController\n\
  {\n// 其他方法如图 1-20 所示。\npartial void ButtonAlert_TouchUpInside(UIButton sender)\n\
  {\nthrow new NotImplementedException();\n}\n}\n代码清单 1-1.\n一个由 TouchUpInside 事件处理程序补充的默认\
  \ ViewController 类\n```\n\n如代码清单 1-1 所示，这个新的事件处理程序与 `TouchUpInside` 事件相关联（另见图 1-21）。\n\
  \n添加事件处理程序的另一种方式是通过 `Properties`（属性）窗口的 `Events`（事件）选项卡。你只需输入事件处理程序的名称并按 Enter 键即可。同样重要的是要注意，一旦创建了事件处理程序，它就可以与其他事件相关联。为此，可使用下拉列表，其中会列出所有可用的事件处理程序（图\
  \ 1-21）。\n\n当你在预览模式下双击一个控件时，Visual Studio 会根据控件类型自动创建事件处理程序。这个事件处理程序被称为“默认事件处理程序”，因为它与特定控件的常见用途相关。对于按钮而言，默认事件处理程序是\
  \ `Up Inside`（触按内部）。我将在第 3 章中向你展示更多事件处理程序的示例。\n\n![A453659_1_En_1_Fig21_HTML.jpg](img/A453659_1_En_1_Fig21_HTML.jpg)\n\
  \n图 1-21.\n按钮属性的 `Events`（事件）选项卡。请注意，`ButtonAlert_TouchUpInside` 事件处理程序也可以与 `Up\
  \ Outside`（外部抬起）事件相关联。\n\n\n\n### AlertViewController\n\n现在，我们准备替换上一小节中创建的 `ButtonAlert_TouchUpInside`\
  \ 事件处理器的默认定义。我们将实现的逻辑会显示一个原生警报窗口，用于呈现 \"Hello, Xamarin.iOS!\" 消息。要显示这样的警报，首先需要创建并配置一个\
  \ `UIAlertViewController` 类的实例，然后通过 `PresentViewController` 方法将其展示给用户。完整的示例见代码清单\
  \ 1-2。\n\n```\nprivate const string title = \"Apress\";\nprivate const string message\
  \ = \"Hello, Xamarin.iOS!\";\npartial void ButtonAlert_TouchUpInside(UIButton sender)\n\
  {\nvar alertController = UIAlertController.Create(\ntitle, message, UIAlertControllerStyle.Alert);\n\
  PresentViewController(alertController, false, null);\n}\n```\n\n*代码清单 1-2. 创建并显示警报窗口*\n\
  \n要创建 `UIAlertController` 类的实例，我使用了它的静态 `Create` 方法。该方法接受三个参数：`title`、`message`\
  \ 和 `UIAlertControllerStyle`。前两个参数的作用相当明显，它们分别指定警报的标题和消息。最后一个参数 `UIAlertControllerStyle`\
  \ 是一个枚举，用于定义警报的样式。你可以在 `Alert` 和 `ActionSheet` 之间选择。此处，我将警报样式设置为 `UIAlertControllerStyle.Alert`。在下一小节中，我将创建操作表，因此，我将\
  \ `title` 和 `message` 保存在了 `ViewController` 类的对应字段中。\n\n为了显示警报，我使用了 `PresentViewController`\
  \ 方法，该方法在 `UIViewController` 类中实现，而 `UIViewController` 是 `ViewController` 类的基类，`ViewController`\
  \ 类与 HelloWorld 应用的默认视图相关联。如代码清单 1-2 所示，`PresentViewController` 方法接受以下三个参数：\n\n\
  - `viewControllerToPresent` 是派生自 `UIViewController` 类的对象，代表要呈现的视图控制器。\n- `animated`\
  \ 指示是否以动画方式呈现视图控制器。\n- `completionHandler` 是在动画完成后执行的操作。\n\n你现在可以在设备模拟器中测试上述解决方案。要运行该应用，请点击调试工具栏（图\
  \ 1-22）中的“播放”按钮。该工具栏位于 Visual Studio 的顶部窗格内。你不仅可以使用目标工具栏来运行应用，还可以设置配置（调试或发布）并选择目标设备。此处，我将目标设备设置为\
  \ iOS 11.0 的 iPhone 8，但你可以选择任何其他模拟器。例如，为了创建图 1-1 中的截图，我使用了 iPhone X 模拟器。\n\n![A453659_1_En_1_Fig22_HTML.jpg](img/A453659_1_En_1_Fig22_HTML.jpg)\n\
  \n*图 1-22. 目标工具栏*\n\n当你按下“播放”按钮时，它会变为“停止”按钮，并且设备模拟器将启动。随后，HelloWorld 应用将被执行（图 1-23），因此你可以点击\
  \ \"Hello, World!\" 按钮。结果，警报将会显示（图 1-23 的右侧部分）。\n\n![A453659_1_En_1_Fig23_HTML.jpg](img/A453659_1_En_1_Fig23_HTML.jpg)\n\
  \n*图 1-23. 在 iPhone 模拟器中运行的 HelloWorld 应用*\n\n你会很快发现，警报窗口会阻塞应用；此时尚无按钮或控件来关闭警报。因此，要中断应用执行，你需要点击调试工具栏中的“停止”按钮，或者在\
  \ PC 上双击 SHIFT + COMMAND + H 键盘快捷键，或者在模拟器上双击 Home 按钮。模拟器屏幕会呈现如图 1-24 所示的形态。然后，你可以向上滑动\
  \ HelloWorld 应用来结束其进程。\n\n此时，还需要注意，你可以使用设备模拟器来模拟各种用户操作。例如，你可以模拟摇动手势、Touch ID、Apple\
  \ Pay，或者简单地旋转或重启设备。你可以通过模拟器的“硬件”菜单访问这些选项。\n\n![A453659_1_En_1_Fig24_HTML.jpg](img/A453659_1_En_1_Fig24_HTML.jpg)\n\
  \n*图 1-24. iPhone 模拟器中的多任务管理*\n\n### 操作\n\n现在，让我们为警报视图添加一个操作。此操作将使用户能够关闭警报窗口，而无需结束整个应用进程。实际上，一个操作会作为警报窗口内的一个按钮出现。当你按下此按钮时，警报窗口将关闭，并且可以执行额外的自定义代码。代码清单\
  \ 1-3 展示了此类操作的典型用法，其中显示了警报创建的扩展实现。与前文类似，我在事件处理器外部创建了该操作，以便稍后复用。如果你现在重新在模拟器中运行应用，警报将补充上一个“确定”按钮（图\
  \ 1-25）。\n\n![A453659_1_En_1_Fig25_HTML.jpg](img/A453659_1_En_1_Fig25_HTML.jpg)\n\
  \n*图 1-25. 带有默认操作的警报*\n\n```\nprivate const string title = \"Apress\";\nprivate\
  \ const string message = \"Hello, Xamarin.iOS!\";\nprivate UIAlertAction okAction\
  \ =\nUIAlertAction.Create(\"OK\", UIAlertActionStyle.Default, null);\npartial void\
  \ ButtonAlert_TouchUpInside(UIButton sender)\n{\nvar alertController = UIAlertController.Create(\n\
  title, message, UIAlertControllerStyle.Alert);\nalertController.AddAction(okAction);\n\
  PresentViewController(alertController, false, null);\n}\n```\n\n*代码清单 1-3. 向警报添加默认操作*\n\
  \n如代码清单 1-3 所示，要创建操作，你需要使用 `UIAlertAction` 类。具体来说，该类实现了静态的 `Create` 方法，该方法接受三个参数，如下所示：\n\
  \n- `title` — 使用此参数指定操作的标题；即警报中显示的操作标题文字。\n- `style` — 定义操作的样式或类型。所有可用的操作类型都以 `UIAlertStyle`\
  \ 枚举的值表示。该枚举定义了典型的操作，这些操作根据用户输入执行：\n    - `Cancel` — 此类型表示应取消给定操作，并且关联的应用状态或数据应保持不变。\n\
  \    - `Default` — 这是针对应用状态特定变更的默认操作。\n    - `Destructive` — 此类型通常用于确认删除特定的应用数据。\n\
  - `handler` 允许你定义一组语句，当用户点击操作按钮时将调用这些语句。\n\n在代码清单 1-3 中，我创建了一个标题为“OK”的 `Default`\
  \ 操作，该操作不调用任何其他逻辑（`handler` 参数为 `null`）。当然，你可以添加更多操作。在下一小节创建操作表时，我们将使用这种可能性。\n\n\
  \n\n### 操作表\n\n`Action sheet` 是 iOS 警告框的另一种样式。根据苹果公司的设计指南，操作表应依据当前上下文向用户呈现少数几个选项。具体来说，你应该使用此类对象来获取用户对删除应用数据特定元素的确认。创建操作表的方式与警告框类似，即使用\
  \ `UIAlertController` 类。为了明确说明这一点，现在让我们在 HelloWorld 应用中添加另一个按钮，点击该按钮时将显示一个操作表。为此，请在解决方案资源管理器中双击\
  \ `Main.storyboard` 进入 Storyboard 编辑器。然后，添加第二个按钮，并将其放置在 `ButtonAlert` 下方。将新按钮的名称和标题分别更改为\
  \ `ButtonActionSheet` 和 `ActionSheet`。调整其宽度和位置，然后创建默认事件处理程序（将其放置在 `ButtonAlert_TouchUpInside`\
  \ 下方）。按照代码清单 1-4 所示修改此处理程序的定义。最后，你可以重新运行应用，将会得到之前在图 1-1 中展示的结果。\n\n```\nprivate\
  \ UIAlertAction cancelAction =\nUIAlertAction.Create(\"Cancel\", UIAlertActionStyle.Cancel,\
  \ null);\npartial void ButtonActionSheet_TouchUpInside(UIButton sender)\n{\nvar\
  \ actionSheetController = new UIAlertController()\n{\nTitle = title,\nMessage =\
  \ message\n};\nactionSheetController.AddAction(okAction);\nactionSheetController.AddAction(cancelAction);\n\
  PresentViewController(actionSheetController, true, null);\n}\n代码清单 1-4.\n使用类构造函数创建\
  \ UIAlertViewController\n```\n\n代码清单 1-4 展示了创建 `UIAlertController` 类实例的另一种方法。我使用了该类的无参数构造函数，然后修改了结果对象的\
  \ `Title` 和 `Message` 属性。请注意，这里没有配置警告样式的属性，在此情况下，样式默认被设置为 `UIAlertControllerStyle.ActionSheet`。当然，你仍然可以使用\
  \ `UIAlertController` 的 `Create` 方法来创建操作表，但你需要将最后一个参数替换为 `UIAlertControllerStyle.ActionSheet`（请回看代码清单\
  \ 1-2）。\n\n在前述示例中，我通过两个操作来补充操作表：一个以默认样式创建（`okAction`），另一个以取消样式创建（`cancelAction`）。在图\
  \ 1-1 中，你可以注意到与这些操作相关联的按钮在外观上的差异。取消按钮与确定按钮相比有所区别。\n\n最后，为了呈现操作表，我使用了与之前相同的方法 `PresentViewController`，但将其第二个参数改为\
  \ `true`，这样警告框的呈现将带有动画效果。重新运行应用后，你将得到之前图 1-1 中所示的结果。\n\n## 总结\n\n在本章中，我们准备了一个开发环境，该环境将在后续章节中使用。然后，我们讨论了用于创建\
  \ iOS 应用的可用项目模板，并实现了我们的第一个单视图 HelloWorld 应用，该应用展示了各种警告框。在下一章中，我们将利用此处开发的源代码来分析应用结构，并讨论每个\
  \ Xamarin.iOS 应用最重要的元素。\n\n"
- "# 2. 应用结构与生命周期\n\n在本章中，你将了解应用最重要的元素及其之间的关系。我们将首先探讨应用入口点以及 Xamarin.iOS 如何与原生 iOS\
  \ SDK 交互。随后，我们将了解应用和视图生命周期、应用能力的声明以及访问故事板的属性。此外，我们还将分析在苹果平台编程中使用的模型-视图-控制器设计模式。最后，我们将把视图生命周期与\
  \ MVC 模式结合起来，以在设备内存中存储数据。\n\n## 入口点\n\nHelloWorld 应用与任何其他 C# 应用一样，从 `Application`\
  \ 类的静态 `Main` 方法开始执行。无论你是在创建控制台应用、通用 Windows 平台应用、ASP.NET Web 应用程序，还是 .NET Core\
  \ 或 Xamarin.iOS 应用，这一点都适用。所有这些应用都使用 `Application.Main` 方法作为入口点。然而，此方法的具体实现在这些应用类型之间有所不同。对于\
  \ Xamarin.iOS，`Main` 方法的实现是针对 iOS 平台量身定制的。更具体地说，如代码清单 2-1 所示，`Application.Main`\
  \ 方法调用了 `UIApplication` 类中同名的方法。`UIApplication` 类封装了 Xamarin.iOS 应用的主要处理循环。与所有其他具有图形用户界面的应用一样，此处理循环处理与应用生命周期相关的事件（激活、前后台切换）、由用户触发的事件（如触摸、输入数据、切换视图）或由操作系统触发的事件（系统重启、内存警告）。\n\
  \n重要的是，每个 iOS 应用只创建一个 `UIApplication` 类或其子类的实例。在内部，`UIApplication` 类使用另一个实现了 `UIApplicationDelegate`\
  \ 接口的类。后者专门用于处理应用生命周期。因此，来自代码清单 2-1 的 `Main` 方法除了接受命令行参数（`args`，即字符串数组）外，还接受另外两个参数：`principalClassName`\
  \ 和 `delegateClassName`。第一个参数指定了从 `UIApplication` 派生的类的名称。如果你想使用默认的 `UIApplication`\
  \ 类，则为 `principalClassName` 传递 `null`。第二个参数 `delegateClassName` 允许你指定实现了 `UIApplicationDelegate`\
  \ 的类的名称。默认情况下，`delegateClassName` 被设置为 `AppDelegate`。你将在本章后面了解这个类，因为它是 HelloWorld\
  \ 以及任何其他 Xamarin.iOS 项目的一部分。\n\n```\nnamespace HelloWorld\n{\npublic class Application\n\
  {\nstatic void Main(string[] args)\n{\nUIApplication.Main(args, null, \"AppDelegate\"\
  );\n}\n}\n}\n代码清单 2-1.\nXamarin.iOS 应用的入口点\n```\n\n为了解释处理循环封装的含义，让我们分析一下 Xamarin.iOS\
  \ 的源代码，该代码可在此处获得：[`http://bit.ly/xamarin_ios_code`](http://bit.ly/xamarin_ios_code)。这一分析也有助于我们更好地理解\
  \ Xamarin.iOS 究竟是什么。具体来说，`UIApplicationClass` 的定义（[`http://bit.ly/UiApplication`](http://bit.ly/UiApplication)）显示，其\
  \ `Main` 方法（代码清单 2-2）在获取 principal 和 delegate 类名称的句柄后，调用了 `Main` 方法的另一个版本。后者，如代码清单\
  \ 2-3 所示，首先调用 `Initialize` 方法。此方法配置了线程同步上下文，用于通过 UI 线程更新控件。然后，`Main` 方法调用了 `UIApplicationMain`\
  \ 函数，该函数在一个外部的 Objective-C 库中声明。这个库来自 iOS SDK。现在你可以看到，Xamarin.iOS 最简单的定义就是一组 C#\
  \ 绑定，这些绑定通过 Objective-C 库暴露了原生 iOS SDK。因此，Xamarin.iOS 允许你开发原生应用，并拥有对该平台 SDK 的完全访问权限。正因如此，Xamarin\
  \ 应用被称为原生移动应用。\n\n\n\n```csharp\npublic static void Main(string[] args, string principalClassName,\n\
  string delegateClassName)\n{\n    IntPtr principal = principalClassName != null\
  \ ?\n        new NSString(principalClassName).Handle : IntPtr.Zero;\n    IntPtr\
  \ delegatec = delegateClassName != null ?\n        new NSString(delegateClassName).Handle\
  \ : IntPtr.Zero;\n    Main(args, principal, delegatec);\n}\n```\n**代码清单 2-2.** HelloWorld\
  \ 应用入口点中调用的 `UIApplication.Main` 方法的定义\n\n```csharp\nstatic void Main(string[] args,\
  \ IntPtr principal, IntPtr @delegate)\n{\n    Initialize();\n    UIApplicationMain(args.Length,\
  \ args, principal, @delegate);\n}\n[DllImport(\"__Internal\")]\nextern static int\
  \ UIApplicationMain(int argc, string[] argv,\n    IntPtr principalClassName, IntPtr\
  \ delegateClassName);\n```\n**代码清单 2-3.** 对 iOS SDK 中 Objective-C 库实现的 `UIApplicationMain`\
  \ 方法的实际调用\n\n要从 Objective-C 库中调用函数，需要使用平台调用服务（P/Invoke）。在此机制中，首先使用 `extern` 和 `static`\
  \ 关键字声明 C# 方法，并用 `DllImportAttribute` 装饰此声明。该属性用于指定要加载的库的物理位置。如果库导出的函数名称与 C# 代码中声明的方法名称不同，可以通过`DllImportAttribute`\
  \ 选择性地指定该函数名称。完成声明后，通过调用 C# 方法来调用外部函数，方式与代码清单 2-3 完全相同。然而，如代码清单 2-3 所示，C# 方法的 `DllImportAttribute`\
  \ 并未包含外部库的路径，而是使用了 `__Internal` 字符串。这会指示 P/Invoke 从编译到应用中的静态库加载函数。\n\n不过，我的 C# 代码究竟是如何转化为实际的\
  \ iPhone 或 iPad 应用的呢？当我们在 Visual Studio 中通过名为 `mtouch` 的工具编译项目时，这一过程会自动完成。`Mtouch`\
  \ 是一个命令行程序，它将你的 C# .NET 代码转换为应用包，然后由 iOS 执行。以 HelloWorld 应用为例，我们为模拟器编译后，可以在 HelloWorld\
  \ 项目的以下子文件夹中找到该应用包：`bin\\iPhoneSimulator\\Debug\\device-builds\\iphone9.1-10.3\\\
  HelloWorld.app`。打开此文件夹，你会看到许多文件。现在，我们只指出其中相关的几个。首先，应用包包含 `Xamarin.iOS.dll`，它提供了对\
  \ iOS SDK 的绑定。其次，还有一个 `mscorlib.dll` 文件，它实现了微软公共对象运行时库（Microsoft Common Object Runtime\
  \ Library），这是所有微软 .NET 应用的运行时环境。最后，还有其他几个 .NET 库，如 `System.dll`、`System.Core.dll`\
  \ 和 `System.Xml.dll`。在 HelloWorld 应用项目中引用它们是为了使用 .NET 框架中的基本类型和功能。\n\n现在，我们对 Xamarin.iOS\
  \ 最重要的幕后方面有了扎实的理解，可以继续学习 `AppDelegate` 类了。\n\n## AppDelegate\n\n为了讨论 `AppDelegate`\
  \ 类，让我们从 HelloWorld 项目中打开 `AppDelegate.cs` 文件。首先，检查类声明时，你会看到 `AppDelegate` 实现了 `UIApplicationDelegate`\
  \ 接口。其次，`AppDelegate` 声明使用了 `RegisterAttribute` 进行装饰。该属性在 Xamarin.iOS 中实现，用于向 Objective-C\
  \ 运行时注册一个类。之所以需要此注册，是因为 `AppDelegate` 类的实例会被传递给 Objective-C 函数 `UIApplicationMain`。第三，`AppDelegate`\
  \ 实现了一个类型为 `UIWindow` 的属性 `Window`。`UIWindow` 代表 iOS 应用中视图的容器。因此，你可以使用此属性来控制该容器。最后，`AppDelegate`\
  \ 重写了 `UIApplicationDelegate` 中的许多方法。你可以使用这些方法在应用生命周期中处理特定的应用事件。为了清晰展示这些生命周期的进展，让我们根据代码清单\
  \ 2-4 修改 `AppDelegate`。\n\n```csharp\nusing System.Diagnostics;\nusing Foundation;\n\
  using UIKit;\n\nnamespace HelloWorld\n{\n    [Register(\"AppDelegate\")]\n    public\
  \ class AppDelegate : UIApplicationDelegate\n    {\n        public override UIWindow\
  \ Window { get; set; }\n\n        public override bool WillFinishLaunching(\n  \
  \          UIApplication application, NSDictionary launchOptions)\n        {\n \
  \           DisplayInfo(\"WillFinishLaunching\", application);\n            return\
  \ true;\n        }\n\n        public override bool FinishedLaunching(\n        \
  \    UIApplication application, NSDictionary launchOptions)\n        {\n       \
  \     DisplayInfo(\"FinishedLaunching\", application);\n            return true;\n\
  \        }\n\n        public override void OnResignActivation(\n            UIApplication\
  \ application)\n        {\n            DisplayInfo(\"OnResignActivation\", application);\n\
  \        }\n\n        public override void DidEnterBackground(\n            UIApplication\
  \ application)\n        {\n            DisplayInfo(\"DidEnterBackground\", application);\n\
  \        }\n\n        public override void WillEnterForeground(\n            UIApplication\
  \ application)\n        {\n            DisplayInfo(\"WillEnterForeground\", application);\n\
  \        }\n\n        public override void OnActivated(UIApplication application)\n\
  \        {\n            DisplayInfo(\"OnActivated\", application);\n        }\n\n\
  \        public override void WillTerminate(UIApplication application)\n       \
  \ {\n            DisplayInfo(\"WillTerminate\", application);\n        }\n\n   \
  \     private void DisplayInfo(string eventName,\n            UIApplication application)\n\
  \        {\n            Debug.WriteLine($\"App event: {eventName}.\"\n         \
  \       + $\"App state: {application.ApplicationState}\");\n        }\n    }\n}\n\
  ```\n**代码清单 2-4.** `AppDelegate` 类的修改定义\n\n在代码清单 2-4 中，有一个新的公共方法 `WillFinishLaunching`\
  \ 和一个私有方法 `DisplayInfo`。`WillFinishLaunching` 处理对应的应用事件，而 `DisplayInfo` 的实现用于呈现关于应用事件的信息。因此，该方法在每个应用事件处理程序中被调用，这些处理程序是基类（`UIApplicationDelegate`）中相应事件处理程序的重写版本。注意，我始终将应用事件的名称传递给\
  \ `DisplayInfo` 的第一个参数。然后，该方法会在应用输出中打印事件名称以及应用状态。为此，我使用了 `System.Diagnostics.Debug`\
  \ 类的 `WriteLine` 方法。为了获取应用的状态，我读取了 `UIApplication` 类的对应属性。该类的实例被传递给 `DisplayInfo`\
  \ 方法的第二个参数。\n\n应用状态由 `UIApplicationState` 枚举的以下值表示：\n\n\n\n*   `Active`（活跃）– 应用在前台运行并能响应用户操作。这意味着应用的用户界面（UI）对用户可见，且用户可与应用交互。\n\
  *   `Inactive`（非活跃）– 应用在前台运行但无法响应用户操作。在这种情况下，UI 可能仍然可见，但应用不做出响应。例如，当你在手机或模拟器中激活多任务选择时（请参考图\
  \ 1-24）就可能出现此状态。\n*   `Background`（后台）– 应用在后台运行，因此其 UI 不可见。不过，应用可以执行某种后台操作，比如从外部网络服务获取数据。\n\
  \n现在我们来看一下在应用生命周期中，应用程序事件处理程序是在哪个节点被调用的。为此，让我们在模拟器中启动应用，并打开 `Application Output`。默认情况下，此输出窗口是脱离停靠并最小化的，因此要激活此窗口，你需要点击位于\
  \ Visual Studio 屏幕右下角的 `Application Output ➤ HelloWorld` 栏（图 2-1）。\n\n![A453659_1_En_2_Fig1_HTML.jpg](img/A453659_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1.\n\nHelloWorld 应用输出，显示应用生命周期\n\n运行应用后，你会看到报告了三个应用事件：`WillFinishLaunching`、`FinishedLaunching`\
  \ 和 `OnActivated`（图 2-1）。首先，当 `UIApplication` 被创建时，会调用 `WillFinishLaunching` 事件处理程序。随后，应用启动后，会调用另一个方法\
  \ `FinishedLaunching`。通常，此方法用于创建应用窗口，并通过设置 `Window` 类的 `RootViewController` 属性来显示视图。不过，HelloWorld\
  \ 应用是通过模板创建的。在这种情况下，默认视图是在主故事板（main storyboard）中配置的。稍后我会解释，这是通过设置 `document` XML\
  \ 标签的 `initialViewController` 属性来完成的。请注意，应用在被激活之前是处于非活跃状态的。应用激活由专用事件 `OnActivated`\
  \ 报告。一旦应用活跃，其 UI 变为可见，你就可以开始点击我们之前创建的按钮了。应用将响应你的请求。\n\n通过比较 `WillFinishLaunching`\
  \ 和 `FinishedLaunching` 与所有其他与应用生命周期相关的事件处理程序的定义，我们可以看到它们包含一个额外的参数 `launchOptions`。此参数的类型是\
  \ `NSDictionary`，包含一组键值对条目。这些条目允许你确定应用是如何启动的，以及传入了哪些启动参数。你可以在此处找到所有可用键的列表以及如何使用它们的示例：[`http://bit.ly/launch_options`](http://bit.ly/launch_options)。\n\
  \n现在来看一下当我们把应用发送到后台时会发生什么。你可以在模拟器中按下以下键盘快捷键来实现：`COMMAND + SHIFT + H`。应用将会消失，你会看到另外两个事件处理程序被调用：`OnResignActivation`\
  \ 和 `DidEnterBackground`。你可以使用第一个事件来保存应用状态或释放应用在非活跃时不需要的任何资源。在 `OnResignActivation`\
  \ 之后，会触发 `DidEnterBackground` 应用事件。它会通知你应用状态已变为后台（请参考图 2-1）。\n\n现在，你可以通过点击模拟器中的\
  \ HelloWorld 应用图标将其发送到前台（见图 2-2）。此时会触发另外两个应用事件：`WillEnterForeground` 和 `OnActivated`。它们与将应用置于后台时触发的两个应用事件相对应，因此其用途是相反的。即，`WillEnterForeground`\
  \ 通知你应用即将进入前台，因此你可以使用相应的事件处理程序来恢复应用状态，并准备应用在前台所需的所有资源。随后，应用被激活，并通过 `OnActivated`\
  \ 事件通知你。\n\n![A453659_1_En_2_Fig2_HTML.jpg](img/A453659_1_En_2_Fig2_HTML.jpg)\n\n\
  图 2-2.\n\n带有 HelloWorld 应用图标的模拟器主屏幕\n\n最后，我们来看看当你通过多任务关闭应用时会发生什么（你可以像上一章那样，通过双击主屏幕按钮来激活多任务）。在这种情况下，会报告三个事件：`OnResignActivation`、`DidEnterBackground`\
  \ 和 `WillTerminate`。当你激活多任务时，前两个事件会被触发。所以，到目前为止，一切工作方式与你仅仅将应用置于后台时相同。一旦应用即将终止，会触发一个额外的事件\
  \ `WillTerminate`。你可以使用此事件来清理应用在后台工作时使用的任何资源。\n\n\n\n"
- "# 视图生命周期\n\n在上一节中，我们学习了应用程序的生命周期。对于单个视图，也存在类似的机制。视图事件由 `UIViewController` 类中实现的相应事件处理程序表示。你在与特定视图（其视图控制器）关联的派生类中重写这些处理程序。视图生命周期的事件处理程序用于准备视图。例如，你首先从设备内存中恢复数据，然后使用这些数据更新控件。这样，在视图呈现给用户之前，控件就已准备好显示数据。\n\
  \n为了演示特定视图事件何时被触发，我修改了 `ViewController` 类的源代码，添加了代码清单 2-5 中的方法。同样，这里有一个私有辅助方法 `DisplayInfo`，用于显示实际视图事件的名称。然后，我在以下五个视图事件处理程序中使用该方法：`ViewDidLoad`、`ViewWillAppear`、`ViewDidAppear`、`ViewWillDisappear`\
  \ 和 `ViewDidDisappear`。因此，我可以跟踪视图的生命周期。\n\n```\npublic override void ViewDidLoad()\n\
  {\n    base.ViewDidLoad();\n    DisplayInfo(\"ViewDidLoad\");\n}\npublic override\
  \ void ViewWillAppear(bool animated)\n{\n    base.ViewWillAppear(animated);\n  \
  \  DisplayInfo(\"ViewWillAppear\");\n}\npublic override void ViewDidAppear(bool\
  \ animated)\n{\n    base.ViewDidAppear(animated);\n    DisplayInfo(\"ViewDidAppear\"\
  );\n}\npublic override void ViewWillDisappear(bool animated)\n{\n    base.ViewWillDisappear(animated);\n\
  \    DisplayInfo(\"ViewWillDisappear\");\n}\npublic override void ViewDidDisappear(bool\
  \ animated)\n{\n    base.ViewDidDisappear(animated);\n    DisplayInfo(\"ViewDidDisappear\"\
  );\n}\nprivate void DisplayInfo(string eventName)\n{\n    Debug.WriteLine($\"View\
  \ event: {eventName}\");\n}\n代码清单 2-5. 处理视图生命周期\n```\n\n请注意，为了使用 `Debug` 类，你需要导入\
  \ `System.Diagnostics` 命名空间，在文件头部添加以下语句：\n\n```\nusing System.Diagnostics;\n```\n\
  \n在模拟器中重新运行应用程序后，我们将在应用程序输出窗口中看到一系列应用程序和视图事件（图 2-3）。正如我们所预期的，第一个视图事件处理程序 `ViewDidLoad`\
  \ 在应用程序加载后立即被调用。然后，当视图加载完成后，会触发另外两个事件：`ViewWillAppear` 和 `ViewDidAppear`。你可以使用它们来实现视图在显示给用户之前的准备逻辑。\n\
  \n为了触发其他视图事件，即 `ViewWillDisappear` 和 `ViewDidDisappear`，我使用 iOS 的多任务功能终止了应用程序。因此，`ViewWillDisappear`\
  \ 和 `ViewDidDisappear` 事件在应用程序进入后台后立即被调用（参见图 2-3 中应用程序输出的底部几行）。\n\n![A453659_1_En_2_Fig3_HTML.jpg](img/A453659_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3. 应用程序输出，显示应用程序和视图生命周期连续步骤中触发的事件\n\n正如我将在本章后面展示的，`ViewWillDisappear` 和 `ViewDidDisappear`\
  \ 被用于在视图消失时或消失后保存数据。\n\n## 信息属性列表\n\n到目前为止，我们只讨论了包含 C# 代码的文件。然而，HelloWorld 项目还有其他几个\
  \ iOS 应用程序所需的文件。其中一个文件就是信息属性列表（`Info.plist`）。该文件定义了应用程序的配置。当你在解决方案资源管理器中双击此文件时，将会看到如图\
  \ 2-4 所示的编辑器。此编辑器包含以下选项卡，你可以使用它们来配置不同的选项：\n\n![A453659_1_En_2_Fig4_HTML.jpg](img/A453659_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4. Visual Studio 中的信息属性列表编辑器\n\n*   **应用程序** – 使用此选项卡指定以下内容：\n    *   **应用标识**：应用程序名称、绑定标识符和版本\n\
  \    *   **部署信息**：目标 iOS 版本、设备系列（iPhone、iPad 或通用）、定义应用程序用户界面的故事板名称（主界面）、可用的应用程序方向以及配置状态栏外观\n\
  \    *   **应用图标和启动图片**：用于指定图标集合的名称以及将在应用程序启动时显示的故事板名称——即所谓的启动或闪屏\n    *   **iTunes\
  \ 插图**\n    *   **启用 Game Center 和地图集成**以及配置**后台模式**。\n*   **高级** – 在此选项卡中，你可以配置应用程序将支持的文件的**文档类型**和**通用类型标识符\
  \ (UTI)**。文档类型（如 PDF）用于定义应用程序将支持的文件。另一方面，UTI 指的是自定义文件类型。你还可以使用“高级”选项卡为应用程序定义 URL\
  \ 方案。\n*   **源** – 此选项卡用于为应用程序定义自定义属性。此功能在访问 iOS 的特定功能（如设备的定位服务）时是必需的。\n\n## 授权属性列表\n\
  \n授权属性列表，定义在 `Entitlements.plist` 文件中，指定了应用程序的功能。当你打开此文件时，Visual Studio for Mac\
  \ 会激活如图 2-5 所示的编辑器。此编辑器有两个选项卡：应用程序和源。第一个选项卡是你可以启用的各种应用程序功能（如 iCloud 集成或推送通知）的图形化表示，而源选项卡则允许你定义自定义功能。\n\
  \n![A453659_1_En_2_Fig5_HTML.jpg](img/A453659_1_En_2_Fig5_HTML.jpg)\n\n图 2-5. Visual\
  \ Studio 中的授权属性列表编辑器\n\n\n\n"
- '# 启动故事板


  我们刚了解到信息属性列表（Information Property List）允许我们指定故事板，用以定义启动屏幕。在 `HelloWorld` 应用中，该故事板保存为
  `LaunchScreen.storyboard`。如果在解决方案资源管理器中双击此文件，可视编辑器将会打开。此编辑器与 `Main.storyboard` 的情况完全相同，因此你可以用类似的方式定义启动屏幕。利用这个机会，我们来添加一个图像视图（Image
  View），它将在应用加载时显示一张图片。要添加图像视图，首先在工具箱中找到此对象，然后将其拖拽到代表设备的矩形上。随后，你可以调整其大小，使其填满整个视图，然后定义要显示的图像。要选择此图像，可使用图像视图的
  Image 属性（图 2-6）。默认情况下，此项为空，点击时会弹出文件浏览器。使用此浏览器选取你想要的任何图像。如果该文件位于目标目录之外，则会显示“添加新文件”对话框，如图
