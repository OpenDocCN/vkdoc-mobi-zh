  \ iOS 9.0。Visual Studio 会创建一个包含以下视图控制器的项目（见图 4-2）：\n\n![A453659_1_En_4_Fig2_HTML.jpg](img/A453659_1_En_4_Fig2_HTML.jpg)\n\
