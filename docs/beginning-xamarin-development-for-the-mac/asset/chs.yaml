  private void ReloadRow(UITableView tableView, NSIndexPath indexPath)\n{\nvar indexes\
  \ = RowIndexToArray(indexPath);\ntableView.ReloadRows(indexes, UITableViewRowAnimation.None);\n\
  }\n清单 7-20.\n显示用户详情\n```\n\n现在，表格源准备就绪，我可以使用它来创建`UITableView`并将其显示在应用的第一个视图中。在此之前，我在\
  \ iOS 设计器中，使用视图控制器的属性将其类设置为`UsersListViewController`，然后删除不再需要的`ViewController.cs`文件。随后，在`UsersListViewController`中，我声明以下私有成员（清单\
  \ 7-21）：\n\n*   `usersTable`，类型为`UITableView`，存储对表格的引用\n*   `AddUsersTable`，用于创建和配置表格\n\
  *   `GetFrameWithVerticalMargin`，一个方法，用于在视图框架顶部添加一个固定边距，为 iOS 状态栏预留空间\n\n```\nprivate\
  \ UITableView usersTable;\nprivate async Task AddUsersTable()\n{\nvar usersTableSource\
