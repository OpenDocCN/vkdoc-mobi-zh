  ## 检索天气预报


  在建立了 JSON 与 C# 对象之间的映射关系后，我继续实现向 OpenWeatherMap API 发送 HTTP `GET` 请求的类。这个类 `WeatherServiceHelper`（参见配套代码中
  `HelloTV` 应用的 `Helpers` 子文件夹）使用了 `HttpClient` 对象，我在第 7 章对此进行过说明。为了在 `HelloTV` 项目中使用
  `HttpClient` 类，我引用了 `System.Net.dll`，然后安装了 Newtonsoft.JSON NuGet 包。随后，我实现类构造函数来实例化
  `HttpClient`，并将其 `BaseAddress` 属性指向 OpenWeatherMap URL（清单 9-5）。


  ```

  private static HttpClient httpClient;

  static WeatherServiceHelper()

  {

  httpClient = new HttpClient()

  {

  BaseAddress = new Uri("http://api.openweathermap.org/data/2.5/weather")

  };

  }

  清单 9-5.

  为 OpenWeatherMap API 创建 HTTP 客户端

  ```


  配置 HTTP 客户端后，我可以开始发送天气预报请求了。为此，我在 `WeatherServiceHelper` 中实现了静态异步方法 `GetWeatherInfo`（清单
  9-6）。该方法接受两个参数。第一个参数存储城市名称，第二个参数定义 OpenWeatherMap 返回天气状况时使用的单位。显然，OpenWeatherMap
  可以使用不同的标度返回温度：开尔文、摄氏度或华氏度。要指定标度，你可以使用我在自定义枚举类型 `TemperatureUnit`（参见 `HelloTV` 应用中的
  `Enums\TemperatureUnit.cs` 文件）中定义的值之一：


  * `Default` – 表示应使用默认单位。在这种情况下，温度以开尔文表示（例如，参见清单 9-1）。

  * `Metric` – 指示 OpenWeatherMap API 使用公制单位，这意味着温度将以摄氏度给出。

  * `Imperial` – 表示英制单位，温度以华氏度表示。


  你传递给 `GetWeatherInfo` 方法的值随后用于创建请求的统一资源标识符 (URI)（清单 9-7）。此请求随后被发送到 OpenWeatherMap
  API。在收到响应后，我分析其状态码（`CheckStatusCode` 方法）。与第 7 章类似，当状态码不是 200（OK）时，我会引发一个异常。否则，我将响应主体转换为
  JSON 格式，并使用 `JsonConvert` 类对其进行反序列化。


  ```

  public static async Task GetWeatherInfo(

  string cityName, TemperatureUnit unit)

  {

  var getRequestUri = GetRequestUri(cityName, unit);

  var response = await httpClient.GetAsync(getRequestUri);

  CheckStatusCode(response.StatusCode);

  var jsonString = await response.Content.ReadAsStringAsync();

  return JsonConvert.DeserializeObject(jsonString);

  }

  private static void CheckStatusCode(HttpStatusCode statusCode)

  {

  if (statusCode != HttpStatusCode.OK)

  {

  throw new Exception($"意外的状态码: {statusCode}");

  }

  }

  清单 9-6.

  获取天气预报信息

  ```


  构建请求 URI 需要额外的说明。如清单 9-7 所示，我在基地址后附加了一个包含三个参数的查询字符串：


  * `appId` – 用于使用从 OpenWeatherMap 服务获取的标识符对请求进行身份验证

  * `q` – 指明应返回天气状况的城市或位置

  * `units` – 指定单位


  第一个参数的值是从私有字段 `appId`（清单 9-7）获取的，因此你需要将此字段更新为你在注册 OpenWeatherMap 服务时获得的值。其他查询字符串参数则从
  `GetRequestUri` 函数的参数中获得。请注意，我使用 `TemperatureUnit` 枚举来指定单位。为了将该类型的值转换为实际的查询字符串参数，我编写了一个辅助方法
  `TemperatureUnitToQueryString`，如清单 9-8 所示。


  ```

  private static string appId = "";

  private static string GetRequestUri(string cityName, TemperatureUnit unit)

  {

  return $"?appId={appId}"

  + $"&q={cityName}"

  + $"&{TemperatureUnitToQueryString(unit)}";

  }

  清单 9-7.

  准备请求 URI

  ```


  ```

  private static string TemperatureUnitToQueryString(TemperatureUnit unit)

  {

  var queryString = "units=";

  switch(unit)

  {

  case TemperatureUnit.Imperial:

  queryString += "imperial";

  break;

  case TemperatureUnit.Metric:

  queryString += "metric";

  break;

  }

  return queryString;

  }

  清单 9-8.

  创建单位查询字符串参数

  ```


  `WeatherServiceHelper` 类的最后一个元素是 `GetTemperatureUnitString` 方法。它确定表示温度单位的文本表示形式。对于英制和公制单位，我分别使用
  °F 和 °C，而对于默认标度，我使用 K 符号（清单 9-9）。


  ```

  public static string GetTemperatureUnitString(TemperatureUnit unit)

  {

  var unitString = string.Empty;

  var degSymbol = (char)176;

  switch (unit)

  {

  case TemperatureUnit.Imperial:

  unitString = $"{degSymbol}F";

  break;

  case TemperatureUnit.Metric:

  unitString = $"{degSymbol}C";

  break;

  case TemperatureUnit.Default:

  default:

  unitString = "K";

  break;

  }

  return unitString;

  }

  清单 9-9.

  获取表示温度标度的符号

  ```




