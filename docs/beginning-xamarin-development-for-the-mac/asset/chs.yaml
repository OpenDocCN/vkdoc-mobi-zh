- "# 文本输入\n\n从手表应用收集用户输入比从 iOS 应用更具挑战性，因为手表的屏幕小得多，且用户通常希望快速交互。因此，WatchKit 提供了专用的文本输入控制器，用于在\
  \ watchOS 上收集用户输入。如图 8-10 所示，该控制器以模态窗口的形式出现，包含一个预定义的建议值列表。此外，根据控制器配置的不同，你可以收集用户输入的**表情符号**、语音指令或手写内容。\n\
  \n![A453659_1_En_8_Fig10_HTML.jpg](img/A453659_1_En_8_Fig10_HTML.jpg)\n\n图 8-10.\
  \ 文本输入控制器的外观示例\n\n```\npartial void ButtonInput_Activated()\n{\nvar colors = new\
  \ string[]\n{\n\"Red\", \"Green\", \"Blue\", \"Orange\", \"Purple\"\n};\nPresentTextInputController(colors,\n\
  WKTextInputMode.AllowEmoji, DisplayUserResponse);\n}\n```\n\n代码清单 8-8. 使用 `TextInputController`\
  \ 收集用户输入\n\n为了演示如何使用文本输入控制器，我修改了 `HelloWatchKit.Watch` 应用下定义的第一个场景。具体来说，我添加了一个分隔线、一个按钮和一个标签。我将它们的水平和垂直对齐方式设置为居中。然后，我将按钮和标签的名称分别改为\
  \ `ButtonInput` 和 `LabelAnswer`。最后，我双击该按钮。这会创建一个默认的事件处理程序 `ButtonInput_Activated`，我按代码清单\
  \ 8-8 所示定义它。在 `ButtonInput_Activated` 事件处理程序中，我首先创建一个字符串数组，作为文本输入控制器中的预定义输入或建议列表。然后，我通过调用\
  \ `PresentTextInputController` 方法向用户展示该控制器，该方法在 `WKInterfaceController` 类中实现，并接受三个参数：\n\
  \n* `suggestions` – 一个字符串数组，包含显示在模态窗口中的预定义项。\n* `inputMode` – 指定输入类型，由 `WKTextInputMode`\
  \ 枚举中声明的值之一描述：\n  * `AllowEmojiAnimated` 和 `AllowEmoji` – 分别表示允许动态或静态表情符号。\n  *\
  \ `Plain` – 表示不允许使用表情符号。\n* `completion` – 用户关闭控制器后调用的一个操作。\n\n在代码清单 8-8 中，我允许静态表情符号，并使用\
  \ `DisplayUserResponse` 操作作为完成处理程序。如代码清单 8-9 所示，`DisplayUserResponse` 方法显示从文本输入控制器检索到的第一个项目，并将其显示在名称为\
  \ `LabelAnswer` 的标签中。文本输入控制器返回用户所选项目的集合，该集合作为 `NSArray` 对象的实例提供，然后传递给完成处理程序。\n\n\
  ```\nprivate void DisplayUserResponse(NSArray result)\n{\nvar answer = \"No answer\"\
  ;\nif (result != null)\n{\nif (result.Count > 0)\n{\nanswer = result.GetItem(0).ToString();\n\
  }\n}\nLabelAnswer.SetText(answer);\n}\n```\n\n代码清单 8-9. 展示用户选择的项目\n\n重新运行应用后，你可以按下按钮激活文本输入控制器。它的外观将如图\
  \ 8-10 之前所示。尝试点击其中一个建议值（颜色）或表情符号。你会看到文本输入控制器被关闭，并且所选值显示在底部标签中（图 8-11）。\n\n![A453659_1_En_8_Fig11_HTML.jpg](img/A453659_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11. 显示通过文本输入控制器收集到的用户输入\n\n"
- "# 强制触摸与导航\n\nApple Watch 配备了**强制触摸**传感器，可以检测你按压屏幕的力度。强制触摸也被定义为一种额外的手势。你可以使用它来扩展应用与用户交互的方式。在本节中，我们将学习如何使用强制触摸来激活一个包含城市名称列表的菜单。点击菜单项后，将显示另一个界面控制器。该控制器将显示所选城市的地理位置（图\
  \ 8-12）。\n\n![A453659_1_En_8_Fig12_HTML.jpg](img/A453659_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12. 强制触摸手势激活菜单，其中包含一个城市列表。当你点击某个项目时，会显示另一个视图。该视图显示所选城市的**地理坐标**。\n\n为了实现此功能，我打开\
  \ `Interface.storyboard`，从工具箱中向代表默认场景的界面控制器添加一个菜单。该菜单出现在文档大纲面板中界面控制器项目之下。我点击该条目，然后在属性面板中将菜单项数量从\
  \ 1 改为 2。这样就创建了两个菜单项。为了配置它们，我使用属性面板，在菜单项组下设置标题和图像属性如下（图 8-13）：\n\n![A453659_1_En_8_Fig13_HTML.jpg](img/A453659_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13. 显示第一个菜单项配置的属性面板\n\n* 第一个菜单项：**New York** 和 **More**\n* 第二个菜单项：**San Francisco**\
  \ 和 **Maybe**\n\n然后，我为每个菜单项声明操作事件，当用户点击每个菜单项时将调用这些事件。为此，我使用属性面板的事件选项卡，在事件处理方法名称字段中输入方法名并按回车键（参见图\
  \ 8-13 右侧部分）。Visual Studio 随后会询问我选择代码中的位置来插入事件处理程序的空定义。我将这些事件处理程序的名称分别设置为 `NewYorkItem_Tapped`\
  \ 和 `SanFranciscoItem_Tapped`。在定义这些事件处理程序之前，我回到 iOS 设计器，向故事板中添加新的界面控制器。使用该控制器的属性面板，我将它的类和标识符改为\
  \ `CityGeolocationController`。然后，我为这个界面控制器的视图补充三个标签。我将这些标签垂直和水平居中，并按图 8-12 所示堆叠它们。接着，我将第一个标签的\
  \ `Text` 属性设置为 `Geolocation:`，并将另外两个标签的名称分别更新为 `LabelLat` 和 `LabelLng`。\n\n鉴于 UI\
  \ 现已就绪并配置完成，我可以实现逻辑了。我首先向 `HelloWatchKit.WatchExtension` 项目添加一个新文件 `LocationHelper.cs`。在这个新文件中，我导入\
  \ `CoreLocation` 命名空间，然后定义一个静态类 `LocationHelper` 和一个自定义枚举 `City`，如代码清单 8-10 所示。\n\
  \n```\npublic static class LocationHelper\n{\npublic static CLLocation GetLocationForCity(City\
  \ city)\n{\nCLLocation result = null;\nswitch(city)\n{\ncase City.NewYork:\nresult\
  \ = new CLLocation(40.7127837, -74.0059413);\nbreak;\ncase City.SanFrancisco:\n\
  default:\nresult = new CLLocation(37.77493, -122.419416);\nbreak;\n}\nreturn result;\n\
  }\n}\npublic enum City\n{\nNewYork, SanFrancisco\n}\n```\n\n代码清单 8-10. `LocationHelper`\
  \ 类和自定义枚举 `City` 的定义\n\n`LocationHelper` 实现了一个静态方法 `GetLocationForCity`，该方法接受一个名为\
  \ `city` 且类型为 `City` 的参数。`City` 是定义了 `NewYork` 和 `SanFrancisco` 元素的枚举。根据 `city`\
  \ 参数的不同，`GetLocationForCity` 将返回 `CoreLocation.CLLocation` 类的一个实例，该实例存储了纽约或旧金山的地理坐标。我是从\
  \ Google 地理编码 API 获取这些地理坐标的。\n\n\n\n#### 修改类定义\n\n接下来，我打开`InterfaceController.cs`文件，修改`InterfaceController`类的定义。首先，我添加了`DisplayCityGeolocationController`方法，如清单\
  \ 8-11 所示。该方法从`LocationHelper`获取地理坐标，然后将其传递给`CityGeolocationController`，后者通过`PushController`方法进行初始化和呈现。该方法接受两个参数，如下所示：\n\
  \n-   `name` – 指定要显示的界面控制器的名称\n-   `context` – 可选参数，用于向目标界面控制器传递对象\n\n在这里，我将名称设置为`CityGeolocationController`，并将从`LocationHelper`获取的`CCLocation`类的实例作为上下文传递。\n\
  \n```\nprivate void DisplayCityGeolocationController(City city)\n{\nvar location\
  \ = LocationHelper.GetLocationForCity(city);\nPushController(\"CityGeolocationController\"\
  , location);\n}\nListing 8-11. Presenting the CityGeolocationController with Geocordinates\
  \ to Be Displayed\n```\n\n然后，我使用`DisplayCityGeolocationController`方法来实现与菜单项关联的事件处理程序，如清单\
  \ 8-12 所示。因此，新的界面控制器将根据用户的选择获得不同的地理坐标。\n\n```\npartial void NewYorkItem_Tapped()\n\
  {\nDisplayCityGeolocationController(City.NewYork);\n}\npartial void SanFranciscoItem_Tapped()\n\
  {\nDisplayCityGeolocationController(City.SanFrancisco);\n}\nListing 8-12. A Context\
  \ Is Passed to the CityGeolocationController\n```\n\n最后，我需要呈现地理坐标。为此，我修改了`CityGeolocationController.cs`文件，首先导入`CoreLocation`命名空间，然后修改`CityGeolocationController`类的定义（清单\
  \ 8-13）。我在该控制器的默认定义中补充了一个私有字段`location`、两个视图事件处理程序（`Awake`和`WillActivate`）以及一个私有方法`GetLocation`。后者用于从传递给界面控制器的上下文中获取`CLLocation`类的实例，并将结果对象存储在`location`字段中。为了访问上下文，我使用了`Awake`视图事件处理程序，并在其中调用`GetLocation`方法。随后，当界面控制器的视图即将呈现给用户时，我更改标签中显示的文本，使其呈现所选城市的纬度和经度。\n\
  \n要测试应用，请在 Apple Watch 模拟器中运行它。然后，将触摸压力改为深按（`COMMAND+SHIFT+2`）并按住模拟器屏幕片刻。这将启用先前在图\
  \ 8-12 中显示的菜单。现在，将触摸压力改为浅按（`COMMAND+SHIFT+1`）并点击其中一个项目。将呈现相应的地理坐标（图 8-12 的右侧部分）。\n\
  \n你现在可以轻松扩展此示例，并为`CityGeolocationController`的视图添加一个`Map`控件。给定地理坐标，你只需像我在第 3 章和第\
  \ 7 章中展示的那样设置地图中心和区域即可。\n\n```\npublic partial class CityGeolocationController :\
  \ WKInterfaceController\n{\nprivate CLLocation location;\npublic CityGeolocationController(IntPtr\
  \ handle) : base(handle)\n{\n}\npublic override void Awake(NSObject context)\n{\n\
  base.Awake(context);\nGetLocation(context);\n}\npublic override void WillActivate()\n\
  {\nLabelLat.SetText(location.Coordinate.Latitude.ToString());\nLabelLng.SetText(location.Coordinate.Longitude.ToString());\n\
  }\nprivate void GetLocation(NSObject context)\n{\nlocation = context as CLLocation;\n\
  if (location == null)\n{\nlocation = LocationHelper.GetLocationForCity(\nCity.SanFrancisco);\n\
  }\n}\n}\nListing 8-13. Presenting Latitude and Longitude\n```\n\n## 通知控制器\n\n通知实现了一种在应用未运行时向用户呈现新信息的机制。通常，远程通知是从云中运行的专用推送通知服务发送到移动或可穿戴终端设备的。通知也可以本地发送。在本节中，我们将学习如何在父\
  \ iOS 应用中创建本地通知。当 iPhone 锁定时，此通知将自动路由到 watchOS 应用。从 iOS 10 开始，Apple 引入了一种新的通知触发机制，该机制基于`UserNotifications`\
  \ API。用于触发本地通知的旧 API（适用于 iOS 8 和 iOS 9）在`UILocalNotification`类中实现。在本节中，我将使用`UserNotifications`\
  \ API。\n\n要使用此 API 触发本地通知，我使用 HelloWatchKit iOS 项目。首先，我打开故事板设计器，修改与默认视图控制器关联的视图，添加一个按钮。我打开此按钮的\
  \ Properties 面板，将按钮的标题设置为`Push notification`，名称设置为`ButtonLocalNotification`（图 8-14）。之后，我打开\
  \ Events 选项卡为`TouchUpInside`事件创建处理程序。最后，我根据清单 8-14 定义此事件处理程序。此代码要求我导入`UserNotifications`命名空间。\n\
  \n![A453659_1_En_8_Fig14_HTML.jpg](img/A453659_1_En_8_Fig14_HTML.jpg)  \nFigure\
  \ 8-14. A UI of the HelloWatchKit iOS app and local notification in the iPhone X\
  \ simulator\n\n```\npartial void ButtonLocalNotification_TouchUpInside(UIButton\
  \ sender)\n{\n// Notification content\nvar notificationContent = new UNMutableNotificationContent()\n\
  {\nTitle = \"Hello\",\nBody = \"Local notification was fired\",\n};\n// Notification\
  \ will be fired after 10 seconds\nvar notificationTrigger = UNTimeIntervalNotificationTrigger.\n\
  CreateTrigger(10, false);\n// Notification request\nvar notificationRequest = UNNotificationRequest.FromIdentifier(\n\
  Guid.NewGuid().ToString(), notificationContent, notificationTrigger);\nUNUserNotificationCenter.Current.AddNotificationRequest(\n\
  notificationRequest, null);\n}\nListing 8-14. Pushing a Local Notification\n```\n\
  \n如清单 8-14 所示，要创建本地通知，你需要使用`UNMutableNotificationContent`类。在这里，我使用默认构造函数实例化此类，然后使用`UNMutableNotificationContent`类的相应属性设置通知的标题和正文。随后，我使用`UNTimeIntervalNotificationTrigger`请求\
  \ iOS 在十秒后触发通知。最后，我使用`UNUserNotificationCenter`类将通知添加到用户通知中心。\n\n要允许你的应用发送本地通知，你还需要获取用户权限。为此，我打开\
  \ HelloWatchKit 的`AppDelegate.cs`文件，然后导入`UserNotifications`命名空间，并按照清单 8-15 所示修改`FinishedLaunching`事件处理程序。\n\
  \n你现在可以在任何 iPhone 模拟器中运行 HelloWatchKit 应用。该应用将显示一个警报，请求发送通知的权限。接受此警报，然后按下`Push notification`按钮并锁定\
  \ iPhone 屏幕。要锁定模拟器，我在键盘上按下`COMMAND+L`。片刻之后，将呈现一个本地通知（图 8-14）。\n\n```\npublic override\
  \ bool FinishedLaunching(UIApplication application,\nNSDictionary launchOptions)\n\
  {\nUNUserNotificationCenter.Current.RequestAuthorization(\nUNAuthorizationOptions.Alert,\
  \ (approved, error) => {\n});\nreturn true;\n}\nListing 8-15. Displaying a Notification\
  \ in the watchOS App\n```\n\n\n\n为了在 watchOS 模拟器上测试通知，运行 `HelloWatchKit.Watch` 应用。随后，转到\
  \ iPhone 模拟器，在那里打开 `HelloWatchKit` 应用。应用执行后，点击“推送通知”按钮，然后锁定 iPhone 屏幕，以确保本地通知将被路由到\
  \ Apple Watch。在 iOS 应用中点击按钮后大约十秒钟，通知将出现（图 8-15）。\n\n![A453659_1_En_8_Fig15_HTML.jpg](img/A453659_1_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15. watchOS 应用接收到的本地通知\n\n请注意，你也可以启动应用，使其在启动时显示一个通知控制器。要这样做，在调试目标下拉列表中选择相应的项；例如，`HelloWatchKit.Watch\
  \ – Notification`。你将很快看到图 8-16 所示的结果。如果你现在从 `HelloWatchKit.Watch` 包中打开 `Interface.storyboard`，你将看到通知控制器的视图并未反映在模拟器上看到的内容。这是因为本地通知的视觉外观由\
  \ `HelloWatchKit.Watch` 应用的 `PushNotificationPayload.json` 文件中声明的负载决定。\n\n![A453659_1_En_8_Fig16_HTML.jpg](img/A453659_1_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16. 默认通知控制器\n\n## ClockKit 和复杂功能控制器\n\n`ClockKit` 是一组类和方法，用于创建复杂功能。这些是出现在表盘上的视觉元素。复杂功能在某种程度上类似于通知，但以一种比通知更不具侵入性的方式，让用户访问应用提供的重要数据。要创建复杂功能，需要使用复杂功能控制器，该控制器已添加到\
  \ Watch 扩展包中。该控制器的定义存储在 `ComplicationController.cs` 文件中。打开此文件，你会看到 `ComplicationController`\
  \ 类派生自 `CLKComplicationDataSource`。后者来自 `ClockKit` 框架，并且是实现复杂功能的关键要素。具体来说，你在派生类中重写\
  \ `CLKComplicationDataSource` 中的方法，以控制复杂功能的外观。你至少需要实现以下方法：\n\n*   `GetPlaceholderTemplate`\
  \ – 为你的复杂功能提供一个视觉模板。`ClockKit` 使用此方法的结果在用户配置期间显示复杂功能的示例外观。你通常会使用伪造数据来创建此类模板，以使用户了解复杂功能的外观。此方法仅适用于\
  \ watchOS 2。\n*   `GetLocalizableSampleTemplate` – 功能与 `GetPlaceholderTemplate`\
  \ 类似，区别在于 `ClockKit` 使用它来获取可本地化（依赖于语言）的复杂功能模板。此方法仅适用于 watchOS 3 或更高版本。\n*   `GetCurrentTimelineEntry`\
  \ – `ClockKit` 使用此方法获取复杂功能的实际数据。\n*   `GetSupportedTimeTravelDirections` – 通知 `ClockKit`\
  \ 你的应用是否可以为复杂功能提供未来或过去的数据条目。\n\n因为 `ClockKit` 会调用上述方法，所以你需要通过回调将数据返回给该框架。也就是说，这些方法中的每一个都接受两个参数。第一个参数\
  \ `complication` 是 `CLKComplication` 类的一个实例，是复杂功能的抽象表示。另一个参数 `handler` 是你调用的操作（回调），用于传递复杂功能的数据。你通常使用\
  \ `CLKComplication` 类的实例，通过读取其 `Family` 属性来推断复杂功能的类型。根据此类型，你执行自定义逻辑，并最终调用 `handler`，在其中为\
  \ `ClockKit` 传递数据。让我们看看这在实践中是如何工作的。为此，我通过清单 8-16 中所示的方法，扩展了来自 `HelloWatchKit.WatchExtension`\
  \ 应用的 `ComplicationController` 类的定义。\n\n```csharp\nprivate CLKComplicationTemplate\
  \ CreateComplicationTemplate(\nCLKComplicationFamily complicationFamily, string\
  \ complicationText)\n{\nCLKComplicationTemplate template = null;\nswitch (complicationFamily)\n\
  {\ncase CLKComplicationFamily.ModularSmall:\ntemplate = new CLKComplicationTemplateModularSmallRingText()\n\
  {\nTextProvider = CLKSimpleTextProvider.FromText(complicationText),\nFillFraction\
  \ = 0.75f,\nRingStyle = CLKComplicationRingStyle.Open\n};\nbreak;\ncase CLKComplicationFamily.ModularLarge:\n\
  template = new CLKComplicationTemplateModularLargeStandardBody()\n{\nHeaderTextProvider\
  \ = CLKSimpleTextProvider.\nFromText(\"My Complication\"),\nBody1TextProvider =\
  \ CLKSimpleTextProvider.\nFromText(complicationText),\nBody2TextProvider = CLKTimeTextProvider.\n\
  FromDate(NSDate.Now)\n};\nbreak;\n}\nreturn template;\n}\n```\n清单 8-16. 创建复杂功能模板\n\
  \n\n\n### 排版后的文档\n\n第一个方法`CreateComplicationTemplate`用于通过两个独立的模板创建两个复杂功能——一个用于模块化小尺寸，一个用于模块化大尺寸。因此，`CreateComplicationTemplate`接受两个参数。第一个参数`complicationFamily`指定复杂功能类型，并接受`CLKComplicationFamily`枚举中定义的值之一。第二个参数`complicationText`保存要在复杂功能中显示的值。\n\
  \n`CreateComplicationTemplate`仅支持两种复杂功能：模块化小尺寸和模块化大尺寸。为了创建第一个，我使用了`CLKComplicationTemplateModularSmallRingText`。这实现了一种复杂功能的视觉样式，其中文本被进度环包围。你可以使用`CLKComplicationTemplateModularSmallRingText`类实例的以下属性来控制此模板的外观：\n\
  \n- `TextProvider` – 指定要显示的文本\n- `FillFraction` – 确定填充环的百分比\n- `RingStyle` – 指示环的样式，可以是打开的或闭合的\n\
  \n在清单 8-16 中，我将填充分数设置为 75%，环样式设置为打开。因此，清单 8-16 中的代码将生成图 8-17 所示的模块化小尺寸复杂功能。\n\n\
  ![A453659_1_En_8_Fig17_HTML.jpg](img/A453659_1_En_8_Fig17_HTML.jpg)\n\n图 8-17. 表盘上显示模块化小尺寸复杂功能的片段\n\
  \n为了创建模块化大尺寸复杂功能，我使用了`CLKComplicationTemplateModularLargeStandardBody`类。它可以由以下四个属性参数化：\n\
  \n- `HeaderTextProvider` – 指定在复杂功能标题中显示的文本\n- `Body1TextProvider` – 用于配置第一行正文文本（紧靠标题下方）中显示的文本\n\
  - `Body2TextProvider` – 指定可选的第二行正文文本\n- `HeaderImageProvider` – 指示在标题左侧显示的可选图像\n\
  \n`CreateComplicationTemplate`方法使用了前三个属性。标题显示固定字符串`My Complication`，而第一行和第二行分别描绘从`complicationText`参数获取的值和当前时间。图\
  \ 8-18 展示了此类复杂功能的示例。\n\n![A453659_1_En_8_Fig18_HTML.jpg](img/A453659_1_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18. 一个模块化大尺寸复杂功能\n\n模板准备就绪后，我现在通过另一个方法`CreateComplicationEntry`来扩展`ComplicationController`的定义（清单\
  \ 8-17）。它使用先前实现的`CreateComplicationTemplate`来创建包含当前日期的时间线条目。\n\n```\nprivate CLKComplicationTimelineEntry\
  \ CreateComplicationEntry(\nCLKComplicationFamily complicationFamily, string complicationText)\n\
  {\nvar template = CreateComplicationTemplate(\ncomplicationFamily, complicationText);\n\
  if (template != null)\n{\nreturn CLKComplicationTimelineEntry.Create(NSDate.Now,\
  \ template);\n}\nelse\n{\nreturn null;\n}\n}\nListing 8-17.\nCreating a Complication\
  \ Entry\n```\n\n我现在使用上述方法来实现`ClockKit`所需的功能。我从`GetPlaceholderTemplate`和`GetLocalizableSampleTemplate`开始（清单\
  \ 8-18）。在这两个方法中，我首先调用`CreateComplicationTemplate`方法。然后，将其结果（一个`CLKComplicationTemplate`类的实例）通过调用回调（一个操作处理器）传递给`ClockKit`。这符合我之前讨论的与`ClockKit`通信的一般方案。\n\
  \n```\npublic override void GetPlaceholderTemplate(CLKComplication complication,\n\
  Action handler)\n{\nvar template = CreateComplicationTemplate(\ncomplication.Family,\
  \ \"Sample text\");\nhandler(template);\n}\npublic override void GetLocalizableSampleTemplate(CLKComplication\
  \ complication,\nAction handler)\n{\nvar template = CreateComplicationTemplate(\n\
  complication.Family, \"Sample text\");\nhandler(template);\n}\nListing 8-18.\nProviding\
  \ Complication Templates to the ClockKit\n```\n\n上述方法准备就绪后，我现在重写`GetCurrentTimelineEntry`和`GetSupportedTimeTravelDirections`方法，如清单\
  \ 8-19 所示。我禁用了对时间旅行方向的支持，因为我仅为当前日期提供复杂功能。在`GetCurrentTimelineEntry`方法中，我使用了`ComplicationHelper`类，稍后将对此进行讨论。\n\
  \n```\npublic override void GetCurrentTimelineEntry(CLKComplication complication,\n\
  Action handler)\n{\nvar timelineEntry = CreateComplicationEntry(complication.Family,\n\
  ComplicationHelper.Answer);\nhandler(timelineEntry);\n}\npublic override void GetSupportedTimeTravelDirections(\n\
  CLKComplication complication,\nAction handler)\n{\nhandler(CLKComplicationTimeTravelDirections.None);\n\
  }\nListing 8-19.\nProviding a Current Timeline Entry and Supported Time-Travel Directions\n\
  ```\n\n根据`ClockKit`文档，每个应用程序的复杂功能使用都有预算限制，以保护系统资源。当你的应用程序达到限制时，`ClockKit`将调用`RequestedUpdateBudgetExhausted`。我重写了此方法，如清单\
  \ 8-20 所示，以便在应用程序输出中显示有关预算耗尽的信息。请注意，此方法要求你导入`System.Diagnostics`命名空间。\n\n```\npublic\
  \ override void RequestedUpdateBudgetExhausted()\n{\nDebug.WriteLine(\"RequestedUpdateBudgetExhausted\"\
  );\nbase.RequestedUpdateBudgetExhausted();\n}\nListing 8-20.\nHandling Exhaustion\
  \ of the Complication Update Budget\n```\n\n我的手表扩展包与`ClockKit`之间的通信已准备就绪。因此，我现在需要实现一个将强制复杂功能更新的逻辑。为此，我使用了`ClockKit`中的另一个类`CLKComplicationServer`。此类的实例代表复杂功能服务器，它管理复杂功能，并且特别可用于按需更新它们。为了在`HelloWatchKit.WatchExtension`中实现复杂功能更新，我添加了一个`ComplicationHelper.cs`文件，在其中导入`ClockKit`命名空间，然后定义`ComplicationHelper`类，如清单\
  \ 8-21 所示。\n\n```\npublic static class ComplicationHelper\n{\npublic static string\
  \ Answer { get; set; } = string.Empty;\npublic static void UpdateComplications()\n\
  {\nvar server = CLKComplicationServer.SharedInstance;\nforeach (var complication\
  \ in server.ActiveComplications)\n{\nserver.ReloadTimeline(complication);\n}\n}\n\
  }\nListing 8-21.\nA Definition of the ComplicationHelper\n```\n\n\n\n要访问复杂功能服务器，需要使用`CLKComplicationServer`类的静态属性`SharedInstance`。然后，要获取实际显示在表盘上的活跃复杂功能集合，需要读取`ActiveComplications`属性。该集合中的每个元素都是`CLKComplication`类的一个实例，并允许直接访问该复杂功能。具体来说，可以通过将相应对象传递给`CLKComplicationServer`类实例的`ReloadTimeline`方法（参见清单\
  \ 8-21 中的`UpdateComplications`方法）来强制更新该复杂功能。`ComplicationHelper`也有一个静态属性`Answer`，我使用它来将数据从界面控制器传递给复杂功能控制器。为了完成实现，我需要获取复杂功能的数据。为此，我修改了`DisplayUserResponse`方法（清单\
  \ 8-9），如清单 8-22 所示。即，我将使用文本输入控制器获取的值存储在`ComplicationHelper.Answer`属性中，然后使用`ComplicationHelper.UpdateComplications`方法强制更新所有活跃的复杂功能。\n\
  \n```\nprivate void DisplayUserResponse(NSArray result)\n{\n    var answer = \"\
  No answer\";\n    if (result != null)\n    {\n        if (result.Count > 0)\n  \
  \      {\n            answer = result.GetItem(0).ToString();\n        }\n    }\n\
  \    LabelAnswer.SetText(answer);\n    ComplicationHelper.Answer = answer;\n   \
  \ ComplicationHelper.UpdateComplications();\n}\nListing 8-22.\n更新复杂功能\n```\n\n要测试上述示例，需要退出\
  \ iPhone 和 Watch 模拟器，然后重新运行应用。之后，转到表盘，将触摸压力设置为深按，然后轻点手表屏幕。这会激活可以调整表盘的模式。滑动到模块表面（图\
  \ 8-18 的左侧部分），然后将触摸压力恢复为浅按后点击“自定义”按钮。进入自定义模式后，滑动到第二个屏幕，然后使用绿色矩形在复杂功能之间切换。转到左上角显示的复杂功能。接着，需要将鼠标光标放在数字表冠上，然后滚动鼠标或触摸板，直到看到`HelloWatchKit.Watch`复杂功能。对其下方的较大复杂功能执行相同操作（图\
  \ 8-19 的右侧部分）。完成后，按下数字表冠按钮。现在可以返回应用，并从文本输入控制器中选择任意项目，以便在主屏幕上看到更新后的复杂功能。\n\n![A453659_1_En_8_Fig19_HTML.jpg](img/A453659_1_En_8_Fig19_HTML.jpg)\n\
  \n图 8-19.\n\n配置复杂功能\n\n## 快速查看控制器\n\n`HelloWatchKit.WatchExtension`包的最后一个元素是快速查看控制器，用于向用户呈现静态信息。默认的快速查看控制器是在应用创建期间由\
  \ Visual Studio 生成的。当用户轻点与快速查看控制器关联的视图时，相应的应用会被激活。由于 watchOS 3 及更高版本中不可用快速查看，因此无法使用默认模拟器进行测试。所以，我只会展示如何检测应用是否从快速查看激活。如果是，界面控制器的标题将更改为相应的值。为了实现此功能，我向`HelloWatchKit.WatchExtension`应用添加了另一个文件`GlanceHelper.cs`，并在其中定义了清单\
  \ 8-23 中所示的静态类。该类只有一个属性`Key`，用于标识在快速查看和界面控制器之间传递的值。\n\n```\npublic static class\
  \ GlanceHelper\n{\n    public static NSString Key { get; } = new NSString(\"GlanceKey\"\
  );\n}\nListing 8-23.\n用于处理快速查看激活的辅助类\n```\n\n为了展示如何将数据从快速查看传递给界面控制器以指示它是通过快速查看激活的，我首先实现了`GlanceController`的`WillActivate`视图事件处理程序，如清单\
  \ 8-24 所示。我创建了`NSDictionary`对象，实现键值对的集合。在本例中，字典只包含一个元素，键为`GlanceKey`，值为`Glance-activated`。然后，我将此字典与`appIdentifier`一起传递给`UpdateUserActivity`方法。此方法用于将快速查看状态传递给实际应用。\n\
  \n```\npublic override void WillActivate()\n{\n    var appIdentifier = NSBundle.MainBundle.BundleIdentifier;\n\
  \    using (var nsDictionary = new NSDictionary\n        (GlanceHelper.Key, \"Glance-activated\"\
  ))\n    {\n        UpdateUserActivity(appIdentifier, nsDictionary, null);\n    }\n\
  }\nListing 8-24.\n从快速查看控制器激活时，将数据传递给应用\n```\n\n然后，要获取快速查看状态，需要在初始界面控制器中实现`HandleUserActivity`。清单\
  \ 8-25 展示了如何在`HelloWatchKit.WatchExtension`的`InterfaceController`类中检索键`GlanceKey`的值的示例。\n\
  \n```\npublic override void HandleUserActivity(NSDictionary userActivity)\n{\n \
  \   if (userActivity != null)\n    {\n        if (userActivity.ContainsKey(GlanceHelper.Key))\n\
  \        {\n            SetTitle(userActivity.ValueForKey(GlanceHelper.Key).ToString());\n\
  \        }\n    }\n}\nListing 8-25.\n接收从快速查看控制器传递的数据\n```\n\n## 总结\n\n在本章中，我们学习了如何为智能手表实现应用。我们涵盖了广泛的主题，从项目创建、使用手表模拟器、处理视图和应用事件，到使用专用控制器收集用户输入、创建力度触摸菜单、在界面控制器之间导航，以及通知、快速查看和复杂功能。这组教程使您能够独立地为\
  \ watchOS 编写完整的应用。在下一章中，我们将使用 tvOS 应用。\n\n"
- '# 9. tvOS


  电视是日常生活中又一个被电子产品和软件彻底改造的部分。像 Apple TV 这样的设备能将您的显示器变成一个智能设备，其用途远不止观看电视节目。您无需担心错过最喜欢的电视节目。相反，您才是掌控者，决定观看的时间和内容。此外，有了专门的应用程序和游戏，您的电视变得更加智能。本章将展示如何为
  Apple TV 构建此类自定义应用。具体来说，我将告诉您如何创建图 9-1 所示的完整 tvOS 应用。此应用将利用 OpenWeatherMap API 来显示您在文本字段中键入的城市名称的当前天气状况。


  ![A453659_1_En_9_Fig1_HTML.jpg](img/A453659_1_En_9_Fig1_HTML.jpg)


  图 9-1.


  适用于 Apple TV 的自定义天气应用




  '
- '# 创建项目


  我首先创建一个名为 `HelloTV` 的新 tvOS 项目。为此，我使用了 Visual Studio 新建项目对话框的 tvOS 选项卡中的新单视图应用（图
  9-2）。


  ![A453659_1_En_9_Fig2_HTML.jpg](img/A453659_1_En_9_Fig2_HTML.jpg)


  图 9-2. 创建 tvOS 项目


  随后，Visual Studio 会显示另一个屏幕，您可以在其中配置您的 tvOS 应用。基本上，您所执行的操作与为 iOS 和 watchOS 应用所做的非常相似。即，指定应用名称、组织标识符、团队和目标。在这里，我按图
  9-3 所示配置了 `HelloTV` 应用，然后进入下一步，确认我的项目位置。


  项目创建完成后，您很快会发现 `HelloTV` 应用的结构与 iOS 项目的组织方式相似。`HelloTV` 应用的入口点在 `Program` 类（`Main.cs`
  文件）的静态 `Main` 方法中实现。此方法的默认实现使用 `AppDelegate` 类在运行时启动和管理 tvOS 应用的生命周期。`AppDelegate`
  派生自 `UIApplicationDelegate`，与所有 iOS 应用中使用的完全相同。因此，处理 tvOS 应用相关事件的方式与在 iOS 应用中相同。基于此原因，具体的示例将省略。


  ![A453659_1_En_9_Fig3_HTML.jpg](img/A453659_1_En_9_Fig3_HTML.jpg)


  图 9-3. 项目配置


