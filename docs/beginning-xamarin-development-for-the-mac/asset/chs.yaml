  XML 文件层次结构。有一个根节点 `xml`，紧随其后的是 `document` 标签，其声明如代码清单 2-6 所示。我们可以看到此标签有许多属性，这些属性特别指定了文档类型、版本、目标运行时以及初始视图控制器的标识符。在
  `HelloWorld` 应用中，我们只有一个视图控制器，所以实际上我们无需考虑这一点。但是，如果一个应用有多个视图控制器，你可以在可视编辑器中选择初始的那个。你进入编辑器，然后打开视图控制器的“属性”窗口。接着，如图
