- "# 显示天气信息\n\n现在我们已经准备好获取并显示天气状况所需的一切，接下来将 UI 层与 `WeatherServiceHelper` 结合起来。为了实现这一功能，我实现了\
  \ `ViewController` 类。首先，我定义了 `DisplayWeatherInfo` 方法，如代码清单 9-10 所示。该方法接收一个 `WeatherInfo`\
  \ 类的实例（`weatherInfo` 参数），并在默认视图中显示其选定属性的值。此外，也可以为 `weatherInfo` 参数传递 `null`。在这种情况下，`DisplayWeatherInfo`\
  \ 会显示替代符号（`--`）来代替温度、湿度、气压和描述的实际值。\n\n```\nprivate async Task DisplayWeatherInfo(WeatherInfo\
  \ weatherInfo)\n{\n    var alternateSymbol = \"--\";\n    var tempUnit = WeatherServiceHelper.GetTemperatureUnitString(temperatureUnit);\n\
  \    var pressureUnit = \"hPa\";\n    if (weatherInfo == null)\n    {\n        LabelTemperature.Text\
  \ = $\"Temperature: {alternateSymbol}\";\n        LabelHumidity.Text = $\"Humidity:\
  \ {alternateSymbol}\";\n        LabelPressure.Text = $\"Pressure: {alternateSymbol}\"\
  ;\n        LabelDescription.Text = $\"Description: {alternateSymbol}\";\n    }\n\
  \    else\n    {\n        LabelTemperature.Text = \"Temperature: \" + $\"{weatherInfo.Main.Temp}\
  \ {tempUnit}\";\n        LabelHumidity.Text = \"Humidity: \" + $\"{weatherInfo.Main.Humidity}\
  \ %\";\n        LabelPressure.Text = \"Pressure: \" + $\"{weatherInfo.Main.Pressure}\
  \ {pressureUnit}\";\n        LabelDescription.Text = \"Description: \" + $\"{weatherInfo.Weather.FirstOrDefault().Description}\"\
  ;\n        ImageViewWeatherIcon.Image = await IconHelper.GetIcon(weatherInfo);\n\
  \    }\n}\n```\n\n在标签中显示文本非常直接。我只需将 `WeatherInfo` 类实例的属性值写入标签的 `Text` 属性即可。而要显示图标，则需要多花一些功夫。OpenWeatherMap\
  \ API 会返回图标标识符，你可以利用这些标识符获取实际 PNG 格式位图的 URL。此类 URL 的通用结构如下：\n\n`http://openweathermap.org/img/w/`\
  \ `<iconId>` `.png`\n\n其中 `<iconId>` 是你请求 OpenWeatherMap API 提供所选城市的当前天气状况时获取的值。图标标识符存储在\
  \ `Weather` 对象的 `Icon` 属性中。\n\n获得图标 URL 后，我必须下载该图标，然后将其转换为 `UIImage` 类的实例，以便在 Image\
  \ View 控件中显示。为了实现这一功能，我向 HelloTV 项目添加了 `IconHelper` 类（参见 `Helpers` 文件夹下的 `IconHelper.cs`\
  \ 文件）。`IconHelper` 类的完整定义见代码清单 9-11。如图所示，`IconHelper` 包含三个私有静态字段：`httpClient`、`baseAddress`\
  \ 和 `iconExtension`。第一个字段存储对 `HttpClient` 类实例的引用，用于实际从 OpenWeatherMap 服务下载表示位图的字节数组；第二个字段\
  \ `baseAddress` 存储用于获取图标的 URL 主体部分；最后一个字段 `iconExtension` 是一个常量，存储 `.png` 扩展名。从\
  \ `baseAddress` 和 `iconExtension` 获取的值，连同从 `WeatherInfo` 类实例获取的图标标识符，组合成最终的 URL（参见代码清单\
  \ 9-11 中的 `GetIconUrl` 方法）。生成的 URL 随后在 `GetIcon` 方法中使用，我将该 URL 作为 `HttpClient` 类实例的\
  \ `GetByteArrayAsync` 方法的参数传递。`GetByteArrayAsync` 返回一个表示图像数据的字节数组，我使用该数组通过静态方法 `LoadFromData`\
  \ 实例化 `UIImage` 类（代码清单 9-11 中 `GetIcon` 方法的最后一条语句）。请注意，要将 `GetByteArrayAsync` 返回的字节数组转换为\
  \ `UIImage.LoadFromData` 接受的 `NSData` 对象，我必须使用 `NSData` 类的静态方法 `FromArray`。\n\n\
  ```\npublic static class IconHelper\n{\n    private static HttpClient httpClient;\n\
  \    private static string baseAddress = \"http://openweathermap.org/img/w/\";\n\
  \    private static string iconExtension = \".png\";\n\n    static IconHelper()\n\
  \    {\n        httpClient = new HttpClient();\n    }\n\n    public static async\
  \ Task<UIImage> GetIcon(WeatherInfo weatherInfo)\n    {\n        var iconUrl = GetIconUrl(weatherInfo);\n\
  \        var imageData = await httpClient.GetByteArrayAsync(iconUrl);\n        return\
  \ UIImage.LoadFromData(NSData.FromArray(imageData));\n    }\n\n    private static\
  \ string GetIconUrl(WeatherInfo weatherInfo)\n    {\n        var iconName = weatherInfo.Weather.FirstOrDefault().Icon;\n\
  \        return $\"{baseAddress}{iconName}{iconExtension}\";\n    }\n}\n```\n\n\
  随后，我在 `ViewDidLoad` 事件处理程序（代码清单 9-12）中使用 `null` 参数调用 `DisplayWeatherInfo`。这样做是为了将所有标签的\
  \ `Text` 属性设置为初始值。在 `ViewDidLoad` 事件处理程序中，我还将 `ButtonGetCurrentWeather_PrimaryActionTriggered`\
  \ 方法与按钮的 `PrimaryActionTriggered` 事件关联起来。当用户轻点该按钮时，会触发此操作。\n\n```\npublic async\
  \ override void ViewDidLoad()\n{\n    base.ViewDidLoad();\n    await DisplayWeatherInfo(null);\n\
