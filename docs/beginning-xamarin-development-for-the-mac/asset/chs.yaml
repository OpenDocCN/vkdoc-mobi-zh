  \ 文件添加到 `Navigation.Tabs` 项目中。\n\n![A453659_1_En_4_Fig6_HTML.jpg](img/A453659_1_En_4_Fig6_HTML.jpg)\n\
  \n**图 4-6.** 将类与视图控制器关联\n\n在实现 `ThirdViewController` 类之前，我先向项目添加另一个文件 `BaseViewController.cs`，在其中定义所有其他视图控制器的基类（代码清单\
  \ 4-1）。我之所以使用基类，是因为我希望所有视图控制器在关联视图出现时都能遵循相似的逻辑。即，在应用程序输出中显示与视图关联的类名称。我实现这样的逻辑，是为了向您明确展示在选项卡间切换时会显示不同的视图。因此，您可以使用此选项来编写处理选项卡视图生命周期的自定义逻辑，就像处理所有其他视图一样。\n\
  \n```\nusing System;\nusing System.Diagnostics;\nusing Foundation;\nusing UIKit;\n\
  \nnamespace Navigation.Tabs\n{\n    public class BaseViewController : UIViewController\n\
  \    {\n        protected BaseViewController(IntPtr handle) : base(handle) { }\n\
  \        public override void ViewWillAppear(bool animated)\n        {\n       \
  \     base.ViewDidLoad();\n            Debug.WriteLine(GetType().Name);\n      \
  \  }\n    }\n}\n```\n\n**代码清单 4-1.** 视图即将出现时显示关联类型的名称\n\n有了 `BaseViewController`，我创建了\
  \ `ThirdViewController` 类的骨架，如代码清单 4-2 所示，并修改了 `FirstViewController` 和 `SecondViewController`\
  \ 的声明，使它们派生自 `BaseViewController` 而不是 `UIViewController`（代码清单 4-3）。\n\n```\npublic\
  \ partial class ThirdViewController : BaseViewController\n{\n    public ThirdViewController(IntPtr\
  \ handle) : base(handle) { }\n    public override void ViewDidLoad()\n    {\n  \
  \      base.ViewDidLoad();\n    }\n    public override void DidReceiveMemoryWarning()\n\
  \    {\n        base.DidReceiveMemoryWarning();\n    }\n}\n```\n\n**代码清单 4-2.**\
  \ `ThirdViewController` 类的骨架\n\n```\npublic partial class FirstViewController :\
  \ BaseViewController\npublic partial class SecondViewController : BaseViewController\n\
  ```\n\n**代码清单 4-3.** 修改后的 `FirstViewController` 和 `SecondViewController` 声明\n\n\
  上述更改确保当你运行应用并在选项卡之间切换时，你会在应用程序输出中看到类名称。但是，当你激活最后一个选项卡时，它将是空的，并且最后一个选项卡栏项目将显示默认按钮。要更改选项卡栏项目的图标和标题，我使用属性面板（请参阅图\
