  图 8-4. watchOS 应用的视图


  随后，我进入 `WatchExtension` 包并编辑 `InterfaceController.cs`。我首先导入 `System.Timers` 命名空间，然后扩展
  `InterfaceController` 类的定义，以便在标签中显示当前时间。因此，我将重复获取当前系统时间并显示在标签中。要实现这样的功能，通常会使用 `System.Timers.Timer`
  类。它实现了一种机制，允许你按指定的时间间隔执行一个方法。通过设置 `Timer` 类实例的 `Interval` 属性来指定时间间隔。完成此操作并启动计时器（`Start`
  方法）后，它将触发一个 `Elapsed` 事件。要执行自定义逻辑，你所需要做的就是处理该事件。由于此事件是在 UI 线程上调用的，因此在从 `Timer.Elapsed`
  事件处理程序中访问视觉控件时，无需担心线程安全问题，正如第 3 章所讨论的。


  在代码清单 8-1 中，我展示了一个私有字段和三个私有方法，用于实现数字手表。第一个函数 `ConfigureTimer` 用于创建 `Timer` 类的实例，该实例存储在
  `timer` 字段中。这里，`Timer` 类用于以一秒的间隔重复执行 `DisplayCurrentTime` 方法。该方法读取并格式化当前时间，然后使用
  `SetText` 方法将其显示在标签中。在代码清单 8-1 中，我还包含了一个用于启动和停止计时器的方法（`UpdateTimer`）。


  ```

  private Timer timer;

  private void ConfigureTimer()

  {

  if(timer == null)

  {

  timer = new Timer();

  timer.Elapsed += (sender, e) =>

  {

  DisplayCurrentTime();

  };

  timer.Interval = 1000;

  }

  }

  private void DisplayCurrentTime()

  {

  var time = String.Format("{0:HH:mm:ss}", DateTime.Now);

  LabelTime.SetText(time);

  }

  private void UpdateTimer(bool start = true)

  {

  if(start)

  {

  DisplayCurrentTime();

  timer.Start();

  }

  else

  {

  timer.Stop();

  }

  }

  ```


  代码清单 8-1. 使用计时器显示当前时间


  然后，我在 `InterfaceController` 的视图事件处理程序中使用 `ConfigureTimer` 和 `UpdateTimer` 方法。默认情况下，实现了三个这样的方法：`Awake`、`WillActivate`
  和 `DidDeactivate`。它们重写了 `WKInterfaceController` 中对应方法的基类实现，并且与 iOS 类似，对应于视图的生命周期。第一个方法
  `Awake` 在初始化接口控制器后不久由运行时调用。因此，你可以使用此方法来自定义初始化过程。所以，`Awake` 方法是创建和配置计时器的好地方。因此，如代码清单
  8-2 所示，我在此处调用了 `ConfigureTimer` 方法。此外，我还在此处使用了 `SetTitle` 方法，该方法会更改视图标题中显示的字符串（见图
  8-4）。


  ```

  public override void Awake(NSObject context)

  {

  base.Awake(context);

  SetTitle("你好，手表！");

  ConfigureTimer();

  Console.WriteLine("{0} awake with context", this);

  }

  ```


