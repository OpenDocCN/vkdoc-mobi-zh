  \ cellId);\n// 配置单元格属性\ncell.TextLabel.Text = user.Name;\ncell.DetailTextLabel.Text\
  \ = user.Company.Name;\nreturn cell;\n}\nprivate int GetUserId(NSIndexPath indexPath)\n\
  {\nreturn UsersRepository.Users[indexPath.Row].Id;\n}\n// 类的其余定义\n}\n清单 7-17.\n\
  UsersTableSource 类片段\n```\n\n我现在添加代表两个按钮的行操作，当用户在表格中滑动某个元素时，这些按钮会出现（请参考图 7-1）。如清单\
  \ 7-18 所示，第一个按钮的标题为`Remove`，当用户点击时，它将调用`DeleteUser`方法。第二个按钮的标题为`Details`，用于通过`DisplayUserDetails`辅助方法展示包含用户详情及其在地图上位置的第二个视图。\n\
  \n```\npublic override UITableViewRowAction[] EditActionsForRow(\nUITableView tableView,\
  \ NSIndexPath indexPath)\n{\nvar removeButton = UITableViewRowAction.Create(\nUITableViewRowActionStyle.Destructive,\n\
  \"Remove\",\ndelegate\n{\nDeleteUser(tableView, indexPath);\n});\nvar detailsButton\
  \ = UITableViewRowAction.Create(\nUITableViewRowActionStyle.Normal,\n\"Details\"\
  ,\ndelegate\n{\nDisplayUserDetails(tableView, indexPath);\n});\nreturn new UITableViewRowAction[]\
  \ { removeButton, detailsButton };\n}\n清单 7-18.\n创建行操作\n```\n\n为了删除用户，我在`UsersTableSource`类中实现了`DeleteUser`方法，如清单\
  \ 7-19 所示。该函数首先从仓库中移除用户，然后从列表中移除该项目。\n\n```\nprivate void DeleteUser(UITableView\
  \ tableView, NSIndexPath indexPath)\n{\nUsersRepository.Delete(GetUserId(indexPath));\n\
  tableView.DeleteRows(RowIndexToArray(indexPath),\nUITableViewRowAnimation.Automatic);\n\
  }\nprivate NSIndexPath[] RowIndexToArray(NSIndexPath indexPath)\n{\nreturn new NSIndexPath[]\
  \ { indexPath };\n}\n清单 7-19.\n删除用户\n```\n\n`DisplayUserDetails`方法的定义出现在清单 7-20\
  \ 中。此函数实例化`UserDetailsViewController`，该控制器与图 7-1 右侧所示的第二个视图相关联。然后，我使用此视图控制器的`User`属性将当前用户的数据从第一个视图传递到第二个视图。最后，我使用`UIViewController`类的`PresentViewController`方法导航到第二个视图。导航完成后，我重新加载当前行，以便当应用用户导航回第一个视图时，操作按钮不会出现。\n\
  \n```\nprivate void DisplayUserDetails(\nUITableView tableView, NSIndexPath indexPath)\n\
  {\n// 实例化视图控制器\nvar userDetailsViewController = ParentViewController.\nStoryboard.InstantiateViewController(\"\
