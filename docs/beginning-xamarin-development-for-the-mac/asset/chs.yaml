  ## 总结


  在本章中，我们学习了如何实现一个通过 HTTP 协议与 Web 服务交互的 Xamarin.iOS 应用。为此，我们使用了 `System.Net.Http`
  程序集中的 `HttpClient` 类，并实现了一个用于从远程 RESTful 服务消费数据和向其发送数据的类。我们还创建了一个与远程资源同步的本地数据存储。随后，我们创建了单元测试来自动验证我们实现的正确性。最后，我们创建了显示从远程服务检索到的信息的应用。因为
  `HttpClient` 类也可用于其他平台，包括通用 Windows 平台和 Android.iOS，所以我们也可以使用此处介绍的技术为这些平台开发 REST
  API 客户端。本章结束我们激动人心的 iOS 应用开发之旅。在下一章中，我们将学习如何为可穿戴的 Apple Watch 平台创建应用。




