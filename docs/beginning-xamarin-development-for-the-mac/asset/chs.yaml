  \n图 1-17. Storyboard 编辑器\n\n\n\n### 用户界面\n\n要继续操作，让我们将按钮添加到视图中。你可以通过从工具箱中将按钮控件拖放到视图上来实现。接着，你可以点击已插入的控件，然后使用\
  \ `Properties`（属性）窗口修改按钮的可视外观。如图 1-19 所示，`Properties`（属性）窗口的内容被划分为三个选项卡：`Widget`（控件）、`Layout`（布局）和\
  \ `Events`（事件）。使用第一个选项卡可以调整标识和可视外观。`Layout`（布局）选项卡允许你指定控件的尺寸以及它与其他控件的排列方式。最后一个选项卡\
  \ `Events`（事件）会显示特定控件触发的事件列表，以及这些事件关联的方法（即事件处理程序）。\n\n首先，进入 `Widget`（控件）选项卡，将 `Name`（名称）属性（位于\
  \ `Identity`（标识）组）更改为 `ButtonAlert`，并将 `title`（标题）属性（位于 `Button`（按钮）组）更改为 `Hello,\
  \ World!`。请注意，这些更改会自动在预览窗口中反映出来。具体来说，你会看到按钮标题并不适配控件大小。要调整可视控件的大小，你可以使用 `Properties`（属性）窗口中的\
  \ `Layout`（布局）选项卡，也可以在预览窗口中手动调整控件。我选择了第一种方式来调整按钮大小。因此，在 `Layout`（布局）选项卡中，我将按钮宽度设置为\
  \ 100，其他参数（如 `X`、`Y`、高度和排列）保持不变。更改按钮大小后，内部文本完全可见了。但是，按钮不再位于视图中央。要将其放回中央，可以按下 `Arrange`（排列）部分中\
  \ `Position in Parent`（父级中的位置）选项的第一个按钮（见图 1-19 右侧部分）。\n\n![A453659_1_En_1_Fig19_HTML.jpg](img/A453659_1_En_1_Fig19_HTML.jpg)\n\
  \n图 1-19.\n按钮控件属性的 `Widget`（控件）（左）和 `Layout`（布局）选项卡\n\n调整好按钮后，我们可以创建第一个事件处理程序，它将向用户显示消息。有两种方法可以实现。最简单的方法是在预览模式下双击按钮。这会切换视图以显示\
  \ `ViewController.cs` 的内容。此外，还会出现一个标题为“Add event handler”（添加事件处理程序）的小弹出窗口。如图 1-20\
