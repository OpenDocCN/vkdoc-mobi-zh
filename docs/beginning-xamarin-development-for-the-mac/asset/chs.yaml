- "# REST 服务客户端\n\n为了实现 `Users.MobileClient` 应用，我首先使用单视图应用模板创建了一个新的 iOS 项目。然后，我添加了两个依赖项，用于通过\
  \ HTTP 与 REST API 进行通信：\n\n*   `System.Net.Http`，提供了 `HttpClient` 类的实现，我使用它与 REST\
  \ API 通信。\n*   `Newtonsoft.Json` 或 `Json.NET` NuGet 包，实现了用于序列化和反序列化 JSON 对象的几个类和方法。更具体地说，使用这个包，你可以几乎自动地将从\
  \ Web 服务接收到的响应映射到 C# 对象或此类对象的集合。\n\n为了引用 `System.Net.Http` 程序集，我右键单击 `Users.MobileClient`\
  \ 应用的“References”节点并选择“Edit References”，这会打开图 7-2 所示的窗口。随后，在“All”选项卡上，我勾选了“`System.Net.Http`”。\n\
  \n![A453659_1_En_7_Fig2_HTML.jpg](img/A453659_1_En_7_Fig2_HTML.jpg)\n\n图 7-2. 添加对\
  \ `System.Net.Http` 的引用\n\n我使用“Add Packages”窗口安装 `Newtonsoft.Json` NuGet 包，在窗口中输入\
  \ `Newtonsoft.Json`（图 7-3）。然后，我选中包列表中的第一个条目，并点击“Add Package”按钮。\n\n项目及其所有依赖项准备就绪后，在\
  \ `Users.MobileClient` 项目下，我创建了新文件夹 `Helpers`，在其中添加了一个文件 `UsersServiceHelper.cs`，该文件存储了同名的静态类。这个\
  \ `UsersServiceHelper` 类用于向 REST API 发送请求。如代码清单 7-2 所示，`UsersServiceHelper` 实现了一个静态构造函数，用于创建\
  \ `HttpClient` 类实例。为此，我使用了 `HttpClient` 的无参构造函数，并将其 `BaseAddress` 属性设置为 REST API\
  \ 的 URL（JSONPlaceholder 中的 Users 资源）。完成后，你就可以使用 `HttpClient` 类实例中的相应方法开始向 REST API\
  \ 发送请求。这些方法实现了相应的 REST 动词。例如，要删除用户，你可以使用 `DeleteAsync` 方法（代码清单 7-3）。\n\n![A453659_1_En_7_Fig3_HTML.jpg](img/A453659_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 安装 `Newtonsoft.Json`（又名 `Json.NET`）NuGet 包\n\n```\nprivate static readonly\
  \ HttpClient httpClient;\nstatic UsersServiceHelper()\n{\nhttpClient = new HttpClient()\n\
  {\nBaseAddress = new Uri(\"http://jsonplaceholder.typicode.com/users/\")\n};\n}\n\
  ```\n\n代码清单 7-2. `UsersServiceHelper` 类的一个构造函数\n\n`HttpClient` 类中每个实现 HTTP 请求的特定方法都会返回一个\
  \ `HttpResponseMessage` 类型的对象。顾名思义，后者是 Web 服务器响应的抽象表示。因此，为了检查请求的状态并获取从服务器返回的数据，你需要读取\
  \ `HttpResponseMessage` 的属性。在代码清单 7-3 中，我展示了如何通过访问 `StatusCode` 属性来检查 HTTP 状态码。该属性是\
  \ `HttpStatusCode` 枚举类型，包含了所有可能的 HTTP 状态码。为了获取从 Web 服务接收的实际数据，你需要使用 `HttpContent`\
  \ 类型的 `Content` 属性。这个类代表 HTTP 消息的正文，并提供了几种方法，使你能够将正文读取并转换为特定格式：字符串（`ReadAsStringAsync`\
  \ 方法）、字节数组（`ReadAsByteArray` 方法）或流（`ReadAsStreamAsync` 方法）。\n\n```\npublic static\
  \ async Task Delete(int userId)\n{\nvar response = await httpClient.DeleteAsync($\"\
  {userId}\");\nCheckStatusCode(response.StatusCode);\n}\nprivate static void CheckStatusCode(HttpStatusCode\
  \ statusCode)\n{\nif(statusCode != HttpStatusCode.OK)\n{\nthrow new Exception($\"\
  Unexpected status code: {statusCode}\");\n}\n}\n```\n\n代码清单 7-3. 删除用户\n\n在代码清单 7-4\
  \ 中，展示了 `UsersServiceHelper` 类的 `Get` 方法，我使用了 `ReadAsStringAsync` 方法，因为从 Web 服务返回的数据是\
  \ JSON 格式的（代码清单 7-4）。得到该字符串后，我使用 `JsonConvert` 类的 `DeserializeObject` 静态方法将其反序列化为\
  \ `User` .NET 对象的集合。`JsonConvert` 类来自 `Newtonsoft.Json`，是用于在 JSON 和 .NET 对象之间进行转换的主类。\n\
  \n```\npublic static async Task<List<User>> Get()\n{\nvar response = await httpClient.GetAsync(string.Empty);\n\
  CheckStatusCode(response.StatusCode);\nvar jsonString = await response.Content.ReadAsStringAsync();\n\
  return JsonConvert.DeserializeObject<List<User>>(jsonString);\n}\n```\n\n代码清单 7-4.\
  \ 从 REST API 检索用户列表\n\n请注意，为了正确转换 .NET 和 C# 对象，你需要实现属性与 JSON 对象中相应键对应的 C# 类。为了方便起见，你可以使用可用的在线服务之一，这些服务基于\
  \ JSON 对象生成 C# 类。在这里，我使用了 [`https://jsonutils.com`](https://jsonutils.com) 网站，将代码清单\
  \ 7-1 中的 JSON 对象粘贴到 JSON 文本或 URL 文本区域中，选择 C# 语言，并勾选“Pascal Case”。点击“Submit”按钮后，网站会生成四个类：`Geo`、`Address`、`Company`\
  \ 和 `Example`。我将后者重命名为 `User`，然后将所有这些类存储在我添加到 `Users.MobileClient` 项目的 `Models`\
  \ 文件夹下的单独文件中。\n\n如代码清单 7-5 所示，`User` 类的定义包含八个自动实现的公共属性，这些属性直接对应 JSON 对象的键（代码清单 7-1）。复杂类型（`Address`\
  \ 和 `Company`）的属性由同名的类表示。它们的结构类似于 `User` 类。即，它们包含适当的自动实现的公共属性。因此，此处不再列出。你可以在随附的代码中找到它们（`Chapter_07/Users.MobileClient/Models`）。\n\
  \n```\npublic class User\n{\npublic int Id { get; set; }\npublic string Name { get;\
  \ set; }\npublic string Username { get; set; }\npublic string Email { get; set;\
  \ }\npublic Address Address { get; set; }\npublic string Phone { get; set; }\npublic\
  \ string Website { get; set; }\npublic Company Company { get; set; }\n}\n```\n\n\
  代码清单 7-5. `User` 类的定义\n\n我对这些自动生成的类所做的唯一修改是通过另一个方法 `ToCLLocationCoordinate2D`（代码清单\
  \ 7-6）扩展了 `Geo` 类，该方法将 `Geo` 类的实例转换为 `CLLocationCoordinate2D`。稍后我将使用此方法在本机地图上显示用户的位置。\n\
  \n```\nusing CoreLocation;\nnamespace Users.MobileClient.Models\n{\npublic class\
  \ Geo\n{\npublic double Lat { get; set; }\npublic double Lng { get; set; }\npublic\
  \ CLLocationCoordinate2D ToCLLocationCoordinate2D()\n{\nreturn new CLLocationCoordinate2D(Lat,\
