  \ REST API 删除和检索对象列表。你还可以分别使用 `HttpClient` 类的 `PutAsync` 和 `PostAsync` 方法来更新用户或添加新用户。在这两种情况下，操作步骤相似，因此我将只讨论一种更新用户数据的方法。清单\
  \ 7-7 包含了 `UsersServiceClientHelper` 类的 `Update` 方法。该方法接受一个参数，即 `User` 类的实例，其中包含已更新的用户数据。这些数据通过\
  \ `PutAsync` 方法发送到 REST API。\n\n在将更新后的数据发送到 Web 服务器之前，你需要将 C# 对象转换或序列化为 JSON 对象。你可以通过使用\
  \ `JsonConvert` 类的 `SerializeObject` 静态方法来做到这一点。然后，发送待更新用户的标识符和序列化后的对象。你还需要设置传输数据的格式：字符串、字节数组或流。为此，你可以分别使用\
  \ `StringContent`、`ByteArrayContent` 或 `StreamContent` 类。在清单 7-7 中，我将展示如何使用第一个类，我使用\
  \ `JsonConvert.SerializeObject` 方法返回的字符串实例化它。然后，我将清单 7-7 中的方法放入 `UsersServiceHelper`\
  \ 类中。\n\n```\npublic static async Task Update(User user)\n{\nvar userJson = JsonConvert.SerializeObject(user);\n\
  var response = await httpClient.PutAsync($\"{user.Id}\",\nnew StringContent(userJson));\n\
  CheckStatusCode(response.StatusCode);\n}\n清单 7-7.\n更新用户数据\n```\n\n### 获取特定用户\n\n\
  要获取单个用户，你需要使用用户标识符补充 `GET` 请求。这可以通过类似于清单 7-7 中 `Update` 方法的方式来完成。在清单 7-8 中，我展示了一个重载的\
  \ `UsersServiceClientHelper.Get` 方法的完整示例，该方法旨在接收由标识符区分的单个用户。其工作方式类似于清单 7-4 中的 `Get`\
  \ 方法，但仅检索代表给定 ID 用户的单个 `User` 类实例。\n\n```\npublic static async Task Get(int userId)\n\
