  - **第一个标签**：\n    - 名称：`LabelTemperature`\n    - 文本：温度：\n- **第二个标签**：\n    - 名称：`LabelPressure`\n\
  \    - 文本：气压：\n- **第三个标签**：\n    - 名称：`LabelHumidity`\n    - 文本：湿度：\n- **第四个标签**：\n\
  \    - 名称：`LabelDescription`\n    - 文本：描述：\n\n此外，我将所有标签的宽度、字体和对齐方式分别设置为 1920 像素、标题和居中。\n\
