  为了在 `HelloTV` 应用中消费上述 JSON 响应，我需要将 JSON 对象映射到 C# 类。如第 7 章所述，我在 JSON Utils 服务（[`jsonutils.com/`](https://jsonutils.com/)）的帮助下完成此映射。具体来说，我将
  JSON 响应粘贴到 JSON 测试或 URL 文本字段中，将类名设置为 `WeatherInfo`，勾选“帕斯卡命名法”，然后单击提交按钮。因此，会生成一组类。我将所有这些类保存在
  `HelloTV` 应用的 `Models` 文件夹下的单独文件中（参见配套代码：`Chapter_09/HelloTV/Models`）。


  无需详细描述每个自动生成的类。因此，我将仅描述最重要的元素。表示 JSON 响应顶级属性的主类是 `WeatherInfo`。此类的定义如代码清单 9-2 所示。因此，`WeatherInfo`
