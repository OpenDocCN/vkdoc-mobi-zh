- '# watchOS


  Apple Watch 是一款配备多种传感器、支持健康与活动数据追踪的智能手表。此外，它还包含通信接口，使其成为 iOS 设备的可穿戴终端。无论是骑自行车、参加重要会议，还是站在拥挤的公交车上，这款智能手表都能成为你的最佳伙伴。在这些场景下，你无法掏出手机，但可以借助
  Apple Watch 快速查看日程、回复收到的消息，或者瞥一眼地图上的路线导航。


  Apple Watch 由专用操作系统 watchOS 控制。该系统有多个版本。第一个版本 watchOS 1 已被弃用，新的解决方案至少应针对 watchOS
  2。在撰写本章时，`Visual Studio for Mac` 和 `Xamarin.iOS` 支持 watchOS 2 及以上版本。


  你可以使用专用 SDK 为 watchOS 开发自定义应用。实际上，其开发方式与开发 iOS 应用非常相似。不过，watchOS 和 iOS 之间存在一个区别：watch
  应用包含两个 bundle。第一个是实际的 watch 应用，包含用户界面。另一个是 watch 或 `WatchKit` 扩展，用于实现控制用户界面的逻辑。因此，大多数情况下，你会修改
  watch 应用的 storyboard，并通过修改代表与 UI 关联的控制器的类定义来实现逻辑。这是通过 `WatchKit` 框架完成的，该框架是一组帮助你控制
  watchOS 应用的类。


  在本章中，我将从头开始引导你完成这个过程。我们将首先创建项目，然后分析其结构，学习 watchOS 应用中最重要的特性。


  ## 创建项目


  每个 watchOS 应用都有一个关联的 iOS 应用。因此，为了实现第一个 watchOS 解决方案，我首先使用 `Single View App` iOS
  项目模板创建父应用 `HelloWatchKit`。我将目标版本设置为 iOS 11.0。接着，我使用 `WatchKit App` 项目模板创建实际的 watchOS
  应用。后者在 watchOS 分组下可用（图 8-1）。选择模板后，我按下 `Next` 按钮，这会激活另一个窗口，与 iOS 类似，你可以在此配置新的 watchOS
  应用。


  ![A453659_1_En_8_Fig1_HTML.jpg](img/A453659_1_En_8_Fig1_HTML.jpg)


  图 8-1.


  创建 watchOS 应用的项目模板列表


  如图 8-2 所示，配置 watchOS 应用需要指定以下属性：


