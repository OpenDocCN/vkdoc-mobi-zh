- '# OpenWeatherMap API


  UI 准备就绪后，我开始实现负责获取当前天气状况的逻辑。为此，我使用了 OpenWeatherMap Web 服务（[`openweathermap.org/`](https://openweathermap.org/)）公开的
  API。OpenWeatherMap 提供免费和付费计划。免费计划限制为每分钟 60 次调用（[`openweathermap.org/price`](https://openweathermap.org/price)），并有一些其他特定限制，但对于实现
  `HelloTV` 示例来说已经足够。要访问 OpenWeatherMap API，您需要注册一个免费账户。您将通过电子邮件收到您的应用标识符，用其访问 OpenWeatherMap
  的 REST 服务。完成后，您可以通过在浏览器地址栏中输入以下 URL 来开始测试 OpenWeatherMap：


  [`api.openweathermap.org/data/2.5/weather?q=`<城市名>`&appid=`<您的应用 ID>``](http://api.openweathermap.org/data/2.5/weather?q=%3ccityname%3e%26appid=%3cyour%20app%20id%3e)


