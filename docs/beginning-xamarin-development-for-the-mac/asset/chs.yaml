  \n### 调用 JavaScript 函数\n\nWeb View 允许你在 C# 代码中运行 JavaScript。为此，Web View 提供了 `EvaluateJavaScript`\
  \ 方法。它接受一个参数，即包含要运行的 JavaScript 代码的字符串。为了演示如何使用 `EvaluateJavascript` 方法，我在 `map.js`\
  \ 文件中添加了另一个函数 `displayGeocoordinate`（代码清单 3-21）。该函数接受一个表示地址的字符串，并显示其从 Google Geocode\
