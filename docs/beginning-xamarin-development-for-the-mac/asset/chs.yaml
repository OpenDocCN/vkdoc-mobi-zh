  代码清单 9-2. `WeatherInfo` 类的定义




  具体来说，在 `HelloTV` 应用中，我只使用了 `WeatherInfo` 类实例的两个属性：`Main` 和 `Weather`。其中第一个属性存储温度、气压和湿度（清单
