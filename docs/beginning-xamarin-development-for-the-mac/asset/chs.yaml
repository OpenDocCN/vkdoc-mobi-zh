  public override void ViewDidLoad()

  {

  base.ViewDidLoad();

  InitMap();

  InitLocationManager();

  }

  public override void ViewDidAppear(bool animated)

  {

  locationManager.StartUpdatingLocation();

  }

  public override void ViewDidDisappear(bool animated)

