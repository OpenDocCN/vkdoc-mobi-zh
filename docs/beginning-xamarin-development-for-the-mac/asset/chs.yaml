  ### Google Geocoding API\n\n在之前的示例中，我使用了纽约市的地理坐标。如果你想为其他位置显示地图，则需要知道其地理坐标。要查找任意地址的地理坐标，可以使用\
  \ Google Geocode 服务。这是一种将地址转换为地理坐标（纬度和经度）的网络服务。要使用地理编码，请在浏览器中键入以下 URL（可以将`New York`替换为其他任意值）：\n\
