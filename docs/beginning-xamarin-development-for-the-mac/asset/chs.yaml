  在`document`标签之后，我们可以看到另一个标签`scenes`。它包含一组场景对象，每个场景对象由`scene`标签表示，其`sceneID`属性标识特定场景。然后，在场景对象下，我们可以很容易地识别`viewController`标签。它包含一个子项和`views`，其中包含与视图控制器相关联的视图声明。在
