- "# 1. 基础\n\n在本章中，我将指导你安装本书所需的开发工具。具体来说，我们将安装 `Visual Studio for Mac` 以及 `Xcode`。后者是\
  \ Mac 开发者的原生工具集。它提供了 IDE、SDK 以及我们将使用的设备模拟器。如果你已经安装了这些工具，可以直接跳到下一节。\n\n在确保所有工具就绪后，我们将为\
  \ iPhone 和 iPad 创建第一个 `Xamarin.iOS` 应用。这个应用如图 1-1 所示，它会显示各种提示并响应用户操作。我还将讨论 `Visual\
  \ Studio` 提供的可用项目模板。`Xcode` 中也提供了相同的模板，因此 `Xamarin.iOS` 和 `Visual Studio` 让你能够以类似原生开发工具的方式访问\
  \ iOS 平台特定的编程接口，同时享有 `C#` 编程语言提供的便捷与流畅性。在本章中，我还将讨论在 `Visual Studio` 中设计用户界面的基本方面，并向你展示如何将事件处理程序与可视控件触发的事件关联起来。\n\
  \n**注意**\n\n在本章中，我不会详细讨论 `Visual Studio for Mac`。我只会讨论此 IDE 的必要元素。你可以在 Alessandro\
  \ Del Sole 所著的《*Beginning Visual Studio for Mac. Build Cross-Platform Apps with\
  \ Xamarin and .NET Core*》一书中找到关于 `Visual Studio for Mac` 的全面描述。\n\n![A453659_1_En_1_Fig1_HTML.jpg](img/A453659_1_En_1_Fig1_HTML.jpg)\n\
  \n*图 1-1.* 我们将在本章中构建的“Hello, World!”应用。该应用在 iPhone X 模拟器中执行。\n\n## 设置开发环境\n\n要安装\
  \ `Visual Studio for Mac`，你需要一台运行 macOS Sierra 10.12 或更高版本的 Mac。在这里，我将使用一台搭载 macOS\
  \ Sierra 10.16 的 MacBook Pro 或 iMac。确认你满足基本平台要求后，可以从以下网址下载 Visual Studio 安装程序：[`http://bit.ly/vs-mac`](http://bit.ly/vs-mac)。下载安装包后，运行安装程序。会出现一个窗口，如图\
  \ 1-2 所示。在此窗口中，双击带有向下箭头的图标。随后，你会看到一个对话框，提示你安装程序是从互联网下载的（图 1-3）。点击“打开”按钮继续。\n\n![A453659_1_En_1_Fig3_HTML.jpg](img/A453659_1_En_1_Fig3_HTML.jpg)\n\
  \n*图 1-3.* 确认对话框\n\n![A453659_1_En_1_Fig2_HTML.jpg](img/A453659_1_En_1_Fig2_HTML.jpg)\n\
  \n*图 1-2.* Visual Studio for Mac 的安装程序\n\n`Visual Studio 安装程序`现在将验证你的系统配置（图 1-4）。更具体地说，它会查找已安装的组件（如\
  \ Mono Framework、Java SDK 等），以验证哪些组件需要下载和安装。完成此操作后，图 1-4 所示窗口的顶部会出现另一个对话框。其标题显示“感谢您下载\
  \ Visual Studio。”在此对话框中，你只需按下“继续”按钮。\n\n![A453659_1_En_1_Fig4_HTML.jpg](img/A453659_1_En_1_Fig4_HTML.jpg)\n\
  \n*图 1-4.* Visual Studio 安装程序正在检查操作系统\n\n此时，Visual Studio 安装程序可能会提示你安装 `Xcode`（图\
  \ 1-5）。仅当你尚未安装 `Xcode` 时才会出现此提示。根据此对话框，你可以在 Visual Studio 安装的同时安装 `Xcode`。请注意，`Xcode`\
  \ 的安装是可选的，并且取决于你当前的系统配置。我假设你从全新安装的 macOS 开始，因此明确展示如何安装 `Xcode`。\n\n![A453659_1_En_1_Fig5_HTML.jpg](img/A453659_1_En_1_Fig5_HTML.jpg)\n\
  \n*图 1-5.* 提示安装 Xcode 的对话框\n\n要安装 `Xcode`，你可以按下图 1-5 中所示的“获取 Xcode”按钮。这会引导你到一个网站，在那里点击“在\
  \ Mac App Store 中查看”或“安装 App”按钮。它将打开 App Store 中的 Xcode 页面，你只需点击“安装 App”按钮即可（图 1-6）。或者，要安装\
  \ `Xcode`，你也可以在本地打开 Mac App Store，然后查找 `Xcode`。无论你选择哪种方法，`Xcode` 及所有相关的开发者工具都将在后台下载并安装。因此，你现在可以回到\
  \ Visual Studio 安装程序。\n\n![A453659_1_En_1_Fig6_HTML.jpg](img/A453659_1_En_1_Fig6_HTML.jpg)\n\
  \n*图 1-6.* Mac App Store 中的 Xcode 页面\n\nVisual Studio 安装程序现在将让你选择要安装的组件（图 1-7）。为了减小安装体积，我取消选中“Android\
  \ + Xamarin.Forms”条目，仅安装与 iOS 和 macOS 相关的组件。然后，在你点击“安装”按钮后，实际的安装过程开始。\n\n![A453659_1_En_1_Fig7_HTML.jpg](img/A453659_1_En_1_Fig7_HTML.jpg)\n\
  \n*图 1-7.* 选择要安装的组件\n\n`Visual Studio` 现在将下载并安装组件。这需要一些时间，具体取决于网络速度。你会收到每个安装步骤和总体进度的通知，如图\
  \ 1-8 所示。此外，如图所示，macOS 在安装过程中可能会多次提示你输入管理员密码。安装完成后，会出现相应的对话框。请注意，要在模拟器中构建和运行应用，你需要等到\
  \ `Xcode` 安装完成。\n\n![A453659_1_En_1_Fig8_HTML.jpg](img/A453659_1_En_1_Fig8_HTML.jpg)\n\
  \n*图 1-8.* 安装 Visual Studio for Mac\n\n## Hello, World! 应用\n\n安装好开发工具后，我们可以开始构建第一个应用。为了快速入门\
  \ `Xamarin.iOS` 开发，我将告诉你如何使用“单一视图应用”模板创建项目。然后，我们将为应用添加一个简单的按钮。这个按钮将对点击做出反应，从而显示原生提示。随后，我们将为此提示添加特定的操作。显示提示不仅是入门应用，也是真实应用的典型功能，其中它用于收集用户输入或获取执行不可逆操作的确认。\n\
  \n\n\n### 创建项目\n\n要创建项目，请打开 Visual Studio for Mac。此时会显示图 1-9 所示的欢迎屏幕。接着，您可以在菜单栏中选择\
  \ `File/New Solution`，或者点击位于“最近使用”标题下方的 `New Project` 按钮。这会激活图 1-10 所示的 `New Project`\
  \ 窗口。\n\n![A453659_1_En_1_Fig10_HTML.jpg](img/A453659_1_En_1_Fig10_HTML.jpg)\n\n\
  图 1-10. 项目模板选择\n\n![A453659_1_En_1_Fig9_HTML.jpg](img/A453659_1_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9. Visual Studio for Mac 的欢迎屏幕\n\n`New Project` 创建器可让您为项目选择模板。要过滤模板列表，仅显示与\
  \ iOS 应用直接相关的项目，请点击 `iOS` 选项卡下的 `App` 条目。随后右侧会显示可用的项目模板列表。该列表分为两类：`General` 和 `Games`。在本书中，我们只使用\
  \ `General` 组中的项目模板。此类别包含以下模板：\n\n*   `Single View App` — 使用此模板创建包含单个视图的应用；即没有任何导航功能的应用程序，如图\
  \ 1-1 所示。\n*   `Master-Detail App` — 此模板用于创建使用 `Master-Detail` 界面的应用。在这种情况下，列表显示对象的简短描述。当您从此列表（主视图）中选择一个对象时，相应的详细信息将显示在专用区域（详细视图）中。例如，iOS\
  \ 股票应用（图 1-11）中就使用了 `Master-Detail` 界面。\n\n![A453659_1_En_1_Fig11_HTML.jpg](img/A453659_1_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11. `Master-Detail` iOS 应用的表示视图。对象（公司）列表显示在顶部。当您点击任一对象时，相应的详细信息（股票价值）会显示在底部。\n\
  \n*   `Tabbed App` — 使用此模板创建多选项卡应用程序，您可以在多个选项卡中排列视觉控件。用户通过屏幕底部显示的有标签图标在选项卡之间导航。iOS\
  \ 时钟应用（图 1-12）中使用了这种导航方式。\n\n![A453659_1_En_1_Fig12_HTML.jpg](img/A453659_1_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12. `Tabbed` iOS 应用程序示例。您可以使用视图底部显示的有标签图标在选项卡之间切换。\n\n*   `Page-based App`\
