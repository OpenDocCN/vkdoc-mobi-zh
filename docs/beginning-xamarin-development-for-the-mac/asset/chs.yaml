  \ iOS 标签页中选择了“单元测试”对象（图 6-9）。`PersonTests.cs`文件的默认内容展示了如何创建实际执行单元测试的测试类和测试方法。更具体地说，测试类必须使用`TestFixtureAttribute`进行装饰（见清单\
  \ 6-4）。该属性指示测试框架在此类中查找测试方法。请注意，`PersonTests`类是公开的，否则 NUnit 测试框架将无法识别它。\n\n![A453659_1_En_6_Fig9_HTML.jpg](img/A453659_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9. 添加单元测试文件\n\n```\n[TestFixture]\npublic class PersonTests\n```\n清单 6-4.\
  \ `PersonTests`类的声明\n\n`PersonTests.cs`文件中给出的默认测试并没有实现任何有用的功能，但它们确实展示了如何定义一个测试方法。也就是说，这样的方法必须是测试类的一个公开函数。此外，一个测试方法不返回任何值，并且需要使用`TestAttribute`进行装饰。任何符合这些要求的方法都会被`TouchRunner`看到并显示在其\
  \ UI 中。\n\n为了定义实际的测试，我首先导入了两个额外的命名空间：`Persons.Common.Models`和`System.Text.RegularExpressions`，然后将`PersonTests`类的默认定义替换为三个测试方法：`VerifyPublicProperties`、`VerifyFullName`和`VerifyEmail`。第一个测试方法`VerifyPublicProperties`出现在清单\
  \ 6-5 中。此方法以及任何其他测试方法的通用结构都包含三个界限清晰的代码块：准备（arrange）、执行（act）和断言（assert）。在后续的清单中，每个代码块都用适当的注释进行了标记。在准备块中，你通常为测试准备输入数据。因此，在清单\
  \ 6-5 中，我声明了四个常量，这些常量随后在执行块中用于调用被测试的逻辑。在这里，我验证了`Person`类的公共属性设置器。因此，我使用默认构造函数实例化了该类，然后将其公共属性的值设置为先前声明的常量。接着，在断言块中，我验证`Person`类实例的公共属性是否确实具有预期的值。\n\
  \n为了验证被测试的值，你需要使用`NUnit.Framework.Assert`类的静态方法。如果你之前使用过 Windows 版 Visual Studio，你可能已经知道来自`Microsoft.VisualStudio.TestPlatform.UnitTestFramework`包的`Assert`类。这两个类的工作方式相似，并暴露了类似的功能。具体来说，我在清单\
  \ 6-5 中使用的`AreEqual`方法会比较两个变量，并且只要这些变量的值不同，就会引发一个`NUnit.Framework.AssertionException`类型的异常。此外，你还可以定义当此断言被触发时显示的消息。在清单\
  \ 6-5 中，我独立验证了`Person`类实例的每个公共属性，因此每个断言都有不同的消息。\n\n```\n[Test]\npublic void VerifyPublicProperties()\n\
  {\n// Arrange\nconst string expectedFirstName = \"Dawid\";\nconst string expectedLastName\
  \ = \"Borycki\";\nconst string expectedEmail = \"dawid@borycki.com.pl\";\nconst\
  \ int expectedAge = 34;\n// Act\nvar person = new Person()\n{\nFirstName = expectedFirstName,\n\
  LastName = expectedLastName,\nEmail = expectedEmail,\nAge = expectedAge\n};\n//\
  \ Assert\nAssert.AreEqual(expectedFirstName, person.FirstName,\n\"Incorrect first\
  \ name\");\nAssert.AreEqual(expectedLastName, person.LastName,\n\"Incorrect last\
  \ name\");\nAssert.AreEqual(expectedEmail, person.Email,\n\"Incorrect e-mail\");\n\
  Assert.AreEqual(expectedAge, person.Age,\n\"Incorrect age\");\n}\n```\n清单 6-5. 验证公共属性设置器的测试方法定义\n\
  \n第二个测试方法`VerifyFullName`验证了`Person`类实例的`FullName`方法。基本上，`VerifyFullName`的工作方式类似于`VerifyPublicProperties`。也就是说，在`VerifyFullName`方法中，我首先在准备块中声明预期的值。然后，我使用这些值来实例化一个`Person`类（执行块）。最后，我调用`FullName`方法并检查其结果是否与预期结果一致。\n\
  \n你可能会想，为什么在已经知道`Person`类定义的情况下，还要实现如此相对简单的测试方法。通常，作为单元测试人员，你并没有这种特权。相反，你必须编写能够全面覆盖类定义的测试方法，但通常你并不拥有源代码的访问权限。因此，一般来说，你是从简单的测试方法开始，验证类的基本功能，然后逐步增加测试的复杂度。通过这样做，你能够确保该类从一开始就得到了恰当的测试。\n\
  \n这种方法也用于测试驱动开发（TDD）。在 TDD 中，你先实现类的框架，然后编写相应的单元测试。在这个初始阶段，由于缺乏实际的类实现，所有测试都应该失败。随后，你开始实现这个类，并迭代地运行单元测试，以确保你的实现是有效的。你持续这个过程，直到所有测试都通过。当你在修改和扩展应用程序时，TDD\
  \ 也很有益。在对代码进行任何更改后，你都会运行单元测试，以确保它不会影响已实现的功能。\n\n```\n[Test]\npublic void VerifyFullName()\n\
  {\n// Arrange\nconst string expectedFirstName = \"Dawid\";\nconst string expectedLastName\
  \ = \"Borycki\";\nstring expectedFullName = $\"{expectedFirstName} {expectedLastName}\"\
  ;\n// Act\nvar person = new Person()\n{\nFirstName = expectedFirstName,\nLastName\
  \ = expectedLastName\n};\n// Assert\nAssert.AreEqual(expectedFullName, person.FullName());\n\
  }\n```\n清单 6-6. 验证`Person`类实例的`FullName`方法\n\n`PersonTests`类的最后一个测试方法`VerifyEmail`出现在清单\
  \ 6-7 中。该方法旨在验证`Person`类的静态方法`IsEmailValid`。遵循我之前的说法，`VerifyEmail`的实现更为复杂。具体来说，在准备块中，我首先声明一个待检查的电子邮件地址。在这个例子中，这个电子邮件地址是无效的，因为它不包含域名。然后，在执行块中，我使用正则表达式对电子邮件字符串进行验证。这是在一个私有辅助方法`PersonsTests.EmailCheck`中实现的。由于此方法不符合测试方法的要求，它不会被测试运行器识别。\n\
  \n\n\n`EmailCheck`函数使用了 .NET Framework 中的`Regex`类。该类用于执行正则表达式操作。特别地，我使用了`IsMatch`静态方法来检查正则表达式模式是否与给定字符串匹配。在列表\
  \ 6-7 中使用的模式可匹配任何包含字母和数字组合后跟`@`符号及域名的字符串。然后将此匹配结果与`Person.IsEmailValid`方法返回的值进行比较。由于后者使用了一种非常简单的电子邮件地址验证方式，因此该测试应失败。要验证这一点，我们需要运行已实现的测试方法。\n\
  \n```\n[Test]\npublic void VerifyEmail()\n{\n// Arrange\nconst string email = \"\
  dawid@\";\n// Act\nvar isValid = EmailCheck(email);\n// Assert\nAssert.AreEqual(isValid,\
  \ Person.IsEmailValid(email));\n}\nprivate bool EmailCheck(string email)\n{\nconst\
  \ string emailPattern = \"[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\\\.[A-Za-z]{2,}\";\n\
  return Regex.IsMatch(email, emailPattern);\n}\n列表 6-7.\n验证电子邮件地址\n```\n\n## 运行单元测试\n\
  \n要运行单元测试，需将`Persons.Tests`应用设置为启动项目。为此，请使用解决方案资源管理器，右键单击`Persons.Tests`节点，然后从上下文菜单中选择“设为启动项目”选项（图\
  \ 6-10）。接着通过“运行”菜单或按“调试目标”面板中的“播放”按钮来运行应用。片刻后，`Persons.Tests`应用或测试运行器将在模拟器中启动，外观类似于图\
  \ 6-11。\n\n![A453659_1_En_6_Fig10_HTML.jpg](img/A453659_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10. 将`Persons.Tests`设置为启动项目\n\n测试运行器将显示它所识别的测试方法的任何信息。现在，你可以通过单击“全部运行”按钮来运行所有这些单元测试，或者可以选择`Persons.Tests.exe`，然后选择`PersonsTests`。测试方法列表将出现，如图\
