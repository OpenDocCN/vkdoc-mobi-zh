  \n图 4-7. Navigation.Tabs 应用的最终形态\n\n### Pages\n\n还有另一个项目模板，可用于快速实现多视图应用——即基于页面的应用模板（Page-Based\
  \ App），如图 4-8 所示。在本节中，将使用此模板创建另一个应用`Navigation.PageBased`，其目标为 iOS 9.0 及以上版本。使用该模板时，Visual\
  \ Studio 会创建一个包含十二个页面的应用，每个页面在标签中显示月份名称。运行应用时，其外观将如图 4-9 所示。\n\n![A453659_1_En_4_Fig9_HTML.jpg](img/A453659_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9. 默认的基于页面的应用包含十二个页面，每个页面显示一个月份名称\n\n![A453659_1_En_4_Fig8_HTML.jpg](img/A453659_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8. 新建项目窗口，显示 iOS 项目模板中的“基于页面的应用”\n\n现在来看`Navigation.PageBased`应用是如何工作的。如果打开此项目的\
  \ iOS 设计器，会看到它由两个控制器组成：\n\n*   根视图控制器（Root View Controller）——初始视图控制器，提供窗口的内容视图。\n\
  *   数据视图控制器（Data View Controller）——在每个页面提供并显示数据（对应的月份名称）的视图控制器。\n\n根视图控制器的逻辑在同名类中实现，并存储在`RootViewController.cs`文件下。`RootViewController`有两个公共成员（列表\
  \ 4-5）：`ModelController`和`PageViewController`。\n\n```\npublic UIPageViewController\
  \ PageViewController { get; private set; }\npublic ModelController ModelController\
  \ { get; private set; }\n```\n列表 4-5. `RootViewController`的公共成员\n\n第一个成员`PageViewController`的类型为`UIPageViewController`，后者代表页面视图控制器。该控制器是`Navigation.PageBased`项目（以及所有其他使用“基于页面的应用”模板创建的项目）的核心部分，负责管理底层页面之间的导航。每个页面都有一个关联的视图控制器，在本例中由`DataViewController`类表示。`PageViewController`在`RootViewController`的`ViewDidLoad`事件处理程序中被实例化（参见配套代码`Chapter_04/Navigation.PageBased/RootViewController.cs`）。\n\
  \n`RootViewController`的第二个公共成员`ModelController`派生自`UIPageViewControllerDataSource`类，并为每个页面实现数据源。更具体地说，`ModelController`有一个`pageData`字段，它是一个字符串集合。该集合包含月份列表，通过`NSDateFormatter`类获得（列表\
  \ 4-6）。\n\n```\npublic class ModelController : UIPageViewControllerDataSource\n\
  {\n    readonly List pageData;\n    public ModelController()\n    {\n        var\
  \ formatter = new NSDateFormatter();\n        pageData = new List(formatter.MonthSymbols);\n\
  \    }\n    // ModelController 定义的其余部分\n}\n```\n列表 4-6. `ModelController`类定义片段\n\
  \n然后，`ModelController`实现了一个`GetViewController`方法，如列表 4-7 所示。`GetViewController`使用`UIStoryboard`类实例的静态方法`InstantiateViewController`创建`DataViewController`的实例。随后，`GetViewController`将适当的月份名称传递给所创建的视图控制器。月份名称存储在`DataViewController`类实例的公共属性`DataObject`中。\n\
  \n```\npublic DataViewController GetViewController(int index, UIStoryboard storyboard)\n\
  {\n    if (index >= pageData.Count)\n        return null;\n    // 创建新的视图控制器并传递合适的数据。\n\
  \    var dataViewController = (DataViewController)storyboard.\n        InstantiateViewController(\"\
  DataViewController\");\n    dataViewController.DataObject = pageData[index];\n \
  \   return dataViewController;\n}\n```\n列表 4-7. `ModelController`类的`GetViewController`方法\n\
  \n\n\n`GetViewController`方法在`GetNextViewController`和`GetPreviousViewController`中被使用，这两个方法是基类`UIPageViewControllerDataSource`中对应方法的重写（参见代码清单\
  \ 4-8）。当用户在标签页之间切换时会调用这两个方法，因此月份名称会通过`DataViewController`显示。\n\n```\npublic override\
  \ UIViewController GetNextViewController(\nUIPageViewController pageViewController,\n\
  UIViewController referenceViewController)\n{\nint index = IndexOf((DataViewController)referenceViewController);\n\
  if (index == -1 || index == pageData.Count - 1)\nreturn null;\nreturn GetViewController(index\
  \ + 1, referenceViewController.Storyboard);\n}\npublic override UIViewController\
  \ GetPreviousViewController (\nUIPageViewController pageViewController,\nUIViewController\
  \ referenceViewController)\n{\nint index = IndexOf((DataViewController) referenceceViewController);\n\
  if (index == -1 || index == 0)\nreturn null;\nreturn GetViewController(index - 1,\
  \ referenceViewController.Storyboard);\n}\npublic int IndexOf(DataViewController\
  \ viewController)\n{\nreturn pageData.IndexOf(viewController.DataObject);\n}\nListing\
  \ 4-8.\nImplementation of the GetNextViewController and GetPreviousViewController\
  \ of the UIPageViewControllerDataSource Class\n```\n\n如前所述，`DataViewController`类有一个公共成员`DataObject`，它用于传递月份名称。然后，每当视图将要出现时，该值会显示在标识为`dataLabel`的标签中（代码清单\
  \ 4-9）。\n\n```\npublic partial class DataViewController : UIViewController\n{\n\
  public string DataObject\nprotected DataViewController(IntPtr handle) : base(handle)\
  \ { }\n// Default definitions of the ViewDidLoad\n// and DidReceiveMemoryWarning\n\
  public override void ViewWillAppear(bool animated)\n{\nbase.ViewWillAppear(animated);\n\
  dataLabel.Text = DataObject;\n}\n}\nListing 4-9.\nA Definition of the DataViewController\
  \ Class\n```\n\n在了解了`Navigation.Pages`项目的结构之后，我们来对其进行修改。现在，我将把默认的数据源（月份列表）替换为一个键值对列表。每个键值对将包含一个颜色标题和一个`UIColor`类的实例。颜色标题将显示在标签中，取代月份名称；而`UIColor`实例则用于设置页面的背景色，如图\
  \ 4-10 所示。\n\n![A453659_1_En_4_Fig10_HTML.jpg](img/A453659_1_En_4_Fig10_HTML.jpg)\n\
  \nFigure 4-10.\n\n一个经过修改的基于页面的应用，现在显示的是颜色名称而非月份。同时，矩形的背景颜色与标签中显示的颜色名称相对应。\n\n为了实现上述更改，我首先打开\
  \ iOS 设计器，然后将数据视图控制器中的白色矩形名称设置为`ViewDataPanel`。接着，我根据代码清单 4-10 修改了`DataViewController`类。\n\
  \n```\nusing System;\nusing System.Collections.Generic;\nusing UIKit;\nnamespace\
  \ Navigation.PageBased\n{\npublic partial class DataViewController : UIViewController\n\
  {\npublic KeyValuePair DataObject { get; set; }\nprotected DataViewController(IntPtr\
  \ handle) : base(handle) { }\n// Default definitions of ViewDidLoad\n// and DidReceiveMemoryWarning\n\
  public override void ViewWillAppear(bool animated)\n{\nbase.ViewWillAppear(animated);\n\
  dataLabel.Text = DataObject.Key;\nViewDataPanel.BackgroundColor = DataObject.Value;\n\
  }\n}\n}\nListing 4-10.\nA Modified Definition of the DataViewController Class\n\
  ```\n\n在代码清单 4-10 中，我将`DataObject`成员的类型从`string`改为`KeyValuePair<string, UIColor>`。然后，在`ViewWillAppear`视图事件处理程序中，我分别从`DataObject`的`Key`和`Value`属性获取颜色名称和值。\n\
  \n最后，我需要更新`ModelController`，在其中修改`pageData`成员的声明和初始化，如代码清单 4-11 所示。我创建了三个`KeyValuePair`对象：\n\
  \n*   键：Red，值：`UIColor.Red`\n*   键：Green，值：`UIColor.Green`\n*   键：Blue，值：`UIColor.Blue`\n\
  \n因此，当您重新运行应用时，将会看到三个页面可用，每个页面对应一种颜色（红、绿、蓝）。因此，应用的外观将如图 4-10 先前所示。\n\n```\npublic\
  \ class ModelController : UIPageViewControllerDataSource\n{\nreadonly List> pageData;\n\
  public ModelController()\n{\npageData = new List>\n{\nnew KeyValuePair(\"Red\",\
  \ UIColor.Red),\nnew KeyValuePair(\"Green\", UIColor.Green),\nnew KeyValuePair(\"\
  Blue\", UIColor.Blue)\n};\n}\n// The rest of ModelController definition\n}\nListing\
  \ 4-11.\nA Modified Data Source for the Page View Controller\n```\n\n\n\n"
- "# 视图控制器之间的导航\n\n虽然可以利用选项卡和基于页面的项目模板快速创建多视图 iOS 应用程序，但这些项目模板并非总是适用。在这种情况下，你可以手动在视图控制器之间创建\
  \ Segue。当用户按下特定控件时，所选视图控制器将呈现。在本节中，我将展示如何手动创建这样一个名为 `Navigation` 的自定义多视图应用。如图 4-11\
  \ 所示，该应用将包含两个视图控制器：First View Controller 和 Second View Controller。两者都将有相关联的视图，并带有描述视图控制器的标签。用户将能够使用\"\
  Switch view\"或\"Go back\"按钮在视图之间切换，具体取决于当前显示的视图。\n\n![A453659_1_En_4_Fig11_HTML.jpg](img/A453659_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11. 我们将在本节中开发的 Navigation 应用的视图\n\n为了实现 `Navigation` 应用，我使用了目标平台为 iOS 9.0\
  \ 及以上版本的 Single View App 项目模板。然后，我通过添加一个按钮和一个标签来修改视图，并按图 4-11 左侧所示进行配置。接着，将初始视图控制器的类设置为\
  \ `FirstViewController`，再添加另一个视图控制器并将其类设置为 `SecondViewController`。然后，按图 4-11 右侧所示修改第二个视图控制器的视图。最后，删除\
  \ `ViewController.cs` 文件，因为它不再需要。\n\n视图控制器准备就绪后，我定义了第一个 Segue。如图 4-12 所示，我从\"Switch\
  \ view\"按钮按住 CTRL 键并拖动到第二个视图控制器。释放鼠标左键后，会弹出一个窗口。该弹出窗口允许我选择用于呈现新视图控制器的 Segue。这里有八种\
  \ Segue 类型可供选择，但其中三种（Non-Adaptive Action Segue 组）已弃用，因此我不讨论它们。其余 Segue 如下：\n\n![A453659_1_En_4_Fig12_HTML.jpg](img/A453659_1_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12. 在视图控制器之间创建 Segue\n\n- **Show** – 在源视图控制器的内容之上模态显示所选视图控制器的视图。此 Segue 也可以通过\
  \ `UIViewController` 的 `ShowViewController` 方法以编程方式实现。\n- **Show Detail** – 此 Segue\
  \ 对应 `UIViewController.ShowDetailViewController` 方法，仅对 `UISplitViewController` 有效。在此情况下，Show\
  \ Detail 会用所选视图控制器替换第二个子视图控制器。对于其他视图控制器，Show Detail 的行为与 Show Segue 类似。\n- **Present\
  \ Modally** – 模态呈现视图控制器。基本上，其工作方式与 Show Segue 类似，但你可以修改其呈现和过渡样式。\n- **Popover Presentation**\
  \ – 此 Segue 的效果取决于实际的尺寸类别。对于具有常规宽度的屏幕，目标视图控制器将显示为弹出视图；而在水平紧凑型设备上则全屏模态显示。\n- **Custom**\
  \ – 自定义创建的 Segue。如果其他 Segue 都不适合，你可以使用此类型。\n\n在这里，我选择了 Show Segue，因此重新运行 `Navigation`\
  \ 应用后，当你点击\"Switch view\"按钮时，Second View Controller 的视图就会出现。\n\n## 编辑 Segue\n\n\
  你可以通过编辑 Segue 的属性来修改它。所有创建的 Segue 都会出现在 Document Outline 面板中。目前，我们只有一个 Segue，它位于\
  \ `FirstViewController` 项下。如图 4-13 所示，你可以使用 Segue 的属性来更改其类型（Show、Show Detail、Present\
  \ Modally 或 Popover Presentation）。根据 Segue 类型的不同，会出现额外的控件。在我的例子中，我将 Segue 类型更改为\
  \ Present Modally，然后 Presentation 和 Transition 下拉列表出现。我使用它们分别将呈现样式和过渡样式设置为 Full\
  \ Screen 和 Partial Curl。\n\n![A453659_1_En_4_Fig13_HTML.jpg](img/A453659_1_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13. Segue 的属性\n\n## Unwind Segue\n\n虽然我们创建了 Segue，但由于\"Go back\"按钮尚未工作，用户无法返回到\
  \ First View Controller。为了实现此功能，我们需要创建用于关闭视图控制器的 Unwind Segue。要创建此类 Segue，首先需要定义一个操作，以便视图控制器能够被展开。此方法被定义为\
  \ Unwind Segue 的目标。\n\n为了在 `Navigation` 应用中创建 Unwind Segue，我在 `FirstViewController`\
  \ 类的定义中补充了 `UnwindToFirstViewController` 方法，该方法显示在代码清单 4-12 中，并且我还导入了一个必要的命名空间：`System.Diagnostics`。`UnwindToFirstViewController`\
  \ 使用 `Action` 属性进行了修饰，因此它可以被 Objective-C 运行时调用。因此，iOS 设计器可以识别它，我们现在可以将此方法用于 Unwind\
  \ Segue。\n\n```\n[Action(\"UnwindToFirstViewController:\")]\npublic void UnwindToFirstViewController(UIStoryboardSegue\
  \ segue)\n{\n    Debug.WriteLine(\"UnwindToFirstViewController\");\n}\n```\n\n代码清单\
  \ 4-12. Unwind Segue 的操作\n\n为了将 `UnwindToFirstViewController` 方法与\"Go back\"按钮关联起来，我打开可视化设计器，然后从\"\
  Go back\"按钮按住 CTRL 键并拖动到位于 Second View Controller 底部的绿色 Exit 图标（图 4-14）。释放鼠标左键后，会弹出一个窗口。此窗口包含一个可用于\
  \ Segue 的兼容操作方法列表。在我的例子中，这个列表只包含一个项：`UnwindToFirstViewController`。因此，选择该项后，我可以重新运行应用，你将看到现在可以在视图控制器之间导航了。\n\
  \n![A453659_1_En_4_Fig14_HTML.jpg](img/A453659_1_En_4_Fig14_HTML.jpg)\n\n图 4-14.\
  \ 创建 unwind segue\n\n\n\n### 准备 Segues\n\n通常，你需要在视图控制器之间传递数据。例如，你显示一个视图控制器来收集用户输入，当这个视图控制器被关闭后，收集到的数据会在初始的视图控制器中被使用。要在视图控制器之间传递数据，你需要使用\
  \ `UIViewController` 类的 `PrepareForSegue` 方法。`PrepareForSegue` 会在 Segue 执行之前被调用。\n\
  \n为了演示 `PrepareForSegue` 类的使用示例，我向 Navigation 项目补充了另一个类 `BaseViewController`，其定义如代码清单\
  \ 4-13 所示。\n\n```csharp\npublic class BaseViewController : UIViewController\n{\n\
  \    protected BaseViewController(IntPtr handle) : base(handle) { }\n\n    public\
  \ override void PrepareForSegue(UIStoryboardSegue segue, NSObject sender)\n    {\n\
  \        base.PrepareForSegue(segue, sender);\n        var sourceViewControllerName\
  \ = segue.SourceViewController.GetType().Name;\n        var destinationViewControllerName\
  \ = segue.DestinationViewController.GetType().Name;\n        Debug.WriteLine($\"\
  From: {sourceViewControllerName} \" +\n                        $\"To: {destinationViewControllerName}\"\
  );\n    }\n}\n```\n\n*代码清单 4-13. `PrepareForSegue` 方法输出实现源视图控制器和目标视图控制器的类名*\n\n\
  `BaseViewController` 类继承自 `UIViewController`，有一个默认构造函数，并重写了 `PrepareForSegue` 方法。除了基类功能外，`PrepareForSegue`\
  \ 方法读取实现源视图控制器和目标视图控制器的两个类的名称，然后将它们显示在应用程序输出中。\n\n此示例演示了如何访问参与 Segue 的视图控制器实例。因此，要实际在视图控制器之间传递数据，你需要为相关类补充公共属性，然后在\
  \ `PrepareForSegue` 方法中重写它们。\n\n为了使用代码清单 4-13 中的类，我修改了 `FirstViewController` 和 `SecondViewController`\
  \ 的声明，使它们继承自 `BaseViewController` 而不是 `UIViewController`（如代码清单 4-3 所示）。因此，当你重新运行应用并在视图之间进行导航时，Navigation\
  \ 应用的输出应类似于图 4-15 所示。\n\n![A453659_1_En_4_Fig15_HTML.jpg](img/A453659_1_En_4_Fig15_HTML.jpg)\n\
  \n*图 4-15. 显示 Segue 流程的应用程序输出*\n\n## 本章小结\n\n在本章中，我们学习了如何创建多视图应用，以及如何使用各种方法在视图之间进行导航。我们从\
  \ Tabbed App 项目模板开始，研究了如何创建和修改标签页。然后，我们转向 Page-Based App 项目模板。我们深入研究了其相对复杂的结构，然后修改了应用代码以更好地理解基于页面的导航。最后，我们在视图控制器之间创建了自定义的\
  \ Segue。在下一章中，我们将学习如何处理 iOS 应用中的触摸手势。\n\n"
- "# 5. 触摸\n\n移动设备通过触摸手势进行控制。用户可以使用手势在视图之间切换，或者操作视觉元素来平移、旋转和调整其大小。在本章中，我们将学习如何在 Xamarin.iOS\
  \ 中处理手势。我们将从对“手势识别器”的简短介绍开始，然后研究如何使用手势进行导航。随后，我们将学习如何以编程方式创建和控制手势识别器及其生成的编程事件。最后，我们将实现一个应用，其中视觉组件的位置、旋转和缩放都将通过手势来控制。因此，学完本章后，你将了解如何对视觉控件执行复杂操作，这对于媒体应用（如照片编辑器或绘图工具）非常有用，这类应用广泛利用手势来调整视觉元素的外观。\n\
  \n## 触摸与手势识别器\n\n每当用户触摸屏幕时，会引发一系列相应的事件。要处理这些事件，通常需要在与视图控制器关联的类中实现以下方法：\n\n- `TouchesBegan`：当用户用一根或多根手指触摸屏幕时调用。\n\
  - `TouchesMoved`：当用户改变其手指在屏幕上的位置时调用。\n- `TouchesCancelled`：当触摸被取消时调用。\n- `TouchesEnded`：当触摸手势完成时调用。\n\
  \n为了展示一个实际示例，我创建了一个名为 `Touches` 的新单一视图应用（通用，目标 iOS 9.0 及以上）。随后，我通过上述方法扩展了 `ViewController`\
  \ 类的定义，并根据代码清单 5-1 实现了它们（请注意，此代码依赖于以下命名空间：`Foundation`、`System.Diagnostics` 和 `System.Linq`）。`TouchesBegan`、`TouchesCancelled`\
  \ 和 `TouchesEnded` 的实现不需要任何额外说明。所有这些方法都只是将方法名打印到应用程序输出中。需要稍多一点解释的是 `TouchesMoved`\
  \ 方法。该函数除了打印 `TouchesMoved` 字符串外，还会遍历事件处理程序接收到的触摸集合。通常，应用用户可以使用不止一根手指来执行手势。每根手指与屏幕的接触都被定义为一个*触摸*。关于每次触摸的信息作为\
  \ `NSSet` 的一个实例提供给事件处理程序。该对象表示一个无序的对象集合，在此特定情况下，代表触摸。因此，在代码清单 5-1 中，触摸集首先被转换为 `UITouch`\
  \ 对象的集合，每个 `UITouch` 对象都是屏幕上触摸或手指移动的抽象表示。然后，我将接触点的位置打印到应用程序输出中。\n\n```csharp\npublic\
  \ override void TouchesBegan(NSSet touches, UIEvent evt)\n{\n    base.TouchesBegan(touches,\
  \ evt);\n    Debug.WriteLine(\"TouchesBegan\");\n}\n\npublic override void TouchesMoved(NSSet\
  \ touches, UIEvent evt)\n{\n    base.TouchesMoved(touches, evt);\n    Debug.WriteLine(\"\
  TouchesMoved\");\n    foreach (var touch in touches.Cast<UITouch>())\n    {\n  \
  \      Debug.WriteLine(touch.GetPreciseLocation(View));\n    }\n}\n\npublic override\
  \ void TouchesCancelled(NSSet touches, UIEvent evt)\n{\n    base.TouchesCancelled(touches,\
  \ evt);\n    Debug.WriteLine(\"TouchesCancelled\");\n}\n\npublic override void TouchesEnded(NSSet\
  \ touches, UIEvent evt)\n{\n    base.TouchesEnded(touches, evt);\n    Debug.WriteLine(\"\
  TouchesEnded\");\n}\n```\n\n*代码清单 5-1. 处理触摸的低级信息*\n\n当你在模拟器中运行 `Touches` 应用时，它将生成如图\
  \ 5-1 所示的输出。如图所示，手势的开始由 `TouchesBegan` 方法指示。随后，会引发一系列 `TouchesMoved` 事件，每个事件报告当前触摸接触点的位置（手指接触屏幕的位置）。最后，触发\
  \ `TouchesEnded` 事件，通知你用户已将手指从屏幕上抬起。\n\n![A453659_1_En_5_Fig1_HTML.jpg](img/A453659_1_En_5_Fig1_HTML.jpg)\n\
  \n*图 5-1. 显示 `Touches` 应用示例输出的屏幕截图*\n\n\n\n"
- "# iOS 中的手势识别器\n\n为了识别或检测特定手势（如滑动、长按、平移、旋转或捏合），你需要分析触摸集合以找出代表特定手势的模式。更具体地说，你需要利用每个接触点的位置来确定触摸的路径。不过，iOS\
  \ SDK 提供了几个为你完成此任务的类。这些类被定义为手势识别器，由于它们实现了所有必要的计算，因此极大地简化了手势识别。你只需实例化一个合适的手势识别器类，它便会在检测到特定手势时触发相应的事件。与大多数其他\
  \ iOS SDK 组件一样，手势识别器被封装在 Xamarin.iOS 的相应对象中。\n\n在接下来的几节中，我将告诉你如何利用手势识别器来执行导航和操作可视化组件。\n\
  \n## 滑动与长按手势识别器\n\n为了演示如何使用手势识别器，我将扩展我们在前一章中开发的导航应用，使用户能够通过滑动和长按手势在视图之间切换。具体来说，长按手势将允许用户从第一个视图导航到第二个视图，而用户则使用滑动手势导航回第一个视图。我将首先使用\
  \ iOS 设计器创建滑动手势识别器，然后以编程方式生成长按手势识别器。\n\n为了实现这样的功能，我首先复制配套代码中`Chapter_05` 下的项目文件夹，然后在\
  \ Visual Studio 中将项目重命名（通过上下文菜单中的“重命名...”选项），从 Navigation 改为 Navigation.Swipe。接着，我打开\
  \ iOS 设计器，从工具箱中将“滑动手势识别器”拖拽到第二个视图控制器上。这个手势识别器的一个小图标会出现在第二个视图控制器的底部（见图 5-2）。\n\n\
  ![A453659_1_En_5_Fig2_HTML.jpg](img/A453659_1_En_5_Fig2_HTML.jpg)\n\n**图 5-2.**\
  \ 添加到视图控制器的滑动手势识别器\n\n然后，我打开滑动识别器的“属性”面板，进入“事件”选项卡，在“操作”下拉列表中输入 `SwipeDetected`（图\
  \ 5-3）。按下回车键后，Visual Studio 会创建一个事件处理程序，我按照清单 5-2 对其进行定义。\n\n![A453659_1_En_5_Fig3_HTML.jpg](img/A453659_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3.** 为滑动手势识别器创建事件处理程序\n\n```\npartial void SwipeDetected(UISwipeGestureRecognizer\
  \ sender)\n{\n    DismissViewController(true, null);\n}\n```\n\n**清单 5-2.** 识别到滑动手势时关闭视图控制器\n\
  \n当你重新运行应用时，你可以通过点击“切换视图”按钮导航到第二个视图。一旦第二个视图显示出来，你可以通过右滑手势返回第一个视图。每当检测到这种手势时，识别器就会触发一个相应的事件，此事件由\
  \ `SwipeDetected` 处理。如清单 5-2 所示，我使用此方法通过 `UIViewController` 类的 `DismissViewController`\
  \ 方法导航回。`DismissViewController` 接受两个参数：\n\n*   `animated` – 指定视图之间的过渡是否应带有动画效果\n\
  *   `completionHandler` – 允许你指定动画完成时执行的代码\n\n在清单 5-2 中，我启用了动画效果，并为 `DismissViewController`\
  \ 的第二个参数传递了 `null`，因为我不需要执行任何额外的方法。\n\n手势识别器还具有多个属性，允许你根据特定需求调整它们。例如，你可以修改滑动手势识别器，使其对选定的滑动方向做出响应（见图\
  \ 5-4）。为此，你需要使用“滑动”下拉列表。此外，你还可以指定滑动所需的手指数量（“触摸次数”数字控件）。\n\n![A453659_1_En_5_Fig4_HTML.jpg](img/A453659_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4.** 滑动手势识别器的属性\n\n现在，让我们使用长按手势识别器来实现从第一个视图到第二个视图的导航。为此，我按如下步骤操作。首先，我在 `FirstViewController`\
  \ 类的 `ViewDidLoad` 方法中以编程方式实例化代表识别器的 `UILongPressGestureRecognizer` 类（清单 5-3）。然后，我使用\
  \ `AddGestureRecognizer` 方法将生成的实例与视图关联起来。\n\n```\npublic override void ViewDidLoad()\n\
  {\n    base.ViewDidLoad();\n    var longPressGestureRecognizer =\n        new UILongPressGestureRecognizer(PresentSecondViewController);\n\
  \    View.AddGestureRecognizer(longPressGestureRecognizer);\n}\n```\n\n**清单 5-3.**\
  \ 以编程方式创建手势识别器\n\n如清单 5-3 所示，`UILongPressGestureRecognizer` 类的构造函数接受一个指向操作的参数，即\
  \ `PresentSecondViewController`，每当识别到手势时就会调用该操作。在前面的案例中，我们通过“属性”面板做了同样的事情（将方法与 Action\
  \ 事件关联）。所以现在你知道了将操作与手势识别器关联的两种等效方法。\n\n```\nprivate void PresentSecondViewController(\n\
  \    UILongPressGestureRecognizer sender)\n{\n    if(sender.State == UIGestureRecognizerState.Began)\n\
  \    {\n        var secondViewController = Storyboard.\n            InstantiateViewController(\"\
  SecondViewController\")\n            as UIViewController;\n        PresentViewController(secondViewController,\
  \ true, null);\n    }\n}\n```\n\n**清单 5-4.** 呈现视图控制器\n\n`PresentSecondViewController`\
  \ 的定义出现在清单 5-4 中。此方法有一个参数 `sender`，其类型为 `UILongPressGestureRecognizer`。该参数存储了在此案例中检测到长按手势的识别器实例。在实践中，你可以使用此实例来获取有关手势的更多信息。特别是，你可以检查手势状态，该状态由\
  \ `UIGestureRecognizerState` 枚举中的以下项目之一表示：\n\n*   `Began` – 表示手势识别器已识别出一组触摸为特定手势\n\
  *   `Changed` – 表示触摸（或手指位置）已发生改变\n*   `Possible` – 手势识别器已识别出触摸组，但仍在对它们进行处理以便识别手势\n\
  *   `Ended`、`Cancelled`、`Failed` – 分别表示手势已完成、已取消或已失败（未识别）。\n\n在清单 5-4 中，我查找 `Began`\
  \ 状态，然后使用 `Storyboard` 的 `InstantiateViewController` 方法创建第二个视图控制器。随后，我调用 `PresentViewController`\
  \ 来导航到第二个视图控制器。为了使用 `Storyboard` 类实例化视图控制器，我需要为视图控制器设置故事板标识符。我通过“属性”面板进行设置，如图 5-5\
  \ 所示。\n\n如果你现在重新运行应用，你可以在第一个视图中点击并按住鼠标按钮。稍后第二个视图就会出现。如你所见，你现在可以通过手势和按钮在视图之间进行导航。\n\
  \n![A453659_1_En_5_Fig5_HTML.jpg](img/A453659_1_En_5_Fig5_HTML.jpg)\n\n**图 5-5.**\
  \ 设置 `SecondViewController` 的故事板标识符\n\n\n\n## 使用手势操作控件\n\n现在我将介绍如何使用手势识别器来操作控件。为此，我将开发一款应用，如图\
  \ 5-6 所示。该应用包含一个控件，即 `UIView` 类的一个实例，代表一个紫色方块。该控件将通过平移手势进行平移，通过旋转手势进行旋转，并通过捏合手势进行缩放。\n\
  \n![A453659_1_En_5_Fig6_HTML.jpg](img/A453659_1_En_5_Fig6_HTML.jpg)\n\n**图 5-6.**\
  \ 手势应用的示例视图，我们将通过开发此应用来学习平移、旋转和捏合手势识别器\n\n#### 平移手势识别器\n\n我首先使用单视图应用项目模板创建手势应用。我将此应用设为通用应用，并将最低目标版本设置为\
  \ iOS 9.0。接着，在 `ViewController` 类中，我首先导入两个命名空间：`System.Drawing` 和 `CoreGraphics`。然后，我声明一个\
  \ `UIView` 类型的私有字段。该字段存储了对紫色矩形的引用。之后，我实现了两个私有方法：`AddSquare` 和 `AddPanGestureRecognizer`（代码清单\
  \ 5-5）。\n\n```\nprivate UIView square;\n\nprivate void AddSquare(float squareSideLength,\
  \ UIColor color)\n{\n    square = new UIView()\n    {\n        BackgroundColor =\
  \ color,\n        Frame = new RectangleF(0, 0, squareSideLength, squareSideLength),\n\
  \        Center = new CGPoint(View.Frame.Width / 2.0, View.Frame.Height / 2.0)\n\
  \    };\n    Add(square);\n}\n\nprivate void AddPanGestureRecognizer()\n{\n    var\
  \ panGestureRecognizer =\n        new UIPanGestureRecognizer(TranslateSquare);\n\
  \    View.AddGestureRecognizer(panGestureRecognizer);\n}\n```\n\n**代码清单 5-5.** `ViewController`\
  \ 类的私有成员\n\n`AddSquare` 方法用于创建并配置代表紫色方块的 `UIView` 类实例。该方法使用了之前讨论过的功能，因此无需对其做进一步说明。代码清单\
  \ 5-5 中的第二个方法 `AddPanGestureRecognizer` 首先实例化 `UIPanGestureRecognizer`，然后将其与视图关联。每当此对象识别到平移手势时，它将调用代码清单\
  \ 5-6 中的 `TranslateSquare` 方法。\n\n```\nprivate void TranslateSquare(UIPanGestureRecognizer\
  \ sender)\n{\n    var translation = sender.TranslationInView(View);\n    square.Transform\
  \ = CGAffineTransform.\n        MakeTranslation(translation.X, translation.Y);\n\
  }\n```\n\n**代码清单 5-6.** 平移方块\n\n`TranslateSquare` 通过 `UIPanGestureRecognizer` 类实例的\
  \ `TranslationInView` 方法读取使用平移手势产生的平移量。`TranslationInView` 返回一个 `CGPoint` 结构体实例，其\
  \ `X` 和 `Y` 属性分别存储相对于水平和垂直方向的平移量。然后，我使用这些值通过修改 `UIView` 的 `Transform` 属性来平移方块，该属性的引用存储在\
  \ `square` 字段中。`Transform` 属性的类型为 `CGAffineTransform`，表示特定视觉组件的几何变换。一般来说，这种变换称为仿射变换，描述了视觉控件的平移、旋转和缩放变化。目前我只平移方块，因此我使用\
  \ `CGAffineTransform` 结构体的 `MakeTranslation` 静态方法创建平移变换。`MakeTranslation` 方法接受两个参数，分别表示水平方向（第一个参数，`tx`）和垂直方向（第二个参数，`ty`）的平移量。因此，每当识别到平移手势时，方块就会相应地平移。\n\
  \n为了实际使用 `AddSquare` 和 `AddPanGestureRecognizer` 方法，我修改了 `ViewDidLoad` 视图事件处理程序，如代码清单\
  \ 5-7 所示。现在你可以在模拟器中运行手势应用并使用平移手势——只需在按住鼠标左键的同时移动鼠标光标。你会看到，当你在视图内移动鼠标光标时，方块会随之平移。但是，你很容易注意到，你可以在视图中的任何位置执行平移手势。现在让我们修改应用，使其仅当平移手势在方块上执行时（换句话说，当你虚拟地按住方块时）才平移方块。这需要检测接触位置，下一节将对此进行讨论。\n\
  \n![A453659_1_En_5_Fig7_HTML.jpg](img/A453659_1_En_5_Fig7_HTML.jpg)\n\n**图 5-7.**\
  \ 使用平移手势平移方块\n\n```\npublic override void ViewDidLoad()\n{\n    base.ViewDidLoad();\n\
  \    AddSquare(50.0f, UIColor.Purple);\n    AddPanGestureRecognizer();\n}\n```\n\
  \n**代码清单 5-7.** `ViewController` 的 `ViewDidLoad` 方法\n\n\n\n#### 检测手势位置\n\n要获取触摸的位置，你可以使用手势识别器类实例的\
  \ `LocationInView` 方法。该方法适用于所有手势识别器，因为它是在 `UIGestureRecognizer` 类中实现的，而其他所有手势识别器都继承自此类。你也可以使用\
  \ `LocationOfTouch` 方法跟踪执行手势的特定触摸（手指）的位置。这两个方法都返回 `CGPoint` 结构体，其 `X` 和 `Y` 属性存储了手势（或特定手指）在屏幕上的几何位置。\n\
  \n在 Gestures 应用中，我使用 `LocationInView` 方法来检查平移手势是否在紫色方块上执行。如代码清单 5-8 所示，我使用该方法实现了另一个辅助函数\
  \ `IsTouchLocationWithinSquare`。后者读取主视图中的触摸位置，然后检查该位置是否在方块内。为此，我使用了 `square.Frame`\
  \ 属性的 `Contains` 方法。`Contains` 会计算位置（`CGPoint` 结构体）的 `X` 和 `Y` 分量是否在包围紫色方块的矩形（`Frame`\
  \ 属性）内。如果是，我就可以平移该方块。因此，我修改了 `TranslateSquare` 方法（代码清单 5-6），首先调用 `IsTouchLocationWithinSquare`。然后，如果该方法返回\
  \ `true`，我就为方块创建平移变换（代码清单 5-9）。\n\n```\nprivate bool IsTouchLocationWithinSquare(\n\
  UIPanGestureRecognizer panGestureRecognizer)\n{\nvar location = panGestureRecognizer.LocationInView(View);\n\
  return square.Frame.Contains(location.X, location.Y);\n}\n代码清单 5-8.\n仅当在方块上执行平移手势时，视图才会被平移\n\
  ```\n\n```\nprivate void TranslateSquare(UIPanGestureRecognizer sender)\n{\nif (IsTouchLocationWithinSquare(sender))\n\
  {\nvar translation = sender.TranslationInView(View);\nsquare.Transform = CGAffineTransform.\n\
  MakeTranslation(translation.X, translation.Y);\n}\n}\n代码清单 5-9.\n仅当手势位置在该控件的边界内时，紫色方块才会被平移\n\
  ```\n\n如果你现在重新运行 Gestures 应用，你会看到只有当你在该控件上方执行平移手势时，方块才会被平移。然而，当你重复这个手势时，你会注意到紫色方块的平移变换始终以屏幕中心为原点。这是因为手势识别器计算的是单次手势期间的位移，并未考虑之前手势所做的任何平移。要精确地平移方块，我们需要累计自应用启动以来执行的所有手势的总平移量。因此，我们需要在连续的平移手势结束后存储平移值，然后将该结果值添加到后续的位移中。为了实现这样的功能，我首先在\
  \ `ViewController` 的定义中补充了一个私有字段 `lastTranslation`（类型为 `CGPoint`），然后修改 `TranslateSquare`\
  \ 方法，以存储手势结束时的平移量（代码清单 5-10）。为了累计单次平移手势期间完成的平移量，我读取了 `square.Transform` 属性的 `x0`\
  \ 和 `y0` 属性。我将结果值存储在 `lastTranslation` 成员的 `X` 和 `Y` 分量中，并将它们添加到实际的平移变换中。因此，当你重新运行应用时，紫色方块会“记住”它在上次平移手势中的位置。这样，所有后续的平移手势都能正确地平移紫色方块。\n\
  \n```\nprivate CGPoint lastTranslation;\nprivate void TranslateSquare(UIPanGestureRecognizer\
  \ sender)\n{\nif (IsTouchLocationWithinSquare(sender))\n{\nvar translation = sender.TranslationInView(View);\n\
  square.Transform = CGAffineTransform.MakeTranslation(\ntranslation.X + lastTranslation.X,\n\
  translation.Y + lastTranslation.Y);\n}\nif (sender.State == UIGestureRecognizerState.Ended)\n\
  {\nlastTranslation.X = square.Transform.x0;\nlastTranslation.Y = square.Transform.y0;\n\
  }\n}\n代码清单 5-10.\n累计方块的平移量\n```\n\n#### 旋转和捏合手势识别器\n\n现在让我们将旋转和捏合手势识别器整合到 Gestures\
  \ 应用中，这样紫色方块就可以被旋转和缩放。此示例的实现需要几个组件。我将从一个方法开始，该方法将平移、旋转和缩放组合成一个单一的仿射变换。然后，我将告诉你如何以编程方式创建旋转和捏合手势识别器，并启用同时手势识别。\n\
