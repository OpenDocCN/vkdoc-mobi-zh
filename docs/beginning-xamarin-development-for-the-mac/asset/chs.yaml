- '# 地图视图与地理定位


  我们在上一节中开发的谷歌地图示例，其目标是展示 Web 视图的强大能力。在 iOS 上，如果你想要显示地图，不一定非要用 Web 视图。相反，你可以使用 iOS
  SDK 提供的原生地图框架。具体来说，这个框架提供了地图视图，你可以通过 Xamarin.iOS 中 `MapKit` 命名空间下声明的 `MKMapView`
  类来访问它。`MKMapView` 让你能够快速地为你的应用添加一个交互式的原生 iOS 地图。在这个地图上，你甚至可以显示用户设备的当前位置、添加适当的标注，甚至显示行车路线。因此，你可以相对快速地为你应用添加高级功能。在本节中，我将告诉你如何使用地图框架以及
  `CLLocationManager`（一个用于追踪 iOS 设备地理位置的类）来创建一个能在地图上显示用户位置的应用。更具体地说，这个应用将只有一个视图，其外观如图
  3-10 所示。


  为了实现这个应用，我首先使用“单视图应用”模板创建一个新项目。我将应用名称设置为其最低目标版本分别设置为 `Map` 和 iOS 9.0。然后，在 `ViewController`
  类中，我引入了三个命名空间：`MapKit`、`System.Linq` 和 `CoreLocation`。随后，我声明了私有成员 `map` 和一个辅助函数
  `InitMap`（代码清单 3-23）。这个方法用于创建一个 `MKMapView` 类的实例并设置其选定属性。具体来说，我启用了缩放和平移，并将 `ShowsUserLocation`
  属性设置为 `true`。这使地图能够显示用户的位置，该位置由一个带有白色边框的蓝色圆点表示（图 3-10）。此外，我使用 `MKMapView` 类实例的相应属性来配置地图类型。所有可用的地图类型都在
  `MKMapType` 枚举中定义。你可以在以下几种地图样式之间进行选择：


  ![A453659_1_En_3_Fig10_HTML.jpg](img/A453659_1_En_3_Fig10_HTML.jpg)


  图 3-10. 地图视图的示例用法


  - `Standard` – 表示地图使用标准制图样式（类似于图 3-7 左侧部分所示）

  - `Satellite` – 地图将使用通过卫星获取的影像进行创建

  - `Hybrid` – 标准地图与卫星影像的组合

  - `SatelliteFlyover` 和 `HybridFlyovers` – 分别表示地图类型将采用卫星影像或混合影像的“飞越”模式


  ```

  private MKMapView map;

  private void InitMap()

  {

  map = new MKMapView(View.Frame)

  {

  ZoomEnabled = true,

  ScrollEnabled = true,

  MapType = MKMapType.HybridFlyover,

  ShowsUserLocation = true

  };

  Add(map);

  }

  代码清单 3-23. 初始化地图

  ```


  要显示地图，你需要将 `InitMap` 方法添加到 `ViewController` 类的 `ViewDidLoad` 事件处理程序中。如果你这样做了并重新运行应用，你会看到视图被一个地图视图填满。你可以随意平移地图视图。如果你想在模拟器中缩放地图视图，你需要按住
  Alt/Option 键。模拟器中会显示两个代表两根手指的圆圈。它们模拟你在进行捏合手势时手指的位置。因此，你现在可以改变圆圈之间的距离来增加或减少地图的缩放级别。


  ```

  private CLLocationManager locationManager;

  private void InitLocationManager()

  {

  locationManager = new CLLocationManager();

  // 请求授权

  if (UIDevice.CurrentDevice.CheckSystemVersion(8, 0))

  {

  locationManager.RequestWhenInUseAuthorization();

  }

  // 处理 LocationsUpdated 事件

  locationManager.LocationsUpdated += (sender, e) =>

  {

  UpdateMap(e);

  };

  }

  代码清单 3-24. 实例化 CLLocationManager

  ```


  现在，让我们继续前进，访问设备的地理位置。为此，我通过另一个私有字段 `locationManager`（类型为 `CLLocationManager`）和一个辅助方法
  `InitLocationManager`（代码清单 3-24）来扩展 `ViewController` 类的定义。该方法使用默认的无参构造函数创建了一个 `CLLocationManager`
  实例，然后请求用户允许 `Map` 应用在其前台运行时访问其位置。为此，我使用了 `RequestWhenInUseAuthorization`。如果你还想在后台访问设备的位置，那么你需要使用
  `RequestAlwaysAuthorization` 方法。无论你选择哪种方法，你都需要在“信息属性列表”中指定相应的属性。你可以在 Info.plist
  编辑器的“源”选项卡中进行配置（请参考第 2 章）。然后，点击“添加新条目”链接（列表的最后一个元素）；会出现一个自定义属性字符串。在其旁边，你会找到一个用于激活下拉列表的图标。你使用这个列表来选择“位置使用时的使用说明（前台访问用户位置）”或“位置始终使用说明（后台访问用户位置）”。此处，我使用第一个属性（图
  3-11）。然后，在编辑器的“值”列中，输入字符串。此字符串定义了一条将显示给被请求访问位置的用户的消息。无论何时你调用 `RequestWhenInUseAuthorization`（图
  3-12）并且你的应用没有访问用户位置的权限时，这个模态窗口都会自动显示。


  ![A453659_1_En_3_Fig12_HTML.jpg](img/A453659_1_En_3_Fig12_HTML.jpg)


  图 3-12. 请求访问用户位置


  ![A453659_1_En_3_Fig11_HTML.jpg](img/A453659_1_En_3_Fig11_HTML.jpg)


  图 3-11. 向信息属性列表添加自定义属性


  你只能在 iOS 8.0 及以上版本中请求用户的私密数据。因此，在调用 `RequestWhenInUseAuthorization` 之前，我使用 `UIDevice`
  类的静态属性 `CurrentDevice` 的 `CheckSystemVersion` 方法来验证 iOS 版本。


  最后，在代码清单 3-24 中，我将 `UpdateMap` 方法与 `CLLocationManager` 类实例的 `LocationsUpdated` 事件处理程序关联起来。`LocationsUpdated`
  事件在用户位置发生变化时触发。`UpdateMap` 及其依赖项的定义在代码清单 3-25 中给出。如该清单所示，我首先读取最后已知的位置，并使用它来设置地图中心和配置地图区域。后者是地图上显示的部分，或者定义地图的缩放级别。为了配置地图区域，我首先创建一个
  `MKCoordinateSpan` 类的实例。你使用这个类，通过 `MKCoordinateSpan` 类构造函数的相应参数（`latitudeDelta`
  和 `longitudeDelta`）来指定纬度和经度方向上的地图距离。这两个参数都以度为单位。1 度大约相当于 69 英里（111 公里）。但是，`latitudeDelta`
  的精确值取决于经度跨度。这里，我将两个方向上的跨度都设置为 0.005 度。有了 `MKCoordinateSpan` 的实例，我就可以用它来实例化 `MKCoordinateRegion`
  类。它的构造函数接受以下两个参数：


  - `center`，类型为 `CLLocationCoordinate2D`，指定地图区域的中点

  - `span`，类型为 `MKCoordinateSpan`，决定地图的缩放级别


  为了获得 `MKCoordinateRegion` 构造函数所需的 `CLLocationCoordinate2D` 实例，我读取了从 `CLLocationManager`
  获取的位置的 `Coordinate` 属性（代码清单 3-25）。




  ```csharp

  private const double spanDelta = 0.005d;

  private void UpdateMap(CLLocationsUpdatedEventArgs e)

  {

  var location = e.Locations.LastOrDefault();

  if (location != null)

  {

  map.CenterCoordinate = location.Coordinate;

  SetMapRegion(location.Coordinate);

  }

  }

  private void SetMapRegion(CLLocationCoordinate2D centerCoordinate)

  {

  var span = new MKCoordinateSpan(spanDelta, spanDelta);

  var region = new MKCoordinateRegion(centerCoordinate, span);

  map.SetRegion(region, false);

  }

  ```

  **列表 3-25.** 更新地图视图以显示用户位置


  最后，我将 `InitLocationManager` 方法添加到 `ViewDidLoad` 中（列表 3-26）。然后，我需要强制 `CLLocationManager`
  报告用户位置的变化。为此，我在 `ViewDidAppear` 视图事件处理程序中调用 `StartUpdatingLocation` 方法。相应地，当视图消失时，我调用
  `StopUpdatingLocation`，以便应用在后台运行时不会访问用户的位置。


  现在您可以重新运行应用，很快会看到地图视图显示当前用户位置。要在模拟器中模拟地理位置的改变，您可以使用模拟器 `Debug/Location` 菜单中的几个选项（图
  3-13）。使用“城市自行车骑行”、“城市跑步”或“高速公路行驶”选项可以获得最佳效果。


  ![A453659_1_En_3_Fig13_HTML.jpg](img/A453659_1_En_3_Fig13_HTML.jpg)


  **图 3-13.** 此屏幕截图显示了可用于模拟模拟器地理位置变化的“位置”菜单


