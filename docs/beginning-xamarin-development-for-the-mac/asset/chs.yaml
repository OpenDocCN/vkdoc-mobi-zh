  完成这些操作后，我开始实现逻辑。首先，在 `UserDetailsViewController` 类中，我声明了一个公共属性 `User` 和两个私有字段（列表
  7-23）。该属性用于传递要显示的用户数据。第一个字段配置地图的区域，第二个字段存储对 `UsersRepository` 对象的引用。


  ```

  public partial class UserDetailsViewController : UIViewController

  {

  public User User { get; set; }

