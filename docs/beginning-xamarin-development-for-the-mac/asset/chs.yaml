  OpenWeatherMap 的文档，这在大城市中可能会出现。我即将使用的 `WeatherInfo` 类的第二个元素是名为 `Weather` 的集合。该集合中的每个元素都是
  `Weather` 类的一个实例（清单 9-4）。`Weather` 类有四个属性：


  * `Id` – 表示集合中元素的标识符

  * `Main` – 天气参数组

