  ## 本章小结


  在本章中，我们探讨了 Xamarin.iOS 应用的自动测试方法。我们首先创建了 C# 代码的单元测试，然后实现了自动化 UI 测试。后者在本地模拟器中运行，并在来自
  Xamarin 测试云的多个物理 iOS 设备上运行。你可以使用所介绍的所有方法来确保你的应用在要求苛刻的移动市场上具有高质量。我们将使用在这里学到的单元测试方法来开发一个客户端应用，该应用可以消费并更新来自
  Web 服务的数据。


