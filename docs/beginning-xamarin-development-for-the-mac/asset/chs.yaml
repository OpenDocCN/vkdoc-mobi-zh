  \ 测试运行器\n\n## 用户界面测试\n\n验证`Person`类后，我们可以继续使用它来实现 Persons 应用。随后，我们将使用 Xamarin UI\
  \ Tests 框架和 Xamarin Test Cloud（XTC）测试其 UI。\n\n#### 创建应用\n\n我使用单视图 iOS 应用模板（支持 iOS\
  \ 9.0 及更高版本）创建了 Persons 应用。然后，我定义此应用的 UI，如图 6-2 所示。即，我创建了一个按钮、四个标签和四个文本字段。现在，我将每个文本字段的名称和辅助功能标识符（图\
  \ 6-12）分别设置为`TextFieldFirstName`、`TextFieldLastName`、`TextFieldEmail`和`TextFieldAge`。名称将用于在\
  \ C# 代码中设置每个`TextField`的文本属性，而辅助功能标识符将用于在 UI 测试中查找控件。随后，我双击按钮以创建`TouchUpInside`事件处理程序，并暂时将该方法留空。最后，我编辑引用，使得\
  \ Persons 应用引用`Person.Common`库。\n\n![A453659_1_En_6_Fig12_HTML.jpg](img/A453659_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12. 配置辅助功能标识符\n\n#### Xamarin Test Cloud 代理\n\n要使测试运行器能够与 Persons 应用交互，你需要使用\
  \ Xamarin Test Cloud 代理，将其作为 NuGet 包安装。要安装它，你可以进入解决方案资源管理器，然后从 Persons/Packages\
  \ 节点的上下文菜单中选择“添加包…”选项，或使用菜单“项目 ➤ 添加 NuGet 包…”。无论选择哪种方法，都会出现“添加包”对话框。在此对话框中，进入搜索框并输入`Xamarin\
  \ Test Cloud Agent`。匹配的包列表将显示在左侧，如图 6-13 所示。然后选择列表中的第一个元素，并单击“添加包”按钮。\n\n![A453659_1_En_6_Fig13_HTML.jpg](img/A453659_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13. 安装 Xamarin Test Cloud Agent NuGet 包\n\n片刻后，NuGet 包将被添加到 Persons 项目中。然后，你只需通过在`FinishedLaunching`事件处理程序中添加以下语句（列表\
  \ 6-8）`Xamarin.Calabash.Start()`来启用它。此事件处理程序定义在 Persons 项目的`AppDelegate.cs`文件中。由于启用了\
  \ Xamarin Test Cloud 代理的应用无法提交到商店，列表 6-8 中的相应语句被 C# 预处理指令包围，并且仅在定义了`ENABLE_TEST_CLOUD`符号时执行。在安装\
  \ Xamarin Test Cloud Agent NuGet 包后，测试应用的调试配置中默认会执行此操作。要查看此设置，请转到 Persons 项目的选项，然后打开“生成/编译器”选项卡。`ENABLE_TEST_CLOUD`将列在“定义符号”文本框中。如果将配置更改为“发布”，则该符号未定义。\n\
  \n```\npublic override bool FinishedLaunching(\nUIApplication application, NSDictionary\
  \ launchOptions)\n{\n#if ENABLE_TEST_CLOUD\nXamarin.Calabash.Start();\n#endif\n\
  return true;\n}\n列表 6-8.\n设置 Xamarin Test Cloud 代理\n```\n\nXamarin Test Cloud 代理在启用时，会监听来自测试运行器的请求。此代理接受以编程方式生成的手势（如点击和滑动），并允许测试运行器与视觉控件交互；例如，从文本字段读取文本。重要的是，测试运行器还可以使用\
  \ Xamarin Test Cloud 代理截取应用屏幕截图，以验证布局在各种设备上是否正确，以及在设备旋转时所有必要控件是否可见且位于预期位置。\n\n\n\
  \n#### 创建 UI 测试\n\n为了创建测试运行器，该运行器将向 Xamarin Test Cloud Agent 发送请求以测试 Persons 应用的\
  \ UI，我添加了一个新项目 `Persons.UITests`，该项目是使用 Visual Studio 中的 UI 测试应用项目模板创建的（图 6-14）。\n\
  \n![A453659_1_En_6_Fig14_HTML.jpg](img/A453659_1_En_6_Fig14_HTML.jpg)\n**图 6-14.**\
  \ 新建项目对话框中的 UI 测试应用项目模板\n\n创建 `Persons.UITests` 后，我们可以注意到，与 `Persons.Tests` 不同，该项目没有\
  \ iOS 应用的典型结构。此外，通过比较这两个项目，我们发现它们针对不同的框架并编译到不同的目标。要查看这一点，请转到解决方案资源管理器，从每个项目的上下文菜单中选择“选项”，然后转到“生成/常规”选项卡\
  \ ➤ “目标框架”并编译顶部显示的目标（见图 6-15）。\n\n![A453659_1_En_6_Fig15_HTML.jpg](img/A453659_1_En_6_Fig15_HTML.jpg)\n\
  **图 6-15.** `Persons.Tests`（上方）和 `Persons.UITests` 项目的生成选项的常规选项\n\n如图 6-15 所示，`Persons.Tests`\
  \ 是 Xamarin.iOS 可执行应用程序，并像其他任何 iOS 应用一样直接在设备或模拟器上运行。在这种情况下，您可以使用测试运行器的 UI 来调用测试方法（请回头参考图\
  \ 6-3）。另一方面，`Persons.UITests` 是 .NET Framework 类库。由于它未编译为可执行文件，因此是间接运行的。在 `Persons.UITests`\
  \ 中实现的每个测试方法都由 `Xamarin.UITest` 框架调用。要使用单元测试面板关联将由该框架执行的应用，请转到“视图” ➤ “面板” ➤ “单元测试”。将会出现一个如图\
  \ 6-16 所示的窗口。\n\n![A453659_1_En_6_Fig16_HTML.jpg](img/A453659_1_En_6_Fig16_HTML.jpg)\n\
  **图 6-16.** 单元测试面板\n\n在单元测试面板中，您首先选择要测试的应用。为此，右键单击“测试应用”节点，然后选择“添加应用项目”选项以浏览 Persons\
  \ 项目。之后，您可以通过按“全部运行”按钮或双击单元测试面板中 Persons ➤ UITests ➤ Tests 节点下出现的任何测试方法来运行 UI 测试，前提是该应用之前已部署到模拟器。默认的\
  \ UI 测试应用项目只有一个测试方法 `AppLaunches`。如果现在执行此方法，您将看到 UI 测试框架将另一个应用 DeviceAgent 部署到您的模拟器。`DeviceAgent`\
  \ 使用 iOS 提供的 UI 自动化 API 来模拟单元测试中以编程方式定义的手势和操作，并将它们发送到被测试的应用。因此，实际上，`DeviceAgent`\
  \ 充当了一个虚拟用户，在测试方法的指令下模拟用户操作。`DeviceAgent` 还收集这些操作的结果并将其传递回测试方法。\n\n要实现测试方法，您可以采用类似于实现单元测试的方式。更具体地说，每个测试类都由\
  \ `TestFixtureAttribute` 标记，而每个测试方法必须是公共的并且由 `TestAttribute` 修饰。清单 6-9 展示了此类结构在\
  \ `Tests` 类中的使用方式——这是一个随 `Persons.UITests` 项目创建的默认测试类。\n\n```csharp\n[TestFixture]\n\
  public class Tests\n{\n    iOSApp app;\n    [SetUp]\n    public void BeforeEachTest()\n\
  \    {\n        app = ConfigureApp.iOS.StartApp();\n    }\n    [Test]\n    public\
  \ void AppLaunches()\n    {\n        app.Screenshot(\"First screen.\");\n    }\n\
  }\n```\n**清单 6-9.** UI 测试类的默认定义\n\n通过分析清单 6-9，我们可以轻松地注意到与我们之前实现的单元测试相关的两个新元素。首先，还有一个方法\
  \ `BeforeEachTest`。此方法标有 `SetUpAttribute`。后者指示测试运行器在每个测试方法之前调用一个选定的函数。在这里，`BeforeEachTest`\
  \ 创建一个派生自 `iOSApp` 接口的对象。该接口定义了用于与被测应用交互的方法和属性。\n\n要创建 `iOSApp` 对象，您可使用静态类 `ConfigureApp`。此类有两个属性：类型为\
  \ `AndroidAppConfigurator` 的 `Android` 和类型为 `iOSAppConfigurator` 的 `iOS`。对于 iOS\
  \ 应用，我们只对第二个感兴趣，它用于配置测试参数（如设备标识符、应用包等）。然后，我们使用 `StartApp` 方法运行测试。`iOSApp` 类的实例随后被用来以编程方式操作\
  \ UI，其方式与用户操作完全相同。\n\n为了为 Persons 应用准备第一个 UI 测试，我首先通过清单 6-10 中的一个静态方法来扩展 `Person`\
  \ 类（`Persons.Common` 项目）的定义。此方法创建一个 `Person` 对象的实例，然后将公共属性配置为默认值。稍后我将在 UI 测试和 Person\
  \ 应用中使用 `Person.Default` 方法。\n\n```csharp\npublic static Person Default()\n{\n \
  \   return new Person\n    {\n        FirstName = \"Dawid\",\n        LastName =\
  \ \"Borycki\",\n        Age = 34,\n        Email = \"dawid@borycki.com.pl\",\n \
  \   };\n}\n```\n**清单 6-10.** Person 类的额外静态方法\n\n接下来，在 `Tests` 类（`Persons.UITests`）中，我根据清单\
  \ 6-11 实现了 `VerifyDisplayDataButton` 测试方法。`VerifyDisplayDataButton` 虚拟地点击 Persons\
  \ 应用视图中的一个按钮，并验证每个文本字段中的文本是否与默认人员数据对应。\n\n要以虚拟方式点击控件，您可以使用 `iOSApp` 类实例的 `Tap` 方法。此方法有两个重载版本：一个接受\
  \ C# `Func` 委托作为参数，另一个接受字符串参数。在第一种情况下，您创建 lambda 表达式，该表达式返回 `AppQuery` 类的实例。`AppQuery`\
  \ 类提供了许多用于查找 UI 元素的方法。在第二种情况下，您传递一个字符串，测试运行器使用该字符串通过检查 UI 元素的辅助功能标识符或辅助功能标签来查找它们。在这里，为了找到一个按钮，我使用了一个\
  \ lambda 表达式，它是用 `AppQuery.Button` 方法构建的。此方法匹配视图上的第一个按钮。\n\n接下来，我使用辅助方法 `GetTextFieldText`\
  \ 从文本字段读取文本，该方法通过文本字段的辅助功能标识符来查找它们。为此，我构建了一个 `AppQuery`，在其中传递一个表示控件辅助功能标识符的字符串参数。获取文本字段中的文本后，我将其与预期值进行比较，如果它们不同，则使用\
  \ `Assert` 类的静态方法引发相应的断言。\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n```csharp\n[Test]\npublic void VerifyDisplayDataButton()\n{\n    // Arrange\n\
  \    var defaultPerson = Person.Default();\n    // Act\n    app.Tap(b => b.Button());\n\
  \    var actualFirstName = GetTextFieldText(\"TextFieldFirstName\");\n    var actualLastName\
  \ = GetTextFieldText(\"TextFieldLastName\");\n    var actualEmail = GetTextFieldText(\"\
  TextFieldEmail\");\n    var actualAge = GetTextFieldText(\"TextFieldAge\");\n  \
  \  // Assert\n    Assert.AreEqual(defaultPerson.FirstName, actualFirstName);\n \
  \   Assert.AreEqual(defaultPerson.LastName, actualLastName);\n    Assert.AreEqual(defaultPerson.Email,\
  \ actualEmail);\n    Assert.AreEqual(defaultPerson.Age.ToString(), actualAge);\n\
  }\nprivate string GetTextFieldText(string textFieldAccessibilityId)\n{\n    var\
  \ result = string.Empty;\n    if(app.Query(c => c.Id(textFieldAccessibilityId)).FirstOrDefault()\n\
  \        is AppResult matchedTextField)\n    {\n        result = matchedTextField.Text;\n\
  \    }\n    return result;\n}\n```\n清单 6-11. UI 测试\n\n现在，我们可以通过在“单元测试”面板中双击 `VerifyDisplayDataButton`\
  \ 测试方法来执行它。测试运行器会执行 `DeviceAgent`，随后该代理会运行 Person 应用并虚拟地点击一个按钮。由于对应的事件处理器是空的，所以没有任何文本字段会包含预期值，测试将会失败，这显示在“测试结果”窗口中（图\
  \ 6-17）。`Assert.AreEqual` 方法会抛出一个异常，指出预期字符串 (`\"Dawid\"`) 与实际字符串 (`string.Empty`)\
  \ 不同。\n\n![A453659_1_En_6_Fig17_HTML.jpg](img/A453659_1_En_6_Fig17_HTML.jpg)\n\n\
  图 6-17. 测试结果窗口\n\n现在，我们可以根据清单 6-12 (`ViewController.cs`)，在 Person 应用中为按钮的 `TouchUpInside`\
  \ 事件实现处理器，然后重新构建 Person 应用，并重新运行 UI 测试以确认我们实现的正确性。通过这样做，我们有效地执行了 TDD 方法的一个迭代。也就是说，我们首先编写了一个测试方法并运行它来验证应用尚未实现预期功能。然后，我们为应用补充了正确的逻辑，并重新运行测试方法来确认它。一旦测试方法实现完毕，你就可以在每次更改相关源代码时执行它们，以确保你不会引入回归错误或丢失已实现的功能。因此，这种自动化测试有助于开发高质量的应用。\n\
  \n```csharp\npartial void ButtonDisplayPersonData_TouchUpInside(UIButton sender)\n\
  {\n    var defaultPerson = Person.Default();\n    TextFieldFirstName.Text = defaultPerson.FirstName;\n\
  \    TextFieldLastName.Text = defaultPerson.LastName;\n    TextFieldAge.Text = defaultPerson.Age.ToString();\n\
  \    TextFieldEmail.Text = defaultPerson.Email;\n}\n```\n清单 6-12. 用于显示默认 Person\
  \ 数据的事件处理器的最终定义\n\n## Xamarin Test Cloud\n\n到目前为止，我们编写的所有测试都是在本地模拟器中运行的。然而，Xamarin\
  \ UI 测试框架也可以用于在物理设备上运行测试。通常，你将待测应用部署到设备上，然后在该设备上运行 UI 测试。因此，如果你需要在多种设备上执行相同的测试，你需要依次进行，这会消耗额外的时间。此外，你需要实际拥有所有安装了不同操作系统版本的设备。因此，对\
  \ iOS 应用进行全面的测试可能非常昂贵，尤其是对于个人开发者而言。为了解决这些问题，Xamarin 提供了一个物理设备农场，即 Xamarin Test Cloud。`XTC`\
  \ 是一项基于云的服务，你可以直接从 Visual Studio 将应用及其 UI 测试上传到该服务中，然后根据需要在其提供的任意数量的设备上运行测试。测试结果随后会以清晰的报告形式呈现给你，如图\
  \ 6-4 所示。虽然将应用提交到 `XTC` 很简单，但它要求你为应用创建一个预置描述文件，因为应用包是在物理设备上执行的。因此，我将通过解释如何创建预置描述文件来开始本小节，然后我将向你展示如何将应用提交到\
  \ `XTC`、选择设备并执行测试。要完成本部分，你需要先在 `XTC` 中创建一个试用账户：[`https://testcloud.xamarin.com/register`](https://testcloud.xamarin.com/register)。\n\
  \n#### 预置描述文件\n\n要创建预置描述文件，你需要 `Xcode`、一个 Apple ID，以及一个连接到你的开发用 Mac 的物理 iOS 设备。然后，按以下步骤操作：\n\
