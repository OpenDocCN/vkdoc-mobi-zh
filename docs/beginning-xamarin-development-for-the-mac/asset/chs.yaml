  \n在界面设计完成后，我开始实现逻辑层。为此，我修改了 `ViewController` 类（`ViewController.cs`）的定义。我声明了一个私有成员\
  \ `initialSquareCenter`，并实现了四个辅助方法（列表 3-1 和列表 3-2）。列表 3-1 中的两个方法用于存储方块的初始位置，并在用户通过开关改变平移方向时将其复位。为了获取和更新方块的位置，我使用了\
  \ `View` 控件的 `Center` 属性。该属性的类型为 `CoreGraphics.CGPoint`，这是一个表示平面中点的结构体。要使用此类型，你需要在\
  \ `ViewController.cs` 文件的头部导入 `CoreGraphics` 命名空间：\n\n```\nusing CoreGraphics;\n\
  ```\n\n```\nprivate CGPoint initialSquareCenter;\nprivate void StoreSquareCenter()\n\
  {\ninitialSquareCenter = ViewMoveableSquare.Center;\n}\nprivate void RecenterSquare()\n\
  {\nViewMoveableSquare.Center = initialSquareCenter;\n}\n列表 3-1.\n管理可移动方块（橙色视图）的初始位置\n\
  ```\n\n另外两个辅助方法，如列表 3-2 所示，用于在实际可行的范围内平移方块。这个范围取决于设备屏幕的宽度（水平平移）或高度（垂直平移）（参见列表 3-2\
  \ 中的 `AdjustSliderRange` 方法）。我还将这个范围减去方块边长的一半，以确保方块始终在主视图中可见。为了平移方块，我将偏移值（从滑块值获取）加到初始方块位置的\
  \ X 或 Y 坐标上。这实际上改变了点的坐标，从而将方块向选定方向平移。如列表 3-2 所示，根据开关控件的状态，我将偏移值加到 `CGPoint`（使用 `initialSquareCenter`\
  \ 实例化）的 X 或 Y 属性上。如果开关打开（`On` 属性为真），我就改变 Y 坐标。否则，我更新 X 坐标。\n\n```\nprivate void\
  \ AdjustSliderRange()\n{\nvar margin = ViewMoveableSquare.Frame.Width / 2.0;\nvar\
  \ range = SwitchIsVertical.On ? View.Frame.Height : View.Frame.Width;\nvar maxShiftValue\
  \ = Convert.ToInt32(range / 2.0 - margin);\nSliderShift.MinValue = -maxShiftValue;\n\
  SliderShift.MaxValue = maxShiftValue;\nSliderShift.Value = 0;\n}\nprivate void TranslateSquare()\n\
  {\nvar newCenter = new CGPoint(initialSquareCenter);\nif (!SwitchIsVertical.On)\n\
  {\nnewCenter.X += SliderShift.Value;\n}\nelse\n{\nnewCenter.Y += SliderShift.Value;\n\
  }\nViewMoveableSquare.Center = newCenter;\n}\n列表 3-2.\n调整滑块范围\n```\n\n我在 `ViewDidLoad`\
  \ 视图事件处理程序（列表 3-3）以及开关和滑块的 `ValueChanged` 事件关联的两个事件处理程序（列表 3-4）中使用了上述辅助方法。我通过控制属性面板的“事件”选项卡创建了这些事件处理程序。`ViewDidLoad`\
  \ 的默认定义被修改，以便在视图加载时存储方块的初始位置。当用户点击开关控件时，这会用于将方块复位到视图中心。当用户改变滑块值时，会调用列表 3-4 中的第二个事件处理程序。该事件处理程序使用了列表\
  \ 3-2 中展示的 `TranslateSquare` 方法。因此，当你运行该应用时，你将看到如图 3-1 所示的结果。\n\n```\npublic override\
  \ void ViewDidLoad()\n{\nbase.ViewDidLoad();\nStoreSquareCenter();\nAdjustSliderRange();\n\
  }\n列表 3-3.\n存储实际方块位置并调整滑块范围\n```\n\n```\npartial void SwitchIsVertical_ValueChanged(UISwitch\
  \ sender)\n{\nRecenterSquare();\nAdjustSliderRange();\n}\npartial void SliderShift_ValueChanged(UISlider\
  \ sender)\n{\nTranslateSquare();\n}\n列表 3-4.\n方块位置由两个控件控制：开关和滑块\n```\n\n## 表格\n\n\
  许多移动应用都致力于显示从网络服务获取的数据。为了以有条理的方式显示这些数据，你通常会使用表视图。在本节中，我将告诉你如何创建一个表格，该表格展示一系列颜色及其名称（图\
  \ 3-2）。然后，我们将修改表格的数据源，使用户能够删除和标记选中的项目，并能够通过 `UIAlertController` 获取关于颜色的详细信息。完成这个示例后，你将知道如何创建能够通过原生\
  \ iOS 界面响应用户请求的表格。\n\n![A453659_1_En_3_Fig2_HTML.jpg](img/A453659_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2.\n\n在表视图中显示的预定义 iOS 颜色列表\n\n\n\n### 显示项目\n\n为了演示如何使用表格，我创建了一个新的单视图 iOS 项目，并将其命名为\
  \ `ColorsTable`。接着，我添加了一个新文件夹 `Colors`，并在其中创建了三个文件：`Color.cs`、`ColorsHelper.cs`\
  \ 和 `ColorsTableSource.cs`。每个文件都将存储相应类的定义。我首先实现了 `Color` 类，它是一个用于表示表格中项目的辅助对象。如列表\
  \ 3-5 所示，`Color` 类有两个公共属性：`Name` 和 `Value`。`Name` 存储颜色的描述，而 `Value` 存储实际的颜色，以 `UIColor`\
  \ 类的实例表示。在 `UIKit` 命名空间中定义的 `UIColor` 类，拥有多个包含预定义 iOS 颜色的公共静态属性。为了获取这个列表，我实现了一个\
  \ `ColorsHelper` 类（`ColorsHelper.cs` 文件），如列表 3-6 所示。\n\n```\n\uFEFFusing UIKit;\n\
  namespace ColorsTable.Colors\n{\npublic class Color\n{\npublic string Name { get;\
  \ set; }\npublic UIColor Value { get; set; }\n}\n}\n列表 3-5.\nColor 类的定义\n```\n\n\
  `ColorsHelper` 类只有一个公共静态方法：`GetColors`。该方法使用 C# 反射机制来读取 `UIColor` 类所有公共静态属性的信息。这些信息以\
  \ `PropertyInfo` 对象的集合形式呈现。然后，通过读取 `Name` 成员来获取属性名称，并调用 `PropertyInfo` 类实例的 `GetValue`\
  \ 方法来获取属性值。接着利用这些值创建 `Color` 类的实例并将其添加到结果集合中。\n\n```\n\uFEFFusing System.Collections.Generic;\n\
  using System.Reflection;\nusing UIKit;\nnamespace ColorsTable.Colors\n{\npublic\
  \ static class ColorsHelper\n{\npublic static List GetColors()\n{\nvar colors =\
  \ new List();\nvar uiColorType = typeof(UIColor);\nvar availableColors = uiColorType.GetProperties(\n\
  BindingFlags.Public | BindingFlags.Static);\nforeach (var color in availableColors)\n\
  {\ncolors.Add(new Color()\n{\nName = color.Name,\nValue = color.GetValue(uiColorType)\
  \ as UIColor\n});\n}\nreturn colors;\n}\n}\n}\n列表 3-6.\n使用 C# 反射机制获取的预定义 iOS 颜色列表\n\
  ```\n\n有了颜色列表后，我现在可以为表格视图实现项目集合。为此，我创建了 `ColorsTableSource` 类，如列表 3-7 所示。`ColorsTableSource`\
  \ 继承自 `UITableViewSource`，因此必须实现两个方法：`RowsInSection` 和 `GetCell`。第一个方法由运行时用于确定表格当前部分的行数。第二个方法在运行时即将绘制特定行的单元格时被调用。因此，在列表\
  \ 3-7 中，我使用此方法通过 `UITableViewCell` 准备单元格。该类表示单元格在表格中的视觉外观。有几种预定义的单元格样式可供使用，它们由 `UITableViewCellStyle`\
  \ 枚举中的以下值表示（见图 3-3）：\n\n![A453659_1_En_3_Fig3_HTML.jpg](img/A453659_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3. 预定义的单元格布局：Default（左上）、Value1（右上）、Value2（左下）和 Subtitle（右下）\n\n*   `Default`\
  \ – 指定单元格包含一个左对齐的文本标签和一个可选的图像视图。\n*   `Value1` – 指定单元格包含两个标签：一个左对齐，另一个右对齐。第一个标签显示通过设置\
  \ `UITableView` 类实例的 `TextLabel` 成员的 `Text` 属性所指定的文本。要配置第二个标签显示的字符串，使用 `DetailTextLabel`\
  \ 的 `Text` 属性。\n*   `Value2` – 使用与 `Value1` 类似的布局，但第一个标签右对齐，第二个标签左对齐。\n*   `Subtitle`\
  \ – 在这种情况下，`DetailTextLabel` 位于 `TextLabel` 正下方，且两个标签都左对齐。\n\n为了优化性能，通常使用 `UITableView`\
  \ 类实例的 `DequeueReusableCell` 方法重用现有单元格。此方法接受单元格标识符，并返回有效的 `UITableViewCell` 实例或\
  \ `null`。在后一种情况下，需要调用 `UITableViewCell` 构造函数来创建新单元格。在列表 3-7 中，我使用了默认的单元格样式，并将单元格标识符设置为存储在\
  \ `cellId` 常量中的值。在获得 `UITableViewCell` 实例后，我配置其属性，使得主标签显示颜色名称，副标签显示 `UIColor` 类实例的字符串表示形式（类型名称和\
  \ ARGB 组件）。此外，我将主标签的前景色更改为当前项目 `Value` 属性所携带的颜色。列表 3-7 中的代码依赖于以下命名空间，这些命名空间需要包含在\
  \ `ColorsTableSource.cs` 文件中：\n\n```\n\uFEFFusing System;\nusing System.Collections.Generic;\n\
  using Foundation;\nusing UIKit;\n```\n\n```\npublic class ColorsTableSource : UITableViewSource\n\
  {\nprivate const string cellId = \"ColorCell\";\npublic List Items { get; private\
  \ set; } = ColorsHelper.GetColors();\npublic override UITableViewCell GetCell(\n\
  UITableView tableView, NSIndexPath indexPath)\n{\n// 获取要显示的项目\nvar item = Items[indexPath.Row];\n\
  // 在创建新单元格之前尝试重用现有单元格\nvar cell = tableView.DequeueReusableCell(cellId)\n?? new\
  \ UITableViewCell(UITableViewCellStyle.Default, cellId);\n// 配置单元格属性\ncell.TextLabel.Text\
  \ = item.Name;\ncell.TextLabel.TextColor = item.Value;\nif (cell.DetailTextLabel\
  \ != null)\n{\ncell.DetailTextLabel.Text = item.Value.ToString();\n}\nreturn cell;\n\
  }\npublic override nint RowsInSection(UITableView tableview, nint section)\n{\n\
  return Items.Count;\n}\n}\n列表 3-7.\nUITableView 的项目集合\n```\n\n最后，为了显示表格，我修改了 `ViewController`\
  \ 类的 `ViewDidLoad` 方法，如列表 3-8 所示。首先，我实例化 `UITableView` 类，使其充满整个视图，然后将其 `Source`\
  \ 属性设置为 `ColorsTableViewSource` 的实例。最后，我使用 `ViewController` 类的 `Add` 方法将表格添加到视图中。因此，运行应用后，你将得到前面图\
  \ 3-2 所示的结果。\n\n请注意，在此示例中，我从源代码创建了控件（`UITableView`）。我没有使用可视化设计器来修改故事板。当然，你也可以使用此选项来定义整个视图。在特定情况下，这比使用故事板设计视图更快。同时，你也可以使用故事板创建\
  \ `UITableView`。在这种情况下，你可以手动绘制单元格布局，并通过其名称引用底层控件。\n\n要成功编译列表 3-8 中的代码，我们需要在 `ViewController.cs`\
  \ 文件中包含 `ColorsTable.Colors` 命名空间。现在也是暂停一下、编译应用以确保一切正常、并测试各种单元格样式的好时机。\n\n```\n\
  public override void ViewDidLoad()\n{\nbase.ViewDidLoad();\nvar table = new UITableView(View.Frame)\n\
  {\nSource = new ColorsTableSource()\n};\nAdd(table);\n}\n列表 3-8.\n创建表格\n```\n\n\n\
  \n### 选中项目\n\n通常，每当用户在表格中选中某个项目时，你需要向用户显示额外的数据。这里，我将向你展示如何使用警告框来显示颜色的完整信息（`Name`\
  \ 和 `Value`）。你已经知道如何显示警告框，因此唯一的新内容是在用户选中某一行时，从 `UITableViewSource` 中创建并显示警告框。为了处理此类事件，你需要重写\
  \ `UITableViewSource` 的 `RowSelected` 方法。`RowSelected` 方法让你能够访问 `UITableView` 的引用（从而触发事件）以及\
  \ `NSIndexPath` 类的实例，你可以使用它获取所选行的索引。与之前类似，我使用该索引来获取选中的项目，然后创建并配置 `UIAlertController`，如代码清单\
  \ 3-9 所示。\n\n```\npublic override void RowSelected(UITableView tableView, NSIndexPath\
  \ indexPath)\n{\nif (ParentViewController != null)\n{\nDisplayColorInfo(tableView,\
  \ indexPath);\n}\nelse\n{\nbase.RowSelected(tableView, indexPath);\n}\n}\nprivate\
  \ void DisplayColorInfo(UITableView tableView, NSIndexPath indexPath)\n{\nvar selectedItem\
  \ = Items[indexPath.Row];\nvar alertController = UIAlertController.Create(\nselectedItem.Name,\
  \ selectedItem.Value.ToString(),\nUIAlertControllerStyle.Alert);\nalertController.AddAction(UIAlertAction.Create(\n\
  \"确定\", UIAlertActionStyle.Default, null));\nParentViewController.PresentViewController(\n\
  alertController, true,\n() => { tableView.DeselectRow(indexPath, true); });\n}\n\
  代码清单 3-9.\n显示选中项目信息\n```\n\n为了显示警告框，我调用了 `PresentViewController` 方法。为此，我需要一个 `UIViewController`\
  \ 或其派生类的实例。这里，我使用了与默认视图关联的 `ViewController`。`ViewController` 类实例通过 `ColorsTableSource`\
  \ 类的构造函数传递，然后存储在 `ParentViewController` 属性中（见代码清单 3-10）。\n\n```\npublic UIViewController\
  \ ParentViewController { get; private set; }\npublic ColorsTableSource(UIViewController\
  \ viewController)\n{\nParentViewController = viewController;\n}\n代码清单 3-10.\n用于获取和存储\
  \ UIViewController 类引用的 ColorsTableSource 额外成员\n```\n\n为了使用修改后的 `ColorsTableSource`\
  \ 定义，我更改了 `ViewDidLoad` 视图事件处理程序，如代码清单 3-11 所示。之后，重新运行应用程序，你可以点击表格中的任意条目。将会出现如图\
  \ 3-4 所示的警告框。\n\n![A453659_1_En_3_Fig4_HTML.jpg](img/A453659_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4.\n颜色信息以警告框形式显示\n\n```\npublic override void ViewDidLoad()\n{\nbase.ViewDidLoad();\n\
  var table = new UITableView(View.Frame)\n{\nSource = new ColorsTableSource(this)\n\
  };\nAdd(table);\n}\n代码清单 3-11.\n将 ViewController 实例传递给 ColorsTableSource\n```\n\n\
  ### 删除项目\n\n要启用项目删除功能，请重写 `UITableViewSource` 的 `CommitEditingStyle` 方法。代码清单 3-12\
  \ 展示了 `ColorsTableSource` 中该方法的示例实现。我首先读取传递给 `CommitEditingStyle` 方法的 `editingStyle`\
  \ 参数，检查它是否等于 `UITableViewCellEditingStyle.Delete`。如果是，我将从 `Colors` 列表以及表视图中移除选中的项目。后者通过\
  \ `UITableView` 类实例的 `DeleteRows` 方法完成。该方法接受两个参数：一个用于标识要删除项目的 `NSIndexPath` 对象数组，以及动画类型。可用的动画类型在\
  \ `UITableViewRowAnimation` 枚举中定义如下：\n\n- `Fade` – 指定被删除的行将淡出\n- `Right`、`Left`、`Top`、`Bottom`\
  \ – 分别指定被删除的行滑出到右侧、左侧、顶部或底部\n- `Middle` – 指定被删除的行将“飞走”\n- `Automatic` – 强制 `UITableView`\
  \ 根据被删除行的位置自动调整动画样式\n\n在代码清单 3-12 中，我使用了 `Automatic` 动画，但你可以轻松地将其更改为其他任何值，并观察它对行删除效果的影响。运行应用程序后，你可以选择任意项目并向右滑动，你将看到一个红色的“删除”按钮（图\
  \ 3-5）。点击此按钮后，该项目将从底层列表和表视图中移除。\n\n![A453659_1_En_3_Fig5_HTML.jpg](img/A453659_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5.\nUITableView 中的滑动删除功能\n\n```\npublic override void CommitEditingStyle(\n\
  UITableView tableView,\nUITableViewCellEditingStyle editingStyle,\nNSIndexPath indexPath)\n\
  {\nif (editingStyle == UITableViewCellEditingStyle.Delete)\n{\nItems.RemoveAt(indexPath.Row);\n\
  tableView.DeleteRows(\nnew NSIndexPath[] { indexPath },\nUITableViewRowAnimation.Automatic);\n\
  }\n}\n代码清单 3-12.\n删除一个项目\n```\n\n你也可以通过编程方式阻止删除项目。方法是实现 `CanEditRow` 方法。代码清单 3-13\
  \ 展示了如何阻止删除洋红色。当你重新运行应用程序时，在滑动洋红色对应的项目时，该行将不会出现“删除”按钮。\n\n```\npublic override bool\
  \ CanEditRow(UITableView tableView,\nNSIndexPath indexPath)\n{\nvar itemToDelete\
  \ = Items[indexPath.Row];\nreturn itemToDelete.Name != \"Magenta\";\n}\n代码清单 3-13.\n\
  禁用删除洋红色\n```\n\n在更高级的场景中，你可能需要创建多个按钮来处理项目滑动。在这种情况下，你可以通过重写 `UITableViewSource` 的\
  \ `EditActionsForRow` 方法来创建 `UITableViewRowAction` 对象的集合。在代码清单 3-14 中，我实现了两个这样的操作。其中一个在外观和功能上类似于之前示例中的“删除”按钮，但具有不同的标签“移除”。另一个按钮将具有灰色背景，并更改所选单元格的背景，如图\
  \ 3-6 所示。\n\n```\npublic override UITableViewRowAction[] EditActionsForRow(\nUITableView\
  \ tableView, NSIndexPath indexPath)\n{\nvar removeButton = UITableViewRowAction.Create(\n\
  UITableViewRowActionStyle.Destructive,\n\"移除\",\ndelegate {\nItems.RemoveAt(indexPath.Row);\n\
  tableView.DeleteRows(\nnew NSIndexPath[] { indexPath },\nUITableViewRowAnimation.Middle);\n\
  });\nvar markItemButton = UITableViewRowAction.Create(\nUITableViewRowActionStyle.Normal,\n\
  \"标记\",\ndelegate\n{\ntableView.CellAt(indexPath).BackgroundColor =\nUIColor.FromRGBA(0,\
  \ 255, 0, 35);\n});\nreturn new UITableViewRowAction[] { removeButton, markItemButton\
  \ };\n}\n代码清单 3-14.\n创建行操作集合\n```\n\n要创建 `UITableViewRowAction`，请使用静态的 `Create`\
  \ 方法。该方法接受三个参数，如下所示：\n\n\n\n- `style`：由 `UITableViewRowActionStyle` 枚举中的以下值之一表示：\n\
  \  - `Default` – 指定按钮具有默认样式（红色背景）。默认样式等同于 Destructive，意味着按钮操作将从表格中移除该项。\n  - `Normal`\
  \ – 为按钮应用非破坏性样式（灰色背景）\n- `Title` – 用于设置按钮标签的字符串\n- `handler` – 按钮点击后调用的操作\n\n在清单\
  \ 3-14 中，我两次使用了 `UITableViewRowAction.Create` 方法。由此得到的两个 `UITableViewRowAction`\
  \ 类实例用于创建行操作数组。因此，每次滑动 `UITableView` 项时，会出现两个按钮，如图 3-6 所示。请注意，`EditActionsForRow`\
  \ 的优先级高于 `CommitEditingStyle`。因此，在 `ColorsTableSource` 类中定义 `EditActionsForRow`\
  \ 后，`CommitEditingStyle` 将被忽略。\n\n![A453659_1_En_3_Fig6_HTML.jpg](img/A453659_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6.** 带有两个行操作的表格视图\n\n## Web View\n\n`Web View` 是一种视觉控件，用于在应用中渲染网页。`Web View`\
  \ 在多种场景中使用。例如，你可以用它来显示应用的交互式帮助指南，或渲染来自外部服务器的内容。在本节中，我将向你展示如何构建一个基于 `Web View` 控件的应用，用于显示你选择的地理位置的谷歌地图（图\
  \ 3-7）。请注意，托管在 `Web View` 渲染的网页上的谷歌地图将是完全可交互的。如图 3-7 所示，你将能够平移地图甚至进入街景模式，因为 `Web\
  \ View` 可以渲染交互式网页。\n\n![A453659_1_En_3_Fig7_HTML.jpg](img/A453659_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7.** 显示完全交互式谷歌地图的 `Web View`\n\n为了实现图 3-7 中的应用，我使用 Single View iOS 项目模板并将应用名称设置为\
  \ `GoogleMap`。然后，我创建了 `HTML` 子文件夹，并在其中放置了三个文件：`map.css`（清单 3-15）、`map.js`（清单 3-16）和\
  \ `map.html`（清单 3-17）。这些文件实现了一个包含两个文本输入框、一个按钮和一张谷歌地图的网页。你使用输入字段输入纬度和经度，用于设置地图的中心。按下按钮时地图会显示。\n\
  \n清单 3-15 中的 `map.css` 代码无需额外注释。这是一个名为 `map` 的 CSS 类的简短定义。该类配置了生成地图的显示模式和尺寸。\n\n\
  ```css\n.map {\nfloat: left;\nwidth: 100%;\nheight: 500px;\n}\n```\n\n清单[3-15] 存储\
  \ `map` 类定义的 CSS 文件\n\n清单 3-16 中显示的 JavaScript 函数 `displayMap`（`map.js`）用于在选定的 `div`\
