- '# 在 XTC 中运行测试


  要在 XTC 中运行测试，你最终需要降级 `Persons.UITest` 中的 `NUnit` NuGet 包。在我撰写本章时，XTC 支持 NUnit 2.6.4
  版本。降级此包最简单的方法是，在解决方案资源管理器中，使用包上下文菜单的“删除”选项将其卸载。然后，使用“添加包”窗口重新安装一个包，并从包管理器右下角的下拉列表中选择
  NUnit 版本（图 6-13）。


  在确保 NUnit 版本与 XTC 兼容后，转到单元测试面板，右键单击选中的 UI 测试，然后选择“在测试云中运行”。应用程序将自动提交到 XTC，稍后你将自动重定向到
  XTC 网站。然后，你可以选择应在哪些设备上执行测试。如图 6-25 所示，我选择了 12 台设备，其中 5 台是 iPad。其余的是随机选择的 iPhone。在选定设备列表后，你需要选择测试系列（主版本、生产版或测试版）和系统语言，然后按下“完成”按钮。测试过程将启动，其当前状态将显示在
  XTC 网站上（图 6-26）。


