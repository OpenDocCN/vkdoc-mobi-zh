    name: and position the controls as shown in Figure [2-11](#A453659_1_En_2_Chapter.html#Fig11).


    As the next step, I modify the `ViewController` class as follows. First, I instantiate
    a `Person` class with a default parameterless constructor, and then I implement
    two helper methods: `DisplayPersonData` and `StorePersonData`. These methods are
    depicted in Listing [2-14](#A453659_1_En_2_Chapter.html#Par74). `DisplayPersonData`
    retrieves a person object from the file and then displays its name in the view
    by rewriting properties of the `Person` class instance as `Text` properties of
    the `TextField` controls. `StorePersonData` works in the opposite order—it rewrites
    data from text fields as properties of the `Person` class and then stores them
    in the file.


    ```

    private Person person = new Person();

    private void DisplayPersonData()

    {

    person.RestoreValues();

    TextFieldFirstName.Text = person.FirstName;

    TextFieldLastName.Text = person.LastName;

    }

    private void StorePersonData()

    {

    person.FirstName = TextFieldFirstName.Text;

    person.LastName = TextFieldLastName.Text;

    person.StoreValues();

    }

