- fmt: '```csharp

    private const double spanDelta = 0.005d;

    private void UpdateMap(CLLocationsUpdatedEventArgs e)

    {

    var location = e.Locations.LastOrDefault();

    if (location != null)

    {

    map.CenterCoordinate = location.Coordinate;

    SetMapRegion(location.Coordinate);

    }

    }

    private void SetMapRegion(CLLocationCoordinate2D centerCoordinate)

    {

    var span = new MKCoordinateSpan(spanDelta, spanDelta);

    var region = new MKCoordinateRegion(centerCoordinate, span);

    map.SetRegion(region, false);

    }

    ```

    **Listing 3-25.** Updating a Map View to Display User’s Location


    Lastly, I add the `InitLocationManager` method to `ViewDidLoad` (Listing 3-26).
    Then, I need to force `CLLocationManager` to report changes in the user’s location.
    To this end, I invoke the `StartUpdatingLocation` method within the `ViewDidAppear`
    view event handler. Correspondingly, when the view disappears I invoke `StopUpdatingLocation`
    so the app does not access the user’s location when running in the background.


    You can now you re-run the app, and you will quickly see that the map view displays
    the user’s current location. To emulate changes in geoposition within the simulator,
    you can use several options from the simulator’s `Debug/Location` menu (Figure
    3-13). You will achieve the best results with City Bicycle Ride, City Run, or
    Freeway Drive.


