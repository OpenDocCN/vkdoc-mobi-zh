- fmt: "# Navigation Between View Controllers\n\nAlthough tabbed and page-based project\
    \ templates can be utilized to quickly create multi-view iOS applications, these\
    \ project templates are not always suitable. In such cases, you can manually create\
    \ segues between view controllers. When the user presses a particular control,\
    \ the selected view controller will be presented. In this section, I’ll show you\
    \ how to manually create such a custom multi-view app of name `Navigation`. As\
    \ Figure [4-11](#A453659_1_En_4_Chapter.html#Fig11) shows, the app will have two\
    \ view controllers: First View Controller and Second View Controller. Both of\
    \ them will have associated views with labels describing a view controller. The\
    \ user will be able to switch between views using Switch view or Go back buttons,\
    \ depending on the currently displayed view.\n\n![A453659_1_En_4_Fig11_HTML.jpg](A453659_1_En_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11. Views of the Navigation app, which we will develop in this section\n\
    \nTo implement the `Navigation` app, I use the Single View App project template,\
    \ which targets iOS 9.0 and above. Then, I modify the view by adding a button\
    \ and a label, configuring them as shown in the left part of Figure [4-11](#A453659_1_En_4_Chapter.html#Fig11).\
    \ Subsequently, I set the class of the initial view controller to `FirstViewController`,\
    \ then add another view controller and set its class to `SecondViewController`.\
    \ Then, I modify the view of the second view controller as shown in the right\
    \ part of Figure [4-11](#A453659_1_En_4_Chapter.html#Fig11). Lastly, I remove\
    \ the `ViewController.cs` file, because it is not needed anymore.\n\nGiven the\
    \ view controllers are ready, I define the first segue. As shown in Figure [4-12](#A453659_1_En_4_Chapter.html#Fig12),\
    \ I CTRL+Drag from the Switch view button to the second view controller. After\
    \ releasing the left mouse button, a popup window appears. This popup allows me\
    \ to choose the segue, which presents a new view controller. There are eight segue\
    \ types to choose from. However, three of them (Non-Adaptive Action Segue group)\
    \ are deprecated, and thus I do not discuss them. The other segues are the following:\n\
    \n![A453659_1_En_4_Fig12_HTML.jpg](A453659_1_En_4_Fig12_HTML.jpg)\n\nFigure 4-12.\
    \ Creating a segue between view controllers\n\n- **Show** – displays the view\
    \ of the selected view controller modally over the content of the current or source\
    \ view controller. This segue can be also done programmatically with the `ShowViewController`\
    \ method of the `UIViewController`.\n- **Show Detail** – this segue corresponds\
    \ to the `UIViewController.ShowDetailViewController` method and is only valid\
    \ for the `UISplitViewController`. In this case, Show Detail replaces the second\
    \ child view controller with the selected view controller. For other view controllers,\
    \ Show Detail works like the Show segue.\n- **Present Modally** – presents a view\
    \ controller modally. Basically, it works similarly to the Show segue, but you\
    \ can modify its presentation and transition styles.\n- **Popover Presentation**\
    \ – the effect of this segue depends on the actual size class. For screens with\
    \ regular widths, the target view controller will appear as a popover, and modally\
    \ (full-screen) on horizontally compact devices.\n- **Custom** – custom-created\
    \ segue. You can use this if none of the others are suitable.\n\nHere, I choose\
    \ the Show segue, so after re-running the `Navigation` app, a view of the Second\
    \ View Controller appears when you tap the Switch view button.\n\n## Editing a\
    \ Segue\n\nYou can modify the segue by editing its properties. All created segues\
    \ appear in the Document Outline pad. So far, we have only one segue, which appears\
    \ under the `FirstViewController` item. As Figure [4-13](#A453659_1_En_4_Chapter.html#Fig13)\
    \ shows, you can use the properties of the segue to change its type (Show, Show\
    \ Detail, Present Modally, or Popover Presentation). Depending on the segue type,\
    \ additional controls appear. In my case, I change the segue type to Present Modally.\
    \ Then, the Presentation and Transition drop-down lists appear. I use them to\
    \ set the presentation and transition styles to Full Screen and Partial Curl,\
    \ respectively.\n\n![A453659_1_En_4_Fig13_HTML.jpg](A453659_1_En_4_Fig13_HTML.jpg)\n\
    \nFigure 4-13. Properties of the segue\n\n## Unwind Segue\n\nAlthough we created\
    \ the segue, the user cannot go back to the First View Controller because the\
    \ Go back button does not work yet. To enable such a feature, we need to create\
    \ the Unwind segue, which is used to dismiss the view controller. To create such\
    \ a segue, you first need to define the action so that the view controller will\
    \ be unwound. This method is defined as the target of the Unwind segue.\n\nTo\
    \ create the Unwind segue in the `Navigation` app, I supplement a definition of\
    \ the `FirstViewController` class by the `UnwindToFirstViewController` method,\
    \ which appears in Listing [4-12](#A453659_1_En_4_Chapter.html#Par55), and I also\
    \ import a necessary namespace: `System.Diagnostics`. `UnwindToFirstViewController`\
    \ is decorated with the `Action` attribute, so it can be invoked by the Objective-C\
    \ runtime. Therefore, the iOS designer can recognize it, and we can now use this\
    \ method for the Unwind segue.\n\n```\n[Action(\"UnwindToFirstViewController:\"\
    )]\npublic void UnwindToFirstViewController(UIStoryboardSegue segue)\n{\n    Debug.WriteLine(\"\
    UnwindToFirstViewController\");\n}\n```\n\nListing 4-12. An Action for the Unwind\
    \ Segue\n\nTo associate the `UnwindToFirstViewController` method with the Go back\
    \ button, I open the visual designer and then CTRL+Drag from the Go back button\
    \ to the green Exit icon, which is located on the bottom of the Second View Controller\
    \ (Figure [4-14](#A453659_1_En_4_Chapter.html#Fig14)). After releasing the left\
    \ mouse button, a popup window appears. This window contains a list of compatible\
    \ action methods, which can be used for the segue. In my case, this list contains\
    \ only one item, `UnwindToFirstViewController`. So, after choosing this item,\
    \ I can re-run the app, and you will see that you can now navigate between the\
    \ view controllers.\n\n![A453659_1_En_4_Fig14_HTML.jpg](A453659_1_En_4_Fig14_HTML.jpg)\n\
    \nFigure 4-14. Creating the unwind segue"
  raw: '### Navigation Between View Controllers


    Although tabbed and page-based project templates can be utilized to quickly create
    multi-view iOS applications, these project templates are not always suitable.
    In such cases, you can manually create segues between view controllers. When the
    user presses a particular control, the selected view controller will be presented.
    In this section, I’ll show you how to manually create such a custom multi-view
    app of name Navigation. As Figure [4-11](#A453659_1_En_4_Chapter.html#Fig11) shows,
    the app will have two view controllers: First View Controller and Second View
    Controller. Both of them will have associated views with labels describing a view
    controller. The user will be able to switch between views using Switch view or
    Go back buttons, depending on the currently displayed view.


    ![A453659_1_En_4_Fig11_HTML.jpg](A453659_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Views of the Navigation app, which we will develop in this section


    To implement the Navigation app , I use the Single View App project template,
    which targets iOS 9.0 and above. Then, I modify the view by adding a button and
    a label, configuring them as shown in the left part of Figure [4-11](#A453659_1_En_4_Chapter.html#Fig11).
    Subsequently, I set the class of the initial view controller to `FirstViewController`,
    then add another view controller and set its class to `SecondViewController.`
    Then, I modify the view of the second view controller as shown in the right part
    of Figure [4-11](#A453659_1_En_4_Chapter.html#Fig11). Lastly, I remove the ViewController.cs
    file, because it is not needed anymore.


    Given the view controllers are ready, I define the first segue. As shown in Figure
    [4-12](#A453659_1_En_4_Chapter.html#Fig12), I CTRL+Drag from the Switch view button
    to the second view controller. After releasing the left mouse button, a popup
    window appears. This popup allows me to choose the segue, which presents a new
    view controller. There are eight segue types to choose from. However, three of
    them (Non-Adaptive Action Segue group) are deprecated, and thus I do not discuss
    them. The other segues are the following:


    ![A453659_1_En_4_Fig12_HTML.jpg](A453659_1_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    Creating a segue between view controllers


    *   Show – displays the view of the selected view controller modally over the
    content of the current or source view controller. This segue can be also done
    programmatically with the `ShowViewController` method of the `UIViewController`.

    *   Show Detail – this segue corresponds to the `UIViewController.ShowDetailViewController`
    method and is only valid for the `UISplitViewController`. In this case, Show Detail
    replaces the second child view controller with the selected view controller. For
    other view controllers, Show Detail works like the Show segue.

    *   Present Modally – presents a view controller modally. Basically, it works
    similarly to the Show segue, but you can modify its presentation and transition
    styles.

    *   Popover Presentation – the effect of this segue depends on the actual size
    class. For screens with regular widths, the target view controller will appear
    as a popover, and modally (full-screen) on horizontally compact devices.

    *   Custom – custom-created segue. You can use this if none of the others are
    suitable.


    Here, I choose the Show segue, so after re-running the Navigation app, a view
    of the Second View Controller appears when you tap the Switch view button.


    ### Editing a Segue


    You can modify the segue by editing its properties. All created segues appear
    in the Document Outline pad. So far, we have only one segue, which appears under
    the `FirstViewController` item. As Figure [4-13](#A453659_1_En_4_Chapter.html#Fig13)
    shows, you can use the properties of the segue to change its type (Show, Show
    Detail, Present Modally, or Popover Presentation). Depending on the segue type,
    additional controls appear. In my case, I change the segue type to Present Modally.
    Then, the Presentation and Transition drop-down lists appear. I use them to set
    the presentation and transition styles to Full Screen and Partial Curl, respectively.


    ![A453659_1_En_4_Fig13_HTML.jpg](A453659_1_En_4_Fig13_HTML.jpg)


    Figure 4-13.


    Properties of the segue


    ### Unwind Segue


    Although we created the segue, the user cannot go back to the First View Controller
    because the Go back button does not work yet. To enable such a feature, we need
    to create the Unwind segue, which is used to dismiss the view controller. To create
    such a segue, you first need to define the action so that the view controller
    will be unwound. This method is defined as the target of the Unwind segue.


    To create the Unwind segue in the Navigation app, I supplement a definition of
    the `FirstViewController` class by the `UnwindToFirstViewController` method, which
    appears in Listing [4-12](#A453659_1_En_4_Chapter.html#Par55), and I also import
    a necessary namespace: `System.Diagnostics. UnwindToFirstViewController` is decorated
    with the `Action` attribute, so it can be invoked by the Objective-C runtime.
    Therefore, the iOS designer can recognize it, and we can now use this method for
    the Unwind segue.


    ```

    [Action("UnwindToFirstViewController:")]

    public void UnwindToFirstViewController(UIStoryboardSegue segue)

    {

    Debug.WriteLine("UnwindToFirstViewController");

    }

    Listing 4-12.

    An Action for the Unwind Segue

    ```


    To associate the `UnwindToFirstViewController` method with the Go back button,
    I open the visual designer and then CTRL+Drag from the Go back button to the green
    Exit icon, which is located on the bottom of the Second View Controller (Figure
    [4-14](#A453659_1_En_4_Chapter.html#Fig14)). After releasing the left mouse button,
    a popup window appears. This window contains a list of compatible action methods,
    which can be used for the segue. In my case, this list contains only one item,
    `UnwindToFirstViewController`. So, after choosing this item, I can re-run the
    app, and you will see that you can now navigate between the view controllers.


    ![A453659_1_En_4_Fig14_HTML.jpg](A453659_1_En_4_Fig14_HTML.jpg)


    Figure 4-14.


    Creating the unwind segue'
  trans: "\n# 视图控制器之间的导航\n\n虽然可以利用选项卡和基于页面的项目模板快速创建多视图 iOS 应用程序，但这些项目模板并非总是适用。在这种情况下，你可以手动在视图控制器之间创建\
    \ Segue。当用户按下特定控件时，所选视图控制器将呈现。在本节中，我将展示如何手动创建这样一个名为 `Navigation` 的自定义多视图应用。如图\
    \ 4-11 所示，该应用将包含两个视图控制器：First View Controller 和 Second View Controller。两者都将有相关联的视图，并带有描述视图控制器的标签。用户将能够使用\"\
    Switch view\"或\"Go back\"按钮在视图之间切换，具体取决于当前显示的视图。\n\n![A453659_1_En_4_Fig11_HTML.jpg](img/A453659_1_En_4_Fig11_HTML.jpg)\n\
    \n图 4-11. 我们将在本节中开发的 Navigation 应用的视图\n\n为了实现 `Navigation` 应用，我使用了目标平台为 iOS 9.0\
    \ 及以上版本的 Single View App 项目模板。然后，我通过添加一个按钮和一个标签来修改视图，并按图 4-11 左侧所示进行配置。接着，将初始视图控制器的类设置为\
    \ `FirstViewController`，再添加另一个视图控制器并将其类设置为 `SecondViewController`。然后，按图 4-11 右侧所示修改第二个视图控制器的视图。最后，删除\
    \ `ViewController.cs` 文件，因为它不再需要。\n\n视图控制器准备就绪后，我定义了第一个 Segue。如图 4-12 所示，我从\"\
    Switch view\"按钮按住 CTRL 键并拖动到第二个视图控制器。释放鼠标左键后，会弹出一个窗口。该弹出窗口允许我选择用于呈现新视图控制器的 Segue。这里有八种\
    \ Segue 类型可供选择，但其中三种（Non-Adaptive Action Segue 组）已弃用，因此我不讨论它们。其余 Segue 如下：\n\n\
    ![A453659_1_En_4_Fig12_HTML.jpg](img/A453659_1_En_4_Fig12_HTML.jpg)\n\n图 4-12.\
    \ 在视图控制器之间创建 Segue\n\n- **Show** – 在源视图控制器的内容之上模态显示所选视图控制器的视图。此 Segue 也可以通过 `UIViewController`\
    \ 的 `ShowViewController` 方法以编程方式实现。\n- **Show Detail** – 此 Segue 对应 `UIViewController.ShowDetailViewController`\
    \ 方法，仅对 `UISplitViewController` 有效。在此情况下，Show Detail 会用所选视图控制器替换第二个子视图控制器。对于其他视图控制器，Show\
    \ Detail 的行为与 Show Segue 类似。\n- **Present Modally** – 模态呈现视图控制器。基本上，其工作方式与 Show\
    \ Segue 类似，但你可以修改其呈现和过渡样式。\n- **Popover Presentation** – 此 Segue 的效果取决于实际的尺寸类别。对于具有常规宽度的屏幕，目标视图控制器将显示为弹出视图；而在水平紧凑型设备上则全屏模态显示。\n\
    - **Custom** – 自定义创建的 Segue。如果其他 Segue 都不适合，你可以使用此类型。\n\n在这里，我选择了 Show Segue，因此重新运行\
    \ `Navigation` 应用后，当你点击\"Switch view\"按钮时，Second View Controller 的视图就会出现。\n\n\
    ## 编辑 Segue\n\n你可以通过编辑 Segue 的属性来修改它。所有创建的 Segue 都会出现在 Document Outline 面板中。目前，我们只有一个\
    \ Segue，它位于 `FirstViewController` 项下。如图 4-13 所示，你可以使用 Segue 的属性来更改其类型（Show、Show\
    \ Detail、Present Modally 或 Popover Presentation）。根据 Segue 类型的不同，会出现额外的控件。在我的例子中，我将\
    \ Segue 类型更改为 Present Modally，然后 Presentation 和 Transition 下拉列表出现。我使用它们分别将呈现样式和过渡样式设置为\
    \ Full Screen 和 Partial Curl。\n\n![A453659_1_En_4_Fig13_HTML.jpg](img/A453659_1_En_4_Fig13_HTML.jpg)\n\
    \n图 4-13. Segue 的属性\n\n## Unwind Segue\n\n虽然我们创建了 Segue，但由于\"Go back\"按钮尚未工作，用户无法返回到\
    \ First View Controller。为了实现此功能，我们需要创建用于关闭视图控制器的 Unwind Segue。要创建此类 Segue，首先需要定义一个操作，以便视图控制器能够被展开。此方法被定义为\
    \ Unwind Segue 的目标。\n\n为了在 `Navigation` 应用中创建 Unwind Segue，我在 `FirstViewController`\
    \ 类的定义中补充了 `UnwindToFirstViewController` 方法，该方法显示在代码清单 4-12 中，并且我还导入了一个必要的命名空间：`System.Diagnostics`。`UnwindToFirstViewController`\
    \ 使用 `Action` 属性进行了修饰，因此它可以被 Objective-C 运行时调用。因此，iOS 设计器可以识别它，我们现在可以将此方法用于 Unwind\
    \ Segue。\n\n```\n[Action(\"UnwindToFirstViewController:\")]\npublic void UnwindToFirstViewController(UIStoryboardSegue\
    \ segue)\n{\n    Debug.WriteLine(\"UnwindToFirstViewController\");\n}\n```\n\n\
    代码清单 4-12. Unwind Segue 的操作\n\n为了将 `UnwindToFirstViewController` 方法与\"Go back\"\
    按钮关联起来，我打开可视化设计器，然后从\"Go back\"按钮按住 CTRL 键并拖动到位于 Second View Controller 底部的绿色\
    \ Exit 图标（图 4-14）。释放鼠标左键后，会弹出一个窗口。此窗口包含一个可用于 Segue 的兼容操作方法列表。在我的例子中，这个列表只包含一个项：`UnwindToFirstViewController`。因此，选择该项后，我可以重新运行应用，你将看到现在可以在视图控制器之间导航了。\n\
    \n![A453659_1_En_4_Fig14_HTML.jpg](img/A453659_1_En_4_Fig14_HTML.jpg)\n\n图 4-14.\
    \ 创建 unwind segue\n"
- fmt: "### Preparing for Segues\n\nVery often, you need to transfer data between\
    \ view controllers. For instance, you show the view controller to collect user\
    \ input, and after this view controller is dismissed, collected data is utilized\
    \ in the initial view controller. To pass data between view controllers, you use\
    \ the `PrepareForSegue` method of the `UIViewController` class. `PrepareForSegue`\
    \ is invoked right before the segue is performed.\n\nTo present a sample usage\
    \ of the `PrepareForSegue` class, I supplement the Navigation project with another\
    \ class, `BaseViewController`, which I define according to Listing [4-13](#A453659_1_En_4_Chapter.html#Par59).\n\
    \n```csharp\npublic class BaseViewController : UIViewController\n{\n    protected\
    \ BaseViewController(IntPtr handle) : base(handle) { }\n\n    public override\
    \ void PrepareForSegue(UIStoryboardSegue segue, NSObject sender)\n    {\n    \
    \    base.PrepareForSegue(segue, sender);\n        var sourceViewControllerName\
    \ = segue.SourceViewController.GetType().Name;\n        var destinationViewControllerName\
    \ = segue.DestinationViewController.GetType().Name;\n        Debug.WriteLine($\"\
    From: {sourceViewControllerName} \" +\n                        $\"To: {destinationViewControllerName}\"\
    );\n    }\n}\n```\n\n*Listing 4-13. `PrepareForSegue` Method Outputs Names of\
    \ Classes Implementing the Source and Destination View Controllers*\n\nThe `BaseViewController`\
    \ class derives from `UIViewController`, has a default constructor, and also overrides\
    \ the `PrepareForSegue` method. Apart from the base functionality, `PrepareForSegue`\
    \ reads the names of two classes, implementing the source and destination view\
    \ controllers, and then displays them in the application output.\n\nThis example\
    \ shows how to access instances of view controllers participating in the segue.\
    \ Hence, to actually pass data between view controllers, you would need to supplement\
    \ the associated classes with public properties and then rewrite them within the\
    \ `PrepareForSegue` method.\n\nTo use the class from Listing [4-13](#A453659_1_En_4_Chapter.html#Par59),\
    \ I modify declarations of the `FirstViewController` and the `SecondViewController`\
    \ such that they derive from `BaseViewController` instead of `UIViewController`\
    \ (as in Listing [4-3](#A453659_1_En_4_Chapter.html#Par14)). So, when you re-run\
    \ the app and perform navigation between the views, the output of the Navigation\
    \ app should look like the one from Figure [4-15](#A453659_1_En_4_Chapter.html#Fig15).\n\
    \n![A453659_1_En_4_Fig15_HTML.jpg](A453659_1_En_4_Fig15_HTML.jpg)\n\n*Figure 4-15.\
    \ Application output showing the flow of a segue*\n\n## Summary\n\nIn this chapter,\
    \ we learned how to create multi-view applications and how to perform navigation\
    \ between views using various approaches. We started with the Tabbed App project\
    \ template and investigated how to create and modify tabs. Then, we moved to the\
    \ Page-Based App project template. We deeply examined its relatively complex structure\
    \ and then modified the app code to better understand page-based navigation. Finally,\
    \ we created custom segues between view controllers. In the next chapter, we will\
    \ learn how to handle touch gestures in iOS apps.\n\n# 5. Touch\n\nMobile devices\
    \ are controlled by touch gestures. Users can use gestures to switch between views\
    \ or to manipulate visual elements to translate, rotate, and resize them. In this\
    \ chapter, we will learn how to handle gestures in Xamarin.iOS. We will start\
    \ with a short description of gesture recognizers and then investigate how to\
    \ use gestures for navigation. Subsequently, we will learn how to programmatically\
    \ create and control gesture recognizers and the programmatic events they generate.\
    \ Finally, we will implement the app, in which the location, rotation, and scale\
    \ of the visual component will be controlled with gestures. So, after completing\
    \ this chapter, you will know how to perform complex manipulation of visual controls,\
    \ which you will find useful for media apps (like a photo editor or drawing tool)\
    \ that extensively utilize gestures to tailor the appearance of visual elements.\n\
    \n## Touches and Gesture Recognizers\n\nWhenever the user touches the screen,\
    \ a series of appropriate events are raised. To handle these events, you would\
    \ normally need to implement the following methods in the class associated with\
    \ the view controller:\n\n- `TouchesBegan`: invoked when the user touches the\
    \ screen with one or more fingers\n- `TouchesMoved`: called when user changes\
    \ the location of his or her fingers on the screen\n- `TouchesCancelled`: invoked\
    \ when the touch is canceled\n- `TouchesEnded`: invoked when the touch gesture\
    \ is finished\n\nTo show an actual sample, I create a new single view app (universal\
    \ targeting iOS 9.0 and above) with the name `Touches`. Subsequently, I extend\
    \ the definition of the `ViewController` class by the preceding methods and implement\
    \ them according to Listing [5-1](#A453659_1_En_5_Chapter.html#Par8) (note that\
    \ this code depends upon the following namespaces: `Foundation`, `System.Diagnostics`,\
    \ and `System.Linq`). Implementation of `TouchesBegan`, `TouchesCancelled`, and\
    \ `TouchesEnded` does not require any additional comments. All of these methods\
    \ simply print the method name to the application output. A little more explanation\
    \ is required for the `TouchesMoved` method. This function, apart from printing\
    \ a `TouchesMoved` string, also iterates through the set of touches received by\
    \ the event handler. In general, the application user can use more than one finger\
    \ to perform a gesture. Each contact between his or her fingers and the screen\
    \ is defined as a *touch*. The information about each touch is provided to the\
    \ event handler as an instance of the `NSSet`. This object represents an unordered\
    \ collection of objects, which in this specific case represents a touch. Hence,\
    \ in Listing [5-1](#A453659_1_En_5_Chapter.html#Par8), the set of touches is first\
    \ casted to a collection of `UITouch` objects, each of which is an abstract representation\
    \ of the touch or finger movement on the screen. Then, I print the contact locations\
    \ in the application output.\n\n```csharp\npublic override void TouchesBegan(NSSet\
    \ touches, UIEvent evt)\n{\n    base.TouchesBegan(touches, evt);\n    Debug.WriteLine(\"\
    TouchesBegan\");\n}\n\npublic override void TouchesMoved(NSSet touches, UIEvent\
    \ evt)\n{\n    base.TouchesMoved(touches, evt);\n    Debug.WriteLine(\"TouchesMoved\"\
    );\n    foreach (var touch in touches.Cast<UITouch>())\n    {\n        Debug.WriteLine(touch.GetPreciseLocation(View));\n\
    \    }\n}\n\npublic override void TouchesCancelled(NSSet touches, UIEvent evt)\n\
    {\n    base.TouchesCancelled(touches, evt);\n    Debug.WriteLine(\"TouchesCancelled\"\
    );\n}\n\npublic override void TouchesEnded(NSSet touches, UIEvent evt)\n{\n  \
    \  base.TouchesEnded(touches, evt);\n    Debug.WriteLine(\"TouchesEnded\");\n\
    }\n```\n\n*Listing 5-1. Handling Low-level Information About Touches*\n\nWhen\
    \ you run the `Touches` app in the simulator, it will generate output that should\
    \ look like that in Figure [5-1](#A453659_1_En_5_Chapter.html#Fig1). As shown\
    \ there, the beginning of the gesture is indicated by the `TouchesBegan` method.\
    \ Subsequently, a series of `TouchesMoved` events is raised, each of which reports\
    \ the current position of the touch contacts (where the finger touches the screen).\
    \ Finally, `TouchesEnded` is fired, informing you that user has released his or\
    \ her fingers from the screen.\n\n![A453659_1_En_5_Fig1_HTML.jpg](A453659_1_En_5_Fig1_HTML.jpg)\n\
    \n*Figure 5-1. A screenshot showing the sample output of the `Touches` app*"
  raw: '### Preparing for Segues


    Very often, you need to transfer data between view controllers. For instance,
    you show the view controller to collect user input, and after this view controller
    is dismissed, collected data is utilized in the initial view controller. To pass
    data between view controllers, you use the `PrepareForSegue` method of the `UIViewController`
    class. `PrepareForSegue` is invoked right before the segue is performed.


    To present a sample usage of the `PrepareForSegue` class, I supplement the Navigation
    project with another class, `BaseViewController`, which I define according to
    Listing [4-13](#A453659_1_En_4_Chapter.html#Par59).


    ```

    public class BaseViewController : UIViewController

    {

    protected BaseViewController(IntPtr handle) : base (handle){ }

    public override void PrepareForSegue(

    UIStoryboardSegue segue, NSObject sender)

    {

    base.PrepareForSegue(segue, sender);

    var sourceViewControllerName =

    segue.SourceViewController.GetType().Name;

    var destinationViewControllerName =

    segue.DestinationViewController.GetType().Name;

    Debug.WriteLine($"From: {sourceViewControllerName} " +

    $"To: {destinationViewControllerName}");

    }

    }

    Listing 4-13.

    PrepareForSegue Method Outputs Names of Classes Implementing the Source and Destination
    View Controllers

    ```


    The `BaseViewController` class derives from `UIViewController`, has a default
    constructor, and also overrides the `PrepareForSegue` method. Apart from the base
    functionality, `PrepareForSegue` reads the names of two classes, implementing
    the source and destination view controllers, and then displays them in the application
    output.


    This example shows how to access instances of view controllers participating in
    the segue. Hence, to actually pass data between view controllers, you would need
    to supplement the associated classes with public properties and then rewrite them
    within the `PrepareForSegue` method.


    To use the class from Listing [4-13](#A453659_1_En_4_Chapter.html#Par59), I modify
    declarations of the `FirstViewController` and the `SecondViewController` such
    that they derive from `BaseViewController` instead of `UIViewController` (as in
    Listing [4-3](#A453659_1_En_4_Chapter.html#Par14)). So, when you re-run the app
    and perform navigation between the views, the output of the Navigation app should
    look like the one from Figure [4-15](#A453659_1_En_4_Chapter.html#Fig15).


    ![A453659_1_En_4_Fig15_HTML.jpg](A453659_1_En_4_Fig15_HTML.jpg)


    Figure 4-15.


    Application output showing the flow of a segue


    ## Summary


    In this chapter, we learned how to create multi-view applications and how to perform
    navigation between views using various approaches. We started with the Tabbed
    App project template and investigated how to create and modify tabs. Then, we
    moved to the Page-Based App project template. We deeply examined its relatively
    complex structure and then modified the app code to better understand page-based
    navigation. Finally, we created custom segues between view controllers. In the
    next chapter, we will learn how to handle touch gestures in iOS apps.


    # 5. Touch


    Mobile devices are controlled by touch gestures. Users can use gestures to switch
    between views or to manipulate visual elements to translate, rotate, and resize
    them. In this chapter, we will learn how to handle gestures in Xamarin.iOS. We
    will start with a short description of gesture recognizers and then investigate
    how to use gestures for navigation. Subsequently, we will learn how to programmatically
    create and control gesture recognizers and the programmatic events they generate.
    Finally, we will implement the app, in which the location, rotation, and scale
    of the visual component will be controlled with gestures. So, after completing
    this chapter, you will know how to perform complex manipulation of visual controls,
    which you will find useful for media apps (like a photo editor or drawing tool)
    that extensively utilize gestures to tailor the appearance of visual elements.


    ## Touches and Gesture Recognizers


    Whenever the user touches the screen, a series of appropriate events are raised.
    To handle these events, you would normally need to implement the following methods
    in the class associated with the view controller:


    *   `TouchesBegan`, which is invoked when the user touches the screen with one
    or more fingers

    *   `TouchesMoved`, which is called when user changes the location of his or her
    fingers on the screen

    *   `TouchesCancelled`, which is invoked when the touch is canceled

    *   `TouchesEnded`, invoked when the touch gesture is finished


    To show an actual sample, I create a new single view app (universal targeting
    iOS 9.0 and above) with the name Touches. Subsequently, I extend the definition
    of the `ViewController` class by the preceding methods and implement them according
    to Listing [5-1](#A453659_1_En_5_Chapter.html#Par8) (note that this code depends
    upon the following namespaces: `Foundation`, `System.Diagnostics`, and `System.Linq`).
    Implementation of `TouchesBegan`, `TouchesCancelled`, and `TouchesEnded` does
    not require any additional comments. All of these methods simply print the method
    name to the application output. A little more explanation is required for the
    `TouchesMoved` method. This function, apart from printing a TouchesMoved string,
    also iterates through the set of touches received by the event handler. In general,
    the application user can use more than one finger to perform a gesture. Each contact
    between his or her fingers and the screen is defined as a touch . The information
    about each touch is provided to the event handler as an instance of the `NSSet`.
    This object represents an unordered collection of objects, which in this specific
    case represents a touch. Hence, in Listing [5-1](#A453659_1_En_5_Chapter.html#Par8),
    the set of touches is first casted to a collection of `UITouch` objects, each
    of which is an abstract representation of the touch or finger movement on the
    screen. Then, I print the contact locations in the application output.


    ```

    public override void TouchesBegan(NSSet touches, UIEvent evt)

    {

    base.TouchesBegan(touches, evt);

    Debug.WriteLine("TouchesBegan");

    }

    public override void TouchesMoved(NSSet touches, UIEvent evt)

    {

    base.TouchesMoved(touches, evt);

    Debug.WriteLine("TouchesMoved");

    foreach (var touch in touches.Cast())

    {

    Debug.WriteLine(touch.GetPreciseLocation(View));

    }

    }

    public override void TouchesCancelled(NSSet touches, UIEvent evt)

    {

    base.TouchesCancelled(touches, evt);

    Debug.WriteLine("TouchesCancelled");

    }

    public override void TouchesEnded(NSSet touches, UIEvent evt)

    {

    base.TouchesEnded(touches, evt);

    Debug.WriteLine("TouchesEnded");

    }

    Listing 5-1.

    Handling Low-level Information About Touches

    ```


    When you run the Touches app in the simulator, it will generate output that should
    look like that in Figure [5-1](#A453659_1_En_5_Chapter.html#Fig1). As shown there,
    the beginning of the gesture is indicated by the `TouchesBegan` method. Subsequently,
    a series of `TouchesMoved` events is raised, each of which reports the current
    position of the touch contacts (where the finger touches the screen). Finally,
    `TouchesEnded` is fired, informing you that user has released his or her fingers
    from the screen.


    ![A453659_1_En_5_Fig1_HTML.jpg](A453659_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    A screenshot showing the sample output of the Touches app'
  trans: "\n### 准备 Segues\n\n通常，你需要在视图控制器之间传递数据。例如，你显示一个视图控制器来收集用户输入，当这个视图控制器被关闭后，收集到的数据会在初始的视图控制器中被使用。要在视图控制器之间传递数据，你需要使用\
    \ `UIViewController` 类的 `PrepareForSegue` 方法。`PrepareForSegue` 会在 Segue 执行之前被调用。\n\
    \n为了演示 `PrepareForSegue` 类的使用示例，我向 Navigation 项目补充了另一个类 `BaseViewController`，其定义如代码清单\
    \ 4-13 所示。\n\n```csharp\npublic class BaseViewController : UIViewController\n\
    {\n    protected BaseViewController(IntPtr handle) : base(handle) { }\n\n    public\
    \ override void PrepareForSegue(UIStoryboardSegue segue, NSObject sender)\n  \
    \  {\n        base.PrepareForSegue(segue, sender);\n        var sourceViewControllerName\
    \ = segue.SourceViewController.GetType().Name;\n        var destinationViewControllerName\
    \ = segue.DestinationViewController.GetType().Name;\n        Debug.WriteLine($\"\
    From: {sourceViewControllerName} \" +\n                        $\"To: {destinationViewControllerName}\"\
    );\n    }\n}\n```\n\n*代码清单 4-13. `PrepareForSegue` 方法输出实现源视图控制器和目标视图控制器的类名*\n\n\
    `BaseViewController` 类继承自 `UIViewController`，有一个默认构造函数，并重写了 `PrepareForSegue`\
    \ 方法。除了基类功能外，`PrepareForSegue` 方法读取实现源视图控制器和目标视图控制器的两个类的名称，然后将它们显示在应用程序输出中。\n\n\
    此示例演示了如何访问参与 Segue 的视图控制器实例。因此，要实际在视图控制器之间传递数据，你需要为相关类补充公共属性，然后在 `PrepareForSegue`\
    \ 方法中重写它们。\n\n为了使用代码清单 4-13 中的类，我修改了 `FirstViewController` 和 `SecondViewController`\
    \ 的声明，使它们继承自 `BaseViewController` 而不是 `UIViewController`（如代码清单 4-3 所示）。因此，当你重新运行应用并在视图之间进行导航时，Navigation\
    \ 应用的输出应类似于图 4-15 所示。\n\n![A453659_1_En_4_Fig15_HTML.jpg](img/A453659_1_En_4_Fig15_HTML.jpg)\n\
    \n*图 4-15. 显示 Segue 流程的应用程序输出*\n\n## 本章小结\n\n在本章中，我们学习了如何创建多视图应用，以及如何使用各种方法在视图之间进行导航。我们从\
    \ Tabbed App 项目模板开始，研究了如何创建和修改标签页。然后，我们转向 Page-Based App 项目模板。我们深入研究了其相对复杂的结构，然后修改了应用代码以更好地理解基于页面的导航。最后，我们在视图控制器之间创建了自定义的\
    \ Segue。在下一章中，我们将学习如何处理 iOS 应用中的触摸手势。\n\n# 5. 触摸\n\n移动设备通过触摸手势进行控制。用户可以使用手势在视图之间切换，或者操作视觉元素来平移、旋转和调整其大小。在本章中，我们将学习如何在\
    \ Xamarin.iOS 中处理手势。我们将从对“手势识别器”的简短介绍开始，然后研究如何使用手势进行导航。随后，我们将学习如何以编程方式创建和控制手势识别器及其生成的编程事件。最后，我们将实现一个应用，其中视觉组件的位置、旋转和缩放都将通过手势来控制。因此，学完本章后，你将了解如何对视觉控件执行复杂操作，这对于媒体应用（如照片编辑器或绘图工具）非常有用，这类应用广泛利用手势来调整视觉元素的外观。\n\
    \n## 触摸与手势识别器\n\n每当用户触摸屏幕时，会引发一系列相应的事件。要处理这些事件，通常需要在与视图控制器关联的类中实现以下方法：\n\n- `TouchesBegan`：当用户用一根或多根手指触摸屏幕时调用。\n\
    - `TouchesMoved`：当用户改变其手指在屏幕上的位置时调用。\n- `TouchesCancelled`：当触摸被取消时调用。\n- `TouchesEnded`：当触摸手势完成时调用。\n\
    \n为了展示一个实际示例，我创建了一个名为 `Touches` 的新单一视图应用（通用，目标 iOS 9.0 及以上）。随后，我通过上述方法扩展了 `ViewController`\
    \ 类的定义，并根据代码清单 5-1 实现了它们（请注意，此代码依赖于以下命名空间：`Foundation`、`System.Diagnostics` 和\
    \ `System.Linq`）。`TouchesBegan`、`TouchesCancelled` 和 `TouchesEnded` 的实现不需要任何额外说明。所有这些方法都只是将方法名打印到应用程序输出中。需要稍多一点解释的是\
    \ `TouchesMoved` 方法。该函数除了打印 `TouchesMoved` 字符串外，还会遍历事件处理程序接收到的触摸集合。通常，应用用户可以使用不止一根手指来执行手势。每根手指与屏幕的接触都被定义为一个*触摸*。关于每次触摸的信息作为\
    \ `NSSet` 的一个实例提供给事件处理程序。该对象表示一个无序的对象集合，在此特定情况下，代表触摸。因此，在代码清单 5-1 中，触摸集首先被转换为\
    \ `UITouch` 对象的集合，每个 `UITouch` 对象都是屏幕上触摸或手指移动的抽象表示。然后，我将接触点的位置打印到应用程序输出中。\n\n\
    ```csharp\npublic override void TouchesBegan(NSSet touches, UIEvent evt)\n{\n\
    \    base.TouchesBegan(touches, evt);\n    Debug.WriteLine(\"TouchesBegan\");\n\
    }\n\npublic override void TouchesMoved(NSSet touches, UIEvent evt)\n{\n    base.TouchesMoved(touches,\
    \ evt);\n    Debug.WriteLine(\"TouchesMoved\");\n    foreach (var touch in touches.Cast<UITouch>())\n\
    \    {\n        Debug.WriteLine(touch.GetPreciseLocation(View));\n    }\n}\n\n\
    public override void TouchesCancelled(NSSet touches, UIEvent evt)\n{\n    base.TouchesCancelled(touches,\
    \ evt);\n    Debug.WriteLine(\"TouchesCancelled\");\n}\n\npublic override void\
    \ TouchesEnded(NSSet touches, UIEvent evt)\n{\n    base.TouchesEnded(touches,\
    \ evt);\n    Debug.WriteLine(\"TouchesEnded\");\n}\n```\n\n*代码清单 5-1. 处理触摸的低级信息*\n\
    \n当你在模拟器中运行 `Touches` 应用时，它将生成如图 5-1 所示的输出。如图所示，手势的开始由 `TouchesBegan` 方法指示。随后，会引发一系列\
    \ `TouchesMoved` 事件，每个事件报告当前触摸接触点的位置（手指接触屏幕的位置）。最后，触发 `TouchesEnded` 事件，通知你用户已将手指从屏幕上抬起。\n\
    \n![A453659_1_En_5_Fig1_HTML.jpg](img/A453659_1_En_5_Fig1_HTML.jpg)\n\n*图 5-1.\
    \ 显示 `Touches` 应用示例输出的屏幕截图*\n"
- fmt: "# Gesture Recognizers in iOS\n\nIn order to recognize or detect a particular\
    \ gesture, like swipe, long press, pan, rotation, or pinch, you would need to\
    \ analyze the collection of touches to find patterns representing the particular\
    \ gesture. More specifically, using the location of each contact, you would need\
    \ to determine the touches’ path. However, the iOS SDK provides several classes\
    \ that do it for you. These classes are defined as gesture recognizers and greatly\
    \ simplify gesture recognition because they implement all the necessary calculations.\
    \ You only need to instantiate an appropriate gesture-recognizer class, and it\
    \ will raise an appropriate event whenever it detects the particular gesture.\
    \ As with most of the other iOS SDK components, gesture recognizers are wrapped\
    \ by appropriate objects from Xamarin.iOS.\n\nIn the next few sections, I will\
    \ tell you how to utilize gesture recognizers to perform navigation and to manipulate\
    \ visual components.\n\n## Swipe and Long-Press Gesture Recognizers\n\nTo show\
    \ how to use gesture recognizers, I extend the Navigation app we developed in\
    \ the previous chapter so that the user will be able to switch between views using\
    \ swipe and long-press gestures. Specifically, the long-press gesture will let\
    \ him or her navigate from the first to the second view, while he or she will\
    \ use the swipe gesture to navigate back to the first view. I will first create\
    \ the swipe-gesture recognizer using the iOS designer, then generate a long-press\
    \ gesture recognizer programmatically.\n\nTo implement such a functionality, I\
    \ first copy the project folder under `Chapter_05` of the companion code and then\
    \ rename the project in Visual Studio (the Rename… option from the context menu)\
    \ from Navigation to Navigation.Swipe. Subsequently, I open iOS designer, and\
    \ from the Toolbox I drag Swipe Gesture Recognizer to the second view controller.\
    \ A small icon representing this gesture recognizer appears at the bottom of the\
    \ second view controller (see Figure 5-2).\n\n![A453659_1_En_5_Fig2_HTML.jpg](A453659_1_En_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2.** A Swipe Gesture Recognizer added to the view controller\n\n\
    Then, I open the Properties pad of the Swipe Gesture Recognizer, where I go to\
    \ the Events tab and type SwipeDetected into the Action drop-down list (Figure\
    \ 5-3). After pressing Enter, Visual Studio creates an event handler, which I\
    \ define according to Listing 5-2.\n\n![A453659_1_En_5_Fig3_HTML.jpg](A453659_1_En_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3.** Creating an event handler for the Swipe Gesture Recognizer\n\
    \n```\npartial void SwipeDetected(UISwipeGestureRecognizer sender)\n{\n    DismissViewController(true,\
    \ null);\n}\n```\n\n**Listing 5-2.** Dismissing the View Controller When the Swipe\
    \ Gesture Is Recognized\n\nWhen you re-run the app, you can navigate to the second\
    \ view by tapping the Switch view button. Once the second view is displayed, you\
    \ can go back to the first view by using the right-swipe gesture. Whenever such\
    \ a gesture is detected, the recognizer raises an appropriate event, which is\
    \ handled here by `SwipeDetected`. As Listing 5-2 shows, I use this method to\
    \ navigate back using the `DismissViewController` method of the `UIViewController`\
    \ class. `DismissViewController` accepts two arguments:\n\n*   `animated` – specifies\
    \ if the transition between views should be animated\n*   `completionHandler`\
    \ – lets you specify the code that is executed when the animation is completed\n\
    \nIn Listing 5-2, I enable animation and pass `null` for the second argument of\
    \ `DismissViewController` since I do not need to execute any additional methods.\n\
    \nGesture recognizers also have several properties that let you adjust them to\
    \ your specific needs. For instance, you can modify the swipe gesture recognizer\
    \ to react to the selected swipe direction (see Figure 5-4). To this end, you\
    \ use the Swipe drop-down list. Additionally, you can specify how many fingers\
    \ are required for a swipe gesture (the Touches numeric control).\n\n![A453659_1_En_5_Fig4_HTML.jpg](A453659_1_En_5_Fig4_HTML.jpg)\n\
    \n**Figure 5-4.** Properties of the swipe gesture recognizer\n\nLet’s now use\
    \ the long-press gesture recognizer to implement navigation from the first to\
    \ the second view. To this end, I proceed as follows. First, I programmatically\
    \ instantiate the `UILongPressGestureRecognizer`, a class representing the recognizer,\
    \ in the `ViewDidLoad` method of the `FirstViewController` class (Listing 5-3).\
    \ Then, I associate the resulting instance with the view using the `AddGestureRecognizer`\
    \ method.\n\n```\npublic override void ViewDidLoad()\n{\n    base.ViewDidLoad();\n\
    \    var longPressGestureRecognizer =\n        new UILongPressGestureRecognizer(PresentSecondViewController);\n\
    \    View.AddGestureRecognizer(longPressGestureRecognizer);\n}\n```\n\n**Listing\
    \ 5-3.** Programmatic Creation of the Gesture Recognizer\n\nAs Listing 5-3 shows,\
    \ the constructor of the `UILongPressGestureRecognizer` class accepts an argument\
    \ pointing to an action, `PresentSecondViewController`, which is called whenever\
    \ the gesture is recognized. In the previous case, we did the same thing (associate\
    \ a method with the Action event) through the Properties pad. So now you know\
    \ two equivalent methods of associating actions with gesture recognizers.\n\n\
    ```\nprivate void PresentSecondViewController(\n    UILongPressGestureRecognizer\
    \ sender)\n{\n    if(sender.State == UIGestureRecognizerState.Began)\n    {\n\
    \        var secondViewController = Storyboard.\n            InstantiateViewController(\"\
    SecondViewController\")\n            as UIViewController;\n        PresentViewController(secondViewController,\
    \ true, null);\n    }\n}\n```\n\n**Listing 5-4.** Presenting a View Controller\n\
    \nA definition of `PresentSecondViewController` appears in Listing 5-4. This method\
    \ has a single argument, `sender`, which is of type `UILongPressGestureRecognizer`.\
    \ This argument stores an instance of the gesture recognizer, which in this case\
    \ detected the long-press gesture. In practice, you use this instance to get more\
    \ information about the gesture. In particular, you can check the gesture state,\
    \ which is represented by one of the following items from the `UIGestureRecognizerState`\
    \ enumeration:\n\n*   `Began` – indicates that the gesture recognizer has identified\
    \ a set of touches as the particular gesture\n*   `Changed` – specifies that touches\
    \ (or finger positions) have been changed\n*   `Possible` – gesture recognizer\
    \ has identified the set of touches but it is still processing them in order to\
    \ recognize a gesture\n*   `Ended`, `Cancelled`, `Failed` – informs that the gesture\
    \ has been completed, canceled, or failed (not recognized), respectively.\n\n\
    In Listing 5-4, I look for the `Began` state and then create the second view controller\
    \ using the `InstantiateViewController` method of the `Storyboard`. Subsequently,\
    \ I invoke `PresentViewController` to navigate to the second view controller.\
    \ In order to instantiate the view controller using a `Storyboard` class, I need\
    \ to set the storyboard identifier for the view controller. I do so using the\
    \ Properties pad as shown in Figure 5-5.\n\nIf you now re-run the app, you can\
    \ click and hold the mouse button in the first view. The second view will appear\
    \ after a while. As you see, you can now navigate between the views using gestures\
    \ and buttons.\n\n![A453659_1_En_5_Fig5_HTML.jpg](A453659_1_En_5_Fig5_HTML.jpg)\n\
    \n**Figure 5-5.** Setting the storyboard identifier of the `SecondViewController`"
  raw: 'In order to recognize or detect a particular gesture, like swipe, long press,
    pan, rotation, or pinch, you would need to analyze the collection of touches to
    find patterns representing the particular gesture. More specifically, using the
    location of each contact, you would need to determine the touches’ path. However,
    the iOS SDK provides several classes that do it for you. These classes are defined
    as gesture recognizers and greatly simplify gesture recognition because they implement
    all the necessary calculations. You only need to instantiate an appropriate gesture-recognizer
    class, and it will raise an appropriate event whenever it detects the particular
    gesture. As with most of the other iOS SDK components, gesture recognizers are
    wrapped by appropriate objects from Xamarin.iOS.


    In the next few sections, I will tell you how to utilize gesture recognizers to
    perform navigation and to manipulate visual components.


    ## Swipe and Long-Press Gesture Recognizers


    To show how to use gesture recognizers, I extend the Navigation app we developed
    in the previous chapter so that the user will be able to switch between views
    using swipe and long-press gestures. Specifically, the long-press gesture will
    let him or her navigate from the first to the second view, while he or she will
    use the swipe gesture to navigate back to the first view. I will first create
    the swipe-gesture recognizer using the iOS designer, then generate a long-press
    gesture recognizer programmatically.


    To implement such a functionality , I first copy the project folder under `Chapter_05`
    of the companion code and then rename the project in Visual Studio (the Rename…
    option from the context menu) from Navigation to Navigation.Swipe. Subsequently,
    I open iOS designer, and from the Toolbox I drag Swipe Gesture Recognizer to the
    second view controller. A small icon representing this gesture recognizer appears
    at the bottom of the second view controller (see Figure [5-2](#A453659_1_En_5_Chapter.html#Fig2)).


    ![A453659_1_En_5_Fig2_HTML.jpg](A453659_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    A Swipe Gesture Recognizer added to the view controller


    Then, I open the Properties pad of the Swipe Gesture Recognizer, where I go to
    the Events tab and type SwipeDetected into the Action drop-down list (Figure [5-3](#A453659_1_En_5_Chapter.html#Fig3)).
    After pressing Enter, Visual Studio creates an event handler, which I define according
    to Listing [5-2](#A453659_1_En_5_Chapter.html#Par15).


    ![A453659_1_En_5_Fig3_HTML.jpg](A453659_1_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    Creating an event handler for the Swipe Gesture Recognizer


    ```

    partial void SwipeDetected(UISwipeGestureRecognizer sender)

    {

    DismissViewController(true, null);

    }

    Listing 5-2.

    Dismissing the View Controller When the Swipe Gesture Is Recognized

    ```


    When you re-run the app, you can navigate to the second view by tapping the Switch
    view button. Once the second view is displayed, you can go back to the first view
    by using the right-swipe gesture. Whenever such a gesture is detected, the recognizer
    raises an appropriate event, which is handled here by `SwipeDetected`. As Listing
    [5-2](#A453659_1_En_5_Chapter.html#Par15) shows, I use this method to navigate
    back using the `DismissViewController` method of the `UIViewController` class.
    `DismissViewController` accepts two arguments:


    *   `animated` – specifies if the transition between views should be animated

    *   `completionHandler` – lets you specify the code that is executed when the
    animation is completed


    In Listing [5-2](#A453659_1_En_5_Chapter.html#Par15), I enable animation and pass
    `null` for the second argument of `DismissViewController` since I do not need
    to execute any additional methods.


    Gesture recognizers also have several properties that let you adjust them to your
    specific needs. For instance, you can modify the swipe gesture recognizer to react
    to the selected swipe direction (see Figure [5-4](#A453659_1_En_5_Chapter.html#Fig4)).
    To this end, you use the Swipe drop-down list. Additionally, you can specify how
    many fingers are required for a swipe gesture (the Touches numeric control).


    ![A453659_1_En_5_Fig4_HTML.jpg](A453659_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    Properties of the swipe gesture recognizer


    Let’s now use the long-=press gesture recognizer to implement navigation from
    the first to the second view. To this end, I proceed as follows. First, I programmatically
    instantiate the `UILongPressGestureRecognizer`, a class representing the recognizer,
    in the `ViewDidLoad` method of the `FirstViewController` class (Listing [5-3](#A453659_1_En_5_Chapter.html#Par22)).
    Then, I associate the resulting instance with the view using the `AddGestureRecognizer`
    method.


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    var longPressGestureRecognizer =

    new UILongPressGestureRecognizer(PresentSecondViewController);

    View.AddGestureRecognizer(longPressGestureRecognizer);

    }

    Listing 5-3.

    Programmatic Creation of the Gesture Recognizer

    ```


    As Listing [5-3](#A453659_1_En_5_Chapter.html#Par22) shows, the constructor of
    the `UILongPressGestureRecognizer` class accepts an argument pointing to an action,
    `PresentSecondViewController`, which is called whenever the gesture is recognized.
    In the previous case, we did the same thing (associate a method with the `Action`
    event) through the Properties pad. So now you know two equivalent methods of associating
    actions with gesture recognizers.


    ```

    private void PresentSecondViewController(

    UILongPressGestureRecognizer sender)

    {

    if(sender.State == UIGestureRecognizerState.Began)

    {

    var secondViewController = Storyboard.

    InstantiateViewController("SecondViewController")

    as UIViewController;

    PresentViewController(secondViewController, true, null);

    }

    }

    Listing 5-4.

    Presenting a View Controller

    ```


    A definition of `PresentSecondViewController` appears in Listing [5-4](#A453659_1_En_5_Chapter.html#Par24).
    This method has a single argument, `sender`, which is of type `UILongPressGestureRecognizer`.
    This argument stores an instance of the gesture recognizer, which in this case
    detected the long-press gesture. In practice, you use this instance to get more
    information about the gesture. In particular, you can check the gesture state,
    which is represented by one of the following items from the `UIGestureRecognizerState`
    enumeration:


    *   `Began` – indicates that the gesture recognizer has identified a set of touches
    as the particular gesture

    *   `Changed` – specifies that touches (or finger positions) have been changed

    *   `Possible` – gesture recognizer has identified the set of touches but it is
    still processing them in order to recognize a gesture

    *   `Ended`, `Cancelled`, `Failed` – informs that the gesture has been completed,
    canceled, or failed (not recognized), respectively.


    In Listing [5-4](#A453659_1_En_5_Chapter.html#Par24), I look for the `Began` state
    and then create the second view controller using the `InstantiateViewController`
    method of the `Storyboard`. Subsequently, I invoke `PresentViewController` to
    navigate to the second view controller. In order to instantiate the view controller
    using a `Storyboard` class, I need to set the storyboard identifier for the view
    controller. I do so using the Properties pad as shown in Figure [5-5](#A453659_1_En_5_Chapter.html#Fig5).


    If you now re-run the app, you can click and hold the mouse button in the first
    view. The second view will appear after a while. As you see, you can now navigate
    between the views using gestures and buttons.


    ![A453659_1_En_5_Fig5_HTML.jpg](A453659_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    Setting the storyboard identifier of the SecondViewController'
  trans: "\n# iOS 中的手势识别器\n\n为了识别或检测特定手势（如滑动、长按、平移、旋转或捏合），你需要分析触摸集合以找出代表特定手势的模式。更具体地说，你需要利用每个接触点的位置来确定触摸的路径。不过，iOS\
    \ SDK 提供了几个为你完成此任务的类。这些类被定义为手势识别器，由于它们实现了所有必要的计算，因此极大地简化了手势识别。你只需实例化一个合适的手势识别器类，它便会在检测到特定手势时触发相应的事件。与大多数其他\
    \ iOS SDK 组件一样，手势识别器被封装在 Xamarin.iOS 的相应对象中。\n\n在接下来的几节中，我将告诉你如何利用手势识别器来执行导航和操作可视化组件。\n\
    \n## 滑动与长按手势识别器\n\n为了演示如何使用手势识别器，我将扩展我们在前一章中开发的导航应用，使用户能够通过滑动和长按手势在视图之间切换。具体来说，长按手势将允许用户从第一个视图导航到第二个视图，而用户则使用滑动手势导航回第一个视图。我将首先使用\
    \ iOS 设计器创建滑动手势识别器，然后以编程方式生成长按手势识别器。\n\n为了实现这样的功能，我首先复制配套代码中`Chapter_05` 下的项目文件夹，然后在\
    \ Visual Studio 中将项目重命名（通过上下文菜单中的“重命名...”选项），从 Navigation 改为 Navigation.Swipe。接着，我打开\
    \ iOS 设计器，从工具箱中将“滑动手势识别器”拖拽到第二个视图控制器上。这个手势识别器的一个小图标会出现在第二个视图控制器的底部（见图 5-2）。\n\n\
    ![A453659_1_En_5_Fig2_HTML.jpg](img/A453659_1_En_5_Fig2_HTML.jpg)\n\n**图 5-2.**\
    \ 添加到视图控制器的滑动手势识别器\n\n然后，我打开滑动识别器的“属性”面板，进入“事件”选项卡，在“操作”下拉列表中输入 `SwipeDetected`（图\
    \ 5-3）。按下回车键后，Visual Studio 会创建一个事件处理程序，我按照清单 5-2 对其进行定义。\n\n![A453659_1_En_5_Fig3_HTML.jpg](img/A453659_1_En_5_Fig3_HTML.jpg)\n\
    \n**图 5-3.** 为滑动手势识别器创建事件处理程序\n\n```\npartial void SwipeDetected(UISwipeGestureRecognizer\
    \ sender)\n{\n    DismissViewController(true, null);\n}\n```\n\n**清单 5-2.** 识别到滑动手势时关闭视图控制器\n\
    \n当你重新运行应用时，你可以通过点击“切换视图”按钮导航到第二个视图。一旦第二个视图显示出来，你可以通过右滑手势返回第一个视图。每当检测到这种手势时，识别器就会触发一个相应的事件，此事件由\
    \ `SwipeDetected` 处理。如清单 5-2 所示，我使用此方法通过 `UIViewController` 类的 `DismissViewController`\
    \ 方法导航回。`DismissViewController` 接受两个参数：\n\n*   `animated` – 指定视图之间的过渡是否应带有动画效果\n\
    *   `completionHandler` – 允许你指定动画完成时执行的代码\n\n在清单 5-2 中，我启用了动画效果，并为 `DismissViewController`\
    \ 的第二个参数传递了 `null`，因为我不需要执行任何额外的方法。\n\n手势识别器还具有多个属性，允许你根据特定需求调整它们。例如，你可以修改滑动手势识别器，使其对选定的滑动方向做出响应（见图\
    \ 5-4）。为此，你需要使用“滑动”下拉列表。此外，你还可以指定滑动所需的手指数量（“触摸次数”数字控件）。\n\n![A453659_1_En_5_Fig4_HTML.jpg](img/A453659_1_En_5_Fig4_HTML.jpg)\n\
    \n**图 5-4.** 滑动手势识别器的属性\n\n现在，让我们使用长按手势识别器来实现从第一个视图到第二个视图的导航。为此，我按如下步骤操作。首先，我在\
    \ `FirstViewController` 类的 `ViewDidLoad` 方法中以编程方式实例化代表识别器的 `UILongPressGestureRecognizer`\
    \ 类（清单 5-3）。然后，我使用 `AddGestureRecognizer` 方法将生成的实例与视图关联起来。\n\n```\npublic override\
    \ void ViewDidLoad()\n{\n    base.ViewDidLoad();\n    var longPressGestureRecognizer\
    \ =\n        new UILongPressGestureRecognizer(PresentSecondViewController);\n\
    \    View.AddGestureRecognizer(longPressGestureRecognizer);\n}\n```\n\n**清单 5-3.**\
    \ 以编程方式创建手势识别器\n\n如清单 5-3 所示，`UILongPressGestureRecognizer` 类的构造函数接受一个指向操作的参数，即\
    \ `PresentSecondViewController`，每当识别到手势时就会调用该操作。在前面的案例中，我们通过“属性”面板做了同样的事情（将方法与\
    \ Action 事件关联）。所以现在你知道了将操作与手势识别器关联的两种等效方法。\n\n```\nprivate void PresentSecondViewController(\n\
    \    UILongPressGestureRecognizer sender)\n{\n    if(sender.State == UIGestureRecognizerState.Began)\n\
    \    {\n        var secondViewController = Storyboard.\n            InstantiateViewController(\"\
    SecondViewController\")\n            as UIViewController;\n        PresentViewController(secondViewController,\
    \ true, null);\n    }\n}\n```\n\n**清单 5-4.** 呈现视图控制器\n\n`PresentSecondViewController`\
    \ 的定义出现在清单 5-4 中。此方法有一个参数 `sender`，其类型为 `UILongPressGestureRecognizer`。该参数存储了在此案例中检测到长按手势的识别器实例。在实践中，你可以使用此实例来获取有关手势的更多信息。特别是，你可以检查手势状态，该状态由\
    \ `UIGestureRecognizerState` 枚举中的以下项目之一表示：\n\n*   `Began` – 表示手势识别器已识别出一组触摸为特定手势\n\
    *   `Changed` – 表示触摸（或手指位置）已发生改变\n*   `Possible` – 手势识别器已识别出触摸组，但仍在对它们进行处理以便识别手势\n\
    *   `Ended`、`Cancelled`、`Failed` – 分别表示手势已完成、已取消或已失败（未识别）。\n\n在清单 5-4 中，我查找 `Began`\
    \ 状态，然后使用 `Storyboard` 的 `InstantiateViewController` 方法创建第二个视图控制器。随后，我调用 `PresentViewController`\
    \ 来导航到第二个视图控制器。为了使用 `Storyboard` 类实例化视图控制器，我需要为视图控制器设置故事板标识符。我通过“属性”面板进行设置，如图\
    \ 5-5 所示。\n\n如果你现在重新运行应用，你可以在第一个视图中点击并按住鼠标按钮。稍后第二个视图就会出现。如你所见，你现在可以通过手势和按钮在视图之间进行导航。\n\
    \n![A453659_1_En_5_Fig5_HTML.jpg](img/A453659_1_En_5_Fig5_HTML.jpg)\n\n**图 5-5.**\
    \ 设置 `SecondViewController` 的故事板标识符\n"
- fmt: "## Manipulating Controls with Gestures\n\nI will now tell you how to use gesture\
    \ recognizers to manipulate controls. To this end, I will develop an app, shown\
    \ in Figure [5-6](#A453659_1_En_5_Chapter.html#Fig6). This app has a single control,\
    \ an instance of the `UIView` class, which represents a purple square. This control\
    \ will be translated with the pan gesture, rotated with the rotation gesture,\
    \ and rescaled with the pinch gesture.\n\n![A453659_1_En_5_Fig6_HTML.jpg](A453659_1_En_5_Fig6_HTML.jpg)\n\
    \n**Figure 5-6.** The sample view of the Gestures app we will develop to learn\
    \ about the pan, rotation and pinch gesture recognizers\n\n### Pan Gesture Recognizer\n\
    \nI start by creating the Gestures app using the Single View App project template.\
    \ I made this app universal and set the minimum target version to iOS 9.0. Then,\
    \ in the `ViewController` class, I first import two namespaces: `System.Drawing`\
    \ and `CoreGraphics`. Then, I declare one private field of type `UIView`. This\
    \ field stores a reference to the purple rectangle. Afterward, I implement two\
    \ private methods, `AddSquare` and `AddPanGestureRecognizer` (Listing [5-5](#A453659_1_En_5_Chapter.html#Par34)).\n\
    \n```\nprivate UIView square;\n\nprivate void AddSquare(float squareSideLength,\
    \ UIColor color)\n{\n    square = new UIView()\n    {\n        BackgroundColor\
    \ = color,\n        Frame = new RectangleF(0, 0, squareSideLength, squareSideLength),\n\
    \        Center = new CGPoint(View.Frame.Width / 2.0, View.Frame.Height / 2.0)\n\
    \    };\n    Add(square);\n}\n\nprivate void AddPanGestureRecognizer()\n{\n  \
    \  var panGestureRecognizer =\n        new UIPanGestureRecognizer(TranslateSquare);\n\
    \    View.AddGestureRecognizer(panGestureRecognizer);\n}\n```\n\n**Listing 5-5.**\
    \ Private Members of the `ViewController` Class\n\nThe `AddSquare` method is used\
    \ to create and configure an instance of the `UIView` class, which represents\
    \ the purple square. This method uses features that were already discussed, so\
    \ further comments about `AddSquare` are not necessary. The second method from\
    \ Listing [5-5](#A453659_1_En_5_Chapter.html#Par34), `AddPanGestureRecognizer`,\
    \ first instantiates the `UIPanGestureRecognizer` and then associates it with\
    \ the view. Whenever this object recognizes a pan gesture, it will invoke the\
    \ `TranslateSquare` method from Listing [5-6](#A453659_1_En_5_Chapter.html#Par36).\n\
    \n```\nprivate void TranslateSquare(UIPanGestureRecognizer sender)\n{\n    var\
    \ translation = sender.TranslationInView(View);\n    square.Transform = CGAffineTransform.\n\
    \        MakeTranslation(translation.X, translation.Y);\n}\n```\n\n**Listing 5-6.**\
    \ Translating the Square\n\n`TranslateSquare` reads the amount of translation\
    \ made with the pan gesture using the `TranslationInView` method of the `UIPanGestureRecognizer`\
    \ class instance. `TranslationInView` returns an instance of the `CGPoint` struct,\
    \ whose `X` and `Y` properties store the relative translation along the horizontal\
    \ and vertical directions, respectively. I then use those values to translate\
    \ the square by modifying the `Transform` property of the `UIView`, to which a\
    \ reference is contained in the `square` field. The `Transform` property is of\
    \ type `CGAffineTransform` and represents the geometrical transformation of the\
    \ particular visual component. In general, this transformation is called an affine\
    \ transform and describes the translation, rotation, and scale changes of the\
    \ visual control. For now, I only translate the square, so I create a translation\
    \ transformation using the `MakeTranslation` static method of the `CGAffineTransform`\
    \ struct. The `MakeTranslation` method accepts two arguments, which denote the\
    \ amount of translation along the horizontal (first argument, `tx`) and vertical\
    \ directions (second argument, `ty`). So, whenever the pan gesture is recognized,\
    \ the square will be translated accordingly.\n\nTo actually use the `AddSquare`\
    \ and `AddPanGestureRecognizer` methods, I modify the `ViewDidLoad` view event\
    \ handler as shown in Listing [5-7](#A453659_1_En_5_Chapter.html#Par39). You can\
    \ now run the Gestures app in the simulator and use the pan gesture—simply move\
    \ the mouse cursor while holding the left mouse button. You will see that the\
    \ square is translated as you move the mouse cursor within the view. However,\
    \ you can easily notice that you can make the pan gesture anywhere in the view.\
    \ Let’s now modify the app such that it will only translate the square when the\
    \ pan gesture is performed against it or, in other words, when you virtually hold\
    \ the square. This requires detecting contact location, which is discussed in\
    \ the next section.\n\n![A453659_1_En_5_Fig7_HTML.jpg](A453659_1_En_5_Fig7_HTML.jpg)\n\
    \n**Figure 5-7.** Translating the square with the pan gesture\n\n```\npublic override\
    \ void ViewDidLoad()\n{\n    base.ViewDidLoad();\n    AddSquare(50.0f, UIColor.Purple);\n\
    \    AddPanGestureRecognizer();\n}\n```\n\n**Listing 5-7.** `ViewDidLoad` Method\
    \ of the `ViewController`"
  raw: '## Manipulating Controls with Gestures


    I will now tell you how to use gesture recognizers to manipulate controls . To
    this end, I will develop an app, shown in Figure [5-6](#A453659_1_En_5_Chapter.html#Fig6).
    This app has a single control, an instance of the `UIView` class, which represents
    a purple square. This control will be translated with the pan gesture, rotated
    with the rotation gesture, and rescaled with the pinch gesture.


    ![A453659_1_En_5_Fig6_HTML.jpg](A453659_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    The sample view of the Gestures app we will develop to learn about the pan, rotation
    and pinch gesture recognizers


    ### Pan Gesture Recognizer


    I start by creating the Gestures app using the Single View App project template.
    I made this app universal and set the minimum target version to iOS 9.0\. Then,
    in the `ViewController` class, I first import two namespaces: `System.Drawing`
    and `CoreGraphics`. Then, I declare one private field of type `UIView`. This field
    stores a reference to the purple rectangle. Afterward, I implement two private
    methods, `AddSquare` and `AddPanGestureRecognizer` (Listing [5-5](#A453659_1_En_5_Chapter.html#Par34)).


    ```

    private UIView square;

    private void AddSquare(float squareSideLength, UIColor color)

    {

    square = new UIView()

    {

    BackgroundColor = color,

    Frame = new RectangleF(0, 0, squareSideLength, squareSideLength),

    Center = new CGPoint(View.Frame.Width / 2.0, View.Frame.Height / 2.0)

    };

    Add(square);

    }

    private void AddPanGestureRecognizer()

    {

    var panGestureRecognizer =

    new UIPanGestureRecognizer(TranslateSquare);

    View.AddGestureRecognizer(panGestureRecognizer);

    }

    Listing 5-5.

    Private Members of the ViewController Class

    ```


    The `AddSquare` method is used to create and configure an instance of the `UIView`
    class, which represents the purple square. This method uses features that were
    already discussed, so further comments about `AddSquare` are not necessary. The
    second method from Listing [5-5](#A453659_1_En_5_Chapter.html#Par34), `AddPanGestureRecognizer`,
    first instantiates the `UIPanGestureRecognizer` and then associates it with the
    view. Whenever this object recognizes a pan gesture, it will invoke the `TranslateSquare`
    method from Listing [5-6](#A453659_1_En_5_Chapter.html#Par36).


    ```

    private void TranslateSquare(UIPanGestureRecognizer sender)

    {

    var translation = sender.TranslationInView(View);

    square.Transform = CGAffineTransform.

    MakeTranslation(translation.X, translation.Y);

    }

    Listing 5-6.

    Translating the Square

    ```


    `TranslateSquare` reads the amount of translation made with the pan gesture using
    the `TranslationInView` method of the `UIPanGestureRecognizer` class instance.
    `TranslationInView` returns an instance of the `CGPoint` struct, whose `X` and
    `Y` properties store the relative translation along the horizontal and vertical
    directions, respectively. I then use those values to translate the square by modifying
    the `Transform` property of the `UIView`, to which a reference is contained in
    the `square` field. The `Transform` property is of type `CGAffineTransform` and
    represents the geometrical transformation of the particular visual component.
    In general, this transformation is called an affine transform and describes the
    translation, rotation, and scale changes of the visual control. For now, I only
    translate the square, so I create a translation transformation using the `MakeTranslation`
    static method of the `CGAffineTransform` struct. The `MakeTranslation` method
    accepts two arguments, which denote the amount of translation along the horizontal
    (first argument, `tx`) and vertical directions (second argument, `ty`). So, whenever
    the pan gesture is recognized, the square will be translated accordingly.


    To actually use the `AddSquare` and `AddPanGestureRecognizer` methods, I modify
    the `ViewDidLoad` view event handler as shown in Listing [5-7](#A453659_1_En_5_Chapter.html#Par39).
    You can now run the Gestures app in the simulator and use the pan gesture—simply
    move the mouse cursor while holding the left mouse button. You will see that the
    square is translated as you move the mouse cursor within the view. However, you
    can easily notice that you can make the pan gesture anywhere in the view. Let’s
    now modify the app such that it will only translate the square when the pan gesture
    is performed against it or, in other words, when you virtually hold the square.
    This requires detecting contact location, which is discussed in the next section.


    ![A453659_1_En_5_Fig7_HTML.jpg](A453659_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Translating the square with the pan gesture


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    AddSquare(50.0f, UIColor.Purple);

    AddPanGestureRecognizer();

    }

    Listing 5-7.

    ViewDidLoad Method of the ViewController

    ```'
  trans: "\n## 使用手势操作控件\n\n现在我将介绍如何使用手势识别器来操作控件。为此，我将开发一款应用，如图 5-6 所示。该应用包含一个控件，即\
    \ `UIView` 类的一个实例，代表一个紫色方块。该控件将通过平移手势进行平移，通过旋转手势进行旋转，并通过捏合手势进行缩放。\n\n![A453659_1_En_5_Fig6_HTML.jpg](img/A453659_1_En_5_Fig6_HTML.jpg)\n\
    \n**图 5-6.** 手势应用的示例视图，我们将通过开发此应用来学习平移、旋转和捏合手势识别器\n\n### 平移手势识别器\n\n我首先使用单视图应用项目模板创建手势应用。我将此应用设为通用应用，并将最低目标版本设置为\
    \ iOS 9.0。接着，在 `ViewController` 类中，我首先导入两个命名空间：`System.Drawing` 和 `CoreGraphics`。然后，我声明一个\
    \ `UIView` 类型的私有字段。该字段存储了对紫色矩形的引用。之后，我实现了两个私有方法：`AddSquare` 和 `AddPanGestureRecognizer`（代码清单\
    \ 5-5）。\n\n```\nprivate UIView square;\n\nprivate void AddSquare(float squareSideLength,\
    \ UIColor color)\n{\n    square = new UIView()\n    {\n        BackgroundColor\
    \ = color,\n        Frame = new RectangleF(0, 0, squareSideLength, squareSideLength),\n\
    \        Center = new CGPoint(View.Frame.Width / 2.0, View.Frame.Height / 2.0)\n\
    \    };\n    Add(square);\n}\n\nprivate void AddPanGestureRecognizer()\n{\n  \
    \  var panGestureRecognizer =\n        new UIPanGestureRecognizer(TranslateSquare);\n\
    \    View.AddGestureRecognizer(panGestureRecognizer);\n}\n```\n\n**代码清单 5-5.**\
    \ `ViewController` 类的私有成员\n\n`AddSquare` 方法用于创建并配置代表紫色方块的 `UIView` 类实例。该方法使用了之前讨论过的功能，因此无需对其做进一步说明。代码清单\
    \ 5-5 中的第二个方法 `AddPanGestureRecognizer` 首先实例化 `UIPanGestureRecognizer`，然后将其与视图关联。每当此对象识别到平移手势时，它将调用代码清单\
    \ 5-6 中的 `TranslateSquare` 方法。\n\n```\nprivate void TranslateSquare(UIPanGestureRecognizer\
    \ sender)\n{\n    var translation = sender.TranslationInView(View);\n    square.Transform\
    \ = CGAffineTransform.\n        MakeTranslation(translation.X, translation.Y);\n\
    }\n```\n\n**代码清单 5-6.** 平移方块\n\n`TranslateSquare` 通过 `UIPanGestureRecognizer`\
    \ 类实例的 `TranslationInView` 方法读取使用平移手势产生的平移量。`TranslationInView` 返回一个 `CGPoint`\
    \ 结构体实例，其 `X` 和 `Y` 属性分别存储相对于水平和垂直方向的平移量。然后，我使用这些值通过修改 `UIView` 的 `Transform`\
    \ 属性来平移方块，该属性的引用存储在 `square` 字段中。`Transform` 属性的类型为 `CGAffineTransform`，表示特定视觉组件的几何变换。一般来说，这种变换称为仿射变换，描述了视觉控件的平移、旋转和缩放变化。目前我只平移方块，因此我使用\
    \ `CGAffineTransform` 结构体的 `MakeTranslation` 静态方法创建平移变换。`MakeTranslation` 方法接受两个参数，分别表示水平方向（第一个参数，`tx`）和垂直方向（第二个参数，`ty`）的平移量。因此，每当识别到平移手势时，方块就会相应地平移。\n\
    \n为了实际使用 `AddSquare` 和 `AddPanGestureRecognizer` 方法，我修改了 `ViewDidLoad` 视图事件处理程序，如代码清单\
    \ 5-7 所示。现在你可以在模拟器中运行手势应用并使用平移手势——只需在按住鼠标左键的同时移动鼠标光标。你会看到，当你在视图内移动鼠标光标时，方块会随之平移。但是，你很容易注意到，你可以在视图中的任何位置执行平移手势。现在让我们修改应用，使其仅当平移手势在方块上执行时（换句话说，当你虚拟地按住方块时）才平移方块。这需要检测接触位置，下一节将对此进行讨论。\n\
    \n![A453659_1_En_5_Fig7_HTML.jpg](img/A453659_1_En_5_Fig7_HTML.jpg)\n\n**图 5-7.**\
    \ 使用平移手势平移方块\n\n```\npublic override void ViewDidLoad()\n{\n    base.ViewDidLoad();\n\
    \    AddSquare(50.0f, UIColor.Purple);\n    AddPanGestureRecognizer();\n}\n```\n\
    \n**代码清单 5-7.** `ViewController` 的 `ViewDidLoad` 方法\n"
- fmt: '### Detecting Gesture Location


    To get the location of the touch, you use the `LocationInView` method of the gesture-recognizer
    class instance. This method is available for all gesture recognizers because it
    is implemented in the `UIGestureRecognizer` class, which all other gesture recognizers
    derive from. You can also track the location of the particular touches (fingers)
    doing the gesture with the `LocationOfTouch` method. Both methods return the `CGPoint`
    struct. Its `X` and `Y` properties store the geometrical location of the gesture
    (or particular finger) on the screen.


    In the Gestures app, I use the `LocationInView` method to check whether the pan
    gesture is performed on the purple square. As Listing [5-8](#A453659_1_En_5_Chapter.html#Par42)
    shows, I employ this method to implement another helper function, `IsTouchLocationWithinSquare`.
    The latter reads the touch location within the main view and then checks if it’s
    contained within the square. To that end, I use the `Contains` method of the `square.Frame`
    property. `Contains` calculates if the `X` and `Y` components of the location
    (`CGPoint` struct) are within the rectangle (`Frame` property) enclosing the purple
    square. If so, I can translate the square. Therefore, I modify the `TranslateSquare`
    method (Listing [5-6](#A453659_1_En_5_Chapter.html#Par36)) by first invoking `IsTouchLocationWithinSquare`.
    Then, if this method returns `true`, I create the translation transformation for
    the square (Listing [5-9](#A453659_1_En_5_Chapter.html#Par43)).


    ```

    private bool IsTouchLocationWithinSquare(

    UIPanGestureRecognizer panGestureRecognizer)

    {

    var location = panGestureRecognizer.LocationInView(View);

    return square.Frame.Contains(location.X, location.Y);

    }

    Listing 5-8.

    A View Is Translated Only When the Pan Gesture Is Performed Over the Square

    ```


    ```

    private void TranslateSquare(UIPanGestureRecognizer sender)

    {

    if (IsTouchLocationWithinSquare(sender))

    {

    var translation = sender.TranslationInView(View);

    square.Transform = CGAffineTransform.

    MakeTranslation(translation.X, translation.Y);

    }

    }

    Listing 5-9.

    The Purple Square Is Translated Only When the Gesture Location Is Within the Bounds
    of This Control

    ```


    If you now re-run the Gestures app, you will see that the square is translated
    only when you perform the pan gesture above this control. However, as you repeat
    this gesture, you will notice that a translation transformation of the purple
    square always has its origin at the center of the screen. This happens because
    the gesture recognizer calculates the shift made during a single gesture and does
    not take into account any translations made with previous gestures. To accurately
    translate the square, we would need to have the amount of the total translation
    accumulated during all gestures performed since the app was started. Therefore,
    we need to store the translation value after consecutive pan gestures have ended,
    and then add the resulting value to subsequent shifts. To implement such a functionality,
    I first supplement a definition of the `ViewController` with another private field,
    `lastTranslation` (of type `CGPoint`), and then modify the `TranslateSquare` method
    to store the amount of translation from when the gesture ended (Listing [5-10](#A453659_1_En_5_Chapter.html#Par45)).
    To tally the amount of translation done during the single pan gesture, I read
    the `x0` and `y0` properties of the `square.Transform` property. I store the resulting
    values in the `X` and `Y` components of the `lastTranslation` member and add them
    to the actual translation transformation. Hence, when you re-run the app, the
    purple square “remembers” its position from the previous pan gesture. Therefore,
    all subsequent pan gestures correctly translate the purple square.


    ```

    private CGPoint lastTranslation;

    private void TranslateSquare(UIPanGestureRecognizer sender)

    {

    if (IsTouchLocationWithinSquare(sender))

    {

    var translation = sender.TranslationInView(View);

    square.Transform = CGAffineTransform.MakeTranslation(

    translation.X + lastTranslation.X,

    translation.Y + lastTranslation.Y);

    }

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastTranslation.X = square.Transform.x0;

    lastTranslation.Y = square.Transform.y0;

    }

    }

    Listing 5-10.

    Accumulating the Translation of the Square

    ```


    ### Rotation and Pinch Gesture Recognizers


    Let’s now incorporate rotation and pinch gesture recognizers into the Gestures
    app so the purple square can be rotated and rescaled. The implementation of this
    sample requires several components. I will start with a method that combines a
    translation, rotation, and scaling into a single affine transformation. Then,
    I will tell you how to programmatically create the rotation and pinch gesture
    recognizers and enable simultaneous gesture recognition.'
