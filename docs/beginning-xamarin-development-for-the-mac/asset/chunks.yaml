- fmt: '`EmailCheck`函数使用了 .NET Framework 中的`Regex`类。该类用于执行正则表达式操作。特别地，我使用了`IsMatch`静态方法来检查正则表达式模式是否与给定字符串匹配。在[列表
    6-7](#A453659_1_En_6_Chapter.html#Par24) 中使用的模式可匹配任何包含字母和数字组合后跟`@`符号及域名的字符串。然后将此匹配结果与`Person.IsEmailValid`方法返回的值进行比较。由于后者使用了一种非常简单的电子邮件地址验证方式，因此该测试应失败。要验证这一点，我们需要运行已实现的测试方法。


    ```

    [Test]

    public void VerifyEmail()

    {

    // Arrange

    const string email = "dawid@";

    // Act

    var isValid = EmailCheck(email);

    // Assert

    Assert.AreEqual(isValid, Person.IsEmailValid(email));

    }

    private bool EmailCheck(string email)

    {

    const string emailPattern = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}";

    return Regex.IsMatch(email, emailPattern);

    }

    Listing 6-7.

    Validating Email Address

    ```


    ## 运行单元测试


    要运行单元测试，需将`Persons.Tests`应用设置为启动项目。为此，请使用解决方案资源管理器，右键单击`Persons.Tests`节点，然后从上下文菜单中选择“设为启动项目”选项（图
    [6-10](#A453659_1_En_6_Chapter.html#Fig10)）。接着通过“运行”菜单或按“调试目标”面板中的“播放”按钮来运行应用。片刻后，`Persons.Tests`应用或测试运行器将在模拟器中启动，外观类似于图
    [6-11](#A453659_1_En_6_Chapter.html#Fig11)。


    ![A453659_1_En_6_Fig10_HTML.jpg](A453659_1_En_6_Fig10_HTML.jpg)


    图 6-10. 将`Persons.Tests`设置为启动项目


    测试运行器将显示它所识别的测试方法的任何信息。现在，你可以通过单击“全部运行”按钮来运行所有这些单元测试，或者可以选择`Persons.Tests.exe`，然后选择`PersonsTests`。测试方法列表将出现，如图
    [6-3](#A453659_1_En_6_Chapter.html#Fig3) 所示。你可以通过单击相应的条目单独运行每个测试，或通过单击“全部运行”按钮一次性运行所有测试。片刻后，每个测试方法的结果将显示出来。我们看到只有一个测试方法（`VerifyEmail`）失败。


