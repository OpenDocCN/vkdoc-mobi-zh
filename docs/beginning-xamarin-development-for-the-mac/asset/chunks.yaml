  trans: "\n## 基本控件\n\n我们已经接触过几种基本控件，比如按钮、标签、文本字段和图像。在本节中，我将向你展示另外三种控件：开关、滑块和视图。更具体地说，我将讲解如何利用这些控件创建一个应用程序，如图\
    \ 3-1 所示。在这个应用中，当你改变滑块值时，橙色的方形视图会发生平移。平移方向取决于开关的状态——如果开关打开，方形会垂直平移；否则水平平移。因此，你还会学到如何动态改变任何控件的位置。\n\
    \n![A453659_1_En_3_Fig1_HTML.jpg](img/A453659_1_En_3_Fig1_HTML.jpg)\n\n图 3-1.\n\
    \n展示开关和滑块示例用法的应用程序界面\n\n为了实现图 3-1 所示的应用程序，我首先创建了一个新的单视图应用程序（兼容 iOS 9.0 及更高版本的通用应用），并将其命名为\
    \ `InputControls`。然后，我为主视图补充了四个控件：开关、标签、滑块和视图（你可以在工具箱中找到所有这些控件）。这些控件按照图 3-1 所示进行排列，其属性配置如下：\n\
    \n*   开关：\n    *   名称：`SwitchIsVertical`\n*   滑块：\n    *   名称：`SliderShift`\n\
    *   视图：\n    *   名称：`ViewMoveableSquare`\n    *   背景：橙色\n    *   宽度和高度（布局选项卡）：50\n\
    \n在界面设计完成后，我开始实现逻辑层。为此，我修改了 `ViewController` 类（`ViewController.cs`）的定义。我声明了一个私有成员\
    \ `initialSquareCenter`，并实现了四个辅助方法（列表 3-1 和列表 3-2）。列表 3-1 中的两个方法用于存储方块的初始位置，并在用户通过开关改变平移方向时将其复位。为了获取和更新方块的位置，我使用了\
    \ `View` 控件的 `Center` 属性。该属性的类型为 `CoreGraphics.CGPoint`，这是一个表示平面中点的结构体。要使用此类型，你需要在\
    \ `ViewController.cs` 文件的头部导入 `CoreGraphics` 命名空间：\n\n```\nusing CoreGraphics;\n\
    ```\n\n```\nprivate CGPoint initialSquareCenter;\nprivate void StoreSquareCenter()\n\
    {\ninitialSquareCenter = ViewMoveableSquare.Center;\n}\nprivate void RecenterSquare()\n\
    {\nViewMoveableSquare.Center = initialSquareCenter;\n}\n列表 3-1.\n管理可移动方块（橙色视图）的初始位置\n\
    ```\n\n另外两个辅助方法，如列表 3-2 所示，用于在实际可行的范围内平移方块。这个范围取决于设备屏幕的宽度（水平平移）或高度（垂直平移）（参见列表\
    \ 3-2 中的 `AdjustSliderRange` 方法）。我还将这个范围减去方块边长的一半，以确保方块始终在主视图中可见。为了平移方块，我将偏移值（从滑块值获取）加到初始方块位置的\
    \ X 或 Y 坐标上。这实际上改变了点的坐标，从而将方块向选定方向平移。如列表 3-2 所示，根据开关控件的状态，我将偏移值加到 `CGPoint`（使用\
    \ `initialSquareCenter` 实例化）的 X 或 Y 属性上。如果开关打开（`On` 属性为真），我就改变 Y 坐标。否则，我更新 X 坐标。\n\
    \n```\nprivate void AdjustSliderRange()\n{\nvar margin = ViewMoveableSquare.Frame.Width\
    \ / 2.0;\nvar range = SwitchIsVertical.On ? View.Frame.Height : View.Frame.Width;\n\
    var maxShiftValue = Convert.ToInt32(range / 2.0 - margin);\nSliderShift.MinValue\
    \ = -maxShiftValue;\nSliderShift.MaxValue = maxShiftValue;\nSliderShift.Value\
    \ = 0;\n}\nprivate void TranslateSquare()\n{\nvar newCenter = new CGPoint(initialSquareCenter);\n\
    if (!SwitchIsVertical.On)\n{\nnewCenter.X += SliderShift.Value;\n}\nelse\n{\n\
    newCenter.Y += SliderShift.Value;\n}\nViewMoveableSquare.Center = newCenter;\n\
    }\n列表 3-2.\n调整滑块范围\n```\n\n我在 `ViewDidLoad` 视图事件处理程序（列表 3-3）以及开关和滑块的 `ValueChanged`\
    \ 事件关联的两个事件处理程序（列表 3-4）中使用了上述辅助方法。我通过控制属性面板的“事件”选项卡创建了这些事件处理程序。`ViewDidLoad` 的默认定义被修改，以便在视图加载时存储方块的初始位置。当用户点击开关控件时，这会用于将方块复位到视图中心。当用户改变滑块值时，会调用列表\
    \ 3-4 中的第二个事件处理程序。该事件处理程序使用了列表 3-2 中展示的 `TranslateSquare` 方法。因此，当你运行该应用时，你将看到如图\
    \ 3-1 所示的结果。\n\n```\npublic override void ViewDidLoad()\n{\nbase.ViewDidLoad();\n\
    StoreSquareCenter();\nAdjustSliderRange();\n}\n列表 3-3.\n存储实际方块位置并调整滑块范围\n```\n\
    \n```\npartial void SwitchIsVertical_ValueChanged(UISwitch sender)\n{\nRecenterSquare();\n\
    AdjustSliderRange();\n}\npartial void SliderShift_ValueChanged(UISlider sender)\n\
    {\nTranslateSquare();\n}\n列表 3-4.\n方块位置由两个控件控制：开关和滑块\n```\n\n## 表格\n\n许多移动应用都致力于显示从网络服务获取的数据。为了以有条理的方式显示这些数据，你通常会使用表视图。在本节中，我将告诉你如何创建一个表格，该表格展示一系列颜色及其名称（图\
    \ 3-2）。然后，我们将修改表格的数据源，使用户能够删除和标记选中的项目，并能够通过 `UIAlertController` 获取关于颜色的详细信息。完成这个示例后，你将知道如何创建能够通过原生\
    \ iOS 界面响应用户请求的表格。\n\n![A453659_1_En_3_Fig2_HTML.jpg](img/A453659_1_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2.\n\n在表视图中显示的预定义 iOS 颜色列表\n"
- fmt: "### Displaying Items\n\nTo show how to use tables, I create a new single view\
    \ iOS project and set its name to `ColorsTable`. Then, I add a new folder, `Colors`,\
    \ in which I create three files: `Color.cs`, `ColorsHelper.cs`, and `ColorsTableSource.cs`.\
    \ Each of these will store a definition of the appropriate class. I start by implementing\
    \ the `Color` class, which is a helper object used to represent items in the table.\
    \ As Listing [3-5](#A453659_1_En_3_Chapter.html#Par23) shows, the `Color` class\
    \ has two public properties: `Name` and `Value`. `Name` stores a description of\
    \ the color, while `Value` stores the actual color, represented as an instance\
    \ of the `UIColor` class. `UIColor`, defined in the `UIKit` namespace, has a number\
    \ of public static properties with predefined iOS colors. To get this list, I\
    \ implement a `ColorsHelper` class (`ColorsHelper.cs` file), seen in Listing [3-6](#A453659_1_En_3_Chapter.html#Par25).\n\
    \n```\n\uFEFFusing UIKit;\nnamespace ColorsTable.Colors\n{\npublic class Color\n\
    {\npublic string Name { get; set; }\npublic UIColor Value { get; set; }\n}\n}\n\
    Listing 3-5.\nA Definition of the Color Class\n```\n\nThe `ColorsHelper` class\
    \ has only one public static method: `GetColors`. This method uses a C# reflection\
    \ mechanism to read any information about all the public, static properties of\
    \ the `UIColor` class. This information is represented as a collection of `PropertyInfo`\
    \ objects. Each object of this type is then used to obtain the property name by\
    \ simply reading the `Name` member and property value by invoking the `GetValue`\
    \ method of the `PropertyInfo` class instance. These values are then utilized\
    \ to create an instance of the `Color` class and add it to the resulting collection.\n\
    \n```\n\uFEFFusing System.Collections.Generic;\nusing System.Reflection;\nusing\
    \ UIKit;\nnamespace ColorsTable.Colors\n{\npublic static class ColorsHelper\n\
    {\npublic static List GetColors()\n{\nvar colors = new List();\nvar uiColorType\
    \ = typeof(UIColor);\nvar availableColors = uiColorType.GetProperties(\nBindingFlags.Public\
    \ | BindingFlags.Static);\nforeach (var color in availableColors)\n{\ncolors.Add(new\
    \ Color()\n{\nName = color.Name,\nValue = color.GetValue(uiColorType) as UIColor\n\
    });\n}\nreturn colors;\n}\n}\n}\nListing 3-6.\nA List of Predefined iOS Colors\
    \ Obtained with the C# Reflection Mechanism\n```\n\nGiven the list of colors,\
    \ I can now implement the collection of items for the Table View. To that end,\
    \ I create the `ColorsTableSource` class, as shown in Listing [3-7](#A453659_1_En_3_Chapter.html#Par33).\
    \ `ColorsTableSource` derives from the `UITableViewSource` and, because of that,\
    \ has to implement two methods: `RowsInSection` and `GetCell`. The first one is\
    \ used by the runtime to determine the number of rows in the current section of\
    \ the table. The second one is invoked whenever the runtime is about to draw a\
    \ cell for a particular row. Hence, in Listing [3-7](#A453659_1_En_3_Chapter.html#Par33),\
    \ I use this method to prepare a cell using `UITableViewCell`. This class represents\
    \ the visual appearance of the cell in a table. There are a few predefined cell\
    \ styles you can use. They are represented by the following values from the `UITableViewCellStyle`\
    \ enumeration (see Figure [3-3](#A453659_1_En_3_Chapter.html#Fig3)):\n\n![A453659_1_En_3_Fig3_HTML.jpg](A453659_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3. Predefined cell layouts: Default (top left), Value1 (top right),\
    \ Value2 (bottom left), and Subtitle\n\n* `Default` – specifies that a cell contains\
    \ a single, left-aligned text label and an optional image view\n* `Value1` – specifies\
    \ that a cell contains two labels: one that is left-aligned and the other that\
    \ is right-aligned. The first label displays text you specify by setting the `Text`\
    \ property of the `TextLabel` member of the `UITableView` class instance. To configure\
    \ a string displayed by the second label, you use the `Text` property of the `DetailTextLabel`.\n\
    * `Value2` – uses a similar layout as `Value1`, but the first label is right-aligned\
    \ while the second is left-aligned\n* `Subtitle` – in this case, the `DetailTextLabel`\
    \ is right below `TextLabel`, and both labels are left-aligned.\n\nTo optimize\
    \ performance, you typically reuse existing cells with the `DequeueReusableCell`\
    \ method of the `UITableView` class instance. This method accepts the cell identifier\
    \ and returns either a valid instance of the `UITableViewCell` or `null`. In the\
    \ second case, you need to create a new cell by invoking the `UITableViewCell`\
    \ constructor. In Listing [3-7](#A453659_1_En_3_Chapter.html#Par33), I use a default\
    \ cell style and set the cell identifier to that stored in the `cellId` constant.\
    \ Given the instance of the `UITableViewCell`, I configure its properties such\
    \ that the main label displays a color name while the minor label shows a string\
    \ representation of the `UIColor` class instance (type name and ARGB components).\
    \ Additionally, I change the foreground color of the main label to the color carried\
    \ by the `Value` property of the current item. The code from Listing [3-7](#A453659_1_En_3_Chapter.html#Par33)\
    \ depends upon the following namespaces, which you need to include in the `ColorsTableSource.cs`\
    \ file:\n\n```\n\uFEFFusing System;\nusing System.Collections.Generic;\nusing\
    \ Foundation;\nusing UIKit;\n```\n\n```\npublic class ColorsTableSource : UITableViewSource\n\
    {\nprivate const string cellId = \"ColorCell\";\npublic List Items { get; private\
    \ set; } = ColorsHelper.GetColors();\npublic override UITableViewCell GetCell(\n\
    UITableView tableView, NSIndexPath indexPath)\n{\n// Get item to display\nvar\
    \ item = Items[indexPath.Row];\n// Try to reuse a cell before creating the new\
    \ one\nvar cell = tableView.DequeueReusableCell(cellId)\n?? new UITableViewCell(UITableViewCellStyle.Default,\
    \ cellId);\n// Configure cell properties\ncell.TextLabel.Text = item.Name;\ncell.TextLabel.TextColor\
    \ = item.Value;\nif (cell.DetailTextLabel != null)\n{\ncell.DetailTextLabel.Text\
    \ = item.Value.ToString();\n}\nreturn cell;\n}\npublic override nint RowsInSection(UITableView\
    \ tableview, nint section)\n{\nreturn Items.Count;\n}\n}\nListing 3-7.\nA Collection\
    \ of Items for the UITableView\n```\n\nFinally, to display a table, I modify the\
    \ `ViewDidLoad` method of the `ViewController` class, as shown in Listing [3-8](#A453659_1_En_3_Chapter.html#Par37).\
    \ First, I instantiate the `UITableView` class such that it fills the whole view,\
    \ and then I set its `Source` property to the instance of the `ColorsTableViewSource`.\
    \ Last, I add a table to the view using the `Add` method of the `ViewController`\
    \ class. So, after running the app, you will get the results shown previously\
    \ in Figure [3-2](#A453659_1_En_3_Chapter.html#Fig2).\n\nNote that in this example\
    \ I created the control (`UITableView`) from the source code. I did not use a\
    \ visual designer to modify the storyboard. Naturally, you can use this option\
    \ to define the whole view. In specific cases, this can be faster than designing\
    \ a view with the storyboard. At the same time, you can create the `UITableView`\
    \ with a storyboard. In that case, you can manually draw the cell layout and refer\
    \ to underlying controls by their names.\n\nTo successfully compile the code from\
    \ Listing [3-8](#A453659_1_En_3_Chapter.html#Par37), we need to include the `ColorsTable.Colors`\
    \ namespace in `ViewController.cs` file. It is also a good point to stop for a\
    \ while, compile the app to ensure that everything is working correctly, and test\
    \ various cell styles.\n\n```\npublic override void ViewDidLoad()\n{\nbase.ViewDidLoad();\n\
    var table = new UITableView(View.Frame)\n{\nSource = new ColorsTableSource()\n\
    };\nAdd(table);\n}\nListing 3-8.\nCreating a Table\n```"
