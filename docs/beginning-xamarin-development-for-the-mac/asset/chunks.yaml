    ## Auto-Layout


    Creating adaptive views or auto-layout is one of the biggest challenges in mobile
    development. Controls of the adaptive view have to be automatically resized or
    rearranged to fit the available space when the view is resized or rotated. To
    design such an auto-layout, you utilize a platform-specific mechanism to automatically
    adjust the view layout to the device’s screen size.


    To formulate a problem to be tackled by the auto-layout, I use a direct example.
    To that end, I create a new single view, universal iOS app targeting iOS 9.0 and
    above. I set the app name to `AutoLayout` and then go to the iOS designer, where
