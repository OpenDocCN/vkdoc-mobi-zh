- fmt: '### User Interface


    To proceed further, let’s add the button to the view. You can do so by dragging
    the button control from the toolbox onto the view. You can then modify the visual
    appearance of the button using the `Properties` window after clicking the inserted
    control. As shown in Figure [1-19](#A453659_1_En_1_Chapter.html#Fig19), the content
    of the `Properties` window is partitioned into three tabs: `Widget`, `Layout`,
    and `Events`. You use the first tab to adjust the identity and visual appearance.
    The `Layout` tab allows you to specify the control’s dimensions and its arrangement
    with respect to other controls. The last tab, `Events`, displays the list of events
    fired by the specific control along with the methods associated with these events;
    i.e., event handlers.


    First, go to the `Widget` tab and change the `Name` property (`Identity` group)
    to `ButtonAlert` and `title` property (`Button` group) to `Hello, World!` Note
    that these changes are automatically reflected in the preview window. Specifically,
    you will see that the button title does not fit the control size. To resize the
    visual control, you can use the `Layout` tab of the `Properties` window or resize
    the control manually in the preview window. I resized the button using the first
    option. Hence, in the `Layout` tab, I set the button width to 100, leaving other
    parameters (like `X`, `Y`, height, and arrangement) unchanged. After changing
    the button size, the internal text becomes fully visible. However, the button
    is not in the center of the view anymore. To put it back to the center you can
    press the first button in the `Position in Parent` option of the `Arrange` section
    (see right part of Figure [1-19](#A453659_1_En_1_Chapter.html#Fig19)).


    ![A453659_1_En_1_Fig19_HTML.jpg](A453659_1_En_1_Fig19_HTML.jpg)


    Figure 1-19.

    `Widget` (left) and `Layout` tabs of button-control properties


    With the button adjusted we can create the first event handler, which will display
    the message to the user. You can do so in two ways. The easiest one is to double-click
    the button in preview mode. This will switch the view to display the contents
    of `ViewController.cs`. Additionally, a small popup window titled “Add event handler”
    appears. As shown in Figure [1-20](#A453659_1_En_1_Chapter.html#Fig20), you can
    use the arrow keys to specify the location it should go in the source-code file,
    and Visual Studio will insert a definition of the default event handler. I placed
    this event handler below the previous method, `DidReceiveMemoryWarning`. So, my
    `ViewController.cs` looks as shown in Listing [1-1](#A453659_1_En_1_Chapter.html#Par29).


    ![A453659_1_En_1_Fig20_HTML.jpg](A453659_1_En_1_Fig20_HTML.jpg)


    Figure 1-20.

    Adding an event handler


    ```

    public partial class ViewController : UIViewController

    {

    // Other methods are shown in Figure 1-20.

    partial void ButtonAlert_TouchUpInside(UIButton sender)

    {

    throw new NotImplementedException();

    }

    }

    Listing 1-1.

    A Default ViewController Class Supplemented by TouchUpInside Event Handler

    ```


    As you see in Listing [1-1](#A453659_1_En_1_Chapter.html#Par29), this new event
    handler is associated with the `TouchUpInside` event (also see Figure [1-21](#A453659_1_En_1_Chapter.html#Fig21)).


    The alternative way of adding an event handler is through the `Events` tab of
    the `Properties` window. You would only need to type the name of the event handler
    and press Enter. It is also important to note that, once you create an event handler,
    it can be associated with other events. To this end, use the drop-down list, which
    is populated by available event handlers (Figure [1-21](#A453659_1_En_1_Chapter.html#Fig21)).


    When you double-click a control in preview mode, Visual Studio automatically creates
    the event handler, depending on the control type. This event handler is called
    “default event handler” because it is related to the common usage of a particular
    control. In the case of a button, the default event handler is `Up Inside`. I
    will show you more examples of event handlers in Chapter [3](#A453659_1_En_3_Chapter.html).


    ![A453659_1_En_1_Fig21_HTML.jpg](A453659_1_En_1_Fig21_HTML.jpg)


    Figure 1-21.

    `Events` tab of button properties. Note that the `ButtonAlert_TouchUpInside` event
    handler can be also associated with `Up Outside` event.'
