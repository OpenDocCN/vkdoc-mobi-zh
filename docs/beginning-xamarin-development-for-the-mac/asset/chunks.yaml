    The communication between my watch extension bundle and the ClockKit is ready.
    So, now I need to implement a logic that will force complication updates. To that
    end, I use another class from the ClockKit, `CLKComplicationServer`. An instance
    of this class represents the complication server, which manages the complications
    and in particular can be used to update them on demand. To implement complication
    updates in the HelloWatchKit.WatchExtension, I add a `ComplicationHelper.cs` file,
    where I import the `ClockKit` namespace and then define the `ComplicationHelper`
    class , as shown in Listing [8-21](#A453659_1_En_8_Chapter.html#Par113).


