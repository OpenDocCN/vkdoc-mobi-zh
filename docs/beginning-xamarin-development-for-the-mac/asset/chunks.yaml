    清单 6-4. `PersonTests`类的声明


    `PersonTests.cs`文件中给出的默认测试并没有实现任何有用的功能，但它们确实展示了如何定义一个测试方法。也就是说，这样的方法必须是测试类的一个公开函数。此外，一个测试方法不返回任何值，并且需要使用`TestAttribute`进行装饰。任何符合这些要求的方法都会被`TouchRunner`看到并显示在其
    UI 中。


    为了定义实际的测试，我首先导入了两个额外的命名空间：`Persons.Common.Models`和`System.Text.RegularExpressions`，然后将`PersonTests`类的默认定义替换为三个测试方法：`VerifyPublicProperties`、`VerifyFullName`和`VerifyEmail`。第一个测试方法`VerifyPublicProperties`出现在清单
    6-5 中。此方法以及任何其他测试方法的通用结构都包含三个界限清晰的代码块：准备（arrange）、执行（act）和断言（assert）。在后续的清单中，每个代码块都用适当的注释进行了标记。在准备块中，你通常为测试准备输入数据。因此，在清单
    6-5 中，我声明了四个常量，这些常量随后在执行块中用于调用被测试的逻辑。在这里，我验证了`Person`类的公共属性设置器。因此，我使用默认构造函数实例化了该类，然后将其公共属性的值设置为先前声明的常量。接着，在断言块中，我验证`Person`类实例的公共属性是否确实具有预期的值。


    为了验证被测试的值，你需要使用`NUnit.Framework.Assert`类的静态方法。如果你之前使用过 Windows 版 Visual Studio，你可能已经知道来自`Microsoft.VisualStudio.TestPlatform.UnitTestFramework`包的`Assert`类。这两个类的工作方式相似，并暴露了类似的功能。具体来说，我在清单
    6-5 中使用的`AreEqual`方法会比较两个变量，并且只要这些变量的值不同，就会引发一个`NUnit.Framework.AssertionException`类型的异常。此外，你还可以定义当此断言被触发时显示的消息。在清单
    6-5 中，我独立验证了`Person`类实例的每个公共属性，因此每个断言都有不同的消息。


    ```

    [Test]

    public void VerifyPublicProperties()

    {

    // Arrange

    const string expectedFirstName = "Dawid";

    const string expectedLastName = "Borycki";

    const string expectedEmail = "dawid@borycki.com.pl";

    const int expectedAge = 34;

    // Act

    var person = new Person()

    {

    FirstName = expectedFirstName,

    LastName = expectedLastName,

    Email = expectedEmail,

    Age = expectedAge

    };

    // Assert

    Assert.AreEqual(expectedFirstName, person.FirstName,

    "Incorrect first name");

    Assert.AreEqual(expectedLastName, person.LastName,

    "Incorrect last name");

    Assert.AreEqual(expectedEmail, person.Email,

    "Incorrect e-mail");

    Assert.AreEqual(expectedAge, person.Age,

    "Incorrect age");

    }

    ```

