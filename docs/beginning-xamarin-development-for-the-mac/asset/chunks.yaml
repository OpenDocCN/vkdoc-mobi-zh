    ## 总结


    在本章中，我们准备了一个开发环境，该环境将在后续章节中使用。然后，我们讨论了用于创建 iOS 应用的可用项目模板，并实现了我们的第一个单视图 HelloWorld
    应用，该应用展示了各种警告框。在下一章中，我们将利用此处开发的源代码来分析应用结构，并讨论每个 Xamarin.iOS 应用最重要的元素。


    # 2. 应用结构与生命周期


    在本章中，你将了解应用最重要的元素及其之间的关系。我们将首先探讨应用入口点以及 Xamarin.iOS 如何与原生 iOS SDK 交互。随后，我们将了解应用和视图生命周期、应用能力的声明以及访问故事板的属性。此外，我们还将分析在苹果平台编程中使用的模型-视图-控制器设计模式。最后，我们将把视图生命周期与
    MVC 模式结合起来，以在设备内存中存储数据。


    ## 入口点


    HelloWorld 应用与任何其他 C# 应用一样，从 `Application` 类的静态 `Main` 方法开始执行。无论你是在创建控制台应用、通用
    Windows 平台应用、ASP.NET Web 应用程序，还是 .NET Core 或 Xamarin.iOS 应用，这一点都适用。所有这些应用都使用 `Application.Main`
    方法作为入口点。然而，此方法的具体实现在这些应用类型之间有所不同。对于 Xamarin.iOS，`Main` 方法的实现是针对 iOS 平台量身定制的。更具体地说，如代码清单
    2-1 所示，`Application.Main` 方法调用了 `UIApplication` 类中同名的方法。`UIApplication` 类封装了 Xamarin.iOS
    应用的主要处理循环。与所有其他具有图形用户界面的应用一样，此处理循环处理与应用生命周期相关的事件（激活、前后台切换）、由用户触发的事件（如触摸、输入数据、切换视图）或由操作系统触发的事件（系统重启、内存警告）。


    重要的是，每个 iOS 应用只创建一个 `UIApplication` 类或其子类的实例。在内部，`UIApplication` 类使用另一个实现了 `UIApplicationDelegate`
    接口的类。后者专门用于处理应用生命周期。因此，来自代码清单 2-1 的 `Main` 方法除了接受命令行参数（`args`，即字符串数组）外，还接受另外两个参数：`principalClassName`
    和 `delegateClassName`。第一个参数指定了从 `UIApplication` 派生的类的名称。如果你想使用默认的 `UIApplication`
    类，则为 `principalClassName` 传递 `null`。第二个参数 `delegateClassName` 允许你指定实现了 `UIApplicationDelegate`
    的类的名称。默认情况下，`delegateClassName` 被设置为 `AppDelegate`。你将在本章后面了解这个类，因为它是 HelloWorld
    以及任何其他 Xamarin.iOS 项目的一部分。


    ```

    namespace HelloWorld

    {

    public class Application

    {

    static void Main(string[] args)

    {

    UIApplication.Main(args, null, "AppDelegate");

    }

    }

    }

    代码清单 2-1.

    Xamarin.iOS 应用的入口点

    ```


    为了解释处理循环封装的含义，让我们分析一下 Xamarin.iOS 的源代码，该代码可在此处获得：[`http://bit.ly/xamarin_ios_code`](http://bit.ly/xamarin_ios_code)。这一分析也有助于我们更好地理解
    Xamarin.iOS 究竟是什么。具体来说，`UIApplicationClass` 的定义（[`http://bit.ly/UiApplication`](http://bit.ly/UiApplication)）显示，其
    `Main` 方法（代码清单 2-2）在获取 principal 和 delegate 类名称的句柄后，调用了 `Main` 方法的另一个版本。后者，如代码清单
    2-3 所示，首先调用 `Initialize` 方法。此方法配置了线程同步上下文，用于通过 UI 线程更新控件。然后，`Main` 方法调用了 `UIApplicationMain`
    函数，该函数在一个外部的 Objective-C 库中声明。这个库来自 iOS SDK。现在你可以看到，Xamarin.iOS 最简单的定义就是一组 C#
    绑定，这些绑定通过 Objective-C 库暴露了原生 iOS SDK。因此，Xamarin.iOS 允许你开发原生应用，并拥有对该平台 SDK 的完全访问权限。正因如此，Xamarin
    应用被称为原生移动应用。

