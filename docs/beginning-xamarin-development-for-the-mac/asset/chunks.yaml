  raw: '## Presenting the Weather


    We now have everything prepared to get and display the weather conditions, so
    let’s combine the UI layer with the `WeatherServiceHelper`. To achieve this functionality,
    I implement the `ViewController` class. First, I define the `DisplayWeatherInfo`
    method, shown in Listing [9-10](#A453659_1_En_9_Chapter.html#Par67). This method
    takes an instance of the `WeatherInfo` class (`weatherInfo` argument) and displays
    the values of its selected properties in the default view. It is also possible
    to pass a `null` for the `weatherInfo` argument. In such cases, `DisplayWeatherInfo`
    displays alternate symbols (`--`) instead of the actual values of the temperature,
    humidity, pressure, and description.


    ```

    private async Task DisplayWeatherInfo(WeatherInfo weatherInfo)

    {

    var alternateSymbol = "--";

    var tempUnit = WeatherServiceHelper.GetTemperatureUnitString(

    temperatureUnit);

    var pressureUnit = "hPa";

    if(weatherInfo == null)

    {

    LabelTemperature.Text = $"Temperature: {alternateSymbol}";

    LabelHumidity.Text = $"Humidity: {alternateSymbol}";

    LabelPressure.Text = $"Pressure: {alternateSymbol}";

    LabelDescription.Text = $"Description: {alternateSymbol}";

    }

    else

    {

    LabelTemperature.Text = "Temperature: "

    + $"{weatherInfo.Main.Temp} {tempUnit}";

    LabelHumidity.Text = "Humidity: "

    + $"{weatherInfo.Main.Humidity} %";

    LabelPressure.Text = "Pressure: "

    + $"{weatherInfo.Main.Pressure} {pressureUnit}";

    LabelDescription.Text = "Description: "

    + $"{weatherInfo.Weather.FirstOrDefault().Description}";

    ImageViewWeatherIcon.Image = await IconHelper.GetIcon(weatherInfo);

    }

    }

    Listing 9-10.

    Displaying Weather Conditions

    ```


    Displaying text in labels is straightforward. I just rewrite the properties of
    the `WeatherInfo` class instance to the `Text` property of the label. To display
    an icon, a little bit more effort is necessary. The OpenWeatherMap API returns
    icon identifiers, which you can use to get the URLs of the actual bitmaps in PNG
    format. The general structure of such a URL is the following:


    [`http://openweathermap.org/img/w/` `<iconId>` `.png`](http://openweathermap.org/img/w/%3CiconId%3E.png)


    where the `<iconId>` is the value you obtain when you request that the OpenWeatherMap
    API provides the current weather conditions for the selected city. The icon identifier
    is stored in the `Icon` property of the `Weather` object.


    Once given the icon URL, I must download the icon and then convert it to an instance
    of the `UIImage` class so it can be displayed in the Image View control. To implement
    such a functionality, I add to the HelloTV project the `IconHelper` class (see
    `IconHelper.cs` file under the `Helpers` folder). A full definition of the `IconHelper`
    class appears in Listing [9-11](#A453659_1_En_9_Chapter.html#Par72). As shown
    there, the `IconHelper` has three private static fields: `httpClient`, `baseAddress`,
    and `iconExtension`. The first one stores a reference to the `HttpClient` class
    instance, which is used to actually download a byte array representing the bitmap
    from the OpenWeatherMap service. The second one, `baseAddress`, stores the main
    part of the URL from which the icons are retrieved, and the last one, `iconExtension`,
    is a constant storing the `.png` extension. The values retrieved from `baseAddress`
    and `iconExtension`—along with the icon identifier obtained from the `WeatherInfo`
    class instance—are combined into the final URL (see the `GetIconUrl` method in
    Listing [9-11](#A453659_1_En_9_Chapter.html#Par72)). The resulting URL is then
    used in the `GetIcon` method, where I pass that URL as an argument of the `GetByteArrayAsync`
    method of the `HttpClient` class instance. `GetByteArrayAsync` returns an array
    of bytes representing the image data, which I use to instantiate the `UIImage`
    class with the `LoadFromData` static method (last statement of the `GetIcon` method
    in Listing [9-11](#A453659_1_En_9_Chapter.html#Par72)). Note that to convert an
    array of bytes returned by the `GetByteArrayAsync` to an `NSData` object accepted
    by `UIImage.LoadFromData`, I must use the `FromArray` static method of the `NSData`
    class.


    ```

    public static class IconHelper

    {

    private static HttpClient httpClient;

    private static string baseAddress = "http://openweathermap.org/img/w/";

    private static string iconExtension = ".png";

    static IconHelper()

    {

    httpClient = new HttpClient();

    }

    public static async Task GetIcon(WeatherInfo weatherInfo)

    {

    var iconUrl = GetIconUrl(weatherInfo);

    var imageData = await httpClient.GetByteArrayAsync(iconUrl);

    return UIImage.LoadFromData(NSData.FromArray(imageData));

    }

    private static string GetIconUrl(WeatherInfo weatherInfo)

    {

    var iconName = weatherInfo.Weather.FirstOrDefault().Icon;

    return $"{baseAddress}{iconName}{iconExtension}";

    }

    }

    Listing 9-11.

    Definition of the IconHelper Class

    ```


    Afterward, I invoke `DisplayWeatherInfo` with a `null` argument within the `ViewDidLoad`
    event handler (Listing [9-12](#A453659_1_En_9_Chapter.html#Par74)). This is done
    to set the `Text` properties of all labels to initial values. In the `ViewDidLoad`
    event handler, I also wire the `ButtonGetCurrentWeather_PrimaryActionTriggered`
    method with the `PrimaryActionTriggered` event of the button. This action is raised
    when the user taps the button.


    ```

    public async override void ViewDidLoad()

    {

    base.ViewDidLoad();

    await DisplayWeatherInfo(null);

    ButtonGetCurrentWeather.PrimaryActionTriggered

    += ButtonGetCurrentWeather_PrimaryActionTriggered;

    }

    Listing 9-12.

    Configuring a View

    ```


    Listing [9-13](#A453659_1_En_9_Chapter.html#Par76) shows a definition of the `ButtonGetCurrentWeather_PrimaryActionTriggered`
    method . This function works as follows. When the user taps the button, I first
    read the city name that he or she entered into the text field. If the city name
    is empty, I display the modal window with the following message, Please enter
    the city name. To display an alert, I wrote the `DisplayOkAlert` method. As Listing
    [9-14](#A453659_1_En_9_Chapter.html#Par77) shows, this method employs the same
    classes (`UIAlrtController` and `UIAlertAction`) as we used previously to display
    alerts in iOS apps. However, the alert window looks different (see Figure [9-5](#A453659_1_En_9_Chapter.html#Fig5)).


    ![A453659_1_En_9_Fig5_HTML.jpg](A453659_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    Although tvOS uses the same classes to display alerts as iOS, appropriate tvOS
    windows look differently (refer back to Chapter [1](#A453659_1_En_1_Chapter.html)).


    ```

    private TemperatureUnit temperatureUnit = TemperatureUnit.Metric;

    private async void ButtonGetCurrentWeather_PrimaryActionTriggered(

    object sender, EventArgs e)

    {

    var cityName = TextFieldCityName.Text;

    if(string.IsNullOrEmpty(cityName))

    {

    DisplayOkAlert("Please enter the city name");

    }

    else

    {

    try

    {

    var weatherInfo = await WeatherServiceHelper.GetWeatherInfo(

    cityName, temperatureUnit);

    await DisplayWeatherInfo(weatherInfo);

    }

    catch(Exception ex)

    {

    DisplayOkAlert(ex.Message);

    }

    }

    }

    Listing 9-13.

    Retrieving and Displaying Weather Conditions

    ```


    ```

    private void DisplayOkAlert(string message)

    {

    var controller = UIAlertController.Create(

    "HelloTV", message, UIAlertControllerStyle.Alert);

    var okAction = UIAlertAction.Create(

    "OK", UIAlertActionStyle.Default, null);

    controller.AddAction(okAction);

    PresentViewController(controller, true, null);

    }

