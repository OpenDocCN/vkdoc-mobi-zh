    ## Figure 3-17. Creating a Spacing Constraint


    As Figure [3-19](#A453659_1_En_3_Chapter.html#Fig19) shows, the list of constraints
    is displayed under the group of the same name. In this case, I have four constraints,
    as follows:


    - `Trailing Space to: Superview, equal to: 10` – specifies the right margin between
    text field and a superview

    - `Top Space to: Superview, equal to: 116` – specifies a top margin between text
    field and a superview

    - `Leading Margin Space to: Superview, equal to: 6` – this constraint specifies
    a left margin between text field and a superview, the view in which text field
    is embedded

    - `Width equal to 355` – specifies width of the text field. This constraint was
    generated to reflect the initial width we set at the beginning of implementation.


    Note that each entry of the constraints group has a small icon that graphically
    represents a constraint (on the left), and also a settings drop-down list (on
    the right). You use the latter to either delete or edit the constraint. Deleting
    a constraint does not warrant additional comment, unlike the edit mode. Once in
    the editing mode (right part of Figure [3-19](#A453659_1_En_3_Chapter.html#Fig19)),
    you can modify the multiplier and constant of the constraint. These values are
    used by the runtime to resize a control according to the mathematical formula:
    `[attribute of the first item] = [attribute of the second item] × Multiplier +
    Constant`. You can change this equality to an inequality with a `Relation` drop-down
    list. This has three available options: `Equal` (=), `LessThanOrEqual` (<=), and
    `GreaterThanOrEqual` (>=).


    I can now modify the `Leading Margin Space` to 10 and `Top Space` to 60 px, respectively.
    Also, the last constraint (`Width Equal to 355 px`) will cause conflicts when
    the screen size changes since the layout mechanism cannot satisfy this constraint.
    Therefore, I remove this constraint. All remaining constraints ensure that a text
    field will have a fixed margin. So, when the screen size changes, the width of
    the text field will be updated as follows: `[width of the text field] = [width
    of the view] – 2 × 10`. Let’s check this and change the preview to smaller (iPhone
    5[S]) and larger (iPhone 6 Plus) devices. In both cases, the text field fits the
    view as in the case of iPhone 6 because it is auto-layouted.


    ## Size Classes


    Although the text field of the `AutoLayout` app adjusts to the screen width, it
    will disappear when you change the preview to iPad or switch the device orientation
    from portrait to landscape. This is because portrait orientation uses a different
    size class than landscape uses. Figure [3-20](#A453659_1_En_3_Chapter.html#Fig20)
    shows that iPhone 5[S] in portrait mode utilizes a `wCompacthRegular` size class,
    contrary to the `wCompacthCompact` class used in landscape mode.


    ![A453659_1_En_3_Fig20_HTML.jpg](A453659_1_En_3_Fig20_HTML.jpg)


    ## Figure 3-20. Size Classes for Various Orientations of iPhone 5S


    A size class specifies the group of devices and their orientation for which the
    available view sizes have a similar width and height. There are three different
    classes for width (`w`) and height (`h`):


    - **Any** – a group of devices with screens of arbitrary width or height. This
    is the most general group, covering all devices.

    - **Regular** – represents devices of regular screen sizes

    - **Compact** – represents devices with compact screens


    Accordingly, you can arrange 3 × 3 combinations of these classes, resulting in
    nine size classes total, which are summarized in Table [3-1](#A453659_1_En_3_Chapter.html#Tab1).
    To see how devices are categorized into size classes, click the class name, located
    to the left of the `View As` drop-down list. A small popup window appears. This
    window is partitioned into a 3 × 3 grid. By moving a pointer within this grid,
    various cells are highlighted, describing the size class. Its description and
    covered devices are then displayed in the bottom (Figure [3-21](#A453659_1_En_3_Chapter.html#Fig21)).


    ![A453659_1_En_3_Fig21_HTML.jpg](A453659_1_En_3_Fig21_HTML.jpg)


    ## Figure 3-21. A Grid Showing Size Class Along with Its Short Description


    ## Table 3-1. Size Classes for iOS Apps


    | Width/Height | Any | Regular | Compact |

    | --- | --- | --- | --- |

    | Any | `wAnyhAny` | `wAnyhR` | `wAnyhC` |

    | Regular | `wRhAny` | `wRhR` | `wRhC` |

    | Compact | `wChAny` | `wChR` | `wChC` |


    When you use iOS designer to design a view, the controls you add are implicitly
    associated with the actual size class. So, when you change the size class, these
    controls do not appear. The only exception is the `wAnyhAny` class, which is associated
    with the `Generic` device from the `View As` drop-down list. In this case, the
    layout you define will work the same for every device and orientation.


    You may wonder why you need size classes. The simplest answer is that they allow
    you to easily design adaptive views. For instance, the layout I use in the `AutoLayout`
    app works perfectly for portrait mode. The label is above the text field, so the
    user can easily modify the text. However, when the device orientation is changed
    to landscape, the text field would be resized to fit the available width, but
    this will not look natural. Instead, it would be more efficient to change the
    layout and place the label to the left of the text field. By doing so you will
    save the vertical space for other controls and use the available space more efficiently.


    Let’s see how to implement such a dynamic change of control arrangement. I start
    by installing the `wChC` class for the text field and the label. To this end,
    I use the `Properties` window, in which the list of installed size classes is
    located right below the `Height` property (Figure [3-22](#A453659_1_En_3_Chapter.html#Fig22)).
    Then, I click the `Settings` drop-down list and choose the **Compact** ➤ **Compact**
    option from the context menu. The first specifies the width group, while the second
    corresponds to the height group.


    ![A453659_1_En_3_Fig22_HTML.jpg](A453659_1_En_3_Fig22_HTML.jpg)


    ## Figure 3-22. Installing the wChC Size Class


    Given the new size classes are installed, I can switch the preview mode to landscape.
    The controls become visible. However, the width of the text field does not change,
    because constraints I defined previously work for the `wChR` size class only.
    I need to specify new constraints for the `wChC` size class. I can also arbitrarily
    rearrange controls. So, I first place the text field next to the label. Then,
    analogously as for the `wChR` size class, I use a T-shaped icons to define three
    constraints between the text field and the superview (parent view) such that the
    left, top, and right margins are fixed to 100, 32, and 10 px, respectively. You
    add these constraints analogously as previously, with the only difference being
    that now you need to drag the left T-shape to the text field. After defining new
    constraints for the `wChC` size class, I re-run the `AutoLayout` app, and its
    view now depends on the screen orientation (Figure [3-23](#A453659_1_En_3_Chapter.html#Fig23)).


    ![A453659_1_En_3_Fig23_HTML.jpg](A453659_1_En_3_Fig23_HTML.jpg)


    ## Figure 3-23. AutoLayout, When Combined with the Size Classes, Allows You to
    Design Adaptive Views in Which the Controls Are Resized and Rearranged According
    to Screen-Size Orientation: Portrait (Top) and Landscape (Bottom)'
