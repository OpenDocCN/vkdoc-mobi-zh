- fmt: "# Creating a Model to Test\n\nI start by implementing a `Persons.Common` shared\
    \ library, which I create with the .NET Standard Library project template (Figure\
    \ [6-5](#A453659_1_En_6_Chapter.html#Fig5)). Within this project, I make a new\
    \ folder, `Models`, in which I save a `Person.cs` file with a definition of the\
    \ `Person` class given in Listing [6-1](#A453659_1_En_6_Chapter.html#Par5). This\
    \ class has four public properties, three of which are of type `string`. They\
    \ store first and last name and an email address. The last property, `Age`, is\
    \ of the integral (`int`) type and is used to store the age of the given person.\
    \ Additionally, a `Person` class defines two public methods. The first, `FullName()`,\
    \ returns a first and last name combined into one string. The second method, `IsEmailValid()`,\
    \ implements a very simple verification of the email address. This method only\
    \ checks whether the given string contains the `@` symbol. Of course, this algorithm\
    \ is too primitive to effectively validate an email address. However, it will\
    \ be the goal of one of our unit tests to find this issue.\n\n![A453659_1_En_6_Fig5_HTML.jpg](A453659_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5. Creating a shared library\n\n```\npublic class Person\n{\n    public\
    \ string FirstName { get; set; }\n    public string LastName { get; set; }\n \
    \   public string Email { get; set; }\n    public int Age { get; set; }\n    public\
    \ string FullName()\n    {\n        return $\"{FirstName} {LastName}\";\n    }\n\
    \    public static bool IsEmailValid(string email)\n    {\n        return email.Contains(\"\
    @\");\n    }\n}\n```\n\nListing 6-1. A Definition of the Model to Be Tested\n\n\
    # Implementing Unit Tests\n\nGiven the model to test, we can implement actual\
    \ unit tests that verify its functionality. To that end, I create another project\
    \ named `Persons.Tests` using a Unit Test App project template. The location of\
    \ this template in the New Project dialog is shown in Figure [6-6](#A453659_1_En_6_Chapter.html#Fig6).\
    \ Then, I configure the unit test app in the same way as I would any other iOS\
    \ app (see Figure [6-7](#A453659_1_En_6_Chapter.html#Fig7)). More specifically,\
    \ I make this app universal so it is compatible with iPhones and iPads, and then\
    \ I set the target version to iOS 9.0. Finally, I choose a location for my project\
    \ and create it.\n\n![A453659_1_En_6_Fig7_HTML.jpg](A453659_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7. Configuring `Persons.Tests` unit test app\n\n![A453659_1_En_6_Fig6_HTML.jpg](A453659_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6. Creating the unit test app project\n\nAfter creating the unit test\
    \ app, you will see that its structure is the same as that of a typical iOS app.\
    \ In particular, as Listing [6-2](#A453659_1_En_6_Chapter.html#Par8) shows, this\
    \ app has a standard `Main` method that starts the UI of the app with the `UnitTestAppDelegate`\
    \ class.\n\n```\npublic class Application\n{\n    static void Main(string[] args)\n\
    \    {\n        UIApplication.Main(args, null, \"UnitTestAppDelegate\");\n   \
    \ }\n}\n```\n\nListing 6-2. The Entry Point of the Unit Test App\n\nListing [6-3](#A453659_1_En_6_Chapter.html#Par10)\
    \ features a definition of the `UnitTestAppDelegate` class. As the “standard”\
    \ `AppDelegate` class, `UnitTestAppDelegate` derives from `UIApplicationDelegate`.\
    \ However, contrary to a typical `AppDelegate` like those we have used so far,\
    \ `UnitTestAppDelegate` explicitly implements the `FinishedLaunching` app event\
    \ handler. This is because the `Persons.Tests` app does not have a main storyboard,\
    \ which is what sets the initial view controller. Instead, this is done programmatically\
    \ by instantiating the `UIWindow` object, setting its `RootViewController` property,\
    \ and making the window visible by invoking the `MakeKeyAndVisible` method of\
    \ the `UIWindow` class instance. We see that the root view controller is created\
    \ using a `TouchRunner` class. This class is provided by the NUnit testing framework\
    \ and provides the UI, which is then used to execute the unit tests (refer back\
    \ to Figure [6-3](#A453659_1_En_6_Chapter.html#Fig3)).\n\n```\n[Register(\"UnitTestAppDelegate\"\
    )]\npublic partial class UnitTestAppDelegate : UIApplicationDelegate\n{\n    UIWindow\
    \ window;\n    TouchRunner runner;\n\n    public override bool FinishedLaunching(\n\
    \        UIApplication app, NSDictionary options)\n    {\n        // create a\
    \ new window instance based on the screen size\n        window = new UIWindow(UIScreen.MainScreen.Bounds);\n\
    \        runner = new TouchRunner(window);\n        // register every test included\
    \ in the main application/assembly\n        runner.Add(System.Reflection.Assembly.GetExecutingAssembly());\n\
    \        window.RootViewController = new UINavigationController(\n           \
    \ runner.GetViewController());\n        // make the window visible\n        window.MakeKeyAndVisible();\n\
    \        return true;\n    }\n}\n```\n\nListing 6-3. A Full Definition of the\
    \ `UnitTestAppDelegate`\n\nBefore we can test the model, we need to configure\
    \ references. Note that the `Person` class is defined in a separate project with\
    \ respect to `Persons.Tests`, so the latter has to reference the `Persons.Common`\
    \ library. To configure this reference, you use the Reference Manager (Figure\
    \ [6-8](#A453659_1_En_6_Chapter.html#Fig8)). To open this window, you go to Solution\
    \ Explorer, navigate to the `Persons.Tests` project, and then use the “Edit References…”\
    \ option from the context menu of the References node. Once in Reference Manager,\
    \ you go to the Projects tab and select the `Persons.Common` project as shown\
    \ in Figure [6-8](#A453659_1_En_6_Chapter.html#Fig8). The `Person` class can now\
    \ be used inside `Persons.Tests`.\n\n![A453659_1_En_6_Fig8_HTML.jpg](A453659_1_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8. Reference Manager showing the `Persons.Tests` project"
  raw: '## Creating a Model to Test


    I start by implementing a Persons.Common shared library, which I create with the
    .NET Standard Library project template (Figure [6-5](#A453659_1_En_6_Chapter.html#Fig5)).
    Within this project, I make a new folder, `Models`, in which I save a `Person.cs`
    file with a definition of the `Person` class given in Listing [6-1](#A453659_1_En_6_Chapter.html#Par5).
    This class has four public properties, three of which are of type `string`. They
    store first and last name and an email address. The last property, `Age`, is of
    the integral (`int`) type and is used to store the age of the given person. Additionally,
    a `Person` class defines two public methods. The first, `FullName`, returns a
    first and last name combined into one string. The second method, `IsEmailValid`,
    implements a very simple verification of the email address. This method only checks
    whether the given string contains the `@` symbol. Of course, this algorithm is
    too primitive to effectively validate an email address. However, it will be the
    goal of one of our unit tests to find this issue.


    ![A453659_1_En_6_Fig5_HTML.jpg](A453659_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    Creating a shared library


    ```

    public class Person

    {

    public string FirstName { get; set; }

    public string LastName { get; set; }

    public string Email { get; set; }

    public int Age { get; set; }

    public string FullName()

    {

    return $"{FirstName} {LastName}";

    }

    public static bool IsEmailValid(string email)

    {

    return email.Contains("@");

    }

    }

    Listing 6-1.

    A Definition of the Model to Be Tested

    ```


    ## Implementing Unit Tests


    Given the model to test, we can implement actual unit tests that verify its functionality.
    To that end, I create another project named Persons.Tests using a Unit Test App
    project template. The location of this template in the New Project dialog is shown
    in Figure [6-6](#A453659_1_En_6_Chapter.html#Fig6). Then, I configure the unit
    test app in the same way as I would any other iOS app (see Figure [6-7](#A453659_1_En_6_Chapter.html#Fig7)).
    More specifically, I make this app universal so it is compatible with iPhones
    and iPads, and then I set the target version to iOS 9.0\. Finally, I choose a
    location for my project and create it.


    ![A453659_1_En_6_Fig7_HTML.jpg](A453659_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Configuring Persons.Tests unit test app


    ![A453659_1_En_6_Fig6_HTML.jpg](A453659_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Creating the unit test app project


    After creating the unit test app, you will see that its structure is the same
    as that of a typical iOS app. In particular, as Listing [6-2](#A453659_1_En_6_Chapter.html#Par8)
    shows, this app has a standard `Main` method that starts the UI of the app with
    the `UnitTestAppDelegate` class.


    ```

    public class Application

    {

    static void Main(string[] args)

    {

    UIApplication.Main(args, null, "UnitTestAppDelegate");

    }

    }

    Listing 6-2.

    The Entry Point of the Unit Test App

    ```


    Listing [6-3](#A453659_1_En_6_Chapter.html#Par10) features a definition of the
    `UnitTestAppDelegate` class . As the “standard” `AppDelegate` class, `UnitTestAppDelegate`
    derives from `UIApplicationDelegate`. However, contrary to a typical `AppDelegate`
    like those we have used so far, `UnitTestAppDelegate` explicitly implements the
    `FinishedLaunching` app event handler. This is because the Persons.Tests app does
    not have a main storyboard, which is what sets the initial view controller. Instead,
    this is done programmatically by instantiating the `UIWindow` object, setting
    its `RootViewController` property, and making the window visible by invoking the
    `MakeKeyAndVisible` method of the `UIWindow` class instance. We see that the root
    view controller is created using a `TouchRunner` class. This class is provided
    by the NUnit testing framework and provides the UI, which is then used to execute
    the unit tests (refer back to Figure [6-3](#A453659_1_En_6_Chapter.html#Fig3)).


    ```

    [Register("UnitTestAppDelegate")]

    public partial class UnitTestAppDelegate : UIApplicationDelegate

    {

    UIWindow window;

    TouchRunner runner;

    public override bool FinishedLaunching(

    UIApplication app, NSDictionary options)

    {

    // create a new window instance based on the screen size

    window = new UIWindow(UIScreen.MainScreen.Bounds);

    runner = new TouchRunner(window);

    // register every test included in the main application/assembly

    runner.Add(System.Reflection.Assembly.GetExecutingAssembly());

    window.RootViewController = new UINavigationController(

    runner.GetViewController());

    // make the window visible

    window.MakeKeyAndVisible();

    return true;

    }

    }

    Listing 6-3.

    A Full Definition of the UnitTestAppDelegate

    ```


    Before we can test the model, we need to configure references. Note that the `Person`
    class is defined in a separate project with respect to Persons.Tests, so the latter
    has to reference the Persons.Common library. To configure this reference, you
    use the Reference Manager (Figure [6-8](#A453659_1_En_6_Chapter.html#Fig8)). To
    open this window, you go to Solution Explorer, navigate to the Persons.Tests project,
    and then use the “Edit References…” option from the context menu of the References
    node. Once in Reference Manager, you go to the Projects tab and select the Persons.Common
    project as shown in Figure [6-8](#A453659_1_En_6_Chapter.html#Fig8). The `Person`
    class can now be used inside Persons.Tests.


    ![A453659_1_En_6_Fig8_HTML.jpg](A453659_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Reference Manager showing the Persons.Tests project'
  trans: "\n# 创建待测试模型\n\n我首先开始实现一个 `Persons.Common` 共享库，该库是通过 .NET 标准库项目模板创建的（图 6-5）。在此项目中，我新建一个名为\
    \ `Models` 的文件夹，并在其中保存一个 `Person.cs` 文件，其中包含代码清单 6-1 中给出的 `Person` 类定义。此类有四个公共属性，其中三个为\
    \ `string` 类型，分别存储名字、姓氏和电子邮件地址。最后一个属性 `Age` 是整型（`int`），用于存储指定人员的年龄。此外，`Person`\
    \ 类还定义了两个公共方法。第一个方法 `FullName()` 返回由名字和姓氏组合而成的字符串。第二个方法 `IsEmailValid()` 实现了对电子邮件地址非常简单的验证：仅检查给定字符串是否包含\
    \ `@` 符号。当然，这种算法对有效验证电子邮件地址来说过于原始，但它将成为我们某个单元测试的目标——发现此问题。\n\n![A453659_1_En_6_Fig5_HTML.jpg](img/A453659_1_En_6_Fig5_HTML.jpg)\n\
    \n*图 6-5. 创建共享库*\n\n```\npublic class Person\n{\n    public string FirstName {\
    \ get; set; }\n    public string LastName { get; set; }\n    public string Email\
    \ { get; set; }\n    public int Age { get; set; }\n    public string FullName()\n\
    \    {\n        return $\"{FirstName} {LastName}\";\n    }\n    public static\
    \ bool IsEmailValid(string email)\n    {\n        return email.Contains(\"@\"\
    );\n    }\n}\n```\n\n*代码清单 6-1. 待测试模型的定义*\n\n# 实现单元测试\n\n有了待测试的模型，我们就可以实现实际的单元测试来验证其功能。为此，我使用单元测试应用项目模板创建了另一个名为\
    \ `Persons.Tests` 的项目。该模板在“新建项目”对话框中的位置如图 6-6 所示。然后，我像配置任何其他 iOS 应用一样配置此单元测试应用（参见图\
    \ 6-7）。具体来说，我将其设为通用应用，以兼容 iPhone 和 iPad，然后将目标版本设置为 iOS 9.0。最后，我选择项目位置并创建该项目。\n\
    \n![A453659_1_En_6_Fig7_HTML.jpg](img/A453659_1_En_6_Fig7_HTML.jpg)\n\n*图 6-7.\
    \ 配置 `Persons.Tests` 单元测试应用*\n\n![A453659_1_En_6_Fig6_HTML.jpg](img/A453659_1_En_6_Fig6_HTML.jpg)\n\
    \n*图 6-6. 创建单元测试应用项目*\n\n创建单元测试应用后，您会发现其结构与典型的 iOS 应用相同。具体来说，如代码清单 6-2 所示，该应用有一个标准的\
    \ `Main` 方法，该方法通过 `UnitTestAppDelegate` 类启动应用的 UI。\n\n```\npublic class Application\n\
    {\n    static void Main(string[] args)\n    {\n        UIApplication.Main(args,\
    \ null, \"UnitTestAppDelegate\");\n    }\n}\n```\n\n*代码清单 6-2. 单元测试应用的入口点*\n\n\
    代码清单 6-3 展示了 `UnitTestAppDelegate` 类的定义。与“标准”`AppDelegate` 类一样，`UnitTestAppDelegate`\
    \ 派生自 `UIApplicationDelegate`。但是，与之前使用过的典型 `AppDelegate` 不同，`UnitTestAppDelegate`\
    \ 显式实现了 `FinishedLaunching` 应用事件处理程序。这是因为 `Persons.Tests` 应用没有主故事板来设置初始视图控制器，而是通过编程方式实现——实例化\
    \ `UIWindow` 对象，设置其 `RootViewController` 属性，并通过调用 `UIWindow` 类实例的 `MakeKeyAndVisible`\
    \ 方法使窗口可见。我们看到，根视图控制器是使用 `TouchRunner` 类创建的。该类由 NUnit 测试框架提供，并提供了用于执行单元测试的 UI（请参考图\
    \ 6-3）。\n\n```\n[Register(\"UnitTestAppDelegate\")]\npublic partial class UnitTestAppDelegate\
    \ : UIApplicationDelegate\n{\n    UIWindow window;\n    TouchRunner runner;\n\n\
    \    public override bool FinishedLaunching(\n        UIApplication app, NSDictionary\
    \ options)\n    {\n        // create a new window instance based on the screen\
    \ size\n        window = new UIWindow(UIScreen.MainScreen.Bounds);\n        runner\
    \ = new TouchRunner(window);\n        // register every test included in the main\
    \ application/assembly\n        runner.Add(System.Reflection.Assembly.GetExecutingAssembly());\n\
    \        window.RootViewController = new UINavigationController(\n           \
    \ runner.GetViewController());\n        // make the window visible\n        window.MakeKeyAndVisible();\n\
    \        return true;\n    }\n}\n```\n\n*代码清单 6-3. `UnitTestAppDelegate` 的完整定义*\n\
    \n在测试模型之前，我们需要配置引用。请注意，`Person` 类定义在与 `Persons.Tests` 不同的项目中，因此后者必须引用 `Persons.Common`\
    \ 库。要配置此引用，您需要使用引用管理器（图 6-8）。要打开此窗口，请转到解决方案资源管理器，导航到 `Persons.Tests` 项目，然后使用“引用”节点上下文菜单中的“编辑引用...”选项。进入引用管理器后，转到“项目”选项卡并选择\
    \ `Persons.Common` 项目，如图 6-8 所示。现在，`Person` 类就可以在 `Persons.Tests` 中使用了。\n\n![A453659_1_En_6_Fig8_HTML.jpg](img/A453659_1_En_6_Fig8_HTML.jpg)\n\
    \n*图 6-8. 显示 `Persons.Tests` 项目的引用管理器*\n"
- fmt: '为了实现对实际单元测试的编写，我在`Persons.Tests`项目中添加了一个新文件`PersonTests.cs`。为了创建该文件，我使用了新建文件对话框，并从
    iOS 标签页中选择了“单元测试”对象（图[6-9](#A453659_1_En_6_Chapter.html#Fig9)）。`PersonTests.cs`文件的默认内容展示了如何创建实际执行单元测试的测试类和测试方法。更具体地说，测试类必须使用`TestFixtureAttribute`进行装饰（见清单[6-4](#A453659_1_En_6_Chapter.html#Par13)）。该属性指示测试框架在此类中查找测试方法。请注意，`PersonTests`类是公开的，否则
    NUnit 测试框架将无法识别它。


    ![A453659_1_En_6_Fig9_HTML.jpg](A453659_1_En_6_Fig9_HTML.jpg)


    图 6-9. 添加单元测试文件


    ```

    [TestFixture]

    public class PersonTests

    ```

    清单 6-4. `PersonTests`类的声明


    `PersonTests.cs`文件中给出的默认测试并没有实现任何有用的功能，但它们确实展示了如何定义一个测试方法。也就是说，这样的方法必须是测试类的一个公开函数。此外，一个测试方法不返回任何值，并且需要使用`TestAttribute`进行装饰。任何符合这些要求的方法都会被`TouchRunner`看到并显示在其
    UI 中。


    为了定义实际的测试，我首先导入了两个额外的命名空间：`Persons.Common.Models`和`System.Text.RegularExpressions`，然后将`PersonTests`类的默认定义替换为三个测试方法：`VerifyPublicProperties`、`VerifyFullName`和`VerifyEmail`。第一个测试方法`VerifyPublicProperties`出现在清单[6-5](#A453659_1_En_6_Chapter.html#Par17)中。此方法以及任何其他测试方法的通用结构都包含三个界限清晰的代码块：准备（arrange）、执行（act）和断言（assert）。在后续的清单中，每个代码块都用适当的注释进行了标记。在准备块中，你通常为测试准备输入数据。因此，在清单[6-5](#A453659_1_En_6_Chapter.html#Par17)中，我声明了四个常量，这些常量随后在执行块中用于调用被测试的逻辑。在这里，我验证了`Person`类的公共属性设置器。因此，我使用默认构造函数实例化了该类，然后将其公共属性的值设置为先前声明的常量。接着，在断言块中，我验证`Person`类实例的公共属性是否确实具有预期的值。


    为了验证被测试的值，你需要使用`NUnit.Framework.Assert`类的静态方法。如果你之前使用过 Windows 版 Visual Studio，你可能已经知道来自`Microsoft.VisualStudio.TestPlatform.UnitTestFramework`包的`Assert`类。这两个类的工作方式相似，并暴露了类似的功能。具体来说，我在清单[6-5](#A453659_1_En_6_Chapter.html#Par17)中使用的`AreEqual`方法会比较两个变量，并且只要这些变量的值不同，就会引发一个`NUnit.Framework.AssertionException`类型的异常。此外，你还可以定义当此断言被触发时显示的消息。在清单[6-5](#A453659_1_En_6_Chapter.html#Par17)中，我独立验证了`Person`类实例的每个公共属性，因此每个断言都有不同的消息。


    ```

    [Test]

    public void VerifyPublicProperties()

    {

    // Arrange

    const string expectedFirstName = "Dawid";

    const string expectedLastName = "Borycki";

    const string expectedEmail = "dawid@borycki.com.pl";

    const int expectedAge = 34;

    // Act

    var person = new Person()

    {

    FirstName = expectedFirstName,

    LastName = expectedLastName,

    Email = expectedEmail,

    Age = expectedAge

    };

    // Assert

    Assert.AreEqual(expectedFirstName, person.FirstName,

    "Incorrect first name");

    Assert.AreEqual(expectedLastName, person.LastName,

    "Incorrect last name");

    Assert.AreEqual(expectedEmail, person.Email,

