  raw: 'In this book, we will learn how to use Xamarin.iOS to develop apps for Apple
    devices: iPhone and iPad (iOS), Apple Watch (watchOS), and Apple TV (tvOS). We
    will first prepare the development tools (Visual Studio for Mac) and will get
    to know available project templates (Chapter [1](#A453659_1_En_1_Chapter.html)
    ). Subsequently, I will explicitly show how Xamarin.iOS is related to the native
    SDKs delivered by Apple, and we will investigate the app structure and lifecycle
    (Chapter [2](#A453659_1_En_2_Chapter.html) ). Then, we will learn how to create
    views (Chapter [3](#A453659_1_En_3_Chapter.html) ) and implement navigation between
    them (Chapter [4](#A453659_1_En_4_Chapter.html) ). Afterward, we will work with
    touch gestures (Chapter [5](#A453659_1_En_5_Chapter.html) ), study how to achieve
    high-quality apps with automatic testing (Chapter [6](#A453659_1_En_6_Chapter.html)
    ), and consume data from RESTful web services (Chapter [7](#A453659_1_En_7_Chapter.html)
    ). Finally, we will learn how to develop apps for Apple Watches (Chapter [8](#A453659_1_En_8_Chapter.html)
    ) and Apple TVs (Chapter [9](#A453659_1_En_9_Chapter.html) ).


    In this book, however, we will not learn how to reuse code between various platforms
    nor how to develop WORA apps with Xamarin.Forms. You can find more information
    about this in this book Beginning Visual Studio for Mac: Build Cross-Platform
    Apps with Xamarin and .NET Core by Alessandro Del Sole.


    Acknowledgments


    Dear reader, you hold or view this book thanks to Joan Murray, who was very encouraging
    of my book proposal and provided a lot of writing tips.


    I am grateful to Chaim Krause for providing a very detailed technical review and
    catching even the smallest mistakes.


    Many thanks go to Laura Berendson for reading the manuscript, providing feedback,
    and giving general advice. I thank Jill Balzano for her patience and keeping track
    of the book project. I also thank Welmoed Spahr and Todd Green for publishing
    this book and April Rondeau for copyediting.


    Finally, special thanks go to my wife, Agnieszka, daughter, Susanna, and son,
    Xavier, for their continuous support and patience shown to me during the writing
    of this book.


