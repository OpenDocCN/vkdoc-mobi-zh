    ## 用户界面测试


    验证`Person`类后，我们可以继续使用它来实现 Persons 应用。随后，我们将使用 Xamarin UI Tests 框架和 Xamarin Test
    Cloud（XTC）测试其 UI。


    ### 创建应用


    我使用单视图 iOS 应用模板（支持 iOS 9.0 及更高版本）创建了 Persons 应用。然后，我定义此应用的 UI，如图 [6-2](#A453659_1_En_6_Chapter.html#Fig2)
    所示。即，我创建了一个按钮、四个标签和四个文本字段。现在，我将每个文本字段的名称和辅助功能标识符（图 [6-12](#A453659_1_En_6_Chapter.html#Fig12)）分别设置为`TextFieldFirstName`、`TextFieldLastName`、`TextFieldEmail`和`TextFieldAge`。名称将用于在
    C# 代码中设置每个`TextField`的文本属性，而辅助功能标识符将用于在 UI 测试中查找控件。随后，我双击按钮以创建`TouchUpInside`事件处理程序，并暂时将该方法留空。最后，我编辑引用，使得
    Persons 应用引用`Person.Common`库。


    ![A453659_1_En_6_Fig12_HTML.jpg](A453659_1_En_6_Fig12_HTML.jpg)


    图 6-12. 配置辅助功能标识符


    ### Xamarin Test Cloud 代理


    要使测试运行器能够与 Persons 应用交互，你需要使用 Xamarin Test Cloud 代理，将其作为 NuGet 包安装。要安装它，你可以进入解决方案资源管理器，然后从
    Persons/Packages 节点的上下文菜单中选择“添加包…”选项，或使用菜单“项目 ➤ 添加 NuGet 包…”。无论选择哪种方法，都会出现“添加包”对话框。在此对话框中，进入搜索框并输入`Xamarin
    Test Cloud Agent`。匹配的包列表将显示在左侧，如图 [6-13](#A453659_1_En_6_Chapter.html#Fig13) 所示。然后选择列表中的第一个元素，并单击“添加包”按钮。


    ![A453659_1_En_6_Fig13_HTML.jpg](A453659_1_En_6_Fig13_HTML.jpg)


    图 6-13. 安装 Xamarin Test Cloud Agent NuGet 包


    片刻后，NuGet 包将被添加到 Persons 项目中。然后，你只需通过在`FinishedLaunching`事件处理程序中添加以下语句（[列表 6-8](#A453659_1_En_6_Chapter.html#Par31)）`Xamarin.Calabash.Start()`来启用它。此事件处理程序定义在
    Persons 项目的`AppDelegate.cs`文件中。由于启用了 Xamarin Test Cloud 代理的应用无法提交到商店，[列表 6-8](#A453659_1_En_6_Chapter.html#Par31)
    中的相应语句被 C# 预处理指令包围，并且仅在定义了`ENABLE_TEST_CLOUD`符号时执行。在安装 Xamarin Test Cloud Agent
    NuGet 包后，测试应用的调试配置中默认会执行此操作。要查看此设置，请转到 Persons 项目的选项，然后打开“生成/编译器”选项卡。`ENABLE_TEST_CLOUD`将列在“定义符号”文本框中。如果将配置更改为“发布”，则该符号未定义。


    ```

    public override bool FinishedLaunching(

    UIApplication application, NSDictionary launchOptions)

    {

    #if ENABLE_TEST_CLOUD

    Xamarin.Calabash.Start();

    #endif

    return true;

    }

    Listing 6-8.

    Setting Up the Xamarin Test Cloud Agent

    ```


    Xamarin Test Cloud 代理在启用时，会监听来自测试运行器的请求。此代理接受以编程方式生成的手势（如点击和滑动），并允许测试运行器与视觉控件交互；例如，从文本字段读取文本。重要的是，测试运行器还可以使用
    Xamarin Test Cloud 代理截取应用屏幕截图，以验证布局在各种设备上是否正确，以及在设备旋转时所有必要控件是否可见且位于预期位置。'
  raw: 'The `EmailCheck` function utilizes the `Regex` class from the .NET Framework.
    This class is used to perform operations with regular expressions. In particular,
    I use the `IsMatch` static method to check whether a regular expression pattern
    matches the given string. The pattern I use in Listing [6-7](#A453659_1_En_6_Chapter.html#Par24)
    matches every string that contains a combination of letters and digits followed
    by the `@` sign and a domain name. The result of this match is then compared to
    the value returned by the `Person.IsEmailValid` method . Because the latter uses
    a very naive way of validating an email address, this test should fail. To see
    that, we need to run the test methods we implemented.


    ```

    [Test]

    public void VerifyEmail()

    {

    // Arrange

    const string email = "dawid@";

    // Act

    var isValid = EmailCheck(email);

    // Assert

    Assert.AreEqual(isValid, Person.IsEmailValid(email));

    }

    private bool EmailCheck(string email)

    {

    const string emailPattern = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}";

    return Regex.IsMatch(email, emailPattern);

    }

    Listing 6-7.

    Validating Email Address

    ```


    ## Running Unit Tests


    To run the unit tests, you set the Persons.Tests app as a startup project. To
    do so, use the Solution Explorer, where you right-click the Persons.Tests node
    and then choose the “Set As Startup Project” option from the context menu (Figure
    [6-10](#A453659_1_En_6_Chapter.html#Fig10)). You then run the app by using the
    Run menu or by pressing a Play button in the Debug Target pad. After a while,
    the Persons.Tests app or test runner will be launched in the simulator and will
    look analogous to Figure [6-11](#A453659_1_En_6_Chapter.html#Fig11).


    ![A453659_1_En_6_Fig10_HTML.jpg](A453659_1_En_6_Fig10_HTML.jpg)


    Figure 6-10.


    Setting Persons.Tests as startup project


    The test runner will display any information about the test methods it recognized.
    Now, you can run all these unit tests by clicking the Run Everything button, or
    you can select `Persons.Tests.exe` and then `PersonsTests`. A list of test methods
    appears, as shown earlier in Figure [6-3](#A453659_1_En_6_Chapter.html#Fig3).
    You can run each test individually by pressing a corresponding entry or run them
    all by clicking the Run all button. After a short while, the results of each test
    method will be displayed. We see that only one test method (`VerifyEmail`) fails.


    ![A453659_1_En_6_Fig11_HTML.jpg](A453659_1_En_6_Fig11_HTML.jpg)


    Figure 6-11.


    A test runner


    ## User Interface Tests


    After validating the `Person` class, we can move forward and use it to implement
    the Persons app. Subsequently, we will test its UI with the Xamarin UI Tests framework
    and Xamarin Test Cloud (XTC) .


    ### Creating an App


    I create the Persons app with a Single View iOS app template (which supports iOS
    9.0 and later). Subsequently, I define the UI of this app as shown earlier in
    Figure [6-2](#A453659_1_En_6_Chapter.html#Fig2). Namely, I create one button,
    four labels, and four text fields. I now set the name and accessibility identifier
    (Figure [6-12](#A453659_1_En_6_Chapter.html#Fig12)) of each text field to `TextFieldFirstName`,
    `TextFieldLastName`, `TextFieldEmail`, and `TextFieldAge`, respectively. Names
    will be used to set the text properties of each `TextField` in C# code, while
    accessibility identifiers will be used to find controls in the UI test. Subsequently,
    I double-click the button to create the `TouchUpInside` event handler, and for
    now I leave this method empty. Finally, I edit the references such that the Persons
    app references the Person.Common library.


    ![A453659_1_En_6_Fig12_HTML.jpg](A453659_1_En_6_Fig12_HTML.jpg)


    Figure 6-12.


    Configuring accessibility identifier


    ### Xamarin Test Cloud Agent


    To enable a test runner to interact with the Persons app, you use the Xamarin
    Test Cloud Agent, which you install as a NuGet package. To install it, you can
    either go to Solution Explorer and then select the “Add Packages…” option from
    the context menu of the Persons/Packages node or use menu Project ➤ Add NuGet
    Packages…. Regardless of the method you choose, the Add Packages dialog appears.
    In this dialog, you go to the search box and type Xamarin Test Cloud Agent. A
    list of matched packages appears on the left, as shown in Figure [6-13](#A453659_1_En_6_Chapter.html#Fig13).
    You then choose the first element on the list and click the Add Package button.


    ![A453659_1_En_6_Fig13_HTML.jpg](A453659_1_En_6_Fig13_HTML.jpg)


    Figure 6-13.


    Installing the Xamarin Test Cloud Agent NuGet package


    After a short while, the NuGet package will be added to the Persons project. Then,
    you just need to enable it by adding the following statement (Listing [6-8](#A453659_1_En_6_Chapter.html#Par31)),
    `Xamarin.Calabash.Start()` , to the `FinishedLaunching` event handler. This event
    handler is defined in the `AppDelegate.cs` file of the Persons project. Since
    the app cannot be submitted to the store with the Xamarin Test Cloud Agent enabled,
    a corresponding statement from Listing [6-8](#A453659_1_En_6_Chapter.html#Par31)
    is surrounded by the C# preprocessor directives and is executed only when the
    `ENABLE_TEST_CLOUD` symbol is defined. This is done by default in the Debug configuration
    of the tested app after installing a Xamarin Test Cloud Agent NuGet package. To
    see this, go to the options of the Persons project and then open the Build/Compiler
    tab. `ENABLE_TEST_CLOUD` will be listed within the Define Symbols text box. If
    you change the configuration to Release, this symbol is undefined.


    ```

    public override bool FinishedLaunching(

    UIApplication application, NSDictionary launchOptions)

    {

    #if ENABLE_TEST_CLOUD

    Xamarin.Calabash.Start();

    #endif

    return true;

    }

    Listing 6-8.

    Setting Up the Xamarin Test Cloud Agent

    ```


    The Xamarin Test Cloud Agent, when enabled, listens for requests from the test
    runner. This agent accepts programmatically generated gestures (like tap and swipe)
    and also allows a test runner to interact with visual controls; for example, to
    read text from text fields. Importantly, the test runner can also use the Xamarin
    Test Cloud Agent to take app screenshots to verify that the layout is correct
    on various devices and that all necessary controls are visible and in expected
    locations when the device is rotated.'
