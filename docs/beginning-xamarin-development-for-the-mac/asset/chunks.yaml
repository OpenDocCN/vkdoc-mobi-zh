  trans: "\n### AlertViewController\n\n现在，我们准备替换上一小节中创建的 `ButtonAlert_TouchUpInside`\
    \ 事件处理器的默认定义。我们将实现的逻辑会显示一个原生警报窗口，用于呈现 \"Hello, Xamarin.iOS!\" 消息。要显示这样的警报，首先需要创建并配置一个\
    \ `UIAlertViewController` 类的实例，然后通过 `PresentViewController` 方法将其展示给用户。完整的示例见代码清单\
    \ 1-2。\n\n```\nprivate const string title = \"Apress\";\nprivate const string\
    \ message = \"Hello, Xamarin.iOS!\";\npartial void ButtonAlert_TouchUpInside(UIButton\
    \ sender)\n{\nvar alertController = UIAlertController.Create(\ntitle, message,\
    \ UIAlertControllerStyle.Alert);\nPresentViewController(alertController, false,\
    \ null);\n}\n```\n\n*代码清单 1-2. 创建并显示警报窗口*\n\n要创建 `UIAlertController` 类的实例，我使用了它的静态\
    \ `Create` 方法。该方法接受三个参数：`title`、`message` 和 `UIAlertControllerStyle`。前两个参数的作用相当明显，它们分别指定警报的标题和消息。最后一个参数\
    \ `UIAlertControllerStyle` 是一个枚举，用于定义警报的样式。你可以在 `Alert` 和 `ActionSheet` 之间选择。此处，我将警报样式设置为\
    \ `UIAlertControllerStyle.Alert`。在下一小节中，我将创建操作表，因此，我将 `title` 和 `message` 保存在了\
    \ `ViewController` 类的对应字段中。\n\n为了显示警报，我使用了 `PresentViewController` 方法，该方法在 `UIViewController`\
    \ 类中实现，而 `UIViewController` 是 `ViewController` 类的基类，`ViewController` 类与 HelloWorld\
    \ 应用的默认视图相关联。如代码清单 1-2 所示，`PresentViewController` 方法接受以下三个参数：\n\n- `viewControllerToPresent`\
    \ 是派生自 `UIViewController` 类的对象，代表要呈现的视图控制器。\n- `animated` 指示是否以动画方式呈现视图控制器。\n\
    - `completionHandler` 是在动画完成后执行的操作。\n\n你现在可以在设备模拟器中测试上述解决方案。要运行该应用，请点击调试工具栏（图\
    \ 1-22）中的“播放”按钮。该工具栏位于 Visual Studio 的顶部窗格内。你不仅可以使用目标工具栏来运行应用，还可以设置配置（调试或发布）并选择目标设备。此处，我将目标设备设置为\
    \ iOS 11.0 的 iPhone 8，但你可以选择任何其他模拟器。例如，为了创建图 1-1 中的截图，我使用了 iPhone X 模拟器。\n\n![A453659_1_En_1_Fig22_HTML.jpg](img/A453659_1_En_1_Fig22_HTML.jpg)\n\
    \n*图 1-22. 目标工具栏*\n\n当你按下“播放”按钮时，它会变为“停止”按钮，并且设备模拟器将启动。随后，HelloWorld 应用将被执行（图\
    \ 1-23），因此你可以点击 \"Hello, World!\" 按钮。结果，警报将会显示（图 1-23 的右侧部分）。\n\n![A453659_1_En_1_Fig23_HTML.jpg](img/A453659_1_En_1_Fig23_HTML.jpg)\n\
    \n*图 1-23. 在 iPhone 模拟器中运行的 HelloWorld 应用*\n\n你会很快发现，警报窗口会阻塞应用；此时尚无按钮或控件来关闭警报。因此，要中断应用执行，你需要点击调试工具栏中的“停止”按钮，或者在\
    \ PC 上双击 SHIFT + COMMAND + H 键盘快捷键，或者在模拟器上双击 Home 按钮。模拟器屏幕会呈现如图 1-24 所示的形态。然后，你可以向上滑动\
    \ HelloWorld 应用来结束其进程。\n\n此时，还需要注意，你可以使用设备模拟器来模拟各种用户操作。例如，你可以模拟摇动手势、Touch ID、Apple\
    \ Pay，或者简单地旋转或重启设备。你可以通过模拟器的“硬件”菜单访问这些选项。\n\n![A453659_1_En_1_Fig24_HTML.jpg](img/A453659_1_En_1_Fig24_HTML.jpg)\n\
    \n*图 1-24. iPhone 模拟器中的多任务管理*\n\n### 操作\n\n现在，让我们为警报视图添加一个操作。此操作将使用户能够关闭警报窗口，而无需结束整个应用进程。实际上，一个操作会作为警报窗口内的一个按钮出现。当你按下此按钮时，警报窗口将关闭，并且可以执行额外的自定义代码。代码清单\
    \ 1-3 展示了此类操作的典型用法，其中显示了警报创建的扩展实现。与前文类似，我在事件处理器外部创建了该操作，以便稍后复用。如果你现在重新在模拟器中运行应用，警报将补充上一个“确定”按钮（图\
    \ 1-25）。\n\n![A453659_1_En_1_Fig25_HTML.jpg](img/A453659_1_En_1_Fig25_HTML.jpg)\n\
    \n*图 1-25. 带有默认操作的警报*\n\n```\nprivate const string title = \"Apress\";\nprivate\
    \ const string message = \"Hello, Xamarin.iOS!\";\nprivate UIAlertAction okAction\
    \ =\nUIAlertAction.Create(\"OK\", UIAlertActionStyle.Default, null);\npartial\
    \ void ButtonAlert_TouchUpInside(UIButton sender)\n{\nvar alertController = UIAlertController.Create(\n\
    title, message, UIAlertControllerStyle.Alert);\nalertController.AddAction(okAction);\n\
    PresentViewController(alertController, false, null);\n}\n```\n\n*代码清单 1-3. 向警报添加默认操作*\n\
    \n如代码清单 1-3 所示，要创建操作，你需要使用 `UIAlertAction` 类。具体来说，该类实现了静态的 `Create` 方法，该方法接受三个参数，如下所示：\n\
    \n- `title` — 使用此参数指定操作的标题；即警报中显示的操作标题文字。\n- `style` — 定义操作的样式或类型。所有可用的操作类型都以\
    \ `UIAlertStyle` 枚举的值表示。该枚举定义了典型的操作，这些操作根据用户输入执行：\n    - `Cancel` — 此类型表示应取消给定操作，并且关联的应用状态或数据应保持不变。\n\
    \    - `Default` — 这是针对应用状态特定变更的默认操作。\n    - `Destructive` — 此类型通常用于确认删除特定的应用数据。\n\
    - `handler` 允许你定义一组语句，当用户点击操作按钮时将调用这些语句。\n\n在代码清单 1-3 中，我创建了一个标题为“OK”的 `Default`\
    \ 操作，该操作不调用任何其他逻辑（`handler` 参数为 `null`）。当然，你可以添加更多操作。在下一小节创建操作表时，我们将使用这种可能性。\n"
- fmt: '### Action Sheet


    `Action sheet` is another style for iOS alerts. According to Apple guidelines,
    an action sheet should be used to present a few choices for the user depending
    on the current context. In particular, you use such an object to get confirmation
    of deleting specific elements of the app data. You create the action sheet analogously
    as an alert, namely by using `UIAlertController` class. To explicitly show that,
    let’s now supplement the HelloWorld app with another button, which, when tapped,
    will display an action sheet. To this end, go to the Storyboard Editor by double-clicking
    `Main.storyboard` in the Solution Explorer. Then, add the second button and place
    it below the `ButtonAlert`. Change the name and title of the new button to `ButtonActionSheet`
    and `ActionSheet`, respectively. Adjust its width and location and then create
    the default event handler (place it below `ButtonAlert_TouchUpInside`). Modify
