    var translation = sender.TranslationInView(View);

    square.Transform = CGAffineTransform.MakeTranslation(

    translation.X + lastTranslation.X,

    translation.Y + lastTranslation.Y);

    }

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastTranslation.X = square.Transform.x0;

    lastTranslation.Y = square.Transform.y0;

    }

    }

    Listing 5-10.

    Accumulating the Translation of the Square

    ```


    ### Rotation and Pinch Gesture Recognizers


    Let’s now incorporate rotation and pinch gesture recognizers into the Gestures
    app so the purple square can be rotated and rescaled. The implementation of this
    sample requires several components. I will start with a method that combines a
    translation, rotation, and scaling into a single affine transformation. Then,
    I will tell you how to programmatically create the rotation and pinch gesture
    recognizers and enable simultaneous gesture recognition.'
  trans: '

    ### 检测手势位置


    要获取触摸的位置，你可以使用手势识别器类实例的 `LocationInView` 方法。该方法适用于所有手势识别器，因为它是在 `UIGestureRecognizer`
    类中实现的，而其他所有手势识别器都继承自此类。你也可以使用 `LocationOfTouch` 方法跟踪执行手势的特定触摸（手指）的位置。这两个方法都返回
    `CGPoint` 结构体，其 `X` 和 `Y` 属性存储了手势（或特定手指）在屏幕上的几何位置。


    在 Gestures 应用中，我使用 `LocationInView` 方法来检查平移手势是否在紫色方块上执行。如代码清单 5-8 所示，我使用该方法实现了另一个辅助函数
    `IsTouchLocationWithinSquare`。后者读取主视图中的触摸位置，然后检查该位置是否在方块内。为此，我使用了 `square.Frame`
    属性的 `Contains` 方法。`Contains` 会计算位置（`CGPoint` 结构体）的 `X` 和 `Y` 分量是否在包围紫色方块的矩形（`Frame`
    属性）内。如果是，我就可以平移该方块。因此，我修改了 `TranslateSquare` 方法（代码清单 5-6），首先调用 `IsTouchLocationWithinSquare`。然后，如果该方法返回
    `true`，我就为方块创建平移变换（代码清单 5-9）。


    ```

    private bool IsTouchLocationWithinSquare(

    UIPanGestureRecognizer panGestureRecognizer)

    {

    var location = panGestureRecognizer.LocationInView(View);

    return square.Frame.Contains(location.X, location.Y);

    }

    代码清单 5-8.

    仅当在方块上执行平移手势时，视图才会被平移

    ```


    ```

    private void TranslateSquare(UIPanGestureRecognizer sender)

    {

    if (IsTouchLocationWithinSquare(sender))

    {

    var translation = sender.TranslationInView(View);

    square.Transform = CGAffineTransform.

    MakeTranslation(translation.X, translation.Y);

    }

    }

    代码清单 5-9.

    仅当手势位置在该控件的边界内时，紫色方块才会被平移

    ```


    如果你现在重新运行 Gestures 应用，你会看到只有当你在该控件上方执行平移手势时，方块才会被平移。然而，当你重复这个手势时，你会注意到紫色方块的平移变换始终以屏幕中心为原点。这是因为手势识别器计算的是单次手势期间的位移，并未考虑之前手势所做的任何平移。要精确地平移方块，我们需要累计自应用启动以来执行的所有手势的总平移量。因此，我们需要在连续的平移手势结束后存储平移值，然后将该结果值添加到后续的位移中。为了实现这样的功能，我首先在
    `ViewController` 的定义中补充了一个私有字段 `lastTranslation`（类型为 `CGPoint`），然后修改 `TranslateSquare`
    方法，以存储手势结束时的平移量（代码清单 5-10）。为了累计单次平移手势期间完成的平移量，我读取了 `square.Transform` 属性的 `x0`
    和 `y0` 属性。我将结果值存储在 `lastTranslation` 成员的 `X` 和 `Y` 分量中，并将它们添加到实际的平移变换中。因此，当你重新运行应用时，紫色方块会“记住”它在上次平移手势中的位置。这样，所有后续的平移手势都能正确地平移紫色方块。


    ```

    private CGPoint lastTranslation;

    private void TranslateSquare(UIPanGestureRecognizer sender)

    {

    if (IsTouchLocationWithinSquare(sender))

    {

    var translation = sender.TranslationInView(View);

    square.Transform = CGAffineTransform.MakeTranslation(

    translation.X + lastTranslation.X,

    translation.Y + lastTranslation.Y);

    }

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastTranslation.X = square.Transform.x0;

    lastTranslation.Y = square.Transform.y0;

    }

    }

    代码清单 5-10.

    累计方块的平移量

    ```


    ### 旋转和捏合手势识别器


    现在让我们将旋转和捏合手势识别器整合到 Gestures 应用中，这样紫色方块就可以被旋转和缩放。此示例的实现需要几个组件。我将从一个方法开始，该方法将平移、旋转和缩放组合成一个单一的仿射变换。然后，我将告诉你如何以编程方式创建旋转和捏合手势识别器，并启用同时手势识别。

    '
- fmt: '# 总仿射变换


    数学上，仿射变换可以表示为`3 × 3`的变换矩阵`T`：


    ![$$ T=\left[\begin{array}{ccc} xx& xy& 0\\ {} yx& yy& 0\\ {}x0& y0& 1\end{array}\right]
    $$](A453659_1_En_5_Chapter_Equa.gif)


    该矩阵第一列和第二列的每个元素对应于`CGAffineTransform`结构体中相应的字段。因此，通常情况下，你可以通过手动计算矩阵元素的值来实现总仿射变换。例如，如果你想要平移一个对象，你需要将水平和垂直方向的位移值分别写入`x0`和`y0`属性。缩放和旋转则需要稍微多一些数学计算：


    ![$$ xx= sx\times \mathit{\cos}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Equb.gif)


    ![$$ xy=\mathit{\sin}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Equc.gif)


    ![$$ yx=-\mathit{\sin}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Equd.gif)


    ![$$ yy= sy\times \mathit{\cos}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Eque.gif)


    其中`sx`和`sy`表示水平和垂直方向的缩放因子，而`α`是旋转角度。


    幸运的是，`CGAffineTransform`提供了一些方法来简化这些计算。更具体地说，要创建总仿射变换，我结合使用了`CGAffineTransform`结构体的以下静态方法：


    - `MakeIdentity`：创建单位变换。它是仿射变换的一种特殊形式，不会修改视觉控件。`MakeIdentity`将`CGAffineTransform`的`xx`、`xy`、`yx`和`yy`属性设置为`1`，将`x0`和`y0`属性设置为`0`。

    - `Translate`：更新`CGAffineTransform`的`x0`和`y0`属性。

    - `Rotate`：更新变换矩阵的`xx`、`xy`、`yx`和`yy`元素，而不改变缩放因子。

    - `Scale`：改变缩放因子（`sx`和`sy`），并将它们包含在`CGAffineTransform`的`xx`、`xy`、`yx`和`yy`属性中，但不改变旋转角度。


    我在清单5-11的`UpdateSquareTransform`方法中使用了上述方法。该方法还包含了之前的平移、旋转和缩放值。为此，存储在`lastTranslation`和`lastRotation`字段中的值被加到当前的平移和旋转上，而当前的缩放因子则乘以前一个缩放因子。这是因为缩放操作是乘法的，而平移和旋转是加法的（参见前面的公式）。


    ```

    private nfloat lastRotation;

    private nfloat lastScale = 1.0f;

    private void UpdateSquareTransform(CGPoint translation,

    nfloat rotation, nfloat scale)

    {

    var transform = CGAffineTransform.MakeIdentity();

    // Include previous translation, rotation, and scale

    translation.X += lastTranslation.X;

    translation.Y += lastTranslation.Y;

    rotation += lastRotation;

    scale *= lastScale;

    // Combine translation, rotation, and scale

    transform = CGAffineTransform.Translate(

    transform, translation.X, translation.Y);

    transform = CGAffineTransform.Rotate(transform, rotation);

    transform = CGAffineTransform.Scale(transform, scale, scale);

    square.Transform = transform;

    }

    ```


    *清单5-11：紫色正方形的总仿射变换实现*


    有了`UpdateSquareTransform`方法，我首先修改了`TranslateSquare`函数，如清单5-12所示，然后实现了另外两个方法（清单5-13），它们之后将由旋转和捏合手势识别器使用。


    ```

    private void TranslateSquare(UIPanGestureRecognizer sender)

    {

    if (IsTouchLocationWithinSquare(sender))

    {

    var translation = sender.TranslationInView(View);

    //square.Transform = CGAffineTransform.MakeTranslation(

    //    translation.X + lastTranslation.X,

    //    translation.Y + lastTranslation.Y);

    UpdateSquareTransform(translation, 0.0f, 1.0f);

    }

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastTranslation.X = square.Transform.x0;

    lastTranslation.Y = square.Transform.y0;

    }

    }

    ```


    *清单5-12：`TranslateSquare`方法的更新定义*


    ```

    private void RotateSquare(UIRotationGestureRecognizer sender)

    {

    UpdateSquareTransform(new CGPoint(), sender.Rotation, 1.0f);

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastRotation += sender.Rotation;

    }

    }

    private void ScaleSquare(UIPinchGestureRecognizer sender)

    {

    UpdateSquareTransform(new CGPoint(), 0.0f, sender.Scale);

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastScale *= sender.Scale ;

    }

    }

    ```


    *清单5-13：旋转和缩放紫色正方形（注意水平和垂直方向的缩放因子相等）*


    ## 旋转和缩放控件


    最后，我需要做的就是创建两个额外的手势识别器——一个用于旋转，一个用于捏合。为此，在`ViewController`类中，我实现了`AddRotationAndPinchGestureRecognizers`方法（清单5-14），然后在`ViewDidLoad`事件处理程序中调用它（清单5-15）。


    ```

    private void AddRotationAndPinchGestureRecognizers()

    {

    var rotationGestureRecognizer =

    new UIRotationGestureRecognizer(RotateSquare);

    var pinchGestureRecognizer =

    new UIPinchGestureRecognizer(ScaleSquare);

    View.AddGestureRecognizer(pinchGestureRecognizer);

    View.AddGestureRecognizer(rotationGestureRecognizer);

    }

    ```


    *清单5-14：创建旋转和捏合手势识别器*


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    AddSquare(50.0f, UIColor.Purple);

    AddPanGestureRecognizer();

    AddRotationAndPinchGestureRecognizers();

    }

    ```


    *清单5-15：添加对旋转和捏合手势的支持*


    重新运行应用程序后，您将看到类似于图5-6的结果。请注意，要执行旋转和捏合手势，您需要使用多点触控，在模拟器中可以通过ALT键启用。这将激活两个矩形，代表两根手指。然后，按下鼠标左键并旋转手指（旋转手势）或改变它们之间的距离（捏合手势）。您将注意到紫色正方形会根据您的虚拟触摸进行变换。然而，一次只能运行一个手势识别器，这意味着，例如，您不能在旋转正方形的同时执行捏合手势。这是因为默认情况下禁用了这种同时手势识别。我将在接下来告诉您如何启用它。'
  raw: '#### A Total Affine Transformation


    Mathematically, the affine transformation can be represented as the 3 × 3 transformation
    matrix, T:


    ![$$ T=\left[\begin{array}{ccc} xx& xy& 0\\ {} yx& yy& 0\\ {}x0& y0& 1\end{array}\right]
    $$](A453659_1_En_5_Chapter_Equa.gif)


    Each element of this matrix from the first and second columns corresponds to the
    appropriate fields of the `CGAffineTransform` struct. So, in general, you can
    implement the total affine transformation by manually calculating values for matrix
    elements. For instance, if you want to translate an object, you write shift values
    along the horizontal and vertical directions to the `x0` and `y0` properties,
    respectively. Scaling and rotation require a little bit more mathematics:


    ![$$ xx= sx\times \mathit{\cos}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Equb.gif)


    ![$$ xy=\mathit{\sin}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Equc.gif)


    ![$$ yx=-\mathit{\sin}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Equd.gif)


    ![$$ yy= sy\times \mathit{\cos}\left(\alpha \right), $$](A453659_1_En_5_Chapter_Eque.gif)


    where sx and sy denote the scaling factors along the horizontal and vertical directions,
    while α is the rotation angle.


    Hopefully, the `CGAffineTransform` delivers methods that simplify these calculations.
    More specifically, to create the total affine transformation, I combine the following
    static methods of the `CGAffineTransform` struct:


    *   `MakeIdentity`, which creates the identity transformation. It’s a special
    form of the affine transformation that does not modify the visual control. `MakeIdentity`
    sets the `xx`, `xy`, `yx`, and `yy` properties of the `CGAffineTransform` to ones,
    and `x0`, `y0` to zeros.

    *   `Translate`, which updates the `x0` and `y0` properties of `CGAffineTransform`

    *   `Rotate`, which updates `xx`, `xy`, `yx`, and `yy` elements of the transformation
    matrix without changing the scaling factors

    *   `Scale`, which changes the scaling factors (sx and sy) and includes them in
    the following properties of `CGAffineTransform`: `xx`, `xy`, `yx`, and `yy`, but
    without changing the rotation angle


    I utilize the preceding methods in the `UpdateSquareTransform` method in Listing
    [5-11](#A453659_1_En_5_Chapter.html#Par54). This method also includes the previous
    translation, rotation, and scale values. To this end, values stored in the `lastTranslation`
    and `lastRotation` fields are added to the current translation and rotation, while
    the current scale factor is multiplied by the previous one. This is because the
    scaling operation is multiplicative, while shifts and rotations are additive (see
    preceding equations).


    ```

    private nfloat lastRotation;

    private nfloat lastScale = 1.0f;

    private void UpdateSquareTransform(CGPoint translation,

    nfloat rotation, nfloat scale)

    {

    var transform = CGAffineTransform.MakeIdentity();

    // Include previous translation, rotation, and scale

    translation.X += lastTranslation.X;

    translation.Y += lastTranslation.Y;

    rotation += lastRotation;

    scale *= lastScale;

    // Combine translation, rotation, and scale

    transform = CGAffineTransform.Translate(

    transform, translation.X, translation.Y);

    transform = CGAffineTransform.Rotate(transform, rotation);

    transform = CGAffineTransform.Scale(transform, scale, scale);

    square.Transform = transform;

    }

    Listing 5-11.

    Implementation of the Total Affine Transformation for the Purple Square

    ```


    Given the `UpdateSquareTransform` method, I first modify the `TranslateSquare`
    function as shown in Listing [5-12](#A453659_1_En_5_Chapter.html#Par56) and then
    implement two other methods (Listing [5-13](#A453659_1_En_5_Chapter.html#Par57)),
    which be used later by the rotation and pinch gesture recognizers.


    ```

    private void TranslateSquare(UIPanGestureRecognizer sender)

    {

    if (IsTouchLocationWithinSquare(sender))

    {

    var translation = sender.TranslationInView(View);

    //square.Transform = CGAffineTransform.MakeTranslation(

    //    translation.X + lastTranslation.X,

    //    translation.Y + lastTranslation.Y);

    UpdateSquareTransform(translation, 0.0f, 1.0f);

    }

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastTranslation.X = square.Transform.x0;

    lastTranslation.Y = square.Transform.y0;

    }

    }

    Listing 5-12.

    An Updated Definition of the TranslateSquare Method

    ```


    ```

    private void RotateSquare(UIRotationGestureRecognizer sender)

    {

    UpdateSquareTransform(new CGPoint(), sender.Rotation, 1.0f);

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastRotation += sender.Rotation;

    }

    }

    private void ScaleSquare(UIPinchGestureRecognizer sender)

    {

    UpdateSquareTransform(new CGPoint(), 0.0f, sender.Scale);

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastScale *= sender.Scale ;

    }

    }

    Listing 5-13.

    Rotating and Scaling the Purple Square (note that scaling factors are equal along
    horizontal and vertical directions)

    ```


    #### Rotating and Scaling the Control


    Finally, all I need to do is create two additional gesture recognizers—one for
    rotation and the second for a pinch. To do so, in the `ViewController` class I
    implement the `AddRotationAndPinchGestureRecognizers` method (Listing [5-14](#A453659_1_En_5_Chapter.html#Par59))
    and then invoke it in the `ViewDidLoad` event handler (Listing [5-15](#A453659_1_En_5_Chapter.html#Par60)).


    ```

    private void AddRotationAndPinchGestureRecognizers()

    {

    var rotationGestureRecognizer =

    new UIRotationGestureRecognizer(RotateSquare);

    var pinchGestureRecognizer =

    new UIPinchGestureRecognizer(ScaleSquare);

    View.AddGestureRecognizer(pinchGestureRecognizer);

    View.AddGestureRecognizer(rotationGestureRecognizer);

    }

    Listing 5-14.

    Creating Rotation and Pinch Gesture Recognizers

    ```


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    AddSquare(50.0f, UIColor.Purple);

    AddPanGestureRecognizer();

    AddRotationAndPinchGestureRecognizers();

    }

    Listing 5-15.

    Adding the Support for Rotation and Pinch Gestures

    ```


    After re-running the app , you will see results similar to Figure [5-6](#A453659_1_En_5_Chapter.html#Fig6).
    Note that to perform rotation and pinch gestures you need to use multi-touch,
    which you enable in the simulator using the ALT key. It activates two rectangles,
    representing two fingers. Then, you press the left mouse button and either rotate
    fingers (rotation gesture) or change the distance between them (pinch gesture).
    You will note that the purple square is transformed according to your virtual
    touches. However, only one gesture recognizer runs at a time, which means, for
    instance, that you cannot perform a pinch gesture while rotating the square. This
    is because such simultaneous gesture recognition is disabled by default. I’ll
    tell you how to enable it next.'
