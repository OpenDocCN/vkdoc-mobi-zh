    \ `div` 元素中显示谷歌地图。这些函数从两个输入字段中获取地图中心的地理坐标。为此，`displayMap` 接受以下三个参数：\n\n- `mapDivId`\
    \ – 用于显示地图的 `div` 元素的标识符\n- `latInputId` 和 `lngInputId` – 分别带有纬度和经度的输入字段的标识符\n\
    \n基于以上值，我配置了一个地图 `options` 对象，该对象指定了地图的缩放级别和中心。随后，我使用 `google.maps.Map` 对象显示地图。\n\
    \n```javascript\nfunction displayMap(mapDivId, latInputId, lngInputId) {\nlat\
    \ = document.getElementById(latInputId).value;\nlng = document.getElementById(lngInputId).value;\n\
    var mapCenter = new google.maps.LatLng(lat, lng);\nvar options = {\nzoom: 14,\n\
    center: mapCenter\n};\nnew google.maps.Map(document.getElementById(mapDivId),\
    \ options);\n}\n```\n\n清单[3-16] 用于显示谷歌地图的 JavaScript 函数\n\n最后一个文件 `map.html`（清单\
    \ 3-17）用于定义网页，包含一组标准的 HTML 声明。在 `head` 元素中，我引用了样式表 `map.css` 和必要的 JavaScript 组件。第一个是谷歌地图\
    \ API，另一个是 `map.js`。然后，我声明了两个标签、两个文本输入框、一个按钮以及一个用于渲染地图的 `div` 元素。请注意，按钮的 `onclick`\
    \ 属性指向 `displayMap` 函数。因此，每次点击该按钮时，会调用清单 3-16 中的函数来显示地图。\n\n```html\n\nLatitude:\n\
    \nLongitude:\n\nDisplay map\n\n```\n\n清单[3-17] `map.html` 文件的内容\n\n网页准备就绪后，我现在可以使用\
    \ `Web View` 来显示它。为此，在 `ViewController` 类中，我首先导入必要的命名空间：\n\n```csharp\nusing System;\n\
    using System.IO;\nusing CoreGraphics;\nusing Foundation;\nusing UIKit;\n```\n\n\
    然后，我定义了两个辅助方法，如清单 3-18 所示。第一个方法 `GetFrameWithVerticalMargin` 用于确定显示 `Web View`\
    \ 的矩形。请注意，在上一节中，表格视图覆盖了状态栏。为了解决这个问题，在清单 3-18 中，我向矩形添加了垂直边距并相应减少了其高度。第二个方法 `LoadMapUrl`\
    \ 调用 `UIWebView` 类实例的 `LoadRequest` 方法以渲染网页。`LoadRequest` 接受一个 `NSUrlRequest`\
    \ 类型的参数。该对象使用指向 `map.html` 文件的 `NSUrl` 对象实例化。这样，`UIWebView` 将显示此网页。\n\n```csharp\n\
    private CGRect GetFrameWithVerticalMargin(nfloat offset)\n{\nvar rect = View.Frame;\n\
    rect.Y = offset;\nrect.Height -= offset;\nreturn rect;\n}\nprivate void LoadMapUrl(UIWebView\
    \ webView)\n{\nvar url = Path.Combine(NSBundle.MainBundle.BundlePath,\n\"HTML/map.html\"\
    );\nwebView.LoadRequest(new NSUrlRequest(new NSUrl(url, false)));\n}\n```\n\n\
    清单[3-18] 用于在 `Web View` 中显示网页的辅助方法\n\n为了在运行时访问 `map.html` 网页，你需要将 `map.css`、`map.js`\
    \ 和 `map.html` 的生成操作设置为 `BundleResource`，如图 3-8 所示。\n\n![A453659_1_En_3_Fig8_HTML.jpg](img/A453659_1_En_3_Fig8_HTML.jpg)\n\
    \n**图 3-8.** 为网页配置生成操作\n\n最后，我修改了 `ViewDidLoad` 事件处理程序，如清单 3-19 所示。在其中，我实例化了一个\
    \ `Web View` 控件，并使用我的 `GetFrameWithVerticalMargin` 方法为其指定边界。随后，我调用 `LoadMapUrl`\
    \ 并最终显示 `Web View`。因此，运行应用后，你将看到一个包含文本输入框和按钮的网页。输入地理坐标后，点击按钮，稍后地图便会显示。\n\n```csharp\n\
    public override void ViewDidLoad()\n{\nbase.ViewDidLoad();\nvar webView = new\
    \ UIWebView(GetFrameWithVerticalMargin(20));\nLoadMapUrl(webView);\nAdd(webView);\n\
    }\n```\n\n清单[3-19] 创建并显示 `Web View`\n"
- fmt: '### Google Geocoding API


    In the previous sample, I used geocoordinates for New York City. If you would
    like to display a map for another location, you need to know its geocoordinates.
    To find these for any address, you can use the Google Geocode service. This is
    a webservice that converts addresses into geocoordinates (latitude and longitude).
    To use geocoding, you type the following URL in your browser (you can replace
    `New York` with any other value):


    [`https://maps.googleapis.com/maps/api/geocode/json?address=New+York`](https://maps.googleapis.com/maps/api/geocode/json?address=New+York)


    As a result, the Geocoding API will return the JSON file describing your address.
    This description is an array of key–value pairs, which store several objects like
    address components or geometry. In particular, the location of your address is
    saved under the `location` key. Here, this key is associated with the following
    geocoordinates—`lat`: `40.7127837` and `lng`: `-74.0059413`. I used these values
    to generate screenshots for Figure [3-7](#A453659_1_En_3_Chapter.html#Fig7). See
    Listing [3-20](#A453659_1_En_3_Chapter.html#Par83).


    ```

    {

    "results" : [

    {

    "address_components" : [

    {

    "long_name" : "New York",

    "short_name" : "New York",

    "types" : [ "locality", "political" ]

    },

    {

    "long_name" : "New York",

    "short_name" : "NY",

    "types" : [ "administrative_area_level_1", "political" ]

    },

    {

    "long_name" : "United States",

    "short_name" : "US",

    "types" : [ "country", "political" ]

    }

    ],

    "formatted_address" : "New York, NY, USA",

    "geometry" : {

    "bounds" : {

    "northeast" : {

    "lat" : 40.9175771,

    "lng" : -73.70027209999999

    },

    "southwest" : {

    "lat" : 40.4773991,

    "lng" : -74.25908989999999

    }

    },

    "location" : {

    "lat" : 40.7127837,

    "lng" : -74.0059413

    },

    "location_type" : "APPROXIMATE",

    "viewport" : {

    "northeast" : {

    "lat" : 40.9152555,

    "lng" : -73.70027209999999

    },

    "southwest" : {

    "lat" : 40.4960439,

    "lng" : -74.25573489999999

    }

    }

    },

    "place_id" : "ChIJOwg_06VPwokRYv534QaPC8g",

    "types" : [ "locality", "political" ]

    }

    ], "status" : "OK";

    }

    ```

    Listing 3-20. A Sample JSON Response from Google Geocode


    ### Invoking JavaScript Functions


    A Web View allows you to run JavaScript from the C# code. To that end, Web View
    delivers the `EvaluateJavaScript` method. It accepts one argument, which is a
    string with JavaScript code to run. To demonstrate how to use the `EvaluateJavascript`
    method, I supplement the `map.js` file with another function, `displayGeocoordinate`
    (Listing [3-21](#A453659_1_En_3_Chapter.html#Par88)). This function takes an address,
    represented as a string, and displays its geocoordinate, which is obtained from
    the Google Geocode service (Figure [3-9](#A453659_1_En_3_Chapter.html#Fig9)).
    To that end, I instantiate a `google.maps.Geocoder` object and then invoke its
    `geocode` method. This method sends a request to the Google Geocode service and
    accepts two arguments. The first one is an array of parameters, while the second
    is the callback function, which is executed after the request is completed. A
    callback function is fed with two other parameters, as follows:


    *   `results` – an object representing the results part of the JSON response from
    the Google Geocode service (refer back to Listing [3-20](#A453659_1_En_3_Chapter.html#Par83))

    *   `status` – status of the request


    In Listing [3-21](#A453659_1_En_3_Chapter.html#Par88), I use both parameters.
    First, I read the `status` to validate that the request was successfully handled
    by Google Geocode. If so, I get the first element of the `results` array and then
    obtain the `location` from the `geometry` object.


    ![A453659_1_En_3_Fig9_HTML.jpg](A453659_1_En_3_Fig9_HTML.jpg)


    Figure 3-9. Displaying an alert with a JavaScript function invoked through the
    Web View


    ```

    function displayGeocoordinate(address) {

    var geocoder = new google.maps.Geocoder();

    geocoder.geocode({''address'': address}, function(results, status) {

    if (status === ''OK'') {

    var geocoordinate = results[0].geometry.location;

    alert(''Address: '' + address

    + ''\nLat: '' + geocoordinate.lat().toFixed(3)

    + ''\nLng: '' + geocoordinate.lng().toFixed(3));

    }

    else {

    alert(''Geocoder failed: '' + status);

    }

    });

    }

    ```

    Listing 3-21. Geocoding an Address


    To invoke the `displayGeocoordinate` function, I modify the `ViewDidLoad` method
    of the `ViewController` as shown in Listing [3-22](#A453659_1_En_3_Chapter.html#Par90).
    I create the handler for the `LoadFinished` event of the Web View. The latter
    is fired after the web page has been rendered. This ensures that all necessary
    references are ready so I can invoke the `displayGeocoordinate` function using
    `EvaluateJavascript`. For the address, I pass `New York`, so after re-running
    an app I obtain the results shown in Figure [3-9](#A453659_1_En_3_Chapter.html#Fig9).
    Note that Web View automatically reinterprets the JavaScript `alert` function
    such that the resulting popup window looks like the one created with `UIAlertController`.


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    var webView = new UIWebView(GetFrameWithVerticalMargin(20));

    LoadMapUrl(webView);

    Add(webView);

    webView.LoadFinished += (sender, e) =>

    {

    webView.EvaluateJavascript("displayGeocoordinate(''New York'');");

    };

    }

    ```

    Listing 3-22. Invoking a JavaScript Function Through the Web View'
