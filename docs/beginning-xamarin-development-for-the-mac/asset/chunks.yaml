    类的静态属性 `CurrentDevice` 的 `CheckSystemVersion` 方法来验证 iOS 版本。


    最后，在代码清单 3-24 中，我将 `UpdateMap` 方法与 `CLLocationManager` 类实例的 `LocationsUpdated`
    事件处理程序关联起来。`LocationsUpdated` 事件在用户位置发生变化时触发。`UpdateMap` 及其依赖项的定义在代码清单 3-25 中给出。如该清单所示，我首先读取最后已知的位置，并使用它来设置地图中心和配置地图区域。后者是地图上显示的部分，或者定义地图的缩放级别。为了配置地图区域，我首先创建一个
    `MKCoordinateSpan` 类的实例。你使用这个类，通过 `MKCoordinateSpan` 类构造函数的相应参数（`latitudeDelta`
