    ### 创建项目


    要创建项目，请打开 Visual Studio for Mac。此时会显示图 1-9 所示的欢迎屏幕。接着，您可以在菜单栏中选择 `File/New Solution`，或者点击位于“最近使用”标题下方的
    `New Project` 按钮。这会激活图 1-10 所示的 `New Project` 窗口。


    ![A453659_1_En_1_Fig10_HTML.jpg](img/A453659_1_En_1_Fig10_HTML.jpg)


    图 1-10. 项目模板选择


    ![A453659_1_En_1_Fig9_HTML.jpg](img/A453659_1_En_1_Fig9_HTML.jpg)


    图 1-9. Visual Studio for Mac 的欢迎屏幕


    `New Project` 创建器可让您为项目选择模板。要过滤模板列表，仅显示与 iOS 应用直接相关的项目，请点击 `iOS` 选项卡下的 `App` 条目。随后右侧会显示可用的项目模板列表。该列表分为两类：`General`
    和 `Games`。在本书中，我们只使用 `General` 组中的项目模板。此类别包含以下模板：


    *   `Single View App` — 使用此模板创建包含单个视图的应用；即没有任何导航功能的应用程序，如图 1-1 所示。

    *   `Master-Detail App` — 此模板用于创建使用 `Master-Detail` 界面的应用。在这种情况下，列表显示对象的简短描述。当您从此列表（主视图）中选择一个对象时，相应的详细信息将显示在专用区域（详细视图）中。例如，iOS
    股票应用（图 1-11）中就使用了 `Master-Detail` 界面。


    ![A453659_1_En_1_Fig11_HTML.jpg](img/A453659_1_En_1_Fig11_HTML.jpg)


    图 1-11. `Master-Detail` iOS 应用的表示视图。对象（公司）列表显示在顶部。当您点击任一对象时，相应的详细信息（股票价值）会显示在底部。


    *   `Tabbed App` — 使用此模板创建多选项卡应用程序，您可以在多个选项卡中排列视觉控件。用户通过屏幕底部显示的有标签图标在选项卡之间导航。iOS
    时钟应用（图 1-12）中使用了这种导航方式。


    ![A453659_1_En_1_Fig12_HTML.jpg](img/A453659_1_En_1_Fig12_HTML.jpg)


    图 1-12. `Tabbed` iOS 应用程序示例。您可以使用视图底部显示的有标签图标在选项卡之间切换。


    *   `Page-based App` — 使用此模板创建多视图应用，其中的控件按页面排列。用户通过触摸手势在页面之间滑动。例如，iOS 天气应用（图 1-13）中使用了这种基于页面的导航。


    ![A453659_1_En_1_Fig13_HTML.jpg](img/A453659_1_En_1_Fig13_HTML.jpg)


    图 1-13. 天气应用利用基于页面的导航来切换天气预报


    *   `WebView App` — 使用此模板可快速启动混合应用开发。此项目模板创建一个嵌入了 `WebView` 控件的视图。该控件用于渲染使用 HTML、CSS
    和 JavaScript 编写的网站。我将在第 3 章中详细介绍 `WebView`。


    为了继续进行，让我们选择 `Single View App` 项目模板，并保留默认的语言选择 `C#`。然后，您将可以指定应用的名称和组织标识符（图 1-14）。我分别将这些值设置为
    `HelloWorld` 和 `com.db`。应用配置中的下一组控件可让您指定应用将支持哪些设备。在本例中，我将应用设为通用应用，并选择了 `iPad`
    和 `iPhone`。应用配置屏幕中的最后一个控件是 `Target` 下拉列表。您使用此列表选择应用支持的最低 iOS 版本。我将其设置为 `iOS 9.0`。配置完应用后，按下
    `Next` 按钮，这会激活图 1-15 所示的视图。


    ![A453659_1_En_1_Fig14_HTML.jpg](img/A453659_1_En_1_Fig14_HTML.jpg)


    图 1-14. iOS 应用配置


    图 1-15 中显示的 `Project Summary` 窗口列出了项目和解决方案名称。您也可以使用此屏幕设置源代码的位置、启用版本控制以及添加自动化的
    UI 测试项目。在这里，我保留了默认设置。我将在第 6 章中详细介绍单元测试。那么，继续操作，按下 `Create` 按钮以进一步进行。您将很快看到 Visual
    Studio 的 `Getting Started` 屏幕（图 1-16）。


    ![A453659_1_En_1_Fig15_HTML.jpg](img/A453659_1_En_1_Fig15_HTML.jpg)


    图 1-15. 项目摘要


    `Getting Started` 屏幕为您提供了多个选项。具体来说，它允许您开始设计应用的用户界面 (UI)、添加移动后端以及对项目进行单元测试。同时，在此窗口的左侧，您会看到
    `Solution Explorer`，其中显示了 `HelloWorld` 应用的结构。具体来说，有一个 `HelloWorld` 解决方案，在其下方您可以找到同名的项目（参见图
    1-15）。此项目包含构成应用的文件。这些文件将在下一章中详细讨论。现在，让我们使用 `Storyboard`（或 iOS）设计器为 `HelloWorld`
    应用创建一个简单的 UI。


    ![A453659_1_En_1_Fig16_HTML.jpg](img/A453659_1_En_1_Fig16_HTML.jpg)


    图 1-16. 在 Visual Studio 中打开的 `HelloWorld` 项目


    ### Storyboard 设计器


    要开始创建 UI，您可以点击 `Open Storyboard Designer` 按钮。这将打开 `Main.storyboard` 文件，并激活 Visual
    Studio 的 `Visual Interface` 或 `Storyboard Designer`（或简称为 `iOS Designer`）。该设计器如图
    1-17 所示。此设计器的三个元素应更详细地讨论，如下所示：


    *   应用的视觉预览。此元素占据设计器的中央部分，让您无需运行应用即可查看视图在设备上的显示效果。对于多视图应用，视觉预览还将显示用户可导航的视图（选项卡或页面）之间的关系。

    *   工具箱，位于右上角，包含一个您可以拖放到视图上的视觉对象列表。

    *   `Properties` 窗口，位于工具箱下方。您使用 `Properties` 窗口更改视觉控件的外观并进行配置、定义布局，以及将方法连接到控件触发的事件（如点击或输入）。


    请注意，您也可以使用 Visual Studio 中的相应菜单选项来激活上述窗口或面板：`View ➤ Pads`（参见图 1-18）。预览模式中还有一个有用的下拉列表。那就是
    `View As` 列表，您可以在视觉预览的顶部窗格中找到它。`View As` 下拉列表允许您选择用于预览的设备类型。如图 1-17 所示，我将此设备设置为
    `iPhone 6`。


    ![A453659_1_En_1_Fig18_HTML.jpg](img/A453659_1_En_1_Fig18_HTML.jpg)


    图 1-18. Visual Studio 的视图菜单


    ![A453659_1_En_1_Fig17_HTML.jpg](img/A453659_1_En_1_Fig17_HTML.jpg)


    图 1-17. Storyboard 编辑器

