  trans: "\n### 显示项目\n\n为了演示如何使用表格，我创建了一个新的单视图 iOS 项目，并将其命名为 `ColorsTable`。接着，我添加了一个新文件夹\
    \ `Colors`，并在其中创建了三个文件：`Color.cs`、`ColorsHelper.cs` 和 `ColorsTableSource.cs`。每个文件都将存储相应类的定义。我首先实现了\
    \ `Color` 类，它是一个用于表示表格中项目的辅助对象。如列表 3-5 所示，`Color` 类有两个公共属性：`Name` 和 `Value`。`Name`\
    \ 存储颜色的描述，而 `Value` 存储实际的颜色，以 `UIColor` 类的实例表示。在 `UIKit` 命名空间中定义的 `UIColor` 类，拥有多个包含预定义\
    \ iOS 颜色的公共静态属性。为了获取这个列表，我实现了一个 `ColorsHelper` 类（`ColorsHelper.cs` 文件），如列表 3-6\
    \ 所示。\n\n```\n\uFEFFusing UIKit;\nnamespace ColorsTable.Colors\n{\npublic class\
    \ Color\n{\npublic string Name { get; set; }\npublic UIColor Value { get; set;\
    \ }\n}\n}\n列表 3-5.\nColor 类的定义\n```\n\n`ColorsHelper` 类只有一个公共静态方法：`GetColors`。该方法使用\
    \ C# 反射机制来读取 `UIColor` 类所有公共静态属性的信息。这些信息以 `PropertyInfo` 对象的集合形式呈现。然后，通过读取 `Name`\
    \ 成员来获取属性名称，并调用 `PropertyInfo` 类实例的 `GetValue` 方法来获取属性值。接着利用这些值创建 `Color` 类的实例并将其添加到结果集合中。\n\
    \n```\n\uFEFFusing System.Collections.Generic;\nusing System.Reflection;\nusing\
    \ UIKit;\nnamespace ColorsTable.Colors\n{\npublic static class ColorsHelper\n\
    {\npublic static List GetColors()\n{\nvar colors = new List();\nvar uiColorType\
    \ = typeof(UIColor);\nvar availableColors = uiColorType.GetProperties(\nBindingFlags.Public\
    \ | BindingFlags.Static);\nforeach (var color in availableColors)\n{\ncolors.Add(new\
    \ Color()\n{\nName = color.Name,\nValue = color.GetValue(uiColorType) as UIColor\n\
    });\n}\nreturn colors;\n}\n}\n}\n列表 3-6.\n使用 C# 反射机制获取的预定义 iOS 颜色列表\n```\n\n有了颜色列表后，我现在可以为表格视图实现项目集合。为此，我创建了\
    \ `ColorsTableSource` 类，如列表 3-7 所示。`ColorsTableSource` 继承自 `UITableViewSource`，因此必须实现两个方法：`RowsInSection`\
    \ 和 `GetCell`。第一个方法由运行时用于确定表格当前部分的行数。第二个方法在运行时即将绘制特定行的单元格时被调用。因此，在列表 3-7 中，我使用此方法通过\
    \ `UITableViewCell` 准备单元格。该类表示单元格在表格中的视觉外观。有几种预定义的单元格样式可供使用，它们由 `UITableViewCellStyle`\
    \ 枚举中的以下值表示（见图 3-3）：\n\n![A453659_1_En_3_Fig3_HTML.jpg](img/A453659_1_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3. 预定义的单元格布局：Default（左上）、Value1（右上）、Value2（左下）和 Subtitle（右下）\n\n*   `Default`\
    \ – 指定单元格包含一个左对齐的文本标签和一个可选的图像视图。\n*   `Value1` – 指定单元格包含两个标签：一个左对齐，另一个右对齐。第一个标签显示通过设置\
    \ `UITableView` 类实例的 `TextLabel` 成员的 `Text` 属性所指定的文本。要配置第二个标签显示的字符串，使用 `DetailTextLabel`\
    \ 的 `Text` 属性。\n*   `Value2` – 使用与 `Value1` 类似的布局，但第一个标签右对齐，第二个标签左对齐。\n*   `Subtitle`\
    \ – 在这种情况下，`DetailTextLabel` 位于 `TextLabel` 正下方，且两个标签都左对齐。\n\n为了优化性能，通常使用 `UITableView`\
    \ 类实例的 `DequeueReusableCell` 方法重用现有单元格。此方法接受单元格标识符，并返回有效的 `UITableViewCell` 实例或\
    \ `null`。在后一种情况下，需要调用 `UITableViewCell` 构造函数来创建新单元格。在列表 3-7 中，我使用了默认的单元格样式，并将单元格标识符设置为存储在\
    \ `cellId` 常量中的值。在获得 `UITableViewCell` 实例后，我配置其属性，使得主标签显示颜色名称，副标签显示 `UIColor`\
    \ 类实例的字符串表示形式（类型名称和 ARGB 组件）。此外，我将主标签的前景色更改为当前项目 `Value` 属性所携带的颜色。列表 3-7 中的代码依赖于以下命名空间，这些命名空间需要包含在\
    \ `ColorsTableSource.cs` 文件中：\n\n```\n\uFEFFusing System;\nusing System.Collections.Generic;\n\
    using Foundation;\nusing UIKit;\n```\n\n```\npublic class ColorsTableSource :\
    \ UITableViewSource\n{\nprivate const string cellId = \"ColorCell\";\npublic List\
    \ Items { get; private set; } = ColorsHelper.GetColors();\npublic override UITableViewCell\
    \ GetCell(\nUITableView tableView, NSIndexPath indexPath)\n{\n// 获取要显示的项目\nvar\
    \ item = Items[indexPath.Row];\n// 在创建新单元格之前尝试重用现有单元格\nvar cell = tableView.DequeueReusableCell(cellId)\n\
    ?? new UITableViewCell(UITableViewCellStyle.Default, cellId);\n// 配置单元格属性\ncell.TextLabel.Text\
    \ = item.Name;\ncell.TextLabel.TextColor = item.Value;\nif (cell.DetailTextLabel\
    \ != null)\n{\ncell.DetailTextLabel.Text = item.Value.ToString();\n}\nreturn cell;\n\
    }\npublic override nint RowsInSection(UITableView tableview, nint section)\n{\n\
    return Items.Count;\n}\n}\n列表 3-7.\nUITableView 的项目集合\n```\n\n最后，为了显示表格，我修改了 `ViewController`\
    \ 类的 `ViewDidLoad` 方法，如列表 3-8 所示。首先，我实例化 `UITableView` 类，使其充满整个视图，然后将其 `Source`\
    \ 属性设置为 `ColorsTableViewSource` 的实例。最后，我使用 `ViewController` 类的 `Add` 方法将表格添加到视图中。因此，运行应用后，你将得到前面图\
    \ 3-2 所示的结果。\n\n请注意，在此示例中，我从源代码创建了控件（`UITableView`）。我没有使用可视化设计器来修改故事板。当然，你也可以使用此选项来定义整个视图。在特定情况下，这比使用故事板设计视图更快。同时，你也可以使用故事板创建\
    \ `UITableView`。在这种情况下，你可以手动绘制单元格布局，并通过其名称引用底层控件。\n\n要成功编译列表 3-8 中的代码，我们需要在 `ViewController.cs`\
    \ 文件中包含 `ColorsTable.Colors` 命名空间。现在也是暂停一下、编译应用以确保一切正常、并测试各种单元格样式的好时机。\n\n```\n\
    public override void ViewDidLoad()\n{\nbase.ViewDidLoad();\nvar table = new UITableView(View.Frame)\n\
    {\nSource = new ColorsTableSource()\n};\nAdd(table);\n}\n列表 3-8.\n创建表格\n```\n"
- fmt: '### Selecting Items


    Quite often, you need to display additional data to the user whenever he or she
    selects an item in the table. Here, I show you how to display the full information
    about the color (`Name` and `Value`) using an alert. You already know how to display
    an alert, so the only new thing is to create and display the alert from the `UITableViewSource`
    whenever the user selects a row. To handle such an event, you override the `RowSelected`
    method of the `UITableViewSource`. The `RowSelected` method gives you access to
    a reference to the `UITableView`, raising an event and an instance of the `NSIndexPath`
    class, which you can use to get the index of a selected row. Similarly, as before,
    I use the index to get the selected item and then create and configure the `UIAlertController`
    as shown in Listing [3-9](#A453659_1_En_3_Chapter.html#Par39).


    ```

    public override void RowSelected(UITableView tableView, NSIndexPath indexPath)

    {

    if (ParentViewController != null)

    {

    DisplayColorInfo(tableView, indexPath);

    }

    else

    {

    base.RowSelected(tableView, indexPath);

    }

    }

    private void DisplayColorInfo(UITableView tableView, NSIndexPath indexPath)

    {

    var selectedItem = Items[indexPath.Row];

    var alertController = UIAlertController.Create(

    selectedItem.Name, selectedItem.Value.ToString(),

    UIAlertControllerStyle.Alert);

    alertController.AddAction(UIAlertAction.Create(

    "OK", UIAlertActionStyle.Default, null));

    ParentViewController.PresentViewController(

    alertController, true,

    () => { tableView.DeselectRow(indexPath, true); });

    }

    Listing 3-9.

    Displaying Info About Selected Item

    ```


    To display an alert, I invoke the `PresentViewController` method. To do so, I
    need an instance of the `UIViewController` or a derived class. Here, I use the
    `ViewController` associated with a default view. The `ViewController` class instance
    is passed through the constructor of the `ColorsTableSource` class and then stored
    in the `ParentViewController` property (see Listing [3-10](#A453659_1_En_3_Chapter.html#Par41)).


    ```

    public UIViewController ParentViewController { get; private set; }

    public ColorsTableSource(UIViewController viewController)

    {

    ParentViewController = viewController;

    }

    Listing 3-10.

    Additional Members of the ColorsTableSource Used to Obtain and Store a Reference
    to the UIViewController Class

    ```


    To use the modified definition of the `ColorsTableSource`, I change the `ViewDidLoad`
    view event handler as shown in Listing [3-11](#A453659_1_En_3_Chapter.html#Par43).
    Afterward, by re-running the app, you can tap any entry in the table. The alert
    shown in Figure [3-4](#A453659_1_En_3_Chapter.html#Fig4) appears.


    ![A453659_1_En_3_Fig4_HTML.jpg](A453659_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Information about the color is displayed as an alert


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    var table = new UITableView(View.Frame)

    {

    Source = new ColorsTableSource(this)

    };

    Add(table);

    }

    Listing 3-11.

    Passing an Instance of the ViewController to the ColorsTableSource

    ```


    ### Deleting Items


    To enable item deletion, override the `CommitEditingStyle` method of the `UITableViewSource`.
    Listing [3-12](#A453659_1_En_3_Chapter.html#Par50) shows a sample implementation
    of this method for the `ColorsTableSource`. I first read the `editingStyle` parameter
    passed to the `CommitEditingStyle` method to see if it is equal to `UITableViewCellEditingStyle.Delete`.
    If so, I remove the selected item from the `Colors` list and also from the Table
    View. The latter is done using the `DeleteRows` method of the `UITableView` class
    instance. This method accepts two arguments: an array of `NSIndexPath` objects,
    which identify items to be deleted, and animation type. Available animation types
    are defined in the `UITableViewRowAnimation` enumeration as follows:


    - `Fade` – specifies that deleted rows will fade out

    - `Right`, `Left`, `Top`, `Bottom` – specify that the deleted rows slide out to
    the right, left, top, or bottom, respectively

    - `Middle` – specifies that the deleted rows will “fly away”

    - `Automatic` – forces the `UITableView` to automatically adjust animation style
    depending on the positions of the rows being deleted


    In Listing [3-12](#A453659_1_En_3_Chapter.html#Par50), I use `Automatic` animation,
    but you can easily change it to any other value and see how it affects row deletion.
    After running the app, you can choose any item and swipe it to the left; you will
    see a red Delete button (Figure [3-5](#A453659_1_En_3_Chapter.html#Fig5)). After
    tapping this button, the item will be removed from the underlying list and from
    the Table View.


    ![A453659_1_En_3_Fig5_HTML.jpg](A453659_1_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    Swipe-to-delete feature in the UITableView


    ```

    public override void CommitEditingStyle(

    UITableView tableView,

    UITableViewCellEditingStyle editingStyle,

    NSIndexPath indexPath)

    {

    if (editingStyle == UITableViewCellEditingStyle.Delete)

    {

    Items.RemoveAt(indexPath.Row);

    tableView.DeleteRows(

    new NSIndexPath[] { indexPath },

    UITableViewRowAnimation.Automatic);

    }

    }

    Listing 3-12.

    Deleting an Item

    ```


    You can also programmatically prevent an item from being deleted. You do so by
    implementing the `CanEditRow` method. Listing [3-13](#A453659_1_En_3_Chapter.html#Par52)
    shows how to prevent deleting a magenta color. When you re-run the app, a Delete
    button will not appear for the row with the magenta color when you swipe the corresponding
    item.


    ```

    public override bool CanEditRow(UITableView tableView,

    NSIndexPath indexPath)

    {

    var itemToDelete = Items[indexPath.Row];

    return itemToDelete.Name != "Magenta";

    }

    Listing 3-13.

    Deleting of the Magenta Color Is Disabled

    ```


    In more-advanced scenarios, you may need to create more than one button to handle
    item swiping. In such cases, you create a collection of `UITableViewRowAction`
    objects by overriding the `UITableViewRowAction` of the `UITableViewSource`. In
    Listing [3-14](#A453659_1_En_3_Chapter.html#Par54), I implement two such actions.
    One will look and act analogous to the Delete button from the previous example
    but will have a different label, Remove. The other button will have a gray background
    and will change the background of the selected cell, as shown in Figure [3-6](#A453659_1_En_3_Chapter.html#Fig6).


    ```

    public override UITableViewRowAction[] EditActionsForRow(

    UITableView tableView, NSIndexPath indexPath)

    {

    var removeButton = UITableViewRowAction.Create(

    UITableViewRowActionStyle.Destructive,

    "Remove",

    delegate {

    Items.RemoveAt(indexPath.Row);

    tableView.DeleteRows(

    new NSIndexPath[] { indexPath },

    UITableViewRowAnimation.Middle);

    });

    var markItemButton = UITableViewRowAction.Create(

    UITableViewRowActionStyle.Normal,

    "Mark",

    delegate

    {

    tableView.CellAt(indexPath).BackgroundColor =

    UIColor.FromRGBA(0, 255, 0, 35);

    });

    return new UITableViewRowAction[] { removeButton, markItemButton };

    }

    Listing 3-14.

    Creating a Collection of Row Actions

    ```


    To create the `UITableViewRowAction`, you use the static `Create` method. This
    method accepts three arguments, as follows:'
