    ```


    在代码清单[4-10](#A453659_1_En_4_Chapter.html#Par35)中，我将`DataObject`成员的类型从`string`改为`KeyValuePair<string,
    UIColor>`。然后，在`ViewWillAppear`视图事件处理程序中，我分别从`DataObject`的`Key`和`Value`属性获取颜色名称和值。


    最后，我需要更新`ModelController`，在其中修改`pageData`成员的声明和初始化，如代码清单[4-11](#A453659_1_En_4_Chapter.html#Par42)所示。我创建了三个`KeyValuePair`对象：


    *   键：Red，值：`UIColor.Red`

