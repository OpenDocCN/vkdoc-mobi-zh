    ## Size Classes


    Although the text field of the `AutoLayout` app adjusts to the screen width, it
    will disappear when you change the preview to iPad or switch the device orientation
    from portrait to landscape. This is because portrait orientation uses a different
    size class than landscape uses. Figure [3-20](#A453659_1_En_3_Chapter.html#Fig20)
    shows that iPhone 5[S] in portrait mode utilizes a wCompacthRegular size class
    , contrary to the wCompacthCompact class used in landscape mode.


    ![A453659_1_En_3_Fig20_HTML.jpg](A453659_1_En_3_Fig20_HTML.jpg)


    Figure 3-20.


    Size classes for various orientations of iPhone 5S


    A size class specifies the group of devices and their orientation for which the
    available view sizes have a similar width and height. There are three different
    classes for width (w) and height (h):


    *   Any – a group of devices with screens of arbitrary width or height. This is
    the most general group, covering all devices.

    *   Regular – represents devices of regular screen sizes

    *   Compact – represents devices with compact screens


    Accordingly, you can arrange 3 × 3 combinations of these classes, resulting in
    nine size classes total, which are summarized in Table [3-1](#A453659_1_En_3_Chapter.html#Tab1).
    To see how devices are categorized into size classes, click the class name, located
    to the left of the View As drop-down list. A small popup window appears. This
    window is partitioned into a 3 × 3 grid. By moving a pointer within this grid,
    various cells are highlighted, describing the size class. Its description and
    covered devices are then displayed in the bottom (Figure [3-21](#A453659_1_En_3_Chapter.html#Fig21)).


    ![A453659_1_En_3_Fig21_HTML.jpg](A453659_1_En_3_Fig21_HTML.jpg)


    Figure 3-21.


    A grid showing size class along with its short description


    Table 3-1.


    Size Classes for iOS Apps


    | Width/Height | Any | Regular | Compact |

    | --- | --- | --- | --- |

    | Any | wAnyhAny | wAnyhR | wAnyhC |

    | Regular | wRhAny | wRhR | wRhC |

    | Compact | wChAny | wChR | wChC |


    When you use iOS designer to design a view, the controls you add are implicitly
    associated with the actual size class. So, when you change the size class, these
    controls do not appear. The only exception is the wAnyhAny class, which is associated
    with the Generic device from the View As drop-down list. In this case, the layout
    you define will work the same for every device and orientation.


    You may wonder why you need size classes. The simplest answer is that they allow
    you to easily design adaptive views. For instance, the layout I use in the `AutoLayout`
    app works perfectly for portrait mode. The label is above the text field, so the
    user can easily modify the text. However, when the device orientation is changed
    to landscape, the text field would be resized to fit the available width, but
    this will not look natural. Instead, it would be more efficient to change the
    layout and place the label to the left of the text field. By doing so you will
    save the vertical space for other controls and use the available space more efficiently.


    Let’s see how to implement such a dynamic change of control arrangement. I start
    by installing the `wChC` class for the text field and the label. To this end,
    I use the Properties window, in which the list of installed size classes is located
    right below the Height property (Figure [3-22](#A453659_1_En_3_Chapter.html#Fig22)).
    Then, I click the Settings drop-down list and choose the Compact ➤ Compact option
    from the context menu. The first specifies the width group, while the second corresponds
    to the height group.


    ![A453659_1_En_3_Fig22_HTML.jpg](A453659_1_En_3_Fig22_HTML.jpg)


    Figure 3-22.


    Installing the wChC size class


    Given the new size classes are installed, I can switch the preview mode to landscape.
    The controls become visible. However, the width of the text field does not change,
    because constraints I defined previously work for the wChR size class only. I
    need to specify new constraints for the wChC size class. I can also arbitrarily
    rearrange controls. So, I first place the text field next to the label. Then,
    analogously as for the wChR size class, I use a T-shaped icons to define three
    constraints between the text field and the superview (parent view) such that the
    left, top, and right margins are fixed to 100, 32, and 10 px, respectively. You
    add these constraints analogously as previously, with the only difference being
    that now you need to drag the left T-shape to the text field. After defining new
    constraints for the wChC size class, I re-run the `AutoLayout` app, and its view
    now depends on the screen orientation (Figure [3-23](#A453659_1_En_3_Chapter.html#Fig23)).


    ![A453659_1_En_3_Fig23_HTML.jpg](A453659_1_En_3_Fig23_HTML.jpg)


    Figure 3-23.


    AutoLayout, when combined with the size classes, allows you to design adaptive
    views in which the controls are resized and rearranged according to screen-size
    orientation: portrait (top) and landscape (bottom)'
  trans: '

    ## 图 3-18. 更新约束


    ![A453659_1_En_3_Fig17_HTML.jpg](img/A453659_1_En_3_Fig17_HTML.jpg)


    ## 图 3-17. 创建间距约束


    如图 3-19 所示，约束列表会显示在同名组的下方。在此情况下，我有如下四个约束：


    - `Trailing Space to: Superview, equal to: 10` – 指定文本框与父视图之间的右边距

    - `Top Space to: Superview, equal to: 116` – 指定文本框与父视图之间的顶部边距

    - `Leading Margin Space to: Superview, equal to: 6` – 此约束指定文本框与父视图（即文本框所在的视图）之间的左边距

    - `Width equal to 355` – 指定文本框的宽度。此约束用于反映我们在实现之初设置的初始宽度。


    请注意，约束组中的每个条目都有一个表示约束的小图标（位于左侧），以及一个设置下拉列表（位于右侧）。你可以使用后者来删除或编辑约束。与编辑模式不同，删除约束无需多加说明。进入编辑模式后（图
    3-19 右侧部分），你可以修改约束的乘数和常量。运行时环境会根据数学公式 `[第一个项的属性] = [第二个项的属性] × 乘数 + 常量` 来调整控件大小。你还可以通过
    `关系` 下拉列表将此等式改为不等式。该列表包含三个选项：`等于` (=)、`小于或等于` (<=) 和 `大于或等于` (>=)。


    现在我可以分别将`前导边距空间`修改为 10 px，并将`顶部空间`修改为 60 px。此外，最后一个约束（`宽度等于 355 px`）在屏幕尺寸变化时会导致冲突，因为布局机制无法满足该约束。因此，我移除了这个约束。所有剩余约束确保文本框具有固定的边距。这样，当屏幕尺寸变化时，文本框的宽度将按如下公式更新：`[文本框宽度]
    = [视图宽度] – 2 × 10`。我们来验证一下，并将预览切换为较小的设备（iPhone 5[S]）和较大的设备（iPhone 6 Plus）。在这两种情况下，文本框都能像在
    iPhone 6 上一样适配视图，因为它采用了自动布局。


    ## 尺寸类别


    尽管 `AutoLayout` 应用的文本框会自适应屏幕宽度，但当你将预览切换到 iPad 或将设备方向从竖屏切换为横屏时，它将会消失。这是因为竖屏和横屏使用了不同的尺寸类别。图
    3-20 显示，竖屏模式下的 iPhone 5[S] 使用的是 `wCompacthRegular` 尺寸类别，而横屏模式使用的是 `wCompacthCompact`
    尺寸类别。


    ![A453659_1_En_3_Fig20_HTML.jpg](img/A453659_1_En_3_Fig20_HTML.jpg)


    ## 图 3-20. iPhone 5S 不同方向的尺寸类别


    尺寸类别指定了一组设备及其方向，在这些设备和方向下，可用的视图尺寸具有相似的宽度和高度。宽度 (`w`) 和高度 (`h`) 各有三种不同的类别：


    - **任意** – 屏幕宽度或高度为任意值的设备组。这是最通用的组，涵盖所有设备。

    - **常规** – 代表常规屏幕尺寸的设备

    - **紧凑** – 代表紧凑屏幕的设备


    因此，你可以排列出这些类别的 3 × 3 组合，总共产生九种尺寸类别，汇总在表 3-1 中。要查看设备如何归类到尺寸类别，请点击位于 `View As` 下拉列表左侧的类别名称。此时会出现一个小的弹出窗口。该窗口被划分为
    3 × 3 的网格。当你在网格中移动指针时，不同的单元格会高亮显示，并描述其尺寸类别。随后，其描述和涵盖的设备会显示在底部（图 3-21）。


    ![A453659_1_En_3_Fig21_HTML.jpg](img/A453659_1_En_3_Fig21_HTML.jpg)


    ## 图 3-21. 显示尺寸类别及其简短描述的网格


    ## 表 3-1. iOS 应用的尺寸类别


    | 宽度/高度 | 任意 | 常规 | 紧凑 |

    | --- | --- | --- | --- |

    | 任意 | `wAnyhAny` | `wAnyhR` | `wAnyhC` |

    | 常规 | `wRhAny` | `wRhR` | `wRhC` |

    | 紧凑 | `wChAny` | `wChR` | `wChC` |


    当你使用 iOS 设计器设计视图时，添加的控件会隐式地与当前的尺寸类别相关联。因此，当你更改尺寸类别时，这些控件将不会显示。唯一的例外是 `wAnyhAny`
    类别，它与 `View As` 下拉列表中的 `通用` 设备相关联。在这种情况下，你定义的布局在所有设备和方向上都适用。


    你可能想知道为什么需要尺寸类别。最简单的答案是，它们让你能够轻松设计自适应视图。例如，我在 `AutoLayout` 应用中使用的布局在竖屏模式下运行完美。标签位于文本框上方，因此用户可以轻松修改文本。但是，当设备方向切换为横屏时，文本框会被调整大小以适应可用宽度，但这看起来不自然。相反，更有效的方法是更改布局，将标签放置在文本框的左侧。这样做可以为其他控件节省垂直空间，并更有效地利用可用空间。


    让我们看看如何实现这种控件排列的动态更改。我首先为文本框和标签安装 `wChC` 类别。为此，我使用 `属性` 窗口，其中已安装的尺寸类别列表位于 `高度`
    属性正下方（图 3-22）。然后，我点击 `设置` 下拉列表，并从上下文菜单中选择 **紧凑** ➤ **紧凑** 选项。第一个指定宽度组，第二个对应高度组。


    ![A453659_1_En_3_Fig22_HTML.jpg](img/A453659_1_En_3_Fig22_HTML.jpg)


    ## 图 3-22. 安装 wChC 尺寸类别


    安装新尺寸类别后，我可以将预览模式切换到横屏。控件变得可见。然而，文本框的宽度并未改变，因为我之前定义的约束仅适用于 `wChR` 尺寸类别。我需要为 `wChC`
    尺寸类别指定新的约束。我还可以任意重新排列控件。因此，我首先将文本框放置在标签旁边。然后，与 `wChR` 尺寸类别类似，我使用 T 形图标在文本框和父视图之间定义三个约束，使得左边距、顶部边距和右边距分别固定为
    100、32 和 10 px。添加这些约束的方式与之前类似，唯一不同的是现在需要将左侧的 T 形拖动到文本框。为 `wChC` 尺寸类别定义新约束后，我重新运行
    `AutoLayout` 应用，其视图现在取决于屏幕方向（图 3-23）。


    ![A453659_1_En_3_Fig23_HTML.jpg](img/A453659_1_En_3_Fig23_HTML.jpg)


    ## 图 3-23. AutoLayout 与尺寸类别结合使用，可以设计自适应视图，其中的控件会根据屏幕尺寸和方向调整大小并重新排列：竖屏（上）和横屏（下）

