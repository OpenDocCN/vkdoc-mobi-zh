  trans: '

    # 1. 基础


    在本章中，我将指导你安装本书所需的开发工具。具体来说，我们将安装 `Visual Studio for Mac` 以及 `Xcode`。后者是 Mac 开发者的原生工具集。它提供了
    IDE、SDK 以及我们将使用的设备模拟器。如果你已经安装了这些工具，可以直接跳到下一节。


    在确保所有工具就绪后，我们将为 iPhone 和 iPad 创建第一个 `Xamarin.iOS` 应用。这个应用如图 1-1 所示，它会显示各种提示并响应用户操作。我还将讨论
    `Visual Studio` 提供的可用项目模板。`Xcode` 中也提供了相同的模板，因此 `Xamarin.iOS` 和 `Visual Studio`
    让你能够以类似原生开发工具的方式访问 iOS 平台特定的编程接口，同时享有 `C#` 编程语言提供的便捷与流畅性。在本章中，我还将讨论在 `Visual Studio`
    中设计用户界面的基本方面，并向你展示如何将事件处理程序与可视控件触发的事件关联起来。


    **注意**


    在本章中，我不会详细讨论 `Visual Studio for Mac`。我只会讨论此 IDE 的必要元素。你可以在 Alessandro Del Sole
    所著的《*Beginning Visual Studio for Mac. Build Cross-Platform Apps with Xamarin and
    .NET Core*》一书中找到关于 `Visual Studio for Mac` 的全面描述。


    ![A453659_1_En_1_Fig1_HTML.jpg](img/A453659_1_En_1_Fig1_HTML.jpg)


    *图 1-1.* 我们将在本章中构建的“Hello, World!”应用。该应用在 iPhone X 模拟器中执行。


    ## 设置开发环境


    要安装 `Visual Studio for Mac`，你需要一台运行 macOS Sierra 10.12 或更高版本的 Mac。在这里，我将使用一台搭载
    macOS Sierra 10.16 的 MacBook Pro 或 iMac。确认你满足基本平台要求后，可以从以下网址下载 Visual Studio 安装程序：[`http://bit.ly/vs-mac`](http://bit.ly/vs-mac)。下载安装包后，运行安装程序。会出现一个窗口，如图
    1-2 所示。在此窗口中，双击带有向下箭头的图标。随后，你会看到一个对话框，提示你安装程序是从互联网下载的（图 1-3）。点击“打开”按钮继续。


    ![A453659_1_En_1_Fig3_HTML.jpg](img/A453659_1_En_1_Fig3_HTML.jpg)


    *图 1-3.* 确认对话框


    ![A453659_1_En_1_Fig2_HTML.jpg](img/A453659_1_En_1_Fig2_HTML.jpg)


    *图 1-2.* Visual Studio for Mac 的安装程序


    `Visual Studio 安装程序`现在将验证你的系统配置（图 1-4）。更具体地说，它会查找已安装的组件（如 Mono Framework、Java
    SDK 等），以验证哪些组件需要下载和安装。完成此操作后，图 1-4 所示窗口的顶部会出现另一个对话框。其标题显示“感谢您下载 Visual Studio。”在此对话框中，你只需按下“继续”按钮。


    ![A453659_1_En_1_Fig4_HTML.jpg](img/A453659_1_En_1_Fig4_HTML.jpg)


    *图 1-4.* Visual Studio 安装程序正在检查操作系统


    此时，Visual Studio 安装程序可能会提示你安装 `Xcode`（图 1-5）。仅当你尚未安装 `Xcode` 时才会出现此提示。根据此对话框，你可以在
    Visual Studio 安装的同时安装 `Xcode`。请注意，`Xcode` 的安装是可选的，并且取决于你当前的系统配置。我假设你从全新安装的 macOS
    开始，因此明确展示如何安装 `Xcode`。


    ![A453659_1_En_1_Fig5_HTML.jpg](img/A453659_1_En_1_Fig5_HTML.jpg)


    *图 1-5.* 提示安装 Xcode 的对话框


    要安装 `Xcode`，你可以按下图 1-5 中所示的“获取 Xcode”按钮。这会引导你到一个网站，在那里点击“在 Mac App Store 中查看”或“安装
    App”按钮。它将打开 App Store 中的 Xcode 页面，你只需点击“安装 App”按钮即可（图 1-6）。或者，要安装 `Xcode`，你也可以在本地打开
    Mac App Store，然后查找 `Xcode`。无论你选择哪种方法，`Xcode` 及所有相关的开发者工具都将在后台下载并安装。因此，你现在可以回到
    Visual Studio 安装程序。


    ![A453659_1_En_1_Fig6_HTML.jpg](img/A453659_1_En_1_Fig6_HTML.jpg)


    *图 1-6.* Mac App Store 中的 Xcode 页面


    Visual Studio 安装程序现在将让你选择要安装的组件（图 1-7）。为了减小安装体积，我取消选中“Android + Xamarin.Forms”条目，仅安装与
    iOS 和 macOS 相关的组件。然后，在你点击“安装”按钮后，实际的安装过程开始。


    ![A453659_1_En_1_Fig7_HTML.jpg](img/A453659_1_En_1_Fig7_HTML.jpg)


    *图 1-7.* 选择要安装的组件


    `Visual Studio` 现在将下载并安装组件。这需要一些时间，具体取决于网络速度。你会收到每个安装步骤和总体进度的通知，如图 1-8 所示。此外，如图所示，macOS
    在安装过程中可能会多次提示你输入管理员密码。安装完成后，会出现相应的对话框。请注意，要在模拟器中构建和运行应用，你需要等到 `Xcode` 安装完成。


    ![A453659_1_En_1_Fig8_HTML.jpg](img/A453659_1_En_1_Fig8_HTML.jpg)


    *图 1-8.* 安装 Visual Studio for Mac


    ## Hello, World! 应用


    安装好开发工具后，我们可以开始构建第一个应用。为了快速入门 `Xamarin.iOS` 开发，我将告诉你如何使用“单一视图应用”模板创建项目。然后，我们将为应用添加一个简单的按钮。这个按钮将对点击做出反应，从而显示原生提示。随后，我们将为此提示添加特定的操作。显示提示不仅是入门应用，也是真实应用的典型功能，其中它用于收集用户输入或获取执行不可逆操作的确认。

    '
- fmt: '### Creating the Project


    To create the project, open Visual Studio for Mac. A welcome screen, depicted
    in Figure [1-9](#A453659_1_En_1_Chapter.html#Fig9), appears. Then, you either
    choose `File/New Solution` in the menu bar or click the `New Project` button,
    located under the “Recent” header. This activates the `New Project` window, shown
    in Figure [1-10](#A453659_1_En_1_Chapter.html#Fig10).


    ![A453659_1_En_1_Fig10_HTML.jpg](A453659_1_En_1_Fig10_HTML.jpg)


    Figure 1-10. Project template selection


    ![A453659_1_En_1_Fig9_HTML.jpg](A453659_1_En_1_Fig9_HTML.jpg)


    Figure 1-9. A welcome screen for Visual Studio for Mac


    The `New Project` creator lets you choose a template for your project. To filter
    the list of templates to items directly related to iOS apps, you click `App` entry
    under the `iOS` tab. A list of available project templates will then appear on
    the right. This list is divided into two categories: `General` and `Games`. In
    this book, we will only use project templates from the `General` group. This category
    contains the following templates:


    *   `Single View App` — You use this template to create the app, which comprises
    a single view; i.e., an app without any navigation, like the app shown in Figure
    [1-1](#A453659_1_En_1_Chapter.html#Fig1).

    *   `Master-Detail App` — This template creates apps that use `Master-Detail`
    interface. In such cases, a list displays short descriptions of objects. Once
    you choose an object from this list (master), corresponding details will be displayed
    in the dedicated area (detail). `Master-Detail` interface is used, for example,
    in the Stocks iOS app (Figure [1-11](#A453659_1_En_1_Chapter.html#Fig11)).


    ![A453659_1_En_1_Fig11_HTML.jpg](A453659_1_En_1_Fig11_HTML.jpg)


    Figure 1-11. Representational view of a `Master-Detail` iOS app. The list of objects
    (companies) is shown on top. When you tap any of these objects, corresponding
    details (stock values) appear at the bottom.


    *   `Tabbed App` — You use this template to create a multi-tab application in
    which you can arrange visual controls in multiple tabs. User then navigates between
    tabs using labeled icons shown at the bottom of the screen. Such navigation is
    used in the Clock iOS app (Figure [1-12](#A453659_1_En_1_Chapter.html#Fig12)).


    ![A453659_1_En_1_Fig12_HTML.jpg](A453659_1_En_1_Fig12_HTML.jpg)


    Figure 1-12. An example of `Tabbed` iOS application. You switch between tabs using
    labeled icons displayed in the bottom part of the view


    *   `Page-based App` — Use this template to create a multi-view app in which controls
    are arranged in pages. The user swipes between pages with touch gestures. For
    instance, such page-based navigation is utilized in the Weather iOS app, shown
    in Figure [1-13](#A453659_1_En_1_Chapter.html#Fig13).


    ![A453659_1_En_1_Fig13_HTML.jpg](A453659_1_En_1_Fig13_HTML.jpg)


    Figure 1-13. Page-based navigation is utilized in the Weather app to switch between
    weather forecasts


    *   `WebView App` — You use this template to jumpstart hybrid app development.
    This project template creates a view with an embedded `WebView` control. The latter
    renders a website written with HTML, CSS, and JavaScript. I will tell you more
    about `WebView` in Chapter [3](#A453659_1_En_3_Chapter.html).


    To proceed further, let’s pick the `Single View App` project template and keep
    the default language selection of `C#`. Then, you will have the option to specify
    the name of your app and organization identifier (Figure [1-14](#A453659_1_En_1_Chapter.html#Fig14)).
    I set these values to `HelloWorld` and `com.db`, respectively. The next group
    of controls in app configuration lets you specify which devices will be supported
    by your app. In this case, I made my app universal and chose `iPad` and `iPhone`.
    The very last control in the app configuration screen is the `Target` drop-down
    list. You use this list to select the minimum iOS version that will be supported
    by your app. I set this to `iOS 9.0`. After configuring the app, press the `Next`
    button, which activates the view depicted in Figure [1-15](#A453659_1_En_1_Chapter.html#Fig15).


    ![A453659_1_En_1_Fig14_HTML.jpg](A453659_1_En_1_Fig14_HTML.jpg)


    Figure 1-14. iOS app configuration


    The `Project Summary` window shown in Figure [1-15](#A453659_1_En_1_Chapter.html#Fig15)
    displays the project and solution names. You can also use this screen to set the
    location for your source code, enable version control, and add an automated UI
    test project. Here, I keep the settings at their default values. I will tell you
    more about unit testing in Chapter [6](#A453659_1_En_6_Chapter.html). So, go ahead
    and press the `Create` button to proceed further. You will quickly see the `Getting
    Started` screen of Visual Studio (Figure [1-16](#A453659_1_En_1_Chapter.html#Fig16)).


    ![A453659_1_En_1_Fig15_HTML.jpg](A453659_1_En_1_Fig15_HTML.jpg)


    Figure 1-15. Project summary


    The `Getting Started` screen displays several options for you. Specifically, it
    lets you start designing the user interface (UI) of your app, add a mobile backend,
    and unit test the project. Also, on the left-hand side of this window you will
    see the `Solution Explorer`, which displays the structure of the `HelloWorld`
    app. Specifically, there is a `HelloWorld` solution, under which you can find
    the project of the same name (refer to Figure [1-15](#A453659_1_En_1_Chapter.html#Fig15)).
    This project contains the files that make up your app. They are discussed in more
    detail in the next chapter. For now, let’s create a simple UI for the `HelloWorld`
    app using the `Storyboard` (or iOS) Designer.


    ![A453659_1_En_1_Fig16_HTML.jpg](A453659_1_En_1_Fig16_HTML.jpg)


    Figure 1-16. `HelloWorld` project open in Visual Studio


    ### Storyboard Designer


    To start creating the UI, you can click the `Open Storyboard Designer` button.
    This will open the `Main.storyboard` file and activate the `Visual Interface`
    or `Storyboard Designer` (or simply `iOS Designer`) of Visual Studio. This designer
    is shown in Figure [1-17](#A453659_1_En_1_Chapter.html#Fig17). Three elements
    of this designer should be discussed in more detail, as follows:


    *   Visual preview of the app. This element covers the central part of the designer
    and lets you see how your views will be displayed in the device without your having
    to run your app. For multi-view apps, the visual preview will also depict the
    relationships between views (tabs or pages) through which the user can navigate.

    *   Toolbox, which is in the top-right corner, contains a list of visual objects
    you can drag on the view.

    *   `Properties` window, located below the Toolbox. You use the `Properties` window
    to change the appearance of and configure visual controls, to define the layout,
    and to wire methods to events (like tap or input) fired by controls.


    Note that you can also activate the preceding windows or pads using an appropriate
    menu option in Visual Studio: `View ➤ Pads` (see Figure [1-18](#A453659_1_En_1_Chapter.html#Fig18)).
    There is also one useful drop-down list in the preview mode. That is the `View
    As` list, which you can find on the top pane of the visual preview. The `View
    As` drop-down list lets you choose the device type to use for the preview. As
    shown in Figure [1-17](#A453659_1_En_1_Chapter.html#Fig17), I set this device
    to `iPhone 6`.


    ![A453659_1_En_1_Fig18_HTML.jpg](A453659_1_En_1_Fig18_HTML.jpg)


    Figure 1-18. View menu of Visual Studio


    ![A453659_1_En_1_Fig17_HTML.jpg](A453659_1_En_1_Fig17_HTML.jpg)


    Figure 1-17. Storyboard editor'
