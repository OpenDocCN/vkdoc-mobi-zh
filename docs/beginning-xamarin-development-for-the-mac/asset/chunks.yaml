- fmt: '*   `Active` – The app is running in the foreground and responds to user actions.
    This means that the app UI is visible to the user, and the user can interact with
    the app.

    *   `Inactive` – The app is running in the foreground but does not respond to
    user actions. In such cases, the UI can be still visible, but the app does not
    respond. This can happen, for example, when you activate multitask selection in
    your phone or simulator (refer back to Figure [1-24](#A453659_1_En_1_Chapter.html#Fig24)).

    *   `Background` – The app is running in the background, so its UI is invisible.
    However, the app can perform some sort of background operation like fetching data
    from an external web service.


    Let’s now see at what point the application event handlers are invoked during
    the application lifecycle. To this end, let’s start the app in a simulator and
    open `Application Output`. By default, this output is undocked and minimized,
    so to activate this window you will need to click `Application Output ➤ HelloWorld`
    bar, which is located in the bottom right part of the Visual Studio screen (Figure
    [2-1](#A453659_1_En_2_Chapter.html#Fig1)).


    ![A453659_1_En_2_Fig1_HTML.jpg](A453659_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    HelloWorld Application Output, showing the app lifecycle


    Right after running the app, you will see that there are three app events reported:
    `WillFinishLaunching`, `FinishedLaunching`, and `OnActivated` (Figure [2-1](#A453659_1_En_2_Chapter.html#Fig1)).
    The first, the `WillFinishLaunching` event handler, is invoked when the `UIApplication`
    gets created. Subsequently, after the app has launched, another method, `FinishedLaunching`,
    is invoked. Typically, this method is used to create the app window and display
    a view by setting the `RootViewController` property of the `Window` class. However,
    the HelloWorld app was created using a template. In such a case, the default view
    is configured in the main storyboard. As I will explain later, this is done by
    setting the `initialViewController` attribute of the `document` XML tag. Note
    that the app is inactive until it is activated. An app activation is reported
    by the dedicated event, `OnActivated`. Once the app is active, its UI becomes
    visible, and you can start tapping the buttons we created previously. The app
    will respond to your requests.


    By comparing the definitions of `WillFinishLaunching` and `FinishedLaunching`
    to all other event handlers related to the app lifecycle, we can see that they
    contain an additional argument, `launchOptions`. This argument is of type `NSDictionary`
    and comprises a set of key–value entries. These entries allow you to determine
    how your app was launched and what kind of launch parameters were passed to the
    app. You can find a list of all available keys along with an example of how to
    use them here: [`http://bit.ly/launch_options`](http://bit.ly/launch_options)
    .


    Let’s now see what happens when we send the app to the background. You can do
    this in the simulator by pressing the following keyboard shortcut keys: `COMMAND
    + SHIFT + H`. The app will disappear, and you will see that another two event
    handlers are invoked: `OnResignActivation` and `DidEnterBackground`. You use the
    first one to save the application state or release any resources that the app
    does not need when inactive. After `OnResignActivation`, the `DidEnterBackground`
    app event is raised. It informs you that the app state has been changed to background
    (refer back to Figure [2-1](#A453659_1_En_2_Chapter.html#Fig1)).


    You can now send the HelloWorld app to the foreground by pressing its icon in
    the simulator (see Figure [2-2](#A453659_1_En_2_Chapter.html#Fig2)). Another two
    app events are fired: `WillEnterForeground` and `OnActivated`. They correspond
    to the two app events raised when the app was put in the background, so their
    usage is reversed. Namely, `WillEnterForeground` informs you that the app is about
    to enter the foreground so you can use the appropriate event handler to restore
    the app state and prepare all the resources your app needs in the foreground.
    Subsequently, the app is activated, and you are notified about that through the
    `OnActivated` event.


    ![A453659_1_En_2_Fig2_HTML.jpg](A453659_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Simulator home screen with HelloWorld app icon


    Finally, let’s see what happens when you kill the app through multitasking (which
    you can activate , as in the previous chapter, by clicking the home button twice).
    In such a case, three events are reported: `OnResignActivation`, `DidEnterBackground`,
    and `WillTerminate`. The first two are raised when you activate multitasking.
    So, up to this point, everything works the same as it would if you just put your
    app in the background. Once the app is about to terminate, an additional event
    is raised, `WillTerminate`. You use this event to clean up any resources used
    when your app was working in the background.'
