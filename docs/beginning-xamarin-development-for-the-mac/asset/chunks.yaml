- fmt: '### Updating Data


    You already know how to delete and retrieve the list of objects from the REST
    API. You can also update users or add new ones with the `PutAsync` and `PostAsync`
    methods of the `HttpClient` class, respectively. In both cases, you proceed similarly,
    so I will only discuss a method of updating user data. Listing [7-7](#A453659_1_En_7_Chapter.html#Par24)
    contains the `Update` method of the `UsersServiceClientHelper` class. This method
    accepts a single argument, an instance of the `User` class, which contains updated
    user data. This data is sent to the REST API using the `PutAsync` method.


    Before you can send updated data to the web server, you need to convert or serialize
    the C# to the JSON object. You do so by using the `SerializeObject` static method
    of the `JsonConvert` class. Then, you send the identifier of the user to be updated
    and the serialized object. You also need to set the format of the transmitted
    data: string, byte array, or stream. To that end, you use one of the classes `StringContent`,
    `ByteArrayContent`, or `StreamContent`, respectively. In Listing [7-7](#A453659_1_En_7_Chapter.html#Par24),
    I show how to use the first of these, which I instantiate with the string returned
    by the `JsonConvert.SerializeObject` method. I then put the method from Listing
    [7-7](#A453659_1_En_7_Chapter.html#Par24) in the `UsersServiceHelper` class.


    ```

    public static async Task Update(User user)

    {

    var userJson = JsonConvert.SerializeObject(user);

    var response = await httpClient.PutAsync($"{user.Id}",

    new StringContent(userJson));

    CheckStatusCode(response.StatusCode);

    }

    Listing 7-7.

    Updating User Data

    ```


    ### Getting a Specific User


    To get a single user, you need to supplement the `GET` request with a user identifier.
    This can be done in a way similar to the case of the `Update` method from Listing
    [7-7](#A453659_1_En_7_Chapter.html#Par24). In Listing [7-8](#A453659_1_En_7_Chapter.html#Par26),
    I show a complete example of the overloaded `UsersServiceClientHelper.Get` method,
    which aims at receiving individual users distinguished by identifiers. It works
    similarly to the `Get` method from Listing [7-4](#A453659_1_En_7_Chapter.html#Par16)
    but retrieves only a single `User` class instance representing the user of a given
    ID.


    ```

    public static async Task Get(int userId)

    {

    var response = await httpClient.GetAsync($"{userId}");

    CheckStatusCode(response.StatusCode);

    var jsonString = await response.Content.ReadAsStringAsync();

    return JsonConvert.DeserializeObject(jsonString);

    }

    Listing 7-8.

    Retrieving Users by ID

    ```


    ## Testing the REST Client


    Now, when we have the REST client class implemented we can verify its functionality.
    Because we already know how to write unit tests, we can test the client class
    automatically. To create unit tests for `UsersServiceClientHelper`, I start with
    a new Unit Test App template and change its name to `Users.MobileClient.Tests`.
    Then, I edit references such that `Users.MobileClient.Tests` references the `Users.MobileClient`
    project. Subsequently, under the test app, I add a new file, `UsersServiceHelperTests.cs`,
    in which I import the following namespaces: `System.Linq`, `System.Threading.Tasks`,
    `NUnit.Framework`, and `Users.MobileClient.Helpers`. Then, I declare the `UsersServiceHelperTests`
    class as shown in Listing [7-9](#A453659_1_En_7_Chapter.html#Par28).


    ```

    [TestFixture]

    public class UsersServiceHelperTests

    Listing 7-9.

    A Test Class for the UsersServiceHelper

    ```


    To define the `UsersServiceHelperTests` class, I first create two private members,
    shown in Listing [7-10](#A453659_1_En_7_Chapter.html#Par30). The first one, `UserId`,
    is a field that stores a default user identifier I will use to validate the `Get`
    and `Update` methods. The second one is a private function, `GetUserCount`, which
    calculates the number of elements in a collection of users received from the REST
    API.


    ```

    private const int UserId = 5;

    private async Task GetUserCount()

    {

    return (await UsersServiceHelper.Get()).Count();

    }

    Listing 7-10.

    Private Members of UsersServiceHelperTest

    ```


    Given the preceding private members, I write the first test method, `VerifyGet`,
    which validates the number of elements returned by the REST API (Listing [7-11](#A453659_1_En_7_Chapter.html#Par32)).
    From the JSONPlaceholder website, I know that the Users resource has ten elements.
    So, in the `VerifyGet` method, I compare this expected value to that returned
    by the `GetUserCount` helper from Listing [7-10](#A453659_1_En_7_Chapter.html#Par30).


    ```

    [Test]

    public async void VerifyGet()

    {

    // Arrange

    const int expectedDataCount = 10;

    // Act and Assert

    Assert.AreEqual(expectedDataCount, await GetUserCount());

    }

    Listing 7-11.

    Testing a Get Method by Verifying the Number of Returned Elements

    ```


    Next, I implement another test method, `VerifyGetById`, shown in Listing [7-12](#A453659_1_En_7_Chapter.html#Par34).
    This function checks whether two selected public properties of the user retrieved
    from the REST API possess expected values. Here, I only check the `Name` and `Email`
    properties of the user with identifier `5`.


    ```

    [Test]

    public async void VerifyGetById()

    {

    // Arrange

    const string expectedName = "Chelsey Dietrich";

    const string expectedEmail = "Lucio_Hettinger@annie.ca";

    // Act

    var user = await UsersServiceHelper.Get(UserId);

    // Assert

    Assert.AreEqual(expectedName, user.Name);

    Assert.AreEqual(expectedEmail, user.Email);

    }

    Listing 7-12.

    Validating Selected Properties of the User Object Retrieved from the REST API

    ```


    After writing test methods for the `Get` functions of the `UsersServiceHelper`,
    I implement another two tests, which are shown in Listings [7-13](#A453659_1_En_7_Chapter.html#Par36)
    and [7-14](#A453659_1_En_7_Chapter.html#Par38). The first one, `VerifyDelete`,
    checks if the number of elements in the Users resource will be decremented after
    removing one item. To that end, I first read the number of users and store it
    in the `currentDataCount` variable. Then, I delete the user of ID `5` and get
    the user count again. Finally, I check if the actual user count was indeed decremented.


    ```

    [Test]

    public async void VerifyDelete()

    {

    // Arrange

    var currentDataCount = await GetUserCount();

    var expectedDataCount = currentDataCount - 1;

    // Act

    await UsersServiceHelper.Delete(UserId);

    var actualDataCount = await GetUserCount();

    // Assert

    Assert.AreEqual(expectedDataCount, actualDataCount);

    }

    Listing 7-13.

    Checking if the Delete Method Reduces the Number of Users in the Web Service

    ```'
