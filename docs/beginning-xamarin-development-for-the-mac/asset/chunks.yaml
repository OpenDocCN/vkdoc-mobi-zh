- fmt: "# View Lifecycle\n\nIn the previous section, we learned about the app lifecycle.\
    \ A similar mechanism is also available for individual views. View events are\
    \ represented by appropriate event handlers implemented in the `UIViewController`\
    \ class. You override these handlers in the derived class associated with the\
    \ particular view (its view controller). Event handlers of the view lifecycle\
    \ are utilized to prepare the view. For instance, you first restore data from\
    \ a device’s memory and then use these data to update controls. So, the controls\
    \ are ready to present data before the view is presented to the user.\n\nTo demonstrate\
    \ when particular view events are fired, I modify the source code of the `ViewController`\
    \ class by adding methods from Listing [2-5](#A453659_1_En_2_Chapter.html#Par26).\
    \ Again, there is one private helper method, `DisplayInfo`. It is used to display\
    \ the name of the actual view event. Then, I use this method in the following\
    \ five view event handlers: `ViewDidLoad`, `ViewWillAppear`, `ViewDidAppear`,\
    \ `ViewWillDisappear`, and `ViewDidDisappear`. Therefore, I can track the view\
    \ lifecycle.\n\n```\npublic override void ViewDidLoad()\n{\nbase.ViewDidLoad();\n\
    DisplayInfo(\"ViewDidLoad\");\n}\npublic override void ViewWillAppear(bool animated)\n\
    {\nbase.ViewWillAppear(animated);\nDisplayInfo(\"ViewWillAppear\");\n}\npublic\
    \ override void ViewDidAppear(bool animated)\n{\nbase.ViewDidAppear(animated);\n\
    DisplayInfo(\"ViewDidAppear\");\n}\npublic override void ViewWillDisappear(bool\
    \ animated)\n{\nbase.ViewWillDisappear(animated);\nDisplayInfo(\"ViewWillDisappear\"\
    );\n}\npublic override void ViewDidDisappear(bool animated)\n{\nbase.ViewDidDisappear(animated);\n\
    DisplayInfo(\"ViewDidDisappear\");\n}\nprivate void DisplayInfo(string eventName)\n\
    {\nDebug.WriteLine($\"View event: {eventName}\");\n}\nListing 2-5. Handling the\
    \ View Lifecycle\n```\n\nNote that in order to use the `Debug` class you will\
    \ need to import the `System.Diagnostics` namespace by supplementing the file\
    \ header with the following statement:\n\n```\nusing System.Diagnostics;\n```\n\
    \nAfter re-running the app in the simulator, we will see a list of app and view\
    \ events in the Application Output Window (Figure [2-3](#A453659_1_En_2_Chapter.html#Fig3)).\
    \ As we can expect, the first view event handler, `ViewDidLoad`, is invoked right\
    \ after the app is loaded. Then, when the view is loaded, another two events are\
    \ fired: `ViewWillAppear` and `ViewDidAppear`. You use them to implement a logic\
    \ that prepares the view before it is displayed to the user.\n\nTo induce other\
    \ view events, `ViewWillDisappear` and `ViewDidDisappear`, I terminated the app\
    \ using iOS multitasking. So, `ViewWillDisappear` and `ViewDidDisappear` events\
    \ are invoked right after the app enters the background (see bottom lines of the\
    \ application output in Figure [2-3](#A453659_1_En_2_Chapter.html#Fig3)).\n\n\
    ![A453659_1_En_2_Fig3_HTML.jpg](A453659_1_En_2_Fig3_HTML.jpg)\n\nFigure 2-3. Application\
    \ output showing events fired during consecutive steps of the app and view lifecycles\n\
    \nAs I will show later in this chapter, `ViewWillDisappear` and `ViewDidDisappear`\
    \ are employed to store data when or after the view disappears.\n\n## Information\
    \ Property List\n\nSo far, we have only discussed files that contained the C#\
    \ code. However, the HelloWorld project also has several other files, which are\
    \ required by all iOS apps. One such file is the Information Property List (`Info.plist`).\
    \ This file defines application configuration. When you double-click this file\
    \ in the Solution Explorer, you will see the editor featured in Figure [2-4](#A453659_1_En_2_Chapter.html#Fig4).\
    \ This editor has the following tabs, which you use to configure different options:\n\
    \n![A453659_1_En_2_Fig4_HTML.jpg](A453659_1_En_2_Fig4_HTML.jpg)\n\nFigure 2-4.\
    \ Information Property List Editor in Visual Studio\n\n*   Application – You use\
    \ this tab to specify the following:\n    *   App identity: application name,\
    \ bundle identifier, and version\n    *   Deployment information: target iOS version,\
    \ device family (iPhone, iPad, or Universal), the name of the storyboard, which\
    \ defines the user interface of the app (main interface), available app orientations,\
    \ and configure status bar appearance\n    *   App icons and launch images: used\
    \ to specify the name of the collection with icons and the name of the storyboard,\
    \ which will be displayed during app launch—the so-called launch or splash screen\n\
    \    *   Artwork for iTunes\n    *   Enable Game Center and Maps Integration and\
    \ configure Background Modes.\n*   Advanced – In this tab you will configure the\
    \ Document Types and Universal Type Identifiers (UTIs) of the files that your\
    \ app will support. Document Types, like PDFs, are used to define files that your\
    \ app will support. On the other hand, UTIs refer to custom file types. You can\
    \ also use the Advanced tab to define URL schemas for your app.\n*   Source –\
    \ This is the tab that you use to define custom properties for your app. This\
    \ feature is required in order to access specific functionalities of the iOS,\
    \ like geolocation of the device.\n\n## Entitlements Property List\n\nEntitlements\
    \ Property List, defined in the `Entitlements.plist` file, specifies the app’s\
    \ capabilities. When you open this file, Visual Studio for Mac activates the editor\
    \ featured by Figure [2-5](#A453659_1_En_2_Chapter.html#Fig5). This editor has\
    \ two tabs: Application and Source. The first one is a graphical representation\
    \ of various app capabilities (like iCloud integration or push notifications)\
    \ you can enable, while the Source tab lets you define custom capabilities.\n\n\
    ![A453659_1_En_2_Fig5_HTML.jpg](A453659_1_En_2_Fig5_HTML.jpg)\n\nFigure 2-5. Entitlements\
    \ Property List Editor in Visual Studio"
