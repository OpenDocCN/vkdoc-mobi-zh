    ### 更新数据


    你已经知道如何通过 REST API 删除和检索对象列表。你还可以分别使用 `HttpClient` 类的 `PutAsync` 和 `PostAsync`
    方法来更新用户或添加新用户。在这两种情况下，操作步骤相似，因此我将只讨论一种更新用户数据的方法。清单 7-7 包含了 `UsersServiceClientHelper`
    类的 `Update` 方法。该方法接受一个参数，即 `User` 类的实例，其中包含已更新的用户数据。这些数据通过 `PutAsync` 方法发送到 REST
    API。


    在将更新后的数据发送到 Web 服务器之前，你需要将 C# 对象转换或序列化为 JSON 对象。你可以通过使用 `JsonConvert` 类的 `SerializeObject`
    静态方法来做到这一点。然后，发送待更新用户的标识符和序列化后的对象。你还需要设置传输数据的格式：字符串、字节数组或流。为此，你可以分别使用 `StringContent`、`ByteArrayContent`
    或 `StreamContent` 类。在清单 7-7 中，我将展示如何使用第一个类，我使用 `JsonConvert.SerializeObject` 方法返回的字符串实例化它。然后，我将清单
    7-7 中的方法放入 `UsersServiceHelper` 类中。


    ```

    public static async Task Update(User user)

    {

    var userJson = JsonConvert.SerializeObject(user);

    var response = await httpClient.PutAsync($"{user.Id}",

    new StringContent(userJson));

    CheckStatusCode(response.StatusCode);

    }

    清单 7-7.

    更新用户数据

    ```


    ### 获取特定用户


    要获取单个用户，你需要使用用户标识符补充 `GET` 请求。这可以通过类似于清单 7-7 中 `Update` 方法的方式来完成。在清单 7-8 中，我展示了一个重载的
    `UsersServiceClientHelper.Get` 方法的完整示例，该方法旨在接收由标识符区分的单个用户。其工作方式类似于清单 7-4 中的 `Get`
    方法，但仅检索代表给定 ID 用户的单个 `User` 类实例。


    ```

    public static async Task Get(int userId)

    {

    var response = await httpClient.GetAsync($"{userId}");

    CheckStatusCode(response.StatusCode);

    var jsonString = await response.Content.ReadAsStringAsync();

    return JsonConvert.DeserializeObject(jsonString);

    }

    清单 7-8.

    按 ID 检索用户

    ```


    ## 测试 REST 客户端


    现在，我们已经实现了 REST 客户端类，可以验证其功能了。由于我们已经知道如何编写单元测试，我们可以自动测试客户端类。为了创建 `UsersServiceClientHelper`
    的单元测试，我从一个新的单元测试应用模板开始，并将其名称更改为 `Users.MobileClient.Tests`。然后，我编辑引用，使 `Users.MobileClient.Tests`
    引用 `Users.MobileClient` 项目。接着，在测试应用下，我添加一个新文件 `UsersServiceHelperTests.cs`，并在其中导入以下命名空间：`System.Linq`、`System.Threading.Tasks`、`NUnit.Framework`
    和 `Users.MobileClient.Helpers`。然后，我声明 `UsersServiceHelperTests` 类，如清单 7-9 所示。


    ```

    [TestFixture]

    public class UsersServiceHelperTests

    清单 7-9.

    UsersServiceHelper 的测试类

    ```


    为了定义 `UsersServiceHelperTests` 类，我首先创建两个私有成员，如清单 7-10 所示。第一个成员 `UserId` 是一个字段，存储我将用于验证
    `Get` 和 `Update` 方法的默认用户标识符。第二个成员是一个私有函数 `GetUserCount`，用于计算从 REST API 接收到的用户集合中的元素数量。


    ```

    private const int UserId = 5;

    private async Task GetUserCount()

    {

    return (await UsersServiceHelper.Get()).Count();

    }

    清单 7-10.

    UsersServiceHelperTests 的私有成员

    ```


    基于上述私有成员，我编写第一个测试方法 `VerifyGet`，用于验证 REST API 返回的元素数量（清单 7-11）。从 JSONPlaceholder
    网站得知，Users 资源有十个元素。因此，在 `VerifyGet` 方法中，我将这个预期值与清单 7-10 中的 `GetUserCount` 辅助方法返回的值进行比较。


    ```

    [Test]

    public async void VerifyGet()

    {

    // 安排

    const int expectedDataCount = 10;

    // 执行并断言

    Assert.AreEqual(expectedDataCount, await GetUserCount());

    }

    清单 7-11.

    通过验证返回元素数量来测试 Get 方法

    ```


    接下来，我实现另一个测试方法 `VerifyGetById`，如清单 7-12 所示。该函数检查从 REST API 检索到的用户的两个选定公共属性是否具有预期值。这里，我只检查标识符为
    `5` 的用户的 `Name` 和 `Email` 属性。


    ```

    [Test]

    public async void VerifyGetById()

    {

    // 安排

    const string expectedName = "Chelsey Dietrich";

    const string expectedEmail = "Lucio_Hettinger@annie.ca";

    // 执行

    var user = await UsersServiceHelper.Get(UserId);

    // 断言

    Assert.AreEqual(expectedName, user.Name);

    Assert.AreEqual(expectedEmail, user.Email);

    }

    清单 7-12.

    验证从 REST API 检索到的用户对象的选定属性

    ```


    在为 `UsersServiceHelper` 的 `Get` 函数编写了测试方法后，我再实现另外两个测试，如清单 7-13 和 7-14 所示。第一个测试方法
    `VerifyDelete` 检查删除一个项目后 Users 资源中的元素数量是否减少。为此，我首先读取用户数量并将其存储在 `currentDataCount`
    变量中。然后，我删除 ID 为 `5` 的用户并再次获取用户数量。最后，我检查实际用户数量是否确实减少了。


    ```

    [Test]

    public async void VerifyDelete()

    {

    // 安排

    var currentDataCount = await GetUserCount();

    var expectedDataCount = currentDataCount - 1;

    // 执行

    await UsersServiceHelper.Delete(UserId);

    var actualDataCount = await GetUserCount();

    // 断言

    Assert.AreEqual(expectedDataCount, actualDataCount);

    }

    清单 7-13.

    检查 Delete 方法是否减少了 Web 服务中的用户数量

