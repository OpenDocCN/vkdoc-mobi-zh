- fmt: '# REST Service Client


    To implement the `Users.MobileClient` app, I start by creating the new iOS project
    using the Single View App template. Then, I add two dependencies, which I will
    use to communicate with the REST API over the HTTP:


    * `System.Net.Http`, which provides the implementation of the `HttpClient` class,
    which I use to communicate with the REST API

    * `Newtonsoft.Json` or `Json.NET` NuGet package, which implements several classes
    and methods used to serialize and deserialize JSON objects. More specifically,
    with this package you can almost automatically map the response received from
    the web service to the C# object or collection of such objects.


    To reference the `System.Net.Http` assembly, I right-click the References node
    of the `Users.MobileClient` app and choose "Edit References," which opens the
    window shown in Figure [7-2](#A453659_1_En_7_Chapter.html#Fig2). Subsequently,
    on the All tab, I check "`System.Net.Http`."


    ![A453659_1_En_7_Fig2_HTML.jpg](A453659_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Adding a reference to `System.Net.Http`


    I install the `Newtonsoft.Json` NuGet package using the Add Packages window, in
    which I type `Newtonsoft.Json` (Figure [7-3](#A453659_1_En_7_Chapter.html#Fig3)).
    Then, I check the first item on the list of packages and click the Add Package
    button.


    Given the project and all dependencies are ready, under the `Users.MobileClient`
    project, I create the new folder, `Helpers`, where I add a file, `UsersServiceHelper.cs`,
    which stores the static class of the same name. This class, `UsersServiceHelper`,
    is used to send requests to the REST API. As Listing [7-2](#A453659_1_En_7_Chapter.html#Par12)
    shows, `UsersServiceHelper` implements a static constructor that creates the `HttpClient`
    class instance. To that end, I use the parameterless constructor of the `HttpClient`
    and set its `BaseAddress` property to the URL of the REST API (Users resource
    from JSONPlaceholder). Once this is done, you can start sending requests to the
    REST API using the appropriate methods from the `HttpClient` class instance. These
    methods implement corresponding REST verbs. For example, to delete the user you
    use the `DeleteAsync` method (Listing [7-3](#A453659_1_En_7_Chapter.html#Par14)).


    ![A453659_1_En_7_Fig3_HTML.jpg](A453659_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Installing the `Newtonsoft.Json` aka `Json.NET` NuGet package


    ```

    private static readonly HttpClient httpClient;

    static UsersServiceHelper()

    {

    httpClient = new HttpClient()

    {

    BaseAddress = new Uri("http://jsonplaceholder.typicode.com/users/")

    };

    }

    ```


    Listing 7-2. A Constructor of the `UsersServiceHelper` Class


    Each particular method of the `HttpClient` class implementing the HTTP requests
    returns an object of type `HttpResponseMessage`. The latter, as its name suggests,
    is an abstract representation of the web server response. So, to check the status
    of the request and to obtain data returned from the server, you read properties
    of the `HttpResponseMessage`. In Listing [7-3](#A453659_1_En_7_Chapter.html#Par14),
    I showed how to check the HTTP status code by accessing the `StatusCode` property.
    This property is of type `HttpStatusCode` enumeration and contains all possible
    HTTP status codes. To obtain the actual data received from the web service, you
    use the `Content` property of type `HttpContent`. This class represents the body
    of the HTTP message and has several methods that enable you to read and convert
    the body to specific formats: string (`ReadAsStringAsync` method), byte array
    (`ReadAsByteArray` async), or stream (`ReadAsStreamAsync`).


    ```

    public static async Task Delete(int userId)

    {

    var response = await httpClient.DeleteAsync($"{userId}");

    CheckStatusCode(response.StatusCode);

    }

    private static void CheckStatusCode(HttpStatusCode statusCode)

    {

    if(statusCode != HttpStatusCode.OK)

    {

    throw new Exception($"Unexpected status code: {statusCode}");

    }

    }

    ```


    Listing 7-3. Deleting the User


    In Listing [7-4](#A453659_1_En_7_Chapter.html#Par16), which shows the `Get` method
    of the `UsersServiceHelper` class, I use the `ReadAsStringAsync` method because
    data returned from the web service is written in the JSON format (Listing [7-4](#A453659_1_En_7_Chapter.html#Par16)).
    Given that string, I deserialize it to the collection of `User` .NET objects using
    the `DeserializeObject` static method of the `JsonConvert` class. The latter class
    comes from `Newtonsoft.Json` and is the main class that you use to convert between
    JSON and .NET objects.


    ```

    public static async Task> Get()

    {

    var response = await httpClient.GetAsync(string.Empty);

    CheckStatusCode(response.StatusCode);

    var jsonString = await response.Content.ReadAsStringAsync();

    return JsonConvert.DeserializeObject>(jsonString);

    }

    ```


    Listing 7-4. Retrieving the List of Users from the REST API


    Note that in order to convert .NET and C# objects properly you need to implement
    C# classes whose properties correspond to the appropriate keys in the JSON objects.
    To make things easier, you can use one of the available online services that generate
    C# classes based on the JSON object. Here, I use the [`https://jsonutils.com`](https://jsonutils.com)
    website, where I paste the JSON object from Listing [7-1](#A453659_1_En_7_Chapter.html#Par5)
    into the JSON text or URL text areas, select C# language, and check "Pascal Case."
    After pressing the Submit button, the website generates four classes: `Geo`, `Address`,
    `Company`, and `Example`. I renamed the latter class to `User` and then stored
    all of these classes in separate files under the `Models` folder, which I add
    to the `Users.MobileClient` project.


    As Listing [7-5](#A453659_1_En_7_Chapter.html#Par19) shows, the definition of
    the `User` class contains eight auto-implemented public properties that directly
    correspond to the keys of the JSON object (Listing [7-1](#A453659_1_En_7_Chapter.html#Par5)).
    Properties of complex types (`Address` and `Company`) are represented by classes
    of the same names. Their structure is similar to the `User` class. Namely, they
    contain appropriate auto-implemented public properties. So, I do not list them
    here. You can find them in the companion code (`Chapter_07/Users.MobileClient/Models`).


    ```

    public class User

    {

    public int Id { get; set; }

    public string Name { get; set; }

    public string Username { get; set; }

    public string Email { get; set; }

    public Address Address { get; set; }

    public string Phone { get; set; }

    public string Website { get; set; }

    public Company Company { get; set; }

    }

    ```


    Listing 7-5. A Definition of the `User` Class


    The only modification I made to these autogenerated classes was to extend the
    `Geo` class by another method, `ToCLLocationCoordinate2D` (Listing [7-6](#A453659_1_En_7_Chapter.html#Par21)),
    which converts instances of the `Geo` class to `CLLocationCoordiante2D`. I will
    use this method later to display the user''s location on the native map.


    ```

    using CoreLocation;

    namespace Users.MobileClient.Models

    {

    public class Geo

    {

    public double Lat { get; set; }

    public double Lng { get; set; }

    public CLLocationCoordinate2D ToCLLocationCoordinate2D()

    {

    return new CLLocationCoordinate2D(Lat, Lng);

    }

    }

    }

    ```


    Listing 7-6. A Definition of the `Geo` Class Is Extended by One Public Method'
