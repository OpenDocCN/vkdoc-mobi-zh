- fmt: "## Basic Controls\n\nWe have already worked with several basic controls, like\
    \ buttons, labels, text fields, and images. In this section, I will show you another\
    \ three controls: a switch, a slider, and a view. More specifically, I will tell\
    \ you how to utilize these controls to create an app, shown in Figure [3-1](#A453659_1_En_3_Chapter.html#Fig1).\
    \ In this app, the orange view of square shape is translated when you change a\
    \ slider value. The translation direction depends on the switch state—the square\
    \ translates vertically if the switch is on, and horizontally otherwise. So, additionally,\
    \ you will learn how to dynamically change the position of any control.\n\n![A453659_1_En_3_Fig1_HTML.jpg](A453659_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1.\n\nUI of the app illustrating sample usage of switch and slider\n\
    \nTo implement the app shown in Figure [3-1](#A453659_1_En_3_Chapter.html#Fig1),\
    \ I started by creating a new single view application (universal app compatible\
    \ with iOS 9.0 and above) and set its name to `InputControls`. Then, I supplemented\
    \ the main view of the app with four controls: switch, label, slider, and view\
    \ (you can find all these controls in the toolbox). Controls were arranged as\
    \ shown in Figure [3-1](#A453659_1_En_3_Chapter.html#Fig1), and their properties\
    \ were configured as follows:\n\n*   Switch:\n    *   Name: `SwitchIsVertical`\n\
    *   Slider:\n    *   Name: `SliderShift`\n*   View:\n    *   Name: `ViewMoveableSquare`\n\
    \    *   Background: Orange\n    *   Width and height (Layout tab): 50\n\nGiven\
    \ the UI, I start implementing the logic layer. To that end, I modify the definition\
    \ of the `ViewController` class (`ViewController.cs`). I declare a private member\
    \ `initialSquareCenter` and implement four helper methods (Listing [3-1](#A453659_1_En_3_Chapter.html#Par15)\
    \ and Listing [3-2](#A453659_1_En_3_Chapter.html#Par17)). Two methods from Listing\
    \ [3-1](#A453659_1_En_3_Chapter.html#Par15) are used to store the initial location\
    \ of the square and recenter it when user changes the translation direction with\
    \ a switch. To obtain and update the location of the square, I use the `Center`\
    \ property of the `View` control. This property is of type `CoreGraphics.CGPoint`,\
    \ which is a struct representing a point in a plane. To use this type, you need\
    \ to import the `CoreGraphics` namespace in the header of the `ViewController.cs`\
    \ file:\n\n```\nusing CoreGraphics;\n```\n\n```\nprivate CGPoint initialSquareCenter;\n\
    private void StoreSquareCenter()\n{\ninitialSquareCenter = ViewMoveableSquare.Center;\n\
    }\nprivate void RecenterSquare()\n{\nViewMoveableSquare.Center = initialSquareCenter;\n\
    }\nListing 3-1.\nManaging Initial Location of the Moveable Square (Orange View)\n\
    ```\n\nTwo other helpers, shown in Listing [3-2](#A453659_1_En_3_Chapter.html#Par17),\
    \ are utilized to actually translate the square over the available range. This\
    \ range depends on the width (horizontal translation) or height (vertical translation)\
    \ of the device’s screen (see `AdjustSliderRange` method from Listing [3-2](#A453659_1_En_3_Chapter.html#Par17)).\
    \ I additionally reduce this range by a half of the square’s side length, so the\
    \ square will be always visible within the main view. To translate the square,\
    \ I add the shift value (obtained from the slider value) to the X or Y coordinate\
    \ of the initial square location. Effectively, this changes the point coordinates,\
    \ and hence translates the square in a selected direction. As Listing [3-2](#A453659_1_En_3_Chapter.html#Par17)\
    \ shows, I add the shift value to either the X or the Y property of the `CGPoint`\
    \ (instantiated with `initialSquareCenter`), depending on the state of the switch\
    \ control. If it is on (`On` property is true), I change the Y coordinate. Otherwise,\
    \ I update the X coordinate.\n\n```\nprivate void AdjustSliderRange()\n{\nvar\
    \ margin = ViewMoveableSquare.Frame.Width / 2.0;\nvar range = SwitchIsVertical.On\
    \ ? View.Frame.Height : View.Frame.Width;\nvar maxShiftValue = Convert.ToInt32(range\
    \ / 2.0 - margin);\nSliderShift.MinValue = -maxShiftValue;\nSliderShift.MaxValue\
    \ = maxShiftValue;\nSliderShift.Value = 0;\n}\nprivate void TranslateSquare()\n\
    {\nvar newCenter = new CGPoint(initialSquareCenter);\nif (!SwitchIsVertical.On)\n\
    {\nnewCenter.X += SliderShift.Value;\n}\nelse\n{\nnewCenter.Y += SliderShift.Value;\n\
    }\nViewMoveableSquare.Center = newCenter;\n}\nListing 3-2.\nAdjusting a Slider\
    \ Range\n```\n\nI use the preceding helper methods in the `ViewDidLoad` view event\
    \ handler (Listing [3-3](#A453659_1_En_3_Chapter.html#Par19)) and in two event\
    \ handlers associated with the `ValueChanged` events of the switch and slider\
    \ (Listing [3-4](#A453659_1_En_3_Chapter.html#Par20)). I created these event handlers\
    \ with the Events tab of the Control Properties pad. A default definition of `ViewDidLoad`\
    \ was modified such that the initial position of the square is stored whenever\
    \ the view is loaded. This is used to recenter the square within the view whenever\
    \ the user taps a switch control. When the user changes a slider value, the second\
    \ event handler from Listing [3-4](#A453659_1_En_3_Chapter.html#Par20) is invoked.\
    \ This event handler uses the `TranslateSquare` method shown previously in Listing\
    \ [3-2](#A453659_1_En_3_Chapter.html#Par17). So, when you run the app you will\
    \ see the results shown in Figure [3-1](#A453659_1_En_3_Chapter.html#Fig1).\n\n\
    ```\npublic override void ViewDidLoad()\n{\nbase.ViewDidLoad();\nStoreSquareCenter();\n\
    AdjustSliderRange();\n}\nListing 3-3.\nStore Actual Square Position and Adjust\
    \ Slider Range\n```\n\n```\npartial void SwitchIsVertical_ValueChanged(UISwitch\
    \ sender)\n{\nRecenterSquare();\nAdjustSliderRange();\n}\npartial void SliderShift_ValueChanged(UISlider\
    \ sender)\n{\nTranslateSquare();\n}\nListing 3-4.\nSquare Position Is Controled\
    \ with Two Controls: Switch and Slider\n```\n\n## Tables\n\nMany mobile apps are\
    \ dedicated to displaying data obtained from web services. To display such data\
    \ in an organized way, you typically use the Table View . In this section, I will\
    \ tell you how to create a table presenting a list of colors along with their\
    \ names (Figure [3-2](#A453659_1_En_3_Chapter.html#Fig2)). We will then modify\
    \ the table’s data source such that a user can delete and mark selected items\
    \ and also obtain detailed information about the color through the `UIAlertController`.\
    \ By completing this sample, you will know how to create tables that will respond\
    \ to user requests via native iOS interfaces.\n\n![A453659_1_En_3_Fig2_HTML.jpg](A453659_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2.\n\nA list of predefined iOS colors displayed in a Table View"
