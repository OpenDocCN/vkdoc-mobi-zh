  raw: 'To access the complication server, you use the static property `SharedInstance`
    of the `CLKComplicationServer` class. Then, to obtain the collection of active
    complications that are actually displayed on the watch face, you read the `ActiveComplications`
    property. Each element in this collection is an instance of the `CLKComplication`
    class and gives you direct access to the complication. In particular, you can
    force it to be updated by passing the corresponding object to the ReloadTimeline
    method of the `CLKComplicationServer` class instance (see the `UpdateComplications`
    method in Listing [8-21](#A453659_1_En_8_Chapter.html#Par113)). `ComplicationHelper`
    also has one static property, `Answer`, which I use to pass data from the interface
    controller to the complication controller. To finish the implementation, I need
    to obtain data for the complication. To this end, I modify the `DisplayUserResponse`
    method (Listing [8-9](#A453659_1_En_8_Chapter.html#Par55)) as shown in Listing
    [8-22](#A453659_1_En_8_Chapter.html#Par115). Namely, I store the value obtained
    using the text input controller in the `ComplicationHelper.Answer` property and
    then force all active complications to be updated using the `ComplicationHelper.UpdateComplications`
    method.


    ```

    private void DisplayUserResponse(NSArray result)

    {

    var answer = "No answer";

    if (result != null)

    {

    if (result.Count > 0)

    {

    answer = result.GetItem(0).ToString();

    }

    }

    LabelAnswer.SetText(answer);

    ComplicationHelper.Answer = answer;

    ComplicationHelper.UpdateComplications();

    }

    Listing 8-22.

    Updating Complications

    ```


    To test the preceding example, you need to quit the iPhone and Watch simulators
    and then re-run the app. Subsequently, go to the watch face, set touch pressure
    to deep, and tap the watch screen. This activates the mode where you can adjust
    the watch face. Swipe to the modular (left part of Figure [8-18](#A453659_1_En_8_Chapter.html#Fig18))
    and then hit the Customize button after reverting the touch pressure to shallow.
    Once in the customization mode, swipe to the second screen and then use the green
    rectangle to switch between complications. Go to the complication shown in the
    top left corner. Subsequently, you need to place the mouse cursor on the digital
    crown and then scroll the mouse or touch pad until you see the HelloWatchKit.Watch
    complication. Do the same thing for the large complication below it (right part
    of Figure [8-19](#A453659_1_En_8_Chapter.html#Fig19)) . Once you are done, press
    the digital crown button. You can now go back to the app and choose any item from
    the text input controller so you can see your updated complications on the home
    screen.


    ![A453659_1_En_8_Fig19_HTML.jpg](A453659_1_En_8_Fig19_HTML.jpg)


    Figure 8-19.


    Configuring complications


    ## Glance Controller


    The last element of the HelloWatchKit.WatchExtension bundle is the glance controller,
    which is used to present static information to the user. The default glance controller
    was generated by Visual Studio during app creation. When the user taps the view
    associated with the glance controller, the corresponding app is activated. Because
    glances are unavailable in watchOS 3 and above, we cannot test them using default
    simulators. So, I will only show how to detect if the app was activated from the
    glance. If so, the title of the interface controller will change to the appropriate
    value. To implement such a functionality, I add to the HelloWatchKit.WatchExtension
    app another file, `GlanceHelper.cs`, where I define the static class seen in Listing
    [8-23](#A453659_1_En_8_Chapter.html#Par118). This class has only one property,
    `Key`, which is used to identify the value passed between the glance and interface
    controllers.


    ```

    public static class GlanceHelper

    {

    public static NSString Key { get; } = new NSString("GlanceKey");

    }

    Listing 8-23.

    A Helper Class for Handling Glance Activation

    ```


    To show how to pass data from the glance to the interface controller to indicate
    that it was activated through the glance, I first implement the `WillActivate`
    view event handler of the `GlanceController`, as shown in Listing [8-24](#A453659_1_En_8_Chapter.html#Par120).
    I create the `NSDictionary` object, implementing the collection of key–value pairs.
    In this case, a dictionary contains just one element with the key `GlanceKey`
    and a value of `Glance-activated`. Then, I pass the dictionary along with the
    `appIdentifier` to the `UpdateUserActivity` method. This method is used to pass
    the glance state to the actual app.


    ```

    public override void WillActivate()

    {

    var appIdentifier = NSBundle.MainBundle.BundleIdentifier;

    using (var nsDictionary = new NSDictionary

    (GlanceHelper.Key, "Glance-activated"))

    {

    UpdateUserActivity(appIdentifier, nsDictionary, null);

    }

    }

    Listing 8-24.

    Passing Data to the App When It Is Activated from the Glance Controller

    ```


    Then, to obtain the glance state, you implement `HandleUserActivity` in your initial
    interface controller. An example of how to retrieve a value for the key `GlanceKey`
    in the `InterfaceController` class of the HelloWatchKit.WatchExtension is shown
    in Listing [8-25](#A453659_1_En_8_Chapter.html#Par122).


    ```

    public override void HandleUserActivity(NSDictionary userActivity)

    {

    if (userActivity != null)

    {

    if (userActivity.ContainsKey(GlanceHelper.Key))

    {

    SetTitle(userActivity.ValueForKey(GlanceHelper.Key).ToString());

    }

    }

    }

    Listing 8-25.

    Receiving Data Passed from the Glance Controller

    ```


    ## Summary


    In this chapter, we learned how to implement apps for smartwatches. We covered
    a broad range of topics, starting from project creation, using the watch simulator
    , and handling view and app events through to collecting user input with dedicated
    controllers, creating force touch menus, and navigating between interface controllers
    up to notifications, glances, and complications. This collection of tutorials
    enables you to independently write complete apps for the watchOS. In the following
    chapter, we will work with tvOS apps.


    # 9. tvOS


    TV is yet another part of everyday life that has been revolutionized by electronics
    and software. Devices like Apple TV turn your display into a smart device that
    you can use beyond just watching TV. You do not need to worry about missing your
    favorite TV show. Instead, you are the boss, deciding when and what you watch.
    Moreover, your TV becomes even more smart with dedicated apps and games. This
    chapter will show how to build such custom apps for Apple TV. Specifically, I
    will tell you how to create the complete tvOS app shown in Figure [9-1](#A453659_1_En_9_Chapter.html#Fig1).
    This app will utilize the OpenWeatherMap API to display the current weather conditions
    for the city name you type into the text field.


    ![A453659_1_En_9_Fig1_HTML.jpg](A453659_1_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    A custom weather app for the Apple TV'
  trans: "\n要访问复杂功能服务器，需要使用`CLKComplicationServer`类的静态属性`SharedInstance`。然后，要获取实际显示在表盘上的活跃复杂功能集合，需要读取`ActiveComplications`属性。该集合中的每个元素都是`CLKComplication`类的一个实例，并允许直接访问该复杂功能。具体来说，可以通过将相应对象传递给`CLKComplicationServer`类实例的`ReloadTimeline`方法（参见清单\
    \ 8-21 中的`UpdateComplications`方法）来强制更新该复杂功能。`ComplicationHelper`也有一个静态属性`Answer`，我使用它来将数据从界面控制器传递给复杂功能控制器。为了完成实现，我需要获取复杂功能的数据。为此，我修改了`DisplayUserResponse`方法（清单\
    \ 8-9），如清单 8-22 所示。即，我将使用文本输入控制器获取的值存储在`ComplicationHelper.Answer`属性中，然后使用`ComplicationHelper.UpdateComplications`方法强制更新所有活跃的复杂功能。\n\
    \n```\nprivate void DisplayUserResponse(NSArray result)\n{\n    var answer = \"\
    No answer\";\n    if (result != null)\n    {\n        if (result.Count > 0)\n\
    \        {\n            answer = result.GetItem(0).ToString();\n        }\n  \
    \  }\n    LabelAnswer.SetText(answer);\n    ComplicationHelper.Answer = answer;\n\
    \    ComplicationHelper.UpdateComplications();\n}\nListing 8-22.\n更新复杂功能\n```\n\
    \n要测试上述示例，需要退出 iPhone 和 Watch 模拟器，然后重新运行应用。之后，转到表盘，将触摸压力设置为深按，然后轻点手表屏幕。这会激活可以调整表盘的模式。滑动到模块表面（图\
    \ 8-18 的左侧部分），然后将触摸压力恢复为浅按后点击“自定义”按钮。进入自定义模式后，滑动到第二个屏幕，然后使用绿色矩形在复杂功能之间切换。转到左上角显示的复杂功能。接着，需要将鼠标光标放在数字表冠上，然后滚动鼠标或触摸板，直到看到`HelloWatchKit.Watch`复杂功能。对其下方的较大复杂功能执行相同操作（图\
    \ 8-19 的右侧部分）。完成后，按下数字表冠按钮。现在可以返回应用，并从文本输入控制器中选择任意项目，以便在主屏幕上看到更新后的复杂功能。\n\n![A453659_1_En_8_Fig19_HTML.jpg](img/A453659_1_En_8_Fig19_HTML.jpg)\n\
    \n图 8-19.\n\n配置复杂功能\n\n## 快速查看控制器\n\n`HelloWatchKit.WatchExtension`包的最后一个元素是快速查看控制器，用于向用户呈现静态信息。默认的快速查看控制器是在应用创建期间由\
    \ Visual Studio 生成的。当用户轻点与快速查看控制器关联的视图时，相应的应用会被激活。由于 watchOS 3 及更高版本中不可用快速查看，因此无法使用默认模拟器进行测试。所以，我只会展示如何检测应用是否从快速查看激活。如果是，界面控制器的标题将更改为相应的值。为了实现此功能，我向`HelloWatchKit.WatchExtension`应用添加了另一个文件`GlanceHelper.cs`，并在其中定义了清单\
    \ 8-23 中所示的静态类。该类只有一个属性`Key`，用于标识在快速查看和界面控制器之间传递的值。\n\n```\npublic static class\
    \ GlanceHelper\n{\n    public static NSString Key { get; } = new NSString(\"GlanceKey\"\
    );\n}\nListing 8-23.\n用于处理快速查看激活的辅助类\n```\n\n为了展示如何将数据从快速查看传递给界面控制器以指示它是通过快速查看激活的，我首先实现了`GlanceController`的`WillActivate`视图事件处理程序，如清单\
    \ 8-24 所示。我创建了`NSDictionary`对象，实现键值对的集合。在本例中，字典只包含一个元素，键为`GlanceKey`，值为`Glance-activated`。然后，我将此字典与`appIdentifier`一起传递给`UpdateUserActivity`方法。此方法用于将快速查看状态传递给实际应用。\n\
    \n```\npublic override void WillActivate()\n{\n    var appIdentifier = NSBundle.MainBundle.BundleIdentifier;\n\
    \    using (var nsDictionary = new NSDictionary\n        (GlanceHelper.Key, \"\
    Glance-activated\"))\n    {\n        UpdateUserActivity(appIdentifier, nsDictionary,\
    \ null);\n    }\n}\nListing 8-24.\n从快速查看控制器激活时，将数据传递给应用\n```\n\n然后，要获取快速查看状态，需要在初始界面控制器中实现`HandleUserActivity`。清单\
    \ 8-25 展示了如何在`HelloWatchKit.WatchExtension`的`InterfaceController`类中检索键`GlanceKey`的值的示例。\n\
    \n```\npublic override void HandleUserActivity(NSDictionary userActivity)\n{\n\
    \    if (userActivity != null)\n    {\n        if (userActivity.ContainsKey(GlanceHelper.Key))\n\
    \        {\n            SetTitle(userActivity.ValueForKey(GlanceHelper.Key).ToString());\n\
    \        }\n    }\n}\nListing 8-25.\n接收从快速查看控制器传递的数据\n```\n\n## 总结\n\n在本章中，我们学习了如何为智能手表实现应用。我们涵盖了广泛的主题，从项目创建、使用手表模拟器、处理视图和应用事件，到使用专用控制器收集用户输入、创建力度触摸菜单、在界面控制器之间导航，以及通知、快速查看和复杂功能。这组教程使您能够独立地为\
    \ watchOS 编写完整的应用。在下一章中，我们将使用 tvOS 应用。\n\n# 9. tvOS\n\n电视是日常生活中又一个被电子产品和软件彻底改造的部分。像\
    \ Apple TV 这样的设备能将您的显示器变成一个智能设备，其用途远不止观看电视节目。您无需担心错过最喜欢的电视节目。相反，您才是掌控者，决定观看的时间和内容。此外，有了专门的应用程序和游戏，您的电视变得更加智能。本章将展示如何为\
    \ Apple TV 构建此类自定义应用。具体来说，我将告诉您如何创建图 9-1 所示的完整 tvOS 应用。此应用将利用 OpenWeatherMap API\
    \ 来显示您在文本字段中键入的城市名称的当前天气状况。\n\n![A453659_1_En_9_Fig1_HTML.jpg](img/A453659_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1.\n\n适用于 Apple TV 的自定义天气应用\n"
- fmt: "# Creating a Project\n\nI start by creating a new tvOS project named `HelloTV`.\
    \ To that end, I utilize the new Single View App from the tvOS tab of the New\
    \ Project dialog in Visual Studio (Figure [9-2](#A453659_1_En_9_Chapter.html#Fig2)).\n\
    \n![A453659_1_En_9_Fig2_HTML.jpg](A453659_1_En_9_Fig2_HTML.jpg)\n\nFigure 9-2.\
    \ Creating a tvOS project\n\nSubsequently, Visual Studio displays another screen,\
    \ which is where you can configure your tvOS app. Basically, you do much the same\
    \ thing as you did for the iOS and watchOS apps. Namely, you specify the app name,\
    \ organization identifier, team, and target. Here, I configure the `HelloTV` app\
    \ as shown in Figure [9-3](#A453659_1_En_9_Chapter.html#Fig3) and proceed to the\
    \ next step, where I confirm the location of my project.\n\nOnce the project is\
    \ created, you will quickly recognize that the structure of the `HelloTV` app\
    \ resembles the organization of iOS projects. The entry point of the `HelloTV`\
    \ app is implemented within the static `Main` method of the `Program` class (`Main.cs`\
    \ file). A default implementation of this method utilizes the `AppDelegate` class\
    \ to launch and manage the lifecycle of the tvOS app at runtime. `AppDelegate`\
    \ derives from `UIApplicationDelegate`, exactly the same one used in all iOS apps.\
    \ So, you handle the app-related events of the tvOS app the same as you did in\
    \ the iOS apps. For this reason, actual examples are omitted.\n\n![A453659_1_En_9_Fig3_HTML.jpg](A453659_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3. Project configuration\n\n# User Interface\n\nTo design the UI for\
    \ the `HelloTV` app, I open the Solution Explorer and double-click the `Main.storyboard`\
    \ file. This opens the iOS designer, in which I modify the scene of the default\
    \ view controller. Specifically, from the toolbox I drag the following controls:\
    \ a text field, a button, an image view, and four labels. As shown in Figure [9-4](#A453659_1_En_9_Chapter.html#Fig4),\
    \ I stack all the controls vertically and then use the Properties pad to configure\
    \ each control as follows:\n\n- **Text Field**:\n    - Name: `TextFieldCityName`\n\
    \    - Width: 500 px\n    - Alignment: Center\n    - Font: Headline\n    - Text:\
    \ Type city name\n- **Button**:\n    - Name: `ButtonGetCurrentWeather`\n    -\
    \ Width: 500 px\n    - Alignment: Center\n    - Font: Headline\n    - Title: Get\
    \ current weather\n- **Image View**:\n    - Name: `ImageViewWeatherIcon`\n   \
    \ - Width and Height: 200 px\n- **First Label**:\n    - Name: `LabelTemperature`\n\
    \    - Text: Temperature:\n- **Second Label**:\n    - Name: `LabelPressure`\n\
    \    - Text: Pressure:\n- **Third Label**:\n    - Name: `LabelHumidity`\n    -\
    \ Text: Humidity:\n- **Fourth Label**:\n    - Name: `LabelDescription`\n    -\
    \ Text: Description:\n\nAdditionally, I set the width, font, and alignment of\
    \ all labels to 1920 px, headline, and center, respectively.\n\n![A453659_1_En_9_Fig4_HTML.jpg](A453659_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4. Designing the user interface of the tvOS app\n\n# OpenWeatherMap\
    \ API\n\nGiven the UI is ready, I start implementing the logic responsible for\
    \ obtaining the current weather conditions. To that end, I use the API exposed\
    \ by the OpenWeatherMap web service ([https://openweathermap.org/](https://openweathermap.org/)).\
    \ OpenWeatherMap provides free and paid plans. The free plan is limited to 60\
    \ calls per minute ([https://openweathermap.org/price](https://openweathermap.org/price))\
    \ and has some other specific limitations but is more than enough to implement\
    \ the `HelloTV` sample. To access the OpenWeatherMap API, you will need to sign\
    \ up for the free account. You will receive via email your app identifier, which\
    \ you use to access the REST service of OpenWeatherMap. Once this is done, you\
    \ can start testing OpenWeatherMap in your browser by typing the following URL\
    \ in the address bar:\n\n[http://api.openweathermap.org/data/2.5/weather?q=`<cityname>`&appid=`<your\
    \ app id>`](http://api.openweathermap.org/data/2.5/weather?q=%3ccityname%3e%26appid=%3cyour%20app%20id%3e)\n\
    \nAs a result, OpenWeatherMap will return a JSON object with the structure shown\
    \ in Listing [9-1](#A453659_1_En_9_Chapter.html#Par37). Namely, there are twelve\
    \ properties, which in particular contain information about the geolocation of\
    \ a weather station and report the weather conditions (`coord`), the actual weather\
    \ conditions (`weather`, `main`, `visibility`, `wind`, `clouds`), and calculation\
    \ date (`dt`).\n\n```\n{\n\"coord\": {\n\"lon\": -74.01,\n\"lat\": 40.71\n},\n\
    \"weather\": [\n{\n\"id\": 800,\n\"main\": \"Clear\",\n\"description\": \"clear\
    \ sky\",\n\"icon\": \"01d\"\n}\n],\n\"base\": \"stations\",\n\"main\": {\n\"temp\"\
    : 290.14,\n\"pressure\": 1016,\n\"humidity\": 77,\n\"temp_min\": 287.15,\n\"temp_max\"\
    : 292.15\n},\n\"visibility\": 16093,\n\"wind\": {\n\"speed\": 2.92,\n\"deg\":\
    \ 272.003\n},\n\"clouds\": {\n\"all\": 1\n},\n\"dt\": 1504527300,\n\"sys\": {\n\
    \"type\": 1,\n\"id\": 1969,\n\"message\": 0.0186,\n\"country\": \"US\",\n\"sunrise\"\
    : 1504520803,\n\"sunset\": 1504567326\n},\n\"id\": 5128581,\n\"name\": \"New York\"\
    ,\n\"cod\": 200\n}\n```\n\nListing 9-1. A Sample JSON Response from the OpenWeatherMap\
    \ API\n\nTo consume the preceding JSON response in the `HelloTV` app, I need to\
    \ map the JSON object to the C# classes. As in Chapter [7](#A453659_1_En_7_Chapter.html),\
    \ I do this mapping with the help of the JSON Utils service ([https://jsonutils.com/](https://jsonutils.com/)).\
    \ In particular, I paste the JSON response into the JSON Test or URL text field,\
    \ set the class name to `WeatherInfo`, check “Pascal Case,” and click the Submit\
    \ button. Consequently, a set of classes is generated. I save all of these classes\
    \ in separate files under the `Models` folder of the `HelloTV` app (see companion\
    \ code: `Chapter_09/HelloTV/Models`).\n\nA detailed description of each autogenerated\
    \ class is not warranted. So, I will describe the most important elements only.\
    \ The main class representing the top-level properties of the JSON response is\
    \ `WeatherInfo`. The definition of this class appears in Listing [9-2](#A453659_1_En_9_Chapter.html#Par40).\
    \ Accordingly, `WeatherInfo` contains twelve autogenerated properties, which you\
    \ can use to read weather conditions.\n\n```\npublic class WeatherInfo\n{\npublic\
    \ Coord Coord { get; set; }\npublic IList Weather { get; set; }\npublic string\
    \ Base { get; set; }\npublic Main Main { get; set; }\npublic int Visibility {\
    \ get; set; }\npublic Wind Wind { get; set; }\npublic Clouds Clouds { get; set;\
    \ }\npublic int Dt { get; set; }\npublic Sys Sys { get; set; }\npublic int Id\
    \ { get; set; }\npublic string Name { get; set; }\npublic int Cod { get; set;\
    \ }\n}\n```\n\nListing 9-2. A Definition of the `WeatherInfo` Class"
