    app. After the app is executed, I tap the Push Notification button and then lock
    the iPhone screen to ensure that the local notification will be routed to the
    Apple Watch. The notification will appear about ten seconds after tapping the
    button in the iOS app (Figure [8-15](#A453659_1_En_8_Chapter.html#Fig15)).


    ![A453659_1_En_8_Fig15_HTML.jpg](A453659_1_En_8_Fig15_HTML.jpg)


    Figure 8-15.


    A local notification received by the watchOS app


    Note that you can also execute the app such that it will present a notification
    controller on start. To do so, choose a corresponding item in the debug target
    drop-down list; for example, HelloWatchKit.Watch – Notification. You will quickly
    see the results shown in Figure [8-16](#A453659_1_En_8_Chapter.html#Fig16). If
    you now open the Interface.storyboard from the HelloWatchKit.Watch bundle, you
    will see that the view of the notification controller does not reflect what you
    see on the simulator. This is because the visual appearance of the local notification
    is determined by the payload declared in the `PushNotificationPayload.json` file
    of the HelloWatchKit.Watch app.


    ![A453659_1_En_8_Fig16_HTML.jpg](A453659_1_En_8_Fig16_HTML.jpg)


    Figure 8-16.


    A default notification controller


    ## ClockKit and Complication Controller


    The ClockKit is a set of classes and objects that lets you create complications.
    These are visual elements that appear on the watch face. Complications are somewhat
    similar to notifications and give the user access to important data provided by
    your app but in a less obstructive way than notifications. To create a complication,
    you use the complication controller, which was added to the Watch Extension bundle.
    A definition of this controller is stored in the `ComplicationController.cs` file.
    If you open this file, you will see that the `ComplicationController` class derives
    from `CLKComplicationDataSource`. The latter comes from the ClockKit framework
    and is the key ingredient in implementing the complication. Specifically, you
    override methods from the `CLKComplicationDataSource` in the derived class to
    control the appearance of complications. At the very least, you need to implement
    these methods :


    *   `GetPlaceholderTemplate` – provides a visual template for your complication.
    The result of this method is used by the ClockKit to present the sample appearance
    of the complication to the user during configuration. You typically use fake data
    to create such a template to give the user an idea of what your complication will
    look like. This method is available for watchOS 2 only.

    *   `GetLocalizableSampleTemplate` – works like `GetPlaceholderTemplate` with
    a difference being that it is used by the ClockKit to get a localizable (language-dependent)
    complication template. This method is available for watchOS 3 or later only.

    *   `GetCurrentTimelineEntry` – ClockKit uses this method to obtain the actual
    data for the complication.

    *   `GetSupportedTimeTravelDirections` – This informs the ClockKit whether your
    app can provide future or past data entries for the complication.


    Because the preceding methods are invoked by the ClockKit, you return data to
    this framework through callbacks. Namely, each of these methods accepts two arguments.
    The first one, `complication`, is an instance of the `CLKComplication` class and
    is an abstract representation of the complication. The other argument, `handler`,
    is the action (callback) that you invoke to pass data for a complication. You
    typically use an instance of the `CLKComplication` class to infer the type of
    complication by reading its `Family` property. Depending on this, you perform
    custom logic and finally invoke a handler, in which you pass data for the ClockKit.
    Let’s see how this works in practice. To this end, I extend the definition of
    the `ComplicationController` class from the HelloWatchKit.WatchExtension app by
    a method shown in Listing [8-16](#A453659_1_En_8_Chapter.html#Par91).


    ```

    private CLKComplicationTemplate CreateComplicationTemplate(

    CLKComplicationFamily complicationFamily, string complicationText)

    {

    CLKComplicationTemplate template = null;

    switch (complicationFamily)

    {

    case CLKComplicationFamily.ModularSmall:

    template = new CLKComplicationTemplateModularSmallRingText()

    {

    TextProvider = CLKSimpleTextProvider.FromText(complicationText),

    FillFraction = 0.75f,

    RingStyle = CLKComplicationRingStyle.Open

    };

    break;

    case CLKComplicationFamily.ModularLarge:

    template = new CLKComplicationTemplateModularLargeStandardBody()

    {

    HeaderTextProvider = CLKSimpleTextProvider.

    FromText("My Complication"),

    Body1TextProvider = CLKSimpleTextProvider.

    FromText(complicationText),

    Body2TextProvider = CLKTimeTextProvider.

    FromDate(NSDate.Now)

    };

    break;

    }

    return template;

    }

    Listing 8-16.

    Creating a Complication Template

    ```'
