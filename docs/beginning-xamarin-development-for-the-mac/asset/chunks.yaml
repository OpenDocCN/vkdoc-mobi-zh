- fmt: '# Hello, Watch!


    Let’s now use the `Watch` and `Watch Extension` bundles to implement a custom
    timer, as shown in Figure [8-4](#A453659_1_En_8_Chapter.html#Fig4). To this end,
    I first open the `Watch` app bundle project and modify the first scene by adding
    a label. I then set the label name to `LabelTime` and center it vertically and
    horizontally by choosing the Center option from the Horizontal and Vertical Alignment
    drop-down lists. They are located under the View group.


    ![A453659_1_En_8_Fig4_HTML.jpg](A453659_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. A view of the watchOS app


    Subsequently, I go to the `WatchExtension` bundle and edit `InterfaceController.cs`.
    I first import the `System.Timers` namespace and then extend a definition of the
    `InterfaceController` class such that a current time will be presented in the
    label. Therefore, I will repeatedly obtain the current system time and display
    it in the label. To implement such a functionality, you typically use the `System.Timers.Timer`
    class. It implements a mechanism, which lets you execute a method at specified
    intervals. You specify the interval by setting the `Interval` property of the
    `Timer` class instance. Once this is done and the timer is started (`Start` method),
    it will raise an `Elapsed` event. To execute your custom logic, all you need to
    do is handle that event. Because this event is invoked on the UI thread, you do
    not need to worry about thread safety when accessing visual controls from the
    `Timer.Elapsed` event handler, as discussed in Chapter [3](#A453659_1_En_3_Chapter.html).


    In Listing [8-1](#A453659_1_En_8_Chapter.html#Par28), I show one private field
    and three private methods, which I use to implement the digital watch. The first
    function, `ConfigureTimer`, is used to create an instance of the `Timer` class,
    which is stored in the `timer` field. Here, the `Timer` class is used to repeatedly
    execute a `DisplayCurrentTime` method at one-second intervals. This method reads
    and formats the current time and then displays it in the label with the `SetText`
    method. In Listing [8-1](#A453659_1_En_8_Chapter.html#Par28), I also include a
    method for starting and stopping the timer (`UpdateTimer`).


    ```

    private Timer timer;

    private void ConfigureTimer()

    {

    if(timer == null)

    {

    timer = new Timer();

    timer.Elapsed += (sender, e) =>

    {

    DisplayCurrentTime();

    };

    timer.Interval = 1000;

    }

    }

    private void DisplayCurrentTime()

    {

    var time = String.Format("{0:HH:mm:ss}", DateTime.Now);

    LabelTime.SetText(time);

    }

    private void UpdateTimer(bool start = true)

    {

    if(start)

    {

    DisplayCurrentTime();

    timer.Start();

    }

    else

    {

    timer.Stop();

    }

    }

    ```


    Listing 8-1. Using a Timer to Present Current Time


    I then use the `ConfigureTimer` and `UpdateTimer` methods in the view event handlers
    of `InterfaceController`. By default, there are three such methods implemented:
    `Awake`, `WillActivate`, and `DidDeactivate`. They override the base implementations
    of the corresponding methods from the `WKInterfaceController`, and, similar to
    iOS, correspond to the view lifecycle. The first method, `Awake`, is invoked by
    the runtime shortly after initializing the interface controller. So, you use this
    method to customize the initialization process. Therefore, the `Awake` method
    is a good place to create and configure the timer. Thus, as shown in Listing [8-2](#A453659_1_En_8_Chapter.html#Par30),
    I invoke the `ConfigureTimer` method there. Also, I use the `SetTitle` method
    there, which changes the string displayed in the view header (see Figure [8-4](#A453659_1_En_8_Chapter.html#Fig4)).


    ```

    public override void Awake(NSObject context)

    {

    base.Awake(context);

    SetTitle("Hello, watch!");

    ConfigureTimer();

    Console.WriteLine("{0} awake with context", this);

    }

    ```


    Listing 8-2. Configuring a Timer


    Once the timer is set up, I can start and stop it when the interface controller
    is about to become active or inactive, respectively (Listing [8-3](#A453659_1_En_8_Chapter.html#Par32)).
    Any attempts to update the interface controller when it is inactive are ignored
    by the runtime.


    ```

    public override void WillActivate()

    {

    UpdateTimer();

    Console.WriteLine("{0} will activate", this);

    }

    public override void DidDeactivate()

    {

    UpdateTimer(false);

    Console.WriteLine("{0} did deactivate", this);

    }

    ```


    Listing 8-3. Starting and Stopping a Timer


    Now, you can run the watch app in one of the simulators. As shown in Figure [8-5](#A453659_1_En_8_Chapter.html#Fig5),
    to choose the simulator use the Debug Target drop-down list in Visual Studio.
    Here, I use Apple Watch Series 3 – 42 mm watchOS 4.0. Also note that you have
    three possible options for how to execute the `HelloWatchKit.Watch` app. Depending
    on this choice, a different interface controller will be used to initialize the
    app. The possible run options include a default (`HelloWatchKit.Watch`), glance
    (`HelloWatchKit.Watch – Glance`), and notification (`HelloWatchKit.Watch – Notification`)
    items. For now, choose a default one and run the app. Two simulators will be started.
    The first iOS simulator runs in order to execute the parent iOS app. The second
    emulates the paired Apple Watch and executes the watchOS app shown previously
    in Figure [8-4](#A453659_1_En_8_Chapter.html#Fig4). Note that, depending on the
    Apple Watch simulator you choose, a different iOS simulator will be used. Each
    Watch simulator is paired with only one iPhone simulator. You can configure this
    pairing in Xcode by going to the Hardware ➤ Device ➤ Manage Devices option from
    the Hardware menu of any simulator.


    ![A453659_1_En_8_Fig5_HTML.jpg](A453659_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. Choosing the Apple Watch simulator


    ## Watch Simulator


    After implementing and running the first watchOS app, it is a good time to stop
    and learn how to control the Apple Watch simulator so we can test various app
    functionalities. The Apple Watch simulator can be controlled in much the same
    way as the iPhone simulator. Specifically, when you turn on the simulator it will
    present the screen shown in the top left corner of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6).
    That is the watch face. You can change this face by swiping left or right. Once
    in the watch face, you can tap one of complications (small icons shown at the
    top or bottom of the screen). You can also go to the home screen by pressing SHIFT+COMMAND+H.
    The home screen, shown in the top right corner of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6),
    contains a series of circular icons representing apps. The upper one is associated
    with the `HelloWatchKit.Watch` app we created. So, when you tap it, this app becomes
    active. You can use the home screen to run any other app, like Settings, for instance
    (see bottom left part of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6)). To
    switch between apps, you use the dock (bottom right part of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6)),
    which you can activate in the simulator by pressing SHIFT+COMMAND+B or press the
    side button of the Apple Watch simulator. Once the dock is shown, you can choose
    the app to activate (by swiping left or right) or close it by swiping up and then
    pressing the Remove icon. A real Apple Watch is also equipped with the digital
    crown, used to scroll between various options. To use the digital crown in the
    simulator, you use the mouse scroll or appropriate gesture on your touchpad.


    ![A453659_1_En_8_Fig6_HTML.jpg](A453659_1_En_8_Fig6_HTML.jpg)


    Figure 8-6. A series of screenshots of the Apple Watch simulator


    You can also personalize the Apple Watch from the paired iPhone. To do so, you
    use the Apple Watch app on the parent device. Figure [8-7](#A453659_1_En_8_Chapter.html#Fig7)
    shows an example of how to use Apple Watch app to change the watch face.


    ![A453659_1_En_8_Fig7_HTML.jpg](A453659_1_En_8_Fig7_HTML.jpg)


    Figure 8-7. Configuring the watch from the associated iPhone'
