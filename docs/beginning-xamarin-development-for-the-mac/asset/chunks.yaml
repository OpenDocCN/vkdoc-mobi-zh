    \n图 9-4. 设计 tvOS 应用的用户界面\n\n# OpenWeatherMap API\n\nUI 准备就绪后，我开始实现负责获取当前天气状况的逻辑。为此，我使用了\
    \ OpenWeatherMap Web 服务（[`openweathermap.org/`](https://openweathermap.org/)）公开的\
    \ API。OpenWeatherMap 提供免费和付费计划。免费计划限制为每分钟 60 次调用（[`openweathermap.org/price`](https://openweathermap.org/price)），并有一些其他特定限制，但对于实现\
