    this kit brings the Map View, which you can access through the `MKMapView` class
    declared under the `MapKit` namespace of Xamarin.iOS. `MKMapView` lets you quickly
    add an interactive native iOS map to your app. In this map, you can even display
    the current location of the user’s device, add appropriate annotations, or even
    display driving directions. Accordingly, you can relatively quickly add advanced
    functionality to your app. In this section, I will tell you how to use the map
    kit along with the `CLLocationManager`, a class used to track the geolocation
    of the iOS device, to create an app that will display the user’s location on the
    map. More specifically, the app will have a single view, which will look like
    the one from Figure [3-10](#A453659_1_En_3_Chapter.html#Fig10).


