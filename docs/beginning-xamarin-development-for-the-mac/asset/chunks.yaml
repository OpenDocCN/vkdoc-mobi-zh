  trans: '

    在本书中，我们将学习如何使用 `Xamarin.iOS` 为苹果设备：iPhone 和 iPad（`iOS`）、Apple Watch（`watchOS`）以及
    Apple TV（`tvOS`）开发应用。我们首先会准备开发工具（`Visual Studio for Mac`），并了解可用的项目模板（第 1 章）。随后，我将明确展示
    `Xamarin.iOS` 与苹果提供的原生 SDK 之间的关系，并探讨应用的结构与生命周期（第 2 章）。接着，我们将学习如何创建视图（第 3 章）以及实现视图间的导航（第
    4 章）。之后，我们将处理触摸手势（第 5 章），研究如何通过自动化测试打造高质量应用（第 6 章），并消耗来自 RESTful Web 服务的数据（第 7
    章）。最后，我们将学习如何为 Apple Watch（第 8 章）和 Apple TV（第 9 章）开发应用。

    不过，在本书中，我们不会学习如何在不同平台间复用代码，也不会学习如何使用 `Xamarin.Forms` 开发 WORA（一次编写，随处运行）应用。关于这方面的更多信息，请参考
    Alessandro Del Sole 所著的 *Beginning Visual Studio for Mac: Build Cross-Platform
    Apps with Xamarin and .NET Core* 一书。


    ## 致谢


    亲爱的读者，您能捧读或浏览本书，要感谢 Joan Murray，她对我提出的出书计划给予了极大的鼓励，并提供了许多写作建议。

    我由衷感谢 Chaim Krause 进行了非常详细的技术审阅，并指出了即便是最细微的错误。

    非常感谢 Laura Berendson 审阅手稿、提供反馈并给出了总体建议。感谢 Jill Balzano 的耐心与对本书项目的跟进。我也要感谢 Welmoed
    Spahr 和 Todd Green 出版本书，以及感谢 April Rondeau 进行的文字编辑。

    最后，特别感谢我的妻子 Agnieszka、女儿 Susanna 和儿子 Xavier，在我撰写本书期间，他们给予了我持续的支持与耐心。


