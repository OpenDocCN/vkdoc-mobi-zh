    ## 模型-视图-控制器


    到目前为止，我们已经讨论了 HelloWorld 应用的构成元素，这些元素要么构成应用入口点，要么与视图或视图控制相关。然而，iOS 应用通常与数据协同工作。应用需要从内部或外部存储或服务中检索数据，然后将其显示给用户。用户随后可以修改这些数据，应用必须将这些更改反映到与之协作的存储中。这是现代移动应用非常常见的模式，它们构成了某个更大系统的端点。因此，为了简化应用组织并提高其可维护性，iOS
    应用是使用模型-视图-控制器（MVC）编程范式或设计模式构建的。MVC 将应用分为三个主要元素：视图、控制器和模型。这些元素之间的一般关系以及数据和信号流如图
    2-10 所示。控制器位于中心，因为它扮演着最重要的角色。它显示视图并处理用户操作。这些操作映射到事件处理程序，并用于更新模型，该模型代表应用状态或某些数据集。每当数据被成功更新或由某些外部进程（另一个应用或服务）更改时，模型会通知控制器。控制器使用这些通知来更新其视图。


    ![A453659_1_En_2_Fig10_HTML.jpg](img/A453659_1_En_2_Fig10_HTML.jpg)


    Figure 2-10.

    A general scheme of the Model View Controller programming paradigm


    MVC 设计模式通过明确分离每个层次来提高应用的可维护性。因此，每个应用层可以独立开发和测试。这进一步有助于你重用代码并更好地控制开发。


    ## 持久化数据


    在最后这一小节中，我将告诉你如何为 HelloWorld 应用补充一个简单的模型`Person`。这个类将包含两个属性，用于存储人的名和姓。然后，在默认视图中，我将创建两个文本输入字段，用于显示个人数据并允许用户任意更改它们（图
    2-11）。数据将存储在设备内存的文件中，以便在应用重启后可以恢复。个人数据将在视图生命周期的`ViewWillDisappear`和`ViewWillAppear`事件中存储和恢复。


    ![A453659_1_En_2_Fig11_HTML.jpg](img/A453659_1_En_2_Fig11_HTML.jpg)


    Figure 2-11.

    A HelloWorld app supplemented by additional controls for editing a person’s data


    为了实现上述解决方案，我首先将`Person.cs`文件添加到 HelloWorld 应用中。你可以通过点击 Visual Studio 菜单中的 File
    ➤ New File 来完成此操作。将出现图 2-12 所示的对话框。在此对话框中，从 General 选项卡中选择 Empty Class 项，然后将类名更改为`Person`。在确保选中“Add
    to project”复选框后，点击 New 按钮。


    然后，我实现了`Person`类（参见配套代码：`Chapter_02/HelloWorld/Person.cs`）。如代码清单 2-10 所示，此类派生自`NSCoding`类。`NSCoding`提供了编码和解码对象的功能，以便归档（存储在文件中）或分发它们。编码意味着对象被转换为与体系结构无关的字节流，该字节流可以进一步存档或传输到另一个进程或远程设备。然后，对存档或接收的数据进行解码，以便将字节流转换回原始对象。在本例中，`Person`类有两个将存储在设备内存中的公共属性：`FirstName`和`LastName`。对于每个属性，我定义了一个键（保存在`firstNameArchiveKey`和`lastNameArchiveKey`中），用于在存档中标识该属性。此存档将是应用临时文件夹（`archiveLocation`字段）中的一个文件。


