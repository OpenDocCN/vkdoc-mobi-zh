    ### 删除项目


    要启用项目删除功能，请重写 `UITableViewSource` 的 `CommitEditingStyle` 方法。代码清单 3-12 展示了 `ColorsTableSource`
    中该方法的示例实现。我首先读取传递给 `CommitEditingStyle` 方法的 `editingStyle` 参数，检查它是否等于 `UITableViewCellEditingStyle.Delete`。如果是，我将从
    `Colors` 列表以及表视图中移除选中的项目。后者通过 `UITableView` 类实例的 `DeleteRows` 方法完成。该方法接受两个参数：一个用于标识要删除项目的
    `NSIndexPath` 对象数组，以及动画类型。可用的动画类型在 `UITableViewRowAnimation` 枚举中定义如下：


    - `Fade` – 指定被删除的行将淡出

    - `Right`、`Left`、`Top`、`Bottom` – 分别指定被删除的行滑出到右侧、左侧、顶部或底部

    - `Middle` – 指定被删除的行将“飞走”

    - `Automatic` – 强制 `UITableView` 根据被删除行的位置自动调整动画样式


    在代码清单 3-12 中，我使用了 `Automatic` 动画，但你可以轻松地将其更改为其他任何值，并观察它对行删除效果的影响。运行应用程序后，你可以选择任意项目并向右滑动，你将看到一个红色的“删除”按钮（图
    3-5）。点击此按钮后，该项目将从底层列表和表视图中移除。


    ![A453659_1_En_3_Fig5_HTML.jpg](img/A453659_1_En_3_Fig5_HTML.jpg)


    图 3-5.

    UITableView 中的滑动删除功能


    ```

    public override void CommitEditingStyle(

    UITableView tableView,

    UITableViewCellEditingStyle editingStyle,

    NSIndexPath indexPath)

    {

    if (editingStyle == UITableViewCellEditingStyle.Delete)

    {

    Items.RemoveAt(indexPath.Row);

    tableView.DeleteRows(

    new NSIndexPath[] { indexPath },

    UITableViewRowAnimation.Automatic);

    }

    }

    代码清单 3-12.

    删除一个项目

    ```


    你也可以通过编程方式阻止删除项目。方法是实现 `CanEditRow` 方法。代码清单 3-13 展示了如何阻止删除洋红色。当你重新运行应用程序时，在滑动洋红色对应的项目时，该行将不会出现“删除”按钮。


    ```

    public override bool CanEditRow(UITableView tableView,

    NSIndexPath indexPath)

    {

    var itemToDelete = Items[indexPath.Row];

    return itemToDelete.Name != "Magenta";

    }

    代码清单 3-13.

    禁用删除洋红色

    ```


    在更高级的场景中，你可能需要创建多个按钮来处理项目滑动。在这种情况下，你可以通过重写 `UITableViewSource` 的 `EditActionsForRow`
    方法来创建 `UITableViewRowAction` 对象的集合。在代码清单 3-14 中，我实现了两个这样的操作。其中一个在外观和功能上类似于之前示例中的“删除”按钮，但具有不同的标签“移除”。另一个按钮将具有灰色背景，并更改所选单元格的背景，如图
    3-6 所示。


    ```

    public override UITableViewRowAction[] EditActionsForRow(

    UITableView tableView, NSIndexPath indexPath)

    {

    var removeButton = UITableViewRowAction.Create(

    UITableViewRowActionStyle.Destructive,

    "移除",

    delegate {

    Items.RemoveAt(indexPath.Row);

    tableView.DeleteRows(

    new NSIndexPath[] { indexPath },

    UITableViewRowAnimation.Middle);

    });

    var markItemButton = UITableViewRowAction.Create(

    UITableViewRowActionStyle.Normal,

    "标记",

    delegate

    {

    tableView.CellAt(indexPath).BackgroundColor =

    UIColor.FromRGBA(0, 255, 0, 35);

    });

    return new UITableViewRowAction[] { removeButton, markItemButton };

    }

    代码清单 3-14.

    创建行操作集合

    ```


    要创建 `UITableViewRowAction`，请使用静态的 `Create` 方法。该方法接受三个参数，如下所示：

    '
- fmt: "- `style`：由`UITableViewRowActionStyle`枚举中的以下值之一表示：\n  - `Default` – 指定按钮具有默认样式（红色背景）。默认样式等同于\
    \ Destructive，意味着按钮操作将从表格中移除该项。\n  - `Normal` – 为按钮应用非破坏性样式（灰色背景）\n- `Title` –\
    \ 用于设置按钮标签的字符串\n- `handler` – 按钮点击后调用的操作\n\n在[清单 3-14](#A453659_1_En_3_Chapter.html#Par54)中，我两次使用了`UITableViewRowAction.Create`方法。由此得到的两个`UITableViewRowAction`类实例用于创建行操作数组。因此，每次滑动`UITableView`项时，会出现两个按钮，如图[3-6](#A453659_1_En_3_Chapter.html#Fig6)所示。请注意，`EditActionsForRow`的优先级高于`CommitEditingStyle`。因此，在`ColorsTableSource`类中定义`EditActionsForRow`后，`CommitEditingStyle`将被忽略。\n\
    \n![A453659_1_En_3_Fig6_HTML.jpg](A453659_1_En_3_Fig6_HTML.jpg)\n\n**图 3-6.**\
    \ 带有两个行操作的表格视图\n\n## Web View\n\n`Web View`是一种视觉控件，用于在应用中渲染网页。`Web View`在多种场景中使用。例如，你可以用它来显示应用的交互式帮助指南，或渲染来自外部服务器的内容。在本节中，我将向你展示如何构建一个基于`Web\
    \ View`控件的应用，用于显示你选择的地理位置的谷歌地图（图[3-7](#A453659_1_En_3_Chapter.html#Fig7)）。请注意，托管在`Web\
    \ View`渲染的网页上的谷歌地图将是完全可交互的。如图[3-7](#A453659_1_En_3_Chapter.html#Fig7)所示，你将能够平移地图甚至进入街景模式，因为`Web\
    \ View`可以渲染交互式网页。\n\n![A453659_1_En_3_Fig7_HTML.jpg](A453659_1_En_3_Fig7_HTML.jpg)\n\
    \n**图 3-7.** 显示完全交互式谷歌地图的`Web View`\n\n为了实现图[3-7](#A453659_1_En_3_Chapter.html#Fig7)中的应用，我使用\
    \ Single View iOS 项目模板并将应用名称设置为`GoogleMap`。然后，我创建了`HTML`子文件夹，并在其中放置了三个文件：`map.css`（清单[3-15](#A453659_1_En_3_Chapter.html#Par65)）、`map.js`（清单[3-16](#A453659_1_En_3_Chapter.html#Par70)）和`map.html`（清单[3-17](#A453659_1_En_3_Chapter.html#Par72)）。这些文件实现了一个包含两个文本输入框、一个按钮和一张谷歌地图的网页。你使用输入字段输入纬度和经度，用于设置地图的中心。按下按钮时地图会显示。\n\
    \n清单[3-15](#A453659_1_En_3_Chapter.html#Par65)中的`map.css`代码无需额外注释。这是一个名为`map`的\
    \ CSS 类的简短定义。该类配置了生成地图的显示模式和尺寸。\n\n```css\n.map {\nfloat: left;\nwidth: 100%;\n\
    height: 500px;\n}\n```\n\n清单[3-15] 存储`map`类定义的 CSS 文件\n\n清单[3-16](#A453659_1_En_3_Chapter.html#Par70)中显示的\
    \ JavaScript 函数`displayMap`（`map.js`）用于在选定的`div`元素中显示谷歌地图。这些函数从两个输入字段中获取地图中心的地理坐标。为此，`displayMap`接受以下三个参数：\n\
    \n- `mapDivId` – 用于显示地图的`div`元素的标识符\n- `latInputId` 和 `lngInputId` – 分别带有纬度和经度的输入字段的标识符\n\
    \n基于以上值，我配置了一个地图`options`对象，该对象指定了地图的缩放级别和中心。随后，我使用`google.maps.Map`对象显示地图。\n\n\
    ```javascript\nfunction displayMap(mapDivId, latInputId, lngInputId) {\nlat =\
    \ document.getElementById(latInputId).value;\nlng = document.getElementById(lngInputId).value;\n\
    var mapCenter = new google.maps.LatLng(lat, lng);\nvar options = {\nzoom: 14,\n\
    center: mapCenter\n};\nnew google.maps.Map(document.getElementById(mapDivId),\
    \ options);\n}\n```\n\n清单[3-16] 用于显示谷歌地图的 JavaScript 函数\n\n最后一个文件`map.html`（清单[3-17](#A453659_1_En_3_Chapter.html#Par72)）用于定义网页，包含一组标准的\
    \ HTML 声明。在`head`元素中，我引用了样式表`map.css`和必要的 JavaScript 组件。第一个是谷歌地图 API，另一个是`map.js`。然后，我声明了两个标签、两个文本输入框、一个按钮以及一个用于渲染地图的`div`元素。请注意，按钮的`onclick`属性指向`displayMap`函数。因此，每次点击该按钮时，会调用清单[3-16](#A453659_1_En_3_Chapter.html#Par70)中的函数来显示地图。\n\
    \n```html\n\nLatitude:\n\nLongitude:\n\nDisplay map\n\n```\n\n清单[3-17] `map.html`文件的内容\n\
    \n网页准备就绪后，我现在可以使用`Web View`来显示它。为此，在`ViewController`类中，我首先导入必要的命名空间：\n\n```csharp\n\
    using System;\nusing System.IO;\nusing CoreGraphics;\nusing Foundation;\nusing\
    \ UIKit;\n```\n\n然后，我定义了两个辅助方法，如清单[3-18](#A453659_1_En_3_Chapter.html#Par76)所示。第一个方法`GetFrameWithVerticalMargin`用于确定显示`Web\
    \ View`的矩形。请注意，在上一节中，表格视图覆盖了状态栏。为了解决这个问题，在清单[3-18](#A453659_1_En_3_Chapter.html#Par76)中，我向矩形添加了垂直边距并相应减少了其高度。第二个方法`LoadMapUrl`调用`UIWebView`类实例的`LoadRequest`方法以渲染网页。`LoadRequest`接受一个`NSUrlRequest`类型的参数。该对象使用指向`map.html`文件的`NSUrl`对象实例化。这样，`UIWebView`将显示此网页。\n\
    \n```csharp\nprivate CGRect GetFrameWithVerticalMargin(nfloat offset)\n{\nvar\
    \ rect = View.Frame;\nrect.Y = offset;\nrect.Height -= offset;\nreturn rect;\n\
    }\nprivate void LoadMapUrl(UIWebView webView)\n{\nvar url = Path.Combine(NSBundle.MainBundle.BundlePath,\n\
    \"HTML/map.html\");\nwebView.LoadRequest(new NSUrlRequest(new NSUrl(url, false)));\n\
    }\n```\n\n清单[3-18] 用于在`Web View`中显示网页的辅助方法\n\n为了在运行时访问`map.html`网页，你需要将`map.css`、`map.js`和`map.html`的生成操作设置为`BundleResource`，如图[3-8](#A453659_1_En_3_Chapter.html#Fig8)所示。\n\
    \n![A453659_1_En_3_Fig8_HTML.jpg](A453659_1_En_3_Fig8_HTML.jpg)\n\n**图 3-8.**\
    \ 为网页配置生成操作\n\n最后，我修改了`ViewDidLoad`事件处理程序，如清单[3-19](#A453659_1_En_3_Chapter.html#Par79)所示。在其中，我实例化了一个`Web\
    \ View`控件，并使用我的`GetFrameWithVerticalMargin`方法为其指定边界。随后，我调用`LoadMapUrl`并最终显示`Web\
    \ View`。因此，运行应用后，你将看到一个包含文本输入框和按钮的网页。输入地理坐标后，点击按钮，稍后地图便会显示。\n\n```csharp\npublic\
    \ override void ViewDidLoad()\n{\nbase.ViewDidLoad();\nvar webView = new UIWebView(GetFrameWithVerticalMargin(20));\n\
    LoadMapUrl(webView);\nAdd(webView);\n}\n```\n\n清单[3-19] 创建并显示`Web View`"
  raw: "*   `style`, which is represented by one of the following values from the\
    \ `UITableViewRowActionStyle` enumeration:\n    *   `Default` – specifies that\
    \ a button will have a default style—red background. Default style is equivalent\
    \ to Destructive, which means that the button action will remove the item from\
    \ a table.\n    *   `Normal` – applies a non-destructive style for a button—gray\
    \ background\n*   `Title` – a string you use to set a button label\n*   `handler`\
    \ – an action to be invoked after a button is tapped\n\nIn Listing [3-14](#A453659_1_En_3_Chapter.html#Par54),\
    \ I use the `UITableViewRowAction.Create` method twice. The resulting two instances\
    \ of the `UITableViewRowAction` class are used to create an array of row actions.\
    \ So, every time you swipe a `UITableView` item, two buttons appear, as shown\
    \ in Figure [3-6](#A453659_1_En_3_Chapter.html#Fig6). Note that `EditActionsForRow`\
    \ has higher priority than `CommitEditingStyle`. So, after defining `EditActionsForRow`\
    \ in the `ColorsTableSource` class, `CommitEditingStyle` is ignored.\n\n![A453659_1_En_3_Fig6_HTML.jpg](A453659_1_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6.\n\nA Table View with two row actions\n\n## Web View\n\nA Web View\
    \ is a visual control that you use to render a web page in your app. A Web View\
    \ is used in a number of scenarios. For instance, you can use it to display an\
    \ interactive help guide for your app or to render content from an external server.\
    \ In this section, I will show you how to build an app that, based on the Web\
    \ View control, displays a Google Map for a geolocation you choose (Figure [3-7](#A453659_1_En_3_Chapter.html#Fig7)).\
    \ Note that the Google Map, hosted on a web page rendered in the Web View, will\
    \ be fully functional. As Figure [3-7](#A453659_1_En_3_Chapter.html#Fig7) shows,\
    \ you will be able to translate a map and even enter the street view because Web\
    \ Views render interactive web pages.\n\n![A453659_1_En_3_Fig7_HTML.jpg](A453659_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7.\n\nA Web View displaying fully functional Google Maps\n\nTo implement\
    \ the app shown in Figure [3-7](#A453659_1_En_3_Chapter.html#Fig7), I use the\
    \ Single View iOS project template and set the app name to `GoogleMap`. Then,\
    \ I create the `HTML` subfolder, where I put three files: `map.css` (Listing [3-15](#A453659_1_En_3_Chapter.html#Par65)),\
    \ `map.js` (Listing [3-16](#A453659_1_En_3_Chapter.html#Par70)), and `map.html`\
    \ (Listing [3-17](#A453659_1_En_3_Chapter.html#Par72)). These files implement\
    \ a web page that displays two text inputs, one button, and a Google Map. You\
    \ use input fields to enter latitude and longitude, which are used to set the\
    \ map’s center. The map is displayed when you press a button.\n\nThe code of the\
    \ `map.css` from Listing [3-15](#A453659_1_En_3_Chapter.html#Par65) does not require\
    \ any additional comments. This is a short definition of the CSS class, named\
    \ `map`. This class configures the display mode and dimensions of the resulting\
    \ map.\n\n```\n.map {\nfloat: left;\nwidth: 100%;\nheight: 500px;\n}\nListing\
    \ 3-15.\nCSS File Storing a Definition of the map Class\n```\n\nThe JavaScript\
    \ function `displayMap` (`map.js`) shown in Listing [3-16](#A453659_1_En_3_Chapter.html#Par70)\
    \ is used to display a Google Map in a selected div element. These functions take\
    \ the geocoordinates for the map’s center from two input fields. To this end,\
    \ `displayMap` accepts the following three arguments:\n\n*   `mapDivId` – identifier\
    \ of the div element in which to display a map\n*   `latInputId` and `lngInputId`\
    \ – identifiers of the input fields with the latitude and longitude, respectively\n\
    \nGiven the preceding values, I configure a map `options` object, which here specifies\
    \ the zoom and center of the map. Subsequently, I display a map using the `google.maps.Map`\
    \ object.\n\n```\nfunction displayMap(mapDivId, latInputId, lngInputId) {\nlat\
    \ = document.getElementById(latInputId).value;\nlng = document.getElementById(lngInputId).value;\n\
    var mapCenter = new google.maps.LatLng(lat, lng);\nvar options = {\nzoom: 14,\n\
    center: mapCenter\n};\nnew google.maps.Map(document.getElementById(mapDivId),\
    \ options);\n}\nListing 3-16.\nJavaScript Function for Displaying a Google Map\n\
    ```\n\nThe last file, for defining a web page, `map.html` (Listing [3-17](#A453659_1_En_3_Chapter.html#Par72)),\
    \ contains a set of standard HTML declarations. Within the `head` element, I reference\
    \ a stylesheet, `map.css`, and necessary JavaScript components. The first one\
    \ is the Google Map API, while the other is `map.js`. Then, I declare two labels,\
    \ two text inputs, a button, and a div element where the map will be rendered.\
    \ Note that the `onclick` attribute of the button points to the `displayMap` function.\
    \ So, whenever you tap this button, the function from Listing [3-16](#A453659_1_En_3_Chapter.html#Par70)\
    \ will be invoked to display a map.\n\n```\n\nLatitude:\n\nLongitude:\n\nDisplay\
    \ map\n\nListing 3-17.\nContents of the map.html File\n```\n\nGiven the web page\
    \ is ready, I can now display it using a Web View. To this end, in the `ViewController`\
    \ class I first import the necessary namespaces:\n\n```\nusing System;\nusing\
    \ System.IO;\nusing CoreGraphics;\nusing Foundation;\nusing UIKit;\n```\n\nThen,\
    \ I define two helper methods, seen in Listing [3-18](#A453659_1_En_3_Chapter.html#Par76).\
    \ The first one, `GetFrameWithVerticalMargin`, is used to determine the rectangle\
    \ in which I display the Web View. Note that in the previous section, a Table\
    \ View was overlaid on the status bar. To solve this issue, in Listing [3-18](#A453659_1_En_3_Chapter.html#Par76)\
    \ I add a vertical margin to the rectangle and reduce its height accordingly.\
    \ The second method, `LoadMapUrl`, invokes the `LoadRequest` method of the `UIWebView`\
    \ class instance in order to render a web page. `LoadRequest` accepts a single\
    \ argument of type `NSUrlRequest`. This is instantiated with the `NSUrl` object,\
    \ pointing to the `map.html` file. So, `UIWebView` will display this web page.\n\
    \n```\nprivate CGRect GetFrameWithVerticalMargin(nfloat offset)\n{\nvar rect =\
    \ View.Frame;\nrect.Y = offset;\nrect.Height -= offset;\nreturn rect;\n}\nprivate\
    \ void LoadMapUrl(UIWebView webView)\n{\nvar url = Path.Combine(NSBundle.MainBundle.BundlePath,\n\
    \"HTML/map.html\");\nwebView.LoadRequest(new NSUrlRequest(new NSUrl(url, false)));\n\
    }\nListing 3-18.\nHelper Methods Used to Display a Web Page Within the Web View\n\
    ```\n\nTo access the `map.html` web page during runtime, you need to set the build\
    \ action of `map.css`, `map.js`, and `map.html` to `BundleResource`, as shown\
    \ in Figure [3-8](#A453659_1_En_3_Chapter.html#Fig8).\n\n![A453659_1_En_3_Fig8_HTML.jpg](A453659_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8.\n\nConfiguring a build action for the web page\n\nLastly, I modify\
    \ the `ViewDidLoad` event handler as shown in Listing [3-19](#A453659_1_En_3_Chapter.html#Par79).\
    \ There, I instantiate a Web View control and specify bounds for it using my `GetFrameWithVerticalMargin`\
    \ method. Subsequently, I invoke `LoadMapUrl` and finally display a Web View.\
    \ So, after you run the app, you will see a web page with text inputs and a button.\
    \ After entering geocoordinates, you click a button and the map will be displayed\
    \ after a short while.\n\n```\npublic override void ViewDidLoad()\n{\nbase.ViewDidLoad();\n\
    var webView = new UIWebView(GetFrameWithVerticalMargin(20));\nLoadMapUrl(webView);\n\
    Add(webView);\n}\nListing 3-19.\nCreating and Displaying a Web View\n```"
