    ### 调用 JavaScript 函数


    Web View 允许你在 C# 代码中运行 JavaScript。为此，Web View 提供了 `EvaluateJavaScript` 方法。它接受一个参数，即包含要运行的
    JavaScript 代码的字符串。为了演示如何使用 `EvaluateJavascript` 方法，我在 `map.js` 文件中添加了另一个函数 `displayGeocoordinate`（代码清单
    3-21）。该函数接受一个表示地址的字符串，并显示其从 Google Geocode 服务获取的地理坐标（图 3-9）。为此，我实例化了一个 `google.maps.Geocoder`
    对象，然后调用其 `geocode` 方法。该方法向 Google Geocode 服务发送请求，并接受两个参数。第一个参数是参数数组，第二个是回调函数，在请求完成后执行。回调函数会接收另外两个参数，如下所示：


    *   `results` – 表示从 Google Geocode 服务返回的 JSON 响应中结果部分的对象（请回顾代码清单 3-20）

    *   `status` – 请求的状态


    在代码清单 3-21 中，我使用了这两个参数。首先，我读取 `status` 以验证请求是否已被 Google Geocode 成功处理。如果是，则获取 `results`
    数组的第一个元素，然后从 `geometry` 对象中取得 `location`。


    ![A453659_1_En_3_Fig9_HTML.jpg](img/A453659_1_En_3_Fig9_HTML.jpg)


    图 3-9. 通过 Web View 调用的 JavaScript 函数显示警告框


    ```

    function displayGeocoordinate(address) {

    var geocoder = new google.maps.Geocoder();

    geocoder.geocode({''address'': address}, function(results, status) {

    if (status === ''OK'') {

    var geocoordinate = results[0].geometry.location;

    alert(''Address: '' + address

    + ''\nLat: '' + geocoordinate.lat().toFixed(3)

    + ''\nLng: '' + geocoordinate.lng().toFixed(3));

    }

    else {

    alert(''Geocoder failed: '' + status);

    }

    });

    }

    ```

    代码清单 3-21. 对地址进行地理编码


    为了调用 `displayGeocoordinate` 函数，我修改了 `ViewController` 的 `ViewDidLoad` 方法，如代码清单
    3-22 所示。我为 Web View 的 `LoadFinished` 事件创建了处理程序。该事件在网页渲染完成后触发。这确保了所有必要的引用都已就绪，从而可以使用
    `EvaluateJavascript` 调用 `displayGeocoordinate` 函数。对于地址，我传递了 `New York`，因此重新运行应用后得到如图
    3-9 所示的结果。请注意，Web View 会自动重新解释 JavaScript 的 `alert` 函数，使得生成的弹出窗口看起来像使用 `UIAlertController`
    创建的窗口。


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    var webView = new UIWebView(GetFrameWithVerticalMargin(20));

    LoadMapUrl(webView);

    Add(webView);

    webView.LoadFinished += (sender, e) =>

    {

    webView.EvaluateJavascript("displayGeocoordinate(''New York'');");

    };

    }

    ```

