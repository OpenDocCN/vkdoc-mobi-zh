    I start with the tab bar control, which lets you create multi-tab apps. In this
    case, the user switches between various views (tabs) using a bar. This bar contains
    buttons with icons and optional labels. When the user presses such a button, a
    corresponding tab appears.


    ![A453659_1_En_4_Fig1_HTML.jpg](A453659_1_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    Creating a tabbed app in Visual Studio


    To create the tabbed app, I use a dedicated project template (see Figure [4-1](#A453659_1_En_4_Chapter.html#Fig1)).
    I set the app name to Navigation.Tabs and the minimum target version to iOS 9.0\.
    Visual Studio creates a project comprising the following view controllers (see
    Figure [4-2](#A453659_1_En_4_Chapter.html#Fig2)):


    ![A453659_1_En_4_Fig2_HTML.jpg](A453659_1_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    A default structure of the tabbed app created from a dedicated template


    *   Tab Bar Controller – the controller that manages the tab interface. More specifically,
    this controller is responsible for switching between tabs. Each tab has separate
    view controllers and corresponding views.

    *   First View Controller and Second View Controller – view controllers associated
    with the first and second tabs. Note that the Navigation.Tabs project also contains
    two files: `FirstViewController.cs` and `SecondViewController.cs`, which store
    definitions of the classes of the same names. `FirstViewController` and `SecondViewController`
    both derive from the `UIViewController` and, apart from the protected constructor,
    contain default implementations of the `ViewDidLoad` and `DidReceiveMemoryWarning`
    methods, similar to the definition of the `ViewController` class utilized in all
    previous single view apps.


    Note that by default there are only two tabs, so when you run the app it will
    look as shown in Figure [4-3](#A453659_1_En_4_Chapter.html#Fig3). Namely, the
    bar has two elements: First and Second. You can tap them to switch between tabs.
    Each tab has two labels, which display the view number and the name of the associated
    class implementing the view controller.


    ![A453659_1_En_4_Fig3_HTML.jpg](A453659_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    A default tabbed app


    To control the appearance of an item in the tab bar, you use the properties of
    the tab bar item. As the left part of Figure [4-4](#A453659_1_En_4_Chapter.html#Fig4)
    shows (Document Outline), each tab has an associated tab bar item. When you click
    it, all control properties appear under the Properties pad (right part of Figure
    [4-4](#A453659_1_En_4_Chapter.html#Fig4)). In particular, you can modify the item
    title (Title entry under Bar Item group) and its image (drop-down list right below
    Title). You can also use one of the system icons via the System Item drop-down
    list (Tab Bar Item group). This list includes the following tab bar icons: bookmarks,
    contacts, downloads, favorites, featured, history, more, most recent, most viewed,
    recents, search, and top rated.


    ![A453659_1_En_4_Fig4_HTML.jpg](A453659_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    The properties pad of the selected tab bar item


    Now that we know the structure of the Navigation.Tabs project, let’s see how to
    add another tab. To this end, I proceed as follows. First, in the iOS designer,
    I add the view controller from the Toolbox. Then, I associate this object with
    the tab bar controller using CTRL+Drag. I click the gray area of the tab bar controller
    while pressing CTRL on the keyboard. Then, I move the mouse cursor on the new
    view controller and release the mouse button. A segue popup appears from which
    I choose Tab under the Relationship group (Figure [4-5](#A453659_1_En_4_Chapter.html#Fig5)).


    ![A453659_1_En_4_Fig5_HTML.jpg](A453659_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    Creating a tab relationship


    iOS designer creates the third tab, which I can now design by modifying the view
    of the new view controller. Lastly, I create the view controller class. To this
    end, I use the Properties pad of the view controller, where under the Identity
    group I type ThirdViewController in the Class entry (Figure [4-6](#A453659_1_En_4_Chapter.html#Fig6)).
    After pressing Enter, Visual Studio adds the `ThirdViewController.cs` file to
    the Navigation.Tabs project.


    ![A453659_1_En_4_Fig6_HTML.jpg](A453659_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    Associating a class with the view controller


    Before I implement the `ThirdViewController` class, I add to the project another
    file, `BaseViewController.cs`, in which I define a base class for all other view
    controllers (Listing [4-1](#A453659_1_En_4_Chapter.html#Par11)). I use the base
    class because I want all my view controllers to follow a similar logic whenever
    the associated view appears. Namely, I display in the application output the name
    of the class associated with the view. I implement such a logic to explicitly
    show you that different views are displayed when you switch between tabs. Therefore,
    you can use this option to write custom logic that handles the view lifecycle
    for tabs just as you can for all other views.


    ```

