  raw: '## Presenting a List of Users


    Given the preceding components, I can create the first view, which will present
    the list of users in a table . To this end, I start by adding to the project another
    folder, `TableSources`, where I create a new file, `UsersTableSource.cs`. It stores
    a definition of the class `UsersTableSource`, implementing a source for the users
    table.


    As Listing [7-17](#A453659_1_En_7_Chapter.html#Par57) shows, `UsersTableSource`
    derives from the `UITableViewSource` class as does any other class implementing
    the data source for the `UITableView` (see Chapter [3](#A453659_1_En_3_Chapter.html)).
    Then, `UsersTableSource` has two public properties, which store references to
    the parent view controller (used for navigation) and users repository, respectively.
    As explained in Chapter [3](#A453659_1_En_3_Chapter.html), `UsersTableSource`
    has to override several base methods. In particular, it should override the `GetCell`
    method, which is used to display elements of the list. Here, this method first
    retrieves an instance of the User class from the repository. This object contains
    the user data to be displayed in a given row. The row index path is related to
    the user identifier, so I use this path to retrieve users from the repository
    using the `GetById` method (Listing [7-16](#A453659_1_En_7_Chapter.html#Par54)).
    To convert a row index path to a user identifier, I utilize a helper method, `GetUserId`,
    seen in Listing [7-17](#A453659_1_En_7_Chapter.html#Par57). Given the `User` class
    instance, I create or reuse the cell of style `UITableViewCellStyle.Value1`. Finally,
    I configure the `Text` properties of the `TextLabel` and `DetailTextLabel` such
    that they display the name of the user and the name of his or her company (refer
    back to Figure [7-1](#A453659_1_En_7_Chapter.html#Fig1)).


    ```

    public class UsersTableSource : UITableViewSource

    {

    public UIViewController ParentViewController { get; set; }

    public UsersRepository UsersRepository { get; set; }

    private const string cellId = "UserCell";

    public override UITableViewCell GetCell(

    UITableView tableView, NSIndexPath indexPath)

    {

    // Get item to display

    var user = UsersRepository.GetById(GetUserId(indexPath));

    // Try to reuse a cell before creating a new one

    var cell = tableView.DequeueReusableCell(cellId)

    ?? new UITableViewCell(UITableViewCellStyle.Value1, cellId);

    // Configure cell properties

    cell.TextLabel.Text = user.Name;

    cell.DetailTextLabel.Text = user.Company.Name;

    return cell;

    }

    private int GetUserId(NSIndexPath indexPath)

    {

    return UsersRepository.Users[indexPath.Row].Id;

    }

    // The rest of class definition

    }

