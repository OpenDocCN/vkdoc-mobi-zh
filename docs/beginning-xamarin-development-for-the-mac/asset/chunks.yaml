    ### Pages


    There is yet another project template, which enables you to jumpstart implementing
    multi-view apps—the Page-Based App template, highlighted in Figure [4-8](#A453659_1_En_4_Chapter.html#Fig8).
    In this section, I will use this template to create another app, Navigation.PageBased,
    which targets iOS 9.0 and above. When you use this template, Visual Studio creates
    the app, which has twelve pages, each of which displays the name of the month
    in the label. So, when you run the app, it will look as shown in Figure [4-9](#A453659_1_En_4_Chapter.html#Fig9).


    ![A453659_1_En_4_Fig9_HTML.jpg](A453659_1_En_4_Fig9_HTML.jpg)


    Figure 4-9.


    A default page-based application has twelve pages, each of which displays a month
    name


    ![A453659_1_En_4_Fig8_HTML.jpg](A453659_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    New Project window, showing Page-Based App iOS project template


    Let’s see how the Navigation.PageBased app works. If you open the iOS designer
    of this project, you will see that it is composed of the two controllers:


    *   Root View Controller – the initial view controller, that provides content
    view of the windows,

    *   Data View Controller – a view controller that provides and displays data (appropriate
    month name) at each page.


    The logic for the root view controller is implemented within the class of the
    same name and stored under the `RootViewController.cs` file . `RootViewController`
    has two public members (Listing [4-5](#A453659_1_En_4_Chapter.html#Par23)): `ModelController`
    and `PageViewController`.


    ```

    public UIPageViewController PageViewController { get; private set; }

    public ModelController ModelController { get; private set; }

    Listing 4-5.

    Public Members of the RootViewController

    ```


    The first member, `PageViewController` , is of type `UIPageViewController`. The
    latter represents the page view controller. This controller is the central part
    of the Navigation.PageBased project (and all other projects created with the Page-Based
    App template) and manages the navigation between the underlying pages. Each of
    these pages has an associated view controller, which in this case is represented
    as the `DataViewController` class. The `PageViewController` is instantiated within
    the `ViewDidLoad` event handler of the `RootViewController` (see companion code,
    `Chapter_04/Navigation.PageBased/RootViewController.cs`).


    The second public member of the `RootViewController`, the `ModelController`, derives
    from the `UIPageViewControllerDataSource` class and implements a data source for
    each page. More specifically, `ModelController` has a `pageData` field, which
    is the collection of strings. This collection contains the list of months, which
    is obtained using the `NSDateFormatter` class (Listing [4-6](#A453659_1_En_4_Chapter.html#Par26)).


    ```

    public class ModelController : UIPageViewControllerDataSource

    {

    readonly List pageData;

    public ModelController()

    {

    var formatter = new NSDateFormatter();

    pageData = new List(formatter.MonthSymbols);

    }

    // The rest of ModelController definition

    }

    Listing 4-6.

    Fragment of the ModelController Class Definition

    ```


    Then, the `ModelController` implements a `GetViewController` method, which is
    shown in Listing [4-7](#A453659_1_En_4_Chapter.html#Par28). `GetViewController`
    creates an instance of the `DataViewController` using the `InstantiateViewController`
    static method of the `UIStoryboard` class instance. Subsequently, `GetViewController`
    passes an appropriate month name to the created view controller. The month name
    is stored in the `DataObject` public property of the `DataViewController` class
    instance.


    ```

    public DataViewController GetViewController(int index, UIStoryboard storyboard)

    {

    if (index >= pageData.Count)

    return null;

    // Create a new view controller and pass suitable data.

    var dataViewController = (DataViewController)storyboard.

    InstantiateViewController("DataViewController");

    dataViewController.DataObject = pageData[index];

    return dataViewController;

    }

