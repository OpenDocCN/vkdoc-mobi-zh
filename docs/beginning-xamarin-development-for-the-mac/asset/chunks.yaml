    Now, you can run the watch app in one of the simulators . As shown in Figure [8-5](#A453659_1_En_8_Chapter.html#Fig5),
    to choose the simulator use the Debug Target drop-down list in Visual Studio.
    Here, I use Apple Watch Series 3 – 42 mm watchOS 4.0\. Also note that you have
    three possible options for how to execute the HelloWatchKit.Watch app. Depending
    on this choice, a different interface controller will be used to initialize the
    app. The possible run options include a default (HelloWatchKit.Watch), glance
    (HelloWatchKit.Watch – Glance), and notification (HelloWatchKit.Watch – Notification)
    items. For now, choose a default one and run the app. Two simulators will be started.
    The first iOS simulator runs in order to execute the parent iOS app. The second
    emulates the paired Apple Watch and executes the watchOS app shown previously
    in Figure [8-4](#A453659_1_En_8_Chapter.html#Fig4). Note that, depending on the
    Apple Watch simulator you choose, a different iOS simulator will be used. Each
    Watch simulator is paired with only one iPhone simulator. You can configure this
    pairing in the Xcode by going to the Hardware ➤ Device ➤ Manage Devices option
    from the Hardware menu of any simulator.


    ![A453659_1_En_8_Fig5_HTML.jpg](A453659_1_En_8_Fig5_HTML.jpg)


    Figure 8-5.


    Choosing the Apple Watch simulator


    ## Watch Simulator


    After implementing and running the first watchOS app, it is a good time to stop
    and learn how to control the Apple Watch simulator so we can test various app
    functionalities. The Apple Watch simulator can be controlled in much the same
    way as the iPhone simulator. Specifically, when you turn on the simulator it will
    present the screen shown in the top left corner of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6).
    That is the watch face. You can change this face by swiping left or right. Once
    in the watch face, you can tap one of complications (small icons shown at the
    top or bottom of the screen). You can also go to the home screen by pressing SHIFT+COMMAND+H.
    The home screen, shown in the top right corner of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6),
    contains a series of circular icons representing apps. The upper one is associated
    with the HelloWatchKit.Watch app we created. So, when you tap it, this app becomes
    active. You can use the home screen to run any other app, like Settings, for instance
    (see bottom left part of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6)). To
    switch between apps, you use the dock (bottom right part of Figure [8-6](#A453659_1_En_8_Chapter.html#Fig6)),
    which you can activate in the simulator by pressing SHIFT+COMMAND+B or press the
    side button of the Apple Watch simulator. Once the dock is shown, you can choose
    the app to activate (by swiping left or right) or close it by swiping up and then
    pressing the Remove icon. A real Apple Watch is also equipped with the digital
    crown, used to scroll between various options. To use the digital crown in the
    simulator, you use the mouse scroll or appropriate gesture on your touchpad.


    ![A453659_1_En_8_Fig6_HTML.jpg](A453659_1_En_8_Fig6_HTML.jpg)


    Figure 8-6.


    A series of screenshots of the Apple Watch simulator


    You can also personalize the Apple Watch from the paired iPhone. To do so, you
    use the Apple Watch app on the parent device. Figure [8-7](#A453659_1_En_8_Chapter.html#Fig7)
    shows an example of how to use Apple Watch app to change the watch face.


    ![A453659_1_En_8_Fig7_HTML.jpg](A453659_1_En_8_Fig7_HTML.jpg)


    Figure 8-7.


    Configuring the watch from the associated iPhone'
