    To enable simultaneous gesture recognition, you use the `ShouldRecognizeSimultaneously`
    property of the gesture-recognizer class. Listing [5-16](#A453659_1_En_5_Chapter.html#Par63)
    shows how to enable simultaneous gesture recognition for the rotate and pinch
    gestures.


