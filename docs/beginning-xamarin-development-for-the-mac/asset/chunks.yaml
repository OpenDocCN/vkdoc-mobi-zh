    `UIAlertController` 类。为了明确说明这一点，现在让我们在 HelloWorld 应用中添加另一个按钮，点击该按钮时将显示一个操作表。为此，请在解决方案资源管理器中双击
    `Main.storyboard` 进入 Storyboard 编辑器。然后，添加第二个按钮，并将其放置在 `ButtonAlert` 下方。将新按钮的名称和标题分别更改为
    `ButtonActionSheet` 和 `ActionSheet`。调整其宽度和位置，然后创建默认事件处理程序（将其放置在 `ButtonAlert_TouchUpInside`
    下方）。按照代码清单 1-4 所示修改此处理程序的定义。最后，你可以重新运行应用，将会得到之前在图 1-1 中展示的结果。


