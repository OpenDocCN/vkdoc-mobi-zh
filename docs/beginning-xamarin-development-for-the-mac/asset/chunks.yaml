    *   `Active`（活跃）– 应用在前台运行并能响应用户操作。这意味着应用的用户界面（UI）对用户可见，且用户可与应用交互。

    *   `Inactive`（非活跃）– 应用在前台运行但无法响应用户操作。在这种情况下，UI 可能仍然可见，但应用不做出响应。例如，当你在手机或模拟器中激活多任务选择时（请参考图
    1-24）就可能出现此状态。

    *   `Background`（后台）– 应用在后台运行，因此其 UI 不可见。不过，应用可以执行某种后台操作，比如从外部网络服务获取数据。


    现在我们来看一下在应用生命周期中，应用程序事件处理程序是在哪个节点被调用的。为此，让我们在模拟器中启动应用，并打开 `Application Output`。默认情况下，此输出窗口是脱离停靠并最小化的，因此要激活此窗口，你需要点击位于
    Visual Studio 屏幕右下角的 `Application Output ➤ HelloWorld` 栏（图 2-1）。


    ![A453659_1_En_2_Fig1_HTML.jpg](img/A453659_1_En_2_Fig1_HTML.jpg)


    图 2-1.


    HelloWorld 应用输出，显示应用生命周期


    运行应用后，你会看到报告了三个应用事件：`WillFinishLaunching`、`FinishedLaunching` 和 `OnActivated`（图
    2-1）。首先，当 `UIApplication` 被创建时，会调用 `WillFinishLaunching` 事件处理程序。随后，应用启动后，会调用另一个方法
    `FinishedLaunching`。通常，此方法用于创建应用窗口，并通过设置 `Window` 类的 `RootViewController` 属性来显示视图。不过，HelloWorld
    应用是通过模板创建的。在这种情况下，默认视图是在主故事板（main storyboard）中配置的。稍后我会解释，这是通过设置 `document` XML
    标签的 `initialViewController` 属性来完成的。请注意，应用在被激活之前是处于非活跃状态的。应用激活由专用事件 `OnActivated`
    报告。一旦应用活跃，其 UI 变为可见，你就可以开始点击我们之前创建的按钮了。应用将响应你的请求。


    通过比较 `WillFinishLaunching` 和 `FinishedLaunching` 与所有其他与应用生命周期相关的事件处理程序的定义，我们可以看到它们包含一个额外的参数
    `launchOptions`。此参数的类型是 `NSDictionary`，包含一组键值对条目。这些条目允许你确定应用是如何启动的，以及传入了哪些启动参数。你可以在此处找到所有可用键的列表以及如何使用它们的示例：[`http://bit.ly/launch_options`](http://bit.ly/launch_options)。


    现在来看一下当我们把应用发送到后台时会发生什么。你可以在模拟器中按下以下键盘快捷键来实现：`COMMAND + SHIFT + H`。应用将会消失，你会看到另外两个事件处理程序被调用：`OnResignActivation`
    和 `DidEnterBackground`。你可以使用第一个事件来保存应用状态或释放应用在非活跃时不需要的任何资源。在 `OnResignActivation`
    之后，会触发 `DidEnterBackground` 应用事件。它会通知你应用状态已变为后台（请参考图 2-1）。


    现在，你可以通过点击模拟器中的 HelloWorld 应用图标将其发送到前台（见图 2-2）。此时会触发另外两个应用事件：`WillEnterForeground`
    和 `OnActivated`。它们与将应用置于后台时触发的两个应用事件相对应，因此其用途是相反的。即，`WillEnterForeground` 通知你应用即将进入前台，因此你可以使用相应的事件处理程序来恢复应用状态，并准备应用在前台所需的所有资源。随后，应用被激活，并通过
    `OnActivated` 事件通知你。


    ![A453659_1_En_2_Fig2_HTML.jpg](img/A453659_1_En_2_Fig2_HTML.jpg)


    图 2-2.


    带有 HelloWorld 应用图标的模拟器主屏幕


    最后，我们来看看当你通过多任务关闭应用时会发生什么（你可以像上一章那样，通过双击主屏幕按钮来激活多任务）。在这种情况下，会报告三个事件：`OnResignActivation`、`DidEnterBackground`
    和 `WillTerminate`。当你激活多任务时，前两个事件会被触发。所以，到目前为止，一切工作方式与你仅仅将应用置于后台时相同。一旦应用即将终止，会触发一个额外的事件
    `WillTerminate`。你可以使用此事件来清理应用在后台工作时使用的任何资源。

