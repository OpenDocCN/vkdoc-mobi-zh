    ## Model View Controller


    So far, we have discussed the elements of the HelloWorld app that either constitute
    the app entry point or are related to views or view control. However, iOS apps
    very often cooperate with data. Apps need to retrieve data from internal or external
    storage or services and then display it to the user. The user can then modify
    this data, and the app has to reflect these changes in the storage it is cooperating
    with. This is a very common scheme for modern mobile apps, which constitute the
    end point of some larger system. Therefore, to simplify the app organization and
    improve its maintenance, iOS apps are built with the use of the Model View Controller
    (MVC) programming paradigm or design pattern. MVC divides the app into three main
    elements: View, Controller, and Model. General relationships between these elements
    as well as the data and signals flow are depicted in Figure [2-10](#A453659_1_En_2_Chapter.html#Fig10).
    The controller is placed in the center because it plays the most important role.
    It displays views and handles user actions. These actions are mapped to event
    handlers and used to update the model, which represents the app state or some
    data set. A model notifies the controller whenever data was successfully updated
    or changed by some external process (another app or service). Controller uses
    these notifications to update its views.


    ![A453659_1_En_2_Fig10_HTML.jpg](A453659_1_En_2_Fig10_HTML.jpg)


    Figure 2-10.


    A general scheme of the Model View Controller programming paradigm


    The MVC design pattern improves app maintenance thanks to the explicit separation
    of each layer. Consequently, each app layer can be developed and tested independently.
    This further helps you to reuse your code and better control your development.


    ## Persisting Data


    In this final subsection, I will tell you how to supplement the HelloWorld app
    with the simple model, `Person`. This class will contain two properties, which
    will store the person’s first and last name. Then, in the default view, I will
    create two text-input fields, which will display a person’s data and will let
    the user arbitrarily change them (Figure [2-11](#A453659_1_En_2_Chapter.html#Fig11)).
    The data will be stored in a file in the device’s memory so that it can be restored
    after the app is restarted. The person’s data will be stored and restored within
    the `ViewWillDisappear` and `ViewWillAppear` events of the view lifecycle.


    ![A453659_1_En_2_Fig11_HTML.jpg](A453659_1_En_2_Fig11_HTML.jpg)


    Figure 2-11.


    A HelloWorld app supplemented by additional controls for editing a person’s data


    To implement the preceding solution, I first add the `Person.cs` file to the HelloWorld
    app. You can do this by clicking File ➤ New File from the Visual Studio menu.
    The dialog shown in Figure [2-12](#A453659_1_En_2_Chapter.html#Fig12) appears.
    In this dialog, you pick the Empty Class item from the General tab and then change
    the class name to `Person`. After ensuring that the “Add to project” checkbox
    is selected, you click the New button.


    Then, I implement the `Person` class (see companion code: `Chapter_02/HelloWorld/Person.cs`).
    As Listing [2-10](#A453659_1_En_2_Chapter.html#Par65) shows, this class derives
    from the `NSCoding` class. `NSCoding` provides a functionality for encoding and
    decoding objects in order to archive (store in file) or distribute them. Encoding
    means that the object is transformed into the architecture-independent byte stream,
    which can be further archived or transmitted to another process or a remote device.
    Then, the archived or received data is decoded such that the byte stream is transformed
    back to the particular object. In this case, the `Person` class has two public
    properties that will be stored in the device’s memory: `FirstName` and `LastName`.
    For each property, I defined a key (saved in `firstNameArchiveKey` and `lastNameArchiveKey`),
    which identifies a property in the archive. This archive will be a file in the
    app temporary folder (`archiveLocation` field).


    ![A453659_1_En_2_Fig12_HTML.jpg](A453659_1_En_2_Fig12_HTML.jpg)


    Figure 2-12.


    A New File dialog of Visual Studio


