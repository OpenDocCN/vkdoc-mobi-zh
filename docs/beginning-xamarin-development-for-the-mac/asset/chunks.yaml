    By analyzing Listing [6-9](#A453659_1_En_6_Chapter.html#Par38), we can easily
    note two new elements with respect to the unit tests we implemented previously.
    First and foremost, there is yet another method, `BeforeEachTest`. This method
    is marked with a `SetUpAttribute` . The latter instructs a test runner to invoke
    a selected function before every test method. Here, `BeforeEachTest` creates an
    object that derives from the `iOSApp` interface. This interface defines methods
    and properties that you use to interact with the app under test.


    To create an object `iOSApp`, you use the static class `ConfigureApp`. This class
    has two properties: Android of type `AndroidAppConfigurator`, and iOS of type
    `iOSAppConfigurator`. For iOS apps, we are only interested in the second one,
    which is used to configure test parameters (like device identifier, app bundle,
    and so on). Then, we run tests with the `StartApp` method. An instance of the
    `iOSApp` class is then used to programmatically manipulate the UI in exactly the
    same way the user would.


    To prepare the first UI test for the Persons app, I first extend a definition
    of the `Person` class (Persons.Common project) by a static method from Listing
    [6-10](#A453659_1_En_6_Chapter.html#Par42). This method creates an instance of
    the `Person` object and then configures the public properties to default values.
    I will later use the `Person.Default` method in the UI test and in the Person
    app.


    ```

    public static Person Default()

    {

    return new Person

    {

    FirstName = "Dawid",

    LastName = "Borycki",

    Age = 34,

    Email = "dawid@borycki.com.pl",

    };

    }

    Listing 6-10.

    Additional Static Method of the Person Class

    ```


    Next, in the `Tests` class (Persons.UITests), I implement the `VerifyDisplayDataButton`
    test method according to Listing [6-11](#A453659_1_En_6_Chapter.html#Par46). `VerifyDisplayDataButton`
    virtually taps a button from the view of the Persons app and verifies whether
    the text in each text field corresponds to the default person data.


    To virtually tap a control, you use the `Tap` method of the `iOSApp` class instance.
    This method has two overloaded versions: the one, which accepts as an argument
    a C# `Func` delegate, and the other, which accepts string arguments. In the first
    case, you create the lambda expression, which returns an instance of the `AppQuery`
    class. The `AppQuery` class provides a number of methods that are used to find
    UI elements. In the second case, you pass a string, which is used by the test
    runner to find UI elements by inspecting their accessibility identifiers or accessibility
    labels. Here, to find a button, I use a lambda expression, which I constructed
    with an `AppQuery.Button` method. This method matches the first button on the
    view.


    Next, I read text from the text fields using the helper method `GetTextFieldText`,
    which finds text fields by their accessibility identifiers. To do so, I construct
    an `AppQuery`, in which I pass a string argument representing the control accessibility
    identifier. Once text from text fields is obtained, I compare it to expected values,
    and if they differ I raise a corresponding assertion using static methods of the
    `Assert` class.'
  trans: "\n### 创建 UI 测试\n\n为了创建测试运行器，该运行器将向 Xamarin Test Cloud Agent 发送请求以测试 Persons\
    \ 应用的 UI，我添加了一个新项目 `Persons.UITests`，该项目是使用 Visual Studio 中的 UI 测试应用项目模板创建的（图\
    \ 6-14）。\n\n![A453659_1_En_6_Fig14_HTML.jpg](img/A453659_1_En_6_Fig14_HTML.jpg)\n\
    **图 6-14.** 新建项目对话框中的 UI 测试应用项目模板\n\n创建 `Persons.UITests` 后，我们可以注意到，与 `Persons.Tests`\
    \ 不同，该项目没有 iOS 应用的典型结构。此外，通过比较这两个项目，我们发现它们针对不同的框架并编译到不同的目标。要查看这一点，请转到解决方案资源管理器，从每个项目的上下文菜单中选择“选项”，然后转到“生成/常规”选项卡\
    \ ➤ “目标框架”并编译顶部显示的目标（见图 6-15）。\n\n![A453659_1_En_6_Fig15_HTML.jpg](img/A453659_1_En_6_Fig15_HTML.jpg)\n\
    **图 6-15.** `Persons.Tests`（上方）和 `Persons.UITests` 项目的生成选项的常规选项\n\n如图 6-15 所示，`Persons.Tests`\
    \ 是 Xamarin.iOS 可执行应用程序，并像其他任何 iOS 应用一样直接在设备或模拟器上运行。在这种情况下，您可以使用测试运行器的 UI 来调用测试方法（请回头参考图\
    \ 6-3）。另一方面，`Persons.UITests` 是 .NET Framework 类库。由于它未编译为可执行文件，因此是间接运行的。在 `Persons.UITests`\
    \ 中实现的每个测试方法都由 `Xamarin.UITest` 框架调用。要使用单元测试面板关联将由该框架执行的应用，请转到“视图” ➤ “面板” ➤ “单元测试”。将会出现一个如图\
    \ 6-16 所示的窗口。\n\n![A453659_1_En_6_Fig16_HTML.jpg](img/A453659_1_En_6_Fig16_HTML.jpg)\n\
    **图 6-16.** 单元测试面板\n\n在单元测试面板中，您首先选择要测试的应用。为此，右键单击“测试应用”节点，然后选择“添加应用项目”选项以浏览 Persons\
    \ 项目。之后，您可以通过按“全部运行”按钮或双击单元测试面板中 Persons ➤ UITests ➤ Tests 节点下出现的任何测试方法来运行 UI\
    \ 测试，前提是该应用之前已部署到模拟器。默认的 UI 测试应用项目只有一个测试方法 `AppLaunches`。如果现在执行此方法，您将看到 UI 测试框架将另一个应用\
    \ DeviceAgent 部署到您的模拟器。`DeviceAgent` 使用 iOS 提供的 UI 自动化 API 来模拟单元测试中以编程方式定义的手势和操作，并将它们发送到被测试的应用。因此，实际上，`DeviceAgent`\
    \ 充当了一个虚拟用户，在测试方法的指令下模拟用户操作。`DeviceAgent` 还收集这些操作的结果并将其传递回测试方法。\n\n要实现测试方法，您可以采用类似于实现单元测试的方式。更具体地说，每个测试类都由\
    \ `TestFixtureAttribute` 标记，而每个测试方法必须是公共的并且由 `TestAttribute` 修饰。清单 6-9 展示了此类结构在\
    \ `Tests` 类中的使用方式——这是一个随 `Persons.UITests` 项目创建的默认测试类。\n\n```csharp\n[TestFixture]\n\
    public class Tests\n{\n    iOSApp app;\n    [SetUp]\n    public void BeforeEachTest()\n\
    \    {\n        app = ConfigureApp.iOS.StartApp();\n    }\n    [Test]\n    public\
    \ void AppLaunches()\n    {\n        app.Screenshot(\"First screen.\");\n    }\n\
    }\n```\n**清单 6-9.** UI 测试类的默认定义\n\n通过分析清单 6-9，我们可以轻松地注意到与我们之前实现的单元测试相关的两个新元素。首先，还有一个方法\
    \ `BeforeEachTest`。此方法标有 `SetUpAttribute`。后者指示测试运行器在每个测试方法之前调用一个选定的函数。在这里，`BeforeEachTest`\
    \ 创建一个派生自 `iOSApp` 接口的对象。该接口定义了用于与被测应用交互的方法和属性。\n\n要创建 `iOSApp` 对象，您可使用静态类 `ConfigureApp`。此类有两个属性：类型为\
    \ `AndroidAppConfigurator` 的 `Android` 和类型为 `iOSAppConfigurator` 的 `iOS`。对于 iOS\
    \ 应用，我们只对第二个感兴趣，它用于配置测试参数（如设备标识符、应用包等）。然后，我们使用 `StartApp` 方法运行测试。`iOSApp` 类的实例随后被用来以编程方式操作\
    \ UI，其方式与用户操作完全相同。\n\n为了为 Persons 应用准备第一个 UI 测试，我首先通过清单 6-10 中的一个静态方法来扩展 `Person`\
    \ 类（`Persons.Common` 项目）的定义。此方法创建一个 `Person` 对象的实例，然后将公共属性配置为默认值。稍后我将在 UI 测试和\
    \ Person 应用中使用 `Person.Default` 方法。\n\n```csharp\npublic static Person Default()\n\
    {\n    return new Person\n    {\n        FirstName = \"Dawid\",\n        LastName\
    \ = \"Borycki\",\n        Age = 34,\n        Email = \"dawid@borycki.com.pl\"\
    ,\n    };\n}\n```\n**清单 6-10.** Person 类的额外静态方法\n\n接下来，在 `Tests` 类（`Persons.UITests`）中，我根据清单\
    \ 6-11 实现了 `VerifyDisplayDataButton` 测试方法。`VerifyDisplayDataButton` 虚拟地点击 Persons\
    \ 应用视图中的一个按钮，并验证每个文本字段中的文本是否与默认人员数据对应。\n\n要以虚拟方式点击控件，您可以使用 `iOSApp` 类实例的 `Tap`\
    \ 方法。此方法有两个重载版本：一个接受 C# `Func` 委托作为参数，另一个接受字符串参数。在第一种情况下，您创建 lambda 表达式，该表达式返回\
    \ `AppQuery` 类的实例。`AppQuery` 类提供了许多用于查找 UI 元素的方法。在第二种情况下，您传递一个字符串，测试运行器使用该字符串通过检查\
    \ UI 元素的辅助功能标识符或辅助功能标签来查找它们。在这里，为了找到一个按钮，我使用了一个 lambda 表达式，它是用 `AppQuery.Button`\
    \ 方法构建的。此方法匹配视图上的第一个按钮。\n\n接下来，我使用辅助方法 `GetTextFieldText` 从文本字段读取文本，该方法通过文本字段的辅助功能标识符来查找它们。为此，我构建了一个\
    \ `AppQuery`，在其中传递一个表示控件辅助功能标识符的字符串参数。获取文本字段中的文本后，我将其与预期值进行比较，如果它们不同，则使用 `Assert`\
    \ 类的静态方法引发相应的断言。"
- fmt: "```csharp\n[Test]\npublic void VerifyDisplayDataButton()\n{\n    // Arrange\n\
    \    var defaultPerson = Person.Default();\n    // Act\n    app.Tap(b => b.Button());\n\
    \    var actualFirstName = GetTextFieldText(\"TextFieldFirstName\");\n    var\
    \ actualLastName = GetTextFieldText(\"TextFieldLastName\");\n    var actualEmail\
    \ = GetTextFieldText(\"TextFieldEmail\");\n    var actualAge = GetTextFieldText(\"\
    TextFieldAge\");\n    // Assert\n    Assert.AreEqual(defaultPerson.FirstName,\
    \ actualFirstName);\n    Assert.AreEqual(defaultPerson.LastName, actualLastName);\n\
    \    Assert.AreEqual(defaultPerson.Email, actualEmail);\n    Assert.AreEqual(defaultPerson.Age.ToString(),\
    \ actualAge);\n}\nprivate string GetTextFieldText(string textFieldAccessibilityId)\n\
    {\n    var result = string.Empty;\n    if(app.Query(c => c.Id(textFieldAccessibilityId)).FirstOrDefault()\n\
    \        is AppResult matchedTextField)\n    {\n        result = matchedTextField.Text;\n\
    \    }\n    return result;\n}\n```\nListing 6-11. UI Test\n\nWe can now execute\
    \ the `VerifyDisplayDataButton` test method by double-clicking it in the Unit\
    \ Tests pad. The test runner executes the `DeviceAgent`, which subsequently runs\
    \ the Person app and virtually taps a button. Since the corresponding event handler\
    \ is empty, none of text fields will contain expected values, and the test will\
    \ fail, which is shown in the Test Results window (Figure [6-17](#A453659_1_En_6_Chapter.html#Fig17)).\
    \ The `Assert.AreEqual` method throws an exception, saying that the expected string\
    \ (`\"Dawid\"`) differs from the actual one (`string.Empty`).\n\n![A453659_1_En_6_Fig17_HTML.jpg](A453659_1_En_6_Fig17_HTML.jpg)\n\
    \nFigure 6-17. Test Results window\n\nWe can now implement the handler for the\
    \ `TouchUpInside` event of the button in the Person app according to Listing [6-12](#A453659_1_En_6_Chapter.html#Par49)\
    \ (`ViewController.cs`), rebuild the Person app, and re-run the UI test to confirm\
    \ the correctness of our implementation. By doing so, we effectively perform a\
    \ single iteration of the TDD approach. Namely, we first wrote a test method and\
    \ ran it to verify that the app did not implement expected functionality. We then\
    \ supplemented an app with the correct logic and re-ran a test method to confirm\
    \ it. Once test methods are implemented, you can execute them every time you change\
    \ the related source of code to ensure that you do not introduce regression errors\
    \ or lose already-implemented functionality. Therefore, such automatic testing\
    \ helps to develop high-quality apps.\n\n```csharp\npartial void ButtonDisplayPersonData_TouchUpInside(UIButton\
    \ sender)\n{\n    var defaultPerson = Person.Default();\n    TextFieldFirstName.Text\
    \ = defaultPerson.FirstName;\n    TextFieldLastName.Text = defaultPerson.LastName;\n\
    \    TextFieldAge.Text = defaultPerson.Age.ToString();\n    TextFieldEmail.Text\
    \ = defaultPerson.Email;\n}\n```\nListing 6-12. A Final Definition of the Event\
    \ Handler for Displaying Default Person Data\n\n## Xamarin Test Cloud\n\nAll tests\
    \ we’ve written so far were run locally in the simulator. However, the Xamarin\
    \ UI testing framework can be also utilized to run tests on physical devices.\
    \ Typically, you deploy an app to be tested to the device and then run UI tests\
    \ on that device. So, if you need to perform the same tests on various devices,\
    \ you do it sequentially, which requires extra time. Moreover, you need to physically\
    \ possess all devices with various OS versions. So, comprehensive testing of an\
    \ iOS app can be very expensive, especially for individual developers. To solve\
    \ these problems, Xamarin delivers a farm of physical devices known as the Xamarin\
    \ Test Cloud. `XTC` is a cloud-based service to which you can upload an app and\
    \ its UI tests directly from Visual Studio and then run tests on as many devices\
    \ as needed. Test results are then presented to you in the form of a clear report,\
    \ shown previously in Figure [6-4](#A453659_1_En_6_Chapter.html#Fig4). Although\
    \ submitting an app to `XTC` is straightforward, it requires you to create a provisioning\
    \ profile for your app because an app bundle is executed on physical devices.\
    \ Hence, I will start this subsection by explaining how to create a provisioning\
    \ profile, and then I will show you how to submit an app to `XTC`, choose devices,\
    \ and execute tests. To complete this section, you will need to create a trial\
    \ account in the `XTC`: [`https://testcloud.xamarin.com/register`](https://testcloud.xamarin.com/register).\n\
    \n### Provisioning Profile\n\nTo create a provisioning profile, you need `Xcode`,\
    \ an Apple ID, and a physical iOS device connected to your development Mac. Then,\
    \ you proceed as follows:\n\n1. Open `Xcode`, where you click the Accounts tab.\
    \ Under Preferences, choose “Apple ID” for type of account, and then type your\
    \ Apple ID credentials (Figure [6-18](#A453659_1_En_6_Chapter.html#Fig18)). Your\
    \ account will then appear on the left-hand side of the window, as shown.\n\n\
    \   ![A453659_1_En_6_Fig18_HTML.jpg](A453659_1_En_6_Fig18_HTML.jpg)\n\n   Figure\
    \ 6-18. Signing in to `Xcode` with the Apple ID\n\n2. Choose your account and\
    \ click the Manage Certificates… button, located in the bottom right part of the\
    \ Accounts tab (Figure [6-19](#A453659_1_En_6_Chapter.html#Fig19)). This activates\
    \ the Signing Certificates window.\n\n   ![A453659_1_En_6_Fig19_HTML.jpg](A453659_1_En_6_Fig19_HTML.jpg)\n\
    \n   Figure 6-19. A list of teams associated with the Apple ID\n\n3. In the Signing\
    \ Certificates window, press the `+` button and choose “iOS Development” (Figure\
    \ [6-20](#A453659_1_En_6_Chapter.html#Fig20)). Press the Done button after a certificate\
    \ is created, and then press the Download All or Manual Profiles button. You can\
    \ now close `Xcode` preferences.\n\n   ![A453659_1_En_6_Fig20_HTML.jpg](A453659_1_En_6_Fig20_HTML.jpg)\n\
    \n   Figure 6-20. Creating a signing certificate\n\nGiven a signing certificate\
    \ for iOS development, we need to associate it with the Persons app. This needs\
    \ to be done using `Xcode` and a physical iOS device connected to the Mac. In\
    \ `Xcode`, you now create a new iOS app by going to File ➤ New ➤ Project… A window\
    \ like that shown in Figure [6-21](#A453659_1_En_6_Chapter.html#Fig21) appears.\
    \ In this window, you choose a Single View Application and then click the Next\
    \ button.\n\n![A453659_1_En_6_Fig21_HTML.jpg](A453659_1_En_6_Fig21_HTML.jpg)\n\
    \nFigure 6-21. New project dialog in `Xcode`\n\nAfter choosing a project template,\
    \ another window, Choose options for your new project, appears. This window, shown\
    \ in Figure [6-22](#A453659_1_En_6_Chapter.html#Fig22), lets you specify the product\
    \ and organization name for your app. Ensure that these values match the corresponding\
    \ configuration from the `Info.plist` of your Xamarin.iOS Person app. Namely,\
    \ in my case the product name is set to `Persons`, while the organization name\
    \ is `com.db`. You can leave other options at the default values, then click the\
    \ Next button and choose a location for your project. `Xcode` will then create\
    \ an empty app and display its configuration (Figure [6-23](#A453659_1_En_6_Chapter.html#Fig23)).\
    \ In this window, you need to ensure that the provisioning profile and signing\
    \ certificate (Signing section) are set. If not, you need to connect a physical\
    \ iOS device and then press the Try Again button, which appears at the bottom\
    \ of the Signing section.\n\n![A453659_1_En_6_Fig23_HTML.jpg](A453659_1_En_6_Fig23_HTML.jpg)\n\
    \nFigure 6-23. Identity and signing sections of the Persons `Xcode` app\n\n![A453659_1_En_6_Fig22_HTML.jpg](A453659_1_En_6_Fig22_HTML.jpg)\n\
    \nFigure 6-22. Configuring project options\n\nGiven the provisioning profile,\
    \ you go back to Visual Studio and open the options of the Persons project (Figure\
    \ [6-24](#A453659_1_En_6_Chapter.html#Fig24)). Then, go to iOS Bundle Signing\
    \ under the Build tab, in which you do the following:\n\n![A453659_1_En_6_Fig24_HTML.jpg](A453659_1_En_6_Fig24_HTML.jpg)\n\
    \nFigure 6-24. iOS Bundle Signing section of the Xamarin.iOS Persons app in Visual\
    \ Studio\n\n* Choose “iPhone” from the Platform drop-down list.\n* Set Signing\
    \ Identity to “Developer (Automatic).”\n* Choose “Automatic” from the Provisioning\
    \ Profile drop-down list.\n\nVisual Studio can now generate the app package, which\
    \ can be deployed to the `XTC`."
