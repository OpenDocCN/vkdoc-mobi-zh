  trans: "\n# 显示天气信息\n\n现在我们已经准备好获取并显示天气状况所需的一切，接下来将 UI 层与 `WeatherServiceHelper`\
    \ 结合起来。为了实现这一功能，我实现了 `ViewController` 类。首先，我定义了 `DisplayWeatherInfo` 方法，如代码清单\
    \ 9-10 所示。该方法接收一个 `WeatherInfo` 类的实例（`weatherInfo` 参数），并在默认视图中显示其选定属性的值。此外，也可以为\
    \ `weatherInfo` 参数传递 `null`。在这种情况下，`DisplayWeatherInfo` 会显示替代符号（`--`）来代替温度、湿度、气压和描述的实际值。\n\
    \n```\nprivate async Task DisplayWeatherInfo(WeatherInfo weatherInfo)\n{\n   \
    \ var alternateSymbol = \"--\";\n    var tempUnit = WeatherServiceHelper.GetTemperatureUnitString(temperatureUnit);\n\
    \    var pressureUnit = \"hPa\";\n    if (weatherInfo == null)\n    {\n      \
    \  LabelTemperature.Text = $\"Temperature: {alternateSymbol}\";\n        LabelHumidity.Text\
    \ = $\"Humidity: {alternateSymbol}\";\n        LabelPressure.Text = $\"Pressure:\
    \ {alternateSymbol}\";\n        LabelDescription.Text = $\"Description: {alternateSymbol}\"\
    ;\n    }\n    else\n    {\n        LabelTemperature.Text = \"Temperature: \" +\
    \ $\"{weatherInfo.Main.Temp} {tempUnit}\";\n        LabelHumidity.Text = \"Humidity:\
    \ \" + $\"{weatherInfo.Main.Humidity} %\";\n        LabelPressure.Text = \"Pressure:\
    \ \" + $\"{weatherInfo.Main.Pressure} {pressureUnit}\";\n        LabelDescription.Text\
    \ = \"Description: \" + $\"{weatherInfo.Weather.FirstOrDefault().Description}\"\
    ;\n        ImageViewWeatherIcon.Image = await IconHelper.GetIcon(weatherInfo);\n\
    \    }\n}\n```\n\n在标签中显示文本非常直接。我只需将 `WeatherInfo` 类实例的属性值写入标签的 `Text` 属性即可。而要显示图标，则需要多花一些功夫。OpenWeatherMap\
    \ API 会返回图标标识符，你可以利用这些标识符获取实际 PNG 格式位图的 URL。此类 URL 的通用结构如下：\n\n`http://openweathermap.org/img/w/`\
    \ `<iconId>` `.png`\n\n其中 `<iconId>` 是你请求 OpenWeatherMap API 提供所选城市的当前天气状况时获取的值。图标标识符存储在\
    \ `Weather` 对象的 `Icon` 属性中。\n\n获得图标 URL 后，我必须下载该图标，然后将其转换为 `UIImage` 类的实例，以便在\
    \ Image View 控件中显示。为了实现这一功能，我向 HelloTV 项目添加了 `IconHelper` 类（参见 `Helpers` 文件夹下的\
    \ `IconHelper.cs` 文件）。`IconHelper` 类的完整定义见代码清单 9-11。如图所示，`IconHelper` 包含三个私有静态字段：`httpClient`、`baseAddress`\
    \ 和 `iconExtension`。第一个字段存储对 `HttpClient` 类实例的引用，用于实际从 OpenWeatherMap 服务下载表示位图的字节数组；第二个字段\
    \ `baseAddress` 存储用于获取图标的 URL 主体部分；最后一个字段 `iconExtension` 是一个常量，存储 `.png` 扩展名。从\
    \ `baseAddress` 和 `iconExtension` 获取的值，连同从 `WeatherInfo` 类实例获取的图标标识符，组合成最终的 URL（参见代码清单\
    \ 9-11 中的 `GetIconUrl` 方法）。生成的 URL 随后在 `GetIcon` 方法中使用，我将该 URL 作为 `HttpClient`\
    \ 类实例的 `GetByteArrayAsync` 方法的参数传递。`GetByteArrayAsync` 返回一个表示图像数据的字节数组，我使用该数组通过静态方法\
    \ `LoadFromData` 实例化 `UIImage` 类（代码清单 9-11 中 `GetIcon` 方法的最后一条语句）。请注意，要将 `GetByteArrayAsync`\
    \ 返回的字节数组转换为 `UIImage.LoadFromData` 接受的 `NSData` 对象，我必须使用 `NSData` 类的静态方法 `FromArray`。\n\
    \n```\npublic static class IconHelper\n{\n    private static HttpClient httpClient;\n\
    \    private static string baseAddress = \"http://openweathermap.org/img/w/\"\
    ;\n    private static string iconExtension = \".png\";\n\n    static IconHelper()\n\
    \    {\n        httpClient = new HttpClient();\n    }\n\n    public static async\
    \ Task<UIImage> GetIcon(WeatherInfo weatherInfo)\n    {\n        var iconUrl =\
    \ GetIconUrl(weatherInfo);\n        var imageData = await httpClient.GetByteArrayAsync(iconUrl);\n\
    \        return UIImage.LoadFromData(NSData.FromArray(imageData));\n    }\n\n\
    \    private static string GetIconUrl(WeatherInfo weatherInfo)\n    {\n      \
    \  var iconName = weatherInfo.Weather.FirstOrDefault().Icon;\n        return $\"\
    {baseAddress}{iconName}{iconExtension}\";\n    }\n}\n```\n\n随后，我在 `ViewDidLoad`\
    \ 事件处理程序（代码清单 9-12）中使用 `null` 参数调用 `DisplayWeatherInfo`。这样做是为了将所有标签的 `Text` 属性设置为初始值。在\
    \ `ViewDidLoad` 事件处理程序中，我还将 `ButtonGetCurrentWeather_PrimaryActionTriggered` 方法与按钮的\
    \ `PrimaryActionTriggered` 事件关联起来。当用户轻点该按钮时，会触发此操作。\n\n```\npublic async override\
    \ void ViewDidLoad()\n{\n    base.ViewDidLoad();\n    await DisplayWeatherInfo(null);\n\
    \    ButtonGetCurrentWeather.PrimaryActionTriggered += ButtonGetCurrentWeather_PrimaryActionTriggered;\n\
    }\n```\n\n代码清单 9-13 展示了 `ButtonGetCurrentWeather_PrimaryActionTriggered` 方法的定义。该函数的工作流程如下：当用户轻点按钮时，我首先读取他在文本字段中输入的城市名称。如果城市名称为空，则显示一个带有以下消息的模态窗口：请输入城市名称。为了显示弹窗，我编写了\
    \ `DisplayOkAlert` 方法。如代码清单 9-14 所示，该方法使用了与之前在 iOS 应用中显示弹窗相同的类（`UIAlertController`\
    \ 和 `UIAlertAction`）。不过，弹窗的外观有所不同（见图 9-5）。\n\n![A453659_1_En_9_Fig5_HTML.jpg](img/A453659_1_En_9_Fig5_HTML.jpg)\n\
    \n尽管 tvOS 使用与 iOS 相同的类来显示弹窗，但相应的 tvOS 窗口外观不同（请回看第 1 章）。\n\n```\nprivate TemperatureUnit\
    \ temperatureUnit = TemperatureUnit.Metric;\n\nprivate async void ButtonGetCurrentWeather_PrimaryActionTriggered(object\
    \ sender, EventArgs e)\n{\n    var cityName = TextFieldCityName.Text;\n    if\
    \ (string.IsNullOrEmpty(cityName))\n    {\n        DisplayOkAlert(\"Please enter\
    \ the city name\");\n    }\n    else\n    {\n        try\n        {\n        \
    \    var weatherInfo = await WeatherServiceHelper.GetWeatherInfo(cityName, temperatureUnit);\n\
    \            await DisplayWeatherInfo(weatherInfo);\n        }\n        catch\
    \ (Exception ex)\n        {\n            DisplayOkAlert(ex.Message);\n       \
    \ }\n    }\n}\n```\n\n```\nprivate void DisplayOkAlert(string message)\n{\n  \
    \  var controller = UIAlertController.Create(\"HelloTV\", message, UIAlertControllerStyle.Alert);\n\
    \    var okAction = UIAlertAction.Create(\"OK\", UIAlertActionStyle.Default, null);\n\
    \    controller.AddAction(okAction);\n    PresentViewController(controller, true,\
    \ null);\n}\n```\n\n如果用户提供了有效的城市名称，`ButtonGetCurrentWeather_PrimaryActionTriggered`\
    \ 会使用 `WeatherServiceHelper.GetWeatherInfo` 方法向 OpenWeatherMap API 发送请求。该函数返回一个\
    \ `WeatherInfo` 类的实例，随后将其传递给 `DisplayWeatherInfo` 方法，以使用接收到的天气状况更新 UI。\n"
- fmt: '# Temperature Units


    To specify units in the `ViewController` class, I declared a private field, `temperatureUnit`.
    Its default value is set to `TemperatureUnit.Metric`. Therefore, when you run
    the app it displays temperature in degree Celsius. To get temperature readings
    in a different scale you need to change the value of the `temperatureUnit` field.
    For instance, if you change it to `TemperatureUnit.Imperial` you will get results
    similar to those presented in Figure [9-6](#A453659_1_En_9_Chapter.html#Fig6).


    ![A453659_1_En_9_Fig6_HTML.jpg](A453659_1_En_9_Fig6_HTML.jpg)


    Figure 9-6. Presenting weather conditions with imperial units (compare with Figure
    [9-1](#A453659_1_En_9_Chapter.html#Fig1))


    # Testing the App in a Simulator


    To test the HelloTV app, you can use a simulator. To launch the app, you proceed
    similarly to in previous chapters. Just use the Target/Debug pad to set the app
    to HelloTV, pick the Apple TV tvOS 11.0 simulator, and then run the app. After
    a short while, you will see the app running in the simulator (Figure [9-7](#A453659_1_En_9_Chapter.html#Fig7)).
    The app displays a text field, button, and four labels with alternate symbols.
    You will also note that you cannot directly click or tap any visual control with
    the mouse or a touchpad. Instead, to control the simulator, you use either the
    Apple TV Remote or the keyboard of the Mac you use for development.


    ![A453659_1_En_9_Fig7_HTML.jpg](A453659_1_En_9_Fig7_HTML.jpg)


    Figure 9-7. A default view of the HelloTV app right after the app is launched
    in the tvOS simulator


    To enable both options, you use the Hardware menu of the simulator. Go to Hardware
    ➤ Show Apple TV Remote to activate the remote control, or ensure that the following
    option—Hardware ➤ Keyboard ➤ Connect Hardware Keyboard—is on (to use the keyboard).
    Once the remote control is enabled, you use its pad to move the cursor within
    the screen of the simulator. To tap any control, you press the ALT/OPTION key
    and then tap the virtual controller’s pad. If you want to use the keyboard, then
    you navigate between controls using arrows. Use the Enter key to perform an action
    and the ESC key to get back from a menu or to dismiss windows. You will see that
    once you navigate between visual items they become highlighted.


    Now, whichever method you choose, tap the text field. This activates the window
    in which you can type the city name (Figure [9-8](#A453659_1_En_9_Chapter.html#Fig8)).
    Replace the default value with a city name and confirm your selection by pressing
    the Done button. After getting back to the main view of the HelloTV app, press
    the Get current weather button. An app displays values obtained from the OpenWeatherMap
    API, as shown in Figure [9-9](#A453659_1_En_9_Chapter.html#Fig9).


    ![A453659_1_En_9_Fig9_HTML.jpg](A453659_1_En_9_Fig9_HTML.jpg)


    Figure 9-9. Current weather in San Francisco obtained with the HelloTV app


    ![A453659_1_En_9_Fig8_HTML.jpg](A453659_1_En_9_Fig8_HTML.jpg)


    Figure 9-8. A default tvOS screen you use to enter text into a text field


    # Summary


    In this chapter, we learned how to start implementing apps for tvOS. Using the
    OpenWeatherMap API, I showed you how to develop an app that presents the weather
    conditions for the selected city. You can easily extend this functionality to
    display the weather forecast. To that end, you will need to modify the base address
    of the request such that `weather` is replaced by `forecast`. Afterward, map the
    JSON response to the appropriate C# objects and display their properties in the
    UI. To display a forecast, you might consider using different controls, like the
    Table View. It will be a good exercise for you to practice the knowledge you learned
    in this and all previous chapters.


    This chapter also ends the book. I hope you enjoyed all the content, and I am
    more than sure that the presented material will help you jumpstart developing
    mobile apps for iOS, watchOS, and tvOS. Although I did not cover many advanced
    features of each platform, you should be able to use these features with the help
    of the Apple SDK documentation because, as I explained in Chapter [2](#A453659_1_En_2_Chapter.html),
    the corresponding API is mapped by Xamarin.iOS to C# classes and interfaces. So,
    I wish you good luck in your development and am looking forward to seeing your
    apps in the Apple Store.'
