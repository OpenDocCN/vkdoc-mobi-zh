    method, `WillFinishLaunching`, and one private method , `DisplayInfo. WillFinishLaunching`
    handles the corresponding app event, while `DisplayInfo` is implemented to present
    information about the application event. Therefore, this method is invoked within
    each application event handler, being an overriden version of appropriate event
    handler from the base class (`UIApplicationDelegate`). Note that I always pass
    the name of the application event to the first argument of `DisplayInfo`. This
    method then prints the event name along with the application state in the application
    output. To that end, I use the `WriteLine` method of the `System.Diagnostics.Debug`
    class. To obtain an application’s state, I read the corresponding property of
    the `UIApplication` class. An instance of this class is passed to the second argument
    of the `DisplayInfo` method.


