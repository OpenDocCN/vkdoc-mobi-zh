    的精确值取决于经度跨度。这里，我将两个方向上的跨度都设置为 0.005 度。有了 `MKCoordinateSpan` 的实例，我就可以用它来实例化 `MKCoordinateRegion`
    类。它的构造函数接受以下两个参数：


    - `center`，类型为 `CLLocationCoordinate2D`，指定地图区域的中点

    - `span`，类型为 `MKCoordinateSpan`，决定地图的缩放级别


    为了获得 `MKCoordinateRegion` 构造函数所需的 `CLLocationCoordinate2D` 实例，我读取了从 `CLLocationManager`
    获取的位置的 `Coordinate` 属性（代码清单 3-25）。

