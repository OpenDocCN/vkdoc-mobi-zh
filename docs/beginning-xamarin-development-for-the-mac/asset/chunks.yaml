    ## 总结


    在本章中，你学习了应用的结构和生命周期。你更深入地了解了应用的入口点、`AppDelegate` 类的作用，以及如何定义应用的属性和功能。我们了解了启动故事板，并描述了主故事板的内部结构。最后，我们深入探讨了模型-视图-控制器设计模式，并将其与视图生命周期结合使用，以在设备内存中持久化数据。


    # 3. 视图


    在掌握了 iOS 应用结构、可用项目模板和应用生命周期的知识之后，我们可以继续学习如何创建复杂视图。我们将从学习如何使用几个基本控件（如开关和滑块）开始，然后研究高级控件，如表格视图、网页视图和地图视图。具体来说，我们将学习如何使用表格来显示数据集合。Web
    视图将用于在 Xamarin.iOS 应用中渲染交互式网页（Google 地图）。最后，我们将使用地图视图来呈现原生的 iOS 地图。在本章中，我们还将学习如何定义自适应视图，这些视图会自动适配不同尺寸的屏幕以及设备方向。


    几乎所有 iOS 控件的名称都以 "view" 结尾；例如，Table View（表格视图）或 Map View（地图视图）。因此，为了节省篇幅，我通常会简称为
    table 或 map，而不再使用全称。

