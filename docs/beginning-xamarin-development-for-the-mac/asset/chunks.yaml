    The programming of mobile apps has recently become one of the most important and
    exciting aspects of the IT market, leading to numerous applications. At the same
    time, mobile development is very challenging because of market fragmentation,
    which is manifested by the presence of devices of different sizes, operating systems,
    and software development tools. So, to start doing mobile development, you need
    to take into account these various factors and decide your strategy.


    There are three leading mobile platforms: Apple (including iOS, watchOS, and tvOS),
    Android, and Universal Windows Platform (UWP), each of which provides dedicated
    tools for developing apps. Each platform has specific hardware requirements. Clearly,
    iOS SDKs require you to use the local Mac machine or the remote build agent installed
    on a Mac. UWP apps can be built on Windows 10 machines. Finally, you can use either
    Mac or Windows machines to develop Android apps. So, first and foremost, the question
    to answer is that of which hardware to choose. For mobile development, the Intel-based
    Mac platform is the best choice because it allows you to use macOS and Windows
    10 concurrently. The latter can be installed natively through the Boot Camp or
    virtually using the Parallels Desktop. Accordingly, Mac machines will give you
    the most flexibility.


    After choosing the hardware, you need to select the software development strategy.
    You have three traditional options here:


    *   Native apps – In this case, you use platform SDKs, which require you to utilize
    platform-specific IDEs and programming languages. For instance, in terms of iOS,
    watchOS, and tvOS, you would need to use either Swift or Objective-C along with
    Xcode. Native tools give you full access to the platform API at the cost of needing
    to learn platform-specific programming languages.

    *   Hybrid apps – They are programmed with web technologies as web pages. These
    pages are then rendered with a native WebView component, which can be virtually
    understood as the local web browser, delivered by each platform. In this case,
    you have a lot of flexibility in terms of programming tools and can use the same
    code across various platforms at the cost of reduced access to platform-specific
    APIs.

    *   Mobile web apps – They are web apps whose views are tailored to mobile devices.
    Such a strategy is the simplest to apply but does not let you access device components,
    and it also requires a network connection.


    Of course, development strategy is dictated by a number of factors, ranging from
    your programming preferences to application complexity and target platforms. If
    you intend to target multiple platforms at the same time, you can choose one of
    the cross-platform mobile tools, like Xamarin.Forms, Qt Mobile, Embarcadero RAD
    Studio, or React Native. They provide an additional layer of the unified, platform-independent
    programming API, which is translated to a platform-specific API during compilation.
    Importantly, cross-platform instruments provide not only access to the API but
    also to visual controls. For instance, if you create a message dialog, it will
    be converted during compilation to the platform-specific message dialog. As a
    result, in such a “Write once, run anywhere (WORA)” approach, you can indeed compile
    the same code across various platforms at the cost of flexibility. Finally, if
    your goal is to extensively utilize platform-specific APIs, you will choose Xamarin.iOS
    or Xamarin.Android. These let you develop native apps with C# or F#. Xamarin.iOS
    and Xamarin.Android provide an additional thin layer that maps C# or F# code onto
    the native platform API. You typically use Xamarin.iOS and Xamarin.Android to
    implement logic and design the UI separately for each platform. Although you have
    the extra work of creating platform-specific UIs, you can still share the platform-independent
    code between various apps. Such an approach gives you two important advantages:


    *   Your app is native. So, it looks like any other built-in app, as it utilizes
    native visual controls.

    *   Your app is written in modern programming language. As a result, you have
    easy access to numerous libraries and a wide community. This is especially important
    when you are C# programmer who wants to start developing mobile apps.'
