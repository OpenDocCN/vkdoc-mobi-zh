    代码清单 5-17 中的两个方法工作原理相似，因此我只讨论第一个方法 `RotateSquare`。在该方法中，我首先检查旋转手势是否被正确识别。为此，我读取由
    `sender` 参数提供的 `UIRotationGestureRecognizer` 类实例的 `State` 属性。随后，我调用 `UpdateSquareTransform`。该方法的参数取决于用户是否在旋转的同时执行捏合手势。如果是，我将从捏合手势识别器获取的缩放变化作为
    `UpdateSquareTransform` 的最后一个参数传递。然而，如果用户在旋转期间没有重新缩放紫色正方形，我只需为最后一个参数传递 1。这表示缩放不应改变。最后，我将累积的旋转量存储在
