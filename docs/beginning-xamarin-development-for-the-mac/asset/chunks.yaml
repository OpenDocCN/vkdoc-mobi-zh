- fmt: "```csharp\npublic static void Main(string[] args, string principalClassName,\n\
    string delegateClassName)\n{\n    IntPtr principal = principalClassName != null\
    \ ?\n        new NSString(principalClassName).Handle : IntPtr.Zero;\n    IntPtr\
    \ delegatec = delegateClassName != null ?\n        new NSString(delegateClassName).Handle\
    \ : IntPtr.Zero;\n    Main(args, principal, delegatec);\n}\n```\nListing 2-2.\
    \ A Definition of the `UIApplication.Main` Method Invoked in the Entry Point of\
    \ HelloWorld App\n\n```csharp\nstatic void Main(string[] args, IntPtr principal,\
    \ IntPtr @delegate)\n{\n    Initialize();\n    UIApplicationMain(args.Length,\
    \ args, principal, @delegate);\n}\n[DllImport(\"__Internal\")]\nextern static\
    \ int UIApplicationMain(int argc, string[] argv,\n    IntPtr principalClassName,\
    \ IntPtr delegateClassName);\n```\nListing 2-3. An Actual Call to the `UIApplicationMain`\
    \ Method Implemented in the Objective-C Library from the iOS SDK\n\nTo invoke\
    \ a function from the Objective-C library you use the Platform Invocation Services\
    \ (P/Invoke). In this mechanism, you first declare the C# method with `extern`\
    \ and `static` keywords and decorate this declaration with the `DllImportAttribute`.\
    \ This attribute is used to specify the physical location of the library to load.\
    \ `DllImportAttribute` can be optionally used to specify a name of the function\
    \ exported by this library in case this name differs from a method you declare\
    \ in the C# code. Once you have this declaration, you call an external function\
    \ by invoking the C# method, exactly the same as in Listing [2-3](#A453659_1_En_2_Chapter.html#Par7).\
    \ However, as we see in Listing [2-3](#A453659_1_En_2_Chapter.html#Par7), the\
    \ `DllImportAttribute` of the C# method does not include a path to the external\
    \ library. Instead, it uses the `__Internal` string. This instructs P/Invoke to\
    \ load a function from the static library, which compiles into an application.\n\
    \nBut wait, how is my C# code turned into the actual iPhone or iPad application?\
    \ This is done automatically when we compile the project in Visual Studio through\
    \ the tool called `mtouch`. `Mtouch` is the command-line program that changes\
    \ your C# .NET code into the app bundle, which is then executed by iOS. In the\
    \ case of the HelloWorld app, we compiled for the simulator; the bundle can be\
    \ found under the following subfolder of the HelloWorld project: `bin\\iPhoneSimulator\\\
    Debug\\device-builds\\iphone9.1-10.3\\HelloWorld.app`. If you open this folder,\
    \ you will see a number of files. For now, let’s just point out the relevant ones.\
    \ First, the app bundle contains `Xamarin.iOS.dll`, which has bindings to the\
    \ iOS SDK. Second, there is an `mscorlib.dll` file. It implements the Microsoft\
    \ Common Object Runtime Library, a runtime for all Microsoft .NET applications.\
    \ Finally, there are several other .NET libraries, like `System.dll`, `System.Core.dll`,\
    \ and `System.Xml.dll`. They are referenced in the HelloWorld app project to use\
    \ basic types and functionality from the .NET framework.\n\nNow that we have a\
    \ solid understanding of the most important behind-the-scenes aspects of Xamarin.iOS,\
    \ we can move forward to learn about the `AppDelegate` class.\n\n## AppDelegate\n\
    \nTo discuss the `AppDelegate` class, let’s open the `AppDelegate.cs` file from\
    \ the HelloWorld project. First, when inspecting the class declaration, you will\
    \ see that the `AppDelegate` implements the `UIApplicationDelegate` interface.\
    \ Second, the `AppDelegate` declaration is decorated with the `RegisterAttribute`.\
    \ It is implemented within the Xamarin.iOS and is used to register a class to\
    \ the Objective-C runtime. This registration is required since an instance of\
    \ the `AppDelegate` class is passed to the `UIApplicationMain` Objective-C function.\
    \ Third, the `AppDelegate` implements a single property, `Window`, of type `UIWindow`.\
    \ `UIWindow` represents the container for views found in the iOS apps. So, you\
    \ use this property to control that container. Last, `AppDelegate` overrides a\
    \ number of methods from the `UIApplicationDelegate`. You use these methods to\
    \ handle particular application events during the app lifecycle. To explicitly\
