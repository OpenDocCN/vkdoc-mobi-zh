- fmt: "第二种方法`VerifyUpdate`用于检查`UsersServiceHelper.Update`方法是否更改了Web服务中选定用户对象的属性。因此，我首先获取ID为`5`的用户，然后将其`Name`属性更改为存储在`expectedName`常量中的值。接着，我调用`UsersServiceHelper.Update`方法，请求Web服务更新选定的用户，然后重新检索该对象的数据。基于该用户，我读取其`Name`属性，以验证它是否按预期被更改。如果不符合预期，将触发适当的断言。\n\
    \n```csharp\n[Test]\npublic async void VerifyUpdate()\n{\n    // Arrange\n   \
    \ const string expectedName = \"New name\";\n    var user = await UsersServiceHelper.Get(UserId);\n\
    \    // Act\n    // Update name of the user and then get the user again from the\
    \ API\n    user.Name = expectedName;\n    await UsersServiceHelper.Update(user);\n\
    \    user = await UsersServiceHelper.Get(UserId);\n    // Assert\n    // Check\
    \ if the name of user was indeed updated\n    Assert.AreEqual(expectedName, user.Name);\n\
    }\n```\n（代码清单7-14：通过检查API是否确实更改了用户姓名来验证Update方法）\n\n基于以上测试方法，我在模拟器中运行`Users.MobileService.Tests`应用程序，然后执行全部四个测试。图[7-4](#A453659_1_En_7_Chapter.html#Fig4)展示了测试应用的运行界面及单元测试结果。可以看到，只有`VerifyGet`和`VerifyGetById`这两个测试方法成功。这是因为发送至JSONPlaceholder\
    \ REST API的`DELETE`和`PUT`HTTP请求是被模拟的。该服务仅返回HTTP状态码OK，但并未修改底层数据。因此，该功能在我们即将编写的移动客户端中也将无法工作。不过，我们仍可以在本地修改数据，并假设它在Web服务中已正确更新。\n\
    \n![A453659_1_En_7_Fig4_HTML.jpg](A453659_1_En_7_Fig4_HTML.jpg)\n\n图7-4：测试`UsersServiceHelper`类\n\
    \n## Users Repository\n\n通信层准备就绪后，我们现在可以在`Users.MobileClient`应用程序中使用它。如图[7-1](#A453659_1_En_7_Chapter.html#Fig1)所示，`Users.MobileClient`包含两个视图。这两个视图都使用了实现Web服务客户端的类。第一个视图在`UITableView`中显示用户列表，第二个视图展示用户的更详细信息。因此，存在两个视图控制器，它们将与`UsersServiceHelper`类交互。为此，我将此类设为静态类，以便从应用程序的不同组件轻松访问。另一种方法是使用单例设计模式来实现`UsersServiceHelper`。我将在之后介绍如何针对另一个类`UsersRepository`实现该模式。\n\
    \n开发移动REST API客户端时，还需考虑另外两个问题。首先是从Web服务检索数据的本地存储问题；其次是移动应用与Web服务之间的数据同步问题。为了减少向Web服务发送的请求数量，通常的做法是在应用启动时将数据检索到本地存储中，然后在需要时与Web服务进行同步。在高级场景中，可以使用专用工作线程或原生后台机制在后台执行同步。\n\
    \n此处为了实现本地数据存储（即用户仓库），我创建了另一个类`UsersRepository`，并将其保存在`Model`文件夹下的`UsersRepository.cs`文件中（参见随附代码：`Chapter_07/Users.MobileClient/Models`）。该类作为本地数据存储，与远程用户集合保持同步。由于`UsersRepository`将在代码的多个位置被访问，并且需要呈现相同的数据，我使用单例设计模式来实现该类。这意味着`UsersRepository`将只有一个实例，可以从源代码的不同位置访问该实例。\n\
    \n代码清单[7-15](#A453659_1_En_7_Chapter.html#Par48)展示了`UsersRepository`类的片段，包含以下四个成员：\n\
    \n*   `Users` – 一个公共属性，使其他类能够访问从Web服务检索到的用户集合。\n*   `instance` – 一个私有静态字段，用于存储`UsersRepository`类实例的引用。\n\
    *   `GetInstance` – 一个公共静态方法，用于实例化`UsersRepository`类，并将引用保存到`instance`成员中。`GetInstance`还会从Web服务检索用户列表。但这种情况仅在首次创建实例字段时发生。所有后续对`GetInstance`方法的调用都将返回对`UsersRepository`对象的引用。\n\
    *   `UsersRepository` – 一个私有构造函数，防止从外部创建该类。因此，调用者只能通过调用`GetInstance`方法来访问私有创建的实例。\n\
    \n```csharp\npublic class UsersRepository\n{\n    public List Users { get; private\
    \ set; }\n    private static UsersRepository instance;\n    public static async\
    \ Task GetInstance()\n    {\n        // Create and initialize an instance only\
    \ once\n        if (instance == null)\n        {\n            instance = instance\
    \ ?? new UsersRepository();\n            instance.Users = (await UsersServiceHelper.Get()).ToList();\n\
    \        }\n        return instance;\n    }\n    private UsersRepository()\n \
    \   {\n        // Make default constructor private\n        // so the class can\
    \ be instantiated\n        // with the GetInstance method only\n    }\n    //\
    \ Definitions of Delete and Update methods\n}\n```\n（代码清单7-15：`UsersRepository`类的选定片段）\n\
    \n随后，我通过三个公共方法扩展了`UsersRepository`类的定义（代码清单[7-16](#A453659_1_En_7_Chapter.html#Par54)）：\n\
    \n*   `GetUserById` – 按用户标识符从本地数据存储中检索用户。\n*   `Delete` – 从本地存储和远程Web服务中删除给定标识符的用户。\n\
    *   `Update` – 更新本地存储和Web服务中的用户。\n\n请注意，在代码清单[7-16](#A453659_1_En_7_Chapter.html#Par54)中，`Delete`和`Update`方法的定义被`#pragma\
    \ warning`预处理指令包围。这是为了抑制CS4014警告（该警告指出：由于此调用未被等待，因此在调用完成之前，当前方法的执行会继续。请考虑对调用的结果应用`await`运算符）。此处我故意省略了`await`运算符，因为我不想等待这些方法完成。相反，我并行发送请求以加速UI的更新。\n\
    \n```csharp\npublic User GetUserById(int userId)\n{\n    return Users.Find(u =>\
    \ u.Id == userId);\n}\n#pragma warning disable CS4014\npublic void Delete(int\
    \ userId)\n{\n    if (UserExists(userId))\n    {\n        var userToDelete = GetById(userId);\n\
    \        Users.Remove(userToDelete);\n        UsersServiceHelper.Delete(userId);\n\
    \    };\n}\npublic void Update(User user)\n{\n    if (UserExists(user.Id))\n \
    \   {\n        UsersServiceHelper.Update(user);\n    };\n}\n#pragma warning restore\
    \ CS4014\nprivate bool UserExists(int userId)\n{\n    return Users.Exists(u =>\
    \ u.Id == userId);\n}\n```\n（代码清单7-16：从本地存储访问数据以及与远程Web服务的数据同步）"
  raw: 'The second method, `VerifyUpdate`, is used to check whether the `UsersServiceHelper.Update`
    method changes the properties of the selected user object in the web service.
    So, I first get the user of ID `5` and then change its `Name` property to that
    stored in the `expectedName` constant. Then, I invoke the `UsersServiceHelper.Update`
    method to request that the web service update the selected user, and then I retrieve
    the data of this object. Given that user, I read its `Name` property to see if
    it was indeed changed as expected. If not, an appropriate assertion will be raised.


    ```

    [Test]

    public async void VerifyUpdate()

    {

    // Arrange

    const string expectedName = "New name";

    var user = await UsersServiceHelper.Get(UserId);

    // Act

    // Update name of the user and then get the user again from the API

    user.Name = expectedName;

    await UsersServiceHelper.Update(user);

    user = await UsersServiceHelper.Get(UserId);

    // Assert

    // Check if the name of user was indeed updated

    Assert.AreEqual(expectedName, user.Name);

    }

    Listing 7-14.

    Validating an Update Method by Checking if It Indeed Changes the Name of the User
    in the Web Service

    ```


    Given the preceding test methods, I run the Users.MobileService.Tests app in the
    simulator, and then I execute all four tests. Figure [7-4](#A453659_1_En_7_Chapter.html#Fig4)
    features the test app running and the results of our unit tests. We see that only
    two test methods, `VerifyGet` and `VerifyGetById`, were successful. This is because
    the `DELETE` and `PUT` HTTP requests sent to the JSONPlaceholder REST API were
    faked. The service only returns the OK HTTP status code but does not modify the
    underlying data. Hence, this functionality will also not work in the mobile client
    we are going to write. However, we still can modify the data locally and assume
    that it is correctly updated in the web service.


    ![A453659_1_En_7_Fig4_HTML.jpg](A453659_1_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    Unit testing the UsersServiceHelper class


    ## Users Repository


    Given the communication layer is ready, we can now use it in the Users.MobileClient
    app. As shown in Figure [7-1](#A453659_1_En_7_Chapter.html#Fig1), Users.MobileClient
    has two views. Both of them utilize the class implementing a web service client.
    The first view displays a list of users in the `UITableView`, while the second
    view presents more detailed information about the user. Accordingly, there are
    two view controllers, which will interact with the `UsersServiceHelper` class.
    Therefore, I made this class static so it can be easily accessed from various
    app components. Another approach would be to use the singleton design pattern
    for the `UsersServiceHelper`. I’ll show you later how to do it with respect to
    another class, `UsersRepository`.


    There are two more things that should be taken into account when developing a
    mobile REST API client. First is the local store of the data retrieved from the
    web service. Second is the data synchronization between the mobile app and the
    web service. To reduce the number of requests sent to the web service, you typically
    retrieve the data to a local store when the app starts and then synchronize it
    with the web service when needed. In advanced scenarios, you perform this synchronization
    in the background using dedicated worker threads or native background mechanisms.


    Here, to implement a local data store or users repository, I create another class,
    `UsersRepository`, which I save in the `UsersRepository.cs` file under the `Model`
    folder (see companion code, `Chapter_07/Users.MobileClient/Models`). This class
    serves as the local data store that is synchronized with the remote collection
    of users. Since `UsersRepository` will be accessed in several different places
    of the code and needs to present the same data, I implement this class with a
    singleton design pattern. This means that `UsersRepository` will have only one
    instance, which can be accessed from different places in the source code .


    Listing [7-15](#A453659_1_En_7_Chapter.html#Par48) shows a fragment of the `UsersRepository`
    class, including the following four members:


    *   `Users` – a public property that gives other classes access to the collection
    of users retrieved from the web service

    *   `instance` – a private static field that stores a reference to the instance
    of the `UsersRepository` class

    *   `GetInstance` – a public static method that instantiates the `UsersRepository`
    class and saves a reference to it in the `instance` member. `GetInstance` also
    retrieves the list of users from the web service. However, this happens only once,
    when the instance field is created for the first time. All subsequent calls to
    the `GetInstance` method will return a reference to the `UsersRepository` object

    *   `UsersRepository` – a private constructor that prevents the creation of the
    class from outside. So, callers can only access the privately created instance
    by invoking the `GetInstance` method


    ```

    public class UsersRepository

    {

    public List Users { get; private set; }

    private static UsersRepository instance;

    public static async Task GetInstance()

    {

    // Create and initialize an instance only once

    if (instance == null)

    {

    instance = instance ?? new UsersRepository();

    instance.Users = (await UsersServiceHelper.Get()).ToList();

    }

    return instance;

    }

    private UsersRepository()

    {

    // Make default constructor private

    // so the class can be instantiated

    // with the GetInstance method only

    }

    // Definitions of Delete and Update methods

    }

    Listing 7-15.

    Selected Fragments of the UsersRepository Class

    ```


    Subsequently, I extend a definition of the `UsersRepository` class by three public
    methods (Listing [7-16](#A453659_1_En_7_Chapter.html#Par54)):


    *   `GetUserById` – retrieves the user from the local data store by user identifier

    *   `Delete` – removes the user of the given identifier from the local store and
    from the remote web service

    *   `Update` – updates the user in the local store and in the service


    Note that in Listing [7-16](#A453659_1_En_7_Chapter.html#Par54) the definitions
    of the `Delete` and `Update` methods are surrounded by the `#pragma warning` preprocessor
    directives. This is done to suppress a CS4014 warning, which says: Because this
    call is not awaited, execution of the current method continues before the call
    is completed. Consider applying the ‘await’ operator to the result of the call.
    Here, I intentionally omit the `await` operator because I do not want to wait
    for these methods to complete. Instead, I send requests in parallel to speed up
    updates of the UI.


    ```

    public User GetUserById(int userId)

    {

    return Users.Find(u => u.Id == userId);

    }

    #pragma warning disable CS4014

    public void Delete(int userId)

    {

    if (UserExists(userId))

    {

    var userToDelete = GetById(userId);

    Users.Remove(userToDelete);

    UsersServiceHelper.Delete(userId);

    };

    }

    public void Update(User user)

    {

    if (UserExists(user.Id))

    {

    UsersServiceHelper.Update(user);

    };

    }

    #pragma warning restore CS4014

    private bool UserExists(int userId)

    {

    return Users.Exists(u => u.Id == userId);

    }

    Listing 7-16.

    Accessing Data from a Local Store and Data Synchronization with the Remote Web
    Service

    ```'
