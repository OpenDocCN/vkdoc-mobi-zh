    ## Summary


    In this chapter, we prepared a development environment, which will be utilized
    in the next chapters. We then discussed available project templates for creating
    iOS apps and implemented our first Single View HelloWorld app, which displays
    various alerts. In the next chapter, using the source code developed here we will
    analyze the app structure and discuss the most important elements of every Xamarin.iOS
    app.


    # 2. App Structure and Lifecycle


    In this chapter, you will learn about the most important elements of an app and
    relationships between them. We will begin by exploring the app entry point and
    how Xamarin.iOS interfaces with the native iOS SDK. Subsequently, we will learn
    about the app and view lifecycles, declaration of app capabilities, and properties
    to reach the storyboards. Additionally, we will analyze the Model View Controller
    (MVC) design pattern utilized in programming for the Apple platforms. Lastly,
    we will combine the view lifecycle with the MVC pattern to store data in a device’s
    memory.


    ## An Entry Point


    The HelloWorld app, similar to any other C# app, begins its execution from the
    static `Main` method of the `Application` class. This applies regardless of whether
    you are creating a console application, Universal Windows Platform app, ASP.NET
    web application, or .NET Core or Xamarin.iOS app. All of these apps utilize the
    `Application.Main` method as an entry point. However, the particular implementation
    of this method varies between those app types. In the case of Xamarin.iOS, the
    implementation of the `Main` method is tailored to the iOS platform. More specifically,
    as Listing [2-1](#A453659_1_En_2_Chapter.html#Par4) shows, the `Application.Main`
    method invokes the function of the same name from the `UIApplication` class. The
    `UIApplication` class encapsulates the main processing loop of the Xamarin.iOS
    app. This processing loop, as in all other apps with a graphical user interface,
    handles all the events related to the app lifecycle (activation, switching between
    foreground and background), events triggered by the user (like touch, inputting
    data, switching between views), or the operating system (OS restarts, memory warnings).


    Importantly, every iOS app creates only one instance of the `UIApplication` class
    or its subclass. Internally, the `UIApplication` class uses another class, which
    implements the `UIApplicationDelegate` interface. The latter object is dedicated
    to handling the app lifecycle. Therefore, the `Main` method from Listing [2-1](#A453659_1_En_2_Chapter.html#Par4),
    apart from command-line arguments (`args`, which is the array of strings), accepts
    two other parameters: `principalClassName` and `delegateClassName`. The first
    one specifies the name of the class deriving from `UIApplication`. If you want
    to use a default `UIApplication` class, then you pass `null` for `principalClassName`.
    The second argument, `delegateClassName`, lets you specify the name of the class
    implementing `UIApplicationDelegate`. By default, `delegateClassName` is set to
    `AppDelegate`. You will learn about this class later in this chapter, as this
    is a part of the HelloWorld and any other Xamarin.iOS project.


    ```

    namespace HelloWorld

    {

    public class Application

    {

    static void Main(string[] args)

    {

    UIApplication.Main(args, null, "AppDelegate");

    }

    }

    }

    Listing 2-1.

    An Entry Point of the Xamarin.iOS App

    ```


    To explain what an encapsulation of the processing loop means, let’s analyze the
    source code of Xamarin.iOS, which is available here: [`http://bit.ly/xamarin_ios_code`](http://bit.ly/xamarin_ios_code).
    This analysis also helps us to better understand what Xamarin.iOS really is. In
    particular, the definition of `UIApplicationClass` ([`http://bit.ly/UiApplication`](http://bit.ly/UiApplication))
    shows that its `Main` method (Listing [2-2](#A453659_1_En_2_Chapter.html#Par6)),
    after obtaining handles to the principal and delegate class names, invokes another
    version of the `Main` method. The latter, as depicted in Listing [2-3](#A453659_1_En_2_Chapter.html#Par7),
    first invokes the `Initialize` method. This method configures thread-synchronization
    context, which is used to update controls through the UI thread. Then, the `Main`
    method invokes the `UIApplicationMain` function, which is declared in an external,
    Objective-C library. This library comes from the iOS SDK. You now see that Xamarin.iOS,
    in the simplest definition, is the set of C# bindings to the native iOS SDK exposed
    through Objective-C libraries. Therefore, Xamarin.iOS lets you develop native
    apps with full access to the platform’s SDK. For this reason, Xamarin apps are
    referred to as native mobile apps.'
