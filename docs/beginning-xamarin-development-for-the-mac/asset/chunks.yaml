    ## 用户界面测试


    验证`Person`类后，我们可以继续使用它来实现 Persons 应用。随后，我们将使用 Xamarin UI Tests 框架和 Xamarin Test
    Cloud（XTC）测试其 UI。


    ### 创建应用


    我使用单视图 iOS 应用模板（支持 iOS 9.0 及更高版本）创建了 Persons 应用。然后，我定义此应用的 UI，如图 6-2 所示。即，我创建了一个按钮、四个标签和四个文本字段。现在，我将每个文本字段的名称和辅助功能标识符（图
    6-12）分别设置为`TextFieldFirstName`、`TextFieldLastName`、`TextFieldEmail`和`TextFieldAge`。名称将用于在
    C# 代码中设置每个`TextField`的文本属性，而辅助功能标识符将用于在 UI 测试中查找控件。随后，我双击按钮以创建`TouchUpInside`事件处理程序，并暂时将该方法留空。最后，我编辑引用，使得
    Persons 应用引用`Person.Common`库。


    ![A453659_1_En_6_Fig12_HTML.jpg](img/A453659_1_En_6_Fig12_HTML.jpg)


    图 6-12. 配置辅助功能标识符


    ### Xamarin Test Cloud 代理


    要使测试运行器能够与 Persons 应用交互，你需要使用 Xamarin Test Cloud 代理，将其作为 NuGet 包安装。要安装它，你可以进入解决方案资源管理器，然后从
    Persons/Packages 节点的上下文菜单中选择“添加包…”选项，或使用菜单“项目 ➤ 添加 NuGet 包…”。无论选择哪种方法，都会出现“添加包”对话框。在此对话框中，进入搜索框并输入`Xamarin
    Test Cloud Agent`。匹配的包列表将显示在左侧，如图 6-13 所示。然后选择列表中的第一个元素，并单击“添加包”按钮。


    ![A453659_1_En_6_Fig13_HTML.jpg](img/A453659_1_En_6_Fig13_HTML.jpg)


    图 6-13. 安装 Xamarin Test Cloud Agent NuGet 包


    片刻后，NuGet 包将被添加到 Persons 项目中。然后，你只需通过在`FinishedLaunching`事件处理程序中添加以下语句（列表 6-8）`Xamarin.Calabash.Start()`来启用它。此事件处理程序定义在
    Persons 项目的`AppDelegate.cs`文件中。由于启用了 Xamarin Test Cloud 代理的应用无法提交到商店，列表 6-8 中的相应语句被
    C# 预处理指令包围，并且仅在定义了`ENABLE_TEST_CLOUD`符号时执行。在安装 Xamarin Test Cloud Agent NuGet
    包后，测试应用的调试配置中默认会执行此操作。要查看此设置，请转到 Persons 项目的选项，然后打开“生成/编译器”选项卡。`ENABLE_TEST_CLOUD`将列在“定义符号”文本框中。如果将配置更改为“发布”，则该符号未定义。


    ```

    public override bool FinishedLaunching(

    UIApplication application, NSDictionary launchOptions)

    {

    #if ENABLE_TEST_CLOUD

    Xamarin.Calabash.Start();

    #endif

    return true;

    }

    列表 6-8.

    设置 Xamarin Test Cloud 代理

    ```


    Xamarin Test Cloud 代理在启用时，会监听来自测试运行器的请求。此代理接受以编程方式生成的手势（如点击和滑动），并允许测试运行器与视觉控件交互；例如，从文本字段读取文本。重要的是，测试运行器还可以使用
