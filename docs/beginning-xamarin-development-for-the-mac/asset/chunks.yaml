    {

    var actionSheetController = new UIAlertController()

    {

    Title = title,

    Message = message

    };

    actionSheetController.AddAction(okAction);

    actionSheetController.AddAction(cancelAction);

    PresentViewController(actionSheetController, true, null);

    }

    代码清单 1-4.

    使用类构造函数创建 UIAlertViewController

    ```


    代码清单 1-4 展示了创建 `UIAlertController` 类实例的另一种方法。我使用了该类的无参数构造函数，然后修改了结果对象的 `Title`
    和 `Message` 属性。请注意，这里没有配置警告样式的属性，在此情况下，样式默认被设置为 `UIAlertControllerStyle.ActionSheet`。当然，你仍然可以使用
    `UIAlertController` 的 `Create` 方法来创建操作表，但你需要将最后一个参数替换为 `UIAlertControllerStyle.ActionSheet`（请回看代码清单
