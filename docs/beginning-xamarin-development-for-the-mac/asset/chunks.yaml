    default button. To change the icon and the caption of the tab bar item I use the
    Properties pad (refer back to Figure [4-4](#A453659_1_En_4_Chapter.html#Fig4)),
    where I select the More icon from the System Item drop-down list. To add a label
    on the last tab, I open the `ThirdViewController.cs` file and define the `AddLabel`
    method. Lastly, I invoke this method in the `ViewDidLoad` view event handler (Listing
    [4-4](#A453659_1_En_4_Chapter.html#Par16)).


    ```

    public override void ViewDidLoad()

    {

    base.ViewDidLoad();

    AddLabel();

    }

    private void AddLabel()

    {

    // Create the label

    var label = new UILabel()

    {

    Text = "Third View"

    };

    // Update font size

    nfloat fontSize = 36.0f;

    label.Font = label.Font.WithSize(fontSize);

    // Measure the label

    var labelSize = UIStringDrawing.StringSize(label.Text, label.Font);

    // and adjust the frame accordingly

    label.Frame = new CGRect(View.Frame.Width / 2 - labelSize.Width / 2,

    View.Frame.Height / 2 - labelSize.Height / 2,

    labelSize.Width,

    labelSize.Height) ;

    Add(label);

    }

