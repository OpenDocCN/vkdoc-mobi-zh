  raw: 'The first method, `CreateComplicationTemplate` , is used to create two complications
    using two separate templates—one for modular small and one for modular large complications.
    So, `CreateComplicationTemplate` accepts two arguments. The first one, `complicationFamily`,
    specifies the complication type and accepts one of the values defined in the `CLKComplicationFamily`
    enumeration. The second argument, `complicationText`, holds a value to be displayed
    in the complication.


    `CreateComplicationTemplate` supports only two complications: modular small and
    modular large. To create the first one, I use `CLKComplicationTemplateModularSmallRingText`.
    This implements a visual style for the complication in which text is enclosed
    by a progress ring. You control the appearance of this template using the following
    properties of the `CLKComplicationTemplateModularSmallRingText` class instance:


    *   `TextProvider` – specifies a text to be displayed

    *   `FillFraction` – determines the percentage of ring to fill

    *   `RingStyle` – indicates the style of the ring, either open or closed


    In Listing [8-16](#A453659_1_En_8_Chapter.html#Par91), I set the fill fraction
    to 75 percent and ring style to open. Consequently, the code from Listing [8-16](#A453659_1_En_8_Chapter.html#Par91)
    will generate the modular small complication shown in Figure [8-17](#A453659_1_En_8_Chapter.html#Fig17).


    ![A453659_1_En_8_Fig17_HTML.jpg](A453659_1_En_8_Fig17_HTML.jpg)


    Figure 8-17.


    A fragment of the watch face depicting modular small complication


    To create the modular large complication , I utilize the `CLKComplicationTemplateModularLargeStandardBody`
    class. It can be parameterized using the following four properties:


    *   `HeaderTextProvider` – specifies text to display in the complication header

    *   `Body1TextProvider` – used to configure text displayed in the first line of
    body text (right below the header)

    *   `Body2TextProvider` – specifies an optional second line of body text

    *   `HeaderImageProvider` – indicates an optional image to be displayed on the
    left-hand side of the header


    The `CreateComplicationTemplate` method uses the first three properties. The header
    displays a fixed string, `My Complication`, while the first and second lines depict
    a value obtained from the `complicationText` parameter and current time, respectively.
    An example of such a complication is presented in Figure [8-18](#A453659_1_En_8_Chapter.html#Fig18).


    ![A453659_1_En_8_Fig18_HTML.jpg](A453659_1_En_8_Fig18_HTML.jpg)


    Figure 8-18.


    A modular large complication


    Given the template’s ready, I now extend the definition of the `ComplicationController`
    by another method, `CreateComplicationEntry` (Listing [8-17](#A453659_1_En_8_Chapter.html#Par105)).
    It uses the previously implemented `CreateComplicationTemplate` to make a timeline
    entry with the current date.


