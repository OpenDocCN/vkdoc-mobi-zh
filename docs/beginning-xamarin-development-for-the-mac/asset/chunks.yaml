- fmt: '# watchOS


    Apple Watch is a smartwatch equipped with multiple sensors supporting health and
    activity data tracking. Moreover, Apple Watch contains communication interfaces,
    making it a wearable endpoint of the iOS device. The smartwatch becomes your best
    friend when riding a bike, when at an important meeting, or when standing on a
    crowded bus. In such situations, you cannot pull out the phone. Instead, you can
    use your Apple Watch to quickly check your schedule, reply to incoming messages,
    or glance at the map to see route directions.


    Apple Watch is controlled by the dedicated operating system watchOS. There are
    several generations of this OS. The first one, watch OS 1, is already deprecated,
    and new solutions should target at least watchOS 2. When I was writing this chapter,
    `Visual Studio for Mac` and `Xamarin.iOS` were supporting watchOS 2 and above.


    You can develop custom apps for watchOS using the dedicated SDK. In practice,
    you do this quite similarly to how you develop iOS apps. However, there is a difference
    between the watchOS and iOS; namely, watch apps comprise two bundles. The first
    one is the actual watch app, which contains the user interfaces. The other bundle,
    watch or `WatchKit` extension, implements a logic controlling the UI. So, most
    of the time you modify the storyboard of the watch app and implement logic by
    modifying the definitions of classes representing controllers that are associated
    with the UI. This is done using the `WatchKit` framework, which is a set of classes
    that helps you control watchOS app.


    In this chapter, I will guide you through this process starting from the ground
    up. We will first create the project and then analyze its structure, learning
    about the most important features of watchOS apps.


    ## Creating the Project


    Every watchOS app has an associated iOS app. Therefore, to implement the first
    watchOS solution, I start by creating the parent app, `HelloWatchKit`, using `Single
    View App` iOS project template. I set the target version to iOS 11.0. Then, I
    create the actual watchOS app with the `WatchKit App` project template. The latter
    is available under the watchOS group (Figure [8-1](#A453659_1_En_8_Chapter.html#Fig1)).
    After choosing a template, I press the `Next` button, which activates another
    window in which, similar to the iOS case, you can configure your new watchOS app.


    ![A453659_1_En_8_Fig1_HTML.jpg](A453659_1_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    A list of project templates for creating watchOS apps


    As Figure [8-2](#A453659_1_En_8_Chapter.html#Fig2) shows, to configure the watchOS
    app you specify the following attributes:


    ![A453659_1_En_8_Fig2_HTML.jpg](A453659_1_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Configuring the watchOS app such that it is associated with the `HelloWatchKit`
    iOS parent app


    *   `Project` – which indicates the parent iOS project. Here, I set it to `HelloWatchKit`.

    *   `App Name` – I set it to `Watch`. When typing the name of your watch app,
    keep in mind that it will be preceded by the name of your parent iOS app. For
    instance, for `HelloWatchKit`, watchOS projects will be named `HelloWatchKit.Watch`
    and `HelloWatchKit.WatchExtension`. As we will quickly see, the first one defines
    the UI of the watch app and the latter contains associated logic.

    *   `Target` – the minimum watchOS version that your app will support. I set it
    to watchOS 2.0, which is officially the minimum watchOS version available.

    *   `Scenes` – a list of scenes for your watchOS app. Here, I checked all possible
    scenes and will discuss them later in this chapter.


    After creating the project, you will see that the whole solution comprises three
    projects, as follows:


    *   `HelloWatchKit` – the parent iOS app. This is the only app that your watchOS
    app can communicate with. This project references `HelloWatchKit.Watch`.

    *   `HelloWatchKit.Watch` – a bundle that contains storyboards for the watchOS
    app and references `HelloWatchKit.WatchExtension`.

    *   `HelloWatchKit.WatchExtension` – a bundle that stores logic (the app''s code)
    and resources.


    Since we already know the structure of the iOS app, let''s briefly investigate
    the last two bundles.


    ## Watch App Bundle


    A quick glance at `HelloWatchKit.Watch` reveals that its structure is composed
    of three files. There are two property lists (`Info` and `Entitlements`) and the
    `Interface.storyboard`. After opening the latter in the iOS designer, you will
    see that it contains four scenes. Similar to the iOS case, these scenes represent
    views with content. The number of scenes depends on what we configured in Figure
    [8-2](#A453659_1_En_8_Chapter.html#Fig2). Therefore, apart from the initial scene,
    we have notification and glance scenes.


    Once in the iOS designer (Figure [8-3](#A453659_1_En_8_Chapter.html#Fig3)), you
    can visually design each scene by dragging controls from the toolbox. Note that
    the list of available controls is different than what we saw when working with
    iOS apps. The toolbox now contains controls that are tailored to the physical
    limitations of the Apple Watch.


    In the watchOS app, controllers associated with views are defined as interface
    controllers instead of view controllers as in iOS. Each scene has an associated
    interface controller, which is defined in the `HelloWatchKit.WatchExtension` and,
    as we will quickly see, derives from the `WKInterfaceController` class of the
    `WatchKit`. `WKInterfaceController` is the base class for all interface controllers.
    This class is the watch counterpart of the `UIViewController` from the iOS app.
    However, unlike the `UIViewController`, the `WKInterfaceController` does not directly
    manage any views. Instead, it remotely (from a different bundle) interfaces with
    and controls the behavior of the storyboard defined in the `Watch` bundle.


    ![A453659_1_En_8_Fig3_HTML.jpg](A453659_1_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    A default storyboard of the watchOS app


    ## Watch Extension


    The watch extension bundle is implemented within `HelloWatchKit.WatchExtension`.
    If you expand this project in the Solution pad, you will quickly see that it contains
    several files that implement interface controllers. This file set includes the
    following items:


    *   `InterfaceController.cs` – This file stores a definition of the `InterfaceController`
    class. The latter implements the logic associated with the default or initial
    scene of the `HelloWatchKit.Watch` app. Therefore, `InterfaceController` is analogous
    to the default `ViewController` we used while developing iOS apps.

    *   `NotificationController.cs` – This contains a definition of the `NotificationController`,
    which manages notifications.

    *   `ComplicationController.cs` – This stores a definition of the `ComplicationController`
    used to define small visual elements (complications) that are shown directly on
    the watch face.

    *   `GlanceController.cs` – This contains a definition of the `GlanceController`
    class, which is used to control the glance scene.


    There is also one other important file, `ExtensionDelegate.cs`. It stores a definition
    of the `ExtensionDelegate` class, which is somewhat analogous to the `AppDelegate`
    class used by the iOS apps. I will tell you later how you can utilize the preceding
    classes while developing apps for the watchOS.'
