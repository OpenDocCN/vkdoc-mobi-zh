- fmt: '# View Lifecycle


    After getting familiar with the Apple Watch simulator and the app structure, let’s
    go further and investigate the view (or interface) controller lifecycle. As I
    mentioned previously, this lifecycle is accompanied by several events you can
    customize with the appropriate view event handlers. These handlers are defined
    in the `WKInterfaceController` class, so to implement custom logic you need to
    override them in the derived class. To present an example, I modify the `InterfaceController`
    by importing the `System.Diagnostics` namespace and implementing the `DisplayInfo`
    method from Listing [8-4](#A453659_1_En_8_Chapter.html#Par37). Then, I invoke
    this method in five view event handlers (Listing [8-5](#A453659_1_En_8_Chapter.html#Par38)):
    `Awake`, `WillActivate`, `DidDeactivate`, `DidAppear`, and `WillDisappear`.


    ```

    private void DisplayInfo(string eventName)

    {

    Debug.WriteLine($"{this.Class.Name}, view event: {eventName}");

    }

    Listing 8-4.

    Displaying the Name of the View Event

    ```


    ```

    public override void Awake(NSObject context)

    {

    base.Awake(context);

    SetTitle("Hello, watch!");

    ConfigureTimer();

    DisplayInfo("Awake");

    }

    public override void WillActivate()

    {

    UpdateTimer();

    DisplayInfo("WillActivate");

    }

    public override void DidDeactivate()

    {

    UpdateTimer(false);

    DisplayInfo("DidDeactivate");

    }

    public override void DidAppear()

    {

    DisplayInfo("DidAppear");

    }

    public override void WillDisappear()

    {

    DisplayInfo("WillDisappear");

    }

    Listing 8-5.

    Tracking the View Lifecycle

    ```


    To see when the preceding event handlers are invoked during the view lifecycle,
    I re-run the `HelloWatchKit.Watch` app and open the application output (Figure
    [8-8](#A453659_1_En_8_Chapter.html#Fig8)). When the app is started, the runtime
    invokes the following view event handlers sequentially: `Awake`, `WillActivate`,
    and `DidAppear`. This means that the interface controller is first initialized
    and configured, then the view is activated and shown on the screen of the smartwatch.
    Subsequently, I go to the home screen. As a result, the app is deactivated and
    its view disappears. This is associated with five events: `DidDeactivate`, `WillActivate`,
    `DidAppear`, `WillDisappear`, and `DidDeactivate`. We see that right after the
    app is deactivated it becomes active and visible for a short while (`WillActivate`
    and `DidAppear` view events are raised). This is done only by watchOS 3.0 and
    above to take a snapshot of the current app state. The watchOS takes the app snapshot
    to present it in the Dock. After the snapshot is taken, the view of the app becomes
    invisible (`WillDisappear`) and the app is deactivated (`DidDeactivate`).


    ![A453659_1_En_8_Fig8_HTML.jpg](A453659_1_En_8_Fig8_HTML.jpg)


    **Figure 8-8.** A view lifecycle


    # App Lifecycle


    You now know how to handle view event handlers. So, we can now learn how to implement
    custom logic for handling the watchOS app lifecycle. To this end, you subclass
    the `WKExtensionDelegate` class. In the `HelloWatchKit.WatchExtension` app we
    already have an `ExtensionDelegate.cs` file containing a definition of the class
    deriving from `WKExtensionDelegate`. This class, `ExtensionDelegate`, serves a
    similar purpose as `AppDelegate` (a subclass of the `UIApplicationDelegate`) in
    iOS apps. More specifically, you use `ExtensionDelegate` to handle the app’s execution
    state changes using associated events. To show the execution order of these events,
    I modify the `ExtensionDelegate.cs` file, where I first import the `System.Diagnostics`
    namespace and then supplement a definition of the `ExtensionDelegate` class by
    the two private methods from Listing [8-6](#A453659_1_En_8_Chapter.html#Par41).
    The first one, `DisplayInfo`, is used to write an event name to the application
    output. The second one, `IsEventSupported`, is used to check the watchOS version.
    This is a helper that I use to ensure that the specific event handlers can be
    utilized.


    ```

    private void DisplayInfo(string eventName)

    {

    Debug.WriteLine($"App event: {eventName}");

    }

    private bool IsEventSupported()

    {

    return WKInterfaceDevice.CurrentDevice.CheckSystemVersion(3, 0);

    }

    Listing 8-6.

    Outputting Event Name to the Application Output and Checking watchOS Version

    ```


    I then use the preceding methods to implement five app event handlers as shown
    in Listing [8-7](#A453659_1_En_8_Chapter.html#Par43). Note that I check for watchOS
    version in two of them—`ApplicationWillEnterForeground` and `ApplicationDidEnterBackground`—because
    they are only available in watchOS 3.0 or later. Otherwise, the `DisplayInfo`
    will not be invoked for that two event handlers.


    ```

    public override void ApplicationDidFinishLaunching()

    {

    DisplayInfo("ApplicationDidFinishLaunching");

    }

    public override void ApplicationDidBecomeActive()

    {

    DisplayInfo("ApplicationDidBecomeActive");

    }

    public override void ApplicationWillResignActive()

    {

    DisplayInfo("ApplicationWillResignActive");

    }

    public override void ApplicationWillEnterForeground()

    {

    if (IsEventSupported())

    {

    DisplayInfo("ApplicationWillEnterForeground");

    }

    }

    public override void ApplicationDidEnterBackground()

    {

    if (IsEventSupported())

    {

    DisplayInfo("ApplicationDidEnterBackground");

    }

    }

    Listing 8-7.

    Tracking the App Lifecycle

    ```


    I now re-run the app and open the Application Output pad to see when the preceding
    event handlers are invoked during the runtime. As shown in Figure [8-9](#A453659_1_En_8_Chapter.html#Fig9),
    this output, in addition to the strings describing view event handlers, contains
    entries about the app view lifecycle. We can see that two app events, `ApplicationDidFinishLaunching`
    and `ApplicationDidBecomeActive`, are raised after initialization of the interface
    controller (`Awake` view event handler). Then, the interface controller is activated
    and displayed.


    Subsequently, I go to the home screen. As a result, the watch app becomes inactive
    and is put into the background. This is accompanied by two app events, `ApplicationWillResignActive`
    and `ApplicationDidEnterBackground`, respectively. After these app events, five
    view events are raised, which we have analyzed already. Let’s now see what happens
    if we re-activate the app from the home screen. This will cause watchOS to fire
    another two app events: `ApplicationWillEnterForeground` and `ApplicationDidBecomeActive`.
    So, you now know the exact order of app and view events, which you can use to
    write custom logic handling various states of your app and interface controllers.


    ![A453659_1_En_8_Fig9_HTML.jpg](A453659_1_En_8_Fig9_HTML.jpg)


    **Figure 8-9.** Application Output of the HelloWatchKit.Watch app, presenting
    the order of raising the view and app events by the runtime'
