- fmt: "# Text Input\n\nCollecting user input from the wearable app is more challenging\
    \ than doing so from the iOS app because watches have much smaller screens and\
    \ the user typically wants to interact quickly. For this reason, WatchKit provides\
    \ a dedicated text input controller that you use for gathering user input on watchOS.\
    \ As shown in Figure 8-10, this controller appears as a modal window and contains\
    \ a predefined list of suggested values. Additionally, depending on the controller\
    \ configuration, you can collect user input as emoji, voice command, or scribble.\n\
    \n![A453659_1_En_8_Fig10_HTML.jpg](A453659_1_En_8_Fig10_HTML.jpg)\n\nFigure 8-10.\
    \ Example appearance of the text input controller\n\n```\npartial void ButtonInput_Activated()\n\
    {\nvar colors = new string[]\n{\n\"Red\", \"Green\", \"Blue\", \"Orange\", \"\
    Purple\"\n};\nPresentTextInputController(colors,\nWKTextInputMode.AllowEmoji,\
    \ DisplayUserResponse);\n}\n```\n\nListing 8-8. Collecting User Input with `TextInputController`\n\
    \nTo show how to use the text input controller, I modify the first scene defined\
    \ under the `HelloWatchKit.Watch` app. Namely, I add a separator, a button, and\
    \ a label. I set their horizontal and vertical alignment to center. Then, I change\
    \ the name of the button and label to `ButtonInput` and `LabelAnswer`, respectively.\
    \ Finally, I double-click the button. This creates a default event handler, `ButtonInput_Activated`,\
    \ which I define as shown in Listing 8-8. In the `ButtonInput_Activated` event\
    \ handler, I first create an array of strings, which serves as the list of predefined\
    \ inputs or suggestions in the text input controller. Then, I show this controller\
    \ to the user by invoking the `PresentTextInputController` method, which is implemented\
    \ in the `WKInterfaceController` class and accepts three arguments:\n\n* `suggestions`\
    \ – an array of strings with predefined items displayed in the modal window\n\
    * `inputMode` – specifies the type of input described by one of the values declared\
    \ in the `WKTextInputMode` enumeration:\n  * `AllowEmojiAnimated` and `AllowEmoji`\
    \ – indicate that either animated or non-animated emojis are allowed, respectively\n\
    \  * `Plain` – indicates that emojis are not allowed\n* `completion` – an action\
    \ that is invoked after the user dismisses the controller\n\nIn Listing 8-8, I\
    \ allow non-animated emojis and use a `DisplayUserResponse` action as the completion\
    \ handler. As Listing 8-9 shows, the `DisplayUserResponse` method displays the\
    \ first item retrieved from the text input controller and displays it in the label\
    \ of name `LabelAnswer`. The text input controller returns a collection of items\
    \ selected by the user as an instance of the `NSArray` object, which is then provided\
    \ to the completion handler.\n\n```\nprivate void DisplayUserResponse(NSArray\
    \ result)\n{\nvar answer = \"No answer\";\nif (result != null)\n{\nif (result.Count\
    \ > 0)\n{\nanswer = result.GetItem(0).ToString();\n}\n}\nLabelAnswer.SetText(answer);\n\
    }\n```\n\nListing 8-9. Presenting an Item Chosen by the User\n\nAfter re-running\
    \ the app, you can press the button to activate the text input controller. It\
    \ will look as previously shown in Figure 8-10. Try to tap one of the suggested\
    \ values (colors) or emoji. You will see that the text input controller is dismissed\
    \ and the selected value is displayed in the bottom label (Figure 8-11).\n\n![A453659_1_En_8_Fig11_HTML.jpg](A453659_1_En_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11. Displaying user input gathered with text input controller\n\n#\
    \ Force Touch and Navigation\n\nApple Watch is equipped with the Force Touch sensor,\
    \ which detects how firmly you press the screen. Force touch is also defined as\
    \ an additional gesture. You can use it to extend the way your app interacts with\
    \ the user. In this section, we will learn how to use the force touch to activate\
    \ a menu containing a list of city names. After tapping the menu item, another\
    \ interface controller will be presented. This controller will show the geolocation\
    \ of the selected city (Figure 8-12).\n\n![A453659_1_En_8_Fig12_HTML.jpg](A453659_1_En_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12. Force touch gesture activates the menu, containing a list of cities.\
    \ When you tap the item, another view is displayed. This view displays the geocoordinates\
    \ of selected city.\n\nTo implement this functionality, I open the `Interface.storyboard`,\
    \ where I add a menu from the toolbox onto the interface controller, representing\
    \ a default scene. The menu appears in the Document Outline pad under the Interface\
    \ Controller item. I tap this entry, and then in the Properties pad I change the\
    \ number of items from 1 to 2. Consequently, two menu items are created. To configure\
    \ them, I use the Properties pad, where I set Title and Image properties under\
    \ the Menu Item group as follows (Figure 8-13):\n\n![A453659_1_En_8_Fig13_HTML.jpg](A453659_1_En_8_Fig13_HTML.jpg)\n\
    \nFigure 8-13. Properties pad showing configuration of the first menu item\n\n\
    * New York and More for the first item\n* San Francisco and Maybe for the second\
    \ item\n\nThen, for each item I declare action events, which are invoked when\
    \ the user taps each menu item. To that end, I use the Events tab of the Properties\
    \ pad, where I type the method name and hit Enter (see right part of Figure 8-13).\
    \ Visual Studio then asks me to choose a place in the code to insert an empty\
    \ definition of the event handlers. I set the names of these event handlers to\
    \ `NewYorkItem_Tapped` and `SanFranciscoItem_Tapped`, respectively. Before I define\
    \ these event handlers, I go back to the iOS designer, where I add the new interface\
    \ controller to the storyboard. Using the Properties pad of this controller, I\
    \ change its class and identifier to `CityGeolocationController`. Then, I supplement\
    \ the view of this interface controller with three labels. I center these labels\
    \ vertically and horizontally and stack them as shown in Figure 8-12. Next, I\
    \ set the `Text` property of the first label to `Geolocation:` and update the\
    \ names of the two other labels to `LabelLat` and `LabelLng`.\n\nGiven the UI\
    \ is now ready and configured, I can implement the logic. I start by adding a\
    \ new file, `LocationHelper.cs`, to the `HelloWatchKit.WatchExtension` project.\
    \ In this new file, I import the `CoreLocation` namespace and then define a static\
    \ class, `LocationHelper`, and custom enumeration, `City`, as in Listing 8-10.\n\
    \n```\npublic static class LocationHelper\n{\npublic static CLLocation GetLocationForCity(City\
    \ city)\n{\nCLLocation result = null;\nswitch(city)\n{\ncase City.NewYork:\nresult\
    \ = new CLLocation(40.7127837, -74.0059413);\nbreak;\ncase City.SanFrancisco:\n\
    default:\nresult = new CLLocation(37.77493, -122.419416);\nbreak;\n}\nreturn result;\n\
    }\n}\npublic enum City\n{\nNewYork, SanFrancisco\n}\n```\n\nListing 8-10. A Definition\
    \ of the `LocationHelper` Class and Custom Enumeration `City`\n\n`LocationHelper`\
    \ implements a single static method, `GetLocationForCity`, which accepts an argument\
    \ named `city` of type `City`. The latter is the enumeration defining the elements\
    \ `NewYork` and `SanFrancisco`. Depending on the `city` argument, `GetLocationForCity`\
    \ will return an instance of the `CoreLocation.CLLocation` class, which stores\
    \ the geocoordinates of either New York or San Francisco. I obtained geocoordinates\
    \ from the Google Geocode API."
