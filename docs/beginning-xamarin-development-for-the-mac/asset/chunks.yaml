    \ `HelloTV` 应用的 `Models` 文件夹下的单独文件中（参见配套代码：`Chapter_09/HelloTV/Models`）。\n\n无需详细描述每个自动生成的类。因此，我将仅描述最重要的元素。表示\
    \ JSON 响应顶级属性的主类是 `WeatherInfo`。此类的定义如代码清单 9-2 所示。因此，`WeatherInfo` 包含十二个自动生成的属性，您可以使用它们来读取天气状况。\n\
    \n```\npublic class WeatherInfo\n{\npublic Coord Coord { get; set; }\npublic IList\
    \ Weather { get; set; }\npublic string Base { get; set; }\npublic Main Main {\
    \ get; set; }\npublic int Visibility { get; set; }\npublic Wind Wind { get; set;\
    \ }\npublic Clouds Clouds { get; set; }\npublic int Dt { get; set; }\npublic Sys\
    \ Sys { get; set; }\npublic int Id { get; set; }\npublic string Name { get; set;\
    \ }\npublic int Cod { get; set; }\n}\n```\n\n代码清单 9-2. `WeatherInfo` 类的定义\n"
- fmt: 'In particular, in the `HelloTV` app I use only two properties of the `WeatherInfo`
    class instance: `Main` and `Weather`. The first one stores the temperature, pressure,
    and humidity (Listing [9-3](#A453659_1_En_9_Chapter.html#Par47)). These values
    will then be displayed in corresponding labels of the UI. An instance of the `Main`
    class also has two other properties: `TempMin` and `TempMax`. You can use them
    to obtain the minimum and maximum temperatures. They indicate a deviation from
    the current temperature, which according to the OpenWeatherMap documentation can
    appear for large cities. The second element of the `WeatherInfo` class I will
    use is the collection called `Weather`. Each element of this collection is an
    instance of the `Weather` class (Listing [9-4](#A453659_1_En_9_Chapter.html#Par48)).
    A `Weather` class has four properties:


    * `Id` – represents an identifier of the element in the collection

    * `Main` – group of weather parameters

    * `Description` – text description of current weather conditions

    * `Icon` – an identifier of the icon that graphically illustrates the weather


    In the `HelloTV` app, I use the last two; a description is displayed in the last
    label, while the icon identifier is used to create an image displayed right above
    the temperature (refer back to Figure [9-1](#A453659_1_En_9_Chapter.html#Fig1)).
    I will tell you how I get this image.


    ```

    public class Main

    {

    public double Temp { get; set; }

    public double Pressure { get; set; }

    public double Humidity { get; set; }

    public double TempMin { get; set; }

    public double TempMax { get; set; }

    }

    Listing 9-3.

    Main Object Stores the Temperature, Pressure, and Humidity Readings

    ```


    ```

    public class Weather

    {

    public int Id { get; set; }

    public string Main { get; set; }

    public string Description { get; set; }

    public string Icon { get; set; }

    }

    Listing 9-4.

    A Weather Object Stores Description and Icon Identifier

    ```


    ## Retrieving the Weather Report


    Given an established mapping between JSON and the C# objects, I proceed to implement
    the class that sends HTTP `GET` requests to the OpenWeatherMap API. This class,
    `WeatherServiceHelper` (see `Helpers` subfolder of the `HelloTV` app in the companion
    code), uses an `HttpClient` object, which I explained in Chapter [7](#A453659_1_En_7_Chapter.html).
    To use the `HttpClient` class in the `HelloTV` project, I reference the `System.Net.dll`
    and then install the Newtonsoft.JSON NuGet package. Subsequently, I implement
    the class constructor to instantiate the `HttpClient`, with the `BaseAddress`
    property pointing to the OpenWeatherMap URL (Listing [9-5](#A453659_1_En_9_Chapter.html#Par50)).


    ```

    private static HttpClient httpClient;

    static WeatherServiceHelper()

    {

    httpClient = new HttpClient()

    {

    BaseAddress = new Uri("http://api.openweathermap.org/data/2.5/weather")

    };

    }

    Listing 9-5.

    Creating the HTTP Client for the OpenWeatherMap API

    ```


    After configuring the HTTP client, I can start sending weather requests. To do
    so, in the `WeatherServiceHelper` I implement the static asynchronous method `GetWeatherInfo`
    (Listing [9-6](#A453659_1_En_9_Chapter.html#Par56)). This method accepts two arguments.
    The first one stores the city name, while the second defines the units in which
    OpenWeatherMap returns weather conditions. Clearly, OpenWeatherMap can return
    the temperature using different scales: Kelvin, Celsius, or Fahrenheit. To specify
    the scale, you use one of the values that I defined in the custom enumeration
    type, `TemperatureUnit` (see the `Enums\TemperatureUnit.cs` file of the `HelloTV`
    app):


    * `Default` – indicates that default units shall be used. In that case, the temperature
    is expressed in Kelvins (see Listing [9-1](#A453659_1_En_9_Chapter.html#Par37),
    for example).

    * `Metric` – instructs the OpenWeatherMap API to use metric units, which means
    that temperature will be given in degrees Celsius

    * `Imperial` – represents imperial units, in which temperature is expressed in
    degrees Fahrenheit


    The values you pass to the `GetWeatherInfo` method are then used to create the
    Uniform Resource Identifier (URI) of the request (Listing [9-7](#A453659_1_En_9_Chapter.html#Par62)).
    This request is then sent to the OpenWeatherMap API. After the response is received,
    I analyze its status code (`CheckStatusCode` method). Similarly, as in Chapter
    [7](#A453659_1_En_7_Chapter.html), I raise an exception when the status code differs
    from 200 (OK). Otherwise, I convert the response body to JSON format and deserialize
    it with the `JsonConvert` class.


    ```

    public static async Task GetWeatherInfo(

    string cityName, TemperatureUnit unit)

    {

    var getRequestUri = GetRequestUri(cityName, unit);

    var response = await httpClient.GetAsync(getRequestUri);

    CheckStatusCode(response.StatusCode);

    var jsonString = await response.Content.ReadAsStringAsync();

    return JsonConvert.DeserializeObject(jsonString);

    }

    private static void CheckStatusCode(HttpStatusCode statusCode)

    {

    if (statusCode != HttpStatusCode.OK)

    {

    throw new Exception($"Unexpected status code: {statusCode}");

    }

    }

    Listing 9-6.

    Getting the Weather Info

    ```


    Constructing the request URI imposes additional comments. As Listing [9-7](#A453659_1_En_9_Chapter.html#Par62)
    shows, I supplement the base address with a query string containing three parameters:


    * `appId` – used to authenticate the request with the identifier obtained from
    the OpenWeatherMap service

    * `q` – indicates the city or location for which weather conditions should be
    returned

    * `units` – specify units


    The value for the first parameter is obtained from the private field `appId` (Listing
    [9-7](#A453659_1_En_9_Chapter.html#Par62)), so you need to update this field to
    the value you obtained during registration for the OpenWeatherMap service. Other
    query string parameters are achieved from the `GetRequestUri` function parameters.
    Note that to specify units I use `TemperatureUnit` enumeration. To convert values
    of this type to actual query string parameters, I wrote a helper method, `TemperatureUnitToQueryString`,
    shown in Listing [9-8](#A453659_1_En_9_Chapter.html#Par63).


    ```

    private static string appId = "";

    private static string GetRequestUri(string cityName, TemperatureUnit unit)

    {

    return $"?appId={appId}"

    + $"&q={cityName}"

    + $"&{TemperatureUnitToQueryString(unit)}";

    }

    Listing 9-7.

    Preparing the Request URI

    ```


    ```

    private static string TemperatureUnitToQueryString(TemperatureUnit unit)

    {

    var queryString = "units=";

    switch(unit)

    {

    case TemperatureUnit.Imperial:

    queryString += "imperial";

    break;

    case TemperatureUnit.Metric:

    queryString += "metric";

    break;

    }

    return queryString;

    }

    Listing 9-8.

    Creating Units Query String Parameter

    ```


    The very last element of the `WeatherServiceHelper` class is the `GetTemperatureUnitString`
    method. It determines the textual representation of the unit in which temperature
    is expressed. For imperial and metric units, I use °F and °C, respectively, while
    for default scale I use the K symbol (Listing [9-9](#A453659_1_En_9_Chapter.html#Par65)).


    ```

    public static string GetTemperatureUnitString(TemperatureUnit unit)

    {

    var unitString = string.Empty;

    var degSymbol = (char)176;

    switch (unit)

    {

    case TemperatureUnit.Imperial:

    unitString = $"{degSymbol}F";

    break;

    case TemperatureUnit.Metric:

    unitString = $"{degSymbol}C";

    break;

    case TemperatureUnit.Default:

    default:

    unitString = "K";

    break;

    }

    return unitString;

    }

    Listing 9-9.

    Obtaining Symbols Representing Temperature Scale

    ```'
