    \n因此，OpenWeatherMap 将返回一个 JSON 对象，其结构如代码清单 9-1 所示。即，共有十二个属性，其中包含有关气象站地理位置的信息，并报告了天气状况（`coord`）、实际天气情况（`weather`、`main`、`visibility`、`wind`、`clouds`）以及计算日期（`dt`）。\n\
