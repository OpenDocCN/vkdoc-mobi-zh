- fmt: "### Creating UI Tests\n\nTo create the test runner, which will send requests\
    \ to Xamarin Test Cloud Agent to test the UI of the Persons app, I add the new\
    \ project, `Persons.UITests`, which I make using the UI Test App project template\
    \ in Visual Studio (Figure [6-14](#A453659_1_En_6_Chapter.html#Fig14)).\n\n![A453659_1_En_6_Fig14_HTML.jpg](A453659_1_En_6_Fig14_HTML.jpg)\n\
    Figure 6-14. UI Test App project template in the New Project dialog\n\nAfter creating\
    \ `Persons.UITests`, we can note that this project, unlike `Persons.Tests`, does\
    \ not have the typical structure of an iOS app. Moreover, by comparing both projects,\
    \ we see that they target different frameworks and compile to different targets.\
    \ To see this, go to Solution Explorer and select \"Options\" from the context\
    \ menu of each project, then go to the Build/General tab ➤ Target framework and\
    \ compile the target shown on top (see Figure [6-15](#A453659_1_En_6_Chapter.html#Fig15)).\n\
    \n![A453659_1_En_6_Fig15_HTML.jpg](A453659_1_En_6_Fig15_HTML.jpg)\nFigure 6-15.\
    \ General options of the build options of the `Persons.Tests` (top) and `Persons.UITests`\
    \ projects\n\nAs Figure [6-15](#A453659_1_En_6_Chapter.html#Fig15) shows, `Persons.Tests`\
    \ is the Xamarin.iOS executable app and runs directly on the device or a simulator\
    \ as with any other iOS app. In this case, you invoke test methods using the UI\
    \ of the test runner (refer back to Figure [6-3](#A453659_1_En_6_Chapter.html#Fig3)).\
    \ On the other side of things, `Persons.UITests` is the .NET Framework Class Library.\
    \ Since it is not compiled to the executable, it is run indirectly. Every test\
    \ method implemented within `Persons.UITests` is invoked by the `Xamarin.UITest`\
    \ framework. To associate the apps that will be executed by this framework using\
    \ the Unit Tests pad, you go to View ➤ Pads ➤ Unit Tests. A window as shown in\
    \ Figure [6-16](#A453659_1_En_6_Chapter.html#Fig16) appears.\n\n![A453659_1_En_6_Fig16_HTML.jpg](A453659_1_En_6_Fig16_HTML.jpg)\n\
    Figure 6-16. The Unit Tests pad\n\nIn the Unit Tests pad, you first choose the\
    \ app to be tested. To that end, you right-click the Test Apps node and then choose\
    \ the \"Add App Project\" option to browse for the Persons project. Henceforth,\
    \ you can run UI tests by either pressing the Run All button or double-clicking\
    \ any of the test methods that appear in the Unit Tests pad under the Persons\
    \ ➤ UITests ➤ Tests node, provided the app was previously deployed to the simulator.\
    \ A default UI Test App project has only one test method, `AppLaunches`. If you\
    \ now execute this method, you will see that the UI Test Framework deploys another\
    \ app to your simulator, DeviceAgent. `DeviceAgent` uses the UI automation API\
    \ provided by the iOS to emulate the gestures and actions that are programmatically\
    \ defined within your unit tests and send them to the app under test. So, effectively,\
    \ `DeviceAgent` acts as a virtual user that, instructed by the test methods, emulates\
    \ user actions. `DeviceAgent` also collects the results of these actions and passes\
    \ them back to the test methods.\n\nTo implement test methods, you proceed in\
    \ a way similar to implementing unit tests. More specifically, every test class\
    \ is marked by `TestFixtureAttribute`, while every test method has to be public\
    \ and decorated by `TestAttribute`. Listing [6-9](#A453659_1_En_6_Chapter.html#Par38)\
    \ shows that such a structure is utilized in the `Tests` class—a default test\
    \ class created with the `Persons.UITests` project.\n\n```csharp\n[TestFixture]\n\
    public class Tests\n{\n    iOSApp app;\n    [SetUp]\n    public void BeforeEachTest()\n\
    \    {\n        app = ConfigureApp.iOS.StartApp();\n    }\n    [Test]\n    public\
    \ void AppLaunches()\n    {\n        app.Screenshot(\"First screen.\");\n    }\n\
    }\n```\nListing 6-9. A Default Definition of the UI Test Class\n\nBy analyzing\
    \ Listing [6-9](#A453659_1_En_6_Chapter.html#Par38), we can easily note two new\
    \ elements with respect to the unit tests we implemented previously. First and\
    \ foremost, there is yet another method, `BeforeEachTest`. This method is marked\
    \ with a `SetUpAttribute`. The latter instructs a test runner to invoke a selected\
    \ function before every test method. Here, `BeforeEachTest` creates an object\
    \ that derives from the `iOSApp` interface. This interface defines methods and\
    \ properties that you use to interact with the app under test.\n\nTo create an\
    \ object `iOSApp`, you use the static class `ConfigureApp`. This class has two\
    \ properties: `Android` of type `AndroidAppConfigurator`, and `iOS` of type `iOSAppConfigurator`.\
    \ For iOS apps, we are only interested in the second one, which is used to configure\
    \ test parameters (like device identifier, app bundle, and so on). Then, we run\
    \ tests with the `StartApp` method. An instance of the `iOSApp` class is then\
    \ used to programmatically manipulate the UI in exactly the same way the user\
    \ would.\n\nTo prepare the first UI test for the Persons app, I first extend a\
    \ definition of the `Person` class (`Persons.Common` project) by a static method\
    \ from Listing [6-10](#A453659_1_En_6_Chapter.html#Par42). This method creates\
    \ an instance of the `Person` object and then configures the public properties\
    \ to default values. I will later use the `Person.Default` method in the UI test\
    \ and in the Person app.\n\n```csharp\npublic static Person Default()\n{\n   \
    \ return new Person\n    {\n        FirstName = \"Dawid\",\n        LastName =\
    \ \"Borycki\",\n        Age = 34,\n        Email = \"dawid@borycki.com.pl\",\n\
    \    };\n}\n```\nListing 6-10. Additional Static Method of the Person Class\n\n\
    Next, in the `Tests` class (`Persons.UITests`), I implement the `VerifyDisplayDataButton`\
    \ test method according to Listing [6-11](#A453659_1_En_6_Chapter.html#Par46).\
    \ `VerifyDisplayDataButton` virtually taps a button from the view of the Persons\
    \ app and verifies whether the text in each text field corresponds to the default\
    \ person data.\n\nTo virtually tap a control, you use the `Tap` method of the\
    \ `iOSApp` class instance. This method has two overloaded versions: the one, which\
    \ accepts as an argument a C# `Func` delegate, and the other, which accepts string\
    \ arguments. In the first case, you create the lambda expression, which returns\
    \ an instance of the `AppQuery` class. The `AppQuery` class provides a number\
    \ of methods that are used to find UI elements. In the second case, you pass a\
    \ string, which is used by the test runner to find UI elements by inspecting their\
    \ accessibility identifiers or accessibility labels. Here, to find a button, I\
    \ use a lambda expression, which I constructed with an `AppQuery.Button` method.\
    \ This method matches the first button on the view.\n\nNext, I read text from\
    \ the text fields using the helper method `GetTextFieldText`, which finds text\
    \ fields by their accessibility identifiers. To do so, I construct an `AppQuery`,\
    \ in which I pass a string argument representing the control accessibility identifier.\
    \ Once text from text fields is obtained, I compare it to expected values, and\
    \ if they differ I raise a corresponding assertion using static methods of the\
    \ `Assert` class."
