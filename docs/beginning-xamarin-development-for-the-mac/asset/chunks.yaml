    # 地图视图与地理定位


    我们在上一节中开发的谷歌地图示例，其目标是展示 Web 视图的强大能力。在 iOS 上，如果你想要显示地图，不一定非要用 Web 视图。相反，你可以使用 iOS
    SDK 提供的原生地图框架。具体来说，这个框架提供了地图视图，你可以通过 Xamarin.iOS 中 `MapKit` 命名空间下声明的 `MKMapView`
    类来访问它。`MKMapView` 让你能够快速地为你的应用添加一个交互式的原生 iOS 地图。在这个地图上，你甚至可以显示用户设备的当前位置、添加适当的标注，甚至显示行车路线。因此，你可以相对快速地为你应用添加高级功能。在本节中，我将告诉你如何使用地图框架以及
    `CLLocationManager`（一个用于追踪 iOS 设备地理位置的类）来创建一个能在地图上显示用户位置的应用。更具体地说，这个应用将只有一个视图，其外观如图
    3-10 所示。


    为了实现这个应用，我首先使用“单视图应用”模板创建一个新项目。我将应用名称设置为其最低目标版本分别设置为 `Map` 和 iOS 9.0。然后，在 `ViewController`
    类中，我引入了三个命名空间：`MapKit`、`System.Linq` 和 `CoreLocation`。随后，我声明了私有成员 `map` 和一个辅助函数
    `InitMap`（代码清单 3-23）。这个方法用于创建一个 `MKMapView` 类的实例并设置其选定属性。具体来说，我启用了缩放和平移，并将 `ShowsUserLocation`
    属性设置为 `true`。这使地图能够显示用户的位置，该位置由一个带有白色边框的蓝色圆点表示（图 3-10）。此外，我使用 `MKMapView` 类实例的相应属性来配置地图类型。所有可用的地图类型都在
    `MKMapType` 枚举中定义。你可以在以下几种地图样式之间进行选择：


    ![A453659_1_En_3_Fig10_HTML.jpg](img/A453659_1_En_3_Fig10_HTML.jpg)


    图 3-10. 地图视图的示例用法


    - `Standard` – 表示地图使用标准制图样式（类似于图 3-7 左侧部分所示）

    - `Satellite` – 地图将使用通过卫星获取的影像进行创建

    - `Hybrid` – 标准地图与卫星影像的组合

    - `SatelliteFlyover` 和 `HybridFlyovers` – 分别表示地图类型将采用卫星影像或混合影像的“飞越”模式


    ```

    private MKMapView map;

    private void InitMap()

    {

    map = new MKMapView(View.Frame)

    {

    ZoomEnabled = true,

    ScrollEnabled = true,

    MapType = MKMapType.HybridFlyover,

    ShowsUserLocation = true

    };

    Add(map);

    }

    代码清单 3-23. 初始化地图

    ```


    要显示地图，你需要将 `InitMap` 方法添加到 `ViewController` 类的 `ViewDidLoad` 事件处理程序中。如果你这样做了并重新运行应用，你会看到视图被一个地图视图填满。你可以随意平移地图视图。如果你想在模拟器中缩放地图视图，你需要按住
    Alt/Option 键。模拟器中会显示两个代表两根手指的圆圈。它们模拟你在进行捏合手势时手指的位置。因此，你现在可以改变圆圈之间的距离来增加或减少地图的缩放级别。


