    in which I select the “Unit tests” object from the iOS tab (Figure [6-9](#A453659_1_En_6_Chapter.html#Fig9)).
    The default content of the `PersonTests.cs` file shows how to create the test
    class and test methods that actually perform unit testing. More specifically,
    the test class has to be decorated by the `TestFixtureAttribute` (see Listing
    [6-4](#A453659_1_En_6_Chapter.html#Par13)). This attribute instructs the testing
    framework to look for test methods in this class. Note that the `PersonTests`
    class is public. Otherwise, the NUnit testing framework would not recognize it.


    ![A453659_1_En_6_Fig9_HTML.jpg](A453659_1_En_6_Fig9_HTML.jpg)


    Figure 6-9.


    Adding the unit tests file


    ```

    [TestFixture]

    public class PersonTests

    Listing 6-4.

    A Declaration of the PersonTests Class

    ```


    The default tests given in the `PersonTests.cs` file do not implement anything
    useful, but they do show how to define a test method. Namely, such a method has
    to be a public function of the test class. Moreover, a test method does not return
    any value and is decorated with a `TestAttribute`. Every method that conforms
    to these requirements will be seen by the `TouchRunner` and displayed in its UI.


    To define the actual tests, I first import two additional namespaces, `Persons.Common.Models`
    and `System.Text.RegularExpressions`, and then replace the default definition
    of the `PersonTests` class with three test methods: `VerifyPublicProperties`,
    `VerifyFullName`, and `VerifyEmail`. The first one, `VerifyPublicProperties`,
    appears in Listing [6-5](#A453659_1_En_6_Chapter.html#Par17). The general structure
    of this and any other test method comprises three well-separated blocks of code:
    arrange, act, and assert. In the following listings, each of these blocks is marked
    by an appropriate comment. In the arrange block, you typically prepare the input
    data for your test. Therefore, in Listing [6-5](#A453659_1_En_6_Chapter.html#Par17),
    I declare four constants, which are then used in the act block to invoke the logic
    being tested. Here, I validate public property setters of the `Person` class.
    So, I instantiate this class with a default constructor and then set the values
    of its public properties to previously declared constants. Then, in the assert
    block, I verify if, indeed, public properties of the `Person` class instance possess
    the expected values.


    To validate values being tested, you use static methods of the `NUnit.Framework.Assert`
    class . If you have previously worked with Visual Studio for Windows, you probably
    already know the `Assert` class from the `Microsoft.VisualStudio.TestPlatform.UnitTestFramework`
    package. Both classes work similarly and expose analogous functionality. In particular,
    the `AreEqual` method I use in Listing [6-5](#A453659_1_En_6_Chapter.html#Par17)
    compares two variables and raises an exception of type `NUint.Framework.` `AssertionException`
    whenever the values of these variables differ. Additionally, you can define the
    message that is displayed when this assertion is raised. In Listing [6-5](#A453659_1_En_6_Chapter.html#Par17),
    I independently validate each public property of the `Person` class instance,
    and hence each assertion has a different message.


    ```

    [Test]

    public void VerifyPublicProperties()

    {

    // Arrange

    const string expectedFirstName = "Dawid";

    const string expectedLastName = "Borycki";

    const string expectedEmail = "dawid@borycki.com.pl";

    const int expectedAge = 34;

    // Act

    var person = new Person()

    {

    FirstName = expectedFirstName,

    LastName = expectedLastName,

    Email = expectedEmail,

    Age = expectedAge

    };

    // Assert

    Assert.AreEqual(expectedFirstName, person.FirstName,

    "Incorrect first name");

    Assert.AreEqual(expectedLastName, person.LastName,

    "Incorrect last name");

    Assert.AreEqual(expectedEmail, person.Email,

    "Incorrect e-mail");

    Assert.AreEqual(expectedAge, person.Age,

    "Incorrect age");

    }

    Listing 6-5.

    A Definition of Test Method, Which Validates Public Property Setters

    ```


    The second test method, `VerifyFullName`, validates a `FullName` method of the
    `Person` class instance. Basically, `VerifyFullName` works in a way similar to
    `VerifyPublicProperties`. Namely, in the `VerifyFullName` method, I first declare
    the expected values within the arrange block. Then, I use these values to instantiate
    a `Person` class (act block). Finally, I invoke the `FullName` method and check
    if its result is the same as the expected one.


    You may wonder why I implement such relatively simple test methods when I know
    a definition of the `Person` class. Typically, as a unit tester, you do not have
    such a privilege. Instead, you have to write test methods that fully cover a class
    definition, but you typically do not have access to the source code. So, in general,
    you start with simple test methods, validate basic class functionality, and then
    increase the complexity of your tests. By doing so, you ensure that the class
    is properly tested from the ground up.


    Such an approach is also utilized in test-driven development (TDD) . In TDD, you
    first implement the class skeleton, and then write appropriate unit tests. At
    this first stage, all tests should fail due to the lack of actual class implementations.
    Subsequently, you start implementing a class, and iteratively run unit tests to
    ensure that your implementation is valid. You continue this process as long as
    all tests have been passed. TDD is also beneficial when you modify and extend
    your app. You run unit tests after introducing any change to your code to ensure
    that it does not affect a functionality that is already implemented.


    ```

    [Test]

    public void VerifyFullName()

    {

    // Arrange

    const string expectedFirstName = "Dawid";

    const string expectedLastName = "Borycki";

    string expectedFullName = $"{expectedFirstName} {expectedLastName}";

    // Act

    var person = new Person()

    {

    FirstName = expectedFirstName,

    LastName = expectedLastName

    };

    // Assert

    Assert.AreEqual(expectedFullName, person.FullName());

    }

    Listing 6-6.

    Validating a FullName Method of the Person Class Instance

    ```


    The last test method of the `PersonTests` class, `VerifyEmail`, appears in Listing
    [6-7](#A453659_1_En_6_Chapter.html#Par24). This method aims at validating the
    `IsEmailValid` static method of the `Person` class. Following what I said before,
    `VerifyEmail` has a more complex implementation. More specifically, in the arrange
    block, I start by declaring an email to be checked. In this example, this email
    is invalid because it does not contain a domain. Then, in the act block, I perform
    the validation of the email string using a regular expression. This is implemented
    in a private helper method, `PersonsTests.EmailCheck`. Since this method does
    not conform to test-method requirements, it will not be recognized by the test
    runner.'
