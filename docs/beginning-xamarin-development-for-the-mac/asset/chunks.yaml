- fmt: '# UI Thread


    In many scenarios, you need to update specific properties of the controls from
    a background thread to avoid blocking the user interface, which is controlled
    by the main or UI thread. For instance, when the user presses a button, you send
    a request to a web service and wait for a response and update the UI accordingly.
    Depending on the network speed, this can take from a few to several seconds. So,
    the UI can freeze for a while. To avoid such locks, you need to send and parse
    a request in the background thread.


    However, as every Xamarin.iOS app utilizes the .NET Framework, you need to ensure
    that all updates to visual controls are performed from the UI thread. This is
    required by the .NET threading model, in which only the UI thread can access visual
    controls. In .NET Framework apps, when you try to update visual controls from
    the background thread, a corresponding exception is thrown.


    Let’s investigate this issue in a Xamarin.iOS app. To this end, I create another
    app, `BackgroundUpdate` (Single View App project template, targeting iOS 9.0 and
    above). Then, I define the user interface of this app such that the default view
    contains a button with caption Run timer and a label named `LabelTime`. A button
    is located on top, while the label is placed below it. Then, I create a default
    event handler for the button and define it according to Listing [3-27](#A453659_1_En_3_Chapter.html#Par134).
    This code requires a `System.Threading.Tasks` namespace.


    When the user presses a button, I run another method, `UpdateTimer`, in a background
    thread using the static `Run` method of the `Task` class. This method enqueues
    the specified block of code to be executed in the thread pool. The thread pool
    is a set of pre-created background threads. They are created by the runtime in
    order to save time when executing work in the background.


    ```

    private bool isTimerActive = false;

    partial void ButtonRunTimer_TouchUpInside(UIButton sender)

    {

    if (!isTimerActive)

    {

    isTimerActive = true;

    Task.Run(UpdateTimer);

    }

    }

    Listing 3-27.

    Enqueueing UpdateTimer Method in the Thread Pool

    ```


    As shown in Listing [3-28](#A453659_1_En_3_Chapter.html#Par136), the `UpdateTimer`
    implements an infinite loop. At each iteration of this loop, I read the current
    time and rewrite it to the `Text` property of the `LabelTime`. Then, I delay execution
    of the loop by a one-second (`Task.Delay`). Therefore, I expect that `UpdateTimer`
    will work like a simple watch and display a current time with one-second accuracy.
    However, when I run the app in the simulator and press a button, nothing happens,
    although the `UpdateTimer` method is running. The application output shows the
    reason for that: UIKit Consistency error: you are calling a UIKit method that
    can only be invoked from the UI thread. This means that you cannot update visual
    controls from the background thread directly. Instead, you need to invoke every
    such operation on the main thread. To do so, you use the `InvokeOnMainThread`
    method as shown in Listing [3-29](#A453659_1_En_3_Chapter.html#Par137). After
    making these changes in the `UpdateTimer` method, the timer will work correctly
    after you re-run the app (Figure [3-24](#A453659_1_En_3_Chapter.html#Fig24)).


    ```

    private Task UpdateTimer()

    {

    while (true)

    {

    try

    {

    LabelTime.Text = DateTime.Now.ToLongTimeString();

    }

    catch(Exception e)

    {

    Console.WriteLine(e.Message);

    }

    Task.Delay(1000).Wait();

    }

    }

    Listing 3-28.

    Updating Text Property of the Label from the Background Thread Does Not Work

    ```


    ![A453659_1_En_3_Fig24_HTML.jpg](A453659_1_En_3_Fig24_HTML.jpg)


    Figure 3-24. Exemplary results of the BackgroundUpdate app


    ```

    private Task UpdateTimer()

    {

    while (true)

    {

    InvokeOnMainThread(() =>

    {

    LabelTime.Text = DateTime.Now.ToLongTimeString();

    });

    Task.Delay(1000).Wait();

    }

    }

    Listing 3-29.

    Properties of Visual Controls Can Be Updated from the Main Thread Only

    ```


    ## Summary


    In this chapter, you learned how to define views. We started by creating single
    view applications in order to master the use of some basic controls like switch
    or slider. Then, we moved to the more advanced topics of using tables and their
    sources to create views, which display multiple items. You also learned how to
    render interactive web pages using the Web View, and to access and display the
    user’s location using the map kit. Subsequently, we worked with auto-layouts,
    which you can use to design adaptive apps, whose views adjust automatically to
    the particular device’s size. In the next chapter, we will continue to work with
    views. Namely, we will create multi-view applications and learn how to navigate
    between views using various navigation approaches.


    # Navigation


    In all previous samples, we created single view apps. However, in practice your
    app will most likely comprise more than one view. To implement such a multi-view
    app you need to know how to handle navigation, which is defined as switching between
    the views. In this section, I will discuss several approaches for creating multi-view
    apps.'
