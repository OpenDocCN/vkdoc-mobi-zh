    }

    Listing 5-16.

    Enabling Simultaneous Gesture Recognition

    ```


    Rotation and pinch gestures can now be processed simultaneously. Therefore, you
    also need to update the `RotateSquare` and `ScaleSquare` methods to include the
    fact that a square can be rescaled when rotated. For this reason, in Listing [5-16](#A453659_1_En_5_Chapter.html#Par63),
    references to both gesture recognizers were stored in the fields of the `ViewController`
    class. Then, you use this reference to update the rotation and scale changes of
    the square, as shown in Listing [5-17](#A453659_1_En_5_Chapter.html#Par65).


    ```

    private void RotateSquare(UIRotationGestureRecognizer sender)

    {

    //UpdateSquareTransform(new CGPoint(), sender.Rotation, 1.0f);

    if (sender.State == UIGestureRecognizerState.Changed)

    {

    if (pinchGestureRecognizer.State == UIGestureRecognizerState.Changed)

    {

    UpdateSquareTransform(new CGPoint(),

    sender.Rotation, pinchGestureRecognizer.Scale);

    }

    else

    {

    UpdateSquareTransform(new CGPoint(), sender.Rotation, 1.0f);

    }

    }

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastRotation += sender.Rotation;

    }

    }

    private void ScaleSquare(UIPinchGestureRecognizer sender)

    {

    // UpdateSquareTransform(new CGPoint(), 0.0f, sender.Scale);

    if (sender.State == UIGestureRecognizerState.Changed)

    {

    if (rotationGestureRecognizer.State == UIGestureRecognizerState.Changed)

    {

    UpdateSquareTransform(new CGPoint(),

    rotationGestureRecognizer.Rotation, sender.Scale);

    }

    else

    {

    UpdateSquareTransform(new CGPoint(), 0.0f, sender.Scale);

    }

    }

    if (sender.State == UIGestureRecognizerState.Ended)

    {

    lastScale *= sender.Scale;

    }

    }

    Listing 5-17.

    Scale Changes Are Included During Rotation

    ```


    Both methods from Listing [5-17](#A453659_1_En_5_Chapter.html#Par65) work similarly,
    so I will only discuss the first one, `RotateSquare`. In this method, I first
    check if the rotation gesture has been correctly recognized. To this end, I read
    the `State` property of the `UIRotationGestureRecognizer` class instance provided
    by the `sender` argument. Subsequently, I invoke `UpdateSquareTransform`. The
    parameters of this method depend on whether the user does the pinch gesture in
    parallel with the rotation. If so, I pass the scale changes obtained from the
    pinch gesture recognizer as the last parameter of the `UpdateSquareTransform`.
    However, if the user does not re-scale the purple square during rotation, I simply
    pass 1 for this last parameter. It indicates that the scale should not be changed.
    Lastly, I store the accumulated rotation in the `lastRotation` member.


    I encourage you to independently extend the Gestures app such that it will simultaneously
    recognize not only rotation and pinch gestures but also the pan gesture.


