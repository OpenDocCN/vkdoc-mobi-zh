- fmt: "要访问复杂功能服务器，需要使用`CLKComplicationServer`类的静态属性`SharedInstance`。然后，要获取实际显示在表盘上的活跃复杂功能集合，需要读取`ActiveComplications`属性。该集合中的每个元素都是`CLKComplication`类的一个实例，并允许直接访问该复杂功能。具体来说，可以通过将相应对象传递给`CLKComplicationServer`类实例的`ReloadTimeline`方法（参见清单[8-21](#A453659_1_En_8_Chapter.html#Par113)中的`UpdateComplications`方法）来强制更新该复杂功能。`ComplicationHelper`也有一个静态属性`Answer`，我使用它来将数据从界面控制器传递给复杂功能控制器。为了完成实现，我需要获取复杂功能的数据。为此，我修改了`DisplayUserResponse`方法（清单[8-9](#A453659_1_En_8_Chapter.html#Par55)），如清单[8-22](#A453659_1_En_8_Chapter.html#Par115)所示。即，我将使用文本输入控制器获取的值存储在`ComplicationHelper.Answer`属性中，然后使用`ComplicationHelper.UpdateComplications`方法强制更新所有活跃的复杂功能。\n\
    \n```\nprivate void DisplayUserResponse(NSArray result)\n{\n    var answer = \"\
    No answer\";\n    if (result != null)\n    {\n        if (result.Count > 0)\n\
    \        {\n            answer = result.GetItem(0).ToString();\n        }\n  \
    \  }\n    LabelAnswer.SetText(answer);\n    ComplicationHelper.Answer = answer;\n\
    \    ComplicationHelper.UpdateComplications();\n}\nListing 8-22.\nUpdating Complications\n\
    ```\n\n要测试上述示例，需要退出 iPhone 和 Watch 模拟器，然后重新运行应用。之后，转到表盘，将触摸压力设置为深按，然后轻点手表屏幕。这会激活可以调整表盘的模式。滑动到模块表面（图[8-18](#A453659_1_En_8_Chapter.html#Fig18)的左侧部分），然后将触摸压力恢复为浅按后点击“自定义”按钮。进入自定义模式后，滑动到第二个屏幕，然后使用绿色矩形在复杂功能之间切换。转到左上角显示的复杂功能。接着，需要将鼠标光标放在数字表冠上，然后滚动鼠标或触摸板，直到看到`HelloWatchKit.Watch`复杂功能。对其下方的较大复杂功能执行相同操作（图[8-19](#A453659_1_En_8_Chapter.html#Fig19)的右侧部分）。完成后，按下数字表冠按钮。现在可以返回应用，并从文本输入控制器中选择任意项目，以便在主屏幕上看到更新后的复杂功能。\n\
    \n![A453659_1_En_8_Fig19_HTML.jpg](A453659_1_En_8_Fig19_HTML.jpg)\n\nFigure 8-19.\n\
    \nConfiguring complications\n\n## Glance Controller\n\n`HelloWatchKit.WatchExtension`包的最后一个元素是快速查看控制器，用于向用户呈现静态信息。默认的快速查看控制器是在应用创建期间由\
    \ Visual Studio 生成的。当用户轻点与快速查看控制器关联的视图时，相应的应用会被激活。由于 watchOS 3 及更高版本中不可用快速查看，因此无法使用默认模拟器进行测试。所以，我只会展示如何检测应用是否从快速查看激活。如果是，界面控制器的标题将更改为相应的值。为了实现此功能，我向`HelloWatchKit.WatchExtension`应用添加了另一个文件`GlanceHelper.cs`，并在其中定义了清单[8-23](#A453659_1_En_8_Chapter.html#Par118)中所示的静态类。该类只有一个属性`Key`，用于标识在快速查看和界面控制器之间传递的值。\n\
    \n```\npublic static class GlanceHelper\n{\n    public static NSString Key { get;\
    \ } = new NSString(\"GlanceKey\");\n}\nListing 8-23.\nA Helper Class for Handling\
    \ Glance Activation\n```\n\n为了展示如何将数据从快速查看传递给界面控制器以指示它是通过快速查看激活的，我首先实现了`GlanceController`的`WillActivate`视图事件处理程序，如清单[8-24](#A453659_1_En_8_Chapter.html#Par120)所示。我创建了`NSDictionary`对象，实现键值对的集合。在本例中，字典只包含一个元素，键为`GlanceKey`，值为`Glance-activated`。然后，我将此字典与`appIdentifier`一起传递给`UpdateUserActivity`方法。此方法用于将快速查看状态传递给实际应用。\n\
    \n```\npublic override void WillActivate()\n{\n    var appIdentifier = NSBundle.MainBundle.BundleIdentifier;\n\
    \    using (var nsDictionary = new NSDictionary\n        (GlanceHelper.Key, \"\
    Glance-activated\"))\n    {\n        UpdateUserActivity(appIdentifier, nsDictionary,\
    \ null);\n    }\n}\nListing 8-24.\nPassing Data to the App When It Is Activated\
    \ from the Glance Controller\n```\n\n然后，要获取快速查看状态，需要在初始界面控制器中实现`HandleUserActivity`。清单[8-25](#A453659_1_En_8_Chapter.html#Par122)展示了如何在`HelloWatchKit.WatchExtension`的`InterfaceController`类中检索键`GlanceKey`的值的示例。\n\
    \n```\npublic override void HandleUserActivity(NSDictionary userActivity)\n{\n\
    \    if (userActivity != null)\n    {\n        if (userActivity.ContainsKey(GlanceHelper.Key))\n\
    \        {\n            SetTitle(userActivity.ValueForKey(GlanceHelper.Key).ToString());\n\
    \        }\n    }\n}\nListing 8-25.\nReceiving Data Passed from the Glance Controller\n\
    ```\n\n## Summary\n\n在本章中，我们学习了如何为智能手表实现应用。我们涵盖了广泛的主题，从项目创建、使用手表模拟器、处理视图和应用事件，到使用专用控制器收集用户输入、创建力度触摸菜单、在界面控制器之间导航，以及通知、快速查看和复杂功能。这组教程使您能够独立地为\
    \ watchOS 编写完整的应用。在下一章中，我们将使用 tvOS 应用。\n\n# 9. tvOS\n\n电视是日常生活中又一个被电子产品和软件彻底改造的部分。像\
    \ Apple TV 这样的设备能将您的显示器变成一个智能设备，其用途远不止观看电视节目。您无需担心错过最喜欢的电视节目。相反，您才是掌控者，决定观看的时间和内容。此外，有了专门的应用程序和游戏，您的电视变得更加智能。本章将展示如何为\
    \ Apple TV 构建此类自定义应用。具体来说，我将告诉您如何创建图[9-1](#A453659_1_En_9_Chapter.html#Fig1)所示的完整\
