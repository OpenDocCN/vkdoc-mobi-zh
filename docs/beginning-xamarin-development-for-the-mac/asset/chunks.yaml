    performed from the UI thread. This is required by the .NET threading model, in
    which only the UI thread can access visual controls. In .NET Framework apps, when
    you try to update visual controls from the background thread, a corresponding
    exception is thrown. Let’s investigate this issue in a Xamarin.iOS app. To this
    end, I create another app, `BackgroundUpdate` (Single View App project template,
    targeting iOS 9.0 and above). Then, I define the user interface of this app such
