    in this chapter. Single arrows represent references only, while double arrows
    indicate projects that will be tested automatically.


    In this chapter, I will show you how to implement automatic unit and UI tests.
    To this end, I will create several projects that will be related to each other
    as shown in Figure [6-1](#A453659_1_En_6_Chapter.html#Fig1). Clearly, I will have
    a single view iOS app, Persons. This app targets the Xamarin.iOS framework and
    uses a model class, `Person`. The `Person` class will be implemented in a separate,
    reusable .NET Standard Library project, Persons.Common. The Persons app has the
    UI shown in Figure [6-2](#A453659_1_En_6_Chapter.html#Fig2). There is one button,
    four labels, and four text fields. When you tap the button, a default person’s
    data (first and last name, email, and age) will be displayed in the text fields.


    To validate this functionality, I will have two test projects: Persons.Tests and
    Persons.UITests. The first one, Persons.Tests, will be a standard Xamarin.iOS
    app that implements the test runner shown in Figure [6-3](#A453659_1_En_6_Chapter.html#Fig3).
    This project will be used to test the `Person` class. In particular, I will check
    the public property setters and public methods. The second test project, Persons.UITests,
    is a .NET Framework Class Library and will be invoked by the Xamarin UI Test Framework
    to validate the UI of the Persons app. In particular, I will implement a test
    that will virtually tap a button and then check whether the text fields possess
    the expected values. Finally, I will show how to run the UI tests in the Xamarin
    Test Cloud (XTC). XTC provides you with cloud-based access to a farm of physical
    devices with various screens and operating systems. Therefore, you can automatically
    test your app to ensure it will be compatible with all target devices. XTC has
    a web-based interface that even lets you visualize how your app will look on the
    devices on which you choose to run your UI tests (Figure [6-4](#A453659_1_En_6_Chapter.html#Fig4)).


