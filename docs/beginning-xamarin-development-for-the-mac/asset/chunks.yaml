    : \"01d\"\n}\n],\n\"base\": \"stations\",\n\"main\": {\n\"temp\": 290.14,\n\"\
    pressure\": 1016,\n\"humidity\": 77,\n\"temp_min\": 287.15,\n\"temp_max\": 292.15\n\
    },\n\"visibility\": 16093,\n\"wind\": {\n\"speed\": 2.92,\n\"deg\": 272.003\n\
    },\n\"clouds\": {\n\"all\": 1\n},\n\"dt\": 1504527300,\n\"sys\": {\n\"type\":\
    \ 1,\n\"id\": 1969,\n\"message\": 0.0186,\n\"country\": \"US\",\n\"sunrise\":\
    \ 1504520803,\n\"sunset\": 1504567326\n},\n\"id\": 5128581,\n\"name\": \"New York\"\
    ,\n\"cod\": 200\n}\n```\n\n代码清单 9-1. OpenWeatherMap API 返回的 JSON 响应示例\n\n为了在 `HelloTV`\
    \ 应用中消费上述 JSON 响应，我需要将 JSON 对象映射到 C# 类。如第 7 章所述，我在 JSON Utils 服务（[`jsonutils.com/`](https://jsonutils.com/)）的帮助下完成此映射。具体来说，我将\
