  trans: "\n# 选项卡栏\n\n我先从选项卡栏控件开始介绍，该控件可用于创建多选项卡应用。在此应用中，用户通过一个栏在不同视图（选项卡）之间切换。这个栏包含带有图标和可选标签的按钮。当用户按下某个按钮时，对应的选项卡内容便会显现。\n\
    \n![A453659_1_En_4_Fig1_HTML.jpg](img/A453659_1_En_4_Fig1_HTML.jpg)\n\n**图 4-1.**\
    \ 在 Visual Studio 中创建选项卡应用\n\n要创建该选项卡应用，我使用了一个专用的项目模板（见图 4-1）。我将应用名称设置为 `Navigation.Tabs`，最低目标版本设置为\
    \ iOS 9.0。Visual Studio 会创建一个包含以下视图控制器的项目（见图 4-2）：\n\n![A453659_1_En_4_Fig2_HTML.jpg](img/A453659_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2.** 基于专用模板创建的选项卡应用的默认结构\n\n*   **选项卡栏控制器** – 管理选项卡界面的控制器。更具体地说，此控制器负责在选项卡之间进行切换。每个选项卡都有独立的视图控制器和对应的视图。\n\
    *   **第一个视图控制器和第二个视图控制器** – 与第一个和第二个选项卡关联的视图控制器。请注意，`Navigation.Tabs` 项目还包含两个文件：`FirstViewController.cs`\
    \ 和 `SecondViewController.cs`，其中存储了同名类的定义。`FirstViewController` 和 `SecondViewController`\
    \ 都派生自 `UIViewController`，除了受保护的构造函数外，它们还包含了 `ViewDidLoad` 和 `DidReceiveMemoryWarning`\
    \ 方法的默认实现，这与之前所有单视图应用中使用的 `ViewController` 类的定义类似。\n\n请注意，默认情况下只有两个选项卡，因此当你运行应用时，其外观将如图\
    \ 4-3 所示。即，选项卡栏有两个元素：“First”和“Second”。你可以点击它们来切换选项卡。每个选项卡都有两个标签，显示视图编号以及实现该视图控制器的关联类的名称。\n\
    \n![A453659_1_En_4_Fig3_HTML.jpg](img/A453659_1_En_4_Fig3_HTML.jpg)\n\n**图 4-3.**\
    \ 默认的选项卡应用\n\n要控制选项卡栏中项目的显示外观，你需要使用选项卡栏项目的属性。如图 4-4 左侧部分（文档大纲）所示，每个选项卡都有一个关联的选项卡栏项目。点击它后，所有控件属性都会在属性面板中显示（图\
    \ 4-4 右侧部分）。具体来说，你可以修改项目标题（“Bar Item”组下的“Title”条目）及其图片（“Title”下方的下拉列表）。你也可以通过“System\
    \ Item”下拉列表（“Tab Bar Item”组）使用系统图标之一。此列表包含以下选项卡栏图标：书签、通讯录、下载、收藏夹、精选、历史记录、最多、最近、最多查看、最近查看、搜索和最高评分。\n\
    \n![A453659_1_En_4_Fig4_HTML.jpg](img/A453659_1_En_4_Fig4_HTML.jpg)\n\n**图 4-4.**\
    \ 选中的选项卡栏项目的属性面板\n\n现在我们已经了解了 `Navigation.Tabs` 项目的结构，让我们看看如何添加另一个选项卡。为此，我按以下步骤操作。首先，在\
    \ iOS 设计器中，从工具箱添加视图控制器。然后，使用 CTRL+拖动操作，将此对象与选项卡栏控制器关联。我先按住键盘上的 CTRL 键，同时点击选项卡栏控制器的灰色区域，然后将鼠标光标移动到新的视图控制器上并释放鼠标按钮。此时会出现一个“segue”弹窗，我在其中的“Relationship”组下选择“Tab”（图\
