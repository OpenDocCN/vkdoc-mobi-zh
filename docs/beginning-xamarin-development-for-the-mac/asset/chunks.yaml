    \ activates the Signing Certificates window.\n\n    ![A453659_1_En_6_Fig19_HTML.jpg](A453659_1_En_6_Fig19_HTML.jpg)\n\
    \n    Figure 6-19.\n\n    A list of teams associated with the Apple ID  \n3. \
    \ In the Signing Certificates window , press the + button and choose “iOS Development”\
    \ (Figure [6-20](#A453659_1_En_6_Chapter.html#Fig20)). Press the Done button after\
    \ a certificate is created, and then press the Download All or Manual Profiles\
    \ button. You can now close Xcode preferences.\n\n    ![A453659_1_En_6_Fig20_HTML.jpg](A453659_1_En_6_Fig20_HTML.jpg)\n\
    \n    Figure 6-20.\n\n    Creating a signing certificate  \n\nGiven a signing\
    \ certificate for iOS development, we need to associate it with the Persons app.\
    \ This needs to be done using Xcode and a physical iOS device connected to the\
    \ Mac. In Xcode, you now create a new iOS app by going to File ➤ New ➤ Project…\
    \ A window like that shown in Figure [6-21](#A453659_1_En_6_Chapter.html#Fig21)\
    \ appears. In this window, you choose a Single View Application and then click\
    \ the Next button.\n\n![A453659_1_En_6_Fig21_HTML.jpg](A453659_1_En_6_Fig21_HTML.jpg)\n\
    \nFigure 6-21.\n\nNew project dialog in Xcode\n\nAfter choosing a project template,\
    \ another window, Choose options for your new project, appears. This window, shown\
    \ in Figure [6-22](#A453659_1_En_6_Chapter.html#Fig22), lets you specify the product\
    \ and organization name for your app. Ensure that these values match the corresponding\
    \ configuration from the `Info.plist` of your Xamarin.iOS Person app. Namely,\
    \ in my case the product name is set to Persons, while the organization name is\
    \ com.db. You can leave other options at the default values, then click the Next\
    \ button and choose a location for your project. Xcode will then create an empty\
    \ app and display its configuration (Figure [6-23](#A453659_1_En_6_Chapter.html#Fig23)).\
    \ In this window, you need to ensure that the provisioning profile and signing\
    \ certificate (Signing section) are set. If not, you need to connect a physical\
    \ iOS device and then press the Try Again button, which appears at the bottom\
    \ of the Signing section.\n\n![A453659_1_En_6_Fig23_HTML.jpg](A453659_1_En_6_Fig23_HTML.jpg)\n\
    \nFigure 6-23.\n\nIdentity and signing sections of the Persons Xcode app\n\n![A453659_1_En_6_Fig22_HTML.jpg](A453659_1_En_6_Fig22_HTML.jpg)\n\
    \nFigure 6-22.\n\nConfiguring project options\n\nGiven the provisioning profile,\
    \ you go back to Visual Studio and open the options of the Persons project (Figure\
    \ [6-24](#A453659_1_En_6_Chapter.html#Fig24)). Then, go to iOS Bundle Signing\
    \ under the Build tab, in which you do the following:\n\n![A453659_1_En_6_Fig24_HTML.jpg](A453659_1_En_6_Fig24_HTML.jpg)\n\
    \nFigure 6-24.\n\niOS Bundle Signing section of the Xamarin.iOS Persons app in\
    \ Visual Studio\n\n*   Choose “iPhone” from the Platform drop-down list.\n*  \
    \ Set Signing Identity to “Developer (Automatic).”\n*   Choose “Automatic” from\
    \ the Provisioning Profile drop-down list.\n\nVisual Studio can now generate the\
    \ app package, which can be deployed to the XTC."
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n```csharp\n[Test]\n\
    public void VerifyDisplayDataButton()\n{\n    // Arrange\n    var defaultPerson\
    \ = Person.Default();\n    // Act\n    app.Tap(b => b.Button());\n    var actualFirstName\
    \ = GetTextFieldText(\"TextFieldFirstName\");\n    var actualLastName = GetTextFieldText(\"\
    TextFieldLastName\");\n    var actualEmail = GetTextFieldText(\"TextFieldEmail\"\
    );\n    var actualAge = GetTextFieldText(\"TextFieldAge\");\n    // Assert\n \
    \   Assert.AreEqual(defaultPerson.FirstName, actualFirstName);\n    Assert.AreEqual(defaultPerson.LastName,\
    \ actualLastName);\n    Assert.AreEqual(defaultPerson.Email, actualEmail);\n \
    \   Assert.AreEqual(defaultPerson.Age.ToString(), actualAge);\n}\nprivate string\
    \ GetTextFieldText(string textFieldAccessibilityId)\n{\n    var result = string.Empty;\n\
    \    if(app.Query(c => c.Id(textFieldAccessibilityId)).FirstOrDefault()\n    \
    \    is AppResult matchedTextField)\n    {\n        result = matchedTextField.Text;\n\
    \    }\n    return result;\n}\n```\n清单 6-11. UI 测试\n\n现在，我们可以通过在“单元测试”面板中双击 `VerifyDisplayDataButton`\
    \ 测试方法来执行它。测试运行器会执行 `DeviceAgent`，随后该代理会运行 Person 应用并虚拟地点击一个按钮。由于对应的事件处理器是空的，所以没有任何文本字段会包含预期值，测试将会失败，这显示在“测试结果”窗口中（图\
    \ 6-17）。`Assert.AreEqual` 方法会抛出一个异常，指出预期字符串 (`\"Dawid\"`) 与实际字符串 (`string.Empty`)\
    \ 不同。\n\n![A453659_1_En_6_Fig17_HTML.jpg](img/A453659_1_En_6_Fig17_HTML.jpg)\n\
    \n图 6-17. 测试结果窗口\n\n现在，我们可以根据清单 6-12 (`ViewController.cs`)，在 Person 应用中为按钮的 `TouchUpInside`\
    \ 事件实现处理器，然后重新构建 Person 应用，并重新运行 UI 测试以确认我们实现的正确性。通过这样做，我们有效地执行了 TDD 方法的一个迭代。也就是说，我们首先编写了一个测试方法并运行它来验证应用尚未实现预期功能。然后，我们为应用补充了正确的逻辑，并重新运行测试方法来确认它。一旦测试方法实现完毕，你就可以在每次更改相关源代码时执行它们，以确保你不会引入回归错误或丢失已实现的功能。因此，这种自动化测试有助于开发高质量的应用。\n\
    \n```csharp\npartial void ButtonDisplayPersonData_TouchUpInside(UIButton sender)\n\
    {\n    var defaultPerson = Person.Default();\n    TextFieldFirstName.Text = defaultPerson.FirstName;\n\
    \    TextFieldLastName.Text = defaultPerson.LastName;\n    TextFieldAge.Text =\
    \ defaultPerson.Age.ToString();\n    TextFieldEmail.Text = defaultPerson.Email;\n\
    }\n```\n清单 6-12. 用于显示默认 Person 数据的事件处理器的最终定义\n\n## Xamarin Test Cloud\n\n到目前为止，我们编写的所有测试都是在本地模拟器中运行的。然而，Xamarin\
    \ UI 测试框架也可以用于在物理设备上运行测试。通常，你将待测应用部署到设备上，然后在该设备上运行 UI 测试。因此，如果你需要在多种设备上执行相同的测试，你需要依次进行，这会消耗额外的时间。此外，你需要实际拥有所有安装了不同操作系统版本的设备。因此，对\
    \ iOS 应用进行全面的测试可能非常昂贵，尤其是对于个人开发者而言。为了解决这些问题，Xamarin 提供了一个物理设备农场，即 Xamarin Test\
    \ Cloud。`XTC` 是一项基于云的服务，你可以直接从 Visual Studio 将应用及其 UI 测试上传到该服务中，然后根据需要在其提供的任意数量的设备上运行测试。测试结果随后会以清晰的报告形式呈现给你，如图\
    \ 6-4 所示。虽然将应用提交到 `XTC` 很简单，但它要求你为应用创建一个预置描述文件，因为应用包是在物理设备上执行的。因此，我将通过解释如何创建预置描述文件来开始本小节，然后我将向你展示如何将应用提交到\
    \ `XTC`、选择设备并执行测试。要完成本部分，你需要先在 `XTC` 中创建一个试用账户：[`https://testcloud.xamarin.com/register`](https://testcloud.xamarin.com/register)。\n\
    \n### 预置描述文件\n\n要创建预置描述文件，你需要 `Xcode`、一个 Apple ID，以及一个连接到你的开发用 Mac 的物理 iOS 设备。然后，按以下步骤操作：\n\
    \n1. 打开 `Xcode`，点击“Accounts”标签页。在“Preferences”下，选择“Apple ID”作为账户类型，然后输入你的 Apple\
    \ ID 凭据（图 6-18）。你的账户随后会出现在窗口的左侧，如图所示。\n\n   ![A453659_1_En_6_Fig18_HTML.jpg](img/A453659_1_En_6_Fig18_HTML.jpg)\n\
    \n   图 6-18. 使用 Apple ID 登录 `Xcode`\n\n2. 选择你的账户，然后点击位于“Accounts”标签页右下角的“Manage\
    \ Certificates…”按钮（图 6-19）。这会激活“Signing Certificates”窗口。\n\n   ![A453659_1_En_6_Fig19_HTML.jpg](img/A453659_1_En_6_Fig19_HTML.jpg)\n\
    \n   图 6-19. 与 Apple ID 关联的团队列表\n\n3. 在“Signing Certificates”窗口中，按下 `+` 按钮并选择“iOS\
    \ Development”（图 6-20）。证书创建完成后，按下“Done”按钮，然后按下“Download All”或“Manual Profiles”按钮。现在你可以关闭\
    \ `Xcode` 的偏好设置了。\n\n   ![A453659_1_En_6_Fig20_HTML.jpg](img/A453659_1_En_6_Fig20_HTML.jpg)\n\
    \n   图 6-20. 创建签名证书\n\n有了用于 iOS 开发的签名证书，我们需要将其与 Persons 应用关联起来。这需要使用 `Xcode` 和连接到\
    \ Mac 的物理 iOS 设备来完成。在 `Xcode` 中，现在通过转到“File”➤ “New”➤ “Project…”来创建一个新的 iOS 应用。会出现一个类似图\
    \ 6-21 所示的窗口。在此窗口中，选择“Single View Application”，然后点击“Next”按钮。\n\n![A453659_1_En_6_Fig21_HTML.jpg](img/A453659_1_En_6_Fig21_HTML.jpg)\n\
    \n图 6-21. `Xcode` 中的新建项目对话框\n\n选择项目模板后，会出现另一个窗口“Choose options for your new project”。该窗口如图\
    \ 6-22 所示，允许你指定应用的“Product Name”和“Organization Name”。确保这些值与你的 Xamarin.iOS Person\
    \ 应用中 `Info.plist` 的相应配置相匹配。也就是说，在我的例子中，“Product Name”设置为 `Persons`，而“Organization\
    \ Name”设置为 `com.db`。你可以将其他选项保留为默认值，然后点击“Next”按钮并为你的项目选择一个位置。`Xcode` 随后会创建一个空应用并显示其配置（图\
    \ 6-23）。在此窗口中，你需要确保“Provisioning Profile”和“Signing Certificate”（“Signing”部分）已设置好。如果没有，你需要连接物理\
    \ iOS 设备，然后点击“Signing”部分底部出现的“Try Again”按钮。\n\n![A453659_1_En_6_Fig23_HTML.jpg](img/A453659_1_En_6_Fig23_HTML.jpg)\n\
    \n图 6-23. Persons `Xcode` 应用的标识和签名部分\n\n![A453659_1_En_6_Fig22_HTML.jpg](img/A453659_1_En_6_Fig22_HTML.jpg)\n\
    \n图 6-22. 配置项目选项\n\n获得预置描述文件后，回到 Visual Studio 并打开 Persons 项目的选项（图 6-24）。然后，转到“Build”标签页下的“iOS\
    \ Bundle Signing”，并执行以下操作：\n\n![A453659_1_En_6_Fig24_HTML.jpg](img/A453659_1_En_6_Fig24_HTML.jpg)\n\
    \n图 6-24. Visual Studio 中 Xamarin.iOS Persons 应用的 iOS Bundle Signing 部分\n\n* 从“Platform”下拉列表中选择“iPhone”。\n\
    * 将“Signing Identity”设置为“Developer (Automatic)”。\n* 从“Provisioning Profile”下拉列表中选择“Automatic”。\n\
    \n现在，Visual Studio 可以生成应用包，并将其部署到 `XTC` 上。\n"
- fmt: '# Running Tests in the XTC


    To run tests in the XTC, you will eventually need to downgrade the `NUnit` NuGet
    package of `Persons.UITest`. When I was writing this chapter, XTC was supporting
    NUnit version 2.6.4. The easiest way to downgrade this package is to uninstall
    it with the “Remove” option of the Package context menu in the Solution Explorer.
    Then, you re-install a package with the Add Packages window and choose the NUnit
    version with the drop-down list available in the bottom right part of Package
    Manager (Figure 6-13).


    After ensuring that the NUnit version is compatible with XTC, you go to the Unit
    Tests pad, right-click the selected UI test, and then choose “Run in Test Cloud.”
    An app will be automatically submitted to the XTC, and after a while you will
    be automatically redirected to the XTC website. Then, you choose the devices on
    which tests should be executed. As shown in Figure 6-25, I chose 12 devices, of
    which 5 are iPads. The others are randomly selected iPhones. Given the list of
    devices, you then choose Test series (master, production, or beta) and system
    language, and then press the Done button. A test process will be started, and
    its current status will be displayed on the XTC website (Figure 6-26).


    ![A453659_1_En_6_Fig26_HTML.jpg](A453659_1_En_6_Fig26_HTML.jpg)


    Figure 6-26. Test progress


    ![A453659_1_En_6_Fig25_HTML.jpg](A453659_1_En_6_Fig25_HTML.jpg)


    Figure 6-25. XTC device selection


    Once the tests have completed, you can review the test results for each device
    using the test report shown earlier in Figure 6-24. In my case, I found that the
    `VerifyDisplayDataButton` test method failed on all iPads. According to app screenshots,
    none of the controls were displayed. I then checked this locally by re-running
    the Persons app in the iPad simulator. Indeed, none of controls were displayed.
    However, this is easy to fix with the layout strategies described in Chapter 3.
    At a minimum, to force the controls to be displayed on larger screens, one must
    check the “Installed” checkbox of the `wAnyhAny` control property, as shown in
    Figure 6-27. You can now re-run the tests or run the Persons app in the iPad simulator.


    ![A453659_1_En_6_Fig27_HTML.jpg](A453659_1_En_6_Fig27_HTML.jpg)


    Figure 6-27. Enabling control visibility for devices of any screen size


    ## Summary


    In this chapter, we explored methods for automatic testing of Xamarin.iOS apps.
    We started by creating unit tests of the C# code, and then we implemented automatic
    UI tests. The latter were run locally in the simulator and on multiple physical
    iOS devices from the Xamarin Test Cloud. You can use all of the presented methods
    to ensure the high quality of your apps on the very demanding mobile market. We
    will use the unit testing approach we learned here to develop a client app that
    consumes and updates data from a web service.


    # Consuming RESTful Web Services


    Frequently, iOS apps constitute the mobile endpoint of a larger system. The mobile
    app retrieves some data, like the weather forecast, news, or bank statements,
    from a remote web server using RESTful or REST architecture and then displays
    this data to the user. The user can change or update parts of this data locally
    and then transfer it to the server. The mobile client can also send requests to
    the web server; for instance, to execute the money transfer. In this chapter,
    we will learn how to implement such a mobile client using Xamarin.iOS.


    We will use `JSONPlaceholder` ( [https://jsonplaceholder.typicode.com/](https://jsonplaceholder.typicode.com/)
    ) as the REST web service. It provides several resources that you can use to test
    your mobile or web app. Here, I’ll use the Users resource. It contains a collection
    of ten objects, each of which represents the hypothetical `user` object, stored
    in the JSON format. To see this list, you can type the following URL in your web
    browser: [https://jsonplaceholder.typicode.com/users](https://jsonplaceholder.typicode.com/users).
    You will quickly see that each user is represented by the JSON object shown in
    Listing 7-1. This object contains several simple type properties, like identifier,
    name, username, email, phone, and website. There are also two properties of complex
    types. These are address and company and contain detailed information about the
    user’s address and associated company.


    As shown in Figure 7-1, I use this data in the `Users.MobileClient` app to display
    the list of users in the `UITableView`. Each table row will contain the user and
    company name. When you swipe each entry in the list, two row actions will appear:
    Remove and Details. The first one will let you remove the particular item from
    the Users resource. The second action will activate another view, which presents
    the user’s location on the `UIMapView` as well as two text fields. These will
    enable you to change the user’s name and his or her email address. To implement
    such a functionality, I utilize and combine many topics we learned in previous
    chapters.


    Although the JSONPlaceholder API does not allow you to actually update or remove
    items from the web service, we can still use it to mimic real interactions with
    such a web service and update the local data store.


    ![A453659_1_En_7_Fig1_HTML.jpg](A453659_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. The `Users.MobileClient` app


    ```

    {

    "id": 5,

    "name": "Chelsey Dietrich",

    "username": "Kamren",

    "email": "Lucio_Hettinger@annie.ca",

    "address": {

    "street": "Skiles Walks",

    "suite": "Suite 351",

    "city": "Roscoeview",

    "zipcode": "33263",

    "geo": {

    "lat": "-31.8129",

    "lng": "62.5342"

    }

    },

    "phone": "(254)954-1289",

    "website": "demarco.info",

    "company": {

    "name": "Keebler LLC",

    "catchPhrase": "User-centric fault-tolerant solution",

    "bs": "revolutionize end-to-end systems"

    }

    }

    ```


    Listing 7-1. JSON Representation of User Object from the JSONPlaceholder'
