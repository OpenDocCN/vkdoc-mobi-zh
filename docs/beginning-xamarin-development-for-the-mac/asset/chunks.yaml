  trans: "\n# 视图生命周期\n\n在上一节中，我们学习了应用程序的生命周期。对于单个视图，也存在类似的机制。视图事件由 `UIViewController`\
    \ 类中实现的相应事件处理程序表示。你在与特定视图（其视图控制器）关联的派生类中重写这些处理程序。视图生命周期的事件处理程序用于准备视图。例如，你首先从设备内存中恢复数据，然后使用这些数据更新控件。这样，在视图呈现给用户之前，控件就已准备好显示数据。\n\
    \n为了演示特定视图事件何时被触发，我修改了 `ViewController` 类的源代码，添加了代码清单 2-5 中的方法。同样，这里有一个私有辅助方法\
    \ `DisplayInfo`，用于显示实际视图事件的名称。然后，我在以下五个视图事件处理程序中使用该方法：`ViewDidLoad`、`ViewWillAppear`、`ViewDidAppear`、`ViewWillDisappear`\
    \ 和 `ViewDidDisappear`。因此，我可以跟踪视图的生命周期。\n\n```\npublic override void ViewDidLoad()\n\
    {\n    base.ViewDidLoad();\n    DisplayInfo(\"ViewDidLoad\");\n}\npublic override\
    \ void ViewWillAppear(bool animated)\n{\n    base.ViewWillAppear(animated);\n\
    \    DisplayInfo(\"ViewWillAppear\");\n}\npublic override void ViewDidAppear(bool\
    \ animated)\n{\n    base.ViewDidAppear(animated);\n    DisplayInfo(\"ViewDidAppear\"\
    );\n}\npublic override void ViewWillDisappear(bool animated)\n{\n    base.ViewWillDisappear(animated);\n\
    \    DisplayInfo(\"ViewWillDisappear\");\n}\npublic override void ViewDidDisappear(bool\
    \ animated)\n{\n    base.ViewDidDisappear(animated);\n    DisplayInfo(\"ViewDidDisappear\"\
    );\n}\nprivate void DisplayInfo(string eventName)\n{\n    Debug.WriteLine($\"\
    View event: {eventName}\");\n}\n代码清单 2-5. 处理视图生命周期\n```\n\n请注意，为了使用 `Debug` 类，你需要导入\
    \ `System.Diagnostics` 命名空间，在文件头部添加以下语句：\n\n```\nusing System.Diagnostics;\n```\n\
    \n在模拟器中重新运行应用程序后，我们将在应用程序输出窗口中看到一系列应用程序和视图事件（图 2-3）。正如我们所预期的，第一个视图事件处理程序 `ViewDidLoad`\
    \ 在应用程序加载后立即被调用。然后，当视图加载完成后，会触发另外两个事件：`ViewWillAppear` 和 `ViewDidAppear`。你可以使用它们来实现视图在显示给用户之前的准备逻辑。\n\
    \n为了触发其他视图事件，即 `ViewWillDisappear` 和 `ViewDidDisappear`，我使用 iOS 的多任务功能终止了应用程序。因此，`ViewWillDisappear`\
    \ 和 `ViewDidDisappear` 事件在应用程序进入后台后立即被调用（参见图 2-3 中应用程序输出的底部几行）。\n\n![A453659_1_En_2_Fig3_HTML.jpg](img/A453659_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3. 应用程序输出，显示应用程序和视图生命周期连续步骤中触发的事件\n\n正如我将在本章后面展示的，`ViewWillDisappear` 和\
    \ `ViewDidDisappear` 被用于在视图消失时或消失后保存数据。\n\n## 信息属性列表\n\n到目前为止，我们只讨论了包含 C# 代码的文件。然而，HelloWorld\
    \ 项目还有其他几个 iOS 应用程序所需的文件。其中一个文件就是信息属性列表（`Info.plist`）。该文件定义了应用程序的配置。当你在解决方案资源管理器中双击此文件时，将会看到如图\
    \ 2-4 所示的编辑器。此编辑器包含以下选项卡，你可以使用它们来配置不同的选项：\n\n![A453659_1_En_2_Fig4_HTML.jpg](img/A453659_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4. Visual Studio 中的信息属性列表编辑器\n\n*   **应用程序** – 使用此选项卡指定以下内容：\n    *   **应用标识**：应用程序名称、绑定标识符和版本\n\
    \    *   **部署信息**：目标 iOS 版本、设备系列（iPhone、iPad 或通用）、定义应用程序用户界面的故事板名称（主界面）、可用的应用程序方向以及配置状态栏外观\n\
    \    *   **应用图标和启动图片**：用于指定图标集合的名称以及将在应用程序启动时显示的故事板名称——即所谓的启动或闪屏\n    *   **iTunes\
    \ 插图**\n    *   **启用 Game Center 和地图集成**以及配置**后台模式**。\n*   **高级** – 在此选项卡中，你可以配置应用程序将支持的文件的**文档类型**和**通用类型标识符\
    \ (UTI)**。文档类型（如 PDF）用于定义应用程序将支持的文件。另一方面，UTI 指的是自定义文件类型。你还可以使用“高级”选项卡为应用程序定义 URL\
    \ 方案。\n*   **源** – 此选项卡用于为应用程序定义自定义属性。此功能在访问 iOS 的特定功能（如设备的定位服务）时是必需的。\n\n## 授权属性列表\n\
    \n授权属性列表，定义在 `Entitlements.plist` 文件中，指定了应用程序的功能。当你打开此文件时，Visual Studio for Mac\
    \ 会激活如图 2-5 所示的编辑器。此编辑器有两个选项卡：应用程序和源。第一个选项卡是你可以启用的各种应用程序功能（如 iCloud 集成或推送通知）的图形化表示，而源选项卡则允许你定义自定义功能。\n\
    \n![A453659_1_En_2_Fig5_HTML.jpg](img/A453659_1_En_2_Fig5_HTML.jpg)\n\n图 2-5.\
    \ Visual Studio 中的授权属性列表编辑器\n"
- fmt: '# Launch Storyboard


    We have just seen that Information Property List allows us to specify the storyboard,
    which defines the launch screen. In the `HelloWorld` app, this storyboard is saved
    in `LaunchScreen.storyboard`. If you double-click this file in the Solution Explorer,
    the Visual Editor will open. This editor looks exactly the same as in the case
    of `Main.storyboard`, so you can define the Launch Screen in a similar manner.
    Let’s use this opportunity to add the Image View, which will display an image
    when the app is being loaded. To add the Image View, you first locate this object
    in the Toolbox and then drag it onto the rectangle, representing the device. Subsequently,
    you can rescale it, so it fills the whole view, and then define the image to display.
    To select this image, you use the Image property of the Image View (Figure [2-6](#A453659_1_En_2_Chapter.html#Fig6)).
    By default, this entry is empty, and when you click it a file browser appears.
    Use this browser to pick any image you want. If this file is outside the target
    directory, the Add New File dialog, shown in Figure [2-7](#A453659_1_En_2_Chapter.html#Fig7),
    will appear. iOS requires that all resources—the static files your app loads during
    runtime (like images)—should be stored under the `Resources` folder. Therefore,
    in the Add New File dialog, you need to choose the Copy option. An image file
    you selected will be then copied to the `Resources` subfolder of the `HelloWorld`
    app. Subsequently, the name of this file will appear in the drop-down list of
    the Image property (Figure [2-6](#A453659_1_En_2_Chapter.html#Fig6)).


    ![A453659_1_En_2_Fig7_HTML.jpg](A453659_1_En_2_Fig7_HTML.jpg)


    Figure 2-7. Adding a resource file


    ![A453659_1_En_2_Fig6_HTML.jpg](A453659_1_En_2_Fig6_HTML.jpg)


    Figure 2-6. Selected properties of the Image View


    The Image View has a very important property, Content Mode (refer back to Figure
    [2-6](#A453659_1_En_2_Chapter.html#Fig6)). It controls how the image will be rescaled
    to fit the bounds of the Image View. Content Mode can take one of the following
    values defined in `UIKit.UIViewContentMode`:


    * `ScaleToFill` – The image aspect ratio (a quotient of image width and height)
    will be adjusted to fill the whole area of the Image View.

    * `ScaleAspectFit` – The image will be rescaled to fit the Image View, but the
    image aspect ratio will be preserved.

    * `ScaleAspectFill` – The image will be rescaled and eventually cropped to fit
    the Image View.

    * `Redraw` – The Image View will be redisplayed when its size changes.

    * `Center`, `Top`, `Bottom`, `Left`, `Right`, `TopLeft`, `TopRight`, `BottomLeft`,
    `BottomRight` – These options define how the image will be aligned within the
    Image View.


    In this example, I set the Content Mode to `ScaleAspectFit`. This is seen as the
    Aspect Fit option in Figure [2-7](#A453659_1_En_2_Chapter.html#Fig7). In such
    a case, the aspect ratio of my image will not be changed, and therefore the image
    is located in the center of the screen, when the app is launching (Figure [2-8](#A453659_1_En_2_Chapter.html#Fig8)).


    ![A453659_1_En_2_Fig8_HTML.jpg](A453659_1_En_2_Fig8_HTML.jpg)


    Figure 2-8. Launch screen of the `HelloWorld` application


    # Storyboards Under the Hood


    A storyboard represents the whole user interface of an iOS app. In iOS, this user
    interface is composed of objects called scenes. A scene is the combination of
    a view controller and its associated views. The view controller displays and manages
    its views. In general, a storyboard can have multiple scenes (multiple view controllers
    and associated views). Transitions between these scenes are defined as segues.


    We already used storyboards to define simple views, and we used the view controller
    to handle events (like tapping buttons) and view lifecycle management. A view
    controller plays one of the most important roles in the iOS app, and therefore
    I used these two paragraphs to distinguish it from views, scenes, and segues.


    You may actually wonder how it is possible to visually define a storyboard from
    Visual Studio. It is possible because the storyboard is written in XML format.
    Such an approach makes the storyboard portable and platform-independent. So, a
    storyboard can be edited manually or visually using a variety of tools.


    ```

    Listing 2-6. Document Tag of Main.storyboard

    ```


    To see the actual XML definition of the storyboard, right-click the storyboard
    file (`Main.storyboard`) in the Solution Explorer and then choose Open With /
    Source Code Editor from the context menu. The source code of the storyboard will
    be displayed. By inspecting the contents of this file, we can easily note that
    it has the typical hierarchical form of the XML file. There is one root node,
    `xml`, and right after it you can find the `document` tag, the declaration of
    which looks like the one from Listing [2-6](#A453659_1_En_2_Chapter.html#Par53).
    We see that this tag has a number of attributes, which, in particular, specify
    the document type, its version, target runtime, and identifier of the initial
    view controller. In the `HelloWorld` app we have a single view controller, so
    we actually did not have to think about that. However, if an app has multiple
    view controllers, you can choose the initial one in the Visual Editor. You go
    there and then open the Properties window of the view controller. Subsequently,
    as Figure [2-9](#A453659_1_En_2_Chapter.html#Fig9) shows, you check the “Is Initial
    View Controller” checkbox. The value of the `initialViewController` attribute
    will be updated automatically. That’s why the `HelloWorld` app loads the `ViewController`
    as the first one. Consequently, its default view is presented after the app is
    launched.


    ![A453659_1_En_2_Fig9_HTML.jpg](A453659_1_En_2_Fig9_HTML.jpg)


    Figure 2-9. Properties of the View Controller. Note that “Is Initial View Controller”
    is checked, so a selected view associated with this view controller will appear
    as the first.'
