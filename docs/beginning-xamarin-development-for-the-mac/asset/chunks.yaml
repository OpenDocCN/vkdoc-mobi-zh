    # 6. Unit Testing


    Achieving high-quality apps is one of the most important and difficult tasks in
    software engineering, especially in mobile development. Mobile apps usually have
    a lot of competing solutions, and therefore to make your app successful you need
    to ensure that the app works correctly on various mobile devices. This requires
    you to repeat the same testing for your app on many devices, which can be a very
    long and expensive process. Unit, or automatic, testing is therefore not only
    another fancy tool for developers but also becomes a habit in software engineering.
    Automatic tests can be run right after code compilation as many times as needed
    to ensure that new features do not affect other project components. As a result,
    you can easily track app development and its maintenance. Automatic testing is
    not limited to validating the functionality of the logic layer but can also be
    utilized to test the user interface. More specifically, automatic UI tests synthesize
    user actions to interact with the visual components (or views) of the app exactly
    the same as a human would.


