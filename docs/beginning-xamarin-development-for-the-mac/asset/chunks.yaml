    {\nDisplayCityGeolocationController(City.NewYork);\n}\npartial void SanFranciscoItem_Tapped()\n\
    {\nDisplayCityGeolocationController(City.SanFrancisco);\n}\nListing 8-12. A Context\
    \ Is Passed to the CityGeolocationController\n```\n\n最后，我需要呈现地理坐标。为此，我修改了`CityGeolocationController.cs`文件，首先导入`CoreLocation`命名空间，然后修改`CityGeolocationController`类的定义（清单\
    \ 8-13）。我在该控制器的默认定义中补充了一个私有字段`location`、两个视图事件处理程序（`Awake`和`WillActivate`）以及一个私有方法`GetLocation`。后者用于从传递给界面控制器的上下文中获取`CLLocation`类的实例，并将结果对象存储在`location`字段中。为了访问上下文，我使用了`Awake`视图事件处理程序，并在其中调用`GetLocation`方法。随后，当界面控制器的视图即将呈现给用户时，我更改标签中显示的文本，使其呈现所选城市的纬度和经度。\n\
    \n要测试应用，请在 Apple Watch 模拟器中运行它。然后，将触摸压力改为深按（`COMMAND+SHIFT+2`）并按住模拟器屏幕片刻。这将启用先前在图\
    \ 8-12 中显示的菜单。现在，将触摸压力改为浅按（`COMMAND+SHIFT+1`）并点击其中一个项目。将呈现相应的地理坐标（图 8-12 的右侧部分）。\n\
    \n你现在可以轻松扩展此示例，并为`CityGeolocationController`的视图添加一个`Map`控件。给定地理坐标，你只需像我在第 3 章和第\
    \ 7 章中展示的那样设置地图中心和区域即可。\n\n```\npublic partial class CityGeolocationController\
    \ : WKInterfaceController\n{\nprivate CLLocation location;\npublic CityGeolocationController(IntPtr\
    \ handle) : base(handle)\n{\n}\npublic override void Awake(NSObject context)\n\
    {\nbase.Awake(context);\nGetLocation(context);\n}\npublic override void WillActivate()\n\
    {\nLabelLat.SetText(location.Coordinate.Latitude.ToString());\nLabelLng.SetText(location.Coordinate.Longitude.ToString());\n\
    }\nprivate void GetLocation(NSObject context)\n{\nlocation = context as CLLocation;\n\
    if (location == null)\n{\nlocation = LocationHelper.GetLocationForCity(\nCity.SanFrancisco);\n\
    }\n}\n}\nListing 8-13. Presenting Latitude and Longitude\n```\n\n## 通知控制器\n\n\
    通知实现了一种在应用未运行时向用户呈现新信息的机制。通常，远程通知是从云中运行的专用推送通知服务发送到移动或可穿戴终端设备的。通知也可以本地发送。在本节中，我们将学习如何在父\
    \ iOS 应用中创建本地通知。当 iPhone 锁定时，此通知将自动路由到 watchOS 应用。从 iOS 10 开始，Apple 引入了一种新的通知触发机制，该机制基于`UserNotifications`\
    \ API。用于触发本地通知的旧 API（适用于 iOS 8 和 iOS 9）在`UILocalNotification`类中实现。在本节中，我将使用`UserNotifications`\
    \ API。\n\n要使用此 API 触发本地通知，我使用 HelloWatchKit iOS 项目。首先，我打开故事板设计器，修改与默认视图控制器关联的视图，添加一个按钮。我打开此按钮的\
    \ Properties 面板，将按钮的标题设置为`Push notification`，名称设置为`ButtonLocalNotification`（图\
    \ 8-14）。之后，我打开 Events 选项卡为`TouchUpInside`事件创建处理程序。最后，我根据清单 8-14 定义此事件处理程序。此代码要求我导入`UserNotifications`命名空间。\n\
    \n![A453659_1_En_8_Fig14_HTML.jpg](img/A453659_1_En_8_Fig14_HTML.jpg)  \nFigure\
    \ 8-14. A UI of the HelloWatchKit iOS app and local notification in the iPhone\
    \ X simulator\n\n```\npartial void ButtonLocalNotification_TouchUpInside(UIButton\
    \ sender)\n{\n// Notification content\nvar notificationContent = new UNMutableNotificationContent()\n\
    {\nTitle = \"Hello\",\nBody = \"Local notification was fired\",\n};\n// Notification\
    \ will be fired after 10 seconds\nvar notificationTrigger = UNTimeIntervalNotificationTrigger.\n\
    CreateTrigger(10, false);\n// Notification request\nvar notificationRequest =\
    \ UNNotificationRequest.FromIdentifier(\nGuid.NewGuid().ToString(), notificationContent,\
    \ notificationTrigger);\nUNUserNotificationCenter.Current.AddNotificationRequest(\n\
    notificationRequest, null);\n}\nListing 8-14. Pushing a Local Notification\n```\n\
    \n如清单 8-14 所示，要创建本地通知，你需要使用`UNMutableNotificationContent`类。在这里，我使用默认构造函数实例化此类，然后使用`UNMutableNotificationContent`类的相应属性设置通知的标题和正文。随后，我使用`UNTimeIntervalNotificationTrigger`请求\
    \ iOS 在十秒后触发通知。最后，我使用`UNUserNotificationCenter`类将通知添加到用户通知中心。\n\n要允许你的应用发送本地通知，你还需要获取用户权限。为此，我打开\
    \ HelloWatchKit 的`AppDelegate.cs`文件，然后导入`UserNotifications`命名空间，并按照清单 8-15 所示修改`FinishedLaunching`事件处理程序。\n\
    \n你现在可以在任何 iPhone 模拟器中运行 HelloWatchKit 应用。该应用将显示一个警报，请求发送通知的权限。接受此警报，然后按下`Push\
    \ notification`按钮并锁定 iPhone 屏幕。要锁定模拟器，我在键盘上按下`COMMAND+L`。片刻之后，将呈现一个本地通知（图 8-14）。\n\
    \n```\npublic override bool FinishedLaunching(UIApplication application,\nNSDictionary\
    \ launchOptions)\n{\nUNUserNotificationCenter.Current.RequestAuthorization(\n\
    UNAuthorizationOptions.Alert, (approved, error) => {\n});\nreturn true;\n}\nListing\
    \ 8-15. Displaying a Notification in the watchOS App\n```\n"
