- fmt: '### `EncodeString` and `DecodeString` Helper Methods


    ```csharp

    private void EncodeString(NSCoder encoder,

    string property, string propertyKey)

    {

    var buffer = Encoding.UTF8.GetBytes(property);

    encoder.Encode(buffer, propertyKey);

    }

    private string DecodeString(NSCoder coder,

    string propertyKey)

    {

    var result = string.Empty;

    var bytes = coder.DecodeBytes(propertyKey);

    if(bytes != null)

    {

    result = Encoding.UTF8.GetString(bytes);

    }

    return result;

    }

    ```

    *Listing 2-11. Encoding and Decoding String Properties*


    The preceding methods are then utilized as shown in Listing [2-12](#A453659_1_En_2_Chapter.html#Par69).
    Namely, the `DecodeString` method is invoked within the `Person` class constructor.
    This constructor is exported as the `initWithCoder` Objective C initializer. This
    initializer is invoked automatically by the iOS runtime whenever you unarchive
    the object. A similar approach is used to encode an object. In such a case, you
    override the `EncodeTo` method, which comes from the `NCoding` class. This method
    is invoked when you archive the object. Therefore, in Listing [2-12](#A453659_1_En_2_Chapter.html#Par69)
    I use the `EncodeString` method to encode first and last name.


    ```csharp

    [Export("initWithCoder:")]

    public Person(NSCoder coder)

    {

    FirstName = DecodeString(coder, firstNameArchiveKey);

    LastName = DecodeString(coder, lastNameArchiveKey);

    }

    public override void EncodeTo(NSCoder encoder)

    {

    EncodeString(encoder, FirstName, firstNameArchiveKey);

    EncodeString(encoder, LastName, lastNameArchiveKey);

    }

    ```

    *Listing 2-12. Decoding and Encoding a Person object*


    To actually archive and unarchive an object, you use `NSKeyedArchiver` and `NSKeyedUnarchiver`,
    respectively. As Listing [2-13](#A453659_1_En_2_Chapter.html#Par71) shows, to
    archive an object in a file you use the `ArchiveRootObjectToFile` method of the
    `NSKeyedArchiver` class instance. Then, the object can be unarchived from the
    file with the `UnarchiveFile` method of the `NSKeyedUnarchiver`.


    ```csharp

    public void StoreValues()

    {

    NSKeyedArchiver.ArchiveRootObjectToFile(

    this, archiveLocation);

    }

    public void RestoreValues()

    {

    if (NSKeyedUnarchiver.UnarchiveFile(archiveLocation)

    is Person retrievedPersonData)

    {

    FirstName = retrievedPersonData.FirstName;

    LastName = retrievedPersonData.LastName;

    }

    }

    ```

    *Listing 2-13. Archiving and Unarchiving a Person Object*


    After implementing the `Person` class, I supplement a default view of the HelloWorld
    app with two text fields and two labels. To that end, I use a storyboard visual
    designer in which I drag and drop two `TextField` and two `Label` objects onto
    the view. Then, I rename the text fields to `TextFieldFirstName` and `TextFieldLastName`,
    respectively. Last, I change the captions of the labels to "First name:" and "Last
    name:" and position the controls as shown in Figure [2-11](#A453659_1_En_2_Chapter.html#Fig11).


    As the next step, I modify the `ViewController` class as follows. First, I instantiate
    a `Person` class with a default parameterless constructor, and then I implement
    two helper methods: `DisplayPersonData` and `StorePersonData`. These methods are
    depicted in Listing [2-14](#A453659_1_En_2_Chapter.html#Par74). `DisplayPersonData`
    retrieves a person object from the file and then displays its name in the view
    by rewriting properties of the `Person` class instance as `Text` properties of
    the `TextField` controls. `StorePersonData` works in the opposite order—it rewrites
    data from text fields as properties of the `Person` class and then stores them
    in the file.


    ```csharp

    private Person person = new Person();

    private void DisplayPersonData()

    {

    person.RestoreValues();

    TextFieldFirstName.Text = person.FirstName;

    TextFieldLastName.Text = person.LastName;

    }

    private void StorePersonData()

    {

    person.FirstName = TextFieldFirstName.Text;

    person.LastName = TextFieldLastName.Text;

    person.StoreValues();

    }

    ```

    *Listing 2-14. Storing and Restoring Person Data*


    Finally, I need to invoke `DisplayPersonData` and `StorePersonData`, when the
    view appears and disappears, respectively. To that end, I employ corresponding
    view event handlers (Listing [2-15](#A453659_1_En_2_Chapter.html#Par76)).


    ```csharp

    public override void ViewWillAppear(bool animated)

    {

    base.ViewWillAppear(animated);

    DisplayInfo("ViewWillAppear");

    DisplayPersonData();

    }

    public override void ViewWillDisappear(bool animated)

    {

    base.ViewWillDisappear(animated);

    DisplayInfo("ViewWillDisappear");

    StorePersonData();

    }

    ```

    *Listing 2-15. Utilizing View Lifecycle to Display and Store Person Data*


    Now, when you run the app you can type any values into the two text fields. After
    closing the app and re-running it, you will see that these values are restored
    and displayed again in the UI.


    ## Summary


    In this chapter, you learned about app structure and lifecycle. You became more
    knowledgeable about the app entry point, the role of the `AppDelegate` class,
    and how you can define app properties and capabilities. We learned about the launch
    storyboard, and I described the internal structure of the main storyboard. Finally,
    we delved into the Model View Controller design pattern and used it, along with
    the view lifecycle, to persist data in a device’s memory.


    # 3. Views


    Fueled by knowledge about the iOS app structure, available project templates,
    and the app lifecycle, we can move forward to learn about creating complex views.
    We will start by learning how to use several basic controls, like switch or slider,
    and then investigate advanced controls, like table views, web views, and map views.
    Specifically, we will learn how to use tables to display collections of data.
    Web view will be utilized to render interactive web pages (Google Maps) in Xamarin.iOS
    apps. Lastly, we will use the map view to present a native iOS map. In this chapter,
    we will also learn how to define adaptive views, which automatically adjust to
    screens of various sizes and also to device orientation.


    The name of almost every iOS control ends with "view"; for instance, Table View
    or Map View. Therefore, to save space I will quite often refer to them as table
    or map instead of using the fully qualified name.'
