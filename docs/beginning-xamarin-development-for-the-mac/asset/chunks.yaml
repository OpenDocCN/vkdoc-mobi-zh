  trans: "\n# 文本输入\n\n从手表应用收集用户输入比从 iOS 应用更具挑战性，因为手表的屏幕小得多，且用户通常希望快速交互。因此，WatchKit\
    \ 提供了专用的文本输入控制器，用于在 watchOS 上收集用户输入。如图 8-10 所示，该控制器以模态窗口的形式出现，包含一个预定义的建议值列表。此外，根据控制器配置的不同，你可以收集用户输入的**表情符号**、语音指令或手写内容。\n\
    \n![A453659_1_En_8_Fig10_HTML.jpg](img/A453659_1_En_8_Fig10_HTML.jpg)\n\n图 8-10.\
    \ 文本输入控制器的外观示例\n\n```\npartial void ButtonInput_Activated()\n{\nvar colors = new\
    \ string[]\n{\n\"Red\", \"Green\", \"Blue\", \"Orange\", \"Purple\"\n};\nPresentTextInputController(colors,\n\
    WKTextInputMode.AllowEmoji, DisplayUserResponse);\n}\n```\n\n代码清单 8-8. 使用 `TextInputController`\
    \ 收集用户输入\n\n为了演示如何使用文本输入控制器，我修改了 `HelloWatchKit.Watch` 应用下定义的第一个场景。具体来说，我添加了一个分隔线、一个按钮和一个标签。我将它们的水平和垂直对齐方式设置为居中。然后，我将按钮和标签的名称分别改为\
    \ `ButtonInput` 和 `LabelAnswer`。最后，我双击该按钮。这会创建一个默认的事件处理程序 `ButtonInput_Activated`，我按代码清单\
    \ 8-8 所示定义它。在 `ButtonInput_Activated` 事件处理程序中，我首先创建一个字符串数组，作为文本输入控制器中的预定义输入或建议列表。然后，我通过调用\
    \ `PresentTextInputController` 方法向用户展示该控制器，该方法在 `WKInterfaceController` 类中实现，并接受三个参数：\n\
    \n* `suggestions` – 一个字符串数组，包含显示在模态窗口中的预定义项。\n* `inputMode` – 指定输入类型，由 `WKTextInputMode`\
    \ 枚举中声明的值之一描述：\n  * `AllowEmojiAnimated` 和 `AllowEmoji` – 分别表示允许动态或静态表情符号。\n \
    \ * `Plain` – 表示不允许使用表情符号。\n* `completion` – 用户关闭控制器后调用的一个操作。\n\n在代码清单 8-8 中，我允许静态表情符号，并使用\
    \ `DisplayUserResponse` 操作作为完成处理程序。如代码清单 8-9 所示，`DisplayUserResponse` 方法显示从文本输入控制器检索到的第一个项目，并将其显示在名称为\
    \ `LabelAnswer` 的标签中。文本输入控制器返回用户所选项目的集合，该集合作为 `NSArray` 对象的实例提供，然后传递给完成处理程序。\n\
    \n```\nprivate void DisplayUserResponse(NSArray result)\n{\nvar answer = \"No\
    \ answer\";\nif (result != null)\n{\nif (result.Count > 0)\n{\nanswer = result.GetItem(0).ToString();\n\
    }\n}\nLabelAnswer.SetText(answer);\n}\n```\n\n代码清单 8-9. 展示用户选择的项目\n\n重新运行应用后，你可以按下按钮激活文本输入控制器。它的外观将如图\
    \ 8-10 之前所示。尝试点击其中一个建议值（颜色）或表情符号。你会看到文本输入控制器被关闭，并且所选值显示在底部标签中（图 8-11）。\n\n![A453659_1_En_8_Fig11_HTML.jpg](img/A453659_1_En_8_Fig11_HTML.jpg)\n\
    \n图 8-11. 显示通过文本输入控制器收集到的用户输入\n\n# 强制触摸与导航\n\nApple Watch 配备了**强制触摸**传感器，可以检测你按压屏幕的力度。强制触摸也被定义为一种额外的手势。你可以使用它来扩展应用与用户交互的方式。在本节中，我们将学习如何使用强制触摸来激活一个包含城市名称列表的菜单。点击菜单项后，将显示另一个界面控制器。该控制器将显示所选城市的地理位置（图\
    \ 8-12）。\n\n![A453659_1_En_8_Fig12_HTML.jpg](img/A453659_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12. 强制触摸手势激活菜单，其中包含一个城市列表。当你点击某个项目时，会显示另一个视图。该视图显示所选城市的**地理坐标**。\n\n为了实现此功能，我打开\
    \ `Interface.storyboard`，从工具箱中向代表默认场景的界面控制器添加一个菜单。该菜单出现在文档大纲面板中界面控制器项目之下。我点击该条目，然后在属性面板中将菜单项数量从\
    \ 1 改为 2。这样就创建了两个菜单项。为了配置它们，我使用属性面板，在菜单项组下设置标题和图像属性如下（图 8-13）：\n\n![A453659_1_En_8_Fig13_HTML.jpg](img/A453659_1_En_8_Fig13_HTML.jpg)\n\
    \n图 8-13. 显示第一个菜单项配置的属性面板\n\n* 第一个菜单项：**New York** 和 **More**\n* 第二个菜单项：**San\
    \ Francisco** 和 **Maybe**\n\n然后，我为每个菜单项声明操作事件，当用户点击每个菜单项时将调用这些事件。为此，我使用属性面板的事件选项卡，在事件处理方法名称字段中输入方法名并按回车键（参见图\
    \ 8-13 右侧部分）。Visual Studio 随后会询问我选择代码中的位置来插入事件处理程序的空定义。我将这些事件处理程序的名称分别设置为 `NewYorkItem_Tapped`\
    \ 和 `SanFranciscoItem_Tapped`。在定义这些事件处理程序之前，我回到 iOS 设计器，向故事板中添加新的界面控制器。使用该控制器的属性面板，我将它的类和标识符改为\
    \ `CityGeolocationController`。然后，我为这个界面控制器的视图补充三个标签。我将这些标签垂直和水平居中，并按图 8-12 所示堆叠它们。接着，我将第一个标签的\
    \ `Text` 属性设置为 `Geolocation:`，并将另外两个标签的名称分别更新为 `LabelLat` 和 `LabelLng`。\n\n鉴于\
    \ UI 现已就绪并配置完成，我可以实现逻辑了。我首先向 `HelloWatchKit.WatchExtension` 项目添加一个新文件 `LocationHelper.cs`。在这个新文件中，我导入\
    \ `CoreLocation` 命名空间，然后定义一个静态类 `LocationHelper` 和一个自定义枚举 `City`，如代码清单 8-10 所示。\n\
    \n```\npublic static class LocationHelper\n{\npublic static CLLocation GetLocationForCity(City\
    \ city)\n{\nCLLocation result = null;\nswitch(city)\n{\ncase City.NewYork:\nresult\
    \ = new CLLocation(40.7127837, -74.0059413);\nbreak;\ncase City.SanFrancisco:\n\
    default:\nresult = new CLLocation(37.77493, -122.419416);\nbreak;\n}\nreturn result;\n\
    }\n}\npublic enum City\n{\nNewYork, SanFrancisco\n}\n```\n\n代码清单 8-10. `LocationHelper`\
    \ 类和自定义枚举 `City` 的定义\n\n`LocationHelper` 实现了一个静态方法 `GetLocationForCity`，该方法接受一个名为\
    \ `city` 且类型为 `City` 的参数。`City` 是定义了 `NewYork` 和 `SanFrancisco` 元素的枚举。根据 `city`\
    \ 参数的不同，`GetLocationForCity` 将返回 `CoreLocation.CLLocation` 类的一个实例，该实例存储了纽约或旧金山的地理坐标。我是从\
    \ Google 地理编码 API 获取这些地理坐标的。\n"
- fmt: "### 修改类定义\n\n接下来，我打开`InterfaceController.cs`文件，修改`InterfaceController`类的定义。首先，我添加了`DisplayCityGeolocationController`方法，如[清单8-11](#A453659_1_En_8_Chapter.html#Par69)所示。该方法从`LocationHelper`获取地理坐标，然后将其传递给`CityGeolocationController`，后者通过`PushController`方法进行初始化和呈现。该方法接受两个参数，如下所示：\n\
    \n- `name` – 指定要显示的界面控制器的名称\n- `context` – 可选参数，用于向目标界面控制器传递对象\n\n在这里，我将名称设置为`CityGeolocationController`，并将从`LocationHelper`获取的`CCLocation`类的实例作为上下文传递。\n\
    \n```\nprivate void DisplayCityGeolocationController(City city)\n{\nvar location\
    \ = LocationHelper.GetLocationForCity(city);\nPushController(\"CityGeolocationController\"\
    , location);\n}\nListing 8-11. Presenting the CityGeolocationController with Geocordinates\
    \ to Be Displayed\n```\n\n然后，我使用`DisplayCityGeolocationController`方法来实现与菜单项关联的事件处理程序，如[清单8-12](#A453659_1_En_8_Chapter.html#Par71)所示。因此，新的界面控制器将根据用户的选择获得不同的地理坐标。\n\
    \n```\npartial void NewYorkItem_Tapped()\n{\nDisplayCityGeolocationController(City.NewYork);\n\
    }\npartial void SanFranciscoItem_Tapped()\n{\nDisplayCityGeolocationController(City.SanFrancisco);\n\
    }\nListing 8-12. A Context Is Passed to the CityGeolocationController\n```\n\n\
    最后，我需要呈现地理坐标。为此，我修改了`CityGeolocationController.cs`文件，首先导入`CoreLocation`命名空间，然后修改`CityGeolocationController`类的定义（[清单8-13](#A453659_1_En_8_Chapter.html#Par75)）。我在该控制器的默认定义中补充了一个私有字段`location`、两个视图事件处理程序（`Awake`和`WillActivate`）以及一个私有方法`GetLocation`。后者用于从传递给界面控制器的上下文中获取`CLLocation`类的实例，并将结果对象存储在`location`字段中。为了访问上下文，我使用了`Awake`视图事件处理程序，并在其中调用`GetLocation`方法。随后，当界面控制器的视图即将呈现给用户时，我更改标签中显示的文本，使其呈现所选城市的纬度和经度。\n\
    \n要测试应用，请在 Apple Watch 模拟器中运行它。然后，将触摸压力改为深按（`COMMAND+SHIFT+2`）并按住模拟器屏幕片刻。这将启用先前在图[8-12](#A453659_1_En_8_Chapter.html#Fig12)中显示的菜单。现在，将触摸压力改为浅按（`COMMAND+SHIFT+1`）并点击其中一个项目。将呈现相应的地理坐标（图[8-12](#A453659_1_En_8_Chapter.html#Fig12)的右侧部分）。\n\
    \n你现在可以轻松扩展此示例，并为`CityGeolocationController`的视图添加一个`Map`控件。给定地理坐标，你只需像我在第[3](#A453659_1_En_3_Chapter.html)章和第[7](#A453659_1_En_7_Chapter.html)章中展示的那样设置地图中心和区域即可。\n\
    \n```\npublic partial class CityGeolocationController : WKInterfaceController\n\
    {\nprivate CLLocation location;\npublic CityGeolocationController(IntPtr handle)\
    \ : base(handle)\n{\n}\npublic override void Awake(NSObject context)\n{\nbase.Awake(context);\n\
    GetLocation(context);\n}\npublic override void WillActivate()\n{\nLabelLat.SetText(location.Coordinate.Latitude.ToString());\n\
    LabelLng.SetText(location.Coordinate.Longitude.ToString());\n}\nprivate void GetLocation(NSObject\
    \ context)\n{\nlocation = context as CLLocation;\nif (location == null)\n{\nlocation\
    \ = LocationHelper.GetLocationForCity(\nCity.SanFrancisco);\n}\n}\n}\nListing\
    \ 8-13. Presenting Latitude and Longitude\n```\n\n## Notification Controller\n\
    \n通知实现了一种在应用未运行时向用户呈现新信息的机制。通常，远程通知是从云中运行的专用推送通知服务发送到移动或可穿戴终端设备的。通知也可以本地发送。在本节中，我们将学习如何在父\
    \ iOS 应用中创建本地通知。当 iPhone 锁定时，此通知将自动路由到 watchOS 应用。从 iOS 10 开始，Apple 引入了一种新的通知触发机制，该机制基于`UserNotifications`\
    \ API。用于触发本地通知的旧 API（适用于 iOS 8 和 iOS 9）在`UILocalNotification`类中实现。在本节中，我将使用`UserNotifications`\
    \ API。\n\n要使用此 API 触发本地通知，我使用 HelloWatchKit iOS 项目。首先，我打开故事板设计器，修改与默认视图控制器关联的视图，添加一个按钮。我打开此按钮的\
    \ Properties 面板，将按钮的标题设置为`Push notification`，名称设置为`ButtonLocalNotification`（图[8-14](#A453659_1_En_8_Chapter.html#Fig14)）。之后，我打开\
    \ Events 选项卡为`TouchUpInside`事件创建处理程序。最后，我根据[清单8-14](#A453659_1_En_8_Chapter.html#Par78)定义此事件处理程序。此代码要求我导入`UserNotifications`命名空间。\n\
    \n![A453659_1_En_8_Fig14_HTML.jpg](A453659_1_En_8_Fig14_HTML.jpg)  \nFigure 8-14.\
    \ A UI of the HelloWatchKit iOS app and local notification in the iPhone X simulator\n\
    \n```\npartial void ButtonLocalNotification_TouchUpInside(UIButton sender)\n{\n\
    // Notification content\nvar notificationContent = new UNMutableNotificationContent()\n\
    {\nTitle = \"Hello\",\nBody = \"Local notification was fired\",\n};\n// Notification\
    \ will be fired after 10 seconds\nvar notificationTrigger = UNTimeIntervalNotificationTrigger.\n\
    CreateTrigger(10, false);\n// Notification request\nvar notificationRequest =\
    \ UNNotificationRequest.FromIdentifier(\nGuid.NewGuid().ToString(), notificationContent,\
    \ notificationTrigger);\nUNUserNotificationCenter.Current.AddNotificationRequest(\n\
    notificationRequest, null);\n}\nListing 8-14. Pushing a Local Notification\n```\n\
    \n如[清单8-14](#A453659_1_En_8_Chapter.html#Par78)所示，要创建本地通知，你需要使用`UNMutableNotificationContent`类。在这里，我使用默认构造函数实例化此类，然后使用`UNMutableNotificationContent`类的相应属性设置通知的标题和正文。随后，我使用`UNTimeIntervalNotificationTrigger`请求\
    \ iOS 在十秒后触发通知。最后，我使用`UNUserNotificationCenter`类将通知添加到用户通知中心。\n\n要允许你的应用发送本地通知，你还需要获取用户权限。为此，我打开\
    \ HelloWatchKit 的`AppDelegate.cs`文件，然后导入`UserNotifications`命名空间，并按照[清单8-15](#A453659_1_En_8_Chapter.html#Par82)所示修改`FinishedLaunching`事件处理程序。\n\
    \n你现在可以在任何 iPhone 模拟器中运行 HelloWatchKit 应用。该应用将显示一个警报，请求发送通知的权限。接受此警报，然后按下`Push\
    \ notification`按钮并锁定 iPhone 屏幕。要锁定模拟器，我在键盘上按下`COMMAND+L`。片刻之后，将呈现一个本地通知（图[8-14](#A453659_1_En_8_Chapter.html#Fig14)）。\n\
    \n```\npublic override bool FinishedLaunching(UIApplication application,\nNSDictionary\
    \ launchOptions)\n{\nUNUserNotificationCenter.Current.RequestAuthorization(\n\
    UNAuthorizationOptions.Alert, (approved, error) => {\n});\nreturn true;\n}\nListing\
    \ 8-15. Displaying a Notification in the watchOS App\n```"
  raw: 'As a next step, I open the `InterfaceController.cs` file, where I modify the
    definition of the `InterfaceController` class. First, I add the `DisplayCityGeolocationController`
    method seen in Listing [8-11](#A453659_1_En_8_Chapter.html#Par69). This method
    obtains geocoordinates from the `LocationHelper` and then passes them to the `CityGeolocationController`
    , which is initialized and presented with the `PushController` method. This method
    accepts two arguments, as follows:


    *   `name` – specifies the name of the interface controller to display

    *   `context` – optional argument you use to pass an object to the target interface
    controller


    Here, I set the name to `CityGeolocationController`, and as a context I pass an
    instance of the `CCLocation` class obtained from the `LocationHelper`.


    ```

    private void DisplayCityGeolocationController(City city)

    {

    var location = LocationHelper.GetLocationForCity(city);

    PushController("CityGeolocationController", location);

    }

    Listing 8-11.

    Presenting the CityGeolocationController with Geocordinates to Be Displayed

    ```


    Then, I use the `DisplayCityGeolocationController` method to implement event handlers
    associated with menu items, as shown in Listing [8-12](#A453659_1_En_8_Chapter.html#Par71).
    So, the new interface controller will be fed with different geocoordinates, depending
    on the user’s choice.


    ```

    partial void NewYorkItem_Tapped()

    {

    DisplayCityGeolocationController(City.NewYork);

    }

    partial void SanFranciscoItem_Tapped()

    {

    DisplayCityGeolocationController(City.SanFrancisco);

    }

    Listing 8-12.

    A Context Is Passed to the CityGeolocationController

    ```


    Finally, I need to present geocoordinates. To that end, I modify the `CityGeolocationController.cs`
    file , where I first import the `CoreLocation` namespace and then modify a definition
    of the `CityGeolocationController` class (Listing [8-13](#A453659_1_En_8_Chapter.html#Par75)).
    I supplement a default definition of this controller with a private field, `location`,
    two view event handlers (`Awake` and `WillActivate`), and one private method,
    `GetLocation`. The latter is used to obtain an instance of the `CLLocation` class
    from the context passed to the interface controller and store the resulting object
    in the `location` field. To access the context, I use the `Awake` view event handler,
    where I invoke the `GetLocation` method. Subsequently, when the view of the interface
    controller is about to be presented to the user, I change the text displayed in
    the labels such that they present latitude and longitude for the selected city.


    To test the app, run it in the Apple Watch simulator. Then, change the touch pressure
    to deep press (COMMAND+SHIFT+2) and hold the screen of the simulator for a short
    while. This enables the menu shown previously in Figure [8-12](#A453659_1_En_8_Chapter.html#Fig12).
    Now, change the touch pressure to shallow press (COMMAND+SHIFT+1) and tap one
    of the items. The corresponding geocoordinates will be presented (right part of
    Figure [8-12](#A453659_1_En_8_Chapter.html#Fig12)).


    You can now easily extend this example and add a `Map` control to the view of
    the `CityGeolocationController`. Given the geocoordinate all you need to do is
    to set the map center and region just as I showed you in Chapters [3](#A453659_1_En_3_Chapter.html)
    and [7](#A453659_1_En_7_Chapter.html).


    ```

    public partial class CityGeolocationController : WKInterfaceController

    {

    private CLLocation location;

    public CityGeolocationController(IntPtr handle) : base(handle)

    {

    }

    public override void Awake(NSObject context)

    {

    base.Awake(context);

    GetLocation(context);

    }

    public override void WillActivate()

    {

    LabelLat.SetText(location.Coordinate.Latitude.ToString());

    LabelLng.SetText(location.Coordinate.Longitude.ToString());

    }

    private void GetLocation(NSObject context)

    {

    location = context as CLLocation;

    if (location == null)

    {

    location = LocationHelper.GetLocationForCity(

    City.SanFrancisco);

    }

    }

    }

    Listing 8-13.

    Presenting Latitude and Longitude

    ```


    ## Notification Controller


    Notifications implement a mechanism to present new information to the user when
    the app is not running. Typically, remote notifications are sent to the mobile
    or wearable end-points from a dedicated push notification service running in the
    cloud. Notifications can be also sent locally. In this section, we will learn
    how to create a local notification in the parent iOS app. This notification will
    be automatically routed to the watchOS app when the iPhone is locked. Starting
    from iOS 10, Apple introduced a new mechanism for raising notifications. This
    is based on the UserNotifications API. An older API for raising local notifications
    (available for iOS 8 and iOS 9) is implemented within the `UILocalNotification`
    class. In this section, I will use the UserNotifications API.


    To raise a local notification with this API, I use the HelloWatchKit iOS project.
    First, I open the storyboard designer and modify the view associated with the
    default view controller to add a button. I open the Properties pad of this button,
    where I set the button’s caption to Push notification and name to `ButtonLocalNotification`
    (Figure [8-14](#A453659_1_En_8_Chapter.html#Fig14)). Afterward, I open the Events
    tab to create the handler for the `TouchUpInside` event. Finally, I define this
    event handler according to Listing [8-14](#A453659_1_En_8_Chapter.html#Par78).
    This code requires me to import the `UserNotifications` namespace.


    ![A453659_1_En_8_Fig14_HTML.jpg](A453659_1_En_8_Fig14_HTML.jpg)


    Figure 8-14.


    A UI of the HelloWatchKit iOS app and local notification in the iPhone X simulator


    ```

    partial void ButtonLocalNotification_TouchUpInside(UIButton sender)

    {

    // Notification content

    var notificationContent = new UNMutableNotificationContent()

    {

    Title = "Hello",

    Body = "Local notification was fired",

    };

    // Notification will be fired after 10 seconds

    var notificationTrigger = UNTimeIntervalNotificationTrigger.

    CreateTrigger(10, false);

    // Notification request

    var notificationRequest = UNNotificationRequest.FromIdentifier(

    Guid.NewGuid().ToString(), notificationContent, notificationTrigger);

    UNUserNotificationCenter.Current.AddNotificationRequest(

    notificationRequest, null);

    }

    Listing 8-14.

    Pushing a Local Notification

    ```


    As shown in Listing [8-14](#A453659_1_En_8_Chapter.html#Par78), to create a local
    notification you use the `UNMutableNotificationContent` class. Here, I instantiate
    this class using a default constructor and then set the title and body of the
    notification using the corresponding properties of the `UNMutableNotificationContent`
    class. Subsequently, I request that the iOS fire the notification after ten seconds
    using `UNTimeIntervalNotificationTrigger`. Finally, I add the notification to
    the user notification center using the `UNUserNotificationCenter` class.


    To enable your app to send local notifications, you also need to obtain user permission.
    To do so, I open the `AppDelegate.cs` file of the HelloWatchKit. Then, I import
    the `UserNotifications` namespace and modify the `FinishedLaunching` event handler
    as shown in Listing [8-15](#A453659_1_En_8_Chapter.html#Par82).


    You can now run the HelloWatchKit app in any iPhone simulator. The app will display
    an alert requesting permission to send notifications. Accept this alert, then
    press the Push notification button and lock the iPhone screen. To lock the simulator,
    I press COMMAND+L on the keyboard. After a short while, a local notification will
    be presented (Figure [8-14](#A453659_1_En_8_Chapter.html#Fig14)).


    ```

    public override bool FinishedLaunching(UIApplication application,

    NSDictionary launchOptions)

    {

    UNUserNotificationCenter.Current.RequestAuthorization(

    UNAuthorizationOptions.Alert, (approved, error) => {

    });

    return true;

    }

    Listing 8-15.

    Displaying a Notification in the watchOS App

    ```'
