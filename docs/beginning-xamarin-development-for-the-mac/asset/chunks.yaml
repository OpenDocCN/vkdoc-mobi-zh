    If the user provides a valid city name , `ButtonGetCurrentWeather_PrimaryActionTriggered`
    sends a request to the OpenWeatherMap API using the `WeatherServiceHelper.GetWeatherInfo`
    method. This function returns an instance of the `WeatherInfo` class, which is
    afterward passed to the `DisplayWeatherInfo` method to update the UI with the
