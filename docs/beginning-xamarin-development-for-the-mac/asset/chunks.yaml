    To encode and decode string properties, I defined two methods in the `Person`
    class. Definitions of both methods appear in Listing [2-11](#A453659_1_En_2_Chapter.html#Par67).
    Let’s see how the first method, `EncodeString`, works. This method invokes an
    `Encode` method of the `Foundation.NSCoder` class. `NSCoder.Encode` has several
    overloaded methods, which encode variables of several simple types. However, none
    of them can encode strings. Therefore, I had to convert a string to a byte array
    using the `System.Text.Encoding` class. Specifically, I use the `GetBytes` method
    of the UTF8 encoding. Then, I pass the result of this method to `NSCoder.Encode`
    along with the key used to identify the encoded value. The `DecodeString` method
    works in a reverse order. First, it uses a coder to retrieve the byte stream of
    the previously encoded value. Second, this byte stream is converted to a string
    with the `UTF8.GetString` method.'
