    ## ClockKit 和复杂功能控制器


    `ClockKit` 是一组类和方法，用于创建复杂功能。这些是出现在表盘上的视觉元素。复杂功能在某种程度上类似于通知，但以一种比通知更不具侵入性的方式，让用户访问应用提供的重要数据。要创建复杂功能，需要使用复杂功能控制器，该控制器已添加到
    Watch 扩展包中。该控制器的定义存储在 `ComplicationController.cs` 文件中。打开此文件，你会看到 `ComplicationController`
    类派生自 `CLKComplicationDataSource`。后者来自 `ClockKit` 框架，并且是实现复杂功能的关键要素。具体来说，你在派生类中重写
    `CLKComplicationDataSource` 中的方法，以控制复杂功能的外观。你至少需要实现以下方法：


    *   `GetPlaceholderTemplate` – 为你的复杂功能提供一个视觉模板。`ClockKit` 使用此方法的结果在用户配置期间显示复杂功能的示例外观。你通常会使用伪造数据来创建此类模板，以使用户了解复杂功能的外观。此方法仅适用于
    watchOS 2。

    *   `GetLocalizableSampleTemplate` – 功能与 `GetPlaceholderTemplate` 类似，区别在于 `ClockKit`
    使用它来获取可本地化（依赖于语言）的复杂功能模板。此方法仅适用于 watchOS 3 或更高版本。

    *   `GetCurrentTimelineEntry` – `ClockKit` 使用此方法获取复杂功能的实际数据。

    *   `GetSupportedTimeTravelDirections` – 通知 `ClockKit` 你的应用是否可以为复杂功能提供未来或过去的数据条目。


    因为 `ClockKit` 会调用上述方法，所以你需要通过回调将数据返回给该框架。也就是说，这些方法中的每一个都接受两个参数。第一个参数 `complication`
    是 `CLKComplication` 类的一个实例，是复杂功能的抽象表示。另一个参数 `handler` 是你调用的操作（回调），用于传递复杂功能的数据。你通常使用
    `CLKComplication` 类的实例，通过读取其 `Family` 属性来推断复杂功能的类型。根据此类型，你执行自定义逻辑，并最终调用 `handler`，在其中为
    `ClockKit` 传递数据。让我们看看这在实践中是如何工作的。为此，我通过清单 [8-16](#A453659_1_En_8_Chapter.html#Par91)
    中所示的方法，扩展了来自 `HelloWatchKit.WatchExtension` 应用的 `ComplicationController` 类的定义。


    ```csharp

    private CLKComplicationTemplate CreateComplicationTemplate(

    CLKComplicationFamily complicationFamily, string complicationText)

    {

    CLKComplicationTemplate template = null;

    switch (complicationFamily)

    {

    case CLKComplicationFamily.ModularSmall:

    template = new CLKComplicationTemplateModularSmallRingText()

    {

    TextProvider = CLKSimpleTextProvider.FromText(complicationText),

    FillFraction = 0.75f,

    RingStyle = CLKComplicationRingStyle.Open

    };

    break;

    case CLKComplicationFamily.ModularLarge:

    template = new CLKComplicationTemplateModularLargeStandardBody()

    {

    HeaderTextProvider = CLKSimpleTextProvider.

    FromText("My Complication"),

    Body1TextProvider = CLKSimpleTextProvider.

    FromText(complicationText),

    Body2TextProvider = CLKTimeTextProvider.

    FromDate(NSDate.Now)

    };

    break;

    }

    return template;

    }

    ```

    清单 8-16. 创建复杂功能模板'
