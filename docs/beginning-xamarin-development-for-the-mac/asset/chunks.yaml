    ### Google Geocoding API


    在之前的示例中，我使用了纽约市的地理坐标。如果你想为其他位置显示地图，则需要知道其地理坐标。要查找任意地址的地理坐标，可以使用 Google Geocode
    服务。这是一种将地址转换为地理坐标（纬度和经度）的网络服务。要使用地理编码，请在浏览器中键入以下 URL（可以将`New York`替换为其他任意值）：


    [`https://maps.googleapis.com/maps/api/geocode/json?address=New+York`](https://maps.googleapis.com/maps/api/geocode/json?address=New+York)


    作为响应，Geocoding API 会返回描述你地址的 JSON 文件。该描述是一个键值对数组，其中存储了地址组件或几何信息等多个对象。特别是，地址的位置信息保存在
    `location` 键下。在此，该键关联着以下地理坐标——`lat`：`40.7127837` 和 `lng`：`-74.0059413`。我使用这些值生成了图
    3-7 的截图。参见代码清单 3-20。


