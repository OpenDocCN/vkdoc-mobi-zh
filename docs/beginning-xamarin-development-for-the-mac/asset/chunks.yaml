- fmt: "### AlertViewController\n\nWe are now ready to replace the default definition\
    \ of the `ButtonAlert_TouchUpInside` event handler we created in the previous\
    \ subsection. The logic we implement will display a native alert window that will\
    \ present the \"Hello, Xamarin.iOS!\" message. To display such an alert, you first\
    \ create and configure an instance of the `UIAlertViewController` class and then\
    \ show it to the user with the `PresentViewController` method. A complete example\
    \ appears in Listing 1-2.\n\n```\nprivate const string title = \"Apress\";\nprivate\
    \ const string message = \"Hello, Xamarin.iOS!\";\npartial void ButtonAlert_TouchUpInside(UIButton\
    \ sender)\n{\nvar alertController = UIAlertController.Create(\ntitle, message,\
    \ UIAlertControllerStyle.Alert);\nPresentViewController(alertController, false,\
    \ null);\n}\n```\n\n*Listing 1-2. Creating and Displaying an Alert Window*\n\n\
    To create an instance of the `UIAlertController` class I use its `Create` static\
    \ method. This method accepts three arguments: `title`, `message`, and `UIAlertControllerStyle`.\
    \ The purpose of the first two arguments is rather obvious. They specify the title\
    \ and the message of the alert. The last argument, `UIAlertControllerStyle`, is\
    \ the enumeration you use to define the alert style. You can choose between `Alert`\
    \ or `ActionSheet`. Here, I set the alert style to `UIAlertControllerStyle.Alert`.\
    \ In the next subsection, I will create the action sheet, and, therefore, I saved\
    \ `title` and `message` in corresponding fields of the `ViewController` class.\n\
    \nTo display an alert, I use `PresentViewController`, which is implemented within\
    \ the `UIViewController` class, the base class of the `ViewController` class associated\
    \ with a default view of the HelloWorld app. As shown in Listing 1-2, the `PresentViewController`\
    \ method accepts the following three arguments:\n\n- `viewControllerToPresent`\
    \ is the object, deriving from the `UIViewController` class, representing a view\
    \ controller to be presented.\n- `animated` indicates whether the view controller\
    \ should be presented with animation or not.\n- `completionHandler` is the action\
    \ to be executed after animation is done.\n\nYou can now test the preceding solution\
    \ in the device emulator. To run the app, click the Play button in the Debug toolbar\
    \ (Figure 1-22). This toolbar is located inside the top pane of Visual Studio.\
    \ You use the Target toolbar not only to run the app but also to set configuration\
    \ (Debug or Release) and choose target device. Here, I set the target device to\
    \ iPhone 8 with iOS 11.0, but you can choose any other simulator. For instance,\
    \ to create screenshots from Figure 1-1 I used iPhone X simulator.\n\n![A453659_1_En_1_Fig22_HTML.jpg](A453659_1_En_1_Fig22_HTML.jpg)\n\
    \n*Figure 1-22. A target toolbar*\n\nWhen you press the Play button it changes\
    \ to a Stop button, and the device simulator will be started. Subsequently, the\
    \ HelloWorld app will be executed (Figure 1-23), so you can click the \"Hello,\
    \ World!\" Button. As a result, the alert will be displayed (right part of Figure\
    \ 1-23).\n\n![A453659_1_En_1_Fig23_HTML.jpg](A453659_1_En_1_Fig23_HTML.jpg)\n\n\
    *Figure 1-23. HelloWorld app running in the iPhone simulator*\n\nAs you will quickly\
    \ find out, the alert window blocks the app; there is not yet a button or control\
    \ to close the alert. Thus, to break the app execution you need to either click\
    \ the Stop button in the Debug toolbar or double press the SHIFT + COMMAND + H\
    \ keyboard shortcut on your PC or double press a Home button on the simulator.\
    \ The simulator screen takes the form depicted in Figure 1-24. You can then swipe\
    \ up the HelloWorld app to kill its process.\n\nAt this point, it is also good\
    \ to note that you can use the device simulator to emulate various user actions.\
    \ For instance, you can emulate shake gesture, Touch ID, Apple Pay, or simply\
    \ rotate or reboot a device. You can access these options through the Hardware\
    \ menu of the simulator.\n\n![A453659_1_En_1_Fig24_HTML.jpg](A453659_1_En_1_Fig24_HTML.jpg)\n\
    \n*Figure 1-24. Multi-tasking management in iPhone simulator*\n\n### Actions\n\
    \nLet's now add an action to the alert view. This action will enable the user\
    \ to close the alert window instead of killing the whole app process. In practice,\
    \ an action will appear as the button within the alert window. When you press\
    \ this button, the alert window is closed and additional custom code can be executed.\
    \ Exemplary usage of such an action is presented in Listing 1-3, which shows an\
    \ extended implementation of the alert creation. Similarly, as before, I created\
    \ the action outside the event handler to reuse an action later. If you now re-run\
    \ the app in the simulator, the alert will be supplemented by the OK button (Figure\
    \ 1-25).\n\n![A453659_1_En_1_Fig25_HTML.jpg](A453659_1_En_1_Fig25_HTML.jpg)\n\n\
    *Figure 1-25. An alert with a default action*\n\n```\nprivate const string title\
    \ = \"Apress\";\nprivate const string message = \"Hello, Xamarin.iOS!\";\nprivate\
    \ UIAlertAction okAction =\nUIAlertAction.Create(\"OK\", UIAlertActionStyle.Default,\
    \ null);\npartial void ButtonAlert_TouchUpInside(UIButton sender)\n{\nvar alertController\
    \ = UIAlertController.Create(\ntitle, message, UIAlertControllerStyle.Alert);\n\
    alertController.AddAction(okAction);\nPresentViewController(alertController, false,\
    \ null);\n}\n```\n\n*Listing 1-3. Adding a Default Action to the Alert*\n\nAs\
    \ Listing 1-3 shows, to create an action you use the `UIAlertAction` class. In\
    \ particular, this class implements the static `Create` method, which accepts\
    \ three arguments, as follows:\n\n- `title` — Use this argument to specify the\
    \ action title; i.e., action's caption displayed in the alert.\n- `style` — This\
    \ defines action style or type. All available action types are represented as\
    \ values of the `UIAlertStyle` enumeration. This enumeration defines typical actions,\
    \ which are taken depending on the user input:\n    - `Cancel` — This type indicates\
    \ that a given operation should be canceled and that associated application state\
    \ or data should be left unchanged.\n    - `Default` — This is a default action\
    \ for the particular alteration of the application state.\n    - `Destructive`\
    \ — This type is typically used to confirm deletion of specific application data.\n\
    - `handler` allows you to define a set of statements, which are invoked when the\
    \ action button is tapped by the user.\n\nIn Listing 1-3, I created a single `Default`\
    \ action with OK title, which does not invoke any further logic (`handler` argument\
    \ is `null`). Of course, you can add more actions. We will use this possibility\
    \ in the next subsection while creating the action sheet."
