- fmt: "### Adding Breakpoints\n\nTo add a breakpoint with Xcode, just click the left\
    \ border of the editor panel. A small annotation in the form of a red circle will\
    \ be added to the line to indicate that a breakpoint exists for that location.\
    \ You can also add or remove a breakpoint to a line using the `⌘+K` keyboard shortcut.\n\
    \nCreating conditional breakpoints is easy with Xcode. The first thing you need\
    \ to do is to create a normal breakpoint as described above. Then, `Ctrl+click`\
    \ the breakpoint indicator and select \"Edit Breakpoint.\" A new panel will show\
    \ up with the available options. The first option you will see is `Condition`.\
    \ There you can add any expression involving local variables that are active at\
    \ the time the breakpoint is activated.\n\nTo remove an existing breakpoint, `Ctrl+click`\
    \ the breakpoint indicator. You will see the option to delete the breakpoint.\
    \ Alternatively, you may want to temporarily disable the breakpoint instead of\
    \ removing it completely. By disabling a breakpoint, you retain any properties\
    \ it might have (for example, if you added conditional expressions to it). Then,\
    \ if you need any of these properties, you can reactivate the breakpoint. If you\
    \ delete the breakpoint, however, you need to reenter any property it had in the\
    \ first place.\n\nWhen defining a new breakpoint, you can decide to make it conditional\
    \ on an expression, so that the breakpoint will be activated only when it passes\
    \ a particular predefined test. You can add such conditional breakpoints by `Ctrl+click`ing\
    \ the breakpoint indicator and selecting the \"Edit Breakpoint\" option. The resulting\
    \ screen is displayed in Figure [15-1](#A978-1-4302-5906-0_15_Chapter.html#Fig1).\
    \ You can add a new expression to the condition field, as desired. In the example\
    \ displayed in Figure [15-1](#A978-1-4302-5906-0_15_Chapter.html#Fig1), I am adding\
    \ a breakpoint that will be activated only when the variable `index` is negative.\n\
    \n![A978-1-4302-5906-0_15_Fig1_HTML.jpg](A978-1-4302-5906-0_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1.  \nAdding a conditional breakpoint in Xcode\n\nAnother option you\
    \ have when creating breakpoints is to define the number of times that the breakpoint\
    \ can be ignored. For instance, this is useful when you know that the breakpoint\
    \ will be executed as part of a loop, which repeats for a set number of times.\
    \ Just define the number of times it should ignore the breakpoint.\n\nStill another\
    \ option is available for breakpoints in Xcode: you have the ability to run one\
    \ or more actions whenever the breakpoint is reached. The kind of action may be\
    \ executing a script, playing a sound, or just sending a message to the log window.\
    \ I am particularly fond of the message logging option. By using it, you have\
    \ functionality similar to the use of `NSLog` or other print statements, but without\
    \ the need to recompile the application. Thus you can decide, right in the middle\
    \ of a debugging section, which messages are most useful to understand the execution\
    \ of the program. You can also add new messages as necessary to get more details.\n\
    \nThese options for breakpoint execution give a lot of flexibility to programmers\
