- fmt: '- `- (NSUInteger)count`; returns the number of elements contained in the `NSArray`
    object.

    - `- (id)objectAtIndex:(NSUInteger)index`; returns the object stored at the given
    index.

    - `- (NSArray *)arrayByAddingObject:(id)anObject`; creates a new array by taking
    the current elements of the target object and adding the object passed as an argument.

    - `- (NSArray *)arrayByAddingObjectsFromArray:(NSArray *)otherArray`; creates
    a new `NSArray` using the contents of the target object and adding all the objects
    in the array in the second parameter.

    - `- (NSString *)componentsJoinedByString:(NSString *)separator`; returns a string
    created by concatenating all the elements of the target array, with a separator
    determined by the first parameter.

    - `- (BOOL)containsObject:(id)anObject`; returns true if `anObject` is contained
    in the target `NSArray`.

    - `- (NSString *)description`; returns a brief description of the target object.
    Normally used for debugging purposes.

    - `- (NSString *)descriptionWithLocale:(id)locale`; returns a short description,
    using the locale passed as argument.

    - `- (NSString *)descriptionWithLocale:(id)locale indent:(NSUInteger)level`; returns
    a short description using the locale from the first parameter, and indents the
    description by the number of levels as determined by the second argument.

    - `- (id)firstObjectCommonWithArray:(NSArray *)otherArray`; returns the first
    object contained in the target array that also occurs in the `otherArray`.

    - `- (void)getObjects:(id __unsafe_unretained [])objects range:(NSRange)range`;
    copies the objects stored in the target array to the C array of ids. You need
    to pass a range of objects that will be copied.

    - `- (NSUInteger)indexOfObject:(id)anObject`; returns the index of `anObject`
    in the target array, if `anObject` is found. Otherwise, this method returns `NSNotFound`.

    - `- (NSUInteger)indexOfObject:(id)anObject inRange:(NSRange)range`; returns the
    index of `anObject` in the target array if `anObject` is found in the range passed
    as the second argument. Otherwise, this method returns `NSNotFound`.

    - `- (NSUInteger)indexOfObjectIdenticalTo:(id)anObject`; returns the index of
    `anObject` in the target array, if `anObject` is found using a memory address
    comparison. Otherwise, this method returns `NSNotFound`.

    - `- (NSUInteger)indexOfObjectIdenticalTo:(id)anObject inRange:(NSRange)range`;
    returns the index of the passed object, with an address comparison similar to
    the one performed by the previous method. The object is searched only on the passed
    range.

    - `- (BOOL)isEqualToArray:(NSArray *)otherArray`; returns YES only if the target
    array has the same elements as `otherArray`, in the same order.

    - `- (id)lastObject`; returns the last object stored in the target array.

    - `- (NSEnumerator *)objectEnumerator`; returns an `NSEnumerator` object, which
    can be used for enumerating the target object. With an `NSEnumerator` object,
