- fmt: "### Adding Menus\n\nWorking with menu bars is easy with Xcode. First, a menu\
    \ bar is present in the initial xib created by Xcode. It is displayed along the\
    \ top of the editor window and you can click its representation to edit the necessary\
    \ items. You can change the configuration of the menus by double-clicking an item\
    \ and editing its label.\n\nTo change the connections for these menu items, you\
    \ can click and drag the items to the object that is supposed to respond to it.\
    \ There are a few targets that are commonly used to respond to menu events. The\
    \ first is the Application placeholder object. For example, for menu commands\
    \ such as Quit, or Minimize, the application has default methods that can be used\
    \ to respond to such common requests.\n\n![A978-1-4302-5906-0_16_Fig6_HTML.jpg](A978-1-4302-5906-0_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6. Connecting a menu item to the application delegate action\n\nThe\
    \ second object that is a common target for menu events is the application delegate.\
    \ This object is used to handle events that happen at the application level and\
    \ need to be handled with some customized response. Let’s see, for example, how\
    \ the application can handle a menu item called Save Document.\n\nThe first step\
    \ is to add an action method to the delegate object. Here is an example of the\
    \ delegate interface:\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface AppDelegate\
    \ : NSObject <NSApplicationDelegate>\n{\n        // store an outlet to the menu\
    \ bar\n        id IBOutlet menuBar;\n}\n\n@property (assign) IBOutlet NSWindow\
    \ *window;\n\n// an action called by a menu event\n- (IBAction)onSaveDocument:(id)sender;\n\
    \n@end\n```\n\nThis interface declares a method named `onSaveDocument:`, which\
    \ is marked as an `IBAction`. Remember that `IBAction` is just another name for\
    \ `void`, but when used in an interface file it tells Xcode that this method can\
    \ be connected to other controls at design time.\n\nIn Xcode, when selecting the\
    \ `AppDelegate` object in the xib file, you will now see `onSaveDocument:` as\
    \ another action available in the Received Actions section. To connect this new\
    \ action to its source, click and drag from the circle on right side of the action\
    \ to the desired menu item (in this case the Save item). After you release the\
    \ mouse, the connection will be established and displayed, as in Figure 16-6.\n\
    \n### Making Changes After a nib Is Loaded\n\nAny nontrivial application needs\
    \ some customization to the plain style of a control. While several customizations\
    \ can be done using Xcode UI design features, some changes are more easily done\
    \ in code. For example, if the same update needs to be done to several controls,\
    \ it may be easier to make the change via a `for` loop rather than manually performing\
    \ the change during design. At the same time, it would be nice to be able to perform\
    \ such changes before the interface is displayed to users.\n\nTherefore, it is\
    \ useful to have a way to execute code after the nib file has been loaded, but\
    \ right before it is presented to the user. This is exactly what is possible with\
    \ the `windowControllerDidLoadNib` method, which is part of the `NSDocument` interface.\
    \ Here is an example:\n\n```\n- (void)windowControllerDidLoadNib:(NSWindowController\
    \ *)aController\n{\n  [super windowControllerDidLoadNib:aController];\n  // make\
    \ updates here ...\n}\n```\n\nIf, instead of an `NSDocument` interface, you use\
    \ a view controller class to manage your code, there is a similar method that\
    \ is run right after the nib file has been loaded. It is called `viewDidLoad`\
    \ (this method is also called even if the UI is created programmatically, but\
    \ if you know that the UI is created from a nib file, then you can guarantee that\
    \ the nib was loaded):\n\n```\n- (void)viewDidLoad{\n    [super viewDidLoad];\n\
    \    // make your changes here\n}\n```\n\nLast, if you are subclassing a control\
    \ (that is, a subclass of `NSView`), you should be able to implement the `awakeFromNib`\
    \ method. This method is called right after the view has been read from the nib\
    \ file, so you can use this opportunity to add your own customizations.\n\n##\
    \ Coding a UI Application with Objective-C\n\nIn the previous sections, you saw\
    \ how the design aspects of UI creation interact in Xcode, resulting in the creation\
    \ of a nib file that represents these objects on disk. The next step is to use\
    \ Xcode to control these objects at runtime. Here you can use all the features\
    \ of Objective-C, in combination with the rich set of runtime features made available\
    \ by Cocoa UI objects.\n\nWhile I don’t have the space needed to introduce all\
    \ the features of UI libraries in Cocoa, I will present a simple drawing application\
    \ as an example of coding an UI in Objective-C. At the same time, I will explain\
    \ the meaning of these classes and methods as they are introduced so you can have\
    \ an idea of how such applications work. For the complete source code and support\
    \ files, please access this book’s web page on my web site at [`http://coliveira.net`](http://coliveira.net/).\n\
    \nThe application I introduce here is an interactive app that can be used to create\
    \ and display a graph. A graph is a specialized chart that can be used to show\
    \ the connection between items known as graph nodes. Graphs are used in several\
    \ applications to analyze the structure of connected elements. Examples of such\
    \ structures include computer networks and transportation networks.\n\n### The\
    \ main Function\n\nIn Objective-C as in C, the application starts execution in\
    \ the `main` function. If you have a simple application that doesn’t need a lot\
    \ of customization, you can just delegate the responsibility of `main` to `NSApplicationMain`,\
    \ a function exported by `NSApplication` that performs the needed initialization.\n\
    \n```\n//\n// file: main.m\n// Graph Application\n#import <Cocoa/Cocoa.h>\n\n\
    int main(int argc, char *argv[])\n{\n    return NSApplicationMain(argc, (const\
    \ char **) argv);\n}\n```"
  raw: '### Adding Menus


    Working with menu bars is easy with Xcode. First, a menu bar is present in the
    initial xib created by Xcode. It is displayed along the top of the editor window
    and you can click its representation to edit the necessary items. You can change
    the configuration of the menus by double-clicking an item and editing its label.


    To change the connections for these menu items, you can click and drag the items
    to the object that is supposed to respond to it. There are a few targets that
    are commonly used to respond to menu events. The first is the Application placeholder
    object. For example, for menu commands such as Quit, or Minimize, the application
    has default methods that can be used to respond to such common requests.


    ![A978-1-4302-5906-0_16_Fig6_HTML.jpg](A978-1-4302-5906-0_16_Fig6_HTML.jpg)


    Figure 16-6.


    Connecting a menu item to the application delegate action


    The second object that is a common target for menu events is the application delegate.
    This object is used to handle events that happen at the application level and
    need to be handled with some customized response. Let’s see, for example, how
    the application can handle a menu item called Save Document.


    The first step is to add an action method to the delegate object. Here is an example
    of the delegate interface:


    `#import <Cocoa/Cocoa.h>`


    `@interface AppDelegate : NSObject <NSApplicationDelegate>`


    `{`


            `// store an outlet to the menu bar`


            `id IBOutlet menuBar;`


    `}`


    `@property (assign) IBOutlet NSWindow *window;`


    `// an action called by a menu event`


    `- (IBAction)onSaveDocument:(id)sender;`


    `@end`


    This interface declares a method named `onSaveDocument`:, which is marked as an
    `IBAction`. Remember that `IBAction` is just another name for void, but when used
    in an interface file it tells Xcode that this method can be connected to other
    controls at design time.


    In Xcode, when selecting the `AppDelegate` object in the xib file, you will now
    see `onSaveDocument:` as another action available in the Received Actions section.
    To connect this new action to its source, click and drag from the circle on right
    side of the action to the desired menu item (in this case the Save item). After
    you release the mouse, the connection will be established and displayed, as in
    Figure [16-6](#A978-1-4302-5906-0_16_Chapter.html#Fig6).


    ### Making Changes After a nib Is Loaded


    Any nontrivial application needs some customization to the plain style of a control.
    While several customizations can be done using Xcode UI design features, some
    changes are more easily done in code. For example, if the same update needs to
    be done to several controls, it may be easier to make the change via a `for` loop
    rather than manually performing the change during design. At the same time, it
    would be nice to be able to perform such changes before the interface is displayed
    to users.


    Therefore, it is useful to have a way to execute code after the nib file has been
    loaded, but right before it is presented to the user. This is exactly what is
    possible with the `windowControllerDidLoadNib` method, which is part of the `NSDocument`
    interface. Here is an example:


    `- (void)windowControllerDidLoadNib:(NSWindowController *)aController`


    `{`


      `[super windowControllerDidLoadNib:aController];`


      `// make updates here ...`


    `}`


    If, instead of an `NSDocument` interface, you use a view controller class to manage
    your code, there is a similar method that is run right after the nib file has
    been loaded. It is called `viewDidLoad` (this method is also called even if the
    UI is created programmatically, but if you know that the UI is created from a
    nib file, then you can guarantee that the nib was loaded):


    `- (void)viewDidLoad{`


        `[super viewDidLoad];`


        `// make your changes here`


    `}`


    Last, if you are subclassing a control (that is, a subclass of `NSView`), you
    should be able to implement the `awakeFromNib` method. This method is called right
    after the view has been read from the nib file, so you can use this opportunity
    to add your own customizations.


    ## Coding a UI Application with Objective-C


    In the previous sections, you saw how the design aspects of UI creation interact
    in Xcode, resulting in the creation of a nib file that represents these objects
    on disk. The next step is to use Xcode to control these objects at runtime. Here
    you can use all the features of Objective-C, in combination with the rich set
    of runtime features made available by Cocoa UI objects.


    While I don’t have the space needed to introduce all the features of UI libraries
    in Cocoa, I will present a simple drawing application as an example of coding
    an UI in Objective-C. At the same time, I will explain the meaning of these classes
    and methods as they are introduced so you can have an idea of how such applications
    work. For the complete source code and support files, please access this book’s
    web page on my web site at [`http://coliveira.net`](http://coliveira.net/) .


    The application I introduce here is an interactive app that can be used to create
    and display a graph. A graph is a specialized chart that can be used to show the
    connection between items known as graph nodes. Graphs are used in several applications
    to analyze the structure of connected elements. Examples of such structures include
    computer networks and transportation networks.


    ### The main Function


    In Objective-C as in C, the application starts execution in the `main` function.
    If you have a simple application that doesn’t need a lot of customization, you
    can just delegate the responsibility of `main` to NSApplicationMain, a function
    exported by NSApplication that performs the needed initialization.


    `//`


    `// file: main.m`


    `// Graph Application`


    `#import <Cocoa/Cocoa.h>`


    `int main(int argc, char *argv[])`


    `{`


        `return NSApplicationMain(argc, (const char **) argv);`


    `}`'
  trans: "\n### 添加菜单\n\n使用 Xcode 处理菜单栏非常简便。首先，Xcode 创建的初始 xib 文件中已自带菜单栏，它会显示在编辑器窗口的顶部，你可以点击其可视化表示来编辑所需的菜单项。通过双击某个项目并编辑其标签，即可更改菜单的配置。\n\
    \n若要更改这些菜单项的连接，你可以将选中的菜单项拖拽至负责响应的对象上。有几个常用目标对象专门用于响应菜单事件。第一个是应用占位对象（Application\
    \ placeholder）。例如，对于“退出”或“最小化”等菜单命令，应用程序提供了默认方法来响应这类常见请求。\n\n![A978-1-4302-5906-0_16_Fig6_HTML.jpg](img/A978-1-4302-5906-0_16_Fig6_HTML.jpg)\n\
    \n**图 16-6.** 将菜单项连接到应用委托操作\n\n第二个常见的菜单事件目标对象是应用委托（application delegate）。该对象用于处理发生在应用层面、需要定制化响应的事件。例如，我们来看看应用如何处理一个名为“保存文档”的菜单项。\n\
    \n第一步是向委托对象添加一个操作方法。以下是委托接口的示例：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface\
    \ AppDelegate : NSObject <NSApplicationDelegate>\n{\n        // 存储菜单栏的出口\n   \
    \     id IBOutlet menuBar;\n}\n\n@property (assign) IBOutlet NSWindow *window;\n\
    \n// 由菜单事件调用的操作\n- (IBAction)onSaveDocument:(id)sender;\n\n@end\n```\n\n该接口声明了一个名为\
    \ `onSaveDocument:` 的方法，并标记为 `IBAction`。请记住，`IBAction` 只是 `void` 的别名，但在接口文件中使用时，它会告诉\
    \ Xcode 该方法可以在设计时连接到其他控件。\n\n在 Xcode 中，当你在 xib 文件中选中 `AppDelegate` 对象时，你会在“已接收操作”（Received\
    \ Actions）部分看到 `onSaveDocument:` 作为可用的操作出现。要将这个新操作连接到其来源，请点击操作右侧的圆点并拖拽至目标菜单项（本例中为“保存”项）。松开鼠标后，连接便会建立并显示，如图\
    \ 16-6 所示。\n\n### 加载 nib 后进行修改\n\n任何非简单的应用都需要对控件的默认样式进行一定程度的定制。虽然可以使用 Xcode 的\
    \ UI 设计功能进行多项定制，但有些修改通过代码实现更为简便。例如，如果需要对多个控件进行相同的更新，通过 `for` 循环进行修改比在设计时手动操作更方便。同时，能够在界面显示给用户之前就执行这些修改会更好。\n\
    \n因此，提供一种在 nib 文件加载后、但在呈现给用户之前执行代码的方法非常有用。这正是 `windowControllerDidLoadNib` 方法所能实现的，它是\
    \ `NSDocument` 接口的一部分。示例如下：\n\n```\n- (void)windowControllerDidLoadNib:(NSWindowController\
    \ *)aController\n{\n  [super windowControllerDidLoadNib:aController];\n  // 在此处进行更新\
    \ ...\n}\n```\n\n如果不使用 `NSDocument` 接口，而是使用视图控制器（view controller）类来管理代码，则有一个类似的方法会在\
    \ nib 文件加载后立即运行。该方法名为 `viewDidLoad`（即使 UI 是以编程方式创建的，此方法也会被调用；但如果你知道 UI 来自 nib\
    \ 文件，那么可以确信 nib 已被加载）：\n\n```\n- (void)viewDidLoad{\n    [super viewDidLoad];\n\
    \    // 在此处进行你的修改\n}\n```\n\n最后，如果你正在子类化一个控件（即 `NSView` 的子类），你应该能够实现 `awakeFromNib`\
    \ 方法。该方法会在视图从 nib 文件中读取后立即被调用，因此你可以借此机会添加自己的定制内容。\n\n## 使用 Objective-C 编写 UI 应用\n\
    \n在前面的章节中，你了解了 UI 创建的设计层面如何在 Xcode 中交互，并最终生成在磁盘上表示这些对象的 nib 文件。接下来的步骤是使用 Xcode\
    \ 在运行时控制这些对象。在这里，你可以利用 Objective-C 的所有特性，结合 Cocoa UI 对象提供的丰富运行时功能。\n\n虽然篇幅有限无法介绍\
    \ Cocoa UI 库的所有特性，但我将以一个简单的绘图应用程序为例，展示如何用 Objective-C 编写 UI。同时，在介绍这些类和方法的含义时，我会加以解释，以便你对这类应用的工作原理有所了解。如需完整的源代码和支持文件，请访问我在个人网站上的本书页面：[`http://coliveira.net`](http://coliveira.net/)。\n\
    \n我在此介绍的应用是一个交互式应用程序，可用于创建和显示图形（graph）。图形是一种专门的图表，用于展示被称为“图形节点”的项目之间的连接关系。图形在多个应用中用于分析连接元素的结构，此类结构的示例包括计算机网络和交通网络。\n\
    \n### main 函数\n\n在 Objective-C 中，与 C 语言一样，应用程序从 `main` 函数开始执行。如果你有一个不需要大量定制的简单应用，你可以直接将\
    \ `main` 的职责委托给 `NSApplicationMain`，这是 `NSApplication` 导出的一个函数，负责执行所需的初始化工作。\n\
    \n```\n//\n// 文件：main.m\n// 图形应用程序\n#import <Cocoa/Cocoa.h>\n\nint main(int argc,\
    \ char *argv[])\n{\n    return NSApplicationMain(argc, (const char **) argv);\n\
    }\n```\n"
- fmt: "### The AppDelegate\n\nLet’s start with the application delegate. As you saw\
    \ above, this delegate receives events that have been routed in the nib using\
    \ the Xcode nib editor.\n\n```\n/* AppDelegate */\n\n#import <Cocoa/Cocoa.h>\n\
    \n@interface AppDelegate : NSObject\n\n{\n    IBOutlet id selectNumberOfNodesWindow;\n\
    \    IBOutlet id numberOfNodesControl;\n    IBOutlet id minDistField;\n    IBOutlet\
    \ id applyDistControl;\n    int numberOfNodesControlCanceled;\n}\n\n- (id)getSelectNumberOfNodesWindow;\n\
    - (id)getNumberOfNodesControl;\n- (id)getNumberOfNodesApplyDistControl;\n- (id)getNumberOfNodesDistField;\n\
    - (int)getNumberOfNodesControlCanceled;\n- (IBAction)closeSelectNumberOfNodesWindow:(id)sender;\n\
    - (IBAction)cancelSelectNumberOfNodesWindow:(id)sender;\n- (IBAction)setApplyMinDistOnNumberOfNodesWindow:(id)sender;\n\
    \n@end\n```\n\nThe application has a number of outlets that represent fields in\
    \ the UI. For example, there is a field that stores the number of nodes in the\
    \ window. Notice that all these fields are marked as `IBOutlet`, which is used\
    \ to tell Xcode that these variables are mapped to outlets. Then, notice that\
    \ the last three methods have a return value of `IBAction`. This is used to tell\
    \ Xcode these methods should be mapped to actions in the nib editor.\n\nNext,\
    \ you have implementation of the AppDelegate.\n\n```\n#import \"AppDelegate.h\"\
    \n\n@implementation AppDelegate\n\n- (id)getSelectNumberOfNodesWindow\n{\n   \
    \ return selectNumberOfNodesWindow;\n}\n\n- (id)getNumberOfNodesControl\n{\n \
    \   return numberOfNodesControl;\n}\n\n- (int)getNumberOfNodesControlCanceled\n\
    {\n    return numberOfNodesControlCanceled;\n}\n```\n\nThese first three methods\
    \ simply return the ids for a few UI controls. These ids define the window that\
    \ displays the number of nodes, a control with the number of nodes, and a control\
    \ used to cancel the operation.\n\n```\n- (IBAction)cancelSelectNumberOfNodesWindow:(id)sender\n\
    {\n    printf(\"The window was canceled\\n\");\n    numberOfNodesControlCanceled\
    \ = 1;\n    [NSApp stopModal];\n}\n\n- (IBAction)closeSelectNumberOfNodesWindow:(id)sender\n\
    {\n    numberOfNodesControlCanceled = 0;\n    [NSApp stopModal];\n}\n\n- (IBAction)setApplyMinDistOnNumberOfNodesWindow:(id)sender;\n\
    {\n    if ([sender state] == NSOffState) {\n        [minDistField setEnabled:NO];\n\
    \    } else {\n        [minDistField setEnabled:YES];\n        [selectNumberOfNodesWindow\
    \ makeFirstResponder:minDistField];\n    }\n}\n```\n\nThese three methods are\
    \ use to respond to messages sent by a modal window defined in the application.\
    \ The model window is used to define the number of nodes in the editor. Notice\
    \ that, in the first two methods, you have a call to the method `stopModal` in\
    \ the `NSApp` object. `stopModel` is used to close a modal window (in this case\
    \ the modal window is a small dialog).\n\n```\n- (id)getNumberOfNodesApplyDistControl\n\
    {\n    return applyDistControl;\n}\n\n- (id)getNumberOfNodesDistField\n{\n   \
    \ return minDistField;\n}\n\n@end\n```\n\nThe last two methods are necessary just\
    \ to return stored information, such as the number of nodes in the distribution.\n\
    \n### The GraphView Interface\n\nThe `GraphView.h` file is used to define the\
    \ interface for graph drawing routines. Most of the code is related to defining\
    \ the instance variables necessary during the drawing operations.\n\n```\n/* GraphView:\
    \ viewer for graph drawing. */\n\n#import <Cocoa/Cocoa.h>\n#include <graph.h>\n\
    \n// This class implements the viewer, which displays the graph and\n// takes\
    \ care of editing operations.\n\n@interface GraphView : NSView\n{\n    NSBezierPath\
    \ *path; // path used by the main graph\n    NSBezierPath *sg_path; // path used\
    \ by the sobreposed graph\n    NSAffineTransform *transform; // transformation\
    \ used to draw on scale\n    Graph *G; // Main graph\n    Graph *sG; // Sobreposed\
    \ graph\n    IBOutlet id Document; // Pointer to the document\n    IBOutlet id\
    \ _posField; // Field in the status bar showing position\n    IBOutlet id scroller;\n\
    \    IBOutlet NSSlider *_slider;\n    int *_associatedPoints; // pointer to a\
    \ vector of associated points\n    int _nPoints; // number of points in this graph\n\
    \    double _sliderValue; // the value of the slider widget\n    int _clickedNode;\
    \ // node that was last clicked\n    int _deleteEdgeMode; // 1 if the current\
    \ mode is \"delete edge\"\n}\n\n-(void) refreshView;\n-(void)setBezierPaths;\n\
    -(NSBezierPath *) getPath;\n-(void)startDeleteEdgeMode;\n-(Graph *) getGraph;\n\
    -(IBAction)sliderChanged:(id)sender;\n-(void) refreshView;\n-(void)drawNodeNumbers;\n\
    -(int)findClickedNode:(NSPoint)loc;\n-(void)moveNode:(int)clickedNode to:(NSPoint)loc;\n\
    -(void)addSobreposedGraphToPath;\n-(void)addGraphToPath;\n-(void)mouseMoved:(NSEvent\
    \ *)theEvent;\n\n@end\n```\n\nNotice that this file, like most files in a Cocoa\
    \ application, starts with the command `#import <Cocoa/Cocoa.h>`. Then you will\
    \ see a list of necessary variables, with a few outlets used by Xcode. Among the\
    \ methods declared, you can also see an action that is used during the UI design\
    \ phase."
