    \n罗恩·娜塔莉在 Unix、OS X 和 Windows 平台上使用 C、Objective-C 和 C++开发大型应用方面拥有 35 年经验。他拥有约翰霍普金斯大学电气工程学位，并教授过编程、网络设计和计算机安全方面的专业课程。\n\
    \n他与妻子玛吉分别居住在弗吉尼亚州和北卡罗来纳州。\n\n## 引言\n\n欢迎阅读《Objective-C 程序员参考手册》。本书面向那些先前有其他语言（如\
    \ Java、Python、Ruby 或 C++）开发经验，并希望将这些知识运用到 Objective-C 领域的开发者。\n\n也许您曾玩过 iPhone，并希望开发一款期待在\
    \ AppStore 上架的应用程序。或者您想在 Mac OS X 上创建一个新的桌面应用程序。再或者，您可能只是因为公司需要支持 iOS 设备而必须用 Objective-C\
    \ 编程。无论出于何种原因，本书都将帮助您从掌握其他语言的编程概念，过渡到学习如何（并希望您能享受）使用 Objective-C 编程。\n\n本书的写作目标也在于帮助那些已经了解\
    \ Objective-C，但希望获得该语言最常用技术的简明参考的读者。您将能够理解在使用 Cocoa 和 Cocoa Touch（Objective-C\
    \ 中两个最大且最重要的框架）时真正重要的主题。您还将学习到在任何需要 Objective-C 的编程场景中都能应用的基本主题。\n\n您可能没有时间投入于那些更传统的书籍——它们通常花上数百页来解释那些对于在职开发者和高级编程学生来说已是标准词汇的简单概念。因此，本书力求仅通过简洁的示例传达最重要的主题。我们还收录了最常用类的快速参考，这样您就不必花太多时间在线查阅这些文档。\n\
    \n《Objective-C 程序员参考手册》对于那些希望有效运用知识，同时学习现代应用程序和移动开发中最具市场热度技能之一的开发者来说，是一个绝佳的选择。\n"
- fmt: '# Topics Discussed


    `Objective-C Programmer''s Reference` provides all the tools necessary to build
    working solutions in Objective-C. Starting from the basic building blocks of the
    C language, I discuss how to create correct and efficient applications, leveraging
    knowledge of object-oriented programming as well as structured programming.


    I make extensive use of concepts mastered by developers who are fluent in other
    languages such as C++, Java, Perl, and Python. In writing this book, my goal is
    to provide such readers a fast-paced path to achieve proficiency in Objective-C.


    On the other hand, this book introduces Objective-C in a logical and structured
    way, so that even novice programmers will have an easy time absorbing the most
    important topics and competencies necessary to develop applications that use the
    language.


    We work in an industry where typical books are thousands of pages long and where
    most of that length is filled up by introductory topics that are not of great
    concern for professional developers. In this book, I strive to provide a more
    concise and focused reference to the language, offering readers much more value
    for their reading efforts. This book does the following:


    - Takes you quickly through fundamental concepts such as interfaces and class
    implementations in Objective-C.

    - Provides a concise and handy reference to the Foundation framework that is all-important
    when programming in Objective-C.

    - Highlights key differences between Objective-C and other popular languages such
    as Java or Python.

    - Shows how to create full applications using advanced concepts such as container
    classes, selectors, and key-value interfaces.

    - Provides the fundamentals of writing Cocoa and Cocoa Touch applications, which
    are the standard for Mac OS X and iOS development.


    ## What You Will Learn


    Here are some of the topics that you will learn in this book:


    - The basic syntax of the Objective-C language.

    - How to create classes in Objective-C.

    - How methods and the message passing mechanism work to simplify your code and
    avoid deep class hierarchies.

    - The key-value system for storing and accessing dynamic data, and how it ties
    with Objective-C interfaces to simplify application programming.

    - The effective use of container classes in Objective-C, such as arrays and dictionaries,
    with their immutable and mutable versions.

    - Basic topics in Cocoa programming, which can be used to create simple applications
    in the Mac OS X and iOS environments.


    Here is a quick summary of the topics you will learn in each chapter.


    ### Chapter 1: The C in Objective-C


    The Objective-C language was created as an extension of C, which means that any
    program written in C is also a valid Objective-C program. As a result, many of
    the basic expressions in Objective-C are identical to their equivalents in C.
    To become a good Objective-C programmer, you need to have a basic understanding
    of the C language. In this chapter, I provide a quick introduction to the most
    important concepts from the C language as used in Objective-C.


    ### Chapter 2: Classes


    In Objective-C, classes are the building blocks of applications. They are the
    syntactic construct used to define the methods and variables that become the components
    of an object. This chapter gives an introduction to the concept of Objective-C
    classes, and how to define them. One of the main features of classes is how they
    can be described in separate files, one for the interface and another for the
    implementation. This clear separation makes it possible to share only the important
    aspects of a class, while hiding any implementation information that is not needed
    by clients.


    ### Chapter 3: Strings and Container Classes


    One of the main characteristics of Objective-C programs is the constant use of
    dynamic objects to simplify the management of memory and other resources. Among
    the most fundamental classes in the Objective-C runtime are the classes used to
    handle strings, numbers, and collections of objects. In this chapter, I show how
    to use these basic classes and their methods.


    ### Chapter 4: Protocols and Categories


    Objective-C promotes a clear separation between implementation and interfaces.
    One of the techniques used to encourage this separation is the concept of protocols.
    A protocol allows classes to communicate by just describing a subset of the methods
    they respond to. Another way to promote this separation of concerns is to extend
    classes through categories: instead of making everyone aware of the methods available
    at a particular class, a programmer can add categories as they are needed. This
    results in a much cleaner implementation, which reduces dependencies on other
    parts of the application.


    ### Chapter 5: Inheritance


    Object-oriented programming is the main idea that motivated the creation of Objective-C.
    An important aspect of OOP is the ability to create new classes that inherit the
    methods, variables, and properties of existing classes. The proper use of inheritance,
    however, requires a certain care in both the design phase and the proper implementation
    of derived classes. In this chapter, I cover the main ideas that you need to be
    familiar with when creating class hierarchies.


    ### Chapter 6: Block Syntax'
