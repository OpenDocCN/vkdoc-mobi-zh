  raw: '### Adding Breakpoints


    To add a breakpoint with Xcode, just click the left border of the editor panel.
    A small annotation in the form of a red circle will be added to the line to indicate
    that a breakpoint exists for that location. You can also add or remove a breakpoint
    to a line using the ⌘+K keyboard shortcut.


    Creating conditional breakpoints is easy with Xcode. The first thing you need
    to do is to create a normal breakpoint as described above. Then, Ctrl+click the
    breakpoint indicator and select “edit breakpoint.” A new panel will show up with
    the available options. The first option you will see is Condition. There you can
    add any expression involving local variables that are active at the time the breakpoint
    is activated.


    To remove an existing breakpoint, Ctrl+click the breakpoint indicator. You will
    see the option to delete the breakpoint. Alternatively, you may want to temporarily
    disable the breakpoint instead of removing it completely. By disabling a breakpoint,
    you retain any properties it might have (for example, if you added conditional
    expressions to it). Then, if you need any of these properties, you can reactivate
    the breakpoint. If you delete the breakpoint, however, you need to reenter any
    property it had in the first place.


    When defining a new breakpoint, you can decide to make it conditional on an expression,
    so that the breakpoint will be activated only when it passes a particular predefined
    test. You can add such conditional breakpoints by Ctrl+clicking the breakpoint
    indicator and selecting the “Edit Breakpoint” option. The resulting screen is
    displayed in Figure [15-1](#A978-1-4302-5906-0_15_Chapter.html#Fig1). You can
    add a new expression to the condition field, as desired. In the example displayed
    in Figure [15-1](#A978-1-4302-5906-0_15_Chapter.html#Fig1), I am adding a breakpoint
    that will be activated only when the variable index is negative.


    ![A978-1-4302-5906-0_15_Fig1_HTML.jpg](A978-1-4302-5906-0_15_Fig1_HTML.jpg)


    Figure 15-1.


    Adding a conditional breakpoint in Xcode


    Another option you have when creating breakpoints is to define the number of times
    that the breakpoint can be ignored. For instance, this is useful when you know
    that the breakpoint will be executed as part of a loop, which repeats for a set
    number of times. Just define the number of times it should ignore the breakpoint.


    Still another option is available for breakpoints in Xcode: you have the ability
    to run one or more actions whenever the breakpoint is reached. The kind of action
    may be executing a script, playing a sound, or just sending a message to the log
    window. I am particularly fond of the message logging option. By using it, you
    have functionality similar to the use of `NSLog` or other print statements, but
    without the need to recompile the application. Thus you can decide, right in the
    middle of a debugging section, which messages are most useful to understand the
    execution of the program. You can also add new messages as necessary to get more
    details.


    These options for breakpoint execution give a lot of flexibility to programmers
    that need to find a bug quickly. By learning how to control breakpoints, you can
    minimize the number of instructions sent to the debugger while also getting better
    data that you can use to make decisions about the proper fix for a software bug.


    ### Watching Expressions


    Another feature of the debugging system in Xcode is the availability of an expression
    watcher. That is, you can define expressions that will be evaluated and displayed
    automatically by the IDE. Using the watching expressions, you can, for example,
    analyze the values of particular variables during the execution of the program.
    If the contents of such variables differ from the expected, you may get a better
    understanding of how the application works and use that information to fix the
    bug.


    To add an expression watcher, you need to access the debug area and display the
    Variables view (if you can’t see this view, click the split window icon at the
    top right of the debug area). Once the Variables view is visible, Ctrl+click the
    view and select the option “Add Expression.” This allows you to add either a single
    variable, or an expression containing variables or other elements such as method
    calls and operators.


    After you enter the expression you want to watch, the value will be evaluated
    regularly. The debugger will reevaluate the expression whenever there is a change
    in the state of the program, such as when the debugger advances the program from
    one step to the next, or when a function is executed. By using such expressions,
    it becomes easy to understand the changes performed by your algorithm in a nutshell.
    Moreover, you can change the variable or expression you want to watch without
    having to recompile the application or even restart it.


    ### Investigating Local Objects


    Another feature of the Variables view is the ability to have quick access to the
    contents of every local variable in the current method. This is made available
    as a standard feature in the Variables view. By displaying the value of local
    variables, you reduce considerably the need to add new expressions: frequently,
    the local variables comprise the most important memory locations for the current
    algorithm.


    ![A978-1-4302-5906-0_15_Fig2_HTML.jpg](A978-1-4302-5906-0_15_Fig2_HTML.jpg)


    Figure 15-2.


    Editing the value of a local variable in the Variables view


    Once you have access to the local variables in a particular context, you can drill
    down on their contents, so as to reveal instance variables for each object stored
    locally. Similarly, you can observe the contents of structures by clicking their
    internal elements.


    Probably the most important element of the list of local variables is the `self`
    variable. This shows you information about the current object (the object where
    the current method was called). Therefore, from `self` you can retrieve information
    such as the exact type of the current object, the list of instance variables,
    and the state of each of these variables.


    Using the Variables view, you can not only observe values, but also make direct
    changes. For example, suppose you found that a particular variable has an incorrect
    value. You suspect that the method would work well if that variable had been correct,
    but you would like to test this hypothesis without building and restarting the
    application.


    The easy way to perform such a test is to Ctrl+click the variable you want to
    change, and then select the “Edit Value” option. This will allow you to update
    the value of the selected variable without having to restart the debugging session.
    Figure [15-2](#A978-1-4302-5906-0_15_Chapter.html#Fig2) shows an example of how
    to perform a value update. From that point on, the current method will use the
    updated value as if the program had created the value as part of its normal operation.
    Depending on the result of this test, you can then make the necessary changes
    in the code to fix the bug, or at least to reduce the scope of the problem.'
  trans: "\n### 添加断点\n\n要在 Xcode 中添加断点，只需点击编辑器面板的左侧边框。该行会添加一个红色圆圈形式的小注释，表明该位置存在一个断点。你也可以使用\
    \ `⌘+K` 键盘快捷键，在某行添加或移除断点。\n\n使用 Xcode 创建条件断点很容易。你首先需要按照上述方法创建一个普通断点。然后，`Ctrl+点击`断点指示器，并选择“编辑断点”。一个新面板会弹出，显示可用的选项。你看到的第一个选项是\
    \ `Condition`（条件）。在这里，你可以添加任何在断点被激活时处于活动状态的局部变量所构成的表达式。\n\n要移除一个现有断点，`Ctrl+点击`断点指示器。你会看到删除该断点的选项。或者，你可能希望暂时禁用该断点，而不是完全移除它。禁用断点可以保留它可能拥有的任何属性（例如，如果你为其添加了条件表达式）。这样，如果你需要用到这些属性中的任何一个，你可以重新激活该断点。然而，如果你删除了断点，就需要重新输入它原先拥有的所有属性。\n\
    \n在定义新断点时，你可以决定让它基于某个表达式成为条件断点，这样断点只有在通过特定的预设测试时才会被激活。你可以通过 `Ctrl+点击` 断点指示器并选择“编辑断点”选项来添加此类条件断点。出现的界面如图\
    \ 15-1 所示。你可以根据需要，在条件字段中添加新的表达式。在图 15-1 显示的示例中，我添加了一个断点，该断点仅在变量 `index` 为负数时才会被激活。\n\
    \n![A978-1-4302-5906-0_15_Fig1_HTML.jpg](img/A978-1-4302-5906-0_15_Fig1_HTML.jpg)\n\
    \n图 15-1.  \n在 Xcode 中添加条件断点\n\n创建断点时的另一个选项是定义断点可以被忽略的次数。例如，当你已知断点将在某个循环（该循环会重复执行固定次数）中被触发时，这个功能就很有用。只需定义它应该忽略断点的次数即可。\n\
    \nXcode 中的断点还有另一个可用选项：你可以设置在到达断点时运行一个或多个操作。操作的类型可以是执行脚本、播放声音，或者仅向日志窗口发送一条消息。我特别喜欢消息记录选项。使用它，你可以实现与使用\
    \ `NSLog` 或其他打印语句类似的功能，但无需重新编译应用程序。因此，你可以在调试过程中，根据需要决定哪些消息最有助于理解程序的执行。你还可以根据需要添加新消息以获取更多细节。\n\
    \n这些关于断点执行的选项为需要快速找到 Bug 的程序员提供了极大的灵活性。通过学习如何控制断点，你可以最大限度地减少发送给调试器的指令数量，同时获得更好的数据，以便用于决定软件\
    \ Bug 的正确修复方案。\n\n### 监视表达式\n\nXcode 调试系统的另一个特性是提供了表达式监视器。也就是说，你可以定义一些表达式，IDE\
    \ 会自动对其求值并显示出来。使用监视表达式，你可以例如在程序执行过程中分析特定变量的值。如果这些变量的内容与预期不符，你就能更好地理解应用程序的工作方式，并利用该信息来修复\
    \ Bug。\n\n要添加表达式监视器，你需要访问调试区域并显示“变量”视图（如果看不到此视图，请单击调试区域右上角的拆分窗口图标）。一旦“变量”视图可见，`Ctrl+点击`该视图，然后选择“添加表达式”选项。这允许你添加单个变量，或包含变量及其他元素（如方法调用和运算符）的表达式。\n\
    \n在你输入想要监视的表达式后，其值会被定期评估。每当程序状态发生变化时，例如调试器将程序从一个步骤推进到下一个步骤，或者执行了一个函数时，调试器都会重新评估该表达式。通过使用此类表达式，你可以轻松地概览算法所执行的更改。而且，你可以在不重新编译甚至不重新启动应用程序的情况下，更改你想要监视的变量或表达式。\n\
    \n### 检查局部对象\n\n“变量”视图的另一个特性是，能够快速访问当前方法中每个局部变量的内容。这是“变量”视图中的一个标准功能。通过显示局部变量的值，你可以大大减少添加新表达式的需求：通常情况下，局部变量包含了当前算法最重要的内存位置。\n\
    \n![A978-1-4302-5906-0_15_Fig2_HTML.jpg](img/A978-1-4302-5906-0_15_Fig2_HTML.jpg)\n\
    \n图 15-2.  \n在“变量”视图中编辑局部变量的值\n\n当你在特定上下文中访问到局部变量后，你可以深入探究其内容，以揭示每个局部存储对象的实例变量。类似地，你也可以通过点击结构体的内部元素来观察其内容。\n\
    \n在局部变量列表中，最重要的元素可能是 `self` 变量。它向你显示当前对象（即当前方法被调用的对象）的信息。因此，从 `self` 你可以检索到诸如当前对象的确切类型、实例变量列表以及每个变量的状态等信息。\n\
    \n使用“变量”视图，你不仅可以观察数值，还可以直接进行更改。例如，假设你发现某个特定变量的值不正确。你怀疑如果该变量正确的话，方法就能正常工作，但你希望在不必构建和重启应用程序的情况下测试这个假设。\n\
    \n执行此类测试的简单方法是 `Ctrl+点击` 你想要更改的变量，然后选择“编辑值”选项。这将允许你更新所选变量的值，而无需重新启动调试会话。图 15-2\
    \ 展示了如何执行值更新的示例。从那时起，当前方法将使用更新后的值，就好像该值是程序在正常运行过程中生成的一样。根据此测试的结果，你接下来可以对代码进行必要的更改来修复\
    \ Bug，或至少缩小问题的范围。\n"
- fmt: '### Using the Logging Console


    The logging console is another simple, but highly effective, tool for finding
    issues with programs written with Objective-C or other programming languages supported
    by the Mac OS X and iOS platforms. The logging terminal is a simple way to send
    text messages that can be later accessed by programmers.


    When using Xcode, the console is readily available as one of the windows in the
    debug panel. To print something to the console, just use `NSLog`, as you have
    been seeing in the examples throughout this book. After an application is shipped
    and run by Mac OS X, the logs can be viewed and searched using the Console application
    (displayed in Figure [15-3](#A978-1-4302-5906-0_15_Chapter.html#Fig3)), which
    is available in any installation of the system. Similarly, the console data is
    available for iOS devices using the iTunes application, for example.


    The main way in which the console is used is to print relevant information in
    such a way that it becomes easier to identify the causes of a programming problem.
    There are two main situations in which the console can be used: for immediate
    debugging purposes or for permanent logging.


    ![A978-1-4302-5906-0_15_Fig3_HTML.jpg](A978-1-4302-5906-0_15_Fig3_HTML.jpg)


    Figure 15-3. The Console application in Mac OS X


    The first use case of immediate logging is easy to understand: during a debugging
    session you can use the console to print values that you want to observe. In this
    sense, using the logging facilities is similar to using the debugger with expression
    watches, with the only disadvantage that you need to recompile the application
    to get the results. On the other hand, logs are easier to visualize and allow
    for the observation of several repetitions of the debugged code, until a problem
    is detected. Debugging by printing useful information is such a common debugging
    technique that most programmers have used it at one point or another.


    The second use case for logs is for long-term data collection. To really work,
    this use has to precede the occurrence of a real bug, so that you can have access
    to previous information. The main strategy for long-term logging is that you should
    print logging data whenever you make a programming decision that can possibly
    result in an error. At these logical places, you should also be adding the considered
    data to the logs. By recording such decisions, you can make it easier to later
    determine the sequence of facts that lead to a bug. Logging information is a very
    powerful ally when considering some categories of errors, and it should be explored
    in a methodical way.


    To send data to the console, you simply need to use `NSLog` as usual. For more
    structured techniques for logging access and organization, a few C and Objective-C
    libraries are available. For example, Apple has a library called `asl` that provides
    several advanced options for logging to files. Other open source libraries exist
    that simulate more complete logging frameworks such as `log4j`, which is used
    in Java. Whatever technique you decide to use, by employing logging data you can
    reduce the time it takes to go from a bug report to having a good understanding
    of its causes.


    ## The Command Line Debugger


    The options I have described for debugging on Xcode are mostly based on the lower
    level debuggers for the Mac OS X and iOS platforms. Such debuggers, such as `gdb`
    and the LLVM debugger, are command-line accessible, so you can use them directly
    using the terminal application if this better suits your needs.


    A debugger is specialized software capable of attaching to a process and displaying
    the source code and data that is being executed. In traditional UNIX platforms,
    the debugger is command-line based, with a set of commands that can be used to
    carry out the most common debugging tasks. You have been using such debuggers
    through the support of the Xcode IDE, as explained in the previous sections. In
    most cases, Xcode offers only a graphical interface on top of the command-line
    debugger.


    The most common debugger for Objective-C is `gdb`. The LLVM project (which was
    discussed in [Chapter 13](#A978-1-4302-5906-0_13_Chapter.html)) also has its own
    debugger, with an interface that has commands equivalent to those supported by
    `gdb`. I will quickly describe how to use some of the options available with `gdb`,
    but similar commands can be used in the LLVM debugger as well.


    To add a breakpoint, for example, you need to use the `break` command. Here is
    an example of debugging a sample application that contains a file called `a.c`.
    The following code adds a breakpoint at line 5 of that file:


    ```

    oliveira:∼ $ gdb a

    GNU gdb 6.3.50-20050815 (Apple version gdb-1752) (Sat Jan 28 03:02:46 UTC 2012)

    Copyright 2004 Free Software Foundation, Inc.

    GDB is free software, covered by the GNU General Public License, and you are

    welcome to change it and/or distribute copies of it under certain conditions.

    Type "show copying" to see the conditions.

    There is absolutely no warranty for GDB. Type "show warranty" for details.

    This GDB was configured as "x86_64-apple-darwin"...

    Reading symbols for shared libraries .. done

    (gdb) break a.c:5

    Breakpoint 1 at 0x100000f04: file a.c, line 5.

    (gdb)

    ```


    Just as with Xcode, a breakpoint defines a location in your code where you want
    to stop execution. Once your application is stopped at a breakpoint you can investigate
    the content of variables and other memory addresses, or the sequence of calls
    in the call stack, for example. You can enter that information in a number of
    ways. The first way to set up a breakpoint is to enter the file name followed
    by a line number. It is also possible to create a breakpoint using only the name
    of a C function. Here’s how to set up a breakpoint in the `main()` function:


    ```

    (gdb) break main

    Note: breakpoint 1 also set at pc 0x100000f04.

    Breakpoint 2 at 0x100000f04: file a.c, line 5.

    (gdb)

    ```


    You can now run the program using the `run` command.


    ```

    (gdb) run

    Starting program: /Users/coliveira/a

    Reading symbols for shared libraries +........................ done

    Breakpoint 1, main () at a.c:5

    5 printf("Hello world");

    (gdb)

    ```


    This will load the executable and run the program until a breakpoint is found.
    As you can see in the example above, the first breakpoint was reached, and as
    result the program stopped for debugging.


    Once a program is stopped at a breakpoint location, there are several operations
    that can be performed to control its execution. For example, you can step to the
    next line of code with the `next` command.


    ```

    (gdb) next

    11 say_hello();

    (gdb)

    ```


    You can also step into the code that is executed in the current line. For example,
    this code would result in the execution of the following instruction:


    ```

    (gdb) step

    say_hello () at a.c:5

    5 printf("Hello again");

    (gdb)

    ```


    You may also continue the execution of the program until the next breakpoint is
    reached.


    These few examples show how you can simulate practically all of the debugging
    instructions available in Xcode through the command-line debugger. The debugger,
    however, provides a rich instruction set that is much more comprehensive than
    what the visual debugger can offer. In fact, the Xcode debugging sessions also
    expose the command-line debugger through the debug panel.


    To see the debugger prompt, click View ➤ Debug Area ➤ Activate Console. This will
    display the debugging console, which shows some of the commands that have been
    executed by the debugger. It also has a prompt, which you can use to enter new
    debugging instructions, using syntax similar to the examples you have seen so
    far. For more information about how the debugger works in your environment, check
    the manual that ships with Xcode.'
