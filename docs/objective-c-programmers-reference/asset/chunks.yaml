  raw: '### Container Classes


    Containers are the first type of UI-related classes I will discuss. They define
    how objects are organized in the screen and how they relate to each other. Here
    are the most important classes in this category:


    *   `UIWindow`: A `UIWindow` represents a managing window for the app. In iOS,
    windows occupy the full screen, since there is no multiprocessing between two
    windows of different applications. Windows can contain other controls, such as
    toolbars and views. The `UIWindow` class is typically not subclassed, since it
    is possible to achieve most customizations through delegates or window controllers.

    *   `UIView`: A `UIView` is a rectangular area inside an app window. A view can
    respond to user input and manage other views. `UIView` objects are frequently
    associated to a view controller, used to respond to common notification messages.
    `UIView` is a parent class to most UI controls in Cocoa Touch, such as labels,
    buttons, and date pickers, for example.

    *   `UIToolbar`: A toolbar object of type `UIToolbar` is used to manage buttons
    and related controls. Toolbars in the iPhone are generally displayed in the lower
    part of the screen. You can add or remove buttons from a `UIToolbar` in order
    to provide a limited number of options to your users.

    *   `UINavigationBar`: This is also a bar that can contain other controls. In
    iOS, however, a navigation bar sits at the top of the window. The navigation bar
    contains a default item that points to the previous location. This control manages
    each new screen that is displayed in the context of the app, so you can go back
    in the list of views by using such navigation buttons.


    ### UI Controls


    Cocoa Touch also comes with a large number of single-purpose controls that can
    help users to make selections, visualize, and input data. Here follows a list
    of additional control classes made available in the UIKit that are used to support
    Touch-based input (see Figure [17-1](#A978-1-4302-5906-0_17_Chapter.html#Fig1)):


    ![A978-1-4302-5906-0_17_Fig2_HTML.jpg](A978-1-4302-5906-0_17_Fig2_HTML.jpg)


    Figure 17-2.


    The project template selection screen in the new project wizard


    *   `UILabel`: This class is used to create label objects. A label can display
    text or images in any part of an `NSView`. The text can be formatted using RTF,
    which may be generated by most text editors.

    *   `UITextField`: A class representing an input field, where users can enter
    data such as e-mail addresses, contact names, or passwords using the screen-based
    keyboard. The `UITextField` class knows how to control the display of the screen-based
    keyboard, showing and hiding it when the control is selected or deselected.

    *   `UIButton`: This class is able to display a simple button, which can be customized
    with text or images. The main functionality of the button is sending a message
    to a declared action in the view controller, which will in turn execute the necessary
    code for the requested function.

    *   `UISegmentedControl`: This control displays a segmented surface that you can
    touch to access different parts of a view. It is frequently used in mobile apps
    for iPhone, due to the lack of space in the smaller screen.

    *   `UISwitch`: The switch allows the user to select one of two states. It is
    consistently used in the Settings application for options with a `YES`/`NO` answer.

    *   `UIProgressView`: This view can be used to display progress in long running
    operations, so the user knows that the app is active, although in a wait state,
    while the operation is being performed.

    *   `UIActivityIndicatorView`: This is similar to the `UIProgressView` in purpose,
    but it is used when you don’t know how long an activity will take. On the other
    hand, you shouldn’t show this control if the operation takes too long, because
    it gives little clue to the user about how long it will take to move from this
    busy state.

    *   `UIPickerView`: This versatile UI control can be used to select one among
    several items. When clicked, this control displays a large selection wheel that
    makes it easier for the user to click the desired option.


    ![A978-1-4302-5906-0_17_Fig1_HTML.jpg](A978-1-4302-5906-0_17_Fig1_HTML.jpg)


    Figure 17-1.


    An Xcode nib design view, showing some of the UI controls in UIKit


    ## Setting Up a Cocoa Touch Project


    You can create an iOS app in a way that is very similar to other projects in Xcode:
    by using the project wizard to determine the kind of project that needs to be
    created. To generate a new project using the project wizard, you can use the menu
    by going to File ➤ New ➤ Project (or using the keyboard shortcut Shift+Command+N).
    The project wizard will be displayed and list all the project types available
    in your local Xcode installation. Select “Application” in the iOS category, and
    you will see the list of available applications types, as show in Figure [17-2](#A978-1-4302-5906-0_17_Chapter.html#Fig2).


    Among iOS application types, the following are of interest for mobile apps developers:


    *   Master-Detail Application: These are applications that present a master view,
    where you can summarize the contents of the app, and a detail view, which can
    be used for editing and visualization of selected parts of the content. This kind
    of app is used on the iPad only, since the iPhone generally doesn’t have enough
    screen space to handle the master and detail views at the same time.

    *   OpenGL Game: This template category is used to generate game apps. The application
    is set up so that you can access an OpenGL view, which allows developers to create
    2D and 3D images for their games.

    *   Page-Based Application: Creates a new application where data is displayed
    using a book metaphor. The application uses a `UIPageViewController`, which automates
    the process of managing the views that correspond to each page.

    *   Single View Application: This template generates a simple app that contains
    a single `UIView`.

    *   Tabbed Application: Generates an app that uses a tabbed interface to display
    content. This format is useful to drill down into data that can be represented
    in a tabular format, such as databases, phone books, and shopping lists, among
    others. The tabbed app automatically supplies the navigational tools to move between
    tabs, such going to the previous or next screen.

    *   Utility Application: This is an application that has only one view, with possibly
    an informational view that is displayed in flip mode. The example application
    you create in the last section uses this template.

    *   Empty Application: This template is useful if none of the previous types match
    your planned design. You can start from scratch by adding windows and views as
    necessary.


    After you select one of these options, you will have to enter some basic information
    about the project, such as name, location on the disk, and author. Once you complete
    the input of this initial data, Xcode will generate a new project with a set of
    classes and a nib file that represents the UI views for your mobile app.


    In addition to the information that you supplied initially, iOS apps also require
    a number of metadata items that are used by the system and the App Store. These
    items include icons, launch images, and App Store artwork.


    Figure [17-3](#A978-1-4302-5906-0_17_Chapter.html#Fig3) shows the project summary
    screen, where you can enter many of the metadata information items required by
    iOS.


    ![A978-1-4302-5906-0_17_Fig3_HTML.jpg](A978-1-4302-5906-0_17_Fig3_HTML.jpg)


    Figure 17-3.


    Project properties for a sample iOS application


    Here are some of the main properties you should use to create a customized application:'
  trans: '

    # 容器类


    容器是我将要讨论的第一类与 UI 相关的类。它们定义了对象在屏幕上的组织方式以及彼此之间的关联方式。以下是该类别中最重要的几个类：


    *   `UIWindow`：`UIWindow` 代表应用程序的管理窗口。在 iOS 中，窗口占据整个屏幕，因为不同应用程序的两个窗口之间不存在多进程处理。窗口可以包含其他控件，例如工具栏和视图。`UIWindow`
    类通常不会被创建子类，因为大多数自定义功能都可以通过委托或窗口控制器来实现。

    *   `UIView`：`UIView` 是应用程序窗口内的一个矩形区域。视图可以响应用户输入并管理其他视图。`UIView` 对象通常与视图控制器相关联，用于响应常见的通知消息。`UIView`
    是 Cocoa Touch 中大多数 UI 控件的父类，例如标签、按钮和日期选择器。

    *   `UIToolbar`：类型为 `UIToolbar` 的工具栏对象用于管理按钮和相关控件。iPhone 中的工具栏通常显示在屏幕底部。你可以从 `UIToolbar`
    中添加或移除按钮，以便向用户提供有限数量的选项。

    *   `UINavigationBar`：这也是一个可以包含其他控件的栏。然而，在 iOS 中，导航栏位于窗口的顶部。导航栏包含一个指向上一位置的默认项。此控件管理在应用程序上下文中显示的每个新屏幕，因此你可以通过使用这些导航按钮在视图列表中返回。


    # UI 控件


    Cocoa Touch 还提供了大量功能单一的控件，可以帮助用户进行选择、可视化和输入数据。以下是 UIKit 中提供的其他控件类列表，用于支持基于触摸的输入（参见图
    17-1）：


    ![A978-1-4302-5906-0_17_Fig2_HTML.jpg](img/A978-1-4302-5906-0_17_Fig2_HTML.jpg)


    图 17-2. 新项目向导中的项目模板选择界面


    *   `UILabel`：此类用于创建标签对象。标签可以在 `NSView` 的任何部分显示文本或图像。文本可以使用 RTF 格式进行格式化，大多数文本编辑器都可以生成这种格式。

    *   `UITextField`：一个表示输入字段的类，用户可以在其中使用屏幕键盘输入数据，例如电子邮件地址、联系人姓名或密码。`UITextField`
    类知道如何控制屏幕键盘的显示，在选择或取消选择控件时显示或隐藏它。

    *   `UIButton`：此类能够显示一个简单的按钮，可以使用文本或图像进行自定义。按钮的主要功能是向视图控制器中声明的操作发送消息，然后该操作将执行所请求功能所需的代码。

    *   `UISegmentedControl`：此控件显示一个分段表面，您可以触摸它以访问视图的不同部分。由于较小屏幕缺乏空间，此控件在 iPhone 的移动应用中经常使用。

    *   `UISwitch`：开关允许用户选择两种状态之一。它始终用于设置应用中答案为`是`/`否`的选项。

    *   `UIProgressView`：此视图可用于显示长时间运行操作的进度，以便用户知道应用程序处于活动状态，尽管在执行操作期间处于等待状态。

    *   `UIActivityIndicatorView`：此控件在用途上与 `UIProgressView` 类似，但在你不知道一个活动需要多长时间时使用。另一方面，如果操作耗时过长，不应显示此控件，因为它几乎无法让用户了解需要多久才能离开这种繁忙状态。

    *   `UIPickerView`：这个多功能 UI 控件可用于从多个项目中选择一个。当点击时，此控件会显示一个大的选择滚轮，使用户更容易点击所需的选项。


    ![A978-1-4302-5906-0_17_Fig1_HTML.jpg](img/A978-1-4302-5906-0_17_Fig1_HTML.jpg)


    图 17-1. 一个 Xcode nib 设计视图，显示了 UIKit 中的一些 UI 控件


    # 设置 Cocoa Touch 项目


    你可以用一种与 Xcode 中其他项目非常相似的方式来创建 iOS 应用程序：通过使用项目向导来确定需要创建的项目类型。要使用项目向导生成新项目，你可以通过菜单进入**文件**
    ➤ **新建** ➤ **项目**（或使用键盘快捷键 `Shift+Command+N`）。将显示项目向导，并列出本地 Xcode 安装中所有可用的项目类型。在
    iOS 类别中选择“应用程序”，你将看到可用的应用程序类型列表，如图 17-2 所示。


    在 iOS 应用程序类型中，以下类型对移动应用开发者感兴趣：


    *   **主从应用程序**：这些应用程序提供一个主视图，您可以在其中汇总应用程序内容，以及一个详细视图，可用于编辑和可视化所选内容部分。此类应用程序仅在
    iPad 上使用，因为 iPhone 通常没有足够的屏幕空间来同时处理主视图和详细视图。

    *   **OpenGL 游戏**：此模板类别用于生成游戏应用。应用程序的设置使您可以访问 OpenGL 视图，这允许开发人员为其游戏创建 2D 和 3D
    图像。

    *   **基于页面的应用程序**：创建一个新的应用程序，其中数据使用书籍隐喻进行显示。应用程序使用 `UIPageViewController`，它自动化了管理与每一页对应的视图的过程。

    *   **单视图应用程序**：此模板生成一个包含单个 `UIView` 的简单应用。

    *   **标签栏应用程序**：生成一个使用标签栏界面显示内容的应用程序。此格式适用于深入访问可以以表格格式表示的数据，例如数据库、电话簿和购物清单等。标签栏应用程序自动提供在标签之间导航的工具，例如转到上一个或下一个屏幕。

    *   **实用工具应用程序**：这是一个只有一个视图的应用程序，可能还有一个以翻转模式显示的信息视图。您在最后一节中创建的示例应用程序使用了此模板。

    *   **空应用程序**：如果前面的类型都不符合您计划的设计，此模板非常有用。您可以通过根据需要添加窗口和视图从头开始。


    选择其中一个选项后，您需要输入有关项目的一些基本信息，例如名称、磁盘上的位置和作者。完成初始数据的输入后，Xcode 将生成一个新项目，其中包含一组类和一个代表移动应用
    UI 视图的 nib 文件。


    除了最初提供的信息外，iOS 应用程序还需要一些系统和 App Store 使用的元数据项。这些项目包括图标、启动图像和 App Store 作品。


    图 17-3 显示了项目摘要屏幕，您可以在其中输入 iOS 所需的许多元数据信息项。


    ![A978-1-4302-5906-0_17_Fig3_HTML.jpg](img/A978-1-4302-5906-0_17_Fig3_HTML.jpg)


    图 17-3. 示例 iOS 应用程序的项目属性


    以下是您应该用来创建自定义应用程序的一些主要属性：

    '
- fmt: "*   `Bundle Identifier`: Indicates the identifier for your application and\
    \ is used as a unique id that can be employed to track your app in the App Store.\n\
    *   `Version`: The version number of an app is visible in the App Store and should\
    \ be updated when a new version is created. I don’t have space to describe the\
    \ process of adding apps to the App Store, but you can use the online resources\
    \ available at [`developer.apple.com`](http://developer.apple.com/) to familiarize\
    \ yourself with the requirements.\n*   `Devices`: Use this option to determine\
    \ if the app will target the iPhone, iPad, or both devices. You can also start\
    \ with one device and later add support to a different type, if you prefer.\n\
    *   `Deployment Target`: Use this option to determine the target version of iOS.\
    \ Devices with an older version of iOS may not be able to run software that targets\
    \ the latest versions. On the other hand, you will be able to use more advanced\
    \ features by selecting a newer target.\n*   `Supported Interface Orientations`:\
    \ Use this option to select the valid orientations for your application.\n*  \
    \ `Status Bar`: Use this option to define if a status bar will be visible. If\
    \ visible, you can select its color and style.\n*   `App Icons`: You can define\
    \ the icons displayed on the device. Icons are even more important on iOS than\
    \ in Mac OS X, since they are the primary means to access your app from the main\
    \ screen. You must supply an icon if you’re planning to submit your app to the\
    \ App Store.\n*   `Launch Images`: These images are used to provide quick feedback\
    \ for users, before your application has loaded. So, if you need a little more\
    \ time during initialization, the launch images will provide an initial screen\
    \ that reflects the appearance of your app.\n\n## Testing with the iOS Simulator\n\
    \nThe iOS Simulator is an important tool for mobile development. The main problem\
    \ it solves is that, unlike desktop applications, you cannot run the software\
    \ you’re creating directly on the same machine where the IDE and the compiler\
    \ are running. A common option is to use a device connected to the desktop. To\
    \ allow for easier testing, however, Apple has released a simulator for iOS devices,\
    \ as shown in Figure [17-4](#A978-1-4302-5906-0_17_Chapter.html#Fig4).\n\n![A978-1-4302-5906-0_17_Fig4_HTML.jpg](A978-1-4302-5906-0_17_Fig4_HTML.jpg)\n\
    \nFigure 17-4.\n\nThe iOS Simulator in iPhone mode, running a sample application\n\
    \nThe iOS Simulator can be used to test most of the aspects of an application,\
    \ such as memory management issues and simple UI interaction, without having to\
    \ load the app into a real iOS device. Also, the simulator allows you to run the\
    \ app in several simulated devices and find possible issues that would be harder\
    \ to track if you had to manually install your app on several different iPhones\
    \ and iPads.\n\nTo start the simulator, you can use the scheme selection tool\
    \ located on the main toolbar. Make sure that you select the simulator scheme\
    \ you want, either iPhone or iPad, in the scheme selection tool. Depending on\
    \ the type of app you created when choosing a new iOS project, you default choice\
    \ may be the iPhone or the iPad, unless you already have a real device connected\
    \ to your Mac.\n\nAfter the proper scheme is selected, you can select Product\
    \ ➤ Run from the main menu (or press the `Command+R` keyboard shortcut) to run\
    \ the project. This will start the iOS Simulator if it is not already active.\
    \ Xcode will transfer your app to the directory location used by the simulator,\
    \ and you application will be started.\n\nThe simulator has several options that\
    \ control how the simulated hardware behaves. At the most basic level, you can\
    \ define what kind of device is being simulated. You can choose between the iPhone\
    \ and the iPad when selecting the schema used on Xcode. Once the simulator has\
    \ started, you have additional options to select the specific hardware configuration\
    \ you want to test. For example, suppose that you started with the simulator for\
    \ the iPhone. Then, you can select the menu Hardware ➤ Device and select one of\
    \ the configurations from the list. For example, my version of the iOS Simulator\
    \ has the following options:\n\n*   iPad\n*   iPad (Retina)\n*   iPhone\n*   iPhone\
    \ (Retina 3.5-inch)\n*   iPhone (Retina 4-inch)\n\nYour options may be different,\
    \ depending on the particular release of the simulator. You can also select the\
    \ iOS version used, such as 5.1 or 6.0, under the menu option Hardware ➤ Version.\n\
    \nAnother thing you can vary in your tests using the simulator is the orientation\
    \ of the device. This allows you to determine if rotation is being correctly handled\
    \ by your code. You can simulate rotation by clicking on the menu Hardware ➤ Rotate\
    \ Right (or using the key combination `Command+→`), or Hardware ➤ Rotate Left\
    \ (key combination `Command+←`). You can also simulate pressing some of the buttons\
    \ that are unique to the iPhone and iPad, such as the Home button (`Shift+Command+H`)\
    \ and the Lock button (`Command+L`).\n\nFinally, you can also simulate some special\
    \ conditions that occur only on such mobile devices. First, you can use the app\
    \ to pretend that a low memory condition was reached. This allows you to detect\
    \ possible problems in the handling of memory problems that might go undetected\
    \ until such a low memory situation occurs. You can also use the simulator to\
    \ fake an in-call, so you can see if your app would have a problem with switching\
    \ from a call to the normal flow of the program and vice versa.\n\n## An Example\
    \ iOS Application\n\nI conclude this chapter with a complete example of an iOS\
    \ application. This sample app simulates a list of index cards that can be helpful\
    \ for students learning topics for an exam or acquiring new words in a foreign\
    \ language.\n\nThe main UI for the app is simple, with buttons for the next and\
    \ previous index card, and an option to reveal the hidden information for the\
    \ card. The app also supports playing a sound file for each index card; this can\
    \ be a useful method for memorization.\n\nIn the next sections, I will introduce\
    \ each of the main files in the application. After each method, I explain what\
    \ it does, when it is called, and which objects are used in the implementation.\
    \ After you go through this application, you will have a good idea of how such\
    \ apps are organized and how they interact with the Cocoa Touch libraries. For\
    \ the complete files for the sample app, check the web page from this book on\
    \ my web site at [`http://coliveira.net`](http://coliveira.net/) .\n\n### The\
    \ Main File\n\nThe main file for the app is responsible for initializing the Cocoa\
    \ Touch libraries and running the main loop. This is not difficult to do, however,\
    \ since you can use the `UIApplicationMain`. The only other work is to make sure\
    \ that the autorelease pool for the application has been initialized. This is\
    \ done by called `alloc`/`init` on class `NSAutoreleasePool`.\n\n```\n//\n// main.m\n\
    #import <UIKit/UIKit.h>\n\nint main(int argc, char *argv[])\n{\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n    int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);\n    [pool release];\n    return retVal;\n}\n```"
