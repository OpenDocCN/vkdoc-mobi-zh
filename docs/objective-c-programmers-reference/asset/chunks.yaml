  trans: '

    # 数组


    数组是存储在连续内存中的一组对象。正如你在第一章中所见，C 语言为原生数组提供了灵活高效的实现。然而，使用数组可能较为困难，特别是对于那些需要显式内存管理的动态数组。`NSArray`类应运而生，旨在为数组对象提供简单而强大的接口。借助`NSArray`，你可以通过消息传递机制对数组执行多种操作。


    首先，考虑如何创建数组并向其中添加元素。创建数组最简单的方法是调用一对`alloc`/`init`方法。一旦数组对象被正确初始化，就可以通过向原始`NSArray`添加新元素来创建新数组。


    ```

    - (void) createSimpleArray

    {

    NSArray *a0 = [[NSArray alloc] init];

    NSArray *a1 = [a0 arrayByAddingObject:@"我的第一个对象"];

    NSArray *a2 = [a1 arrayByAddingObject:@"我的第二个对象"];

    NSLog(@"数组大小为 %d", (int)[a2 count]);

    }

    ```


    函数`createSimpleArray`创建了一个包含两个字符串元素的数组，并将结果数组（命名为`a2`）的大小输出到系统日志。为此，你需要向`NSArray`实例发送`arrayByAddingObject`消息。此外，要获取数组中的元素数量，你需要向结果数组发送`count`消息。


    虽然上述技术可用于向任何数组添加元素，但更简便的做法是在一步内同时添加两个元素。这可以通过使用`NSArray`类的一个特殊版本的`init`方法来实现，如下所示：


    ```

    - (void) createSimpleArray2

    {

    NSArray *array = [[NSArray alloc] initWithObjects:

    @"我的第一个对象",

    @"我的第二个对象", nil];

    NSLog(@"数组大小为 %d", (int)[array count]);

    }

    ```


    虽然两个例子的结果相同，但函数`createSimpleArray2`使用了一个特殊版本的`init`方法。`initWithObjects:`方法能够接收一组对象作为参数。你只需注意一个细节：最后一个元素必须是`nil`，因为这是表示序列结束的哨兵值。然而，`nil`值不会被存储为数组的一部分。


    对`initWithObjects:`实例方法的描述揭示了`NSArray`类的一个非常重要的特性：该类只接受非`nil`值作为数组成员。这意味着，在将`nil`元素存入`NSArray`（或任何其他容器）之前，必须将其转换为其他表示形式。为此，有一个名为`NSNull`的类，它将`nil`（或`NULL`）表示为单个对象。


    通过`initWithObjects:`消息向数组添加元素是完成这项基本任务的简单方法。然而，在同一行中使用两条消息仍然有些繁琐。为简化这一常见工作流程，`NSArray`还提供了一个功能类似的类方法，即`arrayWithObjects:`方法。该方法的优点在于，你可以直接将元素序列传递给`NSArray`类，而无需先调用`alloc`。这省去了额外的方法调用，从而简化了代码。上述例子可以更简洁地表示为：


    ```

    - (void) createSimpleArray3

    {

    NSArray *array = [NSArray arrayWithObjects:

    @"我的第一个对象",

    @"我的第二个对象", nil];

    NSLog(@"数组大小为 %d", (int)[array count]);

    }

    ```


    `arrayWithObjects:`或`initWithObjects:`方法可用于创建包含任意数量元素的数组。只要以`nil`结束元素列表，条目数量就没有限制。然而，有些情况下你可能只想创建一个只包含一个元素的数组。这可以通过`arrayWithObject:`或`initWithObject:`方法实现。它们与你之前看到的方法类似，区别在于它们只接受单个元素。


    ```

    - (void) createSimpleArray4

    {

    NSArray *array = [NSArray arrayWithObject:

    @"我的单一对象"];

    NSLog(@"数组大小为 %d", (int)[array count]);

    }

    ```


    在以数组创建为主题时，请注意还有其他版本的`init`和`arrayWith`方法可与`NSArray`一起使用。例如，你可以用另一个先前创建的数组来初始化一个`NSArray`。假设你想要复制上面构建的数组，可以按如下方式操作：


    ```

    - (void) createArrayAndCopy

    {

    NSArray *array = [NSArray arrayWithObjects:

    @"我的第一个对象",

    @"我的第二个对象", nil];

    NSLog(@"数组大小为 %d", (int)[array count]);

    NSArray *copy = [NSArray arrayWithArray:array];

    NSLog(@"复制数组的大小也是 %d", (int)[copy count]);

    }

    ```


    最后，你可能有兴趣从现有的 C 数组创建数组。`NSArray`也支持这一点，但你需要同时提供数组中的元素数量。这是必需的，因为 C 数组本质上等同于指针，因此它们不存储元素数量。


    ```

    - (void) createArrayWithCArray

    {

    NSString *orig_array[] = { @"Obj1", @"Obj2" };

    NSArray *array = [NSArray arrayWithObjects:orig_array count:2];

    NSLog(@"数组大小为 %d", (int)[array count]);

    }

    ```


    在此例的第一行，你创建了一个包含两个对象的 C 数组。第一行的声明意味着你正在创建一个由`NSString *`（字符串对象使用的类型）组成的数组（用`[]`表示）。花括号内的记法是
    C 函数用于初始化相同元素数组的方式。接下来，你将数组名称（如第一章所述，它等同于指针）传递给`arrayWithObjects:count:`方法。


    了解所有这些创建`NSArray`对象的方法很有用，因为数据可能以多种格式存在。如果仅仅为了使用`NSArray`而将所有这些不同的数据格式转换为单一格式，将会非常困难。而且，我们尚未穷尽所有转换可能性。例如，创建`NSArray`的其他方式包括直接从文件读取数据（参见`arrayWithContentsOfFile:`）或从
    URL 读取数据（参见`arrayWithContentsOfURL:`）。

    '
- fmt: "# Adding Other Object Types to an `NSArray`\n\nIn the examples you have seen\
    \ so far, all the objects added to an `NSArray` are of type `NSString`. I have\
    \ done this for simplicity only. In fact, `NSArray` is a dynamic container, which\
    \ means that you can add objects of any type to an array. Here is an example of\
    \ how this can be done:\n\n```\n- (void) createArrayWithDiffferentObjects\n\n\
    {\n\n        NSNumber *num1 = [NSNumber numberWithInt:42];\n\n        NSArray\
    \ *array = [NSArray arrayWithObjects:num1, @\"str2\", nil];\n\n        NSLog(@\"\
    The size of the array is %d\", (int)[array count]);\n\n}\n```\n\nThe first object\
    \ is an `NSNumber`, while the second is an `NSString`. They are now part of the\
    \ same array. The only problem raised by such an array is how to distinguish elements\
    \ based on their type. The answer to this question depends on what you want to\
    \ do with the members of this array. If you are going to use only generic messages\
    \ such as `description`, then there is no problem with mixing objects of different\
    \ types.\n\nThe safest way to work with `NSArray` collections, however, is to\
    \ create collections based on their types. For example, if you are creating an\
    \ application that deals with geometric shapes, some of your arrays should contain\
    \ shapes only. This is where inheritance gives you an advantage in handling dynamic\
    \ objects: a set of geometric shapes can have a common class, used to classify\
    \ different shapes.\n\nFor example, shapes such as `Oval` or `Rectangle` should\
    \ be subclasses of a generic `Shape` class. Using this superclass, it is possible\
    \ to restrict the elements in an `NSArray` to objects deriving of `Shape`. Thus,\
    \ it would be possible to send messages that are specific to a `Shape`, and understood\
    \ by them all.\n\nIf you are mixing objects of different types that are not related\
    \ by a superclass, then you need some other way to determine which object is from\
    \ a particular class. Although this is not recommended, there are ways to determine\
    \ if an object is of a particular class. First of all, every object has an instance\
    \ method called `class`, which returns a representation of the class. You could,\
    \ in principle, compare the class returned by an object to a particular class\
    \ representation, like so:\n\n```\n- (void) checkPersonClass:(Person *)person\n\
    \n{\n\n        if ([person class] == [Employee class])\n\n        {\n\n      \
    \          NSLog(@\"This is an Employee\");\n\n        }\n\n        else\n\n \
    \       {\n\n                NSLog(@\"This is not an Employee\");\n\n        }\n\
    \n}\n```\n\nWhile this may work in some situations, it is also a dangerous way\
    \ of solving the problem. The main issue is that checking for a particular class\
    \ will also exclude objects that are in a subclass. For example, if you are looking\
    \ for objects of class `Shape`, you will miss objects of type `Rectangle`. However,\
    \ `Rectangles` are also a kind of `Shape`, and the resulting code will stop working\
    \ on that situation.\n\nTo avoid this problem, you can use a method from `NSObject`\
    \ called `isSubclassOfClass:`. This method is able to test if a given class is\
    \ identical or a subclass of a given class. The following example shows how to\
    \ test if an object is an `NSNumber` or an instance of a subclass of `NSNumber`:\n\
    \n```\n- (void) checkClass2\n\n{\n\n        NSNumber *num1 = [NSNumber numberWithInt:42];\n\
    \n        // check if the object is a number of one of its subclasses\n\n    \
    \    if ([[num1 class] isSubclassOfClass: [NSNumber class]])\n\n        {\n\n\
    \                NSLog(@\"This is a NSNumber\");\n\n        }\n\n        else\n\
    \n        {\n\n                NSLog(@\"This is not a NSNumber\");\n\n       \
    \ }\n\n}\n```\n\nThe call to `class` is necessary to return the class of the object.\
    \ On the other hand, `class` is also sent to `NSNumber` to request the class object\
    \ for that class. Another way of getting the same information is using the `isKindOfClass`\
    \ method, which is derived from `NSObject`.\n\n## Using the Literal Notation\n\
    \nIf you have access to Xcode 4.5 or later, you should be able to use the new\
    \ literal notation introduced by Apple compilers. The traditional way to create\
    \ arrays involves the use of `alloc`/`init`, or one of the helper class methods\
    \ discussed above. While such initialization techniques work well, they are still\
    \ cumbersome when compared to the initialization of native types, such as integers\
    \ or native arrays.\n\nThe new literal notation makes it as easy to initialize\
    \ an `NSArray` as a native type. Instead of sending messages to the `NSArray`\
    \ class, the new notation uses a simple syntax to handle the process of creating\
    \ an array. Here is an example:\n\n```\n- (void) createArrayWithNewSyntax\n\n\
    {\n\n        NSArray *array = @[@\"obj1\", @\"obj2\" ];\n\n        NSLog(@\"The\
    \ size of the array is %d\", (int)[array count]);\n\n}\n```\n\nNotice that the\
    \ result this function produces is similar to what you have seen in previous examples.\
    \ However, by means of the `@[` notation, an `NSArray` is created automatically\
    \ by the compiler. There is no need to send messages to allocate or initialize\
    \ the resulting object, since these operations will be performed automatically\
    \ by the generated code.\n\nOne additional advantage of the new notation for array\
    \ initialization is the reduction in potential errors. By using a simpler syntax,\
    \ it is easier to spot simple mistakes, such as duplicate objects or `nil` elements,\
    \ which could be otherwise introduced in the original notation.\n\nOn the other\
    \ hand, the fact is that the new syntax doesn’t totally remove the need for `NSArray`\
    \ initializers. One example is using an existing C array as the initial contents\
    \ of an `NSArray`. In that case, it is still necessary to use the form `arrayWithArray:`,\
    \ which allows a C-based array to be passed, along with the array size."
  raw: '## Adding Other Object Types to an NSArray


    In the examples you have seen so far, all the objects added to an `NSArray` are
    of type `NSString`. I have done this for simplicity only. In fact, `NSArray` is
    a dynamic container, which means that you can add objects of any type to an array.
    Here is an example of how this can be done:


    `- (void) createArrayWithDiffferentObjects`


    `{`


            `NSNumber *num1 = [NSNumber numberWithInt:42];`


            `NSArray *array = [NSArray arrayWithObjects:num1, @"str2", nil];`


            `NSLog(@"The size of the array is %d", (int)[array count]);`


    `}`


    The first object is an `NSNumber`, while the second is an `NSString`. They are
    now part of the same array. The only problem raised by such an array is how to
    distinguish elements based on their type. The answer to this question depends
    on what you want to do with the members of this array. If you are going to use
    only generic messages such as `description`, then there is no problem with mixing
    objects of different types.


    The safest way to work with `NSArray` collections, however, is to create collections
    based on their types. For example, if you are creating an application that deals
    with geometric shapes, some of your arrays should contain shapes only. This is
    where inheritance gives you an advantage in handling dynamic objects: a set of
    geometric shapes can have a common class, used to classify different shapes.


    For example, shapes such as `Oval` or `Rectangle` should be subclasses of a generic
    `Shape` class. Using this superclass, it is possible to restrict the elements
    in an `NSArray` to objects deriving of `Shape`. Thus, it would be possible to
    send messages that are specific to a `Shape`, and understood by them all.


    If you are mixing objects of different types that are not related by a superclass,
    then you need some other way to determine which object is from a particular class.
    Although this is not recommended, there are ways to determine if an object is
    of a particular class. First of all, every object has an instance method called
    `class`, which returns a representation of the class. You could, in principle,
    compare the class returned by an object to a particular class representation,
    like so:


    `- (void) checkPersonClass:(Person *)person`


    `{`


            `if ([person class] == [Employee class])`


            `{`


                    `NSLog(@"This is an Employee");`


            `}`


            `else`


            `{`


                    `NSLog(@"This is not an Employee");`


            `}`


    `}`


    While this may work in some situations, it is also a dangerous way of solving
    the problem. The main issue is that checking for a particular class will also
    exclude objects that are in a subclass. For example, if you are looking for objects
    of class `Shape`, you will miss objects of type `Rectangle`. However, `Rectangles`
    are also a kind of `Shape`, and the resulting code will stop working on that situation.


    To avoid this problem, you can use a method from `NSObject` called `isSubclassOfClass:`.
    This method is able to test if a given class is identical or a subclass of a given
    class. The following example shows how to test if an object is an `NSNumber` or
    an instance of a subclass of `NSNumber`:


    `- (void) checkClass2`


    `{`


            `NSNumber *num1 = [NSNumber numberWithInt:42];`


            `// check if the object is a number of one of its subclasses`


            `if ([[num1 class] isSubclassOfClass: [NSNumber class]])`


            `{`


                    `NSLog(@"This is a NSNumber");`


            `}`


            `else`


            `{`


                    `NSLog(@"This is not a NSNumber");`


            `}`


    `}`


    The call to `class` is necessary to return the class of the object. On the other
    hand, `class` is also sent to `NSNumber` to request the class object for that
    class. Another way of getting the same information is using the `isKindOfClass`
    method, which is derived from `NSObject`.


    ### Using the Literal Notation


    If you have access to Xcode 4.5 or later, you should be able to use the new literal
    notation introduced by Apple compilers. The traditional way to create arrays involves
    the use of `alloc`/`init`, or one of the helper class methods discussed above.
    While such initialization techniques work well, they are still cumbersome when
    compared to the initialization of native types, such as integers or native arrays.


    The new literal notation makes it as easy to initialize an `NSArray` as a native
    type. Instead of sending messages to the `NSArray` class, the new notation uses
    a simple syntax to handle the process of creating an array. Here is an example:


    `- (void) createArrayWithNewSyntax`


    `{`


            `NSArray *array = @[@"obj1", @"obj2" ];`


            `NSLog(@"The size of the array is %d", (int)[array count]);`


    `}`


    Notice that the result this function produces is similar to what you have seen
    in previous examples. However, by means of the `@[` notation, an `NSArray` is
    created automatically by the compiler. There is no need to send messages to allocate
    or initialize the resulting object, since these operations will be performed automatically
    by the generated code.


    One additional advantage of the new notation for array initialization is the reduction
    in potential errors. By using a simpler syntax, it is easier to spot simple mistakes,
    such as duplicate objects or nil elements, which could be otherwise introduced
    in the original notation.


    On the other hand, the fact is that the new syntax doesn’t totally remove the
    need for `NSArray` initializers. One example is using an existing C array as the
    initial contents of an `NSArray`. In that case, it is still necessary to use the
    form `arrayWithArray:`, which allows a C-based array to be passed, along with
    the array size.'
  trans: "\n# 向 `NSArray` 添加其他对象类型\n\n在目前看到的示例中，添加到 `NSArray` 的所有对象均为 `NSString` 类型。我这样做只是为了简单起见。实际上，`NSArray`\
    \ 是一个动态容器，这意味着你可以向数组添加任何类型的对象。以下是一个实现示例：\n\n```\n- (void) createArrayWithDiffferentObjects\n\
    \n{\n\n        NSNumber *num1 = [NSNumber numberWithInt:42];\n\n        NSArray\
    \ *array = [NSArray arrayWithObjects:num1, @\"str2\", nil];\n\n        NSLog(@\"\
    数组大小为 %d\", (int)[array count]);\n\n}\n```\n\n第一个对象是 `NSNumber`，第二个是 `NSString`。它们现在同属一个数组。这种数组带来的唯一问题是如何根据元素类型来区分它们。这个问题的答案取决于你想对该数组成员执行什么操作。如果你只打算使用通用消息（如\
    \ `description`），那么混合不同类型的对象是没有问题的。\n\n然而，使用 `NSArray` 集合最安全的方式是根据类型创建集合。例如，如果你正在开发一个处理几何图形的应用程序，有些数组应该只包含图形。这正是继承在处理动态对象时的优势所在：一组几何图形可以拥有一个公共类，用于对不同的形状进行分类。\n\
    \n例如，`Oval` 或 `Rectangle` 这样的形状应该是通用 `Shape` 类的子类。使用这个超类，就可以将 `NSArray` 中的元素限制为派生自\
    \ `Shape` 的对象。这样，就可以发送 `Shape` 专用的、且能被所有子类理解的消息。\n\n如果你混合了没有超类关联的不同类型对象，则需要用其他方式来确定某个对象属于哪个特定类。虽然不推荐这样做，但确实有方法可以判断对象是否属于特定类。首先，每个对象都有一个名为\
    \ `class` 的实例方法，该方法返回类的表示。原则上，你可以将对象返回的类与特定类表示进行比较，如下所示：\n\n```\n- (void) checkPersonClass:(Person\
    \ *)person\n\n{\n\n        if ([person class] == [Employee class])\n\n       \
    \ {\n\n                NSLog(@\"这是一个 Employee\");\n\n        }\n\n        else\n\
    \n        {\n\n                NSLog(@\"这不是一个 Employee\");\n\n        }\n\n}\n\
    ```\n\n虽然这种方法在某些情况下可能有效，但它也是一种危险的解决问题的方式。主要问题在于，检查特定类也会排除属于子类的对象。例如，如果你要查找类型为\
    \ `Shape` 的对象，就会遗漏类型为 `Rectangle` 的对象。然而，`Rectangle` 也是一种 `Shape`，这类代码在这种情况下将无法正常工作。\n\
    \n为了避免这个问题，你可以使用 `NSObject` 的一个方法 `isSubclassOfClass:`。该方法能够测试给定类是否与指定类相同，或者为其子类。以下示例展示了如何测试某个对象是\
    \ `NSNumber` 还是 `NSNumber` 子类的实例：\n\n```\n- (void) checkClass2\n\n{\n\n      \
    \  NSNumber *num1 = [NSNumber numberWithInt:42];\n\n        // 检查该对象是否为 NSNumber\
    \ 或其子类的实例\n\n        if ([[num1 class] isSubclassOfClass: [NSNumber class]])\n\
    \n        {\n\n                NSLog(@\"这是一个 NSNumber\");\n\n        }\n\n   \
    \     else\n\n        {\n\n                NSLog(@\"这不是一个 NSNumber\");\n\n   \
    \     }\n\n}\n```\n\n调用 `class` 是为了获取对象的类。另一方面，`class` 也发送给 `NSNumber` 以获取该类的类对象。获取相同信息的另一种方法是使用\
    \ `isKindOfClass` 方法，该方法衍生自 `NSObject`。\n\n## 使用字面量表示法\n\n如果你使用的是 Xcode 4.5 或更高版本，则应该能够使用\
    \ Apple 编译器引入的新字面量表示法。传统的创建数组方式涉及使用 `alloc`/`init`，或前面讨论过的辅助类方法。虽然这些初始化技术运行良好，但与原生类型（如整数或原生数组）的初始化相比，它们仍然显得繁琐。\n\
    \n新的字面量表示法使初始化 `NSArray` 变得像初始化原生类型一样简单。新表示法不是向 `NSArray` 类发送消息，而是使用简单的语法来处理数组的创建过程。示例如下：\n\
    \n```\n- (void) createArrayWithNewSyntax\n\n{\n\n        NSArray *array = @[@\"\
    obj1\", @\"obj2\" ];\n\n        NSLog(@\"数组大小为 %d\", (int)[array count]);\n\n\
    }\n```\n\n请注意，这个函数产生的结果与你在之前示例中看到的结果类似。然而，通过 `@[` 标记，编译器会自动创建一个 `NSArray`。无需发送消息来分配或初始化结果对象，因为这些操作将由生成的代码自动执行。\n\
    \n数组初始化新表示法的另一个优点是可以减少潜在错误。通过使用更简单的语法，更容易发现简单错误，例如重复对象或 `nil` 元素，而这些错误在使用原始表示法时可能会被引入。\n\
    \n另一方面，新语法并不能完全消除对 `NSArray` 初始化器的需求。一个例子是将现有的 C 数组用作 `NSArray` 的初始内容。在这种情况下，仍然需要使用\
    \ `arrayWithArray:` 形式，该形式允许传入一个基于 C 的数组及其大小。\n"
- fmt: "# Accessing an Array\n\nIn most programs, creating an array is just the beginning\
    \ of the process. The other side of the coin is to access data stored in the resulting\
    \ container. `NSArray` provides a simple way to access data through the `objectAtIndex:`\
    \ method. With that method, you can pass the zero-based index of the stored object.\
    \ Consider the following example:\n\n```\n- (void) accessArrayData\n{\n      \
    \  NSArray *array = @[@\"obj1\", @\"obj2\" ];\n        NSLog(@\"The second element\
    \ of the array is %@\", [array objectAtIndex:1]);\n}\n```\n\nThe result of calling\
    \ `objectAtIndex:` is the object that was stored at the requested position. Since\
    \ the index is zero-based, requesting the index 1 will return the second element,\
    \ the same convention used for native arrays in C.\n\nWhile `objectAtIndex:` is\
    \ powerful enough to provide access to any element, there are other ways to achieve\
    \ this objective. For example, if you are using the array as a simple queue (last-in/first-out),\
    \ you may be interested in the last element only.\n\n```\n- (void) accessLastElement\n\
    {\n        NSArray *array = @[@\"obj1\", @\"obj2\" ];\n        NSLog(@\"The second\
    \ element of the array is %@\", [array lastObject]);\n}\n```\n\nSo the example\
    \ above is equivalent to the previous one. Another way to access the elements\
    \ of an array is by first comparing them to other existing objects. In that case,\
    \ you may want to find the index of the object that has been previously stored\
    \ in the array. This can be easily done with the `indexOfObject:` method, like\
    \ so:\n\n```\n- (void) getIndexOfElement\n{\n        NSString *secondObj = @\"\
    obj2\";\n        NSArray *array = @[@\"obj1\", secondObj, @\"obj3\" ];\n     \
    \   int position = (int)[array indexOfObject:secondObj];\n        NSLog(@\"The\
    \ index of the second element is %d\", position);\n}\n```\n\nIn the first line\
    \ of the function, you are creating a new object of type `NSString`. The second\
    \ line creates an array that contains that object. The third line sends a message\
    \ to the array, asking for the position of the known object, which is then printed\
    \ to the log.\n\nFinally, the new syntax introduced for `NSArray` and other containers\
    \ has also a simplified way of accessing elements. If you have an `NSArray`, now\
    \ it is possible to directly access elements with the same syntax of native arrays.\n\
    \n```\n- (void) accessWithNewSyntax\n{\n        NSArray *array = @[@\"obj1\",\
    \ @\"obj2\" ];\n        NSLog(@\"The second element of the array is %@\", array[1]);\n\
    }\n```\n\nBehind the scenes, the compiler is generating code similar to what you\
    \ saw before, with calls to `objectAtIndex:`. However, the syntax makes it much\
    \ easier to visualize the way you are accessing elements, which is a big advantage\
    \ for code maintenance.\n\n# Mutable Arrays\n\nOne issue that surprises programmers\
    \ new to Objective-C is that a standard `NSArray` object cannot be modified. Once\
    \ an object is created with one of the `init` functions described in the previous\
    \ section, the only thing you can do is to access data, or request a new array\
    \ based on the original content. In other words, an `NSArray` is an immutable\
    \ data structure.\n\nThe reason for the immutability of `NSArray` is that such\
    \ objects are optimized for fast access. Updates to an array, such as adding and\
    \ removing elements, have the potential to generate new allocations and/or memory\
    \ moves. Given the simple implementation of `NSArray`, this is considered to be\
    \ undesirable. To allow for modifications, however, `NSArray` was subclassed into\
    \ a modifiable form, the `NSMutableArray` class.\n\nEverything that I said about\
    \ the functionality of `NSArray` is still true for an `NSMutableArray`. However,\
    \ the later is also able to add and remove elements, among the other important\
    \ tricks it has learned. Creating an `NSMutableArray` is very much like what you\
    \ did for an `NSArray`.\n\n```\n- (void) createMutableArray\n{\n        NSMutableArray\
    \ *array = [NSMutableArray arrayWithObjects:\n                               \
    \                          @\"My First Object\",\n                           \
    \                              @\"My Second Object\", nil];\n        NSLog(@\"\
    The second element of the array is %@\", [array objectAtIndex:1]);\n}\n```\n\n\
    An `NSMutableArray`, however, is able to add elements at any time, not only during\
    \ creation. So, the same mutable array could be created using the following code:\n\
    \n```\n- (void) addElementsToArray\n{\n        NSMutableArray *array = [[NSMutableArray\
    \ alloc] init];\n        [array addObject: @\"My First Object\"];\n        [array\
    \ addObject: @\"My Second Object\"];\n        NSLog(@\"The second element of the\
    \ array is %@\", [array objectAtIndex:1]);\n}\n```\n\nAnother operation you can\
    \ perform in such a mutable array is element removal. For example, you can remove\
    \ any element by providing the index for the desired object.\n\n```\n- (void)\
    \ addAndRemoveArrayElements\n{\n        NSMutableArray *array = [[NSMutableArray\
    \ alloc] init];\n        [array addObject: @\"My First Object\"];\n        [array\
    \ addObject: @\"My Second Object\"];\n        NSLog(@\"The second element of the\
    \ array is %@\", [array objectAtIndex:1]);\n        [array removeObjectAtIndex:1];\n\
    \        NSLog(@\"The array now has %d elements\", (int)[array count]);\n}\n```\n\
    \nAnother use of a mutable array is as a simple queue data structure. A queue\
    \ is a useful data storage mechanism that uses the first-in/first-out (FIFO) strategy.\
    \ There are a large number of algorithms that benefit from the use of FIFO data\
    \ structures, including language parsers and simulation systems, among others.\
    \ To implement a queue using an `NSMutableArray`, you can use the methods `addObject:`\
    \ and `removeLastObject`. Here is how you can enqueue and dequeue elements into\
    \ this kind of data structure:\n\n```\n- (void) enqueue:(NSMutableArray *)array\
    \ forId:(id) object\n{\n        [array addObject: object];\n}\n\n- (id) dequeue:(NSMutableArray\
    \ *)array\n{\n        id element = [array lastObject];\n        [array removeLastObject];\n\
    \        return element;\n}\n```"
  raw: '## Accessing an Array


    In most programs, creating an array is just the beginning of the process. The
    other side of the coin is to access data stored in the resulting container. `NSArray`
    provides a simple way to access data through the `objectAtIndex:` method. With
    that method, you can pass the zero-based index of the stored object. Consider
    the following example:


    `- (void) accessArrayData`


    `{`


            `NSArray *array = @[@"obj1", @"obj2" ];`


            `NSLog(@"The second element of the array is %@", [array objectAtIndex:1]);`


    `}`


    The result of calling `objectAtIndex:` is the object that was stored at the requested
    position. Since the index is zero-based, requesting the index 1 will return the
    second element, the same convention used for native arrays in C.


    While `objectAtIndex:` is powerful enough to provide access to any element, there
    are other ways to achieve this objective. For example, if you are using the array
    as a simple queue (last-in/first-out), you may be interested in the last element
    only.


    `- (void) accessLastElement`


    `{`


            `NSArray *array = @[@"obj1", @"obj2" ];`


            `NSLog(@"The second element of the array is %@", [array lastObject]);`


    `}`


    So the example above is equivalent to the previous one. Another way to access
    the elements of an array is by first comparing them to other existing objects.
    In that case, you may want to find the index of the object that has been previously
    stored in the array. This can be easily done with the `indexOfObject:` method,
    like so:


    `- (void) getIndexOfElement`


    `{`


            `NSString *secondObj = @"obj2";`


            `NSArray *array = @[@"obj1", secondObj, @"obj3" ];`


            `int position = (int)[array indexOfObject:secondObj];`


            `NSLog(@"The index of the second element is %d", position);`


    `}`


    In the first line of the function, you are creating a new object of type `NSString`.
    The second line creates an array that contains that object. The third line sends
    a message to the array, asking for the position of the known object, which is
    then printed to the log.


    Finally, the new syntax introduced for `NSArray` and other containers has also
    a simplified way of accessing elements. If you have an `NSArray`, now it is possible
    to directly access elements with the same syntax of native arrays.


    `- (void) accessWithNewSyntax`


    `{`


            `NSArray *array = @[@"obj1", @"obj2" ];`


            `NSLog(@"The second element of the array is %@", array[1]);`


    `}`


    Behind the scenes, the compiler is generating code similar to what you saw before,
    with calls to `objectAtIndex:`. However, the syntax makes it much easier to visualize
    the way you are accessing elements, which is a big advantage for code maintenance.


    ## Mutable Arrays


    One issue that surprises programmers new to Objective-C is that a standard `NSArray`
    object cannot be modified. Once an object is created with one of the `init` functions
    described in the previous section, the only thing you can do is to access data,
    or request a new array based on the original content. In other words, an `NSArray`
    is an immutable data structure.


    The reason for the immutability of `NSArray` is that such objects are optimized
    for fast access. Updates to an array, such as adding and removing elements, have
    the potential to generate new allocations and/or memory moves. Given the simple
    implementation of `NSArray`, this is considered to be undesirable. To allow for
    modifications, however, `NSArray` was subclassed into a modifiable form, the `NSMutableArray`
    class.


    Everything that I said about the functionality of `NSArray` is still true for
    an `NSMutableArray`. However, the later is also able to add and remove elements,
    among the other important tricks it has learned. Creating an `NSMutableArray`
    is very much like what you did for an `NSArray`.


    `- (void) createMutableArray`


    `{`


            `NSMutableArray *array = [NSMutableArray arrayWithObjects:`


                                                             `@"My First Object",`


                                                             `@"My Second Object",
    nil];`


            `NSLog(@"The second element of the array is %@", [array objectAtIndex:1]);`


    `}`


    An `NSMutableArray`, however, is able to add elements at any time, not only during
    creation. So, the same mutable array could be created using the following code:


    `- (void) addElementsToArray`


    `{`


            `NSMutableArray *array = [[NSMutableArray alloc] init];`


            `[array addObject: @"My First Object"];`


            `[array addObject: @"My Second Object"];`


            `NSLog(@"The second element of the array is %@", [array objectAtIndex:1]);`


    `}`


    Another operation you can perform in such a mutable array is element removal.
    For example, you can remove any element by providing the index for the desired
    object.


    `- (void) addAndRemoveArrayElements`


    `{`


            `NSMutableArray *array = [[NSMutableArray alloc] init];`


            `[array addObject: @"My First Object"];`


            `[array addObject: @"My Second Object"];`


            `NSLog(@"The second element of the array is %@", [array objectAtIndex:1]);`


            `[array removeObjectAtIndex:1];`


            `NSLog(@"The array now has %d elements", (int)[array count]);`


    `}`


    Another use of a mutable array is as a simple queue data structure. A queue is
    a useful data storage mechanism that uses the first-in/first-out (FIFO) strategy.
    There are a large number of algorithms that benefit from the use of FIFO data
    structures, including language parsers and simulation systems, among others. To
    implement a queue using an `NSMutableArray`, you can use the methods `addObject:`
    and `removeLastObject`. Here is how you can enqueue and dequeue elements into
    this kind of data structure:


    `- (void) enqueue:(NSMutableArray *)array forId:(id) object`


    `{`


            `[array addObject: object];`


    `}`


    `- (id) dequeue:(NSMutableArray *)array`


    `{`


            `id element = [array lastObject];`


            `[array removeLastObject];`


            `return element;`


    `}`'
  trans: "\n# 访问数组\n\n在大多数程序中，创建数组只是过程的开始。另一方面是访问存储在结果容器中的数据。`NSArray` 通过 `objectAtIndex:`\
    \ 方法提供了一种简单的数据访问方式。使用该方法，你可以传入要访问对象基于零的索引。考虑以下示例：\n\n```\n- (void) accessArrayData\n\
    {\n        NSArray *array = @[@\"obj1\", @\"obj2\" ];\n        NSLog(@\"数组的第二个元素是\
    \ %@\", [array objectAtIndex:1]);\n}\n```\n\n调用 `objectAtIndex:` 的结果是存储在指定位置的对象。由于索引从零开始，请求索引\
    \ 1 将返回第二个元素，这与 C 语言中本地数组的约定相同。\n\n虽然 `objectAtIndex:` 足以提供对任何元素的访问，但还有其他方法可以实现这一目标。例如，如果你将数组用作简单队列（后进先出），你可能只对最后一个元素感兴趣。\n\
    \n```\n- (void) accessLastElement\n{\n        NSArray *array = @[@\"obj1\", @\"\
    obj2\" ];\n        NSLog(@\"数组的第二个元素是 %@\", [array lastObject]);\n}\n```\n\n因此上面的示例与前一个等效。访问数组元素的另一种方法是先将它们与其他现有对象进行比较。在这种情况下，你可能希望找到先前存储在数组中的对象的索引。使用\
    \ `indexOfObject:` 方法可以轻松实现这一点，如下所示：\n\n```\n- (void) getIndexOfElement\n{\n \
    \       NSString *secondObj = @\"obj2\";\n        NSArray *array = @[@\"obj1\"\
    , secondObj, @\"obj3\" ];\n        int position = (int)[array indexOfObject:secondObj];\n\
    \        NSLog(@\"第二个元素的索引是 %d\", position);\n}\n```\n\n在函数的第一行，你创建了一个 `NSString`\
    \ 类型的新对象。第二行创建了一个包含该对象的数组。第三行向数组发送消息，询问已知对象的位置，然后将其打印到日志中。\n\n最后，为 `NSArray` 和其他容器引入的新语法也提供了一种简化的元素访问方式。如果你有一个\
    \ `NSArray`，现在可以直接使用与本地数组相同的语法访问元素。\n\n```\n- (void) accessWithNewSyntax\n{\n\
    \        NSArray *array = @[@\"obj1\", @\"obj2\" ];\n        NSLog(@\"数组的第二个元素是\
    \ %@\", array[1]);\n}\n```\n\n在幕后，编译器生成的代码与你之前看到的类似，会调用 `objectAtIndex:`。然而，这种语法使得你访问元素的方式更加直观，这对于代码维护是一个巨大的优势。\n\
    \n# 可变数组\n\n让初次接触 Objective-C 的程序员感到惊讶的一个问题是，标准的 `NSArray` 对象是不可修改的。一旦使用上一节中描述的某个\
    \ `init` 函数创建了对象，你唯一能做的就是访问数据，或者基于原始内容请求一个新数组。换句话说，`NSArray` 是一种不可变的数据结构。\n\n\
    `NSArray` 不可变的原因是此类对象针对快速访问进行了优化。对数组的更新操作，例如添加和删除元素，可能会产生新的内存分配和/或内存移动。鉴于 `NSArray`\
    \ 的简单实现，这被认为是不理想的。然而，为了允许修改，`NSArray` 被子类化为一种可修改的形式，即 `NSMutableArray` 类。\n\n\
    我之前所说的关于 `NSArray` 的功能对于 `NSMutableArray` 仍然适用。然而，后者还能够添加和删除元素，以及它学到的其他重要技巧。创建\
    \ `NSMutableArray` 与你创建 `NSArray` 的方式非常相似。\n\n```\n- (void) createMutableArray\n\
    {\n        NSMutableArray *array = [NSMutableArray arrayWithObjects:\n       \
    \                                                  @\"我的第一个对象\",\n           \
    \                                              @\"我的第二个对象\", nil];\n        NSLog(@\"\
    数组的第二个元素是 %@\", [array objectAtIndex:1]);\n}\n```\n\n然而，一个 `NSMutableArray` 能够随时添加元素，而不仅仅是在创建时。因此，可以使用以下代码创建相同的可变数组：\n\
    \n```\n- (void) addElementsToArray\n{\n        NSMutableArray *array = [[NSMutableArray\
    \ alloc] init];\n        [array addObject: @\"我的第一个对象\"];\n        [array addObject:\
    \ @\"我的第二个对象\"];\n        NSLog(@\"数组的第二个元素是 %@\", [array objectAtIndex:1]);\n\
    }\n```\n\n在这样一个可变数组中，你可以执行的另一个操作是移除元素。例如，你可以通过提供所需对象的索引来移除任何元素。\n\n```\n- (void)\
    \ addAndRemoveArrayElements\n{\n        NSMutableArray *array = [[NSMutableArray\
    \ alloc] init];\n        [array addObject: @\"我的第一个对象\"];\n        [array addObject:\
    \ @\"我的第二个对象\"];\n        NSLog(@\"数组的第二个元素是 %@\", [array objectAtIndex:1]);\n\
    \        [array removeObjectAtIndex:1];\n        NSLog(@\"数组现在有 %d 个元素\", (int)[array\
    \ count]);\n}\n```\n\n可变数组的另一个用途是作为简单的队列数据结构。队列是一种有用的数据存储机制，它使用先进先出策略。有大量算法受益于使用先进先出数据结构，包括语言解析器和模拟系统等。要使用\
    \ `NSMutableArray` 实现队列，你可以使用 `addObject:` 和 `removeLastObject` 方法。以下是在这种数据结构中入队和出队元素的方法：\n\
    \n```\n- (void) enqueue:(NSMutableArray *)array forId:(id) object\n{\n       \
    \ [array addObject: object];\n}\n\n- (id) dequeue:(NSMutableArray *)array\n{\n\
    \        id element = [array lastObject];\n        [array removeLastObject];\n\
    \        return element;\n}\n```\n"
- fmt: "# Dictionaries\n\nA dictionary is a data structure used to maintain a relationship\
    \ between a set of keys and their corresponding values. You can think of a dictionary\
    \ as a generalized array, where the keys may be not just integer numbers, but\
    \ also any type of object. Therefore it is possible to use a dictionary to maintain\
    \ a set of related objects, such as the list of countries and their capital cities:\
    \ `(\"Canada\",\"Ottawa\")`, `(\"France\", \"Paris\")`, `(\"USA\", \"Washington\
    \ D.C.\")`, etc.\n\nThe interface to a dictionary object, called `NSDictionary`,\
    \ is familiar if you know how `NSArray` works. `NSDictionary` is an immutable\
    \ class; therefore it allows only creation and data retrieval operations. The\
    \ reasons for immutability are also very similar to the `NSArray` case: it is\
    \ desirable to avoid changes in the underlying data structure for performance\
    \ and maintenance reasons.\n\nThere are several initialization methods that can\
    \ be called to create a new dictionary. For example, you can use `initWithObjectsAndKeys:`,\
    \ where the values and keys are entered in a list that is ended by `nil`. Notice\
    \ that supplying an incorrect number or entries or forgetting to enter a `nil`\
    \ element will result in an error.\n\n```\n- (void) createDictionary\n{\n    \
    \    NSDictionary *dict = [[NSDictionary alloc] initWithObjectsAndKeys:\n    \
    \                                              @\"first\", @\"one\", @\"second\"\
    ,\n                                                  @\"two\", @\"third\", @\"\
    three\", nil];\n        NSLog(@\"The number of elements in the dictionary is %d\"\
    , (int)[dict count]);\n}\n```\n\nAnother way to achieve the same thing is to use\
    \ arrays for values and keys. In that case, you need to make sure that both arrays\
    \ have the same number of elements, or a runtime error will be raised during program\
    \ execution.\n\n```\n- (void) createDictionaryFromArrays\n{\n        NSArray *values\
    \ = [NSArray arrayWithObjects:@\"first\", @\"second\", @\"third\", nil];\n   \
    \     NSArray *keys = [NSArray arrayWithObjects:@\"one\", @\"two\", @\"three\"\
    , nil];\n        NSDictionary *dict = [[NSDictionary alloc] initWithObjects:values\
    \ forKeys:keys];\n        NSLog(@\"The number of elements in the dictionary is\
    \ %d\", (int)[dict count]);\n}\n```\n\nWhile this is an easier way to achieve\
    \ the same result, there are other creation methods that might be more convenient,\
    \ depending on how the data is available. For example, it is possible to create\
    \ a new `NSDictionary` from data stored in a file using `dictionaryWithContentsOfFile:`,\
    \ and even from an URL, using the method `dictionaryWithContentsOfURL:`.\n\nFinally,\
    \ for anyone using one the latest versions of the Apple compiler, it is possible\
    \ to initialize an `NSDictionary` with a simple and intuitive notation, which\
    \ is very similar to the one available for arrays. Here is an example:\n\n```\n\
    - (void) createDictionaryWithNewSyntax\n{\n        NSDictionary *dict = @{ @\"\
    one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n      \
    \  NSLog(@\"The number of elements in the dictionary is %d\", (int)[dict count]);\n\
    }\n```\n\nThe syntax uses the `@{` sequence to introduce key/value pairs. The\
    \ result is similar to using the method `initWithObjectsAndKeys:`, but keys are\
    \ introduced in the first position. Also, keys and values are separated by a colon\
    \ character. Finally, there is no need for a `nil` object at the end of the sequence,\
    \ as is the case when a creation method is used.\n\n## Accessing Dictionary Elements\n\
    \nOnce a dictionary is created, it is possible to access its elements using a\
    \ few specialized methods in the `NSDictionary` class. The simplest way to retrieve\
    \ an element is using the `objectForKey:` method. By sending this message to a\
    \ dictionary, the value associated to the given key is returned. If no value is\
    \ stored for the requested key, the return value is `nil`.\n\n```\n- (void) retriveDictionaryElement\n\
    {\n        NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\"\
    , @\"three\" : @\"third\" };\n        NSLog(@\"The number of elements in the dictionary\
    \ is %d\", (int)[dict count]);\n        NSLog(@\"The element associated to two\
    \ is %@\", [dict objectForKey:@\"two\"]);\n}\n```\n\nAnother way to retrieve elements\
    \ is to use the `objectsForKeys:` instance method. This method has the advantage\
    \ of returning several items at the same time, which can speed up operations that\
    \ depend on dictionary look-ups.\n\n```\n- (void) retrieveSetElementSet\n{\n \
    \       NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\",\
    \ @\"three\" : @\"third\" };\n        NSArray *objects = [dict objectsForKeys:@[@\"\
    two\", @\"three\"]\n                            notFoundMarker:[NSNull null]];\n\
    \        NSLog(@\"The number of object found is %d\", (int)[objects count]);\n\
    }\n```\n\nIn the call to `objectsForKeys:`, a second argument is the `notFoundMarker:`.\
    \ The objective is to have some way to identify elements in the array of keys\
    \ that don’t correspond to any of the elements in the dictionary. Therefore, the\
    \ value passed should be unique and not used in the dictionary. A possible solution\
    \ is to use the null object of the `NSNull` class.\n\n### Retrieving Keys\n\n\
    Another way of accessing the data in an `NSDictionary` is by retrieving all the\
    \ keys stored in the container. This might be useful when you want to check the\
    \ keys in use. The `NSDictionary` makes this operation possible through the `allKeys`\
    \ method. The result of that method is an array containing all keys currently\
    \ in use.\n\n```\n- (void) retrieveKeys\n{\n        NSDictionary *dict = @{ @\"\
    one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n      \
    \  NSArray *keys = [dict allKeys];\n        NSLog(@\"The number of keys in the\
    \ dictionary is %d\", (int)[keys count]);\n}\n```\n\nThe `allKeys` method is the\
    \ simplest way to retrieve keys, but not the only one. The `NSDictionary` class\
    \ provides a rich set of methods giving access to the list of keys. For example,\
    \ a closely related method is `allKeysForObject:`, which returns an array with\
    \ all keys that are associated with the object passed as a parameter. This message\
    \ is useful when dealing with dictionaries where the same object may be stored\
    \ for several keys.\n\nAn example would be an application where food ingredients\
    \ (keys) may be associated to recipes (values). Since a recipe has several ingredients,\
    \ it is common to have an object associated with several keys in such an application.\
    \ Therefore, to find all the ingredients used to prepare a cake, you might want\
    \ to use the `allKeysForObject:` method.\n\n```\n- (void) findIngredientsForCake:(NSDictionary\
    \ *)ingredientDictionary\n{\n        NSArray *ingredients = [ingredientDictionary\
    \ allKeysForObject:@\"cake\"];\n        NSUInteger size = [ingredients count];\n\
    \        NSLog(@\"The number of ingredients for cake is %d\", (int)size);\n  \
    \      for (int i=0; i<size; ++i)\n        {\n                NSLog(@\"cake ingredient:\
    \ %@\", [ingredients objectAtIndex:i]);\n        }\n}\n```\n\nSimilarly, you may\
    \ want to access all values in a dictionary using an array. This is possible through\
    \ the `allValues` method, which is similar in usage to `allKeys`. Clearly, there\
    \ is no need for an `allValuesForObject`, since there is just one value per key.\
    \ In its place, you will find the `objectsForKeys:notFoundMarker:`, which I have\
    \ already discussed."
  raw: '## Dictionaries


    A dictionary is a data structure used to maintain a relationship between a set
    of keys and their corresponding values. You can think of a dictionary as a generalized
    array, where the keys may be not just integer numbers, but also any type of object.
    Therefore it is possible to use a dictionary to maintain a set of related objects,
    such as the list of countries and their capital cities: `("Canada","Ottawa")`,
    `("France", "Paris")`, `("USA", "Washington D.C.")`, etc.


    The interface to a dictionary object, called `NSDictionary`, is familiar if you
    know how `NSArray` works. `NSDictionary` is an immutable class; therefore it allows
    only creation and data retrieval operations. The reasons for immutability are
    also very similar to the `NSArray` case: it is desirable to avoid changes in the
    underlying data structure for performance and maintenance reasons.


    There are several initialization methods that can be called to create a new dictionary.
    For example, you can use `initWithObjectsAndKeys:`, where the values and keys
    are entered in a list that is ended by `nil`. Notice that supplying an incorrect
    number or entries or forgetting to enter a `nil` element will result in an error.


    `- (void) createDictionary`


    `{`


            `NSDictionary *dict = [[NSDictionary alloc] initWithObjectsAndKeys:`


                                                      `@"first", @"one", @"second",`


                                                      `@"two", @"third", @"three",
    nil];`


            `NSLog(@"The number of elements in the dictionary is %d", (int)[dict count]);`


    `}`


    Another way to achieve the same thing is to use arrays for values and keys. In
    that case, you need to make sure that both arrays have the same number of elements,
    or a runtime error will be raised during program execution.


    `- (void) createDictionaryFromArrays`


    `{`


            `NSArray *values = [NSArray arrayWithObjects:@"first", @"second", @"third",
    nil];`


            `NSArray *keys = [NSArray arrayWithObjects:@"one", @"two", @"three", nil];`


            `NSDictionary *dict = [[NSDictionary alloc] initWithObjects:values forKeys:keys];`


            `NSLog(@"The number of elements in the dictionary is %d", (int)[dict count]);`


    `}`


    While this is an easier to way to achieve the same result, there are other creation
    methods that might be more convenient, depending on how the data is available.
    For example, it is possible to create a new `NSDictionary` from data stored in
    a file using `dictionaryWithContentsOfFile:`, and even from an URL, using the
    method `dictionaryWithContentsOfURL:`.


    Finally, for anyone using one the latest versions of the Apple compiler, it is
    possible to initialize an `NSDictionary` with a simple and intuitive notation,
    which is very similar to the one available for arrays. Here is an example:


    `- (void) createDictionaryWithNewSyntax`


    `{`


            `NSDictionary *dict = @{ @"one": @"first", @"two" : @"second", @"three"
    : @"third" };`


            `NSLog(@"The number of elements in the dictionary is %d", (int)[dict count]);`


    `}`


    The syntax uses the `@{` sequence to introduce key/value pairs. The result is
    similar to using the method `initWithObjectsAndKeys:`, but keys are introduced
    in the first position. Also, keys and values are separated by a colon character.
    Finally, there is no need for a `nil` object at the end of the sequence, as is
    the case when a creation method is used.


    ### Accessing Dictionary Elements


    Once a dictionary is created, it is possible to access its elements using a few
    specialized methods in the `NSDictionaryClass`. The simplest way to retrieve an
    element is using the `objectForKey:` method. By sending this message to a dictionary,
    the value associated to the given key is returned. If no value is stored for the
    requested key, the return value is `nil`.


    `- (void) retriveDictionaryElement`


    `{`


            `NSDictionary *dict = @{ @"one": @"first", @"two" : @"second", @"three"
    : @"third" };`


            `NSLog(@"The number of elements in the dictionary is %d", (int)[dict count]);`


            `NSLog(@"The element associated to two is %@", [dict objectForKey:@"two"]);`


    `}`


    Another way to retrieve elements is to use the `objectsForKeys:` instance method.
    This method has the advantage of returning several items at the same time, which
    can speed up operations that depend on dictionary look-ups.


    `- (void) retrieveSetElementSet`


    `{`


            `NSDictionary *dict = @{ @"one": @"first", @"two" : @"second", @"three"
    : @"third" };`


            `NSArray *objects = [dict objectsForKeys:@[@"two", @"three"]`


                                `notFoundMarker:[NSNull null]];`


            `NSLog(@"The number of object found is %d", (int)[objects count]);`


    `}`


    In the call to `objectsForKeys:`, a second argument is the `notFoundMarker:`.
    The objective is to have some way to identify elements in the array of keys that
    don’t correspond to any of the elements in the dictionary. Therefore, the value
    passed should be unique and not used in the dictionary. A possible solution is
    to use the null object of the `NSNull` class.


    #### Retrieving Keys


    Another way of accessing the data in an `NSDictionary` is by retrieving all the
    keys stored in the container. This might be useful when you want to check the
    keys in use. The `NSDictionary` makes this operation possible through the `allKeys:`
    method. The result of that method is an array containing all keys currently in
    use.


    `- (void) retrieveKeys`


    `{`


            `NSDictionary *dict = @{ @"one": @"first", @"two" : @"second", @"three"
    : @"third" };`


            `NSArray *keys = [dict allKeys];`


            `NSLog(@"The number of keys in the dictionary is %d", (int)[keys count]);`


    `}`


    The `allKeys` method is the simplest way to retrieve keys, but not the only one.
    The `NSDictionary` class provides a rich set of methods giving access to the list
    of keys. For example, a closely related method is `allKeysForObject:`, which returns
    an array with all keys that are associated with the object passed as a parameter.
    This message is useful when dealing with dictionaries where the same object may
    be stored for several keys.


    An example would be an application where food ingredients (keys) may be associated
    to recipes (values). Since a recipe has several ingredients, it is common to have
    an object associated with several keys in such an application. Therefore, to find
    all the ingredients used to prepare a cake, you might want to use the `allKeysForObject:`
    method.


    `- (void) findIngredientsForCake:(NSDictionary *)ingredientDictionary`


    `{`


            `NSArray *ingredients = [ingredientDictionary allKeysForObject:@"cake"];`


            `NSUInteger size = [ingredients count];`


            `NSLog(@"The number of ingredients for cake is %d", (int)size);`


            `for (int i=0; i<size; ++i)`


            `{`


                    `NSLog(@"cake ingredient: %@", [ingredients objectAtIndex:i]);`


            `}`


    `}`


    Similarly, you may want to access all values in a dictionary using an array. This
    is possible through the `allValues` method, which is similar in usage to `allKeys`.
    Clearly, there is no need for an `allValuesForObject`, since there is just one
    value per key. In its place, you will find the `objectsForKeys:notFoundMarker:`,
    which I have already discussed.'
  trans: "\n# 字典\n\n字典是一种用于维护一组键与其对应值之间关系的数据结构。你可以将字典视为一个广义的数组，其中的键不仅可以为整数，还可以是任何类型的对象。因此，可以使用字典来维护一组相关对象，例如国家及其首都城市的列表：`(\"\
    加拿大\",\"渥太华\")`、`(\"法国\", \"巴黎\")`、`(\"美国\", \"华盛顿特区\")` 等。\n\n如果你了解 `NSArray`\
    \ 的工作原理，那么对字典对象（称为 `NSDictionary`）的接口就不会感到陌生。`NSDictionary` 是一个不可变类；因此它只允许创建和数据检索操作。不可变性的原因与\
    \ `NSArray` 的情况非常相似：出于性能和可维护性方面的考虑，我们希望避免改变底层数据结构。\n\n有几种初始化方法可以调用来创建新字典。例如，你可以使用\
    \ `initWithObjectsAndKeys:`，其中值和键以列表形式输入，并以 `nil` 结尾。请注意，提供错误数量的条目或忘记输入 `nil`\
    \ 元素将导致错误。\n\n```\n- (void) createDictionary\n{\n        NSDictionary *dict =\
    \ [[NSDictionary alloc] initWithObjectsAndKeys:\n                            \
    \                      @\"first\", @\"one\", @\"second\",\n                  \
    \                                @\"two\", @\"third\", @\"three\", nil];\n   \
    \     NSLog(@\"字典中的元素数量为 %d\", (int)[dict count]);\n}\n```\n\n另一种实现相同目的的方法是使用值数组和键数组。在这种情况下，你需要确保两个数组的元素数量相同，否则程序运行时将引发运行时错误。\n\
    \n```\n- (void) createDictionaryFromArrays\n{\n        NSArray *values = [NSArray\
    \ arrayWithObjects:@\"first\", @\"second\", @\"third\", nil];\n        NSArray\
    \ *keys = [NSArray arrayWithObjects:@\"one\", @\"two\", @\"three\", nil];\n  \
    \      NSDictionary *dict = [[NSDictionary alloc] initWithObjects:values forKeys:keys];\n\
    \        NSLog(@\"字典中的元素数量为 %d\", (int)[dict count]);\n}\n```\n\n虽然这是实现相同结果的更简单方法，但根据数据的可用性，还有其他创建方法可能更方便。例如，可以使用\
    \ `dictionaryWithContentsOfFile:` 从文件中存储的数据创建新的 `NSDictionary`，甚至可以使用 `dictionaryWithContentsOfURL:`\
    \ 方法从 URL 创建。\n\n最后，对于使用最新版本 Apple 编译器的用户，可以使用简单直观的表示法来初始化 `NSDictionary`，这与数组可用的表示法非常相似。示例如下：\n\
    \n```\n- (void) createDictionaryWithNewSyntax\n{\n        NSDictionary *dict =\
    \ @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n\
    \        NSLog(@\"字典中的元素数量为 %d\", (int)[dict count]);\n}\n```\n\n该语法使用 `@{` 序列来引入键/值对。结果类似于使用\
    \ `initWithObjectsAndKeys:` 方法，但键位于第一个位置。此外，键和值之间用冒号分隔。最后，序列末尾无需 `nil` 对象，而这在使用创建方法时是需要的。\n\
    \n## 访问字典元素\n\n创建字典后，可以使用 `NSDictionary` 类中的一些专门方法来访问其元素。检索元素的最简单方法是使用 `objectForKey:`\
    \ 方法。通过向字典发送此消息，将返回与给定键关联的值。如果所请求的键没有存储值，则返回值为 `nil`。\n\n```\n- (void) retriveDictionaryElement\n\
    {\n        NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\"\
    , @\"three\" : @\"third\" };\n        NSLog(@\"字典中的元素数量为 %d\", (int)[dict count]);\n\
    \        NSLog(@\"与 two 关联的元素是 %@\", [dict objectForKey:@\"two\"]);\n}\n```\n\n\
    另一种检索元素的方法是使用 `objectsForKeys:` 实例方法。该方法的优势在于可以同时返回多个项，这可以加快依赖于字典查找的操作。\n\n```\n\
    - (void) retrieveSetElementSet\n{\n        NSDictionary *dict = @{ @\"one\": @\"\
    first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n        NSArray *objects\
    \ = [dict objectsForKeys:@[@\"two\", @\"three\"]\n                           \
    \ notFoundMarker:[NSNull null]];\n        NSLog(@\"找到的对象数量为 %d\", (int)[objects\
    \ count]);\n}\n```\n\n在调用 `objectsForKeys:` 时，第二个参数是 `notFoundMarker:`。其目的是提供一种方法来标识键数组中与字典中任何元素都不对应的元素。因此，传递的值应该是唯一的，并且在字典中不会被用到。一个可能的解决方案是使用\
    \ `NSNull` 类的空对象。\n\n### 检索键\n\n访问 `NSDictionary` 中数据的另一种方法是检索容器中存储的所有键。当你想检查正在使用的键时，这可能会很有用。`NSDictionary`\
    \ 通过 `allKeys` 方法使此操作成为可能，该方法的结果是包含所有当前正在使用的键的数组。\n\n```\n- (void) retrieveKeys\n\
    {\n        NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\"\
    , @\"three\" : @\"third\" };\n        NSArray *keys = [dict allKeys];\n      \
    \  NSLog(@\"字典中的键数量为 %d\", (int)[keys count]);\n}\n```\n\n`allKeys` 方法是检索键的最简单方式，但并非唯一方式。`NSDictionary`\
    \ 类提供了一系列丰富的方法来访问键列表。例如，一个密切相关的方法是 `allKeysForObject:`，它返回一个数组，其中包含与作为参数传递的对象关联的所有键。当处理同一个对象可能为多个键存储的字典时，此消息非常有用。\n\
    \n一个例子是这样的应用：食品配料（键）可能与食谱（值）相关联。由于一个食谱有多种配料，在这种应用中，一个对象与多个键关联是很常见的。因此，要找出准备蛋糕所用的所有配料，你可能希望使用\
    \ `allKeysForObject:` 方法。\n\n```\n- (void) findIngredientsForCake:(NSDictionary\
    \ *)ingredientDictionary\n{\n        NSArray *ingredients = [ingredientDictionary\
    \ allKeysForObject:@\"cake\"];\n        NSUInteger size = [ingredients count];\n\
    \        NSLog(@\"蛋糕配料的数目为 %d\", (int)size);\n        for (int i=0; i<size; ++i)\n\
    \        {\n                NSLog(@\"蛋糕配料: %@\", [ingredients objectAtIndex:i]);\n\
    \        }\n}\n```\n\n类似地，你可能希望使用数组访问字典中的所有值。这可以通过 `allValues` 方法实现，其用法类似于 `allKeys`。显然，无需\
    \ `allValuesForObject`，因为每个键只有一个值。取而代之，你会找到我之前讨论过的 `objectsForKeys:notFoundMarker:`\
    \ 方法。\n"
- fmt: "### Using Dictionary Enumerators\n\nAnother way of accessing objects and keys\
    \ is using `NSEnumerator`. With an object of type `NSEnumerator`, it is possible\
    \ to retrieve a sequence using a simple `for` loop, which requests one element\
    \ per iteration. The `NSEnumerator` class provides the method `nextObject`, which\
    \ returns the next object in the enumerator. For example, to receive an enumerator\
    \ for all the objects in a dictionary, you can send the message `objectEnumerator`\
    \ to `NSDictionary` and iterate over the resulting elements. Here is some sample\
    \ code:\n\n```\n- (void) enumerateDictionaryObjects\n{\n    NSDictionary *dict\
    \ = @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n\
    \    NSEnumerator *objects = [dict objectEnumerator];\n    id obj;\n    while\
    \ ((obj = [objects nextObject]))\n    {\n        NSLog(@\"The dictionary contains\
    \ object %@\", obj);\n    }\n}\n```\n\nThis example shows how to acquire an `NSEnumerator`\
    \ that can be used to visit every object contained in the `NSDictionary`. The\
    \ test in the `while` loop has two functions. First, it sends the `nextObject`\
    \ message. Second, it checks if the returned value is not nil, in which case the\
    \ body of the `while` loop is executed for the retrieved object.\n\nIn a similar\
    \ fashion, you can use an enumerator to access the keys in a dictionary. The method\
    \ responsible for this is called `keyEnumerator`, and it works as shown in the\
    \ following example:\n\n```\n- (void) enumerateDictionaryKeys\n{\n    NSDictionary\
    \ *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\"\
    \ };\n    NSEnumerator *keys = [dict keyEnumerator];\n    id key;\n    while ((key\
    \ = [keys nextObject]))\n    {\n        NSLog(@\"The dictionary contains key %@\"\
    , key);\n        NSLog(@\"The corresponding object is %@\", [dict objectForKey:key]);\n\
    \    }\n}\n```\n\nNotice that enumerating an object by its keys is even more useful,\
    \ since it allows one to traverse the dictionary in such a way that will reveal\
    \ both keys and associated values.\n\nStill another way to enumerate elements\
    \ in a dictionary is using the fast enumeration protocol. Fast enumeration simplifies\
    \ the process of visiting each element of a collection, although it works only\
    \ on the latest versions of Apple’s operating systems.\n\n```\n- (void) enumerateDictionaryObjects\n\
    {\n    NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"\
    three\" : @\"third\" };\n    for (NSString *key in dict)\n    {\n        NSLog(@\"\
    The dictionary contains key %@ and value %@\",\n              key, [dict objectForKey:key]);\n\
    \    }\n}\n```\n\n### Mutable Dictionaries\n\nJust as `NSArray` is an immutable\
    \ sequence of objects, `NSDictionary` is also immutable. This means that, once\
    \ created, it is not possible to insert new keys in it. Moreover, for a given\
    \ set of keys, it is not possible to change the key/value associations included\
    \ in the dictionary. The reason for this is similar to the reason `NSArray` is\
    \ immutable: unchangeable data is more efficient and easy to handle by algorithms.\
    \ So, this allows `NSDictionary` to have a small overhead, which is important\
    \ when considering a data structure that is so frequently used.\n\nOn the other\
    \ hand, it is very frequently necessary to consider mutable dictionaries, in which\
    \ it is possible to add keys and change associations as needed. To satisfy this\
    \ requirement, the Foundation framework provides a mutable version of `NSDictionary`,\
    \ called `NSMutableDictionary`.\n\nThe `NSMutableDictionary` class inherits from\
    \ `NSDictionary`, so that any `NSMutableDictionary` object is also an `NSDictionary`\
    \ object. This means that everything I said about `NSDictionary` is also true\
    \ in this case. Moreover, a few new methods have been added to modify the contents\
    \ of the dictionary.\n\nThe first method is `setObject:forKey:`. The first parameter\
    \ to this method is the value you want to set, while the second parameter is the\
    \ associated key. Using `setObject:forKey:` it is possible to add new elements\
    \ to a `NSMutableDictionary`, as in the following example:\n\n```\n- (void) changeDictionary\n\
    {\n    NSDictionary *immutable_dict =\n        @{ @\"one\": @\"first\", @\"two\"\
    \ : @\"second\", @\"three\" : @\"third\" };\n    NSMutableDictionary *dict = [NSMutableDictionary\n\
    \        dictionaryWithDictionary:immutable_dict];\n    [dict setObject:@\"fourth\"\
    \ forKey:@\"four\"];\n    [dict setObject:@\"fifth\" forKey:@\"five\"];\n    for\
    \ (NSString *key in dict)\n    {\n        NSLog(@\"The dictionary contains key\
    \ %@ and value %@\",\n              key, [dict objectForKey:key]);\n    }\n}\n\
    ```\n\nThis code creates an initial dictionary, called `immutable_dict`, and then\
    \ uses that dictionary to initialize an instance of `NSMutableDictionary`. This\
    \ is possible with the use of method `dictionaryWithDictionary:`. Then, you add\
    \ two key/value pairs using the `setObject:forKey:` method. The resulting dictionary\
    \ is then printed using a `for` loop that iterates over the keys and retrieves\
    \ the object for a given key using `objectForKey:`.\n\nAnother method you may\
    \ call on `NSMutableDictionary` is `removeObjectForKey:`, which can be used to\
    \ delete entries from the dictionary. The use of this method is straightforward:\
    \ objects associated with the given key are removed from the dictionary after\
    \ the message is processed. If you want to delete more than one key, this is possible\
    \ using the `removeObjectsForKeys:` method. The argument for `removeObjectsForKeys:`\
    \ has to be an `NSArray`, with all the keys for objects you want to remove. For\
    \ instance, you could amend the example above to delete two entries in the dictionary\
    \ using an array of keys, like so:\n\n```\n- (void) deleteFromDictionary\n{\n\
    \    NSDictionary *immutable_dict =\n        @{ @\"one\": @\"first\", @\"two\"\
    \ : @\"second\", @\"three\" : @\"third\" };\n    NSMutableDictionary *dict = [NSMutableDictionary\n\
    \        dictionaryWithDictionary:immutable_dict];\n    [dict setObject:@\"fourth\"\
    \ forKey:@\"four\"];\n    [dict setObject:@\"fifth\" forKey:@\"five\"];\n    for\
    \ (NSString *key in dict)\n    {\n        NSLog(@\"The dictionary contains key\
    \ %@ and value %@\",\n              key, [dict objectForKey:key]);\n    }\n  \
    \  NSArray *keys_to_delete = @[ @\"two\", @\"three\" ];\n    [dict removeObjectsForKeys:keys_to_delete];\n\
    \    for (NSString *key in dict)\n    {\n        NSLog(@\"The dictionary still\
    \ contains key %@ and value %@\",\n              key, [dict objectForKey:key]);\n\
    \    }\n}\n```"
  raw: '### Using Dictionary Enumerators


    Another way of accessing objects and keys is using `NSEnumerator`. With an object
    of type `NSEnumerator`, it is possible to retrieve a sequence using a simple `for`
    loop, which requests one element per iteration. The `NSEnumerator` class provides
    the method `nextObject`, which returns the next object in the enumerator. For
    example, to receive an enumerator for all the objects in a dictionary, you can
    send the message `objectEnumerator` to `NSDictionary` and iterate over the resulting
    elements. Here is some sample code:


    `- (void) enumerateDictionaryObjects`


    `{`


            `NSDictionary *dict = @{ @"one": @"first", @"two" : @"second", @"three"
    : @"third" };`


            `NSEnumerator *objects = [dict objectEnumerator];`


            `id obj;`


            `while ((obj = [objects nextObject]))`


            `{`


                    `NSLog(@"The dictionary contains object %@", obj);`


            `}`


    `}`


    This example shows how to acquire an `NSEnumerator` that can be used to visit
    every object contained in the `NSDictionary`. The test in the `while` loop has
    two functions. First, it sends the `nextObject` message. Second, it checks if
    the returned value is not nil, in which case the body of the `while` loop is executed
    for the retrieved object.


    In a similar fashion, you can use an enumerator to access the keys in a dictionary.
    The method responsible for this is called `keyEnumerator`, and it works as shown
    in the following example:


    `- (void) enumerateDictionaryKeys`


    `{`


            `NSDictionary *dict = @{ @"one": @"first", @"two" : @"second", @"three"
    : @"third" };`


            `NSEnumerator *keys = [dict keyEnumerator];`


            `id key;`


            `while ((key = [keys nextObject]))`


            `{`


                    `NSLog(@"The dictionary contains key %@", key);`


                    `NSLog(@"The corresponding object is %@", [dict objectForKey:key]);`


            `}`


    `}`


    Notice that enumerating an object by its keys is even more useful, since it allows
    one to traverse the dictionary in such a way that will reveal both keys and associated
    values.


    Still another way to enumerate elements in a dictionary is using the fast enumeration
    protocol. Fast enumeration simplifies the process of visiting each element of
    a collection, although it works only on the latest versions of Apple’s operating
    systems.


    `- (void) enumerateDictionaryObjects`


    `{`


            `NSDictionary *dict = @{ @"one": @"first", @"two" : @"second", @"three"
    : @"third" };`


            `for (NSString *key in dict)`


            `{`


                    `NSLog(@"The dictionary contains key %@ and value %@",`


                              `key, [dict objectForKey:key]);`


            `}`


    `}`


    ### Mutable Dictionaries


    Just as `NSArray` is an immutable sequence of objects, `NSDictionary` is also
    immutable. This means that, once created, it is not possible to insert new keys
    in it. Moreover, for a given set of keys, it is not possible to change the key/value
    associations included in the dictionary. The reason for this is similar to the
    reason `NSArray` is immutable: unchangeable data is more efficient and easy to
    handle by algorithms. So, this allows `NSDictionary` to have a small overhead,
    which is important when considering a data structure that is so frequently used.


    On the other hand, it is very frequently necessary to consider mutable dictionaries,
    in which it is possible to add keys and change associations as needed. To satisfy
    this requirement, the Foundation framework provides a mutable version of `NSDictionary`,
    called `NSMutableDictionary`.


    The `NSMutableDictionary` class inherits from `NSDictionary`, so that any `NSMutableDictionary`
    object is also an `NSDictionary` object. This means that everything I said about
    `NSDictionary` is also true in this case. Moreover, a few new methods have been
    added to modify the contents of the dictionary.


    The first method is `setObject:forKey:`. The first parameter to this method is
    the value you want to set, while the second parameter is the associated key. Using
    `setObject:forKey:` it is possible to add new elements to a `NSMutableDictionary`,
    as in the following example:


    `- (void) changeDictionary`


    `{`


    `NSDictionary *immutable_dict =`


    `@{ @"one": @"first", @"two" : @"second", @"three" : @"third" };`


    `NSMutableDictionary *dict = [NSMutableDictionary`


    `dictionaryWithDictionary:immutable_dict];`


    `[dict setObject:@"fourth" forKey:@"four"];`


    `[dict setObject:@"fifth" forKey:@"five"];`


    `for (NSString *key in dict)`


    `{`


    `NSLog(@"The dictionary contains key %@ and value %@",`


    `key, [dict objectForKey:key]);`


    `}`


    `}`


    This code creates an initial dictionary, called `immutable_dict`, and then uses
    that dictionary to initialize an instance of `NSMutableDictionary`. This is possible
    with the use of method `dictionaryWithDictionary:`. Then, you add two key/value
    pairs using the `setObject:forKey:` method. The resulting dictionary is then printed
    using a `for` loop that iterates over the keys and retrieves the object for a
    given key using `objectForKey:`.


    Another method you may call on `NSMutableDictionary` is `removeObjectForKey:`,
    which can be used to delete entries from the dictionary. The use of this method
    is straightforward: objects associated with the given key are removed from the
    dictionary after the message is processed. If you want to delete more than one
    key, this is possible using the `removeObjectsForKeys:` method. The argument for
    `removeObjectsForKeys:` has to be an `NSArray`, with all the keys for objects
    you want to remove. For instance, you could amend the example above to delete
    two entries in the dictionary using an array of keys, like so:


    `- (void) deleteFromDictionary`


    `{`


    `NSDictionary *immutable_dict =`


    `@{ @"one": @"first", @"two" : @"second", @"three" : @"third" };`


    `NSMutableDictionary *dict = [NSMutableDictionary`


    `dictionaryWithDictionary:immutable_dict];`


    `[dict setObject:@"fourth" forKey:@"four"];`


    `[dict setObject:@"fifth" forKey:@"five"];`


    `for (NSString *key in dict)`


    `{`


    `NSLog(@"The dictionary contains key %@ and value %@",`


    `key, [dict objectForKey:key]);`


    `}`


    `NSArray *keys_to_delete = @[ @"two", @"three" ];`


    `[dict removeObjectsForKeys:keys_to_delete];`


    `for (NSString *key in dict)`


    `{`


    `NSLog(@"The dictionary still contains key %@ and value %@",`


    `key, [dict objectForKey:key]);`


    `}`


    `}`'
  trans: "\n### 使用字典枚举器\n\n另一种访问对象和键的方法是使用 `NSEnumerator`。通过一个 `NSEnumerator` 类型的对象，可以使用简单的\
    \ `for` 循环来检索序列，每次迭代请求一个元素。`NSEnumerator` 类提供了 `nextObject` 方法，该方法返回枚举器中的下一个对象。例如，要获取字典中所有对象的枚举器，可以向\
    \ `NSDictionary` 发送 `objectEnumerator` 消息，然后遍历生成的元素。以下是示例代码：\n\n```\n- (void)\
    \ enumerateDictionaryObjects\n{\n    NSDictionary *dict = @{ @\"one\": @\"first\"\
    , @\"two\" : @\"second\", @\"three\" : @\"third\" };\n    NSEnumerator *objects\
    \ = [dict objectEnumerator];\n    id obj;\n    while ((obj = [objects nextObject]))\n\
    \    {\n        NSLog(@\"The dictionary contains object %@\", obj);\n    }\n}\n\
    ```\n\n这个例子展示了如何获取一个 `NSEnumerator`，用于访问 `NSDictionary` 中包含的每个对象。`while` 循环中的测试有两个作用。首先，它发送\
    \ `nextObject` 消息。其次，它检查返回值是否不为 nil，如果不为 nil，则对检索到的对象执行 `while` 循环体。\n\n类似地，你可以使用枚举器来访问字典中的键。负责此功能的方法称为\
    \ `keyEnumerator`，其工作方式如下例所示：\n\n```\n- (void) enumerateDictionaryKeys\n{\n  \
    \  NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"three\"\
    \ : @\"third\" };\n    NSEnumerator *keys = [dict keyEnumerator];\n    id key;\n\
    \    while ((key = [keys nextObject]))\n    {\n        NSLog(@\"The dictionary\
    \ contains key %@\", key);\n        NSLog(@\"The corresponding object is %@\"\
    , [dict objectForKey:key]);\n    }\n}\n```\n\n请注意，通过键来枚举对象更为有用，因为它允许以一种能同时揭示键和关联值的方式来遍历字典。\n\
    \n另一种枚举字典元素的方法是使用快速枚举协议。快速枚举简化了访问集合中每个元素的过程，尽管它仅适用于苹果操作系统的最新版本。\n\n```\n- (void)\
    \ enumerateDictionaryObjects\n{\n    NSDictionary *dict = @{ @\"one\": @\"first\"\
    , @\"two\" : @\"second\", @\"three\" : @\"third\" };\n    for (NSString *key in\
    \ dict)\n    {\n        NSLog(@\"The dictionary contains key %@ and value %@\"\
    ,\n              key, [dict objectForKey:key]);\n    }\n}\n```\n\n### 可变字典\n\n\
    正如 `NSArray` 是一个不可变的对象序列一样，`NSDictionary` 也是不可变的。这意味着，一旦创建，就无法在其中插入新的键。此外，对于给定的键集，也无法更改字典中包含的键/值关联。其原因与\
    \ `NSArray` 不可变的原因类似：不可变的数据更高效，且易于算法处理。因此，这使得 `NSDictionary` 拥有较小的开销，在考虑这种频繁使用的数据结构时这一点非常重要。\n\
    \n另一方面，经常需要考虑可变字典，在其中可以根据需要添加键和更改关联。为满足这一需求，Foundation 框架提供了 `NSDictionary` 的可变版本，称为\
    \ `NSMutableDictionary`。\n\n`NSMutableDictionary` 类继承自 `NSDictionary`，因此任何 `NSMutableDictionary`\
    \ 对象也是一个 `NSDictionary` 对象。这意味着我之前关于 `NSDictionary` 的所有描述在此情况下仍然成立。此外，还添加了一些新方法来修改字典的内容。\n\
    \n第一个方法是 `setObject:forKey:`。此方法的第一个参数是要设置的值，第二个参数是关联的键。使用 `setObject:forKey:`\
    \ 可以向 `NSMutableDictionary` 添加新元素，如下例所示：\n\n```\n- (void) changeDictionary\n{\n\
    \    NSDictionary *immutable_dict =\n        @{ @\"one\": @\"first\", @\"two\"\
    \ : @\"second\", @\"three\" : @\"third\" };\n    NSMutableDictionary *dict = [NSMutableDictionary\n\
    \        dictionaryWithDictionary:immutable_dict];\n    [dict setObject:@\"fourth\"\
    \ forKey:@\"four\"];\n    [dict setObject:@\"fifth\" forKey:@\"five\"];\n    for\
    \ (NSString *key in dict)\n    {\n        NSLog(@\"The dictionary contains key\
    \ %@ and value %@\",\n              key, [dict objectForKey:key]);\n    }\n}\n\
    ```\n\n这段代码创建了一个名为 `immutable_dict` 的初始字典，然后使用该字典初始化一个 `NSMutableDictionary` 实例。这可以通过使用\
    \ `dictionaryWithDictionary:` 方法实现。接着，使用 `setObject:forKey:` 方法添加两个键/值对。最后使用一个\
    \ `for` 循环遍历键，并通过 `objectForKey:` 检索给定键对应的对象，打印生成的字典。\n\n另一个可以在 `NSMutableDictionary`\
    \ 上调用的方法是 `removeObjectForKey:`，用于从字典中删除条目。此方法的使用很简单：处理完消息后，与给定键关联的对象将从字典中移除。如果要删除多个键，可以使用\
    \ `removeObjectsForKeys:` 方法。`removeObjectsForKeys:` 的参数必须是一个 `NSArray`，包含所有要删除的对象对应的键。例如，你可以修改上面的示例，使用一个键数组删除字典中的两个条目，如下所示：\n\
    \n```\n- (void) deleteFromDictionary\n{\n    NSDictionary *immutable_dict =\n\
    \        @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\"\
    \ };\n    NSMutableDictionary *dict = [NSMutableDictionary\n        dictionaryWithDictionary:immutable_dict];\n\
    \    [dict setObject:@\"fourth\" forKey:@\"four\"];\n    [dict setObject:@\"fifth\"\
    \ forKey:@\"five\"];\n    for (NSString *key in dict)\n    {\n        NSLog(@\"\
    The dictionary contains key %@ and value %@\",\n              key, [dict objectForKey:key]);\n\
    \    }\n    NSArray *keys_to_delete = @[ @\"two\", @\"three\" ];\n    [dict removeObjectsForKeys:keys_to_delete];\n\
    \    for (NSString *key in dict)\n    {\n        NSLog(@\"The dictionary still\
    \ contains key %@ and value %@\",\n              key, [dict objectForKey:key]);\n\
    \    }\n}\n```\n"
- fmt: '# Summary


    In this chapter I discussed some of the most important classes in the Objective-C
    Foundation framework. First was the `NSString` class, used to store and manipulate
    character strings. Then I talked about the `NSNumber` class, which serves as a
    wrapper for common values such as integers, floating-point numbers, characters,
    and Booleans. Finally, I discussed in detail the container classes, which include
    `NSArray` and `NSDictionary`.


    Strings are important because they are the most common way to encode input and
    output data. The `NSString` class provides several initialization methods that
    can be used in various situations, depending on how the string data is supplied
    to the application. Common facilities include substring matching and comparison
    methods.


    Numbers can be handled in Objective-C in two ways. The native types are the same
    as the ones used in the C language. They are the most indicated for high performance
    algorithms. However, many Objective-C classes require a reference to an object.
    In these situations, it is possible to wrap the number in an instance of `NSNumber`.
    That class provides methods to access the data in the desired format, including
    `int`, `long`, `float`, `double`, `char`, and `BOOL`.


    Collections are objects used to maintain sets of other objects. The `NSArray`
    class defines the interface for objects that are stored in a sequence. Objects
    of the class `NSArray` can store and retrieve elements by index, starting from
    zero. The `NSMutableArray` is a subclass of `NSArray` that maintains arrays with
    a mutable interface, which allows elements to be added and/or removed.


    The `NSDictionary` class provides a collection of elements associated to keys.
    You need to supply a valid key to retrieve elements. The `NSMutableDictionary`
    gives users the ability to add and remove entries from the dictionary.


    Together, these classes provide most of the infrastructure necessary to write
    more complicated algorithms, ranging from graphical interfaces to game programming
    logic. In the next chapter, you will see how to make classes even more flexible
    for applications that need to extend them. With protocols and categories, you
    will learn about two mechanisms that can be used to add advanced capabilities
    to existing classes.


    # 4. Categories and Protocols


    ## Abstract


    A category can be used in Objective-C to add methods to classes, even when you
    don''t have complete access to the original source file for the class.


    For example, using categories it is possible to add new methods to common classes
    in the system, such as `NSString`, `NSNumber`, or even `NSObject`. Doing this
    will make the added methods available to any user of the original class, as long
    as the category is loaded into the application.


    If you need to add a complex responsibility to a new class in the context of a
    new library, or if you''re just trying to add a single convenience method, categories
    may save the day, and are another reason why programming in Objective-C is so
    productive.


    The design of adaptable interfaces is another area of strength for Objective-C,
    when compared to other object-oriented languages that enforce a strong type mechanism.
    By declaring a protocol, it is possible to create interfaces that are independent
    of a particular class and that can, therefore, be used by any client who wants
    to conform to a particular set of messages, as previously stated in the protocol
    declaration.


    In this chapter, I consider these two mechanisms, categories and protocols, and
    how they can be used to create better applications. You will first investigate
    how to create new classes that benefit from the use of categories. In the second
    part of the chapter, you will see how protocols are employed in Apple''s libraries,
    and how client code can profit from their use.


    ## Categories


    Due to its object-oriented philosophy, Objective-C promotes a clear separation
    between interface and implementation. One facet of this separation of concerns
    is the ability to extend classes through the addition of methods. This is made
    possible through the use of categories, a flexible mechanism that can be used
    by class designers, as well as clients of a particular class interface. Using
    a category, for example, it is possible to add new methods without requiring a
    recompilation of the original class file. This is of great help when working with
    existing libraries provided by third parties. The same principle can be used to
    manipulate the classes of frameworks provided by Apple, such as Cocoa and Cocoa
    Touch.


    For instance, suppose that you need to add a method that could be applied to any
    string. A simple way of doing this would be to create a subclass of `NSString`
    and have the method attached to that subclass. You could then create strings by
    instantiating the new class, and such strings would be able to access the new
    method you declared. Since you can rely on polymorphism to be handled by Objective-C
    runtime, every method that accepts a string would also accept your new class.


    However, this solution is not entirely satisfactory because in many cases you
    cannot control how an instance of `NSString` is created: such strings are frequently
    returned by other methods. Another problem is that by using a custom class you
    give away some benefits, such as the possibility of using string literals, for
    example.


    Another way of proceeding would be to create a new category of `NSString` instead.
    In that case, you could add this method as an integral part of the `NSString`
    class interface. By importing the new category, any other class in your project
    that uses `NSString` will be able to access the added method, as if it was part
    of the original string class.


    ### Note


    Extending existing classes through a category is a technique commonly used in
    the Cocoa frameworks. In this way, Cocoa allows classes such as `NSString` to
    incorporate features that make sense only in the context of a particular library.
    For a well-known example, the text-drawing framework adds a category to `NSString`
    that provides the ability to draw strings directly on the screen.'
  raw: '## Summary


    In this chapter I discussed some of the most important classes in the Objective-C
    Foundation framework. First was the `NSString` class, used to store and manipulate
    character strings. Then I talked about the `NSNumber` class, which serves as a
    wrapper for common values such as integers, floating-point numbers, characters,
    and Booleans. Finally, I discussed in detail the container classes, which include
    `NSArray` and `NSDictionary`.


    Strings are important because they are the most common way to encode input and
    output data. The `NSString` class provides several initialization methods that
    can be used in various situations, depending on how the string data is supplied
    to the application. Common facilities include substring matching and comparison
    methods.


    Numbers can be handled in Objective-C in two ways. The native types are the same
    as the ones used in the C language. They are the most indicated for high performance
    algorithms. However, many Objective-C classes require a reference to an object.
    In these situations, it is possible to wrap the number in an instance of `NSNumber`.
    That class provides methods to access the data in the desired format, including
    `int`, `long`, `float`, `double`, `char`, and `BOOL`.


    Collections are objects used to maintain sets of other objects. The `NSArray`
    class defines the interface for objects that are stored in a sequence. Objects
    of the class `NSArray` can store and retrieve elements by index, starting from
    zero. The `NSMutableArray` is a subclass of `NSArray` that maintains arrays with
    a mutable interface, which allows elements to be added and/or removed.


    The `NSDictionary` class provides a collection of elements associated to keys.
    You need to supply a valid key to retrieve elements. The `NSMutableDictionary`
    gives users the ability to add and remove entries from the dictionary.


    Together, these classes provide most of the infrastructure necessary to write
    more complicated algorithms, ranging from graphical interfaces to game programming
    logic. In the next chapter, you will see how to make classes even more flexible
    for applications that need to extend them. With protocols and categories, you
    will learn about two mechanisms that can be used to add advanced capabilities
    to existing classes.


