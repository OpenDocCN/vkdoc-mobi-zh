    # 讨论的主题


    《Objective-C 程序员参考手册》提供了在 Objective-C 中构建可行解决方案所需的所有工具。从 C 语言的基本构建块出发，我将讨论如何利用面向对象编程以及结构化编程的知识，创建正确且高效的应用程序。


    我广泛运用了精通 C++、Java、Perl 和 Python 等其他语言的开发者所掌握的概念。在编写本书时，我的目标是让这类读者能通过一条快节奏的路径来精通
    Objective-C。


    另一方面，本书以逻辑清晰且结构化的方式介绍 Objective-C，即使是没有编程经验的初学者也能轻松吸收使用该语言开发应用所需的最重要的主题和能力。


    我们身处一个行业中，典型的书籍动辄数千页，而其中大部分篇幅都被那些专业开发者不甚关心的入门主题所占据。在这本书中，我力求提供一份更加简洁且重点突出的语言参考，让读者的阅读投入获得更高的价值。本书做到了以下几点：


    - 快速带你了解 Objective-C 中的基本概念，例如接口和类的实现。

    - 为 Foundation 框架提供一份简洁且便于查阅的参考，该框架在进行 Objective-C 编程时至关重要。

    - 突出 Objective-C 与 Java 或 Python 等其他主流语言之间的关键差异。

    - 展示如何使用高级概念（如容器类、选择器和键值接口）创建完整的应用程序。

    - 提供编写 Cocoa 和 Cocoa Touch 应用程序的基础知识，它们是 Mac OS X 和 iOS 开发的标准框架。


    ## 你将学到什么


    以下是你在本书中将学习的一些主题：


    - Objective-C 语言的基本语法。

    - 如何在 Objective-C 中创建类。

    - 方法和消息传递机制如何工作，以简化你的代码并避免深层类层次结构。

    - 用于存储和访问动态数据的键值系统，以及它如何与 Objective-C 接口结合以简化应用程序编程。

    - Objective-C 中容器类（如数组和字典）的有效使用，包括其不可变和可变版本。

    - Cocoa 编程的基本主题，可用于在 Mac OS X 和 iOS 环境中创建简单的应用程序。


    以下是每章所述主题的快速总结。


    ### 第 1 章：Objective-C 中的 C 语言元素


    Objective-C 语言是作为 C 语言的扩展而创建的，这意味着任何用 C 编写的程序也是一个有效的 Objective-C 程序。因此，Objective-C
    中的许多基本表达式与其在 C 中的对应表达式完全相同。要成为一名优秀的 Objective-C 程序员，你需要对 C 语言有基本的了解。在本章中，我将快速介绍在
    Objective-C 中使用的 C 语言最重要的概念。


    ### 第 2 章：类


    在 Objective-C 中，类是应用程序的构建块。它们是用于定义方法和变量的语法结构，这些方法和变量构成了对象的组件。本章介绍 Objective-C
    类的概念以及如何定义它们。类的主要特性之一是它们可以放在不同的文件中进行描述，一个用于接口，另一个用于实现。这种清晰的分离使得只共享类的重要方面成为可能，同时隐藏客户端不需要的任何实现信息。


    ### 第 3 章：字符串和容器类


    Objective-C 程序的主要特征之一是不断使用动态对象来简化内存和其他资源的管理。Objective-C 运行时中最基础的类包括用于处理字符串、数字和对象集合的类。在本章中，我将展示如何使用这些基本类及其方法。


    ### 第 4 章：协议和类别


    Objective-C 提倡实现与接口的清晰分离。用于鼓励这种分离的技术之一是协议的概念。协议允许类通过仅描述它们响应的方法子集来进行通信。另一种促进这种关注点分离的方式是通过类别来扩展类：程序员不必让所有人都知道某个特定类中可用的方法，而是可以根据需要添加类别。这会产生一个更加清晰的实现，从而减少对应用程序其他部分的依赖。


    ### 第 5 章：继承


    面向对象编程是催生 Objective-C 的主要思想。OOP 的一个重要方面是能够创建继承现有类的方法、变量和属性的新类。然而，正确使用继承需要在设计阶段和派生类的正确实现中都要格外小心。在本章中，我将介绍你在创建类层次结构时需要熟悉的主要思想。


    ### 第 6 章：块语法

    '
- fmt: '# Objective-C 进阶指南


    `Objective-C`提供了另一种通过其块（`block`）语法来减少编程工作量的技术。`block`是一段代码，可以传递给应用程序的其他部分。`block`不仅保留代码信息，还保留了创建`block`时作用域内的变量信息。这样，`block`就类似于其他语言中闭包的概念。通过定义`block`，你可以使某些算法的实现更具扩展性。你还可以使用`block`来实现将在其他线程中运行的代码，正如一些`Objective-C`库所实现的那样。


    ## 第7章：动态绑定


    `Objective-C`最大的优势之一是它允许程序员根据需求选择速度和灵活性的最佳组合。`Objective-C`的运行时系统是程序员可以用来在动态和静态编程之间切换的主要机制。在本章中，你将学习如何探索运行时系统，以在你的软件中实现静态检查和动态灵活性的最佳组合。


    ## 第8章：内存管理


    使用具有动态特性的面向对象语言的优势之一是，内存管理可以简化，由系统库完成大部分繁重的工作。`Objective-C`使用基于引用的内存管理模型，其规则使得在任何应用程序中分配和释放内存几乎变得直接简单。在本章中，我将回顾你需要掌握的一些简单规则，以编写正确的`Objective-C`代码。我还将介绍`Apple`编译器提供的最新技巧，这些技巧实际上消除了在内存管理机制中手动干预的需要。


    ## 第9章：键值编程


    在`Objective-C`中与对象交互的一种非常常见的方式是为特定的属性名称（也称为键）设置值。键值编程非常重要，因为它被用于`Objective-C`的众多库中。它允许通过一个简单的接口使用对象，避免了在对象之间唯一区别是它们包含的值集时创建多个子类的需要。


    ## 第10章：文件系统


    `Objective-C`库提供了一种简化的机制来访问系统资源。其中一个例子是如何使用`Foundation`框架来访问文件和目录。在本章中，我将展示如何在这个标准`Objective-C`框架中使用类来创建文件、读写现有文件中的数据以及操作目录的内容。


    ## 第11章：Foundation框架


    `Objective-C`中的类被组织成框架，以便于分發和使用。`Foundation`框架提供了编写与环境交互的程序所需的类。基本的实用类，如字符串、字典和数组，也包含在`Foundation`框架中。在本章中，我提供了对`Foundation`框架类的参考，并在必要时附有示例。


    ## 第12章：编译器


    为了有效地使用`Objective-C`，了解语言的基础设施很重要。编译器在软件开发周期中扮演着特殊角色，因为它决定了源代码如何被翻译成可执行程序。在`Apple`环境中，主要使用两种编译器：`gcc`，即`Mac
    OS X`使用的传统编译器；以及基于`LLVM`（`Lower Level Virtual Machine`）的新编译器，这是`Apple`在过去几年中开发的。在本章中，我将介绍`Objective-C`编译器提供的几个选项，以及如何使用它们编写快速可靠的代码。


    ## 第13章：预处理器


    `Objective-C`自带一个强大的预处理器，可以简化将重复代码输入程序的过程。然而，如果你不谨慎使用，预处理器可能会成为许多编程陷阱的源头。在本章中，我将介绍预处理器的主要特性以及如何避免它的一些粗糙边缘。


    ## 第14章：单元测试


    测试驱动开发是一种软件方法论，要求程序的每个特性都要通过单元测试代码进行彻底测试。测试驱动开发是利用面向对象语言（如`Objective-C`）模块化特性的绝佳方式。在本章中，你将学习如何在`Objective-C`语言中创建单元测试。你还将学习如何使用`Xcode
    IDE`管理和运行单元测试。


    ## 第15章：调试


    任何程序员都知道编写无缺陷软件有多困难。这就是为什么每个平台都有许多集成的调试辅助工具。`Xcode`为编写和调试程序提供了完整的解决方案，这使得在新建或现有应用程序中查找错误变得更加容易。在本章中，我将解释如何使用这些调试功能。通过教程风格，我将描述如何使用断点、监视窗口、条件表达式和日志终端。


    ## 第16章：在Cocoa中构建OS X应用程序


    `Objective-C`最重要的用途是实现使用`Cocoa`框架的应用程序。作为一名`Objective-C`程序员，你可能会参与创建`iOS`应用程序或完整的`Mac
    OS X`应用程序。在本章中，我将介绍`Cocoa`，这是用于在`Mac OS X`中开发桌面应用程序的框架。


    ## 第17章：在Cocoa Touch上构建iOS应用程序


    `Cocoa Touch`是用于为`iOS`（驱动`iPhone`、`iPad`和`iPod touch`的操作系统）创建丰富应用程序的框架。虽然使用与`Cocoa`类似的技术，但与功能全面的`Cocoa`框架相比，`iOS`提供了简化的架构。`Cocoa
    Touch`还提供了对移动资源的访问，如摄像头、加速度计和`iOS`管理的其他硬件。'
  raw: 'Objective-C provides another technique to reduce programming effort through
    its block syntax. A block is a piece of code that can be passed around to other
    parts of the application. A block not only retains information about the code
    but also about variables that were in scope at the time the block was created.
    In this way, blocks are similar to the concept of closures available in other
    languages. By defining blocks, you can make the implementation of certain algorithms
    more extensible. You can also use blocks to implement code that will run in other
    threads, as accomplished by some Objective-C libraries.


    Chapter 7: Dynamic Binding


    One of the biggest advantages of Objective-C is that it allows programmers to
    choose the right combination of speed and flexibility, depending on their needs.
    The runtime system of Objective-C is the main mechanism that can be used by programmers
    to switch between dynamic and static programming. In this chapter, you learn how
    to explore the runtime system to achieve the best combination of static checking
    and dynamic flexibility in your software.


    Chapter 8: Memory Management


    One of the advantages of working with an object-oriented language with dynamic
    features is that memory management can be simplified, with system libraries doing
    most of the hard work. Objective-C uses a reference-based model for memory management,
    with rules that make it almost straightforward to allocate and release memory
    in any application. In this chapter, I review the simple rules that you need to
    master in order to write correct objective-C code. I also cover the latest techniques
    provided by Apple compilers, which practically remove the need for manual intervention
    in their memory management mechanisms.


    Chapter 9: Key-Value Programming


    A very common way to interact with objects in Objective-C is to set values for
    particular property names, also referred to as keys. Key-value programming is
    very important because it is used in so many libraries in Objective-C. It allows
    an object to be used through a simple interface, avoiding the need to create multiple
    subclasses when the only difference between objects is the set of values they
    contain.


    Chapter 10: The Filesystem


    Objective-C libraries provide a simplified mechanism for accessing system resources.
    One example is how the Foundation framework can be used to access files and directories.
    In this chapter, I show how the classes in this standard Objective-C framework
    can be used to create files, read and write data to existing files, and manipulate
    the content of directories.


    Chapter 11: The Foundation Framework


    Classes in Objective-C are organized into frameworks for ease of distribution
    and use. The Foundation framework provides classes needed to write programs interacting
    with the environment. The basic utility classes, such as strings, dictionaries,
    and arrays, are also contained in the Foundation framework. In this chapter, I
    provide a reference to the Foundation framework classes, with examples when necessary.


    Chapter 12: The Compiler


    To use Objective-C effectively, it is important to understand the basic infrastructure
    of the language. The compiler plays a special role in the software development
    cycle, since it determines how source code is translated into executable programs.
    In the Apple environment, two main compilers are used: gcc, the traditional compiler
    used by Mac OS X, and the new compiler based on the LLVM (Lower Level Virtual
    Machine), which has been developed by Apple in the last few years. In this chapter,
    I take a look at several options provided by the Objective-C compilers and how
    to use them to write fast and reliable code.


    Chapter 13: The Preprocessor


    Objective-C comes with a powerful preprocessor that can simplify the input of
    repetitive code into a program. The preprocessor, however, may be the source of
    numerous programming pitfalls if you are not careful with its usage. In this chapter,
    I present the main features of the preprocessor and how to avoid some of its rough
    edges.


    Chapter 14: Unit Tests


    Test-driven development is a software methodology that requires that every feature
    of a program be thoroughly tested with unit testing code. Test-driven development
    is a great way to employ the modularity of object-oriented languages such as Objective-C.
    In this chapter, you learn how to create unit tests in the Objective-C language.
    You also learn how to manage and run unit tests using the Xcode IDE.


    Chapter 15: Debugging


    Any programmer knows how difficult it is to write defect-free software. That is
    why every platform has a number of integrated debugging aids. Xcode provides a
    complete solution for writing and debugging programs, which makes it much easier
    to find bugs in a new or existing application. In this chapter, I explain how
    to use these debugging features. Using a tutorial style, I describe how to use
    breakpoints, watch windows, conditional expressions, and the logging terminal.


    Chapter 16: Building a OS X Application in Cocoa


    The most important use of Objective-C is in the implementation of applications
    that employ the Cocoa frameworks. As an Objective-C programmer, your may become
    involved in the creation of iOS apps or full Mac OS X applications. In this chapter,
    I introduce Cocoa, the framework used to develop desktop applications in the Mac
    OS X.


    Chapter 17: Building an iOS App on Cocoa Touch


    Cocoa Touch is the framework used to create rich applications for iOS, the operating
    system that powers the iPhone, iPad, and iPod touch. While using technologies
    similar to Cocoa, iOS provides a simplified architecture in comparison to the
    full-featured Cocoa framework. Cocoa Touch also provides access to mobile resources
    such as cameras, the accelerometer, and other hardware managed by iOS.'
  trans: '

    # Objective-C 进阶指南


    `Objective-C`提供了另一种通过其块（`block`）语法来减少编程工作量的技术。`block`是一段代码，可以传递给应用程序的其他部分。`block`不仅保留代码信息，还保留了创建`block`时作用域内的变量信息。这样，`block`就类似于其他语言中闭包的概念。通过定义`block`，你可以使某些算法的实现更具扩展性。你还可以使用`block`来实现将在其他线程中运行的代码，正如一些`Objective-C`库所实现的那样。


    ## 第 7 章：动态绑定


    `Objective-C`最大的优势之一是它允许程序员根据需求选择速度和灵活性的最佳组合。`Objective-C`的运行时系统是程序员可以用来在动态和静态编程之间切换的主要机制。在本章中，你将学习如何探索运行时系统，以在你的软件中实现静态检查和动态灵活性的最佳组合。


    ## 第 8 章：内存管理


    使用具有动态特性的面向对象语言的优势之一是，内存管理可以简化，由系统库完成大部分繁重的工作。`Objective-C`使用基于引用的内存管理模型，其规则使得在任何应用程序中分配和释放内存几乎变得直接简单。在本章中，我将回顾你需要掌握的一些简单规则，以编写正确的`Objective-C`代码。我还将介绍`Apple`编译器提供的最新技巧，这些技巧实际上消除了在内存管理机制中手动干预的需要。


    ## 第 9 章：键值编程


    在`Objective-C`中与对象交互的一种非常常见的方式是为特定的属性名称（也称为键）设置值。键值编程非常重要，因为它被用于`Objective-C`的众多库中。它允许通过一个简单的接口使用对象，避免了在对象之间唯一区别是它们包含的值集时创建多个子类的需要。


    ## 第 10 章：文件系统


    `Objective-C`库提供了一种简化的机制来访问系统资源。其中一个例子是如何使用`Foundation`框架来访问文件和目录。在本章中，我将展示如何在这个标准`Objective-C`框架中使用类来创建文件、读写现有文件中的数据以及操作目录的内容。


    ## 第 11 章：Foundation 框架


    `Objective-C`中的类被组织成框架，以便于分发和使用。`Foundation`框架提供了编写与环境交互的程序所需的类。基本的实用类，如字符串、字典和数组，也包含在`Foundation`框架中。在本章中，我提供了对`Foundation`框架类的参考，并在必要时附有示例。


    ## 第 12 章：编译器


    为了有效地使用`Objective-C`，了解语言的基础设施很重要。编译器在软件开发周期中扮演着特殊角色，因为它决定了源代码如何被翻译成可执行程序。在`Apple`环境中，主要使用两种编译器：`gcc`，即`Mac
    OS X`使用的传统编译器；以及基于`LLVM`（`Lower Level Virtual Machine`）的新编译器，这是`Apple`在过去几年中开发的。在本章中，我将介绍`Objective-C`编译器提供的几个选项，以及如何使用它们编写快速可靠的代码。


    ## 第 13 章：预处理器


    `Objective-C`自带一个强大的预处理器，可以简化将重复代码输入程序的过程。然而，如果你不谨慎使用，预处理器可能会成为许多编程陷阱的源头。在本章中，我将介绍预处理器的主要特性以及如何避免它的一些粗糙边缘。


    ## 第 14 章：单元测试


    测试驱动开发是一种软件方法论，要求程序的每个特性都要通过单元测试代码进行彻底测试。测试驱动开发是利用面向对象语言（如`Objective-C`）模块化特性的绝佳方式。在本章中，你将学习如何在`Objective-C`语言中创建单元测试。你还将学习如何使用`Xcode
    IDE`管理和运行单元测试。


    ## 第 15 章：调试


    任何程序员都知道编写无缺陷软件有多困难。这就是为什么每个平台都有许多集成的调试辅助工具。`Xcode`为编写和调试程序提供了完整的解决方案，这使得在新建或现有应用程序中查找错误变得更加容易。在本章中，我将解释如何使用这些调试功能。通过教程风格，我将描述如何使用断点、监视窗口、条件表达式和日志终端。


    ## 第 16 章：在 Cocoa 中构建 OS X 应用程序


    `Objective-C`最重要的用途是实现使用`Cocoa`框架的应用程序。作为一名`Objective-C`程序员，你可能会参与创建`iOS`应用程序或完整的`Mac
    OS X`应用程序。在本章中，我将介绍`Cocoa`，这是用于在`Mac OS X`中开发桌面应用程序的框架。


    ## 第 17 章：在 Cocoa Touch 上构建 iOS 应用程序


    `Cocoa Touch`是用于为`iOS`（驱动`iPhone`、`iPad`和`iPod touch`的操作系统）创建丰富应用程序的框架。虽然使用与`Cocoa`类似的技术，但与功能全面的`Cocoa`框架相比，`iOS`提供了简化的架构。`Cocoa
    Touch`还提供了对移动资源的访问，如摄像头、加速度计和`iOS`管理的其他硬件。

