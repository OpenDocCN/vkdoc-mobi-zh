    ## Summary


    In this chapter, you learned about the UI-based features of Cocoa. As you have
    seen, the strengths of Objective-C are used by Cocoa to support a style for UI
    construction that offers a lot of freedom and reduces the amount of code necessary
    to create a rich UI experience.


    One of the central concepts of the GUI development in Mac OS X is the support
    for nib files. A nib is a file-based representation of objects that can be manipulated
    using a graphical tool such as Xcode. Objects are created and modified through
    the editor, but they can be saved and loaded later by your application.


    In this chapter, I initially provided an overview of the hierarchy of UI classes
    in Cocoa. They all derive from the `NSResponder` class, which is responsible for
    handling UI-based events. Other important classes, such as `NSWindow` and `NSView`,
    implement additional features that are shared by all windows and views in the
    system.


    Finally, I gave a complete example of an application that handles user input from
    menus and from direct interaction, such as keyboard key presses and mouse movements.
    The application is used to draw graphics on the screen that represent a set of
    points and connected lines. You have seen how to use Bezier paths to draw items
    in the screen, and how to perform other common tasks such as drawing strings.


    In the next chapter, I will discuss the support for mobile programming available
    in Cocoa. Through Cocoa Touch, the mobile extension available for the iOS platform,
    Objective-C provides everything you need to run your code on mobile devices such
    as the iPhone and the iPad. For this purpose, you will use most of the concepts
    introduced in this chapter, along with a set of specialized classes from the Cocoa
    Touch framework.'
