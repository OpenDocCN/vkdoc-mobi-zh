- fmt: "# Best Practices for Header Files\n\nGiven the necessary and widespread use\
    \ of header files in Objective-C, one needs to follow a few conventions to maintain\
    \ a basic system organization and avoid performance problems. These best practices\
    \ are sometimes not necessary for simple projects, but become increasingly important\
    \ when the size of the project grows, and especially when there are many developers\
    \ working in the same application.\n\nThe first rule that should be followed is\
    \ to include only class and function definitions in header files. Including the\
    \ implementation of methods or functions in a header file is not a valid practice,\
    \ because most header files are designed to be included in more than one place\
    \ in the system. Having the same function definition occur twice in different\
    \ files may cause a linking error, since the linker doesn’t know which version\
    \ of your function or method should be maintained.\n\nAnother rule of thumb is\
    \ to avoid nested inclusion of header files whenever possible. The reason is that,\
    \ because the preprocessor will perform file inclusions recursively, having too\
    \ many header files included inside the main header file will force an increase\
    \ in compilation time for every client of that class. In other words, in an include\
    \ file, only add the bare minimum that will allow the class interface to be defined.\n\
    \nIt is clear that it is sometimes necessary to transitively include a header\
    \ file; for example, when declaring a subclass of an existing class, you need\
    \ to include the header file for the parent class so that its definition can be\
    \ seen by the compiler. However, in other situations, it is possible to avoid\
    \ the direct inclusion of header files and, as result, reduce the complexity of\
    \ the application.\n\nThere are a few ways to avoid including additional header\
    \ files. For example, you can use the `@class` keyword in Objective-C to introduce\
    \ a class name whenever that class is to be used as part of a class interface.\
    \ In a class interface definition, this is generally all you need, unless you\
    \ require access to the data or methods in a class. Here is a common example:\n\
    \n```\n// file MyInternalClass.h\n@class MyExternalClass;\n\n@interface MyInternalClass\
    \ : NSObject\n{\n    MyExternalClass *externalObject;\n}\n\n-(MyExternalClass*)\
    \ getExtObject;\n\n@end\n```\n\nNotice that `MyExternalClass` is used here only\
    \ as part of the interface for `MyInternalClass`. In this case, you don’t really\
    \ need to use an `#import` directive; just the `@class` declaration is enough\
    \ to tell the compiler what kind of symbol is `MyExternalClass`. From that point\
    \ on, `MyExternalClass` is recorded by the compiler as the name of a class, which\
    \ can be used, for example, to define a instance variable or as a parameter for\
    \ other methods. Later on, you will need to import the header file for `MyExternalClass`,\
    \ but only when you’re ready to write the method implementations.\n\n```\n// file\
    \ MyInternalClass.m\n#import \"MyExtenalClass.h\"\n\n@implementation MyInternalClass\n\
    \n- (MyExternalClass*) getExtObject\n{\n    // implementation here ...\n}\n\n\
    @end\n```\n\nAnother option that you have to minimize the transitive inclusion\
    \ of other files is the creation of minimal headers, where exactly one class is\
    \ defined and not much else. In particular, external dependencies are avoided\
    \ in the interface and moved to the implementation section. The goal of this technique\
    \ is to avoid external dependencies as much as possible by adding only the interfaces\
    \ and functions that you really need in the class interface.\n\nFor example, suppose\
    \ that you are creating a new class that uses three other library header files.\
    \ Instead of creating a header that includes references to the three other libraries,\
    \ you can just define a small interface that doesn’t have external dependencies.\
    \ To help with avoiding dependencies, you can create an anonymous protocol that\
    \ contains all the properties you need in terms of dependencies to external libraries.\
    \ Then, in the implementation file, you are free to import the head files for\
    \ each library you’re using. Such a judicious separation of interface and implementation\
    \ will facilitate the importing and utilization of your class by other clients.\
    \ A side effect of this kind of judicious use is a project that is easier to maintain\
    \ and faster to build.\n\n# Summary\n\nPreprocessing is the first task that is\
    \ performed on a source file as it is prepared to become an input to the compiler.\
    \ As such, this is an important operation that needs to be mastered in order to\
    \ get the most from the Objective-C programming environment.\n\nThe preprocessor\
    \ does a number of transformations based the symbols that have been defined using\
    \ the `#define` facility, for example. These macros can be used for simple substitutions,\
    \ both with and without parameters. Parameterless macros act just like a compile-time\
    \ constant. On the other hand, macros with parameters are able of much more sophisticated\
    \ substitutions. You have seen some of the common pitfalls of employing macros,\
    \ and why you should avoid their extensive use when there are other available\
    \ options.\n\nThe preprocessor is also able to perform conditional compilation\
    \ based on compile-time expressions that can be evaluated to determine if a block\
    \ of code will be compiled or not. This kind of conditional compilation is normally\
    \ used for compatibility reasons, and can be used, for example, to create applications\
    \ that are able to run in multiple platforms.\n\nFinally, you have seen another\
    \ important task performed by the preprocessor: including header files for externally\
    \ defined classes and functions. Such header files contain interface or function\
    \ definitions that can be made readily available to other clients. The include\
    \ mechanism can be implemented using either the `#include` or `#import` directives,\
    \ and you have seen the advantages and disadvantages of each of these options.\n\
    \nUsing the knowledge you acquired about the compiler and the preprocessor, you\
    \ will start looking at some common programming tasks that can be performed by\
    \ employing the features of Objective-C. In the next chapter, you will learn how\
    \ to use these language facilities to create unit tests. You will see that Objective-C\
    \ and the Cocoa framework provide outstanding support to test-driven development\
    \ through their libraries as well as through the Xcode IDE."
  raw: '## Best Practices for Header Files


    Given the necessary and widespread use of header files in Objective-C, one needs
    to follow a few conventions to maintain a basic system organization and avoid
    performance problems. These best practices are sometimes not necessary for simple
    projects, but become increasingly important when the size of the project grows,
    and especially when there are many developers working in the same application.


    The first rule that should be followed is to include only class and function definitions
    in header files. Including the implementation of methods or functions in a header
    file is not a valid practice, because most header files are designed to be included
    in more than one place in the system. Having the same function definition occur
    twice in different files may cause a linking error, since the linker doesn’t know
    which version of your function or method should be maintained.


    Another rule of thumb is to avoid nested inclusion of header files whenever possible.
    The reason is that, because the preprocessor will perform file inclusions recursively,
    having too many header files included inside the main header file will force an
    increase in compilation time for every client of that class. In other words, in
    an include file, only add the bare minimum that will allow the class interface
    to be defined.


    It is clear that it is sometimes necessary to transitively include a header file;
    for example, when declaring a subclass of an existing class, you need to include
    the header file for the parent class so that its definition can be seen by the
    compiler. However, in other situations, it is possible to avoid the direct inclusion
    of header files and, as result, reduce the complexity of the application.


    There are a few ways to avoid including additional header files. For example,
    you can use the `@class` keyword in Objective-C to introduce a class name whenever
    that class is to be used as part of a class interface. In a class interface definition,
    this is generally all you need, unless you require access to the data or methods
    in a class. Here is a common example:


    `// file MyInternalClass.h`


    `@class MyExternalClass;`


    `@interface MyInternalClass : NSObject`


    `{`


    `MyExternalClass *externalObject;`


    `}`


    `-(MyExternalClass*) getExtObject;`


    `@end`


    Notice that `MyExternalClass` is used here only as part of the interface for `MyInternalClass`.
    In this case, you don’t really need to use an `#import` directive; just the `@class`
    declaration is enough to tell the compiler what kind of symbol is `MyExternalClass`.
    From that point on, `MyExternalClass` is recorded by the compiler as the name
    of a class, which can be used, for example, to define a instance variable or as
    a parameter for other methods. Later on, you will need to import the header file
    for MyExternalClass, but only when you’re ready to write the method implementations.


    `// file MyInternalClass.m`


    `#import "MyExtenalClass.h"`


    `@implementation MyInternalClass`


    `- (MyExternalClass*) getExtObject`


    `{`


    `// implementation here ...`


    `}`


    `@end`


    Another option that you have to minimize the transitive inclusion of other files
    is the creation of minimal headers, where exactly one class is defined and not
    much else. In particular, external dependencies are avoided in the interface and
    moved to the implementation section. The goal of this technique is to avoid external
    dependencies as much as possible by adding only the interfaces and functions that
    you really need in the class interface.


    For example, suppose that you are creating a new class that uses three other library
    header files. Instead of creating a header that includes references to the three
    other libraries, you can just define a small interface that doesn’t have external
    dependencies. To help with avoiding dependencies, you can create an anonymous
    protocol that contains all the properties you need in terms of dependencies to
    external libraries. Then, in the implementation file, you are free to import the
    head files for each library you’re using. Such a judicious separation of interface
    and implementation will facilitate the importing and utilization of your class
    by other clients. A side effect of this kind of judicious use is a project that
    is easier to maintain and faster to build.


    ## Summary


    Preprocessing is the first task that is performed on a source file as it is prepared
    to become an input to the compiler. As such, this is an important operation that
    needs to be mastered in order to get the most from the Objective-C programming
    environment.


    The preprocessor does a number of transformations based the symbols that have
    been defined using the `#define` facility, for example. These macros can be used
    for simple substitutions, both with and without parameters. Parameterless macros
    act just like a compile-time constant. On the other hand, macros with parameters
    are able of much more sophisticated substitutions. You have seen some of the common
    pitfalls of employing macros, and why you should avoid their extensive use when
    there are other available options.


    The preprocessor is also able to perform conditional compilation based on compile-time
    expressions that can be evaluated to determine if a block of code will be compiled
    or not. This kind of conditional compilation is normally used for compatibility
    reasons, and can be used, for example, to create applications that are able to
    run in multiple platforms.


    Finally, you have seen another important task performed by the preprocessor: including
    header files for externally defined classes and functions. Such header files contain
    interface or function definitions that can be made readily available to other
    clients. The include mechanism can be implemented using either the `#include`
    or `#import` directives, and you have seen the advantages and disadvantages of
    each of these options.


    Using the knowledge you acquired about the compiler and the preprocessor, you
    will start looking at some common programming tasks that can be performed by employing
    the features of Objective-C. In the next chapter, you will learn how to use these
    language facilities to create unit tests. You will see that Objective-C and the
    Cocoa framework provide outstanding support to test-driven development through
    their libraries as well as through the Xcode IDE.'
  trans: "\n# 头文件最佳实践\n\n鉴于 Objective-C 中头文件必要且广泛的使用场景，开发者需要遵循一些约定来维护基本的系统组织并避免性能问题。这些最佳实践对于简单项目而言有时并非必需，但当项目规模增大，尤其是当有许多开发者协作开发同一应用程序时，它们的重要性便日益凸显。\n\
    \n应遵循的首要规则是：头文件只应包含类和函数的定义。在头文件中包含方法或函数的实现是不规范的做法，因为大多数头文件设计用于在系统的多个位置被引用。若同一函数定义在不同文件中出现两次，可能会导致链接错误，因为链接器无法确定应保留哪个版本的函数或方法。\n\
    \n另一条经验法则是：尽可能避免头文件的嵌套引用。原因在于，由于预处理器会递归地执行文件包含操作，在主头文件中包含过多头文件，将会强制增加该类的每个使用者的编译时间。换言之，在包含文件中，仅添加能够定义该类接口的绝对必要内容即可。\n\
    \n显然，有时确实需要传递性地包含头文件；例如，当声明某个现有类的子类时，就需要包含父类的头文件，以便编译器能够看到其定义。但在其他情况下，可以避免直接包含头文件，从而降低应用程序的复杂性。\n\
    \n有几种方法可以避免包含额外的头文件。例如，在 Objective-C 中，当某个类仅作为类接口的一部分使用时，可以使用 `@class` 关键字来引入该类名。在类接口定义中，除非需要访问该类中的数据或方法，否则通常只需要这样做。下面是一个常见示例：\n\
    \n```\n// 文件 MyInternalClass.h\n@class MyExternalClass;\n\n@interface MyInternalClass\
    \ : NSObject\n{\n    MyExternalClass *externalObject;\n}\n\n-(MyExternalClass*)\
    \ getExtObject;\n\n@end\n```\n\n请注意，这里的 `MyExternalClass` 仅作为 `MyInternalClass`\
    \ 接口的一部分使用。在这种情况下，实际上并不需要使用 `#import` 指令；仅用 `@class` 声明就足以告知编译器 `MyExternalClass`\
    \ 是何种符号。从那时起，编译器便会将 `MyExternalClass` 记录为一个类的名称，可用于，例如，定义实例变量或作为其他方法的参数。稍后，当你准备编写方法实现时，才需要导入\
    \ `MyExternalClass` 的头文件。\n\n```\n// 文件 MyInternalClass.m\n#import \"MyExtenalClass.h\"\
    \n\n@implementation MyInternalClass\n\n- (MyExternalClass*) getExtObject\n{\n\
    \    // 此处为具体实现……\n}\n\n@end\n```\n\n另一个尽可能减少其他文件传递性包含的选项是创建最小化头文件——即其中只定义一个类，而没有多余内容。特别是，要在接口中避免外部依赖，并将其移至实现部分。此技术的目标是通过仅在类接口中添加你真正需要的接口和函数，来尽可能避免外部依赖。\n\
    \n例如，假设你正在创建一个使用其他三个库头文件的新类。与其创建一个引用了其他三个库的头文件，不如定义一个没有外部依赖的小型接口。为了帮助避免依赖，你可以创建一个匿名协议，其中包含你所需的、与外部库相关的所有属性。这样，在实现文件中，你就可以自由地导入所使用每个库的头文件。这种审慎的接口与实现分离，将有助于其他使用者导入和使用你的类。这种审慎用法的附带效果是使项目更易于维护、构建速度更快。\n\
    \n# 总结\n\n预处理是源文件被准备成为编译器输入时所执行的第一项任务。因此，这是一项需要掌握的重要操作，以便充分利用 Objective-C 编程环境。\n\
    \n例如，预处理器会根据使用 `#define` 工具定义的符号执行多项转换。这些宏可用于简单的替换，既可以是无参数的，也可以是带参数的。无参数宏的作用类似于编译时常量。而带参数的宏则能够执行更复杂的替换。你已经看到了一些使用宏的常见陷阱，以及为何在有其他可行选项时应避免过度使用宏。\n\
    \n预处理器还能基于编译时表达式执行条件编译，通过评估表达式的结果来决定某段代码是否会被编译。这种条件编译通常用于兼容性目的，例如，可用于创建能运行在多个平台上的应用程序。\n\
    \n最后，你已看到预处理器执行的另一项重要任务：为外部定义的类和函数包含头文件。这类头文件包含接口或函数定义，可以随时提供给其他使用者。包含机制可通过 `#include`\
    \ 或 `#import` 指令实现，并且你已经了解了这两种选项各自的优缺点。\n\n利用你所学到的关于编译器和预处理器的知识，你将开始研究一些可以通过使用\
    \ Objective-C 特性来执行的常见编程任务。在下一章中，你将学习如何使用这些语言工具创建单元测试。你将看到，Objective-C 和 Cocoa\
    \ 框架通过其库以及 Xcode IDE，为测试驱动开发提供了卓越的支持。\n"
- fmt: '# 14. Unit Testing


    ## Abstract


    Unit tests are the basis of a programming strategy that promotes the creation
    of individual checks for each feature implemented in an application. Unit tests
    can also be created to verify that a piece of code complies with some particular
    requirement. For example, if you are creating a method that adds two numbers,
    a unit test can be written to verify that the response is correct for some particular
    cases. Although you cannot prove that a piece of code works by just testing for
    specific values, running unit tests can improve your confidence that the code
    is indeed returning results that comply with your requirements.


    Another use for unit tests and associated tools is in what is called test-driven
    development (TDD). TDD is a software methodology that requires that every feature
    of a program be thoroughly specified using unit tests even before it is written.
    That is, with TDD, programmers use new tests to drive the development of code,
    which will ultimately satisfy the requirements of the written tests.


    Unit test-based development is a great way to explore the modularity of object-oriented
    languages such as Objective-C. In fact, unit test frameworks became popular in
    part due to the ability of OOP to create well-defined interfaces, with objects
    that have few dependencies on external code.


    Testing frameworks such as `OCUnit` leverage these OOP features in order to make
    unit testing available to programmers using Objective-C. In this chapter, I provide
    an overview of the support for unit testing in Objective-C using `OCUnit` and
    `Xcode`. You will learn how to quickly create unit tests in new or existing projects.
    You will also learn how to manage and run sets of unit tests using the `Xcode`
    IDE. Finally, you will see an example of how to employ TDD programming strategies
    to write code in Objective-C.


    ## Unit Test Frameworks


    Conscientious programmers have always strived to create tests that could be used
    to exercise the functionality they are implementing. Therefore, testing methodologies
    have predated the development of OOP languages, and have always played an important
    role in the creation of high quality code. However, OOP languages such as Objective-C
    provide an indispensable tool to make effective unit testing easier to accomplish.
    At the same time, the features of OOP have contributed to the creation of a common
    interface for unit testing, which can be leveraged by programmers working across
    teams or companies.


    The most influential OOP-based testing framework is `SUnit`, a unit-testing library
    created in Smalltalk. While Smalltalk popularity as a programming language has
    declined during the last decade, many of its original ideas, such as a solid runtime
    support for message-based polymorphism, have remained strong. These ideas have
    even been included in other mainstream languages such as Objective-C, JavaScript,
    and Ruby. The influence of Smalltalk also extends to unit testing technology such
    as `SUnit`, which is still nowadays used almost verbatim by these newer languages.
    Thus, Java has `JUnit`, while Objective-C has `OCUnit`, a library that follows
    a very similar design approach and interface as the one introduced by Smalltalk
    with `SUnit`.


    In this chapter, I discuss the features of `OCUnit` that are used to support the
    creation and execution of unit tests. I will concentrate the discussion on `OCUnit`
    mainly because it is a de-facto standard in the Objective-C world. One of the
    main reasons for this status is the support from Apple, as the official testing
    library deployed along with `Xcode`. The IDE allows programmers to add testing
    targets based on `OCUnit`, as well as run tests and display the results as part
    of the Log Navigation panel. For all these reasons, `OCUnit` is currently the
    natural choice for the implementation of unit tests in Objective-C.


    ## Note


    Remember that `OCUnit` is not the only testing framework that can be used with
    Objective-C. In fact, there are other testing frameworks written in Objective-C
    that have been made available as open source. It is also appropriate to employ
    frameworks written directly in the C, such as `CUnit`. The fitness of a particular
    testing framework depends much more on the needs of the project itself rather
    than on the requirements of the language. For example, in some large projects,
    the amount of code written in Objective-C is small compared to other C and/or
    C++ legacy code. This is a situation where it could be more convenient to use
    a C or C++-based testing tool.'
