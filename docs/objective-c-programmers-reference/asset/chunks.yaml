    decide to change the implementation of `respondsToSelector:` in order to fix this
    problem. A possible implementation would work according to the following lines:


    `// file SecurityProxy.h`


    `@interface SecurityProxy : NSObject`


    `- (void)forwardInvocation:(NSInvocation *)anInvocation;`


    `- (BOOL)respondsToSelector:(SEL) sel;`


    `@property (retain) MortgageSecurity *mortgageSec;`


    `@property (retain) FixedIncomeSecurity *fixIncomeSec;`


    `@end`


    The interface has changed to accommodate the new method, `respondsToSelector:`,
    which will be used to determine if a message can be processed by the SecurityProxy
    class. This method will override the existing, standard implementation, which
    returns true only for methods that have been defined as part of the class interface.


    `// file SecurityProxy.m`


    `@implementation SecurityProxy`


    `- (BOOL)respondsToSelector:(SEL) sel`


    `{`


    `if ([super respondsToSelector:sel])`


    `{`


    `return YES;`


    `}`


    `if ([_fixIncomeSec respondsToSelector:sel]`


    `|| [_mortgageSec respondsToSelector:sel])`


    `{`


    `return YES;`


    `}`


    `return NO;`


    `}`


    `- (void)forwardInvocation:(NSInvocation *)anInvocation`


    `{`


    `SEL selector = anInvocation.selector;`


    `if ([_mortgageSec respondsToSelector:selector])`


    `{`


    `[anInvocation invokeWithTarget:_mortgageSec];`


    `}`


    `else if ([_fixIncomeSec respondsToSelector:selector])`


    `{`


    `[anInvocation invokeWithTarget:_fixIncomeSec];`


    `}`


    `else`


    `{`


    `[super forwardInvocation:anInvocation];`


    `}`


    `}`


    `@end`


    The new implementation of `respondsToSelector:` is now able to check not only
    for compile-time defined methods (using the standard implementation supplied by
    `NSObject`), but also check with the two other objects `mortgageSec` and `fixIncomeSec`
    to determine if the method is valid for the `SecurityProxy` class. Here is an
    example of how this feature can be used by client code:


    `- (void) testSecurityMethods`


    `{`


    `SecurityProxy *sp = [[[SecurityProxy alloc] init] autorelease];`


    `sp.mortgageSec = [[[MortgageSecurity alloc] init] autorelease];`


    `sp.fixIncomeSec = [[[FixedIncomeSecurity alloc] init] autorelease];`


    `// this method is defined at compilation time`


    `BOOL res = [sp respondsToSelector:@selector(forwardInvocation:)];`


    `NSLog(@"the response is %d", res); // response is 1`


    `// this method is defined dynamically`


    `res = [sp respondsToSelector:@selector(calculateEquivalentBond)];`


    `NSLog(@"the response is %d", res); // response is 1`


    `}`


    This code puts together the classes described earlier and shows how they can be
    used to answer simple questions about their capabilities. The method `testSecurityMethods`
    starts by creating an instance of the `SecurityProxy` class. For this object to
    work, it needs two others: an instance of `MortgageSecurity` and an instance of
    `FixedIncomeSecurity`. They are both assigned to the corresponding properties
    `mortgageSec` and `fixIncomeSec`, respectively, which are part of `SecurityProxy`.
    Finally, you send the `respondsToSelector:` message to the `SecurityProxy` instance,
    the first time querying about `forwardInvocation:`, which is a method that is
    really defined in the public interface. The second request, however, checks for
    the `calculateEquivalentBond` method, which is part of the `FixedIncomeSecurity`
    class. Both requests return `YES`, as you expected when designing the new `respondsToSelector:`
    method.'
  trans: "\n### 实现 `respondsToSelector:`\n\n请注意，尽管上述实现提供了多继承的许多优点，但仍需谨慎，不要忘记其中的重要差异。例如，`SecurityProxy`\
    \ 与你在本节中看到的两个安全类之间并不存在父子关系。因此，编译器将无法进行在使用单一超类派生类时所允许的标准类型检查。\n\n另一方面，Objective-C\
    \ 的运行时可以通过使用动态消息来进一步调整类之间的关系。之前已经遇到过其中一种消息：`respondsToSelector:`，它用于判断一个对象是否能够响应特定消息。\n\
    \n你一直在使用 `respondsToSelector:` 来判断一个对象是否能够通过其对应的选择器来响应某个特定的方法调用。然而，如果另一个对象以 `SecurityProxy`\
    \ 为目标进行相同的方法调用，它将收到否定响应。结果为 `NO`，因为这些方法没有一个真正属于 `SecurityProxy` 所支持的消息列表。\n\n\
    如果你希望为 `SecurityProxy` 增加这一层额外的支持，可以决定修改 `respondsToSelector:` 的实现来解决此问题。一种可行的实现方式如下所示：\n\
    \n```objc\n// 文件 SecurityProxy.h\n\n@interface SecurityProxy : NSObject\n\n- (void)forwardInvocation:(NSInvocation\
    \ *)anInvocation;\n- (BOOL)respondsToSelector:(SEL) sel;\n\n@property (retain)\
    \ MortgageSecurity *mortgageSec;\n@property (retain) FixedIncomeSecurity *fixIncomeSec;\n\
    \n@end\n```\n\n接口已被修改以容纳新方法 `respondsToSelector:`，该方法将用于判断某个消息能否被 `SecurityProxy`\
    \ 类处理。此方法将覆盖现有的标准实现，该标准实现仅对已定义为类接口一部分的方法返回 `true`。\n\n```objc\n// 文件 SecurityProxy.m\n\
    \n@implementation SecurityProxy\n\n- (BOOL)respondsToSelector:(SEL) sel\n{\n \
    \   if ([super respondsToSelector:sel])\n    {\n        return YES;\n    }\n \
    \   if ([_fixIncomeSec respondsToSelector:sel]\n        || [_mortgageSec respondsToSelector:sel])\n\
    \    {\n        return YES;\n    }\n    return NO;\n}\n\n- (void)forwardInvocation:(NSInvocation\
    \ *)anInvocation\n{\n    SEL selector = anInvocation.selector;\n    if ([_mortgageSec\
    \ respondsToSelector:selector])\n    {\n        [anInvocation invokeWithTarget:_mortgageSec];\n\
    \    }\n    else if ([_fixIncomeSec respondsToSelector:selector])\n    {\n   \
    \     [anInvocation invokeWithTarget:_fixIncomeSec];\n    }\n    else\n    {\n\
    \        [super forwardInvocation:anInvocation];\n    }\n}\n\n@end\n```\n\n`respondsToSelector:`\
    \ 的新实现现在不仅能够检查编译时定义的方法（使用 `NSObject` 提供的标准实现），还能检查另外两个对象 `mortgageSec` 和 `fixIncomeSec`，以确定该方法对\
    \ `SecurityProxy` 类是否有效。以下是一个示例，展示了客户端代码如何使用此特性：\n\n```objc\n- (void) testSecurityMethods\n\
    {\n    SecurityProxy *sp = [[[SecurityProxy alloc] init] autorelease];\n    sp.mortgageSec\
    \ = [[[MortgageSecurity alloc] init] autorelease];\n    sp.fixIncomeSec = [[[FixedIncomeSecurity\
    \ alloc] init] autorelease];\n\n    // 此方法在编译时定义\n    BOOL res = [sp respondsToSelector:@selector(forwardInvocation:)];\n\
    \    NSLog(@\"结果为 %d\", res); // 结果为 1\n\n    // 此方法动态定义\n    res = [sp respondsToSelector:@selector(calculateEquivalentBond)];\n\
    \    NSLog(@\"结果为 %d\", res); // 结果为 1\n}\n```\n\n这段代码整合了之前描述的类，并展示了如何使用它们来回答关于自身能力的简单问题。方法\
    \ `testSecurityMethods` 首先创建了一个 `SecurityProxy` 类的实例。为了使该对象正常工作，它需要另外两个对象：一个 `MortgageSecurity`\
    \ 实例和一个 `FixedIncomeSecurity` 实例。这两个实例分别被赋值给 `SecurityProxy` 的对应属性 `mortgageSec`\
    \ 和 `fixIncomeSec`。最后，向 `SecurityProxy` 实例发送 `respondsToSelector:` 消息，第一次查询 `forwardInvocation:`，这是一个确实在公共接口中定义的方法。而第二次请求则检查\
