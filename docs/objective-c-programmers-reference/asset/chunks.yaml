- fmt: "### Creating a New Category\n\nTo declare a new category, you can use a syntax\
    \ that is very similar to the implementation section of a normal class. However,\
    \ in a category you will add the category name between parentheses after the class\
    \ name, so that the compiler will recognize that the subsequent declarations are\
    \ defining an extension to the original class, not the class itself.\n\nAfter\
    \ a method is added through a category, it behaves in all ways as if it was declared\
    \ directly in the original class. For example, you can call these methods using\
    \ the same syntax used to call one of the original methods of the target class.\
    \ Classes derived from the original class that is being extended by the category\
    \ will also inherit the methods defined in this way.\n\nHere is an example of\
    \ a category that implements an extension to the `NSString` class. The category\
    \ consists of just one utility method: `reverse`, returning a new string that\
    \ is the reverse of the original one.\n\n```\n@interface NSString (utility)\n\
    - (NSString *) reverse;\n@end\n```\n\nNotice the name of the category following\
    \ the class name, which distinguishes this declaration from a standard interface.\
    \ The implementation is straightforward.\n\n```\n@implementation NSString (utility)\n\
    - (NSString *) reverse\n{\n        NSMutableString *resultString = [[[NSMutableString\
    \ alloc] init] autorelease];\n        int n = (int)[self length];\n        for\
    \ (int i=n-1; i>=0; --i)\n        {\n                [resultString appendFormat:@\"\
    %c\", [self characterAtIndex:i]];\n        }\n        return resultString;\n}\n\
    @end\n```\n\nThis code uses the `NSMutableString` class, which allows data to\
    \ be added to a string using methods such as `appendFormat:`. In contrast, an\
    \ `NSString` is an immutable object, as it is common for many of the collection\
    \ classes discussed in the last chapter.\n\nCategories are used not only to extend\
    \ existing classes in the standard frameworks. In general, imagine that you have\
    \ just created a class with a handful of methods that implement a very specific\
    \ responsibility. After using the class for some time, however, you figure out\
    \ that a second type of responsibility could be added to the class, making it\
    \ even more useful to its clients. The problem, however, is that you would like\
    \ to keep the original interface as simple as possible.\n\nWhen that is the case,\
    \ Objective-C provides the concept of categories as a possible way to encapsulate\
    \ additional functionality in a class, without compromising the original code\
    \ and interface. The same technique can be applied to a class that you created\
    \ as well as to an existing class.\n\n### Using a Category Header File\n\nCategories\
    \ can be used to extend the behavior of any class in the system. However, in order\
    \ to enjoy the advantages of a new category, the client code needs to have access\
    \ to its declaration.\n\nThis can be done using the standard mechanism of header\
    \ file inclusion. As is common practice, the original class has its interface\
    \ stored in a header file in the project. For example, the header file for class\
    \ `Employee` would be named `Employee.h`. Now, suppose you want to extend the\
    \ `Employee` class by declaring a new category called `ExecutiveOptions`. In that\
    \ case, you would create a corresponding header file, `Employee+ExecutiveOptions.h`,\
    \ containing the definition of the new category. The name of the header file,\
    \ then, is a concatenation of the name of the class with the category name.\n\n\
    Note\n\nThe logic behind this header file naming convention is to avoid a conflict\
    \ with other classes. For example, it is conceivable that another class in the\
    \ system could be named `ExecutiveOption`. In that case, you would have two header\
    \ files with the same name, making it hard for users to simultaneously employ\
    \ both the class and the category. Similarly, using just the name of the class\
    \ without a suffix could result in nomenclature clashes.\n\nThe naming convention\
    \ for category header files also helps with the maintenance of the system. Using\
    \ the convention, it is very clear that any category file will have the added\
    \ plus sign as part of the file name, which makes it easy to find a list of all\
    \ categories in a project.\n\nIt is important to note, however, that not all categories\
    \ are stored in a separate header file. For the same reason that sometimes it\
    \ is better to store related classes in the same header, it may also be easier\
    \ to add categories in a file that holds some other class declarations. This is\
    \ frequently the case in the Foundation and Cocoa frameworks. The objective there\
    \ is to minimize the number of header files that programmers need to import in\
    \ order to employ a set of related classes and categories."
  raw: '### Creating a New Category


    To declare a new category, you can use a syntax that is very similar to the implementation
    section of a normal class. However, in a category you will add the category name
    between parentheses after the class name, so that the compiler will recognize
    that the subsequent declarations are defining an extension to the original class,
    not the class itself.


    After a method is added through a category, it behaves in all ways as if it was
    declared directly in the original class. For example, you can call these methods
    using the same syntax used to call one of the original methods of the target class.
    Classes derived from the original class that is being extended by the category
    will also inherit the methods defined in this way.


    Here is an example of a category that implements an extension to the `NSString`
    class. The category consists of just one utility method: `reverse`, returning
    a new string that is the reverse of the original one.


    `@interface NSString (utility)`


    `- (NSString *) reverse;`


    `@end`


    Notice the name of the category following the class name, which distinguishes
    this declaration from a standard interface. The implementation is straightforward.


    `@implementation NSString (utility)`


    `- (NSString *) reverse`


    `{`


            `NSMutableString *resultString = [[[NSMutableString alloc] init] autorelease];`


            `int n = (int)[self length];`


            `for (int i=n-1; i>=0; --i)`


            `{`


                    `[resultString appendFormat:@"%c", [self characterAtIndex:i]];`


            `}`


            `return resultString;`


    `}`


    `@end`


    This code uses the `NSMutableString` class, which allows data to be added to a
    string using methods such as `appendFormat:`. In contrast, an `NSString` is an
    immutable object, as it is common for many of the collection classes discussed
    in the last chapter.


    Categories are used not only to extend existing classes in the standard frameworks.
    In general, imagine that you have just created a class with a handful of methods
    that implement a very specific responsibility. After using the class for some
    time, however, you figure out that a second type of responsibility could be added
    to the class, making it even more useful to its clients. The problem, however,
    is that you would like to keep the original interface as simple as possible.


    When that is the case, Objective-C provides the concept of categories as a possible
    way to encapsulate additional functionality in a class, without compromising the
    original code and interface. The same technique can be applied to a class that
    you created as well as to an existing class.


    ### Using a Category Header File


    Categories can be used to extend the behavior of any class in the system. However,
    in order to enjoy the advantages of a new category, the client code needs to have
    access to its declaration.


    This can be done using the standard mechanism of header file inclusion. As is
    common practice, the original class has its interface stored in a header file
    in the project. For example, the header file for class `Employee` would be named
    `Employee.h`. Now, suppose you want to extend the `Employee` class by declaring
    a new category called `ExecutiveOptions`. In that case, you would create a corresponding
    header file, `Employee+ExecutiveOptions.h`, containing the definition of the new
    category. The name of the header file, then, is a concatenation of the name of
    the class with the category name.


    Note


    The logic behind this header file naming convention is to avoid a conflict with
    other classes. For example, it is conceivable that another class in the system
    could be named `ExecutiveOption`. In that case, you would have two header files
    with the same name, making it hard for users to simultaneously employ both the
    class and the category. Similarly, using just the name of the class without a
    suffix could result in nomenclature clashes.


    The naming convention for category header files also helps with the maintenance
    of the system. Using the convention, it is very clear that any category file will
    have the added plus sign as part of the file name, which makes it easy to find
    a list of all categories in a project.


    It is import to note, however, that not all categories are stored in a separate
    header file. For the same reason that sometimes it is better to store related
    classes in the same header, it may also be easier to add categories in a file
    that holds some other class declarations. This is frequently the case in the Foundation
    and Cocoa frameworks. The objective there is to minimize the number of header
    files that programmers need to import in order to employ a set of related classes
    and categories.'
  trans: "\n### 创建新分类\n\n要声明一个新的分类，你可以使用与普通类实现部分非常相似的语法。但在分类中，你需要将分类名称添加到类名后面的括号内，以便编译器识别后续声明是在定义原始类的扩展，而非类本身。\n\
    \n通过分类添加方法后，该方法在所有方面都表现得如同直接在原始类中声明一样。例如，你可以使用与调用目标类原始方法相同的语法来调用这些方法。从被分类扩展的原始类派生出的子类，也会继承以这种方式定义的方法。\n\
    \n以下是一个为 `NSString` 类实现扩展的分类示例。该分类仅包含一个实用方法：`reverse`，它返回一个与原字符串顺序相反的新字符串。\n\n\
    ```\n@interface NSString (utility)\n- (NSString *) reverse;\n@end\n```\n\n注意类名后跟随的分类名称，这将其声明与标准接口区分开来。其实现也很直接。\n\
    \n```\n@implementation NSString (utility)\n- (NSString *) reverse\n{\n       \
    \ NSMutableString *resultString = [[[NSMutableString alloc] init] autorelease];\n\
    \        int n = (int)[self length];\n        for (int i=n-1; i>=0; --i)\n   \
    \     {\n                [resultString appendFormat:@\"%c\", [self characterAtIndex:i]];\n\
    \        }\n        return resultString;\n}\n@end\n```\n\n这段代码使用了 `NSMutableString`\
    \ 类，该类允许通过 `appendFormat:` 等方法向字符串添加数据。相比之下，`NSString` 是不可变对象，这与上一章讨论的许多集合类的情况一致。\n\
    \n分类不仅用于扩展标准框架中的现有类。通常，设想你刚创建了一个类，其中包含一些实现特定职责的方法。然而，在使用该类一段时间后，你发现可以为该类添加第二种类型的职责，使其对使用者更实用。但问题在于，你希望尽量保持原始接口的简洁性。\n\
    \n在这种情况下，Objective-C 提供了分类的概念，作为一种在不影响原始代码和接口的前提下，将额外功能封装到类中的可能方式。同样的技术可以应用于你创建的类，也可以应用于现有类。\n\
    \n### 使用分类头文件\n\n分类可用于扩展系统中任何类的行为。然而，要享受新分类的优势，客户端代码需要能够访问其声明。\n\n这可以通过标准的头文件包含机制实现。按照常见做法，原始类的接口存储在项目中的头文件里。例如，`Employee`\
    \ 类的头文件应命名为 `Employee.h`。现在，假设你想通过声明一个名为 `ExecutiveOptions` 的新分类来扩展 `Employee`\
    \ 类。在这种情况下，你需要创建一个相应的头文件 `Employee+ExecutiveOptions.h`，其中包含新分类的定义。头文件的名称是类名与分类名的组合。\n\
    \n注意\n\n这种头文件命名约定的逻辑在于避免与其他类冲突。例如，系统中可能存在另一个名为 `ExecutiveOption` 的类。这种情况下，两个头文件同名，会使用户难以同时使用该类及其分类。类似地，仅使用类名而不加后缀可能导致命名冲突。\n\
    \n分类头文件的命名约定也有助于系统维护。遵循此约定，任何分类文件文件名中都带有加号，这便于在项目中查找所有分类的列表。\n\n然而，必须注意，并非所有分类都存放在单独的头文件中。出于与有时将相关类存放在同一头文件中相同的原因，将分类添加到包含其他类声明的文件中可能更方便。Foundation\
    \ 和 Cocoa 框架中经常出现这种情况。其目的在于尽量减少程序员为使用一组相关类和分类而需要导入的头文件数量。\n"
- fmt: "### Categories and Private Methods\n\nIn an Objective-C class it is possible\
    \ to declare instance variables with varying degrees of visibility. For public\
    \ variables, any class or function that has a pointer to the object can access\
    \ their content. Private ivars (instance variables), on the other hand, are available\
    \ only to the class itself. Finally, Objective-C also provides protected ivars,\
    \ which can be read or written by the class where they are defined, as well as\
    \ any class that inherits from it. These accessibility levels provide some assurance\
    \ that the compiler will enforce the visibility of a particular variable. This,\
    \ in turn, contributes to a better code organization since an instance variable\
    \ will only be visible or modified by a small part of the code base.\n\nIt would\
    \ be great to have the same levels of accessibility for methods as well as for\
    \ ivars. However, the design of Objective-C does not allow messages to be restricted\
    \ in this way. Messages are resolved only at runtime, which means that the compiler\
    \ has no way to enforce such access rules during compilation, as it can do for\
    \ instance variables.\n\nWhile there is no way to enforce access rules on methods,\
    \ you can use categories as a simple way to reduce the visibility of methods that\
    \ you would like to use in private. This is possible because a category can be\
    \ created as an effective way to encompass one or more methods that are known\
    \ only in the local context of a file.\n\nTo achieve this, you need to define\
    \ a new category at the beginning of an implementation file. You can use any name\
    \ for that category. Traditionally, people have used the name `Private` for this\
    \ purpose, but Objective-C also allows the name of the category to be empty, resulting\
    \ in anonymous categories. In that case, you don't need to worry about the right\
    \ name for the category. But the greatest advantage of using anonymous categories\
    \ is that there is no need to create a separate implementation section in your\
    \ file, thus reducing the amount of code to maintain.\n\nThe content of the anonymous\
    \ category will be composed of all the methods you would like to make private.\
    \ These methods can be accessed only by code pertaining to the original class\
    \ and contained in the same implementation file. Here is an example where you\
    \ implement a `Library` class with an anonymous category. The only method in this\
    \ category is `getPrivateBookTitles`.\n\n```\n// file: Library.h\n\n@interface\
    \ Library : NSObject\n\n{\n        // instance variables here\n}\n\n// standard\
    \ methods here\n\n@end\n\n// file: Library.m\n\n@interface Library ()\n\n- (NSArray\
    \ *) getPrivateBookTitles;\n\n@end\n\n@implementation Library\n\n- (NSArray *)\
    \ getPrivateBookTitles\n\n{\n        NSArray *books = @[];\n        // code to\
    \ find private books\n        return books;\n}\n\n@end\n```\n\nEven when using\
    \ anonymous categories, it is necessary to keep in mind that the mechanism doesn't\
    \ offer runtime protection for methods declared in this way. After all, it is\
    \ still possible for the user of a class to send a message that will be resolved\
    \ to a method in such a category. Remember that the mechanism of message dispatching\
    \ works in such a way that doesn't care about the target of the message, as long\
    \ as the message can be dispatched successfully. If you really don't want some\
    \ code to be executed by external classes, the best way to achieve this is to\
    \ use a static C function, since C functions aren't subjected to the message dispatching\
    \ rules of Objective-C.\n\n### Adding Properties to Categories\n\nAs you have\
    \ seen, categories can make our lives easier by allowing the extension of existing\
    \ classes with new methods, using a simple syntax. However, when we're talking\
    \ about enhancing the feature set of a class, it is frequently necessary to have\
    \ some additional memory to store data associated with the new feature. For example,\
    \ an `Employee` class may want to store health information for each person. The\
    \ method `addHeathRecords:` would need to use one or more instance variables to\
    \ keep track of the information as needed.\n\nIt is not possible, however, to\
    \ add new instance variables directly to a category. After all, the objective\
    \ of a category is to provide new methods, and not to change fundamentally the\
    \ contents of an object. However, Objective-C provides an exception to this rule\
    \ when adding an anonymous category.\n\nRemember that anonymous categories are\
    \ basically a way to add methods that are not named in the public interface of\
    \ a class. As a result, an anonymous class is viewed by the compiler as part of\
    \ the original class itself and uses the definitions of properties contained there\
    \ as a basis for synthesized ivars. This combination of properties and their synthesized\
    \ variables gives us a way to indirectly add data, which can be used throughout\
    \ the methods declared in the main implementation section.\n\nHere is an example\
    \ of how this works. Consider again a class used to model a physical library,\
    \ with information about books contained in it.\n\n```\n// file: Library.h\n\n\
    @interface Library : NSObject\n\n{\n// instance variables here\n}\n\n// methods\
    \ here\n\n@end\n\n// file: Library.m\n\n@interface Library ()\n\n@property(retain)\
    \ NSString * privateCollectionName;\n@property(retain) NSNumber * numericProperty;\n\
    - (void) setValues;\n\n@end\n\n@implementation Library\n\n@synthesize numericProperty\
    \ = _numberOfBooks; // give a different name\n\n- (void) setValues\n\n{\nself->_privateCollectionName\
    \ = @\"MyLibrary\"; // generated by the compiler\nself.numberOfBooks = @1000;\
    \ // declared with @synthesize\nNSLog(@\"setting collection name to %@\", self.privateCollectionName);\n\
    }\n\n@end\n```\n\nIn this code is a header file with the main interface to the\
    \ `Library` class (the methods and instance variables in the class are not displayed\
    \ for brevity). The `Library.m` implementation file contains an anonymous category\
    \ where two properties are declared: `privateCollectionName` and `numericProperty`.\
    \ Finally, the methods in the `Library` class are defined inside an `@implementation`\
    \ section.\n\nSince you are using an anonymous category, it is also appropriate\
    \ to add the definition for the method `setValues` in the class `@implementation`\
    \ section. Similarly, the `@synthesize` declarations that are used by the compiler\
    \ generate an instance variable with a name that is different from the name specified\
    \ by the property.\n\nThe first property (`privateCollectionName`) uses the standard\
    \ variable name synthesized by the compiler. Therefore, no `@synthesize` declaration\
    \ is needed. The instance variable is created automatically by the compiler and\
    \ named `_privateCollectionName`. Notice that you refer directly to this ivar\
    \ inside the method `setValues`.\n\nThe second property, however, has an internal\
    \ name that is different from the name declared by the `@property`. This might\
    \ happen, for example, because you want an internal name that is easier to type,\
    \ while its property name would remain more descriptive. In this example, the\
    \ property is called `numericProperty`, while the synthesized ivar is called `_numberOfBooks`.\n\
    \nThe `setValues` method shows how you can use both types of instance variables.\
    \ Each property can be accessed either as an instance variable or directly as\
    \ a property. The syntax for instance variables works by using `self` as a valid\
    \ pointer to the object. Therefore, it uses the `->` notation. The property syntax,\
    \ on the other hand, employs a dot to indicate where the compiler should generate\
    \ special code to get or set the property contents."
  raw: '### Categories and Private Methods


    In an Objective-C class it is possible to declare instance variables with varying
    degrees of visibility. For public variables, any class or function that has a
    pointer to the object can access their content. Private ivars (instance variables),
    on the other hand, are available only to the class itself. Finally, Objective-C
    also provides protected ivars, which can be read or written by the class where
    they are defined, as well as any class that inherits from it. These accessibility
    levels provide some assurance that the compiler will enforce the visibility of
    a particular variable. This, in turns, contributes to a better code organization
    since an instance variable will only be visible or modified by a small part of
    the code base.


    It would be great to have the same levels of accessibility for methods as well
    as for ivars. However, the design of Objective-C does not allow messages to be
    restricted in this way. Messages are resolved only at runtime, which means that
    the compiler has no way to enforce such access rules during compilation, as it
    can do for instance variables.


    While there is no way to enforce access rules on methods, you can use categories
    as a simple way to reduce the visibility of methods that you would like to use
    in private. This is possible because a category can be created as an effective
    way to encompass one or more methods that are known only in the local context
    of a file.


    To achieve this, you need to define a new category at the beginning of an implementation
    file. You can use any name for that category. Traditionally, people have used
    the name `Private` for this purpose, but Objective-C also allows the name of the
    category to be empty, resulting in anonymous categories. In that case, you don’t
    need to worry about the right name for the category. But the greatest advantage
    of using anonymous categories is that there is no need to create a separate implementation
    section in your file, thus reducing the amount code to maintain.


    The content of the anonymous category will be composed of all the methods you
    would like to make private. These methods can be accessed only by code pertaining
    to the original class and contained in the same implementation file. Here is an
    example where you implement a `Library` class with an anonymous category. The
    only method in this category is `getPrivateBookTitles`.


    `// file: Library.h`


    `@interface Library : NSObject`


    `{`


            `// instance variables here`


    `}`


    `// standard methods here`


    `@end`


    `// file: Library.m`


    `@interface Library ()`


    `- (NSArray *) getPrivateBookTitles;`


    `@end`


    `@implementation Library`


    `- (NSArray *) getPrivateBookTitles`


    `{`


            `NSArray *books = @[];`


            `// code to find private books`


            `return books;`


    `}`


    `@end`


    Even when using anonymous categories, it is necessary to keep in mind that the
    mechanism doesn’t offer runtime protection for methods declared in this way. After
    all, it is still possible for the user of a class to send a message that will
    be resolved to a method in such a category. Remember that the mechanism of message
    dispatching works in such a way that doesn’t care about the target of the message,
    as long as the message can be dispatched successfully. If you really don’t want
    some code to be executed by external classes, the best way to achieve this is
    to use a static C function, since C functions aren’t subjected to the message
    dispatching rules of Objective-C.


    ### Adding Properties to Categories


    As you have seen, categories can make our lives easier by allowing the extension
    of existing classes with new methods, using a simple syntax. However, when we’re
    talking about enhancing the feature set of a class, it is frequently necessary
    to have some additional memory to store data associated with the new feature.
    For example, an `Employee` class may want to store health information for each
    person. The method `addHeathRecords:` would need to use one or more instance variables
    to keep track of the information as needed.


    It is not possible, however, to add new instance variables directly to a category.
    After all, the objective of a category is to provide new methods, and not to change
    fundamentally the contents of an object. However, Objective-C provides an exception
    to this rule when adding an anonymous category.


    Remember that anonymous categories are basically a way to add methods that are
    not named in the public interface of a class. As a result, an anonymous class
    is viewed by the compiler as part of the original class itself and uses the definitions
    of properties contained there as a basis for synthesized ivars. This combination
    of properties and their synthesized variables gives us a way to indirectly add
    data, which can be used throughout the methods declared in the main implementation
    section.


    Here is an example of how this works. Consider again a class used to model a physical
    library, with information about books contained in it.


    `// file: Library.h`


    `@interface Library : NSObject`


    `{`


    `// instance variables here`


    `}`


    `// methods here`


    `@end`


    `// file: Library.m`


    `@interface Library ()`


    `@property(retain) NSString * privateCollectionName;`


    `@property(retain) NSNumber * numericProperty;`


    `- (void) setValues;`


    `@end`


    `@implementation Library`


    `@synthesize numericProperty = _numberOfBooks; // give a different name`


    `- (void) setValues`


    `{`


    `self->_privateCollectionName = @"MyLibrary"; // generated by the compiler`


    `self.numberOfBooks = @1000; // declared with @syntesize`


    `NSLog(@"setting collection name to %@", self. privateCollectionName);`


    `}`


    `@end`


    In this code is a header file with the main interface to the `Library` class (the
    methods and instance variables in the class are not displayed for brevity). The
    `Library.m` implementation file contains an anonymous category where two properties
    are declared: `privateCollectionName` and `numericProperty`. Finally, the methods
    in the Library class are defined inside an `@implementation` section.


    Since you are using an anonymous category, it is also appropriate to add the definition
    for the method `setValues` in the class `@implementation` section. Similarly,
    the `@synthesize` declarations that are used by the compiler generate an instance
    variable with a name that is different from the name specified by the property.


    The first property (`privateCollectionName`) uses the standard variable name synthesized
    by the compiler. Therefore, no `@synthesize` declaration is needed. The instance
    variable is created automatically by the compiler and named `_privateCollectionName`.
    Notice that you refer directly to this ivar inside the method `setValues`.


    The second property, however, has an internal name that is different from the
    name declared by the `@property`. This might happen, for example, because you
    want an internal name that is easier to type, while its property name would remain
    more descriptive. In this example, the property is called `numericProperty`, while
    the synthesized ivar is called `_numberOfBooks`.


    The `setValues` method shows how you can use both types of instance variables.
    Each property can be accessed either as an instance variable or directly as a
    property. The syntax for instance variables works by using `self` as a valid pointer
    to the object. Therefore, it uses the `->` notation. The property syntax, on the
    other hand, employs a dot to indicate where the compiler should generate special
    code to get or set the property contents.'
  trans: "\n### 类别与私有方法\n\n在 Objective-C 类中，可以声明具有不同可见性级别的实例变量。对于公共变量，任何拥有该对象指针的类或函数都可以访问其内容。而私有实例变量则仅对类本身可用。最后，Objective-C\
    \ 还提供了受保护的实例变量，它们可以被定义它们的类以及任何继承自该类的类读取或写入。这些可访问性级别提供了一定的保证，即编译器会强制实施特定变量的可见性。这反过来又促进了更好的代码组织，因为一个实例变量将只被代码库的一小部分可见或修改。\n\
    \n如果方法和实例变量也拥有相同的可访问性级别，那将会很棒。然而，Objective-C 的设计不允许以这种方式限制消息。消息仅在运行时解析，这意味着编译器无法像对实例变量那样，在编译期间强制执行此类访问规则。\n\
    \n虽然没有办法对方法强制执行访问规则，但你可以使用类别作为一种简单的方法来减少那些你希望私有的方法的可见性。这是可行的，因为可以创建一个类别作为有效的方法，来封装一个或多个仅在一个文件的局部上下文中已知的方法。\n\
    \n为了实现这一点，你需要在实现文件的开头定义一个新的类别。你可以为该类别使用任何名称。传统上，人们为此目的使用名称 `Private`，但 Objective-C\
    \ 也允许类别名称为空，从而形成匿名类别。在这种情况下，你无需担心为类别命名的问题。但使用匿名类别最大的优势在于，无需在文件中创建独立的实现部分，从而减少了需要维护的代码量。\n\
    \n匿名类别的内容将由你想设为私有的所有方法组成。这些方法只能由属于原始类且包含在同一实现文件中的代码访问。下面是一个示例，你使用匿名类别实现了一个 `Library`\
    \ 类。该类别中唯一的方法是 `getPrivateBookTitles`。\n\n```\n// 文件: Library.h\n\n@interface\
    \ Library : NSObject\n\n{\n        // 实例变量在此\n}\n\n// 标准方法在此\n\n@end\n\n// 文件:\
    \ Library.m\n\n@interface Library ()\n\n- (NSArray *) getPrivateBookTitles;\n\n\
    @end\n\n@implementation Library\n\n- (NSArray *) getPrivateBookTitles\n\n{\n \
    \       NSArray *books = @[];\n        // 查找私有书籍的代码\n        return books;\n}\n\
    \n@end\n```\n\n即使使用匿名类别，也必须牢记，此机制并未为以这种方式声明的方法提供运行时保护。毕竟，类的用户仍然可以发送一条消息，该消息将被解析为此类类别中的某个方法。请记住，消息分发机制的运作方式并不关心消息的目标，只要消息能够成功分发即可。如果你真的不希望某些代码被外部类执行，实现这一目标的最佳方法是使用静态\
    \ C 函数，因为 C 函数不受 Objective-C 的消息分发规则约束。\n\n### 向类别添加属性\n\n正如你所见，类别可以通过使用简单的语法，用新方法扩展现有类，让我们的生活更加轻松。然而，当谈到增强类的功能集时，通常需要一些额外的内存来存储与新功能关联的数据。例如，一个\
    \ `Employee` 类可能希望存储每个人的健康信息。方法 `addHealthRecords:` 需要使用一个或多个实例变量来根据需要跟踪这些信息。\n\
    \n但是，无法直接将新的实例变量添加到类别中。毕竟，类别的目的是提供新方法，而不是从根本上改变对象的内容。然而，在添加匿名类别时，Objective-C 为此规则提供了一个例外。\n\
    \n请记住，匿名类别基本上是一种添加未在类公共接口中命名的方法的方式。因此，编译器将匿名类别视为原始类本身的一部分，并使用其中包含的属性定义作为合成实例变量的基础。这种属性及其合成变量的组合，为我们提供了一种间接添加数据的方式，这些数据可以在主实现部分声明的方法中使用。\n\
    \n下面是一个展示其工作原理的示例。再次考虑一个用于模拟实体图书馆的类，其中包含馆内书籍的信息。\n\n```\n// 文件: Library.h\n\n\
    @interface Library : NSObject\n\n{\n// 实例变量在此\n}\n\n// 方法在此\n\n@end\n\n// 文件:\
    \ Library.m\n\n@interface Library ()\n\n@property(retain) NSString * privateCollectionName;\n\
    @property(retain) NSNumber * numericProperty;\n- (void) setValues;\n\n@end\n\n\
    @implementation Library\n\n@synthesize numericProperty = _numberOfBooks; // 赋予一个不同的名称\n\
    \n- (void) setValues\n\n{\nself->_privateCollectionName = @\"MyLibrary\"; // 由编译器生成\n\
    self.numberOfBooks = @1000; // 通过 @synthesize 声明\nNSLog(@\"将馆藏集名称设置为 %@\", self.privateCollectionName);\n\
    }\n\n@end\n```\n\n这段代码中有一个头文件，包含了 `Library` 类的主接口（为简洁起见，未显示该类中的方法和实例变量）。`Library.m`\
    \ 实现文件包含一个匿名类别，其中声明了两个属性：`privateCollectionName` 和 `numericProperty`。最后，`Library`\
    \ 类中的方法在 `@implementation` 部分内部定义。\n\n由于你使用的是匿名类别，因此同样需要在类的 `@implementation`\
    \ 部分添加方法 `setValues` 的定义。类似地，编译器使用的 `@synthesize` 声明会生成一个名称与属性指定的名称不同的实例变量。\n\n\
    第一个属性（`privateCollectionName`）使用编译器合成的标准变量名。因此，无需 `@synthesize` 声明。实例变量由编译器自动创建并命名为\
    \ `_privateCollectionName`。请注意，你在方法 `setValues` 中直接引用了这个实例变量。\n\n然而，第二个属性的内部名称与\
    \ `@property` 声明的名称不同。例如，这可能会发生，因为你想要一个更易于输入的内部名称，而其属性名则保持更具描述性。在本例中，该属性称为 `numericProperty`，而合成的实例变量称为\
    \ `_numberOfBooks`。\n\n`setValues` 方法展示了如何使用这两种类型的实例变量。每个属性既可以作为实例变量访问，也可以直接作为属性访问。实例变量的语法通过使用\
    \ `self` 作为对象的有效指针来实现。因此，它使用 `->` 符号。另一方面，属性语法使用点号来指示编译器应在何处生成特殊代码以获取或设置属性内容。\n"
- fmt: '# Protocols


    A protocol allows classes to interact using a well-known interface. Many classes
    have the need to interact with other services (or a set of services) by just calling
    a few methods that implement the desired functionality. One solution for this
    problem is to have a base class that implements the needed features, and then
    having lots of subclasses inheriting the same interface.


    However, this solution doesn’t scale well with the number of classes and services
    available in a large system. The need to implement services may inflate the number
    of classes in the application, for the simple reason that you need to customize
    how a class interacts with other parts of the system. This proliferation of types
    in languages like C++ with fewer options to extend classes is unnecessary in Objective-C.


    A solution provided by Objective-C is to declare a protocol and require that certain
    classes implement that protocol to interact with a particular service. In this
    way a client can extend existing class by just implementing the new protocol,
    instead of having to create an entirely new class for that purpose.


    There are two ways in which a protocol can be declared. The first method defines
    an informal protocol, which is just a communication mechanism between objects,
    documented through the use of categories.


    The second way to implement a protocol is by using a specific syntax. That technique
    supports not only the definition of new protocols but also the implementation
    of one or more protocols by a class.


    ## Informal Protocols


    An informal protocol is just a way to define a set of methods that should be present
    in a class in order to provide a service. It is called informal because it is
    not defined by a particular syntax, but simply by the expectation that a client
    class will define the appropriate methods. For example, suppose that you are writing
    an application to interact with moneylenders. There are several classes of moneylenders,
    such as banks, credit unions, and private investors. However, any such lender
    would provide to their clients a set of methods such as


    `- (BOOL) canLend:(float)amount;`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;`


    The first method is used to determine if the lender is able to loan the required
    amount of money. The second method will try to satisfy the lending request for
    the requested amount and for the provided loaner identification. The return value
    of `lendRequest:toLoaner:` is `YES` when the lending process finishes successfully.


    Any class that wants to act as a lender needs to provide these two methods. However,
    how they are going to provide these methods is not precisely defined by your interface.
    In fact, there are a few options for how to detect and use the right implementation
    for the methods listed above. The first technique you are going to see is based
    on categories defined in `NSObject`.


    As you know, `NSObject` is the base class for most objects in Objective-C. By
    defining a category of `NSObject`, you are able to provide a particular behavior
    to all objects in the system. Thus, you may just want to add an empty implementation
    for the methods above. Here is how this would look like as a category:


    ```

    @interface NSObject (MoneyLender)


    - (BOOL) canLend:(float)amount;


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;


    @end

    ```


    This is the interface for the new category, declaring the two new methods that
    you want to be added to all objects of the system. The implementation will be
    empty, so that you can call these methods on any object:


    ```

    @implementation NSObject (MoneyLender)


    - (BOOL) canLend:(float)amount


    {


    return NO;


    }


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId


    {


    return NO;


    }


    @end

    ```


    The methods simply return `NO` to the requests. This means that it is safe to
    call these methods, knowing that they will only return `YES` when there is a real
    implementation, not the empty one you just created.


    What is missing now is a way to call these methods. The traditional way of doing
    that includes receiving a pointer to the target object. This will show up in the
    class calling the interface. Let’s say that the class is called `InvestmentAdvisor`,
    with a method `findLoan`. The class also has a property called `loanSource`.


    ```

    @interface InvestmentAdvisor : NSObject


    {


    // other ivars here


    }


    @property (nonatomic, retain) NSObject *loanSource;


    - (void) findLoan:(float)amount;


    @end

    ```


    The implementation for this class will use the value stored in the property `loanSource`
    and try to find a loan for a particular client.


    ```

    @implementation InvestmentAdvisor


    - (void) findLoan:(float)amount


    {


    if ([self.loanSource canLend:amount])


    {


    BOOL result = [self.loanSource lendRequest:amount


    toLoaner:@"InvestmentClient"];


    if (result)


    {


    NSLog(@"The loan application was accepted");


    }


    }


    }


    @end

    ```


    You first use the value stored in `self.loanSource` to determine if the given
    source can lend the requested amount of money. If that is possible, then you send
    the `lendRequest:` message to the lender in order to complete the loan process.
    If everything goes well, you then print a message to the system log.


    **Note**


    In the code above you are using `loanSource` property without knowing if its value
    has been set. Despite this, the code still works because of the way Objective-C
    handles message passing to `nil` pointers. If the target of a message is `nil`,
    then the code generated by the compiler will automatically return `NO` for messages
    returning `BOOL`. Similarly, messages returning numbers will default to zero.
    The advantage of these special processing rules for `null` pointers is that you
    can avoid checking for `nil` each time you use a variable or property. This also
    reduces the number of `null` pointer exceptions that are so common in C and C++
    code.


    Suppose now that you want to create a class implementing the interface for `MoneyLender`.
    For that to happen, you just need to define your own class, containing the two
    methods included in the `MoneyLender` category. Here is an example:


    ```

    // MyLoanSource.h


    @interface MyLoanSource : NSObject


    - (BOOL) canLend:(float)amount;


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;


    // other methods here


    @end

    ```


    I show only the methods that are part of the protocol, but a real implementation
    would have several other methods. Here is the corresponding implementation:


    ```

    // MyLoanSource.m


    #import "MyLoanSource.h"


    @implementation MyLoanSource


    #define MAX_LOAN 1000 * 1000


    - (BOOL) canLend:(float)amount


    {


    return amount < MAX_LOAN;


    }


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId


    {


    if ([@"" isEqualToString:loanerId])


    {


    return NO;


    }


    if (value > MAX_LOAN)


    {


    return NO;


    }


    return YES;


    }


    @end

    ```


    You still need to create the code that will use the object defined above as an
    input to the `LoanAdviser` class.


    ```

    - (void) useLoanSource {


    MyLoanSource *loanSource = [[MyLoanSource alloc] init];


    InvestmentAdvisor *advisor = [[InvestmentAdvisor alloc] init];


    advisor.loanSource = loanSource;


    [advisor findLoan:10000];


    }

    ```


    This code will first create an object of type `MyLoanSource`, which implements
    the protocol defined by `LoanSource`. Then, the next line creates an advisor object,
    which is responsible for using the loan source. The property `loanSource` is set
    up with this newly created object. Finally, you send the `findLoan:` message,
    with a loan value of $10,000. As a result of this message, the loan source will
    be used, and the requested loan satisfied.'
  raw: '## Protocols


    A protocol allows classes to interact using a well-known interface. Many classes
    have the need to interact with other services (or a set of services) by just calling
    a few methods that implement the desired functionality. One solution for this
    problem is to have a base class that implements the needed features, and then
    having lots of subclasses inheriting the same interface.


    However, this solution doesn’t scale well with the number of classes and services
    available in a large system. The need to implement services may inflate the number
    of classes in the application, for the simple reason that you need to customize
    how a class interacts with other parts of the system. This proliferation of types
    in languages like C++ with fewer options to extend classes is unnecessary in Objective-C.


    A solution provided by Objective-C is to declare a protocol and require that certain
    classes implement that protocol to interact with a particular service. In this
    way a client can extend existing class by just implementing the new protocol,
    instead of having to create an entirely new class for that purpose.


    There are two ways in which a protocol can be declared. The first method defines
    an informal protocol, which is just a communication mechanism between objects,
    documented through the use of categories.


    The second way to implement a protocol is by using a specific syntax. That technique
    supports not only the definition of new protocols but also the implementation
    of one or more protocols by a class.


    ### Informal Protocols


    An informal protocol is just a way to define a set of methods that should be present
    in a class in order to provide a service. It is called informal because it is
    not defined by a particular syntax, but simply by the expectation that a client
    class will define the appropriate methods. For example, suppose that you are writing
    an application to interact with moneylenders. There are several classes of moneylenders,
    such as banks, credit unions, and private investors. However, any such lender
    would provide to their clients a set of methods such as


    `- (BOOL) canLend:(float)amount;`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;`


    The first method is used to determine if the lender is able to loan the required
    amount of money. The second method will try to satisfy the lending request for
    the requested amount and for the provided loaner identification. The return value
    of `lendRequest:toLoaner:`is `YES` when the lending process finishes successfully.


    Any class that wants to act as a lender needs to provide these two methods. However,
    how they are going to provide these methods is not precisely defined by your interface.
    In fact, there are a few options for how to detect and use the right implementation
    for the methods listed above. The first technique you are going to see is based
    on categories defined in `NSObject`.


    As you know, NSObject isthe base class for most objects in Objective-C. By defining
    a category of `NSObject`, you are able to provide a particular behavior to all
    objects in the system. Thus, you may just want to add an empty implementation
    for the methods above. Here is how this would look like as a category:


    `@interface NSObject (MoneyLender)`


    `- (BOOL) canLend:(float)amount;`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;`


    `@end`


    This is the interface for the new category, declaring the two new methods that
    you want to be added to all objects of the system. The implementation will be
    empty, so that you can call these methods on any object:


    `@implementation NSObject (MoneyLender)`


    `- (BOOL) canLend:(float)amount`


    `{`


    `return NO;`


    `}`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId`


    `{`


    `return NO;`


    `}`


    `@end`


    The methods simply return `NO` to the requests. This means that it is safe to
    call these methods, knowing that they will only return YES when there is a real
    implementation, not the empty one you just created.


    What is missing now is a way to call these methods. The traditional way of doing
    that includes receiving a pointer to the target object. This will show up in the
    class calling the interface. Let’s say that the class is called `InvestmentAdvisor`,with
    a method `findLoan`. The class also has a property called `loanSource`.


    `@interface InvestmentAdvisor : NSObject`


    `{`


    `// other ivars here`


    `}`


    `@property (nonatomic, retain) NSObject *loanSource;`


    `- (void) findLoan:(float)amount;`


    `@end`


    The implementation for this class will use the value stored in the property `loanSource`
    and try to find a loan for a particular client.


    `@implementation InvestmentAdvisor`


    `- (void) findLoan:(float)amount`


    `{`


    `if ([self.loanSource canLend:amount])`


    `{`


    `BOOL result = [self.loanSource lendRequest:amount`


    `toLoaner:@"InvestmentClient"];`


    `if (result)`


    `{`


    `NSLog(@"The loan application was accepted");`


    `}`


    `}`


    `}`


    `@end`


    You first use the value stored in `self.loanSource` to determine if the given
    source can lend the requested amount of money. If that is possible, then you send
    the `lendRequest:`message to the lender in order to complete the loan process.
    If everything goes well, you then print a message to the system log.


    Note


    In the code above you are using `loanSource` property without knowing if its value
    has been set. Despite this, the code still works because of the way Objective-C
    handles message passing to `nil` pointers. If the target of a message is `nil`,
    then the code generated by the compiler will automatically return `NO` for messages
    returning `BOOL`. Similarly, messages returning numbers will default to zero.
    The advantage of these special processing rules for `null` pointers is that you
    can avoid checking for `nil` each time you use a variable or property. This also
    reduces the number of `null` pointer exceptions that are so common in C and C++
    code.


    Suppose now that you want to create a class implementing the interface for `MoneyLender`.
    For that to happen, you just need to define your own class, containing the two
    methods included in the MoneyLender category. Here is an example:


    `// MyLoanSource.h`


    `@interface MyLoanSource : NSObject`


    `- (BOOL) canLend:(float)amount;`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;`


    `// other methods here`


    `@end`


    I show only the methods that are part of the protocol, but a real implementation
    would have several other methods. Here is the corresponding implementation:


    `// MyLoanSource.m`


    `#import "MyLoanSource.h"`


    `@implementation MyLoanSource`


    `#define MAX_LOAN 1000 * 1000`


    `- (BOOL) canLend:(float)amount`


    `{`


    `return amount < MAX_LOAN;`


    `}`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId`


    `{`


    `if ([@"" isEqualToString:loanerId])`


    `{`


    `return NO;`


    `}`


    `if (value > MAX_LOAN)`


    `{`


    `return NO;`


    `}`


    `return YES;`


    `}`


    `@end`


    You still need to create the code that will use the object defined above as an
    input to the `LoanAdviser` class.


    `- (void) useLoanSource {`


    `MyLoanSource *loanSource = [[MyLoanSource alloc] init];`


    `InvestmentAdvisor *advisor = [[InvestmentAdvisor alloc] init];`


    `advisor.loanSource = loanSource;`


    `[advisor findLoan:10000];`


    `}`


    This code will first create an object of type `MyLoanSource`, which implements
    the protocol defined by `LoanSource`. Then, the next line creates an advisor object,
    which is responsible for using the loan source. The property `loanSource` is set
    up with this newly created object. Finally, you send the `findLoan:` message,
    with a loan value of $10,000\. As a result of this message, the loan source will
    be used, and the requested loan satisfied.'
  trans: '

    # 协议


    协议允许类通过一个众所周知的接口进行交互。许多类需要仅通过调用几个实现所需功能的方法来与其他服务（或一组服务）进行交互。解决此问题的一种方法是定义一个实现所需功能的基类，然后让大量子类继承相同的接口。


    然而，这种解决方案在大型系统中，随着可用类和服务的数量增加，扩展性会变得很差。由于你需要定制一个类与系统其他部分交互的方式，实现服务的需求可能会导致应用程序中的类数量膨胀。在像
    C++ 这类可扩展选项较少的语言中，这种类型的泛滥在 Objective-C 中是不必要的。


    Objective-C 提供的一种解决方案是声明一个协议，并要求某些类实现该协议以与特定服务进行交互。通过这种方式，客户端可以通过实现新的协议来扩展现有类，而无需为此创建一个全新的类。


    声明协议有两种方式。第一种方法定义了一个非正式协议，它仅仅是对象之间的一种通信机制，通过使用类别来文档化。


    实现协议的第二种方式是使用特定的语法。这种技术不仅支持定义新协议，还支持一个类实现一个或多个协议。


    ## 非正式协议


    非正式协议只是一种定义一组方法的方式，这些方法应存在于类中以便提供服务。之所以称之为非正式，是因为它并非由特定的语法定义，而仅仅是期望客户端类会定义适当的方法。例如，假设你正在编写一个与放贷方交互的应用程序。有几种放贷方的类，例如银行、信用合作社和私人投资者。然而，任何此类放贷方都会向其客户提供一组方法，例如：


    `- (BOOL) canLend:(float)amount;`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;`


    第一个方法用于确定放贷方是否能够贷出所需金额。第二个方法将尝试为请求的金额和提供的借款人标识满足借贷请求。当借贷过程成功完成时，`lendRequest:toLoaner:`
    的返回值为 `YES`。


    任何想要充当放贷方的类都需要提供这两个方法。然而，你的接口并未精确定义它们将如何提供这些方法。实际上，有几种选项可以检测和使用上述方法的正确实现。你要了解的第一种技术基于在
    `NSObject` 中定义的类别。


    如你所知，`NSObject` 是 Objective-C 中大多数对象的基类。通过定义 `NSObject` 的一个类别，你可以为系统中的所有对象提供特定的行为。因此，你可能只想为上述方法添加一个空的实现。以下是一个类别的示例：


    ```

    @interface NSObject (MoneyLender)


    - (BOOL) canLend:(float)amount;


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;


    @end

    ```


    这是新类别的接口，声明了你希望添加到系统所有对象中的两个新方法。实现将是空的，这样你就可以在任何对象上调用这些方法：


    ```

    @implementation NSObject (MoneyLender)


    - (BOOL) canLend:(float)amount


    {


    return NO;


    }


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId


    {


    return NO;


    }


    @end

    ```


    这些方法对请求简单地返回 `NO`。这意味着调用这些方法是安全的，知道它们只有在存在真实实现（而非你刚刚创建的空实现）时才会返回 `YES`。


    现在缺少的是调用这些方法的方式。传统做法包括接收一个指向目标对象的指针。这会在调用接口的类中体现出来。假设这个类叫做 `InvestmentAdvisor`，其中有一个方法
    `findLoan`。该类还有一个名为 `loanSource` 的属性。


    ```

    @interface InvestmentAdvisor : NSObject


    {


    // 其他 ivars 在此


    }


    @property (nonatomic, retain) NSObject *loanSource;


    - (void) findLoan:(float)amount;


    @end

    ```


    此类的实现将使用存储在 `loanSource` 属性中的值，并尝试为特定客户找到贷款。


    ```

    @implementation InvestmentAdvisor


    - (void) findLoan:(float)amount


    {


    if ([self.loanSource canLend:amount])


    {


    BOOL result = [self.loanSource lendRequest:amount


    toLoaner:@"InvestmentClient"];


    if (result)


    {


    NSLog(@"贷款申请已被接受");


    }


    }


    }


    @end

    ```


    你首先使用存储在 `self.loanSource` 中的值来判断给定的来源能否贷出所需的金额。如果可能，则向放贷方发送 `lendRequest:` 消息以完成贷款流程。如果一切顺利，你就在系统日志中打印一条消息。


    **注意**


    在上面的代码中，你使用了 `loanSource` 属性，但不知道其值是否已设置。尽管如此，代码仍然有效，因为 Objective-C 处理向 `nil`
    指针发送消息的方式。如果消息的目标是 `nil`，那么编译器生成的代码会自动为返回 `BOOL` 的消息返回 `NO`。类似地，返回数字的消息默认返回零。这些针对空指针的特殊处理规则的好处是，你可以避免在每次使用变量或属性时检查
    `nil`。这也减少了在 C 和 C++ 代码中非常常见的空指针异常数量。


    现在假设你想创建一个实现 `MoneyLender` 接口的类。要实现这一点，你只需要定义你自己的类，并包含 `MoneyLender` 类别中的两个方法。示例如下：


    ```

    // MyLoanSource.h


    @interface MyLoanSource : NSObject


    - (BOOL) canLend:(float)amount;


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;


    // 其他方法在此


    @end

    ```


    我只展示了属于协议的方法，但一个真实的实现会包含其他几个方法。以下是相应的实现：


    ```

    // MyLoanSource.m


    #import "MyLoanSource.h"


    @implementation MyLoanSource


    #define MAX_LOAN 1000 * 1000


    - (BOOL) canLend:(float)amount


    {


    return amount < MAX_LOAN;


    }


    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId


    {


    if ([@"" isEqualToString:loanerId])


    {


    return NO;


    }


    if (value > MAX_LOAN)


    {


    return NO;


    }


    return YES;


    }


    @end

    ```


    你仍然需要编写代码，将上面定义的对象作为输入提供给 `LoanAdviser` 类。


    ```

    - (void) useLoanSource {


    MyLoanSource *loanSource = [[MyLoanSource alloc] init];


    InvestmentAdvisor *advisor = [[InvestmentAdvisor alloc] init];


    advisor.loanSource = loanSource;


    [advisor findLoan:10000];


    }

    ```


    这段代码首先创建一个 `MyLoanSource` 类型的对象，它实现了由 `LoanSource` 定义的协议。然后，下一行创建一个顾问对象，负责使用贷款来源。`loanSource`
    属性被设置为这个新创建的对象。最后，你发送 `findLoan:` 消息，贷款金额为 10,000 美元。作为此消息的结果，将使用贷款来源，并且请求的贷款被满足。

