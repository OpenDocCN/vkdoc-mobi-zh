    There is nothing wrong with this class, but there is room for performance improvements.
    The main issue here is that by calling the same method inside a loop you are forcing
    the runtime system to repeatedly perform the same dispatching sequence. While
    this is not so bad for a small number of repetitions, the overhead could become
    very high with a larger number of iterations.


    To avoid this problem, you can directly retrieve the implementation function for
    `simpleMethod:` and store it in an `IMP` variable. The new interface will have
    an added method.


    `// file UseIMP.h`


    `@interface UseIMP : NSObject`


    `- (void) simpleMethod:(int)param;`


    `- (void) callSimpleMethod;`


    `- (void) callWithImplementation;`


    `@end`


    The code for `callWithImplementation` looks like this:


    `typedef void (*MY_FUNC)(id, SEL, int);`


    `- (void) callWithImplementation`


    `{`


    `SEL selector = @selector(simpleMethod:);`


    `IMP imp_func = [self methodForSelector:selector];`


    `MY_FUNC myFunc = (MY_FUNC)imp_func;`


    `int i;`


    `for (i=0; i<10; ++i)`


    `{`


    `myFunc(self, selector, i);`


    `}`


    `}`


    You start by defining a name for the type that represents a `void` function receiving
    an `id`, a selector, and an integer. In the definition of `callWithImplementation`,
    you first retrieve the selector for `simpleMethod:`. Then, you get the implementation
    using `methodForSelector:`, a method that returns an `IMP` (which in practice
    is just a function pointer). Thus, you cast that function pointer into a type
    that you can call directly with the required parameters, which is stored in the
    `myFunc` variable. Once the function pointer has been assigned, you can use it
    to directly call the contents of `simpleMethod`.


    Notice that by calling directly the function pointer returned by `methodForSelector:`,
    you are bypassing the whole dynamic dispatch mechanism. Dynamic dispatch was allowed
    to run only once, when `methodForSelector:` is called. After that point, all you’re
    doing is a direct pointer access to the function, which is executed at almost
    the same speed as a normal function call. As a result, this code performs much
    better than a set of repeated message calls to `simpleMethod:`. The difference
    in runtime performance becomes much more pronounced as the number of repetitions
    increase.


    Finally, here is some sample code to test your `UseIMP` class:


    `- (void) testUseImp`


    `{`


    `UseIMP *useImp = [[[UseIMP alloc] init] autorelease];`


    `[useImp callWithImplementation];`


    `}`


    Calling `testUseImp` will result a sequence of ten lines displayed in the logging
    window, as expected.


    In general, the example above gives you a blueprint for performance improvements
    based on the suppression of dynamic message dispatch. If you have a segment of
    code that needs to be optimized, here are some steps you can follow:


    *   Determine if dynamic dispatch can be eliminated. This is possible when, in
    a particular context, the same message is being sent to the same object a large
    number of times. To have a better baseline, use a profiler to determine where
    most of the time is being spent on your code.

    *   Once a method has been selected, you can use `methodForSelector:` to retrieve
    the `IMP` pointer for that particular object. Notice that `methodForSelector:`
    itself uses the runtime system to find the target method implementation, so the
    result is guaranteed to be correct.

    *   Use the `IMP` function retrieved above to make a direct function call. This
    can be done by passing directly the two hidden parameters (`self` and the method
    selector), along with any additional parameters needed by the method.


    After you repeat this process for a few method calls occurring in some inner application
    loops, it is possible to dramatically improve the performance of the resulting
    Objective-C code. However, due to the low level manipulations that are necessary
    when using this technique, you should avoid using it unless there is a real performance
    bottleneck in your application. Remember that, for most desktop software, it is
    only in rare situations that the performance of Objective-C code may become an
    issue that needs to be addressed like this.'
  trans: '

    # 避免方法调用


    如果你是一位经验丰富的 C 语言程序员，在了解本章描述的所有动态特性后，你可能会对 Objective-C 中消息传递的性能产生一些想法。毕竟，你知道运行时会通过搜索目标对象所属的类层次结构来尝试找到方法的实现。此外，如果搜索失败，运行时还会尝试使用
    `forwardInvocation:` 方法，让对象有机会“再次响应”该消息。


    所有这些运行时行为无疑都会带来开销。好消息是，苹果公司一直在优化这种搜索机制的实现。即便如此，在某些情况下，使用标准动态派发的成本仍然过高。事实证明，Objective-C
    也针对此问题提供了合理的解决方案，其基础仍然是巧妙地使用选择器来获取方法的实现。


    要理解如何在某些情况下最小化甚至避免方法派发的开销，有必要了解方法是如何实现的。方法实现本质上就是一个带有两个特殊参数的常规 C 函数：第一个参数是指向对象的指针，也就是你所熟知的
    `self`。第二个参数是方法调用中使用的选择器，任何方法都可以访问它，并能通过 `_cmd` 特殊变量来引用。


    当你在类的 `@implementation` 部分创建方法时，这两个参数是隐藏的，但它们始终存在。事实证明，你可以获取到方法派发时实际被调用的 C 函数的指针。运行时使用
    `IMP` 类型来引用这种实现函数。对 `IMP` 函数指针的自动处理，只是语言在编译时为我们安排的众多细节之一。


    为了了解如何利用这个特性来提升性能，让我们看一个例子。`UseIMP` 类有一个名为 `simpleMethod:` 的方法，它仅将整数值打印到日志屏幕。


    ```

    // 文件 UseIMP.h


    @interface UseIMP : NSObject


    - (void) simpleMethod:(int)param;


    - (void) callSimpleMethod;


    @end

    ```


    在该类的第一个版本中，有一个名为 `callSimpleMethod` 的方法，它会重复调用 `simpleMethod`。


    ```

    // 文件 UseIMP.m


    @implementation UseIMP


    - (void)simpleMethod:(int)param


    {


    // 这里是实现代码


    NSLog(@"method called with value %d", param);


    }


    - (void) callSimpleMethod


    {


    int i;


    for (i=0; i<10; ++i)


    {


    [self simpleMethod:i];


    }


    }


    @end

    ```


    这个类本身没有问题，但仍有性能提升的空间。主要问题在于，在循环内调用同一个方法会迫使运行时系统重复执行相同的派发序列。虽然对于少量的重复来说这不算什么，但随着迭代次数的增加，开销会变得非常高。


    为了避免这个问题，你可以直接获取 `simpleMethod:` 的实现函数，并将其存储到一个 `IMP` 变量中。新的接口将增加一个方法。


    ```

    // 文件 UseIMP.h


    @interface UseIMP : NSObject


    - (void) simpleMethod:(int)param;


    - (void) callSimpleMethod;


    - (void) callWithImplementation;


    @end

    ```


    `callWithImplementation` 的代码如下所示：


    ```

    typedef void (*MY_FUNC)(id, SEL, int);


    - (void) callWithImplementation


    {


    SEL selector = @selector(simpleMethod:);


    IMP imp_func = [self methodForSelector:selector];


    MY_FUNC myFunc = (MY_FUNC)imp_func;


    int i;


    for (i=0; i<10; ++i)


    {


    myFunc(self, selector, i);


    }


    }

    ```


    首先，我们为一个类型定义了一个名称，该类型表示一个接收 `id`、选择器和一个整数的 `void` 函数。在 `callWithImplementation`
    的定义中，首先获取 `simpleMethod:` 的选择器。然后，使用 `methodForSelector:` 获取实现，这个方法返回一个 `IMP`（实际上只是一个函数指针）。接着，我们将这个函数指针转换为一个可以直接使用所需参数调用的类型，并将其存储在
    `myFunc` 变量中。一旦函数指针被赋值，就可以用它来直接调用 `simpleMethod` 的内容。


    请注意，通过直接调用 `methodForSelector:` 返回的函数指针，你绕过了整个动态派发机制。动态派发仅在调用 `methodForSelector:`
    时运行一次。在之后的过程中，你所做的只是对函数的直接指针访问，其执行速度几乎与普通函数调用相同。因此，这段代码的性能远优于对 `simpleMethod:`
    进行重复消息调用。随着重复次数的增加，运行时性能的差异会变得更加显著。


    最后，这里有一些测试 `UseIMP` 类的示例代码：


    ```

    - (void) testUseImp


    {


    UseIMP *useImp = [[[UseIMP alloc] init] autorelease];


    [useImp callWithImplementation];


    }

    ```


    调用 `testUseImp` 会在日志窗口中依次显示十行文本，正如预期的那样。


    总的来说，上面的例子为你提供了一个基于抑制动态消息派发来提升性能的基本思路。如果你有一段需要优化的代码，可以遵循以下步骤：


    -   确定是否可以消除动态派发。当在特定上下文中，同一消息被大量发送给同一个对象时，这通常是可行的。为了有一个更好的基线，请使用性能分析器来确定你的代码大部分时间花在了哪里。

    -   一旦选定了某个方法，就可以使用 `methodForSelector:` 来获取该特定对象的 `IMP` 指针。请注意，`methodForSelector:`
    本身使用的是运行时系统来查找目标方法的实现，因此结果保证是正确的。

    -   使用上面获取的 `IMP` 函数进行直接函数调用。可以通过直接传递两个隐藏参数（`self` 和方法选择器）以及方法所需的任何其他参数来完成。


    在应用内部循环中，对少数方法调用重复此过程后，就有可能显著提升 Objective-C 代码的性能。然而，由于使用此技术需要进行底层操作，除非你的应用程序存在真正的性能瓶颈，否则应避免使用它。请记住，对于大多数桌面软件来说，只有在极少数情况下，Objective-C
    代码的性能才会成为需要这样处理的问题。

    '
- fmt: '## Summary


    In this chapter, I discussed some of the dynamic dispatch features provided by
    Objective-C. The availability of such features is one of the advantages of working
    with a language that has a rich runtime system. Through the use of dynamic dispatch,
    it is possible not only to work benefits from the standard message dispatch system
    based on single inheritance, but also bend some of its rules when necessary.


    You saw how to work with selectors, with examples of how they can be used to make
    classes more generic and less dependent on particular interfaces. You discussed
    a few cases where selectors are used in the Cocoa frameworks to connect clients
    and services, without adding any explicit compile-time references between them,
    so they can be connected at runtime.


    I also discussed in this chapter the `forwardInvocation:` method, which gives
    programmers a clean way to process messages that are not recognized at compile
    time. Using this mechanism, it is possible to intercept messages that have been
    received but not matched to any member of your class interface.


    With `forwardInvocation:`, you can decide to send unrecognized messages to some
    other object that knows how to answer them properly. You saw that, when this happens,
    a class effectively adopts the interface of another. The result can be interpreted
    as a simulated form of multiple inheritance in which you can selectively adopt
    only the desired parts of the interface from two or more classes.


    Up to this point you have created objects without much regard for how they will
    be stored or disposed of after the end of their usage. Although Objective-C doesn’t
    have automatic garbage collection (at least not by default), it has a powerful
    memory management schema that assists programmers in the important task of conserving
    memory. This will be the main topic for the next chapter.


    # 8. Memory Management


    Complex memory management is one of the main problems that developers need to
    deal with when working with the C programing language. The power provided by direct
    manipulation of memory addresses, which is the hallmark of effective C programming,
    may also become a difficult issue when one needs to manually manage the location
    of those objects in memory. Objective-C, although retaining the power of the C
    programming language, also introduces a better way of organizing and managing
    memory. To simplify the use of memory-using objects, the language provides techniques
    that are fully based on OOP principles.


    As you will see, one of the advantages of working with an object-oriented language
    that emphasizes runtime features is that memory management can be streamlined
    and mostly delegated to system libraries, which can do much of the complex work.
    Programmers in Objective-C can concentrate on the practical use of objects to
    represent their application domain, instead of bothering with low-level memory
    management schemes.


    Although managing memory is much easier in Objective-C than in pure C programming,
    it is important to remember that it is still based on a manual memory management
    framework. In other words, there is no automatic garbage collector (GC) controlling
    memory, as in other languages such as Java and C# (Objective-C has provided GC
    for desktop applications, but it is being discontinued in favor of Automatic Reference
    Counting, which is described later in this chapter). Therefore, you need to realize
    that there are advantages and disadvantages to this kind of memory management
    scheme.


    Garbage collection makes memory use almost trivial. There is no need to worry
    about how objects are allocated and when they will be released. The system does
    everything for you. There are some disadvantages, however. Experience has shown
    that either a GC system is too inefficient (a major problem that can be found
    in many GC-based languages) or it is so complex that it takes a lot of computer
    resources to run. This is the case of Java, for example, where GC has been constantly
    improved for more than a decade, resulting in a complex system that needs a lot
    of memory to run effectively.


    The fact that Objective-C doesn’t rely on GC means that it can run anywhere, from
    large workstations to memory-constrained devices such as cell phones. And all
    of this is possible while still maintaining the high performance of a C-based
    language.


    The secret of Objective-C memory management is the use of a reference-based model
    for data, with a small number of simple rules that make it almost straightforward
    to allocate and release memory in an application. In this chapter, you’ll learn
    the rules that you need to master in order to write correct Objective-C code.
    After you understand the concepts behind memory management, I will also cover
    the latest technique provided by Apple compilers through ARC (Automatic Reference
    Counting), which practically removes the need for manual intervention in the memory
    management mechanism.


    ## Dealing with Memory Issues


    Before you learn how to manage memory properly, it is important to understand
    the types of memory errors that may be encountered in the course of developing
    Objective-C applications. Memory bugs, unlike other logical bugs, are among the
    most difficult to fix because they usually present themselves far away from where
    the real error occurred. Therefore, it is important to develop techniques to identify
    memory issues as soon as they happen, as a way to insure against even more complex
    problems that can take longer to fix.'
