- fmt: '### NSMutableString


    `NSMutableString`类是`NSString`的子类，允许修改其内容。因此，`NSString`可用的所有方法对`NSMutableString`同样有效，但你也可以直接修改字符串的内容，而无需为中间结果创建新的字符串。此类用于需要操作给定字符串中存储的值，或创建由两个或多个来源收集的数据计算出的字符串的情况。以下是其值得注意的方法列表：


    - `- (void)replaceCharactersInRange:(NSRange)range withString:(NSString *)aString;`：将指定范围内的所有字符替换为作为第二个参数传入的字符串。

    - `- (void)insertString:(NSString *)aString atIndex:(NSUInteger)loc;`：将第一个参数传入的字符串内容插入到目标字符串中，从参数`loc`指定的位置开始。

    - `- (void)deleteCharactersInRange:(NSRange)range;`：用于删除由`range`参数中位置定义的子字符序列。

    - `- (void)appendString:(NSString *)aString;`：使用`aString`参数中包含的字符扩充当前字符串。

    - `- (void)appendFormat:(NSString *)format, ...;`：使用提供的格式说明符将字符串追加到当前字符串的末尾。格式与`NSLog`使用的格式类似。

    - `- (void)setString:(NSString *)aString;`：使用`aString`参数重置字符串中存储的字符。

    - `- (id)initWithCapacity:(NSUInteger)capacity;`：使用第一个参数中指示的容量初始化目标`NSMutableString`对象。

    - `+ (id)stringWithCapacity:(NSUInteger)capacity;`：是一个类方法，创建并返回一个新的字符串，使用给定的容量进行初始化。

    - `- (NSUInteger)replaceOccurrencesOfString:(NSString *)target withString:(NSString
    *)replacement options:(NSStringCompareOptions)options range:(NSRange)searchRange;`：通过将`target`参数的出现替换为第二个参数定义的`replacement`来更改可变字符串。


    ### NSValue


    `NSValue`为作为其他数据类型包装器的对象提供了抽象接口。`NSValue`被用作其他重要类（如`NSNumber`和`NSData`）的基础。以下是其主要方法的列表：


    - `- (void)getValue:(void *)value;`：将`NSValue`中存储的内部值复制到给定的存储区域。

    - `- (const char *)objCType;`：返回一个以空字符结尾的字符数组（C字符串），该数组编码了`NSValue`中存储的数据类型。此类型描述被`NSValue`中的其他方法使用。

    - `- (id)initWithBytes:(const void *)value objCType:(const char *)type;`：使用`value`参数中传入的数据初始化`NSValue`。此方法还将数据类型设置为参数`type`。注意，不应手动生成`type`；而应使用`@encode`关键字查找与现有类型对应的字符串。

    - `+ (NSValue *)valueWithBytes:(const void *)value objCType:(const char *)type;`：返回一个新的`NSValue`对象，其中包含通过`value`参数地址传入的数据。此方法还将数据类型设置为参数`type`。注意，不应手动生成`type`；而应使用`@encode`关键字查找与现有类型对应的字符串。

    - `+ (NSValue *)value:(const void *)value withObjCType:(const char *)type;`：类似于上述方法。

    - `+ (NSValue *)valueWithNonretainedObject:(id)anObject;`：创建一个新的`NSValue`，使用`anObject`作为其初始值。使用此方法的优点是它不会保留传入的对象，因此当与其他容器一起使用时可能很有用。

    - `- (id)nonretainedObjectValue;`：将包含的数据作为`id`返回（内部被视为指针）。

    - `+ (NSValue *)valueWithPointer:(const void *)pointer;`：创建一个新的`NSValue`对象，使用作为参数传入的指针作为内容。如果你想在容器中存储指针，此方法很有用。

    - `- (void *)pointerValue;`：将目标`NSValue`对象中包含的数据作为指针返回。

    - `- (BOOL)isEqualToValue:(NSValue *)value;`：如果目标对象与作为参数传入的`value`相等，则返回`YES`。比较使用存储值的适当类型进行。


    ### NSNumber


    `NSNumber`是用于操作原生数字的基本类。`NSNumber`的最大用例是在 Objective-C 集合中存储原生数字数据类型。此类充当数字子类的外壳，因此为所有子类提供了通用接口，这样你只需使用一个数字类。'
  raw: '### NSMutableString


    The `NSMutableString` class is a subclass of `NSString` that allows the modification
    of its contents. Therefore, all methods available for `NSString` are valid for
    `NSMutableString`, but you can also directly modify the contents of the string
    without having to create new strings for the intermediate results. This class
    is used in situations where you want to manipulate the value stored in a given
    string or create a string that is computed from data collected from two or more
    sources. Here is a list of its methods worthy of mention:


    *   `- (void)replaceCharactersInRange:` `(NSRange)range withString:(NSString *)aString;`
    replaces all characters in the specified range with the string passed as the second
    parameter.

    *   `- (void)insertString:` `(NSString *)aString atIndex:(NSUInteger)loc;` inserts
    the contents of the string passed as the first argument into the target string,
    starting from the location specified by parameter `loc`.

    *   `- (void)deleteCharactersInRange:` `(NSRange)range;` is used to remove a subsequence
    of characters, as defined by the locations in the `range` parameter.

    *   `- (void)appendString:` `(NSString *)aString`; augments the current string
    using the characters contained in the `aString` argument.

    *   `- (void)appendFormat:` `(NSString *)format, ...`; appends a string to the
    end of the current string, using the format specifier provided. The format is
    similar to the one used by `NSLog`.

    *   `- (void)setString:` `(NSString *)aString`; resets the characters stored in
    the string using the `aString` argument.

    *   `- (id)initWithCapacity:` `(NSUInteger)capacity`; initializes the target `NSMutableString`
    object using the capacity indicated in the first parameter.

    *   `+ (id)stringWithCapacity:` `(NSUInteger)capacity`; is a class method that
    creates and returns a new string, initialized using the given capacity.

    *   `- (NSUInteger)replaceOccurrencesOfString:` `(NSString *)target withString:(NSString
    *)replacement options:(NSStringCompareOptions)options range:(NSRange)searchRange`;
    changes the mutable string by replacing occurrences of the target parameter with
    the replacement defined by the second parameter.


    ### NSValue


    An `NSValue` provides an abstract interface for objects that function as a wrapper
    for other data types. `NSValue` is used as the base for other important classes
    such as `NSNumber` and `NSData`. Here is a list of its main methods:


    *   `- (void)getValue:` `(void *)value`; copies the internal value stored in the
    `NSValue` to the given storage area.

    *   `- (const char *)objCType`; returns a null-terminated array of characters
    (a C string) that encodes the type of the data stored in the `NSValue`. This type
    description is used by other methods in `NSValue`.

    *   `- (id)initWithBytes:(` `const void *)value objCType:(const char *)type`;
    initializes an `NSValue` with the data passed in the `value` parameter. This method
    also sets the type of the data to the argument type. Notice that type should not
    be generated manually; instead use the `@encode` keyword to find the string corresponding
    to an existing type.

    *   `+ (NSValue *)valueWithBytes:` `(const void *)value objCType:(const char *)type`;
    returns a new `NSValue` object with the data passed by address in the `value`
    parameter. This method also sets the type of the data to the argument `typ`. Notice
    that type should not be generated manually; instead use the `@encode` keyword
    to find the string corresponding to an existing type.

    *   `+ (NSValue *)value:(const void *)value withObjCType:(const char *)type`;
    is similar to the method above.

    *   `+ (NSValue *)valueWithNonretainedObject:` `(id)anObject`; creates a new `NSValue`,
    using `anObject` as its initial value. The advantage of using this method is that
    it will not retain the passed object, so this might be useful when used with other
    containers.

    *   `- (id)nonretainedObjectValue`; returns the contained data as an id (which
    is internally treated as a pointer).

    *   `+ (NSValue *)valueWithPointer:` `(const void *)pointer`; creates a new `NSValue`
    object using the pointer passed as parameter as the contents. This method is useful
    if you want to store a pointer in a container.

    *   `- (void *)pointerValue`; returns the contained data in the target `NSValue`
    object as a pointer.

    *   `- (BOOL)isEqualToValue:` `(NSValue *)value`; returns YES if the target objet
    is equal to the value passed as an argument. The comparison is performed using
    the appropriate types for the stored value.


    ### NSNumber


    `NSNumber` is a basic class used to manipulate native numbers. The biggest use
    case for `NSNumber` is to store native numeric data types on Objective-C collections.
    This class acts as a shell for numeric subclasses, and therefore presents a common
    interface to them all, so that you just need to use a single numeric class.'
