    \ Xcode 提供的功能，以促进软件错误的识别和消除。你还将看到 Objective-C 程序员可以利用 Objective-C 支持的特性使用的一些调试技术。\n\
    \n# 15. 调试\n\n**摘要**\n\n任何程序员都知道编写无缺陷软件是多么困难。这就是为什么每个平台都有许多集成的调试辅助工具，用于支持识别、重现和修复编程错误。Xcode\
    \ 为编写和调试程序提供了完整的解决方案，这使得在新应用或现有应用中查找错误变得更加容易。在本章中，我将解释如何使用这些调试功能。\n\n你将首先了解通用调试方法如何应用于\
    \ Objective-C 程序。为此，我将解释一些对查找和修复任何编程语言中的错误都很有价值的通用调试策略。然后，你将看到如何使用包含 Xcode 和相关命令行工具的\
    \ Objective-C 环境来支持这些通用调试策略。\n\n必要时，我将通过示例描述如何使用 Xcode 的功能，如断点、监视窗口、条件表达式和日志终端。我还将讨论如何使用`gdb`和`LLVM`调试器等命令行工具。\n\
    \n## 通用调试策略\n\n调试软件是一项需要大量脑力活动的工作，其思维方式与其他编程活动不同。在编程时，你处于“创造者”模式，不断尝试生成良好的软件设计并为现有代码添加新功能；而在调试时，你主要处于“研究者”模式，试图找出特定问题可能隐藏的位置。这种视角的差异是许多人发现难以高效查找和修复错误的原因。\n\
    \n从许多方面来看，在软件中发现问题类似于侦探工作。你需要有一个完善的流程来评估可能的原因并找出错误的根本原因。就像侦探一样，你从数据收集开始，这些数据稍后将用于精确定位问题发生的位置。只有在那时，你才能着手创建和验证关于如何解决该特定问题的假设。\n\
    \n以下是结构良好的调试策略所需步骤的总结。\n"
- fmt: '# 数据收集：调试的第一步

    收集数据是解决调试问题的第一步。你需要收集与尝试修复的问题相关的所有信息。为此，有一个非常重要的工具需要考虑使用：一个能够重现问题的案例。无法重现的漏洞非常难以解决，因为你无法追查最初导致问题出现的场景。信息收集过程的首要目标应该是确定如何可靠地重现该漏洞。只有这样，你才能开始着手确定修复方案。


    # 定义假设：调试的第二步

    当你有办法重现问题之后，下一步就是创建一个关于为什么这不起作用的假设。例如，你可能错误地初始化了一个变量。或者算法中缺少了一个步骤。无论你对问题根源的专业猜测是什么，你都应该制定一个计划来测试这个假设。这通常涉及更多的信息收集，比如查看应用程序日志，或者在调试器中运行应用程序。通过这样做，你将对你试图修复的漏洞的根本原因有更清晰的认识。反复进行“做出专业猜测并尝试用数据验证该猜测”的过程，直到你找到一个或多个可能导致观察到的问题的原因。一旦你找到了指向错误行为的线索，你也会对如何修复它有一个初步的想法。这个知识是你寻找问题过程中产生的附带结果，也是你进行数据收集所取得成果的体现。


    # 应用修复：调试的第三步

    在你测试了你的假设，并确定它对应了问题的根本原因之后，是时候对代码应用修复了。这可能只是纠正一个小逻辑错误的小改动。但在某些情况下，它也可能导致大的改动，甚至是应用程序的重构。这完全取决于问题的严重程度以及你处理所感知到的问题的策略。


    # 创建一个或多个单元测试：调试的第四步

    如果你正在按照前一章所述创建单元测试，那么现在是添加另一个测试用例的好时机。添加单元测试有两个原因。首先，在编码过程中，单元测试非常有用，因为它们允许你在进行时专注于单个问题。单元测试让你可以专注于特定的漏洞，并致力于让代码按预期工作，而不是担心程序中所有其他可能出错的地方。一旦你设置好了单元测试，确保它通过，然后返回去测试完整的应用程序。单元测试的第二个作用体现在检查回归上：当定期执行时，单元测试会自动告诉你该问题将来是否再次出现。这为你提供了一个良好的保证，即使未来引入了可能发生变化的代码，程序也能继续按预期工作。


    上述概述的一般步骤可以在任何编程语言中执行。然而，正如你将看到的，`Objective-C`提供了一套独特的工具，这些工具方便了需要在代码中修复一个或多个问题的开发人员的工作。这不仅得益于语言本身的特性，还得益于编程环境，其中包括调试器（`gdb`或`LLVM`调试器）和`Xcode`集成调试器（它在命令行调试器的支持下工作）。


    在接下来的章节中，你将概述可用于实现上述步骤的调试工具。特别是，你需要使用那些能简化有关编程漏洞数据收集过程的工具。利用这些信息，你可以使用调试环境来测试假设，并验证所提出的解决方案是否能修复报告的漏洞。


    ## 使用 Xcode 进行调试

    `Xcode`最好的特性之一是开发工具的紧密集成，其中调试扮演着重要角色。`Xcode`中的集成调试器是`gdb`（或`LLVM`调试器，具体取决于你项目中使用的调试设置）的前端。使用`Xcode`进行调试的巨大优势在于使用`IDE`时获得的视觉反馈。例如，你可以通过简单地点击想要停止执行的行来创建断点。或者，你可以通过将鼠标悬停在编辑器中的变量名上来查看局部变量的值。与标准调试器的操作相比，这大大节约了时间。


    ### 控制程序执行

    想要进行有效的调试控制，你需要学习的第一组指令是用于程序执行的指令。通过这些指令，程序员能够运行、停止或单步执行用`C`或`Objective-C`代码编写的函数和方法。这些命令提供了调试会话的基本部分，因为如果你想有机会观察代码正在做什么，就需要有某种方法来控制应用程序的执行。


    要开始执行一个应用程序，你需要使用`run`命令。该指令会加载程序的可执行文件，并读取其中包含的所有调试信息。调试器还会请求操作系统立即执行该程序。之后，程序被加载到内存中，你可以开始为调试会话定义断点停止位置和其他有用的属性。


    `Xcode`中的`run`命令会按预期执行程序。你可以使用菜单 `Product ➤ Run` 来访问此功能。你也可以使用 `⌘ + R` 键盘快捷键。


    “步过”操作用于在源代码中移动单步。这意味着当前行中的所有指令都会被执行，应用程序在到达下一行时停止。要单步执行程序，你有两个选项：“步进”将跳转到下一行，或者跳转到当前行执行的任何用户函数或方法的第一行。当你想要跳入当前代码行所调用的方法时，使用“步进”。


    另一个步进选项“步过”将直接转到下一行代码，而不会在当前行可能调用的任何其他用户代码处停止。这两种步进执行选项都可以从 `Product ➤ Debug`
    菜单中找到。你也可以使用 `F6` 键盘快捷键执行“步过”，使用 `F7` 执行“步进”。'
  raw: 'Data Collection: Gathering data is the first step in solving a debugging problem.
    You need to collect all the information that is relevant to the issue you’re trying
    to fix. To this end, there is a very important tool that you need to consider
    using: a case that can reproduce the problem. A bug that cannot be reproduced
    is very difficult to solve, because you cannot track down the situations that
    generated the problem in the first place. The first goal of your information gathering
    process should be to determine how to reliably reproduce the bug. Only then can
    you start to determine a fix for the issue.   Defining a Hypothesis: The next
    step, after you have a way to reproduce the issue, is to create a hypothesis of
    why this is not working. For example, you might be initializing a variable incorrectly.
    Or a step in your algorithm is missing. Whatever your educated guess about the
    origin of the problem, you should follow up with a plan to test that hypothesis.
    This usually involves more information gathering, such as looking at the application
    logs, or running the application on the debugger. By doing this, you will have
    a better idea about the root cause of the bug you’re trying to fix. The process
    of making an educated guess and trying to prove that guess with data should be
    repeated until you find one or more possible cause for the observed problem. Once
    you find something that points to incorrect behavior, you will also have an initial
    idea about how to fix it. This knowledge comes as a side effect of the process
    you followed in order to find the issue and is a result of the data collection
    you performed.   Applying a Fix: After you test your hypothesis and determine
    that it corresponds to the root cause of the problem, it is time to apply a fix
    to the code. This may be just a small change that corrects a minor logic mistake.
    But it can also, in some cases, result in a large change or even a redesign of
    your application. It all depends on how severe the problem is and your strategy
    for dealing with the perceived issue.   Creating One or More Unit Tests: If you
    are creating unit tests, as explained in the previous chapter, this is a good
    time for another test case. There are two reasons why you may want to add unit
    tests. First, during coding, unit tests are very useful because they allow you
    to focus on a single issue as you proceed. Instead of worrying about everything
    else that might be wrong in your program, a unit test allows you to concentrate
    on a particular bug, and work towards making the code work as desired. Once you
    have the unit test set up, make sure it passes and then go back to test the complete
    application. A second way in which unit tests happen is in checking for regressions:
    when regularly executed, a unit test will automatically tell you if the problem
    ever occurs in the future. This gives you a good guarantee that the program will
    continue to work as desired, even in the presence of changes that may be introduced
    in the future.


    The general steps outlined above can be performed in any programming language.
    However, as you will see, Objective-C provides a unique set of tools that facilitate
    the work of developers that need to fix one or more issues in their code. This
    is made possible not only by the characteristics of the language itself, but also
    by the programming environment, which includes the debugger (gdb or LLVM debugger)
    and the Xcode integrated debugger (which works with the support of the command
    line debugger).


    In the next sections, you will get an overview of the debugging tools that can
    be used to implement the steps discussed above. In particular, you will want to
    employ tools that simplify the process of gathering data concerning the programming
    bug. Using this information, you can then use the debugging environment to test
    the hypothesis and verify if the proposed solution can fix the reported bug.


    ## Debugging with Xcode


    One of the best features of Xcode is the tight integration of development tools,
    where debugging plays an important role. The integrated debugger in Xcode is a
    front end to gdb (or LLVM debugger, depending on the debugging settings used in
    your project). The great advantage of debugging with Xcode is the visual feedback
    you receive when using the IDE. For example, you can create breakpoints by simply
    clicking the line where you want to stop the execution. Or you can verify the
    value of a local variable by hovering over the variable name in the editor. This
    is a real time saver when compared with the operation of a standard debugger.


    ### Controlling Program Execution


    The first set of instructions you will want to learn for effective debugging control
    are the ones used for program execution. With these instructions, a programmer
    is able to run, stop, or step into functions and methods written in C or Objective-C
    code. Such commands provide the essential parts of a debugging session, since
    you need to have some way of controlling the execution of the application if you
    want to have a chance of observing what the code is doing.


    To start the execution of an application, you need to use the `run` command. This
    instruction will load the program executable and read all the debugging information
    contained in it. The debugger will also request that the program be immediately
    executed by the operating system. After that point, the program is loaded into
    memory and you can start defining breakpoint stops and other useful properties
    for the debugging session.


    The `run` command in Xcode will execute the program as desired. You can use the
    menu Product ➤ Run to access this functionality. You can also use the ⌘ +R keyboard
    shortcut.


    The step operation is used to move a single step in the source code. This means
    that all the instructions in the current line are executed, and the application
    stops when the next line is reached. To execute a single step of the program,
    you have two options: step into will jump either to the next line or to the first
    line of any user function or method that is executed by the current line. You
    use step into when you want to jump into a method that is being called by the
    current line of code.


    The other step option, step over, will go directly to the next line of code, without
    stopping on any other user code that might be called in the current line. Both
    step execution options are available from the Product ➤ Debug menu. You can also
    use the F6 keyboard shortcut to perform a step-over and F7 to do a step-into.'
