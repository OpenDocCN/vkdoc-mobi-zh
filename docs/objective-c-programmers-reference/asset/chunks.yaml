- fmt: '# Summary


    In this chapter I gave an overview of memory management in Objective-C. You saw
    the importance of memory management as a technique to avoid programming errors
    resulting from incorrect memory accesses. Using memory correctly is necessary
    in order to avoid common issues such as memory leaks, which cause unresponsive
    applications and ultimately crashes for lack of memory resources.


    It is difficult to write correct software without knowing how objects are created,
    held in memory, and ultimately disposed. While Objective-C doesn’t use garbage
    collection of unused memory (mainly for performance reasons), the Foundation framework
    provides a simple mechanism for memory management that is consistently followed
    throughout the system.


    There are three methods that control how memory is released or retained in memory:
    `retain`, `release`, and `autorelease`. These methods are present in every object
    that is derived from `NSObject`, and they provide a fine control of when memory
    should be freed by an application. These methods are the building blocks for every
    memory management scheme in Objective-C.


    You learned how to use autorelease pools to facilitate the use of objects that
    are controlled by autorelease. By carefully employing autorelease pools, it is
    possible to reduce the amount of memory necessary for a particular algorithm,
    since memory will be freed more frequently. In a graphical application that uses
    large objects such as images and sound files, this is the kind of change that
    can make a difference in performance and ease of use for your product. Autorelease
    pools can, in some situations, also be helpful for performance reasons: since
    you are postponing memory release to some later time, you may have to spend less
    time overall to manage the immediate release of objects.


    You saw examples of how the memory management messages interact with properties
    and their different attributes. Properties can be used to simplify many of the
    techniques of memory management, since they can automatically retain or release
    the objects they hold. By carefully choosing the attributes of properties, you
    can simplify a great deal of your code while making use of the features provided
    by the Objective-C compiler.


    Finally, I discussed Automatic Reference Counting, the new technology in which
    the compiler is responsible for deducing the correct instructions for retaining
    or releasing memory. To use ARC, you just need to follow some conventions about
    how to handle memory references and activate the compile-time settings. The result
    is a very fast and robust system, with low memory consumption and reduced opportunities
    for programming errors.


    In the next chapter, I will introduce key-value programming, a technique that
    is used throughout Cocoa and many other third-party libraries. With key-value
    programming, you will be able to use not only dynamic code through messages, but
    also dynamic data that can be accessed in a generic way.


    # 9. Key-Value Coding


    ## Abstract


    In previous chapters you saw several ways in which Objective-C programmers can
    use OOP concepts to work with code. For example, developers can enjoy the dynamic
    nature of the language to implement polymorphic functionality through message
    passing, and even add new methods to existing classes employing the concept of
    protocols.


    Another aspect of OOP, however, regards the access to data contained in objects.
    Although it is wise to avoid direct access to data managed by an object, Objective-C
    provides a well-defined process for getting and setting data using the property
    mechanism. Properties make data available to other objects, while at the same
    time retaining the ability to control how this data will be shared.


    Properties, however, are not the only way to share data across objects. In this
    chapter I will discuss key-value coding (KVC), a generic access mechanism for
    data publishing based on the functionality of the `NSObject` hierarchy. Key-value
    coding has been devised to allow data to be exchanged among objects through the
    use of keys, which are encoded as a string. In KVC, therefore, it is not necessary
    to call a different method for each data element; instead, a simple interface
    can be used to get and set a wide range of data.


    Another reason why key-value programming is an important topic is that it is used
    in so many Objective-C libraries. For example, the CoreData framework, used to
    store and retrieve data from databases as well as other repositories, employs
    a model based on KVC to save and retrieve data objects. With KVC, data can be
    accessed through a simple interface, avoiding the need to create multiple subclasses
    when the only difference between objects is in the set of values they contain.'
