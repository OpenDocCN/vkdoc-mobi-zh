- fmt: "## Debugging Memory Issues\n\nMemory problems are some of the most difficult\
    \ to track down using a debugger. The main reason for this difficulty is that\
    \ in many cases a memory-related issue manifests itself far away from the point\
    \ where the real problem occurs. For an example, consider a problem caused by\
    \ a premature object release, like in the following method:\n\n```\n- (void) getArrayValue\n\
    {\n    NSArray *values = @[ @0, @1, @2, @3];\n    NSArray *numbers = values;\n\
    \    // do something with the values array here.\n    [values release];\n    //\
    \ do something else here...\n    id two = numbers[2];\n    NSLog(@\"number is\
    \ %@\", two);\n}\n```\n\nThis code fails because at some point the array values\
    \ are also stored in the variable `numbers`. However, after using `values`, the\
    \ code releases it, without also invalidating the reference stored in `number`.\n\
    \nIn a more general case, an object may be released in one part of your application,\
    \ when in fact it is still needed somewhere else. The future access to the object,\
    \ however, may take several seconds or minutes to occur, as happens in many typical\
    \ desktop applications. In the case of a client-server application, on the other\
    \ hand, it may even take days between the incorrect release and the future access\
    \ to a released object.\n\nSimilar memory corruption issues, such as illegal array\
    \ access, invalid pointers, etc., may be hard to track due to the distance between\
    \ the error and the access failure. This is the reason why we need additional\
    \ help when tracking such memory errors. Just stepping over the code may not be\
    \ enough to catch defects that result from memory management issues.\n\nThankfully,\
    \ Xcode has a number of features that can be used to help track such annoying\
    \ memory errors. The first one you will learn about is the `ZombieObject` option.\n\
    \n### Using NSZombie\n\n`NSZombie` is a debugging aid that is able to detect incorrect\
    \ access to objects that have been previously released. In such a scenario, a\
    \ message is incorrectly sent to an object that is no longer available, causing\
    \ an immediate crash. The resulting problem is difficult to diagnose because the\
    \ access is not necessarily related to the release operation, which may have happened\
    \ in a distinct section of code.\n\nThe `NSZombie` option in Xcode involves compiler\
    \ support and converts all `release` operations into the creation of an object\
    \ of the class `NSZombie`. These are very simple objects whose only function is\
    \ to print an error when one of its methods is called. After all, since the original\
    \ object it represents was supposedly released, any access to the object must\
    \ be the sign of a memory access error.\n\nThe advantage of this strategy is that,\
    \ instead of receiving an unhelpful crash, you will see an immediate and clear\
    \ error message detailing that a message was sent to a released object. The message\
    \ will also contain the location where the zombie object was created, which is\
    \ the same place where the incorrect release occurred. In addition, the zombie\
    \ object records information such as the type of the released object and the original\
    \ pointer address. Using this information, it becomes much easier to track down\
    \ the faulty logic that allowed the bad release to occur in the first place.\n\
    \nTo use `NSZombie` in your application, the following steps are necessary. First,\
    \ select the scheme for the current project using the menu Product ➤ Scheme ➤\
    \ Edit Scheme (or using the `Command+<` keyboard shortcut). Then, you should select\
    \ the Arguments tab at the top of the panel. On arguments passed on launch, check\
    \ `NSZombieEnabled`. On the Diagnostics tab, you should also click the option\
    \ \"Enable Zombie Objects\" in the Memory Management group.\n\nWhen setting the\
    \ `NSZombie` options, make sure that you're modifying the debug profile, since\
    \ there is a performance penalty for using these options. They should be necessary\
    \ only during debugging sessions and not on the release versions of your application.\n\
    \n### Using the guardmalloc Library\n\nWhile `NSZombie` is a great tool to detect\
    \ memory issues when accessing objects, it doesn't help you when you're using\
    \ traditional C types such as structures and arrays. For this purpose, you should\
    \ turn to `guardmalloc`, the debugging library for general memory allocation.\n\
    \nTo add support for `guardmalloc` in your debugging environment, you first need\
    \ to access the debug scheme. Just select the menu option Product ➤ Scheme ➤ Edit\
    \ Scheme. Then, click the Diagnostics tab on the top of the panel. Click the Enable\
    \ Guard Malloc option box, which is listed in the Memory Management group.\n\n\
    The `guardmalloc` library is a replacement for the standard allocation library\
    \ used by methods such as `alloc`. The difference between `guardmalloc` and other\
    \ allocation libraries is that it organizes memory in such a way that an incorrect\
    \ access will immediately generate an exception (or crash). The way `guardmalloc`\
    \ works is by exploiting the virtual memory system present in most modern processors.\n\
    \nBy allocating a page of virtual memory for each request, `guardmalloc` makes\
    \ sure that the virtual memory system will detect any misuse of that memory. For\
    \ example, suppose that you, by mistake, try to access an array with a negative\
    \ number.\n\n```\n- (void) accessArray:(int) index\n{\n    int *values = (int*)malloc(sizeof(int)*10);\n\
    \    // initialize values array here...\n    // index contains -1 in this example:\n\
    \    int result = values[index];\n    NSLog(@\"result is %d\", result);\n    free(values);\n\
    }\n```\n\nThe method above uses the parameter `index` to access a value in the\
    \ `values` array. The method is not checking the value of `index`, however, which\
    \ results in a reference to a negative position in the C array. If you're not\
    \ using `guardmalloc`, this kind of reference can succeed but will return incorrect\
    \ results, which makes it much more difficult to debug. The reason is that you\
    \ would need to audit all of the code to find the exact place where the incorrect\
    \ access happened. This is very difficult to do, especially in a multithreaded\
    \ application where the memory can be modified by several concurrent execution\
    \ threads.\n\nWith `guardmalloc`, however, this and other places where memory\
    \ is allocated directly are guarded using the virtual memory instructions employed\
    \ by the processor. Therefore, an incorrect access, as shown above, will generate\
    \ an immediate crash in the application. If you are running in debug mode, this\
    \ is helpful because the debugger will show the exact place where the crash occurred.\
    \ Using the debugger, you will be able to determine the conditions that triggered\
    \ the crash and fix it before it can result in further problems. The `guardmalloc`\
    \ is one of the most useful tools available to fix basic memory access problems\
    \ in C and Objective-C. Use it whenever you see suspicious memory corruption problems,\
    \ and you will most probably identify a place where incorrect memory access is\
    \ occurring.\n\n## Additional Tools\n\nWhile the debugger is the most visible\
    \ and hands-on tool used during the process of detecting and fixing programming\
    \ errors, it is not the only device that you should be using for this purpose.\
    \ A number of other applications can give you additional help in the process of\
    \ correcting software defects. They complement the standard set of tools that\
    \ have been used by most programmers, and give you an advantage in the difficult\
    \ task of keeping the system current and bug-free.\n\nIn the next sections, I\
    \ discuss two tools that have become indispensable aids in software development.\
    \ Version control systems are used to maintain several versions of the code of\
    \ applications of all sizes. They facilitate the communication between members\
    \ in a team and can even simplify the task of finding bugs. Second, I discuss\
    \ bug track systems, which are essential to maintain up-to-date information about\
    \ bugs and other issues observed by testers and other users of application software."
  raw: '## Debugging Memory Issues


    Memory problems are some of the most difficult to track down using a debugger.
    The main reason for this difficulty is that in many cases a memory-related issue
    manifests itself far away from the point where the real problem occurs. For an
    example, consider a problem caused by a premature object release, like in the
    following method:


    `- (void) getArrayValue`


    `{`


            `NSArray *values = @[ @0, @1, @2, @3];`


            `NSArray *numbers = values;`


            `// do something with the values array here.`


            `[values release];`


            `// do something else here...`


            `id two = numbers[2];`


            `NSLog(@"number is %@", two);`


    `}`


    This code fails because at some point the array values are also stored in the
    variable numbers. However, after using values, the code releases it, without also
    invalidating the reference stored in number.


    In a more general case, an object may be released in one part of your application,
    when in fact it is still needed somewhere else. The future access to the object,
    however, may take several seconds or minutes to occur, as happens in many typical
    desktop applications. In the case of a client-server application, on the other
    hand, it may even take days between the incorrect release and the future access
    to a released object.


    Similar memory corruption issues, such as illegal array access, invalid pointers,
    etc., may be hard to track due to the distance between the error and the access
    failure. This is the reason why we need additional help when tracking such memory
    errors. Just stepping over the code may not be enough to catch defects that result
    from memory management issues.


    Thankfully, Xcode has a number of features that can be used to help track such
    annoying memory errors. The first one you will learn about is the `ZombieObject`
    option.


    ### Using NSZombie


    `NSZombie` is a debugging aid that is able to detect incorrect access to objects
    that have been previously released. In such a scenario, a message is incorrectly
    sent to an object that is no longer available, causing an immediate crash. The
    resulting problem is difficult to diagnose because the access is not necessarily
    related to the release operation, which may have happened in a distinct section
    of code.


    The `NSZombie` option in Xcode involves compiler support and converts all `release`
    operations into the creation of an object of the class `NSZombie`. These are very
    simple objects whose only function is to print an error when one of its methods
    is called. After all, since the original object it represents was supposedly released,
    any access to the object must be the sign of a memory access error.


    The advantage of this strategy is that, instead of receiving an unhelpful crash,
    you will see an immediate and clear error message detailing that a message was
    sent to a released object. The message will also contain the location where the
    zombie object was created, which is the same place where the incorrect release
    occurred. In addition, the zombie object records information such as the type
    of the released object and the original pointer address. Using this information,
    it becomes much easier to track down the faulty logic that allowed the bad release
    to occur in the first place.


    To use `NSZombie` in your application, the following steps are necessary. First,
    select the scheme for the current project using the menu Product ➤ Scheme ➤ Edit
    Scheme (or using the Command+< keyboard shortcut). Then, you should select the
    Arguments tab at the top of the panel. On arguments passed on launch, check “NSZombieEnabled.”
    On the Diagnostics tab, you should also click the option “Enable Zombie Objects”
    in the Memory Management group.


    When setting the `NSZombie` options, make sure that you’re modifying the debug
    profile, since there is a performance penalty for using these options. They should
    be necessary only during debugging sessions and not on the release versions of
    your application.


    ### Using the guardmalloc Library


    While `NSZombie` is a great tool to detect memory issues when accessing objects,
    it doesn’t help you when you’re using traditional C types such as structures and
    arrays. For this purpose, you should turn to `guardmalloc`, the debugging library
    for general memory allocation.


    To add support for `guardmalloc` in your debugging environment, you first need
    to access the debug scheme. Just select the menu option Product ➤ Scheme ➤ Edit
    Scheme. Then, click the Diagnostics tab on the top of the panel. Click the Enable
    Guard Malloc option box, which is listed in the Memory Management group.


    The `guardmalloc` library is a replacement for the standard allocation library
    used by methods such as `alloc`. The difference between `guardmalloc` and other
    allocation libraries is that it organizes memory is such a way that an incorrect
    access will immediately generate an exception (or crash). The way `guardmalloc`
    works is by exploiting the virtual memory system present in most modern processors.


    By allocating a page of virtual memory for each request, `guardmalloc` makes sure
    that the virtual memory system will detect any misuse of that memory. For example,
    suppose that you, by mistake, try to access an array with a negative number.


    `- (void) accessArray:(int) index`


    `{`


            `int *values = (int*)malloc(sizeof(int)*10);`


            `// initialize values array here...`


            `// index contains -1 in this example:`


            `int result = values[index];`


            `NSLog(@"result is %d", result);`


            `free(values);`


    `}`


    The method above uses the parameter index to access a value in the values array.
    The method is not checking the value of index, however, which results in a reference
    to a negative position in the C array. If you’re not using `guardmalloc`, this
    kind of reference can succeed but will return incorrect results, which makes it
    much more difficult to debug. The reason is that you would need to audit all of
    the code to find the exact place where the incorrect access happened. This is
    very difficult to do, especially in a multithreaded application where the memory
    can be modified by several concurrent execution threads.


    With `guardmalloc`, however, this and other places where memory is allocated directly
    are guarded using the virtual memory instructions employed by the processor. Therefore,
    an incorrect access, as show above, will generate an immediate crash in the application.
    If you are running in debug mode, this is helpful because the debugger will show
    the exact place where the crash occurred. Using the debugger, you will be able
    to determine the conditions that triggered the crash and fix it before it can
    result in further problems. The `guardmalloc` is one of the most useful tools
    available to fix basic memory access problems in C and Objective-C. Use it whenever
    you see suspicious memory corruption problems, and you will most probably identify
    a place where incorrect memory access is occurring.


    ## Additional Tools


    While the debugger is the most visible and hands-on tool used during the process
    of detecting and fixing programming errors, it is not the only device that you
    should be using for this purpose. A number of other applications can give you
    additional help in the process of correcting software defects. They complement
    the standard set of tools that have been used by most programmers, and give you
    an advantage in the difficult task of keeping the system current and bug-free.


    In the next sections, I discuss two tools that have become indispensable aids
    in software development. Version control systems are used to maintain several
    versions of the code of applications of all sizes. They facilitate the communication
    between members in a team and can even simplify the task of finding bugs. Second,
    I discuss bug track systems, which are essential to maintain up-to-date information
    about bugs and other issues observed by testers and other users of application
    software.'
  trans: "\n## 调试内存问题\n\n内存问题是使用调试器最难追踪的一类问题。造成这种困难的主要原因是，在许多情况下，内存相关问题会在远离真正问题发生点的地方显现出来。例如，考虑一个由过早释放对象引起的问题，就像以下方法中所示：\n\
    \n```\n- (void) getArrayValue\n{\n    NSArray *values = @[ @0, @1, @2, @3];\n\
    \    NSArray *numbers = values;\n    // 此处对 values 数组进行一些操作。\n    [values release];\n\
    \    // 此处执行其他操作...\n    id two = numbers[2];\n    NSLog(@\"number is %@\", two);\n\
    }\n```\n\n这段代码会失败，因为在某个时刻，数组 `values` 也被存储在变量 `numbers` 中。然而，在使用完 `values` 后，代码将其释放，却没有同时使存储在\
    \ `number` 中的引用失效。\n\n在更一般的情况下，一个对象可能在应用程序的某个部分被释放，而实际上它在其他地方仍然被需要。然而，对该对象的后续访问可能需要几秒或几分钟才会发生，就像在许多典型的桌面应用程序中那样。另一方面，对于客户端-服务器应用程序，从错误释放到后续访问一个已释放的对象，甚至可能相隔数天。\n\
    \n类似的内存损坏问题，例如非法数组访问、无效指针等，由于错误发生点与访问失败点之间的距离，可能难以追踪。这就是我们在追踪此类内存错误时为什么需要额外帮助的原因。仅仅单步执行代码可能不足以捕捉由内存管理问题导致的缺陷。\n\
    \n幸运的是，Xcode 具有许多功能，可用于帮助追踪此类烦人的内存错误。你将了解的第一个功能是 `ZombieObject` 选项。\n\n### 使用\
    \ NSZombie\n\n`NSZombie` 是一种调试辅助工具，能够检测对先前已释放对象的不正确访问。在这种情况下，一条消息被错误地发送给一个不再可用的对象，从而导致立即崩溃。由此产生的问题难以诊断，因为该访问与释放操作（可能发生在不同的代码段中）并不一定有直接关联。\n\
    \nXcode 中的 `NSZombie` 选项涉及编译器支持，并将所有 `release` 操作转换为创建 `NSZombie` 类对象的过程。这些是非常简单的对象，其唯一功能是在其某个方法被调用时打印一个错误。毕竟，由于它所代表的原始对象据称已被释放，因此对该对象的任何访问都必定是内存访问错误的迹象。\n\
    \n这种策略的优势在于，你不会遇到一个无甚帮助的崩溃，而是会立即看到一条清晰明确的错误消息，详细说明有一条消息被发送给了已释放的对象。该消息还将包含僵尸对象被创建的位置，也就是错误释放发生的位置。此外，僵尸对象还记录了诸如已释放对象的类型和原始指针地址等信息。利用这些信息，追踪最初导致错误释放有问题的逻辑就变得容易得多。\n\
    \n要在你的应用程序中使用 `NSZombie`，需要执行以下步骤。首先，使用菜单 Product ➤ Scheme ➤ Edit Scheme（或使用 `Command+<`\
    \ 键盘快捷键）为当前项目选择方案。然后，你应该选择面板顶部的 Arguments 选项卡。在启动时传递的参数中，勾选 `NSZombieEnabled`。在\
    \ Diagnostics 选项卡中，你还应在“内存管理”组中点击“启用僵尸对象”选项。\n\n在设置 `NSZombie` 选项时，请确保你正在修改调试配置文件，因为使用这些选项会带来性能损失。它们应该只在调试会话期间是必要的，而不应在应用程序的发布版本中使用。\n\
    \n### 使用 guardmalloc 库\n\n虽然 `NSZombie` 是检测访问对象时内存问题的绝佳工具，但当你使用传统的 C 类型（如结构体和数组）时，它并不能提供帮助。为此，你应该求助于\
    \ `guardmalloc`，这是一个用于通用内存分配的调试库。\n\n要在你的调试环境中添加对 `guardmalloc` 的支持，你首先需要访问调试方案。只需选择菜单选项\
    \ Product ➤ Scheme ➤ Edit Scheme。然后，点击面板顶部的 Diagnostics 选项卡。勾选“启用 Guard Malloc”选项框，该选项列在“内存管理”组中。\n\
    \n`guardmalloc` 库是 `alloc` 等方法使用的标准分配库的替代品。`guardmalloc` 与其他分配库之间的区别在于，它以一种不正确访问将立即产生异常（或崩溃）的方式来组织内存。`guardmalloc`\
    \ 的工作原理是利用大多数现代处理器中存在的虚拟内存系统。\n\n通过为每个请求分配一个虚拟内存页，`guardmalloc` 确保虚拟内存系统能够检测到对该内存的任何误用。例如，假设你错误地尝试使用一个负数来访问数组。\n\
    \n```\n- (void) accessArray:(int) index\n{\n    int *values = (int*)malloc(sizeof(int)*10);\n\
    \    // 此处初始化 values 数组...\n    // 在此示例中，index 为 -1：\n    int result = values[index];\n\
    \    NSLog(@\"result is %d\", result);\n    free(values);\n}\n```\n\n上面的方法使用参数\
    \ `index` 来访问 `values` 数组中的一个值。然而，该方法没有检查 `index` 的值，这导致了对 C 数组中负位置的引用。如果你没有使用\
    \ `guardmalloc`，这种引用可能会成功，但会返回不正确的结果，这使得调试变得更加困难。原因在于，你需要审查所有代码才能找到不正确访问发生的确切位置。这非常困难，尤其是在一个多个并发执行线程可能会修改内存的多线程应用程序中。\n\
    \n然而，使用 `guardmalloc`，这一点以及其他直接分配内存的地方，都将受到处理器使用的虚拟内存指令的保护。因此，如上所示的不正确访问会在应用程序中立即产生崩溃。如果你在调试模式下运行，这非常有帮助，因为调试器会显示崩溃发生的精确位置。使用调试器，你将能够确定触发崩溃的条件，并在它导致进一步问题之前修复它。`guardmalloc`\
    \ 是可用于修复 C 和 Objective-C 中基本内存访问问题的最有用的工具之一。每当你看到可疑的内存损坏问题时，请使用它，你极有可能识别出发生不正确内存访问的位置。\n\
    \n## 附加工具\n\n虽然调试器是检测和修复编程错误过程中最直观、最实用的工具，但它并不是你应该为此目的使用的唯一工具。许多其他应用程序可以在纠正软件缺陷的过程中为你提供额外的帮助。它们补充了大多数程序员使用的标准工具集，并让你在维护系统当前状态且无缺陷这项艰巨任务中获得优势。\n\
    \n在接下来的部分中，我将讨论两个已成为软件开发中不可或缺的助手。版本控制系统用于维护各种规模应用程序代码的多个版本。它们促进了团队成员之间的沟通，甚至能简化查找错误的任务。其次，我将讨论缺陷跟踪系统，这对于维护关于测试人员和其他应用程序软件用户发现的错误及其他问题的最新信息至关重要。\n"
- fmt: "### Version Control Systems\n\nThe most common additional tool used for debugging\
    \ issues is a version control system (VCS). A number of open source VCS tools\
    \ have emerged in the last few years; they currently offer the same level of sophistication\
    \ as the best commercial VCS applications. The leading open source tools for version\
    \ control are `subversion` and `git`. These two systems have different implementation\
    \ philosophies, but they are both high quality tools that can be effectively used\
    \ for fine-grained control of software updates.\n\nWith `subversion`, you have\
    \ a client-server system that can store multiple revisions of a set of source\
    \ files. You can quickly make changes to files and have these changes stored in\
    \ a server and available for a group of programmers. `Git` is another open source\
    \ VCS; it uses a distributed methodology for source control, where each developer\
    \ has a complete copy of the revisions, which can work independently of a server.\
    \ In such a system, developers can collaborate by sharing the modifications they\
    \ implemented locally. This contrasts with the methodology used by `subversion`,\
    \ where all modifications are stored in a centralized location.\n\nThe main advantage\
    \ of using such a system as a helper for tracking programming errors is that you\
    \ can use it to see how the system evolved, and how this evolution interacted\
    \ with the problem you’re trying to solve. For example, the `blame` functionality\
    \ that is implemented both by `subversion` and `git` allows the developer to determine\
    \ exactly when a change was added to a particular file. This information can help\
    \ you determine if a particular change was made by mistake or if it was a valid\
    \ part of a new feature. The logs available along with `blame` can also be used\
    \ to determine who made the changes in question.\n\nAnother thing you can do with\
    \ a VCS is to move your copy to an earlier version and see if the bug was still\
    \ there. This kind of exploration is extremely helpful during the initial phases\
    \ of bug fixing, when you’re still gathering as much information as you can about\
    \ the problem and how it interacts with the other parts of the system. This kind\
    \ of investigation is so useful that `git` has even introduced a software mode\
    \ for investigation of older releases. The `bisect` option is used to navigate\
    \ through the history of the project with a binary search strategy. You can do\
    \ the same with `subversion`, however, which allows you to determine exactly when\
    \ a bug was introduced in the source code.\n\n### Bug Tracking Systems\n\nThe\
    \ bug tracking or ticket system is another indispensable tool when working with\
    \ software defects. A ticket system can help make your process easier to follow,\
    \ so that you can prioritize the efforts in software development and error removal.\
    \ A good bug tracking system will allow you to keep detailed information about\
    \ how, when, and where a particular error is occurring. The bug tracking system\
    \ also provides a common collaboration tool, so that developers, testers, and\
    \ users can have access to the same information about failures detected in the\
    \ system. With this information, it is possible to tackle more complex problems\
    \ and share all the information generated by everyone involved with the system.\n\
    \nYou should use the bug tracking system to store instructions to reproduce the\
    \ bug; describe the error with as much detail as you can; store data about the\
    \ environment where the software is running; and plan the process of fixing the\
    \ bug, with the amount of effort necessary, target date, and other related information.\
    \ All this information can be used to drive the debugging process, so that you\
    \ can have a broader perspective of how fixing the bug fits with other activity\
    \ in the system. You can also use the VCS to coordinate with other software engineers\
    \ and guarantee that no efforts are duplicated in the process.\n\nWhile these\
    \ are not the only tools used in the discovery and eradication of software defects,\
    \ such applications are the ones that you will find more frequently on the lists\
    \ of most used. They have helped in improving the quality of software for many\
    \ groups of users, and they might just be a good choice for your development efforts.\n\
    \n## Summary\n\nSoftware bugs are a common problem that afflicts any programming\
    \ team, independent of how careful they might be. It is therefore important to\
    \ use tools to facilitate the process of finding and fixing software bugs as they\
    \ are discovered.\n\nThe Objective-C language has a great ecosystem, with debugging\
    \ tools that are tightly integrated to the environment. The Xcode IDE has a large\
    \ number of features that can be used to automate the debugging process. Features\
    \ such as a visual debugger, visual breakpoints, and data watchers make it a valuable\
    \ instrument for the several activities necessary to fix software defects.\n\n\
    The programming environment also has other valuable tools for detection and correction\
    \ of memory issues. The `NSZombie` mechanism is used to generate code that intercepts\
    \ messages sent to incorrectly released objects. The `guardmalloc` debugging library\
    \ is used to detect invalid accesses to memory, such as array references to locations\
    \ that lie beyond the end of the allocated memory. The `guardmalloc` library uses\
    \ the hardware for effective handling of memory barriers, and it is therefore\
    \ able to accurately determine the location where such erroneous accesses are\
    \ executed.\n\nFinally, you have seen a few tools that can be used to support\
    \ the debugging process. Applications such as `git` and `subversion` are not specific\
    \ to Objective-C, but they offer new possibilities, such as examining older versions\
    \ of the source code. It is also possible to determine exactly who worked on a\
    \ particular version of a source file, which is helpful when working in a large\
    \ team. Bug tracking systems, on the other hand, are used to maintain a detailed\
    \ description of software faults. They are helpful in storing instructions for\
    \ reproducing a bug, or the necessary steps to fix an existing issue.\n\nI finished\
    \ this chapter with the overview of the most important aspects of Objective-C\
    \ and its programming environment. In the next chapter, you will get a complete\
    \ example of a typical Objective-C application written for Mac OS X. You will\
    \ see how the concepts we have explored so far can be put together into a working\
    \ program that is able to benefit from the integration with the Cocoa framework.\n\
    \n# Part 4  \nWriting Apps for OS X and iOS"
  raw: '### Version Control Systems


    The most common additional tool used for debugging issues is a version control
    system (VCS). A number of open source VCS tools have emerged in the last few years;
    they currently offer the same level of sophistication as the best commercial VCS
    applications. The leading open source tools for version control are subversion
    and git. These two systems have different implementation philosophies, but they
    are both high quality tools that can be effectively used for fine-grained control
    of software updates.


    With subversion, you have a client-server system that can store multiple revisions
    of a set of source files. You can quickly make changes to files and have these
    changes stored in a server and available for a group of programmers. Git is another
    open source VCS; it uses a distributed methodology for source control, where each
    developer has a complete copy of the revisions, which can work independently of
    a server. In such a system, developers can collaborate by sharing the modifications
    they implemented locally. This contrasts with the methodology used by subversion,
    where all modifications are stored in a centralized location.


    The main advantage of using such a system as a helper for tracking programming
    errors is that you can use it to see how the system evolved, and how this evolution
    interacted with the problem you’re trying to solve. For example, the blame functionality
    that is implemented both by subversion and git allows the developer to determine
    exactly when a change was added to a particular file. This information can help
    you determine if a particular change was made by mistake or if it was a valid
    part of a new feature. The logs available along with blame can also be used to
    determine who made the changes in question.


    Another thing you can do with a VCS is to move your copy to an earlier version
    and see if the bug was still there. This kind of exploration is extremely helpful
    during the initial phases of bug fixing, when you’re still gathering as much information
    as you can about the problem and how it interacts with the other parts of the
    system. This kind of investigation is so useful that git has even introduced a
    software mode for investigation of older releases. The bisect option is used to
    navigate through the history of the project with a binary search strategy. You
    can do the same with subversion, however, which allows you to determine exactly
    when a bug was introduced in the source code.


    ### Bug Tracking Systems


    The bug tracking or ticket system is another indispensable tool when working with
    software defects. A ticket system can help make your process easier to follow,
    so that you can prioritize the efforts in software development and error removal.
    A good bug tracking system will allow you to keep detailed information about how,
    when, and where a particular error is occurring. The bug tracking system also
    provides a common collaboration tool, so that developers, testers, and users can
    have access to the same information about failures detected in the system. With
    this information, it is possible to tackle more complex problems and share all
    the information generated by everyone involved with the system.


    You should use the bug tracking system to store instructions to reproduce the
    bug; describe the error with as much detail as you can; store data about the environment
    where the software is running; and plan the process of fixing the bug, with the
    amount of effort necessary, target date, and other related information. All this
    information can be used to drive the debugging process, so that you can have a
    broader perspective of how fixing the bug fits with other activity in the system.
    You can also use the VCS to coordinate with other software engineers and guarantee
    that no efforts are duplicated in the process.


    While these are not the only tools used in the discovery and eradication of software
    defects, such applications are the ones that you will find more frequently on
    the lists of most used. They have helped in improving the quality of software
    for many groups of users, and they might just be a good choice for your development
    efforts.


    ## Summary


    Software bugs are a common problem that afflicts any programming team, independent
    of how careful they might be. It is therefore important to use tools to facilitate
    the process of finding and fixing software bugs as they are discovered.


    The Objective-C language has a great ecosystem, with debugging tools that are
    tightly integrated to the environment. The Xcode IDE has a large number of features
    that can be used to automate the debugging process. Features such as a visual
    debugger, visual breakpoints, and data watchers make it a valuable instrument
    for the several activities necessary to fix software defects.


    The programming environment also has other valuable tools for detection and correction
    of memory issues. The `NSZombie` mechanism is used to generate code that intercepts
    messages sent to incorrectly released objects. The `guardmalloc` debugging library
    is used to detect invalid accesses to memory, such as array references to locations
    that lie beyond the end of the allocated memory. The `guardmalloc` library uses
    the hardware for effective handling of memory barriers, and it is therefore able
    to accurately determine the location where such erroneous accesses are executed.


    Finally, you have seen a few tools that can be used to support the debugging process.
    Applications such as git and subversion are not specific to Objective-C, but they
    offer new possibilities, such as examining older versions of the source code.
    It is also possible to determine exactly who worked on a particular version of
    a source file, which is helpful when working in a large team. Bug tracking systems,
    on the other hand, are used to maintain a detailed description of software faults.
    They are helpful in storing instructions for reproducing a bug, or the necessary
    steps to fix an existing issue.


    I finished this chapter with the overview of the most important aspects of Objective-C
    and its programming environment. In the next chapter, you will get a complete
    example of a typical Objective-C application written for Mac OS X. You will see
    how the concepts we have explored so far can be put together into a working program
    that is able to benefit from the integration with the Cocoa framework.


    # Part 4

    Writing Apps for OS X and iOS'
  trans: "\n### 版本控制系统\n\n用于调试问题最常见的辅助工具是版本控制系统（VCS）。过去几年中，涌现出大量开源 VCS 工具；目前它们提供的功能复杂度与最优秀的商业\
    \ VCS 应用相当。领先的开源版本控制工具是 `subversion` 和 `git`。这两个系统的实现理念不同，但它们都是高质量的工具，能够有效用于对软件更新进行细粒度控制。\n\
    \n使用 `subversion`，你将拥有一个客户端-服务器系统，可以存储一组源文件的多个修订版本。你可以快速修改文件，并将这些修改存储在服务器上，供一组程序员使用。`Git`\
    \ 是另一个开源 VCS；它采用分布式方法进行源代码控制，每位开发者都拥有修订版本的完整副本，可以独立于服务器工作。在这类系统中，开发者可以通过共享本地实现的修改来进行协作。这与\
    \ `subversion` 采用的方法形成对比，后者所有修改都存储在集中式位置。\n\n使用此类系统辅助追踪编程错误的主要优势在于，你可以用它查看系统的演变过程，以及这种演变如何与你试图解决的问题相互作用。例如，`subversion`\
    \ 和 `git` 都实现的 `blame` 功能，允许开发者精确确定某次修改是何时添加到特定文件中的。这些信息可以帮助你判断某个特定修改是误操作，还是某个新功能的有效组成部分。与\
    \ `blame` 功能一起提供的日志也可用于确定相关修改的提交者。\n\n使用 VCS 还能做另一件事：将你的副本回退到更早的版本，查看该 bug 是否仍然存在。这种探索在\
    \ bug 修复的初始阶段极其有用，此时你仍在尽可能多地收集关于问题及其与系统其他部分如何相互作用的信息。这类调查如此有用，以至于 `git` 甚至引入了一种用于调查旧版本的软件模式。`bisect`\
    \ 选项用于通过二分搜索策略遍历项目的历史记录。你也可以使用 `subversion` 完成同样的操作，这使你能够精确确定 bug 是何时被引入源代码的。\n\
    \n### Bug 追踪系统\n\nBug 追踪或工单系统是处理软件缺陷时另一个不可或缺的工具。工单系统可以帮助让你的流程更易于跟进，从而能够优先安排软件开发和错误消除方面的工作。一个好的\
    \ bug 追踪系统能让你保存关于特定错误发生方式、时间和地点的详细信息。Bug 追踪系统还提供了一个通用的协作工具，使开发者、测试人员和用户都能访问到关于系统中检测到的故障的相同信息。借助这些信息，可以处理更复杂的问题，并共享所有相关人员生成的系统信息。\n\
    \n你应该使用 bug 追踪系统来存储重现 bug 的说明；尽可能详细地描述错误；存储软件运行环境的数据；规划修复 bug 的流程，包括所需工作量、目标日期及其他相关信息。所有这些信息都可以用于驱动调试过程，从而让你能更全面地了解修复\
    \ bug 如何与系统中的其他活动相契合。你还可以使用 VCS 与其他软件工程师协调，确保过程中没有重复劳动。\n\n虽然这些并非用于发现和消除软件缺陷的唯一工具，但此类应用是你最常能在常用工具列表中发现的。它们帮助许多用户群体提高了软件质量，并且很可能也是你开发工作中的不错选择。\n\
    \n## 总结\n\n软件 bug 是困扰任何编程团队的常见问题，无论团队多么谨慎都难以避免。因此，使用工具来促进发现和修复软件 bug 的过程至关重要，尤其是在\
    \ bug 被发现之时。\n\nObjective-C 语言拥有一个优秀的生态系统，其调试工具与环境紧密结合。Xcode IDE 拥有大量可用于自动化调试过程的功能。诸如可视化调试器、可视化断点和数据监视器等功能，使其成为修复软件缺陷所需多种活动中的宝贵工具。\n\
    \n该编程环境还拥有其他用于检测和纠正内存问题的宝贵工具。`NSZombie` 机制用于生成拦截发送给错误释放对象的消息的代码。`guardmalloc`\
    \ 调试库用于检测对内存的无效访问，例如引用位于分配内存末尾之外的数组位置。`guardmalloc` 库利用硬件有效处理内存屏障，因此能够精确确定执行此类错误访问的位置。\n\
    \n最后，你了解了一些可用于支持调试过程的工具。像 `git` 和 `subversion` 这样的应用并非 Objective-C 专属，但它们提供了新的可能性，例如检查源代码的旧版本。还可以精确确定谁处理了某个源文件的特定版本，这在大型团队中工作时很有帮助。另一方面，bug\
    \ 追踪系统用于维护软件故障的详细描述。它们有助于存储重现 bug 的说明，或修复现有问题所需的必要步骤。\n\n在本章结尾，我概述了 Objective-C\
    \ 及其编程环境最重要的几个方面。在下一章中，你将看到一个为 Mac OS X 编写的典型 Objective-C 应用的完整示例。你将看到我们目前探讨的概念如何整合成一个能受益于与\
    \ Cocoa 框架集成的可运行程序。\n\n# 第四部分  \n为 OS X 和 iOS 编写应用\n"
- fmt: '# 16. Building OS X GUI Applications


    ## Abstract


    `Objective-C` is most commonly used in the implementation of applications that
    employ the Cocoa frameworks. As an `Objective-C` programmer, you will most certainly
    be involved in the creation of iOS apps or full OS X applications. In this chapter,
    I will discuss application development for OS X. For this purpose, you will learn
    about Cocoa UI, the framework used to develop graphical applications that conform
    to the UI standards of OS X.


    `Xcode` offers an object-oriented approach to creating graphical interfaces, and
    this approach needs to be well understood before you will be able to take full
    advantage of its possibilities. Unlike other environments, GUI applications created
    with `Xcode` are not created using code (although that could be done if necessary).
    Instead, objects are designed with a graphical editor and saved to a file, which
    is then loaded directly by the Cocoa application.


    Such graphical applications depend on the dynamic behavior of windows, views,
    and control objects provided by Cocoa. Using standard `Objective-C` technologies,
    these objects can be manipulated in `Xcode` and later loaded into your application
    using the nib file format. When loading the nib from a file, `Objective-C` guarantees
    that the saved properties and connections will be present at runtime.


    Initially, I will explain how to create a sample UI application in `Xcode`. Then,
    you will see how the Cocoa framework is used to save and load the state of the
    graphical interface, including properties and connections between objects, so
    that you can spend less time coding and more time designing the UI of an application
    in an intuitive way. I will discuss the hierarchy of UI objects that is based
    on the `NSResponder` class.


    In the last part of this chapter, I will provide a complete example of a UI application
    written in Cocoa. The application is able to receive events from the system menus.
    You will also learn how to draw on the screen using Cocoa libraries and how to
    respond to user events such as mouse movements and key presses.


    ## An Overview of UI Creation with Cocoa


    The first step in creating graphical applications in OS X is to plan the look
    of the UI. For this initial design you can employ any of the existing UI design
    applications. A few groups work with professional graphics applications such as
    Photoshop, but there are many other options on the market. If you are working
    in a small group or are a single developer, you may just use a hand-drawn design
    to guide you through this initial phase.


    This resulting UI design work then needs to become an implementation, where developers
    try to achieve the requirements specified in the UI design document using their
    programming tools. This phase of the work will result in a working interface,
    which can be used for functional testing. This version will later have programming
    functionality added, towards a complete implementation of the application.


    ### Setting Up a Cocoa Project


    Creating a new project in `Objective-C` is a simple task, which can be accomplished
    completely from inside the IDE. You can tell `Xcode` to invoke the new project
    wizard by going to **File ➤ New ➤ Project** (or using the keyboard shortcut **⌘+N**).
    The project wizard that appears as a result will show all the project types available
    in your local `Xcode` configuration. The wizard allows you to select a new project
    based on a desired project type. The list of project types is divided based on
    a target operating system. For Mac OS X, there are the following available project
    types in `Xcode` (see Figure 16-1):


    - **Application**: This is the main type of project used by end-user developers
    that need to create user-facing applications. There are options for both graphical
    and console-based applications, as you will see next.

    - **Framework and Library**: These project types are used to create software components
    that can be later used by other applications. A framework is a library created
    in `Objective-C` that can be more easily integrated into object-oriented applications
    or other libraries. You also have the option of creating C or C++ based libraries
    that can be imported by other languages.

    - **Application Plug-in**: A plug-in is a special type of library that can be
    imported by applications during runtime. This allows such applications to add
    or remove plug-ins as needed, or even installing new plug-ins from a web site.
    Since the APIs used by a plug-in depend on the internal design of the target application,
    the resulting plug-ins are application-specific. Among the standard options available
    on `Xcode`, you can create plug-ins for the Address Book, the Installer application,
    and for Automator. Other plug-in types may be available in your machine if they
    were installed with software from third-party vendors.

    - **System Plug-in**: These plug-ins are used to extend the operating system or
    some of the fundamental applications of Mac OS X, such as Finder. Among other
    options, you can create Mac OS X plug-ins that can serve as a preference panel
    in the Preferences application, a quick look plug-in for Finder, a screen saver,
    and a Spotlight importer.


    ![A978-1-4302-5906-0_16_Fig1_HTML.jpg](A978-1-4302-5906-0_16_Fig1_HTML.jpg)


    **Figure 16-1.** Selecting a new Xcode project for the Mac OS X


    In this chapter, we are interested in creating applications that are located in
    the **Applications** tab. The following options are available:


    - **Cocoa Application**: This project type can be used to create traditional window-based
    applications in Mac OS X. I will use this type of project as an example because
    it is the most commonly used to create end-user applications.

    - **Cocoa-AppleScript Application**: This project type is used when creating applications
    programmed in AppleScript, a scripting language developed by Apple for Mac OS
    X. AppleScript is not very popular nowadays, but it is still available to support
    some of the technologies in Mac OS X.

    - **Command Line Tool**: Use this project type to create applications that run
    only in the command line. These applications don’t need to be `Objective-C` based,
    and may be written in other languages such as C or C++ instead. However, it is
    still possible to use `Objective-C`’s foundation framework to streamline the development
    of command line applications, especially if they interact with other Mac OS X
    technologies that are only available through `Objective-C` frameworks.


    After selecting a new application and clicking the **Next** button, you will be
    presented with a screen that requests some basic information necessary to create
    the project, including the directory where the file will be located.'
