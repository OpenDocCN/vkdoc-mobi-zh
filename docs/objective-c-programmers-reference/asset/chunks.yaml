    ## 总结


    本章介绍了在 Objective-C 中如何从文件读写数据。首先，你了解了文件路径在 Foundation 框架中的表示方式。`NSURL` 作为一个标准且通用的类，目前是编码文件路径的首选方式。


    你学习了如何使用 Foundation 框架中的基本类来读取简单文件。该框架的设计使得常见任务（如读取小文件）无需过多开销即可完成。事实上，使用 `NSString`
    接口只需调用单个方法即可读取或写入文件。同样，也可以使用 `NSData` 类读写二进制文件，该类允许将任何数据格式存储在内存中。


    你还了解了 `NSStream` 类及其具体实现 `NSInputStream` 和 `NSOutputStream`。这些类可用于创建文件系统的异步接口，也常与网络套接字或其他网络资源进行通信。在本章中，你看到了使用
    `NSStream` 对象从外部文件读写数据所需的代码。


    通过本章的学习，你已经掌握了 Objective-C 中一些最基础的技术。现在，你已经清楚理解面向对象编程的工作原理，以及该语言提供的库如何支持这种编程风格。下一章将作为参考，总结你所了解的关于
    Foundation 框架的信息，涵盖你在基于 Cocoa 的应用程序中会用到的大多数重要类。


    # 第二部分

    参考


    # 11. Foundation 框架


    ## 摘要


    在之前的几章中，你学习了 Objective-C 语言的基础知识，并掌握了如何使用它编写简单程序。在本章中，我将为你提供一份关于 Objective-C 中最常用类的快速参考。这些类包含在
    Foundation 框架中，为编写完整的应用程序提供了大量基础支持。


    本章第一部分介绍了 Foundation 框架提供的一些基础类。这些类（如 `NSString` 和 `NSValue`）在整个系统中被广泛使用，是构建其他一切功能的基础。


    本章第二部分则提供了关于最常用集合类的快速参考。这些类用于存储对象集，并通过其他类和算法以更复杂的方式进行操作。


    ## 基础类


    以下基础类在整个系统中被广泛使用，是构建其他一切功能的基础。


    ### NSObject


    `NSObject` 类是 Cocoa 中大多数其他类的超类。`NSObject` 提供了在整个系统中使用的重要服务，例如内存分配、值观察和方法派发。在本节中，你将看到此类中重要方法的列表，以及如何与之交互。

    '
- fmt: '* `+ (void)load`: is executed when the class is loaded for the first time.
    The method is useful for tasks that need to be performed only once in the lifetime
    of the application.

    * `+ (void)initialize`: is called prior to any use of the class. That is, this
    method runs before the first non-initialize/non-load method is executed, typically
    at the first object creation. This is unlike the `load` method, which is called
    when the class is first loaded into memory.

    * `- (id)init`: is the default initializer, used generally in an `alloc`/`init`
    sequence.

    * `+ (id)new`: can be used in place of the `alloc`/`init` combination.

    * `+ (id)allocWithZone:(NSZone *)zone`; is used to allocate `NSObject` in a memory
    area defined by the parameter `NSZone`, which determines the policy for memory
    allocation.

    * `+ (id)alloc`; returns a new `NSObject` using the default `NSZone`. The object
    returned is not initialized. Therefore, `alloc` is frequently used in combination
    with an `init` method for the target class. The object returned by `alloc` is
    owned by the caller, which should release the object when it is not used.

    * `- (void)dealloc`; disposes the memory and other resources used by the object.
    When overridden, this method should always call the version of the superclass
    to avoid resource leaks in the base classes.

    * `- (void)finalize`; should be used only when garbage collection is enabled.
    Its goal is to free any resource used by the object before it is reclaimed by
    the system. This method is deprecated when using ARC.

    * `- (id)copy`; returns a new object of the same class as the original object.
    Similarly to `alloc` and `new`, the object returned is owned by the caller, which
    is now responsible for releasing the object when not in use, to avoid a memory
    leak.

    * `- (id)mutableCopy`; returns a mutable copy of the target object. This method
    is implemented by objects that need to create mutable copies of immutable objects.

    * `+ (id)copyWithZone:(NSZone *)zone`: returns a new object that contains a copy
    of the target object. Uses the `zone` parameter as the parameter to `allocWithZone:`.

    * `+ (id)mutableCopyWithZone:(NSZone *)zone`: returns a copy of the target object
    that can be later modified. Uses the `zone` parameter to determine how the object
    should be allocated, similar to `allocWithZone:`.

    * `+ (Class)superclass`; returns a class object that identifies that superclass,
    if the target object is derived from a base case.

    * `+ (Class)class`; returns a class object that identifies the class of the target.
    The returned object can be later used as the target for class messages. For example,
    if `obj` is an object, you can use `[[obj class] alloc]` to create an uninitialized
    object of the same class.

    * `+ (BOOL)instancesRespondToSelector:(SEL)aSelector`; returns YES if the target
    class or one of its superclasses has an implementation for the given selector.

    * `+ (BOOL)conformsToProtocol:(Protocol *)protocol`; returns YES if the target
    class or one of its superclasses implement the protocol passed as parameter.

    * `- (IMP)methodForSelector:(SEL)aSelector`; returns the implementation for the
    given method selector. The `IMP` value is normally a pointer to a function that
    is called in response to the given selector.

    * `+ (IMP)instanceMethodForSelector:(SEL)aSelector`; returns the implementation
    for the instance method that corresponds to the given selector (if such an implementation
    exists). The `IMP` value can later on be called to execute the selector for a
    particular object.

    * `- (void)doesNotRecognizeSelector:(SEL)aSelector`; This is a method that can
    be overridden in subclasses. It is used to determine if the current class does
    not recognize a selector. A class can return a different value depending on how
    it wishes to respond to that selector.

    * `- (id)forwardingTargetForSelector:(SEL)aSelector`; overriding this method,
    you can define a target object for any selector that is not directly handled by
    the current class.

    * `- (void)forwardInvocation:(NSInvocation *)anInvocation`; forwards the method
    call represented by the `NSInvocation` parameter to its appropriate target. This
    method is normally overridden in classes that need to forward one or more messages
    to other objects.

    * `- (NSMethodSignature *)methodSignatureForSelector:(SEL)aSelector`; returns
    the method signature for the given selector. This method is used when it is necessary
    to determine the parameters or return types for a method at runtime.

    * `+ (NSMethodSignature *)instanceMethodSignatureForSelector:(SEL)aSelector`;
    returns the address of the implementation of the instance method identified by
    a given selector.

    * `+ (NSString *)description`; returns a string used to describe the object. This
    is usually overridden in classes that need this type of service. You shouldn’t
    rely on the value returned by this method for identification purposes; it is most
    frequently used for debugging.

    * `+ (BOOL)isSubclassOfClass:(Class)aClass`; returns true if the target class
    is derived from or is the same as the class passed as a parameter. When you feel
    the need to use this method, first try defining a polymorphic method in your class
    hierarchy.


