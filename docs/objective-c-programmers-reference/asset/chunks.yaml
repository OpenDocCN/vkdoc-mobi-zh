    One of the features of this app is that it is able to play a sound for each index
    card, when requested by the user. You can use this feature to sound a reminder
    for the concept in the index card, or to play a recording of the value in the
    index card. It really helps memorization to have a sound associated to each value.


    To achieve this effect, the first thing to do is to retrieve the name of the sound
    file that will be played. This information is stored in the `words` data structure,
    in the `file` field. The current position is determined using `currentPos` in
    association with the `perm` array, which records the current permutation. If no
    file name is stored in that position, you generate a file name based on the information
    stored in the index card.


    The first step in loading the sound file is to get the path where it is stored.
    For this purpose, you can use the method `pathForResource:ofType:`, which is sent
    to the object that represents the `mainBundle`.


