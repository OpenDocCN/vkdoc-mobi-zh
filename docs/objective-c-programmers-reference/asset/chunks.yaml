    a local variable as well as an instance variable. Even though the `UseBlock` class
    doesn’t have any knowledge about the location and contents of these variables,
    it is still able to run the requested instructions.


    The reason why a block can have access to local data, no matter which context
    it is called from, is due to the way Objective-C handles them through the runtime
    system. During runtime, a block is an object like any other, and the compiler
    implicitly sets data access to refer to object instance variables that are known
    only by the block object. The block syntax provides a simple way to declare a
    complex object that has access to data stored in other objects.


    ## Read-Write Access to Local Variables


    The standard data access provided to local variables located outside a block is
    read-only, as you saw in the previous examples. The variables accessed by the
    block are just copies of the values stored in the current method or function,
    when the block was created. However, Objective-C also provides a mechanism for
    modification of such values, though the `__block` keyword.


    The use of the `__block` keyword forces the compiler to create not just a copy
    of the data, but also a reference that can be used to modify the same object or
    value as stored in local variables.


    It’s easy to modify one of the previous examples to show this distinction.


    `- (void) showWriteAcccess`


    `{`


            `__block int myVariable = 2;`


            `int (^getMultiple)(int);`


            `getMultiple = ^ (int base)`


            `{`


                    `myVariable = base;`


                    `return 5 * myVariable ;`


            `};`


            `NSLog(@"Here is a the result: %d", getMultiple(3));`


            `// this should print the value 15`


    `}`


    This is a similar example where the local variable is referenced inside the block.
    However, now the block also has the responsibility of changing the value stored
    in the local variable. Unlike in the previous example, the code stored in the
    block now needs to have writing access to the local variable. This intention is
    made explicit by the Objective-C keyword `__block`, which is added before the
    declaration of `myVariable`.


    What happens under the cover, as this code is processed by the compiler, is that
    the a shared copy of this variable becomes accessible to the block, as well as
    to any other statement that need read-write access permissions. The shared reference
    to the local variable can be used by the block in whatever context it is called,
    including with methods that are part of other classes.


    When modifications are made to instance variables, however, there is no need to
    add `__block` directly to the variable definition. The compiler will automatically
    store a reference to the object whenever the block needs to update one of its
    instance variables.


    Note


    The mechanism for sharing local and instance variables described above is called,
    in other languages, a closure. For example, in Python, Ruby, or Lisp, it is possible
    to create closures, that is, sections of code that refer to variables that are
    active at their point of declaration. Objective-C blocks achieve essentially the
    same goals, while maintaining the type checking inherent to the C language.'
  trans: "\n# 访问外部变量\n\n块（block）区别于标准函数指针的特性之一，就是块可以访问其所在代码封闭区域中的变量。这极大简化了块的使用，因为无需通过函数参数或额外类来复制变量值。块默认对局部变量或实例变量具有只读访问权限（这些变量需在定义位置可访问）。通过使用特殊关键字`__block`，也可以修改此类变量。最简单的数据访问情形是对局部变量的只读访问。创建块时无需程序员额外操作即可实现。\n\
    \n```\n- (void) showReadAcccess\n\n{\n        int myVariable = 2;\n        int\
    \ (^getMultiple)();\n        getMultiple = ^ {\n           return 5 * myVariable\
    \ ;\n        };\n        NSLog(@\"结果如下: %d\", getMultiple());\n        // 这将打印值\
    \ 10\n}\n```\n\n在本例中，声明了一个名为`myVariable`的整型变量。随后定义了一个名为`getMultiple`的块，它返回`myVariable`中存储值的倍数。调用该块后，日志窗口会显示计算结果。\n\
    \n对于定义函数的类中的实例变量，也可以实现类似的数据访问。例如，考虑以下类声明，其中包含一个整型实例变量：\n\n```\n// 文件 Blocks.h\n\
    @interface Blocks : NSObject\n{\n        int _myIntValue;\n}\n- (void) callBlockMethod;\n\
    @end\n```\n\n对应的实现如下：\n\n```\n- (void) showInstVarReadAcccess\n{\n        _myIntValue\
    \ = 3;\n        int (^getMultiple)();\n        getMultiple = ^ {\n           return\
    \ 6 * _myIntValue ;\n        };\n        NSLog(@\"结果如下: %d\", getMultiple());\n\
    \        // 这将打印值 18\n}\n```\n\n该方法实现与前例类似，但这次展示了块如何轻松访问类中的实例变量`_myIntVariable`。当然，在类内部调用块时实现这一点并不令人惊讶，但请考虑以下场景：\n\
    \n```\n// 文件 UseBlock.h\n@interface UseBlock : NSObject\n{\n        int _myIntValue;\n\
    }\n- (void) receiveBlock:(int (^)())aBlock;\n@end\n\n// 文件 UseBlock.m\n@implementation\
    \ UseBlock\n- (void) receiveBlock:(int (^)())aBlock\n{\n        NSLog(@\"结果现在是:\
    \ %d\", aBlock());\n}\n@end\n```\n\n该类设计用于接收块并调用它，而不需要了解块来源的任何信息。现在来看看如何使用这个类。\n\
    \n```\n- (void) showVariableReadAcccess\n{\n        _myIntValue = 3;\n       \
    \ int myVariable = 2;\n        UseBlock *useBlock = [[UseBlock alloc] init];\n\
    \        [useBlock receiveBlock:^\n        {\n                return 5 * myVariable\
    \ + 2 * _myIntValue;\n        }];\n}\n```\n\n运行此方法时，会执行一个同时引用局部变量和实例变量的块。即使`UseBlock`类完全不了解这些变量的位置和内容，它仍然能够执行所要求的指令。\n\
    \n块之所以能够访问局部数据（无论调用上下文如何），是因为 Objective-C 通过运行时系统处理块的方式。在运行时，块与其他对象一样是一个对象，编译器会隐式设置数据访问，使其指向仅块对象知晓的对象实例变量。块语法提供了一种简单方式来声明能够访问其他对象中存储数据的复杂对象。\n\
    \n## 局部变量的读写访问\n\n如之前示例所示，块对局部变量提供的是标准的只读访问。块访问的变量仅是创建块时当前方法或函数中存储值的副本。不过，Objective-C\
    \ 也通过`__block`关键字提供了修改此类值的机制。\n\n使用`__block`关键字会强制编译器不仅创建数据副本，还会创建一个引用，该引用可用于修改与局部变量中存储的相同对象或值。\n\
    \n修改之前的示例可以轻松展示这一区别。\n\n```\n- (void) showWriteAcccess\n{\n        __block int\
    \ myVariable = 2;\n        int (^getMultiple)(int);\n        getMultiple = ^ (int\
    \ base)\n        {\n                myVariable = base;\n                return\
    \ 5 * myVariable ;\n        };\n        NSLog(@\"结果如下: %d\", getMultiple(3));\n\
    \        // 这将打印值 15\n}\n```\n\n这是一个类似的示例，其中块内引用了局部变量。但这次块还负责修改局部变量中存储的值。与前例不同，块中存储的代码现在需要对局部变量具有写入权限。这一意图通过\
    \ Objective-C 关键字`__block`明确表示，该关键字添加在`myVariable`声明之前。\n\n编译器处理这段代码时，底层机制是：该变量的共享副本变得对块以及任何需要读写权限的语句都可用。无论块在何种上下文中被调用（包括在其他类的方法中），它都可以使用该局部变量的共享引用。\n\
    \n然而，当对实例变量进行修改时，无需直接在变量定义中添加`__block`。当块需要更新实例变量时，编译器会自动存储对该对象的引用。\n\n注意\n\n\
    上述共享局部变量和实例变量的机制，在其他语言中被称为闭包。例如，在 Python、Ruby 或 Lisp 中，可以创建闭包，即引用其声明点活跃变量的代码段。Objective-C\
    \ 块在实现相同目标的同时，还保留了 C 语言固有的类型检查。\n"
- fmt: "# Blocks and Memory Management\n\nBlocks offer a lot of flexibility for programmers,\
    \ who need additional tools to structure their code implementation. With blocks,\
    \ for example, it is easier to share behavior between classes without the need\
    \ to create separate objects. This flexibility, when not used properly, however,\
    \ can cause subtle issues that are difficult to debug.\n\nOne issue that can confuse\
    \ new programmers is the scope of blocks. While a block can be used in other locations\
    \ of a program, this doesn’t mean that all the memory in a block is managed automatically.\
    \ The main issue is that the creation and use of a block also involve managing\
    \ the memory associated with it. While Objective-C can automatically set up the\
    \ necessary references for the data accessed from inside a block, it doesn’t manage\
    \ memory directly.\n\nThe issue of block memory management may sometimes be confusing.\
    \ The main problem occurs when someone tries to access a block outside of the\
    \ execution scope in which it was created. For example, consider a block created\
    \ inside an `if` statement (the same also applies for blocks declared in a `for`,\
    \ `while`, `do`/`while`).\n\n```\n- (double) invalidBlock:(BOOL)initBlock :(BOOL)callBlock\
    \ :(int)x1 :(int)x2\n{\n    double (^division)(int, double) = nil;\n\n    if (initBlock)\n\
    \    {\n        division = ^ double (int a, double b)\n        {\n           \
    \ return a / b;\n        };\n    }\n\n    if (initBlock && callBlock)\n    {\n\
    \        return division(x1, x2); // This doesn’t work.\n    }\n\n    return 0;\n\
    }\n```\n\nThe intended meaning of this method is clear: it initializes and creates\
    \ a block according to the parameters passed. If both are true, then the block\
    \ is invoked and the file returned.\n\nThe problem, however, is that the block\
    \ variable (`division`) is initialized within a group of statements (defined by\
    \ the `if` statement) that has finished by the time the block is called. Since\
    \ the default storage for a block is held on the program stack, its associated\
    \ memory is released at the end of the `if` statement. This means that the block\
    \ variable `division` is invalid when it is called.\n\nMemory for a block is stack\
    \ allocated for performance reasons. However, it is possible to create a dynamically\
    \ allocated copy of a block. This can be done in the same way you copy any other\
    \ object in the system, that is, by calling the `copy` method.\n\n```\n- (double)\
    \ callValidBlock:(BOOL)initBlock :(BOOL)callBlock :(int)x1 :(int)x2\n{\n    double\
    \ (^division)(int, double) = nil;\n\n    if (initBlock)\n    {\n        division\
    \ = [^ double (int a, double b)\n        {\n            return a / b;\n      \
    \  }\n        copy];\n    }\n\n    if (initBlock && callBlock)\n    {\n      \
    \  return division(x1, x2);\n    }\n\n    [division release];\n    return 0;\n\
    }\n```\n\nWith this version, it is now correct to execute the block from the location\
    \ where the call currently is. This is possible because the `copy` method will\
    \ store a properly allocated version of the block, which will persist after the\
    \ `if` statement is completed. Since you made a copy, however, you need to call\
    \ `release` at the end of the method, to guarantee that its memory is properly\
    \ released (I will discuss this and other rules for memory management in a later\
    \ chapter).\n\nA similar approach is necessary when a method returns a block.\
    \ Since such a block needs to be accessed outside the stack environment in which\
    \ it was created, you need to return a valid copy.\n\n```\n- (double (^)(int,\
    \ double)) returnBlock\n{\n    return [[^ double (int a, double b)\n    {\n  \
    \      return a / b;\n    }\n    copy] autorelease];\n}\n```\n\nThis example is\
    \ similar, but since you are returning the block to a client, you also call the\
    \ `autorelease` method, which takes care of automatically disposing the memory\
    \ associated to an object whenever it is not in use.\n\n# Using Blocks with the\
    \ Foundation Framework\n\nUsing blocks in your own applications gives you lots\
    \ of opportunities to simplify your code and reduce the number of classes needed\
    \ to achieve a specific goal. However, blocks are also useful when dealing with\
    \ the Cocoa libraries. In this section, I will show you a few examples where blocks\
    \ can be used to interact with the Foundation framework.\n\nA good application\
    \ of blocks is to execute similar code on a set of elements. This is explored\
    \ in the collection of classes of the Foundation framework. For an example, look\
    \ at the `NSArray` class. If you want to determine the number of elements in an\
    \ array that satisfy a particular condition, it is possible to check each element\
    \ of the array using a `for` loop, for example. Alternatively, the `NSArray` class\
    \ allows you to pass a block to test for the condition, using the method `indexesOfObjectsPassingTest`.\n\
    \n```\n- (void) countPositivesInArray\n{\n    NSArray *array = @[ @-1, @-2, @1,\
    \ @2, @3];\n\n    NSIndexSet *indices =\n        [array indexesOfObjectsPassingTest:\n\
    \            ^ BOOL (id obj, NSUInteger idx, BOOL *stop)\n            {\n    \
    \            NSNumber *num = (NSNumber*)obj;\n                return [num integerValue]\
    \ > 0;\n            }\n        ];\n\n    NSLog(@\"There are %d positive elements\"\
    , (int)[indices count]);\n    // this will show a result of 3\n}\n```\n\nNotice\
    \ that, using `indexesOfObjectsPassingTest`, you don’t need to manually set up\
    \ a `for` loop and keep a count of the number of elements satisfying the test\
    \ for positives, since this is automatically done by the `NSArray` class. In general,\
    \ it is a good idea to delegate repetitive tasks to specialized methods, and that\
    \ is the biggest advantage of using blocks: you can let other methods take care\
    \ of the details, while defining only the important aspects of a computational\
    \ task.\n\nA similar approach is demonstrated by the `sortedArrayUsingComparator`\
    \ method. Here, the goal is to perform the comparison of two elements in an array\
    \ as part of a sorting procedure. Based on the result of the comparison, the `sortedArrayUsingComparator`\
    \ can decide if the position of the two elements should be swapped or not. In\
    \ a normal sorting procedure, this is done by passing a function pointer, or by\
    \ subclassing an existing base class. Using a block, however, you can more easily\
    \ decide how the elements should be compared without having to create additional\
    \ boilerplate code. Let’s see an example.\n\n```\n- (void) sortArray\n{\n    NSArray\
    \ *array = @[ @-1, @2, @100, @4, @-3];\n\n    NSArray *sorted = [array sortedArrayUsingComparator:^\
    \ (id a, id b)\n    {\n        if ([a integerValue] > [b integerValue])\n    \
    \    {\n            return (NSComparisonResult)NSOrderedDescending;\n        }\n\
    \        else if ([a integerValue] < [b integerValue])\n        {\n          \
    \  return (NSComparisonResult)NSOrderedAscending;\n        }\n        else\n \
    \       {\n            return (NSComparisonResult)NSOrderedSame;\n        }\n\
    \    }];\n\n    for (id item in sorted)\n    {\n        NSLog(@\"value is %@\"\
    , item);\n    }\n    // this will print the items in sorted order\n}\n```\n\n\
    In this method, you sort the `NSArray` defined in the first executable line. Then,\
    \ you call the method `sortedArrayUsingComparator` on the original array, and\
    \ pass a comparison block to it. The comparison block receives two objects as\
    \ parameters and returns an `NSComparisonResult`, which is defined as an enumeration\
    \ with only three values. Depending on how the first object compares to the second,\
    \ you return `NSOrderedDescending`, `NSOrderedAscending`, or `NSOrderedSame`.\
    \ The sorting method of `NSArray` uses this information to decide if the two objects\
    \ are in order or not. Finally, the `sortArray` method prints all elements of\
    \ the sorted `array`, which should be now in sorted order.\n\nThese two examples\
    \ taken from `NSArray` show how blocks are used in the Cocoa frameworks. Many\
    \ other classes of these frameworks use blocks where they offer the best benefit:\
    \ simplifying the execution of small sections of code that can be supplied in\
    \ place. As you explore the functionality provided by the Cocoa and Cocoa Touch\
    \ libraries, you will see other examples where blocks are also used."
  raw: '## Blocks and Memory Management


    Blocks offer a lot of flexibility for programmers, who need additional tools to
    structure their code implementation. With blocks, for example, it is easier to
    share behavior between classes without the need to create separate objects. This
    flexibility, when not used properly, however, can cause subtle issues that are
    difficult to debug.


    One issue that can confuse new programmers is the scope of blocks. While a block
    can be used in other locations of a program, this doesn’t mean that all the memory
    in a block is managed automatically. The main issue is that the creation and use
    of a block also involve managing the memory associated with it. While Objective-C
    can automatically set up the necessary references for the data accessed from inside
    a block, it doesn’t manage memory directly.


    The issue of block memory management may sometimes be confusing. The main problem
    occurs when someone tries to access a block outside of the execution scope in
    which it was created. For example, consider a block created inside an `if` statement
    (the same also applies for blocks declared in a `for`, `while`, `do`/`while`).


    `- (double) invalidBlock:(BOOL)initBlock :(BOOL)callBlock :(int)x1 :(int)x2`


    `{`


    `double (^division)(int, double) = nil;`


    `if (initBlock)`


    `{`


    `division = ^ double (int a, double b)`


    `{`


    `return a / b;`


    `};`


    `}`


    `if (initBlock && callBlock)`


    `{`


    `return division(x1, x2); // This doesn’t work.`


    `}`


    `return 0;`


    `}`


    The intended meaning of this method is clear: it initializes and creates a block
    according to the parameters passed. If both are true, then the block is invoked
    and the file returned.


    The problem, however, is that the block variable (division) is initialized within
    a group of statements (defined by the if statement) that has finished by the time
    the block is called. Since the default storage for a block is held on the program
    stack, its associated memory is released at the end of the `if` statement. This
    means that the block variable division is invalid when it is called.


    Memory for a block is stack allocated for performance reasons. However, it is
    possible to create a dynamically allocated copy of a block. This can be done in
    the same way you copy any other object in the system, that is, by calling the
    copy method.


    `- (double) callValidBlock:(BOOL)initBlock :(BOOL)callBlock :(int)x1 :(int)x2`


    `{`


    `double (^division)(int, double) = nil;`


    `if (initBlock)`


    `{`


    `division = [^ double (int a, double b)`


    `{`


    `return a / b;`


    `}`


    `copy];`


    `}`


    `if (initBlock && callBlock)`


    `{`


    `return division(x1, x2);`


    `}`


    `[division release];`


    `return 0;`


    `}`


    With this version, it is now correct to execute the block from the location where
    the call currently is. This is possible because the copy method will store a properly
    allocated version of the block, which will persist after the `if` statement is
    completed. Since you made a copy, however, you need to call release at the end
    of the method, to guarantee that its memory is properly released (I will discuss
    this and other rules for memory management in a later chapter).


    A similar approach is necessary when a method returns a block. Since such a block
    needs to be accessed outside the stack environment in which it was created, you
    need to return a valid copy.


    `- (double (^)(int, double)) returnBlock`


    `{`


    `return [[^ double (int a, double b)`


    `{`


    `return a / b;`


    `}`


    `copy] autorelease];`


    `}`


    This example is similar, but since you are returning the block to a client, you
    also call the `autorelease` method, which takes care of automatically disposing
    the memory associated to an object whenever it is not in use.


    ## Using Blocks with the Foundation Framework


    Using blocks in your own applications gives you lots of opportunities to simplify
    your code and reduce the number of classes needed to achieve a specific goal.
    However, blocks are also useful when dealing with the Cocoa libraries. In this
    section, I will show you a few examples where blocks can be used to interact with
    the Foundation framework.


    A good application of blocks is to execute similar code on a set of elements.
    This is explored in the collection of classes of the Foundation framework. For
    an example, look at the `NSArray` class. If you want to determine the number of
    elements in an array that satisfy a particular condition, it is possible to check
    each element of the array using a `for` loop, for example. Alternatively, the
    `NSArray` class allows you to pass a block to test for the condition, using the
    method `indexesOfObjectsPassingTest`.


    `- (void) countPositivesInArray`


    `{`


    `NSArray *array = @[ @-1, @-2, @1, @2, @3];`


    `NSIndexSet *indices =`


    `[array indexesOfObjectsPassingTest:`


    `^ BOOL (id obj, NSUInteger idx, BOOL *stop)`


    `{`


    `NSNumber *num = (NSNumber*)obj;`


    `return [num integerValue] > 0;`


    `}`


    `];`


    `NSLog(@"There are %d positive elements", (int)[indices count]);`


    `// this will show a result of 3`


    `}`


    Notice that, using `indexesOfObjectsPassingTest`, you don’t need to manually set
    up a for loop and keep a count of the number of elements satisfying the test for
    positives, since this this is automatically done by the `NSArray` class. In general,
    it is a good idea to delegate repetitive tasks to specialized methods, and that
    is the biggest advantage of using blocks: you can let other methods take care
    of the details, while defining only the important aspects of a computational task.


    A similar approach is demonstrated by the `sortedArrayUsingComparator` method.
    Here, the goal is to perform the comparison of two elements in an array as part
    of a sorting procedure. Based on the result of the comparison, the `sortedArrayUsingComparator`
    can decide if the position of the two elements should be swapped or not. In a
    normal sorting procedure, this is done by passing a function pointer,or by subclassing
    an existing base class. Using a block, however, you can more easily decide how
    the elements should be compared without having to create additional boilerplate
    code. Let’s see an example.


    `- (void) sortArray`


    `{`


    `NSArray *array = @[ @-1, @2, @100, @4, @-3];`


    `NSArray *sorted = [array sortedArrayUsingComparator:^ (id a, id b)`


    `{`


    `if ([a integerValue] > [b integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedDescending;`


    `}`


    `else if ([a integerValue] < [b integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedAscending;`


    `}`


    `else`


    `{`


    `return (NSComparisonResult)NSOrderedSame;`


    `}`


    `}];`


    `for (id item in sorted)`


    `{`


    `NSLog(@"value is %@", item);`


    `}`


    `// this will print the items in sorted order`


    `}`


    In this method, you sort the `NSArray` defined in the first executable line. Then,
    you call the method `sortedArrayUsingComparator` on the original array, and pass
    a comparison block to it. The comparison block receives two objects as parameters
    and returns an `NSComparisonResult`, which is defined as an enumeration with only
    three values. Depending on how the first object compares to the second, you return
    `NSOrderedDescending`, `NSOrderedDescending`, or `NSOrderedSame`. The sorting
    method of `NSArray` uses this information to decide if the two objects are in
    order or not. Finally, the `sortArray` method prints all elements of the sorted
    `array`, which should be now in sorted order.


    These two examples taken from `NSArray` show how blocks are used in the Cocoa
    frameworks. Many other classes of these frameworks use blocks where they offer
    the best benefit: simplifying the execution of small sections of code that can
    be supplied in place. As you explore the functionality provided by the Cocoa and
    Cocoa Touch libraries, you will see other examples where blocks are also used.'
  trans: "# 块与内存管理\n\n块为程序员提供了极大的灵活性，他们需要额外的工具来组织代码实现。例如，使用块可以更轻松地在类之间共享行为，而无需创建单独的对象。然而，如果使用不当，这种灵活性可能会导致难以调试的细微问题。\n\
    \n一个可能让新手程序员感到困惑的问题是块的作用域。虽然块可以在程序的其他位置使用，但这并不意味着块中的所有内存都会被自动管理。主要问题在于，块的创建和使用也涉及对其关联内存的管理。虽然\
    \ Objective-C 可以自动为块内部访问的数据设置必要的引用，但它并不直接管理内存。\n\n块内存管理的问题有时可能令人困惑。主要问题出现在有人试图在创建块的执行作用域之外访问它时。例如，考虑在`if`语句内部创建的块（在`for`、`while`、`do`/`while`中声明的块也同样适用）。\n\
    \n```\n- (double) invalidBlock:(BOOL)initBlock :(BOOL)callBlock :(int)x1 :(int)x2\n\
    {\n    double (^division)(int, double) = nil;\n\n    if (initBlock)\n    {\n \
    \       division = ^ double (int a, double b)\n        {\n            return a\
    \ / b;\n        };\n    }\n\n    if (initBlock && callBlock)\n    {\n        return\
    \ division(x1, x2); // 这行不通。\n    }\n\n    return 0;\n}\n```\n\n这个方法的意图很明确：根据传入的参数初始化并创建一个块。如果两个参数都为真，则调用该块并返回结果。\n\
    \n然而，问题在于块变量（`division`）是在一组语句（由`if`语句定义）内部初始化的，而这组语句在调用该块时已经结束。由于块的默认存储位于程序栈上，其关联的内存在`if`语句结束时被释放。这意味着当调用块变量`division`时，它是无效的。\n\
    \n出于性能原因，块的内存是在栈上分配的。但是，也可以创建块的动态分配副本。这可以通过与复制系统中任何其他对象相同的方式来实现，即调用`copy`方法。\n\
    \n```\n- (double) callValidBlock:(BOOL)initBlock :(BOOL)callBlock :(int)x1 :(int)x2\n\
    {\n    double (^division)(int, double) = nil;\n\n    if (initBlock)\n    {\n \
    \       division = [^ double (int a, double b)\n        {\n            return\
    \ a / b;\n        }\n        copy];\n    }\n\n    if (initBlock && callBlock)\n\
    \    {\n        return division(x1, x2);\n    }\n\n    [division release];\n \
    \   return 0;\n}\n```\n\n在这个版本中，现在从当前调用位置执行该块是正确的。这是可行的，因为`copy`方法会存储一个正确分配的块版本，该版本在`if`语句完成后仍然存在。但是，由于你创建了一个副本，所以需要在方法末尾调用`release`，以确保其内存被正确释放（我将在后续章节讨论内存管理的这一规则和其他规则）。\n\
    \n当方法返回一个块时，也需要采用类似的方法。由于这样的块需要在创建它的栈环境之外被访问，所以你需要返回一个有效的副本。\n\n```\n- (double\
    \ (^)(int, double)) returnBlock\n{\n    return [[^ double (int a, double b)\n\
    \    {\n        return a / b;\n    }\n    copy] autorelease];\n}\n```\n\n这个示例类似，但由于你要将块返回给调用方，因此还需要调用`autorelease`方法，它会在对象不再使用时自动处理其关联内存的释放。\n\
    \n# 在 Foundation 框架中使用块\n\n在自己的应用中使用块，可以为你带来很多简化代码、减少实现特定目标所需类数量的机会。然而，在处理 Cocoa\
    \ 库时，块也同样有用。在本节中，我将展示几个使用块与 Foundation 框架交互的示例。\n\n块的一个良好应用是在一组元素上执行相似的代码。这在 Foundation\
    \ 框架的集合类中得到了体现。例如，看看`NSArray`类。如果你想确定数组中满足特定条件的元素数量，可以使用`for`循环检查数组的每个元素。或者，`NSArray`类允许你通过`indexesOfObjectsPassingTest`方法传递一个块来测试条件。\n\
    \n```\n- (void) countPositivesInArray\n{\n    NSArray *array = @[ @-1, @-2, @1,\
    \ @2, @3];\n\n    NSIndexSet *indices =\n        [array indexesOfObjectsPassingTest:\n\
    \            ^ BOOL (id obj, NSUInteger idx, BOOL *stop)\n            {\n    \
    \            NSNumber *num = (NSNumber*)obj;\n                return [num integerValue]\
    \ > 0;\n            }\n        ];\n\n    NSLog(@\"There are %d positive elements\"\
    , (int)[indices count]);\n    // 这将显示结果为 3\n}\n```\n\n注意，使用`indexesOfObjectsPassingTest`，你无需手动设置`for`循环并记录满足正数测试的元素数量，因为这些都由`NSArray`类自动完成。通常，将重复性任务委托给专门的方法是个好主意，而这正是使用块的最大优势：你可以让其他方法处理细节，同时只定义计算任务中的重要方面。\n\
    \n`sortedArrayUsingComparator`方法也演示了类似的方法。在这里，目标是在排序过程中对数组中的两个元素进行比较。基于比较结果，`sortedArrayUsingComparator`可以决定是否应该交换这两个元素的位置。在常规的排序过程中，这通常通过传递函数指针或对现有基类进行子类化来完成。然而，使用块，你可以更轻松地决定如何比较元素，而无需创建额外的样板代码。让我们看一个示例。\n\
    \n```\n- (void) sortArray\n{\n    NSArray *array = @[ @-1, @2, @100, @4, @-3];\n\
    \n    NSArray *sorted = [array sortedArrayUsingComparator:^ (id a, id b)\n   \
    \ {\n        if ([a integerValue] > [b integerValue])\n        {\n           \
    \ return (NSComparisonResult)NSOrderedDescending;\n        }\n        else if\
    \ ([a integerValue] < [b integerValue])\n        {\n            return (NSComparisonResult)NSOrderedAscending;\n\
    \        }\n        else\n        {\n            return (NSComparisonResult)NSOrderedSame;\n\
    \        }\n    }];\n\n    for (id item in sorted)\n    {\n        NSLog(@\"value\
    \ is %@\", item);\n    }\n    // 这将按排序顺序打印元素\n}\n```\n\n在这个方法中，你首先对第一行可执行代码中定义的`NSArray`进行排序。然后，对原始数组调用`sortedArrayUsingComparator`方法，并向其传递一个比较块。该比较块接收两个对象作为参数，并返回一个`NSComparisonResult`，这是一个仅包含三个值的枚举。根据第一个对象与第二个对象的比较结果，你返回`NSOrderedDescending`、`NSOrderedAscending`或`NSOrderedSame`。`NSArray`的排序方法利用此信息决定两个对象是否按顺序排列。最后，`sortArray`方法打印排序后`array`的所有元素，现在这些元素应该已经按排序顺序排列了。\n\
    \n这两个取自`NSArray`的示例展示了块在 Cocoa 框架中的使用方式。这些框架中的许多其他类也在块能提供最大益处的地方使用它们：简化可以直接提供的小段代码的执行。当你探索\
    \ Cocoa 和 Cocoa Touch 库提供的功能时，你还会看到其他使用块的示例。"
- fmt: '# Summary


    In this chapter, you have seen an overview, along with examples, of how to use
    blocks in Objective-C. With the help of blocks, you are able to create code fragments
    that can be sent to other methods or saved for later use in a context different
    from that where they were created. While blocks look similar to functions, and
    have the ability to simulate other functions or instance methods, they are a much
    more succinct way to implement small sections of code.


    Even more importantly, blocks enable a simple and efficient mechanism to implicitly
    share data (both local and instance variables) with other parts of the program.
    This allows applications to reduce the amount of support code necessary to coordinate
    the access to variables in the system. Instead of creating explicit methods to
    get and set data in a separate class, you can use blocks to simplify data access
    when that seems to be a natural solution to a programming problem.


    As you have seen, blocks are important not only as a way to organize your own
    code, but also to interact with other classes in Cocoa. The Foundation framework,
    for example, presents several methods where programmers are required to use blocks
    to accomplish a particular task. You have seen a few examples of this approach
    being used by the `NSArray` class.


    New frameworks in the Cocoa and Cocoa Touch frameworks are introducing even more
    opportunities to use blocks. Some application areas for this technique are parallel
    programming, where blocks can be set up in such a way that they can be executed
    in different threads, or graphical programming, where blocks can be used, for
    example, to draw scenes in a 3D animation sequence.


    In the next chapter, you will get an in-depth view of the dynamic binding mechanisms
    provided by Objective-C. In particular, I will discuss how to interact with the
    runtime system to improve the flexibility of your applications.


    # 7. Dynamic Binding


    ## Abstract


    One of the biggest advantages of Objective-C is that it allows programmers to
    choose the right combination of speed and flexibility, depending on their real
    needs. Code written in this language can enjoy the safety of compiler-checked
    expressions and method calls, where the compiler verifies every statement during
    the process of creating an executable. A lot of features, however, are runtime-driven,
    and this allows programmers to delay some decisions until a piece of code is executed.


    The runtime system of Objective-C is the main tool used by programmers to switch
    between dynamic and static programming behaviors. In this chapter, you will explore
    some of the features provided by the runtime system. You will see that programmers
    have a lot of room for defining how to answer the messages sent to an object.
    For example, manipulating methods through the use of selectors is one of the most
    powerful features used by advanced programmers.


    You will also see how you are allowed to forward messages to other objects at
    runtime. With this ability, it is possible to design software that seamlessly
    combines two or more existing interfaces. Finally, you will see how to use these
    same features to improve the performance of code that uses the message sending
    mechanism in Objective-C.


    ## Method Selectors


    When creating new methods in Objective-C, keep in mind that a method is defined
    by a message name, a return type, and a set of formal parameters. These elements
    of a method are used later on during a message call. When you send a message to
    an object, you are implicitly telling the compiler what kind of method name, return
    type, and parameters you are looking for.


    The identity of the method targeted by a particular message call is of great importance
    in an object-oriented application. To find the right implementation, the compiler
    first looks up the list of known messages and finds the one that exactly corresponds
    to the request.


    Because Objective-C is a dynamic language, decisions about how to respond to a
    message are taken at runtime, rather than at compilation time. Therefore, unlike
    in static compilation based languages such as C++, the compiler needs some way
    to internally represent the message during program execution. This ability is
    provided by the use of selectors, which are a runtime representation of a message.
    Selectors can also be stored as variables of type `SEL`, and therefore can be
    easily created and manipulated by programmers.


    From the programmer’s point of view, a selector is an identifier that can be used
    at runtime to determine which message you are looking for. Every message has an
    associated selector: you can retrieve and store the selector, and you can use
    it to perform message calls. Here are a few reasons why you may want to access
    a method selector in your program:


    - **Calling a generic method**: One possible use of this functionality is to make
    a generic method call that can vary depending on the method selector that is passed
    as a parameter. Similarly to function pointers, selectors allow one to make method
    calls without knowing exactly the name of the method that will respond.

    - **Storing a selector for later use**: Your goal may be to have a list of selectors
    that will be used later, in response to an event, for example. Methods employed
    in this way are referred to as callbacks. This is a common way to interact with
    events that are triggered by an UI application, as you will see in a later section.

    - **Introspection**: Some applications need to determine the methods associated
    with a particular class. If you have this need, selectors may be the right way
    to define how a class responds to incoming messages.'
