    the new project with an associated unit test target.


    ![A978-1-4302-5906-0_14_Fig1_HTML.jpg](A978-1-4302-5906-0_14_Fig1_HTML.jpg)


    Figure 14-1.


    Including unit tests in a new project


    The second way to include unit tests is by adding a new target to an existing
    project. Xcode allows you to create a new target, which is a generic name for
    the IDE support to generate a new executable. Suppose that you have an existing
    project to which you want to add a set of unit tests. You can add new targets
    by using the New ➤ Target menu while the project is open. On the left side, select
    the “Other” option. You will see a few items, from which you can select “Cocoa
    Unit Testing Bundling.” The target selection window is displayed in Figure [14-2](#A978-1-4302-5906-0_14_Chapter.html#Fig2).


    The next screen in the target creation window will let you enter details such
    as the target name and the project that will contain this target. Once you enter
    this information, Xcode will create the new target and prepopulate it with a few
    files that can be immediately used to create new test cases.


    ![A978-1-4302-5906-0_14_Fig2_HTML.jpg](A978-1-4302-5906-0_14_Fig2_HTML.jpg)


    Figure 14-2.


    Selecting a unit testing target


    Let’s create a new target called TestUT, which will contain test cases for a personal
    project. Xcode automatically generates a new class called `TestUT`, which will
    be used to store any new test cases. Here is the header file:


    `// file TestUT.h`


    `#import <SenTestingKit/SenTestingKit.h>`


    `@interface TestUT : SenTestCase`


    `@end`


    The symbol `SenTestingKit` used above is the name of the framework that contains
    OCUnit. The default class inherits from `SenTestCase`, so that it can use all
    the methods made available by OCUnit. Here is the corresponding implementation
    file:


    `// file TestUT.m`


    `#import "TestUT.h"`


    `@implementation TestUT`


    `- (void)setUp`


    `{`


    `[super setUp];`


    `// Set-up code here.`


    `}`


    `- (void)tearDown`


    `{`


    `// Tear-down code here.`


    `[super tearDown];`


    `}`


    `- (void)testExample`


    `{`


    `STFail(@"Unit tests are not implemented yet in TestUT");`


    `}`


    `@end`


    Notice how the implementation file already gives you a few of the methods that
    are frequently needed in a unit testing class. You need first to understand how
    each of these methods cooperated during the execution of test cases.


    The `setUp` method is responsible for initializing the testing environment for
    your test case. You can add here any code that is common to each of the tests
    you want to run in the test class. For example, if you need a database connection
    available for each of your tests, you can write the code that creates the connection
    as part of the `setUp` method.


    Similarly, the `tearDown` method is used to finalize the environment used by each
    test case in this class. In the case of the database connection, you may want
    to close the connection here, so you don’t need to repeat that code in each test
    case.'
  trans: "\n# 添加单元测试目标\n\n在本章中，我假设你正在使用 Xcode 创建和构建项目。通过命令行工具添加单元测试是可行的，但这高度依赖于你所使用的构建工具，并且通常不被\
    \ Apple 支持。因此，在本章中，我只描述使用 Xcode 创建单元测试的过程。\n\nXcode 项目可以划分为多个目标，这些目标用于组织单个项目可能产生的各种输出。项目中的目标通常是一个可执行文件，具体取决于你想要支持的平台和环境。单元测试目标允许你创建一个独立的可执行文件，其目的是针对生产代码运行测试用例。通过这种方式，你可以将应用程序特有的代码与仅用于测试应用程序的代码清晰地分离开来。\n\
    \n此外，Xcode 支持两种测试目标，每种目标都与特定类型的测试相关联。逻辑测试是指你只关心单独测试某个特定方法或类正确性的测试。对于这类测试，Xcode\
    \ 只需要能够找到被测试方法的代码，并将其包含在单元测试目标的可执行文件中。\n\n第二种单元测试是应用测试。这些测试并非完全隔离运行，而是在应用程序的上下文中运行。例如，它们可用于确定特定窗口中的按钮是否具有正确的标签。或者你可以用它们来验证当点击某个菜单选项时，某个特定值是否会更新。由于其自身特性，应用测试依赖于它们所搭建的平台以及该特定环境所使用的工具集。\n\
    \n**注意**\n\n由于应用测试本身具有与环境相关的特性，在本章中我将只考虑逻辑测试，因为逻辑测试在 Objective-C 支持的任何平台上都有效（甚至可能在非\
    \ Apple 环境中也能工作）。如果你打算使用特定于应用的单元测试，请查阅你目标环境的编程手册。Apple 在 Xcode 中为 Mac OS X 和 iOS\
    \ 目标都提供了相关信息。\n\n有两种方法可以向你的代码添加单元测试。第一种也是最简单的方法，是在创建项目时添加测试目标。通过 **新建** ➤ **项目**\
    \ 菜单选项，你可以从多种项目类型中创建一个新应用程序。如果你选择“OS X 应用程序”，然后选择“Cocoa 应用程序”，将会出现图 14-1 所示的窗口。确保你勾选了“包含单元测试”选项，Xcode\
    \ 就会生成包含关联单元测试目标的新项目。\n\n![A978-1-4302-5906-0_14_Fig1_HTML.jpg](img/A978-1-4302-5906-0_14_Fig1_HTML.jpg)\n\
    \n图 14-1.\n\n在新项目中包含单元测试\n\n包含单元测试的第二种方法是向现有项目添加一个新目标。Xcode 允许你创建新目标，这是 IDE 支持生成新可执行文件的通用名称。假设你有一个现有项目，想要向其添加一组单元测试。你可以在项目打开时，通过\
    \ **新建** ➤ **目标** 菜单来添加新目标。在左侧选择“其他”选项。你会看到一些项目，从中可以选择“Cocoa 单元测试捆绑包”。目标选择窗口如图\
    \ 14-2 所示。\n\n在目标创建窗口的下一个屏幕中，你可以输入详细信息，例如目标名称以及将包含该目标的项目。输入这些信息后，Xcode 将创建新目标，并用一些可立即用于创建新测试用例的文件预先填充它。\n\
    \n![A978-1-4302-5906-0_14_Fig2_HTML.jpg](img/A978-1-4302-5906-0_14_Fig2_HTML.jpg)\n\
    \n图 14-2.\n\n选择单元测试目标\n\n让我们创建一个名为 `TestUT` 的新目标，它将包含个人项目的测试用例。Xcode 会自动生成一个名为\
    \ `TestUT` 的新类，该类将用于存储任何新的测试用例。以下是头文件：\n\n```\n// 文件 TestUT.h\n#import <SenTestingKit/SenTestingKit.h>\n\
    @interface TestUT : SenTestCase\n@end\n```\n\n上面用到的符号 `SenTestingKit` 是包含 OCUnit\
    \ 框架的名称。默认类继承自 `SenTestCase`，以便它能够使用 OCUnit 提供的所有方法。以下是相应的实现文件：\n\n```\n// 文件\
    \ TestUT.m\n#import \"TestUT.h\"\n@implementation TestUT\n\n- (void)setUp\n{\n\
    \    [super setUp];\n    // 此处的设置代码。\n}\n\n- (void)tearDown\n{\n    // 此处的清理代码。\n\
    \    [super tearDown];\n}\n\n- (void)testExample\n{\n    STFail(@\"TestUT 中尚未实现单元测试\"\
    );\n}\n@end\n```\n\n请注意实现文件已经为你提供了单元测试类中经常需要的几个方法。你首先需要理解这些方法在测试用例执行过程中是如何协同工作的。\n\
    \n`setUp` 方法负责初始化测试用例的测试环境。你可以在此处添加在测试类中想要运行的每个测试共有的任何代码。例如，如果你需要为每个测试提供一个数据库连接，你可以将创建连接的代码作为\
    \ `setUp` 方法的一部分来编写。\n\n类似地，`tearDown` 方法用于 Finalize 该类中每个测试用例所使用的环境。以数据库连接为例，你可能希望在此处关闭连接，这样就不需要在每个测试用例中重复该代码。\n"
- fmt: "# Creating New Tests\n\nCreating test cases in OCTest is a simple process.\
    \ You just need to add methods to the test class, which in this case is called\
    \ `TestUT`. The methods don’t even need to be added to the public interface, since\
    \ the OCTest framework will take care of running any test case included in the\
    \ implementation section. The only requirement is that the method representing\
    \ a test case starts with the word `test`, returning `void` and with no expected\
    \ parameters. Therefore, you can add a new test case as follows:\n\n```\n- (void)testExample\n\
    {\n        // This code will be run by OCUnit\n        STAssertTrue(TRUE, @\"\
    sample test\");\n}\n```\n\nWhile the mechanics of adding tests is simple, much\
    \ more important is to determine logically when a new test should be added to\
    \ your list of test cases.\n\nIn theory, the number of test cases that can be\
    \ written for most non-trivial methods is unlimited. However, in practice you\
    \ should write tests only to make sure that certain aspects of your implementation\
    \ return correct results. For example, here is a method that adds one unit to\
    \ an integer argument:\n\n```\n- (int) addOne:(int)value\n{\n        // implementation\
    \ here\n}\n```\n\nIt is not possible to test for every integer value. However,\
    \ it makes sense to write tests that check the accuracy of the method for positive\
    \ integers, negative integers, and for zero, for example.\n\n```\n- (void)testExample\n\
    {\n        // create obj here...\n        STAssertEquals([obj addOne:2], 3, @\"\
    test 2\");\n        STAssertEquals([obj addOne:-3], -2, @\"test -3\");\n     \
    \   STAssertEquals([obj addOne:0], 1, @\"test 0\");\n}\n```\n\nIn general, it\
    \ is useful to create tests that apply not only to the general cases, but also\
    \ to corner cases. For example, if the method is supposed to work only for positive\
    \ numbers, you should check what happens when zero is passed as the argument,\
    \ since it is common to have errors at such boundary cases.\n\nAnother rule of\
    \ thumb is to add new test cases whenever a new unforeseen case has been found.\
    \ For example, if you find a bug in your code, it can be very useful to add a\
    \ test case to check that the bug has been correctly fixed. This is important\
    \ not only to guarantee that the current code is accurate, but also that future\
    \ revisions of your code will not have the same error. These types of tests are\
    \ also called regression tests, because they avoid the regression of previously\
    \ fixed bugs into working code.\n\n# Running Tests in Xcode\n\nBuilding a testing\
    \ target in Xcode and creating new tests is just half of the process of using\
    \ a unit testing methodology for software development. Once the tests have been\
    \ created, you need to actually run them in your development environment and verify\
    \ that they all pass. Xcode allows you to run tests from inside the IDE, so that\
    \ you can easily fix any issues raised during the testing procedure.\n\nIf you\
    \ have a previously set up testing target in your project, you can use menu option\
    \ Product ➤ Tests (or the keyboard shortcut `⌘U`), and the tests defined for your\
    \ project will be executed. You have two ways to access the results. The first\
    \ is a list of all tests that were executed in the test target. To see them, you\
    \ can use the Log Navigator from the menu bar, choose View ➤ Navigators ➤ Show\
    \ Log Navigator (or the keyboard shortcut `⌘7`). This will display the log navigator\
    \ on the left side of the Xcode screen. Click the logs that correspond to the\
    \ testing action, and you will see the complete logs for the execution of the\
    \ testing target. If everything has been successful, you should see a list of\
    \ tests marked in green.\n\nThe second way you can access the results of unit\
    \ tests is through the Issue Navigator, whenever there is a failure in one or\
    \ more unit tests. When that happens, Xcode generates an issue that is listed\
    \ along with other issue categories in its own navigator. You can access this\
    \ view using the main menu by choosing View ➤ Navigators ➤ Issue Navigator. Then,\
    \ look at the problems (listed in red), which will indicate if one or more unit\
    \ tests have failed in the last execution. You can click the issue, which will\
    \ lead the code editor directly to the position of the failed unit test. You can\
    \ also double-click the issue, in which case a new editor window will appear,\
    \ with the cursor at the exact location of the error. You can now edit the test\
    \ or the code being tested in order to fix the issue.\n\n# OCUnit Assertion Macros\n\
    \nAs you have seen in the previous example, you need to use assertion expressions\
    \ to determine if a test is returning the expected results. Using assertions to\
    \ determine test correctness is so common that OCTest has defined several macros\
    \ for this purpose. These assertion macros can determine if two values are equal,\
    \ different, or conform to some other relation.\n\nMost of the assertion macros\
    \ in OCTest have a common interface. The general pattern is that the name of the\
    \ assertion starts with `STAssert`, followed by the type of test this macro is\
    \ supposed to perform. For example, `STAssertEquals` is where the test for equality\
    \ is performed.\n\nThe arguments for each of these assertion macros also follow\
    \ a similar pattern. The first parameters are the objects or values to which the\
    \ test applies. For example, in `STAssertEquals`, the first two parameters are\
    \ the objects tested for equality. Then, the next parameter is a string that describes\
    \ the meaning of the test. This parameter is displayed in the Xcode test log when\
    \ an assertion fails. Therefore, it is important to give an appropriate description\
    \ that can make it easier to spot a problem when it happens.\n\nAnother common\
    \ feature of the assert macros is that the description can accept formatting parameters\
    \ in a way similar to `NSLog`. This is expressed in the macros by specifying the\
    \ last parameter with the “...” syntax.\n\nHere is a list of the commonly used\
    \ assertion macros in OCUnit.\n\n* `STAssertEquals(value1, value2, description,\
    \ ...)`: This macro succeeds whenever the two values are the same. Otherwise,\
    \ the test fails with the given description. This macro works with non-object\
    \ values, such as numbers, `struct`s, or generic pointers.\n* `STAssertEqualObjects(obj1,\
    \ obj2, description, ...)`: This macro succeeds whenever the two objects are the\
    \ same. Otherwise, the test fails with the given description. This macro works\
    \ for objects, and tests for equality using the `isEqual:` method. A failure occurs\
    \ when `isEqual:` for the objects return `false` or either of the objects is `nil`.\n\
    * `STFail`: This is a macro that always fails. It is convenient to use `STFail`\
    \ in situations when a particular code path should never be taken, such as\n\n\
    ```\n- (void)testExample\n{\n    int value = [myObj fileOperation];\n    switch\
    \ (value)\n    {\n        case ERROR_NO_SPACE:\n        case ERROR_INCORRECT_FILE_NAME:\n\
    \            STFail(@\"Failing test for unsupported value\");\n            break;\n\
    \        // other cases go here...\n        default:\n            break;\n   \
    \ }\n}\n```\n\nIn this example, you have a switch statement whose value depends\
    \ on a method that you are testing. The return value needs to be validated by\
    \ the test case in order to determine its correctness. Among the values returned\
    \ by the method, you want to make sure that the values `ERROR_NO_SPACE` and `ERROR_INCORRECT_FILE_NAME`\
    \ are not allowed. One way to check for this condition is to use a switch case\
    \ and call `STFail` when these two values are returned. While not shown here,\
    \ you might have many other cases to validate."
  raw: '## Creating New Tests


    Creating test cases in OCTest is a simple process. You just need to add methods
    to the test class, which in this case is called `TestUT`. The methods don’t even
    need to be added to the public interface, since the OCTest framework will take
    care of running any test case included in the implementation section. The only
    requirement is that the method representing a test case starts with the word `test`,
    returning void and with no expected parameters. Therefore, you can add a new test
    case as follows:


    `- (void)testExample`


    `{`


            `// This code will be run by OCUnit`


            `STAssertTrue(TRUE, @"sample test");`


    `}`


    While the mechanics of adding tests is simple, much more important is to determine
    logically when a new test should be added to your list of test cases.


    In theory, the number of test cases that can be written for most non-trivial methods
    is unlimited. However, in practice you should write tests only to make sure that
    certain aspects of your implementation return correct results. For example, here
    is a method that adds one unit to an integer argument:


    `- (int) addOne:(int)value`


    `{`


            `// implementation here`


    `}`


    It is not possible to test for every integer value. However, it makes sense to
    write tests that check the accuracy of the method for positive integers, negative
    integers, and for zero, for example.


    `- (void)testExample`


    `{`


            `// create obj here...`


            `STAssertEquals([obj addOne:2], 3, @"test 2");`


            `STAssertEquals([obj addOne:-3], -2, @"test -3");`


            `STAssertEquals([obj addOne:0], 1, @"test 0");`


    `}`


    In general, it is useful to create tests that apply not only to the general cases,
    but also to corner cases. For example, if the method is supposed to work only
    for positive numbers, you should check what happens when zero is passed as the
    argument, since it is common to have errors at such boundary cases.


    Another rule of thumb is to add new test cases whenever a new unforeseen case
    has been found. For example, if you find a bug in your code, it can be very useful
    to add a test case to check that the bug has been correctly fixed. This is important
    not only to guarantee that the current code is accurate, but also that future
    revisions of your code will not have the same error. These types of tests are
    also called regression tests, because they avoid the regression of previously
    fixed bugs into working code.


    ## Running Tests in Xcode


    Building a testing target in Xcode and creating new tests is just half of the
    process of using a unit testing methodology for software development. Once the
    tests have been created, you need to actually run them in your development environment
    and verify that they all pass. Xcode allows you to run tests from inside the IDE,
    so that you can easily fix any issues raised during the testing procedure.


    If you have a previously set up testing target in your project, you can use menu
    option Product ➤ Tests (or the keyboard shortcut ![A978-1-4302-5906-0_14_Fig1a_HTML.jpg](A978-1-4302-5906-0_14_Fig1a_HTML.jpg)+U),
    and the tests defined for your project will be executed. You have two ways to
    access the results. The first is a list of all tests that were executed in the
    test target. To see them, you can use the Log Navigator from the menu bar, choose
    View ➤ Navigators ➤ Show Log Navigator (or the keyboard shortcut ![A978-1-4302-5906-0_14_Fig1b_HTML.jpg](A978-1-4302-5906-0_14_Fig1b_HTML.jpg)+7).
    This will display the log navigator on the left side of the Xcode screen. Click
    the logs that correspond to the testing action, and you will see the complete
    logs for the execution of the testing target. If everything has been successful,
    you should see a list of tests marked in green.


    The second way you can access the results of unit tests is through the Issue Navigator,
    whenever there is a failure in one or more unit tests. When that happens, Xcode
    generates an issue that is listed along with other issue categories in its own
    navigator. You can access this view using the main menu by choosing View ➤ Navigators
    ➤ Issue Navigator. Then, look at the problems (listed in red), which will indicate
    if one or more unit tests have failed in the last execution. You can click the
    issue, which will lead the code editor directly to the position of the failed
    unit test. You can also double-click the issue, in which case a new editor window
    will appear, with the cursor at the exact location of the error. You can now edit
    the test or the code being tested in order to fix the issue.


    ## OCUnit Assertion Macros


    As you have seen in the previous example, you need to use assertion expressions
    to determine if a test is returning the expected results. Using assertions to
    determine test correctness is so common that OCTest has defined several macros
    for this purpose. These assertion macros can determine if two values are equal,
    different, or conform to some other relation.


    Most of the assertion macros in OCTest have a common interface. The general pattern
    is that the name of the assertion starts with`STAssert`, followed by the type
    of test this macro is supposed to perform. For example, `STAssertEquals` is where
    the test for equality is performed.


    The arguments for each of these assertion macros also follow a similar pattern.
    The first parameters are the objects or values to which the test applies. For
    example, in `STAssertEquals`, the first two parameters are the objects tested
    for equality. Then, the next parameter is a string that describes the meaning
    of the test. This parameter is displayed in the Xcode test log when an assertion
    fails. Therefore, it is important to give an appropriate description that can
    make it easier to spot a problem when it happens.


    Another common feature of the assert macros is that the description can accept
    formatting parameters in a way similar to `NSLog`. This is expressed in the macros
    by specifying the last parameter with the “. . .” syntax.


    Here is a list of the commonly used assertion macros in OCUnit.


    *   `STAssertEquals(value1, value2, description, ...)`: This macro succeeds whenever
    the two values are the same. Otherwise, the test fails with the given description.
    This macro works with non-object values, such as numbers, `struct`s, or generic
    pointers.

    *   `STAssertEqualObjects(obj1, obj2, description, ...)`: This macro succeeds
    whenever the two objects are the same. Otherwise, the test fails with the given
    description. This macro works for objects, and tests for equality using the `isEqual:`
    method. A failure occurs when `isEqual:` for the objects return false or either
    of the objects is nil.

    *   `STFail`: This is a macro that always fails. It is convenient to use `STFail`
    in situations when a particular code path should never be taken, such as


    `- (void)testExample`


    `{`


    `int value = [myObj fileOperation];`


    `switch (value)`


    `{`


    `case ERROR_NO_SPACE:`


    `case ERROR_INCORRECT_FILE_NAME:`


    `STFail(@"Failing test for unsupported value");`


    `break;`


    `// other cases go here...`


    `default:`


    `break;`


    `}`


    `}`


    In this example, you have a switch statement whose value depends on a method that
    you are testing. The return value needs to be validated by the test case in order
    to determine its correctness. Among the values returned by the method, you want
    to make sure that the values `ERROR_NO_SPACE` and `ERROR_INCORRECT_FILE_NAME`
    are not allowed. One way to check for this condition is to use a switch case and
    call `STFail` when these two values are returned. While not shown here, you might
    have many other cases to validate.'
  trans: "\n# 创建新测试\n\n在 OCTest 中创建测试用例是一个简单的过程。您只需向测试类（在本例中称为 `TestUT`）添加方法即可。这些方法甚至不需要添加到公共接口中，因为\
    \ OCTest 框架会负责运行包含在实现部分中的任何测试用例。唯一的要求是，代表测试用例的方法必须以单词 `test` 开头，返回 `void`，并且没有预期参数。因此，您可以按如下方式添加一个新的测试用例：\n\
    \n```\n- (void)testExample\n{\n        // 这段代码将由 OCUnit 运行\n        STAssertTrue(TRUE,\
    \ @\"示例测试\");\n}\n```\n\n虽然添加测试的机制很简单，但更重要的是从逻辑上判断何时应在测试用例列表中添加一个新测试。\n\n理论上，可以为大多数非平凡方法编写的测试用例数量是无限的。然而，在实践中，您应该只编写测试来确保实现的某些方面返回正确的结果。例如，这里有一个将整数参数加一的方法：\n\
    \n```\n- (int) addOne:(int)value\n{\n        // 在此处实现\n}\n```\n\n不可能测试每一个整数值。但是，编写测试来检查该方法对正整数、负整数和零的准确性是有意义的，例如：\n\
    \n```\n- (void)testExample\n{\n        // 在此处创建对象...\n        STAssertEquals([obj\
    \ addOne:2], 3, @\"测试 2\");\n        STAssertEquals([obj addOne:-3], -2, @\"测试\
    \ -3\");\n        STAssertEquals([obj addOne:0], 1, @\"测试 0\");\n}\n```\n\n通常，创建不仅适用于一般情况，也适用于边界情况的测试是很有用的。例如，如果某个方法应该只对正数有效，那么您应该检查当零作为参数传入时会发生什么，因为在这种边界情况下出现错误是很常见的。\n\
    \n另一个经验法则是，每当发现新的、无法预见的情况时，就添加新的测试用例。例如，如果您在代码中发现了一个 bug，那么添加一个测试用例来检查该 bug 是否已被正确修复是非常有用的。这不仅对于保证当前代码的准确性很重要，而且对于确保代码的未来版本不会出现同样的错误也很重要。这类测试也称为回归测试，因为它们可以防止先前修复的\
    \ bug 重新出现在工作代码中。\n\n# 在 Xcode 中运行测试\n\n在 Xcode 中构建测试目标并创建新测试，只是为软件开发使用单元测试方法流程的一半。一旦创建了测试，您就需要在实际的开发环境中运行它们，并验证它们是否全部通过。Xcode\
    \ 允许您从 IDE 内部运行测试，这样您就可以轻松修复测试过程中出现的任何问题。\n\n如果您在项目中已经有了一个预先设置好的测试目标，您可以使用菜单选项\
    \ Product ➤ Test（或键盘快捷键 `⌘U`），项目中定义的测试将会被执行。您有两种方式查看结果。第一种是查看测试目标中执行的所有测试列表。要查看它们，您可以使用菜单栏中的日志导航器，选择\
    \ View ➤ Navigators ➤ Show Log Navigator（或键盘快捷键 `⌘7`）。这将在 Xcode 屏幕左侧显示日志导航器。点击与测试操作相对应的日志，您将看到测试目标执行的完整日志。如果一切顺利，您应该会看到一个标记为绿色的测试列表。\n\
    \n访问单元测试结果的第二种方式是通过问题导航器，当一个或多个单元测试失败时即可使用。当发生这种情况时，Xcode 会生成一个问题，该问题与其它问题类别一起列在其导航器中。您可以通过主菜单选择\
    \ View ➤ Navigators ➤ Issue Navigator 来访问此视图。然后，查看问题（以红色列出），这将指示在上次执行中是否有一个或多个单元测试失败。您可以点击该问题，代码编辑器将直接跳转到失败的单元测试的位置。您也可以双击该问题，此时将出现一个新的编辑器窗口，光标会定位到错误的确切位置。现在，您可以编辑测试或被测试的代码来修复问题。\n\
    \n# OCUnit 断言宏\n\n正如您在之前的例子中所看到的，您需要使用断言表达式来确定测试是否返回了预期结果。使用断言来确定测试正确性非常普遍，以至于\
    \ OCTest 为此定义了多个宏。这些断言宏可以判断两个值是否相等、不同，或者是否符合某种其他关系。\n\nOCTest 中的大多数断言宏都有一个通用的接口。通常的模式是断言名称以\
    \ `STAssert` 开头，后跟该宏要执行的测试类型。例如，`STAssertEquals` 用于执行相等性测试。\n\n每个断言宏的参数也遵循类似的模式。前几个参数是要应用测试的对象或值。例如，在\
    \ `STAssertEquals` 中，前两个参数是测试相等性的对象。然后，下一个参数是一个描述测试含义的字符串。当断言失败时，该参数会显示在 Xcode\
    \ 测试日志中。因此，提供一个适当的描述非常重要，这样可以在问题发生时更容易地发现它。\n\n断言宏的另一个常见特性是，描述可以像 `NSLog` 一样接受格式化参数。这在宏中通过使用\
    \ \"...\" 语法指定最后一个参数来表达。\n\n以下是 OCUnit 中常用的断言宏列表。\n\n*   `STAssertEquals(value1,\
    \ value2, description, ...)`: 当两个值相同时，此宏成功。否则，测试失败并显示给定的描述。此宏适用于非对象值，例如数字、`struct`\
    \ 或通用指针。\n*   `STAssertEqualObjects(obj1, obj2, description, ...)`: 当两个对象相同时，此宏成功。否则，测试失败并显示给定的描述。此宏适用于对象，并使用\
    \ `isEqual:` 方法测试相等性。当对象的 `isEqual:` 返回 `false` 或任一对象为 `nil` 时，会发生失败。\n*   `STFail`:\
    \ 这是一个始终失败的宏。在某个代码路径不应该被执行的情况下，使用 `STFail` 很方便，例如：\n\n```\n- (void)testExample\n\
    {\n    int value = [myObj fileOperation];\n    switch (value)\n    {\n       \
    \ case ERROR_NO_SPACE:\n        case ERROR_INCORRECT_FILE_NAME:\n            STFail(@\"\
    针对不支持的值测试失败\");\n            break;\n        // 其他情况在此处...\n        default:\n\
    \            break;\n    }\n}\n```\n\n在这个例子中，您有一个 switch 语句，其值取决于您正在测试的方法。测试用例需要验证返回值以确定其正确性。在方法返回的值中，您要确保不允许出现\
    \ `ERROR_NO_SPACE` 和 `ERROR_INCORRECT_FILE_NAME` 这两个值。检查此条件的一种方法是使用 switch case，并在返回这两个值时调用\
    \ `STFail`。虽然此处未展示，但您可能还有许多其他情况需要验证。\n"
- fmt: "- `STAssertEqualsWithAccuracy(value1, value2, accuracy, description, ...):`\
    \ 此宏使用给定的精度比较第一个值和第二个值。如果比较失败，则使用描述来提示出了什么问题。当处理浮点数值时，此比较宏非常有用，因为精度表示这两个值之间可接受的微小差异。\n\
    - `STAssertNil(expression, description, ...):` 此宏测试给定的表达式是否为`nil`值。否则，将使用提供的描述报告失败。\n\
    - `STAssertNotNil(expression, description, ...):` 此宏测试给定的表达式是否为非`nil`值。否则，将使用提供的描述报告失败。\n\
    - `STAssertTrue(expression, description, ...):` 此宏测试给定的表达式的值是否为`YES`。否则，将使用提供的描述报告失败。\n\
    - `STAssertFalse(expression, description, ...):` 此宏测试给定的表达式的值是否为`NO`。否则，将使用提供的描述报告失败。\n\
    - `STAssertThrows(expression, description, ...):` 此宏测试给定的表达式在执行时是否抛出异常。如果没有抛出异常，则使用提供的描述报告失败。\n\
    \n异常是一种 Objective-C 机制，用于发出意外错误信号。当库无法从特定错误中恢复时，可能会生成异常。你也可以使用`@throw`关键字生成异常。以下是抛出异常并使用断言宏检测它的示例。此方法用于返回字符串的第一个字符。如果字符串为空，则该方法使用`@throw`关键字引发异常。\n\
    \n```\n- (char)getFirstChar:(NSString *)string\n{\n    if ([string length] < 1)\n\
    \    {\n        @throw [[NSException alloc] initWithName:@\"firstChar\"\n    \
    \                                      reason:@\"StringIsEmpty\" userInfo:nil];\n\
    \    }\n    return [string characterAtIndex:0];\n}\n```\n\n此方法将检查是否存在至少一个字符并返回它。如果字符串为空，它会创建一个描述异常的`NSException`对象，并使用`@throw`关键字生成异常信号。以下测试可用于保证生成异常：\n\
    \n```\n- (void)testGetFirstChar\n{\n    StringOps *so = [[StringOps alloc] init];\n\
    \    STAssertThrows([so getFirstChar:@\"\"], @\"checks for exception on empty\
    \ string\");\n}\n```\n\n此测试将使用空字符串调用`getFirstChar:`方法。这将检查是否按要求抛出了异常，并在发生时测试通过。\n\
    \n- `STAssertThrowsSpecific(expression, exception_class, description, ...):` 此宏测试给定的表达式在执行时是否抛出了第二个参数中指定的特定异常。如果没有抛出异常，则使用提供的描述报告失败。\n\
    - `STAssertNoThrow(expression, description, ...):` 此宏测试给定的表达式在执行时是否不抛出异常。如果抛出了异常，则使用提供的描述报告失败。\n\
    - `STAssertNoThrowSpecific(expression, exception_class, description, ...):` 此宏测试给定的表达式在执行时是否不抛出`send`参数中列出的异常类型。如果抛出了异常，则使用提供的描述报告失败。\n\
    \n## Test-Driven Development\n\n测试驱动开发 (TDD) 是一种软件开发策略，其意义远不止于简单地向项目添加测试。TDD 的核心思想是编写测试应先于开发或编写实际代码。TDD\
    \ 背后的理由是，好的代码应该始终有测试来保证其正常工作。另一方面，拥有测试有助于我们专注于特定功能的开发，以实现期望的功能。\n\nTDD 的这些特性导致了一个特定的工作流程，该流程与大多数开发人员使用的标准编码技术有些不同。其理念是使用单元测试集作为项目中新功能的驱动力。这意味着在向项目添加新类或方法时，首先要做的是创建测试，这些测试将保证新代码的行为符合预期。\n\
    \n例如，假设你想向`StringOps`类添加一个计算字符串反转的新方法。根据 TDD，你需要做的第一件事，甚至在编写类的任何接口之前，就是创建一个名为`testReverse`的新方法。\n\
    \n```\n- (void)testReverse\n{\n    STFail(@\"not implemented\");\n}\n```\n\n此测试将按预期失败。但这是一个重要的特性，因为在\
    \ TDD 中，你希望测试失败，直到所需功能被正确实现。因此，下一步是创建一个名为`StringOps`的类。然后，可以使用以下代码更新测试：\n\n```\n\
    - (void)testReverse\n{\n    StringOps *so = [[StringOps alloc] init];\n    STAssertTrue(so\
    \ != nil, @\"check object created\");\n}\n```\n\n在你导入`StringOps`的头文件后，此测试应该能够编译并正确运行。该测试只是检查你是否可以创建一个`StringOps`类型的对象，这是一个应该可行的简单测试。\n\
    \n现在你已经通过了`StringOps`对象的创建测试，下一步是添加一个实现字符串反转操作的方法。首先要为此创建一个测试。\n\n```\n- (void)testReverse\n\
    {\n    StringOps *so = [[StringOps alloc] init];\n    STAssertTrue(so != nil,\
    \ @\"check object created\");\n    STAssertEqualObjects([so reverse:@\"ABC\"],\
    \ @\"CBA\", @\"check string reversal\");\n}\n```\n\n同时，你需要在`StringOps`类中添加一个相应的方法，以便测试能够编译。\n\
    \n```\n#import <Foundation/Foundation.h>\n@interface StringOps : NSObject\n- (NSString*)reverse:(NSString\
    \ *)string;\n@end\n```\n\n至于`reverse:`方法的实现，你将从一个仅返回原始字符串的简单实现开始。\n\n```\n#import\
    \ \"StringOps.h\"\n@implementation StringOps\n- (NSString*)reverse:(NSString *)string\n\
    {\n    return string;\n}\n@end\n```\n\n这个算法显然是不正确的，但这正是 TDD 的策略：从一个失败的测试开始，然后才创建一个能够验证测试的有效实现。通过单击\
    \ ![A978-1-4302-5906-0_14_Fig1c_HTML.jpg](A978-1-4302-5906-0_14_Fig1c_HTML.jpg)\
    \ + U（运行测试），你将看到一个需要修复的失败测试。错误信息显示“`'ABC' should be equal to 'CBA' check string\
    \ reversal`”。单击该错误，编辑器将定位到失败测试所在的位置。\n\n现在，你将编写一个使该测试成功的实现。你将使用一个简单的算法来遍历字符串并交换字符，返回一个新的`NSString`。\n\
    \n```\n- (NSString*)reverse:(NSString *)string\n{\n    char* cstr = (char*)[string\
    \ UTF8String];\n    int size = (int)[string length];\n    int i, j;\n    for (i=0,\
    \ j=size-1; i<size/2; ++i, j--)\n    {\n        char c = cstr[i];\n        cstr[i]\
    \ = cstr[j];\n        cstr[j] = c;\n    }\n    return [NSString stringWithCString:cstr\
    \ encoding:NSUTF8StringEncoding];\n}\n```"
  raw: '*   `STAssertEqualsWithAccuracy(value1, value2, accuracy, description, ...):`
    This macro compares the first and second values using the given accuracy. If the
    comparison fails, then the description is used to give a hint of what went wrong.
    This comparison macro is useful when dealing with floating point values where
    accuracy indicates a small acceptable difference between these two values.

    *   `STAssertNil(expression, description, ...):` This macro tests if the given
    expression has `nil` value. Otherwise, a failure is reported using the provided
    description.

    *   `STAssertNotNil(expression, description, ...):` This macro tests if the given
    expression has non-`nil` value. Otherwise, a failure is reported using the provided
    description.

    *   `STAssertTrue(expression, description, ...)`: This macro tests if the given
    expression has a `YES` value. Otherwise, a failure is reported using the provided
    description.

    *   `STAssertFalse(expression, description, ...)`: This macro tests if the given
    expression has a `NO` value. Otherwise, a failure is reported using the provided
    description.

    *   `STAssertThrows(expression, description, ...)`: This macro tests is the given
    expression throws an exception when executed. If an exception is not thrown, a
    failure is reported using the provided description.


    An exception is an Objective-C mechanism that signals the occurrence of an unexpected
    error. Libraries can generate exceptions when they can’t recover from a particular
    error. You can also generate an exception using the `@throw` keyword. The following
    is an example of throwing an exception, and detecting it with an assert macro.
    This method is used to return the first character of a string. If the string is
    empty, the method raises an exception using the `@throw` keyword.


    `- (char)getFirstChar:(NSString *)string`


    `{`


    `if ([string length] < 1)`


    `{`


    `@throw [[NSException alloc] initWithName:@"firstChar"`


    `reason:@"StringIsEmpty" userInfo:nil];`


    `}`


    `return [string characterAtIndex:0];`


    `}`


    This method will check if there is at least one character and return it. If the
    string is empty, it creates an `NSException` object, which describes the exception,
    and uses the `@throw` keyword to generate the exception signal. The following
    test can be used to guarantee that the exception is generated:


    `- (void)testGetFirstChar`


    `{`


    `StringOps *so = [[StringOps alloc] init];`


    `STAssertThrows([so getFirstChar:@""], @"checks for exception on empty string");`


    `}`


    This test will call the `getFirstChar:` method using an empty string. This will
    check that the exception is thrown as required and succeeds when that happens.


    *   `STAssertThrowsSpecific(expression, exception_class, description, ...)`: This
    macro tests that the given expression throws a specific exception, named in the
    second parameter, when executed. If the exception is not thrown, a failure is
    reported using the provided description.

    *   `STAssertNoThrow(expression, description, ...)`: This macro tests that the
    given expression doesn’t throw an exception when executed. If an exception is
    thrown, a failure is reported using the provided description.

    *   `STAssertNoThrowSpecific(expression, exception_class, description, ...)`:
    This macro tests that the give expression, when executed, doesn’t throw an exception
    of the type listed on the `send` parameter. If the exception is thrown, a failure
    is reported using the provided description.


    ## Test-Driven Development


    Test-driven development (TDD) is a strategy for software development that goes
    much further than simply adding tests to a project. The central idea of TDD is
    that writing tests should precede the development or real code. The reasoning
    behind TDD is that good code should always have tests that guarantee that it works.
    On the other hand, having tests helps us focus on the development of particular
    features, with the goal of achieving the desired functionality.


    These characteristics of TDD lead to a specific workflow that is somewhat different
    from the standard coding techniques used by most developers. The idea is to use
    the set of unit tests as the driver for new functionality in the project. This
    means that the first thing you need to do when adding a new class or method to
    the project is to create tests that will guarantee that the new code behaves as
    desired.


    For example, suppose that you want to add a new method to the class `StringOps`
    that calculates the reverse of a string. According to TDD, the first thing you
    need to do, even before you write anything in the interface of the class, is to
    create a new method called `testReverse`.


    `- (void)testReverse`


    `{`


    `STFail(@"not implemented");`


    `}`


    This test will fail as expected. But this is an important feature, because in
    TDD you want tests to fail until the desired functionality has been correctly
    implemented. Thus, the next thing to do is to create a class called `StringOps`.
    Then, the test can be updated with the following code:


    `- (void)testReverse`


    `{`


    `StringOps *so = [[StringOps alloc] init];`


    `STAssertTrue(so != nil, @"check object created");`


    `}`


    This test should compile and run correctly after you import the header file for
    `StringOps`. The test just checks that you can create an object of type `StringOps`,
    a trivial test that should work.


    Now that you are passing the test for creation of a `StringOps` object, the next
    step is to add a method implementing the operation of string reversal. The first
    thing is to create a test for this.


    `- (void)testReverse`


    `{`


    `StringOps *so = [[StringOps alloc] init];`


    `STAssertTrue(so != nil, @"check object created");`


    `STAssertEqualObjects([so reverse:@"ABC"], @"CBA", @"check string reversal");`


    `}`


    At the same time, you need to add a corresponding method in the `StringOps` class
    so that the test will compile.


    `#import <Foundation/Foundation.h>`


    `@interface StringOps : NSObject`


    `- (NSString*)reverse:(NSString *)string;`


    `@end`


    As for the implementation of the `reverse:` method, you will start with a simple
    implementation that just returns the original string.


    `#import "StringOps.h"`


    `@implementation StringOps`


    `- (NSString*)reverse:(NSString *)string`


    `{`


    `return string;`


    `}`


    `@end`


    This algorithm is clearly incorrect but, again, that is the strategy of TDD: start
    with a failing test and only then create a valid implementation that will validate
    the test. By clicking ![A978-1-4302-5906-0_14_Fig1c_HTML.jpg](A978-1-4302-5906-0_14_Fig1c_HTML.jpg)+U
    (run tests), you will see a failing test that needs to be fixed. The error reads
    “`''ABC'' should be equal to ''CBA'' check string reversal`.” Click the error,
    and the editor will be positioned at the location of the failing test.


    Now, you will write an implementation that makes that test succeed. You will use
    a simple algorithm that iterates through the string and interchange the characters,
    returning a new `NSString`.


    `- (NSString*)reverse:(NSString *)string`


    `{`


    `char* cstr = (char*)[string UTF8String];`


    `int size = (int)[string length];`


    `int i, j;`


    `for (i=0, j=size-1; i<size/2; ++i, j--)`


    `{`


    `char c = cstr[i];`


    `cstr[i] = cstr[j];`


    `cstr[j] = c;`


    `}`


    `return [NSString stringWithCString:cstr encoding:NSUTF8StringEncoding];`


    `}`'
