  raw: '### Compiling the Code Samples


    The examples given in this book have all been compiled on OS X using the freely
    available Xcode IDE. To use Xcode you need to have a Mac OS X machine. If you
    don’t have Xcode installed in your computer, you can download it from Apple’s
    developer web site at


    [`http://developer.apple.com`](http://developer.apple.com)


    Another way to install Xcode is to use the App Store application on your Mac.
    Search for Xcode and click to install the app.


    The next time you start Xcode, create a new project by clicking File ➤ New ➤ Project.
    This will bring up a wizard window where you can give some basic options for the
    new project, such as its location, name, and target operating system (use Mac
    OS X as the target).


    With the new project, you can create files and enter the examples as displayed
    in the book. To download the complete set of examples included here, visit the
    web page for this book at [`http://coliveira.net`](http://coliveira.net) or [`www.apress.com`](http://www.apress.com)
    .


    Acknowledgments


    It would be very hard to write a book like this without the help of a competent
    and dedicated group. I would like to acknowledge the help of the editorial team
    at Apress for their great support.


    First, thanks to Editor Jonathan Gennick for giving me the opportunity to write
    this text; his help has been appreciated. The Technical Reviewer, Ron Natalie,
    has done a great job of pointing out any issues found in the programming topics.
    Editors Jill Balzano and Douglas Pundick have been incredibly helpful in all practical
    aspects of the project.


    Last but not least, thanks to my family for their loving support during my whole
    career and especially during the time spent writing this book.


