    type is just one of the integer number types mentioned previously, and as such
    it behaves similarly to types such as `int` or `short`. A type `char` can also
    be declared as signed (when negative numbers are allowed) or unsigned (in case
    it is known that no negative number will be stored).


    ### Logical Values


    A variable can also store a single logical value, true or false. Although the
    C language doesn’t have a specialized Boolean value, in Objective-C you use the
    `BOOL` type to represent this kind of variable. A variable of type `BOOL` can
    store the values `YES` or `NO`, which can also be spelled as `TRUE` or `FALSE`.
    The language, however, allows the conversion of any integer type into a Boolean.
    In that case, the value zero is converted to `FALSE`, while anything different
    from zero is considered to be `TRUE`. This may be a source of mistakes for programmers
    that are not careful with the conversion rules between these types.


    ### Pointers


    Objective-C supports variables that store memory addresses, and this is one of
    the most flexible methods to refer to data stored by a program (the use of such
    variables will be covered later in this chapter). Pointers are declared using
    the star notation, and here is an example of declaring pointers to common types:


    `int *pointer_to_int;`


    `double *double_pointer;`


    The first example is a variable that can store the address of an integer. The
    second is a pointer that can be used to store the address where a value of type
    `double` is contained. The pointer notation is frequently used when creating objects
    in Objective-C, as you will see in the next chapter.


    ### The void Type


    The keyword `void` is a special type name used in Objective-C. Unlike the other
    type names, `void` doesn’t represent a real data type, but instead signifies the
    absence of data, or the fact that the type is unknown. The type `void` can appear
    only in a few situations. One case happens when a function has no return value.
    This is indicated by the use of the `void` keyword in place of the return type.


    Another situation in which `void` is employed is to mark pointers to unknown data
    types. When a type is unknown and `void` is used instead, the resulting pointer
    will have no information about the actual data type stored in that memory location.
    Such a variable can be used in Objective-C as a generic pointer, which can be
    applied to any data type. You will see examples of this use when learning about
    pointers in a later section.


    Note


    Since `void` is just a special keyword, it is not possible to declare a variable
    of void type. For example, trying to declare a variable like `void var;` will
    result in a compilation error, since the compiler won’t be able to deduce the
    real type of the variable.'
