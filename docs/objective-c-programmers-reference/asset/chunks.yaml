- fmt: '# The autorelease Method


    In the previous section, you learned how to work with the two main methods used
    for memory management in Objective-C: `retain` and `release`. As you have seen,
    these two methods increase or decrease the internal reference counter for each
    object, thus allowing the object itself to know how many references exist for
    it in memory. These two methods work in tandem to guarantee that the object is
    alive while there are references to it. On the other hand, they will allow memory
    to be reclaimed when it is no longer used.


    A third method is used to cover situations in which it is not possible to use
    `release` directly. This happens when you want an object to persist in memory,
    but you don''t want to (or cannot) take responsibility for its further release.
    A typical situation when this would occur is a method that returns a new object
    and has a name that doesn’t start with `new`, `alloc`, or `copy` (remember that
    such methods are always allowed to return objects with reference count equal to
    1).


    Consider a method that returns the sorted elements in an array of integers. That
    is, it computes a new, sorted array with the same values contained in the original.
    To do this, it is necessary to create a new array object and return it as a result,
    which can potentially cause a memory leak. This is the initial implementation:


    ```

    // file SortArray.h


    @interface SortArray : NSObject


    - (NSArray *) sortIntegerItems:(NSArray *)data;


    @end


    // file SortArray.m


    #import "SortArray.h"


    @implementation SortArray


    - (NSArray *) sortIntegerItems:(NSArray *)data


    {


    NSArray *output = [[NSArray alloc] initWithArray:data];


    [output sortedArrayUsingComparator:^(id obj1, id obj2)


    {


    if ([obj1 integerValue] > [obj2 integerValue])


    {


    return (NSComparisonResult)NSOrderedDescending;


    }


    if ([obj1 integerValue] < [obj2 integerValue])


    {


    return (NSComparisonResult)NSOrderedAscending;


    }


    return (NSComparisonResult)NSOrderedSame;


    }];


    return output; // memory leak happens here


    }


    @end

    ```


    This code works in the following way. First, a new array is created with the `alloc`/`initWithArray:`
    combination of messages. The result is a new `NSArray` (`output`) that contains
    a copy of the original values stored in the parameter `data`. The next few lines
    are used to sort the array, using the `sortedArrayUsingComparator:` method. This
    method receives as a parameter a block, which determines how the elements will
    be compared (you saw a similar block in a previous chapter). Finally, the output
    data is returned to the caller, already containing the sorted elements.


    When the output array is created, it has a reference counter initialized to 1.
    Notice that this is true because the array object was created with a function
    that starts with `init` (`initWithArray:` in this case). The sorting procedure
    doesn’t change that fact. Then, when you return the array object, a conundrum
    ensues.


    - You cannot release the array, because doing so would invalidate it and return
    garbage to the caller. This means that you still want the array `output` to have
    a reference counter of at least 1.

    - You have no way to perform a release in a future moment because there is no
    guarantee that your code will ever receive the `output` array. For all practical
    purposes, you don’t control the lifetime of this object once it is returned from
    the `sortIntegerItems:` function. Additionally, the caller of this method doesn’t
    own the object (according to the rules you saw in the previous section) because
    this method name doesn’t start with `new`, `copy`, or `alloc`. This means that
    the caller also cannot release the object.


    To solve these problems within the framework of reference counted memory management,
    `NSObject` has another method called `autorelease`, which works along with the
    concept of memory pools to ensure that objects will be released even in such a
    situation. The `autorelease` method signals to the system that this object should
    stay alive for now, but it will be released as soon as possible by the memory
    pool mechanism. Here is how this change can be applied to the `sortIntegerItems:`
    method:


    ```

    // file SortArray.m


    #import "SortArray.h"


    @implementation SortArray


    - (NSArray *) sortIntegerItems:(NSArray *)data


    {


    NSArray *output = [[NSArray alloc] initWithArray:data];


    [output sortedArrayUsingComparator:^(id obj1, id obj2)


    {


    if ([obj1 integerValue] > [obj2 integerValue])


    {


    return (NSComparisonResult)NSOrderedDescending;


    }


    if ([obj1 integerValue] < [obj2 integerValue])


    {


    return (NSComparisonResult)NSOrderedAscending;


    }


    return (NSComparisonResult)NSOrderedSame;


    }];


    return [output autorelease];


    }


    @end

    ```


    Only the last line of the method was altered, so that `autorelease` can be called
    on `output`. As a result, now you don’t need to worry about memory leaks due to
    a failure of releasing the returned array. The caller of this function will have
    the opportunity to receive a valid object, and when the array is not referenced
    anymore, the system will take care of calling the release method on it.


    In the case of `NSArray` objects, using `autorelease` is not the only way to solve
    the preceding problem, however. Remember that you just need to call `release`
    or `autorelease` in an object that you own. You own the `output` array because
    `alloc` was called to create the new object. However, there is another way to
    create an `NSArray` without using `alloc`: you just need to use one of the class
    methods that build a new `NSArray`. For example, this is how you can write the
    method above without the help of `autorelease`:


    ```

    @implementation SortArray


    - (NSArray *) sortIntegerItems:(NSArray *)data


    {


    NSArray *output = [NSArray arrayWithArray:data];


    [output sortedArrayUsingComparator:^(id obj1, id obj2)


    {


    if ([obj1 integerValue] > [obj2 integerValue])


    {


    return (NSComparisonResult)NSOrderedDescending;


    }


    if ([obj1 integerValue] < [obj2 integerValue])


    {


    return (NSComparisonResult)NSOrderedAscending;


    }


    return (NSComparisonResult)NSOrderedSame;


    }];


    return output; // no memory leak happens here


    }


    @end

    ```


    The overall algorithm for this method didn’t change, but you are now acquiring
    the `NSArray` via the `arrayWithArray:` method, which is provided by the `NSArray`
    class itself. Since `arrayWithArray:` is not one of the methods that trigger ownership
    of the results, the `sortIntegerItems:` method is not the owner of the `output`
    array. Consequently, there is no need to call `release` or `autorelease` in the
    `output` object. Notice also that the situation is the same for any caller of
    `sortIntegerItems:`. Anyone can call that method without a need to do a release
    or autorelease.'
  raw: '## The autorelease Method


    In the previous section, you learned how to work with the two main methods used
    for memory management in Objective-C: `retain` and `release`. As you have seen,
    these two methods increase or decrease the internal reference counter for each
    object, thus allowing the object itself to know how many references exist for
    it in memory. These two methods work in tandem to guarantee that the object is
    alive while there are references to it. On the other hand, they will allow memory
    to be reclaimed when it is no longer used.


    A third method is used to cover situations in which it is not possible to use
    `release` directly. This happens when you want an object to persist in memory,
    but you don’t want to (or cannot) take responsibility for its further release.
    A typical situation when this would occur is a method that returns a new object
    and has a name that doesn’t start with `new`, `alloc`, or `copy` (remember that
    such methods are always allowed to return objects with reference count equal to
    1).


    Consider a method that returns the sorted elements in an array of integers. That
    is, it computes a new, sorted array with the same values contained in the original.
    To do this, it is necessary to create a new array object and return it as a result,
    which can potentially cause a memory leak. This is the initial implementation:


    `// file SortArray.h`


    `@interface SortArray : NSObject`


    `- (NSArray *) sortIntegerItems:(NSArray *)data;`


    `@end`


    `// file SortArray.m`


    `#import SortArray.h"`


    `@implementation SortArray`


    `- (NSArray *) sortIntegerItems:(NSArray *)data`


    `{`


    `NSArray *output =[[NSArray alloc] initWithArray:data];`


    `[output sortedArrayUsingComparator:^(id obj1, id obj2)`


    `{`


    `if ([obj1 integerValue] > [obj2 integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedDescending;`


    `}`


    `if ([obj1 integerValue] < [obj2 integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedAscending;`


    `}`


    `return (NSComparisonResult)NSOrderedSame;`


    `}];`


    `return output; // memory leak happens here`


    `}`


    `@end`


    This code works in the following way. First, a new array is created with the `alloc`/`initWithArray:`combination
    of messages. The result is a new `NSArray` (`output`) that contains a copy of
    the original values stored in the parameter `data`. The next few lines are used
    to sort the array, using the `sortedArrayUsingComparator:` method. This method
    receives as a parameter a block, which determines how the elements will be compared
    (you saw a similar block in a previous chapter). Finally, the output data is returned
    to the caller, already containing the sorted elements.


    When the output array is created, it has a reference counter initialized to 1\.
    Notice that this is true because the array object was created with a function
    that starts with `init` (`initWithArray:` in this case). The sorting procedure
    doesn’t change that fact. Then, when you return the array object, a conundrum
    ensues.


    *   You cannot release the array, because doing so would invalidate it and return
    garbage to the caller. This means that you still want the array `output` to have
    a reference counter of at least 1.

    *   You have no way to perform a release in a future moment because there is no
    guarantee that your code will ever receive the `output` array. For all practical
    purposes, you don’t control the lifetime of this object once it is returned from
    the `sortIntegerItems:` function. Additionally, the caller of this method doesn’t
    own the object (according to the rules you saw in the previous section) because
    this method name doesn’t start with `new`, `copy`, or `alloc`. This means that
    the caller also cannot release the object.


    To solve these problems within the framework of reference counted memory management,
    `NSObject` has another method called `autorelease`, which works along with the
    concept of memory pools to ensure that objects will be released even in such a
    situation. The `autorelease` method signals to the system that this object should
    stay alive for now, but it will be released as soon as possible by the memory
    pool mechanism. Here is how this change can be applied to the `sortIntegerItems:`
    method:


    `// file SortArray.m`


    `#import SortArray.h"`


    `@implementation SortArray`


    `- (NSArray *) sortIntegerItems:(NSArray *)data`


    `{`


    `NSArray *output =[[NSArray alloc] initWithArray:data];`


    `[output sortedArrayUsingComparator:^(id obj1, id obj2)`


    `{`


    `if ([obj1 integerValue] > [obj2 integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedDescending;`


    `}`


    `if ([obj1 integerValue] < [obj2 integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedAscending;`


    `}`


    `return (NSComparisonResult)NSOrderedSame;`


    `}];`


    `return [output autorelease];`


    `}`


    `@end`


    Only the last line of the method was altered, so that `autorelease` can be called
    on `output`. As a result, now you don’t need to worry about memory leaks due to
    a failure of releasing the returned array. The caller of this function will have
    the opportunity to receive a valid object, and when the array is not referenced
    anymore, the system will take care of calling the release method on it.


    In the case of `NSArray` objects, using `autorelease` is not the only way to solve
    the preceding problem, however. Remember that you just need to call `release`
    or `autorelease` in an object that you own. You own the `output` array because
    `alloc` was called to create the new object. However, there is another way to
    create an `NSArray` without using `alloc`: you just need to use one of the class
    methods that build a new `NSArray`. For example, this is how you can write the
    method above without the help of `autorelease`:


    `@implementation SortArray`


    `- (NSArray *) sortIntegerItems:(NSArray *)data`


    `{`


    `NSArray *output = [NSArray arrayWithArray:data];`


    `[output sortedArrayUsingComparator:^(id obj1, id obj2)`


    `{`


    `if ([obj1 integerValue] > [obj2 integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedDescending;`


    `}`


    `if ([obj1 integerValue] < [obj2 integerValue])`


    `{`


    `return (NSComparisonResult)NSOrderedAscending;`


    `}`


    `return (NSComparisonResult)NSOrderedSame;`


    `}];`


    `return output; // no memory leak happens here`


    `}`


    `@end`


    The overall algorithm for this method didn’t change, but you are now acquiring
    the `NSArray` via the `arrayWithArray:` method, which is provided by the `NSArray`
    class itself. Since `arrayWithArray:` is not one of the methods that trigger ownership
