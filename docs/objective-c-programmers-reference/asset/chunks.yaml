  raw: '# Part 1

    The Language


    # 1. The C in Objective-C


    Abstract


    In this chapter, we will introduce the main concepts common to the Objective-C
    and C languages. Objective-C is based on the original C language. As a result
    of this special relationship, any program that is valid C code is also valid from
    Objective-C''s perspective. This is why it is so important to be familiar with
    the basics of C, as well as how they relate to areas of object oriented programming,
    such as classes, messages, and interfaces.


    In this chapter, we will introduce the main concepts common to the Objective-C
    and C languages. Objective-C is based on the original C language. As a result
    of this special relationship, any program that is valid C code is also valid from
    Objective-C’s perspective. This is why it is so important to be familiar with
    the basics of C, as well as how they relate to areas of object oriented programming,
    such as classes, messages, and interfaces.


    Topics such as arrays, structures, pointers, variable declarations, variable types,
    and functions are part of the common vocabulary shared by these languages. Programmers
    who are fluent in such basic Objective-C techniques have a much better time at
    understanding and using object-oriented concepts.


    To get you up to speed with the advanced abilities of Objective-C, we start the
    book with an overview of the most frequently used features inherited from the
    C language. In the next sections, you will see how to use such fundamental techniques
    to create simple programs that will be the building blocks of your future Objective-C
    applications.


    Note


    As you read the next few sections, please keep in mind the implicit assumption
    that every feature discussed here as being part of Objective-C is also available
    in plain C. This will be true throughout this chapter, unless explicitly stated.


    ## Simple Statements


    Programs in Objective-C are composed of syntactical elements that may be further
    categorized into functions, classes, and variable declarations. Functions contain
    statements, or variable declarations. Each statement in the language is ended
    by a semicolon or is enclosed in brackets (in the case of compound statements),
    which makes them easy to recognize by both human beings and compilers. Unlike
    languages that use indentation to define the possible end of declarations, Objective-C
    has an unambiguous way to mark their end using semicolons. For example, here are
    a few valid statements and variable declarations (their meaning will be explained
    in later sections):


    `int numberOfEmployees;`


    `double totalPayment;`


    `totalPayment = numberOfEmployees * 1000;`


    `NSLog(@"test log");`


    `if (1 > 2) totalPayment = totalPayment + 10;`


    Each of these lines is either defining an executable instruction or declaring
    an entity that will be later used by the program. We will examine in detail the
    syntax used in each of these cases, but for now it is important to recognize the
    nature of Objective-C statements and how they combine to create valid programs.


    ## Variables


    A variable is a location in memory where values can be saved and modified. Variables
    in Objective-C have to be of a particular type, which is explicitly defined when
    the variable is declared. Here are a few examples:


    `int anIntegerVariable;`


    `float aFloatingNumber;`


    Note that the variable type is the first element in the declaration. The name
    of the variable follows, ended by semicolon, which marks the end-of-statement
    character. These two variable declarations create an integer and a floating number
    variable. Integer variables are required to contain only whole numbers, and the
    compiler will check that this is always the case. Even when a programmer forces
    a value of a different type into an integer variable, the content will still be
    converted to an integer number in all expressions where they appear.


    More than one variable can be declared in a single statement. This is done by
    having additional variable names in the same statement, separated by commas. Here
    is another example showing multiple variables declared in the same expression:


    `int anIntegerVariable, aSecondIntegerVariable;`


    `bool booleanVariable1, booleanVariable2;`


    There are a few rules that need to be observed when naming variables. The first
    rule is that variables can start only with alphabetic characters or the underscore
    character. The same is valid for additional characters in a variable name; however,
    numeric characters are also allowed, starting from the second position. Here are
    a few valid variable declarations:


    `int var1;`


    `int _single_2_Position;`


    `int long_variable_name;`


    In Objective-C, the underscore character is frequently used as a separator for
    long variable names. The goal is to increase readability for these long names
    without resorting to a mix of uppercase and lowercase letters. Some programmers,
    however, see no problem in mixing cases in the same variable. The following example,
    thus, is also very common:


    `int longVariableName.`


    Note


    Variable naming is a style issue. Different programmers have different opinions
    on what looks better. However, we recommend that you be consistent in the use
    of variable naming styles. Don’t use variables with mixed case in one place and
    variables separated by underscores in another. The basic idea is to avoid confusion
    and reduce the number of decisions you need to take each time you introduce a
    new name in a program.


    Variable names, as well as all other identifiers in Objective-C, are case sensitive.
    This means that the following are two valid declarations for different variables:


    `int myVariable1;`


    `int myvariable1;`


    The fact that case is significant in variable names makes the use of a unified
    naming style even more important. It would be very unfortunate to have a program
    failing because of the indiscriminate use of two variables that differ just by
    a single misspelled character.


    Note


    In the C language, names starting with single or double underscores followed by
    a capital letter are reserved. Only the compiler can use them, for the purposes
    of language implementation. Avoid the use of such names, since they may conflict
    with internal names used in future versions of the language—even if they seem
    to work in your current compiler implementation.


    ### Variable Initialization


    A variable declaration can also be used to define the initial value of a variable.
    This is done using the assignment operator. Here is a simple example:


    `int daysInTheWeek = 7;`


    `int monthsInTheYear = 12;`


    `float PI = 3.14;`


    An initialization can also make use of arithmetic expressions or even function
    calls. Thus, it is possible to write code like this:


    `int secondsPerHour = 60 * 60;`


    Note


    Variables should always be initialized to suitable values, since lack of proper
    initialization is one of the most common sources of programming errors. Variable
    initialization is combined with definition in Objective-C exactly to reduce the
    occurrence of such mistakes.'
  trans: "\n# 第一部分  \n语言本身  \n\n# 1. Objective-C 中的 C 语言  \n\n## 摘要  \n\n本章将介绍 Objective-C\
    \ 与 C 语言共有的主要概念。Objective-C 基于最初的 C 语言。由于这种特殊关系，任何有效的 C 代码在 Objective-C 中同样有效。因此，熟悉\
    \ C 语言的基础知识，以及它们如何与面向对象编程的各个领域（如类、消息和接口）相关联，就显得至关重要。  \n\n数组、结构、指针、变量声明、变量类型和函数等主题，是这两种语言共享的通用词汇的一部分。熟练掌握这些基本\
    \ Objective-C 技术的程序员，在理解和运用面向对象概念时会更加得心应手。  \n\n为了让你快速掌握 Objective-C 的高级能力，我们将从概述继承自\
    \ C 语言的最常用特性开始本书。在接下来的章节中，你将看到如何使用这些基础技术创建简单的程序，这些程序将成为你未来 Objective-C 应用程序的构建模块。\
    \  \n\n> **注意**  \n> 在阅读接下来的几节内容时，请记住一个隐含的假设：这里讨论的每个 Objective-C 特性，在纯 C 语言中同样可用。除非另有明确说明，本章内容均遵循此规则。\
    \  \n\n## 简单语句  \n\nObjective-C 程序由语法元素组成，这些元素可进一步归类为函数、类和变量声明。函数包含语句或变量声明。语言中的每条语句都以分号结尾，或者用花括号括起来（在复合语句的情况下），这使得无论是人还是编译器都能轻松识别。与某些使用缩进来定义声明可能结束位置的语言不同，Objective-C\
    \ 使用分号以明确无误的方式标记其结束。例如，以下是一些有效的语句和变量声明（其含义将在后续章节解释）：  \n\n```\nint numberOfEmployees;\n\
    double totalPayment;\ntotalPayment = numberOfEmployees * 1000;\nNSLog(@\"test\
    \ log\");\nif (1 > 2) totalPayment = totalPayment + 10;\n```\n\n这些行中的每一行要么定义一条可执行指令，要么声明一个程序稍后将使用的实体。我们将详细检查每种情况下使用的语法，但目前重要的是认清\
    \ Objective-C 语句的本质，以及它们如何组合起来构成有效的程序。  \n\n## 变量  \n\n变量是内存中一个可以保存和修改值的位置。Objective-C\
    \ 中的变量必须属于特定的类型，该类型在变量声明时被明确定义。以下是一些例子：  \n\n```\nint anIntegerVariable;\nfloat\
    \ aFloatingNumber;\n```\n\n请注意，变量类型是声明中的第一个元素，后面跟着变量名，最后以分号结尾，分号表示语句结束字符。这两个变量声明创建了一个整型变量和一个浮点型变量。整型变量必须只包含整数，编译器会对此进行检查。即使程序员强行将其他类型的值赋给整型变量，在涉及该变量的所有表达式中，其内容仍会被转换为整数。\
    \  \n\n可以在一条语句中声明多个变量。这是通过在同一语句中添加额外的变量名来实现的，变量名之间用逗号分隔。以下是另一个在同一表达式中声明多个变量的例子：\
    \  \n\n```\nint anIntegerVariable, aSecondIntegerVariable;\nbool booleanVariable1,\
    \ booleanVariable2;\n```\n\n命名变量时需要遵守一些规则。第一条规则是，变量只能以字母字符或下划线字符开头。变量名中的其他字符同样适用此规则；但从第二个位置开始，也允许使用数字字符。以下是一些有效的变量声明：\
    \  \n\n```\nint var1;\nint _single_2_Position;\nint long_variable_name;\n```\n\
    \n在 Objective-C 中，下划线字符经常用作长变量名的分隔符。其目的是在不借助大小写字母混写的情况下，提高这些长名称的可读性。然而，一些程序员认为在同一个变量中混用大小写没有问题。因此，下面的例子也非常常见：\
    \  \n\n```\nint longVariableName;\n```\n\n> **注意**  \n> 变量命名是一种风格问题。不同的程序员对哪种形式更好看有不同看法。不过，我们建议你在使用变量命名风格时保持一致。不要在一个地方使用大小写混合的变量，而在另一个地方使用下划线分隔的变量。基本思想是避免混淆，并减少每次在程序中引入新名称时你需要做的决策数量。\
    \  \n\n变量名以及 Objective-C 中所有其他标识符都是区分大小写的。这意味着以下两个是对不同变量的有效声明：  \n\n```\nint myVariable1;\n\
    int myvariable1;\n```\n\n变量名区分大小写这一事实，使得使用统一的命名风格更加重要。如果因为不加区分地使用两个仅由一个拼写错误的字符区分的变量而导致程序失败，那将是非常不幸的。\
    \  \n\n> **注意**  \n> 在 C 语言中，以单个或双下划线开头后跟大写字母的名称是保留字。只有编译器才能使用它们，用于语言实现的目的。请避免使用此类名称，因为它们可能与未来语言版本中使用的内部名称冲突——即使它们在你当前的编译器实现中能够正常工作。\
    \  \n\n### 变量初始化  \n\n变量声明也可用于定义变量的初始值。这通过赋值操作符实现。以下是一个简单的例子：  \n\n```\nint daysInTheWeek\
    \ = 7;\nint monthsInTheYear = 12;\nfloat PI = 3.14;\n```\n\n初始化还可以使用算术表达式甚至函数调用。因此，可以编写如下代码：\
    \  \n\n```\nint secondsPerHour = 60 * 60;\n```\n\n> **注意**  \n> 变量应始终被初始化为合适的值，因为缺乏适当的初始化是编程错误最常见的来源之一。Objective-C\
    \ 将变量初始化与定义相结合，正是为了减少这类错误的发生。\n"
- fmt: '# Variable Types


    A variable needs to be declared of a particular type before it is used. There
    are several types that can be used in Objective-C. They can be generally classified
    as native or user-defined types.


    A native type is predefined by the language and compiler implementation. These
    types are available without the use of any libraries or header files, so they
    can be used in any function or class defined in Objective-C. User defined types,
    on the other hand, are specified by programmers. They can either be part of libraries
    or of user code. I will first consider the available native types; structures
    and classes will be discussed later.


    There are a small number of native types. Most of them are numeric, but they can
    also be used to store alphanumeric data as well as logical values. Finally, native
    types can also be used to store memory addresses, which are called pointers.


    Among the numeric types, the most common are integers and floating point numbers.
    For example, an integer value is denoted by the type `int`. Floating point numbers,
    a computational approximation for the real numbers used in mathematics, can be
    represented by native types such as `float` or `double`.


    ## Integer Types


    Integer types are used to store whole numbers and comprise the types `char`, `int`,
    `short`, `long`, and `long long`. The need for different numeric types arise from
    the different storage capacities that each one has, along with the memory necessary
    to represent such a number in memory. For example, integer numbers defined as
    `int` are commonly represented using 4 bytes in a 32-bit machine. This means that
    it is possible to store numbers up to about four billion. On the other hand, values
    of type `short` may be as small as 2 bytes, which would be enough to store numbers
    up to about two million. Here are some examples:


    ```

    char val0 = 12;

    ```


    ```

    int val1 = 123400;

    ```


    ```

    short val2 = 123;

    ```


    ```

    long val3 = 12345;

    ```


    ```

    long long val4 = 12345678;

    ```


    The size of `long` and `long long` variables depends on the compiler and machine
    used, but the values they can store are usually larger than what is allowed for
    an `int`.


    Types for integer values can also be declared as signed or unsigned. A signed
    number can be either positive or negative, since the sign is stored along with
    the number representation. Unsigned numbers cannot be negative, ranging from zero
    to the maximum allowed by the variable size.


    Unsigned numbers are useful when representing quantities that are known to be
    non-negative. For example, memory sizes are frequently represented by unsigned
    numbers. The common approach, however, is to use the more generic signed type—unless
    it is know with certainty that a number cannot be negative. By default, integer
    numbers declared as `int`, `short`, `long`, or `long long` are signed.


    # Floating Point Numbers


    A floating number is a computer representation of a real number. Since computers
    have limitations on the amount of stored data, real numbers cannot be stored exactly.
    For some numbers, such as 0.3 for example, only an approximation can be stored
    in a computer due to errors introduced by the use of a binary representation.
    For other real numbers, such as Pi, it is well known that there is no finite representation.


    Objective-C programs use a floating-point representation where the real number
    is stored in two parts: the mantissa and the exponent. You don’t need to know
    the intricacies of such a representation, but it is important to be aware of the
    difference between these numbers and integer numbers. It is also important to
    know that operations in floating point numbers may result in rounding errors that
    are difficult to understand and track down.


    Floating point numbers can be declared in two forms: they can be either `float`
    or `double` values (although a `double` can receive the `long` modifier). The
    difference between `float` and `double` is due to the amount of data used to store
    each type. The exact number of bytes is dependent on the machine used, but double
    numbers have double the precision and exponent as a float number. Here are some
    examples:


    ```

    int degrees = 360;

    ```


    ```

    float e = 2.7182;

    ```


    ```

    double elarge = 2.718281828459;

    ```


    # Characters


    A common native type that is supported by Objective-C is the character (`char`).
    Characters can store any of the standard ASCII values, which commonly range from
    0 to 255\. Although used to store elements of character strings, the character
    type is just one of the integer number types mentioned previously, and as such
    it behaves similarly to types such as `int` or `short`. A type `char` can also
    be declared as signed (when negative numbers are allowed) or unsigned (in case
    it is known that no negative number will be stored).


    ## Logical Values


    A variable can also store a single logical value, true or false. Although the
    C language doesn’t have a specialized Boolean value, in Objective-C you use the
    `BOOL` type to represent this kind of variable. A variable of type `BOOL` can
    store the values `YES` or `NO`, which can also be spelled as `TRUE` or `FALSE`.
    The language, however, allows the conversion of any integer type into a Boolean.
    In that case, the value zero is converted to `FALSE`, while anything different
    from zero is considered to be `TRUE`. This may be a source of mistakes for programmers
    that are not careful with the conversion rules between these types.


    ## Pointers


    Objective-C supports variables that store memory addresses, and this is one of
    the most flexible methods to refer to data stored by a program (the use of such
    variables will be covered later in this chapter). Pointers are declared using
    the star notation, and here is an example of declaring pointers to common types:


    ```

    int *pointer_to_int;

    ```


    ```

    double *double_pointer;

    ```


    The first example is a variable that can store the address of an integer. The
    second is a pointer that can be used to store the address where a value of type
    `double` is contained. The pointer notation is frequently used when creating objects
    in Objective-C, as you will see in the next chapter.


    ## The void Type


    The keyword `void` is a special type name used in Objective-C. Unlike the other
    type names, `void` doesn’t represent a real data type, but instead signifies the
    absence of data, or the fact that the type is unknown. The type `void` can appear
    only in a few situations. One case happens when a function has no return value.
    This is indicated by the use of the `void` keyword in place of the return type.


    Another situation in which `void` is employed is to mark pointers to unknown data
    types. When a type is unknown and `void` is used instead, the resulting pointer
    will have no information about the actual data type stored in that memory location.
    Such a variable can be used in Objective-C as a generic pointer, which can be
    applied to any data type. You will see examples of this use when learning about
    pointers in a later section.


    **Note**


    Since `void` is just a special keyword, it is not possible to declare a variable
    of void type. For example, trying to declare a variable like `void var;` will
    result in a compilation error, since the compiler won’t be able to deduce the
    real type of the variable.'
