- fmt: "# Comments\n\nSoftware used in a large-scale project is not always easy to\
    \ understand. Although every effort should be made to make code easier to comprehend,\
    \ complicated algorithms and other assumptions may hinder the understanding of\
    \ a particular area of the program. That is why there is always the need for adding\
    \ documentation to the program itself.\n\nObjective-C uses two different styles\
    \ of code comments. The first style, and the simplest one to use, employs the\
    \ sequence `//` as the beginning of a new comment. Any comment started this way\
    \ will be in force until the end of the line.\n\n```\nint integerVariable; //\
    \ this variable holds an integer\nfloat floatVariable; // a floating number variable\n\
    ```\n\nA second comment style is used for comments that span multiple lines. In\
    \ that case, the comment is started with the characters `/*`. All text from that\
    \ position on is considered to be part of the comment, until the pair of characters\
    \ `*/` are reached.\n\n```\n/* this is an example of multiple line comments. The\n\
    following expressions are used to define variables of\nthe type integer and floating\
    \ point, respectively */\nint integerVariable;\nfloat floatVariable;\n```\n\n\
    Multi-line comments cannot be embedded. That is, if you already have a comment,\
    \ you can’t just use a second pair of comment characters around them. That will\
    \ not work because the first time the characters `*/` are seen, they will close\
    \ any multi-line comment started previously, not just the latest.\n\n```\n/* a\
    \ new comment\n  /* original comment, not embedded */\nthis is not a comment,\
    \ since the first multi line comment\nwas already closed. */\n```\n\n**Note**\n\
    \nOne of the reasons why some programmers avoid the use of multi-line comments\
    \ is that they can lead to confusion, as noted above. To avoid this, use only\
    \ single-line comments, and reserve multi-line comments for specific situations,\
    \ such as the general comment at the top of an Objective-C file.\n\n# Arithmetic\
    \ Expressions\n\nOne of the simplest ways to use variables is as part of arithmetic\
    \ expressions. These are used to calculate numeric quantities, using one of the\
    \ common operators such as addition, subtraction, multiplication, and division.\n\
    \nObjective-C has a rich set of operators that can be used in numeric expressions.\
    \ The most evident way to use such operators is to express the four common arithmetic\
    \ operations. A not-so-obvious operator, however, is the remainder operator. It\
    \ returns the integer remainder of the division of the first number by the second.\n\
    \n```\nint remainder = 10 % 4;\n```\n\nThe result of this operation should be\
    \ equal to two. A common use for this kind of expression is to decide if a number\
    \ is even.\n\n```\nif (number % 2 == 0)\n{\n        /* this is an even number\
    \ */\n}\n```\n\nExpressions can be combined using parenthesis, so that programmers\
    \ can control the order in which the operations will be grouped by the compiler.\n\
    \n```\nint value = 25;\nint result = (10 + value) * (2 / value);\n```\n\n# Function\
    \ Fundamentals\n\nObjective-C programs are composed of a mix of functions, declarations,\
    \ and classes. Functions are the basic concept used by C programs, while classes\
    \ are the basic extension mechanism provided by Objective-C. Accordingly, in this\
    \ section we will only discuss functions; we’ll introduce classes in the next\
    \ chapter.\n\nEvery program starts in a function called `main`. The `main` function\
    \ is not called from any part of the program, but instead it is called by the\
    \ programming environment whenever the application is started. The program ends\
    \ exactly when the `main` function returns. Here is a simple example of a `main`\
    \ function:\n\n```\nint main()\n{\n   NSLog(@\"hello to objective-C\");\n   return\
    \ 0;\n}\n```\n\nThe purpose of this program is to write a single logging string.\
    \ The program achieves this using the `NSLog` function, which is part of the Foundation\
    \ framework provided by Objective-C, and therefore is not available in standard\
    \ C programs. The argument to `NSLog` is a string literal that starts with the\
    \ `@` character; such string literals are also exclusive to Objective-C. Everything\
    \ else in the program is there just to comply with the requirements of the language.\n\
    \nThe name of the function is `main`, and the pair of parenthesis after the name\
    \ of the function is used to determine any parameters that are required as arguments.\
    \ In this particular case, the `main` function has been defined with an empty\
    \ set of parameters, meaning that there are no arguments. Some applications, however,\
    \ expect to receive arguments, which can be provided from the command line. If\
    \ that is the case, the `main` function can also be declared in a slightly different\
    \ way.\n\n```\nint main(int argc, char *argv[])\n{\n   NSLog(@\"hello from objective-C\"\
    );\n   return 0;\n}\n```\n\nIn this example, the program is receiving two parameters:\
    \ the first is an integer value `argc`, also known as the argument counter, which\
    \ specifies the number of arguments passed to the program. The second parameter,\
    \ `argv`, is an array of pointers to characters, which can be used to store each\
    \ of the arguments passed to the application. In future examples, you will learn\
    \ how to use these arguments in your programs.\n\n## Defining New Functions\n\n\
    A function is a simple way to package a set of instructions so that programmers\
    \ don’t need to repeat themselves. For example, here is a simple function to calculate\
    \ the average of two numbers:\n\n```\nfloat avg(float a, float b)\n{\n   return\
    \ (a+b)/2;\n}\n```\n\nThere are several advantages in using functions whenever\
    \ possible.\n\n* **Simplifying a program**: Whenever a common operation needs\
    \ to be performed repeatedly, you can instead create a function that encapsulates\
    \ the operation. In the example above, by calling the function `avg` you don’t\
    \ need to repeat in other parts of your code the addition and division operations\
    \ used to calculate the average. This may seem unnecessary here because the function\
    \ is so simple. However, when an algorithm is more complex, it becomes even more\
    \ important to streamline its use. For example, you could have a routine for mathematical\
    \ integration as part of a large-scale engineering package. Or you could have\
    \ a window-drawing routine in a graphical application. In each case, using functions\
    \ will result in a simplification of the resulting program.\n* **Improving maintenance**:\
    \ Things change, and programmers have to adapt to change on a daily basis. If\
    \ the client decides to modify the way a calculation is made and you are not using\
    \ a function, then the required changes have to be propagated to all places where\
    \ the calculation is currently done. On the other hand, if you were clever enough\
    \ to use a function instead, there’s only one place where the change needs to\
    \ be applied. Every place in the code where the function is called will use the\
    \ updated version automatically. Such use of functions can reduce the maintenance\
    \ burden. In some cases, modifications can be avoided in hundreds or thousands\
    \ of lines of code—and remain contained to just a single place.\n* **Improving\
    \ documentation**: Creating a function is also a way to document a procedure.\
    \ Whenever you create a function, you need to give it a name that describes what\
    \ it does. If this is done well, callers will have at least a high-level idea\
    \ of what the function does. This technique can be seen as a simple but effective\
    \ form of self-documentation. Such a practice, when use regularly by everyone\
    \ in a programming project, can result in code that is much more maintainable\
    \ and future-proof.\n\nBecause of all these advantages, functions are widely used\
    \ in Objective-C, and are in fact the basic principle of code organization in\
    \ the C language as well. You will see in the next chapter that classes can be\
    \ seen as a generalization of functions, so that you can achieve even more by\
    \ using these principles."
  raw: '## Comments


    Software used in a large-scale project is not always easy to understand. Although
    every effort should be made to make code easier to comprehend, complicated algorithms
    and other assumptions may hinder the understanding of a particular area of the
    program. That is why there is always the need for adding documentation to the
    program itself.


    Objective-C uses two different styles of code comments. The first style, and the
    simplest one to use, employs the sequence `//` as the beginning of a new comment.
    Any comment started this way will be in force until the end of the line.


    `int integerVariable; // this variable holds an integer`


    `float floatVariable; // a floating number variable`


    A second comment style is used for comments that span multiple lines. In that
    case, the comment is started with the characters `/*`. All text from that position
    on is considered to be part of the comment, until the pair of characters `*/`
    are reached.


    `/* this is an example of multiple line comments. The`


    `following expressions are used to define variables of`


    `the type integer and floating point, respectively */`


    `int integerVariable;`


    `float floatVariable;`


    Multi-line comments cannot be embedded. That is, if you already have a comment,
    you can’t just use a second pair of comment characters around them. That will
    not work because the first time the characters `*/` are seen, they will close
    any multi-line comment started previously, not just the latest.


    `/* a new comment`


      `/* original comment, not embedded */`


    `this is not a comment, since the first multi line comment`


    `was already closed. */`


    Note


    One of the reasons why some programmers avoid the use of multi-line comments is
    that they can lead to confusion, as noted above. To avoid this, use only single-line
    comments, and reserve multi-line comments for specific situations, such as the
    general comment at the top of an Objective-C file.


    ## Arithmetic Expressions


    One of the simplest ways to use variables is as part of arithmetic expressions.
    These are used to calculate numeric quantities, using one of the common operators
    such as addition, subtraction, multiplication, and division.


    Objective-C has a rich set of operators that can be used in numeric expressions.
    The most evident way to use such operators is to express the four common arithmetic
    operations. A not-so-obvious operator, however, is the remainder operator. It
    returns the integer remainder of the division of the first number by the second.


    `int remainder = 10 % 4;`


    The result of this operation should be equal to two. A common use for this kind
    of expression is to decide if a number is even.


    `if (number % 2 == 0)`


    `{`


            `/* this is an even number */`


    `}`


    Expressions can be combined using parenthesis, so that programmers can control
    the order in which the operations will be grouped by the compiler.


    `int value = 25;`


    `int result = (10 + value) * (2 / value);`


    ## Function Fundamentals


    Objective-C programs are composed of a mix of functions, declarations, and classes.
    Functions are the basic concept used by C programs, while classes are the basic
    extension mechanism provided by Objective-C. Accordingly, in this section we will
    only discuss functions; we’ll introduce classes in the next chapter.


    Every program starts in a function called `main`. The `main` function is not called
    from any part of the program, but instead it is called by the programming environment
    whenever the application is started. The program ends exactly when the main function
    returns. Here is a simple example of a main function:


    `int main()`


    `{`


       `NSLog(@"hello to objective-C");`


       `return 0;`


    `}`


    The purpose of this program is to write a single logging string. The program achieves
    this using the `NSLog` function, which is part of the Foundation framework provided
    by Objective-C, and therefore is not available in standard C programs. The argument
    to `NSLog` is a string literal that starts with the `@` character; such string
    literals are also exclusive to Objective-C. Everything else in the program is
    there just to comply with the requirements of the language.


    The name of the function is `main`, and the pair of parenthesis after the name
    of the function is used to determine any parameters that are required as arguments.
    In this particular case, the `main` function has been defined with an empty set
    of parameters, meaning that there are no arguments. Some applications, however,
    expect to receive arguments, which can be provided from the command line. If that
    is the case, the `main` function can also be declared in a slightly different
    way.


    `int main(int argc, char *argv[])`


    `{`


       `NSLog(@"hello from objective-C");`


       `return 0;`


    `}`


    In this example, the program is receiving two parameters: the first is an integer
    value `argc`, also known as the argument counter, which specifies the number of
    arguments passed to the program. The second parameter, `argv`, is an array of
    pointers to characters, which can be used to store each of the arguments passed
    to the application. In future examples, you will learn how to use these arguments
    in your programs.


    ### Defining New Functions


    A function is a simple way to package a set of instructions so that programmers
    don’t need to repeat themselves. For example, here is a simple function to calculate
    the average of two numbers:


    `float avg(float a, float b)`


    `{`


       `return (a+b)/2;`


    `}`


    There are several advantages in using functions whenever possible.


    *   Simplifying a program: Whenever a common operation needs to be performed repeatedly,
    you can instead create a function that encapsulates the operation. In the example
    above, by calling the function `avg` you don’t need to repeat in other parts of
    your code the addition and division operations used to calculate the average.
    This may seem unnecessary here because the function is so simple. However, when
    an algorithm is more complex, it becomes even more important to streamline its
    use. For example, you could have a routine for mathematical integration as part
    of a large-scale engineering package. Or you could have a window-drawing routine
    in a graphical application. In each case, using functions will result in a simplification
    of the resulting program.

    *   Improving maintenance: Things change, and programmers have to adapt to change
    on a daily basis. If the client decides to modify the way a calculation is made
    and you are not using a function, then the required changes have to be propagated
    to all places where the calculation is currently done. On the other hand, if you
    were clever enough to use a function instead, there’s only one place where the
    change needs to be applied. Every place in the code where the function is called
    will use the updated version automatically. Such use of functions can reduce the
    maintenance burden. In some cases, modifications can be avoided in hundreds or
    thousands of lines of code—and remain contained to just a single place.

    *   Improving documentation: Creating a function is also a way to document a procedure.
    Whenever you create a function, you need to give it a name that describes what
    it does. If this is done well, callers will have at least a high-level idea of
    what the function does. This technique can be seen as a simple but effective form
    of self-documentation. Such a practice, when use regularly by everyone in a programming
    project, can result in code that is much more maintainable and future-proof.


    Because of all these advantages, functions are widely used in Objective-C, and
    are in fact the basic principle of code organization in the C language as well.
    You will see in the next chapter that classes can be seen as a generalization
    of functions, so that you can achieve even more by using these principles.'
  trans: "\n# 注释\n\n大规模项目中使用的软件并不总是易于理解的。尽管应尽一切努力使代码更易于理解，但复杂的算法和其他假设可能会妨碍对程序中特定区域的理解。这就是为什么始终需要在程序本身中添加文档的原因。\n\
    \nObjective-C 使用两种不同风格的代码注释。第一种风格，也是最简单的用法，采用序列 `//` 作为新注释的开始。以这种方式开始的任何注释将一直有效，直到行尾。\n\
    \n```\nint integerVariable; // 该变量保存一个整数\nfloat floatVariable; // 一个浮点数变量\n```\n\
    \n第二种注释风格用于跨越多行的注释。在这种情况下，注释以字符 `/*` 开始。从该位置起的所有文本都被视为注释的一部分，直到遇到字符对 `*/` 为止。\n\
    \n```\n/* 这是一个多行注释的示例。以下\n表达式分别用于定义整数和浮点\n类型的变量 */\nint integerVariable;\nfloat\
    \ floatVariable;\n```\n\n多行注释不能嵌套。也就是说，如果你已经有了一条注释，就不能在其周围再使用第二对注释字符。这样做是行不通的，因为第一次看到字符\
    \ `*/` 时，它们会关闭之前开始的任何多行注释，而不仅仅是最近的那一条。\n\n```\n/* 一条新注释\n  /* 原始注释，未被嵌套 */\n这不是注释，因为第一条多行注释\n\
    已经被关闭了。 */\n```\n\n**注意**\n\n如上所述，一些程序员避免使用多行注释的原因之一是它们可能导致混淆。为避免这种情况，请仅使用单行注释，并将多行注释保留用于特定情况，例如\
    \ Objective-C 文件顶部的通用注释。\n\n# 算术表达式\n\n使用变量的最简单方法之一是将其作为算术表达式的一部分。这些表达式用于使用常见的运算符（如加法、减法、乘法和除法）计算数值量。\n\
    \nObjective-C 拥有丰富的运算符集，可用于数值表达式。使用这些运算符最直观的方式是表示四种常见的算术运算。然而，一个不太明显的运算符是取余运算符。它返回第一个数除以第二个数的整数余数。\n\
    \n```\nint remainder = 10 % 4;\n```\n\n此操作的结果应等于二。这种表达式的一个常见用途是判断一个数字是否为偶数。\n\n\
    ```\nif (number % 2 == 0)\n{\n        /* 这是一个偶数 */\n}\n```\n\n表达式可以使用括号进行组合，以便程序员控制编译器分组运算的顺序。\n\
    \n```\nint value = 25;\nint result = (10 + value) * (2 / value);\n```\n\n# 函数基础\n\
    \nObjective-C 程序由函数、声明和类的混合体组成。函数是 C 程序使用的基本概念，而类是 Objective-C 提供的基本扩展机制。因此，在本节中我们将只讨论函数；我们将在下一章介绍类。\n\
    \n每个程序都从一个名为 `main` 的函数开始。`main` 函数并非从程序的任何部分调用，而是在应用程序启动时由编程环境调用。程序在 `main` 函数返回时精确结束。以下是一个简单的\
    \ `main` 函数示例：\n\n```\nint main()\n{\n   NSLog(@\"hello to objective-C\");\n \
    \  return 0;\n}\n```\n\n该程序的目的是写入一条日志字符串。程序通过使用 `NSLog` 函数实现这一点，该函数是 Objective-C\
    \ 提供的 Foundation 框架的一部分，因此在标准 C 程序中不可用。`NSLog` 的参数是一个以 `@` 字符开头的字符串字面量；此类字符串字面量也是\
    \ Objective-C 独有的。程序中的其他所有内容都只是为了符合语言的要求。\n\n函数名为 `main`，函数名后的括号对用于确定所需的任何参数。在这种特定情况下，`main`\
    \ 函数被定义为一组空参数，这意味着没有参数。然而，某些应用程序期望接收参数，这些参数可以从命令行提供。如果是这种情况，`main` 函数也可以以稍微不同的方式声明。\n\
    \n```\nint main(int argc, char *argv[])\n{\n   NSLog(@\"hello from objective-C\"\
    );\n   return 0;\n}\n```\n\n在这个示例中，程序接收两个参数：第一个是整数值 `argc`，也称为参数计数器，它指定了传递给程序的参数数量。第二个参数\
    \ `argv` 是一个指向字符的指针数组，可用于存储传递给应用程序的每个参数。在后续示例中，你将学习如何在程序中使用这些参数。\n\n## 定义新函数\n\
    \n函数是将一组指令打包的简单方法，这样程序员就不必重复自己。例如，这是一个计算两个数平均值的简单函数：\n\n```\nfloat avg(float a,\
    \ float b)\n{\n   return (a+b)/2;\n}\n```\n\n尽可能使用函数有以下几个优点。\n\n*   **简化程序**：每当需要重复执行一个常用操作时，你可以创建一个封装该操作的函数。在上面的例子中，通过调用函数\
    \ `avg`，你无需在代码的其他部分重复用于计算平均值的加法和除法运算。这在这里可能看起来没有必要，因为函数非常简单。然而，当算法更复杂时，简化其使用就变得更为重要。例如，你可以在大型工程包中拥有一个用于数学积分的例程。或者你可以在图形应用程序中拥有一个窗口绘制例程。在每种情况下，使用函数都会简化最终的程序。\n\
    *   **改善维护**：事情在变化，程序员必须每天适应变化。如果客户决定修改某个计算的方式，而你没有使用函数，那么所需的更改就必须传播到当前进行该计算的所有地方。另一方面，如果你足够聪明地使用了函数，那么只需要在一个地方应用更改。代码中调用该函数的每个地方都会自动使用更新后的版本。这样使用函数可以减轻维护负担。在某些情况下，可以避免修改成百上千行代码——并且将修改限制在仅仅一个地方。\n\
    *   **改善文档**：创建函数也是一种记录过程的方式。每当你创建一个函数时，都需要给它一个名字来描述它做什么。如果做得好，调用者至少会对该函数的功能有一个高层次的了解。这种技术可以被看作是一种简单但有效的自我文档形式。当编程项目中的每个人都定期采用这种做法时，可以生成更易于维护且更具前瞻性的代码。\n\
    \n由于这些优点，函数在 Objective-C 中被广泛使用，并且实际上也是 C 语言中代码组织的基本原则。你将在下一章中看到，类可以被视为函数的泛化，这样你就能通过使用这些原则实现更多。\n"
- fmt: "### Function Syntax\n\nThe syntax of a function is determined by its input\
    \ arguments and result type, along with the braces and the set of statements contained\
    \ within them. The argument list is the set of parameters displayed inside parenthesis,\
    \ after the name of the function. Even if no argument is needed by a function,\
    \ it will have a pair of empty parenthesis after its name. The name of the function\
    \ is preceded by the type of values that are returned as result. For example,\n\
    \n```\nint add_values(int a, int b)\n{\n   return a + b;\n}\n```\n\nwill always\
    \ return an integer value that depends on the two arguments `a` and `b`.\n\nThe\
    \ following examples in this chapter will use the syntax for functions, so that\
    \ you can have an idea of how functions may be used in programming projects.\n\
    \n## Conditional Operations\n\nA conditional operation is used to codify logical\
    \ statements. In a programming language like Objective-C, any expression that\
    \ produces a non-zero value is considered to be true, while zero (or `NULL`) values\
    \ are considered to be false. Logical operations are used to manipulate such true\
    \ or false expressions, and form the basis for conditional execution using the\
    \ `if` statement, for example. Consider the following code fragment:\n\n```\n\
    void test_function(int x)\n{\n   if (x > 10)\n      NSLog(@\"Number is greater\
    \ than 10\");\n}\n```\n\nThis function illustrates the use of the expression (`x\
    \ > 10`) as part of an `if` statement. Logical expressions can use one of the\
    \ operators: `>`, `<`, `>=`, `<=`, `==`, `&&`, `||`, or `!`. The first five operators\
    \ provide a way to express the logical relations of greater, less, greater than,\
    \ less than, or equal to. They can be applied to numbers or characters, as well\
    \ as to Boolean values.\n\nThese five operators can be used in expressions that\
    \ compare integers, characters, Booleans, or floating-point numbers. The result\
    \ of such expressions will be a logical value such as `YES` or `NO`.\n\nYou can\
    \ also combine such Boolean values using the logical operators `&&`, `||`, and\
    \ `!`. The first combines two logical values, resulting in `YES` if both are true.\
    \ The second operates on two logical values, resulting in `YES` if at least one\
    \ of them is true. Finally, the third operator performs logical negation. It results\
    \ in `YES` when the value is false and `NO` when the value is true. These operators\
    \ can also be applied to numeric or pointer values. When this happens, a number\
    \ or pointer is considered to be false if it corresponds to zero or `NULL`. The\
    \ value is otherwise considered to be true.\n\nComplex logical expressions can\
    \ also be grouped using parenthesis so that they are easier to understand. Here\
    \ is an example of using these logical operators:\n\n```\nvoid logical_func(int\
    \ x, int y)\n{\n   if ((x > 2 && x <= 10) ||\n       (y > 15 && y <= 20)\n   \
    \   )\n      NSLog(@\"the numbers are acceptable\");\n}\n```\n\nIn this code,\
    \ the variable `x` is compared to `2` and `10`, so that the value of `x` is in\
    \ the interval between `3` and `10`. The variable `y` is also compared to `15`\
    \ and `20`, so that the only acceptable numbers are between `16` and `20`. If\
    \ `x` or `y` satisfy these requirements, the function will print a message saying\
    \ so.\n\n### The `if` statement\n\nAn `if` statement, as seen in the example above,\
    \ can be used to perform an action based on a logical expression. The simplest\
    \ case of the `if` statement is similar to the following:\n\n```\nif (<logical\
    \ expression>)\n  <statement>;\n```\n\nThis variety of the `if` statement is useful\
    \ but cannot be used when there is more than one statement that needs to be executed.\
    \ If that is the case, you should instead group the expressions into a single\
    \ block (also known as a compound statement). A block is a common way to group\
    \ expressions in Objective-C, and is similar to the grouping defined by a function.\
    \ Here is an example:\n\n```\nvoid logical_func2(int x, int y)\n{\n   if ((x >\
    \ 2 && x <= 10) ||\n       (y > 15 && y <= 20)\n      )\n   {\n      NSLog(@\"\
    the numbers are acceptable\");\n      NSLog(@\"the total value is %d\", x + y);\n\
    \   }\n}\n```\n\nThis code performs two actions whenever the logical expression\
    \ is true: you print a log string and display the value of `x + y`. For this to\
    \ work, you need a block of expressions, defined between curly braces, as seen\
    \ above.\n\nThere is a third version of the `if` statement that is even more useful.\
    \ Suppose that you have some action that needs to be done when the logical expression\
    \ is true, and another when the expression is false. This can be done by adding\
    \ an `else` case to the `if` statement. The `else` case can be either a single\
    \ statement as well as a block. Here is another example:\n\n```\nvoid logical_func3(int\
    \ x, int y)\n{\n   if ((x > 2 && x <= 10) ||\n       (y > 15 && y <= 20))\n  \
    \ {\n      NSLog(@\"the numbers are acceptable\");\n      NSLog(@\"the total value\
    \ is %d\", x + y);\n   }\n   else\n   {\n      NSLog(@\"the numbers are not acceptable\"\
    );\n   }\n}\n```\n\n## Loops\n\nProgramming may be described as the art of defining\
    \ repetitive tasks. But without a method for controlled repetition, it is very\
    \ difficult to perform a programming task. That’s why every language provides\
    \ a set of statements that allow for the repetition of expressions. A loop is\
    \ the common name given to statements that are used primarily to repeat a set\
    \ of instructions, and where the repetition depends on the result of a logical\
    \ condition.\n\nThe loop expressions available in Objective-C are the `for`, `while`,\
    \ and `do while` loops. Each of these loop forms provide the syntax needed to\
    \ performed controlled repetitions. You will see how each of them works in the\
    \ next sections.\n\n### The `while` Loop\n\nThe `while` loop is the simplest of\
    \ the three loop forms. The basic format of the `while` loop is\n\n```\nwhile\
    \ (<logical expression>)\n   <statement>\n```\n\nwhere `<statement>` can either\
    \ be a single or a compound statement. For example,\n\n```\nvoid printNums(int\
    \ min, int max)\n{\n   while (min < max)\n   {\n      NSLog(@\"Value %d\", min);\n\
    \      min = min + 1;\n   }\n}\n```\n\nThe `while` loop is executed by evaluating\
    \ the given logical expression and entering the loop only if the result is true.\
    \ All the expressions in the block defined inside curly braces are executed. Then\
    \ the logical expression is evaluated again, and the process repeats. When the\
    \ logical expression is false, the whole block is skipped and the program continues\
    \ execution in the first line after the block.\n\nJust like the `if` statement,\
    \ the `while` statement also allows a single expression instead of a block. Thus,\
    \ one can write the following code:\n\n```\nbool isOdd(int num)\n{\n   while (num\
    \ > 0)\n      num = num - 2;\n   return num == -1;\n}\n```"
  raw: '### Function Syntax


    The syntax of a function is determined by its input arguments and result type,
    along with the braces and the set of statements contained within them. The argument
    list is the set of parameters displayed inside parenthesis, after the name of
    the function. Even if no argument is needed by a function, it will have a pair
    of empty parenthesis after its name. The name of the function is preceded by the
    type of values that are returned as result. For example,


    `int add_values(int a, int b)`


    `{`


       `return a + b;`


    `}`


    will always return an integer value that depends on the two arguments `a` and
    `b`.


    The following examples in this chapter will use the syntax for functions, so that
    you can have an idea of how functions may be used in programming projects.


    ## Conditional Operations


    A conditional operation is used to codify logical statements. In a programming
    language like Objective-C, any expression that produces a non-zero value is considered
    to be true, while zero (or `NULL`) values are considered to be false. Logical
    operations are used to manipulate such true or false expressions, and form the
    basis for conditional execution using the `if` statement, for example. Consider
    the following code fragment:


    `void test_function(int x)`


    `{`


       `if (x > 10)`


          `NSLog(@"Number is greater than 10");`


    `}`


    This function illustrates the use of the expression (`x > 10`) as part of an `if`
    statement. Logical expressions can use one of the operators: `>`, `<`, `>=`, `<=`,
    `==`, `&&`, `||`, or `!`. The first five operators provide a way to express the
    logical relations of greater, less, greater than, less than, or equal to. They
    can be applied to numbers or characters, as well as to Boolean values.


    These five operators can be used in expressions that compare integers, characters,
    Booleans, or floating-point numbers. The result of such expressions will be a
    logical value such as `YES` or `NO`.


    You can also combine such Boolean values using the logical operators `&&`, `||`,
    and `!`. The first combines two logical values, resulting in `YES` if both are
    true. The second operates on two logical values, resulting in `YES` if at least
    one of them is true. Finally, the third operator performs logical negation. It
    results in `YES` when the value is false and `NO` when the value is true. These
    operators can also be applied to numeric or pointer values. When this happens,
    a number or pointer is considered to be false if it corresponds to zero or `NULL`.
    The value is otherwise considered to be true.


    Complex logical expressions can also be grouped using parenthesis so that they
    are easier to understand. Here is an example of using these logical operators:


    `void logical_func(int x, int y)`


    `{`


       `if ((x > 2 && x <= 10) ||`


           `(y > 15 && y <= 20)`


          `)`


          `NSLog(@"the numbers are acceptable");`


    `}`


    In this code, the variable `x` is compared to `2` and `10`, so that the value
    of `x` is in the interval between `3` and `10`. The variable `y` is also compared
    to `15` and `20`, so that the only acceptable numbers are between `16` and `20`.
    If `x` or `y` satisfy these requirements, the function will print a message saying
    so.


    ### The if statement


    An `if` statement, as seen in the example above, can be used to perform an action
    based on a logical expression. The simplest case of the `if` statement is similar
    to the following:


    `if (<logical expression>)`


      `<statement>;`


    This variety of the `if` statement is useful but cannot be used when there is
    more than one statement that needs to be executed. If that is the case, you should
    instead group the expressions into a single block (also known as a compound statement).
    A block is a common way to group expressions in Objective-C, and is similar to
    the grouping defined by a function. Here is an example:


    `void logical_func2(int x, int y)`


    `{`


       `if ((x > 2 && x <= 10) ||`


           `(y > 15 && y <= 20)`


          `)`


       `{`


          `NSLog(@"the numbers are acceptable");`


          `NSLog(@"the total value is %d", x + y);`


       `}`


    `}`


    This code performs two actions whenever the logical expression is true: you print
    a log string and display the value of x + y. For this to work, you need a block
    of expressions, defined between curly braces, as seen above.


    There is a third version of the `if` statement that is even more useful. Suppose
    that you have some action that needs to be done when the logical expression is
    true, and another when the expression is false. This can be done by adding an
    else case to the `if` statement. The else case can be either a single statement
    as well as a block. Here is another example:


    `void logical_func3(int x, int y)`


    `{`


       `if ((x > 2 && x <= 10) ||`


           `(y > 15 && y <= 20))`


       `{`


          `NSLog(@"the numbers are acceptable");`


          `NSLog(@"the total value is %d", x + y);`


       `}`


       `else`


       `{`


          `NSLog(@"the numbers are not acceptable");`


       `}`


    `}`


    ## Loops


    Programming may be described as the art of defining repetitive tasks. But without
    a method for controlled repetition, it is very difficult to perform a programming
    task. That’s why every language provides a set of statements that allow for the
    repetition of expressions. A loop is the common name given to statements that
    are used primarily to repeat a set of instructions, and where the repetition depends
    on the result of a logical condition.


    The loop expressions available in Objective-C are the `for`, `while`, and `do
    while` loops. Each of these loop forms provide the syntax needed to performed
    controlled repetitions. You will see how each of them works in the next sections.


    ### The while Loop


    The `while` loop is the simplest of the three loop forms. The basic format of
    the `while` loop is


    `while (<logical expression>)`


       `<statement>`


    where `<statement>` can either be a single or a compound statement. For example,


    `void printNums(int min, int max)`


    `{`


       `while (min < max)`


       `{`


          `NSLog(@"Value %d", min);`


          `min = min + 1;`


       `}`


    `}`


    The `while` loop is executed by evaluating the given logical expression and entering
    the loop only if the result is true. All the expressions in the block defined
    inside curly braces are executed. Then the logical expression is evaluated again,
    and the process repeats. When the logical expression is false, the whole block
    is skipped and the program continues execution in the first line after the block.


    Just like the `if` statement, the `while` statement also allows a single expression
    instead of a block. Thus, one can write the following code:


    `bool isOdd(int num)`


    `{`


       `while (num > 0)`


          `num = num - 2;`


       `return num == -1;`


    `}`'
  trans: "\n### 函数语法\n\n函数的语法由其输入参数和返回类型，以及花括号及其包含的一组语句决定。参数列表是函数名后括号内显示的一组参数。即使函数不需要任何参数，其函数名后也会有一对空括号。函数名前缀有作为结果返回的值的类型。例如，\n\
    \n```\nint add_values(int a, int b)\n{\n   return a + b;\n}\n```\n\n将始终返回一个整数值，该值取决于两个参数\
    \ `a` 和 `b`。\n\n本章接下来的示例将使用函数的语法，以便你了解函数如何在编程项目中使用。\n\n## 条件运算\n\n条件运算用于编码逻辑语句。在像\
    \ Objective-C 这样的编程语言中，任何产生非零值的表达式都被视为真，而零（或 `NULL`）值则被视为假。逻辑运算用于操作此类真或假的表达式，并构成了使用\
    \ `if` 语句进行条件执行的基础。例如，考虑以下代码片段：\n\n```\nvoid test_function(int x)\n{\n   if (x\
    \ > 10)\n      NSLog(@\"Number is greater than 10\");\n}\n```\n\n此函数演示了将表达式 (`x\
    \ > 10`) 作为 `if` 语句的一部分来使用。逻辑表达式可以使用以下运算符之一：`>`、`<`、`>=`、`<=`、`==`、`&&`、`||` 或\
    \ `!`。前五个运算符提供了一种表达大于、小于、大于等于、小于等于或等于的逻辑关系的方式。它们可以应用于数字或字符，以及布尔值。\n\n这五个运算符可用于比较整数、字符、布尔值或浮点数的表达式中。此类表达式的结果将是一个逻辑值，例如\
    \ `YES` 或 `NO`。\n\n你还可以使用逻辑运算符 `&&`、`||` 和 `!` 来组合这些布尔值。第一个运算符组合两个逻辑值，如果两者都为真，则结果为\
    \ `YES`。第二个运算符作用于两个逻辑值，如果其中至少一个为真，则结果为 `YES`。最后，第三个运算符执行逻辑非运算。当值为假时结果为 `YES`，当值为真时结果为\
    \ `NO`。这些运算符也可以应用于数值或指针值。当这种情况发生时，如果数字或指针对应于零或 `NULL`，则被视为假；否则，该值被视为真。\n\n复杂的逻辑表达式还可以使用括号分组，以便更容易理解。以下是使用这些逻辑运算符的一个示例：\n\
    \n```\nvoid logical_func(int x, int y)\n{\n   if ((x > 2 && x <= 10) ||\n    \
    \   (y > 15 && y <= 20)\n      )\n      NSLog(@\"the numbers are acceptable\"\
    );\n}\n```\n\n在这段代码中，变量 `x` 与 `2` 和 `10` 进行比较，使得 `x` 的值位于 `3` 到 `10` 之间。变量 `y`\
    \ 也与 `15` 和 `20` 进行比较，因此可接受的数字仅在 `16` 到 `20` 之间。如果 `x` 或 `y` 满足这些要求，该函数将打印一条消息说明情况。\n\
    \n### `if` 语句\n\n`if` 语句，如上例所示，可用于基于逻辑表达式执行操作。`if` 语句的最简单形式类似于以下内容：\n\n```\nif\
    \ (<logical expression>)\n  <statement>;\n```\n\n这种形式的 `if` 语句很有用，但当需要执行多条语句时则不适用。如果需要执行多条语句，你应该将表达式分组到一个单个块中（也称为复合语句）。块是\
    \ Objective-C 中分组表达式的常用方式，类似于函数定义的分组。以下是一个示例：\n\n```\nvoid logical_func2(int x,\
    \ int y)\n{\n   if ((x > 2 && x <= 10) ||\n       (y > 15 && y <= 20)\n      )\n\
    \   {\n      NSLog(@\"the numbers are acceptable\");\n      NSLog(@\"the total\
    \ value is %d\", x + y);\n   }\n}\n```\n\n每当逻辑表达式为真时，这段代码执行两个操作：打印日志字符串并显示 `x\
    \ + y` 的值。为此，你需要一个表达式块，如上所示，定义在花括号之间。\n\n还有第三种更有用的 `if` 语句形式。假设你有一些操作需要在逻辑表达式为真时执行，而另一些操作需要在表达式为假时执行。这可以通过在\
    \ `if` 语句中添加一个 `else` 分支来实现。`else` 分支可以是单个语句或块。以下是另一个示例：\n\n```\nvoid logical_func3(int\
    \ x, int y)\n{\n   if ((x > 2 && x <= 10) ||\n       (y > 15 && y <= 20))\n  \
    \ {\n      NSLog(@\"the numbers are acceptable\");\n      NSLog(@\"the total value\
    \ is %d\", x + y);\n   }\n   else\n   {\n      NSLog(@\"the numbers are not acceptable\"\
    );\n   }\n}\n```\n\n## 循环\n\n编程可以被描述为定义重复任务的艺术。但是，如果没有可控重复的方法，执行编程任务将非常困难。这就是为什么每种语言都提供一组允许重复表达式的语句。循环是主要用来重复一组指令的语句的通用名称，其重复取决于逻辑条件的结果。\n\
    \nObjective-C 中可用的循环表达式有 `for`、`while` 和 `do while` 循环。这些循环形式中的每一种都提供了执行可控重复所需的语法。你将在接下来的章节中看到它们各自的工作原理。\n\
    \n### `while` 循环\n\n`while` 循环是三种循环形式中最简单的一种。`while` 循环的基本格式为\n\n```\nwhile (<logical\
    \ expression>)\n   <statement>\n```\n\n其中 `<statement>` 可以是单个语句或复合语句。例如，\n\n```\n\
    void printNums(int min, int max)\n{\n   while (min < max)\n   {\n      NSLog(@\"\
    Value %d\", min);\n      min = min + 1;\n   }\n}\n```\n\n`while` 循环的执行过程是：计算给定的逻辑表达式，并且仅当结果为真时才进入循环。然后执行花括号内块中的所有表达式。接着再次计算逻辑表达式，并重复该过程。当逻辑表达式为假时，整个块被跳过，程序在块后的第一行继续执行。\n\
    \n就像 `if` 语句一样，`while` 语句也允许使用单个表达式而不是块。因此，可以编写以下代码：\n\n```\nbool isOdd(int num)\n\
    {\n   while (num > 0)\n      num = num - 2;\n   return num == -1;\n}\n```\n"
- fmt: "### The `do { } while( )` Loop\n\nAnother variation of iteration statements\
    \ is the `do`/`while` loop. The difference between this and the previous `while`\
    \ form is that the test for its execution is performed at the end of the body\
    \ (where the `while` keyword is located). This makes the `do`/`while` loop effective\
    \ in situations where the block needs to be repeated at least once.\n\nA `do`/`while`\
    \ loop can be thought of as a way to avoid the initial test, as opposed to the\
    \ standard way in which a `while` loop works. With this extra repetition, it is\
    \ possible to encode a large set of algorithms that may require an initial execution\
    \ before the logical test is evaluated.\n\nFor example, consider an algorithm\
    \ to process input read, say, from a file. Suppose that the file contains a set\
    \ of numbers, and the last one is -1. The algorithm, in that case, consists of\
    \ reading the numbers in a file, doing some processing possibly using the number,\
    \ and stopping when the number is -1. If you suppose that there exists a function\
    \ called `nextNumber()`, which returns the next number in the file, then the algorithm\
    \ could be represented as:\n\n```\nvoid process_numbers()\n{\n   int number;\n\
    \   do\n   {\n      number = nextNumber();\n      // perform other tasks\n   }\n\
    \   while (number != -1);\n}\n```\n\nNotice that this function will always read\
    \ the next number and perform associated tasks at least once. This is the situation\
    \ where a `do`/`while` loop may be the best tool for the job. The test will at\
    \ the end evaluate to true whenever you have a number that is not equal to -1.\
    \ When that expression is false, the repetition stops and the function ends its\
    \ current execution.\n\n### The `for` Loop\n\nAmong the three loop statements\
    \ in Objective-C, the `for` loop is the most versatile. The reason is that it\
    \ can be used to perform different actions at the beginning (or end) of each iteration.\
    \ Combining the power of the other, more focused iteration statements, the `for`\
    \ loop is probably the most used of the control structures that you have seen\
    \ so far.\n\nThe syntax of the `for` loop is composed of a preamble, enclosed\
    \ by parentheses, and the body—just like the `while` loop. Unlike a `while` loop,\
    \ however, the pair of parentheses contains three expressions separated by semicolons.\
    \ The first section is an initialization expression. The second is a logical expression,\
    \ similar to what you would write in a `while` loop. This logical test determines\
    \ if the body of the `for` loop will be executed, and it is repeated every time\
    \ a new iteration is about to start.\n\nFinally, the third section is executed\
    \ every time the end of the body is reached. Therefore, just like the middle section\
    \ of the loop, this last part is executed once per run of the body of the loop.\
    \ Here is a simple example:\n\n```\nint for_test(int max)\n{\n   int i;\n   for\
    \ (i=0; i<max; i=i+1)\n   {\n      NSLog(@\"value is %d\", i);\n   }\n}\n```\n\
    \nThis is a minimal case of how such a loop works in practice. In the first part\
    \ of the expression at the top of the `for` loop, you see the initialization.\
    \ In this case, the objective is to assign the initial value of zero to the counter\
    \ variable `i`. The middle section will check if the number is less than the maximum\
    \ value. If that test is true, then the body is executed, where the number is\
    \ printed to the application log.\n\nThe last section of the `for` multi-part\
    \ expression is executed only at the end of each iteration. In this case, the\
    \ value of `i` is incremented by one. This will make the counter increase its\
    \ value at the end of each iteration until it reaches the maximum value provided.\
    \ When that happens, the logical test fails and the loop ends.\n\n### The `switch`\
    \ Statement\n\nObjective-C provides another way to select two or more options\
    \ for execution. Other than the `if` statement, you can use the `switch`/`case`\
    \ composite statement when there are two or more options that can be chosen based\
    \ on a single value.\n\nFor example, suppose that you are given a character that\
    \ can contain only three values: `'B'` for blue, `'R'` for red, and `'G'` for\
    \ green. In this case, you can use a `switch`/`case` to execute three different\
    \ options depending on the content of this variable. Here is the example code:\n\
    \n```\nvoid switch_test(char value)\n{\n   switch (value)\n   {\n   case 'R':\n\
    \      NSLog(@\"red\");\n      break;\n   case 'G':\n      NSLog(@\"green\");\n\
    \      break;\n   case 'B':\n      NSLog(@\"blue\");\n      break;\n   }\n}\n\
    ```\n\nNotice that the `switch` control structure receives as a parameter the\
    \ variable that controls the switch. Then, for each valid case you have a case\
    \ label. The case defines the point where the execution begins. In this example,\
    \ it prints the color associated with the character.\n\nAfter each valid code\
    \ path is a `break` statement. The reason this is necessary is that the `switch`\
    \ control structure will not stop execution when a new case is introduced. In\
    \ fact, in the absence of a `break` instruction, the remaining code would continue\
    \ to be executed until the `switch` block has been completed. To prevent this\
    \ from happening, the `break` statement will move the program to the next instruction\
    \ after the end of the body of the switch.\n\nAnother element that can be used\
    \ in a `switch`/`case` statement is a default label. Such a label can be used\
    \ to check for invalid input. Here is an improved version of the function shown\
    \ above:\n\n```\nvoid switch_test(char value)\n{\n   switch (value)\n   {\n  \
    \ case 'R':\n      NSLog(@\"red\");\n      break;\n   case 'G':\n      NSLog(@\"\
    green\");\n      break;\n   case 'B':\n      NSLog(@\"blue\");\n      break;\n\
    \   default:\n      NSLog(@\"error: invalid color code\");\n   }\n}\n```\n\nIt\
    \ is also possible to have multiple cases targeting the same code. This is done\
    \ by not adding a `break` to cases that will fall through to the next. Consider\
    \ the following example:\n\n```\nvoid vowel_test(char x)\n{\n   switch(x) {\n\
    \      case 'A':\n      case 'E':\n      case 'I':\n      case 'O':\n      case\
    \ 'U':\n         NSLog(@\"vowel\\n\");\n         break;\n      default:\n    \
    \     NSLog(@\"consonant\\n\");\n   }\n}\n```"
  raw: '### The do { } while( ) Loop


    Another variation of iteration statements is the `do`/`while` loop. The difference
    between this and the previous `while` form is that the test for its execution
    is performed at the end of the body (where the `while` keyword is located). This
    makes the `do`/`while` loop effective in situations where the block needs to be
    repeated at least once.


    A `do`/`while` loop can be thought of as a way to avoid the initial test, as opposed
    to the standard way in which a `while` loop works. With this extra repetition,
    it is possible to encode a large set of algorithms that may require an initial
    execution before the logical test is evaluated.


    For example, consider an algorithm to process input read, say, from a file. Suppose
    that the file contains a set of numbers, and the last one is -1\. The algorithm,
    in that case, consists of reading the numbers in a file, doing some processing
    possibly using the number, and stopping when the number is -1\. If you suppose
    that there exists a function called `nextNumber()`, which returns the next number
    in the file, then the algorithm could be represented as


    `void process_numbers()`


    `{`


       `int number;`


       `do`


       `{`


          `number = nextNumber();`


          `// perform other tasks`


       `}`


       `while (number != -1);`


    `}`


    Notice that this function will always read the next number and perform associated
    tasks at least once. This is the situation where a `do`/`while` loop may be the
    best tool for the job. The test will at the end evaluate to true whenever you
    have a number that is not equal to -1\. When that expression is false, the repetition
    stops and the function ends its current execution.


    ### The for Loop


    Among the three loop statements in Objective-C, the `for` loop is the most versatile.
    The reason is that it can be used to perform different actions at the beginning
    (or end) of each iteration. Combining the power of the other, more focused iteration
    statements, the `for` loop is probably the most used of the control structures
    that you have seen so far.


    The syntax of the `for` loop is composed of a preamble, enclosed by parenthesis,
    and the body—just like the `while` loop. Unlike a `while` loop, however, the pair
    of parenthesis contains three expressions separated by semicolons. The first section
    is an initialization expression. The second is a logical expression, similar to
    what you would write in a `while` loop. This logical test determines if the body
    of the `for` loop will be executed, and it is repeated every time a new iteration
    is about to start.


    Finally, the third section is executed every time the end of the body is reached.
    Therefore, just like the middle section of the loop, this last part is executed
    once per run of the body of the loop. Here is a simple example:


    `int for_test(int max)`


    `{`


       `int i;`


       `for (i=0; i<max; i=i+1)`


       `{`


          `NSLog(@"value is %d", i);`


       `}`


    `}`


    This is a minimal case of how such a loop works in practice. In the first part
    of the expression at the top of the `for` loop, you see the initialization. In
    this case, the objective is to assign the initial value of zero to the counter
    variable `i`. The middle section will check if the number is less than the maximum
    value. If that test is true, then the body is executed, where the number is printed
    to the application log.


    The last section of the `for` multi-part expression is executed only at the end
    of each iteration. In this case, the value of `i` is incremented by one. This
    will make the counter increase its value at the end of each iteration until it
    reaches the maximum value provided. When that happens, the logical test fails
    and the loop ends.


    ### The switch Statement


    Objective-C provides another way to select two or more options for execution.
    Other than the `if` statement,you can use the `switch`/`case` composite statement
    when there are two or more options that can be chosen based on a single value.


    For example, suppose that you are given a character that can contain only three
    values: ''`B`'' for blue, ''`R`'' for red, and ''`G`'' for green. In this case,
    you can use a `switch`/`case` to execute three different options depending of
    the content of this variable. Here is the example code:


    `void switch_test(char value)`


    `{`


       `switch (value)`


       `{`


       `case ''R'':`


          `NSLog(@"red");`


          `break;`


       `case ''G'':`


          `NSLog(@"green");`


          `break;`


       `case ''B'':`


          `NSLog(@"blue");`


          `break;`


       `}`


    `}`


    Notice that the `switch` control structure receives as a parameter the variable
    that controls the switch. Then, for each valid case you have a case label. The
    case defines the point where the execution begins. In this example, it prints
    the color associated with the character.


    After each valid code path is a break statement. The reason this is necessary
    is that the switch control structure will not stop execution when a new case is
    introduced. In fact, in the absence of a break instruction, the remaining code
    would continue to be executed until the switch block has been completed. To prevent
    this from happening, the `break` statement will move the program to the next instruction
    after the end of the body of the switch.


    Another element that can be used in a switch/case statement is a default label.
    Such a label can be used to check for invalid input. Here is an improved version
    of the function shown above:


    `void switch_test(char value)`


    `{`


       `switch (value)`


       `{`


       `case ''R'':`


          `NSLog(@"red");`


          `break;`


       `case ''G'':`


          `NSLog(@"green");`


          `break;`


       `case ''B'':`


          `NSLog(@"blue");`


          `break;`


       `default:`


          `NSLog(@"error: invalid color code");`


       `}`


    `}`


    It is also possible to have multiple cases targeting the same code. This is done
    by not adding a `break` to cases that will fall through to the next. Consider
    the following example:


    `void vowel_test(char x)`


    `{`


       `switch(x) {`


          `case ''A'':`


          `case ''E'':`


          `case ''I'':`


          `case ''O'':`


          `case ''U'':`


             `NSLog(@"vowel\n");`


             `break;`


          `default:`


             `NSLog(@"consonant\n");`


       `}`


    `}`'
  trans: "\n### `do { } while( )` 循环\n\n迭代语句的另一种变体是 `do`/`while` 循环。它与之前 `while` 形式的区别在于，其执行条件的判断在循环体末尾（即\
    \ `while` 关键字所在位置）进行。这使得 `do`/`while` 循环在需要至少执行一次循环体的情况下非常有效。\n\n可以将 `do`/`while`\
    \ 循环视为一种避免初始条件判断的方式，这与标准 `while` 循环的工作方式相反。借助这种额外的重复特性，可以编码大量需要在逻辑判断之前先执行一次的算法。\n\
    \n例如，考虑一个处理从文件读取输入的算法。假设文件中包含一组数字，最后一个数字是 -1。在这种情况下，算法包括读取文件中的数字，可能使用该数字进行一些处理，并在数字为\
    \ -1 时停止。如果假设存在一个名为 `nextNumber()` 的函数，它返回文件中的下一个数字，那么该算法可以表示为：\n\n```\nvoid process_numbers()\n\
    {\n   int number;\n   do\n   {\n      number = nextNumber();\n      // 执行其他任务\n\
    \   }\n   while (number != -1);\n}\n```\n\n请注意，此函数将始终至少读取一次下一个数字并执行相关任务。这正是 `do`/`while`\
    \ 循环可能成为最佳工具的典型场景。只要遇到的数字不等于 -1，末尾的条件判断就会评估为真。当该表达式为假时，重复停止，函数结束其当前执行。\n\n###\
    \ `for` 循环\n\n在 Objective-C 的三种循环语句中，`for` 循环是最通用的。原因在于它可以在每次迭代的开始（或结束）时执行不同的操作。结合其他更专门的迭代语句的强大功能，`for`\
    \ 循环很可能是你目前所见过的控制结构中使用最广泛的一种。\n\n`for` 循环的语法由用括号括起来的前置部分和循环体组成——这与 `while` 循环类似。然而，与\
    \ `while` 循环不同的是，括号内包含三个由分号分隔的表达式。第一部分是初始化表达式。第二部分是逻辑表达式，类似于你在 `while` 循环中编写的内容。这个逻辑判断决定\
    \ `for` 循环体是否会被执行，并且在每次即将开始新一轮迭代时都会重复判断。\n\n最后，第三部分在每次循环体执行结束时运行。因此，就像循环的第二部分一样，这最后一部分在每次运行循环体时执行一次。这里有一个简单的例子：\n\
    \n```\nint for_test(int max)\n{\n   int i;\n   for (i=0; i<max; i=i+1)\n   {\n\
    \      NSLog(@\"value is %d\", i);\n   }\n}\n```\n\n这是一个展示此类循环在实践中如何工作的最小示例。在\
    \ `for` 循环顶部表达式的第一部分中，你看到了初始化。这里的目标是将计数器变量 `i` 的初始值赋为 0。中间部分将检查该数字是否小于最大值。如果该判断为真，则执行循环体，在循环体中将数字打印到应用程序日志中。\n\
    \n`for` 多部分表达式的最后一部分仅在每次迭代结束时执行。在这里，`i` 的值增加 1。这使得计数器在每次迭代结束时增加其值，直到达到所提供的最大值。当达到该值时，逻辑判断失败，循环结束。\n\
    \n### `switch` 语句\n\nObjective-C 提供了另一种选择两个或多个选项来执行的方法。除了 `if` 语句，当存在两个或多个可以根据单个值选择的选项时，你可以使用\
    \ `switch`/`case` 复合语句。\n\n例如，假设你有一个字符变量，它只能包含三个值：`'B'` 代表蓝色，`'R'` 代表红色，`'G'`\
    \ 代表绿色。在这种情况下，你可以使用 `switch`/`case` 根据此变量的内容执行三种不同的选项。示例代码如下：\n\n```\nvoid switch_test(char\
    \ value)\n{\n   switch (value)\n   {\n   case 'R':\n      NSLog(@\"red\");\n \
    \     break;\n   case 'G':\n      NSLog(@\"green\");\n      break;\n   case 'B':\n\
    \      NSLog(@\"blue\");\n      break;\n   }\n}\n```\n\n请注意，`switch` 控制结构接收控制切换的变量作为参数。然后，对于每个有效的情况，你都有一个\
    \ `case` 标签。`case` 定义了执行开始的位置。在这个例子中，它打印与字符关联的颜色。\n\n在每个有效的代码路径之后都有一个 `break`\
    \ 语句。之所以需要这样做，是因为当遇到新的 `case` 时，`switch` 控制结构不会停止执行。实际上，如果没有 `break` 指令，剩余的代码将继续执行，直到\
    \ `switch` 块结束。为了防止这种情况发生，`break` 语句会将程序移动到 `switch` 体结束后的下一条指令。\n\n可以在 `switch`/`case`\
    \ 语句中使用的另一个元素是 `default` 标签。此类标签可用于检查无效输入。以下是上面所示函数的改进版本：\n\n```\nvoid switch_test(char\
    \ value)\n{\n   switch (value)\n   {\n   case 'R':\n      NSLog(@\"red\");\n \
    \     break;\n   case 'G':\n      NSLog(@\"green\");\n      break;\n   case 'B':\n\
    \      NSLog(@\"blue\");\n      break;\n   default:\n      NSLog(@\"error: invalid\
    \ color code\");\n   }\n}\n```\n\n也可以让多个 `case` 指向同一段代码。这可以通过不向会“穿透”到下一个 `case`\
    \ 的 `case` 添加 `break` 来实现。请考虑以下示例：\n\n```\nvoid vowel_test(char x)\n{\n   switch(x)\
    \ {\n      case 'A':\n      case 'E':\n      case 'I':\n      case 'O':\n    \
    \  case 'U':\n         NSLog(@\"vowel\\n\");\n         break;\n      default:\n\
    \         NSLog(@\"consonant\\n\");\n   }\n}\n```\n"
- fmt: "### Assignment Operators\n\nObjective-C provides a general kind of expression\
    \ employed to update the value of variables, which uses the assignment operator.\
    \ Such assignment expressions are frequently used due to the fact that they may\
    \ accomplish more succinctly certain tasks that would require two or more steps\
    \ in other languages.\n\nThe basic assignment operator uses the `=` symbol and\
    \ modifies the variable in the left side to contain the result of the expression\
    \ in the right. This is the common way to update variables, and you have encountered\
    \ it in examples seen so far. Beyond this basic use, however, the assignment operator\
    \ can also be used as a subexpression occurring in other contexts. The result\
    \ is that you can embed an assignment so that it becomes part of other expressions\
    \ as well.\n\n```\nbool check_total(int a, int b)\n{\n   int total;\n   if ((total\
    \ = a + b) > 10)\n   {\n      NSLog(@\"total value of %d is too high\", total);\n\
    \      return false;\n   }\n   return true;\n}\n```\n\nIn this example, the variable\
    \ `total` is used to store the sum of `a` and `b`. The `if` statement checks if\
    \ the sum of the two parameters is greater than `10`. However, the test also assigns\
    \ the result of `a + b` to variable `total`, so that it can be later used in the\
    \ call to `NSLog`. The expression `(total = a + b)` not only performs the assignment,\
    \ but also results in the value assigned, so that other expressions can have access\
    \ to that value.\n\n**Note:** In this example, it is clear that `total` could\
    \ have been updated elsewhere, but in more complex code there are situations where\
    \ the assignment as a subexpression is the more natural thing to do. When creating\
    \ this kind of code, try to see if alternative ways of solving the problem would\
    \ result in a better and more maintainable solution.\n\nAnother use for this property\
    \ of the assignment operator is in chained assignments. The basic idea is that\
    \ the same value can be assigned to more than one variable; this can be done by\
    \ just having two or more variables share the same assignment expression.\n\n\
    ```\nint height, width;\nvoid make_square(int dimension)\n{\n   height = width\
    \ = dimension;\n}\n```\n\nFunction `make_square` is used to update the `height`\
    \ and `width` variables to the same quantity. This is accomplished by chaining\
    \ the assignment between these two variables. In fact, the proper way to read\
    \ this assignment would be from right to left.\n\n```\nvoid make_square(int dimension)\n\
    {\n   height = (width = dimension);\n}\n```\n\nClearly the same idea can be extended\
    \ to as many variables as necessary.\n\n### Increment and Decrement Operators\n\
    \nA simple form of assignment is the increment operator. This operator was created\
    \ to perform a unit increment to variables containing integer values. Similarly,\
    \ a decrement operator also exists, and its application decreases by a single\
    \ unit the value assigned to a variable. The increment operators are frequently\
    \ used in loops, for example, to update the value of temporary counters.\n\n```\n\
    int print_forwards_and_backwards(int n)\n{\n   int i;\n   for (i=0; i<n; i++)\n\
    \   {\n      NSLog(@\"value is %d\", i+1);\n   }\n   for (i=n; i>0; i--)\n   {\n\
    \      NSLog(@\"value is %d\", i);\n   }\n}\n```\n\nIn this example you have the\
    \ opportunity to use both increment and decrement operators to move the counter\
    \ variable `i`. The increment and decrement operators also have a version that\
    \ can be used inside of another expression, in a similar way to how an assignment\
    \ operator can be used. The pre-increment operator increments a variable by one\
    \ unit, but it also makes sure that the increment happens before other parts of\
    \ the containing expression are executed. Similarly, there is a pre-decrement\
    \ operator with a similar property.\n\n```\nint print_forwards_and_backwards(int\
    \ n)\n{\n   int i;\n   for (i=0; i<n; )\n   {\n      NSLog(@\"value is %d\", ++i);\n\
    \   }\n   for (i=n; i>0; )\n   {\n      NSLog(@\"value is %d\", i--);\n   }\n\
    }\n```\n\nThis example shows the difference between using the pre-increment and\
    \ post-increment operators. In both loops we removed the increment and decrement\
    \ operators from the loop expression. They have been moved and became sub-expressions\
    \ of the `NSLog` call. In the first case, however, we want to increment the variable\
    \ before it is printed, so we use the pre-increment operator. In the second case,\
    \ the goal is to print the variable as it is and then perform the increment, which\
    \ is accomplished by the post-increment operator.\n\n**Note:** Increment and decrement\
    \ operators cannot be used more than once for the same variable in the same expression.\
    \ When that happens, the compiler will not know the expected value of the variable,\
    \ and the result will most probably be incorrect. As a matter of programming discipline,\
    \ avoid using increment operators in large expression where this may happen by\
    \ accident.\n\n### Compound Assignment\n\nA class of assignment operators exists\
    \ that generalize the increment and decrement operators. For example, to add integer\
    \ values to a variable, you can use the `+=` operator. Thus,\n\n`width = widht\
    \ + 10;`\n\nis equivalent to\n\n`width += 10;`\n\nAs an example, the following\
    \ code increases the dimensions of a rectangle:\n\n```\nint width, height;\nvoid\
    \ increase_rectangle_dimensions(int increase)\n{\n   width += increase;\n   height\
    \ += increase;\n}\n```\n\nAnd similarly for subtraction:\n\n```\nvoid reduce_rectangle_dimensions(int\
    \ reduction)\n{\n   width -= reduction;\n   height -= reduction;\n}\n```\n\nThere\
    \ is a version of the compound assignment operators for each of the arithmetic\
    \ operators: `*=`, `/=`, `%=`, `<<=`, `>>=`. They are easy to understand, and\
    \ you will see examples of their use in other sections of this book.\n\n## Structures\n\
    \nA structure is a user-defined type containing other data elements that can be\
    \ accessed using tags. A structure is declared with the keyword `struct`.\n\n\
    ```\nstruct address\n{\n   int number;\n   NSString *street;\n   NSString *city;\n\
    \   NSString *state;\n   int postal_code;\n};\n```\n\nThis struct defines a new\
    \ data type that contains five pieces of data that can be accessed as part of\
    \ the `address` structure. To use such a structure, you just need to create a\
    \ variable of the newly defined type.\n\n```\nvoid create_address()\n{\n   struct\
    \ address famous_address;\n   famous_address.number = 1600;\n   famous_address.street\
    \ = \"Pennsylvania Av\";\n   famous_address.city = \"Washington\";\n   famous_address.state\
    \ = \"DC\";\n}\n```\n\nThe great advantage of structures is that they allow information\
    \ to be packed into logical units, so that you don’t need to deal with several\
    \ unrelated variables. Instead, you just need to work with a single data representation.\
    \ So, for example, using the address structure described above you can create\
    \ functions that receive addresses as parameters, instead of dealing with a set\
    \ of unrelated items.\n\n```\nvoid print_address(struct address an_address)\n\
    {\n   NSLog(@\"street: %@\", an_address.street);\n   // ... print other fields\
    \ in address\n}\n```\n\nYou can also think of structures as a primitive version\
    \ of an object that contains only data. In the next chapter you will see how Objective-C\
    \ provides user-defined data types that have not only associated data, but that\
    \ can also respond to messages."
  raw: '### Assignment Operators


    Objective-C provides a general kind of expression employed to update the value
    of variables, which uses the assignment operator. Such assignment expressions
    are frequently used due to the fact that they may accomplish more succinctly certain
    tasks that would require two or more steps in other languages.


    The basic assignment operator uses the `=` symbol and modifies the variable in
    the left side to contain the result of the expression in the right. This is the
    common way to update variables, and you have encountered it in examples seen so
    far. Beyond this basic use, however, the assignment operator can also be used
    as a subexpression occurring in other contexts. The result is that you can embed
    an assignment so that it becomes part of other expressions as well.


    `bool check_total(int a, int b)`


    `{`


       `int total;`


       `if ((total = a + b) > 10)`


       `{`


          `NSLog(@"total value of %d is too high", total);`


          `return false;`


       `}`


       `return true;`


    `}`


    In this example, the variable `total` is used to store the sum of `a` and `b`.
    The `if` statement checks if the sum of the two parameters is greater than `10`.
    However, the test also assigns the result of `a + b` to variable `total`, so that
    it can be later used in the call to `NSLog`. The expression `(total = a + b)`
    not only performs the assignment, but also results in the value assigned, so that
    other expressions can have access to that value.


    Note


    In this example, it is clear that total could have been updated elsewhere, but
    in more complex code there are situations where the assignment as a subexpression
    is the more natural thing to do. When creating this kind of code, try to see if
    alternative ways of solving the problem would result in a better and more maintainable
    solution.


    Another use for this property of the assignment operator is in chained assignments.
    The basic idea is that the same value can be assigned to more than one variable;
    this can be done by just having two or more variables share the same assignment
    expression.


    `int height, width;`


    `void make_square(int dimension)`


    `{`


       `height = width = dimension;`


    `}`


    Function `make_square` is used to update the `height` and `width` variables to
    the same quantity. This is accomplished by chaining the assignment between these
    two variables. In fact, the proper way to read this assignment would be from right
    to left.


    `void make_square(int dimension)`


    `{`


       `height = (width = dimension);`


    `}`


    Clearly the same idea can be extended to as many variables as necessary.


    ### Increment and Decrement Operators


    A simple form of assignment is the increment operator. This operator was created
    to perform a unit increment to variables containing integer values. Similarly,
    a decrement operator also exists, and its application decreases by a single unit
    the value assigned to a variable. The increment operators are frequently used
    in loops, for example, to update the value of temporary counters.


    `int print_forwards_and_backwards(int n)`


    `{`


       `int i;`


       `for (i=0; i<n; i++)`


       `{`


          `NSLog(@"value is %d", i+1);`


       `}`


       `for (i=n; i>0; i--)`


       `{`


          `NSLog(@"value is %d", i);`


       `}`


    `}`


    In this example you have the opportunity to use both increment and decrement operators
    to move the counter variable `i`. The increment and decrement operators also have
    a version that can be used inside of another expression, in a similar way to how
    an assignment an assignment operator can be used. The pre-increment operator increments
    a variable by one unit, but it also makes sure that the increment happens before
    other parts of the containing expression are executed. Similarly, there is a pre-decrement
    operator with a similar property.


    `int print_forwards_and_backwards(int n)`


    `{`


       `int i;`


       `for (i=0; i<n; )`


       `{`


          `NSLog(@"value is %d", ++i);`


       `}`


       `for (i=n; i>0; )`


       `{`


          `NSLog(@"value is %d", i--);`


       `}`


    `}`


    This example shows the difference between using the pre-increment and post-increment
    operators. In both loops we removed the increment and decrement operators from
    the loop expression. They have been moved and became sub-expressions of the `NSLog`
    call. In the first, case, however, we want to increment the variable before it
    is printed, so we use the pre-increment operator. In the second case, the goal
    is to print the variable as it is and then perform the increment, which is accomplished
    by the post-increment operator.


    Note


    Increment and decrement operators cannot be used more than once for the same variable
    in the same expression. When that happens, the compiler will not know the expected
    value of the variable, and the result will most probably be incorrect. As a matter
    of programming discipline, avoid using increment operators in large expression
    where this may happen by accident.


    ### Compound Assignment


    A class of assignment operators exists that generalize the increment and decrement
    operators. For example, to add integer values to a variable, you can use the `+=`
    operator. Thus,


    `width = widht + 10;`


    is equivalent to


    `width += 10;`


    As an example, the following code increases the dimensions of a rectangle:


    `int width, height;`


    `void increase_rectangle_dimensions(int increase)`


    `{`


       `width += increase;`


       `height += increase;`


    `}`


    And similarly for subtraction:


    `void reduce_rectangle_dimensions(int reduction)`


    `{`


       `width -= reduction;`


       `height -= reduction;`


    `}`


    There is a version of the compound assignment operators for each of the arithmetic
    operators: `*=`, `/=`, `%=`, `<<=`, `>>=`. They are easy to understand, and you
    will see examples of their use in other sections of this book.


    ## Structures


    A structure is a user-defined type containing other data elements that can be
    accessed using tags. A structure is declared with the keyword `struct`.


    `struct address`


    `{`


       `int number;`


       `NSString *street;`


       `NSString *city;`


       `NSString *state;`


       `int postal_code;`


    `};`


    This struct defines a new data type that contains five pieces of data that can
    be accessed as part of the `address` structure. To use such a structure, you just
    need to create a variable of the newly defined type.


    `void create_address()`


    `{`


       `struct address famous_address;`


       `famous_address.number = 1600;`


       `famous_address.street = "Pennsylvania Av";`


       `famous_address.city = "Washington";`


       `famous_address.state = "DC";`


    `}`


    The great advantage of structures is that they allow information to be packed
    into logical units, so that you don’t need to deal with several unrelated variables.
    Instead, you just need to work with a single data representation. So, for example,
    using the address structure described above you can create functions that receive
    addresses as parameters, instead of dealing with a set of unrelated items.


    `void print_address(struct address an_address)`


    `{`


       `NSLog(@"street: %@", an_address.street);`


       `// ... print other fields in address`


    `}`


    You can also think of structures as a primitive version of an object that contains
    only data. In the next chapter you will see how Objective-C provides user-defined
    data types that have not only associated data, but that can also respond to messages.'
  trans: "\n### 赋值运算符\n\nObjective-C 提供了一种通用的表达式来更新变量的值，这种表达式使用了赋值运算符。这类赋值表达式被频繁使用，因为它们能以更简洁的方式完成某些任务，而这些任务在其他语言中可能需要两个或更多步骤才能完成。\n\
    \n基本赋值运算符使用 `=` 符号，并修改左侧的变量，使其包含右侧表达式的结果。这是更新变量的常见方式，你在目前看到的示例中已经遇到过。然而，除了这种基本用法，赋值运算符还可以作为子表达式出现在其他上下文中。其结果是你可以将赋值嵌入到其他表达式中，使其成为它们的一部分。\n\
    \n```\nbool check_total(int a, int b)\n{\n   int total;\n   if ((total = a + b)\
    \ > 10)\n   {\n      NSLog(@\"total value of %d is too high\", total);\n     \
    \ return false;\n   }\n   return true;\n}\n```\n\n在此示例中，变量 `total` 用于存储 `a` 和\
    \ `b` 的和。`if` 语句检查这两个参数的和是否大于 `10`。然而，该测试同时将 `a + b` 的结果赋值给了变量 `total`，以便稍后在调用\
    \ `NSLog` 时使用。表达式 `(total = a + b)` 不仅执行了赋值操作，还产生了所赋的值，这样其他表达式就可以访问这个值。\n\n**注意：**\
    \ 在此示例中，很明显 `total` 本可以在其他地方更新，但在更复杂的代码中，有时将赋值作为子表达式是更自然的做法。在编写这类代码时，请尝试思考是否有其他解决问题的方式能产生更好、更易于维护的方案。\n\
    \n赋值运算符这一特性的另一个用途是链式赋值。其基本思想是：同一个值可以赋值给多个变量；只需让两个或更多变量共享同一个赋值表达式即可实现。\n\n```\n\
    int height, width;\nvoid make_square(int dimension)\n{\n   height = width = dimension;\n\
    }\n```\n\n函数 `make_square` 用于将 `height` 和 `width` 变量更新为相同的值。这是通过在这两个变量之间链式赋值实现的。实际上，正确的解读方式是从右向左阅读这个赋值语句。\n\
    \n```\nvoid make_square(int dimension)\n{\n   height = (width = dimension);\n\
    }\n```\n\n显然，同样的思路可以扩展到任意数量的变量。\n\n### 自增与自减运算符\n\n赋值的一种简单形式是自增运算符。该运算符被创建用于对包含整数值的变量执行加一操作。类似地，也存在自减运算符，它的应用是将赋值给变量的值减一。自增运算符常用于循环中，例如更新临时计数器的值。\n\
    \n```\nint print_forwards_and_backwards(int n)\n{\n   int i;\n   for (i=0; i<n;\
    \ i++)\n   {\n      NSLog(@\"value is %d\", i+1);\n   }\n   for (i=n; i>0; i--)\n\
    \   {\n      NSLog(@\"value is %d\", i);\n   }\n}\n```\n\n在此示例中，你有机会同时使用自增和自减运算符来移动计数器变量\
    \ `i`。自增和自减运算符也有一个版本可以在另一个表达式内部使用，其方式类似于赋值运算符的使用方式。前置自增运算符将变量加一，并且确保自增操作在包含它的表达式的其他部分执行之前发生。类似地，也存在具有相同特性的前置自减运算符。\n\
    \n```\nint print_forwards_and_backwards(int n)\n{\n   int i;\n   for (i=0; i<n;\
    \ )\n   {\n      NSLog(@\"value is %d\", ++i);\n   }\n   for (i=n; i>0; )\n  \
    \ {\n      NSLog(@\"value is %d\", i--);\n   }\n}\n```\n\n这个示例展示了使用前置自增和后置自增运算符的区别。在两个循环中，我们都将自增和自减运算符从循环表达式中移除了。它们已被挪到了\
    \ `NSLog` 调用中，并成为了其子表达式。然而，在第一个例子中，我们希望先递增变量再将其打印出来，因此我们使用了前置自增运算符。在第二个例子中，目标是先按原样打印变量，然后执行自增操作，这通过后置自增运算符实现。\n\
    \n**注意：** 自增和自减运算符不能在同一个表达式中对同一变量使用多次。一旦发生这种情况，编译器将无法得知变量的预期值，结果很可能是错误的。作为编程规范，应避免在大型表达式中使用自增运算符，以免意外发生此类情况。\n\
    \n### 复合赋值\n\n有一类赋值运算符是对自增和自减运算符的推广。例如，要向一个变量加上整数值，你可以使用 `+=` 运算符。因此，\n\n`width\
    \ = width + 10;`\n\n等价于\n\n`width += 10;`\n\n例如，下面的代码增加了矩形的尺寸：\n\n```\nint width,\
    \ height;\nvoid increase_rectangle_dimensions(int increase)\n{\n   width += increase;\n\
    \   height += increase;\n}\n```\n\n减法操作类似：\n\n```\nvoid reduce_rectangle_dimensions(int\
    \ reduction)\n{\n   width -= reduction;\n   height -= reduction;\n}\n```\n\n对于每一种算术运算符，都有对应的复合赋值运算符版本：`*=`、`/=`、`%=`、`<<=`、`>>=`。它们很容易理解，你将在本书的其他章节中看到它们的使用示例。\n\
    \n## 结构体\n\n结构体是一种用户定义的类型，它包含其他数据元素，这些元素可以通过标签来访问。结构体使用关键字 `struct` 声明。\n\n```\n\
    struct address\n{\n   int number;\n   NSString *street;\n   NSString *city;\n\
    \   NSString *state;\n   int postal_code;\n};\n```\n\n这个结构体定义了一个新的数据类型，它包含五条数据，这些数据可以作为\
    \ `address` 结构体的一部分来访问。要使用这样的结构体，你只需创建一个这种新定义类型的变量即可。\n\n```\nvoid create_address()\n\
    {\n   struct address famous_address;\n   famous_address.number = 1600;\n   famous_address.street\
    \ = \"Pennsylvania Av\";\n   famous_address.city = \"Washington\";\n   famous_address.state\
    \ = \"DC\";\n}\n```\n\n结构体的巨大优势在于它们允许将信息打包到逻辑单元中，这样你就不需要处理多个不相关的变量。相反，你只需处理一个单一的数据表示形式。因此，例如，使用上述定义的地址结构体，你可以创建以地址为参数的函数，而不必处理一组不相关的项目。\n\
    \n```\nvoid print_address(struct address an_address)\n{\n   NSLog(@\"street: %@\"\
    , an_address.street);\n   // ... 打印地址中的其他字段\n}\n```\n\n你也可以将结构体视为一种仅包含数据的原始版本的对象。在下一章中，你将看到\
    \ Objective-C 如何提供用户定义的数据类型，这些类型不仅包含关联的数据，还能响应消息。\n"
- fmt: "# Pointers\n\nA pointer is an address to a location in memory. Objective-C\
    \ provides convenient access to memory addresses through the use of pointers to\
    \ particular types. The main advantage of pointer types is that they allow you\
    \ to interpret any memory address as the potential location of a variable. Therefore,\
    \ you are not limited to use variables that have been previously declared: you\
    \ can convert any memory location into data types that can be manipulated by algorithms.\n\
    \nTo declare a pointer, you start with an existing data type and apply the star\
    \ character to the right of the desired data type. For example, you can define\
    \ pointers for integers and doubles in the following way:\n\n`int *pointer_to_int;`\n\
    \n`double *my_double_pointer;`\n\n**Note:** A pointer declaration will merely\
    \ define an address to a data type, but will not create any memory associated\
    \ with that data type. For example, the variable `pointer_to_int` shown above\
    \ has no integer variable associated to it. To be able to use a pointer you need\
    \ first to have it pointing to valid memory.\n\nOnce you have a pointer, you can\
    \ use it to manipulate existing variables. You can do this by using two operators:\
    \ the star operator is used to retrieve the data stored in the memory at which\
    \ it is pointed. For example,\n\n```\nvoid print_value(int *pint)\n{\n  NSLog(@\"\
    the value is %d\", *pint);\n}\n```\n\nThe expression `*pint` means that you are\
    \ dereferencing the value stored in the memory pointed by `pint`. In summary,\
    \ the star operator allows you to use a pointer in place of a variable of the\
    \ given type.\n\nThe second operator used with pointers is the address-of (ampersand)\
    \ operator `&`. This operator is required to retrieve the memory address of an\
    \ existing variable. When combined, the star operator and the address-of operator\
    \ allow you to retrieve addresses from variables, and to access and modify data\
    \ stored at these memory addresses. They provide the programmer with the basic\
    \ tools necessary to manage memory in an application. Here is a simple example:\n\
    \n```\nvoid modify_value(int *pint, int new_value)\n{\n   *pint = new_value;\n\
    }\n\nint width, height;\nvoid init_rectangle_dimensions()\n{\n   modify_value(&width,\
    \ 100);\n   modify_value(&height, 50);\n   NSLog(@\"Now width = %d and height\
    \ = %d\", width, height);\n}\n```\n\nThis code is using a pointer to modify the\
    \ content of an integer variable. This indirect operation is useful because now\
    \ the same code can be used to modify any integer variable, regardless of its\
    \ actual name in the program.\n\n### Parameter Passing\n\nThis is a good moment\
    \ to explain the idea of parameter passing conventions. Each function is defined\
    \ by its name, parameters, and return type. Parameters passed to functions in\
    \ Objective-C are always copied. This means, for example, that when passing an\
    \ integer number to a function, the value used inside the function is just a copy\
    \ of the original integer. In particular, if you modify the value of a parameter,\
    \ you are not changing the value of the original variable that was passed. For\
    \ example,\n\n```\nvoid try_to_change(int value)\n{\n   value = 10; // a new value\n\
    \   NSLog(@\"value is now %d\", value);\n}\n\nvoid use_change()\n{\n   int orig_value\
    \ = 20;\n   try_to_change(orig_value);\n   NSLog(@\"after change %d\", orig_value);\n\
    }\n```\n\nIf you run this function, you’ll see that the stored value didn’t change\
    \ after the function `try_to_change` was executed. We say that the variable `orig_value`\
    \ was passed by value to `try_to_change`. If you really want to change the value\
    \ of a variable, you need to have not just a copy of it, but its memory address.\
    \ This can be done using a pointer, as shown in the previous section. So, the\
    \ correct thing to do in this example is\n\n```\nvoid really_change(int *value)\n\
    {\n   *value = 10; // a new value\n   NSLog(@\"value is now %d\", *value);\n}\n\
    \nvoid use_change()\n{\n   int orig_value = 20;\n   really_change(&orig_value);\n\
    \   NSLog(@\"after change %d\", orig_value);\n}\n```\n\nNotice that now, instead\
    \ of passing a value around, you are passing a memory address, so that you will\
    \ be able to access that memory using the star operator. After the function `try_to_change`\
    \ is called, the value of `orig_value` has changed from `20` to `10`, unlike the\
    \ previous time. This means that the function `really_change` is performing the\
    \ modification on the contents of the original variable, not just on a copy.\n\
    \n**Note:** Understanding how the language uses pointer parameters is important\
    \ because this is also how objects are manipulated. All objects in Objective-C\
    \ are created and used as pointers.\n\n## Arrays\n\nAn array is a way to store\
    \ multiple values of the same type in a sequential manner. For example, suppose\
    \ you wanted to store the ages for all students in a school. One way of doing\
    \ this is to create a large number of variables to store that data, such as\n\n\
    `int age1, age2, age3; // ... more here`\n\nThis arrangement can be easily seen\
    \ as too inflexible to maintain. Clearly this will require code that stores data\
    \ in different variables.\n\n`age1 = 11;`\n`age2 = 9;`\n`// ... more here`\n\n\
    This is not only inconvenient but also error prone. Arrays provide a way to solve\
    \ this problem. If all you need is to store students’ ages, you can create an\
    \ array of 1,000 integers that can be indexed by values from `0` to `999`.\n\n\
    `int ages[1000];`\n\nNow you can write code that accesses and modifies the array\
    \ as needed. For example, to store all ages, suppose you have a function returning\
    \ the number of students, and another function returning the age of student number\
    \ `i`. Then, you can write the following code to calculate the average age:\n\n\
    ```\nvoid average_student_age()\n{\n   int total_age = 0;\n   int max = number_of_students();\n\
    \   int i;\n   double denominator = max;\n   for (i=0; i<max; ++i)\n   {\n   \
    \   ages[i] = age_of_student(i);\n   }\n   for (i=0; i<max; ++i)\n   {\n     \
    \ total += age[i];\n   }\n   return total / denominator;\n}\n```\n\nThis function\
    \ first reads the data into the `ages` array, and then calculates the average\
    \ (the total age divided by the number of students).\n\nThe array declaration\
    \ syntax is similar to the way single variables are declared. However, to create\
    \ an array of a particular size, you type the number of elements between square\
    \ brackets. In the example above, you have an array with 1,000 integers. In order\
    \ to declare an array, you need a fixed size, such as `1,000`. For variable sized\
    \ arrays, you will later use Objective-C container classes such as `NSArray`,\
    \ which provides a more flexible mechanism for array creation and resizing.\n\n\
    To access the elements of an array, you just need to address the required element\
    \ using brackets. For example, to assign a value to the third element of the array,\
    \ you need to use the following code:\n\n`ages[2] = value;`\n\nThis code fragment\
    \ will store the contents of `value` to the third position of the array `ages`.\n\
    \n**Note:** Objective-C arrays are zero-based, so the first element is located\
    \ at position zero. This may be confusing for people learning the language, but\
    \ you just need to remember that the index represents how far from the beginning\
    \ of the array you want to reach. The first element is at distance zero from the\
    \ beginning of the array, so the index is zero. Similarly, the second element\
    \ is at distance one."
  raw: '## Pointers


    A pointer is an address to a location in memory. Objective-C provides convenient
    access to memory addresses through the use of pointers to particular types. The
    main advantage of pointer types is that they allow you to interpret any memory
    address as the potential location of a variable. Therefore, you are not limited
    to use variables that have been previously declared: you can convert any memory
    location into data types that can be manipulated by algorithms.


    To declare a pointer, you start with an existing data type and apply the star
    character to the right of the desired data type. For example, you can define pointers
    for integers and doubles in the following way:


    `int *pointer_to_int;`


    `double *my_double_pointer;`


    Note


    A pointer declaration will merely define an address to a data type, but will not
    create any memory associated with that data type. For example, the variable pointer_to_`int`
    shown above has no integer variable associated to it. To be able to use a pointer
    you need first to have it pointing to valid memory.


    Once you have a pointer, you can use it to manipulate existing variables. You
    can do this by using two operators: the star operator is used to retrieve the
    data stored in the memory at which it is pointed. For example,


    `void print_value(int *pint)`


    `{`


      `NSLog(@"the value is %d", *pint);`


    `}`


    The expression `*pint` means that you are dereferencing the value stored in the
    memory pointed by `pint`. In summary, the star operator allows you to use a pointer
    in place of a variable of the given type.


    The second operator used with pointers is the address-of (ampersand) operator
    `&`. This operator is required to retrieve the memory address of an existing variable.
    When combined, the star operator and the address-of operator allow you to retrieve
    addresses from variables, and to access and modify data stored at these memory
    addresses. They provide the programmer with the basic tools necessary to manage
    memory in an application. Here is a simple example:


    `void modify_value(int *pint, int new_value)`


    `{`


       `*pint = new_value;`


    `}`


    `int width, height;`


    `void init_rectangle_dimensions()`


    `{`


       `modify_value(&width, 100);`


       `modify_value(&height, 50);`


       `NSLog(@"Now width = %d and height = %d", width, height);`


    `}`


    This code is using a pointer to modify the content of an integer variable. This
    indirect operation is useful because now the same code can be use to modify any
    integer variable, regardless of its actual name in the program.


    ### Parameter Passing


    This is a good moment to explain the idea of parameter passing conventions. Each
    function is defined by its name, parameters, and return type. Parameters passed
    to functions in Objective-C are always copied. This means, for example, that when
    passing an integer number to a function, the value used inside the function is
    just a copy of the original integer. In particular, if you modify the value of
    a parameter, you are not changing the value of the original variable that was
    passed. For example,


    `void try_to_change(int value)`


    `{`


       `value = 10; // a new value`


       `NSLog(@"value is now %d", value);`


    `}`


    `void use_change()`


    `{`


       `int orig_value = 20;`


       `try_to_change(orig_value);`


       `NSLog(@"after change %d", orig_value);`


    `}`


    If you run this function, you’ll see that the stored value didn’t change after
    the function `try_to_change` was executed. We say that the variable `orig_value`
    was passed by value to `try_to_change`. If you really want to change the value
    of a variable, you need to have not just a copy of it, but its memory address.
    This can be done using a pointer, as shown in the previous section. So, the correct
    thing to do in this example is


    `void really_change(int *value)`


    `{`


       `*value = 10; // a new value`


       `NSLog(@"value is now %d", *value);`


    `}`


    `void use_change()`


    `{`


       `int orig_value = 20;`


       `really_change(&orig_value);`


       `NSLog(@"after change %d", orig_value);`


    `}`


    Notice that now, instead of passing a value around, you are passing a memory address,
    so that you will be able to access that memory using the star operator. After
    the function `try_to_change` is called, the value of `orig_value` has changed
    from `20` to `10`, unlike the previous time. This means that the function `really_change`
    is performing the modification on the contents of the original variable, not just
    on a copy.


    Note


    Understanding how the language uses pointer parameters is important because this
    is also how objects are manipulated. All objects in Objective-C are created and
    used as pointers.


    ## Arrays


    An array is a way to store multiple values of the same type in a sequential manner.
    For example, suppose you wanted to store the ages for all students in a school.
    One way of doing this is to create a large number of variables to store that data,
    such as


    `int age1, age2, age3; // ... more here`


    This arrangement can be easily seen as too inflexible to maintain. Clearly this
    will require code that stores data in different variables.


    `age1 = 11;`


    `age2 = 9;`


    `// ... more here`


    This is not only inconvenient but also error prone. Arrays provide a way to solve
    this problem. If all you need is to store students’ ages, you can create an array
    of 1,000 integers that can be indexed by values from `0` to `999`.


    `int ages[1000];`


    Now you can write code that accesses and modifies the array as needed. For example,
    to store all ages, suppose you have a function returning the number of students,
    and another function returning the age of student number `i`. Then, you can write
    the following code to calculate the average age:


    `void average_student_age()`


    `{`


       `int total_age = 0;`


       `int max = number_of_students();`


       `int i;`


       `double denominator = max;`


       `for (i=0; i<max; ++i)`


       `{`


          `ages[i] = age_of_student(i);`


       `}`


       `for (i=0; i<max; ++i)`


       `{`


          `total += age[i];`


       `}`


       `return total / denominator;`


    `}`


    This function first reads the data into the `ages` array, and then calculates
    the average (the total age divided by the number of students).


    The array declaration syntax is similar to the way single variables are declared.
    However, to create an array of a particular size, you type the number of elements
    between square brackets. In the example above, you have an array with 1,000 integers.
    In order to declare an array, you need a fixed size, such as `1,000`. For variable
    sized arrays, you will later use Objective-C container classes such as `NSArray`,
    which provides a more flexible mechanism for array creation and resizing.


    To access the elements of an array, you just need to address the required element
    using brackets. For example, to assign a value to the third element of the array,
    you need to use the following code:


    `ages[2] = value;`


    This code fragment will store the contents of `value` to the third position of
    the array `ages`.


    Note


    Objective-C arrays are zero-based, so the first element is located at position
    zero. This may be confusing for people learning the language, but you just need
    to remember that the index represents how far from the beginning of the array
    you want to reach. The first element is at distance zero from the beginning of
    the array, so the index is zero. Similarly, the second element is at distance
    one.'
  trans: "\n# 指针\n\n指针是内存中某个地址的标识。Objective-C 通过使用指向特定类型的指针，提供了一种便捷的方式来访问内存地址。指针类型的主要优势在于，它能让你将任何内存地址解读为变量的潜在位置。因此，你不再局限于使用预先声明的变量：你可以将任何内存位置转换为可由算法操控的数据类型。\n\
    \n声明指针时，你需要从一个已有的数据类型开始，并在该数据类型的右侧加上星号字符。例如，你可以按照以下方式为整数和双精度浮点数定义指针：\n\n`int *pointer_to_int;`\n\
    \n`double *my_double_pointer;`\n\n**注意：** 指针声明仅仅定义了一个指向某数据类型的地址，但并不会创建与该数据类型关联的任何内存。例如，上面展示的变量\
    \ `pointer_to_int` 并没有与之关联的整数变量。要能够使用指针，首先需要让它指向有效的内存。\n\n一旦拥有了指针，你就可以用它来操控已有的变量。这可通过使用两个运算符来实现：星号运算符用于检索指针所指向内存中存储的数据。例如：\n\
    \n```\nvoid print_value(int *pint)\n{\n  NSLog(@\"the value is %d\", *pint);\n\
    }\n```\n\n表达式 `*pint` 表示你正在解引用 `pint` 所指向内存中存储的值。简而言之，星号运算符允许你使用指针来替代给定类型的变量。\n\
    \n与指针配合使用的第二个运算符是取地址运算符（与符号）`&`。该运算符用于获取现有变量的内存地址。结合使用时，星号运算符和取地址运算符允许你从变量获取地址，并访问和修改存储在这些内存地址中的数据。它们为程序员提供了在应用程序中管理内存所必需的基本工具。这里有一个简单的例子：\n\
    \n```\nvoid modify_value(int *pint, int new_value)\n{\n   *pint = new_value;\n\
    }\n\nint width, height;\nvoid init_rectangle_dimensions()\n{\n   modify_value(&width,\
    \ 100);\n   modify_value(&height, 50);\n   NSLog(@\"Now width = %d and height\
    \ = %d\", width, height);\n}\n```\n\n这段代码使用指针来修改一个整数变量的内容。这种间接操作很有用，因为现在同一段代码可以被用来修改任何整数变量，无论它在程序中的实际名称是什么。\n\
    \n### 参数传递\n\n现在是解释参数传递约定概念的好时机。每个函数都由其名称、参数和返回类型定义。在 Objective-C 中，传递给函数的参数总是会被拷贝。这意味着，例如，当将一个整数传递给函数时，函数内部使用的值仅仅是原始整数的一个副本。特别是，如果你修改了参数的值，你并不会改变被传入的原始变量的值。例如：\n\
    \n```\nvoid try_to_change(int value)\n{\n   value = 10; // 一个新值\n   NSLog(@\"\
    value is now %d\", value);\n}\n\nvoid use_change()\n{\n   int orig_value = 20;\n\
    \   try_to_change(orig_value);\n   NSLog(@\"after change %d\", orig_value);\n\
    }\n```\n\n如果你运行这个函数，你会看到在执行了 `try_to_change` 函数之后，存储的值并没有改变。我们说变量 `orig_value`\
    \ 是按值传递给 `try_to_change` 的。如果你真的想要改变一个变量的值，你需要的不仅仅是它的副本，而是它的内存地址。这可以使用指针来实现，如上一节所示。因此，在这个例子中，正确的做法是：\n\
    \n```\nvoid really_change(int *value)\n{\n   *value = 10; // 一个新值\n   NSLog(@\"\
    value is now %d\", *value);\n}\n\nvoid use_change()\n{\n   int orig_value = 20;\n\
    \   really_change(&orig_value);\n   NSLog(@\"after change %d\", orig_value);\n\
    }\n```\n\n注意，现在你传递的不再是一个值，而是一个内存地址，这样你就可以使用星号运算符来访问那块内存。在调用函数 `really_change`\
    \ 之后，`orig_value` 的值从 `20` 变成了 `10`，这与之前那次不同。这意味着函数 `really_change` 是在原始变量的内容上执行修改，而不仅仅是在其副本上。\n\
    \n**注意：** 理解语言如何使用指针参数很重要，因为这也是操作对象的方式。Objective-C 中的所有对象都是作为指针来创建和使用的。\n\n##\
    \ 数组\n\n数组是一种按顺序存储多个相同类型值的方式。例如，假设你想存储学校里所有学生的年龄。一种方法是创建大量变量来存储这些数据，例如：\n\n`int\
    \ age1, age2, age3; // ... 这里还有更多`\n\n这种安排很容易被视为过于僵化而难以维护。显然，这将需要将数据存储到不同变量中的代码。\n\
    \n`age1 = 11;`\n`age2 = 9;`\n`// ... 这里还有更多`\n\n这不仅不方便，而且容易出错。数组提供了一种解决这个问题的方法。如果你只需要存储学生的年龄，你可以创建一个包含\
    \ 1000 个整数的数组，这些整数可以通过从 `0` 到 `999` 的值进行索引。\n\n`int ages[1000];`\n\n现在，你可以编写代码来根据需要访问和修改数组。例如，为了存储所有年龄，假设你有一个返回学生人数的函数，以及另一个返回编号为\
    \ `i` 的学生年龄的函数。然后，你可以编写以下代码来计算平均年龄：\n\n```\nvoid average_student_age()\n{\n  \
    \ int total_age = 0;\n   int max = number_of_students();\n   int i;\n   double\
    \ denominator = max;\n   for (i=0; i<max; ++i)\n   {\n      ages[i] = age_of_student(i);\n\
    \   }\n   for (i=0; i<max; ++i)\n   {\n      total += age[i];\n   }\n   return\
    \ total / denominator;\n}\n```\n\n这个函数首先将数据读入 `ages` 数组，然后计算平均值（总年龄除以学生人数）。\n\n\
    数组的声明语法类似于单个变量的声明方式。但是，要创建一个特定大小的数组，你需要在方括号内输入元素的数量。在上面的例子中，你有一个包含 1000 个整数的数组。为了声明数组，你需要一个固定的大小，例如\
    \ `1000`。对于可变大小的数组，稍后你将使用 Objective-C 的容器类，例如 `NSArray`，它为数组的创建和调整大小提供了更灵活的机制。\n\
    \n要访问数组的元素，你只需要使用括号来定位所需的元素。例如，要给数组的第三个元素赋值，你需要使用以下代码：\n\n`ages[2] = value;`\n\
    \n这段代码片段会将 `value` 的内容存储到数组 `ages` 的第三个位置。\n\n**注意：** Objective-C 数组是从零开始索引的，因此第一个元素位于位置零。对于学习该语言的人来说，这可能会造成混淆，但你只需要记住，索引表示你想从数组起始位置偏移多远。第一个元素距数组起始位置的距离为零，因此索引为零。类似地，第二个元素的距离为一。\n"
- fmt: "### Arrays and Pointers\n\nOne of the most important properties of arrays\
    \ in Objective-C is that they are closely related to pointers. The relationship\
    \ between these two concepts comes from the way the memory for arrays is created\
    \ in an Objective-C application. Arrays are just stored as memory blocks, with\
    \ elements that are accessed based on the distance to the beginning of the array.\n\
    \nFor example, consider the array `ages` described in the previous example. When\
    \ reading the array declaration, the compiler will reserve a memory area large\
    \ enough to contain as many elements as requested.\n\nTo access a particular element,\
    \ the compiler will take the address of the beginning of the array and add a particular\
    \ displacement. Therefore, the following code is possible:\n\n```\nint ages[1000];\n\
    \n// some code to initialize the array ...\n\nvoid print_item(int pos)\n\n{\n\n\
    \   int *pointer = ages;\n\n   NSLog(@\"item value: %d is the same as %d\", *(pointer\
    \ + pos), ages[pos]);\n\n}\n```\n\nWhat this code illustrates is the fact that\
    \ an array can be converted to a pointer of a similar type. Also, adding a value\
    \ to a pointer is similar to accessing a particular element of an array. So, the\
    \ code above is equivalent to the following, in which the array is accessed differently:\n\
    \n```\nint ages[1000];\n\nvoid print_item(int pos)\n\n{\n\n   int *pointer = ages;\n\
    \n   NSLog(@\"item value: %d is the same as %d\", pointer[pos], (ages+pos));\n\
    \n}\n```\n\nGiven the way that arrays are stored in memory by Objective-C compilers,\
    \ using pointers to access array elements is not only possible, but also frequently\
    \ done by professional programmers.\n\n## Summary\n\nIn this chapter we provided\
    \ a quick overview of the main concepts common to both the C and Objective-C languages.\
    \ While we don’t have space to describe every detail of the syntax and semantics\
    \ of the C language, the basic elements discussed here can be used to create complex\
    \ and useful applications.\n\nThe programming methodology of the C language, structured\
    \ programming, calls for the division of programs into related functions. In Objective-C,\
    \ on the other hand, the main concept is the decomposition of programs into classes,\
    \ which encapsulate both the code as well as the data used by their methods. Moreover,\
    \ Objective-C provides a flexible mechanism for runtime code execution through\
    \ the concept of message passing. This is the main topic of the next chapter,\
    \ in which you will begin the exploration of the concepts of object-oriented programming.\n\
    \n# 2. Classes\n\n**Abstract**\n\nIn an object-oriented programming language such\
    \ as Objective-C, classes are the building blocks of applications. They are the\
    \ syntactic construct used to define objects, which are composed of methods and\
    \ variables. For programmers new to the language, it is important to understand\
    \ that object-oriented programming (OOP) features are the keystone of all techniques\
    \ used in Objective-C.\n\nWithout a proper understanding of object-oriented design\
    \ concepts, it is difficult to become proficient in the libraries used on Mac\
    \ OS X or iOS, since they make heavy use of OOP. For this reason, I start this\
    \ chapter with a concise overview of OOP. One of my first objectives is to explain\
    \ how OOP differs from other popular programming paradigms. While structured programming\
    \ tries to decompose programs by means of simple functions, OOP considers the\
    \ combination of functions and data as the real defining concept of programming\
    \ abstraction. Therefore, OOP languages avoid the separation of data from the\
    \ methods operating on that data. Another great advantage of programming in terms\
    \ of objects is the idea of sending a message to other objects and letting these\
    \ objects decide on the best way to respond to the message.\n\nAfter an initial\
    \ introduction to OOP, this chapter gives a detailed description of the concept\
    \ of classes in Objective-C. Special attention is given to the syntactical aspects—especially\
    \ how to create new objects from existing classes. I explain how to associate\
    \ data to these classes, and then proceed to add methods to the objects. Methods\
    \ in Objective-C can also be associated to the class itself, as you will see in\
    \ the examples.\n\nOne of the main features of classes in Objective-C is how they\
    \ can be neatly decomposed into two separate files: one containing the interface\
    \ and one containing the implementation details. This clear separation makes it\
    \ possible to share only the important aspects of a class, while hiding any implementation\
    \ information that is not needed by clients. In this chapter, you will see all\
    \ the details of the syntax used to create classes that provide this simple interface\
    \ to other parts of the application.\n\nFinally, I provide examples of how to\
    \ define instance properties, a simple mechanism that exposes data to other objects\
    \ while retaining control over how that data is interpreted and saved. These are\
    \ the main building blocks of UI objects, and learning how to define them will\
    \ enable you to create flexible classes that can respond immediately to changes\
    \ in other parts of the application. For example, properties are used to maintain\
    \ separate views of the same object, while making sure that updates are immediately\
    \ reflected in each view of the data.\n\n## Object-Oriented Programming\n\nThe\
    \ primary goal of this chapter is to discuss the main features of Objective-C\
    \ targeted at object-oriented programming. OOP is a style of programming in which\
    \ we are encouraged to organize code into classes defined according to the desired\
    \ functionality. The word \"class\" is a good metaphor since we are trying to\
    \ classify code and data into suitable abstractions.\n\nUnlike standard implementation\
    \ technologies such as structured programing, OOP provides a flexible mechanism\
    \ for sending messages to other objects in order to execute code. Instead of directly\
    \ calling a function, as we have been doing up to this point, OOP applications\
    \ just tell other objects what they would like to be executed. By sending messages\
    \ instead of using functions defined at compilation time, objects are free to\
    \ dynamically modify the way they respond to messages.\n\nThe messaging mechanism\
    \ provided by OOP also facilitates the separation of concerns between areas of\
    \ an application. Using this strategy, an object can concentrate only on the basic\
    \ functionality it provides. At the same time, objects can request any additional\
    \ functionality from other existing objects in the system.\n\nA class can be interpreted\
    \ as a prototype for an object. In Objective-C, a class is defined in two parts,\
    \ which are introduced by the keywords `@interface` and `@implementation`. These\
    \ definitions encompass all the information needed by the language in order to\
    \ create runtime objects.\n\nAn object is the runtime instantiation of a particular\
    \ class. In most of the contexts discussed in this book, an instance is equivalent\
    \ to a runtime object. Therefore, you see that objects are created through the\
    \ explicit instantiation of existing classes."
