    ### NSString


    `NSString` stores an immutable sequence of characters. Most textual data in an
    Objective-C application is stored as `NSString` objects. The `NSString` class
    provides a rich interface; in fact, many frameworks choose to enrich the `NSString`
    interface with additional methods through the use of protocols. Here is a list
