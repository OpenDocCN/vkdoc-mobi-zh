    \ Xcode 之类的图形工具进行操作。对象通过编辑器创建和修改，但可以被保存并在稍后通过你的应用程序加载。\n\n在本章中，我首先概述了 Cocoa 中\
    \ UI 类的层级结构。它们都派生自`NSResponder`类，该类负责处理基于 UI 的事件。其他重要类，如`NSWindow`和`NSView`，实现了系统所有窗口和视图共享的附加特性。\n\
    \n最后，我给出一个完整的应用程序示例，该应用程序处理来自菜单和直接交互（如键盘按键和鼠标移动）的用户输入。该应用程序用于在屏幕上绘制表示一组点和连接线的图形。你已经学习了如何使用贝塞尔路径在屏幕上绘制项目，以及如何执行其他常见任务，如绘制字符串。\n\
    \n在下一章中，我将讨论 Cocoa 中可用的移动编程支持。通过 Cocoa Touch（iOS 平台可用的移动扩展），Objective-C 提供了在 iPhone\
    \ 和 iPad 等移动设备上运行代码所需的一切。为此，你将使用本章介绍的大部分概念，以及 Cocoa Touch 框架中的一组专用类。\n"
- fmt: '# 17. Building iOS Apps


    **Abstract**


    `Cocoa Touch` is the `Objective-C` framework used to create rich mobile applications
    for iOS, the operating system that powers the iPhone, iPad, and iPod touch. While
    using technologies that are similar to the desktop-based `Cocoa`, `Cocoa Touch`
    provides a simplified architecture in comparison to the full-featured Mac OS X
    frameworks. `Cocoa Touch` also provides access not only to Touch-based UI controls,
    but also to mobile resources such as the camera and the accelerometer. With `Cocoa
    Touch`, developers have access to the hardware managed by iOS, including many
    features that are not available to Mac OS X applications.


    In this chapter, you will get an overview of the programming environment for developing
    mobile applications with Xcode. I start the discussion with some information about
    the difference between mobile apps and full-featured applications written for
    Mac OS X. You will learn about the new UI controls that have been developed specifically
    for Touch-based interfaces. You will also learn how to create new apps and deploy
    these apps to iOS targets.


    Finally, I will conclude the chapter with a complete example, which shows how
    to use `Objective-C` to interact with several important classes included in `Cocoa
    Touch`. This example will also show you some fundamental concepts of graphical
    iOS programming such as animations. Additionally, it will show you how to interact
    with Touch-based controls and respond to events in a mobile device.


    ## iOS Programming


    Creating applications for iOS has many similarities with desktop application development.
    First, you will be using the same programming language, `Objective-C`, with some
    of the same base libraries, including all features available in the Foundation
    framework. Common classes such as `NSArray`, `NSDictionary`, and many others in
    the Foundation framework remain unchanged, and will work as described in the first
    part of this book.


    On the other hand, there are several important differences that a programmer needs
    to consider when creating iOS applications. Understanding these differences is
    necessary to develop effective apps for iOS.


    ### Memory Limitations


    First, there is the issue of memory usage. In a modern desktop operating system
    such as Mac OS X, the memory available is plentiful and there are few situations
    where you need to worry about it. For example, unless you are writing software
    to manipulate video or other large data files, you never need to worry about memory
    usage. In particular, you almost never have to consider the memory consumed by
    normal elements of the graphical interface such as UI controls, images, or small
    sound files.


    This is not the case on mobile devices. They have limited memory, and some popular
    models of iPhones and iPod touch don’t have enough resources to run every kind
    of application you may conceive. Therefore, you need to work with and around the
    limitations of the platform, and make sure that your app is using resources wisely.


    Another reason mobile apps use memory differently is that the system doesn’t employ
    virtual memory. Virtual memory is a concept created for desktop machines where,
    if you don’t have enough space, the system will swap part of what it has stored
    in memory to disk in order to create an additional memory area. This results in
    a large memory space, which is available to all applications (as long as they
    don’t use all memory at the same time). But this is not the case with mobile devices:
    their limitations don’t allow for a complex virtual memory system, so they need
    to work only with the memory that is directly available to them.


    ### Limited Multiprocessing


    Another difference manifests itself in the processing capabilities of these devices.
    While it is possible to have multiple applications working at the same time in
    a desktop machine, mobile devices with iOS limit the amount of multitasking it
    can perform at any time. This is done in order to conserve power in the device,
    and to allow users to run longer periods without recharging the battery. This
    is a point, however, that has changed in the last few years: initially, Apple
    didn’t allow any multitasking on iOS. While new generations of the system have
    introduced background tasks, for example, it still doesn’t have the same ability
    for concurrency as in Mac OS X. As a consequence, it is still important to conserve
    processing resources in your mobile apps.


    Another issue that you should consider is app responsiveness. Remember that app
    users are trying to access information quickly, so they don’t have the attention
    span needed to wait for long loading times, as has become common for desktop applications.
    For example, a desktop user is willing to wait 30 seconds for Photoshop to start
    because he or she will use that program for several hours. But an app user is
    not going to interact with your app for more than a few minutes or even seconds.
    It doesn’t make sense to wait for the load time if you just want to tweet something
    or check the weather.


    These considerations relating to limited memory, limited amount of multiprocessing,
    and the required short loading times make the design of mobile apps very different
    from desktop applications. This means that you can rarely take a desktop application
    and convert it directly to iOS (even though a lot of the code may compile). You
    can still use a lot of your code, but it needs to be employed in a context where
    the design of the app makes sense as part of a mobile environment.


    ## UI Classes in iOS


    Another aspect that marks a difference between mobile and desktop applications
    is the way user input is processed. Desktop applications GUIs are primarily driven
    by mouse and keyboard. These two input devices, however, don’t exist on iOS. Although
    it is possible to attach a keyboard to an iOS device, it is awkward to type on
    most iOS apps. And the use of a mouse pointer has been replaced by direct manipulation
    by users.


    This difference is reflected in the style of the UI used in mobile applications.
    To support these differences between iOS and Mac OS X programming, iOS introduced
    a set of UI controls that are tailored to be used with gestures instead of the
    mouse and keyboard. These controls have been encapsulated as a set of unique UI
    classes defined by `Cocoa Touch`. The classes are collected and shipped in an
    `Objective-C` framework called `UIKit`.'
