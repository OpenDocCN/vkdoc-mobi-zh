  trans: '

    # 16. 构建 OS X GUI 应用程序


    ## 摘要


    `Objective-C` 最常用于实现采用 Cocoa 框架的应用程序。作为一名 `Objective-C` 程序员，你几乎必然会参与 iOS 应用或完整
    OS X 应用的开发。在本章中，我将讨论 OS X 上的应用程序开发。为此，你将学习 Cocoa UI，即用于开发符合 OS X UI 标准的图形化应用程序的框架。


    `Xcode` 提供了一种面向对象的方法来创建图形界面，在充分利用其功能之前，需要先深入理解这种方法。与其他环境不同，使用 `Xcode` 创建的 GUI
    应用并非通过代码生成（尽管必要时也可以这样做）。相反，对象是通过图形化编辑器设计并保存到文件中，然后由 Cocoa 应用程序直接加载。


    此类图形化应用程序依赖于 Cocoa 提供的窗口、视图和控制对象的动态行为。通过标准的 `Objective-C` 技术，这些对象可以在 `Xcode` 中进行操作，随后以
    nib 文件格式加载到你的应用程序中。从文件加载 nib 时，`Objective-C` 保证保存的属性和连接在运行时依然存在。


    首先，我将解释如何在 `Xcode` 中创建一个示例 UI 应用程序。接着，你将看到 Cocoa 框架如何用于保存和加载图形界面的状态，包括属性和对象之间的连接，以便你能花更少的时间编码，用更直观的方式设计应用的
    UI。我还将讨论基于 `NSResponder` 类的 UI 对象层次结构。


    在本章的最后部分，我将提供一个用 Cocoa 编写的完整 UI 应用程序示例。该应用能够接收来自系统菜单的事件。你还将学习如何使用 Cocoa 库在屏幕上进行绘制，以及如何响应鼠标移动和按键等用户事件。


    ## 使用 Cocoa 创建 UI 概述


    在 OS X 中创建图形化应用程序的第一步是规划 UI 的外观。对于这个初始设计，你可以使用任何现有的 UI 设计应用程序。有些团队使用 Photoshop
    等专业图形软件，但市场上还有许多其他选择。如果你在小团队中工作或是一位独立开发者，你完全可以使用手绘设计图来指导完成这一初始阶段。


    随后，需要将这个 UI 设计成果转化为实现，开发者将尝试使用编程工具来达到 UI 设计文档中指定的要求。这一阶段的工作将产生一个可使用的界面，可用于功能测试。之后，这个版本将被添加编程功能，逐步实现完整的应用程序。


    ### 设置 Cocoa 项目


    在 `Objective-C` 中创建一个新项目很简单，完全可以在 IDE 内完成。你可以通过前往 **文件 ➤ 新建 ➤ 项目**（或使用键盘快捷键 **⌘+N**）来指示
    `Xcode` 调用新建项目向导。出现的项目向导会列出你本地 `Xcode` 配置中所有可用的项目类型。该向导允许你根据所需的项目类型来选择新项目。项目类型列表根据目标操作系统进行划分。对于
    Mac OS X，`Xcode` 中有以下可用的项目类型（见图 16-1）：


    - **应用程序**：这是最终用户开发者创建面向用户应用程序时使用的主要项目类型。如你接下来所见，其中既有图形化应用，也有控制台应用。

    - **框架和库**：这些项目类型用于创建可供其他应用程序后续使用的软件组件。框架是一个用 `Objective-C` 创建的库，可以更轻松地集成到面向对象的应用程序或其他库中。你还可以选择创建基于
    C 或 C++ 的库，以便其他语言导入。

    - **应用程序插件**：插件是一种特殊类型的库，可在运行时被应用程序导入。这使得应用程序能够根据需要添加或删除插件，甚至从网站安装新插件。由于插件使用的
    API 取决于目标应用程序的内部设计，因此生成的插件是特定于应用程序的。在 `Xcode` 提供的标准选项中，你可以为通讯录、安装器应用程序和 Automator
    创建插件。如果你的机器上安装了第三方供应商的软件，可能还会提供其他类型的插件。

    - **系统插件**：这些插件用于扩展操作系统或 Mac OS X 的一些基础应用程序，例如 Finder。在其他选项中，你可以创建 Mac OS X 插件，用作系统偏好设置应用程序中的偏好设置面板、Finder
    的快速查看插件、屏幕保护程序或 Spotlight 导入器。


    ![A978-1-4302-5906-0_16_Fig1_HTML.jpg](img/A978-1-4302-5906-0_16_Fig1_HTML.jpg)


    **图 16-1.** 为 Mac OS X 选择一个新的 Xcode 项目


    在本章中，我们关注的是位于**应用程序**选项卡下的应用创建。有以下选项可用：


    - **Cocoa 应用程序**：此项目类型可用于创建 Mac OS X 中传统的基于窗口的应用程序。我将以此类项目作为示例，因为它是最常用于创建最终用户应用程序的类型。

    - **Cocoa-AppleScript 应用程序**：此项目类型用于创建以 AppleScript 编写的应用程序，AppleScript 是苹果为 Mac
    OS X 开发的一种脚本语言。AppleScript 如今已不太流行，但仍可用于支持 Mac OS X 中的某些技术。

    - **命令行工具**：使用此项目类型创建仅在命令行中运行的应用程序。这些应用不需要基于 `Objective-C`，也可以用其他语言（如 C 或 C++）编写。不过，仍然可以使用
    `Objective-C` 的基础框架来简化命令行应用的开发，特别是当它们需要与仅通过 `Objective-C` 框架提供的 Mac OS X 技术交互时。


    选择新应用程序并点击**下一步**按钮后，系统会显示一个屏幕，要求提供创建项目所需的一些基本信息，包括文件存放的目录。

