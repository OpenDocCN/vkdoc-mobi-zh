- fmt: "### Checking for Protocol Compliance\n\nWhile the technique presented above\
    \ works well as a way of implementing a protocol, it suffers from a small drawback.\
    \ By creating new categories on the `NSObject` class, you are making general message\
    \ dispatching a little more inefficient for everyone else. The reason is that\
    \ such an informal protocol requires that all classes derived from `NSObject`\
    \ contain the two methods specified. That can become a problem when the number\
    \ of protocols increases. It is not difficult to visualize a situation where most\
    \ of the methods in the dispatch table for `NSObject` would be composed of empty\
    \ protocol methods.\n\nTo avoid this, you can check at runtime if the required\
    \ methods exist, instead of making these methods become part of every object in\
    \ the system. This requires a little more work on the part of the code that sends\
    \ the messages, but it can definitely make things easier for everyone else using\
    \ that class. Here’s a modified version of the `InvestmentAdvisor` class that\
    \ checks if the loan source supports the required methods:\n\n```\n- (void) findLoan:(float)amount\n\
    {\n        SEL canLendSel = @selector(canLend:);\n        SEL lendReqSel = @selector(lendRequest:toLoaner:);\n\
    \        if([self.loanSource respondsToSelector:canLendSel] &&\n           [self.loanSource\
    \ respondsToSelector:lendReqSel])\n        {\n                if ([self.loanSource\
    \ canLend:amount])\n                {\n                        BOOL result = [self.loanSource\
    \ lendRequest:amount\n                                                       \
    \ toLoaner:@\"InvestmentClient\"];\n                        if (result)\n    \
    \                    {\n                                NSLog(@\"The loan application\
    \ was accepted\");\n                        }\n                }\n        }\n\
    }\n```\n\nThe new version of `findLoan:` differs from the previous one in the\
    \ test at the beginning of the method. First, you create two selectors for the\
    \ methods you are trying to invoke.\n\n**Note**\n\nA selector is the name given\
    \ to the internal representation of a method. With selectors it is possible to\
    \ manipulate and get information about a method. For example, it is possible to\
    \ answer the question “Is this method implemented by a given class?” The type\
    \ of a selector variable is always `SEL`.\n\nOnce the selectors have been retrieved,\
    \ you use the `respondsToSelector:` message to determine if the object that was\
    \ passed as a `loanSource` can respond to the requests you want to make. If that\
    \ is true, you can execute the same code contained in the original version of\
    \ `findLoan:`.\n\nUsing this new definition for `findLoan:`, you can now remove\
    \ the category `MoneyLender` from the definitions. Since you will only call any\
    \ of the methods in that category when they are defined as part of the given object,\
    \ there is no need to add an empty version of such methods to each object of type\
    \ `NSObject`.\n\nA final glitch with this new version of `findLoan:` will be noticed\
    \ after you completely remove the `MoneyLender` category; the compiler will display\
    \ a warning about not knowing if `loanSource` can respond to the messages sent.\
    \ This happens because there is no way to know at compilation time if the methods\
    \ can be successfully dispatched. You shouldn’t worry about this, though, because\
    \ the `if` statement guarantees that this will be true at runtime. It is possible\
    \ to avoid these warnings, however, by using runtime functions to call the selectors\
    \ directly. Don’t worry about this for now, however.\n\n### Formal Protocols\n\
    \nCalling methods that have been defined in an informal protocol, as you did above,\
    \ provides a clear solution for the problem of defining an interface. However,\
    \ by using `NSObject` categories or checking if the object can respond to a particular\
    \ message, you are just being creative about the runtime flexibility of Objective-C.\
    \ The truth is that such mechanisms don’t explicitly show the intention of the\
    \ code, which is defining a well-established protocol between objects.\n\nTo improve\
    \ the readability and simplify coding, Apple introduced a formal syntax for protocols,\
    \ using the keyword `@protocol`. Employing this syntax, the previous example could\
    \ be written with the following protocol declaration:\n\n```\n@protocol MoneyLender\n\
    - (BOOL) canLend:(float)amount;\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;\n\
    @end\n```\n\nAt a first impression, there is not much difference here between\
    \ the previous declaration, based on a category, and the formal protocol declaration,\
    \ other than the obvious fact that the keyword `@protocol` is used. However, once\
    \ `MoneyLender` is declared in that way, it can be used by client classes that\
    \ want to implement the methods contained in the protocol.\n\nThus, a major difference\
    \ in such a declaration is that you want it to become known by client classes,\
    \ by placing the protocol declaration in a header file. In contrast, an informal\
    \ protocol defined as a category of `NSObject` can be kept as private to the class\
    \ using it.\n\nAnother difference is in how classes implement the protocol. With\
    \ informal protocols, the only thing you need to do is to add a valid implementation\
    \ of the required methods. With formal protocols, you need to explicitly indicate\
    \ that the class implements the protocol. This is done using angle brackets to\
    \ enclose the list of protocols, right after the name of the base class. Here\
    \ is an example:\n\n```\n@interface AccreditedLoanSource : NSObject <MoneyLender>\n\
    {\n// ivars go here\n}\n// other methods here\n@end\n```\n\nThe class `AccreditedLoanSource`\
    \ has an interface definition similar to other classes, with the difference that\
    \ it implements the `MoneyLender` protocol. When such a protocol is identified\
    \ as part of the interface, the Objective-C compiler checks if the required methods\
    \ in the protocol are part of the implementation. Here is an example of the implementation\
    \ section, with just two implementation stubs:\n\n```\n// file AccreditedLoanSource.m\n\
    @implementation AccreditedLoanSource\n- (BOOL) canLend:(float)amount\n{\nreturn\
    \ YES;\n}\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId\n{\n\
    return YES;\n}\n@end\n```\n\n**Note**\n\nFrom the point of view of code packaging,\
    \ formal protocols have another difference with regard to informal protocols.\
    \ In the later, it was not necessary to provide a public interface through a header\
    \ file. But with formal protocols, this is not only desirable, but also necessary.\
    \ The compiler needs to see a declaration of the protocol when the interface for\
    \ the new class is defined.\n\nThe next step in the use of formal protocols is\
    \ defining variables and properties that guarantee that the protocol is implemented.\
    \ This is done by declaring a variable and using angle brackets after the type\
    \ of the variable. If all you want is an object implementing the methods in the\
    \ protocol, then it is customary to define the type of the object as `NSObject\
    \ <ProtocolName>`.\n\nThe modified version of `InvestmentAdvisor` using protocols\
    \ can be written as\n\n```\n@interface InvestmentAdvisor : NSObject\n{\n// other\
    \ ivars here\n}\n@property (nonatomic, retain) NSObject <MoneyLender> *loanSource;\n\
    - (BOOL) findLoan:(float)amount;\n@end\n\n@implementation InvestmentAdvisor\n\
    - (BOOL) findLoan:(float)amount\n{\nBOOL canLend = [self.loanSource canLend:amount];\n\
    if (canLend)\n{\nBOOL result = [self.loanSource lendRequest:amount\ntoLoaner:@\"\
    InvestmentClient\"];\nif (result)\n{\nNSLog(@\"The loan application was accepted\"\
    );\nreturn YES;\n}\n}\nreturn NO;\n}\n```"
  raw: '### Checking for Protocol Compliance


    While the technique presented above works well as a way of implementing a protocol,
    it suffers from a small drawback. By creating new categories on the `NSObject`
    class, you are making general message dispatching a little more inefficient for
    everyone else. The reason is that such an informal protocol requires that all
    classes derived from `NSObject` contain the two methods specified. That can become
    a problem when the number of protocols increases. It is not difficult to visualize
    a situation where most of the methods in the dispatch table for `NSObject` would
    be composed of empty protocol methods.


    To avoid this, you can check at runtime if the required methods exist, instead
    of making these methods become part of every object in the system. This requires
    a little more work on the part of the code that sends the messages, but it can
    definitely make things easier for everyone else using that class. Here’s a modified
    version of the `InvestmentAdvisor` class that checks if the loan source supports
    the required methods:


    `- (void) findLoan:(float)amount`


    `{`


            `SEL canLendSel = @selector(canLend:);`


            `SEL lendReqSel = @selector(lendRequest:toLoaner:);`


            `if([self.loanSource respondsToSelector:canLendSel] &&`


               `[self.loanSource respondsToSelector:lendReqSel])`


            `{`


                    `if ([self.loanSource canLend:amount])`


                    `{`


                            `BOOL result = [self.loanSource lendRequest:amount`


                                                            `toLoaner:@"InvestmentClient"];`


                            `if (result)`


                            `{`


                                    `NSLog(@"The loan application was accepted");`


                            `}`


                    `}`


            `}`


    `}`


    The new version of `findLoan:` differs from the previous one in the test at the
    beginning of the method. First, you create two selectors for the methods you are
    trying to invoke.


    Note


    A selector is the name given to the internal representation of a method. With
    selectors it is possible to manipulate and get information about a method. For
    example, it is possible to answer the question “Is this method implemented by
    a given class?” The type of a selector variable is always SEL.


    Once the selectors have been retrieved, you use the `respondsToSelector:` message
    to determine if the object that was passed as a `loanSource` can respond to the
    requests you want to make. If that is true, you can execute the same code contained
    in the original version of `findLoan:`.


    Using this new definition for `findLoan:`, you can now remove the category MoneyLender
    from the definitions. Since you will only call any of the methods in that category
    when they are defined as part of the given object, there is no need to add an
    empty version of such methods to each object of type `NSObject`.


    A final glitch with this new version of `findLoan:` will be noticed after you
    completely remove the MoneyLender category; the compiler will display a warning
    about not knowing if `loanSource` can respond to the messages sent. This happens
    because there is no way to know at compilation time if the methods can be successfully
    dispatched. You shouldn’t worry about this, though, because the `if` statement
    guarantees that this will be true at runtime. It is possible to avoid these warnings,
    however, by using runtime functions to call the selectors directly. Don’t worry
    about this for now, however.


    ### Formal Protocols


    Calling methods that have been defined in an informal protocol, as you did above,
    provides a clear solution for the problem of defining an interface. However, by
    using `NSObject` categories or checking if the object can respond to a particular
    message, you are just being creative about the runtime flexibility of Objective-C.
    The truth is that such mechanisms don’t explicitly show the intention of the code,
    which is defining a well-established protocol between objects.


    To improve the readability and simplify coding, Apple introduced a formal syntax
    for protocols, using the keyword `@protocol`. Employing this syntax, the previous
    example could be written with the following protocol declaration:


    `@protocol MoneyLender`


    `- (BOOL) canLend:(float)amount;`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;`


    `@end`


    At a first impression, there is not much difference here between the previous
    declaration, based on a category, and the formal protocol declaration, other than
    the obvious fact that the keyword `@protocol` is used. However, once `MoneyLender`
    is declared in that way, it can be used by client classes that want to implement
    the methods contained in the protocol.


    Thus, a major difference in such a declaration is that you want it to become known
    by client classes, by placing the protocol declaration in a header file. In contrast,
    an informal protocol defined as a category of `NSObject` can be kept as private
    to the class using it.


    Another difference is in how classes implement the protocol. With informal protocols,
    the only thing you need to do is to add a valid implementation of the required
    methods. With formal protocols, you need to explicitly indicate that the class
    implements the protocol. This is done using angle brackets to enclose the list
    of protocols, right after the name of the base class. Here is an example:


    `@interface AccreditedLoanSource : NSObject <MoneyLender>`


    `{`


    `// ivars go here`


    `}`


    `// other methods here`


    `@end`


    The class `AccreditedLoanSource`has an interface definition similar to other classes,
    with the difference that it implements the `MoneyLender` protocol. When such a
    protocol is identified as part of the interface, the Objective-C compiler checks
    if the required methods in the protocol are part of the implementation. Here is
    an example of the implementation section, with just two implementation stubs:


    `// file AccreditedLoanSource.m`


    `@implementation AccreditedLoanSource`


    `- (BOOL) canLend:(float)amount`


    `{`


    `return YES;`


    `}`


    `- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId`


    `{`


    `return YES;`


    `}`


    `@end`


    Note


    From the point of view of code packaging, formal protocols have another difference
    with regard to informal protocols. In the later, it was not necessary to provide
    a public interface through a header file. But with formal protocols, this is not
    only desirable, but also necessary. The compiler needs to see a declaration of
    the protocol when the interface for the new class is defined.


    The next step in the use of formal protocols is defining variables and properties
    that guarantee that the protocol is implemented. This is done by declaring a variable
    and using angle brackets after the type of the variable. If all you want is an
    object implementing the methods in the protocol, then it is customary to define
    the type of the object as `NSObject <ProtocolName>`.


    The modified version of InvestmentAdvisor using protocols can be written as


    `@interface InvestmentAdvisor : NSObject`


    `{`


    `// other ivars here`


    `}`


    `@property (nonatomic, retain) NSObject <MoneyLender> *loanSource;`


    `- (BOOL) findLoan:(float)amount;`


    `@end`


    `@implementation InvestmentAdvisor`


    `- (BOOL) findLoan:(float)amount`


    `{`


    `BOOL canLend = [self.loanSource canLend:amount];`


    `if (canLend)`


    `{`


    `BOOL result = [self.loanSource lendRequest:amount`


    `toLoaner:@"InvestmentClient"];`


    `if (result)`


    `{`


    `NSLog(@"The loan application was accepted");`


    `return YES;`


    `}`


    `}`


    `return NO;`


    `}`'
  trans: "\n### 检查协议合规性\n\n虽然上述技术作为实现协议的一种方法效果良好，但它有一个小缺点。通过在 `NSObject` 类上创建新类别，你在某种程度上降低了通用消息派发的效率，影响了其他所有人。原因是，这种非正式协议要求所有派生自\
    \ `NSObject` 的类都包含指定的两个方法。当协议数量增加时，这会成为一个问题。不难想象，`NSObject` 的派发表中的大部分方法都可能由空协议方法组成。\n\
    \n为了避免这种情况，你可以在运行时检查所需方法是否存在，而不是让这些方法成为系统中每个对象的一部分。这需要在发送消息的代码部分做更多工作，但肯定能让使用该类的其他开发者感到更轻松。下面是\
    \ `InvestmentAdvisor` 类的一个修改版本，它检查贷款源是否支持所需的方法：\n\n```\n- (void) findLoan:(float)amount\n\
    {\n        SEL canLendSel = @selector(canLend:);\n        SEL lendReqSel = @selector(lendRequest:toLoaner:);\n\
    \        if([self.loanSource respondsToSelector:canLendSel] &&\n           [self.loanSource\
    \ respondsToSelector:lendReqSel])\n        {\n                if ([self.loanSource\
    \ canLend:amount])\n                {\n                        BOOL result = [self.loanSource\
    \ lendRequest:amount\n                                                       \
    \ toLoaner:@\"InvestmentClient\"];\n                        if (result)\n    \
    \                    {\n                                NSLog(@\"The loan application\
    \ was accepted\");\n                        }\n                }\n        }\n\
    }\n```\n\n`findLoan:` 的新版本与旧版本的不同之处在于方法开头的测试。首先，为你要调用的方法创建两个选择器。\n\n**注意**\n\n\
    选择器是方法内部表示的名称。通过选择器，可以操作和获取关于方法的信息。例如，可以回答“某个类是否实现了这个方法？”这样的问题。选择器变量的类型始终是 `SEL`。\n\
    \n一旦检索到选择器，你就可以使用 `respondsToSelector:` 消息来确定作为 `loanSource` 传入的对象是否能够响应你想要发出的请求。如果结果为真，你就可以执行\
    \ `findLoan:` 原始版本中包含的相同代码。\n\n使用这个 `findLoan:` 的新定义，你现在可以从定义中移除 `MoneyLender`\
    \ 这个类别。由于只有当这些方法被定义为给定对象的一部分时，你才会调用该类别中的任何方法，因此无需向每个 `NSObject` 类型的对象添加这些方法的空实现。\n\
    \n在你完全移除 `MoneyLender` 类别后，会注意到 `findLoan:` 新版本的最后一个问题：编译器会显示一个警告，提示无法确定 `loanSource`\
    \ 是否能响应发送的消息。这是因为在编译时无法确定这些方法能否被成功派发。不过，你不必担心这个问题，因为 `if` 语句保证了在运行时这将是成立的。然而，通过使用运行时函数直接调用选择器，可以避免这些警告。但目前你暂时不需要为此担忧。\n\
    \n### 正式协议\n\n调用非正式协议中定义的方法，如同你之前所做的那样，为定义接口提供了一种清晰的解决方案。然而，通过使用 `NSObject` 类别或检查对象是否能响应特定消息，你只是利用了\
    \ Objective-C 运行时的灵活性。事实上，这种机制并未明确表达代码的意图，即定义对象之间一个完善的协议。\n\n为了提高可读性并简化编码，Apple\
    \ 引入了协议的正式语法，使用关键字 `@protocol`。采用这种语法，前面的示例可以用以下协议声明来编写：\n\n```\n@protocol MoneyLender\n\
    - (BOOL) canLend:(float)amount;\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;\n\
    @end\n```\n\n乍一看，这里基于类别的声明与正式协议声明之间没有太大区别，除了明显使用了 `@protocol` 关键字之外。然而，一旦以这种方式声明了\
    \ `MoneyLender`，那些希望实现协议中所包含方法的客户端类就可以使用它了。\n\n因此，这种声明的一个主要区别在于，你希望它能够被客户端类所知，因此需要将协议声明放在一个头文件中。相比之下，定义为\
    \ `NSObject` 类别的非正式协议可以保持为使用它的类的私有内容。\n\n另一个区别在于类如何实现协议。对于非正式协议，你唯一需要做的就是为所需方法提供一个有效的实现。对于正式协议，你需要明确指示该类实现了该协议。这是通过使用尖括号将协议列表括起来，并紧跟在基类名称之后来实现的。示例如下：\n\
    \n```\n@interface AccreditedLoanSource : NSObject <MoneyLender>\n{\n// ivars go\
    \ here\n}\n// other methods here\n@end\n```\n\n`AccreditedLoanSource` 类的接口定义与其他类类似，不同之处在于它实现了\
    \ `MoneyLender` 协议。当协议被标识为接口的一部分时，Objective-C 编译器会检查协议中的所需方法是否在实现中。以下是实现部分的一个示例，仅包含两个实现存根：\n\
    \n```\n// file AccreditedLoanSource.m\n@implementation AccreditedLoanSource\n\
    - (BOOL) canLend:(float)amount\n{\nreturn YES;\n}\n- (BOOL) lendRequest:(float)value\
    \ toLoaner:(NSString*)loanerId\n{\nreturn YES;\n}\n@end\n```\n\n**注意**\n\n从代码打包的角度来看，正式协议与非正式协议还有另一个区别。后者无需通过头文件提供公共接口。但对于正式协议，这不仅是可取的，而且是必要的。在定义新类的接口时，编译器需要看到协议的声明。\n\
    \n使用正式协议的下一步是定义变量和属性，以确保协议得到实现。这是通过声明一个变量并在变量类型后使用尖括号来完成的。如果你只需要一个实现协议中方法的对象，那么通常将对象类型定义为\
    \ `NSObject <ProtocolName>`。\n\n使用协议的 `InvestmentAdvisor` 的修改版本可以写成：\n\n```\n\
    @interface InvestmentAdvisor : NSObject\n{\n// other ivars here\n}\n@property\
    \ (nonatomic, retain) NSObject <MoneyLender> *loanSource;\n- (BOOL) findLoan:(float)amount;\n\
    @end\n\n@implementation InvestmentAdvisor\n- (BOOL) findLoan:(float)amount\n{\n\
    BOOL canLend = [self.loanSource canLend:amount];\nif (canLend)\n{\nBOOL result\
    \ = [self.loanSource lendRequest:amount\ntoLoaner:@\"InvestmentClient\"];\nif\
    \ (result)\n{\nNSLog(@\"The loan application was accepted\");\nreturn YES;\n}\n\
    }\nreturn NO;\n}\n```\n"
- fmt: "Notice that in this version of `findLoan:` you don’t need to worry if the\
    \ methods `canLend:` and `lendRequest:toLoaner:` are defined or not. Once the\
    \ compiler knows that the property `loanSource` points to an object implementing\
    \ the protocol, these two methods can be validated at compilation time. The last\
    \ step, then, is to create the right object and use it to initialize the property\
    \ `loanSource`.\n\n```\n- (void) useLoanSource\n{\n    AccreditedLoanSource *loanSource\
    \ = [[AccreditedLoanSource alloc] init];\n    InvestmentAdvisor *advisor = [[InvestmentAdvisor\
    \ alloc] init];\n    advisor.loanSource = loanSource;\n    BOOL res = [advisor\
    \ findLoan:10000];\n    NSLog(@\"result is %d\", res);\n    [advisor release];\n\
    \    [loanSource release];\n}\n```\n\nNotice that the only real difference here\
    \ is how you created the `loanSource` object, which now provides a complete implementation\
    \ of the `MoneyLender` protocol.\n\n**Note**\n\nAn instance variable or property\
    \ that implements some functionality required by current class and is supplied\
    \ by an outside user is known as a delegate. For example, the `loanSource` property\
    \ is a delegate for the `InvestmentAdvisor` class. Requiring a delegate to implement\
    \ a specific protocol is an often-used idiom in Objective-C libraries. For example,\
    \ the Cocoa framework requires users to define delegates to supply most of the\
    \ functionality associated with GUI objects.\n\n## Optional Methods\n\nIn a formal\
    \ protocol, it is possible to define if a method is required or optional. A required\
    \ method will be checked by the compiler, which will emit a warning if the method\
    \ is not present. An optional method can be left out of a class that implements\
    \ a protocol.\n\nIt is possible to declare two different levels of requirement\
    \ for the members of a protocol.\n\n- **Required methods**: These are the ones\
    \ that need to be present in every object that implements the protocol. You may\
    \ think of such methods as providing essential functionality that define the protocol.\
    \ A method included in a protocol without qualification is considered a required\
    \ method. Additionally, any method following the `@required` keyword is considered\
    \ to be required.\n- **Optional methods**: These are methods that may provide\
    \ additional features that are not essential to the definition of the protocol.\
    \ A class implementing the protocol is free to include or exclude such methods.\
    \ An optional method is defined with the help of the `@optional` keyword. All\
    \ methods following this keyword are considered optional.\n\nWhen using optional\
    \ methods, you need to determine if they have been defined or not in the target\
    \ object. The method to do this is similar to what you would do when using an\
    \ informal protocol: just send a `respondsToSelector:` message to the target in\
    \ order to check if the method is available. For example, suppose that you want\
    \ to add an optional method to the protocol `MoneyLender`.\n\n```\n@protocol MoneyLender\n\
    @optional\n- (BOOL) canExtendLoan;\n@required\n- (BOOL) canLend:(float)amount;\n\
    - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;\n@end\n```\n\n\
    Now, you can write code that uses the `canExtendLoan:` method, but only after\
    \ testing for its existence.\n\n```\n- (BOOL) checkLoan\n{\n    if ([self.loanSource\
    \ respondsToSelector:@selector(canExtendLoan)])\n    {\n        if ([self.loanSource\
    \ canExtendLoan])\n        {\n            NSLog(@\"The loan can be extended\"\
    );\n            return YES;\n        }\n    }\n    return NO;\n}\n```\n\n## Summary\n\
    \nIn this chapter, I covered two of the most important topics in the design of\
    \ effective classes in Objective-C. Using categories and protocols, it is possible\
    \ to extend the capabilities of classes created by yourself, as well as other\
    \ classes that already exist in libraries shipped with the system or from third-party\
    \ vendors.\n\nCategories support the addition of methods to the interface of an\
    \ existing class. As long as you provide the code for the extension methods—along\
    \ with a header file with the category definition—other classes can use the category\
    \ methods as if they were part of the original class. This provides a great way\
    \ to customize common classes, such as `NSArray` or `NSString`, with code that\
    \ is useful in the context of your applications.\n\nProtocols provide a way for\
    \ classes to define a limited interface that will be used only by a particular\
    \ service. A protocol may be defined in an informal way, by just listing one or\
    \ more methods that need to be part of the interface. To implement such an informal\
    \ protocol, classes can provide a set of empty implementations through a category,\
    \ usually attached to `NSObject`. A second technique is to check if the required\
    \ methods exist on the target object, using the runtime API provided by Objective-C.\n\
    \nA formal protocol is defined with a syntax that is similar to a class declaration.\
    \ However, its main goal is to define a simple interface that can be independently\
    \ implemented by other classes. Much of the Objective-C libraries rely upon protocols\
    \ to provide services without the necessity of adding new classes for each new\
    \ feature. For example, Cocoa uses protocols as the main tool to define delegates\
    \ for UI components.\n\nCategories and protocols show some of the dynamic aspects\
    \ of Objective-C, but they only scratch the surface of the possibilities. In the\
    \ next chapter, you will investigate more deeply the concept of dynamic binding\
    \ and see what it can help you accomplish.\n\n# 5. Inheritance\n\n## Abstract\n\
    \nIn the previous chapters you explored some of the basic ideas of object-oriented\
    \ programming in Objective-C. As you have seen, OOP is the main software development\
    \ concept that motivated the creation of the language. A chief feature of OOP\
    \ is the ability to create new classes that inherit methods, variables, and properties\
    \ from other existing classes. You see, then, that to master the language you\
    \ need to attain a good working knowledge of the concept of class-based inheritance.\n\
    \nThe proper use of inheritance, however, requires a certain amount of attention\
    \ both during the design phase as well as with the implementation of base and\
    \ derived classes. In this chapter you will explore topics related to inheritance\
    \ in Objective-C, covering some of the necessary background required to design\
    \ effective class hierarchies.\n\nYou will take a more in-depth look at how inheritance\
    \ works, along with the mechanism of method overriding among classes in the same\
    \ hierarchy. Furthermore, you will see how to address some issues raised by the\
    \ way inheritance is implemented in Objective-C. For example, you will learn how\
    \ to simulate the use of multiple-inheritance, or how to avoid deep class hierarchies."
