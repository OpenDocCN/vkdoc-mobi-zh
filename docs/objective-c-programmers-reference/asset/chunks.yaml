    A bundle is a collection of files that are distributed along with an application.
    A bundle is viewed by Cocoa as a unit, and you will see it as a single file in
    Mac OS X Finder. Cocoa provides several methods to retrieve information from bundles,
    but for most simple applications you interact only with the main bundle, which
    is returned by `[NSBundle mainBundle]`.


    After you get the path of the required sound resource, you create an `NSURL` object
    that represents the file. The next step is to create an `AVAudioPlayer` object,
    initialized with the sound resource URL. Next, you need to set up player options
    such as volume and number of loops. I also pass to the player object a delegate,
    which will be responsible for receiving and answering to any notifications generated
    during the playing process. Finally, the play message is sent to the object, starting
    the process of playing the sound file.


