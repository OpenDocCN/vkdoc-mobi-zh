  trans: '

    # 14. 单元测试


    ## 摘要


    单元测试是一种编程策略的基础，该策略倡导为应用程序中实现的每个功能创建独立的检查。单元测试也可用于验证某段代码是否符合特定需求。例如，若你创建了一个将两个数相加的方法，便可编写一个单元测试来验证其在某些特定情况下返回的结果是否正确。虽然仅通过测试特定值无法证明代码完全没有问题，但运行单元测试能够增强你对代码确实能返回符合需求结果的信心。


    单元测试及其相关工具的另一个用途体现在所谓的测试驱动开发（TDD）中。TDD 是一种软件方法论，要求程序的每一个特性在编写之前都需通过单元测试进行详尽的规定。也就是说，采用
    TDD 时，程序员利用新的测试来驱动代码的开发，最终使代码满足所编写测试的要求。


    基于单元测试的开发是探索 Objective-C 等面向对象语言模块化特性的绝佳途径。事实上，单元测试框架之所以流行，部分原因在于面向对象编程能够创建定义良好的接口，并且这些接口中的对象对外部代码的依赖很少。


    `OCUnit`等测试框架充分利用了这些面向对象编程的特性，使得使用 Objective-C 的程序员能够进行单元测试。在本章中，我将概述如何在 Objective-C
    中使用`OCUnit`和`Xcode`进行单元测试。你将学习如何在新的或现有的项目中快速创建单元测试，还将学习如何使用`Xcode` IDE 管理和运行测试集。最后，你将看到一个如何运用
    TDD 编程策略来编写 Objective-C 代码的示例。


    ## 单元测试框架


    有责任心的程序员一直努力创建能够检验他们正在实现的功能的测试。因此，测试方法论早在面向对象编程语言发展之前就已存在，并且始终在创建高质量代码中扮演着重要角色。然而，像
    Objective-C 这样的面向对象语言提供了一种不可或缺的工具，使得高效的单元测试更易于实现。同时，面向对象编程的特性促成了单元测试通用接口的创建，跨团队或跨公司工作的程序员都可以利用这一接口。


    最具影响力的基于面向对象编程的测试框架是`SUnit`，它是一个用 Smalltalk 编写的单元测试库。尽管 Smalltalk 作为一种编程语言在过去十年中
    popularity 有所下降，但其许多原始理念（例如对基于消息的多态性的强大运行时支持）依然强劲。这些理念甚至已融入 Objective-C、JavaScript
    和 Ruby 等其他主流语言中。Smalltalk 的影响力也延伸到了单元测试技术，例如`SUnit`，它至今仍几乎被这些较新的语言原封不动地沿用。因此，Java
    拥有`JUnit`，而 Objective-C 则拥有`OCUnit`，这是一个在设计方法和接口上与 Smalltalk 通过`SUnit`引入的框架非常相似的库。


    在本章中，我将讨论`OCUnit`中用于支持单元测试创建和执行的特性。我将主要围绕`OCUnit`展开讨论，主要是因为它是 Objective-C 领域事实上的标准。其成为标准的主要原因之一是苹果公司的支持，它是随`Xcode`一起部署的官方测试库。该
    IDE 允许程序员添加基于`OCUnit`的测试目标，以及运行测试并在日志导航面板中显示结果。基于以上原因，`OCUnit`目前是在 Objective-C
    中实现单元测试的自然之选。


    ## 注意


    请记住，`OCUnit`并非唯一可用于 Objective-C 的测试框架。实际上，还有其他用 Objective-C 编写的测试框架已作为开源项目提供。使用直接用
    C 语言编写的框架（如`CUnit`）也是合适的。特定测试框架的适用性更多取决于项目本身的需求，而非语言的要求。例如，在某些大型项目中，与其他的 C 和/或
    C++遗留代码相比，用 Objective-C 编写的代码量可能很小。在这种情况下，使用基于 C 或 C++的测试工具可能更为方便。

