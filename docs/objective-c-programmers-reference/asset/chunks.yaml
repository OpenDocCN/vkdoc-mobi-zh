  trans: '

    # 17. 构建 iOS 应用


    **摘要**


    `Cocoa Touch` 是用于为 iOS（驱动 iPhone、iPad 和 iPod touch 的操作系统）构建丰富移动应用的 `Objective-C`
    框架。虽然采用了与桌面版 `Cocoa` 相似的技术，但与功能完备的 Mac OS X 框架相比，`Cocoa Touch` 提供了更简化的架构。`Cocoa
    Touch` 不仅提供了基于触控的 UI 控件，还提供了对摄像头和加速计等移动资源的访问能力。借助 `Cocoa Touch`，开发者可以访问 iOS 所管理的硬件资源，其中包含许多
    Mac OS X 应用无法使用的功能。


    本章将概述使用 Xcode 开发移动应用的编程环境。我将首先讨论移动应用与为 Mac OS X 编写的功能完备应用之间的区别。你将了解专门为基于触控的界面开发的新
    UI 控件。你还将学习如何创建新应用以及如何将这些应用部署到 iOS 目标设备上。


    最后，我将以一个完整的示例作为本章的结尾，该示例展示了如何使用 `Objective-C` 与 `Cocoa Touch` 中包含的几个重要类进行交互。这个示例还会向你展示一些图形化
    iOS 编程的基本概念，例如动画。此外，它还将展示如何与基于触控的控件进行交互，并在移动设备上响应事件。


    ## iOS 编程


    为 iOS 创建应用与桌面应用开发有许多相似之处。首先，你将使用相同的编程语言 `Objective-C`，以及一些相同的基础库，包括 Foundation
    框架中的所有可用功能。Foundation 框架中的通用类，如 `NSArray`、`NSDictionary` 等，保持不变，其用法与本书第一部分所述一致。


    另一方面，开发者在创建 iOS 应用时，也需要考虑几个重要的差异。理解这些差异对于开发高效的 iOS 应用是必要的。


    ### 内存限制


    首先是内存使用问题。在 Mac OS X 等现代桌面操作系统中，可用内存非常充足，你很少需要为此担心。例如，除非你在编写处理视频或其他大型数据文件的软件，否则你完全无需担心内存使用情况。特别是，你几乎不需要考虑图形界面中的常规元素（如
    UI 控件、图片或小型音效文件）所消耗的内存。


    但在移动设备上情况则不同。它们的内存有限，某些热门型号的 iPhone 和 iPod touch 并没有足够的资源来运行你能想象到的所有类型的应用。因此，你需要妥善处理并绕开平台限制，确保你的应用明智地使用资源。


    移动应用内存使用方式不同的另一个原因是系统不采用虚拟内存。虚拟内存是专为桌面机器设计的概念：当物理内存不足时，系统会将内存中的部分数据交换到磁盘，以创建额外的内存区域。这产生了一个巨大的内存空间，可供所有应用使用（只要它们不同时耗尽所有内存）。但移动设备并非如此：它们的局限性不允许拥有复杂的虚拟内存系统，因此只能使用直接可用的内存。


    ### 有限的多处理


    另一个差异体现在这些设备的处理能力上。虽然桌面机器可以同时运行多个应用，但搭载 iOS 的移动设备限制了其在任何时刻能执行的多任务数量。这样做是为了节省设备电量，并让用户在不充电的情况下使用更长时间。不过，这一点在过去几年已经发生了变化：最初，Apple
    不允许 iOS 进行任何多任务处理。虽然新一代的系统已经引入了后台任务等功能，但其并发能力仍然不及 Mac OS X。因此，在你的移动应用中节约处理资源依然非常重要。


    另一个需要考虑的问题是应用的响应速度。请记住，用户试图快速获取信息，因此他们没有耐心等待漫长的加载时间——这种情况在桌面应用中已很常见。例如，桌面用户愿意为启动
    Photoshop 等待 30 秒，因为他们将使用该程序数小时。但应用用户与你的应用互动的时间可能只有几分钟甚至几秒钟。如果你只是想发条推文或查看天气，等待加载时间是没有意义的。


    这些关于有限内存、有限的多处理能力以及所需短加载时间的考量，使得移动应用的设计与桌面应用截然不同。这意味着你很难直接将一个桌面应用移植到 iOS（即便大部分代码可能可以编译）。你仍然可以复用大量代码，但这些代码必须在一个符合移动环境特点的应用设计背景下使用。


    ## iOS 中的 UI 类


    移动应用与桌面应用的另一个区别在于用户输入的处理方式。桌面应用的图形用户界面主要由鼠标和键盘驱动。然而，iOS 上并没有这两种输入设备。虽然可以给 iOS
    设备外接键盘，但在大多数 iOS 应用中进行键盘输入都不太方便。鼠标指针的使用已被用户的直接触摸操作所取代。


    这一差异体现在移动应用所使用的 UI 风格上。为了支持 iOS 与 Mac OS X 编程之间的这些不同，iOS 引入了一套专为手势操作（而非鼠标和键盘）而设计的
    UI 控件。这些控件被封装为一组由 `Cocoa Touch` 定义的独特 UI 类。这些类被收集并打包在一个名为 `UIKit` 的 `Objective-C`
    框架中。

    '
- fmt: '# Container Classes


    Containers are the first type of UI-related classes I will discuss. They define
    how objects are organized in the screen and how they relate to each other. Here
    are the most important classes in this category:


    *   `UIWindow`: A `UIWindow` represents a managing window for the app. In iOS,
    windows occupy the full screen, since there is no multiprocessing between two
    windows of different applications. Windows can contain other controls, such as
    toolbars and views. The `UIWindow` class is typically not subclassed, since it
    is possible to achieve most customizations through delegates or window controllers.

    *   `UIView`: A `UIView` is a rectangular area inside an app window. A view can
    respond to user input and manage other views. `UIView` objects are frequently
    associated to a view controller, used to respond to common notification messages.
    `UIView` is a parent class to most UI controls in Cocoa Touch, such as labels,
    buttons, and date pickers, for example.

    *   `UIToolbar`: A toolbar object of type `UIToolbar` is used to manage buttons
    and related controls. Toolbars in the iPhone are generally displayed in the lower
    part of the screen. You can add or remove buttons from a `UIToolbar` in order
    to provide a limited number of options to your users.

    *   `UINavigationBar`: This is also a bar that can contain other controls. In
    iOS, however, a navigation bar sits at the top of the window. The navigation bar
    contains a default item that points to the previous location. This control manages
    each new screen that is displayed in the context of the app, so you can go back
    in the list of views by using such navigation buttons.


    # UI Controls


    Cocoa Touch also comes with a large number of single-purpose controls that can
    help users to make selections, visualize, and input data. Here follows a list
    of additional control classes made available in the UIKit that are used to support
    Touch-based input (see Figure [17-1](#A978-1-4302-5906-0_17_Chapter.html#Fig1)):


    ![A978-1-4302-5906-0_17_Fig2_HTML.jpg](A978-1-4302-5906-0_17_Fig2_HTML.jpg)


    Figure 17-2. The project template selection screen in the new project wizard


    *   `UILabel`: This class is used to create label objects. A label can display
    text or images in any part of an `NSView`. The text can be formatted using RTF,
    which may be generated by most text editors.

    *   `UITextField`: A class representing an input field, where users can enter
    data such as e-mail addresses, contact names, or passwords using the screen-based
    keyboard. The `UITextField` class knows how to control the display of the screen-based
    keyboard, showing and hiding it when the control is selected or deselected.

    *   `UIButton`: This class is able to display a simple button, which can be customized
    with text or images. The main functionality of the button is sending a message
    to a declared action in the view controller, which will in turn execute the necessary
    code for the requested function.

    *   `UISegmentedControl`: This control displays a segmented surface that you can
    touch to access different parts of a view. It is frequently used in mobile apps
    for iPhone, due to the lack of space in the smaller screen.

    *   `UISwitch`: The switch allows the user to select one of two states. It is
    consistently used in the Settings application for options with a `YES`/`NO` answer.

    *   `UIProgressView`: This view can be used to display progress in long running
    operations, so the user knows that the app is active, although in a wait state,
    while the operation is being performed.

    *   `UIActivityIndicatorView`: This is similar to the `UIProgressView` in purpose,
    but it is used when you don’t know how long an activity will take. On the other
    hand, you shouldn’t show this control if the operation takes too long, because
    it gives little clue to the user about how long it will take to move from this
    busy state.

    *   `UIPickerView`: This versatile UI control can be used to select one among
    several items. When clicked, this control displays a large selection wheel that
    makes it easier for the user to click the desired option.


    ![A978-1-4302-5906-0_17_Fig1_HTML.jpg](A978-1-4302-5906-0_17_Fig1_HTML.jpg)


    Figure 17-1. An Xcode nib design view, showing some of the UI controls in UIKit


    # Setting Up a Cocoa Touch Project


    You can create an iOS app in a way that is very similar to other projects in Xcode:
    by using the project wizard to determine the kind of project that needs to be
    created. To generate a new project using the project wizard, you can use the menu
    by going to **File** ➤ **New** ➤ **Project** (or using the keyboard shortcut Shift+Command+N).
    The project wizard will be displayed and list all the project types available
    in your local Xcode installation. Select “Application” in the iOS category, and
    you will see the list of available applications types, as show in Figure [17-2](#A978-1-4302-5906-0_17_Chapter.html#Fig2).


    Among iOS application types, the following are of interest for mobile apps developers:


    *   **Master-Detail Application**: These are applications that present a master
    view, where you can summarize the contents of the app, and a detail view, which
    can be used for editing and visualization of selected parts of the content. This
    kind of app is used on the iPad only, since the iPhone generally doesn’t have
    enough screen space to handle the master and detail views at the same time.

    *   **OpenGL Game**: This template category is used to generate game apps. The
    application is set up so that you can access an OpenGL view, which allows developers
    to create 2D and 3D images for their games.

    *   **Page-Based Application**: Creates a new application where data is displayed
    using a book metaphor. The application uses a `UIPageViewController`, which automates
    the process of managing the views that correspond to each page.

    *   **Single View Application**: This template generates a simple app that contains
    a single `UIView`.

    *   **Tabbed Application**: Generates an app that uses a tabbed interface to display
    content. This format is useful to drill down into data that can be represented
    in a tabular format, such as databases, phone books, and shopping lists, among
    others. The tabbed app automatically supplies the navigational tools to move between
    tabs, such going to the previous or next screen.

    *   **Utility Application**: This is an application that has only one view, with
    possibly an informational view that is displayed in flip mode. The example application
    you create in the last section uses this template.

    *   **Empty Application**: This template is useful if none of the previous types
    match your planned design. You can start from scratch by adding windows and views
    as necessary.


    After you select one of these options, you will have to enter some basic information
    about the project, such as name, location on the disk, and author. Once you complete
    the input of this initial data, Xcode will generate a new project with a set of
    classes and a nib file that represents the UI views for your mobile app.


    In addition to the information that you supplied initially, iOS apps also require
    a number of metadata items that are used by the system and the App Store. These
    items include icons, launch images, and App Store artwork.


    Figure [17-3](#A978-1-4302-5906-0_17_Chapter.html#Fig3) shows the project summary
    screen, where you can enter many of the metadata information items required by
    iOS.


    ![A978-1-4302-5906-0_17_Fig3_HTML.jpg](A978-1-4302-5906-0_17_Fig3_HTML.jpg)


    Figure 17-3. Project properties for a sample iOS application


