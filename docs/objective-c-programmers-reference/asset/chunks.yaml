- fmt: "# Using Properties\n\nUsing properties (instead instance variables) to hold\
    \ a new object doesn’t change any of the few rules that you learned in the previous\
    \ section. However, properties have their own attributes, and therefore it is\
    \ important to clarify how they interact with existing memory management strategies.\n\
    \nWhen you create a new property, it is possible to determine how it will store\
    \ any objects assigned to it. Here are the possible memory attributes:\n\n- `retain`:\
    \ This attribute indicates that if the property is the target of an assignment,\
    \ it will receive ownership of the assigned object. This means that a property\
    \ marked with `retain` always owns the object that it points to. One advantage\
    \ of using such properties, however, is that they automatically send a `release`\
    \ message to the previously stored object so that you will not forget it. To avoid\
    \ memory leaks, you need to release any object stored in this kind of property\
    \ on the `dealloc` method. A simple way to do so is to assign `nil` to the property,\
    \ since this will force a release message to be sent to the currently stored object.\n\
    - `copy`: Unlike the previous case, properties with the `copy` attribute will\
    \ not send a `retain` message to the object, but instead create a copy of it.\
    \ This means that there is no change in the number of references to the object\
    \ assigned to the property, and you can change the contents of the property without\
    \ any changes propagating to the original object. These properties also own the\
    \ object they copied, so you must release them before the object is released,\
    \ preferably on the `dealloc` method.\n- `assign`: This attribute is used for\
    \ properties that need no special handling of memory. This is the default behavior,\
    \ in which properties behave very much like a simple instance variable. In this\
    \ case, there is no change in the behavior of the property with relation to memory\
    \ management, and you should just use the general memory management rules discussed\
    \ in the previous section.\n\nThe following is an example of how these property\
    \ attributes interact with memory management and reference counting, by using\
    \ a class to store book data:\n\n```\n// file Book.h\n\n@interface Book : NSObject\n\
    \n- (void) updateBook:(NSString*)name authors:(NSArray*)authors\ncover:(NSImage*)image;\n\
    \n@property (assign) NSString *bookName;\n@property (copy) NSArray *authors;\n\
    @property (retain) NSImage *coverImage;\n\n@end\n```\n\nConsider a class named\
    \ `Book` where you store information about a book, such as the book name, list\
    \ of authors, and a cover image. This class contains all of these elements as\
    \ properties, which you will update according to their attributes. The class also\
    \ has a method, `updateBook:authors:cover:`, which is responsible for updating\
    \ the book data with the passed parameters.\n\nThe first property, `bookName`,\
    \ has been defined as using the `assign` attribute.\n\n```\n// file Book.m\n\n\
    #import Book.h\n\n@implementation Book\n\n- (void) updateBook:(NSString*)name\
    \ authors:(NSArray*)authors\ncover:(NSImage*)image\n{\n    self.bookName = name;\n\
    \    [name retain]; // retain is needed here\n    // other code here\n}\n\n- (void)\
    \ dealloc\n{\n    [self.bookName release];\n    [super dealloc];\n}\n\n@end\n\
    ```\n\nIn the first part of the `updateBook:authors:cover:` method, you are responsible\
    \ for storing the value `name` on the `bookName` property. As `bookName` is declared\
    \ using the `assign` attribute, just assigning the parameter name to `bookName`\
    \ doesn’t change the ownership of the object or its internal reference counter.\
    \ Therefore, you need to manually send a `retain` message to the `name` object\
    \ in order to avoid it being released by other owners of this object. As you acquire\
    \ ownership of the property `bookName`, however, you need to guarantee that it\
    \ will be eventually released. This is performed by the `dealloc` method, where\
    \ you have to add code to release the property `self.bookName`.\n\nThe second\
    \ property, `authors`, has a `copy` attribute. The following example shows how\
    \ you can handle that property:\n\n```\n@implementation Book\n\n- (void) updateBook:(NSString*)name\
    \ authors:(NSArray*)authors\ncover:(NSImage*)image\n{\n    self.bookName = name;\n\
    \    [name retain]; // retain is needed here\n    self.authors = authors; // no\
    \ need for retain\n}\n\n- (void) dealloc\n{\n    [self.bookName release];\n  \
    \  self.authors = nil;\n    [super dealloc];\n}\n\n@end\n```\n\nAs the property\
    \ `authors` has a `copy` attribute, what you have stored internally is not the\
    \ original object itself, but a copy. Also according to the rules of memory management,\
    \ the copied object, which the `copy:` method returned, is owned by whomever created\
    \ it. This means that you need to `release` the copy at the end of its use, or\
    \ in the `dealloc` method, as you see in the example above. Notice that I use\
    \ the frequently employed trick of assigning `nil` to the object instead of calling\
    \ `release`. By assigning `nil`, you leave the property setter to do the release,\
    \ while at the same time resetting the value of the property to a known value.\n\
    \nThe advantage of using a copy property is that you don’t need to worry about\
    \ any changes to the object by external clients. If the property `authors` were\
    \ declared instead as `retain` or `assign`, any changes to the `NSArray` performed\
    \ outside of your class would be reflected in the value stored in the `authors`\
    \ property. Because you are using the `copy` attribute, however, you can rely\
    \ on the fact that the value will not change.\n\nFinally, the following code is\
    \ needed to support a `retain` property:\n\n```\n@implementation Book\n\n- (void)\
    \ updateBook:(NSString*)name authors:(NSArray*)authors\ncover:(NSImage*)image\n\
    {\n    self.bookName = name;\n    [name retain]; // retain is needed here\n  \
    \  self.authors = authors; // no need for retain\n    self.coverImage = image;\n\
    }\n\n- (void) dealloc\n{\n    [self.bookName release];\n    self.authors = nil;\n\
    \    self.coverImage = nil;\n    [super dealloc];\n}\n\n@end\n```\n\nIt turns\
    \ out that using properties with the `retain` attribute is very similar to using\
    \ properties with the `copy` attribute. During an assignment, the synthetized\
    \ methods for the property are responsible for two things: releasing any existing\
    \ values previously stored, and sending a `retain` message to the object being\
    \ assigned. From your point of view, however, the only additional code you have\
    \ to write is an explicit release when `dealloc` is called. To perform this, you\
    \ use the same trick of assigning `nil` to the `coverImage` property. The synthesized\
    \ property handler will be responsible for releasing the previous value and storing\
    \ `nil` in its place."
