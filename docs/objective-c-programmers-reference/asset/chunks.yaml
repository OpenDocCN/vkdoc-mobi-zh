- fmt: '`showInfo:`方法是可以在Xcode的nib设计阶段配置的操作。其目的是显示一个信息框，展示关于应用程序的一些信息，例如其名称和当前使用的选项。首先，创建新的UI视图对象，其类型为`InfoView`。`initWithNibName:bundle:`方法是创建存储在nib文件中的UI对象的主要方式。第一个参数定义nib的名称。第二个参数指定nib文件所在包的名称。如果此参数为`nil`，则nib必须位于与当前可执行文件相同的包中。


    `modalTransitionStyle`属性指示用于显示新视图的过渡方式。此属性初始化为`UIModalTransitionStyleFlipHorizontal`，以便视图将以水平翻转效果出现。


    接下来，该方法在当前屏幕中显示模态视图。`presentModalViewController:animated:`的第二个参数在首次显示视图时希望使用动画时设置为`YES`。


    ```

    + (void) refreshTopLevelViewController


    {


    [ui_controller refreshUi];


    }

    ```


    `refreshTopLevelViewController`方法作为一个辅助方法提供，用于从应用程序的其他部分刷新UI控制器。注意，`ui_controller`是一个静态变量，初始化为指向当前UI控制器。该方法利用向`nil`对象发送消息是有效的这一事实，因此在使用它之前不需要检查`ui_controller`是否已初始化。


    ```

    - (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)io


    {


    // Return YES for supported orientations.


    return (io == UIInterfaceOrientationPortrait);


    }

    ```


    `shouldAutorotateToInterfaceOrientation:`方法在iOS设备尝试改变方向时被调用。某些应用程序需要响应方向变化。例如，阅读器应用程序会根据屏幕方向改变文本的绘制方式。传递给此方法的参数`UIInterfaceOrientation`指示屏幕的新方向。如果希望更改为新方向，此方法的返回值应为`YES`；如果不希望更改屏幕，则返回`NO`。此示例应用程序仅在屏幕方向为`UIInterfaceOrientationPortrait`时返回`YES`。因此，它仅支持一种屏幕方向。


    ```

    - (void)didReceiveMemoryWarning


    {


    // Releases the view if it doesn''t have a superview.


    [super didReceiveMemoryWarning];


    }

    ```


    每当系统内存不足时，此方法会发送到视图。通过响应此方法，可以使应用程序在资源使用问题时能够快速恢复。此示例应用程序仅调用父类中的相同方法，但对于更复杂的应用，考虑如何在低内存场景下减少资源使用至关重要。


    ```

    - (void)viewDidUnload


    {


    [btBuy release];


    btBuy = nil;


    [btPlay release];


    btPlay = nil;


    [super viewDidUnload];


    }

    ```


    `viewDidUnload`方法将在当前视图从屏幕卸载时释放任何未使用的内存。这是另一个满足移动系统重要需求的方法，因为可用的内存有限。通过释放当前未使用的内存，它可以被其他应用程序（甚至同一应用程序中的其他视图）使用，同时减少系统所需的总资源。


    ```

    - (void)dealloc


    {


    [btBuy release];


    [btPlay release];


    [super dealloc];


    }


    @end

    ```


    `dealloc`方法负责将类使用的资源归还给操作系统。此类使用了一些控件，因此此时应释放它们，以避免不必要的内存泄漏。始终记得也要调用父类的`dealloc`，否则会导致父类管理的资源发生内存泄漏。


    ### FlipsideViewController接口


    `FlipsideViewController`是`UIViewController`的子类，用于响应由翻转侧控件发送的消息，该控件显示关于应用程序的辅助信息。此控制器的主要区别在于它使用了一个委托对象，其类型声明为`FlipsideViewControllerDelegate`。此协议用于与`MainWindowViewController`通信，并且只有一个名为`flipsideViewControllerDidFinish:`的方法。


    ```

    // file FlipsideViewController.m


    #import <UIKit/UIKit.h>


    @protocol FlipsideViewControllerDelegate;


    @interface FlipsideViewController : UIViewController


    {


    }


    @property (nonatomic, assign) id <FlipsideViewControllerDelegate> delegate;


    - (IBAction)done:(id)sender;


    @end


    // this protocol must be implemented by classes passed as a delegate


    @protocol FlipsideViewControllerDelegate


    - (void)flipsideViewControllerDidFinish:(FlipsideViewController *)controller;


    @end

    ```


    ### FlipsideViewController实现


    `FlipsideViewController`的实现文件提供了能够响应发送给翻转侧视图的某些消息的方法。


    ```

    // file FlipsideViewController.m


    #import "FlipsideViewController.h"


    @implementation FlipsideViewController


    @synthesize delegate=_delegate;


    - (void)viewDidLoad


    {


        // the view is now loaded, call the super class first


        [super viewDidLoad];


        self.view.backgroundColor = [UIColor viewFlipsideBackgroundColor];


    }

    ```


    `viewDidLoad`方法在视图即将显示时执行。这里唯一更改的是使用的背景颜色，该颜色由`UIColor`对象的`viewFlipsideBackgroundColor`方法定义。`UIColor`是一个提供管理iOS设备颜色常用方法的类。


    ```

    - (void)viewDidUnload


    {


        // make sure that the parent class is unloaded


        [super viewDidUnload];


        // e.g. self.myOutlet = nil;


    }


    - (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation


    {


        // Return YES for supported orientations


        return (interfaceOrientation == UIInterfaceOrientationPortrait);


    }

    ```


    此方法确定当用户旋转设备时UI是否应更改方向。此应用程序仅支持纵向方向。


    ```

    #pragma mark - Actions


    - (IBAction)done:(id)sender


    {


        // notifies the delegate about the action of closing the current view


        [self.delegate flipsideViewControllerDidFinish:self];


    }


    @end

    ```


    `done:`操作已在Xcode中设置为在选中关闭按钮时接收事件。在这种情况下，唯一需要做的是通知委托对象（实际上是`MainWindowController`）此视图需要关闭。这是通过调用委托协议中声明的方法完成的，如头文件所示。'
  raw: 'The `showInfo:` method is an action that can be wired in Xcode during the
    nib design phase. Its purpose is to display an info box that shows some information
    about the app, such as its name and current options used. First, you create the
    new UI view object, which is of type `InfoView`. The `initiWthNibName:bundle:`
    method is the main way to create UI objects that are stored in a nib file. The
    first parameter defines the name of the nib. The second parameter gives the name
    of a bundle where the nib file is located. If this parameter is `nil`, then the
    nib must be located in the same bundle as the current executable.


    The `modalTransitionStyle` property indicates the transition method used to display
    the new view. This property is initialized to `UIMOdalTransitionStyleFlipHorizontal`,
    so that the view will appear with a horizontal flip effect.


    Next, the method displays the modal view in the current screen. The second parameter
    to `presentModalViewController:animated:` is `YES` when you want to use an animation
    when the view is first displayed.


    `+ (void) refreshTopLevelViewController`


    `{`


    `[ui_controller refreshUi];`


    `}`


    The `refreshTopLevelViewController` method is provided as a helper that is used
    to refresh the UI controller from other parts of the application. Notice that
    `ui_controller` is a static variable that is initialized to point to the current
    UI controller. The method uses the fact that is valid to send a message to nil
    objects, so you don’t need to check if `ui_controller` has been initialized before
    using it.


    `- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)io`


    `{`


    `// Return YES for supported orientations.`


    `return (io == UIInterfaceOrientationPortrait);`


    `}`


    The `shouldAutorotateToInterfaceOrientation:`method is called when the iOS device
    tries to change orientation. Some applications need to be responsive to orientation
    changes. For example, a reader application will change how its text is drawn on
    screen depending on orientation. The parameter passed to this method, `UIInterfaceOrientation`,
    indicates the new orientation of the screen. The return value of this method should
    be `YES` if you want to change to this new orientation, and `NO` if you don’t
    wish to change the screen. This sample application will return `YES` only if the
    screen orientation if `UIInterfaceOrientationPortrait`. Therefore, it supports
    only one screen orientation.


    `- (void)didReceiveMemoryWarning`


    `{`


    `// Releases the view if it doesn''t have a superview.`


    `[super didReceiveMemoryWarning];`


    `}`


    This method is sent to a view whenever there is shortage of memory in the system.
    By responding to this method, you make your application promptly recoverable in
    the case of resource usage problems. This sample application will just call the
    same method in the superclass, but for more complex apps it is important to consider
    how to reduce resource usage during low-memory scenarios.


    `- (void)viewDidUnload`


    `{`


    `[btBuy release];`


    `btBuy = nil;`


    `[btPlay release];`


    `btPlay = nil;`


    `[super viewDidUnload];`


    `}`


    The `viewDidUnload` method will release any unused memory when the current view
    is unloaded from the screen. This is another method that satisfies an important
    need in a mobile system, since there is a limited amount of memory to work with.
    By releasing memory that is not in current use, it can be used by other app (or
    even others views in the same app), while reducing the total resources needed
    by the system.


    `- (void)dealloc`


    `{`


    `[btBuy release];`


    `[btPlay release];`


    `[super dealloc];`


    `}`


    `@end`


    The `dealloc` method is responsible for returning the sources used by the class
    to the operating system. This class uses a few controls, therefore you should
    release then at this time, in order to avoid undesirable memory leaks. Always
    remember to call `dealloc` on the parent class as well, since otherwise you will
    have a memory leak on the resources managed by the parent.


    ### The FlipsideViewController Interface


    The `FlipsideViewController` is a subclass of `UIViewController` that is used
    to respond to messages sent by the flipside control, which displays auxiliary
    information about the app. The main difference in this controller is that it uses
    a delegate object, declared of the type `FlipsideViewControllerDelegate`. This
    protocol is used to communicate with the `MainWindowViewController`, and has only
    one method called `flipsideViewControllerDidFinish:`.


    `// file FlipsideViewController.m`


    `#import <UIKit/UIKit.h>`


    `@protocol FlipsideViewControllerDelegate;`


    `@interface FlipsideViewController : UIViewController`


    `{`


    `}`


    `@property (nonatomic, assign) id <FlipsideViewControllerDelegate> delegate;`


    `- (IBAction)done:(id)sender;`


    `@end`


    `// this protocol must be implemented by classes passed as a delegate`


    `@protocol FlipsideViewControllerDelegate`


    `- (void)flipsideViewControllerDidFinish:(FlipsideViewController *)controller;`


    `@end`


    ### The FlipsideViewController Implementation


    The implementation file for `FlipsideViewController` provides methods that can
    respond to some of the messages directed to the flipside view.


    `// file FlipsideViewController.m`


    `#import "FlipsideViewController.h"`


    `@implementation FlipsideViewController`


    `@synthesize delegate=_delegate;`


    `- (void)viewDidLoad`


    `{`


        `// the view is now loaded, call the super class first`


        `[super viewDidLoad];`


        `self.view.backgroundColor = [UIColor viewFlipsideBackgroundColor];`


    `}`


    The `viewDidLoad` method is executed when the view is about to be displayed. The
    only change you make here is on the background color used, which is defined by
    the method `viewFlipsideBackgroundColor` of the `UIColor` object. `UIColor` is
    a class that offers common methods to manage colors in iOS devices.


    `- (void)viewDidUnload`


    `{`


        `// make sure that the parent class is unloaded`


        `[super viewDidUnload];`


        `// e.g. self.myOutlet = nil;`


    `}`


    `- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation`


    `{`


        `// Return YES for supported orientations`


        `return (interfaceOrientation == UIInterfaceOrientationPortrait);`


    `}`


    This method determines if the UI should change orientation when the user rotates
    the device. This application supports only portrait orientation.


    `#pragma mark - Actions`


    `- (IBAction)done:(id)sender`


    `{`


        `// notifies the delegate about the action of closing the current view`


        `[self.delegate flipsideViewControllerDidFinish:self];`


    `}`


    `@end`


    The `done:` action has been set up in Xcode to receive an event when the close
    button is selected. In this case, the only thing you need to do is to notify the
    delegate object (which in fact is the `MainWindowController`) that this view needs
    to close. This is done by calling the method declared in the delegate protocol,
    as shown in the header file.'
