- fmt: '# Summary


    In this chapter, you learned how to create mobile applications that run on iPhone
    and iPad devices using Objective-C. The Cocoa frameworks are used as the official
    development environment for iOS applications, thus if you intend to develop mobile
    applications for the Apple platform, Objective-C is the shortest way to get a
    working product.


    You learned about the differences between iOS apps and applications written for
    desktop operating systems. These differences show the need for a customized set
    for Objective-C frameworks, which can be used to control the particular hardware
    and software requirements of mobile apps. I discussed some of the support provided
    by Cocoa Touch, including views, windows, and Touch-based UI controls.


    In the last part of the chapter, you saw the code of a complete mobile app. I
    explained how the app uses the Cocoa Touch API to perform actions such as creating
    new views, playing sound files, and performing simple animations. You saw how
    these classes work together and with the `UIKit` framework to control all aspects
    of the iOS experience.


    With this chapter, we reach the end of our overview of the Objective-C language
    and its environment. The material provided in these chapters contains the essential
    information you need to start your journey as an Objective-C developer. As you
    have seen, Objective-C is a modern language with features that make software development
    feel easy and natural. By taking the OO paradigm further than their competitors
    such as C++ or Java, Objective-C has enabled the best features of procedural and
    OO programing to coexist. Now it is time to use it to create your own applications.'
