    you need to create feature-rich UIs. The UI design process involves the coordination
    of runtime and design-time elements. Xcode UI tools constitute an important part
    of this workflow. In this section, you will learn how to use Xcode to define the
    windows and controls of a Mac OS X application.'
  raw: '## The Cocoa UI Hierarchy


    The hierarchy of graphical objects in Cocoa is rooted in `NSResponder`. This is
    the common object because it offers the behavior for answering to application
    events that is common to all graphical elements. `NSWindow` and `NSView`, which
    are used to implement windows and generic views, are all decedent from `NSResponder`.


    The functionality provided by `NSResponder` includes the following:


    *   Responding to mouse events: `mouseDown:`, `mouseDragged`:, `mouseUp`:, `mouseMoved:`,
    `mouseEntered:`, `rightMouseDown:`, among others.

    *   Responding to key events: `keyDown:`, `keyUp:`, `performMnemonic:`, `interpretKeyEquivalent:`,
    among others.

    *   Responding to other miscellaneous events: `cursorUpdate:`, `scrollWheel:`,
    `helpRequested:`, etc.

    *   Responding to miscellaneous action messages: `cancelOperation:`, `capitalizeWord:`,
    `insertNewLine:`, `insertTab:`, `indent:`, m`oveBackward`:, `moveToBeginningOfDocumentAndModifySelection:`,
    `moveToLeftEndOfLine:`, `moveLeft:`, `moveRight:`, `pageUp:`, `pageDown:`, `scrollLineUp:`,
    `selectWord:`, `selectLine:`, `showContextHelp:`, among many others.

    *   Managing window restoration: `restoreStateWithCoder:`, among others.

    *   Responding to menu events: `setMenu:`


    This is just a small selection of the interface made available by `NSResponder`,
    which makes it a fundamental class in Cocoa UI programming. Subclasses such as
    `NSWindow`,`NSApplication`, and `NSView`further refine the standard behavior provided
    by this class.


    ### The NSWindow Class


    The `NSWindow` class provides the behavior necessary for all windows in Cocoa,
    including top-level windows, utility windows, and dialogs. They all share some
    common code to display, move, resize, and manage the content of the window.


    Here are some common features available to any window deriving from `NSWindow`:


    *   Defining the size of the window: `setFrameOrigin:`, `setFrameTopLeftPoint:`,
    `setMinSize:`, `performZoom:`, `showsResizeIndicator`, among others.

    *   Configuring window properties: `setBackgroundColor:`, `setStyleMask:`, `setOpaque:`,
    `setHasShadow:`, among others.

    *   Getting information from a window: `windowNumber`, `deviceDescription`, `canBecomeVisibleWithoutLogin`,
    among others.

    *   Managing the main window status: `isMainWindow`, `canBecomeMainWindow`, `makeMainWindow`,
    among others.

    *   Managing child and attached windows: `addChildWindow:ordered:`, `removeChildWindow:`,
    `parentWindow`, among others.

    *   Managing title bars: `standardWindowButton:`, `showsToolbarButton`, among
    others.


    The API provided by `NSWindow` encompasses the main functionality available in
    standard Mac OS X windows. Cocoa encapsulates this behavior in `NSWindow`, and
    you can set up how much of this functionality is used during design time using
    Xcode, or at runtime by calling the methods of `NSWindow` as needed.


    ### The Window Controller Object


    The window controller is an important part of the design of graphical applications.
    Unlike other GUI toolkits, most of the customization code in Cocoa is not written
    as a subclass of `NSWindow`. Instead, Cocoa uses window controller objects to
    handle most of the programmatic behavior of real `NSWindow` instances in the system.


    This is possible again because you can redirect messages to certain objects at
    design time using Xcode and nib files. When you need to handle a particular type
    of action, it is not necessary to crate a subclass of a given UI object. Instead,
    you can just use Xcode to connect the object to a certain action in the window
    controller object. This guarantees that you will have a modified behavior, without
    the need to create a subclass of any particular UI object.


    In general, events directed to an `NSWindow` are directed to the window controller
    for immediate response. Thus, the window controller can be seen as the headquarters
    for the functionality provided in a window. You can further divide this responsibility
    to other controllers as necessary, but many simple applications have a single
    window controller that responds the requests for the whole window.


    In a large application, each window can have its own window controller, which
    responds to messages sent to that window. Other controls can also have their own
    associated controller, if their behavior is complex enough that requires this
    level of customization.


    ### The Delegate Object


    Among the outlets provided by Cocoa UI objects, one of the most important is the
    delegate outlet. A delegate is an object that automatically receives messages
    and notifications that are sent to a particular UI control or window. By setting
    an object as the delegate for a UI control, you will be able to process messages
    destined to that control. That is the main mechanism by which UI events are processed
    in a Cocoa-based application.


    For an example of setting delegates on the Xcode UI, consider the Window object,
    which is an instance of the `NSWindow` class. If you select that object and click
    the Connections Inspector (in the panel on the right side), you will see the list
    of outlets. One of these outlets is the delegate object, which is a present in
    every object of the class NSWindow, as shown in Figure [16-4](#A978-1-4302-5906-0_16_Chapter.html#Fig4).


    ![A978-1-4302-5906-0_16_Fig4_HTML.jpg](A978-1-4302-5906-0_16_Fig4_HTML.jpg)


    Figure 16-4.


    Connecting the delegate for an NSWindow object


    To set the delegate object, you can connect it to the desired received receiver
    in the same way you can connect any other outlet. The object you want to use is
    the File’s Owner (i.e., the object that owns this xib file). Click the outlet
    connection icon and drag it to the File’s Owner placeholder, and you will see
    the outlet changing to indicate the new connection.


    Once a delegate connection has been established, you can start adding methods
    to the delegate class to process the events sent by the window object. Such a
    delegate class should conform to the `NSWindowDelegate` protocol, which defines
    methods that are sent to the delegate for processing. Here is a list of methods
    that can be implemented in the delegate class:


    *   Window movement messages: `windowWillMove:`, `windowDidMove:`, `windowDidChangeScreen:`,
    among others.

    *   Window minimization messages: `windowWillMiniaturize:`, `windowDidMiniaturize:`,
    `windowDidEndLiveResize:`, among others.

    *   Window update messages: `windowDidUpdate:`, `windowDidExpose:`, `windowDidBecomeMain:`,
    `windowWillClose:`, among others.


    ## Using Xcode for UI Design


    In the previous sections you saw how Cocoa UI objects provide all the elements
    you need to create feature-rich UIs. The UI design process involves the coordination
    of runtime and design-time elements. Xcode UI tools constitute an important part
    of this workflow. In this section, you will learn how to use Xcode to define the
    windows and controls of a Mac OS X application.'
  trans: '

    ## Cocoa UI 层级结构


    Cocoa 中图形对象的层级结构根植于 `NSResponder`。这是一个通用对象，因为它提供了所有图形元素共有的、用于响应应用程序事件的行为。用于实现窗口和通用视图的
    `NSWindow` 和 `NSView` 都是 `NSResponder` 的子类。


    `NSResponder` 提供的功能包括以下内容：


    *   响应鼠标事件：`mouseDown:`、`mouseDragged:`、`mouseUp:`、`mouseMoved:`、`mouseEntered:`、`rightMouseDown:`
    等。

    *   响应键盘事件：`keyDown:`、`keyUp:`、`performMnemonic:`、`interpretKeyEquivalent:` 等。

    *   响应其他杂项事件：`cursorUpdate:`、`scrollWheel:`、`helpRequested:` 等。

    *   响应各种动作消息：`cancelOperation:`、`capitalizeWord:`、`insertNewLine:`、`insertTab:`、`indent:`、`moveBackward:`、`moveToBeginningOfDocumentAndModifySelection:`、`moveToLeftEndOfLine:`、`moveLeft:`、`moveRight:`、`pageUp:`、`pageDown:`、`scrollLineUp:`、`selectWord:`、`selectLine:`、`showContextHelp:`
    等众多方法。

    *   管理窗口恢复：`restoreStateWithCoder:` 等。

    *   响应菜单事件：`setMenu:`


    这只是 `NSResponder` 所提供的接口的一小部分，这使其成为 Cocoa UI 编程中的一个基础类。诸如 `NSWindow`、`NSApplication`
    和 `NSView` 等子类进一步细化了该类提供的标准行为。


    ### NSWindow 类


    `NSWindow` 类为 Cocoa 中的所有窗口（包括顶级窗口、工具窗口和对话框）提供了必要的行为。它们都共享一些通用的代码来显示、移动、调整大小和管理窗口的内容。


    以下是从 `NSWindow` 派生而来的任何窗口都可以使用的常见功能：


    *   定义窗口大小：`setFrameOrigin:`、`setFrameTopLeftPoint:`、`setMinSize:`、`performZoom:`、`showsResizeIndicator`
    等。

    *   配置窗口属性：`setBackgroundColor:`、`setStyleMask:`、`setOpaque:`、`setHasShadow:`
    等。

    *   从窗口获取信息：`windowNumber`、`deviceDescription`、`canBecomeVisibleWithoutLogin`
    等。

    *   管理主窗口状态：`isMainWindow`、`canBecomeMainWindow`、`makeMainWindow` 等。

    *   管理子窗口和附属窗口：`addChildWindow:ordered:`、`removeChildWindow:`、`parentWindow` 等。

    *   管理标题栏：`standardWindowButton:`、`showsToolbarButton` 等。


    `NSWindow` 提供的 API 涵盖了标准 Mac OS X 窗口中的主要功能。Cocoa 将此行为封装在 `NSWindow` 中，你可以通过使用
    Xcode 在设计时，或在运行时根据需要调用 `NSWindow` 的方法，来设置使用多少这些功能。


    ### 窗口控制器对象


    窗口控制器是图形应用程序设计中的一个重要部分。与其他 GUI 工具包不同，Cocoa 中的大多自定义代码并非作为 `NSWindow` 的子类编写。相反，Cocoa
    使用窗口控制器对象来处理系统中实际的 `NSWindow` 实例的大部分程序化行为。


    这之所以可能，同样是因为你可以使用 Xcode 和 nib 文件在设计时将消息重定向到特定对象。当你需要处理特定类型的操作时，无需创建给定 UI 对象的子类。相反，你只需使用
    Xcode 将对象连接到窗口控制器中的某个特定操作即可。这保证了你能够拥有修改后的行为，而无需创建任何特定 UI 对象的子类。


    通常，定向到 `NSWindow` 的事件会被重定向到窗口控制器以进行即时响应。因此，窗口控制器可以被看作是窗口中功能的总部。你可以根据需要进一步将这些职责划分给其他控制器，但许多简单的应用程序只有一个窗口控制器来响应整个窗口的请求。


    在大型应用程序中，每个窗口都可以拥有自己的窗口控制器，用于响应发送到该窗口的消息。如果其他控件的行为足够复杂以至于需要这种级别的自定义，它们也可以拥有自己的关联控制器。


    ### 委托对象


    在 Cocoa UI 对象提供的出口中，最重要的一个是委托出口。委托是一个自动接收发送给特定 UI 控件或窗口的消息和通知的对象。通过将一个对象设置为 UI
    控件的委托，你将能够处理定向到该控件的消息。这是在基于 Cocoa 的应用程序中处理 UI 事件的主要机制。


    关于在 Xcode UI 中设置委托的示例，请考虑 Window 对象，它是 `NSWindow` 类的一个实例。如果你选中该对象并点击连接检查器（在右侧面板中），你将看到出口列表。其中一个出口是委托对象，它存在于每个
    `NSWindow` 类的对象中，如图 16-4 所示。


    ![A978-1-4302-5906-0_16_Fig4_HTML.jpg](img/A978-1-4302-5906-0_16_Fig4_HTML.jpg)


    图 16-4. 连接 `NSWindow` 对象的委托


    要设置委托对象，你可以像连接任何其他出口一样，将其连接到所需的接收者。你想要使用的对象是文件所有者（即，拥有此 xib 文件的对象）。点击出口连接图标并将其拖拽到文件所有者占位符上，你将看到出口发生变化以指示新的连接。


    一旦委托连接建立，你就可以开始在委托类中添加方法，以处理窗口对象发送的事件。这样的委托类应遵循 `NSWindowDelegate` 协议，该协议定义了发送给委托进行处理的方法。以下是可以委托类中实现的方法列表：


    *   窗口移动消息：`windowWillMove:`、`windowDidMove:`、`windowDidChangeScreen:` 等。

    *   窗口最小化消息：`windowWillMiniaturize:`、`windowDidMiniaturize:`、`windowDidEndLiveResize:`
    等。

    *   窗口更新消息：`windowDidUpdate:`、`windowDidExpose:`、`windowDidBecomeMain:`、`windowWillClose:`
    等。


    ## 使用 Xcode 进行 UI 设计


    在前面的章节中，你了解了 Cocoa UI 对象如何提供创建功能丰富 UI 所需的所有元素。UI 设计过程涉及运行时和设计时元素的协调。Xcode UI 工具构成了此工作流程的重要组成部分。在本节中，你将学习如何使用
    Xcode 来定义 Mac OS X 应用程序的窗口和控件。

    '
- fmt: '### The Elements of a nib File


    The nib file, when edited inside Xcode, presents a number of items that represent
    important elements of a UI-based application. You will learn initially about their
    meaning, and then you will see how they are used in the next few sections.


    All elements of a nib file are displayed in the left panel in the Xcode xib editing
    window. They include UI controls that have been added to the nib as placeholder
    objects, which represent parts the design infrastructure for a GUI application,
    and standard objects, that are in most cases a graphical control and have a real
    representation in the UI.


    There are just a limited number of placeholder objects, but they are important
    parts of the xib configuration. These placeholders are the following:


    ![A978-1-4302-5906-0_16_Fig5_HTML.jpg](A978-1-4302-5906-0_16_Fig5_HTML.jpg)


    Figure 16-5. A sample application with placeholders and normal objects


    - **File’s Owner**: This is a placeholder for the object that owns the nib. The
    File’s Owner needs to exist because it represents a standard and fixed reference
    for the object that contains all other objects in the xib. For example, if an
    `NSWindowController` owns the xib, then the File’s Owner will represent that controller
    object. Using the File’s Owner, you can make connections to the instance variables
    of your own subclass of `NSWindowController`, through outlets that will be automatically
    recognized from your source file instance variables. You can use these outlets
    as the main connection between your code in Objective-C and the objects instantiated
    in the xib.

    - **First Responder**: In a `window`, the first responder is the object that has
    the focus at the moment. The first responder then receives several default events,
    such as keyboard events. You can think about the first responder as the default
    target for events that happen in a window.

    - **Application**: This object is a reference to the `NSApplication` class. This
    placeholder object can be used as the target of standard messages that impact
    the whole application, such as Quit, for example. You can also use this object
    to receive messages directed to your own subclass of `NSApplication`, if you have
    decided to create such a subclass.


    Other than the placeholder objects, there are normal UI objects that have been
    placed in the xib file. These objects appear in a hierarchical way, depending
    on how they contain each other. For example, it is common to add a window object
    to the xib, which will contain one or more controls to display information, and
    a menu object. Figure 16-5 shows an example that displays the placeholder objects
    and the normal objects for a sample application.


    You can interact with objects in this panel by clicking them. When you click an
    object, it becomes the selection used in other panels, such as the properties
    panel. Then you can make changes to the properties of that object as needed.


    ### The Object Library


    The object library is a panel in Xcode that displays a list of all objects that
    can be used to create UIs. If an object is listed in the library, you can quickly
    add it to the xib, and have it as part of the interface you’re designing. These
    objects can also be customized using the properties panel and moved to the location
    you desire.


    The library is organized according to categories, which can be accessed from the
    pull-down control at the top of the object library panel. The main categories
    include Cocoa, Address Book, Automator, and WebKit. Separate categories can be
    added to the object library by third parties. For example, you can add additional
    object libraries or use open source libraries from the Web.


    For standard applications, the Cocoa category is the one that you will use most.
    It contains the basic objects for UI construction in Cocoa. This category is also
    divided into several subcategories, which can be used to classify the large set
    of objects contained in Cocoa. Among these categories you will find:


    - **Controls**: These are objects that represent common interface controls, such
    as buttons, drop-down controls, labels, and data-entry fields. There is a great
    variety of controls with different designs for every situation. For example, buttons
    exist in different forms, such as Push Button, Gradient Button, Rounded Rect Button,
    Textured Button, Help Button, etc. Notice that in many cases these objects map
    to the same Cocoa class (for buttons, this is `NSButton`), but the objects in
    the library come preconfigured to display in different ways. This makes it easier
    for UI designers to find the right objects for their needs.

    - **Data Views**: A data view is used to display or edit data that is attached
    to a data source in Cocoa. The controls have similar behavior to the ones in the
    Controls panel. However, data controls communicate directly with a data source,
    and are capable of displaying or editing the data contained in that source. Therefore,
    these controls are ideal when you are dealing with a collection of data that is
    maintained in a data source such as a relational database.

    - **Layout Views**: A layout view is used to define a layout for other controls
    in a window. It is a utility control, because it is added only to help organizing
    the window. These controls include simple boxes, which define an area in the window
    where other controls will be located. There are also more complex views such as
    a Scroll View or a Vertical Split View.

    - **Windows and Menus**: This category includes objects that represent whole windows,
    toolbars, and menus that can be displayed in the top of the menu bar. There are
    also different windows to choose from, including a standard Window, a Panel (which
    is a small secondary window), a Textured Window, and a Window with Drawer.


    ### Creating a Main Window


    The first step in the UI creation is to add at least one window to the nib. This
    is done by selecting one of the window objects from the object library panel.
    There are several types of windows that you can use in your UI.


    - **Window**: The standard option is a Cocoa window with buttons for closing,
    minimizing, and maximizing. This style of window should be good enough for most
    uses, including editing windows and informational windows.

    - **Panel**: A panel is normally used for transitory purposes. For example, you
    may want to use it to display drawing tools, for the properties of a selected
    element, or for the selection of styles in a document. Panel windows are not supposed
    to be used for a long time, so they have smaller controls that are less frequently
    used.

    - **Textured Window**: A textured window has many of the same properties of a
    standard window. However, it has distinctive background and borders, which make
    it more appropriate for applications that can be used as tools. For example, iTunes
    uses this style of main window: its main purpose is not to edit data, but to work
    as a tool for music playing.

    - **HUD Window**: This style of window is more indicated for transient data or
    informational purposes. For example, you can use it for help information, or to
    display properties of a selected element in the application.


    To add a main window to the nib file, just drag the window object into the edit
    area. You will see that the window will appear as part of the xib design. The
    window will also be added to the panel of objects, displayed on the left side.
    By clicking on one of these items, you will be able to change the properties of
    the window or configure its outlets and actions.'
