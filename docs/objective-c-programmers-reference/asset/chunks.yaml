    \                          encoding:NSASCIIStringEncoding];\n                NSLog(@\"\
    ss %s %d\", bytes, (int)[element length]);\n                [_outStream write:(const\
    \ uint8_t *)bytes\n                       maxLength:[element length]];\n     \
    \       }\n            else\n            {\n                [self releaseStream];\n\
    \            }\n            position++;\n            break;\n\n        case NSStreamEventEndEncountered:\n\
    \            [self releaseStream];\n            break;\n\n        default:\n \
    \           break;\n    }\n}\n```\n\n首先，你声明一个用于临时数据传输的缓冲区。然后，如果事件是 `NSStreamEventHasSpaceAvailable`，这意味着你需要提供额外的数据（如果有）。在上面的代码中，通过测试\
    \ `_position` 是否小于或等于 `outData` 中的元素数量，检查 `outData` 数组中是否存在有效位置。如果存在有效位置，则开始获取相应的\
    \ `NSString`。然后，使用方法 `getCString:maxLength:encoding:` 从 `NSString` 中获取一个 C 字符串（字符数组）。一旦数据被复制到\
    \ `bytes` 数组中，便向 `_outStream` 对象发送 `write:maxLength:` 消息，以便将原始数据传输到输出文件。\n\n**注意：**\
    \ 使用上述示例时，请注意我使用了常量 `NUM_ITEMS_IN_ARRAY` 来简化演示。在实际操作中，你需要做好准备并分配足够的内存来处理任意大小的数据。\n\
    \n如果没有更多可用数据，则调用前面描述的 `releaseStream` 方法。当收到的消息是 `NSStreamEventEndEncountered`\
    \ 时，你也需要释放该流，因为这表示无法再向输出文件添加更多数据。\n\n最后，以下是使用上述类的方法的方式：\n\n```\n+ (AsyncDataWriter*)testWrite\n\
    {\n    AsyncDataWriter *writer = [[AsyncDataWriter alloc] init];\n    [writer\
    \ setupOutputStream:@\"file:///Users/oliveira/testFile4\"];\n    return [writer\
    \ autorelease];\n}\n```\n\n`testWrite` 方法是一个类方法，可以直接调用来测试类的行为。第一步是创建一个新的 `AsyncDataWriter`\
    \ 实例。然后，向 writer 发送 `setupOutputStream:` 消息。这将设置流并尝试打开它。之后，流对象将开始向 `AsyncDataWriter`\
    \ 对象发送事件，并最终将数据传输到输出文件。\n\n尽管使用 `NSStream` 及其子类读取或写入数据并非直截了当，但它为程序员提供了极大的灵活性。首先，`NSStream`\
    \ 的用途具有适应性：它可以用于读写文件、网络套接字或内存缓冲区。因此，你上面编写的代码只需稍作改动即可应用于许多场景。`NSStream` 的另一个优势是其异步行为。使用\
    \ `NSStream` 的应用程序不会因数据输入/输出问题而产生任何延迟，即使在处理大文件时也是如此。这是因为 `NSStream` 会将工作分解为小任务，这些任务会作为应用程序运行循环的一部分来执行，在该循环中所有消息（包括\
    \ UI 消息）都会被处理。因此，应用程序不会在等待这些 I/O 任务完成时停止，而是会继续处理其他事件。\n\n"
- fmt: '## Summary


    In this chapter I showed you how to read and write data to files in Objective-C.
    First, you saw how file paths are represented in the Foundation framework. `NSURL`,
    being a standard and generic class, is currently the preferred way to encode file
    paths.


    You learned how to read simple files using basic classes available in the Foundation
    framework. The framework is designed so that common tasks, such as reading a small
    file, can be performed without much overhead. In fact, it is necessary to call
    only a single method to read or write a file using the `NSString` interface. Similarly,
    it is possible to read or write binary files using the `NSData` class, which allows
    any data format to be stored in memory.


    You also learned about the class `NSStream`, along with its concrete implementations
    `NSInputStream` and `NSOutputStream`. These classes can be used to create an asynchronous
    interface to the file system. They are also used to communicate with network sockets
    or other network resources. In this chapter, you have seen the necessary code
    to read and write data into external files using `NSStream` objects.


    With the conclusion of this chapter, you have learned some of the most fundamental
    techniques used in Objective-C. You now have a good understanding of how object-oriented
    programming works, and how this style of programming is enabled by the libraries
    provided with the language. The next chapter summarizes the information you have
    about the Foundation framework with a reference, covering most of the important
    classes you will use in a Cocoa-based application.


    # Part 2

    Reference


    # 11. The Foundation Framework


    ## Abstract


    In the last few chapters, you learned the basics of the Objective-C language and
    how to write simple programs using it. In this chapter, I will provide a quick
    reference on the most common classes used in Objective-C. These classes are contained
    in the Foundation framework and provide a lot of the groundwork needed to write
    a complete application.


    The first part of the chapter deals with some of the fundamental classes provided
    by the Foundation framework. These classes, such as `NSString` and `NSValue`,
    are used throughout the system and are the basis upon which everything else is
    built.


    In the second part of the chapter, I give a quick reference on the most common
    collection classes. These classes are used to store sets of objects, and are manipulated
    in more complex ways by other classes and algorithms.


    ## Fundamental Classes


    The following fundamental classes are used throughout the system and are the basis
    upon which everything else is built.


    ### NSObject


    The `NSObject` class is the superclass for most other classes in Cocoa. `NSObject`
    provides very important services that are used throughout the system, such as
    allocation, value observation, and method dispatch. In this section, you will
    find a list of the important methods in this class, and how to interact with them.'
