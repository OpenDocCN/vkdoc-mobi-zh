    For example, consider the array `ages` described in the previous example. When
    reading the array declaration, the compiler will reserve a memory area large enough
    to contain as many elements as requested.


    To access a particular element, the compiler will take the address of the beginning
    of the array and add a particular displacement. Therefore, the following code
    is possible:


    `int ages[1000];`


    `// some code to initialize the array ...`


    `void print_item(int pos)`


    `{`


       `int *pointer = ages;`


       `NSLog(@"item value: %d is the same as %d", *(pointer + pos), ages[pos]);`


    `}`


    What this code illustrates is the fact that an array can be converted to a pointer
    of a similar type. Also, adding a value to a pointer is similar to accessing a
    particular element of an array. So, the code above is equivalent to the following,
    in which the array is accessed differently:


    `int ages[1000];`


    `void print_item(int pos)`


    `{`


       `int *pointer = ages;`


       `NSLog(@"item value: %d is the same as %d", pointer[pos], (ages+pos));`


    `}`


    Given the way that arrays are stored in memory by Objective-C compilers, using
    pointers to access array elements is not only possible, but also frequently done
    by professional programmers.


    ## Summary


    In this chapter we provided a quick overview of the main concepts common to both
    the C and Objective-C languages. While we don’t have space to describe every detail
    of the syntax and semantics of the C language, the basic elements discussed here
    can be used to create complex and useful applications.


    The programming methodology of the C language, structured programming, calls for
    the division of programs into related functions. In Objective-C, on the other
    hand, the main concept is the decomposition of programs into classes, which encapsulate
    both the code as well as the data used by their methods. Moreover, Objective-C
    provides a flexible mechanism for runtime code execution through the concept of
    message passing. This is the main topic of the next chapter, in which you will
    begin the exploration of the concepts of object-oriented programming.


    # 2. Classes


    Abstract


    In an object-oriented programming language such as Objective-C, classes are the
    building blocks of applications. They are the syntactic construct used to define
    objects, which are composed of methods and variables. For programmers new to the
    language, it is important to understand that object-oriented programming (OOP)
    features are the keystone of all techniques used in Objective-C.


    In an object-oriented programming language such as Objective-C, classes are the
    building blocks of applications. They are the syntactic construct used to define
    objects, which are composed of methods and variables. For programmers new to the
    language, it is important to understand that object-oriented programming (OOP)
    features are the keystone of all techniques used in Objective-C.


    Without a proper understanding of object-oriented design concepts, it is difficult
    to become proficient in the libraries used on Mac OS X or iOS, since they make
    heavy use of OOP. For this reason, I start this chapter with a concise overview
    of OOP. One of my first objectives is to explain how OOP differs from other popular
    programming paradigms. While structured programming tries to decompose programs
    by means of simple functions, OOP considers the combination of functions and data
    as the real defining concept of programming abstraction. Therefore, OOP languages
    avoid the separation of data from the methods operating on that data. Another
    great advantage of programming in terms of objects is the idea of sending a message
    to other objects and letting these objects decide on the best way to respond to
    the message.


    After an initial introduction to OOP, this chapter gives a detailed description
    of the concept of classes in Objective-C. Special attention is given to the syntactical
    aspects—especially how to create new objects from existing classes. I explain
    how to associate data to these classes, and then proceed to add methods to the
    objects. Methods in Objective-C can also be associated to the class itself, as
    you will see in the examples.


    One of the main features of classes in Objective-C is how they can be neatly decomposed
    into two separate files: one containing the interface and one containing the implementation
    details. This clear separation makes it possible to share only the important aspects
    of a class, while hiding any implementation information that is not needed by
    clients. In this chapter, you will see all the details of the syntax used to create
    classes that provide this simple interface to other parts of the application.


    Finally, I provide examples of how to define instance properties, a simple mechanism
    that exposes data to other objects while retaining control over how that data
    is interpreted and saved. These are the main building blocks of UI objects, and
    learning how to define them will enable you to create flexible classes that can
    respond immediately to changes in other parts of the application. For example,
    properties are used to maintain separate views of the same object, while making
    sure that updates are immediately reflected in each view of the data.


    ## Object-Oriented Programming


    The primary goal of this chapter is to discuss the main features of Objective-C
    targeted at object-oriented programming. OOP is a style of programming in which
    we are encouraged to organize code into classes defined according to the desired
    functionality. The word “class” is a good metaphor since we are trying to classify
    code and data into suitable abstractions.


    Unlike standard implementation technologies such as structured programing, OOP
    provides a flexible mechanism for sending messages to other objects in order to
    execute code. Instead of directly calling a function, as we have been doing up
    to this point, OOP applications just tell other objects what they would like to
    be executed. By sending messages instead of using functions defined at compilation
    time, objects are free to dynamically modify the way they respond to messages.


    The messaging mechanism provided by OOP also facilitates the separation of concerns
    between areas of an application. Using this strategy, an object can concentrate
    only on the basic functionality it provides. At the same time, objects can request
    any additional functionality from other existing objects in the system.


    A class can be interpreted as a prototype for an object. In Objective-C, a class
    is defined in two parts, which are introduced by the keywords `@interface` and
    `@implementation`. These definitions encompass all the information needed by the
    language in order to create runtime objects.


    An object is the runtime instantiation of a particular class. In most of the contexts
    discussed in this book, an instance is equivalent to a runtime object. Therefore,
    you see that objects are created through the explicit instantiation of existing
    classes.'
  trans: "\n### 数组与指针\n\nObjective-C 中数组最重要的特性之一是与指针紧密相关。这两个概念之间的关系源于 Objective-C\
    \ 应用程序中数组内存的创建方式。数组仅作为内存块存储，其中的元素通过距数组起始位置的距离来访问。\n\n例如，考虑前面示例中提到的 `ages` 数组。当编译器读取数组声明时，它会预留一块足够大的内存区域，以容纳所请求数量的元素。\n\
    \n要访问特定元素，编译器会获取数组起始地址并加上特定的偏移量。因此，以下代码是可行的：\n\n```\nint ages[1000];\n\n// 初始化数组的代码\
    \ ...\n\nvoid print_item(int pos)\n\n{\n\n   int *pointer = ages;\n\n   NSLog(@\"\
    item value: %d is the same as %d\", *(pointer + pos), ages[pos]);\n\n}\n```\n\n\
    这段代码说明了一个事实：数组可以转换为同类型的指针。此外，对指针加值相当于访问数组的特定元素。因此，上述代码等同于以下代码，后者以不同方式访问数组：\n\n\
    ```\nint ages[1000];\n\nvoid print_item(int pos)\n\n{\n\n   int *pointer = ages;\n\
    \n   NSLog(@\"item value: %d is the same as %d\", pointer[pos], (ages+pos));\n\
    \n}\n```\n\n鉴于 Objective-C 编译器存储数组的方式，使用指针访问数组元素不仅是可行的，而且也是专业程序员经常采用的做法。\n\n##\
    \ 总结\n\n本章我们简要概述了 C 语言和 Objective-C 语言共有的主要概念。虽然我们没有足够的篇幅来描述 C 语言语法和语义的每个细节，但这里讨论的基本元素足以用来创建复杂且实用的应用程序。\n\
    \nC 语言的编程方法论——结构化编程——要求将程序划分为相关的函数。而另一方面，在 Objective-C 中，主要概念是将程序分解为类，这些类封装了代码以及其方法所使用的数据。此外，Objective-C\
    \ 通过消息传递的概念提供了一种灵活的运行时代码执行机制。这是下一章的主要主题，届时你将开始探索面向对象编程的概念。\n\n# 2. 类\n\n**摘要**\n\
    \n在面向对象编程语言（如 Objective-C）中，类是应用程序的构建块。它们是用于定义对象的语法结构，而对象则由方法和变量组成。对于刚接触该语言的程序员来说，理解面向对象编程特性是\
    \ Objective-C 中所有技术的关键基础，这一点至关重要。\n\n如果没有正确理解面向对象设计概念，就很难熟练使用 Mac OS X 或 iOS 上的库，因为这些库大量使用了\
    \ OOP。因此，在本章开头，我将对 OOP 进行简明概述。我的首要目标之一是解释 OOP 与其他流行编程范式有何不同。虽然结构化编程试图通过简单函数来分解程序，但\
    \ OOP 将函数与数据的结合视为编程抽象的真正定义性概念。因此，OOP 语言避免了将数据与操作这些数据的方法分离开来。使用对象进行编程的另一个巨大优势是：可以向其他对象发送消息，并让这些对象自行决定响应该消息的最佳方式。\n\
    \n在初步介绍 OOP 之后，本章将详细描述 Objective-C 中类的概念。特别关注语法方面——尤其是如何从现有类创建新对象。我将解释如何将数据关联到这些类，然后继续为对象添加方法。正如你将在示例中看到的，Objective-C\
    \ 中的方法也可以关联到类本身。\n\nObjective-C 中类的主要特性之一是它们如何被整齐地分解为两个独立文件：一个包含接口，另一个包含实现细节。这种清晰的分离使得只共享类的关键方面成为可能，同时隐藏客户端不需要的任何实现信息。在本章中，你将看到用于创建类的完整语法细节，这些类为应用程序的其他部分提供了这种简单的接口。\n\
    \n最后，我提供了如何定义实例属性的示例，这是一种简单的机制，在将数据暴露给其他对象的同时，保留对数据如何解释和保存的控制。这些是 UI 对象的主要构建块，学会如何定义它们将使你能够创建灵活的类，这些类可以立即响应应用程序其他部分的变化。例如，属性用于维护同一对象的独立视图，同时确保更新立即反映在数据的每个视图中。\n\
    \n## 面向对象编程\n\n本章的主要目标是讨论 Objective-C 中面向对象编程的主要特性。OOP 是一种编程风格，它鼓励我们根据所需功能将代码组织成定义的类。“类”这个词是一个很好的比喻，因为我们试图将代码和数据分类为合适的抽象。\n\
    \n与结构化编程等标准实现技术不同，OOP 提供了一种灵活的机制，通过向其他对象发送消息来执行代码。OOP 应用程序不是直接调用函数（正如我们到目前为止所做的那样），而是告知其他对象它们希望执行什么操作。通过发送消息而不是使用编译时定义的函数，对象可以自由地动态修改它们响应消息的方式。\n\
    \nOOP 提供的消息传递机制还有助于分离应用程序中不同区域关注点。使用这种策略，对象可以只专注于它所提供的基本功能。同时，对象可以请求系统中其他现有对象的任何附加功能。\n\
    \n类可以被解释为对象的原型。在 Objective-C 中，类由两部分定义，分别由关键字 `@interface` 和 `@implementation`\
    \ 引入。这些定义包含了语言创建运行时对象所需的所有信息。\n\n对象是特定类的运行时实例化。在本书讨论的大多数上下文中，实例等同于运行时对象。因此，你会看到对象是通过对现有类进行显式实例化而创建的。\n"
