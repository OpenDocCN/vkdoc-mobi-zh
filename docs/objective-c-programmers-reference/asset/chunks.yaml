    *   `+ (id)dictionary`；返回一个新的空 `NSDictionary` 对象。

    *   `+ (id)dictionaryWithObject:` `(id)object forKey:(id <NSCopying>)key`；返回一个新的
    `NSDictionary` 对象，其中包含一个已设置到给定键的单一对象。

    *   `+ (id)dictionaryWithObjects:` `(const id [])objects forKeys:(const id [])keys
    count:(NSUInteger)cnt`；返回一个新的 `NSDictionary` 对象，其中包含赋值给第二个参数中键的给定对象集。这些对象与键的数量由参数
    `cnt` 决定。

    *   `+ (id)dictionaryWithObjects:(const id [])objects forKeys:(const id <NSCopying>
    [])keys count:(NSUInteger)cnt`；返回一个新的 `NSDictionary`，其对象和键以 C 风格数组形式给出，对象与键的数量由参数
    `cnt` 决定。键会被复制到容器中。

    *   `+ (id)dictionaryWithObjectsAndKeys:` `(id)firstObject, ...`；返回一个新的 `NSDictionary`
    对象，其对象和键由方法的参数决定。对象和键的列表必须以 nil 结尾。

    *   `+ (id)dictionaryWithDictionary:` `(NSDictionary *)dict`；返回一个新的 `NSDictionary`
    对象，其对象和键与参数 `dict` 相同。

    *   `+ (id)dictionaryWithObjects:(` `NSArray *)objects forKeys:(NSArray *)keys`；返回一个新的
    `NSDictionary` 对象，其对象和键由两个 `NSArray` 对象决定。两个数组必须具有相同数量的元素。

    *   `- (id)initWithObjects:` `(const id [])objects forKeys:(const id [])keys count:(NSUInteger)cnt`；初始化一个
    `NSDictionary` 对象，其中包含赋值给第二个参数中键的给定对象集。这些对象与键的数量由参数 `cnt` 决定。

    *   `- (id)initWithObjects:(const id [])objects forKeys:(const id <NSCopying>
    [])keys count:(NSUInteger)cnt`；初始化一个 `NSDictionary` 对象，其中包含赋值给第二个参数中键的给定对象集。这些对象与键的数量由参数
    `cnt` 决定。键会被复制，且其初始值不会发生任何更改。

    *   `- (id)initWithObjectsAndKeys:` `(id)firstObject, ...`；使用参数列表中提供的一组对象及其对应键来初始化目标
    `NSDictionary` 对象。该列表必须以 nil 结尾。

    *   `- (id)initWithDictionary:` `(NSDictionary *)otherDictionary`；使用另一个 `NSDictionary`
    实例的内容来初始化目标 `NSDictionary` 对象。

    *   `- (id)initWithDictionary:(NSDictionary *)otherDictionary copyItems:(BOOL)flag`；使用另一个
    `NSDictionary` 实例的内容来初始化目标 `NSDictionary` 对象。`otherDictionary` 中包含的值会被复制，而不会在内部保留。

    *   `- (id)initWithObjects:` `(NSArray *)objects forKeys:(NSArray *)keys`；使用对象及其对应键来初始化目标
    `NSDictionary` 对象。对象和键作为两个 `NSArray` 对象提供。

    *   `+ (id)dictionaryWithContentsOfFile:` `(NSString *)path`；创建一个新的 `NSDictionary`
    实例，并使用 `path` 确定的文件内容对其进行初始化。

    *   `+ (id)dictionaryWithContentsOfURL:` `(NSURL *)url`；创建一个新的 `NSDictionary`
    实例，并使用由 `url` 参数标识的文件或网络资源内容对其进行初始化。

    *   `- (id)initWithContentsOfFile:` `(NSString *)path`；使用由 `path` 参数标识的文件内容来初始化目标
    `NSDictionary` 对象。

    *   `- (id)initWithContentsOfURL:(NSURL *)url`；使用由 `url` 参数标识的文件或网络资源内容来初始化目标
    `NSDictionary` 对象。

    *   `- (NSUInteger)count`；返回目标 `NSDictionary` 对象中存储的对象数量。

    *   `- (id)objectForKey:(id)aKey`；返回与作为第一个参数提供的键相对应的对象。

    *   `- (NSEnumerator *)keyEnumerator`；返回一个 `NSEnumerator` 对象，可用于遍历 `NSDictionary`
    中的元素。

    *   `- (NSArray *)allKeys`；返回一个新的 `NSArray`，其中包含目标 `NSDictionary` 实例中存储的所有键。

    *   `- (NSArray *)allKeysForObject:` `(id)anObject`；返回一个新的 `NSArray`，其中包含目标 `NSDictionary`
    中与 anObject 关联的所有键。

    *   `- (NSArray *)allValues`；返回一个新的 `NSArray`，其中包含目标 `NSDictionary` 中存储的所有值。

