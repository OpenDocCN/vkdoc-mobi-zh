  trans: '

    # 总结


    本章讨论了 Objective-C Foundation 框架中一些最重要的类。首先是 `NSString` 类，用于存储和操作字符串。然后介绍了 `NSNumber`
    类，它作为整型、浮点数、字符和布尔值等常见数值的封装器。最后，详细讨论了容器类，包括 `NSArray` 和 `NSDictionary`。


    字符串之所以重要，是因为它们是对输入和输出数据进行编码的最常见方式。`NSString` 类提供了多种初始化方法，可根据字符串数据提供给应用程序的不同方式，用于各种场景。常用功能包括子字符串匹配和比较方法。


    在 Objective-C 中，数字可以通过两种方式处理。原生类型与 C 语言中使用的类型相同，它们最适合用于高性能算法。然而，许多 Objective-C
    类需要引用一个对象。在这些情况下，可以将数字包装在 `NSNumber` 的实例中。该类提供了以所需格式访问数据的方法，包括 `int`、`long`、`float`、`double`、`char`
    和 `BOOL`。


    集合是用于维护其他对象集的对象。`NSArray` 类定义了按顺序存储的对象的接口。`NSArray` 类的对象可以从零开始的索引存储和检索元素。`NSMutableArray`
    是 `NSArray` 的子类，它维护具有可变接口的数组，允许添加和/或删除元素。


    `NSDictionary` 类提供了一个与键关联的元素集合。你需要提供一个有效的键来检索元素。`NSMutableDictionary` 允许用户向字典中添加和删除条目。


    这些类共同提供了编写更复杂算法所需的大部分基础设施，范围从图形界面到游戏编程逻辑。在下一章中，你将看到如何使类对于需要扩展它们的应用程序更加灵活。通过协议和类别，你将了解到两种可用于向现有类添加高级功能的机制。


    # 4. 类别与协议


    ## 摘要


    在 Objective-C 中，类别可用于向类添加方法，即使你无法完全访问该类的原始源文件。


    例如，使用类别可以向系统中的通用类（如 `NSString`、`NSNumber` 甚至 `NSObject`）添加新方法。只要该类别已加载到应用程序中，这样做将使添加的方法对原始类的任何用户都可用。


    如果你需要在新库的上下文中向新类添加复杂功能，或者只是尝试添加一个便捷方法，类别可能会派上用场，这也是 Objective-C 编程如此高效的原因之一。


    与其他遵循强类型机制的面相对象语言相比，可适应接口的设计是 Objective-C 的另一个优势领域。通过声明协议，可以创建独立于特定类的接口，因此，任何希望遵守协议声明中预先设定的一组特定消息的客户端都可以使用这些接口。


    在本章中，我将探讨这两种机制——类别和协议，以及如何使用它们来创建更好的应用程序。首先，你将研究如何创建受益于类别的新类。在本章的第二部分，你将了解协议如何在
    Apple 的库中被使用，以及客户端代码如何从中受益。


    ## 类别


    由于其面相对象的哲学，Objective-C 促进了接口与实现之间的清晰分离。这种关注点分离的一个方面是通过添加方法来扩展类的能力。这可以通过使用类别来实现，这是一种灵活的机制，可供类设计者以及特定类接口的客户端使用。例如，使用类别可以在无需重新编译原始类文件的情况下添加新方法。这在处理第三方提供的现有库时非常有帮助。同样的原则可用于操作
    Apple 提供的框架中的类，例如 Cocoa 和 Cocoa Touch。


    例如，假设你需要添加一个可应用于任何字符串的方法。一种简单的方法是创建 `NSString` 的子类，并将该方法附加到该子类上。然后你可以通过实例化这个新类来创建字符串，这些字符串将能够访问你声明的新方法。由于你可以依赖
    Objective-C 运行时处理多态性，每一个接受字符串的方法也将接受你的新类。


    然而，这种解决方案并不完全令人满意，因为在许多情况下，你无法控制 `NSString` 实例的创建方式：这类字符串经常由其他方法返回。另一个问题是，使用自定义类会失去一些好处，例如使用字符串字面量的可能性。


    另一种处理方式是创建一个 `NSString` 的新类别。在这种情况下，你可以将此方法作为 `NSString` 类接口的一个组成部分来添加。通过导入新类别，项目中任何使用
    `NSString` 的其他类都将能够访问添加的方法，就像它是原始字符串类的一部分一样。


    ### 注意


    通过类别扩展现有类是 Cocoa 框架中常用的技术。通过这种方式，Cocoa 允许 `NSString` 等类整合那些仅在特定库上下文中有意义的特性。一个众所周知的例子是，文本绘制框架为
    `NSString` 添加了一个类别，提供了直接在屏幕上绘制字符串的能力。

