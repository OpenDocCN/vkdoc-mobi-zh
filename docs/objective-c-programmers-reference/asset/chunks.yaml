    `// other code here`


    `}`


    `- (void) dealloc`


    `{`


    `[self.bookName release];`


    `[super dealloc];`


    `}`


    `@end`


    In the first part of the `updateBook:authors:cover:` method, you are responsible
    for storing the value `name` on the `bookName` property. As `bookName` is declared
    using the `assign` attribute, just assigning the parameter name to `bookName`
    doesn’t change the ownership of the object or its internal reference counter.
    Therefore, you need to manually send a `retain` message to the `name` object in
    order to avoid it being released by other owners of this object. As you acquire
    ownership of the property `bookName`, however, you need to guarantee that it will
    be eventually released. This is performed by the `dealloc` method, where you have
    to add code to release the property `self.bookName`.


    The second property, `authors`, has a `copy` attribute. The following example
    shows how you can handle that property:


    `@implementation Book`


    `- (void) updateBook:(NSString*)name authors:(NSArray*)authors`


    `cover:(NSImage*)image`


    `{`


    `self.bookName = name;`


    `[name retain]; // retain is needed here`


    `self.authors = authors; // no need for retain`


    `}`


    `- (void) dealloc`


    `{`


    `[self.bookName release];`


    `self.authors = nil;`


    `[super dealloc];`


    `}`


    `@end`


    As the property `authors` has a `copy` attribute, what you have stored internally
    is not the original object itself, but a copy. Also according to the rules of
    memory management, the copied object, which the `copy:` method returned, is owned
    by whomever created it. This means that you need to `release` the copy at the
    end of its use, or in the `dealloc` method, as you see in the example above. Notice
    that I use the frequently employed trick of assigning `nil` to the object instead
    of calling `release`. By assigning `nil`, you leave the property setter to do
    the release, while at the same time resetting the value of the property to a known
    value.


    The advantage of using a copy property is that you don’t need to worry about any
    changes to the object by external clients. If the property `authors` were declared
    instead as `retain` or `assign`, any changes to the `NSArray` performed outside
    of your class would be reflected in the value stored in the `authors` property.
    Because you are using the `copy` attribute, however, you can rely on the fact
    that the value will not change.


    Finally, the following code is needed to support a `retain` property:


    `@implementation Book`


    `- (void) updateBook:(NSString*)name authors:(NSArray*)authors`


    `cover:(NSImage*)image`


    `{`


    `self.bookName = name;`


    `[name retain]; // retain is needed here`


    `self.authors = authors; // no need for retain`


    `self.coverImage = image;`


    `}`


    `- (void) dealloc`


    `{`


    `[self.bookName release];`


    `self.authors = nil;`


    `self.coverImage = nil;`


    `[super dealloc];`


    `}`


    `@end`


    It turns out that using properties with the `retain` attribute is very similar
    to using properties with the `copy` attribute. During an assignment, the synthetized
    methods for the property are responsible for two things: releasing any existing
    values previously stored, and sending a `retain` message to the object being assigned.
    From your point of view, however, the only additional code you have to write is
    an explicit release when `dealloc` is called. To perform this, you use the same
    trick of assigning `nil` to the `coverImage` property. The synthesized property
    handler will be responsible for releasing the previous value and storing `nil`
    in its place.'
  trans: "\n# 使用属性\n\n使用属性（而非实例变量）来持有新对象并不会改变你在前一节中学到的任何少数规则。然而，属性有其自身的属性，因此明确它们如何与现有的内存管理策略交互就变得至关重要。\n\
    \n当你创建一个新属性时，可以决定它将如何存储分配给它的任何对象。以下是可能的内存属性：\n\n- `retain`：此属性表示，如果该属性是赋值的目标，它将获得对已分配对象的所有权。这意味着标记为\
    \ `retain` 的属性始终拥有其所指向的对象。不过，使用此类属性的一个优点在于，它们会自动向前一个存储的对象发送 `release` 消息，这样你就不会忘记释放它。为避免内存泄漏，你需要在\
    \ `dealloc` 方法中释放存储在此类属性中的任何对象。一种简单的方法是将 `nil` 赋值给该属性，因为这会强制向当前存储的对象发送一条 release\
    \ 消息。\n- `copy`：与前一种情况不同，具有 `copy` 属性的属性不会向对象发送 `retain` 消息，而是创建该对象的一个副本。这意味着分配给该属性的对象的引用计数没有变化，并且你可以更改属性的内容，而不会将任何更改传播到原始对象。这些属性也拥有它们复制的对象，因此你必须在对象被释放之前释放它们，最好在\
    \ `dealloc` 方法中进行。\n- `assign`：此属性用于不需要特殊内存处理的属性。这是默认行为，在这种情况下，属性的行为非常类似于一个简单的实例变量。在这种情况下，属性在内存管理方面的行为没有变化，你应该只使用上一节中讨论的通用内存管理规则。\n\
    \n以下是一个示例，通过使用一个类来存储图书数据，展示了这些属性属性如何与内存管理和引用计数交互：\n\n```\n// 文件 Book.h\n\n@interface\
    \ Book : NSObject\n\n- (void) updateBook:(NSString*)name authors:(NSArray*)authors\n\
    cover:(NSImage*)image;\n\n@property (assign) NSString *bookName;\n@property (copy)\
    \ NSArray *authors;\n@property (retain) NSImage *coverImage;\n\n@end\n```\n\n\
    考虑一个名为 `Book` 的类，你可以在其中存储图书信息，例如书名、作者列表和封面图片。这个类将这些元素都作为属性包含在内，你将根据它们的属性进行更新。该类还有一个方法\
    \ `updateBook:authors:cover:`，负责用传递的参数更新图书数据。\n\n第一个属性 `bookName` 被定义为使用 `assign`\
    \ 属性。\n\n```\n// 文件 Book.m\n\n#import Book.h\n\n@implementation Book\n\n- (void)\
    \ updateBook:(NSString*)name authors:(NSArray*)authors\ncover:(NSImage*)image\n\
    {\n    self.bookName = name;\n    [name retain]; // 此处需要 retain\n    // 其他代码\n\
    }\n\n- (void) dealloc\n{\n    [self.bookName release];\n    [super dealloc];\n\
    }\n\n@end\n```\n\n在 `updateBook:authors:cover:` 方法的第一部分，你负责将值 `name` 存储到 `bookName`\
    \ 属性上。由于 `bookName` 是使用 `assign` 属性声明的，仅将参数名称赋值给 `bookName` 并不会改变对象的所有权或其内部引用计数器。因此，你需要手动向\
    \ `name` 对象发送一条 `retain` 消息，以避免它被该对象的其他所有者释放。然而，一旦你获得了属性 `bookName` 的所有权，就需要确保它最终会被释放。这是由\
    \ `dealloc` 方法执行的，你必须在其中添加代码来释放属性 `self.bookName`。\n\n第二个属性 `authors` 具有 `copy`\
    \ 属性。以下示例展示了如何处理该属性：\n\n```\n@implementation Book\n\n- (void) updateBook:(NSString*)name\
    \ authors:(NSArray*)authors\ncover:(NSImage*)image\n{\n    self.bookName = name;\n\
    \    [name retain]; // 此处需要 retain\n    self.authors = authors; // 不需要 retain\n\
    }\n\n- (void) dealloc\n{\n    [self.bookName release];\n    self.authors = nil;\n\
    \    [super dealloc];\n}\n\n@end\n```\n\n由于属性 `authors` 具有 `copy` 属性，你在内部存储的并非原始对象本身，而是一个副本。同样根据内存管理规则，由\
    \ `copy:` 方法返回的副本对象，其所有权属于创建它的人。这意味着你需要在副本使用结束时释放它，或者在 `dealloc` 方法中释放，就像你在上面的示例中看到的那样。请注意，我使用了常用的技巧，即将\
    \ `nil` 赋值给对象，而不是直接调用 `release`。通过赋值 `nil`，你让属性的设置器去执行释放操作，同时将属性的值重置为一个已知的值。\n\
    \n使用 copy 属性的好处在于，你无需担心外部客户端对对象的任何更改。如果属性 `authors` 被声明为 `retain` 或 `assign`，则任何在类外部对\
    \ `NSArray` 所做的更改都会反映在 `authors` 属性存储的值中。但由于你使用了 `copy` 属性，你可以信赖该值不会改变。\n\n最后，以下代码用于支持\
    \ `retain` 属性：\n\n```\n@implementation Book\n\n- (void) updateBook:(NSString*)name\
    \ authors:(NSArray*)authors\ncover:(NSImage*)image\n{\n    self.bookName = name;\n\
    \    [name retain]; // 此处需要 retain\n    self.authors = authors; // 不需要 retain\n\
    \    self.coverImage = image;\n}\n\n- (void) dealloc\n{\n    [self.bookName release];\n\
    \    self.authors = nil;\n    self.coverImage = nil;\n    [super dealloc];\n}\n\
    \n@end\n```\n\n事实证明，使用带有 `retain` 属性的属性与使用带有 `copy` 属性的属性非常相似。在赋值过程中，该属性的合成方法负责处理两件事：释放任何先前存储的现有值，并向正在被赋值的对象发送一条\
    \ `retain` 消息。然而，从你的角度来看，你唯一需要编写的额外代码是在调用 `dealloc` 时进行显式释放。为此，你使用了同样的技巧，即将 `nil`\
    \ 赋值给 `coverImage` 属性。而合成的属性处理器将负责释放先前存储的值并将 `nil` 存储到其位置上。\n"
- fmt: "# Autorelease Pools\n\nIn the previous sections I discussed the use of `autorelease`.\
    \ This message is sent to an object that needs to be released by the current owner,\
    \ even though this action shouldn’t happen at least until the control has returned\
    \ to the caller. The `autorelease` message is very important to simplify memory\
    \ management in such situations. The `autorelease` method can also help you to\
    \ write more concise code. Look at the following example:\n\n```\n- (void) replaceName:(NSString*)newName\n\
    {\n    NSString *oldName = _bookName;\n    _bookName = newName;\n    [oldName\
    \ release];\n}\n```\n\nThe `replaceName` method operates on the `bookName` property\
    \ declared in the `Book` class. To replace `bookName` with `newName`, you need\
    \ to store the current object in a new variable called `oldName` before you perform\
    \ the assignment. This is necessary because you need to release the current object\
    \ and such a release could change `newName` object as a side effect. Using `autorelease`,\
    \ however, you can simplify this code in the following way:\n\n```\n- (void) replaceName:(NSString*)newName\n\
    {\n    [_bookName autorelease];\n    _bookName = newName;\n}\n```\n\nIn this case,\
    \ you are using `autorelease` as a delayed release so that `newName` will be assigned\
    \ before any real change occurs.\n\nThe seemingly magical mechanism behind `autorelease`\
    \ is called an autorelease pool. The pool is just a data structure that stores\
    \ pointers to objects that need to be released in the future. Then, whenever the\
    \ system libraries call the memory pool, the objects contained in such data structures\
    \ are released. In general, there is an autorelease pool per application thread,\
    \ which is called whenever the application has returned from an event handling\
    \ callback, for example.\n\nEvery application has at least one memory pool. The\
    \ memory pool in the principal thread is installed in the main function. There\
    \ are two ways to install such memory pool. The first way is using the `NSAutoreleasePool`\
    \ object. Here is an example:\n\n```\nint main()\n{\n    NSAutoreleasePool *pool\
    \ = [[NSAutoreleasePool alloc] init];\n    // main application loop is here\n\
    \    [pool release];\n    return 0;\n}\n```\n\nI display here only the parts of\
    \ the `main` function that deal with an autorelease pool. The `pool` object is\
    \ first created by sending the `alloc` message to `NSAutoreleasePool`. The creation\
    \ of this object guarantees that the `autorelease`d objects will be stored in\
    \ the pool and will stay alive until the pool is drained (or `release` is called\
    \ on it).\n\nThe second way to create an autorelease pool is using the `@autoreleasepool`\
    \ keyword. While this is very similar to create an `NSAutoreleasePool` object,\
    \ the keyword allows you to define a block of statements that will be executed\
    \ under the same autorelease pool. The release of the objects stored in the pool\
    \ as well as the creation and release of the pool itself is handled by the compiler.\
    \ Here is an example:\n\n```\nint main()\n{\n    @autoreleasepool\n    {\n   \
    \     // additional statements here\n    }\n    return 0;\n}\n```\n\nWhile I have\
    \ shown only examples of autorelease pools on the main function, there is nothing\
    \ preventing you from creating other autorelease pools at certain points in the\
    \ application. In fact, if you are creating code that needs to create and destroy\
    \ a large number of objects, it may be beneficial to create an intermediate autorelease\
    \ pool to process all objects that need to be released in that segment of code.\n\
    \nThe main advantage of creating additional autorelease pools is that you can\
    \ reduce the total amount of memory needed by your code. This happens because\
    \ such an intermediate pool will anticipate the release of some of the objects\
    \ held in memory. If you see a situation where there is high memory consumption\
    \ caused by a large number of used objects, creating an autorelease pool might\
    \ be a good way to recover some of the memory that is being allocated by your\
    \ code.\n\n# Using ARC\n\nEverything that you have seen in this chapter assumes\
    \ that you are using the `retain`/`release`/`autorelease` methods for memory management.\
    \ While these are the building blocks of memory management in Apple’s Objective-C\
    \ libraries, there are other ways to achieve the same results with less effort\
    \ on the part of the programmer.\n\nAn alternative way to handle memory is to\
    \ use the Automatic Reference Count (ARC) system, which was recently proposed\
    \ by Apple and implemented in their latest compiler. ARC is a system that automatically\
    \ adds the reference count handling code to your program in such a way that you\
    \ don’t need to deal with memory management. Although the usual methods for reference\
    \ counting are still in use, you cannot directly call `retain`, `release`, or\
    \ `autorelease`, so that the compiler can automatically maintain the balance or\
    \ `retain` and `release` calls.\n\nApple has introduced ARC as an alternative\
    \ to manual memory management so programmers don’t need to worry about calling\
    \ the right sequence of methods affecting the internal reference counter of objects.\
    \ At the same time, ARC is a substitute for garbage collection (GC), a technique\
    \ of automatic memory management that was available for a few platforms, including\
    \ desktop applications in the Mac OS X. While GC has a number of advantages, Apple\
    \ has concluded that ARC provides much of the same features of garbage collection,\
    \ while at the same time being a predictable system that will dispose of memory\
    \ as it becomes inaccessible.\n\nIn GC-based systems, there is frequently a lag\
    \ time between objects becoming inaccessible and memory recollection, which sometimes\
    \ translates into unresponsiveness in the application. While this is not a big\
    \ problem on desktop machines, the fact that Objective-C targets small devices\
    \ like cell phones and tablet computers makes it much more difficult to support\
    \ GC across all platforms where Objective-C is deployed. By writing applications\
    \ that use ARC, programmers can take advantage of the wide use of this technology\
    \ and have the same code deployed on each supported platform.\n\n![A978-1-4302-5906-0_8_Fig3_HTML.jpg](A978-1-4302-5906-0_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3.** Project Settings panel in Xcode showing the option for Objective-C\
    \ automatic reference counting\n\nBefore you use ARC, it is necessary to inform\
    \ the compiler that you want it to generate ARC-enabled code. There are no runtime\
    \ changes needed to support ARC code, since the same messages that you have seen\
    \ before will be generated by the compiler. However, the code generation phase\
    \ will need to analyze the current objects in use by the application, and add\
    \ the necessary message calls to either `retain`, `release`, or `autorelease`.\
    \ The necessary compiler settings are available from the Xcode in the Project\
    \ Settings panel (see Figure 8-3).\n\nTo use ARC, you just need to make a few\
    \ changes to your existing code. The most important change is to remove any calls\
    \ to methods such as `retain`, `release`, and `autorelease`. These are the functions\
    \ that directly manipulate the reference counter status for each object in the\
    \ system. With ARC, you need to relinquish these tasks to the compiler and allow\
    \ it to choose the best option for each situation. The compiler does this by analyzing\
    \ the usage patterns for each variable.\n\nFor instance, if the variable is holding\
    \ an object that is returned to the calling function, the ARC-enabled compiler\
    \ knows that it needs to add an `autorelease` call in order to avoid a dangling\
    \ pointer. Similarly, if a variable is created inside a method (using a call to\
    \ `alloc` for example) and never referenced outside it, the compiler deduces that\
    \ the variable needs to be released to prevent a memory leak."
  raw: '## Autorelease Pools


    In the previous sections I discussed the use of `autorelease`. This message is
    sent to an object that needs to be released by the current owner, even though
    this action shouldn’t happen at least until the control has returned to the caller.
    The `autorelease` message is very important to simplify memory management in such
    situations. The `autorelease` method can also help you to write more concise code.
    Look at the following example:


    `- (void) replaceName:(NSString*)newName`


    `{`


    `NSString *oldName = _bookName;`


    `_bookName = newName;`


    `[oldName release];`


    `}`


    The `replaceName` method operates on the `bookName` property declared in the `Book`
    class. To replace `bookName` with `newName`, you need to store the current object
    in a new variable called `oldName` before you perform the assignment. This is
    necessary because you need to release the current object and such a release could
    change `newName` object as a side effect. Using `autorelease`, however, you can
    simplify this code in the following way:


    `- (void) replaceName:(NSString*)newName`


    `{`


    `[_bookName autorelease];`


    `_bookName = newName;`


    `}`


    In this case, you are using autorelease as a delayed release so that `newName`
    will be assigned before any real change occurs.


    The seemingly magical mechanism behind `autorelease` is called an autorelease
    pool. The pool is just a data structure that stores pointers to objects that need
    to be released in the future. Then, whenever the system libraries call the memory
    pool, the objects contained in such data structures are released. In general,
    there is an autorelease pool per application thread, which is called whenever
    the application has returned from an event handling callback, for example.


    Every application has at least one memory pool. The memory pool in the principal
    thread is installed in the main function. There are two ways to install such memory
    pool. The first way is using the `NSAutoreleasePool` object. Here is an example:


    `int main()`


    `{`


    `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


    `// main application loop is here`


    `[pool release];`


    `return 0;`


    `}`


    I display here only the parts of the `main` function that deal with an autorelease
    pool. The `pool` object is first created by sending the `alloc` message to `NSAutoreleasePool`.
    The creation of this object guarantees that the `autorelease`d objects will be
    stored in the pool and will stay alive until the pool is drained (or `release`
    is called on it).


    The second way to create an autorelease pool is using the `@autoreleasepool` keyword.
    While this is very similar to create an `NSAutoreleasePool` object, the keyword
    allows you to define a block of statements that will be executed under the same
    autorelease pool. The release of the objects stored in the pool as well as the
    creation and release of the pool itself is handled by the compiler. Here is an
    example:


    `int main()`


    `{`


    `@autoreleasepool`


    `{`


    `// additional statements here`


    `}`


    `return 0;`


    `}`


    While I have shown only examples of autorelease pools on the main function, there
    is nothing preventing you from creating other autorelease pools at certain points
    in the application. In fact, if you are creating code that needs to create and
    destroy a large number of objects, it may be beneficial to create an intermediate
    autorelease pool to process all objects that need to be released in that segment
    of code.


    The main advantage of creating additional autorelease pools is that you can reduce
    the total amount of memory needed by your code. This happens because such an intermediate
    pool will anticipate the release of some of the objects held in memory. If you
    see a situation where there is high memory consumption caused by a large number
    of used objects, creating an autorelease pool might be a good way to recover some
    of the memory that is being allocated by your code.


    ## Using ARC


    Everything that you have seen in this chapter assumes that you are using the `retain`/`release`/`autorelease`
    methods for memory management. While these are the building blocks of memory management
    in Apple’s Objective-C libraries, there are other ways to achieve the same results
    with less effort on the part of the programmer.


    An alternative way to handle memory is to use the Automatic Reference Count (ARC)
    system, which was recently proposed by Apple and implemented in their latest compiler.
    ARC is a system that automatically adds the reference count handling code to your
    program in such a way that you don’t need to deal with memory management. Although
    the usual methods for reference counting are still in use, you cannot directly
    call `retain`, `release`, or `autorelease`, so that the compiler can automatically
    maintain the balance or `retain` and `release` calls.


    Apple has introduced ARC as an alternative to manual memory management so programmers
    don’t need to worry about calling the right sequence of methods affecting the
    internal reference counter of objects. At the same time, ARC is a substitute for
    garbage collection (GC), a technique of automatic memory management that was available
    for a few platforms, including desktop applications in the Mac OS X. While GC
    has a number of advantages, Apple has concluded that ARC provides much of the
    same features of garbage collection, while at the same time being a predictable
    system that will dispose of memory as it becomes inaccessible.


    In GC-based systems, there is frequently a lag time between objects becoming inaccessible
    and memory recollection, which sometimes translates into unresponsiveness in the
    application. While this is not a big problem on desktop machines, the fact that
    Objective-C targets small devices like cell phones and tablet computers makes
    it much more difficult to support GC across all platforms where Objective-C is
    deployed. By writing applications that use ARC, programmers can take advantage
    of the wide use of this technology and have the same code deployed on each supported
    platform.


    ![A978-1-4302-5906-0_8_Fig3_HTML.jpg](A978-1-4302-5906-0_8_Fig3_HTML.jpg)


    Figure 8-3.


    Project Settings panel in Xcode showing the option for Objective-C automatic reference
    counting


    Before you use ARC, it is necessary to inform the compiler that you want it to
    generate ARC-enabled code. There are no runtime changes needed to support ARC
    code, since the same messages that you have seen before will be generated by the
    compiler. However, the code generation phase will need to analyze the current
    objects in use by the application, and add the necessary message calls to either
    `retain`, `release`, or `autorelease`. The necessary compiler settings are available
    from the Xcode in the Project Settings panel (see Figure [8-3](#A978-1-4302-5906-0_8_Chapter.html#Fig3)).


    To use ARC, you just need to make a few changes to your existing code. The most
    important change is to remove any calls to methods such as `retain`, `release`,
    and `autorelease`. These are the functions that directly manipulate the reference
    counter status for each object in the system. With ARC, you need to relinquish
    these tasks to the compiler and allow it to choose the best option for each situation.
    The compiler does this by analyzing the usage patterns for each variable.


    For instance, if the variable is holding an object that is returned to the calling
    function, the ARC-enabled compiler knows that it needs to add an `autorelease`
    call in order to avoid a dangling pointer. Similarly, if a variable is created
    inside a method (using a call to `alloc` for example) and never referenced outside
    it, the compiler deduces that the variable needs to be released to prevent a memory
    leak.'
  trans: "\n# 自动释放池\n\n在前几节中，我讨论了 `autorelease` 的使用。这个消息会发送给一个需要由当前所有者释放的对象，即使这个操作至少应该等到控制权返回给调用者之后才执行。`autorelease`\
    \ 消息对于在这种情况下简化内存管理非常重要。`autorelease` 方法还可以帮助你编写更简洁的代码。请看下面的示例：\n\n```\n- (void)\
    \ replaceName:(NSString*)newName\n{\n    NSString *oldName = _bookName;\n    _bookName\
    \ = newName;\n    [oldName release];\n}\n```\n\n`replaceName` 方法操作的是在 `Book` 类中声明的\
    \ `bookName` 属性。要用 `newName` 替换 `bookName`，你需要在执行赋值操作之前，将当前对象存储到一个名为 `oldName`\
    \ 的新变量中。这是必要的，因为你需要释放当前对象，而这样的释放可能会作为副作用改变 `newName` 对象。然而，使用 `autorelease`，你可以通过以下方式简化这段代码：\n\
    \n```\n- (void) replaceName:(NSString*)newName\n{\n    [_bookName autorelease];\n\
    \    _bookName = newName;\n}\n```\n\n在这种情况下，你使用 `autorelease` 作为延迟释放，以便在任何实际变更发生之前完成\
    \ `newName` 的赋值。\n\n`autorelease` 背后看似神奇的机制被称为自动释放池。这个池只是一个数据结构，它存储了将来需要释放的对象的指针。然后，每当系统库调用这个内存池时，包含在这些数据结构中的对象就会被释放。通常，每个应用程序线程都有一个自动释放池，每当应用程序从事件处理回调（例如）返回时，这个池就会被调用。\n\
    \n每个应用程序至少有一个内存池。主线程中的内存池是在 `main` 函数中建立的。建立这种内存池有两种方式。第一种方式是使用 `NSAutoreleasePool`\
    \ 对象。示例如下：\n\n```\nint main()\n{\n    NSAutoreleasePool *pool = [[NSAutoreleasePool\
    \ alloc] init];\n    // 主应用程序循环位于此处\n    [pool release];\n    return 0;\n}\n```\n\
    \n这里我只展示了 `main` 函数中处理自动释放池的部分。首先通过向 `NSAutoreleasePool` 发送 `alloc` 消息来创建 `pool`\
    \ 对象。创建此对象保证了被 `autorelease` 的对象将被存储在池中，并且会一直存在，直到池被排空（或者对其调用 `release`）。\n\n\
    创建自动释放池的第二种方法是使用 `@autoreleasepool` 关键字。虽然这与创建 `NSAutoreleasePool` 对象非常相似，但这个关键字允许你定义一个语句块，该语句块将在同一个自动释放池下执行。存储在池中的对象的释放，以及池本身的创建和释放，都由编译器处理。示例如下：\n\
    \n```\nint main()\n{\n    @autoreleasepool\n    {\n        // 此处为其他语句\n    }\n\
    \    return 0;\n}\n```\n\n虽然我只展示了在 `main` 函数中自动释放池的示例，但这并不妨碍你在应用程序的特定位置创建其他自动释放池。事实上，如果你编写的代码需要创建和销毁大量对象，那么创建一个中间自动释放池来处理该代码段中所有需要释放的对象可能会很有益处。\n\
    \n创建额外自动释放池的主要优点是，你可以减少代码所需的总内存量。这是因为这样的中间池会提前释放内存中持有的部分对象。如果你遇到由于使用了大量对象而导致内存消耗过高的情况，创建自动释放池可能是回收代码正在分配的部分内存的一个好方法。\n\
    \n# 使用 ARC\n\n你在本章中看到的所有内容都假设你正在使用 `retain`/`release`/`autorelease` 方法进行内存管理。虽然这些是\
    \ Apple 的 Objective-C 库中内存管理的基础构建块，但也有其他方法可以让程序员用更少的精力达到相同的效果。\n\n另一种处理内存的方法是使用自动引用计数（ARC）系统，该系统是\
    \ Apple 最近提出并在其最新的编译器中实现的。ARC 是一个系统，它会自动将引用计数处理代码添加到你的程序中，这样你就不需要处理内存管理了。尽管引用计数的常规方法仍在底层使用，但你无法直接调用\
    \ `retain`、`release` 或 `autorelease`，以便编译器能够自动维护 `retain` 和 `release` 调用的平衡。\n\
    \nApple 引入 ARC 作为手动内存管理的替代方案，这样程序员就不需要担心调用影响对象内部引用计数器的正确方法序列。同时，ARC 也是垃圾回收（GC）的替代品，垃圾回收是一种自动内存管理技术，适用于少数平台，包括\
    \ Mac OS X 中的桌面应用程序。虽然 GC 有很多优点，但 Apple 得出结论，ARC 提供了垃圾回收的大部分相同特性，同时也是一个可预测的系统，会在内存变得不可访问时将其释放。\n\
    \n在基于 GC 的系统中，对象变得不可访问与内存回收之间通常存在滞后时间，这有时会导致应用程序无响应。虽然这在桌面机器上不是什么大问题，但 Objective-C\
    \ 针对如手机和平板电脑等小型设备这一事实，使得在所有部署 Objective-C 的平台上支持 GC 变得更加困难。通过编写使用 ARC 的应用程序，程序员可以利用这项技术的广泛应用，并在每个支持的平台上部署相同的代码。\n\
    \n![A978-1-4302-5906-0_8_Fig3_HTML.jpg](img/A978-1-4302-5906-0_8_Fig3_HTML.jpg)\n\
    \n**图 8-3.** Xcode 中的项目设置面板，显示了 Objective-C 自动引用计数的选项\n\n在你使用 ARC 之前，有必要通知编译器你希望它生成启用\
    \ ARC 的代码。支持 ARC 代码不需要任何运行时更改，因为你之前看到过的那些相同消息将由编译器生成。但是，代码生成阶段需要分析应用程序当前正在使用的对象，并添加必要的消息调用，无论是\
    \ `retain`、`release` 还是 `autorelease`。所需的编译器设置在 Xcode 的项目设置面板中可用（参见图 8-3）。\n\n\
    要使用 ARC，你只需要对现有代码做一些更改。最重要的更改是删除任何对诸如 `retain`、`release` 和 `autorelease` 等方法的调用。这些是直接操纵系统中每个对象引用计数器状态的函数。使用\
    \ ARC，你需要将这些任务交给编译器，并允许它为每种情况选择最佳选项。编译器通过分析每个变量的使用模式来实现这一点。\n\n例如，如果变量持有一个将返回给调用函数的对象，启用\
    \ ARC 的编译器会知道它需要添加一个 `autorelease` 调用来避免悬空指针。类似地，如果变量是在方法内部创建的（例如，使用对 `alloc`\
    \ 的调用）并且从未在外部被引用，编译器会推断出需要释放该变量以防止内存泄漏。\n"
- fmt: "在使用`ARC`之前，需要对代码进行另一项改动，即移除附加在属性上的与内存管理相关的特性。例如，`ARC`不识别如`retain`或`assign`这样的特性。原因在于，这些决策应在编译分析层面完成。`ARC`的目标是避免像`retain`和`assign`特性所代表的那种手动内存分配思维。\n\
    \n使用`ARC`时的另一个改动是考虑所分配内存的结构，以避免由循环引用导致的内存泄漏。循环引用指的是当一系列对象相互指向，使得每个对象`retain`下一个对象时发生的情况。为了了解这种情况如何发生，请考虑以下简化示例：\n\
    \n```\n// file SimpleReference.h\n\n@interface SimpleReference : NSObject\n\n\
    @property (retain) SimpleReference *nextObject;\n\n+ (SimpleReference*) setupCircularReferences;\n\
    \n@end\n```\n\n这个`SimpleReference`类除了包含对下一个对象的引用外，几乎不做其他事情。您可以将其视为一种链表数据结构，可用于遍历一系列链接的对象。该接口还包含一个类方法`setupCircularReferences`，它将返回一个包含引用的`SimpleReference`对象，您将在下文看到这一点。\n\
    \n该类的实现部分包含一些生成循环引用的代码：\n\n```\n// file SimpleReference.m\n\n#import \"SimpleReference.h\"\
    \n\n@implementation SimpleReference\n\n+ (SimpleReference*) setupCircularReferences\n\
    {\n    SimpleReference *r1 = [[SimpleReference alloc] init];\n    SimpleReference\
    \ *r2 = [[SimpleReference alloc] init];\n    SimpleReference *r3 = [[SimpleReference\
    \ alloc] init];\n    // create circular references\n    r1.nextObject = r2;\n\
    \    r2.nextObject = r3;\n    r3.nextObject = r1;\n    return [r1 autorelease];\n\
    }\n\n@end\n```\n\n这段代码实现了一个简单的方法，分配了三个`SimpleReference`对象并以会产生循环引用的方式设置它们。发生这种情况的原因是`nextObject`属性使用了`retain`特性声明。因此，每次向链表中添加对象时，都会创建一个强引用。\n\
    \n此类循环引用的问题在于它们与引用计数机制配合不佳。假设现在您有以下辅助类：\n\n```\n// file SimpleReferenceUtil.h\n\
    \n@interface SimpleReferenceUtil : NSObject\n\n@property (retain) SimpleReference\
    \ *aReference;\n\n- (void) createReference;\n\n@end\n```\n\n这个类通过属性`aReference`持有并强引用了一个`SimpleReference`对象。以下是其实现：\n\
    \n```\n// file SimpleReferenceUtil.m\n\n#import \"SimpleReferenceUtil.h\"\n\n\
    @implementation SimpleReferenceUtil\n\n- (void) createReference\n{\n    self.aReference\
    \ = [SimpleReference setupCircularReferences];\n}\n\n@end\n```\n\n创建代码执行后，`SimpleReferenceUtil`类将持有一个指向`SimpleReference`类实例的强指针。由于`SimpleReference`内部存在循环引用，即使您尝试对`aReference`属性调用`release`，其中包含的三个对象仍将保持正的引用计数。这些对象将构成一块未使用且不可访问的内存区域，也就是内存泄漏。\n\
    \n使用`ARC`，您可以通过将至少一个指针声明为具有`weak`属性来避免这种情况。当属性被标记为`weak`属性时，编译器会以这样一种方式生成代码：当只有`weak`变量指向一个对象时，该对象将被释放。回到前面的示例，通过使用`weak`属性（或标记有`__weak`修饰符的变量），您可以解决循环引用问题。以下是您可以如何修改`SimpleReference`类的接口：\n\
    \n```\n// file SimpleReferenceUtil.h\n\n@interface SimpleReferenceUtil : NSObject\n\
    \n@property (weak) SimpleReference *aReference;\n\n- (void) createReference;\n\
    \n@end\n```\n\n使用这个新接口并在`ARC`编译设置下，`aReference`属性不允许保留它指向的对象。当然，您还必须提供一种使用非`weak`属性或变量来持有引用的方法。但您可以以不引入循环的方式做到这一点，例如使用一个外部数组，如下所示：\n\
    \n```\n+ (SimpleReference*) setupReferences:(NSMutableArray*)refs\n{\n    SimpleReference\
    \ *r1 = [[SimpleReference alloc] init];\n    SimpleReference *r2 = [[SimpleReference\
    \ alloc] init];\n    SimpleReference *r3 = [[SimpleReference alloc] init];\n \
    \   // create weak circular references\n    r1.nextObject = r2;\n    r2.nextObject\
    \ = r3;\n    r3.nextObject = r1;\n    [refs addObject:r1];\n    [refs addObject:r2];\n\
    \    [refs addObject:r3];\n    return r1;\n}\n```\n\n这次，您有一组对象被添加到`refs`数组中，这足以避免任何对象被过早释放。这是因为当这些对象被插入到`NSArray`中时，作为数组实例正常操作的一部分，它们会被强引用。在创建了这些额外的（强）引用后，这些对象不会像在只有`weak`引用的情况下那样在方法结束时被释放。"
  raw: 'Another change that needs to be done prior to using ARC in your code is to
    remove the memory-related attributes attached to properties. For example, ARC
    doesn’t honor attributes such as `retain` or `assign`. The reason is that these
    decisions should be done at a compilation-analysis level. The goal of ARC is to
    prevent the kind of manual allocation thinking that is represented by `retain`
    and `assign` attributes.


    The next change when using ARC is to think about the structure of the memory you
    are allocating, in order to avoid memory leaks caused by circular references.
    A circular reference happens when a sequence of objects points to each other in
    such a way that each object `retain`s the next one.To see how this can happen,
    consider the following, simplified example:


    `// file SimpleReference.h`


    `@interface SimpleReference : NSObject`


    `@property (retain) SimpleReference *nextObject;`


    `+ (SimpleReference*) setupCircularReferences;`


    `@end`


    This class, `SimpleReference`, doesn’t do much other than contain a reference
    for the next object. You can think of it as a kind of linked list data structure
    that can be used to step through a sequence of linked objects. The interface also
    has a class method, `setupCircularReferences`, that returns a `SimpleReference`
    object containing references, as you will see next.


    The implementation section of this class contains some code to generate the circular
    references:


    `// file SimpleReference.m`


    `#import "SimpleReference.h"`


    `@implementation SimpleReference`


    `+ (SimpleReference*) setupCircularReferences`


    `{`


    `SimpleReference *r1 = [[SimpleReference alloc] init];`


    `SimpleReference *r2 = [[SimpleReference alloc] init];`


    `SimpleReference *r3 = [[SimpleReference alloc] init];`


    `// create circular references`


    `r1.nextObject = r2;`


    `r2.nextObject = r3;`


    `r3.nextObject = r1;`


    `return [r1 autorelease];`


    `}`


    `@end`


    This code implements a simple method that allocates three `SimpleReference` objects
    and sets them up in a way that will generate a circular reference. The reason
    why this happens is that the `nextObject` property is declared using the `retain`
    attribute. Therefore, each time you add an object to the linked list, you are
    creating a retained reference.


    The problem of such circular references is that they don’t work nicely with reference
    counting. Suppose now that you have the following helper class:


    `// file SimpleReferenceUtil.h`


    `@interface SimpleReferenceUtil : NSObject`


    `@property (retain) SimpleReference *aReference;`


    `- (void) createReference;`


    `@end`


    This class holds and retains a `SimpleReference` object, using the property `aReference`.
    Here is the implementation:


    `// file SimpleReferenceUtil.m`


    `#import "SimpleReferenceUtil.h"`


    `@implementation SimpleReferenceUtil`


    `- (void) createReference`


    `{`


    `self.aReference = [SimpleReference setupCircularReferences];`


    `}`


    `@end`


    After the creation code is executed, the class `SimpleReferenceUtil` will have
    a retained pointer to an instance of the `SimpleReference` class. As a result
    of the circular references contained inside `SimpleReference`, the three objects
    contained there will still have a positive reference counter even after you try
    to call `release` on the `aReference` property. These objects will constitute
    an unused and inaccessible area of memory, that is, a memory leak.


    Using ARC, you can avoid this situation by declaring at least one of the pointers
    to have the attribute `weak`. When a property is marked with a `weak` attribute,
    the compiler will generate code in such a way that an object will be released
    when there are only `weak` variables pointing to it. Going back to the previous
    example, by using `weak` properties (or variables marked with the `__weak` modifier),
    you can solve the problem of circular references. Here is how you could modify
    the interface of the `SimpleReference` class:


    `// file SimpleReferenceUtil.h`


    `@interface SimpleReferenceUtil : NSObject`


    `@property (weak) SimpleReference *aReference;`


    `- (void) createReference;`


    `@end`


    With this new interface and under ARC compilation settings, the property `aReference`
    is not allowed to retain the objects it points to. Of course, you also have to
    provide a way to retain the reference using a non-`weak` property or variable.
    But you can do this in a way that will not introduce circularity, such as using
    an external array, like this:


    `+ (SimpleReference*) setupReferences:(NSMutableArray*)refs`


    `{`


    `SimpleReference *r1 = [[SimpleReference alloc] init];`


    `SimpleReference *r2 = [[SimpleReference alloc] init];`


    `SimpleReference *r3 = [[SimpleReference alloc] init];`


    `// create weak circular references`


    `r1.nextObject = r2;`


    `r2.nextObject = r3;`


    `r3.nextObject = r1;`


    `[refs addObject:r1];`


    `[refs addObject:r2];`


    `[refs addObject:r3];`


    `return r1;`


    `}`


    This time you have a list of objects being added to the `refs` array, which will
    be enough to avoid any of the objects being prematurely released. This happens
    because, as these objects are inserted into the NSArray, they are retained as
    part of the normal operation of array instances. After these extra (retained)
    references are created, the objects will not be released at the end of the method,
    as it would happen if you had only `weak` references.'
