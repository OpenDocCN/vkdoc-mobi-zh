    (^)(id obj, NSUInteger idx, BOOL *stop))predicate`；返回一个索引集合，其中包含那些满足作为参数传入的谓词
    block 的对象。元素测试的顺序由 `opts` 参数决定。

    - `- (NSIndexSet *)indexesOfObjectsAtIndexes:(NSIndexSet *)s options:(NSEnumerationOptions)opts
    passingTest:(BOOL (^)(id obj, NSUInteger idx, BOOL *stop))predicate`；返回一个索引集合，其中包含那些满足作为参数传入的谓词
    block 的对象。仅使用第一个参数指示的对象。元素测试的顺序由 `opts` 参数决定。

    - `- (NSArray *)sortedArrayUsingComparator:(NSComparator)cmptr`；使用作为参数给定的比较器，返回一个新的已排序数组。

    - `- (NSArray *)sortedArrayWithOptions:(NSSortOptions)opts usingComparator:(NSComparator)cmptr`；使用作为参数给定的比较器，并采用提供的排序选项，返回一个新的已排序数组。

    - `- (NSUInteger)indexOfObject:(id)obj inSortedRange:(NSRange)r options:(NSBinarySearchingOptions)opts
    usingComparator:(NSComparator)cmp`；返回给定对象在目标 `NSArray` 对象的范围 r 中的索引。搜索使用给定的选项执行，并使用作为最后一个参数提供的比较器。

    - `+ (id)array`；返回一个新的空数组。

    - `+ (id)arrayWithObject:(id)anObject`；返回一个包含单个对象的新数组。

    - `+ (id)arrayWithObjects:(const id [])objects count:(NSUInteger)cnt`；返回一个包含由
    C 风格数组决定的一组对象的新数组。数组中的元素数量由 `cnt` 给出。

    - `+ (id)arrayWithObjects:(id)firstObj, ...`；返回一个新的 `NSArray`，其中包含由方法参数序列决定的一组对象。参数列表必须以
    nil 结尾。

    - `+ (id)arrayWithArray:(NSArray *)array`；返回一个使用给定数组中的对象初始化的新数组。

    - `- (id)initWithObjects:(const id [])objects count:(NSUInteger)cnt`；使用作为第一个参数传入的
    C 风格数组中的对象初始化一个 `NSArray` 对象。这些对象的数量由 `cnt` 决定。

    - `- (id)initWithObjects:(id)firstObj, ...`；使用由方法参数序列决定的一组对象初始化一个 `NSArray`。参数列表必须以
    nil 结尾。

    - `- (id)initWithArray:(NSArray *)array`；使用一个已有的 `NSArray` 初始化目标 `NSArray` 对象。

    - `- (id)initWithArray:(NSArray *)array copyItems:(BOOL)flag`；使用一个已有的 `NSArray`
    对象初始化目标 `NSArray`。仅当 flag 为 YES 时，才会复制项目。

    - `+ (id)arrayWithContentsOfFile:(NSString *)path`；使用由 `path` 参数决定的文件内容创建一个新的
    `NSArray` 对象。

    - `+ (id)arrayWithContentsOfURL:(NSURL *)url`；使用由 `url` 参数决定的文件或网络资源内容创建一个新的 `NSArray`
    对象。

    - `- (id)initWithContentsOfFile:(NSString *)path`；使用由 `path` 参数决定的文件内容初始化一个 `NSArray`
    对象。

    - `- (id)initWithContentsOfURL:(NSURL *)url`；使用由 `url` 参数决定的文件或网络资源内容初始化一个 `NSArray`
    对象。

    '
- fmt: '### NSDictionary


    An `NSDictionary` is an associative collection. That is, it provides an association
    between objects and their corresponding keys. The `NSDictionary` class gives support
    to some of the most common operations on such associative collections. Here follows
    a list of its methods:'
  raw: '### NSDictionary


    An `NSDictionary` is an associative collection. That is, it provides an association
    between objects and their corresponding keys. The `NSDictionary` class gives support
    to some of the most common operations on such associative collections. Here follows
    a list of its methods:'
  trans: '

    ### NSDictionary


    `NSDictionary` 是一种关联集合。也就是说，它提供了对象与其对应键之间的关联。`NSDictionary` 类支持对此类关联集合进行一些最常见的操作。以下是其方法列表：

    '
- fmt: '*   `+ (id)dictionary`; returns a new empty `NSDictionary` object.

    *   `+ (id)dictionaryWithObject:` `(id)object forKey:(id <NSCopying>)key`; returns
    a new `NSDictionary` object with a single object set to the given key.

    *   `+ (id)dictionaryWithObjects:` `(const id [])objects forKeys:(const id [])keys
    count:(NSUInteger)cnt`; returns a new `NSDictionary` object with the given set
    of objects assigned to the keys in the second parameter. The number of such objects
    and keys is determined by the parameter `cnt`.

    *   `+ (id)dictionaryWithObjects:(const id [])objects forKeys:(const id <NSCopying>
    [])keys count:(NSUInteger)cnt`; returns a new `NSDictionary` with the objects
    and keys given as C-style arrays, with the number of such objects and keys given
    by the parameter `cnt`. The key are copied into the container.

    *   `+ (id)dictionaryWithObjectsAndKeys:` `(id)firstObject, ...`; returns a new
    `NSDictionary` object with the objects and keys determined by the arguments to
    the method. The list of objects and keys must be ended by nil.

    *   `+ (id)dictionaryWithDictionary:` `(NSDictionary *)dict`; returns a new `NSDictionary`
    object with the same objects and keys as the parameter `dict`.

    *   `+ (id)dictionaryWithObjects:(` `NSArray *)objects forKeys:(NSArray *)keys`;
    returns a new `NSDictionary` object with objects and keys determined by two `NSArray`
    objects. The two arrays must have the same number of elements.

    *   `- (id)initWithObjects:` `(const id [])objects forKeys:(const id [])keys count:(NSUInteger)cnt`;
    initializes a `NSDictionary` object with the given set of objects assigned to
    the keys in the second parameter. The number of such objects and keys is determined
    by the parameter `cnt`.

    *   `- (id)initWithObjects:(const id [])objects forKeys:(const id <NSCopying>
    [])keys count:(NSUInteger)cnt`; initializes an `NSDictionary` object with the
    given set of objects assigned to the keys in the second parameter. The number
    of such objects and keys is determined by the parameter `cnt`. The keys are copied,
    and no changes are made to their initial values.

    *   `- (id)initWithObjectsAndKeys:` `(id)firstObject, ...`; initializes the target
    `NSDictionary` object with a list of objects and their respective keys as supplied
    in the list of parameters. The list must be terminated by nil.

    *   `- (id)initWithDictionary:` `(NSDictionary *)otherDictionary`; initializes
    the target `NSDictionary` object with the contents of another instance of `NSDictionary`.

    *   `- (id)initWithDictionary:(NSDictionary *)otherDictionary copyItems:(BOOL)flag`;
    initializes the target `NSDictionary` object with the contents of another instance
    of `NSDictionary`. The values contained in `otherDictionary` are copied and are
    not retained internally.

    *   `- (id)initWithObjects:` `(NSArray *)objects forKeys:(NSArray *)keys`; initializes
    the target `NSDictionary` object with objects and their respective keys. Objects
    and keys are supplied are two `NSArray` objects.

    *   `+ (id)dictionaryWithContentsOfFile:` `(NSString *)path`; creates a new instance
    of `NSDictionary` and initializes it with the contents of the file determined
    by `path`.

    *   `+ (id)dictionaryWithContentsOfURL:` `(NSURL *)url`; creates a new instance
    of `NSDictionary` and initializes it with the contents of the file or network
    resource identified by the `url` parameter.

    *   `- (id)initWithContentsOfFile:` `(NSString *)path`; initializes the target
    `NSDictionary` using the contents of the file identified by the `path` parameter.

    *   `- (id)initWithContentsOfURL:(NSURL *)url`; initializes the target `NSDictionary`
    using the contents of the file or network resource identified by the `url` parameter.

    *   `- (NSUInteger)count`; returns the number of objects stored in the target
    `NSDictionary` object.

    *   `- (id)objectForKey:(id)aKey`; returns the object that corresponds to the
    key provided as the first parameter.

    *   `- (NSEnumerator *)keyEnumerator`; returns an `NSEnumerator` object that can
    be used to step through the elements of the `NSDictionary`.

    *   `- (NSArray *)allKeys`; returns a new `NSArray` containing all keys stored
    in the target `NSDictionary` instance.

    *   `- (NSArray *)allKeysForObject:` `(id)anObject`; returns a new `NSArray` containing
    all keys associated with anObject in the target `NSDictionary`.

    *   `- (NSArray *)allValues`; returns a new `NSArray` containing all values stored
    in the target `NSDictionary`.

    *   `- (NSString *)description`; returns a short description of the `NSDictionary`
    instance. Usually employed for debugging purposes.

    *   `- (NSString *)descriptionWithLocale:` `(id)locale`; returns a short description
    of `NSDictionary` instance, using the supplied locale.

    *   `- (NSString *)descriptionWithLocale:(id)locale indent:(NSUInteger)level`;
    returns a short description of the `NSDictionary` instance, using the supplied
    locale, and indented by the level indicated in the last argument.

    *   `- (BOOL)isEqualToDictionary:` `(NSDictionary *)otherDictionary`; returns
    YES if the targeted `NSDictionary` has the same objects and keys as the supplied
    dictionary.

    *   `- (NSEnumerator *)objectEnumerator`; returns an `NSEnumerator` object, which
    can be used to step through the elements of the `NSDictionary`.

    *   `- (NSArray *)objectsForKeys:` `(NSArray *)keys notFoundMarker:(id)marker`;
    returns a new `NSArray` that contains all objects that are associated with one
    of the keys stored in the first argument. A marker is used to indicate that a
    particular key has no association in the target `NSDictionary`.

    *   `- (BOOL)writeToFile:` `(NSString *)path atomically:(BOOL)useAuxiliaryFile`;
    writes the content of the `NSDictionary` to a file indicated by the `path` parameter.
    If the second argument is YES, then a temporary file is used to hold the transferred
    content until the whole data is stored.

    *   `- (BOOL)writeToURL:` `(NSURL *)url atomically:(BOOL)atomically`; writes the
    content of the `NSDictionary` to a file or network resource indicated by the `url`
    parameter. If the second argument is YES, then a temporary file is used to hold
    the transferred content until the whole data is stored.

    *   `- (NSArray *)keysSortedByValueUsingSelector:` `(SEL)comparator`; returns
    a new `NSArray` containing the set of keys stored in the `NSDictionary`, sorted
    by value according to the selector passed as argument.

    *   `- (void)getObjects:` `(id __unsafe_unretained [])objects andKeys:(id __unsafe_unretained
    [])keys`; copies the set of objects and keys contained in the `NSDictionary` into
    the C-style arrays provided as parameters.

    *   `- (id)objectForKeyedSubscript:` `(id)key`; returns the object corresponding
    to the given key in the target `NSDictionary`.

    *   `- (void)enumerateKeysAndObjectsUsingBlock:` `(void (^)(id key, id obj, BOOL
    *stop))block`; calls the block argument for each key stored in the target `NSDictionary`.

    *   `- (void)enumerateKeysAndObjectsWithOptions:` `(NSEnumerationOptions)opts
    usingBlock:(void (^)(id key, id obj, BOOL *stop))block`; calls the block passed
    as argument for each key stored in the target `NSDictionary`, using the given
    enumeration options.

    *   `- (NSArray *)keysSortedByValueUsingComparator:` `(NSComparator)cmptr`; returns
    a new `NSArray` containing all the keys stored in the `NSDictionary` instance,
    sorted according to the comparator object passed as an argument.

    *   `- (NSArray *)keysSortedByValueWithOptions:(NSSortOptions)opts usingComparator:(NSComparator)cmptr`;
    returns a new array containing all keys stored in the target `NSDictionary`, sorted
    according to the given options, and using the comparator object `cmptr`.

    *   `- (NSSet *)keysOfEntriesPassingTest:` `(BOOL (^)(id key, id obj, BOOL *stop))predicate`;
    returns a `NSSet` object containing all the keys stored in the target `NSDictionary`
    that pass the test determined by the `predicate` parameter.

    *   `- (NSSet *)keysOfEntriesWithOptions:` `(NSEnumerationOptions)opts passingTest:(BOOL
    (^)(id key, id obj, BOOL *stop))predicate`; returns a `NSSet` object containing
    all the keys stored in the target `NSDictionary` that pass the test determined
    by the `predicate` parameter. The enumeration is performed according to the enumeration
    option `opts`.'
