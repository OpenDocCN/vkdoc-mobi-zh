    **)error`; 使用给定 URL 的内容初始化字符串。例如，这可用于加载文件或网页的内容。它使用作为第二个参数提供的编码。如果发生失败，此函数可能返回一个错误对象。

    - `- (id)initWithContentsOfFile:(NSString *)path encoding:(NSStringEncoding)enc
    error:(NSError **)error`; 使用文件的内容初始化字符串，文件的路径由第一个参数决定，并使用给定的编码。如果出错，此函数也可能返回一个错误对象。

    - `+ (id)stringWithContentsOfURL:(NSURL *)url encoding:(NSStringEncoding)enc error:(NSError
    **)error`; 返回一个新字符串，该字符串使用第一个参数中传入的 URL 的内容，并使用给定的编码。如果失败，可能返回一个错误对象。

    - `+ (id)stringWithContentsOfFile:(NSString *)path encoding:(NSStringEncoding)enc
    error:(NSError **)error`; 返回一个新字符串，该字符串使用文件的内容初始化，文件的路径在第一个参数中给出。文件使用给定的编码进行解释。如果发生失败，可能返回一个错误对象。

    - `- (id)initWithContentsOfURL:(NSURL *)url usedEncoding:(NSStringEncoding *)enc
    error:(NSError **)error`; 使用给定 URL 对象的内容初始化新字符串。URL 的内容使用第二个参数进行编码。如果失败，可能返回一个错误对象。

    - `- (id)initWithContentsOfFile:(NSString *)path usedEncoding:(NSStringEncoding
    *)enc error:(NSError **)error`; 使用由 `path` 参数确定的文件内容初始化字符串对象。所使用的编码在第二个参数中给出。最后，如果失败，可能返回一个错误对象。

    - `+ (id)stringWithContentsOfURL:(NSURL *)url usedEncoding:(NSStringEncoding *)enc
    error:(NSError **)error`; 返回一个新字符串，该字符串使用给定 URL 的内容初始化，该 URL 可以是本地文件或远程资源。内容使用第二个参数进行编码，如果失败，可能返回一个错误对象。

    - `+ (id)stringWithContentsOfFile:(NSString *)path usedEncoding:(NSStringEncoding
    *)enc error:(NSError **)error`; 返回一个新对象。该字符串使用存储在给定路径中的文件内容进行初始化，并使用作为第二个参数传入的编码。如果失败，可能返回一个错误对象。

    - `- (NSString *)stringByAppendingString:(NSString *)aString`; 返回一个新的字符串对象。目标字符串与参数
    `aString` 连接，并作为新对象返回。

    - `- (NSString *)stringByAppendingFormat:(NSString *)format, ...`; 返回一个新字符串。当前目标字符串的内容与作为第一个参数传入的格式化字符串连接在一起。格式字符串可能附带额外的参数，这些参数将传递给该方法。

    - `- (__strong const char *)cStringUsingEncoding:(NSStringEncoding)encoding`;
    返回一个以空字符结尾的字符数组（传统上称为 C 字符串），使用作为第一个参数提供的编码。调用者不拥有此字符串，如果你打算稍后使用它，应复制该字符串。

    - `- (BOOL)getCString:(char *)buffer maxLength:(NSUInteger)maxBufferCount encoding:(NSStringEncoding)encoding`;
    将当前的字符串内容复制到一个字符数组中。数组的大小通过 `maxBufferCount` 参数传递。所使用的编码作为第三个参数传递。

    - `- (BOOL)getBytes:(void *)buffer maxLength:(NSUInteger)maxBufferCount usedLength:(NSUInteger
    *)usedBufferCount encoding:(NSStringEncoding)encoding options:(NSStringEncodingConversionOptions)options
    range:(NSRange)range remainingRange:(NSRangePointer)leftover`; 也将当前字符串的内容复制到给定的字符数组中，但它提供了更多选项。除了最大长度和编码之外，你还可以传递一个整数，该整数将更新为已使用的字符数；一个
    options 参数，提供解释编码的可能方式；一个要复制的给定字符范围；以及最终一个指向范围的指针，该范围将更新为剩余的字符范围。

    - `- (NSString *)stringByFoldingWithOptions:(NSStringCompareOptions)options locale:(NSLocale
    *)locale`; 返回一个新的字符串对象，并应用了折叠选项。同时应用搜索选项以及第三个参数中的语言环境。

    - `- (NSString *)stringByReplacingOccurrencesOfString:(NSString *)target withString:(NSString
    *)replacement options:(NSStringCompareOptions)options range:(NSRange)searchRange`;
    返回一个基于当前字符串的新字符串对象。新字符串中所有出现的给定 `target` 都被替换为 `replacement` 字符串。你可以为替换传递额外的选项，其类型为
    `NSStringCompareOptions`。最后，你可以使用最后一个参数确定替换的范围。

    - `- (NSString *)stringByReplacingOccurrencesOfString:(NSString *)target withString:(NSString
    *)replacement`; 是上一个方法的简化版本。通过将所有出现的 `target` 替换为 `replacement` 字符串来返回一个新字符串。

    - `- (NSString *)stringByReplacingCharactersInRange:(NSRange)range withString:(NSString
    *)replacement`; 返回一个基于当前字符串值的新字符串，其中第一个参数确定的范围被第二个参数中的替换字符串替换。

    - `- (__strong const char *)UTF8String`; 返回一个以空字符结尾的字符数组（传统的 C 字符串），表示当前字符串的内容。此方法假设你正在使用
    UTF8 编码。返回的字符数组不为调用者所拥有，因此如果你稍后想要使用该字符串，应复制一份。

    - `+ (NSStringEncoding)defaultCStringEncoding`; 返回 `NSString` 对象的默认编码。此方法可用作检索当前编码的便捷方式。

    - `+ (const NSStringEncoding *)availableStringEncodings`; 返回当前使用的 `NSString` 编码列表。编码序列以空字符结尾。

    - `+ (NSString *)localizedNameOfStringEncoding:(NSStringEncoding)encoding`; 返回作为参数传入的编码的本地化名称。

    - `- (NSUInteger)length`; 返回字符串中的字符数。

    - `- (unichar)characterAtIndex:(NSUInteger)index`; 返回存储在由 index 给定位置处的单个字符。如果索引无效，则会生成一个
    `NSRangeException`。

    - `- (void)getCharacters:(unichar *)buffer range:(NSRange)aRange`; 将由 `range`
    确定的字符序列复制到给定的缓冲区中。该方法假设缓冲区有足够的空间来容纳指定范围内的所有字符。

    - `- (NSString *)substringFromIndex:(NSUInteger)from`; 返回一个新字符串，该字符串使用当前字符串的内容初始化，从第一个参数确定的位置开始。

    - `- (NSString *)substringToIndex:(NSUInteger)to`; 返回一个新字符串，该字符串使用当前字符串的内容初始化，从第一个字符开始，到第二个参数中给定的索引处结束。

    - `- (NSString *)substringWithRange:(NSRange)range`; 返回一个使用当前字符串内容初始化的新字符串。所使用的子字符串由
    `range` 参数确定。

    - `- (NSComparisonResult)compare:(NSString *)string`; 返回比较当前字符串和作为参数传入的字符串的结果。

    - `- (NSComparisonResult)compare:(NSString *)string options:(NSStringCompareOptions)mask`;
    返回比较当前字符串和作为参数传入的字符串的结果。你还可以提供选项来确定应如何比较字符串。

    - `- (NSComparisonResult)compare:(NSString *)string options:(NSStringCompareOptions)mask
    range:(NSRange)compareRange`; 返回比较当前字符串的某个范围与作为参数传入的字符串的结果，使用给定的比较选项。

    - `- (NSComparisonResult)compare:(NSString *)string options:(NSStringCompareOptions)mask
    range:(NSRange)compareRange locale:(id)locale`; 将目标字符串的给定范围与作为第一个参数传入的字符串进行比较。此函数使用一组比较选项，并使用给定的语言环境进行比较。

    - `- (NSComparisonResult)caseInsensitiveCompare:(NSString *)string`; 使用不区分大小写的比较来比较当前字符串和作为参数传入的字符串。

    - `- (NSComparisonResult)localizedCompare:(NSString *)string`; 使用当前语言环境比较目标字符串和作为参数传入的字符串。

    - `- (NSComparisonResult)localizedCaseInsensitiveCompare:(NSString *)string`;
    比较目标字符串和作为第一个参数传入的字符串。比较使用当前语言环境选项执行。

    - `- (NSComparisonResult)localizedStandardCompare:(NSString *)string`; 比较目标字符串和作为第一个参数传入的字符串。比较方法使用了当前语言环境定义。

    - `- (BOOL)isEqualToString:(NSString *)aString`; 当目标字符串和参数字符串具有相同内容时返回 YES。

    - `- (BOOL)hasPrefix:(NSString *)aString`; 如果目标字符串以作为参数传入的字符串开头，则返回 YES。

    - `- (BOOL)hasSuffix:(NSString *)aString`; 如果目标字符串以作为参数传入的字符串结尾，则返回 YES。

    - `- (NSRange)rangeOfString:(NSString *)aString`; 如果 `aString` 是目标 `NSString`
    的子字符串，则此方法将其位置作为 `NSRange` 返回。

    - `- (NSRange)rangeOfString:(NSString *)aString options:(NSStringCompareOptions)mask`;
    如果 `aString` 是目标 `NSString` 的子字符串，则将其位置作为 `NSRange` 返回。比较将根据作为参数 `mask` 传入的选项执行。

    - `- (NSRange)rangeOfString:(NSString *)aString options:(NSStringCompareOptions)mask
    range:(NSRange)searchRange`; 如果 `aString` 是目标 `NSString` 的子字符串并且包含在范围 `searchRange`
    内，则将其位置作为 `NSRange` 返回。比较将根据作为参数 `mask` 传入的选项执行。

    - `- (NSRange)rangeOfString:(NSString *)aString options:(NSStringCompareOptions)mask
    range:(NSRange)searchRange locale:(NSLocale *)locale`; 如果 `aString` 是目标 `NSString`
    的子字符串并且包含在范围 `searchRange` 内，则将其位置作为 `NSRange` 返回。比较将使用参数 `locale` 进行本地化。

    - `- (double)doubleValue`; 尝试将目标字符串的内容转换为 `double`，同时跳过开头的空白字符。

    - `- (float)floatValue`; 尝试将目标字符串的内容转换为 `float`，同时跳过开头的空白字符。

    - `- (int)intValue`; 尝试将目标字符串的内容转换为 `int`，同时跳过开头的空白字符。

    - `- (NSInteger)integerValue`; 尝试将目标字符串的内容转换为 `NSInteger`，同时跳过开头的空白字符。

    - `- (long long)longLongValue`; 尝试将目标字符串的内容转换为 `long long`，同时跳过开头的空白字符。

    - `- (BOOL)boolValue`; 尝试将目标字符串的内容转换为 `BOOL`，同时跳过开头的空白字符。

    - `- (NSArray *)componentsSeparatedByString:(NSString *)separator`; 返回一个数组，其中每个元素都是目标字符串的一个组成部分。这些组成部分由作为参数传入的分隔符确定。

    - `- (NSArray *)componentsSeparatedByCharactersInSet:(NSCharacterSet *)separator`;
    返回一个数组，其中每个元素都是目标字符串的一个组成部分。这些组成部分通过检查作为参数传入的分隔符集合中的每个成员来确定。

    - `- (NSString *)commonPrefixWithString:(NSString *)aString options:(NSStringCompareOptions)mask`;
    返回一个新字符串，该字符串对应于目标字符串和参数 `aString` 共享的最大公共前缀。

    - `- (NSString *)uppercaseString`; 返回一个新字符串，其内容为当前字符串的大写形式。

    - `- (NSString *)lowercaseString`; 返回一个新字符串，其内容为目标字符串的小写形式。

    - `- (NSString *)capitalizedString`; 返回一个新字符串，其内容为目标字符串的首字母大写形式。

    - `- (NSString *)uppercaseStringWithLocale:(NSLocale *)locale`; 返回一个新字符串，其内容为目标字符串的大写形式，并使用当前语言环境。

    - `- (NSString *)lowercaseStringWithLocale:(NSLocale *)locale`; 返回一个新字符串，其内容为目标字符串的小写形式，并使用当前语言环境。

    - `- (NSString *)capitalizedStringWithLocale:(NSLocale *)locale`; 返回一个新字符串，其内容为目标字符串的首字母大写形式，并使用当前语言环境。

    - `- (NSString *)stringByTrimmingCharactersInSet:(NSCharacterSet *)set`; 返回一个基于目标字符串内容的新字符串。结果
    `NSString` 中会移除作为参数传入的集合中包含的字符。

    - `- (NSString *)stringByPaddingToLength:(NSUInteger)newLength withString:(NSString
    *)padString startingAtIndex:(NSUInteger)padIndex`; 返回一个新字符串，该字符串通过使用一个填充字符串（作为第二个参数传入）填充目标字符串的内容来创建。填充后字符串的最终长度由参数
    `newLength` 给出。你还可以确定进行填充的起始索引。

    - `- (void)getLineStart:(NSUInteger *)startPtr end:(NSUInteger *)lineEndPtr contentsEnd:(NSUInteger
    *)contentsEndPtr forRange:(NSRange)range`; 返回关于包含在作为最后一个参数给定的范围中的行的起始和结束信息。

    - `- (NSRange)lineRangeForRange:(NSRange)range`; 返回一个范围，该范围确定包含在作为参数传递给此方法的原始范围中的行的起始和结束位置。

    - `- (void)getParagraphStart:(NSUInteger *)startPtr end:(NSUInteger *)parEndPtr
    contentsEnd:(NSUInteger *)contentsEndPtr forRange:(NSRange)range`; 此方法用于根据由 `range`
    参数指定的范围计算段落的起始位置。关于段落起始和结束位置的信息通过作为前三个参数传入的指针进行保存。

    - `- (NSRange)paragraphRangeForRange:(NSRange)range`; 计算输入范围内包含一个或多个段落的字符范围。

    - `- (void)enumerateSubstringsInRange:(NSRange)range options:(NSStringEnumerationOptions)opts
    usingBlock:(void (^)(NSString *substring, NSRange substringRange, NSRange enclosingRange,
    BOOL *stop))block`; 使用作为参数传入的块来枚举目标字符串的所有子字符串。该块应用于指定范围，并使用由参数 `options` 确定的枚举选项。

    - `- (void)enumerateLinesUsingBlock:(void (^)(NSString *line, BOOL *stop))block`;
    使用作为参数传入的块来枚举当前字符串中的每一行，其中行由换行符分隔。

    - `- (NSString *)description`; 返回字符串的简短描述。这通常仅用于调试目的。

    - `- (NSUInteger)hash`; 返回一个可用作哈希值的整数值，例如，当将字符串插入哈希表时。

    - `- (BOOL)writeToURL:(NSURL *)url atomically:(BOOL)useAuxiliaryFile encoding:(NSStringEncoding)enc
    error:(NSError **)error`; 写入作为第一个参数传入的 URL 的内容。在最终复制到目标之前，可能会使用一个辅助文件来存储数据。使用给定的编码，并在失败时返回一个错误对象。

    - `- (BOOL)writeToFile:(NSString *)path atomically:(BOOL)useAuxiliaryFile encoding:(NSStringEncoding)enc
    error:(NSError **)error`; 将当前字符串的内容写入文件，文件位置由 `path` 参数确定。第二个参数确定在写入过程中是否应使用辅助文件。使用的编码由第三个参数确定。如果失败，将返回一个错误对象。

