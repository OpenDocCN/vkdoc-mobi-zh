- fmt: "# The Concept of Key-Value Coding\n\nKey-value coding is a specification for\
    \ a set of interfaces that allow objects to access properties using just a string\
    \ as the identifier. The string is called the *key* and is used to access the\
    \ stored value of the property.\n\nThe client side of this specification is very\
    \ simple, and it uses two methods to read and set a particular property. The `valueForKey:`\
    \ method is responsible for accessing the value stored in a particular key. The\
    \ key object is an `NSString`, so that you can access different objects types\
    \ using the same interface. The second method is `setValue:forKey:`, which is\
    \ used to set the value object for a particular key.\n\nOne of the best things\
    \ about KVC is that there is very little you need to do to support access to your\
    \ instance variables—if you are willing to provide complete access to your data.\
    \ By default, KVC is enabled through its implementation on `NSObject`, so you\
    \ just need to call `valueForKey:` in any `NSObject`-derived object to have access\
    \ to the data, like so:\n\n```\n// file: KVSample.h\n// sample interface containing\
    \ three variables\n\n@interface KVSample : NSObject\n{\n        int anInt;\n \
    \       double aDouble;\n        NSString *aString;\n}\n- (id) init;\n+ (void)\
    \ accessData;\n@end\n```\n\nThis is a simple class interface containing three\
    \ instance variables: an integer, a double, and a string variable. There is also\
    \ an `init` method and a class method called `accessData`, for testing purposes.\
    \ Here is how these instance variables can be accessed using KVC:\n\n```\n// file:\
    \ KVSample.m\n#import \"KVSample.h\"\n\n@implementation KVSample\n\n- (id) init\n\
    {\n        KVSample *obj = [super init];\n        if (obj)\n        {\n      \
    \         obj->anInt = 10;\n               obj->aDouble = 11.0;\n            \
    \   obj->aString = @\"test\";\n        }\n        return obj;\n}\n\n+ (void) accessData\n\
    {\n        KVSample *sample = [[KVSample alloc] init];\n        NSNumber *a =\
    \ [sample valueForKey:@\"anInt\"];\n        NSLog(@\"int value: %@\", a);\n  \
    \      NSNumber *b = [sample valueForKey:@\"aDouble\"];\n        NSLog(@\"double\
    \ value: %@\", b);\n        NSNumber *c = [sample valueForKey:@\"aString\"];\n\
    \        NSLog(@\"double value: %@\", c);\n        [sample release];\n}\n\n@end\n\
    ```\n\nThe `init` method used here is straightforward and similar to other `init`\
    \ methods used in Objective-C. In the initialization section of the class, you\
    \ assign test values to each of the instance variables present in `KVSample`.\
    \ They will contain the values `10`, `11.0`, and `\"test\"`.\n\nThe method `accessData`\
    \ is just an example of how any other client can use KVC to read data stored in\
    \ an Objective-C object. For this to work, you need to provide the name of the\
    \ data you want to access as a key to `valueForKey:`. The runtime system knows\
    \ the name of each instance variable in your class and will convert the name you\
    \ passed as a key into a proper address for the variable containing the data.\n\
    \n## Avoiding Direct Access\n\nFrom the previous example, you can see that the\
    \ default behavior of classes derived from `NSObject` is to allow access through\
    \ the KVC mechanism. However, you may not want this kind of access to be granted.\
    \ For example, if you are defining a scriptable interface, you may want to maintain\
    \ a few instance variables out of the reach of external code. For another example,\
    \ if the class contains an instance variable that holds a password, you may want\
    \ to restrict access to that variable from scripts interacting with your application.\n\
    \nTo disable the default behavior, KVC provides a method named `accessInstanceVariablesDirectly`.\
    \ This method can be overridden in a derived class to signal that you don’t want\
    \ to grant the default level of access to all instance variables. Here is how\
    \ this method can be declared:\n\n```\n// file: KVSample.h\n@interface KVSample\
    \ : NSObject\n{\n        int anInt;\n        double aDouble;\n        NSString\
    \ *aString;\n}\n- (id) init;\n+ (BOOL) accessInstanceVariablesDirectly;\n+ (void)\
    \ accessData;\n@end\n```\n\nAs in the implementation section, you can add the\
    \ method, returning `NO` to indicate that variables should not be accessed directly,\
    \ like so:\n\n```\n// file: KVSample.m\n#import \"KVSample.h\"\n\n@implementation\
    \ KVSample\n// other methods implemented here\n\n+ (BOOL) accessInstanceVariablesDirectly\n\
    {\n        return NO;\n}\n\n@end\n```\n\nThis modified version of `KVSample` implements\
    \ the class method `accessInstanceVariablesDirectly`. This class method returns\
    \ a false value to indicate that the runtime system should not access the instance\
    \ variables contained in it. To check that the new implementation is working,\
    \ you can run the method `accessData` in this modified version. As a result, you\
    \ will get the following error message:\n\n`this class is not key value coding-compliant\
    \ for the key anInt.`\n\n## Writing Property Accessors\n\nKVC properties can be\
    \ defined either implicitly, using instance variables, or explicitly, using getters\
    \ and setters. The syntax for a generic getter method is `– (<data type>) <key>`,\
    \ where *key* is the string you’re expecting to receive as the key. For example,\
    \ if you want to provide access to the instance methods in `KVSample`, you can\
    \ write an interface with getters as follows:\n\n```\n// file: KVSample.h\n//\
    \ sample interface containing three variables\n\n@interface KVSample : NSObject\n\
    {\n        int _anInt;\n        double _aDouble;\n        NSString *_aString;\n\
    }\n- (int) anInt;\n- (double) aDouble;\n- (NSString*)aString;\n+ (void) accessData;\n\
    // other methods here\n@end\n```\n\nNotice that this time you updated the instance\
    \ variable names to have a leading underscore, a common naming convention used\
    \ to distinguish them from the property name.\n\nNow you need to provide the getter\
    \ implementation for the declared KVC data.\n\n```\n// file: KVSample.m\n#import\
    \ \"KVSample.h\"\n\n@implementation KVSample\n\n- (id) init\n{\n        KVSample\
    \ *obj = [super init];\n        if (obj)\n        {\n               obj->_anInt\
    \ = 10;\n               obj->_aDouble = 11.0;\n               obj->_aString =\
    \ @\"test\";\n        }\n        return obj;\n}\n\n- (int) anInt\n{\n        return\
    \ _anInt;\n}\n\n- (double) aDouble\n{\n        return _aDouble;\n}\n\n- (NSString*)aString\n\
    {\n        return _aString;\n}\n\n// other methods here\n@end\n```\n\nNow you\
    \ can call the `accessData` method on `KVSample` using the following sample code:\n\
    \n```\n- (void) testKVSample\n{\n        [KVSample accessData];\n}\n```\n\nThis\
    \ will now work without any issues, since all the keys used by `accessData` have\
    \ a proper getter implementation, which returns the content of the instance variables.\
    \ For example, when this section of the code is executed:\n\n```\n[sample valueForKey:@\"\
    aDouble\"]\n```\n\nThe Objective-C runtime will check for a getter method named\
    \ `aDouble`, and return the response received from that message, when sent to\
    \ the target object `sample`. The runtime also stores the returned value, of type\
    \ `double`, into an `NSNumber` object, so that you can handle the return value\
    \ uniformly, through an OOP interface."
  raw: '## The Concept of Key-Value Coding


    Key-value coding is a specification for a set of interfaces that allow objects
    to access properties using just a string as the identifier. The string is called
    the key and is used to access the stored value of the property.


    The client side of this specification is very simple, and it uses two methods
    to read and set a particular property. The `valueForKey:` method is responsible
    for accessing the value stored in a particular key. The key object is an `NSString`,
    so that you can access different objects types using the same interface. The second
    method is `setValue:forKey:`, which is used to set the value object for a particular
    key.


    One of the best things about KVC is that there is very little you need to do to
    support access to your instance variables—if you are willing to provide complete
    access to your data. By default, KVC is enabled through its implementation on
    `NSObject`, so you just need to call `valueForKey` `:` in any `NSObject`-derived
    object to have access to the data, like so:


    `// file: KVSample.h`


    `// sample interface containing three variables`


    `@interface KVSample : NSObject`


    `{`


            `int anInt;`


            `double aDouble;`


            `NSString *aString;`


    `}`


    `- (id) init;`


    `+ (void) accessData;`


    `@end`


    This is a simple class interface containing three instance variables: an integer,
    a double, and a string variable. There is also an `init` method and a class method
    called `accessData`, for testing purposes. Here is how these instance variables
    can be accessed using KVC:


    `// file: KVSample.m`


    `#import "KVSample.h"`


    `@implementation KVSample`


    `- (id) init`


    `{`


            `KVSample *obj = [super init];`


            `if (obj)`


            `{`


                   `obj->anInt = 10;`


                   `obj->aDouble = 11.0;`


                   `obj->aString = @"test";`


            `}`


            `return obj;`


    `}`


    `+ (void) accessData`


    `{`


            `KVSample *sample = [[KVSample alloc] init];`


            `NSNumber *a = [sample valueForKey:@"anInt"];`


            `NSLog(@"int value: %@", a);`


            `NSNumber *b = [sample valueForKey:@"aDouble"];`


            `NSLog(@"double value: %@", b);`


            `NSNumber *c = [sample valueForKey:@"aString"];`


            `NSLog(@"double value: %@", c);`


            `[sample release];`


    `}`


    `@end`


    The `init` method used here is straightforward and similar to other `init` methods
    used in Objective-C. In the initialization section of the class, you assign test
    values to each of the instance variables present in `KVSample`. They will contain
    the values `10`, `11.0`, and `"test"`.


    The method `accessData` is just an example of how any other client can use KVC
    to read data stored in an Objective-C object. For this to work, you need to provide
    the name of the data you want to access as a key to `valueForKey:`. The runtime
    system knows the name of each instance variable in your class and will convert
    the name you passed as a key into a proper address for the variable containing
    the data.


    ### Avoiding Direct Access


    From the previous example, you can see that the default behavior of classes derived
    from `NSObject` is to allow access through the KVC mechanism. However, you may
    not want this kind of access to be granted. For example, if you are defining a
    scriptable interface, you may want to maintain a few instance variables out of
    the reach of external code. For another example, if the class contains an instance
    variable that holds a password, you may want to restrict access to that variable
    from scripts interacting with your application.


    To disable the default behavior, KVC provides a method named `accessInstanceVariablesDirectly`.
    This method can be overridden in a derived class to signal that you don’t want
    to grant the default level of access to all instance variables. Here is how this
    method can be declared:


    `// file: KVSample.h`


    `@interface KVSample : NSObject`


    `{`


            `int anInt;`


            `double aDouble;`


            `NSString *aString;`


    `}`


    `- (id) init;`


    `+ (BOOL) accessInstanceVariablesDirectly;`


    `+ (void) accessData;`


    `@end`


    As in the implementation section, you can add the method, returning `NO` to indicate
    that variables should not be accessed directly, like so:


    `// file: KVSample.m`


    `#import "KVSample.h"`


    `@implementation KVSample`


    `// other methods implemented here`


    `+ (BOOL) accessInstanceVariablesDirectly`


    `{`


            `return NO;`


    `}`


    `@end`


    This modified version of `KVSample` implements the class method `accessInstanceVariablesDirectly`.
    This class method returns a false value to indicate that the runtime system should
    not access the instance variables contained in it. To check that the new implementation
    is working, you can run the method `accessData` in this modified version. As a
    result, you will get the following error message:


    `this class is not key value coding-compliant for the key anInt.`


    ### Writing Property Assessors


    KVC properties can be defined either implicitly, using instance variables, or
    explicitly, using getters and setters. The syntax for a generic getter method
    is `– (<data type>) <key>`, where key is the string you’re expecting to receive
    as the key. For example, if you want to provide access to the instance methods
    in `KVSample`, you can write an interface with getters as follows:


    `// file: KVSample.h`


    `// sample interface containing three variables`


    `@interface KVSample : NSObject`


    `{`


            `int _anInt;`


            `double _aDouble;`


            `NSString *_aString;`


    `}`


    `- (int) anInt;`


    `- (double) aDouble;`


    `- (NSString*)aString;`


    `+ (void) accessData;`


    `// other methods here`


    `@end`


    Notice that this time you updated the instance variable names to have a leading
    underscore, a common naming convention used to distinguish them from the property
    name.


    Now you need to provide the getter implementation for the declared KVC data.


    `// file: KVSample.m`


    `#import "KVSample.h"`


    `@implementation KVSample`


    `- (id) init`


    `{`


            `KVSample *obj = [super init];`


            `if (obj)`


            `{`


                   `obj->_anInt = 10;`


                   `obj->_aDouble = 11.0;`


                   `obj->_aString = @"test";`


            `}`


            `return obj;`


    `}`


    `- (int) anInt`


    `{`


            `return _anInt;`


    `}`


    `- (double) aDouble`


    `{`


            `return _aDouble;`


    `}`


    `- (NSString*)aString`


    `{`


            `return _aString;`


    `}`


    `// other methods here`


    `@end`


    Now you can call the `accessData` method on `KVSample` using the following sample
    code:


    `- (void) testKVSample`


    `{`


            `[KVSample accessData];`


    `}`


    This will now work without any issues, since all the keys used by `accessData`
    have a proper getter implementation, which returns the content of the instance
    variables. For example, when this section of the code is executed


    `[sample valueForKey:@"aDouble"]`


    the Objective-C runtime will check for a getter method named `aDouble`, and return
    the response received from that message, when sent to the target object `sample`.
    The runtime also stores the returned value, of type `double`, into an `NSNumber`
    object, so that you can handle the return value uniformly, through an OOP interface.'
  trans: "\n# 键值编码的概念\n\n键值编码是一组接口的规范，允许对象仅使用字符串作为标识符来访问属性。这个字符串被称为*键*，用于访问属性的存储值。\n\
    \n该规范的客户端非常简单，它使用两个方法来读取和设置特定属性。`valueForKey:` 方法负责访问特定键中存储的值。键对象是一个 `NSString`，因此你可以使用相同的接口访问不同类型的对象。第二个方法是\
    \ `setValue:forKey:`，用于为特定键设置值对象。\n\nKVC 最出色的特点之一是，你几乎不需要做任何额外工作就能支持对实例变量的访问——前提是你愿意提供对数据的完全访问权限。默认情况下，KVC\
    \ 通过其在 `NSObject` 上的实现启用，因此你只需在任何 `NSObject` 派生对象中调用 `valueForKey:` 即可访问数据，示例如下：\n\
    \n```\n// 文件：KVSample.h\n// 包含三个变量的示例接口\n\n@interface KVSample : NSObject\n{\n\
    \        int anInt;\n        double aDouble;\n        NSString *aString;\n}\n\
    - (id) init;\n+ (void) accessData;\n@end\n```\n\n这是一个简单的类接口，包含三个实例变量：一个整数、一个双精度浮点数和一个字符串变量。此外，还有一个\
    \ `init` 方法和一个名为 `accessData` 的类方法，用于测试目的。以下是使用 KVC 访问这些实例变量的方式：\n\n```\n// 文件：KVSample.m\n\
    #import \"KVSample.h\"\n\n@implementation KVSample\n\n- (id) init\n{\n       \
    \ KVSample *obj = [super init];\n        if (obj)\n        {\n               obj->anInt\
    \ = 10;\n               obj->aDouble = 11.0;\n               obj->aString = @\"\
    test\";\n        }\n        return obj;\n}\n\n+ (void) accessData\n{\n       \
    \ KVSample *sample = [[KVSample alloc] init];\n        NSNumber *a = [sample valueForKey:@\"\
    anInt\"];\n        NSLog(@\"整数值: %@\", a);\n        NSNumber *b = [sample valueForKey:@\"\
    aDouble\"];\n        NSLog(@\"双精度浮点值: %@\", b);\n        NSNumber *c = [sample\
    \ valueForKey:@\"aString\"];\n        NSLog(@\"双精度浮点值: %@\", c);\n        [sample\
    \ release];\n}\n\n@end\n```\n\n此处使用的 `init` 方法很直接，与 Objective-C 中使用的其他 `init`\
    \ 方法类似。在类的初始化部分，你为 `KVSample` 中的每个实例变量赋测试值。它们将包含值 `10`、`11.0` 和 `\"test\"`。\n\n\
    `accessData` 方法只是一个示例，展示了任何其他客户端如何使用 KVC 来读取存储在 Objective-C 对象中的数据。要使此方法生效，你需要将要访问的数据名称作为键提供给\
    \ `valueForKey:`。运行时系统知道类中每个实例变量的名称，并将你作为键传递的名称转换为包含数据的变量的正确地址。\n\n## 避免直接访问\n\
    \n从上面的例子可以看出，派生自 `NSObject` 的类的默认行为是允许通过 KVC 机制进行访问。但是，你可能不希望授予这种访问权限。例如，如果你正在定义一个可编写脚本的接口，你可能希望将一些实例变量置于外部代码无法访问的范围。再比如，如果类包含一个保存密码的实例变量，你可能希望限制与应用程序交互的脚本对该变量的访问。\n\
    \n要禁用默认行为，KVC 提供了一个名为 `accessInstanceVariablesDirectly` 的方法。可以在派生类中重写此方法，以表明你不希望授予所有实例变量默认的访问级别。以下是该方法的声明方式：\n\
    \n```\n// 文件：KVSample.h\n@interface KVSample : NSObject\n{\n        int anInt;\n\
    \        double aDouble;\n        NSString *aString;\n}\n- (id) init;\n+ (BOOL)\
    \ accessInstanceVariablesDirectly;\n+ (void) accessData;\n@end\n```\n\n在实现部分，你可以添加该方法，返回\
    \ `NO` 以指示变量不应被直接访问，如下所示：\n\n```\n// 文件：KVSample.m\n#import \"KVSample.h\"\n\n\
    @implementation KVSample\n// 在此处实现其他方法\n\n+ (BOOL) accessInstanceVariablesDirectly\n\
    {\n        return NO;\n}\n\n@end\n```\n\n这个修改后的 `KVSample` 版本实现了类方法 `accessInstanceVariablesDirectly`。该类方法返回一个假值，以指示运行时系统不应访问其中包含的实例变量。要检查新实现是否正常工作，你可以在该修改版本中运行\
    \ `accessData` 方法。结果，你将看到以下错误信息：\n\n`this class is not key value coding-compliant\
    \ for the key anInt.`\n\n## 编写属性访问器\n\nKVC 属性可以隐式地通过实例变量定义，也可以显式地通过 getter 和 setter\
    \ 定义。通用 getter 方法的语法是 `– (<data type>) <key>`，其中 *key* 是你期望作为键接收的字符串。例如，如果你想提供对\
    \ `KVSample` 中实例方法的访问，可以编写一个包含 getter 的接口，如下所示：\n\n```\n// 文件：KVSample.h\n// 包含三个变量的示例接口\n\
    \n@interface KVSample : NSObject\n{\n        int _anInt;\n        double _aDouble;\n\
    \        NSString *_aString;\n}\n- (int) anInt;\n- (double) aDouble;\n- (NSString*)aString;\n\
    + (void) accessData;\n// 在此处添加其他方法\n@end\n```\n\n请注意，这次你更新了实例变量名称，使其以下划线开头，这是一种常见的命名约定，用于将它们与属性名称区分开来。\n\
    \n现在你需要为声明的 KVC 数据提供 getter 实现。\n\n```\n// 文件：KVSample.m\n#import \"KVSample.h\"\
    \n\n@implementation KVSample\n\n- (id) init\n{\n        KVSample *obj = [super\
    \ init];\n        if (obj)\n        {\n               obj->_anInt = 10;\n    \
    \           obj->_aDouble = 11.0;\n               obj->_aString = @\"test\";\n\
    \        }\n        return obj;\n}\n\n- (int) anInt\n{\n        return _anInt;\n\
    }\n\n- (double) aDouble\n{\n        return _aDouble;\n}\n\n- (NSString*)aString\n\
    {\n        return _aString;\n}\n\n// 在此处添加其他方法\n@end\n```\n\n现在你可以使用以下示例代码在 `KVSample`\
    \ 上调用 `accessData` 方法：\n\n```\n- (void) testKVSample\n{\n        [KVSample accessData];\n\
    }\n```\n\n这将顺利运行，因为 `accessData` 使用的所有键都有相应的 getter 实现，这些 getter 返回实例变量的内容。例如，当执行以下代码段时：\n\
    \n```\n[sample valueForKey:@\"aDouble\"]\n```\n\nObjective-C 运行时将查找名为 `aDouble`\
    \ 的 getter 方法，并返回将该消息发送给目标对象 `sample` 后收到的响应。运行时还会将 `double` 类型的返回值存储到一个 `NSNumber`\
    \ 对象中，以便你可以通过面向对象的接口统一处理返回值。\n"
- fmt: "### Modifying Values\n\nThe other side of KVC handles the modification of\
    \ values passed to the target through the use of a string key. The interface to\
    \ this functionality in the client side is also very uniform and employs the `setValue:forKey:`\
    \ method.\n\nHere is an example of how the class method `accessData` can be modified\
    \ to set the initial values for the exported keys `aDouble`, `anInt`, and `aString`:\n\
    \n```\n@interface KVSample : NSObject\n{\n    int _anInt;\n    double _aDouble;\n\
    \    NSString *_aString;\n}\n- (int) anInt;\n- (double) aDouble;\n- (NSString*)aString;\n\
    - (void) setAnInt:(int) val;\n- (void) setADouble: (double) val;\n- (void) setAString:\
    \ (NSString*) str;\n- (id) init;\n+ (BOOL) accessInstanceVariablesDirectly;\n\
    + (void) accessData;\n@end\n```\n\nThis modified interface adds a group of `set<Key>:`\
    \ methods that receive an input value and use it to update its respective instance\
    \ variable. Here is how these methods can be implemented:\n\n```\n- (void) setAnInt:(int)\
    \ x\n{\n    _anInt = x;\n}\n- (void) setADouble: (double) x\n{\n    _aDouble =\
    \ x;\n}\n- (void) setAString: (NSString*) s\n{\n    _aString = s;\n}\n```\n\n\
    Finally, using these setters you can change the code of `accessData` so that the\
    \ contents of the `aString`, `anInt`, and `aDouble` keys can be updated to new\
    \ values:\n\n```\n+ (void) accessData\n{\n    KVSample *sample = [[KVSample alloc]\
    \ init];\n    [sample setValue:@20 forKey:@\"anInt\"];\n    [sample setValue:@44.0\
    \ forKey:@\"aDouble\"];\n    [sample setValue:@\"another value\" forKey:@\"aString\"\
    ];\n    NSNumber *a = [sample valueForKey:@\"anInt\"];\n    NSLog(@\"int value:\
    \ %@\", a);\n    NSNumber *b = [sample valueForKey:@\"aDouble\"];\n    NSLog(@\"\
    double value: %@\", b);\n    NSNumber *c = [sample valueForKey:@\"aString\"];\n\
    \    NSLog(@\"double value: %@\", c);\n}\n```\n\nHere, you take the `sample` instance\
    \ of `KVSample` and send to it three messages, each message with a value for one\
    \ of the supported keys for this object.\n\nAs you can see from this code, KVC\
    \ supports keys that store values of all common data types, such as `int`, `double`,\
    \ and `NSString`. There are other support types as well, such as `float`, `char`,\
    \ and `long`. Essentially, all native data types are supported by the KVC interfaces.\
    \ The `BOOL` type is also supported in two ways. A key for a `BOOL` type called\
    \ `enabled`, for example, can be mapped to either to the getter `-(BOOL)isEnabled`\
    \ or to the getter `-(BOOL)enabled`. If any of these two getter methods are found,\
    \ they will be used to return the required value. On the other hand, the setter\
    \ method has to be called `setEnabled:` in this case.\n\n#### Note\n\nThe Foundation\
    \ framework defines a way for classes to validate the value passed to `setValue:forKey:`.\
    \ The `validate<key>:` method can be added to a KVC-compliant class to determine\
    \ if such an argument is valid. However, the user of a KVC class is responsible\
    \ for calling `validate<key>:` when necessary. You should check if the class you’re\
    \ using provides parameter validation, and use it as defined in the class’ interface.\n\
    \n### KVC and Properties\n\nWhile reading the preceding description of the relationship\
    \ between keys and values, and how they map to getters and setters, you might\
    \ have noticed a similarity between these concepts and the concept of properties.\
    \ Although KVC and properties are two independent technologies, they have been\
    \ designed with complementary features so that they can interact nicely with each\
    \ other.\n\nThe most obvious relationship between properties and the values exposed\
    \ by KVC-compliant objects is that they use getters and setters, which map very\
    \ closely to underlying instance variables in the current class. What this means\
    \ is that by defining properties you can simplify even more the process of creating\
    \ KVC-compliant classes.\n\nUsing this equivalence relationship between properties\
    \ and key-value pairs, you can rewrite class `KVSample` with the following, simpler\
    \ interface:\n\n```\n// file: KVSample.h\n// sample interface containing three\
    \ variables\n@interface KVSample : NSObject\n@property int anInt;\n@property double\
    \ aDouble;\n@property (retain) NSString *aString;\n- (id) init;\n+ (BOOL) accessInstanceVariablesDirectly;\n\
    + (void) accessData;\n@end\n```\n\nNotice that you now have three properties representing\
    \ the three instance variables stored in the class. You were able to remove the\
    \ declaration of instance variables from the interface because they are implicitly\
    \ created when the compiler processes the property definitions.\n\nYou were also\
    \ able to remove the group of methods acting as getters and setters. These methods\
    \ are now defined implicitly, since they are synthesized during compilation time\
    \ along with their corresponding properties. Additionally, these changes make\
    \ memory management easier, since you can use keywords such as `retain` or `copy`\
    \ to perform the desired memory management policy.\n\nHere is the simplified implementation\
    \ of the `KVSample` class:\n\n```\n// file: KVSample.m\n#import \"KVSample.h\"\
    \n@implementation KVSample\n- (id) init\n{\n    self = [super init];\n    if (self)\n\
    \    {\n        self.anInt = 10;\n        self.aDouble = 11.0;\n        self.aString\
    \ = @\"test\";\n    }\n    return self;\n}\n+ (void) accessData\n{\n    KVSample\
    \ *sample = [[KVSample alloc] init];\n    NSNumber *a = [sample valueForKey:@\"\
    anInt\"];\n    NSLog(@\"int value: %@\", a);\n    NSNumber *b = [sample valueForKey:@\"\
    aDouble\"];\n    NSLog(@\"double value: %@\", b);\n    NSNumber *c = [sample valueForKey:@\"\
    aString\"];\n    NSLog(@\"double value: %@\", c);\n    [sample setValue:@20 forKey:@\"\
    anInt\"];\n    [sample setValue:@44.0 forKey:@\"aDouble\"];\n    [sample setValue:@\"\
    another value\" forKey:@\"aString\"];\n    [sample setValue:@YES forKey:@\"enabled\"\
    ];\n    a = [sample valueForKey:@\"anInt\"];\n    NSLog(@\"int value: %@\", a);\n\
    \    b = [sample valueForKey:@\"aDouble\"];\n    NSLog(@\"double value: %@\",\
    \ b);\n    c = [sample valueForKey:@\"aString\"];\n    NSLog(@\"double value:\
    \ %@\", c);\n}\n+ (BOOL) accessInstanceVariablesDirectly\n{\n    return NO;\n\
    }\n@end\n```\n\nAfter removing all the setters and getters from the implementation,\
    \ you get a much cleaner and more maintainable code. You may also want to change\
    \ the way the properties are accessed, using the more concise dot notation to\
    \ refer to the data instead of the leading underscore instance variables you have\
    \ been using."
  raw: '### Modifying Values


    The other side of KVC handles the modification of values passed to the target
    through the use of a string key. The interface to this functionality in the client
    side is also very uniform and employs the `setValue:forKey:` method.


    Here is an example of how the class method `accessData` can be modified to set
    the initial values for the exported keys `aDouble`, `anInt`, and `aString`:


    `@interface KVSample : NSObject`


    `{`


            `int _anInt;`


            `double _aDouble;`


            `NSString *_aString;`


    `}`


    `- (int) anInt;`


    `- (double) aDouble;`


    `- (NSString*)aString;`


    `- (void) setAnInt:(int) val;`


    `- (void) setADouble: (double) val;`


    `- (void) setAString: (NSString*) str;`


    `- (id) init;`


    `+ (BOOL) accessInstanceVariablesDirectly;`


    `+ (void) accessData;`


    `@end`


    This modified interface adds a group of `set<Key>:` methods that receive an input
    value and use it to update its respective instance variable. Here is how these
    methods can be implemented:


    `- (void) setAnInt:(int) x`


    `{`


            `_anInt = x;`


    `}`


    `- (void) setADouble: (double) x`


    `{`


            `_aDouble = x;`


    `}`


    `- (void) setAString: (NSString*) s`


    `{`


            `_aString = s;`


    `}`


    Finally, using these setters you can change the code of `accessData` so that the
    contents of the `aString`, `anInt`, and `aDouble` keys can be updated to new values:


    `+ (void) accessData`


    `{`


            `KVSample *sample = [[KVSample alloc] init];`


            `[sample setValue:@20 forKey:@"anInt"];`


            `[sample setValue:@44.0 forKey:@"aDouble"];`


            `[sample setValue:@"another value" forKey:@"aString"];`


            `NSNumber *a = [sample valueForKey:@"anInt"];`


            `NSLog(@"int value: %@", a);`


            `NSNumber *b = [sample valueForKey:@"aDouble"];`


            `NSLog(@"double value: %@", b);`


            `NSNumber *c = [sample valueForKey:@"aString"];`


            `NSLog(@"double value: %@", c);`


    `}`


    Here, you take the sample instance of `KVSample` and send to it three messages,
    each message with a value for one of the supported keys for this object.


    As you can see from this code, KVC supports keys that store values of all common
    data types, such as `int`, `double`, and `NSString`. There are other support types
    as well, such as `float`, `char`, and `long`. Essentially, all native data types
    are supported by the KVC interfaces. The `BOOL` type is also supported in two
    ways. A key for a `BOOL` type called `enabled`, for example, can be mapped to
    either to the getter `-(BOOL)isEnabled` or to the getter `-(BOOL)enabled`. If
    any of these two getter methods are found, they will be used to return the required
    value. On the other hand, the setter method has to be called `setEnabled:` in
    this case.


    Note


    The Foundation framework defines a way for classes to validate the value passed
    to `setValue:forKey:`. The `validate<key>:` method can be added to a KVC-compliant
    class to determine if such an argument is valid. However, the user of a KVC class
    is responsible for calling `validate<key>:` when necessary. You should check if
    the class you’re using provides parameter validation, and use it as defined in
    the class’ interface.


    ## KVC and Properties


    While reading the preceding description of the relationship between keys and values,
    and how they map to getters and setters, you might have noticed a similarity between
    these concepts and the concept of properties. Although KVC and properties are
    two independent technologies, they have been designed with complementary features
    so that they can interact nicely with each other.


    The most obvious relationship between properties and the values exposed by KVC-compliant
    objects is that they use getters and setters, which map very closely to underlying
    instance variables in the current class. What this means is that by defining properties
    you can simplify even more the process of creating KVC-compliant classes.


    Using this equivalence relationship between properties and key-value pairs, you
    can rewrite class `KVSample` with the following, simpler interface:


    `// file: KVSample.h`


    `// sample interface containing three variables`


    `@interface KVSample : NSObject`


    `@property int anInt;`


    `@property double aDouble;`


    `@property (retain) NSString *aString;`


    `- (id) init;`


    `+ (BOOL) accessInstanceVariablesDirectly;`


    `+ (void) accessData;`


    `@end`


    Notice that you now have three properties representing the three instance variables
    stored in the class. You were able to remove the declaration of instance variables
    from the interface because they are implicitly created when the compiler processes
    the property definitions.


    You were also able to remove the group of methods acting as getters and setters.
    These methods are now defined implicitly, since they are synthesized during compilation
    time along with their corresponding properties. Additionally, these changes make
    memory management easier, since you can use keywords such as `retain` or `copy`
    to perform the desired memory management policy.


    Here is the simplified implementation of the `KVSample` class:


    `// file: KVSample.m`


    `#import "KVSample.h"`


    `@implementation KVSample`


    `- (id) init`


    `{`


            `self = [super init];`


            `if (self)`


            `{`


                   `self.anInt = 10;`


                   `self.aDouble = 11.0;`


                   `self.aString = @"test";`


            `}`


            `return self;`


    `}`


    `+ (void) accessData`


    `{`


            `KVSample *sample = [[KVSample alloc] init];`


            `NSNumber *a = [sample valueForKey:@"anInt"];`


            `NSLog(@"int value: %@", a);`


            `NSNumber *b = [sample valueForKey:@"aDouble"];`


            `NSLog(@"double value: %@", b);`


            `NSNumber *c = [sample valueForKey:@"aString"];`


            `NSLog(@"double value: %@", c);`


            `[sample setValue:@20 forKey:@"anInt"];`


            `[sample setValue:@44.0 forKey:@"aDouble"];`


            `[sample setValue:@"another value" forKey:@"aString"];`


            `[sample setValue:@YES forKey:@"enabled"];`


            `a = [sample valueForKey:@"anInt"];`


            `NSLog(@"int value: %@", a);`


            `b = [sample valueForKey:@"aDouble"];`


            `NSLog(@"double value: %@", b);`


            `c = [sample valueForKey:@"aString"];`


            `NSLog(@"double value: %@", c);`


    `}`


    `+ (BOOL) accessInstanceVariablesDirectly`


    `{`


            `return NO;`


    `}`


    `@end`


    After removing all the setters and getters from the implementation, you get a
    much cleaner and more maintainable code. You may also want to change the way the
    properties are accessed, using the more concise dot notation to refer to the data
    instead of the leading underscore instance variables you have been using.'
  trans: "\n### 修改值\n\nKVC 的另一方面涉及通过字符串键来修改传递给目标的值。客户端访问此功能的接口也非常统一，并采用了 `setValue:forKey:`\
    \ 方法。\n\n以下是类方法 `accessData` 如何被修改以设置导出键 `aDouble`、`anInt` 和 `aString` 的初始值的示例：\n\
    \n```\n@interface KVSample : NSObject\n{\n    int _anInt;\n    double _aDouble;\n\
    \    NSString *_aString;\n}\n- (int) anInt;\n- (double) aDouble;\n- (NSString*)aString;\n\
    - (void) setAnInt:(int) val;\n- (void) setADouble: (double) val;\n- (void) setAString:\
    \ (NSString*) str;\n- (id) init;\n+ (BOOL) accessInstanceVariablesDirectly;\n\
    + (void) accessData;\n@end\n```\n\n这个修改后的接口增加了一组 `set<Key>:` 方法，这些方法接收一个输入值并用它来更新对应的实例变量。以下是这些方法的实现方式：\n\
    \n```\n- (void) setAnInt:(int) x\n{\n    _anInt = x;\n}\n- (void) setADouble:\
    \ (double) x\n{\n    _aDouble = x;\n}\n- (void) setAString: (NSString*) s\n{\n\
    \    _aString = s;\n}\n```\n\n最后，使用这些 setter，你可以修改 `accessData` 的代码，以便更新 `aString`、`anInt`\
    \ 和 `aDouble` 键的内容为新值：\n\n```\n+ (void) accessData\n{\n    KVSample *sample =\
    \ [[KVSample alloc] init];\n    [sample setValue:@20 forKey:@\"anInt\"];\n   \
    \ [sample setValue:@44.0 forKey:@\"aDouble\"];\n    [sample setValue:@\"another\
    \ value\" forKey:@\"aString\"];\n    NSNumber *a = [sample valueForKey:@\"anInt\"\
    ];\n    NSLog(@\"int value: %@\", a);\n    NSNumber *b = [sample valueForKey:@\"\
    aDouble\"];\n    NSLog(@\"double value: %@\", b);\n    NSNumber *c = [sample valueForKey:@\"\
    aString\"];\n    NSLog(@\"double value: %@\", c);\n}\n```\n\n这里，你获取了 `KVSample`\
    \ 的 `sample` 实例，并向其发送了三条消息，每条消息都为此对象所支持的一个键提供了一个值。\n\n从这段代码可以看出，KVC 支持存储所有常见数据类型值的键，例如\
    \ `int`、`double` 和 `NSString`。还有其他支持的类型，例如 `float`、`char` 和 `long`。本质上，KVC 接口支持所有原生数据类型。`BOOL`\
    \ 类型也有两种支持方式。例如，一个名为 `enabled` 的 `BOOL` 类型键，可以映射到 getter 方法 `-(BOOL)isEnabled`\
    \ 或 `-(BOOL)enabled`。如果找到这两个 getter 方法中的任何一个，都将用于返回所需的值。另一方面，在这种情况下，setter 方法必须命名为\
    \ `setEnabled:`。\n\n#### 注意\n\nFoundation 框架定义了一种方法，让类能够验证传递给 `setValue:forKey:`\
    \ 的值。可以向 KVC 兼容的类添加 `validate<key>:` 方法，以确定此类参数是否有效。但是，KVC 类的使用者有责任在必要时调用 `validate<key>:`。你应该检查你所使用的类是否提供了参数验证，并按照类接口中定义的方式使用它。\n\
    \n### KVC 与属性\n\n在阅读上述关于键和值之间的关系，以及它们如何映射到 getter 和 setter 的描述时，你可能已经注意到这些概念与属性概念之间的相似性。尽管\
    \ KVC 和属性是两项独立的技术，但它们被设计为具有互补特性，以便能够很好地相互配合。\n\n属性与 KVC 兼容对象暴露的值之间最明显的关系是，它们都使用\
    \ getter 和 setter，而这些 getter 和 setter 与当前类中的底层实例变量紧密映射。这意味着，通过定义属性，你可以进一步简化创建\
    \ KVC 兼容类的过程。\n\n利用属性与键值对之间的这种等价关系，你可以使用以下更简单的接口重写 `KVSample` 类：\n\n```\n// file:\
    \ KVSample.h\n// 包含三个变量的示例接口\n@interface KVSample : NSObject\n@property int anInt;\n\
    @property double aDouble;\n@property (retain) NSString *aString;\n- (id) init;\n\
    + (BOOL) accessInstanceVariablesDirectly;\n+ (void) accessData;\n@end\n```\n\n\
    请注意，现在你有三个属性，分别代表类中存储的三个实例变量。你可以从接口中移除实例变量的声明，因为当编译器处理属性定义时，它们会被隐式创建。\n\n你还可以移除那一组充当\
    \ getter 和 setter 的方法。这些方法现在是隐式定义的，因为在编译期间它们会与其对应的属性一起被合成。此外，这些更改使内存管理变得更加容易，因为你可以使用诸如\
    \ `retain` 或 `copy` 之类的关键字来执行所需的内存管理策略。\n\n以下是 `KVSample` 类的简化实现：\n\n```\n// file:\
    \ KVSample.m\n#import \"KVSample.h\"\n@implementation KVSample\n- (id) init\n\
    {\n    self = [super init];\n    if (self)\n    {\n        self.anInt = 10;\n\
    \        self.aDouble = 11.0;\n        self.aString = @\"test\";\n    }\n    return\
    \ self;\n}\n+ (void) accessData\n{\n    KVSample *sample = [[KVSample alloc] init];\n\
    \    NSNumber *a = [sample valueForKey:@\"anInt\"];\n    NSLog(@\"int value: %@\"\
    , a);\n    NSNumber *b = [sample valueForKey:@\"aDouble\"];\n    NSLog(@\"double\
    \ value: %@\", b);\n    NSNumber *c = [sample valueForKey:@\"aString\"];\n   \
    \ NSLog(@\"double value: %@\", c);\n    [sample setValue:@20 forKey:@\"anInt\"\
    ];\n    [sample setValue:@44.0 forKey:@\"aDouble\"];\n    [sample setValue:@\"\
    another value\" forKey:@\"aString\"];\n    [sample setValue:@YES forKey:@\"enabled\"\
    ];\n    a = [sample valueForKey:@\"anInt\"];\n    NSLog(@\"int value: %@\", a);\n\
    \    b = [sample valueForKey:@\"aDouble\"];\n    NSLog(@\"double value: %@\",\
    \ b);\n    c = [sample valueForKey:@\"aString\"];\n    NSLog(@\"double value:\
    \ %@\", c);\n}\n+ (BOOL) accessInstanceVariablesDirectly\n{\n    return NO;\n\
    }\n@end\n```\n\n从实现中移除所有 setter 和 getter 后，你会得到更简洁、更易于维护的代码。你可能还想更改访问属性的方式，使用更简洁的点语法来引用数据，而不是之前一直使用的以下划线开头的实例变量。\n"
- fmt: "# Using Structures\n\nIn the previous sections you learned how to use KVC\
    \ to expose simple properties, defined with scalar data types such as numbers\
    \ or strings. In the case of numbers, the values are automatically converted into\
    \ object wrappers such as `NSNumber`. Working with structures is similar. You\
    \ don’t need to worry about the process of wrapping the data, however, since the\
    \ runtime libraries already know how to create the necessary objects for any user-defined\
    \ structure.\n\nThe secret of structured data use with the KVC system is the automatic\
    \ conversion from `struct`s into `NSValue` objects performed by the runtime libraries.\
    \ An `NSValue`, as its name implies, is an object capable of holding any value,\
    \ such as numbers, strings, or even `struct`s with user-defined data types. Once\
    \ data has been stored in an `NSValue`, it is immutable and can later be converted\
    \ to the desired target type.\n\nHere is an example class that demonstrates how\
    \ structures can be used with KVC. First, you need to use `typedef` to name a\
    \ user-defined type.\n\n```\n// file KVStructSample.h\n\ntypedef struct\n{\n \
    \       int anInt;\n        double aDouble;\n}\nSampleStruct;\n```\n\nThen, a\
    \ new class is defined with a single data item of type `SampleStruct`.\n\n```\n\
    // file KVStructSample.h\n\n@interface KVStructSample : NSObject\n{\n        SampleStruct\
    \ _structValue;\n}\n\n@property SampleStruct structValue;\n\n@end\n```\n\nA property\
    \ of type `SampleStruct` was added to simplify the implementation, but you could\
    \ do the same using only instance variables, as you have seen previously. Now,\
    \ the implementation for the class is responsible for initializing the object.\
    \ You also have a class method that can create a new instance and display its\
    \ data.\n\n```\n// file KVStructSample.m\n\n@implementation KVStructSample\n\n\
    - (id) init\n{\n        KVStructSample *obj = [super init];\n        if (obj)\n\
    \        {\n               SampleStruct val = { 1, 2.0 };\n               obj.structValue\
    \ = val;\n        }\n        return obj;\n}\n\n+ (void) accessData\n{\n      \
    \  KVStructSample *sample = [[KVStructSample alloc] init];\n        NSValue *val\
    \ = [sample valueForKey:@\"structValue\"];\n        SampleStruct structVal;\n\
    \        [val getValue:&structVal];\n        NSLog(@\"The value is %d and %lf\"\
    , structVal.anInt, structVal.aDouble);\n        [sample release];\n}\n\n@end\n\
    ```\n\nThe first method, `init`, sets the initial value for the property of type\
    \ `SampleStruct`. For this purpose, you need to create a new variable of the given\
    \ structure type, and copy it to the instance variable `structValue`.\n\nThe `accessData`\
    \ method shown here is just an example of how to use such a class. It creates\
    \ an instance of `KVStructSample`, then retrieves an `NSValue` object by sending\
    \ a `valueForKey:` message. The `NSValue` object returned by `valueForKey:` contains\
    \ a `SampleStruct` value. To recover the value, you need to use the `getValue:`\
    \ method, which receives as a parameter a pointer to the user-defined structure.\
    \ Then you can proceed to print the values of the components of the structure,\
    \ `anInt` and `aDouble`, which will be displayed in the logging window as values\
    \ `1` and `2.0`.\n\n# Accessing Objects Through Key Paths\n\nOnce you are able\
    \ to access scalar data and structures contained in objects through KVC-compliant\
    \ keys, the next level of functionality is required: that is, being able to do\
    \ the same for properties defined with an object type. For example, a `Factory`\
    \ object may contain one or more `Employee` objects. These objects could be made\
    \ accessible through a KVC-style interface.\n\nTo make generic objects available\
    \ through KVC, the runtime system supports not only the concept of simple keys,\
    \ which are composed of a single word, but also the idea of composed keys, which\
    \ are determined using a full path notation. In a path definition, Objective-C\
    \ uses the dot (`.`) as a separator between segments of the path so that you can\
    \ specify all the elements in the containment hierarchy between the base object\
    \ and the desired property.\n\nUsing a key path, the runtime system is able to\
    \ traverse the list of objects specified by the dot-separated elements. Then,\
    \ it is possible to retrieve or modify elements based on their key path specification.\n\
    \nTo have a better understanding of how this process works, consider the class\
    \ `BankEmployee`, which stores information about a single bank employee, including\
    \ a property called `salary`. Here is the interface definition:\n\n```\n// file\
    \ BankEmployee.h\n\n@interface BankEmployee : NSObject\n\n@property double salary;\n\
    \n- (id) init ;\n\n// other properties and methods here\n\n@end\n```\n\nOnly the\
    \ `salary` property is displayed here, along with the `init` method. The implementation\
    \ of `init` is similar to what you have seen in other examples.\n\n```\n// file\
    \ BankEmployee.m\n\n#import \"BankEmployee.h\"\n\n@implementation BankEmployee\n\
    \n- (id) init\n{\n        self = [super init];\n        if (self)\n        {\n\
    \               self.salary = 200000.0;\n        }\n        return self;\n}\n\n\
    @end\n```\n\nNotice that, for test purposes, you are initializing the `salary`\
    \ property to a constant that will be retrieved later. Now consider using an object\
    \ of this class as part of a `Bank` class, with the following interface:\n\n```\n\
    // file Bank.h\n\n@interface Bank : NSObject\n\n@property (retain) BankEmployee\
    \ *employee;\n\n+ (void) accessBank ;\n\n- (id) init;\n\n@end\n```\n\nYou have\
    \ a property in this class as well as in the previous examples, but this time\
    \ the property is not a native data type or a `struct;` the property is now an\
    \ object of type `BankEmployee`. You use the `init` function to create a new object\
    \ of that type, with its default value. The method `accessBank` shows how to access\
    \ the contents of this object-based property using a key path:\n\n```\n// file\
    \ Bank.m\n\n#import \"Bank.h\"\n\n@implementation Bank\n\n- (id) init\n{\n   \
    \     Bank *obj = [super init];\n        if (obj)\n        {\n               obj.employee\
    \ = [[BankEmployee alloc] init];\n        }\n        return obj;\n}\n\n+ (void)\
    \ accessBank\n{\n        Bank *bank = [[Bank alloc] init];\n        id res = [bank\
    \ valueForKeyPath:@\"employee.salary\"];\n        NSLog(@\"The salary is %@\"\
    , res);\n}\n\n// you need to release employee\n\n- (void) dealloc\n{\n       \
    \ self.employee = nil;\n        [super dealloc];\n}\n\n@end\n```\n\nNotice the\
    \ use of the `valueForKeyPath:` method inside the `accessBank` method. You need\
    \ to pass a dot-separated path relative to the target object in order to access\
    \ the desired property. The value returned by this message call is an object of\
    \ type `NSValue`, similar to what you have seen in the previous examples. The\
    \ result of the `accessBank` method will be that the default salary of `200000.0`\
    \ is printed to the logging window."
  raw: '## Using Structures


    In the previous sections you learned how to use KVC to expose simple properties,
    defined with scalar data types such as numbers or strings. In the case of numbers,
    the values are automatically converted into object wrappers such as `NSNumber`.
    Working with structures is similar. You don’t need to worry about the process
    of wrapping the data, however, since the runtime libraries already know how to
    create the necessary objects for any user-defined structure.


    The secret of structured data use with the KVC system is the automatic conversion
    from `struct`s into `NSValue` objects performed by the runtime libraries. An `NSValue`,
    as its name implies, is an object capable of holding any value, such as numbers,
    strings, or even `struct`s with user-defined data types. Once data has been stored
    in an `NSValue`, it is immutable and can later be converted to the desired target
    type.


    Here is an example class that demonstrates how structures can be used with KVC.
    First, you need to use `typedef` to name a user-defined type.


    `// file KVStructSample.h`


    `typedef struct`


    `{`


            `int anInt;`


            `double aDouble;`


    `}`


    `SampleStruct;`


    Then, a new class is defined with a single data item of type `SampleStruct`.


    `// file KVStructSample.h`


    `@interface KVStructSample : NSObject`


    `{`


            `SampleStruct _structValue;`


    `}`


    `@property SampleStruct structValue;`


    `@end`


    A property of type `SampleStruct` was added to simplify the implementation, but
    you could do the same using only instance variables, as you have seen previously.
    Now, the implementation for the class is responsible for initializing the object.
    You also have a class method that can create a new instance and display its data.


    `// file KVStructSample.m`


    `@implementation KVStructSample`


    `- (id) init`


    `{`


            `KVStructSample *obj = [super init];`


            `if (obj)`


            `{`


                   `SampleStruct val = { 1, 2.0 };`


                   `obj.structValue = val;`


            `}`


            `return obj;`


    `}`


    `+ (void) accessData`


    `{`


            `KVStructSample *sample = [[KVStructSample alloc] init];`


            `NSValue *val = [sample valueForKey:@"structValue"];`


            `SampleStruct structVal;`


            `[val getValue:&structVal];`


            `NSLog(@"The value is %d and %lf", structVal.anInt, structVal.aDouble);`


            `[sample release];`


    `}`


    `@end`


    The first method, `init`, sets the initial value for the property of type `SampleStruct`.
    For this purpose, you need to create a new variable of the given structure type,
    and copy it to the instance variable `structValue`.


    The `accessData` method shown here is just an example of how to use such a class.
    It creates an instance of `KVStructSample`, then retrieves an `NSValue` object
    by sending a `valueForKey:` message. The `NSValue` object returned by `valueForKey:`
    contains a `SampleStruct` value. To recover the value, you need to use the `getValue:`
    method, which receives as a parameter a pointer to the user-defined structure.
    Then you can proceed to print the values of the components of the structure, `anInt`
    and `aDouble`, which will be displayed in the logging window as values `1` and
    `2.0`.


    ## Accessing Objects Through Key Paths


    Once you are able to access scalar data and structures contained in objects through
    KVC-compliant keys, the next level of functionality is required: that is, being
    able to do the same for properties defined with an object type. For example, a
    `Factory` object may contain one or more `Employee` objects. These objects could
    be made accessible through a KVC-style interface.


    To make generic objects available through KVC, the runtime system supports not
    only the concept of simple keys, which are composed of a single word, but also
    the idea of composed keys, which are determined using a full path notation. In
    a path definition, Objective-C uses the dot (.) as a separator between segments
    of the path so that you can specify all the elements in the containment hierarchy
    between the base object and the desired property.


    Using a key path, the runtime system is able to traverse the list of objects specified
    by the dot-separated elements. Then, it is possible to retrieve or modify elements
    based on their key path specification.


    To have a better understanding of how this process works, consider the class `BankEmployee`,
    which stores information about a single bank employee, including a property called
    `salary`. Here is the interface definition:


    `// file BankEmployee.h`


    `@interface BankEmployee : NSObject`


    `@property double salary;`


    `- (id) init ;`


    `// other properties and methods here`


    `@end`


    Only the salary property is displayed here, along with the `init` method. The
    implementation of `init` is similar to what you have seen in other examples.


    `// file BankEmployee.m`


    `#import "BankEmployee.h"`


    `@implementation BankEmployee`


    `- (id) init`


    `{`


            `self = [super init];`


            `if (self)`


            `{`


                   `self.salary = 200000.0;`


            `}`


            `return self;`


    `}`


    `@end`


    Notice that, for test purposes, you are initializing the salary property to a
    constant that will be retrieved later. Now consider using an object of this class
    as part of a `Bank` class, with the following interface:


    `// file Bank.h`


    `@interface Bank : NSObject`


    `@property (retain) BankEmployee *employee;`


    `+ (void) accessBank ;`


    `- (id) init;`


    `@end`


    You have a property in this class as well as in the previous examples, but this
    time the property is not a native data type or a `struct;` the property is now
    an object of type `BankEmployee`. You use the `init` function to create a new
    object of that type, with its default value. The method `accessBank` shows how
    to access the contents of this object-based property using a key path:


    `// file Bank.m`


    `#import "Bank.h"`


    `@implementation Bank`


    `- (id) init`


    `{`


            `Bank *obj = [super init];`


            `if (obj)`


            `{`


                   `obj.employee = [[BankEmployee alloc] init];`


            `}`


            `return obj;`


    `}`


    `+ (void) accessBank`


    `{`


            `Bank *bank = [[Bank alloc] init];`


            `id res = [bank valueForKeyPath:@"employee.salary"];`


            `NSLog(@"The salary is %@", res);`


    `}`


    `// you need to release employee`


    `- (void) dealloc`


    `{`


            `self.employee = nil;`


            `[super dealloc];`


    `}`


    `@end`


    Notice the use of the `valueForKeyPath:` method inside the `accessBank` method.
    You need to pass a dot-separated path relative to the target object in order to
    access the desired property. The value returned by this message call is an object
    of type `NSValue`, similar to what you have seen in the previous examples. The
    result of the `accessBank` method will be that the default salary of `200000.0`
    is printed to the logging window.'
  trans: "\n# 使用结构体\n\n在前面的章节中，你已经学习了如何使用 KVC 公开简单的属性，这些属性是通过数字或字符串等标量数据类型定义的。对于数字，其值会自动转换为对象包装器，例如\
    \ `NSNumber`。处理结构体也是类似的。不过，你无需担心数据包装的过程，因为运行时库已经知道如何为任何用户自定义的结构体创建必要的对象。\n\n使用\
    \ KVC 系统处理结构化数据的秘诀在于，运行时库会自动将 `struct` 转换为 `NSValue` 对象。`NSValue`，顾名思义，是一个能够容纳任何值的对象，比如数字、字符串，甚至是包含用户自定义数据类型的\
    \ `struct`。一旦数据存储到 `NSValue` 中，它就变得不可变，并且之后可以转换为所需的目标类型。\n\n下面是一个示例类，演示了如何将结构体与\
    \ KVC 配合使用。首先，你需要使用 `typedef` 来命名一个用户自定义类型。\n\n```\n// 文件 KVStructSample.h\n\n\
    typedef struct\n{\n        int anInt;\n        double aDouble;\n}\nSampleStruct;\n\
    ```\n\n然后，定义一个新类，其中包含一个 `SampleStruct` 类型的数据项。\n\n```\n// 文件 KVStructSample.h\n\
    \n@interface KVStructSample : NSObject\n{\n        SampleStruct _structValue;\n\
    }\n\n@property SampleStruct structValue;\n\n@end\n```\n\n为了简化实现，添加了一个 `SampleStruct`\
    \ 类型的属性，但你也可以像之前看到的那样，仅使用实例变量来完成同样的操作。现在，类的实现负责初始化对象。同时，你还可以有一个类方法，用于创建新实例并显示其数据。\n\
    \n```\n// 文件 KVStructSample.m\n\n@implementation KVStructSample\n\n- (id) init\n\
    {\n        KVStructSample *obj = [super init];\n        if (obj)\n        {\n\
    \               SampleStruct val = { 1, 2.0 };\n               obj.structValue\
    \ = val;\n        }\n        return obj;\n}\n\n+ (void) accessData\n{\n      \
    \  KVStructSample *sample = [[KVStructSample alloc] init];\n        NSValue *val\
    \ = [sample valueForKey:@\"structValue\"];\n        SampleStruct structVal;\n\
    \        [val getValue:&structVal];\n        NSLog(@\"该值是 %d 和 %lf\", structVal.anInt,\
    \ structVal.aDouble);\n        [sample release];\n}\n\n@end\n```\n\n第一个方法 `init`\
    \ 为 `SampleStruct` 类型的属性设置初始值。为此，你需要创建一个给定结构类型的新变量，并将其复制到实例变量 `structValue` 中。\n\
    \n这里展示的 `accessData` 方法只是一个如何使用此类进行操作的示例。它创建了一个 `KVStructSample` 实例，然后通过发送 `valueForKey:`\
    \ 消息来获取一个 `NSValue` 对象。由 `valueForKey:` 返回的 `NSValue` 对象包含一个 `SampleStruct` 的值。要取回该值，你需要使用\
    \ `getValue:` 方法，该方法接收一个指向用户定义结构体的指针作为参数。然后，你可以继续打印该结构体组件 `anInt` 和 `aDouble`\
    \ 的值，这些值将在日志窗口中显示为 `1` 和 `2.0`。\n\n# 通过键路径访问对象\n\n一旦你能够通过符合 KVC 的键访问对象中包含的标量数据和结构体，就需要下一级别的功能：即，能够对使用对象类型定义的属性执行相同的操作。例如，一个\
    \ `Factory` 对象可能包含一个或多个 `Employee` 对象。这些对象应该可以通过 KVC 风格的接口进行访问。\n\n为了通过 KVC 使通用对象变得可访问，运行时系统不仅支持由一个单词组成的简单键的概念，还支持使用完整路径标记法确定的复合键的概念。在路径定义中，Objective-C\
    \ 使用点号 (`.`) 作为路径各段之间的分隔符，这样你就可以指定基对象和所需属性之间包含层次结构中的所有元素。\n\n使用键路径，运行时系统能够遍历由点号分隔的元素指定的对象列表。然后，就可以根据键路径说明来检索或修改元素。\n\
    \n为了更好地理解这个过程是如何工作的，考虑一下 `BankEmployee` 类，它存储了单个银行员工的信息，包括一个名为 `salary` 的属性。以下是其接口定义：\n\
    \n```\n// 文件 BankEmployee.h\n\n@interface BankEmployee : NSObject\n\n@property\
    \ double salary;\n\n- (id) init ;\n\n// 其他属性和方法在此处\n\n@end\n```\n\n这里只展示了 `salary`\
    \ 属性和 `init` 方法。`init` 的实现与你之前在其他示例中看到的类似。\n\n```\n// 文件 BankEmployee.m\n\n#import\
    \ \"BankEmployee.h\"\n\n@implementation BankEmployee\n\n- (id) init\n{\n     \
    \   self = [super init];\n        if (self)\n        {\n               self.salary\
    \ = 200000.0;\n        }\n        return self;\n}\n\n@end\n```\n\n请注意，出于测试目的，你将\
    \ `salary` 属性初始化为一个常量，该常量稍后将被检索。现在，考虑将此类的对象用作 `Bank` 类的一部分，该类具有以下接口：\n\n```\n\
    // 文件 Bank.h\n\n@interface Bank : NSObject\n\n@property (retain) BankEmployee\
    \ *employee;\n\n+ (void) accessBank ;\n\n- (id) init;\n\n@end\n```\n\n这个类中有一个属性，就像之前的示例一样，但这次该属性不是原生数据类型或\
    \ `struct`，而是一个 `BankEmployee` 类型的对象。你使用 `init` 函数来创建一个该类型的新对象，并设置其默认值。`accessBank`\
    \ 方法演示了如何使用键路径来访问这个基于对象的属性的内容：\n\n```\n// 文件 Bank.m\n\n#import \"Bank.h\"\n\n\
    @implementation Bank\n\n- (id) init\n{\n        Bank *obj = [super init];\n  \
    \      if (obj)\n        {\n               obj.employee = [[BankEmployee alloc]\
    \ init];\n        }\n        return obj;\n}\n\n+ (void) accessBank\n{\n      \
    \  Bank *bank = [[Bank alloc] init];\n        id res = [bank valueForKeyPath:@\"\
    employee.salary\"];\n        NSLog(@\"薪资是 %@\", res);\n}\n\n// 你需要释放 employee\
    \ 对象\n\n- (void) dealloc\n{\n        self.employee = nil;\n        [super dealloc];\n\
    }\n\n@end\n```\n\n请注意在 `accessBank` 方法内部使用了 `valueForKeyPath:` 方法。你需要传入一个相对于目标对象的点号分隔路径，才能访问所需的属性。这个消息调用返回的值是一个\
    \ `NSValue` 类型的对象，类似于你在之前的示例中看到的。`accessBank` 方法的结果将是，默认薪资 `200000.0` 会被打印到日志窗口。\n"
- fmt: "# Accessing Collections\n\nAnother common situation occurring when working\
    \ with KVC is that one or more keys correspond to a collection of objects. When\
    \ this happens, you need to use some of the collection-oriented methods that are\
    \ capable of interacting with arrays or sets of elements that are created as a\
    \ result of the request.\n\nThe KVC specification provides a way to access members\
    \ of a collection that are used internally. For example, suppose that you have\
    \ an array called `employees`. KVC can access the elements of this array either\
    \ directly (through the instance variable name), through a property, or using\
    \ a pair of accessing methods. Let's use the method access way, just to illustrate\
    \ how this can be done in general. In this case, if you want to expose a property\
    \ called `bankEmployees`, you need to provide a property getter called `objectInEmployeesAtIndex:`.\
    \ The following modifications in the class `Bank` would be necessary to provide\
    \ support for a `bankEmployees` property through KVC:\n\n```objc\n// file Bank.h\n\
    \n@interface Bank : NSObject\n\n{\nNSArray *employees;\n}\n\n- (NSUInteger) countOfBankEmployees;\n\
    - (id) objectInBankEmployeesAtIndex:(NSUInteger)index;\n+ (void) accessBankData;\n\
    - (id) init;\n\n@end\n```\n\nFirst, notice that you have the values stored in\
    \ an internal `NSArray` object called `employees`. The interface to KVC is implemented\
    \ with the two methods `countOfBankEmployees` and `objectInBankEmployeesAtIndex:`.\
    \ These methods are similar in functionality to the methods `count` and `objectAtIndex:`\
    \ present in the `NSArray` class. Here is an implementation for this class:\n\n\
    ```objc\n@implementation Bank\n\n- (id) init\n{\nself = [super init];\nif (self)\n\
    {\nself->employees = @[[[[BankEmployee alloc] init] autorelease]];\n}\nreturn\
    \ self;\n}\n\n- (NSUInteger) countOfBankEmployees\n{\nreturn self->employees.count;\n\
    }\n\n- (id) objectInBankEmployeesAtIndex:(NSUInteger)index\n{\nreturn self->employees[index];\n\
    }\n\n- (void) dealloc\n{\n[self->employees release];\n[super dealloc];\n}\n\n\
    @end\n```\n\nThe `init` method is responsible for setting up the initial contents\
    \ of the array. I am creating an `NSArray` with a single element just for demonstration\
    \ purposes. Then you have the implementation for `count` and `objectIn<key>AtIndex:`.\
    \ Since you have an internal array with the contents you want to publish, the\
    \ implementation of these methods is trivial. But you don't need to limit yourself\
    \ to using an array as the underlying implementation. Any collection of objects\
    \ can be used to store the data for this interface.\n\nNext, you need to release\
    \ the resources in this class using `dealloc`, which is similar to what you have\
    \ seen in other cases. Finally, I will show you how to use `Bank` with a method\
    \ class called `accessBankData:`.\n\n```objc\n+ (void) accessBankData\n{\nBank\
    \ *bank = [[Bank alloc] init];\nNSArray * res = [bank valueForKeyPath:@\"bankEmployees\"\
    ];\nNSLog(@\"The first employee is %@\", res[0]);\n[bank release];\n}\n```\n\n\
    First, use `alloc` to create a new object. Then you can use `valueForKeyPath:`\
    \ to retrieve the `bankEmployees` array. You can see that an array was returned,\
    \ even though `bankEmployees` only exists as a set of methods providing access\
    \ to that named property. Finally, you are able to print the first element of\
    \ the array using the modern array notation for `NSArray` manipulation.\n\nReturning\
    \ a collection is a useful feature, but that's not the only thing that KVC can\
    \ do with data collections. A client can request that some operations be applied\
    \ to a data set and the result of the operation returned as the value for the\
    \ given key. These special operations become part of the key, in what can be seen\
    \ as a mini-language for collection manipulation. Here is a quick list of some\
    \ of the operations that can be applied in a key path.\n\n- `@avg`: Returns the\
    \ average value for all the elements contained in the indexed collection.\n- `@max`:\
    \ Returns the maximum value for a property, across a given collection named in\
    \ the key path.\n- `@min`: Returns the minimum value for a property, across a\
    \ given collection named in the key path.\n- `@sum`: Returns the sum of all entries\
    \ specified by the defined key path, over a given collection name.\n\nUsing these\
    \ properties, you can perform quick calculations based on the content of arrays\
    \ and sets, which can be useful to simplify certain operations on objects. In\
    \ all of these operations, the runtime is responsible for collecting the data\
    \ and running the operation in order to return the desired value, without any\
    \ intervention by the target class.\n\nFor a simple example of using operators\
    \ as part of the key path, consider the following class method:\n\n```objc\n+\
    \ (void) accessBankSalaries\n{\nBank *bank = [[Bank alloc] init];\nid res = [bank\
    \ valueForKeyPath:@\"bankEmployees.@sum.salary\"];\nNSLog(@\"The total salary\
    \ amount is %@\", res);\n[bank release];\n}\n```\n\nThe class method `accessBankSalaries`\
    \ is responsible for computing the total salary paid by the bank. This is performed\
    \ by the KVC system, receiving as input the full key path along with a `@sum`\
    \ operator. When this code is run, the KVC system will look first for the collection,\
    \ which is provided as the first element of the key path. Then, the operator `@sum`\
    \ is applied to the property `salary` of the preceding path. Finally, the computed\
    \ quantity is returned as the value associated to the key path.\n\n# Responding\
    \ To Undefined Keys\n\nKVC establishes a mechanism by which clients can make a\
    \ request for properties that are stored on objects, while using only a generic\
    \ string key as input. Therefore, the runtime system is effectively being used\
    \ to decouple callers from classes implementing the requested functionality. Since\
    \ you are not relying on compilation, all operations involving KVC involve property\
    \ checks that will be performed only during execution time. Therefore, it is possible\
    \ that some of these property checks will be unsuccessful and will generate undesired\
    \ errors.\n\nIn this case, thorough testing is the best way to completely avoid\
    \ problems at runtime. However, in order to mitigate some of the issues caused\
    \ by incorrect KVC key access, Objective-C has provided an additional method named\
    \ `valueForUndefinedKey:`. By implementing this method, classes can enable an\
    \ effective scheme to handle undefined keys given as input.\n\nA particular implementation\
    \ of the method `valueForUndefinedKey:` can be used to supply a value even when\
    \ a key is not recognized as valid by the KVC system runtime. This way, `valueForUndefinedKey:`\
    \ functions as a \"last chance\" way to return a value requested by users. For\
    \ example, the next method avoids an error for undefined key and simply returns\
    \ `0` as the default response:\n\n```objc\n- (id)valueForUndefinedKey:(NSString\
    \ *)key\n{\n         return [NSNumber numberWithInt:0];\n}\n```"
  raw: '## Accessing Collections


    Another common situation occurring when working with KVC is that one or more keys
    correspond to a collection of objects. When this happens, you need to use some
    of the collection-oriented methods that are capable of interacting with arrays
    or sets of elements that are created as a result of the request.


    The KVC specification provides a way to access members of a collection that are
    used internally. For example, suppose that you have an array called `employees`.
    KVC can access the elements of this array either directly (through the instance
    variable name), through a property, or using a pair of accessing methods. Let’s
    use the method access way, just to illustrate how this can be done in general.
    In this case, if you want to expose a property called `bankEmployees`, you need
    to provide a property getter called `objectInEmployeesAtIndex:`. The following
    modifications in the class `Bank` would be necessary to provide support for a
    `bankEmployees` property through KVC:


    `// file Bank.h`


    `@interface Bank : NSObject`


    `{`


    `NSArray *employees;`


    `}`


    `- (NSUInteger) countOfBankEmployees;`


    `- (id) objectInBankEmployeesAtIndex:(NSUInteger)index;`


    `+ (void) accessBankData;`


    `- (id) init;`


    `@end`


    First, notice that you have the values stored in an internal `NSArray` object
    called `employees`. The interface to KVC is implemented with the two methods `countOfBankEmployees`
    and `objectInBankEmployeesAtIndex:`. These methods are similar in functionality
    to the methods `count` and `objectAtIndex:` present in the `NSArray` class. Here
    is an implementation for this class:


    `@implementation Bank`


    `- (id) init`


    `{`


    `self = [super init];`


    `if (self)`


    `{`


    `self->employees = @[[[[BankEmployee alloc] init] autorelease]];`


    `}`


    `return self;`


    `}`


    `- (NSUInteger) countOfBankEmployees`


    `{`


    `return self->employees.count;`


    `}`


    `- (id) objectInBankEmployeesAtIndex:(NSUInteger)index`


    `{`


    `return self->employees[index];`


    `}`


    `- (void) dealloc`


    `{`


    `[self->employees release];`


    `[super dealloc];`


    `}`


    `@end`


    The `init` method is responsible for setting up the initial contents of the array.
    I am creating an `NSArray` with a single element just for demonstration purposes.
    Then you have the implementation for `count` and `objectIn<key>AtIndex:`. Since
    you have an internal array with the contents you want to publish, the implementation
    of these methods is trivial. But you don’t need to limit yourself to using an
    array as the underlying implementation. Any collection of objects can be used
    to store the data for this interface.


    Next, you need to release the resources in this class using `dealloc`, which is
    similar to what you have seen in other cases. Finally, I will show you how to
    use `Bank` with a method class called `accessBankData:`.


    `+ (void) accessBankData`


    `{`


    `Bank *bank = [[Bank alloc] init];`


    `NSArray * res = [bank valueForKeyPath:@"bankEmployees"];`


    `NSLog(@"The first employee is %@", res[0]);`


    `[bank release];`


    `}`


    First, use `alloc` to create a new object. Then you can use `valueForKeyPath:`
    to retrieve the `bankEmployees` array. You can see that an array was returned,
    even though `bankEmployees` only exists as a set of methods providing access to
    that named property. Finally, you are able to print the first element of the array
    using the modern array notation for `NSArray` manipulation.


    Returning a collection is a useful feature, but that’s not the only thing that
    KVC can do with data collections. A client can request that some operations be
    applied to a data set and the result of the operation returned as the value for
    the given key. These special operations become part of the key, in what can be
    seen as a mini-language for collection manipulation. Here is a quick list of some
    of the operations that can be applied in a key path.


    *   `@avg`: Returns the average value for all the elements contained in the indexed
    collection.

    *   `@max`: Returns the maximum value for a property, across a given collection
    named in the key path.

    *   `@min`: Returns the minimum value for a property, across a given collection
    named in the key path.

    *   `@sum`: Returns the sum of all entries specified by the defined key path,
    over a given collection name.


    Using these properties, you can perform quick calculations based on the content
    of arrays and sets, which can be useful to simplify certain operations on objects.
    In all of these operations, the runtime is responsible for collecting the data
    and running the operation in order to return the desired value, without any intervention
    by the target class.


    For a simple example of using operators as part of the key path, consider the
    following class method:


    `+ (void) accessBankSalaries`


    `{`


    `Bank *bank = [[Bank alloc] init];`


    `id res = [bank valueForKeyPath:@"bankEmployees.@sum.salary"];`


    `NSLog(@"The total salary amount is %@", res);`


    `[bank release];`


    `}`


    The class method `accessBankSalaries` is responsible for computing the total salary
    paid by the bank. This is performed by the KVC system, receiving as input the
    full key path along with a `@sum` operator. When this code is run, the KVC system
    will look first for the collection, which is provided as the first element of
    the key path. Then, the operator `@sum` is applied to the property `salary` of
    the preceding path. Finally, the computed quantity is returned as the value associated
    to the key path.


    ## Responding To Undefined Keys


    KVC establishes a mechanism by which clients can make a request for properties
    that are stored on objects, while using only a generic string key as input. Therefore,
    the runtime system is effectively being used to decouple callers from classes
    implementing the requested functionality. Since you are not relying on compilation,
    all operations involving KVC involve property checks that will be performed only
    during execution time. Therefore, it is possible that some of these property checks
    will be unsuccessful and will generate undesired errors.


    In this case, thorough testing is the best way to completely avoid problems at
    runtime. However, in order to mitigate some of the issues caused by incorrect
    KVC key access, Objective-C has provided an additional method named `valueForUndefinedKey:`.
    By implementing this method, classes can enable an effective scheme to handle
    undefined keys given as input.


    A particular implementation of the method `valueForUndefinedKey:` can be used
    to supply a value even when a key is not recognized as valid by the KVC system
    runtime. This way, `valueForUndefinedKey:` functions as a “last chance” way to
    return a value requested by users. For example, the next method avoids an error
    for undefined key and simply returns `0` as the default response:


    `- (id)valueForUndefinedKey:(NSString *)key`


    `{`


             `return [NSNumber numberWithInt:0];`


    `}`'
  trans: "\n# 访问集合\n\n在使用 KVC 时，另一种常见的情况是一个或多个键对应一个对象集合。当出现这种情况时，你需要使用一些面向集合的方法，这些方法能够与因请求而创建的数组或元素集进行交互。\n\
    \nKVC 规范提供了一种访问内部使用的集合成员的方式。例如，假设你有一个名为 `employees` 的数组。KVC 可以通过实例变量名直接访问、通过属性访问，或使用一对访问器方法来访问该数组的元素。下面我们使用方法访问的方式，以此说明一般情况下的具体操作。在这种情况下，如果你想暴露一个名为\
    \ `bankEmployees` 的属性，你需要提供一个名为 `objectInEmployeesAtIndex:` 的属性 getter 方法。为了通过\
    \ KVC 支持 `bankEmployees` 属性，需要对 `Bank` 类进行以下修改：\n\n```objc\n// file Bank.h\n\n\
    @interface Bank : NSObject\n\n{\nNSArray *employees;\n}\n\n- (NSUInteger) countOfBankEmployees;\n\
    - (id) objectInBankEmployeesAtIndex:(NSUInteger)index;\n+ (void) accessBankData;\n\
    - (id) init;\n\n@end\n```\n\n首先，请注意你将值存储在一个名为 `employees` 的内部 `NSArray` 对象中。KVC\
    \ 的接口是通过 `countOfBankEmployees` 和 `objectInBankEmployeesAtIndex:` 这两个方法实现的。这些方法在功能上与\
    \ `NSArray` 类中的 `count` 和 `objectAtIndex:` 方法类似。以下是该类的实现：\n\n```objc\n@implementation\
    \ Bank\n\n- (id) init\n{\nself = [super init];\nif (self)\n{\nself->employees\
    \ = @[[[[BankEmployee alloc] init] autorelease]];\n}\nreturn self;\n}\n\n- (NSUInteger)\
    \ countOfBankEmployees\n{\nreturn self->employees.count;\n}\n\n- (id) objectInBankEmployeesAtIndex:(NSUInteger)index\n\
    {\nreturn self->employees[index];\n}\n\n- (void) dealloc\n{\n[self->employees\
    \ release];\n[super dealloc];\n}\n\n@end\n```\n\n`init` 方法负责设置数组的初始内容。为了演示，我创建了一个包含单个元素的\
    \ `NSArray`。接着实现了 `count` 和 `objectIn<key>AtIndex:` 方法。由于你有一个包含待发布内容的内部数组，这些方法的实现很简单。但你不需要局限于使用数组作为底层实现。任何对象集合都可以用来存储此接口的数据。\n\
    \n接下来，你需要使用 `dealloc` 释放该类中的资源，这与你在其他情况下看到的方式类似。最后，我将展示如何通过一个名为 `accessBankData:`\
    \ 的类方法来使用 `Bank`。\n\n```objc\n+ (void) accessBankData\n{\nBank *bank = [[Bank\
    \ alloc] init];\nNSArray * res = [bank valueForKeyPath:@\"bankEmployees\"];\n\
    NSLog(@\"The first employee is %@\", res[0]);\n[bank release];\n}\n```\n\n首先，使用\
    \ `alloc` 创建一个新对象。然后你可以使用 `valueForKeyPath:` 来检索 `bankEmployees` 数组。可以看到，即使 `bankEmployees`\
    \ 仅作为一组提供对该命名属性访问权限的方法而存在，仍然返回了一个数组。最后，你可以使用 `NSArray` 操作的现代数组表示法打印数组的第一个元素。\n\
    \n返回集合是一项有用的功能，但这并非 KVC 在数据集合上能做的全部事情。客户端可以请求对数据集应用某些操作，并将操作结果作为给定键的值返回。这些特殊操作成为键的一部分，可以看作是一种用于集合操作的迷你语言。以下是可以在键路径中应用的一些操作的简要列表。\n\
    \n- `@avg`：返回索引集合中所有元素的平均值。\n- `@max`：返回键路径中指定集合内某个属性的最大值。\n- `@min`：返回键路径中指定集合内某个属性的最小值。\n\
    - `@sum`：返回键路径中指定集合内所有条目的总和。\n\n使用这些属性，你可以基于数组和集合的内容执行快速计算，这有助于简化对对象的某些操作。在所有这些操作中，运行时负责收集数据并执行操作以返回所需的值，而无需目标类进行任何干预。\n\
    \n以下是一个在键路径中使用运算符的简单示例，考虑以下类方法：\n\n```objc\n+ (void) accessBankSalaries\n{\nBank\
    \ *bank = [[Bank alloc] init];\nid res = [bank valueForKeyPath:@\"bankEmployees.@sum.salary\"\
    ];\nNSLog(@\"The total salary amount is %@\", res);\n[bank release];\n}\n```\n\
    \n类方法 `accessBankSalaries` 负责计算银行支付的总薪资。此计算由 KVC 系统执行，输入为完整的键路径以及 `@sum` 运算符。当此代码运行时，KVC\
    \ 系统将首先查找集合（作为键路径的第一个元素提供）。然后，运算符 `@sum` 应用于前一路径的 `salary` 属性。最后，计算出的数量作为与键路径关联的值返回。\n\
    \n# 响应未定义键\n\nKVC 建立了一种机制，客户端可以仅使用通用字符串键作为输入，来请求存储在对象上的属性。因此，运行时系统被有效地用于将调用者与实现所请求功能的类解耦。由于你不依赖编译，所有涉及\
    \ KVC 的操作都涉及仅在执行期间执行的属性检查。因此，某些属性检查可能不成功并产生意外错误。\n\n在这种情况下，充分的测试是彻底避免运行时问题的最佳方法。然而，为了减轻因错误的\
    \ KVC 键访问而导致的一些问题，Objective-C 提供了一个名为 `valueForUndefinedKey:` 的附加方法。通过实现此方法，类可以启用一种有效的机制来处理作为输入提供的未定义键。\n\
    \n`valueForUndefinedKey:` 的特定实现可用于在 KVC 系统运行时未将键识别为有效时仍提供一个值。这样，`valueForUndefinedKey:`\
    \ 就充当了返回用户请求值的“最后一次机会”。例如，以下方法避免了未定义键的错误，并简单地返回 `0` 作为默认响应：\n\n```objc\n- (id)valueForUndefinedKey:(NSString\
    \ *)key\n{\n         return [NSNumber numberWithInt:0];\n}\n```\n"
- fmt: "# KVC and KVO\n\n`KVC` is a technology that is used in several areas of the\
    \ Cocoa frameworks. One such area where `KVC` is heavily used is the key-value\
    \ observing (`KVO`) system for data observing and notification, which is employed\
    \ throughout `CoreData`, among other examples. `KVO` is a mechanism by which objects\
    \ can respond to changes in the value of observed properties. In other words,\
    \ `KVO` is a general notification mechanism that relies on `KVC` to determine\
    \ how to access keys and their corresponding values.\n\nThere are two main elements\
    \ in a `KVO` solution: observers and observation targets. To become an observer,\
    \ you need to call the method `addObserver:forKeyPath:options:context:` on a suitable\
    \ target. Then the observer also needs to implement the method `observeValueForKeyPath:ofObject:change:context:`.\
    \ This method is called every time a change happens to the observed object. Finally,\
    \ the client can stop observing an object by calling the `removeObserver:` method.\n\
    \nTo become a `KVO` target, an object needs to be compliant with `KVC` as a first\
    \ step. This means that `KVC` properties need to be exposed to clients, as discussed\
    \ in the previous sections. This guarantees that `NSObject` will be able to manage\
    \ the properties exposed in the object, while at the same time making these properties\
    \ available for observers. Every time a property in the object changes, subscribed\
    \ observers will be notified automatically.\n\nLet’s see an example of how this\
    \ works in practice. Suppose that you are creating a `BankPayroll` class, which\
    \ uses the `BankEmployee` class previously discussed. You are interested in knowing\
    \ when the value of the `salary` property changes, so that the payroll calculations\
    \ can be kept up to date. Here is how this can be implemented using `KVO`:\n\n\
    ```\n@interface BankPayrool : NSObject\n{\n    BankEmployee *employee;\n    double\
    \ _currentSalary;\n}\n\n- (id) initWithEmployee:(BankEmployee *)anEmployee;\n\
    - (void) startObserving;\n+ (void) useBankPayroll;\n@end\n```\n\nYou store two\
    \ instance variables: one for the `employee` object and another with current salary\
    \ information. Here is the implementation file:\n\n```\n@implementation BankPayrool\n\
    \n- (id) initWithEmployee:(BankEmployee *)anEmployee\n{\n    self = [super init];\n\
    \    if (self)\n    {\n        employee = anEmployee;\n        [employee retain];\n\
    \    }\n    return self;\n}\n\n- (void) dealloc\n{\n    [employee removeObserver:self\
    \ forKeyPath:@\"salary\"];\n    [employee release];\n    [super dealloc];\n}\n\
    \n- (void) startObserving\n{\n    [employee addObserver:self forKeyPath:@\"salary\"\
    \n                  options:NSKeyValueObservingOptionNew\n                  context:nil];\n\
    }\n\n- (void) observeValueForKeyPath:(NSString *)keyPath\n                   \
    \    ofObject:(id)object\n                         change:(NSDictionary *)change\n\
    \                        context:(void *)context\n{\n    if (object == employee)\n\
    \    {\n        [self setValue:\n            [change objectForKey:NSKeyValueChangeNewKey]\n\
    \                forKey:@\"currentSalary\"];\n        NSLog(@\"current salary\
    \ is now %lf\", _currentSalary);\n    }\n}\n\n@end\n```\n\nFinally, you may use\
    \ the code above by implementing a sample class method, `useBankPayroll`, which\
    \ changes the `salary` property. As a result, you will see a log message showing\
    \ the new salary value, as received by the `BankPayroll` class.\n\n```\n+ (void)\
    \ useBankPayroll\n{\n    BankEmployee *employee = [[BankEmployee alloc] init];\n\
    \    BankPayrool *payroll = [[BankPayrool alloc] initWithEmployee:employee];\n\
    \    [payroll startObserving];\n    [employee setValue:@300000.0 forKey:@\"salary\"\
    ];\n    [payroll release];\n    [employee release];\n}\n```\n\nFirst, you create\
    \ the employee object, since it will be used as a parameter for the `BankPayroll`\
    \ class. Then you send the `startObserving` message, which registers the payroll\
    \ object as an observer of `employee`. Finally, you set a new value for the property\
    \ `salary` on `employee`. This will trigger a notification to payroll, which will\
    \ print some information to the logs.\n\n## Summary\n\nIn this chapter, you explored\
    \ the key-value coding system in Objective-C. `KVC` is a set of conventions and\
    \ methods that allow generic data access using only a string key or key path.\
    \ To access data using `KVC`, you just need to use the `valueForKey:` message.\
    \ You can also modify exposed data using the method `setValue:forKey:`. This simple\
    \ interface can be used to interact with native or user-defined (`struct`) data\
    \ types. `KVC` also allows you to interact with embedded objects using key paths,\
    \ where the full property names are separated using a dot notation.\n\n`KVC` has\
    \ provisions to work with collections objects, as well as for single values like\
    \ integers and strings. For collections, you need to expose either a standard\
    \ Objective-C collection such as `NSArray` and `NSSet`, or implement methods equivalent\
    \ to `count` and `objectAtIndex:`, which are part of `NSArray`. I didn’t cover\
    \ all the options you may have when supporting collections, but the online documentation\
    \ for `KVC` is very readable and has all the details you need.\n\nFinally, I showed\
    \ you how key-value observing (`KVO`) interacts with `KVC`. `KVO` leverages the\
    \ `KVC` system to create a notification mechanism on top of it. In this way, objects\
    \ may not only access properties exposed through keys, but they can also be notified\
    \ when there is a change in these properties.\n\nIn the next chapter, you will\
    \ see an important application of the OOP concepts discussed up until now. For\
    \ this purpose, I will show you how Objective-C supports basic and advanced interaction\
    \ with the file system using the Foundation framework.\n\n# The File System\n\n\
    ## Abstract\n\nOne of the highlights of working with Objective-C is the availability\
    \ of high quality libraries that can be used to access most of the resources provided\
    \ by the operating system. In this chapter, I will show you some of the classes\
    \ and methods that are used to interact with external storage files in the Foundation\
    \ framework.\n\nThere are different ways to interface with the file system in\
    \ Objective-C. First, the Foundation framework has a few methods that can be used\
    \ for simplified file access, both reading and writing. These methods have been\
    \ added to classes such as `NSString` and `NSData`, and offer a convenient way\
    \ to access files without having to worry about the lower level details of how\
    \ they are stored. The internal machinery of objects such as `NSString` will do\
    \ all the steps necessary to read or write its data to disk.\n\nOn the other hand,\
    \ there are moments when it is important to have a finer control of how files\
    \ are accessed. For example, large files may take a long time to access. You can\
    \ avoid these kinds of large I/O delays by using an asynchronous interface. Offering\
    \ this level of control is the goal of specialized classes such as `NSStream`,\
    \ `NSInputStream`, and `NSOutputStream`. They allow programmers to determine the\
    \ details of file access, such as the size of the internal buffers used to transfer\
    \ data. It is also possible to hold the data and make it available to external\
    \ files only when deemed necessary by the application. I will give examples of\
    \ how these classes work and develop a truly asynchronous solution for data transfer\
    \ to files."
  raw: '## KVC and KVO


    KVC is a technology that is used in several areas of the Cocoa frameworks. One
    such area where KVC is heavily used is the key-value observing (KVO) system for
    data observing and notification, which is employed throughout CoreData, among
    other examples. KVO is a mechanism by which objects can respond to changes in
    the value of observed properties. In other words, KVO is a general notification
    mechanism that relies on KVC to determine how to access keys and their corresponding
    values.


    There are two main elements in a KVO solution: observers and observation targets.
    To become an observer, you need to call the method `addObserver:forKeyPath:options:context:`
    on a suitable target. Then the observer also needs to implement the method `observeValueForKeyPath:ofObject:change:context:`.
    This method is called every time a change happens to the observed object. Finally,
    the client can stop observing an object by calling the removeObserver: method.


    To become a KVO target, an object needs to be compliant with KVC as a first step.
    This means that KVC properties need to be exposed to clients, as discussed in
    the previous sections. This guarantees that `NSObject` will able to manage the
    properties exposed in the object, while at the same time making these properties
    available for observers. Every time a property in the object changes, subscribed
    observers will be notified automatically.


    Let’s see an example of how this works in practice. Suppose that you are creating
    a `BankPayroll` class, which uses the `BankEmployee` class previously discussed.
    You are interested in knowing when the value of the `salary` property changes,
    so that the payroll calculations can be kept up to date. Here is how this can
    be implemented using KVO:


    `@interface BankPayrool : NSObject`


    `{`


    `BankEmployee *employee;`


    `double _currentSalary;`


    `}`


    `- (id) initWithEmployee:(BankEmployee *)anEmployee;`


    `- (void) startObserving;`


    `+ (void) useBankPayroll;`


    `@end`


    You store two instance variables: one for the `employee` object and another with
    current salary information. Here is the implementation file:


    `@implementation BankPayrool`


    `- (id) initWithEmployee:(BankEmployee *)anEmployee`


    `{`


    `self = [super init];`


    `if (self)`


    `{`


    `employee = anEmployee;`


    `[employee retain];`


    `}`


    `return self;`


    `}`


    `- (void) dealloc`


    `{`


    `[employee removeObserver:self forKeyPath:@"salary"];`


    `[employee release];`


    `[super dealloc];`


    `}`


    `- (void) startObserving`


    `{`


    `[employee addObserver:self forKeyPath:@"salary"`


    `options:NSKeyValueObservingOptionNew`


    `context:nil];`


    `}`


    `- (void) observeValueForKeyPath:(NSString *)keyPath`


    `ofObject:(id)object`


    `change:(NSDictionary *)change`


    `context:(void *)context`


    `{`


    `if (object == employee)`


    `{`


    `[self setValue:`


    `[change objectForKey:NSKeyValueChangeNewKey]`


    `forKey:@"currentSalary"];`


    `NSLog(@"current salary is now %lf", _currentSalary);`


    `}`


    `}`


    `@end`


    Finally, you may use the code above by implementing a sample class method, `useBankPayroll`,
    which changes the salary property. As a result, you will see a log message showing
    the new salary value, as received by the `BankPayroll` class.


    `+ (void) useBankPayroll`


    `{`


    `BankEmployee *employee = [[BankEmployee alloc] init];`


    `BankPayrool *payroll = [[BankPayrool alloc] initWithEmployee:employee];`


    `[payroll startObserving];`


    `[employee setValue:@300000.0 forKey:@"salary"];`


    `[payroll release];`


    `[employee release];`


    `}`


    First, you create the employee object, since it will be used as a parameter for
    the `BankPayroll` class. Then you send the `startObserving` message, which registers
    the payroll object as an observer of `employee`. Finally, you set a new value
    for the property salary on `employee`. This will trigger a notification to payroll,
    which will print some information to the logs.


    ## Summary


    In this chapter, you explored the key-value coding system in Objective C. KVC
    is a set of conventions and methods that allow generic data access using only
    a string key or key path. To access data using KVC, you just need to use the `valueForKey:`
    message. You can also modify exposed data using the method `setValue:forKey:`.
    This simple interface can be used to interact with native or user-defined (`struct`)
    data types. KVC also allows you to interact with embedded objects using key paths,
    where the full property names are separated using a dot notation.


    KVC has provisions to work with collections objects, as well as for single values
    like integers and strings. For collections, you need to expose either a standard
    Objective-C collection such as `NSArray` and `NSSet`, or implement methods equivalent
    to `count` and `objectAtIndex:`, which are part of `NSArray`. I didn’t cover all
    the options you may have when supporting collections, but the online documentation
    for KVC is very readable and has all the details you need.


    Finally, I showed you how key-value observing (KVO) interacts with KVC. KVO leverages
    the KVC system to create a notification mechanism on top of it. In this way, objects
    may not only access properties exposed through keys, but they can also be notified
    when there is a change in these properties.


    In the next chapter, you will see an important application of the OOP concepts
    discussed up until now. For this purpose, I will show you how Objective-C supports
    basic and advanced interaction with the file system using the Foundation framework.


    # 10. The File System


    Abstract


    One of the highlights of working with Objective-C is the availability of high
    quality libraries that can be used to access most of the resources provided by
    the operating system. In this chapter, I will show you some of the classes and
    methods that are used to interact with external storage files in the Foundation
    framework.


    One of the highlights of working with Objective-C is the availability of high
    quality libraries that can be used to access most of the resources provided by
    the operating system. In this chapter, I will show you some of the classes and
    methods that are used to interact with external storage files in the Foundation
    framework.


    There are different ways to interface with the file system in Objective-C. First,
    the Foundation framework has a few methods that can be used for simplified file
    access, both reading and writing. These methods have been added to classes such
    as `NSString` and `NSData`, and offer a convenient way to access files without
    having to worry about the lower level details of how they are stored. The internal
    machinery of objects such as `NSString` will do all the steps necessary to read
    or write its data to disk.


    On the other hand, there are moments when it is important to have a finer control
    of how files are accessed. For example, large files may take a long time to access.
    You can avoid these kinds of large I/O delays by using an asynchronous interface.
    Offering this level of control is the goal of specialized classes such as `NSStream`,
    `NSInputStream`, and `NSOutputStream`. They allow programmers to determine the
    details of file access, such as the size of the internal buffers used to transfer
    data. It is also possible to hold the data and make it available to external files
    only when deemed necessary by the application. I will give examples of how these
    classes work and develop a truly asynchronous solution for data transfer to files.'
  trans: "\n# KVC 与 KVO\n\n`KVC` 是一项在 Cocoa 框架多个领域使用的技术。其中一个大量运用 `KVC` 的领域是用于数据观察和通知的键值观察（`KVO`）系统，该机制广泛应用于\
    \ `CoreData` 及其他场景。`KVO` 是一种机制，通过它，对象能够对被观察属性值的变化做出响应。换言之，`KVO` 是一种通用的通知机制，它依赖\
    \ `KVC` 来确定如何访问键及其对应的值。\n\n`KVO` 解决方案包含两个主要元素：观察者和观察目标。要成为观察者，你需要在合适的目标对象上调用 `addObserver：forKeyPath：options：context：`\
    \ 方法。随后，观察者还需要实现 `observeValueForKeyPath：ofObject：change：context：` 方法。每当被观察对象发生变更时，该方法都会被调用。最后，客户端可以通过调用\
    \ `removeObserver：` 方法来停止观察某个对象。\n\n要成为 `KVO` 目标，对象首先需要符合 `KVC` 规范。这意味着 `KVC`\
    \ 属性需要像前文讨论的那样暴露给客户端。这保证了 `NSObject` 能够管理对象中暴露的属性，同时使这些属性可供观察者使用。每当对象中的某个属性发生变化时，已订阅的观察者将自动收到通知。\n\
    \n让我们看一个实际运作的例子。假设你正在创建一个 `BankPayroll` 类，它使用之前讨论过的 `BankEmployee` 类。你希望获知 `salary`\
    \ 属性值何时发生变化，以便使薪资计算保持最新。以下是使用 `KVO` 实现此功能的方式：\n\n```\n@interface BankPayrool :\
    \ NSObject\n{\n    BankEmployee *employee;\n    double _currentSalary;\n}\n\n\
    - (id) initWithEmployee:(BankEmployee *)anEmployee;\n- (void) startObserving;\n\
    + (void) useBankPayroll;\n@end\n```\n\n你存储了两个实例变量：一个用于 `employee` 对象，另一个用于存储当前薪资信息。以下是实现文件：\n\
    \n```\n@implementation BankPayrool\n\n- (id) initWithEmployee:(BankEmployee *)anEmployee\n\
    {\n    self = [super init];\n    if (self)\n    {\n        employee = anEmployee;\n\
    \        [employee retain];\n    }\n    return self;\n}\n\n- (void) dealloc\n\
    {\n    [employee removeObserver:self forKeyPath:@\"salary\"];\n    [employee release];\n\
    \    [super dealloc];\n}\n\n- (void) startObserving\n{\n    [employee addObserver:self\
    \ forKeyPath:@\"salary\"\n                  options:NSKeyValueObservingOptionNew\n\
    \                  context:nil];\n}\n\n- (void) observeValueForKeyPath:(NSString\
    \ *)keyPath\n                       ofObject:(id)object\n                    \
    \     change:(NSDictionary *)change\n                        context:(void *)context\n\
    {\n    if (object == employee)\n    {\n        [self setValue:\n            [change\
    \ objectForKey:NSKeyValueChangeNewKey]\n                forKey:@\"currentSalary\"\
    ];\n        NSLog(@\"current salary is now %lf\", _currentSalary);\n    }\n}\n\
    \n@end\n```\n\n最后，你可以通过实现一个示例类方法 `useBankPayroll` 来使用上述代码，该方法会更改 `salary` 属性。结果，你将看到一条日志消息，显示\
    \ `BankPayroll` 类接收到的新的薪资值。\n\n```\n+ (void) useBankPayroll\n{\n    BankEmployee\
    \ *employee = [[BankEmployee alloc] init];\n    BankPayrool *payroll = [[BankPayrool\
    \ alloc] initWithEmployee:employee];\n    [payroll startObserving];\n    [employee\
    \ setValue:@300000.0 forKey:@\"salary\"];\n    [payroll release];\n    [employee\
    \ release];\n}\n```\n\n首先，你创建了 employee 对象，因为它将作为 `BankPayroll` 类的参数。然后你发送了 `startObserving`\
    \ 消息，该消息将 payroll 对象注册为 `employee` 的观察者。最后，你为 `employee` 的 `salary` 属性设置了一个新值。这会触发向\
    \ payroll 发送通知，后者会将一些信息打印到日志中。\n\n## 总结\n\n在本章中，你探索了 Objective-C 中的键值编码系统。`KVC`\
    \ 是一套约定和方法，允许仅使用字符串键或键路径来进行通用数据访问。要使用 `KVC` 访问数据，你只需使用 `valueForKey：` 消息。你也可以使用\
    \ `setValue:forKey:` 方法修改已暴露的数据。这个简单的接口可用于与原生或用户定义的（`struct`）数据类型进行交互。`KVC` 还允许你使用键路径与嵌入式对象进行交互，其中完整的属性名使用点号分隔。\n\
    \n`KVC` 既支持处理集合对象，也支持处理整型和字符串等单值。对于集合，你需要暴露标准的 Objective-C 集合（如 `NSArray` 和 `NSSet`），或者实现与\
    \ `NSArray` 中 `count` 和 `objectAtIndex:` 等价的方法。我并未涵盖支持集合时你可能拥有的所有选项，但有关 `KVC`\
    \ 的在线文档非常易读，并包含了你所需的所有细节。\n\n最后，我向你展示了键值观察（`KVO`）是如何与 `KVC` 交互的。`KVO` 利用 `KVC`\
    \ 系统，在其之上创建了一个通知机制。这样，对象不仅可以通过键访问暴露的属性，还可以在这些属性发生变化时收到通知。\n\n在下一章中，你将看到迄今为止所讨论的面向对象编程概念的一个重要应用。为此，我将向你展示\
    \ Objective-C 如何使用 Foundation 框架支持与文件系统的基本和高级交互。\n\n# 文件系统\n\n## 摘要\n\n使用 Objective-C\
    \ 的亮点之一是能够使用高质量库来访问操作系统提供的大部分资源。在本章中，我将向你展示 Foundation 框架中用于与外部存储文件进行交互的一些类和方法。\n\
    \n在 Objective-C 中，与文件系统交互有多种方式。首先，Foundation 框架提供了一些可用于简化文件读写访问的方法。这些方法已被添加到 `NSString`\
    \ 和 `NSData` 等类中，提供了一种便捷的方式来访问文件，而无需担心底层存储细节。`NSString` 等对象的内部机制将执行读写数据到磁盘所需的所有步骤。\n\
    \n另一方面，在某些时候，更精细地控制文件访问方式非常重要。例如，大文件可能需要很长时间才能访问。通过使用异步接口，你可以避免此类大型 I/O 延迟。提供这种控制级别是\
    \ `NSStream`、`NSInputStream` 和 `NSOutputStream` 等专业化类的目标。它们允许程序员决定文件访问的细节，例如用于传输数据的内部缓冲区大小。还可以暂存数据，仅在应用程序认为必要时才使其对外部文件可用。我将举例说明这些类的工作方式，并开发一个真正异步的数据传输到文件的解决方案。\n"
- fmt: '# Specifying Locations with NSURL


    To access files in the Foundation framework you frequently need to create a `NSURL`,
    which is an object that represents a single URL. A URL (uniform resource locator)
    is an identifier used by the operating system to locate a particular resource.
    URLs can be used not only to locate files, but also for remote resources such
    as web pages or FTP files. You are concerned here only with local resources, however.


    A URL for a local file starts with the `file://` sequence. Therefore, to access
    a file located at `/Users/user1/file.txt`, for example, you should use the URL
    `file://Users/user1/file.txt`.


    Most file-related methods in Cocoa use `NSURL` objects instead of (or in addition
    to) string-based path names. The reason is that `NSURL` objects have several advantages
    when compared to standard paths. First, path names are system-specific. For example,
    some systems have forward slashes as separators, while others use back slashes
    or colons as separators. URLs were created to abstract these differences.


    Another service that `NSURL` provides is keeping track of a file once it is accessed.
    If a file is moved in the file system, for example, the `NSURL` object can keep
    referencing it, even though the path has changed.


    Finally, URLs are not limited to representing local files. You can use a URL to
    work with remote files using a number of protocols. While you may need to change
    your code to handle such remote resources, the representation of the location
    remains unchanged. That is another reason why Cocoa libraries prefer to deal with
    `NSURLs` whenever possible: in this way, there is no need to change the representation
    when using remote versus local resources.


    # Reading and Writing Text Files


    Once you have a correct location for the file you want to access (most of the
    time in the form of a `NSURL` object), the next step is to read or write the contents
    using one of the Cocoa objects that interact with the file system.


    The first object that I will cover in this chapter is `NSString`. When working
    with text files, `NSString` may be the simplest way to interact with the file
    contents—unless there is some additional structure in the file, such as XML, for
    instance. Let’s see an example of how to read from a text file with `NSString`
    using a class called `FileReader`.


    ```

    // file FileReader.h


    @interface FileReader : NSObject


    + (void) readTest;


    - (void) readFile:(NSString*) fileName;


    @end

    ```


    You have two methods in this class: an instance method called `readFile:` and
    a class method called `readTest`.


    ```

    // file FileReader.m


    #import "FileReader.h"


    @implementation FileReader


    - (void) readFile:(NSString*) fileName


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    NSString *str = [NSString


    stringWithContentsOfURL:url


    encoding:kCFStringEncodingUnicode


    error:&error];


    NSLog(@"String is %@", str);


    }


    + (void) readTest


    {


    FileReader *reader = [[FileReader alloc] init];


    [reader readFile:@"file:///Users/oliveira/testFile"];


    }


    @end

    ```


    The `readFile:` method operates as follows. First, it creates a `NSURL` object
    using the `URLWithString:` method. Once a URL object has been created, it is used
    to initialize a string with its content. The `stringWithContentsOfURL:encoding:error:`
    is responsible for opening the URL and transferring its contents to the `NSString`
    internal buffer. This method requires an encoding type, which determines how the
    text in the file will be represented. This option varies depending on the type
    of language used for encoding the text. Finally, the method returns an error object
    in its last parameter whenever an error condition is generated.


    Note


    `NSString` also allows the contents to be read from a file path, instead of a
    URL. Although this is convenient, in most situations you should prefer using an
    `NSURL` instead. This will help in maintaining portability and making your program
    able to use different URL types.


    Similarly, `NSString` can also be used to write data to a text file. The following
    code shows how a `FileWriter` class can be implemented:


    ```

    // file FileWriter.h


    @interface FileWriter : NSObject


    + (void) writeTest;


    - (void) writeFile:(NSString*) fileName content:(NSString*)data;


    @end

    ```


    The `FileWriter` class has a method that is used to write the content data, passed
    as the second argument, into the file defined by the parameter `fileName`. A testing
    procedure is also given in the `writeTest` class method.


    ```

    // file FileWriter.m


    #import "FileWriter.h"


    @implementation FileWriter


    - (void) writeFile:(NSString*) fileName content:(NSString*)data;


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    BOOL res = [data writeToURL:url


    atomically:NO


    encoding:NSUnicodeStringEncoding


    error:&error];


    if (!res)


    {


    NSLog(@"error writing to file %@", [error userInfo]);


    }


    }


    + (void) writeTest


    {


    FileWriter *writer = [[FileWriter alloc] init];


    [writer writeFile:@"file:///Users/oliveira/testFile2"


    content:@"This is the content of the file written by"


    " the file writer."];


    }


    @end

    ```


    You can quickly see that the `writeFile:content:` method is just a wrapper over
    `NSString` functionality. The method `writeToURL:atomically:encoding:error:` is
    responsible for taking the text stored in the data variable and writing it to
    the file at the location determined by the given `NSURL` object. The parameter
    `atomically` determines if the process is performed in an atomic way by the file
    system. To guarantee atomicity, Cocoa uses a buffer to store data until the whole
    file has been written, and then renames the file to its destination URL. The `encoding`
    parameter is similar to the encoding you saw when reading from a file. Finally,
    the `error` parameter is used only when an error condition needs to be reported.'
  raw: '## Specifying Locations with NSURL


    To access files in the Foundation framework you frequently need to create a `NSURL`,
    which is an object that represents a single URL. A URL (uniform resource locator)
    is an identifier used by the operating system to locate a particular resource.
    URLs can be used not only to locate files, but also for remote resources such
    as web pages or FTP files. You are concerned here only with local resources, however.


    A URL for a local file starts with the `file://` sequence. Therefore, to access
    a file located at `/Users/user1/file.txt`, for example, you should use the URL
    `file://Users/user1/file.txt` `.`


    Most file-related methods in Cocoa use `NSURL` objects instead of (or in addition
    to) string-based path names. The reason is that `NSURL` objects have several advantages
    when compared to standard paths. First, path names are system-specific. For example,
    some systems have forward slashes as separators, while others use back slashes
    or colons as separators. URLs were created to abstract these differences.


    Another service that `NSURL` provides is keeping track of a file once it is accessed.
    If a file is moved in the file system, for example, the `NSURL` object can keep
    referencing it, even though the path has changed.


    Finally, URLs are not limited to representing local files. You can use an URL
    to work with remote files using a number of protocols. While you may need to change
    your code to handle such remote resources, the representation of the location
    remains unchanged. That is another reason why Cocoa libraries prefer to deal with
    `NSURLs` whenever possible: in this way, there is no need to change the representation
    when using remote versus local resources.


    ## Reading and Writing Text Files


    Once you have a correct location for the file you want to access (most of the
    time in the form of a `NSURL` object), the next step is to read or write the contents
    using one of the Cocoa objects that interact with the file system.


    The first object that I will cover in this chapter is `NSString`. When working
    with text files, `NSString` may be the simplest way to interact with the file
    contents—unless there is some additional structure in the file, such as XML, for
    instance. Let’s see an example of how to read from a text file with `NSString`
    using a class called `FileReader`.


    `// file FileReader.h`


    `@interface FileReader : NSObject`


    `+ (void) readTest;`


    `- (void) readFile:(NSString*) fileName;`


    `@end`


    You have two methods in this class: an instance method called `readFile:` and
    a class method called `readTest`.


    `// file FileReader.m`


    `#import "FileReader.h"`


    `@implementation FileReader`


    `- (void) readFile:(NSString*) fileName`


    `{`


    `NSURL *url = [NSURL URLWithString:fileName];`


    `NSError *error;`


    `NSString *str = [NSString`


    `stringWithContentsOfURL:url`


    `encoding:kCFStringEncodingUnicode`


    `error:&error];`


    `NSLog(@"String is %@", str);`


    `}`


    `+ (void) readTest`


    `{`


    `FileReader *reader = [[FileReader alloc] init];`


    `[reader readFile:@"file:///Users/oliveira/testFile"];`


    `}`


    `@end`


    The `readFile:` method operates as follows. First, it creates a `NSURL` object
    using the `URLWithString:` method. Once a URL object has been created, it is used
    to initialize a string with its content. The `stringWithContentsOfURL:encoding:error:`
    is responsible for opening the URL and transferring its contents to the `NSString`
    internal buffer. This method requires an encoding type, which determines how the
    text in the file will be represented. This option varies depending on the type
    of language used for encoding the text. Finally, the method returns an error object
    in its last parameter whenever an error condition is generated.


    Note


    `NSString` also allows the contents to be read from a file path, instead of a
    URL. Although this is convenient, in most situations you should prefer using an
    `NSURL` instead. This will help in maintaining portability and making your program
    able to use different URL types.


    Similarly, `NSString` can also be used to write data to a text file. The following
    code shows how a `FileWriter` class can be implemented:


    `// file FileWriter.h`


    `@interface FileWriter : NSObject`


    `+ (void) writeTest;`


    `- (void) writeFile:(NSString*) fileName content:(NSString*)data;`


    `@end`


    The `FileWriter` class has a method that is used to write the content data, passed
    as the second argument, into the file defined by the parameter `fileName`. A testing
    procedure is also given in the `writeTest` class method.


    `// file FileWriter.m`


    `#import "FileWriter.h"`


    `@implementation FileWriter`


    `- (void) writeFile:(NSString*) fileName content:(NSString*)data;`


    `{`


    `NSURL *url = [NSURL URLWithString:fileName];`


    `NSError *error;`


    `BOOL res = [data writeToURL:url`


    `atomically:NO`


    `encoding:NSUnicodeStringEncoding`


    `error:&error];`


    `if (!res)`


    `{`


    `NSLog(@"error writing to file %@", [error userInfo]);`


    `}`


    `}`


    `+ (void) writeTest`


    `{`


    `FileWriter *writer = [[FileWriter alloc] init];`


    `[writer writeFile:@"file:///Users/oliveira/testFile2"`


    `content:@"This is the content of the file written by"`


    `" the file writer."];`


    `}`


    `@end`


    You can quickly see that the `writeFile:content:` method is just a wrapper over
    `NSString` functionality. The method `writeToURL:atomically:encoding:error:` is
    responsible for taking the text stored in the data variable and writing it to
    the file at the location determined by the given `NSURL` object. The parameter
    `atomically` determines if the process is performed in an atomic way by the file
    system. To guarantee atomicity, Cocoa uses a buffer to store data until the whole
    file has been written, and then renames the file to its destination URL. The `encoding`
    parameter is similar to the encoding you saw when reading from a file. Finally,
    the `error` parameter is used only when an error condition needs to be reported.'
  trans: '

    # 使用 NSURL 指定位置


    在 Foundation 框架中访问文件时，通常需要创建一个 `NSURL` 对象，它代表一个单一的 URL。URL（统一资源定位符）是操作系统用于定位特定资源的标识符。URL
    不仅能定位文件，还能用于远程资源，例如网页或 FTP 文件。不过，这里我们只关注本地资源。


    本地文件的 URL 以 `file://` 开头。例如，要访问位于 `/Users/user1/file.txt` 的文件，你应该使用 URL `file://Users/user1/file.txt`。


    Cocoa 中大多数与文件相关的方法都使用 `NSURL` 对象，而不是（或除了）基于字符串的路径名。原因在于，与标准路径相比，`NSURL` 对象具有若干优势。首先，路径名是系统相关的。例如，有些系统使用正斜杠作为分隔符，而另一些则使用反斜杠或冒号。URL
    的创建正是为了抽象这些差异。


    `NSURL` 提供的另一项服务是，一旦文件被访问，它就能持续追踪该文件。例如，即使文件在文件系统中被移动了，`NSURL` 对象也能继续引用它，尽管其路径已经改变。


    最后，URL 不仅限于表示本地文件。你可以使用 URL 通过多种协议来处理远程文件。虽然你可能需要修改代码来处理此类远程资源，但位置的表示形式保持不变。这也是
    Cocoa 库尽可能倾向于使用 `NSURL` 的另一个原因：这样，在使用远程资源与本地资源时，无需更改表示形式。


    # 读写文本文件


    一旦你为要访问的文件找到了正确的位置（通常以 `NSURL` 对象的形式），下一步就是使用与文件系统交互的某个 Cocoa 对象来读取或写入内容。


    本章将介绍的第一个对象是 `NSString`。在处理文本文件时，`NSString` 可能是与文件内容交互的最简单方式——除非文件中有一些额外的结构，例如
    XML。让我们看一个如何使用名为 `FileReader` 的类通过 `NSString` 从文本文件读取数据的示例。


    ```

    // file FileReader.h


    @interface FileReader : NSObject


    + (void) readTest;


    - (void) readFile:(NSString*) fileName;


    @end

    ```


    这个类中有两个方法：一个实例方法 `readFile:` 和一个类方法 `readTest`。


    ```

    // file FileReader.m


    #import "FileReader.h"


    @implementation FileReader


    - (void) readFile:(NSString*) fileName


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    NSString *str = [NSString


    stringWithContentsOfURL:url


    encoding:kCFStringEncodingUnicode


    error:&error];


    NSLog(@"String is %@", str);


    }


    + (void) readTest


    {


    FileReader *reader = [[FileReader alloc] init];


    [reader readFile:@"file:///Users/oliveira/testFile"];


    }


    @end

    ```


    `readFile:` 方法的操作过程如下：首先，它使用 `URLWithString:` 方法创建一个 `NSURL` 对象。一旦创建了 URL 对象，就用它来初始化一个包含其内容的字符串。`stringWithContentsOfURL:encoding:error:`
    负责打开 URL 并将其内容传输到 `NSString` 的内部缓冲区。这个方法需要一个编码类型，该类型决定了文件中文本的表示方式。此选项根据编码文本所使用的语言类型而变化。最后，当产生错误条件时，该方法会在其最后一个参数中返回一个错误对象。


    注意


    `NSString` 也允许从文件路径（而非 URL）读取内容。尽管这很方便，但在大多数情况下，你应该优先使用 `NSURL`。这将有助于保持可移植性，并使你的程序能够使用不同类型的
    URL。


    类似地，`NSString` 也可以用于将数据写入文本文件。以下代码展示了如何实现一个 `FileWriter` 类：


    ```

    // file FileWriter.h


    @interface FileWriter : NSObject


    + (void) writeTest;


    - (void) writeFile:(NSString*) fileName content:(NSString*)data;


    @end

    ```


    `FileWriter` 类有一个方法，用于将作为第二个参数传入的内容数据写入由参数 `fileName` 定义的文件中。`writeTest` 类方法中也提供了一个测试程序。


    ```

    // file FileWriter.m


    #import "FileWriter.h"


    @implementation FileWriter


    - (void) writeFile:(NSString*) fileName content:(NSString*)data;


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    BOOL res = [data writeToURL:url


    atomically:NO


    encoding:NSUnicodeStringEncoding


    error:&error];


    if (!res)


    {


    NSLog(@"error writing to file %@", [error userInfo]);


    }


    }


    + (void) writeTest


    {


    FileWriter *writer = [[FileWriter alloc] init];


    [writer writeFile:@"file:///Users/oliveira/testFile2"


    content:@"This is the content of the file written by"


    " the file writer."];


    }


    @end

    ```


    你可以很快看出，`writeFile:content:` 方法只是 `NSString` 功能的一个封装。`writeToURL:atomically:encoding:error:`
    方法负责获取存储在 data 变量中的文本，并将其写入由给定 `NSURL` 对象确定的位置的文件中。参数 `atomically` 决定了该过程是否由文件系统以原子方式执行。为了保证原子性，Cocoa
    使用一个缓冲区来存储数据，直到整个文件写入完毕，然后将文件重命名为其目标 URL。`encoding` 参数与你之前读取文件时看到的编码类似。最后，`error`
    参数仅在需要报告错误条件时使用。

    '
- fmt: '# Reading and Writing Binary Data


    The examples above show you how to operate with a text file. In these cases, it
    is easy enough just to use `NSString` to manipulate the contents of the file and
    read or write it. However, most applications also need to access files that are
    in binary format. Examples include compressed files, images, and other proprietary
    formats that cannot be just modified with a text editor.


    To accomplish this for small files, you may just use the counterpart of `NSString`
    for binary data: `NSData`. To simplify the process of manipulating such binary
    files, Cocoa enabled `NSData` with methods that can read and write data to disk
    storage, in the same way that `NSString` does.


    When reading a binary file, you need to be able to provide a buffer where the
    data will be temporary stored and a way to retrieve the data after it had been
    read. `NSData` implements this functionality by default, leaving to programmers
    only the task of processing the resulting data.


    For an example of how this works, you will write a class that reads data and prints
    a few bytes of it in the log, like so:


    ```

    // file ReadBinaryData.h


    @interface ReadBinaryData : NSObject


    - (NSData*)readData:(NSString*)fileName;


    + (void) testRead;


    @end

    ```


    This interface contains only two methods: `readData:`, which takes as argument
    the name of the file that you want to read, and `testRead`, a class method that
    tests the functionality in `readData:`.


    ```

    // file ReadBinaryData.m


    #import "ReadBinaryData.h"


    @implementation ReadBinaryData


    #define MAX_DATA_SIZE 1024


    - (NSData*)readData:(NSString*)fileName


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    NSData *data = [NSData dataWithContentsOfURL:url options:NSDataReadingUncached
    error:&error];


    if (data == nil)


    {


    NSLog(@"error reading file: %@", [error userInfo]);


    }


    else


    {


    int data_size = (int)[data length];


    unichar array[MAX_DATA_SIZE];


    int size = data_size;


    if (data_size > MAX_DATA_SIZE) size = MAX_DATA_SIZE;


    [data getBytes:array length:size];


    NSString *dataStr = [NSString stringWithCharacters:array length:size];


    NSLog(@"first bytes of data are: %@", dataStr);


    }


    return data;


    }


    + (void) testRead


    {


    ReadBinaryData *reader = [[ReadBinaryData alloc] init];


    [reader readData:@"file:///Users/oliveira/testFile"];


    [reader release];


    }


    @end

    ```


    In the first part of the implementation file you define the constant `MAX_DATA_SIZE`,
    which is used to determine the maximum amount of characters you would like to
    display from the file.


    The `readData:` method creates a `NSURL` object containing the file name, and
    then uses it as a parameter to the `dataWithContentsOfURL:options:error:` method.
    The first parameter to this method is the file URL, followed by an option that
    determines if the file will be cached or memory-mapped, for instance. The last
    parameter (`error`) is a pointer to an `NSError` object, which is used only in
    the case in which a failure was detected.


    If the data returned by `dataWithContentsOfURL:options:error:` is valid, you retrieve
    a small portion of its first part and print it to the logging window. This can
    be accomplished with `getBytes:length:`, a method in `NSData` that returns the
    stored bytes using an auxiliary memory array whose length is determined by the
    second parameter. You use a simple array of characters, and you copy only the
    first characters for testing purposes. In practice, you would need to use one
    or more iterations to retrieve all the data stored in `NSData` and do something
    useful with it.


    The `testRead` method is used to exercise the functionality in `ReadBinaryData`.
    You create an object of that class, and then send a `readData:` message to it
    with the name of a sample file that you have stored in your home directory as
    parameter. As a result, part of the file should be printed to the application
    log.


    `NSData` can also write data to a file, similarly to the way `NSString` works.
    To avoid repeating a similar example, let me show just the contents of `writeData:`,
    a method that uses `NSData` to output an array of bytes to a binary file:


    ```

    - (void)writeData:(int*)numbers length:(int)size


    dest:(NSString*)fileName


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    NSData *data = [NSData dataWithBytes:numbers length:sizeof(int)*size];


    BOOL ok = [data writeToURL:url


    options:NSDataWritingAtomic


    error:&error];


    if (!ok)


    {


    NSLog(@"error writing to file: %@", [error userInfo]);


    }


    }

    ```


    This time you create an `NSData` object to contain the array of integers that
    was passed as argument to the `writeData:length:dest:` method. The length of the
    data to be stored is determined by `sizeof(int)*size`, which gives the numbers
    of bytes necessary to store the data in the array.


    The next step is to use the `writeToURL:options:error:` method from `NSData` to
    write the array to disk. This method has an `options` parameter that can be used
    to determine how the file will be written to disk. In this case, I requested the
    file to be written atomically, that is, all the bytes will be written to a temporary
    file and then moved to the right location when finished. If an error occurs while
    this method is executed, the `error` variable will be used to store a message
    describing what happened.


    # Using NSStream


    Using `NSString` and `NSData` to manipulate files is convenient, but it is not
    a scalable solution. A problem with these simple classes is that the programmer
    doesn’t have much control over the I/O process. But the biggest problem with this
    model of file access is that `NSString` and `NSData` perform synchronous operations:
    that is, the current thread of the application has to wait until the whole file
    is processed. This may be acceptable for small files and simple applications,
    but it doesn’t scale when files increase in size or when you need quick response
    times.


    Therefore, in many situations it becomes impractical to use `NSString` or `NSData`
    as a solution for file access. Cocoa provides a better way of controlling file
    operations through the `NSStream` class and its relatives. `NSStream` has better
    ways to control how a file is accessed, and is able to divide the work in smaller
    chunks that can be handled by the applications without creating long pauses.


    `NSStream` has a generic interface that is implemented by `NSInputStream` and
    `NSOutputStream`. Both of these classes share the same model for file access,
    which is based on the use of delegates. Essentially, when using an `NSStream`
    you need to define a delegate object that will be called when it is time to perform
    an I/O operation.


    The other interesting aspect of `NSStream` is that it can be used not only to
    access files. Its internal model can also be applied to any URL, such as web resources
    or FTP files. It can also be used to connect directly to network sockets, although
    this application is beyond the scope of the current chapter. Everything that you
    are going to learn, however, can be used (with minor changes) to access network
    sockets used on client/server applications, for example.'
