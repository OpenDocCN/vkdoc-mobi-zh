    of memory to run effectively.


    The fact that Objective-C doesn’t rely on GC means that it can run anywhere, from
    large workstations to memory-constrained devices such as cell phones. And all
    of this is possible while still maintaining the high performance of a C-based
    language.


    The secret of Objective-C memory management is the use of a reference-based model
    for data, with a small number of simple rules that make it almost straightforward
    to allocate and release memory in an application. In this chapter, you’ll learn
    the rules that you need to master in order to write correct Objective-C code.
    After you understand the concepts behind memory management, I will also cover
    the latest technique provided by Apple compilers through ARC (Automatic Reference
    Counting), which practically removes the need for manual intervention in the memory
    management mechanism.


    ## Dealing with Memory Issues


    Before you learn how to manage memory properly, it is important to understand
    the types of memory errors that may be encountered in the course of developing
    Objective-C applications. Memory bugs, unlike other logical bugs, are among the
    most difficult to fix because they usually present themselves far away from where
    the real error occurred. Therefore, it is important to develop techniques to identify
    memory issues as soon as they happen, as a way to insure against even more complex
    problems that can take longer to fix.'
  trans: '

    ## 总结


    在本章中，我讨论了 Objective-C 提供的一些动态派发特性。拥有这些特性是使用具备丰富运行时系统的语言的优势之一。通过动态派发，不仅能够从基于单继承的标准消息派发系统中获益，还能在必要时突破其某些规则。


    你了解了选择器（selector）的工作原理，并通过示例看到如何利用它们使类更具通用性，减少对特定接口的依赖。我们讨论了一些在 Cocoa 框架中使用选择器的场景，这些场景在客户端与服务之间建立连接，而无需在两者之间添加任何显式的编译时引用，从而允许它们在运行时进行连接。


    我在本章中还讨论了 `forwardInvocation:` 方法，它为程序员提供了一种干净的方式，用以处理在编译时无法识别的消息。利用这一机制，可以拦截那些已被接收但未与类接口中任何成员匹配的消息。


    通过 `forwardInvocation:`，你可以决定将无法识别的消息发送给能够正确响应的其他对象。你了解到，当这种情况发生时，一个类实际上采纳了另一个类的接口。其结果可被理解为一种模拟的多继承形式，在这种情况下，你可以有选择地从两个或更多类中采纳所需的接口部分。


    至此，你已经创建了许多对象，但并未过多考虑它们在使用结束后如何存储或释放。尽管 Objective-C 没有自动垃圾回收机制（至少默认情况下没有），但它拥有强大内存管理模式，可帮助程序员完成节约内存这一重要任务。这将是下一章的主题。


    # 8. 内存管理


    复杂的内存管理是开发人员在用 C 语言编程时需要面对的主要问题之一。直接操作内存地址所带来的强大能力——这也是高效 C 语言编程的标志——当需要手动管理对象在内存中的位置时，也可能成为一个难题。Objective-C
    在保留 C 语言强大能力的同时，也引入了一种更好的方式来组织和管理内存。为了简化内存使用对象的过程，该语言提供了完全基于面向对象编程原则的技术。


    你将看到，使用一个强调运行时特性的面向对象语言的优势之一在于，内存管理可以被简化，并大部分委托给系统库，由它们完成大量复杂的工作。Objective-C 程序员可以专注于对象在其应用领域中的实际使用，而不是纠结于底层的内存管理方案。


    尽管在 Objective-C 中管理内存比在纯 C 语言中要容易得多，但请务必记住，它仍然基于手动内存管理框架。换句话说，没有像 Java 和 C# 等语言那样的自动垃圾回收器（GC）来控制内存（Objective-C
    曾为桌面应用程序提供过 GC，但其已被弃用，转而使用自动引用计数，这将在本章后面说明）。因此，你需要认识到这种内存管理方案的优缺点。


    垃圾回收使得内存使用变得几乎微不足道。无需担心对象如何分配以及何时释放。系统会为你处理好一切。然而，它也有一些缺点。经验表明，GC 系统要么效率太低（许多基于
    GC 的语言都存在的主要问题），要么太过复杂以至于需要消耗大量计算机资源来运行。例如 Java，其 GC 在十多年的时间里不断改进，最终形成了一个需要大量内存才能高效运行的复杂系统。


    Objective-C 不依赖 GC 的事实意味着它可以在任何地方运行，从大型工作站到像手机这样的内存受限设备。所有这一切，在保持基于 C 的语言的高性能的同时也成为可能。


    Objective-C 内存管理的秘诀在于使用基于引用的数据模型，并伴以少量简单的规则，这些规则使得在应用程序中分配和释放内存几乎变得直接明了。在本章中，你将学习编写正确
    Objective-C 代码所需掌握的规则。在理解了内存管理背后的概念之后，我还会介绍 Apple 编译器通过 ARC（自动引用计数）提供的最新技术，该技术实际上消除了在内存管理机制中手动干预的需要。


    ## 处理内存问题


    在了解如何正确管理内存之前，理解在开发 Objective-C 应用程序过程中可能遇到的内存错误类型非常重要。与其他逻辑错误不同，内存错误是最难修复的，因为它们通常出现在真实错误发生地点很远的地方。因此，开发在错误发生时立即识别内存问题的技术至关重要，这是防止出现更复杂、修复耗时更长问题的一种有效手段。

    '
- fmt: '# Types of Memory Problems


    In Objective-C, due to its heritage from C, there are a number of memory errors
    that programmers have to deal with. Among them are the following:


    - **Dangling pointers**: A dangling pointer occurs when you are pointing to an
    object or other area of memory that is not valid anymore. In C, this may happen
    for several reasons, such as accessing a pointer that was freed. In Objective-C,
    dangling pointers may occur because an object was released by mistake. When this
    happens, a new access to the variable will most probably crash the application
    because all the data that was previously stored there has been reused.

    - **Out-of-bound array access**: Since arrays and pointers are equivalent in C,
    array accessing can result in access to pointers out of the allocated area. This
    is a common memory error that occurs in most C-based applications. Objective-C
    programmers, however, can avoid many of these issues by using a collection such
    as `NSArray` instead of native arrays. Although `NSArray` may not be as fast as
    a native array, it provides automatic protection against this type of unwanted
    array access. For performance-critical code, it is always possible to convert
    from the use of collections to native arrays, when that becomes necessary.

    - **Memory leaks**: A memory leak is a point of a program where some memory becomes
    inaccessible, even though it was not released by the system. Memory leaks are
    possible both in C and Objective-C, only changing the mechanism by which memory
    is released. In Objective-C this happens because the user of an object didn''t
    call `release` on a variable by the end of a method (for local variables) or when
    an object was deallocated (for instance variables). Memory leaks are an insidious
    type of error because they don''t cause an immediate crash. The way you perceive
    a memory leak is by an increased memory use, which happens every time the offending
    code is run. After some time this may end up consuming all the memory available
    for the application, and causing sluggishness and even crashes.


    # Identifying Memory Bugs


    One of the main tools a programmer has against memory issues is the use of debugging
    applications and libraries. Xcode has a good number of helper tools that can be
    used to locate and fix error problems.


    Let''s first consider memory crashes. A great tool for diagnosing memory crashes
    is the Xcode debugger. The first thing you can do with a debugger is to reproduce
    the error and see a stack trace showing where the crash happened (see the example
    in Figure [8-1](#A978-1-4302-5906-0_8_Chapter.html#Fig1)). Once you have the location
    of the error, you can add a breakpoint in the lines just before it happens. This
    way you can have a clear view of the variables and their contents around the area
    where the error has occurred, and you will be able to determine what caused the
    incorrect behavior.


    Once you understand what caused a crash by looking at the variables and the code
    that is being executed, you can design a plan to fix the faulty code.


    ![A978-1-4302-5906-0_8_Fig1_HTML.jpg](A978-1-4302-5906-0_8_Fig1_HTML.jpg)


    Figure 8-1. Using the Xcode debugger to find the location of a crash


    Xcode also provides a great tool called `NSZombieEnabled` that checks for access
    to deallocated objects. This flag, when passed to the application running under
    Xcode, will tell the application to create `NSZombie` objects when releasing a
    pointer. So, instead of just having the memory released, the Objective-C libraries
    will set up an object of type `NSZombie`, which is useful to diagnose cases in
    which a disposed object is receiving messages after it was released. To setup
    the `NSZombieEnabled` option, you need to select the menu options Product ➤ Scheme
    ➤ Edit Scheme, and then click the arguments tab. On the "Arguments Passed on Launch"
    screen, check the checkbox for `NSZombieEnabled` (see Figure [8-2](#A978-1-4302-5906-0_8_Chapter.html#Fig2)).


    When an `NSZombie` object receives a message, it immediately triggers the Xcode
    debugger to display where the illegal access happened. The location of the zombie
    object will also give you a clue about the original object that was released and
    who called it. Based on that information, you can more easily figure out why the
    object was released by mistake and fix the offending source to get rid of the
    bug.


    ![A978-1-4302-5906-0_8_Fig2_HTML.jpg](A978-1-4302-5906-0_8_Fig2_HTML.jpg)


    Figure 8-2. Setting up the `NSZombieEnabled` option in Xcode'
