    # 总结


    在本章中，你已通过示例了解了如何在 Objective-C 中使用块的概览。借助块，你可以创建可发送给其他方法或保存下来以便在不同于其创建上下文中稍后使用的代码片段。虽然块看起来与函数相似，并且能够模拟其他函数或实例方法，但它们是实现小段代码的一种更为简洁的方式。


    更重要的是，块提供了一种简单高效的机制，可以隐式地与程序的其他部分共享数据（包括局部变量和实例变量）。这使得应用程序能够减少协调系统中变量访问所需的辅助代码量。如果使用块来简化数据访问看起来是解决编程问题的自然方案，你可以不用在单独的类中创建显式的方法来获取和设置数据。


    正如你所见，块不仅对于组织自己的代码非常重要，还与 Cocoa 中的其他类进行交互。例如，Foundation 框架提供了几种方法，要求程序员使用块来完成特定任务。你已经看到了
    `NSArray` 类使用这种方法的几个示例。


    Cocoa 和 Cocoa Touch 框架中的新框架提供了更多使用块的机会。这种技术的一些应用领域包括并行编程（其中块可以以这样的方式设置，即它们可以在不同的线程中执行）或图形编程（例如，块可以用于绘制
    3D 动画序列中的场景）。


    在下一章中，你将深入了解 Objective-C 提供的动态绑定机制。具体来说，我将讨论如何与运行时系统交互以提高应用程序的灵活性。


    # 7. 动态绑定


    ## 摘要


    Objective-C 的最大优势之一是它允许程序员根据实际需求选择速度和灵活性的正确组合。用这种语言编写的代码可以享受编译器检查表达式和方法调用的安全性，编译器在创建可执行文件的过程中会验证每条语句。然而，许多特性是由运行时驱动的，这允许程序员将一些决策推迟到代码执行时。


    Objective-C 的运行时系统是程序员在动态和静态编程行为之间切换的主要工具。在本章中，你将探索运行时系统提供的一些特性。你将看到程序员有很大的空间来定义如何响应发送给对象的消息。例如，通过选择器操作方法是最强大的特性之一，被高级程序员广泛使用。


    你还将看到如何允许在运行时将消息转发给其他对象。凭借这种能力，可以设计出无缝结合两个或多个现有接口的软件。最后，你将看到如何使用这些相同的特性来提高使用 Objective-C
    消息发送机制的代码性能。


    ## 方法选择器


    在 Objective-C 中创建新方法时，请记住方法由消息名、返回类型和一组形式参数定义。方法的这些元素在稍后的消息调用中被使用。当你向对象发送消息时，你隐式地告诉编译器你正在寻找哪种方法名、返回类型和参数。


    特定消息调用所针对的方法标识在面向对象应用程序中非常重要。为了找到正确的实现，编译器首先查找已知消息的列表，并找到与请求完全匹配的那个。


    由于 Objective-C 是一种动态语言，关于如何响应消息的决定是在运行时而不是编译时做出的。因此，与基于静态编译的语言（如 C++）不同，编译器需要某种方式在程序执行期间内部表示消息。这种能力通过使用选择器来提供，选择器是消息的运行时表示。选择器也可以存储为
    `SEL` 类型的变量，因此可以很容易地被程序员创建和操作。


    从程序员的角度来看，选择器是一个标识符，可以在运行时用来确定你要寻找哪条消息。每条消息都有一个关联的选择器：你可以检索和存储该选择器，并使用它来执行消息调用。以下是你可能希望在程序中访问方法选择器的几个原因：


    - **调用通用方法**：此功能的一个可能用途是进行通用方法调用，该调用可以根据作为参数传递的方法选择器而变化。类似于函数指针，选择器允许在不确切知道将要响应的方法名称的情况下进行方法调用。

    - **存储选择器以备后用**：你的目标可能是拥有一个选择器列表，这些选择器将在稍后使用，例如响应事件。以这种方式使用的方法被称为回调。这是与 UI 应用触发的事件进行交互的常见方式，你将在后续章节中看到。

    - **自省**：某些应用程序需要确定与特定类关联的方法。如果你有这种需求，选择器可能是定义类如何响应传入消息的正确方式。

