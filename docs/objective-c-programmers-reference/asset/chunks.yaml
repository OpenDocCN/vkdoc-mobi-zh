  trans: '

    # 引用计数规则


    如上一节所述，Objective-C 库实现的引用计数是一种简单的技术，它能让系统决定何时应将对象从内存中移除。但要使它正常工作，程序员需要定期遵循一些规则。尽管这些规则起初可能显得不自然，但经过一些实践后，它们会变成你的第二天性。由于使用引用计数的内存管理规则在系统中统一应用，程序员很快就能习惯并利用其便利性。


    引用计数是一种可以应用于任何非垃圾收集语言（如 C 或 C++）的系统。然而，在 Objective-C 中，这种特定内存管理系统的基本优势在于，与 C 不同，所有基础库都统一应用相同的策略。因此，无需像处理
    C 代码那样担心不同库使用不同的内存控制策略。一旦你学会了 `retain` 和 `release` 的工作原理，你就能理解系统中所有库（包括第三方框架）的内存使用模式。


    引用计数是一种内存组织技术，它使用附加到每个对象上的一个简单计数器。因此，内存管理规则等同于每个对象增加和减少引用计数（该计数指示当前实例在内存中存在多少引用）的规则。


    以下是引用计数正常工作需要遵循的规则。当对象被创建时，其内部计数器等于 1。对象仅由以 `new`、`alloc` 或 `copy` 开头的方法创建。当某个客户端为特定对象调用这些方法之一时，生成的指针被认为归该客户端所有。例如，考虑以下代码：


    ```objc

    // 文件 ArrayUse.h


    @interface ArrayUse : NSObject


    - (void) useArray;


    @end


    // 文件 ArrayUse.m


    #import "ArrayUse.h"


    @implementation ArrayUse


    - (void) useArray


    {


    NSArray *myArray = [[NSArray alloc] init];


    // 对数组进行操作...


    // 该数组归此对象所有。释放它。


    [myArray release];


    }


    @end

    ```


    类 `ArrayUse` 有一个名为 `useArray` 的方法，在该方法中分配并使用了一个数组。该数组是使用 `alloc`/`init` 这对方法创建的，并将结果赋值给
    `myArray`。请记住，由于是通过 `alloc` 返回的，该内存现在的引用计数为 1，你拥有返回的对象。这也意味着你控制着该对象的生命周期。由于这是一个局部数组，在方法执行结束后你无法再使用它。因此，你需要在
    `myArray` 上调用 `release` 以避免内存泄漏。


    现在，考虑一种情况：`myArray` 是一个实例变量，而非局部变量。


    ```objc

    // 文件 ArrayUse.h


    @interface ArrayUse : NSObject


    {


    NSArray *myArray;


    }


    - (void) useArray;


    - (void) dealloc;


    @end


    // 文件 ArrayUse.m


    #import "ArrayUse.h"


    @implementation ArrayUse


    - (void) useArray


    {


    myArray = [[NSArray alloc] init];


    // 对数组进行操作...


    }


    // 其他使用 myArray 的方法


    - (void) dealloc


    {


    // 该数组归此对象所有。释放它。


    [myArray release];


    [super dealloc];


    }


    @end

    ```


    在此示例中，`myArray` 被分配并存储为实例变量。由于你使用 `new` 创建了 `myArray`，你拥有该变量。这种情况与之前情况的不同之处在于，由于你在类作用域中使用
    `myArray`，释放它的合适方法是在 `dealloc` 中进行。两种情况下，`useArray` 类都拥有该对象，唯一的变化在于对象的生命周期。


    上述所有权规则的一个结果是：通过以 `alloc`、`new` 和 `copy` 之外的方法创建的对象，并不归代码的调用者所有。`NSArray` 类可以提供一个例子来说明这一点。


    ```objc

    - (void) useArray


    {


    NSArray *myArray = [NSArray arrayWithObjects:@1, @2, @3, nil];


    // 对数组进行操作...


    // 这个数组不是用 init/new/copy 创建的


    // 所以无需 release


    }

    ```


    这次，对象 `myArray` 是使用方法 `arrayWithObjects:` 创建的，这是一个返回新数组的类方法。尽管在功能上这与前一个示例的代码非常相似，但你需要处理对象的方式却截然不同。在这种情况下，`NSArray`
    负责提供一种释放对象的方式，因为客户端代码并非 `myArray` 的所有者。


    另一方面，当 `myArray` 是实例变量时，同样的问题会改变你的责任。这便引出了内存管理的下一条规则：如果你不拥有一个对象，则需要使用 `retain`
    方法来避免它被系统删除。此规则通过修改前述示例得以说明。看看当实例变量持有一个不由你拥有的内存指针时，其处理方式有何不同：


    ```objc

    // 文件 ArrayUse.m


    #import "ArrayUse.h"


    @implementation ArrayUse


    - (void) useArray


    {


    myArray = [NSArray arrayWithObjects:@1, @2, @3, nil];


    // 对数组进行操作...


    // 这个数组不是用 init/new/copy 创建的


    // 所以我们需要 retain 它：


    [myArray retain];


    }


    // 其他使用 myArray 的方法


    - (void) dealloc {


    // 该数组归此对象所有。释放它。


    [myArray release];


    [super dealloc];


    }


    @end

    ```


    这里你可以看到将 `NSArray` 对象存储在 `myArray` 实例变量中的方式有何不同。由于你使用了 `arrayWithObjects:`，生成的实例并不归
    `ArrayUse` 所有。结果是，你需要使用 `retain` 来获得对象的所有权，以便以后能够使用它。如果你没有使用 `retain`，存储在 `myArray`
    中的对象会在下一次可用机会时被系统释放。


    注意，然而，`dealloc` 的实现没有改变。当 `ArrayUse` 类的对象被销毁时，它拥有对 `myArray` 的一个引用。因此，它需要以与之前相同的方式在
    `myArray` 上调用 `release`。

