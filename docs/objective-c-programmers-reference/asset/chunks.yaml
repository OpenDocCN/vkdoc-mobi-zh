    `reveal:` 方法是在 Xcode 的 nib 设计期间可用的另一个操作。其目的是显示当前索引卡片的隐藏内容。通过更改此 `UILabel` 对象的隐藏属性，Cocoa
    Touch 库将负责根据需要自动更新 UI。


    `- (void)flipsideViewControllerDidFinish:(FlipsideViewController *)c`


    `{`


