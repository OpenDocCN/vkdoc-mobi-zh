    Carlos Oliveira is a software engineer working for the financial industry, with
    more than 10 years of experience in Objective-C and C++ programming. During his
    career, Carlos has developed several large-scale applications for companies big
    and small. Carlos Oliveira obtained a PhD in Systems Engineering and Operations
    Research from the University of Florida, an MSc in Computer Science from UFC (Brazil),
    and a BSc in Computer Science from UECE (Brazil). Carlos has also performed academic
    research in the field of combinatorial optimization, with applications in diverse
    areas such as finance, telecommunications, computational biology, and logistics.
    He has written more than 20 papers on optimization aspects of these topics, and
    co-authored Mathematical Aspects of Network Routing Optimization (Springer, 2010).


    Carlos Oliveira currently works in New York City and lives in New Jersey with
    his wife, Janaina, and his son, Lucas. You can contact Carlos Oliveira at his
    web site, [`http://coliveira.net`](http://coliveira.net) .


    About the Technical Reviewer


    ![A978-1-4302-5906-0_BookFrontmatter_Fig2_HTML.jpg](A978-1-4302-5906-0_BookFrontmatter_Fig2_HTML.jpg)
    Ron Natalie has 35 years of experience developing large scale applications in
    C, Objective-C, and C++ on Unix, OS X, and Windows. He has a degree in electrical
    engineering from the Johns Hopkins University and has taught professional courses
    in programming, network design, and computer security.


    He splits his time between Virginia and North Carolina with his wife, Margy.


    Introduction


    Welcome to Objective-C Programmer''s Reference. This is a book targeted at developers
    who have prior experience with other languages such as Java, Python, Ruby, or
    C++ and would like to leverage that knowledge into the Objective-C world.


    Maybe you have played with the iPhone and would like to know how to develop that
    app that you wish were available on the AppStore. Or maybe you want to create
    a new desktop application in Mac OS X. Still, you may want to program in Objective-C
    just because you need to support iOS devices at your company. Whatever the reason,
    this book will help you to move from knowing concepts of programming in other
    languages to learning how to and (I hope) enjoying programing in Objective-C.


    This book is also written with the goal of reaching readers who already know Objective-C
    but would like a concise reference to the most commonly used techniques in the
    language. You will be able to understand topics that are of real importance when
    working with Cocoa and Cocoa Touch, the two largest and most important frameworks
    in Objective-C. You will also learn fundamental topics that can be leveraged into
    any programming situation where Objective-C is needed.


    You may not have the time to invest in more traditional books, which usually spend
    hundreds of pages to explain simple concepts that are already part of the standard
    vocabulary of working developers and advanced programming students. That’s why
    this book tries to convey only the most important topics with concise examples.
    We also include a quick reference to the most commonly used classes, so you don’t
    need to spend too much time looking at these documents online.


    Objective-C Programer `''s` Reference is an excellent choice for developers that
    want to use their knowledge effectively, while learning one of the most sought
    after and marketable skill sets for modern application and mobile development.'
