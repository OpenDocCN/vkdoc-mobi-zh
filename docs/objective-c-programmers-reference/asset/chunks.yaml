- fmt: '*   `+ (id)set`; creates a new, empty `NSSet` object.

    *   `+ (id)setWithObject:(id)object`; creates a new `NSSet` object and initializes
    it by adding the object passed as parameter.

    *   `+ (id)setWithObjects:(const id [])objects count:(NSUInteger)cnt`; creates
    a new `NSSet` object and initializes it by adding the objects passed as a C-style
    array. The number of such object is determined by the parameter `cnt`.

    *   `+ (id)setWithObjects:(id)firstObj, ...` ; creates a new `NSSet` object and
    initializes it by adding the objects as a list of arguments. The list must be
    terminated by `nil`.

    *   `+ (id)setWithSet:(NSSet *)set`; creates a new `NSSet` object and initializes
    it by adding all the elements of the set passed as a parameter.

    *   `+ (id)setWithArray:(NSArray *)array`; creates a new `NSSet` and initializes
    it by adding all the elements contained in the `NSArray` passed as parameter.

    *   `- (id)initWithObjects:(const id [])objects count:(NSUInteger)cnt`; initializes
    a `NSSet` object by using the elements contained in the C-style array objects.
    The number of such objects is given by `cnt`.

    *   `- (id)initWithObjects:(id)firstObj, ...` ; initializes a `NSSet` object by
    adding the objects given as argument. The list of objects must have `nil` as the
    last element.

    *   `- (id)initWithSet:(NSSet *)set`; initializes a `NSSet` object by adding all
    elements contained in an existing `NSSet` object.

    *   `- (id)initWithSet:(NSSet *)set copyItems:(BOOL)flag`; initializes a `NSSet`
    object by adding all the elements contained in an existing `NSSet`. If the second
    argument is `YES`, then the elements are copied, and the original values are not
    used.

    *   `- (id)initWithArray:(NSArray *)array`; initializes a `NSSet` object by adding
    all the elements contained in the `NSArray` passed a parameter.

    *   `- (NSUInteger)count`; returns the number of elements stored in the target
    `NSSet` object.

    *   `- (id)member:(id)object`; returns the parameter object if it is contained
    in the target `NSSet` object. Otherwise, this method returns `nil`.

    *   `- (NSEnumerator *)objectEnumerator`; returns an `NSEnumerator` object, which
    can be used to step through the objects contained in the target `NSSet` object.

    *   `- (NSArray *)allObjects`; returns a new `NSArray` containing all the objects
    stored in the target `NSSet` object.

    *   `- (id)anyObject`; returns any of the objects currently stored in the `NSSet`.
    There is no guarantee which element will be returned.

    *   `- (BOOL)containsObject:(id)anObject`; returns `YES` if the target `NSSet`
    contains the object passed as a parameter.

    *   `- (NSString *)description`; returns a short description for the target `NSSet`
    object.

    *   `- (NSString *)descriptionWithLocale:(id)locale`; returns a short description
    for the `NSSet` object, using the locale specified.

    *   `- (BOOL)intersectsSet:(NSSet *)otherSet`; returns `YES` if the target `NSSet`
    has at least one element in common with the given parameter `otherSet`.

    *   `- (BOOL)isEqualToSet:(NSSet *)otherSet`; returns `YES` if each element of
    the target `NSSet` is also contained in `otherSet` and both sets have the same
    number of elements.

    *   `- (BOOL)isSubsetOfSet:(NSSet *)otherSet`; returns `YES` if each element of
    the target `NSSet` is also an element of the `otherSet`.

    *   `- (void)makeObjectsPerformSelector:(SEL)aSelector`; executes the selector
    `aSelector` for all elements of the target `NSSet` object.

    *   `- (void)makeObjectsPerformSelector:(SEL)aSelector withObject:(id)argument`;
    executes the selector `aSelector` for all elements of the target `NSSet` object.
    The second parameter is passed as an argument to the selector.

    *   `- (NSSet *)setByAddingObject:(id)anObject`; creates a new `NSSet` and initializes
    it by adding a single object as the `anObject` parameter.

    *   `- (NSSet *)setByAddingObjectsFromSet:(NSSet *)other`; creates a new `NSSet`
    and initializes it by adding all objects from the set passed as the first argument.

    *   `- (NSSet *)setByAddingObjectsFromArray:(NSArray *)other`; returns a new `NSSet`
    and initializes it by adding all members of the `NSArray` `other`.

    *   `- (void)enumerateObjectsUsingBlock:(void (^)(id obj, BOOL *stop))block`;
    executes the block passed as argument for all elements of the target `NSSet`.

    *   `- (void)enumerateObjectsWithOptions:(NSEnumerationOptions)opts usingBlock:(void
    (^)(id obj, BOOL *stop))block`; executes the block for all elements of the target
    `NSSet`, using the options passed in the first argument.

    *   `- (NSSet *)objectsPassingTest:(BOOL (^)(id obj, BOOL *stop))predicate`; returns
    a new `NSSet` object containing all the elements of the target set that pass the
    test determined by the predicate argument.

    *   `- (NSSet *)objectsWithOptions:(NSEnumerationOptions)opts passingTest:(BOOL
    (^)(id obj, BOOL *stop))predicate`; returns a new `NSSet` object that contains
    all the objects in the target `NSSet` that passed the test determined by the predicate
    argument. The enumeration of the object is performed according to the options
    in `opts`.


    ## Summary


    In this chapter, I provided a quick reference for the most important classes contained
    in the Foundation framework. I limited the exposition to the most commonly used
    interfaces, so that you can quickly refer to the methods that are contained in
    these classes.


    In the first part of the chapter, I presented a reference for some of the basic
    classes, such as `NSObject`, `NSString`, and `NSValue`. These classes are the
    foundation of the services provided by Cocoa. The second part of the chapter is
    a reference for a few of the most common collection classes, such as `NSArray`,
    `NSDictionary`, and `NSSet`.


    In the next few chapters, I will start covering the tools and the environment
    available to Objective-C developers. The first thing you will learn about is the
    Objective-C compiler, along with its most important configurations. I will show
    you some of the common ways to use the compiler, and how to tweak its options
    to achieve different levels of performance, logging, or memory use.


