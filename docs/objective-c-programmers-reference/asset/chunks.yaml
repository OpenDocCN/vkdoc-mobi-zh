- fmt: "# Adding Unit Test Targets\n\nI assume in this chapter that you are using\
    \ Xcode to create and build your project. Adding unit testing through command\
    \ line tools is possible, but it is highly dependent on the building tool you’re\
    \ using and is usually not supported by Apple. That’s why in this chapter I only\
    \ describe the procedure for creating unit tests using Xcode.\n\nXcode projects\
    \ can be divided into a number of targets, which are used to organize the various\
    \ outputs that can result from a single project. A target within a project is\
    \ generally an executable, depending on the platform and environment that you\
    \ want to support. A unit test target allows you to create a separate executable\
    \ whose purpose is to run test cases against production code. In this way, you\
    \ can neatly separate code that is specific to the application from code that\
    \ is used only to test the application.\n\nMoreover, Xcode supports two kinds\
    \ of test targets, each one linked to a particular kind of tests. A logical test\
    \ is one in which you are interested in testing only the correctness of a particular\
    \ method or class in isolation. For this kind of test, Xcode only needs to be\
    \ able to find the code for the tested methods and include it in the executable\
    \ of the unit test target.\n\nA second kind of unit test is an application test.\
    \ These tests are run not in complete isolation, but in the context of an application.\
    \ For example, they can be used to determine if the buttons in a particular window\
    \ have the correct labels. Or you can use them to verify that a certain value\
    \ will be updated when a menu option is clicked. Because of their own nature,\
    \ application tests depend on the platform in which they are set up and on the\
    \ toolkit used for that particular environment.\n\n**Note**\n\nDue to the environment-specific\
    \ features that are inherent to application tests, in this chapter I will consider\
    \ only logical tests, as they are valid in any platform that is supported by Objective-C\
    \ (and they may work even in non-Apple environments). If you intend to use application-specific\
    \ unit tests, just check the programming manual for your target environment. Apple\
    \ provides that information along with Xcode for both Mac OS X and iOS targets.\n\
    \nThere are two ways to add unit tests to your code. The first, and simplest one,\
    \ is adding a testing target when creating the project. The New ➤ Project menu\
    \ option will let you create a new application from one of several project types.\
    \ If you select OS X Application, and then Cocoa Application, you will be presented\
    \ with the window displayed in Figure [14-1](#A978-1-4302-5906-0_14_Chapter.html#Fig1).\
    \ Make sure you click the “Include Unit Tests” options, and Xcode will generate\
    \ the new project with an associated unit test target.\n\n![A978-1-4302-5906-0_14_Fig1_HTML.jpg](A978-1-4302-5906-0_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1.\n\nIncluding unit tests in a new project\n\nThe second way to include\
    \ unit tests is by adding a new target to an existing project. Xcode allows you\
    \ to create a new target, which is a generic name for the IDE support to generate\
    \ a new executable. Suppose that you have an existing project to which you want\
    \ to add a set of unit tests. You can add new targets by using the New ➤ Target\
    \ menu while the project is open. On the left side, select the “Other” option.\
    \ You will see a few items, from which you can select “Cocoa Unit Testing Bundling.”\
    \ The target selection window is displayed in Figure [14-2](#A978-1-4302-5906-0_14_Chapter.html#Fig2).\n\
    \nThe next screen in the target creation window will let you enter details such\
    \ as the target name and the project that will contain this target. Once you enter\
    \ this information, Xcode will create the new target and prepopulate it with a\
    \ few files that can be immediately used to create new test cases.\n\n![A978-1-4302-5906-0_14_Fig2_HTML.jpg](A978-1-4302-5906-0_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2.\n\nSelecting a unit testing target\n\nLet’s create a new target\
    \ called `TestUT`, which will contain test cases for a personal project. Xcode\
    \ automatically generates a new class called `TestUT`, which will be used to store\
    \ any new test cases. Here is the header file:\n\n```\n// file TestUT.h\n#import\
    \ <SenTestingKit/SenTestingKit.h>\n@interface TestUT : SenTestCase\n@end\n```\n\
    \nThe symbol `SenTestingKit` used above is the name of the framework that contains\
    \ OCUnit. The default class inherits from `SenTestCase`, so that it can use all\
    \ the methods made available by OCUnit. Here is the corresponding implementation\
    \ file:\n\n```\n// file TestUT.m\n#import \"TestUT.h\"\n@implementation TestUT\n\
    \n- (void)setUp\n{\n    [super setUp];\n    // Set-up code here.\n}\n\n- (void)tearDown\n\
    {\n    // Tear-down code here.\n    [super tearDown];\n}\n\n- (void)testExample\n\
    {\n    STFail(@\"Unit tests are not implemented yet in TestUT\");\n}\n@end\n```\n\
    \nNotice how the implementation file already gives you a few of the methods that\
    \ are frequently needed in a unit testing class. You need first to understand\
    \ how each of these methods cooperated during the execution of test cases.\n\n\
    The `setUp` method is responsible for initializing the testing environment for\
    \ your test case. You can add here any code that is common to each of the tests\
    \ you want to run in the test class. For example, if you need a database connection\
    \ available for each of your tests, you can write the code that creates the connection\
    \ as part of the `setUp` method.\n\nSimilarly, the `tearDown` method is used to\
    \ finalize the environment used by each test case in this class. In the case of\
    \ the database connection, you may want to close the connection here, so you don’t\
    \ need to repeat that code in each test case."
