    ### 编译代码示例


    本书中给出的示例均在 OS X 系统上使用免费的 Xcode IDE 编译。要使用 Xcode，你需要拥有一台 Mac OS X 系统的机器。如果你的电脑尚未安装
    Xcode，可以从 Apple 开发者网站 [`http://developer.apple.com`](http://developer.apple.com)
    下载。


    另一种安装 Xcode 的方式是使用 Mac 上的 App Store 应用程序。搜索 Xcode 并点击安装即可。


    下次启动 Xcode 时，通过点击“文件 ➤ 新建 ➤ 项目”来创建一个新项目。这将弹出一个向导窗口，你可以在其中为新项目设定一些基本选项，例如位置、名称以及目标操作系统（请将
    Mac OS X 设为目标系统）。


    在新项目中，你可以创建文件并输入书中展示的示例代码。要下载本书包含的所有示例的完整集合，请访问本书的网页 [`http://coliveira.net`](http://coliveira.net)
    或 [`www.apress.com`](http://www.apress.com)。


    ### 致谢


    如果没有一个能干且专注的团队支持，编写这样一本书将是极其困难的。我要感谢 Apress 出版社编辑团队的大力支持。


    首先，感谢编辑 Jonathan Gennick 给予我撰写本书的机会；他的帮助让我感激不尽。技术审校 Ron Natalie 在指出编程主题中发现的任何问题方面做得非常出色。编辑
    Jill Balzano 和 Douglas Pundick 在项目的所有实际方面提供了难以置信的帮助。


    最后但同样重要的是，感谢我的家人在我整个职业生涯，尤其是在撰写本书期间给予我的关爱和支持。


