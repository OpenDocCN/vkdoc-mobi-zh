    if the base class says that it can calculate employee salaries, then the subclass
    also needs to be able to do so.


    `// file Employee.h`


    `@interface Employee : NSObject`


    `{`


           `NSString *name;`


    `}`


    `- (void) setName:(NSString*) aName;`


    `- (double) calculateSalary;`


    `- (void) provideJobEvaluation;`


    `@end`


    But what happens if the new subclass `HourlyEmployee` has a different way to calculate
    salaries? The simple solution is just to override the `calculateSalary` method
    and provide a new implementation.


    `// file Employee.m`


    `@implementation Employee`


    `- (void) setName:(NSString*) aName`


    `{`


           `self->name = aName;`


    `}`


    `- (double) calculateSalary`


    `{`


           `double salary = 0;`


           `// perform salary calculation`


           `return salary;`


    `}`


    `- (void) provideJobEvaluation`


    `{`


    `}`


    `@end`


    Doing this is a valid use of inheritance. But suppose, on the other hand, that
    the class `HourlyEmployee` has no way to calculate the salary. Assume, for example,
    that the salary is based on commissions that are not available to the class until
    the beginning of next year. When that happens, the contract defined by the base
    class breaks, and the subclass will have difficulties in posing as similar to
    the superclass. For example, here are two options for the implementation of `calculateSalary`:


    `- (double)calculateSalary`


    `{`


       `return 0;`


    `}`


    `- (double)calculateSalary`


    `{`


           `@throw [NSException exceptionWithName:@"salaryException"`


                                          `reason:@"no salary available"`


                                        `userInfo:NULL];`


    `}`


    In the first case, the application will receive an incorrect value, since an hourly
    employee clearly doesn’t receive a salary of zero. In the second option, the application
    cannot continue after the method generates an exception. In both cases, the result
    is not what the clients expected of an `Employee` object. This means that `SalaryEmployee`
    is not a good fit for a subclass of `Employee`.


    The substitution principle states that, when a class is derived from a base class,
    objects of the subclass should be able to substitute for objects of the subclass
    in any situation where this is required. The class `HourlyEmployee` doesn’t comply
    with this general principle, as you have seen. It cannot respond to `calculateSalary`
    messages in the same way that the original class responds. Therefore, in this
    case it would be preferable to avoid the direct use of inheritance. One possible
    solution would be to split the responsibility for salary calculation into a separate
    class, so that the original class would respond to a message such as `canCalculateSalary`.
    In any case, it is necessary to consider if a subclass can be really used in any
    context where the base class is used, and make any design changes necessary in
    case this is not possible.


    ## Class Clusters


    A class cluster is a set of classes related by inheritance, which offer a complete
    implementation for a feature that can have variations depending on the concrete
    types used. The main distinction of a class cluster is that only one class at
    the top of the hierarchy is visible to clients. All other classes of the cluster
    are hidden, so that it is not possible to instantiate them directly. Instead,
    concrete classes of the cluster have to be created through the main interface,
    which usually contains `init` methods, as well as class methods, that can return
    the right object for each situation.


    Class clusters offer a powerful way to control the complexity of maintaining and
    exposing a large number of related classes in a hierarchy. When using a class
    cluster, you don’t need to know the name of the exact class that implements the
    right version of the functionality you need. The base class of the cluster will
    cooperate with derived classes to create the exact object that will satisfy your
    needs. On the other hand, the classes that derive from the main class of the cluster
    have the responsibility to implement a concrete version of the methods that interact
    with local storage. The methods that need to be overridden in a concrete implementation
    of the cluster are called primitive methods, since they provide the primitive
    functionality that is used by the class cluster to implement other high level
    features.


    The definition can be more easily understood through a use case. Suppose that
    a class can assume two or more functional configurations, with independent data
    storage that determines how these classes will act. Moreover, the class has a
    common interface for each of these configurations, so that it is possible to access
    them in a unified way. When that is the case, it is possible to organize the classes
    in a way that only a base class can be made visible, while the concrete functionality
    is implemented by its subclasses.


    Class clusters are considered to be a basic design pattern in Objective-C. A typical
    example of class cluster in the Foundation framework is `NSNumber`. While it appears
    to clients as being a single class, the real implementation of `NSNumber` happens
    to contain a class cluster, where the main abstract class acts as a wrapper around
    concrete classes, which handle the state of the object. Among the concrete classes
    in the `NSNumber` cluster, you will find implementation models for integers, floats,
    and Booleans, for example.


    Using a class cluster is straightforward, in the sense that the programmer doesn’t
    need to know which class is created by the class initializers. In the `NSNumber`
    example, you have a number of initialization methods, named for instance `initWithInteger:`,
    `initWithFloat:`, and `initWithChar:`. These methods return an object that correctly
    represents the data stored on it. However, the exact subclass of the returned
    object is hidden from users.


    From the point of view of the creator of a new class cluster, there are some practical
    issues that must be considered. First, it is necessary that the public interface
    of the abstract base class be the only point of contact between clients and the
    other classes in the cluster. Therefore, the interface of the base class in the
    cluster must contain all methods that will be used to interact with any member
    of the cluster. Among the methods of the abstract class you will find primitive
    methods, the ones that need to be implemented in each derived class. The second
    class of methods, derived methods, contains those that are implemented in the
    base class and use the primitive methods in their definition. Therefore, such
    methods don’t need to be overridden in the concrete classes.


    A class that derives from the abstract root of the cluster needs to provide its
    own instance variables for data storage. The abstract class in a cluster doesn’t
    have local storage by design, since each concrete class may have a different way
    to store data.'
  trans: "\n# 替换原则\n\n当系统中的某个类继承自另一个类时，它不仅享有一项特权，还承担着一项义务。主要特权是继承基类提供的非私有接口和实现。因此，派生类可以在任何可以使用基类的上下文中使用。例如，`HourlyEmployee`\
    \ 实际上是一种 `Employee` 对象。因此，只要需要 `Employee` 对象，它就可以被使用：如果一个对象期望接收一个 `Employee` 并向其发送消息，那么它也应该能够对\
    \ `HourlyEmployee` 执行同样的操作。\n\n另一方面，继承要求子类承担一项责任：它们需要能够满足基类设定的期望。例如，如果基类声明它可以计算员工薪水，那么子类也需要能够做到这一点。\n\
    \n```\n// 文件 Employee.h\n\n@interface Employee : NSObject\n\n{\n       NSString\
    \ *name;\n}\n\n- (void) setName:(NSString*) aName;\n- (double) calculateSalary;\n\
    - (void) provideJobEvaluation;\n\n@end\n```\n\n但是，如果新的子类 `HourlyEmployee` 有另一种计算薪水的方式，会发生什么？简单的解决方案就是覆盖\
    \ `calculateSalary` 方法并提供新的实现。\n\n```\n// 文件 Employee.m\n\n@implementation Employee\n\
    \n- (void) setName:(NSString*) aName\n{\n       self->name = aName;\n}\n\n- (double)\
    \ calculateSalary\n{\n       double salary = 0;\n       // 执行薪水计算\n       return\
    \ salary;\n}\n\n- (void) provideJobEvaluation\n{\n}\n\n@end\n```\n\n这样做是继承的有效用法。但反过来，假设\
    \ `HourlyEmployee` 类无法计算薪水。例如，假设薪水是基于佣金的，而该类要到明年年初才能获得这些佣金。当这种情况发生时，基类定义的契约就被打破了，子类将难以模仿其超类。例如，以下是\
    \ `calculateSalary` 实现的两种选择：\n\n```\n- (double)calculateSalary\n{\n   return 0;\n\
    }\n```\n\n```\n- (double)calculateSalary\n{\n       @throw [NSException exceptionWithName:@\"\
    salaryException\"\n                                      reason:@\"no salary available\"\
    \n                                    userInfo:NULL];\n}\n```\n\n在第一种情况下，应用程序将接收到一个错误的值，因为按小时计酬的员工显然不会拿到零薪水。在第二种情况下，方法抛出异常后，应用程序无法继续运行。在这两种情况下，结果都不是客户端对\
    \ `Employee` 对象所期望的。这意味着 `SalaryEmployee` 不适合作为 `Employee` 的子类。\n\n替换原则指出，当一个类派生自一个基类时，子类的对象应该能够在任何需要的情况下替换基类的对象。正如你所见，`HourlyEmployee`\
    \ 类不符合这个通用原则。它无法像原始类那样响应对 `calculateSalary` 消息。因此，在这种情况下，最好避免直接使用继承。一种可能的解决方案是将薪水计算的责任拆分到一个单独的类中，这样原始类就可以响应诸如\
    \ `canCalculateSalary` 之类的消息。总之，有必要考虑子类是否真的能在任何使用基类的上下文中使用，如果不行，则需要进行必要的设计变更。\n\
    \n# 类簇\n\n类簇是一组通过继承关联的类，它们为某个功能提供了一个完整的实现，该功能的实现可能因所使用的具体类型而异。类簇的主要特点是，层级结构中只有顶部的单个类对客户端可见。簇中的所有其他类都是隐藏的，因此无法直接实例化它们。相反，簇中的具体类必须通过主接口来创建，主接口通常包含\
    \ `init` 方法以及类方法，这些方法可以针对每种情况返回正确的对象。\n\n类簇提供了一种强大的方法来控制维护和暴露层级结构中大量相关类的复杂性。使用类簇时，你不需要知道实现所需功能的正确版本的确切类名。簇的基类将与派生类协作，以创建满足你需求的确切对象。另一方面，从簇的主类派生出来的类负责实现与本地存储交互的方法的具体版本。在簇的具体实现中需要被覆盖的方法称为原始方法，因为它们提供了类簇用于实现其他高级功能的原始功能。\n\
    \n通过一个用例可以更容易地理解这个定义。假设一个类可以采用两种或多种功能配置，并使用独立的数据存储来决定这些类将如何运作。此外，该类为每种配置提供了公共接口，因此可以统一访问它们。在这种情况下，可以组织这些类，使得只有基类是可见的，而具体功能由其子类实现。\n\
    \n类簇被认为是 Objective-C 中的一种基本设计模式。Foundation 框架中类簇的一个典型例子是 `NSNumber`。虽然它对客户端来说表现为一个单一的类，但\
    \ `NSNumber` 的实际实现恰好包含一个类簇，其中主要的抽象类充当具体类的包装器，负责处理对象的状态。例如，在 `NSNumber` 簇的具体类中，你会找到整数、浮点数和布尔值的实现模型。\n\
    \n使用类簇很简单，因为程序员无需知道类初始化器创建的是哪个类。在 `NSNumber` 的例子中，有许多初始化方法，例如命名为 `initWithInteger:`、`initWithFloat:`\
    \ 和 `initWithChar:` 的方法。这些方法返回一个能够正确表示其存储数据的对象。但是，返回对象的确切子类对用户是隐藏的。\n\n从创建新类簇的角度来看，必须考虑一些实际问题。首先，抽象基类的公共接口必须是客户端与簇中其他类之间唯一的联系点。因此，簇中基类的接口必须包含所有用于与簇中任何成员交互的方法。在抽象类的方法中，你会找到原始方法，这些方法需要在每个派生类中实现。第二类方法，即派生方法，包含那些在基类中实现并在其定义中使用原始方法的方法。因此，这些方法不需要在具体类中被覆盖。\n\
    \n从簇的抽象根类派生的类需要提供自己的实例变量用于数据存储。簇中的抽象类在设计上没有本地存储，因为每个具体类可能有不同的数据存储方式。\n"
- fmt: "# 类簇的另一个示例\n\n另一个类簇的示例可以在集合类中看到，例如 `NSArray`。当你调用 `init` 时返回的对象实现了 `NSArray`\
    \ 的接口，但它可能来自簇中的不同子类，包括 `NSMutableArray`；这完全取决于 `NSArray` 构造器如何执行对象初始化任务。如你稍后将看到的，类簇是一种通用策略的示例，用于在库或大型应用程序中向其他客户端隐藏实现细节信息。\n\
    \n## 防止子类化\n\n最后，尽管本章讨论的子类化有许多优点，但其错误使用也可能导致合理的问题。因此，在某些情况下，可能有必要阻止对少数特定类进行继承；换句话说，你可能希望阻止一个类成为另一个类的基类。\n\
    \n> **注意**\n> \n> 继承的主要缺点之一就是现在所谓的脆弱基类问题。在创建类层次结构时，类通常会使用父类提供的实现信息。然而，不存在所谓完美的设计，对基类的修改最终可能是必要的。这种修改可能会导致依赖这些内部细节的子类停止工作。一个好的层次结构设计应尽量减小这种可能性。\n\
    \n某些语言通过从继承的角度将特定类标记为不可变来直接支持此特性。例如，在 Java 中，可以使用 `final` 关键字标识一个类，这样在应用此语法注解后，开发人员就不允许继承它。在较新的语言中，C#\
    \ 也允许这种类之间的区分。\n\nObjective-C 的设计者决定不添加避免继承的机制。这个选择很可能是为了保持语言的简洁性，或许也因为这个特性并不常用。然而，即使没有像\
    \ Java 中的 `final` 关键字那样的直接支持，仍然可以采取一些措施来防止一个类被子类化。\n\n你可以使用的通用策略涉及降低类的可见性。这里的原理是，你不能子类化一个存在于应用程序中但客户端在编译时无法看到的类。因此，例如，你可以创建一个类，但从不为其提供头文件。在这种情况下，该类只能通过外部接口（如协议或抽象类）访问，但类的内部细节永远不可访问。\n\
    \n让我们看看如何实现这样一个不可继承的类。首先，考虑类 `ConcreteMatrix`。它有很多用于存储矩阵的数据，以及诸如维度、最大条目和其他实用方法等特殊细节。\n\
    \n```objc\n@interface ConcreteMatrix2 : NSObject\n{\n    double *contents;\n \
    \   int size;\n    // other ivars here\n}\n- (void) initializeMatrix:(double *)vector\
    \ size:(int)size;\n- (void) performMatrixOperation;\n// other methods here\n@end\n\
    ```\n\n尽管这是一个通用类，应该可供整个应用程序使用，但该类的内部耦合非常紧密，以至于很难创建正确的子类。要做到这一点，程序员需要了解类的内部详细信息，例如使用的实例变量以及它们何时应该更新等。因此，虽然你希望尽可能广泛地使该类可用，但你并不打算允许它的子类。\n\
    \n解决方案是避免提供对该类的任何直接访问。然而，你仍然希望功能对客户端可访问。因此，你创建一个类，为想要隐藏的对象提供合适的接口。这个外部对象对其他部分可见，但它除了指向实际实现功能的对象的引用外，不包含其他任何东西。\n\
    \n```objc\n// file AbstractMatrix.h\n@interface AbstractMatrix : NSObject\n- (void)\
    \ initializeMatrix:(double *)vector size:(int)size;\n- (void) performMatrixOperation;\n\
    + (AbstractMatrix*) getMatrix;\n@end\n```\n\n现在，无需了解类内部的任何信息即可使用此版本。请注意，你移除了所有内部数据存储，并添加了一个返回\
    \ `AbstractMatrix` 类型新对象的类方法。作为创建抽象类的副作用，你现在需要一个像 `getMatrix` 这样的方法来返回一个新的矩阵对象。这是必要的，因为\
    \ `AbstractMatrix` 本身无法被实例化，因为它缺少某些方法的实现。\n\n另一方面，原始的具体类可以隐藏在实现文件中。然而，它仍然需要继承自抽象类，以便提供相同的接口。\n\
    \n```objc\n@interface ConcreteMatrix : AbstractMatrix\n{\n    double *contents;\n\
    \    int size;\n    // other ivars\n}\n- (void) initializeMatrix:(double *)vector\
    \ size:(int)size;\n- (void) performMatrixOperation;\n// other methods here\n@end\n\
    ```\n\n方法 `getMatrix` 将负责创建一个 `ConcreteMatrix` 并将其返回给用户。\n\n```objc\n@implementation\
    \ AbstractMatrix\n+ (AbstractMatrix*) getMatrix\n{\n    return [[ConcreteMatrix\
    \ alloc] init];\n}\n// other implementation methods here\n@end\n```\n\n现在，一个类可以使用诸如\
    \ `[AbstractMatrix getMatrix]` 这样的代码来创建 `ConcreteMatrix`。`AbstractMatrix` 接口上列出的所有功能对他们都可用，尽管他们无法访问\
    \ `ConcreteMatrix` 的内部。\n\n> **注意**\n> \n> 此示例使用的机制与类簇采用的机制类似，尽管这里的目标只是保护提供具体实现的单个类，而不是提供一组符合相同抽象接口的类。"
  raw: 'Another example of a class cluster can be seen in the collection classes,
    such as `NSArray`. The object returned when you call `init` implements the interface
    of `NSArray`, but may be from different subclass in the cluster, including `NSMutableArray`;
    it all depends on how the `NSArray` constructor performs the object initialization
    tasks. As you will see later, class clusters are one example of a general strategy
    to hide implementation specific information from other clients occurring in a
    library or in a big application.


    ## Preventing Subclassing


    Finally, despite the many advantages of subclassing that have been discussed in
    this chapter, there are also legitimate problems that can result from its incorrect
    use. Therefore, in some cases it may be necessary to avoid inheritance from occurring
    for a few specific classes; in other words, you may want to prevent a class from
    becoming the basis for another class.


    Note


    One of the major drawbacks of inheritance is what is known now as fragile base
    classes. When creating a class hierarchy, classes will frequently use implementation
    information provided by parent classes. However, there is no such a thing as perfect
    design, and changes to a base class may eventually be necessary. Such changes
    may cause subclasses that rely on those internal details to stop working. A good
    hierarchy design should try to minimize this possibility.


    Some languages provide direct support for this feature, by marking a specific
    class as immutable from the point of view of inheritance. For example, in Java
    it is possible to identify a class with the `final` keyword, so that developers
    are not allowed to inherit from it after this syntactic annotation has been applied.
    Among newer languages, C# also allows this type of distinction between classes.


    Objective-C designers decided not to add a mechanism to avoid inheritance. This
    choice was probably made to maintain the simplicity of the language, and perhaps
    because this is a feature that is not very frequently used. However, even though
    there is no direct support in the form of a `final` keyword as in Java, it is
    still possible to take a few measures to prevent a class from being subclassed.


    The general strategy you can use involves reducing the visibility of a class.
    The principle here is that you cannot subclass a class that exists somewhere in
    the application but that cannot be seen at compile time by clients. So, for example,
    you can create a class but never provide a header file for it. In that case, the
    class would be accessible only through an external interface (such as a protocol
    or an abstract class), but the internal details of the class would never be accessible.


    Let’s see how you could implement such a non-inheritable class. First, consider
    the class `ConcreteMatrix`. It has a lot of data used to store a matrix, as well
    as special details such as dimensions, the largest entry, and other utility methods.


    `@interface ConcreteMatrix2 : NSObject`


    `{`


    `double *contents;`


    `int size;`


    `// other ivars here`


    `}`


    `- (void) initializeMatrix:(double *)vector size:(int)size;`


    `- (void) performMatrixOperation;`


    `// other methods here`


    `@end`


    Although this is a general-purpose class that should be available for the whole
    application, the internals of the class are so tightly coupled that it would be
    really hard to crate a correct subclass. To do this, a programmer would need detailed
    information about the internals of the class, such as the instance variables used
    and when they should be updated, for example. So, while you want to make the class
    available as widely as possible, you don’t intend to allow subclasses of it.


    The solution is to avoid providing any direct access to the class. However, you
    still want the functionality to become accessible to clients. So, you create a
    class that provides a suitable interface to the object you want to hide. This
    external object is visible to others, but it has nothing other than a reference
    to the object that really implements the functionality.


    `// file AbstractMatrix.h`


    `@interface AbstractMatrix : NSObject`


    `- (void) initializeMatrix:(double *)vector size:(int)size;`


    `- (void) performMatrixOperation;`


    `+ (AbstractMatrix*) getMatrix;`


    `@end`


    This version can now be used without any information about the internals of the
    class. Notice that you removed all internal data storage, and added a class method
    that returns a new object of type `AbstractMatrix`. As a side effect of making
    an abstract class, you now need a method such as `getMatrix` to return a new matrix
    object. This is necessary because `AbstractMatrix` can’t be instantiated itself,
    since it is missing the implementation of some of its methods.


    On the other hand, the original concrete class can remain hidden in an implementation
    file. However, it still needs to inherit from the abstract class so that it can
    provide the same interface.


    `@interface ConcreteMatrix : AbstractMatrix`


    `{`


    `double *contents;`


    `int size;`


    `// other ivars`


    `}`


    `- (void) initializeMatrix:(double *)vector size:(int)size;`


    `- (void) performMatrixOperation;`


    `// other methods here`


    `@end`


    The method `getMatrix` will be responsible for creating a `ConcreteMatrix` and
    returning it to users.


    `@implementation AbstractMatrix`


    `+ (AbstractMatrix*) getMatrix`


    `{`


    `return [[ConcreteMatrix alloc] init];`


    `}`


    `// other implementation methods here`


    `@end`


    A class can now create a `ConcreteMatrix` using code such as `[AbstractMatrix
    getMatrix]`. All the functionality listed on the `AbstractMatrix` interface will
    be available to them, even though they have no way to access the internals of
    `ConcreteMatrix`.


    Note


    This example uses a mechanism similar to the one employed by a class cluster,
    although here the goal is just to protect the single class that provides the concrete
    implementation, instead of offering an array of classes conforming to the same
    abstract interface.'
  trans: "\n# 类簇的另一个示例\n\n另一个类簇的示例可以在集合类中看到，例如 `NSArray`。当你调用 `init` 时返回的对象实现了 `NSArray`\
    \ 的接口，但它可能来自簇中的不同子类，包括 `NSMutableArray`；这完全取决于 `NSArray` 构造器如何执行对象初始化任务。如你稍后将看到的，类簇是一种通用策略的示例，用于在库或大型应用程序中向其他客户端隐藏实现细节信息。\n\
    \n## 防止子类化\n\n最后，尽管本章讨论的子类化有许多优点，但其错误使用也可能导致合理的问题。因此，在某些情况下，可能有必要阻止对少数特定类进行继承；换句话说，你可能希望阻止一个类成为另一个类的基类。\n\
    \n> **注意**\n> \n> 继承的主要缺点之一就是现在所谓的脆弱基类问题。在创建类层次结构时，类通常会使用父类提供的实现信息。然而，不存在所谓完美的设计，对基类的修改最终可能是必要的。这种修改可能会导致依赖这些内部细节的子类停止工作。一个好的层次结构设计应尽量减小这种可能性。\n\
    \n某些语言通过从继承的角度将特定类标记为不可变来直接支持此特性。例如，在 Java 中，可以使用 `final` 关键字标识一个类，这样在应用此语法注解后，开发人员就不允许继承它。在较新的语言中，C#\
    \ 也允许这种类之间的区分。\n\nObjective-C 的设计者决定不添加避免继承的机制。这个选择很可能是为了保持语言的简洁性，或许也因为这个特性并不常用。然而，即使没有像\
    \ Java 中的 `final` 关键字那样的直接支持，仍然可以采取一些措施来防止一个类被子类化。\n\n你可以使用的通用策略涉及降低类的可见性。这里的原理是，你不能子类化一个存在于应用程序中但客户端在编译时无法看到的类。因此，例如，你可以创建一个类，但从不为其提供头文件。在这种情况下，该类只能通过外部接口（如协议或抽象类）访问，但类的内部细节永远不可访问。\n\
    \n让我们看看如何实现这样一个不可继承的类。首先，考虑类 `ConcreteMatrix`。它有很多用于存储矩阵的数据，以及诸如维度、最大条目和其他实用方法等特殊细节。\n\
    \n```objc\n@interface ConcreteMatrix2 : NSObject\n{\n    double *contents;\n \
    \   int size;\n    // other ivars here\n}\n- (void) initializeMatrix:(double *)vector\
    \ size:(int)size;\n- (void) performMatrixOperation;\n// other methods here\n@end\n\
    ```\n\n尽管这是一个通用类，应该可供整个应用程序使用，但该类的内部耦合非常紧密，以至于很难创建正确的子类。要做到这一点，程序员需要了解类的内部详细信息，例如使用的实例变量以及它们何时应该更新等。因此，虽然你希望尽可能广泛地使该类可用，但你并不打算允许它的子类。\n\
    \n解决方案是避免提供对该类的任何直接访问。然而，你仍然希望功能对客户端可访问。因此，你创建一个类，为想要隐藏的对象提供合适的接口。这个外部对象对其他部分可见，但它除了指向实际实现功能的对象的引用外，不包含其他任何东西。\n\
    \n```objc\n// file AbstractMatrix.h\n@interface AbstractMatrix : NSObject\n- (void)\
    \ initializeMatrix:(double *)vector size:(int)size;\n- (void) performMatrixOperation;\n\
    + (AbstractMatrix*) getMatrix;\n@end\n```\n\n现在，无需了解类内部的任何信息即可使用此版本。请注意，你移除了所有内部数据存储，并添加了一个返回\
    \ `AbstractMatrix` 类型新对象的类方法。作为创建抽象类的副作用，你现在需要一个像 `getMatrix` 这样的方法来返回一个新的矩阵对象。这是必要的，因为\
    \ `AbstractMatrix` 本身无法被实例化，因为它缺少某些方法的实现。\n\n另一方面，原始的具体类可以隐藏在实现文件中。然而，它仍然需要继承自抽象类，以便提供相同的接口。\n\
    \n```objc\n@interface ConcreteMatrix : AbstractMatrix\n{\n    double *contents;\n\
    \    int size;\n    // other ivars\n}\n- (void) initializeMatrix:(double *)vector\
    \ size:(int)size;\n- (void) performMatrixOperation;\n// other methods here\n@end\n\
    ```\n\n方法 `getMatrix` 将负责创建一个 `ConcreteMatrix` 并将其返回给用户。\n\n```objc\n@implementation\
    \ AbstractMatrix\n+ (AbstractMatrix*) getMatrix\n{\n    return [[ConcreteMatrix\
    \ alloc] init];\n}\n// other implementation methods here\n@end\n```\n\n现在，一个类可以使用诸如\
    \ `[AbstractMatrix getMatrix]` 这样的代码来创建 `ConcreteMatrix`。`AbstractMatrix` 接口上列出的所有功能对他们都可用，尽管他们无法访问\
    \ `ConcreteMatrix` 的内部。\n\n> **注意**\n> \n> 此示例使用的机制与类簇采用的机制类似，尽管这里的目标只是保护提供具体实现的单个类，而不是提供一组符合相同抽象接口的类。\n"
- fmt: "# Multiple Inheritance\n\nWhat you have seen in the previous sections covers\
    \ what is called single inheritance, a type of subclassing where the new class\
    \ can have only one parent. Objective-C, as well as other OO languages such as\
    \ Java and Smalltalk, provides support for single inheritance only. Other languages,\
    \ such as C++, are able to derive new classes from multiple parent classes. Multiple\
    \ inheritance is the name given to this style of subclassing.\n\nSince only one\
    \ superclass is allowed when a new class is created under single inheritance,\
    \ the resulting hierarchy looks like a tree-shaped structure where the initial\
    \ base class is at the root of the tree. With multiple inheritance languages,\
    \ however, the hierarchy looks much more like a network of connections with classes\
    \ that can get data and method implementations from two or more sources.\n\nIn\
    \ Objective-C, it is not possible to create such a network of inheritance connections.\
    \ One of the reasons is to avoid the overhead that might affect dynamic message\
    \ dispatching. Just consider that, instead of looking for method implementations\
    \ in a single class tree, it would be necessary to look for methods in several\
    \ unrelated ancestor classes.\n\nThere are, however, ways of simulating some of\
    \ the conveniences of multiple inheritance. The most common method is to use formal\
    \ protocols to define extra functionality that should be provided by a class.\
    \ For example, suppose that you want to create a class that has two kinds of responsibilities:\
    \ being a vehicle and a place for living. Here is a list of such responsibilities:\n\
    \n```\n// file Vehicle.h\n@interface Vehicle\n- (void) drive;\n@end\n\n// file\
    \ LivingPlace.h\n@interface LivingPlace\n- (void) setAddress:(NSString *)address;\n\
    @end\n```\n\nNow, suppose that you want to define a class representing a boat,\
    \ which happens to be a `Vehicle` as well as a `LivingPlace`. The problem you\
    \ have now is that Objective-C classes can have only one superclass. The first\
    \ thing you need to do is to decide on making either `Vehicle` or `LivingPlace`\
    \ the base class for `Boat`. The other problem is how to add the functionality\
    \ for the second class to your new subclass. I discuss in the next section a potential\
    \ solution for this problem.\n\n## Simulating Multiple Inheritance\n\nOne possible\
    \ solution is to make `LivingPlace` a protocol, instead of a class. In this way,\
    \ `LivingPlace` can have a fixed interface that can be implemented by any number\
    \ of classes, even when they are not related by a single hierarchy. The following\
    \ is a definition for this protocol:\n\n```\n// file LivingPlace.h\n@protocol\
    \ LivingPlace\n- (void) setAddress:(NSString *)address;\n@end\n```\n\nThen `Boat`\
    \ could be defined as a class deriving from vehicle, but also implementing the\
    \ `LivingPlace` protocol.\n\n```\n@interface Boat : Vehicle <LivingPlace>\n{\n\
    \    NSString *_address;\n}\n@end\n\n@implementation Boat\n- (void) setAddress:(NSString\
    \ *)address\n{\n    self->_address = address;\n}\n@end\n```\n\nThis solution will\
    \ answer the issue of using single inheritance, but still doesn’t provide the\
    \ whole functionality of multiple inheritance. After all, the `LivingPlace` protocol\
    \ is just a well-defined interface, without any associated implementation. When\
    \ a class implements that protocol, it has to provide code for the desired functionality.\n\
    \nIf you want to offer not only an interface but also a default implementation,\
    \ a possible solution is to create a concrete implementation class for the protocol,\
    \ which will be used by other classes. A client class can use such a default implementation\
    \ by creating a new instance of the default class and saving it as an instance\
    \ variable for later use.\n\n```\n// DefaultLivingPlace.h\n@interface DefaultLivingPlace\
    \ : NSObject <LivingPlace>\n{\n    NSString *_address;\n}\n@end\n\n// DefaultLivingPlace.m\n\
    @implementation DefaultLivingPlace\n- (void) setAddress:(NSString *)address\n\
    {\n    self->_address = address;\n}\n@end\n```\n\nNow, whenever a class needs\
    \ to implement the `LivingPlace` protocol, it can count on the default implementation\
    \ to provide standard methods.\n\n```\n@interface Boat : Vehicle <LivingPlace>\n\
    {\n    NSString *_address;\n    DefaultLivingPlace *livingPlaceImp;\n}\n@end\n\
    ```\n\nThe methods of the interface still need to be defined in the class. However,\
    \ the implementation can now become just a message call that forwards the message\
    \ to the default implementation.\n\n```\n@implementation Boat\n- (void) setAddress:(NSString\
    \ *)address\n{\n    [self->livingPlaceImp setAddress:address];\n}\n@end\n```\n\
    \n## Inheritance versus Delegation\n\nIn this example, you used an implementation\
    \ member variable instead of inheritance to provide new coding features. This\
    \ is an illustration of the more general opposition between inheritance and composition.\
    \ In the first case, some functionality is made available to an object because\
    \ it was inherited from a base class. In the second case, functionality is provided\
    \ by an external object and made available through an instance variable. While\
    \ inheritance is a richer way of providing functionality, it turns out that composition\
    \ through delegation is more flexible for a few reasons.\n\n- There is no need\
    \ for a deep connection between the two classes: With inheritance, it is possible\
    \ for the subclass to access a lot of details from the superclass, such as protected\
    \ variables and methods that are not made accessible to external clients. This\
    \ generates some problems when things change in the base class. With delegation,\
    \ you don’t need to worry about the connection between the implementation and\
    \ its client, since you can rely on the mechanisms provided by the language to\
    \ avoid undesirable access.\n- A class is free to use containment with as many\
    \ objects as necessary: Thus, a class can receive messages and forward them to\
    \ any appropriate object as needed. With inheritance, however, only one superclass\
    \ can be used.\n\nWhat this means is that you don’t need direct inheritance to\
    \ enjoy some of the benefits of code reuse. On the other hand, delegation provides\
    \ a few extra benefits that may increase the flexibility of your code and even\
    \ make it easier to handle problems that would be typically solved through multiple\
    \ inheritance.\n\n## Summary\n\nIn this chapter you explored class inheritance,\
    \ one of the most important concepts in object-oriented programming. Objective-C\
    \ offers great support for inheritance, and learning to use the possibilities\
    \ will help you design better classes, as well as use the Foundation and other\
    \ frameworks more effectively. You have seen how inheritance helps in avoiding\
    \ code duplication, by assembling useful methods in base classes and reusing them\
    \ later through the subclassing mechanism.\n\nInheritance also gives rise to some\
    \ patterns that are frequently used in Objective-C. For example, you have seen\
    \ how clusters allow programmers to hide concrete classes under a single façade,\
    \ defined by an abstract class. This technique is frequently used in classes from\
    \ the Foundation framework, including `NSNumber` and `NSArray`.\n\nThere are also\
    \ moments when you would like to disallow the creation of new classes from one\
    \ of your base classes. This can be done to avoid unnecessary coupling between\
    \ your methods and third party code. Preventing the creation of subclasses can\
    \ be done by the application of some strategies reviewed in this chapter, such\
    \ as using delegates that comply with a well-defined protocol.\n\nIn the next\
    \ chapter, you will explore the block syntax, a unique feature in Objective-C\
    \ that allows your code to refer directly to arbitrary blocks of code. With blocks,\
    \ you can simplify some operations that would otherwise require lots of boilerplate\
    \ code, while using an elegant method for transferring code."
  raw: '## Multiple Inheritance


    What you have seen in the previous sections covers what is called single inheritance,
    a type of subclassing where the new class can have only one parent. Objective-C,
    as well as other OO languages such as Java and Smalltalk, provides support for
    single inheritance only. Other languages, such as C++, are able to derive new
    classes from multiple parent classes. Multiple inheritance is the name given to
    this style of subclassing.


    Since only one superclass is allowed when a new class is created under single
    inheritance, the resulting hierarchy looks like a tree-shaped structure where
    the initial base class is at the root of the tree. With multiple inheritance languages,
    however, the hierarchy looks much more like a network of connections with classes
    that can get data and method implementations from two or more sources.


    In Objective-C, it is not possible to create such a network of inheritance connections.
    One of the reasons is to avoid the overhead that might affect dynamic message
    dispatching. Just consider that, instead of looking for method implementations
    in a single class tree, it would be necessary to look for methods in several unrelated
    ancestor classes.


    There are, however, ways of simulating some of the conveniences of multiple inheritance.
    The most common method is to use formal protocols to define extra functionality
    that should be provided by a class. For example, suppose that you want to create
    a class that has two kinds of responsibilities: being a vehicle and a place for
    living. Here is a list of such responsibilities:


    `// file Vehicle.h`


    `@interface Vehicle`


    `- (void) drive;`


    `@end`


    `// file LivingPlace.h`


    `@interface LivingPlace`


    `- (void) setAddress:(NSString *)address;`


    `@end`


    Now, suppose that you want to define a class representing a boat, which happens
    to be a `Vehicle` as well as a `LivingPlace`. The problem you have now is that
    Objective-C classes can have only one superclass. The first thing you need to
    do is to decide on making either `Vehicle` or `LivingPlace` the base class for
    `Boat`. The other problem is how to add the functionality for the second class
    to your new subclass. I discuss in the next section a potential solution for this
    problem.


    ### Simulating Multiple Inheritance


    One possible solution is to make `LivingPlace` a protocol, instead of a class.
    In this way, `LivingPlace` can have a fixed interface that can be implemented
    by any number of classes, even when they are not related by a single hierarchy.
    The following is a definition for this protocol:


    `// file LivingPlace.h`


    `@protocol LivingPlace`


    `- (void) setAddress:(NSString *)address;`


    `@end`


    Then `Boat` could be defined as a class deriving from vehicle, but also implementing
    the `LivingPlace` protocol.


    `@interface Boat : Vehicle <LivingPlace>`


    `{`


           `NSString *_address;`


    `}`


    `@end`


    `@implementation Boat`


    `- (void) setAddress:(NSString *)address`


    `{`


           `self->_address = address;`


    `}`


    `@end`


    This solution will answer the issue of using single inheritance, but still doesn’t
    provide the whole functionality of multiple inheritance. After all, the `LivingPlace`
    protocol is just a well-defined interface, without any associated implementation.
    When a class implements that protocol, it has to provide code for the desired
    functionality.


    If you want to offer not only an interface but also a default implementation,
    a possible solution is to create a concrete implementation class for the protocol,
    which will be used by other classes. A client class can use such a default implementation
    by creating a new instance of the default class and saving it as an instance variable
    for later use.


    `// DefaultLivingPlace.h`


    `@interface DefaultLivingPlace : NSObject <LivingPlace>`


    `{`


           `NSString *_address;`


    `}`


    `@end`


    `// DefaultLivingPlace.m`


    `@implementation DefaultLivingPlace`


    `- (void) setAddress:(NSString *)address`


    `{`


           `self->_address = address;`


    `}`


    `@end`


    Now, whenever a class needs to implement the `LivingPlace` protocol, it can count
    on the default implementation to provide standard methods.


    `@interface Boat : Vehicle <LivingPlace>`


    `{`


           `NSString *_address;`


            `DefaultLivingPlace *livingPlaceImp;`


    `}`


    `@end`


    The methods of the interface still need to be defined in the class. However, the
    implementation can now become just a message call that forwards the message to
    the default implementation.


    `@implementation Boat`


    `- (void) setAddress:(NSString *)address`


    `{`


           `[self->livingPlaceImp setAddress:address];`


    `}`


    `@end`


    ### Inheritance versus Delegation


    In this example, you used an implementation member variable instead of inheritance
    to provide new coding features. This is an illustration of the more general opposition
    between inheritance and composition. In the first case, some functionality is
    made available to an object because it was inherited from a base class. In the
    second case, functionality is provided by an external object and made available
    through an instance variable. While inheritance is a richer way of providing functionality,
    it turns out that composition through delegation is more flexible for a few reasons.


    *   There is no need for a deep connection between the two classes: With inheritance,
    it is possible for the subclass to access a lot of details from the superclass,
    such as protected variables and methods that are not made accessible to external
    clients. This generates some problems when things change in the base class. With
    delegation, you don’t need to worry about the connection between the implementation
    and its client, since you can rely on the mechanisms provided by the language
    to avoid undesirable access.

    *   A class is free to use containment with as many objects as necessary: Thus,
    a class can receive messages and forward them to any appropriate object as needed.
    With inheritance, however, only one superclass can be used.


    What this means is that you don’t need direct inheritance to enjoy some of the
    benefits of code reuse. On the other hand, delegation provides a few extra benefits
    that may increase the flexibility of your code and even make it easier to handle
    problems that would be typically solved through multiple inheritance.


    ## Summary


    In this chapter you explored class inheritance, one of the most important concepts
    in object-oriented programming. Objective-C offers great support for inheritance,
    and learning to use the possibilities will help you design better classes, as
    well as use the Foundation and other frameworks more effectively. You have seen
    how inheritance helps in avoiding code duplication, by assembling useful methods
    in base classes and reusing them later through the subclassing mechanism.


    Inheritance also gives rise to some patterns that are frequently used in Objective-C.
    For example, you have seen how clusters allow programmers to hide concrete classes
    under a single façade, defined by an abstract class. This technique is frequently
    used in classes from the Foundation framework, including `NSNumber` and `NSArray`.


    There are also moments when you would like to disallow the creation of new classes
    from one of your base classes. This can be done to avoid unnecessary coupling
    between your methods and third party code. Preventing the creation of subclasses
    can be done by the application of some strategies reviewed in this chapter, such
    as using delegates that comply with a well-defined protocol.


    In the next chapter, you will explore the block syntax, a unique feature in Objective-C
    that allows your code to refer directly to arbitrary blocks of code. With blocks,
    you can simplify some operations that would otherwise require lots of boilerplate
    code, while using an elegant method for transferring code.'
  trans: "\n# 多重继承\n\n在前几节中，你接触到的概念被称为单继承，这是一种子类化方式，即新类只能有一个父类。Objective-C 以及 Java\
    \ 和 Smalltalk 等其他面向对象语言仅支持单继承。而 C++ 等其他语言则可以从多个父类派生出新类。这种子类化方式被称为多重继承。\n\n由于在单继承下创建新类时只允许有一个超类，因此生成的层级结构呈树形，初始基类位于树的根部。然而，在使用多重继承的语言中，层级结构更像一个由类构成的连接网络，这些类可以从两个或更多来源获取数据和方法实现。\n\
    \n在 Objective-C 中，无法创建这样的继承连接网络。原因之一是避免可能影响动态消息派发的开销。试想一下，查找方法实现时，不再需要只在单个类树中查找，而是要在多个不相关的祖先类中查找。\n\
    \n不过，有一些方法可以模拟多重继承的某些便利性。最常用的方法是使用形式化协议来定义类应提供的额外功能。例如，假设你想创建一个具有两种职责的类：既是一辆交通工具，又是一个居住场所。以下是这些职责的列表：\n\
    \n```\n// 文件 Vehicle.h\n@interface Vehicle\n- (void) drive;\n@end\n\n// 文件 LivingPlace.h\n\
    @interface LivingPlace\n- (void) setAddress:(NSString *)address;\n@end\n```\n\n\
    现在，假设你想定义一个代表船的类，它既是一个`Vehicle`，也是一个`LivingPlace`。你目前面临的问题是 Objective-C 类只能有一个超类。你需要做的第一件事是决定将`Vehicle`还是`LivingPlace`作为`Boat`的基类。另一个问题是如何将第二个类的功能添加到你的新子类中。我将在下一节讨论这个问题的潜在解决方案。\n\
    \n## 模拟多重继承\n\n一种可能的解决方案是将`LivingPlace`设为一个协议，而不是一个类。这样一来，`LivingPlace`可以拥有一个固定的接口，该接口可由任意数量的类实现，即使它们不处于单一层级结构中。以下是该协议的定义：\n\
    \n```\n// 文件 LivingPlace.h\n@protocol LivingPlace\n- (void) setAddress:(NSString\
    \ *)address;\n@end\n```\n\n然后，`Boat`可以定义为派生自`Vehicle`的类，同时实现`LivingPlace`协议。\n\
    \n```\n@interface Boat : Vehicle <LivingPlace>\n{\n    NSString *_address;\n}\n\
    @end\n\n@implementation Boat\n- (void) setAddress:(NSString *)address\n{\n   \
    \ self->_address = address;\n}\n@end\n```\n\n这个解决方案将解决使用单继承时的问题，但仍然无法提供多重继承的全部功能。毕竟，`LivingPlace`协议只是一个定义良好的接口，没有任何关联的实现。当一个类实现该协议时，它必须为目标功能提供代码。\n\
    \n如果你不仅想提供接口，还想提供默认实现，一个可行的解决方案是为该协议创建一个具体的实现类，供其他类使用。客户端类可以通过创建该默认类的新实例并将其保存为实例变量供后续使用，从而利用这种默认实现。\n\
    \n```\n// DefaultLivingPlace.h\n@interface DefaultLivingPlace : NSObject <LivingPlace>\n\
    {\n    NSString *_address;\n}\n@end\n\n// DefaultLivingPlace.m\n@implementation\
    \ DefaultLivingPlace\n- (void) setAddress:(NSString *)address\n{\n    self->_address\
    \ = address;\n}\n@end\n```\n\n现在，每当某个类需要实现`LivingPlace`协议时，它都可以依赖默认实现来提供标准方法。\n\
    \n```\n@interface Boat : Vehicle <LivingPlace>\n{\n    NSString *_address;\n \
    \   DefaultLivingPlace *livingPlaceImp;\n}\n@end\n```\n\n接口的方法仍然需要在类中定义。然而，现在的实现可以简化为一个消息调用，将该消息转发给默认实现。\n\
    \n```\n@implementation Boat\n- (void) setAddress:(NSString *)address\n{\n    [self->livingPlaceImp\
    \ setAddress:address];\n}\n@end\n```\n\n## 继承与委托\n\n在这个例子中，你使用了实现成员变量，而非继承，来提供新的编码特性。这展示了继承与组合之间更普遍的对立关系。在第一种情况下，对象之所以能获得某些功能，是因为它从基类继承了这些功能。在第二种情况下，功能由外部对象提供，并通过实例变量来访问。虽然继承是提供功能的一种更丰富的方式，但事实证明，通过委托进行组合在某些方面更灵活，原因如下：\n\
    \n- 两个类之间无需深层关联：使用继承时，子类可以访问超类的许多细节，例如受保护的变量和方法，这些对外部客户类是不可访问的。当基类发生变化时，这会产生一些问题。使用委托时，你无需担心实现类与其客户类之间的关联，因为你可以依赖语言提供的机制来避免不必要的访问。\n\
    - 一个类可以自由地根据需要包含任意数量的对象：因此，一个类可以接收消息，并根据需要将其转发给任何合适的对象。然而，使用继承时，只能有一个超类。\n\n这意味着你不需要直接继承也能享受代码复用的好处。另一方面，委托提供了一些额外的好处，可能会提高代码的灵活性，甚至更容易处理那些通常需要通过多重继承解决的问题。\n\
    \n## 总结\n\n在本章中，你探讨了类继承，这是面向对象编程中最重要的概念之一。Objective-C 为继承提供了出色的支持，学会运用这些可能性将帮助你设计更好的类，同时更有效地使用\
    \ Foundation 及其他框架。你已经了解了继承如何通过将实用方法组装到基类中，并在后续通过子类化机制复用它们来帮助避免代码重复。\n\n继承还催生了一些\
    \ Objective-C 中常用的模式。例如，你已经了解了类簇如何允许程序员将具体类隐藏在一个由抽象类定义的统一外观之下。Foundation 框架中的类（包括`NSNumber`和`NSArray`）经常使用这种技术。\n\
    \n在某些情况下，你可能不希望从你的基类中创建新类。这样做可以避免你的方法与第三方代码之间的不必要耦合。通过应用本章中回顾的一些策略，例如使用符合明确定义协议的委托，可以阻止子类的创建。\n\
    \n在下一章中，你将探索块语法，这是 Objective-C 的一个独特特性，允许你的代码直接引用任意代码块。使用块，你可以简化一些原本需要大量样板代码的操作，同时使用一种优雅的方法来传递代码。\n"
- fmt: "# 6. Blocks\n\n## Abstract\n\nObjective-C 的总体目标之一是通过使用面向对象概念来减少编写复杂应用程序所需的工作量，这有助于简化和阐明编程实体之间的关系。在本章中，你将学习如何创建和使用`blocks`，这是一种使语言更易于使用且更具表现力的语法特性。\n\
    \n`block`是一段可以在应用程序其他部分传递的代码，无需创建单独的函数、方法或类。此外，`block`不仅保留了包含在其中的代码信息，还保留了创建`block`时作用域内的变量信息。这样，`block`就类似于闭包的概念，这在其他编程语言（如`Python`和`Ruby`）中是可用的。在`Java`中，类似的功能将由匿名类提供，而在`C++`中则由`lambda`函数提供。\n\
    \n通过定义`blocks`，你可以使某些算法的操作更具扩展性，因为客户端现在可以通过`block`参数提供实现的关键部分。由于这些特性，`blocks`在`Objective-C`程序中有广泛的适用性。例如，你也可以使用`blocks`实现能在并行线程中无缝运行的多处理代码，正如目前一些`Objective-C`库所实现的那样。\n\
    \n在本章中，你首先将学习`blocks`的基本概念。然后，你将了解更多关于从`block`内部访问变量的信息，包括局部变量和实例变量。接着，我将讨论影响`blocks`内存分配的问题，以及在创建它们的上下文之外访问它们的问题。最后，你将看到一些在你的应用程序中以及`Foundation`框架的类中使用`blocks`的示例。\n\
    \n## 介绍 Blocks\n\n`block`是一组可以由程序操作指令。例如，`block`可以保存在变量中，并在需要时执行。`block`表面上可以比作函数指针，因为两者都提供了存储和执行代码的机制。然而，这两个概念之间有一些重要的区别。\n\
    \n`blocks`和函数指针之间的第一个区别是，`block`字面量可以在任何可执行语句出现的位置声明。因此，例如，`block`可以在函数中间声明，或者作为方法调用的一部分。这对于函数来说是不可能的，因为它们不能嵌套：根据`C`语言的规则，函数只能在实现文件的顶层声明。\n\
    \n`blocks`和函数指针之间的第二个区别也是使用`blocks`的最大优势之一。`block`可以捕获定义它的上下文中活动的任何变量的值和地址。例如，`block`可以使用在方法中声明的局部变量，即使在原始方法本身的执行完成之后也是如此。这个属性也是闭包的定义属性之一，闭包是一种在函数式语言中效果显著的编程结构。\n\
    \n`blocks`的这些特性允许创建一些有趣的算法，否则很难用同样的简洁性来复制。例如，`blocks`可以用来模拟对复杂数据类型（如`for`循环）的控制结构的使用。它们也可以用来为排序过程提供替代代码，你将在本章后面看到。\n\
    \n## 声明 Blocks\n\n`blocks`可以存储在变量中。要声明一个`block`变量，你需要使用类似于声明函数指针的表示法。但是，你使用`^`字符而不是星号来标记它的定义。这是一个将在下一段中解释的简单示例：\n\
    \n```\n- (void) simpleBlock\n{\n    int (^b)(int); // 声明一个block变量\n    b = ^ int\
    \ (int a) // 创建一个block并将其存储在b中\n    {\n        return a + 1;\n    };\n}\n```\n\
    \n要使用`block`作为变量或方法声明的一部分，首先需要声明你感兴趣使用的`block`类型。如前所述，`blocks`与函数指针相关，因为它们都提供了引用可执行代码段的方法。因此，它们使用类似的声明风格是很自然的。然而，`blocks`有一些语法上的细微差别，你将在下面看到。\n\
    \n要声明一个变量持有`block`，你需要使用插入符表示法。在这种表示法中，变量的名称出现在`^`字符之后并在括号内，位于通常函数名称出现的位置。例如，要声明一个接收两个整数并返回`double`的`block`，你将使用以下声明：\n\
    \n```\n- (void) divisionBlock\n{\n    double (^division)(int, int); // 声明一个block\n\
    \    // 在此处使用block...\n}\n```\n\n在定义了`block`变量之后，下一步逻辑是设置其值以持有一个新的`block`。你可以使用`block`字面量来完成，语法如下所示：\n\
    \n```\n- (void) divisionBlock\n{\n    double (^division)(int, double); // 声明一个block\n\
    \    division = ^ double (int a, double b) // 将block保存到变量中\n    {\n        return\
    \ a / b;\n    };\n}\n```\n\n在这里，你将`division`变量的值设置为持有插入符后面的`block`。注意，`block`的定义方式也与函数的实现方式非常相似，不同之处在于其定义可以直接出现在将要使用它的位置，就像其他字面值一样。\n\
    \n虽然上述表示法与函数定义差别不大，但`block`语法提供了一些简化，可以大大减少你在这些情况下需要编写的代码量。例如，如果某些定义元素从上下文中变得清晰，则可以省略它们。第一个可以省略的是返回类型，因为编译器可以从返回值本身获取该信息。\n\
    \n```\n- (void) divisionBlock\n{\n    double (^division)(int, double);\n    division\
    \ = ^ (int a, double b)\n    {\n        return a / b;\n    };\n}\n```\n\n其次，如果参数列表为空，则可以省略参数列表。也就是说，如果没有参数传递给`block`，则不需要额外的括号。这是一个示例：\n\
    \n```\n- (void) getPI\n{\n    double (^f)(); // 声明一个新的block\n    f = ^ {\n   \
    \     return 3.14;\n    };\n}\n```\n\n这段代码定义了一个新的`block`变量`f`，然后向其分配一个返回代表数学常数\
    \ Pi 的字面数字的`block`。\n\n要调用由`block`定义的代码，可以使用与函数相同的方式来使用`block`变量的名称。\n\n```\n\
    - (void) divisionBlock\n{\n    double (^division)(int, double); // 声明一个block\n\
    \    division = ^ (int a, double b) // 将block保存到变量中\n    {\n        return a /\
    \ b;\n    };\n    double result = division(1, 2);\n    NSLog(@\"the result is\
    \ %lf\", result); // 将会打印 0.5\n}\n```"
  raw: '# 6. Blocks


    Abstract


    One of the overall goals of Objective-C is to reduce the effort necessary to program
    complex applications through the use of object-oriented concepts, which can help
    to simplify and clarify the relationship between programming entities. In this
    chapter, you will learn how to create and use blocks, a syntactical feature that
    makes the language much easier and more expressive.


    One of the overall goals of Objective-C is to reduce the effort necessary to program
    complex applications through the use of object-oriented concepts, which can help
    to simplify and clarify the relationship between programming entities. In this
    chapter, you will learn how to create and use blocks, a syntactical feature that
    makes the language much easier and more expressive.


    A block is a piece of code that can be passed around to other parts of the application,
    without the need to create a separate function, method, or class. Moreover, a
    block not only retains information about the code contained in it, but also about
    the variables that were in scope right at the time that the block was created.
    In this way, blocks are similar to the concept of closures, which are available
    in other programming languages such as Python and Ruby. In Java, the similar functionality
    would be provided by anonymous classes, and in C++ by lambda functions.


    By defining blocks, you can make the operation of certain algorithms more extensible,
    as clients are now able to provide key parts of the implementation in the form
    of block parameters. Because of these features, blocks have wide applicability
    in Objective-C programs. For example, you can also use blocks to implement multi-processing
    code that will seamlessly run in parallel threads, as currently accomplished by
    some Objective-C libraries.


    In this chapter, you will first learn about the basic concepts of blocks. Then,
    you will get more information about accessing variables from inside blocks, including
    local and instance variables. I will then discuss the issues influencing the memory
    allocation of blocks as well as accessing them outside the context in which they
    were created. Finally, you will see a few examples of using blocks both in your
    own applications and in classes of the Foundation framework.


    ## Introducing Blocks


    A block is a set of instructions that can be manipulated by the program. For example,
    a block can be saved in a variable and executed when needed. A block can superficially
    be compared to a pointer to a function, in that both provide a mechanism to store
    and execute code. However, there are some important differences between these
    two concepts.


    The first difference between blocks and function pointers is that a block literal
    can be declared in any place that an executable statement may be present. So,
    for example, a block can be declared right in the middle of a function, or as
    part of a method call. This is not possible with functions, because they cannot
    be nested: according to the rules of the C language, functions can only be declared
    at the top level of an implementation file.


    The second difference between blocks and function pointers is also one of the
    biggest advantages of using blocks. A block can capture the values and addresses
    of any variable that is active in the context where it is defined. For example,
    a block may use a local variable declared in a method, even after the execution
    of original method itself has finished. This property is also one of the defining
    properties of a closure, a programming construct used with great effect in functional
    languages.


    These features of blocks allow for the creation of some interesting algorithms
    that otherwise would be hard to replicate with the same conciseness. For example,
    blocks can be used to simulate the use of control structures, such as a `for`
    loop, over complex data types. They can also be used to provide alternate code
    for sorting procedures, as you will see later in this chapter.


    ## Declaring Blocks


    Blocks can be stored in variables. To declare a block variable you use a notation
    similar the one employed to declare function pointers. Instead of using a star,
    however, you use the `^` character to mark its definition. Here is a simple example
    that will be explained in the next paragraphs:


    `- (void) simpleBlock`


    `{`


            `int (^b)(int); // declare a block variable`


            `b = ^ int (int a) // create a block and store it in b`


            `{`


                    `return a + 1;`


            `};`


    `}`


    To use a block as part of a variable or method declaration, it is first necessary
    to declare the type of block you are interested in using. As hinted previously,
    blocks are related to pointers to functions, since they both provide a means of
    referencing executable sections of code. Therefore, it is natural that they use
    similar declaration styles. Blocks, however, have a few syntactical subtleties,
    as you will see next.


    To declare a variable as holding a block, you need to use the caret notation.
    In this notation, the name of the variable appears after a ^ character and inside
    parenthesis, in the same position that the name of a function would normally appear.
    For example, to declare a block that receives two integers and returns a double,
    you would use the following declaration:


    `- (void) divisionBlock`


    `{`


            `double (^division)(int, int); // declare a block`


            `// use block here...`


    `}`


    After a block variable has been defined, the next logical step is to set its value
    to hold a new block. You can do that using block literals, with the following
    syntax illustrated:


    `- (void) divisionBlock`


    `{`


            `double (^division)(int, double); // declare a block`


            `division = ^ double (int a, double b) // save block on variable`


            `{`


                    `return a / b;`


            `};`


    `}`


    Here, you set the value of the `division` variable to hold the block that comes
    after the caret. Notice that the way the block is defined is also very similar
    to how a function is implemented, with the difference that its definition can
    appear directly on the location where it will be used, just as with other literal
    values.


    While the above notation differs little from a function definition, the block
    syntax offers a number of simplifications, which can substantially reduce the
    amount of code you need to write in these situations. For example, it is possible
    to omit some elements of the definition if they become clear from the context.
    The first thing that can be omitted is the return type, since the compiler can
    get that information from the return value itself.


    `- (void) divisionBlock`


    `{`


            `double (^division)(int, double);`


            `division = ^ (int a, double b)`


            `{`


                    `return a / b;`


            `};`


    `}`


    Second, it is possible to omit the list of parameters in the case that the list
    is empty. That is, there is no need for the extra parenthesis if no argument is
    being passed to the block. Here is an example:


    `- (void) getPI`


    `{`


            `double (^f)(); // declare a new block`


            `f = ^ {`


                    `return 3.14;`


            `};`


    `}`


    This code defines a new block variable `f`, and then assigns to it a block that
    returns a literal number representing the mathematical constant Pi.


    To call the code defined by a block, it is possible to employ the name of the
    block variable in the same way that a function is used.


    `- (void) divisionBlock`


    `{`


            `double (^division)(int, double); // declare a block`


            `division = ^ (int a, double b) // save block on variable`


            `{`


                    `return a / b;`


            `};`


            `double result = division(1, 2);`


            `NSLog(@"the result is %lf", result); // will print 0.5`


    `}`'
