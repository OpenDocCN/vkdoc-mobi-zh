    The `deleteEdge` method, uses the `gr_for_each_edge_dir` function to do the hard
    work of finding an edge (it uses a C function for performance reasons). Once an
    edge has been found, the work is relegated to the `setBezierPaths` method and
    the view is redrawn.


    ```

    // process mouse down event

    - (void)mouseDown:(NSEvent *)theEvent

    {

    NSPoint loc = [self convertPoint:[theEvent locationInWindow] fromView:nil];

    if (_deleteEdgeMode) {

    [self deleteEdge:loc];

    [[NSCursor arrowCursor] set];

    _deleteEdgeMode = 0;

    return;

    }

    _clickedNode = [self findClickedNode:loc];

    if (_clickedNode) printf("node clicked is %d\n", _clickedNode);

    }

    ```


    This method is called when a `mouseDown`: action is sent to the `GraphView`. The
    first thing this method does is to determine the exact location where the event
    happened. This is done with the help of the `locationInWindow` method, which is
    part of the `NSEvent` object. If the view is in delete edge mode, then you request
    the edge to be deleted, and the cursor is set to the normal arrow mode. Otherwise,
    the only thing you do is to print the number of the node that was clicked.


    ```

    - (void)mouseUp:(NSEvent *)theEvent

    {

    NSPoint loc = [self convertPoint:[theEvent locationInWindow] fromView:nil];

    if (_clickedNode) {

    //

    // correct the location using the zoom factor

    loc.x /= _sliderValue;

    loc.y /= _sliderValue;

    //

    // update the location of the node

    gr_set_pos(G, _clickedNode, loc.x, loc.y);

    //

    // change the position of each individual edge

    struct for_each_edge_data data;

    data.movedNode = _clickedNode;

    data.loc = &loc;

    data.G = G;

    data.path = path;

    gr_for_each_adjacent_edge(G, _clickedNode, change_points_associated_to_edges,
    &data);

    //

    // do the same to the superposed graph, if it exists

    if (sG) {

    data.G = sG;

    data.path = sg_path;

    gr_for_each_adjacent_edge(sG, _clickedNode, change_points_associated_to_edges,
    &data);

    }

    //

    // restore original location, and move position of node

    loc.x *= _sliderValue;

    loc.y *= _sliderValue;

    [self moveNode:_clickedNode to:loc];

    }

    ```

