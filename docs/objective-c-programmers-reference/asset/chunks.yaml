  trans: '

    # 内存问题的类型


    在 Objective-C 中，由于其源自 C 语言，程序员需要处理多种内存错误。其中包括以下几种：


    - **悬空指针**：当您指向一个不再有效的对象或内存区域时，就会发生悬空指针。在 C 语言中，这可能是由多种原因造成的，例如访问一个已被释放的指针。在 Objective-C
    中，悬空指针可能由于对象被错误释放而发生。当这种情况发生时，再次访问该变量很可能会导致应用程序崩溃，因为之前存储在那里的所有数据都已被重用。

    - **数组越界访问**：由于在 C 语言中数组和指针是等价的，数组访问可能会导致访问超出已分配区域的指针。这是大多数基于 C 语言的应用中常见的内存错误。然而，Objective-C
    程序员可以通过使用诸如 `NSArray` 之类的集合来代替原生数组，从而避免许多此类问题。尽管 `NSArray` 可能不如原生数组快，但它能提供自动保护，防止此类不当的数组访问。对于性能关键代码，在必要时，始终可以从使用集合转换回使用原生数组。

    - **内存泄漏**：内存泄漏是指程序中的某部分内存变得无法访问，尽管系统尚未将其释放。内存泄漏在 C 语言和 Objective-C 中都可能出现，只是内存释放的机制不同。在
    Objective-C 中，这种情况发生是因为对象的使用者没有在方法结束时（对于局部变量）或者在对象被释放时（对于实例变量）对变量调用 `release`。内存泄漏是一种隐蔽的错误，因为它们不会立即导致崩溃。您感知内存泄漏的方式是内存使用量增加，每次运行有问题的代码时都会发生这种情况。一段时间后，这可能会耗尽应用程序的所有可用内存，导致运行缓慢甚至崩溃。


    # 识别内存 Bug


    程序员应对内存问题的主要工具之一是使用调试应用程序和库。Xcode 拥有大量辅助工具，可用于定位和修复错误。


    我们先考虑内存崩溃。诊断内存崩溃的一个绝佳工具是 Xcode 调试器。使用调试器时，您首先要做的是重现错误，并查看显示崩溃发生位置的堆栈跟踪（参见图 8-1
    中的示例）。一旦找到错误的位置，您就可以在错误发生前的几行代码处添加断点。这样您就能清晰地看到错误发生区域附近的变量及其内容，从而能够确定是什么导致了不正确的行为。


    通过观察正在执行的变量和代码，理解导致崩溃的原因后，您可以制定一个计划来修复有问题的代码。


    ![A978-1-4302-5906-0_8_Fig1_HTML.jpg](img/A978-1-4302-5906-0_8_Fig1_HTML.jpg)


    图 8-1. 使用 Xcode 调试器定位崩溃位置


    Xcode 还提供了一个名为 `NSZombieEnabled` 的强大工具，用于检查对已释放对象的访问。当将此标志传递给在 Xcode 下运行的应用程序时，它会告诉应用程序在释放指针时创建
    `NSZombie` 对象。因此，Objective-C 库不只是简单地释放内存，而是会设置一个 `NSZombie` 类型的对象，这对于诊断已释放对象在释放后仍接收消息的情况非常有用。要设置
    `NSZombieEnabled` 选项，您需要选择菜单选项 Product ➤ Scheme ➤ Edit Scheme，然后点击“参数”选项卡。在“启动时传递的参数”屏幕上，勾选
    `NSZombieEnabled` 的复选框（参见图 8-2）。


    当一个 `NSZombie` 对象收到消息时，它会立即触发 Xcode 调试器显示非法访问发生的位置。僵尸对象的位置也会给您提供关于被释放的原始对象以及是谁调用了它的线索。基于这些信息，您可以更轻松地找出对象被错误释放的原因，并修复有问题的源代码以消除此
    Bug。


    ![A978-1-4302-5906-0_8_Fig2_HTML.jpg](img/A978-1-4302-5906-0_8_Fig2_HTML.jpg)


    图 8-2. 在 Xcode 中设置 `NSZombieEnabled` 选项

