  trans: '

    # 读写二进制数据


    上面的示例展示了如何操作文本文件。在这些情况下，使用 `NSString` 来处理文件内容并进行读写非常容易。然而，大多数应用程序还需要访问二进制格式的文件，例如压缩文件、图像以及其他无法用文本编辑器直接修改的专有格式。


    对于小文件，你可以使用与 `NSString` 相对应的二进制数据处理类：`NSData`。为了简化操作此类二进制文件的过程，Cocoa 为 `NSData`
    启用了类似 `NSString` 的方法，使其能够读写磁盘上的数据。


    读取二进制文件时，需要提供一个用于临时存储数据的缓冲区，以及在数据读取完成后检索数据的途径。`NSData` 默认实现了这一功能，留给程序员的仅剩处理返回数据的任务。


    以下示例展示了其工作原理：你将编写一个类来读取数据，并在日志中打印其部分字节，代码如下：


    ```

    // 文件 ReadBinaryData.h


    @interface ReadBinaryData : NSObject


    - (NSData*)readData:(NSString*)fileName;


    + (void) testRead;


    @end

    ```


    该接口仅包含两个方法：`readData:`，它接受你想要读取的文件名作为参数；以及 `testRead`，一个用于测试 `readData:` 功能的类方法。


    ```

    // 文件 ReadBinaryData.m


    #import "ReadBinaryData.h"


    @implementation ReadBinaryData


    #define MAX_DATA_SIZE 1024


    - (NSData*)readData:(NSString*)fileName


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    NSData *data = [NSData dataWithContentsOfURL:url options:NSDataReadingUncached
    error:&error];


    if (data == nil)


    {


    NSLog(@"读取文件时出错: %@", [error userInfo]);


    }


    else


    {


    int data_size = (int)[data length];


    unichar array[MAX_DATA_SIZE];


    int size = data_size;


    if (data_size > MAX_DATA_SIZE) size = MAX_DATA_SIZE;


    [data getBytes:array length:size];


    NSString *dataStr = [NSString stringWithCharacters:array length:size];


    NSLog(@"数据的首字节为: %@", dataStr);


    }


    return data;


    }


    + (void) testRead


    {


    ReadBinaryData *reader = [[ReadBinaryData alloc] init];


    [reader readData:@"file:///Users/oliveira/testFile"];


    [reader release];


    }


    @end

    ```


    在实现文件的第一部分，你定义了常量 `MAX_DATA_SIZE`，用于确定你想从文件中显示的最大字符数。


    `readData:` 方法创建了一个包含文件名的 `NSURL` 对象，然后将它作为参数传递给 `dataWithContentsOfURL:options:error:`
    方法。该方法的第一个参数是文件 URL，紧接着是一个选项，用于决定文件是否会被缓存或进行内存映射等。最后一个参数 (`error`) 是一个指向 `NSError`
    对象的指针，仅在检测到失败时使用。


    如果 `dataWithContentsOfURL:options:error:` 返回的数据有效，你便可以检索其前一小部分数据并打印到日志窗口。这可以通过
    `getBytes:length:` 方法实现，它是 `NSData` 的一个方法，利用一个辅助内存数组返回存储的字节，数组长度由第二个参数决定。你使用了一个简单的字符数组，并且仅复制了开头几个字符用于测试。在实践中，你需要通过一次或多次迭代来检索
    `NSData` 中存储的所有数据，并对其进行有意义的处理。


    `testRead` 方法用于检验 `ReadBinaryData` 的功能。你创建了一个该类的对象，然后向其发送一条 `readData:` 消息，参数是存储在你的主目录中的一个示例文件的名称。执行后，文件的部分内容应被打印到应用程序日志中。


    `NSData` 也能像 `NSString` 一样将数据写入文件。为避免重复类似的示例，我将直接展示 `writeData:` 方法的内容，该方法使用 `NSData`
    将一个字节数组输出到二进制文件：


    ```

    - (void)writeData:(int*)numbers length:(int)size


    dest:(NSString*)fileName


    {


    NSURL *url = [NSURL URLWithString:fileName];


    NSError *error;


    NSData *data = [NSData dataWithBytes:numbers length:sizeof(int)*size];


    BOOL ok = [data writeToURL:url


    options:NSDataWritingAtomic


    error:&error];


    if (!ok)


    {


    NSLog(@"写入文件时出错: %@", [error userInfo]);


    }


    }

    ```


    这一次，你创建了一个 `NSData` 对象来包含作为参数传递给 `writeData:length:dest:` 方法的整数数组。要存储的数据长度由 `sizeof(int)*size`
    确定，它给出了存储该数组数据所需的字节数。


    下一步是使用 `NSData` 的 `writeToURL:options:error:` 方法将数组写入磁盘。该方法有一个 `options` 参数，可用于决定文件写入磁盘的方式。在本例中，我要求以原子方式写入文件，即所有字节先写入一个临时文件，然后在写入完成后移动到正确位置。如果在执行该方法时发生错误，`error`
    变量将用于存储描述错误信息的消息。


    # 使用 NSStream


    使用 `NSString` 和 `NSData` 操作文件虽然方便，但并非可扩展的解决方案。这些简单类的一个问题是，程序员对 I/O 过程的控制力不足。但这种文件访问模式的最大问题在于，`NSString`
    和 `NSData` 执行的是同步操作：也就是说，应用程序的当前线程必须等待整个文件处理完毕。这对于小文件和简单的应用程序或许可以接受，但当文件体积增大或需要快速响应时，这种方式就无法扩展了。


    因此，在许多情况下，使用 `NSString` 或 `NSData` 进行文件访问变得不切实际。Cocoa 通过 `NSStream` 类及其相关类，提供了一种更好地控制文件操作的方式。`NSStream`
    能更好地控制文件的访问方式，并且能够将工作分割成更小的块，使应用程序能够处理而不产生长时间停顿。


    `NSStream` 有一个通用接口，由 `NSInputStream` 和 `NSOutputStream` 实现。这两个类共享相同的基于委托的文件访问模型。本质上，当使用
    `NSStream` 时，你需要定义一个委托对象，该对象将在执行 I/O 操作时被调用。


    `NSStream` 的另一个有趣之处在于，它不仅限于文件访问。其内部模型也可应用于任何 URL，例如网络资源或 FTP 文件。它还可用于直接连接网络套接字，尽管这种应用超出了本章的范围。然而，你所学习的一切（稍作修改）都可以用于访问客户端/服务器应用程序中使用的网络套接字。

    '
- fmt: "### Reading Files\n\nTo read files with `NSStream`, you need to set up an\
    \ `NSInputStream`, and then establish a delegate that will read data as it becomes\
    \ available. This kind of interface avoids the problem of large I/O delays by\
    \ using an asynchronous mechanism that triggers an event only when data is available\
    \ for consumption.\n\nThe first step in using an `NSInputStream` is to define\
    \ the object responsible for receiving the events triggered by the data-reading\
    \ interface. Normally, the event handling code is added to your main delegate\
    \ object, but you may want instead to create a dedicated class for data handling.\n\
    \nLet’s create a class called `AsyncDataReader` that reads a file using an `NSInputStream`.\
    \ The interface for this class has a method to set up the stream and another one\
    \ to handle the events triggered by the `NSStream` object.\n\n```\n// File AsyncDataReader.h\n\
    \n@interface AsyncDataReader : NSObject <NSStreamDelegate>\n{\n    NSInputStream\
    \ *_stream;\n    NSMutableData *_data;\n}\n\n- (void)setupStream:(NSString*)path;\n\
    - (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event;\n+ (void)testRead;\n\
    \n@end\n```\n\nThis interface implements the `NSStreamDelegate` protocol, which\
    \ is required for objects that want to consume data sent by an `NSStream`. The\
    \ class contains two instance variables: an `NSInputStream` that will be used\
    \ to read the input file, and an `NSMutableData` object that will store the contents\
    \ of the file in memory (`NSMutableData` is a subclass of `NSData` that allows\
    \ adding or removing from its contents). There are three methods in the interface.\
    \ The `setupStream:` method is responsible for doing the initial setup of the\
    \ input stream; it receives a file name as its single parameter. The `stream:handleEvent:`\
    \ method is required by the `NSStreamDelegate` protocol; this is the method called\
    \ when new data is available for consumption, for example. Finally, a class method\
    \ called `testRead` shows how this class can be used.\n\n```\n// file AsyncDataReader.m\n\
    \n#import \"AsyncDataReader.h\"\n\n@implementation AsyncDataReader\n\n- (void)\
    \ setupStream:(NSString*)fileName\n{\n    NSURL *url = [NSURL URLWithString:fileName];\n\
    \    if (_stream == nil)\n        _stream = [[NSInputStream alloc] initWithURL:url];\n\
    \    [_stream setDelegate:self];\n    [_stream scheduleInRunLoop:[NSRunLoop currentRunLoop]\n\
    \                       forMode:NSDefaultRunLoopMode];\n    [_stream open];\n\
    }\n```\n\nThis is the first part of the class implementation, where you need to\
    \ set up the stream for the reading operation. First, you check if the `_stream`\
    \ variable is valid, and if not, you use `alloc` followed by `initWithURL:` to\
    \ create the object. The next step is to set the delegate for the `NSStream`,\
    \ which in this case is the current `AsyncDataReader` class.\n\n`NSInputStream`\
    \ uses a messaging mechanism to communicate with the delegate object. To achieve\
    \ this, it is necessary to add the stream object to the run loop of the current\
    \ thread. This is achieved with the `scheduleInRunLoop:forMode:` message. To find\
    \ the current run loop, you can use the `currentRunLoop` method of the `NSRunLoop`\
    \ class. The standard model of operation is then selected with `NSDefaultRunLoopMode`.\n\
    \nFinally, to start processing the input stream, you need to send the open message\
    \ to the stream object. This will perform all the initialization steps necessary\
    \ to open a file and start reading the bytes stored in it.\n\n```\n- (void)stream:(NSStream\
    \ *)stream handleEvent:(NSStreamEvent)event\n{\n    uint8 bytes[256];\n    switch\
    \ (event)\n    {\n        case NSStreamEventHasBytesAvailable:\n        {\n  \
    \          if (_data == nil)\n                _data = [[NSMutableData alloc] init];\n\
    \            NSInteger len = [(NSInputStream*)stream read:bytes maxLength:256];\n\
    \            [_data appendBytes:bytes length:len*sizeof(bytes[0])];\n        \
    \    NSLog(@\"Data received: %ld bytes: \", len);\n            // save data stored\
    \ in bytes\n        }\n        break;\n\n        case NSStreamEventEndEncountered:\n\
    \        {\n            [_stream close];\n            [_stream removeFromRunLoop:[NSRunLoop\
    \ currentRunLoop]\n                               forMode:NSDefaultRunLoopMode];\n\
    \            [_stream release];\n            _stream = nil;\n        }\n     \
    \   break;\n\n        default:\n            break;\n    }\n}\n```\n\nThe method\
    \ `stream:handleEvent:` is the workhorse of this class, since it is responsible\
    \ for interpreting every message that is delegated by the `NSInputStream`. There\
    \ are several types of messages that can be received by the `NSStreamDelegate`,\
    \ but you are concerned only with two types: `NSStreamEventHasBytesAvailable`,\
    \ which indicates that new data is available for consumption, and `NSStreamEventEndEncountered`,\
    \ which is used to signal the end of the stream. These two messages are enough\
    \ for the most common cases where you just want to read the contents of a file.\n\
    \nIn response to the `NSStreamEventHasBytesAvailable` event, you prepare the `_data`\
    \ instance variable to store the received bytes. If `_data` has not been initialized,\
    \ you will use the `alloc`/`init` pair of messages to create a new `NSMutableData`\
    \ object. Next, you need to read the data into an internal buffer, and determine\
    \ the number of bytes received. This is done by calling the `read:maxLength:`\
    \ method. This method will transfer the data stored internally to the `bytes`\
    \ array. You need to indicate the maximum length of the buffer, so that the stream\
    \ will copy only a number of bytes that you can store in the declared buffer.\n\
    \n> **Note:** When setting the number of processed items per event (the size of\
    \ the buffer in the example above), you have an opportunity to influence the performance\
    \ of the application. A small buffer will force `NSStream` to send more messages\
    \ until the file is completely transferred, which can incur a performance penalty.\
    \ On the other hand, a buffer that is too large can take a long time to process\
    \ and can result in delays in your user interface. You should determine the best\
    \ size for your internal buffer based on some experimentation on what works best\
    \ for your application.\n\nThe next step in the `stream:handleEvent:` method is\
    \ to add the data received to the `_data` object, so that it will be available\
    \ to other methods when needed. The length of the buffer is determined using the\
    \ result of the `read:maxLength:` method. This information is printed to the log,\
    \ too, for debugging purposes.\n\nThe second message handled by `stream:handleEvent:`\
    \ is `NSStreamEventEndEncountered`, which is sent to the delegate object when\
    \ the stream is closed and has no more data. Each application can define how to\
    \ respond to this event, but in most cases it is necessary to dispose of the stream\
    \ object. You need first to close the stream by sending the `close` message to\
    \ the `_stream` instance variable. Then, you need to remove the stream from the\
    \ message loop. This is accomplished using the `removeFromRunLoop:forMode:` method.\
    \ Finally, you can call `release` on the `NSStream` object to dispose of its contents.\
    \ You also set the `_stream` variable to `nil`, so it can be later reused without\
    \ the risk of invoking a released object.\n\n```\n- (void) dealloc\n{\n    [_data\
    \ release];\n    [super dealloc];\n}\n```\n\nIn the `dealloc` method, you release\
    \ the `_data` object that was used to store the bytes transferred from the `NSInputStream`.\
    \ By this time, the class should have used the data (although you are not presenting\
    \ here the methods that make use of `_data`).\n\n```\n+ (void) testRead\n{\n \
    \   AsyncDataReader *reader = [[AsyncDataReader alloc] init];\n    [reader setupStream:@\"\
    file:///Users/oliveira/testFile\"];\n}\n\n@end\n```\n\nThe final part of the implementation\
    \ section is the `testRead` method. You create a reader with the standard `alloc`/`init`\
    \ sequence. Then, you send it the `setupStream:` message, passing as parameter\
    \ the URL path for the test file that you want to read. As a result of this, the\
    \ `NSInputStream` will be created and started. The reader object will receive\
    \ notifications that indicate important events, such as the availability of data\
    \ and the end of the stream. You should see messages in the log indicating that\
    \ the data is being received and read."
  raw: '### Reading Files


    To read files with `NSStream`, you need to set up an `NSInputStream`, and then
    establish a delegate that will read data as it becomes available. This kind of
    interface avoids the problem of large I/O delays by using an asynchronous mechanism
    that triggers an event only when data is available for consumption.


    The first step in using an `NSInputStream` is to define the object responsible
    for receiving the events triggered by the data-reading interface. Normally, the
    event handling code is added to your main delegate object, but you may want instead
    to create a dedicated class for data handling.


    Let’s create a class called `AsyncDataReader` that reads a file using an `NSInputStream`.
    The interface for this class has a method to set up the stream and another one
    to handle the events triggered by the `NSStream` object.


    `// File AsyncDataReader.h`


    `@interface AsyncDataReader : NSObject <NSStreamDelegate>`


    `{`


    `NSInputStream *_stream;`


    `NSMutableData *_data;`


    `}`


    `- (void)setupStream:(NSString*)path;`


    `- (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event;`


    `+ (void)testRead;`


    `@end`


    This interface implements the `NSStreamDelegate` protocol, which is required for
    objects that want to consume data sent by an `NSStream`. The class contains two
    instance variables: an `NSInputStream` that will be used to read the input file,
    and an `NSMutableData` object that will store the contents of the file in memory
    (`NSMutableData` is a subclass of `NSData` that allows adding or removing from
    its contents). There are three methods in the interface. The `setupStream:` method
    is responsible for doing the initial setup of the input stream; it receives a
    file name as its single parameter. The `stream:handleEvent:` method is required
    by the `NSStreamDelegate` protocol; this is the method called when new data is
    available for consumption, for example. Finally, a class method called `testRead`
    shows how this class can be used.


    `// file AsyncDataReader.m`


    `#import "AsyncDataReader.h"`


    `@implementation AsyncDataReader`


    `- (void) setupStream:(NSString*)fileName`


    `{`


    `NSURL *url = [NSURL URLWithString:fileName];`


    `if (_stream == nil)`


    `_stream = [[NSInputStream alloc] initWithURL:url];`


    `[_stream setDelegate:self];`


    `[_stream scheduleInRunLoop:[NSRunLoop currentRunLoop]`


    `forMode:NSDefaultRunLoopMode];`


    `[_stream open];`


    `}`


    This is the first part of the class implementation, where you need to set up the
    stream for the reading operation. First, you check if the `_stream` variable is
    valid, and if not, you use `alloc` followed by `initWithURL:` to create the object.
    The next step is to set the delegate for the `NSStream`, which in this case is
    the current `AsyncDataReader` class.


    `NSInputStream` uses a messaging mechanism to communicate with the delegate object.
    To achieve this, it is necessary to add the stream object to the run loop of the
    current thread. This is achieved with the `scheduleInRunLoop:forMode:` message.
    To find the current run loop, you can use the `currentRunLoop` method of the `NSRunLoop`
    class. The standard model of operation is then selected with `NSDefaultRunLoopMode`.


    Finally, to start processing the input stream, you need to send the open message
    to the stream object. This will perform all the initialization steps necessary
    to open a file and start reading the bytes stored in it.


    `- (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event`


    `{`


    `uint8 bytes[256];`


    `switch (event)`


    `{`


    `case NSStreamEventHasBytesAvailable:`


    `{`


    `if (_data == nil)`


    `_data = [[NSMutableData alloc] init];`


    `NSInteger len = [(NSInputStream*)stream read:bytes maxLength:256];`


    `[_data appendBytes:bytes length:len*sizeof(bytes[0])];`


    `NSLog(@"Data received: %ld bytes: ", len);`


    `// save data stored in bytes`


    `}`


    `break;`


    `case NSStreamEventEndEncountered:`


    `{`


    `[_stream close];`


    `[_stream removeFromRunLoop:[NSRunLoop currentRunLoop]`


    `forMode:NSDefaultRunLoopMode];`


    `[_stream release];`


    `_stream = nil;`


    `}`


    `break;`


    `default:`


    `break;`


    `}`


    `}`


    The method `stream:handleEvent:` is the workhorse of this class, since it is responsible
    for interpreting every message that is delegated by the `NSInputStream`. There
    are several types of messages that can be received by the `NSStreamDelegate`,
    but you are concerned only with two types: `NSStreamEventHasBytesAvailable`, which
    indicates that new data is available for consumption, and `NSStreamEventEndEncountered`,
    which is used to signal the end of the stream. These two messages are enough for
    the most common cases where you just want to read the contents of a file.


    In response to the `NSStreamEventHasBytesAvailable` event, you prepare the `_data`
    instance variable to store the received bytes. If `_data` has not been initialized,
    you will use the `alloc`/`init` pair of messages to create a new `NSMutableData`
    object. Next, you need to read the data into an internal buffer, and determine
    the number of bytes received. This is done by calling the `read:maxLength:` method.
    This method will transfer the data stored internally to the `bytes` array. You
    need to indicate the maximum length of the buffer, so that the stream will copy
    only a number of bytes that you can store in the declared buffer.


    Note


    When setting the number of processed items per event (the size of the buffer in
    the example above), you have an opportunity to influence the performance of the
    application. A small buffer will force `NSStream` to send more messages until
    the file is completely transferred, which can incur a performance penalty. On
    the other hand, a buffer that is too large can take a long time to process and
    can result in delays in your user interface. You should determine the best size
    for your internal buffer based on some experimentation on what works best for
    your application.


    The next step in the `stream:handleEvent:` method is to add the data received
    to the `_data` object, so that it will be available to other methods when needed.
    The length of the buffer is determined using the result of the `read:maxLength:`
    method. This information is printed to the log, too, for debugging purposes.


    The second message handled by `stream:handleEvent:` is `NSStreamEventEndEncountered`,
    which is sent to the delegate object when the stream is closed and has no more
    data. Each application can define how to respond to this event, but in most cases
    it is necessary to dispose of the stream object. You need first to close the stream
    by sending the `close` message to the `_stream` instance variable. Then, you need
    to remove the stream from the message loop. This is accomplished using the `removeFromRunLoop:forMode:`
    method. Finally, you can call `release` on the `NSStream` object to dispose of
    its contents. You also set the `_stream` variable to `nil`, so it can be later
    reused without the risk of invoking a released object.


    `- (void) dealloc`


    `{`


    `[_data release];`


    `[super dealloc];`


    `}`


    In the `dealloc` method, you release the `_data` object that was used to store
    the bytes transferred from the `NSInputStream`. By this time, the class should
    have used the data (although you are not presenting here the methods that make
    use of `_data`).


    `+ (void) testRead`


    `{`


    `AsyncDataReader *reader = [[AsyncDataReader alloc] init];`


    `[reader setupStream:@"file:///Users/oliveira/testFile"];`


    `}`


    `@end`


    The final part of the implementation section is the `testRead` method. You create
    a reader with the standard `alloc`/`init` sequence. Then, you send it the `setupStream:`
    message, passing as parameter the URL path for the test file that you want to
    read. As a result of this, the `NSInputStream` will be created and started. The
    reader object will receive notifications that indicate important events, such
    as the availability of data and the end of the stream. You should see messages
    in the log indicating that the data is being received and read.'
  trans: "\n### 读取文件\n\n要使用 `NSStream` 读取文件，你需要设置一个 `NSInputStream`，然后建立一个委托，该委托将在数据可用时进行读取。这种接口通过使用异步机制来避免大\
    \ I/O 延迟的问题，该机制仅在数据可供消费时触发事件。\n\n使用 `NSInputStream` 的第一步是定义负责接收数据读取接口触发的事件的对象。通常，事件处理代码会被添加到你的主委托对象中，但你可能希望为此创建一个专用的数据处理类。\n\
    \n让我们创建一个名为 `AsyncDataReader` 的类，该类使用 `NSInputStream` 读取文件。该类的接口有一个方法来设置流，另一个方法来处理由\
    \ `NSStream` 对象触发的事件。\n\n```\n// 文件 AsyncDataReader.h\n\n@interface AsyncDataReader\
    \ : NSObject <NSStreamDelegate>\n{\n    NSInputStream *_stream;\n    NSMutableData\
    \ *_data;\n}\n\n- (void)setupStream:(NSString*)path;\n- (void)stream:(NSStream\
    \ *)stream handleEvent:(NSStreamEvent)event;\n+ (void)testRead;\n\n@end\n```\n\
    \n该接口实现了 `NSStreamDelegate` 协议，这对于想要消费 `NSStream` 发送的数据的对象来说是必需的。该类包含两个实例变量：一个用于读取输入文件的\
    \ `NSInputStream`，以及一个用于在内存中存储文件内容的 `NSMutableData` 对象（`NSMutableData` 是 `NSData`\
    \ 的子类，允许对其内容进行添加或删除）。接口中有三个方法。`setupStream:` 方法负责对输入流进行初始设置；它接收文件名作为其唯一参数。`stream:handleEvent:`\
    \ 方法是 `NSStreamDelegate` 协议所要求的；例如，当有新的数据可供消费时，就会调用此方法。最后，一个名为 `testRead` 的类方法演示了如何使用这个类。\n\
    \n```\n// 文件 AsyncDataReader.m\n\n#import \"AsyncDataReader.h\"\n\n@implementation\
    \ AsyncDataReader\n\n- (void) setupStream:(NSString*)fileName\n{\n    NSURL *url\
    \ = [NSURL URLWithString:fileName];\n    if (_stream == nil)\n        _stream\
    \ = [[NSInputStream alloc] initWithURL:url];\n    [_stream setDelegate:self];\n\
    \    [_stream scheduleInRunLoop:[NSRunLoop currentRunLoop]\n                 \
    \      forMode:NSDefaultRunLoopMode];\n    [_stream open];\n}\n```\n\n这是类实现的第一部分，你需要在此处设置用于读取操作的流。首先，你检查\
    \ `_stream` 变量是否有效，如果无效，则使用 `alloc` 后跟 `initWithURL:` 来创建对象。下一步是为 `NSStream` 设置委托，在本例中是当前的\
    \ `AsyncDataReader` 类。\n\n`NSInputStream` 使用消息传递机制与委托对象进行通信。为此，有必要将流对象添加到当前线程的运行循环中。这是通过\
    \ `scheduleInRunLoop:forMode:` 消息实现的。要找到当前的运行循环，你可以使用 `NSRunLoop` 类的 `currentRunLoop`\
    \ 方法。然后通过 `NSDefaultRunLoopMode` 选择标准操作模式。\n\n最后，为了开始处理输入流，你需要向流对象发送 `open` 消息。这将执行打开文件并开始读取其中存储的字节所需的全部初始化步骤。\n\
    \n```\n- (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event\n{\n\
    \    uint8 bytes[256];\n    switch (event)\n    {\n        case NSStreamEventHasBytesAvailable:\n\
    \        {\n            if (_data == nil)\n                _data = [[NSMutableData\
    \ alloc] init];\n            NSInteger len = [(NSInputStream*)stream read:bytes\
    \ maxLength:256];\n            [_data appendBytes:bytes length:len*sizeof(bytes[0])];\n\
    \            NSLog(@\"收到数据：%ld 字节：\", len);\n            // 保存存储在 bytes 中的数据\n\
    \        }\n        break;\n\n        case NSStreamEventEndEncountered:\n    \
    \    {\n            [_stream close];\n            [_stream removeFromRunLoop:[NSRunLoop\
    \ currentRunLoop]\n                               forMode:NSDefaultRunLoopMode];\n\
    \            [_stream release];\n            _stream = nil;\n        }\n     \
    \   break;\n\n        default:\n            break;\n    }\n}\n```\n\n`stream:handleEvent:`\
    \ 方法是这个类的核心，因为它负责解释由 `NSInputStream` 委派的每一条消息。`NSStreamDelegate` 可以接收到多种类型的消息，但你只需关注两种类型：`NSStreamEventHasBytesAvailable`，表示有新数据可供消费；以及\
    \ `NSStreamEventEndEncountered`，用于指示流结束。对于大多数只想读取文件内容的情况，这两个消息就足够了。\n\n响应 `NSStreamEventHasBytesAvailable`\
    \ 事件时，你准备好 `_data` 实例变量来存储接收到的字节。如果 `_data` 尚未初始化，你将使用 `alloc`/`init` 这对消息来创建一个新的\
    \ `NSMutableData` 对象。接下来，你需要将数据读入一个内部缓冲区，并确定接收到的字节数。这是通过调用 `read:maxLength:` 方法完成的。此方法会将内部存储的数据传输到\
    \ `bytes` 数组中。你需要指明缓冲区的最大长度，以便流只会复制你可以在声明的缓冲区中存储的字节数量。\n\n> **注意：** 在设置每个事件处理的条目数量（上例中的缓冲区大小）时，你有机会影响应用程序的性能。较小的缓冲区会迫使\
    \ `NSStream` 发送更多消息，直到文件完全传输完毕，这可能会导致性能下降。另一方面，太大的缓冲区可能需要很长时间来处理，并可能导致用户界面延迟。你应该根据对应用程序运行效果的实验，来确定内部缓冲区的最佳大小。\n\
    \n`stream:handleEvent:` 方法中的下一步是将接收到的数据添加到 `_data` 对象中，以便在需要时其他方法可以使用这些数据。缓冲区的长度使用\
    \ `read:maxLength:` 方法的结果来确定。为了调试目的，此信息也会打印到日志中。\n\n`stream:handleEvent:` 处理的第二个消息是\
    \ `NSStreamEventEndEncountered`，当流关闭且没有更多数据时，此消息会发送给委托对象。每个应用程序都可以定义如何响应此事件，但在大多数情况下，需要释放流对象。你需要首先通过向\
    \ `_stream` 实例变量发送 `close` 消息来关闭流。然后，你需要将流从消息循环中移除。这是通过使用 `removeFromRunLoop:forMode:`\
    \ 方法完成的。最后，你可以对 `NSStream` 对象调用 `release` 以释放其内容。你还需要将 `_stream` 变量设置为 `nil`，以便以后可以重用，而无需冒险调用已释放的对象。\n\
    \n```\n- (void) dealloc\n{\n    [_data release];\n    [super dealloc];\n}\n```\n\
    \n在 `dealloc` 方法中，你释放用于存储从 `NSInputStream` 传输的字节的 `_data` 对象。到这个时候，该类应该已经使用了这些数据（尽管这里没有展示使用\
    \ `_data` 的方法）。\n\n```\n+ (void) testRead\n{\n    AsyncDataReader *reader = [[AsyncDataReader\
    \ alloc] init];\n    [reader setupStream:@\"file:///Users/oliveira/testFile\"\
    ];\n}\n\n@end\n```\n\n实现部分的最后部分是 `testRead` 方法。你使用标准的 `alloc`/`init` 序列来创建一个读取器。然后，你向其发送\
    \ `setupStream:` 消息，并将要读取的测试文件的 URL 路径作为参数传递。这样做的结果是，`NSInputStream` 会被创建并启动。读取器对象将收到指示重要事件的通知，例如数据的可用性和流的结束。你应该会在日志中看到表明数据正在被接收和读取的消息。\n"
- fmt: "### Writing to a File with `NSOutputStream`\n\nWriting to a file using `NSOutputStream`\
    \ is similar to reading with an `NSInputStream`. You still use an event-based\
    \ strategy to interact with the content of the stream, and subscribe to the event\
    \ through the use of a delegate that implements the `NSStreamDelegate` protocol.\
    \ However, `NSOutputStream` has its own types of messages that need to be handled\
    \ by the delegate. The tasks that need to be performed include initializing the\
    \ stream and sending new data to the stream.\n\nThe next code snippet shows the\
    \ interface for a class that writes data to a file asynchronously using `NSOutputStream`.\n\
    \n```\n// File AsyncDataWriter.h\n\n@interface AsyncDataWriter : NSObject <NSStreamDelegate>\n\
    {\n    NSOutputStream *_outStream;\n    int _position;\n}\n\n- (void) setupOutputStream:(NSString*)fileName;\n\
    - (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event;\n- (void)dealloc;\n\
    + (AsyncDataWriter*)testWrite;\n\n@property (retain) NSArray *outData;\n\n@end\n\
    ```\n\nThe class contains a pointer to the `NSOutputStream` and an integer that\
    \ determines the current position on the array of output data. There are three\
    \ instance methods: one sets up the output stream, the next receives messages\
    \ targeted to the `NSStreamDelegate` protocol, and the third is a standard `dealloc`.\
    \ Finally, you have a `testWrite` class method that shows how the class can be\
    \ used.\n\nThe `setupOutputStream` method is responsible for initializing the\
    \ stream and the data used. I use strings as test data, stored in the `outData`\
    \ property. However, it is easy to see how you can do this for any set of data\
    \ you might have stored in memory.\n\n```\n- (void) setupOutputStream:(NSString*)fileName\n\
    {\n    NSURL *url = [NSURL URLWithString:fileName];\n\n    if (_outStream == nil)\n\
    \    {\n        _outStream = [[NSOutputStream alloc]\n                      initWithURL:url\n\
    \                      append:YES];\n        self.outData = @[\n            @\"\
    A string\\n\",\n            @\"B values\\n\",\n            @\"C test\\n\",\n \
    \           @\"D class\\n\" ];\n        _position = 0;\n    }\n\n    [_outStream\
    \ setDelegate:self];\n    [_outStream scheduleInRunLoop:[NSRunLoop currentRunLoop]\n\
    \                         forMode:NSDefaultRunLoopMode];\n    [_outStream open];\n\
    }\n```\n\nThe initialization on `setupOutputStream` is performed whenever the\
    \ variable `_outStream` is `nil`. The first step is to create an output stream,\
    \ loading the URL that was created based on the file name passed as a parameter.\
    \ Next, you create an array with test data that will be used later to supply the\
    \ contents to the output file.\n\nYou create a `releaseStream` method that is\
    \ called whenever the data has been completely transferred to the output file.\n\
    \n```\n- (void)releaseStream\n{\n    [_outStream close];\n    [_outStream removeFromRunLoop:[NSRunLoop\
    \ currentRunLoop]\n                         forMode:NSDefaultRunLoopMode];\n \
    \   [_outStream release];\n    _outStream = nil;\n}\n```\n\nIn this code, you\
    \ first close the output stream so that no additional data will be accepted for\
    \ output. Then, you remove the stream from the `currentRunLoop`; as a result,\
    \ the delegate object won’t receive further event requests for this particular\
    \ output stream. In sequence, you release the stream and set it to `nil`, so that\
    \ it can be later used to write into another file.\n\nSimilar to the `NSInputStream`\
    \ case, the `stream:handleEvent:` method is the central piece of the work performed\
    \ by this class. In this method, you will provide data whenever it has been made\
    \ available to the application. As a result, the output stream will use the provided\
    \ data to write to the file named when the stream was created.\n\n```\n- (void)stream:(NSStream\
    \ *)stream handleEvent:(NSStreamEvent)event\n{\n    char bytes[NUM_ITEMS_IN_ARRAY];\n\
    \n    switch (event)\n    {\n        case NSStreamEventHasSpaceAvailable:\n  \
    \          if (_position < [_outData count])\n            {\n                NSString\
    \ *element = _outData[_position];\n                [element getCString:bytes\n\
    \                         maxLength:NUM_ITEMS_IN_ARRAY\n                     \
    \     encoding:NSASCIIStringEncoding];\n                NSLog(@\"ss %s %d\", bytes,\
    \ (int)[element length]);\n                [_outStream write:(const uint8_t *)bytes\n\
    \                       maxLength:[element length]];\n            }\n        \
    \    else\n            {\n                [self releaseStream];\n            }\n\
    \            position++;\n            break;\n\n        case NSStreamEventEndEncountered:\n\
    \            [self releaseStream];\n            break;\n\n        default:\n \
    \           break;\n    }\n}\n```\n\nFirst, you declare a buffer that is used\
    \ for temporary data transfer. Then, if the event is an `NSStreamEventHasSpaceAvailable`\
    \ this means that you need to provide additional data, if any is available. In\
    \ the code above, you do this by checking if there is a valid position in the\
    \ `outData` array, by testing if `_position` is less than or equal to the number\
    \ of elements in `outData`. If there is a valid position, you start getting the\
    \ corresponding `NSString`. Then you get a C string (array of characters) out\
    \ of the `NSString` using the method `getCString:maxLength:encoding:`. Once the\
    \ data has been copied into the `bytes` array, you send the message `write:maxLength:`\
    \ to the `_outStream` object so that it can transfer the raw data to the output\
    \ file.\n\n**Note:** When using the example above, please notice that I employed\
    \ the constant `NUM_ITEMS_IN_ARRAY` to simplify the presentation. In practice,\
    \ you need to be prepared and allocate enough memory to handle data of any size.\n\
    \nIf there is no more available data, then you call the `releaseStream` method,\
    \ which was described above. When the message received is `NSStreamEventEndEncountered`,\
    \ you also release the stream since this indicates that it is not possible to\
    \ add more data to the output file.\n\nFinally, here is how to use the methods\
    \ of the class described above:\n\n```\n+ (AsyncDataWriter*)testWrite\n{\n   \
    \ AsyncDataWriter *writer = [[AsyncDataWriter alloc] init];\n    [writer setupOutputStream:@\"\
    file:///Users/oliveira/testFile4\"];\n    return [writer autorelease];\n}\n```\n\
    \nThe `testWrite` method is a class method, which can be called directly to test\
    \ the behavior of the class. The first step is to create a new instance of `AsyncDataWriter`.\
    \ Then, you send the `setupOutputStream:` message to the writer. This will set\
    \ up the stream and try to open it. After that, the stream object will start sending\
    \ events to the `AsyncDataWriter` object, and as a result it will eventually transfer\
    \ all the data to the output file.\n\nAlthough reading or writing data using `NSStream`\
    \ and its subclasses is not straightforward, it gives the programmer a lot of\
    \ flexibility. First of all, `NSStream` is adaptable in its purpose: it can be\
    \ used to read or write to files, network sockets, or in memory buffers. Therefore,\
    \ the code that you wrote above can be applied in many situations with little\
    \ change. The other advantage of `NSStream` is its asynchronous behavior. An application\
    \ that uses `NSStream` will not have any delay caused by data input/output issues,\
    \ even when working with large files. This is possible because `NSStream` will\
    \ divide the work into small tasks, and these tasks will be performed as part\
    \ of the run loop of the application, where all messages (including UI messages)\
    \ are processed. Therefore, the application will not stop while waiting for completion\
    \ of these I/O tasks; it will instead continue processing other events in the\
    \ meantime."
  raw: '### Writing to a File with NSOutputStream


    Writing to a file using `NSOutputStream` is similar to reading with an `NSInputStream`.
    You still use an event-based strategy to interact with the content of the stream,
    and subscribe to the event through the use of a delegate that implements the `NSStreamDelegate`
    protocol. However, `NSOutputStream` has its own types of messages that need to
    be handled by the delegate. The tasks that need to be performed include initializing
    the stream and sending new data to the stream.


    The next code snippet shows the interface for a class that writes data to a file
    asynchronously using `NSOutputStream`.


    `// File AsyncDataWriter.h`


    `@interface AsyncDataWriter : NSObject <NSStreamDelegate>`


    `{`


    `NSOutputStream *_outStream;`


    `int _position;`


    `}`


    `- (void) setupOutputStream:(NSString*)fileName;`


    `- (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event;`


    `- (void)dealloc;`


    `+ (AsyncDataWriter*)testWrite;`


    `@property (retain) NSArray *outData;`


    `@end`


    The class contains a pointer to the `NSOuputStream` and an integer that determines
    the current position on the array of output data. There are three instance methods:
    one sets up the output stream, the next receives messages targeted to the `NSStreamDelegate`
    protocol, and the third is a standard `dealloc`. Finally, you have a `testWrite`
    class method that shows how the class can be used.


    The `setupOutputStream` method is responsible for initializing the stream and
    the data used. I use strings as test data, stored in the `outData` property. However,
    it is easy to see how you can do this for any set of data you might have stored
    in memory.


    `- (void) setupOutputStream:(NSString*)fileName`


    `{`


    `NSURL *url = [NSURL URLWithString:fileName];`


    `if (_outStream == nil)`


    `{`


    `_outStream = [[NSOutputStream alloc]`


    `initWithURL:url`


    `append:YES];`


    `self.outData = @[`


    `@"A string\n",`


    `@"B values\n",`


    `@"C test\n",`


    `@"D class\n" ];`


    `_position = 0;`


    `}`


    `[_outStream setDelegate:self];`


    `[_outStream scheduleInRunLoop:[NSRunLoop currentRunLoop]`


    `forMode:NSDefaultRunLoopMode];`


    `[_outStream open];`


    `}`


    The initialization on `setupOutputStream` is performed whenever the variable `_outStream`
    is `nil`. The first step is to create an output stream, loading the URL that was
    created based on the file name passed as a parameter. Next, you create an array
    with test data that will be used later to supply the contents to the output file.


    You create a `releaseStream` method that is called whenever the data has been
    completely transferred to the output file.


    `- (void)releaseStream`


    `{`


    `[_outStream close];`


    `[_outStream removeFromRunLoop:[NSRunLoop currentRunLoop]`


    `forMode:NSDefaultRunLoopMode];`


    `[_outStream release];`


    `_outStream = nil;`


    `}`


    In this code, you first close the output stream so that no additional data will
    be accepted for output. Then, you remove the stream from the `currentRunLoop`;
    as a result, the delegate object won’t receive further event requests for this
    particular output stream. In sequence, you release the stream and set it to `nil`,
    so that it can be later used to write into another file.


    Similar to the `NSInputStream` case, the `stream:handleEvent:` method is the central
    piece of the work performed by this class. In this method, you will provide data
    whenever it has been made available to the application. As a result, the output
    stream will use the provided data to write to the file named when the stream was
    created.


    `- (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event`


    `{`


    `char bytes[NUM_ITEMS_IN_ARRAY];`


    `switch (event)`


    `{`


    `case NSStreamEventHasSpaceAvailable:`


    `if (_position < [_outData count])`


    `{`


    `NSString *element = _outData[_position];`


    `[element getCString:bytes`


    `maxLength:NUM_ITEMS_IN_ARRAY`


    `encoding:NSASCIIStringEncoding];`


    `NSLog(@"ss %s %d", bytes, (int)[element length]);`


    `[_outStream write:(const uint8_t *)bytes`


    `maxLength:[element length]];`


    `}`


    `else`


    `{`


    `[self releaseStream];`


    `}`


    `position++;`


    `break;`


    `case NSStreamEventEndEncountered:`


    `[self releaseStream];`


    `break;`


    `default:`


    `break;`


    `}`


    `}`


    First, you declare a buffer that is used for temporary data transfer. Then, if
    the event is an `NSStreamEventHasSpaceAvailable` this means that you need to provide
    additional data, if any is available. In the code above, you do this by checking
    if there is a valid position in the `outData` array, by testing if `_position`
    is less than or equal to the number of elements in `outData`. If there is a valid
    position, you start getting the corresponding `NSString`. Then you get a C string
    (array of characters) out of the `NSString` using the method `getCString:maxLength:encoding:`.
    Once the data has been copied into the `bytes` array, you send the message `write:maxLength:`
    to the `_outStream` object so that it can transfer the raw data to the output
    file.


    Note


    When using the example above, please notice that I employed the constant NUM_ITEMS_IN_ARRAY
    to simplify the presentation. In practice, you need to be prepared and allocate
    enough memory to handle data of any size.


    If there is no more available data, then you call the `releaseStream` method,
    which was described above. When the message received is `NSStreamEventEndEncountered`,
    you also release the stream since this indicates that it is not possible to add
    more data to the output file.


    Finally, here is how to use the methods of the class described above:


    `+ (AsyncDataWriter*)testWrite`


    `{`


    `AsyncDataWriter *writer = [[AsyncDataWriter alloc] init];`


    `[writer setupOutputStream:@"file:///Users/oliveira/testFile4"];`


    `return [writer autorelease];`


    `}`


    The `testWrite` method is a class method, which can be called directly to test
    the behavior of the class. The first step is to create a new instance of `AsyncDataWriter`.
    Then, you send the `setupOutputStream:` message to the writer. This will set up
    the stream and try to open it. After that, the stream object will start sending
    events to the `AsyncDataWriter` object, and as a result it will eventually transfer
    all the data to the output file.


    Although reading or writing data using `NSStream` and its subclasses is not straightforward,
    it gives the programmer a lot of flexibility. First of all, `NSStream` is adaptable
    in its purpose: it can be used to read or write to files, network sockets, or
    in memory buffers. Therefore, the code that you wrote above can be applied in
    many situations with little change. The other advantage of `NSStream` is its asynchronous
    behavior. An application that uses `NSStream` will not have any delay caused by
    data input/output issues, even when working with large files. This is possible
    because `NSStream` will divide the work into small tasks, and these tasks will
    be performed as part of the run loop of the application, where all messages (including
    UI messages) are processed. Therefore, the application will not stop while waiting
    for completion of these I/O tasks; it will instead continue processing other events
    in the meantime.'
