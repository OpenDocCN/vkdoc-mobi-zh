    \ CPU 直接执行的二进制指令。每个源文件都必须首先经过处理，但在生成代码时，你对于最终代码的生成方式拥有一定的自主权。你可以通过 Xcode 或编译器命令行界面提供的一些构建设置来影响代码生成过程。\n\
    \n在本章中，你将了解 Objective-C 编译器提供的若干选项，以及如何利用它们为目标平台编写更优质的代码。首先，你将了解苹果平台可用的编译器：GCC（Mac\
    \ OS X 最初使用的开源编译器）以及 LLVM clang（目前 Xcode 官方支持的更现代化选项）。\n\n接着，你将学习可直接从 Xcode 的“构建设置”窗口访问的主要构建选项，包括一份最常用的编译器和链接器相关设置速查清单。然后我将展示如何通过命令行调用编译器。\n\
    \n最后，我将讨论 Objective-C 编译器在过去几年中的一些演进方式。首先，我将讨论 ARC（自动引用计数）与现有项目的集成。你还将学习如何利用 Objective-C\
    \ 编译器的另一实用功能：其与现有 C++ 代码的集成。\n\n## 使用 GCC 与 LLVM 编译器\n\n苹果支持的平台所使用的 Objective-C\
    \ 编译器在过去数年间持续演进。理解这一演进过程将有助于你在两种编译器之间做出明智选择，并了解何时应使用其中一种而非另一种。\n\n自 Mac OS X 诞生以来，其使用的编译器一直是\
    \ GCC。GCC 是一款针对 C、C++ 及其他语言的开源编译器。它作为一个拥有活跃开发者与支持者社区的开源项目，这一事实对平台的选择产生了重大影响。这意味着所有人都能受益于全球开源爱好者引入的改进。此外，用户无需等待苹果提供的修复和更新，而是能够自行解决常见问题，并在必要时执行自己的更新。GCC\
    \ 是全球最常用的开源编译器，这意味着它在许多不同的操作系统和处理器上都得到支持。\n\n尽管 GCC 编译器已使用多年，但其某些缺陷已成为 Objective-C\
    \ 语言演进道路上的重要障碍。问题之一在于缺乏对插件的支持，而插件可用于执行编译之外的重要任务，例如文档生成、诊断和性能测量。这一问题恰好发生在苹果向 Objective-C\
    \ 引入新特性（如 ARC、改进的字面量语法以及与 Xcode IDE 更好的集成）的时刻。\n\n为了在更干净的基础上继续演进该语言，苹果决定支持一款更现代化但仍保持开源的\
    \ Objective-C 编译器。其选择是 LLVM clang 项目的产物——一款从头开始构建、旨在解决 GCC 诸多缺陷的现代开源编译器。\n\nLLVM\
    \ 编译器最初被用作编译的附加选项，但截至撰写本书时，它已成为所有苹果支持平台上 Objective-C 的官方支持编译器。除了 `clang` 新代码的内部优势（这对编译器开发者本身尤为重要）之外，LLVM\
    \ clang 总体上比旧版 GCC 提供了更好的错误信息。仅此一点就是使用 LLVM 的巨大优势，因为有时理解一条特别晦涩的错误信息的含义可能相当困难。LLVM\
    \ 通常还提供有助于修复常见错误的选项。\n\n例如，考虑以下包含错误和对 `printf` 调用的代码片段：\n\n```\n// 文件 hello.c\n\
    \n#include <stdio.h>\n\nint main()\n{\n    printf(\"Hello %s\");\n    return 0;\n\
    }\n```\n\n以下是 GCC 产生的信息：\n\n```\n> gcc hello.c\nhello.c: 在函数 'main' 中:\nhello.c:5:\
    \ 警告: 格式参数太少\nhello.c:5: 警告: 格式参数太少\n```\n\n虽然这些信息指出了检测到问题的地方，但除了错误发生的行号外，几乎未给出关于底层代码确切错误位置的线索。以下是\
    \ `clang` 返回的相同错误信息：\n\n```\n> cc hello.c\nhello.c:5:19: 警告: '%' 转换数量多于数据参数 [-Wformat]\n\
    \    printf(\"Hello %s\");\n           ~~~~~~~~^\n生成了 1 条警告。\n```\n\n在此例中，你不仅能看到像\
    \ GCC 一样识别出的错误，而且其位置还以一种非常直观的格式被直接指出。\n\nLLVM 的另一个优势是它与 Xcode 更紧密的集成，这得益于其新的内部架构。例如，通过使用\
    \ LLVM，Xcode 可以更轻松地以更易于解析和显示的格式提取错误信息和诊断结果。\n\n鉴于这些原因，在接下来几节讨论编译器特性时，我将把 LLVM\
    \ 视为默认编译器。不过请注意，Objective-C 的大多数当前特性均可通过任一编译器访问。但是，诸如 ARC 等新技术会首先在 LLVM clang\
    \ 上提供。这是确保你的代码能在 `clang` 上正确编译，从而保证其未来可得到支持的另一个原因。\n\n## 在 Xcode 中更改编译器选项\n\n\
    Xcode 是一个集成环境，为开发周期的每个阶段都提供了有用的工具。特别地，Xcode 为程序员提供了用于定义最适合最终产品的编译器选项的工具。例如，在 Xcode\
    \ 设置窗口中，可以帮助编译器定义生成可执行代码所需的必要参数。\n\n要访问“设置”窗口，请点击项目导航器中的顶层节点。这将打开“设置编辑器”。然后，点击你想要编辑的项目，你将看到设置列表。点击窗口顶部的“构建设置”以访问构建选项。图\
    \ 12-1 展示了一个示例项目的“构建设置”窗口外观。\n\n![A978-1-4302-5906-0_12_Fig1_HTML.jpg](img/A978-1-4302-5906-0_12_Fig1_HTML.jpg)\n\
    \n**图 12-1.** 测试项目的构建设置窗口\n\n以下是你可从“构建设置”窗口访问的最常用设置列表：\n"
- fmt: "*   **Architectures**: The Objective-C compiler can generate code for a number\
    \ of architectures, including 32-bit Intel, 64-bit Intel, and ARM (used on mobile\
    \ devices). This setting is normally defined automatically when you create a new\
    \ project, but you may want to change this when creating desktop application,\
    \ for example, that may work either on 32-bit or 64-bit architectures.\n*   **Base\
    \ SDK**: The SDK is the set of Objective-C libraries that together comprise the\
    \ complete programming environment and API for Mac OS X or iOS applications. Major\
    \ SDK releases occur one or more times per year. You can decide which SDK to use\
    \ based on the devices that you want to support. Older devices don’t support the\
    \ latest SDKs, so you need to decide if you want to compromise on features or\
    \ on wider availability of the code.\n*   **Supported Platforms**: The two main\
    \ platforms are Mac OS X and iOS.\n*   **The Build Locations Settings**: This\
    \ set of options determines the location for several outputs generated during\
    \ the building process. For example, you can decide where to put final products,\
    \ intermediate object files, debugging files, among others.\n*   **Default Compiler**:\
    \ You can define here the compiler used, either GCC or LLVM clang. The default\
    \ nowadays is LLVM, but your code may depend on a feature that exists only in\
    \ GCC. In this case, you should try to update your code for the medium term so\
    \ that it will become compatible with the other compiler as well.\n*   **Precompiled\
    \ Header Files**: If you set this option to yes, you can define the name of a\
    \ header file that will be pre-compiled. This option is commonly used to increase\
    \ the speed of compilation for large projects. When this setting is turned on,\
    \ the compiler creates a pre-processed representation of the included files, which\
    \ is then reused throughout the project.\n*   **Run Static Analyzer**: One of\
    \ the features of the LLVM clang compiler is the ability to perform syntactic\
    \ analysis. For example, such analysis can detect memory leaks or areas in which\
    \ the arithmetic overflow operations may happen. You can run the static analyzer\
    \ manually by calling it from the Product ➤ Analyze menu (or Shift + Command +\
    \ B). This option lets you call the static analyzer automatically for each run\
    \ of the compiler.\n*   **Validate Built Product**: This is another optional step\
    \ that can be triggered from the menu, but it can also be called automatically\
    \ for each compilation run. The product validation checks the outputs of the compiler\
    \ and the build system, and verifies that they comply with the rules of software\
    \ distribution for that particular platform.\n*   **Code Signing Identity**: For\
    \ builds that require code signing, such as when you’re distributing code through\
    \ the App Store, this step will create the necessary information for code signing.\
    \ You need to supply a signing identity, which is determined through encryption\
    \ keys that can be retrieved from the Apple Developer’s web site.\n*   **Deployment\
    \ Target**: You can change the deployment target for the resulting binaries in\
    \ such a way that you can choose which operating systems will be able to run the\
    \ code you generated. Usually this is used to maintain compatibility with particular\
    \ libraries that you’re using in the application as well as with some older devices\
    \ and CPU models.\n\n## Running the Compiler from the Command Line\n\nDepending\
    \ on your workflow, it may be desirable to run the compiler directly from a command\
    \ line window instead of using Xcode for development. For example, you may be\
    \ using an external text editor or programming environment. This is the case if\
    \ you decide to use vim as the text editor for everything related to Objective-C\
    \ files, instead of using the Xcode IDE. In these occasions, it is easier to use\
    \ a command line tool to build the whole project, rather than switching to Xcode\
    \ just to perform compilations.\n\nOther times, you may want to create a quick\
    \ app for testing purposes, and that may be easier to do from the command line,\
    \ if you know the exact steps to follow. Whatever your reasons for accessing the\
    \ command line, it is just as easy as running Xcode, once you get the right compiler\
    \ options and build system in place.\n\nThere are two ways to use the command\
    \ line compiler on Mac OS X. The first option is to rely on Xcode for project\
    \ management and use the command line to trigger the Xcode-controlled build. This\
    \ method relies on the `xcodebuild` tool, which is made available when Xcode is\
    \ installed. The second option is to use your preferred project management tool,\
    \ such as `make`, `cmake`, or `scons`, and create build scripts that will work\
    \ independently from Xcode. I will briefly explain these two options.\n\nTo use\
    \ the first method, the Xcode-managed project called from the command line, you\
    \ just need to call `xcodebuild` as a command line program and pass to it a few\
    \ arguments to determine where the project located, as well as other build-time\
    \ options that can control certain settings on the executable output.\n\nFor example,\
    \ suppose that you have a project called `TestProj`. The file where such a project\
    \ would be stored would be called `TestProj.xcodeproj`. You can call the Xcode\
    \ building system from the command line using the builder command `xcodebuild`.\
    \ This command is responsible for loading the project file where the build information\
    \ is stored, running the selected target, and calling the compiler and other tools\
    \ as necessary to build the resulting project. With the `TestProj.xcodeproj` file,\
    \ this would work as follows:\n\n`xcodebuild -project TestProj.xcodeproj`\n\n\
    Then `xcodebuild` will build the whole project, emitting messages such as the\
    \ following, until the project is completely built:\n\n```\nCpResource TestProj.sqlite\
    \ build/Release-macos/TestProj.app/TestProj.sqlite\ncd /Users/coliveira/MacApps/TestProj\n\
    setenv PATH \"/Applications/Xcode4.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin:/Applications/Xcode4.app/Contents/Developer/usr/bin:/Users/coliveira/src/cappuccino/bin:/Applications/Xcode.app//Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin/:/usr/texbin:/opt/local/bin/:/sw/bin:/sw/sbin:/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:/usr/X11/bin:/usr/X11R6/bin:/Users/oliveira/Downloads/plan9/port/bin\"\
    \nbuiltin-copy -exclude .DS_Store -exclude CVS -exclude .svn -exclude .git -exclude\
    \ .hg -strip-debug-symbols -strip-tool /Applications/Xcode4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/strip\
    \ -resolve-src-symlinks /Users/oliveira/MacApps/TestProj/TestProj.sqlite /Users/oliveira/MacApps/TestProj/build/Release-macos/TestProj.app\n\
    ...\n```\n\nThe `xcodebuild` command has a number of common options that can be\
    \ used to tweak the command line build process. For example, you can use the `-list`\
    \ option to identify all the schemes, targets, and building configurations.\n\n\
    ```\n$ xcodebuild -list -project TestProj.xcodeproj\nInformation about project\
    \ \"TestProj\":\nTargets:\n    TestProj\n    OptTkUI\n    OptTkUITests\n    TestProjOrganizer\n\
    \    TestProjOrganizerTests\nBuild Configurations:\n    Debug\n    Release\nIf\
    \ no build configuration is specified and -scheme is not passed then \"Release\"\
    \ is used.\nSchemes:\n    TestProj\n    TestProjLite\n    OptTkUI\n    TestProjOrganizer\n\
    ```\n\nAnother option that provides useful information about the system is `showsdks`,\
    \ which lists all target sdks installed in your machine."
  raw: '*   Architectures: The Objective-C compiler can generate code for a number
    of architectures, including 32-bit Intel, 64-bit Intel, and ARM (used on mobile
    devices). This setting is normally defined automatically when you create a new
    project, but you may want to change this when creating desktop application, for
    example, that may work either on 32-bit or 64-bit architectures.

    *   Base SDK: The SDK is the set of Objective-C libraries that together comprise
    the complete programming environment and API for Mac OS X or iOS applications.
    Major SDK releases occur one or more times per year. You can decide which SDK
    to use based on the devices that you want to support. Older devices don’t support
    the latest SDKs, so you need to decide if you want to compromise on features or
    on wider availability of the code.

    *   Supported Platforms: The two main platforms are Mac OS X and iOS.

    *   The Build Locations Settings: This set of options determines the location
    for several outputs generated during the building process. For example, you can
    decide where to put final products, intermediate object files, debugging files,
    among others.

    *   Default Compiler: You can define here the compiler used, either GCC or LLVM
    clang. The default nowadays is LLVM, but your code may depend on a feature that
    exists only in GCC. In this case, you should try to update your code for the medium
    term so that it will become compatible with the other compiler as well.

    *   Precompiled Header Files: If you set this option to yes, you can define the
    name of a header file that will be pre-compiled. This option is commonly used
    to increase the speed of compilation for large projects. When this setting is
    turned on, the compiler creates a pre-processed representation of the included
    files, which is then reused throughout the project.

    *   Run Static Analyzer: One of the features of the LLVM clang compiler is the
    ability to perform syntactic analysis. For example, such analysis can detect memory
    leaks or areas in which the arithmetic overflow operations may happen. You can
    run the static analyzer manually by calling it from the Product ➤ Analyze menu
    (or Shift + Command + B). This option lets you call the static analyzer automatically
    for each run of the compiler.

    *   Validate Built Product: This is another optional step that can be triggered
    from the menu, but it can also be called automatically for each compilation run.
    The product validation checks the outputs of the compiler and the build system,
    and verifies that they comply with the rules of software distribution for that
    particular platform.

    *   Code Signing Identity: For builds that require code signing, such as when
    you’re distributing code through the App Store, this step will create the necessary
    information for code signing. You need to supply a signing identity, which is
    determined through encryption keys that can be retrieved from the Apple Developer’s
    web site.

    *   Deployment Target: You can change the deployment target for the resulting
    binaries in such a way that you can choose which operating systems will be able
    to run the code you generated. Usually this is used to maintain compatibility
    with particular libraries that you’re using in the application as well as with
    some older devices and CPU models.


    ## Running the Compiler from the Command Line


    Depending on your workflow, it may be desirable to run the compiler directly from
    a command line window instead of using Xcode for development. For example, you
    may be using an external text editor or programming environment. This is the case
    if you decide to use vim as the text editor for everything related to Objective-C
    files, instead of using the Xcode IDE. In these occasions, it is easier to use
    a command line tool to build the whole project, rather than switching to Xcode
    just to perform compilations.


    Other times, you may want to create a quick app for testing purposes, and that
    may be easier to do from the command line, if you know the exact steps to follow.
    Whatever your reasons for accessing the command line, it is just as easy as running
    Xcode, once you get the right compiler options and build system in place.


    There are two ways to use the command line compiler on Mac OS X. The first option
    is to rely on Xcode for project management and use the command line to trigger
    the Xcode-controlled build. This method relies on the xcodebuild tool, which is
    made available when Xcode is installed. The second option is to use your preferred
    project management tool, such as make, cmake, or scons, and create build scripts
    that will work independently from Xcode. I will briefly explain these two options.


    To use the first method, the Xcode-managed project called from the command line,
    you just need to call xcodebuild as a command line program and pass to it a few
    arguments to determine where the project located, as well as other build-time
    options that can control certain settings on the executable output.


    For example, suppose that you have a project called TestProj. The file where such
    a project would be stored would be called `TestProj.xcodeproj`. You can call the
    Xcode building system from the command line using the builder command `xcodebuild`.
    This command is responsible for loading the project file where the build information
    is stored, running the selected target, and calling the compiler and other tools
    as necessary to build the resulting project. With the `TestProj.xcodeproj` file,
    this would work as follows:


    `xcodebuild -project TestProj.xcodeproj`


    Then xcodebuild will build the whole project, emitting messages such as the following,
    until the project is completely built:


    `CpResource TestProj.sqlite build/Release-macos/TestProj.app/TestProj.sqlite`


    `cd /Users/coliveira/MacApps/TestProj`


    `setenv PATH "/Applications/Xcode4.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin:/Applications/Xcode4.app/Contents/Developer/usr/bin:/Users/coliveira/src/cappuccino/bin:/Applications/Xcode.app//Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin/:/usr/texbin:/opt/local/bin/:/sw/bin:/sw/sbin:/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:/usr/X11/bin:/usr/X11R6/bin:/Users/oliveira/Downloads/plan9/port/bin"`


    `builtin-copy -exclude .DS_Store -exclude CVS -exclude .svn -exclude .git -exclude
    .hg -strip-debug-symbols -strip-tool /Applications/Xcode4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/strip
    -resolve-src-symlinks /Users/oliveira/MacApps/TestProj/TestProj.sqlite /Users/oliveira/MacApps/TestProj/build/Release-macos/TestProj.app`


    `...`


    The `xcodebuild` command has a number of common options that can be used to tweak
    the command line build process. For example, you can use the `-list` option to
    identify all the schemes, targets, and building configurations.


    `$ xcodebuild -list -project TestProj.xcodeproj`


    `Information about project "TestProj":`


    `Targets:`


    `TestProj`


    `OptTkUI`


    `OptTkUITests`


    `TestProjOrganizer`


    `TestProjOrganizerTests`


    `Build Configurations:`


    `Debug`


    `Release`


    `If no build configuration is specified and -scheme is not passed then "Release"
    is used.`


    `Schemes:`


    `TestProj`


    `TestProjLite`


    `OptTkUI`


    `TestProjOrganizer`


    Another option that provides useful information about the system is `showsdks`,
    which lists all target sdks installed in your machine.'
  trans: "\n*   **架构**：Objective-C 编译器可以为多种架构生成代码，包括 32 位 Intel、64 位 Intel 以及 ARM（用于移动设备）。创建新项目时通常会自动定义此设置，但在创建桌面应用程序时（例如，可能需要同时支持\
    \ 32 位或 64 位架构），您可能需要更改此项。\n*   **基础 SDK**：SDK 是一组 Objective-C 库，它们共同构成了 Mac OS\
    \ X 或 iOS 应用程序的完整编程环境和 API。主要的 SDK 版本每年会发布一次或多次。您可以根据要支持的设备来决定使用哪个 SDK。较旧的设备不支持最新的\
    \ SDK，因此您需要在功能或代码的广泛适用性之间做出权衡。\n*   **支持的平台**：两个主要平台是 Mac OS X 和 iOS。\n*   **构建位置设置**：这组选项决定了构建过程中生成的多个输出文件的位置。例如，您可以决定最终产品、中间目标文件、调试文件等放置在何处。\n\
    *   **默认编译器**：您可以在此处定义使用的编译器，即 GCC 或 LLVM clang。如今默认的是 LLVM，但您的代码可能依赖于 GCC 独有的特性。在这种情况下，您应从中期角度考虑更新代码，使其也能兼容其他编译器。\n\
    *   **预编译头文件**：如果将此选项设置为“是”，您可以定义一个将被预编译的头文件名称。此选项通常用于加快大型项目的编译速度。开启此设置后，编译器会创建包含文件的预处理表示形式，并在整个项目中重复使用。\n\
    *   **运行静态分析器**：LLVM clang 编译器的特性之一是其能够执行语法分析。例如，此类分析可以检测内存泄漏或可能发生算术溢出的区域。您可以通过“产品”➤“分析”菜单（或\
    \ Shift + Command + B）手动调用静态分析器。此选项允许您在每次运行编译器时自动调用静态分析器。\n*   **验证构建产品**：这是另一个可选步骤，可以通过菜单触发，也可以为每次编译运行自动调用。产品验证会检查编译器和构建系统的输出，并验证它们是否符合特定平台的软件分发规则。\n\
    *   **代码签名标识**：对于需要代码签名的构建（例如通过 App Store 分发代码时），此步骤将创建代码签名所需的信息。您需要提供一个签名标识，该标识通过可从\
    \ Apple 开发者网站获取的加密密钥确定。\n*   **部署目标**：您可以更改生成二进制的部署目标，从而选择哪些操作系统能够运行您生成的代码。通常，这用于保持与应用程序中使用的特定库以及某些较旧设备和\
    \ CPU 型号的兼容性。\n\n## 从命令行运行编译器\n\n根据您的工作流程，可能希望直接从命令行窗口运行编译器，而不是使用 Xcode 进行开发。例如，您可能正在使用外部文本编辑器或编程环境。如果您决定使用\
    \ vim 作为所有与 Objective-C 文件相关操作的文本编辑器，而不是使用 Xcode IDE，情况便是如此。在这些情况下，使用命令行工具构建整个项目比仅仅为了执行编译而切换到\
    \ Xcode 更为方便。\n\n其他时候，您可能想创建一个用于测试目的的快速应用程序，如果您知道确切的步骤，通过命令行操作可能更简单。无论您出于何种原因使用命令行，一旦掌握了正确的编译器选项和构建系统，它与运行\
    \ Xcode 一样简单。\n\n在 Mac OS X 上有两种使用命令行编译器的方法。第一种方法是依靠 Xcode 进行项目管理，并使用命令行触发 Xcode\
    \ 控制的构建。此方法依赖于 `xcodebuild` 工具，该工具在安装 Xcode 时可用。第二种方法是使用您偏好的项目管理工具，例如 `make`、`cmake`\
    \ 或 `scons`，并创建独立于 Xcode 运行的构建脚本。我将简要说明这两种方法。\n\n要使用第一种方法，即从命令行调用由 Xcode 管理的项目，您只需将\
    \ `xcodebuild` 作为命令行程序调用，并向其传递一些参数来确定项目的位置，以及一些可以控制可执行输出特定设置的构建时选项。\n\n例如，假设您有一个名为\
    \ `TestProj` 的项目。存储此项目的文件将被称为 `TestProj.xcodeproj`。您可以使用构建器命令 `xcodebuild` 从命令行调用\
    \ Xcode 构建系统。此命令负责加载存储构建信息的项目文件，运行选定的目标，并根据需要调用编译器和其它工具来构建最终项目。对于 `TestProj.xcodeproj`\
    \ 文件，其工作方式如下：\n\n`xcodebuild -project TestProj.xcodeproj`\n\n然后，`xcodebuild` 将构建整个项目，并发出类似以下的消息，直到项目完全构建完成：\n\
    \n```\nCpResource TestProj.sqlite build/Release-macos/TestProj.app/TestProj.sqlite\n\
    cd /Users/coliveira/MacApps/TestProj\nsetenv PATH \"/Applications/Xcode4.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin:/Applications/Xcode4.app/Contents/Developer/usr/bin:/Users/coliveira/src/cappuccino/bin:/Applications/Xcode.app//Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin/:/usr/texbin:/opt/local/bin/:/sw/bin:/sw/sbin:/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:/usr/X11/bin:/usr/X11R6/bin:/Users/oliveira/Downloads/plan9/port/bin\"\
    \nbuiltin-copy -exclude .DS_Store -exclude CVS -exclude .svn -exclude .git -exclude\
    \ .hg -strip-debug-symbols -strip-tool /Applications/Xcode4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/strip\
    \ -resolve-src-symlinks /Users/oliveira/MacApps/TestProj/TestProj.sqlite /Users/oliveira/MacApps/TestProj/build/Release-macos/TestProj.app\n\
    ...\n```\n\n`xcodebuild` 命令有许多常用选项，可用于调整命令行构建过程。例如，您可以使用 `-list` 选项来识别所有方案、目标和构建配置。\n\
    \n```\n$ xcodebuild -list -project TestProj.xcodeproj\nInformation about project\
    \ \"TestProj\":\nTargets:\n    TestProj\n    OptTkUI\n    OptTkUITests\n    TestProjOrganizer\n\
    \    TestProjOrganizerTests\nBuild Configurations:\n    Debug\n    Release\nIf\
    \ no build configuration is specified and -scheme is not passed then \"Release\"\
    \ is used.\nSchemes:\n    TestProj\n    TestProjLite\n    OptTkUI\n    TestProjOrganizer\n\
    ```\n\n另一个提供系统有用信息的选项是 `showsdks`，它会列出机器上安装的所有目标 SDK。\n"
- fmt: "`$ xcodebuild --showsdks`\n\n`OS X SDKs:`\n`Mac OS X 10.7` -sdk `macosx10.7`\n\
    `OS X 10.8` -sdk `macosx10.8`\n\n`iOS SDKs:`\n`iOS 6.1` -sdk `iphoneos6.1`\n\n\
    `iOS Simulator SDKs:`\n`Simulator - iOS 6.1` -sdk `iphonesimulator6.1`\n\nThe\
    \ interesting thing about `xcodebuild` is that it can perform the same tasks as\
    \ the internal builder of Xcode. Therefore, it is very easy to transition from\
    \ an IDE-based workflow to a command line-based one. However, the downside is\
    \ that it requires that the project was initially created using Xcode. Some developers\
    \ prefer to avoid it, therefore the next method, an external tool for managing\
    \ project dependencies, would be more suitable for them.\n\nDependency management\
    \ tools such as `make` are used to keep track of the dependencies between artifacts\
    \ in an application. When a source artifact changes, the outputs that depend on\
    \ that source file will be rebuild as needed.\n\nSince the project dependencies\
    \ in a typical Mac OS X UI application are complex, `make` is more frequently\
    \ used for console-based applications. A simple example would be a console application\
    \ called `hello`, composed of three Objective-C files: `main.m`, `Hello.h`, and\
    \ `Hello.m`. Here is a simple make file that could be used to build this project:\n\
    \n```\n# file Makefile\n#\nTARGET = hello\nOBJ = Hello.o main.o\n\nall: build\n\
    \nmain.o: main.m Hello.h\n    cc -o main.o main.m\n\nHello.o: Hello.m Hello.h\n\
    \    cc -o Hello.o Hello.m\n\nbuild: $(OBJ)\n    cc $(OBJ) -o $(TARGET)\n\nclean:\n\
    \    rm -f *.o $(TARGET)\n```\n\nThis project has only one main file (`main.m`)\
    \ and a class (`Hello`). The `makefile` describes how each file depends on the\
    \ others. Thus, the build depends on the object files stored in the `$(OBJ)` variable.\
    \ The object files are built from the source files `main.m` and `Hello.m`. Each\
    \ dependency line is composed of the name of the target file followed by a colon\
    \ and the list of dependencies. Therefore, for example, the `main.o` object file\
    \ depends on `Hello.h`. Similarly, `Hello.o` depends on `Hello.h`. This means\
    \ that when `Hello.h` is changed, `make` will rebuild the targets that depend\
    \ on it, such as `Hello.o` and `main.o`.\n\nThe command to rebuild a target is\
    \ listed after the dependency list, started by a tab character. For example, to\
    \ rebuild `Hello.o`, the command used is:\n\n`cc -o Hello.o Hello.m`\n\nUsing\
    \ makefiles may be easier when you are creating simple projects, but it can quickly\
    \ become hard to track all the dependencies in a project. Therefore, makefiles\
    \ are used with Objective-C only when the code is designed to work in multiple\
    \ platforms and is mixing other languages that are not supported directly by Xcode.\
    \ You should refer to the documentation of `make` in the Apple developer’s library\
    \ if that is the case.\n\n## Code Optimization\n\nOne of the main reasons to use\
    \ compilation options to change the behavior of the Objective-C compiler is when\
    \ you are trying to achieve some optimization goal. For example, you may want\
    \ to optimize the compiled code to achieve maximum speed. Or you may be more interested\
    \ in creating compact executables that occupy less space in a mobile platform,\
    \ for example. The options in this section can be used to drive these two different\
    \ ways of performing code optimization.\n\n### Speed Optimization\n\nThe primary\
    \ method to optimize Objective-C is using one of the `-O` settings. The `-O` settings\
    \ (the `O` means \"optimize\") are used to define the level of optimization you\
    \ need. The setting is generally followed by a number, which determines how much\
    \ optimization is performed at that particular level.\n\nThe lowest level of optimization\
    \ is `-O0`, which means no optimization at all. This is used primarily when you\
    \ want to disable optimizations in your code, mainly for debugging purposes, or\
    \ to determine a baseline for performance measurement.\n\nThe first level of meaningful\
    \ optimization is `-O1`. You can apply this level if you desire some speed optimization\
    \ but you don't want to bother to run the full set of optimization levels available\
    \ for that particular platform. The next level of optimization, `-O2`, adds some\
    \ additional improvements that can make your code even faster. On the other hand,\
    \ adding more optimizations can make your build run a little slower than normal.\n\
    \nThe `-O3` level is the most aggressive, and it also requires the most time to\
    \ run. Use this level if you need high performance code and you don't care much\
    \ about the time it takes to get a full build. This is usually used when creating\
    \ a release version of your project. You can also have an `-O4` level, which adds\
    \ not only compilation optimization, but also linking-time optimizations that\
    \ consider all object files as they are linked.\n\n### Space Optimization\n\n\
    Another useful optimization target on Objective-C is to minimize the space used\
    \ by the whole application. This option has become popular in the last few years\
    \ as applications have become larger and as, at the same time, they are required\
    \ to run on very small devices such as the iPhone and the iPod touch.\n\nWith\
    \ space optimization, you tell the compiler to generate code that occupies minimum\
    \ space, instead of reducing execution speed. This is necessary because sometimes\
    \ space optimization may come at the expense of speed optimization. For example,\
    \ the compiler may at times generate faster code by adding some repeated sections\
    \ of code. A well-known case of this is loop-unrolling optimizations, which increase\
    \ the size of code to speed up loops at runtime. On the other hand, as a result\
    \ of reducing the amount of code generated in the executable, it may be necessary\
    \ to spend more time during execution.\n\nThe main way to optimize space on Objective-C\
    \ compilers is to use the `-Os` option. This option performs optimization steps\
    \ that try to reduce the resulting size of the target code. This option will also\
    \ take precedence whenever there are conflicts, such as other options to improve\
    \ performance in ways that can increase the size of the executable binaries."
  raw: '`$ xcodebuild –showsdks`


    `OS X SDKs:`


    `Mac OS X 10.7 -sdk macosx10.7`


    `OS X 10.8 -sdk macosx10.8`


    `iOS SDKs:`


    `iOS 6.1 -sdk iphoneos6.1`


    `iOS Simulator SDKs:`


    `Simulator - iOS 6.1 -sdk iphonesimulator6.1`


    The interesting thing about xcodebuild is that it can perform the same tasks as
    the internal builder of Xcode. Therefore, it is very easy to transition from an
    IDE-based workflow to a command line-based one. However, the downside is that
    it requires that the project was initially created using Xcode. Some developers
    prefer to avoid it, therefore the next method, an external tool for managing project
    dependencies, would be more suitable for them.


    Dependency management tools such as make are used to keep track of the dependencies
    between artifacts in an application. When a source artifact changes, the outputs
    that depend on that source file will be rebuild as needed.


    Since the project dependencies in a typical Mac OS X UI application are complex,
    make is more frequently used for console-based applications. A simple example
    would be a console application called hello, composed of three Objective-C files:
    `main.m`, `Hello.h`, and `Hello.m`. Here is a simple make file that could be used
    to build this project:


    `# file Makefile`


    `#`


    `TARGET = hello`


    `OBJ = Hello.o main.o`


    `all: build`


    `main.o: main.m Hello.h`


    `cc -o main.o main.m`


    `Hello.o: Hello.m Hello.h`


    `cc -o Hello.o Hello.m`


    `build: $(OBJ)`


    `cc $(OBJ) -o $(TARGET)`


    `clean:`


    `rm -f *.o $(TARGET)`


    This project has only one main file (`main.m`) and a class (`Hello`). The `makefile`
    describes how each file depends on the others. Thus, the build depends on the
    object files stored in the `$(OBJ)` variable. The object files are built from
    the source files `main.m` and `Hello.m`. Each dependency line is composed of the
    name of the target file followed by a colon and the list of dependencies. Therefore,
    for example, the `main.o` object file depends on `Hello.h`. Similarly, `Hello.o`
    depends on `Hello.h`. This means that when `Hello.h` is changed, make will rebuild
    the targets that depend on it, such as `Hello.o` and `main.o`.


    The command to rebuild a target is listed after the dependency list, started by
    a tab character. For example, to rebuild `Hello.o`, the command used is


    `cc –o Hello.o Hello.m`


    Using makefiles may be easier when you are creating simple projects, but it can
    quickly become hard to track all the dependencies in a project. Therefore, makefiles
    are used with Objective-C only when the code is designed to work in multiple platforms
    and is mixing other languages that are not supported directly by Xcode. You should
    refer to the documentation of make in the Apple developer’s library if that is
    the case.


    ## Code Optimization


    One of the main reasons to use compilation options to change the behavior of the
    Objective-C compiler is when you are trying to achieve some optimization goal.
    For example, you may want to optimize the compiled code to achieve maximum speed.
    Or you may be more interested in creating compact executables that occupy less
    space in a mobile platform, for example. The options in this section can be used
    to drive these two different ways of performing code optimization.


    ### Speed Optimization


    The primary method to optimize Objective-C is using one of the `–O` settings.
    The `–O` settings (the O means “optimize”) are used to define the level of optimization
    you need. The setting is generally followed by a number, which determines how
    much optimization is performed at that particular level.


    The lowest level of optimization is `−O0`, which means no optimization at all.
    This is used primarily when you want to disable optimizations in your code, mainly
    for debugging purposes, or to determine a baseline for performance measurement.


    The first level of meaningful optimization is `−O1`. You can apply this level
    if you desire some speed optimization but you don’t want to bother to run the
    full set of optimization levels available for that particular platform. The next
    level of optimization, `−O2`, adds some additional improvements that can make
    your code even faster. On the other hand, adding more optimizations can make your
    build run a little slower than normal.


    The `–O3` level is the most aggressive, and it also requires the most time to
    run. Use this level if you need high performance code and you don’t care much
    about the time it takes to get a full build. This is usually used when creating
    a release version of your project. You can also have an `−O4` level, which adds
    not only compilation optimization, but also linking-time optimizations that consider
    all object files as they are linked.


    ### Space Optimization


    Another useful optimization target on Objective-C is to minimize the space used
    by the whole application. This option has become popular in the last few years
    as applications have become larger and as, at the same time, they are required
    to run on very small devices such as the iPhone and the iPod touch.


    With space optimization, you tell the compiler to generate code that occupies
    minimum space, instead of reducing execution speed. This is necessary because
    sometimes space optimization may come at the expense of speed optimization. For
    example, the compiler may at times generate faster code by adding some repeated
    sections of code. A well-known case of this is loop-unrolling optimizations, which
    increase the size of code to speed up loops at runtime. On the other hand, as
    a result of reducing the amount of code generated in the executable, it may be
    necessary to spend more time during execution.


    The main way to optimize space on Objective-C compilers is to use the `−Os` option.
    This option performs optimization steps that try to reduce the resulting size
    of the target code. This option will also take precedence whenever there are conflicts,
    such as other options to improve performance in ways that can increase the size
    of the executable binaries.'
  trans: "\n`$ xcodebuild --showsdks`\n\n`OS X SDKs：`\n`Mac OS X 10.7` -sdk `macosx10.7`\n\
    `OS X 10.8` -sdk `macosx10.8`\n\n`iOS SDKs：`\n`iOS 6.1` -sdk `iphoneos6.1`\n\n\
    `iOS Simulator SDKs：`\n`Simulator - iOS 6.1` -sdk `iphonesimulator6.1`\n\n关于 `xcodebuild`，有趣的一点是它可以执行与\
    \ Xcode 内部构建器相同的任务。因此，从基于 IDE 的工作流程迁移到基于命令行的流程非常容易。然而，缺点是它要求项目最初是使用 Xcode 创建的。有些开发者倾向于避免使用它，因此下一个方法（一种用于管理项目依赖关系的外部工具）对他们来说会更合适。\n\
    \n像 `make` 这样的依赖管理工具用于跟踪应用程序中各工件之间的依赖关系。当源工件发生变化时，依赖于该源文件的输出将根据需要重新构建。\n\n由于典型的\
    \ Mac OS X 用户界面应用程序中的项目依赖关系非常复杂，`make` 更常用于基于控制台的应用程序。一个简单的示例是一个名为 `hello` 的控制台应用程序，它由三个\
    \ Objective-C 文件组成：`main.m`、`Hello.h` 和 `Hello.m`。以下是一个可用于构建此项目的简单 makefile 文件：\n\
    \n```\n# 文件 Makefile\n#\nTARGET = hello\nOBJ = Hello.o main.o\n\nall: build\n\n\
    main.o: main.m Hello.h\n    cc -o main.o main.m\n\nHello.o: Hello.m Hello.h\n\
    \    cc -o Hello.o Hello.m\n\nbuild: $(OBJ)\n    cc $(OBJ) -o $(TARGET)\n\nclean:\n\
    \    rm -f *.o $(TARGET)\n```\n\n这个项目只有一个主文件（`main.m`）和一个类（`Hello`）。`makefile`\
    \ 描述了每个文件之间的相互依赖关系。因此，构建依赖于存储在 `$(OBJ)` 变量中的目标文件。这些目标文件由源文件 `main.m` 和 `Hello.m`\
    \ 构建而成。每个依赖行由目标文件的名称、冒号和依赖项列表组成。因此，例如，`main.o` 目标文件依赖于 `Hello.h`。类似地，`Hello.o`\
    \ 依赖于 `Hello.h`。这意味着当 `Hello.h` 发生变化时，`make` 将重新构建依赖于它的目标，例如 `Hello.o` 和 `main.o`。\n\
    \n重新构建目标的命令列在依赖项列表之后，并以制表符开头。例如，要重新构建 `Hello.o`，使用的命令是：\n\n`cc -o Hello.o Hello.m`\n\
    \n在你创建简单项目时，使用 makefile 可能会更容易，但它很快就会变得难以跟踪项目中的所有依赖关系。因此，只有当代码设计为在多个平台上运行，并且混合使用了\
    \ Xcode 不直接支持的其他语言时，才会在 Objective-C 中使用 makefile。如果是这种情况，你应该查阅 Apple 开发者库中关于 `make`\
    \ 的文档。\n\n## 代码优化\n\n使用编译选项来改变 Objective-C 编译器行为的主要原因之一，是为了实现某种优化目标。例如，你可能希望优化编译后的代码以获得最大速度。或者你可能更倾向于创建紧凑的可执行文件，以便在移动平台上占用更少的空间。本节中的选项可用于引导这两种不同的代码优化方式。\n\
    \n### 速度优化\n\n优化 Objective-C 的主要方法是使用 `-O` 设置之一。`-O` 设置（其中的 `O` 代表“优化”）用于定义你所需的优化级别。该设置通常后跟一个数字，该数字决定了在该特定级别上执行多少优化。\n\
    \n最低级别的优化是 `-O0`，这意味着完全不进行优化。这主要用于你想禁用代码中的优化时，主要是为了调试目的，或者是为了确定性能测量的基线。\n\n有意义的优化的第一个级别是\
    \ `-O1`。如果你希望进行一些速度优化，但又不想麻烦地运行该特定平台上可用的全套优化级别，可以应用此级别。下一个优化级别是 `-O2`，它增加了一些额外的改进，可以使你的代码运行得更快。另一方面，增加更多的优化可能会使你的构建运行速度比正常情况稍慢。\n\
    \n`-O3` 级别最为激进，运行所需的时间也最长。如果你需要高性能代码，并且不太在意完成完整构建所需的时间，请使用此级别。这通常在创建项目的发布版本时使用。你也可以使用\
    \ `-O4` 级别，它不仅增加了编译优化，还增加了链接时优化，该优化会在链接时考虑所有目标文件。\n\n### 空间优化\n\nObjective-C 的另一个有用的优化目标是最大限度地减少整个应用程序所占用的空间。近年来，随着应用程序变得越来越大，同时它们又需要在非常小的设备（如\
    \ iPhone 和 iPod touch）上运行，这一选项变得流行起来。\n\n通过空间优化，你告诉编译器生成占用空间最小的代码，而不是减少执行速度。这是必要的，因为有时空间优化可能会以牺牲速度优化为代价。例如，编译器有时可能会通过添加一些重复的代码段来生成更快的代码。一个众所周知的例子是循环展开优化，它通过增加代码大小来在运行时加速循环。另一方面，由于减少了可执行文件中生成的代码量，可能需要在执行期间花费更多的时间。\n\
    \n在 Objective-C 编译器中优化空间的主要方法是使用 `-Os` 选项。此选项会执行旨在减少目标代码最终大小的优化步骤。当出现冲突时，例如存在其他以提高性能（但可能增加可执行二进制文件大小）为目标的选项，此选项将优先考虑。\n"
- fmt: "# ARC Support\n\nARC is a technology that allows Objective-C programmers to\
    \ write code without the use of explicit reference counting mechanisms such as\
    \ `retain` and `release`. The main goal of ARC is to free programmers from an\
    \ activity that may result in common mistakes that are difficult to debug and\
    \ fix. This happens because, while it is not hard to learn the rules of memory\
    \ management under Objective-C, it is possible to make allocation mistakes that\
    \ can cause memory leaks, heap corruption, or even crashes.\n\nTrying to solve\
    \ some of these memory management issues, Apple has introduced ARC as a feature\
    \ of the LLVM compiler. With ARC, the compiler can analyze how objects are used\
    \ in an Objective-C application and determine where they should be retained or\
    \ released. It works automatically in the great majority of cases, and requires\
    \ only a few hints on memory usage in cases such as circular references.\n\nIn\
    \ this section, I cover only the compiler options used to support ARC in Objective-C.\
    \ For an introduction to ARC and how it can be used to simplify memory management\
    \ in Objective-C applications, please refer to [Chapter 8](#A978-1-4302-5906-0_8_Chapter.html)\
    \ for further information.\n\nThe first thing necessary to use ARC is to make\
    \ sure that you’re using the LLVM compiler instead of GCC. It is possible that\
    \ ARC may become available in GCC in the future, but currently this is a technology\
    \ implemented on LLVM clang only. To determine which compiler is used, select\
    \ the Building Options window. To find it, click the target in the left panel\
    \ (this is the top-level element of the Project Navigator) and click the project\
    \ name. The Project Settings will be displayed, and you can select from one of\
    \ the two options at the top of the window: Info and Building Settings. Click\
    \ the Building Settings option. The Settings window will appear, as shown in Figure\
    \ [12-2](#A978-1-4302-5906-0_12_Chapter.html#Fig2).\n\nThe first thing is to select,\
    \ in the Build Options section, the option “compiler for C/C++/Objective-C.” Then,\
    \ in the drop-down, select “default compiler (Apple LLVM compiler 4.2).”\n\n![A978-1-4302-5906-0_12_Fig2_HTML.jpg](A978-1-4302-5906-0_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2. Project Settings window for ARC properties\n\nThe Project Settings\
    \ window contains ARC options in the section “Apple LLVM compiler 4.2 – Language.”\
    \ The option desired is the “Objective-C Automatic Reference Counting.” By setting\
    \ that value to Yes, you will have ARC enabled on your project. To use ARC, you\
    \ also need to make sure that `retain` and `release` are not used, along with\
    \ other issues discussed in [Chapter 8](#A978-1-4302-5906-0_8_Chapter.html).\n\
    \n## Compiling Objective-C++\n\nAs you have seen in the previous chapters, Objective-C\
    \ is a proper superset of the C programming language, and both languages can be\
    \ mixed without any problem. In particular, every function and expression created\
    \ in C can also be interpreted as valid Objective-C code.\n\nDue to the fact that\
    \ Objective-C was designed to avoid conflicts with the C programming language,\
    \ a useful property of it is that you can also easily mix Objective-C with C++\
    \ code without major problems. The result of the combination of Objective-C code\
    \ with C++ is sometimes described as Objective-C++, but there is effective no\
    \ difference from the point of view of Objective-C programmers. Anything that\
    \ is specific to Objective-C remains the same when Objective-C and C++ are mixed.\
    \ The only difference is that now you can use C++ constructs in addition to C.\n\
    \nObjective-C++ programming can be easily enabled using Xcode. The compiled language\
    \ in Xcode is largely defined by the extension of the source file. For example,\
    \ files with the `.m` extension are processed as Objective-C files, while `.c`\
    \ files are processed as plain C files. To be able to mix C++ and Objective-C,\
    \ you just need to create files with the extension `.mm` instead of `.m`. Xcode\
    \ will use this extension as an indication that the file contains C++ code and\
    \ will provide the correct options to the compiler so that C++ and Objective-C\
    \ may be fully recognized as part of the build.\n\nThe following code is a simple\
    \ example of mixed C++ and Objective-C code. While explaining how C++ works is\
    \ completely outside the scope of this book, you can easily see the combination\
    \ of non-C features such as class definitions with the creation and use of Objective-C\
    \ objects.\n\n```cpp\nclass Logger\n{\npublic:\n    void addLog(NSString *s);\n\
    };\n\nvoid Logger::addLog(NSString *s)\n{\n    NSLog(@\"here is my message: %@\"\
    , s);\n}\n```\n\nThis code defines a C++ class called `Logger`, and is responsible\
    \ for sending string messages to the console. You may notice that the `addLog`,\
    \ despite being a C++ member function, accepts a parameter of type `NSString`,\
    \ which is an Objective-C object.\n\nNext, you can use this class from inside\
    \ of a normal Objective-C method as follows:\n\n```objc\n- (void) createCppObj\n\
    {\n    Logger logger;\n    logger.addLog(@\"my message\");\n}\n```\n\nThe `logger`\
    \ object is declared as having type `Logger`, which is a C++ class. You can call\
    \ methods in `logger` just as you would do in a normal C++ source file.\n\nFinally,\
    \ the next example shows how to create a C++ class that contains Objective-C objects\
    \ as member variables. This code describes a type of collection class where you\
    \ can add elements and check the size of the collection.\n\n```cpp\nclass MyCollection\n\
    {\npublic:\n    MyCollection();\n    ~MyCollection();\n    void add(id obj);\n\
    \    int size();\nprivate:\n    NSMutableArray *array;\n};\n```\n\nThe first part\
    \ is the definition of the C++ class. There are four public member functions and\
    \ one private member variable of type `NSMutableArray`. They are defined as follows:\n\
    \n```cpp\nMyCollection::MyCollection()\n{\n    array = [[NSMutableArray alloc]\
    \ init];\n}\n\nMyCollection::~MyCollection()\n{\n    [array release];\n}\n\nvoid\
    \ MyCollection::add(id obj)\n{\n    [array addObject:obj];\n}\n\nint MyCollection::size()\n\
    {\n    return (int)[array count];\n}\n```\n\nThe first method is called the constructor\
    \ and it is called automatically when the object is created. This method will\
    \ allocate and initialize a new Objective-C object of type `NSMutableArray`. The\
    \ object is stored in the `array` member variable (similar to an instance variable).\n\
    \nThe second method is a destructor, and it runs when the object is destroyed.\
    \ When this happens, you want to release the `array` object to avoid a memory\
    \ leak.\n\nThe next two objects implement the `add` and `size` operations. They\
    \ are just thin wrappers around the corresponding functionality provided in the\
    \ `NSMutableArray` class.\n\nThis class can be used as shown:\n\n```objc\n- (void)\
    \ useMyCollection\n{\n    MyCollection * c = new MyCollection;\n    c->add(@\"\
    test 1\");\n    c->add(@\"test 2\");\n    NSLog(@\"the size is %d\", c->size());\n\
    \    // This will print \"the size is 2\"\n}\n```\n\n**Note:** Objective-C with\
    \ C++ constructs frequently provide the same features using a different syntax.\
    \ For this reason, I don’t recommend that you mix the two languages, unless you\
    \ know very well what you want to achieve with them. Most frequently, programmers\
    \ mix Objective-C and C++ to be able to access libraries in both languages. Even\
    \ in that case, try to evaluate your project and see if there are other alternatives\
    \ to using both languages in the same code base."
  raw: '## ARC Support


    ARC is a technology that allows Objective-C programmers to write code without
    the use of explicit reference counting mechanisms such as `retain` and `release`.
    The main goal of ARC is to free programmers from an activity that may result in
    common mistakes that are difficult to debug and fix. This happens because, while
    it is not hard to learn the rules of memory management under Objective-C, it is
    possible to make allocation mistakes that can cause memory leaks, heap corruption,
    or even crashes.


    Trying to solve some of these memory management issues, Apple has introduced ARC
    as a feature of the LLVM compiler. With ARC, the compiler can analyze how objects
    are used in an Objective-C application and determine where they should be retained
    or released. It works automatically in the great majority of cases, and requires
    only a few hints on memory usage in cases such as circular references.


    In this section, I cover only the compiler options used to support ARC in Objective-C.
    For an introduction to ARC and how it can be used to simplify memory management
    in Objective-C applications, please refer to [Chapter 8](#A978-1-4302-5906-0_8_Chapter.html)
    for further information.


    This first thing necessary to use ARC is to make sure that you’re using the LLVM
    compiler instead of GCC. It is possible that ARC may become available in GCC in
    the future, but currently this is a technology implemented on LLVM clang only.
    To determine which compiler is used, select the Building Options window. To find
    it, click the target in the left panel (this is the top-level element of the Project
    Navigator) and click the project name. The Project Settings will be displayed,
    and you can select from one of the two options at the top of the window: Info
    and Building Settings. Click the Building Settings option. The Settings window
    will appear, as shown in Figure [12-2](#A978-1-4302-5906-0_12_Chapter.html#Fig2).


    The first thing is to select, in the Build Options section, the option “compiler
    for C/C++/Objective-C.” Then, in the drop-down, select “default compiler (Apple
    LLVM compiler 4.2).”


    ![A978-1-4302-5906-0_12_Fig2_HTML.jpg](A978-1-4302-5906-0_12_Fig2_HTML.jpg)


    Figure 12-2.


    Project Settings window for ARC properties


    The Project Settings window contains ARC options in the section “Apple LLVM compiler
    4.2 – Language.” The option desired is the “Objective-C Automatic Reference Counting.”
    By setting that value to Yes, you will have ARC enabled on your project. To use
    ARC, you also need to make sure that `retain` and `release` are not used, along
    with other issues discussed in [Chapter 8](#A978-1-4302-5906-0_8_Chapter.html).


    ## Compiling Objective-C++


    As you have seen in the previous chapters, Objective-C is a proper superset of
    the C programming language, and both languages can be mixed without any problem.
    In particular, every function and expression created in C can also be interpreted
    as valid Objective-C code.


    Due to the fact that Objective-C was designed to avoid conflicts with the C programming
    language, a useful property of it is that you can also easily mix Objective-C
    with C++ code without major problems. The result of the combination of Objective-C
    code with C++ is sometimes described as Objective-C++, but there is effective
    no difference from the point of view of Objective-C programmers. Anything that
    is specific to Objective-C remains the same when Objective-C and C++ are mixed.
    The only difference is that now you can use C++ constructs in addition to C.


    Objective-C++ programming can be easily enabled using Xcode. The compiled language
    in Xcode is largely defined by the extension of the source file. For example,
    files with the `.m` extension are processed as Objective-C files, while `.c` files
    are processed as plain C files. To be able to mix C++ and Objective-C, you just
    need to create files with the extension `.mm` instead of `.m`. Xcode will use
    this extension as an indication that the file contains C++ code and will provide
    the correct options to the compiler so that C++ and Objective-C may be fully recognized
    as part of the build.


    The following code is a simple example of mixed C++ and Objective-C code. While
    explaining how C++ works is completely outside the scope of this book, you can
    easily see the combination of non-C features such as class definitions with the
    creation and use of Objective-C objects.


    `class Logger`


    `{`


    `public:`


    `void addLog(NSString *s);`


    `};`


    `void Logger::addLog(NSString *s)`


    `{`


    `NSLog(@"here is my message: %@", s);`


    `}`


    This code defines a C++ class called `Logger`, and is responsible for sending
    string messages to the console. You may notice that the `addLog`, despite being
    a C++ member function, accepts a parameter of type `NSString`, which is an Objective-C
    object.


    Next, you can use this class from inside of a normal Objective-C method as follows:


    `- (void) createCppObj`


    `{`


    `Logger logger;`


    `logger.addLog(@"my message");`


    `}`


    The `logger` object is declared as having type `Logger`, which is a C++ class.
    You can call methods in `logger` just as you would do in a normal C++ source file.


    Finally, the next example shows how to create a C++ class that contains Objective-C
    objects as member variables. This code describes a type of collection class where
    you can add elements and check the size of the collection.


    `class MyCollection`


    `{`


    `public:`


    `MyCollection();`


    `∼MyCollection();`


    `void add(id obj);`


    `int size();`


    `private:`


    `NSMutableArray *array;`


    `};`


    The first part is the definition of the C++ class. There are four public member
    functions and one private member variable of type `NSMutableArray`. They are defined
    as follows:


    `MyCollection::MyCollection()`


    `{`


    `array = [[NSMutableArray alloc] init];`


    `}`


    `MyCollection::∼MyCollection()`


    `{`


    `[array release];`


    `}`


    `void MyCollection::add(id obj)`


    `{`


    `[array addObject:obj];`


    `}`


    `int MyCollection::size()`


    `{`


    `return (int)[array count];`


    `}`


    The first method is called the constructor and it is called automatically when
    the object is created. This method will allocate and initialize a new Objective-C
    object of type `NSMutableArray`. The object is stored in the array member variable
    (similar to an instance variable).


    The second method is a destructor, and it runs when the object is destroyed. When
    this happens, you want to release the array object to avoid a memory leak.


    The next two objects implement the `add` and `size` operations. They are just
    thin wrappers around the corresponding functionality provided in the `NSMutableArray`
    class.


    This class can be used as shown:


    `- (void) useMyCollection`


    `{`


    `MyCollection * c = new MyCollection;`


    `c->add(@"test 1");`


    `c->add(@"test 2");`


    `NSLog(@"the size is %d", c->size());`


    `// This will print “the size is 2”`


    `}`


    Note


    Objective-C with C++ constructs frequently provide the same features using a different
    syntax. For this reason, I don’t recommend that you mix the two languages, unless
    you know very well what you want to achieve with them. Most frequently, programmers
    mix Objective-C and C++ to be able to access libraries in both languages. Even
    in that case, try to evaluate your project and see if there are other alternatives
    to using both languages in the same code base.'
  trans: "\n# ARC 支持\n\nARC 是一项允许 Objective-C 程序员在编写代码时无需使用`retain`和`release`等显式引用计数机制的技术。ARC\
    \ 的主要目标是让程序员摆脱那些可能导致难以调试和修复的常见错误的活动。这是因为，虽然学习 Objective-C 下的内存管理规则并不困难，但仍可能犯下分配错误，从而导致内存泄漏、堆损坏甚至崩溃。\n\
    \n为了解决部分内存管理问题，苹果将 ARC 作为 LLVM 编译器的特性引入。借助 ARC，编译器可以分析对象在 Objective-C 应用程序中的使用方式，并确定应在何处进行保留或释放操作。在绝大多数情况下，它会自动工作，仅在循环引用等内存使用场景下需要少量提示。\n\
    \n在本节中，我仅介绍用于在 Objective-C 中支持 ARC 的编译器选项。关于 ARC 的介绍以及如何使用它来简化 Objective-C 应用程序中的内存管理，请参考第\
    \ 8 章了解更多信息。\n\n使用 ARC 的首要条件是确保你正在使用 LLVM 编译器而非 GCC。未来 ARC 有可能在 GCC 中实现，但目前这项技术仅在\
    \ LLVM clang 上实现。要确定使用的是哪个编译器，请选择“构建选项”窗口。要找到该窗口，请点击左侧面板中的“目标”（这是项目导航器的顶层元素），然后点击项目名称。项目设置将会显示，你可以从窗口顶部的两个选项中选择一个：“信息”和“构建设置”。点击“构建设置”选项，设置窗口将会出现，如图\
    \ 12-2 所示。\n\n首先，在“构建设置”部分中，选择“C/C++/Objective-C 编译器”选项。然后，在下拉菜单中选择“默认编译器（Apple\
    \ LLVM compiler 4.2）”。\n\n![A978-1-4302-5906-0_12_Fig2_HTML.jpg](img/A978-1-4302-5906-0_12_Fig2_HTML.jpg)\n\
    \n图 12-2. 用于 ARC 属性的项目设置窗口\n\n项目设置窗口的“Apple LLVM compiler 4.2 – Language”部分包含了\
    \ ARC 选项。所需的选项是“Objective-C Automatic Reference Counting”。通过将该值设置为 Yes，你将在项目中启用\
    \ ARC。要使用 ARC，你还需确保不使用`retain`和`release`，以及其他在第 8 章中讨论的问题。\n\n## 编译 Objective-C++\n\
    \n正如你在前几章中所见，Objective-C 是 C 编程语言的适当超集，两种语言可以毫无问题地混合使用。特别是，C 语言中创建的每一个函数和表达式也可以被解释为有效的\
    \ Objective-C 代码。\n\n由于 Objective-C 被设计为避免与 C 编程语言冲突，它的一个有用特性是，你也可以轻松地将 Objective-C\
    \ 与 C++ 代码混合使用而不会产生重大问题。Objective-C 代码与 C++ 结合的结果有时被称为 Objective-C++，但从 Objective-C\
    \ 程序员的角度来看，实际上并没有区别。当混合使用 Objective-C 和 C++ 时，任何 Objective-C 特有的内容都保持不变。唯一的区别是，现在除了\
    \ C 之外，你还可以使用 C++ 结构。\n\n使用 Xcode 可以轻松启用 Objective-C++ 编程。Xcode 中编译的语言很大程度上由源文件的扩展名决定。例如，`.m`\
    \ 扩展名的文件被当作 Objective-C 文件处理，而 `.c` 文件则被当作纯 C 文件处理。要能够混合使用 C++ 和 Objective-C，你只需创建扩展名为\
    \ `.mm` 而非 `.m` 的文件。Xcode 会将该扩展名作为文件包含 C++ 代码的指示，并为编译器提供正确的选项，以便 C++ 和 Objective-C\
    \ 在构建过程中被完全识别。\n\n以下代码是一个混合了 C++ 和 Objective-C 代码的简单示例。虽然解释 C++ 如何工作完全超出了本书的范围，但你可以轻松看到非\
    \ C 特性（如类定义）与 Objective-C 对象的创建和使用的结合。\n\n```cpp\nclass Logger\n{\npublic:\n \
    \   void addLog(NSString *s);\n};\n\nvoid Logger::addLog(NSString *s)\n{\n   \
    \ NSLog(@\"here is my message: %@\", s);\n}\n```\n\n这段代码定义了一个名为`Logger`的 C++ 类，负责将字符串消息发送到控制台。你可能会注意到，`addLog`虽然是\
    \ C++ 的成员函数，却接受一个`NSString`类型的参数，这是一个 Objective-C 对象。\n\n接下来，你可以从一个普通的 Objective-C\
    \ 方法内部使用这个类，如下所示：\n\n```objc\n- (void) createCppObj\n{\n    Logger logger;\n \
    \   logger.addLog(@\"my message\");\n}\n```\n\n`logger`对象被声明为`Logger`类型，这是一个 C++\
    \ 类。你可以像在普通 C++ 源文件中一样调用`logger`上的方法。\n\n最后，下一个示例展示了如何创建一个包含 Objective-C 对象作为成员变量的\
    \ C++ 类。这段代码描述了一种集合类，你可以在其中添加元素并检查集合的大小。\n\n```cpp\nclass MyCollection\n{\npublic:\n\
    \    MyCollection();\n    ~MyCollection();\n    void add(id obj);\n    int size();\n\
    private:\n    NSMutableArray *array;\n};\n```\n\n第一部分是 C++ 类的定义。有四个公共成员函数和一个`NSMutableArray`类型的私有成员变量。它们的定义如下：\n\
    \n```cpp\nMyCollection::MyCollection()\n{\n    array = [[NSMutableArray alloc]\
    \ init];\n}\n\nMyCollection::~MyCollection()\n{\n    [array release];\n}\n\nvoid\
    \ MyCollection::add(id obj)\n{\n    [array addObject:obj];\n}\n\nint MyCollection::size()\n\
    {\n    return (int)[array count];\n}\n```\n\n第一个方法称为构造函数，在对象创建时自动调用。该方法会分配并初始化一个`NSMutableArray`类型的新\
    \ Objective-C 对象。该对象存储在`array`成员变量中（类似于实例变量）。\n\n第二个方法是析构函数，在对象销毁时运行。当这种情况发生时，你需要释放`array`对象以避免内存泄漏。\n\
    \n接下来的两个方法实现了`add`和`size`操作。它们只是围绕`NSMutableArray`类中相应功能的简单封装。\n\n这个类可以如下使用：\n\
    \n```objc\n- (void) useMyCollection\n{\n    MyCollection * c = new MyCollection;\n\
    \    c->add(@\"test 1\");\n    c->add(@\"test 2\");\n    NSLog(@\"the size is\
    \ %d\", c->size());\n    // 这会打印 \"the size is 2\"\n}\n```\n\n**注意：** 带有 C++ 结构的\
    \ Objective-C 经常使用不同的语法提供相同的功能。因此，我不建议混合使用这两种语言，除非你非常清楚想要达到什么目的。大多数情况下，程序员混合使用\
    \ Objective-C 和 C++ 是为了能够访问两种语言的库。即使如此，也请尝试评估你的项目，看看是否有其他替代方案来在同一个代码库中使用这两种语言。\n"
- fmt: "# Summary\n\nIn this chapter, you learned about the Objective-C compiler,\
    \ the most important tool for software development for Mac OS X and iOS. The compiler\
    \ is responsible for reading your source code and translating it into executable\
    \ code, normally stored in a format that can be directly run by the processor.\n\
    \nThe current compiler for the Objective-C language, LLVM clang, has a number\
    \ of options that affect the qualities of the resulting output. Attributes such\
    \ as the speed of the binary code, its size, or the inclusion of debugging information\
    \ are defined by options passed to the compiler during the compilation process.\
    \ It is important that, as an Objective-C developer, you become familiar with\
    \ the options that affect the result of programs in the C and Objective-C languages.\n\
    \nA feature of the Objective-C compiler is that it is able to recognize not only\
    \ plain-C and Objective-C syntax, but also C++ as well. This means that you can\
    \ mix code using both languages to take advantage of the best features of both.\
    \ Xcode can be used to generate correct results when you create files with the\
    \ `.mm` extension.\n\nWhile the compiler is a very important tool for programming\
    \ development, in the Objective-C world it doesn’t generate its output without\
    \ the help of other tools. An important tool that is closely associated with the\
    \ Objective-C compiler is the preprocessor. The preprocessor runs in an initial\
    \ phase that prepares the source to be seen and processed by the compiler. While\
    \ these days the preprocessor is rarely used as a separate program, it is still\
    \ useful to understand the rules of how it works and performs the initial code\
    \ preparation. This is the main topic of the next chapter, where you will learn\
    \ about the features of the Objective-C preprocessor.\n\n# 13. The Preprocessor\n\
    \n## Abstract\n\nObjective-C comes with a powerful preprocessor that can simplify\
    \ the input of repetitive code into a program. For example, the preprocessor can\
    \ be used to import header files, which are used to make class definitions available\
    \ to other parts of the application. The preprocessor is also used to define macros,\
    \ which can work both as constants or to perform simple substitution based on\
    \ arguments.\n\nDespite all its functionality, however, the preprocessor may be\
    \ the source of numerous programming pitfalls if you are not careful with its\
    \ usage. Due to the fact that the substitutions performed in the preprocessing\
    \ stage are not immediately checked by the compiler, there is the possibility\
    \ of introducing faulty code by means of subtle interactions between the elements\
    \ introduced by the preprocessor.\n\nIn this chapter, I present the main features\
    \ of the preprocessor and show you how to avoid some of its rough edges. You will\
    \ first learn in detail how the preprocessor works and the additional tools it\
    \ makes available to Objective-C programmers. In the first section, I will explain\
    \ how macros work and how they can be used to define new symbols and parameter-based\
    \ substitutions. You will also learn about some common pitfalls of macros and\
    \ how to avoid them. Next, you will see the facilities available in Objective-C\
    \ for including header files. Handling file inclusion is one of the most important\
    \ tasks performed by the preprocessor, and you will see how it is performed, as\
    \ well as the options you have to control the process.\n\n## Defining Macros\n\
    \nOne of the important tasks of the preprocessor is to define symbolic names for\
    \ values commonly used in a program. For example, suppose that you have an algorithm\
    \ that processes file paths, and in a particular platform the file path has a\
    \ limit of 255 characters. This can be represented with the help of a new macro,\
    \ like so:\n\n`#define MAX_PATH_LENGTH 255`\n\nThe syntax is composed of just\
    \ the `#define` and a macro name, followed by whatever symbol or expression you\
    \ want to use (you will see later what to do when the expression is longer than\
    \ a single line). The macro definition mechanism in the Objective-C preprocessor\
    \ is based on literal substitution. This means that whenever the preprocessor\
    \ sees the defined symbol, it performs the substitution with the value that was\
    \ supplied during definition, like so:\n\n```\n- (BOOL)checkPathSize:(NSString\
    \ *)path\n{\n    if ([path length] > MAX_PATH_LENGTH)\n    {\n        NSLog(@\"\
    Error: the path length is invalid\");\n        return NO;\n    }\n    return YES;\n\
    }\n```\n\nAs used in the example above, macro names behave like variables, but\
    \ there are some important differences. First, the substitution happens even before\
    \ the code is compiled. That is, the compiler itself never sees the symbol `MAX_PATH_LENGTH`,\
    \ only the resulting substitution. Thus, there is no memory associated with a\
    \ macro symbol, unlike variables, which are usually stored in memory, and you\
    \ can manipulate their memory content using operators such as `&`.\n\nAnother\
    \ consequence of the way macros are processed is that they can do more than substitute\
    \ for constant values. For example, while not recommended, the following kind\
    \ of code is valid (and has even been used by some programmers in the old days):\n\
    \n```\n#define BEGIN {\n#define END }\nvoid myFunction(int val)\nBEGIN\n    if\
    \ (val > 0)\n    BEGIN\n        NSLog(@\"value is positive\");\n    END\nEND\n\
    ```\n\nThis is possible because the processor blindly performs macro substitutions,\
    \ and the compiler will only deal with the result of these substitutions after\
    \ they are completed.\n\nTo avoid surprises when dealing with macro substitutions,\
    \ C and Objective-C have a convention saying that macros should be named in uppercase,\
    \ so as to distinguish them from normal symbols. This may not solve all the problems\
    \ that can be generated by macros, but at least it can alert the programmer that\
    \ you’re dealing with a preprocessed symbol instead of a normal variable."
  raw: '## Summary


    In this chapter, you learned about the Objective-C compiler, the most important
    tool for software development for Mac OS X and iOS. The compiler is responsible
    for reading your source code and translating it into executable code, normally
    stored in a format that can be directly run by the processor.


    The current compiler for the Objective-C language, LLVM clang, has a number of
    options that affect the qualities of the resulting output. Attributes such as
    the speed of the binary code, its size, or the inclusion of debugging information
    are defined by options passed to the compiler during the compilation process.
    It is important that, as an Objective-C developer, you become familiar with the
    options that affect the result of programs in the C and Objective-C languages.


    A feature of the Objective-C compiler is that it is able to recognize not only
    plain-C and Objective-C syntax, but also C++ as well. This means that you can
    mix code using both languages to take advantage of the best features of both.
    Xcode can be used to generate correct results when you create files with the `.mm`
    extension.


    While the compiler is a very important tool for programming development, in the
    Objective-C world it doesn’t generates its output without the help of other tools.
    An important tool that is closely associated with the Objective-C compiler is
    the preprocessor. The preprocessor runs in an initial phase that prepares the
    source to be seen and processed by the compiler. While these days the preprocessor
    is rarely used as a separate program, it is still useful to understand the rules
    of how it works and performs the initial code preparation. This is the main topic
    of the next chapter, where you will learn about the features of the Objective-C
    preprocessor.


    # 13. The Preprocessor


    Abstract


    Objective-C comes with a powerful preprocessor that can simplify the input of
    repetitive code into a program. For example, the preprocessor can be used to import
    header files, which are used to make class definitions available to other parts
    of the application. The preprocessor is also used to define macros, which can
    work both as constants or to perform simple substitution based on arguments.


    Objective-C comes with a powerful preprocessor that can simplify the input of
    repetitive code into a program. For example, the preprocessor can be used to import
    header files, which are used to make class definitions available to other parts
    of the application. The preprocessor is also used to define macros, which can
    work both as constants or to perform simple substitution based on arguments.


    Despite all its functionality, however, the preprocessor may be the source of
    numerous programming pitfalls if you are not careful with its usage. Due to the
    fact that the substitutions performed in the preprocessing stag are not immediately
    checked by the compiler, there is the possibility of introducing faulty code by
    means of subtle interactions between the elements introduced by the preprocessor.


    In this chapter, I present the main features of the preprocessor and show you
    how to avoid some of its rough edges. You will first learn in detail how the preprocessor
    works and the additional tools it makes available to Objective-C programmers.
    In the first section, I will explain how macros work and how they can be used
    to define new symbols and parameter-based substitutions. You will also learn about
    some common pitfalls of macros and how to avoid them. Next, you will see the facilities
    available in Objective-C for including header files. Handling file inclusion is
    one of the most important tasks performed by the preprocessor, and you will see
    how it is performed, as well as the options you have to control the process.


    ## Defining Macros


    One of the important tasks of the preprocessor is to define symbolic names for
    values commonly used in a program. For example, suppose that you have an algorithm
    that processes file paths, and in a particular platform the file path has a limit
    of 255 characters. This can be represented with the help of a new macro, like
    so:


    `#define MAX_PATH_LENGTH 255`


    The syntax is composed of just the `#define` and a macro name, followed by whatever
    symbol or expression you want to use (you will see later what to do when the expression
    is longer than a single line). The macro definition mechanism in the Objective-C
    preprocessor is based on literal substitution. This means that whenever the preprocessor
    sees the defined symbol, it performs the substitution with the value that was
    supplied during definition, like so:


    `- (BOOL)checkPathSize:(NSString *)path`


    `{`


            `if ([path length] > MAX_PATH_LENGTH )`


            `{`


                    `NSLog(@"Error: the path length is invalid");`


                    `return NO;`


            `}`


            `return YES;`


    `}`


    As used in the example above, macro names behave like variables, but there are
    some important differences. First, the substitution happens even before the code
    is compiled. That is, the compiler itself never sees the symbol `MAX_PATH_LENGTH`,
    only the resulting substitution. Thus, there is no memory associated with a macro
    symbol, unlike variables, which are usually stored in memory, and you can manipulate
    their memory content using operators such as `&`.


    Another consequence of the way macros are processed is that they can do more than
    substitute for constant values. For example, while not recommended, the following
    kind of code is valid (and has even been used by some programmers in the old days):


    `#define BEGIN {`


    `#define END }`


    `void myFunction(int val)`


    `BEGIN`


            `if (val > 0)`


            `BEGIN`


                    `NSLog(@"value is positive");`


            `END`


    `END`


    This is possible because the processor blindly performs macro substitutions, and
    the compiler will only deal with the result of these substitutions after they
    are completed.


    To avoid surprises when dealing with macro substitutions, C and Objective-C have
    a convention saying that macros should be named in uppercase, so as to distinguish
    them from normal symbols. This may not solve all the problems that can be generated
    by macros, but at least it can alert the programmer that you’re dealing with a
    preprocessed symbol instead of a normal variable.'
  trans: "\n# 总结\n\n在本章中，你学习了 Objective-C 编译器，这是 Mac OS X 和 iOS 软件开发中最重要的工具。编译器负责读取你的源代码并将其转换为可执行代码，这些代码通常以处理器可直接运行的格式存储。\n\
    \n当前用于 Objective-C 语言的编译器 LLVM clang 拥有许多影响最终输出质量的选项。诸如二进制代码的*速度*、*大小*，或是否包含*调试信息*等属性，均由编译过程中传递给编译器的选项定义。作为\
    \ Objective-C 开发者，熟悉这些影响 C 语言和 Objective-C 语言程序结果的选项非常重要。\n\nObjective-C 编译器的一个特性是，它不仅能识别纯\
    \ C 和 Objective-C 语法，还能识别 C++ 语法。这意味着你可以混合使用两种语言的代码，以充分利用它们的最佳特性。当你创建扩展名为 `.mm`\
    \ 的文件时，Xcode 可以用来生成正确的结果。\n\n虽然编译器是编程开发中非常重要的工具，但在 Objective-C 的世界里，它无法在没有其他工具帮助的情况下生成输出。与\
    \ Objective-C 编译器紧密相关的一个重要工具是**预处理器**。预处理器在初始阶段运行，负责准备源代码以供编译器查看和处理。虽然如今预处理器很少作为独立程序使用，但理解其工作规则以及如何执行初始代码准备仍然非常有用。这将是下一章的主要内容，届时你将学习\
    \ Objective-C 预处理器的特性。\n\n# 13. 预处理器\n\n## 摘要\n\nObjective-C 配备了一个功能强大的预处理器，它可以简化将重复代码输入程序的过程。例如，预处理器可用于导入头文件，这些头文件用于使类定义对应用程序的其他部分可用。预处理器还用于定义宏，这些宏既可以作为常量使用，也可以根据参数执行简单的替换。\n\
    \n然而，尽管预处理器功能强大，如果使用不慎，它也可能成为众多编程陷阱的源头。由于预处理阶段执行的替换不会立即被编译器检查，因此存在通过预处理器引入的元素之间微妙的交互而导致产生错误代码的可能性。\n\
    \n在本章中，我将介绍预处理器的主要特性，并展示如何避免其一些粗糙的边缘问题。你将首先详细了解预处理器的工作原理以及它为 Objective-C 程序员提供的额外工具。在第一部分中，我将解释宏是如何工作的，以及如何使用它们来定义新符号和基于参数的替换。你还将了解宏的一些常见陷阱以及如何避免它们。接下来，你将看到\
    \ Objective-C 中用于包含头文件的工具。处理文件包含是预处理器执行的最重要任务之一，你将了解它是如何执行的，以及你有哪些选项来控制这个过程。\n\
    \n## 定义宏\n\n预处理器的首要任务之一是为程序中常用的值定义符号名称。例如，假设你有一个处理文件路径的算法，并且在某个特定平台上，文件路径有 255\
    \ 个字符的限制。这可以通过定义一个新宏来表示，如下所示：\n\n`#define MAX_PATH_LENGTH 255`\n\n该语法仅由 `#define`\
    \ 和一个宏名称组成，后跟你想要使用的任何符号或表达式（稍后你将看到当表达式长于一行时该如何处理）。Objective-C 预处理器中的宏定义机制基于字面替换。这意味着，每当预处理器看到已定义的符号时，它都会用定义期间提供的值进行替换，如下所示：\n\
    \n```\n- (BOOL)checkPathSize:(NSString *)path\n{\n    if ([path length] > MAX_PATH_LENGTH)\n\
    \    {\n        NSLog(@\"错误：路径长度无效\");\n        return NO;\n    }\n    return\
    \ YES;\n}\n```\n\n如上面的示例所示，宏名称的行为类似于变量，但存在一些重要区别。首先，替换甚至在代码编译之前就发生了。也就是说，编译器本身从未见过符号\
    \ `MAX_PATH_LENGTH`，只看到最终的替换结果。因此，宏符号不与任何内存相关联，这与变量不同，变量通常存储在内存中，你可以使用诸如 `&` 之类的运算符操作其内存内容。\n\
    \n宏处理方式的另一个后果是，它们可以做的远不止替换常量值。例如，虽然不推荐，但以下类型的代码是有效的（甚至在早期曾被一些程序员使用过）：\n\n```\n\
    #define BEGIN {\n#define END }\nvoid myFunction(int val)\nBEGIN\n    if (val >\
    \ 0)\n    BEGIN\n        NSLog(@\"值为正\");\n    END\nEND\n```\n\n这是可能的，因为处理器盲目地执行宏替换，而编译器只会在这些替换完成后处理其结果。\n\
    \n为了避免处理宏替换时出现意外，C 和 Objective-C 有一项约定：宏名称应全部大写，以便与普通符号区分开来。这可能无法解决所有由宏产生的问题，但至少可以提醒程序员你正在处理的是一个预处理符号，而不是普通变量。\n"
- fmt: "### Macros with Parameters\n\nAnother feature of macros is that they can also\
    \ take parameters, with a syntax that is similar to function calls. To declare\
    \ a macro that receives two parameters and returns the largest one, for example,\
    \ you can use the following code:\n\n```\n#define MAXIMUM(a, b) (a) > (b) ? (a)\
    \ : (b)\n```\n\nThis says that the macro `MAXIMUM` has two parameters, and its\
    \ substitution value comes after the declaration. Using the ternary operator,\
    \ the macro checks the two values passed as parameters. When the first value is\
    \ greater than the second, it is returned; otherwise the macro returns the second\
    \ value.\n\nThe general syntax for macros with parameters is a macro name right\
    \ after the `#define` directive, followed by the parameters between parentheses.\
    \ Unlike functions, the parameters are not typed, so you can enter anything you\
    \ want as arguments, including variables, keywords, or operators, for instance.\n\
    \nThe body of the macro follows right after the list of parameters. You can use\
    \ any expression in the body. Unlike a function, a macro is not compiled the first\
    \ time it is seen. The macro’s body is only used when it is needed for a substitution.\
    \ When that happens, the preprocessor will make the parameter replacements and\
    \ paste the result at the location of the occurrence. Only after this process\
    \ occurs will the compiler have a chance of checking the contents of the macro.\n\
    \nMacros cannot be split into multiple lines as functions can. However, the preprocessor\
    \ recognizes the backslash character (`\\`) as a line continuation mark. Therefore,\
    \ you can enter multiline macros, as long as each line that needs to be joined\
    \ to the next is terminated by a backslash. For example, using the rule for joining\
    \ adjacent lines, the previous macro can also be written as:\n\n```\n#define MAXIMUM(a,\
    \ b) \\\n   (a) > (b) ? \\\n         (a) : \\\n         (b)\n```\n\nNotice how\
    \ each line is terminated by a backslash, except for the last line, which indicates\
    \ the end of the macro.\n\n### Macro Operators\n\nAnother peculiarity of macros\
    \ is that they provide their own operators, which can perform useful transformations\
    \ when used on parameterized macros. These operators are supplied as a way of\
    \ simplifying common tasks that are often needed when putting macro substitutions\
    \ together.\n\nThe first operator is the string conversion transformation, also\
    \ known as stringify because it converts any value or expression passed as a parameter\
    \ into a C-style null terminated string.\n\nThe string conversion operator uses\
    \ a leading `#` character to indicate that the following macro parameter will\
    \ be converted into a string. Here is an example:\n\n```\n#define EXP_TRUE(expr)\
    \ \\\nif (expr) \\\nNSLog(@\"the following expression is true: %s\", #expr)\n\
    ```\n\nThis macro can be used to determine if an expression evaluates to a true\
    \ value. It does this by simply using an `if` statement where the test argument\
    \ is used as the expression itself. If such an expression evaluates to true, then\
    \ the logging statement is called and the stringify operator will convert whatever\
    \ expression was passed as a parameter into a string, which will then be sent\
    \ to the logging terminal.\n\nYou can pass to this macro any expression that evaluates\
    \ to `YES` or `NO`. For example, consider the following function:\n\n```\n- (void)\
    \ useMacro\n{\nEXP_TRUE(2 + 3 > 4);\n}\n```\n\nHere, the expression used by the\
    \ preprocessor is composed of the whole contents between parentheses. The preprocessor\
    \ will find the macro name `EXP_TRUE`, substitute the required parameter with\
    \ the expression passed as argument, and paste the result into the same location\
    \ in the output source file. Then, when the expression `#expr` is seen by the\
    \ preprocessor, it triggers a transformation into a null-terminated string. The\
    \ result of the macro processing is therefore the following:\n\n```\n- (void)\
    \ useMacro\n{\nif (2 + 3 > 4)\nNSLog(@\"the following expression is true: %s\"\
    , \"2 + 3 > 4\");\n}\n```\n\nAs you can see, the ability of the preprocessor to\
    \ convert generic expressions into strings can be very useful for debugging purposes.\
    \ For example, a commonly used standard macro is `assert`; contained in the header\
    \ file `assert.h`, it determines if a given expression is true. If not, then the\
    \ program stops and a message is printed saying that the assertion failed. The\
    \ `assert` macro is very useful to diagnose exceptional conditions as soon as\
    \ they happen.\n\n```\n- (double)squareRoot:(double) x\n{\nassert(x > 0);\n//\
    \ perform calculations here\n}\n```\n\nThis code checks that `x` is a positive\
    \ number before doing anything else. If the parameter is incorrect, the program\
    \ will stop immediately.\n\nAnother operator that is less frequently used is the\
    \ concatenation operator (`##`). This operator is used when you provide two symbols,\
    \ and its goal is to create a new symbol that is the concatenation of them. The\
    \ main use of the concatenation operator is to create unique names, which are\
    \ sometimes necessary when working with complex macros. Here is a simple example\
    \ of its usage:\n\n```\n#define VARIABLE_NAME(partA, partB) \\\npartA ## _ ##\
    \ partB\n```\n\nThis macro just pastes together the two parameters, separated\
    \ by an underscore, into a new symbol. The macro can then be used as follows:\n\
    \n```\n- (void)useMacroConcatenation\n{\nint VARIABLE_NAME(my, variable) = 10;\n\
    NSLog(@\"the value is %d\", my_variable);\n}\n```\n\nNotice that, in the first\
    \ line, the `VARIABLE_NAME` macro creates a new variable name that is composed\
    \ of two parts. These parts are named as `partA` and `partB` in the macro definition.\
    \ In this sample application, the result is the variable name defined as the first\
    \ part, followed by an underscore, and concatenated to a second part. You can\
    \ clearly see that this happened as desired when the composite name is used in\
    \ the next line as argument to `NSLog`, which will print the value 10, as currently\
    \ stored in the variable.\n\nSimilar to the `#define` directive, the preprocessor\
    \ also provides `#undef`, which is capable of removing the definition of a macro\
    \ from memory. This is useful when you want to guarantee that a macro is not in\
    \ use in a particular segment of the code. Another use case would be to redefine\
    \ the value of an existing macro, such as after executing the following line through\
    \ the preprocessor:\n\n```\n#undef VARIABLE_NAME\n```\n\nYou can now be sure that\
    \ the symbol `VARIABLE_NAME` is free, and it can be defined in a different way\
    \ if needed."
  raw: '### Macros with Parameters


    Another feature of macros is that they can also take parameters, with a syntax
    that is similar to function calls. To declare a macro that receives two parameters
    and returns the largest one, for example, you can use the following code:


    `#define MAXIMUM(a, b) (a) > (b) ? (a) : (b)`


    This says that the macro `MAXIMUM` has two parameters, and its substitution value
    comes after the declaration. Using the ternary operator, the macro checks the
    two values passed as parameters. When the first value is greater than the second,
    it is returned; otherwise the macro returns the second value.


    The general syntax for macros with parameters is a macro name right after the
    `#define` directive, followed by the parameters between parentheses. Unlike functions,
    the parameters are not typed, so you can enter anything you want as arguments,
    including variables, keywords, or operators, for instance.


    The body of the macro follows right after the list of parameters. You can use
    any expression in the body. Unlike a function, a macro is not compiled the first
    time it is seen. The macro’s body is only used when it is needed for a substitution.
    When that happens, the preprocessor will make the parameter replacements and paste
    the result at the location of the occurrence. Only after this process occurs will
    the compiler have a chance of checking the contents of the macro.


    Macros cannot be split into multiple lines as functions can. However, the preprocessor
    recognizes the backslash character (`\)` as a line continuation mark. Therefore,
    you can enter multiline macros, as long as each line that needs to be joined to
    the next is terminated by a backslash. For example, using the rule for joining
    adjacent lines, the previous macro can also be written as


    `#define MAXIMUM(a, b) \`


       `(a) > (b) ? \`


             `(a) : \`


             `(b)`


    Notice how each line is terminated by a backslash, except for the last line, which
    indicates the end of the macro.


    ### Macro Operators


    Another peculiarity of macros is that they provide their own operators, which
    can perform useful transformations when used on parameterized macros. These operators
    are supplied as a way of simplifying common tasks that are often needed when putting
    macro substitutions together.


    The first operator is the string conversion transformation, also known as stringify
    because it converts any value or expression passed as a parameter into a C-style
    null terminated string.


    The string conversion operator uses a leading # character to indicate that the
    following macro parameter will be converted into a string. Here is an example:


    `#define EXP_TRUE(expr) \`


    `if (expr) \`


    `NSLog(@"the following expression is true: %s", #expr)`


    This macro can be used to determine if an expression evaluates to a true value.
    It does this by simply using an `if` statement where the test argument is used
    as the expression itself. If such an expression evaluates to true, then the logging
    statement is called and the stringify operator will convert whatever expression
    was passed as a parameter into a string, which will then be sent to the logging
    terminal.


    You can pass to this macro any expression that evaluates to `YES` or `NO`. For
    example, consider the following function:


    `- (void) useMacro`


    `{`


    `EXP_TRUE(2 + 3 > 4);`


    `}`


    Here, the expression used by the preprocessor is composed of the whole contents
    between parentheses. The preprocessor will find the macro name `EXP_TRUE`, substitute
    the required parameter with the expression passed as argument, and paste the result
    into the same location in the output source file. Then, when the expression `#expr`
    is seen by the preprocessor, it triggers a transformation into a null-terminated
    string. The result of the macro processing is therefore the following:


    `- (void) useMacro`


    `{`


    `if (2 + 3 > 4)`


    `NSLog(@"the following expression is true: %s", "2 + 3 > 4");`


    `}`


    As you can see, the ability of the preprocessor to convert generic expressions
    into strings can be very useful for debugging purposes. For example, a commonly
    used standard macro is `assert`; contained in the header file `assert.h`, it determines
    if a given expression is true. If not, then the program stops and a message is
    printed saying that the assertion failed. The `assert` macro is very useful to
    diagnose exceptional conditions as soon as they happen.


    `- (double)squareRoot:(double) x`


    `{`


    `assert(x > 0);`


    `// perform calculations here`


    `}`


    This code checks that x is a positive number before doing anything else. If the
    parameter is incorrect, the program will stop immediately.


    Another operator that is less frequently used is the concatenation operator (`##`).
    This operator is used when you provide two symbols, and its goal is to create
    a new symbol that is the concatenation of them. The main use of the concatenation
    operator is to create unique names, which are sometimes necessary when working
    with complex macros. Here is a simple example of its usage:


    `#define VARIABLE_NAME(partA, partB) \`


    `partA ## _ ## partB`


    This macro just pastes together the two parameters, separated by an underscore,
    into a new symbol. The macro can then be used as follows:


    `- (void)useMacroConcatenation`


    `{`


    `int VARIABLE_NAME(my, variable) = 10;`


    `NSLog(@"the value is %d", my_variable);`


    `}`


    Notice that, in the first line, the`VARIABLE_NAME` macro creates a new variable
    name that is composed of two parts. These parts are named as `partA` and `partB`
    in the macro definition. In this sample application, the result is the variable
    name defined as the first part, followed by an underscore, and concatenated to
    a second part. You can clearly see that this happened as desired when the composite
    name is used in the next line as argument to `NSLog`, which will print the value
    10, as currently stored in the variable.


    Similar to the #define directive, the preprocessor also provides `#undef`, which
    is capable of removing the definition of a macro from memory. This is useful when
    you want to guarantee that a macro is not in use in a particular segment of the
    code. Another use case would be to redefine the value of an existing macro, such
    as after executing the following line through the preprocessor:


    `#undef VARIABLE_NAME`


    You can now be sure that the symbol `VARIABLE_NAME` is free, and it can be defined
    in a different way if needed.'
  trans: "\n### 带参数的宏\n\n宏的另一个特性是可以带参数，其语法与函数调用类似。例如，要声明一个接收两个参数并返回较大值的宏，可以使用以下代码：\n\
    \n```\n#define MAXIMUM(a, b) (a) > (b) ? (a) : (b)\n```\n\n这表示宏 `MAXIMUM` 有两个参数，其替换值位于声明之后。该宏使用三元运算符来检查作为参数传递的两个值。当第一个值大于第二个值时，返回第一个值；否则，宏返回第二个值。\n\
    \n带参数宏的通用语法是，在 `#define` 指令之后紧跟宏名，然后是放在括号中的参数。与函数不同，参数没有类型，因此你可以输入任何内容作为实参，例如变量、关键字或运算符。\n\
    \n宏的主体紧跟在参数列表之后。你可以在主体中使用任何表达式。与函数不同，宏在首次被看到时并不会被编译。宏的主体仅在进行替换时才被使用。当替换发生时，预处理器会替换参数，并将结果粘贴到宏出现的位置。只有在完成此过程之后，编译器才有机会检查宏的内容。\n\
    \n宏不能像函数那样跨越多行。然而，预处理器将反斜杠字符 (`\\`) 识别为续行标志。因此，只要需要连接到下一行的每一行都以反斜杠结尾，你就可以编写多行宏。例如，使用相邻行连接规则，之前的宏也可以写成：\n\
    \n```\n#define MAXIMUM(a, b) \\\n   (a) > (b) ? \\\n         (a) : \\\n      \
    \   (b)\n```\n\n请注意，除了表示宏结束的最后一行外，每一行都以反斜杠结尾。\n\n### 宏运算符\n\n宏的另一个特性是提供了自己的运算符，这些运算符在用于带参宏时可以执行有用的转换。提供这些运算符是为了简化在组合宏替换时经常需要的常见任务。\n\
    \n第一个运算符是字符串转换转换，也称为字符串化（stringify），因为它将作为参数传递的任何值或表达式转换为 C 风格的以空字符结尾的字符串。\n\n\
    字符串转换运算符使用一个前导的 `#` 字符来指示接下来的宏参数将被转换为字符串。下面是一个例子：\n\n```\n#define EXP_TRUE(expr)\
    \ \\\nif (expr) \\\nNSLog(@\"the following expression is true: %s\", #expr)\n\
    ```\n\n这个宏可以用来判断一个表达式的计算结果是否为真值。它通过简单地使用一个 `if` 语句来实现，其中测试参数被用作表达式本身。如果这样的表达式计算结果为真，则会调用日志记录语句，并且字符串化运算符将把作为参数传递的任何表达式转换为一个字符串，然后发送到日志终端。\n\
    \n你可以向这个宏传递任何计算结果为 `YES` 或 `NO` 的表达式。例如，考虑下面的函数：\n\n```\n- (void) useMacro\n{\n\
    EXP_TRUE(2 + 3 > 4);\n}\n```\n\n这里，预处理器使用的表达式由括号内的全部内容组成。预处理器会找到宏名 `EXP_TRUE`，用作为实参传递的表达式替换所需的参数，并将结果粘贴到输出源文件中的相同位置。然后，当预处理器看到表达式\
    \ `#expr` 时，会触发将其转换为一个以空字符结尾的字符串。宏处理的结果如下：\n\n```\n- (void) useMacro\n{\nif (2\
    \ + 3 > 4)\nNSLog(@\"the following expression is true: %s\", \"2 + 3 > 4\");\n\
    }\n```\n\n正如你所见，预处理器将通用表达式转换为字符串的能力对于调试目的非常有用。例如，一个常用的标准宏是 `assert`；它包含在头文件 `assert.h`\
    \ 中，用于判断一个给定的表达式是否为真。如果不是，程序将停止并打印一条断言失败的消息。`assert` 宏在异常情况发生时立即诊断它们非常有用。\n\n\
    ```\n- (double)squareRoot:(double) x\n{\nassert(x > 0);\n// 在此处执行计算\n}\n```\n\n\
    这段代码在执行任何其他操作之前检查 `x` 是否为正数。如果参数不正确，程序将立即停止。\n\n另一个不太常用的运算符是连接运算符 (`##`)。当你提供两个符号时，会用到此运算符，其目标是创建一个新符号，该符号是这两个符号连接的结果。连接运算符的主要用途是创建唯一名称，这在处理复杂宏时有时是必要的。以下是其用法的一个简单示例：\n\
    \n```\n#define VARIABLE_NAME(partA, partB) \\\npartA ## _ ## partB\n```\n\n这个宏仅仅将两个参数（中间用下划线分隔）粘贴在一起，形成一个新的符号。然后，可以如下使用该宏：\n\
    \n```\n- (void)useMacroConcatenation\n{\nint VARIABLE_NAME(my, variable) = 10;\n\
    NSLog(@\"the value is %d\", my_variable);\n}\n```\n\n请注意，在第一行中，`VARIABLE_NAME`\
    \ 宏创建了一个由两部分组成的新变量名。在宏定义中，这些部分被命名为 `partA` 和 `partB`。在这个示例应用中，结果是一个变量名，它由第一部分、后跟一个下划线、再连接到第二部分组成。当在下一行中将这个组合名称作为参数传递给\
    \ `NSLog` 时，你可以清楚地看到这一操作如预期般发生了，`NSLog` 将打印当前存储在变量中的值 10。\n\n与 `#define` 指令类似，预处理器也提供了\
    \ `#undef`，它能够从内存中移除宏的定义。当你想确保在代码的某个特定段中不使用某个宏时，这很有用。另一个用例是重新定义现有宏的值，例如在通过预处理器执行以下行之后：\n\
    \n```\n#undef VARIABLE_NAME\n```\n\n现在你可以确信符号 `VARIABLE_NAME` 是空闲的，如果需要，可以用不同的方式重新定义它。\n"
- fmt: "### Common Pitfalls\n\nUsing macros with parameters may be a fast and useful\
    \ mechanism in some situations, but you should be warned against using it frequently.\
    \ Here are a few reasons.\n\nFirst, it is difficult to diagnose compilation problems\
    \ with macros. Since the whole body of the macro is substituted before proper\
    \ compilation starts, there is no way for the compiler to accurately tell what\
    \ is going on. When a compilation error occurs inside a macro substitution, you\
    \ will usually see only a reference to the line, with an actual error that has\
    \ little to do with the contents of that line. Modern compiler may improve on\
    \ this issue, but diagnostics are still more difficult to perform on macros than\
    \ in normal code.\n\nDebugging macros is also a difficult task, in part because\
    \ of the compilation issues described above. This gives you limited options when\
    \ working with a debugger, for example, since it is not possible to find the exact\
    \ line in a macro where something is going wrong. A possible way to at least partially\
    \ solve this issue is to generate a preprocessed file and verify its output. You\
    \ can do this in Xcode by going to the menu Product ➤ Generate Output ➤ Generate\
    \ Preprocessed file. The resulting file is usually very large because it includes\
    \ all header files imported via the `#include` or `#import` directives. But it\
    \ may be useful to locate the exact transformations introduced by the preprocessor.\n\
    \nA related issue is that a macro can manipulate its parameters in a way that\
    \ doesn’t result in valid C or Objective-C code. For example, consider the `MAXIMUM`\
    \ macro presented above and the code that is substituted when you use it in the\
    \ following way:\n\n```\n- (void)useMacro\n{\n    int i = 10;\n    NSLog(@\"the\
    \ maximum is %d\", MAXIMUM(11, i++));\n}\n```\n\nThe problem with this code is\
    \ that the macro `MAXIMUM` is using the argument `i++` in two places of its definition.\
    \ While the natural response for the value of `MAXIMUM` with the arguments displayed\
    \ above should be 11, the reality is that the operation `i++` is evaluated twice.\
    \ This means that, in this case, the printed result will be different from the\
    \ expected. In other situations, not only can this happen but also the results\
    \ may even become undefined, causing bugs that are difficult to fix.\n\n**Note**\n\
    \nAs you can see in the previous example, macros increase the risk that their\
    \ arguments will be evaluated incorrectly. While it is possible to avoid some\
    \ of these problems by creating temporary variables, for example, the best strategy\
    \ is to avoid using macros whenever possible. If necessary, avoid passing expression\
    \ as macro arguments, unless they have been designed for this purpose.\n\n## Conditional\
    \ Compilation\n\nAnother important use of macros is to define conditional compilation\
    \ statements, which will be processed by the compiler only when some compile-time\
    \ condition is true. These conditional operations are different from normal conditionals\
    \ such as the `if` statement because they operate even before the compiler starts\
    \ its work.\n\n### The #if Directive\n\nFor instance, the `#if` directive can\
    \ be used to define sections of code that will be processed only when a particular\
    \ compile-time condition is true. Usually, the condition involves a simple arithmetic\
    \ comparison, and the following lines of code are passed to the compiler only\
    \ if the condition evaluates to true. All such lines are included until the next\
    \ `#endif` directive is found. Here is an example:\n\n```\n- (int) getSupportLevel\n\
    {\n#if VERSION > 5\n    return 2;\n#endif\n#if VERSION >= 2 && VERSION <= 5\n\
    \    return 1;\n#endif\n#if VERSION < 2\n    return 0;\n#endif\n}\n```\n\nIn this\
    \ method, the level of support in the application is defined based on the value\
    \ of the `VERSION` macro. The tests occur during compilation time, and only one\
    \ of the options will ever be true. As a result, one of the support levels (0,\
    \ 1, or 2) will be returned by the method `getSupportLevel`.\n\nThe `#if` directive\
    \ can also be followed by an `#elif` directive. By analogy with `#if`, the `#elif`\
    \ directive is similar to an `else if` statement, but evaluated at compile time.\
    \ Finally, the `#if` or `#elif` directives can also be followed by an `#else`\
    \ directive, which includes the lines that should be compiled only when the previous\
    \ tests are false. Considering these additional directives, you can more clearly\
    \ write the previous example using `#elif` and `#else`:\n\n```\n- (int) getSupportLevel\n\
    {\n#if VERSION > 5\n    return 2;\n#elif VERSION >= 2 && VERSION <= 5\n    return\
    \ 1;\n#else\n    return 0;\n#endif\n}\n```\n\n### The #ifdef Directive\n\nIn other\
    \ cases, the condition that you want to test for compilation may involve the definition\
    \ of other existing macros. This is commonly the case when a macro is used to\
    \ signify the presence of a particular feature. For example, the GCC compiler\
    \ predefines the macro `__GNUC__` so that you can detect when a program is being\
    \ compiled by GCC. Other compilers and compiler features have similarly defined\
    \ macros that can be used for conditional compilation.\n\nYou can write code that\
    \ will be compiled only when a particular macro is defined by using the `#ifdef`\
    \ and `#ifndef` directives. The first one is similar to an `#if`, but it checks\
    \ only if the symbol entered directly after has been defined in the current file.\
    \ Similarly, the `#ifndef` looks at the macro symbol following it and will execute\
    \ the next lines if the symbol has not been defined. Here is an example:\n\n```\n\
    - (void) detectGCCCompiler\n{\n#ifdef __GCC__\n    NSLog(@\"This is the GCC compiler\"\
    );\n#endif\n#ifndef __GCC__\n    NSLog(@\"This is not the GCC compiler\");\n#endif\n\
    }\n```\n\nAnother way to test if a symbol has been defined is by using the `defined`\
    \ macro operator. This operator is useful when you want to create more complicated\
    \ tests.\n\n```\n- (BOOL) systemIsSupported\n{\n#if defined(__GCC__) && VERSION\
    \ > 3\n    return YES;\n#else\n    return NO;\n#endif\n}\n```\n\n**Note**\n\n\
    To define a preprocessor symbol you have at least two options: use a `#define`\
    \ directive to introduce the macro, or use the `-D` option in the GCC (or LLVM)\
    \ compiler. For example, using `-DIS_DEBUG_VERSION` will define the macro symbol\
    \ `IS_DEBUG_VERSION`. Xcode also allows a preprocessor symbol to be defined in\
    \ its project settings screen, but this is later translated into a `-D` option\
    \ to the compiler."
  raw: '### Common Pitfalls


    Using macros with parameters may be a fast and useful mechanism in some situations,
    but you should be warned against using it frequently. Here are a few reasons.


    First, it is difficult to diagnose compilation problems with macros. Since the
    whole body of the macro is substituted before proper compilation starts, there
    is no way for the compiler to accurately tell what is going on. When a compilation
    error occurs inside a macro substitution, you will usually see only a reference
    to the line, with an actual error that has little to do with the contents of that
    line. Modern compiler may improve on this issue, but diagnostics are still more
    difficult to perform on macros than in normal code.


    Debugging macros is also a difficult task, in part because of the compilation
    issues described above. This gives you limited options when working with a debugger,
    for example, since it is not possible to find the exact line in a macro where
    something is going wrong. A possible way to at least partially solve this issue
    is to generate a preprocessed file and verify its output. You can do this in Xcode
    by going to the menu Product ➤ Generate Output ➤ Generate Preprocessed file. The
    resulting file is usually very large because it includes all header files imported
    via the`#include` or `#import` directives. But it may be useful to locate the
    exact transformations introduced by the preprocessor.


    A related issue is that a macro can manipulate its parameters in a way that doesn’t
    result in valid C or Objective-C code. For example, consider the `MAXIMUM` macro
    presented above and the code that is substituted when you use it in the following
    way:


    `- (void)useMacro`


    `{`


            `int i = 10;`


            `NSLog(@"the maximum is %d", MAXIMUM(11, i++));`


    `}`


    The problem with this code is that the macro `MAXIMUM` is using the argument `i++`
    in two places of its definition. While the natural response for the value of `MAXIMUM`
    with the arguments displayed above should be 11, the reality is that the operation
    `i++` is evaluated twice. This means that, in this case, the printed result will
    be different from the expected. In other situations, not only can this happen
    but also the results may even become undefined, causing bugs that are difficult
    to fix.


    Note


    As you can see in the previous example, macros increase the risk that their arguments
    will be evaluated incorrectly. While it is possible to avoid some of these problems
    by creating temporary variables, for example, the best strategy is to avoid using
    macros whenever possible. If necessary, avoid passing expression as macro arguments,
    unless they have been designed for this purpose.


    ## Conditional Compilation


    Another important use of macros is to define conditional compilation statements,
    which will be processed by the compiler only when some compile-time condition
    is true. These conditional operations are different from normal conditionals such
    as the `if` statement because they operate even before the compiler starts its
    work.


    ### The #if Directive


    For instance, the `#if` directive can be used to define sections of code that
    will be processed only when a particular compile-time condition is true. Usually,
    the condition involves a simple arithmetic comparison, and the following lines
    of code are passed to the compiler only if the condition evaluates to true. All
    such lines are included until the next `#endif` directive is found. Here is an
    example:


    `- (int) getSupportLevel`


    `{`


    `#if VERSION > 5`


            `return 2;`


    `#endif`


    `#if VERSION >= 2 && VERSION <= 5`


            `return 1;`


    `#endif`


    `#if VERSION < 2`


            `return 0;`


    `#endif`


    `}`


    In this method, the level of support in the application is defined based on the
    value of the `VERSION` macro. The tests occur during compilation time, and only
    one of the options will ever be true. As a result, one of the support levels (0,
    1, or 2) will be returned by the method `getSupportLevel`.


    The `#if` directive can also be followed by an `#elif` directive. By analogy with
    `#if`, the `#elif` directive is similar to an `else if` statement, but evaluated
    at compile time. Finally, the `#if` or `#elif` directives can also be followed
    by an `#else` directive, which includes the lines that should be compiled only
    when the previous tests are false. Considering these additional directives, you
    can more clearly write the previous example using `#elif` and `#else`:


    `- (int) getSupportLevel`


    `{`


    `#if VERSION > 5`


            `return 2;`


    `#elif VERSION >= 2 && VERSION <= 5`


            `return 1;`


    `#else`


            `return 0;`


    `#endif`


    `}`


    ### The #ifdef Directive


    In other cases, the condition that you want to test for compilation may involve
    the definition of other existing macros. This is commonly the case when a macro
    is used to signify the presence of a particular feature. For example, the GCC
    compiler predefines the macro `__GNUC__` so that you can detect when a program
    is being compiled by GCC. Other compilers and compiler features have similarly
    defined macros that can be used for conditional compilation.


    You can write code that will be compiled only when a particular macro is defined
    by using the `#ifdef` and `#ifndef` directives. The first one is similar to an
    `#if`, but it checks only if the symbol entered directly after has been defined
    in the current file. Similarly, the `#ifndef` looks at the macro symbol following
    it and will execute the next lines if the symbol has not been defined. Here is
    an example:


    `- (void) detectGCCCompiler`


    `{`


    `#ifdef __GCC__`


            `NSLog(@"This is the GCC compiler");`


    `#endif`


    `#ifndef __GCC__`


            `NSLog(@"This is not the GCC compiler");`


    `#endif`


    `}`


    Another way to test if a symbol has been defined is by using the `defined` macro
    operator. This operator is useful when you want to create more complicated tests.


    `- (BOOL) systemIsSupported`


    `{`


    `#if defined(__GCC__) && VERSION > 3`


            `return YES;`


    `#else`


            `return NO;`


    `#endif`


    `}`


    Note


    To define a preprocessor symbol you have at least two options: use a `#define`
    directive to introduce the macro, or use the `–D` option in the GCC (or LLVM)
    compiler. For example, using –`DIS_DEBUG_VERSION` will define the macro symbol
    IS_`DEBUG_VERSION`. Xcode also allows a preprocessor symbol to be defined in its
    project settings screen, but this is later translated into a `–D` option to the
    compiler.'
  trans: "\n### 常见陷阱\n\n在某些情况下，使用带参数的宏可能是一种快速且有用的机制，但应该提醒你不要频繁地使用它。以下是几个原因。\n\n首先，宏导致的问题难以诊断。由于宏的整个主体在真正的编译开始之前就被替换了，编译器无法准确地判断发生了什么。当宏替换内部发生编译错误时，你通常只会看到对某行的引用，而实际的错误与该行的内容关系不大。现代编译器可能在此问题上有所改进，但宏的诊断仍然比普通代码困难得多。\n\
    \n调试宏也是一项艰巨的任务，部分原因在于上述编译问题。例如，这限制了你在调试器中的选择，因为你无法精确定位宏中出错的准确行。一个至少能部分解决此问题的可能方法是生成预处理文件并验证其输出。你可以在\
    \ Xcode 中通过菜单 **Product** ➤ **Generate Output** ➤ **Generate Preprocessed file**\
    \ 来完成此操作。生成的文件通常非常大，因为它包含了所有通过 `#include` 或 `#import` 指令导入的头文件。但它可能有助于定位预处理器引入的确切转换。\n\
    \n一个相关的问题是，宏操作其参数的方式可能会导致生成的代码不符合有效的 C 或 Objective-C 代码规范。例如，考虑上面介绍的 `MAXIMUM`\
    \ 宏，以及当你以下列方式使用它时代码被替换的情况：\n\n```\n- (void)useMacro\n{\n    int i = 10;\n    NSLog(@\"\
    the maximum is %d\", MAXIMUM(11, i++));\n}\n```\n\n这段代码的问题在于，宏 `MAXIMUM` 在其定义的两个地方使用了参数\
    \ `i++`。虽然对于上述参数，`MAXIMUM` 的值自然的预期结果是 11，但实际情况是操作 `i++` 被计算了两次。这意味着，在这种情况下，打印的结果将与预期不符。在其他情况下，不仅可能发生这种情况，甚至可能导致结果未定义，从而引发难以修复的\
    \ bug。\n\n**注**\n\n正如你在前一个例子中所见，宏增加了参数被错误计算的风险。虽然可以通过创建临时变量等方式来避免部分问题，但最佳策略是尽可能避免使用宏。如果必须使用，除非参数是为此目的设计的，否则应避免将表达式作为宏参数传递。\n\
    \n## 条件编译\n\n宏的另一个重要用途是定义条件编译语句，这些语句只有当某些编译时条件为真时才会被编译器处理。这些条件操作与普通条件语句（如 `if`\
    \ 语句）不同，因为它们在编译器开始工作之前就已经执行。\n\n### #if 指令\n\n例如，`#if` 指令可用于定义只有在特定编译时条件为真时才被处理的代码段。通常，条件涉及一个简单的算术比较，只有当条件评估为真时，其后的代码行才会被传递给编译器。所有这些行都会被包含在内，直到遇到下一个\
    \ `#endif` 指令。示例如下：\n\n```\n- (int) getSupportLevel\n{\n#if VERSION > 5\n    return\
    \ 2;\n#endif\n#if VERSION >= 2 && VERSION <= 5\n    return 1;\n#endif\n#if VERSION\
    \ < 2\n    return 0;\n#endif\n}\n```\n\n在此方法中，应用程序的支持级别是基于 `VERSION` 宏的值来定义的。这些检查发生在编译时，并且只有一个选项会为真。因此，方法\
    \ `getSupportLevel` 将返回一个支持级别（0、1 或 2）。\n\n`#if` 指令后面也可以跟一个 `#elif` 指令。类比 `#if`，`#elif`\
    \ 指令类似于 `else if` 语句，但它在编译时求值。最后，`#if` 或 `#elif` 指令后面也可以跟一个 `#else` 指令，它包含了仅当之前的检查为假时才应该编译的行。考虑到这些额外的指令，你可以使用\
    \ `#elif` 和 `#else` 更清晰地重写之前的示例：\n\n```\n- (int) getSupportLevel\n{\n#if VERSION\
    \ > 5\n    return 2;\n#elif VERSION >= 2 && VERSION <= 5\n    return 1;\n#else\n\
    \    return 0;\n#endif\n}\n```\n\n### #ifdef 指令\n\n在其他情况下，你想要测试的编译条件可能涉及其他已存在宏的定义。当宏用于表示某个特定功能是否存在时，这种情况很常见。例如，GCC\
    \ 编译器预定义了宏 `__GNUC__`，以便你可以检测程序是否正在被 GCC 编译。其他编译器和编译器特性也类似地定义了可用于条件编译的宏。\n\n你可以使用\
    \ `#ifdef` 和 `#ifndef` 指令编写仅在特定宏被定义时才会被编译的代码。前者类似于 `#if`，但它只检查紧跟其后的符号是否已在当前文件中被定义。类似地，`#ifndef`\
    \ 检查其后的宏符号，如果该符号尚未被定义，则执行后续代码行。示例如下：\n\n```\n- (void) detectGCCCompiler\n{\n#ifdef\
    \ __GCC__\n    NSLog(@\"This is the GCC compiler\");\n#endif\n#ifndef __GCC__\n\
    \    NSLog(@\"This is not the GCC compiler\");\n#endif\n}\n```\n\n另一种测试某个符号是否被定义的方法是使用\
    \ `defined` 宏运算符。当你想要创建更复杂的测试时，这个运算符非常有用。\n\n```\n- (BOOL) systemIsSupported\n\
    {\n#if defined(__GCC__) && VERSION > 3\n    return YES;\n#else\n    return NO;\n\
    #endif\n}\n```\n\n**注**\n\n要定义一个预处理器符号，你至少有两个选择：使用 `#define` 指令引入宏，或者在 GCC（或 LLVM）编译器中使用\
    \ `-D` 选项。例如，使用 `-DIS_DEBUG_VERSION` 将定义宏符号 `IS_DEBUG_VERSION`。Xcode 也允许在其项目设置界面中定义预处理器符号，但这最终会被转换为传递给编译器的\
    \ `-D` 选项。\n"
- fmt: '# The Import Mechanism


    One of the main uses of the preprocessor is to insert the necessary definitions
    for elements employed by a particular source file. For example, you have learned
    that when creating a class you should have a header file with the class interface
    definition (with extension `.h`) and an implementation file with method implementations
    for that class. The header for a class needs to be imported into an implementation
    file whenever the class is used.


    There are two ways to import header files into an implementation file. The first
    way is to use the `#include` mechanism. The `#include` directive is present in
    both C and Objective-C. It provides the basic functionality of inserting the contents
    of the referred files into the current source file. Thus, you can benefit from
    the several libraries available in the Objective-C standard library, as well as
    from external libraries.


    The `#include` mechanism is used primarily in C libraries because it is the only
    available with the C (and C++) language, and it requires additional work for defining
    new header files. To use `#include`, you just need to say which header file you
    need to access, like so:


    `#include <stdio.h>`


    This will import the contents of the standard I/O C library into you program.
    Using this library, you can call functions such as `printf` (printing facility)
    or `fopen` (open a file).


    Defining files that can be `#include`d into a file requires a little more preparation.
    Here is the standard organization of a header file that is imported using `#include`:


    ```

    #ifndef INCLUDED_MYFILE

    #define INCLUDED_MYFILE

    // file contents here

    #endif

    ```


    Here, `INCLUDED_MYFILE` is a unique identifier that is used only in this header
    file. At first this structure may seem unnatural, but its main goal is to avoid
    processing the same header multiple times for the same source file. For this purpose,
    each header file has its own unique symbol that is defined at the top. Usually
    the name of the macro symbol is derived from the file name. Thus, if the file
    is called `Employee.h`, the inclusion macro might be named `INCLUDED_EMPLOYEE_H`.


    The result of this schema is simple to interpret: first, check if the unique symbol
    has been defined. If not, first define the symbol, and then compile the contents
    of the header file. If the symbol is already defined, however, this means that
    it is the not the first time the preprocessor has visited the current file. Therefore,
    the contents of the header file will be skipped, avoiding multiple inclusions.


    The second way to include files is unique to Objective-C, and it is implemented
    with the `#import` directive. The main difference between `#import` and `#include`
    is the fact that the first one will automatically take care of multiple inclusions,
    and therefore won’t need the conditional macro inclusion scheme explained above.


    With `#import`, the preprocessor has an internal database, so that it already
    knows which files have been previously processed. This technique guarantees that
    a file will be processed only once. As a result, you don’t need to use conditional
    compilation tricks, such as the one explained above.


    The `#import` and `#include` directives can have files specified in two ways:
    the file name can be enclosed in angle brackets or in double quotes. The difference
    between these two methods of defining the imported file is the way the file name
    will be searched. When you use angle brackets, the implicit assumption is that
    the preprocessor will search on all system include directories. These directories
    can be determined by a combination of system settings. For example, you can get
    them listed in the Xcode include path configuration tool. Or you can have such
    directories added to the GCC/LLVM command line interface with the `–I` option.


    On the other hand, you can use double quotes to delimiter the header file name.
    In that case, the implicit indication is that the preprocessor will search on
    the current directory for any file with the specified name. Therefore, the double
    quoted version can be used to input you own header files, which will compose the
    list of classes on your own project.


    In general, double quoted header names imply that the header is user-created.
    Similarly, header names delimited by angle brackets indicate that the file is
    part of the system or some other external library. It is important to maintain
    consistency in the use of these two options, so that you can avoid mistakes by
    always importing the correct header file.'
