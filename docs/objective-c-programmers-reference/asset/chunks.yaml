- fmt: "```objectivec\n[self setNeedsDisplay:YES];\n}\n_clickedNode = 0;\n}\n```\n\
    \nThe `mouseUp:` method responds to mouse events sent to the `GraphView`. This\
    \ method will first get the location where the mouse was clicked, using the `locationInWindow`\
    \ method of `NSEvent`. Then, the code proceeds to update the nodes and edges if\
    \ there was a clicked node. First, the zoom factor from the slide control is applied\
    \ and the position of the node is updated. Then, the position of each connected\
    \ edge is also updated. The superposed graph is also updated, when available.\
    \ Finally, the method calls the internal `moveNode:to:` method and redraws the\
    \ view.\n\n```objectivec\n- (void)mouseDragged:(NSEvent *)theEvent\n{\n    NSPoint\
    \ loc = [self convertPoint:[theEvent locationInWindow] fromView:nil];\n    if\
    \ (_clickedNode) {\n        [self moveNode:_clickedNode to:loc];\n        [self\
    \ setNeedsDisplay:YES];\n    }\n}\n```\n\nThe `mouseDragged:` method is called\
    \ when the mouse has moved while the user is pressing the mouse button. In this\
    \ view, you use the `moveNode:to:` method to give an instant feedback when a node\
    \ was clicked. Then the method calls the `setNeedsDisplay` method to redraw the\
    \ view.\n\n```objectivec\n-(void)setBezierPaths\n{\n    [path removeAllPoints];\n\
    \    G = [Document getGraph];\n    if (G) {\n        int n = gr_nverts(G);\n \
    \       if (_associatedPoints && n > _nPoints) {\n            Delete(_associatedPoints);\n\
    \            _associatedPoints = 0;\n        }\n        if (!_associatedPoints)\
    \ {\n            _associatedPoints = NewVec(int, n);\n            if (!_associatedPoints)\
    \ {\n                printf(\"error creating vector of associated points\\n\"\
    );\n                return;\n            }\n            _nPoints = n;\n      \
    \  }\n        [self addGraphToPath];\n    }\n    [sg_path removeAllPoints];\n\
    \    sG = [Document getSobreposedGraph];\n    if (sG) {\n        [self addSobreposedGraphToPath];\n\
    \    }\n}\n```\n\nThe `setBezierPaths` is used to initialize all the paths in\
    \ the view. A Bezier path is an object that determines how a path will be drawn\
    \ by Cocoa. You can use Bezier paths to draw complex paths, including lines, rectangles,\
    \ circles, and arcs. You just need to set up the Bezier path and ask the path\
    \ to be drawn on the view after it has been constructed. This method is setting\
    \ up the internal Bezier path to draw each of the lines it needs to display the\
    \ graph on the screen.\n\n```c\n// this function is called for each edge, and\
    \ data has the required information\nstatic int draw_the_edge(graph_node *graph_node,\
    \ int a, int b, void *data)\n{\n    // reads data and unpack it\n    struct for_each_edge_data\
    \ *myData = (struct for_each_edge_data*) data;\n    Graph *G = myData->G;\n  \
    \  NSBezierPath *path = myData->path;\n    //\n    // adds the position (in the\
    \ path) of point to the data associated to this\n    // edge of the graph so that\
    \ we remember it later.\n    int *point = (int*)malloc(int,sizeof(int));\n   \
    \ *point = [path elementCount];\n    gr_set_data(G, a, b, point, 1);\n    //\n\
