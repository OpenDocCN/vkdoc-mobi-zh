    ## Testing with the iOS Simulator


    The iOS Simulator is an important tool for mobile development. The main problem
    it solves is that, unlike desktop applications, you cannot run the software you’re
    creating directly on the same machine where the IDE and the compiler are running.
    A common option is to use a device connected to the desktop. To allow for easier
    testing, however, Apple has released a simulator for iOS devices, as shown in
    Figure [17-4](#A978-1-4302-5906-0_17_Chapter.html#Fig4).


    ![A978-1-4302-5906-0_17_Fig4_HTML.jpg](A978-1-4302-5906-0_17_Fig4_HTML.jpg)


    Figure 17-4.


    The iOS Simulator in iPhone mode, running a sample application


    The iOS Simulator can be used to test most of the aspects of an application, such
    as memory management issues and simple UI interaction, without having to load
    the app into a real iOS device. Also, the simulator allows you to run the app
    in several simulated devices and find possible issues that would be harder to
    track if you had to manually install your app on several different iPhones and
    iPads.


    To start the simulator, you can use the scheme selection tool located on the main
    toolbar. Make sure that you select the simulator scheme you want, either iPhone
    or iPad, in the scheme selection tool. Depending on the type of app you created
    when choosing a new iOS project, you default choice may be the iPhone or the iPad,
    unless you already have a real device connected to your Mac.


    After the proper scheme is selected, you can select Product ➤ Run from the main
    menu (or press the Command+R keyboard shortcut) to run the project. This will
    start the iOS Simulator if it is not already active. Xcode will transfer your
    app to the directory location used by the simulator, and you application will
    be started.


    The simulator has several options that control how the simulated hardware behaves.
    At the most basic level, you can define what kind of device is being simulated.
    You can choose between the iPhone and the iPad when selecting the schema used
    on Xcode. Once the simulator has started, you have additional options to select
    the specific hardware configuration you want to test. For example, suppose that
    you started with the simulator for the iPhone. Then, you can select the menu Hardware
    ➤ Device and select one of the configurations from the list. For example, my version
    of the iOS Simulator has the following options:


    *   iPad

    *   iPad (Retina)

    *   iPhone

    *   iPhone (Retina 3.5-inch)

    *   iPhone (Retina 4-inch)


    Your options may be different, depending on the particular release of the simulator.
    You can also select the iOS version used, such as 5.1 or 6.0, under the menu option
    Hardware ➤ Version.


    Another thing you can vary in your tests using the simulator is the orientation
    of the device. This allows you to determine if rotation is being correctly handled
    by your code. You can simulate rotation by clicking on the menu Hardware ➤ Rotate
    Right (or using the key combination Command+→), or Hardware ➤ Rotate Left (key
    combination Command+←). You can also simulate pressing some of the buttons that
    are unique to the iPhone and iPad, such as the Home button (Shift+Command+H) and
    the Lock button (Command+L).


    Finally, you can also simulate some special conditions that occur only on such
    mobile devices. First, you can use the app to pretend that a low memory condition
    was reached. This allows you to detect possible problems in the handling of memory
    problems that might go undetected until such a low memory situation occurs. You
    can also use the simulator to fake an in-call, so you can see if your app would
    have a problem with switching from a call to the normal flow of the program and
    vice versa.


    ## An Example iOS Application


    I conclude this chapter with a complete example of an iOS application. This sample
    app simulates a list of index cards that can be helpful for students learning
    topics for an exam or acquiring new words in a foreign language.


    The main UI for the app is simple, with buttons for the next and previous index
    card, and an option to reveal the hidden information for the card. The app also
    supports playing a sound file for each index card; this can be a useful method
    for memorization.


    In the next sections, I will introduce each of the main files in the application.
    After each method, I explain what it does, when it is called, and which objects
    are used in the implementation. After you go through this application, you will
    have a good idea of how such apps are organized and how they interact with the
    Cocoa Touch libraries. For the complete files for the sample app, check the web
    page from this book on my web site at [`http://coliveira.net`](http://coliveira.net/)
    .


    ### The Main File


    The main file for the app is responsible for initializing the Cocoa Touch libraries
    and running the main loop. This is not difficult to do, however, since you can
    use the `UIApplicationMain`. The only other work is to make sure that the autorelease
    pool for the application has been initialized. This is done by called `alloc`/`init`
    on class `NSAutoreleasePool`.


    `//`


    `// main.m`


    `#import <UIKit/UIKit.h>`


    `int main(int argc, char *argv[])`


    `{`


        `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


        `int retVal = UIApplicationMain(argc, argv, nil, nil);`


        `[pool release];`


        `return retVal;`


    `}`'
  trans: "\n*   `Bundle Identifier`：表示应用程序的标识符，用作唯一 ID，可在 App Store 中跟踪你的应用。\n*  \
    \ `Version`：应用的版本号在 App Store 中可见，创建新版本时应进行更新。我没有空间描述将应用添加到 App Store 的流程，但你可以使用\
    \ [`developer.apple.com`](http://developer.apple.com/) 上的在线资源来熟悉相关要求。\n*   `Devices`：使用此选项确定应用将针对\
    \ iPhone、iPad 还是两者。你也可以先从一个设备开始，之后根据需要再添加对另一类设备的支持。\n*   `Deployment Target`：使用此选项确定\
    \ iOS 的目标版本。运行较旧 iOS 版本的设备可能无法运行针对最新版本开发的软件。另一方面，选择较新的目标版本可以使用更高级的功能。\n*   `Supported\
    \ Interface Orientations`：使用此选项为你的应用选择有效的方向。\n*   `Status Bar`：使用此选项定义状态栏是否可见。如果可见，你可以选择其颜色和样式。\n\
    *   `App Icons`：你可以定义显示在设备上的图标。图标在 iOS 上比在 Mac OS X 上更重要，因为它们是用户从主屏幕访问你的应用的主要方式。如果你计划将应用提交到\
    \ App Store，则必须提供图标。\n*   `Launch Images`：这些图像用于在应用程序加载前为用户提供快速反馈。因此，如果你在初始化期间需要更多时间，启动图像将提供一个反映应用外观的初始屏幕。\n\
    \n## 使用 iOS 模拟器进行测试\n\niOS 模拟器是移动开发的重要工具。它解决的主要问题是，与桌面应用不同，你无法直接在运行 IDE 和编译器的同一台机器上运行你正在创建的软件。一个常见的选项是使用连接到桌面的设备。然而，为了便于测试，Apple\
    \ 发布了 iOS 设备模拟器，如图 17-4 所示。\n\n![A978-1-4302-5906-0_17_Fig4_HTML.jpg](img/A978-1-4302-5906-0_17_Fig4_HTML.jpg)\n\
    \n图 17-4.\n\niPhone 模式下的 iOS 模拟器，运行一个示例应用程序\n\niOS 模拟器可用于测试应用的大部分方面，例如内存管理问题和简单的\
    \ UI 交互，而无需将应用加载到真实的 iOS 设备中。此外，模拟器允许你在多个模拟设备上运行应用，并找到一些可能的问题，如果你必须手动将应用安装到多个不同的\
    \ iPhone 和 iPad 上，这些问题将更难追踪。\n\n要启动模拟器，你可以使用主工具栏上的方案选择工具。确保在方案选择工具中选择了你想要的模拟器方案，无论是\
    \ iPhone 还是 iPad。根据你在创建新 iOS 项目时选择的应用类型，你的默认选择可能是 iPhone 或 iPad，除非你的 Mac 上已经连接了真实设备。\n\
    \n选择好适当的方案后，你可以从主菜单中选择 **Product** ➤ **Run**（或按下 `Command+R` 键盘快捷键）来运行项目。如果 iOS\
    \ 模拟器尚未启动，这将会启动它。Xcode 会将你的应用传输到模拟器使用的目录位置，然后你的应用将启动。\n\n模拟器有多个选项，用于控制模拟硬件的行为方式。在最基本的层面，你可以定义模拟的设备类型。在\
    \ Xcode 中选择方案时，你可以选择 iPhone 或 iPad。模拟器启动后，你还有其他选项来选择要测试的特定硬件配置。例如，假设你以 iPhone\
    \ 的模拟器启动。然后，你可以选择菜单 **Hardware** ➤ **Device**，并从列表中选择一种配置。例如，我使用的 iOS 模拟器版本有以下选项：\n\
    \n*   iPad\n*   iPad (Retina)\n*   iPhone\n*   iPhone (Retina 3.5-inch)\n*   iPhone\
    \ (Retina 4-inch)\n\n根据你使用的模拟器具体版本，你的选项可能会有所不同。你还可以在菜单选项 **Hardware** ➤ **Version**\
    \ 下选择使用的 iOS 版本，例如 5.1 或 6.0。\n\n使用模拟器进行测试时，你还可以改变的另一个方面是设备的方向。这使你能够确定你的代码是否正确处理了旋转。你可以通过点击菜单\
    \ **Hardware** ➤ **Rotate Right**（或使用组合键 `Command+→`）或 **Hardware** ➤ **Rotate\
    \ Left**（组合键 `Command+←`）来模拟旋转。你还可以模拟按下 iPhone 和 iPad 特有的一些按钮，例如 Home 键（`Shift+Command+H`）和锁定键（`Command+L`）。\n\
    \n最后，你还可以模拟一些仅在移动设备上发生的特殊情况。首先，你可以使用该应用来假装达到了内存不足的状态。这使你可以检测在处理内存问题时的潜在问题，这些问题直到发生低内存情况时可能才被发现。你还可以使用模拟器模拟来电，这样你就可以看到你的应用在从通话切换到正常程序流程以及相反情况下是否会出现问题。\n\
    \n## 一个 iOS 应用示例\n\n我以一个完整的 iOS 应用示例来结束本章。这个示例应用模拟了一个索引卡列表，可以帮助学生准备考试主题或学习外语新单词。\n\
    \n该应用的主 UI 很简单，包含用于上一张和下一张索引卡的按钮，以及一个用于显示卡片隐藏信息的选项。该应用还支持为每张索引卡播放音效文件；这是一个有助于记忆的有用方法。\n\
    \n在接下来的几节中，我将介绍应用中的每个主要文件。在每个方法之后，我会解释它的作用、何时被调用以及实现中使用了哪些对象。在你看完这个应用之后，你将清楚地了解此类应用是如何组织的，以及它们如何与\
    \ Cocoa Touch 库交互。有关示例应用的完整文件，请查看我网站上本书的网页 [`http://coliveira.net`](http://coliveira.net/)。\n\
    \n### 主文件\n\n应用的主文件负责初始化 Cocoa Touch 库并运行主循环。然而，这并不困难，因为你可以使用 `UIApplicationMain`。唯一需要做的其他工作是确保应用程序的自动释放池已被初始化。这是通过对\
    \ `NSAutoreleasePool` 类调用 `alloc`/`init` 来完成的。\n\n```\n//\n// main.m\n#import\
    \ <UIKit/UIKit.h>\n\nint main(int argc, char *argv[])\n{\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n    int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);\n    [pool release];\n    return retVal;\n}\n```\n"
- fmt: "### The `MainViewController` Interface\n\nIt is the responsibility of a view\
    \ controller to determine how its corresponding view will respond to events that\
    \ are directed to it. The interface of the `MainViewController` declares a number\
    \ of slots (with the keyword `IBOutlet`) and actions (with the keyword `IBAction`),\
    \ so that the UI can send messages to this object when new events occur.\n\n```\n\
    #import \"FlipsideViewController.h\"\n\n@interface MainViewController : UIViewController\
    \ <FlipsideViewControllerDelegate>\n\n{\n        IBOutlet UIView *wordView;\n\
    \        IBOutlet UILabel *lbWord;\n        IBOutlet UILabel *lbTranslation;\n\
    \        IBOutlet UIButton *btBuy;\n        IBOutlet UIButton *btPlay;\n     \
    \   IBOutlet UIView* ad;\n}\n\n- (IBAction)showInfo:(id)sender;\n- (IBAction)playSound:(id)sender;\n\
    - (IBAction)showPrevious:(id)sender;\n- (IBAction)showNext:(id)sender;\n- (IBAction)shuffle:(id)sender;\n\
    - (IBAction)review:(id)sender;\n- (IBAction)buyClicked:(id)sender;\n+ (void)syncIsFreeVersion:(BOOL)setValue;\n\
    + (void)refreshTopLevelViewController;\n\n@end\n```\n\n### The `MainViewController`\
    \ Implementation\n\nThe `MainViewController` implementation defines how the controller\
    \ for the main view interacts with the system. This file implements all the actions\
    \ that are called from the UI, such as moving to the next and previous card, revealing\
    \ the contents of the card, and playing a sound.\n\n```\n//\n// file: MainViewController.m\n\
    #import \"MainViewController.h\"\n#import \"InfoView.h\"\n#import \"PurchaseController.h\"\
    \n#import <AVFoundation/AVFoundation.h>\n\n@implementation MainViewController\n\
    \nint currentPos = 0;\n\nstruct words\n{\n    NSString *word, *translation, *file;\n\
    } words[] = {\n    { @\"Ajuda\", @\"Help\", nil },\n    { @\"Almoço\", @\"Lunch\"\
    \ , @\"Almoco\"},\n    { @\"Restaurante\", @\"Restaurant\", nil},\n    { @\"Rua\"\
    , @\"Street\", nil},\n    { @\"Semana\", @\"Week\", nil},\n    { @\"Supermercado\"\
    , @\"Supermarket\", nil},\n    { @\"Viagem\", @\"Travel\", nil},\n};\n```\n\n\
    This simple application presents an index card interface, with words on one side\
    \ of the card and definitions on the other side. This structure is used to maintain\
    \ the list of words and definitions. A more complex application could store these\
    \ definitions on a database, but this works enough as a data source for your purposes.\
    \ The third element of the structure is a file name, where you will store the\
    \ name of a sound file if it is not the same as the original word.\n\n```\n#define\
    \ maxWords sizeof(words)/sizeof(*words)\nint perm[maxWords];\n\nstatic MainViewController\
    \ *ui_controller = nil;\n\n- (void) refreshWord\n{\n    CGFloat d = 0.9;\n   \
    \ [UIView animateWithDuration:d animations:^{ wordView.alpha = 0.0; }\n    completion:^(BOOL\
    \ finished){\n        int pos = perm[currentPos];\n        lbWord.text = words[pos].word;\n\
    \        lbTranslation.text = words[pos].translation;\n        lbTranslation.hidden\
    \ = YES;\n    }];\n    [UIView animateWithDuration:d animations:^{ wordView.alpha\
    \ = 1.0; }\n    completion:nil];\n}\n```\n\nThe method `refreshWord` is responsible\
    \ for redrawing the current view with a transition. To do this, you use a simple\
    \ animation performed with the help of a block. The method `animateWithDuration:animations:completion:`\
    \ takes as parameter the total duration in seconds and two blocks: the first,\
    \ which performs the transitional animation, and the second, which determines\
    \ the final state of the transition.\n\nThe animation, in this case, changes the\
    \ alpha value of the view, which indicates the transparency. When these animations\
    \ are run, they give the visual impression of fading, with the definition of the\
    \ current word revealed at the end.\n\n```\n- (IBAction)showNext:(id)sender\n\
    {\n    currentPos = (currentPos + 1 == maxWords) ? 0 : currentPos + 1;\n    [self\
    \ refreshWord];\n}\n\n- (IBAction) showPrevious:(id)sender\n{\n    currentPos\
    \ = (currentPos == 0) ? maxWords - 1 : currentPos - 1;\n    [self refreshWord];\n\
    }\n```\n\nThese two methods control the current position in the list of index\
    \ cards. The `showNext:` method moves to the next available index card in the\
    \ list. The `showPrevious:` method returns to the previous position available.\
    \ Both methods redraw the screen using the fading effect you saw previously with\
    \ the `refreshWord` method.\n\n```\n- (UILabel*) makeLabel:(NSString*)title width:(CGFloat)w\n\
    height:(CGFloat)h top:(CGFloat)t\n{\n    CGFloat vw = wordView.frame.size.width;\n\
    \    CGRect r = CGRectMake(vw/2 - w/2, t, w, h);\n    UILabel *l = [[[UILabel\
    \ alloc] initWithFrame:r] autorelease];\n    l.text = title;\n    l.textAlignment\
    \ = UITextAlignmentCenter;\n    l.backgroundColor = [UIColor colorWithRed:1 green:1\
    \ blue:1 alpha:0.0];\n    return l;\n}\n```\n\nThe `makeLabel:width:height:top:`\
    \ method creates and returns a new label object, of type `UILabel`. First, the\
    \ information passed as parameters is used to initialize the `CGRect` structure\
    \ that determines the location and dimensions of the control. Then, a new `UILabel`\
    \ is created. The label is initialized with the given title, which is center-aligned.\
    \ The background color is set to white using the `colorWithRed:green:blue:alpha:`\
    \ method of the `UIColor` class.\n\n```\n- (void)resetAdPosition:(UIView *)adView\n\
    {\n    CGRect adrect = [adView frame];\n```"
