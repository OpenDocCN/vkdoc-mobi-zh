    ## `NSData`


    `NSData` 是一个通用类，为任意类型的数据提供了一个封装容器。例如，这些数据可以通过 C 风格的字节数组进行存储。`NSData` 负责维护其包含的数据的存储。其最重要的功能是定义了一个基于面向对象（OO）的接口，可用于，例如，将数据传递给其他对象，或将数据存储在标准容器中。以下是
    `NSData` 所实现的方法列表：

    '
- fmt: '- `- (NSUInteger)length`: 返回`NSData`对象的长度。

    - `- (const void *)bytes`: 以C风格字节数组的形式返回`NSData`对象中存储的内容。

    - `- (NSString *)description`: 返回`NSData`对象的简短描述，通常用于调试目的。

    - `- (void)getBytes:(void *)buffer length:(NSUInteger)length`: 将`NSData`对象内部存储的字节复制到作为第一个参数传入的缓冲区中。要复制的最大字节数由`length`参数指定。

    - `- (void)getBytes:(void *)buffer range:(NSRange)range`: 将`NSData`对象中指定范围内的字节复制到作为第一个参数传入的缓冲区中。

    - `- (BOOL)isEqualToData:(NSData *)other`: 如果目标`NSData`对象与给定的`NSData`对象相等，则返回`YES`。

    - `- (NSData *)subdataWithRange:(NSRange)range`: 返回一个新的`NSData`对象，其中包含目标`NSData`中由`range`参数指定的一部分数据。

    - `- (BOOL)writeToFile:(NSString *)path atomically:(BOOL)useAuxiliaryFile`: 将`NSData`对象的内容写入由`path`参数指定的文件。如果`useAuxiliaryFile`为true，则会使用一个临时文件来存储数据传输的中间阶段。

    - `- (BOOL)writeToURL:(NSURL *)url atomically:(BOOL)atomically`: 将`NSData`对象的内容写入由给定URL指定的文件或网络资源。如果`useAuxiliaryFile`为true，则会使用一个临时文件来存储数据传输的中间阶段。

    - `- (BOOL)writeToFile:(NSString *)path options:(NSDataWritingOptions)writeOptionsMask
    error:(NSError **)errorPtr`: 将`NSData`对象的内容写入由给定路径指定的文件。如果`useAuxiliaryFile`为true，则会使用一个临时文件来存储数据传输的中间阶段。会使用数据写入选项，并在失败时返回一个错误对象。

    - `- (BOOL)writeToURL:(NSURL *)url options:(NSDataWritingOptions)writeOptionsMask
    error:(NSError **)errorPtr`: 将`NSData`对象的内容写入由给定URL指定的文件或网络资源。如果`useAuxiliaryFile`为true，则会使用一个临时文件来存储数据传输的中间阶段。会使用数据写入选项，并在失败时返回一个错误对象。

