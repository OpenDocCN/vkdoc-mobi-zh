  trans: "\n# 理解复杂块声明\n\n块不仅可以存储在局部变量中，还可以用作函数或方法的参数，甚至可以作为返回值。在这种情况下，块的声明会变得越来越复杂。例如，以下是一个与你之前见过的类似块作为参数的用法：\n\
    \n```\n- (void) useBlock:(double (^)(int, int))aBlock\n{\n        aBlock(1, 2);\n\
    }\n```\n\n你可以通过将 `(^)` 字符视为定义块，而周围的类型则是返回值和参数类型来解读此声明。与 Objective-C 方法中的任何其他参数一样，它们被包裹在一对圆括号内，后跟参数的正式名称，在此例中名为\
    \ `aBlock`。\n\n最后，是一个如何声明返回块的方法示例：\n\n```\n- (double (^)(int, int)) returnABlock\n\
    {\n        // 在此处返回块\n}\n```\n\n解读此类声明的过程与我在之前示例中解释的类似。然而，你会注意到，随着参数和返回值数量的增加，这可能会变得相当复杂。简化此过程的一种方法是使用\
    \ C 语言提供的 `typedef` 机制。\n\n`typedef` 只是较长类型声明的一种快捷方式。然而，尽管引入了一个新名称，但使用 `typedef`\
    \ 声明的类型在实际应用中与原始名称完全相同。`typedef` 的一个简单用法如下：\n\n```\ntypedef int MyNewIntType;\n\
    ```\n\n在这种情况下，`MyNewIntType` 现在可以像预期使用 `int` 类型一样，在任何地方用作类型名称。然而，`typedef` 的一个更好用途是简化复杂的块（以及函数指针）变量声明。以下是改进前一个示例的方法：\n\
    \n```\ntypedef double (^MathBlock)(int, double);\n\n- (void) divisionBlock\n{\n\
    \        MathBlock division; // 声明一个块\n        division = ^ (int a, double b)\n\
    \        {\n                return a / b;\n        };\n        double result =\
    \ division(1, 2);\n        NSLog(@\"the result is %lf\", result);\n        //\
    \ 这将打印结果为 0.500\n}\n```\n\n首先，这里有 `typedef` 语句，它将 `MathBlock` 声明为块类型的新名称。通常，在\
    \ `typedef` 表达式中，类型的新名称出现在变量名通常出现的位置。声明 `MathBlock` 后，你可以在任何需要该类型名称的地方使用它。使用 `typedef`\
    \ 的主要优点是无需重新键入像这样复杂的块定义。此外，它还使得在声明同一定义行上初始化块变得更加容易。例如，上述示例也可以写成：\n\n```\n- (void)\
    \ divisionBlock\n{\n        MathBlock division = ^ (int a, double b)\n       \
    \ {\n                return a / b;\n        };\n        double result = division(1,\
    \ 2);\n        NSLog(@\"the result is %lf\", result);\n        // 这将打印结果为 0.500\n\
    }\n```\n\n这允许你在此行声明时同时初始化该块。同一个 `typedef` 也可以用于方法参数的声明。因此，前一个示例可以重写为以下方式：\n\n\
    ```\ntypedef double (^DoubleIntIntBlock)(int, int);\n\n- (void) useBlock:(DoubleIntIntBlock)aBlock\n\
    {\n        aBlock(1, 2);\n}\n```\n\n并且返回值也类似：\n\n```\n- (DoubleIntIntBlock) returnABlock\n\
    {\n  // 在此处返回块\n}\n```\n\n## 将块作为参数传递\n\n如你所见，创建接收块作为参数的函数方法很容易。同样，将块作为参数传递给函数或方法也相对直接。例如，考虑之前定义的方法：\n\
    \n```\n- (void) useBlock:(DoubleIntIntBlock)aBlock;\n```\n\n要使用这样的方法，你可以先定义一个变量并将其作为参数传递，如下所示：\n\
    \n```\n- (void) callBlockMethod\n{\n        DoubleIntIntBlock myBlock;\n     \
    \   myBlock = ^ double (int a,int b)\n        {\n                NSLog(@\"传入的值是\
    \ %d 和 %d\", a, b);\n                return 1.0 + a + b;\n        };\n       \
    \ [self useBlock:myBlock];\n}\n```\n\n另一种方法是直接将块用作消息调用的一部分。\n\n```\n- (void) callBlockMethod\n\
    {\n        [self useBlock:^ double (int a,int b)\n        {\n                NSLog(@\"\
    传入的值是 %d 和 %d\", a, b);\n                return 1.0 + a + b;\n        }];\n}\n\
    ```\n\n在这里，你定义了一个未命名的块，并立即将其用作方法调用的唯一参数。该块作为参数传递给 `useBlock:` 方法，该方法可以直接调用它或保存起来以供后续使用。\n"
- fmt: "# Accessing External Variables\n\nOne of the features of blocks, which separates\
    \ that concept from standard function pointers, is that a block can have access\
    \ to variables that are in the enclosing sections of code. This makes the work\
    \ with blocks much easier, because there is less need to copy the value of variables\
    \ using either function parameters or additional classes. Blocks have by default\
    \ read-only access to local variables or instance variables accessible from the\
    \ location they are defined. It is also possible to modify such variables through\
    \ the use of the special keyword `__block`. The simplest case of data access is\
    \ read-only access of local variables. When creating a block, this is allowed\
    \ without any additional effort on the part of programmers.\n\n```\n- (void) showReadAcccess\n\
    \n{\n        int myVariable = 2;\n        int (^getMultiple)();\n        getMultiple\
    \ = ^ {\n           return 5 * myVariable ;\n        };\n        NSLog(@\"Here\
    \ is a the result: %d\", getMultiple());\n        // this should print the value\
    \ 10\n}\n```\n\nIn this example, you declare a variable called `myVariable`, which\
    \ contains an integer value. Then, you define a block, named `getMultiple`, which\
    \ returns a multiple of the value stored in `myVariable`. The log window should\
    \ then display the result of the computation as the block is called.\n\nA similar\
    \ kind of data access is possible for instance variables of the class where the\
    \ function is defined. For example, consider the following class declaration,\
    \ where there’s a single integer instance variable,\n\n```\n// file Blocks.h\n\
    @interface Blocks : NSObject\n{\n        int _myIntValue;\n}\n- (void) callBlockMethod;\n\
    @end\n```\n\nfollowed by an implementation,\n\n```\n- (void) showInstVarReadAcccess\n\
    {\n        _myIntValue = 3;\n        int (^getMultiple)();\n        getMultiple\
    \ = ^ {\n           return 6 * _myIntValue ;\n        };\n        NSLog(@\"Here\
    \ is a the result: %d\", getMultiple());\n        // this should print the value\
    \ 18\n}\n```\n\nThe method implementation is similar to the previous example,\
    \ but this time it shows how the block has easy access to the instance variable\
    \ `_myIntVariable`, which is part of the class. Of course, it is not impressive\
    \ that you may do so when the block is called from inside the class itself, but\
    \ consider the following scenario:\n\n```\n// file UseBlock.h\n@interface UseBlock\
    \ : NSObject\n{\n        int _myIntValue;\n}\n- (void) receiveBlock:(int (^)())aBlock;\n\
    @end\n\n// file UseBlock.m\n@implementation UseBlock\n- (void) receiveBlock:(int\
    \ (^)())aBlock\n{\n        NSLog(@\"the result is now: %d\", aBlock());\n}\n@end\n\
    ```\n\nThis class is supposed to receive a block and call it, without any knowledge\
    \ about the location where the block originated. Let’s now see how this class\
    \ can be used.\n\n```\n- (void) showVariableReadAcccess\n{\n        _myIntValue\
    \ = 3;\n        int myVariable = 2;\n        UseBlock *useBlock = [[UseBlock alloc]\
    \ init];\n        [useBlock receiveBlock:^\n        {\n                return\
    \ 5 * myVariable + 2 * _myIntValue;\n        }];\n}\n```\n\nWhen this method is\
    \ run, it results in the execution of a block that references a local variable\
    \ as well as an instance variable. Even though the `UseBlock` class doesn’t have\
    \ any knowledge about the location and contents of these variables, it is still\
    \ able to run the requested instructions.\n\nThe reason why a block can have access\
    \ to local data, no matter which context it is called from, is due to the way\
    \ Objective-C handles them through the runtime system. During runtime, a block\
    \ is an object like any other, and the compiler implicitly sets data access to\
    \ refer to object instance variables that are known only by the block object.\
    \ The block syntax provides a simple way to declare a complex object that has\
    \ access to data stored in other objects.\n\n## Read-Write Access to Local Variables\n\
    \nThe standard data access provided to local variables located outside a block\
    \ is read-only, as you saw in the previous examples. The variables accessed by\
    \ the block are just copies of the values stored in the current method or function,\
    \ when the block was created. However, Objective-C also provides a mechanism for\
    \ modification of such values, though the `__block` keyword.\n\nThe use of the\
    \ `__block` keyword forces the compiler to create not just a copy of the data,\
    \ but also a reference that can be used to modify the same object or value as\
    \ stored in local variables.\n\nIt’s easy to modify one of the previous examples\
    \ to show this distinction.\n\n```\n- (void) showWriteAcccess\n{\n        __block\
    \ int myVariable = 2;\n        int (^getMultiple)(int);\n        getMultiple =\
    \ ^ (int base)\n        {\n                myVariable = base;\n              \
    \  return 5 * myVariable ;\n        };\n        NSLog(@\"Here is a the result:\
    \ %d\", getMultiple(3));\n        // this should print the value 15\n}\n```\n\n\
    This is a similar example where the local variable is referenced inside the block.\
    \ However, now the block also has the responsibility of changing the value stored\
    \ in the local variable. Unlike in the previous example, the code stored in the\
    \ block now needs to have writing access to the local variable. This intention\
    \ is made explicit by the Objective-C keyword `__block`, which is added before\
    \ the declaration of `myVariable`.\n\nWhat happens under the cover, as this code\
    \ is processed by the compiler, is that the a shared copy of this variable becomes\
    \ accessible to the block, as well as to any other statement that need read-write\
    \ access permissions. The shared reference to the local variable can be used by\
    \ the block in whatever context it is called, including with methods that are\
    \ part of other classes.\n\nWhen modifications are made to instance variables,\
    \ however, there is no need to add `__block` directly to the variable definition.\
    \ The compiler will automatically store a reference to the object whenever the\
    \ block needs to update one of its instance variables.\n\nNote\n\nThe mechanism\
    \ for sharing local and instance variables described above is called, in other\
    \ languages, a closure. For example, in Python, Ruby, or Lisp, it is possible\
    \ to create closures, that is, sections of code that refer to variables that are\
    \ active at their point of declaration. Objective-C blocks achieve essentially\
    \ the same goals, while maintaining the type checking inherent to the C language."
