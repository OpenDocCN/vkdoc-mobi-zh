    \n```\n- (void) getPI\n{\n    double (^f)(); // 声明一个新的 block\n    f = ^ {\n  \
    \      return 3.14;\n    };\n}\n```\n\n这段代码定义了一个新的`block`变量`f`，然后向其分配一个返回代表数学常数\
    \ Pi 的字面数字的`block`。\n\n要调用由`block`定义的代码，可以使用与函数相同的方式来使用`block`变量的名称。\n\n```\n\
    - (void) divisionBlock\n{\n    double (^division)(int, double); // 声明一个 block\n\
    \    division = ^ (int a, double b) // 将 block 保存到变量中\n    {\n        return a\
    \ / b;\n    };\n    double result = division(1, 2);\n    NSLog(@\"the result is\
    \ %lf\", result); // 将会打印 0.5\n}\n```\n"
- fmt: "# Reading Complex Block Declarations\n\nA block may not only be stored in\
    \ a local variable, but also used as a parameter to a function or method, or even\
    \ as a return value. When that happens, the declaration aspect of blocks keeps\
    \ getting more complicated. For instance, here is how a block, similar to what\
    \ you have seen before, can be used as a parameter:\n\n```\n- (void) useBlock:(double\
    \ (^)(int, int))aBlock\n{\n        aBlock(1, 2);\n}\n```\n\nYou can read this\
    \ declaration by looking at the characters `(^)` as defining a block, while the\
    \ types around them are the return value and argument types. As any other parameter\
    \ to an Objective-C method, they are wrapped inside a pair of parenthesis, followed\
    \ by the formal name of the argument, which in this case is called `aBlock`.\n\
    \nFinally, here is an example of how to declare a method that returns a block:\n\
    \n```\n- (double (^)(int, int)) returnABlock\n{\n        // return block here\n\
    }\n```\n\nThe process of reading such declarations is similar to what I explained\
    \ in the previous example. However, you will notice how complicated this can become\
    \ with an increasing number of parameters and return values. One way to simplify\
    \ this process is to use the `typedef` mechanism offered by the C language.\n\n\
    A `typedef` is just a shortcut for a longer type declaration. However, despite\
    \ the introduction of a new name, types declared with a `typedef` are exactly\
    \ the same as the original name for all practical purposes. A simple use of a\
    \ `typedef` would be\n\n```\ntypedef int MyNewIntType;\n```\n\nIn this case, `MyNewIntType`\
    \ can now be employed as a type name anywhere you expect to use the `int` type.\
    \ A better use of `typedef`s, however, is in the simplification of complex block\
    \ (as well as function pointer) variable declarations. Here is how you can improve\
    \ the previous example:\n\n```\ntypedef double (^MathBlock)(int, double);\n\n\
    - (void) divisionBlock\n{\n        MathBlock division; // declare a block\n  \
    \      division = ^ (int a, double b)\n        {\n                return a / b;\n\
    \        };\n        double result = division(1, 2);\n        NSLog(@\"the result\
    \ is %lf\", result);\n        // this will print result as 0.500\n}\n```\n\nFirst,\
    \ there is the `typedef` statement, which declares `MathBlock` as the new name\
    \ for the block type. As a general rule, the new name for the type in a `typedef`\
    \ expression appears in the same location that the variable name would normally\
    \ appear. After `MathBlock` is declared, you can use it everywhere the type name\
    \ would be needed. The main advantage of using a `typedef` is that you don’t need\
    \ to retype a complex block definition like this one. It also makes it much easier\
    \ to initialize the block in the same line as the declaration. For example, the\
    \ above example could also be written as\n\n```\n- (void) divisionBlock\n{\n \
    \       MathBlock division = ^ (int a, double b)\n        {\n                return\
    \ a / b;\n        };\n        double result = division(1, 2);\n        NSLog(@\"\
    the result is %lf\", result);\n        // this will print result as 0.500\n}\n\
    ```\n\nThis allows you to initialize the block in the same line as the declaration.\
    \ The same `typedef` can also be used in the declaration of method arguments.\
    \ Therefore, one of the previous examples can be rewritten in the following way:\n\
    \n```\ntypedef double (^DoubleIntIntBlock)(int, int);\n\n- (void) useBlock:(DoubleIntIntBlock)aBlock\n\
    {\n        aBlock(1, 2);\n}\n```\n\nand similarly for return values:\n\n```\n\
    - (DoubleIntIntBlock) returnABlock\n{\n  // return block here\n}\n```\n\n## Passing\
    \ Blocks as Parameters\n\nAs you have seen, it is easy to create function methods\
    \ that receive blocks as parameters. Similarly, it is relatively straightforward\
    \ to pass blocks as parameters to functions or methods. For example, consider\
    \ the previously defined method,\n\n```\n- (void) useBlock:(DoubleIntIntBlock)aBlock;\n\
    ```\n\nTo use such a method, you can first define a variable and pass it as a\
    \ parameter, like so:\n\n```\n- (void) callBlockMethod\n{\n        DoubleIntIntBlock\
    \ myBlock;\n        myBlock = ^ double (int a,int b)\n        {\n            \
    \    NSLog(@\"the values passed are %d and %d\", a, b);\n                return\
    \ 1.0 + a + b;\n        };\n        [self useBlock:myBlock];\n}\n```\n\nAnother\
    \ way of doing this is to use the block directly as part of a message call.\n\n\
    ```\n- (void) callBlockMethod\n{\n        [self useBlock:^ double (int a,int b)\n\
    \        {\n                NSLog(@\"the values passed are %d and %d\", a, b);\n\
    \                return 1.0 + a + b;\n        }];\n}\n```\n\nHere, you are defining\
    \ an unnamed block and immediately using it as the sole argument to a method call.\
    \ The block is passed as a parameter to the `useBlock:` method, which can call\
    \ it directly or save it for later use."
