  raw: '### Why Are Objects Important?


    In the last 30 years, OOP languages came to the forefront of programming research
    and practice due to their advanced mechanisms for program decomposition and extensibility.
    While it is true that older languages such as C can simulate all features in an
    OOP language, achieving the same results requires a high level of complexity that
    is unnecessary when using OOP.


    As a result, most application software is currently designed for OOP languages
    such as Objective-C. Due to the practical importance of objects, it is necessary
    to be aware of the main differences between OOP and other programming paradigms.


    The classical definition of OOP identifies a number of functionalities that need
    to be present in an OOP language. Since OOP languages are so numerous these days,
    it becomes hard to present features that are common to all of them, other than
    the concept of objects and methods associated to them. Nonetheless, a classical
    definition of OOP includes a number of important elements, which are available
    in Objective-C as well as in many other OOP languages.


    Encapsulation: This means that objects are supposed to contain data and code in
    the same unit. For example, an object that defines a financial statement will
    contain the data used by a financial statement, plus code that can be used to
    manipulate financial statements.   Inheritance: Classes can inherit variables
    and code from other classes. This relationship is called inheritance. The inherited
    class is referred to as the super class, parent class, or base class. The inheritance
    relationship is recursive, therefore forming a class hierarchy. In Objective-C,
    only single inheritance is possible; that is, classes can inherit data and code
    from a single class only (but this can be made more flexible by the use of the
    protocol mechanism, as you will see in a future chapter).   Polymorphism: This
    is a central concept in OOP, since it allows the same message to be responded
    to in different ways depending on the object that receives the message. The syntax
    of Objective-C allows a pointer to a base class to be used to refer to an object
    or a derived class. This flexible mechanism allows programmers to send messages
    to objects without having to define exactly how the receiver will react, and what
    is going to happen as a result. Objects receiving the message can choose to interpret
    it according to their own needs. This provides for extensibility that would be
    very difficult to achieve without the use of objects.  


    Object-oriented programming has been used in the last few decades to define the
    building blocks of many important technologies. For example, Apple has used the
    strengths of OOP through Objective-C to design the Mac OS X operating system interface.
    More recently, all the UI and system code for the iOS has been created using Objective-C.


    Now that you understand the advantages of using OOP, let’s take a look at how
    Objective-C provides support for the main concepts of object orientation, including
    how to define new classes with variables, and their methods.


    ## Using Objects


    A program in Objective-C makes extensive use of objects. Although it is always
    possible to create structures and functions, as you saw in the previous chapter,
    applications are supposed to use objects in order to comply with the Objective-C
    framework and to have access to the extensibility options available in the language.


    The first thing you need to understand is how to properly use existing objects.
    An object in Objective-C is created when you send a create message to its class.
    Then, the object will become active and you can start sending messages to it.


    In practice, you work with pointers to objects, since it is not possible to directly
    create a variable of a particular class. Consider for example the Objective-C
    class for strings, `NSString`.


    Note


    All classes in the Objective-C framework provided by Apple start with two letters
    that are used as a common prefix. The NS prefix is used by all classes in the
    Foundation framework. These two letters have been used since Objective-C was still
    a product developed by NextSTEP. Other frameworks use different combinations of
    letters. In particular, code developed by application writers should avoid this
    prefix.


    `void printMessage(NSString *text)`


    `{`


       `NSLog(@"Message is %@", text);`


    `}`


    In this example, there is an object of class `NSString`, which implements the
    string type. Objects are always manipulated through a pointer, since you cannot
    know exactly the type of the object passed to the function, other than the fact
    that it derives from `NSString`. This is the basic principle of polymorphism and
    is used whenever you manipulate an object.


    The most important thing you can do with an object is sending messages to it.
    The syntax for message sending is the following:


    `[<object pointer> <message>];`


    For example, consider the following function:


    `void printMessage(NSString *text)`


    `{`


       `int len = [text length];`


       `NSLog(@"Message length is %d", len);`


    `}`


    In this example, you use `text`, a pointer to a string object, and send to it
    the message `length`, which returns an integer value. The `length` message is
    part of the interface of `NSString` objects, so it can be called anytime you have
    an available `NSString`.


    ### Method Parameters


    The `length` message discussed above is a very simple one, without any arguments.
    If a message has a single argument, it is passed after the name of the message
    and a colon, like so:


    `void printsubstr()`


    `{`


            `NSString *text = @"My Example String";`


            `NSString *substr = [text substringToIndex:5];`


            `NSLog(@"substring is %@", substr); // prints "My Ex"`


    `}`


    In this example, the `substringToIndex` message is sent the `text` object. This
    message is defined as returning a new string containing all the characters in
    the original string, up to the character number provided. In the last line of
    this function, you use the `NSLog` function to print the resulting substring to
    the console.


    If a message needs two arguments, it has a specific format that describes the
    use of each argument. Here is an example using the message `stringByReplacingOccurrencesOfString:withString`:


    `NSString *replaceOne(NSString *myString)`


    `{`


            `return [myString`


                    `stringByReplacingOccurrencesOfString:@"1"`


                    `withString:@"one"];`


    `}`


    As the name of the message clearly states, its goal is to return a new string
    by replacing occurrences of the first argument with the second argument. The arguments
    are always supplied after the colon separator. This is true for as many arguments
    as required by the message.


    Note


    Many programmers, used to the way methods and functions work in languages such
    as C++ or Java, feel that Objective-C is very verbose when it requires an additional
    keyword for each argument. There are some advantages, however, in choosing the
    long-style syntax for messages. First, it promotes the creation of methods with
    a small number of arguments. This is a good side effect, since a large number
    of arguments can make functions harder to understand, no matter what syntax is
    used. Second, Objective-C messages are self-documenting, since they are required
    to use words to describe each of the parameters.'
  trans: "\n### 为什么对象如此重要？\n\n在过去 30 年中，面向对象编程语言因其先进的程序分解和扩展机制而走到了编程研究和实践的前沿。虽然像`C`这样的老语言确实可以模拟面向对象语言的所有特性，但要达到同样的效果，需要很高的复杂性，而这在使用面向对象编程时是完全不必要的。\n\
    \n因此，目前大多数应用软件都是为`Objective-C`这样的面向对象语言设计的。由于对象具有重要的实际意义，有必要了解面向对象编程与其他编程范式之间的主要差异。\n\
    \n面向对象编程的经典定义确定了面向对象语言中应具备的一系列功能。由于如今面向对象语言种类繁多，除了对象及其相关方法的概念外，很难再找出所有语言都共有的特性。尽管如此，面向对象的经典定义仍包含一些重要元素，这些元素在`Objective-C`以及许多其他面向对象语言中都可用。\n\
    \n**封装**：这意味着对象应该将数据和代码包含在同一单元中。例如，定义一个财务报表的对象将包含财务报表所使用的数据，以及可用于操作财务报表的代码。\n\n\
    **继承**：类可以从其他类继承变量和代码。这种关系称为继承。被继承的类被称为超类、父类或基类。继承关系是递归的，因此会形成一个类层次结构。在`Objective-C`中，只支持单一继承；也就是说，类只能从一个类继承数据和代码（但通过使用协议机制可以使其更灵活，你将在后续章节中看到这一点）。\n\
    \n**多态性**：这是面向对象编程中的一个核心概念，因为它允许同一条消息根据接收消息的对象以不同方式进行响应。`Objective-C`的语法允许使用基类指针来引用派生类或基类的对象。这种灵活的机制让程序员无需确切定义接收者将如何反应以及会产生什么结果，就能向对象发送消息。接收消息的对象可以选择根据自己的需要来解读消息。这提供了扩展性，如果不使用对象，是很难实现的。\n\
    \n在过去的几十年中，面向对象编程已被用于定义许多重要技术的基本构建块。例如，苹果公司曾通过`Objective-C`利用面向对象编程的优势来设计 Mac\
    \ OS X 操作系统的界面。最近，iOS 的所有用户界面和系统代码也都是使用`Objective-C`创建的。\n\n既然你已经了解了使用面向对象编程的优势，让我们来看看`Objective-C`如何支持面向对象的主要概念，包括如何定义带有变量的新类及其方法。\n\
    \n## 使用对象\n\n一个`Objective-C`程序会大量使用对象。尽管你始终可以创建结构体和函数（如前一章所述），但应用程序应该使用对象，以符合`Objective-C`框架的要求，并能够使用该语言提供的扩展选项。\n\
    \n你需要理解的第一件事是如何正确使用已有的对象。当你向一个类发送创建消息时，就会在`Objective-C`中创建一个对象。然后，该对象将变为活动状态，你就可以开始向它发送消息了。\n\
    \n实际上，你操作的是指向对象的指针，因为无法直接创建某个特定类的变量。考虑一下`Objective-C`中的字符串类`NSString`。\n\n> **注意**：苹果公司提供的`Objective-C`框架中的所有类都以两个字母开头，作为通用前缀。`NS`前缀被\
    \ Foundation 框架中的所有类使用。自从`Objective-C`还是 NextSTEP 公司开发的产品起，这两个字母就开始使用了。其他框架使用不同的字母组合。特别是，应用开发者编写的代码应避免使用这个前缀。\n\
    \n```\nvoid printMessage(NSString *text)\n{\n   NSLog(@\"Message is %@\", text);\n\
    }\n```\n\n在这个例子中，有一个`NSString`类的对象，它实现了字符串类型。对象总是通过指针来操作，因为你无法确切知道传递给函数的对象的具体类型，只能知道它派生自`NSString`。这是多态性的基本原则，并且在操作对象时始终遵循。\n\
    \n你可以对对象做的最重要的事情就是向它发送消息。消息发送的语法如下：\n\n```\n[<对象指针> <消息>];\n```\n\n例如，考虑以下函数：\n\
    \n```\nvoid printMessage(NSString *text)\n{\n   int len = [text length];\n   NSLog(@\"\
    Message length is %d\", len);\n}\n```\n\n在这个例子中，你使用了`text`（一个指向字符串对象的指针），并向它发送了`length`消息，该消息返回一个整数值。`length`消息是`NSString`对象接口的一部分，因此只要你有可用的`NSString`对象，就可以调用它。\n\
    \n### 方法参数\n\n上面讨论的`length`消息非常简单，没有任何参数。如果一个消息有一个参数，它会在消息名称后面加上冒号，然后传递该参数，如下所示：\n\
    \n```\nvoid printsubstr()\n{\n        NSString *text = @\"My Example String\"\
    ;\n        NSString *substr = [text substringToIndex:5];\n        NSLog(@\"substring\
    \ is %@\", substr); // 输出 \"My Ex\"\n}\n```\n\n在这个例子中，向`text`对象发送了`substringToIndex`消息。该消息被定义为返回一个新字符串，其中包含原始字符串中从开头到指定字符索引（不包含该索引处的字符）的所有字符。在这个函数的最后一行，你使用了`NSLog`函数将生成的子字符串打印到控制台。\n\
    \n如果一个消息需要两个参数，它会有特定的格式来描述每个参数的用途。下面是一个使用`stringByReplacingOccurrencesOfString:withString`消息的例子：\n\
    \n```\nNSString *replaceOne(NSString *myString)\n{\n        return [myString\n\
    \                stringByReplacingOccurrencesOfString:@\"1\"\n               \
    \ withString:@\"one\"];\n}\n```\n\n正如消息名称所明确指出的，它的目标是通过将第一个参数的出现替换为第二个参数来返回一个新字符串。参数总是在冒号分隔符之后提供。对于消息所需的任意数量的参数，都是如此。\n\
    \n> **注意**：许多习惯了`C++`或`Java`等语言中方法和函数工作方式的程序员，会觉得`Objective-C`在需要为每个参数添加额外关键字时非常冗长。然而，选择长格式的语法来书写消息也有一些优点。首先，它促使创建参数数量较少的方法。这是一个好的副作用，因为无论使用何种语法，大量的参数都可能导致函数难以理解。其次，`Objective-C`消息是自文档化的，因为它们必须使用词语来描述每个参数。\n"
- fmt: "### The `id` Type\n\nOne of the singularities of the OO features in Objective-C\
    \ is the use of a generic object type called `id`. A variable of type `id` can\
    \ be used to hold a pointer to any object, independent of its original type. The\
    \ Objective-C compiler will also allow you to send any message to that variable,\
    \ since the process of message dispatching will be performed at runtime, rather\
    \ than at compile time.\n\nThe `id` type is used in some important messages, such\
    \ as `alloc`, which allocates memory for a new object. The return type for that\
    \ message is `id`, so that it can be used to create any type of object.\n\nSince\
    \ `id` can be used as a generic type for objects, it is important to understand\
    \ when to use `id` or a specific pointer type, such as `NSString *`. The advantage\
    \ of using a well-defined type is that the compiler can tell exactly which messages\
    \ are available for that type. If an incorrect message is sent to an instance\
    \ of `NSString`, the compiler will present the user with an error message. Therefore,\
    \ it is easier to work with objects of particular types if the code assumes that\
    \ this is the only possible target of the desired messages.\n\nOn the other hand,\
    \ there are many situations in which you might want to write code valid for a\
    \ generic type. Also, a few library objects return `id` as a type. In these cases,\
    \ it is necessary to work with an `id` instead of a well-defined type.\n\n## Creating\
    \ New Objects\n\nCreating new objects is a two-step process. The first step is\
    \ to send a message to the desired class requesting a new object. This is done\
    \ with the `alloc` message, which allocates enough space for the object and returns\
    \ a pointer to it.\n\nThe second step consists of initializing the newly created\
    \ object. This is a task performed by an instance method. A standard method called\
    \ `init` exists and is inherited by any class deriving from `NSObject`. It is\
    \ also possible for an object to define its own `init` method. More complex objects\
    \ can also be initialized through a special purpose method, for example when additional\
    \ parameters are needed.\n\n> **Note**\n> Remember that classes in Objective-C\
    \ are also objects. Once a new class is defined (as you will see in the next section),\
    \ the compiler will automatically create a runtime object representing the class.\
    \ Just like any other object, classes can have their own methods. Moreover, such\
    \ methods can run independently of any instance of the class.\n\nTo illustrate\
    \ this, consider the process of creating an array of numbers using the `NSArray`\
    \ and `NSNumber` classes:\n\n```\nNSArray *createArray()\n{\n    NSMutableArray\
    \ *array = [[NSMutableArray alloc] init];\n    for (int i=0; i<3; ++i)\n    {\n\
    \        NSNumber *number = [[NSNumber alloc] initWithInt: i+1];\n        [array\
    \ addObject:number];\n    }\n    return array;\n}\n```\n\nIn this example, first\
    \ you create a mutable array by sending an `alloc` message to the `NSMutableArray`\
    \ class. Then, you ask the object to initialize itself by sending the `init` message.\
    \ Although you want to return an `NSArray` object, you create an `NSMutableArray`\
    \ because it allows you to add elements as needed. Polymorphism allows you to\
    \ use an `NSMutableArray` as if it were an `NSArray`. Inside the loop, you create\
    \ an `NSNumber` object for each value between 1 and 3. You first send an `alloc`\
    \ message to the class, but then use the `initWithInt`, which is a special purpose\
    \ initializer method for the `NSNumber` class. It receives an integer, which then\
    \ becomes the value stored by the `NSNumber`.\n\n## Defining New Classes\n\nA\
    \ class is defined by creating a pair of elements: the interface and the implementation.\
    \ An interface is usually entered in a separate header file and is used to define\
    \ the content of a class to their users. The interface is then made available\
    \ to other modules of the application.\n\nFrom that interface definition, other\
    \ classes will receive a detailed description of which messages can be sent to\
    \ a particular object. For example:\n\n```\n@interface Employee : NSObject\n{\n\
    \   // list of variables here, if any\n}\n// a list of messages\n@end\n\n@implementation\
    \ Employee\n// list of message implementations\n@end\n```\n\n> **Note**\n> When\
    \ programming on Apple-related platforms, you should always use `NSObject` as\
    \ a superclass. This is not a requirement when defining a new class, since it\
    \ is possible to create classes that are independent of `NSObject`. For example,\
    \ you may want to define your own hierarchy of objects with different semantics.\
    \ However, in practice you always want to use the common methods provided by `NSObject`,\
    \ which was designed to be a common denominator for all objects across the system.\n\
    \nThe `@interface` keyword is used to introduce an interface. The keyword is followed\
    \ by the name of the class, and optionally a colon and the name of the superclass\
    \ used by the object, if there is one.\n\nThe `@implementation` keyword is used\
    \ to start the class definition. It is used as part of the `.m` (messages) file,\
    \ and contains the definition of every message that the object responds to.\n\n\
    > **Note**\n> Reserved words used by Objective-C are prefixed by the `@` character,\
    \ which is not used in the syntax of C. This practice avoids possible clashes\
    \ with existing C code. This is a convenience for programmers integrating existing\
    \ C code into Objective-C. For example, `@class` is a keyword so it is still possible\
    \ to use the name “class,” which is a legal name in a C application. By doing\
    \ this, Objective-C avoids a common problem that exists when porting code from\
    \ C to C++. Whenever Objective-C uses keywords without a `@` character, these\
    \ are restricted to just a small number of contexts, so there is no possible clash\
    \ with application-defined names.\n\nIn the next sections, you will see how to\
    \ add instance variables and instance methods to a class definition."
  raw: '### The id Type


    One of the singularities of the OO features in Objective-C is the use of a generic
    object type called `id`. A variable of type `id` can be used to hold a pointer
    to any object, independent of its original type. The objective-C compiler will
    also allow you to send any message to that variable, since the process of message
    dispatching will be performed at runtime, rather than at compile time.


    The `id` type is used in some important messages, such as `alloc`, which allocates
    memory for a new object. The return type for that message is `id`, so that it
    can be used to create any type of object.


    Since `id` can be used as a generic type for objects, it is important to understand
    when to use `id` or a specific pointer type, such as `NSString *`. The advantage
    of using a well-defined type is that the compiler can tell exactly which messages
    are available for that type. If an incorrect message is sent to an instance of
    `NSString`, the compiler will present the user with an error message. Therefore,
    it is easier to work with objects of particular types if the code assumes that
    this is the only possible target of the desired messages.


    On the other hand, there are many situations in which you might want to write
    code valid for a generic type. Also, a few library objects return `id` as a type.
    In these cases, it is necessary to work with an `id` instead of a well-defined
    type.


    ## Creating New Objects


    Creating new objects is a two-step process. The first step is to send a message
    to the desired class requesting a new object. This is done with the `alloc` message,
    which allocates enough space for the object and returns a pointer to it.


    The second step consists of initializing the newly created object. This is a task
    performed by an instance method. A standard method called `init` exists and is
    inherited by any class deriving from `NSObject`. It is also possible for an object
    to define its own `init` method. More complex objects can also be initialized
    through a special purpose method, for example when additional parameters are needed.


    Note


    Remember that classes in Objective-C are also objects. Once a new class is defined
    (as you will see in the next section), the compiler will automatically create
    a runtime object representing the class. Just like any other object, classes can
    have their own methods. Moreover, such methods can run independently of any instance
    of the class.


    To illustrate this, consider the process of creating an array of numbers using
    the `NSArray` and `NSNumber` classes:


    `NSArray *createArray()`


    `{`


            `NSMutableArray *array = [[NSMutableArray alloc] init];`


            `for (int i=0; i<3; ++i)`


            `{`


                    `NSNumber *number = [[NSNumber alloc] initWithInt: i+1];`


                    `[array addObject:number];`


            `}`


            `return array;`


    `}`


    In this example, first you create a mutable array by sending an `alloc` message
    to the `NSMutableArray` class. Then, you ask the object to initialize itself by
    sending the `init` message. Although you want to return an `NSArray` object, you
    create an `NSMutableArray` because it allows you to add elements as needed. Polymorphism
    allows you to use an `NSMutableArray` as if it were an `NSArray`. Inside the loop,
    you create an `NSNumber` object for each value between 1 and 3\. You first send
    an `alloc` message to the class, but then use the `initWithInt`, which is a special
    purpose initializer method for the `NSNumber` class. It receives an integer, which
    then becomes the value stored by the `NSNumber`.


    ## Defining New Classes


    A class is defined by creating a pair of elements: the interface and the implementation.
    An interface is usually entered in a separate header file and is used to define
    the content of a class to their users. The interface is then made available to
    other modules of the application.


    From that interface definition, other classes will receive a detailed description
    of which messages can be sent to a particular object. For example:


    `@interface Employee : NSObject`


    `{`


       `// list of variables here, if any`


    `}`


    `// a list of messages`


    `@end`


    `@implementation Employee`


    `// list of message implementations`


    `@end`


    Note


    When programming on Apple-related platforms, you should always use `NSObject`
    as a superclass. This is not a requirement when defining a new class, since it
    is possible to create classes that are independent of `NSObject`. For example,
    you may want to define you own hierarchy of objects with different semantics.
    However, in practice you always want to use the common methods provided by `NSObject`,
    which was designed to be a common denominator for all objects across the system.


    The `@interface` keyword is used to introduce an interface. The keyword is followed
    by the name of the class, and optionally a colon and the name of the superclass
    used by the object, if there is one.


    The `@implementation` keyword is used to start the class definition. It is used
    as part of the `.m` (messages) file, and contains the definition of every message
    that the object responds to.


    Note


    Reserved words used by Objective-C are prefixed by the `@` character, which is
    not used in the syntax of C. This practice avoids possible clashes with existing
    C code. This is a convenience for programmers integrating existing C code into
    Objective-C. For example, `@class` is a keyword so it is still possible to use
    the name “class,” which is a legal name in a C application. By doing this, Objective-C
    avoids a common problem that exists when porting code from C to C++. Whenever
    Objective-C uses keywords without a `@` character, these are restricted to just
    a small number of contexts, so there is no possible clash with application-defined
    names.


    In the next sections, you will see how to add instance variables and instance
    methods to a class definition.'
  trans: "\n### `id` 类型\n\nObjective-C 面向对象特性中的一个独特之处在于使用了一种名为 `id` 的通用对象类型。`id` 类型的变量可以用于持有指向任何对象的指针，而与其原始类型无关。Objective-C\
    \ 编译器也允许你向该变量发送任何消息，因为消息分发过程将在运行时而非编译时执行。\n\n`id` 类型被用于一些重要的消息中，例如 `alloc`，它为新的对象分配内存。该消息的返回类型是\
    \ `id`，因此它可以用来创建任何类型的对象。\n\n由于 `id` 可以作为对象的通用类型，因此了解何时使用 `id` 或特定指针类型（例如 `NSString\
    \ *`）非常重要。使用明确定义的类型的优势在于，编译器可以精确地知道哪些消息可用于该类型。如果向 `NSString` 的实例发送了一条不正确的消息，编译器会向用户显示错误消息。因此，如果代码假定某特定类型是所需消息的唯一可能目标，那么使用该特定类型的对象会更简单。\n\
    \n另一方面，在许多情况下，你可能希望编写适用于通用类型的代码。此外，一些库对象会返回 `id` 类型。在这些情况下，必须使用 `id` 而不是明确定义的类型。\n\
    \n## 创建新对象\n\n创建新对象是一个两步过程。第一步是向所需的类发送请求新对象的消息。这是通过 `alloc` 消息完成的，它为对象分配足够的空间并返回一个指向它的指针。\n\
    \n第二步包括初始化新创建的对象。这是由实例方法执行的任务。存在一个名为 `init` 的标准方法，任何继承自 `NSObject` 的类都会继承该方法。对象也可以定义自己的\
    \ `init` 方法。更复杂的对象也可以通过专门用途的方法进行初始化，例如在需要额外参数时。\n\n> **注意**\n> 请记住，Objective-C\
    \ 中的类也是对象。一旦定义了一个新类（你将在下一节中看到），编译器会自动创建一个代表该类的运行时对象。就像任何其他对象一样，类可以有自己的方法。此外，这些方法可以独立于该类的任何实例运行。\n\
    \n为了说明这一点，请考虑使用 `NSArray` 和 `NSNumber` 类创建数字数组的过程：\n\n```\nNSArray *createArray()\n\
    {\n    NSMutableArray *array = [[NSMutableArray alloc] init];\n    for (int i=0;\
    \ i<3; ++i)\n    {\n        NSNumber *number = [[NSNumber alloc] initWithInt:\
    \ i+1];\n        [array addObject:number];\n    }\n    return array;\n}\n```\n\
    \n在这个例子中，首先通过向 `NSMutableArray` 类发送 `alloc` 消息来创建一个可变数组。然后，通过发送 `init` 消息要求对象初始化自身。虽然你想要返回一个\
    \ `NSArray` 对象，但你创建了一个 `NSMutableArray`，因为它允许你根据需要添加元素。多态性允许你将 `NSMutableArray`\
    \ 当作 `NSArray` 来使用。在循环内部，你为 1 到 3 之间的每个值创建一个 `NSNumber` 对象。你首先向该类发送 `alloc` 消息，然后使用\
    \ `initWithInt`，这是 `NSNumber` 类的专用初始化方法。它接收一个整数，该整数随后成为 `NSNumber` 存储的值。\n\n##\
    \ 定义新类\n\n通过创建一对元素来定义一个类：接口和实现。接口通常放在一个单独的头文件中，用于向用户定义类的内容。然后该接口可供应用程序的其他模块使用。\n\
    \n根据该接口定义，其他类将收到关于哪些消息可以发送给特定对象的详细描述。例如：\n\n```\n@interface Employee : NSObject\n\
    {\n   // 此处列出变量（如果有）\n}\n// 消息列表\n@end\n\n@implementation Employee\n// 消息实现列表\n\
    @end\n```\n\n> **注意**\n> 在苹果相关平台上编程时，应始终使用 `NSObject` 作为超类。这在定义新类时并非强制要求，因为可以创建独立于\
    \ `NSObject` 的类。例如，你可能希望使用不同的语义定义自己的对象层次结构。然而，在实践中，你总是希望使用 `NSObject` 提供的通用方法，它被设计为系统中所有对象的公共基石。\n\
    \n`@interface` 关键字用于引入一个接口。该关键字后跟类名，并且可以选择性地加上一个冒号和对象所使用的超类名称（如果有的话）。\n\n`@implementation`\
    \ 关键字用于开始类的定义。它作为 `.m`（消息）文件的一部分使用，并包含对象响应的每条消息的定义。\n\n> **注意**\n> Objective-C\
    \ 使用的保留字都以 `@` 字符为前缀，这在 C 的语法中是不使用的。这种做法避免了与现有 C 代码可能发生的冲突。这对于将现有 C 代码集成到 Objective-C\
    \ 中的程序员来说是一种便利。例如，`@class` 是一个关键字，因此仍然可以使用名称 “class”，它是 C 应用程序中的合法名称。通过这样做，Objective-C\
    \ 避免了将代码从 C 移植到 C++ 时存在的一个常见问题。每当 Objective-C 使用不带 `@` 字符的关键字时，这些关键字仅限于少数上下文，因此不会与应用程序定义的名称发生冲突。\n\
    \n在接下来的几节中，你将了解如何向类定义中添加实例变量和实例方法。\n"
- fmt: "## Instance Variables  \n\nAn instance variable is used to store data for\
    \ a particular object. The defining characteristic of member variables is that\
    \ they are defined for each object of a particular class. In this sense, they\
    \ are similar to the data stored in a plain C structure. On the other hand, instance\
    \ variables are accessible inside the implementation of a class.  \n\nFor example,\
    \ an `Employee` class would have data stored for each object of that class. An\
    \ `Employee` would typically have instance variables such as age, salary, and\
    \ address. These instance variables would be represented in the following way:\
    \  \n\n```\n@interface Employee : NSObject\n{\n   int salary;\n   NSString *address;\n\
    \   int age;\n}\n@end\n```\n\nOnce an instance variable is declared in the class’\
    \ interface, it can be used in the implementation. For example, suppose that you\
    \ declare a new method called `incomeTax`.  \n\n```\n@implementation Employee\n\
    -(double) incomeTax:(double)taxBracket\n{\n   return salary * taxBracket;\n}\n\
    @end\n```\n\nInstance variables can be designated as public or private, thus limiting\
    \ the access provided to other classes. A private variable can only be used by\
    \ methods of the same class, unlike public variables, which are available to any\
    \ code that uses objects of that class. This mechanism makes it possible for application\
    \ writers to change the internal implementation of a class, while at the same\
    \ time reducing concerns about the consequences on other code that uses it.  \n\
    \nTo define an instance variable as private, just use the keyword `@private` before\
    \ the definition of the variable. Similarly, one can make a variable public by\
    \ using the `@public` keyword. If you want an instance variable to become accessible\
    \ by a class and its subclasses, use the `@protected` keyword. By default, private\
    \ instance variables are private; that is, they are available only to the class\
    \ itself, and not to its descendants. Once an accessibility keyword is used, it\
    \ affects all variables declared after it, until the accessibility level is changed\
    \ by the appearance of another keyword.  \n\nAn instance variable can also be\
    \ made available only in the package in which it is defined. For this purpose,\
    \ the keyword `@protected` exists. Its use is similar to the way private and protected\
    \ variables are marked.  \n\n> **Note**  \n> In general, Objective-C programmers\
    \ don't make extensive use of public or protected instance variables. Due to its\
    \ dynamic nature, classes in Objective-C are used through their methods, using\
    \ the message passing mechanism. This means that direct access to variables is\
    \ of little use and should be avoided in practice.  \n\n## Adding and Defining\
    \ Instance Methods  \n\nMethods are the main mechanism used to define behavior\
    \ in a class. It is the set of methods in a class that define the messages that\
    \ an object can answer directly (for derived classes, this also includes the methods\
    \ in the super classes). Therefore, one of the main goals in OOP is to include\
    \ only methods that are directly related to the functionality that you want to\
    \ expose to users.  \n\nAn instance method defines the behavior of an object instance\
    \ whenever the object receives a particular message. For example, suppose that\
    \ you want to respond to the `sayHello` message. This can be done as follows:\
    \  \n\n```\n@interface SimpleObject : NSObject\n-(void) sayHello;\n@end\n\n@implementation\
    \ SimpleObject\n-(void) sayHello\n{\n   NSLog(@\"hello\");\n}\n@end\n```\n\nThis\
    \ example shows a class that provides limited functionality through its single\
    \ method. To access the method, you can create an object of the `SimpleObject`\
    \ class, and send the `sayHello` message.  \n\n```\nSimpleObject *object = [[SimpleObject\
    \ alloc] init];\n[object sayHello];\n```\n\nAs previously discussed, methods are\
    \ declared with a segmented syntax, where each parameter is introduced by a word\
    \ describing its meaning. The method `sayHello` doesn’t have any argument, therefore\
    \ there is no colon following its name. On the other hand, consider the method\
    \ `printText` shown below:  \n\n```\n@interface SimpleObject2 : NSObject\n-(void)\
    \ printText:(NSString *)message;\n-(void) printText:(NSString *)message withSuffix:(NSString\
    \ *)suffix;\n@end\n\n@implementation SimpleObject2\n-(void) printText:(NSString\
    \ *)message\n{\n        NSLog(@\"message is: %@\", message);\n}\n\n-(void) printText:(NSString\
    \ *)message withSuffix:(NSString *)suffix\n{\n        NSLog(@\"message is: %@%@\"\
    , message, suffix);\n}\n@end\n```\n\nHere, the new class defines an object that\
    \ responds to the `printText` message. When sending a message to this object,\
    \ you need to provide a parameter after the colon separator, like so:  \n\n```\n\
    void printTextExample()\n{\n        SimpleObject2 *obj = [[SimpleObject2 alloc]\
    \ init];\n        [obj printText:@\"My message\"];\n}\n```\n\nSimilarly, when\
    \ two or more parameters are needed, they are given after the corresponding colon\
    \ that separates argument keywords from actual arguments. Here is an example using\
    \ the message `printText:withSuffix:`.  \n\n```\nvoid printTextAndSuffixExample()\n\
    {\n        SimpleObject2 *obj = [[SimpleObject2 alloc] init];\n        [obj printText:@\"\
    My message\" withSuffix:@\"here\"];\n}\n```"
  raw: '## Instance Variables


    An instance variable is used to store data for a particular object. The defining
    characteristic of member variables is that they are defined for each object of
    a particular class. In this sense, they are similar to the data stored in a plain
    C structure. On the other hand, instance variables are accessible inside the implementation
    of a class.


    For example, an `Employee` class would have data stored for each object of that
    class. An `Employee` would typically have instance variables such as age, salary,
    and address. These instance variables would be represented in the following way:


    `@interface Employee : NSObject`


    `{`


       `int salary;`


       `NSString *address;`


       `int age;`


    `}`


    `@end`


    Once an instance variable is declared in the class’ interface, it can be used
    in the implementation. For example, suppose that you declare a new method called
    `incomeTax`.


    `@implementation Employee`


    `-(double) incomeTax:(double)taxBracket`


    `{`


       `return salary * taxBracket;`


    `}`


    `@end`


    Instance variables can be designated as public or private, thus limiting the access
    provided to other classes. A private variable can only be used by methods of the
    same class, unlike public variables, which are available to any code that uses
    objects of that class. This mechanism makes it possible for application writers
    to change the internal implementation of a class, while at the same time reducing
    concerns about the consequences on other code that uses it.


    To define an instance variable as private, just use the keyword `@private` before
    the definition of the variable. Similarly, one can make a variable public by using
    the `@public` keyword. If you want an instance variable to become accessible by
    a class and its subclasses, use the `@protected` keyword. By default, private
    instance variables are private; that is, they are available only to the class
    itself, and not to its descendants. Once an accessibility keyword is used, it
    affects all variables declared after it, until the accessibility level is changed
    by the appearance of another keyword.


    An instance variable can also be made available only in the package in which it
    is defined. For this purpose, the keyword `@protected` exists. Its use is similar
    to the way private and protected variables are marked.


    Note


    In general, Objective-C programmers don''t make extensive use of public or protected
    instance variables. Due to its dynamic nature, classes in Objective-C are used
    through their methods, using the message passing mechanism. This means that direct
    access to variables is of little use and should be avoided in practice.


    ## Adding and Defining Instance Methods


    Methods are the main mechanism used to define behavior in a class. It is the set
    of methods in a class that define the messages that an object can answer directly
    (for derived classes, this also includes the methods in the super classes). Therefore,
    one of the main goals in OOP is to include only methods that are directly related
    to the functionality that you want to expose to users.


    An instance method defines the behavior of an object instance whenever the object
    receives a particular message. For example, suppose that you want to respond to
    the `sayHello` message. This can be done as follows:


    `@interface SimpleObject : NSObject`


    `-(void) sayHello;`


    `@end`


    `@implementation SimpleObject`


    `-(void) sayHello`


    `{`


       `NSLog(@"hello");`


    `}`


    `@end`


    This example shows a class that provides limited functionality through its single
    method. To access the method, you can create an object of the `SimpleObject` class,
    and send the `sayHello` message.


    `SimpleObject *object = [[SimpleObject alloc] init];`


    `[object sayHello];`


    As previously discussed, methods are declared with a segmented syntax, where each
    parameter is introduced by a word describing its meaning. The method `sayHello`
    doesn’t have any argument, therefore there is no colon following its name. On
    the other hand, consider the method `printText` shown bellow:


    `@interface SimpleObject2 : NSObject`


    `-(void) printText:(NSString *)message;`


    `-(void) printText:(NSString *)message withSuffix:(NSString *)suffix;`


    `@end`


    `@implementation SimpleObject2`


    `-(void) printText:(NSString *)message`


    `{`


            `NSLog(@"message is: %@", message);`


    `}`


    `-(void) printText:(NSString *)message withSuffix:(NSString *)suffix`


    `{`


            `NSLog(@"message is: %@%@", message, suffix);`


    `}`


    `@end`


    Here, the new class defines an object that responds to the `printText` message.
    When sending a message to this object, you need to provide a parameter after the
    colon separator, like so:


    `void printTextExample()`


    `{`


            `SimpleObject2 *obj = [[SimpleObject2 alloc] init];`


            `[obj printText:@"My message"];`


    `}`


    Similarly, when two or more parameters are needed, they are given after the corresponding
    colon that separates argument keywords from actual arguments. Here is an example
    using the message `printText:withSuffix:`.


    `void printTextAndSuffixExample()`


    `{`


            `SimpleObject2 *obj = [[SimpleObject2 alloc] init];`


            `[obj printText:@"My message" withSuffix:@"here"];`


    `}`'
  trans: "\n## 实例变量  \n\n实例变量用于存储特定对象的数据。成员变量的定义特征是它们为特定类的每个对象而定义。从这个意义上说，它们类似于纯 C\
    \ 结构体中存储的数据。另一方面，实例变量在类的实现内部是可访问的。  \n\n例如，一个 `Employee` 类会为该类的每个对象存储数据。一个 `Employee`\
    \ 对象通常会有诸如年龄、薪水和地址之类的实例变量。这些实例变量会以如下方式表示：  \n\n```\n@interface Employee : NSObject\n\
    {\n   int salary;\n   NSString *address;\n   int age;\n}\n@end\n```\n\n一旦在类的接口中声明了实例变量，它便可在实现中使用。例如，假设你声明一个名为\
    \ `incomeTax` 的新方法。  \n\n```\n@implementation Employee\n-(double) incomeTax:(double)taxBracket\n\
    {\n   return salary * taxBracket;\n}\n@end\n```\n\n实例变量可以被指定为 public 或 private，从而限制其他类的访问权限。私有变量只能被同一类的方法使用，而公有变量则可以被任何使用该类对象的代码访问。这种机制使得应用程序开发者可以更改类的内部实现，同时减少对使用该类的其他代码所造成后果的担忧。\
    \  \n\n要将实例变量定义为私有，只需在变量定义之前使用关键字 `@private`。类似地，可以通过使用 `@public` 关键字使变量成为公有。如果你希望某个实例变量可被该类及其子类访问，请使用\
    \ `@protected` 关键字。默认情况下，实例变量是私有的；也就是说，它们仅对该类本身可用，而不能被其后代类使用。一旦使用了某个访问权限关键字，它将影响其后声明的所有变量，直到通过出现另一个关键字来更改访问级别。\
    \  \n\n还可以使实例变量仅在其定义的包中可用。为此，应使用关键字 `@protected`。其用法与标记私有变量和受保护变量的方式类似。  \n\n\
    > **注意**  \n> 通常情况下，Objective-C 程序员不会大量使用公有或受保护的实例变量。由于其动态特性，Objective-C 中的类是通过其方法，并利用消息传递机制来使用的。这意味着直接访问变量的作用有限，在实践中应避免使用。\
    \  \n\n## 添加和定义实例方法  \n\n方法是定义类行为的主要机制。正是类中的方法集定义了对象可以直接响应的消息（对于派生类，这还包括其超类中的方法）。因此，面向对象编程的主要目标之一是只包含与你想向用户公开的功能直接相关的方法。\
    \  \n\n当对象接收到特定消息时，实例方法会定义对象实例的行为。例如，假设你想响应 `sayHello` 消息。可以按如下方式实现：  \n\n```\n\
    @interface SimpleObject : NSObject\n-(void) sayHello;\n@end\n\n@implementation\
    \ SimpleObject\n-(void) sayHello\n{\n   NSLog(@\"hello\");\n}\n@end\n```\n\n这个示例展示了一个通过其单一方法提供有限功能的类。要访问该方法，你可以创建一个\
    \ `SimpleObject` 类的对象，并发送 `sayHello` 消息。  \n\n```\nSimpleObject *object = [[SimpleObject\
    \ alloc] init];\n[object sayHello];\n```\n\n如前所述，方法使用分段语法进行声明，其中每个参数由一个描述其含义的词引出。方法\
    \ `sayHello` 没有任何参数，因此其名称后面没有冒号。另一方面，考虑下面所示的 `printText` 方法：  \n\n```\n@interface\
    \ SimpleObject2 : NSObject\n-(void) printText:(NSString *)message;\n-(void) printText:(NSString\
    \ *)message withSuffix:(NSString *)suffix;\n@end\n\n@implementation SimpleObject2\n\
    -(void) printText:(NSString *)message\n{\n        NSLog(@\"message is: %@\", message);\n\
    }\n\n-(void) printText:(NSString *)message withSuffix:(NSString *)suffix\n{\n\
    \        NSLog(@\"message is: %@%@\", message, suffix);\n}\n@end\n```\n\n在这里，新类定义了一个能够响应\
    \ `printText` 消息的对象。当向此对象发送消息时，你需要在冒号分隔符后提供一个参数，如下所示：  \n\n```\nvoid printTextExample()\n\
    {\n        SimpleObject2 *obj = [[SimpleObject2 alloc] init];\n        [obj printText:@\"\
    My message\"];\n}\n```\n\n类似地，当需要两个或多个参数时，它们会在相应的冒号之后给出，该冒号用于分隔参数关键字和实际参数。以下是使用\
    \ `printText:withSuffix:` 消息的示例。  \n\n```\nvoid printTextAndSuffixExample()\n\
    {\n        SimpleObject2 *obj = [[SimpleObject2 alloc] init];\n        [obj printText:@\"\
    My message\" withSuffix:@\"here\"];\n}\n```\n"
- fmt: "### The Difference Between Messages and Functions\n\nThere is a subtle difference\
    \ between sending messages to an object and calling a function in Objective-C.\
    \ When executing a function, both the programmer and the compiler know exactly\
    \ what is going to be executed as a result. For example, when a function like\
    \ `printf` is called, you know that some well-defined code to print the arguments\
    \ to the log will be executed. Similarly, when calling the `exp` function, you\
    \ can be certain that the function in the mathematical library that calculates\
    \ the exponential will be called.\n\nHowever, when it comes to working with objects,\
    \ a message sent to an object doesn’t guarantee that a particular piece of code\
    \ will be executed in each case. This is especially true when you send messages\
    \ to objects that you didn’t create. The difference has to do with the concept\
    \ of polymorphism. Polymorphism means that any object can respond to messages\
    \ in a different way—in a way that is most appropriate to its objectives. For\
    \ example, an `InkJetPrinter` object may respond to the `print` message differently\
    \ from a `LaserPrinter` object. However, only these objects need to understand\
    \ how the implementation of these methods is different. OO languages provide this\
    \ level of separation between the object sending a message and the object receiving\
    \ the message.\n\nConsider the following example, in which you create an `Employee`\
    \ class:\n\n```\n@interface Employee : NSObject\n{\n    // add any necessary variables\
    \ here\n}\n-(double) calculatePay;\n@end\n\n@implementation Employee\n-(double)\
    \ calculatePay\n{\n   return 0;\n}\n@end\n```\n\nYou also have an hourly employee\
    \ class, which represents employees that are paid by the number of hours worked.\n\
    \n```\n@interface HourlyEmployee : Employee\n{\n   int numWorkedHours;\n   double\
    \ hourlySalary;\n}\n@end\n\n@implementation HourlyEmployee\n-(double) calculatePay\n\
    {\n   return numWorkedHours * hourlySalary;\n}\n@end\n```\n\nFinally, you have\
    \ full-time employees, whose payment is established on a yearly basis.\n\n```\n\
    @interface FullTimeEmployee : Employee\n{\n   double yearlySalary;\n}\n@end\n\n\
    @implementation FullTimeEmployee\n-(double) calculatePay\n{\n   return yearlySalary\
    \ / 12;\n}\n@end\n```\n\nFrom a design point of view, there are three classes:\
    \ `Employee`, the base class, and two derived classes, `HourlyEmployee` and `FullTimeEmployee`.\
    \ These classes have implementations for the method `calculatePay`. But the implementation\
    \ used in each of these classes is different. In the first class, you have just\
    \ a basic implementation, where the value zero is returned, since there is no\
    \ information about the type of `Employee` being described.\n\nThe second class\
    \ has an implementation that depends on the variables `numWorkedHours` and `hourlySalary`.\
    \ This information is used to calculate the salary that needs to be paid to an\
    \ hourly-based employee. The third class is also derived from `Employee`, but\
    \ in that case the salary calculation is much easier, since a full time employee\
    \ receives the yearly salary in monthly installments.\n\nSuppose you use these\
    \ classes as follows:\n\n```\nvoid send_payment_message(Employee *employee)\n\
    {\n   double total = [employee calculatePay];\n   NSLog(@\"salary total is %d\"\
    , total);\n}\n```\n\nIn that case, although the value passed to the function is\
    \ of type `Employee`, you don’t know for sure which kind of `Employee` is being\
    \ used: it can either be an object of the original `Employee` class or one of\
    \ the derived classes. In each case, the value stored in total will be different,\
    \ leading to a calculation that depends on different information. This is possible\
    \ because messages in Objective-C are resolved only at runtime.\n\n### Polymorphic\
    \ Messages\n\nWhen the message is sent to an object, the runtime system determines\
    \ which method can be used to respond to that particular message. If a suitable\
    \ method is found, it will be used to handle the message. If no method is found\
    \ matching the message, then the runtime system will search for that method in\
    \ the superclass (the parent class). If the method is not found there, this process\
    \ will continue until either a method is found that matches the message in one\
    \ of its super classes, or an error is generated.\n\nIn the case presented above,\
    \ objects are related by inheritance to the class `Employee`. For this reason,\
    \ the compiler can be sure that there is a valid implementation for that particular\
    \ message. However, this is not always the case, since validation by the compiler\
    \ is not strictly necessary. To make it possible to send messages that are not\
    \ known at compile time, Objective-C allows any message to be sent to an object\
    \ of the generic type `id`. For example, you could have the following function:\n\
    \n```\nvoid send_pay_message(id object)\n{\n   double total = [object calculatePay];\n\
    \   NSLog(@\"salary total is %lf\", total);\n}\n```\n\nThe code is very similar\
    \ to the example above, but now the object is declared as just an `id`, the generic\
    \ type that can be used for any object, instead of the fixed type `Employee`.\
    \ In that case, no compile-time check is performed, but the runtime system will\
    \ still perform the same work it did before. The only difference is that the compiler\
    \ cannot guarantee that the message will be correctly sent during runtime. In\
    \ that case, the programmer needs to be careful enough to send certain messages\
    \ only to objects that can possibly respond to them (in that case, only objects\
    \ that respond to the `calculatePay` message should be used).\n\n### The Special\
    \ Variable `self`\n\nWhen implementing instance methods, it becomes necessary\
    \ to access the data stored in instance variables. This is possible through the\
    \ use of the `self` variable. In the interior of a method, `self` is a special\
    \ variable that is set to a pointer to the object itself. Thus, it can be used\
    \ as the target of messages as well as to access instance variables. For example,\
    \ consider the following definitions:\n\n```\n@interface Person : NSObject\n{\n\
    \    NSString *firstName;\n    NSString *lastName;\n}\n- (void)setFirstName:(NSString\
    \ *)firstName;\n- (void)setLastName:(NSString *)lastName;\n- (void)printFullName;\n\
    - (void)setFirstName:(NSString *)first lastName:(NSString*)last;\n@end\n\n@implementation\
    \ Person\n- (void)setFirstName:(NSString *)aFirstName\n{\n    self->firstName\
    \ = aFirstName;\n}\n- (void)setLastName:(NSString *)aLastName\n{\n    self->lastName\
    \ = aLastName;\n}\n- (void)printFullName\n{\n    NSLog(@\"Full name is %@ %@\"\
    , self->firstName, self->lastName);\n}\n- (void)setFirstName:(NSString *)first\
    \ lastName:(NSString*)last\n{\n   [self setFirstName:first];\n   [self setLastName:last];\n\
    }\n@end\n```\n\nNotice here that you can access the value of `firstName` and `lastName`\
    \ through the variable `self`, which is just a pointer to the current object.\
    \ While this is useful, it needs to be noted that an instance variable can be\
    \ freely accessed from inside a method, even without the use of `self`. For example,\
    \ the `setLastName` method could also be written as:\n\n```\n- (void)setLastName:(NSString\
    \ *)aLastName\n{\n    lastName = aLastName;\n}\n```\n\nThe second use of the variable\
    \ `self` in the class implementation shown here is as a target for other messages\
    \ in the same object. Since it is frequently necessary to invoke methods in the\
    \ same object, the special variable `self` is essential. Without a reference to\
    \ the current object, there would be no way to send a message that could be responded\
    \ to by other methods in your own class."
  raw: '### The Difference Between Messages and Functions


    There is a subtle difference between sending messages to an object and calling
    a function in Objective-C. When executing a function, both the programmer and
    the compiler know exactly what is going to be executed as a result. For example,
    when a function like `printf` is called, you know that some well-defined code
    to print the arguments to the log will be executed. Similarly, when calling the
    `exp` function, you can be certain that the function in the mathematical library
    that calculates the exponential will be called.


    However, when it comes to working with objects, a message sent to an object doesn’t
    guarantee that a particular piece of code will be executed in each case. This
    is especially true when you send messages to objects that you didn’t create. The
    difference has to do with the concept of polymorphism. Polymorphism means that
    any object can respond to messages in a different way—in a way that is most appropriate
    to its objectives. For example, an `InkJetPrinter` object may respond to the `print`
    message differently from a `LaserPrinter` object. However, only these objects
    need to understand how the implementation of these methods is different. OO languages
    provide this level of separation between the object sending a message and the
    object receiving the message.


    Consider the following example, in which you create an `Employee` class:


    `@interface Employee : NSObject`


    `{`


            `// add any necessary variables here`


    `}`


    `-(double) calculatePay;`


    `@end`


    `@implementation Employee`


    `-(double) calculatePay`


    `{`


       `return 0;`


    `}`


    `@end`


    You also have an hourly employee class, which represents employees that are paid
    by the number of hours worked.


    `@interface HourlyEmployee : Employee`


    `{`


       `int numWorkedHours;`


       `double hourlySalary;`


    `}`


    `@end`


    `@implementation HourlyEmployee`


    `-(double) calculatePay`


    `{`


       `return numWorkedHours * hourlySalary;`


    `}`


    `@end`


    Finally, you have full-time employees, whose payment is established in a yearly
    basis.


    `@interface FullTimeEmployee : Employee`


    `{`


       `double yearlySalary;`


    `}`


    `@end`


    `@implementation FullTimeEmployee`


    `-(double) calculatePay`


    `{`


       `return yearlySalary / 12;`


    `}`


    `@end`


    From a design point of view, there are three classes: `Employee`, the base class,
    and two derived classes, `HourlyEmployee` and `FullTimeEmployee`. These classes
    have implementations for the method `calculatePay`. But the implementation used
    in each of these classes is different. In the first class, you have just a basic
    implementation, where the value zero is returned, since there is no information
    about the type of `Employee` being described.


    The second class has an implementation that depends on the variables `numWorkedHours`
    and `hourlySalary`. This information is used to calculate the salary that needs
    to be paid to an hourly-based employee. The third class is also derived from `Employee`,
    but in that case the salary calculation is much easier, since a full time employee
    receives the yearly salary in monthly installments.


    Suppose you use these classes as follows:


    `void send_payment_message(Employee *employee)`


    `{`


       `double total = [employee calculatePay];`


       `NSLog(@"salary total is %d", total);`


    `}`


    In that case, although the value passed to the function is of type `Employee`,
    you don’t know for sure which kind of `Employee` is being used: it can either
    be an object of the original `Employee` class or one of the derived classes. In
    each case, the value stored in total will be different, leading to a calculation
    that depends on different information. This is possible because messages in Objective-C
    are resolved only at runtime.


    ### Polymorphic Messages


    When the message is sent to an object, the runtime system determines which method
    can be used to respond to that particular message. If a suitable method is found,
    it will be used to handle the message. If no method is found matching the message,
    then the runtime system will search for that method in the superclass (the parent
    class). If the method is not found there, this process will continue until either
    a method is found that matches the message in one of its super classes, or an
    error is generated.


    In the case presented above, objects are related by inheritance to the class `Employee`.
    For this reason, the compiler can be sure that there is a valid implementation
    for that particular message. However, this is not always the case, since validation
    by the compiler is not strictly necessary. To make it possible to send messages
    that are now known at compile time, Objective-C allows any message to be sent
    to an object of the generic type `id`. For example, you could have the following
    function:


    `void send_pay_message(id object)`


    `{`


       `double total = [object calculatePay];`


       `NSLog(@"salary total is %lf, total);`


    `}`


    The code is very similar to the example above, but now the object is declared
    as just an `id`, the generic type that can be used for any object, instead of
    the fixed type `Employee`. In that case, no compile-time check is performed, but
    the runtime system will still perform the same work it did before. The only difference
    is that the compiler cannot guarantee that the message will be correctly sent
    during runtime. In that case, the programmer needs to be careful enough to send
    certain messages only to objects that can possibly respond to them (in that case,
    only objects that respond to the `calculatePay` message should be used).


    ### The Special Variable self


    When implementing instance methods, it becomes necessary to access the data stored
    in instance variables. This is possible through the use of the `self` variable.
    In the interior of a method, `self` is a special variable that is set to a pointer
    to the object itself. Thus, it can be used as the target of messages as well as
    to access instance variables. For example, consider the following definitions:


    `@interface Person : NSObject`


    `{`


            `NSString *firstName;`


            `NSString *lastName;`


    `}`


    `- (void)setFirstName:(NSString *)firstName;`


    `- (void)setLastName:(NSString *)lastName;`


    `- (void)printFullName;`


    `- (void)setFirstName:(NSString *)first lastName:(NSString*)last;`


    `@end`


    `@implementation Person`


    `- (void)setFirstName:(NSString *)aFirstName`


    `{`


            `self->firstName = aFirstName;`


    `}`


    `- (void)setLastName:(NSString *)aLastName`


    `{`


            `self->lastName = aLastName;`


    `}`


    `- (void)printFullName`


    `{`


            `NSLog(@"Full name is %@ %@", self->firstName, self->lastName);`


    `}`


    `- (void)setFirstName:(NSString *)first lastName:(NSString*)last`


    `{`


       `[self setFirstName:first];`


       `[self setLastName:last];`


    `}`


    `@end`


    Notice here that you can access the value of `firstName` and `lastName` through
    the variable `self`, which is just a pointer to the current object. While this
    is useful, it needs to be noted that an instance variable can be freely accessed
    from inside a method, even without the use of `self`. For example, the `setLastName`
    method could also be written as


    `- (void)setLastName:(NSString *)aLastName`


    `{`


            `lastName = aLastName;`


    `}`


    The second use of the variable `self` in the class implementation shown here is
    as a target for other messages in the same object. Since it is frequently necessary
    to invoke methods in the same object, the special variable `self` is essential.
    Without a reference to the current object, there would be no way to send a message
    that could be responded by other methods in your own class.'
  trans: "\n### 消息与函数的区别\n\n在 Objective-C 中，向对象发送消息与调用函数之间存在细微差别。执行函数时，程序员和编译器都确切知道执行结果会调用哪些代码。例如，调用\
    \ `printf` 这类函数时，你清楚会执行一段定义明确的代码，将参数打印到日志中。同样，调用 `exp` 函数时，可以确定会调用数学库中计算指数的函数。\n\
    \n然而，处理对象时，向对象发送消息并不能保证每次都会执行特定的代码段。当你向非自己创建的对象发送消息时尤为如此。这种差异与多态的概念有关。多态意味着任何对象都能以不同方式响应消息——以最适合其目标的方式。例如，`InkJetPrinter`\
    \ 对象对 `print` 消息的响应方式可能与 `LaserPrinter` 对象不同。然而，只有这些对象需要理解这些方法的实现有何不同。面向对象语言在发送消息的对象和接收消息的对象之间提供了这种分离层次。\n\
    \n考虑以下示例，其中创建了一个 `Employee` 类：\n\n```\n@interface Employee : NSObject\n{\n   \
    \ // 在此添加任何必要的变量\n}\n-(double) calculatePay;\n@end\n\n@implementation Employee\n\
    -(double) calculatePay\n{\n   return 0;\n}\n@end\n```\n\n你还有一个小时工类，代表按工作小时数支付薪酬的员工。\n\
    \n```\n@interface HourlyEmployee : Employee\n{\n   int numWorkedHours;\n   double\
    \ hourlySalary;\n}\n@end\n\n@implementation HourlyEmployee\n-(double) calculatePay\n\
    {\n   return numWorkedHours * hourlySalary;\n}\n@end\n```\n\n最后，还有全职员工，其薪酬按年计算。\n\
    \n```\n@interface FullTimeEmployee : Employee\n{\n   double yearlySalary;\n}\n\
    @end\n\n@implementation FullTimeEmployee\n-(double) calculatePay\n{\n   return\
    \ yearlySalary / 12;\n}\n@end\n```\n\n从设计角度看，共有三个类：基类 `Employee` 以及两个派生类 `HourlyEmployee`\
    \ 和 `FullTimeEmployee`。这些类都实现了 `calculatePay` 方法。但每个类中使用的实现方式各不相同。在第一个类中，只有一个基础实现，返回值为零，因为没有关于所描述的\
    \ `Employee` 类型的信息。\n\n第二个类的实现依赖于 `numWorkedHours` 和 `hourlySalary` 这两个变量。这些信息用于计算需要支付给小时工的薪酬。第三个类也派生自\
    \ `Employee`，但该例中薪酬计算更简单，因为全职员工按月领取年薪。\n\n假设你按如下方式使用这些类：\n\n```\nvoid send_payment_message(Employee\
    \ *employee)\n{\n   double total = [employee calculatePay];\n   NSLog(@\"salary\
    \ total is %d\", total);\n}\n```\n\n在这种情况下，虽然传递给函数的值类型是 `Employee`，但你无法确定实际使用的是哪种\
    \ `Employee`：它可以是原始 `Employee` 类的对象，也可以是派生类之一。每种情况下，存储在 `total` 中的值都不同，导致计算依赖的信息也不同。这之所以可行，是因为\
    \ Objective-C 中的消息仅在运行时解析。\n\n### 多态消息\n\n当消息发送给对象时，运行时系统会确定哪个方法可用于响应特定消息。如果找到合适的方法，将用它来处理该消息。如果未找到匹配消息的方法，运行时系统将搜索其超类（父类）。如果在超类中也未找到，则此过程会继续，直到在某个超类中找到匹配消息的方法，或生成错误为止。\n\
    \n在上述示例中，对象通过继承与 `Employee` 类相关联。因此，编译器可以确保该特定消息存在有效实现。但情况并非总是如此，因为编译器的验证并非严格必要。为了能够发送编译时未知的消息，Objective-C\
    \ 允许向通用类型 `id` 的对象发送任何消息。例如，可以有以下函数：\n\n```\nvoid send_pay_message(id object)\n\
    {\n   double total = [object calculatePay];\n   NSLog(@\"salary total is %lf\"\
    , total);\n}\n```\n\n这段代码与上述示例非常相似，但现在对象被声明为仅 `id` 类型，即可用于任何对象的通用类型，而不是固定的 `Employee`\
    \ 类型。在这种情况下，不执行编译时检查，但运行时系统仍会执行与之前相同的工作。唯一的区别是编译器无法保证消息在运行时能被正确发送。因此，程序员需要足够小心，仅向可能响应该消息的对象发送特定消息（在此例中，仅使用能响应\
    \ `calculatePay` 消息的对象）。\n\n### 特殊变量 `self`\n\n实现实例方法时，有必要访问存储在实例变量中的数据。这可以通过使用\
    \ `self` 变量来实现。在方法内部，`self` 是一个特殊变量，被设置为指向对象本身的指针。因此，它不仅可作为消息的目标，还可用于访问实例变量。例如，考虑以下定义：\n\
    \n```\n@interface Person : NSObject\n{\n    NSString *firstName;\n    NSString\
    \ *lastName;\n}\n- (void)setFirstName:(NSString *)firstName;\n- (void)setLastName:(NSString\
    \ *)lastName;\n- (void)printFullName;\n- (void)setFirstName:(NSString *)first\
    \ lastName:(NSString*)last;\n@end\n\n@implementation Person\n- (void)setFirstName:(NSString\
    \ *)aFirstName\n{\n    self->firstName = aFirstName;\n}\n- (void)setLastName:(NSString\
    \ *)aLastName\n{\n    self->lastName = aLastName;\n}\n- (void)printFullName\n\
    {\n    NSLog(@\"Full name is %@ %@\", self->firstName, self->lastName);\n}\n-\
    \ (void)setFirstName:(NSString *)first lastName:(NSString*)last\n{\n   [self setFirstName:first];\n\
    \   [self setLastName:last];\n}\n@end\n```\n\n注意此处你可以通过变量 `self` 访问 `firstName`\
    \ 和 `lastName` 的值，该变量只是指向当前对象的指针。虽然这很有用，但需要注意的是，即使不使用 `self`，实例变量也可以在方法内部自由访问。例如，`setLastName`\
    \ 方法也可以写成：\n\n```\n- (void)setLastName:(NSString *)aLastName\n{\n    lastName\
    \ = aLastName;\n}\n```\n\n在此处展示的类实现中，变量 `self` 的第二个用途是作为同一对象中其他消息的目标。由于经常需要调用同一对象中的方法，特殊变量\
    \ `self` 至关重要。没有对当前对象的引用，就无法发送可由自身类中其他方法响应的消息。\n"
- fmt: "# Defining Class Methods\n\nA class method is different from an instance method\
    \ in that it is triggered by a message sent to the name of a class, not to a particular\
    \ object. Therefore, it is possible to send messages to a class even before a\
    \ single object of that class has been created. This is a simple but effective\
    \ way to perform creation and initialization of objects. For example, consider\
    \ the following code that uses the `NSString` class:\n\n```\nNSString *copyString(NSString\
    \ *string)\n\n{\n\n        NSString *copy = [NSString stringWithString:string];\n\
    \n        return copy;\n\n}\n```\n\nThe objective of this function is to copy\
    \ the original string, returning a pointer to the new object of the `NSString`\
    \ type with the same text content. To do this, you send a message to the `NSString`\
    \ class, asking it to create a new string object and to initialize it using the\
    \ single string passed as argument. Notice that, as a consequence, the class is\
    \ asked to perform all of these tasks: the `NSString` instance is not responsible\
    \ for the result.\n\nLet’s see an example of how to add a new class method, called\
    \ `performClassTask`, to a class interface and implementation. To define a class\
    \ method, the syntax used is almost identical to an instance method definition.\
    \ The only difference is that such methods start with a plus symbol (`+`) instead\
    \ of a minus (`-`).\n\n```\n@interface MyClass : NSObject\n\n+ (void) performClassTask;\n\
    \n@end\n\n@implementation MyClass\n\n+ (void) performClassTask\n\n{\n\n   // implementation\
    \ goes here\n\n}\n\n@end\n```\n\nAnother difference when implementing a class\
    \ method is that it doesn’t have access to instance variables of the object through\
    \ the `self` keyword. This makes logical sense because such a method is not running\
    \ as part of the object. A class method is attached instead to the class object,\
    \ of which only one exists for each class in the application. The variable `self`,\
    \ in this case, refers to that class object.\n\nAs you saw in the first example,\
    \ class methods are a convenient way to create and initialize new instances of\
    \ a particular class. Since they operate at the class level, they can be invoked\
    \ before the object exists. Thus, it is possible to use a class method to perform\
    \ any number of prior steps necessary for the creation of a complex object.\n\n\
    To see several examples of the concept of class methods, just look at some of\
    \ the most common classes in the Foundation framework. For example, the `NSString`\
    \ class has a number of class methods that create and initialize a new string\
    \ based on input provided by the client. Here is a sample code that creates a\
    \ new string based on an existing pointer to characters:\n\n```\nNSString *stringFromCArray(const\
    \ char *text)\n\n{\n\n        return [NSString stringWithUTF8String:text];\n\n\
    }\n```\n\nAs you see, the message is sent to the `NSString` class directly. The\
    \ class method is then responsible for allocating a new object and properly initializing\
    \ it with the provided pointer. This example also shows how to convert text stored\
    \ as in legacy code written in C. Since the C language doesn’t have objects, strings\
    \ are represented as simple arrays of characters terminated by a null (zero value)\
    \ character. While this is a fast way to represent strings, it is also hard to\
    \ manipulate and it requires manual maintenance of the memory used by the string.\
    \ The `NSString` object is, in contrast, much easier to use and it can be updated\
    \ in a way that is similar to other objects in the system.\n\n## The init Method\n\
    \nThe `init` method performs an important function among other methods in a class.\
    \ It is the method called right after an object has been created, in the two-step\
    \ `alloc`/`init` pair. The `init` method is declared in the `NSObject` class,\
    \ but it is frequently necessary to override its definition in new classes.\n\n\
    One of the reasons you may want to redefine the `init` method is to provide a\
    \ customized initialization for one or more of the instance variables in the object.\
    \ By default, instance variables are initialized to zero, if they are numbers,\
    \ or `nil` (the null value for pointers) if they are objects. On the other hand,\
    \ it may be necessary or desirable to initialize instance variables to something\
    \ else that is more sensible for the class.\n\nFor example, suppose you have a\
    \ class representing `Cash`. The only two instance variables for this class are\
    \ `quantity` and `currency`. For `quantity`, it is OK to have the default value\
    \ of zero. However, for `currency` you want the default to be USD. Here is how\
    \ you can do that:\n\n```\n@interface Cash : NSObject {\n\n        double quantity;\n\
    \n        NSString *currency;\n\n}\n\n@end\n\n@implementation Cash\n\n- (id)init\
    \ {\n\n    self = [super init];\n\n    if (self) {\n\n        currency = @\"USD\"\
    ;\n\n    }\n\n    return self;\n\n}\n\n@end\n```\n\nFirst, you define the interface\
    \ for the class, where the two instance variables are declared. Notice that it\
    \ is not necessary to add `init` as a method in the class interface: `init` is\
    \ already part of the interface by inheritance, since `NSObject` is its superclass.\n\
    \nNext, you provide an implementation for the `init` method in the `@implementation`\
    \ section. The implementation has to follow a structure similar to what is displayed\
    \ here to conform to the expectations of users of the class. Therefore, the first\
    \ action needs to be calling the `init` function in the parent class, through\
    \ the special variable `super`. Second, you check that `self` points to a valid\
    \ object and, in the positive case, initialize its variable `currency` to the\
    \ value `@\"USD\"`.\n\nThe same process needs to be followed for any class that\
    \ needs to define an initializer method. You can also declare initializers that\
    \ accept parameters. For example, an `init` method that receives the currency\
    \ name as a parameter could be coded as follows:\n\n```\n- (id)initWithCurrency:(NSString*)aCurrency\
    \ {\n\n    self = [super init];\n\n    if (self) {\n\n        currency = [NSString\
    \ stringWithString:aCurrency];\n\n    }\n\n    return self;\n\n}\n```\n\nIn this\
    \ case, you still call the `init` class in the parent class, but the argument\
    \ `aCurrency` is now used to initialize the `currency` instance variable.\n\n\
    # Defining Properties\n\nInstance variables are used to store data associated\
    \ with an object. Instance methods are used to implement the functionality provided\
    \ by objects of a particular class. Together, these two elements are enough to\
    \ deliver all of the main advantages of OOP. However, there are cases in which\
    \ it is helpful to work with a combination of methods and variables. This is the\
    \ reason why properties were introduced to the language.\n\nA property is a syntax\
    \ used to simplify the creation of methods for setting and getting a particular\
    \ value associated to an object. Although a property is similar in use to an instance\
    \ variable, it doesn’t need to be associated to any variable in particular. A\
    \ property is a practical way of providing access to data that needs to be properly\
    \ handled by the application.\n\nConsider, for example, the case in which some\
    \ data is used in two or more areas of an application. Consequently, it is desirable\
    \ to trigger an update mechanism every time the data is changed. This is a case\
    \ in which a property could be used to provide a simple interface for data access.\n\
    \n```\n@interface Person : NSObject\n\n{\n\n        NSString *name_;\n\n}\n\n\
    @property(readwrite,retain,nonatomic) NSString *name;\n\n@end\n\n@implementation\
    \ Person\n\n-(void) setName:(NSString*)aName\n\n{\n\n        name_ = aName;\n\n\
    \        // notify UI of name change\n\n}\n\n-(NSString *)name\n\n{\n\n      \
    \  return name_;\n\n}\n\n@end\n```\n\nIn this example, you have a `Person` object\
    \ that contains a `name` property (I will explain the attributes between parentheses\
    \ later). Associated with that property are two methods: the first is used to\
    \ set the property, and the second returns the value currently stored. To store\
    \ the content of the property, class `Person` uses an instance variable called\
    \ `name_`."
  raw: '## Defining Class Methods


    A class method is different from an instance method in that it is triggered by
    a message sent to the name of a class, not to a particular object. Therefore,
    it is possible to send messages to a class even before a single object of that
    class has been created. This is a simple but effective way to perform creation
    and initialization of objects. For example, consider the following code that uses
    the `NSString` class:


    `NSString *copyString(NSString *string)`


    `{`


            `NSString *copy = [NSString stringWithString:string];`


            `return copy;`


    `}`


    The objective of this function is to copy the original string, returning a pointer
    to the new object of the `NSString` type with the same text content. To do this,
    you send a message to the `NSString` class, asking it to create a new string object
    and to initialize it using the single string passed as argument. Notice that,
    as a consequence, the class is asked to perform all of these tasks: the `NSString`
    instance is not responsible for the result.


    Let’s see an example of how to add a new class method, called `performClassTask`,
    to a class interface and implementation. To define a class method, the syntax
    used is almost identical to an instance method definition. The only difference
    is that such methods start with a plus symbol (+) instead of a minus (-).


    `@interface MyClass : NSObject`


    `+ (void) performClassTask;`


    `@end`


    `@implementation MyClass`


    `+ (void) performClassTask`


    `{`


       `// implementation goes here`


    `}`


    `@end`


    Another difference when implementing a class method is that it doesn’t have access
    to instance variables of the object through the `self` keyword. This makes logical
    sense because such a method is not running as part of the object. A class method
    is attached instead to the class object, of which only one exists for each class
    in the application. The variable `self`, in this case, refers to that class object.


    As you saw in the first example, class methods are a convenient way to create
    and initialize new instances of a particular class. Since they operate at the
    class level, they can be invoked before the object exists. Thus, it is possible
    to use a class method to perform any number of prior steps necessary for the creation
    of a complex object.


    To see several examples of the concept of class methods, just look at some of
    the most common classes in the Foundation framework. For example, the `NSString`
    class has a number of class methods that create and initialize a new string based
    on input provided by the client. Here is a sample code that creates a new string
    based on an existing pointer to characters:


    `NSString *stringFromCArray(const char *text)`


    `{`


            `return [NSString stringWithUTF8String:text];`


    `}`


    As you see, the message is sent to the `NSString` class directly. The class method
    is then responsible for allocating a new object and properly initializing it with
    the provided pointer. This example also shows how to convert text stored as in
    legacy code written in C. Since the C language doesn’t have objects, strings are
    represented as simple arrays of characters terminated by a null (zero value) character.
    While this is a fast way to represent strings, it is also hard to manipulate and
    it requires manual maintenance of the memory used by the string. The `NSString`
    object is, in contrast, much easier to use and it can be updated in a way that
    is similar to other objects in the system.


    ### The init Method


    The `init` method performs an important function among other methods in a class.
    It is the method called right after an object has been created, in the two-step
    `alloc`/`init` pair. The `init` method is declared in the `NSObject` class, but
    it is frequently necessary to override its definition in new classes.


    One of the reasons you may want to redefine the `init` method is to provide a
    customized initialization for one or more of the instance variables in the object.
    By default, instance variables are initialized to zero, if they are numbers, or
    nil (the null value for pointers) if they are objects. On the other hand, it may
    be necessary or desirable to initialize instance variables to something else that
    is more sensible for the class.


    For example, suppose you have a class representing `Cash`. The only two instance
    variables for this class are `quantity` and `currency`. For `quantity`, it is
    OK to have the default value of zero. However, for `currency` you want the default
    to be USD. Here is how you can do that:


    `@interface Cash : NSObject {`


            `double quantity;`


            `NSString *currency;`


    `}`


    `@end`


    `@implementation Cash`


    `- (id)init {`


        `self = [super init];`


        `if (self) {`


            `currency = @"USD";`


        `}`


        `return self;`


    `}`


    `@end`


    First, you define the interface for the class, where the two instance variables
    are declared. Notice that it is not necessary to add `init` as a method in the
    class interface: `init` is already part of the interface by inheritance, since
    `NSObject` is its superclass.


    Next, you provide an implementation for the `init` method in the `@implementation`
    section. The implementation has to follow a structure similar to what is displayed
    here to conform to the expectations of users of the class. Therefore, the first
    action needs to be calling the `init` function in the parent class, through the
    special variable `super`. Second, you check that `self` points to a valid object
    and, in the positive case, initialize its variable `currency` to the value `@"USD"`.


    The same process needs to be followed for any class that needs to define an initializer
    method. You can also declare initializers that accept parameters. For example,
    an `init` method that receives the currency name as a parameter could be coded
    as follows:


    `- (id)initWithCurrency:(NSString*)aCurrency {`


        `self = [super init];`


        `if (self) {`


            `currency = [NSString stringWithString:aCurrency];`


        `}`


        `return self;`


    `}`


    In this case, you still call the `init` class in the parent class, but the argument
    `aCurrency` is now used to initialize the `currency` instance variable.


    ## Defining Properties


    Instance variables are used to store data associated with an object. Instance
    methods are used to implement the functionality provided by objects of a particular
    class. Together, these two elements are enough to deliver all of the main advantages
    of OOP. However, there are cases in which it is helpful to work with a combination
    of methods and variables. This is the reason why properties were introduced to
    the language.


    A property is a syntax used to simplify the creation of methods for setting and
    getting a particular value associated to an object. Although a property is similar
    in use to an instance variable, it doesn’t need to be associated to any variable
    in particular. A property is a practical way of providing access to data that
    needs to be properly handled by the application.


    Consider, for example, the case in which some data is used in two or more areas
    of an application. Consequently, it is desirable to trigger an update mechanism
    every time the data is changed. This is a case in which a property could be used
    to provide a simple interface for data access.


    `@interface Person : NSObject`


    `{`


            `NSString *name_;`


    `}`


    `@property(readwrite,retain,nonatomic) NSString *name;`


    `@end`


    `@implementation Person`


    `-(void) setName:(NSString*)aName`


    `{`


            `name_ = aName;`


            `// notify UI of name change`


    `}`


    `-(NSString *)name`


    `{`


            `return name_;`


    `}`


    `@end`


    In this example, you have a `Person` object that contains a `name` property (I
    will explain the attributes between parentheses later). Associated with that property
    are two methods: the first is used to set the property, and the second returns
    the value currently stored. To store the content of the property, class `Person`
    uses an instance variable called `name_`.'
  trans: "\n# 定义类方法\n\n类方法与实例方法的不同之处在于，它是由发送给类名称的消息触发的，而不是发送给特定对象。因此，即使在创建该类的任何一个对象之前，也可以向类发送消息。这是执行对象创建和初始化的一种简单而有效的方式。例如，考虑以下使用\
    \ `NSString` 类的代码：\n\n```\nNSString *copyString(NSString *string)\n\n{\n\n   \
    \     NSString *copy = [NSString stringWithString:string];\n\n        return copy;\n\
    \n}\n```\n\n此函数的目标是复制原始字符串，返回一个指向具有相同文本内容的 `NSString` 类型新对象的指针。为此，你向 `NSString`\
    \ 类发送一条消息，要求它创建一个新的字符串对象，并使用作为参数传入的单个字符串进行初始化。请注意，结果是要求类执行所有这些任务：`NSString` 实例不负责最终结果。\n\
    \n让我们看一个例子，演示如何向类接口和实现添加一个名为 `performClassTask` 的新类方法。要定义类方法，使用的语法与实例方法定义几乎相同。唯一的区别在于，此类方法以加号（`+`）开头，而不是减号（`-`）。\n\
    \n```\n@interface MyClass : NSObject\n\n+ (void) performClassTask;\n\n@end\n\n\
    @implementation MyClass\n\n+ (void) performClassTask\n\n{\n\n   // 实现代码写在这里\n\n\
    }\n\n@end\n```\n\n实现类方法时的另一个区别是，它不能通过 `self` 关键字访问对象的实例变量。这在逻辑上是合理的，因为此类方法并非作为对象的一部分运行。类方法实际上是附着在类对象上的，在应用程序中，每个类只存在一个这样的类对象。在这种情况下，变量\
    \ `self` 指的是那个类对象。\n\n正如你在第一个示例中看到的，类方法是创建和初始化特定类的新实例的一种便捷方式。由于它们在类级别上操作，因此可以在对象存在之前被调用。因此，可以使用类方法来执行创建复杂对象所需的任意数量的前期步骤。\n\
    \n要查看类方法概念的多个示例，只需看看 Foundation 框架中一些最常见的类。例如，`NSString` 类有许多类方法，它们基于客户端提供的输入来创建和初始化一个新字符串。以下是一个示例代码，它基于一个现有的指向字符的指针来创建一个新字符串：\n\
    \n```\nNSString *stringFromCArray(const char *text)\n\n{\n\n        return [NSString\
    \ stringWithUTF8String:text];\n\n}\n```\n\n如你所见，消息是直接发送给 `NSString` 类的。然后，类方法负责分配一个新对象，并使用所提供的指针正确地初始化它。这个例子还展示了如何转换以\
    \ C 语言编写的遗留代码中存储的文本。由于 C 语言没有对象，字符串被表示为由空字符（零值）结尾的简单字符数组。虽然这是一种表示字符串的快速方式，但它也难以操作，并且需要手动维护字符串使用的内存。相比之下，`NSString`\
    \ 对象用起来要容易得多，并且可以以类似于系统中其他对象的方式更新。\n\n## init 方法\n\n`init` 方法在类的其他方法中执行一个重要功能。它是在对象创建之后立即调用的方法，位于两步的\
    \ `alloc`/`init` 配对中。`init` 方法在 `NSObject` 类中声明，但在新类中经常需要重写其定义。\n\n你可能想要重新定义 `init`\
    \ 方法的原因之一是为对象中的一个或多个实例变量提供自定义的初始化。默认情况下，实例变量如果是数字，则被初始化为零；如果是对象，则被初始化为 `nil`（指针的空值）。另一方面，可能有必要或希望将实例变量初始化为对类来说更合理的其他值。\n\
    \n例如，假设你有一个代表 `Cash`（现金）的类。这个类仅有的两个实例变量是 `quantity`（数量）和 `currency`（货币）。对于 `quantity`\
    \ 来说，默认值为零是可以的。然而，对于 `currency`，你希望默认值是 USD。以下是实现方法：\n\n```\n@interface Cash :\
    \ NSObject {\n\n        double quantity;\n\n        NSString *currency;\n\n}\n\
    \n@end\n\n@implementation Cash\n\n- (id)init {\n\n    self = [super init];\n\n\
    \    if (self) {\n\n        currency = @\"USD\";\n\n    }\n\n    return self;\n\
    \n}\n\n@end\n```\n\n首先，你定义了类的接口，其中声明了两个实例变量。请注意，不必在类接口中将 `init` 添加为一个方法：`init`\
    \ 已经通过继承成为了接口的一部分，因为 `NSObject` 是其父类。\n\n接下来，你在 `@implementation` 部分为 `init` 方法提供了一个实现。该实现必须遵循此处展示的类似结构，以满足类使用者的期望。因此，第一个操作需要通过特殊变量\
    \ `super` 调用父类中的 `init` 函数。其次，你检查 `self` 是否指向一个有效的对象，如果是肯定的情况，则将其变量 `currency`\
    \ 初始化为值 `@\"USD\"`。\n\n任何需要定义初始化方法的类都需要遵循相同的过程。你也可以声明接受参数的初始化方法。例如，一个接收货币名称作为参数的\
    \ `init` 方法可以编码如下：\n\n```\n- (id)initWithCurrency:(NSString*)aCurrency {\n\n \
    \   self = [super init];\n\n    if (self) {\n\n        currency = [NSString stringWithString:aCurrency];\n\
    \n    }\n\n    return self;\n\n}\n```\n\n在这种情况下，你仍然会调用父类中的 `init` 方法，但现在使用参数 `aCurrency`\
    \ 来初始化 `currency` 实例变量。\n\n# 定义属性\n\n实例变量用于存储与对象关联的数据。实例方法用于实现特定类对象所提供的功能。这两个元素结合在一起，足以实现面向对象编程的所有主要优势。然而，在某些情况下，结合方法和变量一起使用会很有帮助。这就是将属性引入该语言的原因。\n\
    \n属性是一种语法，用于简化创建设置和获取与对象关联的特定值的方法。虽然属性在使用上与实例变量类似，但它不需要与任何特定变量关联。属性是为需要被应用程序妥善处理的数据提供访问的一种实用方式。\n\
    \n例如，考虑某些数据在应用程序的两个或多个区域中使用的情况。因此，每次数据更改时，最好触发一个更新机制。在这种情况下，可以使用属性为数据访问提供简单的接口。\n\
    \n```\n@interface Person : NSObject\n\n{\n\n        NSString *name_;\n\n}\n\n\
    @property(readwrite,retain,nonatomic) NSString *name;\n\n@end\n\n@implementation\
    \ Person\n\n-(void) setName:(NSString*)aName\n\n{\n\n        name_ = aName;\n\n\
    \        // 通知 UI 名称已更改\n\n}\n\n-(NSString *)name\n\n{\n\n        return name_;\n\
    \n}\n\n@end\n```\n\n在这个例子中，你有一个 `Person` 对象，它包含一个 `name` 属性（我稍后会解释括号中的属性）。与该属性关联的有两个方法：第一个方法用于设置属性，第二个方法返回当前存储的值。为了存储属性的内容，类\
    \ `Person` 使用了一个名为 `name_` 的实例变量。\n"
- fmt: "### Using Properties\n\nOnce these definitions are available, you can use\
    \ the property in some code, like so:\n\n```\n-(void)useProperty:(NSString*) newName\n\
    {\n   Person *myPerson = [[Person alloc] init];\n   myPerson.name = @\"new property\
    \ value\";\n}\n```\n\nNotice how this code uses the property as if it were a field\
    \ in a structure. This is a special syntax that works only on properties, since\
    \ `myPerson` is a pointer, and pointers don’t have data members (since they are\
    \ not structures). What this syntax is doing, instead, is calling the setter method\
    \ in the `Person` class. Whenever this happens, the code in the `setName:` method\
    \ will perform any action necessary to update the UI, as required.\n\nOf course,\
    \ you could achieve the same result calling the method directly, like so:\n\n\
    ```\n-(void)usePropertyAgain:(NSString*) newName\n{\n   Person *myPerson = [[Person\
    \ alloc] init];\n   [myPerson setName: @\"new property value\"];\n}\n```\n\nSimilarly,\
    \ a read access will call the getter method.\n\n```\n-(void)readProperty:(NSString*)\
    \ newName\n{\n   Person *myPerson = [[Person alloc] init];\n   myPerson.name =\
    \ @\"new property value\";\n   NSLog(@\"The name is now: %@\", myPerson.name);\n\
    }\n```\n\n### Synthesized Properties\n\nIn general, properties are a great way\
    \ to simplify the interface to functionality exposed in a class. This is particularly\
    \ true when changes in a property result in changes to other parts of the application.\
    \ The property mechanism can also be used when a particular data is calculated\
    \ in terms of variables stored in the object. For example, you could create a\
    \ property called `temperatureInCelsius` that could share the same data as `temperatureInFahrenheit`.\
    \ The only difference is that the getter and setter methods would be responsible\
    \ for the conversion between these two representations.\n\nThe implementation\
    \ of properties can be simplified if all you are doing is storing and retrieving\
    \ data from an instance variable. In that case, Objective-C provides a default\
    \ mechanism that can be used to automatically create the getter and setter methods.\
    \ Therefore, the implementation of the above property could be simplified to the\
    \ following:\n\n```\n@implementation Person\n@synthesize name = name_;\n@end\n\
    ```\n\nHere, you don’t need to directly implement any getter or setter. The compiler\
    \ will do that automatically, while you are just responsible for providing the\
    \ variable name (in this case, the variable is called `name_`).\n\n```\n@interface\
    \ Person : NSObject {\n        NSString *name_;\n}\n@property(readwrite,retain,nonatomic)\
    \ NSString *name;\n@end\n\n@implementation Person\n@synthesize name = name_;\n\
    @end\n```\n\nFinally, Objective-C provides an even simpler way to implement properties.\
    \ This is possible by leaving the instance variable to be defined solely by the\
    \ compiler. In that case, the previous example can be changed to\n\n```\n@interface\
    \ Person : NSObject\n@property(readwrite,retain,nonatomic) NSString *name;\n@end\n\
    \n@implementation Person\n- (void) useName\n{\n        NSLog(@\"name is %@\",\
    \ self.name);\n}\n@end\n```\n\nThen, the method `useName` is able to access the\
    \ property and print its value, even though no instance variable has been assigned\
    \ using `@synthesize`. In that case, the corresponding instance variable is automatic\
    \ generated, which by default uses the same name as the property with a leading\
    \ underscore added to the name.\n\n### Property Attributes\n\nAs shown above,\
    \ properties have a number of attributes that describe how it will be synthesized\
    \ or defined in the `@implementation` section. Here is a list of some of the most\
    \ common attributes associated with properties:\n\n*   **readwrite**: This attribute\
    \ is used for properties can be read and modified by client code. That is, other\
    \ objects can use the notation `object.property` to read as well as to set the\
    \ corresponding property (this is the default).\n*   **readonly**: This attribute\
    \ may be used to mark a property that cannot be modified. This is useful when\
    \ you just want to provide access to a particular data contained in the object,\
    \ but at the same time you don’t want to allow modifications to its value. For\
    \ example, a property may have its value synthesized from other instance variables—which\
    \ means that you don’t want to allow for independent modifications.\n*   **atomic**:\
    \ This attribute is useful when working with multithreaded code. It means that\
    \ the operations defined by this property cannot be interrupted once they start.\
    \ For example, multiple threads will be required to read and write values in a\
    \ single transaction. Notice that this option may result in unnecessary overhead\
    \ if the atomic operation is not necessary, but is also the default assignment\
    \ method.\n*   **nonatomic**: The opposite of the above attribute, this indicates\
    \ that the operation can be interrupted. Useful when writing single-threaded applications\
    \ that don’t have a need for atomic operations.\n*   **getter**: This attribute\
    \ can be used to define a custom name for the getter method. For example, you\
    \ may want to use a method that has already been defined. The compiler will route\
    \ all read accesses using the notation `object.property` to this method. The proper\
    \ syntax is `getter=methodName`.\n*   **setter**: This can be used to define a\
    \ custom name for the setter method. The use of this attribute is similar to `getter`,\
    \ as described above. The proper syntax is `setter=methodName`.\n*   **copy**:\
    \ The setter method will store a copy of the object passed as an argument, instead\
    \ of the object itself. This may be used to avoid additional references to an\
    \ existing object, and to isolate changes to the copied object from the original\
    \ one.\n*   **retain**: When using this option, the data will be retained for\
    \ memory management purposes. Any other object currently stored in that property\
    \ will be released.\n*   **assign**: This attribute indicates that the data passed\
    \ as argument to the setter method will be directly assigned to the variable used\
    \ by the property.\n\n**Note**\n\nSome of the options above deal with the way\
    \ memory is managed by objects. Don’t worry if you don’t understand the difference\
    \ between these memory management strategies: I will discuss these implementation\
    \ techniques in [Chapter 8](#A978-1-4302-5906-0_8_Chapter.html). For now, just\
    \ remember that different attributes can be used to determine how data is stored\
    \ and released by a property setter."
  raw: '### Using Properties


    Once these definitions are available, you can use the property in some code, like
    so:


    `-(void)useProperty:(NSString*) newName`


    `{`


       `Person *myPerson = [[Person alloc] init];`


       `myPerson.name = @"new property value";`


    `}`


    Notice how this code uses the property as if it were a field in a structure. This
    is a special syntax that works only on properties, since `myPerson` is a pointer,
    and pointers don’t have data members (since they are not structures). What this
    syntax is doing, instead, is calling the setter method in the `Person` class.
    Whenever this happens, the code in the `setName:` method will perform any action
    necessary to update the UI, as required.


    Of course, you could achieve the same result calling the method directly, like
    so:


    `-(void)usePropertyAgain:(NSString*) newName`


    `{`


       `Person *myPerson = [[Person alloc] init];`


       `[myPerson setName: @"new property value"];`


    `}`


    Similarly, a read access will call the getter method.


    `-(void)readProperty:(NSString*) newName`


    `{`


       `Person *myPerson = [[Person alloc] init];`


       `myPerson.name = @"new property value";`


       `NSLog(@"The name is now: %@", myPerson.name);`


    `}`


    ### Synthesized Properties


    In general, properties are a great way to simplify the interface to functionality
    exposed in a class. This is particularly true when changes in a property result
    in changes to other parts of the application. The property mechanism can also
    be used when a particular data is calculated in terms of variables stored in the
    object. For example, you could create a property called `temperatureInCelsius`
    that could share the same data as `temperatureInFahrenheit`. The only difference
    is that the getter and setter methods would be responsible for the conversion
    between these two representations.


    The implementation of properties can be simplified if all you are doing is storing
    and retrieving data from an instance variable. In that case, Objective-C provides
    a default mechanism that can be used to automatically create the getter and setter
    methods. Therefore, the implementation of the above property could be simplified
    to the following:


    `@implementation Person`


    `@synthesize name = name_;`


    `@end`


    Here, you don’t need to directly implement any getter or setter. The compiler
    will do that automatically, while you are just responsible for providing the variable
    name (in this case, the variable is called `name_`).


    `@interface Person : NSObject {`


            `NSString *name_;`


    `}`


    `@property(readwrite,retain,nonatomic) NSString *name;`


    `@end`


    `@implementation Person`


    `@synthesize name = name_;`


    `@end`


    Finally, Objective-C provides an even simpler way to implement properties. This
    is possible by leaving the instance variable to be defined solely by the compiler.
    In that case, the previous example can be changed to


    `@interface Person : NSObject`


    `@property(readwrite,retain,nonatomic) NSString *name;`


    `@end`


    `@implementation Person`


    `- (void) useName`


    `{`


            `NSLog(@"name is %@", self.name);`


    `}`


    `@end`


    Then, the method `useName` is able to access the property and print its value,
    even though no instance variable has been assigned using `@synthesize`. In that
    case, the corresponding instance variable is automatic generated, which by default
    uses the same name as the property with a leading underscore added to the name.


    ### Property Attributes


    As shown above, properties have a number of attributes that describe how it will
    be synthesized or defined in the `@implementation` section. Here is a list of
    some of the most common attributes associated with properties:


    *   readwrite: This attribute is used for properties can be read and modified
    by client code. That is, other objects can use the notation `object.property`
    to read as well as to set the corresponding property (this is the default).

    *   readonly: This attribute may be used to mark a property that cannot be modified.
    This is useful when you just want to provide access to a particular data contained
    in the object, but at the same time you don’t want to allow modifications to its
    value. For example, a property may have its value synthesized from other instance
    variables—which means that you don’t want to allow for independent modifications.

    *   atomic: This attribute is useful when working with multithreaded code. It
    means that the operations defined by this property cannot be interrupted once
    they start. For example, multiple threads will be required to read and write values
    in a single transaction. Notice that this option may result in unnecessary overhead
    if the atomic operation is not necessary, but is also the default assignment method.

    *   nonatomic: The opposite of the above attribute, this indicates that the operation
    can be interrupted. Useful when writing single-threaded applications that don’t
    have a need for atomic operations.

    *   getter: This attribute can be used to define a custom name for the getter
    method. For example, you may want to use a method that has already been defined.
    The compiler will route all read accesses using the notation `object.property`
    to this method. The proper syntax is `getter=methodName`.

    *   setter: This can be used to define a custom name for the setter method. The
    use of this attribute is similar to getter, as described above. The proper syntax
    is `setter=methodName`.

    *   copy: The setter method will store a copy of the object passed as an argument,
    instead of the object itself. This may be used to avoid additional references
    to an existing object, and to isolate changes to the copied object from the original
    one.

    *   retain: When using this option, the data will be retained for memory management
    purposes. Any other object currently stored in that property will be released.

    *   assign: This attribute indicates that the data passed as argument to the setter
    method will be directly assigned to the variable used by the property.


    Note


    Some of the options above deal with the way memory is managed by objects. Don’t
    worry if you don’t understand the difference between these memory management strategies:
    I will discuss these implementation techniques in [Chapter 8](#A978-1-4302-5906-0_8_Chapter.html).
    For now, just remember that different attributes can be used to determine how
    data is stored and released by a property setter.'
  trans: "\n### 使用属性\n\n一旦这些定义准备就绪，你就可以在代码中使用该属性，如下所示：\n\n```\n-(void)useProperty:(NSString*)\
    \ newName\n{\n   Person *myPerson = [[Person alloc] init];\n   myPerson.name =\
    \ @\"new property value\";\n}\n```\n\n请注意，这段代码是如何将属性当作结构体中的字段来使用的。这是一种特殊的语法，只适用于属性，因为\
    \ `myPerson` 是一个指针，而指针没有数据成员（因为它们不是结构体）。实际上，这种语法的作用是调用 `Person` 类中的 setter 方法。每当这种情况发生时，`setName:`\
    \ 方法中的代码就会执行必要的操作来更新用户界面（UI）。\n\n当然，你也可以通过直接调用方法来实现同样的效果，如下所示：\n\n```\n-(void)usePropertyAgain:(NSString*)\
    \ newName\n{\n   Person *myPerson = [[Person alloc] init];\n   [myPerson setName:\
    \ @\"new property value\"];\n}\n```\n\n类似地，对该属性执行读取访问将会调用 getter 方法。\n\n```\n\
    -(void)readProperty:(NSString*) newName\n{\n   Person *myPerson = [[Person alloc]\
    \ init];\n   myPerson.name = @\"new property value\";\n   NSLog(@\"The name is\
    \ now: %@\", myPerson.name);\n}\n```\n\n### 合成属性\n\n总的来说，属性是简化类中暴露功能接口的一种绝佳方式。当属性的变更会导致应用程序其他部分也发生变更时，这一点尤为明显。当某个特定数据是根据存储在对象中的变量计算得出时，也可以使用属性机制。例如，你可以创建一个名为\
    \ `temperatureInCelsius` 的属性，它与名为 `temperatureInFahrenheit` 的属性共享相同的数据。唯一的区别在于，getter\
    \ 和 setter 方法负责在这两种表示之间进行转换。\n\n如果你所做的只是在实例变量中存储和检索数据，那么属性的实现可以简化。在这种情况下，Objective-C\
    \ 提供了一种默认机制，可用于自动创建 getter 和 setter 方法。因此，上述属性的实现可以简化为以下形式：\n\n```\n@implementation\
    \ Person\n@synthesize name = name_;\n@end\n```\n\n在这里，你不需要直接实现任何 getter 或 setter\
    \ 方法。编译器会自动完成这项工作，而你只需要提供实例变量的名称（在这个例子中，变量名为 `name_`）。\n\n```\n@interface Person\
    \ : NSObject {\n        NSString *name_;\n}\n@property(readwrite,retain,nonatomic)\
    \ NSString *name;\n@end\n\n@implementation Person\n@synthesize name = name_;\n\
    @end\n```\n\n最后，Objective-C 提供了一种更简单的实现属性的方式。通过将实例变量完全交由编译器定义即可实现。在这种情况下，前面的例子可以修改为：\n\
    \n```\n@interface Person : NSObject\n@property(readwrite,retain,nonatomic) NSString\
    \ *name;\n@end\n\n@implementation Person\n- (void) useName\n{\n        NSLog(@\"\
    name is %@\", self.name);\n}\n@end\n```\n\n这样，即使没有使用 `@synthesize` 分配任何实例变量，`useName`\
    \ 方法也能访问该属性并打印其值。在这种情况下，相应的实例变量会被自动生成，默认情况下，该变量使用与属性相同的名称，并在名称前加上一条下划线。\n\n###\
    \ 属性特性\n\n如上所示，属性具有许多特性，这些特性描述了在 `@implementation` 部分中属性将如何被合成或定义。以下是属性一些最常见特性的列表：\n\
    \n*   **readwrite**：此特性用于标识可被客户端代码读取和修改的属性。也就是说，其他对象可以使用 `对象.属性` 的表示法来读取和设置相应的属性（这是默认特性）。\n\
    *   **readonly**：此特性可用于标记一个不可修改的属性。当你只想提供对对象中包含的特定数据的访问权限，同时又不想允许修改其值时，此特性很有用。例如，某个属性的值可能由其他实例变量合成而来——这意味着你不希望允许对其独立修改。\n\
    *   **atomic**：此特性在处理多线程代码时很有用。它表示由此属性定义的操作一旦开始就不能被中断。例如，多个线程将需要在单个事务中读写值。请注意，如果不需要原子操作，此选项可能会导致不必要的开销，但它也是默认的赋值方式。\n\
    *   **nonatomic**：与上述特性相反，它表示操作可以被中断。在编写不需要原子操作的单线程应用程序时很有用。\n*   **getter**：此特性可用于为\
    \ getter 方法自定义名称。例如，你可能希望使用一个已经定义好的方法。编译器会将所有使用 `对象.属性` 表示法的读取访问路由到此方法。正确的语法是\
    \ `getter=方法名`。\n*   **setter**：此特性可用于为 setter 方法自定义名称。该特性的用法与上述 `getter` 类似。正确的语法是\
    \ `setter=方法名`。\n*   **copy**：setter 方法会存储传递给它的参数对象的副本，而不是对象本身。这可以用来避免对现有对象的额外引用，并将对副本的修改与原始对象隔离开来。\n\
    *   **retain**：使用此选项时，数据会被保留以进行内存管理。该属性中之前存储的任何其他对象都将被释放。\n*   **assign**：此特性表示传递给\
    \ setter 方法的参数数据将被直接赋值给属性所使用的变量。\n\n**注意**\n\n上述部分选项涉及对象管理内存的方式。如果你不理解这些内存管理策略之间的区别，无需担心：我将在第\
    \ 8 章中详细讨论这些实现技术。目前，只需记住可以使用不同的特性来决定属性 setter 如何存储和释放数据即可。\n"
- fmt: "# Classes and File Structure\n\nObjective-C uses two main kinds of source\
    \ code files: header files and module implementation files. A header file is used\
    \ to contain the interface section of a class. Other elements, such as constants\
    \ and auxiliary type definitions, can also be included in the header file.\n\n\
    The second type of file, a module definition, is saved with the `.m` extension.\
    \ The module definition is where the bulk of the implementation of a class is\
    \ contained. It will have not only the implementation section, but also any other\
    \ functions and type definitions necessary for the module.\n\nThe header file\
    \ is necessary to provide a public interface for the class. Other modules in the\
    \ project will access the class through its public interface. Therefore they need\
    \ access to the header file where this interface is defined.\n\nThere are two\
    \ ways to have access to definitions in a header file. First, there is the traditional\
    \ C style include. For example, to include a standard I/O library in C-style,\
    \ you can use:\n\n```\n#include <stdio.h>\n```\n\nThis is necessary to include\
    \ definitions for traditional and legacy code available to the application. Objective-C,\
    \ however, provides a second method for header file inclusion. This second style\
    \ is used to simplify the creation of interfaces. You can include such interfaces\
    \ using the `import` directive, like so:\n\n```\n#import <Foundation/NSObject.h>\n\
    ```\n\nThis will import the `NSObject.h` header contained in the Foundation framework.\
    \ It is common to organize classes into frameworks, and the notation `FrameworkName/ObjectName.h`\
    \ is an easy way to remember where an object may be located.\n\nHere is a complete\
    \ example of what the header and implementation files may look like for a simple\
    \ class. First, the header file for a `Loan` class, where you represent common\
    \ properties of loans such as `principal` and `interest`.\n\n```\n// file Loan.h\n\
    \n@interface Loan : NSObject\n{\n    double principal;\n    double interest;\n\
    }\n\n- (double)getMonthlyPayment;\n\n@end\n```\n\nAnd this is the corresponding\
    \ method implementation file:\n\n```\n// file Loan.m\n\n#import \"Loan.h\"\n\n\
    @implementation Loan\n\n- (double)getMonthlyPayment\n{\n    return principal *\
    \ (interest/12);\n}\n\n@end\n```\n\nOnce you have the code for a class split into\
    \ these two files, the header `Loan.h` is the only part that needs to be available\
    \ to other objects. This means that modifications in the implementation file `Loan.m`\
    \ have no influence in how the other classes in the system are compiled unless\
    \ the interface is changed in some way.\n\nOne of the great things that you can\
    \ do using this method of separating interface and implementation is to update\
    \ the implementation in a way that is independent of the interface. For example,\
    \ you can decide to change the way `getMonthlyPayment` is implemented. Suppose,\
    \ for example, that you want to have the interest calculated in a separate method,\
    \ instead of using an inline expression as you are doing right now. This would\
    \ result in the following implementation file:\n\n```\n// Loan.m\n\n#import \"\
    Loan.h\"\n\n@implementation Loan\n\n- (double) interestPerMonth\n{\n    return\
    \ interest/12;\n}\n\n// updated calculation of month payments\n// using the new\
    \ interestPerMonth method.\n- (double) getMonthlyPayment\n{\n    double monthlyInterest\
    \ = [self interestPerMonth];\n    return principal * monthlyInterest;\n}\n\n@end\n\
    ```\n\nNotice how the new calculation uses another method called `interestPerMonth`.\
    \ While the result is still the same, the new organization resulting from this\
    \ change allows for other changes in the future. For example, you may have to\
    \ use a more complicated technique for calculating monthly interest, depending\
    \ on the financial score of the borrower. This is now possible since the calculation\
    \ of interest has been separated from the calculation of the monthly payment.\n\
    \nAnother aspect of this example should be noticed: if a method is used only inside\
    \ the implementation, then it is not necessary to add it to the interface. This\
    \ is an important fact because it helps to reduce the amount of entries in the\
    \ `@interface` section. Only methods accessible to other classes need to be included\
    \ in the interface section, while methods that are used locally need to appear\
    \ only in the implementation section. As long as you add a method before its first\
    \ use, this is all you need to do. In a later chapter you will see a more general\
    \ way to add internal methods to an existing implementation.\n\n# Summary\n\n\
    Classes provide the building blocks of object-oriented programming. As OOP is\
    \ the main focus of Objective-C, it is very important to understand the concepts\
    \ of classes. In this chapter I presented everything you need to create and manipulate\
    \ classes in Objective-C.\n\nInitially, you saw how OOP may be an important tool\
    \ for software development. The concepts of OOP—such as encapsulation, polymorphism,\
    \ and inheritance—provide the basis for the design of modern software by allowing\
    \ an adequate level of abstraction during the design and development phases of\
    \ the project. OOP has been used for the last 30 years, and Objective-C is a language\
    \ that fully embraces the concepts proposed by the OOP community.\n\nYou learned\
    \ how to define new classes in Objective-C using the `@interface` and `@implementation`\
    \ sections. The syntax for classes allows such definitions to be split into public\
    \ header files and private implementation files.\n\nYou have also seen how to\
    \ define the interface variables and methods necessary to provide the full functionality\
    \ of any object. Instance methods have access to the instance variables declared\
    \ in the class. They also have access to other methods in the same class through\
    \ the use of the `self` variable.\n\nFinally, you learned about properties, an\
    \ effective way to simplify the process of setting and reading data from and to\
    \ an object. Properties are very flexible, and provide several ways for class\
    \ writers to interact with instance variables as well as intercept changes and\
    \ accesses to these properties. For example, you can provide this functionality\
    \ by the use of the `@synthesize` keyword.\n\nWith the essential understanding\
    \ about classes and objects acquired in this chapter, you are ready to delve into\
    \ the objects provided by the Objective-C frameworks. You start this exploration\
    \ in the next chapter, which will discuss strings and containers."
  raw: '## Classes and File Structure


    Objective-C uses two main kinds of source code files: header files and module
    implementation files. A header file is used to contain the interface section of
    a class. Other elements, such as constants and auxiliary type definitions, can
    also be included in the header file.


    The second type of file, a module definition, is saved with the `.m` extension.
    The module definition is where the bulk of the implementation of a class is contained.
    It will have not only the implementation section, but also any other functions
    and type definitions necessary for the module.


    The header file is necessary to provide a public interface for the class. Other
    modules in the project will access the class through its public interface. Therefore
    they need access to the header file where this interface is defined.


    There are two ways to have access to definitions in a header file. First, there
    is the traditional C style include. For example, to include a standard I/O library
    in C-style, you can use


    `#include <stdio.h>`


    This is necessary to include definitions for traditional and legacy code available
    to the application. Objective-C, however, provides a second method for header
    file inclusion. This second style is used to simplify the creation of interfaces.
    You can include such interfaces using the `import` directive, like so:


    `#import <Foundation/NSObject.h>`


    This will import the `NSObject.h` header contained in the Foundation framework.
    It is common to organize classes into frameworks, and the notation `FrameworkName/ObjectName.h`
    is an easy way to remember where an object may be located.


    Here is a complete example of what the header and implementation files may look
    like for a simple class. First, the header file for a `Loan` class, where you
    represent common properties of loans such as `principal` and `interest`.


    `// file Loan.h`


    `@interface Loan : NSObject`


    `{`


    `double principal;`


    `double interest;`


    `}`


    `- (double)getMonthlyPayment;`


    `@end`


    And this is the corresponding method implementation file:


    `// file Loan.m`


    `#import "Loan.h"`


    `@implementation Loan`


    `- (double)getMonthlyPayment`


    `{`


    `return principal * (interest/12);`


    `}`


    `@end`


    Once you have the code for a class split into these two files, the header `Loan.h`
    is the only part that needs to be available to other objects. This means that
    modifications in the implementation file `Loan.m` have no influence in how the
    other classes in the system are compiled unless the interface is changed in some
    way.


    One of the great things that you can do using this method of separating interface
    and implementation is to update the implementation in a way that is independent
    of the interface. For example, you can decide to change the way `getMonthlyPayment`
    is implemented. Suppose, for example, that you want to have the interest calculated
    in a separate method, instead of using an inline expression as you are doing right
    now. This would result in the following implementation file:


    `// Loan.m`


    `#import "Loan.h"`


    `@implementation Loan`


    `- (double) interestPerMonth`


    `{`


    `return interest/12;`


    `}`


    `// updated calculation of month payments`


    `// using the new interestPerMonth method.`


    `- (double) getMonthlyPayment`


    `{`


    `double monthlyInterest = [self interestPerMonth];`


    `return principal * monthlyInterest;`


    `}`


    `@end`


    Notice how the new calculation uses another method called `interestPerMonth`.
    While the result is still the same, the new organization resulting from this change
    allows for other changes in the future. For example, you may have to use a more
    complicated technique for calculating monthly interest, depending on the financial
    score of the borrower. This is now possible since the calculation of interest
    has been separated from the calculation of the monthly payment.


    Another aspect of this example should be noticed: if a method is used only inside
    the implementation, then it is not necessary to add it to the interface. This
    is an important fact because it helps to reduce the amount of entries in the `@interface`
    section. Only methods accessible to other classes need to be included in the interface
    section, while methods that are used locally need to appear only in the implementation
    section. As long as you add a method before its first use, this is all you need
    to do. In a later chapter you will see a more general way to add internal methods
    to an existing implementation.


    ## Summary


    Classes provide the building blocks of object-oriented programming. As OOP is
    the main focus of Objective-C, it is very important to understand the concepts
    of classes. In this chapter I presented everything you need to create and manipulate
    classes in Objective-C.


    Initially, you saw how OOP may be an important tool for software development.
    The concepts of OOP—such as encapsulation, polymorphism, and inheritance—provide
    the basis for the design of modern software by allowing an adequate level of abstraction
    during the design and development phases of the project. OOP has been used for
    the last 30 years, and Objective-C is a language that fully embraces the concepts
    proposed by the OOP community.


    You learned how to define new classes in Objective-C using the `@interface` and
    `@implementation` sections. The syntax for classes allows such definitions to
    be split into public header files and private implementation files.


    You have also seen how to define the interface variables and methods necessary
    to provide the full functionality of any object. Instance methods have access
    to the instance variables declared in the class. They also have access to other
    methods in the same class through the use of the `self` variable.


    Finally, you learned about properties, an effective way to simplify the process
    of setting and reading data from and to an object. Properties are very flexible,
    and provide several ways for class writers to interact with instance variables
    as well as intercept changes and accesses to these properties. For example, you
    can provide this functionality by the use of the `@synthesize` keyword.


    With the essential understanding about classes and objects acquired in this chapter,
    you are ready to delve into the objects provided by the Objective-C frameworks.
    You start this exploration in the next chapter, which will discuss strings and
    containers.'
  trans: "\n# 类与文件结构\n\nObjective-C 使用两种主要的源代码文件：头文件和模块实现文件。头文件用于包含类的接口部分。其他元素，如常量和辅助类型定义，也可以包含在头文件中。\n\
    \n第二种类型的文件是模块定义，以 `.m` 扩展名保存。模块定义包含了类的大部分实现内容。它不仅包含实现部分，还包含模块所需的任何其他函数和类型定义。\n\
    \n头文件对于提供类的公共接口是必需的。项目中的其他模块将通过其公共接口访问该类。因此，它们需要访问定义此接口的头文件。\n\n有两种方式可以访问头文件中的定义。首先，是传统的\
    \ C 风格包含。例如，要以 C 风格包含标准 I/O 库，可以使用：\n\n```\n#include <stdio.h>\n```\n\n这对于包含应用程序中传统和遗留代码所需的定义是必要的。然而，Objective-C\
    \ 提供了第二种包含头文件的方法。这种第二种风格用于简化接口的创建。你可以使用 `import` 指令来包含此类接口，如下所示：\n\n```\n#import\
    \ <Foundation/NSObject.h>\n```\n\n这将导入 Foundation 框架中包含的 `NSObject.h` 头文件。将类组织到框架中是很常见的，而\
    \ `FrameworkName/ObjectName.h` 这种表示法是记住对象可能所在位置的简便方法。\n\n以下是一个完整示例，展示了一个简单类的头文件和实现文件可能是什么样的。首先，一个\
    \ `Loan` 类的头文件，其中表示贷款的常见属性，如 `principal` 和 `interest`。\n\n```\n// 文件 Loan.h\n\n\
    @interface Loan : NSObject\n{\n    double principal;\n    double interest;\n}\n\
    \n- (double)getMonthlyPayment;\n\n@end\n```\n\n这是相应的方法实现文件：\n\n```\n// 文件 Loan.m\n\
    \n#import \"Loan.h\"\n\n@implementation Loan\n\n- (double)getMonthlyPayment\n\
    {\n    return principal * (interest/12);\n}\n\n@end\n```\n\n一旦你将类的代码拆分为这两个文件，头文件\
    \ `Loan.h` 就是唯一需要提供给其他对象的部分。这意味着对实现文件 `Loan.m` 的修改不会影响系统中其他类的编译方式，除非接口以某种方式发生了更改。\n\
    \n使用这种将接口与实现分离的方法，你可以做到的一件很棒的事情是，以独立于接口的方式更新实现。例如，你可以决定改变 `getMonthlyPayment`\
    \ 的实现方式。假设，你希望将利息计算放在一个单独的方法中，而不是像现在这样使用内联表达式。这将产生以下实现文件：\n\n```\n// Loan.m\n\n\
    #import \"Loan.h\"\n\n@implementation Loan\n\n- (double) interestPerMonth\n{\n\
    \    return interest/12;\n}\n\n// 更新后的月供计算\n// 使用了新的 interestPerMonth 方法。\n- (double)\
    \ getMonthlyPayment\n{\n    double monthlyInterest = [self interestPerMonth];\n\
    \    return principal * monthlyInterest;\n}\n\n@end\n```\n\n注意新的计算是如何使用另一个名为 `interestPerMonth`\
    \ 的方法的。虽然结果仍然相同，但这种更改带来的新组织方式允许未来进行其他更改。例如，根据借款人的财务评分，你可能需要使用更复杂的技术来计算月利息。现在这是可行的，因为利息的计算已经从月供的计算中分离出来了。\n\
    \n这个示例的另一个方面值得注意：如果某个方法仅在实现内部使用，则无需将其添加到接口中。这是一个重要的事实，因为它有助于减少 `@interface` 部分的条目数量。只有其他类可访问的方法才需要包含在接口部分，而本地使用的方法只需出现在实现部分。只要你在第一次使用某个方法之前添加它，这就足够了。在后面的章节中，你将看到将内部方法添加到现有实现中的更通用方式。\n\
    \n# 总结\n\n类提供了面向对象编程的基本构建块。由于 OOP 是 Objective-C 的主要关注点，因此理解类的概念非常重要。在本章中，我介绍了在\
    \ Objective-C 中创建和操作类所需的一切知识。\n\n首先，你看到了 OOP 如何成为软件开发的重要工具。OOP 的概念（如封装、多态和继承）通过允许在项目的设计和开发阶段提供适当的抽象级别，为现代软件的设计奠定了基础。OOP\
    \ 在过去 30 年中一直被使用，而 Objective-C 是一种完全拥抱 OOP 社区所提出概念的语言。\n\n你学习了如何使用 `@interface`\
    \ 和 `@implementation` 部分在 Objective-C 中定义新类。类的语法允许将这些定义拆分为公共头文件和私有实现文件。\n\n你还了解了如何定义提供任何对象完整功能所需的接口变量和方法。实例方法可以访问在类中声明的实例变量。它们还可以通过使用\
    \ `self` 变量访问同一类中的其他方法。\n\n最后，你学习了属性，这是一种简化对对象进行数据设置和读取过程的有效方式。属性非常灵活，为类的编写者提供了多种与实例变量交互以及拦截对这些属性的更改和访问的方式。例如，你可以通过使用\
    \ `@synthesize` 关键字来提供此功能。\n\n通过在本章中获得的关于类和对象的基本理解，你已经准备好深入探索 Objective-C 框架提供的对象了。你将在下一章开始这一探索，该章将讨论字符串和容器。\n"
- fmt: "# 3. Strings and Container Classes\n\n## Abstract\n\nIn this chapter I discuss\
    \ some of the most common classes available in the Foundation framework. In particular,\
    \ I discuss the `NSString` class, used to manipulate all character sequences in\
    \ Objective-C. `NSString` offers a convenient interface to create strings, retrieve\
    \ part of a string, compare string values, and convert them into other formats.\n\
    \nAnother important class in the Foundation framework is `NSNumber`. Numbers are\
    \ one of the most basic concepts in computer programming, and they are usually\
    \ handled by the C language as native data types. However, there are times when\
    \ a number needs to be passed to or stored by other objects. When that is necessary,\
    \ a wrapper class such as `NSNumber` is the best way to simplify the conversion\
    \ between the C and Objective-C worlds.\n\nI also discuss the two main collection\
    \ types provided by Objective-C. `NSArray` is a simple class interface for a sequence\
    \ of objects. With the help of `NSArray` objects, you can efficiently store and\
    \ retrieve elements in a simple sequence.\n\n`NSDictionary` is a class that provides\
    \ the general service of storing key/value pairs. Each key has a unique value\
    \ stored in the dictionary, so that it can be efficiently retrieved. `NSDictionary`\
    \ gives programmers a rich set of messages that can be used to query, retrieve,\
    \ and process objects stored in such a dictionary container.\n\n## Strings\n\n\
    A string is a sequence of characters. The `NSString` class provides all the functionality\
    \ necessary for creating and modifying strings, and it is used throughout Cocoa\
    \ and related frameworks. Strings are used not only for messages, but also when\
    \ you need a textual representation of a component that is represented internally\
    \ in binary, such as an integer number, a floating pointer number, or an object.\n\
    \n### Creating Strings\n\nTo create strings, you use the `NSString` class, which\
    \ is part of the Foundation framework. To create an empty string, you just send\
    \ an `alloc` message to the `NSString` class, followed by an `init` message that\
    \ will properly initialize the members of the class.\n\n```\n- (void)createString\n\
    {\n        NSString *myStr = [[NSString alloc] initWithCString:\"my original string\"\
    \n                                            encoding:NSASCIIStringEncoding];\n\
    \        NSLog(@\"the string is %@\", myStr);\n}\n```\n\nThe first thing you do\
    \ in this function is send the `alloc` message to `NSString`, like you may do\
    \ with any Objective-C class. Then, you send the `initWithCString:encoding:` message\
    \ to the allocated object. The first parameter to that method is a C string, enclosed\
    \ in single quotes. The second parameter is the encoding type for the characters.\
    \ The most common option is the one shown, the ASCII encoding, but several other\
    \ options are available.\n\nOf course, it would be boring to go through all of\
    \ these steps just to create a string. That’s why there’s another, simpler option,\
    \ which you have been using since the first chapter: by adding the character `@`\
    \ to the beginning of a double quoted string, you tell the compiler to create\
    \ a new `NSString` object with the standard encoding. The compiler is responsible\
    \ for calling `alloc` and the right version of `init` for the resulting object.\
    \ This is a great effort reduction, and it also shows the great amount of work\
    \ that the compiler performs on your behalf when processing Objective-C code.\n\
    \n### NSString Methods\n\n`NSString` provides a rich interface for text manipulation.\
    \ There are methods that can be used to access single characters or a range of\
    \ characters. Some methods can be used to compare different strings, while others\
    \ can be used to return information about prefixes and suffixes.\n\nThe `length`\
    \ method is used to return the number of characters in a string. For example,\
    \ you could rewrite the above function in the following manner to display the\
    \ size of the string passed to the constructor:\n\n```\n- (void)createString\n\
    {\nNSString *myStr = [[NSString alloc] initWithCString:\"my original string\"\n\
    encoding:NSASCIIStringEncoding];\nNSLog(@\"the length of the string is %d\", [myStr\
    \ length]);\n// prints the length of the string is 18\n}\n```\n\nThe method `characterAtIndex:`\
    \ returns a single character that is located at the given index position. Remember\
    \ that, as with plain C arrays, `NSString` objects use a zero-based index. That\
    \ is, the index 1 is used for the second element, and so forth. The following\
    \ function will always return `YES`:\n\n```\n- (BOOL) compareString\n{\nNSString\
    \ *myStr = [[NSString alloc] initWithCString:\"my original string\"\nencoding:NSASCIIStringEncoding];\n\
    return [myStr characterAtIndex:4] == 'r';\n}\n```\n\nThe following function will\
    \ return `YES` if both strings have the same characters:\n\n```\n- (BOOL) stringsEqual:(NSString\
    \ *) :(NSString *)b\n{\nNSUInteger n1 = [a length];\nNSUInteger n2 = [b length];\n\
    if (n1 != n2)\n{\nreturn NO;\n}\nfor (int i=0; i<n1; ++i)\n{\nif ([a characterAtIndex:i]\
    \ != [b characterAtIndex:i])\n{\nreturn NO;\n}\n}\nreturn YES;\n}\n```\n\n> **Note:**\
    \ `NSUInteger` is a type defined by the Objective-C library to refer to an unsigned\
    \ integer. It is typically the same as `unsigned int`, but it is left as a separate\
    \ type to facilitate porting of Objective-C code to other platforms. Since there\
    \ is no guarantee that an `unsigned int` will have the same size on all platforms,\
    \ it is a good idea to use `NSUInteger` to achieve uniformity, especially when\
    \ you are writing code that is related to memory sizes, such as string lengths.\n\
    \nWhile it is possible to use `characterAtIndex:` to compare two strings, as you\
    \ did in the previous example, it is much more convenient to use the `compare:`\
    \ instance method for this job. When using `compare:`, the return value is of\
    \ type `NSComparisonResult`, and there are three possible values. `NSOrderedAscending`\
    \ means that the original string comes before the argument string in lexicographical\
    \ order. A result of `NSOrderedSame` means that the two strings are identical.\
    \ The remaining option is denoted by `NSOrderedDescending`. Here is an example:\n\
    \n```\n- (void) compareString:(NSString *)a with:(NSString *)b\n{\nNSComparisonResult\
    \ res = [a compare:b];\nif (res == NSOrderedAscending)\n{\nNSLog(@\"String %@\
    \ comes before %@\", a, b);\n}\nelse if (res == NSOrderedDescending)\n{\nNSLog(@\"\
    String %@ comes before %@\", b, a);\n}\nelse\n{\nNSLog(@\"The strings are identical\"\
    );\n}\n}\n```\n\nFinally, if you are interested just in simple equality testing\
    \ (that is, if you don’t care if the two strings are lexicographically in ascending\
    \ or descending order), there is an even faster way to achieve it. The method\
    \ `isEqualToString:` will take as a parameter another string and return `YES`\
    \ or `NO`, depending on the equality of all corresponding characters on both strings.\n\
    \nThe same kind of tests discussed above can be performed using case-insensitive\
    \ comparison. For example, `NSString` has a method called `caseInsensitiveCompare:`\
    \ that behaves similarly to `compare:` with the exception that characters such\
    \ as `\"a\"` and `\"A\"` are considered to be identical."
  raw: '# 3. Strings and Container Classes


    Abstract


    In this chapter I discuss some of the most common classes available in the Foundation
    framework. In particular, I discuss the `NSString` class, used to manipulate all
    character sequences in Objective-C. `NSString` offers a convenient interface to
    create strings, retrieve part of a string, compare string values, and convert
    them into other formats.


    In this chapter I discuss some of the most common classes available in the Foundation
    framework. In particular, I discuss the `NSString` class, used to manipulate all
    character sequences in Objective-C. `NSString` offers a convenient interface to
    create strings, retrieve part of a string, compare string values, and convert
    them into other formats.


    Another important class in the Foundation framework is `NSNumber`. Numbers are
    one of the most basic concepts in computer programming, and they are usually handled
    by the C language as native data types. However, there are times when a number
    needs to be passed to or stored by other objects. When that is necessary, a wrapper
    class such as `NSNumber` is the best way to simplify the conversion between the
    C and Objective-C worlds.


    I also discuss the two main collection types provided by Objective-C. `NSArray`
    is a simple class interface for a sequence of objects. With the help of `NSArray`
    objects, you can efficiently store and retrieve elements in a simple sequence.


    `NSDictionary` is a class that provides the general service of storing key/value
    pairs. Each key has a unique value stored in the dictionary, so that it can be
    efficiently retrieved. `NSDictionary` gives programmers a rich set of messages
    that can be used to query, retrieve, and process objects stored in such a dictionary
    container.


    ## Strings


    A string is a sequence of characters. The `NSString` class provides all the functionality
    necessary for creating and modifying strings, and it is used throughout Cocoa
    and related frameworks. Strings are used not only for messages, but also when
    you need a textual representation of a component that is represented internally
    in binary, such as an integer number, a floating pointer number, or an object.


    ### Creating Strings


    To create strings, you use the `NSString` class, which is part of the Foundation
    framework. To create an empty string, you just send an `alloc` message to the
    `NSString` class, followed by an `init` message that will properly initialize
    the members of the class.


    `- (void)createString`


    `{`


            `NSString *myStr = [[NSString alloc] initWithCString:"my original string"`


                                                `encoding:NSASCIIStringEncoding];`


            `NSLog(@"the string is %@", myStr);`


    `}`


    The first thing you do in this function is send the `alloc` message to `NSString`,
    like you may do with any Objective-C class. Then, you send the `initWithCString:encoding:`
    message to the allocated object. The first parameter to that method is a C string,
    enclosed in single quotes. The second parameter is the encoding type for the characters.
    The most common option is the one shown, the ASCII encoding, but several other
    options are available.


    Of course, it would be boring to go through all of these steps just to create
    a string. That’s why there’s another, simpler option, which you have been using
    since the first chapter: by adding the character `@` to the beginning of a double
    quoted string, you tell the compiler to create a new `NSString` object with the
    standard encoding. The compiler is responsible for calling `alloc` and the right
    version of `init` for the resulting object. This is a great effort reduction,
    and it also shows the great amount of work that the compiler performs on your
    behalf when processing Objective-C code.


    ### NSString Methods


    `NSString` provides a rich interface for text manipulation. There are methods
    that can be used to access single characters or a range of characters. Some methods
    can be used to compare different strings, while others can be used to return information
    about prefixes and suffixes.


    The `length` method is used to return the number of characters in a string. For
    example, you could rewrite the above function in the following manner to display
    the size of the string passed to the constructor:


    `- (void)createString`


    `{`


    `NSString *myStr = [[NSString alloc] initWithCString:"my original string"`


    `encoding:NSASCIIStringEncoding];`


    `NSLog(@"the length of the string is %d", [myStr length]);`


    `// prints the length of the string is 18`


    `}`


    The method `characterAtIndex:`returns a single character that is located at the
    given index position. Remember that, as with plain C arrays, `NSString` objects
    use a zero-based index. That is, the index 1 is used for the second element, and
    so forth. The following function will always return `YES`:


    `- (BOOL) compareString`


    `{`


    `NSString *myStr = [[NSString alloc] initWithCString:"my original string"`


    `encoding:NSASCIIStringEncoding];`


    `return [myStr characterAtIndex:4] == ''r'';`


    `}`


    The following function will return `YES` if both strings have the same characters:


    `- (BOOL) stringsEqual:(NSString *) :(NSString *)b`


    `{`


    `NSUInteger n1 = [a length];`


    `NSUInteger n2 = [b length];`


    `if (n1 != n2)`


    `{`


    `return NO;`


    `}`


    `for (int i=0; i<n1; ++i)`


    `{`


    `if ([a characterAtIndex:i] != [b characterAtIndex:i])`


    `{`


    `return NO;`


    `}`


    `}`


    `return YES;`


    `}`


    Note


    `NSUInteger` is a type defined by the Objective-C library to refer to an unsigned
    integer. It is typically the same as `unsigned int`, but it is left as a separate
    type to facilitate porting of Objective-C code to other platforms. Since there
    is no guarantee that an `unsigned int` will have the same size on all platforms,
    it is a good idea to use `NSUInteger` to achieve uniformity, especially when you
    are writing code that is related to memory sizes, such as string lengths.


    While it is possible to use `characterAtIndex:` to compare two strings, as you
    did in the previous example, it is much more convenient to use the `compare:`
    instance method for this job. When using `compare:`, the return value is of type
    `NSComparisonResult`, and there are three possible values. `NSOrderedAscending`
    means that the original string comes before the argument string in lexicographical
    order. A result of `NSOrderedSame` means that the two strings are identical. The
    remaining option is denoted by `NSOrderedDescending`. Here is an example:


    `- (void) compareString:(NSString *)a with:(NSString *)b`


    `{`


    `NSComparisonResult res = [a compare:b];`


    `if (res == NSOrderedAscending)`


    `{`


    `NSLog(@"String %@ comes before %@", a, b);`


    `}`


    `else if (res == NSOrderedDescending)`


    `{`


    `NSLog(@"String %@ comes before %@", b, a);`


    `}`


    `else`


    `{`


    `NSLog(@"The strings are identical");`


    `}`


    `}`


    Finally, if you are interested just in simple equality testing (that is, if you
    don’t care if the two strings are lexicographically in ascending or descending
    order), there is an even faster way to achieve it. The method `isEqualToString:`
    will take as a parameter another string and return `YES` or `NO`, depending on
    the equality of all corresponding characters on both strings.


    The same kind of tests discussed above can be performed using case-insensitive
    comparison. For example, `NSString` has a method called `caseInsensitiveCompare:`
    that behaves similarly to `compare:` with the exception that characters such as
    “a” and “A” are considered to be identical.'
  trans: "\n# 3. 字符串与容器类\n\n## 摘要\n\n在本章中，我将讨论 Foundation 框架中一些最常用的类。具体来说，我会介绍用于操作\
    \ Objective-C 中所有字符序列的 `NSString` 类。`NSString` 提供了便捷的接口来创建字符串、获取字符串的一部分、比较字符串值以及将其转换为其他格式。\n\
    \nFoundation 框架中的另一个重要类是 `NSNumber`。数字是计算机编程中最基本的概念之一，通常由 C 语言作为原生数据类型来处理。然而，有时需要将数字传递给其他对象或由其他对象存储。在这种情况下，像\
    \ `NSNumber` 这样的包装类是简化 C 语言与 Objective-C 世界之间转换的最佳方式。\n\n我还将讨论 Objective-C 提供的两种主要集合类型。`NSArray`\
    \ 是一个用于对象序列的简单类接口。借助 `NSArray` 对象，您可以高效地按简单序列存储和检索元素。\n\n`NSDictionary` 是一个提供存储键/值对通用服务的类。每个键在字典中都有一个唯一的值，以便能够高效地检索。`NSDictionary`\
    \ 为程序员提供了一套丰富的消息，可用于查询、检索和处理存储在这种字典容器中的对象。\n\n## 字符串\n\n字符串是一个字符序列。`NSString`\
    \ 类提供了创建和修改字符串所需的全部功能，并且被广泛应用于 Cocoa 及相关框架中。字符串不仅用于消息传递，当您需要以二进制形式内部表示的组件（例如整数、浮点数或对象）的文本表示时，也会用到它。\n\
    \n### 创建字符串\n\n要创建字符串，您需要使用作为 Foundation 框架一部分的 `NSString` 类。要创建一个空字符串，只需向 `NSString`\
    \ 类发送一条 `alloc` 消息，然后发送一条 `init` 消息来正确初始化该类的成员。\n\n```\n- (void)createString\n\
    {\n        NSString *myStr = [[NSString alloc] initWithCString:\"my original string\"\
    \n                                            encoding:NSASCIIStringEncoding];\n\
    \        NSLog(@\"the string is %@\", myStr);\n}\n```\n\n在此函数中，您首先要做的是向 `NSString`\
    \ 发送 `alloc` 消息，就像您对任何 Objective-C 类所做的那样。然后，向分配好的对象发送 `initWithCString:encoding:`\
    \ 消息。该方法的第一个参数是一个用单引号括起来的 C 字符串。第二个参数是字符的编码类型。最常见的选项是示例中显示的 ASCII 编码，但还有其他几个选项可用。\n\
    \n当然，仅仅为了创建一个字符串而完成所有这些步骤会显得很繁琐。这就是为什么还有一个更简单的选项——从第一章开始您就一直在使用它：在双引号字符串的开头加上字符\
    \ `@`，就可以告诉编译器创建一个采用标准编码的新 `NSString` 对象。编译器负责为生成的对象调用 `alloc` 和相应版本的 `init` 方法。这极大地减少了工作量，同时也体现了编译器在处理\
    \ Objective-C 代码时为您完成了大量工作。\n\n### NSString 方法\n\n`NSString` 提供了丰富的文本操作接口。有些方法可用于访问单个字符或一系列字符。有些方法可用于比较不同的字符串，而另一些方法则可返回有关前缀和后缀的信息。\n\
    \n`length` 方法用于返回字符串中的字符数。例如，您可以用以下方式重写上面的函数，以便显示传递给构造函数的字符串的大小：\n\n```\n- (void)createString\n\
    {\nNSString *myStr = [[NSString alloc] initWithCString:\"my original string\"\n\
    encoding:NSASCIIStringEncoding];\nNSLog(@\"the length of the string is %d\", [myStr\
    \ length]);\n// 输出：the length of the string is 18\n}\n```\n\n方法 `characterAtIndex:`\
    \ 返回位于给定索引位置的单个字符。请记住，与普通的 C 数组一样，`NSString` 对象使用从零开始的索引。也就是说，索引 1 用于第二个元素，依此类推。以下函数将始终返回\
    \ `YES`：\n\n```\n- (BOOL) compareString\n{\nNSString *myStr = [[NSString alloc]\
    \ initWithCString:\"my original string\"\nencoding:NSASCIIStringEncoding];\nreturn\
    \ [myStr characterAtIndex:4] == 'r';\n}\n```\n\n如果两个字符串具有相同的字符，以下函数将返回 `YES`：\n\
    \n```\n- (BOOL) stringsEqual:(NSString *) :(NSString *)b\n{\nNSUInteger n1 = [a\
    \ length];\nNSUInteger n2 = [b length];\nif (n1 != n2)\n{\nreturn NO;\n}\nfor\
    \ (int i=0; i<n1; ++i)\n{\nif ([a characterAtIndex:i] != [b characterAtIndex:i])\n\
    {\nreturn NO;\n}\n}\nreturn YES;\n}\n```\n\n> **注意：** `NSUInteger` 是 Objective-C\
    \ 库定义的一种类型，用于表示无符号整数。它通常等同于 `unsigned int`，但被保留为一种单独的类型，以方便将 Objective-C 代码移植到其他平台。由于不能保证\
    \ `unsigned int` 在所有平台上都具有相同的大小，因此使用 `NSUInteger` 来实现一致性是一个好主意，尤其是在编写与内存大小（如字符串长度）相关的代码时。\n\
    \n虽然可以在比较两个字符串时使用 `characterAtIndex:`，就像你在前面的示例中所做的那样，但更便捷的方式是使用实例方法 `compare:`\
    \ 来完成这项任务。使用 `compare:` 时，返回值类型为 `NSComparisonResult`，其可能值有三种。`NSOrderedAscending`\
    \ 表示原始字符串在字典顺序上位于参数字符串之前。结果为 `NSOrderedSame` 表示两个字符串相同。另一种结果为 `NSOrderedDescending`。以下是一个示例：\n\
    \n```\n- (void) compareString:(NSString *)a with:(NSString *)b\n{\nNSComparisonResult\
    \ res = [a compare:b];\nif (res == NSOrderedAscending)\n{\nNSLog(@\"字符串 %@ 在 %@\
    \ 之前\", a, b);\n}\nelse if (res == NSOrderedDescending)\n{\nNSLog(@\"字符串 %@ 在\
    \ %@ 之前\", b, a);\n}\nelse\n{\nNSLog(@\"这两个字符串相同\");\n}\n}\n```\n\n最后，如果您只关心简单的相等性测试（也就是说，您不关心两个字符串在字典顺序上是升序还是降序），那么还有一种更快捷的方式。方法\
    \ `isEqualToString:` 将另一个字符串作为参数，并根据两个字符串中所有对应字符是否相等来返回 `YES` 或 `NO`。\n\n上述同类测试也可以使用不区分大小写的比较来执行。例如，`NSString`\
    \ 有一个名为 `caseInsensitiveCompare:` 的方法，其行为与 `compare:` 类似，区别在于它认为诸如 `\"a\"` 和 `\"\
    A\"` 这样的字符是相同的。\n"
- fmt: "### Substrings\n\nAnother kind of operation that can be performed on `NSString`s\
    \ is retrieving subsets of the sequence of characters. The methods extract parts\
    \ of the current string based on the position where they appear and return a new\
    \ `NSString` containing only the desired characters. For example, to find a substring\
    \ that contains all the characters from the beginning of a string up to a given\
    \ index, you can use the `substringToIndex:` method. Here is some sample code:\n\
    \n```\n- (void) initialSubstring\n{\n    NSString *original = @\"Original string\"\
    ;\n    NSString *partial = [original substringToIndex:4];\n    NSLog(@\"The partial\
    \ string is %@\", partial);\n}\n```\n\nThis code would print “Orig”, the first\
    \ four letters in the original string, into the log screen. Another method that\
    \ has a similar use is the `substringFromIndex:` method. It can be applied to\
    \ a string in such a way that the return value is composed of the last characters\
    \ of the sequence, starting at a particular position. For example, suppose that\
    \ a function is designed to detect plural words. A simple way to do this is to\
    \ look at the suffix of the given string and check if it is equal to “s”.\n\n\
    ```\n- (BOOL) isPluralWord:(NSString *)word\n{\n    int length = (int)[word length];\n\
    \    int initialPosition = length - 1;\n    if (initialPosition < 0)\n    {\n\
    \        return NO;\n    }\n    NSString *suffix = [word substringFromIndex:initialPosition];\n\
    \    return [suffix isEqualToString:@\"s\"];\n}\n```\n\nThis code determines the\
    \ length of the received string, and then calculates the position, starting from\
    \ the beginning, for the last character. This is at position `length - 1` because\
    \ indices always start from zero. If the resulting position is less than zero,\
    \ then it must be an empty string and you return `NO`. Otherwise, you determine\
    \ the suffix of the word and compare it to “s” to determine if this is a plural\
    \ word.\n\nWith these two methods you could select any internal substring of a\
    \ given string by using a combination of `substringToIndex:` and `substringFromIndex:`.\
    \ However, there’s also a method called `substringWithRange:`, which takes a range\
    \ composed of two positions and returns a substring containing all the characters\
    \ between the given range. For example, suppose you received a quoted string (that\
    \ is, a string where the initial and final characters are a quote). You can design\
    \ a function to remove the quotes from such a string using the `substringWithRange:`\
    \ to return the internal part of the `NSString` object.\n\n```\n-(NSString *)\
    \ removeQuotes:(NSString *)str\n{\n    int len = (int)[str length];\n    if (len\
    \ < 2)\n    {\n        return @\"\";\n    }\n    NSRange range = NSMakeRange(1,\
    \ len-2);\n    return [str substringWithRange:range];\n}\n```\n\nIn this example,\
    \ you first calculate the length of the string passed as a parameter, and then\
    \ check if the string has at least two characters (otherwise you return just the\
    \ empty string). Then, you create a range starting from position 1 and with length\
    \ equal to the original length minus two positions. As a result, you then return\
    \ the substring calculated by `substringWithRange:`.\n\n## The NSNumber Class\n\
    \nWhen working with objects, it is frequently necessary to store or retrieve numbers\
    \ using an OO interface. After all, the main strength of Objective-C is to be\
    \ able to write flexible code, passing messages between objects rather than using\
    \ fixed interfaces defined by functions and C operators.\n\nAlso, while numbers\
    \ such as integers and doubles are easy to manipulate using C functions, objects\
    \ need to support an additional range of operations derived from the basic `NSObject`\
    \ class. For this reason, Objective-C provides a special purpose class, `NSNumber`,\
    \ which can be used to store a number from any of the standard C numeric types.\n\
    \n`NSNumber` is a generic interface. It can be used to wrap any of the native\
    \ numeric types provided in the C language. The types of numbers that can be represented\
    \ by an `NSNumber` include integers (`int`), long integers (`long int`), short\
    \ integers (`short`), as well as unsigned integers (`unsigned int`). Very small\
    \ numbers can be represented in C as characters, so `NSNumber` also provides support\
    \ for the `char` type. Floating-point numbers (`float`) as well as double floating\
    \ numbers (`double`) are also represented. Finally, `NSNumber` can wrap values\
    \ of Boolean type (`BOOL`).\n\nTo create an `NSNumber`, you just need to call\
    \ the `alloc/init` combination, where the `init` function will depend on the type\
    \ of number you want to wrap. Here are some examples:\n\n```\n- (void) createNumbers\n\
    {\n    int aInt = 1;\n    long aLong = 23456;\n    double aDouble = 3.14;\n  \
    \  BOOL aBool = YES;\n    char aChar = 'A';\n    // here are the corresponding\
    \ NSNumber objects\n    NSNumber *objInt = [[NSNumber alloc] initWithInt:aInt];\n\
    \    NSNumber *objLong = [[NSNumber alloc] initWithLong:aLong];\n    NSNumber\
    \ *objDouble = [[NSNumber alloc] initWithDouble:aDouble];\n    NSNumber *objBool\
    \ = [[NSNumber alloc] initWithBool:aBool];\n    NSNumber *objChar = [[NSNumber\
    \ alloc] initWithChar:aChar];\n    NSLog(@\"Here are the values: %@, %@, %@, %@,\
    \ %@ \",\n              objInt, objLong, objDouble, objBool, objChar);\n}\n```\n\
    \nWhile this is the standard way to create such number objects, there are other\
    \ avenues for object construction. For example, it is possible to simplify this\
    \ by using a class method to perform the allocation and initialization in the\
    \ same step. That would become:\n\n```\n- (void) createNumbers2\n{\n    int aInt\
    \ = 1;\n    long aLong = 23456;\n    double aDouble = 3.14;\n    BOOL aBool =\
    \ YES;\n    char aChar = 'A';\n    // here are the corresponding NSNumber objects\n\
    \    NSNumber *objInt = [NSNumber numberWithInt:aInt];\n    NSNumber *objLong\
    \ = [NSNumber numberWithLong:aLong];\n    NSNumber *objDouble = [NSNumber numberWithDouble:aDouble];\n\
    \    NSNumber *objBool = [NSNumber numberWithBool:aBool];\n    NSNumber *objChar\
    \ = [NSNumber numberWithChar:aChar];\n    NSLog(@\"Here are the values: %@, %@,\
    \ %@, %@, %@ \",\n              objInt, objLong, objDouble, objBool, objChar);\n\
    }\n```\n\nHopefully, if you have access to some modern version of Xcode, you will\
    \ be able to use the latest syntax for number literals. The new syntax works by\
    \ using the `@` character as an indicator that the following literal value needs\
    \ to be converted to an `NSNumber`. This trick works for literal numbers (or for\
    \ variables as in the above), and therefore you can apply it to the preceding\
    \ example for further simplification, like so:\n\n```\n- (void) createNumbers3\n\
    {\n    NSNumber *objInt = @1;\n    NSNumber *objLong = @23456;\n    NSNumber *objDouble\
    \ = @3.14;\n    NSNumber *objBool = @YES;\n    NSNumber *objChar = @'A';\n   \
    \ // print the values as objects\n    NSLog(@\"Here are the values: %@, %@, %@,\
    \ %@, %@ \",\n              objInt, objLong, objDouble, objBool, objChar);\n}\n\
    ```"
  raw: '### Substrings


    Another kind of operation that can be performed on `NSString`s is retrieving subsets
    of the sequence of characters. The methods extract parts of the current string
    based on the position where they appear and return a new `NSString` containing
    only the desired characters. For example, to find a substring that contains all
    the characters from the beginning of a string up to a given index, you can use
    the `substringToIndex:` method. Here is some sample code:


    `- (void) initialSubstring`


    `{`


            `NSString *original = @"Original string";`


            `NSString *partial = [original substringToIndex:4];`


            `NSLog(@"The partial string is %@", partial);`


    `}`


    This code would print “Orig”, the first four letters in the original string, into
    the log screen. Another method that has a similar use is the `substringFromIndex:`
    method. It can be applied to a string in such a way that the return value is composed
    of the last characters if the sequence, starting at a particular position. For
    example, suppose that a function is designed to detect plural words. A simple
    way to do this is to look at the suffix of the given string and check if it is
    equal to “s”.


    `- (BOOL) isPluralWord:(NSString *)word`


    `{`


            `int length = (int)[word length];`


            `int initialPosition = length - 1;`


            `if (initialPosition < 0)`


            `{`


                    `return NO;`


            `}`


            `NSString *suffix = [word substringFromIndex:initialPosition];`


            `return [suffix isEqualToString:@"s"];`


    `}`


    This code determines the length of the received string, and then calculates the
    position, starting from the beginning, for the last character. This is at position
    `length - 1` because indices always start from zero. If the resulting position
    is less than zero, then it must be an empty string and you return `NO`. Otherwise,
    you determine the suffix of the word and compare it to “s” to determine if this
    is a plural word.


    With these two methods you could select any internal substring of a given string
    by using a combination of `substringToIndex:` and `substringFromIndex:`. However,
    there’s also a method called `substringWithRange:`, which takes a range composed
    of two positions and returns a substring containing all the characters between
    the given range. For example, suppose you received a quoted string (that is, a
    string where the initial and final characters are a quote). You can design a function
    to remove the quotes from such a string using the `substringWithRange:` to return
    the internal part of the `NSString` object.


    `-(NSString *) removeQuotes:(NSString *)str`


    `{`


            `int len = (int)[str length];`


            `if (len < 2)`


            `{`


                    `return @"";`


            `}`


            `NSRange range = NSMakeRange(1, len-2);`


            `return [str substringWithRange:range];`


    `}`


    In this example, you first calculate the length of the string passed as a parameter,
    and then check if the string has at least two characters (otherwise you return
    just the empty string). Then, you create a range starting from position 1 and
    with length equal to the original length minus two positions. As a result, you
    then return the substring calculated by `substringWithRange:`.


    ## The NSNumber Class


    When working with objects, it is frequently necessary to store or retrieve numbers
    using an OO interface. After all, the main strength of Objective-C is to be able
    to write flexible code, passing messages between objects rather than using fixed
    interfaces defined by functions and C operators.


    Also, while numbers such as integers and doubles are easy to manipulate using
    C functions, objects need to support an additional range of operations derived
    from the basic `NSObject` class. For this reason, Objective-C provides a special
    purpose class, `NSNumber`, which can be used to store a number from any of the
    standard C numeric types.


    `NSNumber` is a generic interface. It can be used to wrap any of the native numeric
    types provided in the C language. The types of numbers that can be represented
    by an `NSNumber` include integers (`int`), long integers (`long int`), short integers
    (`short`), as well as unsigned integers (`unsigned int`). Very small numbers can
    be represented in C as characters, so `NSNumber` also provides support for the
    `char` type. Floating-point numbers (`float`) as well as double floating numbers
    (`double`) are also represented. Finally, `NSNumber` can wrap values of Boolean
    type (`BOOL`).


    To create an `NSNumber`, you just need to call the `alloc/init` combination, where
    the `init` function will depend on the type of number you want to wrap. Here are
    some examples:


    `- (void) createNumbers`


    `{`


            `int aInt = 1;`


            `long aLong = 23456;`


            `double aDouble = 3.14;`


            `BOOL aBool = YES;`


            `char aChar = ''A'';`


            `// here are the corresponding NSNumber objects`


            `NSNumber *objInt = [[NSNumber alloc] initWithInt:aInt];`


            `NSNumber *objLong = [[NSNumber alloc] initWithLong:aLong];`


            `NSNumber *objDouble = [[NSNumber alloc] initWithDouble:aDouble];`


            `NSNumber *objBool = [[NSNumber alloc] initWithBool:aBool];`


            `NSNumber *objChar = [[NSNumber alloc] initWithChar:aChar];`


            `NSLog(@"Here are the values: %@, %@, %@, %@, %@ ",`


                      `objInt, objLong, objDouble, objBool, objChar);`


    `}`


    While this is the standard way to create such number objects, there are other
    avenues for object construction. For example, it is possible to simplify this
    by using a class method to perform the allocation and initialization in the same
    step. That would become


    `- (void) createNumbers2`


    `{`


            `int aInt = 1;`


            `long aLong = 23456;`


            `double aDouble = 3.14;`


            `BOOL aBool = YES;`


            `char aChar = ''A'';`


            `// here are the corresponding NSNumber objects`


            `NSNumber *objInt = [NSNumber numberWithInt:aInt];`


            `NSNumber *objLong = [NSNumber numberWithLong:aLong];`


            `NSNumber *objDouble = [NSNumber numberWithDouble:aDouble];`


            `NSNumber *objBool = [NSNumber numberWithBool:aBool];`


            `NSNumber *objChar = [NSNumber numberWithChar:aChar];`


            `NSLog(@"Here are the values: %@, %@, %@, %@, %@ ",`


                      `objInt, objLong, objDouble, objBool, objChar);`


    `}`


    Hopefully, if you have access to some modern version of Xcode, you will be able
    to use the latest syntax for number literals. The new syntax works by using the
    `@` character as an indicator that the following literal value needs to be converted
    to an `NSNumber`. This trick works for literal numbers (or for variables as in
    the above), and therefore you can apply it to the preceeding example for further
    simplification, like so:


    `- (void) createNumbers3`


    `{`


            `NSNumber *objInt = @1;`


            `NSNumber *objLong = @23456;`


            `NSNumber *objDouble = @3.14;`


            `NSNumber *objBool = @YES;`


            `NSNumber *objChar = @''A'';`


            `// print the values as objects`


            `NSLog(@"Here are the values: %@, %@, %@, %@, %@ ",`


                      `objInt, objLong, objDouble, objBool, objChar);`


    `}`'
  trans: "\n### 子字符串\n\n对`NSString`对象执行的另一种操作是检索字符序列的子集。这些方法根据字符在字符串中出现的位置提取当前字符串的一部分，并返回一个仅包含所需字符的新`NSString`对象。例如，要查找从字符串开头到指定索引的所有字符组成的子字符串，可以使用`substringToIndex:`方法。以下是示例代码：\n\
    \n```\n- (void) initialSubstring\n{\n    NSString *original = @\"Original string\"\
    ;\n    NSString *partial = [original substringToIndex:4];\n    NSLog(@\"The partial\
    \ string is %@\", partial);\n}\n```\n\n这段代码会将\"Orig\"（原始字符串的前四个字母）打印到日志屏幕。另一个用途类似的方法是`substringFromIndex:`。它可以应用于字符串，其返回值由从特定位置开始的字符串最后几个字符组成。例如，假设有一个函数用于检测单词是否为复数形式。一种简单的方法是检查给定字符串的后缀是否是\"\
    s\"。\n\n```\n- (BOOL) isPluralWord:(NSString *)word\n{\n    int length = (int)[word\
    \ length];\n    int initialPosition = length - 1;\n    if (initialPosition < 0)\n\
    \    {\n        return NO;\n    }\n    NSString *suffix = [word substringFromIndex:initialPosition];\n\
    \    return [suffix isEqualToString:@\"s\"];\n}\n```\n\n这段代码首先计算接收到的字符串的长度，然后从开头开始计算最后一个字符的位置。该位置为`length\
    \ - 1`，因为索引总是从零开始。如果得出的位置小于零，则说明字符串为空，返回`NO`。否则，确定单词的后缀并将其与\"s\"比较，以此判断该单词是否为复数形式。\n\
    \n使用这两种方法，你可以通过`substringToIndex:`和`substringFromIndex:`的组合选择给定字符串中的任意内部子字符串。不过，还有一个名为`substringWithRange:`的方法，它接受一个由两个位置组成的范围，并返回包含该范围内所有字符的子字符串。例如，假设你接收到一个带引号的字符串（即首尾字符都是引号的字符串）。你可以设计一个函数，使用`substringWithRange:`移除该字符串中的引号，返回`NSString`对象的内部部分。\n\
    \n```\n-(NSString *) removeQuotes:(NSString *)str\n{\n    int len = (int)[str\
    \ length];\n    if (len < 2)\n    {\n        return @\"\";\n    }\n    NSRange\
    \ range = NSMakeRange(1, len-2);\n    return [str substringWithRange:range];\n\
    }\n```\n\n在此示例中，首先计算作为参数传入的字符串的长度，然后检查字符串是否至少有两个字符（否则直接返回空字符串）。接着，创建一个从位置 1 开始、长度等于原长度减\
    \ 2 的范围。最后，返回由`substringWithRange:`计算出的子字符串。\n\n## NSNumber 类\n\n在使用对象时，经常需要通过面向对象的接口来存储或获取数值。毕竟，Objective-C\
    \ 的主要优势在于能够编写灵活的代码，在对象之间传递消息，而不是使用由函数和 C 运算符定义的固定接口。\n\n此外，虽然像整型和双精度浮点型这样的数值使用\
    \ C 函数很容易操作，但对象需要支持源自基本`NSObject`类的额外一系列操作。因此，Objective-C 提供了一个专用类`NSNumber`，它可以用来存储任何标准\
    \ C 数值类型对应的数值。\n\n`NSNumber`是一个通用接口，可用于包装 C 语言中提供的任意原生数值类型。`NSNumber`能表示的数值类型包括整型（`int`）、长整型（`long\
    \ int`）、短整型（`short`）以及无符号整型（`unsigned int`）。非常小的数值在 C 中可以用字符表示，因此`NSNumber`也支持`char`类型。浮点型（`float`）和双精度浮点型（`double`）同样可以表示。最后，`NSNumber`还能包装布尔类型（`BOOL`）的值。\n\
    \n要创建`NSNumber`对象，只需调用`alloc/init`组合，其中`init`方法取决于要包装的数值类型。以下是一些示例：\n\n```\n-\
    \ (void) createNumbers\n{\n    int aInt = 1;\n    long aLong = 23456;\n    double\
    \ aDouble = 3.14;\n    BOOL aBool = YES;\n    char aChar = 'A';\n    // 以下是相应的\
    \ NSNumber 对象\n    NSNumber *objInt = [[NSNumber alloc] initWithInt:aInt];\n \
    \   NSNumber *objLong = [[NSNumber alloc] initWithLong:aLong];\n    NSNumber *objDouble\
    \ = [[NSNumber alloc] initWithDouble:aDouble];\n    NSNumber *objBool = [[NSNumber\
    \ alloc] initWithBool:aBool];\n    NSNumber *objChar = [[NSNumber alloc] initWithChar:aChar];\n\
    \    NSLog(@\"Here are the values: %@, %@, %@, %@, %@ \",\n              objInt,\
    \ objLong, objDouble, objBool, objChar);\n}\n```\n\n虽然这是创建此类数值对象的标准方式，但还有其他构造对象的方法。例如，可以使用类方法在一步内完成分配和初始化，从而简化操作。如下所示：\n\
    \n```\n- (void) createNumbers2\n{\n    int aInt = 1;\n    long aLong = 23456;\n\
    \    double aDouble = 3.14;\n    BOOL aBool = YES;\n    char aChar = 'A';\n  \
    \  // 以下是相应的 NSNumber 对象\n    NSNumber *objInt = [NSNumber numberWithInt:aInt];\n\
    \    NSNumber *objLong = [NSNumber numberWithLong:aLong];\n    NSNumber *objDouble\
    \ = [NSNumber numberWithDouble:aDouble];\n    NSNumber *objBool = [NSNumber numberWithBool:aBool];\n\
    \    NSNumber *objChar = [NSNumber numberWithChar:aChar];\n    NSLog(@\"Here are\
    \ the values: %@, %@, %@, %@, %@ \",\n              objInt, objLong, objDouble,\
    \ objBool, objChar);\n}\n```\n\n如果你使用的是某个较新版本的 Xcode，那么你应该能够使用最新的数值字面量语法。新语法通过使用`@`字符作为指示符，表示紧随其后的字面量值需要转换为`NSNumber`对象。这个技巧适用于字面数值（或如上述示例中的变量），因此你可以将其应用于前面的示例进一步简化，如下所示：\n\
    \n```\n- (void) createNumbers3\n{\n    NSNumber *objInt = @1;\n    NSNumber *objLong\
    \ = @23456;\n    NSNumber *objDouble = @3.14;\n    NSNumber *objBool = @YES;\n\
    \    NSNumber *objChar = @'A';\n    // 将值作为对象打印\n    NSLog(@\"Here are the values:\
    \ %@, %@, %@, %@, %@ \",\n              objInt, objLong, objDouble, objBool, objChar);\n\
    }\n```\n"
- fmt: "### Accessing an `NSNumber`\n\nThe other side of the coin for `NSNumber`s\
    \ is to be able to access their values. This can be done with a set of methods\
    \ that provide access to each of the values that may be stored in an `NSNumber`.\
    \ For example, for integer values, there’s the `integerValue` method. For characters,\
    \ there’s the `charValue`. Similarly, access methods exist for each of the types\
    \ directly supported by `NSNumber`. The following example shows how to access\
    \ the data stored in `NSNumber`s:\n\n```\n- (void) accessNumberValue\n\n{\n  \
    \      NSNumber *objInt = @1;\n        NSNumber *objLong = @23456;\n        NSNumber\
    \ *objDouble = @3.14;\n        NSNumber *objBool = @YES;\n        NSNumber *objChar\
    \ = @'A';\n\n        // print the values as native data types\n        NSLog(@\"\
    Here are the values: %d, %ld, %lf, %d, %c \",\n                  (int)[objInt\
    \ integerValue],\n                  [objLong longValue],\n                  [objDouble\
    \ doubleValue],\n                  [objBool boolValue],\n                  [objChar\
    \ charValue]);\n}\n```\n\n> **Note:** Retrieving data from `NSNumber` does not\
    \ guarantee that the right format will be used. Since the internal data stored\
    \ in `NSNumber` is just a number in binary format, the accessors will try to convert\
    \ the internal data so that it fits the requested format. This may result in the\
    \ loss of data. For example, storing a `long` and trying to access it with a request\
    \ for a char will result in truncation. Before accessing the data stored in a\
    \ `NSNumber`, however, you can use the `objCType` method to determine the exact\
    \ type contained in it.\n\n### When to Use an `NSNumber`?\n\nThe next question\
    \ to address is when to use `NSNumber`. Although it is nice to be able to send\
    \ messages to an object instead of calling functions, this is not always necessary.\
    \ Moreover, there is a performance penalty paid every time an object is used instead\
    \ of native types. Objects require allocation and message passing, which are expensive\
    \ when compared to the efficient way native types, such as integers and Booleans,\
    \ are handled by the compiler.\n\nTherefore, there is little reason to use objects\
    \ instead of native types if the situation requires high performance. For example,\
    \ numerical algorithms that make frequent calculations are much better handled\
    \ by native types, which can benefit from all optimizations enabled by the C language.\n\
    \nOn the other hand, there are situations in which you would like to treat numbers\
    \ as if they were objects. This happens whenever you want them to be part of some\
    \ kind of collection that responds to well-known messages. For example, suppose\
    \ that you want to create an array of objects. These objects will all receive\
    \ a certain set of messages, such as `deallocate`, when the array is destroyed.\
    \ To make it possible to add numbers to such an array, it must be possible to\
    \ represent the number as an object. Thus, instead of adding numbers directly\
    \ to an array of objects, you create object wrappers to the numbers.\n\nCollections\
    \ of objects are a main reason for using the `NSNumber` class. In the next few\
    \ sections, you will see how container classes do their job of maintaining arrays\
    \ and dictionaries.\n\n> **Note:** Consider performance reasons before using `NSNumber`\
    \ objects. If you need to perform fast calculations, prefer the native types.\
    \ `NSNumber` objects are necessary, however, whenever you need to treat the number\
    \ as an object, such as when interfacing with methods that receive objects only,\
    \ or when adding numbers to a container.\n\n## Containers\n\nWhen data is stored\
    \ in the form of objects, it is useful to be able to manipulate a collection of\
    \ elements as just another object. The Foundation framework provides a set of\
    \ container classes that make it easier to achieve this goal. The containers supplied\
    \ by the Foundation framework include arrays and dictionaries, both in mutable\
    \ and immutable forms. In the next few sections I explain how to create, update,\
    \ add, and remove elements from such containers."
  raw: '### Accessing an NSNumber


    The other side of the coin for `NSNumber`s is to be able to access their values.
    This can be done with a set of methods that provide access to each of the values
    that may be stored in an `NSNumber`. For example, for integer values, there’s
    the `integerValue` method. For characters, there’s the `charValue`. Similarly,
    access methods exist for each of the types directly supported by `NSNumber`. The
    following example shows how to access the data stored in `NSNumbers`:


    `- (void) accessNumberValue`


    `{`


            `NSNumber *objInt = @1;`


            `NSNumber *objLong = @23456;`


            `NSNumber *objDouble = @3.14;`


            `NSNumber *objBool = @YES;`


            `NSNumber *objChar = @''A'';`


            `// print the values as native data types`


            `NSLog(@"Here are the values: %d, %ld, %lf, %d, %c ",`


                      `(int)[objInt integerValue],`


                      `[objLong longValue],`


                      `[objDouble doubleValue],`


                      `[objBool boolValue],`


                      `[objChar charValue]);`


    `}`


    Note


    Retrieving data from `NSNumber` does not guarantee that the right format will
    be used. Since the internal data stored in `NSNumber` is just a number in binary
    format, the accessors will try to convert the internal data so that it fits the
    requested format. This may result in the loss of data. For example, storing a
    `long` and trying to access it with a request for a char will result in truncation.
    Before accessing the data stored in a `NSNumber`, however, you can use the `objCType`
    method to determine the exact type contained in it.


    ### When to Use an NSNumber?


    The next question to address is when to use `NSNumber`. Although it is nice to
    be able to send messages to an object instead of calling functions, this is not
    always necessary. Moreover, there is a performance penalty paid every time an
    object is used instead of native types. Objects require allocation and message
    passing, which are expensive when compared to the efficient way native types,
    such as integers and Booleans, are handled by the compiler.


    Therefore, there is little reason to use objects instead of native types if the
    situation requires high performance. For example, numerical algorithms that make
    frequent calculations are much better handled by native types, which can benefit
    from all optimizations enabled by the C language.


    On the other hand, there are situations in which you would like to treat numbers
    as if they were objects. This happens whenever you want them to be part of some
    kind of collection that responds to well-known messages. For example, suppose
    that you want to create an array of objects. These objects will all receive a
    certain set of messages, such as `deallocate`, when the array is destroyed. To
    make it possible to add numbers to such an array, it must be possible to represent
    the number as an object. Thus, instead of adding numbers directly to an array
    of objects, you create object wrappers to the numbers.


    Collections of objects are a main reason for using the `NSNumber` class. In the
    next few sections, you will see how container classes do their job of maintaining
    arrays and dictionaries.


    Note


    Consider performance reasons before using `NSNumber` objects. If you need to perform
    fast calculations, prefer the native types. `NSNumber` objects are necessary,
    however, whenever you need to treat the number as an object, such as when interfacing
    with methods that receive objects only, or when adding numbers to a container.


    ## Containers


    When data is stored in the form of objects, it is useful to be able to manipulate
    a collection of elements as just another object. The Foundation framework provides
    a set of container classes that make it easier to achieve this goal. The containers
    supplied by the Foundation framework include arrays and dictionaries, both in
    mutable and immutable forms. In the next few sections I explain how to create,
    update, add, and remove elements from such containers.'
  trans: "\n### 访问 `NSNumber`\n\n`NSNumber` 的另一面是能够访问其存储的值。这可以通过一组方法来实现，这些方法提供了对 `NSNumber`\
    \ 中可能存储的每种值的访问。例如，对于整数值，有 `integerValue` 方法；对于字符，有 `charValue` 方法。类似地，对于 `NSNumber`\
    \ 直接支持的每种类型，都存在相应的访问方法。以下示例展示了如何访问 `NSNumber` 中存储的数据：\n\n```\n- (void) accessNumberValue\n\
    \n{\n        NSNumber *objInt = @1;\n        NSNumber *objLong = @23456;\n   \
    \     NSNumber *objDouble = @3.14;\n        NSNumber *objBool = @YES;\n      \
    \  NSNumber *objChar = @'A';\n\n        // 以原生数据类型打印值\n        NSLog(@\"这里是具体数值：%d,\
    \ %ld, %lf, %d, %c \",\n                  (int)[objInt integerValue],\n      \
    \            [objLong longValue],\n                  [objDouble doubleValue],\n\
    \                  [objBool boolValue],\n                  [objChar charValue]);\n\
    }\n```\n\n> **注意：** 从 `NSNumber` 中检索数据并不能保证使用正确的格式。由于 `NSNumber` 内部存储的数据只是二进制格式的数字，访问器会尝试转换内部数据以适配请求的格式。这可能导致数据丢失。例如，存储一个\
    \ `long` 值，然后尝试以 `char` 格式访问它，会导致数据截断。不过，在访问 `NSNumber` 中存储的数据之前，你可以使用 `objCType`\
    \ 方法来确定其中包含的确切类型。\n\n### 何时使用 `NSNumber`？\n\n接下来要解决的问题是何时使用 `NSNumber`。尽管能够向对象发送消息而不是调用函数很方便，但这并非总是必需的。此外，每次使用对象替代原生类型时，都会带来性能开销。对象需要分配内存和消息传递，与编译器处理整数和布尔值等原生类型的高效方式相比，这些操作代价高昂。\n\
    \n因此，如果情况需要高性能，几乎没有理由使用对象替代原生类型。例如，进行频繁计算的数值算法更适合使用原生类型，这样可以充分利用 C 语言启用的所有优化功能。\n\
    \n另一方面，在某些情况下，你可能希望将数字视为对象。当你希望它们成为能够响应常见消息的某种集合的一部分时，就会发生这种情况。例如，假设你想创建一个对象数组。当数组被销毁时，这些对象都会收到一组特定的消息，例如\
    \ `deallocate`。为了使数字能够被添加到这样的数组中，必须能够将数字表示为对象。因此，不需要直接将数字添加到对象数组中，而是为数字创建对象包装器。\n\
    \n对象的集合是使用 `NSNumber` 类的一个主要原因。在接下来的几节中，你将看到容器类如何实现数组和字典的维护。\n\n> **注意：** 在使用\
    \ `NSNumber` 对象之前，请考虑性能因素。如果你需要执行快速计算，请优先使用原生类型。然而，当你需要将数字视为对象时（例如，与仅接收对象的方法进行交互，或将数字添加到容器中时），`NSNumber`\
    \ 对象是必需的。\n\n## 容器\n\n当数据以对象形式存储时，能够将元素集合作为另一个对象来操作是非常有用的。Foundation 框架提供了一套容器类，使实现这一目标更加容易。Foundation\
    \ 框架提供的容器包括数组和字典，两者都有可变和不可变两种形式。在接下来的几节中，我将解释如何创建、更新、添加以及从这些容器中移除元素。\n"
- fmt: '# Arrays


    An array is a set of objects stored in contiguous memory. As you saw in the first
    chapter, C provides a flexible and efficient implementation for native arrays.
    However, arrays may be difficult to work with, especially for dynamic arrays that
    require explicit memory management. The `NSArray` class was introduced with the
    goal of providing a simple yet powerful interface for array objects. With the
    help of `NSArray` you can execute a number of operations on arrays using the message
    passing mechanism.


    First, consider how to create and add elements to an array. The simplest way to
    create an array is to call a pair of `alloc`/`init` methods. Once the array object
    has been properly initialized, it is possible to create a new array by adding
    new elements to the original `NSArray`.


    ```

    - (void) createSimpleArray

    {

    NSArray *a0 = [[NSArray alloc] init];

    NSArray *a1 = [a0 arrayByAddingObject:@"My First Object"];

    NSArray *a2 = [a1 arrayByAddingObject:@"My Second Object"];

    NSLog(@"The size of the array is %d", (int)[a2 count]);

    }

    ```


    The function `createSimpleArray` creates an array with two string elements, and
    prints to the system log the size of the resulting array, called `a2`. To achieve
    this, you send the `arrayByAddingObject` to an instance of `NSArray`. Additionally,
    to find the number of elements in an array, you send the `count` message to the
    resulting array.


    While the technique above can be employed so that you may add elements to any
    array, it would be much easier to add both elements in a single step. This can
    be done using a special version of the `init` method for the `NSArray` class,
    like so:


    ```

    - (void) createSimpleArray2

    {

    NSArray *array = [[NSArray alloc] initWithObjects:

    @"My First Object",

    @"My Second Object", nil];

    NSLog(@"The size of the array is %d", (int)[array count]);

    }

    ```


    While the results are identical for the two examples, the function `createSimpleArray2`
    uses a special version of the `init` method. The method `initWithObjects:` is
    able to receive a sequence of objects as arguments. The only detail you need to
    be careful about is that the last element needs to be `nil`, since that is the
    sentinel value that indicates the end of the sequence. The `nil` value, however,
    will not be stored as part of the array.


    The description of the `initWithObjects:` instance method shows you a very important
    aspect of the `NSArray` class. The class accepts only non-nil values as members
    of the array. This means that a `nil` element must be translated into some other
    representation before being stored in a `NSArray` (or any other container). For
    this particular purpose, there is a class called `NSNull`, which represents a
    `nil` (or `NULL`) as a single object.


    Adding elements to an array via the `initWithObjects:` message is a simple way
    to perform this vital task. However, it is still cumbersome to have to use two
    messages in the same line. To simplify this common workflow, `NSArray` also has
    a class method with a similar functionality, the `arrayWithObjects:` method. The
    advantage of this method is that you can pass the sequence of elements directly
    to the `NSArray` class, instead of having to call `alloc` first. This simplifies
    the code by removing the need for an extra method call. The above example could
    be more concisely presented as


    ```

    - (void) createSimpleArray3

    {

    NSArray *array = [NSArray arrayWithObjects:

    @"My First Object",

    @"My Second Object", nil];

    NSLog(@"The size of the array is %d", (int)[array count]);

    }

    ```


    The methods `arrayWithObjects:` or `initWithObjects:` can be used to create arrays
    with any number of elements. As long as you end the list of elements with `nil`,
    there is no limit in the number of entries. However, there are situations in which
    you may create an array with just one element. That is possible with the methods
    `arrayWithObject:` or `initWithObject:`. They are similar to the ones that you
    have seen, with the exception that they accept a single element only.


    ```

    - (void) createSimpleArray4

    {

    NSArray *array = [NSArray arrayWithObject:

    @"My Single Object"];

    NSLog(@"The size of the array is %d", (int)[array count]);

    }

    ```


    While we are in the topic of array creation, note that there are other versions
    of `init` and `arrayWith` that can be used with `NSArray`. For example, you can
    initialize an `NSArray` with another, previously created array. For example, suppose
    that you would like to have a copy of the array constructed above. This could
    be done in the following way:


    ```

    - (void) createArrayAndCopy

    {

    NSArray *array = [NSArray arrayWithObjects:

    @"My First Object",

    @"My Second Object", nil];

    NSLog(@"The size of the array is %d", (int)[array count]);

    NSArray *copy = [NSArray arrayWithArray:array];

    NSLog(@"The size of the copy array is also %d", (int)[copy count]);

    }

    ```


    Finally, you might be interested in creating an array from an existing C array.
    That is also possible with `NSArray`, but you are required to also submit the
    number of elements in the array. This is needed because, by their nature, C arrays
    are equivalent to a pointer, and as such they don’t store the number of elements.


    ```

    - (void) createArrayWithCArray

    {

    NSString *orig_array[] = { @"Obj1", @"Obj2" };

    NSArray *array = [NSArray arrayWithObjects:orig_array count:2];

    NSLog(@"The size of the array is %d", (int)[array count]);

    }

    ```


    In the first line of this example you are creating a C array with two objects.
    The declaration in the first line means that you are creating an array (indicated
    by `[]`) of `NSString *`, which is the type used by string objects. The notation
    inside curly brackets is used by C functions to initialize an array of identical
    elements. Next, you pass the name of the array that, as you have seen in the first
    chapter, is equivalent to a pointer, to the `arrayWithObjects:count:` method.


    Knowing all of these ways to create an `NSArray` object is useful because data
    may be available in many formats. It would be hard to convert these different
    data formats into a single format just to use it with `NSArray`. And you have
    not even exhausted the possibilities for conversion. For example, other ways of
    creating an `NSArray` are by reading data directly from a file (see `arrayWithContentsOfFile:`)
    or from an URL (see `arrayWithContentsOfURL:`).'
