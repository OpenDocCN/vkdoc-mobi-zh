  trans: '

    # 总结


    在本章中，我概述了 Objective-C 中的内存管理。你了解到内存管理作为一种避免因内存错误访问而导致编程错误的技术的重要性。正确使用内存对于避免常见问题（如内存泄漏）是必要的，内存泄漏会导致应用无响应，并最终因内存资源不足而崩溃。


    如果不了解对象如何创建、如何在内存中持有以及最终如何释放，就很难编写正确的软件。虽然 Objective-C 不使用未使用内存的垃圾回收机制（主要是出于性能考虑），但
    Foundation 框架提供了一种简单的内存管理机制，该机制在整个系统中被一致地遵循。


    有三种方法控制内存的释放或保留：`retain`、`release` 和 `autorelease`。这些方法存在于每个从 `NSObject` 派生的对象中，它们提供了对应用何时应释放内存的精细控制。这些方法是
    Objective-C 中每种内存管理方案的基础构建块。


    你学会了如何使用自动释放池来方便地管理由 `autorelease` 控制的对象。通过仔细运用自动释放池，可以降低特定算法所需的内存量，因为内存将被更频繁地释放。在那些使用图像和声音文件等大型对象的图形应用中，这种改变能够对产品的性能和易用性产生显著影响。在某些情况下，自动释放池也有助于提升性能：由于你将内存释放推迟到稍后的时间，你可能需要花费更少的总体时间来管理对象的即时释放。


    你看到了内存管理消息如何与属性及其不同属性特性交互的示例。属性可用于简化许多内存管理技巧，因为它们可以自动保留或释放它们所持有的对象。通过仔细选择属性的特性，你可以极大地简化代码，同时利用
    Objective-C 编译器提供的功能。


    最后，我讨论了自动引用计数（ARC），这是一种新技术，编译器负责推导出正确的指令来保留或释放内存。要使用 ARC，你只需遵循一些关于如何处理内存引用并激活编译时设置的约定。其结果是一个快速且稳健的系统，具有较低的内存消耗，并减少了编程错误的机会。


    在下一章中，我将介绍键值编程，这是一种在 Cocoa 和许多其他第三方库中广泛使用的技术。通过键值编程，你不仅能够使用通过消息实现的动态代码，还能访问那些可以通过通用方式访问的动态数据。


    # 9. 键值编码


    ## 摘要


    在前面的章节中，你看到了 Objective-C 程序员使用面向对象编程概念处理代码的多种方式。例如，开发者可以利用语言的动态性，通过消息传递实现多态功能，甚至可以使用协议的概念向现有类添加新方法。


    然而，面向对象编程的另一方面涉及对对象中包含的数据的访问。虽然明智的做法是避免直接访问对象管理的数据，但 Objective-C 提供了一种使用属性机制获取和设置数据的明确定义的过程。属性使数据对其他对象可用，同时保留了控制这些数据如何共享的能力。


    然而，属性并不是跨对象共享数据的唯一方式。在本章中，我将讨论键值编码（KVC），这是一种基于 `NSObject` 层次结构功能的通用数据发布访问机制。键值编码被设计为允许通过使用编码为字符串的键在对象之间交换数据。因此，在
    KVC 中，无需为每个数据元素调用不同的方法；相反，可以使用一个简单的接口来获取和设置广泛的数据。


    键值编程之所以是一个重要主题的另一个原因是它在许多 Objective-C 库中被使用。例如，用于从数据库及其他存储库中存储和检索数据的 CoreData
    框架，采用基于 KVC 的模型来保存和检索数据对象。借助 KVC，数据可以通过一个简单的接口进行访问，从而避免了在对象之间的唯一区别是它们包含的值集不同时创建多个子类的需要。

