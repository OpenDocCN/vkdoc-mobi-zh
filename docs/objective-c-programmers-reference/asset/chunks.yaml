  raw: '### NSHashTable


    An `NSHashTable` is a simple collection class where the elements are stored in
    an array. Each element in the hash table is associated to a hash key. The key
    is then used to find the exact position where the element will be stored. The
    following is a list of the methods:


    *   `-(id)initWithOptions:` `(NSPointerFunctionsOptions)options capacity:(NSUInteger)initialCapacity`;
    initializes the `NSHashTable` object using the provided options and an initial
    capacity defined by the second argument.

    *   `- (id)initWithPointerFunctions:` `(NSPointerFunctions *)functions capacity:(NSUInteger)initialCapacity`;
    initializes the `NSHashTable` object with a set of pointer functions and defines
    the initial capacity of the hash table.

    *   `+ (id)hashTableWithOptions:` `(NSPointerFunctionsOptions)options`; creates
    and initializes the `NSHashTable` object with the options passed as the first
    argument.

    *   `+ (id)hashTableWithWeakObjects`; returns a new hash table with weak references
    to the objects contained in the target object. This method is deprecated and should
    be substituted by the following method.

    *   `+ (id)weakObjectsHashTable`; is similar to the previous method, and is the
    preferred one.

    *   `- (NSPointerFunctions *)pointerFunctions`; returns the pointer functions
    stored in the target `NSHashTable` object.

    *   `- (NSUInteger)count`; returns the number of elements contained in the target
    `NSHashTable` object.

    *   `-` `(id)member:(id)object`; determines if the object passed as the first
    argument is contained in the target `NSHashTable`. If the answer is YES, then
    the object is return. Otherwise, the return value is nil.

    *   `- (NSEnumerator *)objectEnumerator`; returns an `NSEnumerator` object, which
    can be used to step through the elements of the target `NSHashTable` object.

    *   `- (void)addObject:(id)object`; adds a new object to the `NSHashTable`.

    *   `- (void)removeObject:(id)object`; removes the parameter object to the target
    `NSHashTable`.

    *   `- (void)removeAllObjects`; cleans up the target `NSHashTable` object by removing
    all elements stored internally.

    *   `- (NSArray *)allObjects`; returns an `NSArray` that contains all object stored
    in the `NSHashTable`.

    *   `- (id)anyObject`; returns one of the objects contained in the target `NSHashTable`.
    There is no guarantee that the object returned is chosen randomly.

    *   `- (BOOL)containsObject:(id)anObject`; returns YES if the object passed as
    the first argument is contained in the target `NSHashTable`.

    *   `- (BOOL)intersectsHashTable:` `(NSHashTable *)other`; returns YES if there
    are elements that are contained both in the target `NSHashTable` object and in
    the parameter `other`.

    *   `- (BOOL)isEqualToHashTable:` `(NSHashTable *)other`; returns YES if `other`
    is equal to the target `NSHashTable` object. That is, the two hash tables must
    contain the same elements.

    *   `- (BOOL)isSubsetOfHashTable:` `(NSHashTable *)other`; returns YES if the
    hash table passed as a parameter is a subset of the target `NSHashTable`. That
    is, every element contained in `other` must also be in the target object.

    *   `- (void)intersectHashTable:` `(NSHashTable *)other`; removes any element
    from the target `NSHashTable` that is not part of the hash table passed as an
    argument.

    *   `- (void)unionHashTable:` `(NSHashTable *)other`; includes in the target `NSHashTable`
    object any element contained in the hash table passed as an argument that is not
    already included.

    *   `- (void)minusHashTable:` `(NSHashTable *)other`; removes from the target
    `NSHashTable` any element that is included in the `other` hash table.

    *   `- (NSSet *)setRepresentation`; creates a new `NSSet` object that contains
    all elements from the target `NSHashTable` object.


    ### NSSet


    An `NSSet` object represents a simple collection of objects. You should use an
    `NSSet` when the main goal is to query for containment in the set. This class
    also provides other set operations, such as intersection, union, and subset extraction,
    for example. Here are the methods:'
