- fmt: "### A Simple Example\n\nTo better understand how selectors work, let’s start\
    \ with a sample class that employs selectors in its implementation.\n\n```\n//\
    \ file Selectors.h\n@interface Selectors : NSObject\n- (void) printValue:(id)obj;\n\
    - (void) createSelector;\n@end\n\n// file Selectors.m\n@implementation Selectors\n\
    - (void) printValue:(id)obj\n{\n    NSLog(@\"printing the value of object: %@\"\
    , obj);\n}\n- (void) createSelector\n{\n    SEL sel = @selector(printValue:);\n\
    \    // use selector here\n}\n@end\n```\n\nThe `Selectors` class gives you an\
    \ example of how to retrieve the selector for a generic method. The method in\
    \ question is `printValue:`, which simply prints its parameter `obj` to the logging\
    \ window (when a colon is appended to the name of a method, as in `printValue:,`\
    \ it means that it requires an argument). The method `createSelector`, however,\
    \ is responsible for getting the selector of the first method and storing it in\
    \ the local variable `sel`. To do this, you employ a special operator made available\
    \ by Objective-C that returns the selector for a message passed as argument.\n\
    The `@selector` operator can be used anytime you need to convert existing methods\
    \ into selector values. In a sense, `@selector` returns an object that is similar\
    \ to a pointer or reference, since it can be later used to identify the message\
    \ and to pass it as a parameter to other parts of the code.\n\nOnce you have a\
    \ selector, you can use it on methods that accept this type of parameter. The\
    \ simplest way to use a selector is to call it on a particular object. This can\
    \ be done, for example, with the `performSelector:` method, like so:\n\n```\n\
    // file Selectors.m\n@implementation Selectors\n- (void) displayData\n{\n    NSLog(@\"\
    The value is 1\");\n}\n- (void) createSelector\n{\n    SEL sel = @selector(displayData);\n\
    \    // use selector here\n    [self performSelector:sel];\n    // this should\
    \ print \"The value is 1\"\n}\n@end\n```\n\nThe `performSelector:` method has\
    \ the ability to trigger a message call using the provided selector on the targeted\
    \ object. Thus, in the example above, the line  \n`[self performSelector:sel];`\
    \  \nis identical to calling the method directly, like  \n`[self displayData];`\n\
    \nClearly, in this example you are not gaining anything by adding the extra indirection,\
    \ but in a real application the selector would be retrieved by another part of\
    \ the code, passed as a parameter, for example. In that case, the current class\
    \ would have no information about the targeted message. This is a common situation\
    \ that is explored in several areas of the Cocoa frameworks, as you will see in\
    \ the next sections.\n\n### Additional Parameters\n\nIf you want to execute a\
    \ message that has a parameter, then you need to use a slightly modified version\
    \ of the `performSelector:` message so that it can become possible to pass the\
    \ required parameter as an argument to the destination method. To do this, you\
    \ use the `performSelector:withObject:` version, like so:\n\n```\n// file Selectors.m\n\
    @implementation Selectors\n- (void) printValue:(id)obj\n{\n    NSLog(@\"printing\
    \ the value of object: %@\", obj);\n}\n- (void) createSelector\n{\n    SEL sel\
    \ = @selector(printValue:);\n    // use selector here\n    [self performSelector:sel\
    \ withObject:@\"parameter\"];\n    // this should print \"the value of object\
    \ is parameter\"\n}\n@end\n```\n\nThis kind of mechanism is very useful when you\
    \ want to allow a class to determine which message to call when a particular event\
    \ happens. For example, suppose that class `MailService` is able to deliver mail\
    \ to other classes. One possibility is to have the destination saved in an instance\
    \ variable that matches a particular protocol (say `MailReceiver`). When the message\
    \ is available, then a particular message is sent, in this case the `onMailIsAvailable:`\
    \ message. Let’s first see what the class interface would look like.\n\n```\n\
    // file MailService.h\n@protocol MailReceiver <NSObject>\n- (void) onMailIsAvailable:(id)mail;\n\
    @end\n\n@interface MailService : NSObject\n{\n    id <MailReceiver> _receiver;\n\
    }\n@property(retain) id <MailReceiver> receiver;\n- (void) processMail;\n@end\n\
    ```\n\nHere the `MailReceiver` protocol is defined, containing a single method\
    \ called `onMailIsAvailable:` that will be called by `MailService` when the mail\
    \ is available for processing.\nThen you need an interface for the `MailService`.\
    \ That class will contain a property that stores a pointer to an object called\
    \ `_receiver`. The notation `id <MailReceiver>` means that this object satisfies\
    \ the `MailReceiver` protocol. It also contains a method `processMail`, which\
    \ performs the main tasks of mail processing.\nWhen the `processMail` method is\
    \ called, it retrieves the mail data and calls the `onMailIsAvailable:` message\
    \ on the receiver object.\n\n```\n// file MailService.m\n@implementation MailService\n\
    - (void) processMail\n{\n    id myMail = nil;\n    // do something else to initialize\
    \ myMail...\n    [_receiver onMailIsAvailable:myMail];\n}\n@end\n```\n\nHere,\
    \ you use the message defined by the `MailReceiver` protocol to transfer the `myMail`\
    \ data to the interested object."
  raw: '### A Simple Example


    To better understand how selectors work, let’s start with a sample class that
    employs selectors in its implementation.


    `// file Selectors.h`


    `@interface Selectors : NSObject`


    `- (void) printValue:(id)obj;`


    `- (void) createSelector;`


    `@end`


    `// file Selectors.m`


    `@implementation Selectors`


    `- (void) printValue:(id)obj`


    `{`


            `NSLog(@"printing the value of object: %@", obj);`


    `}`


    `- (void) createSelector`


    `{`


            `SEL sel = @selector(printValue:);`


            `// use selector here`


    `}`


    `@end`


    The `Selectors` class gives you an example of how to retrieve the selector for
    a generic method. The method in question is `printValue:`, which simply prints
    its parameter `obj` to the logging window (when a colon is appended to the name
    of a method, as in `printValue:,` it means that it requires an argument). The
    method `createSelector`, however, is responsible for getting the selector of the
    first method and storing it in the local variable `sel`. To do this, you employ
    a special operator made available by Objective-C that returns the selector for
    a message passed as argument.


    The `@selector` operator can be used anytime you need to convert existing methods
    into selector values. In a sense, `@selector` returns an object that is similar
    to a pointer or reference, since it can be later used to identify the message
    and to pass it as a parameter to other parts of the code.


    Once you have a selector, you can use it on methods that accept this type of parameter.
    The simplest way to use a selector is to call it on a particular object. This
    can be done, for example, with the `performSelector:` method, like so:


    `// file Selectors.m`


    `@implementation Selectors`


    `- (void) displayData`


    `{`


            `NSLog(@"The value is 1");`


    `}`


    `- (void) createSelector`


    `{`


            `SEL sel = @selector(displayData);`


            `// use selector here`


            `[self performSelector:sel];`


            `// this should print "The value is 1"`


    `}`


    `@end`


    The `performSelector:` method has the ability to trigger a message call using
    the provided selector on the targeted object. Thus, in the example above, the
    line


    `[self performSelector:sel];`


    is identical to calling the method directly, like


    `[self displayData];`


    Clearly, in this example you are not gaining anything by adding the extra indirection,
    but in a real application the selector would be retrieved by another part of the
    code, passed as a parameter, for example. In that case, the current class would
    have no information about the targeted message. This is a common situation that
    is explored in several areas of the Cocoa frameworks, as you will see in the next
    sections.


    ### Additional Parameters


    If you want to execute a message that has a parameter, then you need to use a
    slightly modified version of the `performSelector:` message so that it can become
    possible to pass the required parameter as an argument to the destination method.
    To do this, you use the `performSelector:withObject:` version, like so:


    `// file Selectors.m`


    `@implementation Selectors`


    `- (void) printValue:(id)obj`


    `{`


            `NSLog(@"printing the value of object: %@", obj);`


    `}`


    `- (void) createSelector`


    `{`


            `SEL sel = @selector(printValue:);`


            `// use selector here`


            `[self performSelector:sel withObject:@"parameter"];`


            `// this should print "the value of object is parameter"`


    `}`


    `@end`


    This kind of mechanism is very useful when you want to allow a class to determine
    which message to call when a particular event happens. For example, suppose that
    class `MailService` is able to deliver mail to other classes. One possibility
    is to have the destination saved in an instance variable that matches a particular
    protocol (say `MailReceiver`). When the message is available, then a particular
    message is sent, in this case the `onMailIsAvailable:` message. Let’s first see
    what the class interface would look like.


    `// file MailService.h`


    `@protocol MailReceiver <NSObject>`


    `- (void) onMailIsAvailable:(id)mail;`


    `@end`


    `@interface MailService : NSObject`


    `{`


            `id <MailReceiver> _receiver;`


    `}`


    `@property(retain) id <MailReceiver> receiver;`


    `- (void) processMail;`


    `@end`


    Here the `MailReceiver` protocol is defined, containing a single method called
    `onMailIsAvailable:` that will be called by `MailService` when the mail is available
    for processing.


    Then you need an interface for the `MailService`. That class will contain a property
    that stores a pointer to an object called `_receiver`. The notation `id <MailReceiver>`
    means that this object satisfies the `MailReceiver` protocol. It also contains
    a method `processMail`, which performs the main tasks of mail processing.


    When the `processMail` method is called, it retrieves the mail data and calls
    the `onMailIsAvailable:` message on the receiver object.


    `// file MailService.m`


    `@implementation MailService`


    `- (void) processMail`


    `{`


            `id myMail = nil;`


            `// do something else to initialize myMail...`


            `[_receiver onMailIsAvailable:myMail];`


    `}`


    `@end`


    Here, you use the message defined by the `MailReceiver` protocol to transfer the
    `myMail` data to the interested object.'
  trans: "\n### 一个简单示例\n\n为了更好地理解选择器的工作原理，我们先从一个在实现中使用选择器的示例类开始。\n\n```\n// 文件 Selectors.h\n\
    @interface Selectors : NSObject\n- (void) printValue:(id)obj;\n- (void) createSelector;\n\
    @end\n\n// 文件 Selectors.m\n@implementation Selectors\n- (void) printValue:(id)obj\n\
    {\n    NSLog(@\"打印对象的值: %@\", obj);\n}\n- (void) createSelector\n{\n    SEL sel\
    \ = @selector(printValue:);\n    // 在此处使用选择器\n}\n@end\n```\n\n`Selectors` 类向您展示了一个如何为通用方法获取选择器的示例。所涉及的方法是\
    \ `printValue:`，它简单地将参数 `obj` 打印到日志窗口（当方法名后附加冒号时，如 `printValue:`，表示该方法需要一个参数）。而\
    \ `createSelector` 方法则负责获取第一个方法的选择器，并将其存储在局部变量 `sel` 中。为此，您需要使用 Objective-C 提供的一个特殊运算符，该运算符返回传递给它的消息的选择器。\n\
    \n当您需要将现有方法转换为选择器值时，可以随时使用 `@selector` 运算符。从某种意义上说，`@selector` 返回一个类似于指针或引用的对象，因为它之后可用于标识该消息，并将其作为参数传递给代码的其他部分。\n\
    \n一旦拥有选择器，您就可以在与该类型参数兼容的方法上使用它。使用选择器最简单的方法是在特定对象上调用它。例如，可以通过 `performSelector:`\
    \ 方法来实现，如下所示：\n\n```\n// 文件 Selectors.m\n@implementation Selectors\n- (void) displayData\n\
    {\n    NSLog(@\"值为 1\");\n}\n- (void) createSelector\n{\n    SEL sel = @selector(displayData);\n\
    \    // 在此处使用选择器\n    [self performSelector:sel];\n    // 这应该会打印 \"值为 1\"\n}\n\
    @end\n```\n\n`performSelector:` 方法能够使用提供的选择器在目标对象上触发消息调用。因此，在上面的示例中，代码行  \n`[self\
    \ performSelector:sel];`  \n等同于直接调用该方法，例如：  \n`[self displayData];`\n\n显然，在这个例子中，增加这一层间接调用并没有带来任何额外的好处，但在实际应用中，选择器可能会被代码的另一部分检索到，然后作为参数传递过来。在这种情况下，当前类将无法获知目标消息的信息。这是一种常见的情况，在\
    \ Cocoa 框架的多个领域中都会遇到，您将在接下来的章节中看到。\n\n### 带参数的调用\n\n如果您想执行一个带参数的消息，那么需要使用 `performSelector:`\
    \ 方法的一个稍微修改过的版本，以便能够将所需的参数传递给目标方法。为此，您可以使用 `performSelector:withObject:` 版本，如下所示：\n\
    \n```\n// 文件 Selectors.m\n@implementation Selectors\n- (void) printValue:(id)obj\n\
    {\n    NSLog(@\"打印对象的值: %@\", obj);\n}\n- (void) createSelector\n{\n    SEL sel\
    \ = @selector(printValue:);\n    // 在此处使用选择器\n    [self performSelector:sel withObject:@\"\
    参数\"];\n    // 这应该会打印 \"对象的值是 参数\"\n}\n@end\n```\n\n这种机制在您希望允许一个类在特定事件发生时决定调用哪个消息时非常有用。例如，假设类\
    \ `MailService` 能够向其他类发送邮件。一种可能性是将目标对象保存在符合特定协议（例如 `MailReceiver`）的实例变量中。当消息可用时，便发送特定的消息，在此例中为\
    \ `onMailIsAvailable:` 消息。让我们先看看类接口会是什么样子。\n\n```\n// 文件 MailService.h\n@protocol\
    \ MailReceiver <NSObject>\n- (void) onMailIsAvailable:(id)mail;\n@end\n\n@interface\
    \ MailService : NSObject\n{\n    id <MailReceiver> _receiver;\n}\n@property(retain)\
    \ id <MailReceiver> receiver;\n- (void) processMail;\n@end\n```\n\n这里定义了 `MailReceiver`\
    \ 协议，其中包含一个名为 `onMailIsAvailable:` 的单一方法，当邮件可供处理时，`MailService` 将调用此方法。\n然后需要一个\
    \ `MailService` 的接口。该类将包含一个属性，该属性存储一个指向名为 `_receiver` 的对象的指针。符号 `id <MailReceiver>`\
    \ 表示该对象符合 `MailReceiver` 协议。该类还包含一个 `processMail` 方法，该方法执行邮件处理的主要任务。\n当调用 `processMail`\
    \ 方法时，它会检索邮件数据，并在接收者对象上调用 `onMailIsAvailable:` 消息。\n\n```\n// 文件 MailService.m\n\
    @implementation MailService\n- (void) processMail\n{\n    id myMail = nil;\n \
    \   // 执行其他操作来初始化 myMail...\n    [_receiver onMailIsAvailable:myMail];\n}\n@end\n\
    ```\n\n在这里，您使用 `MailReceiver` 协议定义的消息将 `myMail` 数据传输给感兴趣的对象。\n"
- fmt: "### Using Selectors\n\nThe design you have seen up to now for the mail processing\
    \ system is consistent with the techniques discussed in the previous chapters.\
    \ However, it also has a few problems.\n\n- It requires that a protocol be used\
    \ during the class interface definition. This is possible in many cases, but not\
    \ always. For example, suppose that you are writing a category extension to an\
    \ existing class. In this case, you cannot change the protocols implemented by\
    \ the class in its original interface definition.\n- The method used always has\
    \ the same name: this limits the way you can respond to `MailService` messages.\
    \ For example, suppose that you want to subscribe to two `MailService` objects\
    \ for different types of messages. In this case, both `MailService` objects will\
    \ call the same method, and you will have a difficult time making a distinction\
    \ between the calls.\n- It needs the extra complexity of a protocol definition.\
    \ Sometimes you may want to use a simpler solution that could be used in several\
    \ similar places. Removing the need for an additional protocol is a better way\
    \ to handle such situations. Even if an informal protocol is used, the two problems\
    \ mentioned above are still present.\n\nUsing selectors provides an alternative\
    \ way to solve these problems while avoiding many of the issues created by the\
    \ introduction of a new protocol. In a nutshell, the idea is to allow the client\
    \ to pass a selector that identifies the target method. That method will then\
    \ be called when the expected event or condition is raised. In that way, it is\
    \ possible to have several target methods responding to as many `MailService`\
    \ objects as necessary.\n\nEach instance of `MailService` may have a distinct\
    \ selector, so it will respond in a different way. When receiving the message\
    \ call destined to a specific selector, the `MailReceiver` can be sure of what\
    \ particular version of `MailService` generated the call. Let’s see how such an\
    \ approach could be implemented.\n\n```objc\n// file MailService.h\n\n@interface\
    \ MailService : NSObject\n\n@property(retain) id receiver;\n@property SEL selector;\n\
    \n- (void) processMail;\n\n@end\n```\n\nThe `MailService` interface is updated\
    \ to contain an additional property: the `selector` property, which holds a selector\
    \ for the message you want to send when mail is available. Also notice that the\
    \ receiver doesn’t need to be restricted to a particular protocol. Since you will\
    \ not be calling any method directly, there is no need to request a particular\
    \ interface for this object.\n\n```objc\n// file MailService.m\n\n@implementation\
    \ MailService\n\n- (void) processMail\n{\n    id myMail = nil;\n    // do something\
    \ else to initialize myMail...\n    if (_selector && _receiver)\n    {\n     \
    \   [_receiver performSelector:_selector withObject:myMail];\n    }\n}\n\n@end\n\
    ```\n\nSome changes in the implementation section are necessary to make use of\
    \ the new property. Once mail data is available for processing, you check if the\
    \ `receiver` and `selector` properties have been set. Then, you call `performSelector:withObject:`\
    \ on the receiver object, passing the selector as parameter, along with the data\
    \ stored in `myMail`.\n\nYou can also slightly increase the safety of the `processMail`\
    \ method by checking if the selector is really implemented by the receiver. Such\
    \ a test can avoid programming errors where the receiver object doesn’t implement\
    \ the method specified by the selector. This can be achieved with the use of the\
    \ method `respondsToSelector:`, which checks if an object can process a message\
    \ call to the given selector.\n\n```objc\n- (void) processMail\n{\n    id myMail\
    \ = nil;\n    // do something else to initialize myMail...\n    if (_selector\
    \ && _receiver)\n    {\n        if ([_receiver respondsToSelector:_selector])\n\
    \        {\n            [_receiver performSelector:_selector withObject:myMail];\n\
    \        }\n        else\n        {\n            NSLog(@\"error: the receiver\
    \ doesn't respond to the given selector\");\n        }\n    }\n}\n```\n\nHere,\
    \ you check if the selector can be called as a message sent to `_receiver`. If\
    \ that is not possible, then you log an error message that can later be traced\
    \ by developers.\n\nFinally, the following code shows how you can use this selector-based\
    \ implementation:\n\n```objc\n// file MailReceiverImp.h\n\n@interface MailReceiverImp\
    \ : NSObject\n{\n    MailService *_service1;\n    MailService *_service2;\n}\n\
    \n- (void) receiveMail1:(id)data;\n- (void) receiveMail2:(id)data;\n- (void) setupServices;\n\
    \n@end\n```\n\nFirst, you define an example class that will have two mail services.\
    \ This will show how such services can be handled independently using the selector-based\
    \ approach. The `MailReceiverImp` class has two instance variables used to store\
    \ the `MailService` objects in use. The class also has two methods that can receive\
    \ mail data. Finally, you declare a `setupServices` method, which will be responsible\
    \ for the initial setup of the mail processing subsystem.\n\n```objc\n// file\
    \ MailReceiverImp.m\n\n@implementation MailReceiverImp\n\n- (void) receiveMail1:(id)data\n\
    {\n    NSLog(@\"receiving email data from source 1\");\n}\n\n- (void) receiveMail2:(id)data\n\
    {\n    NSLog(@\"receiving email data from source 2\");\n}\n\n- (void) setupServices\n\
    {\n    _service1 = [[MailService alloc] init];\n    _service1.selector = @selector(receiveMail1:);\n\
    \    _service1.receiver = self;\n\n    _service2 = [[MailService alloc] init];\n\
    \    _service2.selector = @selector(receiveMail2:);\n    _service2.receiver =\
    \ self;\n}\n\n@end\n```\n\nThe implementation section of the class provides the\
    \ details for using the two `MailService` objects. The two `receiveMail` methods\
    \ are similar and are displayed here just for completeness. A real implementation\
    \ would do different things with the data received. The `setupServices` method,\
    \ however, performs a useful role. Its goal is to allocate and initialize both\
    \ services. Then, you set the two properties expected by each service: a `selector`\
    \ and a `receiver`. The receiver is always `self`, since you are interested in\
    \ processing the mail data directly. This could be different if you wanted to\
    \ send the results to another object, however.\n\nYou also set the `selector`\
    \ property to different methods, one for each `MailService` object. The selectors\
    \ are retrieved using the `@selector` keyword, applied to each of the target methods.\n\
    \nThe biggest advantage of this type of code is that it can handle as many `MailService`\
    \ objects as necessary. There is no limitation imposed by a particular protocol,\
    \ for example. All a class needs to do is add a new method and use the `@selector`\
    \ keyword to retrieve its associate selector and pass it to the service object.\n\
    \nAs you will see in the next section, this type of strategy is useful not only\
    \ on your own user-defined classes, but also when interacting with the Cocoa frameworks.\
    \ In fact, event processing using selectors is one of the basic design patterns\
    \ used in GUI programming for the Cocoa and Cocoa Touch libraries."
  raw: '### Using Selectors


    The design you have seen up to now for the mail processing system is consistent
    with the techniques discussed in the previous chapters. However, it also has a
    few problems.


    *   It requires that a protocol be used during the class interface definition.
    This is possible in many cases, but not always. For example, suppose that you
    are writing a category extension to an existing class. In this case, you cannot
    change the protocols implemented by the class in its original interface definition.

    *   The method used always has the same name: this limits the way you can respond
    to `MailService` messages. For example, suppose that you want to subscribe to
    two `MailService` objects for different types of messages. In this case, both
    `MailService` objects will call the same method, and you will have a difficult
    time making a distinction between the calls.

    *   It needs the extra complexity of a protocol definition. Sometimes you may
    want to use a simpler solution that could be used in several similar places. Removing
    the need for an additional protocol is a better way to handle such situations.
    Even if an informal protocol is used, the two problems mentioned above are still
    present.


    Using selectors provides an alternative way to solve these problems while avoiding
    many of the issues created by the introduction of a new protocol. In a nutshell,
    the idea is to allow the client to pass a selector that identifies the target
    method. That method will then be called when the expected event or condition is
    raised. In that way, it is possible to have several target methods responding
    to as many `MailService` objects as necessary.


    Each instance of `MailService` may have a distinct selector, so it will respond
    in a different way. When receiving the message call destined to a specific selector,
    the MailReceiver can be sure of what particular version of `MailService` generated
    the call. Let’s see how such an approach could be implemented.


    `// file MailService.h`


    `@interface MailService : NSObject`


    `@property(retain) id receiver;`


    `@property SEL selector;`


    `- (void) processMail;`


    `@end`


    The `MailService` interface is updated to contain an additional property: the
    `selector` property, which holds a selector for the message you want to send when
    mail is available. Also notice that the receiver doesn’t need to be restricted
    to a particular protocol. Since you will not be calling any method directly, there
    is no need to request a particular interface for this object.


    `// file MailService.m`


    `@implementation MailService`


    `- (void) processMail`


    `{`


    `id myMail = nil;`


    `// do something else to initialize myMail...`


    `if (_selector` `&&` `_receiver)`


    `{`


    `[_receiver performSelector:_selector withObject:myMail];`


    `}`


    `}`


    `@end`


    Some changes in the implementation section are necessary to make use of the new
    property. Once mail data is available for processing, you check if the receiver
    and selector properties have been set. Then, you call `performSelector:withObject:`
    on the receiver object, passing the selector as parameter, along with the data
    stored in `myMail`.


    You can also slightly increase the safety of the `processMail` method by checking
    if the selector is really implemented by the receiver. Such a test can avoid programming
    errors where the receiver object doesn’t implement the method specified by the
    selector. This can be achieved with the use of the method`respondsToSelector:`,
    which checks if an object can process a message call to the given selector.


    `- (void) processMail`


    `{`


    `id myMail = nil;`


    `// do something else to initialize myMail...`


    `if (_selector && _receiver)`


    `{`


    `if ([_receiver respondsToSelector:_selector])`


    `{`


    `[_receiver performSelector:_selector withObject:myMail];`


    `}`


    `else`


    `{`


    `NSLog(@"error: the receiver doesn''t respond to the given selector");`


    `}`


    `}`


    `}`


    RHere, you check if the selector can be called as a message sent to `_receiver`.
    If that is not possible, then you log an error message that can later be traced
    by developers.


    Finally, the following code shows how you can use this selector-based implementation:


    `// file MailReceiverImp.h`


    `@interface MailReceiverImp : NSObject`


    `{`


    `MailService *_service1;`


    `MailService *_service2;`


    `}`


    `- (void) receiveMail1:(id)data;`


    `- (void) receiveMail2:(id)data;`


    `- (void) setupServices;`


    `@end`


    First, you define an example class that will have two mail services. This will
    show how such services can be handled independently using the selector-based approach.
    The `MailReceiverImp` class has two instance variables used to store the `MailService`
    objects in use. The class also has two methods that can receive mail data. Finally,
    you declare a `setupServices` method, which will be responsible for the initial
    setup of the mail processing subsystem.


    `// file MailReceiverImp.m`


    `@implementation MailReceiverImp`


    `- (void) receiveMail1:(id)data`


    `{`


    `NSLog(@"receiving email data from source 1");`


    `}`


    `- (void) receiveMail2:(id)data`


    `{`


    `NSLog(@"receiving email data from source 2");`


    `}`


    `- (void) setupServices`


    `{`


    `_service1 = [[MailService alloc] init];`


    `_service1.selector = @selector(receiveMail1:);`


    `_service1.receiver = self;`


    `_service2 = [[MailService alloc] init];`


    `_service2.selector = @selector(receiveMail2:);`


    `_service2.receiver = self;`


    `}`


    `@end`


    The implementation section of the class provides the details for using the two
    `MailService` objects. The two `receiveMail` methods are similar and are displayed
    here just for completeness. A real implementation would do different things with
    the data received. The `setupServices` method, however, performs a useful role.
    Its goal is to allocate and initialize both services. Then, you set the two properties
    expected by each service: a `selector` and a `receiver`. The receiver is always
    `self`, since you are interested in processing the mail data directly. This could
    be different if you wanted to send the results to another object, however.


    You also set the selector property to different methods, one for each `MailService`
    object. The selectors are retrieved using the `@selector` keyword, applied to
    each of the target methods.


    The biggest advantage of this type of code is that it can handle as many `MailService`
    objects as necessary. There is no limitation imposed by a particular protocol,
    for example. All a class needs to do is add a new method and use the `@selector`
    keyword to retrieve its associate selector and pass it to the service object.


    As you will see in the next section, this type of strategy is useful not only
    on your own user-defined classes, but also when interacting with the Cocoa frameworks.
    In fact, event processing using selectors is one of the basic design patterns
    used in GUI programming for the Cocoa and Cocoa Touch libraries.'
  trans: "\n### 使用选择器\n\n到目前为止，你看到的邮件处理系统设计与前几章讨论的技术是一致的。不过，它也存在一些问题。\n\n-   它要求在类接口定义时使用协议。这在很多情况下是可行的，但并非总是如此。例如，假设你正在为现有类编写一个分类扩展。在这种情况下，你无法更改该类在其原始接口定义中实现的协议。\n\
    -   所使用的方法名称始终相同：这限制了你响应`MailService`消息的方式。例如，假设你想为不同类型的消息订阅两个`MailService`对象。在这种情况下，两个`MailService`对象都会调用同一个方法，你将很难区分这些调用。\n\
    -   它需要协议定义带来的额外复杂性。有时你可能希望使用一个更简单的解决方案，该方案可在几个类似的地方使用。消除对额外协议的需求是处理此类情况的更好方法。即使使用了非正式协议，上述两个问题依然存在。\n\
    \n使用选择器提供了另一种解决这些问题的方法，同时避免了引入新协议所带来的许多问题。简而言之，其理念是允许客户端传递一个选择器来标识目标方法。当预期的事件或条件触发时，该方法将被调用。这样，就可以有多个目标方法响应尽可能多的`MailService`对象。\n\
    \n每个`MailService`实例可以拥有不同的选择器，因此能以不同方式响应。当接收到发送给特定选择器的消息调用时，`MailReceiver`能够确定是哪个特定的`MailService`版本产生了该调用。让我们看看如何实现这种方法。\n\
    \n```objc\n// 文件 MailService.h\n\n@interface MailService : NSObject\n\n@property(retain)\
    \ id receiver;\n@property SEL selector;\n\n- (void) processMail;\n\n@end\n```\n\
    \n`MailService`接口已更新，包含一个额外的属性：`selector`属性，它持有在邮件可用时想要发送的消息的选择器。同时注意，接收者不再需要被限制于特定的协议。由于你不会直接调用任何方法，因此无需为此对象请求特定的接口。\n\
    \n```objc\n// 文件 MailService.m\n\n@implementation MailService\n\n- (void) processMail\n\
    {\n    id myMail = nil;\n    // 执行其他操作来初始化 myMail...\n    if (_selector && _receiver)\n\
    \    {\n        [_receiver performSelector:_selector withObject:myMail];\n   \
    \ }\n}\n\n@end\n```\n\n实现部分需要进行一些修改以利用新属性。一旦邮件数据可供处理，你检查`receiver`和`selector`属性是否已设置。然后，你在接收者对象上调用`performSelector:withObject:`，传入选择器作为参数，以及存储在`myMail`中的数据。\n\
    \n你还可以通过检查接收者是否真正实现了该选择器，来略微提高`processMail`方法的安全性。这种测试可以避免接收者对象未实现选择器所指定方法而产生的编程错误。这可以通过使用`respondsToSelector:`方法来实现，该方法检查一个对象能否处理对给定选择器的消息调用。\n\
    \n```objc\n- (void) processMail\n{\n    id myMail = nil;\n    // 执行其他操作来初始化 myMail...\n\
    \    if (_selector && _receiver)\n    {\n        if ([_receiver respondsToSelector:_selector])\n\
    \        {\n            [_receiver performSelector:_selector withObject:myMail];\n\
    \        }\n        else\n        {\n            NSLog(@\"error: the receiver\
    \ doesn't respond to the given selector\");\n        }\n    }\n}\n```\n\n这里，你检查选择器是否可以作为消息发送给`_receiver`。如果不可能，则记录一条错误消息，供开发者稍后追踪。\n\
    \n最后，以下代码展示了如何使用这种基于选择器的实现：\n\n```objc\n// 文件 MailReceiverImp.h\n\n@interface\
    \ MailReceiverImp : NSObject\n{\n    MailService *_service1;\n    MailService\
    \ *_service2;\n}\n\n- (void) receiveMail1:(id)data;\n- (void) receiveMail2:(id)data;\n\
    - (void) setupServices;\n\n@end\n```\n\n首先，你定义一个示例类，它将拥有两个邮件服务。这将展示如何使用基于选择器的方法独立处理这些服务。`MailReceiverImp`类有两个实例变量用于存储正在使用的`MailService`对象。该类还有两个可以接收邮件数据的方法。最后，你声明一个`setupServices`方法，该方法负责邮件处理子系统的初始设置。\n\
    \n```objc\n// 文件 MailReceiverImp.m\n\n@implementation MailReceiverImp\n\n- (void)\
    \ receiveMail1:(id)data\n{\n    NSLog(@\"receiving email data from source 1\"\
    );\n}\n\n- (void) receiveMail2:(id)data\n{\n    NSLog(@\"receiving email data\
    \ from source 2\");\n}\n\n- (void) setupServices\n{\n    _service1 = [[MailService\
    \ alloc] init];\n    _service1.selector = @selector(receiveMail1:);\n    _service1.receiver\
    \ = self;\n\n    _service2 = [[MailService alloc] init];\n    _service2.selector\
    \ = @selector(receiveMail2:);\n    _service2.receiver = self;\n}\n\n@end\n```\n\
    \n类的实现部分提供了使用两个`MailService`对象的细节。两个`receiveMail`方法类似，此处列出仅为了完整性。真正的实现会对接收到的数据执行不同的操作。而`setupServices`方法则扮演了有用的角色。其目标是分配并初始化两个服务。然后，你设置每个服务所期望的两个属性：`selector`和`receiver`。接收者始终是`self`，因为你希望直接处理邮件数据。然而，如果你希望将结果发送给另一个对象，情况可能会有所不同。\n\
    \n你还将`selector`属性设置为不同的方法，每个`MailService`对象对应一个。这些选择器通过`@selector`关键字获取，并应用于每个目标方法。\n\
    \n此类代码的最大优势在于，它可以处理任意数量的`MailService`对象。例如，不再受特定协议的限制。类所需做的只是添加一个新方法，使用`@selector`关键字获取其关联的选择器，并将其传递给服务对象。\n\
    \n正如你将在下一节中看到的，这种策略不仅在你自己的用户定义类中很有用，而且在与你 Cocoa 框架交互时也同样有用。事实上，使用选择器处理事件是 Cocoa\
    \ 和 Cocoa Touch 库中 GUI 编程使用的基本设计模式之一。\n"
- fmt: "# Target-Action on Cocoa\n\nA common use of selectors is in defining the target\
    \ for a particular message, which is typically generated in response to an event.\
    \ As such, there is a great potential for using these selector-based strategies\
    \ in UI code. This design pattern is called target-action and is frequently employed\
    \ in the Cocoa frameworks to handle events that need to be processed by application\
    \ classes.\n\nThe Cocoa UI library uses the target-action design pattern to achieve\
    \ a greater level of abstraction and independence between the target of an event\
    \ and the UI control that generates the event. Similar to the application we discussed\
    \ in the previous section, the goal of the UI toolkit is to allow each class to\
    \ be the target of multiple GUI controls. At the same time, the GUI control shouldn’t\
    \ be required to know about any particular protocol implemented by the target.\n\
    \nThe result of these requirements is a design pattern where the GUI control object\
    \ has two properties: a target and an action. The target property designates the\
    \ object that will receive the message when the desired event occurs.\n\nConsider,\
    \ for example, an application with a single window and a button that can be used\
    \ to trigger a user-defined action. Although I haven’t described how to create\
    \ such applications in Cocoa (see the last chapter for a complete example), here\
    \ is the basic code necessary only to set up and process the event:\n\n```\n//\
    \ file ButtonTest.h\n@interface ButtonTest : NSObject\n- (void) doWhenButtonPressed:(id)button;\n\
    - (void) setupButton:(NSButton *)aButton;\n// other methods here\n@end\n```\n\n\
    In the `ButtonTest` class, you declare the two methods that will be discussed\
    \ here. The method `doWhenButtonPressed:` is called in response to an external\
    \ event, which will be executed when the user presses the button. The `setupButton:`\
    \ method, on the other hand, is used to initialize the target-action mechanism\
    \ so that the button-press event will be associated with the target object. These\
    \ methods can be declared as follows:\n\n```\n// file ButtonTest.m\n@implementation\
    \ ButtonTest\n- (void) doWhenButtonPressed:(id)button\n{\n        NSLog(@\"We\
    \ received a button press event\");\n}\n- (void) setupButton:(NSButton *)aButton\n\
    {\n        [aButton setAction:@selector(doWhenButtonPressed:)];\n        [aButton\
    \ setTarget:self];\n}\n// other methods here\n@end\n```\n\nThe `setupButton:`\
    \ method contains the important part of implementation. The parameter to that\
    \ method is an `NSButton` object, which is the class used in Cocoa to represent\
    \ buttons in the user interface. You can assume that this method is called from\
    \ some other place, probably in the same class, with an `NSButton` object as argument.\
    \ The first step is to set the action, that is, the method that will be called\
    \ when the button pressed event is fired. To do this in a generic way, you pass\
    \ a selector for the `doWhenButtonPressed:` method.\n\nThe second step in the\
    \ implementation is to set the target for the action defined in the previous line.\
    \ In this case, you want the target to be the same object, since you are using\
    \ a selector for a method implemented in the `ButtonTest` class. As a result,\
    \ the button object will use `self` as a target for the message selector provided\
    \ in the `setAction:` method.\n\nAlthough my example is applicable to an `NSButton`,\
    \ the technique used here is completely general. Any UI control can use the target-action\
    \ pattern to set up the event handling mechanism between the source of events\
    \ and the consumer. This is a very flexible mechanism that allows different classes\
    \ and libraries to talk to each other with little knowledge about how they work\
    \ or even their public interface. A great advantage of such a mechanism is that\
    \ it reduces the number of classes and protocols that you need to maintain, unlike\
    \ in other languages where there is no way to provide a dynamic link between objects.\n\
    \n## Dynamically Responding to Messages\n\nYou have seen how it is possible for\
    \ classes to send generic messages to a target object without even knowing the\
    \ name of the message. That is achievable through the use of selectors. Another\
    \ important aspect of class-based designs is to be able to respond, in a flexible\
    \ way, to messages that are sent to an object.\n\nIn Objective-C, there is the\
    \ standard option of creating methods and having messages routed to them automatically\
    \ by the language runtime. However, there are cases where you might want to change\
    \ the way in which the methods accepted by an object are dispatched. For example,\
    \ consider a class that needs to relay messages to a helper class. One option\
    \ is to create a new method for each of the methods in the helper class that want\
    \ to replicate, as you will see in the next section.\n\n### Creating a Proxy Object\n\
    \nFor example, consider the original class called `MortgageSecurity`, which is\
    \ responsible for mortgage-related calculations. Its interface can be defined\
    \ as follows:\n\n```\n// file MortgageSecurity.h\n@interface MortgageSecurity\
    \ : NSObject\n- (void)calculateDebt;\n- (void)reapraise;\n- (void)calculateTaxes;\n\
    @end\n```\n\n```\n// file MortgageSecurity.m\n@implementation MortgageSecurity\n\
    - (void)calculateDebt\n{\n        // code that calculates remaining debt in the\
    \ mortgage\n}\n- (void)reappraise\n{\n         // code used to reapraise the value\
    \ of a mortgage\n}\n- (void)calculateTaxes\n{\n        // method that calculated\
    \ the amount of taxes in a mortgage\n}\n@end\n```\n\nThere are three methods used\
    \ to calculate quantities associated with a mortgage, such as the amount of taxes\
    \ and the total debt, as well as the reappraisal value. This is a complex class,\
    \ so you are not interested in the inner workings of each method. What you want\
    \ to do, however, is provide a simple proxy object for the original class. This\
    \ is necessary, for example, when you want to create a façade object so that you\
    \ can hide the real class in an easier-to-use interface.\n\nThe proxy class would\
    \ include a reference to the `MortgageSecurity` class and the necessary code to\
    \ redirect messages.\n\n```\n// file SecurityProxy.h\n@interface SecurityProxy\
    \ : NSObject\n@property(retain) MortgageSecurity *security;\n- (void)calculateDebt;\n\
    - (void)reappraise;\n- (void)calculateTaxes;\n@end\n```\n\nThe interface in this\
    \ case is very similar to the interface for `MortgageSecurity`. You want to provide\
    \ the major functionality present in the original class, so you need to replicate\
    \ its interface. The class also contains a property that can be used to store\
    \ a pointer to a `MortgageSecurity` object so that it can be later used to route\
    \ the incoming messages.\n\nThe implementation of `SecurityProxy` contains the\
    \ code necessary to redirect message calls.\n\n```\n// file SecurityProxy.m\n\
    @implementation SecurityProxy\n- (void)calculateDebt\n{\n        [_security calculateDebt];\n\
    }\n- (void)calculateTaxes\n{\n        [_security calculateTaxes];\n}\n- (void)reappraise\n\
    {\n        [_security reappraise];\n}\n@end\n```\n\nAs you can see, each method\
    \ in `SecurityProxy` acts just as a front end for the corresponding method in\
    \ the `MortgageSecurity` class. They use the `security` property as the target\
    \ for messages and make a call to exactly the same method. If any parameters had\
    \ been passed, you would need to supply them to the target object as well.\n\n\
    A client of `SecurityProxy` would be unaware of the difference between that class\
    \ and `MortgageSecurity`, since they both offer the same interface. However, the\
    \ dependency between these two classes is big. If any detail about the interface\
    \ of `MortgageSecurity` changes, then a corresponding change needs to be made\
    \ in `SecurityProxy` as well. Without such a manual change, the illusion of the\
    \ proxy class will be lost and the classes will start to have different interfaces."
  raw: '## Target-Action on Cocoa


    A common use of selectors is in defining the target for a particular message,
    which is typically generated in response to an event. As such, there is a great
    potential for using these selector-based strategies in UI code. This design pattern
    is called target-action and is frequently employed in the Cocoa frameworks to
    handle events that need to be processed by application classes.


    The Cocoa UI library uses the target-action design pattern to achieve a greater
    level of abstraction and independence between the target of an event and the UI
    control that generates the event. Similar to the application we discussed in the
    previous section, the goal of the UI toolkit is to allow each class to be the
    target of multiple GUI controls. At the same time, the GUI control shouldn’t be
    required to know about any particular protocol implemented by the target.


    The result of these requirements is a design pattern where the GUI control object
    has two properties: a target and an action. The target property designates the
    object that will receive the message when the desired event occurs.


    Consider, for example, an application with a single window and a button that can
    be used to trigger a user-defined action. Although I haven’t described how to
    create such applications in Cocoa (see the last chapter for a complete example),
    here is the basic code necessary only to set up and process the event:


    `// file ButtonTest.h`


    `@interface ButtonTest : NSObject`


    `- (void) doWhenButtonPressed:(id)button;`


    `- (void) setupButton:(NSButton *)aButton;`


    `// other methods here`


    `@end`


    In the `ButtonTest` class, you declare the two methods that will be discussed
    here. The method `doWhenButtonPressed:` is called in response to an external event,
    which will be executed when the user presses the button. The `setupButton:` method,
    on the other hand, is used to initialize the target-action mechanism so that the
    button-press event will be associated with the target object. These methods can
    be declared as follows:


    `// file ButtonTest.m`


    `@implementation ButtonTest`


    `- (void) doWhenButtonPressed:(id)button`


    `{`


            `NSLog(@"We received a button press event");`


    `}`


    `- (void) setupButton:(NSButton *)aButton`


    `{`


            `[aButton setAction:@selector(doWhenButtonPressed:)];`


            `[aButton setTarget:self];`


    `}`


    `// other methods here`


    `@end`


    The `setupButton:` method contains the important part of implementation. The parameter
    to that method is an `NSButton` object, which is the class used in Cocoa to represent
    buttons in the user interface. You can assume that this method is called from
    some other place, probably in the same class, with an `NSButton` object as argument.
    The first step is to set the action, that is, the method that will be called when
    the button pressed event is fired. To do this in a generic way, you pass a selector
    for the `doWhenButtonPressed:` method.


    The second step in the implementation is to set the target for the action defined
    in the previous line. In this case, you want the target to be the same object,
    since you are using a selector for a method implemented in the `ButtonTest` class.
    As a result, the button object will use `self` as a target for the message selector
    provided in the `setAction:` method.


    Although my example is applicable to an `NSButton`, the technique used here is
    completely general. Any UI control can use the target-action pattern to set up
    the event handling mechanism between the source of events and the consumer. This
    is a very flexible mechanism that allows different classes and libraries to talk
    to each other with little knowledge about how they work or even their public interface.
    A great advantage of such a mechanism is that it reduces the number of classes
    and protocols that you need to maintain, unlike in other languages where there
    is no way to provide a dynamic link between objects.


    ## Dynamically Responding to Messages


    You have seen how it is possible for classes to send generic messages to a target
    object without even knowing the name of the message. That is achievable through
    the use of selectors. Another important aspect of class-based designs is to be
    able to respond, in a flexible way, to messages that are sent to an object.


    In Objective-C, there is the standard option of creating methods and having messages
    routed to them automatically by the language runtime. However, there are cases
    where you might want to change the way in which the methods accepted by an object
    are dispatched. For example, consider a class that needs to relay messages to
    a helper class. One option is to create a new method for each of the methods in
    the helper class that want to replicate, as you will see in the next section.


    ### Creating a Proxy Object


    For example, consider the original class called `MortgageSecurity`, which is responsible
    for mortgage-related calculations. Its interface can be defined as follows:


    `// file MortgageSecurity.h`


    `@interface MortgageSecurity : NSObject`


    `- (void)calculateDebt;`


    `- (void)reapraise;`


    `- (void)calculateTaxes;`


    `@end`


    `// file MortgageSecurity.m`


    `@implementation MortgageSecurity`


    `- (void)calculateDebt`


    `{`


            `// code that calculates remaining debt in the mortgage`


    `}`


    `- (void)reappraise`


    `{`


             `// code used to reapraise the value of a mortgage`


    `}`


    `- (void)calculateTaxes`


    `{`


            `// method that calculated the amount of taxes in a mortgage`


    `}`


    `@end`


    There are three methods used to calculate quantities associated with a mortgage,
    such as the amount of taxes and the total debt, as well as the reappraisal value.
    This is a complex class, so you are not interested in the inner workings of each
    method. What you want to do, however, is provide a simple proxy object for the
    original class. This is necessary, for example, when you want to create a façade
    object so that you can hide the real class in an easier-to-use interface.


    The proxy class would include a reference to the `MortgageSecurity` class and
    the necessary code to redirect messages.


    `// file SecurityProxy.h`


    `@interface SecurityProxy : NSObject`


    `@property(retain) MortgageSecurity *security;`


    `- (void)calculateDebt;`


    `- (void)reappraise;`


    `- (void)calculateTaxes;`


    `@end`


    The interface in this case is very similar to the interface for `MortgageSecurity`.
    You want to provide the major functionality present in the original class, so
    you need to replicate its interface. The class also contains a property that can
    be used to store a pointer to a `MortgageSecurity` object so that it can be later
    used to route the incoming messages.


    The implementation of `SecurityProxy` contains the code necessary to redirect
    message calls.


    `// file SecurityProxy.m`


    `@implementation SecurityProxy`


    `- (void)calculateDebt`


    `{`


            `[_security calculateDebt];`


    `}`


    `- (void)calculateTaxes`


    `{`


            `[_security calculateTaxes];`


    `}`


    `- (void)reappraise`


    `{`


            `[_security reappraise];`


    `}`


    `@end`


    As you can see, each method in `SecurityProxy` acts just as a front end for the
    corresponding method in the `MortgageSecurity` class. They use the `security`
    property as the target for messages and make a call to exactly the same method.
    If any parameters had been passed, you would need to supply them to the target
    object as well.


    A client of `SecurityProxy` would be unaware of the difference between that class
    and `MortgageSecurity`, since they both offer the same interface. However, the
    dependency between these two classes is big. If any detail about the interface
    of `MortgageSecurity` changes, then a corresponding change needs to be made in
    `SecurityProxy` as well. Without such a manual change, the illusion of the proxy
    class will be lost and the classes will start to have different interfaces.'
  trans: "\n# Cocoa 中的 Target-Action\n\n选择器的一个常见用途是定义为特定消息设置目标，该消息通常是在响应事件时生成的。因此，在选择器策略在\
    \ UI 代码中有着巨大的应用潜力。这种设计模式被称为 target-action，并且常常在 Cocoa 框架中用于处理需要由应用程序类处理的事件。\n\n\
    Cocoa UI 库使用了 target-action 设计模式，以实现事件目标与生成事件的 UI 控件之间更高层次的抽象和独立性。与我们上一节讨论的应用程序类似，UI\
    \ 工具包的目标是允许每个类成为多个 GUI 控件的目标。同时，GUI 控件无需了解目标所实现的任何特定协议。\n\n这些需求的结果是一种设计模式，其中 GUI\
    \ 控件对象具有两个属性：一个 target（目标）和一个 action（动作）。target 属性指定当期望的事件发生时，将接收消息的对象。\n\n例如，考虑一个具有单个窗口和一个按钮的应用程序，该按钮可用于触发用户定义的动作。虽然我还没有描述如何在\
    \ Cocoa 中创建此类应用程序（请参阅最后一章以获取完整示例），但下面是仅用于设置和处理事件所需的基本代码：\n\n```\n// 文件 ButtonTest.h\n\
    @interface ButtonTest : NSObject\n- (void) doWhenButtonPressed:(id)button;\n-\
    \ (void) setupButton:(NSButton *)aButton;\n// 此处可添加其他方法\n@end\n```\n\n在 `ButtonTest`\
    \ 类中，你声明了将在此处讨论的两个方法。`doWhenButtonPressed:` 方法是响应外部事件而被调用的，它将在用户按下按钮时执行。另一方面，`setupButton:`\
    \ 方法用于初始化 target-action 机制，以便将按钮按下事件与目标对象关联起来。这些方法可以按如下方式声明：\n\n```\n// 文件 ButtonTest.m\n\
    @implementation ButtonTest\n- (void) doWhenButtonPressed:(id)button\n{\n     \
    \   NSLog(@\"我们收到了一个按钮按下事件\");\n}\n- (void) setupButton:(NSButton *)aButton\n\
    {\n        [aButton setAction:@selector(doWhenButtonPressed:)];\n        [aButton\
    \ setTarget:self];\n}\n// 此处可添加其他方法\n@end\n```\n\n`setupButton:` 方法包含了实现的重要部分。该方法的参数是一个\
    \ `NSButton` 对象，这是在 Cocoa 中用于表示用户界面按钮的类。你可以假设这个方法是在其他地方被调用的，可能是在同一个类中，并且以一个 `NSButton`\
    \ 对象作为参数。第一步是设置 action，即按钮按下事件触发时将调用的方法。为了以通用的方式做到这一点，你为 `doWhenButtonPressed:`\
    \ 方法传递一个选择器。\n\n实现中的第二步是设置在上一行中定义的 action 的 target。在这种情况下，你希望 target 是同一个对象，因为你使用的选择器对应的是在\
    \ `ButtonTest` 类中实现的方法。因此，按钮对象将使用 `self` 作为在 `setAction:` 方法中提供的消息选择器的目标。\n\n\
    尽管我的示例适用于 `NSButton`，但此处使用的技术是完全通用的。任何 UI 控件都可以使用 target-action 模式来设置事件源和事件消费者之间的事件处理机制。这是一种非常灵活的机制，它允许不同的类库彼此通信，而无需了解它们的工作方式甚至公共接口。这种机制的一大优点是它减少了你需要维护的类和协议的数量，这与那些无法在对象之间提供动态链接的其他语言不同。\n\
    \n## 动态响应消息\n\n你已经了解了类如何将通用消息发送到目标对象，甚至无需知道消息的名称。这是通过使用选择器实现的。基于类的设计的另一个重要方面是能够以灵活的方式响应发送给对象的消息。\n\
    \n在 Objective-C 中，有一个标准选项可以创建方法，并通过语言运行时自动将消息路由到这些方法。然而，在某些情况下，你可能希望更改对象所接受的方法的分发方式。例如，考虑一个需要将消息中继到辅助类的类。一种选择是为你想要复制的辅助类中的每个方法创建一个新方法，正如你将在下一节中看到的那样。\n\
    \n### 创建代理对象\n\n例如，考虑一个名为 `MortgageSecurity` 的原始类，它负责与抵押贷款相关的计算。它的接口可以定义如下：\n\n\
    ```\n// 文件 MortgageSecurity.h\n@interface MortgageSecurity : NSObject\n- (void)calculateDebt;\n\
    - (void)reapraise;\n- (void)calculateTaxes;\n@end\n```\n\n```\n// 文件 MortgageSecurity.m\n\
    @implementation MortgageSecurity\n- (void)calculateDebt\n{\n        // 计算抵押贷款中剩余债务的代码\n\
    }\n- (void)reappraise\n{\n         // 用于重新评估抵押贷款价值的代码\n}\n- (void)calculateTaxes\n\
    {\n        // 计算抵押贷款税额的方法\n}\n@end\n```\n\n有三个方法用于计算与抵押贷款相关的数量，例如税额和总债务，以及重估价值。这是一个复杂的类，因此你对每个方法的内部工作原理不感兴趣。然而，你想要做的是为原始类提供一个简单的代理对象。这在例如你想要创建一个门面对象以便通过更易用的接口隐藏真实类时是必需的。\n\
    \n代理类将包含对 `MortgageSecurity` 类的引用以及重定向消息的必要代码。\n\n```\n// 文件 SecurityProxy.h\n\
    @interface SecurityProxy : NSObject\n@property(retain) MortgageSecurity *security;\n\
    - (void)calculateDebt;\n- (void)reappraise;\n- (void)calculateTaxes;\n@end\n```\n\
    \n这里的接口与 `MortgageSecurity` 的接口非常相似。你想要提供原始类中存在的核心功能，因此你需要复制其接口。该类还包含一个属性，可用于存储指向\
    \ `MortgageSecurity` 对象的指针，以便后续用于路由传入的消息。\n\n`SecurityProxy` 的实现包含了重定向消息调用所需的代码。\n\
    \n```\n// 文件 SecurityProxy.m\n@implementation SecurityProxy\n- (void)calculateDebt\n\
    {\n        [_security calculateDebt];\n}\n- (void)calculateTaxes\n{\n        [_security\
    \ calculateTaxes];\n}\n- (void)reappraise\n{\n        [_security reappraise];\n\
    }\n@end\n```\n\n正如你所见，`SecurityProxy` 中的每个方法都只是作为 `MortgageSecurity` 类中对应方法的前端。它们使用\
    \ `security` 属性作为消息的目标，并调用完全相同的方法。如果传入了任何参数，你还需要将这些参数提供给目标对象。\n\n`SecurityProxy`\
    \ 的客户端将无法察觉该类与 `MortgageSecurity` 之间的差异，因为它们提供了相同的接口。然而，这两个类之间的依赖关系很大。如果 `MortgageSecurity`\
    \ 接口的任何细节发生变化，那么也需要在 `SecurityProxy` 中做出相应的更改。没有这样手动修改，代理类的假象就会被打破，这两个类将开始拥有不同的接口。\n"
- fmt: "### Using forwardInvocation\n\nAs you can see, maintaining a proxy class using\
    \ this programming style is very time-consuming. A better solution based on the\
    \ dynamic features of Objective-C is available, however. What you need is a way\
    \ of receiving a generic message and routing it to a target object without having\
    \ to duplicate the message name in your interface.\n\nSuch a feature is provided\
    \ by the forward invocation mechanism. Forward invocation is the process whereby\
    \ the runtime calls a special method, `forwardInvocation:`, to decide how messages\
    \ not present in a class interface should be handled. This dynamic feature is\
    \ available to any Objective-C class implementing the `forwardInvocation:` method,\
    \ which is used automatically by the runtime system whenever a method is not found\
    \ in the target class.\n\nTherefore, a simpler way to rewrite the class above\
    \ is to use the forward invocation mechanism to receive and process messages directed\
    \ to the `MortgageSecurity` class. This results in the following interface:\n\n\
    ```\n@interface SecurityProxy : NSObject\n\n- (void)forwardInvocation:(NSInvocation\
    \ *)anInvocation;\n\n@property (retain) MortgageSecurity *security;\n\n@end\n\
    ```\n\nThe new interface for `SecurityProxy` still contains a property that stores\
    \ the `MortgageSecurity` object. However, the list of methods that are also supported\
    \ by `MortgageSecurity` is gone, replaced by the single method `forwardInvocation:`.\
    \ The implementation of the new proxy class, therefore, depends only on the inner\
    \ workings of `forwardInvocation`.\n\n```\n@implementation SecurityProxy\n\n-\
    \ (void)forwardInvocation:(NSInvocation *)anInvocation\n{\n        SEL selector\
    \ = anInvocation.selector;\n        if ([_security respondsToSelector:selector])\n\
    \        {\n                [anInvocation invokeWithTarget:_security];\n     \
    \   }\n        else\n        {\n                [super forwardInvocation:anInvocation];\n\
    \        }\n}\n\n@end\n```\n\nThe implementation of `forwardInvocation:` needs\
    \ to follow a similar pattern across all Objective-C classes because of how it\
    \ interacts with the message dispatching system. The first task is to decide if\
    \ you want to handle the message. To do so, you can retrieve the message selector\
    \ from the `NSInvocation` object.\n\nIn this case, the test you want to perform\
    \ is against the interface of the `MortgageSecurity` class. Therefore, you send\
    \ the `respondsToSelector:` message to the security property to determine if this\
    \ message should be handled or not. If the message is present on the security\
    \ object, then you use the `invokeWithTarget:` to perform the method invocation.\n\
    \nNote: The `forwardInvocation:` method uses `invokeWithTarget:` on the `NSInvocation`\
    \ object, instead of `performSelector:`, even though you also have a selector.\
    \ The reason for this difference is that `performSelector:` is not able to handle\
    \ an arbitrary number of parameters. The `NSInvocation` object, on the other hand,\
    \ contains a parameter list provided by the runtime system, and has the internal\
    \ logic necessary to send the message along with the parameters. Moreover, with\
    \ `forwardInvocation:` the Objective-C runtime is responsible for storing any\
    \ return value on the `NSInvocation` object, and passing them back to the point\
    \ of the message call as a return value, which is something you cannot do using\
    \ `performSelector:`.\n\nIf the message received by `forwardInvocation:` cannot\
    \ be handled by the security object, then you call `forwardInvocation:` on the\
    \ parent class. This is done so that you don’t change any of the default behavior\
    \ of forwardInvocation, including the standard implementation on `NSObject`.\n\
    \n## Simulating Multiple Inheritance\n\nThe `forwardInvocation:` method may be\
    \ used in many cases in which the functionality of a method is provided by another\
    \ class. When that happens, the class using `forwardInvocation:` is responsible\
    \ for relaying the message to the target object, which will ultimately respond\
    \ to the message. As you can see, `forwardInvocation:` has many similarities with\
    \ the standard method dispatching mechanism of Objective-C. As such, you can think\
    \ of this method as a way of implementing your own customized inheritance mechanism.\
    \ Using such features you can, for example, design objects that are able to respond\
    \ to messages from two or even more classes.\n\nFor example, consider the class\
    \ `SecurityProxy` discussed in the previous section. That class is able to respond\
    \ to any message in the `MortgageSecurity` interface. From a client’s point of\
    \ view, `SecurityProxy` acts as a type of MortgageSecurity object.\n\nHowever,\
    \ you may want to extend this example a little further. Suppose that you also\
    \ want to respond to requests for a second interface, `FixedIncomeSecurity`, defined\
    \ as follows:\n\n```\n// file FixedIncomeSecurity.h\n\n@interface FixedIncomeSecurity\
    \ : NSObject\n\n- (void)calculateAmortization;\n- (void)calculateEquivalentBond;\n\
    \n@end\n```\n\nThis interface provides two additional methods of calculation that\
    \ you would like to support on the `SecurityProxy` class. Unfortunately, Objective-C\
    \ doesn’t provide multiple inheritance (as discussed in a previous chapter), which\
    \ means that you cannot use the standard message dispatching mechanism to achieve\
    \ this.\n\nThe solution, in this case, comes in the form of a modified use of\
    \ the `forwardInvocation:` method. You will extend the test for valid selectors\
    \ in the implementation of `forwardInvocation:`, and therefore allow for messages\
    \ that are members of either of the two classes that you want to support. The\
    \ following code displays the contents of the modified interface for `SecurityProxy`:\n\
    \n```\n// file SecurityProxy.h\n\n@interface SecurityProxy : NSObject\n\n- (void)forwardInvocation:(NSInvocation\
    \ *)anInvocation;\n\n@property (retain) MortgageSecurity *mortgageSec;\n@property\
    \ (retain) FixedIncomeSecurity *fixIncomeSec;\n\n@end\n```\n\nHere you add a new\
    \ property, named `fixIncomeSec`, which will hold a pointer to the `FixedIncomeSecurity`\
    \ object so that the desired behavior will be available to the class when needed.\
    \ You also have a new implementation section for the modified class, as follows:\n\
    \n```\n// file SecurityProxy.m\n\n@implementation SecurityProxy\n\n- (void)forwardInvocation:(NSInvocation\
    \ *)anInvocation\n{\n        SEL selector = anInvocation.selector;\n        if\
    \ ([_mortgageSec respondsToSelector:selector])\n        {\n                [anInvocation\
    \ invokeWithTarget:_mortgageSec];\n        }\n        else if ([_fixIncomeSec\
    \ respondsToSelector:selector])\n        {\n                [anInvocation invokeWithTarget:_fixIncomeSec];\n\
    \        }\n        else\n        {\n                [super forwardInvocation:anInvocation];\n\
    \        }\n}\n\n@end\n```\n\nThe code on `forwardInvocation:` has changed to\
    \ provide support for the methods in `FixedIncomeSecurity`. This is done in a\
    \ way similar to what was previously achieved for `MortgageSecurity` methods.\
    \ The `fixIncomeSec` property is tested using the `respondsToSelector:` message.\
    \ Finally, unrecognized messages are submitted to the default `forwardInvocation:`\
    \ method in `NSObject`."
  raw: '### Using forwardInvocation


    As you can see, maintaining a proxy class using this programming style is very
    time-consuming. A better solution based on the dynamic features of Objective-C
    is available, however. What you need is a way of receiving a generic message and
    routing it to a target object without having to duplicate the message name in
    your interface.


    Such a feature is provided by the forward invocation mechanism. Forward invocation
    is the process whereby the runtime calls a special method, `forwardInvocation:`,
    to decide how messages not present in a class interface should be handled. This
    dynamic feature is available to any Objective-C class implementing the `forwardInvocation:`
    method, which is used automatically by the runtime system whenever a method is
    not found in the target class.


    Therefore, a simpler way to rewrite the class above is to use the forward invocation
    mechanism to receive and process messages directed to the `MortgageSecurity` class.
    This results in the following interface:


    `@interface SecurityProxy : NSObject`


    `- (void)forwardInvocation:(NSInvocation *)anInvocation;`


    `@property (retain) MortgageSecurity *security;`


    `@end`


    The new interface for `SecurityProxy` still contains a property that stores the
    `MortgageSecurity` object. However, the list of methods that are also supported
    by `MortgageSecurity` is gone, replaced by the single method `forwardInvocation:`.
    The implementation of the new proxy class, therefore, depends only on the inner
    workings of `forwardInvocation`.


    `@implementation SecurityProxy`


    `- (void)forwardInvocation:(NSInvocation *)anInvocation`


    `{`


            `SEL selector = anInvocation.selector;`


            `if ([_security respondsToSelector:selector])`


            `{`


                    `[anInvocation invokeWithTarget:_security];`


            `}`


            `else`


            `{`


                    `[super forwardInvocation:anInvocation];`


            `}`


    `}`


    `@end`


    The implementation of `forwardInvocation:` needs to follow a similar pattern across
    all Objective-C classes because of how it interacts with the message dispatching
    system. The first task is to decide if you want to handle the message. To do so,
    you can retrieve the message selector from the `NSInvocation` object.


    In this case, the test you want to perform is against the interface of the `MortgageSecurity`
    class. Therefore, you send the `respondsToSelector:` message to the security property
    to determine if this message should be handled or not. If the message is present
    on the security object, then you use the `invokeWithTarget:` to perform the method
    invocation.


    Note


    The `forwardInvocation:` method uses `invokeWithTarget:` on the `NSInvocation`
    object, instead of `performSelector:`, even though you also have a selector. The
    reason for this difference is that `performSelector:` is not able to handle an
    arbitrary number of parameters. The `NSInvocation` object, on the other hand,
    contains a parameter list provided by the runtime system, and has the internal
    logic necessary to send the message along with the parameters. Moreover, with
    `forwardInvocation:` the Objective-C runtime is responsible for storing any return
    value on the `NSInvocation` object, and passing them back to the point of the
    message call as a return value, which is something you cannot do using `performSelector:`.


    If the message received by `forwardInvocation:` cannot be handled by the security
    object, then you call `forwardInvocation:` on the parent class. This is done so
    that you don’t change any of the default behavior of forwardInvocation, including
    the standard implementation on `NSObject`.


    ## Simulating Multiple Inheritance


    The `forwardInvocation:` method may be used in many cases in which the functionality
    of a method is provided by another class. When that happens, the class using `forwardInvocation:`
    is responsible for relaying the message to the target object, which will ultimately
    respond to the message. As you can see, `forwardInvocation:` has many similarities
    with the standard method dispatching mechanism of Objective-C. As such, you can
    think of this method as a way of implementing your own customized inheritance
    mechanism. Using such features you can, for example, design objects that are able
    to respond to messages from two or even more classes.


    For example, consider the class `SecurityProxy` discussed in the previous section.
    That class is able to respond to any message in the `MortgageSecurity` interface.
    From a client’s point of view, `SecurityProxy` acts as a type of MortgageSecurity
    object.


    However, you may want to extend this example a little further. Suppose that you
    also want to respond to requests for a second interface, `FixedIncomeSecurity`,
    defined as follows:


    `// file FixedIncomeSecurity.h`


    `@interface FixedIncomeSecurity : NSObject`


    `- (void)calculateAmortization;`


    `- (void)calculateEquivalentBond;`


    `@end`


    This interface provides two additional methods of calculation that you would like
    to support on the `SecurityProxy` class. Unfortunately, Objective-C doesn’t provide
    multiple inheritance (as discussed in a previous chapter), which means that you
    cannot use the standard message dispatching mechanism to achieve this.


    The solution, in this case, comes in the form of a modified use of the `forwardInvocation:`
    method. You will extend the test for valid selectors in the implementation of
    `forwardInvocation:`, and therefore allow for messages that are members of either
    of the two classes that you want to support. The following code displays the contents
    of the modified interface for `SecurityProxy`:


    `// file SecurityProxy.h`


    `@interface SecurityProxy : NSObject`


    `- (void)forwardInvocation:(NSInvocation *)anInvocation;`


    `@property (retain) MortgageSecurity *mortgageSec;`


    `@property (retain) FixedIncomeSecurity *fixIncomeSec;`


    `@end`


    Here you add a new property, named `fixIncomeSec`, which will hold a pointer to
    the FixedIncomeSecurity object so that the desired behavior will be available
    to the class when needed. You also have a new implementation section for the modified
    class, as follows:


    `// file SecurityProxy.m`


    `@implementation SecurityProxy`


    `- (void)forwardInvocation:(NSInvocation *)anInvocation`


    `{`


            `SEL selector = anInvocation.selector;`


            `if ([_mortgageSec respondsToSelector:selector])`


            `{`


                    `[anInvocation invokeWithTarget:_mortgageSec];`


            `}`


            `else if ([_fixIncomeSec respondsToSelector:selector])`


            `{`


                    `[anInvocation invokeWithTarget:_fixIncomeSec];`


            `}`


            `else`


            `{`


                    `[super forwardInvocation:anInvocation];`


            `}`


    `}`


    `@end`


    The code on `forwardInvocation:` has changed to provide support for the methods
    in `FixedIncomeSecurity`. This is done in a way similar to what was previously
    achieved for `MortgageSecurity` methods. The `fixIncomeSec` property is tested
    using the `respondsToSelector:` message. Finally, unrecognized messages are submitted
    to the default `forwardInvocation:` method in `NSObject`.'
  trans: "\n### 使用 forwardInvocation\n\n如您所见，使用这种编程风格维护代理类非常耗时。不过，有一种基于 Objective-C\
    \ 动态特性的更好解决方案。您需要一种方式来接收通用消息并将其路由到目标对象，而无需在接口中重复消息名称。\n\n这种功能由**转发调用机制**提供。转发调用是运行时调用一个特殊方法\
    \ `forwardInvocation:` 的过程，用于决定如何处理类接口中未包含的消息。任何实现了 `forwardInvocation:` 方法的 Objective-C\
    \ 类都能使用这种动态特性，当目标类中找不到某个方法时，运行时系统会自动调用该方法。\n\n因此，重写上述类的一种更简单方法是使用转发调用机制来接收和处理发送给\
    \ `MortgageSecurity` 类的消息。这将产生以下接口：\n\n```\n@interface SecurityProxy : NSObject\n\
    \n- (void)forwardInvocation:(NSInvocation *)anInvocation;\n\n@property (retain)\
    \ MortgageSecurity *security;\n\n@end\n```\n\n`SecurityProxy` 的新接口仍然包含一个存储 `MortgageSecurity`\
    \ 对象的属性。然而，`MortgageSecurity` 同样支持的方法列表消失了，取而代之的是单一方法 `forwardInvocation:`。因此，新代理类的实现只依赖于\
    \ `forwardInvocation:` 的内部工作原理。\n\n```\n@implementation SecurityProxy\n\n- (void)forwardInvocation:(NSInvocation\
    \ *)anInvocation\n{\n        SEL selector = anInvocation.selector;\n        if\
    \ ([_security respondsToSelector:selector])\n        {\n                [anInvocation\
    \ invokeWithTarget:_security];\n        }\n        else\n        {\n         \
    \       [super forwardInvocation:anInvocation];\n        }\n}\n\n@end\n```\n\n\
    `forwardInvocation:` 的实现需要在所有 Objective-C 类中遵循类似的模式，这是因为它与消息分发系统的交互方式决定的。第一个任务是决定是否要处理该消息。为此，您可以从\
    \ `NSInvocation` 对象中检索消息的选择器。\n\n在本例中，您要进行的测试是针对 `MortgageSecurity` 类的接口。因此，您向\
    \ security 属性发送 `respondsToSelector:` 消息，以确定该消息是否应被处理。如果该消息存在于 security 对象上，则使用\
    \ `invokeWithTarget:` 来执行方法调用。\n\n注意：`forwardInvocation:` 方法对 `NSInvocation` 对象使用的是\
    \ `invokeWithTarget:` 而不是 `performSelector:`，即使您也有一个选择器。这种差异的原因在于 `performSelector:`\
    \ 无法处理任意数量的参数。另一方面，`NSInvocation` 对象包含由运行时系统提供的参数列表，并且拥有发送消息及其参数所需的内部逻辑。此外，通过\
    \ `forwardInvocation:`，Objective-C 运行时负责将所有返回值存储在 `NSInvocation` 对象上，并将它们作为返回值传回消息调用的地方，这是使用\
    \ `performSelector:` 无法做到的。\n\n如果 `forwardInvocation:` 收到的消息无法由 security 对象处理，那么您需要调用父类的\
    \ `forwardInvocation:`。这样做是为了不改变 `forwardInvocation` 的任何默认行为，包括 `NSObject` 上的标准实现。\n\
    \n## 模拟多重继承\n\n`forwardInvocation:` 方法可用于许多情况，即某个方法的功能由另一个类提供。当这种情况发生时，使用 `forwardInvocation:`\
    \ 的类负责将消息中继到目标对象，该对象最终将响应此消息。如您所见，`forwardInvocation:` 与 Objective-C 的标准方法分发机制有许多相似之处。因此，您可以将此方法视为实现自定义继承机制的一种方式。使用此类特性，您可以设计出能够响应来自两个甚至更多类消息的对象。\n\
    \n例如，考虑上一节讨论的 `SecurityProxy` 类。该类能够响应 `MortgageSecurity` 接口中的任何消息。从客户端的角度来看，`SecurityProxy`\
    \ 充当了一种 `MortgageSecurity` 对象的角色。\n\n然而，您可能希望进一步扩展此示例。假设您还想响应第二个接口 `FixedIncomeSecurity`\
    \ 的请求，其定义如下：\n\n```\n// 文件 FixedIncomeSecurity.h\n\n@interface FixedIncomeSecurity\
    \ : NSObject\n\n- (void)calculateAmortization;\n- (void)calculateEquivalentBond;\n\
    \n@end\n```\n\n此接口提供了两种您希望在 `SecurityProxy` 类上支持的额外计算方法。不幸的是，Objective-C 不提供多重继承（如前一章所述），这意味着您无法使用标准消息分发机制来实现这一点。\n\
    \n在这种情况下，解决方案以修改使用 `forwardInvocation:` 方法的形式出现。您将扩展 `forwardInvocation:` 实现中有效选择器的测试范围，从而允许处理属于您想要支持的两个类中任一个的成员消息。以下代码展示了\
    \ `SecurityProxy` 修改后接口的内容：\n\n```\n// 文件 SecurityProxy.h\n\n@interface SecurityProxy\
    \ : NSObject\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation;\n\n@property\
    \ (retain) MortgageSecurity *mortgageSec;\n@property (retain) FixedIncomeSecurity\
    \ *fixIncomeSec;\n\n@end\n```\n\n在这里，您添加了一个名为 `fixIncomeSec` 的新属性，它将保存一个指向 `FixedIncomeSecurity`\
    \ 对象的指针，以便在需要时该类能够获得所需的行为。此外，修改后的类还有一个新的实现部分，如下所示：\n\n```\n// 文件 SecurityProxy.m\n\
    \n@implementation SecurityProxy\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation\n\
    {\n        SEL selector = anInvocation.selector;\n        if ([_mortgageSec respondsToSelector:selector])\n\
    \        {\n                [anInvocation invokeWithTarget:_mortgageSec];\n  \
    \      }\n        else if ([_fixIncomeSec respondsToSelector:selector])\n    \
    \    {\n                [anInvocation invokeWithTarget:_fixIncomeSec];\n     \
    \   }\n        else\n        {\n                [super forwardInvocation:anInvocation];\n\
    \        }\n}\n\n@end\n```\n\n`forwardInvocation:` 中的代码已更改，以提供对 `FixedIncomeSecurity`\
    \ 中方法的支持。这是以类似于之前为 `MortgageSecurity` 方法实现的方式完成的。`fixIncomeSec` 属性使用 `respondsToSelector:`\
    \ 消息进行测试。最后，无法识别的消息被提交给 `NSObject` 中的默认 `forwardInvocation:` 方法。\n"
- fmt: "###  Implementing `respondsToSelector:`\n\nNotice that, although the implementation\
    \ above provides many of the benefits of multiple inheritance, you should still\
    \ be careful not to forget the important differences. For example, there is no\
    \ parent-child relationship between `SecurityProxy` and any of the two security\
    \ classes you have seen in this section. Thus, the compiler will not be able to\
    \ make the standard type checks that are allowed when you are using classes derived\
    \ from a single super class.\n\nOn the other hand, Objective-C’s runtime can be\
    \ used to tweak even more the relationship between classes by using dynamic messages.\
    \ One of these messages has been encountered before: `respondsToSelector:`, which\
    \ is used to determine if an object can respond to a particular message.\n\nYou\
    \ have been using `respondsToSelector:` to determine if an object can answer to\
    \ a particular method call using their corresponding selector. However, if another\
    \ object makes the same method call using `SecurityProxy` as a target, it will\
    \ receive a negative response. The result is `NO` because none of these methods\
    \ are a real part of the list of messages supported by `SecurityProxy`.\n\nIf\
    \ you wish to add this additional level of support for `SecurityProxy`, you may\
    \ decide to change the implementation of `respondsToSelector:` in order to fix\
    \ this problem. A possible implementation would work according to the following\
    \ lines:\n\n```objc\n// file SecurityProxy.h\n\n@interface SecurityProxy : NSObject\n\
    \n- (void)forwardInvocation:(NSInvocation *)anInvocation;\n- (BOOL)respondsToSelector:(SEL)\
    \ sel;\n\n@property (retain) MortgageSecurity *mortgageSec;\n@property (retain)\
    \ FixedIncomeSecurity *fixIncomeSec;\n\n@end\n```\n\nThe interface has changed\
    \ to accommodate the new method, `respondsToSelector:`, which will be used to\
    \ determine if a message can be processed by the `SecurityProxy` class. This method\
    \ will override the existing, standard implementation, which returns `true` only\
    \ for methods that have been defined as part of the class interface.\n\n```objc\n\
    // file SecurityProxy.m\n\n@implementation SecurityProxy\n\n- (BOOL)respondsToSelector:(SEL)\
    \ sel\n{\n    if ([super respondsToSelector:sel])\n    {\n        return YES;\n\
    \    }\n    if ([_fixIncomeSec respondsToSelector:sel]\n        || [_mortgageSec\
    \ respondsToSelector:sel])\n    {\n        return YES;\n    }\n    return NO;\n\
    }\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation\n{\n    SEL selector\
    \ = anInvocation.selector;\n    if ([_mortgageSec respondsToSelector:selector])\n\
    \    {\n        [anInvocation invokeWithTarget:_mortgageSec];\n    }\n    else\
    \ if ([_fixIncomeSec respondsToSelector:selector])\n    {\n        [anInvocation\
    \ invokeWithTarget:_fixIncomeSec];\n    }\n    else\n    {\n        [super forwardInvocation:anInvocation];\n\
    \    }\n}\n\n@end\n```\n\nThe new implementation of `respondsToSelector:` is now\
    \ able to check not only for compile-time defined methods (using the standard\
    \ implementation supplied by `NSObject`), but also check with the two other objects\
    \ `mortgageSec` and `fixIncomeSec` to determine if the method is valid for the\
    \ `SecurityProxy` class. Here is an example of how this feature can be used by\
    \ client code:\n\n```objc\n- (void) testSecurityMethods\n{\n    SecurityProxy\
    \ *sp = [[[SecurityProxy alloc] init] autorelease];\n    sp.mortgageSec = [[[MortgageSecurity\
    \ alloc] init] autorelease];\n    sp.fixIncomeSec = [[[FixedIncomeSecurity alloc]\
    \ init] autorelease];\n\n    // this method is defined at compilation time\n \
    \   BOOL res = [sp respondsToSelector:@selector(forwardInvocation:)];\n    NSLog(@\"\
    the response is %d\", res); // response is 1\n\n    // this method is defined\
    \ dynamically\n    res = [sp respondsToSelector:@selector(calculateEquivalentBond)];\n\
    \    NSLog(@\"the response is %d\", res); // response is 1\n}\n```\n\nThis code\
    \ puts together the classes described earlier and shows how they can be used to\
    \ answer simple questions about their capabilities. The method `testSecurityMethods`\
    \ starts by creating an instance of the `SecurityProxy` class. For this object\
    \ to work, it needs two others: an instance of `MortgageSecurity` and an instance\
    \ of `FixedIncomeSecurity`. They are both assigned to the corresponding properties\
    \ `mortgageSec` and `fixIncomeSec`, respectively, which are part of `SecurityProxy`.\
    \ Finally, you send the `respondsToSelector:` message to the `SecurityProxy` instance,\
    \ the first time querying about `forwardInvocation:`, which is a method that is\
    \ really defined in the public interface. The second request, however, checks\
    \ for the `calculateEquivalentBond` method, which is part of the `FixedIncomeSecurity`\
    \ class. Both requests return `YES`, as you expected when designing the new `respondsToSelector:`\
    \ method."
  raw: '### Implementing respondsToSelector:


    Notice that, although the implementation above provides many of the benefits of
    multiple inheritance, you should still be careful not to forget the important
    differences. For example, there is no parent-child relationship between `SecurityProxy`
    and any of the two security classes you have seen in this section. Thus, the compiler
    will not be able to make the standard type checks that are allowed when you are
    using classes derived from a single super class.


    On the other hand, Objective-C’s runtime can be used to tweak even more the relationship
    between classes by using dynamic messages. One of these messages has been encountered
    before: `respondsToSelector:`, which is used to determine if an object can respond
    to a particular message.


    You have been using `respondsToSelector:` to determine if an object can answer
    to a particular method call using their corresponding selector. However, if another
    object makes the same method call using `SecurityProxy` as a target, it will receive
    a negative response. The result is `NO` because none of these methods are a real
    part of the list of messages supported by `SecurityProxy`.


