- fmt: '### NSMutableData


    `NSMutableData`是`NSData`的子类，可用于原地修改数据。因此，`NSMutableData`可在任何需要`NSData`的场景中使用。以下是可用的方法：


    - `- (void *)mutableBytes`；返回指向目标对象中存储的数据的指针。只要您只使用之前分配的大小，就可以使用该指针修改数据。

    - `- (void)setLength:(NSUInteger)length`；确定内部存储数据的内存缓冲区的长度。

    - `- (void)appendBytes:(const void *)bytes length:(NSUInteger)length`；将第一个参数传入的数据追加到内部缓冲区。数据大小由`length`参数给出。

    - `- (void)appendData:(NSData *)other`；将参数传入的`NSData`对象中存储的数据追加到内部缓冲区。

    - `- (void)increaseLengthBy:(NSUInteger)extraLength`；更改内部数据表示，使其大小增加`extraLength`指定的数量。

    - `- (void)replaceBytesInRange:(NSRange)range withBytes:(const void *)bytes`；更改内部存储的数据，将`range`参数确定的字节替换为第二个参数。

    - `- (void)resetBytesInRange:(NSRange)range`；重置内部数据缓冲区的一部分，由参数`range`确定。给定范围内的数据重置为零值。

    - `- (void)setData:(NSData *)data`；重置内部数据缓冲区，使其包含与参数传入的`NSData`对象相同的数据。

    - `- (void)replaceBytesInRange:(NSRange)range withBytes:(const void *)replacementBytes
    length:(NSUInteger)replacementLength`；将目标对象中内部缓冲区的一部分替换为指针`replacementBytes`指向的字节序列。内部数据的具体部分由`range`参数确定。替换数组的大小由`replacementLength`参数给出。

    - `+ (id)dataWithCapacity:(NSUInteger)aNumItems`；创建并返回一个类型为`NSMutableData`的新对象，容量由`aNumItems`指定。

    - `+ (id)dataWithLength:(NSUInteger)length`；创建并返回一个类型为`NSMutableData`的新对象，长度由`length`参数指定。

    - `- (id)initWithCapacity:(NSUInteger)capacity`；使用给定的容量初始化目标对象。

    - `- (id)initWithLength:(NSUInteger)length`；使用`length`参数初始化目标对象。


    ## Collection Classes


    集合类负责存储应用程序稍后可以检索的对象。Foundation框架中有几种集合类。这些类根据数据的存储或检索方式进行分类。类也决定了集合是可变的还是不可变的。在下一节中，您将找到Objective-C中最常用于维护集合的类。


    ### NSArray


    `NSArray`是Foundation框架中非常基础的类。它提供了顺序存储集合概念的面向对象实现。元素存储在相邻位置，可以使用基于索引的方法进行检索。以下是`NSArray`提供的实例方法和类方法列表：'
  raw: '### NSMutableData


    `NSMutableData` is a subclass of `NSData` that can be used to modify the data
    in place. As such, `NSMutableData` can be used whenever an `NSData` is needed.
    Here are the available methods:


    *   `- (void *)mutableBytes`; returns a pointer to the data stored in the target
    object. You can use that pointer to modify the data, as long as you use only the
    previously allocated size.

    *   `- (void)setLength:` `(NSUInteger)length`; determines the length of the memory
    buffer used to store data internally.

    *   `- (void)appendBytes:` `(const void *)bytes length:(NSUInteger)length`; appends
    the data passed as the first parameter to the internal buffer. The data is assumed
    to have size given by the `length` parameter.

    *   `- (void)appendData:` `(NSData *)other`; appends the data stored in the `NSData`
    object passed as a parameter.

    *   `- (void)increaseLengthBy:` `(NSUInteger)extraLength`; changes the internal
    data representation so that it will have its size increased by the quantity `extraLength`.

    *   `- (void)replaceBytesInRange:` `(NSRange)range withBytes:(const void *)bytes`;
    changes the data stored internally so that the bytes determined by range parameter
    are substituted by the second argument.

    *   `- (void)resetBytesInRange:` `(NSRange)range`; resets the part of the internal
    data buffer, as determined by the parameter range. The data in the given range
    is reset to a zero value.

    *   `- (void)setData:` `(NSData *)data`; resets the internal data buffer so that
    it will contain the same data as the `NSData` object passed as argument.

    *   `- (void)replaceBytesInRange:` `(NSRange)range withBytes:(const void *)replacementBytes
    length:(NSUInteger)replacementLength`; replaces part of the internal buffer stored
    in the target object with the sequence of bytes pointed by the pointer `replacementBytes`.
    The exact part of the internal data is determined by the range parameter. The
    size of the replacement array is given by the `replacementLength` parameter.

    *   `+ (id)dataWithCapacity:` `(NSUInteger)aNumItems`; creates and returns a new
    object of type `NSMutableData` with capacity given by `aNumItems`.

    *   `+ (id)dataWithLength:` `(NSUInteger)length`; creates and returns a new object
    of type `NSMutableData` with length given by the `length` parameter.

    *   `- (id)initWithCapacity:` `(NSUInteger)capacity`; initialize the target object
    using the given capacity.

    *   `- (id)initWithLength:` `(NSUInteger)length`; initializes the target object
    using the `length` parameter.


    ## Collection Classes


    The collection classes are responsible for storing objects that can be later retrieved
    by the application. There are several classes of collections in the Foundation
    Framework. These classes are classified according to how the data is stored or
    retrieved. The classes also determine if the collection is mutable or immutable.
    In the next section you will find the classes most commonly used to maintain collections
    in Objective-C.


    ### NSArray


    `NSArray` is a very basic class in the Foundation framework. It provides an OO
    implementation of the concept of a sequential storage collection. Elements are
    stored in adjacent locations, and can be retrieved using an index-based approach.
    Here is a list of the instance and class methods provided by `NSArray`:'
