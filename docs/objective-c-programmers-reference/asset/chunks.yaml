- fmt: "### Using `nib` Files\n\nIn most traditional programming environments, the\
    \ work of creating an interface requires the programmer to write code that defines\
    \ each UI control and its attributes, such as location on the screen, how it responds\
    \ to a user event, colors, and others. For example, Java and C# applications use\
    \ code to create UI controls and determine what windows will look like during\
    \ runtime. In such programming languages, the result of UI implementation is a\
    \ large amount of code that includes classes and methods to create the UI and\
    \ determine its attributes. That is true even when a graphical tool is used to\
    \ automatically generate code as you edit the interface.\n\n![A978-1-4302-5906-0_16_Fig2_HTML.jpg](A978-1-4302-5906-0_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2. The Xcode nib editor\n\nUI applications in Objective-C are created\
    \ using a different process, however. Unlike other environments where the UI is\
    \ created programmatically, Objective-C connects the application to live objects\
    \ that have been prearranged using Xcode, as seen in Figure [16-2](#A978-1-4302-5906-0_16_Chapter.html#Fig2).\
    \ To see this difference, you must understand how Xcode UI designer works and\
    \ how it is used.\n\nAt the heart of Xcode UI design abilities is the functionality\
    \ of Cocoa UI objects. A Cocoa UI has the behavior necessary for runtime manipulation,\
    \ which is performed by the Xcode editor. Additionally, UI objects can be saved\
    \ directly to a file and restored to the same state they were in during design\
    \ time. This file, called a nib file (the meaning is NexTSTEP Interface Builder),\
    \ is a saved representation of a set of objects. The nib file is commonly saved\
    \ with a `xib` extension, since it uses XML for data encoding. Your application\
    \ can later restore the representation of these objects by just requesting Cocoa\
    \ to read the file into memory.\n\nTherefore, in a sense you are not telling how\
    \ a set of objects should be created, as in other languages. Instead, you are\
    \ manipulating in Xcode the same objects that will be later loaded in the application.\
    \ This means that you can configure the object, and no code will be necessary\
    \ to set it up later, other than the generic Cocoa code that reads it from the\
    \ `xib` file. Additionally, all the complexity of initially creating objects through\
    \ Xcode is hidden from the application. No code needs to be generated or compiled\
    \ for this purpose, even if you added hundreds of objects to the UI, or made thousands\
    \ of changes to these objects. This is very difficult to achieve with traditional\
    \ tools that just generate code.\n\nAnother advantage of `xib` files is that they\
    \ can be loaded on demand. If you have a `xib` file that holds the UI for a part\
    \ of your application that is seldom used, it will not impact the loading time\
    \ for the whole application. Again, this is not possible with traditional code-generation\
    \ technologies, because the code needs to be generated, compiled, and loaded,\
    \ even if it is rarely used in practice.\n\nThese features of UI controls using\
    \ `xib` files show the great flexibility you have when designing graphical applications\
    \ in Xcode. And this is one of the reasons why the Mac OS X allows the creation\
    \ of much more complex interfaces, compared to other operating systems. The next\
    \ sections will provide an overview of the facilities provided by Xcode for the\
    \ design of such applications.\n\n### The Cocoa UI Classes\n\nAt the heart of\
    \ Xcode UI design abilities is the support provided by a set of classes in the\
    \ Cocoa framework. These UI classes define the runtime abilities of graphical\
    \ objects. A Cocoa UI object encapsulates all the behavior necessary for runtime\
    \ manipulation, which is achieved by editing a nib file in Xcode. Additionally,\
    \ UI objects can be easily saved to a `xib` file and restored to the same state\
    \ they were in at the moment of its creation.\n\nWhen manipulating objects in\
    \ Xcode, you are in fact determining how these objects will appear and interact\
    \ at runtime. The runtime behavior is defined not only by static properties such\
    \ as colors and locations, but also by the relationship between objects appearing\
    \ in the window. For this to work, you are allowed not only to change the visible\
    \ properties of the UI objects, but also to wire objects using connections, which\
    \ are defined by a set of outlets and actions.\n\nEach object edited in Xcode\
    \ can have one or more outlets. An outlet is a slot that can be filled with connections\
    \ to other objects. So, for example, an `NSWindow` object has an outlet called\
    \ menu. This outlet is used to send updates to the application menu, or to read\
    \ any menu properties when necessary. You are responsible for defining the connection\
    \ between a menu object and the `NSWindow` menu outlet during UI design with Xcode.\
    \ After you do all the wiring of the objects, that configuration is frozen in\
    \ the `xib` file, which can be later restored when it is time to display the window.\n\
    \nUI Objects in Cocoa also have actions. An action is a method in an object that\
    \ is made available for connection at design time. Xcode will display all actions\
    \ made available by a particular UI object in the property panel, in the “Received\
    \ Action” list. To use these actions, you need to connect the object that generates\
    \ an event to an object that has a target, which will be in the receiver end.\
    \ See Figure [16-3](#A978-1-4302-5906-0_16_Chapter.html#Fig3) for an example.\n\
    \n![A978-1-4302-5906-0_16_Fig3_HTML.jpg](A978-1-4302-5906-0_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3. An `NSButton` control with its associated properties in the right\
    \ panel. Among them, you can see the available outlets, sent actions, referencing\
    \ outlets, and received actions\n\nWhen a Cocoa application starts, one of the\
    \ first things it does is to load one or more nib files. This xml file is then\
    \ used to restore the saved objects, so they can be loaded to memory with the\
    \ exact same properties and connections they had when designed in Xcode. This\
    \ provides the initial states for the objects.\n\nThe connections established\
    \ in Xcode are also visible by the Objective-C code once the application starts.\
    \ Each outlet is translated into an instance variable in the corresponding object,\
    \ so that Objective-C can use those variables to send a message to the desired\
    \ control. These connections, then, close the gap between the design-time properties\
    \ of object and their runtime behavior, which is defined by the code you write\
    \ in Objective-C classes.\n\n### Outlets and Actions in Objective-C\n\nYou have\
    \ seen how outlets and actions are fundamental to establish the connections between\
    \ objects that are created in a `xib` file. However, these connections need to\
    \ be accessible from Objective-C if this interface has to be used at runtime by\
    \ your code. Xcode uses some simple conventions to connect Objective-C code with\
    \ outlets and actions used in the UI.\n\nTo provide an outlet in your Objective-C\
    \ class, you can simply add the `IBOutlet` modifier, like so:\n\n```\n#import\
    \ <Cocoa/Cocoa.h>\n\n@interface AppDelegate : NSObject <NSApplicationDelegate>\n\
    \n{\n        id IBOutlet menuBar;\n}\n\n@property (assign) IBOutlet NSWindow *window;\n\
    \n@end\n```\n\nThis class declares an application delegate, which will respond\
    \ to events sent to the application. The class contains two outlets that can be\
    \ accessed by the Xcode UI designer. These outlets are marked by the `IBOutlet`\
    \ keyword. In fact, `IBOutlet` has no effect during compilation time, but is viewed\
    \ by Xcode when your class is loaded in the editor.\n\nWhen a nib file is loaded\
    \ by Cocoa, it will have information about which objects are assigned to which\
    \ outlets. Thus, after a nib file is loaded, the connections are restored and\
    \ the outlets point to the right object. Thus, if you connect the menu bar object\
    \ to the `menuBar` outlet in Xcode, the connection will be valid when the application\
    \ is loaded in Objective-C."
  raw: '### Using nib Files


    In most traditional programming environments, the work of creating an interface
    requires the programmer to write code that defines each UI control and its attributes,
    such as location on the screen, how it responds to a user event, colors, and others.
    For example, Java and C# applications use code to create UI controls and determine
    what windows will look like during runtime. In such programming languages, the
    result of UI implementation is a large amount of code that includes classes and
    methods to create the UI and determine its attributes. That is true even when
    a graphical tool is used to automatically generate code as you edit the interface.


    ![A978-1-4302-5906-0_16_Fig2_HTML.jpg](A978-1-4302-5906-0_16_Fig2_HTML.jpg)


    Figure 16-2.


    The Xcode nib editor


    UI applications in Objective-C are created using a different process, however.
    Unlike other environments where the UI is created programmatically, Objective-C
    connects the application to live objects that have been prearranged using Xcode,
    as seen in Figure [16-2](#A978-1-4302-5906-0_16_Chapter.html#Fig2). To see this
    difference, you must understand how Xcode UI designer works and how it is used.


    At the heart of Xcode UI design abilities is the functionality of Cocoa UI objects.
    A Cocoa UI has the behavior necessary for runtime manipulation, which is performed
    by the Xcode editor. Additionally, UI objects can be saved directly to a file
    and restored to the same state they were in during design time. This file, called
    a nib file (the meaning is NexTSTEP Interface Builder), is a saved representation
    of a set of objects. The nib file is commonly saved with a xib extension, since
    it uses XML for data encoding. Your application can later restore the representation
    of these objects by just requesting Cocoa to read the file into memory.


    Therefore, in a sense you are not telling how a set of objects should be created,
    as in other languages. Instead, you are manipulating in Xcode the same objects
    that will be later loaded in the application. This means that you can configure
    the object, and no code will be necessary to set it up later, other than the generic
    Cocoa code that reads it from the xib file. Additionally, all the complexity of
    initially creating objects through Xcode is hidden from the application. No code
    needs to be generated or compiled for this purpose, even if you added hundreds
    of objects to the UI, or made thousands of changes to these objects. This is very
    difficult to achieve with traditional tools that just generate code.


    Another advantage of xib files is that they can be loaded on demand. If you have
    a xib file that holds the UI for a part of your application that is seldom used,
    it will not impact the loading time for the whole application. Again, this is
    not possible with traditional code-generation technologies, because the code needs
    to be generated, compiled, and loaded, even if it is rarely used in practice.


    These features of UI controls using xib files show the great flexibility you have
    when designing graphical applications in Xcode. And this is one of the reasons
    why the Mac OS X allows the creation of much more complex interfaces, compared
    to other operating systems. The next sections will provide an overview of the
    facilities provided by Xcode for the design of such applications.


    ### The Cocoa UI Classes


    At the heart of Xcode UI design abilities is the support provided by a set of
    classes in the Cocoa framework. These UI classes define the runtime abilities
    of graphical objects. A Cocoa UI object encapsulates all the behavior necessary
    for runtime manipulation, which is achieved by editing a nib file in Xcode. Additionally,
    UI objects can be easily saved to a xib file and restored to the same state they
    were in at the moment of its creation.


    When manipulating objects in Xcode, you are in fact determining how these objects
    will appear and interact at runtime. The runtime behavior is defined not only
    by static properties such as colors and locations, but also by the relationship
    between objects appearing in the window. For this to work, you are allowed not
    only to change the visible properties of the UI objects, but also to wire objects
    using connections, which are defined by a set of outlets and actions.


    Each object edited in Xcode can have one or more outlets. An outlet is a slot
    that can be filled with connections to other objects. So, for example, an `NSWindow`
    object has an outlet called menu. This outlet is used to send updates to the application
    menu, or to read any menu properties when necessary. You are responsible for defining
    the connection between a menu object and the `NSWindow` menu outlet during UI
    design with Xcode. After you do all the wiring of the objects, that configuration
    is frozen in the xib file, which can be later restored when it is time to display
    the window.


    UI Objects in Cocoa also have actions. An action is a method in an object that
    is made available for connection at design time. Xcode will display all actions
    made available by a particular UI object in the property panel, in the “Received
    Action” list. To use these actions, you need to connect the object that generates
    an event to an object that has a target, which will be in the receiver end. See
    Figure [16-3](#A978-1-4302-5906-0_16_Chapter.html#Fig3) for an example.


    ![A978-1-4302-5906-0_16_Fig3_HTML.jpg](A978-1-4302-5906-0_16_Fig3_HTML.jpg)


    Figure 16-3.


    An NSButton control with its associated properties in the right panel. Among them,
    you can see the available outlets, sent actions, referencing outlets, and received
    actions


    When a Cocoa application starts, one of the first things it does is to load one
    or more nib files. This xml file is then used to restore the saved objects, so
    they can be loaded to memory with the exact same properties and connections they
    had when designed in Xcode. This provides the initial states for the objects.


    The connections established in Xcode are also visible by the Objective-C code
    once the application starts. Each outlet is translated into an instance variable
    in the corresponding object, so that Objective-C can use those variables to send
    a message to the desired control. These connections, then, close the gap between
    the design-time properties of object and their runtime behavior, which is defined
    by the code you write in Objective-C classes.


    ### Outlets and Actions in Objective-C


    You have seen how outlets and actions are fundamental to establish the connections
    between objects that are created in a xib file. However, these connections need
    to be accessible from Objective-C if this interface has to be used at runtime
    by your code. Xcode uses some simple conventions to connect Objective-C code with
    outlets and actions used in the UI.


    To provide an outlet in your Objective-C class, you can simply add the `IBOutlet`
    modifier, like so:


    `#import <Cocoa/Cocoa.h>`


    `@interface AppDelegate : NSObject <NSApplicationDelegate>`


    `{`


            `id IBOutlet menuBar;`


    `}`


    `@property (assign) IBOutlet NSWindow *window;`


    `@end`


    This class declares an application delegate, which will respond to events sent
    to the application. The class contains two outlets that can be accessed by the
    Xcode UI designer. These outlets are marked by the `IBOutlet` keyword. In fact,
    `IBOutlet` has no effect during compilation time, but is viewed by Xcode when
    your class is loaded in the editor.


    When a nib file is loaded by Cocoa, it will have information about which objects
    are assigned to which outlets. Thus, after a nib file is loaded, the connections
    are restored and the outlets point to the right object. Thus, if you connect the
    menu bar object to the `menuBar` outlet in Xcode, the connection will be valid
    when the application is loaded in Objective-C.'
  trans: "\n### 使用 `nib` 文件\n\n在大多数传统编程环境中，创建界面的工作都需要程序员编写代码来定义每个 UI 控件及其属性，例如屏幕上的位置、如何响应用户事件、颜色等。例如，Java\
    \ 和 C# 应用程序使用代码来创建 UI 控件，并决定窗口在运行时的外观。在这类编程语言中，UI 实现的结果是大量的代码，这些代码包含了用于创建 UI 并确定其属性的类和方法。即使你使用图形工具在编辑界面时自动生成代码，情况也是如此。\n\
    \n![A978-1-4302-5906-0_16_Fig2_HTML.jpg](img/A978-1-4302-5906-0_16_Fig2_HTML.jpg)\n\
    \n图 16-2. Xcode nib 编辑器\n\n然而，Objective-C 中的 UI 应用程序采用了不同的创建流程。与其他通过编程方式创建 UI\
    \ 的环境不同，Objective-C 将应用程序与使用 Xcode 预先安排好的活动对象连接起来，如图 16-2 所示。要理解这种差异，你必须了解 Xcode\
    \ UI 设计器的工作原理及其使用方式。\n\nXcode UI 设计能力的核心在于 Cocoa UI 对象的功能。Cocoa UI 拥有运行时操作所需的行为，这些行为由\
    \ Xcode 编辑器执行。此外，UI 对象可以直接保存到文件中，并恢复到设计时的相同状态。这种文件被称为 nib 文件（含义是 NeXTSTEP Interface\
    \ Builder），它是一组对象的已保存表示。nib 文件通常以 `xib` 扩展名保存，因为它使用 XML 进行数据编码。你的应用程序稍后只需请求 Cocoa\
    \ 将文件读入内存，即可恢复这些对象的表示。\n\n因此，从某种意义上说，你并非像在其他语言中那样告诉系统应该如何创建一组对象。相反，你是在 Xcode 中操作那些之后将在应用程序中加载的相同对象。这意味着你可以配置对象，之后除了从\
    \ `xib` 文件中读取对象的通用 Cocoa 代码外，无需任何代码来设置它。此外，通过 Xcode 初始创建对象的所有复杂性都对应用程序隐藏了。即使你向\
    \ UI 添加了数百个对象，或者对这些对象进行了数千次修改，也无需为此生成或编译任何代码。这对于那些仅仅生成代码的传统工具来说是非常难以实现的。\n\n`xib`\
    \ 文件的另一个优势是它们可以按需加载。如果你有一个 `xib` 文件，它包含了应用程序中很少使用部分的 UI，那么它不会影响整个应用程序的加载时间。同样，这对于传统的代码生成技术是不可能的，因为即使这些代码在实际中很少使用，也需要生成、编译和加载。\n\
    \n这些使用 `xib` 文件的 UI 控件特性展示了你在 Xcode 中设计图形应用程序时的巨大灵活性。这也是 Mac OS X 相比其他操作系统，能够创建更复杂界面的原因之一。接下来的章节将概述\
    \ Xcode 为设计此类应用程序所提供的功能。\n\n### Cocoa UI 类\n\nXcode UI 设计能力的核心在于 Cocoa 框架中一组类提供的支持。这些\
    \ UI 类定义了图形对象的运行时能力。一个 Cocoa UI 对象封装了运行时操作所需的所有行为，这是通过在 Xcode 中编辑 nib 文件来实现的。此外，UI\
    \ 对象可以轻松保存到 `xib` 文件中，并恢复到其创建时的相同状态。\n\n当你操纵 Xcode 中的对象时，实际上是在决定这些对象在运行时的显示方式和交互方式。运行时行为不仅由诸如颜色和位置之类的静态属性定义，还由窗口中出现的对象之间的关系定义。为了实现这一点，你不仅可以更改\
    \ UI 对象的可见属性，还可以使用连接（connections）来“连线”对象，这些连接由一组出口（outlets）和动作（actions）定义。\n\n\
    在 Xcode 中编辑的每个对象可以有一个或多个出口。出口是一个插槽，可以填充到其他对象的连接。例如，一个 `NSWindow` 对象有一个名为 `menu`\
    \ 的出口。该出口用于向应用程序菜单发送更新，或在必要时读取任何菜单属性。你在 Xcode 中进行 UI 设计时，需要负责定义菜单对象与 `NSWindow`\
    \ 菜单出口之间的连接。完成所有对象的连线后，该配置将固化在 `xib` 文件中，在需要显示窗口时可以稍后恢复。\n\nCocoa 中的 UI 对象也具有动作。动作是对象中一个可在设计时用于连接的方法。Xcode\
    \ 会显示特定 UI 对象在属性面板的“接收动作”列表中提供的所有动作。要使用这些动作，你需要将生成事件的对象连接到一个具有目标（target）的对象，该目标将位于接收端。示例如图\
    \ 16-3 所示。\n\n![A978-1-4302-5906-0_16_Fig3_HTML.jpg](img/A978-1-4302-5906-0_16_Fig3_HTML.jpg)\n\
    \n图 16-3. 右侧面板中显示了 `NSButton` 控件及其关联属性。其中，你可以看到可用的出口、发送的动作、引用的出口和接收的动作\n\n当 Cocoa\
    \ 应用程序启动时，它首先要做的事情之一就是加载一个或多个 nib 文件。然后，这个 xml 文件被用来恢复已保存的对象，以便它们能够以在 Xcode 中设计时完全相同的属性和连接加载到内存中。这为对象提供了初始状态。\n\
    \n一旦应用程序启动，通过 Objective-C 代码也可以看到在 Xcode 中建立的连接。每个出口都被转换为对应对象中的一个实例变量，以便 Objective-C\
    \ 可以使用这些变量向所需的控件发送消息。然后，这些连接弥合了对象的运行时行为（由你在 Objective-C 类中编写的代码定义）与其设计时属性之间的差距。\n\
    \n### Objective-C 中的出口和动作\n\n你已经了解了出口和动作对于建立 `xib` 文件中创建的对象之间连接的重要性。然而，如果这个界面必须在运行时被你的代码使用，那么这些连接需要能够从\
    \ Objective-C 访问。Xcode 使用一些简单的约定来将 Objective-C 代码与 UI 中使用的出口和动作连接起来。\n\n要在你的 Objective-C\
    \ 类中提供一个出口，你可以简单地添加 `IBOutlet` 修饰符，如下所示：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface\
    \ AppDelegate : NSObject <NSApplicationDelegate>\n\n{\n        id IBOutlet menuBar;\n\
    }\n\n@property (assign) IBOutlet NSWindow *window;\n\n@end\n```\n\n这个类声明了一个应用程序委托，它将响应发送到应用程序的事件。该类包含两个可以被\
    \ Xcode UI 设计器访问的出口。这些出口由 `IBOutlet` 关键字标记。实际上，`IBOutlet` 在编译时没有效果，但在你的类被加载到编辑器中时，Xcode\
    \ 会识别它。\n\n当 Cocoa 加载一个 nib 文件时，它会包含关于哪些对象被分配给了哪些出口的信息。因此，在 nib 文件加载后，连接被恢复，出口指向正确的对象。因此，如果你在\
    \ Xcode 中将菜单栏对象连接到 `menuBar` 出口，那么当应用程序在 Objective-C 中加载时，该连接将是有效的。\n"
- fmt: '## The Cocoa UI Hierarchy


    The hierarchy of graphical objects in Cocoa is rooted in `NSResponder`. This is
    the common object because it offers the behavior for answering to application
    events that is common to all graphical elements. `NSWindow` and `NSView`, which
    are used to implement windows and generic views, are all decedent from `NSResponder`.


    The functionality provided by `NSResponder` includes the following:


    *   Responding to mouse events: `mouseDown:`, `mouseDragged:`, `mouseUp:`, `mouseMoved:`,
    `mouseEntered:`, `rightMouseDown:`, among others.

    *   Responding to key events: `keyDown:`, `keyUp:`, `performMnemonic:`, `interpretKeyEquivalent:`,
    among others.

    *   Responding to other miscellaneous events: `cursorUpdate:`, `scrollWheel:`,
    `helpRequested:`, etc.

    *   Responding to miscellaneous action messages: `cancelOperation:`, `capitalizeWord:`,
    `insertNewLine:`, `insertTab:`, `indent:`, `moveBackward:`, `moveToBeginningOfDocumentAndModifySelection:`,
    `moveToLeftEndOfLine:`, `moveLeft:`, `moveRight:`, `pageUp:`, `pageDown:`, `scrollLineUp:`,
    `selectWord:`, `selectLine:`, `showContextHelp:`, among many others.

    *   Managing window restoration: `restoreStateWithCoder:`, among others.

    *   Responding to menu events: `setMenu:`


    This is just a small selection of the interface made available by `NSResponder`,
    which makes it a fundamental class in Cocoa UI programming. Subclasses such as
    `NSWindow`, `NSApplication`, and `NSView` further refine the standard behavior
    provided by this class.


    ### The NSWindow Class


    The `NSWindow` class provides the behavior necessary for all windows in Cocoa,
    including top-level windows, utility windows, and dialogs. They all share some
    common code to display, move, resize, and manage the content of the window.


    Here are some common features available to any window deriving from `NSWindow`:


    *   Defining the size of the window: `setFrameOrigin:`, `setFrameTopLeftPoint:`,
    `setMinSize:`, `performZoom:`, `showsResizeIndicator`, among others.

    *   Configuring window properties: `setBackgroundColor:`, `setStyleMask:`, `setOpaque:`,
    `setHasShadow:`, among others.

    *   Getting information from a window: `windowNumber`, `deviceDescription`, `canBecomeVisibleWithoutLogin`,
    among others.

    *   Managing the main window status: `isMainWindow`, `canBecomeMainWindow`, `makeMainWindow`,
    among others.

    *   Managing child and attached windows: `addChildWindow:ordered:`, `removeChildWindow:`,
    `parentWindow`, among others.

    *   Managing title bars: `standardWindowButton:`, `showsToolbarButton`, among
    others.


    The API provided by `NSWindow` encompasses the main functionality available in
    standard Mac OS X windows. Cocoa encapsulates this behavior in `NSWindow`, and
    you can set up how much of this functionality is used during design time using
    Xcode, or at runtime by calling the methods of `NSWindow` as needed.


    ### The Window Controller Object


    The window controller is an important part of the design of graphical applications.
    Unlike other GUI toolkits, most of the customization code in Cocoa is not written
    as a subclass of `NSWindow`. Instead, Cocoa uses window controller objects to
    handle most of the programmatic behavior of real `NSWindow` instances in the system.


    This is possible again because you can redirect messages to certain objects at
    design time using Xcode and nib files. When you need to handle a particular type
    of action, it is not necessary to create a subclass of a given UI object. Instead,
    you can just use Xcode to connect the object to a certain action in the window
    controller object. This guarantees that you will have a modified behavior, without
    the need to create a subclass of any particular UI object.


    In general, events directed to an `NSWindow` are directed to the window controller
    for immediate response. Thus, the window controller can be seen as the headquarters
    for the functionality provided in a window. You can further divide this responsibility
    to other controllers as necessary, but many simple applications have a single
    window controller that responds the requests for the whole window.


    In a large application, each window can have its own window controller, which
    responds to messages sent to that window. Other controls can also have their own
    associated controller, if their behavior is complex enough that requires this
    level of customization.


    ### The Delegate Object


    Among the outlets provided by Cocoa UI objects, one of the most important is the
    delegate outlet. A delegate is an object that automatically receives messages
    and notifications that are sent to a particular UI control or window. By setting
    an object as the delegate for a UI control, you will be able to process messages
    destined to that control. That is the main mechanism by which UI events are processed
    in a Cocoa-based application.


    For an example of setting delegates on the Xcode UI, consider the Window object,
    which is an instance of the `NSWindow` class. If you select that object and click
    the Connections Inspector (in the panel on the right side), you will see the list
    of outlets. One of these outlets is the delegate object, which is a present in
    every object of the class `NSWindow`, as shown in Figure [16-4](#A978-1-4302-5906-0_16_Chapter.html#Fig4).


    ![A978-1-4302-5906-0_16_Fig4_HTML.jpg](A978-1-4302-5906-0_16_Fig4_HTML.jpg)


    Figure 16-4. Connecting the delegate for an `NSWindow` object


    To set the delegate object, you can connect it to the desired receiver in the
    same way you can connect any other outlet. The object you want to use is the File’s
    Owner (i.e., the object that owns this xib file). Click the outlet connection
    icon and drag it to the File’s Owner placeholder, and you will see the outlet
    changing to indicate the new connection.


    Once a delegate connection has been established, you can start adding methods
    to the delegate class to process the events sent by the window object. Such a
    delegate class should conform to the `NSWindowDelegate` protocol, which defines
    methods that are sent to the delegate for processing. Here is a list of methods
    that can be implemented in the delegate class:


    *   Window movement messages: `windowWillMove:`, `windowDidMove:`, `windowDidChangeScreen:`,
    among others.

    *   Window minimization messages: `windowWillMiniaturize:`, `windowDidMiniaturize:`,
    `windowDidEndLiveResize:`, among others.

