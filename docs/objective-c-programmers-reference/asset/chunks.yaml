    \    {\n        @throw [[NSException alloc] initWithName:@\"firstChar\"\n    \
    \                                      reason:@\"StringIsEmpty\" userInfo:nil];\n\
    \    }\n    return [string characterAtIndex:0];\n}\n```\n\n此方法将检查是否存在至少一个字符并返回它。如果字符串为空，它会创建一个描述异常的`NSException`对象，并使用`@throw`关键字生成异常信号。以下测试可用于保证生成异常：\n\
    \n```\n- (void)testGetFirstChar\n{\n    StringOps *so = [[StringOps alloc] init];\n\
    \    STAssertThrows([so getFirstChar:@\"\"], @\"checks for exception on empty\
    \ string\");\n}\n```\n\n此测试将使用空字符串调用`getFirstChar:`方法。这将检查是否按要求抛出了异常，并在发生时测试通过。\n\
    \n- `STAssertThrowsSpecific(expression, exception_class, description, ...):` 此宏测试给定的表达式在执行时是否抛出了第二个参数中指定的特定异常。如果没有抛出异常，则使用提供的描述报告失败。\n\
    - `STAssertNoThrow(expression, description, ...):` 此宏测试给定的表达式在执行时是否不抛出异常。如果抛出了异常，则使用提供的描述报告失败。\n\
    - `STAssertNoThrowSpecific(expression, exception_class, description, ...):` 此宏测试给定的表达式在执行时是否不抛出`send`参数中列出的异常类型。如果抛出了异常，则使用提供的描述报告失败。\n\
    \n## Test-Driven Development\n\n测试驱动开发 (TDD) 是一种软件开发策略，其意义远不止于简单地向项目添加测试。TDD 的核心思想是编写测试应先于开发或编写实际代码。TDD\
    \ 背后的理由是，好的代码应该始终有测试来保证其正常工作。另一方面，拥有测试有助于我们专注于特定功能的开发，以实现期望的功能。\n\nTDD 的这些特性导致了一个特定的工作流程，该流程与大多数开发人员使用的标准编码技术有些不同。其理念是使用单元测试集作为项目中新功能的驱动力。这意味着在向项目添加新类或方法时，首先要做的是创建测试，这些测试将保证新代码的行为符合预期。\n\
    \n例如，假设你想向`StringOps`类添加一个计算字符串反转的新方法。根据 TDD，你需要做的第一件事，甚至在编写类的任何接口之前，就是创建一个名为`testReverse`的新方法。\n\
    \n```\n- (void)testReverse\n{\n    STFail(@\"not implemented\");\n}\n```\n\n此测试将按预期失败。但这是一个重要的特性，因为在\
    \ TDD 中，你希望测试失败，直到所需功能被正确实现。因此，下一步是创建一个名为`StringOps`的类。然后，可以使用以下代码更新测试：\n\n```\n\
    - (void)testReverse\n{\n    StringOps *so = [[StringOps alloc] init];\n    STAssertTrue(so\
    \ != nil, @\"check object created\");\n}\n```\n\n在你导入`StringOps`的头文件后，此测试应该能够编译并正确运行。该测试只是检查你是否可以创建一个`StringOps`类型的对象，这是一个应该可行的简单测试。\n\
    \n现在你已经通过了`StringOps`对象的创建测试，下一步是添加一个实现字符串反转操作的方法。首先要为此创建一个测试。\n\n```\n- (void)testReverse\n\
    {\n    StringOps *so = [[StringOps alloc] init];\n    STAssertTrue(so != nil,\
    \ @\"check object created\");\n    STAssertEqualObjects([so reverse:@\"ABC\"],\
    \ @\"CBA\", @\"check string reversal\");\n}\n```\n\n同时，你需要在`StringOps`类中添加一个相应的方法，以便测试能够编译。\n\
    \n```\n#import <Foundation/Foundation.h>\n@interface StringOps : NSObject\n- (NSString*)reverse:(NSString\
    \ *)string;\n@end\n```\n\n至于`reverse:`方法的实现，你将从一个仅返回原始字符串的简单实现开始。\n\n```\n#import\
    \ \"StringOps.h\"\n@implementation StringOps\n- (NSString*)reverse:(NSString *)string\n\
    {\n    return string;\n}\n@end\n```\n\n这个算法显然是不正确的，但这正是 TDD 的策略：从一个失败的测试开始，然后才创建一个能够验证测试的有效实现。通过单击\
    \ ![A978-1-4302-5906-0_14_Fig1c_HTML.jpg](img/A978-1-4302-5906-0_14_Fig1c_HTML.jpg)\
    \ + U（运行测试），你将看到一个需要修复的失败测试。错误信息显示“`'ABC' should be equal to 'CBA' check string\
    \ reversal`”。单击该错误，编辑器将定位到失败测试所在的位置。\n\n现在，你将编写一个使该测试成功的实现。你将使用一个简单的算法来遍历字符串并交换字符，返回一个新的`NSString`。\n\
    \n```\n- (NSString*)reverse:(NSString *)string\n{\n    char* cstr = (char*)[string\
    \ UTF8String];\n    int size = (int)[string length];\n    int i, j;\n    for (i=0,\
    \ j=size-1; i<size/2; ++i, j--)\n    {\n        char c = cstr[i];\n        cstr[i]\
    \ = cstr[j];\n        cstr[j] = c;\n    }\n    return [NSString stringWithCString:cstr\
    \ encoding:NSUTF8StringEncoding];\n}\n```\n"
- fmt: "输入值被用于通过`UTF8String`方法创建一个以空字符结尾的C风格字符串。然后，你使用一个简单的循环遍历C数组的字符，交换它们的位置以实现反转。数组反转后，你使用类方法`stringWithCString:encoding:`创建并返回一个新字符串，该方法接受一个以空字符结尾的字符数组和所需的编码（在本例中使用标准`UTF8`编码）。\n\
    \n再次运行测试后，你会看到`testReverse`现在通过了。这表明`reverse`的实现产生了预期的结果。与任何测试流程一样，你应该为同一方法添加其他测试以增强对其正确性的信心。例如，你可以添加一个新的断言来确保空字符串被正确处理。\n\
    \n```\n- (void)testReverse\n{\n    StringOps *so = [[StringOps alloc] init];\n\
    \    STAssertTrue(so != nil, @\"check object created\");\n    STAssertEqualObjects([so\
    \ reverse:@\"ABC\"], @\"CBA\", @\"check string reversal\");\n    STAssertEqualObjects([so\
    \ reverse:@\"\"], @\"\", @\"check empty strings\");\n}\n```\n\n为了使用TDD进行后续操作，你应该从一个失败的示例开始，例如将第二个参数替换为`@\"\
    A\"`。看到失败后，将其替换为正确的结果`@\"\"`，然后再次运行测试。这应该会成功，从而增强你对测试和被测代码行为正确的信心。\n\n注意\n\n上面给出的简单示例展示了使用Objective-C遵循测试驱动开发方法所需的所有步骤。使用TDD的优势在于，你可以在每一步专注于一个小功能。然后，当该步骤的实现完成后，执行相关测试会增强你对其正确性的信心。TDD流程与标准开发技术截然不同，后者是先编写代码，然后仅在功能就绪时才使用临时程序进行测试。\n\
    \n## 总结\n\n在本章中，你探讨了单元测试，这是一种经常用于提高代码质量和减少软件产品缺陷数量的编程实践。单元测试方法还有一个额外的好处，即提供快速的开发周期，使程序员能够快速编写代码并测试其正确性。\n\
    \nObjective-C是使用单元测试方法开发程序的理想环境。它对面向对象技术的支持意味着更容易将代码分解为可以独立测试的较小模块。Objective-C还提供了一个完整的测试框架，称为`SenTestingKit`，它实现了`OCUnit`库。`OCUnit`基于`SUnit`，这是第一个广泛使用的单元测试解决方案，专为Smalltalk语言创建。\n\
    \n你已经学习了如何将单元测试目标集成到现有的Objective-C项目中，以及如何将此类目标添加到新项目中。然后，我讨论了可以添加到单元测试用例中的测试类型示例。`OCUnit`框架提供了丰富的测试宏集，便于检测大多数编程条件。例如，有些宏测试其参数是否为`nil`、是否等于或不同于其他对象，或者是否抛出特定类型的应用程序定义异常。\n\
    \n最后，你已经了解了这些特性如何用于支持测试驱动开发，这是一种使用单元测试作为实现新功能驱动力的编程方法论，同时为提供的测试提供实现正确性的一定保证。由于TDD支持增量式开发方法，它已被成功地用于开发质量更高、错误更少的软件。以这种方式开发的代码经过频繁测试，也降低了变更产生意外副作用和隐藏错误的风险，而这些错误在完整功能实现后更难追踪。\n\
    \n代码测试只是编程的一个方面，尽管是重要方面。此外，理解如何处理最终可能进入开发周期后期阶段的编程错误非常重要。编程故障是常见现象，即使在通过单元测试制定了广泛代码验证策略的项目中也是如此。在下一章中，你将了解Xcode提供的功能，以促进软件错误的识别和消除。你还将看到Objective-C程序员可以利用Objective-C支持的特性使用的一些调试技术。\n\
    \n# 15. 调试\n\n摘要\n\n任何程序员都知道编写无缺陷软件是多么困难。这就是为什么每个平台都有许多集成的调试辅助工具，用于支持识别、重现和修复编程错误。Xcode为编写和调试程序提供了完整的解决方案，这使得在新应用或现有应用中查找错误变得更加容易。在本章中，我将解释如何使用这些调试功能。\n\
    \n你将首先了解通用调试方法如何应用于Objective-C程序。为此，我将解释一些对查找和修复任何编程语言中的错误都很有价值的通用调试策略。然后，你将看到如何使用包含Xcode和相关命令行工具的Objective-C环境来支持这些通用调试策略。\n\
    \n必要时，我将通过示例描述如何使用Xcode的功能，如断点、监视窗口、条件表达式和日志终端。我还将讨论如何使用`gdb`和`LLVM`调试器等命令行工具。\n\
    \n## 通用调试策略\n\n调试软件是一项需要大量脑力活动的工作，其思维方式与其他编程活动不同。在编程时，你处于“创造者”模式，不断尝试生成良好的软件设计并为现有代码添加新功能；而在调试时，你主要处于“研究者”模式，试图找出特定问题可能隐藏的位置。这种视角的差异是许多人发现难以高效查找和修复错误的原因。\n\
    \n从许多方面来看，在软件中发现问题类似于侦探工作。你需要有一个完善的流程来评估可能的原因并找出错误的根本原因。就像侦探一样，你从数据收集开始，这些数据稍后将用于精确定位问题发生的位置。只有在那时，你才能着手创建和验证关于如何解决该特定问题的假设。\n\
    \n以下是结构良好的调试策略所需步骤的总结。"
  raw: 'The input value is used to create a null-terminated C-style string employing
    the `UTF8String` method. Then, you use a simple loop to iterate through the characters
    of the C array, interchanging their positions so as to reverse them. After the
    array has been reversed, you create and return a new string using the class method
    `stringWithCString:encoding:`, which takes as parameters a null-terminated array
    of characters and the desired encoding (in this case you use the standard `UTF8`
    encoding).


    After running the tests once again, you should see that `testReverse` is now passing.
    This indicates that the implementation of reverse has produced the indicated results.
    As in any testing procedure, you should add other tests for the same method to
    increase your confidence in its correctness. For example, you can add a new assertion
    to make sure that empty strings are correctly handled.


    `- (void)testReverse`


    `{`


    `StringOps *so = [[StringOps alloc] init];`


    `STAssertTrue(so != nil, @"check object created");`


    `STAssertEqualObjects([so reverse:@"ABC"], @"CBA", @"check string reversal");`


    `STAssertEqualObjects([so reverse:@""], @"", @"check empty strings");`


    `}`


    To proceed with this using TDD, you should first start with an example that fails,
    by replacing the second parameter with `@`“`A`”, for instance. When you see the
    failure, replace it with the correct result, `@`“”, and run the tests again. This
    should succeed, giving you confidence that the tests and the tested code are behaving
    as desired.


    Note


    The simple example given above shows all the steps you need to follow to use a
    test-driven development approach with Objective-C. The advantage of using TDD
    is that you can concentrate at each step on a small feature. Then, when you’re
    done with the implementation of that step, the execution of the associated tests
    will give you confidence in its correctness. The TDD procedure is very different
    from standard development techniques where you write code and subsequently use
    ad hoc procedures for testing, which happens only when the feature is ready.


    ## Summary


    In this chapter, you explored unit testing, a programming practice that has been
    frequently used to improve code quality and reduce the number of defects in software
    products. Unit testing methodologies have the added benefit of providing fast
    development cycles where programmers are able to produce code and test its correctness
    in quick succession.


    Objective-C is the ideal environment for the development of programs using a unit
    testing methodology. Its support for object-oriented technologies means that it
    is easier to decompose code into smaller chunks that can be tested independently.
    Objective-C also offers a complete test framework, called SenTestingKit, which
    implements the OCUnit library. OCUnit is based on SUnit, the first widely used
    solution for unit testing, created for the Smalltalk language.


    You have learned how to integrate unit testing targets into an existing Objective-C
    project and how to add such targets to new projects. Then, I discussed examples
    of the types of tests that you can add to unit testing cases. The OCUnit framework
    offers a rich set of testing macros that facilitate the detection of most programming
    conditions. Examples are macros that test if their arguments are nil, equal to,
    or different from other objects, or throw a particular kind of application-defined
    exception.


    Finally, you have seen how these features can be used to support Test-driven development,
    a programming methodology that uses unit tests as the driving force to implement
    new features, while providing some assurance that the implementation is correct
    for the provided tests. Since TDD supports an incremental development method,
    it has been successfully used to develop software with higher quality and fewer
    bugs. The fact that code developed in this way is frequently tested also reduces
    the risk that changes will generate undesired side effects and hidden bugs, which
    are much more difficult to track down after a complete feature has been implemented.


    Testing code is just one facet of programming, although an important one. In addition,
    it is very important to understand how to deal with programming errors that may
    eventually get into later phases of the development cycle. Programming faults
    are a common occurrence, even on projects that have an extensive policy for code
    verification through unit testing. In the next chapter, you will learn the features
    provided by Xcode to facilitate the identification and removal of software errors.
    You will also see some of the debugging techniques that can be used by Objective-C
    programmers, leveraging the features supported by Objective-C.


    # 15. Debugging


    Abstract


    Any programmer knows how difficult it is to write defect-free software. That is
    why every platform has a number of integrated debugging aids, which give support
    in the task of identifying, reproducing, and fixing programming bugs. Xcode provides
    a complete solution for writing and debugging programs, which makes it much easier
    to find bugs in new or existing applications. In this chapter, I explain how to
    use these debugging features.


    Any programmer knows how difficult it is to write defect-free software. That is
    why every platform has a number of integrated debugging aids, which give support
    in the task of identifying, reproducing, and fixing programming bugs. Xcode provides
    a complete solution for writing and debugging programs, which makes it much easier
    to find bugs in new or existing applications. In this chapter, I explain how to
    use these debugging features.


    You will initially learn how general debugging methods can be applied to Objective-C
    programs. For this purpose, I explain some general debugging strategies that are
    valuable for finding and fixing errors in any programming language. Then, you
    will see how the Objective-C environment, which includes Xcode and related command
    line tools, can be used to support these general debugging strategies.


    Using examples when necessary, I will describe how to employ Xcode features such
    as breakpoints, watch windows, conditional expressions, and the logging terminal.
    I also talk about how to use command line tools such as gdb and LLVM debuggers.


    ## General Debugging Strategies


    Debugging software is a task that requires significant intellectual effort and
    a different mindset from other programming activities. While programming, you
    are in a “creator” mode, constantly trying to produce good software designs and
    adding new features to existing code; while debugging, you will be mostly in a
    “researcher” mode, trying to figure out where a particular issue might be hiding.
    This difference in perspective is a reason why so many people find it difficult
    to find and fix bugs efficiently.


    Finding problems in a piece of software is, in many ways, similar to detective
    work. You need to have a well-established process to evaluate possible causes
    and find the root cause of the bug. Just like a detective, you start with data
    collection, which will be later used to detect exactly where the problem is occurring.
    Only then can you proceed to creating and validating a hypothesis about how to
    solve that particular issue.


    Here is a summary of the steps necessary for a well-structured debugging strategy.'
