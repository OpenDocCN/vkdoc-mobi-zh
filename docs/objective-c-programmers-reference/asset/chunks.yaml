    此应用的一个功能是，当用户请求时，它能够为每张索引卡片播放声音。你可以利用此功能来为索引卡片上的概念提供声音提醒，或者播放索引卡片中内容的录音。为每个内容关联一个声音确实有助于记忆。


    为了实现此效果，首先要做的是检索将要播放的声音文件的名称。此信息存储在 `words` 数据结构的 `file` 字段中。当前位置通过 `currentPos`
    配合 `perm` 数组（它记录了当前的排列）来确定。如果该位置没有存储文件名，则根据索引卡片中存储的信息生成一个文件名。


    加载声音文件的第一步是获取其存储路径。为此，你可以使用 `pathForResource:ofType:` 方法，该方法发送给代表 `mainBundle`
    的对象。


    注意


    Bundle 是与应用程序一起分发的一组文件的集合。Cocoa 将一个 Bundle 视为一个单元，在 Mac OS X 的 Finder 中你会将其视为单个文件。Cocoa
    提供了几种从 Bundle 中检索信息的方法，但对于大多数简单的应用程序，你只需要与主 Bundle（由 `[NSBundle mainBundle]` 返回）交互即可。


    获取所需声音资源的路径后，你需要创建一个代表该文件的 `NSURL` 对象。下一步是创建一个 `AVAudioPlayer` 对象，并使用声音资源 URL
    进行初始化。接下来，你需要设置播放器选项，例如音量和循环次数。我还向播放器对象传递了一个委托，该委托将负责接收和响应播放过程中生成的任何通知。最后，向该对象发送播放消息，从而开始播放声音文件的过程。


    `- (void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player successfully:(BOOL)flag`


    `{`


    `NSLog(@"正在释放播放器...");`


    `[player release];`


    `}`


    `audioPlayerDidFinishPlaying:successfully:` 方法是 `AVAudioPlayerDelegate` 接口的一部分，当播放器对象通知其委托时被调用（请记住，播放器的
    `delegate` 属性被初始化为指向 `MainViewController` 对象）。在此实现中，你需要做的唯一重要事情就是释放播放器对象。否则，每次播放声音时，都会导致不必要的新内存泄漏。


    `- (IBAction)reveal:(id)sender`


