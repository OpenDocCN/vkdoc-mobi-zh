- fmt: "# Allocating Memory\n\nMemory is the most common kind of resource that needs\
    \ to be managed by an application. For any software to run properly, it needs\
    \ to define a way to allocate new memory, as well as a proper scheme to maintain\
    \ existing references to the allocated memory. Ultimately, the system also needs\
    \ to determine how to dispose of unused memory blocks.\n\nObjective-C uses a reference-counting\
    \ mechanism to determine how memory needs to be maintained and disposed. Here\
    \ is how it works: every object created by the system has an internal counter,\
    \ which records how many references exist to that object. Each method that creates\
    \ a new object (such as `new` or `copy`) initializes that counter to 1.\n\nIf\
    \ an object is not in use anymore, you need to call the `release` method, which\
    \ is part of the `NSObject` interface. When `release` is called, it decreases\
    \ the value of the internal counter. If the counter is positive, nothing happens\
    \ to the memory; but if the counter ever gets to zero, the object is deleted and\
    \ removed from memory.\n\nFrom that you can see that a simple sequence of usage\
    \ for a new object is to create it using a method such as `new`, and then call\
    \ `release` at the end of its use. If you want to keep an object alive, however,\
    \ you can always call a method called `retain`. The role of `retain` is to increase\
    \ the internal counter, indicating that a new reference to the object has been\
    \ added.\n\nHere is a simple example of how reference counting works. Consider\
    \ the following method, `setupProduction`, which is used to set up the production\
    \ system in a `Factory` class:\n\n```\n// file Factory.h\n\n@interface Factory\
    \ : NSObject\n\n- (void) startProduction;\n\n@end\n```\n\nThis interface declares\
    \ a single method, `startProduction`, that can be used to initiate the production\
    \ activities for the factory. Before production starts, however, you would like\
    \ to set up the system with all its components. This is done using the `setupProduction`\
    \ method.\n\n```\n+ (void) setupProduction\n{\n    Factory *productFactory = [[Factory\
    \ alloc] init];\n    [productFactory startProduction];\n    // do something with\
    \ productFactory ...\n    [productFactory release];\n}\n```\n\nIn this method,\
    \ you are interested only in the allocation and release of data. Therefore, you\
    \ start by allocating the `Factory` object, with a simple `alloc`/`init` sequence.\
    \ The memory management rules say that memory created with a `new` method has\
    \ an internal reference count of 1. Then, you use the new object to perform the\
    \ production initialization steps of `startProduction`.\n\nFinally, you get to\
    \ a point where the `Factory` object is no longer needed. To avoid a memory leak,\
    \ you need a call to `release`. In its internal implementation, `release` will\
    \ decrement the reference counter and check its value. Since the original value\
    \ was 1, the counter will drop to zero, and this will tell `release` to dispose\
    \ of the object and remove it from memory.\n\nNow, consider what to do if you\
    \ need to store the `Factory` object in another location. For example, you may\
    \ have a factory management class that can be used to manage your own `Factory`\
    \ object.\n\n```\n// file FactoryManagement.h\n\n/// responsible for managing\
    \ a Factory object.\n@interface FactoryManagement : NSObject\n{\n    Factory *factory;\n\
    }\n\n- (void) setupProductionManagement:(Factory*)factory;\n- (void) dealloc;\n\
    \n@end\n```\n\nThis interface provides a management system for factories. For\
    \ this purpose, the class needs to store a pointer to the `Factory` object. The\
    \ `setupProductionManagement:` method is responsible for receiving a `Factory`\
    \ object and using it to set up the management system. Here is how this can be\
    \ implemented:\n\n```\n// file FactoryManagement.m\n#include \"FactoryManagement.h\"\
    \n\n@implementation FactoryManagement\n\n- (void) setupProductionManagement:(Factory\
    \ *)aFactory\n{\n    factory = aFactory;\n    [factory retain];\n    // perform\
    \ other setup activities\n}\n\n- (void) dealloc\n{\n    [factory release];\n \
    \   [super dealloc];\n}\n\n@end\n```\n\nThis example shows how the `setupProductionManagement:`\
    \ method uses the `Factory` object passed as a parameter. First, it saves the\
    \ pointer to the instance variable `factory`. However, doing so also requires\
    \ the use of `retain`. This is necessary because otherwise the reference to the\
    \ object passed as a parameter may become invalid after the end of `setupProductionManagement:`.\n\
    \nAfter `retain` is called on the factory object, `FactoryManagement` is responsible\
    \ for maintaining the reference counter of the `factory` object. Therefore, it\
    \ needs to call `release` on it when it is no longer needed. The last chance an\
    \ object has to do this is on the `dealloc` method, which is called right before\
    \ it is released by the system.\n\nThe implementation of `dealloc` is responsible\
    \ for releasing any objects that have been allocated by the class. If a class\
    \ holds one or more additional resources for its operation, it should also implement\
    \ a `dealloc` method to guarantee that such resources will be correctly released\
    \ at the end of its operation. Failure to implement `dealloc` properly is a cause\
    \ of most memory management failures, which can cause not only higher-than-normal\
    \ memory usage patterns, but also more severe application logical issues and possibly\
    \ even crashes."
  raw: '## Allocating Memory


    Memory is the most common kind of resource that needs to be managed by an application.
    For any software to run properly, it needs to define a way to allocate new memory,
    as well as a proper scheme to maintain existing references to the allocated memory.
    Ultimately, the system also needs to determine how to dispose of unused memory
    blocks.


    Objective-C uses a reference-counting mechanism to determine how memory needs
    to be maintained and disposed. Here is how it works: every object created by the
    system has an internal counter, which records how many references exist to that
    object. Each method that creates a new object (such as `new` or `copy`) initializes
    that counter to 1.


    If an object is not in use anymore, you need to call the `release` method, which
    is part of the `NSObject` interface. When `release` is called, it decreases the
    value of the internal counter. If the counter is positive, nothing happens to
    the memory; but if the counter ever gets to zero, the object is deleted and removed
    from memory.


    From that you can see that a simple sequence of usage for a new object is to create
    it using a method such as `new`, and then call `release` at the end of its use.
    If you want to keep an object alive, however, you can always call a method called
    `retain`. The role of `retain` is to increase the internal counter, indicating
    that a new reference to the object has been added.


    Here is a simple example of how reference counting works. Consider the following
    method, `setupProduction`, which is used to set up the production system in a
    `Factory` class:


    `// file Factory.h`


    `@interface Factory : NSObject`


    `- (void) startProduction;`


    `@end`


    This interface declares a single method, `startProduction`, that can be used to
    initiate the production activities for the factory. Before production starts,
    however, you would like to set up the system with all its components. This is
    done using the `setupProduction` method.


    `+ (void) setupProduction`


    `{`


    `Factory *productFactory = [[Factory alloc] init];`


    `[productFactory startProduction];`


    `// do something with productFactory ...`


    `[productFactory release];`


    `}`


    In this method, you are interested only in the allocation and release of data.
    Therefore, you start by allocating the `Factory` object, with a simple `alloc`/`init`
    sequence. The memory management rules say that memory created with a `new` method
    has an internal reference count of 1\. Then, you use the new object to perform
    the production initialization steps of `startProduction`.


    Finally, you get to a point where the `Factory` object is no longer needed. To
    avoid a memory leak, you need a call to `release`. In its internal implementation,
    release will decrement the reference counter and check its value. Since the original
    value was 1, the counter will drop to zero, and this will tell `release` to dispose
    of the object and remove it from memory.


    Now, consider what to do if you need to store the `Factory` object in another
    location. For example, you may have a factory management class that can be used
    to manage your own `Factory` object.


    `// file FactoryManagement.h`


    `/// responsible for managing a Factory object.`


    `@interface FactoryManagement : NSObject`


    `{`


    `Factory *factory;`


    `}`


    `- (void) setupProductionManagement:(Factory*)factory;`


    `- (void) dealloc;`


    `@end`


    This interface provides a management system for factories. For this purpose, the
    class needs to store a pointer to the `Factory` object. The `setupProductionManagement:`
    method is responsible for receiving a `Factory` object and using it to set up
    the management system. Here is how this can be implemented:


    `// file FactoryManagement.m`


    `#include "FactoryManagement.h"`


    `@implementation FactoryManagement`


    `- (void) setupProductionManagement:(Factory *)aFactory`


    `{`


    `factory = aFactory;`


    `[factory retain];`


    `// perform other setup activities`


    `}`


    `- (void) dealloc`


    `{`


    `[factory release];`


    `[super dealloc];`


    `}`


    `@end`


    This example shows how the `setupProductionManagement:` method uses the `Factory`
    object passed as a parameter. First, it saves the pointer to the instance variable
    `factory`. However, doing so also requires the use of `retain`. This is necessary
    because otherwise the reference to the object passed as a parameter may become
    invalid after the end of `setupProductionManagement:`.


    After retain is called on the factory object, `FactoryManagement` is responsible
    for maintaining the reference counter of the `factory` object. Therefore, it needs
    to call `release` on it when it is no longer needed. The last chance an object
    has to do this is on the `dealloc` method, which is called right before it is
    released by the system.


    The implementation of `dealloc`is responsible for releasing any objects that have
    been allocated by the class. If a class holds one or more additional resources
    for its operation, it should also implement a `dealloc` method to guarantee that
    such resources will be correctly released at the end of its operation. Failure
    to implement `dealloc` properly is a cause of most memory management failures,
    which can cause not only higher-than-normal memory usage patterns, but also more
    severe application logical issues and possibly even crashes.'
  trans: "\n# 分配内存\n\n内存是应用需要管理的最常见的资源类型。为确保任何软件正常运行，都需要定义分配新内存的方式，以及维护已分配内存现有引用的合理方案。最终，系统还需要确定如何释放未使用的内存块。\n\
    \nObjective-C 采用引用计数机制来确定如何维护和释放内存。其工作原理如下：系统创建的每个对象都有一个内部计数器，记录该对象存在多少引用。每个创建新对象的方法（如\
    \ `new` 或 `copy`）都会将该计数器初始化为 1。\n\n如果某个对象不再使用，你需要调用属于 `NSObject` 接口的 `release`\
    \ 方法。调用 `release` 时，它会减少内部计数器的值。如果计数器为正数，内存不会发生任何变化；但如果计数器变为零，该对象就会被删除并从内存中移除。\n\
    \n由此可以看出，新对象的简单使用流程是使用 `new` 等方法创建它，然后在用完后调用 `release`。不过，如果你希望保持对象存活，可以随时调用一个名为\
    \ `retain` 的方法。`retain` 的作用是增加内部计数器，表示已添加对该对象的新引用。\n\n以下是一个关于引用计数如何工作的简单示例。考虑下面的\
    \ `setupProduction` 方法，它用于在 `Factory` 类中设置生产系统：\n\n```\n// 文件 Factory.h\n\n@interface\
    \ Factory : NSObject\n\n- (void) startProduction;\n\n@end\n```\n\n这个接口声明了一个方法\
    \ `startProduction`，可用于启动工厂的生产活动。然而在生产开始之前，你需要用所有组件来设置系统。这是通过 `setupProduction`\
    \ 方法完成的。\n\n```\n+ (void) setupProduction\n{\n    Factory *productFactory = [[Factory\
    \ alloc] init];\n    [productFactory startProduction];\n    // 对 productFactory\
    \ 执行某些操作...\n    [productFactory release];\n}\n```\n\n在此方法中，你只关注数据的分配和释放。因此，你首先通过简单的\
    \ `alloc`/`init` 序列分配 `Factory` 对象。内存管理规则规定，使用 `new` 方法创建的内存，内部引用计数为 1。然后，你使用新对象执行\
    \ `startProduction` 的生产初始化步骤。\n\n最后，当不再需要 `Factory` 对象时，为避免内存泄漏，你需要调用 `release`。在其内部实现中，`release`\
    \ 会递减引用计数器并检查其值。由于原始值为 1，计数器将降为零，这会让 `release` 释放该对象并将其从内存中移除。\n\n现在，考虑如果你需要将\
    \ `Factory` 对象存储到另一个位置该怎么办。例如，你可能有一个工厂管理类，可用于管理你自己的 `Factory` 对象。\n\n```\n// 文件\
    \ FactoryManagement.h\n\n/// 负责管理 Factory 对象。\n@interface FactoryManagement :\
    \ NSObject\n{\n    Factory *factory;\n}\n\n- (void) setupProductionManagement:(Factory*)factory;\n\
    - (void) dealloc;\n\n@end\n```\n\n该接口为工厂提供了一个管理系统。为此，该类需要存储一个指向 `Factory` 对象的指针。`setupProductionManagement:`\
    \ 方法负责接收一个 `Factory` 对象，并使用它来设置管理系统。下面是其实现方式：\n\n```\n// 文件 FactoryManagement.m\n\
    #include \"FactoryManagement.h\"\n\n@implementation FactoryManagement\n\n- (void)\
    \ setupProductionManagement:(Factory *)aFactory\n{\n    factory = aFactory;\n\
    \    [factory retain];\n    // 执行其他设置活动\n}\n\n- (void) dealloc\n{\n    [factory\
    \ release];\n    [super dealloc];\n}\n\n@end\n```\n\n这个例子展示了 `setupProductionManagement:`\
    \ 方法如何使用作为参数传入的 `Factory` 对象。首先，它将指针保存到实例变量 `factory` 中。然而这样做也需要使用 `retain`。这是必要的，因为否则作为参数传入的对象的引用在\
    \ `setupProductionManagement:` 结束后可能会变得无效。\n\n在对工厂对象调用 `retain` 之后，`FactoryManagement`\
    \ 负责维护 `factory` 对象的引用计数器。因此，当不再需要它时，需要对其调用 `release`。对象最后一次执行此操作的机会是在 `dealloc`\
    \ 方法中，该方法在系统释放对象之前被调用。\n\n`dealloc` 的实现负责释放该类分配的所有对象。如果一个类持有其运行所需的一个或多个额外资源，它还应实现\
    \ `dealloc` 方法，以确保这些资源在其运行结束时被正确释放。未能正确实现 `dealloc` 是大多数内存管理失败的根源，这不仅会导致高于正常的内存使用模式，还可能引发更严重的应用逻辑问题，甚至导致崩溃。\n"
- fmt: '# Rules of Reference Counting


    As you saw in the previous section, reference counting as implemented by the Objective-C
    libraries is a simple technique that allows the system to determine when an object
    should be removed from memory. But for it to work, programmers need to regularly
    follow a few rules. Although the rules may seem unnatural at the beginning, after
    some experience these rules will just become second nature. Since the rules for
    memory management using reference counting are uniformly applied across the system,
    it doesn’t take long for programmers to get used to them and take advantage of
    their convenience.


    Reference counting is a system that can be applied in any non-garbage collected
    language such as C or C++. However, the basic advantage of this particular memory
    management system in Objective-C is that, unlike in C, all basic libraries uniformly
    apply the same strategy. Therefore, there is no need to worry about different
    memory controlling policies being used by different libraries, as is the case
    with C code. As soon as you have learned how `retain` and `release` work, you
    will be able to understand the memory usage patterns for all libraries in the
    system, including third-party frameworks.


    Reference counting is a technique of memory organization that uses a simple counter
    attached to each object. The rules of memory management, therefore, equate with
    the rules for increasing and decreasing the reference counter (which indicates
    how many references for the current instance exist in memory) for each object.


    Here are the rules that you need to follow for reference counting to work. When
    an object is created, the internal counter is equal to 1. An object is created
    only by methods that start with `new`, `alloc`, or `copy`. When a client calls
    one of these methods for a particular object, the resulting pointer is said to
    be owned by that client. For example, consider the following code:


    ```objc

    // file ArrayUse.h


    @interface ArrayUse : NSObject


    - (void) useArray;


    @end


    // file ArrayUse.m


    #import "ArrayUse.h"


    @implementation ArrayUse


    - (void) useArray


    {


    NSArray *myArray = [[NSArray alloc] init];


    // do something with array ...


    // the array is owned by this object. Release it.


    [myArray release];


    }


    @end

    ```


    The class `ArrayUse` has a single method called `useArray`, where an array is
    allocated and used. The array is created using the pair `alloc`/`init`, and the
    result is assigned to `myArray`. Remember that, being returned by `alloc`, the
    memory has now a reference count of 1, and you own the resulting object. This
    also means that you control the lifetime of the object. Since this is a local
    array, you cannot use it after the method finishes its execution. Therefore, you
    need to call `release` on `myArray` to avoid a memory leak.


    Now, consider a situation in which `myArray` is an instance variable, instead
    of a local variable.


    ```objc

    // file ArrayUse.h


    @interface ArrayUse : NSObject


    {


    NSArray *myArray;


    }


    - (void) useArray;


    - (void) dealloc;


    @end


    // file ArrayUse.m


    #import "ArrayUse.h"


    @implementation ArrayUse


    - (void) useArray


    {


    myArray = [[NSArray alloc] init];


    // do something with array ...


    }


    // other methods using myArray


    - (void) dealloc


    {


    // the array is owned by this object. Release it.


    [myArray release];


    [super dealloc];


    }


    @end

    ```


    In this example, `myArray` is allocated and stored as an instance variable. As
    you created `myArray` using `new`, you own the variable. The difference between
    this situation and the previous one is that since you are using `myArray` at a
    class scope, the proper method to release it is using `dealloc`. In both cases
    the `useArray` class owns the object, the only change being the lifetime of the
    object.


    A result of the ownership rule explained above is that objects created with methods
    starting with something other than `alloc`, `new`, and `copy` are not owned by
    the caller of the code. The `NSArray` class can provide an example of this.


    ```objc

    - (void) useArray


    {


    NSArray *myArray = [NSArray arrayWithObjects:@1, @2, @3, nil];


    // do something with array ...


    // this array was not created with init/new/copy


    // so there is no need for release


    }

    ```


    The object `myArray` was created this time using the method `arrayWithObjects:`,
    which is a class method returning a new array. Although in functionality this
    is very much the same code as the previous example, the way you need to treat
    the object is surprisingly different. In this case, `NSArray` is responsible for
    providing a way to release the object, since the client code is not the owner
    of `myArray`.


    On the other hand, the same issue changes your responsibility when `myArray` is
    an instance variable. And this brings us to the next rule of memory management:
    if you don’t own an object, you need to use the `retain` method to avoid it being
    deleted by the system. This rule is exemplified by a modification of the previous
    example. Look at the difference in how an instance variable is treated when it
    holds a pointer to memory that is not owned by you:


    ```objc

    // file ArrayUse.m


    #import "ArrayUse.h"


    @implementation ArrayUse


    - (void) useArray


    {


    myArray = [NSArray arrayWithObjects:@1, @2, @3, nil];


    // do something with array ...


    // this array was not created with init/new/copy


    // so we need to retain it:


    [myArray retain];


    }


    // other methods using myArray


    - (void) dealloc {


    // the array is owned by this object. Release it.


    [myArray release];


    [super dealloc];


    }


    @end

    ```


    Here you can see the difference in how the `NSArray` object is stored in the `myArray`
    instance variable. Since you are using `arrayWithObjects:`, the resulting instance
    is not owned by `ArrayUse`. The outcome is that you need to use `retain` in order
    to get ownership of the object and to be able to use it later. If you hadn’t used
    `retain`, the object stored in `myArray` would be released by the system at the
    next available opportunity.


    Notice that the implementation of `dealloc`, however, didn’t change. By the time
    the object of class `ArrayUse` is destroyed, it owns a reference to `myArray`.
    Therefore, it needs to call `release` on `myArray` in the same way as before.'
