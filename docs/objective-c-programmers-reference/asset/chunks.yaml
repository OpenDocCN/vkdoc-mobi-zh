    # 变量类型


    变量在使用前需要声明为特定类型。Objective-C 中有多种类型可供使用，通常可分为原生类型和用户自定义类型。


    原生类型由语言和编译器实现预先定义，无需使用任何库或头文件即可使用，因此可在 Objective-C 定义的任何函数或类中使用。而用户自定义类型由程序员指定，它们可以是库的一部分，也可以是用户代码的一部分。我将首先介绍可用的原生类型；结构和类将在后面讨论。


    原生类型数量不多，大多数是数值类型，但也可用于存储字母数字数据以及逻辑值。最后，原生类型还可用于存储内存地址，即所谓的指针。


    在数值类型中，最常见的是整数和浮点数。例如，整数值由类型 `int` 表示。浮点数是数学中实数的计算近似值，可由 `float` 或 `double` 等原生类型表示。


    ## 整数类型


    整数类型用于存储整数，包括 `char`、`int`、`short`、`long` 和 `long long`。不同数值类型的出现源于它们各自拥有不同的存储容量，以及在内存中表示此类数字所需的内存大小。例如，在
    32 位机器上，定义为 `int` 的整数通常占用 4 个字节，这意味着它可以存储大约 40 亿以内的数字。另一方面，`short` 类型的值可能小至 2
    个字节，足以存储大约 200 万以内的数字。以下是一些示例：


    ```

    char val0 = 12;

    ```


    ```

    int val1 = 123400;

    ```


    ```

    short val2 = 123;

    ```


    ```

    long val3 = 12345;

    ```


    ```

    long long val4 = 12345678;

    ```


    `long` 和 `long long` 变量的大小取决于编译器和使用的机器，但它们能存储的值通常大于 `int` 允许的范围。


    整数值的类型还可以声明为有符号或无符号。有符号数可以是正数或负数，因为符号与数值表示一起存储。无符号数不能为负，取值范围从零到变量大小允许的最大值。


    当表示已知为非负的数量时，无符号数非常有用。例如，内存大小通常由无符号数表示。然而，通常的做法是使用更为通用的有符号类型——除非确定某个数字不可能为负。默认情况下，声明为
    `int`、`short`、`long`、或 `long long` 的整数都是有符号的。


    # 浮点数


    浮点数是实数的计算机表示。由于计算机存储数据量有限，实数无法被精确存储。对于某些数字，例如 0.3，由于使用二进制表示会引入误差，计算机中只能存储其近似值。对于其他实数，例如圆周率
    Pi，众所周知它没有有限表示形式。


    Objective-C 程序使用浮点表示法，其中实数分为两部分存储：尾数和指数。你无需了解这种表示法的复杂性，但重要的是要意识到这些数字与整数之间的区别。同样重要的是要知道，浮点数的运算可能导致难以理解和追踪的舍入误差。


    浮点数可以声明为两种形式：`float` 或 `double` 值（尽管 `double` 可以接受 `long` 修饰符）。`float` 和 `double`
    的区别在于每种类型存储所用的数据量。具体字节数取决于所使用的机器，但 `double` 数的精度和指数范围都是 `float` 的两倍。以下是一些示例：


    ```

    int degrees = 360;

    ```


    ```

    float e = 2.7182;

    ```


    ```

    double elarge = 2.718281828459;

    ```


    # 字符


    Objective-C 支持的一种常见原生类型是字符（`char`）。字符可以存储任何标准 ASCII 值，其范围通常为 0 到 255。尽管用于存储字符串元素，但字符类型只是前述整数数字类型之一，因此其行为与
    `int` 或 `short` 等类型类似。`char` 类型也可以声明为有符号（允许负数）或无符号（当已知不会存储负数时）。


    ## 逻辑值


    变量还可以存储单个逻辑值：真或假。虽然 C 语言没有专门的布尔值，但在 Objective-C 中，你可以使用 `BOOL` 类型来表示此类变量。`BOOL`
    类型的变量可以存储值 `YES` 或 `NO`，也可以拼写为 `TRUE` 或 `FALSE`。然而，该语言允许将任何整数类型转换为布尔值。在这种情况下，零值被转换为
    `FALSE`，而任何非零值都被视为 `TRUE`。对于不注意这些类型之间转换规则的程序员来说，这可能是错误的来源。


    ## 指针


    Objective-C 支持存储内存地址的变量，这是引用程序所存储数据最灵活的方法之一（此类变量的使用将在本章后面介绍）。指针使用星号符号声明，以下是声明常见类型指针的示例：


    ```

    int *pointer_to_int;

    ```


    ```

    double *double_pointer;

    ```


    第一个示例是一个可以存储整数地址的变量。第二个是一个指针，可用于存储包含 `double` 类型值的内存地址。在 Objective-C 中创建对象时，指针符号使用频繁，你将在下一章中看到这一点。


    ## void 类型


    关键字 `void` 是 Objective-C 中使用的特殊类型名称。与其他类型名称不同，`void` 不代表真实的数据类型，而是表示数据的缺失，或者类型未知这一事实。`void`
    类型仅能在少数情况下出现。一种情况是当函数没有返回值时，这通过使用 `void` 关键字替代返回类型来表示。


    使用 `void` 的另一种情况是标记指向未知数据类型的指针。当类型未知且使用 `void` 时，生成的指针将不包含关于该内存位置存储的实际数据类型的任何信息。此类变量可以在
    Objective-C 中用作泛型指针，可应用于任何数据类型。你将在后续学习指针的章节中看到这种用法的示例。


    **注意**


    由于 `void` 只是一个特殊关键字，因此无法声明 `void` 类型的变量。例如，尝试声明像 `void var;` 这样的变量将导致编译错误，因为编译器无法推断该变量的真实类型。

