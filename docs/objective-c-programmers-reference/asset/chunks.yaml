  trans: "\n### AppDelegate\n\n我们从应用程序委托开始。如上所述，该委托接收通过 Xcode 界面编辑器的 nib 文件路由的事件。\n\
    \n```\n/* AppDelegate */\n\n#import <Cocoa/Cocoa.h>\n\n@interface AppDelegate\
    \ : NSObject\n\n{\n    IBOutlet id selectNumberOfNodesWindow;\n    IBOutlet id\
    \ numberOfNodesControl;\n    IBOutlet id minDistField;\n    IBOutlet id applyDistControl;\n\
    \    int numberOfNodesControlCanceled;\n}\n\n- (id)getSelectNumberOfNodesWindow;\n\
    - (id)getNumberOfNodesControl;\n- (id)getNumberOfNodesApplyDistControl;\n- (id)getNumberOfNodesDistField;\n\
    - (int)getNumberOfNodesControlCanceled;\n- (IBAction)closeSelectNumberOfNodesWindow:(id)sender;\n\
    - (IBAction)cancelSelectNumberOfNodesWindow:(id)sender;\n- (IBAction)setApplyMinDistOnNumberOfNodesWindow:(id)sender;\n\
    \n@end\n```\n\n该应用程序拥有多个出口，对应界面中的字段。例如，有一个字段用于存储窗口中的节点数量。请注意，所有这些字段都被标记为 `IBOutlet`，用于告知\
    \ Xcode 这些变量已映射到出口。然后，请注意最后三个方法的返回值是 `IBAction`，这用于告知 Xcode 这些方法应在界面编辑器中映射为操作。\n\
    \n接下来是 AppDelegate 的实现。\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    \n- (id)getSelectNumberOfNodesWindow\n{\n    return selectNumberOfNodesWindow;\n\
    }\n\n- (id)getNumberOfNodesControl\n{\n    return numberOfNodesControl;\n}\n\n\
    - (int)getNumberOfNodesControlCanceled\n{\n    return numberOfNodesControlCanceled;\n\
    }\n```\n\n前三个方法简单地返回几个界面控件的 ID。这些 ID 定义了显示节点数量的窗口、包含节点数量的控件，以及用于取消操作的控件。\n\n```\n\
    - (IBAction)cancelSelectNumberOfNodesWindow:(id)sender\n{\n    printf(\"The window\
    \ was canceled\\n\");\n    numberOfNodesControlCanceled = 1;\n    [NSApp stopModal];\n\
    }\n\n- (IBAction)closeSelectNumberOfNodesWindow:(id)sender\n{\n    numberOfNodesControlCanceled\
    \ = 0;\n    [NSApp stopModal];\n}\n\n- (IBAction)setApplyMinDistOnNumberOfNodesWindow:(id)sender;\n\
    {\n    if ([sender state] == NSOffState) {\n        [minDistField setEnabled:NO];\n\
    \    } else {\n        [minDistField setEnabled:YES];\n        [selectNumberOfNodesWindow\
    \ makeFirstResponder:minDistField];\n    }\n}\n```\n\n这三个方法用于响应应用程序中定义的模态窗口发送的消息。该模态窗口用于定义编辑器中的节点数量。请注意，在前两个方法中，调用了\
    \ `NSApp` 对象的 `stopModal` 方法。`stopModal` 用于关闭模态窗口（此处模态窗口是一个小对话框）。\n\n```\n- (id)getNumberOfNodesApplyDistControl\n\
    {\n    return applyDistControl;\n}\n\n- (id)getNumberOfNodesDistField\n{\n   \
    \ return minDistField;\n}\n\n@end\n```\n\n最后两个方法是必需的，用于返回存储的信息，例如分布中的节点数量。\n\n\
    ### GraphView 接口\n\n`GraphView.h` 文件用于定义图形绘制例程的接口。大部分代码与定义绘制操作过程中所需的实例变量相关。\n\n\
    ```\n/* GraphView: viewer for graph drawing. */\n\n#import <Cocoa/Cocoa.h>\n#include\
    \ <graph.h>\n\n// This class implements the viewer, which displays the graph and\n\
    // takes care of editing operations.\n\n@interface GraphView : NSView\n{\n   \
    \ NSBezierPath *path; // path used by the main graph\n    NSBezierPath *sg_path;\
    \ // path used by the sobreposed graph\n    NSAffineTransform *transform; // transformation\
    \ used to draw on scale\n    Graph *G; // Main graph\n    Graph *sG; // Sobreposed\
    \ graph\n    IBOutlet id Document; // Pointer to the document\n    IBOutlet id\
    \ _posField; // Field in the status bar showing position\n    IBOutlet id scroller;\n\
    \    IBOutlet NSSlider *_slider;\n    int *_associatedPoints; // pointer to a\
    \ vector of associated points\n    int _nPoints; // number of points in this graph\n\
    \    double _sliderValue; // the value of the slider widget\n    int _clickedNode;\
    \ // node that was last clicked\n    int _deleteEdgeMode; // 1 if the current\
    \ mode is \"delete edge\"\n}\n\n-(void) refreshView;\n-(void)setBezierPaths;\n\
    -(NSBezierPath *) getPath;\n-(void)startDeleteEdgeMode;\n-(Graph *) getGraph;\n\
    -(IBAction)sliderChanged:(id)sender;\n-(void) refreshView;\n-(void)drawNodeNumbers;\n\
    -(int)findClickedNode:(NSPoint)loc;\n-(void)moveNode:(int)clickedNode to:(NSPoint)loc;\n\
    -(void)addSobreposedGraphToPath;\n-(void)addGraphToPath;\n-(void)mouseMoved:(NSEvent\
    \ *)theEvent;\n\n@end\n```\n\n请注意，该文件与 Cocoa 应用程序中的大多数文件一样，以命令 `#import <Cocoa/Cocoa.h>`\
    \ 开头。随后你会看到一个必要的变量列表，其中包含 Xcode 使用的一些出口。在声明的方法中，你还可以看到一个在界面设计阶段使用的操作。\n"
- fmt: "### The `GraphView` Implementation\n\nThis file is at the heart of the drawing\
    \ application you are exploring. The class defined here, `GraphView`, is a subclass\
    \ of `NSView`. As you have seen before, `NSView` is responsible for managing an\
    \ area of the screen. In this case, `GraphView` manages all the area of the editor,\
    \ being responsible for editing operations from users. This class manages events\
    \ such as keyboard, mouse movements, and window resize operations, for example.\n\
    \nThe file starts with a few useful definitions, such as `min` and `max` that\
    \ will be used in some calculations later in this class implementation. A few\
    \ functions are defined in pure C for additional speed, but most of the file implements\
    \ the `GraphView` class using Objective-C methods.\n\n```\n#import \"GraphView.h\"\
    \n#import \"MyDocument.h\"\n#include <common.h>\n#define NODE_RADIUS 4\n#define\
    \ min(x,y) (x<y ? x : y)\n#define max(x,y) (x>y ? x : y)\nstatic int change_points_associated_to_edges(graph_node\
    \ *graph_node, int a, int b, void *data);\nstatic int find_edge_at_point(graph_node\
    \ *graph_node, int a, int b, void *data);\nstruct for_each_edge_data {\n    Graph\
    \ *G;\n    int movedNode;\n    int secondMovedNode;\n    int edgeFound;\n    NSPoint\
    \ *loc;\n    NSBezierPath *path;\n    NSBezierPath *sg_path;\n    GraphView *v;\n\
    \    double sliderValue;\n};\n```\n\nThe `for_each_edge_data` struct is used to\
    \ store useful information about edges of the graph. An edge is just a line connecting\
    \ two nodes in the graph. This struct is used to store data that needs to be quickly\
    \ accessed by the methods of `GraphView`.\n\n```\n@implementation GraphView\n\
    /***************************************\n * Generic options for the window.\n\
    \ ***************************************/\n// This is necessary to say that we\
    \ want to use a coordinate\n// system with origin in the upper left corner.\n\
    - (BOOL)isFlipped\n{\n    return NO; // should be YES to change\n}\n\n// This\
    \ is necessary to say that we want to process\n// keyboard events\n- (BOOL)acceptsFirstResponder\n\
    {\n    return YES;\n}\n```\n\nThese two methods override the existing options\
    \ from `NSView`. The first one determines that the coordinate system used by the\
    \ view is not inverted with relation to the default coordinate system. The default\
    \ coordinate system starts in the upper left corner. You can try to flip it to\
    \ get a more conventional coordinate system that starts in the lower left corner.\n\
    \nThe second method determines that this view accepts first responder. This means\
    \ that you are able to send keyboard commands directly to the view, among other\
    \ events that depend on the first responder.\n\n```\n/***************************************\n\
    \ * Initialization of window and structures.\n ***************************************/\n\
    // initialize the window.\n// Note: This is called after initWithFrame:\n-(void)awakeFromNib\n\
    {\n    [[self window] setAcceptsMouseMovedEvents:YES];\n\n    // create the path\
    \ (retain avoids the path being GC'ed after return of method)\n    path = [[NSBezierPath\
    \ bezierPath] retain];\n    sg_path = [[NSBezierPath bezierPath] retain];\n  \
    \  transform = [[NSAffineTransform transform] retain];\n\n    _associatedPoints\
    \ = 0;\n    _sliderValue = 1.0;\n    _clickedNode = 0;\n    _deleteEdgeMode =\
    \ 0;\n\n    [self setBezierPaths];\n}\n```\n\nThe method `awakeFromNib` overrides\
    \ the same name on the parent class. In `awakeFromNib`, you should do any initialization\
    \ necessary before the view is displayed. This method is called right after the\
    \ nib file has been used to create the UI. This means that at this point all properties\
    \ and connections in the nib have been restored and are accessible to the `NSView`.\n\
    \nThis code is calling methods to establish the initial status of the `GraphView`.\
    \ For example, you can see two of the variables storing a new object of `NSBezierPath`.\
    \ This object will be later on used to create Bezier curves. The method also allocates\
    \ an `NSAffineTransform` object, which will be used to transform the location\
    \ and size of nodes and edges on the `GraphView`."
