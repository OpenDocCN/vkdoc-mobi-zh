- fmt: "# Part 1  \nThe Language  \n\n# 1. The C in Objective-C  \n\n## Abstract \
    \ \n\nIn this chapter, we will introduce the main concepts common to the Objective-C\
    \ and C languages. Objective-C is based on the original C language. As a result\
    \ of this special relationship, any program that is valid C code is also valid\
    \ from Objective-C's perspective. This is why it is so important to be familiar\
    \ with the basics of C, as well as how they relate to areas of object oriented\
    \ programming, such as classes, messages, and interfaces.  \n\nTopics such as\
    \ arrays, structures, pointers, variable declarations, variable types, and functions\
    \ are part of the common vocabulary shared by these languages. Programmers who\
    \ are fluent in such basic Objective-C techniques have a much better time at understanding\
    \ and using object-oriented concepts.  \n\nTo get you up to speed with the advanced\
    \ abilities of Objective-C, we start the book with an overview of the most frequently\
    \ used features inherited from the C language. In the next sections, you will\
    \ see how to use such fundamental techniques to create simple programs that will\
    \ be the building blocks of your future Objective-C applications.  \n\n> **Note**\
    \  \n> As you read the next few sections, please keep in mind the implicit assumption\
    \ that every feature discussed here as being part of Objective-C is also available\
    \ in plain C. This will be true throughout this chapter, unless explicitly stated.\
    \  \n\n## Simple Statements  \n\nPrograms in Objective-C are composed of syntactical\
    \ elements that may be further categorized into functions, classes, and variable\
    \ declarations. Functions contain statements, or variable declarations. Each statement\
    \ in the language is ended by a semicolon or is enclosed in brackets (in the case\
    \ of compound statements), which makes them easy to recognize by both human beings\
    \ and compilers. Unlike languages that use indentation to define the possible\
    \ end of declarations, Objective-C has an unambiguous way to mark their end using\
    \ semicolons. For example, here are a few valid statements and variable declarations\
    \ (their meaning will be explained in later sections):  \n\n```\nint numberOfEmployees;\n\
    double totalPayment;\ntotalPayment = numberOfEmployees * 1000;\nNSLog(@\"test\
    \ log\");\nif (1 > 2) totalPayment = totalPayment + 10;\n```\n\nEach of these\
    \ lines is either defining an executable instruction or declaring an entity that\
    \ will be later used by the program. We will examine in detail the syntax used\
    \ in each of these cases, but for now it is important to recognize the nature\
    \ of Objective-C statements and how they combine to create valid programs.  \n\
    \n## Variables  \n\nA variable is a location in memory where values can be saved\
    \ and modified. Variables in Objective-C have to be of a particular type, which\
    \ is explicitly defined when the variable is declared. Here are a few examples:\
    \  \n\n```\nint anIntegerVariable;\nfloat aFloatingNumber;\n```\n\nNote that the\
    \ variable type is the first element in the declaration. The name of the variable\
    \ follows, ended by semicolon, which marks the end-of-statement character. These\
    \ two variable declarations create an integer and a floating number variable.\
    \ Integer variables are required to contain only whole numbers, and the compiler\
    \ will check that this is always the case. Even when a programmer forces a value\
    \ of a different type into an integer variable, the content will still be converted\
    \ to an integer number in all expressions where they appear.  \n\nMore than one\
    \ variable can be declared in a single statement. This is done by having additional\
    \ variable names in the same statement, separated by commas. Here is another example\
    \ showing multiple variables declared in the same expression:  \n\n```\nint anIntegerVariable,\
    \ aSecondIntegerVariable;\nbool booleanVariable1, booleanVariable2;\n```\n\nThere\
    \ are a few rules that need to be observed when naming variables. The first rule\
    \ is that variables can start only with alphabetic characters or the underscore\
    \ character. The same is valid for additional characters in a variable name; however,\
