    \ frequently, the local variables comprise the most important memory locations\
    \ for the current algorithm.\n\n![A978-1-4302-5906-0_15_Fig2_HTML.jpg](A978-1-4302-5906-0_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2.  \nEditing the value of a local variable in the Variables view\n\
    \nOnce you have access to the local variables in a particular context, you can\
    \ drill down on their contents, so as to reveal instance variables for each object\
    \ stored locally. Similarly, you can observe the contents of structures by clicking\
