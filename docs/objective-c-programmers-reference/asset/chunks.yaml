    classes in Objective-C. Using categories and protocols, it is possible to extend
    the capabilities of classes created by yourself, as well as other classes that
    already exist in libraries shipped with the system or from third-party vendors.


    Categories support the addition of methods to the interface of an existing class.
    As long as you provide the code for the extension methods—along with a header
    file with the category definition—other classes can use the category methods as
    if they were part of the original class. This provides a great way to customize
    common classes, such as `NSArray` or `NSString`, with code that is useful in the
    context of your applications.


    Protocols provide a way for classes to define a limited interface that will be
    used only by a particular service. A protocol may be defined in an informal way,
    by just listing one or more methods that need to be part of the interface. To
    implement such an informal protocol, classes can provide a set of empty implementations
    through a category, usually attached to `NSObject`. A second technique is to check
    if the required methods exist on the target object, using the runtime API provided
    by Objective-C.


    A formal protocol is defined with a syntax that is similar to a class declaration.
    However, its main goal is to define a simple interface that can be independently
    implemented by other classes. Much of the Objective-C libraries rely upon protocols
    to provide services without the necessity of adding new classes for each new feature.
    For example, Cocoa uses protocols as the main tool to define delegates for UI
    components.


    Categories and protocols show some of the dynamic aspects of objective-C, but
    they only scratch the surface of the possibilities. In the next chapter, you will
    investigate more deeply the concept of dynamic binding and see what it can help
    you accomplish.


    # 5. Inheritance


    Abstract


    In the previous chapters you explored some of the basic ideas of object-oriented
    programming in Objective-C. As you have seen, OOP is the main software development
    concept that motivated the creation of the language. A chief feature of OOP is
    the ability to create new classes that inherit methods, variables, and properties
    from other existing classes. You see, then, that to master the language you need
    to attain a good working knowledge of the concept of class-based inheritance.


    In the previous chapters you explored some of the basic ideas of object-oriented
    programming in Objective-C. As you have seen, OOP is the main software development
    concept that motivated the creation of the language. A chief feature of OOP is
    the ability to create new classes that inherit methods, variables, and properties
    from other existing classes. You see, then, that to master the language you need
    to attain a good working knowledge of the concept of class-based inheritance.


    The proper use of inheritance, however, requires a certain amount of attention
    both during the design phase as well as with the implementation of base and derived
    classes. In this chapter you will explore topics related to inheritance in Objective-C,
    covering some of the necessary background required to design effective class hierarchies.


    You will take a more in-depth look at how inheritance works, along with the mechanism
    of method overriding among classes in the same hierarchy. Furthermore, you will
    see how to address some issues raised by the way inheritance is implemented in
    Objective-C. For example, you will learn how to simulate the use of multiple-inheritance,
    or how to avoid deep class hierarchies.'
  trans: "\n请注意，在此版本的 `findLoan:` 中，你无需担心 `canLend:` 和 `lendRequest:toLoaner:` 方法是否已定义。一旦编译器知道属性\
    \ `loanSource` 指向一个实现了该协议的对象，这两个方法就可以在编译时进行验证。最后一步则是创建正确的对象，并利用它来初始化 `loanSource`\
    \ 属性。\n\n```\n- (void) useLoanSource\n{\n    AccreditedLoanSource *loanSource\
    \ = [[AccreditedLoanSource alloc] init];\n    InvestmentAdvisor *advisor = [[InvestmentAdvisor\
    \ alloc] init];\n    advisor.loanSource = loanSource;\n    BOOL res = [advisor\
    \ findLoan:10000];\n    NSLog(@\"result is %d\", res);\n    [advisor release];\n\
    \    [loanSource release];\n}\n```\n\n请注意，这里唯一真正的区别在于创建 `loanSource` 对象的方式，该对象现在提供了对\
    \ `MoneyLender` 协议的完整实现。\n\n**注意**\n\n一个实例变量或属性，如果它实现了当前类所需的某些功能，并由外部使用者提供，则称为委托。例如，`loanSource`\
    \ 属性就是 `InvestmentAdvisor` 类的委托。要求委托实现特定协议是 Objective-C 库中常用的一种惯用方式。例如，Cocoa 框架要求用户定义委托，以提供与\
    \ GUI 对象相关的大部分功能。\n\n## 可选方法\n\n在正式协议中，可以定义方法是必需的还是可选的。编译器会检查必需方法，如果该方法不存在，则会发出警告。可选方法可以在实现协议的类中省略。\n\
    \n可以为协议成员声明两种不同的必需级别。\n\n- **必需方法**：这些方法需要在每个实现该协议的对象中都存在。你可以将这些方法视为提供定义该协议的基本功能。未经限定包含在协议中的方法被视为必需方法。此外，任何跟在\
    \ `@required` 关键字之后的方法都被认为是必需的。\n- **可选方法**：这些方法可能提供一些对于协议定义并非必需的功能。实现协议的类可以自由选择包含或排除这些方法。可选方法通过\
    \ `@optional` 关键字来定义。所有跟在 `@optional` 关键字之后的方法都被视为可选方法。\n\n当使用可选方法时，你需要确定它们在目标对象中是否已被定义。实现此目的的方法与你使用非正式协议时的做法类似：只需向目标对象发送一条\
    \ `respondsToSelector:` 消息，以检查该方法是否可用。例如，假设你想向 `MoneyLender` 协议添加一个可选方法。\n\n```\n\
    @protocol MoneyLender\n@optional\n- (BOOL) canExtendLoan;\n@required\n- (BOOL)\
    \ canLend:(float)amount;\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;\n\
    @end\n```\n\n现在，你可以编写使用 `canExtendLoan:` 方法的代码，但前提是需先测试其是否存在。\n\n```\n- (BOOL)\
    \ checkLoan\n{\n    if ([self.loanSource respondsToSelector:@selector(canExtendLoan)])\n\
    \    {\n        if ([self.loanSource canExtendLoan])\n        {\n            NSLog(@\"\
    The loan can be extended\");\n            return YES;\n        }\n    }\n    return\
    \ NO;\n}\n```\n\n## 总结\n\n在本章中，我介绍了关于设计高效 Objective-C 类时两个最重要的主题。使用分类和协议，可以扩展你自己创建的类的能力，以及系统自带或第三方供应商提供的库中已有的其他类的能力。\n\
    \n分类支持向现有类的接口添加方法。只要你提供了扩展方法的代码——以及包含分类定义的头文件——其他类就可以使用分类方法，就好像它们是原始类的一部分一样。这为定制通用类（例如\
    \ `NSArray` 或 `NSString`）提供了一种很好的方式，使其包含在你的应用程序上下文中很有用的代码。\n\n协议为类提供了一种定义有限接口的方式，该接口将仅由特定服务使用。协议可以通过仅列出一个或多个需要成为接口一部分的方法来以非正式方式定义。要实现这样的非正式协议，类可以通过一个分类（通常附加到\
    \ `NSObject` 上）提供一组空的实现。第二种技术是使用 Objective-C 提供的运行时 API，检查目标对象上是否存在必需的方法。\n\n\
    正式协议使用类似于类声明的语法进行定义。然而，其主要目标是定义一个简单的接口，该接口可以由其他类独立实现。Objective-C 库在很大程度上依赖协议来提供服务，而无需为每个新功能添加新类。例如，Cocoa\
    \ 使用协议作为定义 UI 组件委托的主要工具。\n\n分类和协议展示了 Objective-C 的一些动态特性，但它们只是触及了可能性的表面。在下一章中，你将更深入地研究动态绑定的概念，并了解它如何帮助你实现目标。\n\
    \n# 5. 继承\n\n## 摘要\n\n在前面的章节中，你探索了 Objective-C 中面向对象编程的一些基本概念。正如你所见，OOP 是促使该语言创建的主要软件开发概念。OOP\
    \ 的一个主要特性是能够创建从其他现有类继承方法、变量和属性的新类。因此，要精通这门语言，你需要对基于类的继承概念有良好的工作知识。\n\n然而，正确使用继承，无论是在设计阶段还是在基类和派生类的实现阶段，都需要投入一定的注意力。在本章中，你将探索与\
    \ Objective-C 中继承相关的主题，涵盖设计高效类层次结构所需的一些必要背景知识。\n\n你将更深入地了解继承是如何工作的，以及同一层次结构中类之间的方法重写机制。此外，你还会看到如何解决因\
    \ Objective-C 中继承实现方式而引发的一些问题。例如，你将学习如何模拟多继承的使用，或者如何避免过深的类层次结构。\n"
- fmt: "# The Concept of Inheritance\n\nClasses describe the general behavior of objects.\
    \ In an OO language, a class works as a blueprint for objects that will be created\
    \ and maintained by the system. By defining a new class, you outline a list of\
    \ behaviors that objects of that type respond to, as well as the data storage\
    \ available to each object. As such, a class introduces an independent unit of\
    \ code that the rest of the application can use and interact with.\n\nJust being\
    \ able to create objects of a given type would be enough to deliver great functionality,\
    \ and it would offer overall impressive software quality in itself. However, creating\
    \ and using new objects is not sufficient to simplify the process of producing\
    \ classes with more complex behavior. Let’s look at a characteristic example,\
    \ where you want to define a class for the concept of `Employee`.\n\n```\n// file\
    \ Employee.h\n\n@interface Employee : NSObject\n\n{\nNSString *name;\n}\n\n- (void)\
    \ setName:(NSString*) aName;\n- (double) calculateSalary;\n\n@end\n```\n\nHere\
    \ is the corresponding implementation file:\n\n```\n// file Employee.m\n\n@implementation\
    \ Employee\n\n- (void) setName:(NSString*) aName\n\n{\n\nself->name = aName;\n\
    \n}\n\n- (double) calculateSalary\n\n{\n\ndouble salary = 0;\n\n// perform salary\
    \ calculation\n\nreturn salary;\n\n}\n\n@end\n```\n\nWith these definitions, it\
    \ becomes very easy to create and use objects with the behavior specified by the\
    \ `Employee` class. As you have seen in the previous chapters, you can just send\
    \ a pair of `alloc/init` messages to the `Employee` class to create a new object\
    \ of that particular type.\n\nHowever, suppose that you are interested instead\
    \ in using a slightly modified version of `Employee`, one that was not envisioned\
    \ by the creators of the original class. For example, you may want to represent\
    \ an hourly employee, one that receives a salary that depends on the number of\
    \ hours worked, instead of a fixed value determined every year. Without inheritance,\
    \ you would be forced to create a new, separate class for that concept.\n\n```\n\
    // HourlyEmployee.h\n\n@interface HourlyEmployee: NSObject\n\n{\nNSString *name;\n\
    int hoursPerWeek;\n}\n\n- (void) setName:(NSString*) aName;\n- (double) calculateSalary;\n\
    - (int) getHoursPerWeek;\n\n@end\n```\n\n```\n// HourlyEmployee.m\n\n@implementation\
    \ HourlyEmployee\n\n- (void) setName:(NSString*) aName\n\n{\n\nself->name = aName;\n\
    \n}\n\n- (double) calculateSalary\n\n{\n\ndouble salary = 0;\n\n// perform salary\
    \ calculation for hourly employee\n\nreturn salary;\n\n}\n\n- (int) getHoursPerWeek\n\
    \n{\n\n// return number of hours\n\n}\n\n@end\n```\n\nThis definition and the\
    \ contents of the class would be very similar to those used in the `Employee`\
    \ class, with just a small number of modifications to account for the variances\
    \ between the two concepts. In an application that depends on the definition of\
    \ objects that are, in some ways, variations on a basic concept, this would amount\
    \ to a huge code duplication—leading to programs that are both hard to create\
    \ and maintain. The reuse of existing code in such a situation would be hard to\
    \ accomplish because most of the interface for these classes would need to be\
    \ replicated across the system.\n\nNow, consider the same class using the concept\
    \ of inheritance:\n\n```\n// file HourlyEmployee.h\n\n@interface HourlyEmployee\
    \ : Employee\n\n- (int) getHoursPerWeek;\n\n@end\n```\n\n```\n// file HourlyEmployee.m\n\
    \n@implementation HourlyEmployee\n\n- (double) calculateSalary\n\n{\n\ndouble\
    \ salary = 0;\n\n// perform salary calculation, as discussed later\n\nreturn salary;\n\
    \n}\n\n- (int) getHoursPerWeek\n\n{\n\n// return number of hours\n\n}\n\n@end\n\
    ```\n\nNow `HourlyEmployee` is not a free class in the system; instead it depends\
    \ directly on the definitions provided by `Employee`. The main benefit of this\
    \ organization is that you won’t need to repeat every method and instance variable\
    \ contained in the original class. Not only the interface, but also the implementation\
    \ of the methods in the base class are also inherited, so that a programmer can\
    \ concentrate on the aspects of `HourlyEmployee` that are unlike what is found\
    \ in the original class—instead of having to codify again any existing functionality.\n\
    \nNotice also that, as a result of Objective-C type system, `HourlyEmployee` can\
    \ be used whenever an `Employee` object is required. This means that you can also\
    \ take advantage of any available method that in some way provides a service for\
    \ `Employee` objects. On the other hand, as you will see in a later section, this\
    \ type of substitution is not free: it requires that classes derived from a given\
    \ subclass also subscribe to the same contract that is defined in the original\
    \ class.\n\n## Inheritance and Overriding\n\nOverriding is the action of replacing\
    \ a method from a superclass with a more specific version of itself. Overriding\
    \ methods is the primary way by which you can customize the behavior of the classes\
    \ participating in a hierarchy.\n\nIn Objective-C, any method can be overridden.\
    \ It doesn’t make any difference if the method is part of class in your application\
    \ or in a third party framework. The only requirement is that the overriding method\
    \ needs to use the same keyword names and arguments as the original one.\n\nA\
    \ peculiarity about overridden methods in Objective-C is that you don’t need to\
    \ mention them in the interface of a subclass. Consider again an `Employee`. Suppose\
    \ that you want to introduce another subclass called `Contractor`. In that case,\
    \ you would like to adjust the implementation so that it reflects the different\
    \ responsibilities of a contractor. For illustration purposes, let’s assume that\
    \ the original class will be augmented with the `provideJobEvaluation` method,\
    \ like so:\n\n```\n// file Employee.h\n\n@interface Employee : NSObject\n\n{\n\
    \       NSString *name;\n}\n\n- (void) setName:(NSString*) aName;\n- (double)\
    \ calculateSalary;\n- (void) provideJobEvaluation;\n\n@end\n```\n\nThis method\
    \ is used to create a routine, internal evaluation for each completed job. Now\
    \ let’s see how you could declare an interface for the `Contractor` class:\n\n\
    ```\n// file Contractor.h\n\n@interface Contractor : Employee\n\n{\n       NSString\
    \ *thirdPartyCompany;\n}\n\n@end\n```\n\nIt is clear from here that the `Contractor`\
    \ has additional storage needs. However, there is no indication here that the\
    \ `Contractor` class is implementing a new version of any of the methods in Employee.\
    \ This doesn’t make any difference for users of this class, however. In the implementation\
    \ section, you are free to override any of the methods in the parent class.\n\n\
    ```\n// file Employee.m\n\n@implementation Contractor\n\n- (void) provideJobEvaluation\n\
    \n{\n       // steps for contract job evaluation here\n}\n\n@end\n```\n\nWith\
    \ this definition, whenever a new object of class `Contractor` is created, the\
    \ `provideJobEvaluation` method will perform the correct calculation for a contract,\
    \ even though the override was not explicit in the class interface. The same can\
    \ also be said for categories. For example, you could create a new category for\
    \ `Contractor` that would declare yet another adjustment for the class behavior,\
    \ like so:\n\n```\n// Contractor+NameHanding.h\n\n@interface Contractor (NameHanding)\n\
    \n  // no new methods declared here\n\n@end\n```\n\nIt would have the following\
    \ implementation:\n\n```\n// file Contractor+NameHanding.m\n\n@implementation\
    \ Contractor (NameHanding)\n\n- (void) setName:(NSString*) aName\n\n{\n      \
    \ self->name = [NSString stringWithFormat:@\"contractor %@\", aName];\n}\n\n@end\n\
    ```\n\nThis would change how names are displayed for any contractor created in\
    \ the application, as a result of overriding the `setName`: method."
  raw: '## The Concept of Inheritance


    Classes describe the general behavior of objects. In an OO language, a class works
    as a blueprint for objects that will be created and maintained by the system.
    By defining a new class, you outline a list of behaviors that objects of that
    type respond to, as well as the data storage available to each object. As such,
    a class introduces an independent unit of code that the rest of the application
    can use and interact with.


    Just being able to create objects of a given type would be enough to deliver great
    functionality, and it would offer overall impressive software quality in itself.
    However, creating and using new objects is not sufficient to simplify the process
    of producing classes with more complex behavior. Let’s look at a characteristic
    example, where you want to define a class for the concept of `Employee`.


    `// file Employee.h`


    `@interface Employee : NSObject`


    `{`


    `NSString *name;`


    `}`


    `- (void) setName:(NSString*) aName;`


    `- (double) calculateSalary;`


    `@end`


    Here is the corresponding implementation file:


    `// file Employee.m`


    `@implementation Employee`


    `- (void) setName:(NSString*) aName`


    `{`


    `self->name = aName;`


    `}`


    `- (double) calculateSalary`


    `{`


    `double salary = 0;`


    `// perform salary calculation`


    `return salary;`


    `}`


    `@end`


    With these definitions, it becomes very easy to create and use objects with the
    behavior specified by the `Employee` class. As you have seen in the previous chapters,
    you can just send a pair of `alloc/init` messages to the `Employee` class to create
    a new object of that particular type.


    However, suppose that you are interested instead in using a slightly modified
    version of `Employee`, one that was not envisioned by the creators of the original
    class. For example, you may want to represent an hourly employee, one that receives
    a salary that depends on the number of hours worked, instead of a fixed value
    determined every year. Without inheritance, you would be forced to create a new,
    separate class for that concept.


    `// HourlyEmployee.h`


    `@interface HourlyEmployee: NSObject`


    `{`


    `NSString *name;`


    `int hoursPerWeek;`


    `}`


    `- (void) setName:(NSString*) aName;`


    `- (double) calculateSalary;`


    `- (int) getHoursPerWeek;`


    `@end`


    `// HourlyEmployee.m`


    `@implementation HourlyEmployee`


    `- (void) setName:(NSString*) aName`


    `{`


    `self->name = aName;`


    `}`


    `- (double) calculateSalary`


    `{`


    `double salary = 0;`


    `// perform salary calculation for hourly employee`


    `return salary;`


    `}`


    `- (int) getHoursPerWeek`


    `{`


    `// return number of hours`


    `}`


    `@end`


    This definition and the contents of the class would be very similar to those used
    in the `Employee` class, with just a small number of modifications to account
    for the variances between the two concepts. In an application that depends on
    the definition of objects that are, in some ways, variations on a basic concept,
    this would amount to a huge code duplication—leading to programs that are both
    hard to create and maintain. The reuse of existing code in such a situation would
    be hard to accomplish because most of the interface for these classes would need
    to be replicated across the system.


    Now, consider the same class using the concept of inheritance:


    `// file HourlyEmployee.h`


    `@interface HourlyEmployee : Employee`


    `- (int) getHoursPerWeek;`


    `@end`


    `// file HourlyEmployee.m`


    `@implementation HourlyEmployee`


    `- (double) calculateSalary`


    `{`


    `double salary = 0;`


    `// perform salary calculation, as discussed later`


    `return salary;`


    `}`


    `- (int) getHoursPerWeek`


    `{`


    `// return number of hours`


    `}`


    `@end`


    Now `HourlyEmployee` is not a free class in the system; instead it depends directly
    on the definitions provided by `Employee`. The main benefit of this organization
    is that you won’t need to repeat every method and instance variable contained
    in the original class. Not only the interface, but also the implementation of
    the methods in the base class are also inherited, so that a programmer can concentrate
    on the aspects of `HourlyEmployee` that are unlike what is found in the original
    class—instead of having to codify again any existing functionality.


    Notice also that, as a result of Objective-C type system, `HourlyEmployee` can
    be used whenever an `Employee` object is required. This means that you can also
    take advantage of any available method that in some way provides a service for
    `Employee` objects. On the other hand, as you will see in a later section, this
    type of substitution is not free: it requires that classes derived from a given
    subclass also subscribe to the same contract that is defined in the original class.


    ## Inheritance and Overriding


    Overriding is the action of replacing a method from a superclass with a more specific
    version of itself. Overriding methods is the primary way by which you can customize
    the behavior of the classes participating in a hierarchy.


    In Objective-C, any method can be overridden. It doesn’t make any difference if
    the method is part of class in your application or in a third party framework.
    The only requirement is that the overriding method needs to use the same keyword
    names and arguments as the original one.


    A peculiarity about overridden methods in Objective-C is that you don’t need to
    mention them in the interface of a subclass. Consider again an `Employee`. Suppose
    that you want to introduce another subclass called `Contractor`. In that case,
    you would like to adjust the implementation so that it reflects the different
    responsibilities of a contractor. For illustration purposes, let’s assume that
    the original class will be augmented with the `provideJobEvaluation` method, like
    so:


    `// file Employee.h`


    `@interface Employee : NSObject`


    `{`


           `NSString *name;`


    `}`


    `- (void) setName:(NSString*) aName;`


    `- (double) calculateSalary;`


    `- (void) provideJobEvaluation;`


    `@end`


    This method is used to create a routine, internal evaluation for each completed
    job. Now let’s see how you could declare an interface for the `Contractor` class:


    `// file Contractor.h`


    `@interface Contractor : Employee`


    `{`


           `NSString *thirdPartyCompany;`


    `}`


    `@end`


    It is clear from here that the `Contractor` has additional storage needs. However,
    there is no indication here that the `Contractor` class is implementing a new
    version of any of the methods in Employee. This doesn’t make any difference for
    users of this class, however. In the implementation section, you are free to override
    any of the methods in the parent class.


    `// file Employee.m`


    `@implementation Contractor`


    `- (void) provideJobEvaluation`


    `{`


           `// steps for contract job evaluation here`


    `}`


    `@end`


    With this definition, whenever a new object of class `Contractor` is created,
    the `provideJobEvaluation` method will perform the correct calculation for a contract,
    even though the override was not explicit in the class interface. The same can
    also be said for categories. For example, you could create a new category for
    `Contractor` that would declare yet another adjustment for the class behavior,
    like so:


    `// Contractor+NameHanding.h`


    `@interface Contractor (NameHanding)`


      `// no new methods declared here`


    `@end`


    It would have the following implementation:


    `// file Contractor+NameHanding.m`


    `@implementation Contractor (NameHanding)`


    `- (void) setName:(NSString*) aName`


    `{`


           `self->name = [NSString stringWithFormat:@"contractor %@", aName];`


    `}`


    `@end`


    This would change how names are displayed for any contractor created in the application,
    as a result of overriding the `setName`: method.'
  trans: "\n# 继承的概念\n\n类描述了对象的通用行为。在面向对象语言中，类充当了将由系统创建和维护的对象的蓝图。通过定义一个新类，你可以勾勒出该类对象能够响应的一系列行为，以及每个对象可用的数据存储空间。因此，类引入了一个独立的代码单元，应用程序的其他部分可以与之交互和调用。\n\
    \n仅仅能够创建特定类型的对象就已经能够提供强大的功能，并且本身就能带来令人印象深刻的整体软件质量。然而，创建和使用新对象并不足以简化生成具有更复杂行为的类的过程。让我们来看一个典型示例，假设你想为`Employee`（员工）这个概念定义一个类。\n\
    \n```\n// 文件 Employee.h\n\n@interface Employee : NSObject\n\n{\nNSString *name;\n\
    }\n\n- (void) setName:(NSString*) aName;\n- (double) calculateSalary;\n\n@end\n\
    ```\n\n以下是相应的实现文件：\n\n```\n// 文件 Employee.m\n\n@implementation Employee\n\n- (void)\
    \ setName:(NSString*) aName\n\n{\n\nself->name = aName;\n\n}\n\n- (double) calculateSalary\n\
    \n{\n\ndouble salary = 0;\n\n// 执行薪资计算\n\nreturn salary;\n\n}\n\n@end\n```\n\n\
    有了这些定义，创建和使用具有`Employee`类所指定行为的对象就变得非常容易。正如你在前几章中所见，只需向`Employee`类发送一对`alloc/init`消息，即可创建该特定类型的新对象。\n\
    \n然而，假设你实际上想使用一个经过略微修改的`Employee`版本，一个原始类的创建者未曾预想到的变体。例如，你可能想表示一个按小时计酬的员工，其薪资取决于工作的小时数，而不是每年确定的固定值。如果没有继承，你将被迫为这个概念创建一个独立的新类。\n\
    \n```\n// HourlyEmployee.h\n\n@interface HourlyEmployee: NSObject\n\n{\nNSString\
    \ *name;\nint hoursPerWeek;\n}\n\n- (void) setName:(NSString*) aName;\n- (double)\
    \ calculateSalary;\n- (int) getHoursPerWeek;\n\n@end\n```\n\n```\n// HourlyEmployee.m\n\
    \n@implementation HourlyEmployee\n\n- (void) setName:(NSString*) aName\n\n{\n\n\
    self->name = aName;\n\n}\n\n- (double) calculateSalary\n\n{\n\ndouble salary =\
    \ 0;\n\n// 为按小时计酬的员工执行薪资计算\n\nreturn salary;\n\n}\n\n- (int) getHoursPerWeek\n\
    \n{\n\n// 返回工作小时数\n\n}\n\n@end\n```\n\n这个类的定义和内容将与`Employee`类中使用的非常相似，只需进行少量修改以体现两个概念之间的差异。在一个依赖于某些方面是基本概念变体的对象定义的应用程序中，这将导致大量的代码重复——致使程序既难创建又难维护。在这种情况下，重用现有代码会非常困难，因为此类的大部分接口都需要在系统中重复编写。\n\
    \n现在，看看使用继承概念的同一个类：\n\n```\n// 文件 HourlyEmployee.h\n\n@interface HourlyEmployee\
    \ : Employee\n\n- (int) getHoursPerWeek;\n\n@end\n```\n\n```\n// 文件 HourlyEmployee.m\n\
    \n@implementation HourlyEmployee\n\n- (double) calculateSalary\n\n{\n\ndouble\
    \ salary = 0;\n\n// 执行薪资计算，后续会讨论\n\nreturn salary;\n\n}\n\n- (int) getHoursPerWeek\n\
    \n{\n\n// 返回工作小时数\n\n}\n\n@end\n```\n\n现在，`HourlyEmployee`不再是系统中一个独立的类；相反，它直接依赖于`Employee`提供的定义。这种组织方式的主要好处是，你无需重复原始类中包含的每个方法和实例变量。基类中的接口以及方法的实现都会被继承，这样程序员就可以专注于`HourlyEmployee`与原始类不同的方面——而不是重新编写已有的功能。\n\
    \n另外请注意，作为 Objective-C 类型系统的结果，在任何需要`Employee`对象的地方都可以使用`HourlyEmployee`。这意味着你还可以利用任何以某种方式为`Employee`对象提供服务的已有方法。另一方面，正如你将在后续章节中看到的，这种替换并非没有代价：它要求派生自给定子类的类也必须遵守原始类中定义的同一契约。\n\
    \n## 继承与重写\n\n重写是用一个更具体的版本来替换超类中某个方法的行为。重写方法是自定义参与继承层次的类行为的主要方式。\n\n在 Objective-C\
    \ 中，任何方法都可以被重写。无论该方法是你应用程序中的类的一部分，还是来自第三方框架，都没有区别。唯一的限制是重写的方法需要使用与原始方法相同的关键字名称和参数。\n\
    \nObjective-C 中关于重写方法的一个特殊之处在于，你无需在子类的接口中提及它们。再次考虑`Employee`。假设你想引入另一个名为`Contractor`（承包商）的子类。在这种情况下，你希望调整实现，以反映承包商的职责差异。为了说明，我们假设原始类将增加`provideJobEvaluation`方法，如下所示：\n\
    \n```\n// 文件 Employee.h\n\n@interface Employee : NSObject\n\n{\n       NSString\
    \ *name;\n}\n\n- (void) setName:(NSString*) aName;\n- (double) calculateSalary;\n\
    - (void) provideJobEvaluation;\n\n@end\n```\n\n该方法用于为每项已完成的工作创建一个常规的内部评估。现在来看如何为`Contractor`类声明接口：\n\
    \n```\n// 文件 Contractor.h\n\n@interface Contractor : Employee\n\n{\n       NSString\
    \ *thirdPartyCompany;\n}\n\n@end\n```\n\n从这里可以清楚地看出，`Contractor` 有额外的存储需求。然而，这里并没有任何指示表明\
    \ `Contractor` 类实现了 `Employee` 中任何方法的新版本。不过，这对该类的使用者来说并没有影响。在实现部分，你可以自由地重写父类中的任何方法。\n\
    \n```\n// 文件 Employee.m\n\n@implementation Contractor\n\n- (void) provideJobEvaluation\n\
    \n{\n       // 此处执行合同工作的评估步骤\n}\n\n@end\n```\n\n通过这个定义，每当创建`Contractor`类的新对象时，`provideJobEvaluation`方法将为合同工作执行正确的计算，即使该重写在类接口中并未显式声明。这一点对于分类（categories）也同样适用。例如，你可以为`Contractor`创建一个新的分类，该分类将再次调整类的行为，如下所示：\n\
    \n```\n// Contractor+NameHanding.h\n\n@interface Contractor (NameHanding)\n\n\
    \  // 此处未声明新方法\n\n@end\n```\n\n它的实现如下：\n\n```\n// 文件 Contractor+NameHanding.m\n\
    \n@implementation Contractor (NameHanding)\n\n- (void) setName:(NSString*) aName\n\
    \n{\n       self->name = [NSString stringWithFormat:@\"contractor %@\", aName];\n\
    }\n\n@end\n```\n\n由于重写了`setName:`方法，这将改变应用中创建的任何承包商的名称显示方式。\n"
- fmt: "### Invoking Methods in Superclasses\n\nAs part of a hierarchy, subclasses\
    \ have access to data and methods inherited from superclasses. This allows objects\
    \ of the subclass, for example, to call any method defined in the classes above\
    \ it in the hierarchy.\n\nWhen the method in the superclass has a different name,\
    \ calling that method is just a matter of sending a message to `self`, using the\
    \ traditional message-sending notation. The message dispatch mechanism will automatically\
    \ find the correct implementation. For example, consider a class that represents\
    \ the type of an entry in the file system.\n\n```\n// file FileType.h\n@interface\
    \ FileType : NSObject\n{\n    // ivars listed here\n}\n- (NSString*) getExtension;\n\
    @end\n\n// file FileType.m\n@implementation FileType\n- (NSString*) getExtension\n\
    {\n    NSString *ext = @\"\";\n    // retrieve extension\n    return ext;\n}\n\
    @end\n```\n\nSuppose now that you are interested in implementing a new subclass\
    \ for documents, which you will call `DocumentType`.\n\n```\n// file DocumentType.h\n\
    @interface DocumentType : FileType\n{\n    // ivars here\n}\n- (BOOL) isValid;\n\
    @end\n\n// file DocumentType.m\n@implementation DocumentType\n-(BOOL)isValid\n\
    {\n    if ([@\"\" isEqualToString:[self getExtension]])\n    {\n        return\
    \ false;\n    }\n    return true;\n}\n@end\n```\n\nIn this example, the `DocumentType`\
    \ class needs to use the method `getExtension` from the superclass. To do this,\
    \ it just needs to send a message to `self`, using the following notation:\n\n\
    ```\n[self getExtension]\n```\n\nNow, suppose that instead you are implementing\
    \ a new version of the `getExtension` method. In this case, you may want to be\
    \ able to call the original version of the method. For example, you may want to\
    \ take the original extension calculated with the `getExtension` method in `FileType`,\
    \ and perform some post-processing to return a modified extension. However, if\
    \ you send the message `getExtension` to `self`, you will end up receiving a recursive\
    \ call, instead of a call to the implementation in the superclass.\n\nTo solve\
    \ this issue, Objective-C introduces the special variable `super`. The goal of\
    \ `super` is to redirect the message-sending mechanism so that a suitable method\
    \ is searched starting from the superclass, instead of the current class. When\
    \ sending a message to `super`, the compiler can detect that the message resolution\
    \ mechanism needs to be slightly changed, in such a way that the message will\
    \ reach the correct method.\n\nNote that when a subclass overrides a method that\
    \ was declared in the superclass, it may be for two reasons:\n\n- **Replacing\
    \ the original behavior with a completely new implementation**: In this case,\
    \ the new behavior is coded totally on the subclass, without any need to refer\
    \ to the original implementation. This is the easiest case to handle, since there\
    \ is no need to interact with the base class to implement the modified method.\n\
    - **Extending the original behavior with additional code**: In this case, it is\
    \ necessary to refer to the original implementation of the method you’re trying\
    \ to override.\n\nIn the second case, a programmer can refer to the implementation\
    \ of a method in the superclass using the special variable `super`. With the help\
    \ of this variable, it is possible to skip the current class level when using\
    \ the message dispatch mechanism. Therefore, the compiler will generate code that\
    \ searches for a match for the required message starting from the parent class,\
    \ instead of the current class. Using `super`, therefore, is a common way to reuse\
    \ code that was written for the base class, while at the same time providing an\
    \ enhanced implementation of the same method. For example, when overriding a method\
    \ from a base class, it is very common to use the following idiom:\n\n```\n- (void)\
    \ overridenMethodName\n{\n    [super overridenMethodName];\n    // additional\
    \ code goes here\n}\n```\n\nThat is, you first call the original method in the\
    \ base class, followed by any additional code necessary to customize the behavior\
    \ of the method.\n\n### Template Methods\n\nMethod overriding is one way of introducing\
    \ polymorphic behavior. However, overriding a single method may not be enough\
    \ to achieve the customization you need. In some cases, the behavior of a class\
    \ is determined by an algorithm with several steps, and each of these steps can\
    \ be customized in an independent way. When that happens, the best strategy is\
    \ to use a template method that embeds the knowledge about the exact sequence\
    \ of steps used by the class.\n\nFor example, consider a class that represents\
    \ a cook. The class has a method called `prepareRecipe`, which performs the main\
    \ steps of food preparation.\n\n```\n// file Cook.h\n@interface Cook : NSObject\n\
    - (void)prepareRecipe;\n- (void)acquireIngredients;\n- (void)mixIngredients;\n\
    - (void)cookDish;\n@end\n```\n\nThe implementation has the basic outline of `prepareRecipe`,\
    \ along with empty implementations for each of the remaining three methods.\n\n\
    ```\n// file Cook.m\n@implementation Cook\n-(void) prepareRecipe\n{\n       [self\
    \ acquireIngredients];\n       [self mixIngredients];\n       [self cookDish];\n\
    }\n- (void)acquireIngredients\n{\n}\n- (void)mixIngredients\n{\n}\n- (void)cookDish\n\
    {\n}\n@end\n```\n\nHere you have a method, `prepareRecipe`, which is called by\
    \ clients of the class. The method, however, is just a shell (or template) that\
    \ calls three other methods where the real work takes place. To implement an instance\
    \ of `Cook` that really does something useful, you need to create a derived class\
    \ first and then implement the three methods (`acquireIngredients`, `mixIngredients`,\
    \ and `cookDish`) in a sensible way.\n\nWhat you have in `Cook` is a class that\
    \ provides a generic interface with three operations, and a method that determines\
    \ the sequence in which these operations will be called. Subclasses are required\
    \ to provide the details for this type of template method to work.\n\n**Note**:\
    \ You can classify the class displayed above as an abstract class. An abstract\
    \ class is one in which an implementation is not provided for one or more of the\
    \ methods of its interface. This might happen for a few reasons: an implementation\
    \ for a feature does not exist at a particular level or you want to force a subclass\
    \ to provide its own implementation. This is the case when a base class needs\
    \ some information that can be supplied only by subclasses."
  raw: '### Invoking Methods in Superclasses


    As part of a hierarchy, subclasses have access to data and methods inherited from
    superclasses. This allows objects of the subclass, for example, to call any method
    defined in the classes above it in the hierarchy.


    When the method in the superclass has a different name, calling that method is
    just a matter of sending a message to self, using the traditional message-sending
    notation. The message dispatch mechanism will automatically find the correct implementation.
    For example, consider a class that represents the type of an entry in the file
    system.


    `// file FileType.h`


    `@interface FileType : NSObject`


    `{`


    `// ivars listed here`


    `}`


    `- (NSString*) getExtension;`


    `@end`


    `// file FileType.m`


    `@implementation FileType`


    `- (NSString*) getExtension`


    `{`


    `NSString *ext = @"";`


    `// retrieve extension`


    `return ext;`


    `}`


    `@end`


    Suppose now that you are interested in implementing a new subclass for documents,
    which you will call `DocumentType`.


    `// file DocumentType.h`


    `@interface DocumentType : FileType`


    `{`


    `// ivars here`


    `}`


    `- (BOOL) isValid;`


    `@end`


    `// file DocumentType.m`


    `@implementation DocumentType`


    `-(BOOL)isValid`


    `{`


    `if ([@"" isEqualToString:[self getExtension]])`


    `{`


    `return false;`


    `}`


    `return true;`


    `}`


    `@end`


    In this example, the `DocumentType` class needs to use the method `getExtension`
    from the superclass. To do this, it just needs to send a message to `self`, using
    the following notation:


    `[self getExtension]`


    Now, suppose that instead you are implementing a new version of the `getExtension`
    method. In this case, you may want to be able to call the original version of
    the method. For example, you may want to take the original extension calculated
    with the `getExtension` method in `FileType`, and perform some post-processing
    to return a modified extension. However, if you send the message `getExtension`
    to `self`, you will end up receiving a recursive call, instead of a call to the
    implementation in the superclass.


    To solve this issue, Objective-C introduces the special variable `super`. The
    goal of `super` is to redirect the message-sending mechanism so that a suitable
    method is searched starting from the superclass, instead of the current class.
    When sending a message to `super`, the compiler can detect that the message resolution
    mechanism needs to be slightly changed, in such a way that the message will reach
    the correct method.


    Note that when a subclass overrides a method that was declared in the superclass,
    it may be for two reasons:


    *   Replacing the original behavior with a completely new implementation: In this
    case, the new behavior is coded totally on the subclass, without any need to refer
    to the original implementation. This is the easiest case to handle, since there
    is no need to interact with the base class to implement the modified method.

    *   Extending the original behavior with additional code: In this case, it is
    necessary to refer to the original implementation of the method you’re trying
    to override.


    In the second case, a programmer can refer to the implementation of a method in
    the superclass using the special variable `super`. With the help of this variable,
    it is possible to skip the current class level when using the message dispatch
    mechanism. Therefore, the compiler will generate code that searches for a match
    for the required message starting from the parent class, instead of the current
    class. Using `super`, therefore, is a common way to reuse code that was written
    for the base class, while at the same time providing an enhanced implementation
    of the same method. For example, when overriding a method from a base class, it
    is very common to use the following idiom:


    `- (void) overridenMethodName`


    `{`


    `[super overridenMethodName];`


    `// additional code goes here`


    `}`


    That is, you first call the original method in the base class, followed by any
    additional code necessary to customize the behavior of the method.


    ### Template Methods


    Method overriding is one way of introducing polymorphic behavior. However, overriding
    a single method may not be enough to achieve the customization you need. In some
    cases, the behavior of a class is determined by an algorithm with several steps,
    and each of these steps can be customized in an independent way. When that happens,
    the best strategy is to use a template method that embeds the knowledge about
    the exact sequence of steps used by the class.


    For example, consider a class that represents a cook. The class has a method called
    `prepareRecipe`, which performs the main steps of food preparation.


    `// file Cook.h`


    `@interface Cook : NSObject`


    `- (void)prepareRecipe;`


    `- (void)acquireIngredients;`


    `- (void)mixIngredients;`


    `- (void)cookDish;`


    `@end`


    The implementation has the basic outline of `prepareRecipe`, along with empty
    implementations for each of the remaining three methods.


    `// file Cook.m`


    `@implementation Cook`


    `-(void) prepareRecipe`


    `{`


           `[self acquireIngredients];`


           `[self mixIngredients];`


           `[self cookDish];`


    `}`


    `- (void)acquireIngredients`


    `{`


    `}`


    `- (void)mixIngredients`


    `{`


    `}`


    `- (void)cookDish`


    `{`


    `}`


    `@end`


    Here you have a method, `prepareRecipe`, which is called by clients of the class.
    The method, however, is just a shell (or template) that calls three other methods
    where the real work takes place. To implement an instance of `Cook` that really
    does something useful, you need to create a derived class first and then implement
    the three methods (`acquireIngredients`, `mixIngredients`, and `cookDish`) in
    a sensible way.


    What you have in `Cook` is a class that provides a generic interface with three
    operations, and a method that determines the sequence in which these operations
    will be called. Subclasses are required to provide the details for this type of
    template method to work.


    Note


    You can classify the class displayed above as an abstract class. An abstract class
    is one in which an implementation is not provided for one or more of the methods
    of its interface. This might happen for a few reasons: an implementation for a
    feature does not exist at a particular level or you want to force a subclass to
    provide its own implementation. This is the case when a base class needs some
    information that can be supplied only by subclasses.'
  trans: "\n### 调用超类中的方法\n\n作为层级结构的一部分，子类有权访问从超类继承的数据和方法。这使得子类的对象可以调用层级中位于其上的类所定义的任何方法。\n\
    \n当超类中的方法名称不同时，调用该方法只是向 `self` 发送一条消息，使用传统的消息发送语法。消息分发机制会自动找到正确的实现。例如，考虑一个表示文件系统条目类型的类。\n\
    \n```\n// 文件 FileType.h\n@interface FileType : NSObject\n{\n    // 此处列出实例变量\n\
    }\n- (NSString*) getExtension;\n@end\n\n// 文件 FileType.m\n@implementation FileType\n\
    - (NSString*) getExtension\n{\n    NSString *ext = @\"\";\n    // 获取扩展名\n    return\
    \ ext;\n}\n@end\n```\n\n现在假设你希望为文档实现一个新的子类，并将其命名为 `DocumentType`。\n\n```\n// 文件\
    \ DocumentType.h\n@interface DocumentType : FileType\n{\n    // 此处列出实例变量\n}\n\
    - (BOOL) isValid;\n@end\n\n// 文件 DocumentType.m\n@implementation DocumentType\n\
    -(BOOL)isValid\n{\n    if ([@\"\" isEqualToString:[self getExtension]])\n    {\n\
    \        return false;\n    }\n    return true;\n}\n@end\n```\n\n在这个例子中，`DocumentType`\
    \ 类需要使用超类中的 `getExtension` 方法。为此，它只需向 `self` 发送一条消息，使用如下表示法：\n\n```\n[self getExtension]\n\
    ```\n\n现在，假设你正在实现 `getExtension` 方法的一个新版本。在这种情况下，你可能希望能够调用该方法的原始版本。例如，你可能希望获取由\
    \ `FileType` 中 `getExtension` 方法计算出的原始扩展名，然后执行某些后处理，以返回一个修改后的扩展名。然而，如果你向 `self`\
    \ 发送 `getExtension` 消息，最终将导致递归调用，而非调用超类中的实现。\n\n为解决此问题，Objective-C 引入了特殊变量 `super`。`super`\
    \ 的目的是重定向消息发送机制，以便从超类（而非当前类）开始搜索合适的方法。当向 `super` 发送消息时，编译器能够检测到消息解析机制需要稍作更改，从而使消息能够到达正确的方法。\n\
    \n请注意，当子类重写在超类中声明的某个方法时，可能出于两个原因：\n\n- **用全新的实现替换原始行为**：在这种情况下，新行为完全在子类中编码，无需引用原始实现。这是最容易处理的情况，因为无需与基类交互即可实现修改后的方法。\n\
    - **用附加代码扩展原始行为**：在这种情况下，有必要引用你正试图重写的方法的原始实现。\n\n在第二种情况下，程序员可以使用特殊变量 `super` 来引用超类中某个方法的实现。借助此变量，在使用消息分发机制时可以跳过当前类的层级。因此，编译器将生成代码，从父类（而非当前类）开始搜索所需消息的匹配项。因此，使用\
    \ `super` 是重用为基类编写的代码的一种常见方式，同时又能为同一方法提供增强的实现。例如，在重写基类的方法时，非常常见的是使用以下惯用法：\n\n\
    ```\n- (void) overridenMethodName\n{\n    [super overridenMethodName];\n    //\
    \ 附加代码写在这里\n}\n```\n\n也就是说，你首先调用基类中的原始方法，然后添加任何必要的附加代码来自定义该方法的行为。\n\n### 模板方法\n\
    \n方法重写是引入多态行为的一种方式。然而，仅重写单个方法可能不足以实现你所需的定制化。在某些情况下，类的行为由包含多个步骤的算法决定，其中每个步骤都可以独立定制。当这种情况发生时，最佳策略是使用一个模板方法，它封装了关于类所用确切步骤序列的知识。\n\
    \n例如，考虑一个表示厨师的类。该类有一个名为 `prepareRecipe` 的方法，它执行食物准备的主要步骤。\n\n```\n// 文件 Cook.h\n\
    @interface Cook : NSObject\n- (void)prepareRecipe;\n- (void)acquireIngredients;\n\
    - (void)mixIngredients;\n- (void)cookDish;\n@end\n```\n\n其实现包含了 `prepareRecipe`\
    \ 的基本框架，以及其余三个方法的空实现。\n\n```\n// 文件 Cook.m\n@implementation Cook\n-(void) prepareRecipe\n\
    {\n       [self acquireIngredients];\n       [self mixIngredients];\n       [self\
    \ cookDish];\n}\n- (void)acquireIngredients\n{\n}\n- (void)mixIngredients\n{\n\
    }\n- (void)cookDish\n{\n}\n@end\n```\n\n这里有一个方法 `prepareRecipe`，由该类的客户端调用。然而，该方法只是一个外壳（或模板），它调用另外三个完成实际工作的方法。要实现一个真正有用的\
    \ `Cook` 实例，你需要首先创建一个派生类，然后以合理的方式实现这三个方法（`acquireIngredients`、`mixIngredients`\
    \ 和 `cookDish`）。\n\n在 `Cook` 中，你拥有一个提供包含三个操作的通用接口的类，以及一个决定这些操作调用顺序的方法。子类需要为此类模板方法的工作提供具体细节。\n\
    \n**注意**：你可以将上面展示的类归类为抽象类。抽象类是指其接口中的一个或多个方法未提供实现的类。这可能是由于以下原因：某个功能在特定层级不存在实现，或者你想强制子类提供自己的实现。当基类需要某些只能由子类提供的信息时，就会出现这种情况。\n"
- fmt: "# Object Initialization\n\nProper object initialization is one of the main\
    \ concerns when creating a new class, and it is also directly affected by inheritance.\
    \ After all, a class is a template for runtime object instances, but they need\
    \ to be a valid representation of the intended concept in the first place.\n\n\
    The most common way to initialize a class in Objective-C is to send `init` or\
    \ one of the `initWith` messages. The `init` method is defined originally in the\
    \ `NSObject` class, and it has to be overridden in any class that wishes to provide\
    \ custom initialization.\n\nBut when more than one initialization method is available,\
    \ it becomes essential to coordinate the way they interact with each other. This\
    \ is necessary to maintain consistency across different ways of initializing the\
    \ state of the object.\n\nYou have seen already some examples of classes that\
    \ offer alternate initialization methods. A typical example is `NSString`, which\
    \ has the following initializers, among others:\n\n```\n- (id)init;\n- (id)initWithCharactersNoCopy:(unichar\
    \ *)characters length:(NSUInteger)length freeWhenDone:(BOOL)freeBuffer;\n- (id)initWithCharacters:(const\
    \ unichar *)characters length:(NSUInteger)length;\n- (id)initWithUTF8String:(const\
    \ char *)nullTerminatedCString;\n- (id)initWithString:(NSString *)aString;\n-\
    \ (id)initWithData:(NSData *)data encoding:(NSStringEncoding)encoding;\n- (id)initWithBytes:(const\
    \ void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding;\n-\
    \ (id)initWithBytesNoCopy:(void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding\
    \ freeWhenDone:(BOOL)freeBuffer;\n```\n\nEven though a class may have a considerable\
    \ number of initializers, there is always a particular version that is marked\
    \ as the designated initializer. This is a version of the `init` or `initWith`\
    \ method that is responsible for performing a complete initialization for objects\
    \ of the class and calling the parent initializer. Clients may call other `init`\
    \ methods in the class, but these methods will ultimately call the designated\
    \ initializer to complete the process.\n\nWhenever you create a new subclass,\
    \ it is necessary to determine the designated initializer and use it to perform\
    \ the proper configuration of the parent class. In this way, you can make sure\
    \ that the base class is in a valid state before the subclass is able to jump\
    \ into action. Therefore, new subclasses should be designed in a way that makes\
    \ it clear which version of the `init` method is the default initializer.\n\n\
    For example, consider the class `LibraryHolding`, which is part of an application\
    \ used to manage libraries. This class has three initialization methods, as shown:\n\
    \n```\n// file LibraryHolding.h\n@interface LibraryHolding : NSObject\n{\n   \
    \ NSString *patron;\n    NSString *title;\n}\n- (id)init;\n- (id)initWithPatron:(NSString*)patron;\n\
    - (id)initWithPatron:(NSString*)patron title:(NSString*)aTitle;\n@end\n```\n\n\
    The designated initializer here is the third one, because it is the only one that\
    \ needs to call the `init` method of the parent class directly. You can see this\
    \ clearly in the following implementation:\n\n```\n// file LibraryHolding.m\n\
    @implementation LibraryHolding\n\n- (id)init\n{\n    return [self initWithPatron:@\"\
    \"];\n}\n\n- (id)initWithPatron:(NSString *)aPatron\n{\n    return [self initWithPatron:aPatron\
    \ title:@\"\"];\n}\n\n- (id)initWithPatron:(NSString *)aPatron title:(NSString\
    \ *)aTitle\n{\n    self = [super init];\n    if (self)\n    {\n        self->patron\
    \ = aPatron;\n        self->title = aTitle;\n    }\n    return self;\n}\n\n@end\n\
    ```\n\nAs a helpful rule, if an initialization method has more arguments that\
    \ all others, then it usually is the one chosen as the designated initializer,\
    \ since it can be used to simulate the others. Now, suppose that you want to create\
    \ a derived class, called `PeriodicalHolding`, used to represent periodicals such\
    \ as magazines and newspapers. Here is a possible interface:\n\n```\n// file PeriodicalHolding.h\n\
    @interface PeriodicalHolding : LibraryHolding\n{\n    int issue_number;\n}\n-\
    \ (id)initWithTitle:(NSString*)aTitle number:(int)aNumber;\n- (id)initWithPatron:(NSString*)patron\
    \ title:(NSString*)aTitle number:(int)aNumber;\n@end\n```\n\nHere is the corresponding\
    \ implementation:\n\n```\n// file PeriodicalHolding.m\n@implementation PeriodicalHolding\n\
    \n- (id)initWithTitle:(NSString*)aTitle number:(int)aNumber\n{\n    return [self\
    \ initWithPatron:@\"\" title:aTitle number:aNumber];\n}\n\n- (id)initWithPatron:(NSString*)aPatron\
    \ title:(NSString*)aTitle number:(int)aNumber\n{\n    self = [super initWithPatron:aPatron\
    \ title:aTitle];\n    if (self)\n    {\n        self->issue_number = aNumber;\n\
    \    }\n    return self;\n}\n\n@end\n```\n\nNotice again that the designated initializer\
    \ is the one with more arguments. The second initializer just calls the designated\
    \ one with the desired parameters."
  raw: '### Object Initialization


    Proper object initialization is one of the main concerns when creating a new class,
    and it is also directly affected by inheritance. After all, a class is a template
    for runtime object instances, but they need to be a valid representation of the
    intended concept in the first place.


    The most common way to initialize a class in Objective-C is to send `init` or
    one of the `initWith` messages. The `init` method is defined originally in the
    `NSObject` class, and it has to be overridden in any class that wishes to provide
    custom initialization.


    But when more than one initialization method is available, it becomes essential
    to coordinate the way they interact with each other. This is necessary to maintain
    consistency across different ways of initializing the state of the object.


    You have seen already some examples of classes that offer alternate initialization
    methods. A typical example is `NSString`, which has the following initializers,
    among others:


    `- (id)init;`


    `- (id)initWithCharactersNoCopy:(unichar *)characters length:(NSUInteger)length
    freeWhenDone:(BOOL)freeBuffer;`


    `- (id)initWithCharacters:(const unichar *)characters length:(NSUInteger)length;`


    `- (id)initWithUTF8String:(const char *)nullTerminatedCString;`


    `- (id)initWithString:(NSString *)aString;`


    `- (id)initWithData:(NSData *)data encoding:(NSStringEncoding)encoding;`


    `- (id)initWithBytes:(const void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding;`


    `- (id)initWithBytesNoCopy:(void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding
    freeWhenDone:(BOOL)freeBuffer;`


    Even though a class may have a considerable number of initializers, there is always
    a particular version that is marked as the designated initializer. This is a version
    of the `init` or `initWith` method that is responsible for performing a complete
    initialization for objects of the class and calling the parent initializer. Clients
    may call other `init` methods in the class, but these methods will ultimately
    call the designated initializer to complete the process.


    Whenever you create a new subclass, it is necessary to determine the designated
    initializer and use it to perform the proper configuration of the parent class.
    In this way, you can make sure that the base class is in a valid state before
    the subclass is able to jump into action. Therefore, new subclasses should be
    designed in a way that makes it clear which version of the `init` method is the
    default initializer.


    For example, consider the class `LibraryHolding`, which is part of an application
    used to manage libraries. This class has three initialization methods, as shown:


    `// file LibraryHolding.h`


    `@interface LibraryHolding : NSObject`


    `{`


    `NSString *patron;`


    `NSString *title;`


    `}`


    `- (id)init;`


    `- (id)initWithPatron:(NSString*)patron;`


    `- (id)initWithPatron:(NSString*)patron title:(NSString*)aTitle;`


    `@end`


    The designated initializer here is the third one, because it is the only one that
    needs to call the `init` method of the parent class directly. You can see this
    clearly in the following implementation:


    `// file LibraryHolding.m`


    `@implementation LibraryHolding`


    `- (id)init`


    `{`


    `return [self initWithPatron:@""];`


    `}`


    `- (id) initWithPatron:(NSString *)aPatron`


    `{`


    `return [self initWithPatron:aPatron title:@""];`


    `}`


    `- (id) initWithPatron:(NSString *)aPatron title:(NSString *)aTitle`


    `{`


    `self = [super init];`


    `if (self)`


    `{`


    `self->patron = aPatron;`


    `self->title = aTitle;`


    `}`


    `return self;`


    `}`


    `@end`


    As a helpful rule, if an initialization method has more arguments that all others,
    then it usually is the one chosen as the designated initializer, since it can
    be used to simulate the others. Now, suppose that you want to create a derived
    class, called `PeriodicalHolding`, used to represent periodicals such as magazines
    and newspapers. Here is a possible interface:


    `// file PeriodicalHolding.h`


    `@interface PeriodicalHolding : LibraryHolding`


    `{`


    `int issue_number;`


    `}`


    `- (id)initWithTitle:(NSString*)aTitle number:(int)aNumber;`


    `- (id)initWithPatron:(NSString*)patron title:(NSString*)aTitle number:(int)aNumber;`


    `@end`


    Here is the corresponding implementation:


    `// file PeriodicalHolding.m`


    `@implementation PeriodicalHolding`


    `- (id)initWithTitle:(NSString*)aTitle number:(int)aNumber`


    `{`


    `return [self initWithPatron:@"" title:aTitle number:aNumber];`


    `}`


    `- (id)initWithPatron:(NSString*)aPatron title:(NSString*)aTitle number:(int)aNumber`


    `{`


    `self = [super initWithPatron:aPatron title:aTitle];`


    `if (self)`


    `{`


    `self-> issue_number = aNumber;`


    `}`


    `return self;`


    `}`


    `@end`


    Notice again that the designated initializer is the one with more arguments. The
    second initializer just calls the designated one with the desired parameters.'
  trans: "\n# 对象初始化\n\n正确的对象初始化是创建新类时需要关注的核心问题之一，同时也直接受到继承关系的影响。毕竟，类是运行时对象实例的模板，但这些实例首先需要成为目标概念的有效表示。\n\
    \n在 Objective-C 中，初始化类最常用的方式是发送 `init` 消息或某个 `initWith` 消息。`init` 方法最初定义在 `NSObject`\
    \ 类中，任何需要提供自定义初始化功能的类都必须重写该方法。\n\n但当存在多个初始化方法时，协调它们之间的交互方式就变得至关重要。这对于保持对象状态初始化方式的一致性来说是必要的。\n\
    \n你已经见过一些提供备选初始化方法的类示例。一个典型的例子是 `NSString`，它拥有以下初始化方法（以及其他方法）：\n\n```\n- (id)init;\n\
    - (id)initWithCharactersNoCopy:(unichar *)characters length:(NSUInteger)length\
    \ freeWhenDone:(BOOL)freeBuffer;\n- (id)initWithCharacters:(const unichar *)characters\
    \ length:(NSUInteger)length;\n- (id)initWithUTF8String:(const char *)nullTerminatedCString;\n\
    - (id)initWithString:(NSString *)aString;\n- (id)initWithData:(NSData *)data encoding:(NSStringEncoding)encoding;\n\
    - (id)initWithBytes:(const void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding;\n\
    - (id)initWithBytesNoCopy:(void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding\
    \ freeWhenDone:(BOOL)freeBuffer;\n```\n\n尽管一个类可能有相当数量的初始化方法，但始终存在一个特定版本被标记为**指定初始化方法**。这是\
    \ `init` 或 `initWith` 方法的一个版本，负责对该类的对象执行完整的初始化，并调用父类的初始化方法。客户端可以调用该类的其他 `init`\
    \ 方法，但这些方法最终会调用指定初始化方法来完成整个初始化过程。\n\n每当你创建一个新的子类时，必须确定指定初始化方法，并使用它来完成对父类的正确配置。通过这种方式，可以确保在子类开始运行之前，基类处于有效状态。因此，新的子类在设计时应使其明确哪个版本的\
    \ `init` 方法是默认初始化方法。\n\n例如，考虑一个用于管理图书馆的应用程序中的 `LibraryHolding` 类。该类有三个初始化方法，如下所示：\n\
    \n```\n// 文件 LibraryHolding.h\n@interface LibraryHolding : NSObject\n{\n    NSString\
    \ *patron;\n    NSString *title;\n}\n- (id)init;\n- (id)initWithPatron:(NSString*)patron;\n\
    - (id)initWithPatron:(NSString*)patron title:(NSString*)aTitle;\n@end\n```\n\n\
    这里的指定初始化方法是第三个方法，因为它是唯一需要直接调用父类 `init` 方法的初始化方法。你可以在下面的实现中清晰地看到这一点：\n\n```\n//\
    \ 文件 LibraryHolding.m\n@implementation LibraryHolding\n\n- (id)init\n{\n    return\
    \ [self initWithPatron:@\"\"];\n}\n\n- (id)initWithPatron:(NSString *)aPatron\n\
    {\n    return [self initWithPatron:aPatron title:@\"\"];\n}\n\n- (id)initWithPatron:(NSString\
    \ *)aPatron title:(NSString *)aTitle\n{\n    self = [super init];\n    if (self)\n\
    \    {\n        self->patron = aPatron;\n        self->title = aTitle;\n    }\n\
    \    return self;\n}\n\n@end\n```\n\n一个有用的规则是：如果某个初始化方法拥有比其他所有方法都多的参数，那么它通常会被选为指定初始化方法，因为它可以用来模拟其他初始化方法。现在，假设你想创建一个名为\
    \ `PeriodicalHolding` 的派生类，用于表示杂志和报纸等期刊。以下是其可能的接口：\n\n```\n// 文件 PeriodicalHolding.h\n\
    @interface PeriodicalHolding : LibraryHolding\n{\n    int issue_number;\n}\n-\
    \ (id)initWithTitle:(NSString*)aTitle number:(int)aNumber;\n- (id)initWithPatron:(NSString*)patron\
    \ title:(NSString*)aTitle number:(int)aNumber;\n@end\n```\n\n以下是相应的实现：\n\n```\n\
    // 文件 PeriodicalHolding.m\n@implementation PeriodicalHolding\n\n- (id)initWithTitle:(NSString*)aTitle\
    \ number:(int)aNumber\n{\n    return [self initWithPatron:@\"\" title:aTitle number:aNumber];\n\
    }\n\n- (id)initWithPatron:(NSString*)aPatron title:(NSString*)aTitle number:(int)aNumber\n\
    {\n    self = [super initWithPatron:aPatron title:aTitle];\n    if (self)\n  \
    \  {\n        self->issue_number = aNumber;\n    }\n    return self;\n}\n\n@end\n\
    ```\n\n再次注意，指定初始化方法仍然是参数最多的那个。第二个初始化方法只是用所需的参数调用指定初始化方法。\n"
- fmt: "# The Substitution Principle\n\nWhen a class inherits from another class in\
    \ the system, it not only shares a privilege, but also an obligation. The main\
    \ privilege is to inherit the non-private interface and implementation provided\
    \ by the base class. As such, a derived class can be used in any context where\
    \ a base class could be used. For example, a `HourlyEmployee` is effectively a\
    \ type of `Employee` object. Therefore, it can be used whenever an `Employee`\
    \ is required: if an object expects to receive an `Employee`, and sends a message\
    \ to it, then it should be able to do so with a `HourlyEmployee` as well.\n\n\
    On the other hand, inheritance requires a responsibility from subclasses: they\
    \ need to be able to satisfy the expectations set by the base class. For example,\
    \ if the base class says that it can calculate employee salaries, then the subclass\
    \ also needs to be able to do so.\n\n```\n// file Employee.h\n\n@interface Employee\
    \ : NSObject\n\n{\n       NSString *name;\n}\n\n- (void) setName:(NSString*) aName;\n\
    - (double) calculateSalary;\n- (void) provideJobEvaluation;\n\n@end\n```\n\nBut\
    \ what happens if the new subclass `HourlyEmployee` has a different way to calculate\
    \ salaries? The simple solution is just to override the `calculateSalary` method\
    \ and provide a new implementation.\n\n```\n// file Employee.m\n\n@implementation\
    \ Employee\n\n- (void) setName:(NSString*) aName\n{\n       self->name = aName;\n\
    }\n\n- (double) calculateSalary\n{\n       double salary = 0;\n       // perform\
    \ salary calculation\n       return salary;\n}\n\n- (void) provideJobEvaluation\n\
    {\n}\n\n@end\n```\n\nDoing this is a valid use of inheritance. But suppose, on\
    \ the other hand, that the class `HourlyEmployee` has no way to calculate the\
    \ salary. Assume, for example, that the salary is based on commissions that are\
    \ not available to the class until the beginning of next year. When that happens,\
    \ the contract defined by the base class breaks, and the subclass will have difficulties\
    \ in posing as similar to the superclass. For example, here are two options for\
    \ the implementation of `calculateSalary`:\n\n```\n- (double)calculateSalary\n\
    {\n   return 0;\n}\n```\n\n```\n- (double)calculateSalary\n{\n       @throw [NSException\
    \ exceptionWithName:@\"salaryException\"\n                                   \
    \   reason:@\"no salary available\"\n                                    userInfo:NULL];\n\
    }\n```\n\nIn the first case, the application will receive an incorrect value,\
    \ since an hourly employee clearly doesn’t receive a salary of zero. In the second\
    \ option, the application cannot continue after the method generates an exception.\
    \ In both cases, the result is not what the clients expected of an `Employee`\
    \ object. This means that `SalaryEmployee` is not a good fit for a subclass of\
    \ `Employee`.\n\nThe substitution principle states that, when a class is derived\
    \ from a base class, objects of the subclass should be able to substitute for\
    \ objects of the subclass in any situation where this is required. The class `HourlyEmployee`\
    \ doesn’t comply with this general principle, as you have seen. It cannot respond\
    \ to `calculateSalary` messages in the same way that the original class responds.\
    \ Therefore, in this case it would be preferable to avoid the direct use of inheritance.\
    \ One possible solution would be to split the responsibility for salary calculation\
    \ into a separate class, so that the original class would respond to a message\
    \ such as `canCalculateSalary`. In any case, it is necessary to consider if a\
    \ subclass can be really used in any context where the base class is used, and\
    \ make any design changes necessary in case this is not possible.\n\n# Class Clusters\n\
    \nA class cluster is a set of classes related by inheritance, which offer a complete\
    \ implementation for a feature that can have variations depending on the concrete\
    \ types used. The main distinction of a class cluster is that only one class at\
    \ the top of the hierarchy is visible to clients. All other classes of the cluster\
    \ are hidden, so that it is not possible to instantiate them directly. Instead,\
    \ concrete classes of the cluster have to be created through the main interface,\
    \ which usually contains `init` methods, as well as class methods, that can return\
    \ the right object for each situation.\n\nClass clusters offer a powerful way\
    \ to control the complexity of maintaining and exposing a large number of related\
    \ classes in a hierarchy. When using a class cluster, you don’t need to know the\
    \ name of the exact class that implements the right version of the functionality\
    \ you need. The base class of the cluster will cooperate with derived classes\
    \ to create the exact object that will satisfy your needs. On the other hand,\
    \ the classes that derive from the main class of the cluster have the responsibility\
    \ to implement a concrete version of the methods that interact with local storage.\
    \ The methods that need to be overridden in a concrete implementation of the cluster\
    \ are called primitive methods, since they provide the primitive functionality\
    \ that is used by the class cluster to implement other high level features.\n\n\
    The definition can be more easily understood through a use case. Suppose that\
    \ a class can assume two or more functional configurations, with independent data\
    \ storage that determines how these classes will act. Moreover, the class has\
    \ a common interface for each of these configurations, so that it is possible\
    \ to access them in a unified way. When that is the case, it is possible to organize\
    \ the classes in a way that only a base class can be made visible, while the concrete\
    \ functionality is implemented by its subclasses.\n\nClass clusters are considered\
    \ to be a basic design pattern in Objective-C. A typical example of class cluster\
    \ in the Foundation framework is `NSNumber`. While it appears to clients as being\
    \ a single class, the real implementation of `NSNumber` happens to contain a class\
    \ cluster, where the main abstract class acts as a wrapper around concrete classes,\
    \ which handle the state of the object. Among the concrete classes in the `NSNumber`\
    \ cluster, you will find implementation models for integers, floats, and Booleans,\
    \ for example.\n\nUsing a class cluster is straightforward, in the sense that\
    \ the programmer doesn’t need to know which class is created by the class initializers.\
    \ In the `NSNumber` example, you have a number of initialization methods, named\
    \ for instance `initWithInteger:`, `initWithFloat:`, and `initWithChar:`. These\
    \ methods return an object that correctly represents the data stored on it. However,\
    \ the exact subclass of the returned object is hidden from users.\n\nFrom the\
    \ point of view of the creator of a new class cluster, there are some practical\
    \ issues that must be considered. First, it is necessary that the public interface\
    \ of the abstract base class be the only point of contact between clients and\
    \ the other classes in the cluster. Therefore, the interface of the base class\
    \ in the cluster must contain all methods that will be used to interact with any\
    \ member of the cluster. Among the methods of the abstract class you will find\
    \ primitive methods, the ones that need to be implemented in each derived class.\
    \ The second class of methods, derived methods, contains those that are implemented\
    \ in the base class and use the primitive methods in their definition. Therefore,\
    \ such methods don’t need to be overridden in the concrete classes.\n\nA class\
    \ that derives from the abstract root of the cluster needs to provide its own\
    \ instance variables for data storage. The abstract class in a cluster doesn’t\
    \ have local storage by design, since each concrete class may have a different\
    \ way to store data."
  raw: '## The Substitution Principle


    When a class inherits from another class in the system, it not only shares a privilege,
    but also an obligation. The main privilege is to inherit the non-private interface
    and implementation provided by the base class. As such, a derived class can be
    used in any context where a base class could be used. For example, a `HourlyEmployee`
    is effectively a type of `Employee` object. Therefore, it can be used whenever
