  raw: '# 12. The Compiler


    Abstract


    To use Objective-C effectively, it is important to understand the basic infrastructure
    of the language. The compiler plays a special role in the software development
    cycle, since it determines how source code is translated into executable programs.
    In the Apple environment, two main compilers are employed: gcc, the traditional
    compiler used by Mac OS X, and the new clang compiler based on LLVM (Lower Level
    Virtual Machine), which has been developed as an open source project by Apple
    and others during the last few years.


    To use Objective-C effectively, it is important to understand the basic infrastructure
    of the language. The compiler plays a special role in the software development
    cycle, since it determines how source code is translated into executable programs.
    In the Apple environment, two main compilers are employed: gcc, the traditional
    compiler used by Mac OS X, and the new clang compiler based on LLVM (Lower Level
    Virtual Machine), which has been developed as an open source project by Apple
    and others during the last few years.


    The compiler is responsible for translating your program into binary instructions
    that will be directly executed by the CPU. Every source file has to be processed
    first, but when it comes time to generate code you have some latitude on deciding
    how the resulting code will be produced. You can influence the code generation
    process using some of the building settings available either through Xcode or
    through the command line interface for the compilers.


    In this chapter, you will take a look at several options provided by the Objective-C
    compilers and how to use them to write better code for your target platforms.
    You’ll first consider the compilers available for the Apple platform: GCC, the
    original open source compiler used by Mac OS X, and LLVM clang, the more modern
    option that is currently the officially supported compiler on Xcode.


    You will then learn about the main building options that can be accessed directly
    from the Building Settings window in Xcode, including a quick list of the most
    used compiler and linker-related options. Then I will show you the ways in which
    you can access the compiler from the command line.


    Finally, I will discuss some of the ways in which the Objective-C compiler has
    evolved over the last few years. First, I will discuss the integration of ARC
    (Automatic Reference Counting) with existing projects. You will also learn how
    to use another practical feature of the Objective-C compiler: its integration
    with existing C++ code.


    ## Using GCC and LLVM Compilers


    The Objective-C compilers used in the platforms supported by Apple have evolved
    continuously over the last few years. Understanding this evolution will help you
    make an informed decision between the two compilers, and know when one should
    be used instead of another.


    The compiler used by Mac OS X since its inception has been GCC. GCC is an open
    source compiler for C, C++, and other languages. The fact that it is an open source
    project with an active community of developers and supporters made a big difference
    in the choice of the platform. It means that everyone can benefit from improvements
    introduced by open source enthusiasts all over the world. Moreover, users are
    not restricted to wait for fixes and updates provided by Apple. Instead, they
    can find solutions for common problems and perform their own updates if necessary.
    GCC is the most commonly used open source compiler in the world, which means that
    it is supported in many different operating systems and processors.


    Although the GCC compiler has been used for several years, some of its shortcomings
    have become a difficult obstacle for the evolution of the Objective-C language.
    One of the problems is the lack of support for plug-ins, which can be used to
    perform important tasks other than compilation, such as documentation, diagnostics,
    and performance measurement. This problem was felt exactly at a moment when Apple
    was introducing new features to Objective-C such as ARC, an improved literal syntax,
    and better integration with the Xcode IDE.


    To continue the evolution of the language in a cleaner base, Apple decided to
    support a more modern, but still open source, compiler for Objective-C. The choice
    was the product of the LLMV clang project, a modern open source compiler that
    has been developed from the ground up to address many of the shortcomings of GCC.


    The LLMV compiler was initially used as an additional option for compilation,
    but as of this writing, it has become the officially supported compiler for Objective-C
    in all Apple-supported platforms. Other than the internal advantages of the new
    code in clang, which is important mostly for developers of the compiler itself,
    LLVM clang provides much better error messages in general than the older versions
    of GCC. That alone is a great advantage of using LLVM, since it may become at
    times difficult to grasp the meaning of a particularly cryptic error message.
    LLVM usually also provides options that make it easier to fix common errors.


    For example, consider the following fragment of code that contains an error and
    a call to `printf`:


    `// file hello.c`


    `#include <stdio.h>`


    `int main()`


    `{`


    `printf("Hello %s");`


    `return 0;`


    `}`


    Here is the message produced by GCC:


    `> gcc hello.c`


    `hello.c: In function ''main'':`


    `hello.c:5: warning: too few arguments for format`


    `hello.c:5: warning: too few arguments for format`


    While this messages points out where the problem has been detected, it gives little
    clue about the exact location where the underlying code is incorrect, other than
    the line where the error occurs. Here is the same error message returned by clang:


    `> cc hello.c`


    `hello.c:5:19: warning: more ''%'' conversions than data arguments [-Wformat]`


    `printf("Hello %s");`


    `∼^`


    `1 warning generated.`


    In this case, you see that not only is the error identified, as with GCC, but
    its location is directly pointed out in a very easy format.


    Another advantage of LLVM is its tighter integration with Xcode, made possible
    by its new internal architecture. For example, by using LLVM, Xcode can more easily
    extract error information and diagnostics in a format that is simpler to parse
    and display.


    For these reasons, I will consider LLVM as the default compiler in the discussion
    of compiler features in the next few sections. Notice, however, that most of the
    current features of Objective-C are accessible for either compiler. However, new
    technologies such as ARC are made available first on LLVM clang. This is another
    reason why you should make sure that your code compiles correctly on clang as
    way to guarantee that it will be supported in the future.


    ## Changing Compiler Options in Xcode


    Xcode is an integrated environment that has helpful tools for every phase of the
    development cycle. In particular, Xcode enables programmers with tools to define
    the compiler options that are most adequate for the final product they need to
    deliver. For example, in the Xcode Settings window, it is possible to help the
    compiler define the necessary parameters for how it is going to produce executable
    code.


    To access the Settings window, click the top-level node in the Project Navigator.
    This will bring up the Settings Editor. Then, click the project you want to edit,
    and you will see the list of settings. Click Building Settings at the top of the
    window to access the building options. Figure [12-1](#A978-1-4302-5906-0_12_Chapter.html#Fig1)
    shows what the Building Settings window looks like for an example project.


    ![A978-1-4302-5906-0_12_Fig1_HTML.jpg](A978-1-4302-5906-0_12_Fig1_HTML.jpg)


    Figure 12-1.


    Building Settings window for a test project


    Here is a list of the most common settings that you can access from the Building
    Settings window:'
