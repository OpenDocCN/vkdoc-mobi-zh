  \ b); // remove the edge\n\t}\n\treturn 1;\n}\n```\n\n此函数出于性能原因使用 C 语言编写。其目标是检测当用户点击屏幕特定区域时的边。代码可能看起来很复杂，但其背后的思路只是跟随连接图中两点的直线，并返回用户点击了哪条边（如果有点击的话）。\n\
