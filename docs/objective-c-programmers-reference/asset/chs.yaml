- "# 12. 编译器\n\n## 摘要\n\n若要高效使用 Objective-C，理解该语言的基础架构至关重要。编译器在软件开发周期中扮演着特殊角色，因为它决定了源代码如何被转换为可执行程序。在苹果环境中，主要使用两种编译器：`gcc`（Mac\
  \ OS X 传统编译器）以及基于 LLVM（底层虚拟机）的新型 `clang` 编译器，后者由苹果及其他公司作为开源项目在过去数年间开发而成。\n\n编译器负责将程序翻译成\
  \ CPU 直接执行的二进制指令。每个源文件都必须首先经过处理，但在生成代码时，你对于最终代码的生成方式拥有一定的自主权。你可以通过 Xcode 或编译器命令行界面提供的一些构建设置来影响代码生成过程。\n\
  \n在本章中，你将了解 Objective-C 编译器提供的若干选项，以及如何利用它们为目标平台编写更优质的代码。首先，你将了解苹果平台可用的编译器：GCC（Mac\
  \ OS X 最初使用的开源编译器）以及 LLVM clang（目前 Xcode 官方支持的更现代化选项）。\n\n接着，你将学习可直接从 Xcode 的“构建设置”窗口访问的主要构建选项，包括一份最常用的编译器和链接器相关设置速查清单。然后我将展示如何通过命令行调用编译器。\n\
  \n最后，我将讨论 Objective-C 编译器在过去几年中的一些演进方式。首先，我将讨论 ARC（自动引用计数）与现有项目的集成。你还将学习如何利用 Objective-C\
  \ 编译器的另一实用功能：其与现有 C++ 代码的集成。\n\n## 使用 GCC 与 LLVM 编译器\n\n苹果支持的平台所使用的 Objective-C\
  \ 编译器在过去数年间持续演进。理解这一演进过程将有助于你在两种编译器之间做出明智选择，并了解何时应使用其中一种而非另一种。\n\n自 Mac OS X 诞生以来，其使用的编译器一直是\
  \ GCC。GCC 是一款针对 C、C++ 及其他语言的开源编译器。它作为一个拥有活跃开发者与支持者社区的开源项目，这一事实对平台的选择产生了重大影响。这意味着所有人都能受益于全球开源爱好者引入的改进。此外，用户无需等待苹果提供的修复和更新，而是能够自行解决常见问题，并在必要时执行自己的更新。GCC\
  \ 是全球最常用的开源编译器，这意味着它在许多不同的操作系统和处理器上都得到支持。\n\n尽管 GCC 编译器已使用多年，但其某些缺陷已成为 Objective-C\
  \ 语言演进道路上的重要障碍。问题之一在于缺乏对插件的支持，而插件可用于执行编译之外的重要任务，例如文档生成、诊断和性能测量。这一问题恰好发生在苹果向 Objective-C\
  \ 引入新特性（如 ARC、改进的字面量语法以及与 Xcode IDE 更好的集成）的时刻。\n\n为了在更干净的基础上继续演进该语言，苹果决定支持一款更现代化但仍保持开源的\
  \ Objective-C 编译器。其选择是 LLVM clang 项目的产物——一款从头开始构建、旨在解决 GCC 诸多缺陷的现代开源编译器。\n\nLLVM\
  \ 编译器最初被用作编译的附加选项，但截至撰写本书时，它已成为所有苹果支持平台上 Objective-C 的官方支持编译器。除了 `clang` 新代码的内部优势（这对编译器开发者本身尤为重要）之外，LLVM\
  \ clang 总体上比旧版 GCC 提供了更好的错误信息。仅此一点就是使用 LLVM 的巨大优势，因为有时理解一条特别晦涩的错误信息的含义可能相当困难。LLVM\
  \ 通常还提供有助于修复常见错误的选项。\n\n例如，考虑以下包含错误和对 `printf` 调用的代码片段：\n\n```\n// 文件 hello.c\n\n\
  #include <stdio.h>\n\nint main()\n{\n    printf(\"Hello %s\");\n    return 0;\n\
  }\n```\n\n以下是 GCC 产生的信息：\n\n```\n> gcc hello.c\nhello.c: 在函数 'main' 中:\nhello.c:5:\
  \ 警告: 格式参数太少\nhello.c:5: 警告: 格式参数太少\n```\n\n虽然这些信息指出了检测到问题的地方，但除了错误发生的行号外，几乎未给出关于底层代码确切错误位置的线索。以下是\
  \ `clang` 返回的相同错误信息：\n\n```\n> cc hello.c\nhello.c:5:19: 警告: '%' 转换数量多于数据参数 [-Wformat]\n\
  \    printf(\"Hello %s\");\n           ~~~~~~~~^\n生成了 1 条警告。\n```\n\n在此例中，你不仅能看到像\
  \ GCC 一样识别出的错误，而且其位置还以一种非常直观的格式被直接指出。\n\nLLVM 的另一个优势是它与 Xcode 更紧密的集成，这得益于其新的内部架构。例如，通过使用\
  \ LLVM，Xcode 可以更轻松地以更易于解析和显示的格式提取错误信息和诊断结果。\n\n鉴于这些原因，在接下来几节讨论编译器特性时，我将把 LLVM 视为默认编译器。不过请注意，Objective-C\
  \ 的大多数当前特性均可通过任一编译器访问。但是，诸如 ARC 等新技术会首先在 LLVM clang 上提供。这是确保你的代码能在 `clang` 上正确编译，从而保证其未来可得到支持的另一个原因。\n\
  \n## 在 Xcode 中更改编译器选项\n\nXcode 是一个集成环境，为开发周期的每个阶段都提供了有用的工具。特别地，Xcode 为程序员提供了用于定义最适合最终产品的编译器选项的工具。例如，在\
  \ Xcode 设置窗口中，可以帮助编译器定义生成可执行代码所需的必要参数。\n\n要访问“设置”窗口，请点击项目导航器中的顶层节点。这将打开“设置编辑器”。然后，点击你想要编辑的项目，你将看到设置列表。点击窗口顶部的“构建设置”以访问构建选项。图\
  \ 12-1 展示了一个示例项目的“构建设置”窗口外观。\n\n![A978-1-4302-5906-0_12_Fig1_HTML.jpg](img/A978-1-4302-5906-0_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 测试项目的构建设置窗口\n\n以下是你可从“构建设置”窗口访问的最常用设置列表：\n\n\n\n*   **架构**：Objective-C\
  \ 编译器可以为多种架构生成代码，包括 32 位 Intel、64 位 Intel 以及 ARM（用于移动设备）。创建新项目时通常会自动定义此设置，但在创建桌面应用程序时（例如，可能需要同时支持\
  \ 32 位或 64 位架构），您可能需要更改此项。\n*   **基础 SDK**：SDK 是一组 Objective-C 库，它们共同构成了 Mac OS\
  \ X 或 iOS 应用程序的完整编程环境和 API。主要的 SDK 版本每年会发布一次或多次。您可以根据要支持的设备来决定使用哪个 SDK。较旧的设备不支持最新的\
  \ SDK，因此您需要在功能或代码的广泛适用性之间做出权衡。\n*   **支持的平台**：两个主要平台是 Mac OS X 和 iOS。\n*   **构建位置设置**：这组选项决定了构建过程中生成的多个输出文件的位置。例如，您可以决定最终产品、中间目标文件、调试文件等放置在何处。\n\
  *   **默认编译器**：您可以在此处定义使用的编译器，即 GCC 或 LLVM clang。如今默认的是 LLVM，但您的代码可能依赖于 GCC 独有的特性。在这种情况下，您应从中期角度考虑更新代码，使其也能兼容其他编译器。\n\
  *   **预编译头文件**：如果将此选项设置为“是”，您可以定义一个将被预编译的头文件名称。此选项通常用于加快大型项目的编译速度。开启此设置后，编译器会创建包含文件的预处理表示形式，并在整个项目中重复使用。\n\
  *   **运行静态分析器**：LLVM clang 编译器的特性之一是其能够执行语法分析。例如，此类分析可以检测内存泄漏或可能发生算术溢出的区域。您可以通过“产品”➤“分析”菜单（或\
  \ Shift + Command + B）手动调用静态分析器。此选项允许您在每次运行编译器时自动调用静态分析器。\n*   **验证构建产品**：这是另一个可选步骤，可以通过菜单触发，也可以为每次编译运行自动调用。产品验证会检查编译器和构建系统的输出，并验证它们是否符合特定平台的软件分发规则。\n\
  *   **代码签名标识**：对于需要代码签名的构建（例如通过 App Store 分发代码时），此步骤将创建代码签名所需的信息。您需要提供一个签名标识，该标识通过可从\
  \ Apple 开发者网站获取的加密密钥确定。\n*   **部署目标**：您可以更改生成二进制的部署目标，从而选择哪些操作系统能够运行您生成的代码。通常，这用于保持与应用程序中使用的特定库以及某些较旧设备和\
  \ CPU 型号的兼容性。\n\n## 从命令行运行编译器\n\n根据您的工作流程，可能希望直接从命令行窗口运行编译器，而不是使用 Xcode 进行开发。例如，您可能正在使用外部文本编辑器或编程环境。如果您决定使用\
  \ vim 作为所有与 Objective-C 文件相关操作的文本编辑器，而不是使用 Xcode IDE，情况便是如此。在这些情况下，使用命令行工具构建整个项目比仅仅为了执行编译而切换到\
  \ Xcode 更为方便。\n\n其他时候，您可能想创建一个用于测试目的的快速应用程序，如果您知道确切的步骤，通过命令行操作可能更简单。无论您出于何种原因使用命令行，一旦掌握了正确的编译器选项和构建系统，它与运行\
  \ Xcode 一样简单。\n\n在 Mac OS X 上有两种使用命令行编译器的方法。第一种方法是依靠 Xcode 进行项目管理，并使用命令行触发 Xcode\
  \ 控制的构建。此方法依赖于 `xcodebuild` 工具，该工具在安装 Xcode 时可用。第二种方法是使用您偏好的项目管理工具，例如 `make`、`cmake`\
  \ 或 `scons`，并创建独立于 Xcode 运行的构建脚本。我将简要说明这两种方法。\n\n要使用第一种方法，即从命令行调用由 Xcode 管理的项目，您只需将\
  \ `xcodebuild` 作为命令行程序调用，并向其传递一些参数来确定项目的位置，以及一些可以控制可执行输出特定设置的构建时选项。\n\n例如，假设您有一个名为\
  \ `TestProj` 的项目。存储此项目的文件将被称为 `TestProj.xcodeproj`。您可以使用构建器命令 `xcodebuild` 从命令行调用\
  \ Xcode 构建系统。此命令负责加载存储构建信息的项目文件，运行选定的目标，并根据需要调用编译器和其它工具来构建最终项目。对于 `TestProj.xcodeproj`\
  \ 文件，其工作方式如下：\n\n`xcodebuild -project TestProj.xcodeproj`\n\n然后，`xcodebuild` 将构建整个项目，并发出类似以下的消息，直到项目完全构建完成：\n\
  \n```\nCpResource TestProj.sqlite build/Release-macos/TestProj.app/TestProj.sqlite\n\
  cd /Users/coliveira/MacApps/TestProj\nsetenv PATH \"/Applications/Xcode4.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin:/Applications/Xcode4.app/Contents/Developer/usr/bin:/Users/coliveira/src/cappuccino/bin:/Applications/Xcode.app//Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin/:/usr/texbin:/opt/local/bin/:/sw/bin:/sw/sbin:/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin:/usr/X11/bin:/usr/X11R6/bin:/Users/oliveira/Downloads/plan9/port/bin\"\
  \nbuiltin-copy -exclude .DS_Store -exclude CVS -exclude .svn -exclude .git -exclude\
  \ .hg -strip-debug-symbols -strip-tool /Applications/Xcode4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/strip\
  \ -resolve-src-symlinks /Users/oliveira/MacApps/TestProj/TestProj.sqlite /Users/oliveira/MacApps/TestProj/build/Release-macos/TestProj.app\n\
  ...\n```\n\n`xcodebuild` 命令有许多常用选项，可用于调整命令行构建过程。例如，您可以使用 `-list` 选项来识别所有方案、目标和构建配置。\n\
  \n```\n$ xcodebuild -list -project TestProj.xcodeproj\nInformation about project\
  \ \"TestProj\":\nTargets:\n    TestProj\n    OptTkUI\n    OptTkUITests\n    TestProjOrganizer\n\
  \    TestProjOrganizerTests\nBuild Configurations:\n    Debug\n    Release\nIf no\
  \ build configuration is specified and -scheme is not passed then \"Release\" is\
  \ used.\nSchemes:\n    TestProj\n    TestProjLite\n    OptTkUI\n    TestProjOrganizer\n\
  ```\n\n另一个提供系统有用信息的选项是 `showsdks`，它会列出机器上安装的所有目标 SDK。\n\n\n\n`$ xcodebuild --showsdks`\n\
  \n`OS X SDKs：`\n`Mac OS X 10.7` -sdk `macosx10.7`\n`OS X 10.8` -sdk `macosx10.8`\n\
  \n`iOS SDKs：`\n`iOS 6.1` -sdk `iphoneos6.1`\n\n`iOS Simulator SDKs：`\n`Simulator\
  \ - iOS 6.1` -sdk `iphonesimulator6.1`\n\n关于 `xcodebuild`，有趣的一点是它可以执行与 Xcode 内部构建器相同的任务。因此，从基于\
  \ IDE 的工作流程迁移到基于命令行的流程非常容易。然而，缺点是它要求项目最初是使用 Xcode 创建的。有些开发者倾向于避免使用它，因此下一个方法（一种用于管理项目依赖关系的外部工具）对他们来说会更合适。\n\
  \n像 `make` 这样的依赖管理工具用于跟踪应用程序中各工件之间的依赖关系。当源工件发生变化时，依赖于该源文件的输出将根据需要重新构建。\n\n由于典型的\
  \ Mac OS X 用户界面应用程序中的项目依赖关系非常复杂，`make` 更常用于基于控制台的应用程序。一个简单的示例是一个名为 `hello` 的控制台应用程序，它由三个\
  \ Objective-C 文件组成：`main.m`、`Hello.h` 和 `Hello.m`。以下是一个可用于构建此项目的简单 makefile 文件：\n\
  \n```\n### 文件 Makefile\n#\nTARGET = hello\nOBJ = Hello.o main.o\n\nall: build\n\n\
  main.o: main.m Hello.h\n    cc -o main.o main.m\n\nHello.o: Hello.m Hello.h\n  \
  \  cc -o Hello.o Hello.m\n\nbuild: $(OBJ)\n    cc $(OBJ) -o $(TARGET)\n\nclean:\n\
  \    rm -f *.o $(TARGET)\n```\n\n这个项目只有一个主文件（`main.m`）和一个类（`Hello`）。`makefile` 描述了每个文件之间的相互依赖关系。因此，构建依赖于存储在\
  \ `$(OBJ)` 变量中的目标文件。这些目标文件由源文件 `main.m` 和 `Hello.m` 构建而成。每个依赖行由目标文件的名称、冒号和依赖项列表组成。因此，例如，`main.o`\
  \ 目标文件依赖于 `Hello.h`。类似地，`Hello.o` 依赖于 `Hello.h`。这意味着当 `Hello.h` 发生变化时，`make` 将重新构建依赖于它的目标，例如\
  \ `Hello.o` 和 `main.o`。\n\n重新构建目标的命令列在依赖项列表之后，并以制表符开头。例如，要重新构建 `Hello.o`，使用的命令是：\n\
  \n`cc -o Hello.o Hello.m`\n\n在你创建简单项目时，使用 makefile 可能会更容易，但它很快就会变得难以跟踪项目中的所有依赖关系。因此，只有当代码设计为在多个平台上运行，并且混合使用了\
  \ Xcode 不直接支持的其他语言时，才会在 Objective-C 中使用 makefile。如果是这种情况，你应该查阅 Apple 开发者库中关于 `make`\
  \ 的文档。\n\n## 代码优化\n\n使用编译选项来改变 Objective-C 编译器行为的主要原因之一，是为了实现某种优化目标。例如，你可能希望优化编译后的代码以获得最大速度。或者你可能更倾向于创建紧凑的可执行文件，以便在移动平台上占用更少的空间。本节中的选项可用于引导这两种不同的代码优化方式。\n\
  \n### 速度优化\n\n优化 Objective-C 的主要方法是使用 `-O` 设置之一。`-O` 设置（其中的 `O` 代表“优化”）用于定义你所需的优化级别。该设置通常后跟一个数字，该数字决定了在该特定级别上执行多少优化。\n\
  \n最低级别的优化是 `-O0`，这意味着完全不进行优化。这主要用于你想禁用代码中的优化时，主要是为了调试目的，或者是为了确定性能测量的基线。\n\n有意义的优化的第一个级别是\
  \ `-O1`。如果你希望进行一些速度优化，但又不想麻烦地运行该特定平台上可用的全套优化级别，可以应用此级别。下一个优化级别是 `-O2`，它增加了一些额外的改进，可以使你的代码运行得更快。另一方面，增加更多的优化可能会使你的构建运行速度比正常情况稍慢。\n\
  \n`-O3` 级别最为激进，运行所需的时间也最长。如果你需要高性能代码，并且不太在意完成完整构建所需的时间，请使用此级别。这通常在创建项目的发布版本时使用。你也可以使用\
  \ `-O4` 级别，它不仅增加了编译优化，还增加了链接时优化，该优化会在链接时考虑所有目标文件。\n\n### 空间优化\n\nObjective-C 的另一个有用的优化目标是最大限度地减少整个应用程序所占用的空间。近年来，随着应用程序变得越来越大，同时它们又需要在非常小的设备（如\
  \ iPhone 和 iPod touch）上运行，这一选项变得流行起来。\n\n通过空间优化，你告诉编译器生成占用空间最小的代码，而不是减少执行速度。这是必要的，因为有时空间优化可能会以牺牲速度优化为代价。例如，编译器有时可能会通过添加一些重复的代码段来生成更快的代码。一个众所周知的例子是循环展开优化，它通过增加代码大小来在运行时加速循环。另一方面，由于减少了可执行文件中生成的代码量，可能需要在执行期间花费更多的时间。\n\
  \n在 Objective-C 编译器中优化空间的主要方法是使用 `-Os` 选项。此选项会执行旨在减少目标代码最终大小的优化步骤。当出现冲突时，例如存在其他以提高性能（但可能增加可执行二进制文件大小）为目标的选项，此选项将优先考虑。\n\
  \n\n\n## ARC 支持\n\nARC 是一项允许 Objective-C 程序员在编写代码时无需使用`retain`和`release`等显式引用计数机制的技术。ARC\
  \ 的主要目标是让程序员摆脱那些可能导致难以调试和修复的常见错误的活动。这是因为，虽然学习 Objective-C 下的内存管理规则并不困难，但仍可能犯下分配错误，从而导致内存泄漏、堆损坏甚至崩溃。\n\
  \n为了解决部分内存管理问题，苹果将 ARC 作为 LLVM 编译器的特性引入。借助 ARC，编译器可以分析对象在 Objective-C 应用程序中的使用方式，并确定应在何处进行保留或释放操作。在绝大多数情况下，它会自动工作，仅在循环引用等内存使用场景下需要少量提示。\n\
  \n在本节中，我仅介绍用于在 Objective-C 中支持 ARC 的编译器选项。关于 ARC 的介绍以及如何使用它来简化 Objective-C 应用程序中的内存管理，请参考第\
  \ 8 章了解更多信息。\n\n使用 ARC 的首要条件是确保你正在使用 LLVM 编译器而非 GCC。未来 ARC 有可能在 GCC 中实现，但目前这项技术仅在\
  \ LLVM clang 上实现。要确定使用的是哪个编译器，请选择“构建选项”窗口。要找到该窗口，请点击左侧面板中的“目标”（这是项目导航器的顶层元素），然后点击项目名称。项目设置将会显示，你可以从窗口顶部的两个选项中选择一个：“信息”和“构建设置”。点击“构建设置”选项，设置窗口将会出现，如图\
  \ 12-2 所示。\n\n首先，在“构建设置”部分中，选择“C/C++/Objective-C 编译器”选项。然后，在下拉菜单中选择“默认编译器（Apple\
  \ LLVM compiler 4.2）”。\n\n![A978-1-4302-5906-0_12_Fig2_HTML.jpg](img/A978-1-4302-5906-0_12_Fig2_HTML.jpg)\n\
  \n图 12-2. 用于 ARC 属性的项目设置窗口\n\n项目设置窗口的“Apple LLVM compiler 4.2 – Language”部分包含了 ARC\
  \ 选项。所需的选项是“Objective-C Automatic Reference Counting”。通过将该值设置为 Yes，你将在项目中启用 ARC。要使用\
  \ ARC，你还需确保不使用`retain`和`release`，以及其他在第 8 章中讨论的问题。\n\n## 编译 Objective-C++\n\n正如你在前几章中所见，Objective-C\
  \ 是 C 编程语言的适当超集，两种语言可以毫无问题地混合使用。特别是，C 语言中创建的每一个函数和表达式也可以被解释为有效的 Objective-C 代码。\n\
  \n由于 Objective-C 被设计为避免与 C 编程语言冲突，它的一个有用特性是，你也可以轻松地将 Objective-C 与 C++ 代码混合使用而不会产生重大问题。Objective-C\
  \ 代码与 C++ 结合的结果有时被称为 Objective-C++，但从 Objective-C 程序员的角度来看，实际上并没有区别。当混合使用 Objective-C\
  \ 和 C++ 时，任何 Objective-C 特有的内容都保持不变。唯一的区别是，现在除了 C 之外，你还可以使用 C++ 结构。\n\n使用 Xcode\
  \ 可以轻松启用 Objective-C++ 编程。Xcode 中编译的语言很大程度上由源文件的扩展名决定。例如，`.m` 扩展名的文件被当作 Objective-C\
  \ 文件处理，而 `.c` 文件则被当作纯 C 文件处理。要能够混合使用 C++ 和 Objective-C，你只需创建扩展名为 `.mm` 而非 `.m` 的文件。Xcode\
  \ 会将该扩展名作为文件包含 C++ 代码的指示，并为编译器提供正确的选项，以便 C++ 和 Objective-C 在构建过程中被完全识别。\n\n以下代码是一个混合了\
  \ C++ 和 Objective-C 代码的简单示例。虽然解释 C++ 如何工作完全超出了本书的范围，但你可以轻松看到非 C 特性（如类定义）与 Objective-C\
  \ 对象的创建和使用的结合。\n\n```cpp\nclass Logger\n{\npublic:\n    void addLog(NSString *s);\n\
  };\n\nvoid Logger::addLog(NSString *s)\n{\n    NSLog(@\"here is my message: %@\"\
  , s);\n}\n```\n\n这段代码定义了一个名为`Logger`的 C++ 类，负责将字符串消息发送到控制台。你可能会注意到，`addLog`虽然是 C++\
  \ 的成员函数，却接受一个`NSString`类型的参数，这是一个 Objective-C 对象。\n\n接下来，你可以从一个普通的 Objective-C 方法内部使用这个类，如下所示：\n\
  \n```objc\n- (void) createCppObj\n{\n    Logger logger;\n    logger.addLog(@\"my\
  \ message\");\n}\n```\n\n`logger`对象被声明为`Logger`类型，这是一个 C++ 类。你可以像在普通 C++ 源文件中一样调用`logger`上的方法。\n\
  \n最后，下一个示例展示了如何创建一个包含 Objective-C 对象作为成员变量的 C++ 类。这段代码描述了一种集合类，你可以在其中添加元素并检查集合的大小。\n\
  \n```cpp\nclass MyCollection\n{\npublic:\n    MyCollection();\n    ~MyCollection();\n\
  \    void add(id obj);\n    int size();\nprivate:\n    NSMutableArray *array;\n\
  };\n```\n\n第一部分是 C++ 类的定义。有四个公共成员函数和一个`NSMutableArray`类型的私有成员变量。它们的定义如下：\n\n```cpp\n\
  MyCollection::MyCollection()\n{\n    array = [[NSMutableArray alloc] init];\n}\n\
  \nMyCollection::~MyCollection()\n{\n    [array release];\n}\n\nvoid MyCollection::add(id\
  \ obj)\n{\n    [array addObject:obj];\n}\n\nint MyCollection::size()\n{\n    return\
  \ (int)[array count];\n}\n```\n\n第一个方法称为构造函数，在对象创建时自动调用。该方法会分配并初始化一个`NSMutableArray`类型的新\
  \ Objective-C 对象。该对象存储在`array`成员变量中（类似于实例变量）。\n\n第二个方法是析构函数，在对象销毁时运行。当这种情况发生时，你需要释放`array`对象以避免内存泄漏。\n\
  \n接下来的两个方法实现了`add`和`size`操作。它们只是围绕`NSMutableArray`类中相应功能的简单封装。\n\n这个类可以如下使用：\n\n\
  ```objc\n- (void) useMyCollection\n{\n    MyCollection * c = new MyCollection;\n\
  \    c->add(@\"test 1\");\n    c->add(@\"test 2\");\n    NSLog(@\"the size is %d\"\
  , c->size());\n    // 这会打印 \"the size is 2\"\n}\n```\n\n**注意：** 带有 C++ 结构的 Objective-C\
  \ 经常使用不同的语法提供相同的功能。因此，我不建议混合使用这两种语言，除非你非常清楚想要达到什么目的。大多数情况下，程序员混合使用 Objective-C 和\
  \ C++ 是为了能够访问两种语言的库。即使如此，也请尝试评估你的项目，看看是否有其他替代方案来在同一个代码库中使用这两种语言。\n\n\n\n## 总结\n\n\
  在本章中，你学习了 Objective-C 编译器，这是 Mac OS X 和 iOS 软件开发中最重要的工具。编译器负责读取你的源代码并将其转换为可执行代码，这些代码通常以处理器可直接运行的格式存储。\n\
  \n当前用于 Objective-C 语言的编译器 LLVM clang 拥有许多影响最终输出质量的选项。诸如二进制代码的*速度*、*大小*，或是否包含*调试信息*等属性，均由编译过程中传递给编译器的选项定义。作为\
  \ Objective-C 开发者，熟悉这些影响 C 语言和 Objective-C 语言程序结果的选项非常重要。\n\nObjective-C 编译器的一个特性是，它不仅能识别纯\
  \ C 和 Objective-C 语法，还能识别 C++ 语法。这意味着你可以混合使用两种语言的代码，以充分利用它们的最佳特性。当你创建扩展名为 `.mm`\
  \ 的文件时，Xcode 可以用来生成正确的结果。\n\n虽然编译器是编程开发中非常重要的工具，但在 Objective-C 的世界里，它无法在没有其他工具帮助的情况下生成输出。与\
  \ Objective-C 编译器紧密相关的一个重要工具是**预处理器**。预处理器在初始阶段运行，负责准备源代码以供编译器查看和处理。虽然如今预处理器很少作为独立程序使用，但理解其工作规则以及如何执行初始代码准备仍然非常有用。这将是下一章的主要内容，届时你将学习\
  \ Objective-C 预处理器的特性。\n\n"
- "# 13. 预处理器\n\n## 摘要\n\nObjective-C 配备了一个功能强大的预处理器，它可以简化将重复代码输入程序的过程。例如，预处理器可用于导入头文件，这些头文件用于使类定义对应用程序的其他部分可用。预处理器还用于定义宏，这些宏既可以作为常量使用，也可以根据参数执行简单的替换。\n\
  \n然而，尽管预处理器功能强大，如果使用不慎，它也可能成为众多编程陷阱的源头。由于预处理阶段执行的替换不会立即被编译器检查，因此存在通过预处理器引入的元素之间微妙的交互而导致产生错误代码的可能性。\n\
  \n在本章中，我将介绍预处理器的主要特性，并展示如何避免其一些粗糙的边缘问题。你将首先详细了解预处理器的工作原理以及它为 Objective-C 程序员提供的额外工具。在第一部分中，我将解释宏是如何工作的，以及如何使用它们来定义新符号和基于参数的替换。你还将了解宏的一些常见陷阱以及如何避免它们。接下来，你将看到\
  \ Objective-C 中用于包含头文件的工具。处理文件包含是预处理器执行的最重要任务之一，你将了解它是如何执行的，以及你有哪些选项来控制这个过程。\n\n\
  ## 定义宏\n\n预处理器的首要任务之一是为程序中常用的值定义符号名称。例如，假设你有一个处理文件路径的算法，并且在某个特定平台上，文件路径有 255 个字符的限制。这可以通过定义一个新宏来表示，如下所示：\n\
  \n`#define MAX_PATH_LENGTH 255`\n\n该语法仅由 `#define` 和一个宏名称组成，后跟你想要使用的任何符号或表达式（稍后你将看到当表达式长于一行时该如何处理）。Objective-C\
  \ 预处理器中的宏定义机制基于字面替换。这意味着，每当预处理器看到已定义的符号时，它都会用定义期间提供的值进行替换，如下所示：\n\n```\n- (BOOL)checkPathSize:(NSString\
  \ *)path\n{\n    if ([path length] > MAX_PATH_LENGTH)\n    {\n        NSLog(@\"\
  错误：路径长度无效\");\n        return NO;\n    }\n    return YES;\n}\n```\n\n如上面的示例所示，宏名称的行为类似于变量，但存在一些重要区别。首先，替换甚至在代码编译之前就发生了。也就是说，编译器本身从未见过符号\
  \ `MAX_PATH_LENGTH`，只看到最终的替换结果。因此，宏符号不与任何内存相关联，这与变量不同，变量通常存储在内存中，你可以使用诸如 `&` 之类的运算符操作其内存内容。\n\
  \n宏处理方式的另一个后果是，它们可以做的远不止替换常量值。例如，虽然不推荐，但以下类型的代码是有效的（甚至在早期曾被一些程序员使用过）：\n\n```\n#define\
  \ BEGIN {\n#define END }\nvoid myFunction(int val)\nBEGIN\n    if (val > 0)\n  \
  \  BEGIN\n        NSLog(@\"值为正\");\n    END\nEND\n```\n\n这是可能的，因为处理器盲目地执行宏替换，而编译器只会在这些替换完成后处理其结果。\n\
  \n为了避免处理宏替换时出现意外，C 和 Objective-C 有一项约定：宏名称应全部大写，以便与普通符号区分开来。这可能无法解决所有由宏产生的问题，但至少可以提醒程序员你正在处理的是一个预处理符号，而不是普通变量。\n\
  \n\n\n### 带参数的宏\n\n宏的另一个特性是可以带参数，其语法与函数调用类似。例如，要声明一个接收两个参数并返回较大值的宏，可以使用以下代码：\n\n\
  ```\n#define MAXIMUM(a, b) (a) > (b) ? (a) : (b)\n```\n\n这表示宏 `MAXIMUM` 有两个参数，其替换值位于声明之后。该宏使用三元运算符来检查作为参数传递的两个值。当第一个值大于第二个值时，返回第一个值；否则，宏返回第二个值。\n\
  \n带参数宏的通用语法是，在 `#define` 指令之后紧跟宏名，然后是放在括号中的参数。与函数不同，参数没有类型，因此你可以输入任何内容作为实参，例如变量、关键字或运算符。\n\
  \n宏的主体紧跟在参数列表之后。你可以在主体中使用任何表达式。与函数不同，宏在首次被看到时并不会被编译。宏的主体仅在进行替换时才被使用。当替换发生时，预处理器会替换参数，并将结果粘贴到宏出现的位置。只有在完成此过程之后，编译器才有机会检查宏的内容。\n\
  \n宏不能像函数那样跨越多行。然而，预处理器将反斜杠字符 (`\\`) 识别为续行标志。因此，只要需要连接到下一行的每一行都以反斜杠结尾，你就可以编写多行宏。例如，使用相邻行连接规则，之前的宏也可以写成：\n\
  \n```\n#define MAXIMUM(a, b) \\\n   (a) > (b) ? \\\n         (a) : \\\n        \
  \ (b)\n```\n\n请注意，除了表示宏结束的最后一行外，每一行都以反斜杠结尾。\n\n### 宏运算符\n\n宏的另一个特性是提供了自己的运算符，这些运算符在用于带参宏时可以执行有用的转换。提供这些运算符是为了简化在组合宏替换时经常需要的常见任务。\n\
  \n第一个运算符是字符串转换转换，也称为字符串化（stringify），因为它将作为参数传递的任何值或表达式转换为 C 风格的以空字符结尾的字符串。\n\n字符串转换运算符使用一个前导的\
  \ `#` 字符来指示接下来的宏参数将被转换为字符串。下面是一个例子：\n\n```\n#define EXP_TRUE(expr) \\\nif (expr)\
  \ \\\nNSLog(@\"the following expression is true: %s\", #expr)\n```\n\n这个宏可以用来判断一个表达式的计算结果是否为真值。它通过简单地使用一个\
  \ `if` 语句来实现，其中测试参数被用作表达式本身。如果这样的表达式计算结果为真，则会调用日志记录语句，并且字符串化运算符将把作为参数传递的任何表达式转换为一个字符串，然后发送到日志终端。\n\
  \n你可以向这个宏传递任何计算结果为 `YES` 或 `NO` 的表达式。例如，考虑下面的函数：\n\n```\n- (void) useMacro\n{\n\
  EXP_TRUE(2 + 3 > 4);\n}\n```\n\n这里，预处理器使用的表达式由括号内的全部内容组成。预处理器会找到宏名 `EXP_TRUE`，用作为实参传递的表达式替换所需的参数，并将结果粘贴到输出源文件中的相同位置。然后，当预处理器看到表达式\
  \ `#expr` 时，会触发将其转换为一个以空字符结尾的字符串。宏处理的结果如下：\n\n```\n- (void) useMacro\n{\nif (2 +\
  \ 3 > 4)\nNSLog(@\"the following expression is true: %s\", \"2 + 3 > 4\");\n}\n\
  ```\n\n正如你所见，预处理器将通用表达式转换为字符串的能力对于调试目的非常有用。例如，一个常用的标准宏是 `assert`；它包含在头文件 `assert.h`\
  \ 中，用于判断一个给定的表达式是否为真。如果不是，程序将停止并打印一条断言失败的消息。`assert` 宏在异常情况发生时立即诊断它们非常有用。\n\n```\n\
  - (double)squareRoot:(double) x\n{\nassert(x > 0);\n// 在此处执行计算\n}\n```\n\n这段代码在执行任何其他操作之前检查\
  \ `x` 是否为正数。如果参数不正确，程序将立即停止。\n\n另一个不太常用的运算符是连接运算符 (`##`)。当你提供两个符号时，会用到此运算符，其目标是创建一个新符号，该符号是这两个符号连接的结果。连接运算符的主要用途是创建唯一名称，这在处理复杂宏时有时是必要的。以下是其用法的一个简单示例：\n\
  \n```\n#define VARIABLE_NAME(partA, partB) \\\npartA ## _ ## partB\n```\n\n这个宏仅仅将两个参数（中间用下划线分隔）粘贴在一起，形成一个新的符号。然后，可以如下使用该宏：\n\
  \n```\n- (void)useMacroConcatenation\n{\nint VARIABLE_NAME(my, variable) = 10;\n\
  NSLog(@\"the value is %d\", my_variable);\n}\n```\n\n请注意，在第一行中，`VARIABLE_NAME` 宏创建了一个由两部分组成的新变量名。在宏定义中，这些部分被命名为\
  \ `partA` 和 `partB`。在这个示例应用中，结果是一个变量名，它由第一部分、后跟一个下划线、再连接到第二部分组成。当在下一行中将这个组合名称作为参数传递给\
  \ `NSLog` 时，你可以清楚地看到这一操作如预期般发生了，`NSLog` 将打印当前存储在变量中的值 10。\n\n与 `#define` 指令类似，预处理器也提供了\
  \ `#undef`，它能够从内存中移除宏的定义。当你想确保在代码的某个特定段中不使用某个宏时，这很有用。另一个用例是重新定义现有宏的值，例如在通过预处理器执行以下行之后：\n\
  \n```\n#undef VARIABLE_NAME\n```\n\n现在你可以确信符号 `VARIABLE_NAME` 是空闲的，如果需要，可以用不同的方式重新定义它。\n\
  \n\n\n### 常见陷阱\n\n在某些情况下，使用带参数的宏可能是一种快速且有用的机制，但应该提醒你不要频繁地使用它。以下是几个原因。\n\n首先，宏导致的问题难以诊断。由于宏的整个主体在真正的编译开始之前就被替换了，编译器无法准确地判断发生了什么。当宏替换内部发生编译错误时，你通常只会看到对某行的引用，而实际的错误与该行的内容关系不大。现代编译器可能在此问题上有所改进，但宏的诊断仍然比普通代码困难得多。\n\
  \n调试宏也是一项艰巨的任务，部分原因在于上述编译问题。例如，这限制了你在调试器中的选择，因为你无法精确定位宏中出错的准确行。一个至少能部分解决此问题的可能方法是生成预处理文件并验证其输出。你可以在\
  \ Xcode 中通过菜单 **Product** ➤ **Generate Output** ➤ **Generate Preprocessed file**\
  \ 来完成此操作。生成的文件通常非常大，因为它包含了所有通过 `#include` 或 `#import` 指令导入的头文件。但它可能有助于定位预处理器引入的确切转换。\n\
  \n一个相关的问题是，宏操作其参数的方式可能会导致生成的代码不符合有效的 C 或 Objective-C 代码规范。例如，考虑上面介绍的 `MAXIMUM` 宏，以及当你以下列方式使用它时代码被替换的情况：\n\
  \n```\n- (void)useMacro\n{\n    int i = 10;\n    NSLog(@\"the maximum is %d\", MAXIMUM(11,\
  \ i++));\n}\n```\n\n这段代码的问题在于，宏 `MAXIMUM` 在其定义的两个地方使用了参数 `i++`。虽然对于上述参数，`MAXIMUM`\
  \ 的值自然的预期结果是 11，但实际情况是操作 `i++` 被计算了两次。这意味着，在这种情况下，打印的结果将与预期不符。在其他情况下，不仅可能发生这种情况，甚至可能导致结果未定义，从而引发难以修复的\
  \ bug。\n\n**注**\n\n正如你在前一个例子中所见，宏增加了参数被错误计算的风险。虽然可以通过创建临时变量等方式来避免部分问题，但最佳策略是尽可能避免使用宏。如果必须使用，除非参数是为此目的设计的，否则应避免将表达式作为宏参数传递。\n\
  \n## 条件编译\n\n宏的另一个重要用途是定义条件编译语句，这些语句只有当某些编译时条件为真时才会被编译器处理。这些条件操作与普通条件语句（如 `if` 语句）不同，因为它们在编译器开始工作之前就已经执行。\n\
  \n### #if 指令\n\n例如，`#if` 指令可用于定义只有在特定编译时条件为真时才被处理的代码段。通常，条件涉及一个简单的算术比较，只有当条件评估为真时，其后的代码行才会被传递给编译器。所有这些行都会被包含在内，直到遇到下一个\
  \ `#endif` 指令。示例如下：\n\n```\n- (int) getSupportLevel\n{\n#if VERSION > 5\n    return\
  \ 2;\n#endif\n#if VERSION >= 2 && VERSION <= 5\n    return 1;\n#endif\n#if VERSION\
  \ < 2\n    return 0;\n#endif\n}\n```\n\n在此方法中，应用程序的支持级别是基于 `VERSION` 宏的值来定义的。这些检查发生在编译时，并且只有一个选项会为真。因此，方法\
  \ `getSupportLevel` 将返回一个支持级别（0、1 或 2）。\n\n`#if` 指令后面也可以跟一个 `#elif` 指令。类比 `#if`，`#elif`\
  \ 指令类似于 `else if` 语句，但它在编译时求值。最后，`#if` 或 `#elif` 指令后面也可以跟一个 `#else` 指令，它包含了仅当之前的检查为假时才应该编译的行。考虑到这些额外的指令，你可以使用\
  \ `#elif` 和 `#else` 更清晰地重写之前的示例：\n\n```\n- (int) getSupportLevel\n{\n#if VERSION\
  \ > 5\n    return 2;\n#elif VERSION >= 2 && VERSION <= 5\n    return 1;\n#else\n\
  \    return 0;\n#endif\n}\n```\n\n### #ifdef 指令\n\n在其他情况下，你想要测试的编译条件可能涉及其他已存在宏的定义。当宏用于表示某个特定功能是否存在时，这种情况很常见。例如，GCC\
  \ 编译器预定义了宏 `__GNUC__`，以便你可以检测程序是否正在被 GCC 编译。其他编译器和编译器特性也类似地定义了可用于条件编译的宏。\n\n你可以使用\
  \ `#ifdef` 和 `#ifndef` 指令编写仅在特定宏被定义时才会被编译的代码。前者类似于 `#if`，但它只检查紧跟其后的符号是否已在当前文件中被定义。类似地，`#ifndef`\
  \ 检查其后的宏符号，如果该符号尚未被定义，则执行后续代码行。示例如下：\n\n```\n- (void) detectGCCCompiler\n{\n#ifdef\
  \ __GCC__\n    NSLog(@\"This is the GCC compiler\");\n#endif\n#ifndef __GCC__\n\
  \    NSLog(@\"This is not the GCC compiler\");\n#endif\n}\n```\n\n另一种测试某个符号是否被定义的方法是使用\
  \ `defined` 宏运算符。当你想要创建更复杂的测试时，这个运算符非常有用。\n\n```\n- (BOOL) systemIsSupported\n{\n\
  #if defined(__GCC__) && VERSION > 3\n    return YES;\n#else\n    return NO;\n#endif\n\
  }\n```\n\n**注**\n\n要定义一个预处理器符号，你至少有两个选择：使用 `#define` 指令引入宏，或者在 GCC（或 LLVM）编译器中使用\
  \ `-D` 选项。例如，使用 `-DIS_DEBUG_VERSION` 将定义宏符号 `IS_DEBUG_VERSION`。Xcode 也允许在其项目设置界面中定义预处理器符号，但这最终会被转换为传递给编译器的\
  \ `-D` 选项。\n\n\n\n## 导入机制\n\n预处理器的主要用途之一是为特定源文件所使用的元素插入必要的定义。例如，你已经了解到，在创建类时，应该准备一个包含类接口定义的头文件（扩展名为`.h`），以及一个包含该类方法实现的实现文件。每当使用某个类时，都需要将该类的头文件导入到实现文件中。\n\
  \n将头文件导入实现文件有两种方式。第一种方式是使用`#include`机制。`#include`指令在 C 语言和 Objective-C 中都有提供。它的基本功能是将所引用文件的内容插入到当前源文件中。因此，你可以利用\
  \ Objective-C 标准库中提供的多个库，以及外部库。\n\n`#include`机制主要用在 C 语言库中，因为它是 C（和 C++）语言唯一可用的方式，并且定义新的头文件需要额外的工作。要使用`#include`，你只需说明需要访问哪个头文件，如下所示：\n\
  \n`#include <stdio.h>`\n\n这会将标准 I/O C 库的内容导入到你的程序中。使用这个库，你可以调用诸如`printf`（打印功能）或`fopen`（打开文件）等函数。\n\
  \n定义可以被`#include`到文件中的头文件需要稍多一些准备。以下是使用`#include`导入的头文件的标准组织结构：\n\n```\n#ifndef\
  \ INCLUDED_MYFILE\n#define INCLUDED_MYFILE\n// 文件内容写在这里\n#endif\n```\n\n这里，`INCLUDED_MYFILE`是一个仅在此头文件中使用的唯一标识符。起初，这种结构可能看起来不自然，但它的主要目的是避免同一源文件多次处理同一个头文件。为此，每个头文件在顶部定义了自己唯一的符号。通常，宏符号的名称源自文件名。因此，如果文件名为`Employee.h`，那么包含宏可能被命名为`INCLUDED_EMPLOYEE_H`。\n\
  \n这种方案的结果很容易解释：首先，检查唯一符号是否已定义。如果未定义，则先定义该符号，然后编译头文件的内容。但如果该符号已定义，则意味着这不是预处理器第一次访问当前文件。因此，头文件的内容将被跳过，从而避免多次包含。\n\
  \n第二种包含文件的方式是 Objective-C 独有的，它通过`#import`指令实现。`#import`和`#include`的主要区别在于，前者会自动处理多次包含的问题，因此无需使用上述条件宏包含方案。\n\
  \n使用`#import`时，预处理器有一个内部数据库，因此它已经知道哪些文件已被处理过。这种技术保证了文件只会被处理一次。因此，你不需要使用条件编译技巧，比如上面提到的那种。\n\
  \n`#import`和`#include`指令可以通过两种方式指定文件：文件名可以放在尖括号中，也可以放在双引号中。这两种定义导入文件方式的区别在于文件名的搜索方式。当使用尖括号时，隐含的假设是预处理器将在所有系统包含目录中搜索。这些目录可以通过系统设置组合来确定。例如，你可以在\
  \ Xcode 的包含路径配置工具中列出它们。或者，你可以通过`–I`选项将这些目录添加到 GCC/LLVM 命令行界面中。\n\n另一方面，你可以使用双引号来限定头文件名。在这种情况下，隐含的指示是预处理器将在当前目录中搜索具有指定名称的任何文件。因此，双引号版本可用于输入你自己的头文件，这些头文件将构成你自己项目中的类列表。\n\
  \n通常，双引号括起来的头文件名意味着该头文件是用户创建的。类似地，尖括号括起来的头文件名表明该文件是系统或某些其他外部库的一部分。保持使用这两个选项的一致性很重要，这样你就能始终导入正确的头文件，从而避免错误。\n\
  \n\n\n## 头文件最佳实践\n\n鉴于 Objective-C 中头文件必要且广泛的使用场景，开发者需要遵循一些约定来维护基本的系统组织并避免性能问题。这些最佳实践对于简单项目而言有时并非必需，但当项目规模增大，尤其是当有许多开发者协作开发同一应用程序时，它们的重要性便日益凸显。\n\
  \n应遵循的首要规则是：头文件只应包含类和函数的定义。在头文件中包含方法或函数的实现是不规范的做法，因为大多数头文件设计用于在系统的多个位置被引用。若同一函数定义在不同文件中出现两次，可能会导致链接错误，因为链接器无法确定应保留哪个版本的函数或方法。\n\
  \n另一条经验法则是：尽可能避免头文件的嵌套引用。原因在于，由于预处理器会递归地执行文件包含操作，在主头文件中包含过多头文件，将会强制增加该类的每个使用者的编译时间。换言之，在包含文件中，仅添加能够定义该类接口的绝对必要内容即可。\n\
  \n显然，有时确实需要传递性地包含头文件；例如，当声明某个现有类的子类时，就需要包含父类的头文件，以便编译器能够看到其定义。但在其他情况下，可以避免直接包含头文件，从而降低应用程序的复杂性。\n\
  \n有几种方法可以避免包含额外的头文件。例如，在 Objective-C 中，当某个类仅作为类接口的一部分使用时，可以使用 `@class` 关键字来引入该类名。在类接口定义中，除非需要访问该类中的数据或方法，否则通常只需要这样做。下面是一个常见示例：\n\
  \n```\n// 文件 MyInternalClass.h\n@class MyExternalClass;\n\n@interface MyInternalClass\
  \ : NSObject\n{\n    MyExternalClass *externalObject;\n}\n\n-(MyExternalClass*)\
  \ getExtObject;\n\n@end\n```\n\n请注意，这里的 `MyExternalClass` 仅作为 `MyInternalClass`\
  \ 接口的一部分使用。在这种情况下，实际上并不需要使用 `#import` 指令；仅用 `@class` 声明就足以告知编译器 `MyExternalClass`\
  \ 是何种符号。从那时起，编译器便会将 `MyExternalClass` 记录为一个类的名称，可用于，例如，定义实例变量或作为其他方法的参数。稍后，当你准备编写方法实现时，才需要导入\
  \ `MyExternalClass` 的头文件。\n\n```\n// 文件 MyInternalClass.m\n#import \"MyExtenalClass.h\"\
  \n\n@implementation MyInternalClass\n\n- (MyExternalClass*) getExtObject\n{\n  \
  \  // 此处为具体实现……\n}\n\n@end\n```\n\n另一个尽可能减少其他文件传递性包含的选项是创建最小化头文件——即其中只定义一个类，而没有多余内容。特别是，要在接口中避免外部依赖，并将其移至实现部分。此技术的目标是通过仅在类接口中添加你真正需要的接口和函数，来尽可能避免外部依赖。\n\
  \n例如，假设你正在创建一个使用其他三个库头文件的新类。与其创建一个引用了其他三个库的头文件，不如定义一个没有外部依赖的小型接口。为了帮助避免依赖，你可以创建一个匿名协议，其中包含你所需的、与外部库相关的所有属性。这样，在实现文件中，你就可以自由地导入所使用每个库的头文件。这种审慎的接口与实现分离，将有助于其他使用者导入和使用你的类。这种审慎用法的附带效果是使项目更易于维护、构建速度更快。\n\
  \n## 总结\n\n预处理是源文件被准备成为编译器输入时所执行的第一项任务。因此，这是一项需要掌握的重要操作，以便充分利用 Objective-C 编程环境。\n\
  \n例如，预处理器会根据使用 `#define` 工具定义的符号执行多项转换。这些宏可用于简单的替换，既可以是无参数的，也可以是带参数的。无参数宏的作用类似于编译时常量。而带参数的宏则能够执行更复杂的替换。你已经看到了一些使用宏的常见陷阱，以及为何在有其他可行选项时应避免过度使用宏。\n\
  \n预处理器还能基于编译时表达式执行条件编译，通过评估表达式的结果来决定某段代码是否会被编译。这种条件编译通常用于兼容性目的，例如，可用于创建能运行在多个平台上的应用程序。\n\
  \n最后，你已看到预处理器执行的另一项重要任务：为外部定义的类和函数包含头文件。这类头文件包含接口或函数定义，可以随时提供给其他使用者。包含机制可通过 `#include`\
  \ 或 `#import` 指令实现，并且你已经了解了这两种选项各自的优缺点。\n\n利用你所学到的关于编译器和预处理器的知识，你将开始研究一些可以通过使用 Objective-C\
  \ 特性来执行的常见编程任务。在下一章中，你将学习如何使用这些语言工具创建单元测试。你将看到，Objective-C 和 Cocoa 框架通过其库以及 Xcode\
  \ IDE，为测试驱动开发提供了卓越的支持。\n\n\n\n"
- "# 14. 单元测试\n\n## 摘要\n\n单元测试是一种编程策略的基础，该策略倡导为应用程序中实现的每个功能创建独立的检查。单元测试也可用于验证某段代码是否符合特定需求。例如，若你创建了一个将两个数相加的方法，便可编写一个单元测试来验证其在某些特定情况下返回的结果是否正确。虽然仅通过测试特定值无法证明代码完全没有问题，但运行单元测试能够增强你对代码确实能返回符合需求结果的信心。\n\
  \n单元测试及其相关工具的另一个用途体现在所谓的测试驱动开发（TDD）中。TDD 是一种软件方法论，要求程序的每一个特性在编写之前都需通过单元测试进行详尽的规定。也就是说，采用\
  \ TDD 时，程序员利用新的测试来驱动代码的开发，最终使代码满足所编写测试的要求。\n\n基于单元测试的开发是探索 Objective-C 等面向对象语言模块化特性的绝佳途径。事实上，单元测试框架之所以流行，部分原因在于面向对象编程能够创建定义良好的接口，并且这些接口中的对象对外部代码的依赖很少。\n\
  \n`OCUnit`等测试框架充分利用了这些面向对象编程的特性，使得使用 Objective-C 的程序员能够进行单元测试。在本章中，我将概述如何在 Objective-C\
  \ 中使用`OCUnit`和`Xcode`进行单元测试。你将学习如何在新的或现有的项目中快速创建单元测试，还将学习如何使用`Xcode` IDE 管理和运行测试集。最后，你将看到一个如何运用\
  \ TDD 编程策略来编写 Objective-C 代码的示例。\n\n## 单元测试框架\n\n有责任心的程序员一直努力创建能够检验他们正在实现的功能的测试。因此，测试方法论早在面向对象编程语言发展之前就已存在，并且始终在创建高质量代码中扮演着重要角色。然而，像\
  \ Objective-C 这样的面向对象语言提供了一种不可或缺的工具，使得高效的单元测试更易于实现。同时，面向对象编程的特性促成了单元测试通用接口的创建，跨团队或跨公司工作的程序员都可以利用这一接口。\n\
  \n最具影响力的基于面向对象编程的测试框架是`SUnit`，它是一个用 Smalltalk 编写的单元测试库。尽管 Smalltalk 作为一种编程语言在过去十年中\
  \ popularity 有所下降，但其许多原始理念（例如对基于消息的多态性的强大运行时支持）依然强劲。这些理念甚至已融入 Objective-C、JavaScript\
  \ 和 Ruby 等其他主流语言中。Smalltalk 的影响力也延伸到了单元测试技术，例如`SUnit`，它至今仍几乎被这些较新的语言原封不动地沿用。因此，Java\
  \ 拥有`JUnit`，而 Objective-C 则拥有`OCUnit`，这是一个在设计方法和接口上与 Smalltalk 通过`SUnit`引入的框架非常相似的库。\n\
  \n在本章中，我将讨论`OCUnit`中用于支持单元测试创建和执行的特性。我将主要围绕`OCUnit`展开讨论，主要是因为它是 Objective-C 领域事实上的标准。其成为标准的主要原因之一是苹果公司的支持，它是随`Xcode`一起部署的官方测试库。该\
  \ IDE 允许程序员添加基于`OCUnit`的测试目标，以及运行测试并在日志导航面板中显示结果。基于以上原因，`OCUnit`目前是在 Objective-C\
  \ 中实现单元测试的自然之选。\n\n## 注意\n\n请记住，`OCUnit`并非唯一可用于 Objective-C 的测试框架。实际上，还有其他用 Objective-C\
  \ 编写的测试框架已作为开源项目提供。使用直接用 C 语言编写的框架（如`CUnit`）也是合适的。特定测试框架的适用性更多取决于项目本身的需求，而非语言的要求。例如，在某些大型项目中，与其他的\
  \ C 和/或 C++遗留代码相比，用 Objective-C 编写的代码量可能很小。在这种情况下，使用基于 C 或 C++的测试工具可能更为方便。\n\n\n\
  \n## 添加单元测试目标\n\n在本章中，我假设你正在使用 Xcode 创建和构建项目。通过命令行工具添加单元测试是可行的，但这高度依赖于你所使用的构建工具，并且通常不被\
  \ Apple 支持。因此，在本章中，我只描述使用 Xcode 创建单元测试的过程。\n\nXcode 项目可以划分为多个目标，这些目标用于组织单个项目可能产生的各种输出。项目中的目标通常是一个可执行文件，具体取决于你想要支持的平台和环境。单元测试目标允许你创建一个独立的可执行文件，其目的是针对生产代码运行测试用例。通过这种方式，你可以将应用程序特有的代码与仅用于测试应用程序的代码清晰地分离开来。\n\
  \n此外，Xcode 支持两种测试目标，每种目标都与特定类型的测试相关联。逻辑测试是指你只关心单独测试某个特定方法或类正确性的测试。对于这类测试，Xcode 只需要能够找到被测试方法的代码，并将其包含在单元测试目标的可执行文件中。\n\
  \n第二种单元测试是应用测试。这些测试并非完全隔离运行，而是在应用程序的上下文中运行。例如，它们可用于确定特定窗口中的按钮是否具有正确的标签。或者你可以用它们来验证当点击某个菜单选项时，某个特定值是否会更新。由于其自身特性，应用测试依赖于它们所搭建的平台以及该特定环境所使用的工具集。\n\
  \n**注意**\n\n由于应用测试本身具有与环境相关的特性，在本章中我将只考虑逻辑测试，因为逻辑测试在 Objective-C 支持的任何平台上都有效（甚至可能在非\
  \ Apple 环境中也能工作）。如果你打算使用特定于应用的单元测试，请查阅你目标环境的编程手册。Apple 在 Xcode 中为 Mac OS X 和 iOS\
  \ 目标都提供了相关信息。\n\n有两种方法可以向你的代码添加单元测试。第一种也是最简单的方法，是在创建项目时添加测试目标。通过 **新建** ➤ **项目**\
  \ 菜单选项，你可以从多种项目类型中创建一个新应用程序。如果你选择“OS X 应用程序”，然后选择“Cocoa 应用程序”，将会出现图 14-1 所示的窗口。确保你勾选了“包含单元测试”选项，Xcode\
  \ 就会生成包含关联单元测试目标的新项目。\n\n![A978-1-4302-5906-0_14_Fig1_HTML.jpg](img/A978-1-4302-5906-0_14_Fig1_HTML.jpg)\n\
  \n图 14-1.\n\n在新项目中包含单元测试\n\n包含单元测试的第二种方法是向现有项目添加一个新目标。Xcode 允许你创建新目标，这是 IDE 支持生成新可执行文件的通用名称。假设你有一个现有项目，想要向其添加一组单元测试。你可以在项目打开时，通过\
  \ **新建** ➤ **目标** 菜单来添加新目标。在左侧选择“其他”选项。你会看到一些项目，从中可以选择“Cocoa 单元测试捆绑包”。目标选择窗口如图 14-2\
  \ 所示。\n\n在目标创建窗口的下一个屏幕中，你可以输入详细信息，例如目标名称以及将包含该目标的项目。输入这些信息后，Xcode 将创建新目标，并用一些可立即用于创建新测试用例的文件预先填充它。\n\
  \n![A978-1-4302-5906-0_14_Fig2_HTML.jpg](img/A978-1-4302-5906-0_14_Fig2_HTML.jpg)\n\
  \n图 14-2.\n\n选择单元测试目标\n\n让我们创建一个名为 `TestUT` 的新目标，它将包含个人项目的测试用例。Xcode 会自动生成一个名为 `TestUT`\
  \ 的新类，该类将用于存储任何新的测试用例。以下是头文件：\n\n```\n// 文件 TestUT.h\n#import <SenTestingKit/SenTestingKit.h>\n\
  @interface TestUT : SenTestCase\n@end\n```\n\n上面用到的符号 `SenTestingKit` 是包含 OCUnit\
  \ 框架的名称。默认类继承自 `SenTestCase`，以便它能够使用 OCUnit 提供的所有方法。以下是相应的实现文件：\n\n```\n// 文件 TestUT.m\n\
  #import \"TestUT.h\"\n@implementation TestUT\n\n- (void)setUp\n{\n    [super setUp];\n\
  \    // 此处的设置代码。\n}\n\n- (void)tearDown\n{\n    // 此处的清理代码。\n    [super tearDown];\n\
  }\n\n- (void)testExample\n{\n    STFail(@\"TestUT 中尚未实现单元测试\");\n}\n@end\n```\n\n\
  请注意实现文件已经为你提供了单元测试类中经常需要的几个方法。你首先需要理解这些方法在测试用例执行过程中是如何协同工作的。\n\n`setUp` 方法负责初始化测试用例的测试环境。你可以在此处添加在测试类中想要运行的每个测试共有的任何代码。例如，如果你需要为每个测试提供一个数据库连接，你可以将创建连接的代码作为\
  \ `setUp` 方法的一部分来编写。\n\n类似地，`tearDown` 方法用于 Finalize 该类中每个测试用例所使用的环境。以数据库连接为例，你可能希望在此处关闭连接，这样就不需要在每个测试用例中重复该代码。\n\
  \n\n\n## 创建新测试\n\n在 OCTest 中创建测试用例是一个简单的过程。您只需向测试类（在本例中称为 `TestUT`）添加方法即可。这些方法甚至不需要添加到公共接口中，因为\
  \ OCTest 框架会负责运行包含在实现部分中的任何测试用例。唯一的要求是，代表测试用例的方法必须以单词 `test` 开头，返回 `void`，并且没有预期参数。因此，您可以按如下方式添加一个新的测试用例：\n\
  \n```\n- (void)testExample\n{\n        // 这段代码将由 OCUnit 运行\n        STAssertTrue(TRUE,\
  \ @\"示例测试\");\n}\n```\n\n虽然添加测试的机制很简单，但更重要的是从逻辑上判断何时应在测试用例列表中添加一个新测试。\n\n理论上，可以为大多数非平凡方法编写的测试用例数量是无限的。然而，在实践中，您应该只编写测试来确保实现的某些方面返回正确的结果。例如，这里有一个将整数参数加一的方法：\n\
  \n```\n- (int) addOne:(int)value\n{\n        // 在此处实现\n}\n```\n\n不可能测试每一个整数值。但是，编写测试来检查该方法对正整数、负整数和零的准确性是有意义的，例如：\n\
  \n```\n- (void)testExample\n{\n        // 在此处创建对象...\n        STAssertEquals([obj\
  \ addOne:2], 3, @\"测试 2\");\n        STAssertEquals([obj addOne:-3], -2, @\"测试 -3\"\
  );\n        STAssertEquals([obj addOne:0], 1, @\"测试 0\");\n}\n```\n\n通常，创建不仅适用于一般情况，也适用于边界情况的测试是很有用的。例如，如果某个方法应该只对正数有效，那么您应该检查当零作为参数传入时会发生什么，因为在这种边界情况下出现错误是很常见的。\n\
  \n另一个经验法则是，每当发现新的、无法预见的情况时，就添加新的测试用例。例如，如果您在代码中发现了一个 bug，那么添加一个测试用例来检查该 bug 是否已被正确修复是非常有用的。这不仅对于保证当前代码的准确性很重要，而且对于确保代码的未来版本不会出现同样的错误也很重要。这类测试也称为回归测试，因为它们可以防止先前修复的\
  \ bug 重新出现在工作代码中。\n\n## 在 Xcode 中运行测试\n\n在 Xcode 中构建测试目标并创建新测试，只是为软件开发使用单元测试方法流程的一半。一旦创建了测试，您就需要在实际的开发环境中运行它们，并验证它们是否全部通过。Xcode\
  \ 允许您从 IDE 内部运行测试，这样您就可以轻松修复测试过程中出现的任何问题。\n\n如果您在项目中已经有了一个预先设置好的测试目标，您可以使用菜单选项 Product\
  \ ➤ Test（或键盘快捷键 `⌘U`），项目中定义的测试将会被执行。您有两种方式查看结果。第一种是查看测试目标中执行的所有测试列表。要查看它们，您可以使用菜单栏中的日志导航器，选择\
  \ View ➤ Navigators ➤ Show Log Navigator（或键盘快捷键 `⌘7`）。这将在 Xcode 屏幕左侧显示日志导航器。点击与测试操作相对应的日志，您将看到测试目标执行的完整日志。如果一切顺利，您应该会看到一个标记为绿色的测试列表。\n\
  \n访问单元测试结果的第二种方式是通过问题导航器，当一个或多个单元测试失败时即可使用。当发生这种情况时，Xcode 会生成一个问题，该问题与其它问题类别一起列在其导航器中。您可以通过主菜单选择\
  \ View ➤ Navigators ➤ Issue Navigator 来访问此视图。然后，查看问题（以红色列出），这将指示在上次执行中是否有一个或多个单元测试失败。您可以点击该问题，代码编辑器将直接跳转到失败的单元测试的位置。您也可以双击该问题，此时将出现一个新的编辑器窗口，光标会定位到错误的确切位置。现在，您可以编辑测试或被测试的代码来修复问题。\n\
  \n## OCUnit 断言宏\n\n正如您在之前的例子中所看到的，您需要使用断言表达式来确定测试是否返回了预期结果。使用断言来确定测试正确性非常普遍，以至于\
  \ OCTest 为此定义了多个宏。这些断言宏可以判断两个值是否相等、不同，或者是否符合某种其他关系。\n\nOCTest 中的大多数断言宏都有一个通用的接口。通常的模式是断言名称以\
  \ `STAssert` 开头，后跟该宏要执行的测试类型。例如，`STAssertEquals` 用于执行相等性测试。\n\n每个断言宏的参数也遵循类似的模式。前几个参数是要应用测试的对象或值。例如，在\
  \ `STAssertEquals` 中，前两个参数是测试相等性的对象。然后，下一个参数是一个描述测试含义的字符串。当断言失败时，该参数会显示在 Xcode 测试日志中。因此，提供一个适当的描述非常重要，这样可以在问题发生时更容易地发现它。\n\
  \n断言宏的另一个常见特性是，描述可以像 `NSLog` 一样接受格式化参数。这在宏中通过使用 \"...\" 语法指定最后一个参数来表达。\n\n以下是 OCUnit\
  \ 中常用的断言宏列表。\n\n*   `STAssertEquals(value1, value2, description, ...)`: 当两个值相同时，此宏成功。否则，测试失败并显示给定的描述。此宏适用于非对象值，例如数字、`struct`\
  \ 或通用指针。\n*   `STAssertEqualObjects(obj1, obj2, description, ...)`: 当两个对象相同时，此宏成功。否则，测试失败并显示给定的描述。此宏适用于对象，并使用\
  \ `isEqual:` 方法测试相等性。当对象的 `isEqual:` 返回 `false` 或任一对象为 `nil` 时，会发生失败。\n*   `STFail`:\
  \ 这是一个始终失败的宏。在某个代码路径不应该被执行的情况下，使用 `STFail` 很方便，例如：\n\n```\n- (void)testExample\n\
  {\n    int value = [myObj fileOperation];\n    switch (value)\n    {\n        case\
  \ ERROR_NO_SPACE:\n        case ERROR_INCORRECT_FILE_NAME:\n            STFail(@\"\
  针对不支持的值测试失败\");\n            break;\n        // 其他情况在此处...\n        default:\n \
  \           break;\n    }\n}\n```\n\n在这个例子中，您有一个 switch 语句，其值取决于您正在测试的方法。测试用例需要验证返回值以确定其正确性。在方法返回的值中，您要确保不允许出现\
  \ `ERROR_NO_SPACE` 和 `ERROR_INCORRECT_FILE_NAME` 这两个值。检查此条件的一种方法是使用 switch case，并在返回这两个值时调用\
  \ `STFail`。虽然此处未展示，但您可能还有许多其他情况需要验证。\n\n\n\n- `STAssertEqualsWithAccuracy(value1,\
  \ value2, accuracy, description, ...):` 此宏使用给定的精度比较第一个值和第二个值。如果比较失败，则使用描述来提示出了什么问题。当处理浮点数值时，此比较宏非常有用，因为精度表示这两个值之间可接受的微小差异。\n\
  - `STAssertNil(expression, description, ...):` 此宏测试给定的表达式是否为`nil`值。否则，将使用提供的描述报告失败。\n\
  - `STAssertNotNil(expression, description, ...):` 此宏测试给定的表达式是否为非`nil`值。否则，将使用提供的描述报告失败。\n\
  - `STAssertTrue(expression, description, ...):` 此宏测试给定的表达式的值是否为`YES`。否则，将使用提供的描述报告失败。\n\
  - `STAssertFalse(expression, description, ...):` 此宏测试给定的表达式的值是否为`NO`。否则，将使用提供的描述报告失败。\n\
  - `STAssertThrows(expression, description, ...):` 此宏测试给定的表达式在执行时是否抛出异常。如果没有抛出异常，则使用提供的描述报告失败。\n\
  \n异常是一种 Objective-C 机制，用于发出意外错误信号。当库无法从特定错误中恢复时，可能会生成异常。你也可以使用`@throw`关键字生成异常。以下是抛出异常并使用断言宏检测它的示例。此方法用于返回字符串的第一个字符。如果字符串为空，则该方法使用`@throw`关键字引发异常。\n\
  \n```\n- (char)getFirstChar:(NSString *)string\n{\n    if ([string length] < 1)\n\
  \    {\n        @throw [[NSException alloc] initWithName:@\"firstChar\"\n      \
  \                                    reason:@\"StringIsEmpty\" userInfo:nil];\n\
  \    }\n    return [string characterAtIndex:0];\n}\n```\n\n此方法将检查是否存在至少一个字符并返回它。如果字符串为空，它会创建一个描述异常的`NSException`对象，并使用`@throw`关键字生成异常信号。以下测试可用于保证生成异常：\n\
  \n```\n- (void)testGetFirstChar\n{\n    StringOps *so = [[StringOps alloc] init];\n\
  \    STAssertThrows([so getFirstChar:@\"\"], @\"checks for exception on empty string\"\
  );\n}\n```\n\n此测试将使用空字符串调用`getFirstChar:`方法。这将检查是否按要求抛出了异常，并在发生时测试通过。\n\n- `STAssertThrowsSpecific(expression,\
  \ exception_class, description, ...):` 此宏测试给定的表达式在执行时是否抛出了第二个参数中指定的特定异常。如果没有抛出异常，则使用提供的描述报告失败。\n\
  - `STAssertNoThrow(expression, description, ...):` 此宏测试给定的表达式在执行时是否不抛出异常。如果抛出了异常，则使用提供的描述报告失败。\n\
  - `STAssertNoThrowSpecific(expression, exception_class, description, ...):` 此宏测试给定的表达式在执行时是否不抛出`send`参数中列出的异常类型。如果抛出了异常，则使用提供的描述报告失败。\n\
  \n## Test-Driven Development\n\n测试驱动开发 (TDD) 是一种软件开发策略，其意义远不止于简单地向项目添加测试。TDD 的核心思想是编写测试应先于开发或编写实际代码。TDD\
  \ 背后的理由是，好的代码应该始终有测试来保证其正常工作。另一方面，拥有测试有助于我们专注于特定功能的开发，以实现期望的功能。\n\nTDD 的这些特性导致了一个特定的工作流程，该流程与大多数开发人员使用的标准编码技术有些不同。其理念是使用单元测试集作为项目中新功能的驱动力。这意味着在向项目添加新类或方法时，首先要做的是创建测试，这些测试将保证新代码的行为符合预期。\n\
  \n例如，假设你想向`StringOps`类添加一个计算字符串反转的新方法。根据 TDD，你需要做的第一件事，甚至在编写类的任何接口之前，就是创建一个名为`testReverse`的新方法。\n\
  \n```\n- (void)testReverse\n{\n    STFail(@\"not implemented\");\n}\n```\n\n此测试将按预期失败。但这是一个重要的特性，因为在\
  \ TDD 中，你希望测试失败，直到所需功能被正确实现。因此，下一步是创建一个名为`StringOps`的类。然后，可以使用以下代码更新测试：\n\n```\n\
  - (void)testReverse\n{\n    StringOps *so = [[StringOps alloc] init];\n    STAssertTrue(so\
  \ != nil, @\"check object created\");\n}\n```\n\n在你导入`StringOps`的头文件后，此测试应该能够编译并正确运行。该测试只是检查你是否可以创建一个`StringOps`类型的对象，这是一个应该可行的简单测试。\n\
  \n现在你已经通过了`StringOps`对象的创建测试，下一步是添加一个实现字符串反转操作的方法。首先要为此创建一个测试。\n\n```\n- (void)testReverse\n\
  {\n    StringOps *so = [[StringOps alloc] init];\n    STAssertTrue(so != nil, @\"\
  check object created\");\n    STAssertEqualObjects([so reverse:@\"ABC\"], @\"CBA\"\
  , @\"check string reversal\");\n}\n```\n\n同时，你需要在`StringOps`类中添加一个相应的方法，以便测试能够编译。\n\
  \n```\n#import <Foundation/Foundation.h>\n@interface StringOps : NSObject\n- (NSString*)reverse:(NSString\
  \ *)string;\n@end\n```\n\n至于`reverse:`方法的实现，你将从一个仅返回原始字符串的简单实现开始。\n\n```\n#import\
  \ \"StringOps.h\"\n@implementation StringOps\n- (NSString*)reverse:(NSString *)string\n\
  {\n    return string;\n}\n@end\n```\n\n这个算法显然是不正确的，但这正是 TDD 的策略：从一个失败的测试开始，然后才创建一个能够验证测试的有效实现。通过单击\
  \ ![A978-1-4302-5906-0_14_Fig1c_HTML.jpg](img/A978-1-4302-5906-0_14_Fig1c_HTML.jpg)\
  \ + U（运行测试），你将看到一个需要修复的失败测试。错误信息显示“`'ABC' should be equal to 'CBA' check string\
  \ reversal`”。单击该错误，编辑器将定位到失败测试所在的位置。\n\n现在，你将编写一个使该测试成功的实现。你将使用一个简单的算法来遍历字符串并交换字符，返回一个新的`NSString`。\n\
  \n```\n- (NSString*)reverse:(NSString *)string\n{\n    char* cstr = (char*)[string\
  \ UTF8String];\n    int size = (int)[string length];\n    int i, j;\n    for (i=0,\
  \ j=size-1; i<size/2; ++i, j--)\n    {\n        char c = cstr[i];\n        cstr[i]\
  \ = cstr[j];\n        cstr[j] = c;\n    }\n    return [NSString stringWithCString:cstr\
  \ encoding:NSUTF8StringEncoding];\n}\n```\n\n\n\n输入值被用于通过`UTF8String`方法创建一个以空字符结尾的\
  \ C 风格字符串。然后，你使用一个简单的循环遍历 C 数组的字符，交换它们的位置以实现反转。数组反转后，你使用类方法`stringWithCString:encoding:`创建并返回一个新字符串，该方法接受一个以空字符结尾的字符数组和所需的编码（在本例中使用标准`UTF8`编码）。\n\
  \n再次运行测试后，你会看到`testReverse`现在通过了。这表明`reverse`的实现产生了预期的结果。与任何测试流程一样，你应该为同一方法添加其他测试以增强对其正确性的信心。例如，你可以添加一个新的断言来确保空字符串被正确处理。\n\
  \n```\n- (void)testReverse\n{\n    StringOps *so = [[StringOps alloc] init];\n \
  \   STAssertTrue(so != nil, @\"check object created\");\n    STAssertEqualObjects([so\
  \ reverse:@\"ABC\"], @\"CBA\", @\"check string reversal\");\n    STAssertEqualObjects([so\
  \ reverse:@\"\"], @\"\", @\"check empty strings\");\n}\n```\n\n为了使用 TDD 进行后续操作，你应该从一个失败的示例开始，例如将第二个参数替换为`@\"\
  A\"`。看到失败后，将其替换为正确的结果`@\"\"`，然后再次运行测试。这应该会成功，从而增强你对测试和被测代码行为正确的信心。\n\n**注意**\n\n\
  上面给出的简单示例展示了使用 Objective-C 遵循测试驱动开发方法所需的所有步骤。使用 TDD 的优势在于，你可以在每一步专注于一个小功能。然后，当该步骤的实现完成后，执行相关测试会增强你对其正确性的信心。TDD\
  \ 流程与标准开发技术截然不同，后者是先编写代码，然后仅在功能就绪时才使用临时程序进行测试。\n\n## 总结\n\n在本章中，你探讨了单元测试，这是一种经常用于提高代码质量和减少软件产品缺陷数量的编程实践。单元测试方法还有一个额外的好处，即提供快速的开发周期，使程序员能够快速编写代码并测试其正确性。\n\
  \nObjective-C 是使用单元测试方法开发程序的理想环境。它对面向对象技术的支持意味着更容易将代码分解为可以独立测试的较小模块。Objective-C\
  \ 还提供了一个完整的测试框架，称为`SenTestingKit`，它实现了`OCUnit`库。`OCUnit`基于`SUnit`，这是第一个广泛使用的单元测试解决方案，专为\
  \ Smalltalk 语言创建。\n\n你已经学习了如何将单元测试目标集成到现有的 Objective-C 项目中，以及如何将此类目标添加到新项目中。然后，我讨论了可以添加到单元测试用例中的测试类型示例。`OCUnit`框架提供了丰富的测试宏集，便于检测大多数编程条件。例如，有些宏测试其参数是否为`nil`、是否等于或不同于其他对象，或者是否抛出特定类型的应用程序定义异常。\n\
  \n最后，你已经了解了这些特性如何用于支持测试驱动开发，这是一种使用单元测试作为实现新功能驱动力的编程方法论，同时为提供的测试提供实现正确性的一定保证。由于 TDD\
  \ 支持增量式开发方法，它已被成功地用于开发质量更高、错误更少的软件。以这种方式开发的代码经过频繁测试，也降低了变更产生意外副作用和隐藏错误的风险，而这些错误在完整功能实现后更难追踪。\n\
  \n代码测试只是编程的一个方面，尽管是重要方面。此外，理解如何处理最终可能进入开发周期后期阶段的编程错误非常重要。编程故障是常见现象，即使在通过单元测试制定了广泛代码验证策略的项目中也是如此。在下一章中，你将了解\
  \ Xcode 提供的功能，以促进软件错误的识别和消除。你还将看到 Objective-C 程序员可以利用 Objective-C 支持的特性使用的一些调试技术。\n\
  \n"
- "# 15. 调试\n\n**摘要**\n\n任何程序员都知道编写无缺陷软件是多么困难。这就是为什么每个平台都有许多集成的调试辅助工具，用于支持识别、重现和修复编程错误。Xcode\
  \ 为编写和调试程序提供了完整的解决方案，这使得在新应用或现有应用中查找错误变得更加容易。在本章中，我将解释如何使用这些调试功能。\n\n你将首先了解通用调试方法如何应用于\
  \ Objective-C 程序。为此，我将解释一些对查找和修复任何编程语言中的错误都很有价值的通用调试策略。然后，你将看到如何使用包含 Xcode 和相关命令行工具的\
  \ Objective-C 环境来支持这些通用调试策略。\n\n必要时，我将通过示例描述如何使用 Xcode 的功能，如断点、监视窗口、条件表达式和日志终端。我还将讨论如何使用`gdb`和`LLVM`调试器等命令行工具。\n\
  \n## 通用调试策略\n\n调试软件是一项需要大量脑力活动的工作，其思维方式与其他编程活动不同。在编程时，你处于“创造者”模式，不断尝试生成良好的软件设计并为现有代码添加新功能；而在调试时，你主要处于“研究者”模式，试图找出特定问题可能隐藏的位置。这种视角的差异是许多人发现难以高效查找和修复错误的原因。\n\
  \n从许多方面来看，在软件中发现问题类似于侦探工作。你需要有一个完善的流程来评估可能的原因并找出错误的根本原因。就像侦探一样，你从数据收集开始，这些数据稍后将用于精确定位问题发生的位置。只有在那时，你才能着手创建和验证关于如何解决该特定问题的假设。\n\
  \n以下是结构良好的调试策略所需步骤的总结。\n\n\n\n### 数据收集：调试的第一步\n收集数据是解决调试问题的第一步。你需要收集与尝试修复的问题相关的所有信息。为此，有一个非常重要的工具需要考虑使用：一个能够重现问题的案例。无法重现的漏洞非常难以解决，因为你无法追查最初导致问题出现的场景。信息收集过程的首要目标应该是确定如何可靠地重现该漏洞。只有这样，你才能开始着手确定修复方案。\n\
  \n### 定义假设：调试的第二步\n当你有办法重现问题之后，下一步就是创建一个关于为什么这不起作用的假设。例如，你可能错误地初始化了一个变量，或者算法中缺少了一个步骤。无论你对问题根源的专业猜测是什么，你都应该制定一个计划来测试这个假设。这通常涉及更多的信息收集，比如查看应用程序日志，或者在调试器中运行应用程序。通过这样做，你将对你试图修复的漏洞的根本原因有更清晰的认识。反复进行“做出专业猜测并尝试用数据验证该猜测”的过程，直到你找到一个或多个可能导致观察到的问题的原因。一旦你找到了指向错误行为的线索，你也会对如何修复它有一个初步的想法。这个知识是你寻找问题过程中产生的附带结果，也是你进行数据收集所取得成果的体现。\n\
  \n### 应用修复：调试的第三步\n在你测试了你的假设，并确定它对应了问题的根本原因之后，是时候对代码应用修复了。这可能只是纠正一个小逻辑错误的小改动。但在某些情况下，它也可能导致大的改动，甚至是应用程序的重构。这完全取决于问题的严重程度以及你处理所感知到的问题的策略。\n\
  \n### 创建一个或多个单元测试：调试的第四步\n如果你正在按照前一章所述创建单元测试，那么现在是添加另一个测试用例的好时机。添加单元测试有两个原因。首先，在编码过程中，单元测试非常有用，因为它们允许你在进行时专注于单个问题。单元测试让你可以专注于特定的漏洞，并致力于让代码按预期工作，而不是担心程序中所有其他可能出错的地方。一旦你设置好了单元测试，确保它通过，然后返回去测试完整的应用程序。单元测试的第二个作用体现在检查回归上：当定期执行时，单元测试会自动告诉你该问题将来是否再次出现。这为你提供了一个良好的保证，即使未来引入了可能发生变化的代码，程序也能继续按预期工作。\n\
  \n上述概述的一般步骤可以在任何编程语言中执行。然而，正如你将看到的，`Objective-C`提供了一套独特的工具，这些工具方便了需要在代码中修复一个或多个问题的开发人员的工作。这不仅得益于语言本身的特性，还得益于编程环境，其中包括调试器（`gdb`或`LLVM`调试器）和`Xcode`集成调试器（它在命令行调试器的支持下工作）。\n\
  \n在接下来的章节中，你将概述可用于实现上述步骤的调试工具。特别是，你需要使用那些能简化有关编程漏洞数据收集过程的工具。利用这些信息，你可以使用调试环境来测试假设，并验证所提出的解决方案是否能修复报告的漏洞。\n\
  \n## 使用 Xcode 进行调试\n`Xcode`最好的特性之一是开发工具的紧密集成，其中调试扮演着重要角色。`Xcode`中的集成调试器是`gdb`（或`LLVM`调试器，具体取决于你项目中使用的调试设置）的前端。使用`Xcode`进行调试的巨大优势在于使用`IDE`时获得的视觉反馈。例如，你可以通过简单地点击想要停止执行的行来创建断点。或者，你可以通过将鼠标悬停在编辑器中的变量名上来查看局部变量的值。与标准调试器的操作相比，这大大节约了时间。\n\
  \n### 控制程序执行\n想要进行有效的调试控制，你需要学习的第一组指令是用于程序执行的指令。通过这些指令，程序员能够运行、停止或单步执行用`C`或`Objective-C`代码编写的函数和方法。这些命令提供了调试会话的基本部分，因为如果你想有机会观察代码正在做什么，就需要有某种方法来控制应用程序的执行。\n\
  \n要开始执行一个应用程序，你需要使用`run`命令。该指令会加载程序的可执行文件，并读取其中包含的所有调试信息。调试器还会请求操作系统立即执行该程序。之后，程序被加载到内存中，你可以开始为调试会话定义断点停止位置和其他有用的属性。\n\
  \n`Xcode`中的`run`命令会按预期执行程序。你可以使用菜单 `Product ➤ Run` 来访问此功能。你也可以使用 `⌘ + R` 键盘快捷键。\n\
  \n“步过”操作用于在源代码中移动单步。这意味着当前行中的所有指令都会被执行，应用程序在到达下一行时停止。要单步执行程序，你有两个选项：“步进”将跳转到下一行，或者跳转到当前行执行的任何用户函数或方法的第一行。当你想要跳入当前代码行所调用的方法时，使用“步进”。\n\
  \n另一个步进选项“步过”将直接转到下一行代码，而不会在当前行可能调用的任何其他用户代码处停止。这两种步进执行选项都可以从 `Product ➤ Debug`\
  \ 菜单中找到。你也可以使用 `F6` 键盘快捷键执行“步过”，使用 `F7` 执行“步进”。\n\n\n\n### 添加断点\n\n要在 Xcode 中添加断点，只需点击编辑器面板的左侧边框。该行会添加一个红色圆圈形式的小注释，表明该位置存在一个断点。你也可以使用\
  \ `⌘+K` 键盘快捷键，在某行添加或移除断点。\n\n使用 Xcode 创建条件断点很容易。你首先需要按照上述方法创建一个普通断点。然后，`Ctrl+点击`断点指示器，并选择“编辑断点”。一个新面板会弹出，显示可用的选项。你看到的第一个选项是\
  \ `Condition`（条件）。在这里，你可以添加任何在断点被激活时处于活动状态的局部变量所构成的表达式。\n\n要移除一个现有断点，`Ctrl+点击`断点指示器。你会看到删除该断点的选项。或者，你可能希望暂时禁用该断点，而不是完全移除它。禁用断点可以保留它可能拥有的任何属性（例如，如果你为其添加了条件表达式）。这样，如果你需要用到这些属性中的任何一个，你可以重新激活该断点。然而，如果你删除了断点，就需要重新输入它原先拥有的所有属性。\n\
  \n在定义新断点时，你可以决定让它基于某个表达式成为条件断点，这样断点只有在通过特定的预设测试时才会被激活。你可以通过 `Ctrl+点击` 断点指示器并选择“编辑断点”选项来添加此类条件断点。出现的界面如图\
  \ 15-1 所示。你可以根据需要，在条件字段中添加新的表达式。在图 15-1 显示的示例中，我添加了一个断点，该断点仅在变量 `index` 为负数时才会被激活。\n\
  \n![A978-1-4302-5906-0_15_Fig1_HTML.jpg](img/A978-1-4302-5906-0_15_Fig1_HTML.jpg)\n\
  \n图 15-1.  \n在 Xcode 中添加条件断点\n\n创建断点时的另一个选项是定义断点可以被忽略的次数。例如，当你已知断点将在某个循环（该循环会重复执行固定次数）中被触发时，这个功能就很有用。只需定义它应该忽略断点的次数即可。\n\
  \nXcode 中的断点还有另一个可用选项：你可以设置在到达断点时运行一个或多个操作。操作的类型可以是执行脚本、播放声音，或者仅向日志窗口发送一条消息。我特别喜欢消息记录选项。使用它，你可以实现与使用\
  \ `NSLog` 或其他打印语句类似的功能，但无需重新编译应用程序。因此，你可以在调试过程中，根据需要决定哪些消息最有助于理解程序的执行。你还可以根据需要添加新消息以获取更多细节。\n\
  \n这些关于断点执行的选项为需要快速找到 Bug 的程序员提供了极大的灵活性。通过学习如何控制断点，你可以最大限度地减少发送给调试器的指令数量，同时获得更好的数据，以便用于决定软件\
  \ Bug 的正确修复方案。\n\n### 监视表达式\n\nXcode 调试系统的另一个特性是提供了表达式监视器。也就是说，你可以定义一些表达式，IDE 会自动对其求值并显示出来。使用监视表达式，你可以例如在程序执行过程中分析特定变量的值。如果这些变量的内容与预期不符，你就能更好地理解应用程序的工作方式，并利用该信息来修复\
  \ Bug。\n\n要添加表达式监视器，你需要访问调试区域并显示“变量”视图（如果看不到此视图，请单击调试区域右上角的拆分窗口图标）。一旦“变量”视图可见，`Ctrl+点击`该视图，然后选择“添加表达式”选项。这允许你添加单个变量，或包含变量及其他元素（如方法调用和运算符）的表达式。\n\
  \n在你输入想要监视的表达式后，其值会被定期评估。每当程序状态发生变化时，例如调试器将程序从一个步骤推进到下一个步骤，或者执行了一个函数时，调试器都会重新评估该表达式。通过使用此类表达式，你可以轻松地概览算法所执行的更改。而且，你可以在不重新编译甚至不重新启动应用程序的情况下，更改你想要监视的变量或表达式。\n\
  \n### 检查局部对象\n\n“变量”视图的另一个特性是，能够快速访问当前方法中每个局部变量的内容。这是“变量”视图中的一个标准功能。通过显示局部变量的值，你可以大大减少添加新表达式的需求：通常情况下，局部变量包含了当前算法最重要的内存位置。\n\
  \n![A978-1-4302-5906-0_15_Fig2_HTML.jpg](img/A978-1-4302-5906-0_15_Fig2_HTML.jpg)\n\
  \n图 15-2.  \n在“变量”视图中编辑局部变量的值\n\n当你在特定上下文中访问到局部变量后，你可以深入探究其内容，以揭示每个局部存储对象的实例变量。类似地，你也可以通过点击结构体的内部元素来观察其内容。\n\
  \n在局部变量列表中，最重要的元素可能是 `self` 变量。它向你显示当前对象（即当前方法被调用的对象）的信息。因此，从 `self` 你可以检索到诸如当前对象的确切类型、实例变量列表以及每个变量的状态等信息。\n\
  \n使用“变量”视图，你不仅可以观察数值，还可以直接进行更改。例如，假设你发现某个特定变量的值不正确。你怀疑如果该变量正确的话，方法就能正常工作，但你希望在不必构建和重启应用程序的情况下测试这个假设。\n\
  \n执行此类测试的简单方法是 `Ctrl+点击` 你想要更改的变量，然后选择“编辑值”选项。这将允许你更新所选变量的值，而无需重新启动调试会话。图 15-2 展示了如何执行值更新的示例。从那时起，当前方法将使用更新后的值，就好像该值是程序在正常运行过程中生成的一样。根据此测试的结果，你接下来可以对代码进行必要的更改来修复\
  \ Bug，或至少缩小问题的范围。\n\n\n\n### 使用日志控制台\n\n日志控制台是另一个简单但极为有效的工具，用于排查使用 Objective-C 或\
  \ Mac OS X 和 iOS 平台支持的其他编程语言编写的程序中的问题。日志终端是一种发送文本消息的简单方式，程序员随后可以访问这些消息。\n\n在使用 Xcode\
  \ 时，控制台作为调试面板中的一个窗口随时可用。要向控制台输出内容，只需使用 `NSLog`，正如你在本书各章示例中看到的那样。在应用程序发布并在 Mac OS\
  \ X 上运行后，可以使用控制台应用程序（如图 15-3 所示）查看和搜索日志，该应用程序已预装在该系统的任何版本中。类似地，对于 iOS 设备，例如可以通过\
  \ iTunes 应用程序访问控制台数据。\n\n使用控制台的主要方式是以某种方式打印相关信息，从而更容易识别编程问题的原因。控制台主要有两种使用场景：用于即时调试或用于永久日志记录。\n\
  \n![A978-1-4302-5906-0_15_Fig3_HTML.jpg](img/A978-1-4302-5906-0_15_Fig3_HTML.jpg)\n\
  \n图 15-3. Mac OS X 中的控制台应用程序\n\n第一种使用场景（即时日志记录）很容易理解：在调试会话期间，你可以使用控制台打印想要观察的值。从这个意义上讲，使用日志记录功能类似于使用带表达式监视器的调试器，唯一的缺点是需要重新编译应用程序才能看到结果。另一方面，日志更易于查看，并允许观察调试代码的多次迭代，直到检测到问题。通过打印有用信息进行调试是一种非常常见的调试技术，大多数程序员都曾在某个时候使用过它。\n\
  \n第二种日志使用场景是长期数据收集。要真正发挥作用，这种使用必须发生在实际 bug 出现之前，这样你才能访问到之前的信息。长期日志记录的主要策略是，每当你做出可能导致错误的编程决策时，都应该记录日志数据。在这些逻辑节点，你还应该将所考虑的数据添加到日志中。通过记录这些决策，你可以更容易地在以后确定导致\
  \ bug 的事件序列。在处理某些类型的错误时，日志信息是一个非常强大的帮手，应该有条理地加以利用。\n\n要向控制台发送数据，你只需像往常一样使用 `NSLog`。至于更结构化的日志访问和组织技术，有几种\
  \ C 和 Objective-C 库可用。例如，Apple 有一个名为 `asl` 的库，它提供了几个高级选项用于将日志写入文件。还有其他开源库模拟了更完整的日志记录框架，例如\
  \ Java 中使用的 `log4j`。无论你决定使用哪种技术，通过使用日志数据，你都可以减少从收到 bug 报告到充分理解其根本原因所需的时间。\n\n##\
  \ 命令行调试器\n\n我在 Xcode 中描述的调试选项主要基于 Mac OS X 和 iOS 平台的底层调试器。此类调试器（例如 `gdb` 和 LLVM\
  \ 调试器）可通过命令行访问，因此如果终端应用程序更适合你的需求，你可以直接使用它。\n\n调试器是一种专用软件，能够附加到一个进程并显示正在执行的源代码和数据。在传统的\
  \ UNIX 平台上，调试器基于命令行，包含一组可用于执行最常见调试任务的命令。如前面几节所述，你一直在通过 Xcode IDE 的支持来使用这些调试器。在大多数情况下，Xcode\
  \ 只是在命令行调试器的基础上提供了一个图形界面。\n\nObjective-C 最常用的调试器是 `gdb`。LLVM 项目（已在第 13 章中讨论）也有自己的调试器，其接口具有与\
  \ `gdb` 支持的命令等效的命令。我将快速介绍如何使用 `gdb` 提供的一些选项，但类似的命令也可以在 LLVM 调试器中使用。\n\n例如，要添加断点，你需要使用\
  \ `break` 命令。以下是一个调试示例应用程序的示例，该程序包含一个名为 `a.c` 的文件。以下代码在该文件的第 5 行添加了一个断点：\n\n```\n\
  oliveira:∼ $ gdb a\nGNU gdb 6.3.50-20050815 (Apple version gdb-1752) (Sat Jan 28\
  \ 03:02:46 UTC 2012)\nCopyright 2004 Free Software Foundation, Inc.\nGDB is free\
  \ software, covered by the GNU General Public License, and you are\nwelcome to change\
  \ it and/or distribute copies of it under certain conditions.\nType \"show copying\"\
  \ to see the conditions.\nThere is absolutely no warranty for GDB. Type \"show warranty\"\
  \ for details.\nThis GDB was configured as \"x86_64-apple-darwin\"...\nReading symbols\
  \ for shared libraries .. done\n(gdb) break a.c:5\nBreakpoint 1 at 0x100000f04:\
  \ file a.c, line 5.\n(gdb)\n```\n\n就像在 Xcode 中一样，断点定义了你希望程序停止执行的代码位置。一旦应用程序在断点处停止，你可以检查变量和其他内存地址的内容，或者例如调用栈中的调用序列。你可以通过多种方式输入该信息。设置断点的第一种方法是输入文件名后跟行号。也可以仅使用\
  \ C 函数的名称来创建断点。以下是在 `main()` 函数中设置断点的方法：\n\n```\n(gdb) break main\nNote: breakpoint\
  \ 1 also set at pc 0x100000f04.\nBreakpoint 2 at 0x100000f04: file a.c, line 5.\n\
  (gdb)\n```\n\n现在你可以使用 `run` 命令运行程序。\n\n```\n(gdb) run\nStarting program: /Users/coliveira/a\n\
  Reading symbols for shared libraries +........................ done\nBreakpoint\
  \ 1, main () at a.c:5\n5 printf(\"Hello world\");\n(gdb)\n```\n\n这将加载可执行文件并运行程序，直到找到断点。正如你在上面的示例中看到的，第一个断点被触发，结果程序停止以进行调试。\n\
  \n一旦程序在断点位置停止，可以执行多种操作来控制其执行。例如，你可以使用 `next` 命令单步执行到下一行代码。\n\n```\n(gdb) next\n\
  11 say_hello();\n(gdb)\n```\n\n你还可以单步进入当前行执行的代码中。例如，以下代码将导致执行下一条指令：\n\n```\n(gdb)\
  \ step\nsay_hello () at a.c:5\n5 printf(\"Hello again\");\n(gdb)\n```\n\n你也可以继续执行程序，直到遇到下一个断点。\n\
  \n这几个示例展示了如何通过命令行调试器模拟 Xcode 中几乎所有可用的调试指令。然而，调试器提供了一套丰富的指令集，其范围比可视化调试器所能提供的要全面得多。事实上，Xcode\
  \ 的调试会话也通过调试面板公开了命令行调试器。\n\n要查看调试器提示符，请点击“视图” ➤ “调试区域” ➤ “激活控制台”。这将显示调试控制台，其中显示了调试器已执行的一些命令。它还有一个提示符，你可以使用它输入新的调试指令，使用的语法与你目前看到的示例类似。有关调试器在你环境中如何工作的更多信息，请查看\
  \ Xcode 附带的文档。\n\n\n\n## 调试内存问题\n\n内存问题是使用调试器最难追踪的一类问题。造成这种困难的主要原因是，在许多情况下，内存相关问题会在远离真正问题发生点的地方显现出来。例如，考虑一个由过早释放对象引起的问题，就像以下方法中所示：\n\
  \n```\n- (void) getArrayValue\n{\n    NSArray *values = @[ @0, @1, @2, @3];\n  \
  \  NSArray *numbers = values;\n    // 此处对 values 数组进行一些操作。\n    [values release];\n\
  \    // 此处执行其他操作...\n    id two = numbers[2];\n    NSLog(@\"number is %@\", two);\n\
  }\n```\n\n这段代码会失败，因为在某个时刻，数组 `values` 也被存储在变量 `numbers` 中。然而，在使用完 `values` 后，代码将其释放，却没有同时使存储在\
  \ `number` 中的引用失效。\n\n在更一般的情况下，一个对象可能在应用程序的某个部分被释放，而实际上它在其他地方仍然被需要。然而，对该对象的后续访问可能需要几秒或几分钟才会发生，就像在许多典型的桌面应用程序中那样。另一方面，对于客户端-服务器应用程序，从错误释放到后续访问一个已释放的对象，甚至可能相隔数天。\n\
  \n类似的内存损坏问题，例如非法数组访问、无效指针等，由于错误发生点与访问失败点之间的距离，可能难以追踪。这就是我们在追踪此类内存错误时为什么需要额外帮助的原因。仅仅单步执行代码可能不足以捕捉由内存管理问题导致的缺陷。\n\
  \n幸运的是，Xcode 具有许多功能，可用于帮助追踪此类烦人的内存错误。你将了解的第一个功能是 `ZombieObject` 选项。\n\n### 使用 NSZombie\n\
  \n`NSZombie` 是一种调试辅助工具，能够检测对先前已释放对象的不正确访问。在这种情况下，一条消息被错误地发送给一个不再可用的对象，从而导致立即崩溃。由此产生的问题难以诊断，因为该访问与释放操作（可能发生在不同的代码段中）并不一定有直接关联。\n\
  \nXcode 中的 `NSZombie` 选项涉及编译器支持，并将所有 `release` 操作转换为创建 `NSZombie` 类对象的过程。这些是非常简单的对象，其唯一功能是在其某个方法被调用时打印一个错误。毕竟，由于它所代表的原始对象据称已被释放，因此对该对象的任何访问都必定是内存访问错误的迹象。\n\
  \n这种策略的优势在于，你不会遇到一个无甚帮助的崩溃，而是会立即看到一条清晰明确的错误消息，详细说明有一条消息被发送给了已释放的对象。该消息还将包含僵尸对象被创建的位置，也就是错误释放发生的位置。此外，僵尸对象还记录了诸如已释放对象的类型和原始指针地址等信息。利用这些信息，追踪最初导致错误释放有问题的逻辑就变得容易得多。\n\
  \n要在你的应用程序中使用 `NSZombie`，需要执行以下步骤。首先，使用菜单 Product ➤ Scheme ➤ Edit Scheme（或使用 `Command+<`\
  \ 键盘快捷键）为当前项目选择方案。然后，你应该选择面板顶部的 Arguments 选项卡。在启动时传递的参数中，勾选 `NSZombieEnabled`。在\
  \ Diagnostics 选项卡中，你还应在“内存管理”组中点击“启用僵尸对象”选项。\n\n在设置 `NSZombie` 选项时，请确保你正在修改调试配置文件，因为使用这些选项会带来性能损失。它们应该只在调试会话期间是必要的，而不应在应用程序的发布版本中使用。\n\
  \n### 使用 guardmalloc 库\n\n虽然 `NSZombie` 是检测访问对象时内存问题的绝佳工具，但当你使用传统的 C 类型（如结构体和数组）时，它并不能提供帮助。为此，你应该求助于\
  \ `guardmalloc`，这是一个用于通用内存分配的调试库。\n\n要在你的调试环境中添加对 `guardmalloc` 的支持，你首先需要访问调试方案。只需选择菜单选项\
  \ Product ➤ Scheme ➤ Edit Scheme。然后，点击面板顶部的 Diagnostics 选项卡。勾选“启用 Guard Malloc”选项框，该选项列在“内存管理”组中。\n\
  \n`guardmalloc` 库是 `alloc` 等方法使用的标准分配库的替代品。`guardmalloc` 与其他分配库之间的区别在于，它以一种不正确访问将立即产生异常（或崩溃）的方式来组织内存。`guardmalloc`\
  \ 的工作原理是利用大多数现代处理器中存在的虚拟内存系统。\n\n通过为每个请求分配一个虚拟内存页，`guardmalloc` 确保虚拟内存系统能够检测到对该内存的任何误用。例如，假设你错误地尝试使用一个负数来访问数组。\n\
  \n```\n- (void) accessArray:(int) index\n{\n    int *values = (int*)malloc(sizeof(int)*10);\n\
  \    // 此处初始化 values 数组...\n    // 在此示例中，index 为 -1：\n    int result = values[index];\n\
  \    NSLog(@\"result is %d\", result);\n    free(values);\n}\n```\n\n上面的方法使用参数 `index`\
  \ 来访问 `values` 数组中的一个值。然而，该方法没有检查 `index` 的值，这导致了对 C 数组中负位置的引用。如果你没有使用 `guardmalloc`，这种引用可能会成功，但会返回不正确的结果，这使得调试变得更加困难。原因在于，你需要审查所有代码才能找到不正确访问发生的确切位置。这非常困难，尤其是在一个多个并发执行线程可能会修改内存的多线程应用程序中。\n\
  \n然而，使用 `guardmalloc`，这一点以及其他直接分配内存的地方，都将受到处理器使用的虚拟内存指令的保护。因此，如上所示的不正确访问会在应用程序中立即产生崩溃。如果你在调试模式下运行，这非常有帮助，因为调试器会显示崩溃发生的精确位置。使用调试器，你将能够确定触发崩溃的条件，并在它导致进一步问题之前修复它。`guardmalloc`\
  \ 是可用于修复 C 和 Objective-C 中基本内存访问问题的最有用的工具之一。每当你看到可疑的内存损坏问题时，请使用它，你极有可能识别出发生不正确内存访问的位置。\n\
  \n## 附加工具\n\n虽然调试器是检测和修复编程错误过程中最直观、最实用的工具，但它并不是你应该为此目的使用的唯一工具。许多其他应用程序可以在纠正软件缺陷的过程中为你提供额外的帮助。它们补充了大多数程序员使用的标准工具集，并让你在维护系统当前状态且无缺陷这项艰巨任务中获得优势。\n\
  \n在接下来的部分中，我将讨论两个已成为软件开发中不可或缺的助手。版本控制系统用于维护各种规模应用程序代码的多个版本。它们促进了团队成员之间的沟通，甚至能简化查找错误的任务。其次，我将讨论缺陷跟踪系统，这对于维护关于测试人员和其他应用程序软件用户发现的错误及其他问题的最新信息至关重要。\n\
  \n\n\n### 版本控制系统\n\n用于调试问题最常见的辅助工具是版本控制系统（VCS）。过去几年中，涌现出大量开源 VCS 工具；目前它们提供的功能复杂度与最优秀的商业\
  \ VCS 应用相当。领先的开源版本控制工具是 `subversion` 和 `git`。这两个系统的实现理念不同，但它们都是高质量的工具，能够有效用于对软件更新进行细粒度控制。\n\
  \n使用 `subversion`，你将拥有一个客户端-服务器系统，可以存储一组源文件的多个修订版本。你可以快速修改文件，并将这些修改存储在服务器上，供一组程序员使用。`Git`\
  \ 是另一个开源 VCS；它采用分布式方法进行源代码控制，每位开发者都拥有修订版本的完整副本，可以独立于服务器工作。在这类系统中，开发者可以通过共享本地实现的修改来进行协作。这与\
  \ `subversion` 采用的方法形成对比，后者所有修改都存储在集中式位置。\n\n使用此类系统辅助追踪编程错误的主要优势在于，你可以用它查看系统的演变过程，以及这种演变如何与你试图解决的问题相互作用。例如，`subversion`\
  \ 和 `git` 都实现的 `blame` 功能，允许开发者精确确定某次修改是何时添加到特定文件中的。这些信息可以帮助你判断某个特定修改是误操作，还是某个新功能的有效组成部分。与\
  \ `blame` 功能一起提供的日志也可用于确定相关修改的提交者。\n\n使用 VCS 还能做另一件事：将你的副本回退到更早的版本，查看该 bug 是否仍然存在。这种探索在\
  \ bug 修复的初始阶段极其有用，此时你仍在尽可能多地收集关于问题及其与系统其他部分如何相互作用的信息。这类调查如此有用，以至于 `git` 甚至引入了一种用于调查旧版本的软件模式。`bisect`\
  \ 选项用于通过二分搜索策略遍历项目的历史记录。你也可以使用 `subversion` 完成同样的操作，这使你能够精确确定 bug 是何时被引入源代码的。\n\n\
  ### Bug 追踪系统\n\nBug 追踪或工单系统是处理软件缺陷时另一个不可或缺的工具。工单系统可以帮助让你的流程更易于跟进，从而能够优先安排软件开发和错误消除方面的工作。一个好的\
  \ bug 追踪系统能让你保存关于特定错误发生方式、时间和地点的详细信息。Bug 追踪系统还提供了一个通用的协作工具，使开发者、测试人员和用户都能访问到关于系统中检测到的故障的相同信息。借助这些信息，可以处理更复杂的问题，并共享所有相关人员生成的系统信息。\n\
  \n你应该使用 bug 追踪系统来存储重现 bug 的说明；尽可能详细地描述错误；存储软件运行环境的数据；规划修复 bug 的流程，包括所需工作量、目标日期及其他相关信息。所有这些信息都可以用于驱动调试过程，从而让你能更全面地了解修复\
  \ bug 如何与系统中的其他活动相契合。你还可以使用 VCS 与其他软件工程师协调，确保过程中没有重复劳动。\n\n虽然这些并非用于发现和消除软件缺陷的唯一工具，但此类应用是你最常能在常用工具列表中发现的。它们帮助许多用户群体提高了软件质量，并且很可能也是你开发工作中的不错选择。\n\
  \n## 总结\n\n软件 bug 是困扰任何编程团队的常见问题，无论团队多么谨慎都难以避免。因此，使用工具来促进发现和修复软件 bug 的过程至关重要，尤其是在\
  \ bug 被发现之时。\n\nObjective-C 语言拥有一个优秀的生态系统，其调试工具与环境紧密结合。Xcode IDE 拥有大量可用于自动化调试过程的功能。诸如可视化调试器、可视化断点和数据监视器等功能，使其成为修复软件缺陷所需多种活动中的宝贵工具。\n\
  \n该编程环境还拥有其他用于检测和纠正内存问题的宝贵工具。`NSZombie` 机制用于生成拦截发送给错误释放对象的消息的代码。`guardmalloc` 调试库用于检测对内存的无效访问，例如引用位于分配内存末尾之外的数组位置。`guardmalloc`\
  \ 库利用硬件有效处理内存屏障，因此能够精确确定执行此类错误访问的位置。\n\n最后，你了解了一些可用于支持调试过程的工具。像 `git` 和 `subversion`\
  \ 这样的应用并非 Objective-C 专属，但它们提供了新的可能性，例如检查源代码的旧版本。还可以精确确定谁处理了某个源文件的特定版本，这在大型团队中工作时很有帮助。另一方面，bug\
  \ 追踪系统用于维护软件故障的详细描述。它们有助于存储重现 bug 的说明，或修复现有问题所需的必要步骤。\n\n在本章结尾，我概述了 Objective-C\
  \ 及其编程环境最重要的几个方面。在下一章中，你将看到一个为 Mac OS X 编写的典型 Objective-C 应用的完整示例。你将看到我们目前探讨的概念如何整合成一个能受益于与\
  \ Cocoa 框架集成的可运行程序。\n\n"
- "# 第四部分  \n为 OS X 和 iOS 编写应用\n\n\n\n"
- "# 16. 构建 OS X GUI 应用程序\n\n## 摘要\n\n`Objective-C` 最常用于实现采用 Cocoa 框架的应用程序。作为一名 `Objective-C`\
  \ 程序员，你几乎必然会参与 iOS 应用或完整 OS X 应用的开发。在本章中，我将讨论 OS X 上的应用程序开发。为此，你将学习 Cocoa UI，即用于开发符合\
  \ OS X UI 标准的图形化应用程序的框架。\n\n`Xcode` 提供了一种面向对象的方法来创建图形界面，在充分利用其功能之前，需要先深入理解这种方法。与其他环境不同，使用\
  \ `Xcode` 创建的 GUI 应用并非通过代码生成（尽管必要时也可以这样做）。相反，对象是通过图形化编辑器设计并保存到文件中，然后由 Cocoa 应用程序直接加载。\n\
  \n此类图形化应用程序依赖于 Cocoa 提供的窗口、视图和控制对象的动态行为。通过标准的 `Objective-C` 技术，这些对象可以在 `Xcode` 中进行操作，随后以\
  \ nib 文件格式加载到你的应用程序中。从文件加载 nib 时，`Objective-C` 保证保存的属性和连接在运行时依然存在。\n\n首先，我将解释如何在\
  \ `Xcode` 中创建一个示例 UI 应用程序。接着，你将看到 Cocoa 框架如何用于保存和加载图形界面的状态，包括属性和对象之间的连接，以便你能花更少的时间编码，用更直观的方式设计应用的\
  \ UI。我还将讨论基于 `NSResponder` 类的 UI 对象层次结构。\n\n在本章的最后部分，我将提供一个用 Cocoa 编写的完整 UI 应用程序示例。该应用能够接收来自系统菜单的事件。你还将学习如何使用\
  \ Cocoa 库在屏幕上进行绘制，以及如何响应鼠标移动和按键等用户事件。\n\n## 使用 Cocoa 创建 UI 概述\n\n在 OS X 中创建图形化应用程序的第一步是规划\
  \ UI 的外观。对于这个初始设计，你可以使用任何现有的 UI 设计应用程序。有些团队使用 Photoshop 等专业图形软件，但市场上还有许多其他选择。如果你在小团队中工作或是一位独立开发者，你完全可以使用手绘设计图来指导完成这一初始阶段。\n\
  \n随后，需要将这个 UI 设计成果转化为实现，开发者将尝试使用编程工具来达到 UI 设计文档中指定的要求。这一阶段的工作将产生一个可使用的界面，可用于功能测试。之后，这个版本将被添加编程功能，逐步实现完整的应用程序。\n\
  \n### 设置 Cocoa 项目\n\n在 `Objective-C` 中创建一个新项目很简单，完全可以在 IDE 内完成。你可以通过前往 **文件 ➤ 新建\
  \ ➤ 项目**（或使用键盘快捷键 **⌘+N**）来指示 `Xcode` 调用新建项目向导。出现的项目向导会列出你本地 `Xcode` 配置中所有可用的项目类型。该向导允许你根据所需的项目类型来选择新项目。项目类型列表根据目标操作系统进行划分。对于\
  \ Mac OS X，`Xcode` 中有以下可用的项目类型（见图 16-1）：\n\n- **应用程序**：这是最终用户开发者创建面向用户应用程序时使用的主要项目类型。如你接下来所见，其中既有图形化应用，也有控制台应用。\n\
  - **框架和库**：这些项目类型用于创建可供其他应用程序后续使用的软件组件。框架是一个用 `Objective-C` 创建的库，可以更轻松地集成到面向对象的应用程序或其他库中。你还可以选择创建基于\
  \ C 或 C++ 的库，以便其他语言导入。\n- **应用程序插件**：插件是一种特殊类型的库，可在运行时被应用程序导入。这使得应用程序能够根据需要添加或删除插件，甚至从网站安装新插件。由于插件使用的\
  \ API 取决于目标应用程序的内部设计，因此生成的插件是特定于应用程序的。在 `Xcode` 提供的标准选项中，你可以为通讯录、安装器应用程序和 Automator\
  \ 创建插件。如果你的机器上安装了第三方供应商的软件，可能还会提供其他类型的插件。\n- **系统插件**：这些插件用于扩展操作系统或 Mac OS X 的一些基础应用程序，例如\
  \ Finder。在其他选项中，你可以创建 Mac OS X 插件，用作系统偏好设置应用程序中的偏好设置面板、Finder 的快速查看插件、屏幕保护程序或 Spotlight\
  \ 导入器。\n\n![A978-1-4302-5906-0_16_Fig1_HTML.jpg](img/A978-1-4302-5906-0_16_Fig1_HTML.jpg)\n\
  \n**图 16-1.** 为 Mac OS X 选择一个新的 Xcode 项目\n\n在本章中，我们关注的是位于**应用程序**选项卡下的应用创建。有以下选项可用：\n\
  \n- **Cocoa 应用程序**：此项目类型可用于创建 Mac OS X 中传统的基于窗口的应用程序。我将以此类项目作为示例，因为它是最常用于创建最终用户应用程序的类型。\n\
  - **Cocoa-AppleScript 应用程序**：此项目类型用于创建以 AppleScript 编写的应用程序，AppleScript 是苹果为 Mac\
  \ OS X 开发的一种脚本语言。AppleScript 如今已不太流行，但仍可用于支持 Mac OS X 中的某些技术。\n- **命令行工具**：使用此项目类型创建仅在命令行中运行的应用程序。这些应用不需要基于\
  \ `Objective-C`，也可以用其他语言（如 C 或 C++）编写。不过，仍然可以使用 `Objective-C` 的基础框架来简化命令行应用的开发，特别是当它们需要与仅通过\
  \ `Objective-C` 框架提供的 Mac OS X 技术交互时。\n\n选择新应用程序并点击**下一步**按钮后，系统会显示一个屏幕，要求提供创建项目所需的一些基本信息，包括文件存放的目录。\n\
  \n\n\n### 使用 `nib` 文件\n\n在大多数传统编程环境中，创建界面的工作都需要程序员编写代码来定义每个 UI 控件及其属性，例如屏幕上的位置、如何响应用户事件、颜色等。例如，Java\
  \ 和 C# 应用程序使用代码来创建 UI 控件，并决定窗口在运行时的外观。在这类编程语言中，UI 实现的结果是大量的代码，这些代码包含了用于创建 UI 并确定其属性的类和方法。即使你使用图形工具在编辑界面时自动生成代码，情况也是如此。\n\
  \n![A978-1-4302-5906-0_16_Fig2_HTML.jpg](img/A978-1-4302-5906-0_16_Fig2_HTML.jpg)\n\
  \n图 16-2. Xcode nib 编辑器\n\n然而，Objective-C 中的 UI 应用程序采用了不同的创建流程。与其他通过编程方式创建 UI 的环境不同，Objective-C\
  \ 将应用程序与使用 Xcode 预先安排好的活动对象连接起来，如图 16-2 所示。要理解这种差异，你必须了解 Xcode UI 设计器的工作原理及其使用方式。\n\
  \nXcode UI 设计能力的核心在于 Cocoa UI 对象的功能。Cocoa UI 拥有运行时操作所需的行为，这些行为由 Xcode 编辑器执行。此外，UI\
  \ 对象可以直接保存到文件中，并恢复到设计时的相同状态。这种文件被称为 nib 文件（含义是 NeXTSTEP Interface Builder），它是一组对象的已保存表示。nib\
  \ 文件通常以 `xib` 扩展名保存，因为它使用 XML 进行数据编码。你的应用程序稍后只需请求 Cocoa 将文件读入内存，即可恢复这些对象的表示。\n\n\
  因此，从某种意义上说，你并非像在其他语言中那样告诉系统应该如何创建一组对象。相反，你是在 Xcode 中操作那些之后将在应用程序中加载的相同对象。这意味着你可以配置对象，之后除了从\
  \ `xib` 文件中读取对象的通用 Cocoa 代码外，无需任何代码来设置它。此外，通过 Xcode 初始创建对象的所有复杂性都对应用程序隐藏了。即使你向 UI\
  \ 添加了数百个对象，或者对这些对象进行了数千次修改，也无需为此生成或编译任何代码。这对于那些仅仅生成代码的传统工具来说是非常难以实现的。\n\n`xib` 文件的另一个优势是它们可以按需加载。如果你有一个\
  \ `xib` 文件，它包含了应用程序中很少使用部分的 UI，那么它不会影响整个应用程序的加载时间。同样，这对于传统的代码生成技术是不可能的，因为即使这些代码在实际中很少使用，也需要生成、编译和加载。\n\
  \n这些使用 `xib` 文件的 UI 控件特性展示了你在 Xcode 中设计图形应用程序时的巨大灵活性。这也是 Mac OS X 相比其他操作系统，能够创建更复杂界面的原因之一。接下来的章节将概述\
  \ Xcode 为设计此类应用程序所提供的功能。\n\n### Cocoa UI 类\n\nXcode UI 设计能力的核心在于 Cocoa 框架中一组类提供的支持。这些\
  \ UI 类定义了图形对象的运行时能力。一个 Cocoa UI 对象封装了运行时操作所需的所有行为，这是通过在 Xcode 中编辑 nib 文件来实现的。此外，UI\
  \ 对象可以轻松保存到 `xib` 文件中，并恢复到其创建时的相同状态。\n\n当你操纵 Xcode 中的对象时，实际上是在决定这些对象在运行时的显示方式和交互方式。运行时行为不仅由诸如颜色和位置之类的静态属性定义，还由窗口中出现的对象之间的关系定义。为了实现这一点，你不仅可以更改\
  \ UI 对象的可见属性，还可以使用连接（connections）来“连线”对象，这些连接由一组出口（outlets）和动作（actions）定义。\n\n在\
  \ Xcode 中编辑的每个对象可以有一个或多个出口。出口是一个插槽，可以填充到其他对象的连接。例如，一个 `NSWindow` 对象有一个名为 `menu`\
  \ 的出口。该出口用于向应用程序菜单发送更新，或在必要时读取任何菜单属性。你在 Xcode 中进行 UI 设计时，需要负责定义菜单对象与 `NSWindow`\
  \ 菜单出口之间的连接。完成所有对象的连线后，该配置将固化在 `xib` 文件中，在需要显示窗口时可以稍后恢复。\n\nCocoa 中的 UI 对象也具有动作。动作是对象中一个可在设计时用于连接的方法。Xcode\
  \ 会显示特定 UI 对象在属性面板的“接收动作”列表中提供的所有动作。要使用这些动作，你需要将生成事件的对象连接到一个具有目标（target）的对象，该目标将位于接收端。示例如图\
  \ 16-3 所示。\n\n![A978-1-4302-5906-0_16_Fig3_HTML.jpg](img/A978-1-4302-5906-0_16_Fig3_HTML.jpg)\n\
  \n图 16-3. 右侧面板中显示了 `NSButton` 控件及其关联属性。其中，你可以看到可用的出口、发送的动作、引用的出口和接收的动作\n\n当 Cocoa\
  \ 应用程序启动时，它首先要做的事情之一就是加载一个或多个 nib 文件。然后，这个 xml 文件被用来恢复已保存的对象，以便它们能够以在 Xcode 中设计时完全相同的属性和连接加载到内存中。这为对象提供了初始状态。\n\
  \n一旦应用程序启动，通过 Objective-C 代码也可以看到在 Xcode 中建立的连接。每个出口都被转换为对应对象中的一个实例变量，以便 Objective-C\
  \ 可以使用这些变量向所需的控件发送消息。然后，这些连接弥合了对象的运行时行为（由你在 Objective-C 类中编写的代码定义）与其设计时属性之间的差距。\n\
  \n### Objective-C 中的出口和动作\n\n你已经了解了出口和动作对于建立 `xib` 文件中创建的对象之间连接的重要性。然而，如果这个界面必须在运行时被你的代码使用，那么这些连接需要能够从\
  \ Objective-C 访问。Xcode 使用一些简单的约定来将 Objective-C 代码与 UI 中使用的出口和动作连接起来。\n\n要在你的 Objective-C\
  \ 类中提供一个出口，你可以简单地添加 `IBOutlet` 修饰符，如下所示：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface\
  \ AppDelegate : NSObject <NSApplicationDelegate>\n\n{\n        id IBOutlet menuBar;\n\
  }\n\n@property (assign) IBOutlet NSWindow *window;\n\n@end\n```\n\n这个类声明了一个应用程序委托，它将响应发送到应用程序的事件。该类包含两个可以被\
  \ Xcode UI 设计器访问的出口。这些出口由 `IBOutlet` 关键字标记。实际上，`IBOutlet` 在编译时没有效果，但在你的类被加载到编辑器中时，Xcode\
  \ 会识别它。\n\n当 Cocoa 加载一个 nib 文件时，它会包含关于哪些对象被分配给了哪些出口的信息。因此，在 nib 文件加载后，连接被恢复，出口指向正确的对象。因此，如果你在\
  \ Xcode 中将菜单栏对象连接到 `menuBar` 出口，那么当应用程序在 Objective-C 中加载时，该连接将是有效的。\n\n\n\n## Cocoa\
  \ UI 层级结构\n\nCocoa 中图形对象的层级结构根植于 `NSResponder`。这是一个通用对象，因为它提供了所有图形元素共有的、用于响应应用程序事件的行为。用于实现窗口和通用视图的\
  \ `NSWindow` 和 `NSView` 都是 `NSResponder` 的子类。\n\n`NSResponder` 提供的功能包括以下内容：\n\n\
  *   响应鼠标事件：`mouseDown:`、`mouseDragged:`、`mouseUp:`、`mouseMoved:`、`mouseEntered:`、`rightMouseDown:`\
  \ 等。\n*   响应键盘事件：`keyDown:`、`keyUp:`、`performMnemonic:`、`interpretKeyEquivalent:`\
  \ 等。\n*   响应其他杂项事件：`cursorUpdate:`、`scrollWheel:`、`helpRequested:` 等。\n*   响应各种动作消息：`cancelOperation:`、`capitalizeWord:`、`insertNewLine:`、`insertTab:`、`indent:`、`moveBackward:`、`moveToBeginningOfDocumentAndModifySelection:`、`moveToLeftEndOfLine:`、`moveLeft:`、`moveRight:`、`pageUp:`、`pageDown:`、`scrollLineUp:`、`selectWord:`、`selectLine:`、`showContextHelp:`\
  \ 等众多方法。\n*   管理窗口恢复：`restoreStateWithCoder:` 等。\n*   响应菜单事件：`setMenu:`\n\n这只是 `NSResponder`\
  \ 所提供的接口的一小部分，这使其成为 Cocoa UI 编程中的一个基础类。诸如 `NSWindow`、`NSApplication` 和 `NSView`\
  \ 等子类进一步细化了该类提供的标准行为。\n\n### NSWindow 类\n\n`NSWindow` 类为 Cocoa 中的所有窗口（包括顶级窗口、工具窗口和对话框）提供了必要的行为。它们都共享一些通用的代码来显示、移动、调整大小和管理窗口的内容。\n\
  \n以下是从 `NSWindow` 派生而来的任何窗口都可以使用的常见功能：\n\n*   定义窗口大小：`setFrameOrigin:`、`setFrameTopLeftPoint:`、`setMinSize:`、`performZoom:`、`showsResizeIndicator`\
  \ 等。\n*   配置窗口属性：`setBackgroundColor:`、`setStyleMask:`、`setOpaque:`、`setHasShadow:`\
  \ 等。\n*   从窗口获取信息：`windowNumber`、`deviceDescription`、`canBecomeVisibleWithoutLogin`\
  \ 等。\n*   管理主窗口状态：`isMainWindow`、`canBecomeMainWindow`、`makeMainWindow` 等。\n*  \
  \ 管理子窗口和附属窗口：`addChildWindow:ordered:`、`removeChildWindow:`、`parentWindow` 等。\n\
  *   管理标题栏：`standardWindowButton:`、`showsToolbarButton` 等。\n\n`NSWindow` 提供的 API\
  \ 涵盖了标准 Mac OS X 窗口中的主要功能。Cocoa 将此行为封装在 `NSWindow` 中，你可以通过使用 Xcode 在设计时，或在运行时根据需要调用\
  \ `NSWindow` 的方法，来设置使用多少这些功能。\n\n### 窗口控制器对象\n\n窗口控制器是图形应用程序设计中的一个重要部分。与其他 GUI 工具包不同，Cocoa\
  \ 中的大多自定义代码并非作为 `NSWindow` 的子类编写。相反，Cocoa 使用窗口控制器对象来处理系统中实际的 `NSWindow` 实例的大部分程序化行为。\n\
  \n这之所以可能，同样是因为你可以使用 Xcode 和 nib 文件在设计时将消息重定向到特定对象。当你需要处理特定类型的操作时，无需创建给定 UI 对象的子类。相反，你只需使用\
  \ Xcode 将对象连接到窗口控制器中的某个特定操作即可。这保证了你能够拥有修改后的行为，而无需创建任何特定 UI 对象的子类。\n\n通常，定向到 `NSWindow`\
  \ 的事件会被重定向到窗口控制器以进行即时响应。因此，窗口控制器可以被看作是窗口中功能的总部。你可以根据需要进一步将这些职责划分给其他控制器，但许多简单的应用程序只有一个窗口控制器来响应整个窗口的请求。\n\
  \n在大型应用程序中，每个窗口都可以拥有自己的窗口控制器，用于响应发送到该窗口的消息。如果其他控件的行为足够复杂以至于需要这种级别的自定义，它们也可以拥有自己的关联控制器。\n\
  \n### 委托对象\n\n在 Cocoa UI 对象提供的出口中，最重要的一个是委托出口。委托是一个自动接收发送给特定 UI 控件或窗口的消息和通知的对象。通过将一个对象设置为\
  \ UI 控件的委托，你将能够处理定向到该控件的消息。这是在基于 Cocoa 的应用程序中处理 UI 事件的主要机制。\n\n关于在 Xcode UI 中设置委托的示例，请考虑\
  \ Window 对象，它是 `NSWindow` 类的一个实例。如果你选中该对象并点击连接检查器（在右侧面板中），你将看到出口列表。其中一个出口是委托对象，它存在于每个\
  \ `NSWindow` 类的对象中，如图 16-4 所示。\n\n![A978-1-4302-5906-0_16_Fig4_HTML.jpg](img/A978-1-4302-5906-0_16_Fig4_HTML.jpg)\n\
  \n图 16-4. 连接 `NSWindow` 对象的委托\n\n要设置委托对象，你可以像连接任何其他出口一样，将其连接到所需的接收者。你想要使用的对象是文件所有者（即，拥有此\
  \ xib 文件的对象）。点击出口连接图标并将其拖拽到文件所有者占位符上，你将看到出口发生变化以指示新的连接。\n\n一旦委托连接建立，你就可以开始在委托类中添加方法，以处理窗口对象发送的事件。这样的委托类应遵循\
  \ `NSWindowDelegate` 协议，该协议定义了发送给委托进行处理的方法。以下是可以委托类中实现的方法列表：\n\n*   窗口移动消息：`windowWillMove:`、`windowDidMove:`、`windowDidChangeScreen:`\
  \ 等。\n*   窗口最小化消息：`windowWillMiniaturize:`、`windowDidMiniaturize:`、`windowDidEndLiveResize:`\
  \ 等。\n*   窗口更新消息：`windowDidUpdate:`、`windowDidExpose:`、`windowDidBecomeMain:`、`windowWillClose:`\
  \ 等。\n\n## 使用 Xcode 进行 UI 设计\n\n在前面的章节中，你了解了 Cocoa UI 对象如何提供创建功能丰富 UI 所需的所有元素。UI\
  \ 设计过程涉及运行时和设计时元素的协调。Xcode UI 工具构成了此工作流程的重要组成部分。在本节中，你将学习如何使用 Xcode 来定义 Mac OS X\
  \ 应用程序的窗口和控件。\n\n\n\n### nib 文件的组成元素\n\n在 Xcode 中编辑 nib 文件时，会呈现许多表示基于 UI 应用重要元素的条目。你将首先了解它们的含义，然后在后续几个小节中了解其用法。\n\
  \nnib 文件的所有元素都显示在 Xcode xib 编辑窗口的左侧面板中。它们包括：作为占位对象添加到 nib 中的 UI 控件，这些控件代表 GUI 应用设计基础设施的组成部分；以及标准对象，这些对象在大多数情况下是图形控件，并在\
  \ UI 中具有真实的呈现形式。\n\n占位对象的数量有限，但它们是 xib 配置的重要组成部分。这些占位符如下所示：\n\n![A978-1-4302-5906-0_16_Fig5_HTML.jpg](img/A978-1-4302-5906-0_16_Fig5_HTML.jpg)\n\
  \n**图 16-5.** 包含占位符和普通对象的示例应用\n\n-   **文件所有者**：这是拥有 nib 的对象的占位符。文件所有者必须存在，因为它为 xib\
  \ 中包含所有其他对象的对象提供了一个标准且固定的引用。例如，如果一个 `NSWindowController` 拥有该 xib，则文件所有者将代表该控制器对象。利用文件所有者，你可以通过插座变量连接到你自己\
  \ `NSWindowController` 子类的实例变量，这些插座变量将从你的源文件实例变量自动识别出来。你可以使用这些插座变量作为你的 Objective-C\
  \ 代码与 xib 中实例化对象之间的主要连接。\n-   **第一响应者**：在 `window` 中，第一响应者是当前获得焦点的对象。然后，第一响应者会接收多个默认事件，例如键盘事件。你可以将第一响应者视为窗口中事件的默认目标。\n\
  -   **应用**：此对象是对 `NSApplication` 类的引用。此占位对象可用作影响整个应用的标准消息的目标，例如“退出”。如果你决定创建 `NSApplication`\
  \ 的自己子类，也可以使用此对象来接收发往该子类的消息。\n\n除了占位对象，还有放置在 xib 文件中的普通 UI 对象。这些对象以层级方式呈现，具体取决于它们之间的包含关系。例如，通常会在\
  \ xib 中添加一个窗口对象，该窗口对象将包含一个或多个用于显示信息的控件，以及一个菜单对象。图 16-5 显示了一个示例，展示了示例应用的占位对象和普通对象。\n\
  \n你可以通过单击来与此面板中的对象进行交互。当你单击一个对象时，它会成为其他面板（例如属性面板）中选中的对象。然后，您可以根据需要更改该对象的属性。\n\n\
  ### 对象库\n\n对象库是 Xcode 中的一个面板，显示所有可用于创建 UI 的对象列表。如果对象在库中列出，你可以快速将其添加到 xib，并将其作为你正在设计的界面的一部分。这些对象也可以使用属性面板进行自定义，并移动到所需位置。\n\
  \n该库按类别组织，可以从对象库面板顶部的下拉控件中访问这些类别。主要类别包括 Cocoa、通讯录、自动机和 WebKit。第三方可以为对象库添加单独的类别。例如，你可以添加额外的对象库或使用来自\
  \ Web 的开源库。\n\n对于标准应用，Cocoa 类别是你最常使用的类别。它包含 Cocoa 中用于 UI 构建的基本对象。此类别又细分为几个子类别，可用于对\
  \ Cocoa 中包含的大量对象进行分类。在这些类别中，你将找到：\n\n-   **控件**：这些对象代表常见的界面控件，例如按钮、下拉控件、标签和数据输入字段。针对各种情况有大量不同设计的控件。例如，按钮有不同形式，如“推送按钮”、“渐变按钮”、“圆角矩形按钮”、“纹理按钮”、“帮助按钮”等。请注意，在许多情况下，这些对象映射到相同的\
  \ Cocoa 类（对于按钮，是 `NSButton`），但库中的对象经过预配置，以不同的方式显示。这使得 UI 设计师更容易找到他们需要的正确对象。\n- \
  \  **数据视图**：数据视图用于显示或编辑附加到 Cocoa 数据源的数据。这些控件的行为与“控件”面板中的控件类似。但是，数据控件直接与数据源通信，并且能够显示或编辑该数据源中包含的数据。因此，当处理存储在数据源（如关系数据库）中的数据集合时，这些控件是理想的选择。\n\
  -   **布局视图**：布局视图用于定义窗口中其他控件的布局。它是一个实用控件，因为添加它只是为了帮助组织窗口。这些控件包括简单的盒子，用于定义窗口中其他控件将要放置的区域。还有更复杂的视图，例如“滚动视图”或“垂直分割视图”。\n\
  -   **窗口和菜单**：此类别包含表示整个窗口、工具栏和菜单（可显示在菜单栏顶部）的对象。还有不同的窗口可供选择，包括标准窗口、面板（一个较小的辅助窗口）、纹理窗口和带有抽屉的窗口。\n\
  \n### 创建主窗口\n\nUI 创建的第一步是至少向 nib 添加一个窗口。可以通过从对象库面板中选择一个窗口对象来完成。你可以在 UI 中使用多种类型的窗口。\n\
  \n-   **窗口**：标准选项是带有关闭、最小化和最大化按钮的 Cocoa 窗口。这种窗口样式应足以满足大多数用途，包括编辑窗口和信息窗口。\n-   **面板**：面板通常用于临时目的。例如，你可能想用它来显示绘图工具、显示所选元素的属性，或者在文档中选择样式。面板窗口不打算长时间使用，因此它们的控件较小且使用频率较低。\n\
  -   **纹理窗口**：纹理窗口具有标准窗口的许多相同属性。但是，它具有独特的背景和边框，使其更适合作为工具使用的应用程序。例如，iTunes 使用这种风格的主窗口：它的主要目的不是编辑数据，而是作为音乐播放的工具。\n\
  -   **HUD 窗口**：这种窗口样式更适合瞬态数据或信息目的。例如，你可以将其用于帮助信息，或显示应用中选定元素的属性。\n\n要将主窗口添加到 nib\
  \ 文件，只需将窗口对象拖到编辑区域即可。你会看到该窗口将作为 xib 设计的一部分出现。该窗口也会被添加到左侧显示的对象面板中。通过单击这些项目之一，你将能够更改窗口的属性或配置其插座变量和动作。\n\
  \n\n\n### 添加菜单\n\n使用 Xcode 处理菜单栏非常简便。首先，Xcode 创建的初始 xib 文件中已自带菜单栏，它会显示在编辑器窗口的顶部，你可以点击其可视化表示来编辑所需的菜单项。通过双击某个项目并编辑其标签，即可更改菜单的配置。\n\
  \n若要更改这些菜单项的连接，你可以将选中的菜单项拖拽至负责响应的对象上。有几个常用目标对象专门用于响应菜单事件。第一个是应用占位对象（Application\
  \ placeholder）。例如，对于“退出”或“最小化”等菜单命令，应用程序提供了默认方法来响应这类常见请求。\n\n![A978-1-4302-5906-0_16_Fig6_HTML.jpg](img/A978-1-4302-5906-0_16_Fig6_HTML.jpg)\n\
  \n**图 16-6.** 将菜单项连接到应用委托操作\n\n第二个常见的菜单事件目标对象是应用委托（application delegate）。该对象用于处理发生在应用层面、需要定制化响应的事件。例如，我们来看看应用如何处理一个名为“保存文档”的菜单项。\n\
  \n第一步是向委托对象添加一个操作方法。以下是委托接口的示例：\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface AppDelegate\
  \ : NSObject <NSApplicationDelegate>\n{\n        // 存储菜单栏的出口\n        id IBOutlet\
  \ menuBar;\n}\n\n@property (assign) IBOutlet NSWindow *window;\n\n// 由菜单事件调用的操作\n\
  - (IBAction)onSaveDocument:(id)sender;\n\n@end\n```\n\n该接口声明了一个名为 `onSaveDocument:`\
  \ 的方法，并标记为 `IBAction`。请记住，`IBAction` 只是 `void` 的别名，但在接口文件中使用时，它会告诉 Xcode 该方法可以在设计时连接到其他控件。\n\
  \n在 Xcode 中，当你在 xib 文件中选中 `AppDelegate` 对象时，你会在“已接收操作”（Received Actions）部分看到 `onSaveDocument:`\
  \ 作为可用的操作出现。要将这个新操作连接到其来源，请点击操作右侧的圆点并拖拽至目标菜单项（本例中为“保存”项）。松开鼠标后，连接便会建立并显示，如图 16-6\
  \ 所示。\n\n### 加载 nib 后进行修改\n\n任何非简单的应用都需要对控件的默认样式进行一定程度的定制。虽然可以使用 Xcode 的 UI 设计功能进行多项定制，但有些修改通过代码实现更为简便。例如，如果需要对多个控件进行相同的更新，通过\
  \ `for` 循环进行修改比在设计时手动操作更方便。同时，能够在界面显示给用户之前就执行这些修改会更好。\n\n因此，提供一种在 nib 文件加载后、但在呈现给用户之前执行代码的方法非常有用。这正是\
  \ `windowControllerDidLoadNib` 方法所能实现的，它是 `NSDocument` 接口的一部分。示例如下：\n\n```\n- (void)windowControllerDidLoadNib:(NSWindowController\
  \ *)aController\n{\n  [super windowControllerDidLoadNib:aController];\n  // 在此处进行更新\
  \ ...\n}\n```\n\n如果不使用 `NSDocument` 接口，而是使用视图控制器（view controller）类来管理代码，则有一个类似的方法会在\
  \ nib 文件加载后立即运行。该方法名为 `viewDidLoad`（即使 UI 是以编程方式创建的，此方法也会被调用；但如果你知道 UI 来自 nib 文件，那么可以确信\
  \ nib 已被加载）：\n\n```\n- (void)viewDidLoad{\n    [super viewDidLoad];\n    // 在此处进行你的修改\n\
  }\n```\n\n最后，如果你正在子类化一个控件（即 `NSView` 的子类），你应该能够实现 `awakeFromNib` 方法。该方法会在视图从 nib\
  \ 文件中读取后立即被调用，因此你可以借此机会添加自己的定制内容。\n\n## 使用 Objective-C 编写 UI 应用\n\n在前面的章节中，你了解了\
  \ UI 创建的设计层面如何在 Xcode 中交互，并最终生成在磁盘上表示这些对象的 nib 文件。接下来的步骤是使用 Xcode 在运行时控制这些对象。在这里，你可以利用\
  \ Objective-C 的所有特性，结合 Cocoa UI 对象提供的丰富运行时功能。\n\n虽然篇幅有限无法介绍 Cocoa UI 库的所有特性，但我将以一个简单的绘图应用程序为例，展示如何用\
  \ Objective-C 编写 UI。同时，在介绍这些类和方法的含义时，我会加以解释，以便你对这类应用的工作原理有所了解。如需完整的源代码和支持文件，请访问我在个人网站上的本书页面：[`http://coliveira.net`](http://coliveira.net/)。\n\
  \n我在此介绍的应用是一个交互式应用程序，可用于创建和显示图形（graph）。图形是一种专门的图表，用于展示被称为“图形节点”的项目之间的连接关系。图形在多个应用中用于分析连接元素的结构，此类结构的示例包括计算机网络和交通网络。\n\
  \n### main 函数\n\n在 Objective-C 中，与 C 语言一样，应用程序从 `main` 函数开始执行。如果你有一个不需要大量定制的简单应用，你可以直接将\
  \ `main` 的职责委托给 `NSApplicationMain`，这是 `NSApplication` 导出的一个函数，负责执行所需的初始化工作。\n\n\
  ```\n//\n// 文件：main.m\n// 图形应用程序\n#import <Cocoa/Cocoa.h>\n\nint main(int argc,\
  \ char *argv[])\n{\n    return NSApplicationMain(argc, (const char **) argv);\n\
  }\n```\n\n\n\n### AppDelegate\n\n我们从应用程序委托开始。如上所述，该委托接收通过 Xcode 界面编辑器的 nib 文件路由的事件。\n\
  \n```\n/* AppDelegate */\n\n#import <Cocoa/Cocoa.h>\n\n@interface AppDelegate :\
  \ NSObject\n\n{\n    IBOutlet id selectNumberOfNodesWindow;\n    IBOutlet id numberOfNodesControl;\n\
  \    IBOutlet id minDistField;\n    IBOutlet id applyDistControl;\n    int numberOfNodesControlCanceled;\n\
  }\n\n- (id)getSelectNumberOfNodesWindow;\n- (id)getNumberOfNodesControl;\n- (id)getNumberOfNodesApplyDistControl;\n\
  - (id)getNumberOfNodesDistField;\n- (int)getNumberOfNodesControlCanceled;\n- (IBAction)closeSelectNumberOfNodesWindow:(id)sender;\n\
  - (IBAction)cancelSelectNumberOfNodesWindow:(id)sender;\n- (IBAction)setApplyMinDistOnNumberOfNodesWindow:(id)sender;\n\
  \n@end\n```\n\n该应用程序拥有多个出口，对应界面中的字段。例如，有一个字段用于存储窗口中的节点数量。请注意，所有这些字段都被标记为 `IBOutlet`，用于告知\
  \ Xcode 这些变量已映射到出口。然后，请注意最后三个方法的返回值是 `IBAction`，这用于告知 Xcode 这些方法应在界面编辑器中映射为操作。\n\
  \n接下来是 AppDelegate 的实现。\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
  \n- (id)getSelectNumberOfNodesWindow\n{\n    return selectNumberOfNodesWindow;\n\
  }\n\n- (id)getNumberOfNodesControl\n{\n    return numberOfNodesControl;\n}\n\n-\
  \ (int)getNumberOfNodesControlCanceled\n{\n    return numberOfNodesControlCanceled;\n\
  }\n```\n\n前三个方法简单地返回几个界面控件的 ID。这些 ID 定义了显示节点数量的窗口、包含节点数量的控件，以及用于取消操作的控件。\n\n```\n\
  - (IBAction)cancelSelectNumberOfNodesWindow:(id)sender\n{\n    printf(\"The window\
  \ was canceled\\n\");\n    numberOfNodesControlCanceled = 1;\n    [NSApp stopModal];\n\
  }\n\n- (IBAction)closeSelectNumberOfNodesWindow:(id)sender\n{\n    numberOfNodesControlCanceled\
  \ = 0;\n    [NSApp stopModal];\n}\n\n- (IBAction)setApplyMinDistOnNumberOfNodesWindow:(id)sender;\n\
  {\n    if ([sender state] == NSOffState) {\n        [minDistField setEnabled:NO];\n\
  \    } else {\n        [minDistField setEnabled:YES];\n        [selectNumberOfNodesWindow\
  \ makeFirstResponder:minDistField];\n    }\n}\n```\n\n这三个方法用于响应应用程序中定义的模态窗口发送的消息。该模态窗口用于定义编辑器中的节点数量。请注意，在前两个方法中，调用了\
  \ `NSApp` 对象的 `stopModal` 方法。`stopModal` 用于关闭模态窗口（此处模态窗口是一个小对话框）。\n\n```\n- (id)getNumberOfNodesApplyDistControl\n\
  {\n    return applyDistControl;\n}\n\n- (id)getNumberOfNodesDistField\n{\n    return\
  \ minDistField;\n}\n\n@end\n```\n\n最后两个方法是必需的，用于返回存储的信息，例如分布中的节点数量。\n\n### GraphView\
  \ 接口\n\n`GraphView.h` 文件用于定义图形绘制例程的接口。大部分代码与定义绘制操作过程中所需的实例变量相关。\n\n```\n/* GraphView:\
  \ viewer for graph drawing. */\n\n#import <Cocoa/Cocoa.h>\n#include <graph.h>\n\n\
  // This class implements the viewer, which displays the graph and\n// takes care\
  \ of editing operations.\n\n@interface GraphView : NSView\n{\n    NSBezierPath *path;\
  \ // path used by the main graph\n    NSBezierPath *sg_path; // path used by the\
  \ sobreposed graph\n    NSAffineTransform *transform; // transformation used to\
  \ draw on scale\n    Graph *G; // Main graph\n    Graph *sG; // Sobreposed graph\n\
  \    IBOutlet id Document; // Pointer to the document\n    IBOutlet id _posField;\
  \ // Field in the status bar showing position\n    IBOutlet id scroller;\n    IBOutlet\
  \ NSSlider *_slider;\n    int *_associatedPoints; // pointer to a vector of associated\
  \ points\n    int _nPoints; // number of points in this graph\n    double _sliderValue;\
  \ // the value of the slider widget\n    int _clickedNode; // node that was last\
  \ clicked\n    int _deleteEdgeMode; // 1 if the current mode is \"delete edge\"\n\
  }\n\n-(void) refreshView;\n-(void)setBezierPaths;\n-(NSBezierPath *) getPath;\n\
  -(void)startDeleteEdgeMode;\n-(Graph *) getGraph;\n-(IBAction)sliderChanged:(id)sender;\n\
  -(void) refreshView;\n-(void)drawNodeNumbers;\n-(int)findClickedNode:(NSPoint)loc;\n\
  -(void)moveNode:(int)clickedNode to:(NSPoint)loc;\n-(void)addSobreposedGraphToPath;\n\
  -(void)addGraphToPath;\n-(void)mouseMoved:(NSEvent *)theEvent;\n\n@end\n```\n\n\
  请注意，该文件与 Cocoa 应用程序中的大多数文件一样，以命令 `#import <Cocoa/Cocoa.h>` 开头。随后你会看到一个必要的变量列表，其中包含\
  \ Xcode 使用的一些出口。在声明的方法中，你还可以看到一个在界面设计阶段使用的操作。\n\n\n\n### `GraphView` 的实现\n\n该文件是您正在探索的绘图应用程序的核心。此处定义的\
  \ `GraphView` 类是 `NSView` 的子类。正如您之前所见，`NSView` 负责管理屏幕上的某一区域。在此情形下，`GraphView` 负责管理编辑器的所有区域，并处理用户的编辑操作。例如，该类管理键盘、鼠标移动以及窗口调整大小等事件。\n\
  \n文件开头定义了一些有用的宏，例如 `min` 和 `max`，它们将在该类的后续实现中用于某些计算。为了提升速度，还使用纯 C 语言定义了几个函数，但文件的大部分内容是通过\
  \ Objective-C 方法实现 `GraphView` 类。\n\n```\n#import \"GraphView.h\"\n#import \"MyDocument.h\"\
  \n#include <common.h>\n#define NODE_RADIUS 4\n#define min(x,y) (x<y ? x : y)\n#define\
  \ max(x,y) (x>y ? x : y)\nstatic int change_points_associated_to_edges(graph_node\
  \ *graph_node, int a, int b, void *data);\nstatic int find_edge_at_point(graph_node\
  \ *graph_node, int a, int b, void *data);\nstruct for_each_edge_data {\n    Graph\
  \ *G;\n    int movedNode;\n    int secondMovedNode;\n    int edgeFound;\n    NSPoint\
  \ *loc;\n    NSBezierPath *path;\n    NSBezierPath *sg_path;\n    GraphView *v;\n\
  \    double sliderValue;\n};\n```\n\n`for_each_edge_data` 结构体用于存储关于图中边的有用信息。边只是图中连接两个节点的线条。该结构体用于存储那些需要被\
  \ `GraphView` 的方法快速访问的数据。\n\n```\n@implementation GraphView\n/***************************************\n\
  \ * 窗口的通用选项。\n ***************************************/\n// 有必要声明，我们希望使用原点位于左上角的坐标系。\n\
  - (BOOL)isFlipped\n{\n    return NO; // 应改为 YES 以翻转\n}\n\n// 有必要声明，我们希望处理键盘事件。\n\
  - (BOOL)acceptsFirstResponder\n{\n    return YES;\n}\n```\n\n这两个方法覆盖了 `NSView` 的现有选项。第一个方法决定了视图所使用的坐标系相对于默认坐标系不会发生翻转。默认坐标系的原点位于左上角。您可以尝试将其翻转，以获得一个更传统的、原点位于左下角的坐标系。\n\
  \n第二个方法确定此视图接受第一响应者。这意味着您能够将键盘命令以及其他依赖第一响应者的事件直接发送到该视图。\n\n```\n/***************************************\n\
  \ * 窗口和结构的初始化。\n ***************************************/\n// 初始化窗口。\n// 注意：此法在\
  \ initWithFrame: 之后调用。\n-(void)awakeFromNib\n{\n    [[self window] setAcceptsMouseMovedEvents:YES];\n\
  \n    // 创建路径（保留（retain）可避免路径在方法返回后被垃圾回收（GC））\n    path = [[NSBezierPath bezierPath]\
  \ retain];\n    sg_path = [[NSBezierPath bezierPath] retain];\n    transform = [[NSAffineTransform\
  \ transform] retain];\n\n    _associatedPoints = 0;\n    _sliderValue = 1.0;\n \
  \   _clickedNode = 0;\n    _deleteEdgeMode = 0;\n\n    [self setBezierPaths];\n\
  }\n```\n\n`awakeFromNib` 方法覆盖了父类的同名方法。在 `awakeFromNib` 中，您应该进行视图显示前所需的任何初始化。此方法在\
  \ nib 文件用于创建用户界面后立即被调用。这意味着在此时，nib 中的所有属性和连接都已恢复，并且 `NSView` 可以访问它们。\n\n这段代码正在调用方法来建立\
  \ `GraphView` 的初始状态。例如，您可以看到有两个变量存储了 `NSBezierPath` 的新对象。此对象将在后面用于创建贝塞尔曲线。该方法还分配了一个\
  \ `NSAffineTransform` 对象，该对象将用于转换 `GraphView` 上节点和边的位置和大小。\n\n\n\n请注意该方法如何调用 `setAcceptsMouseMovedEvents`：。这是必要的，因为标准的\
  \ `NSView` 对象并不接收鼠标消息。为了能够处理这些消息，您需要使用上述方法发出请求。\n\n```\n// 删除先前分配的内存\n-(void)dealloc\n\
  {\nif (_associatedPoints)\nDelete(_associatedPoints);\n[path release];\n[sg_path\
  \ release];\n[transform release];\n[super dealloc];\n}\n```\n\n`dealloc` 方法负责释放与此视图关联的所有数据。它将删除存储在\
  \ `_associatedPoints` 中的屏幕位置。它还将释放 `path`、`sg_path` 和 `transform` 对象。同时，它也会调用基类中的\
  \ `dealloc`。\n\n```\n// 绘制图形\n- (void)drawRect:(NSRect)aRect\n{\n//\n// 首先绘制图形\n\
  [transform concat]; // 调用当前变换\n[[NSColor redColor] set]; // 将颜色设置为红色\n[path stroke];\
  \ // 绘制图形\n[[NSColor blueColor] set]; // 将颜色设置为蓝色\n[sg_path setLineWidth:2]; //\
  \ 定义线宽\n[sg_path stroke]; // 绘制叠加图\n//\n// 然后绘制节点编号\nif (G) { // 如果图已加载\n[self drawNodeNumbers];\
  \ // 绘制节点\n}\n}\n```\n\n此方法负责绘制视图的内容。实际上，当调用此方法时，大部分决策已经做出。它唯一要做的就是请求重新绘制 `GraphView`\
  \ 使用的路径。如果图已初始化，它还会在节点附近绘制节点编号。\n\n```\n// 删除位于位置“loc”的边\n-(int)deleteEdge:(NSPoint)loc\n\
  {\n//\n// 调整必要的数据\nstruct for_each_edge_data data;\ndata.G = G;\ndata.loc = &loc;\n\
  data.edgeFound = 0;\ndata.sliderValue = _sliderValue;\n//\n// 将数据传递给 find_edge_at_point\n\
  gr_for_each_edge_dir(G, find_edge_at_point, &data);\n//\n// 更改绘制\nif (data.edgeFound)\
  \ {\n[self setBezierPaths]; // 重新创建形状\n[self setNeedsDisplay:YES]; // 重新绘制屏幕\n}\n\
  return 1;\n}\n```\n\n`deleteEdge` 方法使用 `gr_for_each_edge_dir` 函数来完成查找边的艰巨工作（出于性能考虑，它使用\
  \ C 函数）。一旦找到边，工作就交由 `setBezierPaths` 方法处理，并重新绘制视图。\n\n```\n// 处理鼠标按下事件\n- (void)mouseDown:(NSEvent\
  \ *)theEvent\n{\nNSPoint loc = [self convertPoint:[theEvent locationInWindow] fromView:nil];\n\
  if (_deleteEdgeMode) {\n[self deleteEdge:loc];\n[[NSCursor arrowCursor] set];\n\
  _deleteEdgeMode = 0;\nreturn;\n}\n_clickedNode = [self findClickedNode:loc];\nif\
  \ (_clickedNode) printf(\"被点击的节点是 %d\\n\", _clickedNode);\n}\n```\n\n当 `mouseDown`：操作被发送到\
  \ `GraphView` 时，会调用此方法。该方法首先确定事件发生的精确位置。这是通过 `locationInWindow` 方法完成的，该方法属于 `NSEvent`\
  \ 对象。如果视图处于删除边模式，则请求删除该边，并将光标设置为普通箭头模式。否则，唯一要做的就是打印被点击节点的编号。\n\n```\n- (void)mouseUp:(NSEvent\
  \ *)theEvent\n{\nNSPoint loc = [self convertPoint:[theEvent locationInWindow] fromView:nil];\n\
  if (_clickedNode) {\n//\n// 使用缩放因子修正位置\nloc.x /= _sliderValue;\nloc.y /= _sliderValue;\n\
  //\n// 更新节点的位置\ngr_set_pos(G, _clickedNode, loc.x, loc.y);\n//\n// 更改每条单独的边的位置\n\
  struct for_each_edge_data data;\ndata.movedNode = _clickedNode;\ndata.loc = &loc;\n\
  data.G = G;\ndata.path = path;\ngr_for_each_adjacent_edge(G, _clickedNode, change_points_associated_to_edges,\
  \ &data);\n//\n// 对叠加图执行相同操作（如果存在）\nif (sG) {\ndata.G = sG;\ndata.path = sg_path;\n\
  gr_for_each_adjacent_edge(sG, _clickedNode, change_points_associated_to_edges, &data);\n\
  }\n//\n// 恢复原始位置，并移动节点位置\nloc.x *= _sliderValue;\nloc.y *= _sliderValue;\n[self\
  \ moveNode:_clickedNode to:loc];\n}\n```\n\n\n\n\n```objectivec\n[self setNeedsDisplay:YES];\n\
  }\n_clickedNode = 0;\n}\n```\n\n`mouseUp:` 方法响应发送给 `GraphView` 的鼠标事件。该方法首先使用 `NSEvent`\
  \ 的 `locationInWindow` 方法获取鼠标点击的位置。然后，如果有点击的节点，代码会继续更新节点和边。首先，应用滑块控件的缩放因子，并更新节点的位置。接着，更新每条连接的边的位置。如果存在叠加图，也会更新它。最后，该方法调用内部的\
  \ `moveNode:to:` 方法并重绘视图。\n\n```objectivec\n- (void)mouseDragged:(NSEvent *)theEvent\n\
  {\n    NSPoint loc = [self convertPoint:[theEvent locationInWindow] fromView:nil];\n\
  \    if (_clickedNode) {\n        [self moveNode:_clickedNode to:loc];\n       \
  \ [self setNeedsDisplay:YES];\n    }\n}\n```\n\n当用户按下鼠标按钮并移动鼠标时，会调用 `mouseDragged:`\
  \ 方法。在此视图中，您可以使用 `moveNode:to:` 方法在节点被点击时提供即时反馈。然后，该方法调用 `setNeedsDisplay` 方法来重绘视图。\n\
  \n```objectivec\n-(void)setBezierPaths\n{\n    [path removeAllPoints];\n    G =\
  \ [Document getGraph];\n    if (G) {\n        int n = gr_nverts(G);\n        if\
  \ (_associatedPoints && n > _nPoints) {\n            Delete(_associatedPoints);\n\
  \            _associatedPoints = 0;\n        }\n        if (!_associatedPoints)\
  \ {\n            _associatedPoints = NewVec(int, n);\n            if (!_associatedPoints)\
  \ {\n                printf(\"error creating vector of associated points\\n\");\n\
  \                return;\n            }\n            _nPoints = n;\n        }\n\
  \        [self addGraphToPath];\n    }\n    [sg_path removeAllPoints];\n    sG =\
  \ [Document getSobreposedGraph];\n    if (sG) {\n        [self addSobreposedGraphToPath];\n\
  \    }\n}\n```\n\n`setBezierPaths` 用于初始化视图中的所有路径。贝塞尔路径是一个对象，它决定了 Cocoa 如何绘制路径。您可以使用贝塞尔路径绘制复杂的路径，包括直线、矩形、圆形和弧线。您只需要设置好贝塞尔路径，并在构造完成后请求在视图上绘制路径即可。此方法设置了内部的贝塞尔路径，以绘制在屏幕上显示图形所需的每一条线。\n\
  \n```c\n// this function is called for each edge, and data has the required information\n\
  static int draw_the_edge(graph_node *graph_node, int a, int b, void *data)\n{\n\
  \    // reads data and unpack it\n    struct for_each_edge_data *myData = (struct\
  \ for_each_edge_data*) data;\n    Graph *G = myData->G;\n    NSBezierPath *path\
  \ = myData->path;\n    //\n    // adds the position (in the path) of point to the\
  \ data associated to this\n    // edge of the graph so that we remember it later.\n\
  \    int *point = (int*)malloc(int,sizeof(int));\n    *point = [path elementCount];\n\
  \    gr_set_data(G, a, b, point, 1);\n    //\n    // add edge to the path\n    NSPoint\
  \ p1, p2;\n    nodePos *pa, *pb;\n    pa = gr_get_pos(G, a);\n    pb = gr_get_pos(G,\
  \ b);\n    p1.x = pa->x;\n    p1.y = pa->y;\n    p2.x = pb->x;\n    p2.y = pb->y;\n\
  \    [path moveToPoint:p1];\n    [path lineToPoint:p2];\n    return 1;\n}\n```\n\
  \n`draw_the_edge` 函数是一个辅助函数，它使用传入的数据来绘制一条边。该方法的重要部分在于它如何通过 `moveToPoint:` 和 `lineToPoint:`\
  \ 方法来操作贝塞尔路径。这些方法创建了路径，当贝塞尔路径完成后，该路径将在屏幕上被绘制出来。\n\n```c\n// draw the shape of a\
  \ node in position given by p, into the bezier path\nvoid draw_node(nodePos *p,\
  \ NSBezierPath *path)\n{\n    NSPoint pos;\n    pos.x = p->x-NODE_RADIUS;\n    pos.y\
  \ = p->y-NODE_RADIUS;\n    [path moveToPoint:pos];\n    pos.x += 2*NODE_RADIUS;\n\
  \    [path lineToPoint:pos];\n    pos.y += 2*NODE_RADIUS;\n    [path lineToPoint:pos];\n\
  \    pos.x -= 2*NODE_RADIUS;\n    [path lineToPoint:pos];\n    pos.y -= 2*NODE_RADIUS;\n\
  \    [path lineToPoint:pos];\n}\n```\n\n此函数对图中的节点执行类似的工作。它操作贝塞尔路径，以便绘制图中的节点。节点的表示是一个由\
  \ `NODE_RADIUS` 定义大小的小正方形。\n\n```c\n// starts adding the edges to the path. Calls\
  \ function draw_the_edge to do the job.\n```\n\n\n\n`-(void)drawEdges:(Graph*)_G\
  \ withPath:(NSBezierPath*)_path`\n\n```\n{\n\nstruct for_each_edge_data data;\n\n\
  data.path = _path;\n\ndata.G = _G;\n\ngr_for_each_edge_dir(_G, draw_the_edge, &data);\n\
  \n}\n```\n\n`drawEdges:withPath:` 负责获取正确的参数，并为图中的每条边调用绘制边的函数。\n\n```\n// adds the\
  \ shapes of the graph to path. Uses drawEdges and drawNodes\n- (void)addGraphToPath\n\
  {\nint i, n;\nn = gr_nverts(G);\n[self drawEdges:G withPath:path];\nfor (i=1; i<=n;\
  \ i++) {\nnodePos *p = gr_get_pos(G, i);\n_associatedPoints[i-1] = [path elementCount];\n\
  draw_node(p, path);\n}\n}\n```\n\n方法 `addGraphToPath` 负责将完整图形绘制到贝塞尔路径上。它首先使用 `drawEdges:withPath:`\
  \ 绘制边，然后绘制图中的每个节点。\n\n```\n// Convenience function to add superposed graph.\n-(void)addSobreposedGraphToPath\n\
  {\n[self drawEdges:sG withPath:sg_path];\n}\n```\n\n用户可以选择在应用程序中使用叠加图。这通过上述方法实现。\n\
  \n```\n-(void)drawNodeNumbers\n{\nint i;\nint n = gr_nverts(G);\nfor (i=0; i<n;\
  \ i++) {\nNSPoint loc;\nloc.x = gr_get_x_pos(G, i+1);\nloc.y = gr_get_y_pos(G, i+1);\n\
  char num[32];\nsprintf(num, \"%d\", i+1);\n[[NSString stringWithCString:num] drawAtPoint:loc\
  \ withAttributes:0];\n}\n}\n```\n\n此方法绘制与每个节点对应的数字。要在屏幕上绘制字符串，请使用 `NSString` 的 `drawAtPoint:withAttributes:`\
  \ 方法。`NSString` 的这个扩展将使用给定的位置将字符串直接绘制到视图上。\n\n```\n- (int)findClickedNode:(NSPoint)\
  \ loc\n{\nint i;\nint n;\nif (!G) return 0;\nn = gr_nverts(G);\nfor (i=1; i<=n;\
  \ i++) {\ndouble x = gr_get_x_pos(G, i);\ndouble y = gr_get_y_pos(G, i);\ndouble\
  \ radius = _sliderValue > 1 ? NODE_RADIUS * _sliderValue : NODE_RADIUS;\nx *= _sliderValue;\n\
  y *= _sliderValue;\nif (i==1) printf(\"%lf %lf: loc i\\n%lf %lf: nodePos i\\n\"\
  ,\nloc.x, loc.y, x, y);\nif (x-radius <= loc.x && x+radius >= loc.x\n&& y-radius\
  \ <= loc.y && y+radius >= loc.y)\nreturn i;\n}\nreturn 0;\n}\n```\n\n此方法提供了一种简单的方法来确定在指定位置是否点击了节点。它遍历节点列表，并返回与给定位置相交的节点的索引。\n\
  \n```\nstatic int change_points_associated_to_edges(\ngraph_node *graph_node, int\
  \ a, int b, void *data)\n{\nstruct for_each_edge_data *dt = (struct for_each_edge_data*)data;\n\
  int u = a < b ? a : b;\nint v = a < b ? b : a;\nint point = *((int*)gr_get_data(dt->G,\
  \ u, v));\nif (a < b) point++;\n[dt->path setAssociatedPoints:dt->loc atIndex:point];\n\
  return 1;\n}\n```\n\n这是一个辅助函数，使用 `NSBezierPath` 的 `setAssociatedPoints:atIndex:`\
