- "# 第一部分  \n语言本身  \n\n"
- "# 1. Objective-C 中的 C 语言  \n\n## 摘要  \n\n本章将介绍 Objective-C 与 C 语言共有的主要概念。Objective-C\
  \ 基于最初的 C 语言。由于这种特殊关系，任何有效的 C 代码在 Objective-C 中同样有效。因此，熟悉 C 语言的基础知识，以及它们如何与面向对象编程的各个领域（如类、消息和接口）相关联，就显得至关重要。\
  \  \n\n数组、结构、指针、变量声明、变量类型和函数等主题，是这两种语言共享的通用词汇的一部分。熟练掌握这些基本 Objective-C 技术的程序员，在理解和运用面向对象概念时会更加得心应手。\
  \  \n\n为了让你快速掌握 Objective-C 的高级能力，我们将从概述继承自 C 语言的最常用特性开始本书。在接下来的章节中，你将看到如何使用这些基础技术创建简单的程序，这些程序将成为你未来\
  \ Objective-C 应用程序的构建模块。  \n\n> **注意**  \n> 在阅读接下来的几节内容时，请记住一个隐含的假设：这里讨论的每个 Objective-C\
  \ 特性，在纯 C 语言中同样可用。除非另有明确说明，本章内容均遵循此规则。  \n\n## 简单语句  \n\nObjective-C 程序由语法元素组成，这些元素可进一步归类为函数、类和变量声明。函数包含语句或变量声明。语言中的每条语句都以分号结尾，或者用花括号括起来（在复合语句的情况下），这使得无论是人还是编译器都能轻松识别。与某些使用缩进来定义声明可能结束位置的语言不同，Objective-C\
  \ 使用分号以明确无误的方式标记其结束。例如，以下是一些有效的语句和变量声明（其含义将在后续章节解释）：  \n\n```\nint numberOfEmployees;\n\
  double totalPayment;\ntotalPayment = numberOfEmployees * 1000;\nNSLog(@\"test log\"\
  );\nif (1 > 2) totalPayment = totalPayment + 10;\n```\n\n这些行中的每一行要么定义一条可执行指令，要么声明一个程序稍后将使用的实体。我们将详细检查每种情况下使用的语法，但目前重要的是认清\
  \ Objective-C 语句的本质，以及它们如何组合起来构成有效的程序。  \n\n## 变量  \n\n变量是内存中一个可以保存和修改值的位置。Objective-C\
  \ 中的变量必须属于特定的类型，该类型在变量声明时被明确定义。以下是一些例子：  \n\n```\nint anIntegerVariable;\nfloat\
  \ aFloatingNumber;\n```\n\n请注意，变量类型是声明中的第一个元素，后面跟着变量名，最后以分号结尾，分号表示语句结束字符。这两个变量声明创建了一个整型变量和一个浮点型变量。整型变量必须只包含整数，编译器会对此进行检查。即使程序员强行将其他类型的值赋给整型变量，在涉及该变量的所有表达式中，其内容仍会被转换为整数。\
  \  \n\n可以在一条语句中声明多个变量。这是通过在同一语句中添加额外的变量名来实现的，变量名之间用逗号分隔。以下是另一个在同一表达式中声明多个变量的例子：\
  \  \n\n```\nint anIntegerVariable, aSecondIntegerVariable;\nbool booleanVariable1,\
  \ booleanVariable2;\n```\n\n命名变量时需要遵守一些规则。第一条规则是，变量只能以字母字符或下划线字符开头。变量名中的其他字符同样适用此规则；但从第二个位置开始，也允许使用数字字符。以下是一些有效的变量声明：\
  \  \n\n```\nint var1;\nint _single_2_Position;\nint long_variable_name;\n```\n\n\
  在 Objective-C 中，下划线字符经常用作长变量名的分隔符。其目的是在不借助大小写字母混写的情况下，提高这些长名称的可读性。然而，一些程序员认为在同一个变量中混用大小写没有问题。因此，下面的例子也非常常见：\
  \  \n\n```\nint longVariableName;\n```\n\n> **注意**  \n> 变量命名是一种风格问题。不同的程序员对哪种形式更好看有不同看法。不过，我们建议你在使用变量命名风格时保持一致。不要在一个地方使用大小写混合的变量，而在另一个地方使用下划线分隔的变量。基本思想是避免混淆，并减少每次在程序中引入新名称时你需要做的决策数量。\
  \  \n\n变量名以及 Objective-C 中所有其他标识符都是区分大小写的。这意味着以下两个是对不同变量的有效声明：  \n\n```\nint myVariable1;\n\
  int myvariable1;\n```\n\n变量名区分大小写这一事实，使得使用统一的命名风格更加重要。如果因为不加区分地使用两个仅由一个拼写错误的字符区分的变量而导致程序失败，那将是非常不幸的。\
  \  \n\n> **注意**  \n> 在 C 语言中，以单个或双下划线开头后跟大写字母的名称是保留字。只有编译器才能使用它们，用于语言实现的目的。请避免使用此类名称，因为它们可能与未来语言版本中使用的内部名称冲突——即使它们在你当前的编译器实现中能够正常工作。\
  \  \n\n### 变量初始化  \n\n变量声明也可用于定义变量的初始值。这通过赋值操作符实现。以下是一个简单的例子：  \n\n```\nint daysInTheWeek\
  \ = 7;\nint monthsInTheYear = 12;\nfloat PI = 3.14;\n```\n\n初始化还可以使用算术表达式甚至函数调用。因此，可以编写如下代码：\
  \  \n\n```\nint secondsPerHour = 60 * 60;\n```\n\n> **注意**  \n> 变量应始终被初始化为合适的值，因为缺乏适当的初始化是编程错误最常见的来源之一。Objective-C\
  \ 将变量初始化与定义相结合，正是为了减少这类错误的发生。\n\n\n\n## 变量类型\n\n变量在使用前需要声明为特定类型。Objective-C 中有多种类型可供使用，通常可分为原生类型和用户自定义类型。\n\
  \n原生类型由语言和编译器实现预先定义，无需使用任何库或头文件即可使用，因此可在 Objective-C 定义的任何函数或类中使用。而用户自定义类型由程序员指定，它们可以是库的一部分，也可以是用户代码的一部分。我将首先介绍可用的原生类型；结构和类将在后面讨论。\n\
  \n原生类型数量不多，大多数是数值类型，但也可用于存储字母数字数据以及逻辑值。最后，原生类型还可用于存储内存地址，即所谓的指针。\n\n在数值类型中，最常见的是整数和浮点数。例如，整数值由类型\
  \ `int` 表示。浮点数是数学中实数的计算近似值，可由 `float` 或 `double` 等原生类型表示。\n\n### 整数类型\n\n整数类型用于存储整数，包括\
  \ `char`、`int`、`short`、`long` 和 `long long`。不同数值类型的出现源于它们各自拥有不同的存储容量，以及在内存中表示此类数字所需的内存大小。例如，在\
  \ 32 位机器上，定义为 `int` 的整数通常占用 4 个字节，这意味着它可以存储大约 40 亿以内的数字。另一方面，`short` 类型的值可能小至 2\
  \ 个字节，足以存储大约 200 万以内的数字。以下是一些示例：\n\n```\nchar val0 = 12;\n```\n\n```\nint val1 =\
  \ 123400;\n```\n\n```\nshort val2 = 123;\n```\n\n```\nlong val3 = 12345;\n```\n\n\
  ```\nlong long val4 = 12345678;\n```\n\n`long` 和 `long long` 变量的大小取决于编译器和使用的机器，但它们能存储的值通常大于\
  \ `int` 允许的范围。\n\n整数值的类型还可以声明为有符号或无符号。有符号数可以是正数或负数，因为符号与数值表示一起存储。无符号数不能为负，取值范围从零到变量大小允许的最大值。\n\
  \n当表示已知为非负的数量时，无符号数非常有用。例如，内存大小通常由无符号数表示。然而，通常的做法是使用更为通用的有符号类型——除非确定某个数字不可能为负。默认情况下，声明为\
  \ `int`、`short`、`long`、或 `long long` 的整数都是有符号的。\n\n## 浮点数\n\n浮点数是实数的计算机表示。由于计算机存储数据量有限，实数无法被精确存储。对于某些数字，例如\
  \ 0.3，由于使用二进制表示会引入误差，计算机中只能存储其近似值。对于其他实数，例如圆周率 Pi，众所周知它没有有限表示形式。\n\nObjective-C\
  \ 程序使用浮点表示法，其中实数分为两部分存储：尾数和指数。你无需了解这种表示法的复杂性，但重要的是要意识到这些数字与整数之间的区别。同样重要的是要知道，浮点数的运算可能导致难以理解和追踪的舍入误差。\n\
  \n浮点数可以声明为两种形式：`float` 或 `double` 值（尽管 `double` 可以接受 `long` 修饰符）。`float` 和 `double`\
  \ 的区别在于每种类型存储所用的数据量。具体字节数取决于所使用的机器，但 `double` 数的精度和指数范围都是 `float` 的两倍。以下是一些示例：\n\
  \n```\nint degrees = 360;\n```\n\n```\nfloat e = 2.7182;\n```\n\n```\ndouble elarge\
  \ = 2.718281828459;\n```\n\n## 字符\n\nObjective-C 支持的一种常见原生类型是字符（`char`）。字符可以存储任何标准\
  \ ASCII 值，其范围通常为 0 到 255。尽管用于存储字符串元素，但字符类型只是前述整数数字类型之一，因此其行为与 `int` 或 `short` 等类型类似。`char`\
  \ 类型也可以声明为有符号（允许负数）或无符号（当已知不会存储负数时）。\n\n## 逻辑值\n\n变量还可以存储单个逻辑值：真或假。虽然 C 语言没有专门的布尔值，但在\
  \ Objective-C 中，你可以使用 `BOOL` 类型来表示此类变量。`BOOL` 类型的变量可以存储值 `YES` 或 `NO`，也可以拼写为 `TRUE`\
  \ 或 `FALSE`。然而，该语言允许将任何整数类型转换为布尔值。在这种情况下，零值被转换为 `FALSE`，而任何非零值都被视为 `TRUE`。对于不注意这些类型之间转换规则的程序员来说，这可能是错误的来源。\n\
  \n## 指针\n\nObjective-C 支持存储内存地址的变量，这是引用程序所存储数据最灵活的方法之一（此类变量的使用将在本章后面介绍）。指针使用星号符号声明，以下是声明常见类型指针的示例：\n\
  \n```\nint *pointer_to_int;\n```\n\n```\ndouble *double_pointer;\n```\n\n第一个示例是一个可以存储整数地址的变量。第二个是一个指针，可用于存储包含\
  \ `double` 类型值的内存地址。在 Objective-C 中创建对象时，指针符号使用频繁，你将在下一章中看到这一点。\n\n## void 类型\n\n\
  关键字 `void` 是 Objective-C 中使用的特殊类型名称。与其他类型名称不同，`void` 不代表真实的数据类型，而是表示数据的缺失，或者类型未知这一事实。`void`\
  \ 类型仅能在少数情况下出现。一种情况是当函数没有返回值时，这通过使用 `void` 关键字替代返回类型来表示。\n\n使用 `void` 的另一种情况是标记指向未知数据类型的指针。当类型未知且使用\
  \ `void` 时，生成的指针将不包含关于该内存位置存储的实际数据类型的任何信息。此类变量可以在 Objective-C 中用作泛型指针，可应用于任何数据类型。你将在后续学习指针的章节中看到这种用法的示例。\n\
  \n**注意**\n\n由于 `void` 只是一个特殊关键字，因此无法声明 `void` 类型的变量。例如，尝试声明像 `void var;` 这样的变量将导致编译错误，因为编译器无法推断该变量的真实类型。\n\
  \n\n\n## 注释\n\n大规模项目中使用的软件并不总是易于理解的。尽管应尽一切努力使代码更易于理解，但复杂的算法和其他假设可能会妨碍对程序中特定区域的理解。这就是为什么始终需要在程序本身中添加文档的原因。\n\
  \nObjective-C 使用两种不同风格的代码注释。第一种风格，也是最简单的用法，采用序列 `//` 作为新注释的开始。以这种方式开始的任何注释将一直有效，直到行尾。\n\
  \n```\nint integerVariable; // 该变量保存一个整数\nfloat floatVariable; // 一个浮点数变量\n```\n\
  \n第二种注释风格用于跨越多行的注释。在这种情况下，注释以字符 `/*` 开始。从该位置起的所有文本都被视为注释的一部分，直到遇到字符对 `*/` 为止。\n\n\
  ```\n/* 这是一个多行注释的示例。以下\n表达式分别用于定义整数和浮点\n类型的变量 */\nint integerVariable;\nfloat floatVariable;\n\
  ```\n\n多行注释不能嵌套。也就是说，如果你已经有了一条注释，就不能在其周围再使用第二对注释字符。这样做是行不通的，因为第一次看到字符 `*/` 时，它们会关闭之前开始的任何多行注释，而不仅仅是最近的那一条。\n\
  \n```\n/* 一条新注释\n  /* 原始注释，未被嵌套 */\n这不是注释，因为第一条多行注释\n已经被关闭了。 */\n```\n\n**注意**\n\
  \n如上所述，一些程序员避免使用多行注释的原因之一是它们可能导致混淆。为避免这种情况，请仅使用单行注释，并将多行注释保留用于特定情况，例如 Objective-C\
  \ 文件顶部的通用注释。\n\n## 算术表达式\n\n使用变量的最简单方法之一是将其作为算术表达式的一部分。这些表达式用于使用常见的运算符（如加法、减法、乘法和除法）计算数值量。\n\
  \nObjective-C 拥有丰富的运算符集，可用于数值表达式。使用这些运算符最直观的方式是表示四种常见的算术运算。然而，一个不太明显的运算符是取余运算符。它返回第一个数除以第二个数的整数余数。\n\
  \n```\nint remainder = 10 % 4;\n```\n\n此操作的结果应等于二。这种表达式的一个常见用途是判断一个数字是否为偶数。\n\n\
  ```\nif (number % 2 == 0)\n{\n        /* 这是一个偶数 */\n}\n```\n\n表达式可以使用括号进行组合，以便程序员控制编译器分组运算的顺序。\n\
  \n```\nint value = 25;\nint result = (10 + value) * (2 / value);\n```\n\n## 函数基础\n\
  \nObjective-C 程序由函数、声明和类的混合体组成。函数是 C 程序使用的基本概念，而类是 Objective-C 提供的基本扩展机制。因此，在本节中我们将只讨论函数；我们将在下一章介绍类。\n\
  \n每个程序都从一个名为 `main` 的函数开始。`main` 函数并非从程序的任何部分调用，而是在应用程序启动时由编程环境调用。程序在 `main` 函数返回时精确结束。以下是一个简单的\
  \ `main` 函数示例：\n\n```\nint main()\n{\n   NSLog(@\"hello to objective-C\");\n   return\
  \ 0;\n}\n```\n\n该程序的目的是写入一条日志字符串。程序通过使用 `NSLog` 函数实现这一点，该函数是 Objective-C 提供的 Foundation\
  \ 框架的一部分，因此在标准 C 程序中不可用。`NSLog` 的参数是一个以 `@` 字符开头的字符串字面量；此类字符串字面量也是 Objective-C 独有的。程序中的其他所有内容都只是为了符合语言的要求。\n\
  \n函数名为 `main`，函数名后的括号对用于确定所需的任何参数。在这种特定情况下，`main` 函数被定义为一组空参数，这意味着没有参数。然而，某些应用程序期望接收参数，这些参数可以从命令行提供。如果是这种情况，`main`\
  \ 函数也可以以稍微不同的方式声明。\n\n```\nint main(int argc, char *argv[])\n{\n   NSLog(@\"hello\
  \ from objective-C\");\n   return 0;\n}\n```\n\n在这个示例中，程序接收两个参数：第一个是整数值 `argc`，也称为参数计数器，它指定了传递给程序的参数数量。第二个参数\
  \ `argv` 是一个指向字符的指针数组，可用于存储传递给应用程序的每个参数。在后续示例中，你将学习如何在程序中使用这些参数。\n\n### 定义新函数\n\n\
  函数是将一组指令打包的简单方法，这样程序员就不必重复自己。例如，这是一个计算两个数平均值的简单函数：\n\n```\nfloat avg(float a, float\
  \ b)\n{\n   return (a+b)/2;\n}\n```\n\n尽可能使用函数有以下几个优点。\n\n*   **简化程序**：每当需要重复执行一个常用操作时，你可以创建一个封装该操作的函数。在上面的例子中，通过调用函数\
  \ `avg`，你无需在代码的其他部分重复用于计算平均值的加法和除法运算。这在这里可能看起来没有必要，因为函数非常简单。然而，当算法更复杂时，简化其使用就变得更为重要。例如，你可以在大型工程包中拥有一个用于数学积分的例程。或者你可以在图形应用程序中拥有一个窗口绘制例程。在每种情况下，使用函数都会简化最终的程序。\n\
  *   **改善维护**：事情在变化，程序员必须每天适应变化。如果客户决定修改某个计算的方式，而你没有使用函数，那么所需的更改就必须传播到当前进行该计算的所有地方。另一方面，如果你足够聪明地使用了函数，那么只需要在一个地方应用更改。代码中调用该函数的每个地方都会自动使用更新后的版本。这样使用函数可以减轻维护负担。在某些情况下，可以避免修改成百上千行代码——并且将修改限制在仅仅一个地方。\n\
  *   **改善文档**：创建函数也是一种记录过程的方式。每当你创建一个函数时，都需要给它一个名字来描述它做什么。如果做得好，调用者至少会对该函数的功能有一个高层次的了解。这种技术可以被看作是一种简单但有效的自我文档形式。当编程项目中的每个人都定期采用这种做法时，可以生成更易于维护且更具前瞻性的代码。\n\
  \n由于这些优点，函数在 Objective-C 中被广泛使用，并且实际上也是 C 语言中代码组织的基本原则。你将在下一章中看到，类可以被视为函数的泛化，这样你就能通过使用这些原则实现更多。\n\
  \n\n\n#### 函数语法\n\n函数的语法由其输入参数和返回类型，以及花括号及其包含的一组语句决定。参数列表是函数名后括号内显示的一组参数。即使函数不需要任何参数，其函数名后也会有一对空括号。函数名前缀有作为结果返回的值的类型。例如，\n\
  \n```\nint add_values(int a, int b)\n{\n   return a + b;\n}\n```\n\n将始终返回一个整数值，该值取决于两个参数\
  \ `a` 和 `b`。\n\n本章接下来的示例将使用函数的语法，以便你了解函数如何在编程项目中使用。\n\n## 条件运算\n\n条件运算用于编码逻辑语句。在像\
  \ Objective-C 这样的编程语言中，任何产生非零值的表达式都被视为真，而零（或 `NULL`）值则被视为假。逻辑运算用于操作此类真或假的表达式，并构成了使用\
  \ `if` 语句进行条件执行的基础。例如，考虑以下代码片段：\n\n```\nvoid test_function(int x)\n{\n   if (x >\
  \ 10)\n      NSLog(@\"Number is greater than 10\");\n}\n```\n\n此函数演示了将表达式 (`x >\
  \ 10`) 作为 `if` 语句的一部分来使用。逻辑表达式可以使用以下运算符之一：`>`、`<`、`>=`、`<=`、`==`、`&&`、`||` 或 `!`。前五个运算符提供了一种表达大于、小于、大于等于、小于等于或等于的逻辑关系的方式。它们可以应用于数字或字符，以及布尔值。\n\
  \n这五个运算符可用于比较整数、字符、布尔值或浮点数的表达式中。此类表达式的结果将是一个逻辑值，例如 `YES` 或 `NO`。\n\n你还可以使用逻辑运算符\
  \ `&&`、`||` 和 `!` 来组合这些布尔值。第一个运算符组合两个逻辑值，如果两者都为真，则结果为 `YES`。第二个运算符作用于两个逻辑值，如果其中至少一个为真，则结果为\
  \ `YES`。最后，第三个运算符执行逻辑非运算。当值为假时结果为 `YES`，当值为真时结果为 `NO`。这些运算符也可以应用于数值或指针值。当这种情况发生时，如果数字或指针对应于零或\
  \ `NULL`，则被视为假；否则，该值被视为真。\n\n复杂的逻辑表达式还可以使用括号分组，以便更容易理解。以下是使用这些逻辑运算符的一个示例：\n\n```\n\
  void logical_func(int x, int y)\n{\n   if ((x > 2 && x <= 10) ||\n       (y > 15\
  \ && y <= 20)\n      )\n      NSLog(@\"the numbers are acceptable\");\n}\n```\n\n\
  在这段代码中，变量 `x` 与 `2` 和 `10` 进行比较，使得 `x` 的值位于 `3` 到 `10` 之间。变量 `y` 也与 `15` 和 `20`\
  \ 进行比较，因此可接受的数字仅在 `16` 到 `20` 之间。如果 `x` 或 `y` 满足这些要求，该函数将打印一条消息说明情况。\n\n### `if`\
  \ 语句\n\n`if` 语句，如上例所示，可用于基于逻辑表达式执行操作。`if` 语句的最简单形式类似于以下内容：\n\n```\nif (<logical\
  \ expression>)\n  <statement>;\n```\n\n这种形式的 `if` 语句很有用，但当需要执行多条语句时则不适用。如果需要执行多条语句，你应该将表达式分组到一个单个块中（也称为复合语句）。块是\
  \ Objective-C 中分组表达式的常用方式，类似于函数定义的分组。以下是一个示例：\n\n```\nvoid logical_func2(int x,\
  \ int y)\n{\n   if ((x > 2 && x <= 10) ||\n       (y > 15 && y <= 20)\n      )\n\
  \   {\n      NSLog(@\"the numbers are acceptable\");\n      NSLog(@\"the total value\
  \ is %d\", x + y);\n   }\n}\n```\n\n每当逻辑表达式为真时，这段代码执行两个操作：打印日志字符串并显示 `x + y` 的值。为此，你需要一个表达式块，如上所示，定义在花括号之间。\n\
  \n还有第三种更有用的 `if` 语句形式。假设你有一些操作需要在逻辑表达式为真时执行，而另一些操作需要在表达式为假时执行。这可以通过在 `if` 语句中添加一个\
  \ `else` 分支来实现。`else` 分支可以是单个语句或块。以下是另一个示例：\n\n```\nvoid logical_func3(int x, int\
  \ y)\n{\n   if ((x > 2 && x <= 10) ||\n       (y > 15 && y <= 20))\n   {\n     \
  \ NSLog(@\"the numbers are acceptable\");\n      NSLog(@\"the total value is %d\"\
  , x + y);\n   }\n   else\n   {\n      NSLog(@\"the numbers are not acceptable\"\
  );\n   }\n}\n```\n\n## 循环\n\n编程可以被描述为定义重复任务的艺术。但是，如果没有可控重复的方法，执行编程任务将非常困难。这就是为什么每种语言都提供一组允许重复表达式的语句。循环是主要用来重复一组指令的语句的通用名称，其重复取决于逻辑条件的结果。\n\
  \nObjective-C 中可用的循环表达式有 `for`、`while` 和 `do while` 循环。这些循环形式中的每一种都提供了执行可控重复所需的语法。你将在接下来的章节中看到它们各自的工作原理。\n\
  \n### `while` 循环\n\n`while` 循环是三种循环形式中最简单的一种。`while` 循环的基本格式为\n\n```\nwhile (<logical\
  \ expression>)\n   <statement>\n```\n\n其中 `<statement>` 可以是单个语句或复合语句。例如，\n\n```\n\
  void printNums(int min, int max)\n{\n   while (min < max)\n   {\n      NSLog(@\"\
  Value %d\", min);\n      min = min + 1;\n   }\n}\n```\n\n`while` 循环的执行过程是：计算给定的逻辑表达式，并且仅当结果为真时才进入循环。然后执行花括号内块中的所有表达式。接着再次计算逻辑表达式，并重复该过程。当逻辑表达式为假时，整个块被跳过，程序在块后的第一行继续执行。\n\
  \n就像 `if` 语句一样，`while` 语句也允许使用单个表达式而不是块。因此，可以编写以下代码：\n\n```\nbool isOdd(int num)\n\
  {\n   while (num > 0)\n      num = num - 2;\n   return num == -1;\n}\n```\n\n\n\n\
  ### `do { } while( )` 循环\n\n迭代语句的另一种变体是 `do`/`while` 循环。它与之前 `while` 形式的区别在于，其执行条件的判断在循环体末尾（即\
  \ `while` 关键字所在位置）进行。这使得 `do`/`while` 循环在需要至少执行一次循环体的情况下非常有效。\n\n可以将 `do`/`while`\
  \ 循环视为一种避免初始条件判断的方式，这与标准 `while` 循环的工作方式相反。借助这种额外的重复特性，可以编码大量需要在逻辑判断之前先执行一次的算法。\n\
  \n例如，考虑一个处理从文件读取输入的算法。假设文件中包含一组数字，最后一个数字是 -1。在这种情况下，算法包括读取文件中的数字，可能使用该数字进行一些处理，并在数字为\
  \ -1 时停止。如果假设存在一个名为 `nextNumber()` 的函数，它返回文件中的下一个数字，那么该算法可以表示为：\n\n```\nvoid process_numbers()\n\
  {\n   int number;\n   do\n   {\n      number = nextNumber();\n      // 执行其他任务\n\
  \   }\n   while (number != -1);\n}\n```\n\n请注意，此函数将始终至少读取一次下一个数字并执行相关任务。这正是 `do`/`while`\
  \ 循环可能成为最佳工具的典型场景。只要遇到的数字不等于 -1，末尾的条件判断就会评估为真。当该表达式为假时，重复停止，函数结束其当前执行。\n\n### `for`\
  \ 循环\n\n在 Objective-C 的三种循环语句中，`for` 循环是最通用的。原因在于它可以在每次迭代的开始（或结束）时执行不同的操作。结合其他更专门的迭代语句的强大功能，`for`\
  \ 循环很可能是你目前所见过的控制结构中使用最广泛的一种。\n\n`for` 循环的语法由用括号括起来的前置部分和循环体组成——这与 `while` 循环类似。然而，与\
  \ `while` 循环不同的是，括号内包含三个由分号分隔的表达式。第一部分是初始化表达式。第二部分是逻辑表达式，类似于你在 `while` 循环中编写的内容。这个逻辑判断决定\
  \ `for` 循环体是否会被执行，并且在每次即将开始新一轮迭代时都会重复判断。\n\n最后，第三部分在每次循环体执行结束时运行。因此，就像循环的第二部分一样，这最后一部分在每次运行循环体时执行一次。这里有一个简单的例子：\n\
  \n```\nint for_test(int max)\n{\n   int i;\n   for (i=0; i<max; i=i+1)\n   {\n \
  \     NSLog(@\"value is %d\", i);\n   }\n}\n```\n\n这是一个展示此类循环在实践中如何工作的最小示例。在 `for`\
  \ 循环顶部表达式的第一部分中，你看到了初始化。这里的目标是将计数器变量 `i` 的初始值赋为 0。中间部分将检查该数字是否小于最大值。如果该判断为真，则执行循环体，在循环体中将数字打印到应用程序日志中。\n\
  \n`for` 多部分表达式的最后一部分仅在每次迭代结束时执行。在这里，`i` 的值增加 1。这使得计数器在每次迭代结束时增加其值，直到达到所提供的最大值。当达到该值时，逻辑判断失败，循环结束。\n\
  \n### `switch` 语句\n\nObjective-C 提供了另一种选择两个或多个选项来执行的方法。除了 `if` 语句，当存在两个或多个可以根据单个值选择的选项时，你可以使用\
  \ `switch`/`case` 复合语句。\n\n例如，假设你有一个字符变量，它只能包含三个值：`'B'` 代表蓝色，`'R'` 代表红色，`'G'` 代表绿色。在这种情况下，你可以使用\
  \ `switch`/`case` 根据此变量的内容执行三种不同的选项。示例代码如下：\n\n```\nvoid switch_test(char value)\n\
  {\n   switch (value)\n   {\n   case 'R':\n      NSLog(@\"red\");\n      break;\n\
  \   case 'G':\n      NSLog(@\"green\");\n      break;\n   case 'B':\n      NSLog(@\"\
  blue\");\n      break;\n   }\n}\n```\n\n请注意，`switch` 控制结构接收控制切换的变量作为参数。然后，对于每个有效的情况，你都有一个\
  \ `case` 标签。`case` 定义了执行开始的位置。在这个例子中，它打印与字符关联的颜色。\n\n在每个有效的代码路径之后都有一个 `break` 语句。之所以需要这样做，是因为当遇到新的\
  \ `case` 时，`switch` 控制结构不会停止执行。实际上，如果没有 `break` 指令，剩余的代码将继续执行，直到 `switch` 块结束。为了防止这种情况发生，`break`\
  \ 语句会将程序移动到 `switch` 体结束后的下一条指令。\n\n可以在 `switch`/`case` 语句中使用的另一个元素是 `default` 标签。此类标签可用于检查无效输入。以下是上面所示函数的改进版本：\n\
  \n```\nvoid switch_test(char value)\n{\n   switch (value)\n   {\n   case 'R':\n\
  \      NSLog(@\"red\");\n      break;\n   case 'G':\n      NSLog(@\"green\");\n\
  \      break;\n   case 'B':\n      NSLog(@\"blue\");\n      break;\n   default:\n\
  \      NSLog(@\"error: invalid color code\");\n   }\n}\n```\n\n也可以让多个 `case` 指向同一段代码。这可以通过不向会“穿透”到下一个\
  \ `case` 的 `case` 添加 `break` 来实现。请考虑以下示例：\n\n```\nvoid vowel_test(char x)\n{\n \
  \  switch(x) {\n      case 'A':\n      case 'E':\n      case 'I':\n      case 'O':\n\
  \      case 'U':\n         NSLog(@\"vowel\\n\");\n         break;\n      default:\n\
  \         NSLog(@\"consonant\\n\");\n   }\n}\n```\n\n\n\n### 赋值运算符\n\nObjective-C\
  \ 提供了一种通用的表达式来更新变量的值，这种表达式使用了赋值运算符。这类赋值表达式被频繁使用，因为它们能以更简洁的方式完成某些任务，而这些任务在其他语言中可能需要两个或更多步骤才能完成。\n\
  \n基本赋值运算符使用 `=` 符号，并修改左侧的变量，使其包含右侧表达式的结果。这是更新变量的常见方式，你在目前看到的示例中已经遇到过。然而，除了这种基本用法，赋值运算符还可以作为子表达式出现在其他上下文中。其结果是你可以将赋值嵌入到其他表达式中，使其成为它们的一部分。\n\
  \n```\nbool check_total(int a, int b)\n{\n   int total;\n   if ((total = a + b)\
  \ > 10)\n   {\n      NSLog(@\"total value of %d is too high\", total);\n      return\
  \ false;\n   }\n   return true;\n}\n```\n\n在此示例中，变量 `total` 用于存储 `a` 和 `b` 的和。`if`\
  \ 语句检查这两个参数的和是否大于 `10`。然而，该测试同时将 `a + b` 的结果赋值给了变量 `total`，以便稍后在调用 `NSLog` 时使用。表达式\
  \ `(total = a + b)` 不仅执行了赋值操作，还产生了所赋的值，这样其他表达式就可以访问这个值。\n\n**注意：** 在此示例中，很明显 `total`\
  \ 本可以在其他地方更新，但在更复杂的代码中，有时将赋值作为子表达式是更自然的做法。在编写这类代码时，请尝试思考是否有其他解决问题的方式能产生更好、更易于维护的方案。\n\
  \n赋值运算符这一特性的另一个用途是链式赋值。其基本思想是：同一个值可以赋值给多个变量；只需让两个或更多变量共享同一个赋值表达式即可实现。\n\n```\nint\
  \ height, width;\nvoid make_square(int dimension)\n{\n   height = width = dimension;\n\
  }\n```\n\n函数 `make_square` 用于将 `height` 和 `width` 变量更新为相同的值。这是通过在这两个变量之间链式赋值实现的。实际上，正确的解读方式是从右向左阅读这个赋值语句。\n\
  \n```\nvoid make_square(int dimension)\n{\n   height = (width = dimension);\n}\n\
  ```\n\n显然，同样的思路可以扩展到任意数量的变量。\n\n### 自增与自减运算符\n\n赋值的一种简单形式是自增运算符。该运算符被创建用于对包含整数值的变量执行加一操作。类似地，也存在自减运算符，它的应用是将赋值给变量的值减一。自增运算符常用于循环中，例如更新临时计数器的值。\n\
  \n```\nint print_forwards_and_backwards(int n)\n{\n   int i;\n   for (i=0; i<n;\
  \ i++)\n   {\n      NSLog(@\"value is %d\", i+1);\n   }\n   for (i=n; i>0; i--)\n\
  \   {\n      NSLog(@\"value is %d\", i);\n   }\n}\n```\n\n在此示例中，你有机会同时使用自增和自减运算符来移动计数器变量\
  \ `i`。自增和自减运算符也有一个版本可以在另一个表达式内部使用，其方式类似于赋值运算符的使用方式。前置自增运算符将变量加一，并且确保自增操作在包含它的表达式的其他部分执行之前发生。类似地，也存在具有相同特性的前置自减运算符。\n\
  \n```\nint print_forwards_and_backwards(int n)\n{\n   int i;\n   for (i=0; i<n;\
  \ )\n   {\n      NSLog(@\"value is %d\", ++i);\n   }\n   for (i=n; i>0; )\n   {\n\
  \      NSLog(@\"value is %d\", i--);\n   }\n}\n```\n\n这个示例展示了使用前置自增和后置自增运算符的区别。在两个循环中，我们都将自增和自减运算符从循环表达式中移除了。它们已被挪到了\
  \ `NSLog` 调用中，并成为了其子表达式。然而，在第一个例子中，我们希望先递增变量再将其打印出来，因此我们使用了前置自增运算符。在第二个例子中，目标是先按原样打印变量，然后执行自增操作，这通过后置自增运算符实现。\n\
  \n**注意：** 自增和自减运算符不能在同一个表达式中对同一变量使用多次。一旦发生这种情况，编译器将无法得知变量的预期值，结果很可能是错误的。作为编程规范，应避免在大型表达式中使用自增运算符，以免意外发生此类情况。\n\
  \n### 复合赋值\n\n有一类赋值运算符是对自增和自减运算符的推广。例如，要向一个变量加上整数值，你可以使用 `+=` 运算符。因此，\n\n`width\
  \ = width + 10;`\n\n等价于\n\n`width += 10;`\n\n例如，下面的代码增加了矩形的尺寸：\n\n```\nint width,\
  \ height;\nvoid increase_rectangle_dimensions(int increase)\n{\n   width += increase;\n\
  \   height += increase;\n}\n```\n\n减法操作类似：\n\n```\nvoid reduce_rectangle_dimensions(int\
  \ reduction)\n{\n   width -= reduction;\n   height -= reduction;\n}\n```\n\n对于每一种算术运算符，都有对应的复合赋值运算符版本：`*=`、`/=`、`%=`、`<<=`、`>>=`。它们很容易理解，你将在本书的其他章节中看到它们的使用示例。\n\
  \n## 结构体\n\n结构体是一种用户定义的类型，它包含其他数据元素，这些元素可以通过标签来访问。结构体使用关键字 `struct` 声明。\n\n```\n\
  struct address\n{\n   int number;\n   NSString *street;\n   NSString *city;\n  \
  \ NSString *state;\n   int postal_code;\n};\n```\n\n这个结构体定义了一个新的数据类型，它包含五条数据，这些数据可以作为\
  \ `address` 结构体的一部分来访问。要使用这样的结构体，你只需创建一个这种新定义类型的变量即可。\n\n```\nvoid create_address()\n\
  {\n   struct address famous_address;\n   famous_address.number = 1600;\n   famous_address.street\
  \ = \"Pennsylvania Av\";\n   famous_address.city = \"Washington\";\n   famous_address.state\
  \ = \"DC\";\n}\n```\n\n结构体的巨大优势在于它们允许将信息打包到逻辑单元中，这样你就不需要处理多个不相关的变量。相反，你只需处理一个单一的数据表示形式。因此，例如，使用上述定义的地址结构体，你可以创建以地址为参数的函数，而不必处理一组不相关的项目。\n\
  \n```\nvoid print_address(struct address an_address)\n{\n   NSLog(@\"street: %@\"\
  , an_address.street);\n   // ... 打印地址中的其他字段\n}\n```\n\n你也可以将结构体视为一种仅包含数据的原始版本的对象。在下一章中，你将看到\
  \ Objective-C 如何提供用户定义的数据类型，这些类型不仅包含关联的数据，还能响应消息。\n\n\n\n## 指针\n\n指针是内存中某个地址的标识。Objective-C\
  \ 通过使用指向特定类型的指针，提供了一种便捷的方式来访问内存地址。指针类型的主要优势在于，它能让你将任何内存地址解读为变量的潜在位置。因此，你不再局限于使用预先声明的变量：你可以将任何内存位置转换为可由算法操控的数据类型。\n\
  \n声明指针时，你需要从一个已有的数据类型开始，并在该数据类型的右侧加上星号字符。例如，你可以按照以下方式为整数和双精度浮点数定义指针：\n\n`int *pointer_to_int;`\n\
  \n`double *my_double_pointer;`\n\n**注意：** 指针声明仅仅定义了一个指向某数据类型的地址，但并不会创建与该数据类型关联的任何内存。例如，上面展示的变量\
  \ `pointer_to_int` 并没有与之关联的整数变量。要能够使用指针，首先需要让它指向有效的内存。\n\n一旦拥有了指针，你就可以用它来操控已有的变量。这可通过使用两个运算符来实现：星号运算符用于检索指针所指向内存中存储的数据。例如：\n\
  \n```\nvoid print_value(int *pint)\n{\n  NSLog(@\"the value is %d\", *pint);\n}\n\
  ```\n\n表达式 `*pint` 表示你正在解引用 `pint` 所指向内存中存储的值。简而言之，星号运算符允许你使用指针来替代给定类型的变量。\n\n与指针配合使用的第二个运算符是取地址运算符（与符号）`&`。该运算符用于获取现有变量的内存地址。结合使用时，星号运算符和取地址运算符允许你从变量获取地址，并访问和修改存储在这些内存地址中的数据。它们为程序员提供了在应用程序中管理内存所必需的基本工具。这里有一个简单的例子：\n\
  \n```\nvoid modify_value(int *pint, int new_value)\n{\n   *pint = new_value;\n}\n\
  \nint width, height;\nvoid init_rectangle_dimensions()\n{\n   modify_value(&width,\
  \ 100);\n   modify_value(&height, 50);\n   NSLog(@\"Now width = %d and height =\
  \ %d\", width, height);\n}\n```\n\n这段代码使用指针来修改一个整数变量的内容。这种间接操作很有用，因为现在同一段代码可以被用来修改任何整数变量，无论它在程序中的实际名称是什么。\n\
  \n### 参数传递\n\n现在是解释参数传递约定概念的好时机。每个函数都由其名称、参数和返回类型定义。在 Objective-C 中，传递给函数的参数总是会被拷贝。这意味着，例如，当将一个整数传递给函数时，函数内部使用的值仅仅是原始整数的一个副本。特别是，如果你修改了参数的值，你并不会改变被传入的原始变量的值。例如：\n\
  \n```\nvoid try_to_change(int value)\n{\n   value = 10; // 一个新值\n   NSLog(@\"value\
  \ is now %d\", value);\n}\n\nvoid use_change()\n{\n   int orig_value = 20;\n   try_to_change(orig_value);\n\
  \   NSLog(@\"after change %d\", orig_value);\n}\n```\n\n如果你运行这个函数，你会看到在执行了 `try_to_change`\
  \ 函数之后，存储的值并没有改变。我们说变量 `orig_value` 是按值传递给 `try_to_change` 的。如果你真的想要改变一个变量的值，你需要的不仅仅是它的副本，而是它的内存地址。这可以使用指针来实现，如上一节所示。因此，在这个例子中，正确的做法是：\n\
  \n```\nvoid really_change(int *value)\n{\n   *value = 10; // 一个新值\n   NSLog(@\"\
  value is now %d\", *value);\n}\n\nvoid use_change()\n{\n   int orig_value = 20;\n\
  \   really_change(&orig_value);\n   NSLog(@\"after change %d\", orig_value);\n}\n\
  ```\n\n注意，现在你传递的不再是一个值，而是一个内存地址，这样你就可以使用星号运算符来访问那块内存。在调用函数 `really_change` 之后，`orig_value`\
  \ 的值从 `20` 变成了 `10`，这与之前那次不同。这意味着函数 `really_change` 是在原始变量的内容上执行修改，而不仅仅是在其副本上。\n\
  \n**注意：** 理解语言如何使用指针参数很重要，因为这也是操作对象的方式。Objective-C 中的所有对象都是作为指针来创建和使用的。\n\n## 数组\n\
  \n数组是一种按顺序存储多个相同类型值的方式。例如，假设你想存储学校里所有学生的年龄。一种方法是创建大量变量来存储这些数据，例如：\n\n`int age1,\
  \ age2, age3; // ... 这里还有更多`\n\n这种安排很容易被视为过于僵化而难以维护。显然，这将需要将数据存储到不同变量中的代码。\n\n`age1\
  \ = 11;`\n`age2 = 9;`\n`// ... 这里还有更多`\n\n这不仅不方便，而且容易出错。数组提供了一种解决这个问题的方法。如果你只需要存储学生的年龄，你可以创建一个包含\
  \ 1000 个整数的数组，这些整数可以通过从 `0` 到 `999` 的值进行索引。\n\n`int ages[1000];`\n\n现在，你可以编写代码来根据需要访问和修改数组。例如，为了存储所有年龄，假设你有一个返回学生人数的函数，以及另一个返回编号为\
  \ `i` 的学生年龄的函数。然后，你可以编写以下代码来计算平均年龄：\n\n```\nvoid average_student_age()\n{\n   int\
  \ total_age = 0;\n   int max = number_of_students();\n   int i;\n   double denominator\
  \ = max;\n   for (i=0; i<max; ++i)\n   {\n      ages[i] = age_of_student(i);\n \
  \  }\n   for (i=0; i<max; ++i)\n   {\n      total += age[i];\n   }\n   return total\
  \ / denominator;\n}\n```\n\n这个函数首先将数据读入 `ages` 数组，然后计算平均值（总年龄除以学生人数）。\n\n数组的声明语法类似于单个变量的声明方式。但是，要创建一个特定大小的数组，你需要在方括号内输入元素的数量。在上面的例子中，你有一个包含\
  \ 1000 个整数的数组。为了声明数组，你需要一个固定的大小，例如 `1000`。对于可变大小的数组，稍后你将使用 Objective-C 的容器类，例如 `NSArray`，它为数组的创建和调整大小提供了更灵活的机制。\n\
  \n要访问数组的元素，你只需要使用括号来定位所需的元素。例如，要给数组的第三个元素赋值，你需要使用以下代码：\n\n`ages[2] = value;`\n\n\
  这段代码片段会将 `value` 的内容存储到数组 `ages` 的第三个位置。\n\n**注意：** Objective-C 数组是从零开始索引的，因此第一个元素位于位置零。对于学习该语言的人来说，这可能会造成混淆，但你只需要记住，索引表示你想从数组起始位置偏移多远。第一个元素距数组起始位置的距离为零，因此索引为零。类似地，第二个元素的距离为一。\n\
  \n\n\n### 数组与指针\n\nObjective-C 中数组最重要的特性之一是与指针紧密相关。这两个概念之间的关系源于 Objective-C 应用程序中数组内存的创建方式。数组仅作为内存块存储，其中的元素通过距数组起始位置的距离来访问。\n\
  \n例如，考虑前面示例中提到的 `ages` 数组。当编译器读取数组声明时，它会预留一块足够大的内存区域，以容纳所请求数量的元素。\n\n要访问特定元素，编译器会获取数组起始地址并加上特定的偏移量。因此，以下代码是可行的：\n\
  \n```\nint ages[1000];\n\n// 初始化数组的代码 ...\n\nvoid print_item(int pos)\n\n{\n\n \
  \  int *pointer = ages;\n\n   NSLog(@\"item value: %d is the same as %d\", *(pointer\
  \ + pos), ages[pos]);\n\n}\n```\n\n这段代码说明了一个事实：数组可以转换为同类型的指针。此外，对指针加值相当于访问数组的特定元素。因此，上述代码等同于以下代码，后者以不同方式访问数组：\n\
  \n```\nint ages[1000];\n\nvoid print_item(int pos)\n\n{\n\n   int *pointer = ages;\n\
  \n   NSLog(@\"item value: %d is the same as %d\", pointer[pos], (ages+pos));\n\n\
  }\n```\n\n鉴于 Objective-C 编译器存储数组的方式，使用指针访问数组元素不仅是可行的，而且也是专业程序员经常采用的做法。\n\n## 总结\n\
  \n本章我们简要概述了 C 语言和 Objective-C 语言共有的主要概念。虽然我们没有足够的篇幅来描述 C 语言语法和语义的每个细节，但这里讨论的基本元素足以用来创建复杂且实用的应用程序。\n\
  \nC 语言的编程方法论——结构化编程——要求将程序划分为相关的函数。而另一方面，在 Objective-C 中，主要概念是将程序分解为类，这些类封装了代码以及其方法所使用的数据。此外，Objective-C\
  \ 通过消息传递的概念提供了一种灵活的运行时代码执行机制。这是下一章的主要主题，届时你将开始探索面向对象编程的概念。\n\n"
- "# 2. 类\n\n**摘要**\n\n在面向对象编程语言（如 Objective-C）中，类是应用程序的构建块。它们是用于定义对象的语法结构，而对象则由方法和变量组成。对于刚接触该语言的程序员来说，理解面向对象编程特性是\
  \ Objective-C 中所有技术的关键基础，这一点至关重要。\n\n如果没有正确理解面向对象设计概念，就很难熟练使用 Mac OS X 或 iOS 上的库，因为这些库大量使用了\
  \ OOP。因此，在本章开头，我将对 OOP 进行简明概述。我的首要目标之一是解释 OOP 与其他流行编程范式有何不同。虽然结构化编程试图通过简单函数来分解程序，但\
  \ OOP 将函数与数据的结合视为编程抽象的真正定义性概念。因此，OOP 语言避免了将数据与操作这些数据的方法分离开来。使用对象进行编程的另一个巨大优势是：可以向其他对象发送消息，并让这些对象自行决定响应该消息的最佳方式。\n\
  \n在初步介绍 OOP 之后，本章将详细描述 Objective-C 中类的概念。特别关注语法方面——尤其是如何从现有类创建新对象。我将解释如何将数据关联到这些类，然后继续为对象添加方法。正如你将在示例中看到的，Objective-C\
  \ 中的方法也可以关联到类本身。\n\nObjective-C 中类的主要特性之一是它们如何被整齐地分解为两个独立文件：一个包含接口，另一个包含实现细节。这种清晰的分离使得只共享类的关键方面成为可能，同时隐藏客户端不需要的任何实现信息。在本章中，你将看到用于创建类的完整语法细节，这些类为应用程序的其他部分提供了这种简单的接口。\n\
  \n最后，我提供了如何定义实例属性的示例，这是一种简单的机制，在将数据暴露给其他对象的同时，保留对数据如何解释和保存的控制。这些是 UI 对象的主要构建块，学会如何定义它们将使你能够创建灵活的类，这些类可以立即响应应用程序其他部分的变化。例如，属性用于维护同一对象的独立视图，同时确保更新立即反映在数据的每个视图中。\n\
  \n## 面向对象编程\n\n本章的主要目标是讨论 Objective-C 中面向对象编程的主要特性。OOP 是一种编程风格，它鼓励我们根据所需功能将代码组织成定义的类。“类”这个词是一个很好的比喻，因为我们试图将代码和数据分类为合适的抽象。\n\
  \n与结构化编程等标准实现技术不同，OOP 提供了一种灵活的机制，通过向其他对象发送消息来执行代码。OOP 应用程序不是直接调用函数（正如我们到目前为止所做的那样），而是告知其他对象它们希望执行什么操作。通过发送消息而不是使用编译时定义的函数，对象可以自由地动态修改它们响应消息的方式。\n\
  \nOOP 提供的消息传递机制还有助于分离应用程序中不同区域关注点。使用这种策略，对象可以只专注于它所提供的基本功能。同时，对象可以请求系统中其他现有对象的任何附加功能。\n\
  \n类可以被解释为对象的原型。在 Objective-C 中，类由两部分定义，分别由关键字 `@interface` 和 `@implementation` 引入。这些定义包含了语言创建运行时对象所需的所有信息。\n\
  \n对象是特定类的运行时实例化。在本书讨论的大多数上下文中，实例等同于运行时对象。因此，你会看到对象是通过对现有类进行显式实例化而创建的。\n\n\n\n###\
  \ 为什么对象如此重要？\n\n在过去 30 年中，面向对象编程语言因其先进的程序分解和扩展机制而走到了编程研究和实践的前沿。虽然像`C`这样的老语言确实可以模拟面向对象语言的所有特性，但要达到同样的效果，需要很高的复杂性，而这在使用面向对象编程时是完全不必要的。\n\
  \n因此，目前大多数应用软件都是为`Objective-C`这样的面向对象语言设计的。由于对象具有重要的实际意义，有必要了解面向对象编程与其他编程范式之间的主要差异。\n\
  \n面向对象编程的经典定义确定了面向对象语言中应具备的一系列功能。由于如今面向对象语言种类繁多，除了对象及其相关方法的概念外，很难再找出所有语言都共有的特性。尽管如此，面向对象的经典定义仍包含一些重要元素，这些元素在`Objective-C`以及许多其他面向对象语言中都可用。\n\
  \n**封装**：这意味着对象应该将数据和代码包含在同一单元中。例如，定义一个财务报表的对象将包含财务报表所使用的数据，以及可用于操作财务报表的代码。\n\n\
  **继承**：类可以从其他类继承变量和代码。这种关系称为继承。被继承的类被称为超类、父类或基类。继承关系是递归的，因此会形成一个类层次结构。在`Objective-C`中，只支持单一继承；也就是说，类只能从一个类继承数据和代码（但通过使用协议机制可以使其更灵活，你将在后续章节中看到这一点）。\n\
  \n**多态性**：这是面向对象编程中的一个核心概念，因为它允许同一条消息根据接收消息的对象以不同方式进行响应。`Objective-C`的语法允许使用基类指针来引用派生类或基类的对象。这种灵活的机制让程序员无需确切定义接收者将如何反应以及会产生什么结果，就能向对象发送消息。接收消息的对象可以选择根据自己的需要来解读消息。这提供了扩展性，如果不使用对象，是很难实现的。\n\
  \n在过去的几十年中，面向对象编程已被用于定义许多重要技术的基本构建块。例如，苹果公司曾通过`Objective-C`利用面向对象编程的优势来设计 Mac OS\
  \ X 操作系统的界面。最近，iOS 的所有用户界面和系统代码也都是使用`Objective-C`创建的。\n\n既然你已经了解了使用面向对象编程的优势，让我们来看看`Objective-C`如何支持面向对象的主要概念，包括如何定义带有变量的新类及其方法。\n\
  \n## 使用对象\n\n一个`Objective-C`程序会大量使用对象。尽管你始终可以创建结构体和函数（如前一章所述），但应用程序应该使用对象，以符合`Objective-C`框架的要求，并能够使用该语言提供的扩展选项。\n\
  \n你需要理解的第一件事是如何正确使用已有的对象。当你向一个类发送创建消息时，就会在`Objective-C`中创建一个对象。然后，该对象将变为活动状态，你就可以开始向它发送消息了。\n\
  \n实际上，你操作的是指向对象的指针，因为无法直接创建某个特定类的变量。考虑一下`Objective-C`中的字符串类`NSString`。\n\n> **注意**：苹果公司提供的`Objective-C`框架中的所有类都以两个字母开头，作为通用前缀。`NS`前缀被\
  \ Foundation 框架中的所有类使用。自从`Objective-C`还是 NextSTEP 公司开发的产品起，这两个字母就开始使用了。其他框架使用不同的字母组合。特别是，应用开发者编写的代码应避免使用这个前缀。\n\
  \n```\nvoid printMessage(NSString *text)\n{\n   NSLog(@\"Message is %@\", text);\n\
  }\n```\n\n在这个例子中，有一个`NSString`类的对象，它实现了字符串类型。对象总是通过指针来操作，因为你无法确切知道传递给函数的对象的具体类型，只能知道它派生自`NSString`。这是多态性的基本原则，并且在操作对象时始终遵循。\n\
  \n你可以对对象做的最重要的事情就是向它发送消息。消息发送的语法如下：\n\n```\n[<对象指针> <消息>];\n```\n\n例如，考虑以下函数：\n\n\
  ```\nvoid printMessage(NSString *text)\n{\n   int len = [text length];\n   NSLog(@\"\
  Message length is %d\", len);\n}\n```\n\n在这个例子中，你使用了`text`（一个指向字符串对象的指针），并向它发送了`length`消息，该消息返回一个整数值。`length`消息是`NSString`对象接口的一部分，因此只要你有可用的`NSString`对象，就可以调用它。\n\
  \n### 方法参数\n\n上面讨论的`length`消息非常简单，没有任何参数。如果一个消息有一个参数，它会在消息名称后面加上冒号，然后传递该参数，如下所示：\n\
  \n```\nvoid printsubstr()\n{\n        NSString *text = @\"My Example String\";\n\
  \        NSString *substr = [text substringToIndex:5];\n        NSLog(@\"substring\
  \ is %@\", substr); // 输出 \"My Ex\"\n}\n```\n\n在这个例子中，向`text`对象发送了`substringToIndex`消息。该消息被定义为返回一个新字符串，其中包含原始字符串中从开头到指定字符索引（不包含该索引处的字符）的所有字符。在这个函数的最后一行，你使用了`NSLog`函数将生成的子字符串打印到控制台。\n\
  \n如果一个消息需要两个参数，它会有特定的格式来描述每个参数的用途。下面是一个使用`stringByReplacingOccurrencesOfString:withString`消息的例子：\n\
  \n```\nNSString *replaceOne(NSString *myString)\n{\n        return [myString\n \
  \               stringByReplacingOccurrencesOfString:@\"1\"\n                withString:@\"\
  one\"];\n}\n```\n\n正如消息名称所明确指出的，它的目标是通过将第一个参数的出现替换为第二个参数来返回一个新字符串。参数总是在冒号分隔符之后提供。对于消息所需的任意数量的参数，都是如此。\n\
  \n> **注意**：许多习惯了`C++`或`Java`等语言中方法和函数工作方式的程序员，会觉得`Objective-C`在需要为每个参数添加额外关键字时非常冗长。然而，选择长格式的语法来书写消息也有一些优点。首先，它促使创建参数数量较少的方法。这是一个好的副作用，因为无论使用何种语法，大量的参数都可能导致函数难以理解。其次，`Objective-C`消息是自文档化的，因为它们必须使用词语来描述每个参数。\n\
  \n\n\n### `id` 类型\n\nObjective-C 面向对象特性中的一个独特之处在于使用了一种名为 `id` 的通用对象类型。`id` 类型的变量可以用于持有指向任何对象的指针，而与其原始类型无关。Objective-C\
  \ 编译器也允许你向该变量发送任何消息，因为消息分发过程将在运行时而非编译时执行。\n\n`id` 类型被用于一些重要的消息中，例如 `alloc`，它为新的对象分配内存。该消息的返回类型是\
  \ `id`，因此它可以用来创建任何类型的对象。\n\n由于 `id` 可以作为对象的通用类型，因此了解何时使用 `id` 或特定指针类型（例如 `NSString\
  \ *`）非常重要。使用明确定义的类型的优势在于，编译器可以精确地知道哪些消息可用于该类型。如果向 `NSString` 的实例发送了一条不正确的消息，编译器会向用户显示错误消息。因此，如果代码假定某特定类型是所需消息的唯一可能目标，那么使用该特定类型的对象会更简单。\n\
  \n另一方面，在许多情况下，你可能希望编写适用于通用类型的代码。此外，一些库对象会返回 `id` 类型。在这些情况下，必须使用 `id` 而不是明确定义的类型。\n\
  \n## 创建新对象\n\n创建新对象是一个两步过程。第一步是向所需的类发送请求新对象的消息。这是通过 `alloc` 消息完成的，它为对象分配足够的空间并返回一个指向它的指针。\n\
  \n第二步包括初始化新创建的对象。这是由实例方法执行的任务。存在一个名为 `init` 的标准方法，任何继承自 `NSObject` 的类都会继承该方法。对象也可以定义自己的\
  \ `init` 方法。更复杂的对象也可以通过专门用途的方法进行初始化，例如在需要额外参数时。\n\n> **注意**\n> 请记住，Objective-C 中的类也是对象。一旦定义了一个新类（你将在下一节中看到），编译器会自动创建一个代表该类的运行时对象。就像任何其他对象一样，类可以有自己的方法。此外，这些方法可以独立于该类的任何实例运行。\n\
  \n为了说明这一点，请考虑使用 `NSArray` 和 `NSNumber` 类创建数字数组的过程：\n\n```\nNSArray *createArray()\n\
  {\n    NSMutableArray *array = [[NSMutableArray alloc] init];\n    for (int i=0;\
  \ i<3; ++i)\n    {\n        NSNumber *number = [[NSNumber alloc] initWithInt: i+1];\n\
  \        [array addObject:number];\n    }\n    return array;\n}\n```\n\n在这个例子中，首先通过向\
  \ `NSMutableArray` 类发送 `alloc` 消息来创建一个可变数组。然后，通过发送 `init` 消息要求对象初始化自身。虽然你想要返回一个\
  \ `NSArray` 对象，但你创建了一个 `NSMutableArray`，因为它允许你根据需要添加元素。多态性允许你将 `NSMutableArray`\
  \ 当作 `NSArray` 来使用。在循环内部，你为 1 到 3 之间的每个值创建一个 `NSNumber` 对象。你首先向该类发送 `alloc` 消息，然后使用\
  \ `initWithInt`，这是 `NSNumber` 类的专用初始化方法。它接收一个整数，该整数随后成为 `NSNumber` 存储的值。\n\n## 定义新类\n\
  \n通过创建一对元素来定义一个类：接口和实现。接口通常放在一个单独的头文件中，用于向用户定义类的内容。然后该接口可供应用程序的其他模块使用。\n\n根据该接口定义，其他类将收到关于哪些消息可以发送给特定对象的详细描述。例如：\n\
  \n```\n@interface Employee : NSObject\n{\n   // 此处列出变量（如果有）\n}\n// 消息列表\n@end\n\n\
  @implementation Employee\n// 消息实现列表\n@end\n```\n\n> **注意**\n> 在苹果相关平台上编程时，应始终使用\
  \ `NSObject` 作为超类。这在定义新类时并非强制要求，因为可以创建独立于 `NSObject` 的类。例如，你可能希望使用不同的语义定义自己的对象层次结构。然而，在实践中，你总是希望使用\
  \ `NSObject` 提供的通用方法，它被设计为系统中所有对象的公共基石。\n\n`@interface` 关键字用于引入一个接口。该关键字后跟类名，并且可以选择性地加上一个冒号和对象所使用的超类名称（如果有的话）。\n\
  \n`@implementation` 关键字用于开始类的定义。它作为 `.m`（消息）文件的一部分使用，并包含对象响应的每条消息的定义。\n\n> **注意**\n\
  > Objective-C 使用的保留字都以 `@` 字符为前缀，这在 C 的语法中是不使用的。这种做法避免了与现有 C 代码可能发生的冲突。这对于将现有 C\
  \ 代码集成到 Objective-C 中的程序员来说是一种便利。例如，`@class` 是一个关键字，因此仍然可以使用名称 “class”，它是 C 应用程序中的合法名称。通过这样做，Objective-C\
  \ 避免了将代码从 C 移植到 C++ 时存在的一个常见问题。每当 Objective-C 使用不带 `@` 字符的关键字时，这些关键字仅限于少数上下文，因此不会与应用程序定义的名称发生冲突。\n\
  \n在接下来的几节中，你将了解如何向类定义中添加实例变量和实例方法。\n\n\n\n## 实例变量  \n\n实例变量用于存储特定对象的数据。成员变量的定义特征是它们为特定类的每个对象而定义。从这个意义上说，它们类似于纯\
  \ C 结构体中存储的数据。另一方面，实例变量在类的实现内部是可访问的。  \n\n例如，一个 `Employee` 类会为该类的每个对象存储数据。一个 `Employee`\
  \ 对象通常会有诸如年龄、薪水和地址之类的实例变量。这些实例变量会以如下方式表示：  \n\n```\n@interface Employee : NSObject\n\
  {\n   int salary;\n   NSString *address;\n   int age;\n}\n@end\n```\n\n一旦在类的接口中声明了实例变量，它便可在实现中使用。例如，假设你声明一个名为\
  \ `incomeTax` 的新方法。  \n\n```\n@implementation Employee\n-(double) incomeTax:(double)taxBracket\n\
  {\n   return salary * taxBracket;\n}\n@end\n```\n\n实例变量可以被指定为 public 或 private，从而限制其他类的访问权限。私有变量只能被同一类的方法使用，而公有变量则可以被任何使用该类对象的代码访问。这种机制使得应用程序开发者可以更改类的内部实现，同时减少对使用该类的其他代码所造成后果的担忧。\
  \  \n\n要将实例变量定义为私有，只需在变量定义之前使用关键字 `@private`。类似地，可以通过使用 `@public` 关键字使变量成为公有。如果你希望某个实例变量可被该类及其子类访问，请使用\
  \ `@protected` 关键字。默认情况下，实例变量是私有的；也就是说，它们仅对该类本身可用，而不能被其后代类使用。一旦使用了某个访问权限关键字，它将影响其后声明的所有变量，直到通过出现另一个关键字来更改访问级别。\
  \  \n\n还可以使实例变量仅在其定义的包中可用。为此，应使用关键字 `@protected`。其用法与标记私有变量和受保护变量的方式类似。  \n\n> **注意**\
  \  \n> 通常情况下，Objective-C 程序员不会大量使用公有或受保护的实例变量。由于其动态特性，Objective-C 中的类是通过其方法，并利用消息传递机制来使用的。这意味着直接访问变量的作用有限，在实践中应避免使用。\
  \  \n\n## 添加和定义实例方法  \n\n方法是定义类行为的主要机制。正是类中的方法集定义了对象可以直接响应的消息（对于派生类，这还包括其超类中的方法）。因此，面向对象编程的主要目标之一是只包含与你想向用户公开的功能直接相关的方法。\
  \  \n\n当对象接收到特定消息时，实例方法会定义对象实例的行为。例如，假设你想响应 `sayHello` 消息。可以按如下方式实现：  \n\n```\n\
  @interface SimpleObject : NSObject\n-(void) sayHello;\n@end\n\n@implementation SimpleObject\n\
  -(void) sayHello\n{\n   NSLog(@\"hello\");\n}\n@end\n```\n\n这个示例展示了一个通过其单一方法提供有限功能的类。要访问该方法，你可以创建一个\
  \ `SimpleObject` 类的对象，并发送 `sayHello` 消息。  \n\n```\nSimpleObject *object = [[SimpleObject\
  \ alloc] init];\n[object sayHello];\n```\n\n如前所述，方法使用分段语法进行声明，其中每个参数由一个描述其含义的词引出。方法\
  \ `sayHello` 没有任何参数，因此其名称后面没有冒号。另一方面，考虑下面所示的 `printText` 方法：  \n\n```\n@interface\
  \ SimpleObject2 : NSObject\n-(void) printText:(NSString *)message;\n-(void) printText:(NSString\
  \ *)message withSuffix:(NSString *)suffix;\n@end\n\n@implementation SimpleObject2\n\
  -(void) printText:(NSString *)message\n{\n        NSLog(@\"message is: %@\", message);\n\
  }\n\n-(void) printText:(NSString *)message withSuffix:(NSString *)suffix\n{\n  \
  \      NSLog(@\"message is: %@%@\", message, suffix);\n}\n@end\n```\n\n在这里，新类定义了一个能够响应\
  \ `printText` 消息的对象。当向此对象发送消息时，你需要在冒号分隔符后提供一个参数，如下所示：  \n\n```\nvoid printTextExample()\n\
  {\n        SimpleObject2 *obj = [[SimpleObject2 alloc] init];\n        [obj printText:@\"\
  My message\"];\n}\n```\n\n类似地，当需要两个或多个参数时，它们会在相应的冒号之后给出，该冒号用于分隔参数关键字和实际参数。以下是使用\
  \ `printText:withSuffix:` 消息的示例。  \n\n```\nvoid printTextAndSuffixExample()\n{\n\
  \        SimpleObject2 *obj = [[SimpleObject2 alloc] init];\n        [obj printText:@\"\
  My message\" withSuffix:@\"here\"];\n}\n```\n\n\n\n### 消息与函数的区别\n\n在 Objective-C\
  \ 中，向对象发送消息与调用函数之间存在细微差别。执行函数时，程序员和编译器都确切知道执行结果会调用哪些代码。例如，调用 `printf` 这类函数时，你清楚会执行一段定义明确的代码，将参数打印到日志中。同样，调用\
  \ `exp` 函数时，可以确定会调用数学库中计算指数的函数。\n\n然而，处理对象时，向对象发送消息并不能保证每次都会执行特定的代码段。当你向非自己创建的对象发送消息时尤为如此。这种差异与多态的概念有关。多态意味着任何对象都能以不同方式响应消息——以最适合其目标的方式。例如，`InkJetPrinter`\
  \ 对象对 `print` 消息的响应方式可能与 `LaserPrinter` 对象不同。然而，只有这些对象需要理解这些方法的实现有何不同。面向对象语言在发送消息的对象和接收消息的对象之间提供了这种分离层次。\n\
  \n考虑以下示例，其中创建了一个 `Employee` 类：\n\n```\n@interface Employee : NSObject\n{\n    //\
  \ 在此添加任何必要的变量\n}\n-(double) calculatePay;\n@end\n\n@implementation Employee\n-(double)\
  \ calculatePay\n{\n   return 0;\n}\n@end\n```\n\n你还有一个小时工类，代表按工作小时数支付薪酬的员工。\n\n\
  ```\n@interface HourlyEmployee : Employee\n{\n   int numWorkedHours;\n   double\
  \ hourlySalary;\n}\n@end\n\n@implementation HourlyEmployee\n-(double) calculatePay\n\
  {\n   return numWorkedHours * hourlySalary;\n}\n@end\n```\n\n最后，还有全职员工，其薪酬按年计算。\n\
  \n```\n@interface FullTimeEmployee : Employee\n{\n   double yearlySalary;\n}\n@end\n\
  \n@implementation FullTimeEmployee\n-(double) calculatePay\n{\n   return yearlySalary\
  \ / 12;\n}\n@end\n```\n\n从设计角度看，共有三个类：基类 `Employee` 以及两个派生类 `HourlyEmployee` 和 `FullTimeEmployee`。这些类都实现了\
  \ `calculatePay` 方法。但每个类中使用的实现方式各不相同。在第一个类中，只有一个基础实现，返回值为零，因为没有关于所描述的 `Employee`\
  \ 类型的信息。\n\n第二个类的实现依赖于 `numWorkedHours` 和 `hourlySalary` 这两个变量。这些信息用于计算需要支付给小时工的薪酬。第三个类也派生自\
  \ `Employee`，但该例中薪酬计算更简单，因为全职员工按月领取年薪。\n\n假设你按如下方式使用这些类：\n\n```\nvoid send_payment_message(Employee\
  \ *employee)\n{\n   double total = [employee calculatePay];\n   NSLog(@\"salary\
  \ total is %d\", total);\n}\n```\n\n在这种情况下，虽然传递给函数的值类型是 `Employee`，但你无法确定实际使用的是哪种\
  \ `Employee`：它可以是原始 `Employee` 类的对象，也可以是派生类之一。每种情况下，存储在 `total` 中的值都不同，导致计算依赖的信息也不同。这之所以可行，是因为\
  \ Objective-C 中的消息仅在运行时解析。\n\n### 多态消息\n\n当消息发送给对象时，运行时系统会确定哪个方法可用于响应特定消息。如果找到合适的方法，将用它来处理该消息。如果未找到匹配消息的方法，运行时系统将搜索其超类（父类）。如果在超类中也未找到，则此过程会继续，直到在某个超类中找到匹配消息的方法，或生成错误为止。\n\
  \n在上述示例中，对象通过继承与 `Employee` 类相关联。因此，编译器可以确保该特定消息存在有效实现。但情况并非总是如此，因为编译器的验证并非严格必要。为了能够发送编译时未知的消息，Objective-C\
  \ 允许向通用类型 `id` 的对象发送任何消息。例如，可以有以下函数：\n\n```\nvoid send_pay_message(id object)\n\
  {\n   double total = [object calculatePay];\n   NSLog(@\"salary total is %lf\",\
  \ total);\n}\n```\n\n这段代码与上述示例非常相似，但现在对象被声明为仅 `id` 类型，即可用于任何对象的通用类型，而不是固定的 `Employee`\
  \ 类型。在这种情况下，不执行编译时检查，但运行时系统仍会执行与之前相同的工作。唯一的区别是编译器无法保证消息在运行时能被正确发送。因此，程序员需要足够小心，仅向可能响应该消息的对象发送特定消息（在此例中，仅使用能响应\
  \ `calculatePay` 消息的对象）。\n\n### 特殊变量 `self`\n\n实现实例方法时，有必要访问存储在实例变量中的数据。这可以通过使用\
  \ `self` 变量来实现。在方法内部，`self` 是一个特殊变量，被设置为指向对象本身的指针。因此，它不仅可作为消息的目标，还可用于访问实例变量。例如，考虑以下定义：\n\
  \n```\n@interface Person : NSObject\n{\n    NSString *firstName;\n    NSString *lastName;\n\
  }\n- (void)setFirstName:(NSString *)firstName;\n- (void)setLastName:(NSString *)lastName;\n\
  - (void)printFullName;\n- (void)setFirstName:(NSString *)first lastName:(NSString*)last;\n\
  @end\n\n@implementation Person\n- (void)setFirstName:(NSString *)aFirstName\n{\n\
  \    self->firstName = aFirstName;\n}\n- (void)setLastName:(NSString *)aLastName\n\
  {\n    self->lastName = aLastName;\n}\n- (void)printFullName\n{\n    NSLog(@\"Full\
  \ name is %@ %@\", self->firstName, self->lastName);\n}\n- (void)setFirstName:(NSString\
  \ *)first lastName:(NSString*)last\n{\n   [self setFirstName:first];\n   [self setLastName:last];\n\
  }\n@end\n```\n\n注意此处你可以通过变量 `self` 访问 `firstName` 和 `lastName` 的值，该变量只是指向当前对象的指针。虽然这很有用，但需要注意的是，即使不使用\
  \ `self`，实例变量也可以在方法内部自由访问。例如，`setLastName` 方法也可以写成：\n\n```\n- (void)setLastName:(NSString\
  \ *)aLastName\n{\n    lastName = aLastName;\n}\n```\n\n在此处展示的类实现中，变量 `self` 的第二个用途是作为同一对象中其他消息的目标。由于经常需要调用同一对象中的方法，特殊变量\
  \ `self` 至关重要。没有对当前对象的引用，就无法发送可由自身类中其他方法响应的消息。\n\n\n\n## 定义类方法\n\n类方法与实例方法的不同之处在于，它是由发送给类名称的消息触发的，而不是发送给特定对象。因此，即使在创建该类的任何一个对象之前，也可以向类发送消息。这是执行对象创建和初始化的一种简单而有效的方式。例如，考虑以下使用\
  \ `NSString` 类的代码：\n\n```\nNSString *copyString(NSString *string)\n\n{\n\n     \
  \   NSString *copy = [NSString stringWithString:string];\n\n        return copy;\n\
  \n}\n```\n\n此函数的目标是复制原始字符串，返回一个指向具有相同文本内容的 `NSString` 类型新对象的指针。为此，你向 `NSString`\
  \ 类发送一条消息，要求它创建一个新的字符串对象，并使用作为参数传入的单个字符串进行初始化。请注意，结果是要求类执行所有这些任务：`NSString` 实例不负责最终结果。\n\
  \n让我们看一个例子，演示如何向类接口和实现添加一个名为 `performClassTask` 的新类方法。要定义类方法，使用的语法与实例方法定义几乎相同。唯一的区别在于，此类方法以加号（`+`）开头，而不是减号（`-`）。\n\
  \n```\n@interface MyClass : NSObject\n\n+ (void) performClassTask;\n\n@end\n\n@implementation\
  \ MyClass\n\n+ (void) performClassTask\n\n{\n\n   // 实现代码写在这里\n\n}\n\n@end\n```\n\
  \n实现类方法时的另一个区别是，它不能通过 `self` 关键字访问对象的实例变量。这在逻辑上是合理的，因为此类方法并非作为对象的一部分运行。类方法实际上是附着在类对象上的，在应用程序中，每个类只存在一个这样的类对象。在这种情况下，变量\
  \ `self` 指的是那个类对象。\n\n正如你在第一个示例中看到的，类方法是创建和初始化特定类的新实例的一种便捷方式。由于它们在类级别上操作，因此可以在对象存在之前被调用。因此，可以使用类方法来执行创建复杂对象所需的任意数量的前期步骤。\n\
  \n要查看类方法概念的多个示例，只需看看 Foundation 框架中一些最常见的类。例如，`NSString` 类有许多类方法，它们基于客户端提供的输入来创建和初始化一个新字符串。以下是一个示例代码，它基于一个现有的指向字符的指针来创建一个新字符串：\n\
  \n```\nNSString *stringFromCArray(const char *text)\n\n{\n\n        return [NSString\
  \ stringWithUTF8String:text];\n\n}\n```\n\n如你所见，消息是直接发送给 `NSString` 类的。然后，类方法负责分配一个新对象，并使用所提供的指针正确地初始化它。这个例子还展示了如何转换以\
  \ C 语言编写的遗留代码中存储的文本。由于 C 语言没有对象，字符串被表示为由空字符（零值）结尾的简单字符数组。虽然这是一种表示字符串的快速方式，但它也难以操作，并且需要手动维护字符串使用的内存。相比之下，`NSString`\
  \ 对象用起来要容易得多，并且可以以类似于系统中其他对象的方式更新。\n\n## init 方法\n\n`init` 方法在类的其他方法中执行一个重要功能。它是在对象创建之后立即调用的方法，位于两步的\
  \ `alloc`/`init` 配对中。`init` 方法在 `NSObject` 类中声明，但在新类中经常需要重写其定义。\n\n你可能想要重新定义 `init`\
  \ 方法的原因之一是为对象中的一个或多个实例变量提供自定义的初始化。默认情况下，实例变量如果是数字，则被初始化为零；如果是对象，则被初始化为 `nil`（指针的空值）。另一方面，可能有必要或希望将实例变量初始化为对类来说更合理的其他值。\n\
  \n例如，假设你有一个代表 `Cash`（现金）的类。这个类仅有的两个实例变量是 `quantity`（数量）和 `currency`（货币）。对于 `quantity`\
  \ 来说，默认值为零是可以的。然而，对于 `currency`，你希望默认值是 USD。以下是实现方法：\n\n```\n@interface Cash : NSObject\
  \ {\n\n        double quantity;\n\n        NSString *currency;\n\n}\n\n@end\n\n\
  @implementation Cash\n\n- (id)init {\n\n    self = [super init];\n\n    if (self)\
  \ {\n\n        currency = @\"USD\";\n\n    }\n\n    return self;\n\n}\n\n@end\n\
  ```\n\n首先，你定义了类的接口，其中声明了两个实例变量。请注意，不必在类接口中将 `init` 添加为一个方法：`init` 已经通过继承成为了接口的一部分，因为\
  \ `NSObject` 是其父类。\n\n接下来，你在 `@implementation` 部分为 `init` 方法提供了一个实现。该实现必须遵循此处展示的类似结构，以满足类使用者的期望。因此，第一个操作需要通过特殊变量\
  \ `super` 调用父类中的 `init` 函数。其次，你检查 `self` 是否指向一个有效的对象，如果是肯定的情况，则将其变量 `currency` 初始化为值\
  \ `@\"USD\"`。\n\n任何需要定义初始化方法的类都需要遵循相同的过程。你也可以声明接受参数的初始化方法。例如，一个接收货币名称作为参数的 `init`\
  \ 方法可以编码如下：\n\n```\n- (id)initWithCurrency:(NSString*)aCurrency {\n\n    self =\
  \ [super init];\n\n    if (self) {\n\n        currency = [NSString stringWithString:aCurrency];\n\
  \n    }\n\n    return self;\n\n}\n```\n\n在这种情况下，你仍然会调用父类中的 `init` 方法，但现在使用参数 `aCurrency`\
  \ 来初始化 `currency` 实例变量。\n\n## 定义属性\n\n实例变量用于存储与对象关联的数据。实例方法用于实现特定类对象所提供的功能。这两个元素结合在一起，足以实现面向对象编程的所有主要优势。然而，在某些情况下，结合方法和变量一起使用会很有帮助。这就是将属性引入该语言的原因。\n\
  \n属性是一种语法，用于简化创建设置和获取与对象关联的特定值的方法。虽然属性在使用上与实例变量类似，但它不需要与任何特定变量关联。属性是为需要被应用程序妥善处理的数据提供访问的一种实用方式。\n\
  \n例如，考虑某些数据在应用程序的两个或多个区域中使用的情况。因此，每次数据更改时，最好触发一个更新机制。在这种情况下，可以使用属性为数据访问提供简单的接口。\n\
  \n```\n@interface Person : NSObject\n\n{\n\n        NSString *name_;\n\n}\n\n@property(readwrite,retain,nonatomic)\
  \ NSString *name;\n\n@end\n\n@implementation Person\n\n-(void) setName:(NSString*)aName\n\
  \n{\n\n        name_ = aName;\n\n        // 通知 UI 名称已更改\n\n}\n\n-(NSString *)name\n\
  \n{\n\n        return name_;\n\n}\n\n@end\n```\n\n在这个例子中，你有一个 `Person` 对象，它包含一个\
  \ `name` 属性（我稍后会解释括号中的属性）。与该属性关联的有两个方法：第一个方法用于设置属性，第二个方法返回当前存储的值。为了存储属性的内容，类 `Person`\
  \ 使用了一个名为 `name_` 的实例变量。\n\n\n\n## 使用属性\n\n一旦这些定义准备就绪，你就可以在代码中使用该属性，如下所示：\n\n```\n\
  -(void)useProperty:(NSString*) newName\n{\n   Person *myPerson = [[Person alloc]\
  \ init];\n   myPerson.name = @\"new property value\";\n}\n```\n\n请注意，这段代码是如何将属性当作结构体中的字段来使用的。这是一种特殊的语法，只适用于属性，因为\
  \ `myPerson` 是一个指针，而指针没有数据成员（因为它们不是结构体）。实际上，这种语法的作用是调用 `Person` 类中的 setter 方法。每当这种情况发生时，`setName:`\
  \ 方法中的代码就会执行必要的操作来更新用户界面（UI）。\n\n当然，你也可以通过直接调用方法来实现同样的效果，如下所示：\n\n```\n-(void)usePropertyAgain:(NSString*)\
  \ newName\n{\n   Person *myPerson = [[Person alloc] init];\n   [myPerson setName:\
  \ @\"new property value\"];\n}\n```\n\n类似地，对该属性执行读取访问将会调用 getter 方法。\n\n```\n-(void)readProperty:(NSString*)\
  \ newName\n{\n   Person *myPerson = [[Person alloc] init];\n   myPerson.name = @\"\
  new property value\";\n   NSLog(@\"The name is now: %@\", myPerson.name);\n}\n```\n\
  \n### 合成属性\n\n总的来说，属性是简化类中暴露功能接口的一种绝佳方式。当属性的变更会导致应用程序其他部分也发生变更时，这一点尤为明显。当某个特定数据是根据存储在对象中的变量计算得出时，也可以使用属性机制。例如，你可以创建一个名为\
  \ `temperatureInCelsius` 的属性，它与名为 `temperatureInFahrenheit` 的属性共享相同的数据。唯一的区别在于，getter\
  \ 和 setter 方法负责在这两种表示之间进行转换。\n\n如果你所做的只是在实例变量中存储和检索数据，那么属性的实现可以简化。在这种情况下，Objective-C\
  \ 提供了一种默认机制，可用于自动创建 getter 和 setter 方法。因此，上述属性的实现可以简化为以下形式：\n\n```\n@implementation\
  \ Person\n@synthesize name = name_;\n@end\n```\n\n在这里，你不需要直接实现任何 getter 或 setter\
  \ 方法。编译器会自动完成这项工作，而你只需要提供实例变量的名称（在这个例子中，变量名为 `name_`）。\n\n```\n@interface Person\
  \ : NSObject {\n        NSString *name_;\n}\n@property(readwrite,retain,nonatomic)\
  \ NSString *name;\n@end\n\n@implementation Person\n@synthesize name = name_;\n@end\n\
  ```\n\n最后，Objective-C 提供了一种更简单的实现属性的方式。通过将实例变量完全交由编译器定义即可实现。在这种情况下，前面的例子可以修改为：\n\
  \n```\n@interface Person : NSObject\n@property(readwrite,retain,nonatomic) NSString\
  \ *name;\n@end\n\n@implementation Person\n- (void) useName\n{\n        NSLog(@\"\
  name is %@\", self.name);\n}\n@end\n```\n\n这样，即使没有使用 `@synthesize` 分配任何实例变量，`useName`\
  \ 方法也能访问该属性并打印其值。在这种情况下，相应的实例变量会被自动生成，默认情况下，该变量使用与属性相同的名称，并在名称前加上一条下划线。\n\n### 属性特性\n\
  \n如上所示，属性具有许多特性，这些特性描述了在 `@implementation` 部分中属性将如何被合成或定义。以下是属性一些最常见特性的列表：\n\n*\
  \   **readwrite**：此特性用于标识可被客户端代码读取和修改的属性。也就是说，其他对象可以使用 `对象.属性` 的表示法来读取和设置相应的属性（这是默认特性）。\n\
  *   **readonly**：此特性可用于标记一个不可修改的属性。当你只想提供对对象中包含的特定数据的访问权限，同时又不想允许修改其值时，此特性很有用。例如，某个属性的值可能由其他实例变量合成而来——这意味着你不希望允许对其独立修改。\n\
  *   **atomic**：此特性在处理多线程代码时很有用。它表示由此属性定义的操作一旦开始就不能被中断。例如，多个线程将需要在单个事务中读写值。请注意，如果不需要原子操作，此选项可能会导致不必要的开销，但它也是默认的赋值方式。\n\
  *   **nonatomic**：与上述特性相反，它表示操作可以被中断。在编写不需要原子操作的单线程应用程序时很有用。\n*   **getter**：此特性可用于为\
  \ getter 方法自定义名称。例如，你可能希望使用一个已经定义好的方法。编译器会将所有使用 `对象.属性` 表示法的读取访问路由到此方法。正确的语法是 `getter=方法名`。\n\
  *   **setter**：此特性可用于为 setter 方法自定义名称。该特性的用法与上述 `getter` 类似。正确的语法是 `setter=方法名`。\n\
  *   **copy**：setter 方法会存储传递给它的参数对象的副本，而不是对象本身。这可以用来避免对现有对象的额外引用，并将对副本的修改与原始对象隔离开来。\n\
  *   **retain**：使用此选项时，数据会被保留以进行内存管理。该属性中之前存储的任何其他对象都将被释放。\n*   **assign**：此特性表示传递给\
  \ setter 方法的参数数据将被直接赋值给属性所使用的变量。\n\n**注意**\n\n上述部分选项涉及对象管理内存的方式。如果你不理解这些内存管理策略之间的区别，无需担心：我将在第\
  \ 8 章中详细讨论这些实现技术。目前，只需记住可以使用不同的特性来决定属性 setter 如何存储和释放数据即可。\n\n\n\n## 类与文件结构\n\n\
  Objective-C 使用两种主要的源代码文件：头文件和模块实现文件。头文件用于包含类的接口部分。其他元素，如常量和辅助类型定义，也可以包含在头文件中。\n\n\
  第二种类型的文件是模块定义，以 `.m` 扩展名保存。模块定义包含了类的大部分实现内容。它不仅包含实现部分，还包含模块所需的任何其他函数和类型定义。\n\n头文件对于提供类的公共接口是必需的。项目中的其他模块将通过其公共接口访问该类。因此，它们需要访问定义此接口的头文件。\n\
  \n有两种方式可以访问头文件中的定义。首先，是传统的 C 风格包含。例如，要以 C 风格包含标准 I/O 库，可以使用：\n\n```\n#include <stdio.h>\n\
  ```\n\n这对于包含应用程序中传统和遗留代码所需的定义是必要的。然而，Objective-C 提供了第二种包含头文件的方法。这种第二种风格用于简化接口的创建。你可以使用\
  \ `import` 指令来包含此类接口，如下所示：\n\n```\n#import <Foundation/NSObject.h>\n```\n\n这将导入\
  \ Foundation 框架中包含的 `NSObject.h` 头文件。将类组织到框架中是很常见的，而 `FrameworkName/ObjectName.h`\
  \ 这种表示法是记住对象可能所在位置的简便方法。\n\n以下是一个完整示例，展示了一个简单类的头文件和实现文件可能是什么样的。首先，一个 `Loan` 类的头文件，其中表示贷款的常见属性，如\
  \ `principal` 和 `interest`。\n\n```\n// 文件 Loan.h\n\n@interface Loan : NSObject\n\
  {\n    double principal;\n    double interest;\n}\n\n- (double)getMonthlyPayment;\n\
  \n@end\n```\n\n这是相应的方法实现文件：\n\n```\n// 文件 Loan.m\n\n#import \"Loan.h\"\n\n@implementation\
  \ Loan\n\n- (double)getMonthlyPayment\n{\n    return principal * (interest/12);\n\
  }\n\n@end\n```\n\n一旦你将类的代码拆分为这两个文件，头文件 `Loan.h` 就是唯一需要提供给其他对象的部分。这意味着对实现文件 `Loan.m`\
  \ 的修改不会影响系统中其他类的编译方式，除非接口以某种方式发生了更改。\n\n使用这种将接口与实现分离的方法，你可以做到的一件很棒的事情是，以独立于接口的方式更新实现。例如，你可以决定改变\
  \ `getMonthlyPayment` 的实现方式。假设，你希望将利息计算放在一个单独的方法中，而不是像现在这样使用内联表达式。这将产生以下实现文件：\n\n\
  ```\n// Loan.m\n\n#import \"Loan.h\"\n\n@implementation Loan\n\n- (double) interestPerMonth\n\
  {\n    return interest/12;\n}\n\n// 更新后的月供计算\n// 使用了新的 interestPerMonth 方法。\n- (double)\
  \ getMonthlyPayment\n{\n    double monthlyInterest = [self interestPerMonth];\n\
  \    return principal * monthlyInterest;\n}\n\n@end\n```\n\n注意新的计算是如何使用另一个名为 `interestPerMonth`\
  \ 的方法的。虽然结果仍然相同，但这种更改带来的新组织方式允许未来进行其他更改。例如，根据借款人的财务评分，你可能需要使用更复杂的技术来计算月利息。现在这是可行的，因为利息的计算已经从月供的计算中分离出来了。\n\
  \n这个示例的另一个方面值得注意：如果某个方法仅在实现内部使用，则无需将其添加到接口中。这是一个重要的事实，因为它有助于减少 `@interface` 部分的条目数量。只有其他类可访问的方法才需要包含在接口部分，而本地使用的方法只需出现在实现部分。只要你在第一次使用某个方法之前添加它，这就足够了。在后面的章节中，你将看到将内部方法添加到现有实现中的更通用方式。\n\
  \n## 总结\n\n类提供了面向对象编程的基本构建块。由于 OOP 是 Objective-C 的主要关注点，因此理解类的概念非常重要。在本章中，我介绍了在\
  \ Objective-C 中创建和操作类所需的一切知识。\n\n首先，你看到了 OOP 如何成为软件开发的重要工具。OOP 的概念（如封装、多态和继承）通过允许在项目的设计和开发阶段提供适当的抽象级别，为现代软件的设计奠定了基础。OOP\
  \ 在过去 30 年中一直被使用，而 Objective-C 是一种完全拥抱 OOP 社区所提出概念的语言。\n\n你学习了如何使用 `@interface`\
  \ 和 `@implementation` 部分在 Objective-C 中定义新类。类的语法允许将这些定义拆分为公共头文件和私有实现文件。\n\n你还了解了如何定义提供任何对象完整功能所需的接口变量和方法。实例方法可以访问在类中声明的实例变量。它们还可以通过使用\
  \ `self` 变量访问同一类中的其他方法。\n\n最后，你学习了属性，这是一种简化对对象进行数据设置和读取过程的有效方式。属性非常灵活，为类的编写者提供了多种与实例变量交互以及拦截对这些属性的更改和访问的方式。例如，你可以通过使用\
  \ `@synthesize` 关键字来提供此功能。\n\n通过在本章中获得的关于类和对象的基本理解，你已经准备好深入探索 Objective-C 框架提供的对象了。你将在下一章开始这一探索，该章将讨论字符串和容器。\n\
  \n\n\n"
- "# 3. 字符串与容器类\n\n## 摘要\n\n在本章中，我将讨论 Foundation 框架中一些最常用的类。具体来说，我会介绍用于操作 Objective-C\
  \ 中所有字符序列的 `NSString` 类。`NSString` 提供了便捷的接口来创建字符串、获取字符串的一部分、比较字符串值以及将其转换为其他格式。\n\
  \nFoundation 框架中的另一个重要类是 `NSNumber`。数字是计算机编程中最基本的概念之一，通常由 C 语言作为原生数据类型来处理。然而，有时需要将数字传递给其他对象或由其他对象存储。在这种情况下，像\
  \ `NSNumber` 这样的包装类是简化 C 语言与 Objective-C 世界之间转换的最佳方式。\n\n我还将讨论 Objective-C 提供的两种主要集合类型。`NSArray`\
  \ 是一个用于对象序列的简单类接口。借助 `NSArray` 对象，您可以高效地按简单序列存储和检索元素。\n\n`NSDictionary` 是一个提供存储键/值对通用服务的类。每个键在字典中都有一个唯一的值，以便能够高效地检索。`NSDictionary`\
  \ 为程序员提供了一套丰富的消息，可用于查询、检索和处理存储在这种字典容器中的对象。\n\n## 字符串\n\n字符串是一个字符序列。`NSString` 类提供了创建和修改字符串所需的全部功能，并且被广泛应用于\
  \ Cocoa 及相关框架中。字符串不仅用于消息传递，当您需要以二进制形式内部表示的组件（例如整数、浮点数或对象）的文本表示时，也会用到它。\n\n### 创建字符串\n\
  \n要创建字符串，您需要使用作为 Foundation 框架一部分的 `NSString` 类。要创建一个空字符串，只需向 `NSString` 类发送一条 `alloc`\
  \ 消息，然后发送一条 `init` 消息来正确初始化该类的成员。\n\n```\n- (void)createString\n{\n        NSString\
  \ *myStr = [[NSString alloc] initWithCString:\"my original string\"\n          \
  \                                  encoding:NSASCIIStringEncoding];\n        NSLog(@\"\
  the string is %@\", myStr);\n}\n```\n\n在此函数中，您首先要做的是向 `NSString` 发送 `alloc` 消息，就像您对任何\
  \ Objective-C 类所做的那样。然后，向分配好的对象发送 `initWithCString:encoding:` 消息。该方法的第一个参数是一个用单引号括起来的\
  \ C 字符串。第二个参数是字符的编码类型。最常见的选项是示例中显示的 ASCII 编码，但还有其他几个选项可用。\n\n当然，仅仅为了创建一个字符串而完成所有这些步骤会显得很繁琐。这就是为什么还有一个更简单的选项——从第一章开始您就一直在使用它：在双引号字符串的开头加上字符\
  \ `@`，就可以告诉编译器创建一个采用标准编码的新 `NSString` 对象。编译器负责为生成的对象调用 `alloc` 和相应版本的 `init` 方法。这极大地减少了工作量，同时也体现了编译器在处理\
  \ Objective-C 代码时为您完成了大量工作。\n\n### NSString 方法\n\n`NSString` 提供了丰富的文本操作接口。有些方法可用于访问单个字符或一系列字符。有些方法可用于比较不同的字符串，而另一些方法则可返回有关前缀和后缀的信息。\n\
  \n`length` 方法用于返回字符串中的字符数。例如，您可以用以下方式重写上面的函数，以便显示传递给构造函数的字符串的大小：\n\n```\n- (void)createString\n\
  {\nNSString *myStr = [[NSString alloc] initWithCString:\"my original string\"\n\
  encoding:NSASCIIStringEncoding];\nNSLog(@\"the length of the string is %d\", [myStr\
  \ length]);\n// 输出：the length of the string is 18\n}\n```\n\n方法 `characterAtIndex:`\
  \ 返回位于给定索引位置的单个字符。请记住，与普通的 C 数组一样，`NSString` 对象使用从零开始的索引。也就是说，索引 1 用于第二个元素，依此类推。以下函数将始终返回\
  \ `YES`：\n\n```\n- (BOOL) compareString\n{\nNSString *myStr = [[NSString alloc]\
  \ initWithCString:\"my original string\"\nencoding:NSASCIIStringEncoding];\nreturn\
  \ [myStr characterAtIndex:4] == 'r';\n}\n```\n\n如果两个字符串具有相同的字符，以下函数将返回 `YES`：\n\n\
  ```\n- (BOOL) stringsEqual:(NSString *) :(NSString *)b\n{\nNSUInteger n1 = [a length];\n\
  NSUInteger n2 = [b length];\nif (n1 != n2)\n{\nreturn NO;\n}\nfor (int i=0; i<n1;\
  \ ++i)\n{\nif ([a characterAtIndex:i] != [b characterAtIndex:i])\n{\nreturn NO;\n\
  }\n}\nreturn YES;\n}\n```\n\n> **注意：** `NSUInteger` 是 Objective-C 库定义的一种类型，用于表示无符号整数。它通常等同于\
  \ `unsigned int`，但被保留为一种单独的类型，以方便将 Objective-C 代码移植到其他平台。由于不能保证 `unsigned int` 在所有平台上都具有相同的大小，因此使用\
  \ `NSUInteger` 来实现一致性是一个好主意，尤其是在编写与内存大小（如字符串长度）相关的代码时。\n\n虽然可以在比较两个字符串时使用 `characterAtIndex:`，就像你在前面的示例中所做的那样，但更便捷的方式是使用实例方法\
  \ `compare:` 来完成这项任务。使用 `compare:` 时，返回值类型为 `NSComparisonResult`，其可能值有三种。`NSOrderedAscending`\
  \ 表示原始字符串在字典顺序上位于参数字符串之前。结果为 `NSOrderedSame` 表示两个字符串相同。另一种结果为 `NSOrderedDescending`。以下是一个示例：\n\
  \n```\n- (void) compareString:(NSString *)a with:(NSString *)b\n{\nNSComparisonResult\
  \ res = [a compare:b];\nif (res == NSOrderedAscending)\n{\nNSLog(@\"字符串 %@ 在 %@\
  \ 之前\", a, b);\n}\nelse if (res == NSOrderedDescending)\n{\nNSLog(@\"字符串 %@ 在 %@\
  \ 之前\", b, a);\n}\nelse\n{\nNSLog(@\"这两个字符串相同\");\n}\n}\n```\n\n最后，如果您只关心简单的相等性测试（也就是说，您不关心两个字符串在字典顺序上是升序还是降序），那么还有一种更快捷的方式。方法\
  \ `isEqualToString:` 将另一个字符串作为参数，并根据两个字符串中所有对应字符是否相等来返回 `YES` 或 `NO`。\n\n上述同类测试也可以使用不区分大小写的比较来执行。例如，`NSString`\
  \ 有一个名为 `caseInsensitiveCompare:` 的方法，其行为与 `compare:` 类似，区别在于它认为诸如 `\"a\"` 和 `\"\
  A\"` 这样的字符是相同的。\n\n\n\n### 子字符串\n\n对`NSString`对象执行的另一种操作是检索字符序列的子集。这些方法根据字符在字符串中出现的位置提取当前字符串的一部分，并返回一个仅包含所需字符的新`NSString`对象。例如，要查找从字符串开头到指定索引的所有字符组成的子字符串，可以使用`substringToIndex:`方法。以下是示例代码：\n\
  \n```\n- (void) initialSubstring\n{\n    NSString *original = @\"Original string\"\
  ;\n    NSString *partial = [original substringToIndex:4];\n    NSLog(@\"The partial\
  \ string is %@\", partial);\n}\n```\n\n这段代码会将\"Orig\"（原始字符串的前四个字母）打印到日志屏幕。另一个用途类似的方法是`substringFromIndex:`。它可以应用于字符串，其返回值由从特定位置开始的字符串最后几个字符组成。例如，假设有一个函数用于检测单词是否为复数形式。一种简单的方法是检查给定字符串的后缀是否是\"\
  s\"。\n\n```\n- (BOOL) isPluralWord:(NSString *)word\n{\n    int length = (int)[word\
  \ length];\n    int initialPosition = length - 1;\n    if (initialPosition < 0)\n\
  \    {\n        return NO;\n    }\n    NSString *suffix = [word substringFromIndex:initialPosition];\n\
  \    return [suffix isEqualToString:@\"s\"];\n}\n```\n\n这段代码首先计算接收到的字符串的长度，然后从开头开始计算最后一个字符的位置。该位置为`length\
  \ - 1`，因为索引总是从零开始。如果得出的位置小于零，则说明字符串为空，返回`NO`。否则，确定单词的后缀并将其与\"s\"比较，以此判断该单词是否为复数形式。\n\
  \n使用这两种方法，你可以通过`substringToIndex:`和`substringFromIndex:`的组合选择给定字符串中的任意内部子字符串。不过，还有一个名为`substringWithRange:`的方法，它接受一个由两个位置组成的范围，并返回包含该范围内所有字符的子字符串。例如，假设你接收到一个带引号的字符串（即首尾字符都是引号的字符串）。你可以设计一个函数，使用`substringWithRange:`移除该字符串中的引号，返回`NSString`对象的内部部分。\n\
  \n```\n-(NSString *) removeQuotes:(NSString *)str\n{\n    int len = (int)[str length];\n\
  \    if (len < 2)\n    {\n        return @\"\";\n    }\n    NSRange range = NSMakeRange(1,\
  \ len-2);\n    return [str substringWithRange:range];\n}\n```\n\n在此示例中，首先计算作为参数传入的字符串的长度，然后检查字符串是否至少有两个字符（否则直接返回空字符串）。接着，创建一个从位置\
  \ 1 开始、长度等于原长度减 2 的范围。最后，返回由`substringWithRange:`计算出的子字符串。\n\n## NSNumber 类\n\n\
  在使用对象时，经常需要通过面向对象的接口来存储或获取数值。毕竟，Objective-C 的主要优势在于能够编写灵活的代码，在对象之间传递消息，而不是使用由函数和\
  \ C 运算符定义的固定接口。\n\n此外，虽然像整型和双精度浮点型这样的数值使用 C 函数很容易操作，但对象需要支持源自基本`NSObject`类的额外一系列操作。因此，Objective-C\
  \ 提供了一个专用类`NSNumber`，它可以用来存储任何标准 C 数值类型对应的数值。\n\n`NSNumber`是一个通用接口，可用于包装 C 语言中提供的任意原生数值类型。`NSNumber`能表示的数值类型包括整型（`int`）、长整型（`long\
  \ int`）、短整型（`short`）以及无符号整型（`unsigned int`）。非常小的数值在 C 中可以用字符表示，因此`NSNumber`也支持`char`类型。浮点型（`float`）和双精度浮点型（`double`）同样可以表示。最后，`NSNumber`还能包装布尔类型（`BOOL`）的值。\n\
  \n要创建`NSNumber`对象，只需调用`alloc/init`组合，其中`init`方法取决于要包装的数值类型。以下是一些示例：\n\n```\n- (void)\
  \ createNumbers\n{\n    int aInt = 1;\n    long aLong = 23456;\n    double aDouble\
  \ = 3.14;\n    BOOL aBool = YES;\n    char aChar = 'A';\n    // 以下是相应的 NSNumber\
  \ 对象\n    NSNumber *objInt = [[NSNumber alloc] initWithInt:aInt];\n    NSNumber\
  \ *objLong = [[NSNumber alloc] initWithLong:aLong];\n    NSNumber *objDouble = [[NSNumber\
  \ alloc] initWithDouble:aDouble];\n    NSNumber *objBool = [[NSNumber alloc] initWithBool:aBool];\n\
  \    NSNumber *objChar = [[NSNumber alloc] initWithChar:aChar];\n    NSLog(@\"Here\
  \ are the values: %@, %@, %@, %@, %@ \",\n              objInt, objLong, objDouble,\
  \ objBool, objChar);\n}\n```\n\n虽然这是创建此类数值对象的标准方式，但还有其他构造对象的方法。例如，可以使用类方法在一步内完成分配和初始化，从而简化操作。如下所示：\n\
  \n```\n- (void) createNumbers2\n{\n    int aInt = 1;\n    long aLong = 23456;\n\
  \    double aDouble = 3.14;\n    BOOL aBool = YES;\n    char aChar = 'A';\n    //\
  \ 以下是相应的 NSNumber 对象\n    NSNumber *objInt = [NSNumber numberWithInt:aInt];\n  \
  \  NSNumber *objLong = [NSNumber numberWithLong:aLong];\n    NSNumber *objDouble\
  \ = [NSNumber numberWithDouble:aDouble];\n    NSNumber *objBool = [NSNumber numberWithBool:aBool];\n\
  \    NSNumber *objChar = [NSNumber numberWithChar:aChar];\n    NSLog(@\"Here are\
  \ the values: %@, %@, %@, %@, %@ \",\n              objInt, objLong, objDouble,\
  \ objBool, objChar);\n}\n```\n\n如果你使用的是某个较新版本的 Xcode，那么你应该能够使用最新的数值字面量语法。新语法通过使用`@`字符作为指示符，表示紧随其后的字面量值需要转换为`NSNumber`对象。这个技巧适用于字面数值（或如上述示例中的变量），因此你可以将其应用于前面的示例进一步简化，如下所示：\n\
  \n```\n- (void) createNumbers3\n{\n    NSNumber *objInt = @1;\n    NSNumber *objLong\
  \ = @23456;\n    NSNumber *objDouble = @3.14;\n    NSNumber *objBool = @YES;\n \
  \   NSNumber *objChar = @'A';\n    // 将值作为对象打印\n    NSLog(@\"Here are the values:\
  \ %@, %@, %@, %@, %@ \",\n              objInt, objLong, objDouble, objBool, objChar);\n\
  }\n```\n\n\n\n### 访问 `NSNumber`\n\n`NSNumber` 的另一面是能够访问其存储的值。这可以通过一组方法来实现，这些方法提供了对\
  \ `NSNumber` 中可能存储的每种值的访问。例如，对于整数值，有 `integerValue` 方法；对于字符，有 `charValue` 方法。类似地，对于\
  \ `NSNumber` 直接支持的每种类型，都存在相应的访问方法。以下示例展示了如何访问 `NSNumber` 中存储的数据：\n\n```\n- (void)\
  \ accessNumberValue\n\n{\n        NSNumber *objInt = @1;\n        NSNumber *objLong\
  \ = @23456;\n        NSNumber *objDouble = @3.14;\n        NSNumber *objBool = @YES;\n\
  \        NSNumber *objChar = @'A';\n\n        // 以原生数据类型打印值\n        NSLog(@\"这里是具体数值：%d,\
  \ %ld, %lf, %d, %c \",\n                  (int)[objInt integerValue],\n        \
  \          [objLong longValue],\n                  [objDouble doubleValue],\n  \
  \                [objBool boolValue],\n                  [objChar charValue]);\n\
  }\n```\n\n> **注意：** 从 `NSNumber` 中检索数据并不能保证使用正确的格式。由于 `NSNumber` 内部存储的数据只是二进制格式的数字，访问器会尝试转换内部数据以适配请求的格式。这可能导致数据丢失。例如，存储一个\
  \ `long` 值，然后尝试以 `char` 格式访问它，会导致数据截断。不过，在访问 `NSNumber` 中存储的数据之前，你可以使用 `objCType`\
  \ 方法来确定其中包含的确切类型。\n\n### 何时使用 `NSNumber`？\n\n接下来要解决的问题是何时使用 `NSNumber`。尽管能够向对象发送消息而不是调用函数很方便，但这并非总是必需的。此外，每次使用对象替代原生类型时，都会带来性能开销。对象需要分配内存和消息传递，与编译器处理整数和布尔值等原生类型的高效方式相比，这些操作代价高昂。\n\
  \n因此，如果情况需要高性能，几乎没有理由使用对象替代原生类型。例如，进行频繁计算的数值算法更适合使用原生类型，这样可以充分利用 C 语言启用的所有优化功能。\n\
  \n另一方面，在某些情况下，你可能希望将数字视为对象。当你希望它们成为能够响应常见消息的某种集合的一部分时，就会发生这种情况。例如，假设你想创建一个对象数组。当数组被销毁时，这些对象都会收到一组特定的消息，例如\
  \ `deallocate`。为了使数字能够被添加到这样的数组中，必须能够将数字表示为对象。因此，不需要直接将数字添加到对象数组中，而是为数字创建对象包装器。\n\
  \n对象的集合是使用 `NSNumber` 类的一个主要原因。在接下来的几节中，你将看到容器类如何实现数组和字典的维护。\n\n> **注意：** 在使用 `NSNumber`\
  \ 对象之前，请考虑性能因素。如果你需要执行快速计算，请优先使用原生类型。然而，当你需要将数字视为对象时（例如，与仅接收对象的方法进行交互，或将数字添加到容器中时），`NSNumber`\
  \ 对象是必需的。\n\n## 容器\n\n当数据以对象形式存储时，能够将元素集合作为另一个对象来操作是非常有用的。Foundation 框架提供了一套容器类，使实现这一目标更加容易。Foundation\
  \ 框架提供的容器包括数组和字典，两者都有可变和不可变两种形式。在接下来的几节中，我将解释如何创建、更新、添加以及从这些容器中移除元素。\n\n\n\n## 数组\n\
  \n数组是存储在连续内存中的一组对象。正如你在第一章中所见，C 语言为原生数组提供了灵活高效的实现。然而，使用数组可能较为困难，特别是对于那些需要显式内存管理的动态数组。`NSArray`类应运而生，旨在为数组对象提供简单而强大的接口。借助`NSArray`，你可以通过消息传递机制对数组执行多种操作。\n\
  \n首先，考虑如何创建数组并向其中添加元素。创建数组最简单的方法是调用一对`alloc`/`init`方法。一旦数组对象被正确初始化，就可以通过向原始`NSArray`添加新元素来创建新数组。\n\
  \n```\n- (void) createSimpleArray\n{\nNSArray *a0 = [[NSArray alloc] init];\nNSArray\
  \ *a1 = [a0 arrayByAddingObject:@\"我的第一个对象\"];\nNSArray *a2 = [a1 arrayByAddingObject:@\"\
  我的第二个对象\"];\nNSLog(@\"数组大小为 %d\", (int)[a2 count]);\n}\n```\n\n函数`createSimpleArray`创建了一个包含两个字符串元素的数组，并将结果数组（命名为`a2`）的大小输出到系统日志。为此，你需要向`NSArray`实例发送`arrayByAddingObject`消息。此外，要获取数组中的元素数量，你需要向结果数组发送`count`消息。\n\
  \n虽然上述技术可用于向任何数组添加元素，但更简便的做法是在一步内同时添加两个元素。这可以通过使用`NSArray`类的一个特殊版本的`init`方法来实现，如下所示：\n\
  \n```\n- (void) createSimpleArray2\n{\nNSArray *array = [[NSArray alloc] initWithObjects:\n\
  @\"我的第一个对象\",\n@\"我的第二个对象\", nil];\nNSLog(@\"数组大小为 %d\", (int)[array count]);\n\
  }\n```\n\n虽然两个例子的结果相同，但函数`createSimpleArray2`使用了一个特殊版本的`init`方法。`initWithObjects:`方法能够接收一组对象作为参数。你只需注意一个细节：最后一个元素必须是`nil`，因为这是表示序列结束的哨兵值。然而，`nil`值不会被存储为数组的一部分。\n\
  \n对`initWithObjects:`实例方法的描述揭示了`NSArray`类的一个非常重要的特性：该类只接受非`nil`值作为数组成员。这意味着，在将`nil`元素存入`NSArray`（或任何其他容器）之前，必须将其转换为其他表示形式。为此，有一个名为`NSNull`的类，它将`nil`（或`NULL`）表示为单个对象。\n\
  \n通过`initWithObjects:`消息向数组添加元素是完成这项基本任务的简单方法。然而，在同一行中使用两条消息仍然有些繁琐。为简化这一常见工作流程，`NSArray`还提供了一个功能类似的类方法，即`arrayWithObjects:`方法。该方法的优点在于，你可以直接将元素序列传递给`NSArray`类，而无需先调用`alloc`。这省去了额外的方法调用，从而简化了代码。上述例子可以更简洁地表示为：\n\
  \n```\n- (void) createSimpleArray3\n{\nNSArray *array = [NSArray arrayWithObjects:\n\
  @\"我的第一个对象\",\n@\"我的第二个对象\", nil];\nNSLog(@\"数组大小为 %d\", (int)[array count]);\n\
  }\n```\n\n`arrayWithObjects:`或`initWithObjects:`方法可用于创建包含任意数量元素的数组。只要以`nil`结束元素列表，条目数量就没有限制。然而，有些情况下你可能只想创建一个只包含一个元素的数组。这可以通过`arrayWithObject:`或`initWithObject:`方法实现。它们与你之前看到的方法类似，区别在于它们只接受单个元素。\n\
  \n```\n- (void) createSimpleArray4\n{\nNSArray *array = [NSArray arrayWithObject:\n\
  @\"我的单一对象\"];\nNSLog(@\"数组大小为 %d\", (int)[array count]);\n}\n```\n\n在以数组创建为主题时，请注意还有其他版本的`init`和`arrayWith`方法可与`NSArray`一起使用。例如，你可以用另一个先前创建的数组来初始化一个`NSArray`。假设你想要复制上面构建的数组，可以按如下方式操作：\n\
  \n```\n- (void) createArrayAndCopy\n{\nNSArray *array = [NSArray arrayWithObjects:\n\
  @\"我的第一个对象\",\n@\"我的第二个对象\", nil];\nNSLog(@\"数组大小为 %d\", (int)[array count]);\n\
  NSArray *copy = [NSArray arrayWithArray:array];\nNSLog(@\"复制数组的大小也是 %d\", (int)[copy\
  \ count]);\n}\n```\n\n最后，你可能有兴趣从现有的 C 数组创建数组。`NSArray`也支持这一点，但你需要同时提供数组中的元素数量。这是必需的，因为\
  \ C 数组本质上等同于指针，因此它们不存储元素数量。\n\n```\n- (void) createArrayWithCArray\n{\nNSString\
  \ *orig_array[] = { @\"Obj1\", @\"Obj2\" };\nNSArray *array = [NSArray arrayWithObjects:orig_array\
  \ count:2];\nNSLog(@\"数组大小为 %d\", (int)[array count]);\n}\n```\n\n在此例的第一行，你创建了一个包含两个对象的\
  \ C 数组。第一行的声明意味着你正在创建一个由`NSString *`（字符串对象使用的类型）组成的数组（用`[]`表示）。花括号内的记法是 C 函数用于初始化相同元素数组的方式。接下来，你将数组名称（如第一章所述，它等同于指针）传递给`arrayWithObjects:count:`方法。\n\
  \n了解所有这些创建`NSArray`对象的方法很有用，因为数据可能以多种格式存在。如果仅仅为了使用`NSArray`而将所有这些不同的数据格式转换为单一格式，将会非常困难。而且，我们尚未穷尽所有转换可能性。例如，创建`NSArray`的其他方式包括直接从文件读取数据（参见`arrayWithContentsOfFile:`）或从\
  \ URL 读取数据（参见`arrayWithContentsOfURL:`）。\n\n\n\n### 向 `NSArray` 添加其他对象类型\n\n在目前看到的示例中，添加到\
  \ `NSArray` 的所有对象均为 `NSString` 类型。我这样做只是为了简单起见。实际上，`NSArray` 是一个动态容器，这意味着你可以向数组添加任何类型的对象。以下是一个实现示例：\n\
  \n```\n- (void) createArrayWithDiffferentObjects\n\n{\n\n        NSNumber *num1\
  \ = [NSNumber numberWithInt:42];\n\n        NSArray *array = [NSArray arrayWithObjects:num1,\
  \ @\"str2\", nil];\n\n        NSLog(@\"数组大小为 %d\", (int)[array count]);\n\n}\n```\n\
  \n第一个对象是 `NSNumber`，第二个是 `NSString`。它们现在同属一个数组。这种数组带来的唯一问题是如何根据元素类型来区分它们。这个问题的答案取决于你想对该数组成员执行什么操作。如果你只打算使用通用消息（如\
  \ `description`），那么混合不同类型的对象是没有问题的。\n\n然而，使用 `NSArray` 集合最安全的方式是根据类型创建集合。例如，如果你正在开发一个处理几何图形的应用程序，有些数组应该只包含图形。这正是继承在处理动态对象时的优势所在：一组几何图形可以拥有一个公共类，用于对不同的形状进行分类。\n\
  \n例如，`Oval` 或 `Rectangle` 这样的形状应该是通用 `Shape` 类的子类。使用这个超类，就可以将 `NSArray` 中的元素限制为派生自\
  \ `Shape` 的对象。这样，就可以发送 `Shape` 专用的、且能被所有子类理解的消息。\n\n如果你混合了没有超类关联的不同类型对象，则需要用其他方式来确定某个对象属于哪个特定类。虽然不推荐这样做，但确实有方法可以判断对象是否属于特定类。首先，每个对象都有一个名为\
  \ `class` 的实例方法，该方法返回类的表示。原则上，你可以将对象返回的类与特定类表示进行比较，如下所示：\n\n```\n- (void) checkPersonClass:(Person\
  \ *)person\n\n{\n\n        if ([person class] == [Employee class])\n\n        {\n\
  \n                NSLog(@\"这是一个 Employee\");\n\n        }\n\n        else\n\n  \
  \      {\n\n                NSLog(@\"这不是一个 Employee\");\n\n        }\n\n}\n```\n\
  \n虽然这种方法在某些情况下可能有效，但它也是一种危险的解决问题的方式。主要问题在于，检查特定类也会排除属于子类的对象。例如，如果你要查找类型为 `Shape`\
  \ 的对象，就会遗漏类型为 `Rectangle` 的对象。然而，`Rectangle` 也是一种 `Shape`，这类代码在这种情况下将无法正常工作。\n\n\
  为了避免这个问题，你可以使用 `NSObject` 的一个方法 `isSubclassOfClass:`。该方法能够测试给定类是否与指定类相同，或者为其子类。以下示例展示了如何测试某个对象是\
  \ `NSNumber` 还是 `NSNumber` 子类的实例：\n\n```\n- (void) checkClass2\n\n{\n\n        NSNumber\
  \ *num1 = [NSNumber numberWithInt:42];\n\n        // 检查该对象是否为 NSNumber 或其子类的实例\n\
  \n        if ([[num1 class] isSubclassOfClass: [NSNumber class]])\n\n        {\n\
  \n                NSLog(@\"这是一个 NSNumber\");\n\n        }\n\n        else\n\n  \
  \      {\n\n                NSLog(@\"这不是一个 NSNumber\");\n\n        }\n\n}\n```\n\
  \n调用 `class` 是为了获取对象的类。另一方面，`class` 也发送给 `NSNumber` 以获取该类的类对象。获取相同信息的另一种方法是使用 `isKindOfClass`\
  \ 方法，该方法衍生自 `NSObject`。\n\n### 使用字面量表示法\n\n如果你使用的是 Xcode 4.5 或更高版本，则应该能够使用 Apple\
  \ 编译器引入的新字面量表示法。传统的创建数组方式涉及使用 `alloc`/`init`，或前面讨论过的辅助类方法。虽然这些初始化技术运行良好，但与原生类型（如整数或原生数组）的初始化相比，它们仍然显得繁琐。\n\
  \n新的字面量表示法使初始化 `NSArray` 变得像初始化原生类型一样简单。新表示法不是向 `NSArray` 类发送消息，而是使用简单的语法来处理数组的创建过程。示例如下：\n\
  \n```\n- (void) createArrayWithNewSyntax\n\n{\n\n        NSArray *array = @[@\"\
  obj1\", @\"obj2\" ];\n\n        NSLog(@\"数组大小为 %d\", (int)[array count]);\n\n}\n\
  ```\n\n请注意，这个函数产生的结果与你在之前示例中看到的结果类似。然而，通过 `@[` 标记，编译器会自动创建一个 `NSArray`。无需发送消息来分配或初始化结果对象，因为这些操作将由生成的代码自动执行。\n\
  \n数组初始化新表示法的另一个优点是可以减少潜在错误。通过使用更简单的语法，更容易发现简单错误，例如重复对象或 `nil` 元素，而这些错误在使用原始表示法时可能会被引入。\n\
  \n另一方面，新语法并不能完全消除对 `NSArray` 初始化器的需求。一个例子是将现有的 C 数组用作 `NSArray` 的初始内容。在这种情况下，仍然需要使用\
  \ `arrayWithArray:` 形式，该形式允许传入一个基于 C 的数组及其大小。\n\n\n\n### 访问数组\n\n在大多数程序中，创建数组只是过程的开始。另一方面是访问存储在结果容器中的数据。`NSArray`\
  \ 通过 `objectAtIndex:` 方法提供了一种简单的数据访问方式。使用该方法，你可以传入要访问对象基于零的索引。考虑以下示例：\n\n```\n-\
  \ (void) accessArrayData\n{\n        NSArray *array = @[@\"obj1\", @\"obj2\" ];\n\
  \        NSLog(@\"数组的第二个元素是 %@\", [array objectAtIndex:1]);\n}\n```\n\n调用 `objectAtIndex:`\
  \ 的结果是存储在指定位置的对象。由于索引从零开始，请求索引 1 将返回第二个元素，这与 C 语言中本地数组的约定相同。\n\n虽然 `objectAtIndex:`\
  \ 足以提供对任何元素的访问，但还有其他方法可以实现这一目标。例如，如果你将数组用作简单队列（后进先出），你可能只对最后一个元素感兴趣。\n\n```\n- (void)\
  \ accessLastElement\n{\n        NSArray *array = @[@\"obj1\", @\"obj2\" ];\n   \
  \     NSLog(@\"数组的第二个元素是 %@\", [array lastObject]);\n}\n```\n\n因此上面的示例与前一个等效。访问数组元素的另一种方法是先将它们与其他现有对象进行比较。在这种情况下，你可能希望找到先前存储在数组中的对象的索引。使用\
  \ `indexOfObject:` 方法可以轻松实现这一点，如下所示：\n\n```\n- (void) getIndexOfElement\n{\n   \
  \     NSString *secondObj = @\"obj2\";\n        NSArray *array = @[@\"obj1\", secondObj,\
  \ @\"obj3\" ];\n        int position = (int)[array indexOfObject:secondObj];\n \
  \       NSLog(@\"第二个元素的索引是 %d\", position);\n}\n```\n\n在函数的第一行，你创建了一个 `NSString`\
  \ 类型的新对象。第二行创建了一个包含该对象的数组。第三行向数组发送消息，询问已知对象的位置，然后将其打印到日志中。\n\n最后，为 `NSArray` 和其他容器引入的新语法也提供了一种简化的元素访问方式。如果你有一个\
  \ `NSArray`，现在可以直接使用与本地数组相同的语法访问元素。\n\n```\n- (void) accessWithNewSyntax\n{\n  \
  \      NSArray *array = @[@\"obj1\", @\"obj2\" ];\n        NSLog(@\"数组的第二个元素是 %@\"\
  , array[1]);\n}\n```\n\n在幕后，编译器生成的代码与你之前看到的类似，会调用 `objectAtIndex:`。然而，这种语法使得你访问元素的方式更加直观，这对于代码维护是一个巨大的优势。\n\
  \n## 可变数组\n\n让初次接触 Objective-C 的程序员感到惊讶的一个问题是，标准的 `NSArray` 对象是不可修改的。一旦使用上一节中描述的某个\
  \ `init` 函数创建了对象，你唯一能做的就是访问数据，或者基于原始内容请求一个新数组。换句话说，`NSArray` 是一种不可变的数据结构。\n\n`NSArray`\
  \ 不可变的原因是此类对象针对快速访问进行了优化。对数组的更新操作，例如添加和删除元素，可能会产生新的内存分配和/或内存移动。鉴于 `NSArray` 的简单实现，这被认为是不理想的。然而，为了允许修改，`NSArray`\
  \ 被子类化为一种可修改的形式，即 `NSMutableArray` 类。\n\n我之前所说的关于 `NSArray` 的功能对于 `NSMutableArray`\
  \ 仍然适用。然而，后者还能够添加和删除元素，以及它学到的其他重要技巧。创建 `NSMutableArray` 与你创建 `NSArray` 的方式非常相似。\n\
  \n```\n- (void) createMutableArray\n{\n        NSMutableArray *array = [NSMutableArray\
  \ arrayWithObjects:\n                                                         @\"\
  我的第一个对象\",\n                                                         @\"我的第二个对象\"\
  , nil];\n        NSLog(@\"数组的第二个元素是 %@\", [array objectAtIndex:1]);\n}\n```\n\n\
  然而，一个 `NSMutableArray` 能够随时添加元素，而不仅仅是在创建时。因此，可以使用以下代码创建相同的可变数组：\n\n```\n- (void)\
  \ addElementsToArray\n{\n        NSMutableArray *array = [[NSMutableArray alloc]\
  \ init];\n        [array addObject: @\"我的第一个对象\"];\n        [array addObject: @\"\
  我的第二个对象\"];\n        NSLog(@\"数组的第二个元素是 %@\", [array objectAtIndex:1]);\n}\n```\n\
  \n在这样一个可变数组中，你可以执行的另一个操作是移除元素。例如，你可以通过提供所需对象的索引来移除任何元素。\n\n```\n- (void) addAndRemoveArrayElements\n\
  {\n        NSMutableArray *array = [[NSMutableArray alloc] init];\n        [array\
  \ addObject: @\"我的第一个对象\"];\n        [array addObject: @\"我的第二个对象\"];\n        NSLog(@\"\
  数组的第二个元素是 %@\", [array objectAtIndex:1]);\n        [array removeObjectAtIndex:1];\n\
  \        NSLog(@\"数组现在有 %d 个元素\", (int)[array count]);\n}\n```\n\n可变数组的另一个用途是作为简单的队列数据结构。队列是一种有用的数据存储机制，它使用先进先出策略。有大量算法受益于使用先进先出数据结构，包括语言解析器和模拟系统等。要使用\
  \ `NSMutableArray` 实现队列，你可以使用 `addObject:` 和 `removeLastObject` 方法。以下是在这种数据结构中入队和出队元素的方法：\n\
  \n```\n- (void) enqueue:(NSMutableArray *)array forId:(id) object\n{\n        [array\
  \ addObject: object];\n}\n\n- (id) dequeue:(NSMutableArray *)array\n{\n        id\
  \ element = [array lastObject];\n        [array removeLastObject];\n        return\
  \ element;\n}\n```\n\n\n\n## 字典\n\n字典是一种用于维护一组键与其对应值之间关系的数据结构。你可以将字典视为一个广义的数组，其中的键不仅可以为整数，还可以是任何类型的对象。因此，可以使用字典来维护一组相关对象，例如国家及其首都城市的列表：`(\"\
  加拿大\",\"渥太华\")`、`(\"法国\", \"巴黎\")`、`(\"美国\", \"华盛顿特区\")` 等。\n\n如果你了解 `NSArray` 的工作原理，那么对字典对象（称为\
  \ `NSDictionary`）的接口就不会感到陌生。`NSDictionary` 是一个不可变类；因此它只允许创建和数据检索操作。不可变性的原因与 `NSArray`\
  \ 的情况非常相似：出于性能和可维护性方面的考虑，我们希望避免改变底层数据结构。\n\n有几种初始化方法可以调用来创建新字典。例如，你可以使用 `initWithObjectsAndKeys:`，其中值和键以列表形式输入，并以\
  \ `nil` 结尾。请注意，提供错误数量的条目或忘记输入 `nil` 元素将导致错误。\n\n```\n- (void) createDictionary\n\
  {\n        NSDictionary *dict = [[NSDictionary alloc] initWithObjectsAndKeys:\n\
  \                                                  @\"first\", @\"one\", @\"second\"\
  ,\n                                                  @\"two\", @\"third\", @\"three\"\
  , nil];\n        NSLog(@\"字典中的元素数量为 %d\", (int)[dict count]);\n}\n```\n\n另一种实现相同目的的方法是使用值数组和键数组。在这种情况下，你需要确保两个数组的元素数量相同，否则程序运行时将引发运行时错误。\n\
  \n```\n- (void) createDictionaryFromArrays\n{\n        NSArray *values = [NSArray\
  \ arrayWithObjects:@\"first\", @\"second\", @\"third\", nil];\n        NSArray *keys\
  \ = [NSArray arrayWithObjects:@\"one\", @\"two\", @\"three\", nil];\n        NSDictionary\
  \ *dict = [[NSDictionary alloc] initWithObjects:values forKeys:keys];\n        NSLog(@\"\
  字典中的元素数量为 %d\", (int)[dict count]);\n}\n```\n\n虽然这是实现相同结果的更简单方法，但根据数据的可用性，还有其他创建方法可能更方便。例如，可以使用\
  \ `dictionaryWithContentsOfFile:` 从文件中存储的数据创建新的 `NSDictionary`，甚至可以使用 `dictionaryWithContentsOfURL:`\
  \ 方法从 URL 创建。\n\n最后，对于使用最新版本 Apple 编译器的用户，可以使用简单直观的表示法来初始化 `NSDictionary`，这与数组可用的表示法非常相似。示例如下：\n\
  \n```\n- (void) createDictionaryWithNewSyntax\n{\n        NSDictionary *dict = @{\
  \ @\"one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n   \
  \     NSLog(@\"字典中的元素数量为 %d\", (int)[dict count]);\n}\n```\n\n该语法使用 `@{` 序列来引入键/值对。结果类似于使用\
  \ `initWithObjectsAndKeys:` 方法，但键位于第一个位置。此外，键和值之间用冒号分隔。最后，序列末尾无需 `nil` 对象，而这在使用创建方法时是需要的。\n\
  \n### 访问字典元素\n\n创建字典后，可以使用 `NSDictionary` 类中的一些专门方法来访问其元素。检索元素的最简单方法是使用 `objectForKey:`\
  \ 方法。通过向字典发送此消息，将返回与给定键关联的值。如果所请求的键没有存储值，则返回值为 `nil`。\n\n```\n- (void) retriveDictionaryElement\n\
  {\n        NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\"\
  , @\"three\" : @\"third\" };\n        NSLog(@\"字典中的元素数量为 %d\", (int)[dict count]);\n\
  \        NSLog(@\"与 two 关联的元素是 %@\", [dict objectForKey:@\"two\"]);\n}\n```\n\n\
  另一种检索元素的方法是使用 `objectsForKeys:` 实例方法。该方法的优势在于可以同时返回多个项，这可以加快依赖于字典查找的操作。\n\n```\n\
  - (void) retrieveSetElementSet\n{\n        NSDictionary *dict = @{ @\"one\": @\"\
  first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n        NSArray *objects\
  \ = [dict objectsForKeys:@[@\"two\", @\"three\"]\n                            notFoundMarker:[NSNull\
  \ null]];\n        NSLog(@\"找到的对象数量为 %d\", (int)[objects count]);\n}\n```\n\n在调用\
  \ `objectsForKeys:` 时，第二个参数是 `notFoundMarker:`。其目的是提供一种方法来标识键数组中与字典中任何元素都不对应的元素。因此，传递的值应该是唯一的，并且在字典中不会被用到。一个可能的解决方案是使用\
  \ `NSNull` 类的空对象。\n\n#### 检索键\n\n访问 `NSDictionary` 中数据的另一种方法是检索容器中存储的所有键。当你想检查正在使用的键时，这可能会很有用。`NSDictionary`\
  \ 通过 `allKeys` 方法使此操作成为可能，该方法的结果是包含所有当前正在使用的键的数组。\n\n```\n- (void) retrieveKeys\n\
  {\n        NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\"\
  , @\"three\" : @\"third\" };\n        NSArray *keys = [dict allKeys];\n        NSLog(@\"\
  字典中的键数量为 %d\", (int)[keys count]);\n}\n```\n\n`allKeys` 方法是检索键的最简单方式，但并非唯一方式。`NSDictionary`\
  \ 类提供了一系列丰富的方法来访问键列表。例如，一个密切相关的方法是 `allKeysForObject:`，它返回一个数组，其中包含与作为参数传递的对象关联的所有键。当处理同一个对象可能为多个键存储的字典时，此消息非常有用。\n\
  \n一个例子是这样的应用：食品配料（键）可能与食谱（值）相关联。由于一个食谱有多种配料，在这种应用中，一个对象与多个键关联是很常见的。因此，要找出准备蛋糕所用的所有配料，你可能希望使用\
  \ `allKeysForObject:` 方法。\n\n```\n- (void) findIngredientsForCake:(NSDictionary\
  \ *)ingredientDictionary\n{\n        NSArray *ingredients = [ingredientDictionary\
  \ allKeysForObject:@\"cake\"];\n        NSUInteger size = [ingredients count];\n\
  \        NSLog(@\"蛋糕配料的数目为 %d\", (int)size);\n        for (int i=0; i<size; ++i)\n\
  \        {\n                NSLog(@\"蛋糕配料: %@\", [ingredients objectAtIndex:i]);\n\
  \        }\n}\n```\n\n类似地，你可能希望使用数组访问字典中的所有值。这可以通过 `allValues` 方法实现，其用法类似于 `allKeys`。显然，无需\
  \ `allValuesForObject`，因为每个键只有一个值。取而代之，你会找到我之前讨论过的 `objectsForKeys:notFoundMarker:`\
  \ 方法。\n\n\n\n#### 使用字典枚举器\n\n另一种访问对象和键的方法是使用 `NSEnumerator`。通过一个 `NSEnumerator`\
  \ 类型的对象，可以使用简单的 `for` 循环来检索序列，每次迭代请求一个元素。`NSEnumerator` 类提供了 `nextObject` 方法，该方法返回枚举器中的下一个对象。例如，要获取字典中所有对象的枚举器，可以向\
  \ `NSDictionary` 发送 `objectEnumerator` 消息，然后遍历生成的元素。以下是示例代码：\n\n```\n- (void) enumerateDictionaryObjects\n\
  {\n    NSDictionary *dict = @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"\
  three\" : @\"third\" };\n    NSEnumerator *objects = [dict objectEnumerator];\n\
  \    id obj;\n    while ((obj = [objects nextObject]))\n    {\n        NSLog(@\"\
  The dictionary contains object %@\", obj);\n    }\n}\n```\n\n这个例子展示了如何获取一个 `NSEnumerator`，用于访问\
  \ `NSDictionary` 中包含的每个对象。`while` 循环中的测试有两个作用。首先，它发送 `nextObject` 消息。其次，它检查返回值是否不为\
  \ nil，如果不为 nil，则对检索到的对象执行 `while` 循环体。\n\n类似地，你可以使用枚举器来访问字典中的键。负责此功能的方法称为 `keyEnumerator`，其工作方式如下例所示：\n\
  \n```\n- (void) enumerateDictionaryKeys\n{\n    NSDictionary *dict = @{ @\"one\"\
  : @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\" };\n    NSEnumerator\
  \ *keys = [dict keyEnumerator];\n    id key;\n    while ((key = [keys nextObject]))\n\
  \    {\n        NSLog(@\"The dictionary contains key %@\", key);\n        NSLog(@\"\
  The corresponding object is %@\", [dict objectForKey:key]);\n    }\n}\n```\n\n请注意，通过键来枚举对象更为有用，因为它允许以一种能同时揭示键和关联值的方式来遍历字典。\n\
  \n另一种枚举字典元素的方法是使用快速枚举协议。快速枚举简化了访问集合中每个元素的过程，尽管它仅适用于苹果操作系统的最新版本。\n\n```\n- (void)\
  \ enumerateDictionaryObjects\n{\n    NSDictionary *dict = @{ @\"one\": @\"first\"\
  , @\"two\" : @\"second\", @\"three\" : @\"third\" };\n    for (NSString *key in\
  \ dict)\n    {\n        NSLog(@\"The dictionary contains key %@ and value %@\",\n\
  \              key, [dict objectForKey:key]);\n    }\n}\n```\n\n### 可变字典\n\n正如 `NSArray`\
  \ 是一个不可变的对象序列一样，`NSDictionary` 也是不可变的。这意味着，一旦创建，就无法在其中插入新的键。此外，对于给定的键集，也无法更改字典中包含的键/值关联。其原因与\
  \ `NSArray` 不可变的原因类似：不可变的数据更高效，且易于算法处理。因此，这使得 `NSDictionary` 拥有较小的开销，在考虑这种频繁使用的数据结构时这一点非常重要。\n\
  \n另一方面，经常需要考虑可变字典，在其中可以根据需要添加键和更改关联。为满足这一需求，Foundation 框架提供了 `NSDictionary` 的可变版本，称为\
  \ `NSMutableDictionary`。\n\n`NSMutableDictionary` 类继承自 `NSDictionary`，因此任何 `NSMutableDictionary`\
  \ 对象也是一个 `NSDictionary` 对象。这意味着我之前关于 `NSDictionary` 的所有描述在此情况下仍然成立。此外，还添加了一些新方法来修改字典的内容。\n\
  \n第一个方法是 `setObject:forKey:`。此方法的第一个参数是要设置的值，第二个参数是关联的键。使用 `setObject:forKey:` 可以向\
  \ `NSMutableDictionary` 添加新元素，如下例所示：\n\n```\n- (void) changeDictionary\n{\n    NSDictionary\
  \ *immutable_dict =\n        @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"\
  three\" : @\"third\" };\n    NSMutableDictionary *dict = [NSMutableDictionary\n\
  \        dictionaryWithDictionary:immutable_dict];\n    [dict setObject:@\"fourth\"\
  \ forKey:@\"four\"];\n    [dict setObject:@\"fifth\" forKey:@\"five\"];\n    for\
  \ (NSString *key in dict)\n    {\n        NSLog(@\"The dictionary contains key %@\
  \ and value %@\",\n              key, [dict objectForKey:key]);\n    }\n}\n```\n\
  \n这段代码创建了一个名为 `immutable_dict` 的初始字典，然后使用该字典初始化一个 `NSMutableDictionary` 实例。这可以通过使用\
  \ `dictionaryWithDictionary:` 方法实现。接着，使用 `setObject:forKey:` 方法添加两个键/值对。最后使用一个 `for`\
  \ 循环遍历键，并通过 `objectForKey:` 检索给定键对应的对象，打印生成的字典。\n\n另一个可以在 `NSMutableDictionary`\
  \ 上调用的方法是 `removeObjectForKey:`，用于从字典中删除条目。此方法的使用很简单：处理完消息后，与给定键关联的对象将从字典中移除。如果要删除多个键，可以使用\
  \ `removeObjectsForKeys:` 方法。`removeObjectsForKeys:` 的参数必须是一个 `NSArray`，包含所有要删除的对象对应的键。例如，你可以修改上面的示例，使用一个键数组删除字典中的两个条目，如下所示：\n\
  \n```\n- (void) deleteFromDictionary\n{\n    NSDictionary *immutable_dict =\n  \
  \      @{ @\"one\": @\"first\", @\"two\" : @\"second\", @\"three\" : @\"third\"\
  \ };\n    NSMutableDictionary *dict = [NSMutableDictionary\n        dictionaryWithDictionary:immutable_dict];\n\
  \    [dict setObject:@\"fourth\" forKey:@\"four\"];\n    [dict setObject:@\"fifth\"\
  \ forKey:@\"five\"];\n    for (NSString *key in dict)\n    {\n        NSLog(@\"\
  The dictionary contains key %@ and value %@\",\n              key, [dict objectForKey:key]);\n\
  \    }\n    NSArray *keys_to_delete = @[ @\"two\", @\"three\" ];\n    [dict removeObjectsForKeys:keys_to_delete];\n\
  \    for (NSString *key in dict)\n    {\n        NSLog(@\"The dictionary still contains\
  \ key %@ and value %@\",\n              key, [dict objectForKey:key]);\n    }\n\
  }\n```\n\n\n\n## 总结\n\n本章讨论了 Objective-C Foundation 框架中一些最重要的类。首先是 `NSString` 类，用于存储和操作字符串。然后介绍了\
  \ `NSNumber` 类，它作为整型、浮点数、字符和布尔值等常见数值的封装器。最后，详细讨论了容器类，包括 `NSArray` 和 `NSDictionary`。\n\
  \n字符串之所以重要，是因为它们是对输入和输出数据进行编码的最常见方式。`NSString` 类提供了多种初始化方法，可根据字符串数据提供给应用程序的不同方式，用于各种场景。常用功能包括子字符串匹配和比较方法。\n\
  \n在 Objective-C 中，数字可以通过两种方式处理。原生类型与 C 语言中使用的类型相同，它们最适合用于高性能算法。然而，许多 Objective-C\
  \ 类需要引用一个对象。在这些情况下，可以将数字包装在 `NSNumber` 的实例中。该类提供了以所需格式访问数据的方法，包括 `int`、`long`、`float`、`double`、`char`\
  \ 和 `BOOL`。\n\n集合是用于维护其他对象集的对象。`NSArray` 类定义了按顺序存储的对象的接口。`NSArray` 类的对象可以从零开始的索引存储和检索元素。`NSMutableArray`\
  \ 是 `NSArray` 的子类，它维护具有可变接口的数组，允许添加和/或删除元素。\n\n`NSDictionary` 类提供了一个与键关联的元素集合。你需要提供一个有效的键来检索元素。`NSMutableDictionary`\
  \ 允许用户向字典中添加和删除条目。\n\n这些类共同提供了编写更复杂算法所需的大部分基础设施，范围从图形界面到游戏编程逻辑。在下一章中，你将看到如何使类对于需要扩展它们的应用程序更加灵活。通过协议和类别，你将了解到两种可用于向现有类添加高级功能的机制。\n\
  \n"
- "# 4. 类别与协议\n\n## 摘要\n\n在 Objective-C 中，类别可用于向类添加方法，即使你无法完全访问该类的原始源文件。\n\n例如，使用类别可以向系统中的通用类（如\
  \ `NSString`、`NSNumber` 甚至 `NSObject`）添加新方法。只要该类别已加载到应用程序中，这样做将使添加的方法对原始类的任何用户都可用。\n\
  \n如果你需要在新库的上下文中向新类添加复杂功能，或者只是尝试添加一个便捷方法，类别可能会派上用场，这也是 Objective-C 编程如此高效的原因之一。\n\
  \n与其他遵循强类型机制的面相对象语言相比，可适应接口的设计是 Objective-C 的另一个优势领域。通过声明协议，可以创建独立于特定类的接口，因此，任何希望遵守协议声明中预先设定的一组特定消息的客户端都可以使用这些接口。\n\
  \n在本章中，我将探讨这两种机制——类别和协议，以及如何使用它们来创建更好的应用程序。首先，你将研究如何创建受益于类别的新类。在本章的第二部分，你将了解协议如何在\
  \ Apple 的库中被使用，以及客户端代码如何从中受益。\n\n## 类别\n\n由于其面相对象的哲学，Objective-C 促进了接口与实现之间的清晰分离。这种关注点分离的一个方面是通过添加方法来扩展类的能力。这可以通过使用类别来实现，这是一种灵活的机制，可供类设计者以及特定类接口的客户端使用。例如，使用类别可以在无需重新编译原始类文件的情况下添加新方法。这在处理第三方提供的现有库时非常有帮助。同样的原则可用于操作\
  \ Apple 提供的框架中的类，例如 Cocoa 和 Cocoa Touch。\n\n例如，假设你需要添加一个可应用于任何字符串的方法。一种简单的方法是创建\
  \ `NSString` 的子类，并将该方法附加到该子类上。然后你可以通过实例化这个新类来创建字符串，这些字符串将能够访问你声明的新方法。由于你可以依赖 Objective-C\
  \ 运行时处理多态性，每一个接受字符串的方法也将接受你的新类。\n\n然而，这种解决方案并不完全令人满意，因为在许多情况下，你无法控制 `NSString` 实例的创建方式：这类字符串经常由其他方法返回。另一个问题是，使用自定义类会失去一些好处，例如使用字符串字面量的可能性。\n\
  \n另一种处理方式是创建一个 `NSString` 的新类别。在这种情况下，你可以将此方法作为 `NSString` 类接口的一个组成部分来添加。通过导入新类别，项目中任何使用\
  \ `NSString` 的其他类都将能够访问添加的方法，就像它是原始字符串类的一部分一样。\n\n## 注意\n\n通过类别扩展现有类是 Cocoa 框架中常用的技术。通过这种方式，Cocoa\
  \ 允许 `NSString` 等类整合那些仅在特定库上下文中有意义的特性。一个众所周知的例子是，文本绘制框架为 `NSString` 添加了一个类别，提供了直接在屏幕上绘制字符串的能力。\n\
  \n\n\n### 创建新分类\n\n要声明一个新的分类，你可以使用与普通类实现部分非常相似的语法。但在分类中，你需要将分类名称添加到类名后面的括号内，以便编译器识别后续声明是在定义原始类的扩展，而非类本身。\n\
  \n通过分类添加方法后，该方法在所有方面都表现得如同直接在原始类中声明一样。例如，你可以使用与调用目标类原始方法相同的语法来调用这些方法。从被分类扩展的原始类派生出的子类，也会继承以这种方式定义的方法。\n\
  \n以下是一个为 `NSString` 类实现扩展的分类示例。该分类仅包含一个实用方法：`reverse`，它返回一个与原字符串顺序相反的新字符串。\n\n```\n\
  @interface NSString (utility)\n- (NSString *) reverse;\n@end\n```\n\n注意类名后跟随的分类名称，这将其声明与标准接口区分开来。其实现也很直接。\n\
  \n```\n@implementation NSString (utility)\n- (NSString *) reverse\n{\n        NSMutableString\
  \ *resultString = [[[NSMutableString alloc] init] autorelease];\n        int n =\
  \ (int)[self length];\n        for (int i=n-1; i>=0; --i)\n        {\n         \
  \       [resultString appendFormat:@\"%c\", [self characterAtIndex:i]];\n      \
  \  }\n        return resultString;\n}\n@end\n```\n\n这段代码使用了 `NSMutableString` 类，该类允许通过\
  \ `appendFormat:` 等方法向字符串添加数据。相比之下，`NSString` 是不可变对象，这与上一章讨论的许多集合类的情况一致。\n\n分类不仅用于扩展标准框架中的现有类。通常，设想你刚创建了一个类，其中包含一些实现特定职责的方法。然而，在使用该类一段时间后，你发现可以为该类添加第二种类型的职责，使其对使用者更实用。但问题在于，你希望尽量保持原始接口的简洁性。\n\
  \n在这种情况下，Objective-C 提供了分类的概念，作为一种在不影响原始代码和接口的前提下，将额外功能封装到类中的可能方式。同样的技术可以应用于你创建的类，也可以应用于现有类。\n\
  \n### 使用分类头文件\n\n分类可用于扩展系统中任何类的行为。然而，要享受新分类的优势，客户端代码需要能够访问其声明。\n\n这可以通过标准的头文件包含机制实现。按照常见做法，原始类的接口存储在项目中的头文件里。例如，`Employee`\
  \ 类的头文件应命名为 `Employee.h`。现在，假设你想通过声明一个名为 `ExecutiveOptions` 的新分类来扩展 `Employee` 类。在这种情况下，你需要创建一个相应的头文件\
  \ `Employee+ExecutiveOptions.h`，其中包含新分类的定义。头文件的名称是类名与分类名的组合。\n\n注意\n\n这种头文件命名约定的逻辑在于避免与其他类冲突。例如，系统中可能存在另一个名为\
  \ `ExecutiveOption` 的类。这种情况下，两个头文件同名，会使用户难以同时使用该类及其分类。类似地，仅使用类名而不加后缀可能导致命名冲突。\n\n\
  分类头文件的命名约定也有助于系统维护。遵循此约定，任何分类文件文件名中都带有加号，这便于在项目中查找所有分类的列表。\n\n然而，必须注意，并非所有分类都存放在单独的头文件中。出于与有时将相关类存放在同一头文件中相同的原因，将分类添加到包含其他类声明的文件中可能更方便。Foundation\
  \ 和 Cocoa 框架中经常出现这种情况。其目的在于尽量减少程序员为使用一组相关类和分类而需要导入的头文件数量。\n\n\n\n### 类别与私有方法\n\n\
  在 Objective-C 类中，可以声明具有不同可见性级别的实例变量。对于公共变量，任何拥有该对象指针的类或函数都可以访问其内容。而私有实例变量则仅对类本身可用。最后，Objective-C\
  \ 还提供了受保护的实例变量，它们可以被定义它们的类以及任何继承自该类的类读取或写入。这些可访问性级别提供了一定的保证，即编译器会强制实施特定变量的可见性。这反过来又促进了更好的代码组织，因为一个实例变量将只被代码库的一小部分可见或修改。\n\
  \n如果方法和实例变量也拥有相同的可访问性级别，那将会很棒。然而，Objective-C 的设计不允许以这种方式限制消息。消息仅在运行时解析，这意味着编译器无法像对实例变量那样，在编译期间强制执行此类访问规则。\n\
  \n虽然没有办法对方法强制执行访问规则，但你可以使用类别作为一种简单的方法来减少那些你希望私有的方法的可见性。这是可行的，因为可以创建一个类别作为有效的方法，来封装一个或多个仅在一个文件的局部上下文中已知的方法。\n\
  \n为了实现这一点，你需要在实现文件的开头定义一个新的类别。你可以为该类别使用任何名称。传统上，人们为此目的使用名称 `Private`，但 Objective-C\
  \ 也允许类别名称为空，从而形成匿名类别。在这种情况下，你无需担心为类别命名的问题。但使用匿名类别最大的优势在于，无需在文件中创建独立的实现部分，从而减少了需要维护的代码量。\n\
  \n匿名类别的内容将由你想设为私有的所有方法组成。这些方法只能由属于原始类且包含在同一实现文件中的代码访问。下面是一个示例，你使用匿名类别实现了一个 `Library`\
  \ 类。该类别中唯一的方法是 `getPrivateBookTitles`。\n\n```\n// 文件: Library.h\n\n@interface Library\
  \ : NSObject\n\n{\n        // 实例变量在此\n}\n\n// 标准方法在此\n\n@end\n\n// 文件: Library.m\n\
  \n@interface Library ()\n\n- (NSArray *) getPrivateBookTitles;\n\n@end\n\n@implementation\
  \ Library\n\n- (NSArray *) getPrivateBookTitles\n\n{\n        NSArray *books = @[];\n\
  \        // 查找私有书籍的代码\n        return books;\n}\n\n@end\n```\n\n即使使用匿名类别，也必须牢记，此机制并未为以这种方式声明的方法提供运行时保护。毕竟，类的用户仍然可以发送一条消息，该消息将被解析为此类类别中的某个方法。请记住，消息分发机制的运作方式并不关心消息的目标，只要消息能够成功分发即可。如果你真的不希望某些代码被外部类执行，实现这一目标的最佳方法是使用静态\
  \ C 函数，因为 C 函数不受 Objective-C 的消息分发规则约束。\n\n### 向类别添加属性\n\n正如你所见，类别可以通过使用简单的语法，用新方法扩展现有类，让我们的生活更加轻松。然而，当谈到增强类的功能集时，通常需要一些额外的内存来存储与新功能关联的数据。例如，一个\
  \ `Employee` 类可能希望存储每个人的健康信息。方法 `addHealthRecords:` 需要使用一个或多个实例变量来根据需要跟踪这些信息。\n\n\
  但是，无法直接将新的实例变量添加到类别中。毕竟，类别的目的是提供新方法，而不是从根本上改变对象的内容。然而，在添加匿名类别时，Objective-C 为此规则提供了一个例外。\n\
  \n请记住，匿名类别基本上是一种添加未在类公共接口中命名的方法的方式。因此，编译器将匿名类别视为原始类本身的一部分，并使用其中包含的属性定义作为合成实例变量的基础。这种属性及其合成变量的组合，为我们提供了一种间接添加数据的方式，这些数据可以在主实现部分声明的方法中使用。\n\
  \n下面是一个展示其工作原理的示例。再次考虑一个用于模拟实体图书馆的类，其中包含馆内书籍的信息。\n\n```\n// 文件: Library.h\n\n@interface\
  \ Library : NSObject\n\n{\n// 实例变量在此\n}\n\n// 方法在此\n\n@end\n\n// 文件: Library.m\n\
  \n@interface Library ()\n\n@property(retain) NSString * privateCollectionName;\n\
  @property(retain) NSNumber * numericProperty;\n- (void) setValues;\n\n@end\n\n@implementation\
  \ Library\n\n@synthesize numericProperty = _numberOfBooks; // 赋予一个不同的名称\n\n- (void)\
  \ setValues\n\n{\nself->_privateCollectionName = @\"MyLibrary\"; // 由编译器生成\nself.numberOfBooks\
  \ = @1000; // 通过 @synthesize 声明\nNSLog(@\"将馆藏集名称设置为 %@\", self.privateCollectionName);\n\
  }\n\n@end\n```\n\n这段代码中有一个头文件，包含了 `Library` 类的主接口（为简洁起见，未显示该类中的方法和实例变量）。`Library.m`\
  \ 实现文件包含一个匿名类别，其中声明了两个属性：`privateCollectionName` 和 `numericProperty`。最后，`Library`\
  \ 类中的方法在 `@implementation` 部分内部定义。\n\n由于你使用的是匿名类别，因此同样需要在类的 `@implementation` 部分添加方法\
  \ `setValues` 的定义。类似地，编译器使用的 `@synthesize` 声明会生成一个名称与属性指定的名称不同的实例变量。\n\n第一个属性（`privateCollectionName`）使用编译器合成的标准变量名。因此，无需\
  \ `@synthesize` 声明。实例变量由编译器自动创建并命名为 `_privateCollectionName`。请注意，你在方法 `setValues`\
  \ 中直接引用了这个实例变量。\n\n然而，第二个属性的内部名称与 `@property` 声明的名称不同。例如，这可能会发生，因为你想要一个更易于输入的内部名称，而其属性名则保持更具描述性。在本例中，该属性称为\
  \ `numericProperty`，而合成的实例变量称为 `_numberOfBooks`。\n\n`setValues` 方法展示了如何使用这两种类型的实例变量。每个属性既可以作为实例变量访问，也可以直接作为属性访问。实例变量的语法通过使用\
  \ `self` 作为对象的有效指针来实现。因此，它使用 `->` 符号。另一方面，属性语法使用点号来指示编译器应在何处生成特殊代码以获取或设置属性内容。\n\n\
  \n\n## 协议\n\n协议允许类通过一个众所周知的接口进行交互。许多类需要仅通过调用几个实现所需功能的方法来与其他服务（或一组服务）进行交互。解决此问题的一种方法是定义一个实现所需功能的基类，然后让大量子类继承相同的接口。\n\
  \n然而，这种解决方案在大型系统中，随着可用类和服务的数量增加，扩展性会变得很差。由于你需要定制一个类与系统其他部分交互的方式，实现服务的需求可能会导致应用程序中的类数量膨胀。在像\
  \ C++ 这类可扩展选项较少的语言中，这种类型的泛滥在 Objective-C 中是不必要的。\n\nObjective-C 提供的一种解决方案是声明一个协议，并要求某些类实现该协议以与特定服务进行交互。通过这种方式，客户端可以通过实现新的协议来扩展现有类，而无需为此创建一个全新的类。\n\
  \n声明协议有两种方式。第一种方法定义了一个非正式协议，它仅仅是对象之间的一种通信机制，通过使用类别来文档化。\n\n实现协议的第二种方式是使用特定的语法。这种技术不仅支持定义新协议，还支持一个类实现一个或多个协议。\n\
  \n### 非正式协议\n\n非正式协议只是一种定义一组方法的方式，这些方法应存在于类中以便提供服务。之所以称之为非正式，是因为它并非由特定的语法定义，而仅仅是期望客户端类会定义适当的方法。例如，假设你正在编写一个与放贷方交互的应用程序。有几种放贷方的类，例如银行、信用合作社和私人投资者。然而，任何此类放贷方都会向其客户提供一组方法，例如：\n\
  \n`- (BOOL) canLend:(float)amount;`\n\n`- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;`\n\
  \n第一个方法用于确定放贷方是否能够贷出所需金额。第二个方法将尝试为请求的金额和提供的借款人标识满足借贷请求。当借贷过程成功完成时，`lendRequest:toLoaner:`\
  \ 的返回值为 `YES`。\n\n任何想要充当放贷方的类都需要提供这两个方法。然而，你的接口并未精确定义它们将如何提供这些方法。实际上，有几种选项可以检测和使用上述方法的正确实现。你要了解的第一种技术基于在\
  \ `NSObject` 中定义的类别。\n\n如你所知，`NSObject` 是 Objective-C 中大多数对象的基类。通过定义 `NSObject`\
  \ 的一个类别，你可以为系统中的所有对象提供特定的行为。因此，你可能只想为上述方法添加一个空的实现。以下是一个类别的示例：\n\n```\n@interface\
  \ NSObject (MoneyLender)\n\n- (BOOL) canLend:(float)amount;\n\n- (BOOL) lendRequest:(float)value\
  \ toLoaner:(NSString*)loanerId;\n\n@end\n```\n\n这是新类别的接口，声明了你希望添加到系统所有对象中的两个新方法。实现将是空的，这样你就可以在任何对象上调用这些方法：\n\
  \n```\n@implementation NSObject (MoneyLender)\n\n- (BOOL) canLend:(float)amount\n\
  \n{\n\nreturn NO;\n\n}\n\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId\n\
  \n{\n\nreturn NO;\n\n}\n\n@end\n```\n\n这些方法对请求简单地返回 `NO`。这意味着调用这些方法是安全的，知道它们只有在存在真实实现（而非你刚刚创建的空实现）时才会返回\
  \ `YES`。\n\n现在缺少的是调用这些方法的方式。传统做法包括接收一个指向目标对象的指针。这会在调用接口的类中体现出来。假设这个类叫做 `InvestmentAdvisor`，其中有一个方法\
  \ `findLoan`。该类还有一个名为 `loanSource` 的属性。\n\n```\n@interface InvestmentAdvisor : NSObject\n\
  \n{\n\n// 其他 ivars 在此\n\n}\n\n@property (nonatomic, retain) NSObject *loanSource;\n\
  \n- (void) findLoan:(float)amount;\n\n@end\n```\n\n此类的实现将使用存储在 `loanSource` 属性中的值，并尝试为特定客户找到贷款。\n\
  \n```\n@implementation InvestmentAdvisor\n\n- (void) findLoan:(float)amount\n\n\
  {\n\nif ([self.loanSource canLend:amount])\n\n{\n\nBOOL result = [self.loanSource\
  \ lendRequest:amount\n\ntoLoaner:@\"InvestmentClient\"];\n\nif (result)\n\n{\n\n\
  NSLog(@\"贷款申请已被接受\");\n\n}\n\n}\n\n}\n\n@end\n```\n\n你首先使用存储在 `self.loanSource`\
  \ 中的值来判断给定的来源能否贷出所需的金额。如果可能，则向放贷方发送 `lendRequest:` 消息以完成贷款流程。如果一切顺利，你就在系统日志中打印一条消息。\n\
  \n**注意**\n\n在上面的代码中，你使用了 `loanSource` 属性，但不知道其值是否已设置。尽管如此，代码仍然有效，因为 Objective-C\
  \ 处理向 `nil` 指针发送消息的方式。如果消息的目标是 `nil`，那么编译器生成的代码会自动为返回 `BOOL` 的消息返回 `NO`。类似地，返回数字的消息默认返回零。这些针对空指针的特殊处理规则的好处是，你可以避免在每次使用变量或属性时检查\
  \ `nil`。这也减少了在 C 和 C++ 代码中非常常见的空指针异常数量。\n\n现在假设你想创建一个实现 `MoneyLender` 接口的类。要实现这一点，你只需要定义你自己的类，并包含\
  \ `MoneyLender` 类别中的两个方法。示例如下：\n\n```\n// MyLoanSource.h\n\n@interface MyLoanSource\
  \ : NSObject\n\n- (BOOL) canLend:(float)amount;\n\n- (BOOL) lendRequest:(float)value\
  \ toLoaner:(NSString*)loanerId;\n\n// 其他方法在此\n\n@end\n```\n\n我只展示了属于协议的方法，但一个真实的实现会包含其他几个方法。以下是相应的实现：\n\
  \n```\n// MyLoanSource.m\n\n#import \"MyLoanSource.h\"\n\n@implementation MyLoanSource\n\
  \n#define MAX_LOAN 1000 * 1000\n\n- (BOOL) canLend:(float)amount\n\n{\n\nreturn\
  \ amount < MAX_LOAN;\n\n}\n\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId\n\
  \n{\n\nif ([@\"\" isEqualToString:loanerId])\n\n{\n\nreturn NO;\n\n}\n\nif (value\
  \ > MAX_LOAN)\n\n{\n\nreturn NO;\n\n}\n\nreturn YES;\n\n}\n\n@end\n```\n\n你仍然需要编写代码，将上面定义的对象作为输入提供给\
  \ `LoanAdviser` 类。\n\n```\n- (void) useLoanSource {\n\nMyLoanSource *loanSource\
  \ = [[MyLoanSource alloc] init];\n\nInvestmentAdvisor *advisor = [[InvestmentAdvisor\
  \ alloc] init];\n\nadvisor.loanSource = loanSource;\n\n[advisor findLoan:10000];\n\
  \n}\n```\n\n这段代码首先创建一个 `MyLoanSource` 类型的对象，它实现了由 `LoanSource` 定义的协议。然后，下一行创建一个顾问对象，负责使用贷款来源。`loanSource`\
  \ 属性被设置为这个新创建的对象。最后，你发送 `findLoan:` 消息，贷款金额为 10,000 美元。作为此消息的结果，将使用贷款来源，并且请求的贷款被满足。\n\
  \n\n\n#### 检查协议合规性\n\n虽然上述技术作为实现协议的一种方法效果良好，但它有一个小缺点。通过在 `NSObject` 类上创建新类别，你在某种程度上降低了通用消息派发的效率，影响了其他所有人。原因是，这种非正式协议要求所有派生自\
  \ `NSObject` 的类都包含指定的两个方法。当协议数量增加时，这会成为一个问题。不难想象，`NSObject` 的派发表中的大部分方法都可能由空协议方法组成。\n\
  \n为了避免这种情况，你可以在运行时检查所需方法是否存在，而不是让这些方法成为系统中每个对象的一部分。这需要在发送消息的代码部分做更多工作，但肯定能让使用该类的其他开发者感到更轻松。下面是\
  \ `InvestmentAdvisor` 类的一个修改版本，它检查贷款源是否支持所需的方法：\n\n```\n- (void) findLoan:(float)amount\n\
  {\n        SEL canLendSel = @selector(canLend:);\n        SEL lendReqSel = @selector(lendRequest:toLoaner:);\n\
  \        if([self.loanSource respondsToSelector:canLendSel] &&\n           [self.loanSource\
  \ respondsToSelector:lendReqSel])\n        {\n                if ([self.loanSource\
  \ canLend:amount])\n                {\n                        BOOL result = [self.loanSource\
  \ lendRequest:amount\n                                                        toLoaner:@\"\
  InvestmentClient\"];\n                        if (result)\n                    \
  \    {\n                                NSLog(@\"The loan application was accepted\"\
  );\n                        }\n                }\n        }\n}\n```\n\n`findLoan:`\
  \ 的新版本与旧版本的不同之处在于方法开头的测试。首先，为你要调用的方法创建两个选择器。\n\n**注意**\n\n选择器是方法内部表示的名称。通过选择器，可以操作和获取关于方法的信息。例如，可以回答“某个类是否实现了这个方法？”这样的问题。选择器变量的类型始终是\
  \ `SEL`。\n\n一旦检索到选择器，你就可以使用 `respondsToSelector:` 消息来确定作为 `loanSource` 传入的对象是否能够响应你想要发出的请求。如果结果为真，你就可以执行\
  \ `findLoan:` 原始版本中包含的相同代码。\n\n使用这个 `findLoan:` 的新定义，你现在可以从定义中移除 `MoneyLender` 这个类别。由于只有当这些方法被定义为给定对象的一部分时，你才会调用该类别中的任何方法，因此无需向每个\
  \ `NSObject` 类型的对象添加这些方法的空实现。\n\n在你完全移除 `MoneyLender` 类别后，会注意到 `findLoan:` 新版本的最后一个问题：编译器会显示一个警告，提示无法确定\
  \ `loanSource` 是否能响应发送的消息。这是因为在编译时无法确定这些方法能否被成功派发。不过，你不必担心这个问题，因为 `if` 语句保证了在运行时这将是成立的。然而，通过使用运行时函数直接调用选择器，可以避免这些警告。但目前你暂时不需要为此担忧。\n\
  \n### 正式协议\n\n调用非正式协议中定义的方法，如同你之前所做的那样，为定义接口提供了一种清晰的解决方案。然而，通过使用 `NSObject` 类别或检查对象是否能响应特定消息，你只是利用了\
  \ Objective-C 运行时的灵活性。事实上，这种机制并未明确表达代码的意图，即定义对象之间一个完善的协议。\n\n为了提高可读性并简化编码，Apple\
  \ 引入了协议的正式语法，使用关键字 `@protocol`。采用这种语法，前面的示例可以用以下协议声明来编写：\n\n```\n@protocol MoneyLender\n\
  - (BOOL) canLend:(float)amount;\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;\n\
  @end\n```\n\n乍一看，这里基于类别的声明与正式协议声明之间没有太大区别，除了明显使用了 `@protocol` 关键字之外。然而，一旦以这种方式声明了\
  \ `MoneyLender`，那些希望实现协议中所包含方法的客户端类就可以使用它了。\n\n因此，这种声明的一个主要区别在于，你希望它能够被客户端类所知，因此需要将协议声明放在一个头文件中。相比之下，定义为\
  \ `NSObject` 类别的非正式协议可以保持为使用它的类的私有内容。\n\n另一个区别在于类如何实现协议。对于非正式协议，你唯一需要做的就是为所需方法提供一个有效的实现。对于正式协议，你需要明确指示该类实现了该协议。这是通过使用尖括号将协议列表括起来，并紧跟在基类名称之后来实现的。示例如下：\n\
  \n```\n@interface AccreditedLoanSource : NSObject <MoneyLender>\n{\n// ivars go\
  \ here\n}\n// other methods here\n@end\n```\n\n`AccreditedLoanSource` 类的接口定义与其他类类似，不同之处在于它实现了\
  \ `MoneyLender` 协议。当协议被标识为接口的一部分时，Objective-C 编译器会检查协议中的所需方法是否在实现中。以下是实现部分的一个示例，仅包含两个实现存根：\n\
  \n```\n// file AccreditedLoanSource.m\n@implementation AccreditedLoanSource\n- (BOOL)\
  \ canLend:(float)amount\n{\nreturn YES;\n}\n- (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId\n\
  {\nreturn YES;\n}\n@end\n```\n\n**注意**\n\n从代码打包的角度来看，正式协议与非正式协议还有另一个区别。后者无需通过头文件提供公共接口。但对于正式协议，这不仅是可取的，而且是必要的。在定义新类的接口时，编译器需要看到协议的声明。\n\
  \n使用正式协议的下一步是定义变量和属性，以确保协议得到实现。这是通过声明一个变量并在变量类型后使用尖括号来完成的。如果你只需要一个实现协议中方法的对象，那么通常将对象类型定义为\
  \ `NSObject <ProtocolName>`。\n\n使用协议的 `InvestmentAdvisor` 的修改版本可以写成：\n\n```\n@interface\
  \ InvestmentAdvisor : NSObject\n{\n// other ivars here\n}\n@property (nonatomic,\
  \ retain) NSObject <MoneyLender> *loanSource;\n- (BOOL) findLoan:(float)amount;\n\
  @end\n\n@implementation InvestmentAdvisor\n- (BOOL) findLoan:(float)amount\n{\n\
  BOOL canLend = [self.loanSource canLend:amount];\nif (canLend)\n{\nBOOL result =\
  \ [self.loanSource lendRequest:amount\ntoLoaner:@\"InvestmentClient\"];\nif (result)\n\
  {\nNSLog(@\"The loan application was accepted\");\nreturn YES;\n}\n}\nreturn NO;\n\
  }\n```\n\n\n\n请注意，在此版本的 `findLoan:` 中，你无需担心 `canLend:` 和 `lendRequest:toLoaner:`\
  \ 方法是否已定义。一旦编译器知道属性 `loanSource` 指向一个实现了该协议的对象，这两个方法就可以在编译时进行验证。最后一步则是创建正确的对象，并利用它来初始化\
  \ `loanSource` 属性。\n\n```\n- (void) useLoanSource\n{\n    AccreditedLoanSource *loanSource\
  \ = [[AccreditedLoanSource alloc] init];\n    InvestmentAdvisor *advisor = [[InvestmentAdvisor\
  \ alloc] init];\n    advisor.loanSource = loanSource;\n    BOOL res = [advisor findLoan:10000];\n\
  \    NSLog(@\"result is %d\", res);\n    [advisor release];\n    [loanSource release];\n\
  }\n```\n\n请注意，这里唯一真正的区别在于创建 `loanSource` 对象的方式，该对象现在提供了对 `MoneyLender` 协议的完整实现。\n\
  \n**注意**\n\n一个实例变量或属性，如果它实现了当前类所需的某些功能，并由外部使用者提供，则称为委托。例如，`loanSource` 属性就是 `InvestmentAdvisor`\
  \ 类的委托。要求委托实现特定协议是 Objective-C 库中常用的一种惯用方式。例如，Cocoa 框架要求用户定义委托，以提供与 GUI 对象相关的大部分功能。\n\
  \n## 可选方法\n\n在正式协议中，可以定义方法是必需的还是可选的。编译器会检查必需方法，如果该方法不存在，则会发出警告。可选方法可以在实现协议的类中省略。\n\
  \n可以为协议成员声明两种不同的必需级别。\n\n- **必需方法**：这些方法需要在每个实现该协议的对象中都存在。你可以将这些方法视为提供定义该协议的基本功能。未经限定包含在协议中的方法被视为必需方法。此外，任何跟在\
  \ `@required` 关键字之后的方法都被认为是必需的。\n- **可选方法**：这些方法可能提供一些对于协议定义并非必需的功能。实现协议的类可以自由选择包含或排除这些方法。可选方法通过\
  \ `@optional` 关键字来定义。所有跟在 `@optional` 关键字之后的方法都被视为可选方法。\n\n当使用可选方法时，你需要确定它们在目标对象中是否已被定义。实现此目的的方法与你使用非正式协议时的做法类似：只需向目标对象发送一条\
  \ `respondsToSelector:` 消息，以检查该方法是否可用。例如，假设你想向 `MoneyLender` 协议添加一个可选方法。\n\n```\n\
  @protocol MoneyLender\n@optional\n- (BOOL) canExtendLoan;\n@required\n- (BOOL) canLend:(float)amount;\n\
  - (BOOL) lendRequest:(float)value toLoaner:(NSString*)loanerId;\n@end\n```\n\n现在，你可以编写使用\
  \ `canExtendLoan:` 方法的代码，但前提是需先测试其是否存在。\n\n```\n- (BOOL) checkLoan\n{\n    if ([self.loanSource\
  \ respondsToSelector:@selector(canExtendLoan)])\n    {\n        if ([self.loanSource\
  \ canExtendLoan])\n        {\n            NSLog(@\"The loan can be extended\");\n\
  \            return YES;\n        }\n    }\n    return NO;\n}\n```\n\n## 总结\n\n\
  在本章中，我介绍了关于设计高效 Objective-C 类时两个最重要的主题。使用分类和协议，可以扩展你自己创建的类的能力，以及系统自带或第三方供应商提供的库中已有的其他类的能力。\n\
  \n分类支持向现有类的接口添加方法。只要你提供了扩展方法的代码——以及包含分类定义的头文件——其他类就可以使用分类方法，就好像它们是原始类的一部分一样。这为定制通用类（例如\
  \ `NSArray` 或 `NSString`）提供了一种很好的方式，使其包含在你的应用程序上下文中很有用的代码。\n\n协议为类提供了一种定义有限接口的方式，该接口将仅由特定服务使用。协议可以通过仅列出一个或多个需要成为接口一部分的方法来以非正式方式定义。要实现这样的非正式协议，类可以通过一个分类（通常附加到\
  \ `NSObject` 上）提供一组空的实现。第二种技术是使用 Objective-C 提供的运行时 API，检查目标对象上是否存在必需的方法。\n\n正式协议使用类似于类声明的语法进行定义。然而，其主要目标是定义一个简单的接口，该接口可以由其他类独立实现。Objective-C\
  \ 库在很大程度上依赖协议来提供服务，而无需为每个新功能添加新类。例如，Cocoa 使用协议作为定义 UI 组件委托的主要工具。\n\n分类和协议展示了 Objective-C\
  \ 的一些动态特性，但它们只是触及了可能性的表面。在下一章中，你将更深入地研究动态绑定的概念，并了解它如何帮助你实现目标。\n\n"
- "# 5. 继承\n\n## 摘要\n\n在前面的章节中，你探索了 Objective-C 中面向对象编程的一些基本概念。正如你所见，OOP 是促使该语言创建的主要软件开发概念。OOP\
  \ 的一个主要特性是能够创建从其他现有类继承方法、变量和属性的新类。因此，要精通这门语言，你需要对基于类的继承概念有良好的工作知识。\n\n然而，正确使用继承，无论是在设计阶段还是在基类和派生类的实现阶段，都需要投入一定的注意力。在本章中，你将探索与\
  \ Objective-C 中继承相关的主题，涵盖设计高效类层次结构所需的一些必要背景知识。\n\n你将更深入地了解继承是如何工作的，以及同一层次结构中类之间的方法重写机制。此外，你还会看到如何解决因\
  \ Objective-C 中继承实现方式而引发的一些问题。例如，你将学习如何模拟多继承的使用，或者如何避免过深的类层次结构。\n\n\n\n## 继承的概念\n\
  \n类描述了对象的通用行为。在面向对象语言中，类充当了将由系统创建和维护的对象的蓝图。通过定义一个新类，你可以勾勒出该类对象能够响应的一系列行为，以及每个对象可用的数据存储空间。因此，类引入了一个独立的代码单元，应用程序的其他部分可以与之交互和调用。\n\
  \n仅仅能够创建特定类型的对象就已经能够提供强大的功能，并且本身就能带来令人印象深刻的整体软件质量。然而，创建和使用新对象并不足以简化生成具有更复杂行为的类的过程。让我们来看一个典型示例，假设你想为`Employee`（员工）这个概念定义一个类。\n\
  \n```\n// 文件 Employee.h\n\n@interface Employee : NSObject\n\n{\nNSString *name;\n\
  }\n\n- (void) setName:(NSString*) aName;\n- (double) calculateSalary;\n\n@end\n\
  ```\n\n以下是相应的实现文件：\n\n```\n// 文件 Employee.m\n\n@implementation Employee\n\n- (void)\
  \ setName:(NSString*) aName\n\n{\n\nself->name = aName;\n\n}\n\n- (double) calculateSalary\n\
  \n{\n\ndouble salary = 0;\n\n// 执行薪资计算\n\nreturn salary;\n\n}\n\n@end\n```\n\n有了这些定义，创建和使用具有`Employee`类所指定行为的对象就变得非常容易。正如你在前几章中所见，只需向`Employee`类发送一对`alloc/init`消息，即可创建该特定类型的新对象。\n\
  \n然而，假设你实际上想使用一个经过略微修改的`Employee`版本，一个原始类的创建者未曾预想到的变体。例如，你可能想表示一个按小时计酬的员工，其薪资取决于工作的小时数，而不是每年确定的固定值。如果没有继承，你将被迫为这个概念创建一个独立的新类。\n\
  \n```\n// HourlyEmployee.h\n\n@interface HourlyEmployee: NSObject\n\n{\nNSString\
  \ *name;\nint hoursPerWeek;\n}\n\n- (void) setName:(NSString*) aName;\n- (double)\
  \ calculateSalary;\n- (int) getHoursPerWeek;\n\n@end\n```\n\n```\n// HourlyEmployee.m\n\
  \n@implementation HourlyEmployee\n\n- (void) setName:(NSString*) aName\n\n{\n\n\
  self->name = aName;\n\n}\n\n- (double) calculateSalary\n\n{\n\ndouble salary = 0;\n\
  \n// 为按小时计酬的员工执行薪资计算\n\nreturn salary;\n\n}\n\n- (int) getHoursPerWeek\n\n{\n\n\
  // 返回工作小时数\n\n}\n\n@end\n```\n\n这个类的定义和内容将与`Employee`类中使用的非常相似，只需进行少量修改以体现两个概念之间的差异。在一个依赖于某些方面是基本概念变体的对象定义的应用程序中，这将导致大量的代码重复——致使程序既难创建又难维护。在这种情况下，重用现有代码会非常困难，因为此类的大部分接口都需要在系统中重复编写。\n\
  \n现在，看看使用继承概念的同一个类：\n\n```\n// 文件 HourlyEmployee.h\n\n@interface HourlyEmployee\
  \ : Employee\n\n- (int) getHoursPerWeek;\n\n@end\n```\n\n```\n// 文件 HourlyEmployee.m\n\
  \n@implementation HourlyEmployee\n\n- (double) calculateSalary\n\n{\n\ndouble salary\
  \ = 0;\n\n// 执行薪资计算，后续会讨论\n\nreturn salary;\n\n}\n\n- (int) getHoursPerWeek\n\n\
  {\n\n// 返回工作小时数\n\n}\n\n@end\n```\n\n现在，`HourlyEmployee`不再是系统中一个独立的类；相反，它直接依赖于`Employee`提供的定义。这种组织方式的主要好处是，你无需重复原始类中包含的每个方法和实例变量。基类中的接口以及方法的实现都会被继承，这样程序员就可以专注于`HourlyEmployee`与原始类不同的方面——而不是重新编写已有的功能。\n\
  \n另外请注意，作为 Objective-C 类型系统的结果，在任何需要`Employee`对象的地方都可以使用`HourlyEmployee`。这意味着你还可以利用任何以某种方式为`Employee`对象提供服务的已有方法。另一方面，正如你将在后续章节中看到的，这种替换并非没有代价：它要求派生自给定子类的类也必须遵守原始类中定义的同一契约。\n\
  \n### 继承与重写\n\n重写是用一个更具体的版本来替换超类中某个方法的行为。重写方法是自定义参与继承层次的类行为的主要方式。\n\n在 Objective-C\
  \ 中，任何方法都可以被重写。无论该方法是你应用程序中的类的一部分，还是来自第三方框架，都没有区别。唯一的限制是重写的方法需要使用与原始方法相同的关键字名称和参数。\n\
  \nObjective-C 中关于重写方法的一个特殊之处在于，你无需在子类的接口中提及它们。再次考虑`Employee`。假设你想引入另一个名为`Contractor`（承包商）的子类。在这种情况下，你希望调整实现，以反映承包商的职责差异。为了说明，我们假设原始类将增加`provideJobEvaluation`方法，如下所示：\n\
  \n```\n// 文件 Employee.h\n\n@interface Employee : NSObject\n\n{\n       NSString\
  \ *name;\n}\n\n- (void) setName:(NSString*) aName;\n- (double) calculateSalary;\n\
  - (void) provideJobEvaluation;\n\n@end\n```\n\n该方法用于为每项已完成的工作创建一个常规的内部评估。现在来看如何为`Contractor`类声明接口：\n\
  \n```\n// 文件 Contractor.h\n\n@interface Contractor : Employee\n\n{\n       NSString\
  \ *thirdPartyCompany;\n}\n\n@end\n```\n\n从这里可以清楚地看出，`Contractor` 有额外的存储需求。然而，这里并没有任何指示表明\
  \ `Contractor` 类实现了 `Employee` 中任何方法的新版本。不过，这对该类的使用者来说并没有影响。在实现部分，你可以自由地重写父类中的任何方法。\n\
  \n```\n// 文件 Employee.m\n\n@implementation Contractor\n\n- (void) provideJobEvaluation\n\
  \n{\n       // 此处执行合同工作的评估步骤\n}\n\n@end\n```\n\n通过这个定义，每当创建`Contractor`类的新对象时，`provideJobEvaluation`方法将为合同工作执行正确的计算，即使该重写在类接口中并未显式声明。这一点对于分类（categories）也同样适用。例如，你可以为`Contractor`创建一个新的分类，该分类将再次调整类的行为，如下所示：\n\
  \n```\n// Contractor+NameHanding.h\n\n@interface Contractor (NameHanding)\n\n  //\
  \ 此处未声明新方法\n\n@end\n```\n\n它的实现如下：\n\n```\n// 文件 Contractor+NameHanding.m\n\n@implementation\
  \ Contractor (NameHanding)\n\n- (void) setName:(NSString*) aName\n\n{\n       self->name\
  \ = [NSString stringWithFormat:@\"contractor %@\", aName];\n}\n\n@end\n```\n\n由于重写了`setName:`方法，这将改变应用中创建的任何承包商的名称显示方式。\n\
  \n\n\n#### 调用超类中的方法\n\n作为层级结构的一部分，子类有权访问从超类继承的数据和方法。这使得子类的对象可以调用层级中位于其上的类所定义的任何方法。\n\
  \n当超类中的方法名称不同时，调用该方法只是向 `self` 发送一条消息，使用传统的消息发送语法。消息分发机制会自动找到正确的实现。例如，考虑一个表示文件系统条目类型的类。\n\
  \n```\n// 文件 FileType.h\n@interface FileType : NSObject\n{\n    // 此处列出实例变量\n}\n\
  - (NSString*) getExtension;\n@end\n\n// 文件 FileType.m\n@implementation FileType\n\
  - (NSString*) getExtension\n{\n    NSString *ext = @\"\";\n    // 获取扩展名\n    return\
  \ ext;\n}\n@end\n```\n\n现在假设你希望为文档实现一个新的子类，并将其命名为 `DocumentType`。\n\n```\n// 文件\
  \ DocumentType.h\n@interface DocumentType : FileType\n{\n    // 此处列出实例变量\n}\n- (BOOL)\
  \ isValid;\n@end\n\n// 文件 DocumentType.m\n@implementation DocumentType\n-(BOOL)isValid\n\
  {\n    if ([@\"\" isEqualToString:[self getExtension]])\n    {\n        return false;\n\
  \    }\n    return true;\n}\n@end\n```\n\n在这个例子中，`DocumentType` 类需要使用超类中的 `getExtension`\
  \ 方法。为此，它只需向 `self` 发送一条消息，使用如下表示法：\n\n```\n[self getExtension]\n```\n\n现在，假设你正在实现\
  \ `getExtension` 方法的一个新版本。在这种情况下，你可能希望能够调用该方法的原始版本。例如，你可能希望获取由 `FileType` 中 `getExtension`\
  \ 方法计算出的原始扩展名，然后执行某些后处理，以返回一个修改后的扩展名。然而，如果你向 `self` 发送 `getExtension` 消息，最终将导致递归调用，而非调用超类中的实现。\n\
  \n为解决此问题，Objective-C 引入了特殊变量 `super`。`super` 的目的是重定向消息发送机制，以便从超类（而非当前类）开始搜索合适的方法。当向\
  \ `super` 发送消息时，编译器能够检测到消息解析机制需要稍作更改，从而使消息能够到达正确的方法。\n\n请注意，当子类重写在超类中声明的某个方法时，可能出于两个原因：\n\
  \n- **用全新的实现替换原始行为**：在这种情况下，新行为完全在子类中编码，无需引用原始实现。这是最容易处理的情况，因为无需与基类交互即可实现修改后的方法。\n\
  - **用附加代码扩展原始行为**：在这种情况下，有必要引用你正试图重写的方法的原始实现。\n\n在第二种情况下，程序员可以使用特殊变量 `super` 来引用超类中某个方法的实现。借助此变量，在使用消息分发机制时可以跳过当前类的层级。因此，编译器将生成代码，从父类（而非当前类）开始搜索所需消息的匹配项。因此，使用\
  \ `super` 是重用为基类编写的代码的一种常见方式，同时又能为同一方法提供增强的实现。例如，在重写基类的方法时，非常常见的是使用以下惯用法：\n\n```\n\
  - (void) overridenMethodName\n{\n    [super overridenMethodName];\n    // 附加代码写在这里\n\
  }\n```\n\n也就是说，你首先调用基类中的原始方法，然后添加任何必要的附加代码来自定义该方法的行为。\n\n#### 模板方法\n\n方法重写是引入多态行为的一种方式。然而，仅重写单个方法可能不足以实现你所需的定制化。在某些情况下，类的行为由包含多个步骤的算法决定，其中每个步骤都可以独立定制。当这种情况发生时，最佳策略是使用一个模板方法，它封装了关于类所用确切步骤序列的知识。\n\
  \n例如，考虑一个表示厨师的类。该类有一个名为 `prepareRecipe` 的方法，它执行食物准备的主要步骤。\n\n```\n// 文件 Cook.h\n\
  @interface Cook : NSObject\n- (void)prepareRecipe;\n- (void)acquireIngredients;\n\
  - (void)mixIngredients;\n- (void)cookDish;\n@end\n```\n\n其实现包含了 `prepareRecipe`\
  \ 的基本框架，以及其余三个方法的空实现。\n\n```\n// 文件 Cook.m\n@implementation Cook\n-(void) prepareRecipe\n\
  {\n       [self acquireIngredients];\n       [self mixIngredients];\n       [self\
  \ cookDish];\n}\n- (void)acquireIngredients\n{\n}\n- (void)mixIngredients\n{\n}\n\
  - (void)cookDish\n{\n}\n@end\n```\n\n这里有一个方法 `prepareRecipe`，由该类的客户端调用。然而，该方法只是一个外壳（或模板），它调用另外三个完成实际工作的方法。要实现一个真正有用的\
  \ `Cook` 实例，你需要首先创建一个派生类，然后以合理的方式实现这三个方法（`acquireIngredients`、`mixIngredients` 和\
  \ `cookDish`）。\n\n在 `Cook` 中，你拥有一个提供包含三个操作的通用接口的类，以及一个决定这些操作调用顺序的方法。子类需要为此类模板方法的工作提供具体细节。\n\
  \n**注意**：你可以将上面展示的类归类为抽象类。抽象类是指其接口中的一个或多个方法未提供实现的类。这可能是由于以下原因：某个功能在特定层级不存在实现，或者你想强制子类提供自己的实现。当基类需要某些只能由子类提供的信息时，就会出现这种情况。\n\
  \n\n\n## 对象初始化\n\n正确的对象初始化是创建新类时需要关注的核心问题之一，同时也直接受到继承关系的影响。毕竟，类是运行时对象实例的模板，但这些实例首先需要成为目标概念的有效表示。\n\
  \n在 Objective-C 中，初始化类最常用的方式是发送 `init` 消息或某个 `initWith` 消息。`init` 方法最初定义在 `NSObject`\
  \ 类中，任何需要提供自定义初始化功能的类都必须重写该方法。\n\n但当存在多个初始化方法时，协调它们之间的交互方式就变得至关重要。这对于保持对象状态初始化方式的一致性来说是必要的。\n\
  \n你已经见过一些提供备选初始化方法的类示例。一个典型的例子是 `NSString`，它拥有以下初始化方法（以及其他方法）：\n\n```\n- (id)init;\n\
  - (id)initWithCharactersNoCopy:(unichar *)characters length:(NSUInteger)length freeWhenDone:(BOOL)freeBuffer;\n\
  - (id)initWithCharacters:(const unichar *)characters length:(NSUInteger)length;\n\
  - (id)initWithUTF8String:(const char *)nullTerminatedCString;\n- (id)initWithString:(NSString\
  \ *)aString;\n- (id)initWithData:(NSData *)data encoding:(NSStringEncoding)encoding;\n\
  - (id)initWithBytes:(const void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding;\n\
  - (id)initWithBytesNoCopy:(void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding\
  \ freeWhenDone:(BOOL)freeBuffer;\n```\n\n尽管一个类可能有相当数量的初始化方法，但始终存在一个特定版本被标记为**指定初始化方法**。这是\
  \ `init` 或 `initWith` 方法的一个版本，负责对该类的对象执行完整的初始化，并调用父类的初始化方法。客户端可以调用该类的其他 `init` 方法，但这些方法最终会调用指定初始化方法来完成整个初始化过程。\n\
  \n每当你创建一个新的子类时，必须确定指定初始化方法，并使用它来完成对父类的正确配置。通过这种方式，可以确保在子类开始运行之前，基类处于有效状态。因此，新的子类在设计时应使其明确哪个版本的\
  \ `init` 方法是默认初始化方法。\n\n例如，考虑一个用于管理图书馆的应用程序中的 `LibraryHolding` 类。该类有三个初始化方法，如下所示：\n\
  \n```\n// 文件 LibraryHolding.h\n@interface LibraryHolding : NSObject\n{\n    NSString\
  \ *patron;\n    NSString *title;\n}\n- (id)init;\n- (id)initWithPatron:(NSString*)patron;\n\
  - (id)initWithPatron:(NSString*)patron title:(NSString*)aTitle;\n@end\n```\n\n这里的指定初始化方法是第三个方法，因为它是唯一需要直接调用父类\
  \ `init` 方法的初始化方法。你可以在下面的实现中清晰地看到这一点：\n\n```\n// 文件 LibraryHolding.m\n@implementation\
  \ LibraryHolding\n\n- (id)init\n{\n    return [self initWithPatron:@\"\"];\n}\n\n\
  - (id)initWithPatron:(NSString *)aPatron\n{\n    return [self initWithPatron:aPatron\
  \ title:@\"\"];\n}\n\n- (id)initWithPatron:(NSString *)aPatron title:(NSString *)aTitle\n\
  {\n    self = [super init];\n    if (self)\n    {\n        self->patron = aPatron;\n\
  \        self->title = aTitle;\n    }\n    return self;\n}\n\n@end\n```\n\n一个有用的规则是：如果某个初始化方法拥有比其他所有方法都多的参数，那么它通常会被选为指定初始化方法，因为它可以用来模拟其他初始化方法。现在，假设你想创建一个名为\
  \ `PeriodicalHolding` 的派生类，用于表示杂志和报纸等期刊。以下是其可能的接口：\n\n```\n// 文件 PeriodicalHolding.h\n\
  @interface PeriodicalHolding : LibraryHolding\n{\n    int issue_number;\n}\n- (id)initWithTitle:(NSString*)aTitle\
  \ number:(int)aNumber;\n- (id)initWithPatron:(NSString*)patron title:(NSString*)aTitle\
  \ number:(int)aNumber;\n@end\n```\n\n以下是相应的实现：\n\n```\n// 文件 PeriodicalHolding.m\n\
  @implementation PeriodicalHolding\n\n- (id)initWithTitle:(NSString*)aTitle number:(int)aNumber\n\
  {\n    return [self initWithPatron:@\"\" title:aTitle number:aNumber];\n}\n\n- (id)initWithPatron:(NSString*)aPatron\
  \ title:(NSString*)aTitle number:(int)aNumber\n{\n    self = [super initWithPatron:aPatron\
  \ title:aTitle];\n    if (self)\n    {\n        self->issue_number = aNumber;\n\
  \    }\n    return self;\n}\n\n@end\n```\n\n再次注意，指定初始化方法仍然是参数最多的那个。第二个初始化方法只是用所需的参数调用指定初始化方法。\n\
  \n\n\n## 替换原则\n\n当系统中的某个类继承自另一个类时，它不仅享有一项特权，还承担着一项义务。主要特权是继承基类提供的非私有接口和实现。因此，派生类可以在任何可以使用基类的上下文中使用。例如，`HourlyEmployee`\
  \ 实际上是一种 `Employee` 对象。因此，只要需要 `Employee` 对象，它就可以被使用：如果一个对象期望接收一个 `Employee` 并向其发送消息，那么它也应该能够对\
  \ `HourlyEmployee` 执行同样的操作。\n\n另一方面，继承要求子类承担一项责任：它们需要能够满足基类设定的期望。例如，如果基类声明它可以计算员工薪水，那么子类也需要能够做到这一点。\n\
  \n```\n// 文件 Employee.h\n\n@interface Employee : NSObject\n\n{\n       NSString\
  \ *name;\n}\n\n- (void) setName:(NSString*) aName;\n- (double) calculateSalary;\n\
  - (void) provideJobEvaluation;\n\n@end\n```\n\n但是，如果新的子类 `HourlyEmployee` 有另一种计算薪水的方式，会发生什么？简单的解决方案就是覆盖\
  \ `calculateSalary` 方法并提供新的实现。\n\n```\n// 文件 Employee.m\n\n@implementation Employee\n\
  \n- (void) setName:(NSString*) aName\n{\n       self->name = aName;\n}\n\n- (double)\
  \ calculateSalary\n{\n       double salary = 0;\n       // 执行薪水计算\n       return\
  \ salary;\n}\n\n- (void) provideJobEvaluation\n{\n}\n\n@end\n```\n\n这样做是继承的有效用法。但反过来，假设\
  \ `HourlyEmployee` 类无法计算薪水。例如，假设薪水是基于佣金的，而该类要到明年年初才能获得这些佣金。当这种情况发生时，基类定义的契约就被打破了，子类将难以模仿其超类。例如，以下是\
  \ `calculateSalary` 实现的两种选择：\n\n```\n- (double)calculateSalary\n{\n   return 0;\n\
  }\n```\n\n```\n- (double)calculateSalary\n{\n       @throw [NSException exceptionWithName:@\"\
  salaryException\"\n                                      reason:@\"no salary available\"\
  \n                                    userInfo:NULL];\n}\n```\n\n在第一种情况下，应用程序将接收到一个错误的值，因为按小时计酬的员工显然不会拿到零薪水。在第二种情况下，方法抛出异常后，应用程序无法继续运行。在这两种情况下，结果都不是客户端对\
  \ `Employee` 对象所期望的。这意味着 `SalaryEmployee` 不适合作为 `Employee` 的子类。\n\n替换原则指出，当一个类派生自一个基类时，子类的对象应该能够在任何需要的情况下替换基类的对象。正如你所见，`HourlyEmployee`\
  \ 类不符合这个通用原则。它无法像原始类那样响应对 `calculateSalary` 消息。因此，在这种情况下，最好避免直接使用继承。一种可能的解决方案是将薪水计算的责任拆分到一个单独的类中，这样原始类就可以响应诸如\
  \ `canCalculateSalary` 之类的消息。总之，有必要考虑子类是否真的能在任何使用基类的上下文中使用，如果不行，则需要进行必要的设计变更。\n\n\
  ## 类簇\n\n类簇是一组通过继承关联的类，它们为某个功能提供了一个完整的实现，该功能的实现可能因所使用的具体类型而异。类簇的主要特点是，层级结构中只有顶部的单个类对客户端可见。簇中的所有其他类都是隐藏的，因此无法直接实例化它们。相反，簇中的具体类必须通过主接口来创建，主接口通常包含\
  \ `init` 方法以及类方法，这些方法可以针对每种情况返回正确的对象。\n\n类簇提供了一种强大的方法来控制维护和暴露层级结构中大量相关类的复杂性。使用类簇时，你不需要知道实现所需功能的正确版本的确切类名。簇的基类将与派生类协作，以创建满足你需求的确切对象。另一方面，从簇的主类派生出来的类负责实现与本地存储交互的方法的具体版本。在簇的具体实现中需要被覆盖的方法称为原始方法，因为它们提供了类簇用于实现其他高级功能的原始功能。\n\
  \n通过一个用例可以更容易地理解这个定义。假设一个类可以采用两种或多种功能配置，并使用独立的数据存储来决定这些类将如何运作。此外，该类为每种配置提供了公共接口，因此可以统一访问它们。在这种情况下，可以组织这些类，使得只有基类是可见的，而具体功能由其子类实现。\n\
  \n类簇被认为是 Objective-C 中的一种基本设计模式。Foundation 框架中类簇的一个典型例子是 `NSNumber`。虽然它对客户端来说表现为一个单一的类，但\
  \ `NSNumber` 的实际实现恰好包含一个类簇，其中主要的抽象类充当具体类的包装器，负责处理对象的状态。例如，在 `NSNumber` 簇的具体类中，你会找到整数、浮点数和布尔值的实现模型。\n\
  \n使用类簇很简单，因为程序员无需知道类初始化器创建的是哪个类。在 `NSNumber` 的例子中，有许多初始化方法，例如命名为 `initWithInteger:`、`initWithFloat:`\
  \ 和 `initWithChar:` 的方法。这些方法返回一个能够正确表示其存储数据的对象。但是，返回对象的确切子类对用户是隐藏的。\n\n从创建新类簇的角度来看，必须考虑一些实际问题。首先，抽象基类的公共接口必须是客户端与簇中其他类之间唯一的联系点。因此，簇中基类的接口必须包含所有用于与簇中任何成员交互的方法。在抽象类的方法中，你会找到原始方法，这些方法需要在每个派生类中实现。第二类方法，即派生方法，包含那些在基类中实现并在其定义中使用原始方法的方法。因此，这些方法不需要在具体类中被覆盖。\n\
  \n从簇的抽象根类派生的类需要提供自己的实例变量用于数据存储。簇中的抽象类在设计上没有本地存储，因为每个具体类可能有不同的数据存储方式。\n\n\n\n###\
  \ 类簇的另一个示例\n\n另一个类簇的示例可以在集合类中看到，例如 `NSArray`。当你调用 `init` 时返回的对象实现了 `NSArray` 的接口，但它可能来自簇中的不同子类，包括\
  \ `NSMutableArray`；这完全取决于 `NSArray` 构造器如何执行对象初始化任务。如你稍后将看到的，类簇是一种通用策略的示例，用于在库或大型应用程序中向其他客户端隐藏实现细节信息。\n\
  \n## 防止子类化\n\n最后，尽管本章讨论的子类化有许多优点，但其错误使用也可能导致合理的问题。因此，在某些情况下，可能有必要阻止对少数特定类进行继承；换句话说，你可能希望阻止一个类成为另一个类的基类。\n\
  \n> **注意**\n> \n> 继承的主要缺点之一就是现在所谓的脆弱基类问题。在创建类层次结构时，类通常会使用父类提供的实现信息。然而，不存在所谓完美的设计，对基类的修改最终可能是必要的。这种修改可能会导致依赖这些内部细节的子类停止工作。一个好的层次结构设计应尽量减小这种可能性。\n\
  \n某些语言通过从继承的角度将特定类标记为不可变来直接支持此特性。例如，在 Java 中，可以使用 `final` 关键字标识一个类，这样在应用此语法注解后，开发人员就不允许继承它。在较新的语言中，C#\
  \ 也允许这种类之间的区分。\n\nObjective-C 的设计者决定不添加避免继承的机制。这个选择很可能是为了保持语言的简洁性，或许也因为这个特性并不常用。然而，即使没有像\
  \ Java 中的 `final` 关键字那样的直接支持，仍然可以采取一些措施来防止一个类被子类化。\n\n你可以使用的通用策略涉及降低类的可见性。这里的原理是，你不能子类化一个存在于应用程序中但客户端在编译时无法看到的类。因此，例如，你可以创建一个类，但从不为其提供头文件。在这种情况下，该类只能通过外部接口（如协议或抽象类）访问，但类的内部细节永远不可访问。\n\
  \n让我们看看如何实现这样一个不可继承的类。首先，考虑类 `ConcreteMatrix`。它有很多用于存储矩阵的数据，以及诸如维度、最大条目和其他实用方法等特殊细节。\n\
  \n```objc\n@interface ConcreteMatrix2 : NSObject\n{\n    double *contents;\n   \
  \ int size;\n    // other ivars here\n}\n- (void) initializeMatrix:(double *)vector\
  \ size:(int)size;\n- (void) performMatrixOperation;\n// other methods here\n@end\n\
  ```\n\n尽管这是一个通用类，应该可供整个应用程序使用，但该类的内部耦合非常紧密，以至于很难创建正确的子类。要做到这一点，程序员需要了解类的内部详细信息，例如使用的实例变量以及它们何时应该更新等。因此，虽然你希望尽可能广泛地使该类可用，但你并不打算允许它的子类。\n\
  \n解决方案是避免提供对该类的任何直接访问。然而，你仍然希望功能对客户端可访问。因此，你创建一个类，为想要隐藏的对象提供合适的接口。这个外部对象对其他部分可见，但它除了指向实际实现功能的对象的引用外，不包含其他任何东西。\n\
  \n```objc\n// file AbstractMatrix.h\n@interface AbstractMatrix : NSObject\n- (void)\
  \ initializeMatrix:(double *)vector size:(int)size;\n- (void) performMatrixOperation;\n\
  + (AbstractMatrix*) getMatrix;\n@end\n```\n\n现在，无需了解类内部的任何信息即可使用此版本。请注意，你移除了所有内部数据存储，并添加了一个返回\
  \ `AbstractMatrix` 类型新对象的类方法。作为创建抽象类的副作用，你现在需要一个像 `getMatrix` 这样的方法来返回一个新的矩阵对象。这是必要的，因为\
  \ `AbstractMatrix` 本身无法被实例化，因为它缺少某些方法的实现。\n\n另一方面，原始的具体类可以隐藏在实现文件中。然而，它仍然需要继承自抽象类，以便提供相同的接口。\n\
  \n```objc\n@interface ConcreteMatrix : AbstractMatrix\n{\n    double *contents;\n\
  \    int size;\n    // other ivars\n}\n- (void) initializeMatrix:(double *)vector\
  \ size:(int)size;\n- (void) performMatrixOperation;\n// other methods here\n@end\n\
  ```\n\n方法 `getMatrix` 将负责创建一个 `ConcreteMatrix` 并将其返回给用户。\n\n```objc\n@implementation\
  \ AbstractMatrix\n+ (AbstractMatrix*) getMatrix\n{\n    return [[ConcreteMatrix\
  \ alloc] init];\n}\n// other implementation methods here\n@end\n```\n\n现在，一个类可以使用诸如\
  \ `[AbstractMatrix getMatrix]` 这样的代码来创建 `ConcreteMatrix`。`AbstractMatrix` 接口上列出的所有功能对他们都可用，尽管他们无法访问\
  \ `ConcreteMatrix` 的内部。\n\n> **注意**\n> \n> 此示例使用的机制与类簇采用的机制类似，尽管这里的目标只是保护提供具体实现的单个类，而不是提供一组符合相同抽象接口的类。\n\
  \n\n\n## 多重继承\n\n在前几节中，你接触到的概念被称为单继承，这是一种子类化方式，即新类只能有一个父类。Objective-C 以及 Java 和\
  \ Smalltalk 等其他面向对象语言仅支持单继承。而 C++ 等其他语言则可以从多个父类派生出新类。这种子类化方式被称为多重继承。\n\n由于在单继承下创建新类时只允许有一个超类，因此生成的层级结构呈树形，初始基类位于树的根部。然而，在使用多重继承的语言中，层级结构更像一个由类构成的连接网络，这些类可以从两个或更多来源获取数据和方法实现。\n\
  \n在 Objective-C 中，无法创建这样的继承连接网络。原因之一是避免可能影响动态消息派发的开销。试想一下，查找方法实现时，不再需要只在单个类树中查找，而是要在多个不相关的祖先类中查找。\n\
  \n不过，有一些方法可以模拟多重继承的某些便利性。最常用的方法是使用形式化协议来定义类应提供的额外功能。例如，假设你想创建一个具有两种职责的类：既是一辆交通工具，又是一个居住场所。以下是这些职责的列表：\n\
  \n```\n// 文件 Vehicle.h\n@interface Vehicle\n- (void) drive;\n@end\n\n// 文件 LivingPlace.h\n\
  @interface LivingPlace\n- (void) setAddress:(NSString *)address;\n@end\n```\n\n\
  现在，假设你想定义一个代表船的类，它既是一个`Vehicle`，也是一个`LivingPlace`。你目前面临的问题是 Objective-C 类只能有一个超类。你需要做的第一件事是决定将`Vehicle`还是`LivingPlace`作为`Boat`的基类。另一个问题是如何将第二个类的功能添加到你的新子类中。我将在下一节讨论这个问题的潜在解决方案。\n\
  \n## 模拟多重继承\n\n一种可能的解决方案是将`LivingPlace`设为一个协议，而不是一个类。这样一来，`LivingPlace`可以拥有一个固定的接口，该接口可由任意数量的类实现，即使它们不处于单一层级结构中。以下是该协议的定义：\n\
  \n```\n// 文件 LivingPlace.h\n@protocol LivingPlace\n- (void) setAddress:(NSString\
  \ *)address;\n@end\n```\n\n然后，`Boat`可以定义为派生自`Vehicle`的类，同时实现`LivingPlace`协议。\n\n\
  ```\n@interface Boat : Vehicle <LivingPlace>\n{\n    NSString *_address;\n}\n@end\n\
  \n@implementation Boat\n- (void) setAddress:(NSString *)address\n{\n    self->_address\
  \ = address;\n}\n@end\n```\n\n这个解决方案将解决使用单继承时的问题，但仍然无法提供多重继承的全部功能。毕竟，`LivingPlace`协议只是一个定义良好的接口，没有任何关联的实现。当一个类实现该协议时，它必须为目标功能提供代码。\n\
  \n如果你不仅想提供接口，还想提供默认实现，一个可行的解决方案是为该协议创建一个具体的实现类，供其他类使用。客户端类可以通过创建该默认类的新实例并将其保存为实例变量供后续使用，从而利用这种默认实现。\n\
  \n```\n// DefaultLivingPlace.h\n@interface DefaultLivingPlace : NSObject <LivingPlace>\n\
  {\n    NSString *_address;\n}\n@end\n\n// DefaultLivingPlace.m\n@implementation\
  \ DefaultLivingPlace\n- (void) setAddress:(NSString *)address\n{\n    self->_address\
  \ = address;\n}\n@end\n```\n\n现在，每当某个类需要实现`LivingPlace`协议时，它都可以依赖默认实现来提供标准方法。\n\n\
  ```\n@interface Boat : Vehicle <LivingPlace>\n{\n    NSString *_address;\n    DefaultLivingPlace\
  \ *livingPlaceImp;\n}\n@end\n```\n\n接口的方法仍然需要在类中定义。然而，现在的实现可以简化为一个消息调用，将该消息转发给默认实现。\n\
  \n```\n@implementation Boat\n- (void) setAddress:(NSString *)address\n{\n    [self->livingPlaceImp\
  \ setAddress:address];\n}\n@end\n```\n\n## 继承与委托\n\n在这个例子中，你使用了实现成员变量，而非继承，来提供新的编码特性。这展示了继承与组合之间更普遍的对立关系。在第一种情况下，对象之所以能获得某些功能，是因为它从基类继承了这些功能。在第二种情况下，功能由外部对象提供，并通过实例变量来访问。虽然继承是提供功能的一种更丰富的方式，但事实证明，通过委托进行组合在某些方面更灵活，原因如下：\n\
  \n- 两个类之间无需深层关联：使用继承时，子类可以访问超类的许多细节，例如受保护的变量和方法，这些对外部客户类是不可访问的。当基类发生变化时，这会产生一些问题。使用委托时，你无需担心实现类与其客户类之间的关联，因为你可以依赖语言提供的机制来避免不必要的访问。\n\
  - 一个类可以自由地根据需要包含任意数量的对象：因此，一个类可以接收消息，并根据需要将其转发给任何合适的对象。然而，使用继承时，只能有一个超类。\n\n这意味着你不需要直接继承也能享受代码复用的好处。另一方面，委托提供了一些额外的好处，可能会提高代码的灵活性，甚至更容易处理那些通常需要通过多重继承解决的问题。\n\
  \n## 总结\n\n在本章中，你探讨了类继承，这是面向对象编程中最重要的概念之一。Objective-C 为继承提供了出色的支持，学会运用这些可能性将帮助你设计更好的类，同时更有效地使用\
  \ Foundation 及其他框架。你已经了解了继承如何通过将实用方法组装到基类中，并在后续通过子类化机制复用它们来帮助避免代码重复。\n\n继承还催生了一些\
  \ Objective-C 中常用的模式。例如，你已经了解了类簇如何允许程序员将具体类隐藏在一个由抽象类定义的统一外观之下。Foundation 框架中的类（包括`NSNumber`和`NSArray`）经常使用这种技术。\n\
  \n在某些情况下，你可能不希望从你的基类中创建新类。这样做可以避免你的方法与第三方代码之间的不必要耦合。通过应用本章中回顾的一些策略，例如使用符合明确定义协议的委托，可以阻止子类的创建。\n\
  \n在下一章中，你将探索块语法，这是 Objective-C 的一个独特特性，允许你的代码直接引用任意代码块。使用块，你可以简化一些原本需要大量样板代码的操作，同时使用一种优雅的方法来传递代码。\n\
  \n\n\n"
- "# 6. 块\n\n## 摘要\n\nObjective-C 的总体目标之一是通过使用面向对象概念来减少编写复杂应用程序所需的工作量，这有助于简化和阐明编程实体之间的关系。在本章中，你将学习如何创建和使用`blocks`，这是一种使语言更易于使用且更具表现力的语法特性。\n\
  \n`block`是一段可以在应用程序其他部分传递的代码，无需创建单独的函数、方法或类。此外，`block`不仅保留了包含在其中的代码信息，还保留了创建`block`时作用域内的变量信息。这样，`block`就类似于闭包的概念，这在其他编程语言（如`Python`和`Ruby`）中是可用的。在`Java`中，类似的功能将由匿名类提供，而在`C++`中则由`lambda`函数提供。\n\
  \n通过定义`blocks`，你可以使某些算法的操作更具扩展性，因为客户端现在可以通过`block`参数提供实现的关键部分。由于这些特性，`blocks`在`Objective-C`程序中有广泛的适用性。例如，你也可以使用`blocks`实现能在并行线程中无缝运行的多处理代码，正如目前一些`Objective-C`库所实现的那样。\n\
  \n在本章中，你首先将学习`blocks`的基本概念。然后，你将了解更多关于从`block`内部访问变量的信息，包括局部变量和实例变量。接着，我将讨论影响`blocks`内存分配的问题，以及在创建它们的上下文之外访问它们的问题。最后，你将看到一些在你的应用程序中以及`Foundation`框架的类中使用`blocks`的示例。\n\
  \n## 介绍 Blocks\n\n`block`是一组可以由程序操作指令。例如，`block`可以保存在变量中，并在需要时执行。`block`表面上可以比作函数指针，因为两者都提供了存储和执行代码的机制。然而，这两个概念之间有一些重要的区别。\n\
  \n`blocks`和函数指针之间的第一个区别是，`block`字面量可以在任何可执行语句出现的位置声明。因此，例如，`block`可以在函数中间声明，或者作为方法调用的一部分。这对于函数来说是不可能的，因为它们不能嵌套：根据`C`语言的规则，函数只能在实现文件的顶层声明。\n\
  \n`blocks`和函数指针之间的第二个区别也是使用`blocks`的最大优势之一。`block`可以捕获定义它的上下文中活动的任何变量的值和地址。例如，`block`可以使用在方法中声明的局部变量，即使在原始方法本身的执行完成之后也是如此。这个属性也是闭包的定义属性之一，闭包是一种在函数式语言中效果显著的编程结构。\n\
  \n`blocks`的这些特性允许创建一些有趣的算法，否则很难用同样的简洁性来复制。例如，`blocks`可以用来模拟对复杂数据类型（如`for`循环）的控制结构的使用。它们也可以用来为排序过程提供替代代码，你将在本章后面看到。\n\
  \n## 声明 Blocks\n\n`blocks`可以存储在变量中。要声明一个`block`变量，你需要使用类似于声明函数指针的表示法。但是，你使用`^`字符而不是星号来标记它的定义。这是一个将在下一段中解释的简单示例：\n\
  \n```\n- (void) simpleBlock\n{\n    int (^b)(int); // 声明一个 block 变量\n    b = ^ int\
  \ (int a) // 创建一个 block 并将其存储在 b 中\n    {\n        return a + 1;\n    };\n}\n```\n\
  \n要使用`block`作为变量或方法声明的一部分，首先需要声明你感兴趣使用的`block`类型。如前所述，`blocks`与函数指针相关，因为它们都提供了引用可执行代码段的方法。因此，它们使用类似的声明风格是很自然的。然而，`blocks`有一些语法上的细微差别，你将在下面看到。\n\
  \n要声明一个变量持有`block`，你需要使用插入符表示法。在这种表示法中，变量的名称出现在`^`字符之后并在括号内，位于通常函数名称出现的位置。例如，要声明一个接收两个整数并返回`double`的`block`，你将使用以下声明：\n\
  \n```\n- (void) divisionBlock\n{\n    double (^division)(int, int); // 声明一个 block\n\
  \    // 在此处使用 block...\n}\n```\n\n在定义了`block`变量之后，下一步逻辑是设置其值以持有一个新的`block`。你可以使用`block`字面量来完成，语法如下所示：\n\
  \n```\n- (void) divisionBlock\n{\n    double (^division)(int, double); // 声明一个 block\n\
  \    division = ^ double (int a, double b) // 将 block 保存到变量中\n    {\n        return\
  \ a / b;\n    };\n}\n```\n\n在这里，你将`division`变量的值设置为持有插入符后面的`block`。注意，`block`的定义方式也与函数的实现方式非常相似，不同之处在于其定义可以直接出现在将要使用它的位置，就像其他字面值一样。\n\
  \n虽然上述表示法与函数定义差别不大，但`block`语法提供了一些简化，可以大大减少你在这些情况下需要编写的代码量。例如，如果某些定义元素从上下文中变得清晰，则可以省略它们。第一个可以省略的是返回类型，因为编译器可以从返回值本身获取该信息。\n\
  \n```\n- (void) divisionBlock\n{\n    double (^division)(int, double);\n    division\
  \ = ^ (int a, double b)\n    {\n        return a / b;\n    };\n}\n```\n\n其次，如果参数列表为空，则可以省略参数列表。也就是说，如果没有参数传递给`block`，则不需要额外的括号。这是一个示例：\n\
  \n```\n- (void) getPI\n{\n    double (^f)(); // 声明一个新的 block\n    f = ^ {\n    \
  \    return 3.14;\n    };\n}\n```\n\n这段代码定义了一个新的`block`变量`f`，然后向其分配一个返回代表数学常数 Pi\
  \ 的字面数字的`block`。\n\n要调用由`block`定义的代码，可以使用与函数相同的方式来使用`block`变量的名称。\n\n```\n- (void)\
  \ divisionBlock\n{\n    double (^division)(int, double); // 声明一个 block\n    division\
  \ = ^ (int a, double b) // 将 block 保存到变量中\n    {\n        return a / b;\n    };\n\
  \    double result = division(1, 2);\n    NSLog(@\"the result is %lf\", result);\
  \ // 将会打印 0.5\n}\n```\n\n\n\n### 理解复杂块声明\n\n块不仅可以存储在局部变量中，还可以用作函数或方法的参数，甚至可以作为返回值。在这种情况下，块的声明会变得越来越复杂。例如，以下是一个与你之前见过的类似块作为参数的用法：\n\
  \n```\n- (void) useBlock:(double (^)(int, int))aBlock\n{\n        aBlock(1, 2);\n\
  }\n```\n\n你可以通过将 `(^)` 字符视为定义块，而周围的类型则是返回值和参数类型来解读此声明。与 Objective-C 方法中的任何其他参数一样，它们被包裹在一对圆括号内，后跟参数的正式名称，在此例中名为\
  \ `aBlock`。\n\n最后，是一个如何声明返回块的方法示例：\n\n```\n- (double (^)(int, int)) returnABlock\n\
  {\n        // 在此处返回块\n}\n```\n\n解读此类声明的过程与我在之前示例中解释的类似。然而，你会注意到，随着参数和返回值数量的增加，这可能会变得相当复杂。简化此过程的一种方法是使用\
  \ C 语言提供的 `typedef` 机制。\n\n`typedef` 只是较长类型声明的一种快捷方式。然而，尽管引入了一个新名称，但使用 `typedef`\
  \ 声明的类型在实际应用中与原始名称完全相同。`typedef` 的一个简单用法如下：\n\n```\ntypedef int MyNewIntType;\n\
  ```\n\n在这种情况下，`MyNewIntType` 现在可以像预期使用 `int` 类型一样，在任何地方用作类型名称。然而，`typedef` 的一个更好用途是简化复杂的块（以及函数指针）变量声明。以下是改进前一个示例的方法：\n\
  \n```\ntypedef double (^MathBlock)(int, double);\n\n- (void) divisionBlock\n{\n\
  \        MathBlock division; // 声明一个块\n        division = ^ (int a, double b)\n\
  \        {\n                return a / b;\n        };\n        double result = division(1,\
  \ 2);\n        NSLog(@\"the result is %lf\", result);\n        // 这将打印结果为 0.500\n\
  }\n```\n\n首先，这里有 `typedef` 语句，它将 `MathBlock` 声明为块类型的新名称。通常，在 `typedef` 表达式中，类型的新名称出现在变量名通常出现的位置。声明\
  \ `MathBlock` 后，你可以在任何需要该类型名称的地方使用它。使用 `typedef` 的主要优点是无需重新键入像这样复杂的块定义。此外，它还使得在声明同一定义行上初始化块变得更加容易。例如，上述示例也可以写成：\n\
  \n```\n- (void) divisionBlock\n{\n        MathBlock division = ^ (int a, double\
  \ b)\n        {\n                return a / b;\n        };\n        double result\
  \ = division(1, 2);\n        NSLog(@\"the result is %lf\", result);\n        //\
  \ 这将打印结果为 0.500\n}\n```\n\n这允许你在此行声明时同时初始化该块。同一个 `typedef` 也可以用于方法参数的声明。因此，前一个示例可以重写为以下方式：\n\
  \n```\ntypedef double (^DoubleIntIntBlock)(int, int);\n\n- (void) useBlock:(DoubleIntIntBlock)aBlock\n\
  {\n        aBlock(1, 2);\n}\n```\n\n并且返回值也类似：\n\n```\n- (DoubleIntIntBlock) returnABlock\n\
  {\n  // 在此处返回块\n}\n```\n\n## 将块作为参数传递\n\n如你所见，创建接收块作为参数的函数方法很容易。同样，将块作为参数传递给函数或方法也相对直接。例如，考虑之前定义的方法：\n\
  \n```\n- (void) useBlock:(DoubleIntIntBlock)aBlock;\n```\n\n要使用这样的方法，你可以先定义一个变量并将其作为参数传递，如下所示：\n\
  \n```\n- (void) callBlockMethod\n{\n        DoubleIntIntBlock myBlock;\n       \
  \ myBlock = ^ double (int a,int b)\n        {\n                NSLog(@\"传入的值是 %d\
  \ 和 %d\", a, b);\n                return 1.0 + a + b;\n        };\n        [self\
  \ useBlock:myBlock];\n}\n```\n\n另一种方法是直接将块用作消息调用的一部分。\n\n```\n- (void) callBlockMethod\n\
  {\n        [self useBlock:^ double (int a,int b)\n        {\n                NSLog(@\"\
  传入的值是 %d 和 %d\", a, b);\n                return 1.0 + a + b;\n        }];\n}\n```\n\
  \n在这里，你定义了一个未命名的块，并立即将其用作方法调用的唯一参数。该块作为参数传递给 `useBlock:` 方法，该方法可以直接调用它或保存起来以供后续使用。\n\
  \n\n\n## 访问外部变量\n\n块（block）区别于标准函数指针的特性之一，就是块可以访问其所在代码封闭区域中的变量。这极大简化了块的使用，因为无需通过函数参数或额外类来复制变量值。块默认对局部变量或实例变量具有只读访问权限（这些变量需在定义位置可访问）。通过使用特殊关键字`__block`，也可以修改此类变量。最简单的数据访问情形是对局部变量的只读访问。创建块时无需程序员额外操作即可实现。\n\
  \n```\n- (void) showReadAcccess\n\n{\n        int myVariable = 2;\n        int (^getMultiple)();\n\
  \        getMultiple = ^ {\n           return 5 * myVariable ;\n        };\n   \
  \     NSLog(@\"结果如下: %d\", getMultiple());\n        // 这将打印值 10\n}\n```\n\n在本例中，声明了一个名为`myVariable`的整型变量。随后定义了一个名为`getMultiple`的块，它返回`myVariable`中存储值的倍数。调用该块后，日志窗口会显示计算结果。\n\
  \n对于定义函数的类中的实例变量，也可以实现类似的数据访问。例如，考虑以下类声明，其中包含一个整型实例变量：\n\n```\n// 文件 Blocks.h\n\
  @interface Blocks : NSObject\n{\n        int _myIntValue;\n}\n- (void) callBlockMethod;\n\
  @end\n```\n\n对应的实现如下：\n\n```\n- (void) showInstVarReadAcccess\n{\n        _myIntValue\
  \ = 3;\n        int (^getMultiple)();\n        getMultiple = ^ {\n           return\
  \ 6 * _myIntValue ;\n        };\n        NSLog(@\"结果如下: %d\", getMultiple());\n\
  \        // 这将打印值 18\n}\n```\n\n该方法实现与前例类似，但这次展示了块如何轻松访问类中的实例变量`_myIntVariable`。当然，在类内部调用块时实现这一点并不令人惊讶，但请考虑以下场景：\n\
  \n```\n// 文件 UseBlock.h\n@interface UseBlock : NSObject\n{\n        int _myIntValue;\n\
  }\n- (void) receiveBlock:(int (^)())aBlock;\n@end\n\n// 文件 UseBlock.m\n@implementation\
  \ UseBlock\n- (void) receiveBlock:(int (^)())aBlock\n{\n        NSLog(@\"结果现在是:\
  \ %d\", aBlock());\n}\n@end\n```\n\n该类设计用于接收块并调用它，而不需要了解块来源的任何信息。现在来看看如何使用这个类。\n\
  \n```\n- (void) showVariableReadAcccess\n{\n        _myIntValue = 3;\n        int\
  \ myVariable = 2;\n        UseBlock *useBlock = [[UseBlock alloc] init];\n     \
  \   [useBlock receiveBlock:^\n        {\n                return 5 * myVariable +\
  \ 2 * _myIntValue;\n        }];\n}\n```\n\n运行此方法时，会执行一个同时引用局部变量和实例变量的块。即使`UseBlock`类完全不了解这些变量的位置和内容，它仍然能够执行所要求的指令。\n\
  \n块之所以能够访问局部数据（无论调用上下文如何），是因为 Objective-C 通过运行时系统处理块的方式。在运行时，块与其他对象一样是一个对象，编译器会隐式设置数据访问，使其指向仅块对象知晓的对象实例变量。块语法提供了一种简单方式来声明能够访问其他对象中存储数据的复杂对象。\n\
  \n### 局部变量的读写访问\n\n如之前示例所示，块对局部变量提供的是标准的只读访问。块访问的变量仅是创建块时当前方法或函数中存储值的副本。不过，Objective-C\
  \ 也通过`__block`关键字提供了修改此类值的机制。\n\n使用`__block`关键字会强制编译器不仅创建数据副本，还会创建一个引用，该引用可用于修改与局部变量中存储的相同对象或值。\n\
  \n修改之前的示例可以轻松展示这一区别。\n\n```\n- (void) showWriteAcccess\n{\n        __block int myVariable\
  \ = 2;\n        int (^getMultiple)(int);\n        getMultiple = ^ (int base)\n \
  \       {\n                myVariable = base;\n                return 5 * myVariable\
  \ ;\n        };\n        NSLog(@\"结果如下: %d\", getMultiple(3));\n        // 这将打印值\
  \ 15\n}\n```\n\n这是一个类似的示例，其中块内引用了局部变量。但这次块还负责修改局部变量中存储的值。与前例不同，块中存储的代码现在需要对局部变量具有写入权限。这一意图通过\
  \ Objective-C 关键字`__block`明确表示，该关键字添加在`myVariable`声明之前。\n\n编译器处理这段代码时，底层机制是：该变量的共享副本变得对块以及任何需要读写权限的语句都可用。无论块在何种上下文中被调用（包括在其他类的方法中），它都可以使用该局部变量的共享引用。\n\
  \n然而，当对实例变量进行修改时，无需直接在变量定义中添加`__block`。当块需要更新实例变量时，编译器会自动存储对该对象的引用。\n\n注意\n\n上述共享局部变量和实例变量的机制，在其他语言中被称为闭包。例如，在\
  \ Python、Ruby 或 Lisp 中，可以创建闭包，即引用其声明点活跃变量的代码段。Objective-C 块在实现相同目标的同时，还保留了 C 语言固有的类型检查。\n\
  \n\n## 块与内存管理\n\n块为程序员提供了极大的灵活性，他们需要额外的工具来组织代码实现。例如，使用块可以更轻松地在类之间共享行为，而无需创建单独的对象。然而，如果使用不当，这种灵活性可能会导致难以调试的细微问题。\n\
  \n一个可能让新手程序员感到困惑的问题是块的作用域。虽然块可以在程序的其他位置使用，但这并不意味着块中的所有内存都会被自动管理。主要问题在于，块的创建和使用也涉及对其关联内存的管理。虽然\
  \ Objective-C 可以自动为块内部访问的数据设置必要的引用，但它并不直接管理内存。\n\n块内存管理的问题有时可能令人困惑。主要问题出现在有人试图在创建块的执行作用域之外访问它时。例如，考虑在`if`语句内部创建的块（在`for`、`while`、`do`/`while`中声明的块也同样适用）。\n\
  \n```\n- (double) invalidBlock:(BOOL)initBlock :(BOOL)callBlock :(int)x1 :(int)x2\n\
  {\n    double (^division)(int, double) = nil;\n\n    if (initBlock)\n    {\n   \
  \     division = ^ double (int a, double b)\n        {\n            return a / b;\n\
  \        };\n    }\n\n    if (initBlock && callBlock)\n    {\n        return division(x1,\
  \ x2); // 这行不通。\n    }\n\n    return 0;\n}\n```\n\n这个方法的意图很明确：根据传入的参数初始化并创建一个块。如果两个参数都为真，则调用该块并返回结果。\n\
  \n然而，问题在于块变量（`division`）是在一组语句（由`if`语句定义）内部初始化的，而这组语句在调用该块时已经结束。由于块的默认存储位于程序栈上，其关联的内存在`if`语句结束时被释放。这意味着当调用块变量`division`时，它是无效的。\n\
  \n出于性能原因，块的内存是在栈上分配的。但是，也可以创建块的动态分配副本。这可以通过与复制系统中任何其他对象相同的方式来实现，即调用`copy`方法。\n\n\
  ```\n- (double) callValidBlock:(BOOL)initBlock :(BOOL)callBlock :(int)x1 :(int)x2\n\
  {\n    double (^division)(int, double) = nil;\n\n    if (initBlock)\n    {\n   \
  \     division = [^ double (int a, double b)\n        {\n            return a /\
  \ b;\n        }\n        copy];\n    }\n\n    if (initBlock && callBlock)\n    {\n\
  \        return division(x1, x2);\n    }\n\n    [division release];\n    return\
  \ 0;\n}\n```\n\n在这个版本中，现在从当前调用位置执行该块是正确的。这是可行的，因为`copy`方法会存储一个正确分配的块版本，该版本在`if`语句完成后仍然存在。但是，由于你创建了一个副本，所以需要在方法末尾调用`release`，以确保其内存被正确释放（我将在后续章节讨论内存管理的这一规则和其他规则）。\n\
  \n当方法返回一个块时，也需要采用类似的方法。由于这样的块需要在创建它的栈环境之外被访问，所以你需要返回一个有效的副本。\n\n```\n- (double (^)(int,\
  \ double)) returnBlock\n{\n    return [[^ double (int a, double b)\n    {\n    \
  \    return a / b;\n    }\n    copy] autorelease];\n}\n```\n\n这个示例类似，但由于你要将块返回给调用方，因此还需要调用`autorelease`方法，它会在对象不再使用时自动处理其关联内存的释放。\n\
  \n## 在 Foundation 框架中使用块\n\n在自己的应用中使用块，可以为你带来很多简化代码、减少实现特定目标所需类数量的机会。然而，在处理 Cocoa\
  \ 库时，块也同样有用。在本节中，我将展示几个使用块与 Foundation 框架交互的示例。\n\n块的一个良好应用是在一组元素上执行相似的代码。这在 Foundation\
  \ 框架的集合类中得到了体现。例如，看看`NSArray`类。如果你想确定数组中满足特定条件的元素数量，可以使用`for`循环检查数组的每个元素。或者，`NSArray`类允许你通过`indexesOfObjectsPassingTest`方法传递一个块来测试条件。\n\
  \n```\n- (void) countPositivesInArray\n{\n    NSArray *array = @[ @-1, @-2, @1,\
  \ @2, @3];\n\n    NSIndexSet *indices =\n        [array indexesOfObjectsPassingTest:\n\
  \            ^ BOOL (id obj, NSUInteger idx, BOOL *stop)\n            {\n      \
  \          NSNumber *num = (NSNumber*)obj;\n                return [num integerValue]\
  \ > 0;\n            }\n        ];\n\n    NSLog(@\"There are %d positive elements\"\
  , (int)[indices count]);\n    // 这将显示结果为 3\n}\n```\n\n注意，使用`indexesOfObjectsPassingTest`，你无需手动设置`for`循环并记录满足正数测试的元素数量，因为这些都由`NSArray`类自动完成。通常，将重复性任务委托给专门的方法是个好主意，而这正是使用块的最大优势：你可以让其他方法处理细节，同时只定义计算任务中的重要方面。\n\
  \n`sortedArrayUsingComparator`方法也演示了类似的方法。在这里，目标是在排序过程中对数组中的两个元素进行比较。基于比较结果，`sortedArrayUsingComparator`可以决定是否应该交换这两个元素的位置。在常规的排序过程中，这通常通过传递函数指针或对现有基类进行子类化来完成。然而，使用块，你可以更轻松地决定如何比较元素，而无需创建额外的样板代码。让我们看一个示例。\n\
  \n```\n- (void) sortArray\n{\n    NSArray *array = @[ @-1, @2, @100, @4, @-3];\n\
  \n    NSArray *sorted = [array sortedArrayUsingComparator:^ (id a, id b)\n    {\n\
  \        if ([a integerValue] > [b integerValue])\n        {\n            return\
  \ (NSComparisonResult)NSOrderedDescending;\n        }\n        else if ([a integerValue]\
  \ < [b integerValue])\n        {\n            return (NSComparisonResult)NSOrderedAscending;\n\
  \        }\n        else\n        {\n            return (NSComparisonResult)NSOrderedSame;\n\
  \        }\n    }];\n\n    for (id item in sorted)\n    {\n        NSLog(@\"value\
  \ is %@\", item);\n    }\n    // 这将按排序顺序打印元素\n}\n```\n\n在这个方法中，你首先对第一行可执行代码中定义的`NSArray`进行排序。然后，对原始数组调用`sortedArrayUsingComparator`方法，并向其传递一个比较块。该比较块接收两个对象作为参数，并返回一个`NSComparisonResult`，这是一个仅包含三个值的枚举。根据第一个对象与第二个对象的比较结果，你返回`NSOrderedDescending`、`NSOrderedAscending`或`NSOrderedSame`。`NSArray`的排序方法利用此信息决定两个对象是否按顺序排列。最后，`sortArray`方法打印排序后`array`的所有元素，现在这些元素应该已经按排序顺序排列了。\n\
  \n这两个取自`NSArray`的示例展示了块在 Cocoa 框架中的使用方式。这些框架中的许多其他类也在块能提供最大益处的地方使用它们：简化可以直接提供的小段代码的执行。当你探索\
  \ Cocoa 和 Cocoa Touch 库提供的功能时，你还会看到其他使用块的示例。\n\n\n## 总结\n\n在本章中，你已通过示例了解了如何在 Objective-C\
  \ 中使用块的概览。借助块，你可以创建可发送给其他方法或保存下来以便在不同于其创建上下文中稍后使用的代码片段。虽然块看起来与函数相似，并且能够模拟其他函数或实例方法，但它们是实现小段代码的一种更为简洁的方式。\n\
  \n更重要的是，块提供了一种简单高效的机制，可以隐式地与程序的其他部分共享数据（包括局部变量和实例变量）。这使得应用程序能够减少协调系统中变量访问所需的辅助代码量。如果使用块来简化数据访问看起来是解决编程问题的自然方案，你可以不用在单独的类中创建显式的方法来获取和设置数据。\n\
  \n正如你所见，块不仅对于组织自己的代码非常重要，还与 Cocoa 中的其他类进行交互。例如，Foundation 框架提供了几种方法，要求程序员使用块来完成特定任务。你已经看到了\
  \ `NSArray` 类使用这种方法的几个示例。\n\nCocoa 和 Cocoa Touch 框架中的新框架提供了更多使用块的机会。这种技术的一些应用领域包括并行编程（其中块可以以这样的方式设置，即它们可以在不同的线程中执行）或图形编程（例如，块可以用于绘制\
  \ 3D 动画序列中的场景）。\n\n在下一章中，你将深入了解 Objective-C 提供的动态绑定机制。具体来说，我将讨论如何与运行时系统交互以提高应用程序的灵活性。\n\
  \n"
- "# 7. 动态绑定\n\n## 摘要\n\nObjective-C 的最大优势之一是它允许程序员根据实际需求选择速度和灵活性的正确组合。用这种语言编写的代码可以享受编译器检查表达式和方法调用的安全性，编译器在创建可执行文件的过程中会验证每条语句。然而，许多特性是由运行时驱动的，这允许程序员将一些决策推迟到代码执行时。\n\
  \nObjective-C 的运行时系统是程序员在动态和静态编程行为之间切换的主要工具。在本章中，你将探索运行时系统提供的一些特性。你将看到程序员有很大的空间来定义如何响应发送给对象的消息。例如，通过选择器操作方法是最强大的特性之一，被高级程序员广泛使用。\n\
  \n你还将看到如何允许在运行时将消息转发给其他对象。凭借这种能力，可以设计出无缝结合两个或多个现有接口的软件。最后，你将看到如何使用这些相同的特性来提高使用 Objective-C\
  \ 消息发送机制的代码性能。\n\n## 方法选择器\n\n在 Objective-C 中创建新方法时，请记住方法由消息名、返回类型和一组形式参数定义。方法的这些元素在稍后的消息调用中被使用。当你向对象发送消息时，你隐式地告诉编译器你正在寻找哪种方法名、返回类型和参数。\n\
  \n特定消息调用所针对的方法标识在面向对象应用程序中非常重要。为了找到正确的实现，编译器首先查找已知消息的列表，并找到与请求完全匹配的那个。\n\n由于 Objective-C\
  \ 是一种动态语言，关于如何响应消息的决定是在运行时而不是编译时做出的。因此，与基于静态编译的语言（如 C++）不同，编译器需要某种方式在程序执行期间内部表示消息。这种能力通过使用选择器来提供，选择器是消息的运行时表示。选择器也可以存储为\
  \ `SEL` 类型的变量，因此可以很容易地被程序员创建和操作。\n\n从程序员的角度来看，选择器是一个标识符，可以在运行时用来确定你要寻找哪条消息。每条消息都有一个关联的选择器：你可以检索和存储该选择器，并使用它来执行消息调用。以下是你可能希望在程序中访问方法选择器的几个原因：\n\
  \n- **调用通用方法**：此功能的一个可能用途是进行通用方法调用，该调用可以根据作为参数传递的方法选择器而变化。类似于函数指针，选择器允许在不确切知道将要响应的方法名称的情况下进行方法调用。\n\
  - **存储选择器以备后用**：你的目标可能是拥有一个选择器列表，这些选择器将在稍后使用，例如响应事件。以这种方式使用的方法被称为回调。这是与 UI 应用触发的事件进行交互的常见方式，你将在后续章节中看到。\n\
  - **自省**：某些应用程序需要确定与特定类关联的方法。如果你有这种需求，选择器可能是定义类如何响应传入消息的正确方式。\n\n\n\n### 一个简单示例\n\
  \n为了更好地理解选择器的工作原理，我们先从一个在实现中使用选择器的示例类开始。\n\n```\n// 文件 Selectors.h\n@interface Selectors\
  \ : NSObject\n- (void) printValue:(id)obj;\n- (void) createSelector;\n@end\n\n//\
  \ 文件 Selectors.m\n@implementation Selectors\n- (void) printValue:(id)obj\n{\n  \
  \  NSLog(@\"打印对象的值: %@\", obj);\n}\n- (void) createSelector\n{\n    SEL sel = @selector(printValue:);\n\
  \    // 在此处使用选择器\n}\n@end\n```\n\n`Selectors` 类向您展示了一个如何为通用方法获取选择器的示例。所涉及的方法是 `printValue:`，它简单地将参数\
  \ `obj` 打印到日志窗口（当方法名后附加冒号时，如 `printValue:`，表示该方法需要一个参数）。而 `createSelector` 方法则负责获取第一个方法的选择器，并将其存储在局部变量\
  \ `sel` 中。为此，您需要使用 Objective-C 提供的一个特殊运算符，该运算符返回传递给它的消息的选择器。\n\n当您需要将现有方法转换为选择器值时，可以随时使用\
  \ `@selector` 运算符。从某种意义上说，`@selector` 返回一个类似于指针或引用的对象，因为它之后可用于标识该消息，并将其作为参数传递给代码的其他部分。\n\
  \n一旦拥有选择器，您就可以在与该类型参数兼容的方法上使用它。使用选择器最简单的方法是在特定对象上调用它。例如，可以通过 `performSelector:`\
  \ 方法来实现，如下所示：\n\n```\n// 文件 Selectors.m\n@implementation Selectors\n- (void) displayData\n\
  {\n    NSLog(@\"值为 1\");\n}\n- (void) createSelector\n{\n    SEL sel = @selector(displayData);\n\
  \    // 在此处使用选择器\n    [self performSelector:sel];\n    // 这应该会打印 \"值为 1\"\n}\n@end\n\
  ```\n\n`performSelector:` 方法能够使用提供的选择器在目标对象上触发消息调用。因此，在上面的示例中，代码行  \n`[self performSelector:sel];`\
  \  \n等同于直接调用该方法，例如：  \n`[self displayData];`\n\n显然，在这个例子中，增加这一层间接调用并没有带来任何额外的好处，但在实际应用中，选择器可能会被代码的另一部分检索到，然后作为参数传递过来。在这种情况下，当前类将无法获知目标消息的信息。这是一种常见的情况，在\
  \ Cocoa 框架的多个领域中都会遇到，您将在接下来的章节中看到。\n\n### 带参数的调用\n\n如果您想执行一个带参数的消息，那么需要使用 `performSelector:`\
  \ 方法的一个稍微修改过的版本，以便能够将所需的参数传递给目标方法。为此，您可以使用 `performSelector:withObject:` 版本，如下所示：\n\
  \n```\n// 文件 Selectors.m\n@implementation Selectors\n- (void) printValue:(id)obj\n\
  {\n    NSLog(@\"打印对象的值: %@\", obj);\n}\n- (void) createSelector\n{\n    SEL sel\
  \ = @selector(printValue:);\n    // 在此处使用选择器\n    [self performSelector:sel withObject:@\"\
  参数\"];\n    // 这应该会打印 \"对象的值是 参数\"\n}\n@end\n```\n\n这种机制在您希望允许一个类在特定事件发生时决定调用哪个消息时非常有用。例如，假设类\
  \ `MailService` 能够向其他类发送邮件。一种可能性是将目标对象保存在符合特定协议（例如 `MailReceiver`）的实例变量中。当消息可用时，便发送特定的消息，在此例中为\
  \ `onMailIsAvailable:` 消息。让我们先看看类接口会是什么样子。\n\n```\n// 文件 MailService.h\n@protocol\
  \ MailReceiver <NSObject>\n- (void) onMailIsAvailable:(id)mail;\n@end\n\n@interface\
  \ MailService : NSObject\n{\n    id <MailReceiver> _receiver;\n}\n@property(retain)\
  \ id <MailReceiver> receiver;\n- (void) processMail;\n@end\n```\n\n这里定义了 `MailReceiver`\
  \ 协议，其中包含一个名为 `onMailIsAvailable:` 的单一方法，当邮件可供处理时，`MailService` 将调用此方法。\n然后需要一个\
  \ `MailService` 的接口。该类将包含一个属性，该属性存储一个指向名为 `_receiver` 的对象的指针。符号 `id <MailReceiver>`\
  \ 表示该对象符合 `MailReceiver` 协议。该类还包含一个 `processMail` 方法，该方法执行邮件处理的主要任务。\n当调用 `processMail`\
  \ 方法时，它会检索邮件数据，并在接收者对象上调用 `onMailIsAvailable:` 消息。\n\n```\n// 文件 MailService.m\n\
  @implementation MailService\n- (void) processMail\n{\n    id myMail = nil;\n   \
  \ // 执行其他操作来初始化 myMail...\n    [_receiver onMailIsAvailable:myMail];\n}\n@end\n\
  ```\n\n在这里，您使用 `MailReceiver` 协议定义的消息将 `myMail` 数据传输给感兴趣的对象。\n\n\n\n### 使用选择器\n\n\
  到目前为止，你看到的邮件处理系统设计与前几章讨论的技术是一致的。不过，它也存在一些问题。\n\n-   它要求在类接口定义时使用协议。这在很多情况下是可行的，但并非总是如此。例如，假设你正在为现有类编写一个分类扩展。在这种情况下，你无法更改该类在其原始接口定义中实现的协议。\n\
  -   所使用的方法名称始终相同：这限制了你响应`MailService`消息的方式。例如，假设你想为不同类型的消息订阅两个`MailService`对象。在这种情况下，两个`MailService`对象都会调用同一个方法，你将很难区分这些调用。\n\
  -   它需要协议定义带来的额外复杂性。有时你可能希望使用一个更简单的解决方案，该方案可在几个类似的地方使用。消除对额外协议的需求是处理此类情况的更好方法。即使使用了非正式协议，上述两个问题依然存在。\n\
  \n使用选择器提供了另一种解决这些问题的方法，同时避免了引入新协议所带来的许多问题。简而言之，其理念是允许客户端传递一个选择器来标识目标方法。当预期的事件或条件触发时，该方法将被调用。这样，就可以有多个目标方法响应尽可能多的`MailService`对象。\n\
  \n每个`MailService`实例可以拥有不同的选择器，因此能以不同方式响应。当接收到发送给特定选择器的消息调用时，`MailReceiver`能够确定是哪个特定的`MailService`版本产生了该调用。让我们看看如何实现这种方法。\n\
  \n```objc\n// 文件 MailService.h\n\n@interface MailService : NSObject\n\n@property(retain)\
  \ id receiver;\n@property SEL selector;\n\n- (void) processMail;\n\n@end\n```\n\n\
  `MailService`接口已更新，包含一个额外的属性：`selector`属性，它持有在邮件可用时想要发送的消息的选择器。同时注意，接收者不再需要被限制于特定的协议。由于你不会直接调用任何方法，因此无需为此对象请求特定的接口。\n\
  \n```objc\n// 文件 MailService.m\n\n@implementation MailService\n\n- (void) processMail\n\
  {\n    id myMail = nil;\n    // 执行其他操作来初始化 myMail...\n    if (_selector && _receiver)\n\
  \    {\n        [_receiver performSelector:_selector withObject:myMail];\n    }\n\
  }\n\n@end\n```\n\n实现部分需要进行一些修改以利用新属性。一旦邮件数据可供处理，你检查`receiver`和`selector`属性是否已设置。然后，你在接收者对象上调用`performSelector:withObject:`，传入选择器作为参数，以及存储在`myMail`中的数据。\n\
  \n你还可以通过检查接收者是否真正实现了该选择器，来略微提高`processMail`方法的安全性。这种测试可以避免接收者对象未实现选择器所指定方法而产生的编程错误。这可以通过使用`respondsToSelector:`方法来实现，该方法检查一个对象能否处理对给定选择器的消息调用。\n\
  \n```objc\n- (void) processMail\n{\n    id myMail = nil;\n    // 执行其他操作来初始化 myMail...\n\
  \    if (_selector && _receiver)\n    {\n        if ([_receiver respondsToSelector:_selector])\n\
  \        {\n            [_receiver performSelector:_selector withObject:myMail];\n\
  \        }\n        else\n        {\n            NSLog(@\"error: the receiver doesn't\
  \ respond to the given selector\");\n        }\n    }\n}\n```\n\n这里，你检查选择器是否可以作为消息发送给`_receiver`。如果不可能，则记录一条错误消息，供开发者稍后追踪。\n\
  \n最后，以下代码展示了如何使用这种基于选择器的实现：\n\n```objc\n// 文件 MailReceiverImp.h\n\n@interface MailReceiverImp\
  \ : NSObject\n{\n    MailService *_service1;\n    MailService *_service2;\n}\n\n\
  - (void) receiveMail1:(id)data;\n- (void) receiveMail2:(id)data;\n- (void) setupServices;\n\
  \n@end\n```\n\n首先，你定义一个示例类，它将拥有两个邮件服务。这将展示如何使用基于选择器的方法独立处理这些服务。`MailReceiverImp`类有两个实例变量用于存储正在使用的`MailService`对象。该类还有两个可以接收邮件数据的方法。最后，你声明一个`setupServices`方法，该方法负责邮件处理子系统的初始设置。\n\
  \n```objc\n// 文件 MailReceiverImp.m\n\n@implementation MailReceiverImp\n\n- (void)\
  \ receiveMail1:(id)data\n{\n    NSLog(@\"receiving email data from source 1\");\n\
  }\n\n- (void) receiveMail2:(id)data\n{\n    NSLog(@\"receiving email data from source\
  \ 2\");\n}\n\n- (void) setupServices\n{\n    _service1 = [[MailService alloc] init];\n\
  \    _service1.selector = @selector(receiveMail1:);\n    _service1.receiver = self;\n\
  \n    _service2 = [[MailService alloc] init];\n    _service2.selector = @selector(receiveMail2:);\n\
  \    _service2.receiver = self;\n}\n\n@end\n```\n\n类的实现部分提供了使用两个`MailService`对象的细节。两个`receiveMail`方法类似，此处列出仅为了完整性。真正的实现会对接收到的数据执行不同的操作。而`setupServices`方法则扮演了有用的角色。其目标是分配并初始化两个服务。然后，你设置每个服务所期望的两个属性：`selector`和`receiver`。接收者始终是`self`，因为你希望直接处理邮件数据。然而，如果你希望将结果发送给另一个对象，情况可能会有所不同。\n\
  \n你还将`selector`属性设置为不同的方法，每个`MailService`对象对应一个。这些选择器通过`@selector`关键字获取，并应用于每个目标方法。\n\
  \n此类代码的最大优势在于，它可以处理任意数量的`MailService`对象。例如，不再受特定协议的限制。类所需做的只是添加一个新方法，使用`@selector`关键字获取其关联的选择器，并将其传递给服务对象。\n\
  \n正如你将在下一节中看到的，这种策略不仅在你自己的用户定义类中很有用，而且在与你 Cocoa 框架交互时也同样有用。事实上，使用选择器处理事件是 Cocoa\
  \ 和 Cocoa Touch 库中 GUI 编程使用的基本设计模式之一。\n\n\n\n## Cocoa 中的 Target-Action\n\n选择器的一个常见用途是定义为特定消息设置目标，该消息通常是在响应事件时生成的。因此，在选择器策略在\
  \ UI 代码中有着巨大的应用潜力。这种设计模式被称为 target-action，并且常常在 Cocoa 框架中用于处理需要由应用程序类处理的事件。\n\n\
  Cocoa UI 库使用了 target-action 设计模式，以实现事件目标与生成事件的 UI 控件之间更高层次的抽象和独立性。与我们上一节讨论的应用程序类似，UI\
  \ 工具包的目标是允许每个类成为多个 GUI 控件的目标。同时，GUI 控件无需了解目标所实现的任何特定协议。\n\n这些需求的结果是一种设计模式，其中 GUI\
  \ 控件对象具有两个属性：一个 target（目标）和一个 action（动作）。target 属性指定当期望的事件发生时，将接收消息的对象。\n\n例如，考虑一个具有单个窗口和一个按钮的应用程序，该按钮可用于触发用户定义的动作。虽然我还没有描述如何在\
  \ Cocoa 中创建此类应用程序（请参阅最后一章以获取完整示例），但下面是仅用于设置和处理事件所需的基本代码：\n\n```\n// 文件 ButtonTest.h\n\
  @interface ButtonTest : NSObject\n- (void) doWhenButtonPressed:(id)button;\n- (void)\
  \ setupButton:(NSButton *)aButton;\n// 此处可添加其他方法\n@end\n```\n\n在 `ButtonTest` 类中，你声明了将在此处讨论的两个方法。`doWhenButtonPressed:`\
  \ 方法是响应外部事件而被调用的，它将在用户按下按钮时执行。另一方面，`setupButton:` 方法用于初始化 target-action 机制，以便将按钮按下事件与目标对象关联起来。这些方法可以按如下方式声明：\n\
  \n```\n// 文件 ButtonTest.m\n@implementation ButtonTest\n- (void) doWhenButtonPressed:(id)button\n\
  {\n        NSLog(@\"我们收到了一个按钮按下事件\");\n}\n- (void) setupButton:(NSButton *)aButton\n\
  {\n        [aButton setAction:@selector(doWhenButtonPressed:)];\n        [aButton\
  \ setTarget:self];\n}\n// 此处可添加其他方法\n@end\n```\n\n`setupButton:` 方法包含了实现的重要部分。该方法的参数是一个\
  \ `NSButton` 对象，这是在 Cocoa 中用于表示用户界面按钮的类。你可以假设这个方法是在其他地方被调用的，可能是在同一个类中，并且以一个 `NSButton`\
  \ 对象作为参数。第一步是设置 action，即按钮按下事件触发时将调用的方法。为了以通用的方式做到这一点，你为 `doWhenButtonPressed:`\
  \ 方法传递一个选择器。\n\n实现中的第二步是设置在上一行中定义的 action 的 target。在这种情况下，你希望 target 是同一个对象，因为你使用的选择器对应的是在\
  \ `ButtonTest` 类中实现的方法。因此，按钮对象将使用 `self` 作为在 `setAction:` 方法中提供的消息选择器的目标。\n\n尽管我的示例适用于\
  \ `NSButton`，但此处使用的技术是完全通用的。任何 UI 控件都可以使用 target-action 模式来设置事件源和事件消费者之间的事件处理机制。这是一种非常灵活的机制，它允许不同的类库彼此通信，而无需了解它们的工作方式甚至公共接口。这种机制的一大优点是它减少了你需要维护的类和协议的数量，这与那些无法在对象之间提供动态链接的其他语言不同。\n\
  \n## 动态响应消息\n\n你已经了解了类如何将通用消息发送到目标对象，甚至无需知道消息的名称。这是通过使用选择器实现的。基于类的设计的另一个重要方面是能够以灵活的方式响应发送给对象的消息。\n\
  \n在 Objective-C 中，有一个标准选项可以创建方法，并通过语言运行时自动将消息路由到这些方法。然而，在某些情况下，你可能希望更改对象所接受的方法的分发方式。例如，考虑一个需要将消息中继到辅助类的类。一种选择是为你想要复制的辅助类中的每个方法创建一个新方法，正如你将在下一节中看到的那样。\n\
  \n### 创建代理对象\n\n例如，考虑一个名为 `MortgageSecurity` 的原始类，它负责与抵押贷款相关的计算。它的接口可以定义如下：\n\n\
  ```\n// 文件 MortgageSecurity.h\n@interface MortgageSecurity : NSObject\n- (void)calculateDebt;\n\
  - (void)reapraise;\n- (void)calculateTaxes;\n@end\n```\n\n```\n// 文件 MortgageSecurity.m\n\
  @implementation MortgageSecurity\n- (void)calculateDebt\n{\n        // 计算抵押贷款中剩余债务的代码\n\
  }\n- (void)reappraise\n{\n         // 用于重新评估抵押贷款价值的代码\n}\n- (void)calculateTaxes\n\
  {\n        // 计算抵押贷款税额的方法\n}\n@end\n```\n\n有三个方法用于计算与抵押贷款相关的数量，例如税额和总债务，以及重估价值。这是一个复杂的类，因此你对每个方法的内部工作原理不感兴趣。然而，你想要做的是为原始类提供一个简单的代理对象。这在例如你想要创建一个门面对象以便通过更易用的接口隐藏真实类时是必需的。\n\
  \n代理类将包含对 `MortgageSecurity` 类的引用以及重定向消息的必要代码。\n\n```\n// 文件 SecurityProxy.h\n@interface\
  \ SecurityProxy : NSObject\n@property(retain) MortgageSecurity *security;\n- (void)calculateDebt;\n\
  - (void)reappraise;\n- (void)calculateTaxes;\n@end\n```\n\n这里的接口与 `MortgageSecurity`\
  \ 的接口非常相似。你想要提供原始类中存在的核心功能，因此你需要复制其接口。该类还包含一个属性，可用于存储指向 `MortgageSecurity` 对象的指针，以便后续用于路由传入的消息。\n\
  \n`SecurityProxy` 的实现包含了重定向消息调用所需的代码。\n\n```\n// 文件 SecurityProxy.m\n@implementation\
  \ SecurityProxy\n- (void)calculateDebt\n{\n        [_security calculateDebt];\n\
  }\n- (void)calculateTaxes\n{\n        [_security calculateTaxes];\n}\n- (void)reappraise\n\
  {\n        [_security reappraise];\n}\n@end\n```\n\n正如你所见，`SecurityProxy` 中的每个方法都只是作为\
  \ `MortgageSecurity` 类中对应方法的前端。它们使用 `security` 属性作为消息的目标，并调用完全相同的方法。如果传入了任何参数，你还需要将这些参数提供给目标对象。\n\
  \n`SecurityProxy` 的客户端将无法察觉该类与 `MortgageSecurity` 之间的差异，因为它们提供了相同的接口。然而，这两个类之间的依赖关系很大。如果\
  \ `MortgageSecurity` 接口的任何细节发生变化，那么也需要在 `SecurityProxy` 中做出相应的更改。没有这样手动修改，代理类的假象就会被打破，这两个类将开始拥有不同的接口。\n\
  \n\n\n### 使用 forwardInvocation\n\n如您所见，使用这种编程风格维护代理类非常耗时。不过，有一种基于 Objective-C 动态特性的更好解决方案。您需要一种方式来接收通用消息并将其路由到目标对象，而无需在接口中重复消息名称。\n\
  \n这种功能由**转发调用机制**提供。转发调用是运行时调用一个特殊方法 `forwardInvocation:` 的过程，用于决定如何处理类接口中未包含的消息。任何实现了\
  \ `forwardInvocation:` 方法的 Objective-C 类都能使用这种动态特性，当目标类中找不到某个方法时，运行时系统会自动调用该方法。\n\
  \n因此，重写上述类的一种更简单方法是使用转发调用机制来接收和处理发送给 `MortgageSecurity` 类的消息。这将产生以下接口：\n\n```\n\
  @interface SecurityProxy : NSObject\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation;\n\
  \n@property (retain) MortgageSecurity *security;\n\n@end\n```\n\n`SecurityProxy`\
  \ 的新接口仍然包含一个存储 `MortgageSecurity` 对象的属性。然而，`MortgageSecurity` 同样支持的方法列表消失了，取而代之的是单一方法\
  \ `forwardInvocation:`。因此，新代理类的实现只依赖于 `forwardInvocation:` 的内部工作原理。\n\n```\n@implementation\
  \ SecurityProxy\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation\n{\n \
  \       SEL selector = anInvocation.selector;\n        if ([_security respondsToSelector:selector])\n\
  \        {\n                [anInvocation invokeWithTarget:_security];\n       \
  \ }\n        else\n        {\n                [super forwardInvocation:anInvocation];\n\
  \        }\n}\n\n@end\n```\n\n`forwardInvocation:` 的实现需要在所有 Objective-C 类中遵循类似的模式，这是因为它与消息分发系统的交互方式决定的。第一个任务是决定是否要处理该消息。为此，您可以从\
  \ `NSInvocation` 对象中检索消息的选择器。\n\n在本例中，您要进行的测试是针对 `MortgageSecurity` 类的接口。因此，您向 security\
  \ 属性发送 `respondsToSelector:` 消息，以确定该消息是否应被处理。如果该消息存在于 security 对象上，则使用 `invokeWithTarget:`\
  \ 来执行方法调用。\n\n注意：`forwardInvocation:` 方法对 `NSInvocation` 对象使用的是 `invokeWithTarget:`\
  \ 而不是 `performSelector:`，即使您也有一个选择器。这种差异的原因在于 `performSelector:` 无法处理任意数量的参数。另一方面，`NSInvocation`\
  \ 对象包含由运行时系统提供的参数列表，并且拥有发送消息及其参数所需的内部逻辑。此外，通过 `forwardInvocation:`，Objective-C 运行时负责将所有返回值存储在\
  \ `NSInvocation` 对象上，并将它们作为返回值传回消息调用的地方，这是使用 `performSelector:` 无法做到的。\n\n如果 `forwardInvocation:`\
  \ 收到的消息无法由 security 对象处理，那么您需要调用父类的 `forwardInvocation:`。这样做是为了不改变 `forwardInvocation`\
  \ 的任何默认行为，包括 `NSObject` 上的标准实现。\n\n## 模拟多重继承\n\n`forwardInvocation:` 方法可用于许多情况，即某个方法的功能由另一个类提供。当这种情况发生时，使用\
  \ `forwardInvocation:` 的类负责将消息中继到目标对象，该对象最终将响应此消息。如您所见，`forwardInvocation:` 与 Objective-C\
  \ 的标准方法分发机制有许多相似之处。因此，您可以将此方法视为实现自定义继承机制的一种方式。使用此类特性，您可以设计出能够响应来自两个甚至更多类消息的对象。\n\
  \n例如，考虑上一节讨论的 `SecurityProxy` 类。该类能够响应 `MortgageSecurity` 接口中的任何消息。从客户端的角度来看，`SecurityProxy`\
  \ 充当了一种 `MortgageSecurity` 对象的角色。\n\n然而，您可能希望进一步扩展此示例。假设您还想响应第二个接口 `FixedIncomeSecurity`\
  \ 的请求，其定义如下：\n\n```\n// 文件 FixedIncomeSecurity.h\n\n@interface FixedIncomeSecurity\
  \ : NSObject\n\n- (void)calculateAmortization;\n- (void)calculateEquivalentBond;\n\
  \n@end\n```\n\n此接口提供了两种您希望在 `SecurityProxy` 类上支持的额外计算方法。不幸的是，Objective-C 不提供多重继承（如前一章所述），这意味着您无法使用标准消息分发机制来实现这一点。\n\
  \n在这种情况下，解决方案以修改使用 `forwardInvocation:` 方法的形式出现。您将扩展 `forwardInvocation:` 实现中有效选择器的测试范围，从而允许处理属于您想要支持的两个类中任一个的成员消息。以下代码展示了\
  \ `SecurityProxy` 修改后接口的内容：\n\n```\n// 文件 SecurityProxy.h\n\n@interface SecurityProxy\
  \ : NSObject\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation;\n\n@property\
  \ (retain) MortgageSecurity *mortgageSec;\n@property (retain) FixedIncomeSecurity\
  \ *fixIncomeSec;\n\n@end\n```\n\n在这里，您添加了一个名为 `fixIncomeSec` 的新属性，它将保存一个指向 `FixedIncomeSecurity`\
  \ 对象的指针，以便在需要时该类能够获得所需的行为。此外，修改后的类还有一个新的实现部分，如下所示：\n\n```\n// 文件 SecurityProxy.m\n\
  \n@implementation SecurityProxy\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation\n\
  {\n        SEL selector = anInvocation.selector;\n        if ([_mortgageSec respondsToSelector:selector])\n\
  \        {\n                [anInvocation invokeWithTarget:_mortgageSec];\n    \
  \    }\n        else if ([_fixIncomeSec respondsToSelector:selector])\n        {\n\
  \                [anInvocation invokeWithTarget:_fixIncomeSec];\n        }\n   \
  \     else\n        {\n                [super forwardInvocation:anInvocation];\n\
  \        }\n}\n\n@end\n```\n\n`forwardInvocation:` 中的代码已更改，以提供对 `FixedIncomeSecurity`\
  \ 中方法的支持。这是以类似于之前为 `MortgageSecurity` 方法实现的方式完成的。`fixIncomeSec` 属性使用 `respondsToSelector:`\
  \ 消息进行测试。最后，无法识别的消息被提交给 `NSObject` 中的默认 `forwardInvocation:` 方法。\n\n\n\n### 实现 `respondsToSelector:`\n\
  \n请注意，尽管上述实现提供了多继承的许多优点，但仍需谨慎，不要忘记其中的重要差异。例如，`SecurityProxy` 与你在本节中看到的两个安全类之间并不存在父子关系。因此，编译器将无法进行在使用单一超类派生类时所允许的标准类型检查。\n\
  \n另一方面，Objective-C 的运行时可以通过使用动态消息来进一步调整类之间的关系。之前已经遇到过其中一种消息：`respondsToSelector:`，它用于判断一个对象是否能够响应特定消息。\n\
  \n你一直在使用 `respondsToSelector:` 来判断一个对象是否能够通过其对应的选择器来响应某个特定的方法调用。然而，如果另一个对象以 `SecurityProxy`\
  \ 为目标进行相同的方法调用，它将收到否定响应。结果为 `NO`，因为这些方法没有一个真正属于 `SecurityProxy` 所支持的消息列表。\n\n如果你希望为\
  \ `SecurityProxy` 增加这一层额外的支持，可以决定修改 `respondsToSelector:` 的实现来解决此问题。一种可行的实现方式如下所示：\n\
  \n```objc\n// 文件 SecurityProxy.h\n\n@interface SecurityProxy : NSObject\n\n- (void)forwardInvocation:(NSInvocation\
  \ *)anInvocation;\n- (BOOL)respondsToSelector:(SEL) sel;\n\n@property (retain) MortgageSecurity\
  \ *mortgageSec;\n@property (retain) FixedIncomeSecurity *fixIncomeSec;\n\n@end\n\
  ```\n\n接口已被修改以容纳新方法 `respondsToSelector:`，该方法将用于判断某个消息能否被 `SecurityProxy` 类处理。此方法将覆盖现有的标准实现，该标准实现仅对已定义为类接口一部分的方法返回\
  \ `true`。\n\n```objc\n// 文件 SecurityProxy.m\n\n@implementation SecurityProxy\n\n\
  - (BOOL)respondsToSelector:(SEL) sel\n{\n    if ([super respondsToSelector:sel])\n\
  \    {\n        return YES;\n    }\n    if ([_fixIncomeSec respondsToSelector:sel]\n\
  \        || [_mortgageSec respondsToSelector:sel])\n    {\n        return YES;\n\
  \    }\n    return NO;\n}\n\n- (void)forwardInvocation:(NSInvocation *)anInvocation\n\
  {\n    SEL selector = anInvocation.selector;\n    if ([_mortgageSec respondsToSelector:selector])\n\
  \    {\n        [anInvocation invokeWithTarget:_mortgageSec];\n    }\n    else if\
  \ ([_fixIncomeSec respondsToSelector:selector])\n    {\n        [anInvocation invokeWithTarget:_fixIncomeSec];\n\
  \    }\n    else\n    {\n        [super forwardInvocation:anInvocation];\n    }\n\
  }\n\n@end\n```\n\n`respondsToSelector:` 的新实现现在不仅能够检查编译时定义的方法（使用 `NSObject` 提供的标准实现），还能检查另外两个对象\
  \ `mortgageSec` 和 `fixIncomeSec`，以确定该方法对 `SecurityProxy` 类是否有效。以下是一个示例，展示了客户端代码如何使用此特性：\n\
  \n```objc\n- (void) testSecurityMethods\n{\n    SecurityProxy *sp = [[[SecurityProxy\
  \ alloc] init] autorelease];\n    sp.mortgageSec = [[[MortgageSecurity alloc] init]\
  \ autorelease];\n    sp.fixIncomeSec = [[[FixedIncomeSecurity alloc] init] autorelease];\n\
  \n    // 此方法在编译时定义\n    BOOL res = [sp respondsToSelector:@selector(forwardInvocation:)];\n\
  \    NSLog(@\"结果为 %d\", res); // 结果为 1\n\n    // 此方法动态定义\n    res = [sp respondsToSelector:@selector(calculateEquivalentBond)];\n\
  \    NSLog(@\"结果为 %d\", res); // 结果为 1\n}\n```\n\n这段代码整合了之前描述的类，并展示了如何使用它们来回答关于自身能力的简单问题。方法\
  \ `testSecurityMethods` 首先创建了一个 `SecurityProxy` 类的实例。为了使该对象正常工作，它需要另外两个对象：一个 `MortgageSecurity`\
  \ 实例和一个 `FixedIncomeSecurity` 实例。这两个实例分别被赋值给 `SecurityProxy` 的对应属性 `mortgageSec`\
  \ 和 `fixIncomeSec`。最后，向 `SecurityProxy` 实例发送 `respondsToSelector:` 消息，第一次查询 `forwardInvocation:`，这是一个确实在公共接口中定义的方法。而第二次请求则检查\
  \ `calculateEquivalentBond` 方法，该方法属于 `FixedIncomeSecurity` 类。两次请求都返回 `YES`，正如你在设计新\
  \ `respondsToSelector:` 方法时所期望的那样。\n\n\n\n## 避免方法调用\n\n如果你是一位经验丰富的 C 语言程序员，在了解本章描述的所有动态特性后，你可能会对\
  \ Objective-C 中消息传递的性能产生一些想法。毕竟，你知道运行时会通过搜索目标对象所属的类层次结构来尝试找到方法的实现。此外，如果搜索失败，运行时还会尝试使用\
  \ `forwardInvocation:` 方法，让对象有机会“再次响应”该消息。\n\n所有这些运行时行为无疑都会带来开销。好消息是，苹果公司一直在优化这种搜索机制的实现。即便如此，在某些情况下，使用标准动态派发的成本仍然过高。事实证明，Objective-C\
  \ 也针对此问题提供了合理的解决方案，其基础仍然是巧妙地使用选择器来获取方法的实现。\n\n要理解如何在某些情况下最小化甚至避免方法派发的开销，有必要了解方法是如何实现的。方法实现本质上就是一个带有两个特殊参数的常规\
  \ C 函数：第一个参数是指向对象的指针，也就是你所熟知的 `self`。第二个参数是方法调用中使用的选择器，任何方法都可以访问它，并能通过 `_cmd` 特殊变量来引用。\n\
  \n当你在类的 `@implementation` 部分创建方法时，这两个参数是隐藏的，但它们始终存在。事实证明，你可以获取到方法派发时实际被调用的 C 函数的指针。运行时使用\
  \ `IMP` 类型来引用这种实现函数。对 `IMP` 函数指针的自动处理，只是语言在编译时为我们安排的众多细节之一。\n\n为了了解如何利用这个特性来提升性能，让我们看一个例子。`UseIMP`\
  \ 类有一个名为 `simpleMethod:` 的方法，它仅将整数值打印到日志屏幕。\n\n```\n// 文件 UseIMP.h\n\n@interface\
  \ UseIMP : NSObject\n\n- (void) simpleMethod:(int)param;\n\n- (void) callSimpleMethod;\n\
  \n@end\n```\n\n在该类的第一个版本中，有一个名为 `callSimpleMethod` 的方法，它会重复调用 `simpleMethod`。\n\n\
  ```\n// 文件 UseIMP.m\n\n@implementation UseIMP\n\n- (void)simpleMethod:(int)param\n\
  \n{\n\n// 这里是实现代码\n\nNSLog(@\"method called with value %d\", param);\n\n}\n\n- (void)\
  \ callSimpleMethod\n\n{\n\nint i;\n\nfor (i=0; i<10; ++i)\n\n{\n\n[self simpleMethod:i];\n\
  \n}\n\n}\n\n@end\n```\n\n这个类本身没有问题，但仍有性能提升的空间。主要问题在于，在循环内调用同一个方法会迫使运行时系统重复执行相同的派发序列。虽然对于少量的重复来说这不算什么，但随着迭代次数的增加，开销会变得非常高。\n\
  \n为了避免这个问题，你可以直接获取 `simpleMethod:` 的实现函数，并将其存储到一个 `IMP` 变量中。新的接口将增加一个方法。\n\n```\n\
  // 文件 UseIMP.h\n\n@interface UseIMP : NSObject\n\n- (void) simpleMethod:(int)param;\n\
  \n- (void) callSimpleMethod;\n\n- (void) callWithImplementation;\n\n@end\n```\n\n\
  `callWithImplementation` 的代码如下所示：\n\n```\ntypedef void (*MY_FUNC)(id, SEL, int);\n\
  \n- (void) callWithImplementation\n\n{\n\nSEL selector = @selector(simpleMethod:);\n\
  \nIMP imp_func = [self methodForSelector:selector];\n\nMY_FUNC myFunc = (MY_FUNC)imp_func;\n\
  \nint i;\n\nfor (i=0; i<10; ++i)\n\n{\n\nmyFunc(self, selector, i);\n\n}\n\n}\n\
  ```\n\n首先，我们为一个类型定义了一个名称，该类型表示一个接收 `id`、选择器和一个整数的 `void` 函数。在 `callWithImplementation`\
  \ 的定义中，首先获取 `simpleMethod:` 的选择器。然后，使用 `methodForSelector:` 获取实现，这个方法返回一个 `IMP`（实际上只是一个函数指针）。接着，我们将这个函数指针转换为一个可以直接使用所需参数调用的类型，并将其存储在\
  \ `myFunc` 变量中。一旦函数指针被赋值，就可以用它来直接调用 `simpleMethod` 的内容。\n\n请注意，通过直接调用 `methodForSelector:`\
  \ 返回的函数指针，你绕过了整个动态派发机制。动态派发仅在调用 `methodForSelector:` 时运行一次。在之后的过程中，你所做的只是对函数的直接指针访问，其执行速度几乎与普通函数调用相同。因此，这段代码的性能远优于对\
  \ `simpleMethod:` 进行重复消息调用。随着重复次数的增加，运行时性能的差异会变得更加显著。\n\n最后，这里有一些测试 `UseIMP` 类的示例代码：\n\
  \n```\n- (void) testUseImp\n\n{\n\nUseIMP *useImp = [[[UseIMP alloc] init] autorelease];\n\
  \n[useImp callWithImplementation];\n\n}\n```\n\n调用 `testUseImp` 会在日志窗口中依次显示十行文本，正如预期的那样。\n\
  \n总的来说，上面的例子为你提供了一个基于抑制动态消息派发来提升性能的基本思路。如果你有一段需要优化的代码，可以遵循以下步骤：\n\n-   确定是否可以消除动态派发。当在特定上下文中，同一消息被大量发送给同一个对象时，这通常是可行的。为了有一个更好的基线，请使用性能分析器来确定你的代码大部分时间花在了哪里。\n\
  -   一旦选定了某个方法，就可以使用 `methodForSelector:` 来获取该特定对象的 `IMP` 指针。请注意，`methodForSelector:`\
  \ 本身使用的是运行时系统来查找目标方法的实现，因此结果保证是正确的。\n-   使用上面获取的 `IMP` 函数进行直接函数调用。可以通过直接传递两个隐藏参数（`self`\
  \ 和方法选择器）以及方法所需的任何其他参数来完成。\n\n在应用内部循环中，对少数方法调用重复此过程后，就有可能显著提升 Objective-C 代码的性能。然而，由于使用此技术需要进行底层操作，除非你的应用程序存在真正的性能瓶颈，否则应避免使用它。请记住，对于大多数桌面软件来说，只有在极少数情况下，Objective-C\
  \ 代码的性能才会成为需要这样处理的问题。\n\n\n\n## 总结\n\n在本章中，我讨论了 Objective-C 提供的一些动态派发特性。拥有这些特性是使用具备丰富运行时系统的语言的优势之一。通过动态派发，不仅能够从基于单继承的标准消息派发系统中获益，还能在必要时突破其某些规则。\n\
  \n你了解了选择器（selector）的工作原理，并通过示例看到如何利用它们使类更具通用性，减少对特定接口的依赖。我们讨论了一些在 Cocoa 框架中使用选择器的场景，这些场景在客户端与服务之间建立连接，而无需在两者之间添加任何显式的编译时引用，从而允许它们在运行时进行连接。\n\
  \n我在本章中还讨论了 `forwardInvocation:` 方法，它为程序员提供了一种干净的方式，用以处理在编译时无法识别的消息。利用这一机制，可以拦截那些已被接收但未与类接口中任何成员匹配的消息。\n\
  \n通过 `forwardInvocation:`，你可以决定将无法识别的消息发送给能够正确响应的其他对象。你了解到，当这种情况发生时，一个类实际上采纳了另一个类的接口。其结果可被理解为一种模拟的多继承形式，在这种情况下，你可以有选择地从两个或更多类中采纳所需的接口部分。\n\
  \n至此，你已经创建了许多对象，但并未过多考虑它们在使用结束后如何存储或释放。尽管 Objective-C 没有自动垃圾回收机制（至少默认情况下没有），但它拥有强大内存管理模式，可帮助程序员完成节约内存这一重要任务。这将是下一章的主题。\n\
  \n"
- "# 8. 内存管理\n\n复杂的内存管理是开发人员在用 C 语言编程时需要面对的主要问题之一。直接操作内存地址所带来的强大能力——这也是高效 C 语言编程的标志——当需要手动管理对象在内存中的位置时，也可能成为一个难题。Objective-C\
  \ 在保留 C 语言强大能力的同时，也引入了一种更好的方式来组织和管理内存。为了简化内存使用对象的过程，该语言提供了完全基于面向对象编程原则的技术。\n\n你将看到，使用一个强调运行时特性的面向对象语言的优势之一在于，内存管理可以被简化，并大部分委托给系统库，由它们完成大量复杂的工作。Objective-C\
  \ 程序员可以专注于对象在其应用领域中的实际使用，而不是纠结于底层的内存管理方案。\n\n尽管在 Objective-C 中管理内存比在纯 C 语言中要容易得多，但请务必记住，它仍然基于手动内存管理框架。换句话说，没有像\
  \ Java 和 C# 等语言那样的自动垃圾回收器（GC）来控制内存（Objective-C 曾为桌面应用程序提供过 GC，但其已被弃用，转而使用自动引用计数，这将在本章后面说明）。因此，你需要认识到这种内存管理方案的优缺点。\n\
  \n垃圾回收使得内存使用变得几乎微不足道。无需担心对象如何分配以及何时释放。系统会为你处理好一切。然而，它也有一些缺点。经验表明，GC 系统要么效率太低（许多基于\
  \ GC 的语言都存在的主要问题），要么太过复杂以至于需要消耗大量计算机资源来运行。例如 Java，其 GC 在十多年的时间里不断改进，最终形成了一个需要大量内存才能高效运行的复杂系统。\n\
  \nObjective-C 不依赖 GC 的事实意味着它可以在任何地方运行，从大型工作站到像手机这样的内存受限设备。所有这一切，在保持基于 C 的语言的高性能的同时也成为可能。\n\
  \nObjective-C 内存管理的秘诀在于使用基于引用的数据模型，并伴以少量简单的规则，这些规则使得在应用程序中分配和释放内存几乎变得直接明了。在本章中，你将学习编写正确\
  \ Objective-C 代码所需掌握的规则。在理解了内存管理背后的概念之后，我还会介绍 Apple 编译器通过 ARC（自动引用计数）提供的最新技术，该技术实际上消除了在内存管理机制中手动干预的需要。\n\
  \n## 处理内存问题\n\n在了解如何正确管理内存之前，理解在开发 Objective-C 应用程序过程中可能遇到的内存错误类型非常重要。与其他逻辑错误不同，内存错误是最难修复的，因为它们通常出现在真实错误发生地点很远的地方。因此，开发在错误发生时立即识别内存问题的技术至关重要，这是防止出现更复杂、修复耗时更长问题的一种有效手段。\n\
  \n\n\n### 内存问题的类型\n\n在 Objective-C 中，由于其源自 C 语言，程序员需要处理多种内存错误。其中包括以下几种：\n\n- **悬空指针**：当您指向一个不再有效的对象或内存区域时，就会发生悬空指针。在\
  \ C 语言中，这可能是由多种原因造成的，例如访问一个已被释放的指针。在 Objective-C 中，悬空指针可能由于对象被错误释放而发生。当这种情况发生时，再次访问该变量很可能会导致应用程序崩溃，因为之前存储在那里的所有数据都已被重用。\n\
  - **数组越界访问**：由于在 C 语言中数组和指针是等价的，数组访问可能会导致访问超出已分配区域的指针。这是大多数基于 C 语言的应用中常见的内存错误。然而，Objective-C\
  \ 程序员可以通过使用诸如 `NSArray` 之类的集合来代替原生数组，从而避免许多此类问题。尽管 `NSArray` 可能不如原生数组快，但它能提供自动保护，防止此类不当的数组访问。对于性能关键代码，在必要时，始终可以从使用集合转换回使用原生数组。\n\
  - **内存泄漏**：内存泄漏是指程序中的某部分内存变得无法访问，尽管系统尚未将其释放。内存泄漏在 C 语言和 Objective-C 中都可能出现，只是内存释放的机制不同。在\
  \ Objective-C 中，这种情况发生是因为对象的使用者没有在方法结束时（对于局部变量）或者在对象被释放时（对于实例变量）对变量调用 `release`。内存泄漏是一种隐蔽的错误，因为它们不会立即导致崩溃。您感知内存泄漏的方式是内存使用量增加，每次运行有问题的代码时都会发生这种情况。一段时间后，这可能会耗尽应用程序的所有可用内存，导致运行缓慢甚至崩溃。\n\
  \n### 识别内存 Bug\n\n程序员应对内存问题的主要工具之一是使用调试应用程序和库。Xcode 拥有大量辅助工具，可用于定位和修复错误。\n\n我们先考虑内存崩溃。诊断内存崩溃的一个绝佳工具是\
  \ Xcode 调试器。使用调试器时，您首先要做的是重现错误，并查看显示崩溃发生位置的堆栈跟踪（参见图 8-1 中的示例）。一旦找到错误的位置，您就可以在错误发生前的几行代码处添加断点。这样您就能清晰地看到错误发生区域附近的变量及其内容，从而能够确定是什么导致了不正确的行为。\n\
  \n通过观察正在执行的变量和代码，理解导致崩溃的原因后，您可以制定一个计划来修复有问题的代码。\n\n![A978-1-4302-5906-0_8_Fig1_HTML.jpg](img/A978-1-4302-5906-0_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 使用 Xcode 调试器定位崩溃位置\n\nXcode 还提供了一个名为 `NSZombieEnabled` 的强大工具，用于检查对已释放对象的访问。当将此标志传递给在\
  \ Xcode 下运行的应用程序时，它会告诉应用程序在释放指针时创建 `NSZombie` 对象。因此，Objective-C 库不只是简单地释放内存，而是会设置一个\
  \ `NSZombie` 类型的对象，这对于诊断已释放对象在释放后仍接收消息的情况非常有用。要设置 `NSZombieEnabled` 选项，您需要选择菜单选项\
  \ Product ➤ Scheme ➤ Edit Scheme，然后点击“参数”选项卡。在“启动时传递的参数”屏幕上，勾选 `NSZombieEnabled`\
  \ 的复选框（参见图 8-2）。\n\n当一个 `NSZombie` 对象收到消息时，它会立即触发 Xcode 调试器显示非法访问发生的位置。僵尸对象的位置也会给您提供关于被释放的原始对象以及是谁调用了它的线索。基于这些信息，您可以更轻松地找出对象被错误释放的原因，并修复有问题的源代码以消除此\
  \ Bug。\n\n![A978-1-4302-5906-0_8_Fig2_HTML.jpg](img/A978-1-4302-5906-0_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 在 Xcode 中设置 `NSZombieEnabled` 选项\n\n\n\n## 分配内存\n\n内存是应用需要管理的最常见的资源类型。为确保任何软件正常运行，都需要定义分配新内存的方式，以及维护已分配内存现有引用的合理方案。最终，系统还需要确定如何释放未使用的内存块。\n\
  \nObjective-C 采用引用计数机制来确定如何维护和释放内存。其工作原理如下：系统创建的每个对象都有一个内部计数器，记录该对象存在多少引用。每个创建新对象的方法（如\
  \ `new` 或 `copy`）都会将该计数器初始化为 1。\n\n如果某个对象不再使用，你需要调用属于 `NSObject` 接口的 `release` 方法。调用\
  \ `release` 时，它会减少内部计数器的值。如果计数器为正数，内存不会发生任何变化；但如果计数器变为零，该对象就会被删除并从内存中移除。\n\n由此可以看出，新对象的简单使用流程是使用\
  \ `new` 等方法创建它，然后在用完后调用 `release`。不过，如果你希望保持对象存活，可以随时调用一个名为 `retain` 的方法。`retain`\
  \ 的作用是增加内部计数器，表示已添加对该对象的新引用。\n\n以下是一个关于引用计数如何工作的简单示例。考虑下面的 `setupProduction` 方法，它用于在\
  \ `Factory` 类中设置生产系统：\n\n```\n// 文件 Factory.h\n\n@interface Factory : NSObject\n\
  \n- (void) startProduction;\n\n@end\n```\n\n这个接口声明了一个方法 `startProduction`，可用于启动工厂的生产活动。然而在生产开始之前，你需要用所有组件来设置系统。这是通过\
  \ `setupProduction` 方法完成的。\n\n```\n+ (void) setupProduction\n{\n    Factory *productFactory\
  \ = [[Factory alloc] init];\n    [productFactory startProduction];\n    // 对 productFactory\
  \ 执行某些操作...\n    [productFactory release];\n}\n```\n\n在此方法中，你只关注数据的分配和释放。因此，你首先通过简单的\
  \ `alloc`/`init` 序列分配 `Factory` 对象。内存管理规则规定，使用 `new` 方法创建的内存，内部引用计数为 1。然后，你使用新对象执行\
  \ `startProduction` 的生产初始化步骤。\n\n最后，当不再需要 `Factory` 对象时，为避免内存泄漏，你需要调用 `release`。在其内部实现中，`release`\
  \ 会递减引用计数器并检查其值。由于原始值为 1，计数器将降为零，这会让 `release` 释放该对象并将其从内存中移除。\n\n现在，考虑如果你需要将 `Factory`\
  \ 对象存储到另一个位置该怎么办。例如，你可能有一个工厂管理类，可用于管理你自己的 `Factory` 对象。\n\n```\n// 文件 FactoryManagement.h\n\
  \n/// 负责管理 Factory 对象。\n@interface FactoryManagement : NSObject\n{\n    Factory\
  \ *factory;\n}\n\n- (void) setupProductionManagement:(Factory*)factory;\n- (void)\
  \ dealloc;\n\n@end\n```\n\n该接口为工厂提供了一个管理系统。为此，该类需要存储一个指向 `Factory` 对象的指针。`setupProductionManagement:`\
  \ 方法负责接收一个 `Factory` 对象，并使用它来设置管理系统。下面是其实现方式：\n\n```\n// 文件 FactoryManagement.m\n\
  #include \"FactoryManagement.h\"\n\n@implementation FactoryManagement\n\n- (void)\
  \ setupProductionManagement:(Factory *)aFactory\n{\n    factory = aFactory;\n  \
  \  [factory retain];\n    // 执行其他设置活动\n}\n\n- (void) dealloc\n{\n    [factory release];\n\
  \    [super dealloc];\n}\n\n@end\n```\n\n这个例子展示了 `setupProductionManagement:` 方法如何使用作为参数传入的\
  \ `Factory` 对象。首先，它将指针保存到实例变量 `factory` 中。然而这样做也需要使用 `retain`。这是必要的，因为否则作为参数传入的对象的引用在\
  \ `setupProductionManagement:` 结束后可能会变得无效。\n\n在对工厂对象调用 `retain` 之后，`FactoryManagement`\
  \ 负责维护 `factory` 对象的引用计数器。因此，当不再需要它时，需要对其调用 `release`。对象最后一次执行此操作的机会是在 `dealloc`\
  \ 方法中，该方法在系统释放对象之前被调用。\n\n`dealloc` 的实现负责释放该类分配的所有对象。如果一个类持有其运行所需的一个或多个额外资源，它还应实现\
  \ `dealloc` 方法，以确保这些资源在其运行结束时被正确释放。未能正确实现 `dealloc` 是大多数内存管理失败的根源，这不仅会导致高于正常的内存使用模式，还可能引发更严重的应用逻辑问题，甚至导致崩溃。\n\
  \n\n\n## 引用计数规则\n\n如上一节所述，Objective-C 库实现的引用计数是一种简单的技术，它能让系统决定何时应将对象从内存中移除。但要使它正常工作，程序员需要定期遵循一些规则。尽管这些规则起初可能显得不自然，但经过一些实践后，它们会变成你的第二天性。由于使用引用计数的内存管理规则在系统中统一应用，程序员很快就能习惯并利用其便利性。\n\
  \n引用计数是一种可以应用于任何非垃圾收集语言（如 C 或 C++）的系统。然而，在 Objective-C 中，这种特定内存管理系统的基本优势在于，与 C 不同，所有基础库都统一应用相同的策略。因此，无需像处理\
  \ C 代码那样担心不同库使用不同的内存控制策略。一旦你学会了 `retain` 和 `release` 的工作原理，你就能理解系统中所有库（包括第三方框架）的内存使用模式。\n\
  \n引用计数是一种内存组织技术，它使用附加到每个对象上的一个简单计数器。因此，内存管理规则等同于每个对象增加和减少引用计数（该计数指示当前实例在内存中存在多少引用）的规则。\n\
  \n以下是引用计数正常工作需要遵循的规则。当对象被创建时，其内部计数器等于 1。对象仅由以 `new`、`alloc` 或 `copy` 开头的方法创建。当某个客户端为特定对象调用这些方法之一时，生成的指针被认为归该客户端所有。例如，考虑以下代码：\n\
  \n```objc\n// 文件 ArrayUse.h\n\n@interface ArrayUse : NSObject\n\n- (void) useArray;\n\
  \n@end\n\n// 文件 ArrayUse.m\n\n#import \"ArrayUse.h\"\n\n@implementation ArrayUse\n\
  \n- (void) useArray\n\n{\n\nNSArray *myArray = [[NSArray alloc] init];\n\n// 对数组进行操作...\n\
  \n// 该数组归此对象所有。释放它。\n\n[myArray release];\n\n}\n\n@end\n```\n\n类 `ArrayUse` 有一个名为\
  \ `useArray` 的方法，在该方法中分配并使用了一个数组。该数组是使用 `alloc`/`init` 这对方法创建的，并将结果赋值给 `myArray`。请记住，由于是通过\
  \ `alloc` 返回的，该内存现在的引用计数为 1，你拥有返回的对象。这也意味着你控制着该对象的生命周期。由于这是一个局部数组，在方法执行结束后你无法再使用它。因此，你需要在\
  \ `myArray` 上调用 `release` 以避免内存泄漏。\n\n现在，考虑一种情况：`myArray` 是一个实例变量，而非局部变量。\n\n```objc\n\
  // 文件 ArrayUse.h\n\n@interface ArrayUse : NSObject\n\n{\n\nNSArray *myArray;\n\n\
  }\n\n- (void) useArray;\n\n- (void) dealloc;\n\n@end\n\n// 文件 ArrayUse.m\n\n#import\
  \ \"ArrayUse.h\"\n\n@implementation ArrayUse\n\n- (void) useArray\n\n{\n\nmyArray\
  \ = [[NSArray alloc] init];\n\n// 对数组进行操作...\n\n}\n\n// 其他使用 myArray 的方法\n\n- (void)\
  \ dealloc\n\n{\n\n// 该数组归此对象所有。释放它。\n\n[myArray release];\n\n[super dealloc];\n\n\
  }\n\n@end\n```\n\n在此示例中，`myArray` 被分配并存储为实例变量。由于你使用 `new` 创建了 `myArray`，你拥有该变量。这种情况与之前情况的不同之处在于，由于你在类作用域中使用\
  \ `myArray`，释放它的合适方法是在 `dealloc` 中进行。两种情况下，`useArray` 类都拥有该对象，唯一的变化在于对象的生命周期。\n\n\
  上述所有权规则的一个结果是：通过以 `alloc`、`new` 和 `copy` 之外的方法创建的对象，并不归代码的调用者所有。`NSArray` 类可以提供一个例子来说明这一点。\n\
  \n```objc\n- (void) useArray\n\n{\n\nNSArray *myArray = [NSArray arrayWithObjects:@1,\
  \ @2, @3, nil];\n\n// 对数组进行操作...\n\n// 这个数组不是用 init/new/copy 创建的\n\n// 所以无需 release\n\
  \n}\n```\n\n这次，对象 `myArray` 是使用方法 `arrayWithObjects:` 创建的，这是一个返回新数组的类方法。尽管在功能上这与前一个示例的代码非常相似，但你需要处理对象的方式却截然不同。在这种情况下，`NSArray`\
  \ 负责提供一种释放对象的方式，因为客户端代码并非 `myArray` 的所有者。\n\n另一方面，当 `myArray` 是实例变量时，同样的问题会改变你的责任。这便引出了内存管理的下一条规则：如果你不拥有一个对象，则需要使用\
  \ `retain` 方法来避免它被系统删除。此规则通过修改前述示例得以说明。看看当实例变量持有一个不由你拥有的内存指针时，其处理方式有何不同：\n\n```objc\n\
  // 文件 ArrayUse.m\n\n#import \"ArrayUse.h\"\n\n@implementation ArrayUse\n\n- (void)\
  \ useArray\n\n{\n\nmyArray = [NSArray arrayWithObjects:@1, @2, @3, nil];\n\n// 对数组进行操作...\n\
  \n// 这个数组不是用 init/new/copy 创建的\n\n// 所以我们需要 retain 它：\n\n[myArray retain];\n\n}\n\
  \n// 其他使用 myArray 的方法\n\n- (void) dealloc {\n\n// 该数组归此对象所有。释放它。\n\n[myArray release];\n\
  \n[super dealloc];\n\n}\n\n@end\n```\n\n这里你可以看到将 `NSArray` 对象存储在 `myArray` 实例变量中的方式有何不同。由于你使用了\
  \ `arrayWithObjects:`，生成的实例并不归 `ArrayUse` 所有。结果是，你需要使用 `retain` 来获得对象的所有权，以便以后能够使用它。如果你没有使用\
  \ `retain`，存储在 `myArray` 中的对象会在下一次可用机会时被系统释放。\n\n注意，然而，`dealloc` 的实现没有改变。当 `ArrayUse`\
  \ 类的对象被销毁时，它拥有对 `myArray` 的一个引用。因此，它需要以与之前相同的方式在 `myArray` 上调用 `release`。\n\n\n\n\
  ## autorelease 方法\n\n在前一节中，你了解了 Objective-C 中用于内存管理的两个主要方法：`retain` 和 `release`。如你所见，这两个方法会增加或减少每个对象的内部引用计数器，从而使对象自身能够知道它在内存中有多少个引用。这两个方法协同工作，确保只要有对对象的引用，该对象就保持活跃。另一方面，当对象不再被使用时，它们将允许回收内存。\n\
  \n第三种方法用于处理无法直接使用 `release` 的情况。当你希望一个对象在内存中持久存在，但又不想（或无法）承担其后续释放的责任时，就会用到它。一个典型的场景是，一个方法返回一个新对象，但方法名不以\
  \ `new`、`alloc` 或 `copy` 开头（请记住，这样的方法通常被允许返回引用计数为 1 的对象）。\n\n考虑一个方法，它返回一个整数数组中排好序的元素。也就是说，它计算出一个新的、排序后的数组，包含原始数组中的相同值。为此，需要创建一个新数组对象并作为结果返回，这可能会导致内存泄漏。这是最初的实现：\n\
  \n```\n// 文件 SortArray.h\n\n@interface SortArray : NSObject\n\n- (NSArray *) sortIntegerItems:(NSArray\
  \ *)data;\n\n@end\n\n// 文件 SortArray.m\n\n#import \"SortArray.h\"\n\n@implementation\
  \ SortArray\n\n- (NSArray *) sortIntegerItems:(NSArray *)data\n\n{\n\nNSArray *output\
  \ = [[NSArray alloc] initWithArray:data];\n\n[output sortedArrayUsingComparator:^(id\
  \ obj1, id obj2)\n\n{\n\nif ([obj1 integerValue] > [obj2 integerValue])\n\n{\n\n\
  return (NSComparisonResult)NSOrderedDescending;\n\n}\n\nif ([obj1 integerValue]\
  \ < [obj2 integerValue])\n\n{\n\nreturn (NSComparisonResult)NSOrderedAscending;\n\
  \n}\n\nreturn (NSComparisonResult)NSOrderedSame;\n\n}];\n\nreturn output; // 这里会发生内存泄漏\n\
  \n}\n\n@end\n```\n\n这段代码的工作方式如下。首先，通过 `alloc`/`initWithArray:` 消息组合创建一个新数组。结果是一个新的`NSArray`（`output`），它包含了参数`data`中原始值的副本。接下来的几行使用`sortedArrayUsingComparator:`\
  \ 方法对数组进行排序。该方法接收一个代码块作为参数，该代码块决定了元素之间的比较方式（你在前一章中见过类似的代码块）。最后，将已包含排序后元素的输出数据返回给调用者。\n\
  \n当输出数组被创建时，它的引用计数器被初始化为 1。请注意，情况确实如此，因为数组对象是通过一个以`init`开头的函数（这里是`initWithArray:`）创建的。排序过程不会改变这一事实。然后，当你返回数组对象时，就会出现一个难题。\n\
  \n-   你不能释放该数组，因为这样做会使它失效，并向调用者返回垃圾数据。这意味着你仍然希望数组`output`的引用计数器至少为 1。\n-   你无法在将来某个时刻进行释放，因为无法保证你的代码会再次接收到`output`数组。实际上，一旦对象从`sortIntegerItems:`函数返回，你就不再控制它的生命周期。此外，根据你在上一节中看到的规则，该方法的调用者并不拥有该对象，因为此方法名不以`new`、`copy`或`alloc`开头。这意味着调用者也不能释放该对象。\n\
  \n为了在引用计数内存管理的框架内解决这些问题，`NSObject` 提供了另一个名为 `autorelease` 的方法。该方法与内存池的概念配合使用，确保即使在这种情况下的对象也能被释放。`autorelease`\
  \ 方法向系统发出信号，表明该对象当前应保持存活，但内存池机制会尽快将其释放。以下是如何将此更改应用于`sortIntegerItems:`方法：\n\n```\n\
  // 文件 SortArray.m\n\n#import \"SortArray.h\"\n\n@implementation SortArray\n\n- (NSArray\
  \ *) sortIntegerItems:(NSArray *)data\n\n{\n\nNSArray *output = [[NSArray alloc]\
  \ initWithArray:data];\n\n[output sortedArrayUsingComparator:^(id obj1, id obj2)\n\
  \n{\n\nif ([obj1 integerValue] > [obj2 integerValue])\n\n{\n\nreturn (NSComparisonResult)NSOrderedDescending;\n\
  \n}\n\nif ([obj1 integerValue] < [obj2 integerValue])\n\n{\n\nreturn (NSComparisonResult)NSOrderedAscending;\n\
  \n}\n\nreturn (NSComparisonResult)NSOrderedSame;\n\n}];\n\nreturn [output autorelease];\n\
  \n}\n\n@end\n```\n\n只有方法的最后一行被修改了，以便在`output`上调用`autorelease`。结果，你现在无需担心因未能释放返回的数组而导致的内存泄漏。此函数的调用者将有机会接收到一个有效的对象，当数组不再被引用时，系统会负责在其上调用`release`方法。\n\
  \n然而，对于`NSArray`对象而言，使用`autorelease`并不是解决前面问题的唯一方法。请记住，你只需要在你拥有的对象上调用`release`或`autorelease`。你拥有`output`数组，因为调用了`alloc`来创建新对象。但是，还有另一种无需使用`alloc`创建`NSArray`的方法：你只需使用一个构建新`NSArray`的类方法即可。例如，以下是不使用`autorelease`编写上述方法的方式：\n\
  \n```\n@implementation SortArray\n\n- (NSArray *) sortIntegerItems:(NSArray *)data\n\
  \n{\n\nNSArray *output = [NSArray arrayWithArray:data];\n\n[output sortedArrayUsingComparator:^(id\
  \ obj1, id obj2)\n\n{\n\nif ([obj1 integerValue] > [obj2 integerValue])\n\n{\n\n\
  return (NSComparisonResult)NSOrderedDescending;\n\n}\n\nif ([obj1 integerValue]\
  \ < [obj2 integerValue])\n\n{\n\nreturn (NSComparisonResult)NSOrderedAscending;\n\
  \n}\n\nreturn (NSComparisonResult)NSOrderedSame;\n\n}];\n\nreturn output; // 这里不会发生内存泄漏\n\
  \n}\n\n@end\n```\n\n此方法的整体算法没有改变，但现在你通过`arrayWithArray:`方法获取`NSArray`，该方法由`NSArray`类自身提供。由于`arrayWithArray:`不属于会触发结果所有权的方法，因此`sortIntegerItems:`方法并非`output`数组的所有者。因此，无需在`output`对象上调用`release`或`autorelease`。还要注意，对于`sortIntegerItems:`的任何调用者来说，情况也是如此。任何人都可以调用该方法，而无需进行释放或自动释放。\n\
  \n\n\n## 使用属性\n\n使用属性（而非实例变量）来持有新对象并不会改变你在前一节中学到的任何少数规则。然而，属性有其自身的属性，因此明确它们如何与现有的内存管理策略交互就变得至关重要。\n\
  \n当你创建一个新属性时，可以决定它将如何存储分配给它的任何对象。以下是可能的内存属性：\n\n- `retain`：此属性表示，如果该属性是赋值的目标，它将获得对已分配对象的所有权。这意味着标记为\
  \ `retain` 的属性始终拥有其所指向的对象。不过，使用此类属性的一个优点在于，它们会自动向前一个存储的对象发送 `release` 消息，这样你就不会忘记释放它。为避免内存泄漏，你需要在\
  \ `dealloc` 方法中释放存储在此类属性中的任何对象。一种简单的方法是将 `nil` 赋值给该属性，因为这会强制向当前存储的对象发送一条 release\
  \ 消息。\n- `copy`：与前一种情况不同，具有 `copy` 属性的属性不会向对象发送 `retain` 消息，而是创建该对象的一个副本。这意味着分配给该属性的对象的引用计数没有变化，并且你可以更改属性的内容，而不会将任何更改传播到原始对象。这些属性也拥有它们复制的对象，因此你必须在对象被释放之前释放它们，最好在\
  \ `dealloc` 方法中进行。\n- `assign`：此属性用于不需要特殊内存处理的属性。这是默认行为，在这种情况下，属性的行为非常类似于一个简单的实例变量。在这种情况下，属性在内存管理方面的行为没有变化，你应该只使用上一节中讨论的通用内存管理规则。\n\
  \n以下是一个示例，通过使用一个类来存储图书数据，展示了这些属性属性如何与内存管理和引用计数交互：\n\n```\n// 文件 Book.h\n\n@interface\
  \ Book : NSObject\n\n- (void) updateBook:(NSString*)name authors:(NSArray*)authors\n\
  cover:(NSImage*)image;\n\n@property (assign) NSString *bookName;\n@property (copy)\
  \ NSArray *authors;\n@property (retain) NSImage *coverImage;\n\n@end\n```\n\n考虑一个名为\
  \ `Book` 的类，你可以在其中存储图书信息，例如书名、作者列表和封面图片。这个类将这些元素都作为属性包含在内，你将根据它们的属性进行更新。该类还有一个方法\
  \ `updateBook:authors:cover:`，负责用传递的参数更新图书数据。\n\n第一个属性 `bookName` 被定义为使用 `assign`\
  \ 属性。\n\n```\n// 文件 Book.m\n\n#import Book.h\n\n@implementation Book\n\n- (void)\
  \ updateBook:(NSString*)name authors:(NSArray*)authors\ncover:(NSImage*)image\n\
  {\n    self.bookName = name;\n    [name retain]; // 此处需要 retain\n    // 其他代码\n}\n\
  \n- (void) dealloc\n{\n    [self.bookName release];\n    [super dealloc];\n}\n\n\
  @end\n```\n\n在 `updateBook:authors:cover:` 方法的第一部分，你负责将值 `name` 存储到 `bookName` 属性上。由于\
  \ `bookName` 是使用 `assign` 属性声明的，仅将参数名称赋值给 `bookName` 并不会改变对象的所有权或其内部引用计数器。因此，你需要手动向\
  \ `name` 对象发送一条 `retain` 消息，以避免它被该对象的其他所有者释放。然而，一旦你获得了属性 `bookName` 的所有权，就需要确保它最终会被释放。这是由\
  \ `dealloc` 方法执行的，你必须在其中添加代码来释放属性 `self.bookName`。\n\n第二个属性 `authors` 具有 `copy`\
  \ 属性。以下示例展示了如何处理该属性：\n\n```\n@implementation Book\n\n- (void) updateBook:(NSString*)name\
  \ authors:(NSArray*)authors\ncover:(NSImage*)image\n{\n    self.bookName = name;\n\
  \    [name retain]; // 此处需要 retain\n    self.authors = authors; // 不需要 retain\n\
  }\n\n- (void) dealloc\n{\n    [self.bookName release];\n    self.authors = nil;\n\
  \    [super dealloc];\n}\n\n@end\n```\n\n由于属性 `authors` 具有 `copy` 属性，你在内部存储的并非原始对象本身，而是一个副本。同样根据内存管理规则，由\
  \ `copy:` 方法返回的副本对象，其所有权属于创建它的人。这意味着你需要在副本使用结束时释放它，或者在 `dealloc` 方法中释放，就像你在上面的示例中看到的那样。请注意，我使用了常用的技巧，即将\
  \ `nil` 赋值给对象，而不是直接调用 `release`。通过赋值 `nil`，你让属性的设置器去执行释放操作，同时将属性的值重置为一个已知的值。\n\n\
  使用 copy 属性的好处在于，你无需担心外部客户端对对象的任何更改。如果属性 `authors` 被声明为 `retain` 或 `assign`，则任何在类外部对\
  \ `NSArray` 所做的更改都会反映在 `authors` 属性存储的值中。但由于你使用了 `copy` 属性，你可以信赖该值不会改变。\n\n最后，以下代码用于支持\
  \ `retain` 属性：\n\n```\n@implementation Book\n\n- (void) updateBook:(NSString*)name\
  \ authors:(NSArray*)authors\ncover:(NSImage*)image\n{\n    self.bookName = name;\n\
  \    [name retain]; // 此处需要 retain\n    self.authors = authors; // 不需要 retain\n\
  \    self.coverImage = image;\n}\n\n- (void) dealloc\n{\n    [self.bookName release];\n\
  \    self.authors = nil;\n    self.coverImage = nil;\n    [super dealloc];\n}\n\n\
  @end\n```\n\n事实证明，使用带有 `retain` 属性的属性与使用带有 `copy` 属性的属性非常相似。在赋值过程中，该属性的合成方法负责处理两件事：释放任何先前存储的现有值，并向正在被赋值的对象发送一条\
  \ `retain` 消息。然而，从你的角度来看，你唯一需要编写的额外代码是在调用 `dealloc` 时进行显式释放。为此，你使用了同样的技巧，即将 `nil`\
  \ 赋值给 `coverImage` 属性。而合成的属性处理器将负责释放先前存储的值并将 `nil` 存储到其位置上。\n\n\n\n## 自动释放池\n\n\
  在前几节中，我讨论了 `autorelease` 的使用。这个消息会发送给一个需要由当前所有者释放的对象，即使这个操作至少应该等到控制权返回给调用者之后才执行。`autorelease`\
  \ 消息对于在这种情况下简化内存管理非常重要。`autorelease` 方法还可以帮助你编写更简洁的代码。请看下面的示例：\n\n```\n- (void)\
  \ replaceName:(NSString*)newName\n{\n    NSString *oldName = _bookName;\n    _bookName\
  \ = newName;\n    [oldName release];\n}\n```\n\n`replaceName` 方法操作的是在 `Book` 类中声明的\
  \ `bookName` 属性。要用 `newName` 替换 `bookName`，你需要在执行赋值操作之前，将当前对象存储到一个名为 `oldName` 的新变量中。这是必要的，因为你需要释放当前对象，而这样的释放可能会作为副作用改变\
  \ `newName` 对象。然而，使用 `autorelease`，你可以通过以下方式简化这段代码：\n\n```\n- (void) replaceName:(NSString*)newName\n\
  {\n    [_bookName autorelease];\n    _bookName = newName;\n}\n```\n\n在这种情况下，你使用\
  \ `autorelease` 作为延迟释放，以便在任何实际变更发生之前完成 `newName` 的赋值。\n\n`autorelease` 背后看似神奇的机制被称为自动释放池。这个池只是一个数据结构，它存储了将来需要释放的对象的指针。然后，每当系统库调用这个内存池时，包含在这些数据结构中的对象就会被释放。通常，每个应用程序线程都有一个自动释放池，每当应用程序从事件处理回调（例如）返回时，这个池就会被调用。\n\
  \n每个应用程序至少有一个内存池。主线程中的内存池是在 `main` 函数中建立的。建立这种内存池有两种方式。第一种方式是使用 `NSAutoreleasePool`\
  \ 对象。示例如下：\n\n```\nint main()\n{\n    NSAutoreleasePool *pool = [[NSAutoreleasePool\
  \ alloc] init];\n    // 主应用程序循环位于此处\n    [pool release];\n    return 0;\n}\n```\n\
  \n这里我只展示了 `main` 函数中处理自动释放池的部分。首先通过向 `NSAutoreleasePool` 发送 `alloc` 消息来创建 `pool`\
  \ 对象。创建此对象保证了被 `autorelease` 的对象将被存储在池中，并且会一直存在，直到池被排空（或者对其调用 `release`）。\n\n创建自动释放池的第二种方法是使用\
  \ `@autoreleasepool` 关键字。虽然这与创建 `NSAutoreleasePool` 对象非常相似，但这个关键字允许你定义一个语句块，该语句块将在同一个自动释放池下执行。存储在池中的对象的释放，以及池本身的创建和释放，都由编译器处理。示例如下：\n\
  \n```\nint main()\n{\n    @autoreleasepool\n    {\n        // 此处为其他语句\n    }\n \
  \   return 0;\n}\n```\n\n虽然我只展示了在 `main` 函数中自动释放池的示例，但这并不妨碍你在应用程序的特定位置创建其他自动释放池。事实上，如果你编写的代码需要创建和销毁大量对象，那么创建一个中间自动释放池来处理该代码段中所有需要释放的对象可能会很有益处。\n\
  \n创建额外自动释放池的主要优点是，你可以减少代码所需的总内存量。这是因为这样的中间池会提前释放内存中持有的部分对象。如果你遇到由于使用了大量对象而导致内存消耗过高的情况，创建自动释放池可能是回收代码正在分配的部分内存的一个好方法。\n\
  \n## 使用 ARC\n\n你在本章中看到的所有内容都假设你正在使用 `retain`/`release`/`autorelease` 方法进行内存管理。虽然这些是\
  \ Apple 的 Objective-C 库中内存管理的基础构建块，但也有其他方法可以让程序员用更少的精力达到相同的效果。\n\n另一种处理内存的方法是使用自动引用计数（ARC）系统，该系统是\
  \ Apple 最近提出并在其最新的编译器中实现的。ARC 是一个系统，它会自动将引用计数处理代码添加到你的程序中，这样你就不需要处理内存管理了。尽管引用计数的常规方法仍在底层使用，但你无法直接调用\
  \ `retain`、`release` 或 `autorelease`，以便编译器能够自动维护 `retain` 和 `release` 调用的平衡。\n\n\
  Apple 引入 ARC 作为手动内存管理的替代方案，这样程序员就不需要担心调用影响对象内部引用计数器的正确方法序列。同时，ARC 也是垃圾回收（GC）的替代品，垃圾回收是一种自动内存管理技术，适用于少数平台，包括\
  \ Mac OS X 中的桌面应用程序。虽然 GC 有很多优点，但 Apple 得出结论，ARC 提供了垃圾回收的大部分相同特性，同时也是一个可预测的系统，会在内存变得不可访问时将其释放。\n\
  \n在基于 GC 的系统中，对象变得不可访问与内存回收之间通常存在滞后时间，这有时会导致应用程序无响应。虽然这在桌面机器上不是什么大问题，但 Objective-C\
  \ 针对如手机和平板电脑等小型设备这一事实，使得在所有部署 Objective-C 的平台上支持 GC 变得更加困难。通过编写使用 ARC 的应用程序，程序员可以利用这项技术的广泛应用，并在每个支持的平台上部署相同的代码。\n\
  \n![A978-1-4302-5906-0_8_Fig3_HTML.jpg](img/A978-1-4302-5906-0_8_Fig3_HTML.jpg)\n\
  \n**图 8-3.** Xcode 中的项目设置面板，显示了 Objective-C 自动引用计数的选项\n\n在你使用 ARC 之前，有必要通知编译器你希望它生成启用\
  \ ARC 的代码。支持 ARC 代码不需要任何运行时更改，因为你之前看到过的那些相同消息将由编译器生成。但是，代码生成阶段需要分析应用程序当前正在使用的对象，并添加必要的消息调用，无论是\
  \ `retain`、`release` 还是 `autorelease`。所需的编译器设置在 Xcode 的项目设置面板中可用（参见图 8-3）。\n\n要使用\
  \ ARC，你只需要对现有代码做一些更改。最重要的更改是删除任何对诸如 `retain`、`release` 和 `autorelease` 等方法的调用。这些是直接操纵系统中每个对象引用计数器状态的函数。使用\
  \ ARC，你需要将这些任务交给编译器，并允许它为每种情况选择最佳选项。编译器通过分析每个变量的使用模式来实现这一点。\n\n例如，如果变量持有一个将返回给调用函数的对象，启用\
  \ ARC 的编译器会知道它需要添加一个 `autorelease` 调用来避免悬空指针。类似地，如果变量是在方法内部创建的（例如，使用对 `alloc` 的调用）并且从未在外部被引用，编译器会推断出需要释放该变量以防止内存泄漏。\n\
  \n\n\n在使用`ARC`之前，需要对代码进行另一项改动，即移除附加在属性上的与内存管理相关的特性。例如，`ARC`不识别如`retain`或`assign`这样的特性。原因在于，这些决策应在编译分析层面完成。`ARC`的目标是避免像`retain`和`assign`特性所代表的那种手动内存分配思维。\n\
  \n使用`ARC`时的另一个改动是考虑所分配内存的结构，以避免由循环引用导致的内存泄漏。循环引用指的是当一系列对象相互指向，使得每个对象`retain`下一个对象时发生的情况。为了了解这种情况如何发生，请考虑以下简化示例：\n\
  \n```\n// file SimpleReference.h\n\n@interface SimpleReference : NSObject\n\n@property\
  \ (retain) SimpleReference *nextObject;\n\n+ (SimpleReference*) setupCircularReferences;\n\
  \n@end\n```\n\n这个`SimpleReference`类除了包含对下一个对象的引用外，几乎不做其他事情。您可以将其视为一种链表数据结构，可用于遍历一系列链接的对象。该接口还包含一个类方法`setupCircularReferences`，它将返回一个包含引用的`SimpleReference`对象，您将在下文看到这一点。\n\
  \n该类的实现部分包含一些生成循环引用的代码：\n\n```\n// file SimpleReference.m\n\n#import \"SimpleReference.h\"\
  \n\n@implementation SimpleReference\n\n+ (SimpleReference*) setupCircularReferences\n\
  {\n    SimpleReference *r1 = [[SimpleReference alloc] init];\n    SimpleReference\
  \ *r2 = [[SimpleReference alloc] init];\n    SimpleReference *r3 = [[SimpleReference\
  \ alloc] init];\n    // create circular references\n    r1.nextObject = r2;\n  \
  \  r2.nextObject = r3;\n    r3.nextObject = r1;\n    return [r1 autorelease];\n\
  }\n\n@end\n```\n\n这段代码实现了一个简单的方法，分配了三个`SimpleReference`对象并以会产生循环引用的方式设置它们。发生这种情况的原因是`nextObject`属性使用了`retain`特性声明。因此，每次向链表中添加对象时，都会创建一个强引用。\n\
  \n此类循环引用的问题在于它们与引用计数机制配合不佳。假设现在您有以下辅助类：\n\n```\n// file SimpleReferenceUtil.h\n\n\
  @interface SimpleReferenceUtil : NSObject\n\n@property (retain) SimpleReference\
  \ *aReference;\n\n- (void) createReference;\n\n@end\n```\n\n这个类通过属性`aReference`持有并强引用了一个`SimpleReference`对象。以下是其实现：\n\
  \n```\n// file SimpleReferenceUtil.m\n\n#import \"SimpleReferenceUtil.h\"\n\n@implementation\
  \ SimpleReferenceUtil\n\n- (void) createReference\n{\n    self.aReference = [SimpleReference\
  \ setupCircularReferences];\n}\n\n@end\n```\n\n创建代码执行后，`SimpleReferenceUtil`类将持有一个指向`SimpleReference`类实例的强指针。由于`SimpleReference`内部存在循环引用，即使您尝试对`aReference`属性调用`release`，其中包含的三个对象仍将保持正的引用计数。这些对象将构成一块未使用且不可访问的内存区域，也就是内存泄漏。\n\
  \n使用`ARC`，您可以通过将至少一个指针声明为具有`weak`属性来避免这种情况。当属性被标记为`weak`属性时，编译器会以这样一种方式生成代码：当只有`weak`变量指向一个对象时，该对象将被释放。回到前面的示例，通过使用`weak`属性（或标记有`__weak`修饰符的变量），您可以解决循环引用问题。以下是您可以如何修改`SimpleReference`类的接口：\n\
  \n```\n// file SimpleReferenceUtil.h\n\n@interface SimpleReferenceUtil : NSObject\n\
  \n@property (weak) SimpleReference *aReference;\n\n- (void) createReference;\n\n\
  @end\n```\n\n使用这个新接口并在`ARC`编译设置下，`aReference`属性不允许保留它指向的对象。当然，您还必须提供一种使用非`weak`属性或变量来持有引用的方法。但您可以以不引入循环的方式做到这一点，例如使用一个外部数组，如下所示：\n\
  \n```\n+ (SimpleReference*) setupReferences:(NSMutableArray*)refs\n{\n    SimpleReference\
  \ *r1 = [[SimpleReference alloc] init];\n    SimpleReference *r2 = [[SimpleReference\
  \ alloc] init];\n    SimpleReference *r3 = [[SimpleReference alloc] init];\n   \
  \ // create weak circular references\n    r1.nextObject = r2;\n    r2.nextObject\
  \ = r3;\n    r3.nextObject = r1;\n    [refs addObject:r1];\n    [refs addObject:r2];\n\
  \    [refs addObject:r3];\n    return r1;\n}\n```\n\n这次，您有一组对象被添加到`refs`数组中，这足以避免任何对象被过早释放。这是因为当这些对象被插入到`NSArray`中时，作为数组实例正常操作的一部分，它们会被强引用。在创建了这些额外的（强）引用后，这些对象不会像在只有`weak`引用的情况下那样在方法结束时被释放。\n\
  \n\n\n## 总结\n\n在本章中，我概述了 Objective-C 中的内存管理。你了解到内存管理作为一种避免因内存错误访问而导致编程错误的技术的重要性。正确使用内存对于避免常见问题（如内存泄漏）是必要的，内存泄漏会导致应用无响应，并最终因内存资源不足而崩溃。\n\
  \n如果不了解对象如何创建、如何在内存中持有以及最终如何释放，就很难编写正确的软件。虽然 Objective-C 不使用未使用内存的垃圾回收机制（主要是出于性能考虑），但\
  \ Foundation 框架提供了一种简单的内存管理机制，该机制在整个系统中被一致地遵循。\n\n有三种方法控制内存的释放或保留：`retain`、`release`\
  \ 和 `autorelease`。这些方法存在于每个从 `NSObject` 派生的对象中，它们提供了对应用何时应释放内存的精细控制。这些方法是 Objective-C\
  \ 中每种内存管理方案的基础构建块。\n\n你学会了如何使用自动释放池来方便地管理由 `autorelease` 控制的对象。通过仔细运用自动释放池，可以降低特定算法所需的内存量，因为内存将被更频繁地释放。在那些使用图像和声音文件等大型对象的图形应用中，这种改变能够对产品的性能和易用性产生显著影响。在某些情况下，自动释放池也有助于提升性能：由于你将内存释放推迟到稍后的时间，你可能需要花费更少的总体时间来管理对象的即时释放。\n\
  \n你看到了内存管理消息如何与属性及其不同属性特性交互的示例。属性可用于简化许多内存管理技巧，因为它们可以自动保留或释放它们所持有的对象。通过仔细选择属性的特性，你可以极大地简化代码，同时利用\
  \ Objective-C 编译器提供的功能。\n\n最后，我讨论了自动引用计数（ARC），这是一种新技术，编译器负责推导出正确的指令来保留或释放内存。要使用\
  \ ARC，你只需遵循一些关于如何处理内存引用并激活编译时设置的约定。其结果是一个快速且稳健的系统，具有较低的内存消耗，并减少了编程错误的机会。\n\n在下一章中，我将介绍键值编程，这是一种在\
  \ Cocoa 和许多其他第三方库中广泛使用的技术。通过键值编程，你不仅能够使用通过消息实现的动态代码，还能访问那些可以通过通用方式访问的动态数据。\n\n"
- "# 9. 键值编码\n\n## 摘要\n\n在前面的章节中，你看到了 Objective-C 程序员使用面向对象编程概念处理代码的多种方式。例如，开发者可以利用语言的动态性，通过消息传递实现多态功能，甚至可以使用协议的概念向现有类添加新方法。\n\
  \n然而，面向对象编程的另一方面涉及对对象中包含的数据的访问。虽然明智的做法是避免直接访问对象管理的数据，但 Objective-C 提供了一种使用属性机制获取和设置数据的明确定义的过程。属性使数据对其他对象可用，同时保留了控制这些数据如何共享的能力。\n\
  \n然而，属性并不是跨对象共享数据的唯一方式。在本章中，我将讨论键值编码（KVC），这是一种基于 `NSObject` 层次结构功能的通用数据发布访问机制。键值编码被设计为允许通过使用编码为字符串的键在对象之间交换数据。因此，在\
  \ KVC 中，无需为每个数据元素调用不同的方法；相反，可以使用一个简单的接口来获取和设置广泛的数据。\n\n键值编程之所以是一个重要主题的另一个原因是它在许多\
  \ Objective-C 库中被使用。例如，用于从数据库及其他存储库中存储和检索数据的 CoreData 框架，采用基于 KVC 的模型来保存和检索数据对象。借助\
  \ KVC，数据可以通过一个简单的接口进行访问，从而避免了在对象之间的唯一区别是它们包含的值集不同时创建多个子类的需要。\n\n\n\n## 键值编码的概念\n\
  \n键值编码是一组接口的规范，允许对象仅使用字符串作为标识符来访问属性。这个字符串被称为*键*，用于访问属性的存储值。\n\n该规范的客户端非常简单，它使用两个方法来读取和设置特定属性。`valueForKey:`\
  \ 方法负责访问特定键中存储的值。键对象是一个 `NSString`，因此你可以使用相同的接口访问不同类型的对象。第二个方法是 `setValue:forKey:`，用于为特定键设置值对象。\n\
  \nKVC 最出色的特点之一是，你几乎不需要做任何额外工作就能支持对实例变量的访问——前提是你愿意提供对数据的完全访问权限。默认情况下，KVC 通过其在 `NSObject`\
  \ 上的实现启用，因此你只需在任何 `NSObject` 派生对象中调用 `valueForKey:` 即可访问数据，示例如下：\n\n```\n// 文件：KVSample.h\n\
  // 包含三个变量的示例接口\n\n@interface KVSample : NSObject\n{\n        int anInt;\n      \
  \  double aDouble;\n        NSString *aString;\n}\n- (id) init;\n+ (void) accessData;\n\
  @end\n```\n\n这是一个简单的类接口，包含三个实例变量：一个整数、一个双精度浮点数和一个字符串变量。此外，还有一个 `init` 方法和一个名为 `accessData`\
  \ 的类方法，用于测试目的。以下是使用 KVC 访问这些实例变量的方式：\n\n```\n// 文件：KVSample.m\n#import \"KVSample.h\"\
  \n\n@implementation KVSample\n\n- (id) init\n{\n        KVSample *obj = [super init];\n\
  \        if (obj)\n        {\n               obj->anInt = 10;\n               obj->aDouble\
  \ = 11.0;\n               obj->aString = @\"test\";\n        }\n        return obj;\n\
  }\n\n+ (void) accessData\n{\n        KVSample *sample = [[KVSample alloc] init];\n\
  \        NSNumber *a = [sample valueForKey:@\"anInt\"];\n        NSLog(@\"整数值: %@\"\
  , a);\n        NSNumber *b = [sample valueForKey:@\"aDouble\"];\n        NSLog(@\"\
  双精度浮点值: %@\", b);\n        NSNumber *c = [sample valueForKey:@\"aString\"];\n  \
  \      NSLog(@\"双精度浮点值: %@\", c);\n        [sample release];\n}\n\n@end\n```\n\n\
  此处使用的 `init` 方法很直接，与 Objective-C 中使用的其他 `init` 方法类似。在类的初始化部分，你为 `KVSample` 中的每个实例变量赋测试值。它们将包含值\
  \ `10`、`11.0` 和 `\"test\"`。\n\n`accessData` 方法只是一个示例，展示了任何其他客户端如何使用 KVC 来读取存储在 Objective-C\
  \ 对象中的数据。要使此方法生效，你需要将要访问的数据名称作为键提供给 `valueForKey:`。运行时系统知道类中每个实例变量的名称，并将你作为键传递的名称转换为包含数据的变量的正确地址。\n\
  \n### 避免直接访问\n\n从上面的例子可以看出，派生自 `NSObject` 的类的默认行为是允许通过 KVC 机制进行访问。但是，你可能不希望授予这种访问权限。例如，如果你正在定义一个可编写脚本的接口，你可能希望将一些实例变量置于外部代码无法访问的范围。再比如，如果类包含一个保存密码的实例变量，你可能希望限制与应用程序交互的脚本对该变量的访问。\n\
  \n要禁用默认行为，KVC 提供了一个名为 `accessInstanceVariablesDirectly` 的方法。可以在派生类中重写此方法，以表明你不希望授予所有实例变量默认的访问级别。以下是该方法的声明方式：\n\
  \n```\n// 文件：KVSample.h\n@interface KVSample : NSObject\n{\n        int anInt;\n\
  \        double aDouble;\n        NSString *aString;\n}\n- (id) init;\n+ (BOOL)\
  \ accessInstanceVariablesDirectly;\n+ (void) accessData;\n@end\n```\n\n在实现部分，你可以添加该方法，返回\
  \ `NO` 以指示变量不应被直接访问，如下所示：\n\n```\n// 文件：KVSample.m\n#import \"KVSample.h\"\n\n@implementation\
  \ KVSample\n// 在此处实现其他方法\n\n+ (BOOL) accessInstanceVariablesDirectly\n{\n      \
  \  return NO;\n}\n\n@end\n```\n\n这个修改后的 `KVSample` 版本实现了类方法 `accessInstanceVariablesDirectly`。该类方法返回一个假值，以指示运行时系统不应访问其中包含的实例变量。要检查新实现是否正常工作，你可以在该修改版本中运行\
  \ `accessData` 方法。结果，你将看到以下错误信息：\n\n`this class is not key value coding-compliant\
  \ for the key anInt.`\n\n### 编写属性访问器\n\nKVC 属性可以隐式地通过实例变量定义，也可以显式地通过 getter 和 setter\
  \ 定义。通用 getter 方法的语法是 `– (<data type>) <key>`，其中 *key* 是你期望作为键接收的字符串。例如，如果你想提供对\
  \ `KVSample` 中实例方法的访问，可以编写一个包含 getter 的接口，如下所示：\n\n```\n// 文件：KVSample.h\n// 包含三个变量的示例接口\n\
  \n@interface KVSample : NSObject\n{\n        int _anInt;\n        double _aDouble;\n\
  \        NSString *_aString;\n}\n- (int) anInt;\n- (double) aDouble;\n- (NSString*)aString;\n\
  + (void) accessData;\n// 在此处添加其他方法\n@end\n```\n\n请注意，这次你更新了实例变量名称，使其以下划线开头，这是一种常见的命名约定，用于将它们与属性名称区分开来。\n\
  \n现在你需要为声明的 KVC 数据提供 getter 实现。\n\n```\n// 文件：KVSample.m\n#import \"KVSample.h\"\
  \n\n@implementation KVSample\n\n- (id) init\n{\n        KVSample *obj = [super init];\n\
  \        if (obj)\n        {\n               obj->_anInt = 10;\n               obj->_aDouble\
  \ = 11.0;\n               obj->_aString = @\"test\";\n        }\n        return\
  \ obj;\n}\n\n- (int) anInt\n{\n        return _anInt;\n}\n\n- (double) aDouble\n\
  {\n        return _aDouble;\n}\n\n- (NSString*)aString\n{\n        return _aString;\n\
  }\n\n// 在此处添加其他方法\n@end\n```\n\n现在你可以使用以下示例代码在 `KVSample` 上调用 `accessData` 方法：\n\
  \n```\n- (void) testKVSample\n{\n        [KVSample accessData];\n}\n```\n\n这将顺利运行，因为\
  \ `accessData` 使用的所有键都有相应的 getter 实现，这些 getter 返回实例变量的内容。例如，当执行以下代码段时：\n\n```\n\
  [sample valueForKey:@\"aDouble\"]\n```\n\nObjective-C 运行时将查找名为 `aDouble` 的 getter\
  \ 方法，并返回将该消息发送给目标对象 `sample` 后收到的响应。运行时还会将 `double` 类型的返回值存储到一个 `NSNumber` 对象中，以便你可以通过面向对象的接口统一处理返回值。\n\
  \n\n\n#### 修改值\n\nKVC 的另一方面涉及通过字符串键来修改传递给目标的值。客户端访问此功能的接口也非常统一，并采用了 `setValue:forKey:`\
  \ 方法。\n\n以下是类方法 `accessData` 如何被修改以设置导出键 `aDouble`、`anInt` 和 `aString` 的初始值的示例：\n\
  \n```\n@interface KVSample : NSObject\n{\n    int _anInt;\n    double _aDouble;\n\
  \    NSString *_aString;\n}\n- (int) anInt;\n- (double) aDouble;\n- (NSString*)aString;\n\
  - (void) setAnInt:(int) val;\n- (void) setADouble: (double) val;\n- (void) setAString:\
  \ (NSString*) str;\n- (id) init;\n+ (BOOL) accessInstanceVariablesDirectly;\n+ (void)\
  \ accessData;\n@end\n```\n\n这个修改后的接口增加了一组 `set<Key>:` 方法，这些方法接收一个输入值并用它来更新对应的实例变量。以下是这些方法的实现方式：\n\
  \n```\n- (void) setAnInt:(int) x\n{\n    _anInt = x;\n}\n- (void) setADouble: (double)\
  \ x\n{\n    _aDouble = x;\n}\n- (void) setAString: (NSString*) s\n{\n    _aString\
  \ = s;\n}\n```\n\n最后，使用这些 setter，你可以修改 `accessData` 的代码，以便更新 `aString`、`anInt` 和\
  \ `aDouble` 键的内容为新值：\n\n```\n+ (void) accessData\n{\n    KVSample *sample = [[KVSample\
  \ alloc] init];\n    [sample setValue:@20 forKey:@\"anInt\"];\n    [sample setValue:@44.0\
  \ forKey:@\"aDouble\"];\n    [sample setValue:@\"another value\" forKey:@\"aString\"\
  ];\n    NSNumber *a = [sample valueForKey:@\"anInt\"];\n    NSLog(@\"int value:\
  \ %@\", a);\n    NSNumber *b = [sample valueForKey:@\"aDouble\"];\n    NSLog(@\"\
  double value: %@\", b);\n    NSNumber *c = [sample valueForKey:@\"aString\"];\n\
  \    NSLog(@\"double value: %@\", c);\n}\n```\n\n这里，你获取了 `KVSample` 的 `sample` 实例，并向其发送了三条消息，每条消息都为此对象所支持的一个键提供了一个值。\n\
  \n从这段代码可以看出，KVC 支持存储所有常见数据类型值的键，例如 `int`、`double` 和 `NSString`。还有其他支持的类型，例如 `float`、`char`\
  \ 和 `long`。本质上，KVC 接口支持所有原生数据类型。`BOOL` 类型也有两种支持方式。例如，一个名为 `enabled` 的 `BOOL` 类型键，可以映射到\
  \ getter 方法 `-(BOOL)isEnabled` 或 `-(BOOL)enabled`。如果找到这两个 getter 方法中的任何一个，都将用于返回所需的值。另一方面，在这种情况下，setter\
  \ 方法必须命名为 `setEnabled:`。\n\n## 注意\n\nFoundation 框架定义了一种方法，让类能够验证传递给 `setValue:forKey:`\
  \ 的值。可以向 KVC 兼容的类添加 `validate<key>:` 方法，以确定此类参数是否有效。但是，KVC 类的使用者有责任在必要时调用 `validate<key>:`。你应该检查你所使用的类是否提供了参数验证，并按照类接口中定义的方式使用它。\n\
  \n### KVC 与属性\n\n在阅读上述关于键和值之间的关系，以及它们如何映射到 getter 和 setter 的描述时，你可能已经注意到这些概念与属性概念之间的相似性。尽管\
  \ KVC 和属性是两项独立的技术，但它们被设计为具有互补特性，以便能够很好地相互配合。\n\n属性与 KVC 兼容对象暴露的值之间最明显的关系是，它们都使用\
  \ getter 和 setter，而这些 getter 和 setter 与当前类中的底层实例变量紧密映射。这意味着，通过定义属性，你可以进一步简化创建 KVC\
  \ 兼容类的过程。\n\n利用属性与键值对之间的这种等价关系，你可以使用以下更简单的接口重写 `KVSample` 类：\n\n```\n// file: KVSample.h\n\
  // 包含三个变量的示例接口\n@interface KVSample : NSObject\n@property int anInt;\n@property\
  \ double aDouble;\n@property (retain) NSString *aString;\n- (id) init;\n+ (BOOL)\
  \ accessInstanceVariablesDirectly;\n+ (void) accessData;\n@end\n```\n\n请注意，现在你有三个属性，分别代表类中存储的三个实例变量。你可以从接口中移除实例变量的声明，因为当编译器处理属性定义时，它们会被隐式创建。\n\
  \n你还可以移除那一组充当 getter 和 setter 的方法。这些方法现在是隐式定义的，因为在编译期间它们会与其对应的属性一起被合成。此外，这些更改使内存管理变得更加容易，因为你可以使用诸如\
  \ `retain` 或 `copy` 之类的关键字来执行所需的内存管理策略。\n\n以下是 `KVSample` 类的简化实现：\n\n```\n// file:\
  \ KVSample.m\n#import \"KVSample.h\"\n@implementation KVSample\n- (id) init\n{\n\
  \    self = [super init];\n    if (self)\n    {\n        self.anInt = 10;\n    \
  \    self.aDouble = 11.0;\n        self.aString = @\"test\";\n    }\n    return\
  \ self;\n}\n+ (void) accessData\n{\n    KVSample *sample = [[KVSample alloc] init];\n\
  \    NSNumber *a = [sample valueForKey:@\"anInt\"];\n    NSLog(@\"int value: %@\"\
  , a);\n    NSNumber *b = [sample valueForKey:@\"aDouble\"];\n    NSLog(@\"double\
  \ value: %@\", b);\n    NSNumber *c = [sample valueForKey:@\"aString\"];\n    NSLog(@\"\
  double value: %@\", c);\n    [sample setValue:@20 forKey:@\"anInt\"];\n    [sample\
  \ setValue:@44.0 forKey:@\"aDouble\"];\n    [sample setValue:@\"another value\"\
  \ forKey:@\"aString\"];\n    [sample setValue:@YES forKey:@\"enabled\"];\n    a\
  \ = [sample valueForKey:@\"anInt\"];\n    NSLog(@\"int value: %@\", a);\n    b =\
  \ [sample valueForKey:@\"aDouble\"];\n    NSLog(@\"double value: %@\", b);\n   \
  \ c = [sample valueForKey:@\"aString\"];\n    NSLog(@\"double value: %@\", c);\n\
  }\n+ (BOOL) accessInstanceVariablesDirectly\n{\n    return NO;\n}\n@end\n```\n\n\
  从实现中移除所有 setter 和 getter 后，你会得到更简洁、更易于维护的代码。你可能还想更改访问属性的方式，使用更简洁的点语法来引用数据，而不是之前一直使用的以下划线开头的实例变量。\n\
  \n\n\n## 使用结构体\n\n在前面的章节中，你已经学习了如何使用 KVC 公开简单的属性，这些属性是通过数字或字符串等标量数据类型定义的。对于数字，其值会自动转换为对象包装器，例如\
  \ `NSNumber`。处理结构体也是类似的。不过，你无需担心数据包装的过程，因为运行时库已经知道如何为任何用户自定义的结构体创建必要的对象。\n\n使用 KVC\
  \ 系统处理结构化数据的秘诀在于，运行时库会自动将 `struct` 转换为 `NSValue` 对象。`NSValue`，顾名思义，是一个能够容纳任何值的对象，比如数字、字符串，甚至是包含用户自定义数据类型的\
  \ `struct`。一旦数据存储到 `NSValue` 中，它就变得不可变，并且之后可以转换为所需的目标类型。\n\n下面是一个示例类，演示了如何将结构体与\
  \ KVC 配合使用。首先，你需要使用 `typedef` 来命名一个用户自定义类型。\n\n```\n// 文件 KVStructSample.h\n\ntypedef\
  \ struct\n{\n        int anInt;\n        double aDouble;\n}\nSampleStruct;\n```\n\
  \n然后，定义一个新类，其中包含一个 `SampleStruct` 类型的数据项。\n\n```\n// 文件 KVStructSample.h\n\n@interface\
  \ KVStructSample : NSObject\n{\n        SampleStruct _structValue;\n}\n\n@property\
  \ SampleStruct structValue;\n\n@end\n```\n\n为了简化实现，添加了一个 `SampleStruct` 类型的属性，但你也可以像之前看到的那样，仅使用实例变量来完成同样的操作。现在，类的实现负责初始化对象。同时，你还可以有一个类方法，用于创建新实例并显示其数据。\n\
  \n```\n// 文件 KVStructSample.m\n\n@implementation KVStructSample\n\n- (id) init\n\
  {\n        KVStructSample *obj = [super init];\n        if (obj)\n        {\n  \
  \             SampleStruct val = { 1, 2.0 };\n               obj.structValue = val;\n\
  \        }\n        return obj;\n}\n\n+ (void) accessData\n{\n        KVStructSample\
  \ *sample = [[KVStructSample alloc] init];\n        NSValue *val = [sample valueForKey:@\"\
  structValue\"];\n        SampleStruct structVal;\n        [val getValue:&structVal];\n\
  \        NSLog(@\"该值是 %d 和 %lf\", structVal.anInt, structVal.aDouble);\n       \
  \ [sample release];\n}\n\n@end\n```\n\n第一个方法 `init` 为 `SampleStruct` 类型的属性设置初始值。为此，你需要创建一个给定结构类型的新变量，并将其复制到实例变量\
  \ `structValue` 中。\n\n这里展示的 `accessData` 方法只是一个如何使用此类进行操作的示例。它创建了一个 `KVStructSample`\
  \ 实例，然后通过发送 `valueForKey:` 消息来获取一个 `NSValue` 对象。由 `valueForKey:` 返回的 `NSValue` 对象包含一个\
  \ `SampleStruct` 的值。要取回该值，你需要使用 `getValue:` 方法，该方法接收一个指向用户定义结构体的指针作为参数。然后，你可以继续打印该结构体组件\
  \ `anInt` 和 `aDouble` 的值，这些值将在日志窗口中显示为 `1` 和 `2.0`。\n\n## 通过键路径访问对象\n\n一旦你能够通过符合\
  \ KVC 的键访问对象中包含的标量数据和结构体，就需要下一级别的功能：即，能够对使用对象类型定义的属性执行相同的操作。例如，一个 `Factory` 对象可能包含一个或多个\
  \ `Employee` 对象。这些对象应该可以通过 KVC 风格的接口进行访问。\n\n为了通过 KVC 使通用对象变得可访问，运行时系统不仅支持由一个单词组成的简单键的概念，还支持使用完整路径标记法确定的复合键的概念。在路径定义中，Objective-C\
  \ 使用点号 (`.`) 作为路径各段之间的分隔符，这样你就可以指定基对象和所需属性之间包含层次结构中的所有元素。\n\n使用键路径，运行时系统能够遍历由点号分隔的元素指定的对象列表。然后，就可以根据键路径说明来检索或修改元素。\n\
  \n为了更好地理解这个过程是如何工作的，考虑一下 `BankEmployee` 类，它存储了单个银行员工的信息，包括一个名为 `salary` 的属性。以下是其接口定义：\n\
  \n```\n// 文件 BankEmployee.h\n\n@interface BankEmployee : NSObject\n\n@property double\
  \ salary;\n\n- (id) init ;\n\n// 其他属性和方法在此处\n\n@end\n```\n\n这里只展示了 `salary` 属性和\
  \ `init` 方法。`init` 的实现与你之前在其他示例中看到的类似。\n\n```\n// 文件 BankEmployee.m\n\n#import \"\
  BankEmployee.h\"\n\n@implementation BankEmployee\n\n- (id) init\n{\n        self\
  \ = [super init];\n        if (self)\n        {\n               self.salary = 200000.0;\n\
  \        }\n        return self;\n}\n\n@end\n```\n\n请注意，出于测试目的，你将 `salary` 属性初始化为一个常量，该常量稍后将被检索。现在，考虑将此类的对象用作\
  \ `Bank` 类的一部分，该类具有以下接口：\n\n```\n// 文件 Bank.h\n\n@interface Bank : NSObject\n\n\
  @property (retain) BankEmployee *employee;\n\n+ (void) accessBank ;\n\n- (id) init;\n\
  \n@end\n```\n\n这个类中有一个属性，就像之前的示例一样，但这次该属性不是原生数据类型或 `struct`，而是一个 `BankEmployee`\
  \ 类型的对象。你使用 `init` 函数来创建一个该类型的新对象，并设置其默认值。`accessBank` 方法演示了如何使用键路径来访问这个基于对象的属性的内容：\n\
  \n```\n// 文件 Bank.m\n\n#import \"Bank.h\"\n\n@implementation Bank\n\n- (id) init\n\
  {\n        Bank *obj = [super init];\n        if (obj)\n        {\n            \
  \   obj.employee = [[BankEmployee alloc] init];\n        }\n        return obj;\n\
  }\n\n+ (void) accessBank\n{\n        Bank *bank = [[Bank alloc] init];\n       \
  \ id res = [bank valueForKeyPath:@\"employee.salary\"];\n        NSLog(@\"薪资是 %@\"\
  , res);\n}\n\n// 你需要释放 employee 对象\n\n- (void) dealloc\n{\n        self.employee\
  \ = nil;\n        [super dealloc];\n}\n\n@end\n```\n\n请注意在 `accessBank` 方法内部使用了\
  \ `valueForKeyPath:` 方法。你需要传入一个相对于目标对象的点号分隔路径，才能访问所需的属性。这个消息调用返回的值是一个 `NSValue`\
  \ 类型的对象，类似于你在之前的示例中看到的。`accessBank` 方法的结果将是，默认薪资 `200000.0` 会被打印到日志窗口。\n\n\n\n##\
  \ 访问集合\n\n在使用 KVC 时，另一种常见的情况是一个或多个键对应一个对象集合。当出现这种情况时，你需要使用一些面向集合的方法，这些方法能够与因请求而创建的数组或元素集进行交互。\n\
  \nKVC 规范提供了一种访问内部使用的集合成员的方式。例如，假设你有一个名为 `employees` 的数组。KVC 可以通过实例变量名直接访问、通过属性访问，或使用一对访问器方法来访问该数组的元素。下面我们使用方法访问的方式，以此说明一般情况下的具体操作。在这种情况下，如果你想暴露一个名为\
  \ `bankEmployees` 的属性，你需要提供一个名为 `objectInEmployeesAtIndex:` 的属性 getter 方法。为了通过 KVC\
  \ 支持 `bankEmployees` 属性，需要对 `Bank` 类进行以下修改：\n\n```objc\n// file Bank.h\n\n@interface\
  \ Bank : NSObject\n\n{\nNSArray *employees;\n}\n\n- (NSUInteger) countOfBankEmployees;\n\
  - (id) objectInBankEmployeesAtIndex:(NSUInteger)index;\n+ (void) accessBankData;\n\
  - (id) init;\n\n@end\n```\n\n首先，请注意你将值存储在一个名为 `employees` 的内部 `NSArray` 对象中。KVC\
  \ 的接口是通过 `countOfBankEmployees` 和 `objectInBankEmployeesAtIndex:` 这两个方法实现的。这些方法在功能上与\
  \ `NSArray` 类中的 `count` 和 `objectAtIndex:` 方法类似。以下是该类的实现：\n\n```objc\n@implementation\
  \ Bank\n\n- (id) init\n{\nself = [super init];\nif (self)\n{\nself->employees =\
  \ @[[[[BankEmployee alloc] init] autorelease]];\n}\nreturn self;\n}\n\n- (NSUInteger)\
  \ countOfBankEmployees\n{\nreturn self->employees.count;\n}\n\n- (id) objectInBankEmployeesAtIndex:(NSUInteger)index\n\
  {\nreturn self->employees[index];\n}\n\n- (void) dealloc\n{\n[self->employees release];\n\
  [super dealloc];\n}\n\n@end\n```\n\n`init` 方法负责设置数组的初始内容。为了演示，我创建了一个包含单个元素的 `NSArray`。接着实现了\
  \ `count` 和 `objectIn<key>AtIndex:` 方法。由于你有一个包含待发布内容的内部数组，这些方法的实现很简单。但你不需要局限于使用数组作为底层实现。任何对象集合都可以用来存储此接口的数据。\n\
  \n接下来，你需要使用 `dealloc` 释放该类中的资源，这与你在其他情况下看到的方式类似。最后，我将展示如何通过一个名为 `accessBankData:`\
  \ 的类方法来使用 `Bank`。\n\n```objc\n+ (void) accessBankData\n{\nBank *bank = [[Bank alloc]\
  \ init];\nNSArray * res = [bank valueForKeyPath:@\"bankEmployees\"];\nNSLog(@\"\
  The first employee is %@\", res[0]);\n[bank release];\n}\n```\n\n首先，使用 `alloc` 创建一个新对象。然后你可以使用\
  \ `valueForKeyPath:` 来检索 `bankEmployees` 数组。可以看到，即使 `bankEmployees` 仅作为一组提供对该命名属性访问权限的方法而存在，仍然返回了一个数组。最后，你可以使用\
  \ `NSArray` 操作的现代数组表示法打印数组的第一个元素。\n\n返回集合是一项有用的功能，但这并非 KVC 在数据集合上能做的全部事情。客户端可以请求对数据集应用某些操作，并将操作结果作为给定键的值返回。这些特殊操作成为键的一部分，可以看作是一种用于集合操作的迷你语言。以下是可以在键路径中应用的一些操作的简要列表。\n\
  \n- `@avg`：返回索引集合中所有元素的平均值。\n- `@max`：返回键路径中指定集合内某个属性的最大值。\n- `@min`：返回键路径中指定集合内某个属性的最小值。\n\
  - `@sum`：返回键路径中指定集合内所有条目的总和。\n\n使用这些属性，你可以基于数组和集合的内容执行快速计算，这有助于简化对对象的某些操作。在所有这些操作中，运行时负责收集数据并执行操作以返回所需的值，而无需目标类进行任何干预。\n\
  \n以下是一个在键路径中使用运算符的简单示例，考虑以下类方法：\n\n```objc\n+ (void) accessBankSalaries\n{\nBank\
  \ *bank = [[Bank alloc] init];\nid res = [bank valueForKeyPath:@\"bankEmployees.@sum.salary\"\
  ];\nNSLog(@\"The total salary amount is %@\", res);\n[bank release];\n}\n```\n\n\
  类方法 `accessBankSalaries` 负责计算银行支付的总薪资。此计算由 KVC 系统执行，输入为完整的键路径以及 `@sum` 运算符。当此代码运行时，KVC\
  \ 系统将首先查找集合（作为键路径的第一个元素提供）。然后，运算符 `@sum` 应用于前一路径的 `salary` 属性。最后，计算出的数量作为与键路径关联的值返回。\n\
  \n## 响应未定义键\n\nKVC 建立了一种机制，客户端可以仅使用通用字符串键作为输入，来请求存储在对象上的属性。因此，运行时系统被有效地用于将调用者与实现所请求功能的类解耦。由于你不依赖编译，所有涉及\
  \ KVC 的操作都涉及仅在执行期间执行的属性检查。因此，某些属性检查可能不成功并产生意外错误。\n\n在这种情况下，充分的测试是彻底避免运行时问题的最佳方法。然而，为了减轻因错误的\
  \ KVC 键访问而导致的一些问题，Objective-C 提供了一个名为 `valueForUndefinedKey:` 的附加方法。通过实现此方法，类可以启用一种有效的机制来处理作为输入提供的未定义键。\n\
  \n`valueForUndefinedKey:` 的特定实现可用于在 KVC 系统运行时未将键识别为有效时仍提供一个值。这样，`valueForUndefinedKey:`\
  \ 就充当了返回用户请求值的“最后一次机会”。例如，以下方法避免了未定义键的错误，并简单地返回 `0` 作为默认响应：\n\n```objc\n- (id)valueForUndefinedKey:(NSString\
  \ *)key\n{\n         return [NSNumber numberWithInt:0];\n}\n```\n\n\n\n## KVC 与\
  \ KVO\n\n`KVC` 是一项在 Cocoa 框架多个领域使用的技术。其中一个大量运用 `KVC` 的领域是用于数据观察和通知的键值观察（`KVO`）系统，该机制广泛应用于\
  \ `CoreData` 及其他场景。`KVO` 是一种机制，通过它，对象能够对被观察属性值的变化做出响应。换言之，`KVO` 是一种通用的通知机制，它依赖 `KVC`\
  \ 来确定如何访问键及其对应的值。\n\n`KVO` 解决方案包含两个主要元素：观察者和观察目标。要成为观察者，你需要在合适的目标对象上调用 `addObserver：forKeyPath：options：context：`\
  \ 方法。随后，观察者还需要实现 `observeValueForKeyPath：ofObject：change：context：` 方法。每当被观察对象发生变更时，该方法都会被调用。最后，客户端可以通过调用\
  \ `removeObserver：` 方法来停止观察某个对象。\n\n要成为 `KVO` 目标，对象首先需要符合 `KVC` 规范。这意味着 `KVC` 属性需要像前文讨论的那样暴露给客户端。这保证了\
  \ `NSObject` 能够管理对象中暴露的属性，同时使这些属性可供观察者使用。每当对象中的某个属性发生变化时，已订阅的观察者将自动收到通知。\n\n让我们看一个实际运作的例子。假设你正在创建一个\
  \ `BankPayroll` 类，它使用之前讨论过的 `BankEmployee` 类。你希望获知 `salary` 属性值何时发生变化，以便使薪资计算保持最新。以下是使用\
  \ `KVO` 实现此功能的方式：\n\n```\n@interface BankPayrool : NSObject\n{\n    BankEmployee\
  \ *employee;\n    double _currentSalary;\n}\n\n- (id) initWithEmployee:(BankEmployee\
  \ *)anEmployee;\n- (void) startObserving;\n+ (void) useBankPayroll;\n@end\n```\n\
  \n你存储了两个实例变量：一个用于 `employee` 对象，另一个用于存储当前薪资信息。以下是实现文件：\n\n```\n@implementation BankPayrool\n\
  \n- (id) initWithEmployee:(BankEmployee *)anEmployee\n{\n    self = [super init];\n\
  \    if (self)\n    {\n        employee = anEmployee;\n        [employee retain];\n\
  \    }\n    return self;\n}\n\n- (void) dealloc\n{\n    [employee removeObserver:self\
  \ forKeyPath:@\"salary\"];\n    [employee release];\n    [super dealloc];\n}\n\n\
  - (void) startObserving\n{\n    [employee addObserver:self forKeyPath:@\"salary\"\
  \n                  options:NSKeyValueObservingOptionNew\n                  context:nil];\n\
  }\n\n- (void) observeValueForKeyPath:(NSString *)keyPath\n                     \
  \  ofObject:(id)object\n                         change:(NSDictionary *)change\n\
  \                        context:(void *)context\n{\n    if (object == employee)\n\
  \    {\n        [self setValue:\n            [change objectForKey:NSKeyValueChangeNewKey]\n\
  \                forKey:@\"currentSalary\"];\n        NSLog(@\"current salary is\
  \ now %lf\", _currentSalary);\n    }\n}\n\n@end\n```\n\n最后，你可以通过实现一个示例类方法 `useBankPayroll`\
  \ 来使用上述代码，该方法会更改 `salary` 属性。结果，你将看到一条日志消息，显示 `BankPayroll` 类接收到的新的薪资值。\n\n```\n\
  + (void) useBankPayroll\n{\n    BankEmployee *employee = [[BankEmployee alloc] init];\n\
  \    BankPayrool *payroll = [[BankPayrool alloc] initWithEmployee:employee];\n \
  \   [payroll startObserving];\n    [employee setValue:@300000.0 forKey:@\"salary\"\
  ];\n    [payroll release];\n    [employee release];\n}\n```\n\n首先，你创建了 employee\
  \ 对象，因为它将作为 `BankPayroll` 类的参数。然后你发送了 `startObserving` 消息，该消息将 payroll 对象注册为 `employee`\
  \ 的观察者。最后，你为 `employee` 的 `salary` 属性设置了一个新值。这会触发向 payroll 发送通知，后者会将一些信息打印到日志中。\n\
  \n## 总结\n\n在本章中，你探索了 Objective-C 中的键值编码系统。`KVC` 是一套约定和方法，允许仅使用字符串键或键路径来进行通用数据访问。要使用\
  \ `KVC` 访问数据，你只需使用 `valueForKey：` 消息。你也可以使用 `setValue:forKey:` 方法修改已暴露的数据。这个简单的接口可用于与原生或用户定义的（`struct`）数据类型进行交互。`KVC`\
  \ 还允许你使用键路径与嵌入式对象进行交互，其中完整的属性名使用点号分隔。\n\n`KVC` 既支持处理集合对象，也支持处理整型和字符串等单值。对于集合，你需要暴露标准的\
  \ Objective-C 集合（如 `NSArray` 和 `NSSet`），或者实现与 `NSArray` 中 `count` 和 `objectAtIndex:`\
  \ 等价的方法。我并未涵盖支持集合时你可能拥有的所有选项，但有关 `KVC` 的在线文档非常易读，并包含了你所需的所有细节。\n\n最后，我向你展示了键值观察（`KVO`）是如何与\
  \ `KVC` 交互的。`KVO` 利用 `KVC` 系统，在其之上创建了一个通知机制。这样，对象不仅可以通过键访问暴露的属性，还可以在这些属性发生变化时收到通知。\n\
  \n在下一章中，你将看到迄今为止所讨论的面向对象编程概念的一个重要应用。为此，我将向你展示 Objective-C 如何使用 Foundation 框架支持与文件系统的基本和高级交互。\n\
  \n"
- "# 文件系统\n\n## 摘要\n\n使用 Objective-C 的亮点之一是能够使用高质量库来访问操作系统提供的大部分资源。在本章中，我将向你展示 Foundation\
  \ 框架中用于与外部存储文件进行交互的一些类和方法。\n\n在 Objective-C 中，与文件系统交互有多种方式。首先，Foundation 框架提供了一些可用于简化文件读写访问的方法。这些方法已被添加到\
  \ `NSString` 和 `NSData` 等类中，提供了一种便捷的方式来访问文件，而无需担心底层存储细节。`NSString` 等对象的内部机制将执行读写数据到磁盘所需的所有步骤。\n\
  \n另一方面，在某些时候，更精细地控制文件访问方式非常重要。例如，大文件可能需要很长时间才能访问。通过使用异步接口，你可以避免此类大型 I/O 延迟。提供这种控制级别是\
  \ `NSStream`、`NSInputStream` 和 `NSOutputStream` 等专业化类的目标。它们允许程序员决定文件访问的细节，例如用于传输数据的内部缓冲区大小。还可以暂存数据，仅在应用程序认为必要时才使其对外部文件可用。我将举例说明这些类的工作方式，并开发一个真正异步的数据传输到文件的解决方案。\n\
  \n\n\n## 使用 NSURL 指定位置\n\n在 Foundation 框架中访问文件时，通常需要创建一个 `NSURL` 对象，它代表一个单一的 URL。URL（统一资源定位符）是操作系统用于定位特定资源的标识符。URL\
  \ 不仅能定位文件，还能用于远程资源，例如网页或 FTP 文件。不过，这里我们只关注本地资源。\n\n本地文件的 URL 以 `file://` 开头。例如，要访问位于\
  \ `/Users/user1/file.txt` 的文件，你应该使用 URL `file://Users/user1/file.txt`。\n\nCocoa\
  \ 中大多数与文件相关的方法都使用 `NSURL` 对象，而不是（或除了）基于字符串的路径名。原因在于，与标准路径相比，`NSURL` 对象具有若干优势。首先，路径名是系统相关的。例如，有些系统使用正斜杠作为分隔符，而另一些则使用反斜杠或冒号。URL\
  \ 的创建正是为了抽象这些差异。\n\n`NSURL` 提供的另一项服务是，一旦文件被访问，它就能持续追踪该文件。例如，即使文件在文件系统中被移动了，`NSURL`\
  \ 对象也能继续引用它，尽管其路径已经改变。\n\n最后，URL 不仅限于表示本地文件。你可以使用 URL 通过多种协议来处理远程文件。虽然你可能需要修改代码来处理此类远程资源，但位置的表示形式保持不变。这也是\
  \ Cocoa 库尽可能倾向于使用 `NSURL` 的另一个原因：这样，在使用远程资源与本地资源时，无需更改表示形式。\n\n## 读写文本文件\n\n一旦你为要访问的文件找到了正确的位置（通常以\
  \ `NSURL` 对象的形式），下一步就是使用与文件系统交互的某个 Cocoa 对象来读取或写入内容。\n\n本章将介绍的第一个对象是 `NSString`。在处理文本文件时，`NSString`\
  \ 可能是与文件内容交互的最简单方式——除非文件中有一些额外的结构，例如 XML。让我们看一个如何使用名为 `FileReader` 的类通过 `NSString`\
  \ 从文本文件读取数据的示例。\n\n```\n// file FileReader.h\n\n@interface FileReader : NSObject\n\
  \n+ (void) readTest;\n\n- (void) readFile:(NSString*) fileName;\n\n@end\n```\n\n\
  这个类中有两个方法：一个实例方法 `readFile:` 和一个类方法 `readTest`。\n\n```\n// file FileReader.m\n\n\
  #import \"FileReader.h\"\n\n@implementation FileReader\n\n- (void) readFile:(NSString*)\
  \ fileName\n\n{\n\nNSURL *url = [NSURL URLWithString:fileName];\n\nNSError *error;\n\
  \nNSString *str = [NSString\n\nstringWithContentsOfURL:url\n\nencoding:kCFStringEncodingUnicode\n\
  \nerror:&error];\n\nNSLog(@\"String is %@\", str);\n\n}\n\n+ (void) readTest\n\n\
  {\n\nFileReader *reader = [[FileReader alloc] init];\n\n[reader readFile:@\"file:///Users/oliveira/testFile\"\
  ];\n\n}\n\n@end\n```\n\n`readFile:` 方法的操作过程如下：首先，它使用 `URLWithString:` 方法创建一个 `NSURL`\
  \ 对象。一旦创建了 URL 对象，就用它来初始化一个包含其内容的字符串。`stringWithContentsOfURL:encoding:error:` 负责打开\
  \ URL 并将其内容传输到 `NSString` 的内部缓冲区。这个方法需要一个编码类型，该类型决定了文件中文本的表示方式。此选项根据编码文本所使用的语言类型而变化。最后，当产生错误条件时，该方法会在其最后一个参数中返回一个错误对象。\n\
  \n注意\n\n`NSString` 也允许从文件路径（而非 URL）读取内容。尽管这很方便，但在大多数情况下，你应该优先使用 `NSURL`。这将有助于保持可移植性，并使你的程序能够使用不同类型的\
  \ URL。\n\n类似地，`NSString` 也可以用于将数据写入文本文件。以下代码展示了如何实现一个 `FileWriter` 类：\n\n```\n//\
  \ file FileWriter.h\n\n@interface FileWriter : NSObject\n\n+ (void) writeTest;\n\
  \n- (void) writeFile:(NSString*) fileName content:(NSString*)data;\n\n@end\n```\n\
  \n`FileWriter` 类有一个方法，用于将作为第二个参数传入的内容数据写入由参数 `fileName` 定义的文件中。`writeTest` 类方法中也提供了一个测试程序。\n\
  \n```\n// file FileWriter.m\n\n#import \"FileWriter.h\"\n\n@implementation FileWriter\n\
  \n- (void) writeFile:(NSString*) fileName content:(NSString*)data;\n\n{\n\nNSURL\
  \ *url = [NSURL URLWithString:fileName];\n\nNSError *error;\n\nBOOL res = [data\
  \ writeToURL:url\n\natomically:NO\n\nencoding:NSUnicodeStringEncoding\n\nerror:&error];\n\
  \nif (!res)\n\n{\n\nNSLog(@\"error writing to file %@\", [error userInfo]);\n\n\
  }\n\n}\n\n+ (void) writeTest\n\n{\n\nFileWriter *writer = [[FileWriter alloc] init];\n\
  \n[writer writeFile:@\"file:///Users/oliveira/testFile2\"\n\ncontent:@\"This is\
  \ the content of the file written by\"\n\n\" the file writer.\"];\n\n}\n\n@end\n\
  ```\n\n你可以很快看出，`writeFile:content:` 方法只是 `NSString` 功能的一个封装。`writeToURL:atomically:encoding:error:`\
  \ 方法负责获取存储在 data 变量中的文本，并将其写入由给定 `NSURL` 对象确定的位置的文件中。参数 `atomically` 决定了该过程是否由文件系统以原子方式执行。为了保证原子性，Cocoa\
  \ 使用一个缓冲区来存储数据，直到整个文件写入完毕，然后将文件重命名为其目标 URL。`encoding` 参数与你之前读取文件时看到的编码类似。最后，`error`\
  \ 参数仅在需要报告错误条件时使用。\n\n\n\n## 读写二进制数据\n\n上面的示例展示了如何操作文本文件。在这些情况下，使用 `NSString` 来处理文件内容并进行读写非常容易。然而，大多数应用程序还需要访问二进制格式的文件，例如压缩文件、图像以及其他无法用文本编辑器直接修改的专有格式。\n\
  \n对于小文件，你可以使用与 `NSString` 相对应的二进制数据处理类：`NSData`。为了简化操作此类二进制文件的过程，Cocoa 为 `NSData`\
  \ 启用了类似 `NSString` 的方法，使其能够读写磁盘上的数据。\n\n读取二进制文件时，需要提供一个用于临时存储数据的缓冲区，以及在数据读取完成后检索数据的途径。`NSData`\
  \ 默认实现了这一功能，留给程序员的仅剩处理返回数据的任务。\n\n以下示例展示了其工作原理：你将编写一个类来读取数据，并在日志中打印其部分字节，代码如下：\n\
  \n```\n// 文件 ReadBinaryData.h\n\n@interface ReadBinaryData : NSObject\n\n- (NSData*)readData:(NSString*)fileName;\n\
  \n+ (void) testRead;\n\n@end\n```\n\n该接口仅包含两个方法：`readData:`，它接受你想要读取的文件名作为参数；以及\
  \ `testRead`，一个用于测试 `readData:` 功能的类方法。\n\n```\n// 文件 ReadBinaryData.m\n\n#import\
  \ \"ReadBinaryData.h\"\n\n@implementation ReadBinaryData\n\n#define MAX_DATA_SIZE\
  \ 1024\n\n- (NSData*)readData:(NSString*)fileName\n\n{\n\nNSURL *url = [NSURL URLWithString:fileName];\n\
  \nNSError *error;\n\nNSData *data = [NSData dataWithContentsOfURL:url options:NSDataReadingUncached\
  \ error:&error];\n\nif (data == nil)\n\n{\n\nNSLog(@\"读取文件时出错: %@\", [error userInfo]);\n\
  \n}\n\nelse\n\n{\n\nint data_size = (int)[data length];\n\nunichar array[MAX_DATA_SIZE];\n\
  \nint size = data_size;\n\nif (data_size > MAX_DATA_SIZE) size = MAX_DATA_SIZE;\n\
  \n[data getBytes:array length:size];\n\nNSString *dataStr = [NSString stringWithCharacters:array\
  \ length:size];\n\nNSLog(@\"数据的首字节为: %@\", dataStr);\n\n}\n\nreturn data;\n\n}\n\
  \n+ (void) testRead\n\n{\n\nReadBinaryData *reader = [[ReadBinaryData alloc] init];\n\
  \n[reader readData:@\"file:///Users/oliveira/testFile\"];\n\n[reader release];\n\
  \n}\n\n@end\n```\n\n在实现文件的第一部分，你定义了常量 `MAX_DATA_SIZE`，用于确定你想从文件中显示的最大字符数。\n\n`readData:`\
  \ 方法创建了一个包含文件名的 `NSURL` 对象，然后将它作为参数传递给 `dataWithContentsOfURL:options:error:` 方法。该方法的第一个参数是文件\
  \ URL，紧接着是一个选项，用于决定文件是否会被缓存或进行内存映射等。最后一个参数 (`error`) 是一个指向 `NSError` 对象的指针，仅在检测到失败时使用。\n\
  \n如果 `dataWithContentsOfURL:options:error:` 返回的数据有效，你便可以检索其前一小部分数据并打印到日志窗口。这可以通过\
  \ `getBytes:length:` 方法实现，它是 `NSData` 的一个方法，利用一个辅助内存数组返回存储的字节，数组长度由第二个参数决定。你使用了一个简单的字符数组，并且仅复制了开头几个字符用于测试。在实践中，你需要通过一次或多次迭代来检索\
  \ `NSData` 中存储的所有数据，并对其进行有意义的处理。\n\n`testRead` 方法用于检验 `ReadBinaryData` 的功能。你创建了一个该类的对象，然后向其发送一条\
  \ `readData:` 消息，参数是存储在你的主目录中的一个示例文件的名称。执行后，文件的部分内容应被打印到应用程序日志中。\n\n`NSData` 也能像\
  \ `NSString` 一样将数据写入文件。为避免重复类似的示例，我将直接展示 `writeData:` 方法的内容，该方法使用 `NSData` 将一个字节数组输出到二进制文件：\n\
  \n```\n- (void)writeData:(int*)numbers length:(int)size\n\ndest:(NSString*)fileName\n\
  \n{\n\nNSURL *url = [NSURL URLWithString:fileName];\n\nNSError *error;\n\nNSData\
  \ *data = [NSData dataWithBytes:numbers length:sizeof(int)*size];\n\nBOOL ok = [data\
  \ writeToURL:url\n\noptions:NSDataWritingAtomic\n\nerror:&error];\n\nif (!ok)\n\n\
  {\n\nNSLog(@\"写入文件时出错: %@\", [error userInfo]);\n\n}\n\n}\n```\n\n这一次，你创建了一个 `NSData`\
  \ 对象来包含作为参数传递给 `writeData:length:dest:` 方法的整数数组。要存储的数据长度由 `sizeof(int)*size` 确定，它给出了存储该数组数据所需的字节数。\n\
  \n下一步是使用 `NSData` 的 `writeToURL:options:error:` 方法将数组写入磁盘。该方法有一个 `options` 参数，可用于决定文件写入磁盘的方式。在本例中，我要求以原子方式写入文件，即所有字节先写入一个临时文件，然后在写入完成后移动到正确位置。如果在执行该方法时发生错误，`error`\
  \ 变量将用于存储描述错误信息的消息。\n\n## 使用 NSStream\n\n使用 `NSString` 和 `NSData` 操作文件虽然方便，但并非可扩展的解决方案。这些简单类的一个问题是，程序员对\
  \ I/O 过程的控制力不足。但这种文件访问模式的最大问题在于，`NSString` 和 `NSData` 执行的是同步操作：也就是说，应用程序的当前线程必须等待整个文件处理完毕。这对于小文件和简单的应用程序或许可以接受，但当文件体积增大或需要快速响应时，这种方式就无法扩展了。\n\
  \n因此，在许多情况下，使用 `NSString` 或 `NSData` 进行文件访问变得不切实际。Cocoa 通过 `NSStream` 类及其相关类，提供了一种更好地控制文件操作的方式。`NSStream`\
  \ 能更好地控制文件的访问方式，并且能够将工作分割成更小的块，使应用程序能够处理而不产生长时间停顿。\n\n`NSStream` 有一个通用接口，由 `NSInputStream`\
  \ 和 `NSOutputStream` 实现。这两个类共享相同的基于委托的文件访问模型。本质上，当使用 `NSStream` 时，你需要定义一个委托对象，该对象将在执行\
  \ I/O 操作时被调用。\n\n`NSStream` 的另一个有趣之处在于，它不仅限于文件访问。其内部模型也可应用于任何 URL，例如网络资源或 FTP 文件。它还可用于直接连接网络套接字，尽管这种应用超出了本章的范围。然而，你所学习的一切（稍作修改）都可以用于访问客户端/服务器应用程序中使用的网络套接字。\n\
  \n\n\n### 读取文件\n\n要使用 `NSStream` 读取文件，你需要设置一个 `NSInputStream`，然后建立一个委托，该委托将在数据可用时进行读取。这种接口通过使用异步机制来避免大\
  \ I/O 延迟的问题，该机制仅在数据可供消费时触发事件。\n\n使用 `NSInputStream` 的第一步是定义负责接收数据读取接口触发的事件的对象。通常，事件处理代码会被添加到你的主委托对象中，但你可能希望为此创建一个专用的数据处理类。\n\
  \n让我们创建一个名为 `AsyncDataReader` 的类，该类使用 `NSInputStream` 读取文件。该类的接口有一个方法来设置流，另一个方法来处理由\
  \ `NSStream` 对象触发的事件。\n\n```\n// 文件 AsyncDataReader.h\n\n@interface AsyncDataReader\
  \ : NSObject <NSStreamDelegate>\n{\n    NSInputStream *_stream;\n    NSMutableData\
  \ *_data;\n}\n\n- (void)setupStream:(NSString*)path;\n- (void)stream:(NSStream *)stream\
  \ handleEvent:(NSStreamEvent)event;\n+ (void)testRead;\n\n@end\n```\n\n该接口实现了 `NSStreamDelegate`\
  \ 协议，这对于想要消费 `NSStream` 发送的数据的对象来说是必需的。该类包含两个实例变量：一个用于读取输入文件的 `NSInputStream`，以及一个用于在内存中存储文件内容的\
  \ `NSMutableData` 对象（`NSMutableData` 是 `NSData` 的子类，允许对其内容进行添加或删除）。接口中有三个方法。`setupStream:`\
  \ 方法负责对输入流进行初始设置；它接收文件名作为其唯一参数。`stream:handleEvent:` 方法是 `NSStreamDelegate` 协议所要求的；例如，当有新的数据可供消费时，就会调用此方法。最后，一个名为\
  \ `testRead` 的类方法演示了如何使用这个类。\n\n```\n// 文件 AsyncDataReader.m\n\n#import \"AsyncDataReader.h\"\
  \n\n@implementation AsyncDataReader\n\n- (void) setupStream:(NSString*)fileName\n\
  {\n    NSURL *url = [NSURL URLWithString:fileName];\n    if (_stream == nil)\n \
  \       _stream = [[NSInputStream alloc] initWithURL:url];\n    [_stream setDelegate:self];\n\
  \    [_stream scheduleInRunLoop:[NSRunLoop currentRunLoop]\n                   \
  \    forMode:NSDefaultRunLoopMode];\n    [_stream open];\n}\n```\n\n这是类实现的第一部分，你需要在此处设置用于读取操作的流。首先，你检查\
  \ `_stream` 变量是否有效，如果无效，则使用 `alloc` 后跟 `initWithURL:` 来创建对象。下一步是为 `NSStream` 设置委托，在本例中是当前的\
  \ `AsyncDataReader` 类。\n\n`NSInputStream` 使用消息传递机制与委托对象进行通信。为此，有必要将流对象添加到当前线程的运行循环中。这是通过\
  \ `scheduleInRunLoop:forMode:` 消息实现的。要找到当前的运行循环，你可以使用 `NSRunLoop` 类的 `currentRunLoop`\
  \ 方法。然后通过 `NSDefaultRunLoopMode` 选择标准操作模式。\n\n最后，为了开始处理输入流，你需要向流对象发送 `open` 消息。这将执行打开文件并开始读取其中存储的字节所需的全部初始化步骤。\n\
  \n```\n- (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event\n{\n \
  \   uint8 bytes[256];\n    switch (event)\n    {\n        case NSStreamEventHasBytesAvailable:\n\
  \        {\n            if (_data == nil)\n                _data = [[NSMutableData\
  \ alloc] init];\n            NSInteger len = [(NSInputStream*)stream read:bytes\
  \ maxLength:256];\n            [_data appendBytes:bytes length:len*sizeof(bytes[0])];\n\
  \            NSLog(@\"收到数据：%ld 字节：\", len);\n            // 保存存储在 bytes 中的数据\n \
  \       }\n        break;\n\n        case NSStreamEventEndEncountered:\n       \
  \ {\n            [_stream close];\n            [_stream removeFromRunLoop:[NSRunLoop\
  \ currentRunLoop]\n                               forMode:NSDefaultRunLoopMode];\n\
  \            [_stream release];\n            _stream = nil;\n        }\n       \
  \ break;\n\n        default:\n            break;\n    }\n}\n```\n\n`stream:handleEvent:`\
  \ 方法是这个类的核心，因为它负责解释由 `NSInputStream` 委派的每一条消息。`NSStreamDelegate` 可以接收到多种类型的消息，但你只需关注两种类型：`NSStreamEventHasBytesAvailable`，表示有新数据可供消费；以及\
  \ `NSStreamEventEndEncountered`，用于指示流结束。对于大多数只想读取文件内容的情况，这两个消息就足够了。\n\n响应 `NSStreamEventHasBytesAvailable`\
  \ 事件时，你准备好 `_data` 实例变量来存储接收到的字节。如果 `_data` 尚未初始化，你将使用 `alloc`/`init` 这对消息来创建一个新的\
  \ `NSMutableData` 对象。接下来，你需要将数据读入一个内部缓冲区，并确定接收到的字节数。这是通过调用 `read:maxLength:` 方法完成的。此方法会将内部存储的数据传输到\
  \ `bytes` 数组中。你需要指明缓冲区的最大长度，以便流只会复制你可以在声明的缓冲区中存储的字节数量。\n\n> **注意：** 在设置每个事件处理的条目数量（上例中的缓冲区大小）时，你有机会影响应用程序的性能。较小的缓冲区会迫使\
  \ `NSStream` 发送更多消息，直到文件完全传输完毕，这可能会导致性能下降。另一方面，太大的缓冲区可能需要很长时间来处理，并可能导致用户界面延迟。你应该根据对应用程序运行效果的实验，来确定内部缓冲区的最佳大小。\n\
  \n`stream:handleEvent:` 方法中的下一步是将接收到的数据添加到 `_data` 对象中，以便在需要时其他方法可以使用这些数据。缓冲区的长度使用\
  \ `read:maxLength:` 方法的结果来确定。为了调试目的，此信息也会打印到日志中。\n\n`stream:handleEvent:` 处理的第二个消息是\
  \ `NSStreamEventEndEncountered`，当流关闭且没有更多数据时，此消息会发送给委托对象。每个应用程序都可以定义如何响应此事件，但在大多数情况下，需要释放流对象。你需要首先通过向\
  \ `_stream` 实例变量发送 `close` 消息来关闭流。然后，你需要将流从消息循环中移除。这是通过使用 `removeFromRunLoop:forMode:`\
  \ 方法完成的。最后，你可以对 `NSStream` 对象调用 `release` 以释放其内容。你还需要将 `_stream` 变量设置为 `nil`，以便以后可以重用，而无需冒险调用已释放的对象。\n\
  \n```\n- (void) dealloc\n{\n    [_data release];\n    [super dealloc];\n}\n```\n\
  \n在 `dealloc` 方法中，你释放用于存储从 `NSInputStream` 传输的字节的 `_data` 对象。到这个时候，该类应该已经使用了这些数据（尽管这里没有展示使用\
  \ `_data` 的方法）。\n\n```\n+ (void) testRead\n{\n    AsyncDataReader *reader = [[AsyncDataReader\
  \ alloc] init];\n    [reader setupStream:@\"file:///Users/oliveira/testFile\"];\n\
  }\n\n@end\n```\n\n实现部分的最后部分是 `testRead` 方法。你使用标准的 `alloc`/`init` 序列来创建一个读取器。然后，你向其发送\
  \ `setupStream:` 消息，并将要读取的测试文件的 URL 路径作为参数传递。这样做的结果是，`NSInputStream` 会被创建并启动。读取器对象将收到指示重要事件的通知，例如数据的可用性和流的结束。你应该会在日志中看到表明数据正在被接收和读取的消息。\n\
  \n\n\n### 使用 `NSOutputStream` 写入文件\n\n使用 `NSOutputStream` 写入文件与使用 `NSInputStream`\
  \ 读取文件类似。你仍然采用基于事件的策略与流内容交互，并通过实现 `NSStreamDelegate` 协议的委托来订阅事件。不过，`NSOutputStream`\
  \ 有其自身类型的消息需要由委托处理。需要执行的任务包括初始化流以及向流发送新数据。\n\n以下代码片段展示了使用 `NSOutputStream` 异步将数据写入文件的类的接口。\n\
  \n```\n// File AsyncDataWriter.h\n\n@interface AsyncDataWriter : NSObject <NSStreamDelegate>\n\
  {\n    NSOutputStream *_outStream;\n    int _position;\n}\n\n- (void) setupOutputStream:(NSString*)fileName;\n\
  - (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event;\n- (void)dealloc;\n\
  + (AsyncDataWriter*)testWrite;\n\n@property (retain) NSArray *outData;\n\n@end\n\
  ```\n\n该类包含一个指向 `NSOutputStream` 的指针和一个用于确定输出数据数组当前位置的整数。它有三个实例方法：一个用于设置输出流，另一个用于接收发送给\
  \ `NSStreamDelegate` 协议的消息，第三个是标准的 `dealloc` 方法。最后，你还有一个 `testWrite` 类方法，用于展示如何使用该类。\n\
  \n`setupOutputStream` 方法负责初始化流和使用的数据。我使用字符串作为测试数据，并存储在 `outData` 属性中。不过，很容易看出如何为可能存储在内存中的任何数据集做到这一点。\n\
  \n```\n- (void) setupOutputStream:(NSString*)fileName\n{\n    NSURL *url = [NSURL\
  \ URLWithString:fileName];\n\n    if (_outStream == nil)\n    {\n        _outStream\
  \ = [[NSOutputStream alloc]\n                      initWithURL:url\n           \
  \           append:YES];\n        self.outData = @[\n            @\"A string\\n\"\
  ,\n            @\"B values\\n\",\n            @\"C test\\n\",\n            @\"D\
  \ class\\n\" ];\n        _position = 0;\n    }\n\n    [_outStream setDelegate:self];\n\
  \    [_outStream scheduleInRunLoop:[NSRunLoop currentRunLoop]\n                \
  \         forMode:NSDefaultRunLoopMode];\n    [_outStream open];\n}\n```\n\n每当变量\
  \ `_outStream` 为 `nil` 时，便会执行 `setupOutputStream` 的初始化。第一步是创建一个输出流，加载基于作为参数传递的文件名创建的\
  \ URL。接下来，创建一个包含测试数据的数组，这些数据稍后将用于提供输出文件的内容。\n\n你创建了一个 `releaseStream` 方法，当数据完全传输到输出文件时调用该方法。\n\
  \n```\n- (void)releaseStream\n{\n    [_outStream close];\n    [_outStream removeFromRunLoop:[NSRunLoop\
  \ currentRunLoop]\n                         forMode:NSDefaultRunLoopMode];\n   \
  \ [_outStream release];\n    _outStream = nil;\n}\n```\n\n在此代码中，首先关闭输出流，以便不再接受额外数据进行输出。然后，将该流从\
  \ `currentRunLoop` 中移除；因此，委托对象将不再收到针对此特定输出流的后续事件请求。接着，释放该流并将其设置为 `nil`，以便后续可用于写入另一个文件。\n\
  \n与 `NSInputStream` 类似，`stream:handleEvent:` 方法是该类工作的核心部分。在该方法中，每当数据可供应用程序使用时，你将提供数据。因此，输出流将使用提供的数据写入创建流时命名的文件。\n\
  \n```\n- (void)stream:(NSStream *)stream handleEvent:(NSStreamEvent)event\n{\n \
  \   char bytes[NUM_ITEMS_IN_ARRAY];\n\n    switch (event)\n    {\n        case NSStreamEventHasSpaceAvailable:\n\
  \            if (_position < [_outData count])\n            {\n                NSString\
  \ *element = _outData[_position];\n                [element getCString:bytes\n \
  \                        maxLength:NUM_ITEMS_IN_ARRAY\n                        \
  \  encoding:NSASCIIStringEncoding];\n                NSLog(@\"ss %s %d\", bytes,\
  \ (int)[element length]);\n                [_outStream write:(const uint8_t *)bytes\n\
  \                       maxLength:[element length]];\n            }\n          \
  \  else\n            {\n                [self releaseStream];\n            }\n \
  \           position++;\n            break;\n\n        case NSStreamEventEndEncountered:\n\
  \            [self releaseStream];\n            break;\n\n        default:\n   \
  \         break;\n    }\n}\n```\n\n首先，你声明一个用于临时数据传输的缓冲区。然后，如果事件是 `NSStreamEventHasSpaceAvailable`，这意味着你需要提供额外的数据（如果有）。在上面的代码中，通过测试\
  \ `_position` 是否小于或等于 `outData` 中的元素数量，检查 `outData` 数组中是否存在有效位置。如果存在有效位置，则开始获取相应的\
  \ `NSString`。然后，使用方法 `getCString:maxLength:encoding:` 从 `NSString` 中获取一个 C 字符串（字符数组）。一旦数据被复制到\
  \ `bytes` 数组中，便向 `_outStream` 对象发送 `write:maxLength:` 消息，以便将原始数据传输到输出文件。\n\n**注意：**\
  \ 使用上述示例时，请注意我使用了常量 `NUM_ITEMS_IN_ARRAY` 来简化演示。在实际操作中，你需要做好准备并分配足够的内存来处理任意大小的数据。\n\
  \n如果没有更多可用数据，则调用前面描述的 `releaseStream` 方法。当收到的消息是 `NSStreamEventEndEncountered` 时，你也需要释放该流，因为这表示无法再向输出文件添加更多数据。\n\
  \n最后，以下是使用上述类的方法的方式：\n\n```\n+ (AsyncDataWriter*)testWrite\n{\n    AsyncDataWriter\
  \ *writer = [[AsyncDataWriter alloc] init];\n    [writer setupOutputStream:@\"file:///Users/oliveira/testFile4\"\
  ];\n    return [writer autorelease];\n}\n```\n\n`testWrite` 方法是一个类方法，可以直接调用来测试类的行为。第一步是创建一个新的\
  \ `AsyncDataWriter` 实例。然后，向 writer 发送 `setupOutputStream:` 消息。这将设置流并尝试打开它。之后，流对象将开始向\
  \ `AsyncDataWriter` 对象发送事件，并最终将数据传输到输出文件。\n\n尽管使用 `NSStream` 及其子类读取或写入数据并非直截了当，但它为程序员提供了极大的灵活性。首先，`NSStream`\
  \ 的用途具有适应性：它可以用于读写文件、网络套接字或内存缓冲区。因此，你上面编写的代码只需稍作改动即可应用于许多场景。`NSStream` 的另一个优势是其异步行为。使用\
  \ `NSStream` 的应用程序不会因数据输入/输出问题而产生任何延迟，即使在处理大文件时也是如此。这是因为 `NSStream` 会将工作分解为小任务，这些任务会作为应用程序运行循环的一部分来执行，在该循环中所有消息（包括\
  \ UI 消息）都会被处理。因此，应用程序不会在等待这些 I/O 任务完成时停止，而是会继续处理其他事件。\n\n\n\n\n## 总结\n\n本章介绍了在 Objective-C\
  \ 中如何从文件读写数据。首先，你了解了文件路径在 Foundation 框架中的表示方式。`NSURL` 作为一个标准且通用的类，目前是编码文件路径的首选方式。\n\
  \n你学习了如何使用 Foundation 框架中的基本类来读取简单文件。该框架的设计使得常见任务（如读取小文件）无需过多开销即可完成。事实上，使用 `NSString`\
  \ 接口只需调用单个方法即可读取或写入文件。同样，也可以使用 `NSData` 类读写二进制文件，该类允许将任何数据格式存储在内存中。\n\n你还了解了 `NSStream`\
  \ 类及其具体实现 `NSInputStream` 和 `NSOutputStream`。这些类可用于创建文件系统的异步接口，也常与网络套接字或其他网络资源进行通信。在本章中，你看到了使用\
  \ `NSStream` 对象从外部文件读写数据所需的代码。\n\n通过本章的学习，你已经掌握了 Objective-C 中一些最基础的技术。现在，你已经清楚理解面向对象编程的工作原理，以及该语言提供的库如何支持这种编程风格。下一章将作为参考，总结你所了解的关于\
  \ Foundation 框架的信息，涵盖你在基于 Cocoa 的应用程序中会用到的大多数重要类。\n\n"
