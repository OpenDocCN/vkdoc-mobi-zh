  (^)(id obj, BOOL *stop))predicate`；返回一个新的 `NSSet` 对象，其中包含目标 `NSSet` 中所有通过谓词参数所指定测试的对象。对象的枚举根据
  `opts` 中的选项进行。


  ## 总结


  在本章中，我提供了 Foundation 框架中最重要类的快速参考。我将阐述范围限制在最常用的接口上，以便你可以快速查阅这些类中包含的方法。


  在本章的第一部分，我介绍了一些基本类的参考，例如 `NSObject`、`NSString` 和 `NSValue`。这些类是 Cocoa 提供服务的基石。本章的第二部分是一些最常用集合类的参考，例如
  `NSArray`、`NSDictionary` 和 `NSSet`。


  在接下来的几章中，我将开始介绍 Objective-C 开发者可用的工具和环境。你将首先了解 Objective-C 编译器及其最重要的配置。我将向你展示一些使用编译器的常见方法，以及如何调整其选项以达到不同的性能、日志记录或内存使用水平。


