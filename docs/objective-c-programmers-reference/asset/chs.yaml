  *   `- (void)enumerateObjectsWithOptions:(NSEnumerationOptions)opts usingBlock:(void
  (^)(id obj, BOOL *stop))block`；使用第一个参数中传入的选项，对目标 `NSSet` 的所有元素执行该 block。

  *   `- (NSSet *)objectsPassingTest:(BOOL (^)(id obj, BOOL *stop))predicate`；返回一个新的
  `NSSet` 对象，其中包含目标集合中所有通过谓词参数所指定测试的元素。

