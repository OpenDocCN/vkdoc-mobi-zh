- '# 11. Foundation 框架


  ## 摘要


  在之前的几章中，你学习了 Objective-C 语言的基础知识，并掌握了如何使用它编写简单程序。在本章中，我将为你提供一份关于 Objective-C 中最常用类的快速参考。这些类包含在
  Foundation 框架中，为编写完整的应用程序提供了大量基础支持。


  本章第一部分介绍了 Foundation 框架提供的一些基础类。这些类（如 `NSString` 和 `NSValue`）在整个系统中被广泛使用，是构建其他一切功能的基础。


  本章第二部分则提供了关于最常用集合类的快速参考。这些类用于存储对象集，并通过其他类和算法以更复杂的方式进行操作。


  ## 基础类


  以下基础类在整个系统中被广泛使用，是构建其他一切功能的基础。


  ### NSObject


  `NSObject` 类是 Cocoa 中大多数其他类的超类。`NSObject` 提供了在整个系统中使用的重要服务，例如内存分配、值观察和方法派发。在本节中，你将看到此类中重要方法的列表，以及如何与之交互。




  * `+ (void)load`：在类首次加载时执行。该方法适用于需在应用生命周期内仅执行一次的任务。

  * `+ (void)initialize`：在类被首次使用前调用。也就是说，该方法会在第一个非初始化/非加载方法执行前运行，通常在首次创建对象时触发。这与 `load`
  方法不同，后者在类首次加载到内存时即被调用。

  * `- (id)init`：默认初始化方法，通常用于 `alloc`/`init` 序列组合中。

  * `+ (id)new`：可替代 `alloc`/`init` 组合使用。

  * `+ (id)allocWithZone:(NSZone *)zone`：用于在由参数 `NSZone` 定义的内存区域中分配 `NSObject`，该参数决定了内存分配策略。

  * `+ (id)alloc`：使用默认 `NSZone` 返回一个新的 `NSObject`。返回的对象未被初始化，因此 `alloc` 常与目标类的 `init`
  方法组合使用。`alloc` 返回的对象归调用者所有，不再使用时需释放该对象。

  * `- (void)dealloc`：释放对象占用的内存及其他资源。重写此方法时，应始终调用父类的版本，以避免基类出现资源泄漏。

  * `- (void)finalize`：仅在启用垃圾回收时使用。其目标是在系统回收对象前释放对象使用的所有资源。使用 ARC 时，此方法已废弃。

  * `- (id)copy`：返回一个与原对象同类的副本。与 `alloc` 和 `new` 类似，返回的对象归调用者所有，调用者需负责在不使用时释放对象，以避免内存泄漏。

  * `- (id)mutableCopy`：返回目标对象的可变副本。此方法由需要为不可变对象创建可变副本的类实现。

  * `+ (id)copyWithZone:(NSZone *)zone`：返回一个包含目标对象副本的新对象，使用 `zone` 参数作为 `allocWithZone:`
  的参数。

  * `+ (id)mutableCopyWithZone:(NSZone *)zone`：返回目标对象的一个可后续修改的副本。使用 `zone` 参数决定对象分配方式，类似于
  `allocWithZone:`。

  * `+ (Class)superclass`：返回一个标识目标对象父类的类对象（若目标对象派生自某个基类）。

  * `+ (Class)class`：返回一个标识目标对象所属类的类对象。返回的对象之后可作为类消息的目标。例如，若 `obj` 是一个对象，可使用 `[[obj
  class] alloc]` 创建一个同一类的未初始化对象。

  * `+ (BOOL)instancesRespondToSelector:(SEL)aSelector`：若目标类或其某个父类实现了给定的选择器，则返回 YES。

  * `+ (BOOL)conformsToProtocol:(Protocol *)protocol`：若目标类或其某个父类实现了作为参数传入的协议，则返回 YES。

  * `- (IMP)methodForSelector:(SEL)aSelector`：返回给定方法选择器的实现。`IMP` 值通常是一个函数指针，该函数在响应给定选择器时被调用。

  * `+ (IMP)instanceMethodForSelector:(SEL)aSelector`：返回与给定选择器对应的实例方法的实现（若存在该实现）。之后可调用
  `IMP` 值来为特定对象执行该选择器。

  * `- (void)doesNotRecognizeSelector:(SEL)aSelector`：此方法可在子类中重写。用于判断当前类是否不识别某个选择器。类可根据自身希望对该选择器做出的响应返回不同的值。

  * `- (id)forwardingTargetForSelector:(SEL)aSelector`：通过重写此方法，可为当前类无法直接处理的任何选择器定义一个目标对象。

  * `- (void)forwardInvocation:(NSInvocation *)anInvocation`：将 `NSInvocation` 参数所代表的方法调用转发至其适当的目标。此方法通常在被要求将一个或多个消息转发给其他对象的类中重写。

  * `- (NSMethodSignature *)methodSignatureForSelector:(SEL)aSelector`：返回给定选择器的方法签名。此方法用于需要在运行时确定某个方法的参数或返回类型时。

  * `+ (NSMethodSignature *)instanceMethodSignatureForSelector:(SEL)aSelector`：返回由给定选择器标识的实例方法的实现地址。

  * `+ (NSString *)description`：返回用于描述对象的字符串。通常在需要此类服务的类中重写。不应依赖此方法返回的值进行对象识别；它最常用于调试。

  * `+ (BOOL)isSubclassOfClass:(Class)aClass`：若目标类派生自作为参数传入的类，或与其相同，则返回 true。当需要使用此方法时，请先尝试在类层次结构中定义一个多态方法。


  ### NSString


  `NSString` 存储不可变的字符序列。Objective-C 应用程序中的大多数文本数据都存储为 `NSString` 对象。`NSString` 类提供了丰富的接口；实际上，许多框架选择通过使用协议，用额外方法丰富
  `NSString` 接口。以下是 `NSString` 类中最常见方法的列表：




  - `- (id)init`; 是一个简单的初始化器，返回一个空的 `NSString` 对象。

  - `- (id)initWithCharactersNoCopy:(unichar *)characters length:(NSUInteger)length
  freeWhenDone:(BOOL)freeBuffer`; 使用指向字符数组的指针初始化字符串，长度由参数 `length` 定义。参数 `freeBuffer`
  决定在执行拷贝后是否应释放缓冲区。

  - `- (id)initWithCharacters:(const unichar *)characters length:(NSUInteger)length`;
  使用作为参数传入的字符来初始化目标 `NSString` 对象。

  - `- (id)initWithUTF8String:(const char *)nullTerminatedCString`; 使用作为参数传入的以空字符结尾的
  C 字符串来初始化字符串。

  - `- (id)initWithString:(NSString *)aString`; 使用另一个同类型的对象来初始化 `NSString`。

  - `- (id)initWithFormat:(NSString *)format, ...`; 使用格式化字符串来初始化字符串。格式化字符串遵循与 `NSLog`
  参数相同的约定，并且是 C 标准库中 `printf` 函数所用格式的扩展。请参考 `NSLog` 的文档了解具体格式。

  - `- (id)initWithFormat:(NSString *)format arguments:(va_list)argList`; 与上面的初始化器类似，但参数以
  `va_list` 形式传递。

  - `- (id)initWithFormat:(NSString *)format locale:(id)locale, ...`; 使用格式化字符串初始化
  `NSString`。但格式参数将根据作为参数传入的 `locale` 对象进行解释。

  - `- (id)initWithFormat:(NSString *)format locale:(id)locale arguments:(va_list)argList`;
  与上面类似，但格式参数以 `va_list` 形式传递，而不是直接作为一组值。

  - `- (id)initWithData:(NSData *)data encoding:(NSStringEncoding)encoding`; 使用包含编码后字符串的
  `NSData` 对象来初始化 `NSString` 对象。编码由第二个参数决定。

  - `- (id)initWithBytes:(const void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding`;
  使用作为指针传入的字节数组来初始化 `NSString`。第二个参数确定数组 `bytes` 的长度。

  - `- (id)initWithBytesNoCopy:(void *)bytes length:(NSUInteger)len encoding:(NSStringEncoding)encoding
  freeWhenDone:(BOOL)freeBuffer`; 使用字节数组初始化 `NSString`，长度由第二个参数决定。encoding 参数用于指定数据的编码。最后一个参数可用于确定初始化结束时是否释放缓冲区。

  - `+ (id)string`; 是一个类方法，返回一个使用 `init` 方法初始化的 `NSString` 对象。可用于快速返回一个新字符串。遵循 Objective-C
  的内存分配规则，调用者不拥有此方法返回的字符串。

  - `+ (id)stringWithString:(NSString *)string`; 返回一个 `NSString` 对象，该对象使用一个已有的字符串初始化。

  - `+ (id)stringWithCharacters:(const unichar *)characters length:(NSUInteger)length`;
  返回一个新的 `NSString` 对象，该对象使用 `characters` 所指向数组的内容进行初始化。数组的长度由第二个参数决定。

  - `+ (id)stringWithUTF8String:(const char *)nullTerminatedCString`; 返回一个新的 `NSString`
  对象，该对象使用以空字符结尾的 C 字符串初始化。

  - `+ (id)stringWithFormat:(NSString *)format, ...`; 返回一个新字符串，其格式类似于 `NSLog` 使用的格式。请查阅
  `NSLog` 文档以了解格式语法定义的详细信息。

  - `+ (id)localizedStringWithFormat:(NSString *)format, ...`; 使用格式化字符串返回一个新的字符串对象，与上一个方法类似。格式参数将使用用户当前的默认语言环境进行本地化。

  - `- (id)initWithCString:(const char *)nullTerminatedCString encoding:(NSStringEncoding)encoding`;
  使用以空字符结尾的 C 字符数组初始化字符串，该数组将根据作为第二个参数传入的编码进行解释。

  - `+ (id)stringWithCString:(const char *)cString encoding:(NSStringEncoding)enc`;
  返回一个新字符串，并使用一个已有的以空字符结尾的字符数组对其进行初始化，该数组将根据作为第二个参数传入的编码进行解释。

  - `- (id)initWithContentsOfURL:(NSURL *)url encoding:(NSStringEncoding)enc error:(NSError
  **)error`; 使用给定 URL 的内容初始化字符串。例如，这可用于加载文件或网页的内容。它使用作为第二个参数提供的编码。如果发生失败，此函数可能返回一个错误对象。

  - `- (id)initWithContentsOfFile:(NSString *)path encoding:(NSStringEncoding)enc
  error:(NSError **)error`; 使用文件的内容初始化字符串，文件的路径由第一个参数决定，并使用给定的编码。如果出错，此函数也可能返回一个错误对象。

  - `+ (id)stringWithContentsOfURL:(NSURL *)url encoding:(NSStringEncoding)enc error:(NSError
  **)error`; 返回一个新字符串，该字符串使用第一个参数中传入的 URL 的内容，并使用给定的编码。如果失败，可能返回一个错误对象。

  - `+ (id)stringWithContentsOfFile:(NSString *)path encoding:(NSStringEncoding)enc
  error:(NSError **)error`; 返回一个新字符串，该字符串使用文件的内容初始化，文件的路径在第一个参数中给出。文件使用给定的编码进行解释。如果发生失败，可能返回一个错误对象。

  - `- (id)initWithContentsOfURL:(NSURL *)url usedEncoding:(NSStringEncoding *)enc
  error:(NSError **)error`; 使用给定 URL 对象的内容初始化新字符串。URL 的内容使用第二个参数进行编码。如果失败，可能返回一个错误对象。

  - `- (id)initWithContentsOfFile:(NSString *)path usedEncoding:(NSStringEncoding
  *)enc error:(NSError **)error`; 使用由 `path` 参数确定的文件内容初始化字符串对象。所使用的编码在第二个参数中给出。最后，如果失败，可能返回一个错误对象。

  - `+ (id)stringWithContentsOfURL:(NSURL *)url usedEncoding:(NSStringEncoding *)enc
  error:(NSError **)error`; 返回一个新字符串，该字符串使用给定 URL 的内容初始化，该 URL 可以是本地文件或远程资源。内容使用第二个参数进行编码，如果失败，可能返回一个错误对象。

  - `+ (id)stringWithContentsOfFile:(NSString *)path usedEncoding:(NSStringEncoding
  *)enc error:(NSError **)error`; 返回一个新对象。该字符串使用存储在给定路径中的文件内容进行初始化，并使用作为第二个参数传入的编码。如果失败，可能返回一个错误对象。

  - `- (NSString *)stringByAppendingString:(NSString *)aString`; 返回一个新的字符串对象。目标字符串与参数
  `aString` 连接，并作为新对象返回。

