  \n```\n// this function is called for each edge, and says if and edge is in the\
  \ position\n// pointed by data.\nstatic int find_edge_at_point(graph_node *graph_node,\
  \ int a, int b, void *data)\n{\n\t//\n\t// read and unpack data data\n\tstruct for_each_edge_data\
  \ *myData = (struct for_each_edge_data*) data;\n\tif (myData->edgeFound) {\n\t\t\
  return 1;\n\t}\n\tGraph *G = myData->G;\n\t//\n\t// make a local copy of myData->loc,\
  \ because we don't want to change\n\t// its value (and this caused a bug in the\
