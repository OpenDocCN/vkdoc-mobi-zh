  int point = _associatedPoints[clickedNode-1];\nloc.x /= _sliderValue;\nloc.y /=\
  \ _sliderValue;\nloc.x -= NODE_RADIUS;\nloc.y -= NODE_RADIUS;\n[path setAssociatedPoints:\
  \ &loc atIndex:point];\nloc.x += 2*NODE_RADIUS;\n[path setAssociatedPoints: &loc\
  \ atIndex:point+1];\nloc.y += 2*NODE_RADIUS;\n[path setAssociatedPoints: &loc atIndex:point+2];\n\
  loc.x -= 2*NODE_RADIUS;\n[path setAssociatedPoints: &loc atIndex:point+3];\nloc.y\
  \ -= 2*NODE_RADIUS;\n[path setAssociatedPoints: &loc atIndex:point+4];\n}\n```\n\
