  \ equation of the line determined by the two points\n\tdouble m = (x2-x1 == 0) ?\
  \ 0 :(y2-y1)/(x2-x1);\n\tdouble x = loc->x;\n\tdouble y = m * (x - x1) + y1;\n\t\
  //\n\t// correcting values: radius is the distance around the edge\n\tdouble radius\
  \ = 4.0;\n\t//\n\t// checks if point intersects with line\n\tif (x >= min(x1, x2)\
  \ && x <= max(x1, x2)\n\t\t&& y-radius <= loc->y && y+radius >= loc->y) {\n\t\t\
  myData->edgeFound = 1;\n\t\tmyData->movedNode = a; // store the nodes adjacent to\
