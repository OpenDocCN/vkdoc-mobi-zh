  \n```\n-(NSBezierPath *) getPath\n{\nreturn path;\n}\n\n-(Graph *) getGraph\n{\n\
  return G;\n}\n```\n\n最后两个方法提供了一种简便的数据检索方式。第一个方法返回视图使用的主路径。第二个方法返回存储所有显示的节点和边信息的图。\n\
  \n```\n-(void) refreshView\n{\n[self setBezierPaths];\n```\n\n\n\n### 代码与解释\n\n\
