  - `- (short)shortValue`; 返回存储在目标对象中的 `short` 值。

  - `- (unsigned short)unsignedShortValue`; 返回存储在目标对象中的 `unsigned short` 值。

  - `- (int)intValue`; 返回存储在目标对象中的 `int` 值。

  - `- (unsigned int)unsignedIntValue`; 返回存储在目标对象中的 `unsigned int` 值。

  - `- (long)longValue`; 返回存储在目标对象中的 `long` 值。

  - `- (unsigned long)unsignedLongValue`; 返回存储在目标对象中的 `unsigned long` 值。

  - `- (long long)longLongValue`; 返回存储在目标对象中的 `long long` 值。

  - `- (unsigned long long)unsignedLongLongValue`; 返回存储在目标对象中的 `unsigned long long`
  值。

  - `- (float)floatValue`; 返回存储在目标对象中的 `float` 值。

  - `- (double)doubleValue`; 返回存储在目标对象中的 `double` 值。

  - `- (BOOL)boolValue`; 返回存储在目标对象中的 `bool` 值。

  - `- (NSInteger)integerValue`; 返回存储在目标对象中的整数值。

  - `- (NSUInteger)unsignedIntegerValue`; 返回存储在目标对象中的 `unsigned int` 值。

  - `- (NSString *)stringValue`; 返回存储在目标对象中的 `NSString` 值。

  - `- (NSComparisonResult)compare:` `(NSNumber *)otherNumber`; 此方法返回一个 `NSComparisonResult`
  结果，用于确定目标对象与给定参数的比较情况。

  - `- (BOOL)isEqualToNumber:` `(NSNumber *)number`; 如果目标对象是一个数字，且其值与传入参数相等，则返回 `true`。

  - `- (NSString *)descriptionWithLocale:` `(id)locale`; 返回一个描述该对象的字符串。该字符串会根据给定的区域设置进行编码。


  ## `NSData`


  `NSData` 是一个通用类，为任意类型的数据提供了一个封装容器。例如，这些数据可以通过 C 风格的字节数组进行存储。`NSData` 负责维护其包含的数据的存储。其最重要的功能是定义了一个基于面向对象（OO）的接口，可用于，例如，将数据传递给其他对象，或将数据存储在标准容器中。以下是
  `NSData` 所实现的方法列表：




  - `- (NSUInteger)length`: 返回`NSData`对象的长度。

  - `- (const void *)bytes`: 以 C 风格字节数组的形式返回`NSData`对象中存储的内容。

  - `- (NSString *)description`: 返回`NSData`对象的简短描述，通常用于调试目的。

  - `- (void)getBytes:(void *)buffer length:(NSUInteger)length`: 将`NSData`对象内部存储的字节复制到作为第一个参数传入的缓冲区中。要复制的最大字节数由`length`参数指定。

  - `- (void)getBytes:(void *)buffer range:(NSRange)range`: 将`NSData`对象中指定范围内的字节复制到作为第一个参数传入的缓冲区中。

  - `- (BOOL)isEqualToData:(NSData *)other`: 如果目标`NSData`对象与给定的`NSData`对象相等，则返回`YES`。

  - `- (NSData *)subdataWithRange:(NSRange)range`: 返回一个新的`NSData`对象，其中包含目标`NSData`中由`range`参数指定的一部分数据。

  - `- (BOOL)writeToFile:(NSString *)path atomically:(BOOL)useAuxiliaryFile`: 将`NSData`对象的内容写入由`path`参数指定的文件。如果`useAuxiliaryFile`为
  true，则会使用一个临时文件来存储数据传输的中间阶段。

  - `- (BOOL)writeToURL:(NSURL *)url atomically:(BOOL)atomically`: 将`NSData`对象的内容写入由给定
  URL 指定的文件或网络资源。如果`useAuxiliaryFile`为 true，则会使用一个临时文件来存储数据传输的中间阶段。

  - `- (BOOL)writeToFile:(NSString *)path options:(NSDataWritingOptions)writeOptionsMask
  error:(NSError **)errorPtr`: 将`NSData`对象的内容写入由给定路径指定的文件。如果`useAuxiliaryFile`为 true，则会使用一个临时文件来存储数据传输的中间阶段。会使用数据写入选项，并在失败时返回一个错误对象。

  - `- (BOOL)writeToURL:(NSURL *)url options:(NSDataWritingOptions)writeOptionsMask
  error:(NSError **)errorPtr`: 将`NSData`对象的内容写入由给定 URL 指定的文件或网络资源。如果`useAuxiliaryFile`为
  true，则会使用一个临时文件来存储数据传输的中间阶段。会使用数据写入选项，并在失败时返回一个错误对象。

  - `- (NSRange)rangeOfData:(NSData *)dataToFind options:(NSDataSearchOptions)mask
  range:(NSRange)searchRange`: 在目标`NSData`对象中，使用`mask`参数指定的搜索选项，在`searchRange`确定的范围内查找给定的`dataToFind`。如果找到数据，则返回其范围。

  - `+ (id)data`: 创建一个新的、空的`NSData`对象。

  - `+ (id)dataWithBytes:(const void *)bytes length:(NSUInteger)length`: 创建一个新的`NSData`对象，并使用大小为`length`的
  C 风格字节数组进行初始化。

  - `+ (id)dataWithBytesNoCopy:(void *)bytes length:(NSUInteger)length`: 创建一个新的`NSData`对象，并使用大小为`length`的
  C 风格字节数组进行初始化。此方法不会复制该数组。

  - `+ (id)dataWithBytesNoCopy:(void *)bytes length:(NSUInteger)length freeWhenDone:(BOOL)b`:
  创建一个新的`NSData`对象，并使用大小为`length`的 C 风格字节数组进行初始化。最后一个参数决定了当对象被释放时，该数组是否被释放。

  - `+ (id)dataWithContentsOfFile:(NSString *)path options:(NSDataReadingOptions)readOptionsMask
  error:(NSError **)errorPtr`: 使用给定路径的文件内容创建一个新的`NSData`对象。使用读取选项，并在失败时返回一个错误对象。

  - `+ (id)dataWithContentsOfURL:(NSURL *)url options:(NSDataReadingOptions)readOptionsMask
  error:(NSError **)errorPtr`: 使用给定 URL 的文件或网络资源内容创建一个新的`NSData`对象。使用读取选项，并在失败时返回一个错误对象。

  - `+ (id)dataWithContentsOfFile:(NSString *)path`: 使用`path`指定的文件内容创建一个新的`NSData`对象。

  - `+ (id)dataWithContentsOfURL:(NSURL *)url`: 使用`url`指定的文件或网络资源内容创建一个新的`NSData`对象。

  - `- (id)initWithBytes:(const void *)bytes length:(NSUInteger)length`: 使用 C 风格字节数组初始化目标`NSData`对象，数组长度由第二个参数指定。

  - `- (id)initWithBytesNoCopy:(void *)bytes length:(NSUInteger)length`: 使用 C 风格字节数组初始化目标`NSData`对象，数组长度由第二个参数指定。

  - `- (id)initWithBytesNoCopy:(void *)bytes length:(NSUInteger)length freeWhenDone:(BOOL)b`:
  使用 C 风格数据数组初始化目标`NSData`对象，数组长度由第二个参数指定。如果最后一个参数为`YES`，则当数据不再使用时，该数组会被释放。

  - `- (id)initWithContentsOfFile:(NSString *)path options:(NSDataReadingOptions)readOptionsMask
  error:(NSError **)errorPtr`: 使用`path`指定的文件中存储的数据初始化目标`NSData`对象。使用读取选项，并在失败时返回一个错误对象。

  - `- (id)initWithContentsOfURL:(NSURL *)url options:(NSDataReadingOptions)readOptionsMask
  error:(NSError **)errorPtr`: 使用`url`指定的文件或网络资源中存储的数据初始化目标`NSData`对象。使用读取选项，并在失败时返回一个错误对象。

  - `- (id)initWithContentsOfFile:(NSString *)path`: 使用`path`指定的文件中存储的数据初始化目标`NSData`对象。

  - `- (id)initWithContentsOfURL:(NSURL *)url`: 使用`url`指定的文件或网络资源中存储的数据初始化目标`NSData`对象。

  - `- (id)initWithData:(NSData *)data`: 使用传入的`NSData`对象初始化目标`NSData`对象。

  - `+ (id)dataWithData:(NSData *)data`: 返回一个新的`NSData`对象，并使用传入的`NSData`对象进行初始化。




  ### NSMutableData


  `NSMutableData`是`NSData`的子类，可用于原地修改数据。因此，`NSMutableData`可在任何需要`NSData`的场景中使用。以下是可用的方法：


  - `- (void *)mutableBytes`；返回指向目标对象中存储的数据的指针。只要您只使用之前分配的大小，就可以使用该指针修改数据。

  - `- (void)setLength:(NSUInteger)length`；确定内部存储数据的内存缓冲区的长度。

  - `- (void)appendBytes:(const void *)bytes length:(NSUInteger)length`；将第一个参数传入的数据追加到内部缓冲区。数据大小由`length`参数给出。

  - `- (void)appendData:(NSData *)other`；将参数传入的`NSData`对象中存储的数据追加到内部缓冲区。

  - `- (void)increaseLengthBy:(NSUInteger)extraLength`；更改内部数据表示，使其大小增加`extraLength`指定的数量。

  - `- (void)replaceBytesInRange:(NSRange)range withBytes:(const void *)bytes`；更改内部存储的数据，将`range`参数确定的字节替换为第二个参数。

  - `- (void)resetBytesInRange:(NSRange)range`；重置内部数据缓冲区的一部分，由参数`range`确定。给定范围内的数据重置为零值。

  - `- (void)setData:(NSData *)data`；重置内部数据缓冲区，使其包含与参数传入的`NSData`对象相同的数据。

  - `- (void)replaceBytesInRange:(NSRange)range withBytes:(const void *)replacementBytes
  length:(NSUInteger)replacementLength`；将目标对象中内部缓冲区的一部分替换为指针`replacementBytes`指向的字节序列。内部数据的具体部分由`range`参数确定。替换数组的大小由`replacementLength`参数给出。

  - `+ (id)dataWithCapacity:(NSUInteger)aNumItems`；创建并返回一个类型为`NSMutableData`的新对象，容量由`aNumItems`指定。

  - `+ (id)dataWithLength:(NSUInteger)length`；创建并返回一个类型为`NSMutableData`的新对象，长度由`length`参数指定。

  - `- (id)initWithCapacity:(NSUInteger)capacity`；使用给定的容量初始化目标对象。

  - `- (id)initWithLength:(NSUInteger)length`；使用`length`参数初始化目标对象。


  ## 集合类


  集合类负责存储应用程序稍后可以检索的对象。Foundation 框架中有几种集合类。这些类根据数据的存储或检索方式进行分类。类也决定了集合是可变的还是不可变的。在下一节中，您将找到
  Objective-C 中最常用于维护集合的类。


  ### NSArray


  `NSArray`是 Foundation 框架中非常基础的类。它提供了顺序存储集合概念的面向对象实现。元素存储在相邻位置，可以使用基于索引的方法进行检索。以下是`NSArray`提供的实例方法和类方法列表：




  - `- (NSUInteger)count`；返回 `NSArray` 对象中包含的元素数量。

  - `- (id)objectAtIndex:(NSUInteger)index`；返回给定索引处存储的对象。

  - `- (NSArray *)arrayByAddingObject:(id)anObject`；通过获取目标对象的当前元素并添加作为参数传入的对象，创建一个新数组。

  - `- (NSArray *)arrayByAddingObjectsFromArray:(NSArray *)otherArray`；使用目标对象的内容并添加第二个参数数组中所有对象，创建一个新的
  `NSArray`。

  - `- (NSString *)componentsJoinedByString:(NSString *)separator`；返回一个字符串，该字符串通过连接目标数组的所有元素创建，分隔符由第一个参数决定。

  - `- (BOOL)containsObject:(id)anObject`；如果 `anObject` 包含在目标 `NSArray` 中，则返回 true。

  - `- (NSString *)description`；返回目标对象的简要描述。通常用于调试目的。

  - `- (NSString *)descriptionWithLocale:(id)locale`；使用作为参数传入的区域设置，返回一个简短描述。

  - `- (NSString *)descriptionWithLocale:(id)locale indent:(NSUInteger)level`；使用第一个参数中的区域设置返回一个简短描述，并根据第二个参数确定的级别数缩进该描述。

  - `- (id)firstObjectCommonWithArray:(NSArray *)otherArray`；返回目标数组中第一个也出现在 `otherArray`
  中的对象。

  - `- (void)getObjects:(id __unsafe_unretained [])objects range:(NSRange)range`；将目标数组中存储的对象复制到
  C 风格的对象数组中。你需要传入一个将要被复制的对象范围。

  - `- (NSUInteger)indexOfObject:(id)anObject`；如果在目标数组中找到了 `anObject`，则返回其在数组中的索引。否则，此方法返回
  `NSNotFound`。

  - `- (NSUInteger)indexOfObject:(id)anObject inRange:(NSRange)range`；如果在第二个参数传入的范围内找到了
  `anObject`，则返回其在目标数组中的索引。否则，此方法返回 `NSNotFound`。

  - `- (NSUInteger)indexOfObjectIdenticalTo:(id)anObject`；如果在目标数组中通过内存地址比较找到了 `anObject`，则返回其在数组中的索引。否则，此方法返回
  `NSNotFound`。

  - `- (NSUInteger)indexOfObjectIdenticalTo:(id)anObject inRange:(NSRange)range`；返回传入对象的索引，地址比较方式与前一个方法类似。仅在传入的范围内搜索该对象。

  - `- (BOOL)isEqualToArray:(NSArray *)otherArray`；仅当目标数组与 `otherArray` 包含相同的元素且顺序也相同时，才返回
  YES。

  - `- (id)lastObject`；返回目标数组中存储的最后一个对象。

  - `- (NSEnumerator *)objectEnumerator`；返回一个 `NSEnumerator` 对象，可用于枚举目标对象。使用 `NSEnumerator`
  对象，你可以通过 `nextObject` 方法依次访问目标数组的每个元素。

  - `- (NSEnumerator *)reverseObjectEnumerator`；返回目标数组的一个 `NSEnumerator` 对象。但枚举过程是从数组的末尾向前进行。

  - `- (NSData *)sortedArrayHint`；返回一个排序提示，可与其他排序方法一起使用。

  - `- (NSArray *)sortedArrayUsingFunction:(NSInteger (*)(id, id, void *))comparator
  context:(void *)context`；返回一个新的已排序 `NSArray`，其中元素间的比较由传入的比较函数完成。上下文数据会传递给比较器。

  - `- (NSArray *)sortedArrayUsingFunction:(NSInteger (*)(id, id, void *))comparator
  context:(void *)context hint:(NSData *)hint`；与前一个方法类似，但它还使用一个由 `sortedArrayHint`
  方法返回的提示来加速排序。

  - `- (NSArray *)sortedArrayUsingSelector:(SEL)comparator`；使用作为参数传入的选择器对目标 `NSArray`
  进行排序。

  - `- (NSArray *)subarrayWithRange:(NSRange)range`；返回一个新的 `NSArray` 对象，其中仅包含由参数 range
  确定的那个范围内的对象。

  - `- (BOOL)writeToFile:(NSString *)path atomically:(BOOL)useAuxiliaryFile`；将目标 `NSArray`
  中存储的数据写入路径决定的文件。如果第二个参数为 YES，则使用临时文件来存储文件传输的中间阶段。

  - `- (BOOL)writeToURL:(NSURL *)url atomically:(BOOL)atomically`；将目标 `NSArray` 中存储的数据写入由
  `url` 决定的文件或网络资源。如果第二个参数为 YES，则使用临时文件来存储文件传输的中间阶段。

  - `- (void)makeObjectsPerformSelector:(SEL)aSelector`；为目标 `NSArray` 中包含的每个对象调用作为第一个参数传入的选择器。

  - `- (void)makeObjectsPerformSelector:(SEL)aSelector withObject:(id)argument`；为目标
  `NSArray` 中包含的每个对象调用作为第一个参数传入的选择器。每次调用都将参数对象作为参数传递给该选择器。

  - `- (NSArray *)objectsAtIndexes:(NSIndexSet *)indexes`；返回一个新的 `NSArray`，其中包含目标
  `NSArray` 中在给定索引处的所有对象。

  - `- (id)objectAtIndexedSubscript:(NSUInteger)idx`；返回目标 `NSArray` 中在给定索引处存储的单个对象。

  - `- (void)enumerateObjectsUsingBlock:(void (^)(id obj, NSUInteger idx, BOOL *stop))block`；为目标
  `NSArray` 的每个对象调用作为参数传入的 block。

  - `- (void)enumerateObjectsWithOptions:(NSEnumerationOptions)opts usingBlock:(void
  (^)(id obj, NSUInteger idx, BOOL *stop))block`；为目标 `NSArray` 的每个对象调用作为参数传入的 block，并使用由
  `opts` 确定的选项。

  - `- (void)enumerateObjectsAtIndexes:(NSIndexSet *)s options:(NSEnumerationOptions)opts
  usingBlock:(void (^)(id obj, NSUInteger idx, BOOL *stop))block`；为目标对象中包含的索引集合中的每个对象调用作为参数传入的
  block，并使用由 `opts` 确定的选项。

  - `- (NSUInteger)indexOfObjectPassingTest:(BOOL (^)(id obj, NSUInteger idx, BOOL
  *stop))predicate`；返回满足作为参数传入的谓词 block 的第一个对象。

  - `- (NSUInteger)indexOfObjectWithOptions:(NSEnumerationOptions)opts passingTest:(BOOL(^)(id
  obj, NSUInteger idx, BOOL *stop))predicate`；返回满足作为参数传入的谓词 block 的对象。元素测试的顺序由 `opts`
  参数决定。

  - `- (NSUInteger)indexOfObjectAtIndexes:(NSIndexSet *)s options:(NSEnumerationOptions)opts
  passingTest:(BOOL (^)(id obj, NSUInteger idx, BOOL *stop))predicate`；返回满足作为参数传入的谓词
  block 的对象的索引。元素测试的顺序由 `opts` 参数决定。

  - `- (NSIndexSet *)indexesOfObjectsPassingTest:(BOOL (^)(id obj, NSUInteger idx,
  BOOL *stop))predicate`；返回一个索引集合，其中包含那些满足作为参数传入的谓词 block 的对象。

  - `- (NSIndexSet *)indexesOfObjectsWithOptions:(NSEnumerationOptions)opts passingTest:(BOOL
  (^)(id obj, NSUInteger idx, BOOL *stop))predicate`；返回一个索引集合，其中包含那些满足作为参数传入的谓词 block
  的对象。元素测试的顺序由 `opts` 参数决定。

  - `- (NSIndexSet *)indexesOfObjectsAtIndexes:(NSIndexSet *)s options:(NSEnumerationOptions)opts
  passingTest:(BOOL (^)(id obj, NSUInteger idx, BOOL *stop))predicate`；返回一个索引集合，其中包含那些满足作为参数传入的谓词
  block 的对象。仅使用第一个参数指示的对象。元素测试的顺序由 `opts` 参数决定。

  - `- (NSArray *)sortedArrayUsingComparator:(NSComparator)cmptr`；使用作为参数给定的比较器，返回一个新的已排序数组。

  - `- (NSArray *)sortedArrayWithOptions:(NSSortOptions)opts usingComparator:(NSComparator)cmptr`；使用作为参数给定的比较器，并采用提供的排序选项，返回一个新的已排序数组。

  - `- (NSUInteger)indexOfObject:(id)obj inSortedRange:(NSRange)r options:(NSBinarySearchingOptions)opts
  usingComparator:(NSComparator)cmp`；返回给定对象在目标 `NSArray` 对象的范围 r 中的索引。搜索使用给定的选项执行，并使用作为最后一个参数提供的比较器。

  - `+ (id)array`；返回一个新的空数组。

  - `+ (id)arrayWithObject:(id)anObject`；返回一个包含单个对象的新数组。

  - `+ (id)arrayWithObjects:(const id [])objects count:(NSUInteger)cnt`；返回一个包含由 C
  风格数组决定的一组对象的新数组。数组中的元素数量由 `cnt` 给出。

  - `+ (id)arrayWithObjects:(id)firstObj, ...`；返回一个新的 `NSArray`，其中包含由方法参数序列决定的一组对象。参数列表必须以
  nil 结尾。

  - `+ (id)arrayWithArray:(NSArray *)array`；返回一个使用给定数组中的对象初始化的新数组。

  - `- (id)initWithObjects:(const id [])objects count:(NSUInteger)cnt`；使用作为第一个参数传入的
  C 风格数组中的对象初始化一个 `NSArray` 对象。这些对象的数量由 `cnt` 决定。

  - `- (id)initWithObjects:(id)firstObj, ...`；使用由方法参数序列决定的一组对象初始化一个 `NSArray`。参数列表必须以
  nil 结尾。

  - `- (id)initWithArray:(NSArray *)array`；使用一个已有的 `NSArray` 初始化目标 `NSArray` 对象。

  - `- (id)initWithArray:(NSArray *)array copyItems:(BOOL)flag`；使用一个已有的 `NSArray`
  对象初始化目标 `NSArray`。仅当 flag 为 YES 时，才会复制项目。

  - `+ (id)arrayWithContentsOfFile:(NSString *)path`；使用由 `path` 参数决定的文件内容创建一个新的 `NSArray`
  对象。

  - `+ (id)arrayWithContentsOfURL:(NSURL *)url`；使用由 `url` 参数决定的文件或网络资源内容创建一个新的 `NSArray`
  对象。

  - `- (id)initWithContentsOfFile:(NSString *)path`；使用由 `path` 参数决定的文件内容初始化一个 `NSArray`
  对象。

  - `- (id)initWithContentsOfURL:(NSURL *)url`；使用由 `url` 参数决定的文件或网络资源内容初始化一个 `NSArray`
  对象。




  ### NSDictionary


  `NSDictionary` 是一种关联集合。也就是说，它提供了对象与其对应键之间的关联。`NSDictionary` 类支持对此类关联集合进行一些最常见的操作。以下是其方法列表：




  *   `+ (id)dictionary`；返回一个新的空 `NSDictionary` 对象。

  *   `+ (id)dictionaryWithObject:` `(id)object forKey:(id <NSCopying>)key`；返回一个新的
  `NSDictionary` 对象，其中包含一个已设置到给定键的单一对象。

  *   `+ (id)dictionaryWithObjects:` `(const id [])objects forKeys:(const id [])keys
  count:(NSUInteger)cnt`；返回一个新的 `NSDictionary` 对象，其中包含赋值给第二个参数中键的给定对象集。这些对象与键的数量由参数
  `cnt` 决定。

