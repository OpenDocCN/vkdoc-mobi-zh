  \n航向指针稍微复杂一些。虽然它使用与方位指针相同的阴影配置，但其形状和细节需要多个元素来构建。\n\n```javascript\nCompass.prototype.drawHeadingNeedle\
  \ = function() {\n    var ctx = this.context;\n    ctx.save();\n    ctx.shadowColor\
