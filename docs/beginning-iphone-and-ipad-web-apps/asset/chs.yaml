  \ 4-6.** 使用“precomposed”（预合成）选项的图标\n\n\n\n当您的网页应用仅提供少量功能时，单个图标便已足够。然而，如果您构建的是一个包含不同分类、板块或服务的标签式应用，为应用的各个部分设置对比鲜明的图标，可以为用户带来额外的价值。您可以通过在页面`head`中使用`<link>`标签（其中包含`rel`属性的特殊值`apple-touch-icon`和`apple-touch-icon-precomposed`）来逐页实现此功能。为一个页面单独使用图标的完整代码如下：\n\
  \n```html\n<link rel=\"apple-touch-icon\" href=\"/path/to/custom-icon.png\">\n<link\
  \ rel=\"apple-touch-icon-precomposed\" href=\"/path/to/custom-icon.png\">\n```\n\
  \n这些值与对应图标名称的同类属性产生相同的结果，并适用相同的规则。\n\n## 第 4 章：Web 应用的解剖学\n\n### 全屏运行您的应用\n\n您已经朝着“应用而非浏览器”的体验迈出了重要一步。\n\
  \n但是，如果这个图标启动的是嵌有您网页应用的移动版 Safari，那么浏览器的存在感就无法隐藏。这时，另一个`meta`选项就派上用场了。自 iOS 1.1.3\
  \ 版本起，您可以指示页面默认全屏打开。只有状态栏保持可见；屏幕的其余部分将专用于您的页面。这种所谓的“独立模式”并非在移动版 Safari 中运行您的网页；它使用与移动版\
  \ Safari 相同的渲染引擎，用户将能使用移动版 Safari 的功能，但视图本身将是您的应用。\n\n实现方法如下：\n\n```html\n<meta\
  \ name=\"apple-mobile-web-app-capable\" content=\"yes\">\n```\n\n切记：您的应用并不会运行在移动版\
  \ Safari 或它的“精简”版本中。这是一种不同的模式，应进行全面测试，以确保在显示和行为方面不出问题。同时，务必为用户提供一个清晰高效的导航系统，因为浏览器的导航选项将不复存在。用户进入一个无法进行任何操作或很快陷入困境的应用页面，显然会让他们感到受骗。\n\
  \n如有需要，您可以通过`window.navigator.standalone`布尔值，使用 JavaScript 检查当前是否启用了此模式。这是一个只读属性，因此您无法动态更改它；不过，我们将在本章后面展示如何利用此模式下的选项和操作。\n\
  \n### 一个很棒的启动画面\n\n特殊的`<link>`标签还允许您触发一张图片，在应用首次加载时作为启动画面显示。打开页面时的默认行为是显示上次访问时的页面快照，直到页面加载完成足以显示。这不仅相当缺乏个性，还可能让用户感觉应用在启动时卡住了，从而将他们吓跑。\n\
  \n在 iPhone 上，操作系统允许您通过指定启动图片来改变此行为，代码如下所示。但请注意，这在 iPad 上是不可能的；iPad 会系统性地显示您页面的截图。\n\
  \n```html\n<link rel=\"apple-touch-startup-image\" href=\"/path/to/startup-image.png\"\
  >\n```\n\n您的图片尺寸应为 460 像素高、320 像素宽（竖屏方向）。请注意，此高度已将状态栏的高度考虑在内。如果您的图片占据了设备屏幕的全部范围，将有\
  \ 20 像素被隐藏在平台界面之后。\n\n## 第 4 章：Web 应用的解剖学\n\n### 调整状态栏\n\n您已经注意到，唯一始终对用户可见的 iOS\
  \ 界面元素是状态栏。虽然它很容易与多种不同的设计融为一体，但您可能仍希望对其外观有所控制。毕竟是苹果公司，您无法真正改变状态栏的外观。不过，您可以在其变体中进行选择，以便更好地满足您的需求。\n\
  \n要更改状态栏的外观，请在页面的`head`中使用另一个`meta`标签。\n\n```html\n<meta name=\"apple-mobile-web-app-status-bar-style\"\
  \ content=\"default\">\n```\n\n`content`属性有三个选项。除了`default`，您还可以选择`black`和`black-translucent`。请记住，此选项仅在**全屏模式**下有效。如果应用在加载后才切换到全屏，则无法使用它。同样，这在\
  \ iPad 上也是不可行的，无论是独立模式还是原生应用。\n\n### 保持在独立模式\n\n独立模式的主要问题是，当用户点击链接跳转到另一个页面时，原生状态下会以正常模式启动移动版\
  \ Safari，这将使您的大部分辛勤工作付诸东流。解决方法是使用 JavaScript 处理所有链接并阻止默认行为。\n\n如果您的应用主要依赖 Ajax 驱动，并且页面上只有少数几个链接，这并非难事。您可以直接从\
  \ HTML 代码中为链接绑定事件，如下所示：\n\n```html\n<a href=\"http://www.apress.com/\"\nonclick=\"\
  window.location.href=this.href; return false\">Apress Web Site</a>\n```\n\n这里发生的事情非常直接。`this.href`从`href`属性中获取链接地址；`window.location`告诉浏览器使用给定的地址刷新此页面；最后，`return\
  \ false`阻止了默认的锚点行为（即打开一个新页面）。您甚至可以通过将部分工作移交给外部函数来进一步扩展，该函数可能如下所示：\n\n```javascript\n\
  function openLink(anchor) {\n  window.location.href = anchor.href;\n  return false;\n\
  }\n```\n\n然后，您的函数将从每个锚点标签中调用，方式如下：\n\n```html\n<a href=\"http://www.apress.com/\"\
  \ onclick=\"return openLink(this)\"> Apress Web Site</a>\n```\n\n尽管如此，如果您的应用像经典网页导航一样更广泛地使用链接，我们建议您使用更高级的链接处理系统。它可能类似于这样：\n\
  \n```javascript\n/* Create a document-wide click listener */\ndocument.addEventListener(\"\
  click\", clickHandler, false);\n\nfunction clickHandler(e) {\n  var element = e.target;\n\
  \  /* handle clicks only on anchor elements */\n  if (element.localName.toUpperCase()\
  \ != 'A') {\n    return;\n  }\n  /* ignore elements with a target value specified\
  \ since \"target\"\n  cannot be handled in full-screen mode\n  those links shall\
  \ open regularly in Mobile Safari */\n  if (!!element.getAttribute('target')) {\n\
  \    return;\n  }\n  var url = element.href;\n  /* ignore links other than HTTP(S)\
  \ and to different origin */\n  var match = url.match(/^https?:\\/\\/(.+?)\\/.*$/);\n\
  \  if (!match || match[1] != window.location.host) {\n    return;\n  }\n  /* finally\
  \ open the link in full-screen view and prevent default behavior */\n  window.location.href\
  \ = url;\n  e.preventDefault();\n}\n```\n\n正如代码中的注释所述，这个特定的脚本不处理复杂（或不太复杂的……）情况。更重要的是，它不处理包含子标签的链接。例如，如果您有一个像这样常见的\
  \ HTML 块：\n\n```html\n<a href=\"/pictures/question-mark.png\" title=\"See this picture\
  \ full screen\">\n  <img src=\"/pictures/question-mark.png\" alt=\"A question mark\"\
  >\n</a>\n```\n\n那么脚本将无法工作，因为接收事件的将是图片，而不是链接。然而，这个解决方案很容易扩展，其主要优点是不引人注目，即将 HTML 标记和\
  \ JavaScript 代码分离。当然，只要您链接到页面的其他部分或属于该 Web 应用的其他页面，它就能安全地让您保持在独立模式。对于外部链接，让操作系统启动适当的浏览器似乎是合理的，因为您无法确定远程站点是否适合独立模式，也不应该希望它们与您自己的网站关联得太紧密。\n\
  \n### 构建您的第一个 Web 应用基础项目\n\n\n\n"
- "# Web 应用结构剖析\n\n掌握了以上基础知识后，我们就可以开始构建 Web 应用了。为了条理清晰，我们将演示如何从零开始搭建一个基础项目。\n\n这样能让本书各章节中的示例更易于理解，并且随着你对这个模板的扩展，它也能极大地提升你的工作效率。遵循本章前面提出的指南，并为了简化操作，我们将坚持使用\
  \ iOS 的默认颜色和尺寸标准。同时，我们也会借此机会介绍一些技巧，教你如何用 CSS 替代过去用图片来实现的效果（这些技巧将在后续相关章节中进行详细解释）。\n\
  \n### 在 Komodo Edit 中创建文档模板\n\n要在 Komodo Edit 中创建新项目，请选择 **文件** > **新建** > **新建项目**。将新项目命名为\
  \ `Web App Template` 或你喜欢的任何名称，并选择保存文件的目录。如果项目侧边栏已激活，你将在其中看到你的新项目，显示为你指定的名称和 Komodo\
  \ Edit 的项目扩展名 `.kpf`。如果侧边栏未打开，你可以从 **视图** 菜单中激活它，具体路径为 **视图** > **标签与侧边栏** > **项目**。\n\
  \n> **注意：** 此项目定义基于 Komodo Edit 5.x 版本。在编辑器的新版本中，菜单布局和选项可能会有所不同。\n\n现在，我们来添加你的第一个\
  \ HTML 文件。你可以通过右键单击侧边栏中的项目名称，然后选择 **添加新文件**，或者选择菜单项 **项目** > **Web App Template.kpf**\
  \ > **添加新文件** 来完成此操作。此时会弹出一个新窗口。从右侧列中选择适当的文件类型，这里选 HTML。在列下方的文本字段中，输入文件名 `index.html`；你会注意到保存文件的正确文件夹已被选中，因此只需单击\
  \ **打开**。你的新文件将显示在编辑区域中。\n\n这个文件并非空白。由于你选择了 HTML 文件类型，Komodo Edit 已经为你完成了一些工作，基本结构已经存在。然而，为了完全满足我们的需求，我们需要更改或添加一些元素。你的文件在下一步骤中应如下所示：\n\
  \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <title>Web 应用模板</title>\n    <meta\
  \ name=\"apple-mobile-web-app-capable\" content=\"yes\">\n    <meta name=\"apple-mobile-web-app-status-bar-style\"\
  \ content=\"default\">\n    <meta name=\"viewport\" content=\"initial-scale=1.0;\n\
  \    maximum-scale=1.0; user-scalable=no\">\n    <link rel=\"stylesheet\" href=\"\
  styles/main.css\">\n    <script src=\"scripts/main.js\"></script>\n</head>\n<body>\n\
  \    <div class=\"view\">\n        <div class=\"header-wrapper\">\n            <h1>Web\
  \ 应用标题</h1>\n        </div>\n        <div class=\"group-wrapper\">\n           \
  \ <h2>iPhone</h2>\n            <p>你好，世界！</p>\n        </div>\n    </div>\n</body>\n\
  </html>\n```\n\n你可以看到本章一直在讨论的特殊标签。当然，如果你希望它们都能按预期工作，你需要在根文件夹中创建一个 `images` 文件夹，并按照之前说明放入一个名为\
  \ `startup.png` 的文件。你应该注意到，我们更改了 Komodo Edit 默认 HTML 文件中的文档类型声明（DOCTYPE）。这是我们将在本书中使用的\
  \ HTML5 文档类型声明，目的是在创建有效文档的同时，展示 HTML5 的新特性。使用大写字母是前端开发者的老习惯；自 HTML5 起，文档类型声明不区分大小写。\n\
  \n如果你现在在浏览器中打开此文件（或通过菜单 **视图** > **在浏览器中预览** 直接在 Komodo Edit 中查看），你可能会觉得它平淡无奇。没有应用任何样式，也几乎没有什么内容。然而，你会注意到我们的模板骨架中包含了一些类和\
  \ ID。这些将帮助你定位元素，并将它们样式化为看起来像真正的应用。\n\n在你的站点根目录下创建一个名为 `styles` 的新文件夹。然后，像几分钟前创建\
  \ HTML 文件那样，创建一个 CSS 文件，并将其命名为 `main.css`。此文件已在文档的 `<head>` 中被引用，因此你对它的任何更改都应立即生效。现在让我们添加一些样式。\n\
  \n根据我们之前讨论的建议，你添加到样式表中的第一条样式规则应规定文档占据整个屏幕高度。为了模拟 iOS 用户界面，你还需要将通用字体设置为 Helvetica。\n\
  \n后续章节将深入探讨 CSS 的各种可能性，因此我们在此不会解释全部内容。不过，你可能会对 `-webkit-` 前缀感到陌生。这是一个专有前缀（意味着只有基于\
  \ WebKit 的浏览器才能解释），用于那些特定于浏览器或被认为在 CSS3 规范或其实现方面不稳定的属性和值。\n\n```css\nhtml { height:\
  \ 100%; }\n\nbody {\n    height: 100%;\n    margin: 0;\n    font-family: helvetica,\
  \ sans-serif;\n    -webkit-text-size-adjust: none;\n}\n```\n\n为了始终使文本尽可能易读，Mobile\
  \ Safari 会在每次视口方向改变时自动更改文本大小。这并非总是理想的，因为如果你以特定方式设计页面，它可能会破坏布局或最终看起来很奇怪。为防止此行为并保持对页面外观的控制，我们将\
  \ `-webkit-text-size-adjust` 设置为 `none`，从而禁用自动文本大小调整。\n\n接下来，使用 `-webkit-gradient()`\
  \ 背景扩展，我们无需使用图片即可创建通用背景。构建此背景的方式是，你只需更改 `background-color` 属性，就能在不丢失 iOS 外观的情况下更改元素的颜色。至于\
  \ `.view` 规则，它应用于文档视图的主容器。\n\n```css\nbody {\n    -webkit-background-size: 100%\
  \ 21px;\n    background-color: #c5ccd3;\n    background-image:\n        -webkit-gradient(linear,\
  \ left top, right top,\n            color-stop(.75, transparent),\n            color-stop(.75,\
  \ rgba(255,255,255,.1)) );\n    -webkit-background-size: 7px;\n}\n\n.view {\n  \
  \  min-height: 100%;\n    overflow: auto;\n}\n```\n\n然后，使用应用于 body 背景的相同规则添加标题样式。\n\
  \n```css\n.header-wrapper {\n    height: 44px;\n    font-weight: bold;\n    text-shadow:\
  \ rgba(0,0,0,0.7) 0 -1px 0;\n    border-top: solid 1px rgba(255,255,255,0.6);\n\
  \    border-bottom: solid 1px rgba(0,0,0,0.6);\n    color: #fff;\n    background-color:\
  \ #8195af;\n    background-image:\n        -webkit-gradient(linear, left top, left\
  \ bottom,\n            from(rgba(255,255,255,.4)),\n            to(rgba(255,255,255,.05))\
  \ ),\n        -webkit-gradient(linear, left top, left bottom,\n            from(transparent),\n\
  \            to(rgba(0,0,64,.1)) );\n    background-repeat: no-repeat;\n    background-position:\
  \ top left, bottom left;\n    -webkit-background-size: 100% 21px, 100% 22px;\n \
  \   -webkit-box-sizing: border-box;\n}\n\n.header-wrapper h1 {\n    text-align:\
  \ center;\n    font-size: 20px;\n    line-height: 44px;\n    margin: 0;\n}\n```\n\
  \n最后，以下代码将使我们可以用样式来展示内容：\n\n```css\n.group-wrapper {\n    margin: 9px;\n}\n\n.group-wrapper\
  \ h2 {\n    color: #4c566c;\n    font-size: 17px;\n    line-height: 0.8;\n    font-weight:\
  \ bold;\n    text-shadow: #fff 0 1px 0;\n    margin: 20px 10px 12px;\n}\n\n.group-wrapper\
  \ p {\n    background-color: #fff;\n    -webkit-border-radius: 10px;\n    font-size:\
  \ 17px;\n    line-height: 20px;\n    margin: 9px 0 20px;\n    border: solid 1px\
  \ #a9abae;\n    padding: 11px 9px 12px;\n}\n```\n\n这里介绍的最后一个令人兴奋的特性是 `border-radius`\
  \ 属性，它让你可以为任何元素添加圆角边框。现在，在浏览器中重新加载你的页面（图 4-7）。是不是很眼熟？\n\n**图 4-7.** 瞧，你的第一个 Web\
  \ 应用！\n\n### 隐藏 Mobile Safari 的地址栏\n\n只要用户以全屏模式查看你的站点，这都没问题。然而，你无法完全确定你的最终用户会以那种方式使用它。一个理想的技巧是，当站点在没有全屏模式的浏览器中显示时，隐藏地址栏——以及错误控制台（如果需要的话）。\n\
  \n\n\n### Mobile Safari\n\n观察一下这种情况。当用户平移视口时，这些页面元素会消失不见。页面将至少占据视口高度的 100%，这意味着如果页面部分元素移出焦点区域，其高度未必足以覆盖整个屏幕。因此，我们的目标是在必要时重新调整页面高度，使其始终占据视口的\
  \ 100%，即便部分内容被隐藏。\n\n我们直接来看代码。在你的项目中创建一个名为 `scripts` 的新目录。在 Komodo Edit 中，创建一个名为\
  \ `main.js` 的 JavaScript 文件，并将以下代码复制进去：\n\n```\nif (!window.navigator.standalone)\
  \ {\n   document.addEventListener(\"DOMContentLoaded\", adjustHeight, false);\n\
  }\n\nfunction adjustHeight() {\n   var html = document.documentElement;\n   var\
  \ size = window.innerHeight;\n   html.style.height = (size + size) + \"px\";\n \
  \  window.setTimeout(function() {\n      if (window.pageYOffset == 0) {\n      \
  \   window.scrollTo(0, 0);\n      }\n      html.style.height = window.innerHeight\
  \ + \"px\";\n   }, 0);\n}\n```\n\n这段代码的作用是检查是否处于独立模式；如果用户没有全屏浏览你的页面，`adjustHeight()`\
  \ 函数将会与 DOM 加载完成事件关联。该函数将页面高度设为屏幕高度的两倍，这在大多数情况下都足够，因为用户界面元素很少会占据那么多空间。\n\n`window.setTimeout()`\
  \ 为页面提供了足够的时间，以便在奇迹发生前完成修改。这个奇迹分两步完成：首先，我们使用 `scrollTop()` 方法将页面上移，使页面顶部与屏幕顶部对齐；然后，我们重新调整页面高度，使其再次恰好适应屏幕高度。\n\
  \n你可能会觉得奇怪，为什么只在垂直页面偏移量等于 0 时才重新调整页面位置。实际上，只要没有单个像素移出屏幕，`pageYOffset` 的值就为 0。即使用户平移了地址栏一半的高度，`pageYOffset`\
  \ 的值仍然保持为 0。因此，我们可以一次又一次地保持页面位置不变。这样做的结果是，当用户加载页面时，页面几乎会以全屏模式显示，从而将最大的关注度集中到应用程序上。\n\
  \n### 处理屏幕方向变化\n\n然而，由于页面高度已被动态修改，如果用户在非全屏模式下旋转屏幕，页面高度可能会超出屏幕范围。为此，我们也必须添加一个事件监听器。请注意，`pageYOffset`\
  \ 测试在这里特别有用，因为页面位置不会随着每次旋转而重置。以下是处理旋转的代码行：\n\n`window.addEventListener(\"orientationchange\"\
  , adjustHeight, false);`\n\n## 第 4 章：Web 应用的构成\n\n这段代码能让我们知道用户何时旋转了设备。事件监听器必须设置在附加到当前窗口的\
  \ `DOMWindow` 对象上，而不是文档（document）上。你可以随时使用 `window.orientation` 属性来检查方向的值，如下例所示，例如为了适当地修改样式：\n\
  \n```\nswitch (window.orientation) {\n   /* 正常方向，Home 键在底部 */\n   case 0:\n    \
  \  document.body.className = \"portrait\";\n      break;\n   /* 向左旋转 90 度 */\n \
  \  case 90:\n      document.body.className = \"landscape\";\n      break;\n   /*\
  \ 倒置 */\n   case 180:\n      document.body.className = \"portrait\";\n      break;\n\
  \   /* 向右旋转 90 度 */\n   case -90:\n      document.body.className = \"portrait\"\
  ;\n      break;\n}\n```\n\n通过这种方式，我们避免了使用会消耗大量电量的定时器来定期检查窗口尺寸变化——通知是自动的。\n\n请注意，在\
  \ iPad 上，你也可以使用 CSS 或带有 `media` 属性的 link 标签来锁定某个特定的方向。\n\n```\n<link rel=\"stylesheet\"\
  \ media=\"all and (orientation:portrait)\" href=\"portrait.css\">\n<link rel=\"\
  stylesheet\" media=\"all and (orientation:landscape)\" href=\"landscape.css\">\n\
  \n<!-- 或者在 style 标签或样式表中使用 -->\n<style>\n@media all and (orientation:portrait) {\
  \ /* 此处是你的样式 */ }\n@media all and (orientation:landscape) { /* 此处是你的样式 */ }\n</style>\n\
  ```\n\n\n\n### 此功能仅在 iPad 上可实现。对于其他设备，最佳实践是使用 JavaScript 在 `<body>` 标签上添加一个类或 ID，以便在屏幕方向改变时应用不同的样式。\n\
  \n### 最终润色\n\n当用户在移动版 Safari 中打开你的应用时，之前的 JavaScript 代码负责处理视口（viewport）。如果用户并非通过移动版\
  \ Safari 打开，我们已知应该用 JavaScript 来处理链接；接下来，我们将向 `main.js` 中添加相关脚本，以阻止此情况下的默认行为。为此，请添加如下事件监听器，并将\
  \ `clickHandler()` 函数附加到你的*脚本*文件中：\n\n```\nif (!window.navigator.standalone) {\n\
  \    document.addEventListener(\"DOMContentLoaded\", adjustHeight, true);\n    window.addEventListener(\"\
  orientationchange\", adjustHeight, true);\n} else {\n    /* 仅针对独立模式 */\n    document.addEventListener(\"\
  click\", clickHandler, true);\n}\n```\n\n### 准备就绪\n\n你在此处构建的文件及文件结构，正是启动大多数 Web\
  \ 应用项目所需的基础。如果你已安装 Komodo Edit，现在可以将此项目保存为模板，以便在日常工作流程中轻松复用。为此，请从“项目”菜单中选择你的项目名称，然后点击“从项目创建模板”。模板的默认存储位置是安装\
  \ Komodo Edit 时创建的用户文件夹下的 *Template* 文件夹。之后，你便可以通过“项目”菜单选择“从模板新建项目”，来基于此模板创建新项目。\n\
  \n如果你选择不安装 Komodo Edit，我们建议你寻找其他方法来轻松复用此代码和结构。通过本章，你已经了解到我们的模板框架所满足的需求对于用户满意度以及你\
  \ Web 应用的成功至关重要。使用模板作为辅助工具，能帮助你快速跨过项目中那些略显烦人的初始阶段。这也是让你的 Web 应用实现其首要目标——成为一个真正的应用——的第一步。\n\
  \n---\n\n## 第 5 章：用户体验与界面设计指南\n\n上一章的核心并非关于屏幕尺寸、技术可能性，甚至不是理解 iOS 在 iPhone、iPod touch\
  \ 和 iPad 上的行为方式。当然，你必须掌握这些方面才能为这些设备构建高质量的 Web 应用，但这些技术只是实现成功过程的工具。本书中的建议最终都归结到用户身上。苹果便携式设备的触摸交互系统在设备与用户之间建立了一种特定的、绝对以用户为中心的关系。这意味着，作为开发者，你需要认真考虑你的应用设计。\n\
  \n应用于计算机开发领域的认知工效学是一门实践性科学，旨在让应用的功能易于用户理解和操作。\n\n苹果工程师已经考虑了 iOS 的部分工效学特性。例如，多点触控交互模型允许用户轻松完成大多数网站上的常见任务，如缩放、聚焦或打开上下文菜单。\n\
  \n工效学在苹果产品中（尤其是在苹果便携设备上）的一个重要方面是美学吸引力。iOS 具有强烈的视觉识别性，而紧密集成到 iPhone GUI 中的原生应用的成功更是使其辨识度大增。因此，从用户角度评判一个应用的质量，往往取决于其视觉质量与\
  \ iOS GUI 的匹配程度。\n\n当然，仅靠设计并不能保证你的 Web 应用成功。尽管漂亮的外观可以吸引用户进入应用，但如果他们在实际使用中找不到预期的品质，就会很快离开。这在应用开发这种竞争激烈的领域尤其如此。\n\
  \n在本章中，我们将介绍一系列规则和最佳实践，帮助你构建更好的 Web 应用——也就是说，让那些在移动设备上与桌面计算机上有着不同体验的用户体验达到最佳状态的应用。\n\
  \n---\n\n### 从桌面网页到移动网页\n\n一个常见但危险的错误是认为，无论通过何种平台访问，Web 都是相同的。尽管 Web 应用是使用 Web 技术构建的，但它们与经典网页完全不同。显然，设备能力是不同的。如果你在桌面版\
  \ Safari 或移动版 Safari 上查看 Gmail 之类的 Web 应用，你会发现它们的界面截然不同。\n\n尽管如此，你仍然可以在 iPhone 上使用\
  \ Gmail，这是因为移动版 Safari 旨在适应有限的屏幕空间。然而，与使用 iMac 甚至 MacBook 相比，用户的体验感并不那么好。如图 5-1\
  \ 所示，缩放会使内容更难以阅读和交互。因此，谷歌尝试为其移动设备上的 Web 应用提供适配版本——界面更简洁，功能通常更少，并且加载时间经过优化。\n\n![图\
  \ 5-1](img/index-112_1.jpg)\n\n**图 5-1.** 尽管桌面版 Safari 和移动版 Safari 的渲染效果相同，但缩放确实会影响用户体验\n\
  \n不同的屏幕尺寸不仅仅意味着不同的视图：更换设备意味着完全不同的体验，伴随着不同的行为和期望。开发 Web 应用时，你应该将界面和交互模式与功能紧密关联，而不应受设备的制约。同样，诸如\
  \ CSS 或 JavaScript 等 Web 技术应始终被视为定义界面和交互可能性的工具，这些可能性是特定功能所固有的——但绝不应让它们决定界面和功能应该是什么样子。\n\
  \n---\n\n### 忘掉桌面隐喻\n\n通常，桌面隐喻是需要被忘记的，同时还有频繁多任务处理习惯。请接受这样一个事实：iOS 设备——更不用说所有移动设备——并非以那种方式工作。在使用桌面计算机时，最终用户可以在同一时间执行各种任务，处理多个窗口，并且如果愿意，可以随时将它们并排放置。对于所有这些任务，他享有充足的屏幕空间，最重要的是，会使用功能丰富的设备（即鼠标和键盘）与桌面进行交互。\n\
  \n计算机采纳了桌面隐喻，并且可以自豪地拥有生产力工具以及处理许多活动的实用或趣味性方法。而对于 iOS，虽然你可以进行多种后台任务，如播放音乐、下载应用或收取电子邮件，但并排运行多个原生应用是不可能的。iOS\
  \ 旨在让最终用户高效地一次完成一项任务。小屏幕意味着用户需要依次专注于一个区域——从而专注于一系列操作。\n\n---\n\n### 改变导航习惯\n\n在开发移动\
  \ Web 应用时，不能在整个 Web 应用体验的中途失去最终用户，这一点至关重要。传统的 Web 体验允许用户从站点的任何一个部分访问所有其他部分。这通常通过使用导航栏和大量内部链接来实现。作为\
  \ Web 用户，你可能已经遇到过一些怎么都搞不明白的网站。如果一切顺利，你会足够快地找到所需内容；否则，和大多数用户一样，你可能会转向下一个网站。\n\n这种情况在移动\
  \ Web 上更为严峻。用户期望找到一条清晰、直接的路径从一个点到达另一个点。这里一个重要的概念是*流程*。\n\n\n\n"
- "# 用户体验与界面设计指南\n\n尽管不打断用户正在进行的操作似乎是显而易见的原则，但弹出模态对话框仍然很容易干扰用户。在这种情况下，你始终应为用户提供一种简便的关闭对话框的方式，并让后续操作清晰明了。\n\
  \n开发者可能会倾向于通过要求用户输入（无论是文本框还是单选按钮）来让应用对最终用户更个性化。但在 iPhone 上，这会降低用户体验速度，并延迟他们达成目标的时间。\n\
  \n在 iPad 上，这种后果可能更令人恼火。苹果建议 iPad 应用应以非线性方式运行，这意味着用户应在主视图中看到任务内容，并能从屏幕的导航区域访问选项和交互工具。也就是说，无论用户在应用中做什么，都应能完成大多数任务。即使这对你来说似乎合理，在要求用户做出选择时也要谨慎，因为这既打断了用户在主视图中的操作流程，也可能导致导航区域的某些选项被切断，从而带来挫败感。例如，在邮件应用中，你不希望因为用户正在阅读邮件而失去“撰写”选项。作为经验法则，你应谨慎假设用户所处的上下文以及用户可能想要做什么。\n\
  \n还需谨记，设备制造商已经仔细考虑过其设备的可用性。因此，你不应重新创建已经存在且用户已经习惯使用的功能。\n\n### 精心展示广告\n\n很多网站提供免费内容，并依赖广告作为收入来源。如果你的计划如此，就应认真思考如何实现。在传统网页上，多项研究已证明用户普遍被“训练”得对广告视而不见。虽然你可能认为在\
  \ iPhone 上这不是大问题，因为广告必然会占据更多屏幕空间，且显示通常不那么杂乱，但你不应过度加载页面。强制用户滚动掠过无关内容或缩放远离广告，很可能迅速将用户从你的\
  \ Web 应用驱离。\n\n对于 Web 应用和原生应用，广告标准早已确立；通常你会在页面顶部或底部显示一个小横幅。然而，原生应用更进一步，在大多数情况下会在短暂延迟后自动隐藏广告，将全部空间留给实际内容。这具有既不突兀又能吸引用户注意力的优点。将这种行为引入\
  \ Web 应用将是一个积极的举措，尤其因为使用 CSS 过渡，你几乎无需使用任何 JavaScript。以下是一个简单的示例，你可以使用本书前面创建的模板轻松测试。首先，将以下代码添加到页面的\
  \ `<head>` 中：\n\n```css\n.ads {\n  z-index: -1;\n  position: relative;\n  -webkit-transition:\
  \ margin-top 0.35s ease-out;\n  border-bottom: 0;\n  margin: 0 auto 34px;\n  width:\
  \ 320px;\n}\n\n.ads img { display: block; }\n\n.ads .tab:before {\n  color: red;\n\
  \  content: 'AD ';\n}\n\n.ads .tab {\n  position: absolute;\n  background-image:\
  \ -webkit-gradient(\n    linear, left top, left bottom,\n    from(black), to(#666));\n\
  \  color: white;\n  font: bold 11px/24px verdana;\n  height: 24px;\n  bottom: -24px;\n\
  \  left: 0;\n  width: 100%;\n  padding: 0 5px;\n  -webkit-box-sizing: border-box;\n\
  }\n```\n\n首先，你通过修改广告的 `z-index` 和 `position` 值来定义样式，使广告堆叠在页眉下方。然后，你创建应用于广告区域和广告出现后仍需可见区块的样式。与过渡相关的代码以粗体显示，表明当\
  \ `margin-top` 属性发生变化时，应发生一次平滑的 35ms 过渡。\n\n接下来，你依靠脚本来触发动画：\n\n```javascript\nfunction\
  \ hideAds() {\n  setTimeout(hide, 5000);\n}\n\nfunction hide() {\n  var ads = document.querySelector(\"\
  .ads\");\n  ads.style.marginTop = (-ads.offsetHeight) + \"px\";\n}\n\nfunction reveal()\
  \ {\n  var ads = document.querySelector(\".ads\");\n  ads.style.marginTop = \"\"\
  ;\n  hideAds();\n}\n```\n\n**注意：** `querySelector()` 方法返回匹配作为参数传递的 CSS 选择器的第一个元素。它是\
  \ W3C 选择器 API 的一部分，由 Mobile Safari 完全支持。\n\n通过这种方式，无论何时你希望隐藏广告，只需调用 `hide()` 函数，它会根据横幅的高度确定新的\
  \ `margin-top` 值并启动动画。\n\n`reveal()` 函数允许你通过恢复 `margin-top` 的初始值并再次触发动画来重新显示广告。以下是相关的\
  \ HTML 标记：\n\n```html\n<body onload=\"hideAds()\">\n  ...\n  <div class=\"header-wrapper\"\
  >\n    <h1>Web App Header</h1>\n  </div>\n  <div class=\"ads\">\n    <img src=\"\
  some-ad.gif\" alt=\"Advertisement\" width=\"320\" height=\"50\">\n    <div class=\"\
  tab\" onclick=\"reveal()\">\n      Apress sales. 20% off on all books.\n    </div>\n\
  \  </div>\n  ...\n  <img src=\"index-116_1.jpg\" alt=\"\">\n  <img src=\"index-116_2.jpg\"\
  \ alt=\"\">\n```\n\n图 5–2 展示了结果。用户将能够点击标签再次查看广告，而隐藏过程将在五秒后再次发生。第 9 章将更详细地介绍 CSS\
  \ 过渡。\n\n**图 5–2.** 广告在几秒后自动隐藏\n\n此外，你应避免使用弹出元素。如前所述，你应限制任何对用户体验流程产生负面影响的内容。因此，你应仅在特定时刻考虑使用弹出元素，例如首次页面加载时。在所有情况下，都应为用户提供明显且简便的方式关闭广告——使用\
  \ iPhone 界面默认的 X 按钮是一个合理的选择（图 5–3）。总的来说，你应彻底考虑广告对应用的影响。\n\n**图 5–3.** 你应始终为用户提供简便的方式隐藏广告\n\
  \n在 iPad 上，可以使用类似的过程，只是格式不同。尽管 iPad 的大屏幕更接近桌面网页，但正如前一章所述，用户与设备之间建立了一种特殊的连接。因此，你应考虑采用新的、适合的方式将广告引入页面。你所拥有的各种可能性，包括声音、视频和丰富的交互，应促使你让用户成为推广内容的核心角色。\n\
  \n无论你想出什么点子，都要牢记本书中已经介绍和将要介绍的使用特性，以及你从自身 iPhone 用户体验中收集到的要素。\n\n### 让用户自行决定\n\n\
  作为开发者，在引导用户通过\n\n\n\n"
- '# 无缝用户体验与界面设计指南


  提供无缝体验，让用户能从网络应用中自由选择所需内容而不受干预，这确实颇具挑战。但有些情况下，你必须明确地将决定权交给用户。虽然用户挫败感并非直接源于用户界面或设计问题，但它会严重影响用户对你应用质量的感知。例如，根据用户使用的设备进行过滤，并用"仅限
  iPhone"的消息阻止访问，这是应该避免的做法。首先，针对功能而非用户代理进行优化更为高效。其次，如果你的网络应用能在 iPhone 上运行，那么在 iPad、安卓或
  webOS 设备上通常也能正常运行。


  同样，你不应强制 iPhone 用户访问特定于 iPhone 的网站。用户可能有理由更倾向于使用常规桌面版网站。移动版 Safari 渲染网站的方式与桌面版 Safari
  类似，并提供了在最佳条件下查看页面的工具。请给用户选择权（如图 5-4 所示），记住用户的选择（通过 Cookie 或其他存储方式），并始终让用户有机会改变主意。


  ![图 5–4](img/index-118_1.jpg)


  **图 5–4.** Google 翻译的移动版为用户提供了使用常规网页版本的选项。


  ### 简洁性与易用性


  对于传统桌面和网络开发成立的准则，在移动网页领域更为关键。由于便携设备旨在移动场景中使用，用户可能同时专注于其他事情。因此，你必须让用户一目了然地知道如何通过你的应用实现目标。虽然反复平移页面会令人厌烦，但你不应将大部分内容都集中在页面顶部。相反，应对内容进行分类，并使分类清晰明确。即使用户同时关注其他事情，也应能立即识别出你的网络应用的主要功能及其整体运作方式。


  ### 避免杂乱


  iOS 的整体用户界面简洁精致，采用微妙的渐变、有限的色彩和干净的线条。这是用户评判你网络应用的标准，而苹果的选择绝非偶然。杂乱始于刺眼的颜色、过多的色彩，以及使内容难以浏览的配色。同样的原则也适用于网络应用的各个元素。分散的内容难以理解，会分散用户对重要内容的注意力。图
  5-5 展示了一个杂乱应用示例。


  ![图 5–5](img/index-119_1.jpg)


  **图 5–5.** eBay 未针对 iPhone 进行优化，给人一种杂乱的感觉，但由于只有一个搜索框，依然保持着高效性。


  这并不意味着你应该大量使用空白。在 iPhone 上过度使用空白会迫使用户频繁平移，导致整体内容可见性受限。而在 iPad 这样更大的屏幕上误用空白，则可能稀释内容，给人留下体验分散的印象。


  如果你的网络应用本身包含许多不同的内容元素，实现满意用户体验的关键可能在于高效的菜单。你不能固守开发桌面网页时养成的习惯。你的菜单必须快速切入重点，将用户操作限制在最低限度，同时清晰展示不同的可用选项。应优先选择简短、表现力强的文本，而非冗长、描述性或下拉式菜单。如果你确信目标受众能理解技术词汇或缩写，而这些词汇能用更少的字符清晰表达选项，那就使用它们。所有与导航相关的内容都应便于快速浏览和使用，因此这些准则同样适用于按钮、链接以及偶尔出现的弹出窗口。


  简而言之，不要忘记所有这些元素都是次要的，不应分散用户对你所提供主要服务的注意力。恰当平衡所有这些要素，将极大有助于吸引用户注意力，并最终提升用户忠诚度。


  ### 用户界面


  在屏幕尺寸有限的移动场景中，应以好奇的心态来思考用户界面的概念。我们谈论的是那些经常在移动中，在比惯常更小的屏幕上，仅用手指手势与应用及设备进行交互的用户。


  ![图 5–6](img/index-120_1.jpg)


  在开发桌面应用时，你可以放心地将按钮排列在全屏窗口的远边，以便轻松点击。开发网络应用时，你可以依赖鼠标悬停提示来引导用户。这些技术在开发 iOS 应用时并不适用。没有什么能阻止用户点不到屏幕边缘，也没有真正的鼠标悬停让用户可以快速"探索"页面。为了让用户界面保持其在桌面端的功能——一套作为一个整体使功能易于访问的图形元素——你必须重新考虑应该应用的关键规则。


  #### 适应触控


  你首先应考虑的参数是指点设备——用户的手指。苹果建议，大多数用户的手指需要一个大约 44 像素宽的区域，才能快速无误地点击某个项目。如果你希望使用更小的按钮或链接，请确保周围有足够的空间，避免多个活动区域被同时点击。


  另一个关键点是操作应有明确的指示。如果没人想到要去点击，那么完美尺寸的点击区域就毫无意义。让你的元素看起来是可点击的。确保用户能识别出按钮的最佳方式是遵循主流的苹果用户界面。如果你偏离了它，请注意用户可能会误解你的元素。在
  iPhone 上，创建可点击元素的一般建议是让它们"看起来真实"。苹果的按钮因其渐变和投影而在屏幕上脱颖而出（见图 5-6）。它们看起来像是你真的可以触摸到的按钮——这正是你需要传达的感觉。


  ![图 5–7](img/index-121_1.jpg)


  **图 5–6.** 与普通链接相比，用户更可能点击按钮。


  在为 iPad 开发时，这一点将更为重要：随着专门为 iPad 更大屏幕设计的应用和网站数量增加，类似真实世界的应用界面很可能会迈出重要的一步。


  最后，不要忘记，与使用鼠标不同，用户无法激活悬停状态。如果你的应用依赖工具提示或复杂的悬停效果，很可能只会让失望的用户离开。


  #### 适应尺寸




  '
- '# 用户体验与界面设计指南


  事实上，你开发的移动应用很可能不会面向更大尺寸的设备屏幕。虽然屏幕分辨率能提升用户体验，但移动设备受便携性限制，屏幕尺寸不太可能持续增大。iPad 带来了截然不同的体验——尽管屏幕更大，但不能视其为新型笔记本电脑，当然也绝不能当作放大版的
  iPod touch。以下准则同样适用于 iPad 开发：务必确保所有文字内容清晰可读。宽屏上的小字体会让多数人反感——在移动设备上，这甚至可能彻底赶走用户。


  当然，提供字体缩放功能（图 5-7）是一种解决方案。但归根结底，最佳实践是在真实设备上测试字体，并诚实评估自己的视力情况。图标设计也要遵循同样的限制原则。当你通过尺寸让交互区域便于点击时，请记住：图标的本质是用比文字更快、更通用的方式表达操作、快捷方式或链接——这在移动设备上尤为关键。


  **图 5-7.** `Twitterific` 应用在导航栏提供了调整文字大小的按钮。


  ### 避免不必要的交互


  我们反复强调：用户体验应尽可能流畅。在传统网页中，表单填写可能阻碍用户继续操作；而在移动端，这很快就会变成苦差事。任何情况下都应优先使用单选按钮、复选框或下拉菜单替代文本输入框，因为在
  iPhone 上，根据实际场景，打字可能相当困难。iPad 开发同样遵循此准则：Apple 建议 iPad 应用应完全支持单手操作，而双手操作则应带来额外的舒适性和操作效率。


  ### 善用新型输入类型


  如今，表单已是网络用户日常生活的组成部分。人们越来越习惯填写表单，也因此变得越来越缺乏耐心，对美观性和易用性有更高要求——这在移动设备上尤其明显，糟糕的浏览条件容易让用户焦躁，输入过程可能困难重重。


  HTML5 引入了多种向后兼容的新型输入类型来解决这些问题。表 5-1 列出了 Mobile Safari 支持的类型。


  **表 5-1.** Mobile Safari 支持的新型输入类型


  | 类型 | 描述 |

  |------|------|

  | `tel` | 电话号码（通常为数字字符） |

  | `search` | 搜索字段 |

  | `url` | 绝对 URL 地址 |

  | `email` | 一个或多个有效电子邮件地址 |

  | `number` | 数值 |


  核心理念是：浏览器应为用户提供输入界面，并在处理表单时向开发者提交格式化内容。Mobile Safari 会根据这些输入类型为调用的上下文键盘注入内容。例如，点击
  `tel` 类型输入框会弹出数字键盘（如图 5-8 所示）。


  **图 5-8.** 所有支持的键盘类型


  这些功能通过减少操作步骤实现无缝交互，显然能提升用户体验。在 iOS 2.0 时代，iPhone 曾为命名为 `zip` 或 `phone` 的输入元素自动弹出数字键盘，部分实现了类似功能。但该特性在
  iOS 2.0 中被移除，直至 3.1 版本才通过支持新型输入类型重新引入。


  ### 审慎对待用户输入信息


  虽然可以简化用户输入，但请始终自问：你计划索要的信息是否真的必要？或者说，这对最终用户是否具有首要价值？如果你的应用要按不同条件返回书籍列表，那么询问用户是否偏好精装本、特定出版社或出版年份就显得次要了。此时最佳做法是像亚马逊（图
  5-9）那样分阶段进行查询：先通过标题、作者或主题搜索——理想情况下只需一个文本输入框，由服务器端脚本判断相关性；然后提供按日期、出版社或封面类型筛选结果的选项；最后让用户对结果进行排序，例如按价格或书店库存。


  **图 5-9.** 亚马逊不会在搜索区域堆砌筛选条件，而是将筛选功能延迟到结果页面。


  加速此类应用的另一种方法是记录用户输入。你的忠实用户很可能总在查找同一批出版社的书籍。你可以通过传统 Cookie 或 HTML5 最新的客户端存储技术（本书第
  15 章将介绍）保存用户偏好。这样，当用户再次访问你的 Web 应用时，就不必重新输入“墨菲斯托菲勒斯的古籍书架珍藏”这样的内容了。


  用户输入的核心理念是：在你索取任何信息时，都应反馈提供更多附加功能。当然，收集用户信息能显著提升服务质量，关键是要让“显著”的程度与“收集”的投入相匹配。


  ### 避免增加操作步骤


  在前述案例中，用户需要经过筛选、搜索、排序三个步骤，其中仅第一步是必需的。如前所述，用户想要的核心功能应通过最直接的流程尽快呈现。将图书搜索应用拆分为三个独立页面（如同传统网页常见的账户注册表单那样），只为减轻每个阶段的负担——这种做法在此并不合适。这种设计的好处（减少页面跳转、降低信息杂乱）会被用户被迫等待的弊端所掩盖，用户甚至可能不清楚流程耗时或下一步操作。对开发者而言，要赌网络连接能连续三次保持高效，风险也很大。


  ### 核心理念：专注


  iPhone 不是电脑，iPad 也不是。不要期望用户像操作电脑那样使用它们，也不要用桌面应用的思维开发 Web 应用。iOS 应用应专注于为特定需求或问题提供具体且令人满意的解决方案，几乎只聚焦于以最直接的方式呈现用户期望的功能。承载你
  Web 应用的视口，应像时钟应用（图 5-10）那样，成为一个容纳精选元素、整体协调、清爽简洁、层次分明的空间。


  虽然这种设计理念可能源于硬件限制（高负载下渲染缓慢、屏幕空间有限），但它已成为用户的期待。当你为主流需求提供恰当解决方案时，用户的忠诚度将是你的回报。这一准则同样适用于
  iPad——至少是继承而来的。所以，始终专注于提供一项精确的服务，而非多个粗略的功能。


  **图 5-10.** 时钟应用精准聚焦用户期望：时间服务。


  ### 实现响应式设计




  '
- "# 移动端用户体验与界面设计指南\n\n移动设备用户期望操作能够快速响应。任何操作都应立即获得反馈。我们在前一章中已经说明，全屏模式 Web 应用的默认启动画面是上一个\
  \ Web 应用界面的状态快照，这可能会让用户误认为应用或设备已经无响应。这种情况至少会让用户感到沮丧。即使是短暂的等待也会驱赶部分用户，并且在任何情况下都会损害用户忠诚度。\n\
  \n### 让你的 Web 应用响应迅速\n\n这一原则贯穿 Web 应用体验的始终。你应该避免使用过多处理器密集型操作、过多的`JavaScript`，以及耗时过长的操作（如重服务器端活动以显示结果）。这些不仅应该在开发优化阶段充分考虑，更应在头脑风暴和功能设计阶段就纳入考量。\n\
  \n为了在 Web 应用加载时最小化等待时间，应始终尽量限制图片的使用，注意文件大小，并避免页面过长导致需要大量滚动才能使用。关于图片，正如我们将在后续章节中看到的，你可以通过使用`CSS`渐变、画布（`canvas`）或网页字体（`web\
  \ fonts`）来替代许多图片。需要注意的是，在文档未完全加载之前，页面的其余部分很可能无法进行用户交互——而用户却无法理解其中原因，因为尚未加载的页面部分在视窗之外。最后，虽然将标记、样式和功能（即`HTML`、`CSS`和`JavaScript`）分离并采用外部文件是一种良好实践，但你也应尽可能减少`HTTP`请求次数，因为你无法预测连接类型或质量，而且移动设备的服务器响应时间可能更长。\n\
  \n当然，在您提供的体验中出现明显的延迟步骤可能难以避免。如果在某个阶段，你必须启动一个需要较长时间的操作，请务必记得向用户反馈 Web 应用的活动状态（见图\
  \ 5–11）。虽然每个操作都应快速给出答案，但如果无法做到，通过让用户了解当前进展，他们会更有耐心和容忍度。顺便说一句，这对于大多数用户交互来说都是如此。\n\
  \n![图 5–11](img/index-126_1.jpg)\n\n**图 5–11.** 邮件应用在连接时使用旋转指示器，在可能较长的消息加载过程中则使用进度条\n\
  \n对于等待阶段，除非你绝对确定等待时间会很短（无论连接质量如何），否则进度条比旋转指示器更好，因为它能告知用户当前进程的进展情况。同样，如果多个操作同时进行，最好逐步告知用户正在发生的事情。屏幕上视觉元素的变化能让用户确信确实有事情正在发生——也就是说，Web\
  \ 应用并没有卡在旋转指示器上——如果你做得好的话，甚至还能在一定程度上带来娱乐性。\n\n### 让你的 Web 应用具有交互反馈\n\n类似地，即使操作不需要时间完成，你也应该引导用户完成操作。`iOS`通过`-webkit-tap-highlight-color`\
  \ `CSS`属性为点击按钮提供了内置反馈。你可以将此作为示例，来加强与用户及其设备（以及你的应用）之间的连接——因为屏幕会像真正的按钮一样对手指操作做出反应。在传统\
  \ Web 上，这通常通过悬停（`hover`）状态来实现：菜单项在悬停时改变颜色、出现工具提示、元素放大或不透明度切换。\n\n但你应该知道，这在移动设备上并不可行，因为没有鼠标，也就不存在真正的悬停操作。相反，你需要额外关注用户点击时应该发生什么。另一个来自原生`iOS`功能的启发式示例是切换开关按钮。`Apple`的设计师没有使用普通的复选框，甚至不是按下时看起来被按下的按钮，而是采用了一种“开关”隐喻。这给用户带来了对`GUI`元素更强的真实感，同时状态的改变变成一种微妙的动画，告知用户操作已被采纳。尽管如此，在模仿原生`iOS`界面时一定要小心，因为用户会期望你的元素行为与它们模仿的对象完全一致。因此，不同的行为或结果会具有欺骗性，并对用户对你应用质量的感知产生负面影响。\n\
  \n作为`iOS`开发者，在许多情况下，通过创建自己的效果来超越`-webkit-tap-highlight-color`效果是很有趣的（但要记住，事情应该保持简单且易于理解），无论是通过管理你自己的自定义效果，还是例如模仿原生`iOS`的条目或菜单选择列表效果。\n\
  \n## `iOS`界面设计最佳实践\n\n除了前面介绍的用户体验指南外，在开发 Web 应用时，还有若干用户界面设计准则需要考虑。这些准则源于设备的特殊性或原生`iOS`的`GUI`。遵循这些准则有助于提供用户期望的优质体验，也是应用成功的重要一步。\n\
  \n#### 适应性\n\n`iOS`的一个棘手特性是，它允许用户随时在竖屏和横屏方向之间切换视口。这与传统 Web 开发者不同，他们可以轻松依赖最小屏幕尺寸，最终依靠滚动条。此外，用户在一次页面访问中反复更改浏览器窗口大小的可能性很小，这意味着不会出现不同显示方式的直接对比。随着屏幕尺寸是`iPhone`和`iPod\
  \ touch`五倍大的`iPad`的发布，情况变得更加复杂。为了给用户提供令人满意的体验，你的 Web 应用必须完美适应这些情况。\n\n因为按照本书的建议，你已阻止了\
  \ Web 应用的缩放，因此必须确保应用能够适应视口的宽度（设置为`device-width`）。如果你是前端 Web 开发者，你应该知道什么是流动布局（`fluid\
  \ layout`）。基本思想是，无论屏幕尺寸如何，页面都占据屏幕的 100%，而不会破裂成一堆无序的元素。这意味着你应该禁止所有布局元素使用固定尺寸，并作为通用规则，完全避免使用它们。\n\
  \n本书中将有大量示例说明如何实现这一点。你已经在项目模板中看到，标题和段落会占据屏幕的全部宽度，无论方向如何。\n\n另一种可用方法是根据视口方向应用`CSS`规则。使用时需谨慎，因为如果最终对每种配置应用完全不同的规则，文件大小很容易翻倍。最佳方法是始终记住你的页面将有两种可能的布局，并在每个开发阶段对两种布局都进行测试。如果你以这种方式构建了标记和样式，很可能就不需要使用特定样式。\n\
  \n#### 列表与图标方法\n\n\n\n### 列表\n\n为了以清晰明了的方式呈现数据，你会频繁使用列表。Apple 建议在为运行 iOS 的设备设计网页和应用时使用列表，事实上列表确实有很多优点。它们能让你通过减少完整句子的数量来使表达更加简洁，同时能让大量信息以清晰的数据分组形式呈现。此外，列表的形式与\
  \ iOS 和桌面应用的默认菜单相似，因此用户会感到熟悉。\n\n不过要注意，不要让列表过于冗长。尽管前面提到的要点都与我们已阐述过的最佳实践相吻合，但列表——即使是网页上的列表——如果变得太长，会迫使用户进行平移，可能错过他们正在寻找的内容，或在信息中迷失方向。长列表的另一个严重问题是，它们通常会使浏览器变慢，这同样会让用户感到沮丧。为了避免列表过长，正如前面所述，你应该问自己哪些信息最重要，以及如何对它们进行分类。\n\
  \n由于列表存在于 iOS 的图形用户界面中，因此你可以模仿现有的样式，为你的网络应用打造吸引人的界面。有三种可用的列表类型，即：边到边列表、圆角边框列表和图标网格列表（见图\
  \ 5-12）。\n\n![](img/index-129_1.jpg)\n\n> **第 5 章：用户体验与界面指南**\n> \n> 图 5-12\\. 三个不同应用（雅虎财经、设置和领英）中的三种不同列表类型\n\
  \n如果你按照本书中的所有示例操作，并根据我们建议的文件和代码片段创建模板，你很快就能拥有一个坚实的基础，从中挑选素材来构建网络应用。\n\n第一种列表类型特别适合长列表。它紧凑、简洁且易读。\n\
  \n#### 基本边到边列表\n\n如果你已经开始构建项目模板和模板文件，你可以创建一个新的 HTML 文件，并将以下代码添加到 `.view` 容器中：\n\n\
  ```html\n<div class=\"list-wrapper\">\n  <h2>A</h2>\n  <ul>\n    <li>苹果</li>\n \
  \   <li>应用程序</li>\n  </ul>\n</div>\n```\n\n接下来是让基本列表看起来像 iPhone 风格的 CSS。将其附加到你在网络应用模板中已创建的\
  \ `styles.css` 样式表中：\n\n```css\n.list-wrapper h2 {\n  line-height: 1;\n  font-size:\
  \ 18px;\n  padding: 1px 12px;\n  font-weight: bold;\n  text-shadow: rgba(0,0,0,0.5)\
  \ 0 1px 0;\n  background: left 1px -webkit-gradient(linear,\n    left top, left\
  \ bottom,\n    from(rgba(0,0,0,0.18)), color-stop(0.65, transparent))\n    rgba(178,187,194,0.89);\n\
  \  -webkit-box-sizing: border-box;\n  height: 22px;\n  border-bottom: solid 1px\
  \ rgba(0,0,0,0.18);\n  overflow: hidden;\n  white-space: nowrap;\n  margin: 0;\n\
  \  color: #fff;\n}\n\n.list-wrapper ul {\n  padding: 0;\n  background: #fff;\n \
  \ font-size: 20px;\n  line-height: 23px;\n  margin: 0;\n}\n\n.list-wrapper ul li\
  \ {\n  border-bottom: 1px solid #dfdfdf;\n  padding: 10px;\n}\n```\n\n#### 圆角边框列表\n\
  \n第二种列表类型与边到边列表非常相似，但它在第一个和最后一个列表项上具有圆角边框。因此，它更适合用于不太长的列表，以便列表的顶部和底部边缘能同时被看到。HTML\
  \ 结构与之前的标记非常相似，不过样式会将内边距直接转移到链接上，因此应用于焦点元素的效果会考虑到边框半径。要查看效果，只需将以下代码放在 `.group-wrapper`\
  \ 内：\n\n```html\n<h2>分组列表</h2>\n<ul>\n  <li><a href=\"item1.html\">项目 1</a></li>\n\
  \  <li><a href=\"item2.html\">项目 2</a></li>\n  <li><a href=\"item3.html\">项目 3</a></li>\n\
  </ul>\n```\n\n相关的样式放入同一个样式表：\n\n```css\n.group-wrapper ul {\n  background-color:\
  \ #fff;\n  -webkit-border-radius: 10px;\n  font-size: 17px;\n  line-height: 20px;\n\
  \  margin: 9px 0 10px;\n}\n\n.group-wrapper ul li {\n  padding: 11px 9px 12px;\n\
  }\n\n.group-wrapper ul {\n  font-weight: bold;\n  margin-bottom: 20px;\n  list-style:\
  \ none;\n  padding: 0;\n  border: solid 1px #a9abae;\n}\n\n.group-wrapper ul li:not(:last-child)\
  \ {\n  border-bottom: inherit;\n}\n\n.group-wrapper ul li a {\n  padding: inherit;\n\
  \  color: inherit;\n  text-decoration: inherit;\n  margin: -11px -9px -12px;\n \
  \ display: block;\n}\n\n.group-wrapper ul li:first-child a {\n  -webkit-border-top-right-radius:\
  \ 10px;\n  -webkit-border-top-left-radius: 10px;\n}\n\n.group-wrapper ul li:last-child\
  \ a {\n  -webkit-border-bottom-right-radius: 10px;\n  -webkit-border-bottom-left-radius:\
  \ 10px;\n}\n```\n\n#### 图标网格显示\n\n你的第三种列表选项——图标网格显示——适用于需要在最小区域内呈现大量选项的情况。它提供一种直观的显示方式，可用于向用户展示选项。你还可以使用这种显示方式来替换上下文菜单中的标签，例如当用户长按以使用复制粘贴功能时。只需记住，始终要使可点击区域足够大以便于使用。\n\
  \n### 考虑 UI 替代方案\n\n在考虑可用性设计的同时，你还需要彻底重新思考网络应用的实际图形设计。这里你有几个选项，它们都是合理的。由于针对移动设备的界面设计有多种方向，你可以自行选择在多大程度上遵循这些指南。\n\
  \n### 模仿 iOS UI\n\n在开发网络应用时，模仿目标设备的原生图形用户界面是一个相当稳妥的选择。使用用户已经熟悉的视觉和感觉，可以加快他们的导航体验，并有助于他们对你的应用产生良好印象。你的目标是提供流畅的体验，因此让你的应用模仿\
  \ Apple 的整体界面，并使用 Apple 提供的精心设计的元素，似乎是一个显而易见的主意。\n\n模仿 iOS 的主要缺点是，如果在其他设备上查看，你的应用可能会显得格格不入。webOS\
  \ 或 Android 用户看到的网络应用，跟它在 iPhone 上看到的一样——但周围环境、内置功能甚至设备本身都不是 iPhone。\n\n最后，你完全有理由认为，即使\
  \ Apple 推荐模仿 iOS UI，但这并不十分个性化，最终可能会使你的应用不如那些功能相似但具有更易识别的身份的应用令人印象深刻。\n\n在不实际模仿原生界面的情况下，有时你也应该依赖它。iOS\
  \ 在表单 `<select>` 元素和弹出模式窗口方面具有特定的内置行为。如果偏离 Apple 的实现，这些通常很难以一种可用的方式呈现，尤其是因为用户应该清楚地在这些元素上执行操作时会发生什么。\n\
  \n有时你别无选择，只能依赖 iPhone UI。如果你想使用特殊的 URL 方案，如 `mailto:` 或 `tel:`，你将再次把控制权交给操作系统。当使用音频或视频播放器时也是如此，因为移动版\
  \ Safari 没有直接在 iPhone 和 iPod touch 上集成这些功能。\n\n### 构建 iPad 体验\n\niPad 是开发市场上的新成员。虽然它因其同样运行\
  \ iOS 而与 iPhone 和 iPod touch 共享图形用户界面，但你应该针对这款设备重新思考你的设计原则。iPad 很可能作为一款设备为用户带来全新的体验——你需要负责构建一个新的、与之相关的应用体验。\n\
  \niPad 的屏幕尺寸大致相当于上网本，并且分辨率高于 iPhone 和 iPod touch。然而，你不应该以笔记本电脑的思路来开发应用，或者简单地将 iPad\
  \ 视为一个更大的 iPhone。iPad 带来的功能显然不同于电脑和智能手机。\n\n#### 不是笔记本电脑，也不是 iPhone\n\n*下载自 Wow!\
  \ eBook <www.wowebook.com>*\n\n\n\niPad 的初始方向为竖屏模式，且没有滚动条。清晰体验的重要性与 iPhone 同样关键。仅仅因为你的应用程序拥有更多屏幕空间，绝不意味着你应该试图使用所有空间。始终将用户注意力集中在你的\
  \ Web 应用的一个目的上，并保持交互方式易于理解。通常情况下，遵循与 iPhone 开发相同的指南。\n\n再次强调，iPad 并非放大版的 iPhone。如果遵循\
  \ iPhone 的 UI 指南，你应在可能或必要之处进行调整。你可以保留对列表的偏好，但可能需要考虑让每个条目的内容量更完整。此外，你可能需要考虑，在 iPhone\
  \ 应用中使用两个视图的地方，你可以在 iPad 上将元素组合成一个视图（如果这样做是合适的），如图 5-13 所示。\n\n![图 5-13](img/index-133_1.jpg)\n\
  \n一种为 iPad 设计内容布局的有趣方式称为*split view*。其理念是，由于 iPad 拥有更大的屏幕，开发者可以以主从（master-detail）风格将主要焦点与辅助内容和更高级的功能分离开来。\n\
  \n在竖屏方向下，详情视图会全屏显示，而主视图则浮动在其上方；用户通过点击一个按钮，可以在可见与隐藏状态之间切换。在横屏方向下，你可以将应用的浮动框转变为侧边栏。这样做有显著优势，但不要忘记始终让用户自行选择。如果你认为应该建议用户使用横屏视图，甚至强制使用，那么你很可能正在设计一个糟糕的应用，或者一个并非真正\
  \ iPad 风格的应用。\n\n在 iPad 上，触摸依然是操作系统、应用及内容的理想交互方式。这一点非常重要，因为它强烈影响着用户如何使用和感知你的页面与应用程序。由于屏幕尺寸允许你以更高细节更轻松地模仿现实生活中的元素，你可以依靠全新的逼真度，使你的应用更易于理解和使用。看看`iBooks`（图\
  \ 5-14），它充分利用了图书馆的隐喻。该应用程序非常直观，因为它能引导用户取阅一本书。\n\n![图 5-14](img/index-134_1.jpg)\n\
  \n由于你拥有更多可用空间，空间内的交互不再局限于垂直移动，并且这类操作也变得更轻松，仅仅是因为用户对自己所做的事情将有更清晰的视野。首批在 iPad 上推出的应用包括阅读书籍、更新日历，甚至进行文字处理。这些都是桌面活动（我们说的是一个合适的、木质书桌的桌面），被移植到了一个更清洁、更移动化的生活中。这强烈暗示着，你应当允许用户在使用过程中获得类似的物理感受。\n\
  \n![图 5-15](img/index-135_1.jpg)\n\n**为 iPad 创建界面**\n\n如果你打算在应用设计中广泛使用*split view*（图\
  \ 5-15），你应该再次认真考虑构建一个可复用的模板，以加快开发流程。构建*split view*在多个方面可能会有些棘手。\n\n图 5-15. 邮件应用的经典*split\
  \ view*视图\n\n首先，你需要专门针对 iPad 进行目标适配——显然，*split view*在 320x480 像素的屏幕上会失效。这可以通过使用\
  \ CSS 的`@media`规则来实现，如下所示：\n\n```css\n@media only screen and (min-device-width:640px)\
  \ { ... }\n```\n\n这意味着我们只针对最小宽度为 640px 的屏幕设备。这意味着你可以将以下代码放入你的主样式表中：\n\n```css\n\
  @media only screen and (min-device-width:640px) {\n\nbody {\n\nbackground: #e1e4e9;\n\
  \n}\n```\n\n\n```css\n.header-wrapper {\n  color: #727880;\n  text-shadow: rgba(255,255,255,0.7)\
  \ 0 1px 0;\n  border-top-color: #fff;\n  border-bottom-color: #3e4149;\n  background:\
  \ -webkit-gradient(linear, left top, left bottom, from(#f4f5f7), to(#a8adb8));\n\
  \  -webkit-background-size: 100%;\n}\n\n.group-wrapper p,\n.group-wrapper ul {\n\
  \  -webkit-box-shadow: 0 1px 0 #fff;\n  border-color: #b2b5b9;\n}\n```\n\n"
- "# 第 5 章：用户体验与界面指南\n\n目前，你只是改变了页眉的颜色，使其与 iPad 的配色方案相匹配。不过，完全没必要无意义地重载你的 iPhone 样式表，因为当你的网页应用在\
  \ iPad 或桌面浏览器上使用时，你也可以加载一个不同的、特定的文件。这可以通过在`<link>`标签的`media`属性中指定设备宽度来实现：\n\n```html\n\
  <link rel=\"stylesheet\" href=\"styles/big.css\"\nmedia=\"only screen and (min-device-width:640px)\"\
  >\n```\n\n这样一来，如果用户使用的是 iPhone，就不会加载任何内容，但你可以为更大的设备添加合适的样式。将上述代码添加到你的模板`styles`目录下的一个名为`big.css`的文件中。\n\
  \n现在你有了针对 iPad 的特定样式表，让我们在其中添加一些代码，以实现之前提到的分屏视图。你将按照原生 iPad 已安装应用程序的实现方式来应用它。请注意，在横屏模式下，两列的高度必须相同，这一点很重要。因此，你对主视图和辅助视图使用了`table`和`table-cell`的显示属性值，这避免了使用\
  \ JavaScript 或利用背景图片的视觉假象，那些方式对渲染引擎负担更重、加载时间更长，而且整体上不够优雅且难以维护。\n\n```css\n.split-view\
  \ {\n  display: table;\n  width: 100%;\n  height: 100%;\n}\n\n.split-view .view\
  \ {\n  display: table-cell !important;\n}\n\n.split-view .view:first-child {\n \
  \ border-right: solid 1px black;\n  width: 320px;\n}\n```\n\n你的标记代码将会像这样简单：\n\n\
  ```html\n<div class=\"split-view\">\n  <div class=\"view\">\n    第 5 章：用户体验与界面指南\n\
  \    ...\n  </div>\n  <div class=\"view\">\n    ...\n  </div>\n</div>\n```\n\n现在，只需别忘了在你的主样式表中添加以下代码，以向\
  \ iPhone 用户隐藏辅助内容：\n\n```css\n.split-view .view:first-child {\n  display: none;\n\
  }\n```\n\n这不会在 iPad 上生效，因为你之前已经在`display:table-cell`规则上指定了`!important`。`!important`声明会覆盖样式表或内联样式中的所有其他规则。\n\
  \n### 勇于创新\n\n你现在已经具备了高效构建 iPhone 和 iPad 应用的知识和工具。一个摆脱默认设置的简单起点是：保持整体布局不变（你已经理解了所呈现的布局选择如何对网页应用的可用性产生积极影响），然后调整应用的颜色方案。iOS\
  \ 的默认颜色虽然独特，但有时会显得有点冷冰冰。其相关性也取决于你的目标用户群体。例如，灰蓝配色方案可能会让青少年用户感到乏味。\n\n一个简单又有趣的配色方案尝试方法是访问网站[`kuler.adobe.com/`](http://kuler.adobe.com/)。在那里，你可以从众多用户提交的主题中选择，或者创建自己的主题。你的想法是轻松生成符合苹果设计初期精神的配色组合。你也可以去那里了解当前流行的配色方案，或者寻找灵感。\n\
  \n当然，为你的网页应用寻找原创设计方法的最佳途径，就是尽可能多地实际使用你的目标设备。不仅是作为开发者，还要作为用户去深入了解它们，这将极大地帮助你理解什么“管用”，什么不管用。\n\
  \n模仿目标操作系统的用户界面是一个良好的开端，可以让你的应用更容易被用户接受。即使是懒惰的用户也应该能轻松适应他们熟悉的环境。因此，你的应用界面应该在现有基础上进行精心设计和直观构建。\n\
  \n尽管如此，你还应该经常能从日常生活中找到好的灵感。你喜欢整理文件来让自己井井有条吗？你需要一幅能让自己在良好状态下工作的宁静风景画吗？找到将这些体验移植到你的应用中的方法。很可能你不是唯一有这种需求的人，这种创新就能区分“好”与“优秀”。为了提供不同的体验，在简洁清晰的\
  \ iOS 界面基础上进行构建，创造出美丽而新颖的环境。\n\n## 第 5 章：用户体验与界面指南 — 总结\n\n为移动设备进行开发并不容易。你必须摒弃许多在传统\
  \ Web 上占主导地位的原则和习惯，才能打造出成功的网页应用。所有基于 iOS 的设备都为你的应用（从而也为用户）提供了出色的标准支持、简洁的界面和精巧的功能。\n\
  \n然而，这同时也伴随着一系列约束。你必须极为小心，不要让用户失望，始终为他们带来尽可能最佳的体验，并考虑到他们已习惯的标准。\n\n要从根本上思考你的设计流程，但不要忘记你从以往开发中学到的东西。你拥有大量可用的工具，因此要充分利用它们，创造相关且独特的体验。在接下来的章节中，我们将更详细地探讨利用\
  \ WebKit 和 iOS 技术可以实现哪些功能。\n\n---\n\n## 第 6 章：用于网页应用用户界面的有趣 CSS 特性\n\nHTML5 在文档语义方面比该语言的先前版本走得更远。然而，如果你从事前端开发已有一段时间，你一定意识到，吸引人的设计往往意味着艰难的选择和多余的标记。在本章中，我们将介绍大量\
  \ CSS 特性，它们将使你的网页应用开发过程更快、更丰富、更清晰。有些特性使得期待已久的增强功能变得轻松且易于维护，而另一些则更为复杂，但将为你的网页应用在\
  \ Mobile Safari 上开启全新的布局和设计可能性。\n\n请注意，本章讲解的许多特性要么相当新颖且被认为不稳定，要么是 WebKit 特有的，因此都带有\
  \ WebKit 专有的`-webkit-`前缀。这对于属性值可能是必需的，并且对于我们即将解释的大多数属性都是必需的。作为一种良好实践，你应该始终先声明 WebKit\
  \ 特定的规则，然后声明标准的、不带前缀的规则，以实现最大的向前兼容性。\n\n请牢记这一切，然后深入探索 Mobile Safari 为你提供的这些新奇迹。\n\
  \n### 用 CSS 提升用户体验\n\n在介绍 CSS3 规范带来的一些 CSS“甜点”以及其他一些常因浏览器兼容性而被牺牲的特性之前，让我们先了解一些 Mobile\
  \ Safari 特有的 CSS 特性。虽然本章将要展示的 CSS 优秀特性将帮助你增强和细化对页面布局和设计的控制，但你的目标是一个特定的操作系统和浏览器，它们两者都具有强大的用户界面，并为用户创造了习惯和期望。我们将首先介绍的\
  \ Mobile Safari 功能，将让你构建的应用能更好地集成到用户设备中，从而提升他们的用户体验。\n\n#### 用户反馈\n\n在用户与界面交互如此紧密的设备上，用户的操作能在你的网页应用中触发视觉反馈至关重要，正如我们在第\
  \ 5 章中解释的那样。\n\n\n\nMobile Safari 初始实现的交互状态基于 `-webkit-tap-highlight-color` 属性，该属性定义了一个覆盖框的颜色，用于在用户操作时高亮视口中的可点击区域。例如，在任何被点击的链接上都能看到这种效果。以下规则会在用户触摸可点击元素时使这些区域变暗（图\
  \ 6-1）：\n\n```\na { -webkit-tap-highlight-color: rgba(0, 0, 0, 0.5); }\n```\n\n\
  图 6-1. 使用自定义高亮颜色的被触摸元素\n\n你可能一直以为 Mobile Safari 中没有其他“已点击”状态。这并非完全正确。不过，需要一点小技巧才能通过\
  \ CSS 的 `:active` 和 `:hover` 伪类来访问这个属性。\n\n许多人推荐使用多点触控中与 `mouseover` 和 `mouseout`\
  \ 对应的 `touchstart` 和 `touchend`，通过事件处理器添加和移除特定类来实现。这种方法确实有效，但使用起来有些笨重且繁琐，尤其是有一种更简单的方式可以实现同样效果。\n\
  \n你可以通过在 `window` 上添加事件处理器来激活这些对应状态，即使不为此处理器添加任何功能，它也能生效并触发所需行为。因此，将以下代码添加到我们 Web\
  \ 应用模板的 `main.js` 文件中，就能为 `main.css` 文件添加后续规则，如图 6-2 所示：\n\n```\n/* main.js */\n\
  document.addEventListener(\"touchstart\", new Function(), false);\n```\n\n```\n\
  /* main.css */\n.group-wrapper ul li a {\n  ...\n  -webkit-tap-highlight-color:\
  \ transparent;\n}\n\n.group-wrapper ul li a:active {\n  color: #fff;\n  background:\
  \ #015de6 -webkit-gradient(linear, left top, left bottom, from(rgba(255, 255, 255,\
  \ .25)), to(transparent));\n}\n\n.group-wrapper ul li a:active * {\n  color: #fff;\n\
  }\n```\n\n图 6-2. 犹如原生 iPhone 菜单\n\n同样，我们设计这些样式时使其易于调整。这里只需改变背景颜色，就能调整按钮外观，而无需修改渐变效果。\n\
  \n#### 禁用复制/粘贴功能\n\n用户可以轻松地对页面元素执行长按操作，这会触发复制/粘贴功能，并显示一个影响体验的丑陋框体，如图 6-3 所示。\n\n\
  图 6-3. 长按可能触发复制/粘贴功能\n\n当不需要此行为，或希望为此操作添加自定义功能时，可以禁用它。仅需使用 CSS 的 `-webkit-user-select`\
  \ 属性即可实现。该属性可取值 `auto`（允许选择）、`text`（仅允许用户选择文本），或 `none`（完全禁用选择）。\n\n不过，务必注意不要让可用性下降，例如禁止选择文本字段。以下代码使用通用选择器为你处理了这一问题：\n\
  \n```\n*:not(input):not(textarea):not(select),\ninput[type=image],\ninput[type=file],\n\
  input[type=submit],\ninput[type=button],\ninput[type=reset] {\n  -webkit-user-select:\
  \ none;\n}\n```\n\n这将阻止除文本输入框（涵盖所有新输入类型）之外的所有元素被选中，使你的 Web 应用体验更接近原生 Mobile Safari\
  \ 应用。\n\n#### 控制弹出菜单\n\n在链接上触摸并长按会触发如图 6-4 所示的菜单。如果你的 Web 应用已设计得类似原生应用，你可能不希望、不需要或用户预期中不存在此行为。\n\
  \n图 6-4. 触摸并长按链接或图片等元素可能触发选项弹出菜单\n\n幸运的是，同样只需简单的 CSS，通过设置 `-webkit-touch-callout`\
  \ 属性即可禁用它。\n\n\n\n将`callout`属性设置为`none`。与上一个属性一样，请考虑用户可能期望该功能的情况，以避免造成困扰。\n\n```\n\
  body {\n  ...\n  -webkit-touch-callout: none;\n}\n```\n\n为文档的`body`元素添加此规则，足以全局禁用所有元素的该行为。\n\
  \n### 选择器\n\n在深入了解 CSS3 布局和样式特性的神奇之处之前，我们认为有必要花些时间来介绍现代浏览器中编写 CSS 最令人兴奋的方面之一：选择器。的确，如果你过去只习惯使用\
  \ ID、类和后代选择器来定位元素，那么你错过了大部分乐趣。WebKit 浏览器实现了所有 CSS1 和 CSS2 选择器，以及 CSS3 引入的大多数选择器。\n\
  \n> **注意**：此处讨论的所有选择器都可以在 WebKit 的 Web 检查器（位于“开发”菜单下）的搜索字段中使用，这在你的开发过程中会非常有用。\n\n\
  这让你几乎完全掌控想要定位的元素，而无需为太多标签添加额外的标识符。CSS 选择器允许你在文档结构中精确移动，仅选择具有特定特征的元素。\n\n#### 可用\
  \ CSS 选择器概述\n\n随着 CSS3 的推出，可用选择器的数量变得相当可观，但我们将只深入探讨那些看起来更复杂的选择器。你可以在规范页面找到完整列表及每个选择器的描述，网址是：[www.w3.org/TR/css3-selectors/#selectors](http://www.w3.org/TR/css3-selectors/#selectors)。\n\
  \n你会看到，那里列出的大多数选择器要么是已知的，要么是显而易见的。你可能会注意到一些有趣的新成员，它们允许进行否定选择或仅匹配属性的部分内容。在第 9 章中，我们还将使用功能非常强大的`:target`，它可以省去不少\
  \ JavaScript 代码。\n\n然而，其他一些选择器虽然有用，但可能不那么直观。以下是对这些选择器的一些说明和解释。\n\n首先，伪元素现在通过使用双冒号标记（`::`）而不是单冒号来与伪类区分。这看起来很琐碎，但\
  \ CSS2 并没有做出这种区分。这对选择器的本质有意义：伪元素不属于文档树。通常它们属于文档文本内容，无法通过文档语言正常访问；而伪类旨在根据元素在 DOM\
  \ 中的位置进一步识别它们。\n\n其次，你应该注意空格，因为一个“空选择器”可以匹配任何元素。\n\n```css\n/* 2 个等效定义...（带空格） */\n\
  p ::first-letter { ... }\np *::first-letter { ... }\n\n/* ...但不同于 */\np::first-letter\
  \ { ... }\n```\n\n接下来，请注意你可以链式使用选择器。例如，你可能想在所有文章的末尾添加一个视觉标记。假设`<div>`的最后一个子元素是一个段落元素，可以按如下方式实现：\n\
  \n```css\ndiv p:last-child::after {\n  content: \"The End\";\n  font-weight: bold;\n\
  }\n```\n\n这可能会相当复杂，因为实际上，你可以精确到几乎无极限，正如以下示例所示：\n\n```css\na.class1.class2:not(#id1):first-child:hover\
  \ {\n  color: red;\n}\n```\n\n这里，我们定位任何同时具有`class1`和`class2`类、但不具有`id1`ID、且是父元素的第一个子元素的锚点，以对其悬停状态应用特定颜色。\n\
  \n#### 位置相关选择器：结构伪类\n\n你可能已经习惯了使用`:first-child`和`:last-child`选择器。如果是这样，你大概知道它们可能会令人沮丧，原因有二。\n\
  \n第一个限制是，显然，它们只允许你分别定位第一个和最后一个子元素。然而，常常需要为元素的倒数第二个子元素、每隔一个元素，或某个类型的第一个子元素应用不同的样式。\n\
  \n\n\n第二个原因是，这两个选择器都具有模糊性：`p:first-child`并非直接选中第一个`<p>`元素，而是选中父元素中的第一个子元素，如果该子元素恰好是`<p>`类型。因此，在以下代码中，没有任何段落会被应用不同的样式：\n\
  \n```html\n<style>\ndiv p:first-child {\n  font-weight: bolder;\n}\n</style>\n\n\
  <div>\n  <h1>Some Title</h1>\n  <p>First paragraph, but not first element: will\
  \ not be bold text.</p>\n  <p>Second paragraph.</p>\n</div>\n```\n\n"
- "# 第 6 章：为 Web 应用用户界面设计的实用 CSS 特性\n\n上述所有限制都在 CSS3 中得到了解决。不过，这些新选择器的语法需要一些说明。我们将要探讨的选择器包括那些涉及在\
  \ DOM 树中计数的元素：`:nth-child()`、`:nth-last-child()`、`:nth-of-type()`和`:nth-last-of-type()`。\n\
  \n所有这些选择器都共享一种特殊的语法，其中目标元素的计数可以用一个单独的数字来表示（仅选中第`n`个子元素），或者用符合`xn+y`模式的表达式来表示。如果`xn`和`y`等于\
  \ 0，则可以省略，但两者中必须有一个不为 0。另外，`y`可以取负值。以下是一个应用示例：\n\n```html\n<style>\n/* 这里不会有重复，等同于\
  \ nth-child(3) */\nul li:nth-child(0n+3) {\n  font-weight: bolder;\n}\n\nul li:nth-child(2n)\
  \ {\n  /* 每隔一行会被影响 */\n  color: red;\n}\n</style>\n\n<ul>\n  <li>Item</li>\n  <li>Red\
  \ Item</li>\n  <li>Bolder Item</li>\n  <li>Red Item</li>\n  <li>Item</li>\n  <li>Red\
  \ Item</li>\n</ul>\n```\n\n`xn`始终代表表达式中的变量增量部分，而`+`号后面的数字则表示增量应该开始的起始位置。当变量设置为`0n`时，你只针对一个元素，正如我们第一个例子所示。\n\
  \n因此，表达式`ul li:nth-child(1n+3)`会选中所有从父元素的第三个子元素开始的`<li>`元素。使用`nth-child(4n+1)`则会选中从第一个子元素开始计数的每第四个元素（即第\
  \ 1、5、9、13...个）。\n\n对于`:nth-last-child()`，语法是相同的，不同之处在于`n`是一个递减因子。`:nth-last-child(2n+0)`会选中从结尾开始计数的所有偶数元素。还要注意，无论是正向计数还是反向计数，`+y`都可以是`-y`，例如`(3n-1)`。\n\
  \n理解这种语法为你提供了丰富的可能性，可以设计重复性的布局模式，或者在不借助额外标记的情况下定位特定元素。还要注意，所有这些选择器都可以将`odd`和`even`关键字作为参数。因此，以下两条规则是相同的：\n\
  \n```css\nsection div:nth-child(2n+0)::after { content: \"even\"; }\nsection div:nth-child(even)::after\
  \ { content: \"even\"; }\n```\n\n以下两条规则也是相同的：\n\n```css\nsection div:nth-child(2n+1)::after\
  \ { content: \"odd\"; }\nsection div:nth-child(odd)::after { content: \"odd\"; }\n\
  ```\n\n另一方面，前面的例子可能不一定与下面的例子相同，因为起始点不同：\n\n```css\nsection div:nth-last-child(2n+0)::after\
  \ { content: \"odd or even\"; }\nsection div:nth-last-child(even)::after { content:\
  \ \"odd or even\"; }\n```\n\n最后，请注意，这些选择器作为参数所接受的表达式不应包含空白字符。以下是无效的，会被忽略：\n\n```css\n\
  ul li:nth-child(0n + 3) { font-weight: bolder; }\n```\n\n如我们所说，这些全局子元素选择器会搜索一个容器内的所有子元素，无论其类型如何。正如我们第一个例子所示，仅针对特定类型的子元素通常更可取。以下是修改后能按预期工作的版本：\n\
  \n```html\n<style>\ndiv p:first-of-type {\n  font-weight: bolder;\n}\n</style>\n\
  \n<div>\n  <h1>Some Title</h1>\n  <p>First paragraph now bolder!</p>\n  <p>Second\
  \ paragraph.</p>\n</div>\n```\n\n因此，你可以完全掌控元素的选中。\n\n### 背景的高级处理\n\n尽管以前的 CSS 版本所提供的可能性已经实现了许多令人鼓舞的设计，但它们通常使得设置背景的任务变得困难。\n\
  \n\n\n从设计师的角度来看，CSS2 的背景定义功能只能算是个粗略的方案。尽管如此，随着设计日趋复杂和丰富，并融入了更多页面元素，背景如今被广泛使用。\n\n\
  此外，背景被应用在比以往更错综复杂的结构上。因此，开发者需要更精确地显示背景。\n\nCSS3 提供了一组新的背景属性，使得以往棘手且繁琐的任务变得更加简单高效。更好的定位方式以及多层背景都成为了可能。我们将介绍那些目前被\
  \ Mobile Safari 支持的属性。\n\n## 第 6 章：面向 Web 应用用户界面的实用 CSS 特性\n\n**注意：** 许多 CSS3 特性暂时需要\
  \ `-webkit-` 前缀。这允许你更早地实现新规范，但也意味着这些规则将来会被替换并消失。\n\n因此，在你的样式表中，你应该始终先声明带 `-webkit-`\
  \ 前缀的规则，紧接着声明应该使用的、不带前缀的标准规则，以避免在未来的版本不支持这个“草案”实现时出现意外。此外，因为最终实现可能会更好（无论是速度更快还是更简洁），你肯定希望一旦它准备就绪，就应用它而不是草案。因此，标准规则应该声明为第二个。\n\
  \n### 背景的原点\n\n定义背景时，它通常应用于一个带有内边距、边框和外边距的盒子。背景颜色会从边框的外边缘延伸到盒子的中心，而背景图像则相对于边框的内边缘进行定位。\n\
  \n这可以通过 CSS3 的 `background-origin` 属性进行微调，该属性在某种程度上扩展了 `background-position`，允许你指定用于定位的原点。通过几个例子可以更清楚地理解这一点：\n\
  \n```css\n<style>\ndiv {\n  float: left;\n  border: dashed 10px #000;\n  background-color:\
  \ #ccc;\n  padding: 20px;\n  width: 240px;\n  height: 240px;\n  margin: 20px;\n\
  \  background-position: bottom right;\n  background-repeat: no-repeat;\n  background-image:\
  \ url(images/flower.jpg);\n}\ndiv:nth-of-type(1) {\n  -webkit-background-origin:\
  \ border-box;\n}\ndiv:nth-of-type(2) {\n  -webkit-background-origin: padding-box;\
  \ /* default */\n}\ndiv:nth-of-type(3) {\n  -webkit-background-origin: content-box;\n\
  }\n</style>\n```\n\n```html\n<!-- Our 3 boxes -->\n<div></div>\n<div></div>\n<div></div>\n\
  ```\n\n![](img/index-148_1.png)\n\n## 第 6 章：面向 Web 应用用户界面的实用 CSS 特性\n\n在这个例子中，我们创建了三个尺寸相同、背景颜色和背景图像都相同的盒子。唯一的区别是\
  \ `background-origin` 属性的值。你可以在图 6-5 中查看它们的行为。\n\n这些值决定了背景图像是相对于整个盒子（包含边框）、相对于带有内边距的盒子、还是仅相对于实际内容区域进行放置。该属性的默认值是\
  \ `padding-box`，也就是中间的图示。\n\n**图 6-5.** 背景的三种可能原点，分别是边框、内边距（默认）以及盒子的内容区域\n\n当然，你可能会认为这用\
  \ CSS 2.1 属性也能实现——你可以考虑边框和内边距的宽度来确定背景的位置。但这显然有严重的局限性。\n\n例如，你无法让图像移动到边框区域内，即使设置负值使其从内边距区域移回边框也无法做到。此外，为\
  \ `background-position` 等样式定义固定值通常会导致代码的可重用性降低以及相似规则的数量倍增，因为必须根据每个独立块的大小来更新这些值。使用\
  \ `background-origin` 属性不仅能给你更多的可能性，还能让你编写更全局化的样式，从而写出更少但更高效的代码。\n\n### 全局背景裁剪\n\
  \n\n\n#### 上一节中解释的设计优势同样适用于下一个属性 `background-clip`。虽然背景的“原点”仅影响背景图像，但 `background-clip`\
  \ 属性允许你通过定义背景绘制区域，为所有背景元素（即图像和颜色）设定规则。\n\n我们几乎可以直接沿用上一个示例，只需在样式中将 `origin` 替换为 `clip`——因为此属性与\
  \ `background-origin` 的属性值相同。\n\n```css\n<style>\ndiv {\n    ...\n    background-position:\
  \ bottom right;\n    background-repeat: no-repeat;\n    background-image: url(images/flower.jpg);\n\
  \    -webkit-background-origin: border-box;\n}\ndiv:nth-of-type(1) {\n    -webkit-background-clip:\
  \ border-box; /* 默认值 */\n}\ndiv:nth-of-type(2) {\n    -webkit-background-clip: padding-box;\n\
  }\ndiv:nth-of-type(3) {\n    -webkit-background-clip: content-box;\n}\n</style>\n\
  ```\n\n这会产生如图 6–6 所示的效果。\n\n**图 6–6.** 背景剪裁的三种可能状态：从边框外边缘开始（默认），然后排除边框，再排除内边距（从内容区域内部开始）\n\
  \n默认行为是将背景颜色延伸到盒子的边框内部。其他值则表现为与背景原点类似，只是也包含了背景颜色。\n\n然而，在使用 `background-clip` 属性的\
  \ `content-box` 值时需谨慎：WebKit 已按照 CSS3 规范的早期版本实现了该值。但由于此值已从规范中移除，你应尽可能优先将 `background-clip`\
  \ 与其他两个值之一结合使用以达到预期效果，以防该值从浏览器中被移除。对于 `background-clip` 属性而言，`padding-box` 值可能最有价值，因为它允许使用图像或透明度来丰富边框的样式——我们很快会看到这一点。\n\
  \n### 基于文本的背景剪裁\n\nWebKit 还提供了使用 `text` 值根据容器中的文本来剪裁背景的可能性，如图 6–7 所示。\n\n```css\n\
  <style>\ndiv {\n    background-image:\n    -webkit-gradient(linear,\n    left top,\n\
  \    left bottom,\n    from(yellow), to(red));\n    -webkit-background-clip: text;\n\
  \    color: transparent;\n}\n</style>\n<div>Background Clip</div>\n```\n\n**图 6–7.**\
  \ 无图像文本以渐变形式呈现\n\n如代码所示，文本颜色需要设置为 `transparent`，以便容器背景能够透显出来。这样做的问题是，不支持此背景值的浏览器版本将几乎不显示任何文本。幸运的是，你可以使用一个仅受支持该背景属性值的\
  \ WebKit 特定属性 `-webkit-text-fill-color` 来解决这个问题。\n\n你可以这样使用它：\n\n```css\n-webkit-text-fill-color:\
  \ transparent;\ncolor: red;\n```\n\n这样一来，不支持这些新属性的浏览器将显示红色文本，而最新版本的 Mobile Safari\
  \ 仍会以渐变形式呈现文本。\n\n### 背景尺寸调整\n\n你可能曾经诅咒过 CSS2 背景的另一个缺陷：背景图像无法像真正的 HTML 图像那样调整大小。CSS3\
  \ 通过 `background-size` 属性（以 `-webkit-` 为前缀）为这个恼人的问题带来了一个易于使用的解决方案。\n\n我们很快就会看到如何利用这一新功能，将\
  \ Photos 原生应用的吸引力带到你的 Web 应用中。Photos 应用在视觉上吸引人的一个方面是，所有图片都以相同格式和排列的缩略图规则网格呈现——大小相同的小方块，如图\
  \ 6–8 所示。这产生了一致的布局，同时不会损害图片质量，因为所有图片都被缩放或裁剪以适应这种格式。\n\n\n\n"
- "# 第 6 章：为 Web 应用界面增添趣味的 CSS 特性\n\n`图 6-8`：照片应用呈现均匀的画廊效果，所有图片均采用相同的显示尺寸\n\n在开发原生应用时，您可以使用\
  \ Cocoa Touch 框架中的 `UIImageView` 对象，通过使用适应比例、填充缩放或填充比例等参数（如图 6-9 所示），让图片适应任意容器尺寸。现在我们将利用全新的\
  \ CSS 特性来实现高度相似的设计。Mobile Safari 的缩放算法表现优异，因此您可以获得出色的效果。\n\n`图 6-9`：现在只需为容器应用样式，即可实现适应比例、填充缩放和填充比例模式\n\
  \n`background-size` 属性接受两个值：水平值和垂直值。当然，您也可以只指定一个值，该值将同时应用于两个方向。您可以使用常用的 CSS 单位来赋值；但在本例中，百分比是最佳选择，因为它能让代码更易于重用。\n\
  \n最直接的值是填充缩放，这样您无需了解图片的横纵比。图片将被缩放以填满可用空间，并可能适当地拉伸或压缩：\n\n```css\n/* 填充缩放 */\n-webkit-background-size:\
  \ 100%;\n```\n\n`background-size` 属性的其他值要求您了解图片的方向。要实现填充比例效果，您应将图片较窄的一边设为 100%，另一边设为\
  \ `auto`。这意味着竖版图片将在垂直方向上裁剪，横版图片则在水平方向上裁剪。\n\n```css\n/* 横版图片的填充比例... */\n-webkit-background-size:\
  \ auto 100%;\n\n/* ...以及竖版图片 */\n-webkit-background-size: 100% auto;\n```\n\n将这两个值互换则会产生适应比例缩放的效果，即整张图片会显示在指定区域内，但在垂直或水平方向留下空白区域。\n\
  \n同时明确指定两个值将强制改变图片缩放后的尺寸。\n\n> **警告：** 请注意，图片高度不要超过容器的两倍。Mobile Safari 在处理这种情况时存在一个\
  \ Bug，会导致图片被裁剪。避免此问题的唯一方法是使用更小的图片。\n\nCSS3 规范提供了轻松实现预期效果的值。然而，`contain` 和 `cover`\
  \ 这两个值在 iOS 3.2 版本中并不支持。\n\n### 开发类似照片应用的照片墙\n\n在本节中，我们将通过一个实例展示这些新 CSS 属性和值所提供的可能性，即利用它们重现之前展示的照片应用中的照片墙外观。这种照片墙之所以高效且吸引人，其中一个特点是不论图片的原始格式如何，它们都能完美地适配到分配给它们的方形区域中。\n\
  \n与往常一样，我们将在 Komodo Edit 项目中已有的目录结构基础上进行构建。首先，您需要在项目中添加一个名为 `images` 的新物理文件夹，用于存储照片墙中的所有图片。\n\
  \n在 Komodo Edit 中，转到 **项目** ➤ **添加** ➤ **新建活动文件夹**，然后点击相应的图标创建一个名为 `images` 的新目录，并选择它。\n\
  \n接下来，由于我们将使用 PHP 来读取 `images` 文件夹的内容，并将其中图片的引用动态添加到一些 JavaScript 代码中，因此您需要将 `index.html`\
  \ 文件重命名为 `index.php`。文件内容应如下所示：\n\n```php\n<?php require_once(\"index_code.php\"\
  ); ?>\n\n<!DOCTYPE html>\n<html>\n<head>\n  <title>照片墙演示</title>\n  ...\n  <link\
  \ rel=\"stylesheet\" href=\"styles/main.css\">\n  <link rel=\"stylesheet\" href=\"\
  styles/gallery.css\">\n  ...\n  <script src=\"scripts/main.js\"></script>\n  <script>\n\
  \    var images = <?php writeImages('images'); ?>;\n  </script>\n  <script src=\"\
  scripts/gallery.js\"></script>\n</head>\n<body onload=\"showImages()\">\n  ...\n\
  \  <h1>照片墙</h1>\n  ...\n  <div id=\"gallery\"></div>\n</body>\n</html>\n```\n\n\
  然后，在与 `index.php` 相同的目录下创建一个 `index_code.php` 文件。该文件将包含照片墙运行所需的函数。换句话说，它允许您从 `images`\
  \ 文件夹中收集图片列表。文件内容如下：\n\n```php\n<?php\n#### 解析指定文件夹并返回收集到的文件数组\nfunction getImages($path)\
  \ {\n  $handle = opendir($path);\n  $files = array();\n  if ($handle) {\n    while\
  \ (($name = readdir($handle)) !== false) {\n      if (is_file(\"$path/$name\"))\
  \ {\n        $files[] = \"$path/$name\";\n      }\n    }\n  }\n  closedir($handle);\n\
  \  return $files;\n}\n?>\n```\n\n\n#### 将 PHP 数组转换为 JavaScript 数组\n\n```\nfunction\
  \ writeImages($path) {\n\n  $all = implode('\", \"', getImages($path));\n\n  echo\
  \ !$all ? '[]' : '[\"'. $all . '\"]';\n\n}\n\n?>\n```\n\n"
- "# 第 6 章：为 Web 应用界面增色的 CSS 特性\n\n现在，在你的 `styles` 文件夹中创建一个 `gallery.css` 文件，并在文档的\
  \ head 中链接它。你将使用以下样式：\n\n```\n.header-wrapper {\n\n  background-color: #444;\n\n\
  }\n\n.view {\n\n  background-color: #fff;\n\n}\n\ndiv#gallery {\n\n  padding: 2px;\n\
  \n  float: left;\n\n}\n\n#gallery > div {\n\n  border: solid 1px rgba(0,0,0,0.1);\n\
  \n  width: 75px;\n\n  height: 75px;\n\n  margin: 2px;\n\n  float: left;\n\n  -webkit-box-sizing:\
  \ border-box;\n\n  -webkit-background-size: 100%;\n\n  background-position: center\
  \ top;\n\n  background-repeat: no-repeat;\n\n  -webkit-background-origin: border-box;\n\
  \n}\n\n#gallery > div.portrait {\n\n  -webkit-background-size: 100% auto;\n\n}\n\
  \n#gallery > div.landscape {\n\n  -webkit-background-size: auto 100%;\n\n}\n```\n\
  \n这些样式确保了每张图片都能延伸到其容器的边框之内，从而使所有图片都具有完全正确的尺寸。此外，半透明的边框确保了整体外观的一致性，即使图片颜色较浅也是如此。\n\
  \n你可能已经注意到，由于不支持 `contain` 和 `cover` 值，我们必须根据图片是纵向还是横向来应用不同的规则。\n\n我们将使用以下 JavaScript\
  \ 代码（放入新的 `scripts/gallery.js` 文件中）来判断每张图片应该添加哪个类：\n\n```\nfunction showImages()\
