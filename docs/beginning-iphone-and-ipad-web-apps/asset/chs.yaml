  \ clip）添加到主屏幕。这使得 Web 应用能够像任何原生应用一样被快速访问，尤其是可以通过 Spotlight 搜索到。用户只需选择“添加到主屏幕”选项，并为快捷方式命名即可。之后，点击\
  \ Springboard 上的新图标，就会直接在 Mobile Safari 中打开你的 Web 应用。\n\n#### 展示一个合适的图标\n\n系统为用户主屏幕生成的默认图标是你的应用的屏幕截图，并会被调整大小以匹配页面上其他图标的尺寸。虽然系统会添加一点光泽使其看起来更像图标，但事实上，它并不吸引人，也不容易被识别（见图\
  \ 4-4）。你希望你的最终用户能够轻松找到你的 Web 应用，并且一眼就能认出来，即使它混杂在其他各种快捷方式中。\n\n**图 4-4.** 使用网页截图构建的默认图标……不太有吸引力\n\
  \n为了实现这一点，你必须为你的 Web 应用制作自己的图标。最好让它能让人联想到你的应用，例如使用相同的颜色、相似的形状等。它将被用于任何转换为 Web 剪辑的页面，就像传统\
