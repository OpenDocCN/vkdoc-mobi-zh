- "# 第一部分：Web 应用开发入门\n\n## 第 1 章：开发工具\n\n与原生 iPhone 应用程序开发不同，Web 应用程序开发不需要特定的集成开发环境（IDE）。只要你有一个可以保存纯文本的编辑器，就没问题。同样，前端\
  \ Web 开发者的主要工具——Web 浏览器——有各种形式，众所周知且易于获取。\n\n免费并不意味着可以粗心大意，在你的开发过程中，你会希望获得所有能得到的软件效用。第一章旨在帮助你建立一个高效的工作环境，同时确保我们从\
  \ iOS 冒险之旅的一开始就有共同的基础。\n\n### 源代码编辑器\n\n市面上有很多出色的编辑器——开源的、专有的，免费的、付费的，像点唱机一样漂亮的，或者直接运行在终端里的。从我们的角度来看，一个真正有用的编辑器至少应该支持语法高亮、自动补全以及某种代码片段工具。\n\
  \n#### 科莫多巨蜥\n\n如果你已经涉足 Web 开发，你很可能已经找到了你完美的代码伙伴。如果没有，我们建议你下载并安装 Komodo Edit，这是一个跨平台、免费且功能丰富的开源编辑器，基于\
  \ Mozilla 代码库构建，我们将在所有示例中使用它。\n\n**注意：** 你可以从 ActiveState 网站 `www.activestate.com/komodo-edit`\
  \ 下载适用于 Mac OS X、Windows 和 Linux 的 Komodo Edit。\n\n与 Mozilla 一样，Komodo Edit 是一项开放\
  \ Web 和开放标准倡议。开放 Web 旨在鼓励社区驱动的、开放且非专有的 Web 技术发展，以确保 Web 的生存力和开放演进。\n\n从 6.0 版本开始，Komodo\
  \ Edit 显着地立即支持 HTML5 和 CSS3 语法，包括对 `-webkit-` 专有前缀的支持。这些在本书中都将非常有用。\n\n#### 让自己舒适\n\
  \nKomodo Edit 功能如此丰富，以至于它本身几乎就像一个轻量级的 IDE。\n\n当你启动 Komodo Edit 时，它会向你提供恢复上次会话的选项；回答“否”将带你进入起始页（始终作为特殊标签页访问），如图\
  \ 1-1 所示。在那里，你会找到打开文件和执行各种操作的快速链接，并且 ActiveState 甚至为每个选项添加了示例来帮助你入门。你可以通过选择“视图 ➤\
  \ 标签页和侧边栏”菜单，然后选择“工具箱”来访问这些内置的“工具箱”面板。你还会注意到 Komodo Edit 的一个有趣优点：项目管理，它可以让你有序地组织项目中的所有元素。在第\
  \ 4 章中，我们将创建一个将在本书中使用的 Web 应用程序模板，而使用 Komodo Edit 是创建、存储和重用此模板的一种简单方法。\n\n另一个可以显著提高生产力的方面是\
  \ Komodo Edit 通过处理代码片段、模板甚至宏来增强代码和文件重用的能力。你可以直接通过右键单击一段代码，在上下文菜单中选择“添加为工具箱中的代码片段”来创建代码片段和模板，所以，放手去做吧——节省一些时间。\n\
  \n此外，如前所述，Komodo Edit 基于 Mozilla，这意味着它可以通过附加组件进行扩展。可以从“工具 ➤ 附加组件”菜单访问附加组件管理窗口。\n\
  \n你也可以查看社区网站和扩展部分，网址为 `http://community.activestate.com`。很可能你缺少的东西就在那里。我们不打算详细介绍\
  \ Komodo Edit，但它绝对值得一试。如果你尚未确定源代码编辑器，或者你希望偶尔改变一下工作习惯，请务必研究一下。更多文档可在其网站上找到。\n\n####\
  \ Dashcode 怎么样？\n\n你可能会想，“好吧，当我安装 Snow Leopard 时，它附带安装了 Xcode 和 Dashcode，那么为什么不直接用那个呢？”\
  \ 你是对的，因为苹果专门为此目的开发了这个软件（图 1-2）。\n\nDashcode 是一个很好的工具，可以生成小巧而漂亮的 Web 应用程序，并在视图之间实现漂亮的过渡。更重要的是，Dashcode\
  \ 大量使用模型-视图-控制器（MVC）范式来合理化和简化应用程序层之间的交互。尽管如此，它并不符合我们的需求。\n\n首先，它只能在运行 Mac OS X 的计算机上使用，将使用范围限制在拥有\
  \ Mac 的开发者；如今这些开发者仍然只占编码人员的一小部分。\n\n其次，它是可视化编程软件。你完全可以用 Dashcode 构建应用程序，而无需触及任何一行代码。这可能很方便，但这不是我们的重点。作为本书的读者和专业\
  \ Web 开发者，你需要完全控制你的代码，并且你想了解开发过程每个阶段正在发生的事情，以确保 Web 应用程序的质量。\n\n最后，就像 Dreamweaver\
  \ 和其他图形工具一样，它倾向于产生许多特定于框架的属性，使得整个代码的修改和维护变得繁琐，并且会生成太多不必要的标记和 JavaScript。在为 Web 开发时，特别是针对诸如移动浏览器这类内存有限的设备时，轻量级代码应该是首要考虑因素。\n\
  \n### 使用正确的浏览器\n\n为 Web 开发主要是为 Web 浏览器开发。尽管我们将专门针对 Mobile Safari（用于 iPhone、iPod\
  \ touch 和 iPad 的浏览器），但清楚地了解该领域的现状会有所帮助。此外，如果你已经是 Web 开发者，你可能习惯于主要使用特定浏览器来完成开发过程，而在桌面浏览器上开发通常比在移动设备上开发更高效。\n\
  \n#### WebKit\n\n为苹果设备开发时，你会一直把 Mobile Safari 放在心上。当然，你可以努力使你的应用程序跨浏览器兼容，但这可能意味着更多的代码甚至更少的功能。而且，正如你将要看到的，Mobile\
  \ Safari 并不是一个像最初看起来那样受限的目标。\n\nMobile Safari 和 Desktop Safari 都基于 WebKit 布局引擎。该引擎从设计之初就追求轻量化和标准兼容。WebKit\
  \ 不仅实现了最新的 W3C 候选推荐标准，还实现了带有 `-webkit-` 前缀的草案阶段特性。\n\nWebKit 引擎还附带了一整套开发者工具。我们将在第\
  \ 3 章详细介绍 WebKit 的 Web 检查器，你很快就会看到它在你的 Web 应用程序开发过程中会有多大帮助。\n\n**注意：** 开发 iPhone（或\
  \ iPod touch 或 iPad）Web 应用程序的最佳选择是在苹果平台上工作。但是，你可以轻松地在 Windows（无论是 XP、Vista 还是 7）上安装\
  \ Safari。作为 Safari 的替代方案，我们推荐基于 Chromium 项目的浏览器，例如 Google Chrome、Chromium 或 Iron。这三个浏览器都适用于\
  \ Mac OS、Windows 和 Linux。\n\nWebKit 被许多平台上的浏览器使用，包括移动设备。其中，你可能会对 SymbianOS、谷歌的 Android、ChromeOS、BlackBerry\
  \ 以及 Palm 最近的 webOS 感兴趣。你为苹果浏览器构建的大多数 Web 应用程序应该可以在其他移动设备上运行。\n\n#### Gecko 和 Firefox\n\
  \n浏览器市场的另一个重要参与者是 Firefox，一个基于 Gecko 引擎的开源项目。它对标准的遵守非常好，你可能会欣赏 Firefox 最强的优势之一：它的社区。它可以通过丰富的附加组件无限扩展，例如\
  \ Firebug，这是一个全面且可用的开发和调试工具。这使得 Firefox 成为为 Web 开发时的绝佳伴侣，其功能与 WebKit 类似。\n\n####\
  \ Opera\n\nOpera 也适用于所有操作系统。Opera 团队一直将速度和遵守标准放在首位，尽管其浏览器没有占据主要市场份额，但它是前面介绍的浏览器的绝佳替代品，也是开发者的不错选择。事实上，Opera\
  \ 自带了一套开发者工具——Dragonfly。Opera 也适用于移动设备（Opera Mini），但与 Mobile Safari 不同，它是浏览器的一个大幅精简版本，因此无法让你受益于桌面浏览器支持的所有标准。\n\
  \n#### 迷航的 Internet Explorer\n\n如果你是一个正在考虑 Internet Explorer 的 Windows 用户，恐怕我们不能推荐这个浏览器用于\
  \ Web 开发目的。尽管从版本 3 到 5（第一个主要实现 CSS 支持的浏览器，以及第一个提供当时未命名的 Ajax 功能的浏览器），它绝对是一个先进 Web\
  \ 浏览器，但它已经走上了一条偏离标准的道路，并且在第 8 版中仍然缺乏对许多特性的支持，例如 CSS 选择器和属性（即 CSS2 选择器和属性），在 Acid3\
  \ 测试中仅获得 20/100 的分数。Internet Explorer 9 似乎在这方面将有重大改进，但就目前而言，基于 Trident 的浏览器并不是一个选择。\n\
  \n### 从 Web 角度进行开发\n\nWeb 有标准，其中最重要的是万维网联盟（W3C）的规范。这些规范为你——开发者——提供了构建出色的基于 Web 的应用程序的工具。这就是为什么在开发\
  \ Web 应用程序时，你对 Web 浏览器的首要关注点是其对 W3C 的兼容性。你选择作为首要目标的浏览器越符合标准，你的页面在其他平台上的功能性就越强，你需要做的额外工作也就越少。\n\
  \n#### Acid...Acid...Acid\n\nWeb 标准项目是一个致力于推广和鼓励尊重和采用 Web 规范的组织。由于并非所有浏览器在这方面都做得一样好，它提供了一种工具来轻松检查布局引擎的跟进情况。该测试的最新版本称为\
  \ Acid3。\n\n**提示：** 要了解浏览器在该测试中的得分，只需访问 `http://acid3.acidtests.org`，几秒钟后你就会得到结果。\n\
  \nMobile Safari 以 100% 的兼容性通过了测试，这很好，因为这意味着可以使用许多方法来增强你的应用程序。如果你正在使用另一个浏览器进行开发，你应该记住，你可能会在无意中忽略\
  \ HTML、CSS 和 JavaScript 中一些非常有趣的特性。\n\n#### HTML5 一致性\n\n尽管 Acid3 测试是评估浏览器 CSS 标准兼容性的好方法，但它不能精确指示支持了哪些内容。不过，你可以使用测试页面\
  \ `http://html5test.com` 检查浏览器对 HTML5 特性的支持，并获得支持和不支持标准的详细表格。\n\n该测试页面将列出所有新的 API、扩展和\
  \ HTML5 特性，并指示所使用浏览器对这些特性的支持程度。Mobile Safari 在 300 分中获得了 125 分（以及 7 个奖励分）。虽然这看起来可能很低，但它实际上表明了对新标准的出色支持，尤其是对于移动浏览器而言。\n\
  \n要了解每个已实现特性的更多细节，列表中的每个元素都是一个链接，点击将直接带你到该规范的相关页面。\n\n#### 浏览器中的卫星\n\n现代前端开发（尤其是\
  \ Web 应用程序开发）的另一个核心部分是 JavaScript。我们将在大多数章节中大量使用 JavaScript，并在第 10 章介绍面向对象的 JavaScript\
  \ 编程。\n\n浏览器脚本引擎对 ECMA-262 规范（截至第 3 版）的符合性可以使用 Google 构建的 Sputnik 测试进行评估，该测试可从 `http://sputnik.googlelabs.com`\
  \ 获得。它是一个包含超过 5,000 个测试点的开源测试。Safari 获得了非常好的分数，仅次于 Opera，排名第二。\n\n### 针对 iOS 进行开发\n\
  \n尽管我们已经介绍了你可能需要的所有工具的跨平台选项，但你要针对 iOS 进行开发，以下软件虽然很有用，但只能在 Macintosh 系统上使用。如果你没有\
  \ Mac，请仍然继续阅读；尽管你无法使用下面部分描述的应用，但我们仍将介绍一些对你在开发冒险中有用的资源。\n\n#### 使用 iPhone 和 iPad\
  \ 模拟器\n\n在开发 Web 应用程序时，有许多理由让你不想使用 iPhone 设备。好消息是，一旦你注册成为苹果开发者，苹果就会提供一个免费的工具来实现你的需求。只需在\
  \ `http://developer.apple.com/ios` 注册。然后，下载并安装免费的 iOS 软件开发工具包（SDK），特别是其模拟器，如图 1-3\
  \ 所示。\n\n**注意：** 下载前，先喝杯茶。你需要下载近 3GB 的数据。安装完成后，iPhone 和 iPad 模拟器应用程序将隐藏在 `/Developer/Platforms/iPhoneSimulator.platform/Developer/Applications/`\
  \ 文件夹中。如果你不想每次工作前都疯狂地寻找它，请将其快捷方式拖到 Dock 或桌面！\n\n模拟器的主要好处是，你不需要实际拥有一个合适的设备来进行测试，也不必通过反复加载页面来耗尽电池电量。更重要的是，它不仅支持\
  \ iPhone 模拟，现在还使用真实版本的 Mobile Safari 模拟 iPad。它还允许你在不同版本的 OS 上运行测试，而无需经过漫长且烦人的设备重置过程。\n\
  \n这是你能在桌面上获得的最接近 iPhone 的体验。至于非 Mac 用户，我们只能建议你在真正的 iPhone、iPod touch 或 iPad 上双重测试所有代码，以正确了解实际设备的表现。\n\
  \n#### 无论如何使用真实设备\n\n使用模拟器，你会获得较少的功能，只够满足开发的最低要求。请记住，模拟器使用你的台式计算机资源，性能可能比在设备上更好。因此，过渡和高级视觉效果或多媒体内容（在第\
  \ 8 章和第 9 章中介绍）应始终在目标产品上进行系统测试。\n\n此外，由于屏幕尺寸确实有影响，你应该始终检查所有文本和元素（例如按钮）是否可读和可用，以免损害\
  \ Web 应用程序的用户体验。\n\n#### ADC 是你的朋友\n\n无论你是否拥有 Mac 来安装模拟器，注册始终是个好主意。苹果开发者连接（ADC）是一个资源丰富的地方，可以浏览并找到帮助。成为注册开发者将使你获得技巧、屏幕录像、访谈等更多资源。如果你从与你无关的信息（即关于原生\
  \ iOS 应用程序开发的信息）中找出路，你会发现苹果自己的信息可能非常有用。最好的起点是 Safari 开发页面 (`http://developer.apple.com/safari`)，该页面提供了关于支持特性的有趣信息。\n\
  \n---\n\n## 摘要\n\n到现在为止，你应该已经拥有一个功能性的开发环境。无论你选择了 Komodo Edit 还是其他出色的编辑器；无论你选择了 Safari、另一个\
  \ WebKit 浏览器，甚至是 Firefox；无论你是否能够安装模拟器——你都已经具备了使开发过程更轻松、更高效的条件。你也已经积累了一些背景知识，可以舒适地学习本书。\n\
  \n在接下来的两章中，你将开始动手实践。为了拥有一个完美的开发环境，我们将帮助你完成在计算机上安装服务器的过程，你可以在那里托管你的项目。然后，你将通过深入了解绝对节省时间和精力的调试工具来磨练你的开发工具。\n\
  \n---\n\n## 第 2 章：开发环境\n\n现在你有用于创建和测试的工具了。在第 1 章中，我们建议，为了正确评估你的应用程序，你应该始终在合适的设备上进行彻底测试，无论你的目标设备是什么。同样，了解你的页面在用户端表现如何的最可靠方法，就是尽可能在接近真实条件的开发过程中使用它们。\n\
  \n一旦你的应用程序准备就绪并大放异彩，你将需要将其托管在服务器上，以便它可以通过万维网提供服务。然而，理所当然地，你可能不想在仍在开发阶段时将网站托管在生产平台上。由于某些限制和缺点仅当网站托管时才会出现——同时也有一些受欢迎的好处——我们将指导你完成一个并非你想象的那么难的过程：在你的工作机上安装一个本地服务器。\n\
  \n你的新服务器将提供开发 Web 应用程序和按照本书示例进行操作所需的一切。基本上将其视为另一个工作工具。只需按照本章的步骤操作，你就不需要深入高级功能或花哨的配置。你将拥有一个随时可用的服务器，无论你的平台如何，它都能托管你的页面，并使其可供共享同一无线网络的外部设备访问。\n\
  \n### 提供 Web 应用程序服务\n\n我们提到，直接在本地文件上开发 Web 应用程序时会受到一些限制。在你着手安装本地 Web 服务器之前，这里有一个例子：你构建了一个带有建议功能的搜索应用程序；当用户开始输入一个单词时——砰！——他正要输入的单词就出现在他面前！为了实现这一点，你从某个远程站点的列表中检查单词。你已经在本地文件上彻底测试了你的应用程序，它运行得非常完美。然而，当你将其上线时，魔法消失了——不再出现建议。这是因为\
  \ Ajax，实现此类功能的基础技术，仅当请求发生在同一来源时才有效。这个“跨域”限制在你测试时没有出现，因为本地文件没有域，并且由于使用了 `file://`\
  \ URL 方案，执行上下文不同。这就是为什么你从未注意到这个问题——直到为时已晚。\n\n如果你的开发过程中使用了 iPhone Simulator 或合适的设备——这是你应该做的——另一个缺点是它们都无法访问本地文件系统上的文件。托管你的页面是使用模拟器以及你的目标设备——iPhone、iPod\
  \ touch 或 iPad——的必要步骤。\n\n### Mac OS，化繁为简\n\n最新版本的 Mac OS X 附带了设置工作服务器所需的所有组件。尽管站点托管对开发者（等等）很有用，但这通常不是他们的主要知识领域。幸运的是，配置过程已经变得非常简单。只需按照下面几节的步骤操作即可。\n\
  \n#### 在你的 Mac 中嵌入 Apache\n\n从菜单中打开“系统偏好设置”，在出现的窗口中，打开“互联网与无线”部分。点击“共享”图标，然后选中“Web\
  \ 共享”复选框（见图 2-1）。搞定了吗？嗯，好消息——你的服务器已经设置好了！\n\n点击个人网站链接，Safari 或你默认的 Web 浏览器将使用你新个人站点中的默认文件打开一个窗口，如图\
  \ 2-2 所示。你可以在 `/Users/username/Sites/` 文件夹中修改和添加此站点的文件，其中 `username` 是你的会话用户名。\n\
  \n第二个链接将带你到计算机的网站。访问此 URL 将显示在 Apache 默认安装中找到的常见“It works!”消息。此网站的文件位于 `/Library/Webserver/Documents/`\
  \ 文件夹中。\n\n如果你记不住像 `192.168.1.100` 这样的 URL 或者懒得输入，你也可以使用计算机名称访问你的网站。URL 看起来类似于 `http://computername.local/~username/`。\n\
  \n这些简单的步骤允许你使用你的主要语言——HTML、CSS 和 JavaScript——构建一个网站。这是你开始制作托管 Web 应用程序所需的最低配置，但要构建一个现代网站，你可能希望使用某种服务器端脚本语言来增加网站与用户之间的交互。我们将在本书的一些示例中使用\
  \ PHP，因此我们建议你遵循以下步骤。它不像安装的第一部分那样“一键式”，因为你需要以管理员权限修改配置文件。但别担心：它并不像看起来那么困难。\n\n####\
  \ 脚本引擎\n\n打开一个终端窗口，并输入以下命令：\n\n```\nsudo vi /private/etc/apache2/httpd.conf\n```\n\
  \n系统会要求你输入管理员密码。你很可能就是自己电脑的管理员，在这种情况下密码就是你的会话密码。但如果你使用的是公司机器，你可能需要请别人为你输入密码。`apache2`\
  \ 配置文件应该在终端窗口内的 Vi 中打开。\n\n**注意：** 在本书中，我们不常使用命令行工具来编辑文件。尽管如此，当我们这样做时，我们将使用著名的 Vi。如果你不熟悉命令行文本编辑器，你可能会觉得它们有点吓人。它们通常学习曲线陡峭。然而，由于其中一些编辑器很受欢迎且功能确实丰富，我们认为可以在这里介绍一个。\n\
  \n相反，如果你不喜欢 Vi 并且已经安装了 Komodo Edit，请查看在 Komodo ➤ 偏好设置菜单项中启用 Vi 行为模式的选项；选择“编辑器 ➤\
  \ 键绑定”，然后选择“启用 Vi 模拟”，这是从上往下第二个选项。\n\n文件打开后，将光标向下移动，直到到达看起来像这样的行：\n\n```\n...\n\
  #LoadModule php5_module libexec/apache2/libphp5.so\n#LoadModule fastcgi_module libexec/apache2/mod_fastcgi.so\n\
  ...\n```\n\n你想通过删除 `#` 符号取消这些行的注释，以启用这些模块并允许 PHP 脚本正确执行。为此，输入 `a`（用于追加），像在任何编辑器中一样取消注释这些行，通过输入\
  \ `esc` 退出编辑模式来保存更改，然后输入 `:wq`（用于写入并退出）。\n\n为了使配置更改生效，请通过取消选中并重新选中“系统偏好设置”中的“Web\
  \ 共享”选项来重新启动服务器，或者直接在终端窗口中输入以下命令：\n\n```\nsudo apachectl restart\n```\n\n你可能想知道你刚刚做了什么。第一行告诉服务器加载\
  \ PHP5 模块，允许你在服务器端运行 PHP 脚本。PHP 是一种流行的、开源且非常强大的通用脚本语言。在其最新版本中，它具有面向对象编程和许多使开发者生活更轻松的函数。\n\
  \n第二行允许分离脚本执行和其他服务器任务。简单来说，服务器和 PHP 模块（或任何实现 FastCGI 协议的其他模块）作为独立的应用程序运行，拥有各自的资源和进程。这相应地意味着，如果某个脚本导致\
  \ PHP 崩溃，则无需重启服务器。\n\n所以，甚至没有注意到，你已经成功了：你已经在你的工作机上设置了一个带有 PHP5 的服务器，使开发过程既简单又专业。如果你是一个好奇的人，我们打赌你甚至已经修改了你新网站的一些东西（当然，如果你是\
  \ Mac 用户的话）。接下来是如何在 Windows 机器上实现类似结果的操作指南。\n\n### Windows，选择你的武器\n\n要在你的 Windows\
  \ 机器上安装服务器，你的第一步是获取互联网信息服务（IIS）和运行 PHP 的组件。微软最近做出了巨大努力，使这项任务比过去容易得多。`http://php.iis.net`，如图\
  \ 2-3 所示，是一个专门用于服务器安装的网站。前往那里，点击“安装 PHP”按钮。\n\n当然，你可以使用任何 Web 浏览器访问此网站并进行操作，但我们建议你使用\
  \ Internet Explorer 进行以下操作，以确保一切按计划进行。\n\n#### 一体化安装流程\n\n按照屏幕上的说明进行操作。系统会要求你下载\
  \ Web 平台安装程序（Web PI），这是一个轻量级工具，它将帮助你以惊人的轻松度在你的机器上部署一个完整的 Web 服务平台。\n\n**注意：** Web\
  \ 平台安装程序需要 .NET Framework 2.0 版本。如果你的 .NET 版本意外过时或无法在 Windows XP 上使用，它将在恢复常规服务器安装之前指导你进行升级。\n\
  \n此外，该安装程序不适用于更基础的 Windows 版本，包括 Windows Vista Home Basic 和 Windows 7 简化版。\n\n下载完成后，运行该应用程序。如果你使用的是\
  \ Vista 或 7，你的系统将要求你允许在浏览器中运行 Web PI 附加组件。点击浏览器标签页下的栏（图 2-4），并通过选择“运行 ActiveX 控件”（Vista）或“运行附加组件”（7）来批准。如果你怀疑，你可以从下拉菜单中了解将要发生的情况的详细信息。然而，这是\
  \ Windows 软件，所以你可以信赖它......仅在 7 上，程序运行前会再次要求你的许可。这是常规流程，只需点击“允许”继续。\n\n此时，应出现一个窗口，其中选中了一个“安装\
  \ PHP”复选框，如图 2-5 所示。你可能会欣赏到，从左侧的标签页中，你可以选择安装与基础服务器一起的流行组件。这些包括开源内容管理系统（CMS）、电子商务解决方案和\
  \ Wiki 引擎。如果这些软件选择中有任何引起你兴趣的，只需勾选相应的框，如图 2-6 所示，安装过程将无缝集成。\n\n无论你是否选择为服务器添加额外的功能，接受许可合同，然后观看安装完成。这\n\
  \n\n\n### 主机数据库\n\n### localhost 用于配置回环接口\n### 系统启动时使用。请勿更改此条目。\n\n`127.0.0.1 localhost`\n\
  \n在此行之后，按照相同的格式添加另一条规则，使用`127.0.0.1`和你的站点名称。\n\n`127.0.0.1 localhost`\n\n`127.0.0.1\
  \ www.example.local`\n\n现在你可以保存文件，并在浏览器中测试这个新创建的域名。你应当会看到与之前用 Web 服务器配置时相同的页面。\n\
  \n## 第 2 章：开发环境\n\n### 基于 Windows 的系统\n\n在 Windows 系统上，此文件可以使用任何文本编辑器编辑，无需特殊权限。例如，你可以在此使用`Komodo\
  \ Edit`。`/etc/`目录位于`C:\\Windows\\System32\\drivers\\`，你可以在那里找到你的`hosts`文件。\n\n其内容与\
  \ Unix 和 BSD 系统上的内容非常相似。你应该应用与上一节相同的更改。你的更改将自动生效。\n\n### 配置多个网站\n\n现在，作为额外福利，我们将讲解最后一件事。此步骤并非必需；我们只是认为部分读者可能对此感兴趣。具体来说，我们将解释如何在服务器上创建多个站点。这样，在同时处理多个项目时，你可以让浏览器理解正确的地址，而不是使用子文件夹。\n\
  \n除了在不同文件夹中使用不同站点名称带来的组织优势外，你还能受益于“根目录”的概念，无论是使用 PHP、HTML 还是 CSS。\n\n实际操作中，在 PHP\
  \ 中，你可以使用`$_SERVER['DOCUMENT_ROOT']`环境变量访问此信息。在编写 HTML 和 CSS 时，如果 URL 以斜杠（`/`）开头，浏览器会理解你调用的路径将从目录结构的顶层开始。在站点`http://localhost/example/`上，`/images/hey.png`表示`http://localhost/images/hey.png`。\n\
  \n### Apache 2：深入探索\n\n以下步骤适用于 Apache 服务器，也就是你在 Mac OS X 和 Linux 平台上安装的服务器类型。作为幸运的\
  \ Unix 用户，你还需要稍作调整，因为如前所述，不同平台安装 Apache 的方式并不相同。你需要找到 Apache 的主配置文件，并对其进行修改。还有其他管理虚拟主机的方法，但这种方法最接近跨平台。\n\
  \n#### 检查配置\n\n如同安装部分，你将再次在终端中使用`Vi`编辑文件。打开一个终端窗口，根据你的系统输入以下两条命令之一：\n\n```\nsudo\
  \ vi /private/etc/apache2/httpd.conf # 适用于 MacOSX\nsudo vi /etc/apache2/apache2.conf\
  \       # 适用于 Debian\n```\n\n一个文件将会打开，其内容因系统而异。你要做的第一件事是检查以下两行：\n\n```\n#### 确保\
  \ Apache 监听 80 端口\nListen 80\n\n#### 在所有 IP 地址上监听虚拟主机请求\nNameVirtualHost *:80\n\
  ```\n\n如果它们存在，很好，你可以进入下一步。如果不存在，你应该将它们添加到文件末尾。要在`Vi`中执行此操作，请将光标移动到文件末尾，再次输入`a`（Append，追加）以进入编辑模式。这些规则确保你的\
  \ Apache 服务器将监听 80 端口上的 HTTP 请求，无论 IP 地址如何（这就是使用`*`的原因）。\n\n#### 配置你的第一个虚拟主机\n\n\
  接下来是创建实际的虚拟主机。你至少需要为你的站点指定一个名称（URL）和文档根目录的路径（你的文件将存放的位置）。在你的配置文件末尾，使用你想要的名称和路径添加以下代码：\n\
  \n```\n<VirtualHost *:80>\n    DocumentRoot /var/www/example\n    ServerName www.example.local\n\
  </VirtualHost>\n```\n\n**警告：** 使用此指令添加虚拟主机将覆盖最初安装的主机。为防止这种情况，你应该在添加新虚拟主机之前，使用全局服务器名称及其文档根目录创建一个虚拟主机。你可以在正在编辑的主\
  \ Apache 配置文件中找到所需的信息。\n\n完成所有必要的更改后，你可以保存文件并退出`Vi`，方法是按下`Esc`键，然后输入`:wq`（写入并退出）。然后，重启你的服务器。如果你是\
  \ Mac 用户并且遵循了 Apache 安装过程，你已经知道如何操作。对于 Debian 用户，请运行以下命令：\n\n```\nsudo /etc/init.d/apache2\
  \ restart\n```\n\nApache 现在知道你的站点存在了，但系统的其余部分还不知道，除非你已将其添加到`hosts`文件中。要解决此问题，你应该按照前面解释的步骤修改此文件。\n\
  \n现在你可以在浏览器中检查你的新站点，输入你选择的服务器名称。由于你的文档根目录中没有文件，应该会显示一个相当空白的页面。不过，它能够正常工作，所以我们会在接下来的章节中与你见面，用令人兴奋的自制\
  \ Web 应用程序来填充它。\n\n### Windows 的情况\n\n如果你是一名 Windows 用户，能否设置虚拟主机取决于你安装的操作系统。在 Vista\
  \ 之前，无法在工作站上配置多个站点。XP 用户只能通过编辑其`hosts`文件来模拟多个站点，如前所述。\n\n然而，对于 Vista 和 7 用户，你可以通过从**控制面板**\
  \ ➤ **管理工具** ➤ **计算机管理**更改 Internet 信息服务（IIS）配置来访问此类功能。然后，在出现的窗口中，展开左侧窗格中的**服务和应用程序**部分，并选择**Internet\
  \ 信息服务管理器**。\n\n**注意：** 如果在 Windows 7 下没有出现相关菜单，请从右上角的弹出菜单中将**控制面板**窗口的显示模式更改为小图标或大图标。\n\
  \n此时，你的窗口应该看起来像**图 2-9**。\n\n**图 2-9. IIS 管理器视图**\n\n接下来，右键单击左侧第二个窗格中的**站点**目录，然后从上下文菜单中选择**添加网站**。出现的表单相当简单，如**图\
  \ 2-10** 所示。只需填写你为站点指定的列表名称、其根目录路径以及你要用来访问它的 URL。\n\n**图 2-10. 网站配置面板**\n\n你的网站现在准备就绪！如果似乎无法从\
  \ Web 浏览器访问所需的 URL，请检查它是否已添加到你的`hosts`文件中。否则，你的机器将不知道此地址应在本地查找。\n\n### 你成功了吗？\n\n\
  是不是比你预期的要简单？搭建一个基本的服务器不一定是一项复杂的任务，尤其是在两大主流操作系统公司都已完成相关工作的情况下。\n\n\n\n### 全力提升可及性\n\
  \n如果你属于\"眼见为实\"的类型，这里有一个完美的测试。在你的服务器根目录下创建一个 PHP 文件。在 Komodo Edit 中，可通过菜单项 **文件**\
  \ ➤ **新建** ➤ **新建文件...** 并选择 PHP 文件模板来完成。在新创建的文件中，输入以下代码：\n\n```\n<?php\n\nphpinfo();\n\
  \n?>\n```\n\n将该文件以 `index.php` 为名保存到你的服务器根目录。现在在浏览器中打开你的本地站点：你应该会看到显示服务器配置详细信息的表格。这意味着两件事：首先，你成功运行了一个\
  \ PHP 脚本，说明一切正常；其次，你可以查看新服务器上可用的所有选项。\n\n## 第 2 章：开发环境\n\n**警告：** 如果浏览器提示下载该文件，说明安装过程中出现了问题。请检查前面描述的步骤，找出遗漏之处。\n\
  \n此时，你甚至可以在你心爱的苹果设备上打开这个页面。只需确认几个条件：在所有系统中，你的电脑和设备需要连接同一个 Wi-Fi 网络。使用 SDK 模拟器时通常能满足这一条件，因为服务器和模拟器共享同一台电脑。在\
  \ Windows 系统中，正如我们之前解释的那样，你需要输入 IP 地址，而不是计算机名。\n\n在任何情况下，如果你选择 IP 地址方案，请注意大多数 Wi-Fi\
  \ 连接都使用**动态主机配置协议（DHCP）**。这意味着 IP 地址会被动态分配，因此很可能会发生变化：虽然你在家中或办公室可能可以随时使用同一个 IP 地址访问服务器，但在不同地点之间切换——或在星巴克建立连接——很可能需要你做出更改。\n\
  \n## 你一定做到了！\n\n好吧，你已经在这里开始做一些令人兴奋的事情了。也许这是你第一次搭建一个功能正常的服务器，在向世界展示之前，用来托管和提供你正在进行的工作成果。\n\
  \n现在你对网站的工作原理有了更好的理解，这也是一件好事。最后，但绝不是最不重要的，为了让这个配置部分更加完整，我们需要介绍你将在整个 Web 应用开发生涯中广泛使用的工具：**调试工具**。\n\
  \n"
- "# 第 3 章：介绍开发者与调试工具\n\n开发 Web 应用需要专门的调试工具，或者甚至存在这样的工具，这并非显而易见。就在不久之前，前端开发还严重缺乏用于分析和调试页面组件的优秀工具。但\
  \ Web 已经发生了巨大的演变：前端调试工具如雨后春笋般涌现，如今大多数主流浏览器都内置了调试工具或可以轻松添加扩展。\n\n此类解决方案的激增虽是近年之事，但绝不令人意外。构建一个网站通常意味着将标记语言、样式语言和脚本语言紧密结合起来。随着网站变得越来越复杂，跟踪这些构建块的所有元素也可能会变得更加复杂。\n\
  \n由于我们将专门使用基于 WebKit 的 Mobile Safari 浏览器，而且 WebKit 为 Desktop Safari 设计的调试工具非常出色，因此让我们从\
  \ Safari 的开发者工具开始。你现在距离处理真实代码只有一步之遥，我们向你保证，掌握这些工具将为你节省大量时间和麻烦。\n\n在本章中，我们将讨论 Safari\
  \ 中的开发者工具。我们介绍的功能大多可以在其他 WebKit 浏览器中使用，但我们无法保证所有功能都在相同位置或通过相同流程找到。\n\n### 与 WebKit\
  \ 的开发者工具交朋友\n\nWebKit 不仅提供了对 Web 标准的出色支持，还提供了高级工具，例如强大的实时文档和样式编辑器以及功能齐全的 JavaScript\
  \ 调试器，让前端开发者的生活更轻松。这些工具将帮助你显著加快开发过程中的各个阶段。从简单地控制你的 HTML 标记到遵循最新 HTML5 标准的数据库管理，我们将帮助你最大限度地激活和使用这些工具。\n\
  \n---\n\n**注意：** 在撰写本文时，我们谈论的是最新的开发者工具每夜构建版。你可能会使用这些工具的较旧版本。如果你缺少某些功能，你始终可以从 WebKit\
  \ 网站获取最新版本：[`nightly.webkit.org`](http://nightly.webkit.org/)。\n\n### 启用开发菜单\n\n\
  自然，在 Safari 上使用这些工具的第一步是启动 Safari。从偏好设置窗口（**文件** ➤ **偏好设置...**）中，选择\"**高级**\"标签页。在此部分，你需要勾选\"\
  **在菜单栏中显示‘开发’菜单**\"选项（见图 3–1）。现在，你的浏览器菜单栏中多了一个名为\"**开发**\"的菜单项。你也可以在工具栏中添加一个\"i\"\
  按钮，还可以随时通过右键点击网页上的任何元素，并从上下文菜单中选择\"**检查元素**\"来访问这些工具。\n\n---\n\n**图 3–1.** 你可以从高级偏好设置中启用开发菜单\n\
  \n### 探秘开发菜单\n\n现在让我们来探索\"**开发**\"菜单，如图 3–2 所示。第一个选项允许你在电脑上可用的其他浏览器中打开当前页面。由于我们的目标是\
  \ Safari，你可能不会经常使用这个选项。\n\n---\n\n**图 3–2.** 新的\"开发\"菜单直接提供了许多选项\n\n然而，第二个选项可能会更常用。启用\
  \ WebKit 的开发者工具后，你可以更改 Safari 的用户代理，从技术上讲，这意味着更改浏览器发送给远程服务器以标识自身、引擎及其版本等的字符串。如果你在\
  \ Desktop Safari 上进行开发，但想实现浏览器或平台嗅探功能（而不是依赖特性检测）来为某些用户启用特定功能，或者你想访问一个除 Mobile Safari\
  \ 之外的其他浏览器无法访问的站点，这个功能将会很有用。通过此菜单更改桌面浏览器发送的用户代理标头，将使网站将你的客户端识别为 iPhone、iPod touch\
  \ 或 iPad 上的 Mobile Safari。\n\n\"**显示 Web 检查器**\"和\"**显示错误控制台**\"项都将打开 Web 检查器，分别聚焦于\"\
  元素检查器\"和\"控制台\"部分，我们将在后续内容中更详细地介绍它们。\n\n\"**代码片段编辑器**\"菜单项将打开一个不同的窗口。代码片段编辑器背后的理念是，构建或调整网页可能是一个繁琐的过程。创建文件、修改、保存、在浏览器窗口中重新加载并重新开始，这可能是一个漫长的过程，并且需要在多个窗口和应用程序之间切换。代码片段编辑器在同一个双面板窗口中处理所有这些工作。我们广泛使用它来测试本书中的代码示例，因此我们相信它也能为你提供很大的帮助。\n\
  \n窗口的上半部分用于编写代码。它可以处理 HTML、CSS 和 JavaScript，并且能够管理大量的代码。下半部分会随着你的输入而更新，向你展示代码在合适的浏览器窗口中的显示效果。在原型设计阶段，这可以让你轻松测试代码并尝试多种替代方案。\n\
  \n\n\n以下条目让你能直接访问 Web Inspector 窗口中的高级 JavaScript 调试工具。这些工具能让你通过选择性研究代码行为和组件的功能，快速调试脚本。同样，我们很快会深入探讨这些内容。\n\
  \n最后一组选项允许你修改浏览器行为。显然，最终用户削弱浏览器能力的情况不太可能发生，因为所有这些特性，尤其是图形界面和 JavaScript 功能，都处于 Web\
  \ 应用身份的核心位置。如今，在禁用 JavaScript 的情况下访问丰富的网络内容几乎是不可能的任务，而且你很可能也不希望开发一个没有客户端脚本的应用。\n\
  \n不过，你仍应考虑到部分用户可能未启用脚本执行，因此应确保无论如何都能提供可理解的内容。\n\n尽管如此，`Disable Caches` 选项仍会派上用场，因为它不仅是测试首次访问加载时间的最佳方式，还能让你在高级\
  \ HTML5 缓存功能不可用时测试页面。\n\n### 在 Mobile Safari 上开发\n\n我们来花点时间谈谈 Mobile Safari。与我们将要介绍的功能相比，iPhoneOS\
  \ 浏览器上可用的功能有限，因为你只能使用控制台。你可以通过依次点击 `设置` `Safari` `开发者`（最底部），并将 `调试控制台` 选项切换到 `开`（见图\
  \ 3-3）来打开控制台。另请注意，你可以禁用 JavaScript 或 Cookie，并清空浏览器缓存以模拟特定的浏览条件。\n\n![](img/index-55_1.jpg)\n\
  ![](img/index-55_2.jpg)\n\n**图 3-3.** 你可以在 iPhone 设置中打开控制台\n\n之后，`调试控制台` 将显示在 Mobile\
  \ Safari 窗口的地址栏正下方，显示页面中 HTML、CSS 和 JavaScript 错误的数量，如果没有错误则显示 `无错误`（图 3-4）。提示和自定义消息也可以使用我们稍后将在本章中介绍的\
  \ Console API 来显示。\n\n**图 3-4.** `调试控制台` 出现在地址栏下方\n\n点击错误计数将打开一个错误列表，其中包含每个错误发生的行号，以及按类型（HTML、CSS、JavaScript\
  \ 或所有）筛选的选项（参见图 3-5）。\n\n![](img/index-56_1.jpg)\n\n**图 3-5.** 控制台显示所有消息\n\n不过要小心：当日志条目过长时，控制台会将其截断。尽量不生成超出两三行的日志，并始终专注于你需要的核心信息。为了减轻这种限制，你仍然可以旋转设备使行变长，这样你的两行日志就能容纳更多内容。\n\
  \n### Web Inspector 概览\n\n在详细介绍 WebKit 的 Web Inspector 的每个单独功能之前，最好的方法是先整体了解这个工具。首次调用\
  \ `开发` 窗口时，默认会打开一个新窗口。使用过一次后，你上次的选择——是独立窗口还是停靠窗口——将自动生效。\n\n**注意：** 从现在开始，无论 Web\
  \ Inspector 是窗口状态还是停靠状态，我们都将其统称为窗口。同样，我们会将检查器关联到浏览器窗口，尽管显然你可以为任意浏览器标签页打开一个 Web Inspector\
  \ 实例。\n\n![](img/index-57_1.jpg)\n\n#### 开发者工具窗口\n\n在窗口顶部（图 3-6），你将会看到一系列主要图标，它们充当标签页，让你能够访问各种调试工具。按出现顺序，它们分别代表：元素检查器、资源追踪器、脚本调试器、时间线检查器、脚本分析器、客户端存储管理器、审计和控制台。\n\
  \n仍在 Web Inspector 的上部，右侧是一个搜索字段。此字段是上下文相关的：它允许你在当前视图的主区域内执行高级搜索。例如，如果你正在处理 HTML\
  \ 标记，在此字段中搜索将搜索文档内的元素；在 `Profiles` 标签页中运行查询，则会在所有性能分析数据中返回查询元素。\n\n**图 3-6.** 聚焦于元素检查器的开发者工具窗口\n\
  \n在窗口底部，有几个图标，它们会根据你正在使用的工具而有所不同。不过，在调试工具的所有部分，你都会找到一个窗口图标和一个显示箭头前带有一条线的图标。第一个图标让你能将\
  \ Web Inspector 窗口停靠到其父窗口，这在同时处理多个页面且每个页面都有一个调试器实例时非常有用。它还可以防止你错误地从错误的窗口中查找和编辑代码！\n\
  \n第二个图标会启动一个控制台。无论你当前正在使用哪个工具，控制台都可用。可以通过按 `Esc` 键触发。在这些图标旁边，如果你正在检查页面中的 HTML 元素，该元素在文档树中的路径将以“面包屑”方式呈现（图\
  \ 3-6 中的 `html > body`），以帮助你轻松浏览文档。\n\n检查窗口的一个强大优势是它与你正在处理的页面紧密相关。此窗口中的数据会随着页面的修改而更新。如果你点击一个链接并跳转到另一个页面，检查器的内容也会完全改变。因此，一个调试器实例只能检查一个窗口。这应该不是问题，因为你可以根据需要打开任意数量的检查器窗口，无论你打开了多少页面。\n\
  \n### 错误通知\n\n如果你的页面出现任何问题——检查代码的一个常见原因——你首先应该在 Web Inspector 窗口的右下角查看（图 3-7）。在那里，如果\
  \ WebKit 解释器识别到代码中有错误，你会看到一个红色数字，前面带有一个白底红叉的错误标记，以及警告标记旁边的一个黄色数字。\n\n**图 3-7.**\
  \ 两个图标指示当前页面抛出的错误和警告；这些将在控制台中描述\n\n点击这些数字将打开一个控制台区域，其中会列出报告的错误和警告，以及 WebKit 为修复它们而执行的操作，以及它们在文件中发生的行号。\n\
  \n例如，在 XHTML 文档中，经常会将自关闭标签与需要完整关闭的标签混淆。如果你使用了一个 `<link>` 标签，并用对应的 `</link>` 关闭了它，你将收到以下消息：\n\
  \n```\n未匹配的 </link> 已遇到。忽略标签。YourPage.html:14\n```\n\n这让你可以使用指示的行号在源代码中搜索该元素，该行号也是一个链接，可以直接带你到相关行，使用的是我们稍后将介绍的\
  \ `Resources` 查看器。\n\n这里的“忽略标签”并不意味着你的链接会被完全丢弃；它仅仅意味着这个意外的关闭标签将被忽略，并且不会出现在 DOM 树中。这是\
  \ WebKit 解释你的代码以渲染页面的方式。要注意这些错误，因为它们可能会引起副作用；例如，未关闭像 `<script>` 或 `<canvas>` 这样的标签会导致它们之后的元素被视为脚本或画布内容——并且不会被显示。\n\
  \n### 掌控你的代码\n\n\n\n### 开始使用元素检查器\n\n开始使用 WebKit 的 Web 检查器最明显的方式可能是从 Web 应用程序的基础开始：HTML\
  \ 标记。这也许也是最简单的方式。元素检查器可通过不同的操作访问。所有这些方式都有其优点，我们现在将介绍它们。\n\n#### 让文档属于你\n\n检查页面组件的主要方式是选择顶部栏的第一个标签，名为\"\
  元素\"（`Elements`）。它将以语法着色、格式良好的树状结构显示你的页面，占据 Web 检查器的大部分窗口（见图 3-8）。在右侧，你可以看到一个侧边栏，包含几个可折叠的面板。默认情况下，`<body>`标签会被高亮，但你也可以随时通过右键单击页面中的任何区域并从上下文菜单中选择\"\
  检查元素\"（`Inspect Element`）来调用元素标签。\n\n**信息**：由于调试工具是用 HTML、CSS 和 JavaScript 构建的，你可能会误开始检查调试器窗口而不是你打算检查的代码。虽然这看起来像是检查器的一个限制，但对于那些希望扩展工具的人来说，这可能很有用。检查器的演进很大程度上是由社区驱动的。如果你有技能和时间，我们鼓励你加入并帮助改进它们。\n\
  \n这种方法的主要优点是，在调试页面时，你通常大致知道问题出在哪里。通过从页面中的特定区域调用检查器，文档树将会展开，直达你想要分析的节点。\n\n此外，当鼠标悬停在页面中的某个元素上时，该元素会被高亮显示，半透明的浅蓝色表示其内部边界，深蓝色表示其内边距和边距。这意味着，即使你没有进入文档树，也能了解页面各组成部分的布局。\n\
  \n![](img/index-60_1.jpg)\n\n**第 3 章：介绍开发者与调试工具**\n\n**图 3-8. 检查书籍封面图片下的代码的视觉反馈**\n\
  \n由于直观了解页面布局可能是一种吸引人的工具，你会很满意地了解到，后一种功能在调试工具的大多数部分中都可用，只需点击底部状态栏中的放大镜图标即可。\n\n当然，仅仅获取元素布局的表示通常不足以深入分析代码中发生了什么。让我们更仔细地看看元素检查器。\n\
  \n无论你编写的代码如何呈现，检查器的文档树都会适当地缩进，每个新节点开始都会换行。此外，代码会被清晰地着色以使其更易读：标签为紫色，属性名称为橙色，属性值为蓝色。你甚至可以看到以绿色显示的內联注释。点击任何节点开始处的展开三角形可以切换其状态，这样你就不会面对无休止的需要滚动的换行。\n\
  \n#### 挖掘你的样式\n\n在第一个面板中，你有几个类别，表示应用于你元素的所有样式，如图 3-9 所示。\n\n![](img/index-61_1.jpg)\n\
  \n**第 3 章：介绍开发者与调试工具**\n\n**图 3-9. 元素检查器侧边栏**\n\n从顶部开始的第一个样式类别非常有用；“计算样式”（`Computed\
  \ Style`）是 WebKit 渲染器考虑、计算并应用的样式。这很方便，因为它让你一眼就能看到元素实际拥有的所有样式。由于几个原因，计算样式在处理数值规则（例如图\
  \ 3-9 中的 `width` 和 `height`）时也很有用。CSS 大量使用了相对值，例如 `em` 或百分比单位。因为所有计算后的大小都以像素表示，所以比较起来更容易。\n\
  \n但是，如果你无法确定样式是从哪里计算出来的，那么在调试页面时，计算样式就毫无意义。这就是后续子面板发挥作用的地方。每个子面板代表一种样式应用的独立方式，按从最新应用到最早应用的顺序排列。CSS\
  \ 中的样式规则优先级按以下顺序考虑：使用 `style` 属性应用的样式（*内联*样式）首先应用；然后，来自 `<link>` 和 `<style>` 标签的\
  \ `id` 和 `class` 选择器；然后是文档树选择器（选择器特异性越高，优先级越高——注意父元素的“权重”，无论它是通过 `id`、`class` 还是标签名来引用的，都会计入权重）；最后是标签名。\n\
  \n**提示**：默认情况下，所有与颜色相关的规则都使用 RGB 或颜色名称（如果可用）表示。如果你希望在代码中使用其他颜色格式，可以通过单击规则旁边的彩色方块（这只会更改当前规则的格式）或通过单击侧边栏左上角的齿轮图标来更改格式，在十六进制、RGB\
  \ 和 HSL 之间切换。\n\n所有规则都会被列出。然而，由于并非所有规则都会被最终应用，你会注意到在侧边栏的其他部分，有些规则被划掉了，显示出该样式被另一条规则覆盖。同样，这种呈现方式让你精确地了解页面样式是如何工作的。\n\
  \n![](img/index-62_1.jpg)\n\n**第 3 章：介绍开发者与调试工具**\n\n**图 3-9. 元素检查器侧边栏**\n\n####\
  \ 编辑样式\n\n理解固然好，但能够直接从侧边栏修改样式规则则更胜一筹。你可以通过三种方式做到这一点。首先，要停用一条规则，只需取消选中规则右侧的复选框即可。你的页面将立即表现为该规则从未存在过，样式的继承也会相应地更新。\n\
  \n更进一步，你可以通过双击任何值来编辑规则，如图 3-10 所示。这将使规则变为可编辑状态，并允许你输入任何内容。按 Return 键或点击编辑区域外部即可保存并应用新规则。\n\
  \n最后，在检查器的最新版本中，你可以从头创建新的选择器，一次将样式应用于多个元素。这可以通过选项菜单完成，该菜单由侧边栏右上角的齿轮图标表示。同样，会出现一个新字段，但你可以同时输入样式规则及其应用的选择器。如前所述，按\
  \ Return 键或点击编辑区域外部即可使更改生效。\n\n**图 3-10. CSS 属性易于编辑**\n\nWeb 检查器不仅让你能够深入了解页面，还为你提供了工具来进行严肃的原型设计，而无需经历检查、修改文件、保存、重新加载页面等繁琐过程。\n\
  \n#### 度量（Metrics）\n\n从顶部开始的第二个面板“度量”（`Metrics`）提供了一个可视化表示，显示应用于页面元素的大小相关规则，即外边距、内边距、边框、宽度和高度，所有这些都显示在图\
  \ 3-11 中。这些规则一起被称为*盒模型*。\n\n检查器的最新版本还添加了对于 `position` 属性设置为 `relative`、`absolute`\
  \ 或 `fixed` 的元素的定位信息。这种表示方式使用起来当然比在“样式”（`Styles`）面板中找到的 CSS 规则列表要快得多，并且就像你可以修改后者中的规则一样，你也可以通过双击要更改的值来修改前者的尺寸。你可能会注意到，与计算样式类别中一样，此处的值都被处理成以像素为单位，而不管其初始定义如何。\n\
  \n![](img/index-63_1.jpg)\n\n**第 3 章：介绍开发者与调试工具**\n\n**图 3-11. 度量面板**\n\n**提示**：在“样式”（`Styles`）和“度量”（`Metrics`）面板上，你可以通过双击数值并使用键盘上的上下箭头键来修改数值，以\
  \ 1（默认）、10（结合 Shift 键）或 0.1（结合 Alt 键）为步长递增或递减。\n\n元素检查器中较低的两个面板可能看起来有点神秘。但它们同样有用。\n\
  \n#### 属性（Properties）\n\n页面中的每个元素都可以通过 DOM 对象的实例来访问，该\n\n\n\n允许您在 JavaScript 代码中操作当前元素。因此，每个元素都拥有其自身以及继承的属性。例如，一个\
  \ `<h1>` 标签就是一个 DOM 的 `HTMLHeadingElement` 实例，它具备 `HTMLHeadingElement` 属性，同时还继承了\
  \ `HTMLElement` 对象的属性和方法，并以此类推，直至继承 `Object` 对象的属性。\n\n在“属性”面板中，各个可折叠的分类以字母顺序列出了当前选中对象的所有属性和方法（如图\
  \ 3–12 所示）。当然，DOM 元素并非只有固定的属性值。例如，`innerHTML` 属性会根据其所在的页面而变化；“属性”面板会列出检查时所有这些变量值。\n\
  \n![](img/index-64_1.jpg)\n![](img/index-64_2.jpg)\n\n图 3–12. 属性面板\n\n了解这些内容在编辑\
  \ HTML 或 CSS 时可能用处不大，但在编写 JavaScript 时却至关重要。它为您提供了丰富的信息，供您构建或在此基础上开发，充分展现 DOM 所拥有的动态潜力。我们之所以说“构建”和“在此基础上开发”，是因为在使用\
  \ JavaScript 编写脚本时，您很可能需要为元素添加属性。当您键入或执行脚本时，“属性”面板会随之更新，因此您始终可以获取文档和对象状态的实时快照。\n\
  \n#### 事件监听器\n\n通过检查器完整洞察 DOM 的最后一个技巧，恰恰是查看页面中对象可能发生变化的位置。现在，切换到最后一个侧边面板“事件监听器”（如图\
  \ 3–13 所示），您就能看到是否有任何 JavaScript 事件（如 `click` 或 `load` 事件）附加到了该元素上。\n\n![](img/index-65_1.jpg)\n\
  \n图 3–13. 事件监听器面板，显示监听器的层级结构\n\n事件按类型分组，每个事件都可以展开，以查看按其调用顺序排列的相关函数。例如，这可以让您了解监听器为何可能从未被调用——因为有可能从某个监听器中停止了事件传播。它还能让您发现由于基于匿名函数的监听器意外堆叠而导致的内存泄漏，这类泄漏比常规监听器更难阻止。\n\
  \n当您想知道某个元素是否与脚本相关时，获取已附加事件的节点列表十分有用。但尤其有用的是，它提供了一份所有动态元素的列表，这是一种检查 DOM 的新方式，有助于排查\
  \ JavaScript 冲突等错误根源。\n\n#### 高级搜索\n\n除了文档树的可折叠表示以及允许您直接在元素显示位置进行选择的放大镜工具之外，在检查\
  \ HTML 文档时，您还可以使用另一个更高级的工具。\n\n它就是 Web 检查器窗口右上角的搜索字段。我们现在才介绍这个工具，是因为它最巧妙的用途与 HTML\
  \ 搜索相关；但搜索字段在调试工具中始终可用，并且会返回与您当前查看内容相关的结果。\n\n您可以使用高级选项来搜索 HTML 标记。如果搜索返回任何结果，项目数量将显示在搜索字段的左侧，如图\
  \ 3–14 所示。所有匹配项都会在文档树中高亮显示，并且第一个匹配项将被选中。\n\n![](img/index-65_1.jpg)\n\n图 3–14. 匹配数量显示在搜索字段的左侧\n\
  \n最显而易见的搜索选项就是直接查找纯文本。搜索针对文档内容（区分大小写）以及标签和属性名称（不区分大小写）进行。虽然这对于大型或不熟悉的文档而言可能效率不高，但它至少易于理解和使用，并且由于结果清晰显示，总体而言应该会很有用。\n\
  \n\n\n你可以使用 CSS 语法和选择器来查找文档中的标签。选择器是一种模式匹配规则，既能用于简单的标签定位搜索，也能用于复杂的上下文选择。这对前端开发人员来说自然很有吸引力，因为这应该是你熟悉的语言。但请注意：搜索标签名称将触发不区分大小写的搜索，但\
  \ ID 和类名在搜索字段中与在 XHTML 文档中一样是区分大小写的。\n\n尽管我们将在后续章节中更深入地介绍选择器，但这里先给出一个简单的例子以作说明：\n\
  \n**第 3 章：介绍开发者与调试工具**\n\n```html\n<h1>A Big Title</h1>\n<p>\n<span>The strong and\
  \ quick brown <strong>fox</strong>\njumps over the lazy<strong>dog</strong>.</span>\n\
  </p>\n```\n\n如果你在此文档中对`*strong*`执行简单的文本搜索，将会找到三处匹配。当然，你可能预期找到五处，但搜索引擎识别出其中两处实际上是与开始标签对应的结束标签，因此只考虑了开始标签。这是最简单的情况。\n\
  \n如果这个文档更大，你可能希望找到所有第二个`<strong>`标签，这些标签的祖先是一个紧随`<h1>`标题之后的`<p>`标签。是不是变得有点复杂了？\n\
  \n这正是 CSS 选择器大显身手的地方。尝试在搜索字段中输入以下内容：\n\n```\nh1 + p strong:nth-child(2)\n```\n\n\
  这对前端开发人员来说应该很熟悉。对于不太熟悉这类选择器的读者，需要记住的选择器并不多，因此绝对值得深入研究。\n\n最后，你还可以对文档执行 XPath 搜索。XPath\
  \ 语言是专为在 XML 上执行搜索而设计的。HTML 与 XML 有许多相似之处。XPath 语法允许进行高级的结构化查询。应用于前面的示例，你的搜索查询如下：\n\
  \n```\n//h1/following-sibling::p//strong[2]\n```\n\n关于 XPath，我们不想深入过多细节，只希望强调这两种方法各有优劣。例如，在我们的例子中，你应该注意到\
  \ CSS 选择器通过`+`号表达了`<p>`标签紧随标题之后，这在 XPath 中无法翻译。另一方面，CSS 选择器无法执行反向搜索（查找以另一个元素为父元素的元素），而\
  \ XPath 则可以。\n\n**资源查看器**\n\n资源查看器以图形方式展示当前页面已下载的元素概览（见图 3-15）。你可以在左侧边栏的顶部区域选择两种图表之一：时间（Time）和大小（Size）。\n\
  \n第一种视图是时间（Time），它显示了所有需要下载的元素的时间线，以及总的检索时间。浅色区域表示延迟期，即从发出请求到服务器发送响应之间经过的时间。深色区域给出了实际的下载时间。每种元素类型用不同的颜色表示，因此通过读取顶部图表栏中的图例可以轻松识别。你可以根据需求，使用\
  \ Web Inspector 窗口顶部的按钮来筛选类别，并选择数据的排序标准。蓝色和红色的垂直线分别指示了`DOMContentLoaded`和`load`事件的触发时间，这有助于你理解页面的加载方式，并据此优化页面设计。\n\
  \n![](img/index-67_1.jpg)\n\n**第 3 章：介绍开发者与调试工具**\n\n图 3-15. 资源查看器\n\n第二种视图是大小（Size），它简单按重要性从大到小显示页面所有已下载元素的重量。带有两个区域的条形图仍然存在，以便于理解。在这里，第一个条表示实际传输文件的大小，而第二个条在使用\
  \ HTTP 压缩时表示实际下载文件的大小。\n\n\n\n因此，图像将只显示为一条更暗的条。\n\n你可以根据实际文件大小或传输大小来进行筛选。如果选择传输大小，则会考虑到某些元素可能已被缓存的情况，因此加载耗时最长的文件可能并非体积最大的文件。要了解某个资源是否可从缓存获取，只需将鼠标悬停在图表中的相关条柱上；如果文件已被缓存，会出现一个提示框，显示文件大小为\
  \ 0 字节。\n\n显然，由于缓存的元素不占任何大小，它们会默认被一同显示，通常位于列表末尾。\n\n要获取关于某个资源的更多信息，你可以点击左侧边栏中的任意元素。\n\
  \n这将在主区域显示图像和文本文件，如图 3-16 所示，其中包含内容的详细信息，以及客户端和服务器发送的相关标头（使用主视图上方的标签页切换），这些信息会显示在主视图中。在侧边栏中双击某个资源，则会在新浏览器窗口中打开它。\n\
  \n![](img/index-68_1.jpg)\n\n**第 3 章：介绍开发者与调试工具**\n\n**图 3-16.** 某个资源的标头详情\n\n当然，这可以通过检查缓存过程并查看哪些元素可能拖慢页面渲染，来帮助你优化网站设计；同时，它还非常有助于跟踪\
  \ Ajax 操作，让你能够查看加载的文件及其 HTTP 标头和内容。\n\n### 调试 JavaScript\n\n与大多数脚本语言一样，JavaScript\
  \ 也有让人抓狂的一面，有时很难确切定位脚本为何无法正常工作。Web 检查器为此提供了几种非常方便的工具，从最直接的脚本执行时间线，到更复杂的观测辅助功能（如断点）。下面我们将介绍开发者工具如何帮助你更快、更少依赖猜测地摆脱脚本困境。\n\
  \n开始之前请注意，与元素检查器中 HTML 代码清晰显示为结构化树不同，JavaScript 代码将以其原始编写形式呈现。因此，我们显然不建议你在压缩后的代码（为减小文件大小而去掉多余空格和换行的代码）上使用这些工具。\n\
  \n#### 日志记录到控制台\n\n如果你已经编写过 JavaScript，很可能在开发过程中的某个精确时刻使用过 `alert()` 方法来获取对象或变量的值。由于这种方法存在不少缺点（例如，不要试图在循环中使用它！），你可能已经更进一步，使用了一些跟踪选项，这通常更自然且更高效。好消息是，有一个完整的控制台\
  \ API 可供你在 Web 检查器中使用。\n\n**表 3-1.** 日志记录函数\n\n| 函数 | 描述 |\n| :--- | :--- |\n| `console.log(format,\
  \ ...);` | 将消息或对象属性记录到控制台。这五个函数仅在消息左侧显示的图标上有所不同。在 Safari 移动版上，仅支持这些命令；此外，下表中列出的格式化选项不可用。\
  \ |\n| `console.info(format, ...);` |  |\n| `console.debug(format, ...);` |  |\n\
  | `console.warn(format, ...);` |  |\n| `console.error(format, ...);` |  |\n| `console.assert(condition,\
  \ format, ...);` | 仅在条件不满足时记录到控制台。 |\n| `console.group(format, ...);` | 开始和结束一个日志组。每个新组将相对于其他日志缩进显示。\
  \ |\n| `console.groupEnd();` |  |\n| `console.time(name);` | 分别启动和停止一个计时器，用于跟踪代码执行时间。`name`\
  \ 用于标识计时器，以便停止它。 |\n| `console.timeEnd(name);` |  |\n| `console.count(name);` |\
  \ 设置一个函数调用计数器。`name` 用于标识计数器。每次调用函数时，计数器会记录一个递增的数字。 |\n| `console.dir(object);`\
  \ | 将对象的所有属性记录到控制台。 |\n| `console.dirxml(node);` | 将一个 HTML 节点及其所有子节点作为可折叠的树结构记录到控制台。在最新版本的\
  \ |\n\n\n\n#### `inspector` 与 `console.log()` 对 HTML 元素的操作方式类似。\n\n#### `console.trace()`\n\
  \n记录当前函数调用栈及传入参数的值。\n\n#### `inspect(object)`\n\n根据传入的对象打开相应的检查器标签页。可触发的标签页包括元素、数据库或存储检查器。\n\
  \n#### `console.profile(name)`\n\n开始并结束对脚本执行的分析。\n\n#### `console.profileEnd(name)`\n\
  \n## 第 3 章：开发者与调试工具简介\n\n列出的几个表达式可以像 C 语言的 `printf()` 函数一样接收带有多个变量的模式。因此，你可以使用 `%s`\
  \ 插入字符串，或使用 `%o` 添加可折叠的对象结构。这有助于在开发过程中保持日志的条理性和一致性。\n\n### 表 3-2：格式化选项\n\n**格式**\
  \ | **描述**\n--- | ---\n`%s` | 字符串。\n`%d` 或 `%i` | 整数。不支持像 `%02d` 这样的数字格式化。\n`%f`\
  \ | 浮点数。不支持像 `%4.2f` 这样的数字格式化。\n`%o` | 对象。可通过展开三角形查看对象详情。\n\n以下是两个使用控制台日志的示例：\n\n\
  ```\nconsole.log(\"My %s is great!\", \"iPhone\");\nconsole.log(\"My\", \"iPhone\"\
  , \"is great!\");\n```\n\n为了便于阅读，控制台会在必要时自动添加空格，并以树形格式显示对象。这两条命令将输出相同的结果到控制台，并附带一个指向执行行的链接。点击该链接会聚焦并高亮显示相关行。\n\
  \n### 使用交互式 Shell\n\n有时，通过重复的日志记录操作来查找对象或变量的值会非常繁琐。编辑文件、保存、重新加载页面等操作既耗时又低效。不过，借助检查器的交互特性，你可以直接在窗口底部的控制台提示符中输入命令，从而完成部分工作。命令的返回值会立即打印到控制台中。此功能可做的事情很多。\n\
  \n获取结果的最快方法是使用前面列出的日志记录命令，但您也可以运行页面中已有的脚本。这将允许您评估代码中的变量，观察它们的行为，并调整页面，因为您执行的所有更改（如果有）将直接应用于受影响的元素。\n\
  \n按向上箭头键将打开您已输入的命令历史记录，按时间从新到旧排列。\n\n检查器的交互式控制台甚至支持代码补全：开始输入命令时，会弹出建议补全单词。按右箭头键或\
  \ Tab 键接受建议。此外，在终端中时，输入 `clear()` 将清除屏幕上的所有输出，不过此功能也可以通过点击窗口左下角最右侧的图标来实现。\n\n###\
  \ 让调试器来完成工作\n\n到目前为止，我们介绍的所有内容中，都是您在输入命令，决定在哪里做什么，以及如何去做。如果这还不够，您还可以利用 Web 检查器中实现的高级调试器。我们将使用以下代码来说明调试器的各种工具：\n\
  \n```html\n<html>\n  <head>\n    <title>测试脚本</title>\n    <script>\n      var counter\
  \ = 0;\n      var timerID = window.setInterval(myTimer, 10000);\n\n      function\
  \ myTimer() {\n        var span = document.getElementById(\"count\");\n        span.textContent\
  \ = incrementCounter();\n        for (var n = 0; n < 100000; n++) {\n          new\
  \ Object().toString();\n        }\n        if (counter > 1) {\n          errorGenerator();\n\
  \        }\n      }\n\n      function incrementCounter() {\n        return ++counter;\n\
  \      }\n    </script>\n  </head>\n  <body>\n    定时器执行次数：<span id=\"count\">0</span>\n\
  \  </body>\n</html>\n```\n\n这段代码的作用是启动一个定时器，每十秒钟调用另一个函数 `myTimer()`。该函数依次递增显示在浏览器中的计数器，然后运行一个重要的循环，最后通过调用一个未定义的函数来生成一个异常。\n\
  \n页面加载后，您可以从菜单中激活调试器，如果 Web 检查器窗口已打开，也可以直接点击“脚本(Scripts)”标签页。\n\n您刚刚打开的窗口有两个主要部分，如图\
  \ 3-17 所示。左侧是文件中的当前脚本，带有行号；如果脚本直接位于 HTML 文档的 `<script>` 标签中（如本例所示），您将看到此文件。右侧是有关当前脚本的各种信息。目前，这部分是空的。\n\
  \n![](img/index-72_1.jpg)\n\n**图 3-17.** 脚本调试器\n\n窗口的每个部分都有专门的按钮。在左上方，您可以从下拉菜单中选择所有可用的脚本。在右侧边栏的上方，您可以使用步进按钮来暂停脚本执行、单步执行到下一个函数调用、单步进入下一个函数调用或跳出当前函数，以及禁用断点。\n\
  \n#### 断点\n\n即使您大致知道脚本在哪个阶段停止工作，找出问题所在也可能更棘手。这时，断点就可以帮到您。\n\n**警告：** 您无法通过从控制台运行脚本来使用调试器。无论您设置了什么断点或生成了什么异常，在这种情况下执行都不会暂停。因此，您还必须考虑使用有用的日志函数来跟踪您的脚本。\n\
  \n点击窗口左侧的行槽会为该行上的脚本部分切换一个蓝色断点。使用之前的代码，例如，您可以在定义 `myTimer()` 函数的行上添加一个断点。当脚本运行时，它将在此处中断（图\
  \ 3-18），并且所有变量和函数的当前状态将列在侧边栏中。\n\n![](img/index-73_1.jpg)\n![](img/index-73_2.jpg)\n\
  \n**图 3-18.** 行槽上放置了两个断点；调试器在第二个断点处停止\n\n您还可以使用条件断点来精细化地监控脚本。如果您想知道某个变量值如果不是\"foo\"\
  是什么，请右键单击任意一行，然后从上下文菜单中选择“编辑断点...”。将会弹出一个文本字段供您输入表达式，如图 3-19 所示。这种情况下，断点将变为橙色。如果表达式为真，脚本将停止；否则，将自动继续执行。\n\
  \n![](img/index-74_1.jpg)\n\n**图 3-19.** 设置条件断点\n\n在调试过程中，设置断点、查看情况、移除断点、查找另一行、再回到前一行等操作可能会很繁琐。侧边栏底部的“断点(Breakpoints)”窗格是您的助手。它保存了所有断点的列表，您无需删除，只需单击它们各自的复选框即可停用。您也可以使用侧边栏右上角的断点图标一次性停用所有断点。\n\
  \n更改选项后，您需要重新加载页面。脚本将一直运行，直到遇到断点。然后，所有执行都会暂停，并在右侧显示有关执行的上下文信息，如图 3-20 所示。\n\n![](img/index-74_1.jpg)\n\
  ![](img/index-74_2.jpg)\n\n**图 3-20.** 当调试器在断点处停止时，侧边栏会更新为与当前执行上下文相关的信息\n\n####\
  \ 单步执行\n\n在完成整个流程之前，只观察脚本的一个部分并不是很高效或自然。为了解决这个问题，让我们仔细看看侧边栏顶部的步进按钮，如图 3-21 所示。\n\
  \n![](img/index-75_1.jpg)\n\n**图 3-21.** 带有步进按钮的脚本调试器\n\n您可以使用第一个按钮在之前暂停当前脚本的执行。\n\
  \n\n\n"
- '# 第 3 章：开发者与调试工具介绍


  ### 监视表达式


  在侧边栏中，另一个面板可以帮助你检查脚本中的特定元素：**监视表达式**部分。你可以监视的表达式几乎可以是任何内容，例如变量、测试表达式、实例等等。你能收集到的信息可以是局部或全局的，并且会随着脚本的执行而更新。


  继续使用同一个示例，点击**添加**按钮（图 3-22），然后输入 `counter` 来观察它的变化。刷新不是自动的，因此当到达断点时，你需要点击**刷新**按钮来更新数据。


  > **图 3-22.** 要监视表达式，请点击**添加**按钮，然后输入要评估的表达式


  ### 调用栈


  从上往下第二个面板标记为**调用栈**。这里列出了所有已被调用但尚未返回的函数，最近一次调用排在顶部。


  你可以在 `incrementCounter()` 声明处添加第二个断点，并开始调试到此函数；这将得到如图 3-23 所示的结果。在面板中，你可以通过点击条目来向上移动调用栈。


  > **图 3-23.** 调用栈显示在侧边栏的相应面板中


  **提示：** 如果你希望函数名在调用栈中更具可读性，可以轻松地通过 `displayName` 属性在调试器中为其指定一个名称。例如，函数 `myTimer()`
  若扩展了 `myTimer.displayName = "Main Loop"`，则会在调用栈中显示为 `"Main Loop"`。此功能在即将介绍的**分析器**中同样有效。


  当然，这在观察连续执行的脚本或相互嵌套的脚本时，可以极大地节省时间。


  ### 作用域变量


  脚本侧边栏中最后一个（也是内容最丰富的）部分是**作用域变量**面板下的区域。这里会随时列出当前执行上下文作用域内所有元素或当前脚本所使用元素的值。在我们的示例中，停在第一个断点处时，数据应如图
  3-24 所示，显示 `myTimer()` 函数可用的所有变量，无论它们是否已被初始化。


  > **图 3-24.** 当前作用域中的变量（无论是否已初始化），以及庞大的**全局**列表


  为了便于阅读，这些元素根据其类型及在当前作用域中的用途进行了分类：**局部**、**全局**，以及（如果存在）**With 块**或**闭包**。这种视图不仅使查找和使用脚本可用的元素变得更加容易，还能帮助你理解当前状况并知道如何更改它。与
  CSS 和 HTML 值一样，你可以通过双击来更改**作用域变量**面板中的值。**全局**面板会特别列出脚本引擎级别可用的类及其完整原型。


  ### 异常


  你已经学会了如何查找错误以及如何观察脚本行为。然而，你可能已经注意到，无论是 JavaScript 控制台还是**脚本**部分，都只会通知异常——控制台中的日志、脚本中带颜色的行——它们不会停止执行。要使函数在出现异常时自动暂停执行（图
  3-25），你可以点击 Web 检查器窗口左下角的**暂停**图标。


  > **图 3-25.** 点击**暂停**按钮将使调试器在异常处暂停


  点击一次会将图标变为蓝色，这意味着所有异常都将导致脚本暂停，以便你可以检查该阶段可用的信息，如图 3-25 所示。点击两次将使脚本仅在未捕获的异常上暂停——即那些未被
  `try...catch` 语句捕获的异常。


  这些工具汇集在一起，应该能让你的开发过程变得更加容易和快捷。JavaScript 调试器不仅有助于精确定位脚本可能出错的位置，而且随着你逐渐熟悉它，它还能帮助你在优化阶段构建整体更优秀的
  Web 应用。


  ### 页面的生命周期


  全面了解页面在其整个生命周期中发生的情况总是很有帮助的。哪些脚本被执行，它们需要多长时间完成，加载了多少代码、标记或图像及其加载顺序——这些信息在 Web 开发中非常重要。**时间线**标签页会清晰有序地显示所有这些信息（见图
  3-26）。


  通过点击 Web 检查器窗口左下角的圆形图标来触发记录。如果你点击此按钮并重新加载页面，你会看到所有内容都被记录下来，包括初始页面加载后发生的事情，并在绘图区域的顶部使用三个平行的时间线进行表示——**加载**，用于页面加载的元素；**脚本**，用于脚本评估以及在页面加载时触发的事件；以及**渲染**，用于所有绘制到屏幕的操作、哪些内容被重绘以及它如何影响性能。


  > **图 3-26.** **时间线**部分及其底部的控制按钮


  **警告：** 使用此检查工具时必须谨慎，并始终记住，目标设备与你的桌面系统和浏览器规格不同（尤其是在连接速度方面）。也就是说，要使用这个工具并从中获取信息，但最重要的是，在解读这些信息时，要牢记你并非为正在调试的设备进行开发。


  为便于使用，尽管所有操作都会被记录，但你可以通过取消选择时间线左侧边栏中的类别，轻松地仅显示某些类型的事件。这将使时间线中的事件从蓝色（加载）、黄色（脚本）和紫色（渲染）变为灰色。


  时间线的宽度受限于你的屏幕宽度，这意味着时间刻度会根据其内容而变化。你可以通过拖动顶部时间线区域左右边缘的控件来细化检查目标。这将突出显示事件树的相关部分。如果你的页面包含动画内容或
  JavaScript 计时器，这一点尤其有用，因为在这种情况下，时间线会持续绘制屏幕上的变化，显示新渲染的浏览器区域和计时器迭代。


  将鼠标悬停在时间线或树状视图中的某个事件上，会弹出一个包含事件信息的提示框，例如生效所需的时间、事件类型、或加载操作中请求的文件。点击此弹出窗口中的元素，会将你带到
  Web 检查器的**资源**部分，以获取关于该事件的更多信息（见图 3-27）。


  > **图 3-27.** 一个弹出窗口，显示鼠标悬停所在条形的相关信息


  与 JavaScript 调试器一样，如果你希望在某个时候重新开始，可以点击窗口左下角附近带斜杠的圆形图标来清除视图。


  ### 分析脚本


  除了显示页面中所有发生事件的时间线之外，你还可以获取正在运行的脚本的性能分析数据和 CPU 使用情况。此功能可通过点击**性能分析**图标来使用（见图 3-28）。




  ### 本节仅在您首次打开时显示操作说明


  这些说明提示您点击窗口左下角区域的`Record`（录制）按钮（与时间线部分的操作类似），以显示随时间变化的脚本活动。点击一次即可开始录制，您需要再次点击以停止录制并查看写入屏幕的评估数据。


  您也可以使用之前介绍的 `console.profile()` 和 `console.profileEnd()` 方法，从控制台启动性能分析。使用控制台而非`Record`按钮的一个优势是，您可以同时录制多个性能分析会话。


  无论选择哪种方法，请记得**停用**您在脚本部分可能设置的断点，以免干扰性能分析。另请注意，与 Web 检查器中的其他工具不同，性能分析工具对所有浏览器窗口和标签页都是全局生效的，因此关闭除待研究窗口之外的所有窗口可能会有所帮助。


