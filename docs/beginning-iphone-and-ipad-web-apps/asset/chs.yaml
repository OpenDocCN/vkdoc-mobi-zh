  ## 第 4 章：网络应用程序的架构


  **图 4-3.** 两款针对 iPhone 优化的谷歌网络应用程序


  ### 应用星球：谁主沉浮


  许多人通过广受欢迎的 App Store 迅速进军 iPhone 应用市场。


  你可能会疑惑，既然原生应用程序得到了苹果公司的支持，并且已让许多人在短时间内致富，那为什么还要构建网络应用程序呢？这一点需要澄清：App Store 上的应用数量极其庞大，因此要想在那里获得关注度是一项艰巨的任务。要想脱颖而出，强势的营销变得越来越重要，但很少有人能真正取得成功。此外，要在
  App Store 上架分发，需要获得苹果公司的批准，即便你认为应用已经开发完毕，审批过程也可能耗费时间和额外精力。当然，这场争论涉及的因素远不止这些。


  ### 跨平台大师


  构建网络应用程序在多个方面可能优于构建原生 iPhone 应用程序，首先想到的便利之处便是跨平台兼容性——实际上，是双重跨平台兼容性。


  确实，你无需依赖特定的操作系统或特定工具来构建网络应用。你基本上可以使用任何工具，从最简单的纯文本编辑器到复杂的所见即所得编辑器和集成开发环境（IDE），而在
  Mac OS X 上构建原生应用程序如果没有 Xcode，效率往往很低。


  此外，你的网络应用程序本身在某种程度上也应该是与平台无关的。谷歌的 Android 浏览器和 Palm 的 webOS 都基于 WebKit，因此它们渲染页面的方式与移动版
  Safari 相似。WebKit 引擎正变得越来越流行，不仅用于桌面浏览器（Epiphany 最近已从 Gecko 转向 WebKit），也越来越多地用于移动设备，例如
  RIM 的黑莓（BlackBerry）。无论 iOS 多么流行，针对它开发的应用程序都依赖于其底层平台和 API，很可能无法在任何其他设备上开箱即用。


  ### 硬件访问不再是禁区的武器


  你可能听说过，原生应用程序与 iOS 本身紧密交织，能够访问更多的硬件性能、更多的平台资源，并且在无网络连接（或用户不希望联网）时拥有更多可能性。然而，这种说法已不完全正确。


  首先，你的应用程序不太可能需要比移动版 Safari 提供的更强的处理能力——而原生应用程序也并非都能充分利用其所赋予的全部性能。至于存储，自 2.0 版本起，你可以直接在设备上使用
  JavaScript 数据库，从而使你的应用程序数据在每次执行后都能持久可用。


  此外，用户现在可以在离线模式下访问网络应用程序，这意味着即使没有网络连接，所有静态内容也依然可用。考虑到页面中的静态元素无需在每次浏览时重新加载，再加上 HTML5
  新增的存储能力，你甚至可以在没有网络连接的情况下为用户提供大量可访问的内容。


  最后，尽管原生应用程序确实能从操作系统获得更多可用的工具，但这种情况也在改变：在 3.0 版本中，iOS 允许浏览器访问地理位置信息。这或许是苹果公司押注于网络应用程序未来的另一个迹象。


  ### 解放你的内容




  网络应用开发相比原生应用更具吸引力的第二点，在于你作为开发者对内容所拥有的自由度。


  通过 App Store 分发应用需要经过苹果公司的验证，这确实会对你能展示的内容以及应用的主题造成一些限制。这个过程也可能很漫长，而一旦你设法通过了这个阶段，你仍然需要让用户从成千上万的其他应用中选中你的应用。


  构建网络应用，你可以每天发布一个新应用，无需顾虑苹果公司，并且内容几乎可以随心所欲。你仍然需要吸引用户，但是，嘿！你正在为他们创造东西，所以，没有比这更自然的了。


  ## 第 4 章：网络应用的剖析


  ### 发布模式


  在用户端，无论流程多么简单，原生应用都需要安装，并且可能需要更新。前者对于网络应用显然不成立，而后者则是自动发生的。对于原生应用，即使是更新也依赖于苹果公司的验证，这必然意味着延迟，即便很短暂。最后，只要用户有浏览器，网络应用就可以从任何设备被发现和访问，这看起来可能比受限于虽然很棒的
  App Store 要好。


  ### 网络应用：不再是小朋友


  与常听说的相反，网络应用并不比原生应用更容易构建。这就像比较苹果和橘子：它们都是水果，但截然不同。


  自由度并不会让页面创建变得更容易。与原生应用开发者不同，网络应用开发者在着手一个新应用时，每次都会面对一张白页。虽然在浏览器中显示元素可能比为 Objective-C
  应用排布元素更容易，但 CocoaTouch 框架在处理这类任务时非常高效。此外，我们已经解释了模拟 iPhone 图形用户界面的重要性，这可能会使网络应用开发在布局和外观方面变得棘手。为
  iPhone 构建应用对网络开发者来说是一整套全新的约束。


  开发者应始终牢记，网络应用专注于特定功能，并且一次只向用户展示少量功能。信息的使用和访问必须始终尽可能清晰。尽管如此，不必担心。有一些框架可以帮助你完成这个过程。而且更重要的是，我们也会提供帮助。


  ### 移动 Safari 上的网络应用


  你将为运行在 iOS 上的 `Mobile Safari` 构建网络应用。虽然这比制作原生应用涉及的平台限制要少得多，但你必须充分了解目标设备的特性。特别是，你应该知道你的网络应用将如何被显示。到目前为止，目标设备
  iPhone 和 iPod touch 具有完全相同的屏幕尺寸、视觉行为和图形用户界面重复模式。随着 iPad 的发布，你将需要考虑不同的屏幕尺寸和略有不同的图形用户界面组件。


  ### 掌握浏览器


  如果有一个元素你需要彻底了解，那就是 `Mobile Safari`。正如苹果公司喜欢强调的那样，它并非一个缩微浏览器：与市场上的许多移动产品不同，它是一个成熟的网络解释器，全面支持
  HTML、CSS 和 JavaScript——包括 Ajax 技术。这意味着，任何基于网络标准构建的网站，或多或少都能在 `Mobile Safari` 上正确显示。它不仅仅是一个合格的浏览器，还能支持
  HTML5 和 CSS3 规范（尽管这些规范仍处于工作草案阶段）的前沿特性。这方面的一个小限制可能是，我们讨论的这三种设备都不使用鼠标。它们都通过触摸事件模拟鼠标事件，从而实现了比仅用鼠标更自然的交互。在大多数情况下，这种差异不会损害可用性。


  我们只能再三建议你密切关注万维网联盟（W3C；[www.w3.org](http://www.w3.org)）和网络超文本应用技术工作组（WHATWG；[www.whatwg.org](http://www.whatwg.org)）发起的所有演进。你将在这里找到大部分未来的网络技术。


  ### 浏览器指标


  `Mobile Safari` 的默认行为是缩放页面内容以适应屏幕。当然，这使得浏览体验不同于桌面浏览器或 `Opera Mini`，后者会重新排列和调整页面大小，以便在小屏幕上阅读。用户需要借助特定的手势，调整视图以阅读他们想要的内容。这是通过捏合展开（放大）、捏合关闭（缩小）和双击（聚焦特定页面元素）来实现的。此外，`Mobile
  Safari` 不存在桌面浏览器那样的“页面”概念。这意味着用户不会在屏幕侧面和底部有视觉辅助的情况下向上、向下、向左或向右滚动页面。他们会通过手指轻拂来平移视图的上、下或侧面，以揭示他们想在视口中看到的任何内容。


  你页面的可见区域不仅受屏幕尺寸限制；你还必须应对分别位于屏幕顶部和底部的地址栏和导航栏。然而，当用户平移时，地址栏会向上移动，并且可以通过点击状态栏使其重新出现，以节省屏幕空间。iPad
  的布局略有不同：由于屏幕更宽，地址区域和导航选项被组合在屏幕顶部的一个单独栏中。当用户平移时，此栏不会消失。


  表 4-1 列出了你将使用的尺寸。请牢记在心。每次你为苹果设备设计网络应用时，都应考虑这些因素。


  **表 4-1\. Safari 和全屏模式下的浏览器指标**


  | **设备** | **竖屏模式** | **横屏模式** |

  | :--- | :--- | :--- |

  | iPhone, iPod touch | **320x460** | **480x300** |

  | | 减去 44px 的导航栏 | 减去 32px 的导航栏 |

  | | 减去 60px 的地址栏 | 减去 60px 的地址栏 |

  | | 减去 50px 的控制台 | 减去 50px 的控制台 |

  | iPad | **768x1004** | **1024x748** |

  | | 减去 58px 的导航栏 | 减去 58px 的导航栏 |

  | | 减去 50px 的控制台 | 减去 50px 的控制台 |


  这些指标并非绝对限制，因为所有三种设备都允许网络应用以全屏模式运行。在这种情况下，只有状态栏可见，你的应用将在屏幕的其余部分自由运行。


  ### 思考“网络应用”


  这种浏览模式的问题在于，它与网络应用体验的核心原则相冲突。网络应用的目标是无缝地提供服务。对于最终用户来说，必须缩放才能访问菜单或特定内容很容易造成体验不佳，从你的角度来看，访客忠诚度也会受到影响。你必须完全控制应用所属的空间。为此，你必须完美地了解它，并完全专注于你提供的核心功能。应移除默认的浏览器导航，让用户通过网络应用处理高效的内部导航。我们很快会解释如何让用户将你的应用添加到主屏幕，以及如何让用户以全屏模式启动它。这将使你的网络应用看起来更像一个原生应用。


  `Ajax` 对于实现应用体验有很大帮助，但若完全取代整页刷新来独家使用时，它也会引发新的问题。注意不要破坏你的




  '
- "# Web 应用的架构剖析\n\n导航体验不佳或应用体验不完善的应用程序，会带来诸多问题。例如，用户能否通过一个 URL 直接轻松地返回 Web 应用的某个特定部分，这一点至关重要。不过，我不想过多剧透后面的章节，但接下来我们将介绍至少两种方法，用于创建无需刷新页面、即可通过唯一\
  \ URL 进行导航的 Web 应用。其中一种方法依赖于广泛使用的 JavaScript 方法（`window.location.hash`），另一种则使用前沿的\
  \ CSS3 工具（`:target` 伪选择器）。这些方法的一大优势在于，即使用户收藏了某个页面并在之后返回，也能显示与 URL 相关的正确内容，而不仅仅是默认加载的内容。\n\
  \n### 配置视口\n\niOS 上的视口概念并不代表浏览器客户区的尺寸，甚至也不是屏幕的尺寸。它是一个可以显示网页的逻辑区域，可能大于或小于设备屏幕。当用户进入一个页面时，整体内容会被缩放，以在保持原始宽高比的前提下最佳适配视口。视口的默认宽度被设置为\
  \ 980 像素，这适用于当今绝大多数网站。然而，我们知道 Web 应用的方法是不同的。你不希望页面被缩放：用户应该能以最少的操作直接访问他们想要的内容。让用户一开始就进行缩放操作是不好的。你必须构建页面来防止这种情况。\n\
  \n视口选项可以在网页的 `<head>` 标签内，使用视口 meta 标签进行定义。下面展示的代码在大多数情况下都能满足你的需求，我们建议你在大多数页面中使用它。它的作用是将初始缩放比例设置为\
  \ 1.0，并禁止用户缩放：\n\n```html\n<meta name=\"viewport\" content=\"initial-scale=1.0;\
  \ maximum-scale=1.0; user-scalable=no\">\n```\n\n因此，你的应用在加载时不会被缩放，无论它是在 iPhone 上还是\
  \ iPad 上，都会以你决定的最佳尺寸显示。现在，你可能会想，如果默认视口宽度是 980 像素，而你的 Web 应用没有被缩放，页面该如何正确显示呢？诀窍在于，视口\
  \ meta 标签还有其它选项，我们这里没有使用，因为它们可以根据我们已写的参数推导出来。在这里，`width` 选项（你可以将其设置为任何你想要的数值）被假定为等于设备屏幕宽度，因为\
  \ `initial-scale` 被设置为 1.0。因此，上面的 meta 规则等同于下面这条：\n\n```html\n<meta name=\"viewport\"\
  \ content=\"width=device-width; initial-scale=1.0; maximum-scale=1.0; user-scalable=no\"\
  >\n```\n\n我们建议你尽可能在 meta 标签中使用 `device-width` 和 `device-height` 常量，而不是硬编码的值。这是保证你的页面在设备屏幕上正确占满空间的最佳方法，即使在从竖屏切换到横屏或反之亦然时也是如此。同时，让你的页面具有流动性（fluid）也是个好主意，也就是说，让它们占据屏幕上所有可用的空间，以确保你的应用无论用户如何配置，都能以全屏方式显示。\n\
  \n所有参数都是可选的，这意味着 Mobile Safari 会为你未指定的参数猜测值。`content` 属性的规则可以按任何顺序声明，只要用分号加空格分隔即可。表\
  \ 4-2 列出了视口 meta 标签可用的所有属性和值。这些属性自 iOS 第一个版本起就已存在。\n\n**表 4-2.** 视口属性\n\n| 属性 |\
  \ 描述 |\n| --- | --- |\n| `width` | 视口的宽度，单位为像素。默认值为 980，取值范围为 200 到 10,000。此属性也可以接受\
  \ `device-width` 和 `device-height` 常量。 |\n| `height` | 视口的高度，单位为像素。默认值根据 `width`\
  \ 属性的值和设备的宽高比计算得出。取值范围为 223 到 10,000 像素。此属性也可以接受 `device-width` 和 `device-height`\
  \ 常量。 |\n| `initial-scale` | 视口的初始缩放比例，为一个乘数。默认值经过计算，以使网页适配可见区域。取值范围由 `minimum-scale`\
