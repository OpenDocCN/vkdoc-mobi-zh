  ## 第 3 章：开发者与调试工具介绍


  **图 3–28.** 性能分析器


  每个新的性能分析会话都会在左侧边栏显示一个分析图标。如果一个分析会话在另一个分析会话内开始录制，则上层分析会话将显示一个可折叠的三角形展开符号。


  ### 了解性能分析


  这里我们将使用与脚本调试器相同的例子来说明性能分析器的工作方式。打开 Web 检查器，点击`Record`图标，然后重新加载您的页面。


  当计数器达到 2 时，点击同一图标停止录制，并查看您新获取的数据（图 3–29）。


  **图 3–29.** 采集到的数据显示在性能分析器的结果表格中


  性能分析数据以五列的形式显示在 Web 检查器窗口的右侧部分。它详细列出了所有函数调用及其执行时间，默认以列表形式展示，消耗最高的函数排在最前面。默认视图以总时间的百分比显示数值。您可以使用窗口底部的弹出菜单更改这些视图选项。这样，您就可以通过树状视图查看函数，突出调用堆栈而非资源消耗。


  右侧的所有函数都可以展开以显示其调用堆栈。调用堆栈的基础始终是`"(program)"`。这个可折叠区域还会显示该函数被调用的次数。这就是为什么`myTimer()`会在同一组中出现两次。


  同样，您可以使用弹出菜单旁边的`%`按钮，将整个视图的数值从百分比更改为以毫秒为单位的绝对值。如果您专注于某一特定列（表 3–3），您可能只想更改该列的数据视图。


  这可以通过双击列标题来实现。


  **表 3–3.** 数据列说明


  | 列名         | 描述                                              |

  |--------------|---------------------------------------------------|

  | `Self`       | 函数自身的总执行时间。                            |

  | `Total`      | 函数的全局执行时间，包括对外部函数的调用。        |

  | `Average`    | 所有调用中的平均执行时长。                        |

  | `Calls`      | 函数被调用的次数。                                |

  | `Functions`  | 被调用的函数列表及其相关的调用堆栈。              |


  此外，为了完美契合您的需求，您可以通过点击列标题来更改某列数据的排序顺序。


  在函数列表中，如果某个函数不属于 WebKit 脚本引擎（如图 3–29 中带`getElementById()`的函数），其最右侧将出现一个链接，点击该链接将跳转到资源选项卡中相关文件的对应行，并高亮显示。


  为了更方便地阅读大量数据，您可以使用状态栏中的眼睛图标聚焦于特定函数。当然，如果执行链比较复杂，这个功能会让操作更舒适。也可以点击相同位置的叉号图标将函数从视图中移除。使用这些选项中的任何一个，状态栏上都会自动出现一个`Reload`（重新加载）按钮，以便您可以无缝恢复视图的初始状态。


  ### 使用搜索字段进行过滤




  '
- '# 第 3 章：开发者与调试工具介绍


  在 `Profiles` 部分，与其他任何部分一样，你可以通过 Web Inspector 窗口右上角的文本字段对数据进行搜索。该搜索字段在查找函数名称或资源
  URL 时会识别字符串。此外，它还支持数值和运算符，例如 `<`、`> `、`<=`、`>=` 和 `=`。例如，这允许你查找所有耗时超过特定时长的函数。相关数值会在表格中高亮显示，如图
  3-30 所示。


  **图 3–30.** 搜索 `>4s` 会高亮显示所有相关表格条目


  你可以使用与表格数据相同的单位，即百分比、毫秒或秒。查询返回结果后，你可以按 `Return` 键在不同元素之间导航。


  ### 客户端数据存储


  WebKit 中一项令人兴奋的新功能是，不仅可以通过 Cookie，还可以通过直接在浏览器中设置的数据库，在用户端存储数据。我们将在第 15 章详细讨论此功能；现在，我们先看看
  `Storage` 部分（旧版本中为 `Database` 部分）如何允许你检查多种客户端存储类型（见图 3-31）。


  **图 3–31.** Storage 检查器


  此时，Storage 检查器的布局应该看起来很熟悉，它包含常见的侧边栏和主视图。左侧的侧边栏中列出了存储类型的窗格，每个窗格下会显示当前正在使用的各种存储组或
  Cookie（如果有）。


  #### 数据库存储


  第一个组用于数据库。每个数据库都可以通过数据库图标前的箭头进行折叠。要查看某个存储块的数据表，只需点击它。选中的表会显示在窗口右侧，以数据网格的形式呈现所有列和行。


  与 `Scripts` 部分一样，如果你想进行更深入的检查，可以点击存储块来调用交互式 shell。此处的 shell 专门用于 SQL 命令，允许你借助自动补全功能查询数据。请注意，在当前版本中，在此处运行命令是与表交互的唯一方式，不能像其他存储功能那样直接编辑表。


  不过，查询结果会立即显示在屏幕上，因此过程相当快速简单。


  #### Cookie


  Cookie 是一种早已为人熟知的客户端存储方法。从左侧选择 `Cookies` 窗格可以极大地简化你对 Cookie 的管理。当前页面的所有可用 Cookie
  都会以表格形式呈现，包括每个 Cookie 的名称、值、域（是来自你页面的 Cookie 还是来自第三方站点，如广告）、路径、过期日期、大小、HTTP 和仅 HTTPS
  标志。你可以删除任何 Cookie；但所有 Cookie 删除都是不可逆的，因此请谨慎使用——你肯定不想因为误操作而丢失所有常用网站的偏好设置。


  #### 其他存储功能


  Cookie 的大小限制为 4KB。除了数据库存储，WebKit 还通过本地存储和会话存储为你提供了突破此限制的解决方案。这两个功能在左侧边栏中都有专门的窗格。与
  Cookie 一样，它们以键值对的形式存储信息。为了说明这一点，你可以在控制台中输入以下内容：


  ```

  localStorage.myKey = "Some value";

  sessionStorage.anotherKey = "Some other value";

  ```


  这些行将分别在本地存储和会话存储区域中创建新的存储部分。与 Cookie 一样，你可以通过点击表格下方的叉号图标来删除条目，但不同于 Cookie 和数据库存储，你可以直接在表格中修改值，并通过双击空白区域来添加新条目。


  ### 审核你的页面


  `Audits` 部分可以通过提供与页面加载相关的指导和最佳实践，帮助你优化网站。这些指南主要基于 W3C WebApps 工作组（WWAWG）关于构建更好的
  Web 应用程序的建议。在撰写本文时，你无法扩展审核功能，但这是未来版本的计划，届时应该允许你专门针对特定问题类别，例如安全性或特定设备。


  同样，左侧边栏中列出了可用的审核项，窗口右侧则包含用于运行新审核的数据和选项（图 3-32）。你可以选择“网络利用率”、“页面性能”或“全部”。你还可以选择在页面加载时进行审核，或者审核页面的当前状态。一切准备就绪后，只需点击窗口底部的“运行”按钮，审核结果便会很快出现在检查器中。


  **图 3–32.** 审核结果


  结果根据关键程度分类——红色表示重要问题，绿色表示可以考虑的次要改进。在建议中，你可能会找到未使用的 CSS 选择器列表、浏览器缓存技巧或 Cookie 处理技巧。例如，你可能会被建议将静态内容放在单独的服务器上，以防止每次新请求（图像、样式表等）时都携带无用的
  Cookie；显然，这会不必要地增加流量负载，因为 Cookie 在服务器上被图像等静态内容处理的可能性很小。


  如果我们还没足够强调，你正在面向的设备连接质量不可靠，且整体性能低于台式计算机或笔记本电脑。每节省一个千字节，就意味着节省了时间，也意味着离用户离开你的页面（可能再也不回来）更远一步。


  ### 仍然不确定？


  尽管我们认为 WebKit Web Inspector 是前端调试的绝佳工具，但在开发过程中你自然可能更喜欢其他浏览器或工具。如果你已经是前端开发人员，你可能习惯于
  Firefox 上的 Firebug 或 Opera 上的 Dragonfly。即使是 Internet Explorer，其最新版本也附带了开发者工具。无论你情况如何，请注意，当今大多数浏览器都内置了调试和开发工具，或者可以通过扩展程序获得。Web
  Inspector 实际上并非从零开始构建：例如，`Console API` 最初是在大获成功的 Firebug 中使用的。这最终是一个习惯和个人选择的问题。


  如果你喜欢 Firebug，或者想要更多直接在目标设备上调试的功能，我们建议你关注 Firebug Lite 的更新。该工具是 Firebug 的轻量级版本，可作为书签小程序在所有浏览器中使用。目前，它在
  iPhone 上功能还不算非常完善，但随着它的发展，它可能成为 Web 应用程序开发者的一个严肃选择。


  ## 总结


  现在，你应该已经牢牢掌握了可用的工具，以加快你的开发进程。你也会感到欣慰，因为在你日常使用的浏览器中，就有这么多有用的工具来让开发者的生活更轻松。你并非孤军奋战，因为我们介绍的工具是用
  Web 语言构建的，来自社区的演进也证明会大有裨益：谁能比 Web 开发者更了解他们需要什么呢？在接下来的章节中，我们会在必要时提供关于其中一些工具的更多细节。我们打赌你感觉到事情正变得更加具体。在下一章中，我们将剖析通用的
  Web 应用程序元素，然后再深入到 Mobile Safari 开发的核心。


