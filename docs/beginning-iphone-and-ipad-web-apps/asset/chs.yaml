  \ 17（卫星视图中约 50 米范围）。若发生错误，我们会尽可能准确地告知用户以帮助其找到解决方案，并重新激活按钮。\n\n### 标记用户位置\n\n现在地图已聚焦在用户所在区域，但这显然不够直观——用户更想确切知道自己的精确位置，而非仅仅一个区域。Google\
  \ Maps API 允许在地图上添加多种类型的数据，例如标记。在我们的示例中，将使用画布创建自定义标记；以下函数可让我们无需借助任何图片就能生成不同颜色的圆点标记：\n\
  \n```\nvar bullet = document.createElement(\"canvas\");\n\nfunction createBullet(color)\
  \ {\n  /* 始终清空画布 */\n  bullet.width = 16;\n  bullet.height = 16;\n\n  /* 获取绘图上下文\
  \ */\n  var ctx = bullet.getContext(\"2d\");\n\n  /* 使用颜色参数创建渐变 */\n  var main =\
  \ ctx.createRadialGradient(5, 6, 1, 0.5, 6, 20);\n  main.addColorStop(0, color);\n\
  \  main.addColorStop(1, \"white\");\n\n  /* 创建高光效果 */\n  var shine = ctx.createRadialGradient(5,\
  \ 6, 0.5, 5, 6, 40);\n  shine.addColorStop(0, \"white\");\n  shine.addColorStop(0.038,\
  \ \"black\");\n  shine.addColorStop(1, \"white\");\n\n  /* 设置绘图样式 */\n  ctx.strokeStyle\
  \ = color;\n  ctx.fillStyle = main;\n  ctx.lineWidth = 2;\n\n  /* 绘制圆点 */\n  ctx.beginPath();\n\
  \  ctx.arc(8, 8, 7, 0, Math.PI * 2, false);\n  ctx.stroke();\n  ctx.fill();\n\n\
  \  /* 然后应用高光效果 */\n  ctx.save();\n  ctx.globalCompositeOperation = \"lighter\";\n\
  \  ctx.fillStyle = shine;\n  ctx.fill();\n  ctx.restore();\n\n  /* 加粗描边 */\n  ctx.strokeStyle\
  \ = \"rgba(0,0,0,0.25)\";\n  ctx.stroke();\n\n  return bullet.toDataURL();\n}\n\
  ```\n\n顾名思义：`createBullet()`函数创建指定颜色的圆点，并通过`toDataURL()`方法返回画布内容。生成的图像可用于标记。\n\n\
  ```\nvar markerBullet;\n\nfunction drawMarker(latlng, color) {\n  if (markerBullet)\
