  \n\n\n### 使用 cURL API 处理请求。\n\n```\nif ($curl = curl_init($url)) {\n    curl_setopt($curl,\
  \ CURLOPT_FOLLOWLOCATION, 1);\n    curl_setopt($curl, CURLOPT_RETURNTRANSFER, 1);\n\
  \    $data = curl_exec($curl);\n\n    # 读取响应信息\n    $code = curl_getinfo($curl,\
  \ CURLINFO_HTTP_CODE);\n    $type = curl_getinfo($curl, CURLINFO_CONTENT_TYPE);\n\
  \n    # 返回内容并退出。\n    if ($code == 200) {\n        header(\"Content-Type: $type\"\
  , true, $code);\n        exit($data);\n    }\n}\n```\n\n## 第 12 章：Ajax 与动态内容\n\n\
  ```\n### 如果没有有效内容，则发送 HTTP 500 错误响应。\nheader('Content-Type: text/plain', true, 500);\n\
  echo 'UNEXPECTED RESPONSE';\n?>\n```\n\n我们的 PHP 脚本期望在查询字符串中传递一个 `url` 参数。如果找到该参数，则使用\
  \ `curl_init()` 函数初始化一个新的 cURL 会话，并设置请求选项。`CURLOPT_FOLLOWLOCATION` 将应用 HTTP 重定向（如果存在），而常量\
  \ `CURLOPT_RETURNTRANSFER` 则允许我们使用 `curl_exec()` 函数将请求的结果存储在 `$data` 变量中。\n\n请求执行后，我们使用\
  \ `curl_getinfo()` 函数收集 HTTP 状态码以及内容类型，以便返回预期的标头。如果未发生错误，则使用原始内容类型发回内容；否则，返回 HTTP\
  \ 500 错误代码。\n\n我们在此对 API 的使用相当简单，但 cURL 提供的选项很多，可以根据您的需求进行精细调整。尽管过程非常直接，但在发送标头时应特别小心，因为客户端脚本可能会检查状态属性（PHP\
  \ 文件中的 `$code`）的值以停止其执行。不过，结果是，您的 Ajax 请求可以在同一域上无缝完成，同时仍然从远程服务器收集数据。\n\n由于服务器端脚本通常比客户端脚本更快（特别是因为客户端脚本的性能部分取决于设备），因此直接在服务器上运行所需的任何安全检查或初步处理是一个好主意。请记住，对于向任何非您维护的站点发出的请求，都存在返回数据不符合预期的风险。\n\
  \n### JSONP 方式\n\n如果您更愿意不使用代理或 Ajax 请求，并且您期望从请求中获得的数据格式为 JSON，那么有一种更简单的方法——尽管这种方法意味着更高的安全风险——即\
  \ JSONP。JSONP 代表带填充的 JSON。此方法背后的想法是，以 JSON 格式返回的数据需要被评估，并旨在被处理和使用的，并且应该在不使代码混乱的情况下完成。\n\
  \n为了实现这一点，服务器不仅应以 JSON 格式返回请求的数据，还应返回将处理数据的函数调用。因此，当收到响应时，它将自动被适当地处理。\n\n让我们从服务器端脚本开始。我们将使用\
  \ PHP 函数 `json_encode()` 从数组生成 JSON 格式的数据。以下是 `json.php` 文件的内容，您可以将其添加到您的服务器。\n\n\
  ```\n<?php\n$json = json_encode(requestData());\n\n#### 我们有回调，处理 JSONP 行为\nif ($callback\
  \ = $_GET['callback']) {\n    header('Content-Type: text/javascript');\n    echo\
  \ \"$callback($json);\";\n#### 没有回调，发送经典 JSON 内容\n} else {\n    header('Content-Type:\
  \ application/json');\n    echo $json;\n}\n\n#### 从数据库或其他地方请求数据...\nfunction requestData()\
  \ {\n    return array(\n        'firstname' => 'John',\n        'lastname' => 'Doe'\n\
  \    );\n}\n?>\n```\n\n该脚本期望传递一个 `callback` 作为参数，该参数将在客户端处理 JSON 数据。如果未设置该参数，脚本仅返回原始的\
  \ JSON 格式数据。这允许您将此文件用于使用 JSONP 和代理的请求。\n\n在客户端，您将定义一个函数，其中包含需要在客户端文档中对数据执行的操作。这类似于我们在\
  \ Ajax 请求中使用的处理函数。当 `<script>` 标签被添加到文档时，该函数将被执行。\n\n```\n<script>\nfunction useJSON(data)\
  \ {\n    /* 对数据进行一些操作 */\n}\n</script>\n```\n\n您需要通知服务器在发送数据时将执行此函数。为此，您可以像调用任何其他外部脚本一样，在调用远程文件时在查询字符串中传递相关函数。\n\
  \n`<script src=\"http://www.example2.com/json.php?callback=useJSON\"></script>`\n\
  \n当评估此 `<script>` 标签时，会产生类似这样的结果：`useJSON({\"firstname\":\"John\",\"lastname\":\"\
  Doe\"});` 使用此方法，您无需定义复杂的方法来处理数据可用时的时刻：JSON 格式的数据可以在您的函数中评估，并且相关信息可以直接在您的页面中使用。当页面可能接收不同类型的信息，且每种信息需要不同的处理时，这显然很有用，因为您可以将特定函数与特定数据紧密关联。\n\
  \n### 跨域资源共享\n\n如您所见，有几种有效的方法可以让您从远程页面收集数据，包括来自不同域的文档。然而，执行跨域请求的最有效方法是使用由 Web 应用工作组维护的新跨域资源共享（CORS）规范。该规范受\
  \ Mobile Safari 支持，允许您在服务器端定义一组 HTTP 标头，客户端应用程序将读取这些标头以检查请求是否被授权。我们将了解如何使用它来执行 GET\
  \ 和 POST 请求。\n\n**注意：** 对于更复杂的 HTTP 请求，例如 DELETE 或 PUT，您可以参考 [www.w3.org/TR/cors/](http://www.w3.org/TR/cors)\
  \ 上的规范详情。\n\n当然，此方法的缺点是需要您对服务器配置和将返回标头的服务器端脚本有一定的控制权，或者您希望从中检索信息的站点实现了此规范。\n\n以下是使用\
  \ PHP 进行此类授权的最基本示例：\n\n```\n<?php\nheader(\"Access-Control-Allow-Origin: *\");\n\
  ?><xml>Data Sample</xml>\n```\n\n与我们的代理示例一样，如果此脚本托管在 `http://www.example1.local`，并且请求来自\
  \ `http://www.example2.local`，则请求将被正确执行，客户端将收到预期的数据。`Access-Control-Allow-Origin`\
  \ 标头设置为 `*`，它充当所有来源的通配符。\n\n当然，您可以通过显式设置 URL 将授权限制为选定的来源，在安全性方面，这是一种更好的做法。\n\n`Access-Control-Allow-Origin:\
  \ http://www.example2.local`\n\n请注意，Mobile Safari 不允许您使用此标头设置多个 URL，但规范要求浏览器应发送一个指示请求来源的\
  \ `Origin` 标头。因此，服务器端脚本将能够保存授权域列表，并在请求来自其中之一时返回相关的标头。\n\n```\n<?php\n$whitelist\
  \ = Array('http://www.example2.local', 'http://www.domain.other');\n\nforeach ($whitelist\
  \ as $origin) {\n    // 处理逻辑\n}\n```\n\n\n\n```php\nif ($_SERVER[\"HTTP_ORIGIN\"\
  ] == $origin) {\n    header(\"Access-Control-Allow-Origin: $origin\");\n    break;\n\
  }\n```\n\n## 第 12 章：Ajax 与动态内容\n\n```xml\n?>\n<xml>Data Sample</xml>\n```\n\n在此示例中，我们读取了\
  \ PHP 中对应于客户端请求头 `Origin` 的 `HTTP_ORIGIN` 服务器变量。然后，如果该请求头值出现在授权来源数组中，则发送授权信息。否则，不添加额外的请求头，请求将会失败。\n\
  \n### 实际案例：显示 Twitter 趋势\n\n如今，许多网站都提供可供使用的内容，用以丰富或点缀你的应用程序。远程数据甚至越来越频繁地附带了专门开发的\
  \ API，帮助开发者以多种方式将其集成到自己的网站中。\n\n很自然地，这些信息通常以 XML 和 JSON 格式提供。\n\n微博客服务 Twitter 就是这样的网站之一。越来越多的\
  \ API 可供开发者使用，以便追踪热门话题或针对用户帖子进行搜索。因此，构建一个能让用户随时了解 Twitter 上最热门话题的应用程序是相当容易的。\n\n\
  #### Twitter 趋势订阅源\n\n在我们的示例中，由于要处理的数据量最小，我们将展示当前最热门的话题。对于这个特定的查询，唯一可用的格式是 JSON。\n\
  \n获取 JSON 数据的 URL 是 `http://api.twitter.com/1/trends.json`。\n\n```json\n{\n    \"\
  as_of\": \"Tue, 07 Sep 2010 9:10:11 +0000\",\n    \"trends\":\n    [\n        {\n\
  \            \"url\": \"http://search.twitter.com/search?q=Apress\",\n         \
  \   \"name\": \"New Book!\"\n        }\n    ]\n}\n```\n\n查看该链接，你会发现它包含一个 JSON 对象，其中包含一个\
  \ `trends` 属性，以及一系列 `url`/`name` 键值对。以上示例仅展示了第一个趋势。\n\n#### 获取并渲染数据\n\n利用这些 JSON\
  \ 数据，我们将主要使用前几章构建的 Web 应用程序模板中的元素，来构建一个可更新的热门话题列表。首先，让我们看一下标记：\n\n```html\n...\n\
  <div class=\"header-wrapper\">\n    ...\n    <button class=\"header-button\" onclick=\"\
  init()\">Get</button>\n</div>\n<div class=\"group-wrapper\">\n    <h2>Twitter 趋势</h2>\n\
  \    <ul id=\"trends\" class=\"template\">\n        <li><a href=\"#{url}\">#{name}</a></li>\n\
  \    </ul>\n</div>\n...\n```\n\n当然，我们不想显示这个没有内容的列表；因此，我们在文档头部添加了一条规则，默认隐藏该列表。\n\n\
  ```css\n<style>\n.template { display: none; }\n</style>\n```\n\n如你所见，按钮的 `onclick`\
  \ 事件关联了一个函数调用。`init()` 函数创建一个新的 `XMLHttpRequest` 对象，并向 Twitter 网站发送一个请求。\n\n这里，我们使用了本章前面解释过的代理；`proxy.php`\
  \ 的代码与之前完全相同。\n\n```javascript\nfunction init() {\n    var xml = new XMLHttpRequest();\n\
  \    xml.onreadystatechange = showTrends;\n    xml.open(\"get\", \"proxy.php?url=\"\
  \ +\n        encodeURIComponent(\"http://api.twitter.com/1/trends.json\"));\n  \
  \  xml.send();\n}\n\nfunction buttonState() {\n    var but = document.querySelector(\"\
  button.header-button\");\n    but.disabled = true;\n}\n```\n\n同样，`showTrends()`\
  \ 中使用的 `getJSON()` 函数也正是之前用来检查 JSON 对象是否安全的那个函数。\n\n```javascript\nfunction showTrends()\
  \ {\n    if (this.readyState == this.DONE && this.status == 200) {\n        var\
  \ txt = this.responseText;\n        var json = getJSON(txt);\n        if (json)\
  \ {\n            renderTrends(json);\n            buttonState();\n        }\n  \
  \  }\n}\n```\n\n最后，一旦我们从 Twitter 网站收集并检查了 JSON 数据，就可以将数据插入到我们的模板中：\n\n```javascript\n\
  function renderTrends(feed) {\n    var list = document.getElementById(\"trends\"\
  );\n    var template = list.innerHTML;\n    var trends = feed.trends;\n    var html\
  \ = \"\";\n    for (var n = 0; n < trends.length; n++) {\n        html += applyTemplate(template,\
  \ trends[n]);\n    }\n    appendContent(list, html);\n}\n\nfunction appendContent(list,\
  \ html) {\n    var dummy = document.createElement(\"div\");\n    dummy.innerHTML\
  \ = html;\n}\n```\n\n\n\n```javascript\nlist.innerHTML = \"\";\n\nwhile(dummy.hasChildNodes())\
  \ {\n\nlist.appendChild(dummy.firstChild);\n\n}\n\nlist.className = null;\n```\n\
  \n图 12-1 展示了从 JSON 源获取趋势数据后填充的页面结果。\n\n图 12-1. 最新 Twitter 趋势\n\n## 第 12 章：Ajax 与动态内容\n\
  \n你可能会认为直接运行 `list.innerHTML = html;` 会更简单，然而，如果这样做，一个渲染问题会导致 Mobile Safari 无法将样式正确应用到列表元素上。因此，我们将\
  \ `html` 变量的内容添加到一个虚拟元素中，然后将每个节点从虚拟元素移动到 `list` 中。令人惊讶的是，这种方法比最初预期的 `innerHTML`\
  \ 方法快了两倍。\n\n### 善待等待中的用户\n\n如前所述，移动设备上的 HTTP 响应时间可能不稳定，加载时间取决于用户当前可用连接的质量。因此，特别是对于基于\
  \ Ajax 的 Web 应用，你应该始终在加载和处理期间向用户提供视觉反馈。\n\n#### 添加视觉反馈\n\n为此，你仍然可以依赖 `readyState`\
  \ 属性，通过向之前使用的函数添加一个条件来实现。例如，你可以使用一个加载旋转图标作为应接收内容元素的背景。这样做的好处是轻量且灵活。这里，我们使用在第 7 章中创建的\
  \ `BigSpinner` 对象。\n\n```javascript\nvar spinner = new BigSpinner();\n\nfunction\
  \ init() {\n\nspinner.init(\"spinner\", \"white\");\n\n...\n\n}\n\nfunction showTrends()\
  \ {\n\nif (this.readyState == this.OPENED) {\n\nbuttonState(true);\n\n} else if\
  \ (this.readyState == this.DONE && this.status == 200) {\n\n...\n\nbuttonState(false);\n\
  \n}\n\n}\n\nfunction buttonState(loading) {\n\nvar but = document.querySelector(\"\
  button.header-button\");\n\nif (loading) {\n\nbut.disabled = true;\n\nbut.className\
  \ += \" spinning\";\n\nspinner.animate();\n\n} else {\n\nbut.className = but.className.replace(\"\
  \ spinning\", \"\");\n\nspinner.stop();\n\n}\n\n}\n```\n\n新的 `buttonState()` 函数为按钮添加了一个\
  \ `.spinning` 类来显示旋转图标。为了让旋转图标显示在按钮中，你需要添加一个环绕按钮文本的 `<span>`。\n\n```html\n<button\
  \ class=\"header-button\" onclick=\"init()\"> <span> 获取</span> </button>\n```\n\n\
  最后一步是将相关样式添加到 `main.css` 文件中，以便能在其他项目中轻松使用。你可以在图 12-2 中看到最终的按钮效果。\n\n```css\n.header-wrapper\
  \ .header-button.spinning span {\n\ncolor: transparent;\n\ntext-shadow: none;\n\n\
  background: -webkit-canvas(spinner) center center no-repeat;\n\n-webkit-background-size:\
  \ auto 22px;\n\npadding: 4px;\n\nmargin: -4px;\n\n}\n```\n\n图 12-2. 旋转的按钮\n\nCSS\
  \ 类 `.spinning` 通过将按钮文本的颜色设置为透明来隐藏它，并使用 `-webkit-canvas()` 函数更改其背景。由于旋转图标有点大，我们使用\
  \ `background-size` 属性调整其大小，使其完美地适配在按钮内部。\n\n### 处理过长的等待时间\n\n此外，你应该为可能的错误或过长的等待时间做好准备。为此设置一个定时器是最直接的解决方案；根据你需要加载的内容类型，你可能需要调整一个“合理”等待时间的值。\n\
  \n```javascript\nvar timerID;\n\nfunction checkTime(msecs, ajax) {\n\ntimerID =\
  \ window.setTimeout(function() {\n\najax.abort();\n\nalert(\"服务器响应时间过长... \\n\n\n\
  请尝试重新加载此页面。\");\n\n}, msecs);\n\n}\n\nfunction showTrends() {\n\nif (this.readyState\
  \ == this.OPENED) {\n\ncheckTime(1000, this);\n\n...\n\n} else if (this.readyState\
  \ == this.DONE && this.status == 200) {\n\nwindow.clearTimeout(timerID);\n\n...\n\
  \n}\n\n}\n```\n\n特别是当一切并非完全由你掌控时，你无法确保你的应用运行毫无问题。处理可能的错误是保证良好用户体验的额外保障。\n\n## 小结\n\
  \n构建 Web 应用不应被视为一项孤立的任务。如今，Web 的丰富性部分依赖于网站之间的交互，你可以从外部资源以及众多的第三方数据源和 API 中获益匪浅，以构建更好的应用。现在，你拥有了充分利用那些促成了\
  \ Web 2.0 时代成功的元素的工具，而这些元素对于人们在消费 Web 内容方式上的未来变革也应是基础性的。\n\n请深入掌握这些内容，并进一步探索。永远记住，在使用外部内容方面，没有绝对的最佳解决方案。一种格式或技术可能更适合某个项目，而另一种则可能更适合另一个项目——更不用说并非所有方案在所有情况下都一定可用。\n\
  \n"
- "# 第 13 章\n\n使用触摸与手势事件\n\n与当今许多便携设备一样，iPhone、iPad 和 iPod touch 将手指作为唯一的指点设备。苹果的设备甚至支持多个同时接触点，结合简单直观的图形界面，使其使用流畅、高效，并且总体令用户感到愉悦。正如我们在前面章节中所述，这在用户和设备之间建立了一种近乎亲密的联系。这种特殊关系有利于逼真的设计；例如，在构建扑克游戏应用时，你可以允许用户通过简单的手指轻扫，在桌上“扔”出扑克牌，增强了真实感。\n\
  \n从操作系统版本 2.0 开始，你可以使用 Mobile Safari 的多点触控 API，将用户与你的 Web 应用之间的交互提升到一个新的水平。在本章中，我们将解释如何实现此\
  \ API 中的功能来捕获触摸事件，如何解读绝大多数用户移动操作，并最终利用这些知识构建一个简单的手写识别 Web 应用。\n\n### 如何处理事件\n\n\
  为了使用 JavaScript 捕获事件，开发者通常使用直接在元素上的 `onclick` 属性（在 HTML5 规范中已标准化）或 DOM 的 `addEventListener()`\
  \ 方法，有时并未真正理解监听器应如何组织或捕获事件的含义。透彻理解这一点对于高效处理事件至关重要。\n\n#### 处理程序的调用优先级\n\n在不考虑事件捕获的情况下，处理程序之间没有实际的优先级；它们只是按照定义的顺序被调用。因此，HTML\
  \ 标记中的事件属性通常比脚本更早被解释，事件发生时，通过属性引入的代码将首先被执行，如下例所示：\n\n```html\n<div onclick=\"console.log('attribute')\"\
  >点击我</div>\n\n<script>\n\nvar div = document.getElementsByTagName(\"div\")[0];\n\
  \ndiv.addEventListener(\"click\", function() { console.log(\"listener\") }, false);\n\
  \n</script>\n```\n\n**--- 结果 ---**\n\n```\n> attribute\n> listener\n```\n\n然而，如果使用脚本中的\
  \ `element.onclick` 定义了新的点击事件，`onclick` 属性将被覆盖，之前的处理程序将被移除，并创建一个新的处理程序：\n\n```html\n\
  <div onclick=\"console.log('attribute')\">点击我</div>\n\n<script>\n\nvar div = document.getElementsByTagName(\"\
  div\")[0];\n\ndiv.addEventListener(\"click\", function() { console.log(\"listener\"\
  ) }, false);\n\ndiv.onclick = function() { console.log(\"property\") };\n\n</script>\n\
  ```\n\n**--- 结果 ---**\n\n```\n> listener\n> property\n```\n\n属性基本上只允许你一次定义一个处理程序。但这并不意味着你在定义新处理程序时无法保留之前由属性定义的处理程序。以下是实现此目的的一种方法：\n\
  \n```javascript\n/* 首先，我们从 onclick 属性读取处理程序 */\n\nvar old = div.onclick;\n\n/* 接着，我们将所有相关函数组合到一个全局处理程序中\
  \ */\n\ndiv.onclick = function() {\n\nold();\n\nconsole.log(\"property\");\n\n};\n\
  ```\n\n**--- 结果 ---**\n\n```\n> listener\n> attribute\n> property\n```\n\n\n\n显然，这个方法并不灵活，而且它意味着你所有的处理函数只会在全局处理函数被调用时触发。在大多数情况下，应该优先使用`addEventListener()`和`removeEventListener()`方法。\n\
  \n## 第 13 章：使用触摸和手势事件\n\n### 捕获阶段\n\n`addEventListener()`方法的第三个参数指定是否仅为捕获阶段添加监听器，这意味着它不会在目标阶段和冒泡阶段被触发。捕获阶段是一种事件在分配给目标本身之前，可以被目标的父级处理的过程。\n\
  \n```\n<div>0<div>1<div>2<div>3<div>4\n<div>5</div>\n</div></div></div></div></div>\n\
  \n<script>\nvar div = document.getElementsByTagName(\"div\");\ndiv[0].addEventListener(\"\
  click\", handleEvent, false);\ndiv[1].addEventListener(\"click\", handleEvent, false);\n\
  div[2].addEventListener(\"click\", handleEvent, false);\ndiv[3].addEventListener(\"\
  click\", handleEvent, false);\ndiv[4].addEventListener(\"click\", handleEvent, false);\n\
  div[5].addEventListener(\"click\", handleEvent, false);\n\nfunction handleEvent(event)\
  \ {\n    console.log(\"(\" + event.eventPhase + \") \" + this.firstChild.nodeValue);\n\
  }\n</script>\n```\n\n在这段代码中，每个`<div>`都是下一个`<div>`的父级。因此，每次点击一个数字都会先到达直接目标（目标阶段），然后沿着\
  \ DOM 树向上移动到最顶层的祖先（冒泡阶段）。例如，点击 4 将会在控制台输出 4, 3, 2, 1, 0。当然，只有存在监听器时，祖先才会接收到事件。\n\
  \n为了精确识别事件目标，你可以依赖`Event`对象的两个属性。\n\n- `target`属性保存了事件的真实目标；在前面的例子中点击 4，它会返回一个指向包含字符串“4”的元素的引用。\n\
  - `currentTarget`属性是一个引用，指向在冒泡阶段或捕获阶段接收事件的对象。\n\n在像前面定义的这样一个处理函数中，`this`和`currentTarget`是相等的；相反，如果我们的处理函数被绑定到了一个对象，`this`将指向那个对象。此外，你可以使用`eventPhase`属性简单地确定与接收事件相关的阶段，该属性的可能取值在表\
  \ 13-1 中列出。\n\n#### 表 13-1. 不同事件阶段使用的常量\n\n| 常量 | 描述 |\n| :--- | :--- |\n| `event.CAPTURING_PHASE`\
  \ (1) | 当前事件阶段是捕获阶段。 |\n| `event.AT_TARGET` (2) | 当前事件阶段是目标阶段。 |\n| `event.BUBBLING_PHASE`\
  \ (3) | 当前事件阶段是冒泡阶段。 |\n\n现在，如果你将第一个监听器的第三个参数从`false`改为`true`，日志的顺序将会改变，因为事件将首先处于捕获阶段。控制台将显示\
  \ 0, 4, 3, 2, 1。捕获处理函数总是被添加到调用栈的顶部。\n\n### 控制事件传播\n\n如果你想精确控制 Web 应用程序中的每一次点击——例如，我们在第\
  \ 4 章中为保持应用程序全屏模式所做的那样——你需要使用捕获（将第三个参数设置为`true`）。例如，如果用户未登录，捕获可以让你阻止用户点击某些元素。`Event`对象的`stopPropagation()`方法允许你在任何选择的时刻阻止事件的传播。这样，尝试修改我们之前的处理函数如下：\n\
  \n```\ndiv[0].addEventListener(\"click\", handleEvent, true);\n...\nfunction handleEvent(event)\
  \ {\n    console.log(\"(\" + event.eventPhase + \") \" + this.firstChild.nodeValue);\n\
  \    if (event.eventPhase == event.CAPTURING_PHASE) {\n        event.stopPropagation();\n\
  \    }\n}\n```\n\n只有值 0 会被记录到控制台，这对应于第一个`<div>`的文本，因为任何子`<div>`的传播在捕获阶段就被直接停止了。这并不意味着使用相同`currentTarget`并在同一阶段定义的监听器不会被调用，但使用此方法意味着无法保证你的处理函数会被触发，因为该过程可能在任何时刻被更高层级的另一个处理程序中断。\n\
  \n### 阻止默认行为\n\n通常，局部地阻止浏览器对某些事件的默认行为也是可取的，典型情况包括在点击链接或提交按钮时更改 URL，或使用`touchstart`事件阻止手势效果。这可以通过使用`preventDefault()`方法来实现，前提是该事件可以被取消。你可以通过读取`Event`对象的`cancelable`属性来检查这一点。请注意，此方法具有不停止传播的优点。\n\
  \n### 处理函数和对象方法\n\n在某些情况下，你需要使用基于对象方法的处理函数，并且必须恢复调用上下文，如第 10 章所示，并将该方法封装在一个新的`Function`对象中。这当然意味着更多的内存使用。为了解决这个问题，从\
  \ DOM Level 2 开始，你可以使用`EventListener`接口的`handleEvent()`方法。要利用此方法的优势，你应该简单地使用`this`关键字或任何其他实现该函数的对象实例，来代替通常作为参数传递给`addEventListener()`方法的`Function`对象。\n\
  \n```\nsomeObject.addEventListener(\"click\", this, false);\n```\n\n通过这种方式，脚本引擎将寻找一个附加到`this`上的`handleEvent()`方法，并调用该方法，将`Event`派生的对象（`MouseEvent`，`TouchEvent`...）及其所有属性传递给它。当`handleEvent()`位于\
  \ window 级别或直接位于对象定义下时，可以使用关键字`this`。在其他情况下，你需要传递一个对象实例，如下所示：\n\n```\n<div>Click\
  \ Me</div>\n<script>\n/* 一个示例对象 */\nvar Example = function(name) {\n    this.name\
  \ = name;\n}\n\nExample.prototype.handleEvent = function(event) {\n    switch (event.type)\
  \ {\n        case \"mousedown\":\n        case \"mouseup\":\n            thisevent.type\
  \ + \"Handler\";\n    }\n}\n\nExample.prototype.mousedownHandler = function(event)\
  \ {\n    console.log(\"The 'mousedown' handler was called with \" + this.name +\
  \ \".\");\n}\n\nExample.prototype.mouseupHandler = function(event) {\n    console.log(\"\
  The 'mouseup' handler was called with \" + this.name + \".\");\n}\n\n/* 创建 2 个对象并将它们用作事件处理函数\
  \ */\nvar div = document.getElementsByTagName(\"div\")[0];\nvar obj1 = new Example(\"\
  Object 1\");\nvar obj2 = new Example(\"Object 2\");\ndiv.addEventListener(\"mousedown\"\
  , obj1, false);\ndiv.addEventListener(\"mouseup\", obj2, false);\n</script>\n```\n\
  \n**--- 结果 ---**\n\n```\n> The 'mousedown' handler was called with Object 1.\n>\
  \ The 'mouseup' handler was called with Object 2.\n```\n\n在这段代码中，事件的处理被委托给了`Example`的两个实例。如你所见，执行上下文得以维持，每个事件都使用预期的`name`值触发一条日志。为了方便维护，子处理函数已被外部化为特定的方法，这些方法利用\
  \ JavaScript 通过哈希表提供对象属性的能力来调用。当然，如果你使用的代码很短，你可以直接使用`switch...case`而无需任何额外的方法。\n\
  \n### Mobile Safari 中的经典事件\n\n虽然苹果便携设备不支持外部指点设备，但通常与鼠标相关的事件在 Mobile Safari 中是受支持的。然而，这用处有限，因为它们只是被模拟出来的，并且其反应可能与桌面环境中的预期有所不同。\n\
  \n#### 鼠标事件的行为\n\n\n\n### 触摸事件与多点触控\n\n尽管鼠标事件会被触发，但它们仅在用户释放手指压力后才被发送。此外，所有事件同时发送，这意味着，例如，典型的系列事件（如`mouseover`、`mousemove`、`mousedown`、`mouseup`和`click`）会在最后一个事件结束时按此精确顺序同时发送。`mouseout`事件仅当用户指向一个新的、追踪鼠标事件的元素且之前已记录过`mouseover`事件时才会发送。最后，`mousemove`事件将在手指压力结束时发送，这意味着你无法像使用真正的鼠标事件那样追踪移动。\n\
  \n这些事件都是默认`touchstart`事件行为的一部分。由于触摸事件（如我们所见）总是在常规鼠标事件之前发送，因此可以在`touchstart`事件上使用本章前面介绍的`preventDefault()`方法来阻止鼠标事件的发送。这将允许你为移动版\
  \ Safari 和经典设备浏览器定义差异化的行为。\n\n#### 滚动信息\n\n另一个有用的`scroll`事件。例如，它可以用于模拟 CSS 的`position:\
  \ fixed`规则，因为这在 iPhone 上不被支持。在桌面浏览器上，该事件会随着滚动条位置的变化而重复发送，而在移动版 Safari 上，该事件仅在用户手指离开屏幕表面时发送。这一切都表明需要特定的事件来实现与用户的交互。自\
  \ iOS 2.0 版本起，已提供适当的触摸事件。\n\n## 多点触控事件\n\n苹果公司便携设备上触摸事件相对于鼠标事件的优越效率绝非必然，其他便携设备制造商更倾向于更精确地实现鼠标事件。然而，在\
  \ iPhone、iPod touch 和 iPad 上，对触摸事件（更准确地说是使用多个同时触点的多点触控事件）的青睐，为流畅、自然且高效的导航体验奠定了基础。\n\
  \n#### 新的交互过程\n\n手指的作用类似于插入终端的多个鼠标；每个手指可以从一个点“跳”到另一个点，而鼠标只能沿着桌面移动，可能触发`mousemove`事件。此外，鼠标*通常*有几个不同的按钮，你可以通过`MouseEvent`对象的`button`属性来识别其点击。使用触摸事件，一次轻触自然只能有一种状态。\n\
  \n触摸事件基本上有三种状态。每个触摸事件以`touchstart`事件开始，以`touchend`事件结束，中间可能经过一个`touchmove`事件。与`mousemove`不同，`touchmove`在`touchstart`事件之后触发，并且无论使用多少根手指（尽管限制似乎是\
  \ 11 个同时触点），都会考虑每一个新的接触点，直到发送`touchend`事件。\n\n### 处理多点触控事件\n\n触摸事件应该像其他任何事件一样，使用`addEventListener()`和`removeEventListener()`方法来监听。但务必小心，不要随意阻止浏览过程中必要的某些手势，例如平移。一个像下面这样简单的示例会阻止用户平移以发现视口外的页面部分，或显示隐藏的地址栏：\n\
  \n```javascript\ndocument.addEventListener(\"touchstart\", function(event) {\n \
  \   event.preventDefault();\n}, false);\n```\n\niOS 有几个预定义的多点触控手势，例如捏合（缩放）或旋转。大多数手势可以使用触摸事件来覆盖。我们很快会详细讨论手势。\n\
  \n**警告**：作为一般规则，在修改浏览器和操作系统界面的默认行为时，务必极其小心。用户有其习惯和预期，当这些被改变或辜负时，会严重损害用户体验的质量。\n\n\
  ### 无限触点\n\n\n\n可以同时捕获的事件数量理论上不应成为开发过程中的限制，因为每根手指都可以舒适地处理一个事件。每个手指的位置可以通过新的`TouchEvent`对象及其`touches`属性获取。该属性提供一个`TouchList`，其中包含每个接触点的`Touch`对象，无论事件目标如何。每当检测到新的手指按压时，就会触发新的`touchstart`事件，列表也会随之更新，添加一个新的`Touch`对象。\n\
  \n还有另外两个使用`TouchList`对象的属性：`targetTouches`，它包含所有与触发事件的目标相关的`Touch`对象；以及`changedTouches`，应按如下示例使用：\n\
  \n```html\n<!DOCTYPE html>\n<html>\n<head>\n<title>Multi-Touch Demo</title>\n<meta\
  \ name=\"viewport\" content=\"width=device-width; initial-scale=1.0; maximum-scale=1.0;\
  \ user-scalable=no\">\n<style>\ndiv {\n  -webkit-user-select: none;\n  position:\
  \ absolute;\n  width: 44px;\n  height: 44px;\n  text-align: center;\n  background-color:\
  \ black;\n  -webkit-border-radius: 22px;\n}\ndiv span {\n  display: block;\n  font:\
  \ bold 9px/15px sans-serif;\n  margin-top: -15px;\n}\n</style>\n<script>\ndocument.addEventListener(\"\
  touchstart\", handleTouch, false);\ndocument.addEventListener(\"touchmove\", handleTouch,\
  \ false);\ndocument.addEventListener(\"touchend\", handleTouch, false);\nfunction\
  \ handleTouch(event) {\n  var touch = event.changedTouches;\n  for (var n = 0; n\
  \ < touch.length; n++) {\n    var id = \"i\" + touch[n].identifier;\n    var div\
  \ = document.getElementById(id);\n    if (!div) {\n      div = document.createElement(\"\
  div\");\n      div.innerHTML = \"<span>\" + id.substr(1) + \"<span>\"; div.id =\
  \ id;\n      document.body.appendChild(div);\n    }\n    div.style.left = (touch[n].pageX\
  \ - 22) + \"px\";\n    div.style.top = (touch[n].pageY - 22) + \"px\";\n    div.style.opacity\
  \ = (event.type == \"touchend\") ? 0.05 : 1.0;\n  }\n  event.preventDefault();\n\
  }\n</script>\n</head>\n<body></body>\n</html>\n```\n\n这段代码会为每个新的接触点（图 13-1）添加一个圆盘状的`<div>`，并跟随手指移动，实现拖放效果。为了确定新的接触点，我们使用了`changedTouches`属性，该属性包含了所有触发事件的、新增或修改的`Touch`对象。这同样与初始对象目标无关，允许你仅删除相关的元素。\n\
  \n**图 13-1.** iPad 屏幕上的每次手指触摸都由一个圆圈表示\n\n> **警告：** 从 iOS 3.2 版本开始，`touchend`事件的触摸属性变得不可靠，`touches`和`targetTouches`将始终为空。这意味着只有`changedTarget`属性能够让你适当地处理触摸释放，但它会包含所有当前的触摸点，使其使用变得困难，甚至不可能。如果你需要使用此事件，请在\
  \ iPad 上彻底测试，以免应用上线时出现意外问题。\n\n`Touch`对象有一个`identifier`属性，为每个实例保存一个唯一标识符。由于触摸发生的顺序不固定，且用户可能按特定顺序触摸屏幕却无序地移开手指，我们使用该属性来识别之前创建的`<div>`。因为系统可能会回收和重用标识符，我们不会删除之前的圆盘；相反，当标识符被回收时，我们通过改变其透明度来观察其移动。\n\
  \n**表 13-2.** `Touch`对象的属性\n\n| 属性 | 描述 |\n| :--- | :--- |\n| `touch.pageX` 和 `touch.pageY`\
  \ | 表示触摸事件相对于完整页面的位置。 |\n| `touch.clientX` 和 `touch.clientY` | 应表示事件相对于客户端区域的位置，但返回与`pageX`和`pageY`相同的值。\
  \ |\n| `touch.screenX` 和 `touch.screenY` | 应表示事件相对于屏幕的位置，但返回与`pageX`和`pageY`相同的值。但会根据视口的缩放比例进行调整。\
  \ |\n| `touch.identifier` | `Touch`实例的唯一标识符。 |\n\n\n\n`*.target`\n\n该触摸事件的事件目标。\n\
  \n表 13-2 描述了`Touch`对象可用的所有属性。如你所见，尽管该对象包含三个不同属性以根据需求精确定位事件，但它们返回的值均相同。另请注意，虽然`TouchEvent`对象包含`pageX`和`pageY`属性，但这两个属性始终返回`0`，因此你必须始终依赖`Touch`对象本身的属性。\n\
  \n### 被取消的触摸事件\n\n操作系统可随时终止触摸序列，此时会触发`touchcancel`事件。例如，当操作系统启动内部事件（如长按触发复制/粘贴操作并选中用户指向的元素）时就会发生这种情况。使用此事件可让你正确终止代码执行，因为任何当前或待处理的操作都不会继续。\n\
  \n### 基于触摸与变换构建的页面视图\n\n在经典网页中，通常将事件与标记变化（如下拉菜单显示）关联。使用移动版 Safari 时，你可以在元素移动时利用流畅的\
  \ CSS 过渡效果。在以下示例中，我们将使用多点触摸事件和过渡实现拖放功能，以达成类似 iPhone 相册应用的行为。在 Cocoa Touch 中，这可通过`UIPageView`对象实现。\n\
  \n#### 我们将要做什么\n\n相册中通常包含多张图片，但无需为每张图片创建占位，因为一次只聚焦一张图片。当用户向左或向右移动图片时，会露出上一张或下一张图片的部分内容。这意味着我们只需要三个显示图片的区域，如图\
  \ 13-2 所示。\n\n**图 13-2.** 页面视图模板\n\n每次向右移动时，左侧的图片节点将移至聚焦区域，右侧区域将移至聚焦区域左侧（向左移动则相反）。每次移动后，隐藏区域的占位符需更新为显示对应的新图片。\n\
  \n#### 容器\n\n我们希望动态创建这三个必要区域，以便更轻松地处理页面视图。我们只需定义一个带尺寸的容器（使用`.pageview-wrapper`类）。以下是设置这些区域所需的样式：\n\
  \n```css\n.pageview-wrapper {\nposition: relative;\noverflow: hidden;\n}\n.pageview-wrapper\
  \ div {\nposition: absolute;\ntop: 0;\nleft: 0;\nwidth: 100%;\nheight: 100%;\n}\n\
  .pageview-group div {\nborder: solid 5px black;\n-webkit-box-sizing: border-box;\n\
  }\n.pageview-group div:first-child { left: -100%; }\n.pageview-group div:last-child\
  \ { left: +100%; }\n```\n\n我们的三个区域采用绝对定位以便于布局，并将它们分组到同一个容器（`.pageview-group`）中，这样它们无需独立移动，所需代码也更少。为了让区域即使未显示图片也可见，我们为区域添加了边框。接下来，只需为容器设置尺寸：\n\
  \n```css\nhtml, body {\nmargin: 0;\nheight: 100%;\n}\n.box {\nwidth: 100%;\nheight:\
  \ 100%;\nbackground-color: lightgrey;\n}\n```\n\n在本示例中，我们为容器设置了相对宽度，使其占据测试设备的所有可用空间。当然，你可以根据需要设置任意尺寸。\n\
  \nHTML 标记中的容器定义非常简单：\n\n```html\n<div class=\"box pageview-wrapper\"></div>\n```\n\
  \n目前，这只会显示一个灰色矩形。组和区域将在我们即将创建的`PageView`对象初始化时添加。\n\n#### 引入元素与交互\n\n\n```javascript\n\
  var PageView = function(target) {\n\n  this.target = target;\n\n  this.state = this.WAITING;\n\
  \n  /* 初始化阶段 */\n\n  this.createElements();\n\n  this.registerEvents();\n\n}\n\n\
  /* PageView 正在等待用户操作 */\n\nPageView.prototype.__defineGetter__(\"WAITING\", function()\
  \ { return 0 });\n\n/* 用户指向了 PageView 容器 */\n\nPageView.prototype.__defineGetter__(\"\
  ATTACHED\", function() { return 1 });\n\n/* 用户释放容器，PageView 正在移动到新位置 */\n\nPageView.prototype.__defineGetter__(\"\
  DETACHING\", function() { return 2 });\n```\n\n这里创建的 `PageView` 对象会添加必要的元素，以便在我们的容器中实现分页功能，并处理与图片区域移动相关的用户事件。\n\
  \n容器作为参数传递给构造函数，并存储在 `target` 属性中。然后，通过 getter 中定义的常量将页面视图状态设置为 `WAITING`。随后构造函数调用初始化方法。\n\
  \n```javascript\nPageView.prototype.createElements = function() {\n\n  /* 创建页面组\
  \ */\n\n  this.group = document.createElement(\"div\");\n\n  this.group.className\
  \ = \"pageview-group\";\n\n  this.target.appendChild(this.group);\n\n  /* 添加 3 个页面\
  \ */\n\n  for (var n = 0; n < 3; n++) {\n\n    var div = document.createElement(\"\
  div\");\n\n    this.group.appendChild(div);\n\n  }\n\n}\n\nPageView.prototype.registerEvents\
  \ = function() {\n\n  this.target.addEventListener(\"touchstart\", this, false);\n\
  \n  this.target.addEventListener(\"touchmove\", this, false);\n\n  this.target.addEventListener(\"\
  touchend\", this, false);\n\n}\n```\n\n`createElements()` 方法创建页面组，当用户想要改变焦点图片时，该页面组会被移动。三个页面被添加到这个容器中，并且触摸事件监听器被附加到主容器上。因为我们传递了\
  \ `this` 作为处理器，所以需要定义一个 `handleEvent()` 方法，如前所述。\n\n```javascript\nPageView.prototype.handleEvent\
  \ = function(event) {\n\n  switch (event.type) {\n\n    case \"touchstart\":\n\n\
  \    case \"touchmove\":\n\n    case \"touchend\":\n\n      var handler = event.type\
  \ + \"Handler\";\n\n      thishandler;\n\n  }\n\n}\n```\n\n然后，每个事件被定向到相应的函数。\n\n\
  ```javascript\nPageView.prototype.touchstartHandler = function(event) {\n\n  if\
  \ (this.state == this.DETACHING) {\n\n    return;\n\n  }\n\n  this.state = this.ATTACHED;\n\
  \n  this.origin = event.touches[0].pageX;\n\n  event.preventDefault();\n\n}\n```\n\
  \n当用户触摸 `PageView` 容器时，状态变为 `ATTACHED`，表示对象应该捕获用户操作。手指移动的起点被记录下来，`origin` 属性将让我们在\
  \ `touchmove` 事件期间计算移动距离。\n\n为了阻止任何不相关行为，我们还取消了浏览器的任何默认操作。\n\n```javascript\nPageView.prototype.touchmoveHandler\
  \ = function(event) {\n\n  if (this.state != this.ATTACHED) {\n\n    return;\n\n\
  \  }\n\n  var distance = event.touches[0].pageX - this.origin;\n\n  this.group.style.webkitTransform\
  \ = \"translate3d(\" + distance + \"px, 0, 0)\";\n\n}\n```\n\n当用户沿着屏幕移动手指时，我们调整页面组的位置以使其同步移动。如第\
  \ 9 章所述，`translateX()` 方法目前因缺乏流畅性而不可靠。我们依赖于没有此问题的 `translate3d()` 方法。\n\n当用户释放压力时，我们需要激活新聚焦的图片。\n\
  \n因为我们不希望页面视图从一个区域突然跳到另一个区域，所以我们使用 CSS 过渡。这样，区域就能平滑地移动到它们的新位置。使用过渡要求将整个控制（时间、缓动函数）转移到样式表中，这使得过渡比在\
  \ JavaScript 中硬编码的值更容易维护。\n\n```css\n.pageview-group {\n\n  -webkit-transition:\
  \ -webkit-transform 0.35s ease-out;\n\n}\n```\n\n为了防止在 `touchmove` 事件期间发生过渡，有必要修改\
  \ `createElements()` 方法，将时间初始化为 0，这将阻止过渡的发生。\n\n```javascript\nPageView.prototype.createElements\
  \ = function() {\n\n  /* 创建页面组 */\n\n  this.group = document.createElement(\"div\"\
  );\n\n  this.group.className = \"pageview-group\";\n\n  this.group.style.webkitTransitionDuration\
  \ = 0;\n\n  this.target.appendChild(this.group);\n\n  ...\n\n}\n```\n\n此外，如果没有在全局范围内对绝对定位元素进行光栅化处理，动画期间可能会出现闪烁。从一个状态到另一个状态的转换偶尔会导致渲染近似，特别是对于大型元素。这种差异在\
  \ iPad 上尤为明显。这可以通过简单地将以下 CSS 属性添加到要动画化的元素来解决。\n\n> **注意：** 当处理非常大的元素时，如果不需要让元素的背面可见，将\
  \ `backface-visibility` 属性设置为 `hidden` 将提高性能。\n\n```css\n.pageview-wrapper div {\n\
  \n  -webkit-transform: translate3d(0, 0, 0);\n\n  position: absolute;\n\n  ...\n\
  \n}\n```\n\n我们现在可以定义 `touchend` 事件的处理器：\n\n```javascript\nPageView.prototype.touchendHandler\
  \ = function(event) {\n\n  if (this.state == this.DETACHING) {\n\n    return;\n\n\
  \  }\n\n  var matrix = new WebKitCSSMatrix(this.group.style.webkitTransform);\n\n\
  \  if (matrix.e == 0) {\n\n    this.state = this.WAITING;\n\n  } else {\n\n    var\
  \ jump = this.target.offsetWidth;\n\n    matrix.e = (matrix.e > 0) ? +jump : -jump;\n\
