  \n```\nCompass.prototype.drawDirectionArrow = function() {\n    var ctx = this.context;\n\
  \    ctx.save();\n```\n\n\n`ctx.translate(0, -59);`\n\n`ctx.strokeStyle = \"rgba(0,\
  \ 0, 0, 0.25)\";`\n\n`ctx.beginPath();`\n\n`ctx.moveTo(-10, 0);`\n\n`ctx.lineTo(0,\
  \ -10);`\n\n`ctx.lineTo(10, 0);`\n\n`ctx.stroke();`\n\n`ctx.strokeStyle = \"rgba(255,\
