  \ 0);`\n\n`ctx.stroke();`\n\n`ctx.restore();`\n\n# 第 14 章：基于位置的 Web 应用\n\n罗盘上最后要添加的元素是另一个箭头，它将指示用户的朝向。这个箭头不会移动：它只提供用户指向方向的恒定指示，使罗盘更易读。\n\
  \n### 向文档中添加元素\n\n我们添加罗盘元素的文档基于第 4 章创建的 Web 应用模板。只需按如下方式修改`index.html`文件：\n\n```html\n\
  <body onload=\"init()\">\n<div class=\"view\">\n  <div class=\"header-wrapper\"\
  >\n    <h1> 朝向</h1>\n  </div>\n  <div id=\"compass\"><div></div></div>\n</div>\n\
  </body>\n```\n\n为了使页面呈现更合适、更吸引人，请将以下样式添加到新的`compass.css`样式表中。它们会添加棕色渐变背景和半透明页眉。\n\
  \n```css\n.view {\n  background: -webkit-gradient(radial,\n    0 0, 0, 0 0, 300,\n\
  \    from(#a98), to(#654));\n}\n.header-wrapper { background-color: transparent;\
  \ }\n```\n\n为了使所有元素在可用空间中恰当组合，还需要将以下规则添加到样式表中：\n\n```css\n#compass div {\n  position:\
  \ relative;\n  margin: 0 auto;\n  top: 10px;\n}\n#compass canvas {\n  display: block;\n\
  \  margin: 0 auto;\n}\n#compass img {\n  position: absolute;\n  top: 0;\n  left:\
  \ 0;\n}\n```\n\n要完成罗盘构建的第一部分，你必须在`compass.js`文件中添加初始化罗盘的代码。\n\n## 第 14 章：基于位置的 Web\
  \ 应用\n\n```javascript\nconst COMPASS_SIZE = 220;\nvar compass = new Compass(COMPASS_SIZE);\n\
  \nfunction init() {\n  var target = document.querySelector(\"#compass div\");\n\
  \  target.style.width = COMPASS_SIZE + \"px\";\n  compass.render(target);\n}\n```\n\
  \n接下来，我们需要添加必要的代码来收集、处理和显示定位数据。\n\n### 准备文档以接收位置数据\n\n为了解释计算距离和方位的方法，我们将计算用户到苹果总部的距离以及前往那里的方向。此外，我们还将显示用户的位置（经度和纬度）。以下元素被添加到\
  \ HTML 文档中：\n\n```html\n...\n<div id=\"compass\"><div></div></div>\n<div class=\"\
  list-wrapper\">\n  <div id=\"location\">纬度 | 经度</div>\n  <ul>\n    <li><span>0</span>距苹果总部的距离</li>\n\
  \    <li><span>0</span>方位</li>\n    <li><span>0</span>当前速度</li>\n    <li><span>0</span>定位精度</li>\n\
  \  </ul>\n</div>\n...\n```\n\n以下样式规则将使我们的字段紧贴屏幕底部：\n\n```css\n.list-wrapper {\n\
  \  position: absolute;\n  width: 100%;\n  bottom: 0;\n  border-top: solid 1px black;\n\
  }\n#location {\n  position: absolute;\n  bottom: 140px;\n  font-size: 10px;\n  color:\
  \ white;\n  text-shadow: rgba(0,0,0,0.7) 0 -1px 0;\n  width: 100%;\n  text-align:\
  \ center;\n}\n.list-wrapper li {\n  font-size: 12px;\n  line-height: 1;\n}\n```\n\
  \n## 第 14 章：基于位置的 Web 应用\n\n```css\n.list-wrapper li span { float: right; }\n```\n\
  \n页眉和列表项将通过`watchPosition()`方法的回调进行更新。\n\n### 使用位置数据\n\n朝向（用户行进的方向）仅在用户移动且设备收集的数据精度足够高时可用，因为我们需要两个点来确定这一信息。与之前一样，我们将使用跟踪功能。以下是初始化函数需要修改的方式：\n\
  \n```javascript\nfunction init() {\n  ...\n  window.navigator.geolocation.watchPosition(successCallback,\n\
  \    null, { enableHighAccuracy: true });\n}\n```\n\n如前所述，所需数据需要足够精确，API 才能确定朝向。为此，我们将`enableHighAccuracy`参数强制设为`true`，以确保在可用的情况下激活\
  \ A-GPS。其他一切操作都在以下展示的`successCallback()`函数中完成：\n\n```javascript\nvar appleLocation\
  \ = {\n  coords: {\n    latitude : 37.331689,\n```\n\n\n\n`longitude: -122.030731`\n\
  \n```\nfunction successCallback(position) {\n  /* 追加位置信息 */\n  var loc = document.getElementById(\"\
  location\");\n  loc.textContent = position.coords.latitude + \" | \" + position.coords.longitude;\n\
  \n  /* 读取并计算数据 */\n  var heading = position.coords.heading || 0;\n  var accuracy\
  \ = position.coords.accuracy;\n  var speed = position.coords.speed;\n  var bearing\
  \ = computeBearing(position, appleLocation);\n  var distance = computeDistance(position,\
  \ appleLocation);\n\n  /* 显示当前格式化的方向角 */\n  var header = document.querySelector(\"\
  .header-wrapper h1\");\n  header.innerHTML = getAngleString(heading);\n\n  var list\
  \ = document.querySelectorAll(\"li span\");\n  list[0].textContent = round(distance,\
  \ 3) + \"mi\";\n  list[1].innerHTML = getAngleString(bearing);\n  list[2].textContent\
  \ = round(speed, 2) + \"m/s\";\n  list[3].textContent = round(accuracy, 2) + \"\
  m\";\n}\n```\n\n## 第 14 章：基于位置感知的网页应用程序\n\n首先，我们在位置容器内显示用户的当前位置。然后，我们读取`heading`、`accuracy`和`speed`的值，并使用`appleLocation`位置计算`bearing`（方位角）和`distance`（距离）。随后，将这些数据添加到`header`（`heading`）和`list`（所有其他元素）中。\n\
  \n该回调函数使用了两个实用函数：一个用于格式化角度，通过指示其在罗盘玫瑰图上的位置（四个基本方位点以及四个中间方位点）；另一个用于将浮点数值四舍五入，精度作为参数传入。\n\
  \n```\nfunction getAngleString(angle) {\n  var position = ((angle + 45 / 2) / 45\
  \ | 0) % 8 * 2;\n  return (angle * 10 | 0) / 10 + \"&deg;\" + (\"N NEE SES SWW NW\"\
  .substr(position, 2));\n}\n\nfunction round(value, prec) {\n  prec = Math.pow(10,\
  \ prec);\n  return ((value || 0) * prec << 0) / prec;\n}\n```\n\n在此阶段，如果启动网页应用程序，数据会出现在预期的位置，但罗盘的任何元素都不会移动。最后一步是将信息转化为罗盘的视觉变化。\n\
  \n### 为罗盘添加动画效果\n\n为了在指针和刻度盘的不同状态之间实现动画过渡，我们将使用第 9 章介绍的 CSS 动画。在普通罗盘上，刻度盘本身不会移动：使用者拿起罗盘，等待指针指向北方，然后转动罗盘来确定自己要转向哪个方向。为了避免用户反复转动他们的设备，我们将让刻度盘转动——与方向指针稍有错时，以产生逼真的效果。同样，方位指针移动速度会更慢，使罗盘更易读。\n\
  \n为元素添加动画效果所需的代码并不多。只需将以下内容添加到您的`compass.css`文件中：\n\n```\n#compass img {\n  ...\n\
  \  -webkit-transform-origin: 50% 50%;\n  -webkit-transform: rotate(0);\n  -webkit-transition-property:\
  \ -webkit-transform;\n  -webkit-transition-timing-function: ease-out;\n}\n```\n\n\
  当然，这仅处理了动画本身。元素的状态由 JavaScript 控制。只有在方向数据可用时才能发生旋转，以下代码对此进行了检查：\n\n```\nfunction\
  \ successCallback(position) {\n  ...\n  if (position.coords.heading != null) {\n\
  \    compass.setHeading(heading);\n    compass.setBearing(bearing - position.coords.heading);\n\
  \  }\n```\n\n方位角应根据方向角进行调整，以便指针相对于用户的方向指向正确的方向。因此，我们从方位角的角度中减去方向角的角度。以下是相关的函数：\n\
  \n```\nCompass.prototype.setBearing = function(deg) {\n  this.rotate(this.bearingNeedle,\
  \ deg);\n}\n\nCompass.prototype.setHeading = function(deg) {\n  this.rotate(this.headingNeedle,\
  \ -deg);\n  this.rotate(this.dialGraduations, -deg);\n}\n```\n\n我们的三个元素将错时移动。动画的持续时间通过以下代码定义，该代码应添加到`Compass`对象的构造函数中：\n\
  \n```\nvar Compass = function(size) {\n  ...\n  this.dialShine = new Image();\n\
  \  this.dialGraduations.style.webkitTransitionDuration = \"2s\";\n```\n\n\n\n`this.bearingNeedle.style.webkitTransitionDuration\
  \ = \"5s\";`\n\n`this.headingNeedle.style.webkitTransitionDuration = \"3s\";`\n\n\
  ...\n\n}\n\n`rotate()` 方法稍微复杂一些，因为在动画完成之前，有可能收到新的航向值。在这种情况下，有必要从动画的当前位置开始下一次旋转，这样元素就不会从一个位置跳到另一个位置。为此，我们求助于\
  \ `CSSMatrix` 对象。\n\n```\nCompass.prototype.rotate = function(item, deg) {\n  var\
  \ gs = window.getComputedStyle(item);\n  var mx = new WebKitCSSMatrix(gs.webkitTransform);\n\
  \  var current = toDeg(Math.acos(mx.a));\n  /* 调整象限 */\n  if (mx.b < 0) {\n    current\
  \ = 360 - current;\n  }\n  var delta = deg - current;\n  item.style.webkitTransform\
  \ = mx.rotate(delta);\n}\n```\n\n首先，我们读取当前的矩阵，它反映了过渡的位置。这让我们可以推导出当前应用于元素的角度。然后，我们使用二维矩阵应用顺时针旋转。\n\
  \n![](img/index-451_1.jpg)\n\n## 第 14 章：位置感知的 Web 应用程序\n\n利用这个矩阵和一点三角学，我们可以通过读取矩阵第一个元素（`mx.a`）的反余弦值来评估当前角度，并根据正弦值（`mx.b`）的符号将角度定位到正确的象限。然后，可以通过从所需角度中减去当前角度来计算要应用的新角度。`rotate()`\
  \ 方法允许你简单地应用新角度，并将动画恢复到其新位置。图 14-5 显示了最终结果。\n\n**图 14-5.** 指南针及与用户位置相关的数据\n\n###\
  \ 防止指针晃动\n\n因为位置信息每秒会发送多次，所以在渲染引擎仍在处理旋转矩阵时，可能会发送新的航向值。在这种情况下，存在将当前位置视为初始位置（旋转前）的风险，这会导致指针从一个点跳到另一个点。为了防止这种行为，并且不让引擎进行无用的计算，我们将对接收数据的读取进行限时。\n\
  \n```\nvar prevTime = 0;\nfunction successCallback(position) {\n  if ((new Date()\
  \ - prevTime) < 1500) {\n    return;\n  }\n  prevTime = new Date().getTime();\n\
  \  ...\n}\n```\n\n这样，数据将仅每隔一秒半读取一次，给渲染引擎留出足够的时间，以便在过渡期间应用当前矩阵并实际产生预期效果。\n\n## 总结\n\
  \n`Geolocation` API 允许你获取有用的数据并构建新型应用程序，为在现代设备上进行创新开发开辟了道路。由于该 API 是 W3C 规范的一种实现，为\
  \ iPhone、iPod touch 或 iPad 构建的应用程序可能很快就能在所有现代浏览器上使用。\n\n实际上，Apple 在将桌面版 API 之前，就已经在\
  \ Mobile Safari 上提供了这个 API。同样，熟悉这个 API 是一个非常棒的举措，因为基于位置的服务很可能变得越来越流行，从而为用户带来新的期望。最明智的使用方式可能是利用这个\
  \ API 为不特定于位置的应用程序增加价值，作为用户的额外服务。因此，抓住这个机会，更进一步吧。\n\n下载自 Wow! eBook <www.wowebook.com>\n\
  \n# 第 15 章  \n更好地处理客户端数据存储\n\n多年来，当需要在客户端存储数据以增强页面功能或使其正常工作，开发者只能依赖 Cookie。尽管这对各种应用来说运行良好，但\
  \ Cookie 存在局限性，使其不太适合开发复杂功能。在存储标识符或会话信息（如购物车数据）时，大小限制不是问题，但在处理更复杂的任务（例如日历同步）时，这些限制就变得难以应对了。\n\
  \n这并不意味着客户端存储不是一种有益的做法：限制客户端和服务器之间传输的数据量自然会提高页面的响应性，从而带来更好的用户体验。然而，在处理 Cookie 时，这只有部分是正确的，因为\
  \ Cookie 会随每个请求（无论是下载图像、样式表还是其他任何内容）一起发送，无谓地使每次传输的每个元素变得更重。\n\n在本章中，你将深入了解通过 JavaScript\
  \ API 提供给开发者的新的客户端存储选项，并学习如何使用 HTML5 的新功能正确处理离线模式。\n\n### 不同的存储区域\n\n为了使客户端存储的持久性更加灵活，并突破\
  \ Cookie 带来的限制，现在可以依赖由 WHATWG 维护的 Web Storage API。该规范定义了一个新的 `Storage` 接口，该接口由 `window`\
  \ 对象的全新 `localStorage` 和 `sessionStorage` 属性实现。\n\n与 Cookie 相比，这种存储模式的优势之一是大小限制为\
  \ 5MB 而不是 4KB；此限制适用于完全限定域名 (FQDN)。一旦达到此配额，你将无法再向客户端存储数据，并会收到一个 `QUOTA_EXCEEDED_ERR`（图\
  \ 15-1）。\n\n![](img/index-454_1.jpg)\n\n**图 15-1.** 尝试存储超出最大限制的数据时会发送错误\n\n可以说，`sessionStorage`\
  \ 属性类似于会话 Cookie，它跨浏览上下文可用，并在用户退出浏览应用程序时被删除。然而，在讨论 Cookie 或 `sessionStorage` 属性时，*会话*\
  \ 的含义略有不同。`localStorage` 属性的行为或多或少类似于永不过期的 Cookie，这意味着使用此属性存储的数据将持续存在，直到被脚本或用户操作删除。这两个属性的工作方式与\
  \ Cookie 非常相似，只是访问存储的数据不像 Cookie 那样受路径影响，而是基于方案/主机/端口的源规则。\n\n### 如何使用新的存储能力\n\n\
  使用 Web Storage API 存储数据，如同创建 Cookie 一样，依赖于键/值对。键可以定义为任何有效的字符串——包括空字符串。在 Mobile Safari\
  \ 中 API 的当前实现中，值也只能是有效的字符串。因此，如果你尝试存储一个对象，存储的数据将是调用了其 `toString()` 方法后的对象。根据规范，你应该能够以克隆（而非引用）的形式存储多种对象，因此存储对象的功能应该很快就能实现。\n\
  \n这种类型限制适用于所有对象，包括数值。例如，如果你想使用一个键来存储计数器，不要忘记在递增或递减之前，将检索到的数据转换回 `Number` 对象，否则字符串只会简单地与\
  \ 1 拼接。另外，由于字符串使用 UTF-16 存储，一个字符占用两个字节，因此占用更多空间；因此，例如要存储 `Date` 对象，你应该存储 `getTime()`\
  \ 方法的值，而不是 `toString()` 方法返回的值。\n\n然而，与使用 Cookie 设置或获取值的过程相比，这些限制微不足道。使用 Web Storage\
  \ API 进行这些基本操作非常简单。该 API 提供了专门的方法来插入、读取或删除值。\n\n```\n/* 写入数据 */\nwindow.localStorage.setItem(\"\
  myKey\", \"myValue\");\nwindow.localStorage.setItem(\"anotherKey\", \"myOtherValue\"\
  );\n\n/* 读取数据 */\nvar value1 = window.localStorage.getItem(\"myKey\");\nvar value2\
  \ = window.localStorage.getItem(\"anotherKey\");\n\n/* 删除数据 */\nwindow.localStorage.removeItem(\"\
  myKey\");\n```\n\n\n\n所有键都能轻松独立访问，因为你可以像浏览对象一样浏览存储的数据。以下代码与前面代码功能相同：\n\n/* 写入数据\
  \ */\n`window.localStorage.myKey = \"myValue\";`\n`window.localStorage.anotherKey\
  \ = \"myOtherValue\";`\n\n/* 读取数据 */\n`var value1 = window.localStorage.myKey; //\
  \ \"myValue\"`\n`var value2 = window.localStorage.anotherKey; // \"myOtherValue\"\
  `\n\n/* 删除数据 */\n`delete window.localStorage.myKey;`\n\n要整体操作`Storage`对象，你还可以依赖两个实用方法：`clear()`方法将删除所有键值对以重置对象，而`key()`方法允许你通过索引而非名称来定位键。\n\
  \n```\nfor (var i = 0; i < window.localStorage.length; i++) {\n    console.log(i\
  \ + \": \" + window.localStorage.key(i));\n}\n```\n\n--- 结果 ---\n```\n0: myKey\n\
  1: anotherKey\n```\n\n与大多数键值对集合一样，键的显示顺序不可预测；但只要没有修改过任何键，顺序应保持不变。\n\n### `sessionStorage`\
  \ 的特定行为\n\n在用户退出浏览器之前，会话 cookie 在用户当前浏览的任何窗口或标签页中都有效。这意味着，例如，如果用户在当前窗口中打开新文档、在不同窗口中打开同一网站或关闭在线商店所在的标签页，用户放入在线购物车的任何商品都将保留在内存中。\n\
  \n这种方案的缺点在于，用户若想使用两个不同的购物车浏览同一购物网站（例如使用不同的信用卡、投递到不同地址等情况），则需要使用两个不同的浏览器（例如 Safari\
  \ 和 Firefox），或者完成第一个会话后关闭浏览器，再开始第二个会话。\n\n`sessionStorage`对象的工作方式不同。Cookie 与浏览器会话相关，而`localStorage`对象为同一源创建一个唯一的`Storage`对象实例，但`sessionStorage`会为每个浏览上下文创建一个`Storage`对象实例，并由初始上下文创建的任何浏览上下文继承。这意味着框架（子浏览上下文）可以访问与宿主文档相同的`sessionStorage`对象；然而，如果从父窗口打开一个新窗口（辅助浏览上下文），这个新浏览上下文将能访问初始`Storage`对象的副本，该副本随后将独立于第一个对象进行修改。\n\
  \n在移动版 Safari 中，这仅适用于通过脚本打开的窗口。实际上，由`target`属性打开的窗口将被视为用户主动操作后打开的。这意味着当用户打开新窗口或标签页时，系统会为其分配一个全新的空`sessionStorage`对象。当然，该对象的内容只能从同一源访问。关于浏览上下文的更多细节，可参考第\
  \ 11 章。\n\n### 监听存储区域修改通知\n\n每次存储区域被修改时，都会触发一个`storage`事件，该事件无法取消且不会冒泡。它可以像`DOMWindow`对象的其他事件一样被捕获。\n\
  \n```\nwindow.addEventListener(\"storage\", function(event) {\n    /* 对 StorageEvent\
  \ 对象进行操作 */\n}, false);\n```\n\n该事件会发送给所有使用被修改存储区域的文档，但修改该存储区域的文档除外。这意味着如果只有修改存储区域的文档本身在使用该存储区域，则不会触发任何事件。相反，如果该文档包含`<iframe>`，无论存储区域是从`<iframe>`还是主文档修改，另一个浏览上下文都会收到通知。\n\
  \n`storage`事件允许你控制修改行为，例如仅允许来自主文档的变更。但要注意避免引发无限的事件交换，例如设置每个浏览上下文拒绝其他上下文的修改。此外，`storage`事件不会发送给执行操作的文档，这也是防止这种情况的一项措施。\n\
  \n表 15–1 列出了传递给处理程序的`StorageEvent`对象的属性。注意，在工作草案指定`url`属性的地方，WebKit 实现使用了`uri`属性。\n\
  \n**表 15–1.** `StorageEvent`对象的属性\n\n| 属性 | 描述 |\n| :--- | :--- |\n| `event.storageArea`\
  \ | 已被修改的存储区域。 |\n| `event.key` | 已从`Storage`对象中添加、修改或删除的键。 |\n| `event.oldValue`\
  \ | 修改前与键关联的值。 |\n| `event.newValue` | 修改后与键关联的值。 |\n| `event.uri` | 执行修改操作的文档地址。\
  \ |\n\n使用`setItem()`和`removeItem()`方法时，`key`、`oldValue`和`newValue`属性值将按表 15–1 所示进行设置。另一方面，使用`clear()`时，这三个属性都将设置为`null`，便于识别何时调用该方法来更改项目值。在所有情况下，`storageArea`和`uri`属性都会被设置，以便识别事件来源。\n\
  \n### 安全与隐私考量\n\n与处理 cookie 或跨文档通信时一样，你会遇到源于安全风险的限制。首先，尽管`Storage`对象的大小限制远没有 cookie\
  \ 那么严格，但其设置是为了防止拒绝服务攻击。\n\n对存储区域的访问仅限于协议/主机/端口三元组，且目前无法使用 DOM Level 1 可访问的`Document`对象的`domain`属性来放宽存储访问权限。与\
  \ cookie 相比这是一个限制，但也使这种存储方式更加安全，尤其是在使用共享主机名时。\n\n最后，当存储的数据非常敏感时，应将存储区域的使用限制在依赖 SSL（或其继任者\
  \ TLS）的安全区域内，从而仅在提供有效证书、验证请求来源的情况下才能访问数据。这对保护用户隐私至关重要。\n\n### 缓存 Ajax 请求\n\n本地存储的一个有趣应用是缓存\
  \ Ajax 请求的数据。当然，你可以使用 HTTP 缓存，但这可靠性较低。\n\n#### 基础文档\n\n为了说明如何缓存 Ajax 请求的数据，我们将聚合\
  \ Apple 的 RSS 订阅源，并为用户适当地显示。我们再次基于 web 应用模板进行构建，对`body`应用以下更改：\n\n```html\n<body\
  \ onload=\"init()\">\n    <div class=\"view\">\n        <div class=\"header-wrapper\"\
  >\n            <h1> Apple 的 RSS 订阅源</h1>\n        </div>\n        <div class=\"\
  list-wrapper\">\n            <h2>最新新闻</h2>\n            <ul id=\"feed\" class=\"\
  template\">\n                <li><a href=\"#{link}\">\n                    <span>#{title}</span><small>#{dateFormatted}\
  \ #{contentFormatted}</small>\n                </a></li>\n            </ul>\n  \
  \      </div>\n    </div>\n</body>\n```\n\n如果你已阅读过第 12 章，你会注意到我们将使用客户端渲染方法来处理通过\
  \ Ajax 加载的内容。如需进一步了解此方法以及获取本示例所需的函数，可参考第 12 章。\n\n我们需要初始化请求以获取订阅源内容。这通过以下代码实现：\n\
  \n```javascript\n/* Apple 的新闻订阅源 */\nvar feedUrl = \"http://images.apple.com/main/rss/hotnews/hotnews.rss\"\
  ;\n\nfunction init() {\n    refresh();\n}\n\nfunction refresh() {\n    var xml =\
  \ new XMLHttpRequest();\n    xml.onreadystatechange = showFeed;\n    xml.open(\"\
  get\", \"proxy.php?url=\" + encodeURIComponent(feedUrl));\n    xml.send();\n}\n\n\
  function showFeed() {\n```\n\n\n\n```javascript\nif (this.readyState == this.DONE\
  \ && this.status == 200) {\n    processFeed(this.responseXML);\n}\n```\n\n```javascript\n\
  function processFeed(xml) {\n    var arr = [];\n    var all = xml.getElementsByTagName(\"\
  item\");\n    var list = document.getElementById(\"feed\");\n    /* 计算最终生成的 HTML\
  \ */\n    var html = \"\";\n    for (var i = 0; i < all.length; i++) {\n       \
  \ var data = {\n            title: getText(all[i], \"title\"),\n            content:\
  \ getText(all[i], \"description\"),\n            date: new Date(getText(all[i],\
  \ \"pubDate\")),\n            link: getText(all[i], \"link\")\n        };\n    \
  \    html += applyTemplate(list.innerHTML, data);\n    }\n    /* 将内容追加到文档中 */\n\
  \    appendContent(list, html);\n}\n```\n\n```javascript\nfunction getText(node,\
  \ name) {\n    var item = node.getElementsByTagName(name);\n    return item.length\
  \ && item[0].hasChildNodes() ?\n        item[0].firstChild.nodeValue : null;\n}\n\
  ```\n\n由于我们获取的是 XML 数据，需要将其转换为可在模板中使用的对象。这个操作通过 `processFeed()` 方法完成。幸运的是，RSS 源足够简单，这个操作不需要太多代码。随后，我们使用\
  \ `getText()` 方法来简化文本节点的读取。\n\n我们的模板包含两个格式化值，因此需要添加两个相应的格式化器，以便在模板中显示预期的值。\n\n```javascript\n\
  var formatters = {\n    \"date\": formatDate,\n    \"content\": formatContent\n\
  };\n```\n\n```javascript\nfunction formatDate(value, data) {\n    if (typeof value\
  \ == \"string\") {\n        value = new Date(value);\n    }\n    return (\"0\" +\
  \ value.getDate()).substr(-2) + \"/\" +\n           (\"0\" + (value.getMonth() +\
  \ 1)).substr(-2) + \" -- \";\n}\n```\n\n```javascript\nfunction formatContent(value,\
  \ data) {\n    return value.replace(/<.+?>/g, \"\").substr(0, 200) + \"...\";\n\
  }\n```\n\n```javascript\nfunction processFeed(xml) {\n    ...\n    html += applyTemplate(list.innerHTML,\
  \ data, formatters);\n    ...\n}\n```\n\n我们的第一步将以在 `main.css` 文件中添加内容结束，这将为列表项赋予特定的样式。\n\
  \n```css\n.group-wrapper ul li a,\n.list-wrapper ul li a {\n    ...\n}\n\n.group-wrapper\
  \ ul li a:active,\n.list-wrapper ul li a:active {\n    ...\n}\n\n.group-wrapper\
  \ ul li a:active *,\n.list-wrapper ul li a:active * {\n    ...\n}\n\n.list-wrapper\
  \ ul li a {\n    margin: -10px;\n    text-decoration: none;\n    color: inherit;\n\
  }\n\n.list-wrapper ul li a span {\n    display: block;\n    margin-right: 24px;\n\
  \    overflow: hidden;\n    text-overflow: ellipsis;\n    white-space: nowrap;\n\
  }\n\n.list-wrapper ul li a small {\n    display: block;\n    margin-right: 24px;\n\
  \    font-size: 13px;\n    line-height: 15px;\n    height: 30px;\n    overflow:\
  \ hidden;\n    color: gray;\n}\n```\n\n现在，如果你在浏览器中加载 HTML 文件，你会看到 feed 已被加载并正确显示，如图\
  \ 15–2 所示。\n\n**图 15–2.** Apple feed 通过 Ajax 加载并在客户端渲染\n\n这是一种相当常见的 feed 展示方式。除非使用\
  \ HTTP 缓存，否则用户每次刷新页面时都会看到最新的 feed。接下来，我们将进一步优化，默认从缓存中加载 feed，并将刷新显示的选择权交给用户。通过这种方式，你的应用加载速度会更快，并让用户获得更强的控制权——这是一个双赢的方案。\n\
  \n#### 添加缓存功能\n\n为了让用户决定何时刷新列表，我们首先需要创建相应的按钮。让我们在标题中添加一个“刷新”按钮，如下所示：\n\n```html\n\
  ...\n<div class=\"header-wrapper\">\n    <h1>Apple 的 RSS 源</h1>\n    <button class=\"\
  header-button\" onclick=\"refresh()\">\n        <span>刷新</span>\n    </button>\n\
  </div>\n...\n```\n\n如同第 12 章中所述，`<span>` 元素用于在内容加载时隐藏文本并显示旋转图标。用于刷新 feed 的函数与之前使用的函数相同。\n\
  \n然而，当 `processFeed()` 函数第二次被调用时，模板将无法再从标记中读取，因为 HTML 内容已经被修改：因此需要事先保存模板。最好使用 `sessionStorage`\
  \ 来实现，因为模板不需要在会话结束后保留（模板将在\n\n\n\n## 第 15 章：更优的客户端数据存储处理方案\n\n### 修改函数\n\n在新会话中再次可用，此外你可能需要在某个阶段修改模板——这可能导致错误。以下是函数的修改方式：\n\
  \n```javascript\nfunction processFeed(xml) {\n  // ...\n  var list = document.getElementById(\"\
  feed\");\n  if (window.sessionStorage.template == undefined) {\n    window.sessionStorage.template\
  \ = list.innerHTML;\n  }\n  // ...\n  html += applyTemplate(window.sessionStorage.template,\
  \ data, formatters);\n  // ...\n}\n```\n\n要激活加载动画，你需要使用第 7 章创建的`BigSpinner`对象。将其添加到你的代码中，并按如下方式使用：\n\
  \n```javascript\nvar spinner = new BigSpinner();\n\nfunction init() {\n  spinner.init(\"\
  spinner\", \"white\");\n  // ...\n}\n\nfunction refresh() {\n  // ...\n  buttonState(true);\n\
  }\n\nfunction showFeed() {\n  if (this.readyState == this.DONE && this.status ==\
  \ 200) {\n    processFeed(this.responseXML);\n    buttonState(false);\n  }\n}\n\n\
  function buttonState(loading) {\n  var but = document.querySelector(\"button.header-button\"\
  );\n  if (loading) {\n    but.disabled = true;\n    but.className += \" spinning\"\
  ;\n    spinner.animate();\n  } else {\n    but.disabled = false;\n    but.className\
  \ = but.className.replace(\" spinning\", \"\");\n    spinner.stop();\n  }\n}\n```\n\
  \n现在，当订阅源列表正在加载时，用户会得知应用程序正在活动中。\n\n### 会话存储作为第一级缓存\n\n第一级缓存依赖于`sessionStorage`。第二级缓存使用`localStorage`，将存储\
  \ XML 数据和加载时间，以决定是否发送 Ajax 请求。\n\n```javascript\nfunction showFeed() {\n  if (this.readyState\
  \ == this.DONE && this.status == 200) {\n    /* 日期将被序列化为字符串 */\n    window.localStorage.feedDate\
  \ = new Date();\n    window.localStorage.feedXML = this.responseText;\n    processFeed(this.responseXML);\n\
  \    buttonState(false);\n  }\n}\n```\n\n由于只能存储字符串，我们使用`responseText`将 XML 作为文本存储。之后将使用`DOMParser`对象将其转换为\
  \ XML。\n\n我们还记录了日期，用于计算缓存的生存时间（TTL）。\n\n### 使用缓存\n\n我们的缓存现在已准备好使用。这由`refresh()`方法处理。\n\
  \n```javascript\nfunction refresh() {\n  var last = new Date(window.localStorage.feedDate\
  \ || 0);\n  var ttl = new Date() - 1000 * 60 * 60 * 1;\n  if (last <= ttl) {\n \
  \   // ...\n    // 从 Wow! eBook <www.wowebook.com> 下载\n  } else {\n    var xml =\
  \ (new DOMParser()).parseFromString(\n      window.localStorage.feedXML, \"text/xml\"\
  );\n    processFeed(xml);\n  }\n}\n```\n\n日期被序列化为字符串，通过将结果字符串传递给`Date`对象的构造函数，可以轻松地反转。这样，我们可以计算自上次缓存存储以来经过的时间，并且仅当该时间超过一小时时，才允许运行\
  \ Ajax 请求。否则，我们使用`DOMParser`对象的`parseFromString()`方法将文本转换为 XML 文档。\n\n> **注意：**\
  \ `DOMParser`对象实际上不属于任何标准，但在大多数浏览器（包括移动版 Safari）中以某种方式实现，因此你可以放心地依赖它。\n\n目前，当用户点击“刷新”按钮时，脚本将在合理的情况下使用缓存，否则重新加载内容。\n\
  \n### 将客户端数据发送到服务器\n\nCookie 的一个问题是它们会随着每次请求自动发送到服务器——不必要地增加了数据传输量——这在使用不可靠的连接时尤其糟糕。\n\
  \n存储区域的数据不会这样发送。然而，你可能实际上需要将存储区域的数据发送到服务器，例如当用户验证购物车时。为此，你可以捕获结账表单的验证事件，并添加处理购物车所需的信息。假设我们的产品\
  \ ID 已存储在`products`键下，我们可以使用类似以下的代码：\n\n```html\n<script>\n/* 示例内容 */\nwindow.sessionStorage.products\
  \ = \"3,5,9,100\";\n\nfunction appendData(form) {\n  var products = form.elements[\"\
  products\"];\n  products.value = window.sessionStorage.products || \"\";\n}\n</script>\n\
  \n<form method=\"get\" action=\"checkout.php\" onsubmit=\"appendData(this)\">\n\
  \  <input type=\"hidden\" name=\"products\">\n  <input type=\"submit\" value=\"\
  结账\">\n</form>\n```\n\n当表单提交时，`products`输入的值将使用`sessionStorage`中的值（如果有）更新，然后表单将携带相关数据提交。\n\
  \n当需要将存储区域的多个属性传递到表单时，可以遍历表单的元素，检查每个元素是否有可用属性。因此，通过使用与表单字段相同的存储区域属性名称，你可以轻松创建一个通用函数来促进数据交换。\n\
  \n```javascript\nfunction exchangeData(form) {\n  var all = form.elements;\n  for\
  \ (var i = 0; i < all.length; i++) {\n    var data = window.sessionStorage.getItem(all[i].name);\n\
  \    if (data) {\n      all[i].value = data;\n    }\n  }\n}\n```\n\n这个函数是基础版本。当然，要在实际场景中发挥作用，脚本应该处理不同的输入类型，例如复选框，其值不应更改，但应被选中或取消选中。\n\
  \n你也可以直接在经典链接上使用类似的方法：\n\n```html\n<script>\nfunction appendData(link) {\n  var\
  \ url = link.href;\n  link.search += (link.search ? \"&\" : \"\") + \"products=\"\
  \ +\n    encodeURIComponent(window.sessionStorage.products);\n}\n</script>\n\n<a\
  \ href=\"checkout.php\" onclick=\"appendData(this)\">结账</a>\n```\n\n这个方法产生与之前相同的结果。通过修改作为参数传递给`appendData()`函数的链接的`Location`对象，我们将数据添加到查询字符串中。服务器端脚本将拥有处理用户购物车所需的必要数据。\n\
  \n### SQL 本地数据库\n\n存储 API 与 Cookie 类似，提供了一种处理相对简单数据的有用方式。然而，当需求更具体时，还有另一种在客户端存储数据的替代方案。由\
  \ W3C 实体维护的 Web 数据库规范将让你进一步拓展客户端存储。\n\n尽管此 API 比存储 API 使用起来更复杂，但数据处理变得更加灵活，例如使用强大的排序功能、更高级的数据结构可能性以及更简单的更新流程。此外，更多数据类型可用于存储。\n\
  \n使用数据库 API 存储的数据可以使用结构化查询语言（SQL）进行查询，该语言被大多数关系数据库管理系统（RDBMS）使用，如 mySQL、SQL Server\
  \ 或 Oracle。迄今为止所有浏览器实现的 SQL 方言基于 SQLite 3.6.19 的子集。\n\n> **注意：** RDBMS 的工作原理以及如何使用\
  \ SQL 超出了本书的范围。在我们的示例中会使用并解释一些命令，但你可以在 [www.sqlite.org](http://www.sqlite.org) 的\
  \ SQLite 文档中找到详尽的信息。\n\n此 API 可以用于你的 Web 应用程序，因为它已在 WebKit 浏览器中实现。然而，当前 API 函数的实现是同步和异步版本的混合。换句话说，目前打开数据库将是同步操作，而查询将是异步执行的。\n\
  \n### 打开数据库\n\n使用传统的 DBMS，新数据库通常使用 SQL 命令 `CREATE DATABASE` 创建。对于 Web 数据库，为了在模式更改时保护数据完整性并限制错误，数据库创建是通过\
  \ `WindowDatabase` 接口的 `openDatabase()` 函数完成的。没有与数据库本身创建或修改相关的实际 SQL 命令可用。\n\n\n\
  ```javascript\nvar db = window.openDatabase(\"Apress\", \"1.0\", \"Apress Storage\
  \ Demo\", 10 * 1024 * 1024);\n```\n\n第一个参数设置了数据库在磁盘上存储数据时使用的物理名称。第二个参数用于指定数据库的版本。这样做很有用，因为它可以防止客户端代码使用一个已演进的数据库，并防止其尝试添加可能导致错误的数据，从而使\
  \ Web 应用程序不稳定。如果版本号发生错误，将发送一个`INVALID_STATE_ERR`致命异常。第三个参数设置数据库的逻辑名称，浏览器将使用该名称来显示消息。\n\
  \n最后，数据库的大小以字节为单位给出，默认值为 5MB。设定一个低于默认值的值并不会实际减小数据库的最大大小；然而，像我们的示例中那样设定一个高于此默认值的限制时，会向用户发送一条消息，询问是否应分配当前操作所需的空间，如图\
  \ 15-3 所示。\n\n**图 15-3.** 当预估数据量超过默认最大值时，会发送一条消息\n\n如果用户拒绝该请求，`openDatabase()`函数将返回`null`。如果操作成功，该函数将返回一个`Database`对象，允许您查询数据库中的数据。如果在执行该函数时数据库不存在，它将被创建。在这种情况下，在较新版本的\
  \ WebKit 中，您可以传递一个回调函数作为最后一个参数，该函数将允许您在创建后与数据库进行交互。然而，此功能在移动版 Safari 中尚未实现，因此您需要通过其他方式初始化数据库。\n\
  \n```javascript\nvar globalDB = window.openDatabase(\"Apress\", \"1.0\",\n    \"\
  Apress Storage Demo\", 1 * 1024 * 1024);\ncheckDatabase(globalDB);\n\nfunction checkDatabase(db)\
  \ {\n    /* 创建事务 */\n    db.transaction(\n        function(tran) {\n           \
  \ tran.executeSql(\"SELECT 1 FROM News LIMIT 1\");\n        },\n        /* 失败？数据库尚未初始化\
  \ */\n        function() {\n            initDatabase(db);\n        },\n        /*\
  \ 成功？数据库已初始化 */\n        function() {\n            /* 开始数据库任务 */\n        }\n  \
  \  );\n}\n\nfunction initDatabase(db) {\n    /* 使用 'db' 数据库对象创建数据库模式 */\n}\n```\n\
  \n`checkDatabase()`函数尝试使用`transaction()`方法（该方法接受三个参数）和`executeSql()`方法（我们稍后将看到）对预期的数据模型执行一个简单请求。我们有意将结果限制为一行，以便查询能快速执行，避免检索可能很重的结果集。如果查询成功，我们可以假设数据库模式已经创建。此时，由于我们请求了特定版本，任务可以开始，因为我们知道模式是正确的。否则，会引发一个错误，然后我们调用模式创建函数。\n\
  \n#### 创建表\n\n一旦您拥有了一个可用的`Database`对象，您就可以像之前展示的那样，使用事务来修改数据库的内容。一个事务允许您将通常相互依赖的一个或多个查询分组。如果一个查询失败，所有查询都将被取消。就像您不能直接使用`CREATE\
  \ DATABASE`命令创建数据库一样，您也不能使用`BEGIN TRANSACTION`、`ROLLBACK`或`COMMIT`命令，否则会抛出错误。这些操作被封装在\
  \ API 的方法内部，您应该使用`Database`对象的`transaction()`方法来执行读/写操作。该方法接受一个回调函数作为参数，当该回调函数被调用时，会传入一个`SQLTransaction`。\n\
  \n使用数据库的第一步是创建将保存数据的表。与之前一样，我们将存储来自 RSS 源的新闻，因此我们需要两个表：一个保存信息源，另一个保存来自每个源的新闻。\n\n\
  ```javascript\nfunction initDatabase(db) {\n    db.transaction(function(transaction)\
  \ {\n```\n\n\n# 排版后内容\n\n### `createSchema(transaction);`\n\n```\n});\n\n}\n\nfunction\
  \ createSchema(tran) {\n\nvar schema = [\n\n\"CREATE TABLE Source (\" +\n\n\" SourceID\
  \ INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,\" +\n\n\" Name VARCHAR(100) NOT NULL,\"\
  \ +\n\n\" URL VARCHAR(100) NOT NULL,\" +\n\n\" LastUpdated DATETIME NULL\" +\n\n\
  \")\",\n\n\"CREATE TABLE News (\" +\n\n\" NewsID INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,\"\
  \ +\n\n\" SourceID INTEGER NOT NULL,\" +\n\n\" GUID CHAR(32),\" +\n\n\" Title VARCHAR(200)\
  \ NOT NULL,\" +\n\n\" Content TEXT NOT NULL,\" +\n\n\" Date DATETIME NOT NULL,\"\
  \ +\n\n\" TargetURL VARCHAR(100) NOT NULL,\" +\n\n\" FOREIGN KEY (SourceID) REFERENCES\
  \ Source(SourceID)\" +\n\n\")\"\n\n];\n\nexecuteSequence(tran, schema);\n\n}\n```\n\
  \n**注意：** 尽管我们为 `CHAR` 或 `VARCHAR` 等字段指定了长度限制，但当前 Web SQL 的实现并不会考虑这些限制，这些类型仅被视为普通字符串。`DATETIME`\
  \ 字段类型也是如此。不过，为了保证前向兼容性，这样做是必要的。\n\n```\nfunction executeSequence(tran, list) {\n\
  \nvar i = -1;\n\n/* 事务已创建 */\n(function recursive(tran) {\n\nif (++i < list.length)\
  \ {\ntran.executeSql(list[i], null, recursive);\n}\n\n})(tran);\n\n}\n```\n\n##\
  \ 第十五章：更好地处理客户端数据存储\n\n事务的初始化是异步的，这意味着脚本引擎在调用 `transaction()` 后会立即执行下一条语句，而不会等待回调函数执行完毕。然而，由于事务会对数据库产生全局锁，事务很有可能会被逐一调用。从用户的角度来看，这种异步行为提供了更大的灵活性，因为在执行繁重操作期间，Web\
  \ 应用程序不会被卡死。\n\n毫不意外，`executeSql()` 方法允许你运行 SQL 语句。与 `transaction()` 方法一样，该函数也是异步执行的。但是，一个请求的处理时间可能比另一个请求长，这可能会在查询依赖于先前查询的成功结果时导致错误（例如在我们的示例中）。在我们的示例中，第二个查询引用了第一个查询创建的表，以保证数据的参照完整性。因此，我们没有循环执行查询，而是定义了一个递归函数，该函数将遍历请求列表，并且仅在前一个请求完成后才执行下一个请求。\n\
  \n如本例所示，`executeSql()` 函数接受多个参数。其签名如下：\n\n`transaction.executeSql(command, parameters,\
  \ successCallback, failureCallback);`\n\n```\nfunction successCallback(transaction,\
  \ resultSet) { ... }\n\nfunction failureCallback(transaction, error) { ... }\n```\n\
  \n第一个参数是要执行的 SQL 查询。然后，应传递一个参数数组来保护查询安全——我们稍后将对此进行解释。最后两个参数是回调函数。在我们的示例中，每当一个查询成功时，我们使用第一个参数来执行下一个查询。它接收当前事务作为第一个参数，并将刚刚完成的查询结果（如果有）作为第二个参数。失败回调接收一个\
  \ `SQLError` 对象作为其第二个参数，这将使你能够处理问题。由于错误不一定是致命的，你也可以从失败回调中恢复事务。这种情况将在后续章节中单独讨论。\n\
  \n### 向表中添加数据\n\n我们的数据库现在准备好保存数据了。首先，我们将使用 `INSERT` 指令填充 `Source` 表。这仍然发生在数据库初始化阶段。\n\
  \n```\nfunction initFeedList(tran) {\n\nvar sql = [\"INSERT INTO Source (Name, URL)\
  \ VALUES(?, ?)\"];\n\nvar data = [\n\n[[\"New York Times\", \"http://www.nytimes.com/services/xml/rss/nyt/HomePage.xml\"\
  ],](http://www.nytimes.com/services/xml/rss/nyt/HomePage.xml)\n\n[[\"Financial Times\"\
  , \"http://www.ft.com/rss/world/us\"]](http://www.ft.com/rss/world/us)\n\n];\n\n\
  executeSequence(tran, sql, data);\n\n}\n```\n\n## 第十五章：更好地处理客户端数据存储\n\n\n\n这里我们使用了参数化查询。在查询中，参数用问号表示，每个问号都对应着作为参数传递给\
  \ `executeSql()` 的数组中的一个条目。这种技术不仅能省去你拼接长字符串的繁琐工作，更重要的是能有效防范 SQL 注入攻击。\n\n关于这一点，我们将在后续关于安全性的章节中做更详细的介绍。\n\
  \n由于查询是异步执行的，我们需要使用回调函数来串联这些调用。\n\n此外，由于创建表和插入初始数据是一个原子且顺序执行的操作，因此必须使用同一个事务，这样一旦发生错误，所有操作都会被撤销。因此，我们将对\
  \ `initFeedList()` 的引用传递给了 `createSchema()` 函数，该函数会在表创建完成后被调用。\n\n```\nfunction\
  \ initDatabase(db) {\n  db.transaction(function(transaction) {\n    createSchema(transaction,\
  \ initFeedList);\n  });\n}\n```\n\n为了让参数化查询可用，我们需要改进 `executeSequence()` 方法，以便传递参数。同时，由于同一查询可能对同一数据集使用多次，我们还增加了为给定的一组参数循环执行一组查询的功能。\n\
  \n```\nfunction createSchema(tran, next) {\n  ...\n  executeSequence(tran, schema,\
  \ null, next);\n}\n\nfunction executeSequence(tran, list, params, next) {\n  params\
  \ = params || [];\n  var max = Math.max(list.length, params.length);\n  var i =\
  \ -1;\n  (function recursive(tran) {\n    if (++i < max) {\n      tran.executeSql(list[i\
  \ % list.length], params[i], recursive);\n      /* 序列执行完成 */\n    } else if (next)\
  \ {\n      next(tran);\n    }\n  })(tran);\n}\n```\n\n我们计算 `list` 和 `params` 参数之间的最大值，以便进行足够次数的迭代来使用所有可用数据。然后，为执行后续的指令集合，我们会检查\
  \ `next` 参数，如果已设置，则执行其所引用的函数。这样，数据插入操作将在表创建完成后进行，而绝不会在创建过程中进行。\n\n## 第 15 章：更好地处理客户端数据存储\n\
  \n### 从表中查询数据\n\n我们的数据库现在已经完全初始化好了。为了填充 `News` 表，我们将从 `Source` 表中获取数据，并发送 Ajax 请求来收集数据。\n\
  \n```\nfunction checkDatabase(db) {\n  ...\n  function() {\n    /* 开始数据库任务 */\n\
  \    refresh(db);\n  });\n  ...\n}\n\nfunction initDatabase(db) {\n  db.transaction(function(transaction)\
  \ {\n    createSchema(transaction, initFeedList);\n  }, null, function() {\n   \
  \ refresh(db);\n  });\n}\n\nfunction refresh(db) {\n  /* 总是先显示之前的内容 */\n  processFeed(db);\n\
  \  /* 然后尝试刷新 News 表 */\n  db.transaction(function (tran) {\n    tran.executeSql(\"\
  SELECT SourceID, URL, LastUpdated FROM Source\", null,\n      function(tran, res)\
  \ {\n        for (var i = 0; i < res.rows.length; i++) {\n          var row = res.rows.item(i);\n\
  \          var last = row.LastUpdated || new Date(0);\n          var ttl = new Date()\
  \ - 1000 * 60 * 10;\n          // 10 分钟\n          /* 如果源需要更新 */\n          if (last\
  \ <= ttl) {\n            loadFeed(row.URL, db, row.SourceID);\n          }\n   \
  \     }\n      }\n    );\n  });\n}\n```\n\n首先，我们在检查事务的成功回调函数中添加了对 `refresh()` 函数的相关调用。然后，利用在\
  \ `refresh()` 中创建的新事务，我们通过 `SQLResultSet` 对象读取查询返回的数据，该对象的 `rows` 属性中保存了查询结果的所有行。这个属性是一个\
  \ `SQLResultSetRowList` 类型的列表，其元素只能通过 `item()` 方法访问。\n\n表 15-2 详细说明了 `ResultSet`\
  \ 对象的属性。\n\n## 第 15 章：更好地处理客户端数据存储\n\n#### 表 15-2.*SQLResultSet* 对象的属性\n\n| 属性 |\
  \ 描述 |\n|----------|-------------|\n| `result.insertId` | 当数据插入到包含 `AUTOINCREMENT`\
  \ 类型字段的表中时，此属性保存最后生成的身份标识值。如果未设置此类字段，则保存插入行的行号。如果没有插入操作，尝试访问此属性将引发 `INVALID_ACCESS_ERR`\
  \ 异常。 |\n| `result.rowsAffected` | |\n\n\n\n`result.rows.length`返回查询已修改的行数，如果未做任何更改（例如，查询是`SELECT`语句），则返回`0`。\n\
  \n`result.rows`：查询返回的行列表。\n\n每列都可以通过名称访问，如同对象属性一样，名称与在表中创建时的大小写保持一致。`length`属性可让你了解结果集有多少行。\n\
  \n**更新数据**\n\n一旦检查了最后更新时间（如果需要），我们就发起`Ajax`请求来检索数据，随后将从`RSS`提要中提取这些数据。\n\n```javascript\n\
  function loadFeed(url, db, id) {\n    var xml = new XMLHttpRequest();\n    xml.onreadystatechange\
  \ = function() {\n        feedLoaded(this, db, id);\n    }\n    xml.open(\"get\"\
  , \"proxy.php?url=\" + encodeURIComponent(url));\n    xml.send();\n}\n\nfunction\
  \ feedLoaded(xhr, db, id) {\n    if (xhr.readyState == xhr.DONE && xhr.status ==\
  \ 200) {\n        updateFeed(xhr.responseXML, db, id);\n    }\n}\n\nfunction updateFeed(xml,\
  \ db, id) {\n    db.transaction(function (tran) {\n        tran.executeSql(\"UPDATE\
  \ Source SET LastUpdated = ? WHERE SourceID = ?\",\n                        [new\
  \ Date(), id]);\n        var all = xml.getElementsByTagName(\"item\");\n       \
  \ for (var i = 0; i < all.length; i++) {\n            var params = [];\n       \
  \     params.push(getText(all[i], \"title\"));\n            params.push(getText(all[i],\
  \ \"description\"));\n            params.push(new Date(getText(all[i], \"pubDate\"\
  )));\n            params.push(getText(all[i], \"link\"));\n            params.push(id);\n\
  \            params.push(getText(all[i], \"guid\"));\n            upsertNews(tran,\
  \ params);\n        }\n    });\n}\n\nfunction upsertNews(tran, params) {\n    var\
  \ len = params.length;\n    var guid = params[len - 1];\n    var id = params[len\
  \ - 2];\n    tran.executeSql(\n        \"SELECT NewsID FROM News WHERE SourceID\
  \ = ? AND GUID = ?\", [id, guid],\n        function(tran, res) {\n            var\
  \ sql = (res.rows.length == 0) ?\n                \"INSERT INTO News (Title, Content,\
  \ Date, TargetURL, SourceID, GUID) \" +\n                \" VALUES(?, ?, ?, ?, ?,\
  \ ?)\"\n                :\n                \"UPDATE News SET \" +\n            \
  \    \" Title = ?, Content = ?, Date = ?, TargetURL = ? \" +\n                \"\
  WHERE SourceID = ? AND GUID = ?\";\n            tran.executeSql(sql, params);\n\
  \        }\n    );\n}\n```\n\n`loadFeed()`函数逐个发起`Ajax`请求，无需等待前一个请求完成。然后，在每次收到服务器响应后，我们立即使用`processFeed()`函数浏览`XML`。在此阶段，`Source`表中的`LastUpdated`字段会被更新，并且对于提要中的每条新闻条目，我们会在相关表中添加条目。这里无需同步行更新，因为执行此操作的顺序不重要。因此，批量插入就足够好了，稍后我们可以通过`SELECT...ORDER\
  \ BY`这样的请求对新闻进行排序。\n\n如果你熟悉`DBMS`，你可能习惯于运行某种自定义的`UPSERT`（`UPDATE`或`INSERT`）。在使用`Web\
  \ Database API`时，没有存储过程来完成此操作，并且在`SQL`语言中也没有适用的条件语句。执行此类操作的唯一方法是链式调用一个`SELECT`命令来确定数据是否可用，然后进行`UPDATE`（如果数据可用）或`INSERT`（如果不可用）。我们这里用于选择的关键字是`SourceID`/`GUID`组合，因为尽管`GUID`被假定为全局唯一，但实际上它仅在源级别是唯一的。\n\
  \n**注意：** 对于`UPDATE`操作，我们本可以使用`SELECT`操作返回的`NewsID`。但是，使用相同的参数数组可以使代码更简单。\n\n我们的`News`表现在保存了来自两个提要的信息。如果你在桌面版`Safari`上测试，则可以使用第\
  \ 3 章介绍的`Web Inspector`的`Storage`部分来读取数据库中存储的数据，只需从左侧窗格中选择`Apress`数据库，然后从内置命令提示符运行一个查询，如图\
  \ 15–4 所示。\n\n```sql\n> SELECT Title, Date, Name\nFROM News\nINNER JOIN Source\n\
  ON News.SourceID = Source.SourceID\nORDER BY Date DESC\n```\n\n\n\n#### 图 15–4：在桌面版\
  \ Safari 的 Web Inspector 中由 SQL 查询生成的新闻列表\n\n现在，你可以修改 Web Storage 示例，使用数据库替代缓存。\n\
  \n### 使用数据库代替存储\n\n要为我们这个示例应用使用 Web 数据库而非 Web 存储，你只需修改 `init()` 函数，并在 `updateFeed()`\
  \ 函数中添加一个成功处理器，以便在每次资讯更新后收集数据。\n\n```\nfunction init() {\n    spinner.init(\"spinner\"\
  , \"white\");\n    checkDatabase(globalDB);\n}\n\nfunction updateFeed(xml, db, id)\
  \ {\n    db.transaction(function (tran) {\n        ...\n    }, null, function()\
  \ {\n        processFeed(db);\n    });\n}\n```\n\n接着，你需要调整 `processFeed()`，使其不再从\
  \ `localStorage` 中收集数据，而是从客户端数据库中检索数据。\n\n```\nfunction processFeed(db) {\n    db.transaction(function\
  \ (tran) {\n        tran.executeSql(\"\\\n            SELECT Title AS title, Content\
  \ AS content, \\\n            Date AS date, TargetURL AS link \\\n            FROM\
  \ News ORDER BY Date DESC \\\n            LIMIT 10\", null, processFeedCallback\n\
  \        );\n    });\n}\n\nfunction processFeedCallback(tran, res) {\n    var all\
  \ = res.rows;\n    var list = document.getElementById(\"feed\");\n    if (sessionStorage.template\
  \ == undefined) {\n        sessionStorage.template = list.innerHTML;\n    }\n  \
  \  /* 计算生成的 HTML */\n    var html = \"\";\n    for (var i = 0; i < all.length; i++)\
  \ {\n        var data = all.item(i);\n        html += applyTemplate(sessionStorage.template,\
  \ data, formatters);\n    }\n    /* 将内容附加到文档中 */\n    appendContent(list, html);\n\
  }\n```\n\n为了保持与直接从资讯读取数据时相同的渲染逻辑，我们对列使用了别名，以确保属性名称与模板一致。自然，我们保留了模板缓存，因为在每次资讯更新后可能会连续调用多次。你还可以向\
  \ Source 表中添加另一条资讯，并使用 Web Inspector 检查结果数据。\n\n### 处理事务和查询错误\n\n如前所述，`transaction()`\
  \ 方法也可以接受失败和成功回调，就像 `executeSql()` 方法一样。以下是回调签名：\n\n```\ndatabase.transaction(initCallback,\
  \ errorCallback, successCallback);\n\nfunction initCallback(transaction) { ... }\n\
  \nfunction failureCallback(error) { ... }\n\nfunction successCallback() { ... }\n\
  ```\n\n第一个函数是失败回调，它将接收一个 `SQLError` 对象，该对象包含一个属性 `message`，用于保存失败原因（详细描述），以及一个属性\
  \ `code`，用于保存对应的错误码。表 15–3 列出了使用 `executeSql()` 进行的 SQL 事务和请求中常见的错误码及其含义。与 Mobile\
  \ Safari 中实现的其他 API 不同，规范常量目前不可用，且错误码不完全匹配；因此，你只能使用数字代码。第二个函数是成功回调，它不接收任何参数。\n\n\
  #### 表 15–3：适用于事务和查询的错误码\n\n| 常量 | 描述 |\n|----------|-------------|\n| `error.UNKNOWN_ERR\
  \ (0)` | 发生了一个与数据库无关的未知错误。通常由回调中的错误引起。 |\n| `error.DATABASE_ERR (1)` | 发生了与数据库相关的错误。例如，在语法错误或找不到表名/字段名时会发送此错误。\
  \ |\n| `error.VERSION_ERR (2)` | 请求的版本号与数据库版本不一致。当数据库模式需要更新时会使用此错误。 |\n| `error.TOO_LARGE_ERR\
  \ (3)` | 查询的结果集过大，无法返回。为避免此错误，应使用 `LIMIT` 和 `OFFSET` 指令（例如）对结果进行分页。 |\n| `error.QUOTA_ERR\
  \ (4)` | 分配给数据库的空间已超出。当用户拒绝数据库扩容请求时也会发生此错误。 |\n| `error.TIMEOUT_ERR (5)` | 未能在合理时间内获得事务锁。通常是在另一个事务耗时过长未完成时发送此错误。\
  \ |\n\n\n\n# 排版后的文档\n\n`execute`，阻止了数据库的正常行为。\n\n`*error*.CONSTRAINT_ERR (6)`\n\n\
  发生了外键违规。例如，当尝试在`News`表中插入一条记录，但使用的`sourceID`不存在时，就会发生这种情况。\n\n两者都可能有用，例如，用于追踪 API\
  \ 的行为，并在发生错误时向用户提供相关信息，提示其重试。我们可以修改函数，以构建更精确的响应，反映初始化数据库的相关性。\n\n```javascript\n\
  function checkDatabase(db) {\n  ...\n  /* 失败了？数据库不应该被初始化 */\n  function(**error**)\
  \ {\n    **if (error.code == 1) { // 未知的表**\n      initDatabase(db);\n    **} else\
  \ {**\n      **alert(\"An error occurred:\\n\" + error.message);**\n    **}**\n\
  \  },\n  ...\n}\n```\n\n这两种方法都将在事务内容执行（此处为调用`executeSql()`）之后被调用。如果某个请求失败，执行将停止，整个事务将回滚，数据库将恢复到事务操作之前的状态。如果所有请求都成功，事务将被提交，数据库将被更新。\n\
  \n但是，在 SQL 命令发生错误后，仍然可以继续执行事务。`executeSql()`方法的失败回调可以返回一个值，指示错误是否致命，以及是否可能恢复事务。返回`false`允许继续执行事务，而返回`true`则会停止事务。如果没有返回值，则默认为`true`。`upsertNews()`函数可以修改为如下实现：\n\
  \n```javascript\nfunction upsertNews(tran, params) {\n  ...\n  tran.executeSql(\n\
  \    ...\n    tran.executeSql(sql, params**, null, function() {**\n      **/* 出错时不停止事务\
  \ */**\n      **return false;**\n    **}**);\n  ...\n  );\n}\n```\n\n通过这种方式，如果插入或更新失败（无论原因如何），其他请求将不受影响，并继续更新表。\n\
  \n### 使用版本控制维护一致的数据访问\n\n在数据库的生命周期中，总会有需要演进的时刻。当然，你可以应用与之前类似的测试，在初始化时检查表是否可用，如果不可用则尝试创建它，但这会将模式维护逻辑分散到整个代码中。此外，如果现有表的结构应该改变，最好在更高层次上控制数据库版本，并应用必要的修改。\n\
  \n我们已经看到，`openDatabase()`方法接受一个参数，允许你为数据库请求一个特定版本。如果在调用函数时，浏览器中存储的版本不匹配，则会引发`INVALID_STATE_ERR`异常。这个\
  \ DOM 异常并不十分明确，也无法让你确定错误是否是版本问题。要处理版本演进，你需要传递一个空字符串作为版本参数，并读取`Database`对象的`version`属性。\n\
  \n**警告：** 在移动版 Safari 中，只有在用户关闭所有持有该数据库域的浏览器窗口后，`version`属性的值才会被修改。因此，即使版本已更改，旧的模式版本仍会显示，从而再次执行迁移代码。对于这种情况，请记住添加一个验证查询，例如查询新模式。\n\
  \n使用此属性的值，你可以使用异步的`changeVersion()`方法来演进数据库模式。以下是其签名：\n\n```javascript\ndatabase.changeVersion(oldVersion,\
  \ newVersion,\n                       changeCallback, errorCallback, successCallback);\n\
  ```\n\n每个回调接收的参数与`transaction()`方法的参数类似。因此，第一个回调将接收一个`SQLTransaction`对象，允许你执行修改查询；第二个回调将接收一个`SQLError`对象。你可以像下面这样使用它们：\n\
  \n```javascript\nvar globalDB = window.openDatabase(\"Apress\", \"\",\n        \
  \                           \"Apress Storage Demo\", 1 * 1024 * 1024);\nif (globalDB.version\
  \ == \"1.0\") {\n```\n\n\n```javascript\n/* 执行数据库演进的作业以更新至新版本 */\n`globalDB.changeVersion(\"\
  1.0\", \"1.2\", changeCallback, errorCallback, successCallback);`\n} else if (`globalDB.version\
  \ == \"1.2\"`) {\n/* 始终检查模式以确保版本号正确 */\n`checkDatabase(globalDB);`\n} else {\n`throw(\"\
  Unexpected database version number.\");`\n}\n\n`function changeCallback(tran)` {\n\
  `tran.executeSql(\"ALTER TABLE Source RENAME TO Feed\");`\n}\n\n`function errorCallback(err)`\
  \ {\n`alert(\"An error occurred:\\n\" + err.message);`\n}\n\n`function successCallback()`\
  \ {\n`alert(\"Database successfully updated to version 1.2!\");`\n`refresh(globalDB);`\n\
  }\n\n当然，更新完成后，你将无法再访问数据库的旧版本。对于脚本引擎而言，版本号不过是字符串；因此不存在实际的版本演进，仅仅是版本号的变更。如果`oldVersion`参数与当前数据库版本不匹配，将抛出`VERSION_ERR`异常。\n\
  \n![](img/index-478_1.jpg)\n\n"
- "# 第 15 章：更好地处理客户端数据存储\n\n### 删除数据库\n\n创建数据库非常简单，但删除数据库却可能更加棘手。\n\n无法通过 JavaScript\
  \ 删除数据库，SQL 命令`DROP DATABASE`也不可用。幸运的是，删除数据库仍是可行的，但只能通过用户操作完成。这在开发阶段显然非常方便。\n\n\
  #### 在桌面版 Safari 中\n\n在桌面版 Safari 及大多数基于 WebKit 的浏览器中，可通过偏好设置面板删除数据库。前往“Safari 偏好设置...”并选择“安全”选项卡，将出现如图\
  \ 15-5 所示的窗口。\n\n**图 15-5.** 桌面版 Safari 的安全面板\n\n在此窗口中，点击屏幕底部的“显示数据库”按钮，即可触发数据库列表。你可以通过“移除”按钮删除任意数据库。这样，你便能基于干净环境，根据需要多次测试代码。\n\
  \n#### 在移动版 Safari 中\n\n在移动版 Safari 中，一旦创建数据库，浏览器偏好设置中会出现新的菜单项，如图 15-6 所示。由此，可通过“设置”应用，在“Safari\
  \ 数据库”选项下访问数据库列表。\n\n![](img/index-479_1.jpg)\n\n**图 15-6.** 移动版 Safari 中的数据库偏好设置\n\
  \n只需点击屏幕右上角的“编辑”按钮，然后选择要删除的数据库即可。此处提供的选项不如桌面版丰富；例如，无法为数据库设置初始大小。\n\n### 安全再探讨\n\n\
  出于安全原因，Web Storage 的相同限制同样适用于网络数据库，即对方案/主机/端口三元组的严格限制。不同子域间的数据访问可通过 HTML5 跨文档消息传递\
  \ API 实现，如第 11 章所述。\n\n在存储关键数据（如用户密码或个人隐私信息）时，应谨慎使用 Web 数据库。建议采用不可逆加密方式（如 MD5），因为可逆加密意味着加密密钥将隐藏在代码某处。当然，由于移动版\
  \ Safari 没有 Web 检查器，你可能会合理认为数据库是安全的，但网页应用可在任意浏览器中查看，因此应采取更严格的安全措施以防范更大风险。\n\n使用网络数据库时需特别警惕的安全风险是\
  \ SQL 注入，这在构建查询语句时应格外小心。此类攻击常见于拼接查询中，当变量中的单引号未被转义时，其他查询语句便可能被插入。由于请求可在客户端读取，这种攻击尤为容易实施。以下是用户输入名称并传入查询的示例：\n\
  \n```\nvar name = \"'; DELETE FROM Source --\";\nvar sql = \"SELECT * FROM Source\
  \ WHERE Name='\" + name + \"' AND URL IS NOT NULL\";\n```\n\n分号是指令分隔符，双连字符（`--`）标记注释开始。因此，上述代码将被解释为清空`Source`表：\n\
  \n```\nSELECT * FROM Source WHERE Name=''; DELETE FROM Source --' AND URL IS NOT\
  \ NULL;\n```\n\n防范此问题的首要步骤当然是转义用户输入中的所有单引号（将其替换为两个单引号`''`），但更推荐使用安全的`executeSql()`方法，传入参数数组。\n\
  \n```\nvar sql = \"SELECT * FROM Source WHERE Name=? AND URL IS NOT NULL\";\ntransaction.executeSql(sql,\
  \ [name]);\n```\n\n如前所述，这样脚本引擎将自动用表中的对应值替换每个问号，从而杜绝注入风险。在上线前，务必仔细检查代码，对查询语句及参数列表进行彻底审查。\n\
  \n### 离线网页应用缓存\n\n除新增的存储功能外，借助 HTML5 带来的缓存能力，你还可以将全部或部分网页应用资源存储在用户设备上，实现离线访问。这能让你的网页应用更进一步接近原生应用体验——根据用户对应用的使用方式，他们或许感受不到在线与离线模式的区别。此外，这还能在任何情况下缩短加载时间。该规范在\
  \ iOS 2.1 及以上版本的移动版 Safari 中得到支持。\n\n#### 工作原理是什么？\n\n当页面首次在浏览器中加载时，会同时加载一个清单文件，其中包含处理应用资源的规则。这样，后续访问该应用时，相关文件将按预期缓存，而不会从服务器重新加载。\n\
  \n一旦清单文件被读取，除非清单文件本身发生变更，否则任何标记为缓存的文件都不会再向服务器检查或重新加载。清单文件是按字节精确比较的，这意味着修改日期变更不会强制重新评估。服务器上其他文件的变更，或指示文件更新版本的\
  \ HTTP 头信息，都不会触发浏览器重新下载。\n\n但请始终牢记：缓存更新后，客户端不会立即使用新版本文件，而是需要刷新网页应用后才能生效——这与桌面计算机的更新机制类似。因此，最好能通知用户有新版本文件可用。这可通过特定\
  \ API 实现，该 API 允许你控制缓存并在文件更新期间接收通知。我们将在后续章节中介绍相关事件。\n\n#### 清单文件\n\n清单文件主要用于列出需要缓存的文件，以及处理网页应用元素的规则。它使用特殊的`.manifest`扩展名，是简单的\
  \ UTF-8 编码文件，必须通过`text/cache-manifest`内容类型提供，才能被浏览器正确解析。你可以使用字节顺序标记（BOM）对文件签名。需要注意的是，目前大多数服务器在默认配置下不会发送此\
  \ MIME 类型，而这对清单文件的正常工作至关重要。\n\n**注意：** 自然，本地测试该文件并不容易，因为你无法断开与服务器的连接。运行本地测试的唯一方法是：加载应用、停止本地服务器，然后重新加载网页应用以观察显示内容。另外请注意，清单文件不会显示在\
  \ Safari Web 检查器的资源查看器部分，这不利于检查它是否已加载。\n```\n\n\n#### 使用缓存清单实现离线 Web 应用\n\n通过使用以下\
  \ `cache.manifest` 文件，我们可以轻松缓存本章开发的 Web 应用示例，使其在离线或用户网速不佳时仍可使用。\n\n```\nCACHE MANIFEST\n\
  \nindex.html\nstyles/main.css\nscripts/main.js\n```\n\n`CACHE MANIFEST` 行必须作为文件的第一行，且不应包含多余的空格或换行。它作为文件签名，告诉浏览器这是一个缓存清单。URL\
  \ 可以是绝对路径或相对路径，但需注意相对路径是相对于清单文件所在的目录而言的。因此，为保持一致性，最好将清单文件放在调用它的 HTML 文件所在的同一目录下。\n\
  \n> **注意：** 尽管调用清单的文件会被自动缓存，但根据规范，我们仍将其添加到清单中。\n\n清单文件将用于包含它的文档中，并且必须通过 `<html>`\
  \ 标签上的新 `manifest` 属性来调用。与其他允许拉取远程文件的属性一样，它可以接受相对路径和绝对路径。\n\n```\n<html manifest=\"\
  cache.manifest\">\n...\n```\n\n## 第 15 章：更好地处理客户端数据存储\n\n这是清单文件最简单的定义方式，它允许你将资源存储在设备上，而无需在每次加载页面时重新下载。你可以简单地列出要缓存的资源，但也可以更精确地控制缓存的处理方式。\n\
  \n### CACHE 部分\n\n可以通过 `CACHE` 指令在清单文件的特定部分中定义要缓存的文件。你可以用类似的方式定义多个部分，这有助于组织文件指示。此外，通过添加注释可以使文件更易于阅读，如下所示：\n\
  \n```\nCACHE MANIFEST\n\n#### 我们的缓存资源\n\nCACHE:\nindex.html\nstyles/main.css\nscripts/main.js\n\
  ```\n\n任何类型的文件都可以注册为缓存资源，甚至包括图片或服务器端脚本。当然，服务器端脚本会在执行后被缓存，因此使用此功能时要小心。这是因为缓存应用不仅存储数据，还存储资源元数据（如\
  \ HTTP 标头）。\n\n### NETWORK 部分\n\n使用清单文件会使 Web 应用以离线模式运行，这意味着未在清单文件中列出的文件将不会被下载，即使设备已连接到网络。此行为可以通过\
  \ `NETWORK` 部分改变。在该部分中，你可以指定当网络可用时应从服务器下载的资源，这对于应用的动态元素特别有用。\n\n该部分类似于 `CACHE` 部分，保存了一个在线白名单。然而，该部分的功能有所不同：每个\
  \ URL 都是一个前缀匹配模式。因此，你可以仅通过列出目录来定位该目录下的所有资源。注意不要多次无用地列出相同的前缀。\n\n在我们的上一个示例中，如果清单文件中只包含\
  \ `CACHE` 部分，Web 应用将无法正常工作，因为用于获取 RSS 源的代理将无法访问。要解决此问题，我们只需在清单中添加以下内容：\n\n```\n\
  NETWORK:\nproxy.php\n```\n\n我们的代理使用查询字符串中的 `url` 参数来知道应该下载哪个 feed，但由于 `proxy.php`\
  \ 是一个前缀，浏览器会授权访问完整的 URL。\n\n你也可以使用 `*` 通配符来允许访问所有资源。对于未在 `CACHE` 部分（优先级高于其他部分）列出的资源，这一规则自然会被考虑。当然，这使编写清单文件变得更加容易，并降低了忘记文件导致应用功能不完整的风险。\n\
  \n### FALLBACK 部分\n\n\n\n对于需要网络但未缓存资源的场景，如果网络不可用，可以定义一个或多个后备（fallback）部分。\n\n在这些部分下，行由空格或制表符分隔的元素对组成。第一个元素是后备命名空间，定义了一个前缀匹配模式，用于定位来自某些\
  \ URL 的一组资源，这与 `NETWORK` 部分的做法相同。所有匹配此命名空间的资源都将被缓存，如果第二个元素列出的资源不可用，则将使用该缓存资源。\n\n\
  为了观察此部分的行为，我们将指定一个静态的 RSS 提要（`default.xml`）作为默认值，用于网络不可用的情况。\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\" ?>\n\n<rss version=\"2.0\">\n\n<channel>\n\n<title>Offline\
  \ Application Cache</title>\n\n<description />\n\n[<link>http://www.apress.com/</link>](http://www.apress.com/%3C/link)\n\
  \n<item>\n\n<title>Fallback Element</title>\n\n<description>This is a fallback resource\
  \ cached to be used\n\nwhen the network is not available.</description>\n\n[<link>http://www.apress.com/</link>](http://www.apress.com/%3C/link)\n\
  \n[<guid>http://www.apress.com/guid/</guid>](http://www.apress.com/guid/%3C/guid)\n\
  \n<pubDate>Mon, 01 Aug 2011 00:00:00 +0000</pubDate>\n\n</item>\n\n</channel>\n\n\
  </rss>\n```\n\n相关文件将在清单中列出如下：\n\n```\nFALLBACK:\nproxy.php default.xml\n```\n\n\
  因此，当网络不可用时，将使用 RSS 文件来代替代理调用，并为将要收集的每个提要添加唯一可用的元素。此部分不仅可用于网络不可用的情况，还可用于处理任何其他丢失文件的问题，例如\
  \ HTTP 404 错误。\n\n但请注意，浏览器不一定使用最具体的前缀来获取相关资源；因此，声明顺序很重要。在以下示例中，第一行将用于所有后备情况，因为它将匹配所有资源，包括那些会被第二行匹配的资源。\n\
  \n**第 15 章：更好地处理客户端数据存储**\n\n```\nFALLBACK:\n./ any.html\nproxy.php default.xml\n\
  ```\n\n在这种情况下，你应该首先指定最具体的前缀，然后依次是较不具体的前缀。同时，考虑规划一个组织良好的目录结构，以使该过程更简单。这无论如何都可能对你的目录结构有益。\n\
  \n### 使用 JavaScript 控制缓存\n\nHTML5 允许通过附加到 `ApplicationCache` 对象的 JavaScript API\
  \ 来控制缓存。每个拥有清单的页面都会自动附加一个 `ApplicationCache` 对象实例；它可以通过 `DOMWindow` 对象访问。\n\n```\n\
  var cache = window.applicationCache;\n```\n\n通过此实例，你将能够检查缓存的状态，例如通过检查清单文件是否已被考虑，读取其\
  \ `status` 属性。\n\n表 15-4 显示了当前页面缓存的所有可能状态。如果是 `UNCACHED` 状态，则表示你的清单文件尚未加载。在这种情况下，你通常应检查内容类型是否正确以及文件是否没有错误。\n\
  \n**表 15-4.** `applicationCache` 状态常量\n\n**常量** | **描述**\n--- | ---\n`cache.UNCACHED`\
  \ (0) | 文档未被缓存。\n`cache.IDLE` (1) | 文档可从缓存获取且是最新版本。这是页面首次加载，或应用在更新后重新加载且所有资源已加载完毕时的状态。\n\
  `cache.CHECKING` (2) | 文档可从缓存获取，并且正在检查更新。\n`cache.DOWNLOADING` (3) | 文档可从缓存获取，并且当前正在下载更新或新资源。\n\
  `cache.UPDATEREADY` (4) | 文档可从缓存获取，并且已完成下载更新或新资源。这些资源将在下次访问应用时可用。\n`cache.OBSOLETE`\
  \ (5) | 可从缓存获取的文档已过时，这意味着清单不再可用。浏览器收到 HTTP 404 错误。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的指示，完成英文文本的翻译工作。\n\
  \n\n# 第 15 章：更好地处理客户端数据存储\n\n`(Not Found)` 状态或 `410` 状态 (`Gone`)。\n\n这可以用于检查浏览器是否已下载了新版本并通知用户：\n\
  \n```\nif (window.applicationCache.status == window.applicationCache.UPDATEREADY)\
  \ {\n  if (window.confirm(\"A new version is available.\\nDo you want to use it\
  \ now?\")) {\n    window.location.reload();\n  }\n}\n```\n\n此状态并不一定会立即可用。如果在资源加载时检查此状态，则会发送\
  \ `CHECKING` 状态。因此，为更新和下载过程添加监听器会很有用，我们很快就会看到这一点。\n\n您还可以直接使用 JavaScript 控制缓存，使用表\
  \ 15-5 中介绍的方法。\n\n**表 15-5. 缓存相关方法**\n\n| 方法 | 描述 |\n|--------|-------------|\n\
  | `cache.update()` | 如果服务器上有资源可用，则强制验证并更新缓存。如果文档没有关联的缓存，则会发送一个 `INVALID_STATE_ERR`\
  \ 异常。 |\n| `cache.swapCache()` | 如果可用，则激活新的缓存资源 (`UPDATEREADY`)。否则会抛出一个 `INVALID_STATE_ERR`\
  \ 异常。 |\n\n例如，即使状态设置为 `IDLE` 且清单文件刚刚被修改，调用 `update()` 方法也会强制重新加载缓存。在新资源下载完成后，状态将变为\
  \ `UPDATEREADY`。调用 `swapCache()` 将强制使用新资源，并且状态将返回到 `IDLE`。\n\n当然，当前页面不会自动更新，您必须等待下一次启动\
  \ Web 应用程序时用户才能看到更改。但是，您也可以使用 JavaScript 读取新资源。如果对 `update()` 的调用成功并且下载完成，您可以按如下方式调用更新后的资源：\n\
  \n```\n/* 更新一个 iframe */\nvar iframe = document.getElementById(\"myIframe\");\n\
  iframe.src = iframe.src;\n\n/* 更新文档中的第一张图片 */\nvar image = document.images[0];\n\
  image.src = image.src;\n```\n\n您也可以关联一个新缓存的资源：\n\n```\nimage.src = \"newlyCachedImage.png\"\
  ;\n```\n\n在 Safari 中，令人惊讶的是，尽管 `swapCache()` 旨在切换应用程序缓存，但在调用 `swapCache()` 之前缓存就已经可用。因此，您应该仅在调用\
  \ `swapCache()` 之后才执行此类操作，而不是仅仅在调用 `update()` 之后。\n\n# 第 15 章：更好地处理客户端数据存储\n\n###\
  \ 响应应用程序缓存发送的事件\n\n在应用程序更新的执行周期中，会发送一系列事件，让应用程序了解正在发生的事情并做出相应反应。这些事件列在表 15-6 中。\n\
  \n**表 15-6. 缓存更新事件**\n\n| 事件 | 描述 |\n|-------|-------------|\n| `checking` | 浏览器正在尝试首次下载清单，或正在检查是否有可用的更新。\
  \ |\n| `noupdate` | 清单文件没有变化。 |\n| `downloading` | 已开始下载清单中列出的资源，无论是为了首次获取资源还是更新缓存。\
  \ |\n| `progress` | 浏览器正在下载清单中列出的资源。 |\n| `cached` | 清单中列出的资源已全部下载完毕，应用程序现在可从缓存中使用。此事件仅在首次下载时发送。\
  \ |\n| `updateready` | 缓存中的资源已全部重新下载完毕。 |\n| `obsolete` | 清单不再可用，并且服务器已发送 `404`\
  \ 或 `410` 状态。下次启动应用程序时，缓存将被删除。 |\n| `error` | 未找到清单或清单包含错误。 |\n\n可以使用常规的 DOM 方法或使用\
  \ `ApplicationCache` 对象属性来注册这些事件。\n\n```\nwindow.applicationCache.addEventListener(\"\
  updateready\", doSomethingHandler, false);\n/* 或者... */\nwindow.applicationCache.onupdateready\
  \ = doSomethingHandler;\n```\n\n事件序列必然以 `checking` 事件开始，因为文档在 `<html>` 标签中持有对清单的引用。\n\
  \n\n\n然后，如果文档没有关联的应用程序缓存，且清单文件不包含错误，则会触发`downloading`事件，随后触发一系列`progress`事件，直至所有列出的资源都已获取完毕。该序列将以`cached`事件结束，表明应用程序缓存已创建且该\
  \ Web 应用程序现已被缓存。\n\n如果文档已经关联了应用程序缓存，并且浏览器未检测到清单文件有任何变更，则会发送一个`noupdate`事件，序列将立即停止。否则，序列将与之前相同，但会以`updateready`事件而非`cached`事件结束。在这种情况下，您可以像之前展示的那样调用`swapCache()`方法。\n\
  \n如果清单文件无法访问，或清单文件包含错误（例如签名问题、资源不可用等），序列会被中断并触发`error`事件。此外，如果缓存已存在但清单文件未找到，则会发送一个`obsolete`事件，并且该缓存将从设备中删除。\n\
  \n规范计划将`progress`事件设为`ProgressEvent`类型，允许您跟踪下载进度。正如在讨论 Ajax 的第 12 章中所阐述的，这种类型将使您能够通过`lengthComputable`属性判断下载是否可计算，进而使用`loaded`和`total`属性来估算加载时间。\n\
  \n目前，`progress`事件类型在 iOS 上不受支持，在桌面版 Safari 中也未实现。它将返回一个常规的`Event`对象。不过，您仍然可以通过回调函数来利用该事件，因为无论如何，进度是否可计算都无法得到保证。\n\
  \n### 删除缓存\n\n一旦 Web 应用被缓存，就无法再将其删除。实际上，用户清空浏览器缓存并不会影响离线应用缓存。因此，用户删除缓存的唯一方法是再次访问该站点，并希望能找到卸载该应用的选项。\n\
  \n如果您的清单文件是动态文件（例如 PHP 脚本），则可以通过设置 cookie 来提供此选项。该 cookie 将由清单脚本读取，以便在需要删除缓存时返回`404`错误。\n\
  \n```html\n<script>\nfunction switchMode(online) {\n  var now = new Date().getTime();\n\
  \  var tenYears = 1000 * 60 * 60 * 24 * 365 * 10;\n  var expires = new Date(now\
  \ + tenYears) * (online ? +1 : -1);\n  document.cookie = \"online=true; expires=\"\
  \ + expires;\n}\n</script>\n...\n<div class=\"header-wrapper\">\n  ...\n  <button\
  \ onclick=\"switchMode(true)\">无缓存</button>\n</div>\n...\n```\n\nPHP 清单文件可能如下所示：\n\
  \n```php\n<?php\n$code = ($_COOKIE['online'] == 'true') ? 410 : 200;\nheader('Content-type:\
  \ text/cache-manifest', true, $code);\n?>CACHE MANIFEST\n```\n\n当用户点击**无缓存**按钮时，将创建一个值为布尔值`true`的新在线\
  \ cookie。其过期日期设置得足够久远，以确保不会过期。\n\n再次访问清单文件时，脚本会使用`$_COOKIE`哈希表检查该 cookie，并根据`online`的值发送相应的响应。最终，Web\
  \ 应用将收到一个`obsolete`事件，如前所述。\n\n### 用户是否在线？\n\n无论当前文档是否关联了离线应用缓存，您都可以轻松检查网络状态。该信息可以通过`navigator`对象的`onLine`属性获取。这样一来，如果网络不可用，就可以阻止从\
  \ JavaScript 下载某些元素（例如之前使用的 RSS 订阅源），从而避免访问回调内容。\n\n```javascript\nfunction refresh(db)\
  \ {\n  /* 始终显示先前的内容 */\n  processFeed(db);\n  /* 如果未在线，则不尝试下载订阅源 */\n  if (!window.navigator.onLine)\
  \ {\n    return;\n  }\n  ...\n}\n```\n\n\n\n#### 除了此属性外，移动版 Safari 还支持两个新事件：当网络状态发生变化时，会发送\
  \ `online` 事件（若 `onLine` 属性从 `false` 变为 `true`）或 `offline` 事件（用户断开连接）。这能让您精细调节应用的加载和行为，以实现最佳用户体验。\n\
  \n## 总结\n\n当然，您可以像我们在第 6 章中为生成类似 Photos 相册的图片列表那样，使用 PHP 或任何其他服务器端脚本语言动态生成清单文件。这为开发复杂而灵活的应用开辟了无限可能。\n\
  \n让您的应用在在线和离线状态下都能令人满意地运行，是实现类原生应用体验的重要一步，而不同的存储 API 能让您将数据行为定制为满足应用的大部分需求。\n\n\
  将此与全屏模式、用户界面以及类似 iOS 的行为相结合，用户会怀疑自己当初为何要去 App Store。\n\n`![](img/index-489_1.png)`\n\
