  ## 作者简介


  **克里斯·阿佩尔斯** 在 Web 技术和移动开发领域拥有超过 13 年经验，包括 PalmOS、webOS 和 iPhone。他是 Newsweb/Lagardère
  Active 的技术经理和架构师，并参与了诸如将开发库和软件移植到移动设备等开源项目。通过创建开源框架 `WebApp.Net`，他提供了一种简便的方法来为 WebKit
  浏览器创建移动内容。了解更多信息，请访问 `www.webapp-net.com` 和 `www.chrilith.com`。


  **丹尼尔·帕特森** 拥有比较文学硕士学位，撰写过一篇关于将文学理论融入虚构作品的回忆录，以安伯托·艾柯、米兰·昆德拉和戴维·洛奇的小说为例。大学毕业后，丹尼尔进入
  Web 开发领域，并于 2009 年 4 月加入 Newsweb/Lagardère Active。他对 Web 以及其他许多事物充满热情，珍惜每一个参与有趣项目并发展自身技能的机会。


