  \n![](img/index-432_1.jpg)\n\n**图 14-3.** 用户位置与定位精度一同显示在地图上\n\n借助 Google Maps API，你可以走得更远，从使用\
  \ Google 服务器上定义的路线，到通过街景模式展示信息。由于有大量值得探索和用于构建令人印象深刻的应用的功能，我们建议你查阅在线文档 [`code.google.com/apis/maps`](http://code.google.com/apis/maps)/。\n\
  \n---\n\n### 追踪用户位置\n\n你已经学会了如何请求用户位置以及如何在地图上显示这些信息。现在，你应该非常清楚如何根据你计划如何利用这些数据来最高效地执行此操作。\n\
  \n现在让我们关注地理定位 API 的另一个特性：追踪设备位置变化的能力。通过持续跟踪用户的位置，你将能够在事件发生时做出响应，例如在路线规划应用或与某些地理标记工具结合使用时。\n\
  \n#### 注册更新\n\n此功能通过 `watchPosition()` 方法访问。此方法的使用方式与 `getCurrentPosition()` 相同，参数也相同。然而，后者发送一个位置后就结束，而前者则会持续发送位置并反复运行。\n\
  \n`watchPosition()` 方法还会返回一个唯一标识符，之后可用于停止追踪。调用此函数的最简单方式如下：\n\n```\nvar watchId =\
  \ window.navigator.geolocation.watchPosition(successCallback);\n```\n\n当使用相关 ID\
  \ 作为参数调用 `clearWatch()` 函数时，重复请求将终止：\n\n```\nwindow.navigator.geolocation.clearWatch(watchId);\n\
  ```\n\n始终将此选项提供给最终用户似乎是合理的选择，他们应该始终能够控制自己的设备，并且通常知道为何启动应用，从而知道何时停止它。\n\n尽管如此，根据\
  \ `watchPosition()` 的用途，`clearWatch()` 也可以在特定事件触发时被调用，例如，在路线规划应用中，当用户到达请求的目的地时。\n\
  \n#### 观察者的特定行为\n\n由于 `watchPosition()` 是一个迭代函数，了解当用户在不调用 `clearWatch()` 函数的情况下退出应用、设备电量耗尽或发生其他情况时会发生什么，是很有用的。\n\
  \n当用户返回启动器时，如果有足够的空间缓存应用状态，该函数将暂时挂起，并在浏览器再次启动时恢复。如果发生错误，更新尝试将继续，API 将调用失败回调函数。\n\
  \n你可以使用以下代码检查此行为：\n\n```\nwindow.navigator.geolocation.watchPosition(successCallback,\
  \ failureCallback);\n\nfunction successCallback(position) {\n    var msg = '位置:\
  \ ' +\n        position.coords.longitude + ', ' +\n        position.coords.latitude;\n\
  \    console.info(msg + '\\n 在 ' + (new Date()).toTimeString());\n}\n\nfunction\
  \ failureCallback(error) {\n    var err = error.message + ' (' + error.code + ')';\n\
  \    console.error(err + '\\n 在 ' + (new Date()).toTimeString());\n}\n```\n\n加载一个运行此代码的页面，退出\
  \ Mobile Safari，然后激活或停用地理定位服务。你将看到位置更新仍在继续，这意味着错误或退出应用都不会停止 API 的运行。\n\n如果用户拒绝访问地理定位服务，API\
  \ 将继续发送错误消息，尽管用户不会有第二次机会更改其对请求的答复。但是，在这种情况下，当用户退出 Mobile Safari 并重新启动后，授权弹出窗口将再次出现；在这种情形下，API\
  \ 以这种方式保持轮询活动是可以理解的。\n\n认识到这种特殊行为后，开发人员应通过构建适当的回调函数来预见它，以通知用户追踪问题，或在达到一定尝试次数后使用\
  \ `clearWatch()` 方法停止追踪。\n\n#### 在 Google 地图上观察位置\n\n为了说明这种追踪可能性，我们将修改之前的 Google\
  \ 地图示例以纳入追踪功能，首先将以下代码绑定到我们的按钮上：\n\n```\nvar firstRun, trackerID, failedCount = 0;\n\
  \nfunction swapAction() {\n    var button = document.getElementsByTagName(\"button\"\
  )[0];\n    if (trackerID == undefined) {\n        trackerID = window.navigator.geolocation.watchPosition(\n\
  \            successCallback, failureCallback);\n        button.textContent = \"\
  停止\";\n        button.style.backgroundColor = \"#c6323d\"; // 变为红色\n        firstRun\
  \ = true;\n    } else {\n        window.navigator.geolocation.clearWatch(trackerID);\n\
  \        trackerID = undefined;\n        button.textContent = \"追踪\";\n        button.style.backgroundColor\
  \ = \"\";\n    }\n}\n```\n\n在这里，让用户随时停止追踪非常重要，因为追踪会消耗设备电量；当用户停止移动时，他会想要停止；此外，取决于所使用的定位方法，追踪返回的数据可能不尽如人意。为此，我们将在追踪发生时将“追踪”按钮改为“停止”按钮。`swapAction()`\
  \ 函数将同时用于此目的、执行停止操作以及在发生错误时停止追踪。\n\n然后，我们对 `successCallback()` 函数稍作修改。\n\n```\n\
  function successCallback(position) {\n    var latlng = new ns.LatLng(position.coords.latitude,\
  \ position.coords.longitude);\n    map.panTo(latlng);\n    if (firstRun) {\n   \
  \     map.setZoom(17);\n        firstRun = false;\n    }\n    ...\n    failedCount\
  \ = 0;\n}\n```\n\n这里，我们用 `panTo()` 替换了 `setCenter()`。与 `setCenter()` 相比，`panTo()`\
  \ 函数的优势在于它会滑动到新位置，而非直接跳转。此外，我们只在首次定位时缩放；这样，如果用户更改了缩放比例，他们的选择不会因为位置改变而被丢弃。\n\n因为此请求成功，我们将错误计数器设置为\
  \ 0。另一方面，失败回调函数需要稍多一些工作。\n\n```\nfunction failureCallback(error) {\n    /* 发生 100\
  \ 次错误后停止追踪 */\n    if (error.code != error.PERMISSION_DENIED) {\n        failedCount++;\n\
  \        if (failedCount < 100) {\n            return;\n        }\n    }\n    failedCount\
  \ = 0;\n    swapAction();\n    switch (error.code) {\n        ...\n    }\n    button(true);\n\
  }\n```\n\n信号接收并非总是最佳，这意味着定位可能并非每次尝试都能成功，但很可能足以成功返回满意的数据。因此，我们不能在每次失败时都向用户抛出错误，也不能在第一次失败时就停止追踪。由于每秒可能进行多次调用，我们将失败次数限制设为\
  \ 100，这大约意味着在向用户发送错误消息之前等待 30 到 60 秒。之后，该过程将停止。\n\n---\n\n### 从数据到数学\n\n\n\n###\
  \ 地理定位 API\n\n`Geolocation API` 为你提供了获取静态数据的有用方法，但没有辅助函数来处理这些数据并真正将其“绘制”在空间中。以下是一些在你的工作流程中可能会用到的计算。我们将在一定程度上解释这些公式，以便你理解其原理；不过，只要你清楚它们能得出什么结果，就可以直接复制这些代码片段并在你的代码中使用。\n\
  \n#### 两点之间的距离\n\n如果你要将用户从一个点带到另一个点，那么需要行进的距离很可能是有用的信息。由于你已经学会了如何找到用户当前位置和目标位置的坐标，这一点就很容易推导出来。\n\
  \n![](img/index-436_1.png)\n![](img/index-436_2.png)\n\n纬线和经线在整个地图上相互交叉，形成了一个大致规则的网格。目前我们将其视为规则网格，这样就能用一些初等数学规则来计算任意两点之间的距离。\n\
  \n假设一个纬度（`φ`）大约相当于 69 英里，一个经度（`λ`）大约相当于 53 英里，我们应用勾股定理：我们的距离是沿着纬度和经度“边”构成的假想三角形的斜边。以下公式返回给定两点之间的距离（以英里为单位）：\n\
  \n下面是将公式转换为 JavaScript 代码的方式：\n\n```javascript\nfunction computeDistance(p1, p2)\
  \ {\n  var lat1 = p1.coords.latitude;\n  var lat2 = p2.coords.latitude;\n  var lng1\
  \ = p1.coords.longitude;\n  var lng2 = p2.coords.longitude;\n  return Math.sqrt(\
  \ Math.pow(69 * (lat2 - lat1), 2)\n                    + Math.pow(53 * (lng2 - lng1),\
  \ 2) );\n}\n```\n\n这通常是你确定距离的最佳选择。然而，这只是一个近似值。实际上，由于地球是一个扁球体，纬度和经度是弧线而非直线，这意味着两点之间的距离会因你在地球上的位置而异，尤其是经度。经度一度的长度会随着你接近两极而变小。\n\
  \n#### 更精确的两点间距离\n\n有几种使用球面几何的方法可以计算曲线上的精确距离。这里不多赘述，直接介绍如何使用哈弗辛公式来确定两点 `a` 和 `b`\
  \ 之间的距离：\n\n其中\n\n这是该公式的 JavaScript 实现（`3959` 是地球的平均半径 `r`，单位为英里）：\n\n```javascript\n\
  function computeDistance(p1, p2) {\n  var lat1 = toRad(p1.coords.latitude);\n  var\
  \ lat2 = toRad(p2.coords.latitude);\n  var lng1 = toRad(p1.coords.longitude);\n\
  \  var lng2 = toRad(p2.coords.longitude);\n  var deltaLat = (lat2 - lat1);\n  var\
  \ deltaLng = (lng2 - lng1);\n  var calc = Math.pow(Math.sin(deltaLat / 2) , 2) +\n\
  \             Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin(deltaLng / 2)\
  \ , 2);\n  return 3959 * 2 * Math.asin(Math.sqrt(calc));\n}\n\n/* 将角度转换为弧度 */\n\
  function toRad(deg) {\n  return deg * Math.PI / 180;\n}\n```\n\n尽管这个方法相当精确，但它更复杂，计算时间可能大约要长三倍。同样，当你不需要如此高的精度时，还是使用第一个公式。\n\
  \n#### 行进方向\n\n利用两点，就像计算距离一样，也可以计算出需要行进的方向，称之为*方位角*。这很容易与航向角混淆，航向角是 API 提供的一个值，但它们是两个不同的概念。航向角是用户在移动时当前正行进的方向；方位角是需要行进的**方向**，与任何移动动作无关。换句话说，方位角是连接两点的线与经线之间的夹角，可以这样确定：\n\
  \n使用 JavaScript 转换如下：\n\n```javascript\nfunction computeBearing(p1, p2) {\n  var\
  \ lat1 = toRad(p1.coords.latitude);\n  var lat2 = toRad(p2.coords.latitude);\n \
  \ var lng1 = toRad(p1.coords.longitude);\n  var lng2 = toRad(p2.coords.longitude);\n\
  \  var deltaLng = (lng2 - lng1);\n  var y = Math.cos(lat2) * Math.sin(deltaLng);\n\
  \  var x = Math.cos(lat1) * Math.sin(lat2) -\n```\n\n\n\n`Math.sin(lat1) * Math.cos(lat2)\
  \ * Math.cos(deltaLng)`;\n\n`return (toDeg(Math.atan2(y, x)) + 360) % 360`;\n\n\
  }\n\n/* 将弧度转换为角度 */\n`function toDeg(rad)` {\n\n`return rad * 180 / Math.PI`;\n\n\
  }\n\n为了优化代码，我们使用 `Math.atan2()` 而非 `Math.atan()` 来简化公式；其优势在于能够兼顾两个值的符号，并将角度置于正确的象限中。然而，由于\
  \ `atan2()` 返回值的范围是 -180 到 +180，我们需要将角度归一化到 0 到 360 度之间。\n\n# 第 14 章：位置感知型 Web 应用程序\n\
  \n### 构建指南针 Web 应用\n\n在接下来的章节中，我们将利用本书介绍的一些元素，从头开始构建一个指南针 Web 应用。我们将使用 Canvas 绘制指南针的元素，同时使用更轻量级（从而更流畅）的\
  \ CSS 动画使其生动起来。\n\n**注意：** 对于这个实际示例，我们建议您在室外进行测试，以提高收集到更精确坐标（利用 A-GPS）的概率。同时请注意，您的应用程序在模拟器上无法运行，因为该\
  \ API 只会返回苹果公司在加利福尼亚州的位置。但在 iPad 模式下，该 API 会利用网络信息，至少轮询功能是可用的。\n\n该应用程序将使用我们之前介绍过的\
  \ Geolocation API 函数返回的数据；因此，构建它也可以作为一种便捷方式，实际测试不同情境下数据的准确性，以便后续构建更好的应用程序。\n\n图\
  \ 14-4 展示了我们将使用 Canvas API 构建的指南针的所有图形元素。这将使我们能够对渲染进行精细控制，同时保持所需文件的大小比常规图片更小。\n\n\
  **图 14-4.** 指南针的构成元素\n\n由于 canvas 元素相当消耗 CPU 时间（它们并非在硬件上绘制），直接使用 API 绘制动画会过于繁重，尤其是在处理复杂元素时。因此，为了移动指南针的指针和刻度盘，我们将采用第\
  \ 9 章中介绍的 CSS 过渡效果。\n\n#### 创建移动元素\n\n首先，我们将构建指南针中的所有移动元素。虽然这些元素将使用 Canvas API 绘制，但我们会将它们作为图像来使用以简化代码。首先是承载创建元素函数的对象。创建一个名为\
  \ `compass.js` 的新文件，并添加以下内容：\n\n```javascript\nvar Compass = function(size) {\n\
  \    this.dialGraduations = new Image();\n    this.bearingNeedle = new Image();\n\
  \    this.headingNeedle = new Image();\n    this.dialShine = new Image();\n    this.builder\
  \ = document.createElement(\"canvas\");\n    this.setSize(size);\n}\n```\n\ncanvas\
  \ 和图像是动态创建的，这样我们的对象就可以独立于使用它的代码。您只需指定需要添加指南针元素的节点即可。构造函数将预期的 canvas 尺寸作为参数。最初定义为\
  \ 140x140 像素的框架，然后通过 `scale()` 方法进行缩放。由于我们只使用矢量图形进行渲染，因此质量损失不成问题。\n\n```javascript\n\
  Compass.prototype.setSize = function(size) {\n    /* Canvas 原始尺寸 = 140x140 */\n\
  \    var scale = size / 140;\n    this.builder.width = 140 * scale;\n    this.builder.height\
  \ = 140 * scale;\n    this.context = this.builder.getContext(\"2d\");\n    this.context.scale(scale,\
  \ scale);\n    this.context.translate(70, 70);\n}\n\nCompass.prototype.clear = function()\
  \ {\n    this.context.clearRect(-70, -70, 140, 140);\n}\n\nCompass.prototype.render\
  \ = function(node) {\n    this.clear();\n    this.drawDialGraduations();\n    this.dialGraduations.src\
  \ = this.builder.toDataURL();\n    this.clear();\n    this.drawBearingNeedle();\n\
  \    this.bearingNeedle.src = this.builder.toDataURL();\n    this.clear();\n   \
  \ this.drawHeadingNeedle();\n    this.headingNeedle.src = this.builder.toDataURL();\n\
  \    this.clear();\n    this.drawDialShine();\n```\n\n\n\n`this.dialShine.src =\
  \ this.builder.toDataURL();`\n\n```javascript\n/* 将节点附加到文档中 */\nnode.appendChild(this.dialGraduations);\n\
  node.appendChild(this.bearingNeedle);\nnode.appendChild(this.headingNeedle);\nnode.appendChild(this.dialShine);\n\
  ```\n\n# 第 14 章：位置感知 Web 应用\n\n每个元素都有其自身的创建方法。在每个阶段，我们清空画布并调用相应的方法来创建一个元素。然后，画布会转换为数据\
  \ URL，以便传递给图像，并添加到作为参数传递给主函数的节点中。\n\n### 刻度盘\n\n所有元素均使用矢量图形绘制，而刻度盘是所需代码最多的部分，不过仍然相当简单。\n\
  \n> **注意：** 在此操作中，我们稍微取巧，因为文本 API 在 iOS 3.2 中尚不支持，但将在该操作系统下一个主要版本中支持。为了让我们的指南针更具风格并体现文本\
  \ API 的用法，我们仍然使用了它。\n\n```javascript\nCompass.prototype.drawDialGraduations = function()\
  \ {\n    var ctx = this.context;\n    ctx.save();\n    ctx.beginPath();\n    ctx.strokeStyle\
  \ = \"white\";\n    ctx.arc(0, 0, 15, 0, Math.PI * 2, false);\n    ctx.stroke();\n\
  \n    /* 绘制基本方位点 */\n    ctx.fillStyle = \"white\";\n    ctx.textAlign = \"center\"\
  ;\n    ctx.lineWidth = 0.75;\n\n    for (var n = 0; n < 4; n++) {\n        /* 字母占位符\
  \ */\n        ctx.save();\n        ctx.beginPath();\n        ctx.arc(0, -34, 7,\
  \ 0, Math.PI * 2, false);\n        ctx.fillStyle = \"rgba(0, 0, 128, 0.3)\";\n \
  \       ctx.fill();\n        ctx.restore();\n\n        /* 方位字母 */\n        ctx.font\
  \ = \"bold 9px Georgia\";\n        ctx.fillText(\"NESW\".substr(n, 1), 0, -31);\n\
  \n        /* 内部箭头 */\n        ctx.beginPath();\n        ctx.moveTo(-3, -15);\n \
  \       ctx.lineTo(0, -30);\n        ctx.lineTo(3, -15);\n        ctx.fill();\n\n\
  \        /* 刻度线 */\n        ctx.beginPath();\n        ctx.moveTo(0, -42);\n    \
  \    ctx.lineTo(0, -39);\n        ctx.stroke();\n\n        /* 下一个字母... */\n    \
  \    ctx.rotate(90 * Math.PI / 180);\n    }\n\n    ctx.rotate(45 * Math.PI / 180);\n\
  \n    for (var n = 0; n < 4; n++) {\n        /* 较小的方位字母 */\n        ctx.font = \"\
  bold 5px Georgia\";\n        ctx.fillText(\"NESESWNW\".substr(n * 2, 2), 0, -34);\n\
  \n        /* 较小的内部箭头 */\n        ctx.beginPath();\n        ctx.moveTo(-2, -15);\n\
  \        ctx.lineTo(0, -25);\n        ctx.lineTo(2, -15);\n        ctx.fill();\n\
  \n        /* 较小的刻度线 */\n        ctx.beginPath();\n        ctx.moveTo(0, 42);\n \
  \       ctx.lineTo(0, 40);\n        ctx.stroke();\n\n        /* 下一组较小字母... */\n\
  \        ctx.rotate(90 * Math.PI / 180);\n    }\n\n    /* 刻度线 */\n    ctx.globalAlpha\
  \ = 0.75;\n\n    for (var n = 0; n < 360 / 5; n++) {\n        ctx.beginPath();\n\
  \        ctx.moveTo(0, 42);\n        ctx.lineTo(0, 41);\n        ctx.stroke();\n\
  \        ctx.rotate(5 * Math.PI / 180);\n    }\n\n    ctx.restore();\n}\n```\n\n\
  首先，我们绘制中心圆，以及四个基本方位点及其指向外部的相应箭头。每次迭代时，我们进行 90 度旋转以绘制下一个点。绘制完四个基本方位点后，我们使用相同的过程添加次要刻度线。最后，我们每五度绘制一条刻度线。\n\
  \n使用 `save()` 和 `restore()` 方法可以防止后续绘图操作改变画布的状态。\n\n# 第 14 章：位置感知 Web 应用\n\n###\
  \ 指针\n\n方位指针的代码要简短得多。它略带透明，并在背景上投下阴影，使其可见的同时又不会太引人注意。\n\n```javascript\nCompass.prototype.drawBearingNeedle\
  \ = function() {\n    var ctx = this.context;\n    ctx.save();\n    ctx.shadowColor\
  \ = \"rgba(0, 0, 0, 0.3)\";\n    ctx.shadowOffsetX = 2;\n    ctx.shadowOffsetY =\
