    \  z-index: -1;\n  position: relative;\n  -webkit-transition: margin-top 0.35s\
    \ ease-out;\n  border-bottom: 0;\n  margin: 0 auto 34px;\n  width: 320px;\n}\n\
    \n.ads img { display: block; }\n\n.ads .tab:before {\n  color: red;\n  content:\
    \ 'AD ';\n}\n\n.ads .tab {\n  position: absolute;\n  background-image: -webkit-gradient(\n\
    \    linear, left top, left bottom,\n    from(black), to(#666));\n  color: white;\n\
    \  font: bold 11px/24px verdana;\n  height: 24px;\n  bottom: -24px;\n  left: 0;\n\
    \  width: 100%;\n  padding: 0 5px;\n  -webkit-box-sizing: border-box;\n}\n```\n\
    \nFirst, you define styles so that the advertisement stacks beneath the header\
