    \ moveSides(str, dir, coef) {\n\nvar s = document.getElementById(str).childNodes;\n\
    \nfor (var n = 0; n < s.length; n++) {\n\ns[n].style.webkitTransform = getMatrix(s[n],\
    \ dir, coef, 30);\n\n}\n\n}\n\nfunction moveCurrent(dir) {\n\nvar s = document.querySelector(\"\
    .current\");\n\nvar styles = window.getComputedStyle(s);\n\nvar matrix = new WebKitCSSMatrix(styles.webkitTransform);\n\
    \nmatrix = matrix.translate(30 * dir, 0, 0);\n\ns.style.webkitTransform = matrix;\n\
    \n}\n\nfunction getMatrix(s, dir, coef, move) {\n\nvar styles = window.getComputedStyle(s);\n\
    \nvar matrix = new WebKitCSSMatrix(styles.webkitTransform);\n\n/* Read values\
    \ from the matrix */\n\nvar angle = Math.acos(matrix.m11) * 180 / Math.PI * coef;\n\
    \nvar x = matrix.m41 + move * dir;\n\nvar y = matrix.m42;\n\nvar z = matrix.m43;\n\
    \n/* Return a new matrix */\n\nreturn new WebKitCSSMatrix().translate(x, 0, z).rotate(0,\
    \ angle, 0);\n\n}\n\nWhen the user clicks the button, the slide() function adds\
    \ a .slide class to the main container. This allows you to define a transition\
    \ to use, which is defined with CSS only:\n\n.slide span {\n\n-webkit-transition:\
    \ -webkit-transform .35s linear;\n\n}\n\nThe moveSlides() function gathers the\
    \ covers from each side and then uses the\n\ntransformation of each cover to read\
    \ the information from their matrices using\n\ngetMatrix() and the CSSMatrix object.\
    \ Because the rotation changes the position of the x-axis, we cannot simply apply\
    \ a new translation to move the covers, or they would go forward or backward instead\
    \ of to the left and to the right. This is why we re-create the matrix after having\
    \ calculated the current position of each element. For the focused cover, however,\
    \ because there is no rotation, we can simply use the translate()\n\nfunction\
    \ to change its position.\n\nCHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\nFlipping the Current Cover\n\nIf you try this\
    \ code now, you wil notice that al covers move to the left or right. Now to make\
    \ the focused cover return to the cover stack and switch the focus to next one,\
    \ we have to intercept the transitionend event before resuming the animation.\n\
    \nfunction slide(dir) {\n\n...\n\nvar current = document.querySelector(\".current\"\
    );\n\ncurrent.addEventListener(\"webkitTransitionEnd\", function(event) {\n\n\
    this.removeEventListener(event.type, arguments.callee, false);\n\ndocument.getElementById(\"\
    coverflow\").className = \"flip\";\n\nprepareFlipSide(dir);\n\nprepareFlipCurrent(dir);\n\
    \n}, false);\n\n}\n\nWhen the event is received, we immediately delete the listener,\
    \ because it is defined anew for each click event and no longer is of any use.\
    \ Then we add the fol owing .flip class to the main container again:\n\n.flip\
    \ span {\n\n-webkit-transition: -webkit-transform 0.2s ease-in-out;\n\n}\n\nThen\
    \ we cal the functions that are responsible for the cover rotations:\n\nfunction\
    \ prepareFlipSide(dir) {\n\nvar s = document.getElementById(dir > 0 ? \"left\"\
    \ : \"right\").firstElementChild; s.style.webkitTransform = \"translateX(\" +\
    \ (dir * 80) + \"px)\";\n\n}\n\nfunction prepareFlipCurrent(dir) {\n\nvar current\
    \ = document.querySelector(\".current\");\n\nDownload from Wow! eBook <www.wowebook.com>\n\
    \n/* Apply a new matrix based on the style of the side covers */\n\nvar base =\
    \ document.getElementById(dir < 0 ? \"left\" : \"right\").firstElementChild; current.style.webkitTransform\
    \ = getMatrix(base, dir, -dir, (80 - 30));\n\n}\n\nThe side cover to be focused\
    \ wil be repositioned with the prepareFlipSide() function; then, the prepareFlipCurrent()\
    \ function gathers the transformation of an element from the stack to apply its\
    \ matrix to the previously focused element. The last stage is to transfer the\
    \ nodes of the covers to their new parent so that a new animations can be initiated.\n\
    \nFinal Touch to the Animation\n\nTo maintain the consistency of the document,\
    \ we are going to move the covers after the second animation to give them their\
    \ original styles. This is done with the fol owing code: function prepareFlipCurrent(dir)\
    \ {\n\n...\n\ncurrent.addEventListener(\"webkitTransitionEnd\", function() {\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nthis.removeEventListener(event.type, arguments.callee, false);\n\n/* Reset elements\
    \ to their initial state */\n\nreset(\"left\");\n\nreset(\"right\");\n\ndocument.getElementById(\"\
    coverflow\").className = \"\";\n\nthis.style.webkitTransform = \"\";\n\nthis.className\
    \ = \"\";\n\n/* Append the current cover to its new parent */\n\nvar c, e = document.getElementById(dir\
    \ < 0 ? \"left\" : \"right\"); e.insertBefore(this, e.firstElementChild);\n\n\
    /* Append the new current cover to the main container */\n\ne = document.getElementById(dir\
    \ > 0 ? \"left\" : \"right\");\n\nc = e.firstElementChild;\n\ne.parentNode.appendChild(c);\n\
    \nc.className = \"current\";\n\n}, false);\n\n}\n\nfunction reset(str) {\n\nvar\
    \ s = document.getElementById(str).childNodes;\n\nfor (var n = 0; n < s.length;\
    \ n++) {\n\ns[n].style.webkitTransform = \"\";\n\n}\n\n}\n\nAs previously, we\
    \ add a listener to be notified of the end of the animation. Then, all elements\
    \ are reset to their initial states, and the covers are moved.\n\nDouble-Check:\
    \ Preventing Unexpected Behavior\n\nAt this stage, if a user clicks the button\
