    # 开始使用元素检查器


    开始使用 WebKit 的 Web 检查器最明显的方式可能是从 Web 应用程序的基础开始：HTML 标记。这也许也是最简单的方式。元素检查器可通过不同的操作访问。所有这些方式都有其优点，我们现在将介绍它们。


    ## 让文档属于你


    检查页面组件的主要方式是选择顶部栏的第一个标签，名为"元素"（`Elements`）。它将以语法着色、格式良好的树状结构显示你的页面，占据 Web 检查器的大部分窗口（见图
    3-8）。在右侧，你可以看到一个侧边栏，包含几个可折叠的面板。默认情况下，`<body>`标签会被高亮，但你也可以随时通过右键单击页面中的任何区域并从上下文菜单中选择"检查元素"（`Inspect
    Element`）来调用元素标签。


    **信息**：由于调试工具是用 HTML、CSS 和 JavaScript 构建的，你可能会误开始检查调试器窗口而不是你打算检查的代码。虽然这看起来像是检查器的一个限制，但对于那些希望扩展工具的人来说，这可能很有用。检查器的演进很大程度上是由社区驱动的。如果你有技能和时间，我们鼓励你加入并帮助改进它们。


    这种方法的主要优点是，在调试页面时，你通常大致知道问题出在哪里。通过从页面中的特定区域调用检查器，文档树将会展开，直达你想要分析的节点。


    此外，当鼠标悬停在页面中的某个元素上时，该元素会被高亮显示，半透明的浅蓝色表示其内部边界，深蓝色表示其内边距和边距。这意味着，即使你没有进入文档树，也能了解页面各组成部分的布局。


    ![](img/index-60_1.jpg)


    **第 3 章：介绍开发者与调试工具**


    **图 3-8. 检查书籍封面图片下的代码的视觉反馈**


    由于直观了解页面布局可能是一种吸引人的工具，你会很满意地了解到，后一种功能在调试工具的大多数部分中都可用，只需点击底部状态栏中的放大镜图标即可。


    当然，仅仅获取元素布局的表示通常不足以深入分析代码中发生了什么。让我们更仔细地看看元素检查器。


    无论你编写的代码如何呈现，检查器的文档树都会适当地缩进，每个新节点开始都会换行。此外，代码会被清晰地着色以使其更易读：标签为紫色，属性名称为橙色，属性值为蓝色。你甚至可以看到以绿色显示的內联注释。点击任何节点开始处的展开三角形可以切换其状态，这样你就不会面对无休止的需要滚动的换行。


    ## 挖掘你的样式


    在第一个面板中，你有几个类别，表示应用于你元素的所有样式，如图 3-9 所示。


    ![](img/index-61_1.jpg)


    **第 3 章：介绍开发者与调试工具**


    **图 3-9. 元素检查器侧边栏**


    从顶部开始的第一个样式类别非常有用；“计算样式”（`Computed Style`）是 WebKit 渲染器考虑、计算并应用的样式。这很方便，因为它让你一眼就能看到元素实际拥有的所有样式。由于几个原因，计算样式在处理数值规则（例如图
    3-9 中的 `width` 和 `height`）时也很有用。CSS 大量使用了相对值，例如 `em` 或百分比单位。因为所有计算后的大小都以像素表示，所以比较起来更容易。


    但是，如果你无法确定样式是从哪里计算出来的，那么在调试页面时，计算样式就毫无意义。这就是后续子面板发挥作用的地方。每个子面板代表一种样式应用的独立方式，按从最新应用到最早应用的顺序排列。CSS
    中的样式规则优先级按以下顺序考虑：使用 `style` 属性应用的样式（*内联*样式）首先应用；然后，来自 `<link>` 和 `<style>` 标签的
    `id` 和 `class` 选择器；然后是文档树选择器（选择器特异性越高，优先级越高——注意父元素的“权重”，无论它是通过 `id`、`class` 还是标签名来引用的，都会计入权重）；最后是标签名。


    **提示**：默认情况下，所有与颜色相关的规则都使用 RGB 或颜色名称（如果可用）表示。如果你希望在代码中使用其他颜色格式，可以通过单击规则旁边的彩色方块（这只会更改当前规则的格式）或通过单击侧边栏左上角的齿轮图标来更改格式，在十六进制、RGB
    和 HSL 之间切换。


    所有规则都会被列出。然而，由于并非所有规则都会被最终应用，你会注意到在侧边栏的其他部分，有些规则被划掉了，显示出该样式被另一条规则覆盖。同样，这种呈现方式让你精确地了解页面样式是如何工作的。


    ![](img/index-62_1.jpg)


    **第 3 章：介绍开发者与调试工具**


    **图 3-9. 元素检查器侧边栏**


    ## 编辑样式


    理解固然好，但能够直接从侧边栏修改样式规则则更胜一筹。你可以通过三种方式做到这一点。首先，要停用一条规则，只需取消选中规则右侧的复选框即可。你的页面将立即表现为该规则从未存在过，样式的继承也会相应地更新。


    更进一步，你可以通过双击任何值来编辑规则，如图 3-10 所示。这将使规则变为可编辑状态，并允许你输入任何内容。按 Return 键或点击编辑区域外部即可保存并应用新规则。


    最后，在检查器的最新版本中，你可以从头创建新的选择器，一次将样式应用于多个元素。这可以通过选项菜单完成，该菜单由侧边栏右上角的齿轮图标表示。同样，会出现一个新字段，但你可以同时输入样式规则及其应用的选择器。如前所述，按
    Return 键或点击编辑区域外部即可使更改生效。


    **图 3-10. CSS 属性易于编辑**


    Web 检查器不仅让你能够深入了解页面，还为你提供了工具来进行严肃的原型设计，而无需经历检查、修改文件、保存、重新加载页面等繁琐过程。


    ## 度量（Metrics）


    从顶部开始的第二个面板“度量”（`Metrics`）提供了一个可视化表示，显示应用于页面元素的大小相关规则，即外边距、内边距、边框、宽度和高度，所有这些都显示在图
    3-11 中。这些规则一起被称为*盒模型*。


    检查器的最新版本还添加了对于 `position` 属性设置为 `relative`、`absolute` 或 `fixed` 的元素的定位信息。这种表示方式使用起来当然比在“样式”（`Styles`）面板中找到的
    CSS 规则列表要快得多，并且就像你可以修改后者中的规则一样，你也可以通过双击要更改的值来修改前者的尺寸。你可能会注意到，与计算样式类别中一样，此处的值都被处理成以像素为单位，而不管其初始定义如何。


    ![](img/index-63_1.jpg)


    **第 3 章：介绍开发者与调试工具**


    **图 3-11. 度量面板**


    **提示**：在“样式”（`Styles`）和“度量”（`Metrics`）面板上，你可以通过双击数值并使用键盘上的上下箭头键来修改数值，以 1（默认）、10（结合
    Shift 键）或 0.1（结合 Alt 键）为步长递增或递减。


    元素检查器中较低的两个面板可能看起来有点神秘。但它们同样有用。


    ## 属性（Properties）


    页面中的每个元素都可以通过 DOM 对象的实例来访问，该

    '
- fmt: 'allows you to work with this element from within your JavaScript code. As
    such, each element has properties of its own and inherited properties. For instance,
    an `<h1>` tag is a DOM `HTMLHeadingElement` instance with `HTMLHeadingElement`
    properties but also inherited `HTMLElement` object properties and methods, and
    so on, up to the `Object` object properties.


    The different collapsible categories in the Properties pane show an alphabetical
    list of all the properties and methods of the currently selected object (Figure
    3–12). Of course, a DOM element doesn’t have only fixed property values. The `innerHTML`
    property, for example, will be different depending on the page it is used in;
    the Properties pane lists all these variable values at the time of inspection.


    ![](index-64_1.jpg)

    ![](index-64_2.jpg)


    Figure 3–12. The Properties pane


    Knowing all this probably won’t be of any help when editing HTML or CSS, but it
    definitely can be when writing JavaScript. It brings you a whole range of information
    to build with or upon that represents the DOM with all the dynamic potential it
    has. We say not only “build with” but “build upon,” because scripting with JavaScript,
    you probably will be adding properties to your elements. The Properties pane will
    update as you type or execute scripts, so you can always get a relevant picture
    of your document and object state.


    ## Event Listeners


    The last trick to complete your vision of the DOM through the inspector is, precisely,
    to see where in the page objects are likely to change. Now, by switching to the
    last sidebar pane, Event Listeners, shown in Figure 3–13, you can see whether
    any JavaScript event—like a click or load event—is attached to it.


    ![](index-65_1.jpg)


    Figure 3–13. The Events Listeners pane showing listeners hierarchy


    Events are grouped by type, and each event can be unfolded to reveal the functions
    related to it in the order they are called. This would let you see, for instance,
    why your listener might never be called—because it is possible to stop propagation
    from a listener. It would also let you discover memory leaks due to the unexpected
    stacking of listeners based on anonymous functions, which are more complicated
    to stop than regular listeners.


    Having a list of nodes to which an event is attached is useful when you want to
    know whether an element is related to a script, but what is especially useful
    is to have a list of all dynamic elements as a new way to inspect the DOM and
    to find bug causes such as JavaScript conflicts.


    ## Advanced Search


    In addition to the collapsible representation of the document tree and the magnifying
    glass tool that allows you to select elements directly where they are shown, there
    is another, more advanced tool available to you when inspecting your HTML document.


    It’s the search field at the top-right corner of the Web Inspector window. We
    are talking about this tool now because its most nifty uses are those regarding
    HTML searching, but the search field is always available to the debugging tool
    currently in use and will yield results from and related to what you have before
    your eyes.


    Searching the HTML markup can be done using advanced options. If your search returns
    any results, the number of items will be reported on the left side of the search
    field, as shown in Figure 3–14. All matching occurrences will be highlighted in
    the document tree, and the first one will be selected.


    ![](index-65_1.jpg)


    Figure 3–14. The number of matches is shown at the left of the search field


    The most obvious search option is to simply look up plain text. This is done against
    the document content (taking case into account) and against tag and attribute
    names (case-insensitive). Although this may not seem very efficient for large
    or poorly known documents, it at least is easily understood and used, and because
    the results are clearly displayed, it should prove altogether useful.'
