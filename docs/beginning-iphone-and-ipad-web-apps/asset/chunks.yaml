    \ web pages, various studies have proven that users are widely \"trained\" to\
    \ not even notice advertisements. Although you may think this is less a problem\
    \ on the iPhone, because advertisements necessarily take up more of the screen\
    \ estate and the display is usually less cluttered, you shouldn't overload your\
    \ page. There is a clear risk that forcing the user to pan past irrelevant content\
    \ or to zoom away from it may quickly drive the user away from your web application.\n\
    \nFor web applications and native applications, ad standards have already been\
    \ long established; you would generally display a small banner at the top or at\
    \ the bottom of the page. Native applications, however, take this further and\
    \ automatically hide advertisements after a short delay in most cases, leaving\
    \ the entire space to the actual content. This has the advantage of driving the\
    \ attention of the user to the ad while not being intrusive. It would be a positive\
    \ move to bring such a behavior to web applications, especially because, using\
