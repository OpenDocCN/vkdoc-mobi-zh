  raw: 'The maximumAge option tells the device to look for this kind of data before
    trying to determine the user’s actual position and allows you to set an age limit
    for this data. As we have seen previously, another advantage of this solution
    is that it decreases the drain on the battery.


    The default value for maximumAge is 0, meaning the device will try to return an
    updated value for each request; if set to Infinity, the user agent will necessarily
    return a cached value, if any. If none exists, it will acquire a new position.


    The timeout attribute forces a time limit in milliseconds for the location acquisition
    to complete. The default value is Infinity which lets you imagine how the timeout
    option can be useful when developing an application. If not specified, the application
    will run until the terminal returns the requested information, even if this information
    is for some reason not available. Specifying a value for timeout, a TIMEOUT error
    will be sent to the error callback when the limit is reached.


    In the previous example, if no value for the position is cached, the function’s
    failure callback will be called immediately. Please note that whatever time the
    user takes to grant access to their position information is not taken into account.


    Combining these options can make your application more responsive. However, when


    you do need this extra precision, the third option, enableHighAccuracy, tells
    the API to get the closest answer possible to the user’s actual location. This
    option by default is set to false.


    Keep in mind that users usually care about hyper-local information, so you may
    want to try to offer accurate positioning. The accuracy will increase as you poll
    for location. This can be helped by using the tracking functionality of the API.
    As a last resort, if the location is not available, you can rely on a text field
    so that users can specify their city or ZIP code, which is often the last acceptable
    level of precision.


    CHAPTER 14: Location-Aware Web Applications


    Putting the User on a Map with Google Maps


    To make the use of the data returned by the location API, we are going to make
    an example where the user is situated on a map using Google Maps.


    Google Maps comes with a rich API that is used, among others, by the MapKit


    framework from Cocoa Touch in native applications. It will bring the same functionality
    to you as the Maps application on the iPhone. Its assets include that it is free,
    doesn’t require preliminary registration, and is quite easy to use with JavaScript.


    Showing the Map


    Let’s start with the beginning: displaying the map. What our web application is
    going to do is let the user show a position on a satellite view, with the level
    of precision represented by a circle.


    Begin by creating a new project based on your web application template, and modify
    the *index.html* file as follows:


    ...


    <title> **Geolocation Example**</title>


    ...


    <body>


    <div class="view">


    **<div id="map"></div>**


    **<div class="header-wrapper"** >


    **<h1> **Geolocation**</h1>**


    ****</div>**


    ****</div>**


    **</body>


    The <div> identified as map is the area that will hold the map. We want it to
    take up the available space, with a translucent header overlapping. Here are the
    styles to achieve this:


