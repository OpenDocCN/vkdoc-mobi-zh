    \ expression is true, the script will be stopped; otherwise, its execution will\
    \ resume automatically.\n\n![](index-74_1.jpg)\n\n**Figure 3–19.** Setting a conditional\
    \ breakpoint\n\nIn a debugging process, it can be cumbersome to set a breakpoint,\
    \ see what’s happening, remove it, look for another line, come back to the previous\
    \ one, and so on. The bottom pane in the sidebar, Breakpoints, is your friend\
    \ for this. It holds a list of all breakpoints, which instead of deleting, you\
    \ can deactivate by clicking their respective check boxes. You can also deactivate\
    \ them all at once using the breakpoint icon at the top right of the sidebar.\n\
    \nOnce you have changed options, you will have to reload the page. Scripts will\
    \ run until a breakpoint is reached. Then, all execution is paused, and contextual\
    \ information about the execution is shown on the right, as shown in Figure 3–20.\n\
    \n![](index-74_1.jpg)\n![](index-74_2.jpg)\n\n**Figure 3–20.** When the debugger\
    \ stops on a breakpoint, the sidebar is updated with information related to the\
    \ current execution context\n\n### Stepping\n\nWatching just one part of a script\
    \ before going through the entire process over again isn’t very efficient or natural.\
    \ To work around this, let’s take a closer look at the stepping buttons at the\
    \ top of the sidebar, shown in Figure 3–21.\n\n![](index-75_1.jpg)\n\n**Figure\
    \ 3–21.** The script debugger with stepping buttons\n\nYou can use the first button\
    \ to pause the execution of the current script before"
