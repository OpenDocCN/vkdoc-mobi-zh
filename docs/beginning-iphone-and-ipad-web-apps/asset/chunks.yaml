    *error*.CONSTRAINT_ERR (6)


    A foreign key violation has occurred. This would happen, for


    instance, if you tried to insert a line in News for a sourceID that


    doesn’t exist.


    Both can be useful, for instance, to trace the behavior of the API and bring the
    user relevant information when an error occurs, inviting to try again. We can
    modify our function to build a more precise response regarding the relevancy of
    initializing the database.


    function checkDatabase(db) {


    ...


    /* Failed? The database should not be initialized */


    function(**error**) {


    **if (error.code == 1) { // Unknown table**


    initDatabase(db);


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    **} else {**


    **alert("An error occurred:\n" + error.message);**


    **}**


    },


    ...


    }


    Both of these methods will be called after the execution of the transaction contents—


    here, the calls to executeSql(). If a request fails, the execution will be halted,
    and the whole transaction will be rolled back, and the database will return to
    its state prior to the transaction operations. If all requests succeed, the transaction
    will be committed, and the database will be updated.


    However, it is possible to continue the transaction after an error from within
    a SQL


    command. The failure callback of the executeSql() method can return a value indicating
    if the error is fatal and if it is possible to resume the transaction. The value
    false will allow you to continue the transaction, while the value true will halt
    it. If no value is returned, true will be implied. The upsertNews() function could
    be changed to


    implement this.


    function upsertNews(tran, params) {


    ...


    tran.executeSql(


    ...


    tran.executeSql(sql, params**, null, function() {**


    **/* Do not stop transaction on error */**


    **return false;**


    **}**);


    ...


    );


    }


    Proceeding this way, if an update of insert fails, whatever the reason, other
    requests will not be affected and will continue updating the table.


    Maintaining Coherent Access with Versioning


    During a database life cycle, there always comes a time when it is necessary to
    evolve.


    Of course, you can apply tests similar to those used previously and check whether
    a table is available on initialization and attempt to create one if not, but this
    would dilute the schema maintenance logic throughout the code. Moreover, if the
    structure of an existing table should change, it is preferable to control the
    database version on a higher level and apply necessary modifications.


    We have seen that the openDatabase() method takes a parameter allowing you to
    ask for a specific version for the database. If, when the function is called,
    the version stored in the browser doesn’t match, an INVALID_STATE_ERR exception
    is raised. This DOM


    exception isn’t very explicit and will not let you determine whether the error
    is a version problem. To handle version evolution, you will need to pass an empty
    string as a version parameter and read the version property of the Database object.


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    WARNING: In Mobile Safari, the value of the version property will be modified
    only if the user closes all open browser windows on the domain holding the database.
    Thus, even after the version has changed, the former schema version will still
    appear, executing the migration code again. For such cases, remember to add a
    verification querying, for instance, the new schema.


    With the value of this property, you can use the asynchronous changeVersion()
    method to evolve the database schema. Here is its signature:


    database.changeVersion(oldVersion, newVersion,


    changeCallback, errorCallback, successCallback);


    Each callback receives parameters equivalent to those of the transaction() method.


    Thus, the first will receive a SQLTransaction object allowing you to execute modification
    queries, and the second will receive a SQLError object. You can use them as shown
    here:


    var globalDB = window.openDatabase("Apress", "",


    "Apress Storage Demo", 1 * 1024 * 1024);


    if (globalDB.version == "1.0") {'
