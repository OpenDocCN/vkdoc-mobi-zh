    }


    function failureCallback(error) {

    switch (error.code) {

    case error.PERMISSION_DENIED:

    alert("定位失败。请检查定位服务是否已开启，以及您是否已授予应用定位权限。");

    break;

    case error.TIMEOUT:

    case error.POSITION_UNAVAILABLE:

    alert("定位失败。这通常发生在您处于室内环境时。");

    break;

    default:

    }

    }

    ```

