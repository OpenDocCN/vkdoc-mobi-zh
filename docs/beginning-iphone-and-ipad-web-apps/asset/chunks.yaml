    \n## 第 2 章：开发环境\n\n### 基于 Windows 的系统\n\n在 Windows 系统上，此文件可以使用任何文本编辑器编辑，无需特殊权限。例如，你可以在此使用`Komodo\
    \ Edit`。`/etc/`目录位于`C:\\Windows\\System32\\drivers\\`，你可以在那里找到你的`hosts`文件。\n\n\
    其内容与 Unix 和 BSD 系统上的内容非常相似。你应该应用与上一节相同的更改。你的更改将自动生效。\n\n### 配置多个网站\n\n现在，作为额外福利，我们将讲解最后一件事。此步骤并非必需；我们只是认为部分读者可能对此感兴趣。具体来说，我们将解释如何在服务器上创建多个站点。这样，在同时处理多个项目时，你可以让浏览器理解正确的地址，而不是使用子文件夹。\n\
    \n除了在不同文件夹中使用不同站点名称带来的组织优势外，你还能受益于“根目录”的概念，无论是使用 PHP、HTML 还是 CSS。\n\n实际操作中，在 PHP\
    \ 中，你可以使用`$_SERVER['DOCUMENT_ROOT']`环境变量访问此信息。在编写 HTML 和 CSS 时，如果 URL 以斜杠（`/`）开头，浏览器会理解你调用的路径将从目录结构的顶层开始。在站点`http://localhost/example/`上，`/images/hey.png`表示`http://localhost/images/hey.png`。\n\
    \n### Apache 2：深入探索\n\n以下步骤适用于 Apache 服务器，也就是你在 Mac OS X 和 Linux 平台上安装的服务器类型。作为幸运的\
    \ Unix 用户，你还需要稍作调整，因为如前所述，不同平台安装 Apache 的方式并不相同。你需要找到 Apache 的主配置文件，并对其进行修改。还有其他管理虚拟主机的方法，但这种方法最接近跨平台。\n\
    \n#### 检查配置\n\n如同安装部分，你将再次在终端中使用`Vi`编辑文件。打开一个终端窗口，根据你的系统输入以下两条命令之一：\n\n```\nsudo\
    \ vi /private/etc/apache2/httpd.conf # 适用于 MacOSX\nsudo vi /etc/apache2/apache2.conf\
    \       # 适用于 Debian\n```\n\n一个文件将会打开，其内容因系统而异。你要做的第一件事是检查以下两行：\n\n```\n# 确保 Apache\
    \ 监听 80 端口\nListen 80\n\n# 在所有 IP 地址上监听虚拟主机请求\nNameVirtualHost *:80\n```\n\n如果它们存在，很好，你可以进入下一步。如果不存在，你应该将它们添加到文件末尾。要在`Vi`中执行此操作，请将光标移动到文件末尾，再次输入`a`（Append，追加）以进入编辑模式。这些规则确保你的\
    \ Apache 服务器将监听 80 端口上的 HTTP 请求，无论 IP 地址如何（这就是使用`*`的原因）。\n\n#### 配置你的第一个虚拟主机\n\
    \n接下来是创建实际的虚拟主机。你至少需要为你的站点指定一个名称（URL）和文档根目录的路径（你的文件将存放的位置）。在你的配置文件末尾，使用你想要的名称和路径添加以下代码：\n\
    \n```\n<VirtualHost *:80>\n    DocumentRoot /var/www/example\n    ServerName www.example.local\n\
    </VirtualHost>\n```\n\n**警告：** 使用此指令添加虚拟主机将覆盖最初安装的主机。为防止这种情况，你应该在添加新虚拟主机之前，使用全局服务器名称及其文档根目录创建一个虚拟主机。你可以在正在编辑的主\
    \ Apache 配置文件中找到所需的信息。\n\n完成所有必要的更改后，你可以保存文件并退出`Vi`，方法是按下`Esc`键，然后输入`:wq`（写入并退出）。然后，重启你的服务器。如果你是\
    \ Mac 用户并且遵循了 Apache 安装过程，你已经知道如何操作。对于 Debian 用户，请运行以下命令：\n\n```\nsudo /etc/init.d/apache2\
    \ restart\n```\n\nApache 现在知道你的站点存在了，但系统的其余部分还不知道，除非你已将其添加到`hosts`文件中。要解决此问题，你应该按照前面解释的步骤修改此文件。\n\
    \n现在你可以在浏览器中检查你的新站点，输入你选择的服务器名称。由于你的文档根目录中没有文件，应该会显示一个相当空白的页面。不过，它能够正常工作，所以我们会在接下来的章节中与你见面，用令人兴奋的自制\
    \ Web 应用程序来填充它。\n\n### Windows 的情况\n\n如果你是一名 Windows 用户，能否设置虚拟主机取决于你安装的操作系统。在\
    \ Vista 之前，无法在工作站上配置多个站点。XP 用户只能通过编辑其`hosts`文件来模拟多个站点，如前所述。\n\n然而，对于 Vista 和 7\
    \ 用户，你可以通过从**控制面板** ➤ **管理工具** ➤ **计算机管理**更改 Internet 信息服务（IIS）配置来访问此类功能。然后，在出现的窗口中，展开左侧窗格中的**服务和应用程序**部分，并选择**Internet\
    \ 信息服务管理器**。\n\n**注意：** 如果在 Windows 7 下没有出现相关菜单，请从右上角的弹出菜单中将**控制面板**窗口的显示模式更改为小图标或大图标。\n\
    \n此时，你的窗口应该看起来像**图 2-9**。\n\n**图 2-9. IIS 管理器视图**\n\n接下来，右键单击左侧第二个窗格中的**站点**目录，然后从上下文菜单中选择**添加网站**。出现的表单相当简单，如**图\
    \ 2-10** 所示。只需填写你为站点指定的列表名称、其根目录路径以及你要用来访问它的 URL。\n\n**图 2-10. 网站配置面板**\n\n你的网站现在准备就绪！如果似乎无法从\
    \ Web 浏览器访问所需的 URL，请检查它是否已添加到你的`hosts`文件中。否则，你的机器将不知道此地址应在本地查找。\n\n### 你成功了吗？\n\
    \n是不是比你预期的要简单？搭建一个基本的服务器不一定是一项复杂的任务，尤其是在两大主流操作系统公司都已完成相关工作的情况下。\n"
- fmt: '# Great Efforts to Make It Even More Accessible


    If you’re the believe-it-when-I-see-it type, here’s the perfect test for you.
    Create a PHP file in your server root directory. In Komodo Edit, this is done
    by going to the menu item File ➤ New ➤ New file… and choosing the PHP file template.
    In the newly created file, type the following code:


    ```

    <?php


    phpinfo();


    ?>

    ```


    Save the file to your server root directory under the name `index.php`. Now open
    your local site in a browser: you should see tables with details about your server
    configuration. This means two things. For one, you’ve run a PHP script, which
    means everything is OK; then, you can check all the options available on your
    new server.


    ## Chapter 2: Development Environment


    **WARNING:** if your browser offers to download the file, something has gone wrong
    during the installation. Check the steps described earlier to find out what has
    been forgotten.


    At this stage, you can even open this page in your favorite Apple device. There
    are just a couple of conditions you need to check: for all systems, you need your
    computer and device to use the same Wi-Fi connection. This is always the case
    using the SDK simulator, because the server and simulator share the same computer.
    On a Windows system, as we explained earlier, you will have to type the IP address,
    not the computer name.


    In all cases, if you choose the IP address solution, be aware that most Wi-Fi
    connections use Dynamic Host Configuration Protocol (DHCP). This means the IP
    address will be attributed dynamically and thus will be likely to change: whereas
    you may be able to access your server with the same IP any time at your home or
    office, switching from one to the other—or establishing a connection at Starbuck’s—will
    probably require you make a change.


    ## Bet You Have!


    Well, you’ve begun doing exciting things here. Perhaps for the first time, you’ve
    set up a functional server to host and serve your work in progress before showing
    it to the world.


    It is also possible that you now have a better understanding of how web sites
    work, which is also a good point. Now, the last, but definitely not least, thing
    we have to do to make this setup part complete is to introduce the tools you’ll
    be extensively using all the way through your web app developer’s life: the debugging
    tools.


    # Chapter 3: Introducing Developer and Debugging Tools


    It isn’t obvious that developing for the Web would require specific debugging
    tools or that such tools would even exist. Not so long ago, front-end development
    was seriously lacking good tools to analyze and debug page components. But the
    Web has evolved tremendously: front-end debugging tools have flourished, and most
    major browsers nowadays come with built-in debugging tools or easily added extensions.


    The proliferation of such solutions is recent but by no means surprising. Building
    a web site generally means tightly combining a markup language, a styling language,
    and a scripting language. As sites get more and more complex, it can get ever
    more complicated to keep track of all the elements of these building blocks.


    Because we are going to be working specifically with Mobile Safari, which is a
    WebKit-based browser, and because WebKit’s debugging tools for Desktop Safari
    are extremely well designed, let’s get started with Safari’s developer tools.
    You’re one step away from handling real-life code now, and we assure you that
    mastering these tools will save you a lot of time and hassle.


    In this chapter, we will talk about the developer tools in Safari. The features
    we introduce are mostly available using other WebKit browsers, yet we cannot guarantee
    that all the features will be found in the same place or using the same process.


    ## Making Friends with WebKit’s Developer Tools


    Not only does WebKit come with excellent support of web standards, but it also
    provides advanced tools such as a great live document and styles editor and a
    full-featured JavaScript debugger to make the life of front-end developers easier.
    These will help you considerably speed up your development process throughout
    its different stages. From simple control of your HTML markup to database management
    following the latest HTML5 standards, we are going to help you activate and use
    these tools at their best.


    ---


    **NOTE:** At the time of this writing, we are talking about the latest nightly
    build of the developer tools. You may be using an older version of these tools.
    If you are missing some functionalities, you can always get the latest build from
    WebKit’s site at [http://nightly.webkit.org](http://nightly.webkit.org/).


    ## Enabling the Develop Menu


    Naturally, the first step to use these tools on Safari is to start Safari. From
    the Preferences window (File ➤ Preferences…), choose the Advanced tab. In this
    section, you want to select the “Show Develop menu in menu bar” option (see Figure
    3–1). You now have an extra menu entry in your browser’s menu called Develop.
    You can also add an “i” button to your toolbar, and you can always access the
    tools by right-clicking any element on a web page and choosing Inspect Element
    from the contextual menu.


    ---


    **Figure 3–1.** You can enable the Develop menu from the Advanced preferences


    ## The Develop Menu Exposed


    Let’s now explore the Develop menu, shown in Figure 3–2. Your first option allows
    you to open the current page in any other browser you have available on your computer.
    Because we are targeting Safari, you probably won’t use this option a lot.


    ---


    **Figure 3–2.** Many options are available directly from the new Develop menu


    The second option, however, may come in handy more often. With WebKit’s developer
    tools enabled, you can change the user agent for Safari, which technically means
    changing the string the browser sends to the distant server to identify itself
    as such or the engine, engine version, and so on. If you’re going through your
    developing process on Desktop Safari but you want to implement browser- or platform-sniffing
    capabilities (instead of relying on features detection) to enable specific features
    for some users or you want to access a site blocked to browsers other than Mobile
    Safari, this is going to help. Changing the user agent header sent by your desktop
    browser through this menu will make websites recognize your client as Mobile Safari
    on iPhone, iPod touch, or iPad.


    The `Show Web Inspector` and `Show Error Console` items will both open the Web
    Inspector, respectively focusing the Elements Inspector and Console sections,
    which we will cover in further detail soon.


    The `Snippet Editor` menu item will open a different window. The idea behind the
    snippet editor is that building or tweaking a web page can be a cumbersome process.
    Creating files, modifying, saving, reloading in a browser window, and starting
    again can be a long process and require switching between many windows and applications.
    The snippet editor handles all this from the same dual-pane window. We’ve used
    it extensively to test code examples for this book, so we believe that it can
    be a great help to you too.


    The upper part of the window is for you to write your code. It handles HTML, CSS,
    and JavaScript, and it can manage huge amounts of it. The lower part updates as
    you type to show you the code as it would appear in a proper browser window. In
    prototyping stage, this can allow you to easily test your code and try plenty
    of alternatives.'
