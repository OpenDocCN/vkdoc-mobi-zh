    This indeed works, but it is somewhat clumsy and heavy to use, especially considering
    there is a much simpler way to achieve this.


    You can activate these equivalents by adding an event handler on the window, and


    without even adding functionality to this handler, it just works and triggers
    the desired behavior. Therefore, the following code added to the *main.js* file
    in our web application template will allow us to add the subsequent rule to our
    *main.css* file, as shown in Figure 6–2:


    /* main.js */


    document.addEventListener("touchstart", new Function(), false);


