    \n**WARNING:** You cannot use the debugger by running scripts from the console.\
    \ Whatever breakpoints you have placed or exceptions are generated, the execution\
    \ in this case will not pause. Therefore, you must also think of useful log functions\
    \ to follow your scripts.\n\nClicking the line gutter on the left side of the\
    \ window will toggle a blue breakpoint for the part of the script on that line.\
    \ Using the previous code, you can, for instance, add a breakpoint on the line\
