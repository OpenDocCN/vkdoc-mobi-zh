  trans: "\n# 遵循与标记器相同的原则\n\n遵循与标记器相同的原则，我们仅使用`Circle`对象的一个实例。它同样通过`LatLng`和`Map`对象进行初始化。半径以米为单位设置，并将由地理位置\
    \ API 返回的值设定。除了这些参数，你还可以为指示器的填充色和描边色以及其透明度定义颜色。与之前一样，你只需修改成功回调函数，将精度纳入考量。\n\n\
    ```\nfunction successCallback(position) {\n    ...\n    drawMarker(latlng, position.coords.accuracy,\
    \ \"#0072f9\"); // 蓝色标记\n}\n```\n\n这将为用户带来令人满意的定位服务，不仅显示他们的位置，还显示定位的精度，如图 14-3\
    \ 所示。\n\n![](img/index-432_1.jpg)\n\n**图 14-3.** 用户位置与定位精度一同显示在地图上\n\n借助 Google\
    \ Maps API，你可以走得更远，从使用 Google 服务器上定义的路线，到通过街景模式展示信息。由于有大量值得探索和用于构建令人印象深刻的应用的功能，我们建议你查阅在线文档\
    \ [`code.google.com/apis/maps`](http://code.google.com/apis/maps)/。\n\n---\n\n\
    ## 追踪用户位置\n\n你已经学会了如何请求用户位置以及如何在地图上显示这些信息。现在，你应该非常清楚如何根据你计划如何利用这些数据来最高效地执行此操作。\n\
    \n现在让我们关注地理定位 API 的另一个特性：追踪设备位置变化的能力。通过持续跟踪用户的位置，你将能够在事件发生时做出响应，例如在路线规划应用或与某些地理标记工具结合使用时。\n\
    \n### 注册更新\n\n此功能通过 `watchPosition()` 方法访问。此方法的使用方式与 `getCurrentPosition()` 相同，参数也相同。然而，后者发送一个位置后就结束，而前者则会持续发送位置并反复运行。\n\
    \n`watchPosition()` 方法还会返回一个唯一标识符，之后可用于停止追踪。调用此函数的最简单方式如下：\n\n```\nvar watchId\
    \ = window.navigator.geolocation.watchPosition(successCallback);\n```\n\n当使用相关\
    \ ID 作为参数调用 `clearWatch()` 函数时，重复请求将终止：\n\n```\nwindow.navigator.geolocation.clearWatch(watchId);\n\
    ```\n\n始终将此选项提供给最终用户似乎是合理的选择，他们应该始终能够控制自己的设备，并且通常知道为何启动应用，从而知道何时停止它。\n\n尽管如此，根据\
    \ `watchPosition()` 的用途，`clearWatch()` 也可以在特定事件触发时被调用，例如，在路线规划应用中，当用户到达请求的目的地时。\n\
    \n### 观察者的特定行为\n\n由于 `watchPosition()` 是一个迭代函数，了解当用户在不调用 `clearWatch()` 函数的情况下退出应用、设备电量耗尽或发生其他情况时会发生什么，是很有用的。\n\
    \n当用户返回启动器时，如果有足够的空间缓存应用状态，该函数将暂时挂起，并在浏览器再次启动时恢复。如果发生错误，更新尝试将继续，API 将调用失败回调函数。\n\
    \n你可以使用以下代码检查此行为：\n\n```\nwindow.navigator.geolocation.watchPosition(successCallback,\
    \ failureCallback);\n\nfunction successCallback(position) {\n    var msg = '位置:\
    \ ' +\n        position.coords.longitude + ', ' +\n        position.coords.latitude;\n\
    \    console.info(msg + '\\n 在 ' + (new Date()).toTimeString());\n}\n\nfunction\
    \ failureCallback(error) {\n    var err = error.message + ' (' + error.code +\
    \ ')';\n    console.error(err + '\\n 在 ' + (new Date()).toTimeString());\n}\n\
    ```\n\n加载一个运行此代码的页面，退出 Mobile Safari，然后激活或停用地理定位服务。你将看到位置更新仍在继续，这意味着错误或退出应用都不会停止\
    \ API 的运行。\n\n如果用户拒绝访问地理定位服务，API 将继续发送错误消息，尽管用户不会有第二次机会更改其对请求的答复。但是，在这种情况下，当用户退出\
    \ Mobile Safari 并重新启动后，授权弹出窗口将再次出现；在这种情形下，API 以这种方式保持轮询活动是可以理解的。\n\n认识到这种特殊行为后，开发人员应通过构建适当的回调函数来预见它，以通知用户追踪问题，或在达到一定尝试次数后使用\
    \ `clearWatch()` 方法停止追踪。\n\n### 在 Google 地图上观察位置\n\n为了说明这种追踪可能性，我们将修改之前的 Google\
    \ 地图示例以纳入追踪功能，首先将以下代码绑定到我们的按钮上：\n\n```\nvar firstRun, trackerID, failedCount =\
    \ 0;\n\nfunction swapAction() {\n    var button = document.getElementsByTagName(\"\
    button\")[0];\n    if (trackerID == undefined) {\n        trackerID = window.navigator.geolocation.watchPosition(\n\
    \            successCallback, failureCallback);\n        button.textContent =\
    \ \"停止\";\n        button.style.backgroundColor = \"#c6323d\"; // 变为红色\n     \
    \   firstRun = true;\n    } else {\n        window.navigator.geolocation.clearWatch(trackerID);\n\
    \        trackerID = undefined;\n        button.textContent = \"追踪\";\n      \
    \  button.style.backgroundColor = \"\";\n    }\n}\n```\n\n在这里，让用户随时停止追踪非常重要，因为追踪会消耗设备电量；当用户停止移动时，他会想要停止；此外，取决于所使用的定位方法，追踪返回的数据可能不尽如人意。为此，我们将在追踪发生时将“追踪”按钮改为“停止”按钮。`swapAction()`\
    \ 函数将同时用于此目的、执行停止操作以及在发生错误时停止追踪。\n\n然后，我们对 `successCallback()` 函数稍作修改。\n\n```\n\
    function successCallback(position) {\n    var latlng = new ns.LatLng(position.coords.latitude,\
    \ position.coords.longitude);\n    map.panTo(latlng);\n    if (firstRun) {\n \
    \       map.setZoom(17);\n        firstRun = false;\n    }\n    ...\n    failedCount\
    \ = 0;\n}\n```\n\n这里，我们用 `panTo()` 替换了 `setCenter()`。与 `setCenter()` 相比，`panTo()`\
    \ 函数的优势在于它会滑动到新位置，而非直接跳转。此外，我们只在首次定位时缩放；这样，如果用户更改了缩放比例，他们的选择不会因为位置改变而被丢弃。\n\n\
    因为此请求成功，我们将错误计数器设置为 0。另一方面，失败回调函数需要稍多一些工作。\n\n```\nfunction failureCallback(error)\
    \ {\n    /* 发生 100 次错误后停止追踪 */\n    if (error.code != error.PERMISSION_DENIED)\
    \ {\n        failedCount++;\n        if (failedCount < 100) {\n            return;\n\
    \        }\n    }\n    failedCount = 0;\n    swapAction();\n    switch (error.code)\
    \ {\n        ...\n    }\n    button(true);\n}\n```\n\n信号接收并非总是最佳，这意味着定位可能并非每次尝试都能成功，但很可能足以成功返回满意的数据。因此，我们不能在每次失败时都向用户抛出错误，也不能在第一次失败时就停止追踪。由于每秒可能进行多次调用，我们将失败次数限制设为\
    \ 100，这大约意味着在向用户发送错误消息之前等待 30 到 60 秒。之后，该过程将停止。\n\n---\n\n## 从数据到数学\n"
- fmt: "# The Geolocation API\n\n`Geolocation API` provides you with useful methods\
    \ to get static data but no helper function to process this data and truly “draw”\
    \ it in space. Here are a few calculations that may be handy in your workflow.\
    \ We are going to explain these formulas to some extent so you can understand\
    \ what is happening; nevertheless, as long as you know what result they yield,\
    \ you can just copy the snippets and use them in your code.\n\n## Distance Between\
    \ Two Points\n\nIf you are going to take your user from one point to another,\
    \ it is likely that the distance to go will be welcome information. Because you\
    \ have already learned to find the coordinates of the current and prospective\
    \ positions of the user, this is rather easily deducted.\n\n![](index-436_1.png)\n\
    ![](index-436_2.png)\n\nLatitude and longitude lines cross each other throughout\
    \ the map, forming a more or less regular grid. For now we will consider it regular\
    \ so we can calculate any distance between two points with some elementary mathematical\
    \ rules.\n\nProvided that one latitude degree (`φ`) roughly represents 69 miles\
    \ and one longitude degree (`λ`) spans approximately 53 miles, we apply the Pythagorean\
    \ theorem: our distance is the hypotenuse of an imaginary triangle following the\
    \ latitude and longitude “sides.” The following formula returns the distance in\
    \ miles between two given points:\n\nAnd here is how the formula translates to\
    \ JavaScript:\n\n```javascript\nfunction computeDistance(p1, p2) {\n  var lat1\
    \ = p1.coords.latitude;\n  var lat2 = p2.coords.latitude;\n  var lng1 = p1.coords.longitude;\n\
    \  var lng2 = p2.coords.longitude;\n  return Math.sqrt( Math.pow(69 * (lat2 -\
    \ lat1), 2)\n                    + Math.pow(53 * (lng2 - lng1), 2) );\n}\n```\n\
    \nThis will often be your best choice to determine a distance. However, it is\
    \ an approximation. Indeed, because the earth is an oblate spheroid, latitude\
    \ and longitude are arcs, not straight lines, meaning the distance between two\
    \ points will vary depending where you are on the globe, especially for longitude\
    \ degrees. A longitude degree’s length gets smaller as you get closer to either\
    \ pole.\n\n## Sharper Distance Between Two Points\n\nSeveral methods using spherical\
    \ geometry can be used to calculate exact distances on curvy lines. Without superfluous\
    \ detail, here is how to use the Haversine formula to determine the distance between\
    \ the two points `a` and `b`:\n\nwhere\n\nThis is the JavaScript implementation\
    \ of this formula (`3959` being the earth’s mean radius, `r`, in miles):\n\n```javascript\n\
    function computeDistance(p1, p2) {\n  var lat1 = toRad(p1.coords.latitude);\n\
    \  var lat2 = toRad(p2.coords.latitude);\n  var lng1 = toRad(p1.coords.longitude);\n\
    \  var lng2 = toRad(p2.coords.longitude);\n  var deltaLat = (lat2 - lat1);\n \
    \ var deltaLng = (lng2 - lng1);\n  var calc = Math.pow(Math.sin(deltaLat / 2)\
    \ , 2) +\n             Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin(deltaLng\
    \ / 2) , 2);\n  return 3959 * 2 * Math.asin(Math.sqrt(calc));\n}\n\n/* Convert\
    \ degree to radian */\nfunction toRad(deg) {\n  return deg * Math.PI / 180;\n\
    }\n```\n\nAlthough this method is quite precise, it is more complex and may take\
