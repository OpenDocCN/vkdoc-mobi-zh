  trans: "\n# 第 13 章：使用触摸和手势事件\n\n向上传递到附加监听器的父元素。这使你可以集中处理事件。\n\n**图 13-6.** 滑动操作改变文本样式\n\
    \n## 提高精确度\n\n如你所见，实现新的手势事件相当简单。尽管如此，精确度很大程度上取决于用户绘制的笔画，特别是在处理对角线时可能会下降。对角线通常会跨越多列和多行，从而为单次笔画增加多种可能的路径。一种有趣的解决方式是在解释阶段使用正则表达式，以限制确定笔画所需进行的连续比较次数。这也会加速你的应用程序，因为正则表达式引擎是原生执行的，而不像自定义测试那样，随着笔画变得复杂而越来越复杂。\n\
    \n另一种方法是使用方向而非网格，尝试确定笔画的方向而不是定位点。这种方法被许多应用程序采用，例如 Firefox 的 FireGestures 扩展，并且已被证明非常精确和高效。\n\
    \n## 总结\n\n在开发应用程序时，应充分考虑触摸在用户与设备之间建立的独特关系。正确使用和处理触摸及手势不仅可以极大地提升用户体验：只要稍加想象，你还能带来新功能，让你的应用程序在网页中脱颖而出。\n\
    \n这一切都需要你完全理解这些事件的工作原理，以及用户可能如何使用他们的设备并对应用程序的界面做出反应。要深入掌握触摸和手势事件，最好的方法就是亲自体验你自己的应用程序和实验，这一点比以往任何时候都更加重要。\n\
    \n# 第 14 章：位置感知的 Web 应用程序\n\nApp Store 提供了大量应用程序，它们根据用户在特定时刻的位置来提供服务，例如 uLocate\
    \ 推出的多位置服务聚合器 Where，以及为你提供探索城市新方式的 Foursquare。\n\n通过将来自不断增长的空间相关数据库的信息与用户的近似位置相结合，你可以推荐享用自制辣味肉酱面的完美场所；通过营造出你真正了解用户的印象来自定义用户体验；提供下午的相关天气信息；或显示带有前往任何地址的导航地图。自首次发布以来，iPhone\
    \ 就具备了在世界地图上定位用户的功能。尽管它最初并未配备辅助全球定位系统（A-GPS）芯片，但它通过混合算法来确定位置：融合了三角定位法（通过手机基站，这是手机中广泛使用的方法）的数据，并使用通过\
    \ Wi-Fi 定位系统（WPS）从网络收集的信息，从而在合理的时间内返回位置信息。\n\n随着基站数量的增加，三角定位法变得更加高效，但其精度从未优于 100\
    \ 米；从网络信息推断位置可能非常精确和快速，但仍然依赖于网络密度。\n\n这种解决方案在大多数情况下都不错，但仍有改进空间。\n\n> **注意：** 在所有设备上进行地理定位都会严重消耗电池电量，因此务必牢记这一点，并且仅在最终用户需要时才使用这些功能。例如，最好缓存数据，而不是每次加载页面都请求新位置。\n\
    \n此外，所采用的系统使得此功能仅对使用 `Core Location` API 的原生 iPhone 应用程序可用。iOS 3.0 带来了令人兴奋的可能性，即可以通过\
    \ Mobile Safari 中新增的 API，直接使用 JavaScript 访问地理数据。本章将指导你使用这个新提供的强大工具。\n\n## 地理定位\
    \ API\n\n此 API 的实现基于 W3C 规范。它允许你使用前面提到的来源来确定宿主设备的地理位置，并且非常易于上手。所有 API 方法都可通过 `navigator.geolocation`\
    \ 对象访问，它们让你可以轻松地请求用户的位置，无论是单次请求还是重复请求以跟踪用户的移动（如果有的话）。\n\n### 隐私注意事项\n\n在用户不知情的情况下授予对此类信息的访问权限，应始终进行一定程度的控制。为了尊重最终用户的隐私，iOS\
    \ 在发送任何关于其位置的信息之前，总会请求用户许可，就像地图和相机应用程序那样（见图 14-1）。\n\n**图 14-1.** 所有 iPhone 应用程序在发送位置数据前都会请求用户授权\n\
    \n### 设置注意事项\n\n在设备上测试 API 之前，请确保定位服务已激活。你可以在“设置”应用程序的“通用”子菜单中找到它。更清晰的做法是重置之前授予的地理定位请求授权，例如在一个全新的状态下工作。这可以通过导航到\
    \ `设置` > `通用` > `还原` > `还原定位服务` 来实现。\n\n此外，在桌面浏览器上调试时，不要忘记检查 API 的实际可用性——这将节省你调试根本无法解释的代码的宝贵时间。这可以通过以下检查\
    \ `Geolocation` 对象的代码简单实现：\n\n```javascript\nif (window.navigator.geolocation)\
    \ {\n    /* API 可用 */\n} else {\n    /* 后备提示信息 */\n}\n```\n\n同样，针对 Mobile Safari，并非所有用户都拥有最新版本的浏览器——尤其是在旧版本的\
    \ iPod touch 上，相关更新可能需要付费购买或根本无法获得。一般来说，这样做能让你的应用程序在更好的条件下为更多用户所用，而预先规划错误处理将有助于你提供更好的用户体验。\n\
    \n### 获取当前位置\n\n该 API 最显而易见且可能是最常用的用途是获取用户的当前位置。如前所述，你将使用 `Geolocation` 对象，并调用\
    \ `getCurrentPosition()` 方法。\n\n```javascript\nwindow.navigator.geolocation.getCurrentPosition(\n\
    \    function(position) {\n        /* 使用位置对象数据执行操作 */\n    }\n);\n```\n\n由于每个请求都需要一些时间，这可能会迅速冻结用户的设备，因此所有请求都是异步的。你需要传递一个回调函数作为参数，以便在数据可用时调用，如前所示。\n\
    \n### 经度、纬度等\n\n当请求成功时，会使用 `position` 参数调用回调函数，该参数包含有关用户位置的数据。此对象提供了八个属性，如表 14-1\
    \ 所示。\n\n**表 14-1.** `Position` 对象的属性\n\n| 属性 | 描述 |\n|----------|-------------|\n\
    | `position.timestamp` | 确定位置信息的时间（毫秒）。 |\n| `position.coords.accuracy` | 返回的纬度/经度信息的精度（米；数值越低越好）。\
    \ |\n| `position.coords.latitude` | 用户当前的纬度（十进制度数）。 |\n| `position.coords.longitude`\
    \ | 用户当前的经度（十进制度数）。 |\n| `position.coords.altitudeAccuracy` | 返回的海拔信息的精度（米）。此值通常为\
    \ null。 |\n| `position.coords.altitude` | 用户当前的海拔（米）。存在相同限制。 |\n| `position.coords.heading`\
    \ | 用户前进的方向（十进制度数）。此值通常为 null。 |\n| `position.coords.speed` | 用户当前的速度。存在相同限制（米/秒）。\
    \ |\n"
- fmt: "# 排版后的文档\n\nWith varying performance and precision and as long as no error\
    \ occurs (for example, the user refuses the request), the first method `properties`\
    \ will return a value whatever device is used, be it an older iPhone, an iPod\
    \ touch, or an iPad. However, as you can see, not all data is necessarily available.\
    \ `Heading` and `speed`, for instance, obviously require that several location\
    \ points have been recorded with a sufficient accuracy and therefore need tracking\
    \ to return values, as we will soon explain. Depending on the device that is used—and\
    \ the location technique it uses—not all data can be made available.\n\nBesides,\
    \ because using GPS usually takes time before satellites are reached, this location\
    \ method will often be deferred by the device, causing performance to increase\
    \ but returning less accurate data. It will be resorted to for tracking, because\
    \ the request for position information is repeated, leaving enough time for GPS\
    \ acquisition.\n\nWhen testing your web application, you will often have to proceed\
    \ outdoors, especially when relying on GPS precision, because GPS hardly works—if\
    \ at all—indoors.\n\nTherefore, whether you are expecting information from the\
    \ basic properties or from the more advanced ones, you should always handle possible\
    \ errors and approximation.\n\n## CHAPTER 14: Location-Aware Web Applications\n\
    \n### Handling Errors from Requests\n\nLuckily enough, the `getCurrentPosition()`\
    \ takes another optional parameter that gives you access to code and description\
    \ for the occurring error. This gives you some latitude to understand and then\
    \ handle the error. Here’s an example of how to do this:\n\n```\n/* Request the\
    \ user's position */\nwindow.navigator.geolocation.getCurrentPosition(successCallback,\
    \ failureCallback);\n\nfunction successCallback(position) {\n  /* Do something\
    \ with the position object data */\n}\n\nfunction failureCallback(error) {\n \
    \ /* Do something with the error object */\n}\n```\n\nThere are two properties\
    \ to the error object, as shown in Table 14–2.\n\n**Table 14–2.** Properties of\
    \ the Error Object\n\n| Property | Description |\n| --- | --- |\n| `error.code`\
    \ | One of the following error codes:<br>`error.UNKNOWN_ERROR` (0)<br>`error.PERMISSION_DENIED`\
    \ (1)<br>`error.POSITION_UNAVAILABLE` (2)<br>`error.TIMEOUT` (3) |\n| `error.message`\
    \ | A message describing what happened. |\n\nWhereas the `error.code` property\
    \ yields persistent error codes, the `error.message` property may be quite different\
    \ depending on the device running the function.\n\nObviously, a single error code\
    \ may cover several real-life errors. For instance, `PERMISSION_DENIED` is returned\
    \ when the user refuses the request but also when the geolocation service on the\
    \ device is disabled. However, the error message should shed light on the code,\
    \ which is why both properties are useful together. Please note that indeed the\
    \ `error.message` property is meant only for debugging purposes; it is by no means\
    \ supposed to be seen on the user’s end.\n\n**WARNING:** If an exception occurs\
    \ within your success callback function, the failure callback function will be\
    \ called with an `UNKNOWN_ERROR` code. Always double-check whether the error you\
    \ are getting really is a location error or comes from your own code.\n\n### Accuracy,\
    \ Timeout, and Cached Location\n\nThe W3C specification provides three options\
    \ to refine your request, using an object-type parameter along with your callbacks.\
    \ You can specify how long your request may take to succeed, how long the position\
    \ yielded may have been cached before the request, and whether to require extra\
    \ accuracy. These options are invoked as follows:\n\n```\nwindow.navigator.geolocation.getCurrentPosition(successCallback,\
    \ failureCallback, {\n  timeout: 0,\n  maximumAge: 60000,\n  enableHighAccuracy:\
    \ false\n});\n```\n\nThere are many cases where there’s no need to require an\
    \ updated position of the user. For an application returning a list of trendy\
    \ restaurants based on a user’s location, chances are the user will often be in\
    \ the same bounds. In such cases, you may want to use cached data from the user’s\
    \ device."
