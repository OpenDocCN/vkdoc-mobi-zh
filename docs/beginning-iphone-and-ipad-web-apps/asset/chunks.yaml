    Developing web applications, you should tightly relate interface and interaction
    schemes to


    functionality, independently from the device. Likewise, web technologies such
    as CSS or JavaScript should always be considered as tools that can be used to
    define interfaces and interaction possibilities, inherent to specific functionality—but
    should by no means dictate what the interface and functionality should be.


    CHAPTER 5: User Experience and Interface Guidelines


    Forget the Desktop


    Typically, the desktop metaphor is one to forget, together with the habit of intensive
    multitasking. Get used to the fact that iOS devices—not to say all mobile devices—do
    not work that way. Using a desktop computer, the end user can perform various
    tasks at a time, handling multiple windows that he can, if he wants, display side
    by side at any time. For all these tasks, he enjoys plenty screen estate and,
    most importantly, will interact with the desktop using feature-rich devices, that
    is, a mouse and keyboard.


    Computers embrace the desktop metaphor, and they can boast productivity tools
    and a practical or playful approach to many activities. With iOS, though you can
    have several background tasks such as playing music, downloading applications,
    or fetching e-mail, running several native applications side by side isn’t possible.
    iOS aims to let the end user efficiently accomplish one task at a time. The small
    screen means the user


    successively focuses on one area—and hence one series of actions—at a time.


    Change Navigation Habits


    When developing for the mobile Web, it is important not to lose your end user
    halfway through the web application experience. The traditional web experience
    lets the user access all parts of the site from any other part of the site. This
    is usually done using both a navigation bar and numerous internal links. As a
    user of the Web, you’ve probably already been confronted with a site that you
    just couldn’t figure out. If all went right, you found what you were looking for
    fast enough; if not, like most users, you probably have moved to the next site.


    This situation is even more critical on the mobile Web. The user expects to find
    a clear, straightforward path from one point to another. The important notion
    is that of *flow*.'
  trans: "\n# 此功能仅在 iPad 上可实现。对于其他设备，最佳实践是使用 JavaScript 在 `<body>` 标签上添加一个类或 ID，以便在屏幕方向改变时应用不同的样式。\n\
    \n## 最终润色\n\n当用户在移动版 Safari 中打开你的应用时，之前的 JavaScript 代码负责处理视口（viewport）。如果用户并非通过移动版\
    \ Safari 打开，我们已知应该用 JavaScript 来处理链接；接下来，我们将向 `main.js` 中添加相关脚本，以阻止此情况下的默认行为。为此，请添加如下事件监听器，并将\
    \ `clickHandler()` 函数附加到你的*脚本*文件中：\n\n```\nif (!window.navigator.standalone) {\n\
    \    document.addEventListener(\"DOMContentLoaded\", adjustHeight, true);\n  \
    \  window.addEventListener(\"orientationchange\", adjustHeight, true);\n} else\
    \ {\n    /* 仅针对独立模式 */\n    document.addEventListener(\"click\", clickHandler,\
    \ true);\n}\n```\n\n## 准备就绪\n\n你在此处构建的文件及文件结构，正是启动大多数 Web 应用项目所需的基础。如果你已安装 Komodo\
    \ Edit，现在可以将此项目保存为模板，以便在日常工作流程中轻松复用。为此，请从“项目”菜单中选择你的项目名称，然后点击“从项目创建模板”。模板的默认存储位置是安装\
    \ Komodo Edit 时创建的用户文件夹下的 *Template* 文件夹。之后，你便可以通过“项目”菜单选择“从模板新建项目”，来基于此模板创建新项目。\n\
    \n如果你选择不安装 Komodo Edit，我们建议你寻找其他方法来轻松复用此代码和结构。通过本章，你已经了解到我们的模板框架所满足的需求对于用户满意度以及你\
    \ Web 应用的成功至关重要。使用模板作为辅助工具，能帮助你快速跨过项目中那些略显烦人的初始阶段。这也是让你的 Web 应用实现其首要目标——成为一个真正的应用——的第一步。\n\
    \n---\n\n# 第 5 章：用户体验与界面设计指南\n\n上一章的核心并非关于屏幕尺寸、技术可能性，甚至不是理解 iOS 在 iPhone、iPod\
    \ touch 和 iPad 上的行为方式。当然，你必须掌握这些方面才能为这些设备构建高质量的 Web 应用，但这些技术只是实现成功过程的工具。本书中的建议最终都归结到用户身上。苹果便携式设备的触摸交互系统在设备与用户之间建立了一种特定的、绝对以用户为中心的关系。这意味着，作为开发者，你需要认真考虑你的应用设计。\n\
    \n应用于计算机开发领域的认知工效学是一门实践性科学，旨在让应用的功能易于用户理解和操作。\n\n苹果工程师已经考虑了 iOS 的部分工效学特性。例如，多点触控交互模型允许用户轻松完成大多数网站上的常见任务，如缩放、聚焦或打开上下文菜单。\n\
    \n工效学在苹果产品中（尤其是在苹果便携设备上）的一个重要方面是美学吸引力。iOS 具有强烈的视觉识别性，而紧密集成到 iPhone GUI 中的原生应用的成功更是使其辨识度大增。因此，从用户角度评判一个应用的质量，往往取决于其视觉质量与\
    \ iOS GUI 的匹配程度。\n\n当然，仅靠设计并不能保证你的 Web 应用成功。尽管漂亮的外观可以吸引用户进入应用，但如果他们在实际使用中找不到预期的品质，就会很快离开。这在应用开发这种竞争激烈的领域尤其如此。\n\
    \n在本章中，我们将介绍一系列规则和最佳实践，帮助你构建更好的 Web 应用——也就是说，让那些在移动设备上与桌面计算机上有着不同体验的用户体验达到最佳状态的应用。\n\
    \n---\n\n### 从桌面网页到移动网页\n\n一个常见但危险的错误是认为，无论通过何种平台访问，Web 都是相同的。尽管 Web 应用是使用 Web\
    \ 技术构建的，但它们与经典网页完全不同。显然，设备能力是不同的。如果你在桌面版 Safari 或移动版 Safari 上查看 Gmail 之类的 Web\
    \ 应用，你会发现它们的界面截然不同。\n\n尽管如此，你仍然可以在 iPhone 上使用 Gmail，这是因为移动版 Safari 旨在适应有限的屏幕空间。然而，与使用\
    \ iMac 甚至 MacBook 相比，用户的体验感并不那么好。如图 5-1 所示，缩放会使内容更难以阅读和交互。因此，谷歌尝试为其移动设备上的 Web\
    \ 应用提供适配版本——界面更简洁，功能通常更少，并且加载时间经过优化。\n\n![图 5-1](img/index-112_1.jpg)\n\n**图 5-1.**\
    \ 尽管桌面版 Safari 和移动版 Safari 的渲染效果相同，但缩放确实会影响用户体验\n\n不同的屏幕尺寸不仅仅意味着不同的视图：更换设备意味着完全不同的体验，伴随着不同的行为和期望。开发\
    \ Web 应用时，你应该将界面和交互模式与功能紧密关联，而不应受设备的制约。同样，诸如 CSS 或 JavaScript 等 Web 技术应始终被视为定义界面和交互可能性的工具，这些可能性是特定功能所固有的——但绝不应让它们决定界面和功能应该是什么样子。\n\
    \n---\n\n### 忘掉桌面隐喻\n\n通常，桌面隐喻是需要被忘记的，同时还有频繁多任务处理习惯。请接受这样一个事实：iOS 设备——更不用说所有移动设备——并非以那种方式工作。在使用桌面计算机时，最终用户可以在同一时间执行各种任务，处理多个窗口，并且如果愿意，可以随时将它们并排放置。对于所有这些任务，他享有充足的屏幕空间，最重要的是，会使用功能丰富的设备（即鼠标和键盘）与桌面进行交互。\n\
    \n计算机采纳了桌面隐喻，并且可以自豪地拥有生产力工具以及处理许多活动的实用或趣味性方法。而对于 iOS，虽然你可以进行多种后台任务，如播放音乐、下载应用或收取电子邮件，但并排运行多个原生应用是不可能的。iOS\
    \ 旨在让最终用户高效地一次完成一项任务。小屏幕意味着用户需要依次专注于一个区域——从而专注于一系列操作。\n\n---\n\n### 改变导航习惯\n\n\
    在开发移动 Web 应用时，不能在整个 Web 应用体验的中途失去最终用户，这一点至关重要。传统的 Web 体验允许用户从站点的任何一个部分访问所有其他部分。这通常通过使用导航栏和大量内部链接来实现。作为\
    \ Web 用户，你可能已经遇到过一些怎么都搞不明白的网站。如果一切顺利，你会足够快地找到所需内容；否则，和大多数用户一样，你可能会转向下一个网站。\n\n\
    这种情况在移动 Web 上更为严峻。用户期望找到一条清晰、直接的路径从一个点到达另一个点。这里一个重要的概念是*流程*。\n"
- fmt: "# User Experience and Interface Guidelines\n\nAlthough it may seem obvious\
    \ not to interrupt the user in whatever process is set in motion, displaying a\
    \ modal dialog box can easily interrupt the user. For such cases, you should always\
    \ offer the user an easy way to close the dialog box that makes the subsequent\
    \ events obvious.\n\nDevelopers may be tempted to make an application more personal\
    \ for the end user by requiring input, be it through text fields or radio buttons.\
    \ On the iPhone, this will slow down the user's experience and postpone them from\
    \ achieving their goal.\n\nThe consequence may be even more annoying on an iPad.\
    \ Apple suggests that iPad applications should work in a nonlinear way, meaning\
    \ users should see the content of their tasks in a master view and be able to\
    \ access options and interaction tools from the navigation part of the screen.\
    \ That is to say, users should be able to perform most tasks no matter what they\
    \ are doing in the application. Even if it seems relevant to you, be careful when\
    \ asking the user to choose between things, because this both breaks the user's\
    \ flow in the master view and may result in cutting off options in the navigation\
    \ area, which can be frustrating. For instance, in a mail application, you wouldn't\
    \ want to lose the \"compose\" option because the user is reading mail. As a rule\
    \ of thumb, you should be careful making assumptions about the context in which\
    \ the user is and what the user is likely to want to do.\n\nAlso keep in mind\
    \ that manufacturers have already thought through the usability of their devices.\
    \ Therefore, you shouldn't re-create functionality that already exists and that\
    \ the user is used to using.\n\n## Show Ads Thoughtfully\n\nSites often offer\
    \ free content and rely on advertisements for pecuniary income. If this is your\
