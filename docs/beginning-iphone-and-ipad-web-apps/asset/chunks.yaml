- fmt: 'This al makes the difference clearer but certainly not definite. If you are
    wondering whether the projects you had in mind actual y are web applications,
    and not “just” web pages, be aware that this is al about user orientation: if
    what you build is dedicated to serving the end user and you think it is a web
    app, it most likely is. In real life, you could also consider that your page is
    a web app if your users return to it repeatedly with the same goal. Thus, products
    such as the iPhone-optimized Gmail or Google Maps can be considered web applications
    (Figure 4–3).


    ![](index-93_1.jpg)


    ## CHAPTER 4: The Anatomy of a Web Application


    **Figure 4–3.** Two iPhone-optimized Google’s web applications


    ### Planet of the Apps: Who Rules


    Many have pounced upon the iPhone application market through the popular App Store.


    You may be wondering why you should build web applications while native applications
    are supported by Apple and have already made many people rich in little time.
    This point needs clarification: the number of applications on the App Store is
    tremendous; therefore, building up visibility there is a complicated task. Strong
    marketing is more and more important in order to break through, and few ever meet
    any success. Moreover, getting to be distributed on the App Store requires approval
    by Apple, which can take time and extra energy even after you thought you were
    done with your application. Now, of course, there is more to the debate than just
    these considerations.


    ### Cross-Platform Master


    Building web applications can be better than building native iPhone applications
    in several ways, and the first convenience that comes to mind is cross-platform
    compatibility—actually, double cross-platform compatibility.


    Indeed, you do not depend on a specific operating system or on specific tools
    to build web apps. You can basically use anything, from the simplest plain-text
    editor to complex WYSIWYG editors and IDEs, whereas native applications tend to
    be inefficient to build without Xcode on Mac OS X.


    Then your web application itself should be platform-independent to some extent.
    Both Google’s Android browser and Palm’s webOS are based on WebKit and thus will
    render your pages similarly to Mobile Safari. The WebKit engine is getting more
    and more popular, not only for desktop browsers (Epiphany has recently made the
    jump from Gecko to WebKit) but also on a growing number of mobile devices, such
    as RIM’s BlackBerry. No matter how popular the iOS, applications targeting it
    depend on its underlying platform and APIs and are likely to never work out of
    the box on any other device.


    ### Hardware Access Is No Forbidden Weapon Anymore


    You may have heard that native applications are much more narrowly intertwined
    with the iOS itself and have access to more hardware power, more resources from
    the platform, and more possibilities when no connection is available (or desired).
    This isn’t all true anymore.


    First, it is unlikely that your application will need more power to run than what
    is provided through Mobile Safari—and native applications don’t use all the power
    they are given either. As for storage, since version 2.0, you have the option
    to use JavaScript databases directly on the device, hence making your application
    data available execution after execution.


    Moreover, users can now access web applications in offline mode, which means that
    all static content will be available even if no connection is. Considering that
    static elements of your page no longer need to be reloaded each time the page
    is viewed and considering the new storage abilities of HTML5, you can make a lot
    of content accessible for users even without a connection.


    Finally, although native applications do have more tools available to them from
    the OS, change is coming for this too: in version 3.0, the iOS gives the browser
    access to geolocation information. This may be another sign that Apple is betting
    on the future of web apps.


    ### Free Your Content'
