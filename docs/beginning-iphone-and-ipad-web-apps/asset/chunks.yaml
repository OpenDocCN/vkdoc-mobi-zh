    Again, we have made these styles in a way that makes them easily adaptable. Here,
    a simple change of the background color will allow you to change the aspect of
    the


    button, without altering the gradient.


    Disabling Copy/Paste Functionalities


    Users can easily initiate a long press action on elements of your page, which
    would trigger the copy/paste feature with an ugly box that could spoil the user
    experience to some extent, as shown in Figure 6–3.


    Figure 6–3\. A long press may trigger the copy/paste feature


    This behavior can be disabled when it is not desired or when you want to add some
    custom functionality to this action. You do this using only CSS, with the -webkit-user-


