    \ and Downloadable Fonts with Canvas and SVG\n\n<p>by Lorem Ipsum</p>\n\n</body>\n\
    \n</html>\n\nFigure 7–34\\. A nice presentation using the Anagram font by Nick\
    \ Curtis and built-in fonts If you have exported the font as we have explained,\
    \ you may have noticed that the file size is rather large. This is because the\
    \ SVG font contains all the glyphs that the original font had—which may not be\
    \ necessary for your purposes. One typical case is that some font definitions\
    \ copy the uppercase glyphs into the lowercase ones. For such cases, you can easily\
    \ benefit from the scripting possibilities of FontForge.\n\nOnce you have selected\
    \ a font, you should notice that selecting a glyph will make some information\
    \ appear at the top of the window, noticeably the Unicode code for the glyph (Figure\
    \ 7–35)—this is just what we need to select only some glyphs to add to our\n\n\
    exported SVG font.\n\n![](index-239_1.jpg)\n\nCHAPTER 7: Bitmap and Vector Graphics\
    \ and Downloadable Fonts with Canvas and SVG\n\nFigure 7–35\\. The scripting window\n\
    \nWe are going to use a script to export only the characters that we need. The\
    \ scripting functionalities are accessible from the menu File Execute Script....\
    \ In the new window that appears, select FF from the bottom—to activate FontForge\
    \ mode—and type the\n\nfollowing code:\n\nSelect(0u0041);\n\nThis command selects\
    \ only the uppercase letter *A*. To select several glyphs at a time, you need\
    \ only specify the first and last glyphs of your series. The following code would\
    \ select all uppercase letters from *A* to *Z*:\n\nSelect(0u0041, 0u005a);\n\n\
    What the Select() function does is allow selecting character groups with pairs\
    \ of references, the first of character of the list, and then the last of the\
    \ list. All characters in the interval will be selected. If you want to select\
    \ only one glyph, specify only one reference; if you want to select a single glyph\
    \ inside a list of intervals, you should simply specify the same start and end\
    \ points for the glyph. Here is the code that will allow you to export our SVG\
    \ font as we need it:\n\nSelect(0u0030, 0u0039, 0u0041, 0u005A, 0u0061, 0u007a,\
    \ 0u00ab, 0u00ab, 0u00bb);\n\nSelectInvert();\n\nCut();\n\nGenerate(\"exported.svg\"\
    );\n\nSelectNone();\n\nRevert();\n\nThis code exports the 0–9, a–z, and A–Z sets,\
    \ together with left and right angle quotes.\n\nThen, we invert our selections\
    \ to use the Cut() function and delete our unused glyphs from the font. Naturally,\
    \ be careful to enter a correct path for the Generate() function. To finalize\
    \ our script, we cancel our selection and revert to the initial font to avoid\
    \ accidents. Your font file should now be notably lighter.\n\nNote that if you\
    \ want to use only uppercase letters, you should be careful that all your text\
    \ is written in capital letters or, better yet, let a style rule take care of\
    \ this for you: 218\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\n.upper {\n\ntext-transform: uppercase;\n\n}\n\n\
    Nonetheless, remember that fonts imported with @font-face have some limitations\
    \ in WebKit browsers. The main one is that, even if you have imported the uppercase\
    \ glyphs, you won’t be able to give the font-variant the small-caps value. Although\
    \ the\n\nspecification explicitly notes that user agents should use scaled uppercase\
    \ letters for small capitals if these are not defined, WebKit simply ignores @font-face-defined\
    \ typefaces if a font-variant rule is set and reverts to the default inherited\
    \ font.\n\n.small-caps {\n\nfont-size: 0.71em; /* Reduce text */\n\ntext-transform:\
    \ uppercase;\n\n}\n\n.small-caps::first-letter {\n\nfont-size: 1.41em; /* Reset\
    \ to 100% of the inherited font-size */\n\n}\n\nAlthough this solution covers\
    \ only the first letter, it can be enough for quite a few uses.\n\nAnother limitation\
    \ that you should keep in mind is that, unlike fonts that are already installed\
    \ on the system of the user, web fonts have to be downloaded (on the first visit,\
    \ they may be cached). This can be long, because SVG fonts are inherently heavier\
    \ than TTF or OTF and take more time to be rendered, especially if your font is\
    \ complex and depends on a lot of code. Beware that Mobile Safari might freeze,\
    \ and always limit this practice to reasonable file sizes.\n\nSummary\n\nThe examples\
    \ used in this chapter gave you only a glimpse of what can be done with canvas\
    \ and vector graphics. However useful the spinner we have created can be—used\
    \ in association with Ajax, for instance, to give feedback to the user—we have\
    \ used small amounts of code and simple, repetitive shapes. If you have some experience\
    \ with some vector graphics creation software, you will soon see what possibilities\
    \ SVG support can offer you. The use of canvas also has huge potential, for those\
    \ who prefer scripting to graphic design. Also, look into our following chapters\
    \ about video and animations, which help you bring your graphics to life.\n\n\
    We are going to use these technologies in following chapters, for instance in\
    \ Chapter 14\n\nto build a compass, and in Chapter 12, where our spinner will\
    \ be used to give the user feedback during Ajax requests. Work your way into the\
    \ richness of these new features, but always ask yourself which solution is best\
    \ between the two and whether either is better than another alternative, for instance,\
    \ a CSS-based solution. As for bitmap images, Flash, and most things on the Web,\
    \ use them when they will create a better user experience.\n\n**8**\n\n ****Chapter**\n\
    \nEmbedding Audio and\n\nVideo Content in Your\n\nWeb Application\n\nAs we have\
    \ stated before, Mobile Safari doesn’t support Flash content. iOS, however, is\
    \ an extraordinary multimedia platform that inherits the quality of the iPod for\
    \ audio and video content. That the YouTube application is shipped by default\
    \ on the OS is\n\nsymptomatic of the importance given to multimedia both by Apple\
    \ and by third-party web sites. The number of companies that optimize their sites\
    \ for the iPhone and the iPad is ever growing, such as Vimeo (as shown on Figure\
    \ 8–1), where the popular Adobe Flash content is replaced by H.264 videos, the\
    \ format pushed by Apple. Even YouTube is providing a new mobile version of its\
    \ web site, surpassing the iPhone built-in native application using the new HTML5\
    \ features.\n\nMany signs indicate that web actors are taking alternate web-specific\
    \ formats more and more seriously—even Adobe has implemented H.264 in its Flash\
    \ Player. This movement also follows from the excellent support of the latest\
    \ web standards by mobile browsers such as Mobile Safari, which allows for efficient\
    \ support of multimedia content. Indeed, as you are going to see, Apple no longer\
    \ advises you to use the <embed> tag under Safari and recommends you use the new\
    \ HTML5 <audio> and <video> tags, which come with solid APIs that will let you\
    \ control many aspects of the playing and collect real-time information on the\
    \ state of the content using a full range of events.\n\n![](index-242_1.jpg)\n\
    \nCHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\nFigure\
    \ 8–1\\. The iPad-optimized web application by Vimeo\n\nNOTE: To illustrate this\
    \ chapter, we are going to use the great animation film Big Buck Bunny Download\
    \ from Wow! eBook <www.wowebook.com>\n\n(Creative Common license, © Blender Foundation)\
    \ that you can download in many formats—\n\nincluding iPhone—from [www.bigbuckbunny.org.](http://www.bigbuckbunny.org)\n\
    \nBefore HTML5, because there was no standard to embed media content into a web\n\
    \npage, browsers usual y resorted to external plug-ins, possibly requiring instal\
    \ ation by the user, which wouldn’t be possible under Mobile Safari. This is no\
    \ longer necessary—\n\nit’s up to you to get started.\n\nEmbedding Video Content\n\
    \nVideo probably is the most popular media on the Web nowadays. Even if you don’t\n\
    \nproduce your own content, you can easily add media to your site. Using YouTube,\
    \ for instance, this is easily done with code similar to the fol owing:\n\n<a\
    \ href=\" [http://www.youtube.com/v/**VIDEO_IDENTIFIER**](http://www.youtube.com/v/VIDEO_IDENTIFIER)\"\
    >\n\n<img src=\"poster.jpg\" alt=\"Breaking News Video Poster\">\n\n</a>\n\nCHAPTER\
    \ 8: Embedding Audio and Video Content in Your Web Application\n\nVIDEO_IDENTIFIER\
    \ is the value for the v parameter found in all YouTube video URLs.\n\nHowever,\
    \ embedding such video content in this way will launch the YouTube\n\napplication,\
    \ and at the end of the sequence, the user will be left inside this application.\n\
    \nOf course, building your web app, your aim will be to keep the user inside the\n\
    \napplication as long as possible and make the experience as close as possible\
    \ to that of a native application. With HTML5, playing media directly from inside\
    \ the browser is as easy as using the new <video> tag. This is a simple though\
    \ rich way to embed video content, similar in some aspects to the formerly used\
    \ <embed> tag, with which it shares several attributes.\n\n<video src=\"myvideo.m4v\"\
    \ poster=\"preview.png\"\n\nid=\"myvideo\" width=\"320\" height=\"240\"></video>\
    \ As with the <canvas> tag, the default size for <video> tag is 300 pixels wide\
    \ and 150\n\npixels high, and you should specify any other dimensions using the\
    \ width and height attributes. If the ratio of the movie is different from that\
    \ of the defined area, black stripes will be displayed along the unoccupied space,\
    \ and the video will be resized, keeping its initial ratio. Unfortunately, there\
    \ is no way to change the color of the stripes, such as by applying a background\
    \ color, as you might expect.\n\nBy default, the <video> tag is an inline element,\
    \ and it should be closed as in our example; if not, the code that follows it\
    \ will be considered to be fallback content. As you’ll see soon, the <video> tag\
    \ can contain not only fallback information but also other tags, such as an <object>\
    \ or <embed> tag, or other elements that let you refine the media type definition\
    \ and bring additional functionality to enhance simple playing.\n\nGetting Information\
    \ About the Video\n\nIf for some reason you do not specifically know the initial\
    \ ratio of the movie you are embedding, you can access this information using\
    \ the properties of the\n\nHTMLVideoElement object and, for instance, adjust the\
    \ size of your container\n\nappropriately. This could prove useful if you use\
    \ a default format for your movie but offer several formats based on the connection\
    \ speed of the user’s device.\n\nNOTE: Using the width and height properties in\
    \ the adjustVideo() function, the returned values are those of their attribute\
    \ counterparts. However, if these values are not set or are set using a percentage,\
    \ the returned values will not be exploitable. Therefore, we prefer the DOM\n\n\
    offsetWidth and offsetHeight properties.\n\nvar video = document.getElementById(\"\
    myvideo\");\n\nvideo.addEventListener(\"loadedmetadata\", adjustVideo, false);\n\
    \nfunction adjustVideo(event) {\n\nvar video = event.target;\n\n/* Intrinstic\
    \ size (read only) */\n\n![](index-244_1.jpg)\n\nCHAPTER 8: Embedding Audio and\
    \ Video Content in Your Web Application\n\nvar vw = video.videoWidth;\n\nvar vh\
    \ = video.videoHeight;\n\n/* Element size */\n\nvar ew = video.offsetWidth; //\
    \ Could be video.width\n\nvar eh = video.offsetHeight; // Could be video.height\n\
    \n/* adjust container size if needed */\n\nvar vratio = vw / vh;\n\nvar eratio\
    \ = ew / eh;\n\nif (vratio != eratio){\n\nvideo.height = ew / vratio;\n\n}\n\n\
    }\n\nIf the browser hasn’t downloaded a minimum of information to identify the\
    \ video, the data specific to the movie won’t be available. The preload attribute—which\
    \ indicates that the video metadata should be preloaded with the HTML page—is\
    \ currently not\n\nsupported by Mobile Safari, primarily to limit HTTP traffic.\
    \ This kind of information will be accessible only once the loadedmetadata event\
    \ is raised. The API attached to the new HTML5 media tags offer many other specific\
    \ events, such as timeupdate, that will let us handle custom subtitles. We’ll\
    \ cover them later in the chapter.\n\nThe Video Placeholder\n\nOn Mobile Safari,\
    \ no data regarding the video is downloaded until the video is\n\nlaunched—at\
    \ least nothing that can be of any use to you. As you wait for this data, if the\
    \ poster attribute is set, the defined image will be used as a placeholder, with\
    \ the same image ratio as the movie itself. Of course, the image you choose should\
    \ be as\n\nrepresentative as possible of the video. If no image is defined or\
    \ the source URL is wrong, on both the iPhone and the iPod touch a blue gradient\
    \ will be used as a\n\nplaceholder, as shown in Figure 8–2.\n\nFigure 8–2\\. The\
    \ default video placeholder on the iPhone\n\nThis is true for versions of the\
    \ OS prior to 3.2, but with the latest versions (including 3.2\n\nthat ships with\
    \ the recent iPad), if no poster attribute is specified, the whole video area\
    \ will appear black, with no other indication. This is probably because one of\
    \ the great\n\n![](index-245_1.jpg)\n\nCHAPTER 8: Embedding Audio and Video Content\
    \ in Your Web Application\n\nsteps taken by the iPad is that you can play movies\
    \ directly in the browser, without launching the QuickTime Player full-screen\
    \ as would happen with earlier versions.\n\nHence, you can create media content\
    \ that integrates into your page, and the neutral black can make this operation\
    \ more versatile.\n\nPlaying the Video\n\nOn the iPhone and iPod touch, to play\
    \ a video, the user has to tap the placeholder, which will launch the external\
    \ player (Figure 8–3). Naturally, as we leave the browser context, you may assume\
    \ that all events attached to the tag will be lost. This actually isn’t true.\
    \ The use of an external player doesn’t prevent events related to the videos or\
    \ actions upon videos to be executed, such as resizing the container, as shown\
    \ earlier.\n\nFigure 8–3\\. The QuickTime media player on the iPhone\n\nOn the\
    \ iPad, using the <video> tag will not yield the same results. The movie won’t\
    \ launch automatically, and nothing will happen if you tap the placeholder. To\
    \ allow the video to be played, you will have to either add the controls attribute,\
    \ which indicates that the player should display standard controls visible to\
    \ the user, or use the play() method on the video object to launch the video dynamically.\
    \ The first way, the player will have a play button, as on previous versions.\
    \ When controls are enabled, they cover part of the movie (as shown in Figure\
    \ 8–4), but they disappear automatically after a few seconds, making the experience\
    \ seamless for the end user, as with most modern media application nowadays.\n\
    \n<video src=\"myvideo.mp4\" poster=\"preview.png\"\n\nid=\"myvideo\" width=\"\
    320\" height=\"240\" **controls**></video>\n\n<!-- Handle video playing using\
    \ javascript -->\n\n<button onclick=\"document.getElementById('myvideo').play()\"\
    >Watch Video</button>\n\n![](index-246_1.jpg)\n\nCHAPTER 8: Embedding Audio and\
    \ Video Content in Your Web Application\n\nFigure 8–4\\. With controls enabled,\
    \ a play icon appears on the video. Pressing the button launches the movie and\
    \ shows other controls\n\nNote that the video element itself doesn’t support the\
    \ onclick event so that it doesn’t interfere with these controls, even if it is\
    \ enclosed in some other container. This is why you use a separate button, which\
    \ should be outside the video placeholder.\n\nWhatever solution you choose, the\
    \ video can be launched only after an action by the end user. The autoplay attribute\
    \ is supported only in a very specific case, which we’ll explain later in this\
    \ chapter. The same limitations apply to the play() method, which means you couldn’t\
    \ use a window.setTimeout() method to launch your video after a\n\ndelay. This\
    \ most likely is because when using cellular networks, it is still common to be\
    \ charged per data unit, and being charged a fortune because a web application\
    \ designer has made you download a heavy file without your consent is bad user\
    \ experience.\n\nEmbedding Audio Content\n\nThe <embed> tag used to be recommended\
    \ not only for video but also for audio content.\n\nWith HTML5, this has changed,\
    \ because a new elegant solution is now offered to\n\ndevelopers, as shown here:\n\
    \n<audio src=\"myaudo.mp3\" id=\"myaudio\"></audio>\n\nThe associated DOM interface\
    \ is HTMLAudioElement, and you can easily create an audio object dynamically with\
    \ JavaScript, with the usual createElement() DOM method but also using a new HTML5\
    \ constructor that takes a source URL as a parameter. The\n\nbenefit of this method\
    \ is that, because only sound is involved, the element can be initialized and\
    \ played immediately without being added to the document tree.\n\nvar audio1 =\
    \ document.createElement(\"audio\"); // DOM way\n\nvar audio2 = new Audio(\"myaudio.mp3\"\
    ); // HTML5 way\n\nBecause there is no image or sequence to display, the width\
    \ and height attributes are not supported. The block will default to a block that’s\
    \ 200 pixels by 16 pixels. On the\n\n![](index-247_1.png)\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\niPhone and iPod touch, the\
    \ same placeholder as for the <video> tag will be shown with these dimensions,\
    \ which allows the audio content to be launched by tapping and allows it to be\
    \ resized using styles. This placeholder is the only way to launch sound on the\
    \ device without resorting to JavaScript.\n\nOn the iPad, the configuration is\
    \ slightly different. The default display for the <audio> tag is a plain blank\
    \ area, which will be replaced by proper controls (Figure 8–5) when the controls\
    \ attribute is set, as shown with the <video> tag. With controls enabled, sound\
    \ control is rendered with the default dimensions or with the dimensions defined\
    \ by any style rules. Be aware, however, that the controls can be made wider but\
    \ cannot be forced to be taller. If you specify a height value larger than 16\
    \ pixels, the controls will simply be aligned vertically inside the defined area.\n\
    \nFigure 8–5\\. The iPad audio controls\n\nIn either case, the audio player isn’t\
    \ specially attractive. Finding an alternative solution would allow you to both\
    \ enhance the user experience and unify the cross-device\n\nexperience—without\
    \ resorting to the DOMWindow navigator.platform or\n\nnavigator.userAgent property.\
    \ You can easily attach an event to an image, such as an album cover, and launch\
    \ the play() method for your <audio> tag this way.\n\nKeep Things Reasonable\n\
    \nAs you have seen, it has become extremely easy to embed audio content into your\n\
    \npages. Be careful, however, not to overdo it. If you want to display a list\
    \ of videos on a page, for instance, as is done on YouTube or Vimeo (see Figure\
    \ 8–6), we don’t\n\nrecommend using a <video> tag for each element. Because on\
    \ the iPhone and iPod touch tapping the player launches QuickTime, you could be\
    \ tempted to do this to make accessing your content easier. Nonetheless, you should\
    \ be aware that multiplying media tags on the same page can considerably slow\
    \ down navigation and make the browser\n\nless snappy.\n\nInstead, you could display\
    \ a list of images, each one sending the user to a dedicated play page. This will\
    \ enhance user experience, especially for iPad users who will play the video directly\
    \ in the browser and expect a viewing experience superior to that provided by\
    \ a small-sized video in a thumbnail list.\n\n![](index-248_1.jpg)\n\nCHAPTER\
    \ 8: Embedding Audio and Video Content in Your Web Application\n\nFigure 8–6\\\
    . A video list in the YouTube web application\n\nTake Control Over Your Content\n\
    \nAs stated earlier, once the user has launched the video or audio content, you\
    \ can gather information about this content. The API bound to the new HTML5 media\
    \ tags ships with a whole range of new DOM events that will let you know exactly\
    \ what is going on while media content is played.\n\nTo illustrate some of the\
    \ possibilities offered by the API, we are going to create a page that will display\
    \ real-time information about the state of a playing movie. Mainly, we will use\
    \ the TimeRanges object—used in the HTMLMediaElement interface from which the\
    \ video and audio objects inherit—and its attached properties for the audio and\
    \ video objects.\n\nThis interface is very simple, containing only a length property\
    \ that holds information about the number of available ranges, and two methods,\
    \ start() and end(), that give data in seconds about the range with the index\
    \ passed as a parameter. If an error occurs with this parameter, that is, if it\
    \ is out of range, an INDEX_SIZE_ERR exception will be thrown.\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\nUnderstanding and Using Ranges\n\
    \nThe HTMLMediaElement interface has several properties, including buffered, which\
    \ gives information about the state of downloaded data available to play the media\
    \ content, and played, which indicates the already played ranges. Note that in\
    \ Mobile Safari, it is most often considered that the played property has only\
    \ one range.\n\nThe seekable property, which also uses the TimeRanges object,\
    \ indicates which ranges are seekable by the browser. We are not going to use\
    \ it here, because it generally returns a range equal to the range from the startTime\
    \ property (for the video object) to the duration property. Cases where this is\
    \ not true include media on web servers that do not support *HTTP range* that\
    \ allows for partial download—which is used, for instance, to let users resume\
    \ an interrupted download. Also, on older versions of the iOS, the range will\
    \ be set to the available buffer and will raise an INDEX_SIZE_ERR if you try to\
    \ set the currentTime property out of this range.\n\nNOTE: Although media is played\
    \ directly in the browser on the iPad, information is updated also on the other\
    \ iOS devices. Nonetheless, with versions prior to 3.2, the played property holds\
    \ no range, which shouldn’t be a problem because it is generally preferable to\
    \ use the startTime and currentTime properties to get the play position.\n\nFor\
    \ our example, let’s start with the HTML markup of our application:\n\n<!DOCTYPE\
    \ html>\n\n<html>\n\n<head>\n\n<title>Media Demo</title>\n\n<meta name=\"viewport\"\
    \ content=\"initial-scale=1.0;\n\nmaximum-scale=1.0; user-scalable=no\">\n\n<link\
    \ rel=\"stylesheet\" href=\"styles/video.css\">\n\n<script src=\"scripts/video.js\"\
    ></script>\n\n</head>\n\n<body onload=\"setup()\">\n\n<div class=\"info\">\n\n\
    <h1>Big Buck Bunny</h1>\n\n<p>A fantastic movie under Creative Commons License\n\
    \nfreely available for download to everyone.</p>\n\n</div>\n\n<div class=\"video\"\
    >\n\n<div class=\"media\">\n\n<time>Waiting...</time>\n\n<video src=\"media/BigBuckBunny_640x360.m4v\"\
    \n\nwidth=\"100%\" height=\"360\" controls></video>\n\n</div>\n\n<div id=\"buffered\"\
    ><meter></meter><mark></mark></div>\n\n<div id=\"played\"></div>\n\n</div>\n\n\
    CHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\n</body>\n\
    \n</html>\n\nNote that the <div> identified as buffered has two children. The\
    \ first will be a progress bar attached to the buffer completion, while the second\
    \ will hold an arrow indicating the current play position. The played ranges will\
    \ be added to the <div> identified as played.\n\nNext, we create a specific style\
    \ sheet for our video pages that we unsurprisingly name *video.css*:\n\nbody {\n\
    \nbackground-color: #444;\n\ncolor: white;\n\nfont-family: helvetica;\n\ntext-shadow:\
    \ black 2px 2px 2px;\n\n}\n\n.video { margin-right: 200px; }\n\n.media { position:\
    \ relative; }\n\n.media time {\n\nposition: absolute;\n\ntop: 0;\n\nleft: 0;\n\
    \nright: 0;\n\nbackground-color: rgba(0, 0, 0, 0.5);\n\npadding: 5px;\n\ncolor:\
    \ white;\n\nfont: bold 10px verdana;\n\n}\n\n.media video {\n\ndisplay: block;\n\
    \nbackground: black;\n\n-webkit-box-shadow: 0 4px 20px black;\n\n}\n\n.info {\n\
    \nfloat: right;\n\nwidth: 190px;\n\nfont-size: 13px;\n\n}\n\n.info h1 { font-size:\
    \ 18px; }\n\n#buffered, #played {\n\nposition: relative;\n\nbackground-color:\
    \ black;\n\n-webkit-box-shadow: 0 4px 20px black;\n\nmargin: 1px;\n\n}\n\n#buffered\
    \ {\n\nbackground-color: #444;\n\n}\n\n/* Progress bars */\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\nmeter, mark {\n\ndisplay:\
    \ block;\n\nheight: 10px;\n\n}\n\n#buffered meter {\n\nbackground-color: gray;\n\
    \n-webkit-box-sizing: border-box;\n\nborder:1px solid black;\n\nborder-width:0\
    \ 1px;\n\n}\n\n/* Arrow indicator */\n\n#buffered mark {\n\nposition: absolute;\n\
    \nborder: 5px solid transparent;\n\nborder-bottom-color: white;\n\nmargin: -10px\
    \ 0 0 -5px;\n\nheight: 0;\n\n}\n\nFinally, this would all be pointless without\
    \ the appropriate scripts to display the expected information. We create a file\
    \ called *video.js* to which we add the adjustVideo() function shown earlier.\
    \ Then, the first function we create is the one called with the document onload\
    \ event; it initializes the watchers.\n\nfunction setup() {\n\nvar video = document.getElementsByTagName(\"\
    video\")[0];\n\nwindow.setInterval(checkBuffered, 500, video);\n\nvideo.addEventListener(\"\
    timeupdate\", checkPlayed, false);\n\nvideo.addEventListener(\"loadedmetadata\"\
    , adjustVideo, false);\n\n}\n\nThe checkBuffered() function checks the buffer\
    \ state of the video every 500\n\nmilliseconds and displays this data as a gray\
    \ progress bar under the video. Using Desktop Safari, much more memory would be\
    \ available, but on portable devices, the browser is allotted less memory, which\
    \ means the buffer will constantly change without ever holding all the length\
    \ of the movie. Also note that we use a timer because the progress event, corresponding\
    \ to the update state of the buffer, is currently not supported.\n\nfunction checkBuffered(video)\
    \ {\n\nif (video.buffered.length && video.duration) {\n\nvar pos = calcPosition(video.buffered.start(0),\n\
    \nvideo.buffered.end(0), video.duration);\n\nvar bar = document.getElementById(\"\
    buffered\");\n\nupdateBar(bar.firstChild, pos);\n\n}\n\n}\n\nNext, the checkPlayed()\
    \ function displays the played range, again as a progress bar under the video.\
    \ In Mobile Safari, because there is never more than one already played range\
    \ that spans from the beginning of the video to the current play state, only one\
    \ bar will be displayed, whereas on Desktop Safari each range will be rendered\
    \ independently.\n\nCHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\
    \nThus, a new range wil be added, for instance, when you jump to another frame\
    \ of the movie using the time cursor. When two ranges overlap, they are merged\
    \ to make just one range and reduce the number of ranges. This is why we clear\
    \ the played container with each updatetime event, making the progress bar update.\n\
    \nfunction checkPlayed(event) {\n\nvar video = event.target;\n\n/* Update the\
    \ time cursor position */\n\nvar progress = document.getElementById(\"buffered\"\
    );\n\nprogress.lastChild.style.left = (video.currentTime / video.duration * 100)\
    \ + \"%\";\n\n/* Update the textual video time progression */\n\nupdateTime(video);\n\
    \n/* Clear and add played ranges if any */\n\nvar container = document.getElementById(\"\
    played\");\n\ncontainer.innerHTML = \"\";\n\nfor (var i = 0; i < video.played.length;\
    \ i++) {\n\nvar pos = calcPosition(video.played.start(i),\n\nvideo.played.end(i),\
    \ video.duration);\n\naddRange(container, pos);\n\n}\n\n}\n\nfunction addRange(dest,\
    \ pos) {\n\nvar bar = document.createElement(\"meter\");\n\nbar.style.backgroundColor\
    \ =\n\n\"hsl(\" + (pos.from * 360 / 100 | 0) + \", 100%, 50%)\";\n\nupdateBar(bar,\
    \ pos);\n\ndest.appendChild(bar);\n\n}\n\nDownload from Wow! eBook <www.wowebook.com>\n\
    \nThe fol owing functions calculate the progress and control the display of the\
    \ progress bar. The first function determines the percentages required for the\
    \ second to correctly position the bars in their container and visual y represent\
    \ the played range passed as a parameter to calcPosition().\n\nfunction calcPosition(start,\
    \ end, max) {\n\nreturn {\n\nfrom: (start / max * 100),\n\nto: (end / max * 100)\n\
    \n}\n\n}\n\nfunction updateBar(bar, pos) {\n\nbar.style.width = (pos.to - pos.from)\
    \ + \"%\";\n\nbar.style.marginLeft = pos.from + \"%\";\n\n}\n\nFinal y, we need\
    \ to handle duration. The updateTime() function evaluates the elapsed and remaining\
    \ time and converts them from seconds to a more readable time format\n\nusing\
    \ the formatTime() function.\n\n![](index-253_1.jpg)\n\nCHAPTER 8: Embedding Audio\
    \ and Video Content in Your Web Application\n\nfunction updateTime(video) {\n\n\
    if (video.duration) {\n\nvar elapsed = video.currentTime - video.startTime;\n\n\
    var state = video.paused ? \"Paused\" : \"Playing\";\n\ndocument.getElementsByTagName(\"\
    time\")[0].textContent = state + \": \" +\n\nformatTime(elapsed) + \" / \" +\n\
    \nformatTime(video.duration) + \" (-\" +\n\nformatTime(video.duration - elapsed)\
    \ + \")\";\n\n}\n\n}\n\nfunction formatTime(time) {\n\n/* Do we have hours? */\n\
    \nvar cut = time < 3600 ? 4 : 1;\n\nvar str = \"\";\n\nfor (var i = 2; i >= 0;\
    \ i--) {\n\nvar step = Math.pow(60, i);\n\nvar part = (time / step) | 0; // Quick\
    \ way to do a Math.floor()\n\ntime -= part * step;\n\nstr += \":\" + (\"0\" +\
    \ part).substr(-2); // Add a leading 0\n\n}\n\nreturn str.substr(cut);\n\n}\n\n\
    Now, open the created page in Mobile Safari—or your development browser to see\n\
    \nmultiple ranges—and launch the video. You should get a result similar to Figure\
    \ 8–7.\n\nFigure 8–7\\. The time is displayed in the upper part; the buffer and\
    \ playback progression are shown as bars at the bottom\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\nAs in Mobile Safari, the\
    \ video download will begin only on an action by the user.\n\nAbsolutely no data\
    \ will be available, including the length of the movie, until this has occurred.\
    \ Once the download has begun, the information will be gathered and\n\ndisplayed,\
    \ and the progression will be accurately represented.\n\nA Number of Supported\
    \ Events\n\nOnly a handful of available events have been covered in our previous\
    \ example, and there are many more that you can use. Table 8–1 shows the complete\
    \ list of supported events with their meaning on iOS. The Event object passed\
    \ as a parameter to the handlers has no specific property related to the event\
    \ type itself like the current playback time with the timeupdate event. The necessary\
    \ data is available directly through the object receiving the event, as you have\
    \ seen in the example (event.target).\n\nTable 8–1\\. List of Events Supported\
    \ by Mobile Safari\n\n**Event Name**\n\n**Description**\n\nabort\n\nThe fetching\
    \ has been interrupted before the browser has completed\n\ndownloading the media.\n\
    \nemptied\n\nAn already initialized media has been reinitialized to its initial\
    \ state.\n\nplay\n\nPlayback has been initiated, for instance after the user has\
    \ pressed a play\n\nbutton.\n\npause\n\nPlayback has been paused, for instance\
    \ after the user has pressed the\n\npause button.\n\nloadedmetadata\n\nDimensions\
    \ and duration data about the media are available.\n\nloadeddata\n\nData required\
    \ for media playback have just been made available.\n\nwaiting\n\nPlayback has\
    \ stopped because the next frame is not available.\n\nplaying\n\nPlayback has\
    \ started.\n\ncanplay\n\nData is available for playback, without certainty that\
    \ it will be playable\n\nwithout buffering.\n\ncanplaythrough\n\nData is available\
    \ to play the media, and the browser estimates that it will\n\nbe playable without\
    \ buffering.\n\nseeking\n\nThe browser has to find a new playback position. This\
    \ event will be\n\ntriggered only if the searching takes longer than is reasonable.\n\
    \nseeked\n\nThe browser finished seeking a new position.\n\ntimeupdate\n\nThe\
    \ current playback position has changed.\n\nended\n\nThe playback has stopped\
    \ because the media has come to an end.\n\nratechange\n\nThe playback rate has\
    \ been modified.\n\ndurationchange\n\nThe length of the media has changed, for\
    \ instance if the source of the\n\nmedia has been modified.\n\nvolumechange\n\n\
    The volume has changed. Modifying the volume using the controls on the\n\nplayer\
    \ doesn’t trigger this event.\n\nCHAPTER 8: Embedding Audio and Video Content\
    \ in Your Web Application\n\nSome behaviors for these events can be surprising.\
    \ The ratechange and volumechange events are supported but are of limited use\
    \ on Mobile Safari. Indeed, the associated properties on the media objects currently\
    \ have no effect. Modifying the values for the properties playbackRate, defaultPlaybackRate,\
    \ and volume—which should change the\n\nplayback speed and volume—will trigger\
    \ the event but won’t affect the playback.\n\nTo implement a fast-forward function,\
    \ you have to use the currentTime property, but you will not benefit from the\
    \ same playback fluidity as using the properties directly affecting the playback\
    \ rate.\n\nUsing the currentTime property will automatically trigger a seeked\
    \ event. Technically, using currentTime changes the seeking property to true to\
    \ indicate that a search is being performed. The seeked event will be sent when\
    \ the property is set back to false. If the process takes more time than expected,\
    \ and in this case only, a seeking event will be triggered.\n\nThe same event\
    \ is also triggered when the media content comes to an end and the loop attribute\
    \ on the <audio> or <video> tag is set. In such a case, the ended event is never\
    \ triggered, because the playback isn’t expected to stop. Therefore, you will\
    \ have to manually check whether the playback is complete using the currentTime\
    \ and duration properties along with the seeked event. This would be useful if\
    \ you wanted the media to be looped only so many times.\n\nAdding Subtitles and\
    \ Chapters to Your Media\n\nThe HTML5 specification plans for external resources\
    \ to be linkable to media content that would make media more accessible, notably\
    \ for disabled users. At the time of writing, this feature is still a work in\
    \ progress and hasn’t been implemented in any browser. Eventually, you should\
    \ be able to specify one or several resources using the\n\n<track> tag, as in\
    \ the following example:\n\n<video src=\"myvideo.mp4\" poster=\"preview.png\"\n\
    \nid=\"myvideo\" width=\"320\" height=\"240\">\n\n<track kind=\"subtitles\"\n\n\
    src=\"mysubtitles-us.srt\" srclang=\"en-US\" label=\"English Subtitles\">\n\n\
    <track kind=\"subtitles\"\n\nsrc=\"mysubtitles-fr.srt\" srclang=\"fr-FR\" label=\"\
    Sous-Titres en Français\">\n\n</video>\n\nSpecific attributes allow you to determine\
    \ the resource types—subtitles in our\n\nexample—as well as the language in use,\
    \ in the BCP 47 format, similar to that returned for the browser with the navigator.language\
    \ property of the window object. The label attribute contains the title for the\
    \ track, which can be used in a menu to select resources. Therefore, it shouldn’t\
    \ be left empty, should be representative, and ideally should be different for\
    \ an attribute value with the same kind value.\n\nCHAPTER 8: Embedding Audio and\
    \ Video Content in Your Web Application\n\nCreating Your Own Custom Subtitles\n\
    \nBecause subtitles can be a desirable feature prompt to enhance user experience\
    \ and make your web applications more attractive, we are going to build some code\
    \ to replace the unsupported <track> tag. Of course, subtitles will be of interest\
    \ only if you are targeting devices that support playing media directly inside\
    \ the browser—you cannot add functionality to an external player. On the contrary,\
    \ navigating through chapters will be possible on all devices, because events\
    \ can be passed to the player.\n\nFrom our previous examples, you learned how\
    \ to gather the current playback position.\n\nHence, you only have to find a way\
    \ to insert the relevant elements into your page at the right time. For this,\
    \ we are going to use a simple, widely used format for our subtitles: SRT. .srt\
    \ files were initially created for the SubRip application, which is used to extract\
    \ subtitles in real time from a video stream. This format is close to the WHATWG\
    \ format in progress, WebSRT, and is simpler than the current W3C Timed Text Markup\
    \ Language\n\n(TTML), which is why we are going to use it.\n\nDisplaying Subtitles\n\
    \nSRT files are text files with series of multiline blocks representing the following\
    \ information:\n\nA period number\n\nThe range in which the subtitle should appear\n\
    \nThe text of the subtitle (which can span several lines and include new\n\nlines,\
    \ but no blank lines)\n\nA blank line indicating a new subtitle is coming\n\n\
    For our example, we will use an SRT file with five subtitles and allow HTML markup\
    \ so we can easily transform our content:\n\n00:00:16,000 --> 00:00:18,000\n\n\
    Tweet tweet! I'm a bird!\n\n00:00:19,500 --> 00:00:20,000\n\nTweeet... <span>Ouch!</span>\n\
    \n00:00:20,000 --> 00:00:21,000\n\nTweeet... Ouch!\n\n00:00:47,000 --> 00:00:50,000\n\
    \nOh, it's already morning.\n\nWhat a beautiful day!\n\n00:01:03,000 --> 00:01:05,000\n\
    \nHumm, that smells nice... what is it?\n\nCHAPTER 8: Embedding Audio and Video\
    \ Content in Your Web Application\n\nObviously, these subtitles are of limited\
    \ interest, but they are enough to convey speech to our animated characters. Still\
    \ using the *Big Buck Bunny* movie, we are going to explore the possibilities\
    \ offered by this solution.\n\nFirst, let’s define a style sheet that will allow\
    \ us to make text evolve, such as between subtitles 2 and 3\\. We want the text\
    \ (“Tweeet...”) not to flicker when the “Ouch!” part appears after a few seconds.\
    \ In the style sheet from the previous example, add the following:\n\n#textual\
    \ span {\n\nvisibility: hidden;\n\n}\n\nOf course, you’ll also need generic styles\
    \ to position and style the subtitles. You will place them at the bottom of the\
    \ video and apply a text-shadow so that the text remains readable no matter what\
    \ the rendered video image is.\n\n#textual {\n\nposition: absolute;\n\nleft: 0;\n\
    \nright: 0;\n\nbottom: 16px;\n\ntext-align: center;\n\ncolor: white;\n\nfont-weight:\
    \ bold;\n\ntext-shadow:\n\nblack 0 0 3px,\n\nblack 1px 1px 2px;\n\n}\n\nNext,\
    \ let’s modify the HTML code to add the container for the subtitles (with the\
    \ ID\n\ntextual):\n\n...\n\n<div class=\"media\">\n\n<div id=\"time\">Waiting...</div>\n\
    \n<video src=\"media/BigBuckBunny_640x360.m4v\"\n\nwidth=\"100%\" height=\"360\"\
    \ controls>\n\n**<track kind=\"subtitles\"**\n\n**src=\"srt/subtitles-us.srt\"\
    \ srclang=\"en-US\" label=\"English Subtitles\">**\n\n**<track kind=\"subtitles\"\
    **\n\n**src=\"srt/subtitles-fr.srt\" srclang=\"fr-FR\" label=\"Sous-Titres en\
    \ Français\">**\n\n</video>\n\n**<div id=\"textual\">(Press Play)</div>**\n\n\
    </div>\n\n...\n\nNow, you’ll put this altogether, using JavaScript:\n\nvar TimedInfo\
    \ = function(media, container) {\n\nthis.owner = media;\n\nthis.element = container;\n\
    \n/* Active track */\n\nCHAPTER 8: Embedding Audio and Video Content in Your Web\
    \ Application\n\nthis.current = 0;\n\n/* Self initialization */\n\nthis.parse();\n\
    \nvar that = this;\n\nthis.owner.addEventListener(\"timeupdate\", function() {\n\
    \nthat.shouldDisplay();\n\n}, false);\n\n}\n\nTimedInfo.prototype.parse = function()\
    \ {\n\nvar tracks = this.owner.getElementsByTagName(\"track\");\n\n/* Push all\
    \ available tracks information */\n\nthis.data = [];\n\nfor (var i = 0; i < tracks.length;\
    \ i++) {\n\nthis.data.push({\n\nsrc: tracks[i].getAttribute(\"src\"),\n\nlabel:\
    \ tracks[i].getAttribute(\"label\") || \"Untitled\",\n\nreadyState: 0\n\n});\n\
    \n}\n\n}\n\nTimedInfo.prototype.loadResource = function(index) {\n\nvar that =\
    \ this;\n\nvar req = new XMLHttpRequest();\n\nreq.open(\"get\", this.data[index].src);\n\
    \nreq.onreadystatechange = function() { that.handleAsyncState(this, index) };\n\
    \nreq.send();\n\n}\n\nTimedInfo.prototype.handleAsyncState = function(req, index)\
    \ {\n\nif (req.readyState == 4) {\n\nif (req.status != 200) {\n\nthis.data[index].readyState\
    \ = 3;\n\n} else {\n\nthis.data[index].srt = this.extract(req.responseText);\n\
    \nthis.data[index].readyState = 2;\n\nthis.shouldDisplay();\n\n}\n\n}\n\n}\n\n\
    TimedInfo.prototype.extract = function(text) {\n\nvar i, j, res = [];\n\nvar parts\
    \ = text.split(\"\\n\\n\");\n\n/* Iterate through each block */\n\nwhile ((i =\
    \ parts.shift())) {\n\n/* Split the block lines ... */\n\ni = i.split(\"\\n\"\
    );\n\nj = i[1].split(\" --> \");\n\n/* ... and take the time information (start\
    \ and end) */\n\nfor (var n = 0; n < 2; n++) {\n\nCHAPTER 8: Embedding Audio and\
    \ Video Content in Your Web Application\n\nj[n] = j[n].split(\":\");\n\nfor (var\
    \ t = 0, m = 0; m < 3; m++) {\n\nt = t * 60 + 1 * j[n][m].replace(\",\", \".\"\
    );\n\n}\n\nj[n] = t;\n\n}\n\n/* Push information */\n\nres.push({ time: j, text:\
    \ i.slice(2).join(\"<br>\") });\n\n}\n\nreturn res;\n\n}\n\nTimedInfo.prototype.shouldDisplay\
    \ = function() {\n\nif (!this.checkReadyState(this.current)) {\n\nreturn;\n\n\
    }\n\n/* Data have been loaded */\n\nvar st = this.data[this.current].srt;\n\n\
    var ct = this.owner.currentTime - this.owner.startTime;\n\n/* Look for a suitable\
    \ subtitle */\n\nthis.element.innerHTML = \"\";\n\nfor (var i = 0; i < st.length;\
    \ i++) {\n\nif (ct >= st[i].time[0] && ct < st[i].time[1]) {\n\nthis.element.innerHTML\
    \ = st[i].text;\n\nbreak;\n\n}\n\n}\n\n}\n\nTimedInfo.prototype.checkReadyState\
    \ = function(index) {\n\nif (index == -1) {\n\nreturn false;\n\n}\n\n/* Check\
    \ whether the data is available */\n\nswitch (this.data[index].readyState) {\n\
    \ncase 0:\n\nthis.loadResource(index);\n\nthis.data[index].readyState = 1;\n\n\
    case 1:\n\ncase 3:\n\nreturn false;\n\n}\n\nreturn true;\n\n}\n\nThis is quite\
    \ a chunk of code. You create an object, TimedInfo, partly inspired by the TimedTrack\
    \ object from the HTML5 specifications. This object will read the <track> tags\
    \ related to the media passed to the constructor and then display the subtitles\
    \ using a 238\n\nCHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\
    \nhandler on the timeupdate event. This way, the subtitles will appear appropriately\
    \ both in play mode and in seek mode.\n\nYou can initiate an instance of the object\
    \ simply by passing the media object and the container for the subtitles. The\
    \ constructor will keep these parameters, get the required data on the tracks\
    \ using the parse() method, and then register for timeupdate\n\nnotifications\
    \ and display subtitles appropriately using the shouldDisplay() method.\n\nvar\
    \ ti = new TimedInfo(mediaObject, containerObject);\n\nThe parse() method will\
    \ read the attributes from the tracks and collect them in the data array. Because\
    \ at this moment no data is available, we add a readyState property set to 0,\
    \ indicating that the resource has not been downloaded.\n\nWhen a timeupdate event\
    \ is triggered, the shouldDisplay() method checks whether the active resource\
    \ is available. If this isn’t the case, it asks for the SRT file to be downloaded\
    \ using the loadResource() method and changes the readyState property to 1, showing\
    \ that a download request has been initiated. As long as the resource is unavailable,\
    \ the shouldDisplay() method simply waits. Once the data is loaded, the method\
    \ looks for the subtitle relevant to the current playback time and displays it\
    \ if any.\n\nThe XMLHttpRequest object, which we will detail in a coming chapter,\
    \ is used by\n\nloadResource() to launch the resource download in asynchronous\
    \ mode. Once the\n\nrequest has completed, the handleAsyncState() function extracts\
    \ the data returned by the server via the responseText property and passes them\
    \ to extract(), which will split the SRT file and return an array with organized\
    \ data.\n\nOnce this object is added to the *video.js* file, you simply have to\
    \ modify the setup() function created earlier and add the following lines:\n\n\
    **var timed; // Globally stored for future use**\n\nfunction setup() {\n\n...\n\
    \n**timed = new TimedInfo(video, document.getElementById(\"textual\"));**\n\n\
    }\n\nLaunching your page in Mobile Safari will show you the movie, with subtitles\n\
    \ncorresponding to the played picture, as shown in Figure 8–8.\n\n![](index-261_1.jpg)\n\
    \nCHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\nFigure\
    \ 8–8\\. Real-life subtitles\n\nLanguage Auto-selection\n\nYou have used only\
    \ a few attributes of the <track> tag, and you are using only the first\n\n<track>\
    \ tag in the HTML code, although you have gathered all those that were defined.\n\
    \nWith the following code, you’ll use the srclang attribute to automatically select\
    \ a language for the subtitles depending on the browser language. The information\
    \ will be saved to the array.\n\nTimedInfo.prototype.parse = function() {\n\n\
    ...\n\nfor (var i = 0; i < tracks.length; i++) {\n\n**var l1 = tracks[i].getAttribute(\"\
    srclang\");**\n\n**var l2 = window.navigator.language;**\n\n**if (l1.toLowerCase()\
    \ == l2.toLowerCase()) {**\n\n**this.current = i;**\n\n**}**\n\nthis.data.push({\n\
    \n**language: l1,**\n\n...\n\n});\n\n}\n\n}\n\nTo test this code, you simply have\
    \ to add the language relative to your browser in the second position in the <video>\
    \ tag and create the associated SRT files. Here is the French version of the subtitles:\n\
    \n00:00:16,000 --> 00:00:18,000\n\n**Cui cui ! Je suis un oiseau !**\n\nCHAPTER\
    \ 8: Embedding Audio and Video Content in Your Web Application\n\n00:00:19,500\
    \ --> 00:00:20,000\n\n**Cuuiii... <span>Aïe !</span>**\n\n00:00:20,000 --> 00:00:21,000\n\
    \n**Tweeet... Ouch!**\n\n00:00:47,000 --> 00:00:50,000\n\n**Oh, et bien c’est\
    \ déjà le jour.**\n\n**Quelle belle journée !**\n\n00:01:03,000 --> 00:01:05,000\n\
    \n**Humm, ça sent bon... Qu’est-ce que c’est ?**\n\nDon’t forget to check the\
    \ language for your browser to appropriately set the srclang attribute for your\
    \ tests. You can easily check this by typing window.navigator.language in the\
    \ console.\n\nLet the End User Choose\n\nAutomatic selection is good, but, as\
    \ usual, letting users choose for themselves is better.\n\nThis is why you’l now\
    \ add methods to get the list of tracks available for a given kind and activate\
    \ the track you want.\n\nThe specifications al ow for several values for this\
    \ attribute, as presented in Table 8–2.\n\nThese values can give you ideas of\
    \ what you can create while waiting for proper support for this feature. Of course,\
    \ some keywords wil be hard to implement, because they are tightly related to\
    \ the system and the ability to communicate with it, such as the descriptions\
    \ value.\n\nTable 8–2\\. The *kind* Keywords As Defined by the HTML5 Specification\n\
    \nDownload from Wow! eBook <www.wowebook.com>\n\n**Keyword**\n\n**Description**\n\
    \nsubtitles\n\nA translation for the media used when the sound is present but\
    \ not\n\nunderstood\n\ncaptions\n\nTranscription of the soundtrack in case the\
    \ sound is muted and for\n\ndisabled viewers\n\ndescriptions\n\nTranscription\
    \ of the images displayed, for use with vocal synthesizers for\n\nblind people\n\
    \nchapters\n\nChaptering meant to make parts of the media more easily accessible\n\
    \nmetadata\n\nTracks defined by the developer to be used with scripts\n\nIn the\
    \ parse() method, you do not gather information for the kind attribute. You do\
    \ that with the fol owing code to filter the track types:\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\nTimedInfo.prototype.parse\
    \ = function() {\n\n...\n\nthis.data.push({\n\n**kind: tracks[i].getAttribute(\"\
    kind\"),**\n\nsrc: tracks[i].getAttribute(\"src\"),\n\nlabel: tracks[i].getAttribute(\"\
    label\") || \"Untitled\",\n\nlanguage: l1,\n\nreadyState: 0\n\n});\n\n...\n\n\
    }\n\nNext, let’s add two simple methods that get the list of available tracks\
    \ for a defined kind and activate the relevant resource. The activate() method\
    \ will add a class to the container for the textual data based on the kind to\
    \ eventually add different styles depending on its value.\n\nTimedInfo.prototype.getFilteredIndex\
    \ = function(kind) {\n\nvar list = [];\n\nfor (var i = 0; i < this.data.length;\
    \ i++) {\n\nif (this.data[i].kind == kind) {\n\nlist.push(i);\n\n}\n\n}\n\nreturn\
    \ list;\n\n}\n\nTimedInfo.prototype.activate = function(index) {\n\nif (index\
    \ >= 0 && index < this.data.length) {\n\nthis.current = index;\n\nthis.element.className\
    \ = this.data[this.current].kind;\n\n}\n\n}\n\nFrom here, you can build a select\
    \ box from the data returned by getFilteredIndex(): function buildList() {\n\n\
    var list = timed.getFilteredIndex(\"subtitles\");\n\nvar select = document.createElement(\"\
    select\");\n\nfor (var i = 0; i < list.length; i++) {\n\nvar index = list[i];\n\
    \nvar option = document.createElement(\"option\");\n\noption.textContent = timed.data[index].label;\n\
    \noption.value = index;\n\noption.selected = (timed.current == option.value);\n\
    \nselect.appendChild(option);\n\n}\n\nselect.onchange = selectionChanged;\n\n\
    return select;\n\n}\n\nfunction selectionChanged(event) {\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\ntimed.activate(event.target.value);\n\
    \n}\n\nThe buildList() function creates a <select> element populated with the\
    \ labels from the tracks, directly reading the data property from the TimedInfo\
    \ object. Because now the language is selected automatically when the parse()\
    \ method is initialized, you just have to activate the associated option not to\
    \ display the wrong information to the user. A handler is added to the <select>\
    \ tag to immediately change the language when the section is modified.\n\nYou\
    \ can now modify the HTML code to add the list container to receive the <select>\
    \ tag:\n\n<div class=\"info\">\n\n...\n\n**<form id=\"list\"></form>**\n\n</div>\n\
    \nHere are the rules to style the select box and position it above the video on\
    \ the right:\n\n#list {\n\nheight: 20px;\n\nborder: 1px solid gray;\n\n-webkit-border-radius:4px;\n\
    \n-webkit-box-shadow:2px 2px 4px black;\n\nbackground-image:-webkit-gradient(\n\
    \nlinear, left bottom, left top,\n\nfrom(transparent), to(rgba(255,255,255,0.2))\n\
    \n);\n\n}\n\n#list select {\n\nborder: 0;\n\nbackground: none;\n\ncolor: white;\n\
    \nfont-size: 13px;\n\nline-height: 18px;\n\ntext-shadow: black 1px 1px 1px;\n\n\
    }\n\n/* Create a small arrow on the left */\n\n#list::before {\n\ncontent: '';\n\
    \ndisplay: inline-block;\n\nwidth: 10px;\n\nheight: 10px;\n\nmargin-right: -10px;\n\
    \nborder: 5px solid transparent;\n\nborder-left-color: gray;\n\n-webkit-box-sizing:\
    \ border-box;\n\n}\n\nOn Mobile Safari, the <select> element can be fully styled.\
    \ You can, for instance, remove the border and arrow, as we do here.\n\nThe final\
    \ touch is to call the function buildList() and add the returned object to the\
    \ markup. Once more, you alter the setup() function, adding a line at the end:\n\
    \n![](index-265_1.jpg)\n\nCHAPTER 8: Embedding Audio and Video Content in Your\
    \ Web Application\n\nfunction setup() {\n\n...\n\n**document.getElementById(\"\
    list\").appendChild(buildList());**\n\n}\n\nNow, test all of this in your browser;\
    \ it should look something like Figure 8–9.\n\nFigure 8–9\\. The user can easily\
    \ select a language now\n\nAs you can see, the default <select> on the iPad doesn’t\
    \ need any further styling.\n\nEasier Media Browsing with Chapters\n\nWith the\
    \ previous examples, you are already adding appreciable functionality to the default\
    \ media implementation. To make the experience closer still to that of a proper\
    \ media player application, we are now going to offer the user the possibility\
    \ to move from one part of the media to another specifically or to load several\
    \ sounds in the same media tag and trigger one or another for some action by the\
    \ user. We are going to continue expanding the previous example.\n\nCHAPTER 8:\
    \ Embedding Audio and Video Content in Your Web Application\n\nFirst, add an object\
    \ to the JavaScript code that will handle tracks with the chapter type: TimedInfo\
    \ = function(media, container) {\n\n...\n\n/* Active track */\n\nthis.current\
    \ = 0;\n\n**this.chapter = { index: -1 };**\n\n...\n\n}\n\nThen come the methods\
    \ to activate a specific chapter (number) based on a given\n\nresource (index):\n\
    \nTimedInfo.prototype.play = function(index, number, shouldStop) {\n\n/* Don't\
    \ request twice the same chapter while loading SRT file */\n\nif (index != this.chapter.index\
    \ || number != this.chapter.number) {\n\nthis.chapter.index = index;\n\nthis.chapter.number\
    \ = number;\n\nthis.chapter.shouldStop = shouldStop;\n\nthis.chapter.timeChanged\
    \ = false;\n\nthis.handleChapter();\n\n}\n\n}\n\nTimedInfo.prototype.handleChapter\
    \ = function() {\n\nif (!this.checkReadyState(this.chapter.index)) {\n\nreturn;\n\
    \n}\n\nvar nb = this.chapter.number - 1;\n\nvar st = this.data[this.chapter.index].srt;\n\
    \n/* We have data, we can set the current position */\n\nif (!this.chapter.timeChanged)\
    \ {\n\nif (this.owner.paused) {\n\nthis.owner.play();\n\n}\n\nif (this.owner.readyState\
    \ == this.owner.HAVE_NOTHING) {\n\nreturn;\n\n}\n\nthis.owner.currentTime = this.owner.startTime\
    \ + st[nb].time[0];\n\nthis.chapter.timeChanged = true;\n\n}\n\n/* If we have\
    \ to stop at the end of the chapter */\n\nif (this.chapter.shouldStop) {\n\nvar\
    \ ct = this.owner.currentTime - this.owner.startTime;\n\nvar et = st[nb].time[1];\n\
    \nif (ct >= et) {\n\nthis.chapter = { index: -1 };\n\nthis.owner.pause();\n\n\
    }\n\n}\n\n}\n\nCHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\
    \nThe handleChapter() method is the trickiest because you must consider many\n\
    \nparameters. As shown previously, you must download the SRT file asynchronously,\
    \ but you must also handle the state of the media data to avoid getting an INVALID_STATE_ERR\n\
    \nexception when fixing the currentTime property.\n\nNOTE: The decompression algorithm\
    \ integrated into the device doesn’t allow for precise positioning. You may have\
    \ to move your timing a few seconds forward to get the exact place. The position\
    \ written in currentTime isn’t guaranteed, though there is no problem reading\
    \ this property.\n\nFirst, you check whether the video is being played, reading\
    \ the paused property, and launch the playback if necessary. Then, you check the\
    \ state of the readyState property, which must at least have a value of 1 (HAVE_METADATA),\
    \ the minimal value indicating that data is available for playback (see Table\
    \ 8–3). If the value is lower, the previously noted error will be raised. From\
    \ there, we can set the reading position depending on the data of the chosen chapter.\n\
    \nSetting a value for currentTime that doesn’t fit into the ranges seekable by\
    \ the browser will throw an INDEX_SIZE_ERR exception on the iPhone and iPod touch.\
    \ However, on the iPad, the browser will begin downloading a new range to make\
    \ reading at the indicated position possible.\n\nTable 8–3\\. Possible Values\
    \ for the *readyState* Property\n\n**Constant Description**\n\n*media*.HAVE_NOTHING\
    \ (0)\n\nNo information about the media is available.\n\n*media*.HAVE_METADATA\
    \ (1)\n\nThe available data is enough to determine the duration of the\n\nmedia.\
    \ For videos, dimensions are also known. The available\n\ndata is not sufficient\
    \ to play the media.\n\n*media*.HAVE_CURRENT_DATA (2) The available data is sufficient\
    \ to play the current position of the media but not to move forward in it.\n\n\
    *media*.HAVE_FUTURE_DATA (3)\n\nEnough data has been gathered to play the media\
    \ without\n\nimmediately interrupting.\n\n*media*.HAVE_ENOUGH_DATA (4)\n\nThere\
    \ is enough data to correctly play the media.\n\nThe shouldStop property determines\
    \ whether the playback should stop after the chapter is completed. If it is set\
    \ to true, we test the value for currentTime to tell whether the playback has\
    \ reached the end of the video and use the pause() method if it has. To handle\
    \ this option, handleChapter() has to be called too during the timeupdate event.\n\
    \nTo achieve this, you have to group both methods in the same handler.\n\nCHAPTER\
    \ 8: Embedding Audio and Video Content in Your Web Application\n\nTimedInfo.prototype.handleTracks\
    \ = function() {\n\nthis.handleChapter();\n\nthis.shouldDisplay();\n\n}\n\nOf\
    \ course, you must modify the listener with this new handler:\n\nTimedInfo = function(media,\
    \ container) {\n\n...\n\n/* Self initialization */\n\nthis.parse();\n\nvar that\
    \ = this;\n\nthis.owner.addEventListener(\"timeupdate\", function() {\n\n**that.handleTracks();**\n\
    \n}, false);\n\n}\n\nTimedInfo.prototype.handleAsyncState = function(req, index)\
    \ {\n\n...\n\n} else {\n\nthis.data[index].srt = this.extract(req.responseText);\n\
    \nthis.data[index].readyState = 2;\n\n**this.handleTracks();**\n\n}\n\n...\n\n\
    }\n\nFinally, you must prevent the activation of a chapter as a subtitle:\n\n\
    TimedInfo.prototype.parse = function() {\n\n...\n\nif (**tracks[i].getAttribute(\"\
    kind\") != \"chapters\" &&** l1.toLowerCase() == l2.toLowerCase()) {\n\nthis.current\
    \ = i;\n\n}\n\n...\n\n}\n\nThis way, if you modify the HTML code to add a reference\
    \ to a chaptering resource, it won’t be selected by mistake.\n\n<video src=\"\
    BigBuckBunny_640x360.m4v\" width=\"100%\" height=\"360\" controls>\n\n<track kind=\"\
    subtitles\"\n\n **src=\"subtitles-us.srt\" srclang=\"en-US\" label=\"English Subtitles\"\
    >\n\n ****<track kind=\"subtitles\"**\n\n ****src=\"subtitles-fr.srt\" srclang=\"\
    fr-FR\" label=\"Sous-Titres en Français\">\n\n ****<track kind=\"chapters\"**\n\
    \n**src=\"srt/chapters-us.srt\" srclang=\"en-US\" label=\"English Chapters\">**\n\
    \n</video>\n\nBy now, you can display a list of chapters using something similar\
    \ to the buildList() function used to display subtitle options and launch the\
    \ chapter using the play() method of the TimedInfo object. With our previous code,\
    \ you could, for instance, have the following SRT file:\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\n00:00:00,000 --> 00:00:24,000\n\
    \nIn the begining...\n\n00:00:24,900 --> 00:00:50,300\n\nThe rabbit wakes up.\n\
    \nYou would then activate the second chapter using code similar to this:\n\n<button\
    \ onclick=\"timed.play(2, 2, false)\">The rabbit wakes up.</button> However, on\
    \ Mobile Safari, jumping directly to a specific chapter will be possible only\
    \ if the playback is initiated by an action by the user, as explained earlier.\
    \ Because media resources are downloaded asynchronously, the actual play() call\
    \ is deferred from the action by the user and therefore will not be applied. Still,\
    \ as soon as the user launches the media, this code will work.\n\nWorkarounds...Let’s\
    \ Go\n\nAutomatic playing of a media resource is not supposed to be possible on\
    \ Mobile Safari, because an action by the user should be required to start playback.\
    \ This can be\n\nannoying, because you may want to automatically play, for instance,\
    \ a sound file, considering that it could be no larger than an average image file.\
    \ Your sound file thus would be rather quickly downloaded, as quickly as other\
    \ files that wouldn’t suffer any restriction. You can work around this limitation\
    \ on iOS 3.2 (and newer) using the load() method. This method forces the media\
    \ to be downloaded, which will make it\n\nautomatically playable, using code such\
    \ as the following. Note that you may have to wait a short time for some buffer\
    \ before to call play().\n\nvar audio = document.getElementsByTagName(\"audio\"\
    )[0];\n\naudio.load();\n\naudio.play();\n\nHence, to launch a chapter immediately\
    \ after the SRT has been loaded, you would\n\nsimply have to add a call to the\
    \ load() method in the setup() function.\n\nfunction setup() {\n\nvar video =\
    \ document.getElementsByTagName(\"video\")[0];\n\n**video.load();**\n\n...\n\n\
    }\n\nIn reality, the browser always downloads minimal information to check the\
    \ integrity of the media, which is how you can get a ruled-out play button (Figure\
    \ 8–10) on your player when the format related to the src attribute is not supported\
    \ by Mobile Safari. The browser also sets the networkState property to 1 (NEWTWORK_IDLE),\
    \ indicating that a resource is active although the network isn’t in use at that\
    \ precise moment. This, however, doesn’t trigger any event, not even loadedmetadata,\
    \ until the user taps the play button, initiating the actual download of playable\
    \ data.\n\n![](index-270_1.jpg)\n\nCHAPTER 8: Embedding Audio and Video Content\
    \ in Your Web Application\n\nFigure 8–10\\. If the media is not playable or not\
    \ found, Safari will display a ruled-out play button When the load() method is\
    \ called, the browser will first check the networkState and, if it is not set\
    \ to 0 (NETWORK_EMPTY, indicating that the element hasn’t been initialized), will\
    \ reset it and successively send two events—abort and then emptied—and restart\
    \ the\n\ninitialization from the beginning. Finally, once the resource has been\
    \ validated, it will resume the download of the metadata and of the data necessary\
    \ for playback.\n\nUsing this method, you will be able to launch your audio and\
    \ video media without the previously presented restrictions. Nonetheless, be aware\
    \ that Mobile Safari can play media only one at a time, because some media can\
    \ be played only using the hardware directly, meaning several sources cannot be\
    \ simultaneously decoded. This means you cannot, for instance, overlay several\
    \ sound effects.\n\nMedia Content for the iPhone and iPad\n\nOn a computer, Safari\
    \ can handle many different audio and video formats using a\n\nnumber of codecs\
    \ from third-party sources, but iOS supports only a few. Nevertheless, most of\
    \ the supported formats are based on very rich standards, with widespread\n\n\
    implementation. They are also quite easy to use, once you can tell the specificities\
    \ for each.\n\nUnderstanding Video Formats\n\nVideo decoding is a very resource-hungry\
    \ operation, which is why the iPhone uses a specific chip that decodes video bitstreams\
    \ directly from the hardware. This is much more lightweight than using the main\
    \ processor and thus saves precious battery lifetime.\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\nWARNING: The use of the H.264\
    \ codec is subject to royalties, be it for the distribution or the use of video\
    \ content. As a video content producer, you should be sure that you have the appropriate\
    \ license for your needs, which will not ship with the video compression software\
    \ that you may be using to produce H.264-readable media. All Apple and Adobe software\
    \ comes with a license to benefit from the codec for personal and noncommercial\
    \ use. However, the Internet Broadcast AVC Video license specifies that the distribution\
    \ of content for free won’t be subject to royalties until 2015\\. If you are specifically\
    \ interested in this subject, you may get thorough information from the MPEG LA\
    \ site at [www.mpegla.com.](http://www.mpegla.com)\n\nTable 8–4 presents the currently\
    \ supported characteristics that will allow you to appropriately configure you\
    \ video creation software.\n\nTable 8–4\\. Supported Video Formats\n\n**Video/Audio\
    \ Max Bit Rate**\n\n**Max Format**\n\n**Frame/Channel Video Profile**\n\n**Container**\n\
    \nH.264\n\n1.5 Mbps\n\n640x480\n\n30 fps\n\nLow-Complexity\n\n.m4v, .mp4,\n\n\
    AAC-LC\n\n160 Kbps\n\n48 KHz\n\nstereo audio\n\nof the Baseline\n\n.mov\n\nProfile\n\
    \nH.264\n\n2.5 Mbps\n\n640x480\n\n30 fps\n\nBaseline Profile\n\n.m4v, .mp4,\n\n\
    AAC-LC\n\n160 Kbps\n\n48 KHz\n\nstereo audio\n\nLevel 3.0\n\n.mov\n\nMPEG-4\n\n\
    2.5 Mbps\n\n640x480\n\n30 fps\n\nSimple Profile\n\n.m4v, .mp4,\n\nAAC-LC\n\n160\
    \ Mbps\n\n48 KHz\n\nstereo audio\n\n.mov\n\nH.264\n\n14 Mbps\n\n1280x720\n\n30\
    \ fps\n\n(iPad only) Main\n\n.m4v, .mp4,\n\nAAC-LC\n\n160 Kbps\n\n48 KHz\n\nstereo\
    \ audio\n\nProfile Level 3.1\n\n.mov\n\nin 720p\n\nM-JPEG\n\n35 Mbps\n\n1280x720\n\
    \n30 fps\n\n(iPad only)\n\n.avi\n\nPCM\n\nμ-law coding\n\nstereo audio\n\nMotion\
    \ JPEG\n\nH.264 is often referred to as MPEG-4/AVC or MPEG-4 Part 10\\. This is\
    \ not the same as MPEG-4 (Part 2) in the table, which depends on a different industry\
    \ standard and uses a different compression method. However, the supported formats\
    \ globally are MPEG-4\n\nstandards, which are widely used nowadays and also used\
    \ in the 3GP format, a low-\n\nquality video format often used for multimedia\
    \ mobile services, because it is easily readable on mobile networks and is widely\
    \ supported by mobile phones. The M-JPEG is widespread on numeric cameras with\
    \ video capabilities.\n\nThe associated profiles and levels determine the specificities\
    \ supported with the format, such as compression modes, bitrates and framerates,\
    \ maximum resolution, and so on.\n\niOS’s support for levels is incomplete, which\
    \ is why the highest possible value is indicated in the table.\n\nCHAPTER 8: Embedding\
    \ Audio and Video Content in Your Web Application\n\nOf course, you don’t have\
    \ to understand every detail about these codecs to use them.\n\nBe aware, however,\
    \ that the *Low-Complexity Baseline Profile* isn’t part of the MPEG-4/AVC standard\
    \ but is a simplified variant of the *Baseline Profile* with only one reference\
    \ frame. The compression of videos is based upon the differences between one or\
    \ more frames in the video and save this difference only, thus making the amount\
    \ of data to hold lesser. With a reference frame, the picture to be displayed\
    \ is solely calculated from one frame, which also simplifies the decoding process\
    \ but entails lesser compression efficiency and lower quality.\n\nThe soundtrack\
    \ for video media uses Advanced Audio Coding – Low Complexity (AAC-\n\nLC ), the\
    \ most commonly used nowadays. AAC is a lossy compression format that\n\nfol ows\
    \ MP3 but produces a better-quality sound with similar bitrate and more flexibility.\n\
    \nHowever, as with MPEG-4, support isn’t ful and is limited to a sample rate of\
    \ 48KHz in stereo, as with MP3, where AAC itself can reach 96kHz with 48 channels—for\
    \ a much better quality. AAC, unlike MPEG-4, isn’t subject to any license for\
    \ distribution, and media using it can be freely distributed, whatever the distribution\
    \ mode.\n\nDealing with Supported Audio Formats\n\nNatural y, Apple devices have\
    \ support for other formats that you can use with the\n\n<audio> tag. Table 8–5\
    \ presents a non-exhaustive list.\n\nTable 8–5\\. Supported Audio Formats\n\n\
    **Format**\n\n**Description**\n\nAAC (MPEG-4 Advanced Audio Coding)\n\nHE-AAC\
    \ is an extension to the AAC format optimized\n\nand HE-AAC (High Efficiency)\n\
    \nfor low bitrate, ideal for application that, for instance,\n\nuse streaming.\n\
    \nALAC (Apple Lossless)\n\nA format created by Apple. Unlike MP3 and AAC, the\n\
    \nDownload from Wow! eBook <www.wowebook.com>\n\ncompression is lossless, you\
    \ wil not see lesser\n\nquality. The compressed video should be around half\n\n\
    of the size of the original.\n\nIMA4 (IMA/ADPCM)\n\nInteractive Multimedia Association\
    \ (IMA) is a\n\ncompression algorithm designed to be used in\n\nentertainment\
    \ multimedia applications. It is particularly\n\nfast to encode and decode.\n\n\
    Linear PCM (uncompressed, linear\n\nAs WAV (Windows) and AIFF (Mac), it is a\n\
    \npulse-code modulation)\n\nuncompressed format played in software. Requires\n\
    \nlittle processing because it needn’t be decoded but\n\ncan represent large file\
    \ sizes.\n\nMP3 (MPEG-1 audio layer 3)\n\nThe widespread format everyone knows.\
    \ The\n\ncompression ratio is better than that of AAC, but the\n\nquality isn’t\
    \ as good. The VBR mode (Variable Bit\n\nRate) is also supported.\n\nCHAPTER 8:\
    \ Embedding Audio and Video Content in Your Web Application\n\nThere are chances\
    \ you will choose to serve your user a format that offers good quality; still,\
    \ you should take into account the target audience that you aim for. A WAV file\
    \ will be larger than an AAC file, will require more bandwidth, will require longer\
    \ download times, and potentially will be more costly for the user.\n\nIf you\
    \ know that your audience is likely to be affected by such drawbacks, you can\
    \ consider formats such as Internet Low Bitrate Codec (iLBC ); μ-law and a-law,\
    \ which are low-quality formats used in telecommunications (generally for voice\
    \ encoding); or Adaptive Multi-Rate (AMR), used to bring sound to Multimedia Messaging\
    \ Services\n\n(MMS).\n\nEncoding for the Web\n\nWhen planning to encode any kind\
    \ of media, especially video content, you should begin with high-quality material,\
    \ because compression is generally lossy. Likewise, if you want to test or produce\
    \ several formats, always use the original source for each new\n\nproduction,\
    \ because successive compressions could result in disastrous quality.\n\nThis\
    \ is important, because, when working on the Web, it is a good practice to offer\
    \ several formats from which QuickTime can choose depending on the circumstances—\n\
    \nespecially network conditions—under which the user is trying to view your content.\
    \ The latter behavior is made possible by the use of a reference movie.\n\nA *reference\
    \ movie* is a binary file that references links to different resources relative\
    \ to network considerations. It is automatically generated by the QuickTime Player\
    \ when you export a video for the Web, as we’ll explain.\n\nIf you cannot or do\
    \ not want to use professional software such as Apple’s Final Cut or Adobe’s Premiere,\
    \ you can, as a Snow Leopard user, count on QuickTime X, which\n\nallows you,\
    \ with no extra fee, to export video media for the iPhone. For Windows users and\
    \ Mac OS X users with a version prior to 10.6, you will need to buy QuickTime\
    \ Pro (7\n\nor newer). This remains far below the prices of the professional software\
    \ cited\n\npreviously.\n\nUsing QuickTime Player\n\nThe process using QuickTime\
    \ Player is very simple. Launch the software and load a video from the menu using\
    \ File Open File.... A new playback window appears with the first frame from the\
    \ movie. Still from the File menu, simply choose Save For Web.... An option window\
    \ will appear, as shown in Figure 8–11.\n\n![](index-274_1.jpg)\n\n![](index-274_2.jpg)\n\
    \nCHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\nFigure\
    \ 8–11\\. The export window in QuickTime\n\nTo finalize your export, give a new\
    \ name to your video, choose a directory to save it to (here, *Desktop*), and\
    \ select the formats you need to export to. As a general rule, you can leave all\
    \ checked formats. For instance, the first will be used with a Wi-Fi connection\
    \ on iPhone, the second for a 3G or EDGE connection, and the third for a Wi-Fi\
    \ connected iPad or a computer.\n\nClick the Save button, and a progress window\
    \ will appear (Figure 8–12). Wait for the export to complete; the progress bars\
    \ will disappear as the export completes.\n\nFigure 8–12\\. The Export Progress\
    \ window\n\nOnce all operations have completed, your chosen directory will contain\
    \ a new folder with several files; here we’re still using the same example movie:\n\
    \nCHAPTER 8: Embedding Audio and Video Content in Your Web Application\n\n*Big\
    \ Buck Bunny – Computer.m4v*\n\n*Big Buck Bunny – iPhone (Cellular).3gp*\n\n*Big\
    \ Buck Bunny – iPhone.m4v*\n\n*Big Buck Bunny.html*\n\n*Big Buck Bunny.jpg*\n\n\
    *Big Buck Bunny.mov*\n\nThe first three are the videos themselves, using different\
    \ formats and the same naming as specified in the export window. The HTML file\
    \ holds the relevant markup and\n\ninformation to embed your media into a regular\
    \ web page. The JPEG file should be used in the poster attribute of your <video>\
    \ tag, whereas the .mov file is to be set as the src attribute—this is the reference\
    \ movie. Also, don’t forget to place the video files at the same level as the\
    \ .mov files so that the player can find all the data when parsing the reference\
    \ movie.\n\nAn Encoder Alternative\n\nThis is a very simple—and for lucky Snow\
    \ Leopard users, a cost-effective—method to compress video content; however, you\
    \ have no control over the dimensions or bitrate of your media. If you target\
    \ iPad users, it is likely you will want larger formats and better quality. Moreover,\
    \ developers on other platforms will be frustrated to be forced to pay for such\
    \ a service, not to mention Linux users who cannot natively install QuickTime.\n\
    \nTherefore, once again, we are going to introduce a free, open source, cross-platform\
    \ alternative that also offers better control over the export options.\n\nThe\
    \ name is HandBrake, and you can download it from [http://handbrake.fr/](http://handbrake.fr).\
    \ Once the download has completed and you have been through the pretty straightforward\n\
    \ninstallation process, you can launch the program. The file selector should appear\
    \ and let you choose a media to convert from your file system. If this didn’t\
    \ happen, just click the Source button at the top of the window.\n\nWhen the chosen\
    \ movie is loaded, the interface will update (Figure 8–13) with the default output\
    \ parameters depending on presets appearing in the right sidebar (Regular\n\n\
    Normal). You have the possibility to change these to fit your needs. Start by\
    \ choosing the Apple iPhone & iPod Touch profile from the sidebar to filter the\
    \ options available to you and make your configuration easier. This, for instance,\
    \ will disable the B-frames option on the Advanced tab, which is not supported\
    \ by the device.\n\n![](index-276_1.jpg)\n\nCHAPTER 8: Embedding Audio and Video\
    \ Content in Your Web Application\n\nFigure 8–13\\. The HandBrake interface with\
    \ video settings\n\nOn the Video tab (close to the center of the window), you\
    \ can access configuration options for the video stream encoding. By default,\
    \ primacy is given to quality. Hence, the bitrate will be evaluated to obtain\
    \ the best possible quality, which isn’t necessarily the best choice when working\
    \ with web devices in mind. Appropriately, we can set a specific bitrate.\n\n\
    Using QuickTime, the default was 80 Kb/s for the cellular version of our media,\
    \ 1 Mbit/s for a Wi-Fi connected iPhone, and 5 Mbit/s at best quality. We are\
    \ going the aim for these values by selecting the “Average bitrate” option under\
    \ the Quality section.\n\nNOTE: The more important the video dimensions, the higher\
    \ the bitrate should be to keep an optimal quality. Always preview your content\
    \ before beginning the encoding process to check whether the result is what you\
    \ expect. Also keep in mind that the higher the bitrate, the more difficult the\
    \ video will be to view on a cellular network.\n\nNow, we are going to make a\
    \ video with the lowest bitrate (80 Kb/s) and scale the video down to get a satisfactory\
    \ quality. This is done by clicking the Picture Settings button in the toolbar\
    \ (or the Picture tab, if you are not on a Mac) and choosing “none” from the Anamorphic\
    \ combo box in the window that appears (Figure 8–14). Change the width to 176,\
    \ keeping the aspect ratio so that your media isn’t deformed, and close the window.\n\
    \n![](index-277_1.jpg)\n\n![](index-277_2.jpg)\n\nCHAPTER 8: Embedding Audio and\
    \ Video Content in Your Web Application\n\nFigure 8–14\\. The Picture Settings\
    \ window\n\nOn the Video tab again, if it isn’t already so, set Video Codec to\
    \ H.264 (x264) instead of FFmpeg (for MPEG-4 Part 2), and set Framerate to Same\
    \ as Source to keep good\n\nfluidity while playing the media.\n\nThen, on the\
    \ Audio tab, as shown on Figure 8–15, check that the audio codec is set to AAC\
    \ (CoreAudio) if you are on a Mac user or the poorer but only available AAC (faac)\
    \ on other platforms. If you need to, you can explicitly reduce audio quality\
    \ by limiting the sample rate, the bitrate, or both. This could be necessary,\
    \ for instance, if the source bitrate were over 160 Kb/s, the support limit for\
    \ the devices you target.\n\nFigure 8–15\\. Audio settings\n\nYou can now finalize\
    \ the configuration to export for the Web. In the upper area of the window, under\
    \ Output Settings, the format should be set to “MP4 file.” You should also select\
    \ the Web Optimized option to allow progressive download and let the user play\
    \ the video before all data is available.\n\n![](index-278_1.jpg)\n\nCHAPTER 8:\
    \ Embedding Audio and Video Content in Your Web Application\n\nTo check the quality\
    \ of your video before you export it, click the Preview Window button in the main\
    \ window, and in the window that pops up, click Live Preview, as shown on Figure\
    \ 8–16\\. If the result is as expected, click Start to launch the conversion.\n\
    \nFigure 8–16\\. The HandBrake preview window\n\nThis should give you enough all\
    \ the options to create exactly the media formats you need. HandBrake is a powerful\
    \ tool that will also let you create batches and group-encode your media. The\
    \ documentation on the software web site is very rich; you can use it to discover\
    \ the best way to get the exact result you were seeking.\n\nSummary\n\nAs you\
    \ have seen, embedding media content the HTML5 way is both more specific and much\
    \ richer than the earlier possibilities offered to developers. Not only does it\
    \ make your markup more semantic, but it also comes with a full panel of ways\
    \ to interact with your media, and it offers the user a better, deeper, more customizable\
    \ experience.\n\nCombined with the <canvas> tag and its related API and the use\
    \ of SVG, you can create applications that really come to life, giving users the\
    \ impression of immediacy and movement that they are likely to expect on their\
    \ devices.\n\n**9**\n\n ****Chapter**\n\nHandling\n\nTransformations,\n\nAnimations,\
    \ and Special\n\nEffects with CSS\n\nDesktop Safari has long enabled you to make\
    \ advanced visual effects directly from the style sheets, and logically Mobile\
    \ Safari inherits these capabilities. Not only is it possible to apply two- and\
    \ three-dimensional effects to many elements of your pages, but it is now also\
    \ possible to precisely define advanced animations to make your web\n\napplications\
    \ visually more lively and attractive—all of this without using a single line\
    \ of JavaScript or relying on external plug-ins. Again, Flash no longer is a necessity\
    \ when moving away from still pages. These enhancements are available thanks to\
    \ the new\n\nCSS3 specification, and there are some extra treats from WebKit itself,\
    \ such as CSS\n\nmasks.\n\nTransform Your Elements\n\nTransformations have been\
    \ supported since version 2.0 of iOS. Transformations can be applied in a manner\
    \ similar to what we have seen for canvases or SVG elements, using matrices. All\
    \ are available using the transform CSS property, prefixed with -webkit-, though\
    \ this property has been supported for some time now.\n\nThere are four basic\
    \ transformations, namely, rotate(), translate(), scale(), and skew(). Most allow\
    \ several variations, which we will go through in this chapter. You can also define\
    \ your own matrices using the matrix() function.\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nThe transform property takes a list\
    \ of space-separated transformations as a value.\n\nHowever, keep in mind that\
    \ transform rules are not cumulative, meaning that every new rule definition of\
    \ the transform property will clear the previous definition.\n\n.transformation\
    \ {\n\n-webkit-transform: rotate(90deg) scale(2.0) translateX(15px);\n\n}\n\n\
    In the previous code, we already are doing quite a lot. First, we rotate our element\
    \ clockwise by 90 degrees, then we double its dimensions, and finally we move\
    \ it by 15\n\npixels to the right of the x-axis. Note that the x-axis is relative\
    \ to the element position in space, which means that in our example, moving to\
    \ the “right” means moving\n\ndownward.\n\nIn the previous example, transformations\
    \ are not applied one after the other. The rendering engine processes the different\
    \ transformations to apply the resulting matrix.\n\nThis has the advantage of\
    \ being very efficient. Efficiency is also enhanced because the transformations\
    \ are handled on the hardware, which makes an appreciable difference compared\
    \ to canvases or SVG, which can be slower on the iPhone when several\n\nelements\
    \ are drawn.\n\nNOTE: All style rules affecting the transformed elements are also\
    \ modified by the transformation.\n\nTherefore, drop shadows combined with a rotation\
    \ will show relative to the element they are attached to, instead of being coherent\
    \ with surrounding elements. This is different from the behavior of canvases.\n\
    \nAlso, note that, like elements with a position set to relative or absolute,\
    \ elements to which a transform has been applied do not affect the flow of the\
    \ document.\n\nTransformations are applied in place.\n\nThere are differences,\
    \ however, regarding the overflow value of the parent element. As with relatively\
    \ positioned elements, transformed elements will not show beyond the boundaries\
    \ of a parent with an overflow set to hidden; however, as with absolutely positioned\
    \ elements, a block that has been transformed will not cause scrollbars if the\
    \ overflow value of the parent is set to auto. Finally, transformations cannot\
    \ be applied upon inline elements.\n\nChecking Transform Support\n\nTo try transformations\
    \ only in browsers that support them, you can rely on a media query to target\
    \ them using the following code:\n\n@media all and (-webkit-transform-2d) { ...\
    \ }\n\nThis will allow you to build fallback behaviors directly from your style\
    \ sheets, without resorting to JavaScript.\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nApplying Rotations\n\nRotations\
    \ are defined clockwise using the rotate() function. Because we are working in\
    \ a two-dimensional area, the function takes only one parameter, an angle in degrees\
    \ (denoted deg), that is applied from the center of the element by default.\n\n\
    NOTE: Keep in mind that block elements take all the available width unless you\
    \ specify a width value. Therefore, the center of your element may well be the\
    \ center of the screen, and you may wonder, after your rotation, where the content\
    \ of your block has disappeared to. One solution to this is to change the display\
    \ value of your block to inline-block, because it will then adapt to the width\
    \ of what it contains.\n\nUsing this function, you can draw text vertically or\
    \ diagonally, a technique often used with images, either to conserve screen real\
    \ estate or to create a more attractive design.\n\n<style>\n\nul {\n\nbackground:\
    \ lightgrey;\n\nheight: 44px;\n\nfont: bold 12px/2.5 sans-serif;\n\nmargin: 0;\n\
    \npadding: 0;\n\nlist-style: none;\n\nborder: solid 1px black;\n\n}\n\nli {\n\n\
    -webkit-transform: rotate(-45deg);\n\nwidth: 100px;\n\nbackground: white;\n\n\
    display: inline-block;\n\nmargin: 0 -65px 0 10px;\n\ntext-indent: 10px;\n\nborder:\
    \ black 1px solid;\n\n}\n\ndiv {\n\noverflow: hidden;\n\npadding-bottom: 30px;\n\
    \n}\n\n</style>\n\n<div>\n\n<ul>\n\n<li>Home</li>\n\n<li>Tools</li>\n\n<li>Contact</li>\n\
    \n</ul>\n\n</div>\n\n![](index-282_1.png)\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nThe previous code wil result in\
    \ the layout shown in Figure 9–1\\. Once the rotation is applied, the page flow\
    \ remains unchanged, and the tabs are too far from one another.\n\nThis is why\
    \ we add a negative margin to each list item.\n\nFigure 9–1\\. Tabs are tipped\
    \ by 45 degrees\n\nSuch abilities can make your developing process easier and\
    \ your web applications more efficient in terms of weight. For instance, you can\
    \ now obtain the effect seen in the Photos application of the iPad without resorting\
    \ to various images displaying different orientations.\n\nTranslating Element\
    \ Coordinates\n\nThe translate() function al ows you to reposition elements relatively\
    \ to their physical position in the page without affecting the layout. It takes\
    \ the x and y offset values for the translation as parameters, although the specification\
    \ also provides the shortened functions translateX() and translateY() to work\
    \ with only one coordinate.\n\nThe previous example could therefore be easily\
    \ enhanced to bring visual feedback to the user, by moving our tabs on mouse hovering,\
    \ with the fol owing rule:\n\nli:hover {\n\n-webkit-transform: rotate(-45deg)\
    \ translateX(-10px);\n\n}\n\nThis already lets you achieve quite a few visual\
    \ effects. Nonetheless, translations (and more general y transformations), as\
    \ we wil see, are of much greater interest combined Download from Wow! eBook <www.wowebook.com>\n\
    \nwith transitions, which wil let you animate elements over time using only CSS.\n\
    \nScaling Page Contents\n\nThe scale() function works in a way similar to translate(),\
    \ and the shortened functions scaleX() and scaleY() are also available. scale()\
    \ takes two scaling coefficients as parameters to apply on the x- and y-axes.\
    \ If you specify only one value, it wil be used for both parameters. As with al\
    \ transformation functions, the origin for the\n\ntransformation is the middle\
    \ of the element.\n\nAs when using the CSS zoom property, al styles are scaled,\
    \ which means the rendered quality wil remain even with extreme values. One asset\
    \ of the scale() function over the zoom property is that you have control over\
    \ both axes; therefore, you can stretch elements one way only, as shown with the\
    \ text in Figure 9–2\\. Yet, for images, you wil notice that the limitations are\
    \ the same as when forcing the size of an image using CSS\n\nor the width and\
    \ height attributes on the <img> tag. The bigger the difference from the original\
    \ image size, the lesser the displayed quality.\n\n![](index-283_1.png)\n\n![](index-283_2.jpg)\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nFigure 9–2\\. Quality isn't affected as the coefficient changes\n\nDistorting\
    \ Elements\n\nThe specification will let you apply a distortion matrix to your\
    \ elements using the skew() function. The parameters to this function are angles\
    \ by which the transformation should be applied (Figure 9–3).\n\n<style>\n\ndiv\
    \ {\n\nwidth: 320px;\n\nborder: 5px solid black;\n\npadding: 5px;\n\nfont: bold\
    \ 15px helvetica;\n\ntext-align: center;\n\n**-webkit-transform: skewX(-30deg);**\n\
    \n}\n\n</style>\n\n<div>Some text content.</div>\n\nFigure 9–3\\. A -30 degree\
    \ skew operation along the x-axis\n\nAs with translate() and scale(), you have\
    \ two shortened functions, skewX() and\n\nskewY(), to build one-way transformations.\n\
    \nCustom Transformations with Matrices\n\nInstead of chaining predefined transformations\
    \ to achieve a goal, the specification will also let you define a complete transformation\
    \ matrix using the matrix() function. This can be useful to make your code smaller\
    \ or to create your own custom transformations.\n\nThe matrix() function takes\
    \ six parameters, which are used in the following matrix: All options available\
    \ to you can be combined to give you full control over the effects you want to\
    \ create with the transform rule. This lets you define a full set of transformations\
    \ in\n\n![](index-284_1.png)\n\nCHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\na single declaration, reducing file sizes for\
    \ styles but also the readability of the whole code. This corresponds to what\
    \ the layout engine computes before applying the\n\ntransformation. We will see\
    \ more about using matrices for transformations later in this chapter, with the\
    \ JavaScript CSSMatrix object.\n\nThe Origin of the Transformation\n\nAs stated\
    \ earlier, the default origin for transformations is the center of the transformed\
    \ element. This can be modified using the transform-origin property (Figure 9–4).\n\
    \n<style>\n\n.box {\n\nwidth: 100px;\n\nheight: 100px;\n\nbackground-color: black;\n\
    \nfloat: left;\n\n}\n\n.box + .box {\n\nbackground-color: gray;\n\n-webkit-transform:\
    \ rotate(-45deg);\n\n**-webkit-transform-origin: 50% 50%;**\n\n}\n\n</style>\n\
    \n<div class=\"box\"></div>\n\nFigure 9–4\\. The same rotation based on different\
    \ *transform-origin* values\n\nThis property can take all the usual position keywords\
    \ as parameters, as well as any CSS numerical value (px, em...), as used with\
    \ the background-position rule, for instance.\n\nWorking in a Three-Dimensional\
    \ Environment\n\nNot only does Mobile Safari offer the possibility to handle two-dimensional\n\
    \ntransformations, but it also implements features from the CSS specification\
    \ to create three-dimensional effects. This makes it possible to render elements\
    \ on the x-, y-, and CHAPTER 9: Handling Transformations, Animations, and Special\
    \ Effects with CSS\n\nz-axes. The specification also offers new properties that\
    \ will let you define the perspective level, as well as how to handle the back\
    \ face of your elements.\n\nNevertheless, be conscious that unlike applying changes\
    \ to the x- and y-axes, styles won’t be scaled for transformations upon the z-axis,\
    \ and quality will dwindle as the factor for the transformation changes.\n\nAs\
    \ with 2D transformations, you can target only those browsers with support for\
    \ the features using the -webkit-transform-3d condition in a media query.\n\n\
    New Transform Functions\n\nThe specification extends the 2D Transforms module\
    \ by adding new functions to handle the z-axis. New variants of the two-dimensional\
    \ functions, ending with Z() and 3d(), are now available. Because rotations can\
    \ now be executed in full space, the new rotateX(), rotateY(), rotateZ(), and\
    \ rotate3d() are also available to you.\n\nAll functions for 3D use a 4x4 homogeneous\
    \ matrix that will let you work in the three-dimensional space and apply perspective\
    \ projection. The matrix3d() function thus takes 16 values, in column-major order\
    \ (reading the matrix members from top to bottom and left to right), as represented\
    \ here:\n\nConsidering the previous matrix, the following definitions are equivalent:\n\
    \nmatrix(a, b, c, d, e, f)\n\nmatrix3d(a, b, 0, 0, c, d, 0, 0, 1, 0, e, f, 0,\
    \ 1)\n\nNOTE: Again, you don’t have to fully understand the matrix in order to\
    \ use it. The CSSMatrix will be there to help. The most useful information to\
    \ be extracted from the matrix will be the m41\n\nand m42 members, giving the\
    \ computed x and y positions of the element.\n\nHowever, using 3D alternatives\
    \ will have no notable effect as long as the perspective level is not specified,\
    \ because no projection will be observable. A rotation on the y-axis, for instance,\
    \ would compress the element only horizontally, without projecting it.\n\nSetting\
    \ the Perspective\n\nPerspective can be rendered using either of two processes:\
    \ the perspective() function, which you can use within the transform property\
    \ to modify one element type, or the perspective property, which you can use to\
    \ change the perspective for the transformed 264\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nchildren of the element to which\
    \ the property is attached. Both take a positive or null value, with no explicit\
    \ unit.\n\n/* Element level */\n\n.perspective {\n\n-webkit-transform: perspective(500)\
    \ rotateY(45deg);\n\n}\n\n/* Children level */\n\n.perspective {\n\n-webkit-perspective:\
    \ 500;\n\n}\n\n.child {\n\n-webkit-transform: rotateY(45deg);\n\n}\n\nThe great\
    \ asset of this method is that all children are rendered within a uniform 3D\n\
    \nenvironment, which will allow you to create animations with rich and realistic\
    \ depth effects.\n\nTo estimate values for the perspective property, you should\
    \ consider it as the distance between the observer and an element on the z-axis.\
    \ An element with its z position set to 0 will show in its normal size, whereas\
    \ an element with a position set to half the distance will be twice as big.\n\n\
    /* The element will look twice as big */\n\n.perspective {\n\n-webkit-transform:\
    \ perspective(1000) translateZ(500px);\n\n}\n\nNOTE: Keep in mind that translations\
    \ are applied relative to the plane of the element. Therefore, with a 90-degree\
    \ rotation on the y-axis, the translation will apply on the perceived x-axis instead\
    \ of the z one.\n\nAs the observer gets closer, distances grow smaller, vanishing\
    \ points get closer to one another, and parallel lines head apart, creating an\
    \ extreme perspective effect (as shown in Figure 9–5). Hence, the smaller the\
    \ value, the more stretched the element will be on the z-axis; the bigger the\
    \ value, the lesser perceivable the perspective effect will be.\n\nGenerally speaking,\
    \ the value for a perspective should span between 500 and 1000.\n\n![](index-287_1.png)\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nFigure 9–5\\. A 100x100-pixel element with a perspective value set successively\
    \ to 125, 250, and 1000\n\nThe position of the vanishing point defaults to the\
    \ center of the element. This can be changed with the perspective-origin (prefixed\
    \ with -webkit-). It can take three values indicating the position of the point\
    \ in a three-dimensional environment—the x point first, then y, and finally z.\
    \ This means you can also change the distance, changing only the value for z and\
    \ keeping the perspective value.\n\nPreserving the 3D Aspect\n\nWhen an element\
    \ is rendered in perspective within its parent, it is actually drawn to the screen\
    \ to give the impression of perspective. However, if a transformation is applied\
    \ to the parent in the 3D environment, the child elements will be flattened in\
    \ the plane of their parent regardless of their own position in space. Of course,\
    \ it would be preferable that each element keep their depth so that everything\
    \ is coherently rendered within a 3D\n\nspace using the same perspective. The\
    \ following code shows how to achieve that:\n\n<style>\n\ndiv { border: 5px solid\
    \ black; }\n\n.perspective {\n\nborder: 0;\n\n-webkit-perspective: 150;\n\n}\n\
    \n.parent {\n\nmargin: 0 auto;\n\nwidth: 100px;\n\nheight: 100px;\n\npadding:\
    \ 10px;\n\n-webkit-transform: rotateY(60deg);\n\n-webkit-transform-style: preserve-3d;\n\
    \n}\n\n.child {\n\nheight: 100%;\n\n-webkit-box-sizing: border-box;\n\n-webkit-transform:\
    \ translateZ(-50px) rotateX(45deg);\n\n}\n\n![](index-288_1.png)\n\n![](index-288_2.png)\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \n</style>\n\n<div class=\"perspective\">\n\n<div class=\"parent\">\n\n<div class=\"\
    child\"></div>\n\n</div>\n\n</div>\n\nAs shown in the Figure 9–6, using the default\
    \ value for the transform-style property, flat, elements will not be projected\
    \ “outside” their parents. The result will be similar to applying a rotation to\
    \ an element in two dimensions, as with an image. The preserve-3d value allows\
    \ you to maintain the depth of each element, which will let you create very realistic\
    \ effects, especially with CSS animations, that we will soon be going through.\n\
    \nFigure 9–6\\. The second illustration uses the flat value for the *transform-style*\
    \ property; for the third, the value is set to *preserve-3d*\n\nBack Face Visibility\n\
    \nIn the 3D space, an element has two faces, somewhat like a transparent card.\
    \ The side that initially shows is the classic HTML display. When rotating the\
    \ element by 180\n\ndegrees around the y-axis, the other side logically is the\
    \ same view, just reversed, as shown in Figure 9–7\\.\n\n **Figure 9–7\\. The\
    \ initial state of the element, a 180-degree rotation, and the resulting state\
    \ CHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nDuring an animation, when two elements are placed back to back, if both elements\
    \ are opaque, normally no inconsistency should show, because pixels will overlap\
    \ without revealing what is behind the element; however, because both elements\
    \ use the same space, the rendering isn’t what would be expected, and in most\
    \ cases both elements are alternatively swapped in a disorderly manner.\n\n<style>\n\
    \n.parent {\n\nwidth: 110px;\n\nmargin: 0 auto;\n\n-webkit-perspective: 1000;\n\
    \n}\n\n.parent div {\n\nwidth: 100%;\n\nheight: 150px;\n\nline-height: 150px;\n\
    \ntext-align: center;\n\nposition: absolute;\n\nfloat: left;\n\ncolor: white;\n\
    \nbackground: black;\n\n-webkit-border-radius: 8px;\n\n-webkit-transition: -webkit-transform\
    \ 1s linear;\n\n}\n\n.face { -webkit-transform: rotateY(0deg); }\n\n.back { -webkit-transform:\
    \ rotateY(-180deg); }\n\n.parent:hover .face { -webkit-transform: rotateY(180deg);\
    \ }\n\n.parent:hover .back { -webkit-transform: rotateY(0deg); }\n\n</style>\n\
    \n<div class=\"parent\">\n\n<div class=\"face\">FACE</div>\n\n<div class=\"back\"\
    >BACK</div>\n\n</div>\n\nIn our example, we create two elements back to back.\
    \ The second one is rotated by 180\n\ndegrees so that its front is visible after\
    \ the transition. Now, if you point your mouse or finger on the element, the card\
    \ will turn around, but the rendering will be deceptive. You could solve this\
    \ by moving both elements enough along the z-axis so that they no longer occupy\
    \ the same space, but you would also have to modify the original position of the\
    \ transformation, making the handling of positions uselessly heavier.\n\nTo address\
    \ this issue, you should use the backface-visibility property, which can be set\
    \ either to visible (by default) or to hidden.\n\n.parent div {\n\n...\n\n**-webkit-backface-visibility:\
    \ hidden;**\n\n}\n\nCHAPTER 9: Handling Transformations, Animations, and Special\
    \ Effects with CSS\n\nThis will force the engine to hide the backside of the element\
    \ during the rotation. It will simply disappear, leaving a transparent area that\
    \ will solve the approximate positioning problem. This new property, together\
    \ with those presented earlier, lets you finely control your elements within the\
    \ 3D plane.\n\nCombining Styles with JavaScript\n\nLike all CSS properties, transformations\
    \ can be read and modified using JavaScript. This can be used to build interactivity\
    \ with the user or to create animations.\n\nAccessing Current Styles\n\nTo access\
    \ and apply transformations via JavaScript, you should use the\n\nwebkitTransform\
    \ property of the CSSStyleDeclaration object, attached to any relevant element.\n\
    \nvar element = document.getElementById(\"myElement\");\n\nelement.style.webkitTransform\
    \ = \"translateX(100px)\";\n\nQuite naturally, as with any CSS declaration, any\
    \ modification overwrites any previous ones. If you need to apply a transformation\
    \ in addition to its current state, you will have to first read its computed style\
    \ using the getComputedStyle() method of the DOMWindow object. This returns a\
    \ CSSStyleDeclaration object that will let you access the styles in use (through\
    \ a style sheet or a script), as with the style property.\n\nvar iter = 0;\n\n\
    var timerID = window.setInterval(function() {\n\nvar current = window.getComputedStyle(element);\n\
    \nelement.style.webkitTransform = current.webkitTransform + \" translateY(10px)\"\
    ; if(iter++ == 5) {\n\nwindow.clearInterval(timerID);\n\n}\n\n}, 200);\n\nIn this\
    \ piece of code, we move our element downward by 10 pixels every 200\n\nmilliseconds.\
    \ The movement is relative to the previous position, because we add our new transformation\
    \ to the current state, which takes previous transformations into account. Looking\
    \ at the value returned by current.webkitTransform, you will note that it is always\
    \ a unique matrix() function (or matrix3d(), if the element has been\n\ntransformed\
    \ in a 3D environment) and not a list of successive function calls; as\n\nexplained\
    \ earlier, the engine always computes one matrix that synthesizes all matrices\
    \ that should be applied.\n\nA Native Object to Compute Matrices\n\nThe process\
    \ used in our previous example yields the expected result but isn’t very flexible,\
    \ nor is it optimal because it forces you to handle potentially long strings that\
    \ can CHAPTER 9: Handling Transformations, Animations, and Special Effects with\
    \ CSS\n\nbe cumbersome if many parameters are in line. The specification for transformations\
    \ brings a new object to remedy this: CSSMatrix. It has been supported since version\
    \ iOS\n\n2.0 and allows you to easily calculate matrices. Here is how it can be\
    \ used:\n\nvar timerID = window.setInterval(function() {\n\nvar current = window.getComputedStyle(element);\n\
    \n**var matrix = new WebKitCSSMatrix(current.webkitTransform);**\n\n**element.style.webkitTransform\
    \ = matrix.translate(0, 10);**\n\nif(iter++ == 5) {\n\nwindow.clearInterval(timerID);\n\
    \n}\n\n}, 200);\n\nAs in our example, this object takes the previous matrix as\
    \ a parameter. To the\n\nconstructor, you can pass a string containing a matrix()\
    \ or matrix3d() function or another CSSMatrix object. If no parameter is specified,\
    \ a new empty matrix will be returned. Table 9–1 shows the different methods available\
    \ to interact with the matrix.\n\nTable 9–1\\. Methods Applicable to the *CSSMatrix*\
    \ Object\n\n**Method Description**\n\n*matrix*.setMatrixValue(newMatrix)\n\nModifies\
    \ the matrix using the one passed as a\n\nparameter.\n\n*matrix*.multiply(matrix)\n\
    \nReturns a new CSSMatrix object resulting from the\n\nmultiplication of the current\
    \ matrix and the one\n\npassed as a parameter.\n\n*matrix*.inverse()\n\nReturns\
    \ a new CSSMatrix object that is the inverse\n\nof the matrix to which the method\
    \ is applied.\n\n*matrix*.translate(x, y, z)\n\nReturns a new CSSMatrix object\
    \ resulting from the\n\nmultiplication of the matrix by the translation matrix\n\
    \nusing the values passed as parameters. The z\n\nparameter can be omitted; it\
    \ will default to 0.\n\n*matrix*.scale(x, y, z)\n\nReturns a new CSSMatrix object\
    \ resulting from the\n\nmultiplication of the matrix by the scale matrix,\n\n\
    using the values passed as parameters. z can be\n\nomitted and will default to\
    \ 1\\. Moreover, y can be\n\nomitted also, in which case it will take the same\n\
    \nvalue as x.\n\n*matrix*.rotate(x, y, z)\n\nReturns a new CSSMatrix object resulting\
    \ from the\n\nmultiplication of the matrix by the rotate matrix,\n\nusing the\
    \ values passed as parameters. Rotations\n\nare applied one at a time in the same\
    \ order as the\n\nparameters. Angles are set in degrees. If y and z\n\naren’t\
    \ defined, in order to be compatible with the\n\n2D version of the CSSMatrix object,\
    \ the call will be\n\nconsidered to be (0, 0, z).\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\n**Method**\n\n**Description**\n\n\
    *matrix*.rotateAxisAngle(x, y, z, angle)\n\nThis method al ows you to define a\
    \ new axis and\n\noperate a rotation around it. Like the previous\n\nmethods,\
    \ this returns a new matrix.\n\n*matrix*.toString()\n\nReturns the matrix as a\
    \ string holding a matrix()\n\nor matrix3d() function, as defined for the\n\n\
    transform CSS property.\n\nOnly the first method modifies the CSSMatrix object.\
    \ The others just return a new CSSMatrix holding the resulting matrix. Surprisingly,\
    \ there is no skew() method, so you wil have to create your own matrix. The fol\
    \ owing is an example of how to do this:\n\n/* Define a skew(45deg, 30deg) matrix\
    \ */\n\nvar matrix = new WebKitCSSMatrix();\n\nmatrix.b = Math.tan(30 * Math.PI\
    \ / 180);\n\nmatrix.c = Math.tan(45 * Math.PI / 180);\n\nEach value for the matrix\
    \ is accessible through the pertaining properties, named, as shown previously,\
    \ from a to f (supported since version 3.0 of the OS) for the 2D version and from\
    \ m11 to m44 for the 3D version. This means six values for the two-dimensional\
    \ matrix and sixteen for the three-dimensional one. Note that, of course, you\
    \ could use a similar function to calculate matrices within canvases, with the\
    \ transform() and\n\nsetTransformation() methods of the CanvasRenderingContext2D\
    \ object. This can be\n\ndone as fol ows:\n\ncontext.translate(50, 50);\n\ncontext.rotate(Math.PI\
    \ * 0.5);\n\nThat is equivalent to the fol owing:\n\nvar matrix = new WebKitCSSMatrix().translate(50,\
    \ 50).rotate(45);\n\ncontext.transform(matrix.a, matrix.b, matrix.c, matrix.d,\
    \ matrix.e, matrix.f);\n\nDownload from Wow! eBook <www.wowebook.com>\n\nAs you\
    \ can see, the specification of angles is different in canvases than it is in\
    \ the CSSMatrix object. However, reading properties from the CSSMatrix object,\
    \ values\n\nrepresenting angles wil be converted to radians. This object wil also\
    \ let you know where an element is situated at some given moment, for instance\
    \ reading the current matrix during an animation, as with transitions.\n\nTransitions\n\
    \nWe have seen how it is possible to move an element within the page using a timer\
    \ and the CSSMatrix object, which was used to read the current state of the matrix\
    \ applied to an element. Nevertheless, you can define such transitions without\
    \ resorting to\n\nJavaScript, using CSS rules directly.\n\nCHAPTER 9: Handling\
    \ Transformations, Animations, and Special Effects with CSS\n\nWARNING: To obtain\
    \ better rendering, the engine rasterizes the elements so animations can be handled\
    \ directly by the hardware. This does not mean you can do anything with CSS without\
    \ worrying about performance. You could easily end up with jumps in your animations,\
    \ especially on the iPhone and iPod touch, if your style sheets get too complex.\
    \ You will often find that too much relatively or absolutely positioned elements\
    \ will make the task for the rendering engine harder, which will result in poorer\
    \ quality. Always check for useless styles, and try to find the most efficient\
    \ solution to your goal.\n\nMany CSS properties can be animated: colors and gradients\
    \ (as long as they keep the same count of color stops), dimensions, font sizes,\
    \ and others. You should be able to interact in this way with most style rules.\
    \ Note that, because opacity and\n\ntransformations are handled on the hardware\
    \ level, performance will be better for these than for other styles. Most of the\
    \ transformations explained earlier gain much richness with transitions.\n\nThe\
    \ transition CSS Property\n\nThe principle of CSS transitions is to interpolate\
    \ an initial CSS value to another, which is simply done using the transition property;\
    \ it should be used as follows:\n\ntransition: < *property*> < *duration*> < *timing-function*>\
    \ < *delay*> The transition property is a shorthand to a series of properties\
    \ relative to transitions.\n\nThese two declarations hence are equivalent:\n\n\
    /* Shorthand */\n\n-webkit-transition: opacity 0.5s linear 200ms;\n\n/* Exploded\
    \ version */\n\n-webkit-transition-property: opacity;\n\n-webkit-transition-duration:\
    \ 0.5s;\n\n-webkit-transition-timing-function: linear;\n\n-webkit-transition-delay:\
    \ 200ms;\n\nYou can also define several transitions in a single declaration (one\
    \ use of the transition property) by separating your transitions by comma. The\
    \ transition-property defaults to all, meaning that all properties supporting\
    \ transitions will be affected.\n\nInitiating a Transition\n\nThe transition begins\
    \ at the very moment the value of the property is modified, yet after any delay\
    \ set for the transition-delay property. The modification must occur outside the\
    \ initial definition of the value, which means you can trigger a transition on\
    \ some action by the user.\n\n<style>\n\n.box {\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nwidth:100px;\n\nheight:100px;\n\n\
    background-color: black;\n\n-webkit-transition-property: -webkit-transform;\n\n\
    -webkit-transition-duration: 2s;\n\n}\n\n.box:hover {\n\n-webkit-transform: translateX(100px);\n\
    \n}\n\n</style>\n\n<div class=\"box\"></div>\n\nNOTE: On iOS 3.x, the hardware\
    \ acceleration is buggy with some translations, resulting in a staggered rendering.\
    \ To animate only these properties, you should use the translate3d() method to\
    \ obtain fluid transitions.\n\nIn our example, the user pointing his finger on\
    \ the <div> makes the black square move by 100 pixels to the right over a two-second\
    \ time span. When the user leaves the square area, the value of the property is\
    \ restored, and the animation is reversed, even if its first movement isn’t complete.\n\
    \nHowever, this means that, if the same transition configuration was used, the\
    \ animation would be asymmetric, because the starting point would not match the\
    \ previously\n\nexpected target point. This of course would seem unnatural to\
    \ users, who will expect the same reversed movement. This issue shows when using\
    \ nonlinear timing functions.\n\nThe specification describes a specific behavior\
    \ for such cases, which will maintain consistency when reversing transitions.\
    \ The rendering engine will compute the curve of the timing function and search\
    \ the stage it should be at the current keyframe. The reverse animation will then\
    \ be started from that point.\n\nTiming Function Curve\n\nAs suggested earlier,\
    \ the animation curve isn’t always linear—and in most cases, it actually isn’t\
    \ linear at all. Mobile Safari supports several keywords to be used with the transform-timing-function\
    \ property, which allows you to define the most common\n\nanimation curves, as\
    \ shown in Table 9–2 and in Figure 9–8.\n\n![](index-295_1.png)\n\nCHAPTER 9:\
    \ Handling Transformations, Animations, and Special Effects with CSS\n\nTable\
    \ 9–2\\. Supported *transform-timing-function* Keywords and Their Related *cubic-bezier()*\
    \ Definitions **Keyword Configuration**\n\nease (default)\n\ncubic-bezier(0.25,\
    \ 0.1, 0.25, 1.0)\n\nlinear\n\ncubic-bezier(0.0, 0.0, 1.0, 1.0)\n\nease-in\n\n\
    cubic-bezier(0.42, 0, 1.0, 1.0)\n\nease-out\n\ncubic-bezier(0.0, 0.0, 0.58, 1.0)\n\
    \nease-in-our\n\ncubic-bezier(0.42, 0.0, 0.58, 1.0)\n\nAll are based on cubic\
    \ Bézier curves that can be defined using the cubic-bezier() function. As parameters,\
    \ this function takes coordinates for the control points P1 and P2\n\nof the curves,\
    \ spanning from 0.0 to 1.0\\. The origin and destination points (P0 and P3) are\
    \ considered to be positioned at (0,0) and (1,1).\n\nFigure 9–8\\. The curves\
    \ relative to the *transform-timing-function* keywords and a custom curve definition\
    \ The idea is to define a progress curve for the animation. For instance, using\
    \ the last curve from Figure 9–8, the animation will first progress slowly and\
    \ will temporarily speed up, before taking the same pace as when beginning.\n\n\
    CHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nTelling When the Transition Is Completed\n\nIn the use of transitions and animations,\
    \ you will often need to know when they have been completed. Rather than using\
    \ a timer set to the time span of the transition, you can rely on the transitionend\
    \ event.\n\nvar box = document.getElementsByClassName(\"box\")[0];\n\nbox.addEventListener(\"\
    webkitTransitionEnd\", function(event) {\n\nalert(\"The box reached the destination\
    \ point after \" + event.elapsedTime + \"s.\");\n\n}, false);\n\nThe event is\
    \ triggered as soon as the transition is complete, even when the transition is\
    \ reversed. Of course, this is far more accurate than a timer, because it will\
    \ always be synchronous with the transition. Moreover, because the handler is\
    \ executed in the context of the object that triggers the event, you can access\
    \ this directly using the event.target property or the keyword this, without previously\
    \ saving them.\n\nWARNING: In Mobile Safari, the name of the event is case sensitive,\
    \ meaning you should be careful to use the webkitTransitionEnd event, with the\
    \ appropriate uppercase letters, for the event listener to work.\n\nThe event\
    \ has the TransitionEvent type and holds two extra properties, elapsedTime and\
    \ propertyName, that will let you know the time taken by the transition (in seconds,\
    \ regardless of the transition-delay property) and the property associated to\
    \ the\n\ntransition.\n\nGetting Ready for a Cover Flow–Like Experience\n\nNow\
    \ that you have an overall idea of how transitions work and how to use them, let’s\
    \ bring all of this together in an example that would have been a CSS dream not\
    \ so long ago. We are going to create a Cover Flow effect, familiar to anyone\
    \ who has used\n\niTunes, the Mac OS X Finder, an iPod, or the iPad App Store\
    \ (Figure 9–9).\n\n![](index-297_1.jpg)\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nFigure 9–9\\. A Cover Flow from\
    \ the French iPad App Store\n\nNote that this code will not work well on older\
    \ WebKit versions like Desktop Safari 4 or an earlier version of Mobile Safari\
    \ because of a bug in the transition implementation.\n\nThe Main Document\n\n\
    First let’s get our HTML file together. We will need the following code:\n\n<html>\n\
    \n<head>\n\n<title>Cover Flow Demo</title>\n\n<meta name=\"viewport\" content=\"\
    initial-scale=1.0;\n\nmaximum-scale=1.0; user-scalable=no\">\n\n<link rel=\"stylesheet\"\
    \ href=\"styles/coverflow.css\">\n\n<script src=\"scripts/coverflow.js\"></script>\n\
    \n</head>\n\n<body>\n\n<div id=\"coverflow\">\n\n<div id=\"left\"></div>\n\n<div\
    \ id=\"right\"></div>\n\n</div>\n\nCHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\n</body>\n\n</html>\n\nNext come the styles relative\
    \ to this document:\n\nbody { background-color: black; }\n\n#coverflow {\n\nposition:\
    \ relative;\n\nheight: 320px;\n\nbackground-color: #333;\n\nwhite-space: nowrap;\n\
    \noverflow: hidden;\n\n-webkit-border-radius: 32px;\n\nborder: solid 3px white;\n\
    \n-webkit-perspective: 1000;\n\n}\n\n#left {\n\nwidth: 50%;\n\nheight: 100%;\n\
    \nfloat: left;\n\n}\n\n#right {\n\nwidth: 50%;\n\nheight: 100%;\n\nfloat: right;\n\
    \n}\n\nWe associate an overflow property set to hidden and a white-space rule\
    \ set to nowrap so that our covers, as they move, do not change position, spanning\
    \ over several lines or beyond the #coverflow container. For now, the document\
    \ holds only the main\n\ncontainers, that is, the #coverflow parent defining the\
    \ perspective and the left and right areas that will hold the actual covers. To\
    \ add covers, we will use a script to create elements and set colors for them\
    \ so that they are recognizable during the animations.\n\nCreate a new *coverflow.js*\
    \ file, and add the following to it:\n\nfunction init() {\n\nvar m = 8; // Covers\
    \ count\n\nvar s = 360 / m; // Color step\n\n/* Add left and right covers */\n\
    \nvar o = document.getElementById(\"left\");\n\ncreateCovers(o, m, s);\n\no =\
    \ document.getElementById(\"right\");\n\ncreateCovers(o, m, s);\n\n/* Add current\
    \ cover */\n\no = document.getElementById(\"coverflow\");\n\ncreateCovers(o, 1,\
    \ 0);\n\no.lastChild.className =\"current\";\n\n}\n\nfunction createCovers(o,\
    \ max, step) {\n\nCHAPTER 9: Handling Transformations, Animations, and Special\
    \ Effects with CSS\n\nvar color = step;\n\nfor (var n = 0; n < max; n++, color\
    \ += step) {\n\nvar span = document.createElement(\"span\");\n\nspan.style.backgroundColor\
    \ = \"hsl(\" + (color) + \",100%, 50%)\"; o.appendChild(span);\n\n}\n\n}\n\nThe\
    \ number of covers can be modified by changing the value of m in the init() function.\n\
    \nThis will let you have one eye on performance issues, because each cover will\
    \ be\n\nanimated individually.\n\nNow, the following styles will be used to correctly\
    \ place the covers within their container:\n\n#coverflow span {\n\nwidth: 160px;\n\
    \nheight: 240px;\n\nborder: solid 5px rgba(0, 0, 0, 0.25);\n\nmargin-top: 40px;\n\
    \n-webkit-box-sizing: border-box;\n\n-webkit-border-radius: 16px;\n\n}\n\n#left\
    \ span {\n\nfloat: right;\n\nmargin-left: -130px; /* 30px between each cover */\n\
    \n-webkit-transform: translate3d(-30px, 0, -80px) rotateY(+60deg);\n\n}\n\n#right\
    \ span {\n\nfloat: left;\n\nmargin-right: -130px;\n\n-webkit-transform: translate3d(+30px,\
    \ 0, -80px) rotateY(-60deg);\n\n}\n\n#coverflow .current {\n\nposition: absolute;\n\
    \nleft: 50%;\n\ntop: 50%;\n\nmargin-left: -80px;\n\nmargin-top: -120px;\n\n}\n\
    \nThis transforms the covers so that they are displayed with a 60-degree rotation\
    \ and moves them backward in a three-dimensional plane to make them further back\
    \ than the focused cover. Because we are working in a 3D environment, we cannot\
