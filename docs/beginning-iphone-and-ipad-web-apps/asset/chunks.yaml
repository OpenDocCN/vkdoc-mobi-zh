- fmt: "# Lists\n\nLooking to present data in a clear and straightforward manner,\
    \ you will be using lists quite a lot. Apple recommends using lists for web pages\
    \ and applications that target devices running iOS, and indeed lists have many\
    \ advantages. They allow you to be more concise by cutting the number of complete\
    \ sentences, and they make large amounts of information stand out as clear groups\
    \ of data. In addition, they are similar in form to the default menus of the iOS\
    \ and desktop application menus, so they will be familiar to the user.\n\nBe careful,\
    \ however, not to make lists too long. Although the points presented earlier all\
    \ intersect with good practices we have already written about, lists—even web\
    \ pages—if they become too long, they will force users to pan, possibly missing\
    \ what they were looking for or getting lost in the information. Another serious\
    \ issue with long lists is that they generally make the browser slower, which\
    \ again will frustrate the user. To avoid lists becoming too lengthy, as explained\
    \ previously, you should ask yourself what information is most important and how\
    \ you can categorize it.\n\nBecause lists exist in the iOS GUI, there are existing\
    \ styles you can mimic to achieve an appealing interface for your web applications.\
    \ Three types of list are available, namely, edge-to-edge lists, lists with rounded\
    \ borders, and icon grid lists (see Figure 5–12).\n\n![](index-129_1.jpg)\n\n\
    > **CHAPTER 5: User Experience and Interface Guidelines**\n> \n> Figure 5–12\\\
    . Three different list types in three different applications (Yahoo Finance, Settings,\
    \ and LinkedIn)\n\nIf you follow all the examples in this book and create templates\
    \ from the files and snippets we suggest, you will soon have a solid base that\
    \ you can pick from to build web applications.\n\nThe first list type is especially\
    \ adapted to long lists. It is compact, simple, and readable.\n\n## Basic Edge-to-Edge\
    \ List\n\nIf you’ve started building your project template and template files,\
    \ you can create a new HTML file and add the following code into the `.view` container:\n\
    \n```html\n<div class=\"list-wrapper\">\n  <h2>A</h2>\n  <ul>\n    <li>Apple</li>\n\
    \    <li>Application</li>\n  </ul>\n</div>\n```\n\nNext is the CSS to make your\
    \ basic list look iPhone-like. Append it to the `styles.css` style sheet you have\
    \ already started in the web application template:\n\n```css\n.list-wrapper h2\
    \ {\n  line-height: 1;\n  font-size: 18px;\n  padding: 1px 12px;\n  font-weight:\
    \ bold;\n  text-shadow: rgba(0,0,0,0.5) 0 1px 0;\n  background: left 1px -webkit-gradient(linear,\n\
    \    left top, left bottom,\n    from(rgba(0,0,0,0.18)), color-stop(0.65, transparent))\n\
    \    rgba(178,187,194,0.89);\n  -webkit-box-sizing: border-box;\n  height: 22px;\n\
    \  border-bottom: solid 1px rgba(0,0,0,0.18);\n  overflow: hidden;\n  white-space:\
    \ nowrap;\n  margin: 0;\n  color: #fff;\n}\n\n.list-wrapper ul {\n  padding: 0;\n\
    \  background: #fff;\n  font-size: 20px;\n  line-height: 23px;\n  margin: 0;\n\
    }\n\n.list-wrapper ul li {\n  border-bottom: 1px solid #dfdfdf;\n  padding: 10px;\n\
    }\n```\n\n## Lists with Rounded Borders\n\nThe second list type is very similar\
    \ to the edge-to-edge list type, but it has rounded borders on the first and last\
    \ list items. Therefore, it is better used on not-too-long lists, so the top and\
    \ bottom edges of the list are seen at once. The HTML is very similar to the previous\
    \ markup, though the styles will transfer the padding directly to the links, so\
    \ effects applied to the focused elements take the border radius into account.\
    \ To see what happens, simply put the following code inside a `.group-wrapper`:\n\
    \n```html\n<h2>Group List</h2>\n<ul>\n  <li><a href=\"item1.html\">Item 1</a></li>\n\
    \  <li><a href=\"item2.html\">Item 2</a></li>\n  <li><a href=\"item3.html\">Item\
    \ 3</a></li>\n</ul>\n```\n\nAnd the relevant styles go into the same style sheet:\n\
    \n```css\n.group-wrapper ul {\n  background-color: #fff;\n  -webkit-border-radius:\
    \ 10px;\n  font-size: 17px;\n  line-height: 20px;\n  margin: 9px 0 10px;\n}\n\n\
    .group-wrapper ul li {\n  padding: 11px 9px 12px;\n}\n\n.group-wrapper ul {\n\
    \  font-weight: bold;\n  margin-bottom: 20px;\n  list-style: none;\n  padding:\
    \ 0;\n  border: solid 1px #a9abae;\n}\n\n.group-wrapper ul li:not(:last-child)\
    \ {\n  border-bottom: inherit;\n}\n\n.group-wrapper ul li a {\n  padding: inherit;\n\
    \  color: inherit;\n  text-decoration: inherit;\n  margin: -11px -9px -12px;\n\
    \  display: block;\n}\n\n.group-wrapper ul li:first-child a {\n  -webkit-border-top-right-radius:\
    \ 10px;\n  -webkit-border-top-left-radius: 10px;\n}\n\n.group-wrapper ul li:last-child\
    \ a {\n  -webkit-border-bottom-right-radius: 10px;\n  -webkit-border-bottom-left-radius:\
    \ 10px;\n}\n```\n\n## Icon Grid Display\n\nYour third list alternative, the icon\
    \ grid display, is appropriate when many options have to be presented in a minimal\
    \ area. It allows for an intuitive display that can be used to present options\
    \ to the user. You can also use this display to replace labels in contextual menus,\
    \ as when a user long-presses to use copy-and-paste functionality. Just remember\
    \ to always make tappable areas large enough to be usable.\n\n# Considering UI\
    \ Alternatives\n\nAlong with considerations about usability design, you thoroughly\
    \ rethink actual graphical design for your web applications. You have several\
    \ options here, which are all legitimate. Since there are quite a few orientations\
    \ regarding interface design for mobile devices, it is your choice to which extent\
    \ you will follow these guidelines.\n\n## Mimicking the iOS UI\n\nMimicking the\
    \ native GUI from the device you are targeting is a rather safe bet when developing\
    \ your web applications. Using a look and feel that users already know will speed\
    \ up their navigation experience and favor positive impressions regarding your\
    \ application. You should aim to serve a fluid experience, so making your application\
    \ mimic the overall Apple interface and using well-designed elements provided\
    \ by Apple seems like an obvious idea.\n\nThe main drawback to mimicking the iOS\
    \ is that your application may feel out of place if viewed on another device.\
    \ A webOS or Android user will see your web application just as it could be seen\
    \ on an iPhone—but the surroundings, the built-in functionalities, and even the\
    \ device itself will not be an iPhone.\n\nFinally, you would be right to consider\
    \ that mimicking the iOS UI, even if Apple recommends it, isn’t very personal,\
    \ which could ultimately make your application less memorable than one with similar\
    \ functionality but a more recognizable identity.\n\nWithout actually mimicking\
    \ the native interface, there are times where you should rely on it. iOS has specific\
    \ built-in behaviors regarding form `<select>` elements and pop-up modal windows.\
    \ Moving away from Apple's implementation, these typically would be difficult\
    \ to render in a usable way, especially because it should be clear for users what\
    \ is going to happen when they perform actions on such elements.\n\nThere are\
    \ also times when you will have no choice but to rely on the iPhone UI. If you\
    \ want to use special URL schemes such as `mailto:` or `tel:`, you will be leaving\
    \ the control to the OS again. The same is true when resorting to audio or video\
    \ players, because Mobile Safari doesn’t integrate these functionalities directly\
    \ on the iPhone and iPod touch.\n\n# Building the iPad Experience\n\nThe iPad\
    \ is new to the developing market. Although it shares its GUI with the iPhone\
    \ and iPod touch, because it too works with iOS, you should think your design\
    \ principles over again for this device. The iPad will most probably bring users\
    \ a brand new experience as a device—it is up to you to build a new, relevant\
    \ application experience.\n\nThe screen of the iPad is more or less netbook size,\
    \ and it has a greater resolution than that of the iPhone and iPod touch. However,\
    \ you shouldn’t develop your application with a laptop in mind or simply considering\
    \ the iPad to be a larger iPhone. The functionality the iPad brings is clearly\
    \ different from that of computers and smartphones.\n\n## Not a Laptop, Not an\
    \ iPhone\n\n*Download from Wow! eBook <www.wowebook.com>*"
