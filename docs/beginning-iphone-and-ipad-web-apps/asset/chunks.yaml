    \n■ INTRODUCTION\n\n ****About the Authors**\n\n**Chris Apers** has more than\
    \ 13 years experience in web technologies and\n\nmobile development, including\
    \ the PalmOS, webOS, and iPhone. He is a\n\ntechnical manager and architect at\
    \ Newsweb/Lagardère Active and\n\nparticipates in open source projects such as\
    \ porting development libraries\n\nand software to mobile devices. With the creation\
    \ of the open source\n\nframework WebApp.Net, he provides an easy way to create\
    \ mobile content\n\ntargeting WebKit browsers. For more, visit [www.webapp-net.com\
    \ and](http://www.webapp-net.com)\n\n[www.chrilith.com.](http://www.chrilith.com)\n\
    \n**Daniel Paterson** has a master’s degree in comparative literature, and he\
    \ penned a memoir on integrating literary theory into fictional works, taking\
    \ novels by Umberto Eco, Milan Kundera, and David Lodge as examples. After his\
    \ university years, Daniel entered web development and joined Newsweb/Lagardère\
    \ Active in April 2009. Passionate about the Web as about many other things, he\
    \ enjoys every opportunity to work on interesting projects and to develop his\
    \ skills.\n\nxv\n\n■ ACKNOWLEDGMENTS\n\n ****About the Technical**\n\n**Reviewer**\n\
    \n**Paul Haine** is a client-side developer currently working in London for the\
    \ *Guardian* newspaper.\n\nHe is the author of *HTML Mastery: Semantics, Standards,\
    \ and Styling* (friends of ED, 2006) and runs a personal web site at [www.joeblade.com.](http://www.joeblade.com)\n\
    \nxvi\n\n■ INTRODUCTION\n\n ****Acknowledgments**\n\nWe would like to thank the\
    \ people from Apress, especially Steve Anglin, for giving us the opportunity to\
    \ take part in this project, and Clay Andres, for his greatly helpful participation\
    \ in the early stages of the writing. We also send thanks to our editors, Douglas\
    \ Pundick and Brian MacDonald, for their valuable comments; Paul Haine for his\
    \ close reading and testing of every chapter and example in this book; and Kim\
    \ Wimpsett, for helping us make our explanations more straightforward when they\
    \ became too complicated. Finally, this book probably never would have been published\
    \ without the close following of its evolution by Kelly Moritz and Adam Heath.\n\
    \nThanks also go to those who have helped, in one way or another, to bring this\
    \ book together, among whom are Hans Shumacker, Ivan Mitrovic, Roy Sinclair, Adam\
    \ Dachis, David Ljung Madison, and Kris Merckx. As for those whom we (may) have\
    \ forgotten here, we acknowledge your precious help.\n\nFinally and most importantly,\
    \ our thoughts go to Alice and Aoï who lived with us every day during the past\
    \ months, putting up with us and our changing moods and late nights of work. Without\
    \ their patience and support, this book wouldn’t be.\n\nxvii\n\n■ ACKNOWLEDGMENTS\n\
    \n ****Introduction**\n\nAlthough most iOS development is currently focused on\
    \ native **applications using Apple’s Software Development Kit, this proves less\
    \ and less relevant as the number of different mobile devices and OS versions\
    \ grows. Gathering resources to make web applications that will work cross-platform\
    \ is far more cost-effective than hiring a team to build specific version-applications.**\n\
    \n **In this sense, it is probable that web applications have only just begun\
    \ to fight.\n\nIndeed, **web browser performance and features make possibilities\
    \ regarding user experience and provided services ever greater, and web browsers\
    \ create an exciting field for web developers to play in. With the arrival and\
    \ implementation of new standards, the boundaries between native applications\
    \ and web applications have never been so thin; geolocation and Multi-Touch control,\
    \ for instance, are no longer just a dream. HTML5, on the other side, is not only\
    \ a new version of the markup language; the new specification comes with a full\
    \ range of new APIs that will make you forget heavy use of presentational images\
    \ and let you richly integrate multimedia elements.**\n\n **Because most of these\
    \ new features originate in recognized specifications, they are not only implemented\
    \ in the Mobile Safari layout engine but are also widely available on other mobiles\
    \ devices and desktop browsers.\n\nWeb browsers are everywhere; they’re the widest\
    \ distribution platform ever, available on all platforms and, increasingly, on\
    \ all devices. This makes web development the field where developers can reach\
    \ the widest audience using minimal resources. This may well turn building web\
    \ applications into the new El Dorado in the years to come.\n\nWho This Book Is\
    \ For\n\nThis book is especially fit for developers who have strong experience\
    \ in front-end web development and are looking to turn to mobile development,\
    \ primarily web application development for WebKit-based browsers. Although the\
    \ examples and explanations in this book are meant to work on iPhone, iPad, and\
    \ iPod touch, you should find them quite equally useful for developing for webOS,\
    \ Android, or the browser from the latest BlackBerry devices, as well as for any\
    \ modern desktop browser.\n\nThis book will be useful also to native application\
    \ developers because resorting to the UIWebView from the iOS SDK is often necessary\
    \ to gain more control over the interface of your applications, and getting a\
    \ firm grasp on the latest advances of the technologies presented in this book\
    \ can be of great help.\n\nxviii\n\n■ INTRODUCTION\n\nWhat You Need to Know\n\n\
    This book assumes you already have solid knowledge of the Web and its underlying\
    \ technologies, including a firm grasp of JavaScript development. Not only has\
    \ JavaScript become essential to enhance the user experience in modern **web **applications,\
    \ it is also necessary in order to use the latest APIs brought by HTML5 and other\
    \ World Wide Web Consortium (W3C) or Web Hypertext Application Technology Working\
    \ Group (WHATWG) specifications. To build efficient****\n\n ****applications,\
    \ you will also need to **have a good understanding of object-oriented programming\
    \ and JavaScript-specific related mechanisms.**\n\n **What’s in This Book\n\n\
    This book is divided into three main sections. They will in turn bring you the\
    \ necessary background to build web applications and efficiently develop for mobile\
    \ devices; take you through a number of new exciting features of CSS3, HTML5,\
    \ and Mobile Safari; and get you going with more advanced uses of web standards.\
    \ Here is a short description of each part: **Part I, Getting Started with Web\
    \ App Development:** The first part of this book goes through useful tools to\
    \ develop web applications. Of course, chances are you have your own habits, with\
    \ a fully functional **and ready-to-use development environment. However, digging\
    \ into the specific development tools of WebKit browsers will help you build better\
    \ web**\n\n **applications faster.\n\n**Part II, Web App Design with HTML5 and\
    \ CSS3:** This second part **will let you get into further detail about what a\
    \ web application looks like and the rules that you should be aware of to build\
    \ successful web applications. Following specific guidelines on user interface\
    \ and user experience—they should be your two primary concerns—we will go through\
    \ the latest technologies that will allow you to efficiently meet your style,\
    \ content, and interaction goals.**\n\n ****Part III, Going Further with JavaScript\
    \ and Web Standards:** The final part will take you even further into client-side\
    \ development, with topics such as Ajax and HTML templates, advanced handling\
    \ of Apple’s Multi-Touch API, and location-aware web applications. The last chapter\
    \ from this part will bring the ultimate touch to building web applications that\
    \ behave like native applications by introducing you to ways you can make your\
    \ pages available and functional offline.\n\nAre You Ready?\n\nThanks to the incredible\
    \ iOS platform found on the iPhone, iPad, and iPod touch and to the implementation\
    \ of the latest web standards in the Mobile Safari, not only will you find that\
    \ the limit for your web applications practically is the sky‚ you will also notice\
    \ that your development process and the options available to you will be more\
    \ fluid and open to creativity.\n\nSome examples from this book may seem more\
    \ technical and advanced than others. However, don’t be afraid because everything\
    \ is explained step-by-step. Also, don’t forget that testing code yourself and\
    \ playing around with it is the best way to learn and understand. So, don’t hesitate\
    \ to modify the examples in this book and change them to fit your needs.\n\nReading\
    \ this book, you should master the main tools to build advanced web applications\
    \ that have major assets to be appealing to users. So come, turn the page, and\
    \ jump into this exciting area of creation!\n\nxix\n\n■ ACKNOWLEDGMENTS\n\nDownload\
    \ from Wow! eBook <www.wowebook.com>\n\nxx\n\n**I**\n\n ******Part**\n\nGetting\
    \ Started with\n\nWeb App Development\n\n**1**\n\n ****Chapter**\n\nDevelopment\
    \ Tools\n\nUnlike native iPhone application development, web application development\
    \ doesn’t require a specific integrated development environment (IDE). As long\
    \ as you have an editor that can save to plain text, you’re OK. Likewise, the\
    \ primary front-end web developer’s tool, the web browser, exists in all shapes,\
    \ is well known, and is easily available.\n\nBeing free doesn’t necessarily mean\
    \ being reckless, and in your development process, you’ll want all the software\
    \ usefulness you can get. This first chapter aims to help you build an efficient\
    \ working environment while assuring we have a common background from the beginning\
    \ of our iOS adventure.\n\nThe Source Editor\n\nThere are plenty fabulous editors\
    \ out there—open source and proprietary, free or pay, jukebox-like beautiful or\
    \ running directly from a terminal. From our point of view, a really useful editor\
    \ should at least support syntax coloring, autocompletion, and some kind of snippet\
    \ utility *.*\n\nVaranus Komodoensis\n\nIf you’re already involved in web development,\
    \ you’ve probably already settled with your perfect code pal. If you’re not, we\
    \ suggest you download and install Komodo Edit, a cross-platform, free, and feature-rich\
    \ open source editor built on the Mozilla code base, which is going to be used\
    \ throughout all our examples.\n\nNOTE: You can download Komodo Edit for Mac OS\
    \ X, Windows, and Linux from the ActiveState web site at [www.activestate.com/komodo-edit/](http://www.activestate.com/komodo-edit).\n\
    \nLike Mozilla, Komodo Edit is an open web and open standards initiative. The\
    \ open web aims to encourage a community-driven development of open and non proprietary\
    \ web\n\ntechnologies to ensure the viability and open evolution of the Web.\n\
    \n![](index-26_1.jpg)\n\nCHAPTER 1: Development Tools\n\nStarting with version\
    \ 6.0, Komodo Edit noticeably features support for HTML5 and CSS3\n\nsyntax out\
    \ of the box, including support for the -webkit- proprietary prefix. These will\
    \ all become very useful throughout this book.\n\nMake Yourself Comfortable\n\n\
    Komodo Edit is so feature rich that it almost seems like a lightweight IDE by\
    \ itself.\n\nWhen you launch Komodo Edit, it greets you with an offer to restore\
    \ your previous session; answering “no” will take you to the Start Page (always\
    \ accessible as a special tab), as shown in Figure 1–1\\. There, you will find\
    \ quick links to open files and perform various actions, and ActivateState has\
    \ even added samples for each option to help you get started. You can access these\
    \ samples from a built-in Toolbox panel, made visible by selecting the View Tabs\
    \ & Sidebars menu and then selecting Toolbox. You will also notice one of Komodo\
    \ Edit’s interesting assets: project management, which will let you orderly group\
    \ all the elements of your projects. In Chapter 4, we are going to create a web\
    \ application template that will be used throughout this book, and using Komodo\
    \ Edit is an easy way to create, store, and reuse this template.\n\nFigure 1–1\\\
    . Komodo Edit’s Start Page\n\n![](index-27_1.jpg)\n\nCHAPTER 1: Development Tools\n\
    \nAnother aspect that can seriously enhance productivity is Komodo Edit’s ability\
    \ to boost code and file reuse though the handling of snippets, templates, and\
    \ even macros. You can create snippets and templates directly by right-clicking\
    \ a piece of code and selecting Add as Snippet in Toolbox in the contextual menu,\
    \ so go ahead—save some time.\n\nAlso, as stated earlier, Komodo Edit is based\
    \ on Mozilla, which means it can be\n\nextended with add-ons. The add-ons management\
    \ window is available from the menu\n\nTools Add-ons.\n\nYou can also check out\
    \ the community web site and the extensions section at\n\n[http://community.activestate.com/](http://community.activestate.com).\
    \ Chances are the one thing you were missing will be there. We’re not going to\
    \ get into thorough detail about Komodo Edit, but it is definitely worth trying.\
    \ If you haven’t settled on a source editor or if you like a change in your working\
    \ habits from time to time, do check it out. Further documentation is\n\navailable\
    \ on the web site.\n\nWhat About Dashcode?\n\nYou may be thinking, “OK, when I\
    \ installed Snow Leopard, it shipped with Xcode and Dashcode, so why not just\
    \ use that?” You’d be right, because Apple developed this piece of software specially\
    \ for this purpose (Figure 1–2).\n\nFigure 1–2\\. The new project window in Dashcode\
    \ 3.0\n\nCHAPTER 1: Development Tools\n\nDashcode is a good tool that generates\
    \ small but nifty web applications with nice transitions between views. What’s\
    \ more, Dashcode makes intensive use of the Model-View-Controller (MVC) paradigm\
    \ to rationalize and simplify interactions between\n\napplication layers. Nonetheless,\
    \ it simply doesn’t fit our needs.\n\nFirst, it is available only on a computer\
    \ running Mac OS X, limiting its use to developers owning a Mac; today these still\
    \ make up a small proportion of coders.\n\nNext, it is visual programming software.\
    \ You very well could build applications with Dashcode without ever touching a\
    \ single line of code. This can be handy, but it is not our point here. As the\
    \ reader of this book and a professional web developer, you’re going to need full\
    \ control over your code, and you want to know what is happening at every stage\
    \ of the developing process to ensure the quality of your web application.\n\n\
    Finally, just like Dreamweaver and other graphical tools, it tends to produce\
    \ many framework-specific attributes, making the whole code a chore to alter and\
    \ maintain, and it generates too much unnecessary markup and JavaScript. When\
    \ developing for the\n\nWeb, especially for low-memory devices such as mobile\
    \ browsers, lightweight code\n\nshould be a primary concern.\n\nUsing the Right\
    \ Browser\n\nTo develop for the Web is to develop mainly for a web browser. Although\
    \ we are going to specifically target Mobile Safari (the browser used on the iPhone,\
    \ the iPod touch, and the iPad), it can be helpful to have a clear idea of what’s\
    \ going on in this field. Moreover, if you already are a web developer, you’re\
    \ probably used to going through the\n\ndevelopment process using primarily one\
    \ specific browser, and developing on a desktop browser rather than a mobile device\
    \ often proves more efficient.\n\nThe WebKit\n\nDeveloping for Apple devices,\
    \ you’ll have Mobile Safari specifically in mind all the time.\n\nOf course, you\
    \ can strive to make your applications cross-browser compatible, but this would\
    \ mean more code if not less functionality. Moreover, as you’re about to see,\
    \ Mobile Safari isn’t as limited a target as it may at first seem.\n\nMobile Safari\
    \ and Desktop Safari are based on the WebKit layout engine. The engine was designed\
    \ from the beginning to be lightweight and standards compliant. Not only does\
    \ WebKit implement the latest W3C candidate recommendations, but it also\n\nimplements\
    \ draft-stage features with the -webkit- prefix.\n\nThe WebKit engine also comes\
    \ with a full set of tools for developers. We will detail WebKit’s Web Inspector\
    \ in Chapter 3, and you will soon see that it can be of great help in your web\
    \ application development process.\n\nCHAPTER 1: Development Tools\n\nNOTE: The\
    \ best option to develop iPhone (or iPod touch or iPad) web applications is to\
    \ work on an Apple platform. However, you can easily install Safari on Windows,\
    \ be it XP, Vista, or 7\\. As an alternative to Safari, we recommend browsers\
    \ based on the Chromium project, such as Google Chrome, Chromium, or Iron. All\
    \ three are available for Mac OS, Windows, and Linux.\n\nWebKit is used by many\
    \ browsers on all platforms, including mobile devices. Among others, you may be\
    \ interested in SymbianOS, Google’s Android, ChromeOS, BlackBerry, and the recent\
    \ webOS from Palm. Most web applications you build for Apple’s browser should\
    \ work on other mobile devices.\n\nThe Gecko and the Fox\n\nAnother big actor\
    \ in the browser market is Firefox, an open source project based on the Gecko\
    \ engine. Its compliance with standards is very good, and you might appreciate\
    \ one of Firefox’s strongest points: its community. It is infinitely extensible\
    \ with rich add-ons, such as Firebug, which is a thorough and usable development\
    \ and debugging tool.\n\nThis makes Firefox an excellent companion when developing\
    \ for the Web with features similar to those of WebKit.\n\nOpera\n\nOpera is also\
    \ available for all operating systems. The Opera team has always put priority\
    \ on speed and the respect for standards, and although its browser doesn’t have\
    \ a major market share, it is an excellent alternative to the browsers introduced\
    \ earlier and a good choice for developers too. Indeed, Opera comes with its own\
    \ set of developer tools, Dragonfly. Opera is also available for mobile devices\
    \ (Opera Mini), which, unlike Mobile Safari, is a drastically lightened version\
    \ of the browser and therefore will not let you benefit from all the standards\
    \ supported by the desktop browser.\n\nInternet Explorer, Lost at Sea\n\nIf you\
    \ are a Windows user wondering about Internet Explorer, we’re afraid we couldn’t\
    \ less recommend this browser for web development purposes. Although it definitely\
    \ was an advanced web browser from versions 3 to 5 (the first major browser to\
    \ implement CSS support and the first browser to provide then-unnamed Ajax features),\
    \ it has\n\nfollowed a path away from standards and as of version 8 still lacks\
    \ support for many features such as CSS selectors and properties (CSS2 selectors\
    \ and properties, that is), scoring 20/100 at the Acid3 test. It appears that\
    \ Internet Explorer 9 should mark great evolution in this regard, but for now,\
    \ the Trident-based browser isn’t an option.\n\nCHAPTER 1: Development Tools\n\
    \nDeveloping Web-Wise\n\nThe Web has standards, the first of which are the World\
    \ Wide Web Consortium (W3C) specifications. These give you, the developer, tools\
    \ to build brilliant web-based applications. That’s why the first concern you’ll\
    \ have about a web browser when\n\ndeveloping web applications is its W3C compliance.\
    \ The more compliant the browser you choose as your first target is, the more\
    \ your pages will be functional on other platforms and the less extra work you\
    \ will have to do.\n\nAcid...Acid...Acid\n\nThe Web Standards Project is an organization\
    \ dedicated to promoting and encouraging the respect and adoption of web specifications.\
    \ Because not all browsers are equal at this task, it provides a tool to easily\
    \ check how well a layout engine is keeping up. The latest version of the test\
    \ is called Acid3.\n\nTIP: To know what score a browser achieves at this test,\
    \ just go to\n\n[http://acid3.acidtests.org/](http://acid3.acidtests.org), and\
    \ you will get the result within a few seconds.\n\nMobile Safari passes the test\
    \ with 100 percent compliance, which is good because it means many possibilities\
    \ to enhance your applications. If you’re using another browser for development\
    \ purposes, you should have in mind that you could find yourself\n\nthoughtlessly\
    \ discarding very interesting features of HTML, CSS, and JavaScript.\n\nHTML5\
    \ Conformance\n\nAlthough the Acid3 test is a good way to evaluate CSS standards\
    \ compliance of a\n\nbrowser, it doesn’t indicate exactly what is supported. However,\
    \ you can check the support for HTML5 features available in a browser using the\
    \ test page at\n\n[http://html5test.com/ and get a detailed table of supported\
    \ and unsupported](http://html5test.com)\n\nstandards.\n\nThis test page will\
    \ list all new APIs, extensions, and HTML5 specificities, indicating the level\
    \ of support for them in the used browser. Mobile Safari scores 125 (and 7 bonus\
    \ points) out of 300. Though this may seem low, it actually indicates excellent\
    \ support of new standards, especially for a mobile browser.\n\nTo get more detail\
    \ about each feature implemented, every element from the list is a link that will\
    \ take you directly to the relevant page from the specification.\n\nA Satellite\
    \ in Your Browser\n\nAnother central part of modern front-end development—and\
    \ especially of web\n\napplication development—is JavaScript. We will heavily\
    \ resort to JavaScript in most of our chapters and will introduce object-oriented\
    \ JavaScript programming in Chapter 10.\n\nCHAPTER 1: Development Tools\n\nThe\
    \ compliance of the scripting engine of a browser to the ECMA-262 specification\
    \ (up to version 3) can be evaluated using the Sputnik test, built by Google and\
    \ available from\n\n[http://sputnik.googlelabs.com/](http://sputnik.googlelabs.com).\
    \ It is an open source test gathering more than 5,000\n\npoints. Safari obtains\
    \ a very good score, coming second right behind Opera.\n\nDeveloping for iOS\n\
    \nAlthough we have introduced cross-platform options for all the tools you may\
    \ need, you are going to develop for iOS, and the following software, however\
    \ useful, is available only on Macintosh systems. If you don’t have a Mac, do\
    \ read on anyway; although you won’t benefit from the applications described in\
    \ the following sections, we will be presenting useful resources for your developing\
    \ adventure.\n\nUsing the iPhone and iPad Simulator\n\nThere are many reasons\
    \ why you wouldn’t want to use an iPhone device while\n\ndeveloping your web applications.\
    \ The good news is that Apple provides a free tool that does just what you need\
    \ as soon as you’ve become a registered Apple developer. Just sign up at [http://developer.apple.com/ios/](http://developer.apple.com/ios).\
    \ Then, download and install the free iOS\n\nSoftware Development Kit (SDK), and\
    \ specifically its simulator, shown in Figure 1–3.\n\nNOTE: Before downloading,\
    \ do fetch some tea. You’ll be on for a near-to-3GB download. Once the installation\
    \ is complete, the iPhone and iPad Simulator application will be hiding in the\
    \ folder\n\n/Developer/Platforms/iPhoneSimulator.platform/Developer/Applications/.\
    \ If you don’t want to go mad looking for it before each work session, drag a\
    \ shortcut to the Dock or your desktop!\n\nThe main benefit of the simulator is\
    \ that you don’t have to actually have a proper device to do your testing and\
    \ drain your battery by loading pages again and again. What’s more, not only does\
    \ it support iPhone simulation, but it now also simulates the iPad, using a real\
    \ version of Mobile Safari. It also allows you to run tests on different versions\
    \ of the OS without going through the long and annoying process of reinitializing\
    \ the device.\n\n![](index-32_1.jpg)\n\nCHAPTER 1: Development Tools\n\nFigure\
    \ 1–3\\. The simulator offers only a minimal set of applications fit for development\
    \ purposes This is the closest you’l get to an iPhone living on your desktop.\
    \ As for non-Mac users, we can only recommend you double-test al your code on\
    \ a proper iPhone, iPod touch, or iPad to get a proper grasp of how the actual\
    \ devices behave.\n\nUsing a Real Device Anyway\n\nDownload from Wow! eBook <www.wowebook.com>\n\
    \nUsing the simulator, you’l get less functionality, the bare minimum for development.\n\
    \nTake into account that performance may be better on the simulator, which uses\
    \ your desktop computer for resources, than on the device. Thus, transitions and\
    \ advanced visual effects or multimedia content, covered in Chapters 8 and 9,\
    \ should systematical y be tested on the targeted product.\n\nAlso, because screen\
    \ size does make a difference, you should always check that al your text and elements\
    \ (such as buttons) are readable and usable in order not to harm the user experience\
    \ of your web applications.\n\nThe ADC Is Your Friend\n\nWhether you have a Mac\
    \ to instal the simulator on or not, it always is a good idea to register. The\
    \ Apple Developer Connection (ADC) is resourceful place to browse through and\
    \ find help. Being a registered developer wil gain you access to tips, screencasts,\
    \ interviews, and much more. If you make your way through information irrelevant\
    \ to you (that is, information about native iOS applications development), you’l\
    \ find how hugely CHAPTER 1: Development Tools\n\nbeneficial Apple’s own information\
    \ can be. The best place to start is the Safari\n\ndevelopment page ([http://developer.apple.com/safari/](http://developer.apple.com/safari)),\
    \ where interesting information about supported features is available.\n\nSummary\n\
    \nBy now, you should have a functional development environment. Whether you have\n\
    \nchosen Komodo Edit or another great editor; whether you’ve picked Safari, another\
    \ WebKit browser, or even Firefox; and whether you’ve been able to install the\
    \ simulator or not—you have what it takes to make your developing process easier\
    \ and more\n\nefficient. You’ve also built up some background to comfortably work\
    \ your way through this book.\n\nIn the next two chapters, you’re going to begin\
    \ getting your hands dirty. So that you have a perfect development environment,\
    \ we’ll help through the process of installing a server on your computer where\
    \ you can host your projects. Then you’ll sharpen your development tools by becoming\
    \ intimate with an absolute time- and hair-saver, the debugging tools.\n\n**2**\n\
    \n ****Chapter**\n\nDevelopment Environment\n\nYou now have tools to create and\
    \ tools to test. In Chapter 1, we recommended that in order to properly evaluate\
    \ your application, you should always test it thoroughly on a proper device, whichever\
    \ it is you are targeting. Likewise, the most reliable way to know how your pages\
    \ are going to behave on the user’s side is to use them in close to real conditions\
    \ right from the development process.\n\nOnce you have your application ready\
    \ and shining, you will have to host it on a server so it can be served throughout\
    \ the World Wide Web. Legitimately yet, you may not want to host your web site\
    \ on a production platform while still in the development stage.\n\nBecause some\
    \ restrictions and shortcomings apply only when a site is hosted—along with some\
    \ welcome conveniences—we’re going to guide you through the not-as-hard-as-you-thought\
    \ process of installing a local server on your working machine.\n\nYour new server\
    \ will provide all you need to develop web applications and follow the examples\
    \ in this book. Consider it primarily another working tool. Following just the\
    \ steps from this chapter, you will not get into advanced functionalities or fancy\n\
    \nconfiguration. You will have a ready server, whatever your platform, that will\
    \ host your pages and make them available to external devices that share the same\
    \ wireless\n\nnetwork.\n\nServing the Web Application\n\nWe mentioned there are\
    \ some restrictions when developing your web applications\n\ndirectly on local\
    \ files. Here’s an example before you undertake installing your local web server:\
    \ you’ve built a search application with a suggestion feature; when a user starts\
    \ typing a word—pow!—that very word he was going to type comes up before him!\
    \ To\n\nachieve this, you check words from a list on some remote site. You’ve\
    \ tested your application thoroughly from local files, and it’s working like a\
    \ charm. Yet, when you put it online, no more magic—no more suggestions appear.\
    \ This is because Ajax, the\n\nunderlying technology for such functionality, works\
    \ only if requests occur on the same origin. This “cross-domain” restriction didn’t\
    \ happen when you were testing because\n\n[local files don’t have a domain and\
    \ because, using the file:// URL scheme, the](file://URL)\n\n![](index-36_1.jpg)\n\
    \nCHAPTER 2: Development Environment\n\nexecution context is different. That’s\
    \ why you had never noticed this problem—until it was a little too late.\n\nAnother\
    \ shortcoming if you’re using the iPhone Simulator or a proper device in your\
    \ developing process—which you should—is that neither can access files on your\
    \ local file system. Hosting your pages is a necessary step to use the simulator\
    \ as well as your targeted device—iPhone, iPod touch, or iPad.\n\nMac OS, Making\
    \ Things Easy\n\nThe latest versions of Mac OS X ship with all the components\
    \ needed to set up a\n\nworking server. Although site hosting is useful to developers\
    \ (among others), it usually isn’t their primary field of knowledge. Luckily,\
    \ the configuration process has been made extremely straightforward. Just follow\
    \ the steps in the next sections.\n\nAn Apache in Your Mac\n\nOpen System Preferences\
    \ … from the menu, and from the window that appears, open the Internet & Wireless\
    \ section. Click the Sharing icon, and select the Web Sharing check box (see Figure\
    \ 2–1). Managed that? Well, good news—your server is set up!\n\nFigure 2–1\\.\
    \ The Mac OS X Sharing panel\n\nClicking the personal web site link, Safari, or\
    \ whatever your default web browser is will open a window using the default files\
    \ from your new personal site, shown in Figure 2–2.\n\nYou can modify and add\
    \ files for this site in your */Users/username/Sites/* folder, where *username*\
    \ is your session user name.\n\n![](index-37_1.jpg)\n\nCHAPTER 2: Development\
    \ Environment\n\nFigure 2–2\\. The default web site\n\nThe second link will lead\
    \ you to the computer’s web site. Accessing this URL will give you the common\
    \ “It works!” message found on the Apache default installation. The files for\
    \ this web site are located in the */Library/Webserver/Documents/* folder.\n\n\
    If you just can’t remember URLs like 192.168.1.100 or can’t be bothered to type\
    \ them, you can also access your site using the computer name. The URL would look\
    \ something like [http://computername.local/~username/](http://computername.local/~username).\n\
    \nThese simple steps allow you to build a web site with your primary languages—HTML,\
    \ CSS, and JavaScript. This is the minimal configuration you need to start making\
    \ hosted web applications, but for building a modern web site, you will probably\
    \ want to use some brand of server-side scripting language to add more interaction\
    \ between your site and the user. We’ll be using PHP for some examples in this\
    \ book, so we recommend\n\nyou follow these steps. It isn’t as “click-and-go”\
    \ as the first part of the install, because you’ll be modifying a configuration\
    \ file with administrative privileges. Still, don’t worry: it isn’t as difficult\
    \ as it is impressive.\n\nThe Script Engine\n\nOpen a Terminal window, and type\
    \ the following command:\n\nsudo vi /private/etc/apache2/httpd.conf\n\nYou’ll\
    \ be asked for an administrator password. You probably are the administrator for\
    \ your computer, in which case the password is your session password. However,\
    \ if you are using a company machine, you’ll may have to ask someone to type one\
    \ for you. The apache2 configuration file should open in Vi, within the Terminal\
    \ window.\n\nCHAPTER 2: Development Environment\n\nNOTE: We won’t be using command-line\
    \ tools to edit files often in this book. Nonetheless, when we will, we’ll use\
    \ the well-known Vi. If you’re not familiar with command-line text editors, you\
    \ may find them a little frightening. They do often have a steep learning curve.\
    \ However, because some are popular and truly feature rich, we thought we might\
    \ introduce one here.\n\nIf, on the contrary, you’re not a Vi fan and you’ve installed\
    \ Komodo Edit, check out the option to enable Vi-type behavior in the Komodo ➤\
    \ Preferences… menu item; select Editor ➤ Key Bindings, and choose Enable Vi emulation,\
    \ the second option from the top.\n\nOnce the file is open, move your cursor down\
    \ until you reach the lines that look like this:\n\n...\n\n#LoadModule php5_module\
    \ libexec/apache2/libphp5.so\n\n#LoadModule fastcgi_module libexec/apache2/mod_fastcgi.so\n\
    \n...\n\nYou want to uncomment these lines by removing the # signs to enable these\
    \ modules and allow PHP scripts to execute properly. To do this, type a (for append),\
    \ uncomment the lines as you would do in any editor, save your changes by typing\
    \ esc to exit editing mode, and then type :wq (for write and quit).\n\nFor your\
    \ configuration changes to take effect, restart the server by deselecting and\
    \ reselecting the Web Sharing option in System Preferences or, right from your\
    \ Terminal window, by typing this:\n\nsudo apachectl restart\n\nYou may be wondering\
    \ what you have just done. The first line tells the server to load the PHP5 module,\
    \ allowing you to run PHP scripts on the server side. PHP is a popular, open source,\
    \ and very powerful general-purpose scripting language. In its latest version,\
    \ it features object-oriented programming and many functions to make a developer’s\
    \ life easier.\n\nThe second line allows separation of script execution and other\
    \ server tasks. To put it simply, the server and the PHP module—or any other module\
    \ implementing the FastCGI protocol—run as independent applications, with distinct\
    \ resources and processes. This accordingly means that if a script crashes PHP,\
    \ the server won’t need to be restarted.\n\nSo, without even noticing, you’ve\
    \ made it: you’ve set up a server with PHP5 on your working machine to make the\
    \ developing process both easier and more professional. If you’re the curious\
    \ kind, we bet you’ve even modified a few things on your new site (that is, if\
    \ you’re a Mac user, of course). Next is the guide to achieve similar results\
    \ on a Windows machine.\n\nWindows, Choose Your Weapons\n\nTo install a server\
    \ on your Windows machine, your first move is to get Internet\n\nInformation Services\
    \ (IIS) and the components to run PHP. Microsoft has made great\n\n![](index-39_1.jpg)\n\
    \nCHAPTER 2: Development Environment\n\n[efforts lately to make this task much\
    \ easier than it used to be. http://php.iis.net/](http://php.iis.net), shown in\
    \ Figure 2–3, is a site specially dedicated to server installation. Go there,\
    \ and click the Install PHP button.\n\nFigure 2–3\\. PHP for IIS by Microsoft\n\
    \nOf course, you can use any web browser to access this site and proceed, but\
    \ we\n\nrecommend you use Internet Explorer for the following operations to ensure\
    \ everything goes as planned.\n\nAn All-in-One Installation Process\n\nFollow\
    \ the on-screen instructions. You’ll be asked to download the Web Platform\n\n\
    Installer (Web PI), a lightweight tool that will help you deploy a complete web-serving\
    \ platform on your machine with stunning ease.\n\n![](index-40_1.png)\n\nCHAPTER\
    \ 2: Development Environment\n\nNOTE: The Web Platform Installer needs the .NET\
    \ Framework version 2.0\\. If surprisingly your\n\n.NET version was outdated or\
    \ not available on Windows XP, it will guide you through the upgrade before resuming\
    \ the regular server installation.\n\nAlso, the installer won’t work with more\
    \ basic versions of Windows, including Windows Vista Home Basic and Windows 7\
    \ Starter Edition.\n\nOnce the download is complete, run the application. If you\
    \ are using Vista or 7, your system will ask your permission to run the Web PI\
    \ add-on in your browser. Click the bar under the browser tabs (Figure 2–4) and\
    \ approve by selecting Run ActiveX Control (for Vista) or Run Add-on (for 7).\
    \ If you’re suspicious, you can get details about what is going to happen from\
    \ the drop-down menu. Yet, this is Windows software, so you can trust it... On\
    \ 7 only, you will be asked for allowance again before the program is run. This\
    \ is the regular process, so just click Allow to continue.\n\nFigure 2–4\\. Click\
    \ Run Add-on to launch the installer\n\nAt this stage, a window should appear\
    \ with an Install PHP check box selected, as shown in Figure 2–5\\. You may appreciate\
    \ that, from tabs on the left, you can choose to install popular components along\
    \ with the base server. These include open source content\n\nmanagement systems\
    \ (CMSs), e-business solutions, and wiki engines. If any from this software selection\
    \ trigger your interest, just select the boxes, as shown in Figure 2–6, and the\
    \ installation will be added seamlessly.\n\n![](index-41_1.jpg)\n\n![](index-41_2.jpg)\n\
    \nCHAPTER 2: Development Environment\n\nFigure 2–5\\. The Web Platform Installer\n\
    \nFigure 2–6\\. Easy to set up\n\nWhether you’ve chosen to add extra treats to\
    \ your server or not, accept the license contract, and watch the install complete.\
    \ This should all be fast enough, unless you’re on dial-up. You can now return\
    \ to your browser and type [http://localhost/](http://localhost). This is your\
    \ local web site!\n\n![](index-42_1.jpg)\n\nCHAPTER 2: Development Environment\n\
    \nNow, you can take control over your web site and—why not?—add more web sites\n\
    \nusing the dedicated Internet Information Services (IIS) Manager administrative\
    \ tool you’l find in the Control Panel.\n\nHowever, you have one final step to\
    \ go through to make this site available to external devices, which is to make\
    \ the Windows Firewal al ow access to the web service. This is done similarly\
    \ on both XP and Vista. You’l see that adding an exception to the Windows 7 Firewal\
    \ is a slightly different story.\n\nSecurity Settings\n\nOn Windows XP, open the\
    \ Start menu, and choose Security Center from the Control\n\nPanel *window. Select\
    \ “Manage security settings for: Windows firewal ” at the bottom of the window.\
    \ Clicking the Exceptions button, you wil see the “Add port...” option. Click\
    \ this button, and add an entry for port 80 through TCP to make your site available.*\n\
    \n *WARNING: If you have installed some kind of security software, it is possible\
    \ that the firewall in use on your system is not that of Windows. We cannot cover\
    \ all configurations in this regard, so we recommend you look into the documentation\
    \ for your software.\n\nOn Vista, from the Control Panel, click “Al ow a program\
    \ through Windows Firewal ” under the Security section, as shown in Figure 2–7.\
    \ From there continue as in XP.\n\nDownload from Wow! eBook <www.wowebook.com>\n\
    \nFigure 2–7\\. Steps are easy on Windows Vista\n\n![](index-43_1.jpg)\n\nCHAPTER\
    \ 2: Development Environment\n\nThe latest Windows system has added a lot of configuration\
    \ functionality, losing some of the simplicity you could experience with XP or\
    \ Vista. Still, the operation remains fairly straightforward as long as you know\
    \ where you are going.\n\nOnce you’ve opened the Control Panel, at the bottom\
    \ of the “View and create firewall rules” section, choose the Inbound Rules option,\
    \ as shown in Figure 2–8\\. Then, in the new appearing screen, click New Rule\
    \ from the top of the right pane. A wizard will guide you through the subsequent\
    \ process.\n\nFigure 2–8\\. Windows Firewall with Advanced Security on 7\n\nChoose\
    \ to add a port rule, and click Next. From there, select the TCP protocol and\
    \ specify 80 as the local port. On the two following screens, leave all selections\n\
    \nunchanged. Then give a name to your new rule, and click the Finish button to\
    \ save it.\n\nThere you are, pretty much ready to build your web applications\
    \ on your Windows\n\nserver! You can start adding files to the default site location,\
    \ in the *C:\\Inetpub\\wwwroot\\*\n\ndirectory.\n\nYet, there is one restriction\
    \ in using your working machine to serve pages to an Apple device. Because Microsoft\
    \ and Apple use different communication protocols, you can access your site only\
    \ using the IP address. To find out what IP your Windows OS is 22\n\nCHAPTER 2:\
    \ Development Environment\n\nusing, simply run ipconfig at the command prompt.\
    \ This will return the IP currently in use.\n\nLinux, Take Control\n\nFor the\
    \ Linux install process, we’re going to take you the command-line way. There are\
    \ two main reasons for this. First, we believe it is the easiest way to install\
    \ an Apache server on a Linux box. Second, there are so many different graphical\
    \ tools for installing packages on so many Linux distributions that we couldn’t\
    \ cover them all. Anyway,\n\nsetting up an Apache server with PHP enabled through\
    \ the command line is pretty\n\nsimple, so don’t worry.\n\nNOTE: We’re using apt-get\
    \ in our examples, which is the front end to the widespread Advanced Packaging\
    \ Tool (APT) that is used notably in the Debian and Ubuntu distributions. The\
    \ package names will be the same whatever your flavor of the kernel, and they\
    \ most likely are in the distribution’s repositories. Just check whether you should\
    \ use yum (yum install ...), pacman (pacman -S ...), or something else.\n\nAs\
    \ promised, the install begins by opening a Terminal window, and your first command\
    \ will be as follows:\n\nsudo apt-get update\n\nThe shell will update your package\
    \ database. This is to make sure you get a clean install, that versions don’t\
    \ mixed up, and that there are no dependency issues. Next is the actual install\
    \ command. You then use apt-get again, but with the install option. On one line,\
    \ type this:\n\nsudo apt-get install apache2 libapache2–mod-php5 php5-mysql\n\n\
    Output will appear in the Terminal window for a few seconds while the packages\
    \ are installed, and then you will see the prompt again. That’s it!\n\nDepending\
    \ on your distribution, your server files will not be found in the same directory.\n\
    \nOn Debian-based distributions, the root directory is */var/www/*. Because we\
    \ cannot list all possible cases here, we recommend you visit Apache’s wiki at\n\
    \n[http://wiki.apache.org/httpd/DistrosDefaultLayout. This page references all\
    \ the](http://wiki.apache.org/httpd/DistrosDefaultLayout)\n\ninformation you need\
    \ to get about where the most important Apache files are located on your system.\
    \ Whatever your flavor of Unix, you can see your site in a browser at\n\n[http://localhost.](http://localhost)\n\
    \nThe final touch to your server install is to make the server your own, that\
    \ is, to change its ownership from root to you. This is easily done on the command\
    \ line with the chown command (CHange OWNership):\n\nsudo chown -R username /var/www\n\
    \nNow, you can modify all files and directories on the web site without using\
    \ the sudo command you used to install it. That wasn’t difficult, was it?\n\n\
    CHAPTER 2: Development Environment\n\nHandling Multiple Hosts\n\nWhatever your\
    \ developing platform, you have a server set up to host all your upcoming web\
    \ applications. If you want to test your web applications in real-life conditions,\
    \ there is still one thing to set up, though.\n\nThis is necessary for at least\
    \ one reason: when using Ajax, the so-called cross-domain limitation, of course,\
    \ wouldn’t apply if you were hosting all your pages on the localhost domain.\n\
    \nTo remedy this, you have to create a different local host on your computer.\
    \ You do this by modifying the *hosts* file on your system to define new domains\
    \ that should point to your local server. This will in turn allow you to test\
    \ pages on these domains as if they were on the World Wide Web.\n\nNOTE: Please\
    \ note that although you can use any URL with any top-level domain (TLD), we recommend\
    \ you don’t use existing TLDs to avoid conflicting with existing web sites. Naming\
    \ your local site apple.com would mean you couldn’t go to the actual Apple site\
    \ anymore!\n\nUnix-Based System\n\nThe hosts file is generally nested in the */etc/*\
    \ directory, the same as your Apache configuration file. On most Unix and BSD\
    \ systems, it should be at the root of this folder, with other system-wide configuration\
    \ files. Because root privileges are needed to edit such files, we are going to\
    \ open it in the terminal with Vi, running the following: sudo vi /etc/hosts\n\
    \nA rather short file appears on-screen, looking something like this:\n\n##"
