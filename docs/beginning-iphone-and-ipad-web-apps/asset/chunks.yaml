    \ Date() - 1000 * 60 * 10;\n          // 10 minutes\n          /* If the feed\
    \ needs update */\n          if (last <= ttl) {\n            loadFeed(row.URL,\
    \ db, row.SourceID);\n          }\n        }\n      }\n    );\n  });\n}\n```\n\
    \nFirst, we add the relevant calls to the `refresh()` function from the success\
    \ callback of the checking transaction. Then, using the new transaction created\
    \ in `refresh()`, we read the data returned by the query from the `SQLResultSet`\
    \ object, which holds all the rows resulting from the query inside the `rows`\
    \ property. This property is a list of type `SQLResultSetRowList` whose elements\
