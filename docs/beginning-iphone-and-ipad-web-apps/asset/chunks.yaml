    \ntext-shadow: black 1px 1px 10px;\n\nborder: 0;\n\nbackground: none;\n\nposition:\
    \ absolute;\n\ntop: 100px;\n\n}\n\nbutton:first-of-type { left:0; }\n\nbutton:last-of-type\
    \ { right:0; }\n\nA function slide(), attached to the click event on the button\
