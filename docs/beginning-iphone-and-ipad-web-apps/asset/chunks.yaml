  raw: 'Internet access on mobiles devices started, it was nothing like what we know
    now.


    Networks had drastically limited speeds and were extremely expensive, screen sizes
    were small, and devices usually only did black and white. You could read only
    a few short lines at a time, with a thumbnail-size image if you were lucky. Back
    then, a web page couldn’t go beyond a bunch of kilobytes, partly because of device
    memories, and users had the chore of navigating mostly with the 0–9 phone keys.
    Obviously, even if this was some kind of technical revolution, browsing the Internet
    on their phones wasn’t very attractive to end users.


    Devices evolved, screens grew wider, and touch phones made an appearance. Phone


    engines boasted overall better performances, but connections remained expensive,
    and site layouts weren’t ultimately worth it. Although the technologies had largely
    gotten better since WAP—a kind of lightweight HTML based on XML, the first standard—sites
    mostly weren’t optimized, making page layout and, more annoyingly, navigation
    a


    definite issue. Also, because browsing wasn’t a phone manufacturer’s priority,
    merely accessing online services generally implied digging into numerous menus
    and


    submenus.


    That is to say that for a long time, the mobile Internet was around but certainly
    wasn’t an attractive field for developers.


    The iPhone Revolution


    When Apple released the iPhone, users discovered a new mobile experience, with
    a full range of possibilities for developers to build on. Accessing the Internet
    suddenly became seamless, and browsing through pages was a nice, flowing process.
    Relying on a revolutionary graphical user interface (GUI), the iPhone builds a
    close relationship between device and the end user based on touch.


    ![](index-90_1.jpg)


    CHAPTER 4: The Anatomy of a Web Application


    Before the release of the iPhone, users—no matter which device they were using—had
    to have some kind of accessory to interact with content and access functionality,
    be it a keyboard, mouse, or stylus. After the release of the iPhone, people seemed
    to reject using these portable devices, and designers progressively abandoned
    small buttons to emulate the closeness provided by Apple’s Multi-Touch system.


    Not only is this new connection beyond revolutionary, but Apple also opened the
    phone user experience to the real Web. By releasing a full range of web-dependent


    applications and, most importantly, by implementing a real, adapted browser called
    Mobile Safari, Apple offered a proper sense of immediateness close to that of
    desktop browsing.


    Apple also hugely favored the use of network services on mobile phones with a
    strong marketing move: on the iPhone’s initial release, the company managed to
    make carriers commercialize the device with mostly trouble-free Internet access,
    which allowed in most cases a fully satisfying and relatively inexpensive usage
    of the possibilities of the device.


    Belief in Web Apps


    Long before the release of the iPhone SDK, Apple counted upon web applications
    to extend the possibilities of its smartphone. Perhaps the main proof of this
    was that most web applications were distributed through a dedicated section on
    Apple’s web site ([www.apple.com/webapps/](http://www.apple.com/webapps)), as
    shown in Figure 4–1. This page is still one of Mobile Safari’s default bookmarks.


    Figure 4–1\. The Apple’s web apps dedicated web site


    ![](index-91_1.jpg)


    CHAPTER 4: The Anatomy of a Web Application


    Whereas Apple probably already planned to offer native iPhone applications, it
    is possible that the wider development of these compared to that of web applications
    was initiated by developers themselves, who urged Apple to provide a full range
    of tools to build these specifically. It is nothing unusual nowadays that the
    eclectic masses, from technology enthusiasts to international firms, have come
    to develop native iPhone applications (150,000+ to date). Web applications have
    been temporarily relegated to the background, while native development kits have
    met great success. However, Apple has sustained projects such as Dashcode. Although
    primarily designed for desktop widget creation, Dashcode soon became an interesting
    tool to build web apps too, with new functionality dedicated to Mobile Safari,
    such as iPhone-inspired web application templates.


    Lately, questions have arisen about the possibility of the PastryKit and AdLib


    frameworks being released to the public respectively for iPhone and iPad development.


    These two strong frameworks are dedicated to iOS-integrated web applications and


    bring solutions to perennial issues such as the unavailability of fixed-position
    elements with CSS. They also bring desirable features meant to enhance the user
    experience, such as a fixed header that allows users to browse without panning
    and allows them to navigate as within native applications.


    For now, the PastryKit framework seems to be used only on the iPhone user guide


    ([http://help.apple.com/iphone/guide/), shown in Figure 4–2, and probably in your](http://help.apple.com/iphone/guide)


    iPhone bookmarks; however, the enthusiasm and curiosity around it is a sign not
    only that Apple is still working on the future of web applications but also that
    developers look to produce higher-quality services in this field.


    Figure 4–2\. The iPhone user guide on...iPhone


    CHAPTER 4: The Anatomy of a Web Application


    Other such frameworks have indeed been released by open source believers, showing
    the urge to find helpers in the iPhone web application development process. Among
    others, you can check out iUI (formerly iPhoneNav, by Joe Hewitt, the man behind


    Firebug), which appeared shortly after the first iPhone release; WebApp.Net, which
    is a lightweight, optimized framework; or jQTouch, which is based on the jQuery
    library.


    Web applications on the iPhone are getting more and more attractive. Mobile Safari’s
    performances are ever-growing, and support for cutting-edge web standards is


    constantly evolving. Lately, iOS’s browser has even gained access to core tools
    such as geolocation abilities. Because more and more companies are providing web
    services that can be included in web applications and because the release of the
    iPad has been greeted with much enthusiasm, the future of the web application
    field appears even more promising.


    But What is a Web App Exactly?


    Developing for the iPhone, you have three possibilities: make native applications,
    build regular web pages, or build web apps **(which is somewhere in between the
    first two). A web application supposedly resembles a native iOS application but
    is accessible in the same way as a web page and basical y uses the same technologies
    (for instance, HTML**


    **and JavaScript).


    Apple’s guidelines for building web applications stress several points in this
    regard, which al come down to very close device targeting. According to Apple,
    the web app should bring a specific answer to a specific need of the user. It
    should emulate the rest of the iOS interface, thus using special iOS user experience
    features where appropriate.


    The idea is to minimize the feel of a browser experience to favor a closer relationship
    with the user, in other words, to make the user actual y use the page instead
    of


    browsing it. For this, Apple recommends strong adherence to web standards and
    the Download from Wow! eBook <www.wowebook.com>


    use of Ajax to avoid reloading pages.'
