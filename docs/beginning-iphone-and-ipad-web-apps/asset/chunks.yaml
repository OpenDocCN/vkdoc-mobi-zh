- fmt: 'The second point where web application development can be more attractive
    than that of native applications lies in the freedom you, the developer, have
    for your content.


    Being distributed in the App Store requires that Apple validates your application,
    which does imply some limitations in what you can show and what your application
    is about. The process may be long too, and once you manage to get through this
    stage, you still have to get the users to choose your application from among the
    myriads of other applications.


    Building web applications, you can release a new application every day, without
    any concern for Apple, and about most anything you want. You will still have to
    appeal to users, but, hey! you''re making something for them, so, nothing is more
    natural.


    ## Chapter 4: The Anatomy of a Web Application


    ### Release Model


    On the user side, however easy the process, native applications require an installation
    and may need updates. The former obviously is not true for web apps, and the latter
    just happens automatically. For native applications, even updates are dependent
    on Apple''s validation, which necessarily means a delay, even a short one. Finally,
    web apps are discoverable and available from any device, as long as the user has
    a browser, which can seem better than being bound to the nonetheless incredible
    App Store.


    ### Web Apps: Not the Little Brother Anymore


    Unlike what is often heard, web applications are no easier to build than native
    ones. It''s just like comparing apples and oranges: they''re both fruit, but they''re
    plain different.


    Freedom doesn''t make page creation easier. Unlike native application developers,
    web application developers will be confronted with a white page each time they
    undertake a new application. Although displaying elements in a browser can be
    easier than arranging them for an Objective-C application, the CocoaTouch framework
    is very efficient in handling this kind of task. Also, we''ve explained how emulating
    the iPhone GUI is important, which might make web app development tricky regarding
    layout and appearance. Building for the iPhone is a whole new range of constraints
    for the web developer.


    Developers should always keep in mind that a web app focuses on specific features
    that are presented to the user few at a time. Use and access to information must
    always be as clear as possible. Nonetheless, don''t get worried. Frameworks exist
    that can help you through the process. And what''s more, we will too.


    ### Web Apps on Mobile Safari


    You''re going to make web apps for `Mobile Safari` running on iOS. Although this
    entails much fewer platform limitations than making native applications, you must
    be fully aware of the characteristics of the devices you are targeting. Especially,
    you should know how you web app will be seen. Up to now, the targeted devices,
    the iPhone and iPod touch, had exactly the same screen size, visual behavior,
    and GUI recurrences. With the release of the iPad, you''ll have to take into account
    both a different screen size and slightly different GUI components.


    ### Master the Browser


    If there''s one element you should get to know inside out, it''s `Mobile Safari`.
    As Apple likes to put it, it is not a browser miniature: unlike many mobile products
    on the market, it is a fully-grown web interpreter, with full support for HTML,
    CSS, and JavaScript—including Ajax technologies. This means that, more or less,
    any site will display correctly on `Mobile Safari` if it is built upon the web
    standards. Not only is it a proper browser, but it can also boast advanced support
    for cutting-edge features of HTML5 and CSS3 specifications (although these are
    still at working draft stage). A minor limitation to this may be that none of
    the three devices we are talking about uses a mouse. All emulate mouse events
    through touch events, thus allowing more natural interaction than solely with
    a mouse. In most cases, this difference will not harm usability.


    We can only recommend again and again that you keep closely up-to-date with the
    all the evolutions initiated by the World Wide Web Consortium (W3C; [www.w3.org](http://www.w3.org))
    and the Web Hypertext Application Technology Working Group (WHATWG; [www.whatwg.org](http://www.whatwg.org)).
    This is where you''ll find most of tomorrow''s web technologies.


    ### Browser Metrics


    The default behavior of `Mobile Safari` is to scale page contents to fit into
    the screen. This, of course, makes the browsing experience different from that
    on a desktop browser or from the experience on `Opera Mini`, which reorders and
    resizes pages so that they are readable on small screens. Users, with the help
    of specific gestures, have to adapt the view to what they want like to read. This
    is done by pinch-opening (zooming in), pinch-closing (zooming out), and double-tapping
    (focusing a particular page element). Moreover, the "page" metaphor doesn''t exist
    for `Mobile Safari` as it does for desktop browsers. This means that users will
    not scroll a page up, down, left, or right, with visual assistance on the side
    and bottom of the screen. They will pan the view up, down, or sideways by finger-flicking
    it to uncover whatever content they want to see in the viewport.


    The visible area of your page will not only be limited by the size of the screen;
    you will also have to cope with the address bar and the navigation bar, respectively
    at the north and south of the screen. However, the address bar will move up as
    the user pans and be made accessible by tapping the status bar to save screen
    real estate. The iPad topography here is slightly different: as the screen is
    wider, the address area and navigation options are grouped in a single bar at
    the top of the screen. This bar will not disappear as the user pans.


    Table 4–1 lists the dimensions you will be working with. Keep them in mind. You
    should take them into account every time you design a web application for Apple
    devices.


    **Table 4–1\. Browser Metrics in Safari and Full-Screen Mode**


    | **Device** | **Portrait Mode** | **Landscape Mode** |

    | :--- | :--- | :--- |

    | iPhone, iPod touch | **320x460** | **480x300** |

    | | minus 44px for navigation bar | minus 32px for navigation bar |

    | | minus 60px for address bar | minus 60px for address bar |

    | | minus 50px for console | minus 50px for console |

    | iPad | **768x1004** | **1024x748** |

    | | minus 58px for navigation bar | minus 58px for navigation bar |

    | | minus 50px for console | minus 50px for console |


    These metrics are not absolute limits, because all three devices allow web apps
    to be run full-screen. In that case, only the status bar will be visible, and
    your application will run freely on the rest of the screen.


    ### Think "Web App"


    The problem with this browsing model is that it conflicts with the core principles
    of the web app experience. The aim of a web application is to seamlessly supply
    a service. For the end user, having to zoom to access a menu or specific content
    can easily be deceptive, and visitor loyalty from your point of view would suffer.
    You must acquire full control over the space dedicated to your application. For
    that, you have to know it perfectly and focus completely on the core functionalities
    you are providing. The default browser navigation should disappear, leaving the
    user to an efficient inner navigation handled by the web application. We will
    soon explain how to bring your user to add your application to the home screen
    and how to let him launch it in full-screen mode. This will make your web app
    look more a like a native app.


    `Ajax` is great help in achieving an application experience, yet it does raise
    new problems when used exclusively over complete page refresh. Be careful not
    to spoil your'
