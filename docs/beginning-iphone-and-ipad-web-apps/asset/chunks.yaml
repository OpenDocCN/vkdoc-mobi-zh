    ## CHAPTER 15: A Better Handling of Client-Side Data Storage


    The initialization of transactions is asynchronous, which means the scripting
    engine will immediately move to the following statement after the call to `transaction()`,
    without waiting for the callback to be executed. However, as a transaction produces
    a global lock on the database, transactions most probably will be called one after
    the other. This asynchronous behavior allows for more flexibility from the point
    of view of the user, because the web application will not be paralyzed during
    heavy operations.


    The `executeSql()` method, unsurprisingly, lets you run SQL statements. Like the
    `transaction()` method, this function works asynchronously. However, one request
    can take longer than another, which can cause errors when, as in our example,
    queries depend on the success of previous queries. In our example, the second
    request holds a reference to the table created by the first request in order to
    guarantee the referential integrity of data. Therefore, rather than looping through
    our queries, we define a recursive function that will iterate through the list
    of requests and execute the next only when the previous has completed.


    As you can see in this example, the `executeSql()` function takes several parameters.
    The following is its signature:


    `transaction.executeSql(command, parameters, successCallback, failureCallback);`


    ```

    function successCallback(transaction, resultSet) { ... }


    function failureCallback(transaction, error) { ... }

    ```


    The first parameter is the SQL query to be executed. Then, an array of parameters
    should be passed to secure the query—which we will explain shortly. The two final
    parameters are callback functions. In our example, we use the first parameter
    to execute the next query every time a query is successful. It receives the current
    transaction as the first parameter and, if any, the result of the just-completed
    query as the second parameter. The failure callback receives a `SQLError` as its
    second parameter, which will let you handle the problem. Because an error isn’t
    necessarily fatal, you can also resume the transaction from the failure callback.
    Such a case will be treated separately in a subsequent section.


