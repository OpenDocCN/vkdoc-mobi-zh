  raw: '.header-wrapper {


    color: #727880;


    CHAPTER 5: User Experience and Interface Guidelines


    text-shadow: rgba(255,255,255,0.7) 0 1px 0;


    border-top-color: #fff;


    border-bottom-color: #3e4149;


    background: -webkit-gradient(linear,


    left top, left bottom,


    from(#f4f5f7), to(#a8adb8));


    -webkit-background-size: 100%;


    }


    .group-wrapper p,


    .group-wrapper ul {


    -webkit-box-shadow: 0 1px 0 #fff;


    border-color: #b2b5b9;


    }


    }


    For the moment, you only change the color of the header to fit with the color
    scheme of the iPad. However, it is unnecessary to overload your iPhone style sheet
    uselessly, because you can also load a different, specific file when your web
    application is used on an iPad or desktop browser. This is done by specifying
    the device width in the media attribute of the <link> tag:


    <link rel="stylesheet" href="styles/big.css"


    media="only screen and (min-device-width:640px)">


    This way, nothing will be loaded if your user is on an iPhone, but you can add


    appropriate styles for the larger devices. Add the previous code to a file called
    *big.css* in your template *styles* directory.


    Now that you have your iPad-specific style sheet waiting, let’s get some code
    in it to achieve the split view mentioned earlier. You will apply it following
    the way it is implemented on native iPad installed applications. Note that it
    is important that both columns in landscape orientation have the same height.
    Therefore, you use the table and table-cell display property value for main and
    auxiliary views, which avoids having to resort to JavaScript or visual illusions
    using background images that would be heavier on the rendering engine, longer
    to load, and less elegant and maintainable altogether.


    .split-view {


    display: table;


    width: 100%;


    height: 100%;


    }


    .split-view .view {


    display: table-cell !important;


    }


    .split-view .view:first-child {


    border-right: solid 1px black;


    width: 320px;


    }


    And your markup would be as simple as this:


    <div class="split-view">


    <div class="view">


    CHAPTER 5: User Experience and Interface Guidelines


    ...


    </div>


    <div class="view">


    ...


    </div>


    </div>


    Now, simply do not forget to hide the auxiliary content from iPhone users, by
    putting the following in your main style sheet:


    .split-view .view:first-child {


    display: none;


    }


    This will not be applied on the iPad, because you have specified !important on
    the display:table-cell rule earlier. The !important statement overrides all other
    rules in the style sheet or inline.


    Be Creative and Innovative


    You now have knowledge and tools to efficiently start building iPhone and iPad


    applications. An easy way to start moving away from the defaults is to keep the
    overall layout unchanged—you understand how the presented layout choices have
    positive


    effects on the usability of your web app—but tweak the color scheme applied. The


    default colors of iOS are distinguished but can be a little cold for some purposes.
    The relevance also depends on the public you may be targeting. The gray and blue
    choice may, for instance, feel boring to a teenage target.


    An easy yet entertaining way to play with color schemes is to go the site


    [http://kuler.adobe.com/](http://kuler.adobe.com). There, you can choose between
    numerous user-submitted themes or create your own. The idea for you is to easily
    generate color associations that fit into the initial spirit of Apple’s design.
    You can also go there to get a sense of what’s popular or find inspiration.


    Of course, the best way to find original ways to design your web applications
    is to actually use the devices you target as much as possible. Knowing them well,
    not only as a developer but also as a user, will immensely help you understand
    what “works” and what doesn’t.


    Mimicking the UI of the OS you target is a good start to make your application
    more accessible. Even lazy users should easily adapt to an environment they are
    familiar with.


    Therefore, the interface to your application should be well designed and intuitive,
    building upon what already exists.


    Still, you should often be able to find good inspiration in your everyday life.
    Do you like to sort papers to get yourself organized? Do you need a soothing landscape
    painting to work in good conditions? Find ways to port this to your applications.
    Chances are you are not alone in your case, and this kind of innovation can make
    the difference between good and great. To offer a different experience, build
    upon the simple, clear iOS


    interface, creating beautiful, new environments.


    CHAPTER 5: User Experience and Interface Guidelines


    Summary


    Developing for mobile devices isn’t easy. You’ll have to move away from a number
    of principles and habits that ruled on the traditional Web to produce successful
    web applications. All iOS-based devices provide excellent support for standards,
    a clean interface, and nifty features for your applications—and thus users—to
    benefit from.


    Nonetheless, this comes with its share of constraints. You should be extremely
    careful not to disappoint your users and always bring them the best experience
    possible, taking into account the standards they have become used to seeing.


    Think about your design process from the ground up but without forgetting what
    you may have learned from previous development. You have plenty tools available
    to you, so make the most of them by creating a relevant and unique experience.
    In the next


    chapters, we will be getting into more thorough detail of what is possible to
    achieve with the WebKit and iOS technologies.


    **6**


    ****Chapter**


    Interesting CSS Features


    for Your Web Application


    User Interface


    HTML5 takes document semantics even further than previous versions of the language.


    However, if you’ve been a front-end developer for some time, you must be conscious
    that an appealing design often implies hard dilemmas and superfluous markup. In
    this chapter, we’ll go through a number of CSS features that are going to make
    your web application developing process much faster, richer, and cleaner. Some
    make long-awaited enhancements hassle free and easy to maintain, and others are
    more complex but are going to open a whole new range of layout and design opportunities
    for your web application on Mobile Safari.


    Note that many of the features explained in this chapter are either pretty new
    and considered unstable or WebKit specific and therefore are prefixed with the
    WebKit’s proprietary -webkit-. This can be needed for property values and is required
    for most of the properties we are going to explain. As a good practice, you should
    always declare the WebKit-specific rule followed by the proper, non-prefixed rule
    to achieve maximum forward compatibility.


    Keep all this in mind, and dive into the new wonders that Mobile Safari is making
    available to you.


    Improving the User Experience with CSS


    Before we introduce a number of CSS treats brought by the CSS3 specification and


    some others often sacrificed to browser compatibility, let’s go through a few
    Mobile Safari–specific CSS features. Although the CSS goodness to be presented
    in this


    chapter will help you increase and refine your control over the layout and design
    of your pages, you are targeting a specific OS and browser, both of which have
    strong user 117


