  trans: "\n显然，这个方法并不灵活，而且它意味着你所有的处理函数只会在全局处理函数被调用时触发。在大多数情况下，应该优先使用`addEventListener()`和`removeEventListener()`方法。\n\
    \n# 第 13 章：使用触摸和手势事件\n\n## 捕获阶段\n\n`addEventListener()`方法的第三个参数指定是否仅为捕获阶段添加监听器，这意味着它不会在目标阶段和冒泡阶段被触发。捕获阶段是一种事件在分配给目标本身之前，可以被目标的父级处理的过程。\n\
    \n```\n<div>0<div>1<div>2<div>3<div>4\n<div>5</div>\n</div></div></div></div></div>\n\
    \n<script>\nvar div = document.getElementsByTagName(\"div\");\ndiv[0].addEventListener(\"\
    click\", handleEvent, false);\ndiv[1].addEventListener(\"click\", handleEvent,\
    \ false);\ndiv[2].addEventListener(\"click\", handleEvent, false);\ndiv[3].addEventListener(\"\
    click\", handleEvent, false);\ndiv[4].addEventListener(\"click\", handleEvent,\
    \ false);\ndiv[5].addEventListener(\"click\", handleEvent, false);\n\nfunction\
    \ handleEvent(event) {\n    console.log(\"(\" + event.eventPhase + \") \" + this.firstChild.nodeValue);\n\
    }\n</script>\n```\n\n在这段代码中，每个`<div>`都是下一个`<div>`的父级。因此，每次点击一个数字都会先到达直接目标（目标阶段），然后沿着\
    \ DOM 树向上移动到最顶层的祖先（冒泡阶段）。例如，点击 4 将会在控制台输出 4, 3, 2, 1, 0。当然，只有存在监听器时，祖先才会接收到事件。\n\
    \n为了精确识别事件目标，你可以依赖`Event`对象的两个属性。\n\n- `target`属性保存了事件的真实目标；在前面的例子中点击 4，它会返回一个指向包含字符串“4”的元素的引用。\n\
    - `currentTarget`属性是一个引用，指向在冒泡阶段或捕获阶段接收事件的对象。\n\n在像前面定义的这样一个处理函数中，`this`和`currentTarget`是相等的；相反，如果我们的处理函数被绑定到了一个对象，`this`将指向那个对象。此外，你可以使用`eventPhase`属性简单地确定与接收事件相关的阶段，该属性的可能取值在表\
    \ 13-1 中列出。\n\n### 表 13-1. 不同事件阶段使用的常量\n\n| 常量 | 描述 |\n| :--- | :--- |\n| `event.CAPTURING_PHASE`\
    \ (1) | 当前事件阶段是捕获阶段。 |\n| `event.AT_TARGET` (2) | 当前事件阶段是目标阶段。 |\n| `event.BUBBLING_PHASE`\
    \ (3) | 当前事件阶段是冒泡阶段。 |\n\n现在，如果你将第一个监听器的第三个参数从`false`改为`true`，日志的顺序将会改变，因为事件将首先处于捕获阶段。控制台将显示\
    \ 0, 4, 3, 2, 1。捕获处理函数总是被添加到调用栈的顶部。\n\n## 控制事件传播\n\n如果你想精确控制 Web 应用程序中的每一次点击——例如，我们在第\
    \ 4 章中为保持应用程序全屏模式所做的那样——你需要使用捕获（将第三个参数设置为`true`）。例如，如果用户未登录，捕获可以让你阻止用户点击某些元素。`Event`对象的`stopPropagation()`方法允许你在任何选择的时刻阻止事件的传播。这样，尝试修改我们之前的处理函数如下：\n\
    \n```\ndiv[0].addEventListener(\"click\", handleEvent, true);\n...\nfunction handleEvent(event)\
    \ {\n    console.log(\"(\" + event.eventPhase + \") \" + this.firstChild.nodeValue);\n\
    \    if (event.eventPhase == event.CAPTURING_PHASE) {\n        event.stopPropagation();\n\
    \    }\n}\n```\n\n只有值 0 会被记录到控制台，这对应于第一个`<div>`的文本，因为任何子`<div>`的传播在捕获阶段就被直接停止了。这并不意味着使用相同`currentTarget`并在同一阶段定义的监听器不会被调用，但使用此方法意味着无法保证你的处理函数会被触发，因为该过程可能在任何时刻被更高层级的另一个处理程序中断。\n\
    \n## 阻止默认行为\n\n通常，局部地阻止浏览器对某些事件的默认行为也是可取的，典型情况包括在点击链接或提交按钮时更改 URL，或使用`touchstart`事件阻止手势效果。这可以通过使用`preventDefault()`方法来实现，前提是该事件可以被取消。你可以通过读取`Event`对象的`cancelable`属性来检查这一点。请注意，此方法具有不停止传播的优点。\n\
    \n## 处理函数和对象方法\n\n在某些情况下，你需要使用基于对象方法的处理函数，并且必须恢复调用上下文，如第 10 章所示，并将该方法封装在一个新的`Function`对象中。这当然意味着更多的内存使用。为了解决这个问题，从\
    \ DOM Level 2 开始，你可以使用`EventListener`接口的`handleEvent()`方法。要利用此方法的优势，你应该简单地使用`this`关键字或任何其他实现该函数的对象实例，来代替通常作为参数传递给`addEventListener()`方法的`Function`对象。\n\
    \n```\nsomeObject.addEventListener(\"click\", this, false);\n```\n\n通过这种方式，脚本引擎将寻找一个附加到`this`上的`handleEvent()`方法，并调用该方法，将`Event`派生的对象（`MouseEvent`，`TouchEvent`...）及其所有属性传递给它。当`handleEvent()`位于\
    \ window 级别或直接位于对象定义下时，可以使用关键字`this`。在其他情况下，你需要传递一个对象实例，如下所示：\n\n```\n<div>Click\
    \ Me</div>\n<script>\n/* 一个示例对象 */\nvar Example = function(name) {\n    this.name\
    \ = name;\n}\n\nExample.prototype.handleEvent = function(event) {\n    switch\
    \ (event.type) {\n        case \"mousedown\":\n        case \"mouseup\":\n   \
    \         thisevent.type + \"Handler\";\n    }\n}\n\nExample.prototype.mousedownHandler\
    \ = function(event) {\n    console.log(\"The 'mousedown' handler was called with\
    \ \" + this.name + \".\");\n}\n\nExample.prototype.mouseupHandler = function(event)\
    \ {\n    console.log(\"The 'mouseup' handler was called with \" + this.name +\
    \ \".\");\n}\n\n/* 创建 2 个对象并将它们用作事件处理函数 */\nvar div = document.getElementsByTagName(\"\
    div\")[0];\nvar obj1 = new Example(\"Object 1\");\nvar obj2 = new Example(\"Object\
    \ 2\");\ndiv.addEventListener(\"mousedown\", obj1, false);\ndiv.addEventListener(\"\
    mouseup\", obj2, false);\n</script>\n```\n\n**--- 结果 ---**\n\n```\n> The 'mousedown'\
    \ handler was called with Object 1.\n> The 'mouseup' handler was called with Object\
    \ 2.\n```\n\n在这段代码中，事件的处理被委托给了`Example`的两个实例。如你所见，执行上下文得以维持，每个事件都使用预期的`name`值触发一条日志。为了方便维护，子处理函数已被外部化为特定的方法，这些方法利用\
    \ JavaScript 通过哈希表提供对象属性的能力来调用。当然，如果你使用的代码很短，你可以直接使用`switch...case`而无需任何额外的方法。\n\
    \n## Mobile Safari 中的经典事件\n\n虽然苹果便携设备不支持外部指点设备，但通常与鼠标相关的事件在 Mobile Safari 中是受支持的。然而，这用处有限，因为它们只是被模拟出来的，并且其反应可能与桌面环境中的预期有所不同。\n\
    \n### 鼠标事件的行为\n"
- fmt: "# 触摸事件与多点触控\n\n尽管鼠标事件会被触发，但它们仅在用户释放手指压力后才被发送。此外，所有事件同时发送，这意味着，例如，典型的系列事件（如`mouseover`、`mousemove`、`mousedown`、`mouseup`和`click`）会在最后一个事件结束时按此精确顺序同时发送。`mouseout`事件仅当用户指向一个新的、追踪鼠标事件的元素且之前已记录过`mouseover`事件时才会发送。最后，`mousemove`事件将在手指压力结束时发送，这意味着你无法像使用真正的鼠标事件那样追踪移动。\n\
    \n这些事件都是默认`touchstart`事件行为的一部分。由于触摸事件（如我们所见）总是在常规鼠标事件之前发送，因此可以在`touchstart`事件上使用本章前面介绍的`preventDefault()`方法来阻止鼠标事件的发送。这将允许你为移动版Safari和经典设备浏览器定义差异化的行为。\n\
    \n## 滚动信息\n\n另一个有用的`scroll`事件。例如，它可以用于模拟CSS的`position: fixed`规则，因为这在iPhone上不被支持。在桌面浏览器上，该事件会随着滚动条位置的变化而重复发送，而在移动版Safari上，该事件仅在用户手指离开屏幕表面时发送。这一切都表明需要特定的事件来实现与用户的交互。自iOS\
    \ 2.0版本起，已提供适当的触摸事件。\n\n## 多点触控事件\n\n苹果公司便携设备上触摸事件相对于鼠标事件的优越效率绝非必然，其他便携设备制造商更倾向于更精确地实现鼠标事件。然而，在iPhone、iPod\
    \ touch和iPad上，对触摸事件（更准确地说是使用多个同时触点的多点触控事件）的青睐，为流畅、自然且高效的导航体验奠定了基础。\n\n### 新的交互过程\n\
    \n手指的作用类似于插入终端的多个鼠标；每个手指可以从一个点“跳”到另一个点，而鼠标只能沿着桌面移动，可能触发`mousemove`事件。此外，鼠标*通常*有几个不同的按钮，你可以通过`MouseEvent`对象的`button`属性来识别其点击。使用触摸事件，一次轻触自然只能有一种状态。\n\
    \n触摸事件基本上有三种状态。每个触摸事件以`touchstart`事件开始，以`touchend`事件结束，中间可能经过一个`touchmove`事件。与`mousemove`不同，`touchmove`在`touchstart`事件之后触发，并且无论使用多少根手指（尽管限制似乎是11个同时触点），都会考虑每一个新的接触点，直到发送`touchend`事件。\n\
    \n## 处理多点触控事件\n\n触摸事件应该像其他任何事件一样，使用`addEventListener()`和`removeEventListener()`方法来监听。但务必小心，不要随意阻止浏览过程中必要的某些手势，例如平移。一个像下面这样简单的示例会阻止用户平移以发现视口外的页面部分，或显示隐藏的地址栏：\n\
    \n```javascript\ndocument.addEventListener(\"touchstart\", function(event) {\n\
    \    event.preventDefault();\n}, false);\n```\n\niOS有几个预定义的多点触控手势，例如捏合（缩放）或旋转。大多数手势可以使用触摸事件来覆盖。我们很快会详细讨论手势。\n\
    \n**警告**：作为一般规则，在修改浏览器和操作系统界面的默认行为时，务必极其小心。用户有其习惯和预期，当这些被改变或辜负时，会严重损害用户体验的质量。\n\
    \n## 无限触点"
  raw: 'Although the mouse events are triggered, they are sent only once the user
    has released finger pressure. Moreover, all events are sent at the same time,
    meaning that, for instance, a typical series of events such as mouseover, mousemove,
    mousedown, mouseup, and click would all be sent simultaneously, in this precise
    order, once the last event ended. The mouseout event will be sent only if the
    user points at a new element that tracks mouse events and a mouseover event has
    been previously recorded. Finally, the mousemove event will be sent once the finger
    pressure ends, meaning you won’t be able to track movement as you would with a
    proper mouse event.


    These events are all part of the default touchstart event behavior. Because touch
    events, as we shall see, are always sent before regular mouse events, it is possible
    to prevent the sending of a mouse event using the preventDefault() method, introduced
    earlier in this chapter, on the touchstart event. This will let you define differentiated
    behaviors for Mobile Safari and classic device browsers.


    Scrolling Information


    Another event that can come in handy is the scroll event. This can be used, for


    instance, to simulate a CSS position:fixed rule, because this is not supported
    on the iPhone. On desktop browsers, this event is sent repeatedly as the scrollbar
    position changes, whereas on Mobile Safari, the event will be sent only when the
    finger of the user leaves the screen surface. This all shows the necessity for
    specific events to implement interaction with the user. Appropriate touch events
    have been available since iOS version 2.0.


    CHAPTER 13: Using Touch and Gesture Events


    Multi-Touch Events


    The superior efficiency of touch events over mouse events on portable devices
    by Apple is by no means a necessity, and other portable device manufacturers have
    preferred to implement mouse events more precisely. However, the favor given to
    touch events, and more precisely Multi-Touch events using several simultaneous
    touch points, on the iPhone, iPod touch, and iPad is a base for a fluid, natural,
    and efficient navigation experience.


    New Interaction Processes


    Fingers act as several mice plugged into the terminal; each one can “jump” from
    one point to another, whereas a mouse can move only along the desktop potentially


    triggering a mousemove event. Besides, mice *usually* have several different buttons
    whose click you can identify using the button property of the MouseEvent object.
    Using touch events, a tap naturally can have but one state.


    There basically are three states for a touch event. Every touch event starts with
    a touchstart event and ends with a touchend event, possibly passing by a touchmove


    event in between. Unlike a mousemove, touchmove is triggered after a touchstart
    event and will take every new contact point into account, whatever the number
    of fingers used (though the limit appears to be 11 simultaneous contact points),
    until a touchend event is sent.


    Handling Multi-Touch Events


    Touch events should be listened for similarly to any other event, using the


    addEventListener() and removeEventListener() methods. Always be careful, however,
    not to carelessly prevent some gestures necessary to the browsing process, such
    as panning. An example as simple as the one presented here would prevent the user
    from panning to uncover parts of the page outside the viewport or showing a hidden
    address bar:


    document.addEventListener("touchstart", function(event) {


    event.preventDefault();


    }, false);


    iOS has several predefined Multi-Touch gestures, such as pinch (to zoom) or rotate.


    Most can be overridden using touch events. We shall soon get into more detail
    about gestures.


    WARNING: As a rule of thumb, always be extremely careful when modifying the default
    behavior of the browser and OS interface. The user has habits and expectations,
    which when changed or disappointed can severely harm the quality of the user experience.


    CHAPTER 13: Using Touch and Gesture Events


    Unlimited Touch Points'
  trans: "\n# 触摸事件与多点触控\n\n尽管鼠标事件会被触发，但它们仅在用户释放手指压力后才被发送。此外，所有事件同时发送，这意味着，例如，典型的系列事件（如`mouseover`、`mousemove`、`mousedown`、`mouseup`和`click`）会在最后一个事件结束时按此精确顺序同时发送。`mouseout`事件仅当用户指向一个新的、追踪鼠标事件的元素且之前已记录过`mouseover`事件时才会发送。最后，`mousemove`事件将在手指压力结束时发送，这意味着你无法像使用真正的鼠标事件那样追踪移动。\n\
    \n这些事件都是默认`touchstart`事件行为的一部分。由于触摸事件（如我们所见）总是在常规鼠标事件之前发送，因此可以在`touchstart`事件上使用本章前面介绍的`preventDefault()`方法来阻止鼠标事件的发送。这将允许你为移动版\
    \ Safari 和经典设备浏览器定义差异化的行为。\n\n## 滚动信息\n\n另一个有用的`scroll`事件。例如，它可以用于模拟 CSS 的`position:\
    \ fixed`规则，因为这在 iPhone 上不被支持。在桌面浏览器上，该事件会随着滚动条位置的变化而重复发送，而在移动版 Safari 上，该事件仅在用户手指离开屏幕表面时发送。这一切都表明需要特定的事件来实现与用户的交互。自\
    \ iOS 2.0 版本起，已提供适当的触摸事件。\n\n## 多点触控事件\n\n苹果公司便携设备上触摸事件相对于鼠标事件的优越效率绝非必然，其他便携设备制造商更倾向于更精确地实现鼠标事件。然而，在\
    \ iPhone、iPod touch 和 iPad 上，对触摸事件（更准确地说是使用多个同时触点的多点触控事件）的青睐，为流畅、自然且高效的导航体验奠定了基础。\n\
    \n### 新的交互过程\n\n手指的作用类似于插入终端的多个鼠标；每个手指可以从一个点“跳”到另一个点，而鼠标只能沿着桌面移动，可能触发`mousemove`事件。此外，鼠标*通常*有几个不同的按钮，你可以通过`MouseEvent`对象的`button`属性来识别其点击。使用触摸事件，一次轻触自然只能有一种状态。\n\
    \n触摸事件基本上有三种状态。每个触摸事件以`touchstart`事件开始，以`touchend`事件结束，中间可能经过一个`touchmove`事件。与`mousemove`不同，`touchmove`在`touchstart`事件之后触发，并且无论使用多少根手指（尽管限制似乎是\
    \ 11 个同时触点），都会考虑每一个新的接触点，直到发送`touchend`事件。\n\n## 处理多点触控事件\n\n触摸事件应该像其他任何事件一样，使用`addEventListener()`和`removeEventListener()`方法来监听。但务必小心，不要随意阻止浏览过程中必要的某些手势，例如平移。一个像下面这样简单的示例会阻止用户平移以发现视口外的页面部分，或显示隐藏的地址栏：\n\
    \n```javascript\ndocument.addEventListener(\"touchstart\", function(event) {\n\
    \    event.preventDefault();\n}, false);\n```\n\niOS 有几个预定义的多点触控手势，例如捏合（缩放）或旋转。大多数手势可以使用触摸事件来覆盖。我们很快会详细讨论手势。\n\
    \n**警告**：作为一般规则，在修改浏览器和操作系统界面的默认行为时，务必极其小心。用户有其习惯和预期，当这些被改变或辜负时，会严重损害用户体验的质量。\n\
    \n## 无限触点\n"
- fmt: "可以同时捕获的事件数量理论上不应成为开发过程中的限制，因为每根手指都可以舒适地处理一个事件。每个手指的位置可以通过新的`TouchEvent`对象及其`touches`属性获取。该属性提供一个`TouchList`，其中包含每个接触点的`Touch`对象，无论事件目标如何。每当检测到新的手指按压时，就会触发新的`touchstart`事件，列表也会随之更新，添加一个新的`Touch`对象。\n\
    \n还有另外两个使用`TouchList`对象的属性：`targetTouches`，它包含所有与触发事件的目标相关的`Touch`对象；以及`changedTouches`，应按如下示例使用：\n\
    \n```html\n<!DOCTYPE html>\n<html>\n<head>\n<title>Multi-Touch Demo</title>\n\
    <meta name=\"viewport\" content=\"width=device-width; initial-scale=1.0; maximum-scale=1.0;\
    \ user-scalable=no\">\n<style>\ndiv {\n  -webkit-user-select: none;\n  position:\
    \ absolute;\n  width: 44px;\n  height: 44px;\n  text-align: center;\n  background-color:\
    \ black;\n  -webkit-border-radius: 22px;\n}\ndiv span {\n  display: block;\n \
    \ font: bold 9px/15px sans-serif;\n  margin-top: -15px;\n}\n</style>\n<script>\n\
    document.addEventListener(\"touchstart\", handleTouch, false);\ndocument.addEventListener(\"\
    touchmove\", handleTouch, false);\ndocument.addEventListener(\"touchend\", handleTouch,\
    \ false);\nfunction handleTouch(event) {\n  var touch = event.changedTouches;\n\
    \  for (var n = 0; n < touch.length; n++) {\n    var id = \"i\" + touch[n].identifier;\n\
    \    var div = document.getElementById(id);\n    if (!div) {\n      div = document.createElement(\"\
    div\");\n      div.innerHTML = \"<span>\" + id.substr(1) + \"<span>\"; div.id\
    \ = id;\n      document.body.appendChild(div);\n    }\n    div.style.left = (touch[n].pageX\
    \ - 22) + \"px\";\n    div.style.top = (touch[n].pageY - 22) + \"px\";\n    div.style.opacity\
    \ = (event.type == \"touchend\") ? 0.05 : 1.0;\n  }\n  event.preventDefault();\n\
    }\n</script>\n</head>\n<body></body>\n</html>\n```\n\n这段代码会为每个新的接触点（图13-1）添加一个圆盘状的`<div>`，并跟随手指移动，实现拖放效果。为了确定新的接触点，我们使用了`changedTouches`属性，该属性包含了所有触发事件的、新增或修改的`Touch`对象。这同样与初始对象目标无关，允许你仅删除相关的元素。\n\
    \n**图13-1.** iPad 屏幕上的每次手指触摸都由一个圆圈表示\n\n> **警告：** 从 iOS 3.2 版本开始，`touchend`事件的触摸属性变得不可靠，`touches`和`targetTouches`将始终为空。这意味着只有`changedTarget`属性能够让你适当地处理触摸释放，但它会包含所有当前的触摸点，使其使用变得困难，甚至不可能。如果你需要使用此事件，请在\
    \ iPad 上彻底测试，以免应用上线时出现意外问题。\n\n`Touch`对象有一个`identifier`属性，为每个实例保存一个唯一标识符。由于触摸发生的顺序不固定，且用户可能按特定顺序触摸屏幕却无序地移开手指，我们使用该属性来识别之前创建的`<div>`。因为系统可能会回收和重用标识符，我们不会删除之前的圆盘；相反，当标识符被回收时，我们通过改变其透明度来观察其移动。\n\
    \n**表13-2.** `Touch`对象的属性\n\n| 属性 | 描述 |\n| :--- | :--- |\n| `touch.pageX` 和 `touch.pageY`\
    \ | 表示触摸事件相对于完整页面的位置。 |\n| `touch.clientX` 和 `touch.clientY` | 应表示事件相对于客户端区域的位置，但返回与`pageX`和`pageY`相同的值。\
    \ |\n| `touch.screenX` 和 `touch.screenY` | 应表示事件相对于屏幕的位置，但返回与`pageX`和`pageY`相同的值。但会根据视口的缩放比例进行调整。\
    \ |\n| `touch.identifier` | `Touch`实例的唯一标识符。 |"
  raw: 'The limit to the number of simultaneous events you can catch should logically
    never be a drawback in your developing process, because you can comfortably handle
    one event per finger. Each finger position can be gathered using the new TouchEvent
    object and its touches property. This property provides a TouchList holding a
    Touch object for each contact point, regardless of the event target. Whenever
    a new finger press is received, a new touchstart event is triggered, and the list
    is updated with a new Touch object.


    There are two other properties using the TouchList object: targetTouches, which
    holds all the Touch objects related to the target triggering the event, and changedTouches,
    which should be used as in the following example:


    <!DOCTYPE html>


    <html>


    <head>


    <title>Multi-Touch Demo</title>


    <meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0;
    user-scalable=no">


    <style>


    div {


    -webkit-user-select: none;


    position: absolute;


    width: 44px;


    height: 44px;


    text-align: center;


    background-color: black;


    -webkit-border-radius: 22px;


    }


    div span {


    display: block;


    font: bold 9px/15px sans-serif;


    margin-top: -15px;


    }


    </style>


    <script>


    document.addEventListener("touchstart", handleTouch, false);


    document.addEventListener("touchmove", handleTouch, false);


    document.addEventListener("touchend", handleTouch, false);


    function handleTouch(event) {


    var touch = event.changedTouches;


    for (var n = 0; n < touch.length; n++) {


    var id = "i" + touch[n].identifier;


    var div = document.getElementById(id);


    if (!div) {


    div = document.createElement("div");


    div.innerHTML = "<span>" + id.substr(1) + "<span>"; div.id = id;


    ![](index-397_1.jpg)


    CHAPTER 13: Using Touch and Gesture Events


    document.body.appendChild(div);


    }


    div.style.left = (touch[n].pageX - 22) + "px";


    div.style.top = (touch[n].pageY - 22) + "px";


    div.style.opacity = (event.type == "touchend") ? 0.05 : 1.0;


    }


    event.preventDefault();


    }


    </script>


    </head>


    <body></body>


    </html>


    This code simply adds a disc-shaped <div> for every new contact point (Figure
    13–1) that follows finger movement, in a kind of drag-and-drop style. To determine
    new


    contact points, we use the changedTouches property that holds all added or modified
    Touch objects that have triggered an event. This again happens independently from
    the initial object target, which allows you to delete only the relevant elements.


    Figure 13–1\. Each finger touch on the iPad screen is materialized by a circle


    i


    CHAPTER 13: Using Touch and Gesture Events


    WARNING: From iOS version 3.2, the touch properties of the touchend event are
    unreliable, and touches and targetTouches will systematically remain empty. This
    implies that only the changedTarget property could let you appropriately handle
    the release of touches, but this will hold all current touches, making its use
    difficult, if not impossible. If you need to use this event, test it thoroughly
    on the iPad to avoid unpleasant surprises when your application goes online.


    The Touch object has a identifier property holding a unique identifier for every


    instance. Because the order in which touches occur isn’t fixed and the user can
    point fingers in one specific order and take them disorderly off the screen, we
    use this property to determine the previously created <div>. Because identifiers
    can be recycled and reused by the system, we do not delete previous discs; instead,
    we simply change its opacity to observe its movement when its identifier is recycled.


    Table 13–2\. Properties of the *Touch* Object


    **Properties Description**


    Represent the position of the touch event relative to the full


    *touch*.pageX and *touch*.pageY


    page.


    *touch*.clientX and *touch*.clientY


    Should represent the position of the event relative to the


    client area but returns the same values as pageX and pageY.


    *touch*.screenX and *touch*.screenY


    Should represent the event position relative to the screen


    but returns the same values as pageX and pageY. Values are


    adjusted, however, to the scale of the viewport.


    *touch*.identifier


    The unique identifier to the Touch instance.'
