    \ = this.responseText;\n    processFeed(this.responseXML);\n    buttonState(false);\n\
    \  }\n}\n```\n\nBecause it isn't possible to store anything else than strings,\
    \ we store the XML as text using `responseText`. This will be transformed to XML\
    \ later using the `DOMParser` object.\n\nWe also record the date to calculate\
    \ the cache Time To Live (TTL).\n\n## Using the Cache\n\nOur cache is now ready\
    \ for use. This is handled from the `refresh()` method.\n\n```javascript\nfunction\
    \ refresh() {\n  var last = new Date(window.localStorage.feedDate || 0);\n  var\
    \ ttl = new Date() - 1000 * 60 * 60 * 1;\n  if (last <= ttl) {\n    // ...\n \
    \   // Download from Wow! eBook <www.wowebook.com>\n  } else {\n    var xml =\
    \ (new DOMParser()).parseFromString(\n      window.localStorage.feedXML, \"text/xml\"\
    );\n    processFeed(xml);\n  }\n}\n```\n\nThe date is serialized as a string,\
    \ which can be easily reversed by passing the resulting string to the constructor\
    \ of the `Date` object. This way, we can calculate the time elapsed since the\
    \ last cache was stored and allow the Ajax request to run only if this time is\
    \ more than one hour ago. Otherwise, we use the `parseFromString()` method of\
    \ the `DOMParser` object to convert our text to an XML document.\n\n> **NOTE:**\
    \ The `DOMParser` object is actually part of no standard but is implemented in\
    \ some way on most browsers including Mobile Safari, so you can safely rely on\
    \ it.\n\nCurrently, when the user clicks the Refresh button, the script will use\
    \ the cache if that seems reasonable or load the content anew otherwise.\n\n##\
    \ Sending Client Data to the Server\n\nOne issue with cookies is that they are\
    \ automatically sent with every request to the server—needlessly increasing data\
    \ transfer sizes—which of course is an especially bad thing when working with\
    \ unreliable connections.\n\nStorage area data isn't sent this way. However, you\
    \ may actually need to send data from a storage area to the server, for instance\
    \ when a user validates a cart. To do this, you can catch the check-out form validation\
    \ event and add information necessary to process the shopping cart. Supposing\
    \ our product IDs have been stored under the `products` key, we could use code\
    \ similar to this:\n\n```html\n<script>\n/* Sample content */\nwindow.sessionStorage.products\
    \ = \"3,5,9,100\";\n\nfunction appendData(form) {\n  var products = form.elements[\"\
    products\"];\n  products.value = window.sessionStorage.products || \"\";\n}\n\
    </script>\n\n<form method=\"get\" action=\"checkout.php\" onsubmit=\"appendData(this)\"\
    >\n  <input type=\"hidden\" name=\"products\">\n  <input type=\"submit\" value=\"\
    Checkout\">\n</form>\n```\n\nWhen the form is submitted, the value of the `products`\
    \ input is updated with the values from the `sessionStorage` (if any), and the\
    \ form is submitted with the relevant data.\n\nWhen several properties from the\
    \ storage area have to be passed to the form, it is possible to iterate through\
    \ the elements of the form to check whether a property is available for each element.\
    \ Hence, by using the same names for the storage area properties and the form\
    \ fields, you can easily create a generic function to facilitate data exchange.\n\
    \n```javascript\nfunction exchangeData(form) {\n  var all = form.elements;\n \
    \ for (var i = 0; i < all.length; i++) {\n    var data = window.sessionStorage.getItem(all[i].name);\n\
    \    if (data) {\n      all[i].value = data;\n    }\n  }\n}\n```\n\nThis function\
    \ is basic. Of course, to be functional in real-life cases, the script should,\
    \ for instance, handle different input types, such as check boxes, whose value\
    \ shouldn't be changed but should be checked or unchecked.\n\nYou could also use\
    \ a similar method directly on classic links:\n\n```html\n<script>\nfunction appendData(link)\
    \ {\n  var url = link.href;\n  link.search += (link.search ? \"&\" : \"\") + \"\
    products=\" +\n    encodeURIComponent(window.sessionStorage.products);\n}\n</script>\n\
    \n<a href=\"checkout.php\" onclick=\"appendData(this)\">Checkout</a>\n```\n\n\
    This method yields the same results as the previous. By modifying the `Location`\
    \ object of the link passed as a parameter to the `appendData()` function, we\
    \ add the data to the query string. The server-side script will have the necessary\
    \ data available to process the user cart.\n\n## SQL Local Database\n\nThe Storage\
    \ API, like cookies, offers a useful way to handle rather simple data. However,\
    \ there is another alternative to store data on the client when needs are more\
    \ specific. The Web Database specification, which is maintained by an entity of\
    \ the W3C, will let you take client side storage further.\n\nAlthough this API\
    \ is more complex to use than the Storage API, the handling of data is made more\
    \ flexible, for instance with the use of powerful sorting, more advanced possibilities\
    \ as for data structure, and easier update processes. Moreover, more data types\
    \ are available for storage.\n\nData stored using the Database API can be queried\
    \ using Structured Query Language (SQL), a language used by most relational database\
    \ management systems (RDBMSs), like mySQL, SQL Server, or Oracle. The SQL dialect\
    \ implemented in all browsers to date is based on a subset of SQLite 3.6.19.\n\
    \n> **NOTE:** The functioning of RDBMSs and how to use SQL is beyond the range\
    \ of this book. Quite a few commands will be used and explained in our examples,\
    \ but you can find thorough information in the SQLite documentation at [www.sqlite.org](http://www.sqlite.org).\n\
    \nThis API can be used in your web applications, because it is already implemented\
    \ in WebKit browsers. However, the current implementation of the API functions\
    \ is a mix of synchronous and asynchronous versions. In other words, for now opening\
    \ the database will be a synchronous operation, while querying it will be done\
    \ asynchronously.\n\n## Opening the Database\n\nWith a classic DBMS, a new database\
    \ is generally created with the SQL command `CREATE DATABASE`. In the case of\
    \ web databases, in order to protect data integrity when the schema changes and\
    \ limit errors, the database creation is done with the `openDatabase()` function\
    \ from the `WindowDatabase` interface. No actual SQL command related to the creation\
    \ or modification of the database itself is available."
