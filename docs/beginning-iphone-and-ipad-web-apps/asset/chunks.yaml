    Summary


    Naturally, you can dynamically generate your manifest file using PHP or any other
    server-side scripting language, similarly to what we did in Chapter 6 to generate
    a list of images for our Photos-like album. This opens a full range of possibilities
    to develop complex yet flexible applications.


    Making your applications work both online and offline in a satisfying manner is
    a great step toward a native application–like experience, and the different storage
    APIs should let you customize your data behavior to most of what your application
    requires.


    Combine this with full-screen mode, a user interface, and behavior similar to
    that of iOS, and users will wonder why they ever went to the App Store.


