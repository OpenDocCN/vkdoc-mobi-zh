- fmt: "# Figure 15–4. The News List Resulting from a SQL Query in Desktop Safari’s\
    \ Web Inspector\n\nYou can now modify the Web Storage example to use the database\
    \ rather than cache.\n\n## Using Database in Place of Storage\n\nTo use Web Database\
    \ rather than Web Storage for our sample application, you simply need to modify\
    \ the `init()` function and add a success handler to the `updateFeed()` function\
