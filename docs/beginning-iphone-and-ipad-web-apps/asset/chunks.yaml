    # 全力提升可及性


    如果你属于"眼见为实"的类型，这里有一个完美的测试。在你的服务器根目录下创建一个 PHP 文件。在 Komodo Edit 中，可通过菜单项 **文件**
    ➤ **新建** ➤ **新建文件...** 并选择 PHP 文件模板来完成。在新创建的文件中，输入以下代码：


    ```

    <?php


    phpinfo();


    ?>

    ```


    将该文件以 `index.php` 为名保存到你的服务器根目录。现在在浏览器中打开你的本地站点：你应该会看到显示服务器配置详细信息的表格。这意味着两件事：首先，你成功运行了一个
    PHP 脚本，说明一切正常；其次，你可以查看新服务器上可用的所有选项。


    ## 第 2 章：开发环境


    **警告：** 如果浏览器提示下载该文件，说明安装过程中出现了问题。请检查前面描述的步骤，找出遗漏之处。


    此时，你甚至可以在你心爱的苹果设备上打开这个页面。只需确认几个条件：在所有系统中，你的电脑和设备需要连接同一个 Wi-Fi 网络。使用 SDK 模拟器时通常能满足这一条件，因为服务器和模拟器共享同一台电脑。在
    Windows 系统中，正如我们之前解释的那样，你需要输入 IP 地址，而不是计算机名。


    在任何情况下，如果你选择 IP 地址方案，请注意大多数 Wi-Fi 连接都使用**动态主机配置协议（DHCP）**。这意味着 IP 地址会被动态分配，因此很可能会发生变化：虽然你在家中或办公室可能可以随时使用同一个
    IP 地址访问服务器，但在不同地点之间切换——或在星巴克建立连接——很可能需要你做出更改。


    ## 你一定做到了！


    好吧，你已经在这里开始做一些令人兴奋的事情了。也许这是你第一次搭建一个功能正常的服务器，在向世界展示之前，用来托管和提供你正在进行的工作成果。


    现在你对网站的工作原理有了更好的理解，这也是一件好事。最后，但绝不是最不重要的，为了让这个配置部分更加完整，我们需要介绍你将在整个 Web 应用开发生涯中广泛使用的工具：**调试工具**。


    # 第 3 章：介绍开发者与调试工具


    开发 Web 应用需要专门的调试工具，或者甚至存在这样的工具，这并非显而易见。就在不久之前，前端开发还严重缺乏用于分析和调试页面组件的优秀工具。但 Web
    已经发生了巨大的演变：前端调试工具如雨后春笋般涌现，如今大多数主流浏览器都内置了调试工具或可以轻松添加扩展。


    此类解决方案的激增虽是近年之事，但绝不令人意外。构建一个网站通常意味着将标记语言、样式语言和脚本语言紧密结合起来。随着网站变得越来越复杂，跟踪这些构建块的所有元素也可能会变得更加复杂。


    由于我们将专门使用基于 WebKit 的 Mobile Safari 浏览器，而且 WebKit 为 Desktop Safari 设计的调试工具非常出色，因此让我们从
    Safari 的开发者工具开始。你现在距离处理真实代码只有一步之遥，我们向你保证，掌握这些工具将为你节省大量时间和麻烦。


    在本章中，我们将讨论 Safari 中的开发者工具。我们介绍的功能大多可以在其他 WebKit 浏览器中使用，但我们无法保证所有功能都在相同位置或通过相同流程找到。


    ## 与 WebKit 的开发者工具交朋友


    WebKit 不仅提供了对 Web 标准的出色支持，还提供了高级工具，例如强大的实时文档和样式编辑器以及功能齐全的 JavaScript 调试器，让前端开发者的生活更轻松。这些工具将帮助你显著加快开发过程中的各个阶段。从简单地控制你的
    HTML 标记到遵循最新 HTML5 标准的数据库管理，我们将帮助你最大限度地激活和使用这些工具。


    ---


    **注意：** 在撰写本文时，我们谈论的是最新的开发者工具每夜构建版。你可能会使用这些工具的较旧版本。如果你缺少某些功能，你始终可以从 WebKit 网站获取最新版本：[`nightly.webkit.org`](http://nightly.webkit.org/)。


    ## 启用开发菜单


    自然，在 Safari 上使用这些工具的第一步是启动 Safari。从偏好设置窗口（**文件** ➤ **偏好设置...**）中，选择"**高级**"标签页。在此部分，你需要勾选"**在菜单栏中显示‘开发’菜单**"选项（见图
    3–1）。现在，你的浏览器菜单栏中多了一个名为"**开发**"的菜单项。你也可以在工具栏中添加一个"i"按钮，还可以随时通过右键点击网页上的任何元素，并从上下文菜单中选择"**检查元素**"来访问这些工具。


    ---


    **图 3–1.** 你可以从高级偏好设置中启用开发菜单


    ## 探秘开发菜单


    现在让我们来探索"**开发**"菜单，如图 3–2 所示。第一个选项允许你在电脑上可用的其他浏览器中打开当前页面。由于我们的目标是 Safari，你可能不会经常使用这个选项。


    ---


    **图 3–2.** 新的"开发"菜单直接提供了许多选项


    然而，第二个选项可能会更常用。启用 WebKit 的开发者工具后，你可以更改 Safari 的用户代理，从技术上讲，这意味着更改浏览器发送给远程服务器以标识自身、引擎及其版本等的字符串。如果你在
    Desktop Safari 上进行开发，但想实现浏览器或平台嗅探功能（而不是依赖特性检测）来为某些用户启用特定功能，或者你想访问一个除 Mobile Safari
    之外的其他浏览器无法访问的站点，这个功能将会很有用。通过此菜单更改桌面浏览器发送的用户代理标头，将使网站将你的客户端识别为 iPhone、iPod touch
    或 iPad 上的 Mobile Safari。


    "**显示 Web 检查器**"和"**显示错误控制台**"项都将打开 Web 检查器，分别聚焦于"元素检查器"和"控制台"部分，我们将在后续内容中更详细地介绍它们。


    "**代码片段编辑器**"菜单项将打开一个不同的窗口。代码片段编辑器背后的理念是，构建或调整网页可能是一个繁琐的过程。创建文件、修改、保存、在浏览器窗口中重新加载并重新开始，这可能是一个漫长的过程，并且需要在多个窗口和应用程序之间切换。代码片段编辑器在同一个双面板窗口中处理所有这些工作。我们广泛使用它来测试本书中的代码示例，因此我们相信它也能为你提供很大的帮助。


    窗口的上半部分用于编写代码。它可以处理 HTML、CSS 和 JavaScript，并且能够管理大量的代码。下半部分会随着你的输入而更新，向你展示代码在合适的浏览器窗口中的显示效果。在原型设计阶段，这可以让你轻松测试代码并尝试多种替代方案。

