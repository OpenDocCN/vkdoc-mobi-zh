- fmt: "Here, we use parametrized queries. In a query, a parameter is represented\
    \ by a question mark, and for each question mark there needs to be an entry in\
    \ the array passed as a parameter to `executeSql()`. This technique will not only\
    \ save you the cumbersome building of long strings, it is above all a solid protection\
    \ against SQL injection attacks.\n\nWe will get into more detail about this in\
    \ the upcoming section about security.\n\nBecause queries are run asynchronously,\
    \ we need to chain the calls using callbacks.\n\nMoreover, because creating tables\
    \ and inserting initial data is an atomic and sequential operation, the same transaction\
    \ has to be used so that, if an error should occur, all operations are canceled.\
    \ Therefore, we pass a reference to `initFeedList()` to the `createSchema()` function,\
    \ which will be called after the tables have been created.\n\n```\nfunction initDatabase(db)\
    \ {\n  db.transaction(function(transaction) {\n    createSchema(transaction, initFeedList);\n\
    \  });\n}\n```\n\nTo make parametrized queries usable, we need to improve the\
    \ `executeSequence()` method in order to pass the parameters. Also, because a\
    \ query can be used several times for a same data set, we add the possibility\
    \ to loop through a set of queries for a set of given parameters.\n\n```\nfunction\
    \ createSchema(tran, next) {\n  ...\n  executeSequence(tran, schema, null, next);\n\
    }\n\nfunction executeSequence(tran, list, params, next) {\n  params = params ||\
    \ [];\n  var max = Math.max(list.length, params.length);\n  var i = -1;\n  (function\
    \ recursive(tran) {\n    if (++i < max) {\n      tran.executeSql(list[i % list.length],\
    \ params[i], recursive);\n      /* Sequence completed */\n    } else if (next)\
    \ {\n      next(tran);\n    }\n  })(tran);\n}\n```\n\nWe calculate the utmost\
