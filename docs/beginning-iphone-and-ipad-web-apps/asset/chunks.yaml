    \ for the `ResultSet` object properties.\n\n## CHAPTER 15: A Better Handling of\
    \ Client-Side Data Storage\n\n### Table 15–2. Properties of the *SQLResultSet*\
    \ Object\n\n| Property | Description |\n|----------|-------------|\n| `result.insertId`\
    \ | When data is inserted into a table that has a field of type `AUTOINCREMENT`,\
    \ this property holds the value of the last generated identity. If no such field\
