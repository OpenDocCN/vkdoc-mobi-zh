    \nStarts and ends profiling script execution.\n\n## `console.profileEnd(name)`\n\
    \n# CHAPTER 3: Introducing Developer and Debugging Tools\n\nSeveral of the listed\
    \ expressions can take in patterns similarly to C’s `printf()` function, with\
    \ a number of variables. Thus, you can notably use `%s` to insert a string or\
    \ `%o` to add a collapsible object structure. This can help you keep your logs\
    \ organized and consistent throughout your developing process.\n\n## Table 3–2.\
    \ Formatting Options\n\n**Format** | **Description**\n--- | ---\n`%s` | String.\n\
    `%d` or `%i` | Integer. Numeric formatting such as `%02d` is not supported.\n\
    `%f` | Floating-point number. Numeric formatting such as `%4.2f` is not supported.\n\
    `%o` | Object. With ability to see object details using a disclosure triangle.\n\
    \nHere are two examples of how to use the console log:\n\n```\nconsole.log(\"\
    My %s is great!\", \"iPhone\");\nconsole.log(\"My\", \"iPhone\", \"is great!\"\
    );\n```\n\nTo make reading easier, the console will automatically add spaces where\
    \ necessary, and objects will be represented in tree format. These two commands\
    \ will result in the same output to the console, with a link to the line where\
    \ they were run. Clicking the link will focus and highlight the relevant line.\n\
    \n## Using the Interactive Shell\n\nSometimes it can be tedious to go through\
    \ repetitive logging actions to find out the value of an object or variable. Editing\
    \ a file, saving, reloading the page, and so on, is time-consuming and overall\
    \ inefficient. Well, some of this work can be done, thanks to the inspector’s\
    \ interactive nature, by typing your commands directly in the console prompt at\
    \ the bottom of the window. The return value of the command will be printed to\
    \ the console immediately. There is a lot you can do with this functionality.\n\
    \nThe shortest way to a result is to use the logging commands we listed earlier,\
    \ but you can also run scripts that exist in your page. This will allow you to\
    \ evaluate the variables in your code, see how they behave, and tweak your page,\
    \ because all changes as a result of what you execute will be applied directly\
    \ to the affected elements, if any.\n\nPressing the up arrow will open the history\
    \ of commands you’ve already entered, from most to least recent.\n\nThe inspector’s\
    \ interactive console even supports code completion: begin typing a command, and\
    \ suggestions will complete the word. Accept them by pressing the right arrow\
    \ or the Tab key. Also, when inside a terminal, typing `clear()` will clear all\
    \ output on the screen, though this functionality is available by clicking the\
    \ further-right icon at the bottom-left side of the window.\n\n## Let the Debugger\
    \ Do the Job\n\nIn everything we have introduced up to now, you are the one typing\
    \ the commands, determining what to do where, and determining how to do it. If\
    \ this was not enough, you can take advantage of the advanced debugger implemented\
    \ in the Web Inspector. We will use the following code to illustrate the various\
    \ tools of the debugger:\n\n```html\n<html>\n  <head>\n    <title>Testing Scripts</title>\n\
    \    <script>\n      var counter = 0;\n      var timerID = window.setInterval(myTimer,\
    \ 10000);\n\n      function myTimer() {\n        var span = document.getElementById(\"\
    count\");\n        span.textContent = incrementCounter();\n        for (var n\
    \ = 0; n < 100000; n++) {\n          new Object().toString();\n        }\n   \
    \     if (counter > 1) {\n          errorGenerator();\n        }\n      }\n\n\
    \      function incrementCounter() {\n        return ++counter;\n      }\n   \
    \ </script>\n  </head>\n  <body>\n    Timer executions: <span id=\"count\">0</span>\n\
    \  </body>\n</html>\n```\n\nWhat this code does is launch a timer that calls another\
    \ function, `myTimer()`, every ten seconds. The function in turn increments a\
    \ counter displayed in the browser, then runs through an important loop, and finally\
    \ generates an exception by calling an undefined function.\n\nOnce your page has\
    \ loaded, you can activate the debugger either from the menu or, if the Web Inspector\
    \ window is already open, by clicking the Scripts tab.\n\nThe window you have\
    \ just opened has two main parts, shown in Figure 3–17. On the left is the current\
    \ script as it is written in the file, with line numbering; if the script is directly\
    \ in a `<script>` tag in your HTML document, as in our example, you will see this\
    \ file. On the right, you will find various information about the current script.\
    \ For the moment, this part is empty.\n\n![](index-72_1.jpg)\n\n**Figure 3–17.**\
    \ The script debugger\n\nEach part of the window has dedicated buttons. On the\
    \ top left, you can choose all available scripts from a drop-down menu. From above\
    \ the right sidebar, you have the possibility to pause script execution, step\
    \ to the next function call, step into next function call or out of the current\
    \ function, and disable breakpoints using the stepping buttons.\n\n### Breakpoints\n\
    \nEven when you more or less know at which stage your script stops working, knowing\
