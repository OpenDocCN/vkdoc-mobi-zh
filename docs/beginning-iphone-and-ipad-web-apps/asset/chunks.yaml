    \n理解这种语法为你提供了丰富的可能性，可以设计重复性的布局模式，或者在不借助额外标记的情况下定位特定元素。还要注意，所有这些选择器都可以将`odd`和`even`关键字作为参数。因此，以下两条规则是相同的：\n\
    \n```css\nsection div:nth-child(2n+0)::after { content: \"even\"; }\nsection div:nth-child(even)::after\
    \ { content: \"even\"; }\n```\n\n以下两条规则也是相同的：\n\n```css\nsection div:nth-child(2n+1)::after\
    \ { content: \"odd\"; }\nsection div:nth-child(odd)::after { content: \"odd\"\
    ; }\n```\n\n另一方面，前面的例子可能不一定与下面的例子相同，因为起始点不同：\n\n```css\nsection div:nth-last-child(2n+0)::after\
    \ { content: \"odd or even\"; }\nsection div:nth-last-child(even)::after { content:\
    \ \"odd or even\"; }\n```\n\n最后，请注意，这些选择器作为参数所接受的表达式不应包含空白字符。以下是无效的，会被忽略：\n\n\
    ```css\nul li:nth-child(0n + 3) { font-weight: bolder; }\n```\n\n如我们所说，这些全局子元素选择器会搜索一个容器内的所有子元素，无论其类型如何。正如我们第一个例子所示，仅针对特定类型的子元素通常更可取。以下是修改后能按预期工作的版本：\n\
    \n```html\n<style>\ndiv p:first-of-type {\n  font-weight: bolder;\n}\n</style>\n\
    \n<div>\n  <h1>Some Title</h1>\n  <p>First paragraph now bolder!</p>\n  <p>Second\
    \ paragraph.</p>\n</div>\n```\n\n因此，你可以完全掌控元素的选中。\n\n## 背景的高级处理\n\n尽管以前的 CSS 版本所提供的可能性已经实现了许多令人鼓舞的设计，但它们通常使得设置背景的任务变得困难。\n"
- fmt: "从设计师的角度来看，CSS2 的背景定义功能只能算是个粗略的方案。尽管如此，随着设计日趋复杂和丰富，并融入了更多页面元素，背景如今被广泛使用。\n\n\
    此外，背景被应用在比以往更错综复杂的结构上。因此，开发者需要更精确地显示背景。\n\nCSS3 提供了一组新的背景属性，使得以往棘手且繁琐的任务变得更加简单高效。更好的定位方式以及多层背景都成为了可能。我们将介绍那些目前被\
    \ Mobile Safari 支持的属性。\n\n## 第 6 章：面向 Web 应用用户界面的实用 CSS 特性\n\n**注意：** 许多 CSS3\
    \ 特性暂时需要 `-webkit-` 前缀。这允许你更早地实现新规范，但也意味着这些规则将来会被替换并消失。\n\n因此，在你的样式表中，你应该始终先声明带\
    \ `-webkit-` 前缀的规则，紧接着声明应该使用的、不带前缀的标准规则，以避免在未来的版本不支持这个“草案”实现时出现意外。此外，因为最终实现可能会更好（无论是速度更快还是更简洁），你肯定希望一旦它准备就绪，就应用它而不是草案。因此，标准规则应该声明为第二个。\n\
    \n### 背景的原点\n\n定义背景时，它通常应用于一个带有内边距、边框和外边距的盒子。背景颜色会从边框的外边缘延伸到盒子的中心，而背景图像则相对于边框的内边缘进行定位。\n\
    \n这可以通过 CSS3 的 `background-origin` 属性进行微调，该属性在某种程度上扩展了 `background-position`，允许你指定用于定位的原点。通过几个例子可以更清楚地理解这一点：\n\
    \n```css\n<style>\ndiv {\n  float: left;\n  border: dashed 10px #000;\n  background-color:\
    \ #ccc;\n  padding: 20px;\n  width: 240px;\n  height: 240px;\n  margin: 20px;\n\
    \  background-position: bottom right;\n  background-repeat: no-repeat;\n  background-image:\
    \ url(images/flower.jpg);\n}\ndiv:nth-of-type(1) {\n  -webkit-background-origin:\
    \ border-box;\n}\ndiv:nth-of-type(2) {\n  -webkit-background-origin: padding-box;\
    \ /* default */\n}\ndiv:nth-of-type(3) {\n  -webkit-background-origin: content-box;\n\
    }\n</style>\n```\n\n```html\n<!-- Our 3 boxes -->\n<div></div>\n<div></div>\n\
    <div></div>\n```\n\n![](index-148_1.png)\n\n## 第 6 章：面向 Web 应用用户界面的实用 CSS 特性\n\
    \n在这个例子中，我们创建了三个尺寸相同、背景颜色和背景图像都相同的盒子。唯一的区别是 `background-origin` 属性的值。你可以在图 6-5\
    \ 中查看它们的行为。\n\n这些值决定了背景图像是相对于整个盒子（包含边框）、相对于带有内边距的盒子、还是仅相对于实际内容区域进行放置。该属性的默认值是\
    \ `padding-box`，也就是中间的图示。\n\n**图 6-5.** 背景的三种可能原点，分别是边框、内边距（默认）以及盒子的内容区域\n\n当然，你可能会认为这用\
    \ CSS 2.1 属性也能实现——你可以考虑边框和内边距的宽度来确定背景的位置。但这显然有严重的局限性。\n\n例如，你无法让图像移动到边框区域内，即使设置负值使其从内边距区域移回边框也无法做到。此外，为\
    \ `background-position` 等样式定义固定值通常会导致代码的可重用性降低以及相似规则的数量倍增，因为必须根据每个独立块的大小来更新这些值。使用\
    \ `background-origin` 属性不仅能给你更多的可能性，还能让你编写更全局化的样式，从而写出更少但更高效的代码。\n\n### 全局背景裁剪"
  raw: 'From a designer''s point of view, background definition possibilities with
    CSS2 could be called a rough cut. Nonetheless, backgrounds are used extensively
    today as designs grow more complex and richer and incorporate more page elements.


    Moreover, backgrounds apply on structures that are more intricate and complex
    than before. Therefore, developers need to more precisely display backgrounds.


    CSS3 offers a new set of background properties to make formerly tricky and


    cumbersome tasks easier and more efficient. Better positioning and multiple layer
    backgrounds are available. We are going to explain those that are currently supported
    by Mobile Safari.


    CHAPTER 6: Interesting CSS Features for Your Web Application User Interface


    NOTE: Many CSS3 features temporarily require a -webkit- prefix. This allows you
    to implement new specifications earlier but also implies that these rules will
    be replaced and disappear.


    Therefore, in your style sheets, you should always declare the -webkit- prefixed
    rule followed by what should be the proper, unprefixed rule, to avoid surprises
    when future versions don’t support the “draft” implementation. Also, because the
    definitive implementation will possibly be better (either faster, cleaner...),
    you will want that to be applied rather than the draft as soon as it is ready.
    Therefore, it should be declared second.


    Origin of the Background


    When defining a background, it is typically applied to a box, with some padding,
    a border, and a margin. The background color would run from the outer edges of
    the


    borders to meet at the center of the box, while a background image would be positioned
    relative to the inner edge of the border.


    This can be fine-tuned with the CSS3 background-origin property, which in a way


    extends background-position by allowing you to specify the origin for positioning.
    This will be made most clear with a couple of examples:


    <style>


    div {


    float: left;


    border: dashed 10px #000;


    background-color: #ccc;


    padding: 20px;


    width: 240px;


    height: 240px;


    margin: 20px;


    background-position: bottom right;


    background-repeat: no-repeat;


    background-image: url(images/flower.jpg);


    }


    div:nth-of-type(1) {


    -webkit-background-origin: border-box;


    }


    div:nth-of-type(2) {


    -webkit-background-origin: padding-box; /* default */


    }


    div:nth-of-type(3) {


    -webkit-background-origin: content-box;


    }


    </style>


    <!-- Our 3 boxes -->


    <div></div>


    <div></div>


    <div></div>


    ![](index-148_1.png)


    CHAPTER 6: Interesting CSS Features for Your Web Application User Interface


    For this example, we have created three boxes with the same dimensions, the same


    background color, and the same background image. The only difference is the value
    of the background-origin property. You can check their behavior in Figure 6–5.


    The values determine whether the background image should be placed relative to
    the whole box, including borders; to the box with its padding; or only to the
    actual content area. The default value for this property is padding-box, the illustration
    in the middle.


    Figure 6–5\. Three possible origins for the background, namely the border, the
    padding (default), and the content of the box


    Of course, you may think this was achievable with CSS 2.1 properties—you could


    determine the position of a background, taking into account the width of the borders
    and of the padding. This obviously had serious limitations.


    For instance, you couldn’t make the image move into the border area, even by setting
    a negative value to make it move from the padding area back into the border. Also,


    defining fixed values for styles such as a background-position typically leads
    to less reusable code and a multiplication of similar rules, because values would
    have to be updated for each individual block size. Using the background-origin
    property not only gives you more possibilities, but it also allows for more global
    styles, thus letting you write less, more efficient code.


    Global Background Clipping'
