- fmt: "# The benefits for design explained in the previous section apply also for\
    \ the next property, `background-clip`. While the “origin” of the background affected\
    \ only background images, the `background-clip` property allows you to state rules\
    \ for all background elements, that is, images and colors, by defining the background\
    \ painting area.\n\nWe can almost use the previous example by simply replacing\
    \ `origin` with `clip` in the styles—because the values for this property are\
    \ the same as for `background-origin`.\n\n```css\n<style>\ndiv {\n    ...\n  \
    \  background-position: bottom right;\n    background-repeat: no-repeat;\n   \
    \ background-image: url(images/flower.jpg);\n    -webkit-background-origin: border-box;\n\
    }\ndiv:nth-of-type(1) {\n    -webkit-background-clip: border-box; /* default */\n\
    }\ndiv:nth-of-type(2) {\n    -webkit-background-clip: padding-box;\n}\ndiv:nth-of-type(3)\
    \ {\n    -webkit-background-clip: content-box;\n}\n</style>\n```\n\nThis would\
    \ result in the behavior shown in Figure 6–6.\n\n**Figure 6–6.** The three possible\
    \ states for background clipping: from the outer edge of the border (default),\
    \ then excluding the border, then the padding (starting within the content area)\n\
    \nThe default behavior is to extend the background color into the borders of the\
    \ box. The other values prove to behave as for the background origin, only including\
    \ background colors too.\n\nBe careful, however, when using the `content-box`\
    \ value for the `background-clip` property: WebKit has implemented it as defined\
    \ in an early version of the CSS3 specification. However, because this value has\
    \ been removed from the specification, you should prefer, where possible, to combine\
    \ `background-clip` with one of its other two values to achieve the desired effect,\
    \ in case the value is removed from the browser. It is probable that for the `background-clip`\
    \ property, the `padding-box` value is the most interesting, because it allows\
    \ rich styling of borders with images—as we will soon see—or translucency.\n\n\
    ## Text-Based Background Clipping\n\nWebKit also offers the possibility to clip\
    \ the background in relation with the text from the container using the value\
    \ `text`, as shown in Figure 6–7.\n\n```css\n<style>\ndiv {\n    background-image:\n\
    \    -webkit-gradient(linear,\n    left top,\n    left bottom,\n    from(yellow),\
    \ to(red));\n    -webkit-background-clip: text;\n    color: transparent;\n}\n\
    </style>\n<div>Background Clip</div>\n```\n\n**Figure 6–7.** Image-less text rendered\
    \ as a gradient\n\nAs you can see in the code, the text color needs to be set\
    \ to `transparent` so that the container background shows through. The problem\
    \ with this is that versions of the browser that do not support this background\
    \ value will show practically no text. Luckily, you can work around this using\
    \ a WebKit-specific property supported only by versions that also support the\
    \ background property value in question, `-webkit-text-fill-color`.\n\nYou would\
    \ use it like this:\n\n```css\n-webkit-text-fill-color: transparent;\ncolor: red;\n\
    ```\n\nThis way, the text will be red for browsers that don’t support these recent\
    \ properties but will still be rendered as a gradient on latest versions of Mobile\
    \ Safari.\n\n## Sizing the Background\n\nAnother shortcoming in CSS2 backgrounds\
    \ that you have probably cursed is that background images, unlike proper HTML\
    \ images, couldn’t be resized. CSS3 brings an easy-to-use solution to this annoying\
    \ problem with the `background-size` property (prefixed with `-webkit-`).\n\n\
    We are soon going to see how you can use this new feature to bring the attractiveness\
    \ of the Photos native application to your web applications. One aspect of the\
    \ Photos application that makes it visually attractive is that all the pictures\
    \ are presented in a regular grid of thumbnails with the same format and alignment—small\
    \ squares of the same size, as shown in Figure 6–8. This results in a consistent\
    \ layout, without harming the quality of the pictures because they are all scaled\
    \ or cropped to fit in the format."
