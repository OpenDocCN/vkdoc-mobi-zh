  raw: 'The Geolocation API provides you with useful methods to get static data but
    no helper function to process this data and truly “draw” it in space. Here are
    a few calculations that may be handy in your workflow. We are going to explain
    these formulas to some extent so you can understand what is happening; nevertheless,
    as long as you know what result they yield, you can just copy the snippets and
    use them in your code.


    Distance Between Two Points


    If you are going to take your user from one point to another, it is likely that
    the distance to go will be welcome information. Because you have already learned
    to find the


    coordinates of the current and prospective positions of the user, this is rather
    easily deducted.


    ![](index-436_1.png)


    ![](index-436_2.png)


    CHAPTER 14: Location-Aware Web Applications


    Latitude and longitude lines cross each other throughout the map, forming a more
    or less regular grid. For now we will consider it regular so we can calculate
    any distance between two points with some elementary mathematical rules.


    Provided that one latitude degree (φ) roughly represents 69 miles and one longitude
    degree (λ) spans approximately 53 miles, we apply the Pythagorean theorem: our


    distance is the hypotenuse of an imaginary triangle following the latitude and
    longitude


    “sides.” The following formula returns the distance in miles between two given
    points: And here is how the formula translates to JavaScript:


    function computeDistance(p1, p2) {


    var lat1 = p1.coords.latitude;


    var lat2 = p2.coords.latitude;


    var lng1 = p1.coords.longitude;


    var lng2 = p2.coords.longitude;


    return Math.sqrt( Math.pow(69 * (lat2 - lat1), 2)


    + Math.pow(53 * (lng2 - lng1), 2) );


    }


    This will often be your best choice to determine a distance. However, it is an


    approximation. Indeed, because the earth is an oblate spheroid, latitude and longitude
    are arcs, not straight lines, meaning the distance between two points will vary


    depending where you are on the globe, especially for longitude degrees. A longitude
    degree’s length gets smaller as you get closer to either pole.


    Sharper Distance Between Two Points


    Several methods using spherical geometry can be used to calculate exact distances
    on curvy lines. Without superfluous detail, here is how to use the Haversine formula
    to determine the distance between the two points *a* and *b*:


    where


    This is the JavaScript implementation of this formula (3959 being the earth’s
    mean radius, *r*, in miles):


    function computeDistance(p1, p2) {


    var lat1 = toRad(p1.coords.latitude);


    var lat2 = toRad(p2.coords.latitude);


    var lng1 = toRad(p1.coords.longitude);


    var lng2 = toRad(p2.coords.longitude);


    var deltaLat = (lat2 - lat1);


    CHAPTER 14: Location-Aware Web Applications


    var deltaLng = (lng2 - lng1);


    var calc = Math.pow(Math.sin(deltaLat / 2) , 2) +


    Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin(deltaLng / 2) , 2);


    return 3959 * 2 * Math.asin(Math.sqrt(calc));


    }


    /* Convert degree to radian */


    function toRad(deg) {


    return deg * Math.PI / 180;


    }


    Although this method is quite precise, it is more complex and may take about three
    times longer to calculate. Again, when you do not need such precision, the first
    formula is the one to use.


