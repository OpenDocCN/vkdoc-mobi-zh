    \ the object will be accessible only from the same origin. You can refer to Chapter\
    \ 11 for more detail about browsing contexts.\n\n## Being Notified of Storage\
    \ Area Modification\n\nEvery time a storage area is modified, a `storage` event\
    \ is raised, which cannot be canceled and doesn’t bubble. It can be caught like\
    \ any other event from the `DOMWindow` object.\n\n```\nwindow.addEventListener(\"\
    storage\", function(event) {\n    /* do something with the StorageEvent object\
    \ */\n}, false);\n```\n\nThis event is sent to all documents using the modified\
    \ storage area, except the document from which the area was altered. This means\
    \ that no event will be fired if only the document from which the storage area\
    \ is modified uses the storage area. On the contrary, if this document holds an\
    \ `<iframe>`, whether the storage area is modified from the `<iframe>` or from\
    \ the main document, the other browsing context will be notified.\n\nThe `storage`\
    \ event allows you to control modifications, for instance allowing only changes\
    \ originating from the main document. However, you should be careful not to provoke\
    \ infinite event exchange, for instance by setting each browsing context to refuse\
    \ modifications by another. That the `storage` event is not sent to the document\
    \ where the action took place also is a step to prevent this.\n\nTable 15–1 lists\
    \ the properties of the `StorageEvent` object passed as a parameter to the handler.\
    \ Note that where the working draft specifies a `url` property, the WebKit implementation\
    \ uses the `uri` property.\n\n**Table 15–1.** Properties of the `StorageEvent`\
