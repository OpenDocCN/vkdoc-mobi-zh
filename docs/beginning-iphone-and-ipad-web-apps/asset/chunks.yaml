    a version change. If the `oldVersion` parameter doesn’t match the current database
    version, a `VERSION_ERR` exception will be raised.


    ![](index-478_1.jpg)


    # CHAPTER 15: A Better Handling of Client-Side Data Storage


    ## Deleting the Database


    Creating a database is very simple. However, suppressing a database can prove
    trickier.


    Dropping a database cannot be done from JavaScript, and the SQL command `DROP
    DATABASE` isn’t available either. Deleting a database, luckily, is possible, but
    only on an action by the user. This obviously is very handy in the development
    stage.


    ### With Desktop Safari


    On Desktop Safari and most WebKit-based browsers, deleting a database can be done
    from the preferences panel. Go to Safari Preferences... and select the Security
    tab. The window shown in Figure 15–5 should appear.


    **Figure 15–5.** The security panel on Desktop Safari


    Here, click the Show Databases button at the bottom of the screen to trigger a
    list of databases. You can then simply remove any of them using the Remove button.
    This way, you can test your code as many times as you need on a clean basis.


    ### With Mobile Safari


    In Mobile Safari, once a database has been created, a new menu item appears in
    the browser preferences, as shown in Figure 15–6. From there, it is possible to
    access a list of databases from the Settings application, under Safari Database.


    ![](index-479_1.jpg)


    **Figure 15–6.** Database preferences in Mobile Safari


    Simply tap the Edit button in the upper-right side of the screen, and select the
    database to delete. The options here are less rich than on the Desktop version;
    for instance, it is not possible to set an initial size for a database.


    ## Security Again


    For security reasons, the same limitations for Web Storage apply to web databases,
    namely, a strict limit on the scheme/host/port tuple. Accessing data between subdomains
    is possible using the HTML5 Cross-Document Messaging API, as explained in Chapter
    11.


    You should be careful with Web Database storage when storing critical data, such
    as user passwords or personal information. Nonreversible encryption such as MD5
    should be preferred, because reversible encrypting would imply that the encryption
    key would be somewhere in the code. Of course, because Mobile Safari has no Web
    Inspector, you could legitimately think that your database is safe, but because
    a web application can be viewed in any browser, you should apply security measures
    taking the greater risk into account.


    One security risk to be extra careful with when using web databases is SQL injection,
    which should make you very careful when building your queries. This kind of attack
    is frequent when coping with concatenated queries, where single quotes in a variable
    are not escaped, which allows for other queries to be inserted. This is especially
    easily done as requests will be readable from the client. Here is an example where
    a user enters his name, which is passed in the query:


    ```

    var name = "''; DELETE FROM Source --";

    var sql = "SELECT * FROM Source WHERE Name=''" + name + "'' AND URL IS NOT NULL";

    ```


    The semicolon is an instruction separator, and the double hyphen (`--`) begins
    a comment. Hence, this code should be interpreted as follows—emptying the `Source`
    table:


    ```

    SELECT * FROM Source WHERE Name=''''; DELETE FROM Source --'' AND URL IS NOT NULL;

    ```


    The first step to prevent this of course is to escape all single quotes inside
    user input by replacing them with two single quotes (`''''`), but it is preferable
    to use the secured version of `executeSql()`, passing an array of parameters.


    ```

    var sql = "SELECT * FROM Source WHERE Name=? AND URL IS NOT NULL";

    transaction.executeSql(sql, [name]);

    ```


    This way, as previously seen, the scripting engine will replace every question
    mark with the relevant value from the table automatically, and no injection will
    be possible. Always double-check your code for this and thoroughly think your
    queries through before moving them online, both for selection and for parameter
    lists.


    ## Offline Web Application Cache


    In addition to new storage possibilities, you can also make all or part of your
    web application available offline by storing resources in your users’ devices
    thanks to new caching possibilities brought by HTML5. This can take your web applications
    another step closer to a native application experience, because, depending on
    the use they make of your applications, users could see no difference between
    online and offline usage. Also, this allows for shorter load times in all circumstances.
    This specification is supported in Mobile Safari with iOS 2.1 and newer.


    ### How Does It Work?


    When your pages are first loaded inside the browser, an attached manifest document
    will be loaded holding information on how to handle resources from your application.
    This way, on subsequent connections to the application, the relevant files would
    be expectedly cached and would not be loaded from the server.


    Once the manifest file has been read, no file set for caching will be checked
    on the server or loaded anew unless the manifest file has been changed. The manifest
    file is compared byte to byte, meaning that a change in the modification date
    will not force reevaluation. Neither changes on the server for other files nor
    HTTP headers indicating a more recent version will trigger a new download by the
    browser.


    However, always remember that when the cache is renewed, the new version of the
    files will not be used by the client until the web application has been refreshed,
    in a way similar to updates on a desktop computer. Therefore, it can be desirable
    to be able to notify the user when new versions of files are available. This can
    be done using a specific API that will let you control cache and receive notifications
    during file updates. We will cover the relevant events in an upcoming section.


    ### The Manifest File


    Basically, the manifest file will let you list files to be cached together with
    rules on how to handle the web application elements. It bears the special `.manifest`
    extension and is a simple UTF-8 encoded file, necessarily served with the `text/cache-manifest`
    content type to be interpreted by the browser. You can use a byte order mark (BOM)
    to sign the file. Be careful that most servers for now do not send this MIME type
    with their default configuration, which is mandatory for the manifest to work.


    **NOTE:** Naturally, running local tests for this file isn’t easy, because you
    cannot cut the connection to the server. The only way to run local tests is to
    load your application, stop the local server, and check what is displayed then
    by reloading the web application. Also note that the manifest file is not shown
    in the Resource Viewer section of Safari’s Web Inspector, which doesn’t help checking
    if it has been loaded.'
