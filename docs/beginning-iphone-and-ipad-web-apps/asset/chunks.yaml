    ## 第 12 章：Ajax 与动态内容


    你可能会认为直接运行 `list.innerHTML = html;` 会更简单，然而，如果这样做，一个渲染问题会导致 Mobile Safari 无法将样式正确应用到列表元素上。因此，我们将
    `html` 变量的内容添加到一个虚拟元素中，然后将每个节点从虚拟元素移动到 `list` 中。令人惊讶的是，这种方法比最初预期的 `innerHTML`
    方法快了两倍。


    ## 善待等待中的用户


    如前所述，移动设备上的 HTTP 响应时间可能不稳定，加载时间取决于用户当前可用连接的质量。因此，特别是对于基于 Ajax 的 Web 应用，你应该始终在加载和处理期间向用户提供视觉反馈。


    ### 添加视觉反馈


    为此，你仍然可以依赖 `readyState` 属性，通过向之前使用的函数添加一个条件来实现。例如，你可以使用一个加载旋转图标作为应接收内容元素的背景。这样做的好处是轻量且灵活。这里，我们使用在第
    7 章中创建的 `BigSpinner` 对象。


    ```javascript

    var spinner = new BigSpinner();


    function init() {


    spinner.init("spinner", "white");


    ...


    }


    function showTrends() {


    if (this.readyState == this.OPENED) {


    buttonState(true);


    } else if (this.readyState == this.DONE && this.status == 200) {


    ...


    buttonState(false);


    }


    }


    function buttonState(loading) {


    var but = document.querySelector("button.header-button");


    if (loading) {


    but.disabled = true;


    but.className += " spinning";


    spinner.animate();


    } else {


    but.className = but.className.replace(" spinning", "");


    spinner.stop();


    }


    }

    ```


    新的 `buttonState()` 函数为按钮添加了一个 `.spinning` 类来显示旋转图标。为了让旋转图标显示在按钮中，你需要添加一个环绕按钮文本的
    `<span>`。


    ```html

    <button class="header-button" onclick="init()"> <span> 获取</span> </button>

    ```


    最后一步是将相关样式添加到 `main.css` 文件中，以便能在其他项目中轻松使用。你可以在图 12-2 中看到最终的按钮效果。


    ```css

    .header-wrapper .header-button.spinning span {


    color: transparent;


    text-shadow: none;


    background: -webkit-canvas(spinner) center center no-repeat;


    -webkit-background-size: auto 22px;


    padding: 4px;


    margin: -4px;


    }

    ```


    图 12-2. 旋转的按钮


    CSS 类 `.spinning` 通过将按钮文本的颜色设置为透明来隐藏它，并使用 `-webkit-canvas()` 函数更改其背景。由于旋转图标有点大，我们使用
    `background-size` 属性调整其大小，使其完美地适配在按钮内部。


    ## 处理过长的等待时间


    此外，你应该为可能的错误或过长的等待时间做好准备。为此设置一个定时器是最直接的解决方案；根据你需要加载的内容类型，你可能需要调整一个“合理”等待时间的值。


    ```javascript

    var timerID;


    function checkTime(msecs, ajax) {


    timerID = window.setTimeout(function() {


    ajax.abort();


    alert("服务器响应时间过长... \n


    请尝试重新加载此页面。");


    }, msecs);


    }


    function showTrends() {


    if (this.readyState == this.OPENED) {


    checkTime(1000, this);


    ...


    } else if (this.readyState == this.DONE && this.status == 200) {


    window.clearTimeout(timerID);


    ...


    }


    }

    ```


    特别是当一切并非完全由你掌控时，你无法确保你的应用运行毫无问题。处理可能的错误是保证良好用户体验的额外保障。


    ## 小结


    构建 Web 应用不应被视为一项孤立的任务。如今，Web 的丰富性部分依赖于网站之间的交互，你可以从外部资源以及众多的第三方数据源和 API 中获益匪浅，以构建更好的应用。现在，你拥有了充分利用那些促成了
    Web 2.0 时代成功的元素的工具，而这些元素对于人们在消费 Web 内容方式上的未来变革也应是基础性的。


    请深入掌握这些内容，并进一步探索。永远记住，在使用外部内容方面，没有绝对的最佳解决方案。一种格式或技术可能更适合某个项目，而另一种则可能更适合另一个项目——更不用说并非所有方案在所有情况下都一定可用。


    # 第 13 章


    使用触摸与手势事件


    与当今许多便携设备一样，iPhone、iPad 和 iPod touch 将手指作为唯一的指点设备。苹果的设备甚至支持多个同时接触点，结合简单直观的图形界面，使其使用流畅、高效，并且总体令用户感到愉悦。正如我们在前面章节中所述，这在用户和设备之间建立了一种近乎亲密的联系。这种特殊关系有利于逼真的设计；例如，在构建扑克游戏应用时，你可以允许用户通过简单的手指轻扫，在桌上“扔”出扑克牌，增强了真实感。


    从操作系统版本 2.0 开始，你可以使用 Mobile Safari 的多点触控 API，将用户与你的 Web 应用之间的交互提升到一个新的水平。在本章中，我们将解释如何实现此
    API 中的功能来捕获触摸事件，如何解读绝大多数用户移动操作，并最终利用这些知识构建一个简单的手写识别 Web 应用。


    ## 如何处理事件


    为了使用 JavaScript 捕获事件，开发者通常使用直接在元素上的 `onclick` 属性（在 HTML5 规范中已标准化）或 DOM 的 `addEventListener()`
    方法，有时并未真正理解监听器应如何组织或捕获事件的含义。透彻理解这一点对于高效处理事件至关重要。


    ### 处理程序的调用优先级


    在不考虑事件捕获的情况下，处理程序之间没有实际的优先级；它们只是按照定义的顺序被调用。因此，HTML 标记中的事件属性通常比脚本更早被解释，事件发生时，通过属性引入的代码将首先被执行，如下例所示：


    ```html

    <div onclick="console.log(''attribute'')">点击我</div>


    <script>


    var div = document.getElementsByTagName("div")[0];


    div.addEventListener("click", function() { console.log("listener") }, false);


    </script>

    ```


    **--- 结果 ---**


    ```

    > attribute

    > listener

    ```


    然而，如果使用脚本中的 `element.onclick` 定义了新的点击事件，`onclick` 属性将被覆盖，之前的处理程序将被移除，并创建一个新的处理程序：


    ```html

    <div onclick="console.log(''attribute'')">点击我</div>


    <script>


    var div = document.getElementsByTagName("div")[0];


    div.addEventListener("click", function() { console.log("listener") }, false);


    div.onclick = function() { console.log("property") };


    </script>

    ```


    **--- 结果 ---**


    ```

    > listener

    > property

    ```


    属性基本上只允许你一次定义一个处理程序。但这并不意味着你在定义新处理程序时无法保留之前由属性定义的处理程序。以下是实现此目的的一种方法：


    ```javascript

    /* 首先，我们从 onclick 属性读取处理程序 */


    var old = div.onclick;


    /* 接着，我们将所有相关函数组合到一个全局处理程序中 */


    div.onclick = function() {


    old();


    console.log("property");


    };

    ```


    **--- 结果 ---**


    ```

    > listener

    > attribute

    > property

    ```

