    The next entries give you direct access to advanced JavaScript debugging tools
    inside the Web Inspector window. These will let you quickly debug scripts by providing
    tools to selectively study your code’s behavior and components. Again, we will
    get deeper into these soon.


    The last group of options allows you to modify the browser’s behavior. Obviously,
    cases where your end user would diminish the capabilities of the browser are quite
    unlikely, because all these characteristics, especially the graphical interface
    and JavaScript functionalities, are at the heart of a web application’s identity.
    Accessing the richness of the Web nowadays with JavaScript disabled has become
    an almost impossible task, and it is likely you wouldn’t want to develop an application
    without client-side scripts.


    Still, you should take into account that some of your users may not enable script
    execution and therefore should serve understandable content all the same.


    Nevertheless, the `Disable Caches` option will come to some avail, because not
    only is it the best way to test first-visit loading times, but it will also let
    you test your page when the advanced HTML5 caching abilities are not available.


    ## Developing on Mobile Safari


    Let’s take a minute to talk about Mobile Safari. The functionalities available
    on the iPhoneOS browser are limited compared to what we are about to cover, because
    you can use a console only. You can open the console by tapping `Settings` `Safari`
    `Developer` (at the far bottom) and switching the `Debug Console` option to `ON`
    (see Figure 3–3). Also note that you will be able to disable JavaScript or cookies
    and empty the browser cache to simulate specific browsing conditions.


    ![](index-55_1.jpg)

    ![](index-55_2.jpg)


    **Figure 3–3.** You can switch the console on from the iPhone settings


    After that, the `Debug Console` will show right under the address bar in your
    Mobile Safari windows, displaying the number of HTML, CSS, and JavaScript errors
    in the page or displaying `No errors` if no errors have occurred (Figure 3–4).
    Tips and custom messages can also be displayed using the Console API that we will
    explore later in this chapter.


    **Figure 3–4.** The `Debug Console` appears under the address bar


    Tapping the error count will open a list of errors with the line where each occurred
    and the option to filter them by type—HTML, CSS, JavaScript, or All (see Figure
    3–5).


    ![](index-56_1.jpg)


    **Figure 3–5.** The console shows all the messages


    Be careful, though: the console truncates log entries when they get too long.
    Try not to generate logs that would span beyond two or three lines, and always
    focus on the core information you need. To make this less limiting, you can still
    turn the device to make line longer, which would make your two lines hold a little
    more content.


    ## Overview of the Web Inspector


    Before going through each separate function of WebKit’s Web Inspector, the best
    approach is to get to know the tool as a whole. Invoking the `Develop` window
    for the first time will launch a new window by default. Once you have used it
    once, your last choice—a proper window or a docked one—will apply automatically.


    **NOTE:** From now on, we will designate the Web Inspector as window, regardless
    of its being in window or docked state. Likewise, we will refer to the inspector
    as related to a browser window, although obviously you can open an instance of
    the Web Inspector for any browser tab.


    ![](index-57_1.jpg)


    ### The Developer Tools Window


    At the top of the window (Figure 3–6), you will find the main series of icons
    that will act as tabs, giving you access to the various debugging tools. They
    represent, in order of appearance, the elements inspector, the resources tracker,
    the script debugger, a timeline inspector, a script profiler, a client-side storage
    manager, audits, and the console.


    Still on the upper part of the Web Inspector, on the right side, is a search field.
    This field is contextual: it allows you to perform an advanced search within the
    main area of your current view. For instance, if you are working on your HTML
    markup, performing a search in this field will search elements within the document;
    running a query while on the `Profiles` tab will return the query element in all
    the profile data.


    **Figure 3–6.** The developer tools window focused on the Elements Inspector


    At the bottom of the window, you have several icons that will be different depending
    on which tool you are using. In all sections of the debugging tool, though, you
    will find a window icon and a icon showing a line preceded by an arrow. The first
    icon lets you dock the Web Inspector window to its parent window, which is very
    useful if you are working with several pages and a debugger instance for each.
    It also can prevent you from looking up and editing code from the wrong window
    by mistake!


    The second icon will fire up a console. The console is available regardless of
    the tool you are currently using. It can be triggered by pressing the `Esc` key.
    Next to these icons, if you are inspecting an HTML element in the page, the path
    to this element in the document tree will be presented in a “breadcrumbs” manner
    (`html > body` in Figure 3–6) to help you easily navigate the document.


    A strong asset of the inspection window is that it is closely related to the page
    on which you are working. Data in this window will update as the page is modified.
    If you click a link and land on a different page, the inspector will entirely
    change its content too. As a consequence, you can inspect only one window with
    one debugger instance. This shouldn’t be an issue, because you can open as many
    inspector windows as you need, whatever number of pages you have open.


    ## Error Notifications


    If something is going wrong in your page—a fair reason to inspect your code—one
    of the first places you should be looking within the inspector would be at the
    bottom-right side of the Web Inspector window (Figure 3–7). There, if the WebKit
    interpreter has identified errors in the code, you will see a red number preceded
    by a white-on-red cross for errors, and another yellow number next to a warning
    sign for warnings.


    **Figure 3–7.** Two icons indicate errors and warnings thrown for the current
    page; these will be described in the console


    Clicking these numbers will open a console area where the reported errors and
    warnings will be listed, together with the operations run by WebKit in order to
    fix them and the line where they occurred in the file.


    For instance, in XHTML documents, it is common to get mixed up between self-closing
    tags and tags that require full closing. If you use a `<link>` tag that you have
    closed using the corresponding `</link>`, you would get the following message:


    ```

    Unmatched </link> encountered. Ignoring tag. YourPage.html:14

    ```


    This lets you search the element in the source code using the indicated line number,
    which also is a link that will take you directly to the relevant line using the
    `Resources` viewer that we will soon introduce.


    “Ignoring tag” here doesn’t mean that your link will be dropped altogether; it
    simply means that the unexpected closing tag will be ignored and won’t appear
    in the DOM tree. This is the way WebKit interprets your code to render your pages.
    Be attentive to these errors, because they can cause side effects; for instance,
    not closing tags such as `<script>` or `<canvas>` would result in the elements
    following them being considered as script or canvas content—and not being displayed.


    ## Master Your Code'
  raw: 'The next entries give you direct access to advanced JavaScript debugging tools
    inside the Web Inspector window. These will let you quickly debug scripts by providing
    tools to selectively study your code’s behavior and components. Again, we will
    get deeper into these soon.


    The last group of options allows you to modify the browser’s behavior. Obviously,
    cases where your end user would diminish the capabilities of the browser are quite
    unlikely, because all these characteristics, especially the graphical interface
    and JavaScript functionalities, are at the heart of a web application’s identity.
    Accessing the richness of the Web nowadays with JavaScript disabled has become
    an almost impossible task,


    and it is likely you wouldn’t want to develop an application without client-side
    scripts.


    Still, you should take into account that some of your users may not enable script
    execution and therefore should serve understandable content all the same.


    **Nevertheless, the Disable Caches option will come to some avail, because not
    only is it the best way to test first-visit loading times, but it will also let
    you test your page when the advanced HTML5 caching abilities are not available.


    Developing on Mobile Safari


    Let’s take a minute to talk about Mobile Safari. The functionalities available
    on the iPhoneOS browser are limited compared to what we are about to cover, because
    you


    can use a console only. You can open the console by tapping Settings Safari


    Developer (at the far bottom) and switching the Debug Console option to ON (see
    Figure 3–3). Also note that you will be able to disable JavaScript or cookies
    and empty the browser cache to simulate specific browsing conditions.


    ![](index-55_1.jpg)


    ![](index-55_2.jpg)


    CHAPTER 3: Introducing Developer and Debugging Tools


    Figure 3–3\. You can switch the console on from the iPhone settings


    After that, the Debug Console will show right under the address bar in your Mobile
    Safari windows, displaying the number of HTML, CSS, and JavaScript errors in the
    page or displaying “No errors” if no errors have occurred (Figure 3–4). Tips and
    custom


    messages can also be displayed using the Console API that we will explore later
    in this chapter.


    Figure 3–4\. The Debug Console appears under the address bar


    Tapping the error count will open a list of errors with the line where each occurred
    and the option to filter them by type—HTML, CSS, JavaScript, or All (see Figure
    3–5).


    ![](index-56_1.jpg)


    CHAPTER 3: Introducing Developer and Debugging Tools


    Figure 3–5\. The console shows all the messages


    Be careful, though: the console truncates log entries when they get too long.
    Try not to generate logs that would span beyond two or three lines, and always
    focus on the core information you need. To make this less limiting, you can still
    turn the device to make line longer, which would make your two lines hold a little
    more content.


    Overview of the Web Inspector


    Before going through each separate function of WebKit’s Web Inspector, the best


    approach is to get to know the tool as a whole. Invoking the Develop window for
    the first time will launch a new window by default. Once you have used it once,
    your last


    choice—a proper window or a docked one—will apply automatically.


    NOTE: From now on, we will designate the Web Inspector as window, regardless of
    its being in window or docked state. Likewise, we will refer to the inspector
    as related to a browser window, although obviously you can open an instance of
    the Web Inspector for any browser tab.


    ![](index-57_1.jpg)


    CHAPTER 3: Introducing Developer and Debugging Tools


    The Developer Tools Window


    At the top of the window (Figure 3–6), you will find the main series of icons
    that will act as tabs, giving you access to the various debugging tools. They
    represent, in order of appearance, the elements inspector, the resources tracker,
    the script debugger, a timeline inspector, a script profiler, a client-side storage
    manager, audits, and the console.


    Still on the upper part of the Web Inspector, on the right side, is a search field.
    This field is contextual: it allows you to perform an advanced search within the
    main area of your current view. For instance, if you are working on your HTML
    markup, performing a


    search in this field will search elements within the document; running a query
    while on the Profiles tab will return the query element in all the profile data.


    Figure 3–6\. The developer tools window focused on the Elements Inspector


    At the bottom of the window, you have several icons that will be different depending
    on which tool you are using. In all sections of the debugging tool, though, you
    will find a window icon and a icon showing a line preceded by an arrow. The first
    icon lets you dock the Web Inspector window to its parent window, which is very
    useful if you are working with several pages and a debugger instance for each.
    It also can prevent you from looking up and editing code from the wrong window
    by mistake!


    The second icon will fire up a console. The console is available regardless of
    the tool you are currently using. It can be triggered by pressing the Esc key.
    Next to these icons,


    ![](index-58_1.jpg)


    CHAPTER 3: Introducing Developer and Debugging Tools


    if you are inspecting an HTML element in the page, the path to this element in
    the document tree will be presented in a “breadcrumbs” manner (“html > body” in
    Figure 3–


    6) to help you easily navigate the document.


    A strong asset of the inspection window is that it is closely related to the page
    on which you are working. Data in this window will update as the page is modified.
    If you click a link and land on a different page, the inspector will entirely
    change its content too. As a consequence, you can inspect only one window with
    one debugger instance. This


    shouldn’t be an issue, because you can open as many inspector windows as you need,
    whatever number of pages you have open.


    Error Notifications


    If something is going wrong in your page—a fair reason to inspect your code—one
    of the first places you should be looking within the inspector would be at the
    bottom-right side of the Web Inspector window (Figure 3–7). There, if the WebKit
    interpreter has identified errors in the code, you will see a red number preceded
    by a white-on-red cross for errors, and another yellow number next to a warning
    sign for warnings.


    Figure 3–7\. Two icons indicate errors and warnings thrown for the current page;
    these will be described in the console


    Clicking these numbers will open a console area where the reported errors and
    warnings will be listed, together with the operations run by WebKit in order to
    fix them and the line where they occurred in the file.


    For instance, in XHTML documents, it is common to get mixed up between self-closing
    tags and tags that require full closing. If you use a <link> tag that you have
    closed using the corresponding </link>, you would get the following message:


    Unmatched </link> encountered. Ignoring tag. YourPage.html:14


    This lets you search the element in the source code using the indicated line number,
    which also is a link that will take you directly to the relevant line using the
    Resources viewer that we will soon introduce.


    “Ignoring tag” here doesn’t mean that your link will be dropped altogether; it
    simply means that the unexpected closing tag will be ignored and won’t appear
    in the DOM


    tree. This is the way WebKit interprets your code to render your pages. Be attentive
    to these errors, because they can cause side effects; for instance, not closing
    tags such as


    <script> or <canvas> would result in the elements following them being considered
    as script or canvas content—and not being displayed.


    CHAPTER 3: Introducing Developer and Debugging Tools


    Master Your Code'
  trans: '

    以下条目让你能直接访问 Web Inspector 窗口中的高级 JavaScript 调试工具。这些工具能让你通过选择性研究代码行为和组件的功能，快速调试脚本。同样，我们很快会深入探讨这些内容。


    最后一组选项允许你修改浏览器行为。显然，最终用户削弱浏览器能力的情况不太可能发生，因为所有这些特性，尤其是图形界面和 JavaScript 功能，都处于 Web
    应用身份的核心位置。如今，在禁用 JavaScript 的情况下访问丰富的网络内容几乎是不可能的任务，而且你很可能也不希望开发一个没有客户端脚本的应用。


    不过，你仍应考虑到部分用户可能未启用脚本执行，因此应确保无论如何都能提供可理解的内容。


    尽管如此，`Disable Caches` 选项仍会派上用场，因为它不仅是测试首次访问加载时间的最佳方式，还能让你在高级 HTML5 缓存功能不可用时测试页面。


    ## 在 Mobile Safari 上开发


    我们来花点时间谈谈 Mobile Safari。与我们将要介绍的功能相比，iPhoneOS 浏览器上可用的功能有限，因为你只能使用控制台。你可以通过依次点击
    `设置` `Safari` `开发者`（最底部），并将 `调试控制台` 选项切换到 `开`（见图 3-3）来打开控制台。另请注意，你可以禁用 JavaScript
    或 Cookie，并清空浏览器缓存以模拟特定的浏览条件。


    ![](img/index-55_1.jpg)

    ![](img/index-55_2.jpg)


    **图 3-3.** 你可以在 iPhone 设置中打开控制台


    之后，`调试控制台` 将显示在 Mobile Safari 窗口的地址栏正下方，显示页面中 HTML、CSS 和 JavaScript 错误的数量，如果没有错误则显示
    `无错误`（图 3-4）。提示和自定义消息也可以使用我们稍后将在本章中介绍的 Console API 来显示。


    **图 3-4.** `调试控制台` 出现在地址栏下方


    点击错误计数将打开一个错误列表，其中包含每个错误发生的行号，以及按类型（HTML、CSS、JavaScript 或所有）筛选的选项（参见图 3-5）。


    ![](img/index-56_1.jpg)


    **图 3-5.** 控制台显示所有消息


    不过要小心：当日志条目过长时，控制台会将其截断。尽量不生成超出两三行的日志，并始终专注于你需要的核心信息。为了减轻这种限制，你仍然可以旋转设备使行变长，这样你的两行日志就能容纳更多内容。


    ## Web Inspector 概览


    在详细介绍 WebKit 的 Web Inspector 的每个单独功能之前，最好的方法是先整体了解这个工具。首次调用 `开发` 窗口时，默认会打开一个新窗口。使用过一次后，你上次的选择——是独立窗口还是停靠窗口——将自动生效。


    **注意：** 从现在开始，无论 Web Inspector 是窗口状态还是停靠状态，我们都将其统称为窗口。同样，我们会将检查器关联到浏览器窗口，尽管显然你可以为任意浏览器标签页打开一个
    Web Inspector 实例。


    ![](img/index-57_1.jpg)


    ### 开发者工具窗口


    在窗口顶部（图 3-6），你将会看到一系列主要图标，它们充当标签页，让你能够访问各种调试工具。按出现顺序，它们分别代表：元素检查器、资源追踪器、脚本调试器、时间线检查器、脚本分析器、客户端存储管理器、审计和控制台。


    仍在 Web Inspector 的上部，右侧是一个搜索字段。此字段是上下文相关的：它允许你在当前视图的主区域内执行高级搜索。例如，如果你正在处理 HTML
    标记，在此字段中搜索将搜索文档内的元素；在 `Profiles` 标签页中运行查询，则会在所有性能分析数据中返回查询元素。


    **图 3-6.** 聚焦于元素检查器的开发者工具窗口


    在窗口底部，有几个图标，它们会根据你正在使用的工具而有所不同。不过，在调试工具的所有部分，你都会找到一个窗口图标和一个显示箭头前带有一条线的图标。第一个图标让你能将
    Web Inspector 窗口停靠到其父窗口，这在同时处理多个页面且每个页面都有一个调试器实例时非常有用。它还可以防止你错误地从错误的窗口中查找和编辑代码！


    第二个图标会启动一个控制台。无论你当前正在使用哪个工具，控制台都可用。可以通过按 `Esc` 键触发。在这些图标旁边，如果你正在检查页面中的 HTML 元素，该元素在文档树中的路径将以“面包屑”方式呈现（图
    3-6 中的 `html > body`），以帮助你轻松浏览文档。


    检查窗口的一个强大优势是它与你正在处理的页面紧密相关。此窗口中的数据会随着页面的修改而更新。如果你点击一个链接并跳转到另一个页面，检查器的内容也会完全改变。因此，一个调试器实例只能检查一个窗口。这应该不是问题，因为你可以根据需要打开任意数量的检查器窗口，无论你打开了多少页面。


    ## 错误通知


    如果你的页面出现任何问题——检查代码的一个常见原因——你首先应该在 Web Inspector 窗口的右下角查看（图 3-7）。在那里，如果 WebKit
    解释器识别到代码中有错误，你会看到一个红色数字，前面带有一个白底红叉的错误标记，以及警告标记旁边的一个黄色数字。


    **图 3-7.** 两个图标指示当前页面抛出的错误和警告；这些将在控制台中描述


    点击这些数字将打开一个控制台区域，其中会列出报告的错误和警告，以及 WebKit 为修复它们而执行的操作，以及它们在文件中发生的行号。


    例如，在 XHTML 文档中，经常会将自关闭标签与需要完整关闭的标签混淆。如果你使用了一个 `<link>` 标签，并用对应的 `</link>` 关闭了它，你将收到以下消息：


    ```

    未匹配的 </link> 已遇到。忽略标签。YourPage.html:14

    ```


    这让你可以使用指示的行号在源代码中搜索该元素，该行号也是一个链接，可以直接带你到相关行，使用的是我们稍后将介绍的 `Resources` 查看器。


    这里的“忽略标签”并不意味着你的链接会被完全丢弃；它仅仅意味着这个意外的关闭标签将被忽略，并且不会出现在 DOM 树中。这是 WebKit 解释你的代码以渲染页面的方式。要注意这些错误，因为它们可能会引起副作用；例如，未关闭像
    `<script>` 或 `<canvas>` 这样的标签会导致它们之后的元素被视为脚本或画布内容——并且不会被显示。


    ## 掌控你的代码

