  trans: "\n# 列表\n\n为了以清晰明了的方式呈现数据，你会频繁使用列表。Apple 建议在为运行 iOS 的设备设计网页和应用时使用列表，事实上列表确实有很多优点。它们能让你通过减少完整句子的数量来使表达更加简洁，同时能让大量信息以清晰的数据分组形式呈现。此外，列表的形式与\
    \ iOS 和桌面应用的默认菜单相似，因此用户会感到熟悉。\n\n不过要注意，不要让列表过于冗长。尽管前面提到的要点都与我们已阐述过的最佳实践相吻合，但列表——即使是网页上的列表——如果变得太长，会迫使用户进行平移，可能错过他们正在寻找的内容，或在信息中迷失方向。长列表的另一个严重问题是，它们通常会使浏览器变慢，这同样会让用户感到沮丧。为了避免列表过长，正如前面所述，你应该问自己哪些信息最重要，以及如何对它们进行分类。\n\
    \n由于列表存在于 iOS 的图形用户界面中，因此你可以模仿现有的样式，为你的网络应用打造吸引人的界面。有三种可用的列表类型，即：边到边列表、圆角边框列表和图标网格列表（见图\
    \ 5-12）。\n\n![](img/index-129_1.jpg)\n\n> **第 5 章：用户体验与界面指南**\n> \n> 图 5-12\\\
    . 三个不同应用（雅虎财经、设置和领英）中的三种不同列表类型\n\n如果你按照本书中的所有示例操作，并根据我们建议的文件和代码片段创建模板，你很快就能拥有一个坚实的基础，从中挑选素材来构建网络应用。\n\
    \n第一种列表类型特别适合长列表。它紧凑、简洁且易读。\n\n## 基本边到边列表\n\n如果你已经开始构建项目模板和模板文件，你可以创建一个新的 HTML\
    \ 文件，并将以下代码添加到 `.view` 容器中：\n\n```html\n<div class=\"list-wrapper\">\n  <h2>A</h2>\n\
    \  <ul>\n    <li>苹果</li>\n    <li>应用程序</li>\n  </ul>\n</div>\n```\n\n接下来是让基本列表看起来像\
    \ iPhone 风格的 CSS。将其附加到你在网络应用模板中已创建的 `styles.css` 样式表中：\n\n```css\n.list-wrapper\
    \ h2 {\n  line-height: 1;\n  font-size: 18px;\n  padding: 1px 12px;\n  font-weight:\
    \ bold;\n  text-shadow: rgba(0,0,0,0.5) 0 1px 0;\n  background: left 1px -webkit-gradient(linear,\n\
    \    left top, left bottom,\n    from(rgba(0,0,0,0.18)), color-stop(0.65, transparent))\n\
    \    rgba(178,187,194,0.89);\n  -webkit-box-sizing: border-box;\n  height: 22px;\n\
    \  border-bottom: solid 1px rgba(0,0,0,0.18);\n  overflow: hidden;\n  white-space:\
    \ nowrap;\n  margin: 0;\n  color: #fff;\n}\n\n.list-wrapper ul {\n  padding: 0;\n\
    \  background: #fff;\n  font-size: 20px;\n  line-height: 23px;\n  margin: 0;\n\
    }\n\n.list-wrapper ul li {\n  border-bottom: 1px solid #dfdfdf;\n  padding: 10px;\n\
    }\n```\n\n## 圆角边框列表\n\n第二种列表类型与边到边列表非常相似，但它在第一个和最后一个列表项上具有圆角边框。因此，它更适合用于不太长的列表，以便列表的顶部和底部边缘能同时被看到。HTML\
    \ 结构与之前的标记非常相似，不过样式会将内边距直接转移到链接上，因此应用于焦点元素的效果会考虑到边框半径。要查看效果，只需将以下代码放在 `.group-wrapper`\
    \ 内：\n\n```html\n<h2>分组列表</h2>\n<ul>\n  <li><a href=\"item1.html\">项目 1</a></li>\n\
    \  <li><a href=\"item2.html\">项目 2</a></li>\n  <li><a href=\"item3.html\">项目 3</a></li>\n\
    </ul>\n```\n\n相关的样式放入同一个样式表：\n\n```css\n.group-wrapper ul {\n  background-color:\
    \ #fff;\n  -webkit-border-radius: 10px;\n  font-size: 17px;\n  line-height: 20px;\n\
    \  margin: 9px 0 10px;\n}\n\n.group-wrapper ul li {\n  padding: 11px 9px 12px;\n\
    }\n\n.group-wrapper ul {\n  font-weight: bold;\n  margin-bottom: 20px;\n  list-style:\
    \ none;\n  padding: 0;\n  border: solid 1px #a9abae;\n}\n\n.group-wrapper ul li:not(:last-child)\
    \ {\n  border-bottom: inherit;\n}\n\n.group-wrapper ul li a {\n  padding: inherit;\n\
    \  color: inherit;\n  text-decoration: inherit;\n  margin: -11px -9px -12px;\n\
    \  display: block;\n}\n\n.group-wrapper ul li:first-child a {\n  -webkit-border-top-right-radius:\
    \ 10px;\n  -webkit-border-top-left-radius: 10px;\n}\n\n.group-wrapper ul li:last-child\
    \ a {\n  -webkit-border-bottom-right-radius: 10px;\n  -webkit-border-bottom-left-radius:\
    \ 10px;\n}\n```\n\n## 图标网格显示\n\n你的第三种列表选项——图标网格显示——适用于需要在最小区域内呈现大量选项的情况。它提供一种直观的显示方式，可用于向用户展示选项。你还可以使用这种显示方式来替换上下文菜单中的标签，例如当用户长按以使用复制粘贴功能时。只需记住，始终要使可点击区域足够大以便于使用。\n\
    \n# 考虑 UI 替代方案\n\n在考虑可用性设计的同时，你还需要彻底重新思考网络应用的实际图形设计。这里你有几个选项，它们都是合理的。由于针对移动设备的界面设计有多种方向，你可以自行选择在多大程度上遵循这些指南。\n\
    \n## 模仿 iOS UI\n\n在开发网络应用时，模仿目标设备的原生图形用户界面是一个相当稳妥的选择。使用用户已经熟悉的视觉和感觉，可以加快他们的导航体验，并有助于他们对你的应用产生良好印象。你的目标是提供流畅的体验，因此让你的应用模仿\
    \ Apple 的整体界面，并使用 Apple 提供的精心设计的元素，似乎是一个显而易见的主意。\n\n模仿 iOS 的主要缺点是，如果在其他设备上查看，你的应用可能会显得格格不入。webOS\
    \ 或 Android 用户看到的网络应用，跟它在 iPhone 上看到的一样——但周围环境、内置功能甚至设备本身都不是 iPhone。\n\n最后，你完全有理由认为，即使\
    \ Apple 推荐模仿 iOS UI，但这并不十分个性化，最终可能会使你的应用不如那些功能相似但具有更易识别的身份的应用令人印象深刻。\n\n在不实际模仿原生界面的情况下，有时你也应该依赖它。iOS\
    \ 在表单 `<select>` 元素和弹出模式窗口方面具有特定的内置行为。如果偏离 Apple 的实现，这些通常很难以一种可用的方式呈现，尤其是因为用户应该清楚地在这些元素上执行操作时会发生什么。\n\
    \n有时你别无选择，只能依赖 iPhone UI。如果你想使用特殊的 URL 方案，如 `mailto:` 或 `tel:`，你将再次把控制权交给操作系统。当使用音频或视频播放器时也是如此，因为移动版\
    \ Safari 没有直接在 iPhone 和 iPod touch 上集成这些功能。\n\n# 构建 iPad 体验\n\niPad 是开发市场上的新成员。虽然它因其同样运行\
    \ iOS 而与 iPhone 和 iPod touch 共享图形用户界面，但你应该针对这款设备重新思考你的设计原则。iPad 很可能作为一款设备为用户带来全新的体验——你需要负责构建一个新的、与之相关的应用体验。\n\
    \niPad 的屏幕尺寸大致相当于上网本，并且分辨率高于 iPhone 和 iPod touch。然而，你不应该以笔记本电脑的思路来开发应用，或者简单地将\
    \ iPad 视为一个更大的 iPhone。iPad 带来的功能显然不同于电脑和智能手机。\n\n## 不是笔记本电脑，也不是 iPhone\n\n*下载自\
    \ Wow! eBook <www.wowebook.com>*\n"
- fmt: 'iPad 的初始方向为竖屏模式，且没有滚动条。清晰体验的重要性与 iPhone 同样关键。仅仅因为你的应用程序拥有更多屏幕空间，绝不意味着你应该试图使用所有空间。始终将用户注意力集中在你的
    Web 应用的一个目的上，并保持交互方式易于理解。通常情况下，遵循与 iPhone 开发相同的指南。


    再次强调，iPad 并非放大版的 iPhone。如果遵循 iPhone 的 UI 指南，你应在可能或必要之处进行调整。你可以保留对列表的偏好，但可能需要考虑让每个条目的内容量更完整。此外，你可能需要考虑，在
    iPhone 应用中使用两个视图的地方，你可以在 iPad 上将元素组合成一个视图（如果这样做是合适的），如图 5-13 所示。


    ![图 5-13](index-133_1.jpg)


    一种为 iPad 设计内容布局的有趣方式称为*split view*。其理念是，由于 iPad 拥有更大的屏幕，开发者可以以主从（master-detail）风格将主要焦点与辅助内容和更高级的功能分离开来。


    在竖屏方向下，详情视图会全屏显示，而主视图则浮动在其上方；用户通过点击一个按钮，可以在可见与隐藏状态之间切换。在横屏方向下，你可以将应用的浮动框转变为侧边栏。这样做有显著优势，但不要忘记始终让用户自行选择。如果你认为应该建议用户使用横屏视图，甚至强制使用，那么你很可能正在设计一个糟糕的应用，或者一个并非真正
    iPad 风格的应用。


    在 iPad 上，触摸依然是操作系统、应用及内容的理想交互方式。这一点非常重要，因为它强烈影响着用户如何使用和感知你的页面与应用程序。由于屏幕尺寸允许你以更高细节更轻松地模仿现实生活中的元素，你可以依靠全新的逼真度，使你的应用更易于理解和使用。看看`iBooks`（图
    5-14），它充分利用了图书馆的隐喻。该应用程序非常直观，因为它能引导用户取阅一本书。


    ![图 5-14](index-134_1.jpg)


    由于你拥有更多可用空间，空间内的交互不再局限于垂直移动，并且这类操作也变得更轻松，仅仅是因为用户对自己所做的事情将有更清晰的视野。首批在 iPad 上推出的应用包括阅读书籍、更新日历，甚至进行文字处理。这些都是桌面活动（我们说的是一个合适的、木质书桌的桌面），被移植到了一个更清洁、更移动化的生活中。这强烈暗示着，你应当允许用户在使用过程中获得类似的物理感受。


    ![图 5-15](index-135_1.jpg)


    **为 iPad 创建界面**


    如果你打算在应用设计中广泛使用*split view*（图 5-15），你应该再次认真考虑构建一个可复用的模板，以加快开发流程。构建*split view*在多个方面可能会有些棘手。


    图 5-15. 邮件应用的经典*split view*视图


    首先，你需要专门针对 iPad 进行目标适配——显然，*split view*在 320x480 像素的屏幕上会失效。这可以通过使用 CSS 的`@media`规则来实现，如下所示：


    ```css

    @media only screen and (min-device-width:640px) { ... }

    ```


    这意味着我们只针对最小宽度为 640px 的屏幕设备。这意味着你可以将以下代码放入你的主样式表中：


    ```css

    @media only screen and (min-device-width:640px) {


    body {


    background: #e1e4e9;


    }

    ```'
  raw: 'The initial orientation of the iPad is the portrait orientation, and there
    is no scrol bar. The importance of a clear experience remains as critical as with
    the iPhone. Just because you have more screen estate available for your application
    definitely doesn’t mean that you should try to use al of it. Keep focusing user
    attention on one purpose of your web app, and keep ways of interacting with it
    easy to understand. In general, apply the same guidelines as for iPhone development.


    Again, the iPad isn’t a large iPhone. If fol owing iPhone UI guidelines, you should
    adapt wherever is possible or necessary. You can keep a preference for lists,
    though you might consider making the amount of content for each item more complete.
    Also, you might consider where you had two views on an iPhone application, you
    can combine


    elements in the iPad to make one view if it seems relevant, as Figure 5–13 shows.


    ![](index-133_1.jpg)


    CHAPTER 5: User Experience and Interface Guidelines


    Figure 5–13\. A creative and realistic way to implement split view


    An interesting way to design content layout for the iPad is called *split view*.
    The idea is that, because the iPad has a larger screen, developers can separate
    the main focus from auxiliary content and more advanced functionality in a master-detail
    style.


    In portrait orientation, the detail view would appear full-screen, and the master
    would float over it; users toggle from a visible state to hidden by tapping an
    button. In landscape orientation, you would transform the floating box of your
    application into a sidebar. This has serious advantages, but do not forget to
    always let users choose by themselves. If you are thinking that you should suggest
    to use landscape view or even force it, you’re probably producing poor design
    or making an application that is not really an iPad application.


    On the iPad, touch is maintained as the ideal way to interact with the OS, applications,
    and content. This is important because it strongly influences how users use and


    perceive your pages and applications. Because the screen size allows you to more


    easily mimic real-life elements, with higher detail, you can rely on a new level
    of realism to make your application easier to understand and use. Take a look
    at iBooks (Figure 5–


    14), which goes far with the library metaphor. The application is very intuitive,
    because the user is invited to take a book to read it.


    ![](index-134_1.jpg)


    CHAPTER 5: User Experience and Interface Guidelines


    Figure 5–14\. iBooks stand as in a real library on the iPad, inviting users to
    take a book As you have more space available to you, interaction in space is no
    longer limited to vertical movement, and it becomes less of a chore too, be it
    only because users will have more visibility on what they are doing. The applications
    presented first on the iPad are to read books, keep a calendar up-to-date, and
    even do text processing. These are all desktop activities (we’re talking about
    a proper, wooden desktop here), ported to a cleaner, mobile life. This is strong
    suggestion that you should allow for similar physical sensation of what the user
    is doing.


    ![](index-135_1.jpg)


    CHAPTER 5: User Experience and Interface Guidelines


    Creating the Interface for the iPad


    If you are going to extensively use split view (Figure 5–15) in your application
    design, you should once more seriously consider building a reusable template to
    speed up your developing process. There are several points where building a split
    view can be a little tricky.


    Figure 5–15\. A classic split view with the Mail application


    First, you will have to target the iPad specifically—obviously split view would
    break on a 320x480 pixels screen. This is achieved using the CSS @media rule,
    as follows:


    @media only screen and (min-device-width:640px) { ... }


    This means we are targeting only screen devices with a minimal width of 640px.
    This means you could put this in your main style sheet:


    @media only screen and (min-device-width:640px) {


    body {


    background: #e1e4e9;


    }'
