    ...


    drawMarker(latlng, **position.coords.accuracy,** "#0072f9"); // A blue marker


    }


    This will bring the user a satisfying positioning service, displaying not only
    their position but also the accuracy of the positioning, as shown in Figure 14–3.


    ![](index-432_1.jpg)


    CHAPTER 14: Location-Aware Web Applications


    Figure 14–3\. The user position is displayed on the map along with the accuracy


    With the Google Maps API, you can go much further, from using itineraries defined
    on the Google servers to showing information with the Street View mode. Because
    there is a lot to discover and use for impressive applications, we invite you
    to study the online documentation at [http://code.google.com/apis/maps](http://code.google.com/apis/maps)/.


    Download from Wow! eBook <www.wowebook.com>


    Tracking the User’s Position


    You have learned how to request the user’s position and how to display this information
    on a map, and you now should have a pretty clear idea of how to do this most efficiently
    depending on the applications you are planning for this data.


    Let’s now concentrate on another feature of the Geolocation API: the ability to
    track changes in a device’s situation. By keeping up with a user’s location, you
    wil be able to respond to events as they occur, for instance in an itinerary application
    or in conjunction with some geotagging utility.


    Registering for Updates


    This functionality is accessed with the watchPosition() method. This method is
    used in the same manner as getCurrentPosition(), with the same parameters. However,


    CHAPTER 14: Location-Aware Web Applications


    whereas the latter sends a position and ends, the former will send a position
    and run again.


    The watchPosition() method also returns a unique identifier, which in time can
    be used to stop the tracking. The easiest way to call this function is as follows:


    var watchId = window.navigator.geolocation.watchPosition(successCallback);


    The repeated request will come to an end when the clearWatch() function is called
    with the relevant ID as a parameter:


    window.navigator.geolocation.clearWatch(watchId);


    It seems a reasonable choice to leave this option always available to the end
    user, who should always have control over their device and usually will know why
    they launched the application and thus when to stop it.


    Nonetheless, clearWatch() can also be triggered on some specific event depending
    on the use of watchPosition(), for instance when the user reaches the requested


    destination with an itinerary application.


    Specific Behavior of the Watcher


    Because watchPosition() is an iterative function, it is useful to understand what
    happens when the user quits the application without calling the clearWatch() function,
    when the device runs out of battery, or whatever else.


    When the user returns to the launcher, if there is enough room to cache the application’s
    state, the function will be temporarily suspended and will resume when the browser
    is launched again. If an error occurs, the update attempt will continue, and the
    API will call the failure callback.


    You can check this behavior using the following code:


    window.navigator.geolocation.watchPosition(successCallback, failureCallback);


    function successCallback(position) {


    var msg = ''Position: '' +


    position.coords.longitude + '', '' +


    position.coords.latitude;


    console.info(msg + ''\nAt '' + (new Date()).toTimeString());


    }


    function failureCallback(error) {


    var err = error.message + '' ('' + error.code + '')'';


    console.error(err + ''\nAt '' + (new Date()).toTimeString());


    }


    Load a page running this code, quit Mobile Safari, and activate or deactivate
    the geolocation service. You will see that the position update goes on, meaning
    neither errors nor quitting an application stops the API’s operation.


    If the user denies access to the geolocation service, the API will continue sending
    error messages, although no second chance will be given to the user to change
    his answer to 412


    CHAPTER 14: Location-Aware Web Applications


    the request. However, in this case, after the user has quit Mobile Safari and
    restarted it, the authorization pop-up will appear again; under these circumstances,
    it is


    understandable that the API keeps the polling active in this way.


    Being aware of this special behavior, the developer should anticipate it by building
    appropriate callbacks to inform the user of a problem with tracking or stop the
    tracking with the clearWatch() method after a defined number of attempts.


    Watching Position on Google Maps


    To illustrate this tracking possibility, we are going to modify the previous Google
    Maps example to take tracking into account, first by binding the following code
    to our button: var firstRun, trackerID, failedCount = 0;


    function swapAction() {


    var button = document.getElementsByTagName("button")[0];


    if (trackerID == undefined) {


    trackerID = window.navigator.geolocation.watchPosition(


    successCallback, failureCallback);


    button.textContent = "Stop";


    button.style.backgroundColor = "#c6323d"; // Turn to red


    firstRun = true;


    } else {


    window.navigator.geolocation.clearWatch(trackerID);


    trackerID = undefined;


    button.textContent = "Track";


    button.style.backgroundColor = "";


    }


    }


    It is important here to let the user stop the tracking whenever he wants, because
    tracking can be hard on the battery life of the device, because the user will
    want to stop if he stops moving, and because, depending on the location method
    used, the data


    returned by the tracking may not be satisfying. To do this, we are going to change
    the Track button into a Stop button when tracking is occurring. The swapAction()
    function will be used altogether for this, for the stop action itself and to halt
    the tracking if an error occurs.


    Then, we slightly alter the successCallback() function.


    function successCallback(position) {


    var latlng = new ns.LatLng(position.coords.latitude, position.coords.longitude);


    **map.panTo(latlng);**


    **if (firstRun) {**


    map.setZoom(17);


    **firstRun = false;**


    **}**


    ...


    **failedCount = 0;**


    **}**


    CHAPTER 14: Location-Aware Web Applications


    Here, we replace setCenter() with panTo(). The advantage of the panTo() function
    over setCenter() is that it slides to a new position rather than jumping to it.
    Besides, we zoom for only the first position; this way, if the user changes the
    zoom factor, his choice will not be discarded when his position changes.


    Because our request has been successful in this case, we set the error counter
    to 0\. On the other side, the failure callback needs slightly more work.


    function failureCallback(error) {


    **/* Stop the tracking after 100 errors */**


    **if (error.code != error.PERMISSION_DENIED) {**


    **failedCount++;**


    **if (failedCount < 100) {**


    **return;**


    **}**


    **}**


    **failedCount = 0;**


    **swapAction();**


    switch (error.code) {


    ...


    }


    button(true);


    }


    Reception may not always be optimal, which means that location may not succeed
    with every attempt, but most likely it will succeed enough to send satisfying
    data. Therefore, we cannot throw an error to the user with every failure, nor
    can we halt the tracking on the first failure. Because several calls can be performed
    every second, we fix a limit to the number of failures at 100, which should approximately
    mean a 30- to 60-second wait before an error message is sent to the user. After
