  trans: "\n当您的网页应用仅提供少量功能时，单个图标便已足够。然而，如果您构建的是一个包含不同分类、板块或服务的标签式应用，为应用的各个部分设置对比鲜明的图标，可以为用户带来额外的价值。您可以通过在页面`head`中使用`<link>`标签（其中包含`rel`属性的特殊值`apple-touch-icon`和`apple-touch-icon-precomposed`）来逐页实现此功能。为一个页面单独使用图标的完整代码如下：\n\
    \n```html\n<link rel=\"apple-touch-icon\" href=\"/path/to/custom-icon.png\">\n\
    <link rel=\"apple-touch-icon-precomposed\" href=\"/path/to/custom-icon.png\">\n\
    ```\n\n这些值与对应图标名称的同类属性产生相同的结果，并适用相同的规则。\n\n## 第 4 章：Web 应用的解剖学\n\n### 全屏运行您的应用\n\
    \n您已经朝着“应用而非浏览器”的体验迈出了重要一步。\n\n但是，如果这个图标启动的是嵌有您网页应用的移动版 Safari，那么浏览器的存在感就无法隐藏。这时，另一个`meta`选项就派上用场了。自\
    \ iOS 1.1.3 版本起，您可以指示页面默认全屏打开。只有状态栏保持可见；屏幕的其余部分将专用于您的页面。这种所谓的“独立模式”并非在移动版 Safari\
    \ 中运行您的网页；它使用与移动版 Safari 相同的渲染引擎，用户将能使用移动版 Safari 的功能，但视图本身将是您的应用。\n\n实现方法如下：\n\
    \n```html\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n```\n\
    \n切记：您的应用并不会运行在移动版 Safari 或它的“精简”版本中。这是一种不同的模式，应进行全面测试，以确保在显示和行为方面不出问题。同时，务必为用户提供一个清晰高效的导航系统，因为浏览器的导航选项将不复存在。用户进入一个无法进行任何操作或很快陷入困境的应用页面，显然会让他们感到受骗。\n\
    \n如有需要，您可以通过`window.navigator.standalone`布尔值，使用 JavaScript 检查当前是否启用了此模式。这是一个只读属性，因此您无法动态更改它；不过，我们将在本章后面展示如何利用此模式下的选项和操作。\n\
    \n### 一个很棒的启动画面\n\n特殊的`<link>`标签还允许您触发一张图片，在应用首次加载时作为启动画面显示。打开页面时的默认行为是显示上次访问时的页面快照，直到页面加载完成足以显示。这不仅相当缺乏个性，还可能让用户感觉应用在启动时卡住了，从而将他们吓跑。\n\
    \n在 iPhone 上，操作系统允许您通过指定启动图片来改变此行为，代码如下所示。但请注意，这在 iPad 上是不可能的；iPad 会系统性地显示您页面的截图。\n\
    \n```html\n<link rel=\"apple-touch-startup-image\" href=\"/path/to/startup-image.png\"\
    >\n```\n\n您的图片尺寸应为 460 像素高、320 像素宽（竖屏方向）。请注意，此高度已将状态栏的高度考虑在内。如果您的图片占据了设备屏幕的全部范围，将有\
    \ 20 像素被隐藏在平台界面之后。\n\n## 第 4 章：Web 应用的解剖学\n\n### 调整状态栏\n\n您已经注意到，唯一始终对用户可见的 iOS\
    \ 界面元素是状态栏。虽然它很容易与多种不同的设计融为一体，但您可能仍希望对其外观有所控制。毕竟是苹果公司，您无法真正改变状态栏的外观。不过，您可以在其变体中进行选择，以便更好地满足您的需求。\n\
    \n要更改状态栏的外观，请在页面的`head`中使用另一个`meta`标签。\n\n```html\n<meta name=\"apple-mobile-web-app-status-bar-style\"\
    \ content=\"default\">\n```\n\n`content`属性有三个选项。除了`default`，您还可以选择`black`和`black-translucent`。请记住，此选项仅在**全屏模式**下有效。如果应用在加载后才切换到全屏，则无法使用它。同样，这在\
    \ iPad 上也是不可行的，无论是独立模式还是原生应用。\n\n### 保持在独立模式\n\n独立模式的主要问题是，当用户点击链接跳转到另一个页面时，原生状态下会以正常模式启动移动版\
    \ Safari，这将使您的大部分辛勤工作付诸东流。解决方法是使用 JavaScript 处理所有链接并阻止默认行为。\n\n如果您的应用主要依赖 Ajax\
    \ 驱动，并且页面上只有少数几个链接，这并非难事。您可以直接从 HTML 代码中为链接绑定事件，如下所示：\n\n```html\n<a href=\"http://www.apress.com/\"\
    \nonclick=\"window.location.href=this.href; return false\">Apress Web Site</a>\n\
    ```\n\n这里发生的事情非常直接。`this.href`从`href`属性中获取链接地址；`window.location`告诉浏览器使用给定的地址刷新此页面；最后，`return\
    \ false`阻止了默认的锚点行为（即打开一个新页面）。您甚至可以通过将部分工作移交给外部函数来进一步扩展，该函数可能如下所示：\n\n```javascript\n\
    function openLink(anchor) {\n  window.location.href = anchor.href;\n  return false;\n\
    }\n```\n\n然后，您的函数将从每个锚点标签中调用，方式如下：\n\n```html\n<a href=\"http://www.apress.com/\"\
    \ onclick=\"return openLink(this)\"> Apress Web Site</a>\n```\n\n尽管如此，如果您的应用像经典网页导航一样更广泛地使用链接，我们建议您使用更高级的链接处理系统。它可能类似于这样：\n\
    \n```javascript\n/* Create a document-wide click listener */\ndocument.addEventListener(\"\
    click\", clickHandler, false);\n\nfunction clickHandler(e) {\n  var element =\
    \ e.target;\n  /* handle clicks only on anchor elements */\n  if (element.localName.toUpperCase()\
    \ != 'A') {\n    return;\n  }\n  /* ignore elements with a target value specified\
    \ since \"target\"\n  cannot be handled in full-screen mode\n  those links shall\
    \ open regularly in Mobile Safari */\n  if (!!element.getAttribute('target'))\
    \ {\n    return;\n  }\n  var url = element.href;\n  /* ignore links other than\
    \ HTTP(S) and to different origin */\n  var match = url.match(/^https?:\\/\\/(.+?)\\\
    /.*$/);\n  if (!match || match[1] != window.location.host) {\n    return;\n  }\n\
    \  /* finally open the link in full-screen view and prevent default behavior */\n\
    \  window.location.href = url;\n  e.preventDefault();\n}\n```\n\n正如代码中的注释所述，这个特定的脚本不处理复杂（或不太复杂的……）情况。更重要的是，它不处理包含子标签的链接。例如，如果您有一个像这样常见的\
    \ HTML 块：\n\n```html\n<a href=\"/pictures/question-mark.png\" title=\"See this\
    \ picture full screen\">\n  <img src=\"/pictures/question-mark.png\" alt=\"A question\
    \ mark\">\n</a>\n```\n\n那么脚本将无法工作，因为接收事件的将是图片，而不是链接。然而，这个解决方案很容易扩展，其主要优点是不引人注目，即将\
    \ HTML 标记和 JavaScript 代码分离。当然，只要您链接到页面的其他部分或属于该 Web 应用的其他页面，它就能安全地让您保持在独立模式。对于外部链接，让操作系统启动适当的浏览器似乎是合理的，因为您无法确定远程站点是否适合独立模式，也不应该希望它们与您自己的网站关联得太紧密。\n\
    \n## 构建您的第一个 Web 应用基础项目\n"
- fmt: "# The Anatomy of a Web Application\n\nWith all these basics clear enough in\
    \ mind, it’s time we got into web app building. To make things coherent, we’re\
    \ going to show how to build a base project from scratch.\n\nThis will make examples\
    \ easier to follow throughout the chapters, and, as you extend this template,\
    \ it can greatly benefit your workflow. Respectful of the guidelines we put forward\
    \ earlier in this chapter, and to make things easier, we will be sticking to the\
    \ iOS default colors and metrics. This will also be the time to announce a few\
    \ tips to use CSS where images would have been used not so long ago (these tips\
    \ will be properly explained later, in the relevant chapter).\n\n## Your Document\
    \ Template in Komodo Edit\n\nTo create a new project in Komodo Edit, select **File**\
    \ > **New** > **New Project**. Call the new project `Web App Template`, or whatever\
    \ pleases you, and choose in which directory you want to save your files. If the\
    \ project’s sidebar is activated, you will see your new project there with the\
    \ name you gave it and the Komodo Edit project extension `.kpf`. If the sidebar\
    \ is not open, you can activate it from the **View** menu, specifically, **View**\
    \ > **Tabs & Sidebars** > **Projects**.\n\n> **NOTE:** This project definition\
    \ is based on Komodo Edit 5.x. Menu layouts and options may differ in newer versions\
    \ of the editor.\n\nNow, let’s add your first HTML file. You can do this either\
    \ by right-clicking the project name in the sidebar and choosing **Add New File**\
    \ or by selecting the menu item **Project** > **Web App Template.kpf** > **Add\
    \ New File**. A new window will pop up. From its right column, choose the appropriate\
    \ file type, HTML for now. Choose `index.html` as the file name in the text field\
    \ underneath the columns; you will notice that the correct folder to save it in\
    \ is already selected, so just click **Open**. Your new file will be displayed\
    \ in the editing area.\n\nThis file is not blank. Because you’ve chosen an HTML\
    \ file type, Komodo Edit has already done some work for you, and your basic structure\
    \ is already there. However, to fit our needs exactly, we are going to change\
    \ or add some elements. This is what your file should look like for the next step:\n\
    \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <title>Web Application Template</title>\n\
    \    <meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n    <meta name=\"\
    apple-mobile-web-app-status-bar-style\" content=\"default\">\n    <meta name=\"\
    viewport\" content=\"initial-scale=1.0;\n    maximum-scale=1.0; user-scalable=no\"\
    >\n    <link rel=\"stylesheet\" href=\"styles/main.css\">\n    <script src=\"\
    scripts/main.js\"></script>\n</head>\n<body>\n    <div class=\"view\">\n     \
    \   <div class=\"header-wrapper\">\n            <h1>Web App Header</h1>\n    \
    \    </div>\n        <div class=\"group-wrapper\">\n            <h2>iPhone</h2>\n\
    \            <p>Hello World!</p>\n        </div>\n    </div>\n</body>\n</html>\n\
    ```\n\nYou can see the special tags we have been talking about in this chapter.\
    \ Of course, if you want all of them to act as expected, you should create an\
    \ `images` folder in your root folder and populate it with a `startup.png` file,\
    \ as explained earlier. You should note that we have changed the DOCTYPE from\
    \ what it was in Komodo Edit’s default HTML file. This is the HTML5 doctype, which\
    \ we are going to use throughout this book in order to showcase the new features\
    \ of HTML5 while still producing a valid document. The uppercase letters are an\
    \ old front-end developer’s habit; since HTML5, the doctype declaration is case-insensitive.\n\
    \nIf you open this file in your browser now (or choose to see it directly in Komodo\
    \ Edit, using **View** > **Preview in Browser** from the menu), you probably won’t\
    \ be impressed. No styles are applied, and there hardly is any content. However,\
    \ you will notice that our template skeleton has several classes and IDs. These\
    \ are going to help you target elements and style them to look like a proper application.\n\
    \nCreate a new folder, still at the root of your site, called `styles`. Now, create\
    \ a CSS file as you did a few minutes ago for the HTML file, and call it `main.css`.\
    \ This file is already called in the `<head>` of your document, so whatever you\
    \ change in it should be applied immediately, so let’s add some style.\n\nFollowing\
    \ the recommendations we went through earlier, the first style rule you will add\
    \ to your style sheet will state that the document should take the entire screen\
    \ height. To mimic the iOS UI, you will also set the generic font to Helvetica.\n\
    \nFurther chapters will get deeper into CSS possibilities, so we will not explain\
    \ everything here. Simply, you could be unfamiliar with the `-webkit-` prefix.\
    \ It is a proprietary prefix (which means it isn’t interpreted by browsers other\
    \ than WebKit-based browsers) used for properties and values that are either specific\
    \ to the browser or considered unstable regarding the CSS3 specifications or their\
    \ implementation.\n\n```css\nhtml { height: 100%; }\n\nbody {\n    height: 100%;\n\
    \    margin: 0;\n    font-family: helvetica, sans-serif;\n    -webkit-text-size-adjust:\
    \ none;\n}\n```\n\nTo always make text as readable as possible, Mobile Safari\
    \ automatically changes the size of text each time the viewport orientation changes.\
    \ This isn’t always desirable, because it can break your layout or end up looking\
    \ odd if you design your pages in a particular manner. To prevent this behavior\
    \ and keep control over the appearance of your pages, we set the `-webkit-text-size-adjust`\
    \ to `none`, which disables automatic text resizing.\n\nNext, using the `-webkit-gradient()`\
    \ background extension, we create a general background without even using images.\
    \ This background is built so that all you have to do to change the color of the\
    \ element without losing the iOS look is change the `background-color` property.\
    \ As for the `.view` rule, it applies to the main container of the document views.\n\
    \n```css\nbody {\n    -webkit-background-size: 100% 21px;\n    background-color:\
    \ #c5ccd3;\n    background-image:\n        -webkit-gradient(linear, left top,\
    \ right top,\n            color-stop(.75, transparent),\n            color-stop(.75,\
    \ rgba(255,255,255,.1)) );\n    -webkit-background-size: 7px;\n}\n\n.view {\n\
    \    min-height: 100%;\n    overflow: auto;\n}\n```\n\nThen, add the header style\
    \ using the same rule applied to the body background.\n\n```css\n.header-wrapper\
    \ {\n    height: 44px;\n    font-weight: bold;\n    text-shadow: rgba(0,0,0,0.7)\
    \ 0 -1px 0;\n    border-top: solid 1px rgba(255,255,255,0.6);\n    border-bottom:\
    \ solid 1px rgba(0,0,0,0.6);\n    color: #fff;\n    background-color: #8195af;\n\
    \    background-image:\n        -webkit-gradient(linear, left top, left bottom,\n\
    \            from(rgba(255,255,255,.4)),\n            to(rgba(255,255,255,.05))\
    \ ),\n        -webkit-gradient(linear, left top, left bottom,\n            from(transparent),\n\
    \            to(rgba(0,0,64,.1)) );\n    background-repeat: no-repeat;\n    background-position:\
    \ top left, bottom left;\n    -webkit-background-size: 100% 21px, 100% 22px;\n\
    \    -webkit-box-sizing: border-box;\n}\n\n.header-wrapper h1 {\n    text-align:\
    \ center;\n    font-size: 20px;\n    line-height: 44px;\n    margin: 0;\n}\n```\n\
    \nAnd finally, this is what will allow to display our content with style:\n\n\
    ```css\n.group-wrapper {\n    margin: 9px;\n}\n\n.group-wrapper h2 {\n    color:\
    \ #4c566c;\n    font-size: 17px;\n    line-height: 0.8;\n    font-weight: bold;\n\
    \    text-shadow: #fff 0 1px 0;\n    margin: 20px 10px 12px;\n}\n\n.group-wrapper\
    \ p {\n    background-color: #fff;\n    -webkit-border-radius: 10px;\n    font-size:\
    \ 17px;\n    line-height: 20px;\n    margin: 9px 0 20px;\n    border: solid 1px\
    \ #a9abae;\n    padding: 11px 9px 12px;\n}\n```\n\nThe last exciting feature presented\
    \ here is the `border-radius` property, which will let you bring rounded borders\
    \ to any kind of element. Now, reload your page in a browser (Figure 4–7). Does\
    \ that ring a bell?\n\n**Figure 4–7.** Et voilà, your first web app!\n\n## Hiding\
    \ Mobile Safari’s Address Bar\n\nAs long as you view your site in full-screen\
    \ mode, this is all very well. However, you can’t be absolutely sure that your\
    \ end user will use it that way. A desirable trick would be to hide the address\
    \ bar—and the error console, if necessary—when the site is seen in the browser\
    \ without full-screen mode."
