    on.


    ## Centering the Map on the Location of the User


    Now that your map is correctly displayed, you can position the user on the map
    using the Geolocation API. To do this, we will add a button to the header of your
    application and add some code to launch the location request.


    CHAPTER 14: Location-Aware Web Applications


    ```

    ...

    <style>

    .header-wrapper .header-button {

    background-color: #2070e9;

    }

    ...

    </style>

    ...

    <div class="header-wrapper">

    <h1>Geolocation</h1>

    <button class="header-button" onclick="locate()" disabled>Locate</button>

    </div>

    ```


    By default, the button we add is disabled so that the user cannot ask for their
    location before the map is initialized. Here is the JavaScript that will add functionality
    to your button:


    ```

    function button(active) {

    document.getElementsByTagName("button")[0].disabled = !active;

    }


    function locate() {

    button(false);

    window.navigator.geolocation.getCurrentPosition(successCallback, failureCallback);

    }

    ```


    And we modify the `init()` function to activate our button:


    ```

    function init() {

    ...

    button(true);

    }

    ```


    Finally, let’s add callbacks to process the data returned by `getCurrentLocation()`
    and handle possible errors:


    ```

    function successCallback(position) {

    var latlng = new ns.LatLng(position.coords.latitude, position.coords.longitude);

    map.setCenter(latlng);

    map.setZoom(17);

    button(true);

    }


    function failureCallback(error) {

    switch (error.code) {

    case error.PERMISSION_DENIED:

    alert("Positioning failed. Please check that the location service is on and that
    you have accepted location for the application.");

    break;

    case error.TIMEOUT:

    case error.POSITION_UNAVAILABLE:

    alert("Positioning failed. This often occurs when you are indoors.");

    break;

    default:

    }

    }

