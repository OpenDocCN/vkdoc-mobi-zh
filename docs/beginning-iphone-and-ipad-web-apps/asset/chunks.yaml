    \ now look like Figure 9–10.\n\n![](index-300_1.jpg)\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nFigure 9–10\\. *The near to final\
    \ state of the Cover Flow experience*\n\n **For the moment, although the CSS performance\
