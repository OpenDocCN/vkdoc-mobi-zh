- fmt: '`*.target`


    The target of the event for this touch.


    Table 13–2 describes all properties available to the `Touch` object. As you can
    see, although the object holds three distinct properties to accurately position
    the event depending on your needs, all return the same value. Also take note that,
    although the `TouchEvent` object has a `pageX` property and a `pageY` property,
    these will always return `0`, forcing you to always rely on the properties of
    the `Touch` object itself.


    ## Cancelled Touch Events


    The operating system can halt a touch sequence at any moment, in which case a
    `touchcancel` event is sent. This happens, for instance, when the OS launches
    an internal event, like with a long press that will initiate a copy/paste operation,
    selecting the element pointed by the user. Using this event will let you correctly
    halt the execution of your code, because any current or pending operation will
    not resume.


    # A Page View Built with Touch and Transform


    In classic web pages, it is common to associate events with changes to the markup,
    to show a drop-down menu for instance. With Mobile Safari, you can take advantage
    of fluid CSS transitions when elements are moved. In the following example, we
    are going to implement drag-and-drop functionality using Multi-Touch events and
    transitions to achieve a result similar to the behavior of the iPhone photo album
    application. In Cocoa Touch, you would do this using the `UIPageView` object.


    ## What We Are Going to Do


    In an album, though there are generally several pictures or photographs, it is
    not necessary to create a placeholder for each, because only one image is focused
    at a time. When the user moves an image to the right or to the left, part of the
    next or previous image is uncovered. This means that we need only three areas
    where images will be displayed, as shown in Figure 13–2.


    **Figure 13–2.** Template for the page view


    With each movement to the right, the node holding the picture at the left will
    be moved to the focus area, and the area at the right will be shifted to the left
    of the focus area (and reversely for the left). After each movement, the placeholders
    from the hidden areas will need to be updated to display the relevant new picture.


    ## The Container


    We want to create the three necessary areas dynamically in order to make handling
    the page view easier. All we will need to do is define a container (with the class
    `.pageview-wrapper`) with its dimensions. Here are the styles necessary to set
    up our areas:


    ```css

    .pageview-wrapper {

    position: relative;

    overflow: hidden;

    }

    .pageview-wrapper div {

    position: absolute;

    top: 0;

    left: 0;

    width: 100%;

    height: 100%;

    }

    .pageview-group div {

    border: solid 5px black;

    -webkit-box-sizing: border-box;

    }

    .pageview-group div:first-child { left: -100%; }

    .pageview-group div:last-child { left: +100%; }

    ```


    Our three areas are absolutely positioned to make it easier to lay them out, and
    we have grouped them inside one container (`.pageview-group`) so that they do
    not need to be moved independently and less code is required. So that the areas
    are visible even if no image is displayed, we add a border to our areas. From
    there, let’s simply set dimensions for our container:


    ```css

    html, body {

    margin: 0;

    height: 100%;

    }

    .box {

    width: 100%;

    height: 100%;

    background-color: lightgrey;

    }

    ```


    In our example, we have given the container a relative width for it to take all
    the available space on the device used for testing. You can, of course, set any
    dimensions to fit your needs.


    The definition of the container in the HTML markup is very straightforward:


    ```html

    <div class="box pageview-wrapper"></div>

    ```


    For now, this all only displays a gray rectangle. The group and the areas will
    be added when the `PageView` object we are going to create will be initialized.


