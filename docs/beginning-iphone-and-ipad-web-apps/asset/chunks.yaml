    CHAPTER 13: Using Touch and Gesture Events


    up to the parent, to which the listener is attached. This allows you to concentrate
    the handler treatment.


    Figure 13–6\. The swipe movement changes the text style


    Improve Accuracy


    As you can see, implementing new gesture events is rather simple. Nonetheless,


    accuracy strongly depends on the stroke initiated by the user and may dwindle


    especially when dealing with diagonals. Diagonals will typically span over several
    columns and rows, thus multiplying possible paths for a single stroke. An interesting
    way to handle this would be to resort to regular expressions in the interpretation
    phase to limit the number of successive comparisons required to determine what
    the stroke was. This will speed your application up also because the regular expressions
    engine is executed natively, unlike custom tests that will grow more complicated
    as strokes grow more complex.


    Another approach is to work with directions rather than a grid, seeking to determine
    the orientation of strokes rather than trying to position points. This method
    is used in many applications such as Firefox’s FireGestures extension and has
    proven very accurate and efficient.


    CHAPTER 13: Using Touch and Gesture Events


    Summary


    The unique relationship established by touch between the user and the device should
    be totally taken into account when developing your applications. Not only can
    the correct use and handling of touches and gestures let you greatly enhance user
    experience: with a bit of imagination, you can also bring new functionality and
    make your applications stand out in the Web crowd.


    This all requires that you fully understand how these events work and how users
    are likely to use their device and react to the interface of your applications.
    More than ever, the best way to go further with touch and gesture events is to
    experience your own applications and experiments.


    **14**


    ****Chapter**


    Location-Aware Web


    Applications


    The App Store offers a myriad of applications that bring users services based
    on where they are at some particular moment, such as Where by uLocate, a multilocation-based
    services aggregator, or Foursquare, which offers a new way to discover your city.


    By crossing information from growing spatial-related databases with the approximate
    position of the user, you get to suggest the perfect place to eat homemade chili
    con carne, customize the user experience by giving the impression you actually
    know about the user, give the relevant afternoon’s weather, or show a map with
    the appropriate directions to any address. Since its very first release, the iPhone
    has featured ways to locate the user on a world map. Even though it didn’t primarily
    ship with an Assisted Global Positioning System (A-GPS) chip, it used a hybrid
    algorithm to determine its position: by synthesizing data from triangulation—via
    cell towers, a method widely used in cell phones—and using information gathered
    from the network through the Wi-Fi


    Positioning System (WPS), it could return its location within reasonable time.


    Triangulation became more efficient as the number of cell towers increased but
    never yielded results with an accuracy better than 100 meters; deducing position
    from network information could be very precise and fast but still depended on
    the network’s density.


    The solution was good in most cases, but there was still room for improvement.


    NOTE: Geolocation on all devices is pretty tough on the battery’s life, so always
    keep this in mind, and use these features only when required for the end user.
    For instance, prefer caching data rather than requesting a new position on every
    page load.


    Moreover, the system in use made this feature available only to native iPhone


    applications using the Core Location API. iOS 3.0 brings the exciting possibility
    to access geographical data directly with JavaScript, thanks to a new API accessible
    to Mobile Safari. This chapter will get you going with this new, rich tool available
    to you.


