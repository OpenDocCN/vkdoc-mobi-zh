    \ the features explained in this chapter are either pretty new and considered\
    \ unstable or WebKit specific and therefore are prefixed with the WebKit's proprietary\
    \ `-webkit-`. This can be needed for property values and is required for most\
    \ of the properties we are going to explain. As a good practice, you should always\
    \ declare the WebKit-specific rule followed by the proper, non-prefixed rule to\
    \ achieve maximum forward compatibility.\n\nKeep all this in mind, and dive into\
    \ the new wonders that Mobile Safari is making available to you.\n\n## Improving\
    \ the User Experience with CSS\n\nBefore we introduce a number of CSS treats brought\
    \ by the CSS3 specification and some others often sacrificed to browser compatibility,\
    \ let's go through a few Mobile Safari–specific CSS features. Although the CSS\
    \ goodness to be presented in this chapter will help you increase and refine your\
    \ control over the layout and design of your pages, you are targeting a specific\
    \ OS and browser, both of which have strong user interfaces and have created habits\
