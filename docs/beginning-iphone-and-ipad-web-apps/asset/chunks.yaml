  raw: 'Having one icon for your web application when it has a small range of different
    services is enough. However, if you build a tabbed application, with different
    categories, sections, or services, setting contrasted icons for various parts
    of the application can bring extra value to the user. You can achieve this on
    a per-page basis using a <link> tag in the head of your page, with the special
    rel attribute values apple-touch-icon and apple-touch-icon-precomposed. The full
    code to use an icon for just one page would be something like this:


    <link rel="apple-touch-icon" href="/path/to/custom-icon.png">


    <link rel="apple-touch-icon-precompsed" href="/path/to/custom-icon.png"> These
    values yield the same results as their icon-name counterparts, and the same rules
    apply.


    CHAPTER 4: The Anatomy of a Web Application


    Running Your Application Full-Screen


    You’ve made another important step in your application-not-browser experience.


    However, if this icon launches Mobile Safari with your web app inside it, the
    browser presence cannot be hidden. This is where another meta option comes in.
    Since version 1.1.3 of iOS, you can tell your page to open full-screen by default.
    Only the status bar remains visible; the rest of the screen will be dedicated
    to your page. The so-called stand-alone mode doesn’t run your web page in Mobile
    Safari; it uses the same


    rendering engine as Mobile Safari, the user will have access to functionalities
    from Mobile Safari, but the view itself will be your application.


    Here is how you do it:


    <meta name="apple-mobile-web-app-capable" content="yes"> Do not forget: your application
    will not be running in Mobile Safari or in a “lite” version of it. It is a different
    mode, which should be thoroughly tested to be sure nothing goes wrong regarding
    display and behavior. Also, be sure to make a clear and efficient navigation system
    available to the end user, because none of the navigation options from the browser
    will be at hand. Landing on an application page where one can’t


    actually do anything or where one quickly gets stuck is obviously deceptive for
    any user.


    When needed, you can check whether this mode is currently enabled with JavaScript
    with the window.navigator.standalone boolean. It is a read-only property, so you
    won’t be able to change it dynamically; however, we will show how to play with
    options and actions specific to this mode later in this chapter.


    An Awesome Startup


    Special <link> tags also allow you to trigger an image to display as a splash
    screen when your application first loads. The default behavior when a page is
    opened is to show the page as it was on last visit, until it is loaded sufficiently
    to be displayed. This not only is rather impersonal, but it can also leave users
    with the impression that the application freezes on startup and drive them away.


    On the iPhone, the OS lets you change this behavior by specifying a startup image,
    as in the code that follows. Be aware, however, that this is not possible on the
    iPad; that will systematically show a screenshot of your page.


    <link rel="apple-touch-startup-image" href="/path/to/startup-image.png"> Your
    image should be 460 pixels high and 320 pixels wide (portrait orientation). Do
    note that this height takes the status bar height into account. If your image
    occupies the whole span of the device screen, 20 pixels will be hidden behind
    the platform interface.


    CHAPTER 4: The Anatomy of a Web Application


    Tweaking the Status Bar


    You have noticed that the only iOS interface element always visible to the user
    is the status bar. Although it integrates easily with many different designs,
    you may want some control over its appearance. This is Apple: you won’t be able
    to real y change the look of the status bar. However, you can choose between variations
    so that it better fits your needs.


    To change the look of the status bar, use another meta tag in the head of your
    page.


    <meta name="apple-mobile-web-app-status-bar-style" content="default"> The content
    attribute has three options available. Other than default, you have a choice between
    black and black-translucent. Remember that this option wil work only in ful -


    screen mode. You cannot use it if the application changes to ful -screen after
    it has loaded. Again, this isn’t possible on the iPad, neither in stand-alone
    mode nor for native applications.


    Staying in Stand-Alone Mode


    The main problem with stand-alone mode is that, natively, whenever users tap a
    link to move on to another page, they wil launch Mobile Safari in normal mode,
    and that’s most of your hard work reduced to nothing. The workaround here is to
    handle al links with JavaScript and prevent the default behavior.


    If your application is primarily Ajax driven and you have only a couple of links
    on your page, this is no big deal. You can bind an event to your link directly
    from the HTML


    code, like this:


    <a href=" [http://www.apress.com](http://www.apress.com)/"


    onclick="window.location.href=this.href; return false">Apress Web Site</a> Download
    from Wow! eBook <www.wowebook.com>


    What happens here is straightforward enough. this.href gathers the linked address
    from the href attribute; window.location tel s the browser to refresh this page
    using the given address; and final y, return false prevents the default anchor
    behavior from taking place, which would have been to open a new page. You can
    even take this further by moving part of the work to an external function, which
    could look something like this: function openLink(anchor) {


    window.location.href = anchor.href;


    return false;


    }


    Your function would be cal ed from each anchor tag as fol ows:


    <a href=" [http://www.apress.com](http://www.apress.com)/" onclick="return openLink(this)">
    Apress Web Site</a>


    Nonetheless, if your application uses links more extensively, as in classic web


    navigation, we recommend you used a more advanced link-handling system. That could
    work something like this:


    /* Create a document-wide click listener */


    CHAPTER 4: The Anatomy of a Web Application


    document.addEventListener("click", clickHandler, false);


    function clickHandler(e) {


    var element = e.target;


    /* handle clicks only on anchor elements */


    if (element.localName.toUpperCase() != ''A'') {


    return;


    }


    /* ignore elements with a target value specified since "target"


    cannot be handled in full-screen mode


    those links shall open regularly in Mobile Safari */


    if (!!element.getAttribute(''target'')) {


    return;


    }


    var url = element.href;


    /* ignore links other than HTTP(S) and to different origin */


    var match = url.match(/^https?:\/\/(.+?)\/.*$/);


    if (!match || match[1] != window.location.host) {


    return;


    }


    /* finally open the link in full-screen view and prevent default behavior */


    window.location.href = url;


    e.preventDefault();


    }


    As you can tell from the comments in this code, this specific script doesn’t handle
    complex (or less complex...) situations. More importantly, it doesn’t handle links
    that have child tags. For instance, if you had an HTML block as common as this:


    <a href="/pictures/question-mark.png" title="See this picture full screen">


    <img src="/pictures/question-mark.png" alt="A question mark">


    </a>


    then the script wouldn’t work, because it would be the image, and not the link,
    that would receive the event. However, this solution is easily extended, and its
    main asset is to be unobtrusive, that is, to separate HTML markup and JavaScript
    code. And, of


    course, it will safely keep you in stand-alone mode as long as you are linking
    to other parts of a page or other pages that are part of the web application.
    For external links, it seems reasonable to always let the OS launch the proper
    browser, because you cannot be sure that distant sites will be appropriate for
    stand-alone mode, nor should you want them to be too closely associated to you
    own web site.


