    \ ul li a {\n\n...\n\nbackground: -webkit-canvas(chevron-normal) right center\
    \ no-repeat;\n\n}\n\n.group-wrapper ul li a:active {\n\n...\n\nbackground:\n\n\
    Download from Wow! eBook <www.wowebook.com>\n\n**-webkit-gradient(linear,**\n\n\
    **left top, left bottom,**\n\n**from(rgba(255, 255, 255, .25)), to(transparent)\
    \ ),**\n\n**-webkit-canvas(chevron-active) right center no-repeat** #015de6;\n\
    \n...\n\n}\n\n/* main.js */\n\ninitChevron(\"chevron-normal\", \"hsl(0, 0%, 50%)\"\
    );\n\ninitChevron(\"chevron-active\", \"hsl(0, 0%, 100%)\");\n\nfunction initChevron(id,\
    \ style) {\n\nvar context = document.getCSSCanvasContext(\"2d\", id, 22, 13);\n\
    \ncontext.save();\n\ncontext.clearRect(0, 0, 20, 13);\n\n![](index-203_1.jpg)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\ncontext.strokeStyle = style;\n\ncontext.lineWidth = 3;\n\ncontext.beginPath();\n\
    \ncontext.moveTo(4, 1);\n\ncontext.lineTo(10, 6.5);\n\ncontext.lineTo(4, 12);\n\
    \ncontext.stroke();\n\ncontext.restore();\n\n}\n\nFigure 7–11\\. Your template\
    \ menus have moved yet another step toward native application styles In the previous\
    \ chapters, you created styles to differentiate the :active and :hover states.\
    \ Here you simply extend the relevant classes, taking advantage of multiple background\
    \ support.\n\nOnce again, this code is easily reusable and customizable, and you\
    \ can, for instance, use different drawing styles for the normal and active states.\n\
    \nApplying Transformations\n\nThe Canvas API offers several methods to achieve\
    \ transformations, letting you adopt a fluid workflow. You will be able to modify\
    \ the scale, apply a rotation, or move the grid for your canvas together with\
    \ the points from your elements. These transformations will apply only to the\
    \ shapes that are to be drawn—shapes that have already been stroked will not be\
    \ altered.\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with\
    \ Canvas and SVG\n\n/* Moves the grid by 100 pixels in both directions */\n\n\
    context.translate(100, 100);\n\n/* Rotates the grid by 60 degrees */\n\ncontext.rotate(60\
    \ * Math.PI / 180);\n\n/* Scales the grid, double in width, half in height */\n\
    \ncontext.scale(2, 0.5);\n\nAll transformations are calculated from the origin\
    \ of the grid, initially the top left (0,0).\n\nThe translate() method allows\
    \ you to change this value. The rotate() method, which takes a value in radians,\
    \ will be calculated from the new point defined by the previous call to translate(),\
    \ clockwise. The advantage of these methods is that the scaling will not simply\
    \ multiply pixels. As with a vector graphics editor, proper scaling will take\
    \ place.\n\nThese basic transform methods actually are affine transformations,\
    \ calculated with matrices, with each new transformation bringing a new transformation\
    \ to the previous matrix. You can define your own matrices with the following\
    \ form.\n\nNOTE: If you are not familiar with matrices, don’t worry, because this\
    \ is only for very advanced usage of the canvas transformations. You’ll see in\
    \ Chapter 9 how to easily calculate resulting matrices with the CSSMatrix object.\n\
    \nThis is done with one of the following methods:\n\ncontext.transform(a, b, c,\
    \ d, e, f);\n\ncontext.setTransform(a, b, c, d, e, f);\n\nThe first method multiplies\
    \ the matrix defined by the current matrix parameters. The second method clears\
    \ the transformation matrix, before acting like the transform() method, applying\
    \ the new matrix.\n\n/* These methods... */\n\ncontext.translate(100, 100);\n\n\
    context.rotate(45 * Math.PI / 180);\n\n/* ... are analogous to the following */\n\
    \nvar cos = Math.cos(45 * Math.PI / 180);\n\nvar sin = Math.sin(45 * Math.PI /\
    \ 180);\n\ncontext.transform(cos, sin, -sin, cos, 100, 100);\n\nTo completely\
    \ reset the whole transformation matrix, you can use this very useful piece of\
    \ code:\n\ncontext.setTransform(1, 0, 0, 1, 0, 0);\n\nCHAPTER 7: Bitmap and Vector\
    \ Graphics and Downloadable Fonts with Canvas and SVG\n\nThis way, you will not\
    \ have to work back through all your previous transformation operations. This\
    \ of course will make your code simpler and will make it more lightweight.\n\n\
    Simplifying Drawing State Modifications\n\nThe method illustrated in the previous\
    \ section lets you easily reset all transformations.\n\nHowever, the HTML5 specification\
    \ allows for fine-tuning on the successive\n\ntransformations that you operate,\
    \ by providing means to save and restore different states of the canvas.\n\nEach\
    \ context can keep in memory a stack of the different drawing states. Thus, any\
    \ previously defined line end, color, or transformation property can be pushed\
    \ to this stack with the save() method and popped later with the restore() method,\
    \ following the last-in-first-out principle. The following code illustrates this\
    \ behavior:\n\n/* this is the current state */\n\ncontext.strokeStyle = \"red\"\
    ;\n\n/* Push the current state to the stack\n\nand draw a green rectangle */\n\
    \ncontext.save();\n\ncontext.strokeStyle = \"green\";\n\ncontext.strokeRect(10,\
    \ 10, 180, 180);\n\n/* Restore and draw a red rectangle */\n\ncontext.restore();\n\
    \ncontext.strokeRect(20, 20, 160, 160);\n\nYou can call the save() method as many\
    \ times as you like without calling restore(), which can be useful, for instance,\
    \ if you are building several functions that draw distinct graphic elements, because\
    \ you wouldn’t have to worry about the state of the drawing context. Nonetheless,\
    \ each call of the save() method requires that you at some stage call the restore()\
    \ method to return to the initial state.\n\nThis again is both a code weight saver\
    \ and a good optimization operation, because these methods are natively executed\
    \ by the script engine, without being interpreted.\n\nUsing Text\n\nAlthough the\
    \ rendering of text is part of the Canvas specification, it is not properly implemented\
    \ as of version 3.2 of iOS. However, all the methods and properties of the Text\
    \ API can be accessed without raising any exception. You will simply see no result\
    \ in the canvas area. Nevertheless, because this part of the specification is\
    \ already\n\nimplemented in Desktop Safari, we believe these features will be\
    \ added soon to future versions of Mobile Safari.\n\nThe font and its characteristics\
    \ should be defined similarly to what is found in CSS with the font shorthand.\
    \ The default is sans-serif, 10px, with a weight of 400 (aka normal).\n\nHowever,\
    \ you cannot change the line-height, which is set at a common value and will be\
    \ ignored if defined.\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\ncontext.font = \"italic 18px Georgia\";\n\nAs with\
    \ CSS, you can define font sizes with relative values such as ems. In such a case,\
    \ the actual font size will be calculated based on the computed font-size property\
    \ value applicable to the canvas at the moment it is created—not on any previous\
    \ font\n\ndeclaration with the context object. On the other side, if the canvas\
    \ is dynamically generated with JavaScript and wasn’t in the source code of the\
    \ document, relative values will be based on the default values for the context\
    \ font property.\n\n<style>\n\ndiv { font-size: 13px; }\n\n</style>\n\n<div>\n\
    \n<canvas id=\"area\" width=\"200\" height=\"200\"></canvas>\n\n</div>\n\n<script>\n\
    \nvar canvas = document.getElementById(\"area\");\n\nvar context = canvas.getContext(\"\
    2d\");\n\ncontext.font = \"italic 1.4em Georgia\";\n\ncontext.fillStyle = \"red\"\
    ;\n\ncontext.fillText(\"Some Text\", 10, 100);\n\n</script>\n\nIn this example,\
    \ because the size of the font is relative, it will be computed relative to the\
    \ CSS definition found in the style declaration. Because the <canvas> tag inherits\
    \ from its\n\n<div> parent, the font size would be 18px (13*1.4).\n\nLater in\
    \ our description of canvases, we will also see how the font face can be changed\
    \ to some other font than those installed on the device with the @font-face rule\
    \ and downloadable fonts.\n\nDrawing the Text\n\nTo draw pieces of text, you have\
    \ two methods available to you: either draw the text fill as in classic HTML or\
    \ draw only the outlines of the text. The following illustrate both methods:\n\
    \n/* Classic rendering */\n\ncontext.fillText(\"Some Text\", 0, 20);\n\n/* Outlined\
    \ text */\n\ncontext.strokeText(\"Some Text\", 0, 20);\n\nBoth methods should\
    \ take a third, optional parameter, maxWidth, that limits the content width to\
    \ the definite value. If the text would have spanned beyond this width, it is\
    \ compressed to stay inside the defined area. However, this third parameter is\
    \ not yet supported in Safari. Therefore, you will have to use a scaling method\
    \ together with the measureText() method, which returns the size of the passed\
    \ text. The following example shows how to use this to obtain such results, and\
    \ Figure 7–12 shows the result:\n\ncontext.font = \"bold 15px 'Marker Felt'\"\
    ;\n\n![](index-207_1.png)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\n/* The string to be drawn */\n\nvar str = \"The\
    \ quick brown fox jumps over the lazy dog.\";\n\n/* Measurement */\n\nvar maxWidth\
    \ = 200;\n\nvar metrics = context.measureText(str);\n\n/* Draw with and without\
    \ constrains */\n\ncontext.fillText(str, 0, 20);\n\nif (maxWidth < metrics.width)\
    \ {\n\ncontext.scale(maxWidth / metrics.width, 1);\n\n}\n\ncontext.fillText(str,\
    \ 0, 40);\n\nFigure 7–12\\. The first definition lets the text span beyond the\
    \ edges of the canvas; with the second method, the full text is rendered visibly\n\
    \nThe only FontMetrics property available for now is width, which is read-only.\
    \ It\n\nrepresents the rendered width of the string passed as a parameter to the\
    \ measureText() method. Unfortunately, there is no way to determine the line-height\
    \ or the actual height that the rendered text will take, which means you won’t\
    \ be able to determine whether your text will vertically fit into the area you\
    \ expect. This can be especially problematic, for instance, when attempting to\
    \ draw an object, such as a button, or when centering your text vertically inside\
    \ the container.\n\nText Baseline\n\nNonetheless, knowing the size of your font\
    \ can let you get a pretty close evaluation of the vertical space your content\
    \ will take. Hence, you will want to determine how the text will be displayed\
    \ within the space occupied. This can be tuned with the textBaseline property.\
    \ Although the default baseline for text content is the baseline of the square\
    \ em measure, you can, for instance, force your text to align in the middle of\
    \ this area by setting textBaseline to middle.\n\nNOTE: A square em (pronounced\
    \ “M,” not “e.m.”) is a fixed height (it varies, however, depending on the font\
    \ size) within which any character in the font set can be drawn—including accents\
    \ on uppercase letters, ascending and descending letters, and so on.\n\nOther\
    \ available values for the textBaseline property are alphabetic (default), top,\
    \ and bottom. These values are illustrated in Figure 7–13. There are other values;\
    \ however, they are currently not supported.\n\n![](index-208_1.jpg)\n\n![](index-208_2.png)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nFigure 7–13\\. Different values for the *textBaseline* property\n\nThis\
    \ of course will make the results of your code more predictable. The following\
    \ example would center your text inside its container (see Figure 7–14).\n\ncontext.font\
    \ = \"15px Zapfino\";\n\ncontext.textBaseline = \"middle\";\n\ncontext.strokeRect(50.5,\
    \ 0.5, 100, 80);\n\ncontext.fillText(\"Zapfino\", 50, 40);\n\nFigure 7–14\\. Vertically\
    \ centered text\n\nIn our example, we know that the Zapfino font is quite large,\
    \ so we draw a frame slightly higher than the 15 pixels given for the font size.\
    \ Our text is then drawn from the left side of the frame and centered vertically.\
    \ To center it horizontally too, we could, of course, use measureText() to calculate\
    \ its position depending on the text size. However, there is a far simpler method.\n\
    \nText Alignment\n\nHorizontal alignment works in roughly the same manner as vertical\
    \ alignment, though there is no em square consideration—just a start, a center,\
    \ and an end for the text, which will be values for the textAlign property. The\
    \ text in our previous example thus can be easily centered both ways by adding\
    \ this declaration to our text (Figure 7–15):\n\n...\n\n**context.textAlign =\
    \ \"center\";**\n\ncontext.fillText(\"Zapfino\", **100**, 40);\n\n![](index-209_1.png)\n\
    \n![](index-209_2.png)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\nFigure 7–15\\. The text is perfectly centered in\
    \ the frame\n\nThe preceding value depends on the text direction as defined in\
    \ the HTML document with the dir attribute. The default value for dir is ltr (left\
    \ to right), meaning that the default value, start, will make the text begin at\
    \ the given position and expand from left to right; using end, the reverse will\
    \ happen. If you gave the dir attribute the value rtl—\n\nsuch as when writing\
    \ in Hebrew or Arabic—these behaviors would be reversed.\n\nIf you do not want\
    \ your canvas to depend on the text direction, you can use the\n\ndirection-insensitive\
    \ left and right values. Of course, the value center will not be a problem, because\
    \ the text would evenly expand to both sides of the initial point.\n\nShadows\n\
    \nAs with CSS and HTML, you can apply shadows to everything drawn inside the canvas.\n\
    \nShadows are defined using four properties of the context object. To see the\
    \ effect of a shadow definition, simply add the following lines to the code of\
    \ our previous example (results in Figure 7–16):\n\n...\n\n**context.shadowColor\
    \ = \"gray\";**\n\n**context.shadowOffsetX = 2;**\n\n**context.shadowOffsetY =\
    \ 2;**\n\n**context.shadowBlur = 4;**\n\n**context.textAlign = \"center\";**\n\
    \ncontext.fillText(\"Zapfino\", 100, 40);\n\nFigure 7–16\\. The equivalent of\
    \ a text shadow within your canvases\n\nWith these few lines of code, all the\
    \ rendered shapes will gain a drop shadow. Be careful that shadowColor can take\
    \ only a color as a value, unlike strokeStyle and fillStyle that can take a gradient\
    \ or a pattern. Canvases are not yet ready for rainbow shadows. Also 188\n\nCHAPTER\
    \ 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\n\
    remember that offsets are not affected by transformations. Hence, the shadow will\
    \ always go the same sense, even after a rotation, and will always have the same\
    \ size, even after a scaling operation.\n\nNOTE: A resilient bug in WebKit’s implementation\
    \ affects all browser versions. If the shadowBlur property has its value set to\
    \ 0 (the default), the value for shadowOffsetY will systematically be treated\
    \ as negative. The easiest way to avoid this problem is to give the shadowBlur\
    \ property a forbidden value, namely, NaN, Infinite, or a negative value.\n\n\
    Moreover, the shadow will not work at all if the shape style is based on a gradient\
    \ or pattern.\n\nThe shadowBlur property gives you control over the fuzziness\
    \ of shadow. Its value should be either positive or null, and it applies a two-dimensional\
    \ Gaussian blur to the shadow. Any other value should be ignored but will be automatically\
    \ set to 0 by WebKit.\n\nClipping and Compositing\n\nBy default, all shapes are\
    \ drawn one on top of the other in the area allotted to the canvas. However, you\
    \ can constrain the drawing to a specific area of the canvas.\n\nClipping to the\
    \ Drawing Area\n\nTo bind the rendering of an element to a specific area, you\
    \ should use the clip() method. What this method does is define the current path\
    \ as a drawing area beyond which no point or line will be drawn. The following\
    \ example illustrates this behavior, and the results are shown in Figure 7–17:\n\
    \n/* The path */\n\ncontext.beginPath();\n\ncontext.moveTo(30, 70);\n\ncontext.lineTo(70,\
    \ 70);\n\ncontext.lineTo(100, 30);\n\ncontext.lineTo(130, 70);\n\ncontext.lineTo(170,\
    \ 70);\n\ncontext.lineTo(100, 160);\n\n/* Clip and implicitly close the path (for\
    \ clipping only) */\n\ncontext.clip();\n\n/* Create a gradient and draw a filled\
    \ box */\n\nvar linear = context.createLinearGradient(50, 70, 100, 200);\n\nlinear.addColorStop(0.0,\
    \ \"red\");\n\nlinear.addColorStop(0.6, \"yellow\");\n\ncontext.fillStyle = linear;\n\
    \ncontext.fillRect(0, 0, 200, 200);\n\n/* Prepare a shadow */\n\ncontext.shadowOffsetX\
    \ = 3;\n\ncontext.shadowOffsetY = 5;\n\n![](index-211_1.jpg)\n\nCHAPTER 7: Bitmap\
    \ and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\ncontext.shadowColor\
    \ = \"rgba(0,0,0,0.3)\";\n\n/* You can stroke your path too since it is drawn\
    \ across the line (3 in, 3 out) */\n\ncontext.lineWidth = 6;\n\ncontext.closePath();\n\
    \ncontext.stroke();\n\nFigure 7–17\\. The same shape drawn with and without clipping\n\
    \nThis code defines a shape to which the subsequent drawing will be bound. As\
    \ you can see Figure 7–17, multiple operations can be applied to one path—clip()\
    \ and stroke() in our example. We have added a shadow to the path stroke, which\
    \ is drawn only inside the clipping area. If you comment the context.clip() line,\
    \ you will see the same\n\ndrawing unclipped, with a broader line style and a\
    \ shadow spanning beyond the figure area. Thus, clipping can let you create slightly\
    \ inset shadows.\n\nCalls to the clip() method are cumulative, which means each\
    \ new clipping area you define will itself be clipped to any previously defined\
    \ clipping area. Consequently, you couldn’t, for instance, restore the initial\
    \ clip state by calling the clip() method with the dimensions of the canvas itself.\
    \ You will have to resort to the save() and restore() methods as explained earlier.\n\
    \nAnother limitation to the clip() method is that it can apply only with paths.\
    \ Although paths are the major part of canvas drawing, you won’t be able to define\
    \ a clipping area using text, for instance. If you want to clip using text content,\
    \ you can define a pattern containing the desired material and use it as fillStyle\
    \ or strokeStyle, as in previous examples.\n\nCompositing and Global Transparency\n\
    \nCanvases are initially transparent, which means you can create effects combining\
    \ a background on an HTML element behind your background and the elements in your\n\
    \ncanvas.\n\nTo go further, you can also benefit from advanced compositing features\
    \ of the Canvas API, using the globalCompositeOperation property. Compositing\
    \ is an operation by\n\n![](index-212_1.png)\n\nCHAPTER 7: Bitmap and Vector Graphics\
    \ and Downloadable Fonts with Canvas and SVG\n\nwhich you can combine several\
    \ images to create one final il ustration. The fol owing code is used to draw\
    \ Figure 7–18:\n\n/* Draw the source over the destination (default) */\n\ncompositing(\"\
    source-over\", 0, 0);\n\n/* Apply a eXclusive OR between the source and the destination\
    \ */\n\ncompositing(\"xor\", 160, 0);\n\n/* Fill blank pixels with the source\
    \ shape */\n\ncompositing(\"destination-over\", 320, 0);\n\nfunction compositing(mode,\
    \ x, y) {\n\ncontext.save();\n\ncontext.translate(x, y);\n\ncontext.fillStyle\
    \ = \"yellow\";\n\ncontext.fillRect(0, 0, 100, 100);\n\ncontext.globalCompositeOperation\
    \ = mode;\n\ncontext.fillStyle = \"blue\";\n\ncontext.fillRect(50, 50, 100, 100);\n\
    \ncontext.restore();\n\n}\n\nFigure 7–18\\. An illustration of compositing abilities\n\
    \nDownload from Wow! eBook <www.wowebook.com>\n\nTable 7–2 lists al the values\
    \ supported by Mobile Safari for the\n\nglobalCompositeOperation property. Be\
    \ careful: al values are case sensitive. The blending occurs between the element\
    \ to be drawn and the current canvas contents,\n\ntaking into account either the\
    \ transparent pixels (with an alpha value less than 1.0 but more than 0.0) or\
    \ the non-transparent ones.\n\nAnother feature regarding compositing is brought\
    \ by the globalAlpha property, which we have already used in our spinner example.\
    \ We used it to play with the opacity of the spinner lines. As made clear by its\
    \ name, the globalAlpha property al ows you to define an opacity value (from 0.0\
    \ to 1.0) for al rendered elements. This makes it possible to apply an alpha channel,\
    \ even to elements that do not support one by themselves, such as images. Note\
    \ that shadows that are not affected by transformations take the alpha value defined\
    \ by the globalAlpha property.\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\nTable 7–2\\. Supported Values for the *globalCompositeOperation*\
    \ Property\n\n**Value Description**\n\nsource-over\n\nThe source is drawn over\
    \ the destination. This is the default behavior.\n\nsource-atop\n\nThe source\
    \ is drawn atop the destination. The destination behaves like a\n\nmask.\n\ndestination-over\n\
    \nThe source is drawn under the destination. It is the inverse of source-over.\n\
    \ndestination-out\n\nDeletes intersecting pixels from the destination.\n\nlighter\n\
    \nDisplays the sum of the source and destination image, with color values\n\n\
    approaching 1 as limit.\n\ndarker\n\nSame as lighter but with color values approaching\
    \ 0 as limit.\n\nxor\n\nApplies an eXclusive OR operation between the two images,\
    \ removing fully\n\nopaque intersecting pixels.\n\nWorking with Canvas Pixels\n\
    \nDrawing shapes within your canvas can yield excellent results. However, to take\
    \ things much further, it is possible to include image contents directly with\
    \ the Canvas API. The following methods will let you use complete images as part\
    \ of your canvas, as shown in Figure 7–19:\n\ncontext.drawImage(image, dx, dy);\n\
    \ncontext.drawImage(image, dx, dy, dw, dh);\n\ncontext.drawImage(image, sx, sy,\
    \ sw, sh, dx, dy, dw, dh);\n\nThe called image can be an <img> element, a video,\
    \ or a canvas (either an external canvas or the current canvas). In the cases\
    \ of videos, the browser will consider only the frame at the current playback\
    \ position for insertion. These methods are subject to the same constraints as\
    \ other features such as compositing or clipping.\n\nNOTE: In the current version\
    \ of Mobile Safari, trying to access a video frame always raises a SECURITY_ERR\
    \ exception. This should occur only if the drawImage() method was used to copy\
    \ an image from an origin other than that of the executed code. This bug is not\
    \ present in Desktop Safari.\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\nFigure 7–19\\. The *drawImage()* method with different\
    \ arguments\n\nThe following code will draw an image with rounded corners:\n\n\
    <canvas id=\"area\" width=\"400\" height=\"300\"></canvas>\n\n<script>\n\n/* Create\
    \ a new Image object and attach an onload handler to it */\n\nvar image = new\
    \ Image();\n\nimage.onload = drawImage;\n\nimage.src = \"panda.jpg\";\n\nfunction\
    \ drawImage() {\n\n/* Get the canvas context */\n\nvar canvas = document.getElementById(\"\
    area\");\n\nvar context = canvas.getContext(\"2d\");\n\n/* Read image dimensions\
    \ */\n\nvar w = canvas.width;\n\nvar h = canvas.height\n\n/* Prepare a rounded\
    \ rectangle and use it as clipping area */\n\ncontext.save();\n\nroundedRect(context,\
    \ 20, 20, w - 40, h - 40, 64);\n\ncontext.clip();\n\n/* Finally, draw the image\
    \ */\n\ncontext.drawImage(this, 20, 20, w - 40, h - 40);\n\ncontext.restore();\n\
    \n}\n\nfunction roundedRect(ctx, x, y, w, h, radius) {\n\nvar x1 = x + radius,\n\
    \nvar x2 = x + w - radius;\n\nvar y1 = y + radius;\n\nvar y2 = y + h - radius;\n\
    \n![](index-215_1.jpg)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\nctx.beginPath();\n\nctx.arc(x1, y1, radius, Math.PI\
    \ * 1.0, Math.PI * 1.5);\n\nctx.arc(x2, y1, radius, Math.PI * 1.5, Math.PI * 2.0);\n\
    \nctx.arc(x2, y2, radius, Math.PI * 2.0, Math.PI * 0.5);\n\nctx.arc(x1, y2, radius,\
    \ Math.PI * 0.5, Math.PI * 1.0);\n\nctx.closePath();\n\n}\n\n</script>\n\nThis\
    \ example should be pretty clear. We define a path that draws a box with rounded\
    \ corners that we use as a clipping area. Of course, we push the context state\
    \ to the stack so that the clipping will be reset. Then, the image is rendered\
    \ inside this area with the drawImage() method. Figure 7–20 shows the resulting\
    \ canvas.\n\nFigure 7–20\\. An image with rounded corners\n\nThe image must be\
    \ loaded with the call to drawImage(), or nothing will appear. This is why we\
    \ call our function after the image onload event. The first parameter to the drawImage()\
    \ method is set to this, because the execution context is the object that sent\
    \ the event—the image defined earlier.\n\nThough using images in such a manner\
    \ offers interesting possibilities, the API allows us to go even further by directly\
    \ accessing the pixels of the canvas. Thus, you will be able to apply special\
    \ effects. In our next example, we will simply turn the image used from color\
    \ to black-and-white and invert its colors.\n\n<img src=\"flower.jpg\" onload=\"\
    snap()\" width=\"400\" height=\"300\">\n\n<canvas id=\"area\" width=\"400\" height=\"\
    300\"></canvas>\n\n<script>\n\nfunction snap() {\n\nvar canvas = document.getElementsByTagName(\"\
    canvas\")[0];\n\nvar context = canvas.getContext(\"2d\");\n\nCHAPTER 7: Bitmap\
    \ and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\n/* Draw the\
    \ image into the canvas */\n\nvar w = canvas.width;\n\nvar h = canvas.height;\n\
    \ncontext.drawImage(document.images[0], 0, 0, w, h);\n\n/* Get the input buffer\
    \ and create an output buffer */\n\nvar inp = context.getImageData(0, 0, w, h);\n\
    \nvar out = context.createImageData(inp.width, inp.height);\n\n/* Iterate through\
    \ the image pixels */\n\nfor (var y = 0; y < inp.height; y++) {\n\nvar line =\
    \ y * inp.width * 4;\n\nfor (var x = 0; x < inp.width; x++) {\n\n/* Get a pixel\
    \ and calculate its brightness */\n\nvar pixel = x * 4 + line;\n\nvar light =\
    \ 255 - (inp.data[pixel + 0] * 0.30 // Red\n\n+ inp.data[pixel + 1] * 0.59 //\
    \ Green\n\n+ inp.data[pixel + 2] * 0.11); // Blue\n\nvar out_r = light;\n\nvar\
    \ out_g = light;\n\nvar out_b = light;\n\nvar out_a = inp.data[pixel + 3]; //\
    \ Alpha\n\n/* Write the new pixel into the buffer */\n\nout.data[pixel + 0] =\
    \ out_r;\n\nout.data[pixel + 1] = out_g;\n\nout.data[pixel + 2] = out_b;\n\nout.data[pixel\
    \ + 3] = out_a;\n\n}\n\n}\n\n/* Flush the buffer to the canvas area */\n\ncontext.clearRect(0,\
    \ 0, w, h);\n\ncontext.putImageData(out, 0, 0);\n\n}\n\n</script>\n\nThe brightness\
    \ of a color is made of roughly 30 percent red, 59 percent green, and 11\n\npercent\
    \ blue components. To reverse the colors of an image, you have to invert these\
    \ three values and give the new ones to each color. In our example, we read the\n\
    \ncomponent of each pixel color found in the data array of the ImageData object\
    \ returned by the getImageData() method—and obtain the result shown in Figure\
    \ 7–21.\n\n![](index-217_1.jpg)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\nFigure 7–21\\. The original picture and the picture\
    \ transformed with the Canvas API To hold the transformed pixels, we use a buffer\
    \ created with the createImageData() method that can take either the dimensions\
    \ of the buffer or an existing ImageData object from which the dimension data\
    \ will be obtained. In both cases, the buffer will be empty.\n\nThe data property\
    \ is a one-dimensional array that holds the color components for each pixel under\
    \ the RGBA notation, which is why we multiply by four to move from one pixel to\
    \ the next.\n\nOnce the buffer holds all our transformed pixels, we write the\
    \ data to the canvas with the putImageData() method to the canvas, with an ImageData\
    \ object as a parameter and the coordinates where the image should be drawn. Optionally,\
    \ you can specify with this method a “dirty” rectangle, that is, the area to update,\
    \ so that only the defined rectangle is rendered to the canvas.\n\nUsing Vector\
    \ Graphics\n\nThe great advantage of vector graphics over bitmap images is that\
    \ they are independent of the resolution to which they are rendered and can be\
    \ scaled without loss of quality.\n\nThis is useful to draw the same background\
    \ at full screen size, whatever the size of the device—for instance, on an iPhone\
    \ and an iPad.\n\nSVG is a presentational markup language based on XML. Like the\
    \ Canvas API, it is\n\nlightweight, easily compressible (because it is text),\
    \ and is thus fast to load on portable devices that, like Mobile Safari on iPhone,\
    \ support HTTP compression even for complex documents. Note, however, that you\
    \ will obtain poorer performance with SVG than with a canvas.\n\nTaking advantage\
    \ of the fact that it is based on XML (and, unlike the canvas, which works with\
    \ an unalterable drawing process), SVG is provided with specific DOM\n\ninterfaces,\
    \ similar to that of HTML, that make it both dynamic and potentially interactive.\n\
    \nMoreover, dynamism isn’t accessible only through scripts. It has good native\
    \ support of animations through the Synchronized Multimedia Integration Language\
    \ (SMIL)\n\nintegration, a specification based on XML that aims to ease the creation\
    \ of interactive audiovisual presentations.\n\n![](index-218_1.jpg)\n\nCHAPTER\
    \ 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\n\
    Inserting SVG into Your Documents\n\nHTML5 lets you use the <svg> tag directly\
    \ in your markup, without even having to specify a namespace. Unfortunately, this\
    \ is not yet supported by Mobile Safari. To embed an SVG document into your pages,\
    \ you will have to resort either to the <img> tag, specifying the file locations\
    \ in the src attribute; to the <iframe> tag (this method is not recommended, because\
    \ it proves inflexible in Mobile Safari); or to the <object> tag, with the SVG\
    \ location as a value for the data attribute, as shown in the following example\
    \ (Figure 7–22):\n\n<img src=\"tiger.svg\" alt=\"A tiger\">\n\n<object data=\"\
    tiger.svg\" width=\"400\" height=\"400\" type=\"image/svg+xml\"></object> Figure\
    \ 7–22\\. The famous vector tiger drawn with SVG\n\nMobile Safari ignores any\
    \ width and height value given to an <iframe>, because it automatically sizes\
    \ the frame to contain the linked document. This of course is\n\nproblematic with\
    \ SVG documents, which inherently have no defined size.\n\nUnderstanding the Coordinates\
    \ System\n\nThis is not the place to get into too much detail, but it is essential\
    \ to understand how the browser renders an SVG document. Hence, we are going to\
    \ explain the necessary\n\nbasics to understand how an SVG document will be scaled\
    \ inside an HTML page in\n\nMobile Safari.\n\nThe dimensions of an SVG canvas\
    \ are initially infinite, but they are generally fixed by the width and height\
    \ attributes on the <svg> tag. The size will be considered in pixels if no measure\
    \ unit is given. For the rendering, coordinates are converted to pixels based\
    \ on a\n\n![](index-219_1.jpg)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\n96dpi resolution. This means a 4-centimeter line—as\
    \ long as the viewport for the HTML\n\ndocument is correctly set for scaling and\
    \ the scale is set at 1.0—will be rendered as 151\n\npixels – 4 / 2.53 * 96 (where\
    \ 2.53 is a rounded value for 1 inch).\n\nAs an example, let’s take a simple SVG\
    \ document where a rectangle and a circle are drawn with the <rect> and <circle>\
    \ tags (Figure 7–23). Note that the XML declaration and doctype are not mandatory.\n\
    \n<?xml version=\"1.0\" ?>\n\n<!DOCTYPE svg PUBLIC \"-//W3C//DTD SVG 1.1//EN\"\
    \n\n[\"http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd\">](http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd)\n\
    \n[<svg >](http://www.w3.org/2000/svg)\n\n<rect x=\"0\" y=\"0\" width=\"100%\"\
    \ height=\"100%\" fill=\"lightgrey\"\n\nstroke=\"black\" stroke-width=\"4\" />\n\
    \n<circle cx=\"110\" cy=\"110\" r=\"100\" fill=\"yellow\"\n\nstroke=\"red\" stroke-width=\"\
    2\" />\n\n</svg>\n\nTo add this to our HTML document, we are going to use the\
    \ <object> tag. The <img> tag is not the best solution to insert SVG elements,\
    \ and it is unlikely that you will ever really have to choose that option. Therefore,\
    \ we will systematically use the <object> tag and bring more information when\
    \ notable behavior differences arise. For now, let’s make our object 320 square\
    \ pixels.\n\nFigure 7–23\\. A simple SVG document inside an HTML document\n\n\
    Because we haven’t specified any dimension for the SVG canvas, those indicated\
    \ on the\n\n<object> tag will be used to set the rendered size, which will be\
    \ the same as the SVG\n\nviewport, that is, the area in which the document will\
    \ be drawn. In Figure 7–23, the rectangle thus completely outlines the viewport,\
    \ and, as expected, the circle has a 100\n\npixels radius (the r attribute) and\
    \ spans 200 pixels.\n\nNow, let’s explicitly set the document viewport size by\
    \ adding width and height\n\nattributes to the <svg> tag:\n\n...\n\n[<svg](http://www.w3.org/2000/svg)\n\
    \n![](index-220_1.jpg)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\n**width=\"400\" height=\"400\"** >\n\n **...\n\n\
    </svg>\n\nBecause the viewport, as defined, is larger than the object area, the\
    \ rectangle spans beyond the area (Figure 7–24), and the content is clipped. Here,\
    \ the behavior would be different using an <img> tag. Indeed, using img, the SVG\
    \ document is considered as a bitmap element, so it will be scaled to fit into\
    \ the area defined by its own attributes, without consideration of the initial\
    \ ratio.\n\nFigure 7–24\\. With a viewport explicitly larger, the document is\
    \ clipped\n\nIf a value isn’t defined inside the SVG document, it will be considered\
    \ to have the same dimensions as the host HTML document. This seems to us a limitation\
    \ of the <img> tag, although in some specific cases it can come in handy.\n\n\
    This limitation is especially sensible because, in cases where it is desirable\
    \ to determine an area of the document that would stretch to fit into some specific\
    \ container—as to apply a focus on such an area—it can be done with the viewBox\
    \ attribute. This attribute allows you to set coordinates of the rectangle to\
    \ bind to the viewport. By default, the scaling will occur while preserving the\
    \ initial ratio (Figure 7–25).\n\n...\n\n[<svg](http://www.w3.org/2000/svg)\n\n\
    width=\" **320**\" height=\" **320**\" **viewBox=\"0 0 150 800\"** >\n\n...\n\n\
    </svg>\n\n![](index-221_1.jpg)\n\n![](index-221_2.jpg)\n\nCHAPTER 7: Bitmap and\
    \ Vector Graphics and Downloadable Fonts with Canvas and SVG\n\nFigure 7–25\\\
    . The same document using the *viewBox* attribute\n\nTo clarify things, we adjust\
    \ the dimensions of the viewport again to make them fit with those of the <object>\
    \ element. As you can see in Figure 7–25, the viewBox attribute has an effect\
    \ on relative coordinates such as those defined for the rectangle but doesn’t\
    \ clip drawn lines, and the circle spans beyond the area. Moreover, because the\
    \ area defined is higher than the viewport (800px), the image is scaled.\n\nThis\
    \ default behavior can be modified with the preserveAspectRatio, for instance\
    \ by setting it to none. This way, the scaling will occur regardless of the defined\
    \ area and will span on either side to fill the viewport, as shown in Figure 7–26.\n\
    \nFigure 7–26\\. The aspect ratio can be changed with an attribute\n\nThose are\
    \ the main features available to you using SVG in HTML documents. All work with\
    \ the <object> tag. Using an <img> tag, not only will the behavior regarding dimensions\
    \ be different, but animations will not be rendered, and you will not be able\
    \ to use scripts or interactions defined in the document. Moreover, you will lose\
    \ access to the SVG DOM through JavaScript from the hosting document.\n\n![](index-222_1.jpg)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nDrawing Shapes\n\nAs stated earlier, SVG is a presentational language\
    \ that provides plenty of tags to draw most of the shapes commonly used in vector\
    \ graphics—lines, rectangles, polygons, and paths—and to define colors, stroke\
    \ styles, fil s, gradients, and transitions. Al the options available for the\
    \ canvas area are available in SVG also, though instead of being handled with\
    \ scripts, they are described with XML. The fol owing code gives examples for\
    \ a fair range of the available shapes, with the results in Figure 7–27:\n\n<svg\
    \ http://www.w3.org/2000/svg\" class=\"calibre4\">http://www.w3.org/2000/svg\"\
    >\n\n<g fill=\"yellow\" stroke=\"red\" stroke-width=\"4\" transform=\"translate(5,5)\"\
    >\n\n<circle cx=\"45\" cy=\"45\" r=\"45\" />\n\n<rect x=\"100\" y=\"0\" width=\"\
    90\" height=\"90\" rx=\"10\" ry=\"10\" />\n\n<ellipse cx=\"245\" cy=\"45\" rx=\"\
    45\" ry=\"30\" />\n\n</g>\n\n<g fill=\"yellow\" stroke=\"red\" stroke-width=\"\
    4\" transform=\"translate(5,105)\">\n\n<polyline\n\npoints=\"0,0\n\n0,90 20,90\
    \ 20,80 30,80\n\n30,90 40,90 40,80 50,80\n\n50,90 60,90 60,80 70,80\n\n70,90 90,90\
    \ 90,45\" />\n\n<polygon transform=\"translate(100, 0)\"\n\npoints=\"0,0\n\n0,90\
    \ 20,90 20,80 30,80\n\n30,90 40,90 40,80 50,80\n\n50,90 60,90 60,80 70,80\n\n\
    70,90 90,90 90,45\" />\n\n<line x1=\"200\" y1=\"0\" x2=\"290\" y2=\"90\" />\n\n\
    </g>\n\n</svg>\n\nDownload from Wow! eBook <www.wowebook.com>\n\nFigure 7–27\\\
    . Some basic shapes available with SVG\n\nThis piece of code already gives you\
    \ a look of the kind of possibilities SVG has. As you can see, you don’t need\
    \ to use paths to draw rounded corners on a rectangle, setting the optional attributes\
    \ rx and ry on the rect element. You wil also notice that the only CHAPTER 7:\
    \ Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\ndifference\
    \ between the <polyline> and <polygon> elements is that the former doesn’t automatically\
    \ close the shape.\n\nTo make this more obvious, our two shapes use the same points,\
    \ apart from the initial coordinates (so that the second doesn’t cover the first).\
    \ Finally, the transform attribute doesn’t only allow translation: you can also\
    \ rotate, scale, or skew (horizontally or vertically, with skewX and skewY) or\
    \ use a custom matrix, as with Canvas. Note that although skewing isn’t available\
    \ natively with the Canvas API, it is easily achievable using a matrix. As previously\
    \ stated, all transformations are actually affine\n\ntransformations.\n\nWe are\
    \ not going to get into the details of actually writing SVG, because the most\
    \ effective way to create SVG documents probably is to use a dedicated tool such\
    \ as Adobe Illustrator or Inkscape. Paths, for instance, are often complex and\
    \ will be easier to grasp, draw, and modify with a mouse and visual feedback.\
    \ For the same reasons that we put forward regarding Komodo Edit, we suggest using\
    \ Inkscape, a solid,\n\nfeature-rich, free, open source SVG graphical editor.\n\
    \nNOTE: Inkscape is the reference open source tool for vector graphics creation.\
    \ It is available on all operating systems and can be downloaded for free and\
    \ with no restriction from the official web site, [www.inkscape.org.](http://www.inkscape.org)\n\
    \nInteroperability\n\nOnce your document is created, you can add it to your HTML\
    \ document. Because it is often desirable to do more with images, especially SVG\
    \ images, rather than just leave them in the middle of the screen, we are going\
    \ to take the possibilities of SVG further.\n\nTo demonstrate interoperability,\
    \ let’s start by creating the same chevron as we did in an earlier example in\
    \ a canvas and use it as a CSS background. Because it is a rather simple drawing,\
    \ we can create it directly in Komodo Edit, without resorting to a specific authoring\
    \ tool. Here is the code from the *chevron.svg* document:\n\n[<svg width=\"23\"\
    \ height=\"13\">](http://www.w3.org/2000/svg)\n\n<polyline\n\nfill=\"none\" stroke=\"\
    gray\" stroke-width=\"3\"\n\npoints=\"4,1 10,6.5 4,12\"\n\n/>\n\n</svg>\n\nThis\
    \ will yield exactly the same result as the previous canvas JavaScript but by\
    \ simply using XML. You can replace your CSS rules for the chevron with the following:\n\
    \n/* main.css */\n\n.group-wrapper ul li a {\n\n...\n\nbackground: url(images/chevron.svg)\
    \ right center no-repeat;\n\n}\n\n![](index-224_1.jpg)\n\nCHAPTER 7: Bitmap and\
    \ Vector Graphics and Downloadable Fonts with Canvas and SVG\n\nNote that the\
    \ no-repeat rule is crucial. Not only can you not apply repetition to a SVG\n\n\
    image, chances are that not applying the no-repeat rule to such an image would\
    \ just result in nothing being rendered to the screen. Moreover, it would no longer\
    \ be possible to use the CSS3 background-size property.\n\nNOTE: As you may know,\
    \ it is possible to enable the accessibility features from the iPhone and iPad\
    \ settings. Doing this, you would notice that the zoom for partially sighted people\
    \ doesn’t take advantage of the scaling advantages of SVG documents. Indeed, this\
    \ option applies a zoom to the screen pixels: it doesn’t scale the SVG graphics\
    \ or fonts.\n\nWith this new definition, your chevron will be perfectly rendered\
    \ whatever the resolution of the screen and the scale that may be applied. For\
    \ instance, you can set the viewport to a scale factor of 2.4 to make your web\
    \ application take the same width on the iPhone and the iPad (unlikely you would\
    \ want to do that) with the following code:\n\n<meta name=\"viewport\" content=\"\
    initial-scale=2.4; maximum-scale=2.4; user-scalable=no\"> With this configuration,\
    \ you should see a clear difference in the quality of your graphics, as shown\
    \ in Figure 7–28.\n\nFigure 7–28\\. When zooming, the difference between bitmap\
    \ (canvas) and vector (SVG) is noticeable CHAPTER 7: Bitmap and Vector Graphics\
    \ and Downloadable Fonts with Canvas and SVG\n\nNevertheless, for now, you can’t\
    \ do everything with SVG that you can do with a canvas.\n\nIndeed, in our earlier\
    \ example, we could easily modify the color of our chevron using the initChevron()\
    \ function. This cannot be done the same way with SVG used as an image.\n\nTo\
    \ be able to change the color, we are going to add the SVG code directly to the\n\
    \nJavaScript code—which is no problem because the code is really short—and load\
    \ it\n\nusing the data URL scheme, which is an IETF standard (RFC 2397) that allows\
    \ for\n\ninstance inline inclusion in HTML, CSS, or JavaScript files. This will\
    \ also help save some HTTP requests.\n\nThe scheme can take either base64-encoded\
    \ data (especially useful to hold binary data such as images) or encoded URLs,\
    \ which we are going to use right now.\n\nLet’s start by putting our SVG document\
    \ into a JavaScript variable, taking care to delete line feeds:\n\n/* Initial\
    \ document in plain text so that it is easy to modify */\n\n[var chevron = '<svg\
    \ width=\"23\" height=\"13\">](http://www.w3.org/2000/svg)\n\n<polyline fill=\"\
    none\" stroke=\"ADD_COLOR\" stroke-width=\"3\"\n\npoints=\"4,1 10,6.5 4,12\" /></svg>';\n\
    \n/* URL encode the string */\n\nchevron = encodeURIComponent(chevron);\n\nDoing\
    \ this, note that we have replaced the stroke color by ADD_COLOR in order to easily\
    \ replace the string later. Then, the data URL will take this form:\n\nchevron\
    \ = \"data:image/svg+xml;charset=utf-8,\" + chevron;\n\nThe URL begins with the\
    \ relevant scheme, data: in this case. You then declare the MIME type for SVG\
    \ documents and the character set separated by semicolons. The\n\nactual data\
    \ starts after the comma. Now, let’s see how this is handled in the main.css style\
    \ sheet:\n\n/* main.css */\n\n.group-wrapper ul li a {\n\n...\n\nbackground: url**(#chevron,gray)**\
    \ right center no-repeat;\n\n}\n\n.group-wrapper ul li a:active {\n\n...\n\nbackground:\n\
    \n-webkit-gradient(linear,\n\nleft top, left bottom,\n\nfrom(rgba(255, 255, 255,\
    \ .25)), to(transparent) ),\n\n**url(#chevron,white)** right center no-repeat\
    \ #015de6;\n\n...\n\n}\n\nWe have added an identifier in order to allow communication\
    \ with the SVG, and for more flexibility, the color is added to the styles directly,\
    \ which is logical really! Of course, this style declaration is perfectly valid\
    \ CSS, because the #chevron is a hash that should call part of the current document.\
    \ Next, we need a script that will dynamically modify the CSS definition using\
    \ the data URL:\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts\
    \ with Canvas and SVG\n\n/* main.js */\n\nvar list = { \"chevron\": chevron };\n\
    \napplySVGBackground();\n\nfunction applySVGBackground() {\n\n/* Get all CSS attached\
    \ to the document */\n\nvar css = document.styleSheets;\n\n/* Parse them all looking\
    \ for a background url() */\n\nfor (var i = 0; i < css.length; i++) {\n\nvar rules\
    \ = css[i].rules;\n\nfor(var j = 0; j < rules.length; j++) {\n\nvar rule = rules[j].style.getPropertyCSSValue(\"\
    background-image\");\n\n/* Return an single objet, an empty collection.\n\nBe\
    \ sure to always have a list of objects */\n\nif (!rule) {\n\ncontinue;\n\n} else\
    \ if (!rule.length) {\n\nrule = [rule];\n\n}\n\nfor (var k = 0; k < rule.length;\
    \ k++) {\n\n/* Only handle certain objects */\n\nif (!rule[k].getStringValue)\
    \ {\n\ncontinue;\n\n}\n\nvar r = rule[k],\n\ntext = r.getStringValue(r.CSS_URI)\
    \ || \"\";\n\n/* If we have a hash, try to apply the SVG style */\n\nvar start\
    \ = text.indexOf(\"#\");\n\nif (start != -1) {\n\nvar defs = text.substr(start\
    \ + 1).split(\",\");\n\nr.setStringValue(r.CSS_URI, getSVG(defs[0], defs[1]));\n\
    \n}\n\n}\n\n}\n\n}\n\n}\n\nfunction getSVG(id, color) {\n\nif (list[id] != undefined)\
    \ {\n\ncolor = color.replace(\"[\", \"%28\").replace(\"]\", \"%29\"); return list[id].replace(\"\
    ADD_COLOR\", color);\n\n}\n\n}\n\nFirst, we save our chevron to the list object,\
    \ which will allow communication between the hash read in the CSS file and the\
    \ data URL to use. The applySVGBackground()\n\nfunction gathers a collection of\
    \ objects using the document.styleSheets property that holds the styles from the\
    \ HTML document, regardless if they are declared as links to external style sheets\
    \ or style declarations inline. This collection is parsed to look for rules relevant\
    \ to our purpose. The parsed rules are in computed style, which is why we can\
    \ CHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\naccess the background-image property where the background shorthand is\
    \ used in the actual style sheet. We must be careful here to handle multiple background\
    \ definitions, not to lose styles in the process.\n\nNext, once we have obtained\
    \ a two-element long array (identifier and color), we pass the array to the getSVG()\
    \ function. This function returns the data URL relative to the identifier, inserting\
    \ the passed color at the expected place. From there, everything is automatic.\n\
    \nAll CSS2.1 color definitions can be used, as well as the named colors introduced\
    \ by SVG. On the other side, for colors written as an rgb() declaration, you should\
    \ replace the parentheses with square brackets, so you don’t generate an erroneous\
    \ CSS rule that would not be accessible and thus not alterable by our script.\
    \ The getSVG() function will take care of changing the square brackets back to\
    \ the usual form.\n\n/* Invalid definition */\n\nurl(#chevron,rgb(0,0,0))\n\n\
    /* Correct definitions */\n\nurl(#chevron,rgb[0,0,0])\n\nurl(#chevron,black)\n\
    \nurl(#chevron,#000)\n\nThe strong point of this script is that it is very generic\
    \ and can be used without any changes. To use it with other SVG documents, the\
    \ only thing to do (other than declaring styles in the CSS) is add it to the list\
    \ object with the identifier and the encoded data.\n\nvar list = { \"chevron\"\
    : chevron , **\"identifier\": svgDataUrl** }; Now, you may wonder what happens\
    \ working with more complex documents, if you\n\nwanted to affect the DOM directly.\
    \ As we have said earlier, this is not possible when using the <img> tag to insert\
    \ SVG document—and it is not possible when the SVG is used as a background-image\
    \ either. However, if your SVG is brought to the document using the <object> tag,\
    \ you can communicate with the SVG document, as long as its DOM has been entirely\
    \ loaded and has the same origin as the HTML and scripts (that is, it is on the\
    \ same domain). In this case, we could use the onload event of the HTML\n\ndocument;\
    \ instead, we are going to experience the communication possibilities between\
    \ SVG and HTML.\n\nCommunication\n\nAs we have said, SVG has support for scripting,\
    \ so we can add JavaScript directly into the SVG document. This is how we modify\
    \ our previous file:\n\n<?xml version=\"1.0\" ?>\n\n<!DOCTYPE svg PUBLIC \"-//W3C//DTD\
    \ SVG 1.1//EN\"\n\n[\"http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd\">](http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd)\n\
    \n[<svg](http://www.w3.org/2000/svg) **onload=\"notify()\"** >\n\n<rect x=\"0\"\
    \ y=\"0\" width=\"100%\" height=\"100%\" fill=\"lightgrey\"\n\nstroke=\"black\"\
    \ stroke-width=\"4\" />\n\n<circle cx=\"110\" cy=\"110\" r=\"100\" fill=\"yellow\"\
    \n\nstroke=\"red\" stroke-width=\"2\" />\n\nCHAPTER 7: Bitmap and Vector Graphics\
    \ and Downloadable Fonts with Canvas and SVG\n\n**<script type=\"text/ecmascript\"\
    ><![CDATA[**\n\n**function notify() {**\n\n**parent.svgLoaded(this);**\n\n**}**\n\
    \n**]]></script>**\n\n</svg>\n\nThe onload event is added directly to the SVG\
    \ document. The called function notifies the HTML document that the SVG is ready.\
    \ From there, the SVG document can access the\n\nHTML elements using the parent\
    \ object. By default, the scripting language for SVG is ECMAScript, a specification\
    \ from which JavaScript inherits. Therefore, the code should be pretty clear.\
    \ Inside the HTML document, we add the following code and JavaScript:\n\n<script>\n\
    \nfunction svgLoaded(svg) {\n\nvar circles = svg.document.getElementsByTagName(\"\
    circle\");\n\ncircles[0].setAttribute(\"r\", 200);\n\nvar ellipse =\n\n[svg.document.createElementNS(\"\
    http://www.w3.org/2000/svg\", \"ellipse\");](http://www.w3.org/2000/svg)\n\nellipse.setAttribute(\"\
    cx\", \"50%\");\n\nellipse.setAttribute(\"cy\", \"50%\");\n\nellipse.setAttribute(\"\
    rx\", \"150\");\n\nellipse.setAttribute(\"ry\", \"50\");\n\ncircles[0].parentNode.appendChild(ellipse);\n\
    \n}\n\n</script>\n\n<object data=\"notify.svg\" width=\"320\" height=\"320\"\n\
    \ntype=\"image/svg+xml\" id=\"mySVG\"></object>\n\nThe svgLoaded() function receives\
    \ a reference to the SVG document, modifies the\n\nradius of the circle, and creates\
    \ an ellipse to be inserted into the document. It is necessary here to use the\
    \ namespace version of the createElement() method.\n\nOtherwise, the object will\
    \ be created with the wrong element type and will be impossible to add to the\
    \ SVG document.\n\nNOTE: In this example, the SVG establishes a communication\
    \ with the HTML document. The JavaScript in the HTML is not explicitly asking\
    \ for access to the SVG document (as we will do later in this section). Therefore,\
    \ it can be useful to identify the document in question. To do this, you can use\
    \ the location property of the SVG document object, which holds the various parts\
    \ of the document URL. To get an ID, it is possible, for instance, to add a hash\
    \ to the URL in the data parameter of the <object> tag that holds your SVG and\
    \ collect this using the hash property of the Location object.\n\nIn Figure 7–29,\
    \ this method is used on the document object of the SVG document, but we also\
    \ could have used it on the document object of the HTML DOM.\n\n![](index-229_1.jpg)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nFigure 7–29\\. The modified document\n\nYou can also acquire full control\
    \ over your HTML document from the host file. The following is the code that we\
    \ would have used to create HTML tags in the HTML\n\ndocument from a script in\
    \ the SVG.\n\n/* Create a new <div> element in the host document */\n\n[var div\
    \ = document.createElementNS(\"http://www.w3.org/1999/xhtml\", \"div\");](http://www.w3.org/1999/xhtml)\n\
    \ndiv.style.width = \"100px\";\n\ndiv.style.height = \"100px\";\n\ndiv.style.backgroundColor\
    \ = \"green\";\n\nparent.document.body.appendChild(div);\n\nHere, it is the SVG\
    \ that should indicate when it is available so that it can be referenced by its\
    \ host. If we had used the onload event of the HTML document, we could have used\
    \ the getSVGDocument() method to get a reference to the SVG. This could, for instance,\
    \ look like the following:\n\nvar svg = document.getElementById(\"mySVG\").getSVGDocument();\n\
    \nFrom there, the rest of the code is still valid and should yield the same results.\
    \ It is merely another method to access the SVG code from the HTML document. These\n\
    \ntechniques will even allow you to animate your pages with scripting, both from\
    \ the XML\n\nand from the HTML.\n\nAnimation with and Without Scripting\n\nThough\
    \ you can animate SVG elements with a scripting language, this is not the only\
    \ way to do it. Indeed, SVG integrates the Synchronized Multimedia Integration\
    \ Language (SMIL), which is widely used today to produce multimedia content, and\
    \ more specifically the SMIL Animation Specification, which was collaboratively\
    \ established by the SMIL\n\nand SVG Working Groups. SVG inherits much of its\
    \ functionality and animation\n\npossibilities from these technologies.\n\nOnce\
    \ again, we are going to take our spinner example first created in a canvas and\
    \ adapt it to pure SVG. The first step is to draw the spinner using XML.\n\n[<svg](http://www.w3.org/2000/svg)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nviewBox=\"0 0 37 37\">\n\n<defs>\n\n<line x1=\"0\" y1=\"9\" x2=\"0\"\
    \ y2=\"15\" id=\"line\" />\n\n</defs>\n\n<g transform=\"translate(18,18)\" stroke=\"\
    rgb(0,0,0)\" opacity=\"0.5\"\n\nstroke-width=\"3\" stroke-linecap=\"round\">\n\
    \n<use xlink:href=\"#line\" transform=\"rotate(-30)\" opacity=\"0.85\">\n\n<use\
    \ xlink:href=\"#line\" transform=\"rotate(-30)\" opacity=\"0.85\">\n\n<use xlink:href=\"\
    #line\" transform=\"rotate(-30)\" opacity=\"0.85\">\n\n<use xlink:href=\"#line\"\
    \ transform=\"rotate(-30)\" opacity=\"0.85\">\n\n<use xlink:href=\"#line\" transform=\"\
    rotate(-30)\" opacity=\"0.85\">\n\n<use xlink:href=\"#line\" transform=\"rotate(-30)\"\
    \ opacity=\"0.85\">\n\n<use xlink:href=\"#line\" transform=\"rotate(-30)\" opacity=\"\
    0.85\">\n\n<use xlink:href=\"#line\" transform=\"rotate(-30)\" opacity=\"0.85\"\
    >\n\n<use xlink:href=\"#line\" transform=\"rotate(-30)\" opacity=\"0.85\">\n\n\
    <use xlink:href=\"#line\" transform=\"rotate(-30)\" opacity=\"0.85\">\n\n<use\
    \ xlink:href=\"#line\" transform=\"rotate(-30)\" opacity=\"0.85\">\n\n<use xlink:href=\"\
    #line\" transform=\"rotate(-30)\" opacity=\"0.85\" />\n\n</use>\n\n</use>\n\n\
    </use>\n\n</use>\n\n</use>\n\n</use>\n\n</use>\n\n</use>\n\n</use>\n\n</use>\n\
    \n</use>\n\n<animateTransform attributeName=\"transform\" attributeType=\"XML\"\
    \n\ntype=\"rotate\" values=\"0;30;60;90;120;150;180;210;240;270;300;330\"\n\n\
    calcMode=\"discrete\" repeatCount=\"indefinite\" additive=\"sum\" dur=\"1.2s\"\
    \ />\n\n</g>\n\n</svg>\n\nThe logic behind this code is still very close to what\
    \ has been done with the Canvas API, and you will see that the result is the same\
    \ as that of the canvas. Even the line ends and the stroke styles are calculated\
    \ in the same manner, pixel for pixel.\n\nFirst, we add the namespace that allows\
    \ us to reference objects from some tags. The\n\n<defs> tag is meant to define\
    \ reusable elements and, in our example, is very useful to create the primary\
    \ line with a rounded end that we will repeat inside the <g> tag.\n\nOn the <g>\
    \ tag, we add several attributes that let us define the basic styles for its children.\
    \ SVG can also take CSS rules, so this could have been done with the code that\
    \ follows. However, be careful when doing this, because it will no longer be possible\
    \ to modify element attributes with the setAttribute() method.\n\n<!-- Styles\
    \ defined with the style attribute -->\n\n<g transform=\"translate(18,18)\"\n\n\
    CHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\
    \nstyle=\"stroke:rgb(0,0,0);opacity:0.5;stroke-width:3;stroke-linecap:round\"\
    >\n\n</g>\n\n<!-- Styles defined using the <style> tag -->\n\n<defs>\n\n<style\
    \ type=\"text/css\"><![CDATA[\n\ng {\n\n**stroke: rgb(0,0,0);**\n\n**opacity:\
    \ 0.5;**\n\n**stroke-width: 3;**\n\n**stroke-linecap: round;**\n\n}\n\n]]></style>\n\
    \n</defs>\n\nNext, we add a number of <use> tags so that each inherits from its\
    \ parent, and then, altogether, they draw our 12-branched spinner. Hence, the\
    \ definition is the same for each branch, but because each one inherits from its\
    \ parent and rotation and opacity are relative to the parent, we end up with a\
    \ circular shape with a progressive fade-out effect.\n\nThe <use> tag lets you\
    \ reference an object defined with its id through the xlink:herf attribute. From\
    \ there, as with any other shape, you can attach style or transformation attributes\
    \ to it.\n\nThe last tag in use is the <animateTransform> tag. Its purpose is,\
    \ quite obviously, to bring animation to the transformations applied to objects—rotate()\
    \ in our example. To avoid interpolation between the different steps of the animation\
    \ and instead obtain a fluid movement of the shape as a whole, we use the values\
    \ attribute that lets you define a series of values to be applied to the property\
    \ you want to be animated. The calcMode attribute set to discrete is what avoids\
    \ interpolation. This way, the shape itself seems not to move, and what appears\
    \ to take place is a color rotation. To have a full turn that takes 100ms, we\
    \ have fixed the dur attribute to 1.2s—because there are still 12 steps.\n\nThe\
    \ additive attribute set to sum makes the animation cumulative so that no\n\n\
    transformation is lost. If it had been set to replace, we would have lost the\
    \ translation, and the shape would have changed its origin from the first iteration.\n\
    \nOf course, the spinner drawing could have been made shorter and thus perhaps\
    \ easier to maintain—but we wanted the code to be clear to understand. You can,\
    \ for instance, replace all the <use> tags with the following script after the\
    \ <g> tag:\n\n...\n\n<script type=\"text/ecmascript\"><![CDATA[\n\nvar g = document.getElementsByTagName(\"\
    g\");\n\nvar use, prev = g[0];\n\nfor (var i = 0; i < 12; i++) {\n\n[use = document.createElementNS(\"\
    http://www.w3.org/2000/svg\", \"use\");](http://www.w3.org/2000/svg)\n\n[use.setAttributeNS(\"\
    http://www.w3.org/1999/xlink\", \"href\", \"#line\");](http://www.w3.org/1999/xlink)\n\
    \nuse.setAttribute(\"transform\", \"rotate(-30)\");\n\nuse.setAttribute(\"opacity\"\
    , \"0.85\");\n\nprev.appendChild(use);\n\n![](index-232_1.png)\n\nCHAPTER 7: Bitmap\
    \ and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\nprev = use;\n\
    \n}\n\n]]></script>\n\n...\n\nTo create objects appropriately, we once again use\
    \ createElementNS(), and then we use setAttributeNS() to set the href attribute\
    \ that isn’t part of the SVG namespace. The loop wil create the 12 <use> tags\
    \ for you, which in turn wil draw the 12 branches, entwining them as with the\
    \ previous XML code.\n\nThe new spinner is now ready to be added to any of your\
    \ HTML documents, with the\n\nsame quality at any size, as shown on Figure 7–30\\\
    . Indeed, because we have used\n\nviewBox in our example, the SVG drawing wil\
    \ adapt to fil its container. Al you have to do is set the width and height attributes\
    \ to fit your needs.\n\nFigure 7–30\\. A pretty big spinner\n\nCoping with Temporary\
    \ Bugs\n\nDownload from Wow! eBook <www.wowebook.com>\n\nThe only bad news is\
    \ that a recent bug in Safari prevents SVG graphics from appearing as translucent\
    \ when inserted using a holder tag. This means that a white background wil always\
    \ appear behind ful y or partial y transparent areas. This can be remedied at\
    \ least in cases where you can define a plain background for your graphics by\
    \ adding an option to our previous script, as we had done for the chevron color.\
    \ Again, we can grab this option from the hash. The <object> definition looks\
    \ like this:\n\n<object data=\"spinner.svg**#green,red,0.5**\"\n\nwidth=\"320\"\
    \ height=\"320\" type=\"image/svg+xml\"></object> Then, simply add the fol owing\
    \ to the end of the previous script in the SVG document: var hash = window.location.hash;\n\
    \nif (hash != \"\") {\n\nvar defs = hash = hash.substr(1).split(\",\");\n\n/*\
    \ Create the background color */\n\nif ((defs[0] || \"transparent\") != \"transparent\"\
    ) {\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas\
    \ and SVG\n\n[var rect = document.createElementNS(\"http://www.w3.org/2000/svg\"\
    , \"rect\");](http://www.w3.org/2000/svg)\n\nrect.setAttribute(\"width\", \"100%\"\
    );\n\nrect.setAttribute(\"height\", \"100%\");\n\nrect.setAttribute(\"fill\",\
    \ defs[0]);\n\ng[0].parentNode.insertBefore(rect, g[0]);\n\n}\n\n/* Additionally\
    \ change the spinner color and opacity if defined */\n\nif (defs[1]) {\n\ng[0].setAttribute(\"\
    stroke\", defs[1]);\n\n}\n\nif (defs[2]) {\n\ng[0].setAttribute(\"opacity\", defs[2]);\n\
    \n}\n\n}\n\nThe SVG code will be able to identify this information in the URL,\
    \ still using the location.hash property, and use them to alter the background\
    \ color (green), the spinner color (red), and the opacity of the branches (0.5).\n\
    \nOne interest of this method compared to using a script in the host HTML document\
    \ to apply modifications is that you won’t have to worry about waiting for the\
    \ SVG document to load before calling the function. Because there is no dependence\
    \ between the\n\ndocuments, handling functionalities is easier.\n\nPreinstalled\
    \ and Downloadable Fonts\n\nUsing fonts other than the default serif, sans-serif,\
    \ and monospace is often a crucial step on the way to more attractive web pages.\
    \ iOS comes with a number of already\n\ninstalled fonts that you can safely rely\
    \ on. The following is the list, and Figure 7–31\n\nshows what each font looks\
    \ like on-screen:\n\nAmerican Typewriter\n\nArial\n\nArial Rounded MT Bold\n\n\
    Courier New\n\nGeorgia\n\nHelvetica\n\nMarker Felt\n\nTimes New Roman\n\nTrebuchet\
    \ MS\n\nVerdana\n\nZapfino\n\n![](index-234_1.jpg)\n\nCHAPTER 7: Bitmap and Vector\
    \ Graphics and Downloadable Fonts with Canvas and SVG\n\nFigure 7–31\\. Fonts\
    \ natively available on iOS\n\nOther fonts are installed, but they are used only\
    \ to render different alphabets, such as Hebrew, Japanese, or Arabic. You cannot\
    \ simply use these by their names in your style sheets, because they are extended\
    \ character sets meant to be system fonts for foreign alphabets. However, some\
    \ do offer interesting versions of the Roman character set. For instance, you\
    \ could try “Heidi J” or “.Helvetica LT MM” (don’t forget the leading point).\n\
    \nNOTE: If you want to discover all the font available on your device, you can\
    \ download the free Typefaces application (formerly Cédille) by Tomoaki Nakano\
    \ from the App Store.\n\nNevertheless, you can also use fonts that are not actually\
    \ installed on the system, if the installed fonts don’t necessarily fit your specific\
    \ needs. You probably have resorted to images and more or less complicated CSS\
    \ tricks in such cases. Creating a header on every page with this kind of technique\
    \ can prove unproductive and annoying, especially with multilingual sites—which\
    \ can lead to leave your initial design aside.\n\nMobile Safari, starting with\
    \ version 3.1, supports the CSS3 @font-face property, which will let you specify\
    \ a downloadable font from the growing list of appropriately licensed fonts. This\
    \ of course is much more flexible, because this will make the font available almost\
    \ like any other font that would be installed on the OS.\n\n![](index-235_1.jpg)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nWARNING: The most important limitation to this property is the question\
    \ of licensing. That a font is installed on your own system or is downloadable\
    \ for free doesn’t necessarily mean it can be used in all cases and for all purposes.\
    \ For any font you choose to use, you should check whether it is all right to\
    \ use in your specific case. Always check the license or contact the author prior\
    \ to using a font.\n\nMobile Safari has support for SVG fonts only. SVG allows\
    \ you to define several fonts using the <font> tag, and you can add them directly\
    \ to the document. However, because character definitions often use many complex\
    \ paths and need a long kerning definition, it is more productive to use a font\
    \ creation application.\n\nFontForge is a powerful, open source font editor and\
    \ converter that works on all\n\nplatforms and won’t cost you a thing. It can\
    \ handle TrueType (TTF), OpenType (OTF), and of course SVG. You can download it\
    \ from the SourceForge web site at\n\n[http://fontforge.sourceforge.net/](http://fontforge.sourceforge.net).\n\
    \nGenerally, you will not be creating your own fonts; you will simply want to\
    \ convert existing ones. Be it a font that is installed on your system but is\
    \ known not to be common on some other system or a font that you have downloaded,\
    \ the software will ask you to choose a font when you launch it. Quite evidently,\
    \ it is unlikely that you would want to convert a font such as Arial, Verdana,\
    \ or Times for @font-face inclusion. Table 7–3 gives you the default folders for\
    \ font files on different operating systems.\n\nTable 7–3\\. Availability of Fonts\
    \ on the Main Operating Systems\n\n**Mac OS X**\n\n**Windows**\n\n**Linux**\n\n\
    ~/Library/Fonts/\n\n%windir%\\fonts\\\n\n~/.fonts/\n\n/Library/Fonts/\n\n/usr/share/fonts/\n\
    \n/System/Library/Fonts/\n\n(%windir% is usually C:\\Windows)\n\nChoose the font\
    \ you want to work with, and click OK. If the font holds some license information,\
    \ FontForge will ask you whether you have the necessary rights to edit the font\
    \ (see Figure 7–32).\n\nFigure 7–32\\. FontForge may ask for permission to load\
    \ the font\n\nOnce you have loaded the font into the software, a new window will\
    \ appear containing all the available glyphs (Figure 7–33). From the menu in this\
    \ window, choose File\n\n![](index-236_1.jpg)\n\nCHAPTER 7: Bitmap and Vector\
    \ Graphics and Downloadable Fonts with Canvas and SVG\n\nGenerate Fonts..., give\
    \ a name to your font, select SVG format, and save. You are almost done.\n\nFigure\
    \ 7–33\\. The font window with the font glyphs and the export dialog box\n\nWe\
    \ write *almost* because, as explained earlier, the namespace definition is required\
    \ for Mobile Safari to correctly interpret the font—however, FontForge doesn’t\
    \ add this.\n\nTherefore, you will need to edit the font source, for instance\
    \ by using Komodo Edit.\n\nWhat you need to modify is the <svg> tag, as follows:\n\
    \n<svg [](http://www.w3.org/2000/svg)**> Once this is done, simply save the document.\
    \ Now your font is ready for the Web! All you have to do is add the following\
    \ rule into the relevant style sheet. Whereas Desktop Safari will ask for permission\
    \ before downloading the font, the mobile version of the browser will just do\
    \ it without complaining.**\n\n **@font-face {\n\nfont-family: \"My Font Face\"\
    ;\n\nsrc: local(\"Baskerville\"), url(\"pathto/mybaskerville.svg#fontID\") format(\"\
    svg\");\n\n}\n\nThere are several important steps here. First, you need to name\
    \ your font for further use with the font-family property. For this, avoid using\
    \ real font family names so it doesn’t conflict with other fonts. In our example,\
    \ we have exported the font “Baskerville” and named it “My Font Face”.\n\nBecause\
    \ nothing proves the font will not be installed in future versions of iOS, you\
    \ will not want it to be downloaded systematically—in case it could be useless.\
    \ Therefore, the first source we indicate for the browser to look for the font\
    \ is the proper font name, to be searched directly in the OS fonts. This is done\
    \ with the local() function. The url() function, as with background-image, is\
    \ used to indicate a remote URL, in this case, the path to the downloadable font.\
    \ Specifying the format is necessary for the rule to work, as is the reference\
    \ to the <font> tag identifier in the hash of the URL (fontID in our CHAPTER 7:\
    \ Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\nexample).\
    \ Note that the latter is required even if there is only one font tag in the document.\
    \ Because SVG is primarily a format meant to describe vector documents, it is\
    \ absolutely possible to define several fonts in one document. This of course\
    \ can be useful if you need to define several SVG fonts, because it would limit\
    \ the number of HTTP requests.\n\nYour newly defined font can now be used in your\
    \ documents as any other (Figure 7–34).\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\
    \n<title>Definition</title>\n\n<meta name=\"viewport\" content=\"initial-scale=1.0;\n\
    \nmaximum-scale=1.0; user-scalable=no\">\n\n<style>\n\nbody {\n\nbackground: #fce9cb\
    \ -webkit-gradient(linear,\n\nleft top, left 50%,\n\nfrom(rgba(95,66,21,0.5)),\
