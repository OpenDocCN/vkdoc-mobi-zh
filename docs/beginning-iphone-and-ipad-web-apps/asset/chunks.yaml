    Safari possibilities we are going to start with will let you build applications
    that integrate even better into the user’s device to improve their user experience.


    User Feedback


    On a device with such close interaction between the user and the interface, it
    is important that actions on the user side trigger visual feedback in your web
    applications, as we explained in Chapter 5.'
  trans: "\n```css\n.header-wrapper {\n  color: #727880;\n  text-shadow: rgba(255,255,255,0.7)\
    \ 0 1px 0;\n  border-top-color: #fff;\n  border-bottom-color: #3e4149;\n  background:\
    \ -webkit-gradient(linear, left top, left bottom, from(#f4f5f7), to(#a8adb8));\n\
    \  -webkit-background-size: 100%;\n}\n\n.group-wrapper p,\n.group-wrapper ul {\n\
    \  -webkit-box-shadow: 0 1px 0 #fff;\n  border-color: #b2b5b9;\n}\n```\n\n# 第\
    \ 5 章：用户体验与界面指南\n\n目前，你只是改变了页眉的颜色，使其与 iPad 的配色方案相匹配。不过，完全没必要无意义地重载你的 iPhone 样式表，因为当你的网页应用在\
    \ iPad 或桌面浏览器上使用时，你也可以加载一个不同的、特定的文件。这可以通过在`<link>`标签的`media`属性中指定设备宽度来实现：\n\n\
    ```html\n<link rel=\"stylesheet\" href=\"styles/big.css\"\nmedia=\"only screen\
    \ and (min-device-width:640px)\">\n```\n\n这样一来，如果用户使用的是 iPhone，就不会加载任何内容，但你可以为更大的设备添加合适的样式。将上述代码添加到你的模板`styles`目录下的一个名为`big.css`的文件中。\n\
    \n现在你有了针对 iPad 的特定样式表，让我们在其中添加一些代码，以实现之前提到的分屏视图。你将按照原生 iPad 已安装应用程序的实现方式来应用它。请注意，在横屏模式下，两列的高度必须相同，这一点很重要。因此，你对主视图和辅助视图使用了`table`和`table-cell`的显示属性值，这避免了使用\
    \ JavaScript 或利用背景图片的视觉假象，那些方式对渲染引擎负担更重、加载时间更长，而且整体上不够优雅且难以维护。\n\n```css\n.split-view\
    \ {\n  display: table;\n  width: 100%;\n  height: 100%;\n}\n\n.split-view .view\
    \ {\n  display: table-cell !important;\n}\n\n.split-view .view:first-child {\n\
    \  border-right: solid 1px black;\n  width: 320px;\n}\n```\n\n你的标记代码将会像这样简单：\n\
    \n```html\n<div class=\"split-view\">\n  <div class=\"view\">\n    第 5 章：用户体验与界面指南\n\
    \    ...\n  </div>\n  <div class=\"view\">\n    ...\n  </div>\n</div>\n```\n\n\
    现在，只需别忘了在你的主样式表中添加以下代码，以向 iPhone 用户隐藏辅助内容：\n\n```css\n.split-view .view:first-child\
    \ {\n  display: none;\n}\n```\n\n这不会在 iPad 上生效，因为你之前已经在`display:table-cell`规则上指定了`!important`。`!important`声明会覆盖样式表或内联样式中的所有其他规则。\n\
    \n## 勇于创新\n\n你现在已经具备了高效构建 iPhone 和 iPad 应用的知识和工具。一个摆脱默认设置的简单起点是：保持整体布局不变（你已经理解了所呈现的布局选择如何对网页应用的可用性产生积极影响），然后调整应用的颜色方案。iOS\
    \ 的默认颜色虽然独特，但有时会显得有点冷冰冰。其相关性也取决于你的目标用户群体。例如，灰蓝配色方案可能会让青少年用户感到乏味。\n\n一个简单又有趣的配色方案尝试方法是访问网站[`kuler.adobe.com/`](http://kuler.adobe.com/)。在那里，你可以从众多用户提交的主题中选择，或者创建自己的主题。你的想法是轻松生成符合苹果设计初期精神的配色组合。你也可以去那里了解当前流行的配色方案，或者寻找灵感。\n\
    \n当然，为你的网页应用寻找原创设计方法的最佳途径，就是尽可能多地实际使用你的目标设备。不仅是作为开发者，还要作为用户去深入了解它们，这将极大地帮助你理解什么“管用”，什么不管用。\n\
    \n模仿目标操作系统的用户界面是一个良好的开端，可以让你的应用更容易被用户接受。即使是懒惰的用户也应该能轻松适应他们熟悉的环境。因此，你的应用界面应该在现有基础上进行精心设计和直观构建。\n\
    \n尽管如此，你还应该经常能从日常生活中找到好的灵感。你喜欢整理文件来让自己井井有条吗？你需要一幅能让自己在良好状态下工作的宁静风景画吗？找到将这些体验移植到你的应用中的方法。很可能你不是唯一有这种需求的人，这种创新就能区分“好”与“优秀”。为了提供不同的体验，在简洁清晰的\
    \ iOS 界面基础上进行构建，创造出美丽而新颖的环境。\n\n## 第 5 章：用户体验与界面指南 — 总结\n\n为移动设备进行开发并不容易。你必须摒弃许多在传统\
    \ Web 上占主导地位的原则和习惯，才能打造出成功的网页应用。所有基于 iOS 的设备都为你的应用（从而也为用户）提供了出色的标准支持、简洁的界面和精巧的功能。\n\
    \n然而，这同时也伴随着一系列约束。你必须极为小心，不要让用户失望，始终为他们带来尽可能最佳的体验，并考虑到他们已习惯的标准。\n\n要从根本上思考你的设计流程，但不要忘记你从以往开发中学到的东西。你拥有大量可用的工具，因此要充分利用它们，创造相关且独特的体验。在接下来的章节中，我们将更详细地探讨利用\
    \ WebKit 和 iOS 技术可以实现哪些功能。\n\n---\n\n# 第 6 章：用于网页应用用户界面的有趣 CSS 特性\n\nHTML5 在文档语义方面比该语言的先前版本走得更远。然而，如果你从事前端开发已有一段时间，你一定意识到，吸引人的设计往往意味着艰难的选择和多余的标记。在本章中，我们将介绍大量\
    \ CSS 特性，它们将使你的网页应用开发过程更快、更丰富、更清晰。有些特性使得期待已久的增强功能变得轻松且易于维护，而另一些则更为复杂，但将为你的网页应用在\
    \ Mobile Safari 上开启全新的布局和设计可能性。\n\n请注意，本章讲解的许多特性要么相当新颖且被认为不稳定，要么是 WebKit 特有的，因此都带有\
    \ WebKit 专有的`-webkit-`前缀。这对于属性值可能是必需的，并且对于我们即将解释的大多数属性都是必需的。作为一种良好实践，你应该始终先声明\
    \ WebKit 特定的规则，然后声明标准的、不带前缀的规则，以实现最大的向前兼容性。\n\n请牢记这一切，然后深入探索 Mobile Safari 为你提供的这些新奇迹。\n\
    \n## 用 CSS 提升用户体验\n\n在介绍 CSS3 规范带来的一些 CSS“甜点”以及其他一些常因浏览器兼容性而被牺牲的特性之前，让我们先了解一些\
    \ Mobile Safari 特有的 CSS 特性。虽然本章将要展示的 CSS 优秀特性将帮助你增强和细化对页面布局和设计的控制，但你的目标是一个特定的操作系统和浏览器，它们两者都具有强大的用户界面，并为用户创造了习惯和期望。我们将首先介绍的\
    \ Mobile Safari 功能，将让你构建的应用能更好地集成到用户设备中，从而提升他们的用户体验。\n\n### 用户反馈\n\n在用户与界面交互如此紧密的设备上，用户的操作能在你的网页应用中触发视觉反馈至关重要，正如我们在第\
    \ 5 章中解释的那样。\n"
- fmt: "The initial interaction state implemented in Mobile Safari is based on the\
    \ `-webkit-tap-highlight-color` property, which defines a color for the overlay\
    \ box that will highlight tappable areas of the viewport on user action. It can\
    \ be seen, for instance, on any tapped link. The following rule would darken (Figure\
    \ 6–1) such areas whenever the user touches a tappable element:\n\n```\na { -webkit-tap-highlight-color:\
    \ rgba(0, 0, 0, 0.5); }\n```\n\nFigure 6–1. A touched element with custom highlight\
    \ color\n\nYou may have been thinking that there was no other “clicked” state\
    \ in Mobile Safari. This isn’t entirely true. However, it takes a little trick\
    \ to access this property with the CSS `:active` and `:hover` pseudo-classes.\n\
    \nMany recommend using the `mouseover` and `mouseout` Multi-Touch equivalents\
    \ `touchstart` and `touchend` by adding and removing a specific class with an\
    \ event handler. This indeed works, but it is somewhat clumsy and heavy to use,\
    \ especially considering there is a much simpler way to achieve this.\n\nYou can\
    \ activate these equivalents by adding an event handler on the `window`, and without\
    \ even adding functionality to this handler, it just works and triggers the desired\
    \ behavior. Therefore, the following code added to the `main.js` file in our web\
    \ application template will allow us to add the subsequent rule to our `main.css`\
    \ file, as shown in Figure 6–2:\n\n```\n/* main.js */\ndocument.addEventListener(\"\
    touchstart\", new Function(), false);\n```\n\n```\n/* main.css */\n.group-wrapper\
    \ ul li a {\n  ...\n  -webkit-tap-highlight-color: transparent;\n}\n\n.group-wrapper\
    \ ul li a:active {\n  color: #fff;\n  background: #015de6 -webkit-gradient(linear,\
    \ left top, left bottom, from(rgba(255, 255, 255, .25)), to(transparent));\n}\n\
    \n.group-wrapper ul li a:active * {\n  color: #fff;\n}\n```\n\nFigure 6–2. Just\
    \ like a native iPhone menu\n\nAgain, we have made these styles in a way that\
    \ makes them easily adaptable. Here, a simple change of the background color will\
    \ allow you to change the aspect of the button, without altering the gradient.\n\
    \n### Disabling Copy/Paste Functionalities\n\nUsers can easily initiate a long\
    \ press action on elements of your page, which would trigger the copy/paste feature\
    \ with an ugly box that could spoil the user experience to some extent, as shown\
    \ in Figure 6–3.\n\nFigure 6–3. A long press may trigger the copy/paste feature\n\
    \nThis behavior can be disabled when it is not desired or when you want to add\
    \ some custom functionality to this action. You do this using only CSS, with the\
    \ `-webkit-user-select` property. This takes either the value `auto`, to allow\
    \ selecting; `text`, to let users select only text; or `none`, to disable it altogether.\n\
    \nNonetheless, be careful not to let usability dwindle, for instance by removing\
    \ the ability to select text fields. The following code takes care of this for\
    \ you, using common selectors:\n\n```\n*:not(input):not(textarea):not(select),\n\
    input[type=image],\ninput[type=file],\ninput[type=submit],\ninput[type=button],\n\
    input[type=reset] {\n  -webkit-user-select: none;\n}\n```\n\nThis will prevent\
    \ selection for all elements apart from text inputs (taking into account all the\
    \ new input types), making your web application experience closer to that of a\
    \ native Mobile Safari application.\n\n### Control Over Callout\n\nThe touch and\
    \ hold action on a link will trigger the menu shown in Figure 6–4. If your web\
    \ application has been made to resemble a native application, this behavior is\
    \ probably not needed, desired by you, or expected by the user.\n\nFigure 6–4.\
    \ Touching and holding on elements such as links or images may trigger an option\
    \ callout\n\nLuckily, it can be disabled, again with simple CSS, by setting the\
    \ `-webkit-touch-callout` property."
