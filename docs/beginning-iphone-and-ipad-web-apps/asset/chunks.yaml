    **5**


    ****Chapter**


    User Experience and


    Interface Guidelines


    The heart of the previous chapter is not the information about screen dimensions,
    technical possibilities, or even understanding of how iOS behaves on the iPhone,
    iPod touch, and iPad. Of course, you have to master these aspects to build quality
    web applications for these devices, but the techniques for doing so are simply
    tools to succeed in the process. The advice in this book all comes down to the
    user. The touch-interaction system of Apple’s portable devices establishes a specific
    relationship between the device and the user that is definitely user-centric.
    This means that you, the developer, need to seriously consider the design of your
    applications.


    Applied to computer development, cognitive ergonomics is the practical science
    that aims to make an application’s functionality easy to understand and access
    for the user.


    The Apple engineers have considered some of the ergonomics of the iOS already.
    For instance, the Multi-Touch interaction model allows users to easily perform
    common tasks for most sites, such as zooming, focusing, or opening a contextual
    menu.


    An important aspect of ergonomics in Apple products in general, and even more


    critically on Apple portable devices, is aesthetic appeal. The iOS has a strong
    visual identity that has been made even more recognizable by the success of native


    applications tightly integrated into the iPhone’s GUI. Therefore, the quality
    of an application from a user point of view is often judged by how its visual
    quality compares to the iOS GUI.


    Of course, relying solely on design won’t make your web application successful.


    Although a pretty face can allure users into an application, if they don’t find
    the expected quality when actually using it, they will quickly move on. This is
    especially true in the wildly competitive field like application development.


    In this chapter, we will go through a number of rules and best practices that
    will help you build better web applications, that is, applications where the user
    experience, which is different on mobile devices than on desktop computers, is
    at its best.


    ![](index-112_1.jpg)


    CHAPTER 5: User Experience and Interface Guidelines


    From the Web on the Desktop to the Mobile Web


    It is a common but dangerous mistake to consider that the Web is the same regardless
    of the platform it is accessed on. Although web applications are built using web


    technologies, they are completely different from classic web pages. Obviously,
    device capabilities are different. If you view a web application such as Gmail
    on Desktop Safari or Mobile Safari, you wil see a notably different interface.


    Stil , using Gmail on your iPhone is possible because Mobile Safari is meant to
    adapt to the limited screen real estate. However, the experience for the user
    is not as good as when using an iMac or even a MacBook. The scaling makes the
    content harder to read and interact with, as demonstrated in Figure 5–1\. As a
    result, Google tries to offer adapted versions—with lighter interfaces, general
    y less features, and optimized loading times—of its web applications for mobile
    devices.


