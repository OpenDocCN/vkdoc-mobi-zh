    Application with poor navigation or an imperfect application experience. For instance,
    it is important that the user is able to easily return to some specific part of
    your web application directly from an URL. Not to give away too much of the following
    chapters, but we will be introducing at least two ways to create web applications
    that can be navigated with unique URLs without ever refreshing the page. One relies
    on a widely used JavaScript method (`window.location.hash`), and the other one
    uses a cutting-edge CSS3 tool (the `:target` pseudo-selector). One great advantage
    of these methods is that if the user bookmarks a page and comes back to it later,
    you can display the right content relative to the URL, not just the default loaded
    content.


    ## Configuring the Viewport


    The viewport concept on iOS doesn’t represent the dimensions of the client part
    of the browser—even less the size of the screen. It is a logical area where a
    web page can be displayed. It can be larger or smaller than the device screen.
    When landing on a page, the overall contents will be resized to fit best in the
    viewport while keeping the same aspect ratio. The default width of the viewport
    is set to 980 pixels, which is adapted to a great majority of web sites nowadays.
    However, you know that the approach for a web application is different. You don’t
    want your page to be scaled: users should get direct access to the content they
    are coming for, with an absolute minimum actions. Making them start with a zoom
    gesture is bad. You have to build your page to prevent this.


    The viewport options can be defined with the viewport meta tag, inside the `<head>`
    tag of your web pages. The code shown here will fit your needs in most cases,
    and we recommend you use it for the majority of your pages. What it does is set
    the initial zoom to 1.0 and then prevent the user from zooming:


    ```html

    <meta name="viewport" content="initial-scale=1.0; maximum-scale=1.0; user-scalable=no">

    ```


    Hence, your application won’t be scaled on load, and no matter whether it’s on
    an iPhone or an iPad, it will be displayed at the optimal size you have decided.
    Now, you may be wondering how your page will display correctly if the default
    viewport is 980px wide and your web app isn’t zoomed. The trick is that the viewport
    meta tag has other options, which we haven’t used here because they are deduced
    from those we have written. Here, the `width` option, which you could set to whatever
    you want, is assumed to be equal to the device screen width as the `initial-scale`
    is set to 1.0. Therefore, the previous meta rule is the same as this:


    ```html

    <meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0;
    user-scalable=no">

    ```


    It is recommended you use the `device-width` and `device-height` constants rather
    than hard-coded values in the meta tag whenever possible. This is the best guaranty
    that your page will occupy on the device screen, even when changing from portrait
    to landscape orientation and reversely. It also is a good idea to make your pages
    fluid, that is, to make them occupy all the space they can on the screen to make
    sure your application will appear full-screen whatever the user’s configuration.


    All parameters are optional, meaning Mobile Safari will guess values for the ones
    you do not specify. The rules for the `content` attribute can be declared in any
    order, as long as you separate them with a colon followed by a space. Table 4–2
    lists all the properties and values available for the viewport meta tag. All have
    been around since the first version of iOS.


    **Table 4–2.** Viewport Properties


    | Property | Description |

    | --- | --- |

    | `width` | The width of the viewport in pixels. The default value is 980, and
    the range is from 200 to 10,000. This property can also take the `device-width`
    and `device-height` constants. |

    | `height` | The height of the viewport in pixels. The default is calculated based
    on the value of the `width` property and the aspect ratio of the device. The range
    is from 223 to 10,000 pixels. This property can also take the `device-width` and
    `device-height` constants. |

    | `initial-scale` | The initial scale of the viewport as a multiplier. The default
    is calculated to fit the web page in the visible area. The range is determined
    by the `minimum-scale` and `maximum-scale` properties. Setting a value of 1.0
    here automatically changes the width default value to `device-width`. |

    | `minimum-scale` | Specifies the minimum scale value of the viewport. The default
    is 0.25. The range is from 0 to 10.0. |

    | `maximum-scale` | Specifies the maximum scale value of the viewport. The default
    is 1.6. The range is from 0 to 10.0. |

    | `user-scalable` | Determines whether the user can zoom in and out. The default
    is "yes". Set to "yes" (or 1) to allow scaling and "no" (or 0) to disallow scaling.
    |


    ## Seriously Appy: Using Stand-Alone Mode


    Now that you have a web application that will just fit in the user’s device screen,
    you’d like your application to be truly used like an application. The good news
    is that not only do iOS users have the option to put a web page in their bookmarks,
    but they can also put shortcuts to web pages on their home screen as web clips.
    This makes the web application as quickly accessible as any native app, notably
    making it accessible with Spotlight. The user just has to select the “Add to home
    screen” option and choose a name for the shortcut. After that, tapping the new
    icon on the springboard will bring up your web application in Mobile Safari straightaway.


    ### Showcasing a Proper Icon


    The default icon that will be generated for the user’s home screen is a screenshot
    of your application, resized to fit the size of other icons on the page. Although
    a little gloss is added to make this more icon-like, the truth is it isn’t very
    attractive or very recognizable (see Figure 4–4). You want your end user to find
    your web app easily and recognize it at first glance, even in the middle of various
    other shortcuts.


    **Figure 4–4.** The default icon built with web page screenshot...not very sexy


    To achieve this, you have to make your own icon for your web application. It’s
    best to make it a reminder of your application, be it by using the same colors,
    similar shapes, and so on. It will be used for any page that is turned into a
    web clip, just like a favicon in traditional web browsers, so you want something
    sexy. The easiest way to make iOS use your icon is to save it as `apple-touch-icon.png`
    format at the root of your site.


    Having your icon displayed in the springboard is good, but making it shine is
    better. The typical shine and drop shadows from the iPhone GUI will be automatically
    superimposed on your icon, so if you create an icon that is square and is large
    enough to display in a good quality, it will look just like a native icon to the
    user (see Figure 4–5).


    Icons on iPhone are 57 pixels wide, while the default iPad icon size is 72 pixels.
    Building icons to common sizes such as 128 or 256 pixels seems a rather good practice.
    Simply be careful not to add light effects yourself, which could interfere with
    the default effects added by the OS.


    **Figure 4–5.** Apress icon before and after styles are applied by the springboard


    Nevertheless, there are cases where the gloss just doesn’t fit in and cases where
    you want to make something slightly different. If you make an application listing
    places to see Eastern European naïve painters, you may want to have an icon that
    is rather flat-looking. Shiny curves would just look out of place. To prevent
    the OS from applying the full range of effects, simply rename your icon to `apple-touch-icon-precomposed.png`.
    You will still have rounded corners and a drop shadow, but the icon itself will
    remain unchanged (see Figure 4–6).


    **Figure 4–6.** Icon using the “precomposed” option'
