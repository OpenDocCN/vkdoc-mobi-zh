    \ CSS Features for Your Web Application User Interface\n\nMultilayer Backgrounds\n\
    \nAs you can see, the effects you can achieve with CSS3 backgrounds are much richer\
    \ than those of CSS2\\. Yet this is not all the new specifications have in store\
    \ for you.\n\nWorking with background images, you can now handle multiple backgrounds\
    \ applied to only one element. By using a comma-separated list of values for the\
    \ URL of your\n\nbackground, all images will be taken into account, stacking up\
    \ with the first declared one on top. The main limitation to this is that you\
    \ can specify only one background color that will be on only the lowermost layer.\n\
    \nHowever, WebKit extends this functionality by allowing it not only for the background-image\
    \ property but for all background properties apart from the color. This means,\
    \ for instance, the end of the sliding-doors technique or more possibilities for\
    \ fluid layouts, because gradient backgrounds drawn with -webkit-gradient() will\
    \ be resizable. Rather than using a background repeat, you could also achieve\
    \ effects like the one shown in Figure 6–11 using the following code:\n\n.multiple\
    \ {\n\nwidth: 400px;\n\nheight: 300px;\n\nbackground-repeat: no-repeat;\n\nbackground-image:\
    \ url(flower.jpg);\n\nbackground-position:\n\n90px 90px,\n\n70px 70px,\n\n50px\
    \ 50px;\n\n-webkit-background-size:\n\n60% auto,\n\n50% auto,\n\n40% auto,\n\n\
    30% auto,\n\n20% auto;\n\n}\n\nFigure 6–11\\. Images stack up, from the first\
    \ at the bottom to the last on top\n\nIn this example, we leave the background-image\
    \ property unchanged for all background layers, but we progressively change its\
    \ position and size to mimic a zoom-in effect.\n\nCHAPTER 6: Interesting CSS Features\
    \ for Your Web Application User Interface\n\nIt is important here to understand\
    \ how the interpreter handles values when there are more layers than values for\
    \ some property. The rule applied is to repeat the list of available values in\
    \ a loop until they meet the right count.\n\nHowever, be careful: although the\
    \ specifications indicate that the number of layers should be determined solely\
    \ by the number of background-image properties, WebKit\n\nduplicates this property\
    \ if other background properties have a higher count. Because, following the specifications,\
    \ superfluous values should be ignored, we advise that you should not rely on\
    \ this for your designs, because it is likely that either WebKit’s implementation\
    \ or the specification will evolve.\n\nThis property will, for instance, let you\
    \ set a different background for elements that are selected. We shall use it in\
    \ our next chapter on the canvas and SVG to add an arrow to list items, and this\
    \ is used in our web application template header combining gradients and the new\
    \ color definition possibilities that we are going to explain next.\n\nColors\n\
    \nColor is essential to design, and its use has become more and more complex as\
    \ its rendering has improved on devices. However, building interfaces with complex\
    \ color associations often required that we resorted to images (for instance to\
    \ handle\n\ntransparency) or to third-party tools (typically to build a color\
    \ scheme). The CSS3\n\nspecification brings a new set of options that will help\
    \ you build image-less interfaces that are more complex yet more lightweight,\
    \ while making your workflow more efficient.\n\nThe Alpha Channel\n\nColors using\
    \ CSS2 would most often be defined using the RGB notations, namely,\n\n#rrggbb,\
    \ #rgb, and the rgb() function. This is extended in CSS3 to allow for an alpha\
    \ channel, using the rgba() function. The value for the alpha channel is a floating\
    \ number within a range from 0 to 1\\. This is especially useful when dealing\
    \ with transparent box backgrounds, because the traditional use of the opacity\
    \ property has the inconvenience of being inherited. For instance, to set a translucent\
    \ background on a box while still having fully readable text inside it, you would\
    \ have needed to resort to background images or complex positioning. This is no\
    \ longer necessary, because you can simply set transparency for the background-color\
    \ property.\n\nThe following code illustrates how this will change your life:\n\
    \n<style>\n\nbody { background-color: yellow; }\n\n.main { position: relative;\
    \ }\n\n.opacity-layer {\n\nposition: absolute;\n\nbackground-color: blue;\n\n\
    opacity: 0.25;\n\nleft: 0;\n\nright: 0;\n\nCHAPTER 6: Interesting CSS Features\
    \ for Your Web Application User Interface\n\ntop: 0;\n\nbottom: 0;\n\n}\n\n.content-layer\
    \ {\n\nposition: relative;\n\ncolor: red;\n\n}\n\n</style>\n\n<div class=\"main\"\
    >\n\n<div class=\"opacity-layer\"></div>\n\n<div class=\"content-layer\">\n\n\
    <h1>Some Title</h1>\n\n<p>A nice paragraph.</p>\n\n</div>\n\n</div>\n\nHere is\
    \ equivalent code using the new color functions:\n\n<style>\n\nbody { background-color:\
    \ yellow; }\n\n.content-layer {\n\nbackground-color: rgba(0,0,255,0.25);\n\ncolor:\
    \ red;\n\n}\n\n</style>\n\n<div class=\"content-layer\">\n\n<h1>Some Title</h1>\n\
    \n<p>A nice paragraph.</p>\n\n</div>\n\nOf course, the other advantage of the\
    \ alpha channel is that, because it is simply a color definition, you can apply\
    \ it to anything that takes a color as value, including text or borders. You will\
    \ also find it can be used to create sophisticated CSS background gradients.\n\
    \nNew Color Definitions\n\nThe alpha channel can also be used with a new CSS3\
    \ color definition function: hsl().\n\nAlthough RGB is commonly used and many\
    \ front-end developers are quite fluent with it, it is often considered unintuitive.\
    \ Indeed, in “everyday life”, people are used to subtractive synthesis of colors\
    \ (as when mixing paint colors), while RGB is based on additive synthesis (as\
    \ in “blending all colors together produced pure white,” which is the case for\
    \ light). It is common that RGB users actually get used to it by subconsciously\
    \ translating it to a change in hue, saturation, and light.\n\nThe hue (the *h*\
    \ in the hsl() and hsla() functions) is an angle, measured in degrees (without\
    \ specifying the unit) with a value from 0 to 360\\. It is usually represented\
    \ by a circle, where each degree represents a shift in color, from red (0) to\
    \ red (360). Saturation and lightness are specified as percentages.\n\n![](index-159_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nhsl *(<hue>, <saturation>, <lightness>* )\n\nhsla *(<hue>, <saturation>, <lightness>,\
    \ <alpha>* )\n\nHere is a set of equivalent CSS rules:\n\n.red { color: red; }\n\
    \n.red { color: #f00; }\n\n.red { color: rgb(255, 0, 0); }\n\n.red { color: hsl(0,\
    \ 100%, 50%); }\n\n.red { color: hsl(360, 100%, 50%); }\n\n.red { color: hsla(0,\
    \ 100%, 50%, 1.0); }\n\nBecause the progression around the hue “circle” is easy\
    \ to grasp, you can quite easily move around it, as represented in Figure 6–12,\
    \ a laid-out version of the circle, with stop points to situate basic colors.\n\
    \nFigure 6–12\\. Conversion table between basic colors\n\nHSL makes it easier\
    \ to move around color values in a natural way. If you want orange, you just pick\
    \ a value between red and yellow (0 and 60 degrees). Want a lighter orange?\n\n\
    Just add some lightness. Need an orange that is less vivid? Remove some saturation.\n\
    \nWith the rgb() representation, you would have had to determine an amount of\
    \ each\n\ncolor, while with the #rrggbb representation, you would have had to\
    \ cope with the extra difficulty of converting to hexadecimal values for each\
    \ color.\n\nUsing Gradients\n\nThe previous properties allowed for the fine-tuning\
    \ of background properties. However, WebKit features new properties that allow\
    \ you to use code instead of images for a most interesting purpose: gradients.\
    \ This can make a great difference in the way you handle design elements, because\
    \ it has quite a few advantages.\n\nFirst, CSS gradients will be more lightweight\
    \ for the end user, because no images will have to be loaded, and of course, there\
    \ will be no extra HTTP request—which, as we have indicated before, can be quite\
    \ slow on mobile devices.\n\nSecond, CSS gradients, once you have mastered them,\
    \ are faster and more\n\nstraightforward to modify on your site, because you will\
    \ need only one tool—which often means only one person, too—and you don’t have\
    \ to worry about dimensions.\n\nBasic Syntax\n\nAs of this writing, there is no\
    \ specification about the actual syntax for CSS gradients; each browser vendor\
    \ has implemented this feature in its own way. Here is the most elementary syntax\
    \ to create a gradient for WebKit browsers:\n\n![](index-160_1.jpg)\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\n-webkit-gradient(\n\
    \nlinear,\n\nleft top,\n\nright bottom,\n\nfrom(black),\n\nto(yellow)\n\n)\n\n\
    For instance, you can apply this to the background of an element using the following:\n\
    \n<style>\n\nbutton {\n\nbackground-image:\n\n-webkit-gradient(\n\nlinear,\n\n\
    left top,\n\nright bottom,\n\nfrom(white),\n\nto(lightgrey)\n\n);\n\nborder: 1px\
    \ solid gray;\n\n}\n\n</style>\n\n<button>Click Me</button>\n\nThis example draws\
    \ a linear gradient that spans from the upper-left corner of the box to the lower-right\
    \ corner and will create a transition from white to lightgrey, as shown in Figure\
    \ 6–13\\. In our examples, we are going to use named colors for clarity, but you\
    \ can use any color naming convention supported by CSS3, including transparent\
    \ values.\n\nFigure 6–13\\. A simple button with a linear gradient\n\nYou can\
    \ determine positions using named positions, pixels (with implicit unit), or percentages:\
    \ the left top and right bottom values in our example are equivalent to 0 0\n\n\
    and 100% 100%, for instance.\n\nA gradient value can be applied to properties\
    \ that support an image, namely,\n\nbackground-image, border-image, list-style-image,\
    \ and even content. However, it is not possible for now to set this value for\
    \ a color property—meaning you won’t be able to directly apply gradients to text.\n\
    \n![](index-161_1.jpg)\n\nCHAPTER 6: Interesting CSS Features for Your Web Application\
    \ User Interface\n\nChanging the Size of the Gradient\n\nWith backgrounds, the\
    \ default behavior of gradients is to extend to the dimensions of the box to which\
    \ they are attached. Because the -webkit-gradient() function is\n\nconsidered\
    \ as an image, you can tweak this behavior using the properties explained earlier,\
    \ noticeably with background-size, which will change the drawing area for the\
    \ gradient.\n\nSetting the background size to 5px, for instance, will limit the\
    \ span of the gradient to a square 5 pixels on a side. The default value of the\
    \ background-repeat is repeat, so if you haven’t set a value, the gradient will\
    \ repeat as a pattern to cover the box area, as shown in Figure 6–14.\n\n.gradient-box\
    \ {\n\n...\n\n-webkit-background-size: 5px;\n\n}\n\nFigure 6–14\\. Because the\
    \ drawing area has been redefined, the gradient has become a repeating pattern\
    \ Of course, your gradient could be cut off, if the drawing area is not large\
    \ enough to hold the whole gradient. This would typically occur using fixed dimensions\
    \ (as you will have to do to use radial gradients).\n\nComplete Gradient Syntax\n\
    \nAlthough gradients offer a good range of new possibilities for the styling of\
    \ HTML\n\nelements, there is more to the implementation of gradients by WebKit.\
    \ Here is the complete syntax as described in the WebKit documentation:\n\n-webkit-gradient\
    \ *(<type>, <point> [, <radius>]?, <point> [, <radius>]? [, <stop>]**) As with\
    \ regular expressions, the question mark indicates that the item can occur none\
    \ or one time, and the asterisk shows that it can be used one or several times,\
    \ or not at all.\n\nOf course, specifying a gradient with no color seems like\
    \ a strange idea.\n\nYou can create two kinds of gradients with CSS: linear gradients,\
    \ as you have already seen, and radial gradients. To define a radial gradient,\
    \ you have to specify a radius together with the elements we have already introduced.\
    \ Note that the value for the radius is expressed in pixels only, though the unit\
    \ should not be specified. You cannot use relative units to fit your gradient\
    \ whatever the size of your box, and therefore you can achieve only regular circles,\
    \ not more complex ellipses. You can see the effect of the radial type gradient\
    \ (shown in Figure 6–15) by replacing your gradient code in the first example\
    \ by the following:\n\n![](index-162_1.jpg)\n\nCHAPTER 6: Interesting CSS Features\
    \ for Your Web Application User Interface\n\n-webkit-gradient(\n\nradial, /* gradient\
    \ <type> */\n\n100 100, 25, /* <point> and <radius> (for radial gradients only)\
    \ */\n\n100 100, 100,\n\nfrom(black), /* 2 <stop> values */\n\nto(yellow)\n\n\
    );\n\nFigure 6–15\\. A simple radial gradient\n\nThis syntax can seem a little\
    \ tricky or confusing. It is important to understand exactly what each value represents.\
    \ The first pair of values, after the gradient type, is the position where the\
    \ gradient should originate. It is fol owed by the radius of the area that should\
    \ be entirely fil ed by the first color stop.\n\nThe second pair again indicates\
    \ the destination circle of the gradient, the last number being the radius by\
    \ which the color blend should occur. The rest of the available space out of this\
    \ last circle wil be fil ed with the last color stop, plain.\n\nDownload from\
    \ Wow! eBook <www.wowebook.com>\n\nThe last values determine the colors that wil\
    \ be used to draw the gradient. As shown previously and as we’l explain in the\
    \ next section, you can set as many colors as you like for these values.\n\nAdvanced\
    \ Color Handling\n\nThe from() and to() functions are both shorthand expressions\
    \ for the color-stop() function, which has the fol owing signature:\n\ncolor-stop\
    \ *(<stop value>, <color>* )\n\nThe first parameter can be defined either as a\
    \ percentage or with a float ranging from 0\n\nto 1\\. The second takes any valid\
    \ CSS color definition. This function thus al ows you to determine the entire\
    \ color palette for your gradient, along with the steps where they should start,\
    \ stop, and blend. from( *<color>* ) and to( *<color>* ) hence are the same as\
    \ color-stop(0, *<color>* ) and color-stop(1, *<color>* ).\n\n![](index-163_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nThis opens new ways to use your gradients, because you can use the color-stop()\n\
    \nfunction as many times as you want for a single gradient. Here is the preceding\n\
    \nexample, with an extra color:\n\n-webkit-gradient(\n\nradial,\n\n100 100, 25,\n\
    \n100 100, 100,\n\nfrom(black),\n\nto(yellow),\n\ncolor-stop(50%, red)\n\n);\n\
    \nIf you use Photoshop, this logic should seem familiar, and you will recognize\
    \ the Gradient Editor, as shown in Figure 6–16.\n\nFigure 6–16\\. Photoshop Gradient\
    \ Editor with color stops and midpoint circles between stops However, with CSS,\
    \ the only way to give more importance to one color over another as you would\
    \ with the color midpoint in Photoshop or to build irregular gradients is to add\
    \ more stops with the same color.\n\nOrder is not important when you specify these\
    \ color stops, unless several occur in the same place, for instance when building\
    \ a sharp transition, as in the following example (Figure 6–17):\n\n-webkit-gradient(\n\
    \nradial,\n\n50% 50%, 0,\n\n50% 50%, 100,\n\nfrom(red),\n\ncolor-stop(50%, red),\n\
    \n![](index-164_1.png)\n\nCHAPTER 6: Interesting CSS Features for Your Web Application\
    \ User Interface\n\ncolor-stop(50%, yellow),\n\ncolor-stop(99%, yellow),\n\ncolor-stop(99%,\
    \ transparent),\n\nto(transparent)\n\n);\n\nFigure 6–17\\. Two concentric circles\
    \ drawn using several *color-stop()*\n\nUsing this technique, you can draw circles\
    \ with crisp borders, without worrying about the ending color of the gradient\
    \ filling the entire box. In our web application template, we have used this technique\
    \ to add a hashed background. It will be used also in Chapter 9\n\nto create an\
    \ attractive tab bar, in association with the flexible box model, which will be\
    \ explained later in this chapter.\n\nBoxes and Borders\n\nTraditionally, “boxes”\
    \ in CSS haven’t been supplied with many styling options. Beyond a handful of\
    \ unevenly supported border styles, you had to resort to background images, with\
    \ all the duplicate styles and the approximations that the process entails, to\
    \ bring some extra shine to your elements.\n\nA simple web search yields hundreds\
    \ of pages promising the ultimate beveled or\n\nrounded border solution; this\
    \ has resulted either in superfluous markup, heavy\n\nJavaScript, or extra images.\
    \ CSS3 is almost making these practices obsolete, with several very interesting\
    \ features supported by recent browsers, including Mobile Safari.\n\nBox Sizing\n\
    \nBefore we get into the styling of boxes, let’s take a look at a new feature\
    \ regarding box sizing. The box-sizing property resulted from the observation\
    \ of the non-compliant Internet Explorer that didn’t calculate box sizes as described\
    \ in the CSS2 specification.\n\nAlthough HTML renderers should process the box\
    \ size as the sum of its width, padding, borders, and margins, Internet Explorer\
    \ considered the padding part of the content width, instead of adding it.\n\n\
    ![](index-165_1.jpg)\n\nCHAPTER 6: Interesting CSS Features for Your Web Application\
    \ User Interface\n\n.box {\n\n-webkit-box-sizing: border-box;\n\n}\n\nThe default\
    \ value for the box-sizing property is content-box, which is the behavior expected\
    \ in CSS2\\. However, setting the value to border-box will cause the padding and\
    \ borders to be counted inside the content area instead of around it. Figure 6–18\
    \ shows the difference.\n\nFigure 6–18\\. The transparent padding and black borders\
    \ show the difference between both box models This may seem unusual to you if\
    \ you’ve been using the CSS2 box model for some time.\n\nNonetheless, using this\
    \ property value means you won’t have to worry about giving a 100% width to a\
    \ box or adding a border to your containers.\n\nTypically, you would design a\
    \ site with a global container, a 680 pixels wide left column for the main content,\
    \ and a 300 pixels side column. Changing the padding for your boxes or adding\
    \ a border to your side column would have proven a daunting task. Here, you wouldn’t\
    \ have to worry about this, because your boxes would preserve their outer width.\n\
    \nRounded Box Corners\n\nAdding rounded corners to elements on your pages has\
    \ been very popular for some\n\ntime now; however, again, this could be difficult\
    \ to implement in a flexible way.\n\nFurthermore, the iPhone user interface extensively\
    \ uses rounded corners. To achieve a design consistent with this, it is likely\
    \ you will want to emulate iOS boxes too.\n\nCSS3 brings the ultimate solution\
    \ with the border-radius property. With a simple CSS\n\ndeclaration, you should\
    \ be able to achieve most of your designer dreams regarding corners, as shown\
    \ in Figure 6–19.\n\nNote that WebKit (and, necessarily, Mobile Safari) doesn’t\
    \ exactly comply with the specification. This is a limitation only in that the\
    \ specification allows you to generate\n\n![](index-166_1.jpg)\n\n![](index-166_2.png)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \ndifferentiated borders in a single declaration. With the syntax for WebKit,\
    \ you will have to declare each corner separately if you want different effects.\n\
    \nThe syntax for Mobile Safari is arguably more intuitive, though. You refer to\
    \ the targeted border in the property name and set the radius as the value. Thus,\
    \ your rule would be presented as follows:\n\n/* Same value for the four corners\
    \ */\n\n-webkit-border-radius: 16px;\n\n/* The same as separated declarations\
    \ */\n\n-webkit-border-top-left-radius: 16px;\n\n-webkit-border-top-right-radius:\
    \ 16px;\n\n-webkit-border-bottom-left-radius: 16px;\n\n-webkit-border-bottom-right-radius:\
    \ 16px;\n\nFigure 6–19\\. A simple box with rounded corners\n\nOf course, you\
    \ are not limited to regular shapes. Although giving the same value to every corner\
    \ will return a regular box with rounded corners and end in a perfect circle,\
    \ you can create a more elliptic shape by specifying parallel values for the width\
    \ and height, as in Figure 6–20:\n\n/* Again, same value for the four corners\
    \ */\n\n-webkit-border-radius: 24px 48px;\n\n/* And again, the same as separated\
    \ declarations */\n\n-webkit-border-top-left-radius: 24px 48px;\n\n-webkit-border-top-right-radius:\
    \ 24px 48px;\n\n-webkit-border-bottom-left-radius: 24px 48px;\n\n-webkit-border-bottom-right-radius:\
    \ 24px 48px;\n\nFigure 6–20\\. A box with distorted corners\n\n![](index-167_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nThe property is applicable to all elements, just as with the border property,\
    \ but it doesn’t depend on the actual use of a border. Likewise, you can use any\
    \ measure unit, be it fixed values such as pixels or relative values such as ems\
    \ or percentages.\n\nUsing percentages, the value of the radius will be evaluated\
    \ relative to the overall width and height of the box (that is, the dimensions\
    \ considered as when using the border-box value for box-sizing). Also note that\
    \ you won’t have to worry about your backgrounds overflowing their containers,\
    \ because they will be clipped appropriately.\n\nBorders Drawn with Images\n\n\
    However awesome the border-radius CSS3 feature may be, there is more to borders\n\
    \nthan actual border lines with the new specification. Indeed, you can also integrate\
    \ more elaborate border styles with the border-image property. This will take\
    \ care of adapting an image to the size of your borders, either by scaling it\
    \ or by repeating it.\n\nIn the following examples, we will use the image in Figure\
    \ 6–21, which is 300 pixels wide and high, as a pattern for a border divided into\
    \ nine different areas. These will be declared in the same order as for margins,\
    \ padding, or borders, with two modes,\n\nstretch and repeat. The main limitation\
    \ to this method is that you cannot specify a different mode for opposite borders.\n\
    \nFigure 6–21\\. A pattern to be used as a border image\n\n![](index-168_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nFigure 6–22 shows the result of the following code, changing only the mode:\n\
    \n.border {\n\n-webkit-border-image: url(diamonds.png) 100 100 100 100 stretch\
    \ stretch;\n\nwidth: 400px;\n\nheight: 350px;\n\nborder-width: 100px;\n\n}\n\n\
    Figure 6–22\\. The resulting box with stretch and repeat mode\n\nThere is a third\
    \ mode, round, that would repeat the pattern and scale it so that it is not truncated.\
    \ However, this mode is not yet supported by Mobile Safari. As a consolation,\
    \ because a border with an image primarily is a border, you can specify the border\
    \ width directly in your border-image declaration, as shown here:\n\n.border {\n\
    \n-webkit-border-image: url(diamonds.png) 100 / 100px stretch stretch;\n\nwidth:\
    \ 400px;\n\nheight: 350px;\n\n}\n\nThis is shorthand for the property. Because\
    \ all sides have the same dimensions, we group the slice areas together. This\
    \ value doesn’t take a unit; pixels are implicit for the parts of the image. A\
    \ slash separates the slice area from the size of the border to avoid any confusion.\n\
    \nBecause the areas in our image are 100 pixels wide doesn’t mean we need to have\n\
    \nborders that wide: by defining a thinner border, the area of the image shall\
    \ be scaled to fit into the border width. Thus, in the following example, our\
    \ image will be made, respectively, 50px, 25px, 100px, and 25px wide for the top,\
    \ right, bottom, and left borders (Figure 6–23).\n\n.border {\n\n![](index-169_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \n-webkit-border-image: url(diamonds.png) 100 / 50px 25px 100px stretch;\n\nwidth:\
    \ 400px;\n\nheight: 350px;\n\n}\n\nFigure 6–23\\. Each border has its own thickness\n\
    \nThis rule can be very useful when creating attractive buttons to replace the\
    \ default operate system ones.\n\nShadows\n\nMore control over borders is an interesting\
    \ feature in building web pages because identifying blocks helps readability and\
    \ can be a way to make content stand out. CSS3\n\noffers another long-awaited\
    \ feature in this respect, namely, outer shadows for blocks with the box-shadow\
    \ property. WebKit browsers also implement the CSS2 text-shadow property. Because\
    \ this property is part of an official recommendation and is considered stable,\
    \ you needn’t use the -webkit- prefix.\n\nBoth of these features not only allow\
    \ for drop shadows but also make it possible to draw glowing effects, which is\
    \ useful creating button effects. Beyond the visual attractiveness, one advantage\
    \ of this solution is that shadows don’t extend the dimensions of your blocks\
    \ or text, meaning your layout will not be affected. Also, you have the possibility\
    \ to apply multiple shadows to the same element, using only one declaration.\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nBox Shadows\n\nThe syntax for box shadows is quite simple. The box-shadow property\
    \ takes four\n\nparameters: the color, horizontal offset, vertical offset, and\
    \ blur radius. Setting the blur to 0 would result in a neatly cut shadow; the\
    \ greater the value, the fuzzier and more transparent the shadow.\n\nThe most\
    \ usual use of such a property would probably be the outlining of page sections\
    \ or provide user feedback while pressing a button. Nonetheless, in the following\
    \ example, we are going to use it to create an iOS-looking icon, using only one\
    \ image, that of the icon itself.\n\n<style>\n\n.icon {\n\ndisplay: inline-block;\n\
    \ntext-shadow: rgba(0,0,0,0.5) 2px 2px 2px;\n\ncolor: #000;\n\nfont: bold 11px\
    \ helvetica;\n\ntext-align: center;\n\nmargin: 8px;\n\n}\n\n.icon div {\n\n-webkit-border-radius:\
    \ 8px;\n\nwidth: 57px;\n\nheight: 57px;\n\nmargin: 0 auto 4px;\n\n-webkit-box-shadow:\
    \ 0 4px 4px rgba(0,0,0,0.5);\n\n-webkit-box-sizing: border-box;\n\nbackground-image:\n\
    \n-webkit-gradient(radial,\n\n50% -40, 37,\n\n50% 0, 100,\n\nfrom(rgba(255,255,255,\
    \ 0.75)),\n\ncolor-stop(30%, rgba(255,255,255, 0)),\n\ncolor-stop(30%, rgba(0,0,0,\
    \ 0.25)),\n\nto(rgba(0,0,0, 0))\n\n),\n\nurl(flower.png);\n\n-webkit-background-size:\
    \ auto auto, 100% 100%;\n\n}\n\n</style>\n\n<div class=\"icon\">\n\n<div></div>\n\
    \nFlowers\n\n</div>\n\nThe first thing you’ll notice in Figure 6–24 is that the\
    \ shadow follows the borders.\n\nTherefore, if you apply a radius to corners,\
    \ the shadows will be rounded too.\n\n![](index-171_1.jpg)\n\n![](index-171_2.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nFigure 6–24\\. An icon in the iOS Dashboard style\n\nNOTE: The zoom property\
    \ is not valid CSS. First implemented by Internet Explorer, it has been implemented\
    \ by other browsers without ever making its way to any specification.\n\nWhat\
    \ is interesting using this code is also that it is fully resizeable. For instance,\
    \ setting the zoom property to 0.57 would change your 57 pixel icon to the regular\
    \ 32 pixel iPhone menu icon; just changing one value will result in a modified\
    \ icon size while preserving the overall measurements and quality.\n\nText Shadows\n\
    \nThe previous example uses another kind of shadow, applied to text. The syntax\
    \ for the text-shadow property is very similar to that of box-shadow; the only\
    \ difference is that you should declare the color value first, instead of last.\
    \ The two following classes, respectively, apply a drop shadow and a glow effect\
    \ to the piece of text they are applied to (Figure 6–25):\n\n.shadow {\n\ntext-shadow:\
    \ #000 2px 2px 5px;\n\n}\n\n.glow {\n\ntext-shadow: #000 0 0 2px;\n\ncolor: #fff;\n\
    \n}\n\nFigure 6–25\\. Shadow and glow effect\n\nAs we have seen in our web application\
    \ template, drop shadows can be used for more than shadows. Previously, we have\
    \ used drop shadows to create embossed effects.\n\n![](index-172_1.png)\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\nUsing\
    \ JavaScript, you could even extend and reduce dynamical y the blur of the text\
    \ shadow dynamical y to create a vibrant glowing animation.\n\nText Effect with\
    \ Shadows and Outline\n\nWith the text-shadow property, you have learned to create\
    \ a realistic glow effect that’s quite similar to an outline. To explore the richness\
    \ of possibilities offered by Mobile Safari in this field, let’s draw a more advanced\
    \ heading using properties that wil let you finely control the rendering of the\
    \ text stroke:\n\n<style>\n\ndiv {\n\ncolor: lightgrey;\n\n-webkit-text-stroke:\
    \ 2px gray;\n\nfont-size: 100px;\n\ntext-shadow:\n\ngray 1px 1px 0,\n\ngray 2px\
    \ 2px 0,\n\ngray 3px 3px 0,\n\ngray 4px 4px 0,\n\ngray 5px 5px 0,\n\ngray 6px\
    \ 6px 0\n\n}\n\n</style>\n\n<div>Text Stroke</div>\n\nThe text-stoke property\
    \ is a shorthand to the text-stroke-width and text-stroke-\n\ncolor properties.\
    \ This makes defining an outline extremely simple, as il ustrated in Figure 6–26\\\
    . In this example, we also add a drop shadow to enhance our title visual y.\n\n\
    Download from Wow! eBook <www.wowebook.com>\n\nFigure 6–26\\. The outline is simply\
    \ defined using a CSS property\n\nThis again is an il ustration of how new CSS\
    \ features can save you the use of images and make your developing and maintenance\
    \ processes faster and easier. In this\n\nparticular case, this would be especial\
    \ y true when dealing with different languages. You wil see in the next chapter\
    \ that this kind of optimization is made even more acute with the use of downloadable\
    \ fonts.\n\nAdding a Button to Your Header\n\nThis is a lot to take in at once.\
    \ Why not have a break and add something to your web application template? Adding\
    \ the fol owing code to your *main.css* style sheet wil let you use a stylish\
    \ button in the header of your web applications:\n\n.view {\n\n...\n\nposition:\
    \ relative;\n\nCHAPTER 6: Interesting CSS Features for Your Web Application User\
    \ Interface\n\n}\n\n.header-wrapper .header-button {\n\n/* Button size and position\
    \ (anchored right) */\n\nposition: absolute;\n\ntop: 7px;\n\nright: 6px;\n\nwidth:\
    \ auto;\n\nheight: 29px;\n\nmin-width: 44px; /* Minimum size for a tappable element\
    \ */\n\nmargin: 0;\n\npadding: 0 10px;\n\n/* Box style for a rounded button */\n\
    \n-webkit-border-radius: 5px;\n\nborder: solid 1px rgba(0,0,0,.25);\n\nborder-top-color:\
    \ rgba(0,0,0,.6);\n\n-webkit-box-sizing: border-box;\n\n-webkit-box-shadow: 0\
    \ 1px 0 rgba(255,255,255,.3);\n\n/* Text style */\n\nfont-family: inherit;\n\n\
    font-size: 12px;\n\nfont-weight: bold;\n\ntext-shadow: rgba(0,0,0,.4) 0 -1px 0;\n\
    \ntext-decoration: none;\n\ntext-align: center;\n\nline-height: 29px;\n\ncolor:\
    \ #fff;\n\n/* Shiny effect for the background */\n\nbackground-color: rgba(0,0,0,.3);\n\
    \nbackground-image:\n\n-webkit-gradient(linear, left top, left bottom,\n\ncolor-stop(0,\
    \ rgba(255,255,255,0.25)),\n\ncolor-stop(0.1, rgba(255,255,255,.4)),\n\ncolor-stop(1,\
    \ rgba(255,255,255,.1)) ),\n\n-webkit-gradient(linear, left top, left bottom,\n\
    \nfrom(transparent),\n\nto(rgba(0,0,64,.05)) );\n\nbackground-repeat: no-repeat;\n\
    \nbackground-position: top left, bottom left;\n\n-webkit-background-size: 100%\
    \ 14px, 100%;\n\n}\n\n.header-wrapper .header-button:disabled {\n\ncolor: rgba(255,255,255,0.65)\n\
    \n}\n\n.header-wrapper .header-button:active:not(:disabled) {\n\nbackground-color:\
    \ rgba(0,0,64,.5);\n\n}\n\nThe button described would be drawn on the right side\
    \ of your header. To move it to the left of the screen, simply add the following\
    \ class to your styles:\n\n.header-wrapper .header-button.left {\n\n![](index-174_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nleft: 6px; right: auto;\n\n}\n\nThis code is easy to use and reuse, be it to\
    \ create form buttons or simple links. The following code results in the area\
    \ shown in Figure 6–27:\n\n<div class=\"header-wrapper\">\n\n<h1>Web App</h1>\n\
    \n<a href=\"edit.php\" class=\"header-button\">Edit</a>\n\n<button class=\"header-button\
    \ left\">Back</button>\n\n</div>\n\nFigure 6–27\\. Two buttons in the header\n\
    \nThe header-button class uses the method called *adaptive styles*, meaning the\
    \ color of the button automatically adapts to the background color of its parent.\
    \ This method was used already for the header itself. Because it uses only translucent\
    \ black and white for backgrounds and borders, it will only darken or brighten\
    \ the color that shows through, without blending—just like native iOS buttons.\n\
    \nIf you, however, wanted to create a colored button, like the blue action buttons\
    \ on the iPhone, you would simply change the value for background-color, as follows:\n\
    \n.header-wrapper .header-button.action {\n\nbackground-color: #0f6cd7;\n\n}\n\
    \nAs you can see, this code is easily reusable and adaptable. It’s exactly what\
    \ you need for lightweight web applications.\n\nColumns Layout\n\nIn Chapter 4,\
    \ we used a table type display to create the split view we needed for the iPad.\
    \ The main container had its display property set to table and its inner boxes\
    \ with a display set to table-cell extended to have exactly the same height. This\
    \ also allowed you to center content vertically. It can seem attractive to use\
    \ this method to emulate a column layout like in a newspaper or a magazine.\n\n\
    However, this would result in semantically superfluous markup. What’s more, it\
    \ would prove hard to maintain, and even to achieve, because you would have to\
    \ evaluate a length for each piece of content and enclose each one appropriately.\n\
    \nCSS Column Properties\n\nBetter than layout tricks, CSS3 automatically handles\
    \ column flow. This feature is implemented in iOS since version 2.0\\. You don’t\
    \ have to think about the length of your content, nor do you even have to physically\
    \ represent your columns by enclosing pieces\n\n![](index-175_1.jpg)\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\nof content\
    \ inside HTML tags. Mobile Safari will determine where to cut the text, either\
    \ to achieve a number of columns or to achieve a column size. This allows for\
    \ global styles, which will end in a consistent layout within many container sizes.\
    \ The following code will result in a different layout whether you view the page\
    \ on an iPhone or an iPad, as shown in Figures 6–28 and 6–29:\n\n.newspaper {\n\
    \n-webkit-column-width: 200px;\n\n-webkit-column-gap: 20px;\n\n-webkit-column-rule:\
    \ 1px dotted black;\n\npadding: 20px;\n\n}\n\nFigure 6–28\\. One column on iPhone...\n\
    \n![](index-176_1.jpg)\n\nCHAPTER 6: Interesting CSS Features for Your Web Application\
    \ User Interface\n\nFigure 6–29\\. ...and four columns on iPad with landscape\
    \ view\n\nIn our example, we define a minimum width of 200 pixels for our columns.\
    \ The rendering engine will try to stay as close as possible to this value, while\
    \ still adapting to the available space. This is why the column on the iPhone\
    \ is 280 pixels wide.\n\nThese properties are pretty self-explanatory. Note how\
    \ the column-gap property solves a common issue met with horizontal layouts, namely,\
    \ the whitespace between different blocks. Here, you don’t have to worry about\
    \ a incongruous margin sticking out on one side of your layout. What happens is\
    \ that Mobile Safari evaluates the amount of content that is to be shared between\
    \ columns and the width of the container.\n\nAlso note that the column-rule property\
    \ is shorthand that can take the same styling values as the border property and\
    \ allows you to define, for instance, a color or width as independent rules.\n\
    \nAs long as the container has enough free space left, a new column will be created.\n\
    \nWhen the renderer has determined the ideal number of columns, the content will\
    \ be distributed as evenly as possible.\n\nIf you have a close enough idea of\
    \ how long your content will be, you can enclose your content inside a fixed-height\
    \ box. Simply be aware that, if your text grows longer than expected, new columns\
    \ will continue being generated to the left, beyond the container.\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\nA fourth\
    \ column layout property is available to you, column-count. This acts inversely\
    \ to column-width, because it allows you to specify a number of columns where\
    \ your content should be distributed. Mobile Safari will try to render the expected\
    \ number of columns (be aware that it may judge one letter wide columns acceptable)\
    \ but will let them grow them vertically if there is not enough space available\
    \ horizontally.\n\nOf course, it is possible to associate both properties, for\
    \ instance to render two 300\n\npixel wide columns inside a 1,000 pixel wide container.\
    \ When using both properties together, remember that column-width will prevail.\n\
    \nPorting Press Content to the Web\n\nThese already interesting features of CSS3\
    \ have a new light shed on them by the release of the iPad, for which an obvious\
    \ use could be online newspapers and magazines. In the following example, we are\
    \ going to try to reproduce a magazine layout using CSS3\n\nproperties. First,\
    \ we create a file named *magazine.html* with the following code:\n\n<!DOCTYPE\
    \ html>\n\n<html>\n\n<head>\n\n<title>Columns Layout</title>\n\n<meta name=\"\
    viewport\" content=\"width=device-width;\n\ninitial-scale=1; maximum-scale=1;\
    \ user-scalable=0\">\n\n<link rel=\"stylesheet\" href=\"page.css\">\n\n</head>\n\
    \n<body>\n\n<div class=\"mag\">\n\n<hgroup>\n\n<h1>Flowers</h1>\n\n<h2>Lorem ipsum\
    \ dolor sit amet, consectetur adipiscing elit. Cras\n\npharetra mollis pharetra.\
    \ Suspendisse lacinia orci et felis\n\ntristique sit amet semper massa tempus.\
    \ Suspendisse consectetur\n\ntempor pulvinar.</h2>\n\n</hgroup>\n\n<p>Lorem ipsum\
    \ dolor sit amet, consectetur adipiscing elit. Cras pharetra\n\nmollis pharetra.\
    \ Suspendisse lacinia orci et felis tristique sit amet\n\nsemper massa tempus.\
    \ Suspendisse consectetur tempor pulvinar. Proin dui\n\neros, ultricies vel malesuada\
    \ vel, tempor at ante. Nam eget nisl dui.\n\nDonec molestie lectus a nunc scelerisque\
    \ blandit. Nam non ligula massa,\n\nsed suscipit turpis. Etiam eget ligula sit\
    \ amet turpis venenatis dictum\n\nin eleifend augue. Duis tellus lectus, volutpat\
    \ et adipiscing a,\n\npellentesque eu metus. Aenean suscipit congue mauris at\
    \ gravida. Integer\n\nlectus ligula, consectetur sit amet venenatis id, scelerisque\
    \ eget nisl.\n\nNunc dapibus posuere risus, vitae tempor nibh iaculis et.</p>\n\
    \n</div>\n\n</body>\n\n</html>\n\nNext, add the appropriate styles in a file called\
    \ *page.css*:\n\n* { margin: 0; }\n\nhtml { height: 100%; }\n\nbody {\n\nheight:\
    \ 100%;\n\nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \ncolor: white;\n\n}\n\n.mag {\n\nbackground: black url(flower.jpg) center center\
    \ no-repeat;\n\n-webkit-background-size: auto 150%;\n\nwidth: 100%;\n\nmin-height:\
    \ 100%;\n\npadding: 20px;\n\n-webkit-box-sizing: border-box;\n\nposition: relative;\n\
    \nfont-weight: bold;\n\ntext-shadow: 1px 1px 3px black;\n\n}\n\nh1 {\n\nmargin:\
    \ 0;\n\nfont-size: 50px;\n\n}\n\np {\n\nmargin: 0;\n\nposition: absolute;\n\n\
    max-width: 420px;\n\n-webkit-column-gap: 20px;\n\n-webkit-column-width: 200px;\n\
    \n-webkit-column-rule: 1px dotted white;\n\nfont-size: 16px;\n\ntext-shadow: 1px\
    \ 0 0 black;\n\nbottom: 20px;\n\nright: 20px;\n\n}\n\np:first-letter {\n\nfont-size:\
    \ 36px;\n\nmargin-right: 4px;\n\nmargin-bottom: -6px;\n\nfloat: left;\n\n}\n\n\
    p:after {\n\ncontent: '';\n\ndisplay: inline-block;\n\nwidth: 10px;\n\nheight:\
    \ 10px;\n\nbackground-color: white;\n\nmargin-left: 10px;\n\n-webkit-box-shadow:\
    \ black 1px 1px 1px;\n\n}\n\nAs shown in Figure 6–30, however simple the markup,\
    \ we achieve an interesting result.\n\nWe make sure the background will take all\
    \ the visible space by setting its size to 150\n\npercent of the container space—though\
    \ you could use the method explained earlier to have a more adapted result whatever\
    \ the image format. Then, with a simple title,\n\nsubtitle, and paragraph association,\
    \ we build a simple magazine-style layout that will appear consistently whatever\
    \ the device orientation.\n\n![](index-179_1.jpg)\n\nCHAPTER 6: Interesting CSS\
    \ Features for Your Web Application User Interface\n\nFigure 6–30\\. A nice page\n\
    \nWARNING: Safari has a bug preventing it from correctly evaluating text size\
    \ when a vertical shadow is applied to the content. The algorithm actually truncates\
    \ the letters instead of making columns higher or shifting text to the next column.\n\
    \nAs usual, you can build specific rules to serve a slightly different page whether\
    \ it is viewed on an iPad or on a smaller screen. This could be done like this:\n\
    \n@media only screen and (max-device-width:760px) {\n\nh1 { font-size: 30px; }\n\
    \nh2 { font-size: 20px; margin-bottom: 20px; }\n\np { position: relative; bottom:\
    \ auto; right: auto; }\n\n}\n\nThis way, your text will simply look scaled on\
    \ an iPhone or iPod touch with you still having control, and the overall layout\
    \ will not break because of a lack of space.\n\n![](index-180_1.jpg)\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\nThe Flexible\
    \ Box Model\n\nAs explained earlier, in a previous chapter, we have used the interesting\
    \ table and table-cell display properties to gain more control over the placement\
    \ and sizing of our elements. This is a simple and efficient method, but CSS3\
    \ brings even more control over the box model. What we are going to explain here\
    \ is among the most interesting\n\nfeatures brought by the latest specification—and\
    \ yet it seems ill-known, because it has been implemented ever since the first\
    \ version of Mobile Safari!\n\nA Clean and Flexible Way to Handle Column Layouts\n\
    \nThis “box model” method is simple, efficient, and extensive. It allows for full\
    \ control over subsequent boxes. Let’s begin with a simple example. This is the\
    \ relevant code:\n\n<style>\n\n.group {\n\ndisplay: -webkit-box;\n\nmin-height:\
    \ 100px;\n\npadding: 5px;\n\nbackground-color: lightgrey;\n\n}\n\n.group .box\
    \ {\n\ntext-align: center;\n\nborder: 10px groove green;\n\npadding: 10px 30px;\n\
    \nmargin: 1px;\n\nbackground-color: white;\n\n}\n\n</style>\n\n<div class=\"group\"\
    >\n\n<div class=\"box\">Box 1</div>\n\n<div class=\"box\">Box 2</div>\n\n<div\
    \ class=\"box\">Box 3</div>\n\n</div>\n\nThe first thing you should notice in\
    \ this code is that no superfluous markup is needed.\n\nNow, taking a look at\
    \ Figure 6–31, you will see the interest for layout purposes.\n\nFigure 6–31\\\
    . *A new way to achieve column layout*\n\n *3\n\n![](index-181_1.jpg)\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\nThe height\
    \ of our three boxes adjusts to the outer box, and as explained next, if you specify\
    \ a box-flex value, our boxes will occupy 100 percent of the width of their parent,\
    \ solving two problems that have been around since front-end developers have moved\n\
    \nfrom table to CSS layout. The box value makes the container behave as a block\
    \ element.\n\nYou can also trigger an inline block—keeping your elements in the\
    \ document flow—\n\nbehavior by using the value inline-box.\n\nOrdering Boxes\n\
    \nThis of course is very useful, yet there is much more to this new box model.\
    \ In our example, you probably weren’t surprised that our inner boxes appeared\
    \ in the document flow in the same order as that of their appearance in the code.\
    \ This is the default behavior for boxes, which is equivalent to using the box-direction\
    \ property with the value normal. Setting the value of this property to reverse\
    \ would result in our boxes being presented from last to first, as in Figure 6–32.\n\
    \n.group {\n\ndisplay: -webkit-box;\n\nmin-height: 100px;\n\n...\n\n**-webkit-box-direction:\
    \ reverse;**\n\n}\n\nFigure 6–32\\. *Seamlessly reversing the layout*\n\n *You\
    \ can even go further in box ordering by using the box-ordinal-group property.\
    \ This property takes an integer as a value, with 1 being the default. This allows\
    \ you either to reorder boxes, for instance putting box 3 in the first position\
    \ and box 1 in the second, or to group them. You can also combine this with CSS3\
    \ selectors, for instance with a rule such as this:\n\n.group .box:nth-child(2)\
    \ {\n\n-webkit-box-ordinal-group: 2;\n\n}\n\nIn this example, because all boxes\
    \ left unchanged have a box-ordinal-group value of 1, the second box will end\
    \ up in third position, because all the other boxes have a\n\nprevalent position,\
    \ as shown in Figure 6–33.\n\n![](index-182_1.jpg)\n\n![](index-182_2.jpg)\n\n\
    CHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\n\
    Figure 6–33\\. *Box 2 has been moved to the last position because of its ordinal\
    \ group value This property can be used with box-direction. If this is set to\
    \ reverse, the meaning of the ordinal groups wil also be changed, together with\
    \ the boxes in each group.*\n\n *Flexibility\n\nThe default behavior for boxes\
    \ here is to line up horizontal y. This too can be changed using the box-orient\
    \ property. Setting the value to vertical, the boxes wil stack up vertical y,\
    \ and there’s more: setting their box-flex value to 1.0, our boxes wil adapt vertical\
    \ y, meaning that each box in our example would be one-third high (Figure 6–34).\n\
    \n.group {\n\ndisplay: -webkit-box;\n\nmin-height: **200px**;\n\n...\n\n**-webkit-box-orient:\
    \ vertical;**\n\n}\n\n.group .box {\n\n...\n\n**-webkit-box-flex: 1.0;**\n\n}\n\
    \nDownload from Wow! eBook <www.wowebook.com>\n\nFigure 6–34\\. *Layout with default\
    \ *box-flex* value, which is *(0.0)*, and *box-flex* set to *1.0**\n\n *![](index-183_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nThe box-flex property determines the degree of flexibility of each box. By default,\
    \ vertically stacked boxes take 100 percent of the available width and only the\
    \ necessary vertical space.\n\nBy giving boxes a flex value, they will try to\
    \ fill the entire available vertical space.\n\nThus, if all boxes have a flex\
    \ value that is identical, they will expand to fill their container, all by the\
    \ same degree. If one or several boxes have a higher flex value, they will expand\
    \ more. For instance, with the following code, the second box will be made wider\
    \ or higher, depending on whether your boxes line up or stack up.\n\n.group .box:nth-child(2)\
    \ {\n\n-webkit-box-flex: 2.0;\n\n}\n\nBe careful that this does not mean your\
    \ second box will be twice as wide or high as the others, as shown in Figure 6–35\\\
    . It means only that it is more flexible, so it will be larger to some extent.\
    \ However, giving a box flexibility allows you to use boxes with a fixed width\
    \ or height and still have an area entirely occupied.\n\nFigure 6–35\\. The flexibility\
    \ is relative; the second box is not twice as big as the others Of course, because\
    \ these properties have to do with the page flow, you cannot use them with elements\
    \ that are absolutely positioned or are floated. The behavior not only wouldn’t\
    \ be what is expected, but it could also unpredictably break your layout, whereas\
    \ the general fallback for these properties is the regular box model.\n\nPacking\
    \ and Alignment\n\nFlexibility as you can see and imagine is full of potential.\
    \ However, there are times when a more definitive layout is more desirable. In\
    \ such cases, it is likely you will want to have some control over how elements\
    \ behave when they do not exactly fit together.\n\nIf there is space still available\
    \ in a box container when all children have reached their definitive size, you\
    \ may want to decide where the child elements should be displayed relative to\
    \ that whitespace.\n\nTwo properties are available to you in this quest: box-pack\
    \ and box-align. Modifying the styles of the .group class in our previous example\
    \ illustrates this:\n\n.group {\n\ndisplay: -webkit-box;\n\nmin-height: 100px;\n\
    \n...\n\n**-webit-box-pack: justify;**\n\n**-webkit-box-align: end;**\n\n}\n\n\
    ![](index-184_1.jpg)\n\nCHAPTER 6: Interesting CSS Features for Your Web Application\
    \ User Interface\n\nThe results are shown in Figure 6–36.\n\nFigure 6–36\\. Boxes\
    \ take the available horizontal space because of the justify value and align at\
    \ the bottom of their parent because of the end value\n\nIndeed, the box-pack\
    \ and box-align properties tell the boxes where to settle within the container.\
    \ box-pack tells the children how to align on the axis of their orientation; box-align\
    \ shows how to align perpendicular to the axis of their orientation. Both can\
    \ take the values start, end, and center. The box-pack property can also take\
    \ justify as a value, while box-align can take baseline and stretch. The latter\
    \ is the default value, which is why boxes take all the available space if nothing\
    \ is specified.\n\nUsed together, all these properties allow you to fine-tune\
    \ the layout of your elements. Of course, you can use these values and properties\
    \ on any kind of element, meaning this control can be used not only for overall\
    \ layout but also for small areas of your code, such as an evenly laid out tabbed\
    \ menu. Although this set of properties is only a draft, it is quite reliable,\
    \ because it has been implemented since Desktop Safari version 3.0 and from the\
    \ first version of Mobile Safari. We have listed only the properties that seem\
    \ the most interesting to us, but there is more to this part of the specification,\
    \ so feel free to dig further!\n\nTargeting WebKit Specifically\n\nAlthough we\
    \ are targeting Mobile Safari, as we have stated earlier, many devices\n\nnowadays\
    \ have good support for standards, and your web applications are likely to work\
    \ satisfactory on portable devices using other browsers. If you plan to support\
    \ such browsers to some extent, you could want to serve some rules only to Safari.\
    \ This can be done using a WebKit-specific targeting feature, related to the pixel\
    \ ratio of the device.\n\nHere is how to do it:\n\n@media screen and (-webkit-min-device-pixel-ratio:0)\
    \ {\n\n/* Your specific CSS here */\n\n}\n\nOr, using the link element:\n\n<link\
    \ rel=\"stylesheet\" href=\"some.css\"\n\nmedia=\"screen and (-webkit-min-device-pixel-ratio:0)\"\
    >\n\nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \nThis appears to be supported also by Opera 9.5+. At the time of this writing,\
    \ you can work around this using the following for Opera:\n\n@media all and (-webkit-min-device-pixel-ratio:\
    \ 10000),\n\nnot all and (-webkit-min-device-pixel-ratio: 0) {\n\n/* Your code\
    \ here, only for Opera */\n\n}\n\nHowever, hacks are by nature precarious, and\
    \ there is no warranty that the previous will not be obsolete by near-future versions\
    \ of the major browsers on the market.\n\nSummary\n\nYou just got a glimpse of\
    \ the possibilities the latest version of CSS and its\n\nimplementation by Mobile\
    \ Safari. Designed with modern functionality and aesthetic features in mind, it\
    \ solves many problems met by front-end developers in the near past.\n\nYou are\
    \ now limited only by your own imagination, and launching a quick search on the\
    \ Internet for *CSS3 tutorials and showcases* will finish persuading you if this\
    \ chapter hasn’t. With all this, you can mimic the iOS UI using hardly any images\
    \ or JavaScript.\n\nIndeed, CSS is a serious way to limit file sizes and bandwidth\
    \ usage (by requesting fewer images) and overall can lead to better code. These\
    \ principles have guided the development of our web application template in Chapter\
    \ 4.\n\nAs a general recommendation, we suggest limiting the number of classes\
    \ you need in your markup. Remember that classes and IDs have a purpose; strive\
    \ not to create a new ID every time you build a new block, and avoid multiplying\
    \ duplicate style declarations.\n\nClasses are meant to visually group elements\
    \ that share common characteristics.\n\nTherefore, you should use classes to define\
    \ characteristics that are to be used many times in your code. On the contrary,\
    \ IDs should be used for very specific modules, and when applying them, choose\
    \ the outermost block you can. As you have seen, CSS\n\nselectors can hugely help\
    \ limit the need for identifiers in your code.\n\nIn following chapters, we will\
    \ get into further detail about other, exciting CSS3 features implemented in Safari\
    \ such as downloadable fonts with SVG, animation, and hardware transformations,\
    \ so start practicing with them and building crisp and elegant web applications.\n\
    \n**7**\n\n ****Chapter**\n\nBitmap and Vector\n\nGraphics and\n\nDownloadable\
    \ Fonts with\n\nCanvas and SVG\n\nThe one element of Mobile Safari that has drawn\
    \ the most attention is that it has no support for Adobe Flash. The Web has become\
    \ a place where multimedia and animation hold an important role, and while being\
    \ unable to create Flash-based web sites and casual gaming might not be a problem\
    \ for most people, the main problem is that Flash is used in some manner on most\
    \ sites nowadays, be it for graphic animation in headers, advertisements, or videos.\
    \ Not supporting Flash can be a real issue for the iPhone and iPad user experience\
    \ when viewing classic web sites.\n\nAlthough canvases and SVG are often presented\
    \ as alternatives to Flash on iOS devices, they can be used for more than creating\
    \ interface elements and definite modules only at great expense. The lack of authoring\
    \ tools makes their development for intensive use unproductive. However, there\
    \ are many interesting applications to these new\n\ntechnologies, especially with\
    \ the WebKit-specific extensions that we will introduce in this chapter.\n\nBy\
    \ using these two features, which are newly supported on Mobile Safari, together\
    \ with some scripting, you will be able to achieve many graphics and effects that\
    \ formerly would have required heavy images or server-side processing.\n\nWorking\
    \ with the Canvas Area\n\nThe new <canvas> tag, introduced in HTML5, doesn’t do\
    \ anything by itself, but it lets you work with the browser in a entirely new\
    \ way; it lets you define an area in which you will 165\n\nCHAPTER 7: Bitmap and\
    \ Vector Graphics and Downloadable Fonts with Canvas and SVG\n\nbe able to draw\
    \ directly using a powerful JavaScript API. This is how you should insert it into\
    \ your code:\n\n<canvas id=\"area\" width=\"200\" height=\"200\">\n\nFallback\
    \ information.\n\n</canvas>\n\nThe id attribute you place on the <canvas> tag\
    \ is very important, because it is the identifier by which you will be able to\
    \ interact with the defined drawing area. Any content between the opening and\
    \ closing <canvas> tags will appear only if the end user has disabled scripts\
    \ on the device.\n\nIf, however, the user has for some reason disabled scripts\
    \ in Mobile Safari, the <canvas> tag will be useless, because nothing could be\
    \ drawn to the area defined by it. In this case, the text you insert should indicate\
    \ that scripts are required to access the unavailable content, and you should\
    \ give information on how to do this.\n\nThe scope of the canvas area should be\
    \ defined with the width and height attributes, a 200 pixel wide square in our\
    \ example. If you determine the size of the canvas with styles, the rendering\
    \ engine will scale the canvas drawing area to fit in the default boundaries,\
    \ instead of rendering the script output as expected. If you do not specify these\
    \ dimensions, the default size of the area is 300 pixels horizontally and 150\
    \ pixels vertically.\n\nNote, however, that using styles to set the size of the\
    \ canvas area can be useful to maintain your layout in case scripting is disabled,\
    \ because the width and height\n\nattributes will be ignored in that case. You\
    \ should also set the display property of the canvas to inline-block if it is\
    \ not floated, to keep the default inline behavior of the area.\n\n#area {\n\n\
    display: inline-block;\n\nwidth: 200px;\n\nheight: 200px;\n\nfont-weight: bold;\n\
    \ncolor: red;\n\n}\n\nRegarding dimensions, also keep in mind that whenever you\
    \ resize the canvas area by the means of a script, the entire drawing area is\
    \ cleared and reset.\n\nThe drawing area bound by the canvas is transparent. You\
    \ could therefore use it as you would a PNG image with an alpha channel. This\
    \ opens its usage to plenty of\n\npossibilities; for instance, it allows you to\
    \ replace GIF images, which, unlike PNG\n\nimages, allow for animation but only\
    \ support fully transparent and fully opaque pixels (see Figure 7–1).\n\n![](index-189_1.png)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nFigure 7–1\\. Using PNG or the *<canvas>* tag, edges are clean no matter\
    \ what background the image is superimposed on, whereas quality is poor with GIF\n\
    \nThe latter of course is a problem as soon as you want to draw curved or diagonal\
    \ lines to a transparent image background, because the line shown would be rough\
    \ and\n\nirregular. Typically, you couldn’t use a GIF image for a logo implying\
    \ a circular shape if you wanted it to be adaptable to several backgrounds.\n\n\
    Despite these preliminary assets of the <canvas> tag, be careful not to use it\
    \ where some other tag would be semantically more appropriate, primarily because\
    \ of accessibility issues. An image with an alt attribute makes it clear what\
    \ kind of content is present and should describe the content to a sufficient extent.\n\
    \nThe first of the following examples is an appropriate use for the <canvas> tag\
    \ because the spinner has no particular meaning and can be easily ignored, while\
    \ the second should be avoided.\n\n<!-- This is recommended -->\n\n<canvas width=\"\
    45\" height=\"45\" id=\"spinner\">Page loading</canvas>\n\n<i>Please wait...</i>\n\
    \n<!-- This is not -->\n\n<canvas width=\"450\" height=\"200\" id=\"comic-strip-cell\"\
    >A comic strip</canvas>\n\n<i>Have fun!</i>\n\nThe <img> tag would fit perfectly\
    \ with the type of data presented in the second example.\n\nUsing a canvas here\
    \ could result in poorer accessibility for disabled users and surely would be\
    \ poorly taken into account by search engines. Note that we will explain further\
    \ in this chapter how to use a canvas as a proper image.\n\nNow, we bet you are\
    \ impatient to see the exciting JavaScript API in action. Let’s go.\n\nThe Drawing\
    \ Context\n\nTo access the canvas and work with it, the first thing to do is get\
    \ a context. This can be done using the getContext() method from the API. The\
    \ following will allow you to work with a two-dimensional bitmap context:\n\n\
    var canvas = document.getElementById(\"area\");\n\nvar context = canvas.getContext(\"\
    2d\");\n\nOnce you have obtained a reference to the context in this way, you can\
    \ start drawing to the canvas area. Every call of getContext(\"2d\") will return\
    \ the same instance. Keep in mind that none of what you will create inside the\
    \ canvas area will be accessible through any DOM interface. You will simply be\
    \ drawing pixels on the drawing surface. For\n\nCHAPTER 7: Bitmap and Vector Graphics\
    \ and Downloadable Fonts with Canvas and SVG\n\ninstance, to animate a line, you\
    \ have to draw the line all over again; you cannot move it or change its properties\
    \ as you would a DOM element.\n\nNOTE: Be aware that, for now, only two-dimensional\
    \ contexts can be used. A very promising 3D\n\nversion is being studied, primarily\
    \ by the Khronos Group. It is based on OpenGL ES 2.0 and will be called WebGL.\
    \ One asset of its evolution is that it is bound directly to the hardware (GPU\n\
    \naccelerated), making much more complex and fluid animations possible. We hope\
    \ this technology will be available soon on the iPhone.\n\nWebKit introduces another,\
    \ versatile way to define canvases, by allowing you to use a canvas directly from\
    \ a style declaration, thus letting you use canvases as backgrounds or as a value\
    \ for any other property that can take an image. This, for instance, will let\
    \ you easily create a spinner, without actually using images. This of course not\
    \ only will save you some bandwidth and loading time but will also allow for real\
    \ alpha transparency and color adaptability, as explained earlier.\n\n/* Using\
    \ a canvas as a value in a CSS declaration is extremely simple */\n\n.css-canvas\
    \ {\n\nbackground-image: -webkit-canvas(area);\n\n}\n\nIn the previous example,\
    \ we indicate that a new canvas should be created with the area identifier. This\
    \ canvas does not exist at this stage, but from there, you can initialize it and\
    \ get a context for it with the getCSSCanvasContext() method from the document\
    \ object, as follows:\n\nvar context = document.getCSSCanvasContext(\"2d\", \"\
    area\", 37, 37); As with getContext(), the first parameter is the desired context\
    \ type, and the second, as you will guess, is the identifier for your canvas.\
    \ The two following parameters are the dimensions you expect your canvas to have.\
    \ Each call to this canvas with the same parameters will return the same instance,\
    \ while changing the dimensions in a call to this method would result in the canvas\
    \ being cleared, as in the regular canvas-handling process.\n\nOne interesting\
    \ characteristic of this use of canvases is that the defined canvas can be used\
    \ simultaneously on as many elements as you like. In our example, if you create\
    \ an animation in it, the animation will be drawn for any element that uses the\
    \ class\n\n.css-canvas.\n\nNow, let’s take our animated spinner example further\
    \ and see the code that can make it live. In the pieces of code that follow, we\
    \ are going to use quite a few properties of HTML canvases, but don’t worry: all\
    \ will be explained in due time.\n\nFirst, we are going to define the object that\
    \ will enable you to initialize and animate our canvas easily to be added to our\
    \ web application template. Again, if you are not used to object-oriented JavaScript\
    \ programming, worry not. This will all be explained in Chapter 10\\. For now,\
    \ you can just as well see this code as a series of reusable functions.\n\nCHAPTER\
    \ 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\n\
    /* Object constructor */\n\nvar BigSpinner = new Function();\n\nBigSpinner.prototype.init\
    \ = function(id, color, shadow) {\n\n/* Initialize the canvas and save the context\
    \ */\n\nthis.context = document.getCSSCanvasContext(\"2d\", id, 37, 37);\n\n/*\
    \ Line style for the spinner */\n\nthis.context.lineWidth = 3;\n\nthis.context.lineCap\
    \ = \"round\";\n\nthis.context.strokeStyle = color;\n\n/* Define a shadow for\
    \ the spinner */\n\nif (shadow) {\n\nthis.context.shadowOffsetX = 1;\n\nthis.context.shadowOffsetY\
    \ = 1;\n\nthis.context.shadowBlur = 1;\n\nthis.context.shadowColor = shadow;\n\
    \n}\n\n/* Animation variables */\n\nthis.step = 0;\n\nthis.timer = null;\n\n}\n\
    \nBigSpinner.prototype.draw = function() {\n\n/* Clear the canvas at every frame\
    \ */\n\nthis.context.clearRect(0, 0, 37, 37);\n\n/* Prepare canvas state and draw\
    \ spinner lines */\n\nthis.context.save();\n\nthis.context.translate(18, 18);\n\
    \nthis.context.rotate(this.step * Math.PI / 180);\n\nfor (var i = 0; i < 12; i++)\
    \ {\n\nthis.context.rotate(30 * Math.PI / 180);\n\nthis.drawLine(i);\n\n}\n\n\
    this.context.restore();\n\n/* Increment the animation */\n\nthis.step += 30;\n\
    \nif (this.step == 360) {\n\nthis.step = 0;\n\n}\n\n}\n\nBigSpinner.prototype.drawLine\
    \ = function(i) {\n\n/* Draw one line with varying transparency depending on the\
    \ iteration */\n\nthis.context.beginPath();\n\nthis.context.globalAlpha = i /\
    \ 12;\n\nthis.context.moveTo(0, 8 + 1);\n\nthis.context.lineTo(0, 16 - 1);\n\n\
    this.context.stroke();\n\n}\n\nBigSpinner.prototype.stop = function() {\n\nCHAPTER\
    \ 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\n\
    if (this.timer) {\n\nthis.context.clearRect(0, 0, 37, 37);\n\nwindow.clearInterval(this.timer);\n\
    \nthis.timer = null;\n\n}\n\n}\n\nBigSpinner.prototype.animate = function() {\n\
    \n/* Already running? exit... */\n\nif (this.timer) {\n\nreturn;\n\n}\n\n/* The\
    \ execution context (this) will be the window object with setInterval()\n\nSave\
    \ the correct context in \"that\" variable and run the timer */\n\nvar that =\
    \ this;\n\nthis.timer = window.setInterval(function() {\n\nthat.draw();\n\n},\
    \ 100);\n\n}\n\nFrom there, it becomes very straightforward to create a new custom\
    \ spinner. Simply create a new instance of the BigSpinner object and initialize\
    \ it with the init() method, passing the ID of the canvas, a color, and, optional\
    \ y, a shadow color as parameters, and launch the animation with the animate()\
    \ method, as shown here:\n\nvar spinner = new BigSpinner();\n\nspinner.init(\"\
    area\", \"red\", \"rgba(0,0,0,0.5)\");\n\nspinner.animate();\n\nThe code that\
    \ fol ows is intended to imitate the start-up screen of Mac OS X, as shown in\
    \ Figure 7–2.\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<title>Startup Screen</title>\n\
    \nDownload from Wow! eBook <www.wowebook.com>\n\n<meta name=\"viewport\" content=\"\
    initial-scale=1.0;\n\nmaximum-scale=1.0; user-scalable=no\">\n\n<style>\n\nhtml\
    \ { height: 100% }\n\nbody {\n\nheight: 100%;\n\nbackground-color: lightgrey;\n\
    \ncolor: gray;\n\nmargin: 0;\n\n}\n\n.bigSpinner {\n\nbackground-image: -webkit-canvas(spinner);\n\
    \n}\n\n.useSpinner {\n\nbackground-position: center 70%;\n\nbackground-repeat:\
    \ no-repeat;\n\nwidth: 100%;\n\n![](index-193_1.jpg)\n\nCHAPTER 7: Bitmap and\
    \ Vector Graphics and Downloadable Fonts with Canvas and SVG\n\nmin-height: 100%;\n\
    \npadding-top: 20%;\n\n-webkit-box-sizing: border-box;\n\ntext-align: center;\n\
    \nfont-size: 100px;\n\n}\n\n</style>\n\n<script>\n\n/* The BigSpinner class definition\
    \ goes here\n\n... */\n\nvar spinner = new BigSpinner();\n\nspinner.init(\"spinner\"\
    , \"gray\");\n\nspinner.animate();\n\n</script>\n\n</head>\n\n<body>\n\n<div class=\"\
    bigSpinner useSpinner\">\n\n&#63743;<!-- Apple logo -->\n\n</div>\n\n</body>\n\
    \n</html>\n\nFigure 7–2\\. The Mac OS X start-up screen, drawn with the Canvas\
    \ API\n\nAs you can see, this solution is both simple and easily customizable.\
    \ Because it is likely that you want to use the same spinner several times, it\
    \ is profitable to make a simple definition in one CSS class (.bigSpinner) and\
    \ develop it in another (.useSpinner).\n\nBecause only one element is loaded,\
    \ such a practice represents a notable gain in\n\ndownload times and memory usage.\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nIndeed, the same spinner as an animated GIF image would require more\
    \ than 3KB,\n\nwhereas this code, which is less than 3KB, allows you to create\
    \ as many spinners as desired, customize them, and seamlessly execute them. Moreover,\
    \ HTTP compression\n\nis widely used on servers nowadays. Because GIF images are\
    \ already compressed, the file size for the GIF spinner wouldn’t change, while\
    \ the code for the canvas spinner is likely to be compressed to less than 1KB.\n\
    \nOf course, it would be preferable to launch the animation only at the time it\
    \ is needed in order not to uselessly consume battery power. For this, you can\
    \ use the stop() method, together with animate(), to control the activity of the\
    \ spinner.\n\nYou can also take a more conventional approach to using canvases\
    \ in your styles. The toDataURL() method of the canvas object is meant for that,\
    \ because it allows you to transform the data from the canvas into an URL. This\
    \ way, you can use binary, base64-encoded data right in an HTML page, for instance.\
    \ The background of an element thus could be modified from a canvas like this:\n\
    \nvar data = canvas.toDataURL();\n\n/* Use the canvas as a background of the first\
    \ <div> of the document */\n\nvar object = document.getElementsByTagName(\"div\"\
    );\n\nobject[0].style.backgroundImage = data;\n\n/* Use canvas data in a <img>\
    \ tag */\n\nvar image = document.images[0];\n\nimage.src = data;\n\nThe default\
    \ format is PNG, which is the only format required for implementation by the specifications.\
    \ However, other formats, like JPEG, can be used to pass the MIME type (image/jpeg)\
    \ as a parameter to the toDataURL() method. For now, we are going to get into\
    \ the details of the Canvas API.\n\nDrawing Simple Shapes\n\nWith the Canvas API,\
    \ the simplest shapes to draw are rectangles. To draw more\n\ncomplex shapes such\
    \ as circles, you have to handle complex path functions (which we will soon explain).\
    \ On the contrary, to draw a rectangle, you have three options, all of which are\
    \ pretty straightforward. All three take the same parameters: the origin as a\
    \ couple of reference points (x,y) and the dimensions for the box (width,height).\
    \ Figure 7–3 shows how this works.\n\n/* Paints a rectangle using the current\
    \ fill style */\n\ncontext.fillRect(10, 10, 180, 80);\n\n/* Draws the box outlining\
    \ the given rectangle\n\nusing the current stroke style */\n\ncontext.strokeRect(10,\
    \ 110, 180, 80);\n\n/* Clears the area to transparent */\n\ncontext.clearRect(50,\
    \ 50, 100, 100);\n\n![](index-195_1.png)\n\nCHAPTER 7: Bitmap and Vector Graphics\
    \ and Downloadable Fonts with Canvas and SVG\n\nFigure 7–3\\. Simple shapes drawn\
    \ with the Canvas API\n\nNotice that when executing this code, the lines of the\
    \ rectangle drawn with the\n\nstrokeRect() method are a little fuzzy and bolder\
    \ than expected—the default border width being 1 pixel. To solve this problem,\
    \ you would usually just have to add 0.5 to origin points, as follows:\n\ncontext.strokeRect(10.5,\
    \ 110.5, 180, 80);\n\nThis is because, although the lines are not drawn along\
    \ a pixel grid, the drawing process does depend on the undividable pixel unit.\
    \ Because it is impossible to draw a half pixel, the renderer uses anti-aliasing\
    \ to lessen the density of the line and give the impression that the line is along\
    \ the axis, with the expected width. By moving the line by half a pixel, you make\
    \ it possible to draw the line on a full pixel, no longer two halves, and the\
    \ line looks crisp. Figure 7–4 stresses this behavior, where each line is an axis\
    \ and each square is a physical pixel.\n\nFigure 7–4\\. Different pixel rendering\
    \ depending on the position and the width of the lines All three represent the\
    \ drawing of a 2 pixel high line. The first example illustrates the issue described\
    \ earlier, with a 1 pixel width at the coordinates (0,0). The pixels are anti-aliased\
    \ and extend to both sides of the vertical axis. By positioning the same line\
    \ on the points (0.5,0), the extension happens on the new axis, and the line fits\
    \ on the physical pixel. No visual effect is needed. The illustration to the right\
    \ in Figure 7–4 shows a line with the same characteristics as the first, but 2\
    \ pixels wide. In this case, each pixel can be displayed on one side of the axis.\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nColors, Gradients, and Patterns\n\nThe default drawing and fill color\
    \ in a canvas is black, though of course you can modify this at any stage. This\
    \ is done as follows:\n\n**context.fillStyle = \"red\";**\n\ncontext.fillRect(10,\
    \ 10, 180, 80);\n\n**context.strokeStyle = \"rgba(0, 255, 0, 0.5)\";**\n\ncontext.strokeRect(10,\
    \ 110, 180, 80);\n\nIn these processes, you can use any CSS colors that we have\
    \ seen in the previous\n\nchapter, including colors with an alpha channel, as\
    \ shown in both previous examples.\n\nSyntaxes are also available to you to use\
    \ gradients and even patterns.\n\nUsing Gradients\n\nThe syntax for gradients\
    \ in the Canvas API is quite similar to that found in CSS, with\n\n-webkit-gradient().\
    \ You should choose between a linear or radial gradient to use the appropriate\
    \ method to instantiate a new CanvasGradient object.\n\n/* createLinearGradient(x0,\
    \ y0, x1, y1) */\n\nvar linear = context.createLinearGradient(0, 0, 100, 100);\n\
    \n/* createRadialGradient(x0, y0, r0, x1, y1, r1) */\n\nvar radial = context.createRadialGradient(100,\
    \ 100, 90, 100, 100, 10);\n\nThe first example will draw a linear gradient stretching\
    \ from point (0,0) to point (100,100)—thus along a diagonal. Beyond these points,\
    \ the colors will continue to fill the entire canvas area. The coordinates refer\
    \ to points in the space of the canvas; therefore, the display will change depending\
    \ on the position of the shapes that use this gradient.\n\nThe second example\
    \ should draw a radial gradient, with parameters that specify the center of the\
    \ initial circle (100,100), its radius 10, and the position of the second circle\
    \ (100,10), with a radius of 90 pixels.\n\nOnce you have defined an area and stop\
    \ points for your gradient, you can add color to it with the addColorStop() method.\
    \ As previously, the definition looks a lot like that found with CSS.\n\nlinear.addColorStop(0.0,\
    \ \"yellow\");\n\nlinear.addColorStop(1.0, \"green\");\n\nThe first parameter\
    \ is the offset from where the color should start, ranging from 0.0 to 1.0; the\
    \ second of course is the color. Now that you gradient is ready, you can use it\
    \ with the methods shown earlier both for the stroke and for the fill (Figure\
    \ 7–5).\n\ncontext.fillStyle = linear;\n\ncontext.strokeStyle = linear;\n\n![](index-197_1.jpg)\n\
    \nCHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and\
    \ SVG\n\nFigure 7–5\\. You can use a gradient both for fill and for stroke\n\n\
    This already allows for quite a few possibilities. Nonetheless, the Canvas API\
    \ also allows for the use of an image object, a video, or even a canvas (including\
    \ the current canvas) as patterns inside your drawing area.\n\nDefining Patterns\n\
    \nNew patterns are created with the createPattern() method from an image, video,\
    \ or even canvas object, which takes two parameters, the source object and a repeat\
    \ mode, as shown in the CSS background-repeat property.\n\nvar image = document.getElementById(\"\
    someImage\");\n\nvar pattern = context.createPattern(image, \"repeat-x\");\n\n\
    Once you have created a new pattern, it can be used, just like plain colors and\n\
    \ngradients, with the fillStyle and strokeStyle properties. However, remember\
    \ that, once you have created your pattern object, it will not be changed, even\
    \ if, for instance, the source image used to create it was altered or the source\
    \ canvas was cleared and drawn differently. Therefore, you cannot automatically\
    \ animate a pattern, even using a video or multilayer GIF image.\n\nMore Complex\
    \ Shapes with Paths\n\nAll the previous methods and properties of course can have\
    \ many appreciable uses.\n\nHowever, for now, you are still limited to straight\
    \ lines and rectangles. Of course, there is more to the API. Using paths, similar\
    \ to those used in Illustrator or in Photoshop with the water pen tool, you can\
    \ achieve very complex illustrations.\n\nIn the canvas area, paths should be defined\
    \ using one or more subpaths, which are themselves composed of several points\
    \ on a straight or curved line. A subpath can be indicated as closed, meaning\
    \ its last point is connected to its first by a straight line.\n\nTable 7–1 lists\
    \ the different methods used to define paths.\n\nCHAPTER 7: Bitmap and Vector\
    \ Graphics and Downloadable Fonts with Canvas and SVG\n\nTable 7–1\\. Methods\
    \ Used to Define Paths\n\n**Method Description**\n\n*context*.beginPath()\n\n\
    Resets the list of subpaths.\n\n*context*.moveTo(x, y)\n\nCreates a new subpath\
    \ with the given point.\n\n*context*.lineTo(x, y)\n\nAdds the given point to the\
    \ subpath connected to the\n\nprevious one by a straight line.\n\n*context*.rect(x,\
    \ y, w, h)\n\nAdds a new closed subpath representing the given\n\nrectangle.\n\
    \n*conext*.arc(x, y, radius,\n\nAdds points to the subpath representing the given\
    \ arc,\n\nstartAngle, endAngle,\n\nconnected to the previous one by a straight\
    \ line. Angles are\n\nanticlockwise)\n\nin radians.\n\n*context*.arcTo(cpx1, cpy1,\
    \ cpx2,\n\nAdds two control points defining, using last point of the\n\ncpy2,\
    \ radius)\n\nprevious subpath, two intersecting segment tangents to the\n\ncircle\
    \ defined by arguments. Resulting subpath is an arc\n\nstarting at intersection\
    \ point with the first tangent and\n\nending at intersection point with the second\
    \ tangent. The\n\nfirst point is connected to the previous subpath by a straight\n\
    \nline.\n\n*context*.quadraticCurveTo(cpx,\n\nAdds the given point to the subpath,\
    \ connected to the\n\ncpy, x, y)\n\nprevious one by a quadratic Bézier curve with\
    \ the given\n\ncontrol point.\n\n*context*.bezierCurveTo(cp1x,\n\nAdds the given\
    \ point to the subpath, connected to the\n\ncp1y, cp2x, cp2y, x, y)\n\nprevious\
    \ one by a cubic Bézier curve with the given control\n\npoints.\n\n*context*.fill()\n\
    \nFills the subpaths with the current fill style.\n\n*context*.stroke()\n\nStrokes\
    \ the subpaths with the current stroke style.\n\n*context*.closePath()\n\nCloses\
    \ the current subpath explicitly and starts a new one\n\nwith the same point as\
    \ the previous point.\n\nPaths should be initialized with the beginPath() method\
    \ of the context object, which empties the subpath’s list. The closePath() method\
    \ closes the current subpath (not the path itself), drawing a line from its last\
    \ point to its first point, as shown in Figure 7–6.\n\nThe fill() and stroke()\
    \ methods make closing the subpath implicit but don’t close the active path, like\
    \ the closePath() method would. There can be only one current path at a time,\
    \ which is why you should always specify to the engine when a path begins and\
    \ where to close a subpath. This is critical if several subpaths are to be defined\
    \ with similar styles but shouldn’t be connected.\n\n![](index-199_1.png)\n\n\
    CHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\
    \ncontext.beginPath();\n\n/* Draw a first triangle */\n\ncontext.moveTo(20, 90);\n\
    \ncontext.lineTo(70,40);\n\ncontext.lineTo(120,90);\n\n/* Then move and draw another\
    \ triangle */\n\ncontext.moveTo(80, 110);\n\ncontext.lineTo(130,160);\n\ncontext.lineTo(180,110);\n\
    \ncontext.closePath();\n\n/* Fill subpaths and stroke */\n\ncontext.fill();\n\n\
    context.stroke();\n\nFigure 7–6\\. The first triangle is implicitly closed, while\
    \ the second is closed with the *closePath()* method In this example, we begin\
    \ by creating a first subpath to draw a triangle with only two sides, and then\
    \ we move within the path using moveTo() to start another subpath in another area.\
    \ Therefore, the closePath() method will close only the second subpath.\n\nDrawing\
    \ Arcs\n\nThere once again are quite a few possibilities using the previous methods;\
    \ however, these examples still stick to straight lines. To unleash the full range\
    \ of possibilities offered by the Canvas API, you will have to handle the most\
    \ complex path methods, namely, those used to draw curves. Starting with the arcTo()\
    \ method, you will notice that the two points it takes as parameters don’t even\
    \ actually belong to the subpath that it allows you to draw. They are control\
    \ points, that is, points that will be used to calculate the position of the arc\
    \ from its starting point to its ending point.\n\nFigure 7–7 shows an arc drawn\
    \ with the following code:\n\ncontext.beginPath();\n\ncontext.moveTo(120,18);\n\
    \ncontext.arcTo(140, 20, 110, 100, 100);\n\ncontext.lineTo(200, 100);\n\ncontext.stroke();\n\
    \n![](index-200_1.png)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\nFigure 7–7\\. An arc is defined by its control\
    \ points (the gray dots) relative to the last point from the previous subpath\
    \ (black dot)\n\nAs you can see, neither of the lighter dots—the control points—are\
    \ part of the subpath.\n\nInstead, they are used only to define tangents, whose\
    \ intersection points are used to situate the points of the actual subpath, as\
    \ the arc spans from one to the other. As explained in Table 7–1, the first point\
    \ is attached to the previous subpath by a straight line.\n\nDrawing Curves\n\n\
    There are two other curve types: quadratic and cubic b-splines. They’re drawn\
    \ using the quadraticCurveTo() and bezierCurveTo() methods, using one and two\
    \ control points, as shown on Figure 7–8\\. These are widely used in the graphic\
    \ industry, be it for 3D\n\ncreation or in the car design industry, where they\
    \ were developed.\n\n/* A quadratic curve */\n\ncontext.beginPath();\n\ncontext.moveTo(20,\
    \ 100);\n\ncontext.quadraticCurveTo(100, 20, 180, 100);\n\ncontext.stroke();\n\
    \n/* A cubic curve */\n\ncontext.beginPath();\n\ncontext.moveTo(20, 100);\n\n\
    context.bezierCurveTo(70, 20, 140, 180, 180, 100);\n\ncontext.stroke();\n\n![](index-201_1.png)\n\
    \n![](index-201_2.png)\n\nCHAPTER 7: Bitmap and Vector Graphics and Downloadable\
    \ Fonts with Canvas and SVG\n\nFigure 7–8\\. Two Bézier curves—one quadratic,\
    \ one cubic\n\nOnce again, the lighter points indicate control points. You will\
    \ notice that the actual curve is much lower than the corresponding control point.\
    \ Basically, to draw a Bézier curve is to draw a definite line from the center\
    \ of one definite line to the center of the next definite line connected to it.\
    \ This gives you the initial position of the curve. The newly created lines will\
    \ be used in the same manner as explained earlier. Of course, this is very schematic,\
    \ but it is the basics of the process, and along with some training, it should\
    \ allow you to obtain the results you expect.\n\nLine Styles\n\nAll the previous\
    \ methods are configurable, so you can style all lines in quite a few manners,\
    \ beyond the colors and gradients introduced earlier. The configuration is available\
    \ with the context object.\n\nThus, lineWidth allows you to tweak the thickness\
    \ of your lines, lineCap will let you choose an ending style for each line, and\
    \ lineJoin will let you indicate how lines should meet. These are illustrated\
    \ respectively in Figures 7–9 and 7–10.\n\ncontext.lineCap = \"butt\"; // Default,\
    \ also 'round', 'square'\n\ncontext.lineJoin = \"miter\"; // Default, also 'round',\
    \ 'bevel'\n\nFigure 7–9\\. Different line endings\n\n![](index-202_1.png)\n\n\
    CHAPTER 7: Bitmap and Vector Graphics and Downloadable Fonts with Canvas and SVG\n\
    \nFigure 7–10\\. Different line blending options\n\nThe default size for the miter\
    \ is 10.0\\. This can be modified with the miterLimit property.\n\nIf the rendering\
    \ engine doesn’t find enough space to draw the miter, it wil extend it to the\
    \ defined limit and then cut it as with the bevel parameter.\n\nEnhancing Your\
    \ Menus with Style\n\nNow that you know how to create paths with different styles,\
    \ you can add a new feature to your web application templates: the missing chevron\
