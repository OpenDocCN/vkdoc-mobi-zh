- fmt: "# Process the request using the cURL API.\n\n```\nif ($curl = curl_init($url))\
    \ {\n    curl_setopt($curl, CURLOPT_FOLLOWLOCATION, 1);\n    curl_setopt($curl,\
    \ CURLOPT_RETURNTRANSFER, 1);\n    $data = curl_exec($curl);\n\n    # Read the\
    \ response information\n    $code = curl_getinfo($curl, CURLINFO_HTTP_CODE);\n\
    \    $type = curl_getinfo($curl, CURLINFO_CONTENT_TYPE);\n\n    # Return the content\
    \ and quit.\n    if ($code == 200) {\n        header(\"Content-Type: $type\",\
    \ true, $code);\n        exit($data);\n    }\n}\n```\n\n## Chapter 12: Ajax and\
    \ Dynamic Content\n\n```\n# If there is no valid content, we send a HTTP 500 error\
    \ response.\nheader('Content-Type: text/plain', true, 500);\necho 'UNEXPECTED\
    \ RESPONSE';\n?>\n```\n\nOur PHP script expects a `url` parameter to be passed\
    \ in the query string. If this entry is found, a new cURL session is initialized\
    \ using the `curl_init()` function, and the request options are set. `CURLOPT_FOLLOWLOCATION`\
    \ will apply HTTP redirections, if any, while the `CURLOPT_RETURNTRANSFER` constant\
    \ will let us store the result of our request in the `$data` variable using the\
    \ `curl_exec()` function.\n\nOnce the request has been executed, we gather the\
    \ HTTP status code with the `curl_getinfo()` function, together with the content\
    \ type, which will allow you to return the expected header. If no error occurs,\
    \ the content is sent back with the initial content type; otherwise, an HTTP 500\
    \ error code is returned.\n\nThe use we have made of the API is rather simple\
    \ here, but the options available to you using cURL are numerous and can be finely\
    \ tailored to your needs. Although the process is very straightforward, you should\
    \ be especially careful when you send the header, because your client-side script\
    \ may check the value of the status property (`$code` in the PHP file) to halt\
    \ its execution. Nevertheless, the result is that, seamlessly, your Ajax request\
    \ is done on the same domain, while still gathering data from a remote server.\n\
    \nBecause server-side scripting is generally faster than client-side scripting\
    \ (especially because client-side scripting performances partly depend on the\
    \ device), it is a good idea to run whatever security checking or preliminary\
    \ processing you need to do directly on the server. Don’t forget that, as with\
    \ any request to a site that isn’t maintained by you, there is a risk that the\
    \ returned data isn’t what you expect.\n\n## The JSONP Way\n\nIf you would rather\
    \ not use proxies or an Ajax request and the data you expect from your request\
    \ is formatted as JSON, there is a simpler method — although it is one that implies\
    \ greater security risks — namely, JSONP. JSONP stands for JSON with Padding.\
    \ The idea behind this method is that data returned in JSON format needs to be\
    \ evaluated and is meant to be processed and used, and this should be done without\
    \ cluttering your code.\n\nTo achieve this, the server should return not only\
    \ the requested data in JSON format but also the call to the function that is\
    \ going to process it. Thus, when the response is received, it will automatically\
    \ be processed appropriately.\n\nLet’s start with the server-side script. We are\
    \ going to use the `json_encode()` PHP function to generate JSON-formatted data\
    \ from an array. Here are the contents of the `json.php` file that you can add\
    \ to your server.\n\n```\n<?php\n$json = json_encode(requestData());\n\n# We have\
    \ a callback, process a JSONP behavior\nif ($callback = $_GET['callback']) {\n\
    \    header('Content-Type: text/javascript');\n    echo \"$callback($json);\"\
    ;\n# No callback, send a classic JSON content\n} else {\n    header('Content-Type:\
    \ application/json');\n    echo $json;\n}\n\n# Request data from database or whatever...\n\
    function requestData() {\n    return array(\n        'firstname' => 'John',\n\
    \        'lastname' => 'Doe'\n    );\n}\n?>\n```\n\nThe script expects a `callback`\
    \ to be passed as a parameter that will process the JSON data on the client. If\
    \ the parameter isn’t set, the script simply returns the raw JSON-formatted data.\
    \ This allows you to use this file for both requests using JSONP and proxies.\n\
    \nOn the client side, you would define a function holding what needs to be done\
    \ with the data in your client document. This is equivalent to the handler function\
    \ used in our Ajax requests. It will be run when the `<script>` tag is added to\
    \ the document.\n\n```\n<script>\nfunction useJSON(data) {\n    /* Do something\
    \ with the data */\n}\n</script>\n```\n\nYou need to notify the server that this\
    \ function is to be run when the data is sent. To achieve this, you would simply\
    \ pass the relevant function in a query string when calling the remote file like\
    \ any other external script.\n\n`<script src=\"http://www.example2.com/json.php?callback=useJSON\"\
    ></script>`\n\nWhen this `<script>` tag is evaluated, it would result in something\
    \ similar to this: `useJSON({\"firstname\":\"John\",\"lastname\":\"Doe\"});` With\
    \ this method, you needn’t define complicated methods to handle the moment when\
    \ data is made available: the JSON-formatted data can be evaluated in your function,\
    \ and the relevant information can be used in your page directly. This is obviously\
    \ useful when a page is likely to receive different kinds of information, with\
    \ different processing for each, because you can tightly relate specific functions\
    \ to specific data.\n\n## The Cross-Origin Resource Sharing\n\nAs you can see,\
    \ there are quite a few efficient methods that will let you gather data from distant\
    \ pages, including documents from different domains. However, the most efficient\
    \ method to perform cross-origin requests is to use the new Cross-Origin Resource\
    \ Sharing (CORS) specification, maintained by the Web Applications Working Group.\
    \ The specification, supported on Mobile Safari, lets you define a set of HTTP\
    \ headers on the server side that will be read by the client application to check\
    \ whether the request is authorized. We are going to see how this can be used\
    \ to perform GET and POST requests.\n\n**NOTE:** For more complex HTTP requests\
    \ such as DELETE or PUT, you can refer to the specification details at [www.w3.org/TR/cors/](http://www.w3.org/TR/cors).\n\
    \nOf course, the downside of this method is that it requires that you have some\
    \ control over the server configuration and over the server-side scripts that\
    \ will return the headers, or it requires that the site from which you want to\
    \ retrieve information implements this specification.\n\nThe following is an example\
    \ of the most basic use of this kind of authorization, using PHP:\n\n```\n<?php\n\
    header(\"Access-Control-Allow-Origin: *\");\n?><xml>Data Sample</xml>\n```\n\n\
    As with our proxy example, if this script is hosted at `http://www.example1.local`\
    \ and the request is sent from `http://www.example2.local`, the request will be\
    \ correctly executed, and the expected data will be received by the client. The\
    \ `Access-Control-Allow-Origin` header is set to `*`, which acts as a wildcard\
    \ for all origins.\n\nOf course, you can limit the authorization to some selected\
    \ origins by explicitly setting a URL, which is a better practice where security\
    \ is concerned.\n\n`Access-Control-Allow-Origin: http://www.example2.local`\n\n\
    Note that Mobile Safari doesn’t allow you to set several URLs using this header,\
    \ but the specification requires that the browser should send an `Origin` header\
    \ indicating the source of the request. Therefore, the server-side script will\
    \ be able to keep a list of authorized domains and return the relevant header\
    \ when the request comes from one of these.\n\n```\n<?php\n$whitelist = Array('http://www.example2.local',\
    \ 'http://www.domain.other');\n\nforeach ($whitelist as $origin) {\n    // processing\
    \ logic\n}\n```"
