  trans: "\n边界框是一个简单的矩形，其构建基于以下定义：\n\n```javascript\nvar Rect = function() {\n  var\
    \ i = Infinity;\n  this.coords = new WebKitPoint(+i, +i);\n  this.extent = new\
    \ WebKitPoint(-i, -i);\n}\n```\n\n```javascript\nRect.prototype.adjust = function(x,\
    \ y) {\n  if (x < this.coords.x) {\n    this.coords.x = x;\n  }\n  if (x > this.extent.x)\
    \ {\n    this.extent.x = x;\n  }\n  if (y < this.coords.y) {\n    this.coords.y\
    \ = y;\n  }\n  if (y > this.extent.y) {\n    this.extent.y = y;\n  }\n}\n```\n\
    \n```javascript\nRect.prototype.fit = function() {\n  var w = (this.extent.x -\
    \ this.coords.x + 1);\n  var h = (this.extent.y - this.coords.y + 1);\n  if ((w\
    \ / h) > 4 || (h / w) > 4) {\n    var ax = w < h ? w : 0;\n    var ay = w < h\
    \ ? 0 : h;\n    this.coords.x -= ax;\n    this.extent.x += ax;\n    this.coords.y\
    \ -= ay;\n    this.extent.y += ay;\n  }\n}\n```\n\n为便于阅读，我们使用了 `WebKitPoint` 对象，它代表一个具有\
    \ `x` 和 `y` 坐标的点。当手指划过屏幕时，随着坐标被传入，`adjust()` 方法会相应地调整边界框。最后，如果边界框在某个方向上大至少四倍，`fit()`\
    \ 方法会对其进行调整。\n\n## 第十三章：使用触摸与手势事件\n\n### 记录用户笔画\n\n笔画被记录下来，签名由 `Recognizer` 对象生成。\n\
    \n```javascript\nvar Recognizer = function(element, interpreter) {\n  this.element\
    \ = element;\n  this.element.addEventListener(\"touchstart\", this, false);\n\
    \  this.interpreter = interpreter;\n  this.strokes = [];\n  this.autoEndTimer\
    \ = null;\n  this.strokeSource = null;\n}\n```\n\n构造函数将捕获触摸的对象作为其第一个参数。它可以是一个具有明确尺寸的\
    \ `HTML` 元素，也可以是 `document` 对象，后者允许你捕获设备屏幕上的所有事件。第二个参数是一个用于解释签名的函数。\n\n用于确定最终签名的连续移动轨迹会存储在\
    \ `strokes` 数组中。为了结束图形并判断一个笔划是当前序列的一部分还是开启新序列，我们使用了一个定时器。这个定时器的标识符存储在 `autoEndTimer`\
    \ 中，以便对其进行控制。\n\n```javascript\nRecognizer.prototype.handleEvent = function(event)\
    \ {\n  var x = event.changedTouches[0].pageX;\n  var y = event.changedTouches[0].pageY;\n\
    \  var t = event.type;\n  if (event.touches.length != 1) {\n    t = \"touchend\"\
    ;\n  }\n  switch (t) {\n    case \"touchstart\":\n      this.saveSource(event.touches[0].target);\n\
    \      this.startStroke();\n      this.savePoint(x, y);\n      this.doAutoEnd();\n\
    \      break;\n    case \"touchmove\":\n      this.savePoint(x, y);\n      this.doAutoEnd();\n\
    \      break;\n    case \"touchend\":\n      this.endStroke();\n      this.savePoint(x,\
    \ y);\n      this.doAutoEnd();\n      break;\n  }\n  event.preventDefault();\n\
    }\n```\n\n### 第十三章：使用触摸与手势事件\n\n```javascript\nRecognizer.prototype.saveSource\
    \ = function(node) {\n  if (!this.strokeSource) {\n    if (node.nodeType == node.TEXT_NODE)\
    \ {\n      node = node.parentNode;\n    }\n    this.strokeSource = node;\n  }\n\
    }\n```\n\n```javascript\nRecognizer.prototype.startStroke = function() {\n  this.strokes.push({\n\
    \    points: [],\n    bound : new Rect()\n  });\n  this.element.addEventListener(\"\
    touchmove\", this, false);\n  this.element.addEventListener(\"touchend\", this,\
    \ false);\n}\n```\n\n记录从 `touchstart` 事件开始。仅当此事件被发送时，我们才注册新的监听器以启动一个序列，这可以防止记录元素外部的初始点。\n\
    \n一个新的对象被添加到 `strokes` 数组中，用于存储所有点及其边界框。随着点的添加，边界框会逐步调整大小，这避免了在处理签名时进行循环。对于每个事件，至少会保存一个点，并且\
    \ `autoEndTimer` 定时器会被重置。\n\n```javascript\nRecognizer.prototype.savePoint = function(x,\
    \ y) {\n  var stroke = this.strokes[this.strokes.length - 1];\n  stroke.points.push(new\
    \ WebKitPoint(x, y));\n  stroke.bound.adjust(x, y);\n}\n```\n\n```javascript\n\
    Recognizer.prototype.doAutoEnd = function() {\n  if (this.autoEndTimer) {\n  \
    \  window.clearTimeout(this.autoEndTimer);\n  }\n  var that = this;\n  this.autoEndTimer\
    \ = window.setTimeout(function() {\n    that.endStroke();\n    that.finalizeStrokes();\n\
    \  }, 500);\n}\n```\n"
- fmt: "# 使用触摸和手势事件\n\n用户有`500ms`的时间来链接两个手势，这在大多数情况下足够长。超过这个限制后，录制将自动停止，并且如果有监听器，它们将被删除。\n\
    \n```\nRecognizer.prototype.endStroke = function() {\n    this.element.removeEventListener(\"\
    touchmove\", this, false);\n    this.element.removeEventListener(\"touchend\"\
    , this, false);\n}\n```\n\n一旦序列结束，将调用`finalizeStrokes()`方法来确定签名。\n\n```\nRecognizer.prototype.finalizeStrokes\
    \ = function() {\n    var signature = [];\n    for (var m = 0; m < this.strokes.length;\
    \ m++) {\n        var bound = this.strokes[m].bound;\n        var points = this.strokes[m].points;\n\
    \        bound.fit();\n        var w = (bound.extent.x - bound.coords.x + 1) /\
    \ 3;\n        var h = (bound.extent.y - bound.coords.y + 1) / 3;\n        for\
    \ (var n = 0; n < points.length - 1; n++) {\n            var px = points[n].x\
    \ - bound.coords.x;\n            var py = points[n].y - bound.coords.y;\n    \
    \        var mx = px / w << 0; // 位移位运算符允许非常快速的 Math.floor()\n            var\
    \ my = py / h << 0;\n            var value = my * 3 + mx + 1;\n            if\
    \ (value != signature[signature.length - 1]) {\n                signature.push(value);\n\
    \            }\n        }\n    }\n    this.strokes = [];\n    this.interpreter(signature.join(''),\
    \ this.strokeSource);\n    this.strokeSource = null;\n}\n```\n\n每记录一个笔画，边界框会按需调整，并计算网格的尺寸。然后，调整点以标准化其坐标，并估计它们在网格上的位置。如果到达了新的网格块，则将其添加到签名中。最后，清空笔画数组，并使用最终签名作为参数启动解释器。\n\
    \n## 使用`Recognizer`对象\n\n从这里开始，使用`Recognizer`对象非常简单，因为您只需要实例化该对象并为签名定义一个解释器。我们将使用一个列表来接收手指笔画，并相应地修改列表元素的文本样式。在此示例中，我们再次基于我们的Web应用程序模板构建。以下是需要修改`index.html`的内容：\n\
    \n```html\n<body onload=\"init()\">\n    <div class=\"view\" style=\"background:\
    \ white\">\n        ...\n        <div class=\"list-wrapper\">\n            <h2>Apress</h2>\n\
    \            <ul>\n                <li>Books</li>\n                <li>Reviews</li>\n\
    \                <li>Authors</li>\n                <li>Contact</li>\n        \
    \    </ul>\n        </div>\n    </div>\n</body>\n```\n\n然后，创建一个名为`strokes.js`的新JavaScript文件，其中包含`Recognizer`的代码以及以下内容：\n\
    \n```javascript\nfunction interpreter(signature, source) {\n    switch (signature)\
    \ {\n        case \"456\": // O--->\n            sendEvent(\"SwipeRight\", source);\n\
    \            break;\n        case \"654\": // <---O\n            sendEvent(\"\
    SwipeLeft\", source);\n            break;\n        default:\n            console.log(\"\
    Unknown stroke received \" + signature);\n    }\n}\n\nfunction sendEvent(type,\
    \ target) {\n    var vendor = \"book\";\n    var event = document.createEvent(\"\
    Event\");\n    event.initEvent(vendor + type, true, false);\n    target.dispatchEvent(event);\n\
    }\n```\n\n正如预期的那样，解释器接收签名以及笔触的来源。然后解释签名，并将事件发送到起源，将`initEvent()`的第二个参数设置为`true`以允许事件冒泡。接着，您只需要实例化该对象并准备监听器，其处理程序将修改列表元素的样式。\n\
    \n```javascript\nfunction init() {\n    var ul = document.getElementsByTagName(\"\
    ul\")[0];\n    var rs = new Recognizer(ul, interpreter);\n\n    /* 从右向左滑动事件时更改文本颜色\
    \ */\n    ul.addEventListener(\"bookSwipeLeft\", function(event) {\n        var\
    \ style = event.target.style;\n        style.color = style.color ? \"\" : \"red\"\
    ;\n    }, false);\n\n    /* 从左向右滑动事件时更改文本粗细 */\n    ul.addEventListener(\"bookSwipeRight\"\
    , function(event) {\n        var style = event.target.style;\n        style.fontWeight\
    \ = style.fontWeight ? \"\" : \"bold\";\n    }, false);\n}\n```\n\n发送的新事件包括从右向左滑动和从左向右滑动。每个笔触将文本从黑色切换为红色，或从正常粗细切换为粗体，如图13-6所示。由于事件启用了冒泡，因此不必为每个列表元素添加独立的处理程序。事件将到达列表项并继续传播。"
